- en: 'Unlocking the Power of Machine Learning in Analytics: Practical Use Cases and
    Skills'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 解锁分析中机器学习的力量：实际用例和技能
- en: 原文：[https://towardsdatascience.com/unlocking-the-power-of-machine-learning-in-analytics-practical-use-cases-and-skills-5201cf457360/](https://towardsdatascience.com/unlocking-the-power-of-machine-learning-in-analytics-practical-use-cases-and-skills-5201cf457360/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/unlocking-the-power-of-machine-learning-in-analytics-practical-use-cases-and-skills-5201cf457360/](https://towardsdatascience.com/unlocking-the-power-of-machine-learning-in-analytics-practical-use-cases-and-skills-5201cf457360/)
- en: In the past decade, we have seen explosive growth in the data science industry,
    with a rise in machine learning and AI use cases. Meanwhile, the "Data Scientist"
    title has evolved into different roles at different companies. Thinking about
    functions, there are Product Data Scientists, Marketing Data Scientists, those
    specialized in Finance, Risk, and people supporting Operations, HR, etc.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去十年中，我们见证了数据科学行业的爆炸式增长，机器学习和人工智能用例的增加。与此同时，“数据科学家”这一职位在不同公司中演变出不同的角色。从职能角度来看，有产品数据科学家、市场数据科学家，以及专注于金融、风险等领域的人，还有支持运营、人力资源等的人。
- en: Another common distinction is the DS Analytics (often referred to as DSA) and
    the DS Machine Learning (DSML) tracks. As the name suggests, the prior focuses
    on analyzing data to derive insights, while the latter trains and deploys more
    machine learning models. However, this does not mean that DSA positions do not
    involve machine learning projects. You can often find machine learning among the
    required skills in the job descriptions of DSA openings.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个常见的区别是DS分析（通常称为DSA）和DS机器学习（DSML）的路径。正如其名所示，前者专注于分析数据以得出见解，而后者则训练和部署更多的机器学习模型。然而，这并不意味着DSA职位不涉及机器学习项目。你经常可以在DSA职位的职位描述中找到机器学习作为所需技能之一。
- en: 'This overlap often leads to confusion among aspiring data scientists. During
    coffee chats, I frequently hear questions like: **Do DSA positions still require
    machine learning skills? Or do DSAs also deploy machine learning models?** Unfortunately,
    the answer is not a simple Yes or No. Firstly, the boundaries between the two
    positions are always blurry (even a decade after the data science job became a
    trend). Sometimes, within the same company, DSAs supporting different functions
    could be using very different skill sets. Secondly, machine learning itself is
    a broad field, covering things from simple linear regression to complex neural
    networks, and even LLM. Therefore, some of them could be fantastic tools for analytics
    purposes, while others are more tailored for building a production-grade predictive
    model.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这种重叠往往会导致有志于成为数据科学家的人产生困惑。在咖啡聊天中，我经常听到类似的问题：**DSA职位是否仍然需要机器学习技能？或者DSA是否也部署机器学习模型？**不幸的是，答案不是简单的“是”或“否”。首先，两个职位的界限总是模糊的（即使数据科学工作成为趋势已经十年了）。有时，在同一个公司内，支持不同职能的DSA可能会使用非常不同的技能集。其次，机器学习本身是一个广泛的领域，涵盖了从简单的线性回归到复杂的神经网络，甚至LLM。因此，其中一些可能是分析目的的绝佳工具，而另一些则更适用于构建生产级别的预测模型。
- en: 'But if I have to answer the question: "**Yes, DSAs also use machine learning
    skills, but just not in the same way as DSML positions. Instead of building complex
    models and optimizing for scalability, accuracy, and latency, DSAs primarily leverage
    machine learning as a tool to generate insights or support analyses and focus
    more on generating interpretable and actionable outputs to better inform business
    decisions.**"'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果我要回答这个问题：“**是的，DSA也使用机器学习技能，但方式与DSML职位不同。DSA不是构建复杂模型并优化可扩展性、准确性和延迟，而是主要利用机器学习作为生成见解或支持分析的工具，更专注于生成可解释和可操作的输出，以更好地指导商业决策。**”
- en: In the section below, I will explain this answer further with three common machine
    learning use cases in analytics. These examples will provide a more concrete answer
    to the above question, and highlight the machine learning skills you need to succeed
    in a DSA position.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的部分中，我将通过分析中三个常见的机器学习用例来进一步解释这个答案。这些例子将提供对上述问题的更具体答案，并突出在DSA职位上成功所需的机器学习技能。
- en: '![Image created by DALL·E](../Images/fa3856bbf856daccc368bf99d0335873.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![由DALL·E创建的图像](../Images/fa3856bbf856daccc368bf99d0335873.png)'
- en: Image created by DALL·E
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 由DALL·E创建的图像
- en: '* * *'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Use Case 1: Metrics Driver Analysis'
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用例1：指标驱动分析
- en: Usually, the first step to understanding a business or a product is to define
    and track the right metrics. But after completing this step, the question becomes
    how can we move the metrics in the right direction. Machine learning is a powerful
    tool for understanding what drives these metrics and how to influence them.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，理解业务或产品的第一步是定义和跟踪正确的指标。但完成这一步后，问题变成了如何将指标移动到正确的方向。机器学习是理解驱动这些指标的因素以及如何影响它们的有力工具。
- en: Let’s say you are tasked to **improve customer retention**. You might have heard
    tons of assumptions from user interviews, surveys, and even business intuition.
    A common way to validate the assumptions is to build a classification model to
    predict retention and identify important features.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你被要求**提高客户留存率**。你可能已经从用户访谈、调查甚至商业直觉中听到了大量的假设。验证这些假设的常见方法是通过构建一个分类模型来预测留存率并识别重要特征。
- en: 'Here is the process:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是这个过程：
- en: '**Establish the assumptions** based on conversations with your stakeholders
    and customers, and your business understanding. For example,'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**基于与利益相关者和客户的对话以及你的业务理解建立假设**。例如，'
- en: Customers with longer tenures are less likely to churn;
  id: totrans-15
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 留存时间较长的客户不太可能流失；
- en: Heavy usage of feature X indicates higher loyalty to the product;
  id: totrans-16
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对特征X的频繁使用表明对产品的忠诚度更高；
- en: Customers who only use the mobile app are more likely to churn due to the missing
    features on the app.
  id: totrans-17
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 只使用移动应用的客户，由于应用上缺少功能，更有可能流失。
- en: '**Collect features** based on your assumptions, for example, *customer tenure*,
    *time spent and frequency on feature X*, and *if the user is mobile only or not*.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**根据你的假设收集特征**，例如，*客户留存时间*，*在特征X上花费的时间和频率*，以及*用户是否仅使用移动设备*。'
- en: '**Build a classification model** to predict if a customer churned or not. Common
    classification models include Logistic Regression and tree-based models (random
    forests, XGBoost, LightGBM, CatBoost, etc.). My go-to model is the XGBoost model
    because it captures nonlinear relationships and feature interactions, has built-in
    methods to handle imbalanced datasets and avoid overfitting, and typically achieves
    a good accuracy baseline even before extensive parameter tuning.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**构建一个分类模型**来预测客户是否会流失。常见的分类模型包括逻辑回归和基于树的模型（随机森林、XGBoost、LightGBM、CatBoost等）。我的首选模型是XGBoost模型，因为它捕捉非线性关系和特征交互，内置处理不平衡数据集和避免过拟合的方法，并且在广泛的参数调整之前通常可以达到良好的准确率基准。'
- en: '**Generate data insights and business recommendations**. You can use the model’s
    Feature Importance to understand which assumptions were correct. You can also
    use SHAP values to decompose the prediction into contributions from each feature.
    For example, if the model reveals that *mobile user only* is a very important
    feature and is correlated with a high churn rate, the next steps could be 1\.
    improving the mobile app to close the feature gaps; 2\. launching an email campaign
    encouraging mobile-only users to try more features on the desktop version. And
    of course, you will monitor the effectiveness of these recommendations and continue
    monitoring the retention rate.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**生成数据洞察和商业建议**。你可以使用模型的特征重要性来了解哪些假设是正确的。你还可以使用SHAP值将预测分解为每个特征的贡献。例如，如果模型显示“仅移动用户”是一个非常重要的特征，并且与高流失率相关，那么下一步可能是1.
    改进移动应用以填补功能差距；2. 启动电子邮件营销活动，鼓励仅使用移动的用户尝试桌面版本的更多功能。当然，你将监控这些建议的有效性并继续监控留存率。'
- en: From the above example, you can see that building the model is only part of
    the task for DSAs. The real value comes from interpreting results and translating
    them into actionable business strategies.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的例子中，你可以看出，对于数据科学家助理（DSAs）来说，构建模型只是任务的一部分。真正的价值来自于解释结果并将它们转化为可执行的商业策略。
- en: 'Use Case 2: Customer Segmentation'
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用用例2：客户细分
- en: We always talk about product-market fit; a critical part is understanding your
    customer portfolio and their needs. Therefore, data scientists are often asked
    to conduct customer segmentation tasks, grouping users based on similar behaviors
    or preferences.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们总是谈论产品-市场匹配；一个关键部分是了解你的客户组合及其需求。因此，数据科学家经常被要求执行客户细分任务，根据相似的行为或偏好对用户进行分组。
- en: 'There are numerous approaches to customer segmentation. Let me name a few:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 客户细分有众多方法。让我列举几个：
- en: '**Simple demographics segmentation**. For example, you work for a fashion retailer
    that owns product lines with different price tiers. In this case, a simple solution
    to customer segmentation is to break down customers based on their household income
    (if you have this data).'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**简单的人口统计细分**。例如，你为一家拥有不同价格层级的商品线的时尚零售商工作。在这种情况下，对客户进行细分的简单解决方案是根据他们的家庭收入（如果你有这些数据）来划分客户。'
- en: '**RFM (Recency, Frequency, Monetary) analysis**. You can collect metrics including
    how recently a customer spends (recency), how often they spend (frequency), and
    how much they spend (monetary). Then you can categorize high-recency, high-frequency,
    and high monetary value customers as VIP customers; high-recency, high-frequency,
    and low monetary value customers as price-sensitive customers, etc.'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**RFM（最近一次消费、消费频率、消费金额）分析**。你可以收集包括客户最近一次消费的时间（最近一次消费）、消费频率以及消费金额在内的指标。然后你可以将高最近一次消费、高消费频率和高消费金额的客户归类为VIP客户；高最近一次消费、高消费频率和低消费金额的客户归类为价格敏感型客户等。'
- en: 'Back to our topic, you can also build an **unsupervised learning model (**K-Means
    Clustering, Hierarchical Clustering, DBSCAN, etc.). Unlike the classification
    model example above, unsupervised learning is a type of machine learning that
    identifies patterns and relationships in unlabeled data without predefined output
    labels. Let’s still stick to the fashion retailer example:'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 回到我们的主题，你还可以构建一个**无监督学习模型（如K-Means聚类、层次聚类、DBSCAN等）**。与上述分类模型示例不同，无监督学习是一种机器学习类型，它在不带预定义输出标签的情况下识别未标记数据中的模式和关系。让我们继续以时尚零售商为例：
- en: You can **collect features** including customer demographics (age, income, etc.)
    and purchase patterns (how often and how much they spend on different product
    lines and types), then run them through a clustering algorithm like K-Means. This
    will automatically group your customers into several clusters.
  id: totrans-28
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以收集包括客户人口统计信息（年龄、收入等）和购买模式（他们在不同产品线和类型上的消费频率和金额）在内的特征，然后将它们通过像K-Means这样的聚类算法进行处理。这将自动将你的客户分成几个不同的群体。
- en: Though there are no existing true labels, you still need to **evaluate the model
    outputs**. Usually, you would examine the characteristics of each cluster to understand
    if the output makes business sense and what type of customers they represent,
    then give them a label that is intuitive to your stakeholders. For example, you
    might find a cluster of customers mostly purchasing discounted products, and you
    can label them "Bargain Hunters"; Another cluster of customers who spend a lot
    on luxury brands could be the "Luxury Shoppers" group.
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然没有现有的真实标签，但你仍然需要**评估模型输出**。通常，你会检查每个群体的特征，以了解输出是否具有商业意义以及它们代表了哪种类型的客户，然后给出一个对利益相关者直观的标签。例如，你可能会发现一个主要购买折扣产品的客户群体，你可以将其标记为“折扣猎人”；另一个在奢侈品牌上花费大量的客户群体可能是“奢侈品购物者”群体。
- en: Once you have the reasonable segments, they could be used to inform product
    strategies and conduct targeted email campaigns and personalized product recommendations.
  id: totrans-30
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一旦你有合理的细分，它们可以用来指导产品策略，进行有针对性的电子邮件营销和个性化产品推荐。
- en: 'Use Case 3: Experimentation and causal inference'
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用例3：实验和因果推断
- en: Another common task for DSAs is measuring the causal impact of a certain event.
    This involves randomized experimentation and more advanced causal inference methods
    when a controlled experiment is not feasible.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 对于DSAs（数据科学分析师）来说，另一个常见的任务是衡量某个事件的影响。这涉及到当无法进行受控实验时的随机实验和更高级的因果推断方法。
- en: When it comes to randomized experiments like A/B tests, an application of Machine
    Learning is to reduce noise in experiment results by controlling for covariates.
    These adjustments improve the sensitivity of experiments and lead to smaller sample
    sizes or shorter test durations while maintaining statistical power. **CUPED (Controlled
    Pre-Experiment Data)** is one of those variance reduction methods that can incorporate
    machine learning techniques. It reduces the variance of the outcome metric by
    adjusting for pre-experiment covariates that are predictive of the outcome – something
    you can achieve with a machine learning model.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到像A/B测试这样的随机实验时，机器学习的一个应用是通过控制协变量来减少实验结果中的噪声。这些调整提高了实验的敏感性，并在保持统计功效的同时，导致更小的样本量或更短的测试持续时间。**CUPED（受控预实验数据）**是那些可以结合机器学习技术的方差减少方法之一。它通过调整预测结果的预实验协变量来减少结果指标的方差——这是你可以通过机器学习模型实现的。
- en: When it comes to causal inference, there are lots of machine learning use cases
    as it can be used to address key challenges like confounding, non-linearity, and
    high-dimensional data.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到因果推断时，有许多机器学习使用案例，因为它可以用来解决诸如混杂、非线性和高维数据等关键挑战。
- en: Here is an example of using machine learning to enhance **Propensity Score Matching,**
    which **** is a useful technique to manually create two comparable groups when
    you don’t have perfectly randomized test and control groups. Suppose your company
    launched a newsletter program and your stakeholder wants you to assess its impact
    on customer retention. However, users who subscribed to the newsletter might inherently
    differ from those who did not. To apply the Propensity Score Matching method here,
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个使用机器学习来增强**倾向得分匹配**的例子，这是一种在测试组和对照组没有完美随机分配时，手动创建两个可比较组的有用技术。假设你的公司推出了一项通讯计划，你的利益相关者希望你对它对客户保留的影响进行评估。然而，订阅了通讯的用户可能天生就与未订阅的用户不同。要在这里应用倾向得分匹配方法，
- en: You can **train a machine learning model** (for example, logistics regression
    or XGBoost) to predict the likelihood of a user subscribing to the newsletter.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你可以**训练一个机器学习模型**（例如，逻辑回归或XGBoost）来预测用户订阅通讯的可能性的大小。
- en: '**Use the predicted "propensity scores" to match** newsletter subscribers with
    similar non-subscribers.'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用预测的“倾向得分”来匹配**与类似非订阅者订阅通讯的用户。'
- en: '**Compare the retention rate from this matched control and treatment group**.
    This will give you a more fair evaluation of the newsletter’s impact on customer
    retention.'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**比较匹配的控制组和处理组的保留率**。这将为你提供一个更公平的评估，了解通讯对客户保留的影响。'
- en: Machine learning also can be incorporated into other causal inference methods,
    such as Regression Discontinuity, Instrumental Variables, and Synthetic Control,
    which help address biases in observational data and derive the causal relationship.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习还可以结合到其他因果推断方法中，如回归离散、工具变量和合成控制，这些方法有助于解决观察数据中的偏差并推导出因果关系。
- en: '* * *'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I hope the three use cases above give you a concrete idea of how you can use
    machine learning in analytics workflows.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望上述三个使用案例能给你一个具体的想法，了解你如何在分析工作流程中使用机器学习。
- en: If you aim to be a Data Scientist specializing in Analytics, Here is your essential
    machine learning skills checklist for your interview preparation and daily work.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你旨在成为专注于分析的Data Scientist，以下是你面试准备和日常工作中必需的机器学习技能清单。
- en: '**Data Preparation:**'
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据准备**：'
- en: Handle missing values and outliers
  id: totrans-44
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理缺失值和异常值
- en: Encode categorical variables
  id: totrans-45
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对分类变量进行编码
- en: Apply data normalization techniques
  id: totrans-46
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
