- en: Why Your Next LLM Might Not Have A Tokenizer
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么你的下一个大型语言模型可能没有分词器
- en: 原文：[https://towardsdatascience.com/why-your-next-llm-might-not-have-a-tokenizer/](https://towardsdatascience.com/why-your-next-llm-might-not-have-a-tokenizer/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-your-next-llm-might-not-have-a-tokenizer/](https://towardsdatascience.com/why-your-next-llm-might-not-have-a-tokenizer/)
- en: <mdspan datatext="el1750792303041" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1750792303041" class="mdspan-comment">引言</mdspan>
- en: '[In my last article](https://towardsdatascience.com/can-ai-truly-develop-a-memory-that-adapts-like-ours/),
    we dove into Google’s Titans — a model that pushes the boundaries of long-context
    recall by introducing a dynamic memory module that adapts on the fly, kind of
    like how our own memory works.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '[在我的上一篇文章中](https://towardsdatascience.com/can-ai-truly-develop-a-memory-that-adapts-like-ours/)，我们深入探讨了谷歌的Titans——一个通过引入动态内存模块来推动长上下文回忆边界的模型，这个模块可以动态适应，有点像我们自己的记忆工作方式。'
- en: 'It’s a strange paradox. We have AI that can analyze a 10-million-word document,
    yet it still fumbles questions like: “How many ‘r’s are in the word *strawberry*?”'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个奇怪的悖论。我们有能够分析一百万字文档的AI，但它仍然会犯像：“单词*strawberry*中有多少个‘r’？”这样的错误。
- en: The problem isn’t the AI’s brain; it’s the eyes. The first step in how these
    models read, tokenization, essentially pre-processes language for them. In doing
    so, it strips away the rich, messy details of how letters form words; the whole
    world of sub-word information just vanishes.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 问题不在于AI的大脑；而是眼睛。这些模型阅读的第一步，即分词，本质上是为它们预处理语言。在这个过程中，它剥离了字母如何形成单词的丰富、混乱的细节；整个子词信息的世界就这样消失了。
- en: '* * *'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '1\. Lost in Tokenization: Where Subword Semantics Die'
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 分词中的迷失：子词语义消亡之处
- en: Language, for humans, begins as sound, spoken long before it is written. Yet
    it is through writing and spelling that we begin to grasp the compositional structure
    of language. Letters form syllables, syllables form words, and from there, we
    build conversations. This character-level understanding allows us to correct,
    interpret, and infer even when the text is noisy or ambiguous. In contrast, language
    models skip this phase entirely. They are never exposed to characters or raw text
    as-is; instead, their entire perception of language is mediated by a tokenizer.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 对人类来说，语言开始于声音，在书写之前就已经被说出。然而，正是通过书写和拼写，我们开始理解语言的组合结构。字母形成音节，音节形成单词，然后我们构建对话。这种字符级理解使我们能够在文本嘈杂或含糊不清的情况下进行纠正、解释和推断。相比之下，语言模型完全跳过了这一阶段。它们从未直接接触到字符或原始文本；相反，它们对语言的整个感知都是由分词器介导的。
- en: This tokenizer, ironically, is the only component in the entire pipeline that
    is not learned. It is dumb, fixed, and entirely based on heuristics, despite sitting
    at the entry point of a model designed to be deeply adaptive. In effect, tokenization
    sets the stage for learning, but without any learning of its own.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这个分词器，讽刺的是，在整个流程中是唯一一个没有学习到的组件。它是愚蠢的、固定的，完全基于启发式方法，尽管它位于一个旨在深度适应的模型的开头。实际上，分词为学习设定了舞台，但没有自己的学习。
- en: Moreover, tokenization is extremely brittle. A minor typo, say, “strawverry”
    instead of “strawberry”, can yield a completely different token sequence, despite
    the semantic intent remaining obvious to any human reader. This sensitivity, instead
    of being handled right then and there, is passed downstream, forcing the model
    to interpret a corrupted input. Worse still, optimal tokenizations are highly
    domain-dependent. A tokenizer trained on everyday English text may perform beautifully
    for natural language, but fail miserably when encountering source code, producing
    long and semantically awkward token chains for variable names like `user_id_to_name_map`
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，分词极其脆弱。一个小的错误，比如“strawverry”而不是“strawberry”，可以产生完全不同的标记序列，尽管对任何人类读者来说，语义意图仍然很明显。这种敏感性，而不是立即处理，被传递到下游，迫使模型解释一个损坏的输入。更糟糕的是，最优的分词高度依赖于领域。在普通英语文本上训练的分词器可能对自然语言表现良好，但在遇到源代码时可能会失败，为变量名如`user_id_to_name_map`产生长且语义上尴尬的标记链。
- en: Like the “Spinal Cord”, that is the language pipeline, the higher up it’s compromised,
    the more it cripples everything downstream. Sitting right at the top, a flawed
    tokenizer distorts input before the model even begins reasoning. No matter how
    smart the architecture is, it’s working with corrupted signals from the start.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 就像“脊髓”，即语言管道，它越是被破坏，对下游的影响就越大。位于最顶部，一个有缺陷的分词器在模型开始推理之前就扭曲了输入。无论架构多么智能，它都是从一开始就处理被破坏的信号。
- en: '![](../Images/f46f2db33b5da9bd3db3233958e0ea1a.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f46f2db33b5da9bd3db3233958e0ea1a.png)'
- en: '(Source: Author)'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: How a simple typo can possibly waste LLM’s “thinking power” to rectify it
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的拼写错误如何可能浪费 LLM 的“思考能力”来纠正它
- en: '* * *'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Behold! Byte Latent Transformer
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2\. 哇！Byte Latent Transformer
- en: 'If tokenization is the brittle foundation holding modern LLMs back, the natural
    question follows: why not eliminate it entirely? That’s precisely the radical
    direction taken by researchers at Meta AI with the Byte Latent Transformer (BLT)
    ([Pagnoni et al. 2024](https://arxiv.org/abs/2412.09871))¹. Rather than operating
    on words, subwords, or even characters, BLT models language from raw bytes — the
    most fundamental representation of digital text. This enables LLMs to learn the
    language from the very ground up, without the tokenizer being there to eat away
    at the subword semantics.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果分词是阻碍现代大型语言模型发展的脆弱基础，那么自然而然的问题是：为什么不完全消除它呢？这正是 Meta AI 研究人员采取的激进方向，他们提出了 Byte
    Latent Transformer (BLT) ([Pagnoni 等人 2024](https://arxiv.org/abs/2412.09871))¹。BLT
    模型不是在单词、子词甚至字符上操作，而是从原始字节——数字文本的最基本表示——来建模语言。这使得大型语言模型能够从头开始学习语言，而无需分词器来侵蚀子词语义。
- en: 'But modeling bytes directly is far from trivial. A naïve byte-level Transformer
    would choke on input lengths several times longer than tokenized text — one million
    words become nearly five million bytes (1 word = 4.7 characters on average, and
    1 character = 1 byte), making attention computation infeasible due to its quadratic
    scaling. BLT circumvents this by introducing a dynamic two-tiered system: easy-to-predict
    byte segments are compressed into latent “patches,” significantly shortening the
    sequence length. The full, high-capacity model is then selectively applied, focusing
    its computational resources only where linguistic complexity demands it.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 但直接建模字节远非易事。一个简单的字节级 Transformer 会因为输入长度比分词文本长几倍而无法处理——一百万个单词几乎变成了五百万个字节（平均每个单词
    = 4.7 个字符，每个字符 = 1 个字节），这使得由于二次扩展而无法进行注意力计算。BLT 通过引入一个动态的两层系统来规避这个问题：易于预测的字节段被压缩成潜在的“块”，显著缩短了序列长度。然后，全容量模型被选择性地应用，将计算资源集中在语言复杂度要求的地方。
- en: '![](../Images/87f16215f6578602f510e525e982a5b5.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/87f16215f6578602f510e525e982a5b5.png)'
- en: '(Source: Adapted from [Pagnoni et al. 2024](https://arxiv.org/abs/2412.09871),
    Figure 2)'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：改编自 [Pagnoni 等人 2024](https://arxiv.org/abs/2412.09871)，图 2)
- en: Zoomed-out view of the entire Byte Latent Former architecture
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 整个 Byte Latent Former 架构的缩略视图
- en: 2.1 How does it work?
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1 它是如何工作的？
- en: 'The model can be conceptually divided into three primary components, each with
    a distinct responsibility:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型可以从概念上分为三个主要组件，每个组件都有独特的职责：
- en: '2.1.1 The Local Encoder:'
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1.1 本地编码器：
- en: The primary function of the Local Encoder is to transform a long input sequence
    of **N[bytes]** of raw bytes, b = (b[1], b[2],…, b[N_bytes])into a much shorter
    sequence of **N[patches]** of latent patch representations, p = (p[1], p[2],…,
    p[N_patches]).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 本地编码器的主要功能是将一个长序列的原始字节 **N[bytes]**（b = (b[1], b[2],…, b[N_bytes]））转换成一个更短的序列，即
    **N[patches]** 的潜在块表示，p = (p[1], p[2],…, p[N_patches])。
- en: 'Step 1: Input Segmentation and Initial Byte Embedding'
  id: totrans-26
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤 1：输入分割和初始字节嵌入
- en: The input sequence is segmented into patches based on a pre-defined strategy,
    such as entropy-based patching. This provides patch boundary information but does
    not alter the input sequence itself. This patch boundary information will come
    in handy later.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 输入序列根据预定义的策略（如基于熵的分割）分割成块。这提供了块边界信息，但不会改变输入序列本身。这些块边界信息将在以后派上用场。
- en: '![](../Images/23caa3f03940a692c90cedc814015ce5.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/23caa3f03940a692c90cedc814015ce5.png)'
- en: '(Source: [Pagnoni et al. 2024](https://arxiv.org/abs/2412.09871), Figure 3)'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：[Pagnoni 等人 2024](https://arxiv.org/abs/2412.09871)，图 3)
- en: Different strategies for patching, visualized
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 不同补丁策略的可视化
- en: 'The first operation within the encoder is to map each discrete byte value (0-255)
    into a continuous vector representation. This is achieved via a learnable embedding
    matrix, **E[byte]** (shape: *[256, h[e]]*), where ***h[e]*** is the hidden dimension
    of the local module.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器内部的第一步操作是将每个离散的字节值（0-255）映射到一个连续的向量表示。这是通过一个可学习的嵌入矩阵 **E[byte]**（形状：*[256,
    h[e]]*）实现的，其中 ***h[e]*** 是局部模块的隐藏维度。
- en: '**Input:** A tensor of byte IDs of shape *[B, N[bytes]]*, where **B** is the
    batch size.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**输入**：形状为 *[B, N[bytes]]* 的字节 ID 张量，其中 **B** 是批大小。'
- en: '**Output:** A tensor of byte embeddings, **X** (shape: *[B, N[bytes], h[e]]*).'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出**：字节嵌入张量 **X**（形状：*[B, N[bytes], h[e]]*）。'
- en: 'Step 2: Contextual Augmentation via N-gram Hashing'
  id: totrans-34
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤2：通过n-gram哈希进行上下文增强
- en: To enrich each byte representation with local context beyond its individual
    identity, the researchers employ a hash-based n-gram embedding technique. For
    each byte ***b[i]*** at position* **i***, a set of preceding n-grams,* **g[i,n]
    = {b[i-n+1],…, b[i]}*** are constructed for multiple values of ***n*** **∈ *{3,…,8}***.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 为了丰富每个字表示的局部上下文，研究人员采用了一种基于哈希的n-gram嵌入技术。对于位置* **i***上的每个字 ***b[i]***，构建了一组前缀n-gram，* **g[i,n]
    = {b[i-n+1],…, b[i]}***，其中 ***n*** **∈ *{3,…,8}***。
- en: 'These n-grams are mapped via a hash function to indices within a second, separate
    embedding table, **E[hash]** (shape: *[V[hash], h[e]]*), where *V[hash]* is a
    fixed, large vocabulary size (i.e., the number of hash buckets).'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这些n-gram通过哈希函数映射到第二个独立的嵌入表中的索引， **E[hash]** (形状：*[V[hash], h[e]]*), 其中 *V[hash]*
    是一个固定的大词汇量（即哈希桶的数量）。
- en: 'The resulting n-gram embeddings are summed with the original byte embedding
    to produce an augmented representation, ***e[i]***. This operation is defined
    as:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 结果n-gram嵌入与原始字嵌入相加以产生增强表示， ***e[i]***。此操作定义为：
- en: '![](../Images/9ac0ab8bf8488d5c6e2fcbe137335d76.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9ac0ab8bf8488d5c6e2fcbe137335d76.png)'
- en: '(Source: Author)'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: 'Explanation: Look up the hash of the n-gram in the embedding table and add
    it to the respective byte embedding, for all n ∈ [3,8]'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 说明：在嵌入表中查找n-gram的哈希值并将其添加到相应的字嵌入中，对于所有n ∈ [3,8]。
- en: where ***x[i]*** is the initial embedding for byte ***b[i]***.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 ***x[i]*** 是字 ***b[i]*** 的初始嵌入。
- en: The shape of the tensor ***E = {e[1], e[2],…,e[N_bytes]}*** remains *[B, N[bytes],
    h[e]]*.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 张量 ***E = {e[1], e[2],…,e[N_bytes]}*** 的形状保持为 *[B, N[bytes], h[e]]*。
- en: 'Step 3: Iterative Refinement with Transformer and Cross-Attention Layers'
  id: totrans-43
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤3：使用Transformer和交叉注意力层的迭代细化
- en: The core of the Local Encoder consists of a stack of ***l[e]*** identical layers.
    Each layer performs a two-stage process to refine byte representations and distill
    them into patch representations.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 局部编码器的核心是由 ***l[e]*** 个相同的层堆叠而成。每个层执行一个两阶段过程来细化字表示并将它们蒸馏成补丁表示。
- en: '**Step 3a: Local Self-Attention:**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤3a：局部自注意力**：'
- en: The input is processed by a standard Transformer block. This block uses a causal
    self-attention mechanism with a limited attention window, meaning each byte representation
    is updated by attending only to a fixed number of preceding byte representations.
    This ensures computational efficiency while still allowing for contextual refinement.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 输入通过一个标准的Transformer块进行处理。此块使用具有有限注意力窗口的因果自注意力机制，这意味着每个字表示仅通过关注固定数量的先前字表示来更新。这确保了计算效率，同时仍然允许进行上下文细化。
- en: '**Input:** If it’s the first layer, the input is the context-augmented byte
    embedding ***E***; otherwise, it receives the output from the previous local Self-Attention
    layer.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**输入**：如果是第一层，输入是经过上下文增强的字嵌入 ***E***；否则，它接收来自前一个局部自注意力层的输出。'
- en: '![](../Images/c9dfcca878608830291343da7fcc382a.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c9dfcca878608830291343da7fcc382a.png)'
- en: '(Source: Author)'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: '***H[l]***: Input for the current Self-Attention layer'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '***H[l]***：当前自注意力层的输入'
- en: '**E**: Context-Augmented Byte Embedding from Step 2'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**E**：第二步的上下文增强字嵌入'
- en: '**H^‘[l-1]**: Output from the previous Self-Attention layer'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**H^‘[l-1]**：前一个自注意力层的输出'
- en: '**Output:** More contextually aware byte-representations, **H^‘[l]** (shape:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出**：更具有上下文意识的字表示，**H^‘[l]** (形状：'
- en: '*[B, N[bytes], h[e]]*)'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '*[B, N[bytes], h[e]]*)'
- en: '**Step 3b: Multi-Headed Cross-Attention:**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤3b：多头交叉注意力**：'
- en: The purpose of the Cross-Attention is to distill the fine-grained, contextual
    information captured in the byte representations and inject it into the more abstract
    patch representations, giving them a rich awareness of their constituent sub-word
    structures. This is achieved through a cross-attention mechanism where patches
    “query” the bytes they contain.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉注意力的目的是从字表示中提取精细的、上下文信息并将其注入到更抽象的补丁表示中，使它们对其构成子词结构有丰富的认识。这是通过补丁“查询”它们所包含的字来实现交叉注意力机制的。
- en: '**Queries (Q):** The patch embeddings are projected using a simple linear layer
    to form the queries.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**查询 (Q)**：使用简单的线性层将补丁嵌入投影以形成查询。'
- en: For any subsequent layer (*l>*0), the patch embeddings are simply the refined
    patch representations output by the cross-attention block of the previous layer, ***P[(l−1)]***.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 对于任何后续层 (*l>*0)，补丁嵌入仅仅是前一层交叉注意力块输出的精细化的补丁表示， ***P[(l−1)]***。
- en: 'However, for the very first layer (*l*=0), these patch embeddings must be created
    from scratch. This initialization is a three-step process:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于第一层（*l*=0），这些补丁嵌入必须从头开始创建。这个初始化是一个三步过程：
- en: '**Gathering:** Using the patch boundary information obtained in **Step 1**,
    the model gathers the byte representations from H[0] that belong to each patch.
    For a single patch, this results in a tensor of shape* (N[bytes_per_patch], h[e])*.
    After padding each patch representation to be of the same length, if there are
    ***J*** patches, the shape of the entire concatenated tensor becomes:'
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**收集：**使用在**步骤1**中获得的补丁边界信息，模型从H[0]收集属于每个补丁的字节表示。对于单个补丁，这会导致一个形状为* (N[bytes_per_patch],
    h[e]*)*的张量。在将每个补丁表示填充到相同长度后，如果有***J***个补丁，整个连接张量的形状变为：'
- en: '*(B, J, N[bytes_per_patch], h[e])*.'
  id: totrans-61
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*(B, J, N[bytes_per_patch], h[e]*)*.'
- en: '**Pooling:** To summarize the vector for each patch, a pooling operation (e.g.,
    max-pooling) is applied across the *N[bytes_per_patch]* dimension. This effectively
    summarizes the most salient byte-level features within the patch.'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**池化：**为了汇总每个补丁的向量，在*N[bytes_per_patch]*维度上应用池化操作（例如，最大池化）。这有效地汇总了补丁中最显著的字节级特征。'
- en: Input Shape: *(B, J, N[bytes_per_patch], h[e])*
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入形状： *(B, J, N[bytes_per_patch], h[e]*)*
- en: Output Shape: *(B, J, h[e])*
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出形状： *(B, J, h[e]*)*
- en: '**Projection:** This summarized patch vector, still in the small local dimension *h[e]*
    is then passed through a dedicated linear layer to the global dimension, h[g],
    where h[e] <<< h[g]. This projection is what bridges the local and global modules.'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**投影：**这个汇总的补丁向量，仍然在小局部维度*h[e]*，然后通过一个专门的线性层传递到全局维度，h[g]，其中 h[e] <<< h[g]。这个投影就是连接局部和全局模块的桥梁。'
- en: 'Input Shape: *(B, J, h[e])*'
  id: totrans-66
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入形状：*(B, J, h[e]*)*
- en: 'Output Shape: *(B, J, h[g])*'
  id: totrans-67
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出形状：*(B, J, h[g]*)*
- en: '![](../Images/0a9ae478c018bac02bb42d39b99d6697.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0a9ae478c018bac02bb42d39b99d6697.png)'
- en: '(Source: Author)'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: 'Summary of the 3-step process to get the first patch embeddings:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 获取第一层补丁嵌入的3步过程总结：
- en: 1\. Gathering and pooling the bytes for each respective patch.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 收集和汇总每个补丁的字节。
- en: 2\. Concatenating the patches to a single tensor.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 将补丁连接成一个单一的张量。
- en: 3\. Projection of the patch embedding tensor to the global dimension.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 将补丁嵌入张量投影到全局维度。
- en: The patch representations, obtained either from the previous cross-attention
    block’s output or initialized from scratch, are then fed into a linear projection
    layer to form queries.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 补丁表示，无论是从上一个交叉注意力块的输出获得还是从头开始初始化，然后被输入到一个线性投影层以形成查询。
- en: 'Input Shape: *(B, J, h[g])*'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入形状：*(B, J, h[g]*)*
- en: 'Output Shape: *(B, J, d[a])*, where *d[a]* is the “attention dimension”.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出形状：*(B, J, d[a]*)，其中*d[a]*是“注意力维度”。
- en: '**Keys and Values:** These are derived from the byte representations *H[l]* from
    **Step 3a**. They are projected from dimension *h[e]*​ to an intermediate attention
    dimension *d[a]*, via independent linear layers:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**键和值：**这些是从**步骤3a**的字节表示*H[l]*中派生出来的。它们通过独立的线性层从维度*h[e]*投影到一个中间注意力维度*d[a]*：'
- en: '![](../Images/92a63dbd4c251a757850e9a4cf262c44.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/92a63dbd4c251a757850e9a4cf262c44.png)'
- en: '(Source: Author)'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: Projection of the Self-Attention output from Step 3a to Keys and Values.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 将第3a步的自注意力输出投影到键和值。
- en: '![](../Images/122b3ec27fefbfd4e0d5a5dd9d21b4bb.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/122b3ec27fefbfd4e0d5a5dd9d21b4bb.png)'
- en: '(Source: Author)'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: Overview of the Information flow in the Local Encoder
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 局部编码器中信息流的概述
- en: 2.1.2 The Latent Global Transformer
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1.2 潜在全局变换器
- en: The sequence of patch representations generated by the Local Encoder is passed
    to the **Latent Global Transformer**. This module serves as the primary reasoning
    engine of the BLT model. It is a standard, high-capacity autoregressive Transformer
    composed of *l[g]* self-attention layers, where *l[g]* is significantly larger
    than the number of layers in the local modules.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 由局部编码器生成的补丁表示序列传递到**潜在全局变换器**。该模块作为BLT模型的主要推理引擎。它是一个标准的、高容量的自回归变换器，由*l[g]*个自注意力层组成，其中*l[g]*远大于局部模块中的层数。
- en: 'Operating on patch vectors (shape: *[B, J, h[g]]*), this transformer performs
    full self-attention across all patches, enabling it to model complex, long-range
    dependencies efficiently. Its sole function is to predict the representation of
    the next patch, *o[j]* (shape: *[B, 1, h[g]]*), in the sequence based on all preceding
    ones. The output is a sequence of predicted patch vectors, *O[j]* (shape: *[B,
    J, h[g]]*), which encode the model’s high-level predictions.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在补丁向量（形状：*[B, J, h[g]]*）上操作，这个 Transformer 在所有补丁上执行全自注意力，使其能够有效地建模复杂的长距离依赖关系。它的唯一功能是根据所有前面的补丁预测下一个补丁的表示
    *o[j]*（形状：*[B, 1, h[g]]*），在序列中。输出是一系列预测的补丁向量 *O[j]*（形状：*[B, J, h[g]]*），这些向量编码了模型的高级预测。
- en: '![](../Images/67ae330d7b81d9654d2bd55d6bc523ad.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/67ae330d7b81d9654d2bd55d6bc523ad.png)'
- en: '(Source: Author)'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: '***o[j]*** is the patch that contains the information for the next prediction'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '***o[j]*** 是包含下一个预测信息的补丁。'
- en: 2.1.3 The Local Decoder
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1.3 局部解码器
- en: The final architectural component is the *Local Decoder*, a lightweight Transformer
    that decodes the predicted patch vector, *o[j]*, the last token from the global
    model’s output, *O[j]*​, back into a sequence of raw bytes. It operates autoregressively,
    generating one byte at a time.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 最终的架构组件是 *局部解码器*，这是一个轻量级的 Transformer，它将预测的补丁向量 *o[j]*，全局模型输出的最后一个标记 *O[j]*，解码回一系列原始字节。它以自回归的方式操作，一次生成一个字节。
- en: The generation process, designed to be the inverse of the encoder, starts with
    the hidden state of the last byte in the encoder’s output, *H[l]*. Then, for each
    subsequent byte generated by the decoder (*d’[k]*), in a typical autoregressive
    manner, it uses the predicted byte’s hidden state as the input to guide the generation.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 设计为编码器逆过程的生成过程，从编码器输出的最后一个字节隐藏状态 *H[l]* 开始。然后，对于解码器生成的每个后续字节 (*d’[k]*)，以典型的自回归方式，它使用预测字节的隐藏状态作为输入来引导生成。
- en: '**Cross-Attention:** The last byte’s state of the encoder’s output *H[l]*[:,-1,:]
    (acting as query, with shape: *[B, 1, h[e]]*) attends to the target patch vector
    o[j] (acting as Key and Value). This step injects the high-level semantic instruction
    from the patch concept into the byte stream.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**交叉注意力**：编码器输出的最后一个字节状态 *H[l]*[:,-1,:]（作为查询，形状：*[B, 1, h[e]]*）关注目标补丁向量 o[j]（作为键和值）。这一步将补丁概念的高级语义指令注入到字节流中。'
- en: The query vectors are projected to an attention dimension, *d[a]*, while the
    patch vector is projected to create the key and value. This alignment ensures
    the generated bytes are contextually relevant to the global prediction.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 查询向量被投影到一个注意力维度，*d[a]*，而补丁向量被投影以创建键和值。这种对齐确保生成的字节在全局预测的上下文中是相关的。
- en: '![](../Images/e4fca063faf554a9caf9ec3a10b99b5a.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e4fca063faf554a9caf9ec3a10b99b5a.png)'
- en: '(Source: Author)'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: The general equations, which encapsulate what Query, Key, and Value are.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 包含查询、键和值的一般方程。
- en: '***d’[k]***: The k+1^(th) predicted byte’s hidden state from the decoder.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '***d’[k]***：解码器中 k+1^(th) 预测字节的隐藏状态。'
- en: '**Local Self-Attention:** The resulting patch-aware byte representations are
    then processed by a causal self-attention mechanism. This allows the model to
    consider the sequence of bytes already generated within the current patch, enforcing
    local sequential coherence and correct character ordering.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**局部自注意力**：然后，通过因果自注意力机制处理生成的补丁感知字节表示。这允许模型考虑当前补丁中已生成的字节序列，强制执行局部顺序一致性和正确的字符顺序。'
- en: After passing through all ***l[d]*** layers, each including the above two stages,
    the hidden state of the last byte in the sequence is projected by a final linear
    layer to a 256-dimensional logit vector. A softmax function converts these logits
    into a probability distribution over the byte vocabulary, from which the next
    byte is sampled. This new byte is then embedded and appended to the input sequence
    for the subsequent generation step, continuing until the patch is fully decoded.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在通过所有 ***l[d]*** 层后，每层都包括上述两个阶段，序列中最后一个字节的隐藏状态通过一个最终的线性层投影到一个 256 维的 logit 向量。softmax
    函数将这些 logits 转换为字节词汇表上的概率分布，从其中采样下一个字节。然后，这个新字节被嵌入并附加到输入序列中，以便进行后续的生成步骤，直到补丁完全解码。
- en: '![](../Images/2f41d0924c467e5c7855ee524f477ff6.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2f41d0924c467e5c7855ee524f477ff6.png)'
- en: '(Source: Author)'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: Overview of the Information flow in Local Decoder
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 局部解码器信息流概述
- en: '* * *'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: '3\. The Verdict: Bytes Are Better Than Tokens!'
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 结论：字节比标记更好！
- en: 'Byte Latent Transformer could genuinely be an alternative to the regular vanilla
    Tokenization-based Transformers at scale. Here are a few convincing reasons for
    that argument:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 字节潜在变换器（Byte Latent Transformer）可能真正是规模上常规的基于标记的Transformer的替代品。以下是支持这一论点的几个令人信服的理由：
- en: '**1\. Byte-Level Models Can Match The Ones Based On Tokens.**'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 字节级模型可以与基于标记的模型相匹配。**'
- en: One of the main contributions of this work is that byte-level models, for the
    first time, can match the scaling behavior of state-of-the-art token-based architectures
    such as LLaMA 3 [(Grattafiori et al. 2024)²](https://arxiv.org/abs/2407.21783).
    When trained under compute-optimal regimes, the Byte Latent Transformer (BLT)
    exhibits performance scaling trends comparable to those of models using byte pair
    encoding (BPE). This finding challenges the long-standing assumption that byte-level
    processing is inherently inefficient, showing instead that with the right architectural
    design, tokenizer-free models also have a shot.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 本工作的主要贡献之一是，字节级模型，首次，能够匹配最先进的基于标记的架构（如LLaMA 3）的扩展行为[(Grattafiori等人2024)²](https://arxiv.org/abs/2407.21783)。当在计算最优的条件下进行训练时，字节潜在变换器（BLT）表现出与使用字节对编码（BPE）的模型相当的性能扩展趋势。这一发现挑战了长期存在的假设，即字节级处理本质上是不高效的，反而表明，通过正确的架构设计，无标记器模型也有机会。
- en: '![](../Images/05f94bd424a30ab199f7028dc570af8d.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/05f94bd424a30ab199f7028dc570af8d.png)'
- en: '(Source: Adapted from [Pagnoni et al. 2024](https://arxiv.org/abs/2412.09871),
    Figure 6)'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：改编自[Pagnoni等人2024](https://arxiv.org/abs/2412.09871)，图6）
- en: BLT showing competitive BPB (perplexity equivalent for byte models) and similar
    scaling laws to those of the tokenizer-based LLaMA models
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: BLT在展示具有竞争力的BPB（字节模型的困惑度等效）和与基于标记的LLaMA模型相似的扩展规律
- en: '**2\. A New Scaling Dimension: Trading Patch Size for Model Size.**'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 新的扩展维度：以模型大小换取补丁大小。**'
- en: 'The BLT architecture decouples model size from sequence length in a way that
    token-based models cannot. By dynamically grouping bytes into patches, BLT can
    use longer average patches to save on compute. This saved compute can be reallocated
    to increase the size and capacity of the main Latent Global Transformer while
    keeping the total inference cost (FLOPs) constant. The paper shows this new trade-off
    is highly beneficial: larger models operating on longer patches consistently outperform
    smaller models operating on shorter tokens/patches for a fixed inference budget.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: BLT架构以基于标记的模型无法实现的方式将模型大小与序列长度解耦。通过动态地将字节分组到补丁中，BLT可以使用更长的平均补丁来节省计算。这些节省的计算可以重新分配以增加主要潜在全局变换器的大小和容量，同时保持总推理成本（FLOPs）不变。论文表明，这种新的权衡非常有益：在固定推理预算下，操作于较长补丁的大模型始终优于操作于较短标记/补丁的小模型。
- en: This means you can have a larger and more capable model — at no extra compute
    cost!
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你可以拥有更大、更强大的模型——而无需额外的计算成本！
- en: '![](../Images/38a43fed8ec355fab51bf3e8b22fa1bc.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/38a43fed8ec355fab51bf3e8b22fa1bc.png)'
- en: '(Source: Adapted from [Pagnoni et al. 2024](https://arxiv.org/abs/2412.09871),
    Figure 1)'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：改编自[Pagnoni等人2024](https://arxiv.org/abs/2412.09871)，图1）
- en: The steeper scaling curves of the larger BLT models allow them to surpass the
    performance of the token-based Llama models after the crossover point.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 较大BLT模型的更陡峭的扩展曲线使它们在交叉点之后超越了基于标记的Llama模型的性能。
- en: '**3\. Subword Awareness Through Byte-Level Modeling**'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 通过字节级建模实现子词意识**'
- en: By processing raw bytes directly, BLT avoids the information loss typically
    introduced by tokenization, gaining access to the internal structure of words
    — their spelling, morphology, and character-level composition. This results in
    a heightened sensitivity to subword patterns, which the model demonstrates across
    several benchmarks.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 通过直接处理原始字节，BLT避免了由分词引入的信息损失，从而能够访问单词的内部结构——它们的拼写、形态学和字符级组成。这导致对子词模式的高度敏感性，这在多个基准测试中得到了模型的展示。
- en: On **CUTE** (Character-level Understanding and Text Evaluation) [(Edman et al.,
    2024)³](https://arxiv.org/abs/2409.15452), BLT excels at tasks involving fine-grained
    edits like character swaps or substitutions, achieving near-perfect accuracy on
    spelling tasks where models like LLaMA 3 fail entirely.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在**CUTE**（字符级理解和文本评估）[(Edman等人，2024)³](https://arxiv.org/abs/2409.15452)上，BLT在涉及细粒度编辑的任务上表现出色，如字符交换或替换，在拼写任务上几乎达到完美准确率，而像LLaMA
    3这样的模型则完全失败。
- en: Similarly, on noised **HellaSwag** [(Zellers et al, 2019)⁴](https://arxiv.org/abs/1905.07830),
    where inputs are perturbed with typos and case variations, BLT retains its reasoning
    ability far more effectively than token-based models. These results are indicative
    of BLT’s inherent robustness, which Token-based models can’t gain even with significantly
    more data.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，在添加了拼写错误和大小写变化的噪声 **HellaSwag** [(Zellers et al, 2019)⁴](https://arxiv.org/abs/1905.07830)
    上，BLT 在保留推理能力方面比基于标记的模型更有效得多。这些结果表明 BLT 的固有鲁棒性，即使数据量显著增加，基于标记的模型也无法获得。
- en: '![](../Images/8479951c0c9063ab0484f9c20669bed0.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8479951c0c9063ab0484f9c20669bed0.png)'
- en: '(Source: [Pagnoni et al. 2024](https://arxiv.org/abs/2412.09871), Table 3)'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：[Pagnoni et al. 2024](https://arxiv.org/abs/2412.09871)，表 3)
- en: The model’s direct byte-level processing leads to massive gains on character
    manipulation **(CUTE)** and noise robustness **(HellaSwag Noise Avg.)**, tasks
    that challenge token-based architectures.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的直接字节级处理导致在字符操作 **(CUTE)** 和噪声鲁棒性 **(HellaSwag Noise Avg.)** 方面取得了巨大进步，这些任务对基于标记的架构构成了挑战。
- en: '**4\. BLT Shows Stronger Performance on Low-Resource Languages.**'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. BLT 在低资源语言上表现出更强的性能。**'
- en: Fixed tokenizers, often trained on a majority of English or high-resource language
    data, can be inefficient and inequitable for low-resource languages, often breaking
    words down into individual bytes (a phenomenon known as “byte-fallback”). Because
    BLT is inherently byte-based, it treats all languages equally from the start.
    The results show this leads to improved performance in machine translation, particularly
    for languages with scripts and morphologies that are poorly represented in standard
    BPE vocabularies.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 固定标记器，通常在大多数英语或高资源语言数据上训练，对于低资源语言可能效率低下且不公平，通常将单词分解成单个字节（称为“字节回退”现象）。由于 BLT
    本质上是基于字节的，它从一开始就平等地对待所有语言。结果显示，这导致机器翻译性能得到改善，尤其是在标准 BPE 词汇表中表现不佳的脚本和形态学语言中。
- en: '![](../Images/3d1cbf1a67929397cfd4a66d6a7bea76.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3d1cbf1a67929397cfd4a66d6a7bea76.png)'
- en: '(Source: [Pagnoni et al. 2024](https://arxiv.org/abs/2412.09871), Table 4)'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：[Pagnoni et al. 2024](https://arxiv.org/abs/2412.09871)，表 4)
- en: Machine translation performance on the FLORES-101 benchmark [(Goyal et al.,
    2022)⁵](https://direct.mit.edu/tacl/article/doi/10.1162/tacl_a_00474/110993/The-Flores-101-Evaluation-Benchmark-for-Low).
    Comparable performance on high-resource languages, but superior for low-resource
    languages, outperforming the LLaMA 3 model.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在 FLORES-101 基准测试上的机器翻译性能 [(Goyal et al., 2022)⁵](https://direct.mit.edu/tacl/article/doi/10.1162/tacl_a_00474/110993/The-Flores-101-Evaluation-Benchmark-for-Low)。在高资源语言上的性能相当，但在低资源语言上表现更优，优于
    LLaMA 3 模型。
- en: '**5\. Dynamic Allocation Of Compute: Not Every Word Is Equally Deserving**'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**5. 计算资源的动态分配：并非每个单词都值得同等对待**'
- en: A key strength of the BLT architecture lies in its ability to dynamically allocate
    computation based on input complexity. Unlike traditional models that expend a
    fixed amount of compute per token—treating simple words like “the” and complex
    ones like “antidisestablishmentarianism” with equal cost—BLT ties its computational
    effort to the structure of its learned patches. The high-capacity Global Transformer
    works only for patches, allowing BLT to form longer patches over predictable,
    low-complexity sequences and shorter patches over regions requiring deeper reasoning.
    This enables the model to focus its most powerful components where they’re needed
    most, while offloading routine byte-level decoding to a lighter, local decoder,
    yielding a far more efficient and adaptive allocation of resources.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: BLT 架构的关键优势在于其根据输入复杂度动态分配计算的能力。与传统的模型不同，传统的模型对每个标记消耗固定数量的计算量——将简单单词如“the”和复杂单词如“antidisestablishmentarianism”视为同等成本——BLT
    将其计算努力与其学习补丁的结构相关联。高容量的全局 Transformer 只适用于补丁，这使得 BLT 能够在可预测的低复杂度序列上形成更长的补丁，在需要更深层推理的区域形成更短的补丁。这使得模型能够将其最强大的组件集中在最需要的地方，同时将常规的字节级解码卸载到更轻的本地解码器，从而实现资源分配的更高效和适应性。
- en: '* * *'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4\. Final Thoughts And Conclusion
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 总结与结论
- en: For me, what makes BLT exciting isn’t just the benchmarks or the novelties,
    it’s the idea that a model can move beyond the superficial wrappers we call “languages”
    — English, Japanese, even Python — and start learning directly from the raw bytes,
    the fundamental substrate of all communication. I love that. A model that doesn’t
    rely on a fixed vocabulary, but instead learns structure from the ground up? That
    feels like a real step toward something more universal.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，BLT（字节语言技术）之所以令人兴奋，不仅仅是因为基准测试或新颖之处，更在于一个模型能够超越我们称之为“语言”的表面包装——英语、日语，甚至是
    Python ——并直接从所有通信的基本基础——原始字节——中学习。我喜欢这一点。一个不依赖于固定词汇，而是从底层学习结构的模型？这感觉像是朝着更普遍的方向迈出的真正一步。
- en: Of course, something this different won’t be embraced with open arms, overnight.
    Tokenizers have become baked into everything — our models, our tools, our intuition.
    Ditching them means rethinking the very foundational block of the entire AI ecosystem.
    But the upside here is hard to ignore. Maybe instead of the complete architecture,
    we would see some of its features being integrated into the new systems we see
    in the future.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这样不同寻常的事物不可能一夜之间被广泛接受。分词器已经融入了方方面面——我们的模型、我们的工具、我们的直觉。摒弃它们意味着重新思考整个 AI 生态系统的根本基础。但这里的优势是难以忽视的。也许，我们不会看到完整的架构，而是会看到其中的一些特性被整合到我们未来看到的新的系统中。
- en: '* * *'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
