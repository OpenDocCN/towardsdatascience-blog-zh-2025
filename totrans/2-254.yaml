- en: User Authorisation in Streamlit With OIDC and Google
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/user-authorisation-in-streamlit-with-oidc-and-google/](https://towardsdatascience.com/user-authorisation-in-streamlit-with-oidc-and-google/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1749671432908" class="mdspan-comment">With the flurry</mdspan>
    of activity in the AI world over the last few weeks, a recent important announcement
    by Streamlit that it now supports OpenID Connect (OIDC) login authentication almost
    passed me by.
  prefs: []
  type: TYPE_NORMAL
- en: User authorisation and verification can be a crucial consideration for data
    scientists, machine learning engineers, and others involved in creating dashboards,
    machine learning proofs of concept (PoCs), and other applications. Keeping potentially
    sensitive data private is paramount, so you want to ensure that only authorised
    users can access your app.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we’ll discuss this new feature of Streamlit and develop a simple
    app to showcase it. Our app might be simple, but it demonstrates all the key things
    you need to know when creating more complex software.
  prefs: []
  type: TYPE_NORMAL
- en: What is Streamlit?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’ve never heard of Streamlit, it’s an open-source Python library designed
    to build and deploy interactive web applications with minimal code quickly. It
    is widely used for data visualisation, machine learning model deployment, dashboards,
    and internal tools. With Streamlit, developers can create web apps using Python
    without frontend experience in HTML, CSS, or JavaScript.
  prefs: []
  type: TYPE_NORMAL
- en: Its key features include widgets for user input, built-in caching for performance
    optimisation, and easy integration with data science libraries like Pandas, Matplotlib,
    and TensorFlow. Streamlit is particularly popular among data scientists and AI/ML
    practitioners for sharing insights and models in a web-based interface.
  prefs: []
  type: TYPE_NORMAL
- en: If you’d like to learn more about Streamlit, I’ve written a TDS article on using
    it to create a data dashboard, which you can access using [this link](https://towardsdatascience.com/building-a-data-dashboard-9441db646697/).
  prefs: []
  type: TYPE_NORMAL
- en: What is OIDC?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: OpenID Connect (OIDC) is an authentication protocol that builds upon OAuth 2.0\.
    It allows users to securely sign in to applications using their existing credentials
    from identity providers like Google, Microsoft, Okta, and Auth0.
  prefs: []
  type: TYPE_NORMAL
- en: It enables single sign-on (SSO) and provides user identity information via ID
    tokens, including email addresses and profile details. Unlike OAuth, which focuses
    on authorisation, OIDC is designed explicitly for authentication, making it a
    standard for secure, scalable, and user-friendly login experiences across web
    and mobile applications.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll show you how to set things up and write code for a Streamlit
    app that uses OIDC to prompt for your Google email and password. You can use those
    details to log in to the app and access a second screen that contains an example
    of a data dashboard.
  prefs: []
  type: TYPE_NORMAL
- en: Prerequisites
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As this article focuses on using Google as an identity provider, if you don’t
    already have one, you’ll need a Google email address and a Google Cloud account.
    Once you have your email, sign in to Google Cloud with it using the link below.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://console.cloud.google.com](https://console.cloud.google.com)'
  prefs: []
  type: TYPE_NORMAL
- en: If you’re worried about the expense of signing up for Google Cloud, don’t be.
    They offer a free 90-day trial and $300 worth of credits. You only pay for what
    you use, and you can cancel your Cloud account subscription at any time, before
    or after your free trial expires. Regardless, what we’ll be doing here should
    incur no cost. However, I always recommend setting up billing alerts for any cloud
    provider you sign up for — just in case.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll return to what you must do to set up your cloud account later.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up our dev environment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’m developing using WSL2 Ubuntu Linux on Windows, but the following should
    also work on regular Windows. Before starting a project like this, I always create
    a separate Python development environment where I can install any software needed
    and experiment with coding. Now, anything I do in this environment will be siloed
    and won’t impact my other projects.
  prefs: []
  type: TYPE_NORMAL
- en: I use Miniconda for this, but you can use any method that suits you best. If
    you want to follow the Miniconda route and don’t already have it, you must first
    install Miniconda.
  prefs: []
  type: TYPE_NORMAL
- en: Now, you can set up your environment like this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: What we’ll build
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This will be a streamlit app. Initially, there will be a screen which displays
    the following text,
  prefs: []
  type: TYPE_NORMAL
- en: An example Streamlit app showing the use of OIDC and Google email for login
    authentication
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Please use the button on the sidebar to log in.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: On the left sidebar, there will be two buttons. One says **Login,** and the
    other says **Dashboard**.
  prefs: []
  type: TYPE_NORMAL
- en: If a user is not logged in, the Dashboard button will be greyed out and unavailable
    for use. When the user presses the Login button, a screen will be displayed asking
    the user to log in via Google. Once logged in, two things happen:-
  prefs: []
  type: TYPE_NORMAL
- en: The **Login** button on the sidebar changes to **Logout.**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Dashboard** button becomes available to use. This will display some dummy
    data and graphs for now.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If a logged-in user clicks the **Logout** button, the app resets itself to its
    initial state.
  prefs: []
  type: TYPE_NORMAL
- en: NB. I have deployed a working version of my app to the Streamlit community cloud.
    For a sneak preview, click the link below. You may need to “wake up” the app first
    if no one has clicked on it for a while, but this only takes a few seconds.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[https://oidc-example.streamlit.app](https://oidc-example.streamlit.app)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Set up on Google Cloud
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To enable email verification using your Google Gmail account, there are a few
    things you have to do first on the Google Cloud. They’re pretty straightforward,
    so take your time and follow each step carefully. I’m assuming you’ve already
    set up or have a Google email and cloud account, and that you’ll be creating a
    new project for your work.
  prefs: []
  type: TYPE_NORMAL
- en: Go to [Google Cloud Console](https://console.cloud.google.com) and log in. You
    should see a screen similar to the one shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c651be9e763d0da2ff95f3fa5c9d3903.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: You need to set up a project first. Click the **Project Picker** button. It’s
    immediately to the right of the Google Cloud logo, near the top left of the screen
    and will be labelled with the name of one of your existing projects or “**Select
    a project**” if you don’t have an existing project. In the pop-up that appears,
    click the **New Project** button located at the top right. This will let you insert
    a project name. Next, click on the **Create** button.
  prefs: []
  type: TYPE_NORMAL
- en: Once that’s done, your new project name will be displayed next to the Google
    Cloud logo at the top of the screen. Next, click on the hamburger-style menu at
    the top left of the page.
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to **APIs & Services → Credentials**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Click **Create Credentials → OAuth Client ID**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Select **Web application**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add **http://localhost:8501/oauth2callback** as an **Authorized Redirect URI**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take note of the **Client ID** and **Client Secret** as we’ll need them in a
    bit.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Local setup and Python code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Decide which local folder your main Python Streamlit app file will live in.
    In there, create a file, such as app.py, and insert the following Python code
    into it.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'This script builds a two-page Streamlit app with Google (or OIDC) login and
    a simple dashboard:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Page setup & state**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Configures the browser tab (title/icon/layout).
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Uses `st.session_state["page"]` to remember whether you’re on the “main” screen
    or the “dashboard.”
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Auth helpers**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`_user_obj()` safely grab the `st.user` object if it exists.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`user_is_logged_in()` and `user_name()`. Check whether you’ve logged in and
    get your name (or default to “Guest”).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Main vs. Dashboard pages**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Main**: If you’re not logged in, display a title/subheader prompting you
    to log in; if you’re logged in, display a congratulatory message and direct you
    to the dashboard.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dashboard**: greets you by name, generates a dummy DataFrame of monthly sales/profit,
    displays it, and renders a line chart for Sales plus a bar chart for Profit.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sidebar navigation**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Shows a Login or Logout button depending on your status (calling `st.login("google")`
    or `st.logout()`).
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Shows a “Dashboard” button that’s only enabled once you’re logged in.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Page dispatch**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: At the bottom, it checks `st.session_state.page` and runs either `main()` or
    `dashboard()` accordingly.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Configuring Your `secrets.toml` for Google OAuth Authentication
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the same folder where your app.py file lives, create a subfolder called **.streamlit**.
    Now go into this new subfolder and create a file called **secrets.toml**. The
    **Client ID** and **Client Secret** from Google Cloud should be added to that
    file, along with a redirect URI and cookie secret. Your file should look something
    like this,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Okay, we should now be able to run our app. To do that, go back to the folder
    where app.py lives and type this into the command line.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: If all has gone well with your code and set-up, you should see the following
    screen.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ecce5f7644d34b1b3870e731739bc0cc.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Notice that the Dashboard button on the sidebar should be greyed out because
    you’re not logged in yet. Start by clicking the Login button on the sidebar. You
    should see the screen below (I’ve obscured my credentials for security reasons),
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7dbfa31e934237d610fe23ca222358ba.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Once you choose an account and log in, the Streamlit app display will change
    to this.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/de7a48b01583b3240e4c44da95bea407.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: You will also notice that the Dashboard button is now clickable, and when you
    click it, you should see a screen like this.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/50aa5c609140a05ef262dfecd83bc40c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Finally, log back out, and the app should return to its initial state.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I explained that proper OIDC authorisation is now available
    to Streamlit users. This allows you to ensure that anyone using your app is a
    legitimate user. In addition to Google, you can also use popular providers such
    as Microsoft, OAuth, Okta, and others.
  prefs: []
  type: TYPE_NORMAL
- en: I explained what Streamlit was and its uses, and briefly described the OpenID
    Connect (OIDC) authentication protocol.
  prefs: []
  type: TYPE_NORMAL
- en: For my coding example, I focused on using Google as the authenticator and showed
    you the prerequisite steps to set it up correctly for use on Google’s Cloud platform.
  prefs: []
  type: TYPE_NORMAL
- en: I also provided a sample Streamlit app that shows Google authorisation in action.
    Although this is a simple app, it highlights all techniques you require should
    your needs grow in complexity.
  prefs: []
  type: TYPE_NORMAL
