  zh: 原文：[https://towardsdatascience.com/tds-newsletter-how-compelling-data-stories-lead-to-better-business-decisions/](https://towardsdatascience.com/tds-newsletter-how-compelling-data-stories-lead-to-better-business-decisions/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《变量》每周通讯的新版本，我们的通讯包含编辑精选、深度分析、社区新闻等内容。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
