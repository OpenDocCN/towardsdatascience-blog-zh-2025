- en: Meet Our New Authors
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 欢迎我们的新作者
- en: 'We hope you take the time to explore the excellent work from the latest cohort
    of TDS contributors:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望您花些时间探索TDS最新一批贡献者的优秀作品：
- en: '[Mohannad Elhamod](https://towardsdatascience.com/author/mohannad-elhamod/) challenges
    the conventional wisdom that more data necessarily equates to better model performance.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Mohannad Elhamod](https://towardsdatascience.com/author/mohannad-elhamod/) 挑战了这样一个传统观念：更多的数据必然等同于更好的模型性能。'
- en: '[Does More Data Always Yield Better Performance?](https://towardsdatascience.com/does-more-data-always-yield-better-performance/)'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[《更多的数据是否总是带来更好的性能？》(https://towardsdatascience.com/does-more-data-always-yield-better-performance/)]'
- en: '[Sam Arrington](https://towardsdatascience.com/author/sam-arrington/) launched
    a new statistics-focused series on power analysis in the context of marketing.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Sam Arrington](https://towardsdatascience.com/author/sam-arrington/) 推出了一个以营销为背景的关于统计学的系列。'
