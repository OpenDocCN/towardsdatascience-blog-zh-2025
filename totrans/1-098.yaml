- en: 'TDS Newsletter: How Compelling Data Stories Lead to Better Business Decisions'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/tds-newsletter-how-compelling-data-stories-lead-to-better-business-decisions/](https://towardsdatascience.com/tds-newsletter-how-compelling-data-stories-lead-to-better-business-decisions/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Does [data storytelling](https://towardsdatascience.com/tag/data-storytelling/) still
    matter today? Is the concept even relevant in a world where a quick prompt can
    generate a thousand charts, and AI agents are powerful enough to produce detailed
    reports in seconds?
  prefs: []
  type: TYPE_NORMAL
- en: The articles we’re highlighting this week answer these questions with a resounding
    “Yes.” Data-driven stories remain an evergreen tool because they exemplify a distinctly
    human way of thinking and reasoning. They blend facts, opinion, trends, and intuition
    into a coherent narrative that empowers teams and organizations to make better
    decisions and to think in more creative and innovative ways.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Beyond Numbers: How to Humanize Your Data & Analysis'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'With endless streams of data and an ever-growing arsenal of tools to process
    and analyze it, practitioners are increasingly aware of the wide gap between the
    availability of data and its usefulness. [Michal Szudejko](https://towardsdatascience.com/author/michalszudejko/) argues
    that the way to get back on the right path is through data humanization: a new
    way of thinking designed “to transform data from a passive spreadsheet into a
    compelling narrative that moves stakeholders to action.”'
  prefs: []
  type: TYPE_NORMAL
- en: '[Beyond Numbers: How to Humanize Your Data & Analysis](https://towardsdatascience.com/beyond-numbers-how-to-humanize-your-data-analysis/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What Building My First Dashboard Taught Me About Data Storytelling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The sad dashboard that nobody uses has long been a data science trope. Benjamin
    Nweke looks beyond the clichés, and unpacks the perennial struggle of making others
    see what you first saw in in the data. The key? Remembering that empathy for your
    audience comes first.
  prefs: []
  type: TYPE_NORMAL
- en: '[What Building My First Dashboard Taught Me About Data Storytelling](https://towardsdatascience.com/what-building-my-first-dashboard-taught-me-about-data-storytelling/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why Storytelling With Data Matters for Business and Data Analysts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For an upbeat roundup of helpful insights, don’t miss Rashi Desai’s reflection
    on how to “move beyond spreadsheets and charts to frame data in a way that builds
    stronger business cases, unlocks agility, and drives alignment across teams.”
  prefs: []
  type: TYPE_NORMAL
- en: '[Why Storytelling With Data Matters for Business and Data Analysts](https://towardsdatascience.com/why-storytelling-with-data-matters-for-business-and-data-analysts/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
