  type: TYPE_NORMAL
  zh: '[《营销中的功效分析：动手入门》(https://towardsdatascience.com/power-analysis-in-marketing/)]'
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们热爱发布新作者的文章，所以如果你最近撰写了一篇有趣的项目演练、教程或对我们核心主题的理论反思，为什么不[与我们分享呢？](https://towardsdatascience.com/questions-96667b06af5/)
- en: We’d Love Your Feedback, Authors!
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们期待您的反馈，作者们！
- en: Are you an existing TDS author? We invite you to [fill out a 5-minute survey](https://towardsdatascience.typeform.com/Authors-Survey/) so
    we can improve the publishing process for all contributors.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你是现有的TDS作者吗？我们邀请你填写一份5分钟的调查问卷[填写调查问卷](https://towardsdatascience.typeform.com/Authors-Survey/)，以便我们改进所有贡献者的出版流程。
