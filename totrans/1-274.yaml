- en: 'From Amnesia to Awareness: Giving Retrieval-Only Chatbots Memory'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/from-amnesia-to-awareness-giving-retrieval-only-chatbots-memory/](https://towardsdatascience.com/from-amnesia-to-awareness-giving-retrieval-only-chatbots-memory/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Contributors: [Nicole Ren](https://www.linkedin.com/in/nicoleren/) (GovTech),
    [Ng Wei Cheng](https://www.linkedin.com/in/wei-cheng-ng-a0297a12b/) (GovTech)'
  prefs: []
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758161828088" class="mdspan-comment">You’ve built a Q&A</mdspan>
    chatbot that retrieves answers from your knowledge base. It’s reliable, grounded
    in factual content, and avoids the hallucination pitfalls that plague generative
    chatbots. Your system excels at fielding direct, standalone queries, but falters
    the moment users attempt natural, conversational follow-ups like “How can I do
    that?”, “What about in Germany?”.
  prefs: []
  type: TYPE_NORMAL
- en: The culprit? The typical retrieval mechanism treats each query in isolation,
    searching for semantic matches without any memory of the conversation’s context.
    While this approach works brilliantly for single-turn interactions, it breaks
    down when users expect the fluid, contextual dialogue that defines modern conversational
    AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'What if you could give your bot memory? Welcome to the second part of our series
    exploring the GenAI innovations that power Virtual Intelligent Chat Assistant
    (VICA). VICA is a conversational AI platform designed to help government agencies
    respond to queries of citizens quickly whilst maintaining strict control over
    content through guardrails and custom-written responses that minimise hallucination.
    In our [first article](https://towardsdatascience.com/integrating-llm-agents-with-langchain-into-vica-d18a5c8583c6/),
    we explored how LLM agents can enable conversational transactions in chatbots.
    Now, we turn our attention to another critical innovation: enabling natural, multi-turn
    conversations in stateless Q&A systems.'
  prefs: []
  type: TYPE_NORMAL
