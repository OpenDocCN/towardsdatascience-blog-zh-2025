- en: Can We Save the AI Economy?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我们能否拯救人工智能经济？
- en: 原文：[https://towardsdatascience.com/can-we-save-the-ai-economy/](https://towardsdatascience.com/can-we-save-the-ai-economy/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/can-we-save-the-ai-economy/](https://towardsdatascience.com/can-we-save-the-ai-economy/)
- en: <mdspan datatext="el1760640510920" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760640510920" class="mdspan-comment">引言</mdspan>
- en: The AI ecosystem seems to be full of contradictions. Many of my peers in machine
    learning and software engineering roles are being faced with more and more pressure
    to incorporate AI into software they build, but for some, it’s coming without
    clarity on the business goals they’re trying to achieve. At the same time, market
    analysts and “thought leaders” in tech are continuing to center massive amounts
    of their energy and attention on AI, seemingly at the expense of any other possible
    topics of interest. Executives and leaders hear from boards, analysts, and advisors
    that “deploying AI” or being “AI driven” is required for business success, and
    they come back to their teams asking for ways to carry out these instructions,
    but no one is clear about why it needs to be done. And all the while, [across
    social media](https://www.tiktok.com/t/ZP8APV21j/) [regular](https://www.tiktok.com/t/ZP8APQ6mn/) users
    are complaining about having unwanted AI injected into apps and products they
    liked fine before.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能生态系统似乎充满了矛盾。许多在机器学习和软件工程角色中的同行都面临着越来越多的压力，要将人工智能融入他们构建的软件中，但对于一些人来说，这并没有明确他们试图实现的企业目标。与此同时，市场分析师和技术领域的“思想领袖”继续将大量精力和注意力集中在人工智能上，似乎以牺牲任何其他可能感兴趣的话题为代价。高管和领导者从董事会、分析师和顾问那里听到“部署人工智能”或成为“人工智能驱动”是商业成功所必需的，然后他们回到团队中询问如何执行这些指示，但没有人清楚为什么需要这样做。与此同时，社交媒体上的普通用户在抱怨，他们喜欢的应用程序和产品中突然被注入了他们不想要的AI。
- en: What’s driving these apparently conflicting forces? I have a hypothesis about
    the bigger picture that I want to share.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 是什么驱使这些看似矛盾的力量？我对更大的图景有一个假设，我想分享。
- en: Tech startups usually have a central goal to build a product with functionality
    that will meet the needs of customers (product-market fit, as those of us in the
    space often hear). Those customers will pay for the product, use it to improve
    their own business performance, and success for all involved will ensue. This
    model is well established, and gives us a path to take. Identify the customer’s
    needs or problems, investigate what features could solve them, build those features,
    sell the product to the customers facing those problems, rinse, and repeat.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 科技初创公司通常有一个核心目标，那就是开发一个具有满足客户需求的功能的产品（产品-市场匹配，正如我们这个领域的人经常听到的）。这些客户将为此产品付费，使用它来提高自己的业务表现，从而实现所有相关方的成功。这种模式已经确立，为我们提供了前进的道路。确定客户的需求或问题，调查哪些功能可以解决这些问题，构建这些功能，将产品卖给面临这些问题的客户，然后重复这个过程。
- en: Where does “become AI driven” fit in this? Why is this AI mania so powerful
    at the current moment, with seemingly no regard for the customer’s actual pain
    points? It’s like a wave of carpentry companies all becoming “screwdriver driven”
    — sure, a screwdriver might be very useful and even necessary for a carpentry
    project, but it’s certainly not the only tool in your arsenal. AI is the same,
    and deciding to apply it should only come after the problem has been analyzed
    and assorted approaches have been considered.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: “成为人工智能驱动”在这个框架中处于什么位置？为什么这种人工智能热潮在当前时刻如此强大，似乎对客户实际痛点视而不见？这就像一股所有木工公司都变成“螺丝刀驱动”的浪潮——当然，螺丝刀对于木工项目可能非常有用，甚至可能是必需的，但它绝对不是你工具箱中唯一的工具。人工智能也是如此，决定应用它应该只在没有分析问题并考虑了各种方法之后。
- en: Why is this AI mania so powerful at the current moment, with seemingly no regard
    for the customer’s actual pain points?
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为什么这种人工智能热潮在当前时刻如此强大，似乎对客户实际痛点视而不见？
- en: So, if AI is not the best solution to your customers’ pressing challenges, what
    do you do in face of overwhelming pressure to use it regardless? As engineers
    we might be tempted to just ignore this demand, given that it does not fit into
    the model of startup development I’ve described. Some leaders and companies may
    be able to just brush off the AI hype tsunami and carry on working as they have
    been. If an AI tool happens to be the best solution for something, they can use
    it, but it doesn’t have to drive their whole roadmap.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，如果人工智能不是解决客户紧迫挑战的最佳方案，面对使用它的巨大压力，你该怎么办？作为工程师，我们可能会倾向于忽略这种需求，因为这与我所描述的创业发展模式不符。一些领导和公司可能能够简单地忽略人工智能的炒作浪潮，继续按他们原来的方式工作。如果人工智能工具恰好是解决某个问题的最佳方案，他们可以使用它，但不必将其作为整个路线图的驱动力。
- en: However, for most of us, this probably isn’t a viable path. So, where do we
    go? And, how did we get here? I’ve got some ideas, so let’s look at the major
    players involved.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于我们大多数人来说，这可能不是一个可行的途径。那么，我们该何去何从？又是如何走到这一步的？我有一些想法，让我们来看看涉及的各大主要参与者。
- en: '![](../Images/cabfbe067e548f7e0f13cfe917b169c3.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cabfbe067e548f7e0f13cfe917b169c3.png)'
- en: Diagram by the author using Excalidraw
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 作者使用Excalidraw绘制的图表
- en: Inside the startup
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初创公司内部
- en: As I have explained, software startups generally set out to create some functionality
    that will help customers solve a problem. Uber created the ride-share app, which
    helped people find convenient and comfortable rides at much lower prices than
    taxis. (This had and continues to have serious negative externalities and consequences,
    but let’s set that aside for the moment.) Other startups have tried to create
    solutions to inefficiencies and inconveniences in myriad other sectors. They come
    up with an idea, solicit investment from venture capital or others, and use that
    money to turn the idea into a real product. They pick up customers, start earning
    money, and become profitable. Eventually, an IPO or an acquisition by a larger
    company may happen.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我解释的那样，软件初创公司通常旨在创建一些功能，以帮助客户解决问题。优步创建了拼车应用程序，帮助人们以比出租车低得多的价格找到方便舒适的乘车服务。（这确实产生了严重的负面外部性和后果，但让我们暂时忽略这一点。）其他初创公司试图解决众多其他领域的低效和不便。他们提出一个想法，从风险投资或其他渠道筹集资金，并使用这些资金将想法转化为真实的产品。他们吸引客户，开始赚钱，并变得盈利。最终，可能会发生IPO或被更大公司收购。
- en: Having a good idea isn’t all there is to the startup approach, however — there’s
    often also an element of showmanship. Because of the funding model, a lot of startups
    build a minimum viable product, or MVP, and then carry on “building the plane
    while flying it” as the old cliche goes. This means that you’re selling a rudimentary
    (but hopefully still useful) initial product with promises of future improvements,
    functionality extensions, and so on. This can work, but you need to have some
    amount of hype to get people interested in investing (as customers or as investors)
    in the potential of those future promises.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 仅仅有一个好想法并不是创业方法的全部——通常还有展示技巧的成分。由于资金模式，许多初创公司会构建一个最小可行产品，或MVP，然后继续“边飞边造飞机”，正如老话所说。这意味着你正在销售一个基础（但希望仍然有用）的初始产品，并承诺未来的改进、功能扩展等。这可以行得通，但你需要有一定的炒作来吸引人们对那些未来承诺的潜在投资兴趣（无论是作为客户还是投资者）。
- en: We’d like to think that you just need to have the best idea, and the smartest
    plan for how to achieve it, and funding will follow — but that’s not the reality.
    If you need to get attention in order to succeed, you need to be able to promise
    what people are looking for, and to demonstrate that you are the most current,
    fresh, advanced option out there. Theoretically, the argument is that a tech company
    whose offering is not “cutting edge” will not provide customers the best value
    for money, or will not offer the most useful functionality. Even tech companies
    who have even established and good products, much more developed than MVP, are
    still trying to grow their customer bases. They still need market attention and
    sizzle to keep the attention of prospective buyers.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能认为，你只需要有一个最好的想法，以及实现它的最聪明计划，资金就会随之而来——但这并不是现实。如果你需要吸引注意力才能成功，你需要能够承诺人们所寻找的东西，并证明你是目前最前沿、最新颖、最先进的选项。从理论上讲，论点是，如果一个科技公司的产品不是“尖端”的，那么它不会为客户提供最佳的价值，或者不会提供最有用的功能。即使是那些已经建立并拥有良好产品、远超MVP的科技公司，仍在努力扩大客户群。他们仍然需要市场的关注和吸引力，以保持潜在买家的关注。
- en: We’d like to think that you just need to have the best idea, and the smartest
    plan for how to achieve it, and funding will follow — but that’s not the reality.
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们可能会认为，你只需要有一个最好的想法，以及如何实现它的最聪明的计划，资金就会随之而来——但这并不是现实。
- en: This is where some of the demands for becoming “AI powered” come into play. [Over
    50% of venture capital investment in all of 2025 went to “AI” companies](https://www.eastbaytimes.com/2025/10/03/ai-is-dominating-2025-vc-investing-pulling-in-192-7-billion/).
    Incorporating AI functionality into software isn’t inherently a bad idea, but
    neither is it a silver bullet. It’s just a tool, like any other, and if you’re
    hoping that just throwing AI around will actually improve your product, you’re
    deeply mistaken. Just like the carpenters with their screwdrivers, the tool choice
    shouldn’t be driving the strategy. You can end up building something that is not
    functional, or even if it is functional, misses key requirements to being useful
    or appealing to customers.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是一些要求成为“人工智能驱动”的需求出现的地方。[2025年全年超过50%的风险投资都投向了“人工智能”公司](https://www.eastbaytimes.com/2025/10/03/ai-is-dominating-2025-vc-investing-pulling-in-192-7-billion/)。将人工智能功能整合到软件中本身并不是一个坏主意，但也不是万能的解决方案。它只是一个工具，就像其他任何工具一样，如果你希望只是随意使用人工智能就能真正改善你的产品，你深深地错了。就像带着螺丝刀的木匠一样，工具的选择不应该驱动策略。你可能会最终建造出一些不实用的东西，或者即使它是实用的，也可能不符合成为有用或吸引客户的必要要求。
- en: But nonetheless, this is where the available money is going right now, so understandably
    this is the instruction leadership is giving engineers at many, many companies.
    When the CEO of your company comes to the engineering department and instructs
    you that AI needs to be the new strategic direction, you might find yourself thinking
    “what does that mean?” or “how does that fit in to all our established plans?”
    I’d actually argue that these are the wrong questions to ask.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 但无论如何，这正是目前可用的资金流向的地方，因此可以理解这是许多公司领导层向工程师下达的指令。当你的公司CEO来到工程部门并指示你人工智能需要成为新的战略方向时，你可能会发现自己在想“那是什么意思？”或者“它如何与我们的所有既定计划相匹配？”我实际上认为这些问题是错误的。
- en: Inside the boardroom
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在董事会内部
- en: What you really want to know is “Why is my leader asking for this? What do they
    really want?” And to answer these, you need to consider a little bit more about
    the startup CEO’s pressures and influences.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你真正想知道的是“我的领导者为什么要这样做？他们真正想要什么？”要回答这些问题，你需要稍微更多地考虑一下创业公司CEO的压力和影响。
- en: The role of the startup CEO is actually pretty difficult. You’re leading a whole
    organization, which is already complicated, but you don’t have unlimited autonomy,
    in most cases. Frequently, you report to a board of directors who are there to
    ensure that the business goes well. That’s where a lot of the pressure to increase
    AI involvement and visibility in the product can come from.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 创业公司CEO的角色实际上相当困难。你正在领导一个已经复杂的整个组织，但你通常没有无限的自主权。经常，你向董事会报告，董事会的存在是为了确保业务顺利进行。这就是增加人工智能参与度和产品可见性的压力主要来自这里。
- en: A CEO might organically be bought in to AI hype, and be perfectly willing to
    push incorporation of this tool on the rest of the organization without much concern
    for the problem being solved. However, they might also cynically look at the economic
    environment and recognize that the way to media attention and analyst applause
    is incorporating AI in any way that can be marketed. Simultaneously, they may
    just be limited in their choices if their board of directors is very bought in
    to the AI narrative.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 一个CEO可能自然而然地被人工智能炒作所吸引，并且非常愿意在组织内部推广这项工具的整合，而不太关心解决的问题。然而，他们也可能愤世嫉俗地看待经济环境，认识到吸引媒体关注和分析师掌声的方法是以任何可以营销的方式整合人工智能。同时，如果他们的董事会非常相信人工智能的叙事，他们可能的选择也会受到限制。
- en: CEOs and board members alike are hearing from lots of media and analyst sources
    about the prestige and importance of AI, and many of them will believe this, which
    leads to fears about not being seen as tech-forward. Even if they are skeptical,
    they still want to get the advantage of attention from the market analysts and
    maintain prestige to drive business, which means playing the game.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: CEO和董事会成员都在从众多媒体和分析师来源那里听到关于人工智能的声望和重要性，其中许多人会相信这一点，这导致了对被视为技术落后者的担忧。即使他们持怀疑态度，他们仍然想要从市场分析师那里获得关注，并保持声望以推动业务，这意味着参与游戏。
- en: If that board pressure is there, as it is for many tech leaders right now, it’s
    not something you can just ignore. A board of directors has a very significant
    amount of influence and power in most startups. They can usually fire the CEO,
    for example. So if the CEO doesn’t think blanket, general application of AI is
    a good business decision for your company, the CEO can try to push back, but there
    comes a point where they have to accept the board’s instructions.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果董事会施加的压力存在，就像现在许多科技领导者所面临的那样，这不是你可以轻易忽视的事情。董事会在大多数初创公司中拥有非常显著的影响力和权力。例如，他们通常可以解雇首席执行官。所以如果首席执行官认为AI的全面、一般性应用不是公司的好商业决策，他可以尝试抵制，但最终他们必须接受董事会的指示。
- en: No CEO wants to gain a reputation as being technologically stale and outdated,
    even if they keep their role. Pushing back on the common wisdom of the moment
    comes with cost. Political capital is not infinite, and executives have to spend
    a lot of their time deciding which battles to fight. And this is even assuming
    the CEO isn’t fully bought-in to the AI hype themselves, which they very well
    might be.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 没有首席执行官愿意获得技术陈旧和过时的声誉，即使他们保持自己的角色。反对当前普遍观点是要付出代价的。政治资本不是无限的，高管们必须花费大量时间来决定哪些战斗要打。而且这还假设首席执行官自己并没有完全被AI炒作所吸引，他们很可能已经被吸引了。
- en: Pushing back on the common wisdom of the moment comes with cost.
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 反对当前普遍观点是要付出代价的。
- en: Where are market analysts getting this?
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 市场分析师是从哪里得到这些信息的？
- en: I’ve mentioned market analysts in passing, but they’re important to this overall
    ecosystem. Let’s dig in to what their role really is.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是顺便提到了市场分析师，但他们对这个整体生态系统很重要。让我们深入了解他们的真正角色。
- en: Companies like Gartner, Forrester, and other market analysis firms make their
    money by researching and examining companies in different industry spaces, ranking
    and scoring them, and selling those reports to people trying to decide which business
    to contract with. These agencies are kind of like credit rating agencies for banks
    — they vouch for you so other companies and purchasers who don’t have all that
    time can easily decide if you’re for real, or if you’re vaporware.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 像Gartner、Forrester和其他市场分析公司这样的公司通过研究不同行业空间的公司、对它们进行排名和评分，并将这些报告卖给试图决定与哪家公司签约的人来赚钱。这些机构有点像银行的信用评级机构——他们为你担保，这样其他公司和个人买家就可以轻松地决定你是否真的有实力，或者你是否是空谈。
- en: How do they decide which companies to recommend? Well, there’s usually some
    kind of rubric or set of measurement standards, such as which products have the
    broadest functionality, which ones seem to do the best job solving certain problems,
    how satisfied current customers are with the products, and so on.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 他们是如何决定推荐哪些公司的？嗯，通常有一些标准或测量标准，比如哪些产品具有最广泛的功能，哪些似乎在解决某些问题方面做得最好，当前客户对产品的满意度如何等等。
- en: As you might have guessed, there’s a new element that’s sucking all the oxygen
    out of the room right now, which is “if this company is using a lot of AI”. What
    does that even mean? Unfortunately, based on what I’ve seen so far, it frequently
    means “does this company’s product have an AI chatbot in it?” It’s hard work to
    take a deep look at a company’s product and all the different ways that machine
    learning or AI could be incorporated into its various functions and offerings
    under the surface. It’s pretty easy, on the other hand, to look for a chat window
    and listen for “AI” in the marketing pitch.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所猜，现在有一个新的因素正在吸走房间里的所有氧气，那就是“如果这家公司使用了大量的人工智能”。这究竟是什么意思？不幸的是，根据我所看到的，这通常意味着“这家公司的产品中是否包含人工智能聊天机器人？”深入审视一家公司的产品以及机器学习或人工智能如何融入其各种功能和背后的不同方式是一项艰巨的工作。另一方面，寻找聊天窗口并倾听营销推广中的“人工智能”却相对容易。
- en: There are endless ways, good and bad, that machine learning and AI can be incorporated
    into any given software product, and I would argue that a chatbot is rarely the
    best one for most use cases. But it’s flashy, and obvious, and people who know
    little or nothing about how the technology actually works can spot it a mile away,
    so a lot of organizations are landing on this.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 将机器学习和人工智能融入任何软件产品的途径数不胜数，好的坏的都有，我敢说聊天机器人很少是大多数用例的最佳选择。但它很耀眼，很明显，对那些对技术实际工作了解不多的人来说，它一目了然，所以很多组织都选择了这条路。
- en: It’s functioning as a shorthand outsiders can use to assert that “this company
    is using lots of AI”, which in turn is shorthand for “this company is technologically
    advanced and innovative.” Unfortunately, this line of logic is very misguided.
    AI is not a measure of technical savvy or quality, especially not right now where
    low-quality plug-and-play AI solutions for jamming into software products are
    being sold by every other vendor out there. Slapping a chatbot on your website
    has nothing to do with how good your codebase is, the quality of your engineering
    talent, your strategic savvy, or anything else.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 它充当了一个外行人可以用来断言“这家公司正在大量使用AI”的简语，而这反过来又是一个简语，意味着“这家公司在技术上先进且具有创新性。”不幸的是，这种逻辑非常错误。AI并不是衡量技术熟练度或质量的标准，尤其是现在，到处都在出售低质量的即插即用AI解决方案，这些解决方案被用于软件产品中。在你的网站上贴上一个聊天机器人与你的代码库质量、你的工程人才质量、你的战略敏锐度或任何其他东西都没有关系。
- en: AI is not a measure of technical savvy or quality, especially not right now
    where low-quality plug and play AI solutions for jamming into software products
    are being sold by every other vendor out there.
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: AI并不是衡量技术熟练度或质量的标准，尤其是现在，到处都在出售低质量的即插即用AI解决方案，这些解决方案被用于软件产品中。
- en: Does the market analyst realize this? Maybe, but as with the board and the CEO,
    it doesn’t really matter, because the broader ecosystem is already so frantic
    with AI hype. Consider what would happen if you ran a market analysis firm, and
    your competitor firms were all making great hay about which startups have the
    most “advanced” AI technology, and your market report stuck to the meat and potatoes
    of basic features. Could you do it? Perhaps. But the readers of your reports are
    the board members, executives, and other leaders around the industry, and what
    are they getting from all sides right now? AI hype. They’re going to want to know
    whether these companies have AI, not because they know why they should care, or
    what the AI has to do with the company’s business. They want to know because they’ve
    been solemnly informed by media and AI companies that this is the cutting edge
    and anyone who misses it is going to be left behind. (Readers may be reminded
    of the Web 3.0/blockchain craze that left us with [assorted](https://en.wikipedia.org/wiki/Long_Blockchain_Corp.) [companies](https://decrypt.co/329914/5-weirdest-bitcoin-dogecoin-ethereum-treasury-pivots) [throwing](https://mashable.com/article/5-most-bizarre-web3-pivots) their
    lot into blockchain-based business models that really made no sense at all.)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 市场分析师是否意识到这一点？也许吧，但就像董事会和CEO一样，这实际上并不重要，因为整个生态系统已经因为AI炒作而变得非常疯狂。假设你经营一家市场分析公司，而你的竞争对手都在大肆宣传哪些初创公司拥有最“先进”的AI技术，而你的市场报告却只关注基本功能。你能做到吗？或许可以。但你的报告读者是董事会成员、高管和行业中的其他领导者，他们现在从各方面得到了什么？AI炒作。他们想知道这些公司是否有AI，并不是因为他们知道为什么他们应该关心，或者AI与公司的业务有什么关系。他们想知道是因为媒体和AI公司郑重其事地告诉他们，这是前沿技术，任何错过它的人都会被落下。（读者可能会想起Web
    3.0/区块链热潮，它让我们留下了[各种](https://en.wikipedia.org/wiki/Long_Blockchain_Corp.)[公司](https://decrypt.co/329914/5-weirdest-bitcoin-dogecoin-ethereum-treasury-pivots)
    [投身](https://mashable.com/article/5-most-bizarre-web3-pivots)于基于区块链的业务模式，而这些模式实际上完全没有意义。）
- en: Why are AI companies the way they are?
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么AI公司是这样的？
- en: This brings us around the circle to AI companies themselves. These are the entities
    with the obvious motivation to convince all the rest of us that incorporating
    AI into more or less all software is necessary, because their business model is
    providing the underlying functionality to make that possible.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这又带我们回到了AI公司本身。这些公司有着明显的动机，想要说服我们所有人，将AI融入更多或更少的软件中是必要的，因为他们的商业模式就是提供使这成为可能的基础功能。
- en: The nuanced and difficult part is that AI isn’t always the wrong choice. AI
    can be very useful for a number of different things! But AI isn’t the right choice
    for **everything**, and that’s the difference. It’s a tool to use to pursue a
    goal, and we should be slow and thoughtful about where we incorporate it. This
    is for many reasons — for one thing, building AI functionality has opportunity
    costs, and prevents you from using your time and resources to build something
    else that the customer might need. But additionally, as I’ve described many times,
    AI is extraordinarily [environmentally](https://www.stephaniekirmer.com/writing/environmentalimplicationsoftheaiboom/), [socially](https://www.stephaniekirmer.com/writing/theculturalimpactofaigeneratedcontentpart1/),
    and [economically](https://www.stephaniekirmer.com/writing/economicsofgenerativeai/) expensive.
    The cost of building this is so much higher than we can see from our desks, so
    it needs to be used only in the most appropriate and necessary scenarios.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 细腻且困难的部分在于，AI 并非总是错误的选择。AI 在许多不同的事情上都可以非常有用！但 AI 并不是适合所有事情的正确选择，这就是区别。它是用来追求目标的工具，我们应该在考虑将其整合到何处时要慢且深思熟虑。这有多个原因——首先，构建
    AI 功能性有潜在的机会成本，这会阻止你使用时间和资源去构建客户可能需要的其他东西。但除此之外，正如我多次描述的那样，AI 在环境上、社会上和经济上都是极其昂贵的。构建它的成本远远高于我们从办公桌上所能看到的，因此它只应在最合适和必要的场景中使用。
- en: The cost of building this is so much higher than we can see from our desks,
    so it needs to be used only in the most appropriate and necessary scenarios.
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 构建这个的成本远远高于我们从办公桌上所能看到的，因此它只应在最合适和必要的场景中使用。
- en: Even considering this, I sincerely think that if AI companies took a measured
    approach, providing AI capabilities where needed, there could be a healthy albeit
    not extraordinary market for this technology. Unfortunately, this is not the business
    model for AI companies — instead, [hundreds](https://www.reuters.com/business/media-telecom/openai-oracle-softbank-plan-five-new-ai-data-centers-500-billion-stargate-2025-09-23/) of [billions](https://tech.yahoo.com/ai/article/nvidia-investing-100-billion-openai-175159210.html) of [dollars](https://www.eastbaytimes.com/2025/10/03/ai-is-dominating-2025-vc-investing-pulling-in-192-7-billion/) [have
    been invested](https://techcrunch.com/2025/10/10/the-billion-dollar-infrastructure-deals-powering-the-ai-boom/) by
    big tech firms and investors into OpenAI, Anthropic, and others, and they expect
    this investment to pay off in one way or another.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 即使考虑到这一点，我真诚地认为，如果 AI 公司采取谨慎的方法，在需要的地方提供 AI 功能，那么这个技术可能会有一个健康的市场，尽管不是非凡的。不幸的是，这不是
    AI 公司的商业模式——相反，[数百](https://www.reuters.com/business/media-telecom/openai-oracle-softbank-plan-five-new-ai-data-centers-500-billion-stargate-2025-09-23/)
    [亿](https://tech.yahoo.com/ai/article/nvidia-investing-100-billion-openai-175159210.html)
    [美元](https://www.eastbaytimes.com/2025/10/03/ai-is-dominating-2025-vc-investing-pulling-in-192-7-billion/)
    [已经由](https://techcrunch.com/2025/10/10/the-billion-dollar-infrastructure-deals-powering-the-ai-boom/)
    大型科技公司和投资者投资到了 OpenAI、Anthropic 等公司，并且他们期望这种投资以某种方式获得回报。
- en: Simultaneously, [OpenAI in particular is engaged in some strange financial machinations](https://seekingalpha.com/article/4829811-broadcom-joins-the-openai-bubble-club),
    promising investments to hardware providers that vastly exceed any possible measure
    of their financial resources. [Matt Levine at Bloomberg covered this in his most
    recent Money Stuff column](https://www.bloomberg.com/opinion/newsletters/2025-10-13/openai-keeps-doing-deals),
    noting “if you owe the bank $100, that’s your problem. If you owe Broadcom *$500
    billion* (emphasis in original), that’s Broadcom’s problem. If you owe every big
    tech company hundreds of billions of dollars, that is their problem. Surely they’ll
    find a solution! Or you will. The money will figure itself out.” He goes on to
    explain that taking on massive debt is likely the strategy that will be undertaken
    to find the money to make good on such promises, if anything is done at all. But
    if OpenAI is leveraged up to their ears, what is the end game not just for them,
    but for their creditors and the companies that they’ve promised investments to?
    A lot of influential and large companies have existential incentives to make this
    AI economy work.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，特别是[OpenAI正在进行一些奇怪的金融操作](https://seekingalpha.com/article/4829811-broadcom-joins-the-openai-bubble-club)，承诺给硬件供应商的投资远远超过了他们可能的财务资源。彭博社的[Matt
    Levine在他的最新《Money Stuff》专栏中对此进行了报道](https://www.bloomberg.com/opinion/newsletters/2025-10-13/openai-keeps-doing-deals)，指出“如果你欠银行100美元，那是你的问题。如果你欠Broadcom
    *5000亿美元*（原文如此），那是Broadcom的问题。如果你欠每家大型科技公司数百亿美元，那是他们的问题。他们肯定会找到解决办法！或者你会。钱会自己解决。”他继续解释说，承担巨额债务可能是为了找到兑现这些承诺的资金，如果真的有所行动的话。但如果OpenAI已经借得山高水远，那么不仅对他们，对他们债权人以及他们承诺投资的公司的最终结局会是什么？许多有影响力和大型公司都有让这个AI经济运转的生存动机。
- en: I think it’s very possible that tech giants and major investors have already
    sunk more money into the AI companies than it is ever possible to actually get
    in return. We are seeing a frenzied, hype-driven AI marketing force because in
    order for the AI companies to make good on their revenue and profit promises,
    they can’t just settle for the customers who have a thoughtful, intentional use
    case for AI within their product. They need every company out there to be desperately
    spending on AI, no matter the price, because hundreds of billions of dollars need
    to be found to keep the wheel spinning. And let’s not forget that for the companies
    supplying the foundational models, like Anthropic, OpenAI, and xAI, it’s unclear
    if reasonable retail prices can cover their costs, suggesting they may [lose money](https://techcrunch.com/2025/01/05/openai-is-losing-money-on-its-pricey-chatgpt-pro-plan-ceo-sam-altman-says/) when
    people use the product. Many second layer AI solution providers, such as coding
    tools are [increasing prices and reducing the usage allocation for plans](https://www.okoone.com/spark/industry-insights/ai-coding-tools-arent-cheap-anymore/),
    to try and close this financial gap.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为科技巨头和主要投资者已经投入了比实际可能获得的回报更多的资金到AI公司中。我们正在目睹一场狂热、由炒作驱动的AI营销力量，因为为了使AI公司兑现其收入和利润的承诺，他们不能仅仅满足于那些在其产品中对AI有深思熟虑、有意使用案例的客户。他们需要每家公司都急切地投入AI，无论价格如何，因为需要找到数千亿美元来维持这个轮子的运转。而且，别忘了，对于像Anthropic、OpenAI和xAI这样的基础模型供应商来说，合理的零售价格是否能覆盖他们的成本还不明确，这表明当人们使用产品时，他们可能会[亏损](https://techcrunch.com/2025/01/05/openai-is-losing-money-on-its-pricey-chatgpt-pro-plan-ceo-sam-altman-says/)。许多第二层AI解决方案提供商，如编码工具，正在[提高价格并减少计划的使用配额](https://www.okoone.com/spark/industry-insights/ai-coding-tools-arent-cheap-anymore/)，试图填补这个财务缺口。
- en: We are seeing a frenzied, hype-driven AI marketing force because in order for
    the AI companies to make good on their revenue and profit promises, they can’t
    just settle for the customers who have a thoughtful, intentional use case for
    AI within their product.
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们正在目睹一场狂热、由炒作驱动的AI营销力量，因为为了使AI公司兑现其收入和利润的承诺，他们不能仅仅满足于那些在其产品中对AI有深思熟虑、有意使用案例的客户。
- en: In tech more broadly, we refuse to accept that a successful company can be satisfied
    with moderate size and healthy profits — we instead demand gargantuan size and
    extraordinary profits, from every startup, or it’s deemed a failure. This manifests
    in venture capital expectations of not just 2x or 5x returns on an investment,
    but 50x or 100x returns, but the dollar amounts being invested into AI make achieving
    anything close to this seem utterly unrealistic.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在更广泛的技术领域，我们拒绝接受一个成功的公司可以满足于适中的规模和健康的利润——我们反而要求每个初创公司都拥有巨大的规模和非凡的利润，否则就被视为失败。这体现在风险投资对投资的期望不仅仅是2倍或5倍的回报，而是50倍或100倍的回报，但投入到AI中的美元数额使得实现这一点看起来完全是不切实际的。
- en: What happens to the startups?
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初创公司会怎样？
- en: Now we’ve traced the phenomena back to their origin, how does the cycle complete?
    Your startup shoehorns AI into their product, in a flashy enough way to be noticed,
    and you pay fees to the AI companies for use of the model. Those fees are significant,
    pay-per-use, and often rise as new models are released.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经追溯了这一现象的起源，那么这个循环是如何完成的呢？你的初创公司将AI强行整合到他们的产品中，以足够闪亮的方式引起注意，并且你需要支付给AI公司使用该模型的费用。这些费用是显著的，按使用付费，并且随着新模型的发布而经常上升。
- en: If the AI application is well thought out and carefully constructed, it might
    solve a problem a customer actually has, and this can work. Revenue growth may
    ensue, and this may contribute to business success. This is the ideal scenario,
    certainly! Will the revenue this brings in be enough to pay increasing prices
    to the underlying model provider, so that company scale up and return billions
    to investors? That’s much less clear. And, if you do come to the conclusion that
    this functionality isn’t the right path, or isn’t worth the maintenance, untangling
    it from your application could be very challenging.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果AI应用被深思熟虑并精心构建，它可能会解决客户实际存在的问题，这可能会奏效。随之而来的是收入增长，这可能会对商业成功做出贡献。这是一个理想的场景，当然！这些收入是否足够支付给底层模型提供商不断上升的价格，以便该公司扩大规模并回报数十亿美元？这远不清楚。而且，如果你得出结论认为这个功能不是正确的路径，或者不值得维护，那么从你的应用程序中解开它可能会非常具有挑战性。
- en: But if the AI integration is not strategic, but instead is sloppy and driven
    by the hype and not by customer needs or product-market fit, the result can be
    disastrous. Customer backlash is a real possibility, as is data privacy or security
    failure, PR crises if a model hallucinates particularly badly, or other dangers.
    You could very possibly lose customer confidence and experience user churn, in
    the worst case. Then you’re not paying substantially to the AI companies at the
    core of this, because no one is using the functionality, but you’ve lost time,
    wasted other opportunities, and hurt your business all in one go.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果人工智能的整合不是战略性的，而是草率的，由炒作驱动而非客户需求或产品市场匹配，结果可能灾难性。客户反弹是一个真实可能性，数据隐私或安全失败，如果模型出现严重幻觉，可能会引发公关危机，或者其他危险。你可能会失去客户信任，并经历用户流失，在最坏的情况下。那么，你并没有实质性地支付给这个核心的AI公司，因为没有人使用这个功能，但你却浪费了时间，错失了其他机会，并且一次伤害了你的业务。
- en: In the most banal scenario, you build out an AI chatbot for your product, and
    customers may simply find it uninteresting. The amount of technical labor required
    to set this up is not negligible, and the opportunity cost is real. What happens
    if you get through all this and find out it just wasn’t worth it? You may not
    see any increase in revenue, but providing this AI functionality still costs you
    money when it is used. Do you undo all that hard work getting it implemented,
    and go back to how you were before? What will your customers, leaders, board,
    investors, and the market say?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在最平淡无奇的情况下，你为你的产品开发了一个AI聊天机器人，而客户可能会觉得它毫无兴趣。设置这一需求的技术劳动量并不微不足道，机会成本是真实的。如果你经历了所有这些，发现它根本不值得，会发生什么？你可能看不到收入有任何增加，但提供这个AI功能仍然在它被使用时花费你金钱。你会撤销所有实施它所做的大量工作，回到之前的状态吗？你的客户、领导者、董事会、投资者和市场会说什么？
- en: This is daunting, for sure — and it’s theoretically possible for organizations
    and individuals to stay out of this whole fray. You can keep on keepin’ on as
    your software startup, not fretting about AI, and just keeping it as a tool in
    your toolbox if the right problem should come along. But you’re taking a chance.
    Are you sure you’re never going to need a funding round? Is your board absolutely
    okay with this approach, or do you just not have one? It’s possible to take this
    path, but it’s dangerous. Businesses operate in an economy, not a vacuum, and
    they are never immune from the pressures the broader world might bring to bear
    on them.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这确实令人担忧——理论上，组织和个人可以避免卷入这场混战。你可以继续作为你的软件初创公司，不为AI烦恼，如果遇到合适的问题，就把它当作工具箱中的一个工具。但你是在冒险。你确定你永远不会需要一轮融资吗？你的董事会完全同意这种做法，还是你根本就没有董事会？可以走这条路，但这是危险的。企业在经济中运作，而不是在真空中，他们永远无法免受外界施加的压力。
- en: Conclusion
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Lots of people online these days complain about dissatisfaction with AI functionalities
    that have been added to otherwise beloved or valued software products. They ask,
    “why can’t I just have it without the AI, for the old price?” when a new AI offering
    is released and it comes with a subscription fee hike that is evidently not optional.
    I think when you take a look at the broader picture, the answer is pretty clear.
    Tech leaders were instructed by their boards and the broader media ecosystem that
    they needed to have AI, they implemented it, and now they need to find a way to
    justify the investment that was made. It’s like the gambler’s fallacy, throwing
    good money after bad instead of cutting your losses.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在很多人在网上抱怨对添加到原本受欢迎或价值高的软件产品中的AI功能不满意。他们问道：“为什么我不能在没有AI的情况下，以旧价格使用它？”当一个新的AI产品发布，并伴随着显然不是可选的订阅费上涨时。我认为当你从更广阔的角度来看，答案非常明显。技术领导者们受到董事会和更广泛的媒体生态系统的指示，他们需要拥有AI，他们实施了它，现在他们需要找到一种方式来证明所做出的投资。这就像赌徒的谬误，把好钱扔到坏钱上，而不是及时止损。
- en: AI implementation isn’t cheap, and in many if not most cases, the business’s
    AI functionality comes with a regular fee to pay to the AI providers, like OpenAI
    or Anthropic, so they continue to incur costs when you use the product, so it
    has to continue to cost extra. The Board was convinced by all the influences they
    listened to that offering AI was vital to continued relevance and success, and
    they assumed that this AI would go over well with customers. The gap that everyone
    missed was whether this was true, and whether the AI would actually solve problems
    the customers had, in a way that was desirable.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: AI的实施并不便宜，在很多情况下，如果不是大多数情况，企业的AI功能需要支付给AI提供商（如OpenAI或Anthropic）的定期费用，因此在使用产品时，他们将继续产生成本，所以它必须继续额外收费。董事会被他们所听取的所有影响所说服，认为提供AI对于持续的相关性和成功至关重要，他们假设这种AI会得到客户的良好反响。大家忽视的差距是，这是否是真的，以及AI是否真的以客户期望的方式解决了客户的问题。
- en: If the business needed AI, and the AI implementation actually solved customers’
    problems, then this whole AI economy can work! But if you do it badly, and slap
    some poorly thought through AI functionality on the product in a way that doesn’t
    make sense, the whole cycle can collapse. Who’s going to end up holding the bag?
    Small startups who spend their limited funds trying to make it work? AI companies
    who can never pay back the investments? Big tech companies that have sunk so much
    into this venture that it actually impacts their main business?
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果企业需要AI，并且AI的实施实际上解决了客户的问题，那么整个AI经济可以运作！但如果你做得不好，以一种不合理的方式在产品上添加一些考虑不周的AI功能，整个循环可能会崩溃。谁最终会承担后果？那些花费有限资金试图让它工作的小型初创公司？永远无法偿还投资的AI公司？投入了大量资金到这个项目中，以至于实际上影响了他们主营业务的大型科技公司？
- en: In fact, I’d argue that the survival of the AI economy in any form, if it’s
    possible, depends on a serious change of perspective. We could have a moderate
    but successful AI economy with AI implementation being thoughtful, careful, and
    conservative, but we have to learn to accept that moderation. Instead of exorbitant
    spending on training the next model version for very marginal improvement, we
    could be prioritizing efficiency, environmental sustainability, and practical
    uses of LLMs. We know that building a product that fits the market, solves somebody’s
    problem, and is within their budget is the way to SaaS startup success. Just because
    AI has entered the scene does not change that core reality. People won’t buy your
    product if it doesn’t solve their problems, and if they do buy it based on hype
    that doesn’t bear out, they’ll drop you and churn, and you’ll be left holding
    the bag.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我认为，无论以何种形式，AI经济的生存，如果可能的话，都取决于一个严肃的视角转变。我们可以有一个适度但成功的AI经济，AI的实施是深思熟虑的、谨慎的、保守的，但我们必须学会接受这种适度。与其在训练下一个模型版本上投入过度的资金以实现微小的改进，我们更应该优先考虑效率、环境可持续性和LLMs的实际应用。我们知道，打造一个符合市场、解决某人问题且在其预算范围内的产品是SaaS初创企业成功的关键。AI的出现并没有改变这一核心现实。如果产品不能解决他们的问题，人们就不会购买；如果他们基于无法证实的炒作而购买，他们就会放弃你，导致客户流失，而你将承担后果。
- en: We could have a moderate but successful AI economy with AI implementation being
    thoughtful, careful, and conservative, but we have to learn to accept that moderation.
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们可以有一个适度但成功的AI经济，AI的实施是深思熟虑的、谨慎的、保守的，但我们必须学会接受这种适度。
- en: We are only going to have success if we realize that AI is a tool. It’s not
    the end goal, it’s just a possible way, out of many possible ways, of achieving
    an end goal. It’s also not magic, it’s software. Building it well requires just
    as much hard work, careful planning, expertise, and skill to develop as any other
    kind of software.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只有认识到AI是一种工具，才能取得成功。它不是最终目标，只是众多可能实现最终目标的途径之一。它也不是魔法，它只是软件。构建它需要与任何其他类型的软件一样多的努力、周密规划、专业知识和技能。
- en: What to Do
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应对措施
- en: I’ve written about this issue before, from different angles. If you’re a machine
    learning engineer or leader and your CEO has come to you demanding “something
    with AI”, [I have advice for how to handle that](https://www.stephaniekirmer.com/writing/dosomethingwithai/).
    However, individual players in this game usually do not have the power to really
    change it. I didn’t really understand initially that while many CEOs are deeply
    bought in to the AI hype, many others are under pressure from forces that they
    can’t meaningfully rebel against, at least not to any meaningful effect.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我之前已经从不同的角度讨论过这个问题。如果你是机器学习工程师或领导者，而你的CEO要求你“做一些与AI相关的事情”，[我有关于如何处理这种情况的建议](https://www.stephaniekirmer.com/writing/dosomethingwithai/)。然而，在这个游戏中，个体玩家通常没有真正改变它的力量。最初我并没有真正理解，尽管许多CEO深深沉迷于AI炒作，但许多其他人正受到他们无法有意义反抗的力量压迫，至少不是有意义的反抗。
- en: I’ve also been part of projects with [other experts in the field discussing
    how you actually do build AI solutions for production that can work](https://towardsdatascience.com/deploying-ai-safely-and-responsibly/),
    and that won’t just be boondoggles. Be warned, it’s hard! It takes real effort
    and is not something just anyone can throw together in a weekend. But if done
    well, there can be real value generated by targeted AI functionality in service
    of real customer needs.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我也参与了一些项目，与其他领域的专家一起讨论如何实际构建可以在生产中工作的AI解决方案（[讨论链接](https://towardsdatascience.com/deploying-ai-safely-and-responsibly/)），这不会只是徒劳无功。警告：这很困难！这需要真正的努力，不是任何人都能在周末就能拼凑起来的。但如果做得好，针对真实客户需求的定向AI功能可以产生真正的价值。
- en: I recommend that companies feeling the pressure to put in AI for marketing or
    prestige reasons step back and really work to find a way that this can be aligned
    with the goals of the business. Recognize that there is opportunity cost in choices
    you make, and doing this wrong has consequences. Don’t pretend that what you choose
    affects only you and your business, and make this decision with all the effects
    clearly in mind.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议那些感到压力要为营销或声望原因引入AI的公司退一步，真正努力找到一种方法，使这可以与企业的目标相一致。认识到你的选择中有机会成本，并且做错这件事会有后果。不要假装你的选择只影响你和你自己的业务，并且要考虑到所有可能的影响来做出这个决定。
