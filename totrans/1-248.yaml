- en: Dataset Overview
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集概述
- en: The dataset for this project contains data for the top ~2000 games from the
    [steamworks API](https://partner.steamgames.com/doc/home). This data is free and
    licensed for personal and commercial use, subject to the terms of service, there
    is a 200 requests/5 minute rate limit that resulted in us working with only a
    subset of the data. The terms of service can be found [here](https://steamcommunity.com/dev/apiterms).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 本项目的数据集包含来自 [steamworks API](https://partner.steamgames.com/doc/home) 的前 ~2000
    款游戏的资料。这些数据是免费的，并且根据服务条款，可用于个人和商业用途，但有一个每 5 分钟 200 请求的限制，这导致我们只处理了数据的一个子集。服务条款可以在[这里](https://steamcommunity.com/dev/apiterms)找到。
- en: An overview of the games dataset is shown below. Most of the fields are relatively
    self-descriptive; the key thing to note is that the unique product identifier
    is appid. In addition to this dataset, we also have several additional tables
    that we’ll detail below; the most important one for our recommender system is
    a game tags table, which contains the appid values mapped to each tag associated
    with the game (strategy, RPG, card game, etc.). These were drawn from the categories
    field shown in the Data Overview and then pivoted to create the game_tags table
    so that there’s a unique row for each appip:category combination.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 下面展示了游戏数据集的概述。大多数字段都是相对自描述的；需要注意的是，唯一的商品标识符是 appid。除了这个数据集，我们还有几个额外的表，我们将在下面详细说明；对我们推荐系统来说最重要的是游戏标签表，它包含将每个与游戏相关的标签（策略、RPG、卡牌游戏等）映射到
    appid 的值。这些是从数据概述中显示的分类字段中提取的，然后通过旋转创建游戏标签表，以便为每个 appid:category 组合有一个唯一的行。
- en: '![](../Images/0e466cf076118de9764388a31e059369.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0e466cf076118de9764388a31e059369.png)'
- en: 'Figure 2: Dataset Overview'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2：数据集概述
- en: For a more detailed overview of the structure of our project, see the diagram
    below.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 要更详细地了解我们项目的结构，请参阅下面的图表。
- en: '![](../Images/e1131084870ccc014d7266c856a23ebd.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e1131084870ccc014d7266c856a23ebd.png)'
- en: 'Figure 3: Project File Structure'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3：项目文件结构
- en: Now we’ll provide a quick overview of the architecture of this project and then
    dive into how to populate our database.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将快速概述这个项目的架构，然后深入探讨如何填充我们的数据库。
- en: Architecture
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 架构
- en: For our recommender system system, we’ll use a PostgreSQL database with a FastAPI
    data access + processing layer that will allow us to add or remove games from
    a user’s game list. Users making changes to their game library, via a FastAPI
    POST request, will also kick off a recommendation pipeline leveraging FastAPI’s
    Background Tasks function that will query their liked games from the database,
    calculate a similarity score with non-liked games, and update a user_recommendation
    table with their new top-N recommended games. Finally, both the PostgreSQL database
    and FastAPI service will be deployed on Render so they can be accessed beyond
    our local environment. For this deployment step, any cloud service could have
    been used, but we chose Render in this case for its simplicity.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的推荐系统，我们将使用 PostgreSQL 数据库，并带有 FastAPI 数据访问 + 处理层，这将允许我们向用户的游戏列表中添加或删除游戏。通过
    FastAPI POST 请求对他们的游戏库进行更改的用户还将启动一个利用 FastAPI 的后台任务功能的推荐流程，该流程将从数据库中查询他们喜欢的游戏，与非喜欢的游戏计算相似度分数，并更新用户推荐表，以包含他们新的
    top-N 推荐游戏。最后，PostgreSQL 数据库和 FastAPI 服务都将部署在 Render 上，以便在本地环境之外访问。对于这个部署步骤，可以使用任何云服务，但在这个案例中我们选择了
    Render，因为它简单易用。
- en: 'To recap, our overall workflow from the user’s perspective will look like this:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾一下，从用户的角度来看，我们的整体工作流程将如下所示：
- en: The user adds a game to their library by making a POST request from FastAPI
    to our database.
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户通过从 FastAPI 向我们的数据库发送 POST 请求将游戏添加到他们的图书馆。
- en: If we wanted to attach our recommender system to a front-end application, we
    could easily tie this Post API into a user interface.
  id: totrans-40
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果我们想将推荐系统附加到前端应用程序上，我们可以轻松地将这个 POST API 与用户界面绑定在一起。
- en: This post request kicks off a FastAPI background task that runs our recommender
    pipeline.
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这个 POST 请求启动了一个 FastAPI 后台任务，该任务运行我们的推荐流程。
- en: The recommender pipeline queries our database for the user’s game list and the
    global games list.
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 推荐流程查询我们的数据库以获取用户的游戏列表和全局游戏列表。
- en: A similarity score is then calculated between the user’s games and all games
    using our game tags.
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后计算用户游戏与所有游戏之间的相似度分数。
- en: Finally, our recommender pipeline makes a post request to the database to update
    the recommended games table for that user.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我们的推荐流程向数据库发送 POST 请求，以更新该用户的推荐游戏表。
- en: '![](../Images/74a49d184445cb12575f9c4fe0c8ca4f.png "Figure 4")'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74a49d184445cb12575f9c4fe0c8ca4f.png "图 4")'
- en: 'Figure 4: Recommender System Diagram'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4：推荐系统图
- en: Setting Up the Database
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置数据库
- en: 'Before we build our recommender system, the first step is to set up our database.
    Our basic database diagram is shown in Figure 5\. We previously discussed our
    game table above; this is the base dataset that the rest of our data is generally
    derived from. A full list of our tables is here:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们构建推荐系统之前，第一步是设置我们的数据库。我们的基本数据库图如图 5 所示。我们之前讨论了上面的游戏表；这是我们的基础数据集，其余数据通常由此衍生。我们所有表的完整列表如下：
- en: '`Game` Table: Contains base game data for each unique game in our database'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Game` 表：包含我们数据库中每个独特游戏的基游戏数据'
- en: '`User` Table: A Dummy user table containing example information populated for
    example.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`User` 表：一个示例用户表，包含示例信息填充。'
- en: '`User_Game` Table: Contains the mappings between all games that a user has
    ‘liked’; this table is one of the base tables used to generate recommendations
    by capturing what games a user is interested in.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`User_Game` 表：包含用户所有“喜欢”的游戏之间的映射；此表是用于生成推荐的基础表之一，通过捕捉用户感兴趣的游戏来生成推荐。'
- en: '`Game_Tags` Table: This contains an appid:game_tag mapping, where game tag
    could be something like ‘strategy’, ‘rpg’, ‘comedy’, a descriptive tag that captures
    part of the essence of a game. There are multiple tags mapped to each appid.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Game_Tags` 表：包含 appid:game_tag 映射，其中游戏标签可能像“策略”、“角色扮演”、“喜剧”这样的描述性标签，它捕捉到游戏的一部分精髓。每个
    appid 都映射了多个标签。'
- en: '`User_Recommendation` Table: This is our target table that will be updated
    by our pipeline. Every time a user interacts with a new game, our recommendation
    pipeline will run and generate a new series of recommendations for that user that
    will be stored here.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`User_Recommendation` 表：这是我们目标表，将由我们的管道更新。每次用户与新的游戏互动时，我们的推荐管道将运行并生成一系列针对该用户的新推荐，这些推荐将存储在此。'
- en: '![](../Images/c57bb6ae5151793677d158a7ae8250b2.png "Figure 5")'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图 5](../Images/c57bb6ae5151793677d158a7ae8250b2.png "图 5")'
- en: 'Figure 5: Database Diagram'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5：数据库图
- en: To set up these tables, we can simply run our `src/load_database.py` file. This
    file creates and populates our tables in a couple of steps that are outlined below.
    Note, right now we’re going to focus on understanding how to write this data to
    a generic database, so all you have to know now is that the `External_Database_Url`
    below is the URL to whatever database you want to use. In the second half of this
    article, we’ll walk through how to set up a database on Render and copy the URL
    into your .env file.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 要设置这些表，我们可以简单地运行我们的 `src/load_database.py` 文件。此文件通过以下概述的几个步骤创建并填充我们的表。注意，目前我们将专注于理解如何将数据写入通用数据库，因此你现在需要知道的是下面的
    `External_Database_Url` 是你想要使用的数据库的 URL。在本文的第二部分，我们将介绍如何在 Render 上设置数据库并将 URL
    复制到你的 .env 文件中。
- en: '[PRE0]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: First, we load five CSV files into dataframes from our Data folder; we have
    one file for each of the tables shown in our database diagram. We also establish
    a connection to our data by declaring an engine variable; this engine variable
    uses a custom `DataBaseHandler` class with the initialization method shown below.
    This class takes a connection string to our database on Render(or your preferred
    cloud service), passed in from our .env file, and contains all of our database
    connect, update, delete, and test functionalities.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将五个 CSV 文件从我们的数据文件夹加载到数据框中；我们为数据库图中显示的每个表都有一个文件。我们还通过声明一个引擎变量来建立与我们的数据连接；这个引擎变量使用一个自定义的
    `DataBaseHandler` 类，其初始化方法如下所示。这个类接受从我们的 .env 文件传递给 Render（或你首选的云服务）的数据库连接字符串，并包含我们所有的数据库连接、更新、删除和测试功能。
- en: After loading our data and instantiating our `DatabaseHandler` class, we then
    have to define a query to create each of the five tables and execute these queries
    using the `DatabaseHandler.create_table` function. This is a very simple function
    that connects to our database, executes the query, and closes the connection,
    leaving us with the five tables shown in our database diagram; however, they are
    currently empty.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在加载数据并实例化我们的 `DatabaseHandler` 类之后，我们必须定义一个查询来创建每个五个表，并使用 `DatabaseHandler.create_table`
    函数执行这些查询。这是一个非常简单的函数，它连接到我们的数据库，执行查询，然后关闭连接，留下我们在数据库图中看到的五个表；然而，它们目前是空的。
- en: '[PRE1]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Following the initial table setup, we then run a quality check to ensure each
    of our datasets has the required ID column, populate the data from the dataframes
    into the appropriate table, and then test to ensure that the tables were populated
    correctly. The test_table function returns a dictionary that will be of the form
    `{‘table_exists’: True, ‘table_has_data’: True}` if the setup worked correctly.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '在初始表设置之后，我们接着运行一个质量检查以确保我们的每个数据集都有所需的 ID 列，将数据从数据框中填充到相应的表中，然后测试以确保表已正确填充。test_table
    函数返回一个字典，如果设置正确，其形式将为 `{‘table_exists’: True, ‘table_has_data’: True}`。'
- en: '[PRE2]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Getting Started with FastAPI
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始使用 FastAPI
- en: Now that we have our database set up and populated, we need to build the methods
    to access, update, and delete data, using FastAPI. FastAPI enables us to easily
    build standardized(and fast) API’s to enable interaction with our database. The
    FastAPI docs offer a great step-by-step tutorial that can be found [here](https://fastapi.tiangolo.com/tutorial/first-steps/).
    As a high-level summary, there are several great features that make FastAPI ideal
    for serving as the interaction layer between a database and a front-end application.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经设置了数据库并填充了数据，我们需要构建使用 FastAPI 访问、更新和删除数据的方法。FastAPI 使我们能够轻松地构建标准化的（并且快速）API，以便与我们的数据库进行交互。FastAPI
    文档提供了一个很好的逐步教程，可以在[这里](https://fastapi.tiangolo.com/tutorial/first-steps/)找到。作为一个高级概述，有几个出色的功能使
    FastAPI 成为数据库和前端应用程序之间交互层的理想选择。
- en: 'Standardization: FastAPI allows us to define routes to interact with our tables
    in a standardized way using `GET, POST, DELETE, UPDATE`, etc. methods. This standardization
    enables us to build a data access layer in pure Python that can then be interact
    with a wide variety of front-end application. We simply call the API methods we
    want in the front end, regardless of what language its constructed in.'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 标准化：FastAPI 允许我们使用 `GET, POST, DELETE, UPDATE` 等方法以标准化的方式定义路由来与我们的表交互。这种标准化使我们能够在纯
    Python 中构建数据访问层，然后可以与各种前端应用程序交互。我们只需在前端调用我们想要的 API 方法，而不管它是用哪种语言构建的。
- en: 'Data Validation: As we’ll show below, we need to define a Pydantic data model
    for each object we interact with(think our games and user tables). The main advantage
    of this is that it ensures all our variables have defined data types, for example,
    if we define our Game object such that the rating field is of type float and a
    user tries to make a post request to add a new entry with a rating of “great”
    it wont work. This built-in data validation will help us prevent all sorts of
    data quality issues from as our system scales.'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据验证：正如我们下面将要展示的，我们需要为每个我们与之交互的对象（例如我们的游戏和用户表）定义一个 Pydantic 数据模型。这个主要优势在于它确保了所有我们的变量都有定义的数据类型，例如，如果我们定义我们的
    Game 对象，使得评分字段是浮点型，而一个用户尝试通过发送一个包含“great”评分的新条目的 POST 请求，那么这将不会成功。这个内置的数据验证将帮助我们防止在系统扩展时出现各种数据质量问题。
- en: 'Asynchronous: FastAPI functions can run asynchronously, meaning one of them
    isn’t dependent on the other finishing. This can significantly improve the performance
    because we won’t have a slow Fast task waiting on a slow one to complete.'
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 异步：FastAPI 函数可以异步运行，这意味着其中一个函数不需要等待另一个函数完成。这可以显著提高性能，因为我们不会有一个慢速的 Fast 任务在等待一个慢速的任务完成。
- en: 'Swagger Docs Built In: FastAPI has a built-in UI that we can navigate to on
    localhost, enabling us to easily test and interact with our routes.'
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 内置 Swagger 文档：FastAPI 有一个内置的 UI，我们可以在本地主机上导航到它，使我们能够轻松地测试和交互我们的路由。
- en: FastAPI Models
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: FastAPI 模型
- en: 'The FastAPI portion of our project relies on two main files: models.py, which
    defines the data models that we’ll be interacting with (games, users, etc.), and
    main.py, which defines our actual FastAPI App and contains our routes. In the
    context of FastAPI, Routes define the different paths for processing requests.
    For example, we might have a `/games` route to request games from our database.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我们项目的 FastAPI 部分依赖于两个主要文件：models.py，它定义了我们将要交互的数据模型（游戏、用户等），以及 main.py，它定义了我们的实际
    FastAPI 应用程序并包含我们的路由。在 FastAPI 的上下文中，路由定义了处理请求的不同路径。例如，我们可能有一个 `/games` 路由来从我们的数据库请求游戏。
- en: 'First, let’s discuss our `models.py` file. In this file, we define all of our
    models. While we have different models for different objects the general approach
    will be the same so we’ll only discuss the games model, shown below, in detail.
    The first thing you’ll notice below is that we have two actual classes defined
    for our Game object: a `GameModel` class that inherits from the Pydantic base
    model, and a `Game` class that inherits from the `sqlalchemy declarative_base`.
    The natural question then is, why do we have two classes for one data structure(our
    game’s data structure)?'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们讨论我们的 `models.py` 文件。在这个文件中，我们定义了所有的模型。虽然我们为不同的对象定义了不同的模型，但总体方法将是相同的，所以我们将只详细讨论下面的游戏模型。下面你会注意到，我们为游戏对象定义了两个实际的类：一个继承自
    Pydantic 基础模型的 `GameModel` 类，以及一个继承自 `sqlalchemy declarative_base` 的 `Game` 类。那么，自然的问题是，为什么我们为一个数据结构（我们的游戏数据结构）有两个类呢？
- en: If we weren’t using an SQL database for this project and instead read each of
    our CSV files into a dataframe every time main.py was run, then we wouldn’t need
    the `Game` class, only the `GameModel` class. In this scenario, we would read
    in our games.csv dataframe, and FastAPI would use the `GameModel` class to ensure
    datatypes were correctly adhered to.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在这个项目中不使用 SQL 数据库，而是每次运行 main.py 时将每个 CSV 文件读入一个 dataframe，那么我们就不需要 `Game`
    类，只需要 `GameModel` 类。在这种情况下，我们将读取我们的 games.csv dataframe，FastAPI 将使用 `GameModel`
    类来确保数据类型被正确地遵守。
- en: However, because we are using an SQL database, it makes more sense to have separate
    classes for our API and our database, as the two classes have slightly different
    jobs. Our API class handles data validation, serialization, and optional fields,
    and our database class handles database-specific concerns like defining primary/foreign
    keys, defining which table the object maps to, and protecting secure data. To
    reiterate the last point, we might have sensitive fields in our database that
    are for internal consumption only, and we don’t want to expose them to a user
    through an API( password for example). We can address this concern by having a
    separate user-facing Pydantic class and an Internal SQL Alchemy one.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，因为我们使用的是 SQL 数据库，所以为我们的 API 和数据库使用单独的类更有意义，因为这两个类有略微不同的任务。我们的 API 类处理数据验证、序列化和可选字段，而我们的数据库类处理数据库特定的关注点，如定义主/外键、定义对象映射到的表，以及保护安全数据。为了重申最后一点，我们可能在数据库中有一些仅用于内部消费的敏感字段，我们不希望通过
    API（例如密码）暴露给用户。我们可以通过拥有一个面向用户的 Pydantic 类和一个内部 SQL Alchemy 类来解决这个问题。
- en: Below is an example of how this can be implemented for our `Games` object; we
    have separate classes defined for our other tables, which can be found [here](https://github.com/pinstripezebra/recommender_system/blob/main/src/models.py);
    however, the general structure is the same.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个如何为我们的 `Games` 对象实现此功能的示例；我们为其他表定义了单独的类，这些类可以在[这里](https://github.com/pinstripezebra/recommender_system/blob/main/src/models.py)找到；然而，总体结构是相同的。
- en: '[PRE3]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Setting Up FastAPI Routes
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置 FastAPI 路由
- en: After we have our Models defined, we can then create methods to interact with
    these models and request data from the database(GET), add data to the Database(POST),
    or remove data from the database(DELETE). Below is an example of how we can define
    a GET request for our games model. We have some initial setup at the beginning
    of our main.py function to fetch the database URL and connect to it. Then we initialize
    our app and add middleware to define which URLs we’ll accept requests from. Because
    we’ll be deploying the FastAPI project on Render and sending requests to it from
    our local machine, the only origin we’re allowing is localhost port 8000\. We
    then define our app.get method called fetch_products, which takes an appid input,
    queries our database for Game objects where appid is equal to our filtered appid,
    and returns these products.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们定义了模型之后，我们就可以创建方法来与这些模型交互，并从数据库中请求数据（GET），向数据库添加数据（POST），或从数据库中删除数据（DELETE）。下面是如何为我们的游戏模型定义
    GET 请求的示例。我们在 main.py 函数的开始处进行了一些初始设置，以获取数据库 URL 并连接到它。然后我们初始化我们的应用并添加中间件来定义我们将接受请求的
    URL。因为我们将在 Render 上部署 FastAPI 项目并从我们的本地机器向其发送请求，所以我们只允许 localhost 端口 8000 的请求。然后我们定义了一个名为
    fetch_products 的 app.get 方法，它接受一个 appid 输入，查询数据库中 appid 等于过滤后的 appid 的游戏对象，并返回这些产品。
- en: Note the below snipped contains just the setup and first get method, the rest
    are fairly similar and available on the Repo, so we won’t give an in-depth explanation
    for each one here.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 注意以下片段只包含设置和第一个获取方法，其余的都相当相似，可以在仓库中找到，所以这里不会对每个都进行深入解释。
- en: '[PRE4]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Once we have our main.py defined, we can finally run it from our base project
    directory using the command below.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们定义了`main.py`，我们就可以最终从我们的基础项目目录使用以下命令运行它。
- en: '[PRE5]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Once this is done, we can navigate to [http://127.0.0.1:8000/docs](http://127.0.0.1:8000/docs)
    and see the below interactive FastAPI environment. From this page, we can test
    any of our methods defined in our `main.py` file. In the case of our `fetch_products`
    function, we can pass it an appid and return any matching games from our database.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦完成这些，我们就可以导航到[http://127.0.0.1:8000/docs](http://127.0.0.1:8000/docs)并查看下面的交互式FastAPI环境。从该页面，我们可以测试我们在`main.py`文件中定义的任何方法。在我们的`fetch_products`函数的情况下，我们可以传递一个appid并从我们的数据库返回任何匹配的游戏。
- en: '![](../Images/ebd795bdeb0f2253cbdfe032313f77e4.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ebd795bdeb0f2253cbdfe032313f77e4.png)'
- en: 'Figure 6: FastAPI Swagger Docs'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 图6：FastAPI Swagger文档
- en: Building our Similarity Pipeline
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建我们的相似度管道
- en: 'We have our database set up and can access and update data via FastAPI; it’s
    now time to turn to the central feature of this project: a recommender pipeline.
    Recommender systems are a well-researched field, and we’re not adding any innovation
    here; however, this will offer a clear example of how to implement a basic recommender
    system using FastAPI.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经设置了数据库，可以通过FastAPI访问和更新数据；现在是时候转向这个项目的核心功能：推荐管道。推荐系统是一个经过充分研究的领域，我们在这里没有添加任何创新；然而，这将提供一个清晰的例子，说明如何使用FastAPI实现一个基本的推荐系统。
- en: Getting Started — How to Recommend Products?
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 入门 — 如何推荐产品？
- en: If we think about the question “How would I recommend new products that a user
    will like?”, there are two approaches that make intuitive sense.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们考虑问题“我该如何推荐用户可能会喜欢的新的产品？”，有两种直观的方法。
- en: 'Collaborative Recommendation Systems: If I have a series of users and a series
    of products, I could identify users with similar interests by looking at their
    overall basket of products and then identify products ‘missing’ from a given user’s
    basket. For example, if I have users 1–3 and products A-C, users 1–2 like all
    three products, but user 3 has thus far only liked products A + B, then I might
    recommend them product C. This logically makes sense; all three users have a high
    degree of overlap in products that they’ve liked, but product C is missing from
    user 3’s basket, there’s a high likelihood that they would like it as well. This
    process of generating recommendations by comparing like users is called collaborative
    filtering.'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 协同推荐系统：如果我有一系列用户和一系列产品，我可以通过查看他们的整体产品篮子来识别具有相似兴趣的用户，然后识别给定用户篮子中“缺失”的产品。例如，如果我有一系列用户1-3和产品A-C，用户1-2喜欢所有三个产品，但用户3迄今为止只喜欢产品A
    + B，那么我可能会推荐他们产品C。这从逻辑上是有道理的；这三个用户在他们喜欢的产品上有很高的重叠度，但产品C在用户3的篮子中缺失，他们很可能也会喜欢它。通过比较喜欢相同产品的用户来生成推荐的过程称为协同过滤。
- en: 'Content-Based Recommendation System: If I have a series of products, I could
    identify products that are similar to products that a user has liked and recommend
    those products. For example, if I have a series of tags for each game, I could
    convert each game’s series of tags into a vector of 1s and 0s and then use a similarity
    measure (in this case, a [cosine similarity measure](https://en.wikipedia.org/wiki/Cosine_similarity))
    to measure the similarity between games based on their vectors. Once I have done
    this, I can then return the top N most similar games to those liked by a user
    based on their similarity score.'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 基于内容的推荐系统：如果我有一系列产品，我可以识别出与用户喜欢的产品相似的产品，并推荐这些产品。例如，如果我为每个游戏有一系列标签，我可以将每个游戏的标签系列转换为1和0的向量，然后使用相似度度量（在这种情况下，是[余弦相似度度量](https://en.wikipedia.org/wiki/Cosine_similarity)）来衡量基于它们的向量之间的相似度。一旦我完成了这个，我就可以根据用户的相似度分数返回用户喜欢的最相似的前N个游戏。
- en: More on Recommender Systems can be found [here](https://en.wikipedia.org/wiki/Recommender_system).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 更多关于推荐系统的内容可以在[这里](https://en.wikipedia.org/wiki/Recommender_system)找到。
- en: Because our initial dataset doesn’t have a large volume of users, we don’t have
    the necessary data to suggest items based on user similarity, which is known as
    a [cold start problem](https://en.wikipedia.org/wiki/Cold_start_(recommender_systems).
    As a result, we will instead develop a content-based recommender system as we
    have a significant amount of game data to work with.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们的初始数据集没有大量的用户，我们没有基于用户相似性建议项目的必要数据，这被称为[冷启动问题](https://en.wikipedia.org/wiki/Cold_start_(recommender_systems)。因此，我们将开发一个基于内容的推荐系统，因为我们有大量的游戏数据可以处理。
- en: 'To build our pipeline, we have to address two challenges: (1) How do we go
    about calculating similarity scores for a user, and (2) how do we automate this
    to run whenever a user makes an update to their games?'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 为了构建我们的管道，我们必须解决两个挑战：（1）我们如何计算用户的相似度得分，以及（2）我们如何自动化这个过程，以便在用户更新他们的游戏时运行？
- en: We’ll go over how a similarity pipeline can be triggered each time a user makes
    a POST request by ‘liking’ a game, and then cover how to build the pipeline itself.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将讲解每次用户通过“喜欢”一个游戏来发起POST请求时，如何触发相似度管道，然后介绍如何构建管道本身。
- en: Tying Recommender Pipeline to FastAPI
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将推荐管道与FastAPI绑定
- en: For now, imagine we have a Recommendation Service that will update our `user_recommendation`
    table. We want to ensure that this service is called whenever a user updates their
    preferences. We can implement this in a couple of steps as shown below; first,
    we define a `generate_recommendations_background` function, this function is responsible
    for connecting to our database, running the similarity pipeline, and then closing
    the connection. Next, we need to ensure this is called when a user makes a post
    request(i.e., likes a new game); to do this, we simply add the function call at
    the end of our `create_user_game` post request function.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，假设我们有一个推荐服务，它将更新我们的 `user_recommendation` 表。我们希望确保每当用户更新他们的偏好时，这个服务都会被调用。我们可以通过以下步骤实现这一点；首先，我们定义一个
    `generate_recommendations_background` 函数，这个函数负责连接到我们的数据库，运行相似度管道，然后关闭连接。接下来，我们需要确保当用户发起POST请求（即喜欢一个新的游戏）时调用这个函数；为此，我们只需在
    `create_user_game` POST请求函数的末尾添加函数调用即可。
- en: The result of this workflow is that whenever a user makes a post request to
    our `user_game table`, they call the `create_user_game` function, add a new `user_game`
    object to the database, and then run the similarity pipeline as a background function.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这个工作流程的结果是，每当用户向我们的 `user_game` 表发起POST请求时，他们会调用 `create_user_game` 函数，向数据库添加一个新的
    `user_game` 对象，然后作为后台函数运行相似度管道。
- en: 'Note: The Below post method and helper function are stored in main.py with
    the rest of our FastAPI methods.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：下面的POST方法和辅助函数存储在 `main.py` 中，与我们的其他FastAPI方法一起。
- en: '[PRE6]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Building Recommender Pipeline
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建推荐管道
- en: Now that we understand how our similarity pipeline can be triggered when a user
    updates their liked games, it’s time to dive into the mechanics of how the recommendation
    pipeline works. Our recommendation pipeline is stored in `similarity_pipeline.py`
    and contains our `UserRecommendationService` class that we showed how to import
    and instantiate above. This class contains a series of helper functions that are
    ultimately all called in the `generate_recommendations_for_user` method. There
    are 7 basic steps called in order that we’ll walk through one by one.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了当用户更新他们喜欢的游戏时，我们的相似度管道是如何被触发的，现在是时候深入了解推荐管道的工作机制了。我们的推荐管道存储在 `similarity_pipeline.py`
    文件中，并包含我们上面展示的 `UserRecommendationService` 类。这个类包含一系列辅助函数，这些函数最终都会在 `generate_recommendations_for_user`
    方法中被调用。按照顺序，有7个基本步骤，我们将逐一进行讲解。
- en: 'Fetching a user’s Games: To generate similar game recommendations, we need
    to retrieve the games that a user has already added to their game basket. This
    is done by calling our `fetch_user_games` helper function. This function queries
    our `user_games` table using the user’s ID, which is making the post request as
    an input, and returning all games in their basket.'
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取用户的游戏：为了生成类似游戏的推荐，我们需要检索用户已经添加到游戏篮中的游戏。这是通过调用我们的 `fetch_user_games` 辅助函数来完成的。这个函数使用用户的ID（作为发起POST请求的输入）查询我们的
    `user_games` 表，并返回他们篮子中的所有游戏。
- en: 'Fetching game tags: To compare games, we need a dimension to compare them on,
    and that dimension is the tags associated with each game(strategy, board game,
    etc.). To retrieve the game:tag mapping, we call our `fetch_all_game_tags` function,
    which returns the tags for all the games in our database'
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取游戏标签：为了比较游戏，我们需要一个维度来进行比较，这个维度就是每个游戏关联的标签（策略、桌面游戏等）。为了检索游戏：标签映射，我们调用 `fetch_all_game_tags`
    函数，该函数返回我们数据库中所有游戏的标签。
- en: 'Vectorizing game tags: To compare the similarity between games A and B, we
    first need to vectorize the game tags using our `create_game_vectors` function.
    This function takes a series of all tags in alphabetical order and checks if each
    of the tags is associated with a given game. For example, if our total set of
    tags was [boardgame, deckbuilding, resource-management] and game 1 just had the
    boardgame tag associated with it, then its vector would be [1, 0, 0].'
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向量化游戏标签：为了比较游戏A和B之间的相似性，我们首先需要使用我们的`create_game_vectors`函数将游戏标签向量化。此函数接受一系列按字母顺序排列的所有标签，并检查每个标签是否与给定的游戏相关联。例如，如果我们的总标签集是[boardgame,
    deckbuilding, resource-management]，而游戏1仅与boardgame标签相关联，那么它的向量将是[1, 0, 0]。
- en: 'Creating our users vector: once we have a vector representing each game, we
    then need an aggregate user vector to compare it to. To achieve this, we use our
    `create_user_vector` function, which generates an aggregate vector of the same
    length as our game vectors that we can then use to generate a similarity score
    between our user and every other game.'
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建我们的用户向量：一旦我们有一个代表每个游戏的向量，我们还需要一个聚合用户向量来与之比较。为了实现这一点，我们使用我们的`create_user_vector`函数，该函数生成一个与我们的游戏向量相同长度的聚合向量，然后我们可以使用它来生成用户与每个其他游戏之间的相似度得分。
- en: 'Calculate Similarity: We use the vectors created in steps 3 and 4 in our calculate_user_recommendations,
    which calculates a cosine similarity score ranging from 0–1 and measuring the
    similarity between each game and our user aggregate games'
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算相似度：我们在`calculate_user_recommendations`步骤3和4中使用了创建的向量，该函数计算一个0到1之间的余弦相似度得分，并衡量每个游戏与我们的用户聚合游戏之间的相似度。
- en: 'Deleting old Recommendations: Before we populate our `user_recommendations`
    table with new recommendations for a user, we first have to delete the old ones
    with `delete_existing_recommendations`. This deletes just the recommendations
    for the user who made the post request; the others remain the same.'
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 删除旧推荐：在我们用新的推荐填充用户的`user_recommendations`表之前，我们首先必须使用`delete_existing_recommendations`删除旧的推荐。这将仅删除发起POST请求的用户推荐；其他保持不变。
- en: 'Populate new Recommendations: After deleting the old recommendations, we then
    populate the new ones with `save_recommendations`.'
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 填充新的推荐：在删除旧推荐后，我们使用`save_recommendations`填充新的推荐。
- en: '[PRE7]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Wrapping Up
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: In this article, we covered how to set up a PostgreSQL database and FastAPI
    application to run a game recommender system. However, we haven’t yet gone over
    how to deploy this system to a cloud service to allow others to interact with
    it. For part two covering exactly this, read on in [Part 2](https://towardsdatascience.com/building-a-video-game-recommender-system-with-fastapi-postgresql-and-render-part-2).
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们介绍了如何设置 PostgreSQL 数据库和 FastAPI 应用程序以运行游戏推荐系统。然而，我们还没有讨论如何将此系统部署到云服务以允许他人与之交互。要了解第二部分，请继续阅读[第二部分](https://towardsdatascience.com/building-a-video-game-recommender-system-with-fastapi-postgresql-and-render-part-2)。
