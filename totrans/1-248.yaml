- en: 'Building Video Game Recommender Systems with FastAPI, PostgreSQL, and Render:
    Part 1'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/building-video-game-recommender-systems-with-fastapi-postgresql-and-render-part-1/](https://towardsdatascience.com/building-video-game-recommender-systems-with-fastapi-postgresql-and-render-part-1/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758671252006" class="mdspan-comment">Recommender systems</mdspan>
    enable an application to generate intelligent suggestions for a user, effectively
    sorting relevant content out from the rest. In this article, we build and deploy
    a dynamic video game recommender system leveraging PostgreSQL, FastAPI, and Render
    to recommend new games for a user based on those they’ve interacted with. The
    intent is to provide a clear example of how a standalone recommender system can
    be constructed, which could then be tied into a front-end system or other application.
  prefs: []
  type: TYPE_NORMAL
- en: For this project, we use video game data accessible from Steams API but this
    could easily be replaced by whatever product data you’re interested in, the key
    steps will be the same. We’ll cover how to store this data in a Database, vectorize
    the game Tags, generate similarity scores based on the games a user has interacted
    with, and return a series of relevant recommendations. At the end of this article,
    we’ll have this recommender system deployed as a Web Application with FastAPI
    such that whenever a user interacts with a new Game, we can dynamically generate
    and store a new set of recommendations for that user.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following tools will be used:'
  prefs: []
  type: TYPE_NORMAL
- en: PostgreSQL
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: FastAPI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Docker
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Render
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Those just interested in the GitHub repository can find it [here](https://github.com/pinstripezebra/recommender_system).
  prefs: []
  type: TYPE_NORMAL
- en: Table of Contents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Due to the length of this project, it’s divided into two articles. The first
    portion covers the setup and theory behind this project (steps 1–5 shown below),
    and the second part covers deploying it. If you’re looking for the second part
    it’s located [here](https://towardsdatascience.com/building-a-video-game-recommender-system-with-fastapi-postgresql-and-render-part-2).
  prefs: []
  type: TYPE_NORMAL
