- en: Why Your A/B Test Winner Might Just Be Random Noise
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么你的A/B测试赢家可能只是随机噪声
- en: 原文：[https://towardsdatascience.com/why-your-a-b-test-winner-might-just-be-random-noise/](https://towardsdatascience.com/why-your-a-b-test-winner-might-just-be-random-noise/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-your-a-b-test-winner-might-just-be-random-noise/](https://towardsdatascience.com/why-your-a-b-test-winner-might-just-be-random-noise/)
- en: <mdspan datatext="el1757982441828" class="mdspan-comment">I’ve been posting
    more about randomness</mdspan> lately but it’s truly a topic that fascinates me
    and that’s why I keep on doing it.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757982441828" class="mdspan-comment">最近我更多地发布了关于随机性的内容</mdspan>，但这是一个真正让我着迷的话题，这也是我为什么一直坚持写下去的原因。
- en: In today’s post I want to see how it affects and fools us in our A/B tests,
    by using a fictional example to illustrate better what I’m trying to share.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天的文章中，我想看看它如何影响和欺骗我们在A/B测试中的判断，通过使用一个虚构的例子来更好地说明我想分享的内容。
- en: Yes, it’ll be football-based, but stay with me because this applies to every
    single field where A/B testing is possible (and that’s every field that exists).
    Plus, at the end, I try to generalize it so we don’t talk football all the time.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，这将是基于足球的，但请跟我一起，因为这在每个可以进行A/B测试的领域都适用（也就是所有存在的领域）。而且，最后，我会尽量将其推广，这样我们就不必总是谈论足球了。
- en: Hope you enjoy it!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你们喜欢它！
- en: A Surprising Win
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 意外的胜利
- en: There’s a new coach in our favorite team and he loves data. So much so, that
    every decision he makes is based on it, and none is uninformed.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最喜欢的球队来了位新教练，他热爱数据。如此之爱，以至于他做的每一个决定都是基于数据的，没有任何一个决定是无知的。
- en: 'The team is famous for being the slowest in the league, which has horrible
    consequences: they receive the most counterattacks (and goals from those situations).
    That’s the main reason why they lose most matches, because they do well tactically
    but can’t stop those fast breaks.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这支球队以联赛中最慢而闻名，这有可怕的影响：他们收到最多的反击（以及由此产生的进球）。这就是他们输掉大多数比赛的主要原因，因为他们战术上做得很好，但无法阻止那些快速的反击。
- en: So the new coach, very methodical and experienced, thinks that a good warm up
    is key to make people run faster. But he wants to prove it and he decides to run
    a typical A/B test.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这位新教练，非常有条理且经验丰富，认为良好的热身是让人们跑得更快的关键。但他想证明这一点，并决定进行一次典型的A/B测试。
- en: 'The A/B test is simple: the squad is divided in two groups where one keeps
    on warming up as usual (group A) while the other is instructed a new warm-up routine
    (group B).'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: A/B测试很简单：队伍被分成两组，其中一组像往常一样继续热身（A组），而另一组则被要求进行新的热身程序（B组）。
- en: After only four weeks, group B’s sprint times are 8% faster. Clear win? Or maybe
    just randomness.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 仅经过四周，B组的冲刺时间快了8%。这是明显的胜利？还是只是随机性？
- en: 'It’s just like the monkeys and typewriter analogy: gather an infinite number
    of monkeys with typewriters and you’ll be certain at least one will come up with
    the Iliad.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像猴子打字机的类比：聚集无限数量的猴子使用打字机，你一定会确信至少有一只会打出《伊利亚特》。
- en: Hence that lucky monkey achieving that seemingly impossible outcome will be
    perceived as a genius—yet it will most probably be pure randomness.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，那只幸运的猴子实现了看似不可能的结果，会被认为是天才——然而这很可能是纯粹的随机性。
- en: 'In the case of the 8% improvement in sprint time, the same thing can happen:
    the coach might have been fooled by randomness by believing the new warm-up justifies
    the improvement (without doing any other check).'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在8%的冲刺时间改进的案例中，同样的事情也可能发生：教练可能被随机性欺骗，相信新的热身可以证明改进（而没有进行其他检查）。
- en: 'The Problem: Random Noise Looks Like a Win'
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题：随机噪声看起来像是胜利
- en: On paper our coach’s test looks convincing. The sprinting performance has increased
    as the group B’s average has improved by 8% in only four weeks.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在纸面上，我们教练的测试看起来很有说服力。冲刺表现有所提高，因为B组的平均成绩在四周内提高了8%。
- en: The team is willing to adhere to the new warm-up routine as soon as possible.
    They believe it can save them from relegation.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 团队愿意尽快遵守新的热身程序。他们相信这可以让他们免于降级。
- en: But small datasets like the team’s can be really dangerous. After all, there
    are only 24 members in the squad and one unusually good or tired session can swing
    the averages dramatically.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 但像球队这样的小数据集可能非常危险。毕竟，队伍中只有24名成员，一次异常好的或疲惫的训练课可能会极大地影响平均值。
- en: Add in the intangibles like mood, sleep quality, motivation, weather and even
    the time of day. With such a randomness-prone environment, the odds of finding
    *something* “significant” by chance shoot up.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 再加上一些无形因素，如情绪、睡眠质量、动力、天气甚至一天中的时间。在这样的随机性环境中，偶然发现“某种”显著结果的几率会大幅上升。
- en: This is exactly the same trap online marketers fall into when they test dozens
    of ad variants and crown whichever one looks best after a few days. It was all
    luck, probably.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是网络营销人员在测试数十个广告变体并在几天后选择看起来最好的一个时陷入的陷阱。这完全是运气，可能吧。
- en: 'Just like the monkeys: the more monkeys (ad variants), the more chances of
    having one outperforming monkey (variation).'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 就像猴子一样：猴子（广告变体）越多，出现一个表现优于其他猴子的机会就越大。
- en: Now, I’m not stating that the new warm-up routine isn’t working, or that the
    winning ad variant is mediocre. What I mean with all this is that without careful
    design and analysis, a one-off spike can masquerade as a breakthrough.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我并不是说新的热身程序不起作用，或者获胜的广告变体平庸。我通过所有这些想表达的是，如果没有仔细的设计和分析，一次性的峰值可能会伪装成突破。
- en: What looks like a “winner” may simply be random noise.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来像是“赢家”的东西可能只是随机噪声。
- en: How to Tell Signal from Noise
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何区分信号和噪声
- en: Once the coach was aware of the potential problem, he came to us. He wanted
    to learn how to tell if the results were reliable or not.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦教练意识到潜在的问题，他就来找我们。他想了解如何判断结果是否可靠。
- en: 'The short answer to tell signal from noise is to make your analyses more complex.
    But let’s see some ways to do so:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 简短的回答是，要区分信号和噪声，就要使你的分析更加复杂。但让我们看看一些实现这一目标的方法：
- en: '**Pre-define your hypothesis and metric**. Don’t do like the coach who just
    performed the tests without defining what success meant for him. It’s when he
    saw an 8% that he decided it was good… But what if it’d had been a 5% or 3%? Would
    he had considered them good enough to accept the hypothesis?'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预先定义你的假设和指标**。不要像那个没有定义成功对他意味着什么的教练那样只进行测试。当他看到8%时，他决定这是好的……但如果是5%或3%呢？他会认为它们足够好，可以接受假设吗？'
- en: '**Randomize fairly**. Both groups have to be properly balanced. In the case
    of our team, they were balanced for age, position, and injury history so one side
    isn’t advantaged from the start.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公平随机化**。两组都必须得到适当的平衡。在我们的团队中，他们在年龄、位置和受伤历史方面进行了平衡，这样一方就不会从一开始就获得优势。'
- en: '**Use crossover or repeated-measures design**.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用交叉或重复测量设计**。'
- en: '**Track context variables**. The coach failed to record fatigue scores, weather,
    and workload so he couldn’t to adjust for confounders.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跟踪上下文变量**。教练未能记录疲劳分数、天气和工作量，因此他无法调整混杂因素。'
- en: '**Apply appropriate statistics**. Yup, don’t stick to the basic stuff. Correct
    for multiple comparisons, or use Bayesian or hierarchical models that handle small,
    variable datasets more gracefully.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用适当的统计方法**。是的，不要只停留在基本的东西上。纠正多重比较，或者使用贝叶斯或层次模型，这些模型可以更优雅地处理小型、可变的数据集。'
- en: '**Look for replication**. This is one of the most important points: if the
    result holds when the coach repeats the test in another block or season, it’s
    more likely to be real (yet not enough to determine it).'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**寻找重复性**。这是最重要的要点之一：如果教练在另一个区块或赛季重复测试结果仍然成立，那么它更有可能是真实的（但这还不足以确定它）。'
- en: So our advice to the coach after telling him all these tips would be to alternate
    routines every month and analysing performance across several cycles, rather than
    declaring victory after one single block.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在告诉他所有这些技巧之后，我们给教练的建议是每月交替进行常规训练，并在几个周期内分析表现，而不是在单个区块之后宣布胜利。
- en: Generalizing Beyond Sports
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超越体育的泛化
- en: The warm-up story is just a vivid case study, but the same pitfalls show up
    in every single A/B test one performs.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 热身的故事只是一个生动的案例研究，但同样的陷阱出现在每个进行的A/B测试中。
- en: Just like the one we mentioned in marketing, where one ad variant outperforms
    the rest after a few thousand impressions but, once chosen and implemented, we
    see that it’s no longer performing as expected.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们在营销中提到的，一个广告变体在几千次展示后优于其他所有变体，但一旦被选中并实施，我们就看到它不再按预期表现。
- en: 'Or another example, now in the healthcare world: experts often see small pilot
    trials produce dramatic effects that vanish in larger randomized controlled trials
    (that’s why they do them, btw).'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 或者另一个例子，现在在医疗保健领域：专家们经常看到小型的试点试验产生戏剧性的效果，但这些效果在大型的随机对照试验中消失了（顺便说一句，这就是他们为什么要进行这些试验的原因）。
- en: 'The pattern is always the same: random variation creates illusions of success.
    And the antidote is also the same: careful experimental design, appropriate statistical
    corrections, and replication.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 模式始终相同：随机变化创造了成功的幻觉。而对抗这种幻觉的方法也是相同的：仔细的实验设计，适当的统计修正，以及重复性。
- en: Please, don’t confuse a monkey’s lucky keystrokes with Shakespeare.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 请不要把猴子的幸运按键与莎士比亚混淆。
- en: Closing
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束语
- en: Group B’s gains looked like magic. But without proper controls, that magic can
    vanish faster than a greased pig. A/B testing is powerful, but only if you treat
    randomness as an opponent to outsmart and not a fluke to celebrate.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: B组的进步看起来像是魔术。但如果没有适当的控制，这种魔术可能比涂了油的猪跑得还快。A/B测试很强大，但只有当你将其视为一个需要智胜的对手而不是值得庆祝的偶然事件时。
- en: Don’t be fooled.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 不要被骗。
- en: 'As for the coach: he listened us and performed the tests properly, failing
    to see an improvement with the new warm-up and therefore being unable to make
    the team faster.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 至于教练：他听了我们的意见并正确地进行了测试，但未能看到新的热身运动带来的改进，因此无法使球队变得更快。
- en: They avoided relegation, though, by playing an extremely-defensive style that
    just didn’t create fast break opportunities for the opponents.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 他们通过采取极端防守的战术避免了降级，但这种战术并没有为对手创造出快速反击的机会。
- en: Happy ending, I guess.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我想这应该是个幸福的结局。
