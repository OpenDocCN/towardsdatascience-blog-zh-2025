- en: 'The Automation Trap: Why Low-Code AI Models Fail When You Scale'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-automation-trap-why-low-code-ai-models-fail-when-you-scale/](https://towardsdatascience.com/the-automation-trap-why-low-code-ai-models-fail-when-you-scale/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In the <mdspan datatext="el1747423377801" class="mdspan-comment">beginning</mdspan>,
    building machine learning models was a skill only data scientists with knowledge
    of Python could master. However, low-code AI platforms have made things much easier
    now.
  prefs: []
  type: TYPE_NORMAL
- en: Anyone can now directly make a model, link it to data, and publish it as a web
    service with just a few clicks. Marketers can now develop customer segmentation
    models, user support teams can implement chatbots, and product managers can automate
    the process of predicting sales without having to write code.
  prefs: []
  type: TYPE_NORMAL
- en: Even so, this simplicity has its downsides.
  prefs: []
  type: TYPE_NORMAL
- en: A False Start at Scale
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When a mid-sized e-commerce company introduced its first machine learning model,
    it went for the quickest route: a low-code platform. The data team quickly built
    a product recommendation model with Microsoft Azure ML Designer. There was no
    need for coding or a complicated setup, and the model was up and running in only
    a few days.'
  prefs: []
  type: TYPE_NORMAL
- en: When staged, it did well, recommending relevant products and maintaining user
    interest. However, when 100,000 people used the app, it faced problems. Response
    times tripled. Recommendations were only shown twice, or they did not appear at
    all. Eventually, the system crashed.
  prefs: []
  type: TYPE_NORMAL
- en: The issue wasn’t the model that was being used. It was the platform.
  prefs: []
  type: TYPE_NORMAL
- en: '[Azure ML Designer](https://learn.microsoft.com/en-us/azure/machine-learning/concept-designer?view=azureml-api-2)
    and AWS SageMaker Canvas are designed to operate fast. Thanks to their easy-to-use
    drag-and-drop tools, anyone can use machine learning. However, the simplicity
    that makes them easy to work with also covers their weaknesses. Tools that start
    as simple prototypes fail when they are put into high-traffic production, and
    this happens due to their structure.'
  prefs: []
  type: TYPE_NORMAL
- en: The Illusion of Simplicity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Low-code AI tools are promoted to people who are not technology experts. They
    take care of the complex parts of data preparation, feature creation, training
    the model, and using it. Azure ML Designer makes it very quickly possible for
    users to import data, build a model pipeline, and deploy the pipeline as a web
    service.
  prefs: []
  type: TYPE_NORMAL
- en: However, having an abstract idea is both positive and negative.
  prefs: []
  type: TYPE_NORMAL
- en: 'Resource Management: Limited and Invisible'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most low-code platforms run models on pre-set compute environments. The amount
    of CPU, GPU, and memory that users can access is not adjustable. These limits
    work well in most cases, but they become a problem when there is a surge in traffic.
  prefs: []
  type: TYPE_NORMAL
- en: An educational technology platform using AWS SageMaker Canvas created a model
    that could classify student responses as they were submitted. During testing,
    it performed perfectly. Yet, as the number of users reached 50,000, the model’s
    API endpoint failed. It was found that the model was being run on a basic compute
    instance, and the only solution to upgrade it was to rebuild all the workflows.
  prefs: []
  type: TYPE_NORMAL
- en: 'State Management: Hidden but Dangerous'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Because low-code platforms keep the model state between sessions, they are fast
    for testing but can be risky in real-life use.
  prefs: []
  type: TYPE_NORMAL
- en: A chatbot for retail was created in Azure ML Designer so that user data would
    be maintained during each session. While testing, I felt that the experience was
    made just for me. However, in the production environment, users started receiving
    messages that were meant for someone else. The issue? It stored information about
    the user’s session, so each user would be treated as a continuation of the one
    before.
  prefs: []
  type: TYPE_NORMAL
- en: 'Limited Monitoring: Blindfolded at Scale'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Low-code systems give basic results, such as accuracy, AUC, or F1 score, but
    these are measures for testing, not for running the system. It is only after incidents
    that teams discover that they cannot track what is essential in the production
    environment.
  prefs: []
  type: TYPE_NORMAL
- en: A logistics startup implemented a demand forecasting model using Azure ML Designer
    to help with route optimization. All was good until the holidays arrived, and
    the requests increased. Customers complained of slow responses, but the team could
    not see how long the API took to respond or find the cause of the errors. The
    model could not be opened up to see how it worked.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5685ecae8e9305293899783655b2c6de.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Scalable vs. Non-Scalable Low-Code Pipeline (Image by author)**'
  prefs: []
  type: TYPE_NORMAL
- en: Why Low-Code Models Have Trouble Handling Large Projects
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Low-code AI systems cannot be scaled, as they lack the key components of strong
    machine learning systems. They are popular because they are fast, but this comes
    with a price: the loss of control.'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Resource Limits Become Bottlenecks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Low-code models are used in environments that have set limits on computing resources.
    As time passes and more people use them, the system slows down or even crashes.
    If a model has to deal with a lot of traffic, these constraints will likely cause
    significant problems.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Hidden State Creates Unpredictability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: State management is usually not something you must consider in low-code platforms.
    The values of variables are not lost from one session to another for the user.
    It is suitable for testing, but it becomes disorganised once multiple users employ
    the system simultaneously.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Poor Observability Blocks Debugging
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Low-code platforms give basic information (such as accuracy and F1 score) but
    do not support monitoring the production environment. Teams cannot see API latency,
    how resources are used, or how the data is input. It is not possible to detect
    the issues that arise.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cca1a479a3a6704a59883e2187bdb2d7.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Low-Code AI Scaling Risks – A Layered View (Image by author)**'
  prefs: []
  type: TYPE_NORMAL
- en: A list of factors to consider when making low-code models scalable
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Low-code does not automatically mean the work is easy, especially if you want
    to grow. It is essential to remember scalability from the beginning when making
    an ML system with low-code tools.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Think about scalability when you first start designing the system.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can use services that provide auto-scaling, such as Azure Kubernetes Service
    in Azure ML and SageMaker Pipelines in AWS.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Avoid default compute environments. Go for instances that can handle more memory
    and CPU as needed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. Isolate State Management
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To use session-based models like chatbots, ensure user data is cleared after
    every session.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that web services handle each request independently, so they do not pass
    on information accidentally.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3\. Watch production numbers as well as model numbers.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Monitor your API’s response time, the number of requests that fail, and the
    resources the application uses.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use PSI and KS-Score to find out when the inputs to your system are not standard.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Focus on the business’s results, not only on the technical numbers (conversion
    rates and sales impact).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4\. Implement Load Balancing and Auto-Scaling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Place your models as managed endpoints with the help of load balancers (Azure
    Kubernetes or AWS ELB).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can set auto-scaling guidelines depending on CPU load, number of requests,
    or latency.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5\. Version and Test Models Continuously
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Make sure that every model is given a new version every time it is changed.
    Before releasing a new version to the public, it should be checked in staging.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Perform A/B testing to check how the model works without upsetting the users.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When Low-Code Models Work Well
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Low-code tools do not have any significant flaws. They are powerful for:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rapid prototyping means giving priority to speed over stable results.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Analytics that are done inside the system, where the potential for failure is
    minimal.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Simple software is valuable in schools since it speeds up the learning process.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A group of people at a healthcare startup built a model using [AWS SageMaker
    Canvas](https://aws.amazon.com/sagemaker-ai/canvas/) to catch medical billing
    errors. The model was created just for internal reporting, so it didn’t need to
    scale up and could easily be used. It was a perfect case for using low-code.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Low-code AI platforms provide instant intelligence, as they do not require any
    coding. However, when the business grows, its faults are revealed. Some issues
    are insufficient resources, information seeping out, and limited visibility. These
    issues cannot be solved just by making a few clicks. They are architectural issues.
  prefs: []
  type: TYPE_NORMAL
- en: When beginning a low-code AI project, consider whether it will be used as a
    prototype or a marketable product. If the latter, low-code should only be your
    initial tool, not the final solution.
  prefs: []
  type: TYPE_NORMAL
