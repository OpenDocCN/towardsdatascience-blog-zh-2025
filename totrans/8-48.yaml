- en: Analyzing Health Surveys Made Easy with Functions in R
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/analyzing-health-surveys-made-easy-with-functions-in-r-9f2ec1b8fb40/](https://towardsdatascience.com/analyzing-health-surveys-made-easy-with-functions-in-r-9f2ec1b8fb40/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Have you ever pooled many health surveys which have a complex sampling design
    and include variables such as primary sampling unit (PSU), stratum, and sampling
    weights? Only to find that some of these surveys did not have any of these variables
    at all (e.g., PSU and sampling weights only, not stratum)? Here’s an efficient
    solution packing the datasets in a list and applying functions that will deliver
    the results you’re looking for.*'
  prefs: []
  type: TYPE_NORMAL
- en: '![Photo by Scott Graham on Unsplash](../Images/3fbe62d4c629d1ff7c0594dfd9ebc7a1.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Scott Graham](https://unsplash.com/@homajob?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: In a pooled dataset of many health surveys, some of which may not have all three
    variables (PSU, stratum, and sampling weights), if you were to conduct a complete-case
    analysis, you will only keep the datasets with data for the three variables. This
    might lead to a substantial sample size reduction as we will need to exclude the
    datasets with, for example, PSU and sampling weights but without data for the
    stratum variable.
  prefs: []
  type: TYPE_NORMAL
- en: My solution? To analyze each dataset independently, leveraging whatever variable
    they have (e.g., PSU and sampling weights only, not stratum). Unfortunately, analyzing
    each dataset at a time will be inefficient. However, having faced this issue several
    times in over seven years of professional experience in research and dozens of
    peer-reviewed papers utilizing health surveys, I came up with a set of functions
    and steps.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Drop missing observations in PSU, stratum, and sampling weights, if the number
    of missing values is different from the sample size of such a dataset. In other
    words, if there is a dataset of 100 observations and 20 had missing data in PSU,
    I will exclude these 20 observations. Conversely, if the number of missing values
    in PSU were 100 (i.e., PSU completely empty), I will keep the dataset as is. Because
    this would suggest that the PSU variable was not available by design or simply
    not included with the dataset, as it may be the case with datasets we download.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In each of the surveys, I will create a new variable called `type` which will
    identify whether one of the three variables was completely missing, two were completely
    missing, three were completely missing, and all possible combinations. For example,
    `type` = 1 if all three variables were present, `type` = 2 if stratum and sampling
    weights were missing, and so forth.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Compute the metrics of interest using whatever variable(s) was available. This
    will leverage the information in the `type` variable created in the previous step.
    For example, if `type` flagged this dataset as only having PSU and sampling weights,
    for that specific dataset, we will compute the results leveraging those two variables,
    whereas for other datasets which have the three variables complete, the results
    will be computed using the PSU, stratum, and sampling weights.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The trick is to put every dataset inside a list and apply the functions to each
    element in the list (i.e., to each dataset or survey in the list). That way, you
    can also work with each dataset independently if needed.
  prefs: []
  type: TYPE_NORMAL
- en: First, I will explain each function and what they do. Then, I will provide a
    practical example using the functions.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**A.** **Deal with the missing values**'
  prefs: []
  type: TYPE_NORMAL
- en: These functions, when applied to each dataset, will exclude missing observations
    if the number of missing values is different from the total number of observations
    in the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if the dataset has 100 people and 20 were missing the PSU variable,
    these 20 observations will be dropped. Conversely, if 100 people were missing
    the PSU variable, we will keep the dataset as is.
  prefs: []
  type: TYPE_NORMAL
- en: This approach assumes that, if all observations had missing data for the PSU
    variable, it is because that was the case by design, or this information was not
    provided with the dataset. In either case, there is little or nothing we can do.
    But we can still leverage whatever information is available. That is, if PSU is
    completely missing but the dataset has stratum and sampling weights, we can leverage
    these variables in our analysis.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**B.** **Flagging the datasets**'
  prefs: []
  type: TYPE_NORMAL
- en: We have excluded the few observations with missing data for either PSU, stratum,
    and sampling weights, and yet we have kept the datasets that had all missing values
    for either of these variables.
  prefs: []
  type: TYPE_NORMAL
- en: In this step, we will create a new variable that will flag each dataset according
    to the variables it has. For example, we will identify if the dataset has all
    three variables, only one (e.g., PSU only), only two (e.g., PSU and sampling weights
    only), and all possible pair-wise combinations (e.g., PSU and sampling weights
    but not stratum).
  prefs: []
  type: TYPE_NORMAL
- en: This new variable, which we will name `type`, will be used later to compute
    the results using the available data. For instance, if a dataset is flagged as
    having all three variables, we will use the three variables to compute the results,
    whereas if a dataset is flagged as only having PSU and sampling weights, we will
    compute the results using these two variables only.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**C.** **Computing results**'
  prefs: []
  type: TYPE_NORMAL
- en: We excluded missing data while keeping the dataset that only had missing values
    for either PSU, stratum, or sampling weights. We also flagged the datasets depending
    on which variables they have. We will now compute the results of interest.
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we will compute the survey-adjusted mean for a variable called
    `age`. This is a numeric variable for which we will compute the mean and the 95%
    confidence intervals leveraging the complex sampling design. That means that the
    results will be representative of the underlying population. For example, if we
    were working with a health survey designed to deliver results representative of
    a country, we will compute the mean `age` in that country.
  prefs: []
  type: TYPE_NORMAL
- en: First, this function will be applied to each dataset and will look at the variable
    `type` to understand what sampling design variables are available, whether PSU,
    stratum, sampling weights. Second, the function will compute the results of interest.
    In this case, the mean of `age`. Third, the results will be stored in a dataframe,
    and the dataframe will be returned.
  prefs: []
  type: TYPE_NORMAL
- en: You can edit the second step to compute your metric of interest, whether it’s
    the mean of another numeric variable or the proportion of a categorical variable.
    In this example, the function `results_svy_mean_age` will generate the mean `age`
    by sex.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**D. Put it all together.**'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s assume that your pooled dataset containing many health surveys is called
    `pooleddata`, and that there is a variable called `study_id` that identifies each
    individual survey.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: We will create an empty list and inside the list store each dataset as an independent
    element of the list. We will use the `study_id` to identify each unique survey.
    For instance, if our `pooleddata` is a pool of 10 surveys, our list will have
    ten elements.
  prefs: []
  type: TYPE_NORMAL
- en: We will apply the function `cleaning_svy` to each element of the list. In other
    words, to each individual dataset that was stored in the list. Remember we explained
    the function `cleaning_svy` in the step A above.
  prefs: []
  type: TYPE_NORMAL
- en: At the end of step A, we will have the same list containing our individual surveys
    but having excluded the few missing observations in the sampling design variables
    yet keeping the datasets with complete missing data in any of these variables
    (PSU, stratum, and sampling weights).
  prefs: []
  type: TYPE_NORMAL
- en: We will now create the `type` variable in each dataset inside the list (i.e.,
    in each survey). As a result, we will have the same list containing the unique
    surveys, each with a new variable named `type` that will flag what sampling design
    variables are available.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: As a sanity check, I like to print the value of the `type` variable in each
    dataset. This print should only show one value for each survey.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Next, you can apply our function `results_svy_mean_age` to all the datasets
    in our list.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of `A` will look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot by the author. The names of the surveys were blurred for privacy.](../Images/83ecd65f32b65c5d5529f330824a0719.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by the author. The names of the surveys were blurred for privacy.
  prefs: []
  type: TYPE_NORMAL
- en: You can further process `A` so that it looks like a tidy dataframe. Now you
    have a dataframe where the first column is the unique identifier of each original
    survey, the sex indicator which we used to stratify the quantification of the
    mean age, and the mean age together with the lower and upper 95% confidence intervals.
    Notably, the mean age and the 95% confidence intervals account for the complex
    sampling design variables (PSU, stratum, and sampling weights) available in each
    survey.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot by the author. The names of the surveys were blurred for privacy.](../Images/6f24b755d5fe0abf779f519796fa63b1.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by the author. The names of the surveys were blurred for privacy.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**In summary**'
  prefs: []
  type: TYPE_NORMAL
- en: If you are pooling multiple health surveys with a complex sampling design, chances
    are that some of those surveys do not have any of the three variables needed to
    compute your results accounting for the sampling design (PSU, stratum, and sampling
    weights). Instead of dropping some surveys where these variables are completely
    missing, you can analyze each survey independently leveraging the variables they
    do have (e.g., PSU and sampling weights but not stratum). **In three simple steps,
    we provide `R` functions to do so!**
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '*If you found this code useful, share it with your friends and colleagues!
    Also, please give this story your love with a thumbs up and leave a comment! Feel
