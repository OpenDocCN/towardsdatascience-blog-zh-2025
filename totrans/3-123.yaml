- en: AI in Social Research and Polling
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/ai-in-social-research-and-polling/](https://towardsdatascience.com/ai-in-social-research-and-polling/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1743554347739" class="mdspan-comment">This month</mdspan>,
    I’m going to be discussing a really interesting topic that I came across in a [recent
    draft paper by a professor at the University of Maryland named M. R. Sauter](https://oddletters.com/files/2025/02/Psychotic-Ecologies-working-paper-Jan-2025.pdf).
    In the paper, they discuss (among other things) the phenomenon of social scientists
    and pollsters trying to employ AI tools to help overcome some of the challenges
    in conducting social science human subjects research and polling, and point out
    some major flaws with these approaches. I had some additional thoughts that were
    inspired by the topic, so let’s talk about it!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Hi, can I ask you a short series of questions?
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s start with a quick discussion of why this would be necessary in the first
    place. Doing social science research and polling is extraordinarily difficult
    in the modern day. A huge part of this is simply due to the changes in how people
    connect and communicate — namely, cellphones — making it incredibly hard to get
    access to a random sampling of individuals who will participate in your research.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: To contextualize this, when I was an undergraduate sociology student almost
    25 years ago, in research methods class we were taught that a good way to randomly
    sample people for large research studies was to just take the area code and 3
    digit phone number prefix for an area, and randomly generate selections of four
    digits to complete them, and call those numbers. In those days, before phone scammers
    became the bane of all our lives, people would answer and you could ask your research
    questions. Today, on the other hand, this kind of method for trying to get a representative
    sample of the public is almost laughable. Scarcely anyone answers calls from unknown
    numbers in their daily lives, outside of very special situations (like when you’re
    waiting for a job interviewer to call).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: So, what do researchers do now? Today, you can sometimes pay gig workers for
    poll participation, although Amazon MTurk workers or Upworkers are not necessarily
    representative of the entire population. The sample you can get will have some
    bias, which has to be accounted for with sampling and statistical methods. A bigger
    barrier is that these people’s time and effort costs money, which pollsters and
    academics are loath to part with (and in the case of academics, increasingly they
    do not have).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: What else? If you’re like me, you’ve probably gotten an unsolicited polling
    text before as well — these are interesting, because they could be legitimate,
    or they could be scammers out to get your data or money, and it’s tremendously
    difficult to tell the difference. As a sociologist, I have a soft spot for doing
    polls and answering surveys to help other social scientists, and I don’t even
    trust these to click through, more often than not. They’re also a demand on your
    time, and many people are too busy even if they trust the source.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 还有什么？如果你像我一样，你可能也收到过一些未经请求的民意调查短信——这些很有趣，因为它们可能是合法的，也可能是骗子试图获取你的数据或金钱，而且区分它们极其困难。作为一名社会学家，我乐于进行民意调查和回答调查，以帮助其他社会科学家，而且我通常不会点击这些链接，很多时候。它们也是对你时间的占用，即使人们信任来源，很多人也忙得不可开交。
- en: The entire industry of polling depends on being able to get a diverse sample
    of people from all walks of life on the telephone, and convincing them to give
    you their opinion about something.
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 整个民意调查行业依赖于能够从各行各业获取多样化的样本人群，并说服他们就某事表达自己的观点。
- en: Regardless of the attempted solutions and their flaws, this problem matters.
    The entire industry of polling depends on being able to get a diverse sample of
    people from all walks of life on the telephone, and convincing them to give you
    their opinion about something. This is more than just a problem for social scientists
    doing academic work, because polling is a massive industry unto itself with a
    lot of money on the line.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 无论尝试的解决方案及其缺陷如何，这个问题都很重要。整个民意调查行业依赖于能够从各行各业获取多样化的样本人群，并说服他们就某事表达自己的观点。这不仅是一个针对从事学术工作的社会科学家的问题，因为民意调查本身就是一个庞大的行业，涉及大量资金。
- en: Do we *really* need the humans?
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们真的需要人类吗？
- en: Can AI help with this problem in some way? If we involve generative AI in this
    task, what might that look like? Before we get to practical ways to attack this,
    I want to discuss a concept [Sauter](https://oddletters.com/files/2025/02/Psychotic-Ecologies-working-paper-Jan-2025.pdf) proposes
    called “AI imaginaries” — essentially, the narratives and social beliefs we hold
    about what AI really is, what it can do, and what value it can create. This is
    hard to pin down, partly because of a “strategic vagueness” about the whole idea
    of AI. Longtime readers will know I have struggled mightily with figuring out
    whether and how to even reference the term “AI” because it is such an overloaded
    and conflicted term.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能能否以某种方式帮助解决这个问题？如果我们让生成式人工智能参与这项任务，那会是什么样子？在我们讨论解决这个问题的实际方法之前，我想讨论一下[Sauter](https://oddletters.com/files/2025/02/Psychotic-Ecologies-working-paper-Jan-2025.pdf)提出的一个概念，称为“人工智能想象”——本质上，是我们对人工智能真正是什么、它能做什么以及它能创造什么价值的叙述和社会信念。这很难界定，部分原因是对人工智能整个概念的“策略模糊性”。长期读者会知道，我一直在努力弄清楚是否以及如何引用“人工智能”这个术语，因为它是一个如此充满重叠和冲突的术语。
- en: However, we can all think of potentially problematic beliefs and expectations
    about AI that we encounter implicitly or explicitly in society, such as the idea
    that AI is inherently a channel for social progress, or that using AI instead
    of employing human people for tasks is inherently good, because of “efficiency”.
    I’ve talked about many of these concepts in my other columns, because I think
    challenging the accuracy of our assumptions is important to help us suss out what
    the true contributions of AI to our world can really be. Flawed assumptions can
    lead us to buy into undeserved hype or overpromising that the tech industry can
    be unfortunately prone to.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们都可以想到在社会中隐含或明确遇到的关于人工智能可能存在问题的信念和期望，例如，人工智能本质上是社会进步的渠道这一观点，或者使用人工智能而不是雇佣人类来完成任务是本质上是好的，因为“效率”的原因。我在我的其他专栏中讨论了许多这些概念，因为我认为挑战我们假设的准确性对于帮助我们弄清楚人工智能对我们世界的真正贡献至关重要。错误的假设可能导致我们陷入不应得的炒作或过度承诺，而科技行业不幸地容易陷入这种状况。
- en: 'In the context of applying AI to social science research, some of [Sauter’s](https://oddletters.com/files/2025/02/Psychotic-Ecologies-working-paper-Jan-2025.pdf) components
    of the AI imaginary include:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在将人工智能应用于社会科学研究的过程中，[Sauter](https://oddletters.com/files/2025/02/Psychotic-Ecologies-working-paper-Jan-2025.pdf)的一些人工智能想象成分包括：
- en: expectations that AI can be relied upon as a source of truth
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 期望人工智能可以作为真理来源的依据
- en: believing that everything meaningful can be measured or quantified, and
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 认为所有有意义的东西都可以被衡量或量化，
- en: (perhaps most problematically) asserting that there is some equivalency between
    the output of human intelligence or creativity and the output of AI models
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: （可能最具问题性的是）断言人类智能或创造力的输出与AI模型的输出之间存在某种等价性
- en: Flawed assumptions can lead us to buy into undeserved hype or overpromising
    that the tech industry can be unfortunately prone to.
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 错误的假设可能导致我们陷入不应得的炒作或过度承诺，而科技行业不幸地容易陷入这种情况。
- en: What have they tried?
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 他们尝试了什么？
- en: With this framework if thinking in mind, let’s look at a few of the specific
    approaches people have taken to fixing the difficulties in finding real human
    beings to involve in research using AI. Many of these techniques have a common
    thread in that they give up on trying to actually get access to individuals for
    the research, and instead just ask LLMs to answer the questions instead.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 带着这种思考框架，让我们看看人们为解决使用AI进行研究的困难而采取的一些具体方法。许多这些技术有一个共同点，那就是他们放弃尝试真正获取个人进行研究，而是仅仅让LLM来回答这些问题。
- en: In one case, an AI startup offers to use LLMs to run your polling for you, instead
    of actually asking any people at all. They mimic electoral demographics as closely
    as possible and build samples almost like “digital twin” entities. ([Notably,
    they were predicting the eventual US general election result wrong](https://www.semafor.com/article/09/20/2024/ai-startup-aaru-uses-chatbots-instead-of-humans-for-political-polls) in
    a September 2024 article.)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个案例中，一家AI初创公司提出使用LLM为您运行民意调查，而不是真正询问任何人员。他们尽可能地模仿选举人口统计，并构建几乎像“数字孪生”实体的样本。（值得注意的是，他们在2024年9月的一篇文章中错误地预测了最终的美国总统大选结果。）（https://www.semafor.com/article/09/20/2024/ai-startup-aaru-uses-chatbots-instead-of-humans-for-political-polls）
- en: '[Sauter](https://oddletters.com/files/2025/02/Psychotic-Ecologies-working-paper-Jan-2025.pdf) cites
    a number of other research approaches applying similar techniques, including testing
    whether the LLM would change its answers to opinion questions when exposed to
    media with particular leanings or opinions (eg, replicating the effect of news
    on public opinion), attempting to specifically emulate human subgroups using LLMs,
    believing that this can overcome algorithmic bias, and testing whether the poll
    responses of LLMs are distinguishable from human answers to the lay person.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[Sauter](https://oddletters.com/files/2025/02/Psychotic-Ecologies-working-paper-Jan-2025.pdf)引用了其他一些应用类似技术的科研方法，包括测试LLM在接触到具有特定倾向或观点的媒体时是否会改变其对观点问题的答案（例如，复制新闻对公众观点的影响），尝试使用LLM具体模拟人类子群体，相信这可以克服算法偏差，以及测试LLM的民意调查回应是否与普通人的人类答案可区分。'
- en: Does it work?
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这有效吗？
- en: Some defend these strategies by arguing that their LLMs can be made to produce
    answers that approximately match the results of real human polling, but simultaneously
    argue that human polling is no longer accurate enough to be usable. This brings
    up the obvious question of, if the human polling is not trustworthy, how is it
    trustworthy enough to be the benchmark standard for the LLMs?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 一些人为这些策略辩护，认为他们的LLM可以产生与真实人类民意调查结果大致匹配的答案，但同时又认为人类民意调查不再准确到足以使用。这提出了一个明显的问题：如果人类民意调查不可靠，那么它如何足够可靠地成为LLM的基准标准？
- en: Furthermore, if the LLM’s output today can be made to match what we think we
    know about human opinions, that doesn’t mean that output will continue to match
    human beliefs or the opinions of the public in the future. LLMs are constantly
    being retrained and developed, and the dynamics of public opinions and perspectives
    are fluid and variable. One validation today, even if successful, doesn’t promise
    anything about another set of questions, on another topic, at another time or
    in another context. Assumptions about this future dependability are consequences
    of the fallacious expectation that LLMs can be trusted and relied upon as sources
    of truth, [when that is not now and never has been the purpose of these models](https://www.stephaniekirmer.com/writing/howdoweknowifaiissmokeandmirrors/).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果今天的大型语言模型（LLM）的输出能够与我们关于人类观点的认识相匹配，这并不意味着其输出将能够持续匹配人类的信念或公众的观点。LLM们不断被重新训练和开发，公众观点和视角是流动和变化的。今天的验证，即使成功，也不能保证关于另一组问题、另一个话题、另一个时间或另一个背景的任何承诺。关于这种未来可靠性的假设是错误的期望的结果，即LLM可以作为真理来源被信任和依赖，[而实际上现在和从来都不是这些模型的目的](https://www.stephaniekirmer.com/writing/howdoweknowifaiissmokeandmirrors/)。
- en: We should always take a step back and remember what LLMs are built for, and
    what their actual objectives are. As [Sanders et al](https://hdsr.mitpress.mit.edu/pub/dm2hrtx0/release/1) notes,
    “LLMs generate a response predicted to be most acceptable to the user on the basis
    of a training process such as reinforcement learning with human feedback”. They’re
    trying to estimate the next word that will be appealing to you, based on the prompt
    you have provided — we should not start to fall into mythologizing that suggests
    the LLM is doing anything else.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们应该总是退一步想想LLM是为了什么而构建的，以及它们的实际目标是什么。正如[Sanders等人](https://hdsr.mitpress.mit.edu/pub/dm2hrtx0/release/1)指出，“LLM根据强化学习等训练过程生成一个预测用户最可接受的响应”。它们试图根据你提供的提示来估计下一个对你有吸引力的词——我们不应该开始陷入神话化的说法，认为LLM正在做其他任何事情。
- en: When an LLM produces an unexpected response, it’s essentially because a certain
    amount of randomness is built in to the model — from time to time, in order to
    sound more “human” and dynamic, instead of choosing the next word with the highest
    probability, it’ll choose a different one further down the rankings. This randomness
    is not based on an underlying belief, or opinion, but is just built in to avoid
    the text sounding robotic or dull. However, when you use an LLM to replicate human
    opinions, these become outliers that are absorbed into your data. How does this
    methodology interpret such responses? In real human polling, the outliers may
    contain useful information about minority perspectives or the fringes of belief
    — not the majority, but still part of the population. This opens up a lot of questions
    about how our interpretation of this artificial data can be conducted, and what
    inferences we can actually draw.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个大型语言模型（LLM）产生意外响应时，这本质上是因为模型中内置了一定程度的随机性——为了听起来更加“人性化”和动态，它有时不会选择概率最高的下一个词，而是会选择排名更靠后的不同词。这种随机性并非基于某种潜在信念或观点，而仅仅是为了避免文本听起来像机器人或乏味。然而，当你使用LLM来复制人类观点时，这些观点就变成了数据中的异常值。这种方法论如何解释这样的响应？在真实的人类民意调查中，这些异常值可能包含有关少数派观点或信仰边缘的有用信息——虽然不是主流，但仍然是人口的一部分。这引发了许多关于如何进行这种人工数据的解释以及我们可以实际得出哪些推论的问题。
- en: On synthetic data
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于合成数据
- en: This topic overlaps with the broader concept of synthetic data in the AI space.
    As the quantities of unseen organically human generated content available for
    training LLMs dwindle, studies have attempted to see whether you could bootstrap
    your way to better models, namely by making an LLM generate new data, then using
    that to train on. [This fails, causing models to collapse](https://futurism.com/ai-trained-ai-generated-data-interview),
    in a form that [Jathan Sadowski](https://www.jathansadowski.com/) named “Habsburg
    AI”.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这个话题与人工智能领域更广泛的概念——合成数据——重叠。随着可用于训练LLM的未见过、有机生成的人类内容的数量减少，研究试图看看是否可以通过自举的方式获得更好的模型，即通过让LLM生成新数据，然后使用这些数据来训练。 [这失败了，导致模型崩溃](https://futurism.com/ai-trained-ai-generated-data-interview)，以[Jathan
    Sadowski](https://www.jathansadowski.com/)所命名的“哈布斯堡AI”的形式。
- en: What this teaches us is that [there is more that differentiates the stuff that
    LLMs produce from organically human generated content than we can necessarily
    detect](https://www.stephaniekirmer.com/writing/theculturalimpactofaigeneratedcontentpart1/).
    Something is different about the synthetic stuff, even if we can’t totally identify
    or measure what it is, and we can tell this is the case because the end results
    are so drastically different. I’ve talked before about the complications and challenges
    around human detection of synthetic content, and it’s clear that just because
    humans may not be able to easily and obviously tell the difference, that doesn’t
    mean there is none.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这教会我们的是，[LLM产生的内容与有机生成的人类内容之间的差异可能比我们能够检测到的更多](https://www.stephaniekirmer.com/writing/theculturalimpactofaigeneratedcontentpart1/)。合成内容中有些东西是不同的，即使我们无法完全识别或衡量它是什么，我们也可以通过最终结果如此剧烈的不同来判断这一点。我之前已经谈到了围绕人类检测合成内容所带来的复杂性和挑战，而且很明显，即使人类可能无法轻易明显地区分，这并不意味着没有差异。
- en: '[J]ust because humans may not be able to easily and obviously tell the difference,
    that doesn’t mean there is none.'
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[J]即使人类可能无法轻易明显地区分，这并不意味着没有差异。'
- en: We might also be tempted by the argument that, well, polling is increasingly
    unreliable and inaccurate, because we have no more easy, free access to the people
    we want to poll, so this AI mediated version might be the best we can do. If it’s
    better than the status quo, what’s wrong with trying?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能还会被这样的论点所吸引，即，毕竟，民意调查越来越不可靠和不准确，因为我们已经没有更多容易、免费的方式来接触到我们想要调查的人，所以这种由AI介导的版本可能就是我们能做的最好的了。如果它比现状更好，尝试有什么错呢？
- en: Is it a good idea?
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这是一个好主意吗？
- en: Whether or not it works, is this the right thing to do? This is the question
    that most users and developers of such technology don’t take much note of. The
    tech industry broadly is often guilty of this — we ask whether something is effective,
    for the immediate objective we have in mind, but we may skip over the question
    of whether we should do it anyway.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 无论是否有效，这是否是正确的事情去做？这是大多数此类技术的用户和开发者不太注意的问题。整个科技行业常常犯这样的错误——我们询问某件事是否有效，针对我们心中所想的直接目标，但我们可能忽略了是否应该去做的问题。
- en: I’ve spent a lot of time recently thinking about why these approaches to polling
    and research worry me. [Sauter](https://oddletters.com/files/2025/02/Psychotic-Ecologies-working-paper-Jan-2025.pdf) makes
    the argument that this is inherently corrosive to social participation, and I’m
    inclined to agree in general. There’s something troubling about determining that
    because people are difficult or expensive to use, that we toss them aside and
    use technological mimicry to replace them. The validity of this depends heavily
    on what the task is, and what the broader impact on people and society would be. [Efficiency
    is not the unquestionable good that we might sometimes think](https://www.stephaniekirmer.com/writing/generativeaiandcivicinstitutions/).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 最近我花了很多时间思考为什么这些民意调查和研究方法让我感到担忧。[Sauter](https://oddletters.com/files/2025/02/Psychotic-Ecologies-working-paper-Jan-2025.pdf)提出了这样的论点，认为这本质上是有害于社会参与的，我总体上倾向于同意。确定因为人们难以或昂贵而将他们抛弃，并使用技术模仿来替代他们，这让人感到不安。这种有效性在很大程度上取决于任务是什么，以及它对人们和社会的更广泛影响会是什么。[效率并不是我们有时可能认为的无条件的善](https://www.stephaniekirmer.com/writing/generativeaiandcivicinstitutions/)。
- en: For one thing, people have increasingly begun to learn that our data (including
    our opinions) has monetary and social value, and it isn’t outrageous for us to
    want to get a piece of that value. We’ve been giving our opinions away for free
    for a long time, but I sense that’s evolving. These days retailers regularly offer
    discounts and deals in exchange for product reviews, and as I noted earlier, MTurkers
    and other gig workers can rent out their time and get paid for polling and research
    projects. In the case of commercial polling, where a good deal of the energy for
    this synthetic polling comes from, substituting LLMs sometimes feels like a method
    for making an end run around the pesky human beings who don’t want to contribute
    to someone else’s profits for free.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，人们越来越意识到我们的数据（包括我们的观点）具有货币和社会价值，我们想要获得其中一部分价值并不夸张。我们长期以来一直在免费提供我们的观点，但我感觉到这种状况正在演变。如今，零售商经常提供折扣和优惠以换取产品评论，正如我之前提到的，MTurkers和其他零工工作者可以出租他们的时间，并因参与民意调查和研究项目而获得报酬。在商业民意调查的情况下，这是合成民意调查的大部分能量来源，用LLM来替代有时感觉像是一种绕过那些不愿意免费为他人利润做出贡献的讨厌的人类的方法。
- en: If we assume that the LLM can generate accurate polls, we are assuming a state
    of determinism that runs counter to the democratic project.
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果我们假设LLM可以生成准确的民意调查，我们就是在假设一种与民主项目背道而驰的决定论状态。
- en: But setting this aside, there’s a social message behind these efforts that I
    don’t think we should minimize. Teaching people that their beliefs and opinions
    are replaceable with technology sets a precedent that can unintentionally spread.
    If we assume that the LLM can generate accurate polls, we are assuming a state
    of determinism that runs counter to the democratic project, and expects democratic
    choices to be predictable. We may think we know what our peers believe, maybe
    even just by looking at them or reading their profiles, but in the US, at least,
    we still operate under a voting model that lets that person have a secret ballot
    to elect their representation. They are at liberty to make their choice based
    on any reasoning, or none at all. Presuming that we don’t actually have the free
    will to change our mind in the privacy of the voting booth just feels dangerous.
    What’s the argument, if we accept the LLMs instead of real polls, that this can’t
    be spread to the voting process itself?
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 但抛开这一点，这些努力背后有一个社会信息，我认为我们不应该轻视。让人们相信他们的信念和观点可以被技术取代，这设定了一个先例，可能会无意中传播开来。如果我们假设LLM可以生成准确的民意调查，我们就是在假设一种决定论状态，这与民主项目背道而驰，并期望民主选择是可以预测的。我们可能认为我们知道我们的同伴相信什么，也许甚至只是通过观察他们或阅读他们的个人资料，但在美国，至少我们仍然在一种投票模式下运作，允许那个人有秘密投票权来选举他们的代表。他们有自由根据自己的任何理由或没有任何理由来做出选择。如果我们接受LLM而不是真正的民意调查，那么这种做法是否可以传播到投票过程本身，这让人感到危险。如果我们接受LLM而不是真正的民意调查，那么这种做法是否可以传播到投票过程本身，这让人感到危险。
- en: I haven’t even touched on the issue of trust that keeps people from honestly
    responding to polls or research surveys, which is an additional sticking point.
    Instead of going to the source and really interrogating what it is in our social
    structure that makes people unwilling to honestly state their sincerely held beliefs
    to peers, we again see the approach of just throwing up our hands and eliminating
    people from the process altogether.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我甚至还没有触及到信任问题，这个问题让人们无法诚实地回应民意调查或研究调查，这是一个额外的难题。我们不是去源头真正质问是什么让我们不愿意向同伴诚实地表达我们真诚持有的信念，我们再次看到的是只是举手投降，完全排除人们的过程。
- en: Sweeping social problems under an LLM rug
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将社会问题扫进LLM的地毯下
- en: It just seems really troubling that we are considering using LLMs to paper over
    the social problems getting in our way. It feels similar to [a different area
    I’ve written about](https://www.stephaniekirmer.com/writing/seeingourreflectioninllms/),
    the fact that LLM output replicates and mimics the bigotry and harmful content
    that it finds in training data. Instead of taking a deeper look at ourselves,
    and questioning why this is in the organically human created content, some people
    propose censoring and heavily filtering LLM output, as an attempt to hide this
    part of our real social world.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们考虑使用LLM来掩盖挡在我们道路上的社会问题，这真的让人感到非常不安。这让我想起了我写过的[另一个领域](https://www.stephaniekirmer.com/writing/seeingourreflectioninllms/)，即LLM的输出复制和模仿了它在训练数据中找到的偏见和有害内容。我们不是更深入地审视自己，质疑为什么这会出现在有机人类创造的内容中，有些人提出审查和严格过滤LLM的输出，试图隐藏我们真实社会世界的一部分。
- en: 'I guess it comes down to this: I’m not in favor of resorting to LLMs to avoid
    trying to solve real social problems. I’m not convinced we’ve really tried, in
    some cases, and in other cases like the polling, I’m deeply concerned that we’re
    going to create even more social problems by using this strategy. We have a responsibility
    to look beyond the narrow scope of the issue we care about at this particular
    moment, and anticipate cascading externalities that may result.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我想这归结于这一点：我不赞成依赖LLM来避免尝试解决真正的社会问题。在某些情况下，我并不确信我们真的尝试过，在其他情况下，比如在民意调查中，我深感担忧，我们可能会通过这种策略创造出更多社会问题。我们有责任超越我们此刻关心的狭窄问题范围，并预测可能产生的连锁外部效应。
