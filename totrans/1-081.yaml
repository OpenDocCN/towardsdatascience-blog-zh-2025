- en: How Deep Feature Embeddings and Euclidean Similarity Power Automatic Plant Leaf
    Recognition
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 深度特征嵌入和欧几里得相似性如何推动自动植物叶片识别
- en: 原文：[https://towardsdatascience.com/how-deep-feature-embeddings-and-euclidean-similarity-power-automatic-plant-leaf-recognition/](https://towardsdatascience.com/how-deep-feature-embeddings-and-euclidean-similarity-power-automatic-plant-leaf-recognition/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-deep-feature-embeddings-and-euclidean-similarity-power-automatic-plant-leaf-recognition/](https://towardsdatascience.com/how-deep-feature-embeddings-and-euclidean-similarity-power-automatic-plant-leaf-recognition/)
- en: <mdspan datatext="el1763426373638" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763426373638" class="mdspan-comment">引言</mdspan>
- en: Automatic plant leaf detection is a remarkable innovation in computer vision
    and machine learning, enabling the identification of plant species by examining
    a photograph of the leaves. Deep learning is applied to extract meaningful features
    from an image of leaves and convert them into small, numerical representations
    known as embeddings. These embeddings capture the key features of shape, texture,
    vein patterns, and margins, enabling easy comparison and grouping. The fundamental
    idea is to create a system that can fingerprint a picture of leaves and match
    it with a database of known species.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 自动植物叶片检测是计算机视觉和机器学习领域的一项显著创新，它通过检查叶片照片来识别植物物种。深度学习被应用于从叶片图像中提取有意义的特征，并将它们转换为称为嵌入的小型数值表示。这些嵌入捕捉了形状、纹理、叶脉模式和边缘等关键特征，使得比较和分组变得容易。基本思想是创建一个可以指纹化叶片照片并将其与已知物种数据库匹配的系统。
- en: A [plant leaf recognition](https://www.mdpi.com/2076-3417/14/18/8122) system
    operates by initially identifying and isolating the leaf in an image, then encoding
    the embedded vector, and subsequently matching the embedded vector to the reference
    embedded vectors using a distance measure. More specifically, Euclidean distance
    is a straightforward method for measuring similarity in high-dimensional spaces.
    In the case of normalized embeddings, this distance is positively correlated with
    the similarity between two leaves, allowing for the use of nearest-neighbour classification
    methods.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 一个[植物叶片识别](https://www.mdpi.com/2076-3417/14/18/8122)系统通过最初在图像中识别和隔离叶片，然后编码嵌入向量，随后使用距离度量将嵌入向量与参考嵌入向量匹配来运行。更具体地说，欧几里得距离是测量高维空间相似性的直接方法。在归一化嵌入的情况下，这种距离与两片叶子之间的相似性呈正相关，允许使用最近邻分类方法。
- en: 'Our objective is threefold:'
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们的目标有三点：
- en: Show how deep CNNs learn small, discriminative leaf-image embeddings.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展示深度CNN如何学习小的、具有判别性的叶片图像嵌入。
- en: Demonstrate how Euclidean similarity is reliable at classifying species based
    on nearest-neighbor matching.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展示如何通过最近邻匹配来证明欧几里得相似性在物种分类中的可靠性。
- en: Create a pipeline that is fully reproducible on the UCI One-Hundred Plant Species
    Leaves Dataset, including both the code and assessment, as well as the visualization
    of the results.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个在UCI一百种植物物种叶片数据集上完全可重复的流程，包括代码、评估以及结果的可视化。
- en: Why Is Automated Plant Species Identification Significant?
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动植物物种识别为何重要？
- en: The significance of being able to automatically recognize plant species based
    on leaf images has very far-reaching scientific, environmental, agricultural and
    educational consequences. Such systems are applicable in biodiversity conservation
    providing an interface to massive image datasets captured in the camera trap or
    citizen science platform, allowing threatened or invasive plant species to be
    cataloged and tracked in seconds. This ability is relevant in highly diverse ecosystems,
    including tropical rainforests, to enable real-time ecological decision-making
    as well as to allow conservationists to target their resources.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 能够根据叶片图像自动识别植物物种的重要性具有非常深远的影响，包括科学、环境、农业和教育。此类系统适用于生物多样性保护，提供了一个界面，用于在相机陷阱或公民科学平台上捕获的大量图像数据集，允许在几秒钟内对受威胁或入侵性植物物种进行编目和追踪。这种能力在高度多样化的生态系统中相关，包括热带雨林，以实现实时生态决策，并允许保护主义者针对其资源。
- en: 'Key Areas of Impact:'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 影响的关键领域：
- en: '*•* **Agriculture**: Allows to have precision farming to identify and treat
    diseases of crops, weeds, and optimize the use of pesticides. Mobile applications
    allow farmers to scan leaves to obtain immediate feedback and enhance more yield
    and minimize environmental degradation.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*•* **农业**：允许进行精准农业，以识别和治疗作物、杂草的疾病，并优化农药的使用。移动应用程序允许农民扫描叶片以获得即时反馈，提高产量并最小化环境退化。'
- en: '*•* **Education**: Enables interactive learning whereby users can take photos
    of leaves to learn about the ecological, medicinal or cultural uses of species.
    It can help museums and botanical gardens to engage more with their visitors.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '*•* **教育**: 通过用户拍摄叶片照片来促进互动学习，了解物种的生态、药用或文化用途。这可以帮助博物馆和植物园与游客进行更多互动。'
- en: '*• ***Pharmacology***: *Enables the correct identification of medicinal plants,
    which would hasten the discovery of new bioactive substances to be used in developing
    drugs.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '*• ***药理学***: *能够正确识别药用植物，这将加快用于开发药物的新生物活性物质的发现。'
- en: '• **Digital Libraries and IoT**: Tagging, indexing and retrieval of images
    of plants in large databases are automated. It is integrated with smart cameras
    that have IoT, which provides an opportunity to constantly monitor greenhouses
    and research areas.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '• **数字图书馆和物联网**: 在大型数据库中自动对植物图像进行标记、索引和检索。它集成了具有物联网的智能摄像头，这为持续监控温室和研究区域提供了机会。'
- en: Exploring the UCI One-Hundred Plant Species Leaves Dataset
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索UCI一百种植物叶片数据集
- en: Our recognition system relies on the [One-Hundred Plant Species Leaves dataset,](https://archive.ics.uci.edu/dataset/241/one+hundred+plant+species+leaves+data+set)
    stored on the UCI Machine Learning Repository (CC BY 4.0 license). It is a set
    of 1,600 high-resolution photographs, each having 16 samples of the 100 species
    in the sample. The species are common trees such as oaks and more exotic species,
    which have given a rich spread in terms of species of leaf morphologies.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的识别系统依赖于存储在UCI机器学习存储库（CC BY 4.0许可）上的[一百种植物叶片数据集](https://archive.ics.uci.edu/dataset/241/one+hundred+plant+species+leaves+data+set)。这是一个包含1,600张高分辨率照片的集合，每张照片都有100种样本中的16个样本。这些物种包括常见的树木如橡树以及更多异国物种，它们在叶片形态学方面提供了丰富的多样性。
- en: Devoting every picture to one leaf and a dull background makes the distractions
    minimal and the main features clear. But the operation of the world in practice
    is usually of complicated scenes and thus it is necessary to undergo processing
    steps such as segmentation. The data will contain like Acer palmatum (Japanese
    maple) and Quercus robur (English oak) species that have unique characteristics
    but are variable.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 将每张图片都聚焦于一片叶子和一个单调的背景，使得干扰最小化，主要特征清晰。但在实际操作中，世界的运作通常是复杂场景，因此有必要进行如分割等处理步骤。数据将包含如
    Acer palmatum（日本枫）和 Quercus robur（英国橡树）等具有独特特征但变化的物种。
- en: Data is readied by resizing the images to a standard input size (e.g., 224×224
    pixels) and normalizing. Variations can be simulated by augmentation techniques
    (rotation and flipping) that increase the model robustness.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 通过调整图像大小到标准输入尺寸（例如，224×224像素）并进行归一化来准备数据。可以通过增加旋转和翻转等增强技术来模拟变化，从而提高模型的鲁棒性。
- en: The labels of the dataset give ground-truth species, which allow supervised
    learning. We achieve an unbiased assessment by dividing into training (80%), validation
    (10%), and test (10) sets.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集的标签提供了地面真实物种，这允许进行监督学习。我们通过将数据分为训练集（80%）、验证集（10%）和测试集（10%）来实现无偏评估。
- en: The strengths of this dataset are that it is balanced and realistic, and depicts
    some difficulties, such as minor occlusions or color differences in scanning.
    In comparison to larger results such as PlantNet it is easier to work with prototyping,
    but has enough diversity.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这个数据集的优势在于其平衡性和现实性，描绘了一些困难，例如扫描中的轻微遮挡或颜色差异。与PlantNet等更大的结果相比，它更容易用于原型设计，但具有足够的多样性。
- en: Sample Leaf Images from the Dataset
  id: totrans-22
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
  zh: 数据集中的样本叶片图像
- en: '![](../Images/daf0762fe2a8dfcb6e1b9dcc63b035dc.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/daf0762fe2a8dfcb6e1b9dcc63b035dc.png)'
- en: '*Photos By [Cope et al. (n.d.)](https://archive.ics.uci.edu/dataset/241/one+hundred+plant+species+leaves+data+set)
    On [UC Irvine Machine Learning Repository](https://archive.ics.uci.edu/dataset/241/one+hundred+plant+species+leaves+data+set)*'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '*照片由[Cope等人（未注明日期）](https://archive.ics.uci.edu/dataset/241/one+hundred+plant+species+leaves+data+set)在[UC
    Irvine机器学习存储库](https://archive.ics.uci.edu/dataset/241/one+hundred+plant+species+leaves+data+set)上提供*'
- en: '**Deep Feature Embeddings with ResNet-50**'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用ResNet-50的深度特征嵌入**'
- en: The deep convolutional neural network (CNN) [ResNet-50](https://www.ultralytics.com/blog/what-is-resnet-50-and-what-is-its-relevance-in-computer-vision#:~:text=Let's%20get%20started!-,What%20is%20ResNet%2D50?,learning%20faster%20and%20more%20reliable.)
    pre-trained on ImageNet is the main backbone model that we use in our structure
    to extract features. ResNet-50 already has the necessary capabilities to solve
    tasks in visual recognition, especially since it has 50 layers designed as residual
    networks, which alleviate the issue of vanishing gradient in deep networks with
    the help of skip connections. Using the pre-trained weights, we use images of
    the millions of natural images to find general image representations and generalize
    them to the plant leaf world, which requires little training data and computation.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在 ImageNet 上预训练的深度卷积神经网络（CNN）[ResNet-50](https://www.ultralytics.com/blog/what-is-resnet-50-and-what-is-its-relevance-in-computer-vision#:~:text=Let's%20get%20started!-,What%20is%20ResNet%2D50?,learning%20faster%20and%20more%20reliable.)
    是我们在结构中用于提取特征的主要骨干模型。ResNet-50 已经具备了解决视觉识别任务所需的能力，特别是它有 50 层设计为残差网络，通过跳跃连接帮助缓解了深层网络中的梯度消失问题。使用预训练的权重，我们使用数百万自然图像的图像来寻找通用图像表示，并将它们推广到植物叶子世界，这需要很少的训练数据和计算。
- en: The ResNet-50 produces for each leaf image a 2048 dimensional embedding vector
    which is an extremely low dimensional numeric description that includes all of
    the most significant features from the leaf images. The Embedding Vectors are
    produced as the result of the final average pooling layer (which takes the output
    of the last layer of the networks feature maps and creates a one dimensional summary)
    that summarize the network’s last feature maps. This Summary includes information
    about both subtle and obvious aspects of a leaf image such as color, texture,
    vein geometry, edge curvature, etc. The embedding vectors for each leaf are then
    converted into a string of 2048 numbers, with each number representing a learned
    pattern. These 2048 numbers are used to create a fingerprint of the leaf within
    a high dimensional mathematical space. Similar leaves will be closer together
    in the mathematical space and dissimilar species will be further away.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: ResNet-50 为每个叶子图像生成一个 2048 维的嵌入向量，这是一个极其低维的数值描述，它包含了叶子图像中所有最重要的特征。嵌入向量是作为最终平均池化层的输出产生的（该层从网络的最后特征图输出并创建一个一维摘要），它总结了网络的最后特征图。这个摘要包括了关于叶子图像的细微和明显方面的信息，例如颜色、纹理、叶脉几何形状、边缘曲率等。然后，每个叶子的嵌入向量被转换成一个由
    2048 个数字组成的字符串，每个数字代表一个学习到的模式。这些 2048 个数字用于在多维数学空间中创建叶子的指纹。在数学空间中，相似的叶子将更靠近，而不同物种的叶子将更远。
- en: These embedding vectors are then compared using euclidean distance, thus enabling
    the measurement of similarity between two leaves. Smaller distances indicate closely
    related species, or nearly identical leaf shapes, while larger distances indicate
    substantial differences between two leaves. The comparison of these embedding
    vectors in the embedding space provides the foundation for our recognition pipeline,
    providing a quick and understandable way to compare new samples against the species
    in our database.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这些嵌入向量随后使用欧几里得距离进行比较，从而使得测量两个叶子之间的相似度成为可能。较小的距离表示密切相关或几乎相同的叶子形状，而较大的距离表示两个叶子之间存在显著差异。在嵌入空间中比较这些嵌入向量为我们识别流程提供了基础，提供了一种快速且易于理解的方法来比较新样本与数据库中的物种。
- en: Preprocessing Pipeline
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预处理管道
- en: Images of leaf images need to pass through a uniform preprocessing pipeline
    before being fed to our deep model to guarantee uniformity and compatibility with
    the ResNet-50 input requirements. To preprocess the images, we created a preprocessing
    transform based on Torchvision transforms, which performs image transforms one
    after another by resizing and cropping each image, converting to greyscale and
    normalizing images.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 叶子图像在输入我们的深度模型之前需要通过一个统一的预处理管道，以确保一致性和与 ResNet-50 输入要求的兼容性。为了预处理图像，我们基于 Torchvision
    转换创建了一个预处理转换，该转换通过调整大小和裁剪每个图像，将其转换为灰度并归一化图像，依次执行图像转换。
- en: '[PRE0]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: To ensure that our data distribution matches the pre-trained model distribution,
    we closely follow ImageNet normalization parameters. This guarantees that the
    input values are normalised to zero mean and unit variance and enhances the stability
    of the extracted embeddings. Every image is then converted to a representation
    in the form of the tensor which can be used directly with our deep learning model.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保我们的数据分布与预训练模型分布相匹配，我们紧密遵循ImageNet归一化参数。这保证了输入值被归一化到零均值和单位方差，并增强了提取嵌入的稳定性。然后，每张图像都被转换为张量形式的表现，可以直接与我们的深度学习模型一起使用。
- en: Embedding Extraction
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 嵌入提取
- en: After the preprocessing stage, our system attaches deep feature embeddings.
    To do this, we make alterations to the original ResNet-50 by excluding the fully
    connected (FC) classification layer, since we are not interested in the classification
    of the images as such but instead are interested in getting high-level feature
    representation of them.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 预处理阶段之后，我们的系统附加深度特征嵌入。为此，我们对原始ResNet-50进行了修改，排除了全连接（FC）分类层，因为我们不感兴趣于图像的分类，而是对获取它们的高级特征表示感兴趣。
- en: '[PRE1]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: A truncated network being the network truncated at the global average pooling
    layer results in a feature extractor that produces a 2048-dimensional single-image
    output. These vectors are meaningful which identifies patterns that are discriminative
    between two, or more leaf species.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 被截断的网络是在全局平均池化层截断的网络，这导致了一个产生2048维单图像输出的特征提取器。这些向量是有意义的，它们识别出在两个或更多叶物种之间具有区分性的模式。
- en: 'We establish an embedding function to develop this procedure on all our image
    information set:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在所有图像信息集上建立嵌入函数以开发此过程：
- en: '[PRE2]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The L2 normalization makes the embeddings lie on a unit hypersphere so that
    equitable and consistent comparisons of the Euclidean distance across the samples
    are possible. This normalization step removes scale variations, and it only compares
    the direction of features, and is best used to measure similarity between leaf
    embeddings.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: L2归一化使得嵌入位于单位超球面上，从而可以在样本之间进行公平和一致的欧几里得距离比较。此归一化步骤消除了尺度变化，并且仅比较特征的方向，最适合用于测量叶嵌入之间的相似性。
- en: Lastly, this embedding function is applied to all the 1,600 images of leaves
    of 100 species. The resulting feature vectors are then stored in a species-wise
    database in systematically organized form which is the backbone of our recognition
    system
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，此嵌入函数应用于100种植物的1600张叶图像。然后，这些结果特征向量以系统组织的形式存储在按物种划分的数据库中，这是我们识别系统的核心。
- en: '[PRE3]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Here, each species key’s value is a list of normalized embeddings of the corresponding
    species. Our system is able to perform accurate plant species recognition based
    on the similarity search of our organized database of stored samples with the
    query embeddings by rapidly calculating pairwise distances.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，每个物种键的值是对应物种归一化嵌入的列表。我们的系统能够通过快速计算成对距离，基于我们对存储样本的有序数据库与查询嵌入的相似性搜索，进行准确的植物物种识别。
- en: Euclidean Distance for Similarity Matching
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用于相似性匹配的欧几里得距离
- en: After getting the 2048-dimensional L2-normalized embeddings we can then measure
    similarity between two leaf images using Euclidean distance. Given two embeddings
    x,y∈R2048
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在获得2048维L2归一化嵌入后，我们可以使用欧几里得距离来测量两张叶图像之间的相似性。给定两个嵌入x,y∈R2048
- en: '![](../Images/2e6a45b6b8057323ce105ed2d2b24cb9.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2e6a45b6b8057323ce105ed2d2b24cb9.png)'
- en: 'Since all embeddings are normalized to unit length, this distance is directly
    proportional to their angular distinction which is:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 由于所有嵌入都被归一化到单位长度，因此这个距离与它们的角区分度成正比，即：
- en: '![](../Images/28e216fdd585cb89e515acf372beb3d1.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/28e216fdd585cb89e515acf372beb3d1.png)'
- en: Where cos𝜃=𝑥⋅𝑦. A smaller Euclidean distance means that two embeddings are more
    similar in the feature space, which increases the probability that the leaves
    are of the same kind.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 其中cos𝜃=𝑥⋅𝑦。较小的欧几里得距离意味着两个嵌入在特征空间中更相似，这增加了叶子是同一类的概率。
- en: '![](../Images/dcd4b74eefcecb64b82dc2cd8b3a464b.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dcd4b74eefcecb64b82dc2cd8b3a464b.png)'
- en: Image by Author
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: The metric enables our system to rank the database images in relation to a query
    embedding, and enables accurate and interpretable classification based on similarity.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 该度量使我们的系统能够根据查询嵌入对数据库图像进行排序，并基于相似性实现准确且可解释的分类。
- en: Recognition Pipeline
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 识别流程
- en: The recognition pipeline in our system involves automatic recognition of the
    species to which a query leaf image is matched to either the make-up of the species
    database or its stored embeddings. The following function elucidates this step
    of the process step by step.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们系统中的识别流程涉及自动识别查询叶子图像匹配到的物种，无论是匹配物种数据库的组成还是其存储的嵌入。以下函数逐步阐明这一过程。
- en: '[PRE4]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: In this brute-force search, the Euclidean distance between the query embedding
    and all the stored embeddings is computed and the nearest match is chosen. When
    the distance is less than a predefined value (0.68), the system will label the
    leaf as that species and otherwise, it will give the answer as Unknown. In large-scale
    or real time applications, we recommend that it be replaced with a FAISS index
    to enable faster nearest-neighbor access without loss in accuracy.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种暴力搜索中，计算查询嵌入与所有存储嵌入之间的欧几里得距离，并选择最近的匹配项。当距离小于预定义的值（0.68）时，系统将标签为该物种的叶子，否则，它将答案标记为未知。在大型或实时应用中，我们建议用FAISS索引替换，以实现更快的最近邻访问，同时不损失准确性。
- en: Visualization and Analysis
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可视化和分析
- en: t-SNE Projection of Embeddings
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 嵌入的t-SNE投影
- en: In order to have a better grasp of our learned feature space, we employ t-distributed
    Stochastic Neighbor Embedding ( t -SNE ) to project the 2048-dimensional embeddings
    to a 2D plane. This nonlinear dimensionality reduction method is capable of retaining
    local ties and as such we can plot the classification of how the embeddings group
    by species. The similarity of high intra-species and high intra-species discrimination
    reflected by distinct and compact clusters show that our deep model is highly
    capable of identifying distinct features on each plant species.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地掌握我们学习到的特征空间，我们采用t分布随机邻近嵌入（t-SNE）将2048维嵌入投影到2D平面上。这种非线性降维方法能够保留局部联系，因此我们可以绘制出根据物种对嵌入进行分类的图。高物种内相似性和高物种内区分度通过明显且紧凑的簇反映出来，这表明我们的深度模型在识别每种植物物种的显著特征方面能力很强。
- en: Each point represents a leaf embedding, color-coded by species; tight clusters
    show similar species, while well-separated groups confirm strong discriminative
    learning.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 每个点代表一个叶子嵌入，按物种着色；紧密的簇显示相似物种，而分离良好的组确认了强大的区分学习。
- en: '![](../Images/471a87fc53bc636ca4d2ef84bc10c412.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/471a87fc53bc636ca4d2ef84bc10c412.png)'
- en: Image by Author
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Distance Distribution Analysis
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 距离分布分析
- en: In order to test the discriminative ability of our embeddings we examine the
    distribution of the Euclidean distance between pairs of images. The distance within
    the same species (intra-class) should be much less than that between the species
    (inter-class). Through mapping of this relationship, we discover a distinct line
    or a variety of lines as an indicator of the maximum similarity threshold (e.g.,
    set up 0.68) at which we make similarity recognition decisions. This observation
    validates the finding that our embedding model is successful in clustering similar
    leaves and differentiating different species in the feature space.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试我们嵌入的区分能力，我们检查了一对图像之间欧几里得距离的分布。同一物种（类内）的距离应该远小于物种之间的距离（类间）。通过映射这种关系，我们发现了一条明显的线或多种线作为最大相似度阈值（例如，设置为0.68）的指标，在此阈值上我们做出相似度识别决策。这一观察结果验证了我们的嵌入模型在特征空间中成功聚类相似叶子并区分不同物种的发现。
- en: '![](../Images/80d8ce588d8bc2bb82401fed5ee6598d.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/80d8ce588d8bc2bb82401fed5ee6598d.png)'
- en: Image by Author
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: ROC Curve for Threshold Tuning
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 阈值调整的ROC曲线
- en: To derive the optimal decision boundary between true and false positives in
    a systematic manner, we plot the Receiver Operating Characteristic (ROC) curve,
    which demonstrates trade-off between True Positive Rate (TPR) and False Positive
    Rate (FPR) at different thresholds. An ascending curve means the improved judgement
    of pairs of equal species and different species. The Area Under the Curve (AUC)
    is a measure of the total performance and our system has an excellent AUC of 0.987
    which makes certain that it is very reliable when it comes to similarity based
    recognition. [Youden J](https://medium.com/data-science/optimal-threshold-for-imbalanced-classification-5884e870c293)
    statistic maximizes the sensitivity and specificity of the best threshold (0.68).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 为了以系统的方式推导出真实和假阳性之间的最佳决策边界，我们绘制了接收者操作特征（ROC）曲线，该曲线展示了在不同阈值下真阳性率（TPR）和假阳性率（FPR）之间的权衡。曲线上升表示对相同物种和不同物种对的判断得到改善。曲线下面积（AUC）是总性能的衡量标准，我们的系统具有出色的AUC值为0.987，这确保了它在基于相似性的识别方面非常可靠。[Youden
    J](https://medium.com/data-science/optimal-threshold-for-imbalanced-classification-5884e870c293)
    统计量最大化了最佳阈值的敏感性和特异性（0.68）。
- en: '![](../Images/83164ac7d37f500d552fe9b3ef31d4d6.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/83164ac7d37f500d552fe9b3ef31d4d6.png)'
- en: Image by Author
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '**Precision–Recall Trade-off**'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**精度-召回率权衡**'
- en: To further evaluate the recognition performance at different decision thresholds,
    we test Precision Recall (PR) curve which emphasizes the system-ability to identify
    true matches with the correct percentage of accuracy (precision) compared to the
    system-ability to recall all relevant samples (recall). This value is particularly
    useful when there is an unbalanced information, where some species can be underrepresented.
    Our model is very precise even further in the recall over 0.9, which means the
    high predictions with the few false ones. It shows that the system is generalized
    properly and it is active in the conditions of the real world.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步评估在不同决策阈值下的识别性能，我们测试了精确率-召回率（PR）曲线，该曲线强调了系统识别真实匹配的能力，与正确百分比（精确率）相比，系统召回所有相关样本的能力（召回率）。这个值在信息不平衡的情况下尤其有用，其中某些物种可能被代表性不足。我们的模型在召回率超过0.9时非常精确，这意味着预测准确且错误很少。这表明系统在现实世界条件下得到了适当的泛化，并且非常活跃。
- en: '![](../Images/6de260edfac0a484b13dd2fe716ba7e1.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6de260edfac0a484b13dd2fe716ba7e1.png)'
- en: Image by Author
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Performance Evaluation
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性能评估
- en: In order to evaluate the general effectiveness of our recognition system, we
    have considered its performance when pulling apart independent data splitting
    in terms of training, validation and testing. The model was trained using 1,280
    images of leaves, and validated/tested using 160 images each of the 100 species
    balanced.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估我们识别系统的总体有效性，我们考虑了它在训练、验证和测试中独立数据分割时的性能。该模型使用1280张叶片图像进行训练，并使用每种100个物种的160张图像进行验证/测试。
- en: The findings, as presented below, have a high level of accuracy and overall
    generalization. The Top-1 Accuracy (measuring the proportion of correct predictions
    made by the model on the first instance) and Top-5 Accuracy (measuring the proportion
    of correct species that are among the five closest predictions) are used, which
    matter because in the event of visual overlap of species, they may run the risk
    of misidentification.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如下所示，研究结果具有高度的准确性和整体泛化能力。使用Top-1准确率（衡量模型在第一个实例上做出的正确预测比例）和Top-5准确率（衡量在五个最近预测中最接近的正确物种比例）进行衡量，这很重要，因为在物种视觉重叠的情况下，它们可能会面临误识别的风险。
- en: '| **Split** | **Images** | **Top-1 Accuracy** | **Top-5 Accuracy** |'
  id: totrans-77
  prefs: []
  type: TYPE_TB
  zh: '| **Split** | **Images** | **Top-1 Accuracy** | **Top-5 Accuracy** |'
- en: '| Train | 1280 | – | – |'
  id: totrans-78
  prefs: []
  type: TYPE_TB
  zh: '| Train | 1280 | – | – |'
- en: '| Val | 160 | 96.2% | 99.4% |'
  id: totrans-79
  prefs: []
  type: TYPE_TB
  zh: '| Val | 160 | 96.2% | 99.4% |'
- en: '| Test | 150 | 96.9% | 99.4% |'
  id: totrans-80
  prefs: []
  type: TYPE_TB
  zh: '| Test | 150 | 96.9% | 99.4% |'
- en: Additional performance measurements also attest to the model’s accuracy, with
    a False Positive Rate of 0.8%, a False Negative rate of 2.3%, and an average inference
    time of 12 milliseconds per image (CPU). Such findings indicate that our system
    is both efficient and accurate, meaning it can support real-time leaf recognition
    of plants with minimal computing costs.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 其他性能测量也证实了该模型的准确性，误报率为0.8%，漏报率为2.3%，平均每张图像（CPU）推理时间为12毫秒。这些发现表明，我们的系统既高效又准确，这意味着它可以以最低的计算成本支持植物的实时叶片识别。
- en: Conclusion and Final Thoughts
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论和最终思考
- en: We have shown in this article that deep feature embeddings using the Euclidean
    similarity can provide a strong and interpretable mechanism for automatic recognition
    of plant leaves. Our ResNet-50-based model, when used with the One-Hundred Plant
    Species Leaves dataset from the UCI Machine Learning Repository, achieved over
    96% accuracy and demonstrated efficient computational performance. It is an incremental
    approach that can be used not only to monitor biodiversity and agricultural diagnostics
    but also to offer a scalable basis for the implementation of ecological and visual
    recognition systems in the future.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们展示了使用欧几里得相似度进行深度特征嵌入可以为自动识别植物叶片提供强大且可解释的机制。我们的基于 ResNet-50 的模型，当与 UCI
    机器学习仓库中的 One-Hundred Plant Species Leaves 数据集结合使用时，实现了超过 96% 的准确率，并展示了高效的计算性能。这是一种增量方法，不仅可以用于监测生物多样性和农业诊断，还可以为未来实施生态和视觉识别系统提供一个可扩展的基础。
- en: About the Author
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于作者
- en: '**Sherin Sunny** is a Senior Engineering Manager at Walmart Vizio, where he
    leads the core engineering team responsible for large-scale Automatic Content
    Recognition (ACR) in AWS Cloud. His work spans cloud migrations, AI ML driven
    intelligent pipelines, vector search systems, and real-time data platforms that
    power next-generation content analytics.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**Sherin Sunny** 是沃尔玛 Vizio 的高级工程经理，在那里他领导着负责 AWS 云中大规模自动内容识别 (ACR) 的核心工程团队。他的工作涵盖了云迁移、由
    AI 机器学习驱动的智能管道、向量搜索系统和为下一代内容分析提供动力的实时数据平台。'
