- en: 'A Multimodal AI Assistant: Combining Local and Cloud Models'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/a-multimodal-ai-assistant-combining-local-and-cloud-models-2006b2ea0cd9/](https://towardsdatascience.com/a-multimodal-ai-assistant-combining-local-and-cloud-models-2006b2ea0cd9/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Dalle-3''s interpretation of "a quirky robot wearing a tool belt and puzzling
    over question" . Image generated by the author.](../Images/a5eace552f7a7b7e906b227ef0fbff58.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
- en: Dalle-3’s interpretation of "a quirky robot wearing a tool belt and puzzling
    over question" . Image generated by the author.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: _In this article we’ll use LangGraph in conjunction with several specialized
    models to build a rudimentary agent that can answer complex questions about an
    image, including captioning, bounding boxes and OCR. The original idea was to
    build this using local models only, but after some iteration I decided to add
    connections to cloud based models too (i.e. GPT4o-mini) for more reliable results.
    We’ll explore that aspect too, and all the code for this project can be found
    [here](https://github.com/rmartinshort/image_agent)._
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Over the past year, multimodal large language models – LLMs that take reasoning
    and generative capabilities beyond text to media such as images, audio and video
    – have become increasingly powerful, accessible and usable within production ML
    systems.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Closed source, cloud-based models like GPT-4o, Claude Sonnet and Google Gemini
    are remarkably capable at reasoning over image inputs and are much cheaper and
    faster than the multimodal offerings just a few months ago. Meta has joined the
    party by releasing the weights of multiple competitive multimodal models in its
    Llama 3.2 series. In addition, cloud computing services like AWS Bedrock and Databricks
    Mosaic AI are now hosting many of these models, allowing developers to quickly
    try them out without having to manage hardware requirements and cluster scaling
    themselves. Finally, there is an interesting trend towards a myriad of smaller,
    specialized open source models which are available for download from repositories
    like Hugging Face. A smart agent with access to these models should be able to
    choose which ones to call in what order to get a good answer, which bypasses the
    need for a single giant, general model.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: One recent example with fascinating image capabilities is [Florence2](https://arxiv.org/abs/2311.06242).
    Released in June 2024, it is somewhat of a foundational model for image-specific
    tasks such as captioning, object detection, OCR and phrase grounding (identifying
    objects from provided descriptions). By LLM standards it’s also small – 0.77B
    parameters for the most capable version – and therefore runnable on a modern laptop.
    Florence2 like beats massive multimodal LLMs like GPT4o at specialized image tasks,
    because while these larger models are great at answering general questions in
    text, they’re not really designed to provide numerical outputs like bounding box
    coordinates. With the right training data at the instruction fine tuning stage
    they can certainly improve – [GPT4o can be fine tuned to become good at object
    detection, for example](https://blog.roboflow.com/gpt-4o-object-detection/) –
    but many teams don’t have the resources to do this. Intriguingly, Gemini is in
    fact [advertised as being capable of object detection out of the box](https://ai.google.dev/gemini-api/docs/vision?lang=node#bbox),
    but Florence2 is still more versatile in terms of the range of image tasks it
    can accomplish.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一个近期具有令人着迷图像能力的例子是[Florence2](https://arxiv.org/abs/2311.06242)。于2024年6月发布，它可以说是图像特定任务（如标题、物体检测、OCR和短语定位，即从提供的描述中识别对象）的基础模型。按照LLM的标准，它也相对较小——最强大的版本有0.77B个参数——因此可以在现代笔记本电脑上运行。Florence2在专门的图像任务上甚至能打败像GPT4o这样的大型多模态LLM，因为这些更大的模型在回答文本中的通用问题方面非常出色，但它们并不是真正设计来提供像边界框坐标这样的数值输出的。在指令微调阶段，如果使用正确的训练数据，它们当然可以改进——例如，[GPT4o可以被微调以擅长物体检测](https://blog.roboflow.com/gpt-4o-object-detection/)——但许多团队没有资源来做这件事。有趣的是，Gemini实际上[被宣传为能够直接进行物体检测](https://ai.google.dev/gemini-api/docs/vision?lang=node#bbox)，但Florence2在能够完成的图像任务范围方面仍然更加灵活。
- en: Reading about Florence2 spawned the idea for this project. If we can connect
    it to a text-only LLM that’s good at reasoning (Llama 3.2 3B for example) and
    a multimodal LLM that’s good at answering general questions about images (such
    as Qwen2-VL) then we could build a system that answers complicated questions over
    an image. It would do so by first planning which models to call with what inputs,
    then running those tasks and assembling the results. The agent orchestration library
    LangGraph, which I explored in a recent project article [here](https://medium.com/towards-data-science/building-a-research-agent-that-can-write-to-google-docs-part-1-4b49ea05a292),
    provides a great framework for designing such a system.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读关于Florence2的内容激发了这个项目的想法。如果我们能将其与一个擅长推理的纯文本LLM（例如Llama 3.2 3B）以及一个擅长回答关于图像的通用问题的多模态LLM（如Qwen2-VL）连接起来，那么我们就可以构建一个能够针对图像回答复杂问题的系统。它将通过首先规划调用哪些模型以及使用什么输入，然后运行这些任务并组装结果来实现这一点。我在最近的项目文章[这里](https://medium.com/towards-data-science/building-a-research-agent-that-can-write-to-google-docs-part-1-4b49ea05a292)探索的代理编排库LangGraph，为设计这样的系统提供了一个很好的框架。
- en: 'Also I recently purchased a new laptop: An M3 Macbook with 24GB of RAM. Such
    a machine can run the smallest versions of these models with reasonable latency,
    making it possible for local development of an image agent. This combination of
    increasingly capable hardware and shrinking models (or smart ways of compressing/quantizing
    large models) is very impressive! But it has practical challenges: For a start
    when Florence2-base-ft, Llama-3.2–3B-Instruct-4bit, and Qwen2-VL-2B-Instruct-4bit
    are all loaded up, I barely have enough RAM for anything else. That’s fine for
    development, but it would be a big problem for an application that people might
    actually find useful. Also, as we’ll see Llama-3.2–3B-Instruct-4bit is not great
    at producing reliable structured outputs, which caused me to switch to GPT4-o-mini
    for the reasoning step during development of this project.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我最近购买了一台新的笔记本电脑：一台配备24GB RAM的M3 Macbook。这样的机器可以以合理的延迟运行这些模型的最小版本，使得本地开发图像代理成为可能。这种越来越强大的硬件和不断缩小的模型（或压缩/量化大型模型的智能方式）的结合非常令人印象深刻！但是，它也面临着实际挑战：首先，当加载了Florence2-base-ft、Llama-3.2–3B-Instruct-4bit和Qwen2-VL-2B-Instruct-4bit时，我几乎已经没有足够的RAM来运行其他任何东西。这对于开发来说是可以的，但对于可能真正有用的应用程序来说，这将会是一个大问题。此外，正如我们将看到的，Llama-3.2–3B-Instruct-4bit在生成可靠的有序输出方面并不出色，这导致我在这个项目开发过程中转向使用GPT4-o-mini进行推理步骤。
- en: The image agent
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 图像代理
- en: But what exactly is this project? Let’s introduce it with a tour and demo of
    the system that we’ll build. The StateGraph (take a look at t[his article](https://medium.com/@gitmaxd/understanding-state-in-langgraph-a-comprehensive-guide-191462220997)
    for an intro) looks like this, and every query consists of an image and text input.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 但这个项目究竟是什么呢？让我们通过系统构建的巡视和演示来介绍它。StateGraph（查看[这篇文章](https://medium.com/@gitmaxd/understanding-state-in-langgraph-a-comprehensive-guide-191462220997)以获取简介）看起来是这样的，每个查询都由一个图像和文本输入组成。
- en: '![Visualization of the control flow of the agent that we will build. Image
    generated by the author.](../Images/e9db6016872a0e1df8861d4cb0db2f5c.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![我们将构建的代理控制流的可视化。图像由作者生成。](../Images/e9db6016872a0e1df8861d4cb0db2f5c.png)'
- en: Visualization of the control flow of the agent that we will build. Image generated
    by the author.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将构建的代理控制流的可视化。图像由作者生成。
- en: We proceed through the stages, each of which is associated with a [prompt](https://github.com/rmartinshort/image_agent/tree/main/image_agent/prompts).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们按阶段进行，每个阶段都与一个[prompt](https://github.com/rmartinshort/image_agent/tree/main/image_agent/prompts)相关联。
- en: '**Planning**. Here the goal is just to formulate a plan in text about how to
    best answer the questions with the tools available. The prompt contains a list
    of the tools and their various modes. A more complex system might use RAG at this
    stage to gather the list of tools most appropriate for the problem and craft a
    plan'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**规划**。在这里，目标只是用文本形式制定一个计划，说明如何使用可用的工具最好地回答问题。提示包含工具及其各种模式的列表。一个更复杂的系统可能会在这个阶段使用RAG来收集最适合问题的工具列表并制定计划。'
- en: '**Structure the plan.** The aim [here](https://github.com/rmartinshort/image_agent/blob/main/image_agent/prompts/PlanStructure.py)
    is to create a list of plan components that the agent can step through. We take
    the plan text and force the model to generate a list that is consistently formatted
    according the Pydantic models here. Its useful to keep both the plan text and
    the structured plan for evaluation purposes.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制定计划**。目标[在此](https://github.com/rmartinshort/image_agent/blob/main/image_agent/prompts/PlanStructure.py)是创建一个由代理可以逐步执行的计划组件列表。我们取计划文本并强制模型生成一个列表，该列表根据此处Pydantic模型保持一致的格式。保留计划文本和结构化计划对于评估目的很有用。'
- en: '**Execute the plan.** Each element in the structured plan contains a tool name
    and inputs. We then proceed to call these tools in sequence and gather their results.
    Our agent has just two available tools: special vision (which calls Florence2)
    or general vision (which calls Qwen2 or GPT4o) and the routing node is used to
    keep track of the current plan stage'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**执行计划**。结构化计划中的每个元素都包含一个工具名称和输入。然后我们按顺序调用这些工具并收集它们的结果。我们的代理只有两个可用的工具：特殊视觉（调用Florence2）或通用视觉（调用Qwen2或GPT4o），路由节点用于跟踪当前计划阶段。'
- en: '**Assess the result.** Once each step of the plan has been executed, a model
    gets to see the inputs and outputs and make an assessment of whether or not the
    the question was answered. If not, we go back to the planning step and try to
    amend the old plan using these new insights. If yes, we proceed to the end. If
    the model revises the plan too many times, a timeout is triggered that allows
    the loop to break.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估结果**。一旦执行了计划的每个步骤，模型就可以看到输入和输出，并评估问题是否得到回答。如果没有，我们就回到计划步骤，并尝试使用这些新见解修改旧计划。如果答案是肯定的，我们就继续进行。如果模型修改计划次数过多，就会触发超时，允许循环中断。'
- en: There are many possible improvements and extensions here, for example in the
    current implementation the agent just spits out the results of all the prior steps,
    but an LLM could be called here to formulate them into a nice answer if desired.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有许多可能的改进和扩展，例如，在当前实现中，代理只是输出所有先前步骤的结果，但如果需要，可以调用LLM将它们整理成一份漂亮的答案。
- en: As an example just to see it in action, we give it the following image and input
    text, which is a fairly complex set of questions
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 仅作为一个示例，看看它是如何工作的，我们给它以下图像和输入文本，这是一个相当复杂的问题集。
- en: '![The image used in this example test, photograph taken by the author.](../Images/c0313179eeb2d346d716e5157abc63de.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![本示例测试中使用的图片，由作者拍摄。](../Images/c0313179eeb2d346d716e5157abc63de.png)'
- en: The image used in this example test, photograph taken by the author.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 本示例测试中使用的图片，由作者拍摄。
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: After going through all the steps, this is the result we get.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 经过所有步骤后，我们得到以下结果。
- en: '[PRE1]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: And we can plot these results to confirm the bounding boxes.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这些结果绘制出来以确认边界框。
- en: '![The agent''s answer to our multi-part question about this image, where we
    overlay the bounding box coordinates it provides.](../Images/1b7b59ca1069a3106f0ccf6fd7e2cd43.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![代理对我们关于这张图片的多部分问题的回答，其中我们叠加了它提供的边界框坐标。](../Images/1b7b59ca1069a3106f0ccf6fd7e2cd43.png)'
- en: The agent’s answer to our multi-part question about this image, where we overlay
    the bounding box coordinates it provides.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 代理对我们关于这张图片的多部分问题的回答，其中我们叠加了它提供的边界框坐标。
- en: Impressive! One could argue about whether or not it really found all the skyscrapers
    here but I feel like such a system has the potential to be quite powerful and
    useful, especially if we were to add the ability to crop the bounding boxes, zoom
    in and continue the conversation.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 非凡！有人可能会争论是否真的找到了这里所有的摩天大楼，但我感觉这样的系统有潜力变得非常强大和有用，特别是如果我们能够添加裁剪边界框、放大并继续对话的能力。
- en: In the following sections, let’s dive into the main steps in a bit more detail.
    My hope is that some of them might be informative for your projects too.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的部分，让我们更详细地探讨一下主要步骤。我的希望是其中的一些内容也可能对你的项目有所帮助。
- en: The agent state, nodes and edges
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理状态、节点和边
- en: My [previous article](https://medium.com/towards-data-science/building-a-research-agent-that-can-write-to-google-docs-part-1-4b49ea05a292)
    contains a more detailed discussion of agents and LangGraph, so here I’ll just
    touch in the agent state for this project. The [AgentState](https://github.com/rmartinshort/image_agent/blob/main/image_agent/agent/AgentState.py)
    is made accessible to all the nodes in the LangGraph graph, and it’s where the
    information relevant to a query gets stored.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我的[上一篇文章](https://medium.com/towards-data-science/building-a-research-agent-that-can-write-to-google-docs-part-1-4b49ea05a292)对代理和LangGraph进行了更详细的讨论，所以在这里我只会简要提及这个项目的代理状态。[AgentState](https://github.com/rmartinshort/image_agent/blob/main/image_agent/agent/AgentState.py)使LangGraph图中的所有节点都可以访问，并且它是存储与查询相关的信息的地方。
- en: Each node can be told to write to one of more variables in the state, and by
    default they get overwritten. This is not the behavior we want for the plan output,
    which is supposed to be a list of results from each step of the plan. To ensure
    that this list gets appended as the agent goes about its work we use the add reducer,
    which you can read more about [here](https://langchain-ai.github.io/langgraph/concepts/low_level/#reducers).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 每个节点都可以被指示写入状态中的一个或多个变量，并且默认情况下它们会被覆盖。这不是我们想要的计划输出行为，计划输出应该是计划每个步骤的结果列表。为了确保这个列表在代理执行任务时被附加，我们使用了添加归约器，你可以在这里了解更多信息[这里](https://langchain-ai.github.io/langgraph/concepts/low_level/#reducers)。
- en: Each of the nodes in the graph above is a method in the class `AgentNodes`.
    They take in state, perform some action (typically calling an LLM) and output
    their updates to the state. As an example, [here](https://github.com/rmartinshort/image_agent/blob/main/image_agent/agent/AgentNodes.py)‘s
    the node used to structure the plan, copied from the code here.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图表上每个节点都是`AgentNodes`类中的一个方法。它们接收状态，执行一些操作（通常是调用LLM）并将它们的更新输出到状态。例如，[这里](https://github.com/rmartinshort/image_agent/blob/main/image_agent/agent/AgentNodes.py)是这个节点用来构建计划的，代码是从这里复制的。
- en: '[PRE2]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The routing node is also important because it’s visited multiple times over
    the course of plan execution. In the current code it’s very simple, just updating
    the current step state value so that other nodes know which part of the plan structure
    list to look at.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 路由节点也很重要，因为在计划执行过程中它会被访问多次。在当前代码中，它非常简单，只是更新当前步骤的状态值，以便其他节点知道应该查看计划结构列表的哪个部分。
- en: '[PRE3]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: An extension here would be to add another LLM call in the routing node to check
    if the output of the previous step of the plan warrants any modifications to the
    next steps or early termination of the question has been answered.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 一个扩展是，在路由节点中添加另一个LLM调用，以检查计划的前一步输出是否需要对下一步进行任何修改，或者是否已经回答了问题的早期终止。
- en: Finally we need to add two conditional edges, which use data stored in the `AgentState`to
    determine which node should be run next. For example, the `choose_model` edge
    looks at the name of the current step in the `plan_structure` object carried in
    `AgentState` and then uses a simple if stagement to return the name of corresponding
    node that should be called at that step.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们需要添加两个条件边，它们使用存储在`AgentState`中的数据来确定下一个应该运行的节点。例如，`choose_model`边查看`AgentState`中携带的`plan_structure`对象中当前步骤的名称，然后使用简单的if语句返回在该步骤应该调用的对应节点的名称。
- en: '[PRE4]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The entire agent structure looks like this.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 整个代理结构看起来是这样的。
- en: '[PRE5]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: And it can be vizualized in a notebook using the turorial [here](https://langchain-ai.github.io/langgraph/how-tos/visualization/).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 并且可以使用[这里](https://langchain-ai.github.io/langgraph/how-tos/visualization/)的教程在笔记本中可视化。
- en: The orchestration model
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奏效模型
- en: The planning, structure and assessment nodes are ideally suited to a text-based
    LLM that can reason and produce structured outputs. The most straightforward option
    here is to go with a large, versatile model like GPT4o-mini, which has the benefit
    of [excellent support for JSON output from a Pydantic schema](https://platform.openai.com/docs/guides/structured-outputs).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 规划、结构和评估节点非常适合基于文本的 LLM，它可以进行推理并产生结构化输出。这里最直接的选择是使用一个大型、通用的模型如 GPT4o-mini，它有从
    Pydantic 架构中输出[优秀的 JSON 支持](https://platform.openai.com/docs/guides/structured-outputs)的优点。
- en: With the help of some LangChain functionality, we can make class to call such
    a model.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在 LangChain 功能的帮助下，我们可以创建一个调用此类模型的类。
- en: '[PRE6]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: To set this up, we supply a system prompt and an output model (see [here](https://github.com/rmartinshort/image_agent/tree/main/image_agent/prompts)
    for some examples of these) and then we can just use the call method with an input
    string to get a response that conforms to the structure of the output model that
    we specified. With the code set up like this we’d need to make a new instance
    of `StructuredOpenAICaller` with every different system prompt and output model
    we used in the agent. I personally prefer this to keep track of the different
    models being used, but as the agent becomes more complex it could be modified
    with another method to directly update the system prompt and output model in the
    single instance of the class.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 要设置这个，我们提供一个系统提示和一个输出模型（参见[这里](https://github.com/rmartinshort/image_agent/tree/main/image_agent/prompts)以获取一些这些模型的示例），然后我们可以仅使用带有输入字符串的调用方法来获取符合我们指定的输出模型结构的响应。按照这样的代码设置，我们需要为代理中使用的每个不同的系统提示和输出模型创建一个新的
    `StructuredOpenAICaller` 实例。我个人更喜欢这样做以跟踪不同模型的使用情况，但随着代理变得更加复杂，它可以通过另一种方法修改，以直接在类的单个实例中更新系统提示和输出模型。
- en: Can we do this with local models too? On Apple Silicon, we can use the MLX library
    and MLX community on Hugging Face to easily experiment with open source models
    like Llama3.2\. LangChain also has support for MLX integration, so we can follow
    the structure of the class above to set up a local model.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们是否也可以在本地模型上做这件事？在 Apple Silicon 上，我们可以使用 MLX 库和 Hugging Face 上的 MLX 社区来轻松实验开源模型如
    Llama3.2。LangChain 也支持 MLX 集成，因此我们可以遵循上面类结构的设置来配置本地模型。
- en: '[PRE7]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: There are a few interesting points here. For a start, we can just download the
    weights and config for Llama3.2 as we would any other Hugging Face model, then
    under the hood they are loaded into MLX using the MLXPipeline tool from LangChain.
    When the models are first downloaded they are automatically placed in the Hugging
    Face cache. Sometimes it’s desirable to list the models and their cache locations,
    for example if you want to copy a model to a new environment. The util `scan_cache_dir`
    will help here and can be used to make a useful result with this function.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有几个有趣的观点。首先，我们可以像下载任何其他 Hugging Face 模型一样下载 Llama3.2 的权重和配置，然后它们在 LangChain
    的 MLXPipeline 工具的帮助下被加载到 MLX 中。当模型首次下载时，它们会自动放置在 Hugging Face 缓存中。有时列出模型及其缓存位置是有用的，例如，如果你想将模型复制到新的环境中。`scan_cache_dir`
    工具在这里会很有帮助，并且可以使用此函数生成有用的结果。
- en: '[PRE8]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Llama3.2 does not have a built-in support for structured output like GPT4o-mini,
    so we need to use the prompt to force it to generate JSON. LangChain’s `PydanticOutputParser`
    can help, although it it also possible to implement your own version of this as
    shown [here](https://medium.com/@alejandro7899871776/structure-output-with-llama-from-scratch-39c487b6be81).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: Llama3.2 没有内置对结构化输出（如 GPT4o-mini）的支持，因此我们需要使用提示来强制它生成 JSON。LangChain 的 `PydanticOutputParser`
    可以帮助，尽管你也可以像[这里](https://medium.com/@alejandro7899871776/structure-output-with-llama-from-scratch-39c487b6be81)所示的那样实现自己的版本。
- en: In my experience, the version of Llama that I’m using here, namely Llama-3.2–3B-Instruct-4bit,
    is not reliable for structured output beyond the simplest schemas. It’s reasonably
    good at the "plan generation" stage of our agent given a prompt with a few examples,
    but even with the help of the instructions provided by `PydanticOutputParser`,
    it often fails to turn that plan into JSON. Larger and/or less quantized versions
    of Llama will likely be better, but they would run into RAM issues if run alongside
    the other models in our agent. Therefore going forwards in the project, the orchestration
    mdoel is set to be GPT4o-mini.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的经验，我在这里使用的 Llama 版本，即 Llama-3.2–3B-Instruct-4bit，对于结构化输出来说，除了最简单的模式外并不可靠。它在我们代理的“计划生成”阶段，给定几个示例的提示时表现相当不错，但即使有
    `PydanticOutputParser` 提供的指令帮助，它也经常无法将那个计划转换为 JSON。Llama 的更大和/或更少量化的版本可能会更好，但它们如果在我们的代理模型旁边运行，可能会遇到
    RAM 问题。因此，在项目向前推进时，编排模型被设置为 GPT4o-mini。
- en: 'A model for general vision: Qwen2-VL'
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通用视觉模型：Qwen2-VL
- en: To be able to answer questions like "What’s going on in this image?" or "what
    city is this?", we need a multimodal LLM. Arguably Florence2 in image captioning
    mode might be to give good responses to this type of question, but it’s not really
    designed for conversational output.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 要能够回答像“这张图片里发生了什么？”或“这是哪个城市？”这样的问题，我们需要一个多模态大型语言模型。可以说，在图像标题模式下，Florence2 可能能够给出这类问题的良好回答，但它并不是真正为对话输出而设计的。
- en: The field of multimodal models small enough to run on a laptop is still in its
    infancy (a recently compiled list can be found [here](https://medium.com/@alejandro7899871776/the-best-small-vlms-vision-language-models-for-your-next-app-47e0c64190e7)),
    but the [Qwen2-VL series from Alibaba](https://qwenlm.github.io/blog/qwen2-vl/)
    is a promising development. Furthermore, we can make use of [MLX-VLM](https://github.com/Blaizzy/mlx-vlm),
    an extension of MLX specifically designed for tuning and inference of vision models,
    to set up one of these models within our agent framework.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 能够在笔记本电脑上运行的足够小的多模态模型领域仍处于起步阶段（一个最近编译的列表可以在[这里](https://medium.com/@alejandro7899871776/the-best-small-vlms-vision-language-models-for-your-next-app-47e0c64190e7)找到），但[阿里巴巴的
    Qwen2-VL 系列](https://qwenlm.github.io/blog/qwen2-vl/)是一个有希望的发展。此外，我们可以利用[MLX-VLM](https://github.com/Blaizzy/mlx-vlm)，这是专门为调整和推理视觉模型而设计的
    MLX 的扩展，在我们的代理框架内设置其中一个模型。
- en: '[PRE9]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: This class will load the smallest version of Qwen2-VL and then call it with
    an input image and prompt to get a textual response. For more detail about the
    functionality of this model and others that could be used in the same way, check
    out this [list of examples](https://github.com/Blaizzy/mlx-vlm/blob/main/examples/multi_image_generation.ipynb)
    on the MLX-VLM github page. Qwen2-VL is also apparently capable of generating
    bounding boxes and object pointing coordinates, so this capability could also
    be explored and compared with Florence2.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这个类将加载 Qwen2-VL 的最小版本，然后使用输入图像和提示来调用它，以获取文本响应。有关此模型的功能以及可以以相同方式使用的其他模型更详细的说明，请查看
    MLX-VLM GitHub 页面上的此[示例列表](https://github.com/Blaizzy/mlx-vlm/blob/main/examples/multi_image_generation.ipynb)。Qwen2-VL
    显然还能够生成边界框和对象指向坐标，因此这种能力也可以探索并与 Florence2 进行比较。
- en: Of course GPT-4o-mini also has vision capabilities and is likely more reliable
    than smaller local models. Therefore when building these sorts of applications
    it’s useful to add the ability to call a cloud based alternative, if anything
    just as a backup in case one of the local models fails. Note that input images
    must be converted to base64 before they can be sent to the model, but once that’s
    done we can also use the LangChain framework as shown below.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，GPT-4o-mini 也具备视觉能力，并且可能比更小的本地模型更可靠。因此，在构建这类应用时，添加调用基于云的替代方案的能力是有用的，至少可以作为备份，以防其中一个本地模型失败。请注意，在将图像发送到模型之前，必须将输入图像转换为
    base64 格式，但一旦完成转换，我们也可以像下面所示使用 LangChain 框架。
- en: '[PRE10]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'A specialized model for Vision: Florence2'
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 专门用于视觉的模型：Florence2
- en: Florence2 is seen as a specialist model in the context of our agent because
    while it has many capabilities its inputs must be selected from a list of predefined
    task prompts. Of course the model could be fine tuned to accept new prompts, but
    for our purposes the version downloaded directly from Hugging Face works well.
    The beauty of this model is that it uses a single training process and set of
    weights, but yet achieves high performance in multiple image tasks that previously
    would have demanded their own models. The key to this success lies in its large
    and carefully curated training dataset, FLD-5B. To learn more about the dataset,
    model and training I recommend [this excellent article](https://www.assemblyai.com/blog/florence-2-how-it-works-how-to-use/).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的代理上下文中，Florence2被视为一个专业模型，因为它虽然功能强大，但其输入必须从预定义的任务提示列表中选择。当然，该模型可以被微调以接受新的提示，但就我们的目的而言，直接从Hugging
    Face下载的版本效果很好。这个模型的美妙之处在于它使用单个训练过程和一组权重，但仍然在多个图像任务中实现了高性能，这些任务以前可能需要它们自己的模型。这一成功的关键在于其庞大且精心策划的训练数据集FLD-5B。要了解更多关于数据集、模型和训练的信息，我推荐[这篇优秀的文章](https://www.assemblyai.com/blog/florence-2-how-it-works-how-to-use/)。
- en: In our context, we use the orchestration model to turn the query into a series
    of Florence task prompts, which we then call in a sequence. The options available
    to us include captioning, object detection, phrase grounding, OCR and segmentation.
    For some of these options (i.e. phrase grounding and region to segmentation) an
    input phrase is needed, so the orchestration model generates that too. In contrast,
    tasks like captioning need only the image. T[here](https://huggingface.co/microsoft/Florence-2-large/blob/main/sample_inference.ipynb)
    are many use cases for Florence2, which are explored in code here. We restrict
    ourselves to object detection, phrase grounding, captioning and OCR, though it
    would be straightforward to add more by updating the prompts associated with plan
    generation and structuring.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的上下文中，我们使用编排模型将查询转换为一系列Florence任务提示，然后按顺序调用。我们可用的选项包括标题生成、对象检测、短语定位、OCR和分割。对于其中一些选项（即短语定位和区域分割），需要一个输入短语，因此编排模型也会生成它。相反，像标题生成这样的任务只需要图片。T[这里](https://huggingface.co/microsoft/Florence-2-large/blob/main/sample_inference.ipynb)有许多Florence2的使用案例，这些案例在代码中进行了探索。我们限制自己只使用对象检测、短语定位、标题生成和OCR，尽管通过更新与计划生成和结构相关的提示，可以轻松添加更多。
- en: Florence2 appears to be supported by the MLX-VLM package, but at the time of
    writing I couldn’t find any examples of its use and so opted for an approach that
    uses Hugging Face transformers as shown below.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: Florence2似乎由MLX-VLM包支持，但在撰写本文时，我找不到其使用的任何示例，因此选择了以下使用Hugging Face转换器的方案。
- en: '[PRE11]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: On Apple Silicon, the device becomes `mps` and the latency of these model calls
    is tolerable. This code should also work on GPU and CPU, though this has not been
    tested.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在Apple Silicon上，设备变为`mps`，这些模型调用的延迟是可以容忍的。此代码也应该在GPU和CPU上工作，尽管尚未进行测试。
- en: Another example and some limitations
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 另一个示例和一些限制
- en: Let’s run through another example to see the agent outputs from each step. To
    call the agent on an input query and image we can use the `Agent.invoke` method,
    which follows the same process as described in [my previous article](https://medium.com/towards-data-science/building-a-research-agent-that-can-write-to-google-docs-part-1-4b49ea05a292)
    to add each node output to a list of results in addition to saving outputs in
    a LangGraph `InMemoryStore` object.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再通过另一个示例来查看代理在每个步骤的输出。要调用代理处理输入查询和图片，我们可以使用`Agent.invoke`方法，该方法遵循我在[上一篇文章](https://medium.com/towards-data-science/building-a-research-agent-that-can-write-to-google-docs-part-1-4b49ea05a292)中描述的相同过程，将每个节点输出添加到结果列表中，并在LangGraph
    `InMemoryStore`对象中保存输出。
- en: We’ll be using the following image, which presents an interesting challenge
    if we ask a tricky question like "Are there trees in this image? If so, find them
    and describe what they are doing"
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用以下图片，如果我们提出一个棘手的问题，比如“这张图片里有树吗？如果有，请找到它们并描述它们在做什么”，这将是一个有趣的挑战。
- en: '![Testing image for this section. Photo by Hannah Lim on Unsplash](../Images/e8aadecdec56594ee4f8dc7f6a9a8042.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![本节测试图片。照片由Hannah Lim在Unsplash拍摄](../Images/e8aadecdec56594ee4f8dc7f6a9a8042.png)'
- en: Testing image for this section. Photo by [Hannah Lim](https://unsplash.com/@hannah15198?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/litter-of-dogs-fall-in-line-beside-wall-U6nlG0Y5sfs?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 本节测试图片。照片由[Hannah Lim](https://unsplash.com/@hannah15198?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/litter-of-dogs-fall-in-line-beside-wall-U6nlG0Y5sfs?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)上拍摄。
- en: '[PRE12]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'In an ideal world the answer is straightforward: There are no trees.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个理想的世界里，答案很简单：没有树。
- en: However this turns out to be a difficult question for the agent and it’s interesting
    to compare the responses when it using GPT-4o-mini vs. Qwen2 as the general vision
    model.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这个问题对于代理来说可能是一个难题，有趣的是比较当它使用GPT-4o-mini与Qwen2作为通用视觉模型时的响应。
- en: 'When we call `full_agent_qwen_vision` with this query, we get a bad result:
    Both Qwen2 and Florence2 fall for the trick and report that trees are present
    (interestingly, if we change "trees" to "dogs", we get the right answer)'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们用这个查询调用`full_agent_qwen_vision`时，我们得到了一个糟糕的结果：Qwen2和Florence2都会中计，并报告说有树（有趣的是，如果我们把“树”改为“狗”，我们会得到正确答案）。
- en: '[PRE13]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Qwen2 seems subject to blindly following the prompts hint that here might be
    trees present. Florence2 also fails here, reporting a bounding box when it should
    not
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: Qwen2似乎会盲目地跟随提示暗示这里可能存在树。Florence2在这里也失败了，报告了一个不应该报告的边界框。
- en: '![If asked "Are there trees in this image, If so, find them and describe what
    they''re doing", both Qwen2 and Florence2 fall for the trick. Image generated
    by the author.](../Images/bedb7b0f60b5909b671ae5f1e52808e5.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![如果被问及“这张图片里有树吗？如果有，找到它们并描述它们在做什么”，Qwen2和Florence2都会中计。图片由作者生成。](../Images/bedb7b0f60b5909b671ae5f1e52808e5.png)'
- en: If asked "Are there trees in this image, If so, find them and describe what
    they’re doing", both Qwen2 and Florence2 fall for the trick. Image generated by
    the author.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果被问及“这张图片里有树吗？如果有，找到它们并描述它们在做什么”，Qwen2和Florence2都会中计。图片由作者生成。
- en: '![If asked "Are there dogs in this image? If so, find them and describe what
    they''re doing", both the Qwen and GPT-based agents will produce the correct answer.
    Image generated by the author.](../Images/e4ecdd2ccc44a38b40f2bd60593681b9.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![如果被问及“这张图片里有狗吗？如果有，找到它们并描述它们在做什么”，Qwen和基于GPT的代理都会给出正确答案。图片由作者生成。](../Images/e4ecdd2ccc44a38b40f2bd60593681b9.png)'
- en: If asked "Are there dogs in this image? If so, find them and describe what they’re
    doing", both the Qwen and GPT-based agents will produce the correct answer. Image
    generated by the author.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果被问及“这张图片里有狗吗？如果有，找到它们并描述它们在做什么”，Qwen和基于GPT的代理都会给出正确答案。图片由作者生成。
- en: If we call `full_agent_gpt_vision`with the same query, GPT4o-mini doesn’t fall
    for the trick, but the call to Florence2 hasn’t changed so it still fails. We
    then see the query assessment step in action because the generalist and specialist
    models have produced conflicting results.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们用相同的查询调用`full_agent_gpt_vision`，GPT4o-mini不会中计，但调用Florence2的方式没有改变，所以它仍然失败了。我们随后看到了查询评估步骤的实际操作，因为通用模型和专家模型产生了相互矛盾的结果。
- en: '[PRE14]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The agent then tries several times to restructure the plan, but Florence2 insists
    on producing a bounding box for "tree", which the answer assessment nodes always
    catches as inconsistent. This is a better result than the Qwen2 agent, but points
    to a broader issue of false positives with Florence2\. This could be addressed
    by having the routing node evaluate the plan after every step and then only call
    Florence2 if absolutely necessary.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 代理随后尝试多次重新构建计划，但Florence2坚持为“树”生成边界框，而答案评估节点总是将其视为不一致。这比Qwen2代理的结果要好，但也指向了Florence2的更广泛问题，即假阳性。这可以通过在每一步之后由路由节点评估计划来解决，然后只有在绝对必要时才调用Florence2。
- en: With the basic building blocks in place, this system is ripe for experimentation,
    iteration and improvement and I may continue to add to the repo over the coming
    weeks. For now though, this article is long enough!
  id: totrans-86
  prefs: []
