- en: One Turn After Another
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 一轮又一轮
- en: 原文：[https://towardsdatascience.com/one-turn-after-another/](https://towardsdatascience.com/one-turn-after-another/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/one-turn-after-another/](https://towardsdatascience.com/one-turn-after-another/)
- en: While some games, like rock-paper-scissors, only work if all payers decide on
    their actions simultaneously, other games, like chess or Monopoly, expect the
    players to take turns one after another. In game theory, the first kind of game
    is called a **static game**, while turn-taking is a property of so-called **dynamic
    games**. In this article, we will analyse the latter with methods from game theory.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然有些游戏，如剪刀石头布，只有当所有玩家同时决定他们的动作时才能工作，但其他游戏，如象棋或大富翁，期望玩家一个接一个地轮流进行。在博弈论中，这种类型的游戏被称为**静态游戏**，而轮流是所谓**动态游戏**的特性。在这篇文章中，我们将使用博弈论的方法来分析后者。
- en: This article is the fourth part of a four-chapter series on the fundamentals
    of game theory. I recommend you to read the [first](https://towardsdatascience.com/talking-about-games/)
    [three](https://towardsdatascience.com/i-wont-change-unless-you-do/) [articles](https://towardsdatascience.com/when-you-just-cant-decide-on-a-single-action/)
    if you haven’t done that yet, as the concepts shown here will build on the terms
    and paradigms introduced in the previous articles. But if you are already familiar
    with the core fundamentals of game theory, don’t let yourself be stopped, and
    go ahead!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章是关于博弈论基础的四篇系列文章的第四部分。如果你还没有阅读，我建议你阅读[第一篇](https://towardsdatascience.com/talking-about-games/)
    [第二篇](https://towardsdatascience.com/i-wont-change-unless-you-do/) [第三篇](https://towardsdatascience.com/when-you-just-cant-decide-on-a-single-action/)，因为这里展示的概念将建立在之前文章中引入的术语和范例之上。但如果你已经熟悉博弈论的核心基础，不要让自己停下来，继续前进！
- en: Dynamic games
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动态游戏
- en: '![](../Images/aca2053200aa8ea9eef8105459bfb3c6.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![动态游戏的树状可视化](../Images/aca2053200aa8ea9eef8105459bfb3c6.png)'
- en: Dynamic games can be visualized as trees. Photo by [Adarsh Kummur](https://unsplash.com/@akummur?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 动态游戏可以像树一样可视化。图片由[Adarsh Kummur](https://unsplash.com/@akummur?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上提供。
- en: While so far we only looked at **static games**, we will now introduce **dynamic
    games** where payers take turns. As previously, such games include a number of
    **players** *n*, a set of **actions** for each player, and a **reward** function
    that assesses the actions of a player given the other players’ actions. Beyond
    that, for a dynamic game, we need to define an order in which the players take
    their turns. Consider the following tree-like visualization of a dynamic game.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然到目前为止我们只看了**静态游戏**，但现在我们将介绍**动态游戏**，在这种游戏中玩家轮流进行。和之前一样，这类游戏包括多个**玩家**n，每个玩家有一组**动作**，以及一个**奖励函数**，该函数根据其他玩家的动作评估玩家的动作。除此之外，对于动态游戏，我们还需要定义玩家轮流顺序。考虑以下动态游戏的树状可视化。
- en: '![](../Images/808389d563a02acf9f43a126cef126a5.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![动态游戏的可视化](../Images/808389d563a02acf9f43a126cef126a5.png)'
- en: A visualization of a dynamic game. Figure by author.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 动态游戏的可视化。图由作者绘制。
- en: At the top we have a node where player 1 has to decide between two actions L
    and R. This determines whether to follow the left part or the right part of the
    tree. After player 1’s turn, player 2 takes their turn. If player 1 chooses L,
    player 2 can decide between l1 and r1\. If player 1 chooses R, player 2 has to
    decide between l2 and r2\. At the leaves of the tree (the nodes at the bottom),
    we see the rewards just like we had them in the matrix cells in static games.
    For example, if player 1 decides for L and player 2 decides for r1, the reward
    is (1,0); that is, player 1 gets a reward of 1, and player 2 gets a reward of
    0.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在顶部有一个节点，玩家1需要在两个动作L和R之间做出选择。这决定了是否跟随树的左侧或右侧部分。玩家1回合结束后，玩家2进行回合。如果玩家1选择L，玩家2可以在l1和r1之间做出选择。如果玩家1选择R，玩家2必须选择l2或r2。在树的叶子（底部的节点）上，我们看到奖励，就像我们在静态游戏的矩阵单元中看到的那样。例如，如果玩家1选择L，玩家2选择r1，则奖励为(1,0)；也就是说，玩家1获得1的奖励，玩家2获得0的奖励。
- en: I bet you are eager to find the Nash equilibrium of this game, as this is what
    Game Theory is mainly about (if you still struggle with the concept of Nash equilibrium,
    you might want to take a look back at [chapter 2](https://towardsdatascience.com/i-wont-change-unless-you-do/)
    of this series). To do that, we can transform the game into a matrix, as we already
    know how to find a Nash equilibrium in a game displayed as a matrix. Player 1
    decides on the row of the matrix, player 2 decides on the column and the values
    in the cell then specifies the reward. However, there is one important point to
    notice. When we look at the game displayed as a tree, player 2 decides on their
    action *after* player 1 does and hence only cares about the part of the tree that
    is actually reached. If player 1 chooses action L, player 2 only decides between
    l1 and r1 and doesn’t care about l2 and r2, because these actions are out of the
    question anyway. However, when we search for a Nash Equilibrium, we need to be
    aware of what would happen, if player 1 would change their action. Therefore,
    we must know what player 2 would have done if player 1 had chosen a different
    option. That is why we have four columns in the following matrix, to always account
    for decisions in both parts of the tree.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我打赌你很想知道这个游戏的纳什均衡，这正是博弈论的主要内容（如果你仍然对纳什均衡的概念感到困惑，你可能想回顾一下本系列的 [第2章](https://towardsdatascience.com/i-wont-change-unless-you-do/)）。为了做到这一点，我们可以将游戏转换成矩阵，因为我们已经知道如何在矩阵形式的游戏中找到纳什均衡。玩家1决定矩阵的行，玩家2决定列，单元格中的值指定了奖励。然而，有一个重要的点需要注意。当我们以树的形式查看游戏时，玩家2在玩家1之后决定他们的行动，因此只关心实际到达的树的部分。如果玩家1选择行动
    L，玩家2只在 l1 和 r1 之间做出选择，而不关心 l2 和 r2，因为这些行动无论如何都是不可能的。然而，当我们寻找纳什均衡时，我们需要意识到如果玩家1改变他们的行动会发生什么。因此，我们必须知道如果玩家1选择了不同的选项，玩家2会做什么。这就是为什么在下图中我们有四列，以确保始终考虑到树的两个部分的决策。
- en: '![](../Images/0405a67c0b52157cfdbacf9ad441df80.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0405a67c0b52157cfdbacf9ad441df80.png)'
- en: 'A column like (r1,l2) can be read as “player 2 chooses r1 if player 1 chose
    L and chooses l2 if player 1 chose R”. On this matrix, we can search for the best
    answers. For example, the cell (L, (l1,l2)) with reward 3,1 is a best answer.
    Player 1 has no reason to change from L to R because that would lower his reward
    (from 3 to 1), and Player 2 has no reason to change either because none of the
    other options is better (one is as good, though). In total, we find three Nash
    equilibria, which are underlined in the upcoming matrix:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于 (r1,l2) 的列可以读作“如果玩家1选择了 L，则玩家2选择 r1；如果玩家1选择了 R，则玩家2选择 l2”。在这个矩阵中，我们可以寻找最佳答案。例如，奖励为
    3,1 的单元格 (L, (l1,l2)) 是一个最佳答案。玩家1没有理由从 L 改变到 R，因为这会降低他的奖励（从 3 降低到 1），同样，玩家2也没有理由改变，因为其他选项都没有更好（虽然有一个选项和它一样好）。总的来说，我们找到了三个纳什均衡，这些均衡在下图中被划线标注：
- en: '![](../Images/7f0269894a3400007e8deab0979ac759.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7f0269894a3400007e8deab0979ac759.png)'
- en: The chocolate-pudding market
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 巧克力布丁市场
- en: '![](../Images/651aa84b68473a4c6a6e4a3ee8dc3a76.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/651aa84b68473a4c6a6e4a3ee8dc3a76.png)'
- en: We will talk about chocolate pudding now. But also about game theory. Photo
    by [American Heritage Chocolate](https://unsplash.com/@americanheritagechocolate?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将讨论巧克力布丁。同时，也会谈到博弈论。图片由 [American Heritage Chocolate](https://unsplash.com/@americanheritagechocolate?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 提供
- en: Our next example brings the idea of dynamic games to life. Let’s assume player
    2 is a market-leading retailer of chocolate pudding. Player 1 also wants to build
    up his business but isn’t sure yet whether to join the chocolate pudding market
    or whether they rather should sell something else. In our game, player 1 has the
    first turn and can decide between two actions. Join the market (i.e., sell chocolate
    pudding), or don’t join the market (i.e., sell something else). If player 1 decides
    to sell something other than chocolate pudding, player 2 stays the market-dominating
    retailer for chocolate pudding and player 1 makes some money in the other area
    they decided for. This is reflected by the reward 1,3 in the right part of the
    tree in the following figure.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接下来的例子将动态游戏的概念生动地展现出来。让我们假设玩家2是巧克力布丁市场的市场领先零售商。玩家1也想建立自己的业务，但还不确定是否要加入巧克力布丁市场，或者他们是否应该卖其他东西。在我们的游戏中，玩家1有第一个回合，可以选择两个行动。加入市场（即销售巧克力布丁），或者不加入市场（即销售其他东西）。如果玩家1决定销售除巧克力布丁以外的其他东西，玩家2将保持巧克力布丁市场的市场主导零售商，玩家1将在他们决定的其他领域赚一些钱。这在上一个图中的树形图的右侧部分通过回报1,3反映出来。
- en: '![](../Images/eae80f81bb1b1a9f8ec245aec5f94aa9.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eae80f81bb1b1a9f8ec245aec5f94aa9.png)'
- en: The market-game as a dynamic game. Figure by author.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 市场游戏作为一个动态游戏。图由作者绘制。
- en: But what if player 1 is greedy for the unimaginable riches that lie dormant
    on the chocolate pudding market? If they decide to join the market, it is player
    2’s turn. They can decide to accept the new competitor, give in and share the
    market. In this case, both players get a reward of 2\. But player 2 can also decide
    to start a price war to demonstrate his superiority to the new competitor. In
    this case, both players get a reward of 0, because they ruin their profit due
    to dumping prices.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，如果玩家1对巧克力布丁市场沉睡的难以想象的财富贪婪？如果他们决定加入市场，那么轮到玩家2了。他们可以决定接受这个新竞争者，屈服并分享市场。在这种情况下，两个玩家都将获得2的回报。但玩家2也可以决定发动价格战，以向新竞争者展示他的优越性。在这种情况下，两个玩家都将获得0的回报，因为他们通过倾销价格破坏了他们的利润。
- en: 'Just like before, we can turn this tree into a matrix and find the Nash equilibria
    by searching for the best answers:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 就像之前一样，我们可以将这个树形图转换成矩阵，通过寻找最佳答案来找到纳什均衡：
- en: '![](../Images/9e87122418d6303d8eb52152ded0d3b0.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9e87122418d6303d8eb52152ded0d3b0.png)'
- en: If player 1 joins the market, the best option for player 1 is to give in. This
    is an equilibrium because no player has any reason to change. For player 1 it
    does not make sense to leave the market (that would give a reward of 1 instead
    of 2) and for player 2 it is no good idea to switch to fighting either (which
    would give a reward of 0 instead of 2). The other Nash equilibrium happens when
    player 1 just doesn’t join the market. However, this scenario includes player
    2’s decision to fight, if player 1 had chosen to join the market instead. He basically
    makes a threat and says “If you join the market, I will fight you.” Remember that
    previously we said we need to know what the players would do even in the cases
    that don’t appear to happen? Here we see why this is important. Player 1 needs
    to assume that player 2 would fight because that is the only reason for player
    1 to stay out of the market. If player 2 wouldn’t threaten to fight, we wouldn’t
    have a Nash equilibrium, because then joining the market would become a better
    option for player 1.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果玩家1加入市场，玩家1的最佳选择是屈服。这是一个均衡，因为没有任何玩家有改变的理由。对于玩家1来说，离开市场（这将获得1的回报而不是2）没有意义，而对于玩家2来说，转向战斗也不是一个好主意（这将获得0的回报而不是2）。另一个纳什均衡发生在玩家1根本不加入市场的情况下。然而，这个场景包括玩家2决定战斗的情况，如果玩家1选择加入市场的话。他基本上是在发出威胁，说“如果你加入市场，我将与你战斗。”记住我们之前说过，即使在看起来不会发生的情况下，我们也需要知道玩家会怎么做？这里我们看到了为什么这一点很重要。玩家1需要假设玩家2会战斗，因为这是玩家1留在市场外的唯一原因。如果玩家2不威胁要战斗，我们就不会有一个纳什均衡，因为那时加入市场对玩家1来说将变成一个更好的选择。
- en: But how reasonable is this threat? It keeps player 1 outside the market, but
    what would happen if player 1 didn’t believe the threat and decided to still join
    the market? Would player 2 really carry out his threat and fight? That would be
    very silly because it would give him a reward of 0, whereas giving in would give
    a reward of 2\. From that perspective, player 2 used an empty threat that is not
    very reasonable. If the case really occurs, he wouldn’t carry it out anyway, would
    he?
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 但是这种威胁的合理性如何呢？它将玩家1排除在市场之外，但如果玩家1不相信这种威胁并决定仍然加入市场会怎样呢？玩家2真的会执行他的威胁并战斗吗？那将非常愚蠢，因为这会给他带来0的回报，而屈服则会带来2的回报。从这个角度来看，玩家2使用了一个不合理的空威胁。如果这种情况真的发生，他无论如何也不会执行，对吧？
- en: Subgame perfect equilibrium
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 子博弈完美均衡
- en: '![](../Images/b665978fb6912a46ea65fa81dacd96d4.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b665978fb6912a46ea65fa81dacd96d4.png)'
- en: For a subgame perfect equilibrium, before you get the whole picture, you need
    to start with small parts of the game. Photo by [Ben Stern](https://unsplash.com/@benst287?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 对于子博弈完美均衡，在获得整个图景之前，你需要从游戏的小部分开始。照片由[Ben Stern](https://unsplash.com/@benst287?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)提供。
- en: The previous example showed that sometimes Nash equilibria occur, that are not
    very reasonable within the game. To cope with this problem, a more strict concept
    of equilibrium has been introduced which is called a **subgame perfect equilibrium**.
    This adds some stricter conditions to the notion of an equilibrium. Hence every
    subgame perfect equilibrium is a Nash equilibrium, but not all Nash equilibria
    are subgame perfect.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的例子表明，有时会出现一些纳什均衡，在游戏中并不合理。为了解决这个问题，引入了一个更严格的均衡概念，称为**子博弈完美均衡**。这给均衡的概念增加了一些更严格的条件。因此，每一个子博弈完美均衡都是纳什均衡，但并不是所有的纳什均衡都是子博弈完美的。
- en: 'A Nash equilibrium is *subgame perfect* if every subgame of this equilibrium
    is a Nash equilibrium itself. What does that mean? First, we have to understand
    that a subgame is a part of the game’s tree that starts at any node. For example,
    if player 1 chooses L, the remainder of the tree under the node reached by playing
    L is a subgame. In a likewise fashion, the tree that comes after the node of action
    R is a subgame. Last but not least, the whole game is always a subgame of itself.
    As a consequence, the example we started with has three subgames, which are marked
    in grey, orange and blue in the following:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这个均衡的每一个子博弈本身也是一个纳什均衡，那么纳什均衡就是*子博弈完美的*。这意味着什么？首先，我们必须理解，子博弈是游戏树中从任何节点开始的任何部分。例如，如果玩家1选择L，那么通过玩L到达的节点下的树剩余部分就是一个子博弈。同样地，行动R之后的树也是一个子博弈。最后但同样重要的是，整个游戏始终是它自己的子博弈。因此，我们最初举的例子有三个子博弈，在下面的图中用灰色、橙色和蓝色标记：
- en: '![](../Images/f2b3ee3c3b1d08c30e91608082ec8d97.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f2b3ee3c3b1d08c30e91608082ec8d97.png)'
- en: The market game has three subgames. Figure by author.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 市场游戏有三个子博弈。图由作者绘制。
- en: We already saw, that this game has three Nash equilibria which are (L,(l1,l2)),
    (L, (l1,r2)) and (R,(r1,r2)). Let us now find out which of these are subgame perfect.
    To this end, we investigate the subgames one after another, starting with the
    orange one. If we only look at the orange part of the tree, there is a single
    Nash equilibrium that occurs if player 2 chooses l1\. If we look at the blue subgame,
    there is also a single Nash equilibrium that is reached when player 2 chooses
    r2\. Now that tells us that in every subgame perfect Nash equilibrium, player
    2 has to choose option l1 if we arrive in the orange subgame (i.e. if player 1
    chooses L) and player 2 has to choose option r2 if we arrive at the blue subgame
    (i.e., if player 1 chooses R). Only one of the previous Nash equilibria fulfills
    this condition, namely (L,(l1,r2)). Hence this is the only subgame perfect Nash
    equilibrium of the whole game. The other two versions are Nash equilibria as well,
    but they are somewhat unlogical in the sense, that they contain some kind of empty
    threat, as we had it in the chocolate pudding market example before. The method
    we just used to find the subgame perfect Nash equilibrium is called **backwards
    induction**, by the way.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到，这个博弈有三个纳什均衡，分别是(L,(l1,l2))、(L, (l1,r2))和(R,(r1,r2))。现在让我们找出其中哪些是子博弈完美的。为此，我们一个接一个地研究子博弈，从橙色子博弈开始。如果我们只看树形的橙色部分，如果玩家2选择l1，就会有一个纳什均衡出现。如果我们看蓝色子博弈，当玩家2选择r2时，也会有一个纳什均衡出现。这告诉我们，在每一个子博弈完美的纳什均衡中，如果进入橙色子博弈（即玩家1选择L），玩家2必须选择选项l1；如果进入蓝色子博弈（即玩家1选择R），玩家2必须选择选项r2。只有之前的一个纳什均衡满足这个条件，即(L,(l1,r2))。因此，这是整个博弈唯一的子博弈完美纳什均衡。其他两个版本也是纳什均衡，但它们在逻辑上有些不合理，因为它们包含了一些类似我们在巧克力布丁市场例子中看到的那种空洞的威胁。我们刚才用来找到子博弈完美纳什均衡的方法叫做**逆向归纳法**。
- en: Uncertainty
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不确定性
- en: '![](../Images/d39be59df1d55fa90f67b935d8f1f2e8.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d39be59df1d55fa90f67b935d8f1f2e8.png)'
- en: In dynamic games, it can happen that you have to make decisions without knowing
    exactly what node of the game you are in. Photo by [Denise Jans](https://unsplash.com/@dmjdenise?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在动态博弈中，可能会出现你必须做出决定，但不知道自己处于游戏中的哪个节点的情况。照片由[Denise Jans](https://unsplash.com/@dmjdenise?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)提供。
- en: 'So far in our dynamic games, we always knew which decisions the other players
    made. For a game like chess, this is the case indeed, as every move your opponent
    makes is perfectly observable. However, there are other situations in which you
    might not be sure about the exact moves the other players make. As an example,
    we go back to the chocolate pudding market. You take the perspective of the retailer
    that is already in the market and you have to decide whether you would start fighting
    if the other player joins the market. But there is one thing you don’t know, namely
    how aggressive your opponent will be. When you start fighting, will they be frightened
    easily and give up? Or will they be aggressive and fight you until only one of
    you is left? This can be seen as a decision made by the other player that influences
    your decision. If you expect the other player to be a coward, you might prefer
    to fight, but if they turn out to be aggressive, you would rather want to give
    in (reminds you of the birds fighting for food in the previous chapter, doesn’t
    it?). We can model this scenario in a game like this:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，在我们的动态博弈中，我们总是知道其他玩家做出了哪些决定。对于像棋类游戏这样的游戏，这确实是如此，因为你的对手的每一个动作都是可以完美观察到的。然而，还有其他一些情况，你可能不确定其他玩家确切的动作。作为一个例子，我们回到巧克力布丁市场。你以已经进入市场的零售商的角度来看，你必须决定如果其他玩家加入市场，你是否会开始竞争。但有一件事你不知道，那就是你的对手将有多激进。当你开始竞争时，他们会轻易害怕并放弃吗？还是他们会变得激进，与你战斗直到只剩下一个？这可以被视为其他玩家做出的影响你决策的决定。如果你预计其他玩家是懦夫，你可能会选择战斗，但如果他们表现出攻击性，你可能会更愿意屈服（这让你想起了上一章中鸟类为食物而战斗的场景，不是吗？）。我们可以用这样的博弈来模拟这个场景：
- en: '![](../Images/6497f16514082ed88f512f0a04ce9b2f.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6497f16514082ed88f512f0a04ce9b2f.png)'
- en: A dynamic game with a hidden decision (indicated by the dotted circle). Figure
    by author.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 一个具有隐藏决策的动态博弈（用虚线圆圈表示）。图由作者绘制。
- en: The dotted circle around the two nodes indicates, that these are hidden decisions
    that are not observable to everyone. If you are player 2, you know whether player
    1 joined the market or not, but if they joined, you don’t know whether they are
    aggressive (left node) or moderate (right node). Hence you act under uncertainty,
    which is a very common ingredient in many games you play in the real world. Poker
    would become very boring if everybody knew everyone’s cards, that’s why there
    is private information, namely the cards on your hand only you know about.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 围绕两个节点的虚线圆圈表示，这些是隐藏的决策，不是每个人都能观察到的。如果你是玩家 2，你知道玩家 1 是否加入了市场，但如果他们加入了，你不知道他们是攻击性的（左节点）还是温和的（右节点）。因此，你在不确定性下行动，这在现实世界中你玩的大多数游戏中都是非常常见的。如果每个人都知道了每个人的牌，扑克就会变得非常无聊，这就是为什么存在私有信息，即只有你知道你手中的牌。
- en: 'Now you still have to decide whether to fight or give in, although you are
    not exactly sure what node of the tree you are in. To do that, you have to make
    assumptions about the likelihood of each state. If you are quite certain that
    the other player is behaving moderately, you might be up for a fight, but if you
    assume them to be aggressive, you might prefer giving in. Say there is a probability
    *p* that the other player is aggressive and *1-p* that they behave moderately.
    If you assume *p* to be high, you should give in, but if *p* becomes smaller,
    there should be a point where your decision switches to fighting. Let’s try to
    find that point. In particular, there should be a sweet spot in between where
    the probability of the other player being aggressive vs. moderate is such that
    fighting and giving in are equal alternatives to one another. That is, the rewards
    would be equal, which we can model as follows:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你仍然必须决定是战斗还是屈服，尽管你并不确切知道你在树的哪个节点。要做到这一点，你必须对每个状态的可能性做出假设。如果你非常确信其他玩家行为温和，你可能愿意战斗，但如果你假设他们攻击性，你可能更愿意屈服。比如说，有一个概率
    *p* 表示其他玩家是攻击性的，*1-p* 表示他们行为温和。如果你假设 *p* 较高，你应该屈服，但如果 *p* 变得较小，应该有一个点，你的决定会从战斗转向屈服。让我们试着找到那个点。特别是，在攻击性和温和性之间应该有一个甜点，其他玩家攻击性和温和性的概率使得战斗和屈服是彼此的等价选择。也就是说，奖励将是相等的，我们可以用以下模型来表示：
- en: '![](../Images/dacabab89df4ec72b7da9e4a18bf1c67.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dacabab89df4ec72b7da9e4a18bf1c67.png)'
- en: Do you see how this formula is derived from the rewards for fighting or giving
    in in the different leaves of the tree? This formula solves to p=1/3, so if the
    probability of the other player being aggressive is 1/3 it would make no difference
    whether to fight or give in. But if you assume the other player to be aggressive
    with a probability of more than 1/3, you should give in, and if you assume aggressiveness
    to be less likely than 1/3, you should fight. This is a chain of thought you also
    have in other games where you act under uncertainty. When you play poker, you
    might not calculate the probabilities exactly, but you ask yourself, “How likely
    is it that John has two kings on his hand?” and depending on your assumption of
    that probability, you check, raise or give up.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你看懂了这个公式是如何从树的不同叶子上的战斗或屈服的奖励中推导出来的吗？这个公式解出来是 p=1/3，所以如果其他玩家攻击性的概率是 1/3，那么战斗或屈服都没有区别。但是如果你假设其他玩家攻击性的概率超过
    1/3，你应该屈服，如果你假设攻击性比 1/3 更不可能，你应该战斗。这是你在其他游戏中也有的思考链，在这些游戏中你是在不确定性下行动的。当你玩扑克时，你可能不会精确地计算概率，但你会问自己，“约翰手上有两张国王的可能性有多大？”然后根据你对那个概率的假设，你检查、加注或放弃。
- en: Summary & outlook
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概括与展望
- en: '![](../Images/bd7eba3eb3bd9b9cf2f053a1b2926f3f.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bd7eba3eb3bd9b9cf2f053a1b2926f3f.png)'
- en: Your journey on the seas of game theory has only just begun. There is so much
    more to explore. Photo by [George Liapis](https://unsplash.com/@senseiminimal?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你在博弈论海洋上的旅程才刚刚开始。还有更多东西要探索。照片由 [George Liapis](https://unsplash.com/@senseiminimal?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 提供
- en: Now we have learned a lot about dynamic games. Let us summarize our key findings.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经学到了很多关于动态博弈的知识。让我们总结我们的主要发现。
- en: Dynamic games include an order in which players take turns.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 动态博弈包括玩家轮流行动的顺序。
- en: In dynamic games, the players’ possible actions **depend** on the previously
    executed actions of the other players.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在动态博弈中，玩家的可能行动 **取决于** 其他玩家之前执行的行动。
- en: A Nash equilibrium in a dynamic game can be **implausible**, as it contains
    an **empty threat** that would not be rational.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在动态博弈中，纳什均衡可能是**不可信的**，因为它包含了一个**空洞的威胁**，这在理性上是不合理的。
- en: The concept of **subgame perfect equilibria** prevents such implausible solutions.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**子博弈完美均衡**的概念防止了这种不可信的解决方案。'
- en: In dynamic games, decisions can be **hidden**. In that case, players may not
    exactly know which node of the game they are in and have to assign probabilities
    to different states of the games.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在动态博弈中，决策可以是**隐藏的**。在这种情况下，玩家可能不知道他们处于游戏的哪个节点，并必须为游戏的不同状态分配概率。
- en: 'With that, we have reached the end of our series on the fundamentals of game
    theory. We have learned a lot, yet there are plenty of things we haven’t been
    able to cover. Game theory is a science in itself, and we have only been able
    to scratch the surface. Other concepts that expand the possibilities of game-theoretic
    analyses include:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 有了这些，我们就到达了关于博弈论基础系列的终点。我们学到了很多，但还有很多东西我们没有机会涉及。博弈论是一门科学，而我们只是触及了表面。扩展博弈论分析可能性的其他概念包括：
- en: Analysing games that are repeated **multiple times**. If you play the prisoner’s
    dilemma multiple times, you might be tempted to punish the other player for having
    betrayed you in the previous round.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析重复**多次**进行的游戏。如果你多次玩囚徒困境，你可能会倾向于惩罚在上一轮背叛你的玩家。
- en: In **cooperative games**, players can conclude binding contracts that determine
    their actions to reach a solution of the game together. This is different from
    the non-cooperative games we looked at, where all players are free to decide and
    maximize their own reward.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**合作博弈**中，玩家可以达成具有约束力的合同，以确定他们的行动，共同解决游戏。这与我们所研究的非合作博弈不同，在非合作博弈中，所有玩家都可以自由决定并最大化自己的奖励。
- en: While we only looked at **discrete games**, where each player has a finite number
    of actions to choose from, **continuous games** allow an infinite number of actions
    (e.g., any number between 0 and 1).
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然我们只看了**离散博弈**，其中每个玩家都有有限数量的行动可供选择，但**连续博弈**允许无限数量的行动（例如，0到1之间的任何数）。
- en: A big part of game theory considers the usage of **public goods** and the problem
    that individuals might consume these goods without contributing to their maintenance.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 博弈论的一大部分考虑了**公共物品**的使用以及个人可能消费这些物品而不对其维护做出贡献的问题。
- en: These concepts allow us to analyse real-world scenarios from various fields
    such as auctions, social networks, evolution, markets, information sharing, voting
    behaviour and much more. I hope you enjoyed this series and find meaningful applications
    for the knowledge you gained, be it the analysis of customer behaviour, political
    negotiations or the next game night with your friends. From a game theory perspective,
    life is a game!
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这些概念使我们能够从拍卖、社交网络、进化、市场、信息共享、投票行为等多个领域的现实场景进行分析。我希望你喜欢这个系列，并能在你获得的知识中找到有意义的用途，无论是分析客户行为、政治谈判还是与朋友们的下一场游戏之夜。从博弈论的角度来看，生活本身就是一个游戏！
- en: References
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: 'The topics introduced here are typically covered in standard textbooks on game
    theory. I mainly used this one, which is written in German though:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这里介绍的主题通常在博弈论的标准教科书中都有涉及。我主要使用了这本，尽管它是用德语写的：
- en: 'Bartholomae, F., & Wiens, M. (2016). *Spieltheorie. Ein anwendungsorientiertes
    Lehrbuch*. Wiesbaden: Springer Fachmedien Wiesbaden.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Bartholomae, F., & Wiens, M. (2016). *Spieltheorie. Ein anwendungsorientiertes
    Lehrbuch*. Wiesbaden: Springer Fachmedien Wiesbaden.'
- en: 'An alternative in the English language could be this one:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 英文中的一个替代选项可以是这个：
- en: 'Espinola-Arredondo, A., & Muñoz-Garcia, F. (2023). *Game Theory: An Introduction
    with Step-by-step Examples*. Springer Nature.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Espinola-Arredondo, A., & Muñoz-Garcia, F. (2023). *博弈论：带步骤示例的入门*. Springer
    Nature.
- en: 'Game theory is a rather young field of research, with the first main textbook
    being this one:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 博弈论是一个相对较新的研究领域，其第一本主要教科书就是这本：
- en: Von Neumann, J., & Morgenstern, O. (1944). Theory of games and economic behavior.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Von Neumann, J., & Morgenstern, O. (1944). Theory of games and economic behavior.
