- en: AI Agents, Python Project Management, and Other February Must-Reads
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/ai-agents-python-project-management-and-other-february-must-reads/](https://towardsdatascience.com/ai-agents-python-project-management-and-other-february-must-reads/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: And just like that, our first month of [independence at our new website](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/) is
    in the books. We ended it on a particularly high note, announcing [our first-ever
    Author Payment Program](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/),
    where the goal is to reward TDS contributors for the time and effort required
    to write great articles. Whether you’re an existing author or an aspiring one,
    we hope you consider joining it!
  prefs: []
  type: TYPE_NORMAL
- en: If that’s not enough excitement, we also published some terrific articles in
    the past few weeks. In this Variable edition, we invite you to celebrate our contributors’
    expertise and to explore some of our most-read and most thought-provoking stories
    of the past month.
  prefs: []
  type: TYPE_NORMAL
- en: AI Agents from Zero to Hero – Part 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our most popular article in February was [Mauro Di Pietro](https://towardsdatascience.com/author/maurodp/)‘s
    accessible primer on — you guessed it — AI agents. Go beyond the buzz to learn
    how agents work, and gain hands-on experience by building them from scratch with
    Ollama.
  prefs: []
  type: TYPE_NORMAL
- en: '[AI Agents from Scratch: Single Agents](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Data Scientist: From School to Work, Part I'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Python project management is its own distinct skill, and [Vincent Margot](https://towardsdatascience.com/author/vmargot/) unpacks
    its components one by one in his actionable series of guides.
  prefs: []
  type: TYPE_NORMAL
- en: '[Data Scientist: From School to Work, Part I](https://towardsdatascience.com/data-scientist-from-school-to-work-part-i/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Is Python Set to Surpass Its Competitors?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For a more meta approach to Python’s enduring relevance, don’t miss [Jiayan
    Yin](https://towardsdatascience.com/author/jiayanyin-simba/)‘s pragmatic overview
    of the features that help it stand out among programming languages.
  prefs: []
  type: TYPE_NORMAL
- en: '[Is Python Set to Surpass Its Competitors?](https://towardsdatascience.com/is-python-set-to-surpass-its-competitors/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Other Recommended Reads
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: From the social impact of generative AI to cutting-edge techniques for synthetic-data
    creation, these standout articles cover a wide range of timely topics with depth
    and nuance.
  prefs: []
  type: TYPE_NORMAL
- en: Learn about [the most powerful ways to customize LLMs](https://towardsdatascience.com/6-common-llm-customization-strategies-briefly-explained/) for
    enhanced performance — [Destin Gong](https://towardsdatascience.com/author/destingong/) walks
    us through no fewer than six.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[6 Common LLM Customization Strategies Briefly Explained](https://towardsdatascience.com/6-common-llm-customization-strategies-briefly-explained/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What happens if we “pivot too hard in the direction of efficiency and lose sight
    of the end goal of effectiveness”? [Stephanie Kirmer](https://towardsdatascience.com/author/s-kirmer/) takes
    an incisive look at the [potential havoc generative-AI tools might wreak](https://towardsdatascience.com/generative-ai-and-civic-institutions/) on
    civic institutions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Generative AI and Civic Institutions](https://towardsdatascience.com/generative-ai-and-civic-institutions/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you’d like to [expand your fundamental understanding of large language models](https://towardsdatascience.com/how-llms-work-reinforcement-learning-rlhf-deepseek-r1-openai-o1-alphago/),
    the latest installment in [Clara Chong](https://towardsdatascience.com/author/clarachong13/)‘s
    series covers reinforcement learning, DeepSeek, and more.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[How LLMs Work: Reinforcement Learning, RLHF, DeepSeek R1, OpenAI o1, AlphaGo](https://towardsdatascience.com/how-llms-work-reinforcement-learning-rlhf-deepseek-r1-openai-o1-alphago/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Given the major progress we see in agentic AI tools, [Gadi Singer](https://towardsdatascience.com/author/gadi-singer/) argues
    that it’s more important than ever to [integrate alignment technologies into their
    development](https://towardsdatascience.com/the-urgent-need-for-intrinsic-alignment-technologies-for-responsible-agentic-ai/).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[The Urgent Need for Intrinsic Alignment Technologies for Responsible Agentic
    AI](https://towardsdatascience.com/the-urgent-need-for-intrinsic-alignment-technologies-for-responsible-agentic-ai/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Take synthetic-data generation to the next level by following along [Torty Sivill](https://towardsdatascience.com/author/tortysivill/)‘s
    detailed guide, which [relies on the power of variational autoencoders](https://towardsdatascience.com/the-next-ai-revolution-a-tutorial-using-vaes-to-generate-high-quality-synthetic-data/).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[The Next AI Revolution: A Tutorial Using VAEs to Generate High-Quality Synthetic
    Data](https://towardsdatascience.com/the-next-ai-revolution-a-tutorial-using-vaes-to-generate-high-quality-synthetic-data/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Meet Our New Authors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Explore top-notch work from some of our recently added contributors:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Rein Bugnot](https://towardsdatascience.com/author/reinbugnot/), an AI researcher
    at the National University of Singapore, shared an excellent deep dive into the
    inner workings of vision transformers (ViT).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Vision Transformers (ViT) Explained: Are They Better Than CNNs?](https://towardsdatascience.com/vision-transformers-vit-explained-are-they-better-than-cnns/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Prashal Ruchiranga](https://towardsdatascience.com/author/prashalruchiranga/) is
    a recent information technology graduate; his debut TDS article focuses on the
    effects of the training pipeline on LLM hallucinations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Unraveling Large Language Model Hallucinations](https://towardsdatascience.com/unraveling-large-language-model-hallucinations/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Uladzimir Yancharuk](https://towardsdatascience.com/author/vladimiryancharuk/) joins
    us with a long software-engineering career under his belt, evident in his tutorial
    on using an LLM-powered boilerplate for building a custom Node.js API.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[How to Use an LLM-Powered Boilerplate for Building Your Own Node.js API](https://towardsdatascience.com/how-to-use-an-llm-powered-boilerplate-for-building-your-own-node-js-api/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Contribute to TDS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Subscribe to Our Newsletter
