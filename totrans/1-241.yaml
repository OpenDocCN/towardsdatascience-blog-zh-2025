- en: What Clients Really Ask for in AI Projects
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 客户在AI项目中真正需要的东西
- en: 原文：[https://towardsdatascience.com/what-clients-really-ask-for-in-ai-projects/](https://towardsdatascience.com/what-clients-really-ask-for-in-ai-projects/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/what-clients-really-ask-for-in-ai-projects/](https://towardsdatascience.com/what-clients-really-ask-for-in-ai-projects/)
- en: <mdspan datatext="el1758857881051" class="mdspan-comment">When working on AI
    projects</mdspan>, clients and stakeholders don’t want surprises.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758857881051" class="mdspan-comment">在处理AI项目时</mdspan>，客户和利益相关者不希望出现意外。
- en: What they expect is clarity, consistent communication, and transparency. They
    want results, but they also want you to stay grounded and aligned with the project’s
    goals as a developer or product manager. Just as important, they want full visibility
    into the process.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 他们期望的是清晰、一致的沟通和透明度。他们想要结果，但也希望作为开发者或产品经理，你能保持脚踏实地并与项目目标保持一致。同样重要的是，他们希望对整个过程有全面的了解。
- en: In this blog post, I’ll share practical principles and tips to help keep AI
    projects on track. These insights come from over 15 years of managing and deploying
    AI initiatives and is a follow up on my blog post “*[Tips for setting expectations
    in AI projects](https://towardsdatascience.com/tips-for-setting-expectations-in-ai-projects/)*”.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我将分享实用的原则和技巧，以帮助AI项目保持正轨。这些见解来自超过15年的管理和部署AI项目的经验，并是对我博客文章“*[在AI项目中设定期望的技巧](https://towardsdatascience.com/tips-for-setting-expectations-in-ai-projects/)*”的后续。
- en: When working with AI projects, uncertainty isn’t just a side effect, it can
    make or break the entire initiative.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理AI项目时，不确定性不仅仅是一个副作用，它可能会使整个项目成功或失败。
- en: Throughout the blog sections, I’ll include practical items you can put into
    action immediately.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个博客部分，我会包括你可以立即付诸实践的实际项目。
- en: Let’s dive in!
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨！
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ABU (Always Be Updating)
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ABU（始终更新）
- en: 'In sales, there’s a famous rule called ABC — Always Be Closing**.** The idea
    is simple: every interaction should move the client closer to a deal. In AI projects,
    we have another motto: **ABU (Always Be Updating)**.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在销售中，有一个著名的规则叫做ABC——Always Be Closing**。** 其理念很简单：每次互动都应该让客户更接近达成交易。在AI项目中，我们还有一个口号： **ABU（始终更新）**。
- en: 'This rule means exactly what it says: never leave stakeholders in the dark.
    Even when there’s little or no progress, you need to communicate it quickly. Silence
    creates uncertainty, and uncertainty kills trust.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这条规则的意思就是它所说的：永远不要让利益相关者处于黑暗中。即使进展很小或没有进展，你也需要快速沟通。沉默会创造不确定性，而不确定性会摧毁信任。
- en: 'A straightforward way to apply ABU is with a short weekly email to every stakeholder.
    Keep it consistent, concise, and focused on four key points:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 应用ABU的一个简单方法是通过每周向每个利益相关者发送简短的电子邮件。保持一致性、简洁性，并关注四个关键点：
- en: Breakthroughs in performance or key milestones achieved during the week;
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本周在性能或关键里程碑方面取得的突破；
- en: Issues with deliverables or changes to last week’s plan and that affect stakeholders’
    expectations;
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与交付成果相关的问题或上周计划的变更，以及影响利益相关者期望的问题；
- en: Updates on the team or resources involved;
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 团队或资源的更新；
- en: Current progress on agreed success metrics;
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 达成成功指标方面的当前进展；
- en: This rhythm keeps everyone aligned without overwhelming them with noise. The
    key insight is that people don’t actually hate bad news, they just hate bad surprises.
    If you stick to ABU and manage expectations week by week, you build credibility
    and protect the project when challenges inevitably come up.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这种节奏让每个人都保持一致，而不会因为噪音而感到压倒。关键洞察是，人们实际上并不讨厌坏消息，他们只是讨厌意外的坏消息。如果你坚持ABU并每周管理期望，你将建立信誉并在挑战不可避免地出现时保护项目。
- en: '* * *'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Put the Product in Front of the Users
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将产品放在用户面前
- en: In AI projects, it’s easy to fall into the trap of building for yourself instead
    of for the people who will actually use the product/solution you are building.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI项目中，很容易陷入为自己而不是为实际使用你正在构建的产品/解决方案的人构建的陷阱。
- en: Too often, I’ve seen teams get excited about features that matter to them but
    mean little to the end user.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 太多次了，我看到了团队对那些对他们来说很重要但最终用户并不关心的功能感到兴奋。
- en: So, don’t assume anything. **Put the product in front of users as early and
    as often as possible**. Real feedback is irreplaceable.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，不要假设任何事情。 **尽可能早地、尽可能频繁地将产品放在用户面前**。真实的反馈是无法替代的。
- en: A practical way to do this is through lightweight prototypes or limited pilots.
    Even if the product is far from finished, showing it to users helps you test assumptions
    and prioritize features. When you start the project, commit to a prototype date
    as soon as possible.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 实施这一点的实用方法是轻量级原型或有限的试点项目。即使产品远未完成，向用户展示它也有助于你测试假设并优先考虑功能。当你开始项目时，尽快承诺一个原型日期。
- en: '* * *'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Don’t fall into the technology trap
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不要陷入技术陷阱
- en: Engineers love technology — it’s part of the passion for the role. But in AI
    projects, technology is only an enabler, never the end goal. Just because something
    is technically possible (or looks impressive in a demo) doesn’t mean it solves
    the real problems of your customers or stakeholders.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 工程师热爱技术——这是对这个角色的热情的一部分。但在AI项目中，技术只是一个推动者，永远不是最终目标。仅仅因为某件事在技术上可行（或者在演示中看起来令人印象深刻），并不意味着它解决了客户或利益相关者的实际问题。
- en: 'So the guideline is very simple, yet difficult to follow: Don’t start with
    the tech, start with the need*.* Every function or code should trace back to a
    clear user problem.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，指南非常简单，但很难遵循：不要从技术开始，要从需求开始*.* 每个功能或代码都应该追溯到明确的用户问题。
- en: 'A practical way to apply this principle is to validate problems before solutions.
    Spend time with customers, map their pain points, and ask: “If this technology
    worked perfectly, would it actually matter to them?”'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 应用这一原则的一个实用方法是，在解决方案之前验证问题。花时间与客户在一起，映射他们的痛点，并问：“如果这项技术完美无缺，它对他们实际上有意义吗？”
- en: Cool features won’t save a product that doesn’t solve a problem. But when you
    anchor technology in real needs, adoption follows naturally.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 酷炫的功能无法拯救一个没有解决问题的产品。但当你将技术锚定在真实需求上时，采用就会自然而然地发生。
- en: Engineers often focus on optimizing technology or building cool features. But
    the best engineers (10x engineers) combine that technical strength with the rare
    ability to empathize with stakeholders.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 工程师们通常专注于优化技术或构建酷炫的功能。但最优秀的工程师（10倍工程师）将这种技术实力与罕见的能力相结合，即能够与利益相关者产生共鸣。
- en: '* * *'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Business Metrics Over Technical Metrics
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 业务指标优于技术指标
- en: It’s easy to get lost in technical metrics — accuracy, F1 score, ROC-AUC, precision,
    recall. Clients and stakeholders normally don’t care if your model is 0.5% more
    accurate, they care if it reduces churn, increases revenue, or saves time and
    costs. The worst part is that clients and stakeholders often believe technical
    metrics are what matter, when in a business context they rarely are. **And it’s
    on you to convince them otherwise.**
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 容易陷入技术指标的迷雾——准确性、F1分数、ROC-AUC、精确率、召回率。客户和利益相关者通常不关心你的模型是否比其他模型准确0.5%，他们关心的是它是否减少了客户流失、增加了收入或节省了时间和成本。最糟糕的是，客户和利益相关者经常认为技术指标是重要的，而在商业环境中，它们很少是重要的。**而且这取决于你来说服他们改变看法。**
- en: If your churn prediction model hits 92% accuracy, but the marketing team can’t
    design effective campaigns from its outputs, the metric means nothing. On the
    other hand, if a “less accurate” model helps reduce customer churn by 10% because
    it’s explainable, that’s a success.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的客户流失预测模型达到了92%的准确性，但营销团队无法从其输出中设计有效的活动，那么这个指标就没有意义。另一方面，如果一个“不太准确”的模型通过可解释性帮助减少了10%的客户流失，那么这就是成功。
- en: 'A practical way to apply this is to define **business metrics at the start
    of the project** — ask:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 应用这一原则的一个实用方法是，在项目开始时定义**业务指标**——问：
- en: 'What’s the financial or operational goal? (example: reduce call center handling
    time by 20%)'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 财务或运营目标是什么？（例如：将呼叫中心处理时间减少20%）
- en: Which technical metrics best correlate with that outcome?
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些技术指标与该结果最佳相关？
- en: How will we communicate results to non-technical stakeholders?
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们将如何与非技术利益相关者沟通结果？
- en: Sometimes the right metric isn’t accuracy at all. For example, in fraud detection,
    catching 70% of fraud cases with minimal false positives might be more valuable
    than a model that squeezes out 90% but blocks thousands of legitimate transactions.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 有时正确的指标根本不是准确性。例如，在欺诈检测中，以最小的误报率捕捉70%的欺诈案例可能比一个挤压出90%但阻止数千笔合法交易的模型更有价值。
- en: '* * *'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Ownership and Handover
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 所有权和移交
- en: Who owns the solution once it goes live? In case of success, will the client
    have reliable access to it at all times? What happens when your team is no longer
    working on the project?
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦解决方案上线，谁将拥有它？在成功的情况下，客户是否能够始终可靠地访问它？当你的团队不再参与项目时会发生什么？
- en: These questions often get passed on, but they define the long-term impact of
    your work. You need to plan for handover from day one. That means documenting
    processes, transferring knowledge, and ensuring the client’s team can maintain
    and operate the model without your constant involvement.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题通常会被传递下去，但它们定义了你工作的长期影响。你需要从第一天开始就规划交接。这意味着记录流程、转移知识和确保客户团队可以在没有你持续参与的情况下维护和操作模型。
- en: Delivering an ML model is only half the job —** post-deployment is often an
    important phase that gets lost in translation between business and tech.**
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 交付一个 ML 模型只是工作的一半——**部署后的阶段通常是一个重要的阶段，但在业务和技术之间的翻译中往往被忽视**。
- en: '* * *'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Cost and Budget Visibility
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成本和预算可见性
- en: How much will the solution cost to run? Are you using cloud infrastructure,
    LLMs, or other techniques that carry variable expenses the customer must understand?
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 运行解决方案的成本是多少？你是否使用云基础设施、LLM 或其他客户必须理解的可变成本技术？
- en: From the start, you need to give stakeholders full visibility on cost drivers.
    This means breaking down infrastructure costs, licensing fees, and, especially
    with GenAI, usage expenses like token consumption.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 从一开始，你需要让利益相关者全面了解成本驱动因素。这意味着分解基础设施成本、许可费用，特别是与 GenAI 相关的使用费用，如令牌消耗。
- en: A practical way to manage this is to set up clear cost-tracking dashboards or
    alerts and review them regularly with the client. For LLMs, estimate expected
    token usage under different scenarios (average query vs. heavy use) so there are
    no surprises later.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 一种管理这种状况的实际方法是设置清晰的成本跟踪仪表板或警报，并定期与客户审查。对于 LLM，估计在不同场景下的预期令牌使用量（平均查询与重用），以避免后续出现意外。
- en: '**Clients can accept costs, but they won’t accept hidden or multi-scalable
    costs.** Transparency on budget allows clients to plan realistically for scaling
    the solution.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**客户可以接受成本，但他们不会接受隐藏的或可扩展的成本。** 预算的透明度允许客户为扩展解决方案进行现实规划。'
- en: '* * *'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Scale
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规模
- en: Speaking about scale..
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 谈论规模...
- en: Scale is a different game altogether. It’s the stage where an AI solution can
    deliver the most business value, but also where most projects fail. Building a
    model in a notebook is one thing, but deploying it to handle real-world traffic,
    data, and user demands is another.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 规模是完全不同的游戏。这是 AI 解决方案可以带来最大商业价值的阶段，但也是大多数项目失败的地方。在笔记本中构建一个模型是一回事，但将其部署以处理现实世界的流量、数据和用户需求则是另一回事。
- en: So be clear about **how you will scale your solution. **This is where data engineering
    and MLOps come. Address the topicss related to ensuring the entire pipeline (data
    ingestion, model training, deployment, monitoring) can grow with demand while
    staying reliable and cost-efficient.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，要明确**你将如何扩展你的解决方案**。这是数据工程和 MLOps 发挥作用的地方。解决确保整个管道（数据摄取、模型训练、部署、监控）可以随着需求增长而增长，同时保持可靠和成本效益的问题。
- en: 'Some critical areas to consider when communicating scale are:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在沟通规模时需要考虑的一些关键领域包括：
- en: '**Software engineering practices**: Version control, CI/CD pipelines, containerization,
    and automated testing to ensure your solution can evolve without breaking.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**软件工程实践**：版本控制、CI/CD 管道、容器化和自动化测试，以确保你的解决方案可以在不中断的情况下进化。'
- en: '**MLOps capabilities**: Automated retraining, monitoring for data drift and
    concept drift, and alerting systems that keep the model accurate over time.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MLOps 能力**：自动重新训练、监控数据漂移和概念漂移，以及保持模型准确性的警报系统。'
- en: '**Infrastructure choices**: Cloud vs. on-premises, horizontal scaling, cost
    controls, and whether you need specialized hardware.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基础设施选择**：云与本地，水平扩展、成本控制和是否需要专用硬件。'
- en: '**An AI solution / project that performs well in isolation is not enough.** Real
    value comes when the solution can scale to thousands of users, adapt to new data,
    and continue delivering business impact long after the initial deployment.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**一个在孤立状态下表现良好的 AI 解决方案/项目是不够的。** 真正的价值在于解决方案可以扩展到数千用户，适应新数据，并在初始部署之后继续产生商业影响。'
- en: '* * *'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Here are the practical tips we’ve seen in this post:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我们在本文中看到的一些实用技巧：
- en: Send a short **weekly email** to all stakeholders with breakthroughs, issues,
    team updates, and progress on metrics.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向所有利益相关者发送简短的**每周电子邮件**，内容包括突破、问题、团队更新和指标进展。
- en: Commit to an **early prototype or pilot** to test assumptions with end users.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 承诺一个**早期原型或试点**，以测试最终用户的假设。
- en: Validate problems first — **don’t start with tech**, start with user needs.
    User interviews are a great way to do this (if possible, get out of your desk
    and join the users on whatever job they are doing during one day).
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先验证问题——**不要从技术开始**，从用户需求开始。用户访谈是完成这一任务的好方法（如果可能的话，离开你的办公桌，加入用户，在他们一天的工作中参与其中）。
- en: Define **business metrics** upfront and tie technical progress back to them.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 事先定义**业务指标**，并将技术进步与之联系起来。
- en: '**Plan for handover** from day one: document, train the client team, and ensure
    ownership is clear.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从第一天开始规划交接**：记录文档、培训客户团队，并确保所有权清晰。'
- en: Set up a **dashboard or alerts** to track costs (especially for cloud and token-based
    GenAI solutions).
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置一个**仪表板或警报**来跟踪成本（尤其是云和基于令牌的通用人工智能（GenAI）解决方案）。
- en: 'Build with **scalability in mind**: CI/CD, monitoring for drift, modular pipelines,
    and infrastructure that can grow.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**以可扩展性为设计理念**：构建持续集成/持续部署（CI/CD）、监控漂移、模块化管道以及可以扩展的基础设施。'
- en: Any other tip you find relevant to share? Write it down in the comments or feel
    free to contact me via [LinkedIn](https://www.linkedin.com/in/ivobernardo/)!
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否还有其他觉得值得分享的小贴士？请在评论区写下它，或者随时通过[LinkedIn](https://www.linkedin.com/in/ivobernardo/)联系我！
