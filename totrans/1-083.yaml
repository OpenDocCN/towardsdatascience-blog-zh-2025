- en: Understanding Convolutional Neural Networks (CNNs) Through Excel
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/understanding-convolutional-neural-networks-cnns-through-excel/](https://towardsdatascience.com/understanding-convolutional-neural-networks-cnns-through-excel/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1763331337948" class="mdspan-comment">Deep learning is often
    seen</mdspan> as a black box. We know that it learns from data, but the question
    is *how* it truly learns.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we will build a tiny Convolutional Neural Network (CNN) directly
    in Excel to understand, step by step, how a CNN actually works for images.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: We will open this black box, and watch each step happen right before our eyes.
    We will understand all the calculations that are the foundation of what we call
    “deep learning”.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: You can use [this link](https://docs.google.com/spreadsheets/d/1n2WbyJj6R6GLLz68C30gWo-MrxyhYZ7n)
    to explore the calculations while reading through this article.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/f0d2f92fc0cc7b03135f12ea79dd7d48.png)](https://docs.google.com/spreadsheets/d/1n2WbyJj6R6GLLz68C30gWo-MrxyhYZ7n/edit?usp=sharing&ouid=108295787782546724708&rtpof=true&sd=true)'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Link to the google sheet
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: This article is a part of a series about implementing machine learning and deep
    learning algorithms in Excel. You can implement the calculation yourself when
    reading this article. And you can find all the Excel files in this [Kofi link](https://ko-fi.com/s/4ddca6dff1).
    If you want to support my work, it means a lot to me.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0da376d36a7d209b31fb1e65b3e05c53.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
- en: All Excel/Google sheet files for ML and DL
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: 1\. How to Simplify the problem
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As I always do for all the Machine Learning and Deep Learning algorithms that
    I implemented in Excel, the first step is to simplify, the data, and the problem.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: First, I want to find a simple, yet meaningful dataset to visualize very step
    of the calculations.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Then, you also have to forget about things (very complex things) you may already
    know. Yes, from my experience, it will not help you. For example, you may know
    that a CNN uses a ReLU activation, or the formula of a logistic function. Forget
    about it! I promise that you will only do X and + in this exercice.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: 1.1 Two Ways to Detect Something in an Image
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Well, before we try to simplify, I want to remind us how the problem is usually
    explained…
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: 'When we try to detect an object in a picture, like a cat, there are two main
    ways: the deterministic approach and the machine learning approach.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Then they are explained in these ways for this example of recognizing a cat
    in a picture.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: The **deterministic way** means writing rules by hand.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: For example, we can say that a cat has a round face, two triangle ears, a body,
    a tail, etc. So the developer will do all the work to define the rules.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Then the computer runs all these rules, and gives a score of similarity.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9742cc938b41212b77ede63dce3b98ea.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
- en: Deterministic approach to detect a cat on a picture — image by author
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: The **machine learning approach** means that we do not write rules by ourselves.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Instead, we give the computer many examples, pictures with cats and pictures
    without cats. Then it learns by itself what makes a cat a cat.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/91bb0ccaba41eedfb2b7427a23ca03d5.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: Machine learning approach to detect a cat on a picture — image by author (cats
    are generated by AI)
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: So, you may think that you now understand how Deep Learning really works.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Please, be honest to yourself!
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: We say that the machine will figure it out by itself, but the real question
    is how.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: 'In fact, we still have to tell the machines how to create these rules. And
    rules can be learnable. So the key point is: how can we define the kind of rules
    that will be used?'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: To understand how to define rules, we first have to understand what an image
    is.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: 1.2 Understanding What an Image Is
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A cat is complex form, but we can take a simple and clear example: handwritten
    digits from the MNIST dataset.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: First, what is an image?
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: A digital image can be seen as a grid of pixels. Each pixel is a number that
    shows how bright it is, from 0 for white to 255 for black.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: In Excel, we can represent this grid with a table where each cell corresponds
    to one pixel.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/46f9b16b680b1af2d47f968f60af7154.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
- en: MNIST Handwritten digits – image from the MNIST dataset [https://en.wikipedia.org/wiki/MNIST_database](https://en.wikipedia.org/wiki/MNIST_database)
    (CC BY-SA 3.0)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: The original dimension of the digits is 28 x 28\. But to keep things simple,
    we will use a 10×10 table. It is small enough for quick calculations but still
    large enough to show the general shape.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: So we will reduce the dimension.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: For example, the handwritten number “1” can be represented by a 10×10 grid as
    below in Excel.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5ccc1018c84e070d1b568b2aa04b9d06.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
- en: Image is a grid of numbers — image by author
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '1.3 Before Deep Learning: Classic Machine Learning for Images'
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before using CNNs or any deep learning method, we can already recognize simple
    images with classic machine learning algorithms such as **logistic regression**
    or **decision trees**.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: In this approach, **each pixel becomes one feature**. For example, a 10×10 image
    has 100 pixels, so there are 100 features as input.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: The algorithm then learns to associate patterns of pixel values with labels
    such as “0”, “1”, or “2”.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9757d80b16d5e967202358290906930b.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
- en: Classic ML for image recognition — image by author
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: In fact, with this simple machine learning approach, **logistic regression can
    achieve quite good results** with an accuracy around 90%.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: This shows that classic models are able to learn useful information from raw
    pixel values.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: However, they have a major limitation. They treat each pixel as an independent
    value, without considering its neighbors. As a result, they cannot understand
    **spatial relationships** with the pixels.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: So intuitively, we know that the performance will not be good for complex images.
    So this method is not scalable.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, if you already know how classic machine learning works, you know that
    there is no magic. And in fact, you already know what to do: you have to improve
    the feature engineering step, you have to transform the features, in order to
    get more meaningful information from the pixels.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Building a CNN Step by Step in Excel
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 2.1 From complex CNNs to a simple one in Excel
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When we talk about Convolutional Neural Networks, we often see very deep and
    complex architectures, like VGG-16\. Many layers, thousands of parameters, and
    countless operations, it seems very complex, and say that it is impossible to
    understand exactly how it works.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4ebcdbd76098df90c3902772cba736f8.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
- en: VGG16 architecture — image by author
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: 'The main idea behind the layers is: detecting patterns step by step.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: 'With the example of handwritten digits, let’s ask a question: **what could
    be the simplest possible CNN architecture?**'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: 'First, for the hidden layers, before doing all the layers, let’s reduce the
    number. How many? Let’s do one. That’s right: only one.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: As for the filters, what about their dimensions? In real CNN layers, we usually
    use 3×3 filters to detect small pattern. But let’s begin with big ones.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: How big? 10×10!
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: Yes, why not?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: This also means that you don’t have to slide the filter across the image. This
    way, we can directly compare the input image with the filter and see how well
    they match.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: This simple case is not about performance, but about clarity.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: It will show how CNNs detect patterns step by step.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: Now, we have to define the number of filters. We will say 10, it is the minimum.
    Why? Because there are 10 digits, so we have to have a minimum of 10 filters.
    And we will see how they can be found in the next section.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: 'In the image below, you have the diagram of this simplest architecture of a
    CNN neural network:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a9e716f41dced8b80a3260b8de6f62b9.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
- en: The simplest CNN architecture – image by author
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Training the Filters (or Designing Them Ourselves)
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In a real CNN, the filters are not written by hand. They are **learned** during
    training.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: The neural network adjusts the values inside each filter to detect the patterns
    that best help to recognize the images.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: In our simple Excel example, we will not train the filters.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: Instead, we will **create them ourselves** to understand what they represent.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: Since we already know the shapes of handwritten digits, we can design filters
    that look like each digit.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: For example, we can draw a filter that matches the form of 0, another for 1,
    and so on.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Another option is to **take the average image** of all examples for each digit
    and use that as the filter.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: Each filter will then represent the “average shape” of a number.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: This is where the frontier between human and machine becomes visible again.
    We can either let the machine discover the filters, or we can use our own knowledge
    to build them manually.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: 'That is right: machines do not define the nature of the operations. Machine
    learning researchers define them. Machines are only good to do loops, to find
    the optimal values for these defines rules. And in simple cases, humans are always
    better than machines.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: So, if there are only 10 filters to define, we know that we can directly define
    the 10 digits. So we know, intuitively, the nature of these filters. But there
    are other options, of course.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: Now, to define the numerical values of these filters, we can directly use our
    knowledge. And we also can use the training dataset.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: Below you can see the 10 filters created by averaging all the images of each
    handwritten digit. Each one shows the typical pattern that defines a number.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0607442417193fd29bb3204140826476.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
- en: Average values as filters — image by author
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: 2.3 How a CNN Detects Patterns
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that we have the filters, we have to compare the input image to these filters.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: One way to do, is, well, least squared error. Or we should say squared difference,
    since we do not directly predict something, but just compare the input and one
    filter.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cddec62d8b883249f875036cbff90cf3.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
- en: If we can a SD Score, then the algorithm would be called SDNN, right. Although,
    it would work well here.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: 'So, to compare two images, there is actually another known way: **cross-correlation**.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: 'It works in two simple steps:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: '**Multiply values/dot product:** we take each pixel in the input image, and
    we will multiply it by the pixel in the same position of the filter. This means
    that the filter “looks” at each pixel of the image and measures how similar it
    is to the pattern stored in the filter. Yes, if the two values are large, then
    the result is large.'
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Add results/sum:** The products of these multiplications are then added together
    to produce a single number. This number expresses how strongly the input image
    matches the filter.'
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/29d804f506b447ad40e15a8e77974efb.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
- en: Example of Cross Correlation for one picture – image by author
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: In our simplified architecture, the filter has the same size as the input image
    (10×10).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Because of this, the filter does not need to move across the image.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Instead, the cross-correlation is applied once, comparing the whole image with
    the filter directly.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: This number represents how well the image matches the pattern inside the filter.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: If the filter looks like the average shape of a handwritten “5”, a high value
    means that the image is probably a “5”.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: By repeating this operation with all filters, one per digit, we can see which
    pattern gives the highest match.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: 2.4 Building a Simple CNN in Excel
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can now create a small CNN from end to end to see how the full process works
    in practice.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '**Input:** A 10×10 matrix represents the image to classify.'
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Filters:** We define ten filters of size 10×10, each one representing the
    average image of a handwritten digit from 0 to 9\. These filters act as pattern
    detectors for each number.'
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Cross correlation:** Each filter is applied to the input image, producing
    a single score that measures how well the image matches that filter’s pattern.'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Decision:** The filter with the highest score gives the predicted digit.
    In deep learning frameworks, this step is often handled by a **Softmax function**,
    which converts all scores into probabilities.'
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In our simple Excel version, taking the **maximum score** is enough to determine
    which digit the image most likely represents.
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Each 10×10 filter represents the average shape of a handwritten digit (0–9).'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: The input image is compared with all filters using cross-correlation.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: The filter that produces the highest score — after normalization with Softmax
    — corresponds to the detected digit.](../Images/34f7aab6e34a7dd88b9b89cb8c39591a.png)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Cross-correlation of the input digit with ten average digit filters. The highest
    score, normalized by Softmax, identifies the input as “6.” – image by author
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: With the Excel, you can test for different digits, and you can even write a
    digit yourself.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f466c6a11c015085a1b0ef47e0ed37c0.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
- en: Tests of a Simple CNN implemented in Excel – image by author
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: 2.5 Squared differences vs. cross-correlation
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the Excel sheet, I also implemented the Squared differences. You can see
    that for some example, the prediction is better with squared differences.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: And squared difference is the same as squared error, and is commonly used in
    all most all classic regression problems. Also, it seems that it is more performant.
    Why do we use cross-correlation instead?
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: One reason maybe that it is simpler, if we want to use it in many layers. And
    it is also easier to differentiate.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s right: it is about the simplicity of the pattern algorithm, the scalability
    of the calculation, the trainability of the function.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: So cross-correlation seems to be the simplest and most scalable function that
    we can use in the multilayer neural network to detect image patterns.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/45bdbbd9745cd24277b182d46faeb7c8.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
- en: Squared differences vs. cross-correlation
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: 2.6 Convolution or Cross-correlation?
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: At this point, you might wonder why we call it a **Convolutional** Neural Network
    when the operation we described is actually **cross-correlation**.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: 'The difference is subtle but simple:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: '**Convolution** means flipping the filter both horizontally and vertically
    before sliding it over the image.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cross-correlation** means applying the filter directly, without flipping.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For some historical reason, the term Convolution stayed, whereas the operation
    that is actually done in a CNN is cross-correlation.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, in most deep-learning frameworks, such as PyTorch or TensorFlow,
    actually use **cross-correlation** when performing “convolutions”.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5fe89ec99442d600a7602a1416cbf0d9.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
- en: Cross correlation and convolution — image by author
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: 'In short:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: CNNs are “convolutional” in name, but “cross-correlational” in practice.
  id: totrans-139
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. Building More Complex Architectures
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 3.1 Small filters to detect more detailed patterns
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the previous example, we used a single 10×10 filter to compare the whole
    image with one pattern.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: This was enough to understand the principle of cross-correlation and how a CNN
    detects similarity between an image and a filter.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: Now we can take one step further.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: Instead of one global filter, we will use **several smaller filters**, each
    of size **5×5**. These filters will look at smaller regions of the image, detecting
    local details instead of the entire shape.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take an example with **four 5×5 filters** applied to a handwritten digit.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: The input image can be cut into 4 smaller parts of 5×5 pixels for each one.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: We still can use the average value of all the digits to begin with. So each
    filter will give 4 values, instead of one.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8719d531a472fe7e1fee5f323b7e400d.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
- en: Smaller filters in CNN for digits recognition – image by author
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: At the end, we can apply a Softmax function to get the final prediction.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: But in this simple case, it is also possible just to sum all the values.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 What if the digit is not in the center of the image
  id: totrans-153
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In my previous examples, I compare the filters to fixed areas of the image.
    And one intuitive question that we can ask is what if the object is not centered.
    Yes, it can be at any position on a image.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: 'The solution is unfortunately very basic: you slide the filter across the image.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a simple example again: the dimension of the input image is 10×14\.
    The height is not changed, and the width is 14.'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: So the filter is still 10 x 10, and it will slide horizontally across the image.
    Then, we will get 5 cross-correlation.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: We do not know where the image is, but it is not a problem because we can just
    get the max value of the 5 the-cross correlations.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: This is what we call max pooling layer.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3cc4acad78223c257e008dfa85873f22.png)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
- en: Max pooling in a simple CNN – Image by author
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: 3.3 Other Operations Used in CNNs
  id: totrans-162
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We try to explain, why each component is useful in a CNN.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: The most important component is the cross-correlation between the input and
    the filters. And we also explain that small filters can be useful, and how max
    pooling handles objects that can be anywhere in an image.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: There are also other steps commonly used in CNNs, such as using several layers
    in a row or applying non-linear activation functions.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: These steps make the model more flexible, more robust, and able to learn richer
    patterns.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: Why are they useful exactly?
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: I will leave this question to you as an exercise.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: Now that you understand the core idea, try to think about how each of these
    steps helps a CNN go further, and you can try to think about some concrete example
    in Excel.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-170
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Simulating a CNN in Excel is a fun and practical way to see how machines recognize
    images.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: By working with small matrices and simple filters, we can understand the main
    steps of a CNN.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: I hope this article gave you some food for thought about what deep learning
    really is. The difference between machine learning and deep learning is not only
    about how deep the model is, but about how it works with **representations** of
    images and data.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这篇文章能让你对深度学习的真正含义有所思考。机器学习和深度学习之间的区别不仅在于模型的深度，还在于它们如何与图像和数据的**表示**进行交互。
