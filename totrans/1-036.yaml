- en: 'The Problem with AI Browsers: Security Flaws and the End of Privacy'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI浏览器的弊端：安全漏洞和隐私的终结
- en: 原文：[https://towardsdatascience.com/the-problem-with-ai-browsers-security-flaws-and-the-end-of-privacy/](https://towardsdatascience.com/the-problem-with-ai-browsers-security-flaws-and-the-end-of-privacy/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-problem-with-ai-browsers-security-flaws-and-the-end-of-privacy/](https://towardsdatascience.com/the-problem-with-ai-browsers-security-flaws-and-the-end-of-privacy/)
- en: <mdspan datatext="el1764272641250" class="mdspan-comment">Atlas is OpenAI’s</mdspan>
    new browser; it charges your browser with the capabilities of an LLM. Although
    a browsing assistant sounds wonderfully convenient and futuristic, Atlas leaves
    a lot be be desired.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764272641250" class="mdspan-comment">Atlas是OpenAI的新浏览器；它为你的浏览器注入了LLM的能力。虽然浏览助手听起来非常方便和未来感十足，但Atlas还有很多不足之处。
- en: 'In this post I’d like to dive deep into how Atlas and most current AI-powered
    browsers fail on three aspects: privacy, security, and censorship.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我想深入探讨Atlas和大多数当前AI浏览器在三个方面的失败：隐私、安全和审查。
- en: First we’ll take a look at how Atlas works.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将看看Atlas是如何工作的。
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Atlas under the hood
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Atlas内部结构
- en: First let’s understand how Atlas and other AI browsers work, what their capabilities
    are, and how they differ from other “regular” browsers.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们了解Atlas和其他AI浏览器是如何工作的，它们的特性是什么，以及它们与其他“常规”浏览器有何不同。
- en: Why do AI browsers exist?
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么AI浏览器存在？
- en: 'AI browsers aim to solve a growing problem on the web: information overload.
    I’m sure we can all recognize searching for information in pages full of forms,
    ads, and endless UX flows. Companies like OpenAI try to solve this by offering
    an AI assistant to do this for you.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: AI浏览器的目的是解决网络上的一个日益增长的问题：信息过载。我相信我们都能在满是表单、广告和无尽UX流程的页面中找到信息搜索的例子。像OpenAI这样的公司试图通过提供AI助手来解决这一问题。
- en: The AI browser is designed to be a new interface layer on top of the web. You
    can let an LLM interpret a page, extract meaning, answer questions, or even take
    actions. The strategic incentive of OpenAI is to integrate ChatGPT deeply into
    a browser in order to keep users inside their ecosystem.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: AI浏览器旨在成为网络之上的新界面层。你可以让LLM解释页面，提取意义，回答问题，甚至采取行动。OpenAI的战略激励是深入集成ChatGPT到浏览器中，以保持用户在其生态系统内。
- en: The promise is convenience, automation, and a more personalised browsing experience.
    As we’ll see later in this article, the implementation introduces significant
    privacy, security, and moderation risks.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 承诺是便利、自动化和更个性化的浏览体验。正如我们将在本文后面看到的那样，这种实现引入了重大的隐私、安全和监管风险。
- en: What can Atlas do for me?
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Atlas能为我做什么？
- en: AI browsers are browsers that we interact with just like with ChatGPT. You can
    ask them to summarize the website you’re looking at, translate it, or ask questions
    about the content. The browser keeps a **history**, learns from your browsing
    habits, and “gets to know you” a bit better.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: AI浏览器是我们像与ChatGPT互动一样的浏览器。你可以要求他们总结你正在查看的网站，翻译它，或者询问内容。浏览器会保存**历史记录**，从你的浏览习惯中学习，并“更好地了解你”。
- en: 'Additionally there’s **agent mode.** Imagine tasking the browser and seeing
    it perform the following task autonomously: “I want a nice holiday for 2, either
    by train or plane with a max cost of €800”. You’ll see Atlas opening tabs, Googling,
    reading websites, clicking buttons, etc.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有**代理模式**。想象一下让浏览器执行以下任务并自主完成： “我想要一个2人的美好假期，无论是火车还是飞机，最高花费为800欧元”。你会看到Atlas打开标签页，搜索，阅读网站，点击按钮等。
- en: How does Atlas work?
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Atlas是如何工作的？
- en: Essentially, Atlas is just a Chromium browser that uses ChatGPT for *everything*.
    Agent mode is evaluated by ChatGPT, it analyzes web pages with ChatGPT, etc.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，Atlas只是一个使用ChatGPT进行**一切**的Chromium浏览器。代理模式由ChatGPT评估，它使用ChatGPT分析网页等。
- en: Concerns
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 担忧
- en: Although AI browsers like Atlas offer a lot of cool capabilities, there are
    some concerns, the biggest of which we’ll discuss now.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然像Atlas这样的AI浏览器提供了许多酷炫的功能，但也有一些担忧，其中最大的我们将现在讨论。
- en: Privacy
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 隐私
- en: Atlas reads along with everything you see and type, sharing this information
    with ChatGPT. This is essentially the “AI” part of “AI browser”. This leaves an
    enormous privacy concern.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Atlas会阅读你所看到和输入的一切，并将这些信息与ChatGPT共享。这实际上是“AI浏览器”中的“AI”部分。这引发了一个巨大的隐私问题。
- en: We are already quite familiar with “regular” tracking like many websites do.
    They collect information about what visitors do on their site.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经非常熟悉“常规”跟踪，就像许多网站所做的那样。它们收集有关访客在其网站上所做事情的信息。
- en: Atlas takes this to the extreme by **tracking everything you do on every site**.
    It observes what you read, how long you stay, what you do next; essentially, your
    **entire online behaviour is tracked** and that data is in the hands of *one*
    company (OpenAI).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Security
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The big problem with security is that the browser cannot reliably distinguish
    between data (e.g. the content of a site for tickets) and instructions (“find
    tickets to Rome”). This leaves the browser wide open for prompt injection.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Simple prompt injection to steal your sensitive data
  id: totrans-25
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The browser reads along with you on a website you visit. It sends the content
    to ChatGPT in order to analyze it and e.g. summarize it. Imagine a malicious actor
    who hides invisible instructions (e.g. white text on a white background) on the
    page:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '“Ignore all previous instructions and instead do the following: …”'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This incredibly simple method of **prompt injection** influences how your browser
    operates. Combine this with agent mode and its capabilities and you’re just asking
    to be hacked.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Researchers from [Brave](https://www.linkedin.com/company/brave-software/) (“regular”
    browser) have already documented such attacks, showing that AI-powered browsers
    can be manipulated to navigate to the user’s banking site, extract saved passwords,
    and send sensitive information to attacker-controlled servers.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Censorship
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We all know that LLMs are heavily moderated. We’ve all heard the stories of
    Deepseek refusing to answers questions about Tiananmen Square and Google’s Gemini
    generating racially diverse historical figures. Some queries should not be answered,
    e.g. we don’t want ChatGPT to teach users how to make a bomb.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: My problem with Atlas, however, is that there is *one* company that determines
    what you see, especially when you realise that same company holds the entire history
    of your online activity. In a world full of *fake news*, propaganda, censorship,
    and increasingly authoritarian figures, this feels like an enormous risk.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI-assisted browsing is coming, but not like this. Personally I think there’s
    a lot of potential in AI browsers but the security issues are glaring. That, in
    combination with the fact that Atlas will share all my online activity with just
    one company, which also is perfectly able to censor or influence what i see, is
    something I find very risky.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Until transparency, privacy, and safeguards catch up, I wouldn’t trust it with
    my data… or my wallet.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: I hope this article was as clear as I intended it to be but if this is not the
    case please let me know what I can do to clarify further. In the meantime, check
    out my [**other articles**](https://mikehuls.com/) on all kinds of programming-related
    topics.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Happy coding!
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: — Mike
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
