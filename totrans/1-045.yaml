- en: 'The Product Health Score: How I Reduced Critical Incidents by 35% with Unified
    Monitoring and n8n Automation'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-product-health-score-how-i-reduced-critical-incidents-by-35-with-unified-monitoring-and-n8n-automation/](https://towardsdatascience.com/the-product-health-score-how-i-reduced-critical-incidents-by-35-with-unified-monitoring-and-n8n-automation/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1764204303854" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For SaaS (software as a service) companies, monitoring and managing their product
    data is crucial. For those who fail to understand this, by the time they notice
    an incident. Damage is already done. For struggling companies, **this can be fatal**.
  prefs: []
  type: TYPE_NORMAL
- en: To prevent this, I built an n8n workflow linked to their database that will
    analyze the data daily, spot if there is any incident. In this case, a log and
    notification system will start to investigate as soon as possible. I also built
    a dashboard so the team could see the results in real time.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/065719291eb9433124ff0e83bd82f95b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: Context
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A B2B SaaS platform specializing in data visualization and automated reporting
    serves roughly 4500 customers, dispersed in three segments:'
  prefs: []
  type: TYPE_NORMAL
- en: Small business
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mid-market
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enterprise
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The weekly product usage exceeds 30000 active accounts with strong dependencies
    on real-time data (pipelines, APIs, dashboards, background jobs).
  prefs: []
  type: TYPE_NORMAL
- en: 'The product team works closely with:'
  prefs: []
  type: TYPE_NORMAL
- en: Growth (acquisition, activation, onboarding)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Revenue (pricing, ARPU, churn)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SRE/Infrastructure (reliability, availability)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data Engineering (pipelines, data freshness)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Support and customer success
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/1baf33a358ab8c086deed654dda6e6d7.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: 'Last year, the company observed a rising number of incidents. Between October
    and December, the total of incidents increased from 250 to 450, an **80% increase**.
    With this increase, there were more than 45 High and critical incidents that affected
    thousands of users. The most affected metrics were:'
  prefs: []
  type: TYPE_NORMAL
- en: api_error_rate
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: checkout_success_rate
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: net_mrr_delta
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: data_freshness_lag_minutes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: churn_rate
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/589eb6298df3dd19f67566779477bf3d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar. For illustration
  prefs: []
  type: TYPE_NORMAL
- en: When incidents occur, a **company is judged** by its customers based on how
    it handles and reacts. While the **product team is esteemed** for how they managed
    it and ensured it won’t happen again.
  prefs: []
  type: TYPE_NORMAL
- en: Having an incident once can happen, but having the same incident twice is a
    fault.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Business impact
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: More volatility in net recurring revenue
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A noticeable **decline in active accounts** over several consecutive weeks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Multiple enterprise customers reporting and complaining about the outdated dashboard
    (up to 45+minutes late)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/88570ba73b51511e09d9f456e3553a86.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: In total, between 30000 and 60000 users were impacted. Customer confidence in
    product reliability also suffered. Among non-renewals, **45% pointed out that’s
    their main reason**.
  prefs: []
  type: TYPE_NORMAL
- en: Why is this issue critical?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'As a data platform, the company cannot afford to have:'
  prefs: []
  type: TYPE_NORMAL
- en: slow or stale data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Api error
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pipeline failures
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Missed or delayed synchronizations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Inaccurate dashboard
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Churns (downgrades, cancellations)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/6947ea2052c7b52b74f0dda8fd3fadcc.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: 'Internally, the incidents were spread across several systems:'
  prefs: []
  type: TYPE_NORMAL
- en: Notions for product tracking
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Slack for alerts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: PostgreSQL for storage
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even on Google Sheets for customer support
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/e21440556b8aa5c008babd78666721bc.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: There was not a single source of truth. The product team has to manually cross-reference
    and double-check all data, searching for trends and piecing together. It was an
    investigation and resolving a puzzle, making them lose so many hours weekly.
  prefs: []
  type: TYPE_NORMAL
- en: '**Solution**: Automating an incident system alert with N8N and building a data
    dashboard. So, incidents are detected, tracked, resolved and understood.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why n8n?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Currently, there are several automation platforms and solutions. But not all
    are matching the needs and requirements. Selecting the right one following the
    need is essential.
  prefs: []
  type: TYPE_NORMAL
- en: The specific requirements were to have access to a database without an API needed
    (n8n supports Api), to have visual workflows and nodes for a non-technical person
    to understand, custom-coded nodes, self-hosted options and cost-effective at scale.
    So, amongst the platforms existing like Zapier, Make or n8n, the choice was for
    the last.
  prefs: []
  type: TYPE_NORMAL
- en: Designing the Product Health Score
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/756633ad1ff626b65d6467975df2e658.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: First, the key metrics need to be determined and calculated.
  prefs: []
  type: TYPE_NORMAL
- en: '**Impact score**: simple function of severity + delta + scale of users'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Priority**: derived from severity + impact'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Product health score**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Designing the Automated Detection System with n8n
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/477379df25fa6f4d6f2edac8bf6a1830.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: 'This system is composed of **4 streams**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stream 1**: retrieves recent revenue metrics, identifies unusual spikes in
    churn MRR, and creates incidents when needed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/6888faacb53d97532b9cb6425e4b9fa8.png)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**Stream 2**: Monitors feature usage metrics to detect sudden drops in adoption
    or engagement.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Incidents are logged with severity, context, and alerts to the product team.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![](../Images/66cce41ef084de00e72456ffad1c9cbd.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: '**Stream 3**: For every open incident, collects additional context from the
    database (e.g., churn by country or plan), uses AI to generate a clear root cause
    hypothesis and suggested next steps, sends a summarized report to Slack and email
    and updates the incident'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/426620a58dddf2eec16aa35c72b84f5d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: '**Stream 4**: Every morning, the workflow compiles all incidents from the previous
    day, creates a Notion page for documentation and sends a report to the leadership
    team'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/bf9e4fae042d668b95209acc18d58ec8.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: We deployed similar detection nodes for 8 different metrics, adjusting the z-score
    direction based on whether increases or decreases were problematic.
  prefs: []
  type: TYPE_NORMAL
- en: The **AI agent receives additional context** through SQL queries (churn by country,
    by plan, by segment) to generate more accurate root cause hypotheses. And all
    of this data is gathered and sent in a daily email.
  prefs: []
  type: TYPE_NORMAL
- en: The workflow generates daily summary reports aggregating all incidents by metric
    and severity, distributed via email and Slack to stakeholders.
  prefs: []
  type: TYPE_NORMAL
- en: The dashboard
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The dashboard is consolidating all signals into one place. An automatic product
    health score with **a 0-100 base** is calculated with:'
  prefs: []
  type: TYPE_NORMAL
- en: incident volume
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: severity weighting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: open vs resolved status
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: number of users impacted
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: business trends (MRR)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: usage trends (active accounts)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A segment breakdown to identify which customer groups are the most affected:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0b832f568a825ac0d33de8699ad611c3.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: 'A weekly heatmap and time series trend charts to identify recurring patterns:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e921662ecaf93fe956b71aaf793cb3e1.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: 'And a detailed incident view composed by:'
  prefs: []
  type: TYPE_NORMAL
- en: Business context
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dimension & segment
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Root cause hypothesis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Incident type
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An AI summary to accelerate communication and diagnoses coming from the n8n
    workflow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/dc4af202d1db0608c19c0226032fbb7f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: '**Diagnosis:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The product health score noted the actual product **24/100** with the status
    **“at risk”** with:'
  prefs: []
  type: TYPE_NORMAL
- en: '**45** High & Critical incidents'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**36** incidents during the last 7 days'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**33,385** estimated affected usersNegative trend in churn and DAU'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Several spikes in api_error_rate and drops in checkout_success_rate
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/cb062f736e18eac40407243929c1f224.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: 'Biggest impact per segments:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Enterprise** → critical data freshness issues'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Mid-Market** → recurring incidents on feature adoption'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**SMB** → fluctuations in onboarding & activation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/89733171e3bf26dfa5c071e510e62bb3.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: Impact
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The goal of this dashboard is not only to analyze incidents and identify patterns
    but to enable the organization to react faster with a detailed overview.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0c8aaaefa8181d3455251d3a1b3253d0.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: We noticed a **35% reduction in critical incidents after 2 months.** SRE & DATA
    teams identified the recurring root cause of some major issues, thanks to the
    unified data, and were able to fix it and monitor the maintenance. Incident response
    time improved dramatically due to the AI summaries and all the metrics, allowing
    them to know where to investigate.
  prefs: []
  type: TYPE_NORMAL
- en: An AI-Powered Root Cause Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/782e39a09e2f178643b4b758e22c22fa.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: Using AI can save a lot of time. Especially when an investigation is needed
    in different databases, and you don’t know where to start. Adding an AI agent
    in the loop can **save you a considerable amount of time** thanks to its speed
    of processing data. To obtain this, a **detailed prompt** is necessary because
    the agent will replace a human. So, to have the most accurate results, even the
    AI needs to understand the context and receive some guidance. Otherwise, it could
    investigate and draw irrelevant conclusions. Don’t forget to ***make sure you
    have a full understanding of the cause of the issue***.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: It is essential to note that once the results are obtained, a final check is
    necessary to ensure the analysis was correctly done. **AI is a tool,** but it
    can also go wrong, so do not only on it; it’s a helpful tool. For this system,
    the AI will suggest the **top 3 likely root causes for each incident.**
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/52e2aba34434ab3e8a78b7f0ac5e126f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: A better alignment with the leadership team and reporting based on the data.
    Everything became more data-driven with deeper analyses, not intuition or reports
    by segmentation. This also led to an improved process.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion & takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In conclusion, building a product health dashboard has several benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: Detect negative trends (MRR, DAU, engagement) earlier
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reduce critical incidents by identifying root-cause patterns
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understand real business impact (users affected, churn risk)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prioritize the product roadmap based on risk and impact
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Align Product, Data, SRE, and Revenue around a single source of truth
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'That’s exactly what many companies lack: a unified data approach.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/c83cafc5696b6d72fa7bd581ee9c3312.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: 'Using the n8n workflow helped in two ways: being able to resolve the issues
    as soon as possible and gather the data in one place. The automation tool helped
    reduce the time spent on this task as the business was still running.'
  prefs: []
  type: TYPE_NORMAL
- en: Lessons for Product teams
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/ad3a59e115ef658bdcde672a61042bdf.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Yassin Zehar
  prefs: []
  type: TYPE_NORMAL
- en: '**Start simple**: building an automation system and a dashboard needs to be
    clearly defined. You are not building a product for the customers, you are building
    a product for your collaborators. It is essential that you understand each team’s
    needs since they are your core users. With that in mind, have the product that
    will be your MVP and answer to all your needs first. Then you can improve it by
    adding features or metrics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Unified metrics matter more** than perfect detection: we have to keep in
    mind that it will be thanks to them that the time will be saved, along with understanding.
    Having good detection is essential, but if the metrics are inaccurate, the time
    saved will be wasted by the teams looking for the metrics scattered across different
    environments'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automation saves 10 hours per week** of manual investigation: by automating
    some manual and recurring tasks, you will save hours investigating, as with the
    incident alert workflow, we know directly where to investigate first and the hypothesis
    of the cause and even some action to take.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Document everything**: a proper and detailed documentation is a must and
    will allow all the parties involved to have a clear understanding and views about
    what is happening. Documentation is also a piece of data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Who am I ?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’m Yassin, a Project Manager who expanded into Data Science to bridge the gap
    between business decisions and technical systems. Learning Python, SQL, and analytics
    has enabled me to design product insights and automation workflows that connect
    what teams need with how data behaves. Let’s connect on [Linkedin](http://www.linkedin.com/in/yassin-zehar)
  prefs: []
  type: TYPE_NORMAL
