- en: Six Ways to Control Style and Content in Diffusion Models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/six-ways-to-control-style-and-content-in-diffusion-models/](https://towardsdatascience.com/six-ways-to-control-style-and-content-in-diffusion-models/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Stable Diffusion 1.5/2.0/2.1/XL 1.0, DALL-E, Imagen… In the past years, diffusion
    models have showcased stunning quality in image generation. However, while producing
    great quality on generic concepts, these struggle to generate high quality for
    more specialised queries, for example generating images in a specific style, that
    was not frequently seen in the training dataset.
  prefs: []
  type: TYPE_NORMAL
- en: We could retrain the whole model on vast number of images, explaining the concepts
    needed to address the issue from scratch. However, this doesn’t sound practical.
    First, we need a large set of images for the idea, and second, it is simply too
    expensive and time-consuming.
  prefs: []
  type: TYPE_NORMAL
- en: There are solutions, however, that, given a handful of images and an hour of
    fine-tuning at worst, would enable diffusion models to produce reasonable quality
    on the new concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Below, I cover approaches like Dreambooth, LoRA, Hyper-networks, Textual Inversion,
    IP-Adapters and ControlNets widely used to customize and condition diffusion models.
    The idea behind all these methods is to memorise a new concept we are trying to
    learn, however, each technique approaches it differently.
  prefs: []
  type: TYPE_NORMAL
- en: Diffusion architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before diving into various methods that help to condition diffusion models,
    let’s first recap what diffusion models are.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/209ce7045f7a4e8fb607bb0481286237.png)'
  prefs: []
  type: TYPE_IMG
- en: Diffusion process visualisation. Image by the Author.
  prefs: []
  type: TYPE_NORMAL
- en: The original idea of diffusion models is to train a model to reconstruct a coherent
    image from noise. In the training stage, we gradually add small amounts of Gaussian
    noise (forward process) and then reconstruct the image iteratively by optimizing
    the model to predict the noise, subtracting which we would get closer to the target
    image (reverse process).
  prefs: []
  type: TYPE_NORMAL
- en: The original idea of image corruption has[ evolved into a more practical](https://arxiv.org/abs/2112.10752) and
    lightweight architecture in which images are first compressed to a latent space,
    and all manipulation with added noise is performed in low dimensional space.
  prefs: []
  type: TYPE_NORMAL
- en: To add textual information to the diffusion model, we first pass it through
    a text-encoder (typically [CLIP](https://github.com/openai/CLIP)) to produce latent
    embedding, that is then injected into the model with cross-attention layers.
  prefs: []
  type: TYPE_NORMAL
- en: Dreambooth, [paper](https://dreambooth.github.io/), [code](https://huggingface.co/docs/diffusers/training/dreambooth)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/8882bc908aa2e0f6fbe7b0deeddacd50.png)'
  prefs: []
  type: TYPE_IMG
- en: Dreambooth visualisation. Trainable blocks are marked in red. Image by the Author.
  prefs: []
  type: TYPE_NORMAL
- en: The idea is to take a rare word; typically, an {SKS} word is used and then teach
    the model to map the word {SKS} to a feature we would like to learn. That might,
    for example, be a style that the model has never seen, like van Gogh. We would
    show a dozen of his paintings and fine-tune to the phrase “A painting of boots
    in the {SKS} style”. We could similarly personalise the generation, for example,
    learn how to generate images of a particular person, for example “{SKS} in the
    mountains” on a set of one’s selfies.
  prefs: []
  type: TYPE_NORMAL
- en: To maintain the information learned in the pre-training stage, Dreambooth encourages
    the model not to deviate too much from the original, pre-trained version by adding
    text-image pairs generated by the original model to the fine-tuning set.
  prefs: []
  type: TYPE_NORMAL
- en: '**When to use and when not** Dreambooth produces the best quality across all
    methods; however, the technique could impact already learnt concepts since the
    whole model is updated. The training schedule also limits the number of concepts
    the model can understand. Training is time-consuming, taking 1–2 hours. If we
    decide to introduce several new concepts at a time, we would need to store two
    model checkpoints, which wastes a lot of space.'
  prefs: []
  type: TYPE_NORMAL
- en: Textual Inversion, [paper](https://textual-inversion.github.io/), [code](https://github.com/rinongal/textual_inversion)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/519d67f5ad176a8937180ab0cc0342c0.png)'
  prefs: []
  type: TYPE_IMG
- en: Textual inversion visualisation. Trainable blocks are marked in red. Image by
    the Author.
  prefs: []
  type: TYPE_NORMAL
- en: The assumption behind the textual inversion is that the knowledge stored in
    the latent space of the diffusion models is vast. Hence, the style or the condition
    we want to reproduce with the Diffusion model is already known to it, but we just
    don’t have the token to access it. Thus, instead of fine-tuning the model to reproduce
    the desired output when fed with rare words “in the {SKS} style”, we are optimizing
    for a textual embedding that would result in the desired output.
  prefs: []
  type: TYPE_NORMAL
- en: '**When to use and when not** It takes very little space, as only the token
    will be stored. It is also relatively quick to train, with an average training
    time of 20–30 minutes. However, it comes with its shortcomings — as we are fine-tuning
    a specific vector that guides the model to produce a particular style, it won’t
    generalise beyond this style.'
  prefs: []
  type: TYPE_NORMAL
- en: LoRA, [paper](https://arxiv.org/abs/2106.09685), [code](https://github.com/microsoft/LoRA)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/c55c12f5f474a2e3ce7c769863d8379f.png)'
  prefs: []
  type: TYPE_IMG
- en: LoRA visualisation. Trainable blocks are marked in red. Image by the Author.
  prefs: []
  type: TYPE_NORMAL
- en: Low-Rank Adaptions (LoRA) were proposed for Large Language Models and were [first
    adapted to the diffusion model by Simo Ryu](https://github.com/cloneofsimo/lora).
    The original idea of LoRAs is that instead of fine-tuning the whole model, which
    can be rather costly, we can blend a fraction of new weights that would be fine-tuned
    for the task with a similar rare token approach into the original model.
  prefs: []
  type: TYPE_NORMAL
- en: In diffusion models, rank decomposition is applied to cross-attention layers
    and is responsible for merging prompt and image information. The weight matrices
    WO, WQ, WK, and WV in these layers have LoRA applied.
  prefs: []
  type: TYPE_NORMAL
- en: '**When to use and when not** LoRAs take very little time to train (5–15 minutes)
    — we are updating a handful of parameters compared to the whole model, and unlike
    Dreambooth, they take much less space. However, small-in-size models fine-tuned
    with LoRAs prove worse quality compared to DreamBooth.'
  prefs: []
  type: TYPE_NORMAL
- en: Hyper-networks, paper, code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/b37fc824269ab2eefd6c381477cda239.png)'
  prefs: []
  type: TYPE_IMG
- en: Hyper-networks visualisation. Trainable blocks are marked in red. Image by the
    Author.
  prefs: []
  type: TYPE_NORMAL
- en: Hyper-networks are, in some sense, extensions to LoRAs. Instead of learning
    the relatively small embeddings that would alter the model’s output directly,
    we train a separate network capable of predicting the weights for these newly
    injected embeddings.
  prefs: []
  type: TYPE_NORMAL
- en: Having the model predict the embeddings for a specific concept we can teach
    the hypernetwork several concepts — reusing the same model for multiple tasks.
  prefs: []
  type: TYPE_NORMAL
- en: '**When to use and not** Hypernetworks, not specialising in a single style,
    but instead capable to produce plethora generally do not result in as good quality
    as the other methods and can take significant time to train. On the pros side,
    they can store many more concepts than other single-concept fine-tuning methods.'
  prefs: []
  type: TYPE_NORMAL
- en: IP Adapters, [paper](https://arxiv.org/pdf/2308.06721), [code](https://github.com/tencent-ailab/IP-Adapter)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/22a4b4ce4049ddf3bbae07f755ef2b0a.png)'
  prefs: []
  type: TYPE_IMG
- en: IP-adapter visualisation. Trainable blocks are marked in red. Image by the Author.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of controlling image generation with text prompts, IP adapters propose
    a method to control the generation with an image without any changes to the underlying
    model.
  prefs: []
  type: TYPE_NORMAL
- en: The core idea behind the IP adapter is a decoupled cross-attention mechanism
    that allows the combination of source images with text and generated image features.
    This is achieved by adding a separate cross-attention layer, allowing the model
    to learn image-specific features.
  prefs: []
  type: TYPE_NORMAL
- en: '**When to use and not** IP adapters are lightweight, adaptable and fast. However,
    their performance is highly dependent on the quality and diversity of the training
    data. IP adapters generally tend to work better with supplying stylistic attributes
    (e.g. with an image of Mark Chagall’s paintings) that we would like to see in
    the generated image and could struggle with providing control for exact details,
    such as pose.'
  prefs: []
  type: TYPE_NORMAL
- en: ControlNets, [paper](https://arxiv.org/abs/2302.05543), [code](https://github.com/lllyasviel/ControlNet)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/227dfb9c28714a33293d515415d377db.png)'
  prefs: []
  type: TYPE_IMG
- en: ControlNet visualisation. Trainable blocks are marked in red. Image by the Author.
  prefs: []
  type: TYPE_NORMAL
- en: ControlNet paper proposes a way to extend the input of the text-to-image model
    to any modality, allowing for fine-grained control of the generated image.
  prefs: []
  type: TYPE_NORMAL
- en: In the original formulation, ControlNet is an encoder of the pre-trained diffusion
    model that takes, as an input, the prompt, noise and control data (e.g. depth-map,
    landmarks, etc.). To guide the generation, the intermediate levels of the ControlNet
    are then added to the activations of the frozen diffusion model.
  prefs: []
  type: TYPE_NORMAL
- en: The injection is achieved through zero-convolutions, where the weights and biases
    of 1×1 convolutions are initialized as zeros and gradually learn meaningful transformations
    during training. This is similar to how LoRAs are trained — intialised with 0’s
    they begin learning from the identity function.
  prefs: []
  type: TYPE_NORMAL
- en: '**When to use and not** ControlNets are preferable when we want to control
    the output structure, for example, through landmarks, depth maps, or edge maps.
    Due to the need to update the whole model weights, training could be time-consuming;
    however, these methods also allow for the best fine-grained control through rigid
    control signals.'
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**DreamBooth:** Full fine-tuning of models for custom subjects of styles, high
    control level; however, it takes long time to train and are fit for one purpose
    only.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Textual Inversion: **Embedding-based learning for new concepts, low level
    of control, however, fast to train.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LoRA: **Lightweight fine-tuning of models for new styles/characters, medium
    level of control, while quick to train'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hypernetworks: **Separate model to predict LoRA weights for a given control
    request. Lower control level for more styles. Takes time to train.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**IP-Adapter: **Soft style/content guidance via reference images, medium level
    of stylistic control, lightweight and efficient.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ControlNet: **Control via pose, depth, and edges is very precise; however,
    it takes longer time to train.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Best practice:** For the best results, the combination of IP-adapter, with
    its softer stylistic guidance and ControlNet for pose and object arrangement,
    would produce the best results.'
  prefs: []
  type: TYPE_NORMAL
- en: If you want to go into more details on diffusion, check out [this article](https://erdem.pl/2023/11/step-by-step-visual-introduction-to-diffusion-models),
    that I have found very well written accessible to any level of machine learning
    and math. If you want to have an intuitive explanation of the Math with cool commentary
    check out [this video](https://www.youtube.com/watch?app=desktop&v=HoKDTa5jHvg&t=1284s) or [this
    video](https://www.youtube.com/watch?v=fbLgFrlTnGU).
  prefs: []
  type: TYPE_NORMAL
- en: For looking up information on ControlNets, I found [this explanation](https://www.youtube.com/watch?v=fhIGt7QGg4w) very
    helpful, [this article](https://medium.com/@isa.dario.isa/conditioning-image-generation-%EF%B8%8F-implementation-with-stable-diffusion-controlnet-and-ipadapter-b502bfe9315d) and [this
    article](https://medium.com/@steinsfu/stable-diffusion-controlnet-clearly-explained-f86092b62c89) could
    be a good intro as well.
  prefs: []
  type: TYPE_NORMAL
