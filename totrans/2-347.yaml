- en: 'Get Started with Rust: Installation and Your First CLI Tool – A Beginner’s
    Guide'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/get-started-with-rust-installation-your-first-cli-tool-a-beginners-guide/](https://towardsdatascience.com/get-started-with-rust-installation-your-first-cli-tool-a-beginners-guide/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1747165949018" class="mdspan-comment">Rust has become</mdspan>
    a popular programming language in recent years as it combines security and high
    performance and can be used in many applications. It combines the positive characteristics
    of C and C++ with the modern syntax and simplicity of other programming languages
    such as Python. In this article, we will take a step-by-step look at the installation
    of Rust on various operating systems and set up a simple command line interface
    to understand Rust’s structure and functionality.
  prefs: []
  type: TYPE_NORMAL
- en: Installing Rust — step by step
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Regardless of the operating system, it is quite easy to install Rust thanks
    to the official installer `rustup`, which is available for free on the [Rust](https://www.rust-lang.org/) website.
    This means that the installation only takes a few steps and only differs slightly
    for the various operating systems.
  prefs: []
  type: TYPE_NORMAL
- en: Installing Rust under Windows
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In Windows, the installer completely controls the installation, and you can
    follow the steps below:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to the “Install” subsection on the official Rust website ([https://www.rust-lang.org/tools/install](https://www.rust-lang.org/tools/install))
    and download the `rustup-init.exe` file there. The website recognizes the underlying
    operating system so that the appropriate suggestions for the system used are made
    directly.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As soon as the download is complete, the `rustup-init.exe` file can be executed.
    A command line with various installation instructions then opens.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Press the Enter key to run the standard installation to install Rust. This
    also includes the following tools:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`rustc` is the compiler, which compiles the code and checks for errors before
    execution.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`cargo` is Rust’s build and package management tool.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`rustup` is the version manager.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'After successful installation, Rust should automatically be available in your `PATH`.
    This can be easily checked in PowerShell or CMD using the following commands:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: If “rustc” and “cargo” are then displayed in the output with the respective
    version numbers, then the installation was successful. However, if the command
    is not found, it may be due to the environment variables. To check these, you
    can follow the path “This PC –> Properties –> Advanced system settings –> Environment
    variables”. Once there, you should make sure that the path to Rust, for example
    “C:\Users\UserName\.cargo\bin”, is present in the `PATH` variable.
  prefs: []
  type: TYPE_NORMAL
- en: Installing Rust under Ubuntu/Linux
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In Linux, Rust can be installed completely via the terminal without having
    to download anything from the Rust website. To install Rust, the following steps
    must be carried out:'
  prefs: []
  type: TYPE_NORMAL
- en: Open the terminal, for example, with the key combination Ctrl + Alt + T.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'To install Rust, the following command is executed:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 3\. You will then be asked whether the installation should be started. This
    can be confirmed by entering “1” (default), for example. All required packages
    are then downloaded, and the environment is set up.
  prefs: []
  type: TYPE_NORMAL
- en: '4\. You may have to set the path manually. In this case, you can use this command,
    for example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'After the installation has been completed, you can check whether everything
    has worked properly. To do this, you can explicitly display the versions of rustc
    and cargo:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Installing Rust under macOS
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are several ways to install Rust on macOS. If you have installed Homebrew,
    you can simply use this to install Rust by executing the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Alternatively, you can also install Rust directly using this script:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'During the installation, you will be asked whether you want to run the standard
    installation. You can simply confirm this by pressing the Enter key. Regardless
    of the variant selected, you can then check the installation by displaying the
    version of Rust to ensure that everything has worked:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Creating a Rust project with cargo
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'During the installation of Rust, you have probably already come across the `cargo` program.
    This is the official package manager and build system of Rust and is comparable
    to `pip` in Python. `cargo` performs the following tasks, among others:'
  prefs: []
  type: TYPE_NORMAL
- en: Initialization of a project
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Management of dependencies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Compiling the code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Execution of tests
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Optimization of builds
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This allows you to manage complete projects in Rust without having to deal with
    complicated build scripts. It also helps you to set up new projects quickly and
    easily, which can then be filled with life.
  prefs: []
  type: TYPE_NORMAL
- en: 'For our example, we will create a new project. To do this, we go to the terminal
    and navigate to a folder in which we want to save it. We then execute the following
    command to create a new Rust project:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'We call this project `json_viewer` because we are building a CLI tool that
    can be used to open and process [JSON](https://databasecamp.de/en/data/json-en) files.
    The `--bin` option indicates that we want to create an executable program and
    not a library. You should now be able to see the following folder structure in
    your directory after executing the command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Every new project has this structure. `Cargo.toml` contains all the dependencies
    and metadata of your project, such as the name, the libraries used, or the version.
    The `src/main.rs`, on the other hand, later contains the actual Rust code, which
    then defines the steps that are executed when the program is started.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we can define a simple function here that generates an output in the
    terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'The program can be easily called up from the terminal using `cargo`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'For this call to work, it must be ensured that you are in the main directory
    of the project, i.e. where the `Cargo.toml` file is stored. If everything has
    been set up and executed correctly, you will receive this output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: With these few steps, you have just created your first successful Rust project,
    which we can build on in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: 'Building a CLI tool: Simple JSON parser'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now we start to fill the project with life and create a program that can read
    JSON files and output their content in the terminal in a structured way.
  prefs: []
  type: TYPE_NORMAL
- en: The first step is to define the dependencies, i.e., the libraries that we will
    use in the course of the project. These are stored in the `Cargo.toml `file. In
    Rust, the so-called crates are comparable to libraries or modules that offer certain
    predefined functionalities. For example, they can consist of reusable code written
    by other developers.
  prefs: []
  type: TYPE_NORMAL
- en: 'We need the following crates for our project:'
  prefs: []
  type: TYPE_NORMAL
- en: '`serde` enables the serialization and deserialization of data formats such
    as [JSON](https://databasecamp.de/en/data/json-en) or [YAML](https://databasecamp.de/en/data/yaml-file).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`serde_json`, on the other hand, is an extension that was developed specifically
    for working with JSON files.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For your project to access these crates, they must be stored in the `Cargo.toml` file.
    This looks like this immediately after creating the project:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'We can now add the required crates in the `[dependencies]` section. Here we
    also define the version to be used:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'To ensure that the added dependencies are available in the project, they must
    first be downloaded and built. To do this, the following terminal command can
    be executed in the main directory:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: During execution, `cargo` searches the central Rust repository crates.io for
    the dependencies and the specified versions to download them. These crates are
    then compiled together with the code and cached so that they do not have to be
    downloaded again for the next build.
  prefs: []
  type: TYPE_NORMAL
- en: 'If these steps have worked, we are now ready to write the actual Rust code
    that opens and processes the JSON file. To do this, you can open the `src/main.rs` file
    and replace the existing content with this code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'The code follows these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Check arguments:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We read the arguments from the command line via `env::args()`.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The user must specify the path to the JSON file at startup.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Read the file:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: With the help of `fs::read_to_string()`, the content of the file is read into
    a string.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Parse JSON:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The crate `serde_json` converts the string into a Rust object with the type
    Value.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Format output:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The content is output legibly in the console.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To test the tool, you can, for example, create a test file in the project directory
    under the name `examples.json`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'The program is then executed using `cargo run` and the path to the JSON file
    is also defined:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: This brings us to the end of our first project in Rust and we have successfully
    built a simple CLI tool that can read JSON files and output them to the command
    line.
  prefs: []
  type: TYPE_NORMAL
- en: This is what you should take with you
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Installing Rust is quick and easy in many operating systems. The other components
    that are required are already installed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With the help of `cargo`, an empty project can be created directly, which contains
    the necessary files and in which you can start writing Rust code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Before you start programming, you should enter the dependencies and download
    them using the build command.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that everything is set up, you can start with the actual programming.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
