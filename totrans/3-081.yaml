- en: Retrieval Augmented Generation (RAG) — An Introduction
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/retrieval-augmented-generation-rag-an-introduction/](https://towardsdatascience.com/retrieval-augmented-generation-rag-an-introduction/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*The <mdspan datatext="el1745278703319" class="mdspan-comment">model hallucinated</mdspan>!*
    *It was giving me OK answers and then it just started hallucinating*. We’ve all
    heard or experienced it.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Natural Language Generation models can sometimes hallucinate, i.e., they start
    generating text that is not quite accurate for the prompt provided. In layman’s
    terms, they start *making stuff up* that’s not strictly related to the context
    given or plainly inaccurate. Some hallucinations can be understandable, for example,
    mentioning something related but not exactly the topic in question, other times
    it may look like legitimate information but it’s simply not correct, it’s made
    up.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: This is clearly a problem when we start using generative models to complete
    tasks and we intend to consume the information they generated to make decisions.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: The problem is not necessarily tied to how the model is generating the text,
    but in the information it’s using to generate a response. Once you train an LLM,
    the information encoded in the training data is crystalized, it becomes a static
    representation of everything the model knows up until that point in time. In order
    to make the model update its *world view* or its knowledge base, it needs to be
    retrained. However, training Large Language Models requires time and money.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: One of the main motivations for developing RAG s the increasing demand for factually
    accurate, contextually relevant, and up-to-date generated content.[1]
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When thinking about a way to make generative models aware of the wealth of new
    information that is created everyday, researchers started exploring efficient
    ways to keep these models-up-to-date that didn’t require continuously re-training
    models.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: They came up with the idea for **Hybrid Models**, meaning, generative models
    that have a way of fetching external information that can complement the data
    the LLM already knows and was trained on. These modela have a information retrieval
    component that allows the model to access up-to-date data, and the generative
    capabilities they are already well known for. The goal being to ensure both fluency
    and factual correctness when producing text.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: This hybrid model architecture is called **Retrieval Augmented Generation, or
    RAG** for short.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: The RAG era
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Given the critical need to keep models updated in a time and cost effective
    way, RAG has become an increasingly popular architecture.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Its retrieval mechanism pulls information from external sources that are not
    encoded in the LLM. For example, you can see RAG in action, in the real world,
    when you ask Gemini something about the Brooklyn Bridge. At the bottom you’ll
    see the external sources where it pulled information from.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/687ae71635c35b41d05a190aef118e9e.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
- en: Example of external sources being shown as part of the output of the RAG model.
    (Image by author)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: By grounding the final output on information obtained from the retrieval module,
    the outcome of these Generative AI applications, is less likely to propagate any
    biases originating from the outdated, point-in-time view of the training data
    they used.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: The second piece of the RAG architecture is what is the most visible to us,
    consumers, the generation model. This is typically an LLM that processes the information
    retrieved and generates human-like text.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: RAG combines retrieval mechanisms with generative language models to enhance
    the accuracy of outputs[1]
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As for its internal architecture, the retrieval module, relies on dense vectors
    to identify the relevant documents to use, while the generative model, utilizes
    the typical LLM architecture based on transformers.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f9758914362e2690c47cec1acfa652a1.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
- en: A basic flow of the RAG system along with its component. Image and caption taken
    from paper referenced in [1] (Image by Author)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: This architecture addresses very important pain-points of generative models,
    but it’s not a silver bullet. It also comes with some challenges and limitations.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: The Retrieval module may **struggle in getting the most up-to-date documents**.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: This part of the architecture relies heavily on Dense Passage Retrieval (DPR)[2,
    3]. Compared to other techniques such as BM25, which is based on TF-IDF, DPR does
    a much better job at finding the semantic similarity between query and documents.
    It leverages semantic meaning, instead of simple keyword matching is especially
    useful in open-domain applications, i.e., think about tools like Gemini or ChatGPT,
    which are not necessarily experts in a particular domain, but *know* a little
    bit about everything.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: However, DPR has its shortcomings too. The dense vector representation can lead
    to irrelevant or off-topic documents being retrieved. DPR models seem to retrieve
    information based on knowledge that already exists within their parameters, i.e,
    facts must be already encoded in order to be accessible by retrieval[2].
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '[…] if we extend our definition of retrieval to also encompass the ability
    to navigate and elucidate concepts previously unknown or unencountered by the
    model—a capacity akin to how humans research and retrieve information—our findings
    imply that DPR models fall short of this mark.[2]'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To mitigate these challenges, researchers thought about adding more sophisticated
    query expansion and contextual disambiguation.  Query expansion is a set of techniques
    that modify the original user query by adding relevant terms, with the goal of
    establishing a connection between the intent of the user’s query with relevant
    documents[4].
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: There are also cases when the **generative module fails to fully take into account,
    into its responses, the information gathered in the retrieval phase**. To address
    this, there have been new improvements on attention and hierarchical fusion techniques
    [5].
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Model performance is an important metric, especially when the goal of these
    applications is to seamlessly be part of our day-to-day lives, and make the most
    mundane tasks almost effortless. However, **running RAG end-to-end can be computationally
    expensive**. For every query the user makes, there needs to be one step for information
    retrieval, and another for text generation. This is where new techniques, such
    as Model Pruning [6] and Knowledge Distillation [7] come into play, to ensure
    that even with the additional step of searching for up-to-date information outside
    of the trained model data, the overall system is still performant.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, while the information retrieval module in the RAG architecture is intended
    to mitigate bias by accessing external sources that are more up-to-date than the
    data the model was trained on, **it may actually not fully eliminate bias**. If
    the external sources are not meticulously chosen, they can continue to add bias
    or even amplify existing biases from the training data.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Utilizing RAG in generative applications provides a significant improvement
    on the model’s capacity to stay up-to-date, and gives its users more accurate
    results.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: When used in domain-specific applications, its potential is even clearer. With
    a narrower scope and an external library of documents pertaining only to a particular
    domain, these models have the ability to do a more effective retrieval of new
    information.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: However, ensuring generative models are constantly up-to-date is far from a
    solved problem.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Technical challenges, such as, handling unstructured data or ensuring model
    performance, continue to be active research topics.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: Hope you enjoyed learning a bit more about RAG, and the role this type of architecture
    plays in making generative applications stay up-to-date without requiring to retrain
    the model.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '*Thanks for reading!*'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-37
  prefs: []
