- en: 'Overfitting vs. Underfitting: Making Sense of the Bias-Variance Trade-Off'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 过度拟合与欠拟合：理解偏差-方差权衡
- en: 原文：[https://towardsdatascience.com/overfitting-versus-underfitting/](https://towardsdatascience.com/overfitting-versus-underfitting/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/overfitting-versus-underfitting/](https://towardsdatascience.com/overfitting-versus-underfitting/)'
- en: '<mdspan datatext="el1763703750759" class="mdspan-comment">Building machine
    learning</mdspan> models is a bit like cooking: too little seasoning and the dish
    is bland, too much and it’s overpowering. The goal? That perfect balance – just
    enough complexity to capture the flavour of the data, but not so much that it
    is overwhelming.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763703750759" class="mdspan-comment">构建机器学习</mdspan>模型有点像烹饪：调味料太少，菜肴会平淡无味，太多则会压倒一切。目标？那就是完美的平衡——足够的复杂性来捕捉数据的味道，但又不会过于压倒。
- en: In this post, we’ll dive into two of the most common pitfalls in model development: **overfitting** and **underfitting**.
    Whether you’re training your first model or tuning your hundredth, keeping these
    concepts in check is key to building models that actually work in the real world.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将深入探讨模型开发中最常见的两个陷阱：**过度拟合**和**欠拟合**。无论你是训练你的第一个模型还是调整你的第一百个模型，保持这些概念的控制是构建在实际世界中真正起作用的模型的关键。
- en: Overfitting
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 过度拟合
- en: What is overfitting?
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是过度拟合？
- en: Overfitting is a common issue with data science models. It happens when the
    model learns too well from trained data, meaning that it learns from patterns
    specific to trained data and noise. Therefore, it is not able to predict well
    based on unseen data.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 过度拟合是数据科学模型中常见的问题。它发生在模型从训练数据中学习得太好时，这意味着它从特定于训练数据和噪声的模式中学习。因此，它无法根据未见过的数据进行良好的预测。
- en: Why is overfitting an issue?
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么过度拟合是一个问题？
- en: 'Poor performance: The model is not able to generalise well. The patterns it
    has detected during training are not applicable to the rest of the data. You get
    the impression that the model is working great based on training errors, when
    in fact the test or real-world errors are not that optimistic.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 性能不佳：模型无法很好地泛化。它在训练期间检测到的模式不适用于其余数据。你可能会觉得模型基于训练错误工作得很好，但实际上测试或现实世界的错误并不那么乐观。
- en: 'Predictions with high variance: The model performance is unstable and the predictions
    are not reliable. Small adjustments to the data cause high variance in the predictions
    being made.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 高方差预测：模型性能不稳定，预测不可靠。对数据的微小调整会导致正在做出的预测的高方差。
- en: 'Training a complex and expensive model: Training and building a complex model
    in production is an expensive and high-resource job. If a simpler model performs
    just as well, it’s more efficient to use it instead.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练复杂且昂贵的模型：在生产环境中训练和构建复杂模型是一项昂贵且资源密集型的工作。如果更简单的模型表现同样出色，那么使用它会更有效率。
- en: 'Risk of losing business trust: Data scientists who are overly optimistic when
    experimenting with new models may overpromise results to business stakeholders.
    If overfitting is discovered only after the model has been presented, it can significantly
    damage credibility and make it difficult to regain trust in the model’s reliability.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 丢失商业信任的风险：数据科学家在实验新模型时过于乐观，可能会向商业利益相关者过度承诺结果。如果过度拟合是在模型展示后才被发现，这可能会严重损害信誉，并使恢复对模型可靠性的信任变得困难。
- en: How to identify overfitting
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何识别过度拟合
- en: 'Cross-validation: During cross-validation, the input data is split into several
    folds (sets of training and testing data). Different folds of the input data should
    give similar testing error results. A large gap in performance across folds may
    indicate model instability or data leakage, both of which can be symptoms of overfitting.'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 交叉验证：在交叉验证过程中，输入数据被分成几个折叠（训练和测试数据的集合）。不同折叠的输入数据应该给出类似的测试错误结果。折叠之间性能的巨大差距可能表明模型不稳定或数据泄露，这两者都可能是过度拟合的症状。
- en: Keep track of the training, testing and generalisation errors. The error when
    the model is deployed (generalisation error) should not deviate largely from the
    errors you already know of. If you want to go the extra mile, consider implementing
    a monitoring alert if the deployed model’s performance deviates significantly
    from the validation set error.
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 跟踪训练、测试和泛化错误。模型部署时的错误（泛化错误）不应与您已经知道的错误有太大偏差。如果您想更进一步，可以考虑在部署的模型性能与验证集错误显著偏差时实施监控警报。
- en: How to mitigate/ prevent overfitting
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何减轻/预防过度拟合
- en: 'Remove features: Too many features might “guide” the model too much, therefore
    resulting to a model that is not able to generalise well.'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 移除特征：过多的特征可能会“引导”模型过多，因此导致模型无法很好地泛化。
- en: 'Increase training data: Providing more examples to learn from, the model learns
    to generalise better and it is less sensitive to outliers and noise.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 增加训练数据：提供更多学习例子，模型学会更好地泛化，并且对异常值和噪声的敏感性降低。
- en: 'Increase regularisation: Regularisation techniques assist by penalising the
    already inflated coefficients. This protects the model from fitting too closely
    to the data.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 增加正则化：正则化技术通过惩罚已经膨胀的系数来协助。这保护模型不会过于紧密地拟合数据。
- en: 'Adjust hyper-parameters: Certain hyper-parameters that are fitted too much,
    might result in a model that is not able to generalise well.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 调整超参数：某些拟合过多的超参数可能会导致模型无法很好地泛化。
- en: Underfitting
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 欠拟合
- en: What is underfitting?
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是欠拟合？
- en: Underfitting happens when the nature of the model or the features are too simplistic
    to capture the underlying data well. It also results in poor predictions in unseen
    data.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当模型的本质或特征过于简单，无法很好地捕捉潜在数据时，就会发生欠拟合。它也会导致在未见过的数据上预测不佳。
- en: Why is underfitting problematic?
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么欠拟合是问题？
- en: 'Poor performance: The model performs poorly on training data, therefore poorly
    also on test and real-world data.'
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 性能差：模型在训练数据上的表现不佳，因此也在测试和真实世界数据上表现不佳。
- en: 'Predictions with high bias: The model is incapable of making reliable predictions.'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 高偏差的预测：模型无法做出可靠的预测。
- en: How to identify underfitting
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何识别欠拟合
- en: Training and test errors will be poor.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练和测试误差将会很差。
- en: Generalisation error will be high, and possibly close to the training error.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 泛化误差将会很高，并且可能接近训练误差。
- en: How to fix underfitting
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何解决欠拟合问题
- en: 'Enhance features: Introduce new features, or add more sophisticated features
    (e.g.: add interaction effects/ polynomial terms/ seasonality terms) which will
    capture more complex patterns in the underlying data'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 增强特征：引入新的特征，或添加更复杂的特征（例如：添加交互效应/多项式项/季节性项），这将捕捉潜在数据中的更复杂模式。
- en: 'Increase training data: Providing more examples to learn from, the model learns
    to generalise better and it is less sensitive to outliers and noise.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 增加训练数据：提供更多学习例子，模型学会更好地泛化，并且对异常值和噪声的敏感性降低。
- en: 'Reduce regularisation power: When applying a regularisation technique that
    is too powerful, the features become too uniform and the model doesn’t prioritise
    any feature, preventing it from learning important patterns.'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 减少正则化强度：当应用过于强大的正则化技术时，特征变得过于均匀，模型不会优先考虑任何特征，阻止它学习重要模式。
- en: 'Adjust hyper-parameters: An intrinsically complex model with poor hyper-parameters
    may not be able to capture all the complexity. Paying more attention to adjusting
    them may be valuable (e.g. add more trees to a random forest).'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 调整超参数：一个本质上复杂的模型如果超参数设置不当，可能无法捕捉到所有复杂性。更加关注调整它们可能是有价值的（例如，向随机森林中添加更多树）。
- en: If all other options do not fix the underlying issue, it might be worthwhile
    tossing the model and replacing it with one that is able to capture more complex
    patterns in data.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果所有其他选项都不能解决根本问题，那么丢弃模型并用一个能够捕捉数据中更复杂模式的模型替换它可能是值得的。
- en: Summary
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Machine learning isn’t magic, it’s a balancing act between too much and too
    little. Overfit your model, and it becomes a perfectionist that can’t handle new
    situations. Underfit it, and it misses the point entirely.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习不是魔法，它是在过多和过少之间的平衡行为。过度拟合你的模型，它就会成为一个完美主义者，无法处理新情况。欠拟合它，它就会完全错过要点。
- en: The best models live in the sweet spot: **generalising well, learning enough,
    but not too much**. By understanding and managing overfitting and underfitting,
    you’re not just improving metrics, you’re building trust, reducing risk, and creating
    solutions that last beyond the training set.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的模型存在于最佳区域：**泛化良好，学习足够，但不过度**。通过理解和管理过拟合和欠拟合，你不仅是在提高指标，你是在建立信任，降低风险，并创建超越训练集的解决方案。
