- en: All The SQL a Data Scientist Needs to Know
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/all-the-sql-a-data-scientist-needs-to-know-7a5328176a67/](https://towardsdatascience.com/all-the-sql-a-data-scientist-needs-to-know-7a5328176a67/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Image artificially generated using Grok 2.](../Images/27e94cccc84bd4bc235a1817d6d7c433.png)'
  prefs: []
  type: TYPE_IMG
- en: Image artificially generated using Grok 2.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In my opinion, SQL is one of the most important skills a data professional should
    have. Whether you’re a Data Analyst, Data Scientist, or Software Developer, you’re
    likely going to be interacting with databases daily using SQL.
  prefs: []
  type: TYPE_NORMAL
- en: Speaking from a data scientist perspective, you do not need to be an expert
    in SQL. Being able to extract, manipulate, and analyse data using SQL should be
    enough for the majority of data scientists’ tasks. You will often find that you
    only use SQL for loading data into a Jupyter Notebook prior to implementing some
    exploratory data analysis (EDA) using [Pandas](https://pandas.pydata.org/pandas-docs/stable/index.html).
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of this article is to discuss the fundamentals of SQL syntax, discuss
    SQL best practices, and what resources are available for you to practice your
    SQL skills.
  prefs: []
  type: TYPE_NORMAL
- en: What is SQL?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: SQL is a domain-specific language created to manage and manipulate relational
    databases. SQL has been widely adopted by not only Data Scientists but the majority
    of data professionals as the go-to language whenever interacting with databases.
  prefs: []
  type: TYPE_NORMAL
- en: 'The acronym SQL stands for:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Structured:** Data is stored in an organised state, unlike unstructured data
    (e.g. audio, video, text).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Query:** How users speak to the database, extracting the information they’re
    looking for by writing SQL queries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Language:** SQL is a programming language, designed to be extremely user-friendly
    and very easy to read, unlike some traditional programming languages.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SQL comes in many different [flavors](https://www.nobledesktop.com/learn/sql/what-is-sql-and-how-do-we-use-it),
    the main difference when comparing flavors is whether they’re a paid or free service.
    Over the years there have been several open-source flavors of SQL released, the
    most popular being [MySQL](https://www.mysql.com/) and [PostgreSQL](https://www.postgresql.org/).
  prefs: []
  type: TYPE_NORMAL
- en: From my experience, [Transact-SQL](https://en.wikipedia.org/wiki/Transact-SQL)
    (via MS SQL Server), [GoogleSQL](https://cloud.google.com/bigquery/docs/introduction-sql#:~:text=BigQuery%20supports%20the%20GoogleSQL%20dialect,the%20broadest%20range%20of%20functionality.)
    (via BigQuery), and PostgreSQL are the most popular. I would focus on Transact-SQL
    (via MS SQL Server) if I was starting from scratch as most tutorials cover this
    flavor of SQL.
  prefs: []
  type: TYPE_NORMAL
- en: '*For more information on SQL, please see [here](https://en.wikipedia.org/wiki/SQL).*'
  prefs: []
  type: TYPE_NORMAL
- en: SQL Fundamentals
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some professions such as Data Engineers and Database Administrators (DBAs) need
    to have an advanced knowledge of SQL, but this is not the case for Data Scientists.
    As you gain experience, you will find that writing SQL scripts becomes quite repetitive,
    and most of the time you’re just copying previous scripts and making minor amendments.
  prefs: []
  type: TYPE_NORMAL
- en: Most Data Scientists will use SQL to perform basic data transformations before
    importing into a Python environment. I am going to provide you with all the fundamental
    commands required to perform 90% of your day-to-day SQL-related tasks as a Data
    Scientist.
  prefs: []
  type: TYPE_NORMAL
- en: Selecting Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The most important SQL command is `SELECT`, this command allows you to define
    what columns you would like to select from the table stated in your query.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Columns can either be stated individually or you can use an asterisk (*) indicating
    that you would like to select all columns in that table.
  prefs: []
  type: TYPE_NORMAL
- en: The query above will select all rows from the `my_store.ecommerce.orders` table
    regardless of the presence of duplicated rows. To prevent this from happening
    you can use the `DISTINCT` command to only return unique rows.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Engineering Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sometimes your table does not contain the column you would like, but what it
    does have is the underlying data to create that column. Using something like a
    `CASE` command, you can engineer your own feature in your SQL query.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: In the query above, we have created the column `order_quantity_status` based
    on the values in the column `order_quantity`. The `CASE` command acts as an `IF-ELSE`
    statement, similar to something you might have come across in alternative programming
    languages.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: There are many alternative approaches than using `CASE` to engineer new
    features. More information on these approaches is available via the learning resources
    at the bottom of this article.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Grouping and Ordering Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: These clauses are very self-explanatory, the `GROUP BY` clause is used when
    aggregating columns whereas the `ORDER BY` clause is used when you want to order
    columns in your output.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: In the query above we are grouping by `order_date` and counting how many unique
    products were sold each day. After calculating this aggregation, we return the
    output ordered descending by the newly created `distinct_product_count` column.
  prefs: []
  type: TYPE_NORMAL
- en: Filtering Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It is not uncommon to encounter database tables which are terabytes in size.
    To reduce processing costs and time, including filtering in your queries is essential.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Including the `WHERE` clause in your query allows you to take advantage of partitions
    and/or indexing. By reducing the size of the data your query has to process, your
    queries will run much faster at an extremely lower cost. Your Data Engineers and
    DBAs will thank you!
  prefs: []
  type: TYPE_NORMAL
- en: 'Not only is the `WHERE` clause good for filtering dates, it can also be implemented
    on any column in your table. For example, if we wanted to only include SKUs SKU100,
    SKU123, and SKU420, and only wanted to see orders of those products with a quantity
    of less than 3, we can use the following query:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Note: Also spend some time looking at the `HAVING` clause, this is an alternative
    approach to filtering using aggregated column values. The query below demonstrates
    this by only returning order dates and the total number of orders when the daily
    sum is greater or equal to 100.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Joining Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The most adopted database design pattern is the [Star Schema](https://www.databricks.com/glossary/star-schema)
    which uses fact and dimension tables. Fact tables consist of quantitative data
    such as metrics and measurements whereas dimension tables provide more descriptive
    information adding further context to the information provided in the fact table.
  prefs: []
  type: TYPE_NORMAL
- en: As a Data Scientist, it’s your responsibility to identify the tables where the
    data you require is located. Secondly, you must perform the correct join to combine
    these tables.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: In the query above, we are performing an `INNER JOIN` on the `product_sku` column.
    An `INNER JOIN` will return all of the order rows where we successfully identify
    the `product_sku` in the `product_details` table.
  prefs: []
  type: TYPE_NORMAL
- en: It is important to pay attention to the aliases assigned to each table, it is
    not uncommon for more than one table to have the same column name. By using aliases,
    it allows you to state the specific column you are referencing.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: Ensure you spend the time researching alternative joins e.g. `LEFT JOIN`,
    `RIGHT JOIN`, and `FULL OUTER JOIN`. For those who are visual learners, check
    out [this link](https://www.w3schools.com/sql/sql_join.asp) on SQL joins.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Aggregating Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Aggregating columns is something you should get extremely familiar with when
    using SQL. The most common commands you will use frequently are `COUNT()`, `SUM()`,
    `MIN()`, `MAX()`, and `AVG()`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: These aggregation functions are used to generate descriptive statistics from
    your data. Although this can be completed using Python, I find it more productive
    for me to complete this task using SQL, especially if it is answering a stakeholder
    question on the fly.
  prefs: []
  type: TYPE_NORMAL
- en: Next Steps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After mastering the fundamentals, you should expand your knowledge and focus
    on intermediate SQL. Some common processes that arise frequently in my day job
    are [common expression tables (CTEs)]([https://www.atlassian.com/data/sql/using-common-table-expressions#:~:text=A%20Common%20Table%20Expression%20(CTE,focus%20on%20non%2Drecurrsive%20CTEs](https://www.atlassian.com/data/sql/using-common-table-expressions#:~:text=A%20Common%20Table%20Expression%20(CTE,focus%20on%20non%2Drecurrsive%20CTEs).)
    and [window functions](https://mode.com/sql-tutorial/sql-window-functions).
  prefs: []
  type: TYPE_NORMAL
- en: CTEs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As I do the majority of my SQL using [BigQuery](https://cloud.google.com/bigquery?hl=en)
    via GCP, I use CTEs in almost all my queries. CTEs allow you to create temporary
    tables that can be later referenced as part of a broader, larger SQL query.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The query above creates a CTE that first calculates the `total_orders` before
    then joining the `total_product_orders_daily` table to the `my_store.ecommerce.product_details`
    table. Also note, the `WHERE` clause occurs as early as possible in the CTE, you
    should always aim to reduce the amount of data you’re working with as soon as
    possible.
  prefs: []
  type: TYPE_NORMAL
- en: Window Functions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A window function performs a calculation across a set of rows that are related
    to the current row, each row maintains a separate identity. For example, if you
    want to rank your data or identify duplicated records, you can do this by implementing
    window functions.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The query above creates the column `daily_sku_order_rank` which is ranking each
    `product_sku` per `order_date` in descending order.
  prefs: []
  type: TYPE_NORMAL
- en: 'To identify and remove duplicated records using window functions you can use
    the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: For instances where `daily_sku_order_rank` is greater than 1 (a duplicated record),
    these will be removed once the CTE executes and generates an output.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: T[here](https://www.geeksforgeeks.org/rank-and-dense-rank-in-sql-server/)
    are more functions available when performing window functions such as _`DENSE_RANK`_,
    more information is available here.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: SQL Best Practices
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Similar to alternative programming scripts, when composing a SQL script you
    should always consider somebody else reusing your code. To make this process easier,
    it is best to follow some SQL best practices. Some standout best practices are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Use Meaningful Naming Conventions:** It is better to have longer more descriptive
    column/table naming conventions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Code Formatting:** Use consistent indentation throughout your script. There
    is no right or wrong regarding upper or lowercase text, pick one and stick to
    it.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Refrain from Selecting All:** Select specific columns you want to include
    in your output, do not use the asterisks when selecting from a table.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Indexing Columns:** Columns that are frequently used in `WHERE`, `JOIN`,
    or `ORDER BY` clauses should be indexed, therefore optimising query performance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Where to Use Functions:** Similar to where you should index your columns,
    you should also not be using any functions (e.g. `CAST()`, `LEN()`) within `WHERE`,
    `JOIN`, or `ORDER BY` clauses. This is also the same for wildcards.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Note: There are more SQL best practices than those stated above, this can sometimes
    be dependant on the flavor of SQL you’re using. I encourage you to enquire within
    your company to see whether there has been any internal SQL best practices established
    which you could look to implement in your work.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Resources for Practicing SQL
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Your SQL development will always advance at a faster pace when working with
    real data in a professional setting. For aspiring Data Scientists who are yet
    to land their first position, there are many online alternatives you can use to
    maintain and grow your SQL skills.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some of the top resources I have found for learning SQL are:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**W3Schools.com**](https://www.w3schools.com/sql/default.asp)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Solve SQL Code Challenges**](https://www.hackerrank.com/domains/sql)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Master Coding for Data Science**](https://www.stratascratch.com/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**SQLZoo**](https://sqlzoo.net/wiki/SQL_Tutorial)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**SQLBolt – Learn SQL – Introduction to SQL**](https://sqlbolt.com/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**DataLemur – Ace the SQL & Data Science Interview**](https://datalemur.com/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Personally, I find **StrataScratch** to be the best as it allows you to choose
    between different flavors of SQL, has a great selection of questions, and has
    a good UI (similar to [LeetCode](https://leetcode.com/)).
  prefs: []
  type: TYPE_NORMAL
- en: For more theoretical learning, **W3Schools** is the one I would select. I started
    reading this resource when I was first learning SQL, it is always in my bookmarks
    should I need to refresh my memory on a specific topic.
  prefs: []
  type: TYPE_NORMAL
- en: One thing I would suggest is not to spend too much time trying to find the right
    resource, pick one, and start tackling the challenges. Start with the beginner
    tasks and work your way up, be patient and consistent with your learning. You
    do not need to complete all the hard challenges before you are deemed interview-ready,
    as you progress your confidence will grow.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: Some of these resources are free, whereas others have free tiers but
    some of their content sits behind a paywall.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: All Data Scientists should have at least a foundational knowledge of SQL. Unfortunately,
    SQL does not get the recognition at an academic level which often results in graduates
    lacking the skills when trying to land their first Data Scientist role.
  prefs: []
  type: TYPE_NORMAL
- en: The language isn’t the most attractive and when compared to learning Python,
    can often be described as being quite boring. It is only when you begin working
    in a professional setting that you understand how important SQL will be in your
    career.
  prefs: []
  type: TYPE_NORMAL
- en: Not only are there vast amounts of free resources online to teach you, but there
    is also a great community of engineers and scientists discussing SQL best practices
    online.
  prefs: []
  type: TYPE_NORMAL
- en: Take the time to learn SQL, having this skill in your toolbox early in your
    career will definitely make you stand out from the competition.
  prefs: []
  type: TYPE_NORMAL
