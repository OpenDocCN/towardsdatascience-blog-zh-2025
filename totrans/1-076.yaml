- en: Developing Human Sexuality in the Age of AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在人工智能时代发展人类性欲
- en: 原文：[https://towardsdatascience.com/developing-human-sexuality-in-the-age-of-ai/](https://towardsdatascience.com/developing-human-sexuality-in-the-age-of-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/developing-human-sexuality-in-the-age-of-ai/](https://towardsdatascience.com/developing-human-sexuality-in-the-age-of-ai/)
- en: <mdspan datatext="el1763500735036" class="mdspan-comment">Human sexuality has
    been mediated</mdspan> by technology pretty much since the dawn of time. Almost
    as soon as the printing press was invented, erotica was being published. Photography
    was used for erotic purposes with glee by the Victorians. And, we all know how
    much the internet has influenced modern sexual culture.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763500735036" class="mdspan-comment">人类性欲自时间伊始便在很大程度上受到技术的调节。</mdspan>几乎自从印刷术被发明出来，色情作品就开始出版。维多利亚时代的人们愉快地用摄影来达到色情目的。我们都知道互联网对现代性文化产生了多大的影响。
- en: Now that we’re grappling with the effect of AI on various sectors of society,
    what does that mean for sexuality? How are young people learning about sexuality,
    and how are people engaging in sexual activity, with AI as part of the picture?
    Some researchers are exploring these questions, but my research has indicated
    that there’s a bit of a shortage of analysis examining the real impacts of this
    technology on how people think and behave sexually. This is a huge topic, of course,
    so for today, I’d like to dig into the subject in two specific and related areas: **distribution
    of information **and** consent.**
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们正在应对AI对社会各个领域的影响，这对性欲意味着什么？年轻人是如何学习性知识的，人们又是如何参与性活动的，AI作为其中的一部分？一些研究人员正在探索这些问题，但我的研究表明，关于这项技术对人们性思维和行为实际影响的分析还略有不足。当然，这是一个巨大的话题，所以今天，我想深入探讨两个具体且相关的话题：**信息分布**和**同意**。
- en: Before we dive in, however, I’ll set the scene. What our general culture calls
    generative AI, which is what I will focus on here, involves software powered by
    machine learning algorithms that can create text, images, video, and audio that
    are synthetic, but which are difficult if not impossible to distinguish from organic
    content created by human beings. This content is so similar to organic content
    because the machine learning models are fed vast quantities of human-generated
    content during the training process. Because of the immense volumes of content
    required to train these models, all corners of the internet are vacuumed up to
    include in the training data, and this inevitably includes some content related
    to sexuality, in one way or another.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在我们深入探讨之前，我会设定场景。我们通常所说的生成式AI，也就是我将在此关注的领域，涉及由机器学习算法驱动的软件，可以创建合成文本、图像、视频和音频，这些内容与人类创造的有机内容难以区分，甚至不可能区分。这些内容之所以如此相似，是因为机器学习模型在训练过程中被大量的人类生成内容所喂养。由于训练这些模型所需的巨大内容量，互联网的各个角落都被吸纳入训练数据中，这不可避免地包括一些与性有关的内容，以某种方式或另一种方式。
- en: In some ways, we wouldn’t want to change this — if we want LLMs to have a thorough
    mapping of the semantics of English, we can’t just cut out certain areas of the
    language as we actually use it. Similarly, image and video generators are going
    to have exposure to nudity and sexuality because these are a significant portion
    of the images and videos people create and put online. This naturally creates
    challenges, because this content will then be reflected in model outputs from
    time to time. We implement guardrails, reinforcement learning, and prompt engineering
    to try and control this, but in the end generative AI is broadly as good at creating
    sexually expressive or explicit content as any other kind of content.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些方面，我们可能不想改变这种状况——如果我们希望大型语言模型能够彻底映射英语的语义，我们不能仅仅剔除我们实际使用的语言中的某些部分。同样，图像和视频生成器将不可避免地接触到裸露和性内容，因为这些是人们创建并上传到网上的图像和视频的重要组成部分。这自然会产生挑战，因为这种内容有时会反映在模型输出中。我们实施护栏、强化学习和提示工程来尝试控制这一点，但最终，生成式AI在创造具有性表达或明确内容方面与其他类型的内容一样出色。
- en: '[Nicola Döring and colleagues](https://link.springer.com/article/10.1007/s11930-024-00397-y) did
    a substantial literature review of studies addressing how usage of AI intersects
    with sexuality, and found users have four main ways of interacting with AI that
    have sexual components: Sexual Information and Education; Sexual Counseling and
    Therapy; Sexual and Romantic Relationships; and Erotica and Pornography. This
    intuitively probably sounds right to most of us. We’ve heard of at least a few
    of these sorts of phenomena relating to AI, whether in movies, TV, social media,
    or news content. Sexually explicit interaction is generally not allowed by mainstream
    LLM providers, but universally preventing it is impossible. Assorted other generative
    AI products as well as self-hosted models also make generating sexual content
    quite easy, and [OpenAI has announced its intentions to go into the erotica/pornography
    business](https://www.cnbc.com/2025/10/15/erotica-coming-to-chatgpt-this-year-says-openai-ceo-sam-altman.html).
    Sexual content from generative AI has a tremendous amount of demand, so it appears
    that the market will provide it, one way or another.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '[尼古拉·多林及其同事](https://link.springer.com/article/10.1007/s11930-024-00397-y)
    对研究AI与性别交叉使用的文献进行了大量综述，并发现用户与AI互动时有四种主要方式具有性成分：性信息与教育；性咨询与治疗；性和浪漫关系；以及色情和色情作品。这在我们大多数人看来可能直觉上是正确的。我们至少听说过一些与AI相关的此类现象，无论是在电影、电视、社交媒体还是新闻内容中。性内容交互通常不被主流LLM提供商允许，但普遍禁止是不可能的。各种其他生成式AI产品以及自托管模型也使得生成性内容变得相当容易，[OpenAI已宣布其进入色情/色情业务的意图](https://www.cnbc.com/2025/10/15/erotica-coming-to-chatgpt-this-year-says-openai-ceo-sam-altman.html)。生成式AI中的性内容需求巨大，因此市场似乎会以某种方式提供它。'
- en: It’s important that we remember that generative AI tools have no concept of
    sexual explicitness other than what we impart through the training process. Taboos
    and social norms are only part of the model insofar as human beings apply them
    in reinforcement learning or provide them in the training data. To the machine
    learning model, a sexually explicit image is the same as any other, and words
    used in erotica have meaning only in their semantic relationships to other words.
    As with many areas of AI, sexuality gets its meaning and social interpretations
    from human beings, not from the models.
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们需要记住，生成式AI工具除了我们在训练过程中传授的内容外，没有性暴露的概念。禁忌和社会规范只有在人类在强化学习中应用它们或在训练数据中提供它们时，才成为模型的一部分。对于机器学习模型来说，性暴露的图像与其他任何图像一样，用于色情中的词语只有在它们与其他词语的语义关系中才有意义。正如AI的许多领域一样，性别的意义和社会解释来自人类，而不是来自模型。
- en: Having sexual content available through generative AI is having significant
    effects on our culture, and it’s important for us to think about what that looks
    like. We want to protect the safety of individuals and groups and preserve people’s
    rights and freedoms of expression, and the first step to doing this is understanding
    the current state of affairs.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 通过生成式AI提供性内容对我们的文化产生了重大影响，我们思考其具体表现是很重要的。我们希望保护个人和群体的安全，并保护人们的表达权利和自由，而理解当前形势是这一步骤的第一步。
- en: Information Sharing, Learning, and Education
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 信息共享、学习和教育
- en: Where do we learn about sexuality? We learn from observing the world around
    us, from asking questions, and from our own exploration and experiences. So, with
    generative AI starting to take on roles in various areas of life, what is the
    impact on what and how we learn about sexuality in particular?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在哪里学习关于性别的知识？我们从观察周围的世界、提问以及我们自己的探索和经验中学习。因此，随着生成式AI开始在生活的各个领域扮演角色，它对我们如何以及学习性别的具体影响是什么？
- en: In the most formal sense, generative AI is already playing a meaningful role
    in informal and private sex education, just as performing google searches and
    browsing websites did in the era before. Döring et al. noted that their research
    found that seeking out sexual health or educational information about sexuality
    online is quite common, for reasons that we can probably all relate to — convenience,
    anonymity, avoidance of judgment. Reliable statistics on how many people are using
    LLMs for this same kind of exploration is hard to come by, but it is reasonable
    to expect that the same advantages apply and would make it an appealing way to
    learn.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在最正式的意义上，生成式AI已经在非正式和私人的性教育中扮演着有意义的角色，就像在之前的时代里进行谷歌搜索和浏览网站一样。Döring等人指出，他们的研究发现，在线寻求性健康或性教育信息相当普遍，原因可能是我们都能理解的——方便、匿名、避免评判。关于有多少人使用LLM进行这种探索的可靠统计数据很难找到，但可以合理地预期，同样的优势也会使其成为一种吸引人的学习方式。
- en: So, if this is happening, should we care? Is it particularly any different to
    learn about sexuality from google searches versus generative AI? Both sources
    have accuracy issues (anyone can put up content on the internet, after all), so
    what differentiates generative AI, if anything?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，如果这种情况发生，我们应该关心吗？从谷歌搜索与生成式AI中学习性知识有什么特别的不同吗？两种来源都存在准确性问题（毕竟，任何人都可以在互联网上发布内容），那么如果有的话，生成式AI有什么区别？
- en: LLM as Source
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM作为信息来源
- en: When we use LLMs to find out information, the presentation of that content is
    quite different from when we do basic web searches. The results are presented
    in authoritative tone, and sourcing is often obscured unless we intentionally
    ask for it and vet it ourselves. As a result, what is being called “AI literacy”
    becomes important to effectively interpret and validate what the LLM is telling
    us.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们使用LLM来获取信息时，内容的呈现方式与进行基本网络搜索时的呈现方式大不相同。结果以权威的语气呈现，除非我们有意要求并自行核实，否则来源通常会被隐藏。因此，所谓的“AI素养”对于有效地解释和验证LLM告诉我们的内容变得非常重要。
- en: If the individual using the LLM has this sophistication, however, scholars have
    found that [basic factual information about sexual health](https://journals.sagepub.com/doi/full/10.1177/26318318251323714) is
    generally available from mainstream LLM offerings. The limited studies that have
    been done to date don’t find the quality or accuracy of sexual information from
    LLMs to be worse than that retrieved in general web searches, according to Döring
    et al. If this is the case, young people seeking important information to keep
    themselves safe and healthy in their sexual expression may have a valuable tool
    in generative AI. Because the LLM is more anonymous and interactive, users can
    ask the questions they really want to have answered and not be held back by fears
    of stigma or shame. But hallucinations continue to be an unavoidable problem with
    LLMs, resulting in occasional false information being served, so user skepticism
    and sophistication is important.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果使用LLM的个人具有这种复杂性，学者们发现，[关于性健康的基本事实信息](https://journals.sagepub.com/doi/full/10.1177/26318318251323714)通常可以从主流LLM提供的内容中获得。根据Döring等人的说法，到目前为止所进行的有限研究并没有发现LLM提供的性信息质量或准确性比一般网络搜索得到的信息更差。如果情况如此，寻求重要信息以保持自己在性表达中的安全和健康，年轻人可能会在生成式AI中找到一个有价值的工具。因为LLM更加匿名和互动，用户可以提出他们真正想要得到答案的问题，而不会被耻辱或羞愧的恐惧所阻碍。但幻觉仍然是LLM的一个不可避免的问题，导致偶尔提供错误信息，因此用户的怀疑和复杂性很重要。
- en: Content Bias
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内容偏见
- en: We must remember, however, that the perspective presented by the LLM is formed
    by the training processes used by the provider. That means that the company that
    created the LLM is embedding cultural norms and attitudes in the model, whether
    they really mean to or not. Reinforcement learning, a key part of training generative
    AI models, requires human users to make decisions about whether outputs are acceptable
    or not, and they are necessarily going to bring their own beliefs and attitudes
    to bear on those decisions, even implictly. When it comes to questions that are
    more of opinion, rather than fact, we are at the mercy of the choices made by
    the companies that created and provide access to LLMs. If these companies incentivize
    and reward more progressive or open-minded sexual attitudes during the reinforcement
    learning stages, then we can expect that to be reflected in LLM behavior with
    users. However, researchers have found that this means LLM responses to sexual
    questions can result in minimizing or [devaluing sexual expression](https://aclanthology.org/2025.queerinai-main.3/) that
    is not “mainstream”, including LGBTQ+ perspectives.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们必须记住，LLM所呈现的视角是由提供商使用的训练过程形成的。这意味着创建LLM的公司正在将文化规范和态度嵌入到模型中，无论他们是否真的有意这样做。强化学习是训练生成人工智能模型的关键部分，它要求人类用户决定输出是否可接受，他们必然会在这些决策中带入自己的信念和态度，即使是无意识的。当涉及到更多是观点而不是事实的问题时，我们处于创建和提供LLM访问权限的公司所做选择的
    mercy。如果这些公司在强化学习阶段激励和奖励更进步或更开放性态度，那么我们可以期待这种态度会在LLM与用户互动的行为中得到反映。然而，研究人员发现，这意味着LLM对性问题的回答可能导致最小化或[贬低非主流性表达](https://aclanthology.org/2025.queerinai-main.3/)，包括LGBTQ+观点。
- en: In some cases, this takes the form of LLMs not being permitted to answer questions
    about sexuality or related topics, a concept called Refusal. LLM providers might
    simply ban the discussion of such topics from their product, which leaves the
    user looking for reliable information with nothing. But it also can insinuate
    to the user that the topic of sexuality is taboo, shameful, or bad — otherwise,
    why would it be banned? This puts the LLM provider in a difficult position, unquestionably
    — whose moral standards are they meant to follow? What kinds of sexual health
    questions should the chatbot respond to, and what’s the boundary? By entrusting
    sexual education to these kinds of tools, we’re accepting the opaque standard
    these companies choose, without actually knowing what it is or how it was defined.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，这表现为大型语言模型（LLM）不允许回答关于性或相关主题的问题，这被称为拒绝。LLM提供商可能会简单地禁止在其产品中讨论这类话题，这导致用户在找不到可靠信息的情况下四处寻找。但这也可能向用户暗示，性话题是禁忌的、羞耻的或不好的——否则，为什么会被禁止？这无疑使LLM提供商处于一个困难的境地——他们应该遵循什么样的道德标准？聊天机器人应该回答哪些性健康问题，界限在哪里？通过将这些工具委托给性教育，我们接受了这些公司选择的不透明标准，而实际上我们并不知道它是什么或它是如何定义的。
- en: Visual Content
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 视觉内容
- en: But as I mentioned earlier, we don’t just learn about sexuality from asking
    questions and seeking facts. We learn from experience and observation as well.
    In this context, generative AI tools that create images and video become incredibly
    important for how young people understand bodies and sexuality. [Döring et al.](https://link.springer.com/article/10.1007/s11930-024-00397-y) found
    a significant amount of implicit bias in the image generation offerings when tested.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 但如我之前提到的，我们不仅通过提问和寻求事实来了解性。我们也从经验和观察中学习。在这种情况下，生成图像和视频的人工智能工具对于年轻人理解身体和性至关重要。[Döring等人](https://link.springer.com/article/10.1007/s11930-024-00397-y)在测试中发现，图像生成服务中存在大量的隐含偏见。
- en: '*“One strand of research on AI-generated information points to the risk that
    text- and image-generating AI tools will reinstate sexist, racist, ageist, ableist,
    heteronormative or other problematic stereotypes that are inscribed in the training
    data fed into the AI models. Such biases are easy to demonstrate such as when
    AI tools reaffirm cultural norms and stereotypes in their text and image outputs:
    Simply asked to create an image of “a couple” an AI image generator such as Midjourney
    (by Midjourney Inc.) will first present a young, able-bodied, normatively attractive,
    white, mixed-sex couple where the woman’s appearance is more sexualized than that
    of the man (as tested by the authors with Midjourney Alpha in June 2024).” — *[https://link.springer.com/article/10.1007/s11930-024-00397-y](https://link.springer.com/article/10.1007/s11930-024-00397-y)'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“关于AI生成信息的研究中，有一项研究指出，文本和图像生成AI工具可能会重新引入AI模型训练数据中嵌入的性别歧视、种族歧视、年龄歧视、残疾歧视、异性恋规范或其他有问题的刻板印象。这种偏见很容易被证明，例如当AI工具在它们的文本和图像输出中重申文化规范和刻板印象时：简单地要求创建一个“情侣”的图像，Midjourney（由Midjourney
    Inc.提供）的AI图像生成器首先会展示一个年轻、身体健康、符合规范吸引力的白人、混合性别的情侣，其中女性的外观比男性更性感（作者于2024年6月使用Midjourney
    Alpha进行了测试）。” — [https://link.springer.com/article/10.1007/s11930-024-00397-y](https://link.springer.com/article/10.1007/s11930-024-00397-y)'
- en: As with the text generators, more sophisticated users can tune their prompting
    and select for the kinds of images they want to see, but if a user is not sure
    what they are looking for, or isn’t that skilled, this sort of interaction serves
    to further instill biases.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 就像文本生成器一样，更熟练的用户可以调整他们的提示并选择他们想要看到的图像类型，但如果用户不确定他们在寻找什么，或者不够熟练，这种交互会进一步加深偏见。
- en: The Body
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 身体
- en: As an aside, it’s worth considering how AI-generated images may shape our understanding
    of bodies, in a sexual context or otherwise. There have been threads of conversation
    in our culture for decades about how internet-accessible pornography has distorted
    young people’s beliefs and expectations about how bodies should look and how sexual
    behavior should work. I think most analysis of those questions really isn’t that
    different whether you’re talking about the internet generally or generative AI.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 作为旁白，值得考虑AI生成的图像可能如何塑造我们对身体的理解，无论是在性方面还是其他方面。几十年来，我们的文化中一直有关于互联网可访问的色情如何扭曲年轻人对身体外观和性行为应该如何运作的信念和期望的讨论。我认为，无论你是在谈论互联网总体上还是在谈论生成式AI，对这些问题的分析实际上并没有太大的不同。
- en: The one area that does seem different, however, is in how generative AI can
    produce images and videos that appear photorealistic but display people in physically
    impossible or near-impossible ways. It takes unrealistic beauty standards to a
    new level. This can take the form of AI-based filters on real images, severely
    distorting the shapes and appearances of real people, or it can be products that
    create images or videos from whole cloth. We have moved past a time when airbrushing
    was the major concern, which would make small distortions of otherwise real bodies,
    into a time when the physically impossible or near-impossible is being presented
    to users as “normal” or the expected physical standard. For boys and girls alike,
    this creates a heavily distorted perspective on how our bodies and those of our
    intimate partners should appear and behave. As [I’ve written about before](https://www.stephaniekirmer.com/writing/theculturalimpactofaigeneratedcontentpart1/),
    our increasing inability to tell synthetic from organic content has significantly
    damaging potential.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，似乎有一个领域是不同的，那就是生成式AI如何能够产生看似逼真的图像和视频，但展示的人物却以物理上不可能或几乎不可能的方式出现。这把不切实际的美学标准提升到了一个新的高度。这可能表现为基于AI的真实图像过滤器，严重扭曲了真实人物的形状和外观，或者可能是从头开始创建图像或视频的产品。我们已经超越了喷枪修图成为主要担忧的时代，那时对原本真实身体的微小扭曲，进入了一个将物理上不可能或几乎不可能的事物展示给用户作为“正常”或预期身体标准的时代。对于男孩和女孩来说，这都造成了我们对自身和亲密伴侣的身体应该如何呈现和行为的严重扭曲视角。正如我之前所写的（[https://www.stephaniekirmer.com/writing/theculturalimpactofaigeneratedcontentpart1/](https://www.stephaniekirmer.com/writing/theculturalimpactofaigeneratedcontentpart1/)），我们越来越难以区分合成内容和有机内容，这具有显著的破坏性潜力。
- en: On that note, I’d also like to discuss a specific area where the norms and principles
    young people learn are profoundly important to ensuring safe, responsible sexual
    engagement throughout people’s lives — consent.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个话题上，我还想讨论一个特定领域，即年轻人所学习的规范和原则对于确保人们一生中都能进行安全、负责任的性行为至关重要——那就是同意。
- en: Consent
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 同意
- en: Consent is a tremendously important concept in our understanding of sexuality.
    This means, in short, that all parties involved in any kind of sexual expression
    or behavior readily, affirmatively agree throughout, and are under no undue coercion
    or manipulation. When we talk about sexual expression/behavior, this can include
    the creation or sharing of sexually explicit imagery of these parties, as well
    as physical interactions.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 同意是我们理解性欲的一个重要概念。简而言之，这意味着在任何形式的性表达或行为中，所有相关方都应自愿、明确地同意，并且不受任何不当的胁迫或操纵。当我们谈论性表达/行为时，这可以包括创建或分享这些当事人的性明确图像，以及身体互动。
- en: 'When it comes to generative AI, this spawns several questions, such as:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到生成式AI时，这引发了一些问题，例如：
- en: If a real person’s image or likeness is used or produced by generative AI for
    sexual content, how do we know if that person consented?
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果生成式AI用于或制作了真实人物的图像或肖像用于色情内容，我们如何知道那个人是否同意了？
- en: If that person didn’t consent to being the subject of sexual content, what are
    their rights and what are the obligations of the generative AI company and the
    generative AI user? And what are those obligations if they did consent to creating
    sexual content, but not in the generative AI context?
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果那个人没有同意成为色情内容的主题，他们的权利是什么？生成式AI公司和生成式AI用户的义务是什么？如果他们同意创建色情内容，但不是在生成式AI的背景下，这些义务又是什么？
- en: How does it affect generative AI users’ understanding of consent when they can
    so easily acquire this kind of content through generative AI, without ever directly
    interacting with the individual/s?
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当他们可以通过生成式AI轻松获取这类内容，而无需直接与个人/互动时，这如何影响生成式AI用户对同意的理解？
- en: What makes this different from older technologies, like airbrushing or photo
    editing? It’s a matter of degrees, in some ways. Deepfakes have existed since
    well before generative AI, where video editing could be applied to put someone
    else’s face into a porn scene or nude photo, but the ease, affordability, and
    accessibility of this technology has changed dramatically with the dawn of AI.
    Also, the increasing inability for average viewers to detect this artificiality
    is significant because knowing what is “real” is harder and harder.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这与老技术，如空气刷或照片编辑有何不同？在某种程度上，这是一个程度的问题。深度伪造技术早在生成式AI之前就已经存在，可以将他人的面孔放入色情场景或裸照中，但随着AI的兴起，这种技术的便捷性、可负担性和可访问性发生了巨大变化。此外，普通观众越来越难以察觉这种人工性，知道什么是“真实”的变得越来越困难。
- en: Copyright and IP
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 版权和知识产权
- en: This topic has a lot of common threads with copyright and intellectual property
    questions. Our society is already starting to grapple with questions of ownership
    of one’s own likeness, and what boundaries we are entitled to set on how our image
    is used. By and large, generative AI products have little to no effective restriction
    on how the images of public figures can be rendered. There are some perfunctory
    attempts to prevent image/video/audio generators from accepting explicit requests
    to create images (sexual or otherwise) of named public figures, but these are
    easily outwitted, and it seems to be of relatively minimal concern to generative
    AI companies, outside of complaints by large corporate interests. [Scarlett Johansson
    has learned this from experience](https://www.georgetown.edu/news/ask-a-professor-openai-v-scarlett-johansson/),
    and the recently released [Sora 2 generates endless deepfake videos](https://www.yahoo.com/news/articles/watchdog-group-public-citizen-demands-160309618.html?guccounter=1&guce_referrer=aHR0cHM6Ly9kdWNrZHVja2dvLmNvbS8&guce_referrer_sig=AQAAAKMoRsSOIfpE9cbK8yQ2umpwcTGSLF2fltyfuNMjGNzV6MS_Mm0ELddYEcFKx3E91Utoy7JxmJy3Qmne89NbJmVfK7hybcwUWGZ26fSXVOtagecb9a7aKU_oYAPP6az0bmkNUlNk9kDeKQAchr2w1NTfiAL1-fTwbV0nsd21GwDL) of
    public figures from throughout history.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这个话题与版权和知识产权问题有很多共同之处。我们的社会已经开始处理关于个人肖像权的问题，以及我们有权设定哪些界限来决定我们的形象如何被使用。总的来说，生成式AI产品对公众人物图像的呈现几乎没有或没有有效的限制。有一些尝试防止图像/视频/音频生成器接受创建图像（性或其他）的明确请求，但这些很容易被规避，而且似乎对生成式AI公司来说相对微不足道，除了大型企业利益的投诉。斯嘉丽·约翰逊从经验中了解到这一点（[Scarlett
    Johansson has learned this from experience](https://www.georgetown.edu/news/ask-a-professor-openai-v-scarlett-johansson/)），最近发布的[Sora
    2生成无尽的深度伪造视频](https://www.yahoo.com/news/articles/watchdog-group-public-citizen-demands-160309618.html?guccounter=1&guce_referrer=aHR0cHM6Ly9kdWNrZHVja2dvLmNvbS8&guce_referrer_sig=AQAAAKMoRsSOIfpE9cbK8yQ2umpwcTGSLF2fltyfuNMjGNzV6MS_Mm0ELddYEcFKx3E91Utoy7JxmJy3Qmne89NbJmVfK7hybcwUWGZ26fSXVOtagecb9a7aKU_oYAPP6az0bmkNUlNk9kDeKQAchr2w1NTfiAL1-fTwbV0nsd21GwDL)展示了历史上公众人物的图像。
- en: This applies to people in the sex industry as well. Even if people are involved
    in sex work or creating erotica or pornography willingly, this doesn’t mean they
    are consenting to their work being usurped for generative AI creation — this is
    really no different from the issues of copyright and intellectual property being
    posed by authors, actors, and artists in mainstream sectors. Just because people
    create sexual content, this doesn’t make the claim to their rights any less valid,
    despite social stigma.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这也适用于性产业中的人。即使人们自愿参与性工作或创作色情或色情内容，这并不意味着他们同意他们的工作被用于生成式AI创作——这实际上与主流行业中的作者、演员和艺术家所面临的版权和知识产权问题并无二致。仅仅因为人们创作了性内容，这并不意味着他们对权利的主张就变得不那么有效，尽管社会存在耻辱感。
- en: I don’t want to portray this as an indictment of all sexual content, or necessarily
    even sexual content generated by AI. There’s room for debate about when and how
    artificially generated pornography can be ethical, and certainly I think when
    consenting adult performers produce pornography organically there’s nothing wrong
    with that on the face of it. But these issues of consent and individual rights
    have not been adequately addressed, and these should make us all very nervous.
    Many people may not think much about the rights of creators in this space, but
    how we treat their claims legally may create precedents that cascade down to many
    other scenarios.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想把这描绘成对所有性内容的指控，或者甚至不一定是对由AI生成的性内容的指控。关于何时以及如何使人工生成的色情变得道德，存在争议的空间，并且我确实认为当同意的成年表演者自然地制作色情时，表面上并没有什么问题。但是，这些问题关于同意和个人权利还没有得到充分解决，这应该让我们所有人都感到非常紧张。许多人可能不会太多考虑这个空间中创作者的权利，但我们如何从法律上处理他们的主张可能会为许多其他场景创造先例。
- en: Sexual Abuse
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性虐待
- en: However, in the space of sexuality, we must also consider wholly nonconsensually
    created content, which can cause tremendous harm. Instead of calling things “revenge
    porn”, scholars are beginning to use the term “AI-generated image-based sexual
    abuse” to refer to cases where people’s likenesses are used without their permission
    to generate sexual content, and I think this much better articulates the damage
    that can be done by this material. Considering this behavior sexual abuse rightly
    forces us to think more about the experiences of the victims. While image manipulation
    and fakery has always been somewhat possible, the latest generative AI makes this
    more achievable, more accessible, and cheaper than ever before, so it makes performing
    this sort of sexual abuse much more convenient to abusers. It’s important to note
    that the degree or severity of this abuse is not necessarily defined by the publicness
    or damage to the victim’s reputation — it’s not important whether people believe
    that the deepfake or sexual content is real. Victims can still feel deeply violated
    and traumatized by this material being created about them, regardless of how others
    feel about it.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在性领域，我们还必须考虑完全非自愿创作的内容，这可能会造成巨大的伤害。学者们开始使用“基于AI生成的图像性虐待”这一术语来指代人们未经许可使用他们的形象来生成性内容的情况，我认为这更好地阐述了这种材料可能造成的损害。将这种行为视为性虐待正确地迫使我们更多地思考受害者的经历。虽然图像操纵和伪造一直是有可能的，但最新的生成式AI使得这变得更加可行、更容易获取且比以往任何时候都便宜，因此它使得施虐者进行这种性虐待变得更加方便。重要的是要注意，这种虐待的程度或严重性并不一定由公众性或对受害者声誉的损害来定义——人们是否相信深度伪造或性内容是真实的并不重要。无论他人如何看待它，受害者仍然可能因为关于他们的材料被创造而感到深深被侵犯和创伤。
- en: Major LLM providers have, to date, held the line on sexual text content being
    produced by their products ([to greater or lesser degrees of success, as Lai 2025
    found](https://asistdl.onlinelibrary.wiley.com/doi/abs/10.1002/pra2.1326)), but
    OpenAI’s impending move into erotica means that this will be changing. While text
    communication has less potential for seriously damaging abuse than visual content,
    ChatGPT does engage in some multimodal content generation, and we can still imagine
    scenarios where a user instructs an LLM to produce erotica in the voice or style
    of real people, and the real people being mimicked could understandably find this
    upsetting. When OpenAI announced the move, [they discussed some safety issues
    but these were entirely considerations about the users](https://www.psychologytoday.com/us/blog/becoming-technosexual/202511/open-ai-is-putting-the-x-in-xmas-this-december) (mental
    health issues, for example) and did not speak to the safety of nonconsenting individuals
    whose likenesses could be involved. I think this is a major oversight that needs
    more attention if we can possibly hope to make such a product offering safe.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，主要的大型语言模型（LLM）提供商都坚持其产品生产的性文本内容（如Lai 2025所发现，成功程度有所不同），但OpenAI即将进入色情内容领域意味着这将发生变化。虽然文本交流在严重损害滥用方面比视觉内容潜力较小，但ChatGPT确实参与了一些多模态内容生成，我们仍然可以想象出用户指示LLM以真实人的声音或风格制作色情内容的场景，被模仿的真实人可能会感到不安。当OpenAI宣布这一举措时，[他们讨论了一些安全问题，但这些完全是关于用户的考虑](https://www.psychologytoday.com/us/blog/becoming-technosexual/202511/open-ai-is-putting-the-x-in-xmas-this-december)（例如心理健康问题），并没有提及可能涉及的非同意个体的安全。我认为这是一个需要更多关注的重大疏忽，如果我们希望使这样的产品提供变得安全的话。
- en: Learning about Consent
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 了解同意的重要性
- en: Beyond the immediate damage to victims of sexual abuse and the IP and livelihood
    harms to creators whose content is used for these applications, I think it’s also
    important to consider what lessons users absorb from generative AI being able
    to create likenesses at will, particularly in sexual contexts. When we are given
    the ability to so readily create someone else’s image in whatever form, whether
    it’s a historical figure pitching someone’s software product, or that same historical
    figure being represented in a sexual situation, the inherent lesson is that that
    person’s likeness is fair game. Legal nuances aside (which do need to be taken
    into account) we’re specifically asserting that getting someone’s approval to
    engage with them sexually is not important, at least when digital technology is
    involved.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 除了对性侵犯受害者造成的直接伤害以及对内容被用于这些应用而遭受的知识产权和生计损害外，我认为考虑用户从能够随意创造他人形象的能力中吸取的教训也很重要，尤其是在性情境中。当我们被赋予如此轻易地以任何形式创造他人形象的能力时，无论是历史人物推销某人的软件产品，还是那个历史人物在性情境中的表现，固有的教训是那个人的形象是公平的游戏。抛开法律上的细微差别（这确实需要考虑）我们特别断言，获得某人同意以进行性接触并不重要，至少当涉及数字技术时。
- en: Imagine how young people are receiving the implicit messages from this. Kids
    know they will get in trouble for sharing other people’s nudes, sometimes with
    severe legal consequences, but at the same time, there’s an [assortment](https://www.cbsnews.com/news/ai-nudify-sites-payment-redirects-60-minutes/) [of
    apps](https://www.bellingcat.com/news/americas/2025/06/18/meta-crushai-crushmate-deepfake-nudify-apps/) letting
    them create fake ones, even of real people, with a click of a button. How do we
    explain the difference and help young people learn about the real harm they may
    be causing even just sitting in front of a screen alone? We have to start thinking
    about our bodily autonomy in the digital space as well as the physical space,
    because so much of our lives are carried out in the digital context. Deepfakes
    are not inherently less traumatizing than sharing of organic nude photos, so why
    aren’t we talking about this functionality as a social risk kids need to be educated
    on? The lessons we want young people to learn about the importance of consent
    are pretty directly contradicted by the generative AI sphere’s approach to sexual
    content.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下年轻人是如何接收这些隐含信息的。孩子们知道他们会因为分享他人的裸照而惹上麻烦，有时会有严重的法律后果，但与此同时，有一些应用程序允许他们点击一下按钮就创建假裸照，甚至可以是真实的人。我们如何解释这种差异并帮助年轻人了解他们可能仅仅坐在屏幕前就会造成的真实伤害？我们必须开始思考在数字空间以及物理空间中我们的身体自主权，因为我们的许多生活都是在数字环境中进行的。深度伪造并不比分享有机裸照本身更少创伤性，那么为什么我们不讨论这个功能作为社会风险，孩子们需要接受教育呢？我们希望年轻人学习的关于同意重要性的教训与生成式AI领域对性内容的处理方法直接相矛盾。
- en: Conclusion
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: You might reasonably end this asking, “So, what do we do?” and that’s a really
    hard question. I don’t believe we can effectively prevent generative AI products
    from producing sexual content, because the training data just includes so much
    of that material — this is reflective of our actual society. Also, there’s a clear
    market for sexual content from generative AI and some companies will always arise
    to fill that need. I also don’t think LLMs should forbid responding to sexual
    questions, where people may be looking for information to help understand sexuality,
    human development, sexual health, and safety, because this is so important for
    everyone, particularly youth, to have access to.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会合理地结束这个讨论，问道，“那么，我们该怎么办？”这是一个非常困难的问题。我不相信我们可以有效地阻止生成式AI产品产生性内容，因为训练数据中包含如此多的这种材料——这反映了我们实际的社会状况。此外，生成式AI的性内容市场是明确的，一些公司总是会崛起来满足这一需求。我也不认为大型语言模型应该禁止回答性相关的问题，因为人们可能正在寻找信息以帮助理解性、人类发展、性健康和安全，因为这对每个人，尤其是年轻人来说，获取这些信息非常重要。
- en: But at the same time, the hazards around sexual abuse and nonconsensual sexual
    content are serious, as are the unrealistic expectations and physical standards
    being set implicitly. Our legal systems have proven pretty inept at dealing with
    internet crime over the past decades, and this image-based sexual abuse is no
    exception. Prevention requires education, not just about the facts and the law,
    but about the impact that deepfake sexual abuse can have. We also need to give
    counter-narratives to the distortions of physical form that generative AI creates,
    if we want young people to have healthy relationships with their own bodies and
    with partners.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 但与此同时，性虐待和非自愿性内容的风险是严重的，隐含的期望和不切实际的物理标准也是如此。我们的法律体系在过去几十年中处理网络犯罪的能力证明相当无能，基于图像的性虐待也不例外。预防需要教育，不仅关于事实和法律，还关于深度伪造性虐待可能产生的影响。如果我们希望年轻人能够与自己的身体和伴侣建立健康的关系，我们还需要对生成式AI创造的物理形态扭曲提供反叙事。
- en: Beyond the broad social responsibilities of all of us to participate in the
    project of effectively educating youth, it’s the responsibility of generative
    AI product developers to consider risk and harm mitigation as much as they consider
    profit goals or user engagement targets. Unfortunately, it doesn’t seem like many
    are doing so today, and that’s a shameful failure of people in our field.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 除了我们所有人参与有效教育青年的广泛社会责任之外，生成式AI产品开发者有责任在考虑利润目标或用户参与目标的同时，考虑风险和伤害的缓解。遗憾的是，今天似乎很少有人这样做，这是我们领域人们的可耻失败。
- en: In truth, the sexual nature of this topic is less important than understanding
    the social norms we accept, our responsibilities to keep vulnerable people safe,
    and balancing this with protecting the rights and freedoms of regular people to
    engage in responsible exploration and behavior. It’s not only a question of how
    we adults carry out our lives, but how young people have opportunities to learn
    and develop in ways that are safe and respectful of others.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，这个话题的性本质不如理解我们接受的社会规范、我们保护易受伤害人群安全的责任，以及平衡这一点与保护普通人的权利和自由参与负责任探索和行为的重要性。这不仅是一个关于我们成年人如何生活的问题，也是年轻人如何有机会以安全和尊重他人的方式学习和发展的一个问题。
- en: Generative AI can be a tool for good, but the risks it creates need to be acknowledged.
    It’s important to recognize the small and large ways adding new technology to
    our cultural space affects how we think and act in our daily lives. By understanding
    these circumstances, we equip ourselves better to respond to such changes and
    shape the society we want to have.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能可以是一个好工具，但我们需要认识到它带来的风险。认识到将新技术添加到我们的文化空间中的大小影响，对我们日常生活中的思考和行动方式至关重要。通过理解这些情况，我们更好地装备自己以应对这些变化，塑造我们想要的社会。
- en: '* * *'
  id: totrans-50
  prefs: []
