- en: 'Agentic AI 102: Guardrails and Agent Evaluation'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/agentic-ai-102-guardrails-and-agent-evaluation/](https://towardsdatascience.com/agentic-ai-102-guardrails-and-agent-evaluation/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1747422439456" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In the first post of this series ([Agentic AI 101: Starting Your Journey Building
    AI Agents](https://towardsdatascience.com/agentic-ai-101-starting-your-journey-building-ai-agents/)),
    we talked about the fundamentals of creating AI Agents and introduced concepts
    like reasoning, memory, and tools.'
  prefs: []
  type: TYPE_NORMAL
- en: Of course, that first post touched only the surface of this new area of the
    data industry. There is so much more that can be done, and we are going to learn
    more along the way in this series.
  prefs: []
  type: TYPE_NORMAL
- en: So, it is time to take one step further.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this post, we will cover three topics:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Guardrails**: these are safe blocks that prevent a Large Language Model (LLM)
    from responding about some topics.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Agent Evaluation**: Have you ever thought about how accurate the responses
    from LLM are? I bet you did. So we will see the main ways to measure that.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Monitoring**: We will also learn about the built-in monitoring app in Agno’s
    framework.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We shall begin now.
  prefs: []
  type: TYPE_NORMAL
- en: Guardrails
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our first topic is the simplest, in my opinion. Guardrails are rules that will
    keep an AI agent from responding to a given topic or list of topics.
  prefs: []
  type: TYPE_NORMAL
- en: I believe there is a good chance that you have ever asked something to ChatGPT
    or Gemini and received a response like “I can’t talk about this topic”, or “Please
    consult a professional specialist”, something like that. Usually, that occurs
    with sensitive topics like health advice, psychological conditions, or financial
    advice.
  prefs: []
  type: TYPE_NORMAL
- en: Those blocks are safeguards to prevent people from hurting themselves, harming
    their health, or their pockets. As we know, LLMs are trained on massive amounts
    of text, ergo inheriting a lot of bad content with it, which could easily lead
    to bad advice in those areas for people. And I didn’t even mention hallucinations!
  prefs: []
  type: TYPE_NORMAL
- en: Think about how many stories there are of people who lost money by following
    investment tips from online forums. Or how many people took the wrong medicine
    because they *read about it on the internet*.
  prefs: []
  type: TYPE_NORMAL
- en: Well, I guess you got the point. We must prevent our agents from talking about
    certain topics or taking certain actions. For that, we will use guardrails.
  prefs: []
  type: TYPE_NORMAL
- en: The best framework I found to impose those blocks is Guardrails AI [[1]](https://www.guardrailsai.com).
    There, you will see a hub full of predefined rules that a response must follow
    in order to pass and be displayed to the user.
  prefs: []
  type: TYPE_NORMAL
- en: To get started quickly, first go to this link [2] and get an API key. Then,
    install the package. Next, type the guardrails setup command. It will ask you
    a couple of questions that you can respond n (for No), and it will ask you to
    enter the API Key generated.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Once that is completed, go to the Guardrails AI Hub [[3]](https://hub.guardrailsai.com/)
    and choose one that you need. Every guardrail has instructions on how to implement
    it. Basically, you install it via the command line and then use it like a module
    in Python.
  prefs: []
  type: TYPE_NORMAL
- en: For this example, we’re choosing one called *Restrict to Topic* [4], which,
    as its name says, lets the user talk only about what’s in the list. So, go back
    to the terminal and install it using the code below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Next, let’s open our Python script and import some modules.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Next, we create the guard. We will restrict our agent to talk only about *sports*
    or the *weather*. And we are restricting it to talk about *stocks*.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Now we can run the agent and the guard.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: This is the response when we ask about a stock symbol.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: If I ask about a topic that is not on the `valid_topics` list, I will also see
    a block.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Finally, let’s ask about sports.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: And we saw a response this time, as it is a valid topic.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s move on to the evaluation of agents now.
  prefs: []
  type: TYPE_NORMAL
- en: Agent Evaluation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since I started studying LLMs and Agentic AI, one of my main questions has been
    about model evaluation. Unlike traditional Data Science Modeling, where you have
    structured metrics that are adequate for each case, for AI Agents, this is more
    blurry.
  prefs: []
  type: TYPE_NORMAL
- en: 'Fortunately, the developer community is pretty quick in finding solutions for
    almost everything, and so they created this nice package for LLMs evaluation:
    `deepeval`.'
  prefs: []
  type: TYPE_NORMAL
- en: DeepEval [[5]](https://www.deepeval.com/docs/getting-started) is a library created
    by Confident AI that gathers many methods to evaluate LLMs and AI Agents. In this
    section, let’s learn a couple of the main methods, just so we can build some intuition
    on the subject, and also because the library is quite extensive.\
  prefs: []
  type: TYPE_NORMAL
- en: The first evaluation is the most basic we can use, and it is called `G-Eval`.
    As AI tools like ChatGPT become more common in everyday tasks, we have to make
    sure they’re giving helpful and accurate responses. That’s where G-Eval from the
    DeepEval Python package comes in.
  prefs: []
  type: TYPE_NORMAL
- en: '**G-Eval** is like a smart reviewer that uses another AI model to evaluate
    how well a chatbot or AI assistant is performing. For example. My agent runs Gemini,
    and I am using OpenAI to assess it. This method takes a more advanced approach
    than a human one by asking an AI to “grade” another AI’s answers based on things
    like *relevance*, *correctness*, and *clarity*.'
  prefs: []
  type: TYPE_NORMAL
- en: It’s a nice way to test and improve generative AI systems in a more scalable
    way. Let’s quickly code an example. We will import the modules, create a prompt,
    a simple chat agent, and ask it about a description of the weather for the month
    of May in NYC.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'It responds: “*Mild, with average highs in the 60s°F and lows in the 50s°F.
    Expect some rain*“.'
  prefs: []
  type: TYPE_NORMAL
- en: Nice. Seems pretty good to me.
  prefs: []
  type: TYPE_NORMAL
- en: But how can we put a number on it and show a potential manager or client how
    our agent is doing?
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is how:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a test case passing the `prompt` and the `response` to the `LLMTestCase`
    class.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create a metric. We will use the method `GEval` and add a prompt for the model
    to test it for **coherence**, and then I give it the meaning of what coherence
    is to me.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Give the output as `evaluation_params`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Run the `measure` method and get the `score` and `reason` from it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The output looks like this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 0.9 seems pretty good, given that the default threshold is 0.5.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to check the logs, use this next snippet.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Here’s the response.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Very nice. Now let us learn about another interesting use case, which is the
    evaluation of **task completion for AI Agents**. Elaborating a little more, how
    our agent is doing when it is requested to perform a task, and how much of it
    the agent can deliver.
  prefs: []
  type: TYPE_NORMAL
- en: First, we are creating a simple agent that can access Wikipedia and summarize
    the topic of the query.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: The result looks very good. Let’s evaluate it using the `TaskCompletionMetric`
    class.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Output, including the agent’s response.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'Our agent passed the test with honor: 100%!'
  prefs: []
  type: TYPE_NORMAL
- en: You can learn much more about the **DeepEval** library in this link [[8]](https://www.confident-ai.com/blog/llm-evaluation-metrics-everything-you-need-for-llm-evaluation).
  prefs: []
  type: TYPE_NORMAL
- en: Finally, in the next section, we will learn the capabilities of Agno’s library
    for monitoring agents.
  prefs: []
  type: TYPE_NORMAL
- en: Agent Monitoring
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Like I told you in my previous post [[9]](https://towardsdatascience.com/agentic-ai-101-starting-your-journey-building-ai-agents/),
    I chose **Agno** to learn more about Agentic AI. Just to be clear, this is not
    a sponsored post. It is just that I think this is the best option for those starting
    their journey learning about this topic.
  prefs: []
  type: TYPE_NORMAL
- en: So, one of the cool things we can take advantage of using Agno’s framework is
    the app they make available for model monitoring.
  prefs: []
  type: TYPE_NORMAL
- en: Take this agent that can search the internet and write Instagram posts, for
    example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'To monitor its performance, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to [https://app.agno.com/settings](https://app.agno.com/settings) and get
    an API Key.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Open a terminal and type `ag setup`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If it is the first time, it might ask for the API Key. Copy and Paste it in
    the terminal prompt.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You will see the **Dashboard** tab open in your browser.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you want to monitor your agent, add the argument `monitoring=True`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Run your agent.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Go to the Dashboard on the web browser.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click on **Sessions**. As it is a single agent, you will see it under the tab
    Agents on the top portion of the page.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/b28348506dadcedb767297db5b795838.png)'
  prefs: []
  type: TYPE_IMG
- en: Agno Dashboard after running the agent. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: 'The cools features we can see there are:'
  prefs: []
  type: TYPE_NORMAL
- en: Info about the model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The response
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tools used
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tokens consumed
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/e0b56f70a559b0c8f2fab5692eec9f63.png)'
  prefs: []
  type: TYPE_IMG
- en: This is the resulting token consumption while saving the file. Image by the
    author.
  prefs: []
  type: TYPE_NORMAL
- en: Pretty neat, huh?
  prefs: []
  type: TYPE_NORMAL
- en: This is useful for us to know where the agent is spending more or less tokens,
    and where it is taking more time to perform a task, for example.
  prefs: []
  type: TYPE_NORMAL
- en: Well, let’s wrap up then.
  prefs: []
  type: TYPE_NORMAL
- en: Before You Go
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We have learned a lot in this second round. In this post, we covered:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Guardrails for AI** are essential safety measures and ethical guidelines
    implemented to prevent unintended harmful outputs and ensure responsible AI behavior.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model evaluation**, exemplified by `GEval` for broad assessment and `TaskCompletion`
    with DeepEval for agents output quality, is crucial for understanding AI capabilities
    and limitations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model monitoring** with Agno’s app, including tracking token usage and response
    time, which is vital for managing costs, ensuring performance, and identifying
    potential issues in deployed AI systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
