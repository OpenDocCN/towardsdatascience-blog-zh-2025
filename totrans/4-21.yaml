- en: 'Navigating Data Science Content: Recognizing Common Pitfalls, Part 1'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 导航数据科学内容：识别常见陷阱，第一部分
- en: 原文：[https://towardsdatascience.com/navigating-data-science-content-recognizing-common-pitfalls-part-1-72f5bab5a010/](https://towardsdatascience.com/navigating-data-science-content-recognizing-common-pitfalls-part-1-72f5bab5a010/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/navigating-data-science-content-recognizing-common-pitfalls-part-1-72f5bab5a010/](https://towardsdatascience.com/navigating-data-science-content-recognizing-common-pitfalls-part-1-72f5bab5a010/)
- en: The data science field is vast and complex, often lacking clear-cut answers.
    While seeking to resolve doubts and learn new concepts online, I’ve come across
    numerous low-quality, error-prone answers – some surprisingly well-received despite
    fundamental misunderstandings. To help others navigate these pitfalls, I’m starting
    a series to share mistakes found in online content (some of those may be mistakes
    which I made in the past).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学领域广阔而复杂，往往缺乏明确的答案。在在线寻求解决疑问和学习新概念时，我遇到了许多低质量、易出错的答案——一些答案尽管存在基本误解，但仍然得到了意想不到的好评。为了帮助他人避免这些陷阱，我开始撰写一系列文章，分享在线内容中发现的错误（其中一些可能是我在过去犯过的错误）。
- en: In this article, I will share 4 such examples, together with a counter-example
    for each of them to disprove those statements. For Part 1, these examples will
    centre around basic machine learning and statistics concepts.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我将分享4个这样的例子，以及每个例子的反例来反驳这些陈述。对于第一部分，这些例子将围绕基本的机器学习和统计学概念展开。
- en: The examples will be structured in this way
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 例子将以这种方式结构化
- en: '[PRE0]'
  id: totrans-5
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Mistake 1: In Linear Regression, one of the assumptions is the target Y must
    be normally distributed**'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**错误1：在线性回归中，一个假设是目标Y必须是正态分布的**'
- en: This sentence is incomplete, it should be
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这句话是不完整的，它应该是
- en: '"In Linear Regression (LR), one of the assumptions is the target Y **conditional
    on X** must be normally distributed"'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '"在线性回归（LR）中，一个假设是目标Y在X的条件分布必须是正态分布"'
- en: 'To Lets recall the definition of LR – albeit in its simplest form: **the target
    Y is estimated as a linear combination of p predictors**'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下线性回归的定义——尽管它是最简单的形式：**目标Y被估计为p个预测变量的线性组合**
- en: '![Equation 1: Linear Regression](../Images/c362239d759a89ae2fe7ea3b8787855b.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![线性回归的方程5](../Images/c362239d759a89ae2fe7ea3b8787855b.png)'
- en: 'Equation 1: Linear Regression'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 方程1：线性回归
- en: 'When modelling a dataset with linear regression, some assumptions are made:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用线性回归建模数据集时，会做出一些假设：
- en: (1) [Linearity] There is a true linear relationship between the target Y and
    the predictors
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: (1) [线性关系] 目标Y与预测变量之间存在真实的线性关系
- en: '![](../Images/acae793a9a7ccc1a87d43f366357c3f8.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![线性回归的方程1](../Images/acae793a9a7ccc1a87d43f366357c3f8.png)'
- en: (2) [Homoscedasticity] The errors should follow a constant variance across all
    X values
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: (2) [同方差性] 误差应该在所有X值上遵循恒定的方差
- en: '![](../Images/cbd370162de7dc28518241dbaa4c0134.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![线性回归的方程2](../Images/cbd370162de7dc28518241dbaa4c0134.png)'
- en: (3) The errors are independent of one another
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: (3) 误差彼此独立
- en: (4) [Exogeneity] The errors should not be correlated to the predictors
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: (4) [外生性] 误差不应与预测变量相关
- en: '![](../Images/92e547f1a1220ff3c6d231bab22fb8f6.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![线性回归的方程3](../Images/92e547f1a1220ff3c6d231bab22fb8f6.png)'
- en: (5) The errors conditioned on the predictors follow a normal distribution
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: (5) 在预测变量条件下的误差遵循正态分布
- en: '![](../Images/3e44d44819a01e2b153beec2afab9274.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![反例](../Images/3e44d44819a01e2b153beec2afab9274.png)'
- en: (6) [Multicollinearity] No two predictors are highly correlated to each other
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: (6) [多重共线性] 没有两个预测变量之间高度相关
- en: 'Using assumption (5) and Equation 1 above, we can derive the conditional distribution
    of target Y given predictors X:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 使用假设(5)和上面的方程1，我们可以推导出目标Y在预测变量X条件下的条件分布：
- en: '![Conditional Distribution of Y given X](../Images/ca1e0c977e33dc5289a445fbeef6f30d.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![给定X的Y的条件分布](../Images/ca1e0c977e33dc5289a445fbeef6f30d.png)'
- en: Conditional Distribution of Y given X
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 给定X的Y的条件分布
- en: 'Note: the assumptions are made with the error terms, not the residuals, which
    are estimates of the error terms'
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意：这些假设是基于误差项，而不是残差，残差是误差项的估计
- en: Notice that Y | X is normally distributed, but does it mean that the unconditional
    distribution of Y is normally distributed? Let’s give a counterexample to show
    this is false
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到Y | X是正态分布的，但这是否意味着Y的无条件分布也是正态分布的呢？让我们给出一个反例来证明这是错误的
- en: '**Example**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**'
- en: 'Let’s sample **X iid** from a uniform distribution:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从均匀分布中抽取**X iid**：
- en: '![](../Images/d6296c9a7c1bc58fef90f147cb311c2e.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![线性回归的方程4](../Images/d6296c9a7c1bc58fef90f147cb311c2e.png)'
- en: 'and generate **Y** using the **population regression model**:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 并使用**总体回归模型**生成**Y**：
- en: '![](../Images/499ae418e7dbb97da2a53265d469f34b.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片 6](../Images/499ae418e7dbb97da2a53265d469f34b.png)'
- en: Does this obey the assumptions of the LR model?
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这是否遵守 LR 模型的假设？
- en: (1) [Linearity] There is a true linear relationship between the target Y and
    the predictors
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: (1) [线性] 目标 Y 和预测变量之间存在真实的线性关系
- en: Yes.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 是的。
- en: '![](../Images/faeaf1bd89ce1c595667fff8d83db87f.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片 5](../Images/faeaf1bd89ce1c595667fff8d83db87f.png)'
- en: (2) [Homoscedasticity] The variance of the errors should follow a constant variance
    across all X values
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: (2) [同方差性] 误差的方差应该在所有 X 值上遵循恒定的方差
- en: Yes. The errors have a constant variance of 1.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 是的。误差具有恒定的方差 1。
- en: (3) The errors are independent of one another
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: (3) 误差彼此独立
- en: Yes. Since X and the noise term is generated independently, the errors will
    also be independent of one another.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 是的。由于 X 和噪声项是独立生成的，因此误差也将相互独立。
- en: (4) [Exogeneity] The errors should not be correlated to the predictors
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: (4) [外生性] 误差不应与预测变量相关
- en: Yes. The expected value of the errors is the same as that of N(0, 1) which is
    0.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 是的。误差的期望值与 N(0, 1) 相同，即 0。
- en: (5) The errors conditioned on the predictors follow a normal distribution
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: (5) 在给定预测变量的条件下，误差遵循正态分布
- en: Yes. The errors follow N(0, 1).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 是的。误差遵循 N(0, 1)。
- en: (6) [Multicollinearity] No two predictors are highly correlated to each other
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: (6) [多重共线性] 没有两个预测变量彼此高度相关
- en: Not applicable since in the above example there is only 1 predictor variable.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述例子中只有一个预测变量，因此不适用。
- en: The model adheres to all the assumptions of LR!
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 该模型符合 LR 的所有假设！
- en: 'Plotting the best-fit line together with its residuals and target distribution:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 将最佳拟合线与其残差和目标分布一起绘制：
- en: '![Figure 1](../Images/18e382d2dbba8364c8ecd0f7051b8a7f.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图 1](../Images/18e382d2dbba8364c8ecd0f7051b8a7f.png)'
- en: Figure 1
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1
- en: Let’s check with the **Shapiro-Wilk Test** (a statistical hypothesis test that
    determines if a sample of data is normally distributed) that Y does not follow
    a normal distribution
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用 **Shapiro-Wilk 检验**（一种统计假设检验，用于确定数据样本是否服从正态分布）来检查 Y 是否不遵循正态分布
- en: '![](../Images/b697f0782a9cc67b2db65b4514168180.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片 4](../Images/b697f0782a9cc67b2db65b4514168180.png)'
- en: '[PRE1]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '[PRE2]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Observing the visual of Y’s distribution above in Figure 1 (a platykurtic distribution)
    and finding that the p-value is extremely small (~ 0), we conclude that Y does
    not follow a normal distribution, which completes the counterexample.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 观察图 1 中 Y 分布的视觉（一个平峰分布）并发现 p 值极小（约 0），我们得出结论，Y 不遵循正态分布，这完成了反例。
- en: '**Mistake 2: Skewness vs Kurtosis: In a distribution, Skewness measures the
    length of the tails, while Kurtosis measures the height of the peak**'
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**错误 2：偏度与峰度：在分布中，偏度衡量的是尾部的长度，而峰度衡量的是峰的高度**'
- en: This is not true. Kurtosis measures how "wide" the tails are, in other worse,
    how much of the distribution’s mass are on the tails, which may not correlate
    with how tall the peak is
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这是不正确的。峰度衡量的是尾部有多“宽”，换句话说，分布的尾部有多少质量，这可能与峰的高度无关
- en: 'Example:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: Let’s denote
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们表示
- en: '![](../Images/ea17182c7d8a4f98cbcd1cb6851839a8.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片 3](../Images/ea17182c7d8a4f98cbcd1cb6851839a8.png)'
- en: and
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 和
- en: '![](../Images/afa4b70a3c027224f296fce67057f205.png)![Figure 2](../Images/049976a7e06f583c6b8da8448255c525.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片 1](../Images/afa4b70a3c027224f296fce67057f205.png)![图 2](../Images/049976a7e06f583c6b8da8448255c525.png)'
- en: Figure 2
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2
- en: As we can see from Figure 2, the uniform distribution has a much higher peak,
    but since it has no outliers (and as such less tail-heavy), its kurtosis is lower
    than the standard normal distribution
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 2 所示，均匀分布的峰值要高得多，但由于它没有异常值（因此尾部较轻），其峰度低于标准正态分布
- en: '**Mistake 3: A function f(x) is convex because it has a single global minimum**'
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**错误 3：一个函数 f(x) 是凸的，因为它只有一个全局最小值**'
- en: The above statement is **not sufficient** to ensure convexity.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 上述陈述**不足以**确保凸性。
- en: The term "convex functions" is regularly used in machine learning in the world
    of optimization algorithms such as gradient descent – which is one key behind
    logistic regression.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: “凸函数”这个术语在机器学习领域被广泛使用，特别是在优化算法（如梯度下降）的世界中——这是逻辑回归背后的一个关键因素。
- en: 'Recall the definition of convexity (for simplicity I will only use univariate
    functions):'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 回忆凸性的定义（为了简单起见，我将仅使用单变量函数）：
- en: '![Defintion 1: function value at any point on the line segment between any
    2 points in its domain, is less than or equal to the corresponding weighted average
    of the function values at those 2 points](../Images/ca752929255f740b18e44af2edde204a.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![定义1：函数在其定义域内任意两点之间的线段上的函数值小于或等于这两点函数值的加权平均值](../Images/ca752929255f740b18e44af2edde204a.png)'
- en: 'Defintion 1: function value at any point on the line segment between any 2
    points in its domain, is less than or equal to the corresponding weighted average
    of the function values at those 2 points'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 定义1：函数在其定义域内任意两点之间的线段上的函数值小于或等于这两点函数值的加权平均值
- en: '![Defintion 2: For a twice differentiable function, the 2nd derivative of a
    convex function is non-negative everywhere in its domain](../Images/085483b07c5887e7e7a5fd54b901904d.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![定义2：对于二阶可微的函数，凸函数的二阶导数在其定义域内处处非负](../Images/085483b07c5887e7e7a5fd54b901904d.png)'
- en: 'Defintion 2: For a twice differentiable function, the 2nd derivative of a convex
    function is non-negative everywhere in its domain'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 定义2：对于二阶可微的函数，凸函数的二阶导数在其定义域内处处非负
- en: Let’s show a counter-example why this is not sufficient.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个反例来展示这并不充分。
- en: '![](../Images/16a7ade391c9c4439d9486e8d9cc67b8.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/16a7ade391c9c4439d9486e8d9cc67b8.png)'
- en: 'Taking the first derivative:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 求一阶导数：
- en: '![](../Images/e194734c4769165973471c410aade7fc.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e194734c4769165973471c410aade7fc.png)'
- en: 'Taking the second derivative:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 求二阶导数：
- en: '![](../Images/27ac1a71afaa490227d7885b0b98c7e0.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/27ac1a71afaa490227d7885b0b98c7e0.png)'
- en: Just by substituting x = 0.25,
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 只需将x = 0.25代入，
- en: '![](../Images/41d387cdac4e683123fc12c702ce99ed.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/41d387cdac4e683123fc12c702ce99ed.png)'
- en: Voila! This violates the 2nd definition, and therefore the function is not convex
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 哇！这违反了第二个定义，因此该函数不是凸函数
- en: 'Lets plot the function and see:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们绘制这个函数并看看：
- en: '![Plot of f(x) = x ^ 4 - x ^ 3](../Images/1e7cd79a32750d7024709fdb084aa986.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![f(x) = x ^ 4 – x ^ 3的图像](../Images/1e7cd79a32750d7024709fdb084aa986.png)'
- en: Plot of f(x) = x ^ 4 – x ^ 3
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: f(x) = x ^ 4 – x ^ 3的图像
- en: As we can see, the function does have only 1 global minimum. However, the inflexion
    point (or saddle points when it comes to multivariate) is an area where the optimization
    algorithm can also converge, causing a suboptimal solution.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，该函数确实只有一个全局最小值。然而，拐点（或当它是多元时的情况下的鞍点）是优化算法也可能收敛的区域，导致次优解。
- en: '**Mistake 4: Defintion of a 95% confidence interval for the parameter: There
    is a 95% chance that the parameter falls within this confidence interval**'
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**错误4：参数95%置信区间的定义：有95%的概率参数会落在该置信区间内**'
- en: I have seen this "flawed" understanding of confidence intervals many times,
    even back then when I was in college.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾多次看到这种“有缺陷”的置信区间理解，甚至在我上大学的时候。
- en: This misconception arises from interpreting confidence intervals in terms of
    sample parameters rather than the population parameter. In reality, different
    random samples yield different confidence intervals.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这种误解源于将置信区间解释为样本参数而不是总体参数。实际上，不同的随机样本会产生不同的置信区间。
- en: 'Correct Definition: A 95% confidence interval (for the parameter) means that
    if you'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 正确的定义：95%置信区间（对于参数）意味着如果你
- en: Create N random samples from the population
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从总体中创建N个随机样本
- en: Calculate the 95% confidence interval for the parameter for each sample
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为每个样本计算参数的95%置信区间
- en: You get N different confidence intervals, and out of those, 0.95N will contain
    the true population parameter, as illustrated in the image below.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你会得到N个不同的置信区间，其中0.95N个将包含真实的总体参数，如下面的图片所示。
- en: '![Creating 100 confidence intervals from different random samples, where 95
    of them contain the true parameter value (0). Image: ResearchGate](../Images/d841a1dc2f5ba584dc173d2dcb12cbb1.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![从不同的随机样本中创建100个置信区间，其中95个包含真实的参数值（0）。图片：ResearchGate](../Images/d841a1dc2f5ba584dc173d2dcb12cbb1.png)'
- en: 'Creating 100 confidence intervals from different random samples, where 95 of
    them contain the true parameter value (0). Image: [ResearchGate](https://www.researchgate.net/figure/llustration-of-the-confidence-level-of-a-confidence-interval-where-95-out-of-100_fig2_340898418)'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 从不同的随机样本中创建100个置信区间，其中95个包含真实的参数值（0）。图片：[ResearchGate](https://www.researchgate.net/figure/llustration-of-the-confidence-level-of-a-confidence-interval-where-95-out-of-100_fig2_340898418)
- en: Conclusion
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In the ever-evolving field of data science, misunderstandings in basic concepts
    can cascade and affect one’s ability to stomach more advanced concepts in the
    future. At the beginning of my data science journey, I made this mistake of blindly
    trusting online content assuming it is correct. As I progressed and gained more
    experience, I started approaching these content with a different mindset, not
    just blindly trusting, but also smartly evaluating with the help of other sources
    to have higher confidence that the content I am absorbing is correct.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学这个不断发展的领域中，对基本概念的理解错误可能会层层递进，影响一个人在未来理解更高级概念的能力。在我数据科学之旅的开始，我犯了一个错误，那就是盲目地相信在线内容，假设它是正确的。随着我不断进步并积累更多经验，我开始用不同的心态来对待这些内容，不仅盲目相信，还借助其他来源进行明智的评估，从而更有信心地认为我所吸收的内容是正确的。
- en: In data science, understanding the "why" behind each concept is just as important
    as knowing the "how" – it is very different from software engineering where problems
    are often more structured in nature.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学中，理解每个概念背后的“为什么”与知道“如何”同样重要——这与软件工程非常不同，在软件工程中，问题往往在本质上更加结构化。
- en: This is the first article of the series, future parts will continue to explore
    and debunk errors/misconceptions in various aspects of data science.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这是本系列的第一篇文章，未来的部分将继续探索和驳斥数据科学各个方面的错误/误解。
- en: As always, if you have any feedback after reading the article, feel free to
    comment!
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如往常一样，如果你在阅读完文章后有任何反馈，请随时评论！
