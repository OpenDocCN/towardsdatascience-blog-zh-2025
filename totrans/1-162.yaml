- en: Choosing the Best Model Size and Dataset Size under a Fixed Budget for LLMs
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/choosing-the-best-model-size-and-dataset-size-under-a-fixed-budget-for-llms/](https://towardsdatascience.com/choosing-the-best-model-size-and-dataset-size-under-a-fixed-budget-for-llms/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1761241198699" class="mdspan-comment">When training large</mdspan>
    language models (LLMs), we are forever constrained by budgets. Such a constraint
    leads to a fundamental trade-off:Imagine that if you fix a compute budget, increasing
    the model size means that you must reduce the model size you can train on, and
    vice versa. So you are asking the question:'
  prefs: []
  type: TYPE_NORMAL
- en: Should we allocate more to a model with more parameters, or should we train
    it on more data?
  prefs: []
  type: TYPE_NORMAL
- en: In particular, LLMs’ performance and efficiency are largely influenced by this
    trade-off. It is thus crucial to find an optimal balance between the number of
    parameters of a model and the number of tokens used.
  prefs: []
  type: TYPE_NORMAL
- en: 'The total training compute of a transformer roughly scales as: C∝N×D, where'
  prefs: []
  type: TYPE_NORMAL
- en: N is the number of model parameters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: D is the number of tokens.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: C is the fixed compute budget.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is straightforward to see that for a fixed C, N and D are inversely proportional
    to each other.
  prefs: []
  type: TYPE_NORMAL
- en: 'Previous studies (Kaplan et al., 2020; Hoffmann et al., 2022) have found that
    training loss of machine learning models follows a power-law with compute: L(C)∝C^{−α}
    and the *optimal* model size and dataset size scale with compute as: N_opt∝C^a,
    D_opt∝C^b for some positive values a and b.'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we will use tiny Transformers to explore how to balance N and
    D under a fixed compute C.
  prefs: []
  type: TYPE_NORMAL
- en: Experiment Setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We design a minimal transformer model, and we call it “tiny transformer” with
    the following configurable properties that influence the model’s parameter size:'
  prefs: []
  type: TYPE_NORMAL
- en: Model dimension (d_model)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MLP dimension (d_mlp)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Number of layers (n_layers​)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We would like to train the transformer of different configurations on tokenized
    sequences of length 64 of the WikiText-2 dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 'To study the effect of scaling, we defined a grid of models from very small
    (16 hidden units, 1 layer) to relatively large (128 hidden units, 4 layers) and
    combine them with a range of tokens from 5k to 1M. See the code below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'By approximating the compute cost as C≈N×D, our idea is to compute the loss
    function for each (N,D) pair and find the pair (N,D) with which the model reaches
    the minimal loss function for a given C: this is the balance we are looking for.'
  prefs: []
  type: TYPE_NORMAL
- en: Implementation and observations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We use the code below to train the model up to a fixed number of steps with
    different (N,D) pair and record the result.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'We then plot the final loss against the compute (N×D):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6b08c531e20a97b92af54f7c46f01764.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by author: training loss vs compute'
  prefs: []
  type: TYPE_NORMAL
- en: 'We have the following important observations:'
  prefs: []
  type: TYPE_NORMAL
- en: '**For small compute budgets**, small models trained on most of the available
    data perform better than larger models trained on very little data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**For large compute budgets**, larger models become better when enough data
    is available.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The optimal model size does not grow linearly with compute budget. For example,
    doubling the compute does not really lead to an optimal number of parameters twice
    as before.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The plot below gives the efficient frontier across model size, that is, the
    set of model sizes that have the lowest loss for a given compute.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6e21a80511b1ea6b3584e24b848dbb8f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by author: efficient frontier'
  prefs: []
  type: TYPE_NORMAL
- en: “Best” Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To determine the “best” model, we would select the pair of model size and the
    number of tokens that minimizes loss at a fixed budget.
  prefs: []
  type: TYPE_NORMAL
- en: 'We assume both follow a power-law relationship: N_opt∝C^α, D_opt∝C^β, and we
    would like to estimate the unknown exponents α and β by the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Take the logarithm of the quantities: log?(N_opt)=αlog?(C)+const, log?(D_opt)=βlog?(C)+const.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Fit a linear regression. The slope of the regression is nothing but the power-law
    exponent.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The following code gives such a regression:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: In our toy experiment, we found that N_opt ~C^0.14 and D_opt~ C^0.86\. This
    result might not reveal the whole image because we did the experiment on simpilied
    model and configurations. But we can still see that the growth of computing leads
    to an increase in optimal model size, but at a diminishing rate. Clearly, the
    remaining budget should be attributed to more training tokens.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, the compute above gives the fact that the best ratio N_opt/D_opt=C^-0.72\.
    This implies that when you increase compute, you should add more training tokens
    rather than increasing model size.
  prefs: []
  type: TYPE_NORMAL
- en: Practical Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'From this experiment, though a toy case, we can extract several insights:'
  prefs: []
  type: TYPE_NORMAL
- en: For a fixed budget, using a medium model with more data can outperform a very
    large model with limited data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Optimal model size and data size grow with compute. Don’t train a model with
    many parameters if you have a small budget.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When the budget increases, consider first the optimal ratio N_opt/D_opt to determine
    whether you should increase the model size or add more training data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this blog post, we provide a study of the trade-off between model size and
    data under a fixed compute budget for LLMs with a toy case. The experiment shows
    that we can find the optimal pair of model size and tokens number to acheive the
    best model performance with a given budget, allowing researchers and practitioners
    to design LLMs wisely and achieve the best results.
  prefs: []
  type: TYPE_NORMAL
- en: Reference
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[1] Kaplan, J., McCandlish, S., Henighan, T., Brown, T. B., Chess, B., Child,
    R., Gray, S., Radford, A., Wu, J., & Amodei, D. (2020). *Scaling Laws for Neural
    Language Models*.'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] Hoffmann, J., Borgeaud, S., Mensch, A., Buchatskaya, E., Cai, T., Rutherford,
    E., de Las Casas, D., Hendricks, L. A., Welbl, J., Clark, A., Hennigan, T., Noland,
    E., Millican, K., van den Driessche, G., Damoc, B., Guy, A., Osindero, S., Simonyan,
    K., Elsen, E., … Sifre, L. (2022). *Training Compute-Optimal Large Language Models*.'
  prefs: []
  type: TYPE_NORMAL
