- en: Platform-Mesh, Hub and Spoke, and Centralised | 3 Types of data team
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 平台网格、中心辐射和集中式 | 3种数据团队类型
- en: 原文：[https://towardsdatascience.com/platform-mesh-hub-and-spoke-and-centralised-3-types-of-data-team/](https://towardsdatascience.com/platform-mesh-hub-and-spoke-and-centralised-3-types-of-data-team/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/platform-mesh-hub-and-spoke-and-centralised-3-types-of-data-team/](https://towardsdatascience.com/platform-mesh-hub-and-spoke-and-centralised-3-types-of-data-team/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: In the “*ever rapidly changing landscape of Data and AI*” (!), understanding
    data and AI architecture has never been more critical. However something many
    leaders overlook is the importance of data team structure.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在“数据与AI的*快速变化的环境*”（!）中，理解数据与AI架构的重要性从未如此关键。然而，许多领导者忽视的是数据团队结构的重要性。
- en: While many of you reading this probably identify as *the *data team, something
    most don’t realise is how limiting that mindset can be.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然阅读这篇文章的许多人可能自认为是数据团队的一员，但大多数人没有意识到这种思维方式可能有多局限。
- en: Indeed, different team structures and skill requirements significantly impact
    an organisation’s ability to actually use Data and AI to drive meaningful results.
    To understand this, it’s helpful to think of an analogy.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，不同的团队结构和技能需求显著影响了一个组织实际使用数据和AI来驱动有意义结果的能力。为了理解这一点，思考一个类比是有帮助的。
- en: Imagine a two-person household. John works from home and Jane goes to the office.
    There’s a bunch of house admin Jane relies on John to do, which is a lot easier
    since he’s the one at home most of the time.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个两人家庭。约翰在家工作，简去办公室。简依赖约翰做很多家务，由于他大部分时间都在家，所以这要容易得多。
- en: Jane and John have kids and after they’re grown up a bit John has twice as much
    admin to do! Thankfully, the kids are trained to do the basics; they can wash
    up, tidy and even occasionally do a bit of hoovering with some coercion.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 简和约翰有了孩子，在孩子长大一些后，约翰需要做双倍的家务！幸运的是，孩子们被训练去做基本的事情；他们可以洗碗、打扫，偶尔在一点强迫下做些吸尘。
- en: As the kids grow up, John’s parents move in. They’re pretty old, so John looks
    after them, but fortunately, the kids are basically self-sufficient at this point.
    Over time John’s role has changed quite a bit! But he’s always made it one happy,
    nuclear family — thanks to John and Jane.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 随着孩子们的成长，约翰的父母搬了进来。他们年纪很大了，所以约翰照顾他们，但幸运的是，孩子们在这个时候基本上是自给自足的。随着时间的推移，约翰的角色发生了很大的变化！但他始终让这个家庭保持幸福——多亏了约翰和简。
- en: Back to data — John is a bit like the data team, and everyone else is a domain
    expert. They rely on John, but in different ways. This has changed a lot over
    time, and if it hadn’t it could have been a disaster.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 回到数据——约翰有点像数据团队，而其他人则是领域专家。他们依赖约翰，但方式不同。随着时间的推移，这种依赖关系发生了很大变化，如果没有变化，可能会是一场灾难。
- en: In the rest of this article, we’ll explore John’s journey from a Centralised,
    through Hub-and-spoke to a Platform mesh-style data team.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文的剩余部分，我们将探讨约翰从集中式、通过中心辐射式到平台网格式数据团队的转变之旅。
- en: Centralised teams
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集中式团队
- en: 'A central team is responsible for a lot of things that will be familiar to
    you:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 中心团队负责许多您可能熟悉的事情：
- en: 'Core data platform and architecture: the frameworks and tooling used to facilitate
    Data and AI workloads.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 核心数据平台和架构：用于促进数据和AI工作负载的框架和工具。
- en: 'Data and AI engineering: centralising and cleaning datasets; structuring unstructured
    data for AI workloads'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据和AI工程：集中化和清理数据集；为AI工作负载结构化非结构化数据
- en: 'BI: building dashboards to visualise insights'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: BI：构建仪表板以可视化洞察
- en: 'AI and ML: the training and deployment of models on the aforementioned clean
    data'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI和ML：在上述清洁数据上训练和部署模型
- en: Advocating for the value of data and training people to understand how to use
    BI tools
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提倡数据的价值并培训人们了解如何使用BI工具
- en: This is a lot of work for a few people! In fact, it’s practically impossible
    to nail all of this at once. It’s best to keep things small and manageable, focusing
    on a few key use cases and leveraging powerful tooling to get a head start early.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这对少数人来说是一项繁重的工作！实际上，一次性完成所有这些几乎是不可能的。最好是保持事情小而可控，专注于几个关键用例，并利用强大的工具尽早取得领先。
- en: You might even get a nanny or au Pair to help with the work (in this case —
    consultants).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至可能需要雇佣一个保姆或家庭助手来帮忙做家务（在这种情况下——顾问）。
- en: But this pattern has flaws. It is easy to fall into the [silo trap](https://www.getorchestra.io/blog/the-data-death-cycle-avoiding-the-silo-trap),
    a scenario where the central team become a huge bottleneck for Data and AI requests.
    Data Teams also need to acquire domain knowledge from domain experts to effectively
    answer requests, which is also time-consuming and hard.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 但这种模式存在缺陷。很容易陷入[silo trap](https://www.getorchestra.io/blog/the-data-death-cycle-avoiding-the-silo-trap)的陷阱，这是一种中央团队成为数据和人工智能请求巨大瓶颈的场景。数据团队也需要从领域专家那里获取领域知识，以有效地回答请求，这也很耗时且困难。
- en: '![](../Images/6c85831728a7e0c01a2f1bd0319ab062.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6c85831728a7e0c01a2f1bd0319ab062.png)'
- en: Getting bogged down in ad-hoc requests is often inevitable for centralised teams
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 对于中央团队来说，陷入临时请求的困境往往是不可避免的
- en: One way out is to expand the team. More people means more output. However, there
    are better more modern approaches that can make things go even faster.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 一种出路是扩大团队。人越多，产出就越多。然而，还有更好、更现代的方法可以使事情更快地完成。
- en: But there is only one John. So what can he do?
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 但只有一个约翰。他能做什么呢？
- en: '![](../Images/f175fa74ff88262af44b4560ccbbcce1.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f175fa74ff88262af44b4560ccbbcce1.png)'
- en: John is an island in the Centralised Team. Image the author’s
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰是中央团队中的一个孤岛。想象一下作者的
- en: Partially decentralised or hub and spoke
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 部分去中心化或中心辐射
- en: The partially decentralised setup is an attractive model for medium-sized organisations
    or small, tech-first ones where there are [technical skills outside of the data
    team](https://eric-arsenaults.medium.com/data-team-architecture-centralized-vs-hub-and-spoke-879e7b436ed6).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 部分去中心化的设置对于中等规模的组织或以技术为先的小型组织来说是一个有吸引力的模式，其中[技术技能超出了数据团队的范围](https://eric-arsenaults.medium.com/data-team-architecture-centralized-vs-hub-and-spoke-879e7b436ed6)。
- en: The simplest form has the data team maintaining BI infrastructure, but not the
    content itself. This is left to ‘power users’ that take this into their own hands
    and build the BI themselves.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 最简单的一种形式是数据团队维护BI基础设施，但不维护内容本身。这留给“高级用户”自行处理并构建BI。
- en: This, of course, runs into all kinds of issues, such as the silo trap, [data
    discovery](https://www.linkedin.com/pulse/data-discovery-what-why-matters-data-semantics/),
    governance, and [confusion](https://www.route-fifty.com/digital-government/2023/04/analysis-paralysis-when-too-much-data-reduces-decision-making/385570/).
    Confusion is especially painful when people who are told to self-serve try and
    fail due to a lack of understanding of the data.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这会遇到各种问题，如silo陷阱、[数据发现](https://www.linkedin.com/pulse/data-discovery-what-why-matters-data-semantics/)、治理和[混淆](https://www.route-fifty.com/digital-government/2023/04/analysis-paralysis-when-too-much-data-reduces-decision-making/385570/)。当被要求自助服务的人由于对数据的理解不足而尝试失败时，混淆尤其痛苦。
- en: An increasingly popular approach is for additional layers of the stack to be
    opened up. There is the [rise of the analytics engineer](https://www.youtube.com/watch?v=Qj1_KgakzqU) and
    data analysts are increasingly taking on more responsibility. This includes using
    tools, doing data modelling, building end-to-end pipelines, and advocating to
    the business.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 一种越来越受欢迎的方法是打开堆栈的额外层。有[分析工程师的兴起](https://www.youtube.com/watch?v=Qj1_KgakzqU)，数据分析师越来越多地承担更多责任。这包括使用工具、进行数据建模、构建端到端管道，并向业务部门倡导。
- en: This has led to enormous problems when implemented incorrectly. You wouldn’t
    let your five-year-old son look after the care of your elders and take care of
    the house unattended.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这在实施不当的情况下导致了巨大的问题。你不会让你的五岁儿子无人在场照顾你的长辈和照看房子。
- en: Specifically, a lack of basic data modelling principles and data warehouse engines
    leads to model sprawl and spiralling costs. There are two classic examples.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 特别是，缺乏基本的数据建模原则和数据仓库引擎会导致模型蔓延和成本螺旋上升。有两个经典例子。
- en: '![](../Images/b121fab55342d68d1cfbce6a3ff206e8.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b121fab55342d68d1cfbce6a3ff206e8.png)'
- en: Lineage charts can get pretty hairy without a good data model. This one is pretty
    clean, though. Image the author’s
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 没有良好的数据模型，血缘图可能会变得相当复杂。这个例子相当干净。想象一下作者的
- en: One is when multiple people try to define the same thing, such as revenue. marketing,
    finance, and product all have a different version. This leads to inevitable arguments
    at quarterly business reviews when every department reports with a different number
    — analysis paralysis.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一种情况是当多个人试图定义同一件事时，比如收入。营销、财务和产品都有不同的版本。这导致在季度业务审查时不可避免地出现争论——每个部门都报告不同的数字——分析瘫痪。
- en: The other is rolling counts. Let’s say finance wants revenue for the month,
    but product wants to know what it is on a rolling seven-day basis. “That’s easy,”
    says the analyst. “I’ll just create some materialised views with these metrics
    in them”.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种是滚动计数。比如说，财务部门想要这个月的收入，但产品部门想知道基于滚动七天的收入情况。“这很简单，”分析师说，“我会创建一些包含这些指标的物化视图”。
- en: As any data engineer knows, this rolling counts operation is pretty expensive,
    especially if the granularity needs to be by day or hour, since then you need
    a calendar to ‘fan out’ the model. Before you know it there are `rolling_30_day_sales `, `rolling_7_day_sales` , `rolling_45_day_sales` 
    and so on. These models cost an order of magnitude more than was required.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 任何数据工程师都知道，这种滚动计数操作相当昂贵，特别是如果需要按日或按小时进行粒度划分，因为那时你需要一个日历来“展开”模型。在你意识到之前，就会出现`rolling_30_day_sales`、`rolling_7_day_sales`、`rolling_45_day_sales`等等。这些模型比所需的成本高出一个数量级。
- en: Simply asking for the lowest granularity required (daily), materialising that,
    and creating views downstream can solve this problem but would require some central
    resource.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 简单地要求最低粒度的需求（每日），实现这一点，并在下游创建视图可以解决这个问题，但需要一些中央资源。
- en: An early Hub and Spoke model must have a clear delineation of responsibility
    if the knowledge outside the data team is young or juvenile.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如果数据团队之外的知识是年轻或幼稚的，早期的枢纽和辐射模型必须有一个清晰的职责划分。
- en: '![](../Images/8af49754fafba817f28fffff37fc0a36.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8af49754fafba817f28fffff37fc0a36.png)'
- en: An early hub and spoke model, where responsibilities like core data modelling
    sit within the blue circle, and downstream tasks are devolved in responsibility.
    Image the author’s
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在早期枢纽和辐射模型中，像核心数据建模这样的责任位于蓝色圆圈内，而下游任务则分散在责任上。想象一下作者的
- en: 'As teams grow, legacy, code-only frameworks like Apache Airflow also give rise
    to a problem: a lack of visibility. People outside the data team seeking to understand
    what is going will be reliant on additional tools to understand what happens end-to-end,
    since legacy UIs do not aggregate metadata from different sources.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 随着团队的扩大，像Apache Airflow这样的仅代码的遗留框架也会引发一个问题：缺乏可见性。数据团队之外的人试图了解正在发生什么，将依赖于额外的工具来理解端到端发生的情况，因为遗留的用户界面不会从不同来源聚合元数据。
- en: It is imperative to surface this information to domain experts. How many times
    have you been told the ‘data doesn’t look right’, only to realise after tracing
    everything manually that it was an issue on the data producer side?
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 向领域专家展示这些信息是至关重要的。你有多少次被告知“数据看起来不正确”，结果在手动追踪一切之后才发现问题是出在数据生产方？
- en: By increasing visibility, domain experts are connected directly to owners of
    source data or processes, which allows fixes to be faster. This removes unnecessary
    load, context switching, and tickets for the data team.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提高可见性，领域专家可以直接与源数据或流程的所有者建立联系，这使得修复可以更快。这消除了数据团队不必要的负载、上下文切换和工单。
- en: Hub and spoke (pure)
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 枢纽和辐射（纯粹）
- en: A pure hub and spoke is a bit like delegating your teenage children with specific
    responsibilities within clear guardrails. You don’t just give them tasks to do
    like taking the bins out and cleaning their room — you ask for what you want,
    like a “clean and tidy room,” and you trust them to do it. Incentives work well
    here.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 纯粹的枢纽和辐射模式有点像委托你的青少年子女在明确的轨道内承担具体责任。你不仅仅给他们分配任务，比如倒垃圾和打扫房间，而是要求你想要的结果，比如“干净整洁的房间”，并信任他们去完成。激励措施在这里效果很好。
- en: In a pure hub and spoke approach, the data team administers the platform and
    lets others use it. They build the frameworks for building and deploying AI and
    Data pipelines, and manage access control.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在纯粹的枢纽和辐射方法中，数据团队管理平台并允许其他人使用它。他们构建构建和部署AI和数据管道的框架，并管理访问控制。
- en: Domain experts can build stuff end-to-end if they need to. This means they can
    move data, model it, orchestrate the pipeline, and activate it with AI or dashboards
    as they see fit.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果需要，领域专家可以从头到尾构建东西。这意味着他们可以移动数据，建模，编排管道，并根据自己的需要使用AI或仪表板激活它。
- en: Often, the central team will also do a bit of this. Where data models across
    domains are complex and overlapping, they should almost always take ownership
    of delivering core data models. The tail should not wag the dog.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，中央团队也会做一点这样的工作。当跨领域的模型复杂且重叠时，他们几乎总是应该负责交付核心数据模型。尾巴不应该摇狗。
- en: '![](../Images/9ee36aa47d576a36352bdd922ac4c234.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9ee36aa47d576a36352bdd922ac4c234.png)'
- en: The central team is just a platform, apart from when they’re not! Image the
    author’s
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 中央团队只是一个平台，除了他们不是的时候！想象一下作者的
- en: This starts to resemble a data product mindset — while a finance team could
    take ownership for investing and cleaning ERP data, the central team would own
    an important data products like the customers table or invoices table.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这开始类似于数据产品的心态——虽然财务团队可以负责投资和清理ERP数据，但中央团队将拥有重要的数据产品，如客户表或发票表。
- en: This structure is very powerful as it is very collaborative. It often works
    only if domain teams have a reasonably high degree of technical proficiency.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构非常强大，因为它非常具有协作性。它通常只有在领域团队具有相当高的技术熟练度时才能有效工作。
- en: Platforms that allow use of code and no-code together are recommended here,
    otherwise a hard technical dependency on the central team will always exist.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这里推荐使用允许代码和无代码一起使用的平台，否则将始终存在对中央团队的硬技术依赖。
- en: Another characteristic of this pattern is training and support. The central
    team or hub will spend some time supporting and upskilling the spokes to build
    AI and Data workflows efficiently within guardrails.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式的另一个特点是培训和支援。中央团队或中心将花费一些时间支持和提升辐射团队，以便在约束条件下高效地构建AI和数据工作流程。
- en: Again, providing visibility here is hard with legacy orchestration frameworks.
    Central teams will be burdened with keeping metadata stores up-to-date, like Data
    Catalogs, so business users can understand what is going on.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，在传统的编排框架中提供可见性是困难的。中央团队将负担着保持元数据存储（如数据目录）更新的任务，这样业务用户才能理解正在发生的事情。
- en: The alternative — upskilling domain experts to have deep python expertise learning
    frameworks with steep learning curves, is even harder to pull off.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 替代方案——提升领域专家的深度Python专业知识，学习具有陡峭学习曲线的学习框架，实施起来甚至更难。
- en: Platform mesh/data product
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 平台网状/数据产品
- en: The natural endpoint in our theoretical household journey takes us to the much-criticised
    Data Mesh or Platform Mesh approach.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的理论家庭旅程的自然终点，我们来到了备受批评的数据网状或平台网状方法。
- en: In this household, everyone is expected to know what their responsibilities
    are. Children are all grown up and can be relied on to keep the house in order
    and look after its inhabitants. There is close collaboration and everyone works
    together seamlessly.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个家庭中，每个人都应该知道自己的责任。孩子们都长大了，可以依赖他们来维持家庭秩序并照顾家庭成员。这里有着紧密的合作，每个人都无缝地一起工作。
- en: Sounds pretty idealistic, don’t you think!?
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 听起来很理想主义，不是吗！？
- en: In practice, it’s rarely this easy. Allowing satellite teams to use their own
    infrastructure and build whatever they want is a surefire way to lose control
    and slow things down.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，事情很少这么简单。允许卫星团队使用自己的基础设施和构建他们想要的任何东西，这无疑是失去控制并减慢事情进展的可靠方法。
- en: Even if you were to standardise tooling across teams, best practices would still
    suffer.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你试图在团队间标准化工具，最佳实践仍会受到影响。
- en: I’ve spoken to countless teams in massive organisations such as retail chains
    or airlines, and avoiding a mesh is not an option because multiple business divisions
    depend on each other.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我与无数在大型组织（如零售连锁店或航空公司）中的团队交谈过，避免网状结构并不是一个选项，因为多个业务部门相互依赖。
- en: These teams use different tools. Some leverage Airflow instances and legacy
    frameworks built by consultants years ago. Others use the latest tech and a full,
    bloated, Modern Data Stack.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这些团队使用不同的工具。一些利用Airflow实例和多年前顾问构建的遗留框架。其他人则使用最新的技术和完整的、臃肿的现代数据栈。
- en: They all struggle with the same problem; collaboration, communication, and orchestrating
    flows across different teams.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 他们都面临着相同的问题；跨团队的合作、沟通和编排流程。
- en: Implementing a single overarching platform for building Data and AI workflows
    here can help. A [unified control plane](https://medium.com/@hugolu87/what-actually-is-a-data-control-plane-a587b182ffae) is
    almost like an orchestrator of orchestrators, that aggregates metadata across
    different places and shows end to end lineage across domains.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里实施一个用于构建数据和AI工作流程的单个综合平台可能会有所帮助。一个[统一控制平面](https://medium.com/@hugolu87/what-actually-is-a-data-control-plane-a587b182ffae)几乎就像编排者的编排者，它汇总不同地点的元数据，并在领域间展示端到端的生命线。
- en: Naturally it makes for an effective control plane where anyone can gather to
    debug failed pipelines, communicate, and recover — all without relying on a central
    Data Engineering Team who would otherwise be a bottleneck.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 自然地，它形成了一个有效的控制平面，任何人都可以聚集起来调试失败的管道，沟通，并恢复——所有这些都不依赖于中央数据工程团队，否则他们将成为瓶颈。
- en: There are clear analogies for this in software engineering. Often, code results
    in logs that are collated by a single tool such as DataDog. These platforms provide
    a single place to see everything happening (or not happening), alerts, and collaboration
    for incident resolution.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在软件工程中，对此有明显的类比。通常，代码会产生日志，这些日志由单个工具如DataDog汇总。这些平台提供了一个单一的地方来查看所有发生（或未发生）的事情、警报以及事件解决的协作。
- en: Summary
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Organisations are like families. As much as we like the idea of one, big, happy,
    self-sufficient family, there are often responsibilities we need to bear to make
    things work out initially.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 组织就像家庭一样。尽管我们都喜欢想象一个庞大、快乐、自给自足的家庭，但往往需要承担一些责任来使事情最初得以顺利进行。
- en: As they mature, members get closer to independence, like John’s kids. Others
    find their place as dependent but loyal stakeholders, like John’s parents.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 随着组织的成熟，成员们逐渐接近独立，就像约翰的孩子一样。其他人则找到了作为依赖但忠诚的股东的位置，就像约翰的父母一样。
- en: Organisations are no different. data teams are maturing away from do-ers in
    Centralised Teams to Enablers in Hub and Spoke architectures. Eventually, most
    organisations will have dozens if not hundreds of people who are pioneering Data
    and AI workflows in their own spokes.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 组织也不例外。数据团队正从集中式团队中的执行者成长为以中心和辐射架构中的赋能者。最终，大多数组织将拥有数十人甚至数百人，他们在各自的辐射区域中开创数据与人工智能工作流程。
- en: Once this happens, it’s likely that how Data and AI is used in small, agile
    organisations will resemble the complexity of much larger enterprises where collaboration
    and orchestration across different teams is inevitable.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦发生这种情况，小型敏捷组织使用数据和人工智能的方式可能会类似于大型企业中不同团队之间协作和协调的复杂性，这是不可避免的。
- en: Understanding where organisations are in relation to these patterns is imperative.
    Trying to force a Data-as-Product mindset on an immature company, or sticking
    to a large central team in a large and mature organisation will result in disaster.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 理解组织相对于这些模式的位置是至关重要的。试图将数据即产品的心态强加给一个不成熟的公司，或者在大型成熟组织中坚持一个大型的中央团队，将会导致灾难。
- en: Good luck 🍀
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 祝好运 🍀
