- en: 'LLaDA: The Diffusion Model That Could Redefine Language Generation'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/llada-the-diffusion-model-that-could-redefine-language-generation/](https://towardsdatascience.com/llada-the-diffusion-model-that-could-redefine-language-generation/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What if we could make language models think** more like humans**? Instead of
    writing one word at a time, what if they could sketch out their thoughts first,
    and gradually refine them?
  prefs: []
  type: TYPE_NORMAL
- en: 'This is exactly what Large Language Diffusion Models (LLaDA) introduces: a
    different approach to current text generation used in Large Language Models (LLMs).
    Unlike traditional autoregressive models (ARMs), which predict text sequentially,
    left to right, **LLaDA leverages a diffusion-like process to generate text.** Instead
    of generating tokens sequentially, it **progressively refines masked text until
    it forms a coherent response**.'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we will dive into how LLaDA works, why it matters, and how
    it could shape the next generation of LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: I hope you enjoy the article!
  prefs: []
  type: TYPE_NORMAL
- en: The current state of LLMs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To appreciate the innovation that LLaDA represents, we first need to understand
    how current large language models (LLMs) operate. Modern LLMs follow a two-step
    training process that has become an industry standard:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Pre-training**: The model learns general language patterns and knowledge
    by predicting the next token in massive text datasets through self-supervised
    learning.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Supervised Fine-Tuning (SFT)**: The model is refined on carefully curated
    data to improve its ability to follow instructions and generate useful outputs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Note that current LLMs often use RLHF as well to further refine the weights
    of the model, but this is not used by LLaDA so we will skip this step here.*'
  prefs: []
  type: TYPE_NORMAL
- en: These models, primarily based on the Transformer architecture, generate text **one
    token at a time** using next-token prediction.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/548d831e2f61bd655d513a513536e78e.png)'
  prefs: []
  type: TYPE_IMG
- en: Simplified Transformer architecture for text generation (Image by the author)
  prefs: []
  type: TYPE_NORMAL
- en: Here is a simplified illustration of how data passes through such a model. **Each
    token is embedded into a vector and is transformed through successive transformer
    layers**. In current LLMs (LLaMA, ChatGPT, DeepSeek, etc), a classification head
    is used only on the last token embedding to predict the next token in the sequence.
  prefs: []
  type: TYPE_NORMAL
- en: 'This works thanks to the concept of **masked self-attention**: each token attends
    to all the tokens that come before it. We will see later how LLaDA can get rid
    of the mask in its attention layers.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b1a741aa7f12b3a298af2b2ca9bf1d5d.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Attention process: input embeddings are multiplied byQuery, Key, and Value
    matrices to generate new embeddings (Image by the author, inspired by [3])'
  prefs: []
  type: TYPE_NORMAL
- en: '*If you want to learn more about Transformers, check out my article [here](https://towardsdatascience.com/transformers-how-do-they-transform-your-data-72d69e383e0d/#:~:text=We%20pass%20our%20data%20through,several%20(num_layers)%20encoder%20layers.)*.'
  prefs: []
  type: TYPE_NORMAL
- en: While this approach has led to impressive results, it also comes with significant
    limitations, some of which have motivated the development of LLaDA.
  prefs: []
  type: TYPE_NORMAL
- en: Current limitations of LLMs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Current LLMs face several critical challenges:'
  prefs: []
  type: TYPE_NORMAL
- en: Computational Inefficiency
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Imagine having to write a novel where **you can only think about one word at
    a time,** and for each word, you need to reread everything you’ve written so far.
    This is essentially how current LLMs operate — they predict one token at a time,
    requiring a complete processing of the previous sequence for each new token. Even
    with optimization techniques like KV caching, this process is **quite computationally
    expensive and time-consuming**.
  prefs: []
  type: TYPE_NORMAL
- en: Limited Bidirectional Reasoning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Traditional autoregressive models (ARMs) are like writers who could never look
    ahead or revise what they’ve written so far. **They can only predict future tokens
    based on past ones, which limits their ability to reason about relationships between
    different parts of the text.** As humans, we often have a general idea of what
    we want to say before writing it down, current LLMs lack this capability in some
    sense.
  prefs: []
  type: TYPE_NORMAL
- en: Amount of data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Existing models require **enormous amounts of training data** to achieve good
    performance, making them resource-intensive to develop and potentially limiting
    their applicability in specialized domains with limited data availability.
  prefs: []
  type: TYPE_NORMAL
- en: What is LLaDA
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LLaDA introduces a fundamentally different approach to language generation by
    replacing traditional autoregression with a **“diffusion-based”** process (we
    will dive later into why this is called “diffusion”).
  prefs: []
  type: TYPE_NORMAL
- en: Let’s understand how this works, step by step, starting with pre-training.
  prefs: []
  type: TYPE_NORMAL
- en: LLaDA pre-training
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Remember that we don’t need any “labeled” data during the pre-training phase.
    The objective is to feed a very large amount of raw text data into the model.
    For each text sequence, we do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: We fix a maximum length (similar to ARMs). Typically, this could be 4096 tokens.
    1% of the time, the lengths of sequences are randomly sampled between 1 and 4096
    and padded so that the model is also exposed to shorter sequences.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We randomly choose a “masking rate”. For example, one could pick 40%.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We mask each token with a probability of 0.4\. What does “masking” mean exactly?
    Well, we simply replace the token **with a special token**: **<MASK>**. As with
    any other token, this token is associated with a particular index and embedding
    vector that the model can process and interpret during training.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We then feed our entire sequence into our transformer-based model. This process
    transforms all the input embedding vectors into new embeddings. We **apply the
    classification head to each of the masked tokens** to get a prediction for each.
    Mathematically, our loss function averages cross-entropy losses over all the masked
    tokens in the sequence, as below:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/98d91a7429712cc343b09388179ac2bb.png)'
  prefs: []
  type: TYPE_IMG
- en: Loss function used for LLaDA (Image by the author)
  prefs: []
  type: TYPE_NORMAL
- en: 5\. And… we repeat this procedure for billions or trillions of text sequences.
  prefs: []
  type: TYPE_NORMAL
- en: '***Note, that unlike ARMs, LLaDA can fully utilize bidirectional dependencies
    in the text: it doesn’t require masking in attention layers anymore. However,
    this can come at an increased computational cost.***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Hopefully, you can see how the training phase itself (the flow of the data into
    the model) is very similar to any other LLMs. **We simply predict randomly masked
    tokens instead of predicting what comes next.**
  prefs: []
  type: TYPE_NORMAL
- en: LLaDA SFT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For **auto-regressive models**, SFT is very similar to pre-training, except
    that we have pairs of *(prompt, response) *and want to generate the response when
    giving the prompt as input.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is exactly the **same concept for LLaDA**! Mimicking the pre-training
    process: we simply pass the prompt and the response, mask random tokens **from
    the response only**, and feed the full sequence into the model, which **will predict
    missing tokens from the response**.'
  prefs: []
  type: TYPE_NORMAL
- en: The innovation in inference
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Innovation is where LLaDA gets more interesting, and truly utilizes the “diffusion”
    paradigm.
  prefs: []
  type: TYPE_NORMAL
- en: Until now, we always randomly masked some text as input and asked the model
    to predict these tokens. But during inference, **we only have access to the prompt **and
    we need to generate the entire response. You might think (and it’s not wrong),
    that the model has seen examples where the masking rate was very high (potentially
    1) during SFT, and it had to learn, somehow, how to **generate a full response
    from a prompt**.
  prefs: []
  type: TYPE_NORMAL
- en: However, generating the full response at once during inference will likely produce
    very poor results because the model lacks information. Instead, we need a method
    to **progressively refine predictions**, and that’s where the key idea of **‘remasking’ **comes
    in.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is how it works, at each step of the text generation process:'
  prefs: []
  type: TYPE_NORMAL
- en: Feed the current input to the model (this is the prompt, followed by **<MASK>** tokens)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The model generates one embedding for each input token. We get predictions
    for the **<MASK>** tokens only. And here is the important step: **we remask a
    portion of them**. In particular: we only keep the “best” tokens i.e. the ones **with
    the best predictions**, with the highest confidence.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can use this **partially unmasked sequence** as input in the next generation
    step and repeat until all tokens are unmasked.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can see that, interestingly, **we have much more control** over the generation
    process compared to ARMs: we could choose to remask 0 tokens (only one generation
    step), or we could decide to keep only the best token every time (as many steps
    as tokens in the response). Obviously, **there is a trade-off here between the
    quality of the predictions and inference time.**'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s illustrate that with a simple example (in that case, I choose to keep
    the best 2 tokens at every step)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cd737e9eac23bfaa39d75bdd2d542b84.png)'
  prefs: []
  type: TYPE_IMG
- en: LLaDA generation process example (Image by the author)
  prefs: []
  type: TYPE_NORMAL
- en: Note, in practice, the remasking step would work as follows. Instead of remasking
    a fixed number of tokens, **we would remask a proportion of s/t tokens over time,
    from t=1 down to 0, where s is in [0, t].** In particular, this means we remask
    fewer and fewer tokens as the number of generation steps increases.
  prefs: []
  type: TYPE_NORMAL
- en: '*Example*: if we want N sampling steps (so N discrete steps from t=1 down to
    t=1/N with steps of 1/N), taking s = (t-1/N) is a good choice, and ensures that
    s=0 at the end of the process.'
  prefs: []
  type: TYPE_NORMAL
- en: The image below summarizes the 3 steps described above. “Mask predictor” simply
    denotes the LLM (LLaDA), predicting masked tokens.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/62f3e98cfc4723145ee624b66f520c2a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Pre-training (a.), SFT (b.) and inference (c.) using LLaDA. (source: [1])'
  prefs: []
  type: TYPE_NORMAL
- en: Can autoregression and diffusion be combined?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Another clever idea developed in LLaDA is **to combine diffusion with traditional
    autoregressive generation to use the best of both worlds!** This is called **semi-autoregressive
    diffusion**.
  prefs: []
  type: TYPE_NORMAL
- en: Divide the generation process into blocks (for instance, 32 tokens in each block).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The objective is to **generate one block at a time** (like we would generate
    one token at a time in ARMs).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**For each block, we apply the diffusion logic** by progressively unmasking
    tokens to reveal the entire block. Then move on to predicting the next block.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/2c815bc543c2e7196f7bdf2ad7d261ce.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Semi-autoregressive process (source: [1])'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is a hybrid approach: we probably lose some of the “backward” generation
    and parallelization capabilities of the model, but **we better “guide” the model** towards
    the final output.'
  prefs: []
  type: TYPE_NORMAL
- en: I think this is a very interesting idea because it depends a lot on a hyperparameter
    (the number of blocks), that can be tuned. I imagine different tasks might benefit
    more from the backward generation process, while others might benefit more from
    the more “guided” generation from left to right (more on that in the last paragraph).
  prefs: []
  type: TYPE_NORMAL
- en: Why “Diffusion”?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I think it’s important to briefly explain where this term actually comes from.
    It reflects a similarity with **image diffusion models (like Dall-E)**, which
    have been very popular for image generation tasks.
  prefs: []
  type: TYPE_NORMAL
- en: In image diffusion, a model first adds noise to an image until it’s unrecognizable,
    then learns to reconstruct it step by step. LLaDA applies this idea to text **by
    masking tokens instead of adding noise**, and then progressively **unmasking them** to
    generate coherent language. In the context of image generation, the masking step
    is often called “noise scheduling”, and the reverse (remasking) is the “denoising”
    step.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/30b0299d6d2c83905569492fc51f17f8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'How do Diffusion Models work? (source: [2])'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can also see LLaDA as some type of **discrete** (non-continuous) diffusion
    model: we don’t add noise to tokens, but we “deactivate” some tokens by masking
    them, and the model learns how to unmask a portion of them.'
  prefs: []
  type: TYPE_NORMAL
- en: Results
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s go through *a few *of the interesting results of LLaDA.
  prefs: []
  type: TYPE_NORMAL
- en: '*You can find all the results in the paper. I chose to focus on what I find
    the most interesting here.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Training efficiency**: LLaDA shows similar performance to ARMs with the same
    number of parameters, but u**ses much fewer tokens** during training (and no RLHF)!
    For example, the 8B version uses around 2.3T tokens, compared to 15T for LLaMa3.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Using different block and answer lengths for different tasks**: for example,
    the block length is particularly large for the Math dataset, and the model demonstrates
    strong performance for this domain. This could suggest that mathematical reasoning
    may benefit more from the **diffusion-based and backward process**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/3dc977a788e10e83fdb75d37c66e3383.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: [1]'
  prefs: []
  type: TYPE_NORMAL
- en: Interestingly, LLaDA does better on the “Reversal poem completion task”. This
    task requires the model to **complete a poem in reverse order**, starting from
    the last lines and working backward. As expected, ARMs struggle due to their strict
    left-to-right generation process.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/6ae220f839128e0e85d75249d9050d3e.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: [1]'
  prefs: []
  type: TYPE_NORMAL
- en: 'LLaDA is not just an experimental alternative to ARMs: it shows real advantages
    in efficiency, structured reasoning, and bidirectional text generation.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I think LLaDA is a promising approach to language generation. Its ability to
    generate multiple tokens in parallel while maintaining global coherence could
    definitely lead to **more efficient training**, **better reasoning**, and **improved
    context understanding** with fewer computational resources.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond efficiency, I think LLaDA also brings a lot of **flexibility**. By adjusting
    parameters like the number of blocks generated, and the number of generation steps,
    it can **better adapt to different tasks and constraints**, making it a versatile
    tool for various language modeling needs, and allowing **more human control**.
    Diffusion models could also play an important role in pro-active AI and agentic
    systems by being able to reason more holistically.
  prefs: []
  type: TYPE_NORMAL
- en: As research into diffusion-based language models advances, LLaDA could become
    a useful step toward **more natural and efficient language models**. While it’s
    still early, I believe this shift from sequential to parallel generation is an
    interesting direction for AI development.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
