- en: What Would a Stoic Do? – An AI-Based Decision-Making Model
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/what-would-a-stoic-do-an-ai-based-decision-making-model-df01c86b7348/](https://towardsdatascience.com/what-would-a-stoic-do-an-ai-based-decision-making-model-df01c86b7348/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Deep Learning
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Photo by Roman Empire Times on Unsplash](../Images/4322626e63bc07828659eead345d536c.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
- en: Photo by [Roman Empire Times](https://unsplash.com/@romanempiretimes?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: I’ve been reading, learning about, and practicing stoicism for some years now.
    Ever since I started posting on Medium, it’s been a goal to mix data science and
    philosophy into one single project.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Merging both worlds is tough, however, but here I am finally trying it out.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: What you’ll read today is a decision-making model based on stoicisim. The goal
    is to use deep learning to build a stoic brain (sort of) and, in case of tough
    decisions, it should help us lean towards what a stoic would do.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: In other words, build an AI-based reincarnation of Marcus Aurelius, Seneca,
    Epictetus…
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s a big challenge though. I am not even an NLP engineer nor anything related.
    Can it really be done? Spoiler alert: yes. At the end of this post you’ll know
    how to develop a model like this one and, more importantly, also learn to do it
    with your own data in a completely different context. The end result will be a
    web-based chatbot built with a very simple Flask application.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: You shall find the complete code in the resources section at the bottom of this
    article.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: 'And it’s totally open source! Here’s a sneak peek:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '![StoicBot - Image by the author](../Images/1c5c11c8cedd20b819a6e855a4dfa9a9.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
- en: StoicBot – Image by the author
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Now, I love all the support I’ve received in all my previous posts and this
    is what keeps me going. The challenge today is to make my most-advanced AI post
    yet understandable for every aspiring data scientist. Any doubts you may have,
    use the comment section below.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the table of contents:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: What’s Stoicism? (just a brief intro, I promise)
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The RAG Model
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating and Populating the DB
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Time to Code
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Result
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Flaws and Potential Improvements
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What’s Stoicism?
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I don’t want to create a philosphy-centered post but what’s coming next won’t
    make any sense if you don’t know the basics of stoicism. Feel free to skip this
    section if you’re already familiar with it.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Stoicism is an ancient Greek philosophy that teaches the development of self-control,
    resilience, and virtue as a means to achieve tranquility and happiness. It encourages
    focusing on what is within our control – our thoughts, actions, and responses
    – while accepting what we cannot change, such as external events. Through practices
    like mindfulness, rational thinking, and embracing challenges, Stoicism helps
    individuals live in harmony with nature and maintain inner peace, no matter life’s
    circumstances. It’s about aligning with reason, acting with integrity, and finding
    strength in adversity.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 斯多葛主义是一种古老的希腊哲学，它教导通过培养自我控制、韧性和美德来实现平静和幸福。它鼓励关注我们所能控制的事情——我们的思想、行动和反应——同时接受我们无法改变的事情，例如外部事件。通过正念、理性思考和接受挑战等实践，斯多葛主义帮助个人与自然和谐相处，无论生活状况如何，都能保持内心的平静。这关乎与理性相一致，以正直行事，并在逆境中找到力量。
- en: It wasn’t that hard, was it? I promised to be brief!
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不难，对吧？我承诺要简短！
- en: The RAG Model
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RAG模型
- en: Let’s get technical. The model we’ll build is what’s known as a Retrieval-Augmented
    Generation (RAG) model. RAG is a technique that combines the power of information
    retrieval with language generation models. Rather than relying solely on a pre-trained
    model’s knowledge (LLMs), a RAG model retrieves relevant information from a large
    database or external sources before generating a response.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们变得技术一点。我们将构建的模型被称为检索增强生成（RAG）模型。RAG是一种结合信息检索和语言生成模型力量的技术。RAG模型在生成响应之前，会从大型数据库或外部来源检索相关信息，而不是仅仅依赖预训练模型的知识（LLMs）。
- en: 'This is powerful: we can leverage the strength of an LLM like Google’s BERT,
    OpenAI’s GPT or Claude and adapt it to our domain-specific data so we have a custom
    chatbot specific to our use case.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这很强大：我们可以利用像Google的BERT、OpenAI的GPT或Claude这样的LLM的力量，并将其适应到我们的特定领域数据，这样我们就有了一个针对我们用例的定制聊天机器人。
- en: 'Here’s how it works:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这是它的工作方式：
- en: '**Retrieval**: The model first searches a corpus or external knowledge base
    to find relevant pieces of information based on the input query.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**检索**：模型首先根据输入查询在语料库或外部知识库中搜索相关信息。'
- en: '**Augmentation**: The retrieved information is then used to enrich the model’s
    response, improving the relevance and accuracy of its answer.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**增强**：检索到的信息随后被用来丰富模型的响应，提高其答案的相关性和准确性。'
- en: '**Generation**: Finally, the model generates a response that incorporates both
    the retrieved information and its own learned knowledge.'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**生成**：最后，模型生成一个包含检索到的信息和自身学习知识的响应。'
- en: 'But a picture is worth a thousand words… So let’s see it graphically:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 但一张图片胜过千言万语……所以让我们用图形来看一下：
- en: '![Components of a RAG - Image by the author](../Images/6219f3dc47b56dfc3cf44140a392f473.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![RAG的组成部分——图片由作者提供](../Images/6219f3dc47b56dfc3cf44140a392f473.png)'
- en: Components of a RAG – Image by the author
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: RAG的组成部分——图片由作者提供
- en: 'Let’s dissect the whole process:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们剖析整个过程：
- en: '**User query**: no secret here, it’s just what the human like you or me could
    input to the chatbot.'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**用户查询**：这里没有秘密，这只是像你或我这样的人可以输入到聊天机器人中的内容。'
- en: '**Retriever query**: the retriever searches the collection of documents (usually
    a vectorized database) for all the texts relevant to the user’s question.'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**检索查询**：检索器在文档集合（通常是一个向量数据库）中搜索与用户问题相关的所有文本。'
- en: '**Retrieved documents**: once retrieved, they get transformed from vector to
    text.'
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**检索到的文档**：一旦检索到，它们就会从向量转换为文本。'
- en: '**Prompt Augmenting**: once the docs are retrieved, the prompt is sent to the
    LLM, which uses predefined settings, the user question and the retrieved docs.
    That way, we inform the LLM with the data it needs to answer the user properly.'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提示增强**：一旦文档被检索，提示就会被发送到LLM，LLM使用预定义的设置、用户问题和检索到的文档。这样，我们就向LLM提供了它需要的数据，以便正确回答用户。'
- en: '**Answer Generation**: The LLM generates the answer and it’s shown to the user.'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**答案生成**：LLM生成答案并展示给用户。'
- en: And this is how a RAG works! Or, at least, the one we’ll be building today.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是RAG的工作原理！或者至少，这是我们今天将要构建的那个。
- en: However, if the concept’s not clear yet, keep on reading because it’s almost
    time to code… But we should first store some data in the database.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果这个概念还不够清晰，请继续阅读，因为编码的时间几乎到了……但我们应该首先在数据库中存储一些数据。
- en: Creating and Populating the DB
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建和填充数据库
- en: I already mentioned the concept of vector DB… But what is it?
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经提到了向量数据库的概念……但那究竟是什么呢？
- en: 'Let’s first define a **vector**: Vectors are numerical representations of data,
    often generated by machine learning models, and they capture the semantic or contextual
    meaning of the data.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先定义一个**向量**：向量是数据的数值表示，通常由机器学习模型生成，并捕捉数据的语义或上下文意义。
- en: Then, a **vector database** is a specialized type of database designed to store,
    index, and retrieve high-dimensional vectors efficiently. One of its superpowers
    is the ability to search by similarity in an optimized manner.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，**向量数据库**是一种专门设计的数据库，用于高效地存储、索引和检索高维向量。它的一项超级能力是能够以优化的方式通过相似性进行搜索。
- en: 'Now you might be wondering: if vectors are numerical representations and we
    need to store text, why do we need vectors? And how do we translate text to vectors?
    Enter the **embedding model**.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可能想知道：如果向量是数值表示，我们需要存储文本，为什么还需要向量？我们如何将文本转换为向量？请进入**嵌入模型**。
- en: The embedding model takes some kind of input (text, sound, image), then uses
    processes it through layers of transformations (e.g. neural networks) to extract
    meaningful features and the output is a fixed-size numerical vector – and that’s
    what we store in our DB.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌入模型接收某种类型的输入（文本、声音、图像），然后通过层层的转换（例如神经网络）处理这些输入以提取有意义的特征，输出是一个固定大小的数值向量——这就是我们存储在数据库中的内容。
- en: Just to add another comment on the embedding model, embeddings are designed
    so that similar inputs (e.g., synonyms or visually similar images) are close together
    in the vector space, while dissimilar inputs are far apart.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 只是为了对嵌入模型再补充一点评论，嵌入的设计是为了使相似的输入（例如，同义词或视觉上相似的形象）在向量空间中靠近，而不同的输入则相隔较远。
- en: This is key.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这很关键。
- en: Now let’s create and populate that DB. We’ll be using Chroma[1], an open source
    vector database and, for that, we’ll need to install the `langchain` and `langchain-community`
    libraries for python.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们创建并填充那个数据库。我们将使用Chroma[1]，一个开源的向量数据库，为此，我们需要为Python安装`langchain`和`langchain-community`库。
- en: 'But we also need the data, right? Let’s keep up with the open sources: Project
    Gutenberg[2]. It’s a website with free ebooks and texts to download, whose U.S.
    Copyright has expired. And the old stoic books are in there. So here are three
    you could download:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们还需要数据，对吧？让我们跟上开源项目：古腾堡计划[2]。这是一个提供免费电子书和文本下载的网站，其美国版权已过期。其中也包括了古老的斯多葛派书籍。所以这里有三个你可以下载的：
- en: Meditations, by Marcus Aurelius.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《沉思录》，作者：马可·奥勒留。
- en: The Enchiridion, by Epictetus.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《手册》，作者：爱比克泰德。
- en: Seneca’s Morals of a Happy Life, Benefits, Anger and Clemency, by Seneca
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 塞涅卡的《幸福生活格言》、利益、愤怒与宽容，作者：塞涅卡
- en: 'Download them as TXT and store them in your data folder. Now, here’s the code
    taking care of the DB creation and data insertion:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 将它们作为TXT文件下载，并存储在你的数据文件夹中。现在，这是负责数据库创建和数据插入的代码：
- en: '[PRE0]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: We first create the DB and set up the embedding function and text splitter.
    Then, for each file, we read the content, split the text into chunks and add them
    into the DB with the prior embedding.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先创建数据库并设置嵌入函数和文本分割器。然后，对于每个文件，我们读取内容，将文本分割成块，并使用先前的嵌入将它们添加到数据库中。
- en: That simple.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 简单至极。
- en: Now we’re ready to start building the RAG and start using the ancient knowledge
    that we just stored.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们准备好开始构建RAG并开始使用我们刚刚存储的古老知识。
- en: Time to Code
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编码时间
- en: 'As there are several parts to take care of, let’s follow the same order as
    the one used to define the three core parts of the RAG:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 由于有多个部分需要处理，让我们遵循与定义RAG三个核心部分相同的顺序：
- en: '**Retrieval**'
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**检索**'
- en: 'Setting up the retriever is as easy as initializing the DB and using the `as_retriever()`
    function:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 设置检索器就像初始化数据库并使用`as_retriever()`函数一样简单：
- en: '[PRE1]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Augmentation**'
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**增强**'
- en: 'We’ll have a pre-defined prompt that we’ll augment with the user query and
    the context retrieved from DB:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将有一个预定义的提示，我们将通过用户查询和从数据库检索到的上下文来增强它：
- en: '[PRE2]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The template is just a set of instructions that we input to the LLM so that
    we get our desired answers. You can be as creative as you want here, I just tried
    to keep it simple. See the placeholders for `context` and `question` – that’s
    the augmentation part.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 模板只是一组我们输入到LLM（大型语言模型）中的指令，以便我们得到期望的答案。你可以发挥创意，我只是尽量让它简单。看看`context`和`question`的占位符——这就是增强的部分。
- en: '**Generation**'
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**生成**'
- en: The LLM is the one taking care of generating text. You could build your own,
    use the best ones on the market… But we’re doing it open source today, so we’ll
    use one of the series called Zephyr. More concretely, we’ll use the `zephyr-7b-beta`
    model[3].
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: LLM是负责生成文本的部分。您可以自己构建一个，使用市场上最好的一个……但今天我们做的是开源的，所以我们将使用一个名为Zephyr的系列中的一个。更具体地说，我们将使用`zephyr-7b-beta`模型[3]。
- en: 'And we’ll keep on using HuggingFace classes from `langchain-community` package
    (keep in mind that you’ll need your HuggingFace API token, it’s free):'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将继续使用来自`langchain-community`包的HuggingFace类（请注意，您将需要您的HuggingFace API令牌，它是免费的）：
- en: '[PRE3]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The most interesting part resided in the model_kwargs argument. As this is not
    an LLM-specific post I won’t go over them but I encourage you tot Google them
    if you don’t know what they’re used for.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 最有趣的部分在于`model_kwargs`参数。由于这不是一个特定于LLM的文章，我不会详细说明它们，但如果您不知道它们是用来做什么的，我鼓励您去Google搜索一下。
- en: '**Chaining It All**'
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**整合所有内容**'
- en: 'Nice, now we’ve created all three parts of a RAG but how do we put them into
    practice? We’ll create a pipeline and invoke it to generate the answer:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 很好，现在我们已经创建了RAG的三个部分，但我们如何将它们付诸实践？我们将创建一个pipeline并调用它来生成答案：
- en: '[PRE4]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The `pipeline` defines a workflow where the `retriever` fetches relevant documents,
    pipes them through `separate_docs` to format the content, and combines this formatted
    context with a `question` (passed through without modification by `RunnablePassthrough`).
    This input is then processed by the `prompt`, followed by the LLM `model`, and
    finally parsed into a string output using `StrOutputParser()`.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '`pipeline`定义了一个工作流程，其中`retriever`检索相关文档，通过`separate_docs`将它们格式化，然后将格式化后的上下文与一个`question`（通过`RunnablePassthrough`未修改地传递）结合。然后，这个输入被`prompt`处理，接着是LLM
    `model`，最后使用`StrOutputParser()`解析成一个字符串输出。'
- en: 'And just like that, we built our simplest RAG. Here’s the full code:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样，我们构建了我们最简单的RAG。以下是完整的代码：
