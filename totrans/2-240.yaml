  type: TYPE_NORMAL
- en: '[1] Google Python Style Guide: [https://google.github.io/styleguide/pyguide.html](https://google.github.io/styleguide/pyguide.html)
    make html'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] NumPy Style Guide: [https://numpydoc.readthedocs.io/en/latest/format.html](https://numpydoc.readthedocs.io/en/latest/format.html)'
  prefs: []
  type: TYPE_NORMAL
- en: '[3] reStructuredText Style Guide: [https://docutils.sourceforge.io/rst.html](https://docutils.sourceforge.io/rst.html)'
  prefs: []
  type: TYPE_NORMAL
- en: '[4] Post “Step by Step Basics: Code Autodocumentation”: [https://towardsdatascience.com/step-by-step-basics-code-autodocumentation-fa0d9ae4ac71](https://towardsdatascience.com/step-by-step-basics-code-autodocumentation-fa0d9ae4ac71)'
  prefs: []
