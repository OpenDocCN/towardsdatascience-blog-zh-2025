- en: Apply Sphinx’s Functionality to Create Documentation for Your Next Data Science
    Project
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/apply-sphinxs-functionality-to-create-documentation-for-your-next-data-science-project/](https://towardsdatascience.com/apply-sphinxs-functionality-to-create-documentation-for-your-next-data-science-project/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1750137818137" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Well-written documentation is crucial for almost any data science project as
    it enhances clarity, facilitates collaboration, and ensures reproducibility. Clear
    and concise documentation provides context for the project’s objectives, methodologies,
    and findings, making it easier for other team members (especially, newbies) and
    stakeholders to understand the meaning behind work done. Furthermore, documentation
    serves as a reference for future enhancements or troubleshooting, reducing time
    spent on re-explaining or even refreshing the main concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Sounds attractive, isn’t it? But do you know that you can create functional
    documentation via Sphinx documentation tool in a consistent style simply by using
    docstrings? If you don’t know too much about Sphinx’s functionality yet, this
    post can help you to figure it out.
  prefs: []
  type: TYPE_NORMAL
- en: '***Few words about docstrings***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Docstrings are the comment blocks that appear in any class, class method, and
    function within the code.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Three main docstring formats are officially supported via Sphinx: Google [[1](https://google.github.io/styleguide/pyguide.html)],
    NumPy [[2](https://numpydoc.readthedocs.io/en/latest/format.html)], and reStructuredText
    (reST) [[3](https://docutils.sourceforge.io/rst.html)]. Which one to choose is
    up to you, but in this post I’ll work with the reST format, because of its versatility.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In this article, I’ll introduce you to three most impressive functionalities
    of Sphinx’s tool, which can automatically generate documentation for Python modules.
    Before considering these three cases I assume that you’ve already created a documentation
    directory and installed Sphinx on your machine. If not, please, read the TDS article
    on how to install and set up Sphinx first [[4](https://towardsdatascience.com/step-by-step-basics-code-autodocumentation-fa0d9ae4ac71/)].
  prefs: []
  type: TYPE_NORMAL
- en: After installing Sphinx, create a new Sphinx project by command `sphinx-quickstart`.
    Follow the prompts to set up your project. This will populate your directory with
    several files, including `conf.py` and `index.rst`.
  prefs: []
  type: TYPE_NORMAL
- en: Case 1\. Use cross-references for quick navigation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: According to the official website of Sphinx, one of its most useful features
    is creating automatic cross-references through semantic cross-referencing roles.
    Cross-references can be used to link to functions, classes, modules, and even
    sections within your documentation.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, the cross reference to an object description, such as `` :func:`.name`
    ``, will create a link to the place where `name()` is documented.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s examine how it is in practice. Imagine that we have a simple Python module
    called `mymodule.py` with two basic functions inside.
  prefs: []
  type: TYPE_NORMAL
- en: 'First function is about summing two numbers:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Second is about subtracting one number from the other:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'It’s possible to use `:func:` to create cross-references to these two functions
    within the documentation (`:func:.add`, `:func:.subtract`). Let’s create another
    file (`main.py`), which will use the functions from `mymodule.py`. You can add
    docstrings here if you want to document this file as well:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'To automatically generate documentation from your code, you can enable the
    autodoc extension in your `conf.py` file. Add `''sphinx.ext.autodoc''` to the
    extensions list:'
  prefs: []
  type: TYPE_NORMAL
- en: '`extensions = [''sphinx.ext.autodoc'']`'
  prefs: []
  type: TYPE_NORMAL
- en: 'Make sure to include the path to your module so that Sphinx can find it. Add
    the following lines at the top of `conf.py`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Then we need to generate `.rst` files of our Python packages. They are Sphinx’s
    own format and need to be generated before making HTML-files. It’s faster to use
    the `apidoc` command to deal with `.rst`. Run in the terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Here `-o source` defines the directory to place the output files, and `src`
    sets the location of Python modules we need to describe. After running this command,
    newly generated `.rst` files will appear in your folder.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, navigate to your documentation’s folder and run:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'This will generate HTML documentation in the `_build/html` directory. Open
    the generated HTML files in a web browser. You should see your documentation with
    cross-references to the add and subtract functions:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d2de2a62010c6b29cf54db94e65373cb.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Click here on the function names and you will be taken to a page with their
    description:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d06bba879fcb2654aef27e33cbfafa51.png)'
  prefs: []
  type: TYPE_IMG
- en: Case 2\. Add links to external resources
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In addition to the ability to insert cross-references, Sphinx allows you to
    add links to external resources. Below is an example of how you can create a function
    in `mymodule.py` file that utilizes the built-in `abs()` function to demonstrate
    how it’s possible to add a link to the official Python documentation in its docstrings:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Running `make html` command for this case provide you the following output:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/671e67a591be67024045314ccc7ee32d.png)'
  prefs: []
  type: TYPE_IMG
- en: Case 3\. Create special directives and examples for better visual effects
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In Sphinx you can create short paragraphs with different admonitions, messages,
    and warnings, as well as with concrete examples of obtained results. Let’s enrich
    our module with a note directive and example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'And the resulting HTML page looks as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/54d95f0323d93ef867c40c3474ed9165.png)'
  prefs: []
  type: TYPE_IMG
- en: Therefore, for adding any example within the docstrings you need to use `>>>`.
    And to specify a note there, just use `.. note::`. A good thing is that you might
    add links to external resources inside the note.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Thorough documentation allows others not only to better understand the subject
    of reading, but to deeply interact with it, which is essential for technical and
    scientific documentation. Overall, good documentation promotes efficient knowledge
    transfer and helps maintain the project’s longevity, ultimately contributing to
    its success and impact.
  prefs: []
  type: TYPE_NORMAL
- en: In this post we considered how to create a simple, yet well-written documentation
    using Sphinx documentation tool. Not only did we learn how to create a Sphinx
    project from scratch, but also realized how to use its functionality, including
    cross-references, links to external resources, and special directives. Hope, you
    found this knowledge helpful for yourself!
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: all images in the article were made by author.'
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
