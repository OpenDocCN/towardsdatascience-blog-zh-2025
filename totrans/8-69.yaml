- en: How to Tell Among Two Regression Models with Statistical Significance
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-tell-among-two-regression-models-with-statistical-significance-e58d8ce5af17/](https://towardsdatascience.com/how-to-tell-among-two-regression-models-with-statistical-significance-e58d8ce5af17/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When analyzing data, one often needs to compare two regression models to determine
    which one fits best to a piece of data. Often, one model is a *simpler* version
    of a *more complex* model that includes additional parameters. However, more parameters
    do not always guarantee that a more complex model is actually better, as they
    could simply overfit the data.
  prefs: []
  type: TYPE_NORMAL
- en: To determine whether the added complexity is **statistically significant**,
    we can use what’s called the **F-test for nested models**. This statistical technique
    evaluates whether the reduction in the Residual Sum of Squares (RSS) due to the
    additional parameters is meaningful or just due to chance.
  prefs: []
  type: TYPE_NORMAL
- en: In this article I explain the F-test for nested models and then I present a
    step-by-step algorithm, demonstrate its implementation using pseudocode, and provide
    Matlab code that you can run right away or re-implement in your favorite system
    (here I chose Matlab because it gave me quick access to statistics and fitting
    functions, on which I didn’t want to spend time). Throughout the article we will
    see examples of the F-test for nested models at work in a couple of settings including
    some examples I built into the example Matlab code.
  prefs: []
  type: TYPE_NORMAL
- en: The F-test for Nested Models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What Are Nested Models?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Two models are **nested** if the simpler model is a special case of the more
    complex model. In other words, the simpler model can be obtained from the complex
    model by setting some parameters to zero or fixing them; or simply just by removing
    one or more terms.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, [in this paper](https://www.nature.com/articles/s42004-024-01127-0)
    the authors followed a spectroscopic observable (from an [NMR experiment, learn
    about it here](https://medium.com/advances-in-biological-science/nuclear-magnetic-resonance-spectroscopy-the-overlooked-powerhouse-of-biology-chapter-1-7b3d74dad714))
    vs. concentration, and they found that most of the times the dependence is linear
    but in some cases it is a combination of linear plus hyperbolic saturation with
    a binding-like shape:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure adapted by author from this paper whose license allows reuse.](../Images/2ce063732bef30c91fd34ba57ad0de2d.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure adapted by author from [this paper](https://www.nature.com/articles/s42004-024-01127-0)
    whose license allows reuse.
  prefs: []
  type: TYPE_NORMAL
- en: 'This means one can fit either a simple model which looks just like a linear
    regression:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c84415265576d1d3e0f8d3217b652313.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Or a more complex that extends the simpler one by adding the binding term:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9cd9293e143fb884765fb8e9f0794c46.png)'
  prefs: []
  type: TYPE_IMG
- en: In this case, the simple model has two parameters, and the complex model has
    two more parameters inside a term that simply extends from the linear one. And
    if you remove the hyperbolic binding term, the complex model reduces to the simpler
    model, making these two models nested.
  prefs: []
  type: TYPE_NORMAL
- en: How the F-test Works
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The F-test compares the Residual Sum of Squares (RSS) of two models to test
    if the reduction in RSS achieved by the complex model is statistically significant.
    The RSS measures the total squared differences between the observed data and the
    fitted model, and we compare the RSS for each model using an [F-statistic (Snedecor’s
    F)](https://en.wikipedia.org/wiki/F-distribution) computed as:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7a300ff6e76da05241278aed3f83f4c1.png)'
  prefs: []
  type: TYPE_IMG
- en: where…
  prefs: []
  type: TYPE_NORMAL
- en: '*RSS 1* and *RSS 2* are the RSS for the simpler (1) and complex (2) models
    (note that subtracting in this order ensures that the difference is equal to or
    larger than zero)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*p2* and *p1* are the numbers of parameters in each model, here 4 and 2 respectively.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*n* is the number of points we are fitting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The F-statistic follows an **F-distribution** with (numerator) and (denominator)
    degrees of freedom, that we can look up in a table or get with a function in most
    programs and libraries for statistics. From this, a p-value can be obtained to
    determine statistical significance.
  prefs: []
  type: TYPE_NORMAL
- en: Interpreting the F-test
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Nothing out of the ordinary. If the **p-value < some threshold** (e.g., 0.05),
    the complex model fits the data significantly better than the simpler model. Otherwise,
    the simpler model is sufficient.
  prefs: []
  type: TYPE_NORMAL
- en: 'By the way, at this point you might be interested in checking this article
    about statistical significance:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Rethinking Statistical Significance**](https://towardsdatascience.com/rethinking-statistical-significance-a6150f588b9a)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Algorithm for Model Comparison
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The step-by-step algorithm for comparing two nested models is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Define the two models**: Simple model with fewer parameters; complex model
    with additional parameters, that includes the simple model under some circumstance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Fit both models to the data** to estimate their parameters and compute their
    RSSs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Compute the F-statistic** from the RSS values, as indicated.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Calculate the p-value** using the F-distribution and check significance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
