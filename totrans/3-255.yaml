- en: 'Learnings from a Machine Learning Engineer — Part 3: The Evaluation'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器学习工程师的学习经验 — 第3部分：评估
- en: 原文：[https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/)
- en: In this third part of my series, I will explore the evaluation process which
    is a critical piece that will lead to a cleaner data set and elevate your model
    performance. We will see the difference between evaluation of a **trained** model
    (one not yet in production), and evaluation of a **deployed** model (one making
    real-world predictions).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本系列的第三部分，我将探讨评估过程，这是至关重要的一个环节，将导致数据集更加干净，并提升你的模型性能。我们将看到对**训练**模型（尚未投入生产的模型）的评估与对**部署**模型（进行实际预测的模型）的评估之间的区别。
- en: In [Part 1](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/),
    I discussed the process of labelling your image data that you use in your image
    classification project. I showed how to define “good” images and create sub-classes.
    In [Part 2](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-2-the-data-sets/),
    I went over various data sets, beyond the usual train-validation-test sets, such
    as benchmark sets, plus how to handle synthetic data and duplicate images.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在[第1部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/)中，我讨论了你在图像分类项目中使用的图像数据的标签过程。我展示了如何定义“好”图片并创建子类。在[第2部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-2-the-data-sets/)中，我概述了各种数据集，包括通常的训练-验证-测试集以外的基准集，以及如何处理合成数据和重复图片。
- en: '**Evaluation of the trained model**'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**训练模型的评估**'
- en: As machine learning engineers we look at accuracy, F1, log loss, and other metrics
    to decide if a model is ready to move to production. These are all important measures,
    but from my experience, these scores can be deceiving especially as the number
    of classes grows.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 作为机器学习工程师，我们关注准确率、F1、对数损失和其他指标，以决定模型是否准备好投入生产。这些都是重要的衡量标准，但根据我的经验，随着类别数量的增加，这些分数可能会具有欺骗性。
- en: Although it can be time consuming, I find it very important to manually review
    the images that the model gets **wrong**, as well as the images that the model
    gives a **low** softmax “confidence” score to. This means adding a step immediately
    after your training run completes to calculate scores for **all** images — training,
    validation, test, and the benchmark sets. You only need to bring up for manual
    review the ones that the model had problems with. This should only be a small
    percentage of the total number of images. See the Double-check process below
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这可能很耗时，但我认为手动审查模型判断错误的图片以及模型给出低**softmax**“置信度”分的图片非常重要。这意味着在训练运行完成后立即添加一个步骤来计算所有图片的分数——训练、验证、测试和基准集。你只需要手动审查模型有问题的那些图片。这应该只占总图片数量的一小部分。请参阅下面的双重检查过程。
- en: 'What you do during the manual evaluation is to put yourself in a “**training
    mindset**” to ensure that the labelling standards are being followed that you
    setup in [Part 1](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/).
    Ask yourself:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在手动评估过程中，你需要将自己置于“**训练心态**”，以确保遵循你在[第1部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/)中设置的标签标准。问问自己：
- en: “Is this a good image?” Is the subject front and center, and can you clearly
    see all the features?
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “这是一张好图片吗？”主题是否位于中心，你是否可以清楚地看到所有特征？
- en: “Is this the correct label?” Don’t be surprised if you find wrong labels.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “这个标签正确吗？”如果你发现错误的标签，请不要感到惊讶。
- en: 'You can either remove the bad images or fix the labels if they are wrong. Otherwise
    you can keep them in the data set and force the model to do better next time.
    Other questions I ask are:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以选择移除不良图片或修正错误的标签。否则，你可以将它们保留在数据集中，并迫使模型在下次做得更好。我还问了一些其他问题：
- en: “Why did the model get this wrong?”
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为什么模型会犯这个错误？”
- en: “Why did this image get a low score?”
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为什么这张图片得分低？”
- en: “What is it about the image that caused confusion?”
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “是什么让这张图片引起了混淆？”
- en: Sometimes the answer has nothing to do with **that** specific image. Frequently,
    it has to do with the **other** images, either in the ground truth class or in
    the predicted class. It is worth the effort to Double-check all images in both
    sets if you see a consistently bad guess. Again, don’t be surprised if you find
    poor images or wrong labels.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候答案与**那个**特定的图像无关。经常，它与**其他**图像有关，无论是在真实类别中还是在预测类别中。如果你看到持续错误的猜测，检查这两组中的所有图像都是值得努力的。再次提醒，如果你发现图像质量差或标签错误，请不要感到惊讶。
- en: '**Weighted evaluation**'
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**加权评估**'
- en: When doing the evaluation of the trained model (above), we apply a lot of subjective
    analysis — “Why did the model get this wrong?” and “Is this a good image?” From
    these, you may only get a **gut feeling**.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在评估训练好的模型（上面）时，我们应用了很多主观分析——“为什么模型会犯这个错误？”和“这是一张好图片吗？”从这些分析中，你可能只能得到一种**直觉**。
- en: Frequently, I will decide to hold off moving a model forward to production based
    on that gut feel. But how can you justify to your manager that you want to hit
    the brakes? This is where putting a more **objective** analysis comes in by creating
    a weighted average of the softmax “confidence” scores.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 经常，我会基于直觉决定推迟将模型推向生产。但是，你如何向你的经理证明你想踩刹车呢？这就是通过创建softmax“置信度”分数的加权平均来引入更**客观**分析的地方。
- en: In order to apply a weighted evaluation, we need to identify sets of classes
    that deserve adjustments to the score. Here is where I create a list of “commonly
    confused” classes.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了应用加权评估，我们需要识别需要调整分数的类别集合。在这里，我创建了一个“常见混淆”类别的列表。
- en: '**Commonly confused classes**'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**常见混淆类别**'
- en: Certain animals at our zoo can easily be mistaken. For example, African elephants
    and Asian elephants have different ear shapes. If your model gets these two mixed
    up, that is not as bad as guessing a giraffe! So perhaps you give partial credit
    here. You and your subject matter experts (SMEs) can come up with a list of these
    pairs and a weighted adjustment for each.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们动物园中的一些动物很容易混淆。例如，非洲象和亚洲象的耳朵形状不同。如果你的模型将这两个搞混，这并不比猜到长颈鹿更糟糕！所以也许你可以在这里给予部分信用。你可以和你的主题专家（SMEs）一起制定一个这些配对和每个配对的加权调整列表。
- en: '![](../Images/491be195007e5508568a795437d993fe.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/491be195007e5508568a795437d993fe.png)'
- en: Photo by [Matt Bango](https://unsplash.com/@mattbango) on [Unsplash](https://unsplash.com/)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Matt Bango](https://unsplash.com/@mattbango)在[Unsplash](https://unsplash.com/)提供
- en: '![](../Images/5c92470572575d055362e03e7130a104.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5c92470572575d055362e03e7130a104.png)'
- en: Photo by [Mathew Krizmanich](https://unsplash.com/@matkrizmanich) on [Unsplash](https://unsplash.com/)
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Mathew Krizmanich](https://unsplash.com/@matkrizmanich)在[Unsplash](https://unsplash.com/)提供
- en: This weight can be factored into a modified cross-entropy loss function in the
    equation below. The back half of this equation will reduce the impact of being
    wrong for specific pairs of ground truth and prediction by using the “weight”
    function as a lookup. By default, the weighted adjustment would be 1 for all pairings,
    and the commonly confused classes would get something like 0.5.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这个权重可以纳入以下方程中修改后的交叉熵损失函数。方程的后半部分将通过使用“权重”函数作为查找来减少特定真实和预测对的错误影响。默认情况下，加权调整对所有配对都是1，而常见混淆的类别会得到类似0.5的值。
- en: In other words, it’s better to be unsure (have a **lower** confidence score)
    when you are wrong, compared to being super confident and wrong.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，当你错误的时候，不如不确定（拥有较低的置信度分数），相比于非常自信却错误。
- en: '![](../Images/129c3f55822fe313a87452f383e8507d.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/129c3f55822fe313a87452f383e8507d.png)'
- en: Modified cross-entropy loss function, image by author
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 修改后的交叉熵损失函数，图片由作者提供
- en: Once this weighted log loss is calculated, I can compare to previous training
    runs to see if the new model is ready for production.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦计算出这个加权对数损失，我就可以将其与之前的训练运行进行比较，以查看新模型是否准备好投入生产。
- en: '**Confidence threshold report**'
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**置信度阈值报告**'
- en: Another valuable measure that incorporates the confidence threshold (in my example,
    95) is to report on accuracy and false positive rates. Recall that when we apply
    the confidence threshold before presenting results, we help reduce false positives
    from being shown to the end user.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个包含置信度阈值的（在我的例子中是95）有价值的度量是报告准确率和假阳性率。记住，在我们将置信度阈值应用于结果展示之前，我们有助于减少假阳性对最终用户的影响。
- en: In this table, we look at the breakdown of “true positive above 95” for each
    data set. We get a sense that when a “good” picture comes through (like the ones
    from our train-validation-test set) it is very likely to surpass the threshold,
    thus the user is “happy” with the outcome. Conversely, the “false positive above
    95” is extremely low for good pictures, thus only a small number of our users
    will be “sad” about the results.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个表格中，我们查看每个数据集中“高于95的真实阳性”的分解情况。我们可以感觉到，当“好的”图片出现（如我们训练-验证-测试集中的图片）时，它很可能超过阈值，因此用户对结果“满意”。相反，“高于95的假阳性”对于好图片来说非常低，因此只有少数用户会对结果“失望”。
- en: '![](../Images/1c594fc5806314855ec5409d787a67e4.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1c594fc5806314855ec5409d787a67e4.png)'
- en: Example Confidence Threshold Report, image by author
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 示例置信度阈值报告，图片由作者提供
- en: We expect the train-validation-test set results to be exceptional since our
    data is curated. So, as long as people take “good” pictures, the model should
    do very well. But to get a sense of how it does on extreme situations, let’s take
    a look at our benchmarks.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们期望训练-验证-测试集的结果会非常出色，因为我们的数据是经过精心挑选的。所以，只要人们拍摄“好的”图片，模型应该表现得很好。但要了解它在极端情况下的表现，让我们看看我们的基准。
- en: The “difficult” benchmark has more modest true positive and false positive rates,
    which reflects the fact that the images are more challenging. These values are
    much easier to compare across training runs, so that lets me set a min/max target.
    So for example, if I target a minimum of 80% for true positive, and maximum of
    5% for false positive on this benchmark, then I can feel confident moving this
    to production.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: “困难”的基准具有更适度的真实阳性和假阳性率，这反映了图像更具挑战性的事实。这些值在训练运行之间更容易比较，因此我可以设定一个最小/最大目标。例如，如果我为真实阳性设定一个最小目标为80%，为假阳性设定一个最大目标为5%，那么我可以有信心将其移至生产环境。
- en: The “out-of-scope” benchmark has no true positive rate because **none** of the
    images belong to any class the model can identify. Remember, we picked things
    like a bag of popcorn, etc., that are not zoo animals, so there cannot be any
    true positives. But we do get a false positive rate, which means the model gave
    a confident score to that bag of popcorn as some animal. And if we set a target
    maximum of 10% for this benchmark, then we may not want to move it to production.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: “超出范围”的基准没有真实阳性率，因为**没有任何**图片属于模型可以识别的任何类别。记住，我们选择了像爆米花袋等不属于动物园动物的东西，所以不可能有任何真实阳性。但我们确实得到了一个假阳性率，这意味着模型对这个爆米花袋给出了一个自信的分数，认为它是一种动物。如果我们为这个基准设定一个目标最大值为10%，那么我们可能不想将其移至生产环境。
- en: '![](../Images/e743dc4eca6595938df9b7219e73e202.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e743dc4eca6595938df9b7219e73e202.png)'
- en: Photo by [Linus Mimietz](https://unsplash.com/@linusmimietz) on [Unsplash](https://unsplash.com/)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Linus Mimietz](https://unsplash.com/@linusmimietz)在[Unsplash](https://unsplash.com/)上提供
- en: Right now, you may be thinking, “Well, what animal did it pick for the bag of
    popcorn?” Excellent question! Now you understand the importance of doing a manual
    review of the images that get bad results.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可能正在想，“嗯，它为爆米花袋选择了哪种动物？”这是一个很好的问题！现在你理解了手动审查得到不良结果的图片的重要性。
- en: '**Evaluation of the deployed model**'
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**已部署模型的评估**'
- en: The evaluation that I described above applies to a model immediately after **training**.
    Now, you want to evaluate how your model is doing in the **real world**. The process
    is similar, but requires you to shift to a “**production mindset**” and asking
    yourself, “Did the model get this correct?” and “Should it have gotten this correct?”
    and “Did we tell the user the right thing?”
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我上面描述的评估适用于**训练**后的模型。现在，你想要评估你的模型在**现实世界**中的表现。过程类似，但需要你转换到一个“**生产心态**”，并问自己，“模型是否得到了正确的结果？”“它应该得到正确的结果吗？”“我们是否告诉用户正确的事情？”
- en: So, imagine that you are logging in for the morning — after sipping on your [cold
    brew coffee](https://medium.com/@dmartin0409/cold-brew-coffee-0aabd53a1f3e), of
    course — and are presented with 500 images that your zoo guests took yesterday
    of different animals. Your job is to determine how satisfied the guests were using
    your model to identify the zoo animals.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你早上登录——当然是在啜饮你的[cold brew coffee](https://medium.com/@dmartin0409/cold-brew-coffee-0aabd53a1f3e)之后——面前展示的是500张你昨天动物园游客拍摄的不同动物的图片。你的任务是确定游客使用你的模型识别动物园动物时的满意度。
- en: Using the softmax “confidence” score for each image, we have a threshold before
    presenting results. Above the threshold, we tell the guest what the model predicted.
    I’ll call this the “happy path”. And below the threshold is the “sad path” where
    we ask them to try again.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 使用每个图像的softmax“置信度”分数，我们在呈现结果之前有一个阈值。高于阈值，我们告诉客人模型预测了什么。我将称之为“快乐路径”。低于阈值的是“悲伤路径”，我们要求他们再试一次。
- en: Your review interface will first show you all the “happy path” images one at
    a time. This is where you ask yourself, “Did we get this right?” Hopefully, yes!
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你的审查界面首先会一次显示所有“快乐路径”图像。这是你问自己的地方，“我们做对了吗？”希望如此！
- en: 'But if not, this is where things get tricky. So now you have to ask, “Why not?”
    Here are some things that it could be:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果不是，这里事情就变得棘手了。所以现在你必须问，“为什么不是？”这里有一些可能的原因：
- en: “Bad” picture — Poor lighting, bad angle, zoomed out, etc — refer to your labelling
    standards.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “坏”图片 —— 光线差、角度不好、缩放过大等——参考你的标注标准。
- en: Out-of-scope — It’s a zoo animal, but unfortunately one that isn’t found in **this** zoo.
    Maybe it belongs to another zoo (your guest likes to travel and try out your app).
    Consider adding these to your data set.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 范围外 —— 它是动物园的动物，但不幸的是，它并不在这个动物园里。也许它属于另一个动物园（你的客人喜欢旅行并尝试你的应用程序）。考虑将这些添加到你的数据集中。
- en: Out-of-scope — It’s not a zoo animal. It could be an animal in your zoo, but
    not one typically *contained* there, like a neighborhood sparrow or mallard duck.
    This might be a candidate to add.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 范围外 —— 它不是动物园的动物。它可能是你动物园里的动物，但不是通常*包含*在那里的动物，比如邻居的麻雀或野鸭。这可能是一个添加的候选者。
- en: Out-of-scope — It’s something found in the zoo. A zoo usually has interesting
    trees and shrubs, so people might try to identify those. Another candidate to
    add.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 范围外 —— 它是动物园里发现的某物。动物园通常有有趣的树木和灌木，所以人们可能会尝试识别它们。这可能是一个添加的候选者。
- en: Prankster — Completely out-of-scope. Because people like to play with technology,
    there’s the possibility you have a prankster that took a picture of a bag of popcorn,
    or a soft drink cup, or even a selfie. These are hard to prevent, but hopefully
    get a low enough score (below the threshold) so the model did not identify it
    as a zoo animal. If you see enough pattern in these, consider creating a class
    with special handling on the front-end.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 恶作剧者 —— 完全范围外。因为人们喜欢玩弄技术，所以有可能有一个恶作剧者拍了一个爆米花袋、软饮料杯，甚至自拍。这些很难预防，但希望它们的分数足够低（低于阈值），以至于模型没有将其识别为动物园动物。如果你在这些图像中看到足够的模式，考虑创建一个具有前端特殊处理的类别。
- en: After reviewing the “happy path” images, you move on to the “sad path” images
    — the ones that got a low confidence score and the app gave a “sorry, try again”
    message. This time you ask yourself, “*Should* the model have given this image
    a higher score?” which would have put it in the “happy path”. If so, then you
    want to ensure these images are added to the training set so next time it will
    do better. But most of time, the low score reflects many of the “bad” or out-of-scope
    situations mentioned above.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在审查“快乐路径”图像后，你将转到“悲伤路径”图像——那些得到低置信度分数并且应用程序给出了“抱歉，请重试”信息的图像。这次你要问自己，“*应该*给这张图像更高的分数吗？”这将把它放入“快乐路径”。如果是这样，那么你想要确保这些图像被添加到训练集中，以便下次它能做得更好。但大多数情况下，低分数反映了上述许多“坏”或范围外的情况。
- en: 'Perhaps your model performance is suffering and it has nothing to do with your
    model. Maybe it is the ways you users interacting with the app. Keep an eye out
    of non-technical problems and share your observations with the rest of your team.
    For example:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 也许你的模型性能不佳，但这与你模型无关。可能是因为用户与应用程序交互的方式。留意非技术问题，并与你的团队分享你的观察。例如：
- en: Are your users using the application in the ways you expected?
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的用户是否以你预期的方式使用应用程序？
- en: Are they not following the instructions?
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们没有遵循指示吗？
- en: Do the instructions need to be stated more clearly?
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示需要更清晰地陈述吗？
- en: Is there anything you can do to improve the experience?
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你能做些什么来改善体验？
- en: '**Collect statistics and new images**'
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**收集统计数据和新图像**'
- en: Both of the manual evaluations above open a gold mine of data. So, be sure to
    collect these statistics and feed them into a dashboard — your manager and your
    future self will thank you!
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 上述两个手动评估都打开了一个数据宝库。所以，务必收集这些统计数据并将它们输入仪表板——你的经理和未来的你都会感谢你！
- en: '![](../Images/a172a0bd312b24160e70612147f8df15.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a172a0bd312b24160e70612147f8df15.png)'
- en: Photo by [Justin Morgan](https://unsplash.com/@justin_morgan) on [Unsplash](https://unsplash.com/)
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Justin Morgan](https://unsplash.com/@justin_morgan)在[Unsplash](https://unsplash.com/)上拍摄
- en: 'Keep track of these stats and generate reports that you and your can reference:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 记录这些统计数据并生成报告，供你和你的团队参考：
- en: How often the model is being called?
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型被调用的频率是多少？
- en: What times of the day, what days of the week is it used?
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在什么时间，什么星期几使用它？
- en: Are your system resources able to handle the peak load?
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的系统资源能否处理峰值负载？
- en: What classes are the most common?
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些课程是最常见的？
- en: After evaluation, what is the accuracy for each class?
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估后，每个类别的准确率是多少？
- en: What is the breakdown for confidence scores?
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 置信度分数的分布情况如何？
- en: How many scores are above and below the confidence threshold?
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有多少分数高于和低于置信度阈值？
- en: The single best thing you get from a deployed model is the additional real-world
    images! You can add these now images to improve coverage of your existing zoo
    animals. But more importantly, they provide you insight on **other** classes to
    add. For example, let’s say people enjoy taking a picture of the large walrus
    statue at the gate. Some of these may make sense to incorporate into your data
    set to provide a better user experience.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 从部署的模型中获得的最宝贵的东西是额外的真实世界图片！你现在可以添加这些图片来提高现有动物园动物的覆盖范围。但更重要的是，它们为你提供了关于**其他**类别的洞察。例如，假设人们喜欢在门口拍摄大海象雕像的照片。其中一些可能适合纳入你的数据集，以提供更好的用户体验。
- en: Creating a new class, like the walrus statue, is not a huge effort, and it avoids
    the false positive responses. It would be more embarrassing to identify a walrus
    statue as an elephant! As for the prankster and the bag of popcorn, you can configure
    your front-end to quietly handle these. You might even get creative and have fun
    with it like, “Thank you for visiting the food court.”
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个新的类别，如海象雕像，并不需要很大的努力，并且可以避免误报。将海象雕像识别为大象会更尴尬！至于恶作剧者和爆米花袋，你可以配置前端以静默处理这些情况。你甚至可以发挥创意，让它变得有趣，比如，“感谢您光顾美食广场。”
- en: '**Double-check process**'
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**双重检查流程**'
- en: It is a good idea to double-check your image set when you suspect there may
    be problems with your data. I’m not suggesting a top-to-bottom check, because
    that would a monumental effort! Rather specific classes that you suspect could
    contain bad data that is degrading your model performance.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 当你怀疑数据可能存在问题时，检查你的图片集是个好主意。我并不是建议从头到尾检查，因为那将是一项巨大的工作！而是检查你怀疑可能包含不良数据、从而降低模型性能的特定类别。
- en: Immediately after my training run completes, I have a script that will use this
    new model to generate predictions for my **entire** data set. When this is complete,
    it will take the list of incorrect identifications, as well as the low scoring
    predictions, and automatically feed that list into the Double-check interface.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的训练运行完成后，我有一个脚本将使用这个新模型为我的**整个**数据集生成预测。当这完成时，它将列出错误的识别以及得分较低的预测，并将该列表自动输入到双重检查界面中。
- en: This interface will show, one at a time, the image in question, alongside an
    example image of the ground truth and an example image of what the model predicted.
    I can visually compare the three, side-by-side. The first thing I do is ensure
    the original image is a “good” picture, following my labelling standards. Then
    I check if the ground-truth label is indeed correct, or if there is something
    that made the model think it was the predicted label.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 此界面将逐个显示问题图片，以及一个真实情况的示例图片和一个模型预测的示例图片。我可以直观地比较这三个图片，并排查看。我首先确保原始图片符合我的标注标准，是一张“好”的图片。然后检查真实标签是否确实正确，或者是否有导致模型认为它是预测标签的因素。
- en: 'At this point I can:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，我可以：
- en: Remove the original image if the image quality is poor.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果图片质量差，请移除原始图片。
- en: Relabel the image if it belongs in a different class.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果图片属于不同的类别，请重新标注图片。
- en: During this manual evaluation, you might notice dozens of the same wrong prediction.
    Ask yourself why the model made this mistake when the images seem perfectly fine.
    The answer may be some incorrect labels on images in the ground truth, or even
    in the predicted class!
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次手动评估中，你可能会注意到数十次相同的错误预测。问问自己，当图片看起来完全正常时，模型为什么会犯这个错误。答案可能是真实情况中的图片标签有误，甚至是在预测类别中的标签错误！
- en: Don’t hesitate to add those classes and sub-classes back into the Double-check
    interface and step through them all. You may have 100–200 pictures to review,
    but there is a good chance that one or two of the images will stand out as being
    the culprit.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 不要犹豫，将这些类和子类重新添加到双检查界面中，并逐一检查它们。你可能需要审查100-200张图片，但有很大可能性有一两张图片会突出显示为问题所在。
- en: '**Up next…**'
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**接下来…**'
- en: With a different mindset for a trained model versus a deployed model, we can
    now evaluate performances to decide which models are ready for production, and
    how well a production model is going to serve the public. This relies on a solid
    Double-check process and a critical eye on your data. And beyond the “gut feel”
    of your model, we can rely on the benchmark scores to support us.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 对于训练模型和部署模型的不同心态，我们现在可以评估性能以决定哪些模型适合生产，以及生产模型将如何为公众服务。这依赖于一个坚实的双检查流程和对数据的批判性审视。而且，除了对模型的“直觉”之外，我们还可以依赖基准分数来支持我们。
- en: In [Part 4](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-4-the-model/),
    we kick off the training run, but there are some subtle techniques to get the
    most out of the process and even ways to leverage throw-away models to expand
    your library image data.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在[第4部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-4-the-model/)中，我们开始了训练运行，但有一些微妙的技术可以帮助我们充分利用这个过程，甚至有利用废弃模型来扩展你的图像数据库的方法。
