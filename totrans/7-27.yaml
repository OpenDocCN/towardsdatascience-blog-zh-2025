- en: How Most Organizations Get Data Strategy Wrong – and How to Fix It
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533/](https://towardsdatascience.com/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Wave by CLEANPNG.](../Images/f492da427b23f31bbf5210a6d2a30b5a.png)'
  prefs: []
  type: TYPE_IMG
- en: Wave by CLEANPNG.
  prefs: []
  type: TYPE_NORMAL
- en: '[DEMYSTIFY DATA STRATEGY](https://contributor.insightmediagroup.io/tagged/demystify-data-strategy)'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*Unlocking business value from data, analytics, and Artificial Intelligence
    is a hot topic. Yet, most organizations struggle to monetize existing data or
    to create new data that advances their thinking. I assert that in most cases,
    this struggle stems from a lack of effective business strategy design.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*This is the third installment in a [series demystifying data strategy](https://contributor.insightmediagroup.io/tagged/demystify-data-strategy)—
    something that organizations seem to need to become data-driven and remain competitive
    in today’s digital world. This document serves as a playbook for data strategy,
    offering a deep and structured exploration by addressing misconceptions, clarifying
    definitions, presenting actionable frameworks, and illustrating concepts through
    a detailed example.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*[*I am Jens*](https://jens-linden.de/)*, a business-minded* data expert with
    nearly two decades of experience in implementing data and AI use cases. I help
    leaders across industries design strategies and foster cultures that unlock the
    full potential of data and algorithms.*'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: tl;dr
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A data strategy is not a standalone supplement to business strategy, nor is
    it a plan for building data capabilities. It is rather the strategy of a data
    function, providing services to the internal data customers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A data strategy *does not* define how an organization creates value with data,
    analytics and AI. This is the job of the business strategy with data-related strategic
    choices being an integral part.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Misconceptions about data strategy, combined with weak business strategy design,
    prevent organizations from leveraging data effectively. These issues hinder their
    ability to gain a competitive advantage.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Playing to Win framework helps organizations with both: embedding data
    innovation into their business strategy and designing effective data strategies.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
