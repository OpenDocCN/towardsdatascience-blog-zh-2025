- en: 'Power Analysis in Marketing: A Hands-On Introduction'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/power-analysis-in-marketing/](https://towardsdatascience.com/power-analysis-in-marketing/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1762568891909" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Show
    code</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: Over the past few years working in marketing measurement, I’ve noticed that
    *power analysis* is one of the most poorly understood testing and measurement
    topics. Sometimes it’s misunderstood and sometimes it’s not applied whatsoever
    despite its foundational role in test design. This article and the series that
    follow are my attempts to alleviate this.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this segment, I will cover:'
  prefs: []
  type: TYPE_NORMAL
- en: What is statistical power?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How do we compute it?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What can influence power?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Power analysis is a statistical topic and as a consequence, there will be math
    and statistics (crazy right?) but I will try to tie those technical details back
    to real world problems or basic intuition whenever possible.
  prefs: []
  type: TYPE_NORMAL
- en: Without further ado, let’s get to it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Error types in testing: Type I vs. Type II'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In testing, there are two types of error:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Type I**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Technical Definition: We erroneously reject the null hypothesis when the null
    hypothesis is true'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Layman’s Definition: We say there was an effect when there really wasn’t'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: A/B testing a new creative and concluding that it performs better
    than the old design when in reality, both designs perform the same'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Type II**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Technical Definition: We fail to reject the null hypothesis when the null hypothesis
    is false'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Layman’s Definition: We say there was no effect when there really was'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: A/B testing a new creative and concluding that it performs the same
    as the old design when in reality, the new design performs better'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: What is statistical power?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Most people are familiar with Type I error. It’s the error that we control
    by setting a significance level. Power relates to Type II error. More specifically,
    power is the probability of correctly rejecting the null hypothesis when it is
    false. It is the complement of Type II error (i.e., 1 – Type II error). In other
    words, power is the probability of detecting a true effect if one exists. It should
    be clear why this is important:'
  prefs: []
  type: TYPE_NORMAL
- en: Underpowered tests are likely to miss true effects, leading to missed opportunities
    for improvement
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Underpowered tests can lead to false confidence in the results, as we may conclude
    that there is no effect when there actually is one
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: … and most simply, underpowered tests waste money and resources
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The role of α and β
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If both are important, why are Type II error and power so misunderstood and
    ignored while Type I is always considered? It’s because we can easily pick our
    Type I error rate. In fact, that’s exactly what we are doing when we set the significance
    level α (typically α = 0.05) for our tests. We are stating that we are comfortable
    with a certain percentage of Type I error. During test setup, we make a statement,
    “we are comfortable with an X % false positive rate,” and then set α = X %. After
    the test, if our p-value falls below α, we reject the null hypothesis (i.e., “the
    results are significant”), and if the p-value falls above α, we fail to reject
    the null hypothesis (i.e., “the results are not significant”).
  prefs: []
  type: TYPE_NORMAL
- en: Determining Type II error, β (typically β = 0.20), and thus power, is not as
    simple. It requires us to make assumptions and perform analysis, called “power
    analysis.” To understand the process, it’s best to first walk through the process
    of testing and then backtrack to figure out how power can be computed and influenced.
    Let’s use a simple A/B creative test as an example.
  prefs: []
  type: TYPE_NORMAL
- en: '| **Concept** | **Symbol** | **Typical Value(s)** | **Technical Definition**
    | **Plain-Language Definition** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Type I Error | α | 0.05 (5%) | Probability of rejecting the null hypothesis
    when the null is actually true | Saying there is an effect when in reality there
    is no difference |'
  prefs: []
  type: TYPE_TB
- en: '| Type II Error | β | 0.20 (20%) | Probability of failing to reject the null
    hypothesis when the null is actually false | Saying there is no effect when in
    reality there is one |'
  prefs: []
  type: TYPE_TB
- en: '| Power | 1 − β | 0.80 (80%) | Probability of correctly rejecting the null
    hypothesis when the alternative is true | The chance we detect a true effect if
    there is one |'
  prefs: []
  type: TYPE_TB
- en: 'Quick Reference: Error Types and Power'
  prefs: []
  type: TYPE_NORMAL
- en: 'Computing power: step by step'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A couple notes before we get started:'
  prefs: []
  type: TYPE_NORMAL
- en: I made a few assumptions and approximations to simplify the example. If you
    can spot them, great. If not, don’t worry about it. The goal is to understand
    the concepts and process, not the nitty gritty details.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I refer to the decision threshold in the z-score space as the critical value.
    Critical value typically refers to the threshold in the original space (e.g.,
    conversion rates) but I will use it interchangeably so I don’t need to introduce
    a new term.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are code snippets throughout tied to the text and concepts. If you copy
    the code yourself, you can play around with the parameters to see how things change.
    Some of the code snippets are hidden to keep the article readable. Click “Show
    the code” to see the code.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Try this: Edit the sample size in the test setup so that the test statistic
    is just below the critical value and then run the power analysis. Are the results
    what you expected?'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Test setup and the test statistic
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As stated above, it’s best to walk through the testing process first and then
    backtrack to identify how power can be computed. Let’s do just that.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: As stated above, it’s best to walk through the testing process first and then
    backtrack to identify how power can be computed. Let’s do just that.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our test setup:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Null hypothesis**: The conversion rate of A equals the conversion rate of
    B.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Alternative hypothesis**: The conversion rate of B is greater than the conversion
    rate of A.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sample size**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: N[a] = 1,000 — Number of people who receive creative A
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: N[b] = 1,000 — Number of people who receive creative B
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Significance level**: α = 0.05'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Critical value**: The critical value is the z-score that corresponds to the
    significance level α. We call this Z[1−α]. For a one-tailed test with α = 0.05,
    this is approximately 1.64.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Test type**: Two-proportion z-test'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Our results:'
  prefs: []
  type: TYPE_NORMAL
- en: x[a] = 100 — Number of conversions from creative A
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: x[b] = 150 — Number of conversions from creative B
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: p[a] = x[a] / N[a] = 0.10 — Conversion rate of creative A
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: p[b] = x[b] / N[b] = 0.15 — Conversion rate of creative B
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Under the null hypothesis, the difference in conversion rates follows an approximately
    normal distribution with:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Mean: μ = 0 (no difference in conversion rates)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Standard deviation:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: σ = √[ p[a](1 − p[a])/N[a] + p[b](1 − p[b])/N[b] ] ≈ 0.01
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'From these values, we can compute the test statistic:'
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: z = \frac{p_b – p_a}
  prefs: []
  type: TYPE_NORMAL
- en: '{\sqrt{\frac{p_a (1 – p_a)}{N_a} + \frac{p_b (1 – p_b)}{N_b}}}'
  prefs: []
  type: TYPE_NORMAL
- en: \approx 3.39
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: If our test statistic, z, is greater than the critical value, we reject the
    null hypothesis and conclude that Creative B performs better than Creative A.
    If z is less than or equal to the critical value, we fail to reject the null hypothesis
    and conclude that there is no significant difference between the two creatives.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, if our results are unlikely to be observed when the conversion
    rates of A and B are truly the same, we reject the null hypothesis and state that
    Creative B performs better than Creative A. Otherwise, we fail to reject the null
    hypothesis and state that there is no significant difference between the two creatives.
  prefs: []
  type: TYPE_NORMAL
- en: Given our test results, we reject the null hypothesis and conclude that Creative
    B performs better than Creative A.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The intuition behind power
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have walked through the testing process, where does power come into
    play? In the process above, we record *sample* conversion rates, p[a] and p[b],
    and then compute the test statistic, z. However, if we repeated the test many
    times, we would get different sample conversion rates and different test statistics,
    all centering around the *true* conversion rates of the creatives.
  prefs: []
  type: TYPE_NORMAL
- en: 'Assume the true conversion rate of Creative B is higher than that of Creative
    A. Some of these tests will still fail to reject the null hypothesis due to natural
    variance. Power is the percentage of these tests that reject the null hypothesis.
    This is the underlying mechanism behind all power analysis and hints at the missing
    ingredient: the true conversion rates—or more generally, the true effect size.'
  prefs: []
  type: TYPE_NORMAL
- en: Intuitively, if the true effect size is higher, our measured effect would typically
    be higher and we would reject the null hypothesis more often, increasing power.
  prefs: []
  type: TYPE_NORMAL
- en: Choosing the true effect size
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If we need true conversion rates to compute power, how do we get them? If we
    had them, we wouldn’t need to perform testing. Therefore, we need to make an assumption.
    Broadly, there are two approaches:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Choose the meaningful effect size:** In this approach, we assign the true
    effect size (or true difference in conversion rates) to a level that would be
    *meaningful*. If Creative B only increased conversion rates by 0.01%, would we
    actually care and take action on those results? Probably not. So why would we
    care about being able to detect that small of an effect? On the other hand, if
    Creative B increased conversion rates by 50%, we certainly would care. In practice,
    the *meaningful* effect size likely falls between these two points.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Note:* This is often referred to as the *minimal detectable effect*. However,
    the minimal detectable effect of the study and the minimal detectable effect that
    we care about (for example, we may only care about 5% or greater effects, but
    the study is designed to detect 1% or greater effects) may differ. For that reason,
    I prefer to use the term *meaningful effect* when referring to this strategy.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use prior studies:** If we have data from prior studies or models that measure
    the efficiency of this creative or similar creatives, we can use those values
    to assign the true effect size.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Both of the above approaches are valid.
  prefs: []
  type: TYPE_NORMAL
- en: If you only care to see *meaningful* effects and don’t mind if you miss out
    on detecting smaller effects, go with the first option. If you must see “statistical
    significance”, go with the second option and be conservative with the values you
    use (more on that in another article).
  prefs: []
  type: TYPE_NORMAL
- en: '**Technical Note**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Because we don’t have true conversion rates, we are technically assigning a
    specific expected distribution to the alternative hypothesis and then computing
    power based on that. The *true mean* in the following passages is technically
    the *expected mean under the alternative hypothesis*. I will use the term *true*
    to keep the language simple and concise.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Computing and visualizing power
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have the missing ingredients, *true* conversion rates, we can compute
    power. Instead of the measured p[a] and p[b], we now have true conversion rates
    r[a] and r[b].
  prefs: []
  type: TYPE_NORMAL
- en: 'We measure power as:'
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: 1 – \beta = 1 – P(z < Z_{1-\alpha} \;|\; N_a, N_b, r_a, r_b)
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: This may be confusing at first glance, so let’s break it down.
  prefs: []
  type: TYPE_NORMAL
- en: We are stating that power (1 − β) is computed by subtracting the Type II error
    rate from one. The Type II error rate is the likelihood that a test results in
    a z-score below our significance threshold, given our sample size and true conversion
    rates r[a] and r[b]. How do we compute that last part?
  prefs: []
  type: TYPE_NORMAL
- en: 'In a two-proportion z-score test, we know that:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Mean: μ = r[b] − r[a]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Standard deviation: σ = √[ r[a](1 − r[a])/N[a] + r[b](1 − r[b])/N[b] ]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now we need to compute:'
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: P(X > Z_{1-\alpha}), \quad X \sim N!\left(\frac{\mu}{\sigma},\,1\right)
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the area under the above distribution that lies to the right of Z[1−α]
    and is equivalent to computing:'
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: P!\left(X > \frac{\mu}{\sigma} – Z_{1-\alpha}\right), \quad X \sim N(0,1)
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: If we had a textbook with a z-score table, we could simply look up the p-value
    associated with
  prefs: []
  type: TYPE_NORMAL
- en: (μ / σ − Z[1−α]), and that would give us the power.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s show this visually:'
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Show
    the code</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]</details> ![](../Images/369a622603de5d5bb823f822f8bb0daa.png)'
  prefs: []
  type: TYPE_NORMAL
- en: In the plot above, power is the area under the alternative distribution (H1)
    (where we assume the alternative is distributed according to our true conversion
    rates) that is beyond the critical threshold (i.e., the area where we reject the
    null hypothesis). With the parameters we set, the power is 0.96\. This means that
    if we repeated this test many times with the same parameters, we would expect
    to reject the null hypothesis approximately 96% of the time.
  prefs: []
  type: TYPE_NORMAL
- en: Power curves
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have intuition and math behind power, we can explore how power changes
    based on different parameters. The plots generated from such analysis are called
    *power curves*.
  prefs: []
  type: TYPE_NORMAL
- en: '**Note**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Throughout the plots, you’ll notice that 80% power is highlighted. This is a
    common target for power in testing, as it balances the risk of Type II error with
    the cost of increasing sample size or adjusting other parameters. You’ll see this
    value highlighted in many software packages as a consequence.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Relationship with effect size
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Earlier, I stated that the larger the effect size, the higher the power. Intuitively,
    this makes sense. We are essentially shifting the right bell curve in the plot
    above further to the right, so the area beyond the critical threshold increases.
    Let’s test that theory.
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Show
    the code</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]</details> ![](../Images/85e3527ab05d4793f51a64cf36417945.png)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Theory confirmed: as the effect size increases, power increases. It approaches
    100% as the effect size increases and our decision threshold moves down the long-tail
    of the normal distribution.'
  prefs: []
  type: TYPE_NORMAL
- en: Relationship with sample size
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Unfortunately, we cannot control effect size. It is either the meaningful effect
    size you wish to detect or based on prior studies. It is what it is. What we can
    control is sample size. The larger the sample size, the smaller the standard deviation
    of the distribution and the larger the area under the curve beyond the critical
    threshold (imagine squeezing the sides to compress the bell curves in the plot
    earlier). In other words, larger sample sizes should lead to higher power. Let’s
    test this theory as well.
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Show
    the code</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]</details> ![](../Images/697172ca75b72c2974646b8a8a055c72.png)'
  prefs: []
  type: TYPE_NORMAL
- en: 'We again see the expected relationship: as sample size increases, power increases.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Note**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In this specific setup, we can increase power by increasing sample size. More
    generally, this is an increase in *precision*. In other test setups, precision—and
    thus power—can be increased through other means. For example, in Geo-testing,
    we can increase precision by selecting predictable markets or through the inclusion
    of exogenous features (more on this in a future article).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Relationship with significance level
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Does the significance level α influence power? Intuitively, if we are more willing
    to accept Type I error, we are more likely to reject the null hypothesis and thus
    (1 − β) should be higher. Let’s test this theory.
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Show
    the code</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]</details> ![](../Images/f2e2e4e0766bb5394cb00c49e7211a32.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Yet again, the results match our intuition. There is no free lunch in statistics.
    All else equal, if we want to decrease our Type II error rate (β), we must be
    willing to accept a higher Type I rate (α).
  prefs: []
  type: TYPE_NORMAL
- en: Power analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So what is power analysis? Power analysis is the process of computing power
    given the parameters of the test. In power analysis, we fix parameters we cannot
    control and then optimize the parameters we can control to achieve a desired power
    level. For example, we can fix the true effect size and then compute the sample
    size needed to achieve a desired power level. Power curves are often used to assist
    with this decision-making process. Later in the series, I will walk through power
    analysis in detail with a real-world example.
  prefs: []
  type: TYPE_NORMAL
- en: Sources
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[1] R. Larsen and M. Marx, An Introduction to Mathematical Statistics and Its
    Applications'
  prefs: []
  type: TYPE_NORMAL
