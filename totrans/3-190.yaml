  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 从 [VisDrone](https://github.com/VisDrone/VisDrone-Dataset) 数据集中采样
- en: Final results
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最终结果
- en: 'Knowing all the details, let’s see a final comparison with the best settings
    for both models on i12400F and RTX 3060 with the VisDrone dataset:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 了解所有细节后，让我们看看在i12400F和RTX 3060上使用VisDrone数据集时，两个模型的最佳设置下的最终比较：
- en: '[PRE6]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: As shown above, I was able to use a smaller D-FINE model and achieve both faster
    inference time and accuracy than YOLO11\. Beating Ultralytics, the most widely
    used real-time object detection model, in both speed and accuracy, is quite an
    accomplishment, isn’t it? The same pattern is observed across several other real-world
    datasets.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，我能够使用更小的D-FINE模型，在速度和精度上都优于YOLO11。在速度和精度上击败最广泛使用的实时目标检测模型Ultralytics，这是一项相当大的成就，不是吗？在几个其他真实世界数据集上也观察到了相同的模式。
- en: I also tried out YOLOv12, which came out while I was writing this article. It
    performed similarly to YOLO11 and even achieved slightly lower metrics (mAP 0.456
    vs 0.452). It appears that YOLO models have been hitting the wall for the last
    couple of years. D-FINE was a great update for object detection models.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 我还尝试了YOLOv12，在我写这篇文章的时候它已经发布了。它的表现与YOLO11相似，甚至实现了略低的指标（mAP 0.456 vs 0.452）。看起来YOLO模型在过去几年里已经遇到了瓶颈。D-FINE是对目标检测模型的一个很好的更新。
- en: 'Finally, let’s see visually the difference between YOLO11m and D-FINEs. YOLO11m,
    conf 0.25, nms iou 0.5, latency 13.3ms:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们直观地看看YOLO11m和D-FINEs之间的差异。YOLO11m，置信度 0.25，nms iou 0.5，延迟 13.3ms：
- en: '![](../Images/99edbef823980d083cf35152649060cf.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/99edbef823980d083cf35152649060cf.png)'
