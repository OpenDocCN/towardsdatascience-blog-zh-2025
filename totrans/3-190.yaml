  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 从 [VisDrone](https://github.com/VisDrone/VisDrone-Dataset) 数据集中采样
- en: 'D-FINEs, conf 0.5, no nms, latency 12.3ms:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: D-FINEs，置信度 0.5，无nms，延迟 12.3ms：
- en: '![](../Images/1b3d0e737a300ce83a542e10a17fade3.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1b3d0e737a300ce83a542e10a17fade3.png)'
- en: Sample from [VisDrone](https://github.com/VisDrone/VisDrone-Dataset) dataset
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 从 [VisDrone](https://github.com/VisDrone/VisDrone-Dataset) 数据集中采样
- en: 'Both Precision and Recall are higher with the D-FINE model. And it’s also faster.
    Here is also “m” version of D-FINE:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: D-FINE模型的精确度和召回率都更高。它还更快。这里还有D-FINE的“m”版本：
