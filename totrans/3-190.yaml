  type: TYPE_IMG
  zh: '![](../Images/1d057fbe7f22125fd9b5d0080b2f95e2.png)'
- en: Author’s metrics logged in WandB, YOLO11 model
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 作者在WandB上记录的指标，YOLO11模型
- en: 'Example of D-FINE model predictions (green – GT, blue – pred):'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: D-FINE模型预测示例（绿色 – GT，蓝色 – 预测）：
- en: '![](../Images/af3023abdf55699e76b9cbf4d83bac18.png)'
