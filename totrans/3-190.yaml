- en: Custom Training Pipeline for Object Detection Models
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 目标检测模型的定制训练流程
- en: 原文：[https://towardsdatascience.com/custom-training-pipeline-for-object-detection-models/](https://towardsdatascience.com/custom-training-pipeline-for-object-detection-models/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/custom-training-pipeline-for-object-detection-models/](https://towardsdatascience.com/custom-training-pipeline-for-object-detection-models/)
- en: What if you want to write the whole object detection training pipeline from
    scratch, so you can understand each step and be able to customize it? That’s what
    I set out to do. I examined several well-known object detection pipelines and
    designed one that best suits my needs and tasks. Thanks to [Ultralytics](https://github.com/ultralytics/ultralytics),
    [YOLOx](https://github.com/Megvii-BaseDetection/YOLOX), [DAMO-YOLO](https://github.com/tinyvision/DAMO-YOLO),
    [RT-DETR](https://github.com/lyuwenyu/RT-DETR) and [D-FINE](https://github.com/Peterande/D-FINE)
    repos, I leveraged them to gain deeper understanding into various design details.
    I ended up implementing [SoTA real-time object detection model D-FINE](https://paperswithcode.com/sota/real-time-object-detection-on-coco?p=d-fine-redefine-regression-task-in-detrs-as)
    in my custom pipeline.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要从头开始编写整个目标检测训练流程，以便理解每个步骤并能够自定义它，那会怎样？这正是我着手要做的事情。我检查了几个著名的对象检测流程，并设计了一个最适合我需求和任务的流程。感谢[Ultralytics](https://github.com/ultralytics/ultralytics)、[YOLOx](https://github.com/Megvii-BaseDetection/YOLOX)、[DAMO-YOLO](https://github.com/tinyvision/DAMO-YOLO)、[RT-DETR](https://github.com/lyuwenyu/RT-DETR)和[D-FINE](https://github.com/Peterande/D-FINE)仓库，我利用它们来深入了解各种设计细节。最终，我在自定义流程中实现了[SoTA实时目标检测模型D-FINE](https://paperswithcode.com/sota/real-time-object-detection-on-coco?p=d-fine-redefine-regression-task-in-detrs-as)。
- en: Plan
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 计划
- en: 'Dataset, Augmentations and transforms:'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据集，增强和转换：
- en: Mosaic (with affine transforms)
  id: totrans-5
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Mosaic（带有仿射变换）
- en: Mixup and Cutout
  id: totrans-6
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Mixup和Cutout
- en: Other augmentations with bounding boxes
  id: totrans-7
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他带有边界框的增强
- en: Letterbox vs simple resize
  id: totrans-8
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Letterbox与简单调整大小
- en: 'Training:'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练：
- en: Optimizer
  id: totrans-10
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化器
- en: Scheduler
  id: totrans-11
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调度器
- en: EMA
  id: totrans-12
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: EMA
- en: Batch accumulation
  id: totrans-13
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批量累积
- en: AMP
  id: totrans-14
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: AMP
- en: Grad clipping
  id: totrans-15
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 梯度裁剪
- en: Logging
  id: totrans-16
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录
- en: 'Metrics:'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指标：
- en: mAPs from TorchMetrics / cocotools
  id: totrans-18
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: mAPs来自TorchMetrics / cocotools
- en: How to compute Precision, Recall, IoU?
  id: totrans-19
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何计算精确度，召回率和IoU？
- en: Pick a suitable solution for your case
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为您的案例选择一个合适的解决方案
- en: Experiments
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实验
- en: Attention to data preprocessing
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意数据预处理
- en: Where to start
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从哪里开始
- en: Dataset
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集
- en: 'Dataset processing is the first thing you usually start working on. With object
    detection, you need to load your image and annotations. Annotations are often
    stored in COCO format as a json file or YOLO format, with txt file for each image.
    Let’s take a look at the YOLO format: Each line is structured as: `class_id`,
    `x_center`, `y_center`, `width`, `height`, where bbox values are normalized between
    0 and 1.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集处理通常是您开始工作的第一件事。在目标检测中，您需要加载您的图像和注释。注释通常以COCO格式存储为json文件或YOLO格式，每个图像都有一个txt文件。让我们看看YOLO格式：每一行都是这样的结构：`class_id`，`x_center`，`y_center`，`width`，`height`，其中bbox值在0和1之间归一化。
- en: When you have your images and txt files, you can write your dataset class, nothing
    tricky here. Load everything, transform (augmentations included) and return during
    training. I prefer splitting the data by creating a CSV file for each split and
    then reading it in the Dataloader class rather than physically moving files into
    train/val/test folders. This is an example of a customization that helped my use
    case.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当你有了你的图像和txt文件后，你可以编写你的数据集类，这里没有太多技巧。加载所有内容，转换（包括增强）并在训练过程中返回。我更喜欢通过为每个分割创建一个CSV文件来分割数据，然后在Dataloader类中读取它，而不是将文件物理移动到train/val/test文件夹中。这是帮助我的用例的定制化示例。
- en: Augmentations
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 增强
- en: 'Firstly, when augmenting images for object detection, it’s crucial to apply
    the same transformations to the bounding boxes. To comfortably do that I use [Albumentations](https://albumentations.ai)
    lib. For example:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，在增强图像进行目标检测时，对边界框应用相同的转换至关重要。为了舒适地做到这一点，我使用了[Albumentations](https://albumentations.ai)库。例如：
- en: '[PRE0]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Secondly, there are a lot of interesting and not trivial augmentations:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，有许多有趣且非平凡的增强：
- en: '[Mosaic](https://arxiv.org/pdf/2004.10934). The idea is simple, let’s take
    several images (for example 4), and stack them together in a grid (2×2). Then
    let’s do some affine transforms and feed it to the model.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Mosaic](https://arxiv.org/pdf/2004.10934)。想法很简单，让我们取几幅图像（例如4幅），并将它们堆叠成一个网格（2×2）。然后让我们进行一些仿射变换，并将其输入到模型中。'
- en: '[MixUp](https://arxiv.org/pdf/1905.04899). Originally used in image classification
    (it’s surprising that it works). Idea – let’s take two images, put them onto each
    other with some percent of transparency. In classification models it usually means
    that if one image is 20% transparent and the second is 80%, then the model should
    predict 80% for class 1 and 20% for class 2\. In object detection we just get
    more objects into 1 image.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[MixUp](https://arxiv.org/pdf/1905.04899)。最初用于图像分类（它的工作效果令人惊讶）。想法——让我们取两张图片，以一定比例的透明度将它们叠加在一起。在分类模型中，这通常意味着如果一张图片是20%透明的，另一张是80%，那么模型应该预测类别1为80%，类别2为20%。在目标检测中，我们只是将更多的目标放入一张图片中。'
- en: '**Cutout**. Cutout involves removing parts of the image (by replacing them
    with black pixels) to help the model learn more robust features.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Cutout**。Cutout涉及通过用黑色像素替换图像的一部分来帮助模型学习更鲁棒的特征。'
- en: I see mosaic often applied with Probability 1.0 of the first ~90% of epochs.
    Then, it’s usually turned off, and lighter augmentations are used. The same idea
    applies to mixup, but I see it being used a lot less (for the most popular detection
    framework, Ultralytics, it’s turned off by default. For another one, I see P=0.15). Cutout seems
    to be used less frequently.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到马赛克通常在第一个大约90%的epoch中应用概率为1.0。然后，通常关闭，并使用较轻的增强。同样的想法也适用于mixup，但我看到它被使用的频率要低得多（对于最受欢迎的检测框架Ultralytics，默认是关闭的。对于另一个框架，我看到P=0.15）。Cutout似乎使用得较少。
- en: You can read more about those augmentations in these two articles: [1](https://arxiv.org/pdf/2004.10934), [2](https://arxiv.org/pdf/1905.04899).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在这些两篇文章中了解更多关于这些增强的信息：[1](https://arxiv.org/pdf/2004.10934)，[2](https://arxiv.org/pdf/1905.04899)。
- en: Results from just turning on mosaic are pretty good (darker one without mosaic
    got mAP 0.89 vs 0.92 with, tested on a real dataset)
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 只开启马赛克的效果就相当不错（没有马赛克的较暗版本mAP为0.89，而开启马赛克为0.92，在一个真实数据集上测试）
- en: '![](../Images/3017f4d4d07fdc231f97e0cabdbcd2e7.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3017f4d4d07fdc231f97e0cabdbcd2e7.png)'
- en: Author’s metrics on a custom dataset, logged in Wandb
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 作者在自定义数据集上的指标，记录在Wandb中
- en: Letterbox or simple resize?
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 信箱模式或简单调整大小？
- en: 'During training, you usually resize the input image to a square. Models often
    use 640×640 and benchmark on COCO dataset. And there are two main ways how you
    get there:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中，你通常将输入图像调整到正方形。模型通常使用640×640，并在COCO数据集上进行基准测试。而且有两种主要的方法可以达到这个目标：
- en: Simple resize to a target size.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简单地调整到目标大小。
- en: 'Letterbox: Resize the longest side to the target size (e.g., 640), preserving
    the aspect ratio, and pad the shorter side to reach the target dimensions.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信箱模式：将最长边调整到目标大小（例如，640），保留宽高比，并将较短的边填充到目标尺寸。
- en: '![](../Images/224104af86d05ba3349da612315c4b48.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/224104af86d05ba3349da612315c4b48.png)'
- en: Sample from [VisDrone](https://github.com/VisDrone/VisDrone-Dataset) dataset
    with ground truth bounding boxes, preprocessed with a simple resize function
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 从[VisDrone](https://github.com/VisDrone/VisDrone-Dataset)数据集中采样带有真实边界框的图像，使用简单调整大小函数进行预处理
- en: '![](../Images/054d07d7d03dd19fcfd414ca51ccc758.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/054d07d7d03dd19fcfd414ca51ccc758.png)'
- en: Sample from [VisDrone](https://github.com/VisDrone/VisDrone-Dataset) dataset
    with ground truth bounding boxes, preprocessed with a letterbox
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 从[VisDrone](https://github.com/VisDrone/VisDrone-Dataset)数据集中采样带有真实边界框的图像，使用信箱模式进行预处理
- en: Both approaches have advantages and disadvantages. Let’s discuss them first,
    and then I will share the results of numerous experiments I ran comparing these
    approaches.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 两种方法都有优点和缺点。让我们先讨论它们，然后我会分享我进行的比较这些方法的多次实验结果。
- en: 'Simple resize:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 简单调整大小：
- en: Compute goes to the whole image, with no useless padding.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算应用于整个图像，没有无用的填充。
- en: “Dynamic” aspect ratio may act as a form of regularization.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “动态”宽高比可能充当正则化的一种形式。
- en: Inference preprocessing perfectly matches training preprocessing (augmentations
    excluded).
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推理预处理与训练预处理完美匹配（排除增强）。
- en: Kills real geometry. Resize distortion could affect the spatial relationships
    in the image. Although it might be a human bias to think that a fixed aspect ratio
    is important.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 杀死了真实几何。调整大小扭曲可能会影响图像中的空间关系。尽管认为固定的宽高比很重要可能是人类的偏见。
- en: 'Letterbox:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 信箱模式：
- en: Preserves real aspect ratio.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保留真实宽高比。
- en: During inference, you can cut padding and run not on the square image if you
    don’t lose accuracy (some models can degrade).
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在推理过程中，如果你不损失精度（某些模型可能会退化），你可以剪掉填充并不在正方形图像上运行。
- en: Can train on a bigger image size, then inference with cut padding to get the
    same inference latency as with simple resize. For example 640×640 vs 832×480\.
    The second one will preserve the aspect ratios and objects will appear +- the
    same size.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以在更大的图像尺寸上训练，然后通过裁剪填充进行推理，以获得与简单缩放相同的推理延迟。例如，640×640与832×480。第二个将保持纵横比，物体将出现+-相同的大小。
- en: Part of the compute is wasted on gray padding.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算资源的一部分被浪费在灰色填充上。
- en: Objects get smaller.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 物体会变小。
- en: How to test it and decide which one to use?
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 如何测试它并决定使用哪一个？
- en: 'Train from scratch with parameters:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下参数从头开始训练：
- en: Simple resize, 640×640
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简单缩放，640×640
- en: Keep aspect ratio, max side 640, and add padding (as a baseline)
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持纵横比，最大边长640，并添加填充（作为基线）
- en: Keep aspect ratio, larger image size (for example max side 832), and add padding
    Then inference 3 models. When the aspect ratio is preserved – cut padding during
    the inference. Compare latency and metrics.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持纵横比，更大的图像尺寸（例如最大边长832），然后添加填充。然后推理3个模型。当保持纵横比时——在推理过程中裁剪填充。比较延迟和指标。
- en: 'Example of the same image from above with cut padding (640 × 384):'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的示例图像裁剪填充后的示例（640×384）：
- en: '![](../Images/9736659a68aafa7f14eec2395cd9481f.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9736659a68aafa7f14eec2395cd9481f.png)'
- en: Sample from [VisDrone](https://github.com/VisDrone/VisDrone-Dataset) dataset
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 从[VisDrone](https://github.com/VisDrone/VisDrone-Dataset)数据集采样
- en: 'Here is what happens when you preserve ratio and inference by cutting gray
    padding:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 当你保持比例并通过裁剪灰色填充进行推理时，会发生以下情况：
- en: '[PRE1]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: As shown, training with preserved aspect ratio at a larger size (832) achieved
    a higher F1 score (0.633) compared to a simple 640×640 resize (F1 score of 0.617),
    while the latency remained similar. Note that some models may degrade if the padding
    is removed during inference, which kills the whole purpose of this trick and probably
    the letterbox too.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，在更大的尺寸（832）下保持纵横比进行训练，与简单的640×640缩放相比，实现了更高的F1分数（0.633），而延迟保持相似。请注意，如果推理过程中移除填充，某些模型可能会退化，这破坏了整个技巧的目的，也许letterbox也不例外。
- en: 'What does this mean:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这是什么意思：
- en: 'Training from scratch:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 从头开始训练：
- en: With the same image size, simple resize gets better accuracy than letterbox.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在相同的图像尺寸下，简单的缩放比letterbox有更高的精度。
- en: For letterbox, If you cut padding during the inference **and your model doesn’t
    lose accuracy** – you can train and inference with a bigger image size to match
    the latency, and get a little bit higher metrics (as in the example above).
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于letterbox，如果你在推理过程中**裁剪填充且模型没有失去精度**——你可以使用更大的图像尺寸进行训练和推理以匹配延迟，并获得略高的指标（如上面的示例所示）。
- en: 'Training with pre-trained weights initialized:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 使用预训练权重初始化的训练：
- en: If you finetune – use the same tactic as the pre-trained model did, it should
    give you the best results if the datasets are not too different.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你微调——使用与预训练模型相同的策略，如果数据集没有太大差异，应该会给你带来最佳结果。
- en: For D-FINE I see lower metrics when cutting padding during inference. Also the
    model was pre-trained on a simple resize. For YOLO, a letterbox is typically a
    good choice.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 对于D-FINE，我在推理过程中裁剪填充时看到较低的指标。此外，模型是在简单的缩放上预训练的。对于YOLO，letterbox通常是一个不错的选择。
- en: Training
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练
- en: 'Every ML engineer should know how to implement a training loop. Although PyTorch
    does much of the heavy lifting, you might still feel overwhelmed by the number
    of design choices available. Here are some key components to consider:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 每个机器学习工程师都应该知道如何实现训练循环。尽管PyTorch做了很多繁重的工作，但你可能会因为可用的设计选择数量而感到不知所措。以下是一些需要考虑的关键组件：
- en: '[Optimizer](https://pytorch.org/docs/stable/optim.html) – start with Adam/AdamW/SGD.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[优化器](https://pytorch.org/docs/stable/optim.html)——从Adam/AdamW/SGD开始。'
- en: '[Scheduler](https://pytorch.org/docs/stable/optim.html#how-to-adjust-learning-rate)
    – fixed LR can be ok for Adams, but take a look at StepLR, CosineAnnealingLR or
    OneCycleLR.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[调度器](https://pytorch.org/docs/stable/optim.html#how-to-adjust-learning-rate)——对于Adams，固定学习率可能可以，但请查看StepLR、CosineAnnealingLR或OneCycleLR。'
- en: '[EMA](https://arxiv.org/abs/1806.04498). This is a nice technique that makes
    training smoother and sometimes achieves higher metrics. After each batch, you
    update a secondary model (often called the EMA model)  by computing an exponential
    moving average of the primary model’s weights.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[EMA](https://arxiv.org/abs/1806.04498)。这是一种很好的技术，可以使训练更加平滑，有时可以达到更高的指标。在每个批次之后，你通过计算主模型权重的指数移动平均来更新一个次要模型（通常称为EMA模型）。'
- en: '[Batch accumulation](https://lightning.ai/docs/pytorch/stable/advanced/training_tricks.html#accumulate-gradients)
    is nice when your vRAM is very limited. Training a transformer-based object detection
    model means that in some cases even in a middle-sized model you only can fit 4
    images into the vRAM. By accumulating gradients over several batches before performing
    an optimizer step, you effectively simulate a larger batch size without exceeding
    your memory constraints. Another use case is when you have a lot of negatives
    (images without target objects) in your dataset and a small batch size, you can
    encounter unstable training. Batch accumulation can also help here.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[批积累](https://lightning.ai/docs/pytorch/stable/advanced/training_tricks.html#accumulate-gradients)在你的vRAM非常有限时很有用。训练基于transformer的对象检测模型意味着在某些情况下，即使是中等大小的模型，你只能将4张图像放入vRAM中。通过在执行优化器步骤之前累积多个批次的梯度，你实际上模拟了一个更大的批次大小，而不会超过你的内存限制。另一个用例是，当你的数据集中有很多负样本（没有目标对象的图像）且批次大小较小时，你可能会遇到不稳定的训练。批积累也可以在这里提供帮助。'
- en: '[AMP](https://pytorch.org/docs/stable/notes/amp_examples.html) uses half precision
    automatically where applicable. It reduces vRAM usage and makes training faster
    (if you have a GPU that supports it). I see 40% less vRAM usage and at least a
    15% training speed increase.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[AMP](https://pytorch.org/docs/stable/notes/amp_examples.html)在适用的情况下自动使用半精度。它减少了vRAM的使用，并使训练更快（如果你有支持它的GPU）。我看到vRAM使用量减少了40%，并且至少训练速度提高了15%。'
- en: '[Grad clipping](https://pytorch.org/docs/stable/generated/torch.nn.utils.clip_grad_norm_.html).
    Often, when you use AMP, training can become less stable. This can also happen
    with higher LRs. When your gradients are too big, training will fail. Gradient
    clipping will make sure gradients are never bigger than a certain value.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[梯度裁剪](https://pytorch.org/docs/stable/generated/torch.nn.utils.clip_grad_norm_.html)。通常，当你使用AMP时，训练可能会变得不稳定。这也可能发生在较高的学习率下。当你的梯度太大时，训练将失败。梯度裁剪将确保梯度永远不会超过某个特定值。'
- en: Logging. Try [Hydra](https://hydra.cc/docs/intro/) for configs and something
    like [Weights and Biases](https://wandb.ai/site/) or [Clear ML](https://clear.ml)
    for experiment tracking. Also, log everything locally. Save your best weights,
    and metrics, so after numerous experiments, you can always find all the info on
    the model you need.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录日志。尝试使用[Hydra](https://hydra.cc/docs/intro/)进行配置，以及类似[Weights and Biases](https://wandb.ai/site/)或[Clear
    ML](https://clear.ml)的实验跟踪工具。同时，也要在本地记录一切。保存你的最佳权重和指标，这样在进行了多次实验之后，你总能找到你需要的所有关于模型的信息。
- en: '[PRE2]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Metrics
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 指标
- en: For object detection everyone uses mAP, and it is already standardized how we
    measure those. Use [pycocotools](https://github.com/cocodataset/cocoapi/tree/master/PythonAPI/pycocotools)
    or [faster-coco-eval](https://github.com/MiXaiLL76/faster_coco_eval) or [TorchMetrics](https://lightning.ai/docs/torchmetrics/stable/)
    for mAP. But mAP means that we check how good the model is overall, on all confidence
    levels. mAP0.5 means that IoU threshold is 0.5 (everything lower is considered
    as a wrong prediction). I personally don’t fully like this metric, as in production
    we always use 1 confidence threshold. So why not set the threshold and then compute
    metrics? That’s why I also always calculate confusion matrices, and based on that
    – Precision, Recall, F1-score, and IoU.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 对于对象检测，每个人都使用mAP，并且我们衡量这些指标的方法已经标准化。使用[pycocotools](https://github.com/cocodataset/cocoapi/tree/master/PythonAPI/pycocotools)或[faster-coco-eval](https://github.com/MiXaiLL76/faster_coco_eval)或[TorchMetrics](https://lightning.ai/docs/torchmetrics/stable/)进行mAP。但mAP意味着我们检查模型在所有置信度水平上的整体表现。mAP0.5意味着IoU阈值是0.5（低于这个值的所有预测都被认为是错误的）。我个人并不完全喜欢这个指标，因为在生产中我们总是使用1个置信度阈值。那么为什么不在设置阈值后计算指标呢？这就是为什么我也总是计算混淆矩阵，并根据它计算精确度、召回率、F1分数和IoU。
- en: 'But logic also might be tricky. Here is what I use:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 但逻辑也可能很复杂。以下是我使用的方法：
- en: 1 GT (ground truth) object = 1 predicted object, and it’s a TP if IoU > threshold.
    If there is no prediction for a GT object – it’s a FN. If there is no GT for a
    prediction – it’s a FP.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1个GT（地面真实）对象等于1个预测对象，如果IoU大于阈值，则它是TP。如果没有对GT对象进行预测，则是FN。如果没有GT对预测，则是FP。
- en: 1 GT should be matched by a prediction only 1 time. If there are 2 predictions
    for 1 GT, then I calculate 1 TP and 1 FP.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1个GT应该只被匹配1次预测。如果有2个预测针对1个GT，那么我计算1个TP和1个FP。
- en: Class ids should also match. If the model predicts class_0 but GT is class_1,
    it means FP += 1 and FN += 1.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 类别ID也应该匹配。如果模型预测的是class_0，而GT是class_1，这意味着FP增加1，FN增加1。
- en: During training, I select the best model based on the metrics that are relevant
    to the task. I typically consider the average of mAP50 and F1-score.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练期间，我根据与任务相关的指标选择最佳模型。我通常考虑mAP50和F1分数的平均值。
- en: Model and loss
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型和损失
- en: I haven’t discussed model architecture and loss function here. They usually
    go together, and you can choose any model you like and integrate it into your
    pipeline with everything from above. I did that with DAMO-YOLO and D-FINE, and
    the results were great.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里没有讨论模型架构和损失函数。它们通常是一起使用的，你可以选择你喜欢的任何模型并将其集成到你的流程中，包括上面所有内容。我就是这样用DAMO-YOLO和D-FINE做的，结果很棒。
- en: Pick a suitable solution for your case
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为你的情况选择一个合适的解决方案
- en: Many people use Ultralytics, however it has GPLv3, and you can’t use it in commercial
    projects unless your code is open source. So people often look into Apache 2 and
    MIT licensed models. Check out [D-FINE](https://github.com/Peterande/D-FINE),
    [RT-DETR2](https://github.com/lyuwenyu/RT-DETR) or some yolo models like [Yolov9](https://github.com/MultimediaTechLab/YOLO).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人使用Ultralytics，然而它有GPLv3许可证，除非你的代码是开源的，否则你不能将其用于商业项目。因此，人们通常会考虑Apache 2和MIT许可的模型。查看[D-FINE](https://github.com/Peterande/D-FINE)、[RT-DETR2](https://github.com/lyuwenyu/RT-DETR)或一些YOLO模型，如[Yolov9](https://github.com/MultimediaTechLab/YOLO)。
- en: What if you want to customize something in the pipeline? When you build everything
    from scratch, you should have full control. Otherwise, try choosing a project
    with a smaller codebase, as a large one can make it difficult to isolate and modify
    individual components.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想在流程中自定义某些内容？当你从头开始构建一切时，你应该有完全的控制权。否则，尝试选择一个代码库较小的项目，因为一个大的项目可能会使隔离和修改单个组件变得困难。
- en: If you don’t need anything custom and your usage is allowed by the Ultralytics
    license – it’s a great repo to use, as it supports multiple tasks (classification,
    detection, instance segmentation, key points, oriented bounding boxes), models
    are efficient and achieve good scores. Reiterating ones more, you probably don’t
    need a custom training pipeline if you are not doing very specific things.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不需要任何自定义，并且你的使用受到Ultralytics许可证的允许——这是一个很好的仓库，因为它支持多个任务（分类、检测、实例分割、关键点、方向包围盒），模型效率高且得分良好。再次强调，如果你不是做非常具体的事情，你可能不需要自定义训练流程。
- en: Experiments
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验
- en: Let me share some results I got with a custom training pipeline with the D-FINE
    model and compare it to the Ultralytics YOLO11 model on the [VisDrone-DET2019
    dataset](https://paperswithcode.com/dataset/visdrone).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 让我分享一些我使用D-FINE模型和自定义训练流程得到的结果，并与Ultralytics YOLO11模型在[VisDrone-DET2019数据集](https://paperswithcode.com/dataset/visdrone)上的结果进行比较。
- en: 'Trained from scratch:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 从零开始训练：
- en: '[PRE3]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'From COCO pre-trained:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 从COCO预训练：
- en: '[PRE4]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Latency was measured on an RTX 3060 with TensorRT (TRT), static image size 640×640,
    including the time for `cv2.imread.` OpenVINO (OV) on i5 14000f (no iGPU). Dynamic
    means that during inference, gray padding is being cut for faster inference. It
    worked with the YOLO11 TensorRT version. More details about cutting gray padding
    above (*Letterbox or simple resize* section).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 延迟是在RTX 3060上使用TensorRT（TRT），静态图像大小640×640的情况下测量的，包括`cv2.imread.`的时间。OpenVINO（OV）在i5
    14000f（无iGPU）上。动态意味着在推理期间，灰色填充被裁剪以加快推理速度。它与YOLO11 TensorRT版本一起工作。更多关于裁剪灰色填充的细节请参阅（*Letterbox或简单调整大小*部分）。
- en: 'One disappointing result is the latency on intel N100 CPU with iGPU ($150 miniPC):'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 一个令人失望的结果是英特尔N100 CPU上带有iGPU（$150 miniPC）的延迟：
- en: '[PRE5]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/1e1b83bc037695125c6b9fdf2a26a9da.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1e1b83bc037695125c6b9fdf2a26a9da.png)'
- en: Author’s screenshot of iGPU usage from n100 machine during model inference
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 作者在n100机器上模型推理期间的iGPU使用截图
- en: Here, traditional convolutional neural networks are noticeably faster, maybe
    because of optimizations in OpenVINO for GPUs.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，传统的卷积神经网络明显更快，这可能是由于OpenVINO对GPU的优化。
- en: Overall, I conducted over 30 experiments with different datasets (including
    real-world datasets), models, and parameters and I can say that D-FINE gets better
    metrics. And it makes sense, as on COCO, it is also higher than all YOLO models.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，我进行了超过30次实验，包括不同的数据集（包括现实世界的数据集）、模型和参数，我可以肯定地说D-FINE得到了更好的指标。这在COCO上也是合理的，因为它比所有YOLO模型都要高。
- en: '![](../Images/0d1f8f3749855d2638d4f48e1922422c.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0d1f8f3749855d2638d4f48e1922422c.png)'
- en: '[D-FINE paper](https://arxiv.org/pdf/2410.13842) comparison to other object
    detection models'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '[D-FINE论文](https://arxiv.org/pdf/2410.13842)与其他目标检测模型的比较'
- en: 'VisDrone experiments:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: VisDrone实验：
- en: '![](../Images/42ced7d1171221c1f5724a342f3bcdc5.png)'
