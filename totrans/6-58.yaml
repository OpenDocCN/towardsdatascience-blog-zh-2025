- en: Start a New Year of Learning on the Right Foot
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开始新的一年，从正确的起点出发
- en: 原文：[https://towardsdatascience.com/start-a-new-year-of-learning-on-the-right-foot-1469b3d45348/](https://towardsdatascience.com/start-a-new-year-of-learning-on-the-right-foot-1469b3d45348/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/start-a-new-year-of-learning-on-the-right-foot-1469b3d45348/](https://towardsdatascience.com/start-a-new-year-of-learning-on-the-right-foot-1469b3d45348/)
- en: Feeling inspired to write your first TDS post? [We’re always open to contributions
    from new authors](http://bit.ly/write-for-tds).
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 感受到写第一篇TDS文章的灵感了吗？[我们始终欢迎新作者投稿](http://bit.ly/write-for-tds)。
- en: Happy new year! Welcome back to the Variable!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 新年快乐！欢迎回到Variable！
- en: The ink has barely dried on our 2024 highlights roundup (it’s [never too late
    to browse it](https://towardsdatascience.com/2024-highlights-the-ai-and-data-science-articles-that-made-a-splash-2c0979b4d595),
    of course), and here we are, ready to dive headfirst into a fresh year of learning,
    growth, and exploration.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们2024年的亮点回顾（当然，浏览它[永远不会太晚](https://towardsdatascience.com/2024-highlights-the-ai-and-data-science-articles-that-made-a-splash-2c0979b4d595)）的墨迹还未干透，我们就已经准备好一头扎进一个全新的学习、成长和探索之年。
- en: We have a cherished tradition of devoting the first edition of the year to our
    most inspiring—and accessible—resources for early-stage data science and machine
    learning professionals ([we](https://towardsdatascience.com/january-edition-becoming-better-learners-a595626554d6)
    [really](https://towardsdatascience.com/prompt-engineering-agents-and-llms-kickstart-a-new-year-of-hands-on-learning-about-ai-f48d6dad6dc6)
    [do](https://towardsdatascience.com/10-posts-to-help-you-kick-off-your-data-science-learning-in-2022-7fadf8647c23)!).
    We continue it this year with a selection of top-notch recent articles geared
    at beginner-level learners and job seekers. For the rest of our readers, we’re
    thrilled to kick things off with a trio of excellent posts from industry veterans
    who reflect on the current state of data science and AI, and share their opinionated,
    bold predictions for what the year ahead might look like. Let’s get started!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有一个珍视的传统，即每年将第一版献给那些最鼓舞人心且易于获取的资源，这些资源针对早期数据科学和机器学习专业人士（[我们](https://towardsdatascience.com/january-edition-becoming-better-learners-a595626554d6)
    [真的](https://towardsdatascience.com/prompt-engineering-agents-and-llms-kickstart-a-new-year-of-hands-on-learning-about-ai-f48d6dad6dc6)
    [做到了](https://towardsdatascience.com/10-posts-to-help-you-kick-off-your-data-science-learning-in-2022-7fadf8647c23)!）。今年，我们继续这一传统，精选了一系列针对初学者和求职者的顶级文章。对于其他读者，我们很高兴以三位行业资深人士的三篇优秀文章开启新的一年，他们反思了数据科学和人工智能的现状，并分享了对未来一年的大胆预测。让我们开始吧！
- en: '2025: Ready, Set, Go!'
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2025年：准备，出发！
- en: '**[Top 10 Data & AI Trends for 2025](https://towardsdatascience.com/top-10-data-ai-trends-for-2025-4ed785cafe16)**As
    the co-founder and CEO of Monte Carlo, few people are as well-positioned as [Barr
    Moses](None) to observe industry shifts and emerging trends—so her annual forecast
    should definitely be on your to-read list.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[2025年数据与人工智能十大趋势](https://towardsdatascience.com/top-10-data-ai-trends-for-2025-4ed785cafe16)**
    作为Monte Carlo的联合创始人和首席执行官，[巴里·摩西](None)在观察行业变化和新兴趋势方面几乎无人能出其右——因此她的年度预测绝对应该列入你的阅读清单。'
- en: '**[2024 in Review: What I Got Right, Where I Was Wrong, and Bolder Predictions
    for 2025](https://towardsdatascience.com/2024-in-review-what-i-got-right-where-i-was-wrong-and-bolder-predictions-for-2025-4092c2d726cd)**After
    a year dominated by RAG, AI agents, and knowledge graphs, what tools and workflows
    should we keep track of in the coming year? [Leonie Monigatti](None) shares a
    thorough recap of 2024—and a sneak peek at her well-tuned crystal ball for the
    year to come.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[2024年回顾：我所做对的，我所做错的，以及2025年的大胆预测](https://towardsdatascience.com/2024-in-review-what-i-got-right-where-i-was-wrong-and-bolder-predictions-for-2025-4092c2d726cd)**
    在以RAG、AI代理和知识图谱为主的一年之后，我们应该关注哪些工具和工作流程？[莱昂妮·莫尼加蒂](None)分享了对2024年的全面回顾——以及她对即将到来的年份精心调校的水晶球一瞥。'
- en: '**[Ten Predictions for Data Science and AI in 2025](https://towardsdatascience.com/ten-predictions-for-data-science-and-ai-in-2025-8d6fd29134b8)**From
    [Jason Tamara Widjaja](None), here’s another set of insightful reflections: "My
    predictions for 2025 attempt to provide a view of the tensions of AI, taking an
    unpopular but balanced view as someone whose work depends not on selling AI, but
    on implementing AI well – and living through the consequences of our decisions."'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[2025年数据科学和人工智能的十个预测](https://towardsdatascience.com/ten-predictions-for-data-science-and-ai-in-2025-8d6fd29134b8)**
    来自[贾森·塔玛拉·维加亚](None)的另一组深刻反思：“我对2025年的预测试图提供一个关于AI紧张关系的视角，作为一个工作不在于销售AI，而在于良好实施AI并承受我们决策后果的人，我持一个不受欢迎但平衡的观点。”'
- en: '![Photo by Annie Spratt on Unsplash](../Images/9a0232d72266c40df3c2b9b6cb506d36.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![Annie Spratt 在 Unsplash 上的照片](../Images/9a0232d72266c40df3c2b9b6cb506d36.png)'
- en: Photo by [Annie Spratt](https://unsplash.com/@anniespratt?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: Photo by [Annie Spratt](https://unsplash.com/@anniespratt?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
- en: Data science and machine learning, step by step by step
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据科学与机器学习，一步步
- en: '**[The Essential Guide to R and Python Libraries for Data Visualization](https://towardsdatascience.com/the-essential-guide-to-r-and-python-libraries-for-data-visualization-33be8511c976)**With
    or without AI, charts and plots aren’t going anywhere anytime soon. [Sarah Lea](None)
    maps out the key libraries in which current and aspiring data scientists should
    gain fluency.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[R和Python数据可视化库的必备指南](https://towardsdatascience.com/the-essential-guide-to-r-and-python-libraries-for-data-visualization-33be8511c976)**无论是否有AI，图表和图形在不久的将来都不会消失。[Sarah
    Lea](None)概述了当前和有抱负的数据科学家应该熟练掌握的关键库。'
- en: '**[Roadmap to Becoming a Data Scientist, Part 2: Software Engineering](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-2-software-engineering-e2fee3fe4d71)**Programming
    isn’t going anywhere in 2025, either. [Vyacheslav Efimov](None)‘s guide outlines
    the coding essentials that will lead you to data science success.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[成为数据科学家的路线图，第二部分：软件工程](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-2-software-engineering-e2fee3fe4d71)**编程在2025年也不会消失。[Vyacheslav
    Efimov](None)的指南概述了将引导你走向数据科学成功的编码基础。'
- en: '**[Missing Data in Time-Series: Machine Learning Techniques](https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-6b2273ff8b45)**One
    constant trait of real-world data: it’s messy! Learn how to navigate the chaos
    by following along [Sara Nóbrega](None)‘s primer on handling missing data.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[时间序列中缺失数据：机器学习技术](https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-6b2273ff8b45)**现实世界数据的恒定特征之一：它很混乱！通过跟随[Sara
    Nóbrega](None)关于处理缺失数据的入门指南来学习如何驾驭混乱。'
- en: '**[Causality – Mental Hygiene for Data Science](https://towardsdatascience.com/causality-mental-hygiene-for-data-science-b7efc302eb72)**Taking
    a few steps back from the more nitty-gritty aspects of data science work, [Eyal
    Kazin](None)‘s recent deep dive constitutes a "gentle intro" to the intricate
    art of detecting, interpreting, and applying causality.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[因果性 – 数据科学的心理健康](https://towardsdatascience.com/causality-mental-hygiene-for-data-science-b7efc302eb72)**从数据科学工作的更细节方面退后几步，[Eyal
    Kazin](None)最近的深入探讨构成了对检测、解释和应用因果性的复杂艺术的“温和介绍”。'
- en: '**[Master Machine Learning: 4 Classification Models Made Simple](https://towardsdatascience.com/master-machine-learning-4-classification-models-made-simple-7a924677113e)**For
    anyone who enjoys structure and clarity above all else, [Leo Anello](None)‘s (extremely)
    thorough, 15-step tutorial on classification models would be a perfect starting
    point from which to expand your ML know-how.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[掌握机器学习：4个简单的分类模型](https://towardsdatascience.com/master-machine-learning-4-classification-models-made-simple-7a924677113e)**对于喜欢结构性和清晰度的人来说，[Leo
    Anello](None)（极其）详尽的、15步教程关于分类模型将是一个完美的起点，从这里你可以扩展你的ML知识。'
- en: '**[2024 Survival Guide for Machine Learning Engineer Interviews](https://towardsdatascience.com/2024-survival-guide-for-machine-learning-engineer-interviews-e74eccef4645)**Whether
    you’re already applying for your first MLE job or contemplating it as one of your
    goals for the year, don’t miss [Mengliu Zhao](None)‘s "survival guide," aimed
    specifically at junior-level practitioners.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[2024年机器学习工程师面试生存指南](https://towardsdatascience.com/2024-survival-guide-for-machine-learning-engineer-interviews-e74eccef4645)**无论你已经在申请你的第一个MLE工作，还是将其视为你今年的目标之一，不要错过[Mengliu
    Zhao](None)的“生存指南”，它专门针对初级从业者。'
- en: '**[Machine Learning Basics I Look for in Data Scientist Interviews](https://towardsdatascience.com/machine-learning-basics-i-look-for-in-data-scientist-interviews-a6ff25be38c9)**Tackling
    the occasionally opaque hiring process from the other end of the table, [Farzad
    Nobar](None) created a helpful resource to help job applicants zoom in on the
    topics that really matter to employers.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[我在数据科学家面试中寻找的机器学习基础知识](https://towardsdatascience.com/machine-learning-basics-i-look-for-in-data-scientist-interviews-a6ff25be38c9)**从桌子的另一端处理偶尔不透明的招聘流程，[Farzad
    Nobar](None)创建了一个有用的资源，帮助求职者聚焦于雇主真正关心的主题。'
- en: '**[100 Years of (eXplainable) AI](https://towardsdatascience.com/100-years-of-explainable-ai-2c7ecee2e51a)**Beyond
    the whats and hows of day-to-day work, there are also the whys: why did *this*
    model produce *these* outputs? [Sofya Lipnitskaya](None)‘s explainer unpacks the
    history of AI explainability in the context of the recent rise of LLMs.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[100年（可解释）AI](https://towardsdatascience.com/100-years-of-explainable-ai-2c7ecee2e51a)**除了日常工作的“是什么”和“如何做”，还有“为什么”：为什么这个模型产生了这些输出？Sofya
    Lipnitskaya的解释者从LLMs最近兴起的角度，解构了AI可解释性的历史。'
- en: '**[How to Build a General-Purpose LLM Agent](https://towardsdatascience.com/build-a-general-purpose-ai-agent-c40be49e7400)**To
    end on a more hands-on note—and to satisfy the curiosity of all of you who’ve
    heard the buzz around AI agents—we highly recommend [Maya Murad](None)‘s step-by-step
    guide, which can form "the groundwork for designing your own custom agentic architecture"
    down the line.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[如何构建一个通用LLM代理](https://towardsdatascience.com/build-a-general-purpose-ai-agent-c40be49e7400)**为了更实际地结束本文，并满足所有听到AI代理热议的您的求知欲，我们强烈推荐Maya
    Murad的逐步指南，该指南可以形成“设计您自己的定制代理架构的基础”。'
- en: '* * *'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Thank you for supporting the work of our authors! As we mentioned above, we
    love publishing articles from new authors; if contributing to TDS in 2025 is one
    of your new year’s resolutions—or even if you’ve just recently written an interesting
    project walkthrough, tutorial, or theoretical reflection on any of our core topics—don’t
    hesitate to [share it with us](http://bit.ly/write-for-tds).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您支持我们作者的工作！正如我们上面提到的，我们热爱出版新作者的文章；如果您在2025年向TDS投稿是您的新年决心之一——或者即使您最近刚刚撰写了一个有趣的项目演练、教程或对我们核心主题的理论反思——请不要犹豫，[与我们分享它](http://bit.ly/write-for-tds)。
- en: Until the next Variable,
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 直到下一个变量，
- en: TDS Team
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: TDS团队
