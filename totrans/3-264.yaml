  prefs: []
  type: TYPE_PRE
- en: '**ML workflows: Branching Experiments**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data scientists and MLOps teams have a somewhat unique use-case compared to
    traditional software development teams. The development of machine learning and
    AI projects is inherently experimental. So from a Git workflow perspective, protocols
    need to flex to accommodate frequent iteration and complex branching strategies.
    You may also need the ability to track more than code, like experiment results,
    data, or model artifacts.
  prefs: []
  type: TYPE_NORMAL
- en: Feature branching augmented with experiment branches is probably the most popular
    approach.
  prefs: []
  type: TYPE_NORMAL
- en: 'This approach starts with the familiar feature branching workflow. Then within
    a feature branch, you create sub-branches for specific experiments. Think: “experiment_hyperparam_tuning”,
    or “experiment_xgboost”. This workflow affords enough granularity and flexibility
    to track individual experiments. And as with standard feature branches, this isolates
    development allowing experimental approaches to be explored without affecting
    the main codebase or other developers’ work.'
  prefs: []
  type: TYPE_NORMAL
- en: 'But *caveat emptor*: I said it was popular, but that doesn’t mean the branching
    experiments workflow is simple to manage. It can all turn to a tangled mess of
    spaghetti-branches if things are allowed to grow overly complex. This workflow
    involves frequent branching and merging, which can feel like unnecessary overhead
    in the face of rapid experimentation.'
  prefs: []
  type: TYPE_NORMAL
- en: 'A branching experiments workflow might look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '**Reproducible ML workflow**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Integrating tools like [MLflow](https://mlflow.org/docs/latest/getting-started/index.html) into
    a feature branching workflow or branching experiments workflow offers additional
    possibilities. Reproducibility is a key concern for ML projects, which is why
    tools like MLflow exist. To help manage the full machine learning lifecycle.
  prefs: []
  type: TYPE_NORMAL
- en: For our workflows, MLflow enhances our capabilities by enabling experiment tracking,
    logging model runs in the registry, and comparing the performance of various model
    specifications.
  prefs: []
  type: TYPE_NORMAL
- en: 'For a branching experiments workflow, the MLflow integration might look like
    this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**Takeaways**'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The Git workflows I’ve shared above should provide a good starting point for
    your team to streamline collaborative development and help them to build high-quality
    data and AI solutions. They’re not rigid templates, but rather adaptable frameworks.
    Try experimenting with different workflows. Then adjust them to craft the an approach
    that’s most effective for your needs.
  prefs: []
  type: TYPE_NORMAL
- en: '**Git Workflows Simplify: **The alternative is too frightening, too messy,
    too slow to be sustainable. It’s holding you back.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Your Team Matters:** The ideal workflow will vary depending on your team’s
    size, structure, and project complexity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Project Requirements:** The specific needs of the project, such as the frequency
    of releases and the level of ML experimentation, will also influence your choice
    of workflow.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ultimately, the best Git workflow for any data or MLOps dev team is the one
    that suits the specific requirements and development process of that team.
  prefs: []
  type: TYPE_NORMAL
