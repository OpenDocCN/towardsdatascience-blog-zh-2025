- en: 'Branching Out: 4 Git Workflows for Collaborating on ML'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/branching-out-4-git-workflows-for-collaborating-on-ml/](https://towardsdatascience.com/branching-out-4-git-workflows-for-collaborating-on-ml/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It’s been more than 15 years since I finished my master’s degree, but I’m still
    haunted by the hair-pulling frustration of managing my of *R* scripts. As a (recovering)
    perfectionist, I named each script very systematically by date (think: `ancova_DDMMYYYY.r`).
    A system I just *knew* was better than `_v1`, `_v2`, `_final` and its frenemies.
    Right?
  prefs: []
  type: TYPE_NORMAL
- en: Trouble was, every time I wanted to tweak my model inputs or review a previous
    model version, I had to swim through a sea of scripts.
  prefs: []
  type: TYPE_NORMAL
- en: Fast forward a few years, a few programming languages, and a career slalom later,
    I can clearly see how my solo struggles with code versioning were a lucky wake-up
    call.
  prefs: []
  type: TYPE_NORMAL
- en: While I managed to navigate those early challenges (with a few cringey moments!),
    I now recognise that most development, especially with Agile ways of working,
    thrives on robust version control systems. The ability to track changes, revert
    to previous versions, and ensure reproducibility within a collaborative codebase
    can’t be an afterthought. It’s actually a necessity.
  prefs: []
  type: TYPE_NORMAL
- en: When we use version control workflows, often in Git, we lay the groundwork for
    developing and deploying more reliable and higher quality data and AI solutions.
  prefs: []
  type: TYPE_NORMAL
- en: '**Before we begin**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you already use version control and you’re thinking about different workflows
    for your team, welcome! You’ve come to the right place.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re new to Git or have only used it on solo projects, I recommend reviewing
    some introductory Git principles. You’ll want more background before jumping into
    team workflows. GitHub provides links to several Git and GitHub tutorials [here](https://docs.github.com/en/get-started/start-your-journey/git-and-github-learning-resources).
    And [this](https://towardsdatascience.com/a-simple-git-workflow-for-github-beginners-and-everyone-else-87e39b50ee08) getting
    started post introduces basics like how to create a repo and add a file.
  prefs: []
  type: TYPE_NORMAL
- en: '**Development teams work in different ways**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: But a ubiquitous feature is reliance on version control.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Git is incredibly flexible as a version control system, and it allows developers
    a lot of freedom in how they manage their code. If you’re not careful, though,
    flexibility leaves room for chaos if not managed effectively. Establishing Git
    workflows can guide your team’s development so you’re using Git more consistently
    and efficiently. Think of it as the team’s shared roadmap for navigating Git’s
    highways and byways.
  prefs: []
  type: TYPE_NORMAL
- en: By defining when we create branches, how we merge changes, and why we review
    code, we create a common understanding and foster more reliable ways of developing
    as a team. Which means that every team has the opportunity to create their own
    Git workflows that work for their specific organisational structure, use-cases,
    tech stack, and requirements. It’s possible to have as many ways of using Git
    as a team as there are development teams. Ultimate flexibility.
  prefs: []
  type: TYPE_NORMAL
- en: You may find that idea liberating. You and your team have the freedom to design
    a Git workflow that works for you!
  prefs: []
  type: TYPE_NORMAL
- en: But if that sounds intimidating, not to worry. There are several established
    protocols to use as a starting point for agreeing on team workflows.
  prefs: []
  type: TYPE_NORMAL
- en: '**Make Git your friend**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Version control is useful in so many ways, but the benefits I see over and over
    on my teams cluster into a few essential categories. We’re here to focus on workflows
    so I won’t go into great depth, but the central premise and advantages of Git
    and GitHub are worth highlighting.
  prefs: []
  type: TYPE_NORMAL
- en: '**(Almost) anything is reversible.** Which means that version control systems
    free you up to get creative and make mistakes. Rolling back any regrettable code
    changes is as simple as `git revert`. Like a good neighbour, Git commands are
    there.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Simplifies code collaboration.** Once you get into the flow of using it,
    Git really facilitates seamless collaboration across the team. Work can happen
    concurrently without interfering with anyone else’s code, and code changes are
    all documented in commit snapshots. This means anyone on the team can take a peek
    at what the others have been working on and how they went about it, because the
    changes are captured in the Git history. Collaboration made easy.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Isolating exploratory work in feature branches.** How will you know which
    model gives the best performance for your specific business problem? In a recent
    revenues use case, it could’ve been time series models, maybe tree-based methods,
    or convolutional neural networks. Possibly even Bayesian approaches. Without the
    parallel branching ability Git provided my team, trialling the different methods
    would’ve resulted in a codebase of pure chaos.'
  prefs: []
  type: TYPE_NORMAL
- en: '**In-built review process (massively improves code quality).** By putting code
    through peer review using GitHub’s pull request system, I’ve seen team after team
    grow in their abilities to leverage their collective knowledge to write cleaner,
    faster, more modular code. As code review helps team members identify and address
    bugs, design flaws, and maintainability, it ultimately leads to higher quality
    code.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reproducibility.** As in, every change made to the codebase is recorded in
    the Git history. Which makes it incredibly easy to track changes, revert to previous
    versions, and reproduce past experiments. I can’t understate its importance for
    debugging, code maintenance, and ensuring the reliability of any experimental
    findings.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Different flavours of workflows for different types of work**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Feature-branching workflow: The Standard Bearer**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is the most common Git workflow used in dev teams. It’d be difficult to
    unseat it in terms of its popularity, and for good reason. In a feature branching
    workflow, each new functionality or improvement to the code is developed in its
    own dedicated branch, separate from the main codebase.
  prefs: []
  type: TYPE_NORMAL
- en: A branching workflow provides each developer with an isolated workspace (a branch)
    — their own complete copy of the project. This lets every person on the team do
    focused work, independent of what’s happening elsewhere in the project. They can
    make code changes and forget about upstream development, working independently
    until they’re ready to share their code.
  prefs: []
  type: TYPE_NORMAL
- en: At that point, they can take advantage of GitHub’s pull request (PR) functionality
    to facilitate code review and collaborate with the team to ensure the changes
    are evaluated and approved before being merged into the codebase.
  prefs: []
  type: TYPE_NORMAL
- en: This approach is especially beneficial to Agile development teams and teams
    working on complex projects that call for frequent code changes.
  prefs: []
  type: TYPE_NORMAL
