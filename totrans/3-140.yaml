- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: If you’d like to explore innovative approaches to optimizing your LLM-based
    workflows, you’re in the right place. Our highlights this week cover agent tool-calling,
    functional testing of prompts, and creating your very own AI coding assistant.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we dive in, however, a quick reminder: At TDS, we welcome articles from
    existing and new authors alike — so if you’re sitting on a draft related to data
    science, AI, or adjacent topics, our [contributor portal is open](https://contributor.insightmediagroup.io/)!'
  prefs: []
  type: TYPE_NORMAL
- en: A Clear Intro to MCP (Model Context Protocol) with Code Examples
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: New to MCP (Model Context Protocol)? [Sandi Besen](https://towardsdatascience.com/author/sandibesen/) shares
    an accessible introduction to this emerging method for orchestrating AI agents’
    functionalities — complete with a hands-on code example to keep things concrete
    and actionable.
  prefs: []
  type: TYPE_NORMAL
- en: '[A Clear Intro to MCP (Model Context Protocol) with Code Examples](https://towardsdatascience.com/clear-intro-to-mcp/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Mastering Prompt Engineering with Functional Testing: A Systematic Guide to
    Reliable LLM Outputs'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How can you ensure models produce the outputs you’re looking for? [Ugo Pradère](https://towardsdatascience.com/author/ugopradere/) outlines
    the benefits of algorithmic testing of your prompts.
  prefs: []
  type: TYPE_NORMAL
- en: '[Mastering Prompt Engineering with Functional Testing: A Systematic Guide to
    Reliable LLM Outputs ](https://towardsdatascience.com/mastering-prompt-engineering-with-functional-testing-a-systematic-guide-to-reliable-llm-outputs/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Build Your Own AI Coding Assistant in JupyterLab with Ollama and Hugging Face
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Clear and focused, [Parul Pandey](https://towardsdatascience.com/author/pandeyparul/)‘s
    step-by-step guide shows how you can leverage the power of LLMs to boost your
    programming productivity.
  prefs: []
  type: TYPE_NORMAL
- en: '[Build Your Own AI Coding Assistant in JupyterLab with Ollama and Hugging Face](https://towardsdatascience.com/build-your-own-ai-coding-assistant-in-jupyterlab-with-ollama-and-hugging-face/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Other Recommended Reads
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our authors’ interests go far and wide — as you can see by the other standout
    articles we highlight this week, spanning multimodality, data science agents,
    and statistics, among other topics.
  prefs: []
  type: TYPE_NORMAL
- en: How well [can multimodal AI systems understand figures](https://towardsdatascience.com/testing-the-power-of-multimodal-ai-systems-in-reading-and-interpreting-photographs-maps-charts-and-more/) and
    extract information from them? [Luciano Abriata](https://towardsdatascience.com/author/lucianosphere/) offers
    a detailed look at the recent strides they’ve made.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Testing the Power of Multimodal AI Systems in Reading and Interpreting Photographs,
    Maps, Charts and More](https://towardsdatascience.com/testing-the-power-of-multimodal-ai-systems-in-reading-and-interpreting-photographs-maps-charts-and-more/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To [minimize the impact of any data disruptions](https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/),
    follow the practical insights in [Alle Sravani](https://towardsdatascience.com/author/alle-sravani/)‘s
    tutorial on the Tableau Metadata API.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[No More Tableau Downtime: Metadata API for Proactive Data Health](https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For [product teams to excel in the age of AI](https://towardsdatascience.com/evolving-product-operating-models-in-the-age-of-ai/),
    organizations need to set them up for success; [Chinmay Kakatkar](https://towardsdatascience.com/author/kcpub21/) spells
    out what that entails.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Evolving Product Operating Models in the Age of AI](https://towardsdatascience.com/evolving-product-operating-models-in-the-age-of-ai/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Read [Yu Dong](https://towardsdatascience.com/author/ydong029/)‘s walkthrough
    of Google’s Data Science Agent to stay up-to-date with [the latest AI-powered
    tools of the trade](https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/) —
    including both their benefits and shortcomings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Google’s Data Science Agent: Can It Really Do Your Job?](https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Who doesn’t love a stats deep dive? We’re thrilled to welcome back [Alejandro
    Alvarez Perez](https://towardsdatascience.com/author/alejandroalvarezprez/), whose [primer
    on the Poisson distribution](https://towardsdatascience.com/mastering-the-poisson-distribution-intuition-and-foundations/) is
    clear, thorough, and beginner-friendly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Mastering the Poisson Distribution: Intuition and Foundations](https://towardsdatascience.com/mastering-the-poisson-distribution-intuition-and-foundations/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Meet Our New Authors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Explore top-notch work from some of our recently added contributors:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Daragh Sibley](https://towardsdatascience.com/author/daragh-sibley/) brings
    a wealth of industry experience to his writing—including his debut article on
    organizational models for data teams.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Six Organizational Models for Data Science](https://towardsdatascience.com/six-organizational-models-for-data-science/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Anya Korsakova](https://towardsdatascience.com/author/anya-korsakova/)‘s research
    focuses on bioinformatics and genomics, but her new TDS article explores the beauty
    and chaos of attractors in neural network circuits.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Attractors in Neural Network Circuits: Beauty and Chaos](https://towardsdatascience.com/attractors-in-neural-network-circuits-beauty-and-chaos/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Bartek Szubstarski](https://towardsdatascience.com/author/bartek-szubstarski/) joins
    our community with data-processing expertise, which comes handy in his pragmatic
    examination of algorithm protection in the context of federated learning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Algorithm Protection in the Context of Federated Learning ](https://towardsdatascience.com/algorithm-protection-in-the-context-of-federated-learning/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
