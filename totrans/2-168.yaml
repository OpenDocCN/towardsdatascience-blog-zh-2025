- en: 'Time Series Forecasting Made Simple (Part 3.1): STL Decomposition'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 时间序列预测简单化（第3.1部分）：STL分解
- en: 原文：[https://towardsdatascience.com/time-series-forecasting-made-simple-part-3-1-stl-decomposition-understanding-initial-trend-and-seasonality-prior-to-loess-smoothing/](https://towardsdatascience.com/time-series-forecasting-made-simple-part-3-1-stl-decomposition-understanding-initial-trend-and-seasonality-prior-to-loess-smoothing/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/time-series-forecasting-made-simple-part-3-1-stl-decomposition-understanding-initial-trend-and-seasonality-prior-to-loess-smoothing/](https://towardsdatascience.com/time-series-forecasting-made-simple-part-3-1-stl-decomposition-understanding-initial-trend-and-seasonality-prior-to-loess-smoothing/)
- en: <mdspan datatext="el1752023920619" class="mdspan-comment">In the [first two
    parts of this series](https://towardsdatascience.com/author/nikhil-dasari/)</mdspan>,
    we explored trend, seasonality, and residuals using temperature data as our example.
    We started by uncovering patterns in the data with Python’s `seasonal_decompose`
    method. Next, we made our first temperature forecasts using standard baseline
    models like the seasonal naive.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752023920619" class="mdspan-comment">在本系列的[前两部分](https://towardsdatascience.com/author/nikhil-dasari/)中，我们使用温度数据作为示例，探讨了趋势、季节性和残差。我们首先使用Python的`seasonal_decompose`方法揭示数据中的模式。接下来，我们使用标准基线模型（如季节性天真模型）进行了第一次温度预测。
- en: From there, we went deeper and learned how `seasonal_decompose` actually computes
    the trend, seasonality and residual components.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，我们进一步学习 `seasonal_decompose` 实际上是如何计算趋势、季节性和残差成分的。
- en: We extracted those pieces to build a decomposition-based baseline model and
    then experimented with custom baselines tailored to our data.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们提取了这些部分来构建基于分解的基线模型，然后针对我们的数据进行了定制基线的实验。
- en: Finally, we evaluated each model using Mean Absolute Percentage Error (MAPE)
    to see how well our approaches performed.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们使用平均绝对百分比误差（MAPE）评估每个模型，以查看我们的方法表现如何。
- en: In the first two parts, we worked with temperature data, a relatively simple
    dataset where the trend and seasonality were clear and `seasonal_decompose` did
    a good job of capturing those patterns.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在前两部分中，我们处理了温度数据，这是一个相对简单的数据集，其中趋势和季节性都很明显，`seasonal_decompose`很好地捕捉了这些模式。
- en: However, in many real-world datasets, things aren’t always so straightforward.
    Trends and seasonal patterns can shift or get messy, and in these cases, `seasonal_decompose`
    may not capture the underlying structure as effectively.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在许多现实世界的数据集中，事情并不总是这么简单。趋势和季节性模式可能会改变或变得混乱，在这些情况下，`seasonal_decompose` 可能无法有效地捕捉到潜在的结构。
- en: 'This is where we turn to a more advanced decomposition method to better understand
    the data: **STL — Seasonal-Trend decomposition using LOESS.**'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这里我们转向更高级的分解方法来更好地理解数据：**STL — 使用LOESS的季节性-趋势分解**。
- en: '**LOESS** stands for **Locally Estimated Scatterplot Smoothing**.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**LOESS**代表**局部估计散点图平滑**。'
- en: To better understand this in action, we’ll use the *[Retail Sales of Department
    Stores](https://fred.stlouisfed.org/series/RSDSELD)* dataset from FRED (Federal
    Reserve Economic Data).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解这一过程，我们将使用来自FRED（联邦储备经济数据）的*[零售百货商店销售数据集](https://fred.stlouisfed.org/series/RSDSELD)*。
- en: 'Here’s what the data looks like:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是数据看起来像什么：
- en: '![](../Images/1234fd0f31b5ab6770102dab1af830c4.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1234fd0f31b5ab6770102dab1af830c4.png)'
- en: '**Sample of the Retail Sales of Department Stores dataset from FRED.**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**FRED的零售百货商店销售数据集样本。**'
- en: The dataset we’re working with tracks monthly retail sales from U.S. department
    stores, and it comes from the trusted FRED (Federal Reserve Economic Data) source.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在处理的数据集跟踪了美国百货商店的月度零售销售，并来自受信任的FRED（联邦储备经济数据）来源。
- en: 'It has just two columns:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 它只有两列：
- en: '**`Observation_Date`** – the beginning of each month'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`Observation_Date`** – 每个月的开始'
- en: '**`Retail_Sales`** – total sales for that month, in **millions of dollars**'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`Retail_Sales`** – 该月总销售额，以**百万美元**为单位'
- en: The time series runs from **January 1992 all the way to March 2025**, giving
    us over 30 years of sales data to explore.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 时间序列从**1992年1月一直持续到2025年3月**，为我们提供了超过30年的销售数据来探索。
- en: '**Note:** Even though each date marks the start of the month (like `01-01-1992`),
    the sales value represents the total sales for the entire month.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意：** 即使每个日期都标志着一个月的开始（例如 `01-01-1992`），销售额代表的是整个月的总销售额。'
- en: But before jumping into STL, we will run the classic `seasonal_decompose` on
    our dataset and take a look at what it shows us.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 但在跳入STL之前，我们将对数据集运行经典的`seasonal_decompose`，并看看它告诉我们什么。
- en: '**Code:**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE0]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Plot:**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**图表：**'
- en: '![](../Images/6a56cbfb7b3c1039f2b502ed9f9796cc.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6a56cbfb7b3c1039f2b502ed9f9796cc.png)'
- en: '**Classical Seasonal Decomposition (Additive) of monthly retail sales.**'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**月度零售销售的经典季节性分解（加法）。**'
- en: The observed series shows a gradual decline in overall sales. However, the seasonal
    component remains fixed across time — a limitation of classical decomposition,
    which assumes that seasonal patterns do not change, even when real-world behavior
    evolves.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 观察到的序列显示整体销售额逐渐下降。然而，季节性成分在时间上保持固定——这是经典分解的限制，它假设季节模式不会改变，即使现实世界的行为在演变。
- en: In Part 2, we explored how `seasonal_decompose` computes trend and seasonal
    components under the assumption of a fixed, repeating seasonal structure.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在第二部分中，我们探讨了在假设固定、重复的季节结构的情况下，`seasonal_decompose`如何计算趋势和季节成分。
- en: However, real-world data doesn’t always follow a fixed pattern. Trends may change
    gradually and seasonal behaviors can vary year to year. This is why we need a
    more adaptable approach, and STL decomposition offers exactly that.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，现实世界的数据并不总是遵循固定的模式。趋势可能会逐渐变化，季节性行为也可能每年有所不同。这就是为什么我们需要一个更具适应性的方法，而STL分解正好提供了这样的方法。
- en: We will apply STL decomposition to the data to observe how it handles shifting
    trends and seasonality.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将应用STL分解来观察它如何处理趋势和季节性的变化。
- en: '[PRE1]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Plot:**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**图：**'
- en: '![](../Images/b10657a0e73e0becad6a812dd0cfc386.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b10657a0e73e0becad6a812dd0cfc386.png)'
- en: '**STL Decomposition of Retail Sales Data.**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**零售销售数据的STL分解。**'
- en: Unlike classical decomposition, STL allows the seasonal component to change
    gradually over time. This flexibility makes STL a better fit for real-world data
    where patterns evolve, as seen in the adaptive seasonal curve and cleaner residuals.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 与经典分解不同，STL允许季节性成分随时间逐渐变化。这种灵活性使STL更适合于模式演变的现实世界数据，如自适应季节曲线和更干净的残差所示。
- en: After completing that step, got a feel for what STL does, we will dive into
    how it figures out the trend and seasonal patterns behind the scenes.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在完成这一步骤后，对STL的作用有了感觉，我们将深入了解它如何幕后确定趋势和季节性模式。
- en: To better understand how STL decomposition works, we will consider a sample
    from our dataset spanning from January 2010 to December 2023.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解STL分解的工作原理，我们将考虑一个从2010年1月到2023年12月的数据集样本。
- en: '![](../Images/03bae49b0e0b536217b1ea2e8caf62fe.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/03bae49b0e0b536217b1ea2e8caf62fe.png)'
- en: '**Table: Sample of monthly retail sales data from January 2010 to December
    2023 used to demonstrate STL decomposition.**'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**表：用于演示STL分解的2010年1月至2023年12月月度零售销售数据样本。**'
- en: To understand how STL decomposition works on this data, we first need rough
    estimates of the trend and seasonality.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解STL分解如何作用于这些数据，我们首先需要粗略估计趋势和季节性。
- en: Since STL is a smoothing-based technique, it requires an initial idea of what
    should be smoothed, such as where the trend lies and how the seasonal patterns
    behave.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 由于STL是一种基于平滑的技术，它需要一个初始的想法，即应该平滑什么，例如趋势所在的位置以及季节性模式如何表现。
- en: We will begin by visualizing the retail‐sales series (Jan 2010–Dec 2023) and
    use Python’s STL routine to extract its trend, seasonal, and remainder parts.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先可视化2010年1月至2023年12月的零售销售序列，并使用Python的STL例程提取其趋势、季节和剩余部分。
- en: '**Code:**'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE2]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Plot:**'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**图：**'
- en: '![](../Images/5ba7053bf17b840f9ce8eee041f603ec.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5ba7053bf17b840f9ce8eee041f603ec.png)'
- en: '**STL Decomposition of Retail Sales (2010–2023)**'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**2010年至2023年的零售销售STL分解**'
- en: To understand how STL derives its components, we first estimate the data’s long-term
    trend using a centered moving average.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解STL如何推导其成分，我们首先使用中心移动平均估计数据的长期趋势。
- en: We will use a single-month example to demonstrate how to calculate a centered
    moving average.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用一个单月示例来演示如何计算中心移动平均。
- en: We will calculate the centered moving average for **July 2010**.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将计算2010年7月的中心移动平均。
- en: '![](../Images/1a0b584634691beb01566fe6d8e962da.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1a0b584634691beb01566fe6d8e962da.png)'
- en: '**Monthly Retail Sales from Jan 2010 to Jan 2011**'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**2010年1月至2011年1月的月度零售销售**'
- en: Because our data is monthly, the natural cycle covers twelve points, which is
    an even number. Averaging January 2010 through December 2010 produces a value
    that falls halfway between June and July.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们的数据是按月度收集的，自然周期覆盖了十二个点，这是一个偶数。从2010年1月到2010年12月的平均值落在6月和7月之间。
- en: To adjust for this, we form a second window from February 2010 through January
    2011, whose twelve-month mean lies halfway between July and August.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 为了调整这一点，我们形成一个从2010年2月到2011年1月的第二个窗口，其十二个月的平均值位于7月和8月之间。
- en: We then compute each window’s simple average and average those two results.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们计算每个窗口的简单平均值，并平均这两个结果。
- en: In the first window July is the seventh of twelve points, so the mean lands
    between months six and seven.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一个窗口中，七月是十二个点中的第七个，所以平均值落在第六个月和第七个月之间。
- en: In the second window July is the sixth of twelve points, so its mean also falls
    between months six and seven but shifted forward.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在第二个窗口中，七月是十二个点中的第六个，所以它的平均值也落在第六个月和第七个月之间，但向前移动了。
- en: Averaging both estimates pulls the result back onto July 2010 itself, yielding
    a true centered moving average for that month.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 将这两个估计值平均后，结果会回到2010年7月本身，从而得到该月的真实中心移动平均。
- en: '![](../Images/c3d2d8118b35d7ece9d99118ee240dfb.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c3d2d8118b35d7ece9d99118ee240dfb.png)'
- en: '**Computation of the Two 12-Month Averages for July 2010**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**计算2010年7月的两个12个月平均数**'
- en: '![](../Images/e9294d2405c38dde031b52502a97438c.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e9294d2405c38dde031b52502a97438c.png)'
- en: '**Centering the Moving Average on July 2010**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**将移动平均中心化在2010年7月**'
- en: This is how we compute the initial trend using a centered moving average.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们如何使用中心移动平均来计算初始趋势。
- en: At the very start and end of our series, we simply don’t have six months on
    both sides to average—so there’s no “natural” centered MA for Jan–Jun 2010 or
    for Jul–Dec 2023\.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在序列的非常开始和结束处，我们两边都没有六个月的时间来进行平均——所以对于2010年1月至6月或2023年7月至12月来说，没有“自然”的中心化移动平均。
- en: Rather than drop those points, we carry the first real July 2010 value backwards
    to fill Jan–Jun, and carry our last valid December 2023 value forward to fill
    Jul–Dec 2023\.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是删除这些点，我们将第一个真实的2010年7月值向前推移以填补1月至6月，并将我们最后的有效2023年12月值向前推移以填补2023年7月至12月。
- en: That way, every month has a baseline trend before we move on to the LOESS refinements.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，在继续进行LOESS细化之前，每个月都有一个基线趋势。
- en: Next, we will use Python to compute the initial trend for each month.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将使用Python计算每个月的初始趋势。
- en: '**Code:**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE3]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**Table:**'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**表：**'
- en: '![](../Images/e753730ecb4f06570c93e100215eed4c.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e753730ecb4f06570c93e100215eed4c.png)'
- en: '**Table: Retail Sales with Initial Centered Moving-Average Trend**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**表：带有初始中心移动平均趋势的零售销售额**'
- en: '* * *'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: We have extracted the initial trend using a centered moving average, let’s see
    how it actually looks.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经使用中心移动平均提取了初始趋势，让我们看看它实际上看起来是什么样子。
- en: We will plot it along with the original time series and STL’s final trend line
    to compare how each one captures the overall movement in the data.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将把它与原始时间序列和STL的最终趋势线一起绘制出来，以比较每个如何捕捉数据的整体运动。
- en: '**Plot:**'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**图：**'
- en: '![](../Images/310cbea3098ef040162a0a41691c5d3c.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/310cbea3098ef040162a0a41691c5d3c.png)'
- en: '**Observed Sales vs. Initial 12-month Moving Average Trend vs. Final STL Trend**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**实际销售额与初始12个月移动平均趋势与最终STL趋势的比较**'
- en: Looking at the plot, we can see that the trend line from the moving average
    almost overlaps with the STL trend for most of the years.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 从图中可以看出，移动平均趋势线在大多数年份几乎与STL趋势线重叠。
- en: But around Jan–Feb 2020, there’s a sharp dip in the moving average line. This
    drop was due to the sudden impact of COVID on sales.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 但在2020年1月至2月左右，移动平均线出现急剧下降。这次下降是由于COVID对销售的突然影响。
- en: STL handles this better, it doesn’t treat it as a long-term trend change but
    instead marks it as a residual.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: STL处理得更好，它不将其视为长期趋势变化，而是将其标记为残差。
- en: That’s because STL sees this as a one-time unexpected event, not a repeating
    seasonal pattern or a shift in the overall trend.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为STL将其视为一次性的意外事件，而不是重复的季节性模式或整体趋势的变化。
- en: To understand how STL does this and how it handles changing seasonality, let’s
    continue building our understanding step by step.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解STL是如何做到这一点以及它如何处理变化的季节性，让我们一步一步地继续构建我们的理解。
- en: We now have the initial trend using moving averages, so let’s move on to the
    next step in the STL process.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在有了使用移动平均得到的初始趋势，所以让我们继续STL过程的下一步。
- en: '* * *'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Next, we subtract our centered MA trend from the original sales to obtain the
    detrended series.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们从原始销售额中减去我们的中心化趋势，以获得去趋势序列。
- en: '![](../Images/444dcb1f7d3336778fb384b6c76107e1.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/444dcb1f7d3336778fb384b6c76107e1.png)'
- en: '**Table: Actual Sales, Initial MA Trend and Detrended Values**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**表：实际销售额，初始MA趋势和去趋势值**'
- en: '* * *'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: We have removed the long-term trend from our data, so the remaining series shows
    just the repeating seasonal swings and random noise.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经从数据中移除了长期趋势，所以剩下的序列只显示了重复的季节性波动和随机噪声。
- en: Let’s plot it to see the regular ups and downs and any unexpected spikes or
    dips.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们绘制出来，看看规律性的上升和下降以及任何意外的波动或下降。
- en: '![](../Images/95a19425817944421437b768f148ddc7.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/95a19425817944421437b768f148ddc7.png)'
- en: '**Detrended Series Showing Seasonal Patterns and Irregular Spikes/Dips**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**去除趋势的序列显示季节性模式和随机波动/下降**'
- en: The above plot shows what remains after we remove the long-term trend. You can
    see the familiar annual rise and fall and that deep drop in January 2020 when
    COVID hit.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的图表显示了我们在去除长期趋势后剩下的内容。你可以看到熟悉的年度起伏，以及2020年1月COVID疫情爆发时的深度下降。
- en: When we average all the January values, including the 2020 crash, that single
    event blends in and hardly affects the January average.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将包括2020年崩溃在内的所有1月份的值平均在一起时，那个单一事件就会融入其中，几乎不影响1月份的平均值。
- en: This helps us ignore rare shocks and focus on the true seasonal pattern. Now
    we will group the detrended values by month and take their averages to create
    our first seasonal estimate.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这有助于我们忽略罕见的冲击，并专注于真正的季节性模式。现在我们将去趋势值按月份分组并取平均值，以创建我们的第一个季节性估计。
- en: This gives us a stable estimate of seasonality, which STL will then refine and
    smooth in later iterations to capture any gradual shifts over time.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这为我们提供了一个稳定的季节性估计，STL将在后续迭代中对其进行细化和平滑，以捕捉任何随时间逐渐的变化。
- en: '* * *'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Next, we will repeat our seasonal-decompose approach: we’ll group the detrended
    values by calendar month to extract the raw monthly seasonal offsets.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将重复我们的季节分解方法：我们将按日历月份对去趋势值进行分组，以提取原始的月度季节性偏移量。
- en: Let’s focus on January and gather all the detrended values for that month.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们专注于1月，并收集该月的所有去趋势值。
- en: '![](../Images/113ea76eddb5fb8f3ee676e6ea8bb25e.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/113ea76eddb5fb8f3ee676e6ea8bb25e.png)'
- en: '**Table: Detrended January Values (2010–2023)**'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**表: 去趋势的1月值（2010–2023）**'
- en: Now, we compute the **average of the detrended values for January** across all
    years to obtain a rough seasonal estimate for that month.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们计算所有年份1月去趋势值的**平均值**，以获得该月的粗略季节性估计。
- en: '![](../Images/78486806e0bdbcc298ec8b0bb5f01752.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/78486806e0bdbcc298ec8b0bb5f01752.png)'
- en: '**Calculating the average of January’s detrended values across 12 years to
    obtain the seasonal estimate for January.**'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '**通过计算12年来1月去趋势值的平均值以获得1月的季节性估计。**'
- en: This process is repeated for all 12 months to form the initial seasonal component.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程会重复进行所有12个月，以形成初始的季节性成分。
- en: '![](../Images/fdddb983eda51cc3754354843988ad91.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fdddb983eda51cc3754354843988ad91.png)'
- en: '****Table:** Monthly average of detrended values, forming the seasonal estimate
    for each month.**'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**表:** 每月去趋势值的平均值，形成每个月的季节性估计。'
- en: Now we have the average detrended values for each month, we map them across
    the entire time series to construct the initial seasonal component.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了每个月的平均去趋势值，我们将它们映射到整个时间序列中，以构建初始的季节性成分。
- en: '![](../Images/63fb4ee507a55754c9eb3c7ebdcc415b.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/63fb4ee507a55754c9eb3c7ebdcc415b.png)'
- en: '****Table:** Detrended values and their monthly averages used for estimating
    the seasonal pattern.**'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**表:** 用于估计季节性模式的去趋势值及其月度平均值。**'
- en: '* * *'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: After grouping the detrended values by month and calculating their averages,
    we obtain a new series of monthly means. Let’s plot this series to observe how
    the data look after applying this averaging step.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在按月份对去趋势值进行分组并计算它们的平均值后，我们得到了一个新的月度平均值序列。让我们绘制这个序列，以观察应用此平均步骤后的数据看起来如何。
- en: '![](../Images/516dc99cdc36fd04062c4ced94e1ac59.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/516dc99cdc36fd04062c4ced94e1ac59.png)'
- en: '**seasonal estimate by repeating monthly averages.**'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**通过重复每月平均值进行季节性估计。**'
- en: In the above plot, we grouped the detrended values by month and took the average
    for each one.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的图表中，我们按月份对去趋势值进行了分组，并对每个值取了平均值。
- en: This helped us reduce the effect of that big dip in January 2020, which was
    likely due to the COVID pandemic.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这有助于我们减少2020年1月那次大幅下降的影响，这可能是由于COVID大流行。
- en: By averaging all the January values together, that sudden drop gets blended
    in with the rest, giving us a more stable picture of how January usually behaves
    each year.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将所有1月份的值平均在一起，那次突然的下降与其它值混合在一起，给我们提供了一个更稳定的关于每年1月份通常如何表现的画面。
- en: However, if we look closely, we can still see some sudden spikes and dips in
    the line.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果我们仔细观察，我们仍然可以在线上看到一些突然的峰值和谷值。
- en: These might be caused by things like special promotions, strikes or unexpected
    holidays that don’t happen every year.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这些可能是由像特别促销、罢工或每年不发生的意外假期这样的因素引起的。
- en: Since seasonality is meant to capture patterns that repeat regularly each year,
    we don’t want these irregular events to stay in the seasonal curve.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 由于季节性旨在捕捉每年定期重复的模式，我们不希望这些不规则事件留在季节性曲线上。
- en: But how do we know those spikes or dips are just one-off events and not real
    seasonal patterns? It comes down to how often they happen.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们如何知道那些峰值或谷值只是一次性事件，而不是真正的季节性模式？这取决于它们发生的频率。
- en: A big spike in December shows up because every December has high sales, so the
    December average stays high year after year.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 12月份出现了一个大的峰值，因为每年的12月都有高销售额，所以12月的平均值年复一年地保持较高。
- en: We see a small increase in March, but that’s mostly because one or two years
    were unusually strong.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到3月份有所上升，但这主要是因为一两年特别强劲。
- en: The average for March doesn’t really shift much. When a pattern shows up almost
    every year in the same month, that’s seasonality. If it only happens once or twice,
    it’s probably just an irregular event.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 3月份的平均值并没有真正发生很大变化。当一个模式几乎每年都在同一个月出现，那就是季节性。如果它只发生一次或两次，那可能只是一个不规则事件。
- en: To handle this, we use a low-pass filter. While averaging helps us get a rough
    idea of seasonality, the low-pass filter goes one step further.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 为了处理这个问题，我们使用低通滤波器。虽然平均可以帮助我们得到季节性的大致概念，但低通滤波器更进一步。
- en: It smooths out those remaining small spikes and dips so that we are left with
    a clean seasonal pattern that reflects the general rhythm of the year.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 它平滑了剩余的小峰值和低谷，这样我们就留下了一个干净的季节性模式，反映了年度的一般节奏。
- en: This smooth seasonal curve will then be used in the next steps of the STL process.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，这个平滑的季节性曲线将被用于STL过程的下一步。
- en: '* * *'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Next, we will smooth out that rough seasonal curve by running a low-pass filter
    over every point in our monthly-average series.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将通过在我们的月平均系列中的每个点运行低通滤波器来平滑粗糙的季节性曲线。
- en: To apply the low-pass filter, we start by computing a centered 13-month moving
    average.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 要应用低通滤波器，我们首先计算一个中心化的13个月移动平均。
- en: 'For example, consider September 2010\. The 13-month average at this point (from
    March 2010 to March 2011) would be:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑2010年9月。这个点的13个月平均值（从2010年3月到2011年3月）将是：
- en: '![](../Images/0c5d49b1ae9c417d5f0902e6268cc9a2.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0c5d49b1ae9c417d5f0902e6268cc9a2.png)'
- en: '**13-Month Average Example for September 2010 using surrounding monthly seasonal
    values**'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**2010年9月使用周围月度季节性值的13个月平均示例。**'
- en: We repeat this 13-month averaging for every point in our monthly average series.
    Because the pattern repeats every year, the value for September 2010 will be the
    same as for September 2011\.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对月平均系列中的每个点重复进行13个月的平均计算。因为模式每年都会重复，所以2010年9月的值将与2011年9月的值相同。
- en: For the first and last six months, we don’t have enough data to take a full
    13-month average, so we just use whatever months are available around them.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 对于前六个月和最后六个月，我们没有足够的数据进行完整的13个月平均，所以我们只使用围绕它们的可用月份。
- en: Let’s take a look at the averaging windows used for the months where a full
    13-month average isn’t possible.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看在无法进行完整的13个月平均的月份中使用的平均窗口。
- en: '![](../Images/ea30aab1b79c99e4c63dd65bb10bd706.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ea30aab1b79c99e4c63dd65bb10bd706.png)'
- en: '**Table:** **Averaging windows used for the first and last six months, where
    a full 13-month average was not possible.**'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '**表格：** **用于第一个和最后六个月，其中无法进行完整的13个月平均。**'
- en: Now we’ll use Python to calculate the 13-month average values
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将使用Python来计算13个月的平均值
- en: '**Code:**'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE4]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: With this code, we get the 13-month moving average for the full time series.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此代码，我们得到整个时间序列的13个月移动平均。
- en: '![](../Images/0f20cb101895219eba861bd3b07bd43e.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0f20cb101895219eba861bd3b07bd43e.png)'
- en: '**Table: Monthly detrended values along with their smoothed 13-month averages.**'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '**表格：** **每月去趋势值及其平滑的13个月平均值。**'
- en: After completing the first step of applying the low-pass filter by calculating
    the 13-month averages, the next step is to smooth those results further using
    a 3-point moving average.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 完成通过计算13个月平均值来应用低通滤波器的第一步后，下一步是使用3点移动平均进一步平滑这些结果。
- en: Now, let’s see how the 3-point average is calculated for September 2010.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看2010年9月3点平均是如何计算的。
- en: '![](../Images/2e86df254aaf97bb03e00f51f9e8124a.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2e86df254aaf97bb03e00f51f9e8124a.png)'
- en: '**Step-by-step calculation of the 3-point moving average for September 2010
    as part of the low-pass filtering process.**'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '**作为低通滤波过程一部分的2010年9月3点移动平均的逐步计算。**'
- en: For January 2010, we calculate the average using January and February values,
    and for December 2023, we use December and November.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 对于2010年1月，我们使用1月和2月的值来计算平均值，对于2023年12月，我们使用12月和11月的值。
- en: This approach is used for the endpoints where a full 3-month window isn’t available.
    In this way, we compute the 3-point moving average for each data point in the
    series.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法用于端点，在这些端点处无法获得完整的3个月窗口。这样，我们计算系列中每个数据点的3点移动平均。
- en: Now, we use Python again to calculate the 3-month window averages for our data.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们再次使用Python来计算我们数据中的3个月窗口平均值。
- en: '**Code:**'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE5]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Using the code above, we get the 3-month moving average values.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 使用上面的代码，我们得到3个月的移动平均值。
- en: '![](../Images/8e8b449f6afa9a8fa9e7b98f295d3fca.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8e8b449f6afa9a8fa9e7b98f295d3fca.png)'
- en: '**Table: Applying the second step of the low-pass filter: 3-month averages
    on the 13-month smoothed values.**'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**表：应用低通滤波的第二步：在13个月平滑值上应用3个月平均值。**'
- en: We’ve calculated the 3-month averages on the 13-month smoothed values. Next,
    we’ll apply another 3-month moving average to further refine the series.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经在13个月平滑值上计算了3个月的平均值。接下来，我们将应用另一个3个月移动平均以进一步细化序列。
- en: '**Code:**'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE6]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: From the above code, we have now calculated the 3-month averages once again.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的代码中，我们现在再次计算了3个月的平均值。
- en: '![](../Images/9cd3ce90a2e0a67383a34f7d7bd34da7.png)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9cd3ce90a2e0a67383a34f7d7bd34da7.png)'
- en: '**Table: Final step of the low-pass filter: Second 3-month moving average applied
    on previously smoothed values to reduce noise and stabilize seasonal pattern.**'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '**表：低通滤波的最终步骤：对先前平滑的值应用第二个3个月移动平均，以减少噪声并稳定季节性模式。**'
- en: With all three levels of smoothing complete, the next step is to calculate a
    weighted average at each point to obtain the final low-pass filtered seasonal
    curve.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在完成所有三个级别的平滑后，下一步是在每个点计算加权平均以获得最终的低通滤波季节曲线。
- en: It’s like taking an average, but a smarter one. We use three versions of the
    seasonal pattern, each smoothed to a different level.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像取平均值，但更智能。我们使用三个季节性模式的版本，每个版本都平滑到不同的水平。
- en: We create three smoothed versions of the seasonal pattern, each one smoother
    than the last.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建了三个季节性模式的平滑版本，每个版本都比上一个更平滑。
- en: The first is a simple 13-month moving average, which applies light smoothing.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个是简单的13个月移动平均，它应用了轻微的平滑。
- en: The second takes this result and applies a 3-month moving average, making it
    smoother.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 第二步将这个结果与3个月移动平均相结合，使其更加平滑。
- en: The third repeats this step, resulting in the most stable version. Since the
    third one is the most reliable, we give it the most weight.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 第三步重复这一步骤，结果得到最稳定的版本。由于第三个版本最可靠，我们给予它最大的权重。
- en: The first version still contributes a little, and the second plays a moderate
    role.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个版本仍然贡献了一点点，第二个则起到了适度的作用。
- en: By combining them with weights of 1, 3, and 9, we calculate a weighted average
    that gives us the final seasonal estimate.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将它们与权重1、3和9相结合，我们计算出一个加权平均，它给出了最终的季节性估计。
- en: This result is smooth and steady, yet flexible enough to follow real changes
    in the data.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 这个结果平滑且稳定，同时足够灵活以跟随数据中的真实变化。
- en: Here’s how we calculate the weighted average at each point.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们在每个点计算加权平均的方法。
- en: For example, let’s take September 2010.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们以2010年9月为例。
- en: '![](../Images/6926e79f2f8b53f09de17cb8890ef339.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6926e79f2f8b53f09de17cb8890ef339.png)'
- en: '**Final LPF calculation for September 2010 using weighted smoothing. The three
    smoothed values are combined using weights 1, 3, and 9, then averaged to get the
    final seasonal estimate.**'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用加权平滑计算2010年9月的最终LPF。三个平滑值使用权重1、3和9相结合，然后平均得到最终的季节性估计。**'
- en: We divide by 23 to apply an additional shrink factor and ensure the weighted
    average stays on the same scale.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将数值除以23以应用额外的收缩因子，并确保加权平均保持在同一尺度。
- en: '**Code:**'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE7]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: By using the code above, we calculate the weighted average at each point in
    the series.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用上面的代码，我们在序列中的每个点计算加权平均。
- en: '![](../Images/5719502fd66b8af88d1188b29f311dcd.png)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5719502fd66b8af88d1188b29f311dcd.png)'
- en: '**Table: Final LPF values at each time point, computed using weighted smoothing
    with 1:3:9 weights. The last column shows the final seasonal estimate, derived
    from three levels of low-pass filtering.**'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: '**表：每个时间点的最终LPF值，使用1:3:9权重进行加权平滑计算。最后一列显示了从三个低通滤波级别推导出的最终季节性估计值。**'
- en: These final smoothed values represent the seasonal pattern in the data. They
    highlight the recurring monthly fluctuations, free from random noise or outliers,
    and provide a clearer view of the underlying seasonal rhythms over time.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 这些最终的平滑值代表了数据中的季节性模式。它们突出了重复的月度波动，消除了随机噪声或异常值，并提供了对随时间变化的潜在季节性节奏的更清晰视图。
- en: '* * *'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: But before moving to the next step, it’s important to understand why we used
    a 13-month average followed by two rounds of 3-month averaging as part of the
    low-pass filtering process.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行下一步之前，理解为什么我们使用13个月的平均值，随后进行两轮3个月的平均作为低通滤波过程的一部分是很重要的。
- en: First, we calculated the average of detrended values by grouping them by month.
    This gave us a rough idea of the seasonal pattern.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们通过按月份分组计算去趋势值的平均值，这给了我们一个关于季节性模式的大致了解。
- en: But as we saw earlier, this pattern still has some random spikes and dips. Since
    we’re working with monthly data, it might seem like using a 12-month average would
    make sense.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 但如我们之前看到的，这个模式仍然有一些随机的峰值和低谷。由于我们处理的是月度数据，使用12个月平均值似乎是有道理的。
- en: But STL actually uses a 13-month average. That’s because 12 is an even number,
    so the average isn’t centered on a single month — it falls between two months.
    This can slightly shift the pattern.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 但STL实际上使用的是13个月平均值。这是因为12是一个偶数，所以平均值没有集中在一个月上——它位于两个月之间。这可能会稍微改变模式。
- en: Using 13, which is an odd number, keeps the smoothing centered right on each
    month. It helps us smooth out the noise while keeping the true seasonal pattern
    in place.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 使用13，一个奇数，可以使平滑中心对准每个月。这有助于我们平滑噪声，同时保持真实的季节性模式。
- en: Let’s take a look at how the 13-month average transforms the series with the
    help of a plot.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看图表是如何帮助13个月平均值转换序列的。
- en: '![](../Images/19b60e963aaf7736281b2e869712ce12.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/19b60e963aaf7736281b2e869712ce12.png)'
- en: '**Smoothing Monthly Averages Using a 13-Month Moving Average**'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用13个月移动平均平滑月度平均值**'
- en: The orange line, representing the 13-month average, smooths the sharp fluctuations
    seen in the raw monthly averages (blue), helping to expose a clearer and more
    consistent seasonal pattern by filtering out random noise.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 橙线代表13个月平均值，它平滑了原始月度平均值（蓝色）中看到的尖锐波动，通过过滤随机噪声，帮助暴露出更清晰和一致的季节性模式。
- en: '* * *'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: You might notice that the peaks in the orange line don’t perfectly line up with
    the blue ones anymore.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会注意到橙色线上的峰值不再与蓝色线上的峰值完全对齐。
- en: For example, a spike that appeared in December before might now show up slightly
    earlier or later.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，之前在12月份出现的高峰现在可能会稍微提前或推迟出现。
- en: This happens because the 13-month average looks at the surrounding values, which
    can shift the curve a little to the side.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为13个月的平均值考虑了周围值，这可能会使曲线稍微偏向一侧。
- en: This shifting is a normal effect of moving averages. To fix it, the next step
    is centering.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 这种偏移是移动平均的正常效应。为了解决这个问题，下一步是进行中心化。
- en: We group the smoothed values by calendar month and putting all the January values
    together and so on and then take the average.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 我们按日历月份分组平滑值，将所有1月份的值放在一起，依此类推，然后取平均值。
- en: This brings the seasonal pattern back into alignment with the correct month,
    so it reflects the real timing of the seasonality in the data.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 这将季节性模式与正确的月份对齐，因此它反映了数据中季节性的真实时间。
- en: '* * *'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: After smoothing the pattern with a 13-month average, the curve looks much cleaner,
    but it can still have small spikes and dips. To smooth it a little more, we use
    a 3-month average.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在用13个月平均值平滑模式后，曲线看起来干净多了，但它仍然可能有小的峰值和低谷。为了使其更加平滑，我们使用3个月平均值。
- en: But why **3** and not something bigger like 5 or 6\. A 3-month window works
    well because it smooths gently without making the curve too flat. If we use a
    larger window, we might lose the natural shape of the seasonality.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 但为什么是**3**个月而不是更大的5或6个月呢？3个月的窗口效果很好，因为它可以平滑曲线，而不会使曲线过于平坦。如果我们使用更大的窗口，我们可能会失去季节性的自然形状。
- en: Using a smaller window like 3, and applying it twice, gives a nice balance between
    cleaning the noise and keeping the real pattern.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 使用3个月的小窗口，并应用两次，可以在清除噪声和保持真实模式之间达到良好的平衡。
- en: Now let’s see what this looks like on a plot.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看图表上的样子。
- en: '![](../Images/e95dedd735ba440738e75652a2e8d241.png)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e95dedd735ba440738e75652a2e8d241.png)'
- en: '**Progressive Smoothing of Seasonal Pattern — Starting with a 13-Month Average
    and Applying Two 3-Month Averages for Refinement**'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: '**季节性模式的渐进平滑——从13个月平均值开始，应用两个3个月平均值进行细化**'
- en: This plot shows how our rough seasonal estimate becomes smoother in steps.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 这个图显示了我们的粗略季节性估计是如何逐步变得平滑的。
- en: The blue line is the result of the 13-month average, which already softens out
    many of the random spikes.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 蓝线是13个月平均的结果，它已经平滑了许多随机峰值。
- en: Then we apply a 3-month average once (orange line) and again (green line). Each
    step smooths the curve a bit more, especially removing tiny bumps and jagged noise.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们应用一次3个月平均值（橙色线）和再次（绿色线）。每一步都会使曲线更加平滑，特别是去除微小的凸起和锯齿状噪声。
- en: By the end, we get a clean seasonal shape that still follows the repeating pattern
    but is much more stable and easier to work with for forecasting.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们得到一个干净的季节性形状，它仍然遵循重复的模式，但更加稳定，并且对于预测来说更容易处理。
- en: 'We now have three versions of the seasonal pattern: one slightly rough, one
    moderately smooth and one very smooth. It might seem like we could simply choose
    the smoothest one and move on.'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在有三个季节性模式的版本：一个稍微粗糙，一个中等平滑，一个非常平滑。看起来我们完全可以简单地选择最平滑的那个并继续前进。
- en: After all, seasonality repeats every year, so the cleanest curve should be enough.
    But in real-world data, seasonal behavior is rarely that perfect.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，季节性每年都会重复，所以最干净的曲线应该足够了。但在现实世界的数据中，季节性行为很少那么完美。
- en: December spikes might show up a little earlier in some years, or their size
    might vary depending on other factors.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些年份，12月份的峰值可能会出现得早一些，或者它们的大小可能会根据其他因素而变化。
- en: The rough version captures these small shifts, but it also carries noise. The
    smoothest one removes the noise but can miss those subtle variations.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 粗糙版本捕捉了这些小的变化，但它也携带噪声。最平滑的一个移除了噪声，但可能会错过那些细微的变化。
- en: That’s why STL blends all three. It gives more weight to the smoothest version
    because it is the most stable, but it also keeps some influence from the medium
    and rougher ones to retain flexibility.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是为什么STL混合了所有三个。它给最平滑的版本更多的权重，因为它是最稳定的，但它也保留了一些来自中等和粗糙版本的影响，以保持灵活性。
- en: This way, the final seasonal curve is clean and reliable, yet still responsive
    to natural changes. As a result, the trend we extract in later steps stays true
    and does not absorb leftover seasonal effects.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，最终的季节性曲线既干净又可靠，同时仍然对自然变化有反应。因此，我们在后续步骤中提取的趋势保持真实，不会吸收剩余的季节性影响。
- en: We use weights of 1, 3, and 9 when blending the three seasonal curves because
    each version gives us a different perspective.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在混合三个季节曲线时使用1、3和9的权重，因为每个版本都给我们提供了不同的视角。
- en: The roughest version picks up small shifts and short-term changes but also includes
    a lot of noise. The medium version balances detail and stability, while the smoothest
    version gives a clean and steady seasonal shape that we can trust the most.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 粗糙版本捕捉小的变化和短期变化，但也包括大量的噪声。中等版本平衡了细节和稳定性，而最平滑的版本提供了一个干净、稳定的季节性形状，我们最可以信赖。
- en: That is why we give the smoothest one the highest weight. These specific weights
    are recommended in the original STL paper because they work well in most real-world
    cases.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，我们给最平滑的那个最高的权重。这些特定的权重在原始STL论文中被推荐，因为它们在大多数实际案例中都表现良好。
- en: We might wonder why not use something like 1, 4, and 16 instead. While that
    would give even more importance to the smoothest curve, it could also make the
    seasonal pattern too rigid and less responsive to natural shifts in timing or
    intensity.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能会想知道为什么不使用像1、4和16这样的数字。虽然那会给最平滑的曲线更多的重视，但它也可能使季节性模式过于僵化，对时间或强度的自然变化或强度变化反应不足。
- en: Real-life seasonality is not always perfect. A spike that usually happens in
    December might come earlier in some years.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 生活中的季节性并不总是完美的。通常在12月份发生的峰值在某些年份可能会提前出现。
- en: The 1, 3, 9 combination helps us stay flexible while still keeping things smooth.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 1、3、9的组合帮助我们保持灵活性，同时仍然保持事物的平滑性。
- en: After blending the three seasonal curves using weights of 1, 3, and 9, we might
    expect to divide the result by 13, the sum of the weights as we would in a regular
    weighted average.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 使用1、3和9的权重混合三个季节曲线后，我们可能会期望将结果除以13，即权重的总和，就像在常规加权平均中那样。
- en: But here we divide it by 23 (13+10) instead. This scaling factor gently shrinks
    the seasonal values, especially at the edges of the series where estimates tend
    to be less stable.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 但在这里我们将其除以23（13+10）。这个缩放因子会温和地缩小季节性值，尤其是在序列的边缘，那里的估计往往不太稳定。
- en: It also helps keep the seasonal pattern reasonably scaled, so it doesn’t overpower
    the trend or distort the overall structure of the time series.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 它还有助于保持季节性模式合理缩放，因此不会压倒趋势或扭曲时间序列的整体结构。
- en: The result is a seasonal curve that is smooth, adaptive, and does not interfere
    with the trend.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个平滑、自适应的季节曲线，不会干扰趋势。
- en: Now let’s plot the final low-pass filtered values that we obtained by calculating
    the weighted averages.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们绘制通过计算加权平均值获得的最终低通滤波值。
- en: '![](../Images/2e8811b125ea06f3e0228db5431ed0d1.png)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2e8811b125ea06f3e0228db5431ed0d1.png)'
- en: '****Final Low-Pass Filtered Seasonal Component****'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: '****最终低通滤波季节性成分****'
- en: This plot shows the final seasonal pattern we got by blending three smoothed
    versions using weights 1, 3, and 9\.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了通过使用权重1、3和9混合三个平滑版本后得到的最终季节性模式。
- en: The result keeps the repeating monthly pattern clear while reducing random spikes.
    It’s now ready to be centered and subtracted from the data to find the trend.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 结果保持了重复的月度模式清晰，同时减少了随机峰值。现在它已经准备好进行中心化并从数据中减去以找到趋势。
- en: '* * *'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The final low-pass filtered seasonal component is ready. The next step is to
    center it to ensure the seasonal effects average to zero over each cycle.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 最终的低通滤波季节性成分已经准备好。下一步是将其中心化以确保季节性效应在每个周期内平均为零。
- en: We center the seasonal values by making their average (mean) zero. This is important
    because the seasonal part should only show repeating patterns, like regular ups
    and downs each year, not any overall increase or decrease.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过使它们的平均值（均值）为零来中心化季节性值。这很重要，因为季节性部分应仅显示重复模式，如每年规律性的上升和下降，而不应有任何整体增加或减少。
- en: If the average isn’t zero, the seasonal part might wrongly include part of the
    trend. By setting the mean to zero, we make sure the trend shows the long-term
    movement, and the seasonal part just shows the repeating changes.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 如果平均值不为零，季节性部分可能会错误地包含趋势的一部分。通过将平均值设为零，我们确保趋势显示了长期运动，而季节性部分仅显示重复的变化。
- en: To perform the centering, we first group the final low-pass filter seasonal
    components by month and then calculate the average.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进行中心化，我们首先按月份将最终的低通滤波季节性成分分组，然后计算平均值。
- en: After calculating the average, we subtract it from the actual final low-pass
    filtered value. This gives us the centered seasonal component, completing the
    centering step.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 计算平均值后，我们从实际最终低通滤波值中减去它。这给我们提供了中心化季节性成分，完成了中心化步骤。
- en: Let’s walk through how centering is done for a single data point.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一步步了解如何对一个单一数据点进行中心化。
- en: For Sep 2010
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 对于2010年9月
- en: Final LPF value (September 2010) = −71.30
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 最终LPF值（2010年9月）= −71.30
- en: Monthly average of all September LPF values = −48.24
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 所有九月LPF值的月平均 = −48.24
- en: Centered seasonal value = Final LPF – Monthly Average
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 中心化季节性值 = 最终LPF – 月平均值
- en: = −71.30−(−48.24) = −23.06
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: = −71.30−(−48.24) = −23.06
- en: In this way, we calculate the centered seasonal component for each data point
    in the series.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式，我们计算系列中每个数据点的中心化季节性成分。
- en: '![](../Images/ec895ec3a3289a57c972c2152394ee78.png)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ec895ec3a3289a57c972c2152394ee78.png)'
- en: '**Table: Centering the Final Low-Pass Filtered Seasonal Values**'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: '**表：中心化最终低通滤波季节性值**'
- en: Now we’ll plot these values to see how the centered seasonality curve looks.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将绘制这些值以查看中心化季节性曲线的形状。
- en: '**Plot:**'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: '**图：**'
- en: '![](../Images/77305954595805d4984bccca4ca12e92.png)'
  id: totrans-249
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/77305954595805d4984bccca4ca12e92.png)'
- en: '**Centered Seasonal Component vs. Monthly Detrended Averages**'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: '**中心化季节性成分与月度去趋势平均值**'
- en: The above plot compares the **monthly average of detrended values** (blue line)
    with the **centered seasonal component** (orange line) obtained after low-pass
    filtering and centering.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 上图比较了经过低通滤波和中心化后得到的**去趋势值的月平均值**（蓝色线）与**中心化季节性成分**（橙色线）。
- en: We can observe that the orange curve is much smoother and cleaner, capturing
    the **repeating seasonal pattern** without any long-term drift.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以观察到橙色曲线要平滑得多，干净得多，捕捉到了**重复的季节性模式**，没有任何长期漂移。
- en: This is because we’ve centered the seasonal component by subtracting the monthly
    average, ensuring its mean is zero across each cycle.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为我们已经通过减去月平均值来中心化季节性成分，确保其在每个周期内的平均值为零。
- en: Importantly, we can also see that the **spikes in the seasonal pattern now align
    with their original positions**.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，我们还可以看到季节性模式中的**尖峰现在与它们原始的位置对齐**。
- en: The peaks and dips in the orange line match the timing of the blue spikes, showing
    that the seasonal effect has been properly estimated and re-aligned with the data.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 橙色线中的峰值和谷值与蓝色尖峰的时间相匹配，表明季节性效应已被正确估计并重新与数据对齐。
- en: '* * *'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: In this part, we discussed how to calculate the initial trend and seasonality
    in the STL process.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 在这部分，我们讨论了如何在STL过程中计算初始趋势和季节性。
- en: These initial components are essential because STL is a smoothing-based decomposition
    method, and it needs a structured starting point to work effectively.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 这些初始成分至关重要，因为STL是一种基于平滑的分解方法，它需要一个结构化的起点才能有效工作。
- en: Without an initial estimate of the trend and seasonality, applying LOESS directly
    to the raw data could lead to the smoothing of noise and residuals or even fitting
    patterns to random fluctuations. This would result in unreliable or misleading
    components.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 没有趋势和季节性的初始估计，直接将 LOESS 应用于原始数据可能会导致噪声和残差的平滑，甚至拟合随机波动模式。这会导致不可靠或误导性的成分。
- en: That’s why we first extract a rough trend using moving averages and then isolate
    seasonality using a low-pass filter.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们首先使用移动平均提取一个粗略的趋势，然后使用低通滤波器隔离季节性。
- en: These provide STL with a reasonable approximation to begin its iterative refinement
    process, which we will explore in the **next part**.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 这些为 STL 提供了一个合理的近似值，以便开始其迭代细化过程，我们将在**下一部分**中探讨。
- en: In the **next part**, we begin by **deseasonalizing the original series** using
    the centered seasonal component. Then, we apply **LOESS smoothing** to the deseasonalized
    data to obtain an updated trend.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 在**下一部分**中，我们首先使用中心季节成分对原始序列进行**去季节化**，然后对去季节化数据应用**LOESS 平滑**以获得更新的趋势。
- en: This marks the starting point of the **iterative refinement process** in STL.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 这标志着 STL 中**迭代细化过程**的起点。
