- en: Why You Should Not Replace Blanks with 0 in Power BI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/why-you-should-not-replace-blanks-with-0-in-power-bi/](https://towardsdatascience.com/why-you-should-not-replace-blanks-with-0-in-power-bi/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1750452522766" class="mdspan-comment">Some time ago, I was</mdspan>
    watching [Jeffrey Wang as a live stream guest with Reid Havens](https://www.youtube.com/watch?v=KI2eYBI0lF0&list=WL&index=3),
    and one of the dozen wonderful things that Jeffrey shared with the audience was
    the list of optimizations that the DAX engine performs when creating an optimal
    query plan for our measures.
  prefs: []
  type: TYPE_NORMAL
- en: 'And, the one that caught my attention was regarding the so-called “Sparse measures”:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/24bf719e07e84ffbbede394cc7412f75.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot from the live stream on YouTube
  prefs: []
  type: TYPE_NORMAL
- en: To make it simple, once you define the measure, [Formula Engine in VertiPaq](https://data-mozart.com/vertipaq-brain-muscles-behind-power-bi/) will
    add an implicit NonEmpty filter to the query, which should enable the optimizer
    to avoid full cross-join of dimension tables and scan only those rows where records
    for the combination of your dimension attributes really exist. For folks coming
    from the MDX world, the NonEmpty function may look familiar, but let’s see how
    it works in DAX.
  prefs: []
  type: TYPE_NORMAL
- en: The thing that most resonated with me was when Jeffrey advised against replacing
    BLANKs with zeroes (or whatever explicit values) in Power BI calculations. I’ve
    already written [how you can handle BLANKs and replace them with zeroes](https://data-mozart.com/handling-blanks-in-power-bi/),
    but in this article, I want to focus on the possible performance implications
    of this decision.
  prefs: []
  type: TYPE_NORMAL
- en: Setting the stage
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before we start, one important disclaimer: the recommendation not to replace
    BLANK with 0 is just that — a recommendation. If the business request is to display
    0 instead of BLANK, it doesn’t necessarily mean that you should refuse to do it.
    In most scenarios, you will probably not even notice a performance decrease, but
    it will depend on multiple different factors…'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start by writing our simple DAX measure:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Using this measure, I want to calculate the total sales amount for the product
    with ProductKey = 364\. And, if I put the value of this measure in the Card visual,
    and turn on Performance Analyzer to check the times for handling this query, I
    get the following results:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4b00193034a6ec46f440c84f432a0fc2.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'DAX query took only 11ms to execute, and once I switched to DAX Studio, the
    xmSQL generated by the Formula Engine was quite simple:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4ee5c129ed682cc7022e3e0eff29e051.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'And, if I take a look at the Query plan (physical), I can see that the Storage
    Engine found only one existing combination of values to return our data:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7e72eeda41c4cfefa353c70c58694ae1.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Adding more ingredients…
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'However, let’s say that the business request is to analyze data for Product
    Key 364 on a daily level. Let’s go and add dates to our report:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ad7925b68e6ce8954260b4bf35f0b464.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'This was again very fast! I will now check the metrics within the DAX Studio:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/97d79baf58eb732a735fea6f615f4505.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'This time, the query was expanded to include a Dates table, which affected
    the work Storage Engine needed to do, as instead of finding only 1 row, this time,
    the number is different:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8634c0fa587c36f62b2198cba8237a0c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you will not notice any difference in performance between these two
    scenarios, as the difference is only a few milliseconds.
  prefs: []
  type: TYPE_NORMAL
- en: But this is just the beginning; we are just warming up our DAX engine. In both
    of these cases, as you may see, we see only “filled” values — that combination
    of rows where both of our requirements are satisfied — product key is 364 and
    only those dates where we had sales for this product — if you look thoroughly
    in the illustration above, dates are not contiguous and some are missing, such
    as January 12th, January 14th to January 21st and so on.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is because Formula Engine was smart enough to eliminate the dates where
    product 364 had no sales using the NonEmpty filter, and that’s why the number
    of records is 58: we have 58 distinct dates where sales of product 364 were not
    blank:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5d9229bbe5c6d67eaac7c0beaf799cfe.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s say that business users also want to see those dates in-between,
    where product 364 hadn’t made any sales. So, the idea is to display 0$ amount
    for all those dates. As already described in the previous article, there are multiple
    different ways to replace the BLANKs with zeroes, and I will use the *`COALESCE`()* function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Basically, the `COALESCE` function will check all the arguments provided (in
    my case, there is only one argument) and replace the first BLANK value with the
    value you specified. Simply said, it will check if the value of the Sales Amt
    364 Products is BLANK. If not, it will display the calculated value; otherwise,
    it will replace BLANK with 0.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d67dabb30ac8f64ae819c088d4d93c46.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Wait, what?! Why am I seeing all the products, when I filtered everything out,
    except product 364? Let alone that, my table now took more than 2 seconds to render!
    Let’s check what happened in the background.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3b9b9acf39921d9466742469bdc0d5a7.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of generating one single query, now we have 3 of them. The first one
    is exactly the same as in the previous case (58 rows). However, the remaining
    queries target the Product and Dates tables, pulling all the rows from both tables
    (The product table contains 2517 rows, while the Dates table has 1826). Not just
    that, take a look at the query plan:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/adfd7a8886dcc78cc7fd466a063e164a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 4.6 million records?! Why on Earth does it happen?! Let me do the math for you: **2.517
    * 1.826 = 4.596.042**…So, here we had a full cross-join between Product and Dates
    tables, forcing every single tuple (combination of date-product) to be checked!
    That happened because we forced the engine to return 0 for every single tuple
    that would otherwise return blank (and consequentially be excluded from scanning)!
  prefs: []
  type: TYPE_NORMAL
- en: 'This is a simplistic overview of what happened:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9c2b47f140fe088b6b66383f46268f12.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Believe it or not, there is an elegant solution to show blank values out-of-the-box
    (but, not with 0 instead of BLANK). You can just simply click on the Date field
    and choose to *Show items with no data*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0b879da7d31f954e8ce440542c2700b6.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'This will display the blank cells too, but without performing a full cross-join
    between the Product and Dates tables:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fad7cf3d60e3a0f72f7043015385586d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'We can now see all the cells (even blanks) and this query took half the time
    of the previous one! Let’s check the query plan generated by the Formula Engine:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2d27772c9cf010f6947d4d7f63c9deaa.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Not all scenarios are catastrophic!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Truth to be said, we could’ve rewritten our measure to exclude some unwanted
    records, but it would still not be an optimal way for the engine to eliminate
    empty records.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, there are certain scenarios in which replacing BLANKs with zero
    will not cause a significant performance decrease.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s examine the following situation: we are displaying data about the total
    sales amount for every single brand. And I will add my sales amount measure for
    product 364:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9e0f24a4d29fc8a657a32605b459c118.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'As you might expect, that was quite fast. But, what will happen when I add
    my measure that replaces BLANKs with 0, which caused havoc in the previous scenario:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7db94a4c616398319aad2f4fc7cbc2a5.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Hm, looks like we didn’t have to pay any penalty in terms of performance. Let’s
    check the query plan for this DAX query:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/03ec4b9718a0267e37063f866d94ed86.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As Jeffrey Wang suggested, you should stay away from replacing blanks with zeroes
    (or with any other explicit values), as this will significantly affect the query
    optimizer’s ability to eliminate unnecessary data scanning. However, if for any
    reason you need to substitute a blank with some meaningful value, be careful when
    and how to do it.
  prefs: []
  type: TYPE_NORMAL
- en: As usual, it depends on many different aspects — for columns with low cardinality,
    or when you’re not displaying data from multiple different tables (like in our
    example, when we needed to combine data from Product and Dates tables), or visual
    types that don’t need to display a large number of distinct values (i.e. card
    visual) — you can get away without paying the performance price. On the other
    hand, if you use tables/matrices/bar charts that show a lot of distinct values,
    make sure to check the metrics and query plans before you deploy that report to
    a production environment.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
