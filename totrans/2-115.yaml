- en: What Optimization Terminologies for Linear Programming Really Mean
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/breaking-down-optimization-terminologies-for-linear-programming/](https://towardsdatascience.com/breaking-down-optimization-terminologies-for-linear-programming/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753221755849" class="mdspan-comment">Working</mdspan> with
    linear optimization problems at work and for some personal projects, I have always
    been intrigued by seeing the log messages during solver iterations. It’s fascinating
    how modern solvers can solve optimization problems with decision variables and
    constraints in the order of thousands and millions within the time frame of only
    minutes or hours. It could take days or years if a human were solving such processes
    manually. Nevertheless, I wanted to better understand the terminologies used in
    linear programming and the ones I see in the solver log messages.
  prefs: []
  type: TYPE_NORMAL
- en: In my 2021 [post](https://towardsdatascience.com/linear-programming-with-python-and-julia-be9e045a5d17/),
    which I published with Towards Data Science (time flies!), I discussed techniques
    to solve linear problems in Python and Julia, respectively. In another post, I
    discussed the steps undertaken by solvers for optimizing, solving, and post-processing
    linear problems which are packaged in the form of a mathematical programming system.
    This post is going to be a more theoretical one. I am going to break down different
    optimization terminologies such as primal, dual, dualness, duality gap, basic
    solution, and put forward the three optimality conditions that need to be satisfied
    for linear problems. Let’s get started.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Duality of optimization problem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Every optimization problem could be viewed from two different perspectives.
    This concept is referred to as **dualness** of the optimization problem. For example,
    if our original objective is to maximize the revenue of a company within the given
    resource constraints, the same problem could also be formulated in a way to minimize
    the resource constraints while aiming to sell a certain number of products. The
    original form of the linear optimization problem that is provided is referred
    to as the **primal problem**. For every primal problem, there is a corresponding
    **dual problem**. If the primal is a maximization problem, then the dual is a
    minimization problem, and vice versa. As such, the dual of a dual problem is a
    primal problem itself. This fundamental dualness in the characterization of optimization
    problems is referred to as **duality**.
  prefs: []
  type: TYPE_NORMAL
- en: As stated above, the sense of the objective functions is just opposite in primal
    and dual problems. Besides, the decision variables used in primal problems are
    formulated as constraints in dual problems, and the constraints in the primal
    problem are formulated as decision variables. This duality has a multitude of
    advantages in solving linear optimization problems. When a solver solves an optimization
    problem, both the primal and dual feasibility conditions need to be met. If the
    primal problem has many variables but fewer constraints, in that case, the dual
    problem might be easier to solve. Furthermore, duality provides deeper insights
    into the structure of the optimization problem.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s assume we have a primal problem in the following form:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a07be729457cccced7232d77d326aac6.png)'
  prefs: []
  type: TYPE_IMG
- en: Where *A, b, and c all belong to real numbers. Say we have m number of constraints,
    and n number of decision variables. A is the constraint coefficient matrix with
    the order m*n, x is the decision variable vector with n variables, b is the RHS
    vector with m elements, and c is the cost vector comprising cost coefficients
    of each decision variable.*
  prefs: []
  type: TYPE_NORMAL
- en: 'The corresponding dual problem is given in the form:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1bb5f3a686edb054277ddc794767bd12.png)'
  prefs: []
  type: TYPE_IMG
- en: We can see that the transpose of *b*, which is the resource limit defined in
    the primal problem, comes in the objective function of the dual problem. *y* is
    the decision variable in the dual problem and is hence referred to as **dual variables**.
    Dual variables show the sensitivity of the primal objective function with respect
    to every constraint in the optimal point. In economic interpretation, dual values
    are also referred to as **shadow prices or fair prices**.
  prefs: []
  type: TYPE_NORMAL
- en: Steps for conversion of primal problem to dual problem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The steps for converting a primal problem into a dual problem can be summarized
    below. This is inspired by this [video](https://www.youtube.com/watch?v=SN67lGlID7M&ab_channel=StartPracticing).
  prefs: []
  type: TYPE_NORMAL
- en: First, convert the problem to canonical form. If the problem is maximization,
    the constraints should be in the form of less than or equal to. And if the problem
    is minimization, then the constraint should be in the form of greater than or
    equal to
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Change the sense of the objective function. Maximization problem becomes minimization,
    and vice versa.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The number of variables in the primal problem will be the number of constraints
    in the dual problem, and vice versa.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Cost constraints in the objective function in the primal problem will be RHS
    constant of the constraints in the dual problem, and vice versa.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For formulating the constraints in the dual problem, use the transpose of the
    constrain matrix in the primal problem.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Example of primal to dual conversion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Primal problem**'
  prefs: []
  type: TYPE_NORMAL
- en: Assume we want to maximize the revenue of a furniture company. *x* and *y* are
    the number of sales of chairs and tables at a particular period, and their unit
    sales price is 90 and 75, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: 'Say we have resource constraints in terms of energy, number of labor and working
    hours. Each chair needs 3 units and each table needs 2 units of energy, and overall,
    they cannot consume more than 66 units of energy. Each chair needs 9 units and
    each table needs 4 units of manpower and overall, it should be less than or equal
    to 180 units of manpower. Each chair needs 2 units and each table needs 10 units
    of working hours and overall it should be less than or equal to 200 units of working
    hours. This problem is written in canonical form as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: maximize z = 90x + 75y
  prefs: []
  type: TYPE_NORMAL
- en: s.t. 3x+2y ≤ 66 (energy)
  prefs: []
  type: TYPE_NORMAL
- en: 9x+4y ≤ 180 (manpower)
  prefs: []
  type: TYPE_NORMAL
- en: 2x+10y ≤ 200 (time)
  prefs: []
  type: TYPE_NORMAL
- en: x, y ≥ 0
  prefs: []
  type: TYPE_NORMAL
- en: (chairs, tables)
  prefs: []
  type: TYPE_NORMAL
- en: '**Dual problem**'
  prefs: []
  type: TYPE_NORMAL
- en: In the above-mentioned problem, I have two decision variables, and three constraints
    in the primal problem. Accordingly, the dual problem will have three variables
    and two constraints. Let *w1, w2* and *w3* be the three variables in the dual
    problem based on each constraint in the primal problem. In this case, *w1, w2, *and *w3* can
    be considered as the shadow prices associated with energy, manpower, and time
    constraints, respectively. **Shadow prices refer to the amount by which the solution
    to the primal objective function would change at the optimal point, if the primal
    RHS constraint is changed by one unit**.
  prefs: []
  type: TYPE_NORMAL
- en: 'We get:'
  prefs: []
  type: TYPE_NORMAL
- en: min⁡ 66w1+180w2+200w3
  prefs: []
  type: TYPE_NORMAL
- en: s.t. 3w1+9w2+2w3 ≥ 90 (chairs)
  prefs: []
  type: TYPE_NORMAL
- en: 2w1+4w2+10w3 ≥ 75 (tables)
  prefs: []
  type: TYPE_NORMAL
- en: w1, w2, w3 ≥ 0
  prefs: []
  type: TYPE_NORMAL
- en: (energy, manpower, time)
  prefs: []
  type: TYPE_NORMAL
- en: Converting the problem to standard form
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To convert the primal and dual problem to **standard form** means to convert
    the inequality constraints to equations by adding some variables. This is useful
    for determining the optimality conditions, which is discussed further in the succeeding
    section.
  prefs: []
  type: TYPE_NORMAL
- en: In the primal problem, I add **slack variables** to convert the less than inequality
    constraint to an equality constraint as shown below. *h1, h2*, and *h3* are slack
    variables for energy, manpower and time constraints, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: maximize z = 90x+75y
  prefs: []
  type: TYPE_NORMAL
- en: s.t. 3x+2y+h1 = 66 (energy)
  prefs: []
  type: TYPE_NORMAL
- en: 9x+4y+h2 = 180 (manpower)
  prefs: []
  type: TYPE_NORMAL
- en: 2x+10y+h3 = 200 (time)
  prefs: []
  type: TYPE_NORMAL
- en: x, y, h1, h2, h3 ≥ 0
  prefs: []
  type: TYPE_NORMAL
- en: In the dual problem, I use **surplus variables** to convert greater than inequality
    constraint into an equality constraints. *s1* and *s2* are surplus variables.
  prefs: []
  type: TYPE_NORMAL
- en: min⁡ 66w1+180w2+200w3
  prefs: []
  type: TYPE_NORMAL
- en: s.t. 3w1+9w2+2w3-s1 = 90 (chairs)
  prefs: []
  type: TYPE_NORMAL
- en: 2w1+4w2+10w3-s2 = 75 (tables)
  prefs: []
  type: TYPE_NORMAL
- en: w1, w2, w3, s1, s2 ≥ 0
  prefs: []
  type: TYPE_NORMAL
- en: As we have used equality constraints in the standard form, the constraints are
    always binding, meaning we are using all the resources that are available without
    leaving any waste. In this condition, in the primal optimal solution, the values
    of slack variables become equal to zero. And in the dual optimal solution, the
    values of surplus variables also become equal to zero. If the constraint is non-binding
    (e.g., it has less than or equal to constraint), then the value of these variables
    could be either greater than or equal to zero in the optimal solution.
  prefs: []
  type: TYPE_NORMAL
- en: Optimality conditions for linear problems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For a linear optimization problem, the solution to primal problem and a solution
    to dual problem are optimal if and only if the following three conditions are
    met. (This is inspired by this video [lecture](https://www.youtube.com/watch?v=y-B3ck1Fj44&list=PLHiHZENG6W8BeAfJfZ3myo5dsSQjEV5pJ&index=18&t=834s&ab_channel=GurobiOptimization)
    by Gurobi Optimization.)
  prefs: []
  type: TYPE_NORMAL
- en: '**Primal feasibility**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The solution needs to be primal feasible. This implies that the value of the
    decision variables in the solution to the primal problem should satisfy all its
    constraints. In our case, the number of chairs and tables (*x* and *y*) should
    be within the resource constraints for energy, manpower, and time, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: 3x+2y ≤ 66 (energy)
  prefs: []
  type: TYPE_NORMAL
- en: 9x+4y ≤ 180 (manpower)
  prefs: []
  type: TYPE_NORMAL
- en: 2x+10y ≤ 200 (time)
  prefs: []
  type: TYPE_NORMAL
- en: x, y ≥ 0
  prefs: []
  type: TYPE_NORMAL
- en: b. **Dual feasibility**
  prefs: []
  type: TYPE_NORMAL
- en: This implies that the solution to the dual problem should satisfy all of its
    constraints. In our case, the shadow prices associated with energy, manpower,
    and time (*w1, w2,* and *w3*) should satisfy the price constraints (cost coefficients)
    for the chairs and the tables, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: 3w1+9w2+2w3-s1 = 90 (chairs)
  prefs: []
  type: TYPE_NORMAL
- en: 2w1+4w2+10w3-s2 = 75 (tables)
  prefs: []
  type: TYPE_NORMAL
- en: w1, w2, w3, s1, s2 ≥ 0
  prefs: []
  type: TYPE_NORMAL
- en: c. **Complementary (or orthogonal conditions**)
  prefs: []
  type: TYPE_NORMAL
- en: Say x^* refers to the decision variables in the optimal primal solution and
    h^* refers to the slack variables in the same primal problem. Say *s* refers to
    the slack variables in the dual problem, and *w* refers to the associated shadow
    prices in the dual problem. At optimality, the product of decision variables in
    the primal problem and the surplus variables associated with dual problem should
    be zero. This is referred to as being **cost efficient** because this condition
    ensures that we are making the most efficient use of our resources.
  prefs: []
  type: TYPE_NORMAL
- en: x^*s = 0
  prefs: []
  type: TYPE_NORMAL
- en: 'In our problem, x * s1 = 0 and y * s2 = 0 implies:'
  prefs: []
  type: TYPE_NORMAL
- en: x*(3w1+9w2+2w3-90) = 0
  prefs: []
  type: TYPE_NORMAL
- en: y*(2w1+4w2+10w3-75) = 0
  prefs: []
  type: TYPE_NORMAL
- en: Also, at optimality, the product of slack variables in the primal problem and
    the shadow prices in the dual problem should be equal to zero. This implies that
    we are being resource efficient and leaving no waste of resources.
  prefs: []
  type: TYPE_NORMAL
- en: h*w = 0
  prefs: []
  type: TYPE_NORMAL
- en: h1*w1 = 0; h2*w2 = 0; h3*w3 = 0;
  prefs: []
  type: TYPE_NORMAL
- en: Basic Solution, Duality gap, Strong duality and weak duality
  prefs: []
  type: TYPE_NORMAL
- en: '**Basic Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: As per this nice [definition](https://ergo-code.github.io/HiGHS/dev/terminology/)
    from HiGHS documentation, if a linear problem is feasible and has bounded feasible
    region in the direction of optimization, then it has an optimal solution at a
    vertex. “At this vertex, the decision variables can be partitioned into as many
    **basic variables** as there are constraints, and the **non-basic variables**.
    In the given solution, basic variables are the ones having non-zero values, and
    non-basic variables are the ones having zero values. This set of solutions is
    referred to as **basic solution**, and the partition is referred to as **basis**.
  prefs: []
  type: TYPE_NORMAL
- en: (If a linear problem is solved using simplex algorithm, the set of basic and
    non-basic solutions can [change over time](https://math.stackexchange.com/questions/4249880/linear-programming-simplex-method-what-exactly-are-the-basic-and-non-basic-vari).
    During iterations, some slack variables will become non-basic, and other variables
    will become basic. The simplex moves from one basis to another improving the objective
    function, until it reaches the optimal point and cannot improve the objective
    function further.)
  prefs: []
  type: TYPE_NORMAL
- en: '**Duality gap**'
  prefs: []
  type: TYPE_NORMAL
- en: The difference between the optimal primal value *p^** and the optimal dual value
    *d^** is referred to as the duality gap *p^**–*d^**. This value is always greater
    than or equal to zero.
  prefs: []
  type: TYPE_NORMAL
- en: '**Strong duality**'
  prefs: []
  type: TYPE_NORMAL
- en: Strong duality holds if the primal objective value (solution) and the dual objective
    value is the same, implying that the duality gap is zero. Strong duality implies
    that the problem is “often” convex and satisfies certain constraint conditions.
    The dual problem in this case is a tight approximation of the primal problem.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if the maximum revenue in a furniture factory composed of sales
    of chairs and tables is equal to the minimum cost of resource use, including energy,
    labour, and hours, this condition is referred to as strong duality.
  prefs: []
  type: TYPE_NORMAL
- en: '**Weak duality**'
  prefs: []
  type: TYPE_NORMAL
- en: If the duality gap is greater than or equal to zero, then the condition is referred
    to as weak duality. This implies that the dual solution is less than or equal
    to the primal solution.
  prefs: []
  type: TYPE_NORMAL
- en: In case of weak duality, the dual solution rather provides bounds on the primal
    objective value. If the primal is a minimization problem, then the dual feasible
    solution gives the lower bound on the primal objective value. And if the primal
    is a maximization problem, then the dual feasible solution gives the upper bound
    on the primal objective value.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is my first article in Towards Data Science where I describe some mathematical
    optimization concepts without using any code. In this post, I explain with examples
    the duality concepts in mathematical optimization, including primal to dual form
    conversion, canonical and standard forms of the problems, the conditions for optimality,
    basic solution, duality gap, strong and weak duality. When I started to learn
    about these concepts, they were quite abstract to me. Therefore, I tried to learn
    about these concepts on my own, as well as package them together since all these
    concepts are interrelated. I hope you find them useful. You can refer to some
    notebooks of my previous optimization-related blogs in this GitHub [repository](https://github.com/hbshrestha/Optimization).
    Thank you for reading!
  prefs: []
  type: TYPE_NORMAL
