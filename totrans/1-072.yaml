- en: 'Data Visualization Explained (Part 5): Visualizing Time-Series Data in Python
    (Matplotlib, Plotly, and Altair)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-visualization-explained-part-5-visualizing-time-series-data-in-python-matplotlib-plotly-and-altair/](https://towardsdatascience.com/data-visualization-explained-part-5-visualizing-time-series-data-in-python-matplotlib-plotly-and-altair/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*<mdspan datatext="el1763528127649" class="mdspan-comment">This is the fifth
    article</mdspan> in my data visualization series. See the following:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*[Part 1: “Data Visualization Explained: What It Is and Why It Matters](https://towardsdatascience.com/data-visualization-explained-what-it-is-and-why-it-matters/)*“'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*[Part 2: “Data Visualization Explained: An Introduction to Visual Variables](https://towardsdatascience.com/data-visualization-explained-part-2-an-introduction-to-visual-variables/)*.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*[Part 3: “Data Visualization Explained: The Role of Color.”](https://towardsdatascience.com/data-visualization-explained-part-3-the-role-of-color/)*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[*Part 4: “Data Visualization Explained: A Review of Python Essentials*.”](https://towardsdatascience.com/data-visualization-explained-part-4-a-review-of-python-essentials/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s time to start building your own data visualizations. In this article, I
    will walk through the process of visualizing time-series data in Python in detail.
    If you have not read the previous articles in my data visualization series, I
    strongly recommend [reading at least the previous article for a review of Python](https://towardsdatascience.com/data-visualization-explained-part-4-a-review-of-python-essentials/).
  prefs: []
  type: TYPE_NORMAL
- en: 'Over the course of coding visualizations in Python, I will focus on three Python
    packages: Matplotlib, Plotly, and Altair. One approach to learning these might
    involve writing 1-2 articles per package, each one delving into the chosen package
    in detail. While this is a valid approach, the focus of my series is not on any
    particular library; it is about the data visualization process itself. These packages
    are simply tools—a means to an end.'
  prefs: []
  type: TYPE_NORMAL
- en: As a result, I will structure this article and the ones to follow each around
    a particular *type* of data visualization, and I will discuss how to implement
    that visualization in each of the listed packages to ensure you have a breadth
    of approaches available to you.
  prefs: []
  type: TYPE_NORMAL
- en: 'First up: a definition for time-series data.'
  prefs: []
  type: TYPE_NORMAL
- en: What Is Time-Series Data?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Formally, **time-series data** involves a variable that is a function of time.
    In simple terms, this just means some data that changes over time.
  prefs: []
  type: TYPE_NORMAL
- en: For example, a public company’s stock price over the last ten years is time-series
    data. If you’d prefer a more scientific example, consider the weather. A graph
    depicting the daily temperature of your favorite city over the course of the year
    is a graph that depicts time-series data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Time-series data is an excellent starting point for data visualization for
    a few reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: It is an extremely common and useful type of data. There is quite a bit of information
    that is dependent on time, and understanding it provides meaningful insight into
    the subject of interest going forward.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are tried and true methods to visualize time-series data effectively,
    as you’ll see below. Master these, and you’ll be in good shape.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As compared with some other types of data, time-series visualizations are fairly
    intuitive to humans and align with our perception of time. This makes it easier
    to focus on the basic elements of visualization design when starting out, instead
    of getting bogged down in trying to make sense of very complex data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s start by taking a look at different visualization methods on a conceptual
    level.
  prefs: []
  type: TYPE_NORMAL
- en: How Is Time-Series Data Visualized?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The standard for time-series visualization is the famed line chart:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/707ea5b9f9770d3bab82fc5573f0aa25.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by [Wikimedia Commons](https://commons.wikimedia.org/wiki/File:Pushkin_population_history.svg)
  prefs: []
  type: TYPE_NORMAL
- en: This chart generally puts time on the x-axis, and the variable that changes
    with time on the y-axis. This provides a view that appear to be “moving forward,”
    in line with humans’ linear perception of time.
  prefs: []
  type: TYPE_NORMAL
- en: Though the line chart is the standard, there are other, related possibilities.
  prefs: []
  type: TYPE_NORMAL
- en: Multiple Line Chart
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This approach is a direct extension of a singular line chart and displays several
    related time series on the same plot, allowing comparison between groups or categories
    (e.g., sales by region):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d81cd2f1069850d36b71c8fd17522b3b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by [Our World in Data](https://ourworldindata.org/data-insights/life-expectancy-has-increased-at-all-ages)
  prefs: []
  type: TYPE_NORMAL
- en: Area Chart
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Functionally, an area chart is almost exactly the same as a line chart, but
    the area under the line is filled in. It emphasizes the magnitude of change:'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/9273707659398da80f321481a617e812.png)](https://commons.wikimedia.org/wiki/Category:Area_charts#/media/File:Federal_timeline_US_prisoners.gif)'
  prefs: []
  type: TYPE_NORMAL
- en: Image by Wikimedia Commons
  prefs: []
  type: TYPE_NORMAL
- en: Stacked Area Chart
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Technically, the stacked area chart is the analogue to the multiple line chart,
    but it is a bit trickier to read. In particular, the total is *cumulative*, with
    the baseline for each stacked line starting at the one below it. For instance,
    at 2023 in the chart below, “Ages 25-64” represents about 4 billion people, since
    we start counting where “Ages 15-24” ends.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2059cdc8c508e27ed1822dac8bc20301.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by [Our World in Data](https://ourworldindata.org/grapher/population-by-age-group?time=1950..2023&overlay=download-vis)
  prefs: []
  type: TYPE_NORMAL
- en: Bar Chart (Vertical or Horizontal)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Finally, in some cases, a bar chart is also appropriate for time-series visualization.
    This approach is useful if you wish to show discrete time intervals—such as monthly
    sum or yearly average of some metric—rather than continuous data. That said, I
    will not be coding bar charts in this article.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1562a32b2888496ba98e0758d14de4a8.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Our World In Data
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s get to actually building these visualizations. In each of the examples
    below, I will walk through the code in a specific visualization library for constructing
    line charts and area charts. I have [linked the data here](https://docs.google.com/spreadsheets/d/1P8hU-1hbMZIau8H18a1laZz9BB8CIkmyMdvhdAFzVNg/edit?usp=sharing)
    and encourage you to follow along. To internalize these techniques, you must practice
    using them yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Coding Time-Series Visualizations in Matplotlib
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Running this code produces the following four visualizations:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1ffb18caee12aa24e8365f00b7cc5e4d.png)![](../Images/c0138375d9b3f273ebc36814f102a84f.png)![](../Images/f6dd30cca38f3786c6029fad92092eec.png)![](../Images/e34609a7e40f410c5866387fe7339cee.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s break the code down step by step to ensure you understand what is happening:'
  prefs: []
  type: TYPE_NORMAL
- en: First, we load the data into `pandas` as a CSV file and ensure the date is properly
    represented as a `datetime` object.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Matplotlib structures charts within the `Figure` object, which represents the
    entire Canvas. This can be accessed directly using `plt.figure`, but having multiple
    variables using `plt.subplots` is more intuitive for multiple visualizations.
    Every call to `plt.subplots` defines a new, separate `Figure` (canvas).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The line `fig1, ax1 = plt.subplots(figsize=(10, 6))` defines the first subplot;
    `fig1` represents the canvas, but `ax1` represents the ***actual plotting area***
    within it and is the variable where you will make most changes.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Matplotlib has different functions for different charts. The `plot` function
    plots 2-D points and then connects them to construct a line chart. This is what
    we specify in the line `ax1.plot(df['Date'], df['Product A Sales'], linewidth=2)`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The remaining lines are primarily aesthetic functions that do exactly what
    their names suggest: labeling axes, adding gridlines, and specifying layout.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'For the **multiple line chart**, the code is precisely the same, except we
    call `plot` three times: one for each set of x-y points that we want to graph
    to show all the products.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The **area chart** is almost identical to the line chart, except for the addition
    of `ax3.fill_between(df['Date'], df['Product A Sales'], alpha=0.4),` which tells
    Matplotlib to shade the area below the line.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The **stacked area chart**, by contrast, requires us to use the `stacked_plot`
    function, which takes in all three data arrays we want to plot at once. The remaining
    aesthetic code, however, is the same.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Try programming these yourself in your favorite IDE or in a Jupyter notebook.
    What patterns do you see? Which chart do you prefer the most?
  prefs: []
  type: TYPE_NORMAL
- en: Also, remember that you do not need to memorize this syntax, especially if you
    are new to programming data visualizations or new to Python in general. Focus
    on trying to understand what is happening on a conceptual level; you can always
    look up the particular syntax and plug your data in as needed.
  prefs: []
  type: TYPE_NORMAL
- en: This will hold true for the remaining two examples as well.
  prefs: []
  type: TYPE_NORMAL
- en: Coding Time-Series Visualizations in Plotly
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here is the code to generate the same visualizations as above, this time in
    Plotly’s style:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'We obtain the following four visualizations:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/daf9a178ea37dd3d971c905094901772.png)![](../Images/8d044a9a72083dde0fe21c3f789d42d5.png)![](../Images/ba3f24eb7e67240381560d69d18a79ae.png)![](../Images/c5c7700a3471fb7bbded6d56d6ebc1af.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Here is a breakdown of the code:'
  prefs: []
  type: TYPE_NORMAL
- en: Plotly is fully independent of Matplotlib. It uses similarly named `Figure`
    objects, but does not have any `ax` objects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `Scatter` function with `mode` “lines” is used to build a line chart with
    the specified x- and y-axis data. You can think of the `add_trace` function as
    adding a new component to an existing `Figure`. Thus, for the multiple line chart,
    we simply call `add_trace` with the appropriate `Scatter` inputs three times.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For labeling and aesthetics in Plotly, use the `update_layout` function.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The area chart is built identically to the line chart, with the addition of
    the optional argument `fill='tozeroy'`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Upon first glance, this may look like some obscure color, but it is actually
    saying “TO ZERO Y,” specifying to Plotly the area that should be filled in.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: If you’re having trouble visualizing this, try changing the argument to “tozerox”
    and see what happens.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For the stacked area chart, we need a different optional parameter: `stackgroup=''one''`.
    Adding this to each of the `Scatter` calls tells Plotly that they are all to be
    constructed as part of the same stack.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An advantage of Plotly is that by default, all Plotly charts are interactive
    and come with the ability to zoom, hover for tooltips, and toggle the legend.
    (Note the images above are saved as PNGs, so you will need to generate the plots
    yourself in order to see this.)
  prefs: []
  type: TYPE_NORMAL
- en: Coding Time-Series Visualizations in Altair
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s finish off by generating these four visualizations in Altair. Here is
    the code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'We obtain the following charts:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1557594b60470cb5ce62b4598c04d11f.png)![](../Images/90f2e26be94006a3e9ae5c7d5511559d.png)![](../Images/2636aa155fe5be5859741a22e65f7a2b.png)![](../Images/558d2d2af78eb8be4597f1d3d4d15c92.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s break down the code:'
  prefs: []
  type: TYPE_NORMAL
- en: Altair has a slightly different structure from Matplotlib and Plotly. It takes
    some practice to grasp, but once you understand it, its intuitiveness makes building
    new visualizations straightforward.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Everything in Altair revolves around the `Chart` object, into which you pass
    in your data. Then, you use a `mark_` function to specify what kind of chart you
    want to build, and the `encoding` function to specify what variables will correspond
    to what visual elements on the chart (e.g., x-axis, y-axis, color, size, etc.).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For the line chart, we use the `mark_line` function, and then specify that we
    want the date on the x-axis and the sales on the y-axis.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `melt` function does not change the data itself, just its *structure*. It
    puts the products all into a single column, a “long format” which is more amenable
    to Altair’s visualization model. [For more details, check out this helpful article.](https://www.kdnuggets.com/2023/03/beginner-guide-pandas-melt-function.html)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once we transform the data as above, we can build our multiple line chart simply
    by adding a “color” encoding, as shown in the code. This was made possible because
    all the product types are now available in a single column, and we can tell Altair
    to distinguish them by color.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The code for generating area charts showcases the beauty of Altair’s structure.
    Everything remains the same—all you need to do is change the function being used
    to `mark_area`!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As you explore other types of visualizations on your own (and in future articles!),
    Altair’s model for building visualizations will become easier to implement (and
    hopefully appreciate).
  prefs: []
  type: TYPE_NORMAL
- en: What’s Next?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In future articles, I will cover how to use these libraries to build additional
    types of visualizations. As you continue learning, remember that the purpose of
    these articles is *not* to master any one tool. This is about learning data visualization
    holistically, and my hope is that you have walked away from this article with
    a better understanding of how time-series data is visualized.
  prefs: []
  type: TYPE_NORMAL
- en: As for the code, that comfort comes with time and practice. For now, you should
    feel free to take the examples above and adjust them for your own data as needed.
  prefs: []
  type: TYPE_NORMAL
- en: Until next time.
  prefs: []
  type: TYPE_NORMAL
