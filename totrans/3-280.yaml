- en: Introduction to Minimum Cost Flow Optimization in Python
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/introduction-to-minimum-cost-flow-optimization-in-python/](https://towardsdatascience.com/introduction-to-minimum-cost-flow-optimization-in-python/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Minimum cost flow optimization minimizes the cost of moving flow through a network
    of nodes and edges. Nodes include sources (supply) and sinks (demand), with different
    costs and capacity limits. The aim is to find the least costly way to move volume
    from sources to sinks while adhering to all capacity limitations.
  prefs: []
  type: TYPE_NORMAL
- en: Applications
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Applications of minimum cost flow optimization are vast and varied, spanning
    multiple industries and sectors. This approach is crucial in logistics and supply
    chain management, where it is used to minimize transportation costs while ensuring
    timely delivery of goods. In telecommunications, it helps in optimizing the routing
    of data through networks to reduce latency and improve bandwidth utilization.
    The energy sector leverages minimum cost flow optimization to efficiently distribute
    electricity through power grids, reducing losses and operational costs. Urban
    planning and infrastructure development also benefit from this optimization technique,
    as it assists in designing efficient public transportation systems and water distribution
    networks.
  prefs: []
  type: TYPE_NORMAL
- en: Example
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Below is a simple flow optimization example:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e57a53eebffe316188be5706d2f315ed.png)'
  prefs: []
  type: TYPE_IMG
- en: The image above illustrates a minimum cost flow optimization problem with six
    nodes and eight edges. Nodes A and B serve as sources, each with a supply of 50
    units, while nodes E and F act as sinks, each with a demand of 40 units. Every
    edge has a maximum capacity of 25 units, with variable costs indicated in the
    image. The objective of the optimization is to allocate flow on each edge to move
    the required units from nodes A and B to nodes E and F, respecting the edge capacities
    at the lowest possible cost.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/79b997b182be00c62b5f33089bd117c2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Node F can only receive supply from node B. There are two paths: directly or
    through node D. The direct path has a cost of 2, while the indirect path via D
    has a combined cost of 3\. Thus, 25 units (the maximum edge capacity) are moved
    directly from B to F. The remaining 15 units are routed via B -D-F to meet the
    demand.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Currently, 40 out of 50 units have been transferred from node B, leaving a
    remaining supply of 10 units that can be moved to node E. The available pathways
    for supplying node E include: A-E and B-E with a cost of 3, A-C-E with a cost
    of 4, and B-C-E with a cost of 5\. Consequently, 25 units are transported from
    A-E (limited by the edge capacity) and 10 units from B-E (limited by the remaining
    supply at node B). To meet the demand of 40 units at node E, an additional 5 units
    are moved via A-C-E, resulting in no flow being allocated to the B-C pathway.'
  prefs: []
  type: TYPE_NORMAL
- en: Mathematical formulation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'I introduce two mathematical formulations of minimum cost flow optimization:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. LP (linear program) with continuous variables only
  prefs: []
  type: TYPE_NORMAL
- en: 2\. MILP (mixed integer linear program) with continuous and discrete variables
  prefs: []
  type: TYPE_NORMAL
- en: 'I am using following definitions:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d2d2fedec231a49a68e4444c01e295ed.png)'
  prefs: []
  type: TYPE_IMG
- en: Definitions
  prefs: []
  type: TYPE_NORMAL
- en: LP formulation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This formulation only contains decision variables that are continuous, meaning
    they can have any value as long as all constraints are fulfilled. Decision variables
    are in this case the flow variables x(u, v) of all edges.
  prefs: []
  type: TYPE_NORMAL
- en: 'The objective function describes how the costs that are supposed to be minimized
    are calculated. In this case it is defined as the flow multiplied with the variable
    cost summed up over all edges:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b3cf51fc87cf578c11b1b520f53136f6.png)'
  prefs: []
  type: TYPE_IMG
- en: Constraints are conditions that must be satisfied for the solution to be valid,
    ensuring that the flow does not exceed capacity limitations.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, all flows must be non-negative and not exceed to edge capacities:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3daba592e3d130eb08711c24aa71a6c0.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Flow conservation constraints ensure that the same amount of flow that goes
    into a node has to come out of the node. These constraints are applied to all
    nodes that are neither sources nor sinks:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/40f5eaedd17936b5783948e2beea01af.png)'
  prefs: []
  type: TYPE_IMG
- en: 'For source and sink nodes the difference of out flow and in flow is smaller
    or equal the supply of the node:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3e0a0f9b0b4f787655534daebf71d868.png)'
  prefs: []
  type: TYPE_IMG
- en: If v is a source the difference of outflow minus inflow must not exceed the
    supply s(v). In case v is a sink node we do not allow that more than -s(v) can
    flow into the node than out of the node (for sinks s(v) is negative).
  prefs: []
  type: TYPE_NORMAL
- en: MILP
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Additionally, to the continuous variables of the LP formulation, the MILP formulation
    also contains discreate variables that can only have specific values. Discrete
    variables allow to restrict the number of used nodes or edges to certain values.
    It can also be used to introduce fixed costs for using nodes or edges. In this
    article I show how to add fixed costs. It is important to note that adding discrete
    decision variables makes it much more difficult to find an optimal solution, hence
    this formulation should only be used if a LP formulation is not possible.
  prefs: []
  type: TYPE_NORMAL
- en: 'The objective function is defined as:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6451894799e1112ae9c32a79b029bc77.png)'
  prefs: []
  type: TYPE_IMG
- en: 'With three terms: variable cost of all edges, fixed cost of all edges, and
    fixed cost of all nodes.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The maximum flow that can be allocated to an edge depends on the edge’s capacity,
    the edge selection variable, and the origin node selection variable:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6d9c5a40d1b1af7c25bd656c2afbfbee.png)'
  prefs: []
  type: TYPE_IMG
- en: This equation ensures that flow can only be assigned to edges if the edge selection
    variable and the origin node selection variable are 1.
  prefs: []
  type: TYPE_NORMAL
- en: The flow conservation constraints are equivalent to the LP problem.
  prefs: []
  type: TYPE_NORMAL
- en: Implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section I explain how to implement a MILP optimization in Python. You
    can find the code in this [repo](https://github.com/ReinhardSellmair/nx_flow/tree/main).
  prefs: []
  type: TYPE_NORMAL
- en: Libraries
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To build the flow network, I used NetworkX which is an excellent library (https://networkx.org/)
    for working with graphs. There are many interesting articles that demonstrate
    how powerful and easy to use NetworkX is to work with graphs, i.a. c[ustomizing
    NetworkX Graphs](https://towardsdatascience.com/customizing-networkx-graphs-f80b4e69bedf), [NetworkX:
    Code Demo for Manipulating Subgraphs](https://towardsdatascience.com/networkx-code-demo-for-manipulating-subgraphs-e45320581d13), [Social
    Network Analysis with NetworkX: A Gentle Introduction](https://towardsdatascience.com/social-network-analysis-with-networkx-a-gentle-introduction-6123eddced3).'
  prefs: []
  type: TYPE_NORMAL
- en: One important aspect when building an optimization is to make sure that the
    input is correctly defined. Even one small error can make the problem infeasible
    or can lead to an unexpected solution. To avoid this, I used [Pydantic](https://docs.pydantic.dev/latest/) to
    validate the user input and raise any issues at the earliest possible stage. This [article](https://towardsdatascience.com/how-to-make-the-most-of-pydantic-aa374d5c12d) gives
    an easy to understand introduction to Pydantic.
  prefs: []
  type: TYPE_NORMAL
- en: To transform the defined network into a mathematical optimization problem I
    used [PuLP](https://coin-or.github.io/pulp/). Which allows to define all variables
    and constraint in an intuitive way. This library also has the advantage that it
    can use many different solvers in a simple pug-and-play fashion. This [article](https://towardsdatascience.com/linear-programming-and-discrete-optimization-with-python-using-pulp-449f3c5f6e99) provides
    good introduction to this library.
  prefs: []
  type: TYPE_NORMAL
- en: Defining nodes and edges
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The code below shows how nodes are defined:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Nodes are defined through the Node class which is inherited from Pydantic’s
    BaseModel. This enables an automatic validation that ensures that all properties
    are defined with the correct datatype whenever a new object is created. In this
    case only the name is a required input, all other properties are optional, if
    they are not provided the specified default value is assigned to them. By setting
    the “frozen” parameter to True I made all properties immutable, meaning they cannot
    be changed after the object has been initialized.
  prefs: []
  type: TYPE_NORMAL
- en: The validate method is executed after the object has been initialized and applies
    more checks to ensure the provided values are as expected. Specifically it checks
    that demand, supply, capacity, variable cost and fixed cost are not negative.
    Furthermore, it also does not allow infinite demand as this would lead to an infeasible
    optimization problem.
  prefs: []
  type: TYPE_NORMAL
- en: These checks look trivial, however their main benefit is that they will trigger
    an error at the earliest possible stage when an input is incorrect. Thus, they
    prevent creating a optimization model that is incorrect. Exploring why a model
    cannot be solved would be much more time consuming as there are many factors that
    would need to be analyzed, while such “trivial” input error may not be the first
    aspect to investigate.
  prefs: []
  type: TYPE_NORMAL
- en: 'Edges are implemented as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The required inputs are an origin node and a destination node object. Additionally,
    capacity, variable cost and fixed cost can be provided. The default value for
    capacity is infinity which means if no capacity value is provided it is assumed
    the edge does not have a capacity limitation. The validation ensures that the
    provided values are non-negative and that origin node name and the destination
    node name are different.
  prefs: []
  type: TYPE_NORMAL
- en: Initialization of flowgraph object
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To define the flowgraph and optimize the flow I created a new class called
    FlowGraph that is inherited from NetworkX’s DiGraph class. By doing this I can
    add my own methods that are specific to the flow optimization and at the same
    time use all methods DiGraph provides:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: FlowGraph is initialized by providing a list of nodes and edges. The first step
    is to initialize the parent class as an empty graph. Next, nodes and edges are
    added via the methods *add_node* and *add_edge*. These methods first check if
    the provided element is a Node or Edge object. If this is not the case an error
    will be raised. This ensures that all elements added to the graph have passed
    the validation of the previous section. Next, the values of these objects are
    added to the Digraph object. Note that the Digraph class also uses *add_node* and *add_edge* methods
    to do so. By using the same method name I am overwriting these methods to ensure
    that whenever a new element is added to the graph it must be added through the
    FlowGraph methods which validate the object type. Thus, it is not possible to
    build a graph with any element that has not passed the validation tests.
  prefs: []
  type: TYPE_NORMAL
- en: Initializing the optimization problem
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The method below converts the network into an optimization model, solves it,
    and retrieves the optimized values.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Pulp’s LpProblem is initialized, the constant LpMinimize defines it as a minimization
    problem — meaning it is supposed to minimize the value of the objective function.
    In the following lines all decision variables are initialized, the objective function
    as well as all constraints are defined. These methods will be explained in the
    following sections.
  prefs: []
  type: TYPE_NORMAL
- en: Next, the problem is solved, in this step the optimal value of all decision
    variables is determined. Following the status of the optimization is retrieved.
    When the status is “Optimal” an optimal solution could be found other statuses
    are “Infeasible” (it is not possible to fulfill all constraints), “Unbounded”
    (the objective function can have an arbitrary low values), and “Undefined” meaning
    the problem definition is not complete. In case no optimal solution was found
    the problem definition needs to be reviewed.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the optimized values of all variables are retrieved and assigned to
    the respective nodes and edges.
  prefs: []
  type: TYPE_NORMAL
- en: Defining decision variables
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'All decision variables are initialized in the method below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: First it iterates through all edges and assigns continuous decision variables
    if the edge capacity is greater than 0\. Furthermore, if fixed costs of the edge
    are greater than 0 a binary decision variable is defined as well. Next, it iterates
    through all nodes and assigns binary decision variables to nodes with fixed costs.
    The total number of continuous and binary decision variables is counted and printed
    at the end of the method.
  prefs: []
  type: TYPE_NORMAL
- en: Defining objective
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After all decision variables have been initialized the objective function can
    be defined:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The objective is initialized as 0\. Then for each edge fixed costs are added
    if the edge has a selection variable, and variable costs are added if the edge
    has a flow variable. For all nodes with selection variables fixed costs are added
    to the objective as well. At the end of the method the objective is added to the
    LP object.
  prefs: []
  type: TYPE_NORMAL
- en: Defining constraints
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'All constraints are defined in the method below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: First, capacity constraints are defined for each edge. If the edge has a selection
    variable the capacity is multiplied with this variable. In case there is no capacity
    limitation (capacity is set to infinity) but there is a selection variable, the
    selection variable is multiplied with the maximum flow that has been calculated
    by aggregating the demand of all nodes. An additional constraint is added in case
    the edge’s origin node has a selection variable. This constraint means that flow
    can only come out of this node if the selection variable is set to 1.
  prefs: []
  type: TYPE_NORMAL
- en: Following, the flow conservation constraints for all nodes are defined. To do
    so the total in and outflow of the node is calculated. Getting all in and outgoing
    edges can easily be done by using the *in_edges* and *out_edges* methods of the
    DiGraph class. If the node has a capacity limitation the maximum outflow will
    be constraint by that value. For the flow conservation it is necessary to check
    if the node is either a source or sink node or a transshipment node (demand equals
    supply). In the first case the difference between inflow and outflow must be greater
    or equal the difference between demand and supply while in the latter case in
    and outflow must be equal.
  prefs: []
  type: TYPE_NORMAL
- en: The total number of constraints is counted and printed at the end of the method.
  prefs: []
  type: TYPE_NORMAL
- en: Retrieving optimized values
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After running the optimization, the optimized variable values can be retrieved
    with the following method:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: This method iterates through all edges and nodes, checks if decision variables
    have been assigned and adds the decision variable value via varValue to the respective
    edge or node.
  prefs: []
  type: TYPE_NORMAL
- en: Demo
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To demonstrate how to apply the flow optimization I created a supply chain network
    consisting of 2 factories, 4 distribution centers (DC), and 15 markets. All goods
    produced by the factories have to flow through one distribution center until they
    can be delivered to the markets.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6dd045c56eb6bbb777ce70bf4f0e3fa6.png)'
  prefs: []
  type: TYPE_IMG
- en: Supply chain problem
  prefs: []
  type: TYPE_NORMAL
- en: 'Node properties were defined:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f983f418968b926e235b1c6a256e961d.png)'
  prefs: []
  type: TYPE_IMG
- en: Node definitions
  prefs: []
  type: TYPE_NORMAL
- en: Ranges mean that uniformly distributed random numbers were generated to assign
    these properties. Since Factories and DCs have fixed costs the optimization also
    needs to decide which of these entities should be selected.
  prefs: []
  type: TYPE_NORMAL
- en: Edges are generated between all Factories and DCs, as well as all DCs and Markets.
    The variable cost of edges is calculated as the Euclidian distance between origin
    and destination node. Capacities of edges from Factories to DCs are set to 350
    while from DCs to Markets are set to 100.
  prefs: []
  type: TYPE_NORMAL
- en: 'The code below shows how the network is defined and how the optimization is
    run:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of flow optimization is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The problem consists of 68 continuous variables which are the edges’ flow variables
    and 6 binary decision variables which are the selection variables of the Factories
    and DCs. There are 161 constraints in total which consist of edge and node capacity
    constraints, node selection constraints (edges can only have flow if the origin
    node is selected), and flow conservation constraints. The next line shows that
    the total supply is 1400 which is higher than the total demand of 909 (if the
    demand was higher than the supply the problem would be infeasible). Since this
    is a small optimization problem, the time to define the optimization model was
    less than 0.01 seconds. The last line shows that an optimal solution with an objective
    value of 1335 could be found in 0.23 seconds.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, to the code I described in this post I also added two methods
    that visualize the optimized solution. The code of these methods can also be found
    in the [repo](https://github.com/ReinhardSellmair/nx_flow/tree/main).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/372a6a8393bff3ecf4c2847c07607b7a.png)'
  prefs: []
  type: TYPE_IMG
- en: Flow graph
  prefs: []
  type: TYPE_NORMAL
- en: All nodes are located by their respective x and y coordinates. The node and
    edge size is relative to the total volume that is flowing through. The edge color
    refers to its utilization (flow over capacity). Dashed lines show edges without
    flow allocation.
  prefs: []
  type: TYPE_NORMAL
- en: In the optimal solution both Factories were selected which is inevitable as
    the maximum supply of one Factory is 700 and the total demand is 909\. However,
    only 3 of the 4 DCs are used (DC 0 has not been selected).
  prefs: []
  type: TYPE_NORMAL
- en: 'In general the plot shows the Factories are supplying the nearest DCs and DCs
    the nearest Markets. However, there are a few exceptions to this observation:
    Factory 0 also supplies DC 3 although Factory 1 is nearer. This is due to the
    capacity constraints of the edges which only allow to move at most 350 units per
    edge. However, the closest Markets to DC 3 have a slightly higher demand, hence
    Factory 0 is moving additional units to DC 3 to meet that demand. Although Market
    9 is closest to DC 3 it is supplied by DC 2\. This is because DC 3 would require
    an additional supply from Factory 0 to supply this market and since the total
    distance from Factory 0 over DC 3 is longer than the distance from Factory 0 through
    DC 2, Market 9 is supplied via the latter route.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Another way to visualize the results is via a Sankey diagram which focuses
    on visualizing the flows of the edges:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a6dc4e4408f6e5c5fbae279be61556d5.png)'
  prefs: []
  type: TYPE_IMG
- en: Sankey flow diagram
  prefs: []
  type: TYPE_NORMAL
- en: The colors represent the edges’ utilizations with lowest utilizations in green
    changing to yellow and red for the highest utilizations. This diagram shows very
    well how much flow goes through each node and edge. It highlights the flow from
    Factory 0 to DC 3 and also that Market 13 is supplied by DC 2 and DC 1.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Minimum cost flow optimizations can be a very helpful tool in many domains like
    logistics, transportation, telecommunication, energy sector and many more. To
    apply this optimization it is important to translate a physical system into a
    mathematical graph consisting of nodes and edges. This should be done in a way
    to have as few discrete (e.g. binary) decision variables as necessary as those
    make it significantly more difficult to find an optimal solution. By combining
    Python’s NetworkX, Pulp and Pydantic libraries I built an flow optimization class
    that is intuitive to initialize and at the same time follows a generalized formulation
    which allows to apply it in many different use cases. Graph and flow diagrams
    are very helpful to understand the solution found by the optimizer.
  prefs: []
  type: TYPE_NORMAL
- en: '*If not otherwise stated all images were created by the author.*'
  prefs: []
  type: TYPE_NORMAL
