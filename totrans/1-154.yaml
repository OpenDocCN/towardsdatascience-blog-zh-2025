- en: The Machine Learning Lessons I’ve Learned This Month
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-machine-learning-lessons-ive-learned-this-month-2/](https://towardsdatascience.com/the-machine-learning-lessons-ive-learned-this-month-2/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1761590179027" class="mdspan-comment">Most days</mdspan>
    in machine learning are the same.
  prefs: []
  type: TYPE_NORMAL
- en: 'Coding, waiting for results, interpreting them, returning back to coding. Plus,
    some intermediate presentations of one’s progress. But, things mostly being the
    same does not mean that there’s nothing to learn. Quite the contrary! Two to three
    years ago, I started a daily habit of writing down lessons that I learned from
    my ML work. In looking back through some of the lessons from this month, I found
    three practical lessons that stand out:'
  prefs: []
  type: TYPE_NORMAL
- en: Using README documents for yourself
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Requesting MIG slices instead of full GPUs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Sprinkling movements throughout the day
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Keep a README — for your future self
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Most READMEs are written with other people in mind. They’re there to onboard
    new collaborators, or to make an open-source repo usable for strangers.
  prefs: []
  type: TYPE_NORMAL
- en: Write one for yourself, too — especially for your **future** self.
  prefs: []
  type: TYPE_NORMAL
- en: When you’re in the middle of a project, all the paths, commands, and subtle
    settings live in your head. After a pause, not so much. I ran into this recently
    when I had to prepare an update for a paper. In ML research, reviews often take
    months. In that time, you move on to the next project with new datasets, new code,
    new conventions. When the review finally lands, you return to the old project
    and… *spend half a day reconstructing which script produced which figure.*
  prefs: []
  type: TYPE_NORMAL
- en: That’s a lot of stress if the deadline is approaching soon.
  prefs: []
  type: TYPE_NORMAL
- en: Preparing for your own forgetting is part of the job. A small README saves a
    big headache.
  prefs: []
  type: TYPE_NORMAL
- en: What to capture (for you)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Keep it practical. Your future self doesn’t want prose; they want the “how”:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Project quickstart.** Environment setup, exact Python version, env file or `conda`/`pip` commands.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data locations.** Where raw and processed data live; how to download, cache,
    and checksum. Note any **gotchas** (e.g., “NDVI tiles are flipped south–north
    after resampling”, as given in my older posts).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reproduce results.** One command per artifact: figures, tables, and checkpoints.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Training & eval.** The exact commands to run the main experiments; how to
    resume; how to set seeds.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hyperparameter search.** The command you actually used, with ranges; where
    results are logged.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Common pitfalls.** Anything you know you’ll forget (required env vars, GPU
    flags, file naming conventions).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Changelog.** One-line bullets of meaningful changes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A minimal, generic template you can adapt for all projects:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: MIG slices for quick scheduling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Training the current generation of large language models needs hundreds (or
    thousands) of high-end GPUs. But most day-to-day ML work doesn’t require LLM-scale
    models. A lot of problems are solved with compact CNNs or small MLPs — and those
    do not need a full A100/H100 GPU.
  prefs: []
  type: TYPE_NORMAL
- en: 'Requesting a whole GPU for a tiny model wastes resources and gets you to the
    back of the queue. I relearned this the hard way this month: I was training a* 4-layer
    MLP* and waiting ages to be scheduled. In my scheduling requests, I requested
    a full high end GPU. Of course, these are in high demand by those jobs that actually
    need them (such as fine-tuning LLMs).'
  prefs: []
  type: TYPE_NORMAL
- en: Once I switched to a MIG slice, jobs started immediately and my iteration speed
    jumped.
  prefs: []
  type: TYPE_NORMAL
- en: What’s MIG and why use it?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**MIG (Multi-Instance GPU)** lets you split a recent NVIDIA GPU into several
    isolated “slices.” One big GPU becomes up to seven smaller virtual GPUs, and the
    full VRAM is split across these slices. In essence, each slice is a smaller GPU.
    And for many workloads, those small slices are more than enough.'
  prefs: []
  type: TYPE_NORMAL
- en: There is an additional benefit: **fewer people request slices** (because they
    are unaware of the opportunity), so schedulers can fit your job in right away.
    This allows you to iterate over your models faster, reducing the time to get good
    results.
  prefs: []
  type: TYPE_NORMAL
- en: To apply it in practice
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Check availability.** Ask your cluster admins or look at the scheduler docs
    for MIG partition names (e.g., `1g.10gb`, `2g.20gb`).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Right-size your request.** Start small. If VRAM OOMs, step up one size. Don’t
    default to full GPUs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Profile memory early.** Run a small batch to read peak VRAM; pick the smallest
    slice that leaves ~10–20% headroom.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Template your job.** Keep a job script for MIG and one for full GPUs; switch
    by flag.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Combatting prolonged sitting with movement
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Most computer jobs are done in front of a, well, computer. We all have noticed
    that the more time we spend, the more slouchy our posture becomes. We’re rounded
    forward; all work is done in front of us*.
  prefs: []
  type: TYPE_NORMAL
- en: That’s not a good position to hold for a long time, but it’s quite common these
    days. For ML people, computers are our toolset and we (need to) spend considerable
    time with this toolset.
  prefs: []
  type: TYPE_NORMAL
- en: Thankfully, we don’t need to spend time in bad posture when we are working on
    a screen (no, those two are not linked *per definitionem*).
  prefs: []
  type: TYPE_NORMAL
- en: 'I realized this (again, because I seem to fall back into old habits) this month:
    hours of reading, coding, and meetings pulled my shoulders forward and lock the
    upper back. Then, after a few days of heavy paper reading, my shoulders reminded
    me to change something.'
  prefs: []
  type: TYPE_NORMAL
- en: The fix, it turned out, was easy and doesn’t require a gym or a full workout.
    It just requires **alternating positions** and **brief movement snacks**.
  prefs: []
  type: TYPE_NORMAL
- en: 'I collected together a small program, of which I used parts throughout the
    day (check YouTube for any of those exercises if you don’t know them. That’s meta-knowledge
    that might help you do your job better and longer — and healthier):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Audio-only meetings:** stand up and walk around. If you must stay near the
    desk, shift to a **split stance** (one foot forward) to open the hips.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Two-minute resets** (e.g., after a coffee break or coming from the printer,
    etc)**:**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Band pull-aparts or face pulls (10–15 reps)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Wall pec stretch (30–45s each side)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Hip flexor stretch / couch stretch (30–45s each side)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Standing reading blocks:** print a paper or read on a tablet while standing;
    alternate standing and sitting blocks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Beyond, I’ve found that a short morning session makes my shoulders feel better
    and improves focus throughout the day — a welcome bonus, since ML work demands
    concentration:'
  prefs: []
  type: TYPE_NORMAL
- en: 5 min easy cardio (walk or climb stairs)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5 min mobility (thoracic rotations, shoulder circles, deep squat hold)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5 min light strength (lunges, push-ups against desk, band rows)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '* An often-raised argument: aren’t all jobs done in front of us? Or, put differently:
    which job requires us to work with hands behind us? Right, except for maybe gymnasts,
    virtually all jobs happen in front of us. After all, that’s where our eyes are!
    But: the non-computer jobs get diversified movements along the day: grabbing something
    from a shelf, dragging something, etc. It’s the alternation that counts.'
  prefs: []
  type: TYPE_NORMAL
