- en: How To Build Effective Technical Guardrails for AI Applications
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-build-effective-technical-guardrails-for-ai-applications/](https://towardsdatascience.com/how-to-build-effective-technical-guardrails-for-ai-applications/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1759772921968" class="mdspan-comment">Everyone loves automation</mdspan>
    with a bit of control and assurance of security. Guardrails provide that for AI
    applications. But how can those be built into applications?
  prefs: []
  type: TYPE_NORMAL
- en: A few guardrails are established even before application coding begins. First,
    there are legal guardrails provided by the government, such as the [EU AI Act](https://www.europarl.europa.eu/topics/en/article/20230601STO93804/eu-ai-act-first-regulation-on-artificial-intelligence),
    which highlights acceptable and banned use cases of AI. Then there are policy
    guardrails set by the company. These guardrails indicate which use cases the company
    finds acceptable for AI usage, both in terms of security and ethics. These two
    guardrails filter the use cases for AI adoption.
  prefs: []
  type: TYPE_NORMAL
- en: After crossing the first two types of guardrails, an acceptable use case reaches
    the engineering team. When the engineering team implements the use case, they
    further incorporate technical guardrails to ensure the safe use of data and maintain
    the expected behavior of the application. We will explore this third type of guardrail
    in the article.
  prefs: []
  type: TYPE_NORMAL
- en: Top technical guardrails at different layers of AI application
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Guardrails are created at the input, model, and output layers. Each serves
    a unique purpose:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data layer:** Guardrails at the data layer ensure that any sensitive, problematic,
    or incorrect data doesn’t enter the system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model layer:** It’s good to build guardrails at this layer to make sure the
    model is working as expected.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Output layer:** Output layer guardrails assure the model doesn’t provide
    incorrect answers with high confidence — a common threat with AI systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/fe78924e4890c970b3598d8870931e98.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Data layer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s go through the must-have guardrail at the data layer:'
  prefs: []
  type: TYPE_NORMAL
- en: (i) Input validation and sanitization
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The first thing to check in any AI application is if the input data is in the
    correct format and doesn’t contain any inappropriate or offensive language. It’s
    actually quite easy to do that since most databases offer built-in SQL functions
    for pattern matching. For instance, if a column is supposed to be alphanumeric,
    then you can validate if the values are in the expected format using a simple
    regex pattern. Similarly, functions are available to perform a profanity check
    (inappropriate or offensive language) in cloud applications like Microsoft Azure.
    But you can always build a custom function if your database doesn’t have one.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: (ii) PII and sensitive data protection
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Another key consideration in building a secure AI application is making sure
    none of the PII data reaches the model layer. Most data engineers work with cross-functional
    teams to flag all PII columns in tables. There are also PII identification automation
    tools available, which can perform data profiling and flag the PII columns with
    the help of ML models. Common PII columns are: name, email address, phone number,
    date of birth, social security number (SSN), passport number, driver’s license
    number, and biometric data. Other examples of indirect PII are health information
    or financial information.'
  prefs: []
  type: TYPE_NORMAL
- en: A common way to prevent this data from entering the system is by applying a
    de-identification mechanism. This can be as simple as removing the data completely,
    or employing sophisticated masking or pseudonymization techniques using hashing
    — something which the model can’t interpret.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: (iii) Bias detection and mitigation
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Before the data enters the model layer, another checkpoint is to validate whether
    it is accurate and bias-free. Some common types of bias are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Selection bias**: The input data is incomplete and doesn’t accurately represent
    the full target audience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Survivorship bias**: There is more data for the happy path, making it tough
    for the model to work on failed scenarios.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Racial or association bias**: The data favors a certain gender or race due
    to past patterns or prejudices.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Measurement or label bias**: The data is incorrect due to a labelling mistake
    or bias in the person who recorded it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Rare event bias**: The input data lacks all edge cases, giving an incomplete
    picture.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Temporal bias**: The input data is outdated and doesn’t accurately represent
    the current world.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While I also wish there were a simple system to detect such biases, this is
    actually grunt work. The data scientist has to sit down, run queries, and test
    data for every scenario to detect any bias. For example, if you are building a
    health app and do not have sufficient data for a specific age group or BMI, then
    there is a high chance of bias in the data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: (iv) On-time data availability
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Another aspect to verify is data timeliness. Right and relevant data must be
    available for the models to function well. Some models may need real-time data,
    a few require near real-time, and for some, batch is enough. Whatever your requirements
    are, a system to monitor whether the latest required data is available is needed.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, if category managers refresh the pricing of products every midnight
    based on market dynamics, then your model must have data last refreshed after
    midnight. You can have systems in place to alert whenever data is stale , or you
    can build proactive alerting around the data orchestration layer, monitoring the
    ETL pipelines for timeliness.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: (v) Data integrity
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Maintaining integrity is also crucial for model accuracy. Data integrity refers
    to the accuracy, completeness, and reliability of data. Any old, irrelevant, and
    incorrect data in the system will make the output go haywire. For instance, if
    you are building a customer-facing chatbot, then it must have access to only the
    latest company policy files. Having access to incorrect documents may result in
    hallucinations where the model merges terms from multiple files and gives a completely
    inaccurate answer to the customer. And you will still be held legally liable for
    it. Like how [Air Canada had to refund flight charges](https://www.bbc.com/travel/article/20240222-air-canada-chatbot-misinformation-what-travellers-should-know)
    for customers when its chatbot wrongly promised a refund.
  prefs: []
  type: TYPE_NORMAL
- en: There are no straightforward methods to verify integrity. It requires data analysts
    and engineers to get their hands dirty, verify the files/data, and ensure that
    only the latest/relevant data is sent to the model layer. Maintaining data integrity
    is also the best way to control hallucinations, so the model doesn’t do any garbage
    in, garbage out.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Model layer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After the data layer, the following checkpoints can be built into the model
    layer:'
  prefs: []
  type: TYPE_NORMAL
- en: (i) User permissions based on role
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Safeguarding the AI Model layer is important to prevent any unauthorized changes
    that may introduce bugs or bias in the systems. It is also required to prevent
    any data leakages. You must control who has access to this layer. A standardized
    approach for it is introducing role-based access control, where employees in only
    authorized roles, such as machine learning engineers, data scientists, or data
    engineers, can access the model layer.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, DevOps engineers can have read-only access as they are not supposed
    to change model logic. ML engineers can have read-write permissions. Establishing
    RBAC is an important security practice for maintaining model integrity.
  prefs: []
  type: TYPE_NORMAL
- en: (ii) Bias audits
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Bias handling remains a continuous process. It can creep in later in the system,
    even if you did all the necessary checks in the input layer. In fact, some biases,
    particularly confirmation bias, tend to develop at the model layer. It is a bias
    that happens when a model has fully overfitted into the data, leaving no room
    for nuances. In case of any overfitting, a model requires a slight calibration.
    Spline calibration is a popular method to calibrate models. It makes slight adjustments
    to the data to ensure all dots are connected.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: (iii) LLM as a judge
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: LLM (Large Language Model) as a Judge is an interesting approach to validating
    models, where one LLM is used to judge the output of another LLM. It replaces
    manual intervention and supports implementing response validation at scale.
  prefs: []
  type: TYPE_NORMAL
- en: To implement LLM as a judge, you need to build a prompt that will evaluate the
    output. The prompt result must be measurable criteria, such as a score or rank.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This prompt output can be used to trigger the monitoring framework whenever
    outputs are unexpected.
  prefs: []
  type: TYPE_NORMAL
- en: '**Tip**: The best part of recent technological advancements is that you don’t
    even have to build an LLM from scratch. There are plug-and-play solutions available,
    like Meta Lama, which you can download and run on-premises.'
  prefs: []
  type: TYPE_NORMAL
- en: (iv) Continuous fine-tuning
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For the long-term success of any model, continuous fine-tuning is essential.
    It’s where the model is regularly refined for accuracy. A simple way to achieve
    this is by introducing Reinforcement Learning with Human Feedback, where human
    reviewers rate the model’s output, and the model learns from it. But this process
    is resource-intensive. To do it at scale, you need automation.
  prefs: []
  type: TYPE_NORMAL
- en: A common fine-tuning method is Low-Rank Adaptation (LoRA). In this technique,
    you create a separate trainable layer that has logic for optimization. You can
    increase output accuracy without modifying the base model. For example, you are
    building a recommendation system for a streaming platform, and the current recommendations
    are not resulting in clicks. In the LoRA layer, you build a separate logic where
    you group clusters of viewers with similar viewing habits and use the cluster
    data to make recommendations. This layer can be used to make recommendations till
    it helps to achieve the desired accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Output layer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'These are some final checks done at the output layer for safety:'
  prefs: []
  type: TYPE_NORMAL
- en: (i) Content filtering for language, profanity, keyword blocking
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Similar to the input layer, filtering is also performed at the output layer
    to detect any offensive language. This double-checking assures there’s no bad
    end-user experience.
  prefs: []
  type: TYPE_NORMAL
- en: (ii) Response validation
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Some basic checks on model responses can also be done by creating a simple rule-based
    framework. These checks could include simple ones, such as verifying output format,
    acceptable values, and more. It can be done easily in both Python and SQL.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: (iii) Confidence threshold and human-in-loop triggers
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: No AI model is perfect, and that’s okay as long as you can involve a human wherever
    required. There are AI tools available where you can hardcode when to use AI and
    when to initiate a human-in-the-loop trigger. It’s also possible to automate this
    action by introducing a confidence threshold. Whenever the model shows low confidence
    in the output, reroute the request to a human for an accurate answer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: (iv) Continuous monitoring and alerting
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Like any software application, AI models also need a logging and alerting framework
    that can detect the expected (and unexpected) errors. With this guardrail, you
    have a detailed log file for every action and also an automated alert when things
    go wrong.
  prefs: []
  type: TYPE_NORMAL
- en: (v) Regulatory compliance
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A lot of compliance handling happens way before the output layer. Legally acceptable
    use cases are finalized in the initial requirement gathering phase itself. Any
    sensitive data is hashed in the input layer. Beyond this, if there are any regulatory
    requirements, such as encryption of any data, that can be done in the output layer
    with a simple rule-based framework.
  prefs: []
  type: TYPE_NORMAL
- en: Balance AI with human expertise
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Guardrails help you make the best of AI automation while still retaining some
    control over the process. I’ve covered all the common types of guardrails you
    may have to set at different levels of a model.
  prefs: []
  type: TYPE_NORMAL
- en: 'Beyond this, if you encounter any factor that could impact the model’s expected
    output, then you can also set a guardrail for that. This article is not a fixed
    formula, but a guide to identify (and fix) the common roadblocks. At the end,
    your AI application must do what it’s meant for: automate the busy work without
    any headache. And guardrails help to achieve that.'
  prefs: []
  type: TYPE_NORMAL
