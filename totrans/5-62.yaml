- en: How to Build a Knowledge Graph in Minutes (And Make It Enterprise-Ready)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/enterprise-ready-knowledge-graphs-96028d863e8c/](https://towardsdatascience.com/enterprise-ready-knowledge-graphs-96028d863e8c/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by detait on Unsplash](../Images/8903bdb9f41bdaf228ae52490ae133f6.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
- en: Photo by [detait](https://unsplash.com/@detait?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: At first, knowledge graphs (KGs) sounded daunting—not the concept, but the process
    of constructing one.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: I’ve tried constructing a knowledge graph before and failed.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Graphs are undoubtedly one of the best ways to represent complex relationships.
    They have many uses, such as recommendation systems and fraud detection. However,
    the one that caught my interest the most was information retrieval.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: I started using knowledge graphs to build better RAGs.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: RAGs don’t necessarily demand knowledge graphs. They don’t demand a database
    at all. As long as you can extract relevant information from a large pool and
    pass it to the context of an LLM, RAGs work.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: You could build a RAG with a web search as its information retrieval strategy
    or use a vector store to benefit from its semantic text search features.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: If you use a graph database to retrieve contextual information, we call it GraphRAG.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '*This isn’t a post about GraphRAGs (Perhaps in a future post). This is about
    the construction of knowledge graphs itself using LLMs.* But it’s worth mentioning
    how KG as a content store improves RAGs. So here it is.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Why Knowledge Graphs for RAG?
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Knowledge graphs offer clever techniques for retrieving more relevant information.
    Vector stores, although they usually serve their purpose, sometimes fall short.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: The primary retrieval technique from vector stores is the semantic similarity
    of encoded text. Here’s how it works.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: We use a vector embedding model, such as [OpenAI’s text-embedding-3](https://platform.openai.com/docs/guides/embeddings),
    to create a vector representation of the text. This makes Apple and Appam (an
    Indian food) very different in their vector representation, even though they share
    many standard letters. These vectors are then stored in a vector database like
    [Chroma](https://www.trychroma.com/).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: During the retrieval phase, we encode the user input using the same embedding
    model we used. We can then retrieve information from the vector store using distance
    matrices, such as cosine similarity.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: This approach is the only way we retrieve information from vector stores. As
    you may have already guessed, the embedding model we use plays a key role in the
    accuracy of the retrieval process. The type of database is rarely an issue as
    far as the accuracy is concerned (, but there are issues like concurrency, speed,
    etc.)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '**Here’s an example:**'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Imagine you’ve got a massive document about the leadership team of various companies.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: A vector embedding system effectively handles simple factual questions like
    "*What organization does Mr. John Doe serve as CEO?*" because the answer is directly
    represented in embedded document chunks.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: However, broader or analytical queries, such as "*Who sits on more than one
    board with Mr. John Doe as a director?*" are challenging.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Vector similarity searches rely on explicit mentions in the knowledge base.
    Knowledge graphs allow reasoning at a global dataset level.
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Nearest neighbor searches rely on explicit mentions in the knowledge base. Without
    such summaries, embedding-based systems struggle to reason across multiple sources
    or synthesize information.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Knowledge graphs allow reasoning at a global dataset level. They could have
    country nodes and strategy nodes clustered closer. And we can run a simple query
    to get the information we want.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Now that we understand why knowledge graphs are important let’s talk about the
    challenges of constructing one.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: Constructing knowledge graphs was too tricky (In the past.)
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A coworker introduced me to knowledge graphs a few years ago. He wants to create
    a unified, searchable KG for all our projects.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: After a weekend learning [Neo4J](https://neo4j.com/), it looked more promising.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: The missing piece was extracting nodes and edges (entities and relationships)
    from an extensive collection of PDFs, PowerPoint slides, and Word documents.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: The answer wasn’t fruitful because we could only manually transfer the unstructured
    documents to the graph data model.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: We could use PyPDF2 to read the PDFs and perform a keyword search for known
    nodes and edges. However, this method wasn’t very successful, so we had to abandon
    the idea and mark it as NOT WORTH THE EFFORT.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: This has changed as LLMs have become part of our day-to-day lives.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we’ll build a small (perhaps the simplest possible) knowledge
    graph with the help of LLM.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Building a knowledge graph in minutes
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Unlike the old days, extracting information from text and images isn’t that
    challenging.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: I agree that handling unstructured data needs improvement. However, developments
    in the past few years, primarily using LLMs, have opened new possibilities.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: This section will examine a knowledge graph construction process using LLMs
    and discuss how to improve it and make it enterprise-ready.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: For this, we will use an experimental feature from Langchain called [LLMGraphTransformer](https://python.langchain.com/docs/tutorials/graph/).
    We also use [Neo4J Auro](https://neo4j.com/product/auradb/), a cloud-hosted solution,
    as the graph data store.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: If you’re using LlamaIndex, check out [KnowledgeGraphIndex](https://docs.llamaindex.ai/en/stable/examples/index_structs/knowledge_graph/KnowledgeGraphDemo/),
    an API similar to what we will use here. You can also use various other graph
    databases instead of Neo4J.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by installing the required packages.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In this example, we will map a list of business leaders, the organizations they
    are affiliated with, etc., to a graph database. If you’d like to follow along,
    find the sample data I used [here](https://raw.githubusercontent.com/thuwarakeshm/knowledge-graph-example/refs/heads/main/sample.txt).
    It’s a dummy dataset I created (Of course, using AI.)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: 'The surprisingly simple code that creates knowledge graphs from unstructured
    documents is as follows:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The code above is very straightforward.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve highlighted the most crucial part of the code: constructing the graph
    database. The LLMGraphTransformer class uses the LLM we pass to it and extracts
    graphs from documents.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: You can now pass in any Langchain Document type to the `convert_to_graph_documents`
    method to extract a knowledge graph. The source file can be a text, a markdown,
    a webpage, a response from another database query, etc.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '*If this had been a manual task, it would have taken months, as it was just
    a few years ago.*'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'You can visit the Aura db console to visualize the graph. It may look something
    like the below:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '![Graph generated on Neo4J Aura cloud by LLMGraphTransformer module - Screenshot
    by the author.](../Images/7e787c0c0b02245d8f9c616a68945cbd.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
- en: Graph generated on Neo4J Aura cloud by LLMGraphTransformer module – Screenshot
    by the author.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Under the hood, the API uses an LLM to extract relevant information and constructs
    [Neo4J Python objects](https://neo4j.com/docs/python-manual/current/) for nodes
    and edges.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: As we now know, the construction of knowledge graphs is effortless with the
    extractor API; let’s discuss what we can do to make it usable for enterprise-grade
    applications.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: How to make knowledge graphs enterprise-ready
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We dropped the idea of constructing a knowledge graph because it was too complex.
    Indeed, we can now construct KGs faster with significantly less effort. However,
    the one we just created isn’t ready for reliable applications.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: I’ve identified a few flaws, which I also worked around. Two of them are worth
    discussing here.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '**1\. Get more control over the graph extraction process**'
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you’re following the example, you’d have noticed that the graph generated
    has only Person and Organization type nodes. Essentially, the extraction worked
    only for the people and the company they’ve been serving as directors.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '*Note: Using LLM to extract graphs is a probabilistic technique. Your outcome
    may not be the same as mine.*'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: However, we can extract more information from the text file. For instance, we
    can determine which universities each executive attended and their prior experiences.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Could we specify the types of entities and relationships we need to extract?
    Fortunately, the LLMGraphTransformer class supports this.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an alternative way to initiate the instance:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: In the above version, we’ve explicitly told the transformer to look for Person,
    Company, and University type entities. And we’ve also educated the process on
    the relationships we can have between the entities. This is a vital piece of information
    for the LLM to extract entities.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: Note that the third argument `node_properties` helps the transformer gather
    all the properties of the entities that aren’t in a relationship with one another.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: The knowledge graphs extracted by explicitly specifying the nodes and relationships
    are often more complete and accurate. But we can guarantee that all the key pieces
    of information are extracted well. For this, the following technique might help.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Propositioning before graph conversion
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Text is a wired data form. And the brains that write these texts are even weirder.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes, we don’t talk about everything straightforward. Even in formal and
    technical writing, we speak of the same thing in different places. Notice that
    in this post, I’ve used the words "Knowledge Graph" and "KG" in several places.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: This makes LLMs interpret the context difficult.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: Under the hood, the graph transformer still chunks the text and works independently
    within each chunk. Therefore, references to other chunks don’t count.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: For example, at the beginning of the text, you mentioned someone’s position
    as Chief Investment Officer (CIO); however, during text splitting, the definition
    is lost in subsequent chunks. In the latter chunk, the LLM has no idea if the
    I in CIO stands for investment, information, or something else.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: To tackle this, we use propositioning. Before chunking or processing any other
    text data, we proposition it so that every chunk is interpretable correctly.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: I’ve spoken about propositioning a few times in some of my articles.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: '[**How to Achieve Near Human-Level Performance in Chunking for RAGs**](https://towardsdatascience.com/agentic-chunking-for-rags-091beccd94b1)'
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Nonetheless, here’s how to do it.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This code uses a [prompt from Langchain’s prompt hub](https://smith.langchain.com/hub/wfh/proposal-indexing?organizationId=65e2223e-316a-5256-b012-5033801a97fa).
    As you can see in the results, each chunk is self-explanable, even without any
    reference to the other chunks.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: Doing this before creating a graph helps the LLM avoid losing nodes or relationships
    due to lost references.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Final thought
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ve tried constructing a knowledge graph before and failed. The benefits of
    having one for an organization were far less than the effort required. But this
    was before LLMs were on the scene.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: I was impressed when I learned that LLMs can extract graph information from
    plain text and put it in a database like Neo4J. But the experimental features
    aren’t perfect.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: I don’t think they are production-ready – Not without some additional tweaks.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I listed two techniques that helped me improve the quality
    of the knowledge graph I constructed.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
