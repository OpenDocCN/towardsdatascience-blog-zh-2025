- en: 'Author bio:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Dr. Jure Leskovec is the Chief Scientist and Co-Founder of Kumo, a leading predictive
    AI company. He is a Computer Science professor at Stanford, where he has been
    teaching for more than 15 years. Jure co-created Graph Neural Networks and has
    dedicated his career to advancing how AI learns from connected information. He
    previously served as Chief Scientist at Pinterest and conducted award-winning
    research at Yahoo and Microsoft.
  prefs: []
  type: TYPE_NORMAL
