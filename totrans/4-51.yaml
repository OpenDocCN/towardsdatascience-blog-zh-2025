- en: On a Time Crunch but Still Want to Learn to Develop Multi-Agent AI?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/learn-to-build-agentic-ai-systems-9e552d841525/](https://towardsdatascience.com/learn-to-build-agentic-ai-systems-9e552d841525/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Photo By: Kaboompics.com from Pexels.](../Images/cea7d1faf3a16b320f9dc8cab8373d64.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Photo by Photo By: [Kaboompics.com](https://www.pexels.com/photo/young-woman-with-laptop-sitting-on-yoga-mat-4498457/)
    from [Pexels](https://www.pexels.com/photo/young-woman-with-laptop-sitting-on-yoga-mat-4498457/).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Talk of the town: AI agents will replace SAAS.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This wasn’t a random statement made by any drug dealer. It was [Satya Nadella,
    the CEO of Microsoft, saying this](https://economictimes.indiatimes.com/tech/artificial-intelligence/ai-agents-will-revolutionise-saas-and-productivity-microsoft-ceo-satya-nadella/articleshow/117026938.cms?from=mdr).
  prefs: []
  type: TYPE_NORMAL
- en: If you’re a developer or anyone in tech, you’d want to know how to build AI
    agents yourself. But not many of us can afford the time to learn them from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: I’m writing this for you if you find yourself in this group.
  prefs: []
  type: TYPE_NORMAL
- en: This is also how I learned to develop AI apps – but more informally. Therefore,
    I wanted to organize it in a post so that you can follow along nicely and use
    your weekend to learn the basics of developing AI-powered apps.
  prefs: []
  type: TYPE_NORMAL
- en: I started this post with a reference to AI agents. I will get to that.
  prefs: []
  type: TYPE_NORMAL
- en: But before that, we should get our feet wet on LLMs. Don’t worry—this isn’t
    a very theoretical post. We will first build an app that uses LLM only. Then,
    we will build a retrieval-augmented app (RAG). Lastly, we will build a real agentic
    app.
  prefs: []
  type: TYPE_NORMAL
- en: You may have some knowledge of Gen AI tools. So feel free to skip to your desired
    project.
  prefs: []
  type: TYPE_NORMAL
- en: '[**The Most Valuable LLM Dev Skill is Easy to Learn, But Costly to Practice.**](https://towardsdatascience.com/llm-evaluation-techniques-and-costs-3147840afc53)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What you need …
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As I mentioned, this won’t take over a weekend to finish. But besides time,
    you need a few other things.
  prefs: []
  type: TYPE_NORMAL
- en: First, I assume you’re good at programming (Python) and have experience developing
    something. (Your pet projects and homework count in, too)
  prefs: []
  type: TYPE_NORMAL
- en: We will be using Python frameworks like [Streamlit](https://streamlit.io/),
    [Lanchain](https://www.langchain.com/), and [Phidata](https://docs.phidata.com/introduction#what-is-phidata).
  prefs: []
  type: TYPE_NORMAL
- en: You need an active internet connection because we’ll use OpenAI models through
    their APIs. Oh, this also means you need an active [OpenAI API key](https://platform.openai.com/).
  prefs: []
  type: TYPE_NORMAL
- en: Your PC should be compatible with and capable of running vector stores like
    Chroma. Most consumer-grade laptops can run them without issue.
  prefs: []
  type: TYPE_NORMAL
- en: You can begin by installing the required libraries using the following command.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Also, create a `.env` file in your working directory and update it with your
    OpenAI API key.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Ensure you always start your Python scripts by reading the `.env` file with
    Python-dotenv.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: You’re all set to start building.
  prefs: []
  type: TYPE_NORMAL
- en: 1 Research paper summarizer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is the easiest yet the most enjoyable tool I created to learn LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t use this app directly, but it gave me a solid understanding of LLMs,
    prompts, and the Langchain ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: This app summarizes a research paper into a few easily digestible lines.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: This is a super simple application. However, it teaches us much about the LangChain
    ecosystem and how to use it to build LLM-powered apps.
  prefs: []
  type: TYPE_NORMAL
- en: In this app, we read the content of a web page (a research paper about G-Eval,
    to be precise) and summarize it with the help of GPT-4o-mini. For this model to
    work, we should have set the OpenAI API key as an environment variable, which
    we’ve done in the last section.
  prefs: []
  type: TYPE_NORMAL
- en: We should pay attention to the prompt template and the chain. A prompt template
    is a prompt with a placeholder for any variables we insert dynamically. Anything
    inside curly braces would be treated as variable names. We must set this at the
    runtime to create a prompt from this prompt template.
  prefs: []
  type: TYPE_NORMAL
- en: In our case, we’ve named the variable as `{context}`.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we create something called a chain. The chain is like a function that
    glues in various components of an execution pipeline. The input variable (`context`),
    the prompt, the llm, and much more to come later. We can now call (or, more correctly,
    invoke) the chain with the input variables.
  prefs: []
  type: TYPE_NORMAL
- en: I. Answering questions (not just summarize)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The last example used only a single input variable. However, let’s modify the
    prompt template to accept two variables.
  prefs: []
  type: TYPE_NORMAL
- en: This time, we pass in the context and a question. So the user can not only summarize
    the context, they can ask any random question about the context.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at an example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: In the new version, the prompt is simplified to answer whatever the user `question`
    based on the `context`. Note that the invoke method now has both the input variables
    passed as a dictionary.
  prefs: []
  type: TYPE_NORMAL
- en: II. Complex chains
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you look carefully, the output of the invoke method is an object. What if
    we want a nice text-only output that the rest of our app can use?
  prefs: []
  type: TYPE_NORMAL
- en: In the following example, I’ve shown how to format the output with Langchain’s
    built-in output parser. I’ve also run an additional lambda function to show that
    we can run any function in a chain.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This chain isn’t complex yet. But hold on.
  prefs: []
  type: TYPE_NORMAL
- en: 2 Q&A App against private data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The previous app was helpful, but only to a certain extent.
  prefs: []
  type: TYPE_NORMAL
- en: The app’s main limitation is the size of the input. It was only a single web
    page, not a collection of the Harry Potter series.
  prefs: []
  type: TYPE_NORMAL
- en: The latest models support large context windows. For instance, [Google’s Gemini
    1.5 can handle up to 1 million tokens](https://blog.google/technology/ai/google-gemini-next-generation-model-february-2024/#sundar-note).
    In the English language, this translates to roughly 750,000 words.
  prefs: []
  type: TYPE_NORMAL
- en: That’s enough to have an academic textbook comfortably. But here are a few other
    problems to consider.
  prefs: []
  type: TYPE_NORMAL
- en: With a larger context, LLM tends to lose focus. With too much **noise in the
    context**, it’s hard for the LLM to find answers to our specific questions—the
    result – often hallucinated.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You pay for input tokens as well. LLM API providers like OpenAI **charge for
    input and output tokens**. With a larger context, you necessarily pay for these
    providers. Not to mention the **cost of internet bandwidth.**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A larger context means a **slower response**. This isn’t rocket science; you
    give too much information for other LLM to traverse through, you should expect
    a slower response. If you use an API provider, your response will be further delayed
    due to internet traffic.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Providing the LLM with only the relevant information would be wise for these
    reasons. For instance, if the user asks a question about lightning, instead of
    passing an entire physics textbook as context, filter the sections that mention
    lightning (or related terms) and provide only these.
  prefs: []
  type: TYPE_NORMAL
- en: This approach is known as retrieval augmented generation, or **RAG** for short.
  prefs: []
  type: TYPE_NORMAL
- en: '[**How to Build Helpful RAGs with Query Routing.**](https://towardsdatascience.com/rags-with-query-routing-5552e4e41c54)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most RAG apps follow the following approach.
  prefs: []
  type: TYPE_NORMAL
- en: Your data is chunked into smaller segments to limit as much as one idea per
    chunk.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Each chunk is converted to a vector embedding and stored in a vector store,
    like Chroma.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The user’s question is also converted to a vector embedding during retrieval.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The vector store will compute the similarity between the question’s vector version
    and the existing vectors of the chunks in the database.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The top n chunks with the highest similarity will be the `context` to answer
    your `question` in the RAG chain.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Here’s how this all happens in code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: In the above example, we index a web page (One of Django’s official documentation
    pages) in a Chroma DB.
  prefs: []
  type: TYPE_NORMAL
- en: 'Please pay attention to step #2, where we chunk and index the web page and
    store it in a Chroma DB. To chunk the text content of the web page, we’ve used
    the recursive character splitting technique, one of many ways we can create chunks.'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Advanced Recursive and Follow-Up Retrieval Techniques For Better RAGs**](https://towardsdatascience.com/advanced-retrieval-techniques-for-better-rags-c53e1b03c183)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We then use OpenAI embeddings to convert the chunks to their vector representation
    and store them in Chroma DB. One important thing to note is that we need to use
    the same embedding model when we create vector versions of the questions for which
    we retrieve them. Fortunately, Langchain has taken care of this.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now note step #4, where we create the RAG chain. This may look similar to our
    last app, with two notable differences. In place of context, we now pass in the
    retriever. Retriever is the vector store that is ready to fetch information for
    you. Next, instead of a question, we have a RunnablePassthrough object. This allows
    us to call the chain with the question as its only parameter. We no longer need
    to pass a dictionary.'
  prefs: []
  type: TYPE_NORMAL
- en: '[**5 Proven Query Translation Techniques To Boost Your RAG Performance**](https://towardsdatascience.com/5-proven-query-translation-techniques-to-boost-your-rag-performance-47db12efe971)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Isn’t this easy?
  prefs: []
  type: TYPE_NORMAL
- en: But under the hood, every time you ask a question (every time you invoke the
    chain), the chain converts the question to a vector, retrieves similar chunks
    from the vector store, passes it as context to our LLM, and generates an answer
    to our question.
  prefs: []
  type: TYPE_NORMAL
- en: Congratulations on building your first RAG app. We’re now ready to take on AI
    agents.
  prefs: []
  type: TYPE_NORMAL
- en: '**#3 Get things done with AI Agents**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The term’ AI agents’ may confuse or even intimidate you, but it’s a simple concept.
  prefs: []
  type: TYPE_NORMAL
- en: Think of an agent as a worker to whom you assign a task. The worker then has
    to use the tools to finish the task.
  prefs: []
  type: TYPE_NORMAL
- en: This sounds like a traditional software program. Indeed it is. However, unlike
    software with instructions to be executed in a specific order, an agent will figure
    out which tools to use and in what order.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s an agent in action.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: And here’s its output.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by the author.](../Images/714e8b76ecad660d27b71ce3cc86ed70.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: This entire report took only 26 seconds to finish. This may sound like a bit
    high. But here’s the point.
  prefs: []
  type: TYPE_NORMAL
- en: How long would it take for you to do it manually? Even if you can write a code
    to do that, how long would it have taken for you to finish writing that Python
    script?
  prefs: []
  type: TYPE_NORMAL
- en: This code is only a few lines long. But it can do countless things with a single
    tool, YFinanceTool, that fetches stock-related information. Note that we haven’t
    told the LLM what companies to look for. The LLM has figured it out on its own.
  prefs: []
  type: TYPE_NORMAL
- en: I Agents with many tools
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Agents can use multiple tools, too. Here’s an example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: In this, we ask the agent to read a link and find the latest news about the
    companies mentioned in the link. The link is to a list of Gen-AI companies funded
    by Y-combinator.
  prefs: []
  type: TYPE_NORMAL
- en: We expect the first tool, Newspaper4k, to read through the article and then
    the second tool, DuckDuckGo, to find related news for each startup mentioned in
    the link.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the output:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/98f0420d592f64ca83dcbfc155c0a542.png)'
  prefs: []
  type: TYPE_IMG
- en: This task isn’t easy to perform manually or even code, but our agent completed
    it quickly.
  prefs: []
  type: TYPE_NORMAL
- en: II Multi-agent architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sometimes, it’s best to have specialized agents work together to finish our
    task.
  prefs: []
  type: TYPE_NORMAL
- en: Rather than giving a single person all your tools and asking them to perform
    a complex task, you’d better give it to a few more specialized people. Each of
    your team members will have a specialized way to finish a subtask with the tools
    at their disposal. There’ll be a leader who coordinates things between the other
    members.
  prefs: []
  type: TYPE_NORMAL
- en: That sounds wild.
  prefs: []
  type: TYPE_NORMAL
- en: This is what multi-agent systems are. And we’re going to build one.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The above code has two agents. The first one specializes in searching the Internet
    for news. It programmatically searches using a tool called Tavily. The second
    one fetches financial information from Yahoo Finance.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve got a third agent, too.
  prefs: []
  type: TYPE_NORMAL
- en: This one has one responsibility – coordinating the two agents to complete the
    task it’s asked for.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s what the output looks like when we ask the team of agents to "Find the
    most recent tech news, then fetch and summarize the latest stock details of the
    companies mentioned in the news."
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot by the author.](../Images/29e8af48a0f0c82f1d90bf76c5ffc93d.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by the author.
  prefs: []
  type: TYPE_NORMAL
- en: The research agent has searched credible sources like Forbes and MSN to find
    the latest tech news. It then used the YFinanceTool to fetch the recent stock
    information. It then nicely presented a report with the summaries.
  prefs: []
  type: TYPE_NORMAL
- en: Final thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Multi-agent architecture has lots of potential to automate a number of our tedious
    tasks. They could coordinate between agents in ways that aren’t possible with
    deterministic coding.
  prefs: []
  type: TYPE_NORMAL
- en: Tools like Langchain help anyone with some knowledge of Python develop intelligent
    apps powered by LLMs. Likewise, tools like Phidata and Crew AI can also help you
    build agents and teams of agents.
  prefs: []
  type: TYPE_NORMAL
- en: The time it takes to start these isn’t too crazy, either. Perhaps you need only
    a weekend and a few cups of coffee.
  prefs: []
  type: TYPE_NORMAL
