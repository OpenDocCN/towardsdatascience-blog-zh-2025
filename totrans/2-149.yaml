- en: Topic Model Labelling with LLMs
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/topic-model-labelling-with-llms/](https://towardsdatascience.com/topic-model-labelling-with-llms/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**By**: *Petr Koráb**, *Martin Feldkircher**, *** Viktoriya Teliha*** (*Text
    Mining Stories, Prague, **Vienna School of International Studies, ***Centre for
    Applied Macroeconomic Analysis, Australia).'
  prefs: []
  type: TYPE_NORMAL
- en: '**<mdspan datatext="el1752002640909" class="mdspan-comment">Manual labeling</mdspan>**
    of terms produced by topic models requires domain experience and may be subjective
    to the labeler. Especially when the number of topics grows large, it might be
    convenient to assign human-readable names to topics automatically with an LLM.
    Simply copying and pasting the results into UIs, such as [chatgpt.com,](https://chatgpt.com)
    is quite a “black-box” and unsystematic. A better choice would be to add topic
    labeling to the code with a documented labeler, which gives the engineer more
    control over the results and ensures reproducibility. This tutorial will explore
    in detail:'
  prefs: []
  type: TYPE_NORMAL
- en: How to train a topic model with a fresh new **Turftopic** Python package
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to label topic model results with GPT-4.0 mini.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will train a cutting-edge **FASTopic** model by [Xiaobao Wu et al. [3](https://arxiv.org/pdf/2405.17978)]
    presented at last year’s [NeurIPS](https://neurips.cc/virtual/2024/poster/96416).
    This model [outperforms other competing models](https://medium.com/text-mining-stories/choose-the-right-one-evaluating-topic-models-for-business-intelligence-1e2f418d7573?sk=3bc07126cc44a1d254fb8a0967702957),
    such as **BERTopic**, in several key metrics (e.g., topic diversity) and has broad
    [applications in business intelligence.](https://medium.com/data-science/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37?sk=9a88660d4e4c64a1d91ad8ede730a520)
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Components of the Topic Modelling Pipeline
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Labelling is the essential part of the topic modelling pipeline because it bridges
    the model outputs with real-world decisions. The model assigns a number to each
    topic, but a business decision relies on the human-readable text label summarizing
    the typical terms in each topic. The models are typically labelled by (1) labellers
    with the domain experience, often using a well-defined labelling strategy, (2)
    LLMs, and (3) commercial tools. The path from raw data to decision-making through
    a topic model is nicely explained in Image 1.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8baaeb082b3ea1879e40186ee271aaa6.png)'
  prefs: []
  type: TYPE_IMG
- en: Image 1\. Components of the topic modeling pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: 'Source: adapted and extended from Kardos et al [2].'
  prefs: []
  type: TYPE_NORMAL
- en: The pipeline starts with raw data, which is preprocessed and vectorized for
    the topic model. The model returns topics named with integers, including typical
    terms (words or bigrams). The labeling layer replaces the integer in the topic
    name with the text label. The model user ([product manager](https://xenoss.io/blog/topic-modeling-for-business-introduction),
    [customer care](https://medium.com/text-mining-stories/choose-the-right-one-evaluating-topic-models-for-business-intelligence-1e2f418d7573?sk=3bc07126cc44a1d254fb8a0967702957)
    dept., etc.) then works with labelled terms to make data-informed decisions. In
    the following modeling example, we will follow it step by step.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We will use FASTopic to classify customer complaints data into 10 topics. The
    example use case uses a synthetically generated [Customer Care Email](https://www.kaggle.com/datasets/rtweera/customer-care-emails)
    dataset available on Kaggle, licensed under the [GPL-3 license](https://www.gnu.org/licenses/gpl-3.0.html).
    The prefiltered data covers 692 incoming emails to the customer care department
    and looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/00ed17719779c57e6ce2216dead7635d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image 2\. [Customer Care Email](https://www.kaggle.com/datasets/rtweera/customer-care-emails)
    dataset. Image by authors.
  prefs: []
  type: TYPE_NORMAL
- en: 2.1\. Data preprocessing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Text data is sequentially preprocessed in six steps. Numbers are removed first,
    followed by emojis. English stopwords are removed afterward, followed by punctuation.
    Additional tokens (such as company and person names) are removed in the next step
    before lemmatization. Read more on text preprocessing for topic models in our
    [previous tutorial](https://medium.com/data-science/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37?sk=9a88660d4e4c64a1d91ad8ede730a520).
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we read the clean data and tokenize the dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/0672dc18971b052a1372e2322f112509.png)'
  prefs: []
  type: TYPE_IMG
- en: Image 3\. Recommended cleaning pipeline for topic models. Image by authors.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2\. Bigram vectorization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we create a bigram tokenizer to process tokens as bigrams during the model
    training. Bigram models provide more relevant information and identify better
    key qualities and problems for business decisions than single-word models *(“delivery”
    vs. “poor delivery”, “stomach” vs. “sensitive stomach”, etc.)*.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 3\. Model training
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The FASTopic model is currently implemented in two Python packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Fastopic**](https://pypi.org/project/fastopic/): official package by X.
    Wu'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Turftopic**](https://pypi.org/project/turftopic/): new Python package that
    brings many helpful topic modeling features, including labeling with LLMs [2]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will use the Turftopic implementation because of the direct link between
    the model and the [Namer](https://x-tabdeveloping.github.io/turftopic/namers/)
    that offers LLM labelling.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s set up the model and fit it to the data. It is essential to set a random
    state to secure training reproducibility.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Now, let’s prepare a dataframe with topic IDs and the top 10 bigrams with the
    highest probability received from the model (code is [here](https://github.com/PetrKorab/Topic-Model-Labelling-with-LLMs/blob/main/code.ipynb)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/79e154e4b90bf874baa1edecde1e328d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image 4\. Unlabeled topics in FASTopic. Image by authors.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Topic labeling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In the next step, we add text labels to the topic IDs with GPT4-o-mini. Let’s
    follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Create an [𝐎𝐩𝐞𝐧 𝐀𝐈 𝐚𝐜𝐜𝐨𝐮𝐧𝐭](https://auth.openai.com/create-account) and choose
    a billing plan (e.g. “𝘗𝘢𝘺 𝘢𝘴 𝘺𝘰𝘶 𝘨𝘰”)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Set an environment variable with OpenAI API key
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use [Turftopic’s 𝐍𝐚𝐦𝐞𝐫](https://x-tabdeveloping.github.io/turftopic/namers)
    to label keywords in the topics with the LLM.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With this code, we label the topics and add a new row *topic_name* to the dataframe.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Here is the table with labeled topics after additional transformations. It would
    be interesting to compare the LLM results with those of a company insider who
    is familiar with the company’s processes and customer base. The dataset is synthetic,
    so let’s rely on the GPT-4 labeling.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cbdc2b78f175506745cb33f7495ad47d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image 5\. Labeled topics in FASTopic by GPT4–o-mini. Image by authors.
  prefs: []
  type: TYPE_NORMAL
- en: We can also visualize the labeled topics for a better presentation. The code
    for the bigram word cloud visualization, generated from the topics produced by
    the model, is [here](https://github.com/PetrKorab/Topic-Model-Labelling-with-LLMs).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/416bdfda6c89aa02e0b73a2747710007.png)'
  prefs: []
  type: TYPE_IMG
- en: Image 6\. Word cloud visualization of labeled topics by GPT4–o-mini. Image by
    authors.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The new Turftopic Python package links recent topic models with the [LLM-based
    labeler](https://x-tabdeveloping.github.io/turftopic/namers/) for generating human-readable
    topic names.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The main benefits are: 1) independence from the labeler’s subjective experience,
    2) capacity to label models with a large number of topics that a human labeler
    might have difficulty labeling independently, and 3) more control of the code
    and reproducibility.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Topic labeling with LLMs has a wide range of applications in diverse areas.
    Read [our latest paper](https://crawford.anu.edu.au/sites/default/files/2025-06/35_2025_Feldkircher_Korab_Teliha_1.pdf) on
    the topic modeling of central bank communication, where GPT-4 labeled the FASTopic
    model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The labels are slightly different for each training, even with the random state.
    It is not caused by the Namer, but by the random processes in model training that
    output bigrams with probabilities in descending order. The differences in probabilities
    are in tiny decimals, so each training generates a few new terms in the top 10,
    which then impacts the LLM labeler.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The data and complete code for this tutorial are [here.](https://github.com/PetrKorab/Topic-Model-Labelling-with-LLMs)
  prefs: []
  type: TYPE_NORMAL
