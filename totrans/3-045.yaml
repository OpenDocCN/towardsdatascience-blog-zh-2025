- en: 'Reducing Time to Value for Data Science Projects: Part 1'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-1/](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-1/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1746054981697" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The experimentation and development phase of a data science project is where
    data scientists are meant to shine. Trying out different data treatments, feature
    combinations, model choices etc. all factor into arriving at a final setup that
    will form the proposed solution to your business needs. The technical capability
    required to carry out these experiments and critically evaluate them are what
    data scientists were trained for. The business relies on data scientists to deliver
    solutions ready to be productionised as quickly as possible; the time taken for
    this is known as time to value.
  prefs: []
  type: TYPE_NORMAL
- en: 'Despite all this I have found from personal experience that the experimentation
    phase can become a large time sink, and can threaten to completely derail a project
    before its barely begun. The over-reliance on Jupyter Notebooks, experiment parallelization
    by manual effort, and poor implementation of software best practises: these are
    just a few reasons why experimentation and the iteration of ideas end up taking
    significantly longer than they should, hampering the time taken to begin delivering
    value to a business.'
  prefs: []
  type: TYPE_NORMAL
- en: This article begins a series where I want to introduce some principles that
    have helped me to be more structured and focussed in my approach to running experiments.
    The result of this have allowed me to streamline my ability to execute large-scale
    parallel experimentation, freeing up my time to focus on other areas such as liaising
    with stakeholders, working with data engineering to source new data feeds or working
    on the next steps for productionisation. This has allowed me to reduce the time
    to value of my projects, ensuring I deliver to the business as quickly as possible.
  prefs: []
  type: TYPE_NORMAL
- en: We Need To Talk About Notebooks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Jupyter Notebooks, love them or hate them, are firmly entrenched in the mindset
    of every data scientist. Their ability to interactively run code, create visualisations
    and intersperse code with Markdown make them an invaluable resource. When moving
    onto a new project or faced with a new dataset, the first steps are almost always
    to spin up a notebook, load in the data and start exploring.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8cbb0163232ec9e71547b5e7bc37dd84.png)'
  prefs: []
  type: TYPE_IMG
- en: Using a notebook in a clean and clear manner. Image created by author.
  prefs: []
  type: TYPE_NORMAL
- en: While bringing great value, I see notebooks misused and mistreated, forced to
    perform actions they are not suited to doing. Out of sync codeblock executions,
    functions defined within blocks and credentials / API keys hardcoded as variables
    are just some of the bad behaviours that using a notebook can amplify.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7226ef26b409efc0d8e9bb21b3e1171f.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of bad notebook habits. Image created by author.
  prefs: []
  type: TYPE_NORMAL
- en: In particular, leaving functions defined within notebooks come with a host of
    problems. They cannot be tested easily to ensure correctness and that best practises
    have been applied. They also can only be used within the notebook itself and so
    there is a lack of cross-functionality. Breaking free of this coding silo is critical
    in running experiments efficiently at scale.
  prefs: []
  type: TYPE_NORMAL
- en: Local vs Global Functionality
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Some data scientists are aware of these bad habits and instead employ better
    practises surrounding developing code, namely:'
  prefs: []
  type: TYPE_NORMAL
- en: Develop within a notebook
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Extract out functionality into a source directory
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Import function for use within the notebook
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This approach is a significant improvement compared to leaving them defined
    within a notebook, but there is still something lacking. Throughout your career
    you will work across multiple projects and write lots of code. You may want to
    re-use code you have written in a previous project; I find this is quite common
    place as there tends to be a lot of overlap between work.
  prefs: []
  type: TYPE_NORMAL
- en: The approach I see in sharing code functionality ends up being the scenario
    where it is copy+pasted wholesale from one repository to another. This creates
    a headache from a maintainability perspective, if issues are found in one copy
    of these functions then there is a significant effort required to find all other
    existing copies and ensure fixes are applied. This poses a secondary problem when
    your function is too specific for the job at hand, and so the copy+paste also
    requires small modifications to change its utility. This leads to multiple functions
    that share 90% identical code with only slight tweaks.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ff37fe09a4eb0e6c703359f884915e2f.png)'
  prefs: []
  type: TYPE_IMG
- en: Similar functions bloat your script for little gain. Image created by author.
  prefs: []
  type: TYPE_NORMAL
- en: This philosophy of creating code in the moment of requirement and then abstracting
    out into a local directory also creates a longevity problem. It becomes increasingly
    common for scripts to become bloated with functionality with little to no cohesion
    or relation to each other.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ee2bbda4659bbc65b3158f116ae7caf0.png)'
  prefs: []
  type: TYPE_IMG
- en: Storing all functionality into a single script is not sustainable. Image created
    by author.
  prefs: []
  type: TYPE_NORMAL
- en: Taking time to think about how and where code should be stored can lead to future
    success. Looking beyond your current project, start considering about what can
    be done with your code now to make it future-proof. To this end I suggest creating
    an external repository to host any code you develop with the aim of having deployable
    building blocks that can be chained together to efficiently answer business needs.
  prefs: []
  type: TYPE_NORMAL
- en: Focus On Building Components, Not Just Functionality
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'What do I mean by having building blocks? Consider for example the task of
    carrying out various data preparation techniques before feeding it into a model.
    You need to consider aspects like dealing with missing data, numerical scaling,
    categorical encoding, class balancing (if looking at classification) etc. If we
    focus in on dealing with missing data, we have multiple methods available for
    this:'
  prefs: []
  type: TYPE_NORMAL
- en: Remove records with missing data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Remove features with missing data (possibly above a certain threshold)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Simple imputation methods (e.g. zero, mean)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Advanced imputation methods (e.g. MICE)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you are running experiments and want to try out all these methods, how do
    you go about it? Manually editing codeblocks between experiments to switch out
    implementations is straightforward but becomes a management nightmare. How do
    you remember which code setup you had for each experiment if you are constantly
    overwriting? A better approach is to write conditional statements to easily switch
    between them. Having this defined within the notebook still bring issues around
    re-usability. The implementation I recommend is to abstract all this functionality
    into a wrapper function with an argument that lets you choose which treatment
    you want to carry out. In this scenario no code needs to be changed between experiments
    and your function is general and can applied elsewhere.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9f0f8c6d3c752fa710f49b52af0e5c18.png)'
  prefs: []
  type: TYPE_IMG
- en: Three methods of switching between different data treatments. Image created
    by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'This process of abstracting implementation details will help to streamline
    your data science workflow. Instead of rebuilding similar functionality or copy+pasting
    pre-existing code, having a code repository with generalised components allows
    it to be re-used trivially. This can be done for lots of different steps in your
    data transform process and then chained together to form a single cohesive functionality:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fe42911fdd0a3d5c010d32b52bc475b0.png)'
  prefs: []
  type: TYPE_IMG
- en: Different data transformations can be added to create a cohesive pipeline. Image
    created by author.
  prefs: []
  type: TYPE_NORMAL
- en: This can be extended for not just different data transformations, but for each
    step in the model creation process. The change in mindset from building functions
    to accomplish the task at hand vs designing a re-usable multi-purpose code asset
    is not an easy one. It requires more initial planning about implementation details
    and expected user interaction. It is not as immediately useful as having code
    accessible to you within your project. The benefit is that in this scenario you
    only need to write up the functionality once and then it is available across any
    project you may work on.
  prefs: []
  type: TYPE_NORMAL
- en: Design Considerations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When structuring this external code repository for use there are many design
    decisions to think about. The final configuration will reflect your needs and
    requirements, but some considerations are:'
  prefs: []
  type: TYPE_NORMAL
- en: Where will different components be stored in your repository?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How will functionality be stored within these components?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How will functionality be executed?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How will different functionality be configured when using the components?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This checklist is not meant to be exhaustive but serves as a starter for your
    journey in designing your repository.
  prefs: []
  type: TYPE_NORMAL
- en: 'One setup that has worked for me is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9fd2bc6feb7d02316134530e7c8a5607.png)'
  prefs: []
  type: TYPE_IMG
- en: Have a separate directory per component. Image created by author.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ddfc8933644920d17fdfb9fe3cf16f4d.png)'
  prefs: []
  type: TYPE_IMG
- en: Have a class that contains all the functionality a component needs. Image created
    by author.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e3cc694ddbbc0481f00bff305e9ced48.png)'
  prefs: []
  type: TYPE_IMG
- en: Have a single execution method that carries out the steps. Image created by
    author.
  prefs: []
  type: TYPE_NORMAL
- en: Note that choosing which functionality you want your class to carry out is controlled
    by a configuration file. This will be explored in a later article.
  prefs: []
  type: TYPE_NORMAL
- en: 'Accessing the methods from this repository is straightforward, you can:'
  prefs: []
  type: TYPE_NORMAL
- en: Clone the contents, either to a separate repository or as a sub-repository of
    your project
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn this centralised repository into an installable package
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/34ebda9c692e901b7727c53e758582cc.png)'
  prefs: []
  type: TYPE_IMG
- en: Easily import and call execution methods. Image created by author.
  prefs: []
  type: TYPE_NORMAL
- en: A Centralised, Neutral Repository Allows More Powerful Tools To Be Built Collaboratively
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Having a toolbox of common data science steps sounds like a good idea, but why
    the need for the separate repository? This has been partially answered above,
    where the idea of decoupling implementation details from business application
    encourages us to write more flexible code that can be redeployed in a variety
    of different scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: Where I see a real strength in this approach is when you don’t just consider
    yourself, but your teammates and colleagues within your organisation. Imagine
    the volume of code generated by all the data scientists at your company. How much
    of this do you think would be truly unique to their project? Certainly some of
    it of course, but not all of it. The volume of re-implemented code would go unnoticed,
    but it would quickly add up and become a silent drain on resources.
  prefs: []
  type: TYPE_NORMAL
- en: Now consider the alternative where a central location of common data scientist
    tools are located. Having functionality that covers steps like data quality, feature
    selection, hyperparameter tuning etc. immediately available to be used off the
    shelf will greatly speed up the rate at which experimentation can begin.
  prefs: []
  type: TYPE_NORMAL
- en: Using the same code opens up the opportunity to create more reliable and general
    purpose tools. More users increase the probability of any issues or bugs being
    detected and code being deployed across multiple projects will enforce it to be
    more generalised. A single repository only requires one suite of tests to be created,
    and care can be taken to ensure they are comprehensive with sufficient coverage.
  prefs: []
  type: TYPE_NORMAL
- en: As a user of such a tool, there may be cases where the functionality you require
    is not present in the codebase. Or alternatively you have a particular technique
    you like to use that is not implemented. While you could choose to not use this
    centralised code repository, why not contribute to it? Working together as a team
    or even as a whole company to actively contribute and build up a centralised repository
    opens up a whole host of possibilities. Leveraging the strength of each data scientist
    as they contribute the techniques they routinely use, we have an internal open-source
    scenario that fosters collaboration among colleagues with the end goal of speeding
    up the data science experimentation process.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This article has kicked off a series where I address common data science mistakes
    I have seen that greatly inhibit the project experimentation process. The consequence
    of this is that the time taken to deliver value is greatly increased, or in extreme
    cases no value is delivered as the project fails. Here I focussed on ways of writing
    and storing code that is modular and decoupled from a particular project. These
    components can be re-used across multiple projects allowing solutions to be developed
    faster and with greater confidence in the results. Developing such a code repository
    can be open sourced to all members of an organisation, allowing powerful, flexible
    and robust tools to be built.
  prefs: []
  type: TYPE_NORMAL
