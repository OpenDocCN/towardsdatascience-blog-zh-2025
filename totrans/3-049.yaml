- en: How to Level Up Your Technical Skills in This AI Era
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在这个AI时代提升你的技术技能
- en: 原文：[https://towardsdatascience.com/how-to-level-up-your-technical-skills-in-this-ai-era/](https://towardsdatascience.com/how-to-level-up-your-technical-skills-in-this-ai-era/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-level-up-your-technical-skills-in-this-ai-era/](https://towardsdatascience.com/how-to-level-up-your-technical-skills-in-this-ai-era/)
- en: <mdspan datatext="el1745953580269" class="mdspan-comment">AI-assisted</mdspan>
    coding is here to stay. Tools like Cursor, V0, and Lovable have dramatically lowered
    the barrier to entry — building dashboards, pipelines, or entire apps can now
    be done in a fraction of the time.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745953580269" class="mdspan-comment">AI辅助</mdspan>编码将长期存在。像Cursor、V0和Lovable这样的工具大大降低了入门门槛——现在构建仪表板、管道或整个应用程序只需原来的一小部分时间。
- en: 'I use these tools daily, and they’ve definitely made me faster. But as the
    codebase gets more complex, the tradeoffs become clear: cryptic bugs, tangled
    logic, and hours lost debugging code I didn’t truly understand.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我每天都在使用这些工具，它们确实让我变得更高效。但随着代码库变得更加复杂，权衡变得明显：难以理解的错误、混乱的逻辑，以及花费在调试我真正不理解代码上的时间。
- en: '***AI tools are great — especially for beginners — but they come with a quiet
    cost. The more you let AI carry the load, the fewer chances you have to sharpen
    your instincts that come from wrestling with complexity. ***'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***AI工具很棒——尤其是对于初学者来说——但它们也带来了一些隐形的代价。你让AI承担的越多，你就有越少的机遇来磨练那些来自与复杂性斗争的本能。***'
- en: ''
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***Yes, AI will speed up your workflow, but you’ll also skip the formative
    steps where technical wisdom is earned.***'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***是的，AI会加快你的工作流程，但你也会跳过那些获得技术智慧的形成性步骤。***'
- en: '“Vibe coding” — quickly cobbling together code with minimal planning — is great
    for demos or experiments. But for deeper technical growth or building systems
    with meaningful complexity, vibe coding isn’t enough. This trending Reddit post
    sums it up perfectly: left unchecked, vibe coding creates more problems than it
    solves.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: “Vibe编码”——快速拼凑代码，最少规划——对于演示或实验来说很棒。但对于更深入的技术成长或构建具有有意义复杂性的系统，vibe编码是不够的。这个Reddit热门帖子完美地总结了这一点：未经检查，vibe编码创造的问题比解决的问题还多。
- en: vibe coding, where 2 engineers can now create the tech debt of at least 50 engineers
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: vibe编码，现在两个工程师就能创造出至少50个工程师的技术债务
- en: ''
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — I Am Devloper (@iamdevloper) [March 20, 2025](https://twitter.com/iamdevloper/status/1902628884278894941?ref_src=twsrc%5Etfw)
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 我就是开发者 (@iamdevloper) [2025年3月20日](https://twitter.com/iamdevloper/status/1902628884278894941?ref_src=twsrc%5Etfw)
- en: In this piece, I’ll show you how to use AI-assisted tools more wisely — and
    why contributing to open source might be the most underrated way to truly level
    up your technical skills.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将向你展示如何更明智地使用AI辅助工具——以及为什么为开源项目做出贡献可能是真正提升你的技术技能最被低估的方式。
- en: My experience vibe coding with Cursor
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我使用Cursor进行vibe编码的经验
- en: Like many developers, I switched from VS Code (with GitHub Copilot) to Cursor
    and am currently subscribed to Cursor’s Pro plan ($20/month).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 和许多开发者一样，我从VS Code（带有GitHub Copilot）切换到Cursor，并目前订阅了Cursor的Pro计划（每月20美元）。
- en: The feature I rely on most is Cursor’s integrated AI chat, which lets me directly
    interact with my ***entire*** codebase. Its agent can quickly grep through multiple
    files and even handle images - extremely useful when navigating large, unfamiliar
    repos. It also spots linter errors and auto-corrects them while directly editing
    files.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我最依赖的功能是Cursor的集成AI聊天，它让我可以直接与我的***整个***代码库互动。它的代理可以快速搜索多个文件，甚至处理图像——在导航大型、不熟悉的仓库时极为有用。它还可以检测代码检查器错误并在直接编辑文件时自动纠正它们。
- en: Initially, Cursor dramatically boosted my productivity, especially for simpler
    tasks. It felt powerful, almost magical. But as things got complex, I noticed
    some cracks. Cursor would sometimes generate spaghetti code, mix up similarly
    named files across directories, and occasionally struggle to follow intricate
    logic flows.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 初始时，Cursor极大地提高了我的生产力，尤其是在简单任务方面。它感觉强大，几乎神奇。但随着事情变得复杂，我注意到一些裂痕。Cursor有时会生成意大利面代码，在不同目录中混淆相似命名的文件，并且偶尔难以遵循复杂的逻辑流程。
- en: Vibe coding can get you thousands of lines of code in minutes  — but without
    a strong mental model of what you’re building, you risk ending up with bloated,
    over-engineered systems.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: Vibe编码可以在几分钟内让你编写数千行代码——但如果没有一个强大的心理模型来理解你正在构建的内容，你可能会得到臃肿、过度设计的系统。
- en: Cursor does a decent job narrowing down the search space when debugging. But
    letting it make unchecked edits does introduce even more bugs than it solves.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 当调试时，Cursor在缩小搜索空间方面做得相当不错。但让它进行未经检查的编辑会引入比解决的问题更多的错误。
- en: '***Beyond the usual advice to “write better prompts,” one strategy I’ve found
    especially helpful is telling Cursor NOT to make direct edits. (It’s surprisingly
    obedient about this!)***'
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**除了“写更好的提示”的常规建议之外，我发现的一个特别有用的策略是告诉Cursor不要直接进行编辑。（它在这方面出奇地听话！）**'
- en: Instead, I explicitly ask it to suggest changes first in the chat interface.
    Then, I would review each suggestion, decide which edits made sense, and apply
    them selectively — either manually or through Cursor. Unlike ChatGPT, Cursor’s
    biggest strength is its contextual awareness of the entire codebase and its ability
    to parse through lengthy files (over 5k lines of code) by processing them in manageable
    chunks.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我会明确要求它在聊天界面中首先提出更改建议。然后，我会审查每个建议，决定哪些编辑是合理的，并选择性地应用它们——无论是手动还是通过Cursor。与ChatGPT不同，Cursor最大的优势是它对整个代码库的上下文感知能力，以及它通过将它们处理成可管理的块来解析长文件（超过5k行代码）的能力。
- en: Contributing to open source
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参与开源项目
- en: 'So, how do you get technically stronger? Two ways stand out: side projects
    and open source contributions.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你如何变得技术更强？两种方式脱颖而出：副项目和开源贡献。
- en: Side projects are great for exploring new tech or diving deep into something
    you’re passionate or curious about. Wonder how AI agents work or curious about
    MCP? Just building a simple weekend project teaches you far more than hours of
    tutorials or documentation. Thanks to open-source, tools and resources are freely
    accessible, leveling the playing field for everyone.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 副项目非常适合探索新技术或深入研究你热情或好奇的事物。想知道AI代理是如何工作的，或者对MCP感到好奇？仅仅建立一个简单的周末项目就能教会你比数小时教程或文档多得多的东西。多亏了开源，工具和资源可以自由获取，为每个人提供了公平的竞争环境。
- en: But solo projects have downsides. It’s easy to lose motivation — many of my
    own side projects never saw the light of day.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，独立项目也有其缺点。很容易失去动力——我自己的许多副项目从未见过天日。
- en: '***Plus, you can find yourself in an echo chamber: your code works, but you’re
    not sure if it’s following best practices or industry standards. If you’re early
    in your career and lack mentorship, how do you know if you’re even on the right
    track?***'
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**此外，你可能会发现自己处于一个回音室：你的代码可以工作，但你不确定它是否遵循最佳实践或行业标准。如果你在职业生涯早期且缺乏指导，你如何知道你是否走上了正确的道路？**'
- en: This is exactly where open source fills the gap. Open source projects aren’t
    just for coding wizards; they’re for everyone. Your favourite libraries like Pandas,
    Matplotlib, TensorFlow, and Keras rely heavily on community involvement.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是开源项目填补空缺的地方。开源项目不仅仅是为编程大师准备的；它们是为每个人准备的。你最喜欢的库，如Pandas、Matplotlib、TensorFlow和Keras，严重依赖于社区参与。
- en: Why bother contributing?
  id: totrans-26
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 为什么要贡献？
- en: Open source lets you make a real impact used by thousands of developers — not
    just toy projects nobody sees. You’ll become proficient with version control (hello,
    GitHub!), sharpen your skills navigating complex codebases, pick up best practices,
    and build a network of people who can vouch for you when it matters.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 开源项目让你能够对成千上万的开发者产生真正的影响——而不仅仅是无人问津的玩具项目。你将精通版本控制（你好，GitHub！），提高你在复杂代码库中导航的技能，掌握最佳实践，并建立一个在你需要时能为你作证的人脉网络。
- en: There are career benefits too. It’ll add to your portfolio and personal brand,
    and you’ll ramp up faster when joining new teams.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，也有职业上的好处。它将增加你的作品集和个人品牌，当你加入新团队时，你将更快地提升自己。
- en: But, contribute for the right reasons. ***If your only motivation is landing
    a job, DON’T contribute!*** Open source is not a ticket to get a job — it requires
    genuine interest and commitment. It shows you’ve a passion to build, and for many
    startups that begin from open source projects, that’s how they find their first
    hires.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，出于正确的理由进行贡献。**如果你的唯一动机是找到一份工作，那么不要贡献！**开源项目不是获得工作的门票——它需要真正的兴趣和承诺。它表明你对构建有热情，对于许多从开源项目开始的初创公司来说，这就是他们找到第一批员工的方式。
- en: Picking an open source project that you care about
  id: totrans-30
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 选择一个你关心的开源项目
- en: Starting out can seem daunting. Many popular repos have enormous codebases,
    potentially outdated documentation, or hundreds of unclear issues. So how do you
    pick?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 开始时可能会觉得令人畏惧。许多流行的仓库拥有庞大的代码库，可能过时的文档，或者数百个不明确的问题。那么，你该如何选择？
- en: First up, pick a project you **genuinely care about.** This might sound obvious,
    but it’s crucial — and underrated.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，选择一个你真正关心的项目。这听起来可能很显然，但这是至关重要的——并且被低估了。
- en: Choose something you ***actually use,*** whether at work or in a side project.
    Jumping into an unfamiliar project with unfamiliar tech is simply overwhelming,
    and you’ll lose motivation fast.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 选择你**真正使用**的东西，无论是工作还是副项目。直接进入一个不熟悉的项目和陌生的技术会让人感到压倒性，你很快就会失去动力。
- en: Personally, I’m both a user and a big fan of PostHog  — the product analytics
    platform built specifically for developers — so I started contributing there.
    Their docs were comprehensive and well-structured, which made it an awesome place
    to start. (And no, they didn’t pay me to say this!)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 个人来说，我既是PostHog的用户，也是它的忠实粉丝——这是一个专门为开发者构建的产品分析平台——所以我开始在那里贡献。他们的文档全面且结构良好，这使得它成为一个很好的起点。（而且，他们没有付我钱来说这！）
- en: What to contribute?
  id: totrans-35
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 要贡献什么？
- en: There are a ***ton*** of things you can do. Here’s an approach that I found
    helpful.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以做很多事情。这里有一个我发现有帮助的方法。
- en: Find a feature you need or improve something you use.
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 找到你需要的功能或改进你正在使用的东西。
- en: Narrowing down contributions to features you genuinely care about gives clarity
    and motivation. The best code comes from solving problems you personally face.
  id: totrans-38
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 将贡献缩小到你真正关心的功能，这会带来清晰和动力。最好的代码来自于解决你个人面临的问题。
- en: Set up your local environment.
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置你的本地环境。
- en: Fork the project, clone it locally, and get it running. Understand where logs
    are and how to test changes. Get a grasp on the project’s basic structure and
    coding style.
  id: totrans-40
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 分支项目，本地克隆，并运行它。了解日志的位置以及如何测试更改。掌握项目的基本结构和编码风格。
- en: Start small and learn by doing
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从小做起，通过实践学习
- en: Many repos tag beginner-friendly issues (like “good-first-issue”). Pick these
    to start. Understand and replicate the bug; don’t hesitate to comment if you’re
    stuck. When you open a PR, ensure your changes pass all linting and tests.
  id: totrans-42
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 许多仓库标记了适合初学者的任务（如“good-first-issue”）。从这些开始。理解和复现错误；如果你卡住了，不要犹豫，发表评论。当你打开一个PR时，确保你的更改通过了所有的linting和测试。
- en: Learning to navigate the codebase is essential. You don’t need to read every
    line — that’s practically impossible. After grasping the high-level structure,
    dive in. Start small to get comfortable with the build, deployment, and PR review
    process. Write clear commit messages and PR descriptions. Check recently merged
    PRs to see successful examples or insightful discussions.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 学习如何导航代码库是至关重要的。你不需要阅读每一行——这实际上是不可能的。在掌握高级结构后，深入其中。从小处着手，以熟悉构建、部署和PR审查流程。写清晰的提交信息和PR描述。查看最近合并的PR，看看成功的例子或深入的讨论。
- en: Wrapping up
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: Contributing to open source takes patience — popular repos are huge, and learning
    takes time. Becoming a consistent, valuable contributor takes at least a few months,
    so don’t get discouraged by initial setbacks. If your PR is rejected or you get
    stuck on a tricky bug, that’s perfectly normal — it’s all part of the learning
    process.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 贡献开源需要耐心——流行的仓库很大，学习需要时间。成为一个一致且有价值的贡献者至少需要几个月的时间，所以不要因为最初的挫折而气馁。如果你的PR被拒绝或你卡在一个棘手的错误上，这是完全正常的——这都是学习过程的一部分。
- en: If you’re new to open source and want to chat, feel free to connect. While I
    didn’t dive deeply into technical details here (a quick Google or ChatGPT search
    can guide you there), I hope this gives you the big-picture perspective to get
    started. Open source has been rewarding for me — and I hope it will be for you
    too.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你刚接触开源并想聊天，请随时联系。虽然我没有在这里深入探讨技术细节（快速Google或ChatGPT搜索可以引导你到那里），但我希望这能给你一个开始的大局观。开源对我来说是很有回报的——我也希望它对你也是如此。
- en: See you in the next article 🙂
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 下篇文章再见啦 🙂
