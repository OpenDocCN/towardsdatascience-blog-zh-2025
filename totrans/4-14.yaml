- en: The .🐍 Extension is Now a Thing in Python ?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '`.🐍 扩展名现在在 Python 中成了一件事？`'
- en: 原文：[https://towardsdatascience.com/the-extension-is-now-a-thing-in-python-9fd6c500e2e8/](https://towardsdatascience.com/the-extension-is-now-a-thing-in-python-9fd6c500e2e8/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-extension-is-now-a-thing-in-python-9fd6c500e2e8/](https://towardsdatascience.com/the-extension-is-now-a-thing-in-python-9fd6c500e2e8/)
- en: '![created by @carbon_app](../Images/92e9e61c6f5ab227ad6d6089e26bb23e.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由 @carbon_app 创建](../Images/92e9e61c6f5ab227ad6d6089e26bb23e.png)'
- en: created by [@carbon_app](https://twitter.com/carbon_app)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由 [@carbon_app](https://twitter.com/carbon_app) 创建
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: For years now, Python developers have secretly wished they could ditch `.py`
    extension to embrace something more… reptilian 🐍 . And while Mojo gets to rock
    the cool `.🔥` extension, Python has been stuck in the emoji dark ages.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 多年来，Python 开发者一直暗自希望能摆脱 `.py` 扩展名，拥抱一些更……爬行动物的 🐍 。虽然 Mojo 可以使用酷炫的 `.🔥` 扩展名，但
    Python 一直停留在表情符号的黑暗时代。
- en: But guess what? What if I told you that 2025 could be the year of the emoji
    uprising? While CPython may not officially support emoji file extensions (yet!),
    the beauty of Python’s import system means we can extend it to handle whatever
    wild and wonderful file extensions our hearts desire.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但你知道吗？如果我说 2025 年可能是表情符号起义的一年呢？虽然 CPython 可能不会正式支持表情符号文件扩展名（至少现在还没有！），但 Python
    导入系统的美妙之处在于我们可以扩展它来处理我们心中所渴望的任何疯狂而奇妙的文件扩展名。
- en: In this article, I’ll show you how to extend Python’s import system and finally
    give your scripts the emoji flair they deserve. Let’s dive in! 🚀
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将向您展示如何扩展 Python 的导入系统，并最终给你的脚本带来应得的表情符号风格。让我们开始吧！🚀
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 1\. Installing emojdule 🐍 ✨
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1\. 安装 `emojdule` 🐍 ✨
- en: 'Want to import Python files with emoji extensions? It’s easier than you think!
    Just install the `emojdule` package:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 想要导入带有表情符号扩展名的 Python 文件？这比你想象的要简单！只需安装 `emojdule` 包：
- en: '[PRE0]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: And that’s it! 🎉 `emojdule` automatically hooks into Python’s import system,
    letting you import files with emoji extensions like it’s no big deal.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！🎉 `emojdule` 自动集成到 Python 的导入系统中，让你可以像平常一样导入带有表情符号扩展名的文件。
- en: '**💡 In a hurry?** Skip to Part 3 for a quick example!'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**💡 如果您时间紧迫？** 跳到第 3 部分查看快速示例！'
- en: '**⚠️ Warning:** This is purely for fun, please don’t use this in production
    (unless you enjoy confusing your future self). 😅'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**⚠️ 警告：** 这纯粹是为了好玩，请不要在生产环境中使用（除非你喜欢让自己未来的自己感到困惑）。😅'
- en: '* * *'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Extending the Python Import System 🛠 ️
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2\. 扩展 Python 导入系统 🛠️
- en: Python’s import system is **surprisingly flexible** and `emojdule` takes full
    advantage of this by providing a **custom importer**. But before **diving in,
    let’s break down how Python imports work**.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: Python 的导入系统非常灵活，`emojdule` 通过提供 **自定义导入器** 充分利用了这一点。但在深入之前，让我们先来了解一下 Python
    的导入机制是如何工作的。
- en: 🔍 The Import Machinery
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔍 导入机制
- en: 'Python’s import system is built around a few key components:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: Python 的导入系统建立在几个关键组件之上：
- en: '**Finders:** A **finder** locates a module (e.g., searching the file system
    for a `.py` file).'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**查找器：** 一个 **查找器** 定位模块（例如，在文件系统中搜索 `.py` 文件）。'
- en: '**Loaders:** A **loader** executes the module’s code and creates the corresponding
    **Module object**.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**加载器：** 一个 **加载器** 执行模块的代码并创建相应的 **模块对象**。'
- en: '**Meta Path**: A list of finder objects that Python uses to locate modules.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**元路径**：Python 用于定位模块的查找器对象列表。'
- en: 'By default, Python comes with **three** built-in finders:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，Python 内置了 **三个** 查找器：
- en: '![Image by author](../Images/8b871607058dcc79c2f47723131c146d.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供](../Images/8b871607058dcc79c2f47723131c146d.png)'
- en: Image by author
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Here’s what they do:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是它们的作用：
- en: '**BuiltinImporter**: Loads **built-in** modules (e.g., `sys` , `math` ).'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**BuiltinImporter**：加载 **内置** 模块（例如，`sys`，`math`）。'
- en: '**FrozenImporter**: Loads **frozen** modules (precompiled bytecode embedded
    into Python).'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**FrozenImporter**：加载 **冻结** 的模块（预编译的字节码嵌入到 Python 中）。'
- en: '**PathFinder**: The **main** finder, responsible for searching **import paths**
    and loading your `.py` files.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PathFinder**：主要的查找器，负责搜索 **导入路径** 并加载你的 `.py` 文件。'
- en: Since `PathFinder` handles standard module imports, we can **extend Python’s
    import system** by adding a **custom Finder** to `sys.meta_path` .
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 `PathFinder` 处理标准模块导入，我们可以通过向 `sys.meta_path` 添加一个 **自定义查找器** 来扩展 Python
    的导入系统。
- en: '* * *'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Creating a Custom Import Hook 🎩
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3\. 创建自定义导入钩子 🎩
- en: Now that we understand how Python’s import system works, let’s **build our own
    Finder and Loader** to intercept imports and modify module behavior!
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了 Python 的导入系统是如何工作的，让我们 **构建自己的查找器和加载器** 来拦截导入并修改模块行为！
- en: 🕵 ️ Creating a Finder
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🕵️ 创建一个查找器
- en: 'A **Finder** is responsible for **locating** modules. To create one, we define
    a class with a `find_spec` method:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**查找器**负责**定位**模块。要创建一个查找器，我们定义一个具有 `find_spec` 方法的类：'
- en: Returns a **`ModuleSpec`** object if it finds the module.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果找到模块，则返回一个 **`ModuleSpec`** 对象。
- en: Returns `None` if it doesn’t find it, it will allow Python to **move to the
    next import hook**.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果找不到，则返回 `None`，它将允许 Python **移动到下一个导入钩子**。
- en: 'Let’s implement a **custom finder** that intercepts imports of a specific module:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们实现一个**自定义查找器**，它拦截特定模块的导入：
- en: '[PRE1]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now, any attempt to **import a module matching `intercepted_module`** will be
    intercepted by our custom Finder.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，任何尝试**导入与 `intercepted_module` 匹配的模块**的尝试都将被我们的自定义查找器拦截。
- en: ⚡Creating a Loader
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ⚡创建一个加载器
- en: 'A **Loader** is responsible for **executing** the module code. Our Finder referenced
    a `CustomLoader` , so let’s create that next:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**加载器**负责**执行**模块代码。我们的查找器引用了 `CustomLoader`，所以让我们接下来创建它：'
- en: 'To implement a Loader, we need:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 要实现加载器，我们需要：
- en: '`create_module(self, spec)` : Instantiates a **new** module object.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`create_module(self, spec)` : 实例化一个新的模块对象。'
- en: '`exec_module(self, module)` : Executes the module’s code.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`exec_module(self, module)` : 执行模块的代码。'
- en: 'Here’s our custom loader in action:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们的自定义加载器在起作用：
- en: '[PRE2]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Now, when a module is imported, our loader:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当导入模块时，我们的加载器：
- en: '**Reads its source code.**'
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**读取其源代码**。'
- en: '**Modifies** it (in this case, adding a log message).'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**修改**它（在这种情况下，添加一个日志消息）。'
- en: '**Executes** the modified code.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**执行**修改后的代码。'
- en: 🛠 ️Installing the Custom Hook
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🛠️ 安装自定义钩子
- en: 'We have our **Finder and Loader**, but **Python won’t use them until we register
    them** in `sys.meta_path` :'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有我们的**查找器和加载器**，但**Python 不会使用它们，直到我们在 `sys.meta_path` 中注册它们**：
- en: '![Image by author](../Images/02c938d1aced22bf1fdca82e55679385.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供](../Images/02c938d1aced22bf1fdca82e55679385.png)'
- en: Image by author
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '[PRE3]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 🏆 Output
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🏆 输出
- en: 'When you import `json` , here’s what happens:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 当你导入 `json` 时，这是会发生的事情：
- en: '[PRE4]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Since `json` has submodules ( `decoder` , `scanner` , `encoder` ), our Finder
    **intercepts all of them too** !
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 `json` 有子模块（`decoder`、`scanner`、`encoder`），我们的查找器**也会拦截它们**！
- en: Our `CustomFinder` **hooks into the import system**, intercepting modules **before**
    the default importers get a chance.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的 `CustomFinder` **钩入导入系统**，在默认导入器有机会之前拦截模块。
- en: '* * *'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4\. Example Repository 🎨
