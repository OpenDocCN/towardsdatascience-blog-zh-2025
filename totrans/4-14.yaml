  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 5\. Another Type of Import Hook 🔍
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 另一种类型的导入钩子 🔍
- en: 'In the previous section, we explored **meta hooks**, but there’s another powerful
    tool in Python’s import system:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们探讨了**元钩子**，但 Python 的导入系统中还有另一个强大的工具：
- en: 🏗 ️ Import Path Hooks
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🏗️ 导入路径钩子
- en: Instead of modifying `sys.meta_path` , **import path hooks** extend `PathFinder`
    to search for modules in **custom locations**.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 与修改 `sys.meta_path` 不同，**导入路径钩子**扩展 `PathFinder` 以在**自定义位置**搜索模块。
- en: Normally, `PathFinder` searches for modules in **directories** listed in `sys.path`
    . But what if `sys.path` contained a **URL** instead? Or a **database query**?
    Or even **links to a PyPI**?
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，`PathFinder` 在 `sys.path` 中列出的**目录**中搜索模块。但如果我们把 `sys.path` 中的内容替换为**URL**呢？或者**数据库查询**？甚至**指向
    PyPI 的链接**？
- en: 🛠 ️ Writing a Custom Import Path Hook
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🛠️ 编写自定义导入路径钩子
- en: 'To create an import path hook:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个导入路径钩子：
- en: '**Define a custom "entity" finder** (to handle non-traditional paths).'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义一个自定义的 "实体" 查找器**（用于处理非传统路径）。'
- en: '**Register it in `sys.path_hooks`** so `PathFinder` knows about it.'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在 `sys.path_hooks` 中注册它**，这样 `PathFinder` 就会知道它。'
- en: For more details, check out the [official Python docs](https://docs.python.org/3/reference/import.html#the-path-based-finder).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 更多详情，请查看[官方 Python 文档](https://docs.python.org/3/reference/import.html#the-path-based-finder)。
- en: 🗺 ️ How Import Path Hooks Fit into Python
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🗺️ 导入路径钩子在 Python 中的位置
- en: '![Image by author](../Images/5af1d41c53609c3c4b8aedf994ba35ab.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![作者图片](../Images/5af1d41c53609c3c4b8aedf994ba35ab.png)'
- en: Image by author
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: 'Here’s what’s happening:'
  id: totrans-92
