  type: TYPE_NORMAL
- en: 'Here’s what’s happening:'
  prefs: []
  type: TYPE_NORMAL
- en: '`sys.path_hooks` contains **custom import finders**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`PathFinder` uses **these hooks** to locate modules.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
