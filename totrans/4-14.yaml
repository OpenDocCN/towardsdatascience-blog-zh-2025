- en: The .🐍 Extension is Now a Thing in Python ?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-extension-is-now-a-thing-in-python-9fd6c500e2e8/](https://towardsdatascience.com/the-extension-is-now-a-thing-in-python-9fd6c500e2e8/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![created by @carbon_app](../Images/92e9e61c6f5ab227ad6d6089e26bb23e.png)'
  prefs: []
  type: TYPE_IMG
- en: created by [@carbon_app](https://twitter.com/carbon_app)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: For years now, Python developers have secretly wished they could ditch `.py`
    extension to embrace something more… reptilian 🐍 . And while Mojo gets to rock
    the cool `.🔥` extension, Python has been stuck in the emoji dark ages.
  prefs: []
  type: TYPE_NORMAL
- en: But guess what? What if I told you that 2025 could be the year of the emoji
    uprising? While CPython may not officially support emoji file extensions (yet!),
    the beauty of Python’s import system means we can extend it to handle whatever
    wild and wonderful file extensions our hearts desire.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll show you how to extend Python’s import system and finally
    give your scripts the emoji flair they deserve. Let’s dive in! 🚀
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Installing emojdule 🐍 ✨
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Want to import Python files with emoji extensions? It’s easier than you think!
    Just install the `emojdule` package:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: And that’s it! 🎉 `emojdule` automatically hooks into Python’s import system,
    letting you import files with emoji extensions like it’s no big deal.
  prefs: []
  type: TYPE_NORMAL
- en: '**💡 In a hurry?** Skip to Part 3 for a quick example!'
  prefs: []
  type: TYPE_NORMAL
- en: '**⚠️ Warning:** This is purely for fun, please don’t use this in production
    (unless you enjoy confusing your future self). 😅'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Extending the Python Import System 🛠 ️
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Python’s import system is **surprisingly flexible** and `emojdule` takes full
    advantage of this by providing a **custom importer**. But before **diving in,
    let’s break down how Python imports work**.
  prefs: []
  type: TYPE_NORMAL
- en: 🔍 The Import Machinery
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Python’s import system is built around a few key components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Finders:** A **finder** locates a module (e.g., searching the file system
    for a `.py` file).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Loaders:** A **loader** executes the module’s code and creates the corresponding
    **Module object**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Meta Path**: A list of finder objects that Python uses to locate modules.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'By default, Python comes with **three** built-in finders:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by author](../Images/8b871607058dcc79c2f47723131c146d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what they do:'
  prefs: []
  type: TYPE_NORMAL
- en: '**BuiltinImporter**: Loads **built-in** modules (e.g., `sys` , `math` ).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**FrozenImporter**: Loads **frozen** modules (precompiled bytecode embedded
    into Python).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PathFinder**: The **main** finder, responsible for searching **import paths**
    and loading your `.py` files.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since `PathFinder` handles standard module imports, we can **extend Python’s
    import system** by adding a **custom Finder** to `sys.meta_path` .
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Creating a Custom Import Hook 🎩
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we understand how Python’s import system works, let’s **build our own
    Finder and Loader** to intercept imports and modify module behavior!
  prefs: []
  type: TYPE_NORMAL
- en: 🕵 ️ Creating a Finder
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A **Finder** is responsible for **locating** modules. To create one, we define
    a class with a `find_spec` method:'
  prefs: []
  type: TYPE_NORMAL
- en: Returns a **`ModuleSpec`** object if it finds the module.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Returns `None` if it doesn’t find it, it will allow Python to **move to the
    next import hook**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s implement a **custom finder** that intercepts imports of a specific module:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Now, any attempt to **import a module matching `intercepted_module`** will be
    intercepted by our custom Finder.
  prefs: []
  type: TYPE_NORMAL
- en: ⚡Creating a Loader
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A **Loader** is responsible for **executing** the module code. Our Finder referenced
    a `CustomLoader` , so let’s create that next:'
  prefs: []
  type: TYPE_NORMAL
- en: 'To implement a Loader, we need:'
  prefs: []
  type: TYPE_NORMAL
- en: '`create_module(self, spec)` : Instantiates a **new** module object.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`exec_module(self, module)` : Executes the module’s code.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here’s our custom loader in action:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Now, when a module is imported, our loader:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reads its source code.**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Modifies** it (in this case, adding a log message).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Executes** the modified code.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 🛠 ️Installing the Custom Hook
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We have our **Finder and Loader**, but **Python won’t use them until we register
    them** in `sys.meta_path` :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by author](../Images/02c938d1aced22bf1fdca82e55679385.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 🏆 Output
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When you import `json` , here’s what happens:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Since `json` has submodules ( `decoder` , `scanner` , `encoder` ), our Finder
    **intercepts all of them too** !
  prefs: []
  type: TYPE_NORMAL
- en: Our `CustomFinder` **hooks into the import system**, intercepting modules **before**
    the default importers get a chance.
  prefs: []
  type: TYPE_NORMAL
