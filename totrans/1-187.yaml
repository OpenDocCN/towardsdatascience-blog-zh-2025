- en: How I Used Machine Learning to Predict 41% of Project Delays Before They Happened
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-i-used-machine-learning-to-predict-41-of-project-delays-before-they-happened/](https://towardsdatascience.com/how-i-used-machine-learning-to-predict-41-of-project-delays-before-they-happened/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1760636803759" class="mdspan-comment">A situation</mdspan>
    that happens to every project manager: the stand-up meeting begins and suddenly
    a critical ticket is blocked, a developer calls in sick,  a dependency slips or
    a key feature is delayed. In an instant, your carefully planned timeline starts
    to collapse, and you’re scrambling for solutions.'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we’ll explore how a machine learning model predicted 41% of
    project delays before they hit the timeline, cutting costs and reducing last-minute
    firefighting.
  prefs: []
  type: TYPE_NORMAL
- en: '**The problem: 62% of IT projects miss their deadlines in 2025**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As a Project Manager working with Agile teams, I’ve often dealt with delays
    and blockers, they quickly became part of everyday life. But when I came across
    the [2025 Wellington State of Project Management](https://wellingtone.co.uk/publications/state-of-project-management-research/)
    study revealing that in **2025**, **62% of IT projects miss their deadlines,**
    it shocked me into action. It’s an increase compared to the [2017 PMI Pulse of
    the Profession](https://www.pmi.org/learning/thought-leadership/pulse/pulse-of-the-profession-2017)
    study where it was **51% in 2017**. Project delays are reaching a critical level.
  prefs: []
  type: TYPE_NORMAL
- en: I know delays are common, but I hadn’t imagined it would be that high. But today,
    we have tools to anticipate and better understand these risks. Using Python and
    Data Science, I built a model to predict project delays before they happened.
  prefs: []
  type: TYPE_NORMAL
- en: 'This statistic highlights two critical points: delays often stem from recurring
    causes, and they carry a massive business impact. In this article, we’ll explore
    how data-driven approaches can uncover these causes and help project managers
    anticipate them.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/70e30d89aa84a692932b9e97f47ead3b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: With this knowledge, we can choose the best course of action.
  prefs: []
  type: TYPE_NORMAL
- en: This is where we can use data science. Surprisingly, the [2020 Wellington State
    of Project Management report](https://wellingtone.co.uk/wp-content/uploads/2020/06/The-State-of-Project-Management-Report-2020-Wellingtone.pdf)
    announces that only **23% of companies** use project management software to manage
    their projects, even though these tools generate a wealth of valuable data.
  prefs: []
  type: TYPE_NORMAL
- en: By analyzing information from project tickets, we can build predictive machine
    learning models that highlight potential risks before they escalate.
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s exactly what I did: I analyzed more than **5,000 tickets**, not only
    from my current project but also from past initiatives.'
  prefs: []
  type: TYPE_NORMAL
- en: Project management software, it turns out, is an incredible source of data waiting
    to be leveraged.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The Data Gap in Project Management
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In traditional project management, reporting plays a central role, yet few reports
    offer a comprehensive, detailed retrospective of the project as a whole.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ac5e45651f7ebe6696b1dac1f99101e8.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: For example, in Scrum, we track our velocity, follow the trend of our burndown
    chart, and measure the number of story points completed.
  prefs: []
  type: TYPE_NORMAL
- en: Traditional reporting still fails to give us the complete picture. Data science
    can.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As Project Managers, we may know from experience where the critical points lie,
    but validating those assumptions with data makes our decisions far more reliable.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c18ca68633b5f626266a7e21badbc198.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Building the Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To explore this idea, I analyzed 5,000 Jira tickets—one of the richest sources
    of project data available.
  prefs: []
  type: TYPE_NORMAL
- en: Since real project data can’t always be shared, I generated a synthetic dataset
    in Python that mirrors reality, including key variables such as priority, story
    points, team size, dependencies, and delay.
  prefs: []
  type: TYPE_NORMAL
- en: Code by author
  prefs: []
  type: TYPE_NORMAL
- en: Having built a realistic dataset, we can now explore the different ticket profiles
    it contains. This sets the stage for our exploratory data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/98be7728c71020f2def9c4129f24cf38.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: Most tickets are of low or medium priority, which is consistent with how project
    backlogs are usually structured. This initial distribution already hints at where
    risks might accumulate, a point we’ll explore further in the EDA.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3b75f09386a769ad4a7356311bb6b87a.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: While high and critical priority tickets represent a smaller share of the total,
    they are disproportionately more likely to be delayed.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ae2478be2d520f75c6ec4752a7085145.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: 'This bar plot confirms the phenomenon: high-priority tickets are strongly associated
    with delays. However, this can stem from two different dynamics:'
  prefs: []
  type: TYPE_NORMAL
- en: High-priority tickets are inherently more complex and therefore at greater risk
    of delay.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Some tickets only become high priority *because* they were delayed in the first
    place, creating a vicious cycle of escalation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'With this simulated dataset, we now have a realistic snapshot of what happens
    in real projects: tickets differ in size, dependencies, and complexity and some
    inevitably end up delayed. This reflects the everyday challenges project managers
    face.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The next step is to move beyond simple counts and uncover the patterns hidden
    in the data. Through Exploratory Data Analysis (EDA), we can test our assumptions:
    do higher priorities and more dependencies really increase the likelihood of delay?
    Let’s find out.'
  prefs: []
  type: TYPE_NORMAL
- en: Exploratory Data Analysis (EDA)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before moving to modeling, it’s important to step back and visualize how our
    variables interact. Exploratory Data Analysis (EDA) allows us to uncover patterns
    in:'
  prefs: []
  type: TYPE_NORMAL
- en: How delays vary with priority.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The impact of dependencies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The distribution of story points.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The typical team sizes handling the tickets.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/46886847798c95b01debafa4cffdc5ca.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: 'This chart confirms a key intuition: **the higher the priority, the greater
    the probability of delay**.'
  prefs: []
  type: TYPE_NORMAL
- en: Dependencies amplify this effect, the more there are, the higher the chances
    of something slipping through.
  prefs: []
  type: TYPE_NORMAL
- en: Once a delay or risk of delay appears, escalation mechanisms push the priority
    even higher, creating a feedback loop.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, ticket complexity also plays a role, adding another layer of uncertainty.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e069fa57599c90f1f46dbd4e035c48ec.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Most tickets fall into the **medium-risk category**. These demand the most
    attention from project managers: while not critical at first, their risk can quickly
    escalate and trigger delays.'
  prefs: []
  type: TYPE_NORMAL
- en: '**High-risk tickets**, though fewer, carry a disproportionate impact if not
    managed early.'
  prefs: []
  type: TYPE_NORMAL
- en: Meanwhile, **low-risk tickets** usually require lighter monitoring, allowing
    managers to focus their time where it truly matters.
  prefs: []
  type: TYPE_NORMAL
- en: We also notice that most tickets have **small story point sizes**, and teams
    are usually around **five members**.
  prefs: []
  type: TYPE_NORMAL
- en: This suggests that agile practices are generally being followed.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we will go further and  look at the **distribution of risk scores** across
    tickets.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4f39dd0e6c7a2060e40a479d500c6d1a.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: We see that only a small portion of tickets carry a very high risk, while most
    sit in the medium zone. This means that by focusing early on the riskiest tickets,
    Project Managers could prevent many delays.
  prefs: []
  type: TYPE_NORMAL
- en: To test this assumption, let’s now explore how **complexity per person** and
    **priority** interact with risk scores.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5bdfbc40f8f89d73039bb08ff265a228.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: We cannot observe a clear trend here. The risk score does not seem to strongly
    depend on either ticket complexity or priority, suggesting that other hidden factors
    might drive delays.
  prefs: []
  type: TYPE_NORMAL
- en: 'Technical Deep Dive: Predictive Model'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The raw data provides a solid foundation, but domain knowledge is essential
    to building a truly robust model. To better capture the dynamics of real-world
    projects, we engineered new features that reflect project management realities:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Complexity per person** = story points/team size.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Has dependency** = whether a ticket depends on others (dependencies > 0).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Priority story points interaction** = priority level multiplied by story
    points.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code by author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/790ab898fd30b9c4eb09c46b03734412.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: We chose a **Random Forest** model because it can handle non-linear relationships
    and provides insights into feature importance.
  prefs: []
  type: TYPE_NORMAL
- en: Our main focus is on **Recall** for the positive class (1 = delayed). For instance,
    a recall of 0.6 would mean the model correctly identifies 60% of all truly delayed
    tickets.
  prefs: []
  type: TYPE_NORMAL
- en: The objective is not perfect precision but **early detection**. In project management,
    it’s better to flag potential delays, even with some false positives, than to
    miss critical issues that could derail the entire project.
  prefs: []
  type: TYPE_NORMAL
- en: Code by author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cf404138f041f76bc6de7b9a2a1e9f61.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: The model achieved a **recall of 0.41**, meaning it successfully detected **41%
    of the delayed tickets**.
  prefs: []
  type: TYPE_NORMAL
- en: This may seem modest. However, in a project management context, even this level
    of early warning is valuable. It gives Project Managers actionable signals to
    anticipate risks and prepare mitigations.
  prefs: []
  type: TYPE_NORMAL
- en: With further refinement, the model can be improved to anticipate more delays
    and help prevent issues before they materialize.
  prefs: []
  type: TYPE_NORMAL
- en: We will use a **confusion matrix** to better understand the model’s strengths
    and weaknesses.
  prefs: []
  type: TYPE_NORMAL
- en: Code by author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/83ffbfc8ffe36ce97e89580460e286e4.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: The model correctly identifies **169 delays**, but it also generates **373 false
    alarms**, tasks flagged as delayed that actually finished on time. For a Project
    Manager, this trade-off is acceptable because it’s better to investigate a few
    false positives than to miss a critical delay. This is a part of **risk management**.
  prefs: []
  type: TYPE_NORMAL
- en: However, the model still **misses 245 delayed tickets**, meaning its predictions
    are far from perfect.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, this model works best as an **early warning system**. It provides valuable
    signals but still needs further training and refinement. Most importantly, it
    should be complemented with **human expertise**, the judgment and experience of
    Project Managers, to ensure a complete and reliable project overview.
  prefs: []
  type: TYPE_NORMAL
- en: Model Interpretability, Scoring, Business impact, Dashboard & model validation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To truly understand *why* the model makes these predictions, we need to look
    under the hood. Which features drive the risk of delay the most? This is where
    **model interpretability** comes in.
  prefs: []
  type: TYPE_NORMAL
- en: Code by author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/983bcfede61d7841007b5c3cd0828c93.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: We can observe that **complexity** and the **priority-story points interaction**
    are the strongest drivers of prediction accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Scoring tickets: Identifying What’s Really at Risk.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Why does this matter for Project Managers?** Because we can go one step further.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Calculate a **risk score** for each ticket.
  prefs: []
  type: TYPE_NORMAL
- en: This score highlights which tasks are most at risk, allowing PMs to focus their
    attention where it matters most and take preventive action before delays escalate.
  prefs: []
  type: TYPE_NORMAL
- en: Code by author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4d3d29a91306a5dc8c74d37b985e26d7.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: '**Business Impact Analysis.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The tickets with the highest risk scores confirm the trend: **only high and
    critical priority tasks carry the greatest risk**.'
  prefs: []
  type: TYPE_NORMAL
- en: This insight matters not only for managing the project timeline but also for
    its **financial impact on the business**. Delays don’t just slow down delivery,
    they increase costs, reduce client satisfaction, and consume valuable team resources.
  prefs: []
  type: TYPE_NORMAL
- en: To quantify this, we can estimate the **business value of the predictions**
    by simulating how much cost can be avoided when we anticipate risks and take preventive
    action.
  prefs: []
  type: TYPE_NORMAL
- en: Code by author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c96b3ae93bd83a600591abaecbf0545f.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: Our baseline shows that 27.6% of tickets are delayed. But what if Project Managers
    could focus only on the riskiest 20%? We will now simulate this targeted intervention
    and see how much impact it makes.
  prefs: []
  type: TYPE_NORMAL
- en: Code by author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/128ffb7b2a8afaad31ced40a40c3bc7a.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: We identified 1,021 high-risk tickets, representing about 20% of all tasks.
    Among them, 516 (50.5%) are actually delayed. In other words, these few tickets
    alone drive roughly 10% of total project delays.
  prefs: []
  type: TYPE_NORMAL
- en: To make this more concrete, we translate the impact into business terms with
    a medium-size project valued at $100,000\. By applying preventive actions on these
    high-risk tickets, we can estimate the potential cost savings.
  prefs: []
  type: TYPE_NORMAL
- en: Code by author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e8f3d13e0c4cd3b07800695d52534a52.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: By taking early actions, we could save **$9,270, nearly 10% of the total project
    cost**. That’s not just risk mitigation; it’s a direct business advantage.
  prefs: []
  type: TYPE_NORMAL
- en: '**PM Dashboard**'
  prefs: []
  type: TYPE_NORMAL
- en: To make these insights actionable, we can also build a **Project Management
    Dashboard**. It gives a real-time view of sprint health, with all the key KPIs
    needed to track progress, anticipate risks, and maintain a complete project overview.
  prefs: []
  type: TYPE_NORMAL
- en: Code by author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/197f42e885ffe08036b62ddc0ca83cd7.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: '**Model validation**'
  prefs: []
  type: TYPE_NORMAL
- en: We tested the robustness of the model with a 5-fold cross-validation. Recall
    was chosen as the main metric, because in project management it’s more important
    to catch potential delays than to maximize overall accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: Code by author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8305f1eddee05cfb9d599b3f6e7116a8.png)'
  prefs: []
  type: TYPE_IMG
- en: Results by author
  prefs: []
  type: TYPE_NORMAL
- en: The recall scores across folds ranged from 0.39 to 0.42\. This means the model
    is far from flawless, but it consistently flags around 40% of delays, a valuable
    early warning that helps project managers act before issues escalate.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In conclusion, this article showed how data science can help make projects smoother
    by providing a clearer understanding of the causes of delays.
  prefs: []
  type: TYPE_NORMAL
- en: Data doesn’t replace the intuition of a Project Manager, but it strengthens
    it,  much like giving a pilot better instruments to navigate with precision and
    with a better view of what is happening.
  prefs: []
  type: TYPE_NORMAL
- en: By predicting risks and identifying at-risk tickets, we can reduce delays, prevent
    conflicts, and ultimately deliver more value.
  prefs: []
  type: TYPE_NORMAL
- en: 'Project Managers should embrace data science. Today, there are two types of
    PMs: traditional ones and data-driven ones. They don’t compete in the same league.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Finally, these skills are not limited to project management. They extend to
    product management and business analysis. Learning SQL or Python enhances your
    ability to collaborate with developers, understand product performance, and communicate
    effectively across all levels of the business.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b409e16a4d1d543a8fff31e859e049ad.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Lesson for Project Managers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: How many of our project decisions are based on so-called “best practices” that
    are, in fact, unverified assumptions? Whether it’s about meeting schedules, team
    structure, or communication methods, data can help us challenge our biases and
    uncover what truly works.
  prefs: []
  type: TYPE_NORMAL
- en: 'Depending on the organization, the analysis can also go deeper: grouping tickets
    by project phase, field, or stakeholder may reveal hidden bottlenecks and systemic
    issues.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b9a82ba56dc939f1bb796c90d13f9175.png)'
  prefs: []
  type: TYPE_IMG
- en: How to detect and improve – Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, velocity often drops during the QA phase. Is it because QA engineers
    underperform? Not at all. They do their job very well. The real issue is the constant
    back-and-forth with developers: clarifying tickets, figuring out how testing should
    be performed, or asking for missing information.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To solve this, we introduced a simple process: developers now add clearer testing
    details in the ticket and spend five minutes on a quick handover call with QA.
    That small investment of time boosted team productivity and velocity by more than
    15%.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Who am I?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’m Yassin, an IT Project Manager who decided to learn Data Science, Python,
    and SQL to bridge the gap between business needs and technical solutions. This
    journey has taught me that the most valuable project insights come from combining
    domain expertise with data-driven approaches. Let’s connect on [LinkedIn](http://www.linkedin.com/in/yassin-zehar)
  prefs: []
  type: TYPE_NORMAL
