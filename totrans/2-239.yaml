- en: 'LLaVA on a Budget: Multimodal AI with Limited Resources'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/llava-on-a-budget-multimodal-ai-with-limited-resources/](https://towardsdatascience.com/llava-on-a-budget-multimodal-ai-with-limited-resources/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1750099237634" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the last couple of years, I have worked mainly with large language models,
    training, fine-tuning, prompting and so on, since this was highly requested in
    the market and by users. But I believe that LLMs that work mainly on text is only
    the beginning of GenAI. At a certain point, everybody will want **physical AI**,
    where models can see, hear, feel, and reason in a more grounded, human way.
  prefs: []
  type: TYPE_NORMAL
- en: So let’s get started with multimodality. In this notebook, I introduce LLaVA,
    an architecture capable of interpreting both images and text to generate multimodal
    responses.
  prefs: []
  type: TYPE_NORMAL
- en: In this tutorial, we are going to use a lighter-weight component suitable to
    run the notebook on a free-tier environment such as Google Colab.
  prefs: []
  type: TYPE_NORMAL
- en: 'The components we are going to use are:'
  prefs: []
  type: TYPE_NORMAL
- en: 1️⃣ **CLIP-ViT B/32** as the image encoder
  prefs: []
  type: TYPE_NORMAL
- en: 2️⃣ **TinyLlama-1.1B** as the language model
  prefs: []
  type: TYPE_NORMAL
- en: 3️⃣ A **2-layer MLP adapter** to bridge the two
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/03bb9b263c928512bcce0fb7ec9bfd33.png)'
  prefs: []
  type: TYPE_IMG
- en: From the paper [Visual Instruction Tuning](https://www.google.com/url?q=https%3A%2F%2Farxiv.org%2Fpdf%2F2304.08485) (NeurIPS
    2023)
  prefs: []
  type: TYPE_NORMAL
- en: Setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before we can dive into the code, let’s set up our environment.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s first install the datasets library.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: We now need to import the required packages from Hugging Face and PyTorch. These
    imports provide pre-trained models and utilities for multimodal processing.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Download pre-trained model components
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Our LLaVA model will be composed of:'
  prefs: []
  type: TYPE_NORMAL
- en: A pre-trained **CLIP** encoder [openai/clip-vit-base-patch32](https://huggingface.co/openai/clip-vit-base-patch32)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/8e202e20a952f40f2e0903f10d5dfaa9.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image source: [https://arxiv.org/pdf/2103.00020](https://arxiv.org/pdf/2103.00020)'
  prefs: []
  type: TYPE_NORMAL
- en: A pre-trained **Tiny LLaMA** decoder [TinyLlama/TinyLlama-1.1B-Chat-v1.0](https://huggingface.co/TinyLlama/TinyLlama-1.1B-Chat-v1.0)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A 2-layer MLP projector between the two
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The `hf_hub_download` is a hub we are exploring in order to retrieve pre-trained
    weights:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Instantiate a new LLaVA model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s now instantiate a new LlaVA model. As explained above, a LlaVA model is
    composed of two parts, a visual encoder and a textual decoder that we have just
    downloaded.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: We specify the backbone models in the LlaVA config. We then instantiate the
    actual model with **`LlavaForConditionalGeneration(llava_config)`**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Perform some surgical operations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/67128520255e5c1bc575a12bf24bd264.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image source: [https://unsplash.com/photos/doctor-having-operation-E285pJbC4uE](https://unsplash.com/photos/doctor-having-operation-E285pJbC4uE)*'
  prefs: []
  type: TYPE_NORMAL
- en: Previously, we said we could construct an LLaVA model by starting from a pre-trained
    image encoder and a pre-trained LLM. Let’s do just that!
  prefs: []
  type: TYPE_NORMAL
- en: The original LLaVA model is initialised from a **CLIP-ViT L/14** and a **Vicuna
    v1.5 7B**. To make things more manageable with the resources provided by the free
    plan of Google Colab, we’ll use a **CLIP-ViT B/16** and a **TinyLlama 1.1B**.
  prefs: []
  type: TYPE_NORMAL
- en: '**The only component we’ll train is a 2-layer MLP adapter in between them.**'
  prefs: []
  type: TYPE_NORMAL
- en: In order to use the CLIP and TinyLlama models, we need to load their pre-trained
    weights. But these weights can come in different formats like .safetensors or
    .bin. The load_weights function handles this for us. It checks the file type and
    calls the right loading function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: ''
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Inject the vision backbone’s weights into the model 💉
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next lines loads the weights into the vision part of the model. We set *strict=False*
    to be flexible since it allows us to skip any weights that don’t perfectly match
    the model’s expected structure.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Inject the text backbone’s weights into the model 💉
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Same logic as before, but also for the text model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Freeze the pre-trained components ❄️
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We want now to freeze the backbone visual and text models, because we don’t
    want to update their weights while training.
  prefs: []
  type: TYPE_NORMAL
- en: We will only train the small adapter (the MLP that connects vision and language),
    which is much lighter and faster to train.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Processor
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before feeding some text into our model, we need to convert words into numbers.
    This is what the tokenizer is needed for.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Below is the format we’ll use to chat with our LLaVA model.
  prefs: []
  type: TYPE_NORMAL
- en: The first part is the so-called *system prompt*, which contains general guidelines
    for how the model should respond to the user.
  prefs: []
  type: TYPE_NORMAL
- en: The second part is a Jinja template (basically code) that determines how the
    conversation is rendered based on some structured input (see example below).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Let’s apply the chat template to our samples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: At this point we’ve set up our tokenizer and downloaded the vision model. We
    bring them together into one unified **processor**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Since we added special tokens like `<image>` and `<pad>` to our tokenizer earlier,
    the model needs to **adjust its vocabulary** to understand them too
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s download the dataset we are going to use from Hugging Face.
  prefs: []
  type: TYPE_NORMAL
- en: The dataset containing samples of image-text couples is publicly available and
    can be found [here](https://huggingface.co/datasets/HuggingFaceH4/llava-instruct-mix-vsft).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: ''
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What do our training examples look like?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: How do we build a batch of examples?
  prefs: []
  type: TYPE_NORMAL
- en: The following function takes raw image-text examples and turns them into model-ready
    inputs. It formats the messages using the chat template, processes both the text
    and image with the `LlavaProcessor` we defined previously, and creates proper
    training labels while ignoring padding.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: Training
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s finally define the training arguments, including batch size, learning
    rate, total steps, and use mixed precision (fp16) for speed. We also avoid saving
    checkpoints to keep things light. Then we wrap everything into a `Seq2SeqTrainer`passing
    in the model, dataset, and our custom collator for image-text inputs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: Inference
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To be noted that to make sure inference works as expected you should use heavier
    models, and train for longer time.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll use this image for inference:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4fe6cf46918b5b58370950f19adcc357.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image source: [https://it.wikipedia.org/wiki/Gioconda#/media/File:Mona_Lisa,_by_Leonardo_da_Vinci,_from_C2RMF_retouched.jpg](https://it.wikipedia.org/wiki/Gioconda#/media/File:Mona_Lisa,_by_Leonardo_da_Vinci,_from_C2RMF_retouched.jpg)*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: In this cell block as an example, we load an image from a URL and format a conversation
    using the chat template. The processor turns both into tensors. Then we move the
    input to the model’s device and generate a response, letting the model describe
    the image based on the user’s prompt.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: Extensions and improvements
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Use a larger image encoder (e.g. **CLIP-ViT Large**) and LLM (e.g. **Llama 3.1
    8B**)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Train for longer. It takes some time for the model to figure out how to follow
    instructions in the presence of image features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Follow the multi-stage training procedure adopted by the original LLaVA
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stage 1: Pre-training for Feature Alignment** –> train the model on single-turn
    instruction data, where it is asked to briefly describe the picture. Image encoder
    and LLM are frozen'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stage 2: Fine-tuning End-to-End** –> train the model on multi-turn instruction
    data. Only the image encoder is frozen'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Working demo: [huggingface.co/spaces/badayvedat/LLaVA](https://www.google.com/url?q=https%3A%2F%2Fhuggingface.co%2Fspaces%2Fbadayvedat%2FLLaVA)
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I think this small project is interesting to better understand how multimodal
    models like LLaVA work. Even if we used smaller models, the main idea is the same:
    combine vision and language into one system that can understand images and talk
    about them.'
  prefs: []
  type: TYPE_NORMAL
- en: Of course, the results obtained in this toy example are not really good; there
    is a lot of space for improvement. But making LLaVA work in an environment with
    limited resources is quite challenging
  prefs: []
  type: TYPE_NORMAL
- en: Follow me on [TDS](https://towardsdatascience.com/author/marcellopoliti/) if
    you like this article! 😁
  prefs: []
  type: TYPE_NORMAL
- en: 💼 Linkedin ️| 🐦 X (Twitter) | 💻 Website
  prefs: []
  type: TYPE_NORMAL
