- en: 'LLaVA on a Budget: Multimodal AI with Limited Resources'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 'LLaVA on a Budget: Multimodal AI with Limited Resources'
- en: 原文：[https://towardsdatascience.com/llava-on-a-budget-multimodal-ai-with-limited-resources/](https://towardsdatascience.com/llava-on-a-budget-multimodal-ai-with-limited-resources/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/llava-on-a-budget-multimodal-ai-with-limited-resources/](https://towardsdatascience.com/llava-on-a-budget-multimodal-ai-with-limited-resources/)
- en: <mdspan datatext="el1750099237634" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1750099237634" class="mdspan-comment">简介</mdspan>
- en: In the last couple of years, I have worked mainly with large language models,
    training, fine-tuning, prompting and so on, since this was highly requested in
    the market and by users. But I believe that LLMs that work mainly on text is only
    the beginning of GenAI. At a certain point, everybody will want **physical AI**,
    where models can see, hear, feel, and reason in a more grounded, human way.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去几年里，我主要与大型语言模型一起工作，进行训练、微调、提示等等，因为这在市场和用户中需求很高。但我相信，主要在文本上工作的 LLM 只是 GenAI
    的开始。在某个时刻，每个人都会想要 **物理 AI**，其中模型可以看、听、感受并以更接地气、更人性化的方式推理。
- en: So let’s get started with multimodality. In this notebook, I introduce LLaVA,
    an architecture capable of interpreting both images and text to generate multimodal
    responses.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们开始多模态处理。在这个笔记本中，我介绍了 LLaVA，这是一个能够解释图像和文本以生成多模态响应的架构。
- en: In this tutorial, we are going to use a lighter-weight component suitable to
    run the notebook on a free-tier environment such as Google Colab.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个教程中，我们将使用一个更轻量级的组件，适合在 Google Colab 等免费层环境中运行笔记本。
- en: 'The components we are going to use are:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要使用的组件是：
- en: 1️⃣ **CLIP-ViT B/32** as the image encoder
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 1️⃣ **CLIP-ViT B/32** 作为图像编码器
- en: 2️⃣ **TinyLlama-1.1B** as the language model
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 2️⃣ **TinyLlama-1.1B** 作为语言模型
- en: 3️⃣ A **2-layer MLP adapter** to bridge the two
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 3️⃣ 一个 **2 层 MLP 适配器** 来连接两者
- en: '![](../Images/03bb9b263c928512bcce0fb7ec9bfd33.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/03bb9b263c928512bcce0fb7ec9bfd33.png)'
- en: From the paper [Visual Instruction Tuning](https://www.google.com/url?q=https%3A%2F%2Farxiv.org%2Fpdf%2F2304.08485) (NeurIPS
    2023)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 来自论文 [Visual Instruction Tuning](https://www.google.com/url?q=https%3A%2F%2Farxiv.org%2Fpdf%2F2304.08485)
    (NeurIPS 2023)
- en: Setup
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置
- en: Before we can dive into the code, let’s set up our environment.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入代码之前，让我们设置我们的环境。
- en: Let’s first install the datasets library.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先安装数据集库。
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: We now need to import the required packages from Hugging Face and PyTorch. These
    imports provide pre-trained models and utilities for multimodal processing.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在需要从 Hugging Face 和 PyTorch 导入所需的包。这些导入提供了预训练模型和多模态处理的实用工具。
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Download pre-trained model components
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下载预训练模型组件
- en: 'Our LLaVA model will be composed of:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的 LLaVA 模型将由以下部分组成：
- en: A pre-trained **CLIP** encoder [openai/clip-vit-base-patch32](https://huggingface.co/openai/clip-vit-base-patch32)
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个预训练的 **CLIP** 编码器 [openai/clip-vit-base-patch32](https://huggingface.co/openai/clip-vit-base-patch32)
- en: '![](../Images/8e202e20a952f40f2e0903f10d5dfaa9.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8e202e20a952f40f2e0903f10d5dfaa9.png)'
- en: 'Image source: [https://arxiv.org/pdf/2103.00020](https://arxiv.org/pdf/2103.00020)'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：[https://arxiv.org/pdf/2103.00020](https://arxiv.org/pdf/2103.00020)
- en: A pre-trained **Tiny LLaMA** decoder [TinyLlama/TinyLlama-1.1B-Chat-v1.0](https://huggingface.co/TinyLlama/TinyLlama-1.1B-Chat-v1.0)
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个预训练的 **Tiny LLaMA** 解码器 [TinyLlama/TinyLlama-1.1B-Chat-v1.0](https://huggingface.co/TinyLlama/TinyLlama-1.1B-Chat-v1.0)
- en: A 2-layer MLP projector between the two
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两个之间的 2 层 MLP 投影器
- en: 'The `hf_hub_download` is a hub we are exploring in order to retrieve pre-trained
    weights:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '`hf_hub_download` 是我们正在探索的一个 hub，用于检索预训练权重：'
- en: '[PRE2]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Model
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型
- en: Instantiate a new LLaVA model
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实例化一个新的 LLaVA 模型
- en: Let’s now instantiate a new LlaVA model. As explained above, a LlaVA model is
    composed of two parts, a visual encoder and a textual decoder that we have just
    downloaded.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们实例化一个新的 LlaVA 模型。如上所述，一个 LlaVA 模型由两部分组成，一个视觉编码器和一个文本解码器，我们刚刚已经下载了。
- en: '[PRE4]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We specify the backbone models in the LlaVA config. We then instantiate the
    actual model with **`LlavaForConditionalGeneration(llava_config)`**.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在 LlaVA 配置中指定了骨干模型。然后我们使用 `LlavaForConditionalGeneration(llava_config)` 实例化实际的模型。
- en: '[PRE5]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '[PRE6]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Perform some surgical operations
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 执行一些手术操作
- en: '![](../Images/67128520255e5c1bc575a12bf24bd264.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/67128520255e5c1bc575a12bf24bd264.png)'
- en: '*Image source: [https://unsplash.com/photos/doctor-having-operation-E285pJbC4uE](https://unsplash.com/photos/doctor-having-operation-E285pJbC4uE)*'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '*图片来源：[https://unsplash.com/photos/doctor-having-operation-E285pJbC4uE](https://unsplash.com/photos/doctor-having-operation-E285pJbC4uE)*'
- en: Previously, we said we could construct an LLaVA model by starting from a pre-trained
    image encoder and a pre-trained LLM. Let’s do just that!
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 之前，我们提到我们可以从一个预训练的图像编码器和一个预训练的 LLM 开始构建一个 LLaVA 模型。让我们就这样做吧！
- en: The original LLaVA model is initialised from a **CLIP-ViT L/14** and a **Vicuna
    v1.5 7B**. To make things more manageable with the resources provided by the free
    plan of Google Colab, we’ll use a **CLIP-ViT B/16** and a **TinyLlama 1.1B**.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 原始LLaVA模型是从**CLIP-ViT L/14**和**Vicuna v1.5 7B**初始化的。为了更好地利用Google Colab免费计划提供的资源，我们将使用**CLIP-ViT
    B/16**和**TinyLlama 1.1B**。
- en: '**The only component we’ll train is a 2-layer MLP adapter in between them.**'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们唯一要训练的组件是它们之间一个2层的MLP适配器。**'
- en: In order to use the CLIP and TinyLlama models, we need to load their pre-trained
    weights. But these weights can come in different formats like .safetensors or
    .bin. The load_weights function handles this for us. It checks the file type and
    calls the right loading function.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用CLIP和TinyLlama模型，我们需要加载它们的预训练权重。但这些权重可以以不同的格式出现，如.safetensors或.bin。`load_weights`函数为我们处理这些。
- en: '[PRE7]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: ''
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Inject the vision backbone’s weights into the model 💉
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将视觉主干权重注入到模型 💉
- en: The next lines loads the weights into the vision part of the model. We set *strict=False*
    to be flexible since it allows us to skip any weights that don’t perfectly match
    the model’s expected structure.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的几行将权重加载到模型的视觉部分。我们设置*strict=False*以保持灵活性，因为它允许我们跳过任何与模型预期结构不完全匹配的权重。
- en: '[PRE9]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Inject the text backbone’s weights into the model 💉
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将文本主干权重注入到模型 💉
- en: Same logic as before, but also for the text model.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前相同的逻辑，但也适用于文本模型。
- en: '[PRE10]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Freeze the pre-trained components ❄️
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 冻结预训练组件 ❄️
- en: We want now to freeze the backbone visual and text models, because we don’t
    want to update their weights while training.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在想要冻结视觉和文本模型的主干，因为我们不希望在训练时更新它们的权重。
- en: We will only train the small adapter (the MLP that connects vision and language),
    which is much lighter and faster to train.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将只训练小型适配器（连接视觉和语言的MLP），它更轻量且训练速度更快。
- en: '[PRE11]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '[PRE12]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Processor
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理器
- en: Before feeding some text into our model, we need to convert words into numbers.
    This is what the tokenizer is needed for.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在将一些文本输入到我们的模型之前，我们需要将单词转换为数字。这就是分词器所需要的。
- en: '[PRE13]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Below is the format we’ll use to chat with our LLaVA model.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们将与我们的LLaVA模型进行聊天的格式。
- en: The first part is the so-called *system prompt*, which contains general guidelines
    for how the model should respond to the user.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部分是所谓的*系统提示*，它包含模型应该如何响应用户的一般指南。
- en: The second part is a Jinja template (basically code) that determines how the
    conversation is rendered based on some structured input (see example below).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分是一个Jinja模板（基本上是代码），它根据一些结构化输入（见下例）确定如何渲染对话。
- en: '[PRE14]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '[PRE15]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Let’s apply the chat template to our samples.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将聊天模板应用到我们的样本上。
- en: '[PRE16]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: At this point we’ve set up our tokenizer and downloaded the vision model. We
    bring them together into one unified **processor**.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经设置了我们的分词器并下载了视觉模型。我们将它们组合成一个统一的**处理器**。
- en: '[PRE17]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Since we added special tokens like `<image>` and `<pad>` to our tokenizer earlier,
    the model needs to **adjust its vocabulary** to understand them too
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们在分词器中添加了特殊标记如`<image>`和`<pad>`，因此模型也需要**调整其词汇表**以理解它们。
- en: '[PRE18]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Dataset
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集
- en: Let’s download the dataset we are going to use from Hugging Face.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从Hugging Face下载我们将要使用的数据集。
- en: The dataset containing samples of image-text couples is publicly available and
    can be found [here](https://huggingface.co/datasets/HuggingFaceH4/llava-instruct-mix-vsft).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 包含图像-文本对样本的数据集是公开可用的，可以在[这里](https://huggingface.co/datasets/HuggingFaceH4/llava-instruct-mix-vsft)找到。
- en: '[PRE19]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: ''
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What do our training examples look like?
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的训练示例看起来是什么样子？
- en: '[PRE20]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: How do we build a batch of examples?
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何构建一批示例？
- en: The following function takes raw image-text examples and turns them into model-ready
    inputs. It formats the messages using the chat template, processes both the text
    and image with the `LlavaProcessor` we defined previously, and creates proper
    training labels while ignoring padding.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的函数将原始图像-文本示例转换为模型输入。它使用聊天模板格式化消息，使用我们之前定义的`LlavaProcessor`处理文本和图像，并在忽略填充的同时创建适当的训练标签。
- en: '[PRE21]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Training
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练
- en: Let’s finally define the training arguments, including batch size, learning
    rate, total steps, and use mixed precision (fp16) for speed. We also avoid saving
    checkpoints to keep things light. Then we wrap everything into a `Seq2SeqTrainer`passing
    in the model, dataset, and our custom collator for image-text inputs.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们定义训练参数，包括批量大小、学习率、总步数，并使用混合精度（fp16）以提高速度。我们还避免保存检查点以保持内容轻量。然后我们将所有内容包装进一个`Seq2SeqTrainer`，传入模型、数据集以及我们为图像-文本输入自定义的collator。
- en: '[PRE22]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '[PRE23]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Inference
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推理
- en: To be noted that to make sure inference works as expected you should use heavier
    models, and train for longer time.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，为了确保推理按预期工作，您应该使用更重的模型，并延长训练时间。
- en: 'We’ll use this image for inference:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用这张图片进行推理：
- en: '![](../Images/4fe6cf46918b5b58370950f19adcc357.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4fe6cf46918b5b58370950f19adcc357.png)'
- en: '*Image source: [https://it.wikipedia.org/wiki/Gioconda#/media/File:Mona_Lisa,_by_Leonardo_da_Vinci,_from_C2RMF_retouched.jpg](https://it.wikipedia.org/wiki/Gioconda#/media/File:Mona_Lisa,_by_Leonardo_da_Vinci,_from_C2RMF_retouched.jpg)*'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '*图片来源：[https://it.wikipedia.org/wiki/Gioconda#/media/File:Mona_Lisa,_by_Leonardo_da_Vinci,_from_C2RMF_retouched.jpg](https://it.wikipedia.org/wiki/Gioconda#/media/File:Mona_Lisa,_by_Leonardo_da_Vinci,_from_C2RMF_retouched.jpg)*'
- en: '[PRE24]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: In this cell block as an example, we load an image from a URL and format a conversation
    using the chat template. The processor turns both into tensors. Then we move the
    input to the model’s device and generate a response, letting the model describe
    the image based on the user’s prompt.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 以这个单元格块为例，我们从URL加载一张图片，并使用聊天模板格式化对话。处理器将两者都转换为张量。然后我们将输入移动到模型的设备上，并生成一个响应，让模型根据用户的提示描述图片。
- en: '[PRE25]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: '[PRE26]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Extensions and improvements
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩展和改进
- en: Use a larger image encoder (e.g. **CLIP-ViT Large**) and LLM (e.g. **Llama 3.1
    8B**)
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用更大的图像编码器（例如 **CLIP-ViT Large**）和LLM（例如 **Llama 3.1 8B**）
- en: Train for longer. It takes some time for the model to figure out how to follow
    instructions in the presence of image features
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 延长训练时间。模型需要一些时间来弄清楚如何在图像特征存在的情况下遵循指令
- en: Follow the multi-stage training procedure adopted by the original LLaVA
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按照原始LLaVA采用的分阶段训练程序进行
- en: '**Stage 1: Pre-training for Feature Alignment** –> train the model on single-turn
    instruction data, where it is asked to briefly describe the picture. Image encoder
    and LLM are frozen'
  id: totrans-97
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第一阶段：特征对齐的预训练** –> 在单轮指令数据上训练模型，要求其简要描述图片。图像编码器和LLM被冻结'
- en: '**Stage 2: Fine-tuning End-to-End** –> train the model on multi-turn instruction
    data. Only the image encoder is frozen'
  id: totrans-98
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第二阶段：端到端微调** –> 在多轮指令数据上训练模型。只有图像编码器被冻结'
- en: Working demo: [huggingface.co/spaces/badayvedat/LLaVA](https://www.google.com/url?q=https%3A%2F%2Fhuggingface.co%2Fspaces%2Fbadayvedat%2FLLaVA)
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 工作演示：[huggingface.co/spaces/badayvedat/LLaVA](https://www.google.com/url?q=https%3A%2F%2Fhuggingface.co%2Fspaces%2Fbadayvedat%2FLLaVA)
- en: Conclusion
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'I think this small project is interesting to better understand how multimodal
    models like LLaVA work. Even if we used smaller models, the main idea is the same:
    combine vision and language into one system that can understand images and talk
    about them.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这个小型项目有助于更好地理解多模态模型如LLaVA的工作方式。即使我们使用了较小的模型，主要思想是相同的：将视觉和语言结合成一个系统，该系统能够理解图像并对其进行讨论。
- en: Of course, the results obtained in this toy example are not really good; there
    is a lot of space for improvement. But making LLaVA work in an environment with
    limited resources is quite challenging
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，在这个玩具示例中获得的结果并不真正好；有很多改进的空间。但让LLaVA在资源有限的环境中工作是非常具有挑战性的
- en: Follow me on [TDS](https://towardsdatascience.com/author/marcellopoliti/) if
    you like this article! 😁
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢这篇文章，请关注我[TDS](https://towardsdatascience.com/author/marcellopoliti/)！
    😁
