- en: Example 2 — Calculate pi using Monte Carlo
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For our second example, we’ll examine a more complex use case, the foundation
    of which has numerous real-world applications.
  prefs: []
  type: TYPE_NORMAL
- en: An area where Cython can show significant performance improvement is in numerical
    simulations, particularly those involving heavy computation, such as Monte Carlo
    (MC) simulations. Monte Carlo simulations involve running many iterations of a
    random process to estimate the properties of a system. MC applies to a wide variety
    of study fields, including climate and atmospheric science, computer graphics,
    AI search and quantitative finance. It is almost always a very computationally
    intensive process.
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate, we’ll use Monte Carlo in a simplified manner to calculate the
    value of Pi. This is a well-known example where we take a square with a side length
    of one unit and inscribe a quarter circle inside it with a radius of one unit,
    as shown here.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8e25e4cf78db35e560e557bf28d6baa9.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by AI (GPT-4o)
  prefs: []
  type: TYPE_NORMAL
- en: The ratio of the area of the quarter circle to the area of the square is, obviously,
    (Pi/4).
  prefs: []
  type: TYPE_NORMAL
- en: So, if we consider many random (x,y) points that all lie within or on the bounds
    of the square, as the total number of these points tends to infinity, the ratio
    of points that lie on or inside the quarter circle to the total number of points
    tends towards Pi /4\. We then multiply this value by 4 to obtain the value of
    Pi itself.
