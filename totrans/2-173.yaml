- en: What about running Cython outside a Notebook environment?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So far, everything I’ve shown you assumes you’re running your code inside a
    Jupyter Notebook. The reason I did this is that it’s the easiest way to introduce
    Cython and get some code up and running quickly. While the Notebook environment
    is extremely popular among Python developers, a huge amount of Python code is
    still contained in regular .py files and run from a terminal using the Python
    command.
  prefs: []
  type: TYPE_NORMAL
- en: If that’s your primary mode of coding and running Python scripts, the **%load_ext**
    and **%%cython** IPython magic commands won’t work since those are only understood
    by Jupyter/IPython.
  prefs: []
  type: TYPE_NORMAL
- en: So, here’s how to adapt my four-step Cython conversion process if you’re running
    your code as a regular Python script.
  prefs: []
  type: TYPE_NORMAL
