  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何评估 RAG 管道的检索质量（第二部分）：平均倒数排名 (MRR) 和平均精度 (AP)
- en: 原文：[https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-part-2-mean-reciprocal-rank-mrr-and-average-precision-ap/](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-part-2-mean-reciprocal-rank-mrr-and-average-precision-ap/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-part-2-mean-reciprocal-rank-mrr-and-average-precision-ap/](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-part-2-mean-reciprocal-rank-mrr-and-average-precision-ap/)
- en: '*If you missed **Part 1: [How to Evaluate Retrieval Quality in RAG Pipelines](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)**,
    check it out [**here**](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果您错过了**第一部分：[如何评估 RAG 管道的检索质量](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)**，请在此处查看[**这里**](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)*'
- en: '[In my previous post](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/),
    I took a look at <mdspan datatext="el1762375116016" class="mdspan-comment">why
    it is important</mdspan> to evaluate the retrieval quality of a RAG pipeline,
    as well as some basic metrics for doing so. More specifically, that first part
    mainly focused on binary, order-unaware measures, essentially evaluating if relevant
    results exist in the retrieved set or not. In this second part, we are going to
    further explore binary, order-aware measures. That is, measures that take into
    account the ranking with which each relevant result is retrieved, apart from evaluating
    if it is retrieved or not. So, in this post, we are going to take a closer look
    at two commonly used binary, order-aware metrics: **Mean Reciprocal Rank (MRR)**
    and **Average Precision (AP).**'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '[在我之前的文章中](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/),
    我探讨了为什么评估 RAG 管道的检索质量很重要，以及进行此类评估的一些基本指标。更具体地说，第一部分主要关注二元、无序度量的指标，本质上是在评估检索集中是否存在相关结果。在这第二部分，我们将进一步探讨二元、有序度量的指标。也就是说，这些指标不仅考虑了相关结果被检索的排名，而且还评估了它是否被检索。因此，在这篇文章中，我们将更深入地探讨两个常用的二元、有序度量指标：**平均倒数排名
    (MRR)** 和 **平均精度 (AP)**。'
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why ranking matters in retrieval evaluation
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么排名在检索评估中很重要
- en: Effective retrieval is really important in a RAG pipeline, given that a good
    retrieval mechanism is the very first step for generating valid answers, grounded
    in our documents. Otherwise, if the correct documents that contain the needed
    information cannot be identified in the first place, no AI magic can fix this
    and provide valid answers.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在 RAG 管道中，有效的检索非常重要，因为一个好的检索机制是生成有效答案的第一步，这些答案基于我们的文档。否则，如果包含所需信息的正确文档最初无法识别，那么任何人工智能魔法都无法解决这个问题并提供有效答案。
- en: 'We can distinguish between two large categories of retrieval quality evaluation
    measures: binary and graded measures. More specifically, binary measures categorize
    a retrieved chunk either as relevant or irrelevant, with no in-between situations.
    On the flip side, when using graded measures, we consider that the relevance of
    a chunk to the user’s query is rather a spectrum, and in this way, a retrieved
    chunk can be more or less relevant.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将检索质量评估的指标分为两大类：二元和分级指标。更具体地说，二元指标将检索到的片段分类为相关或不相关，没有中间状态。另一方面，当使用分级指标时，我们认为一个片段对用户查询的相关性更像是一个连续体，因此，检索到的片段可以更有或更少的相关性。
- en: Binary measures can be further divided into order-unaware and order-aware measures.
    Order-unaware measures evaluate whether a chunk exists in the retrieved set or
    not, regardless of the ranking with which it was retrieved. [In my latest post,](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)
    we took a detailed look at the most common binary, order-unaware measures, and
    ran an in-depth code example in Python. Namely, we went over **HitRate@K, Precision@K,
    Recall@K, and F1@K**. In contrast, binary, order-aware measures, apart from considering
    if chunks exist or not in the retrieved set, also take into account the *ranking*
    with which they are retrieved.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 二进制度量可以进一步分为无序度量和无序度量。无序度量评估一个块是否存在于检索集中，而不考虑它是如何检索的排名。[在我的最新文章中，](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)
    我们详细探讨了最常见的二进制无序度量，并在Python中进行了深入的代码示例。具体来说，我们讨论了**HitRate@K, Precision@K, Recall@K,
    和 F1@K**。相比之下，二进制有序度量除了考虑块是否存在于检索集中，还考虑了它们检索时的**排名**。
- en: Thereby, in today’s post, we are going to have a more detailed look at the most
    commonly used binary order-aware retrieval metrics, such as **MRR** and **AP**,
    and also check out how these can be calculated in Python.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在今天的文章中，我们将更详细地探讨最常用的二进制有序检索指标，如**MRR**和**AP**，并检查这些如何在Python中计算。
- en: '* * *'
  id: totrans-10
