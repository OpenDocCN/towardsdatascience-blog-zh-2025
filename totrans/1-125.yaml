- en: 'How to Evaluate Retrieval Quality in RAG Pipelines (part 2): Mean Reciprocal
    Rank (MRR) and Average Precision (AP)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-part-2-mean-reciprocal-rank-mrr-and-average-precision-ap/](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-part-2-mean-reciprocal-rank-mrr-and-average-precision-ap/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*If you missed **Part 1: [How to Evaluate Retrieval Quality in RAG Pipelines](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)**,
    check it out [**here**](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)*'
  prefs: []
  type: TYPE_NORMAL
- en: '[In my previous post](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/),
    I took a look at <mdspan datatext="el1762375116016" class="mdspan-comment">why
    it is important</mdspan> to evaluate the retrieval quality of a RAG pipeline,
    as well as some basic metrics for doing so. More specifically, that first part
    mainly focused on binary, order-unaware measures, essentially evaluating if relevant
    results exist in the retrieved set or not. In this second part, we are going to
    further explore binary, order-aware measures. That is, measures that take into
    account the ranking with which each relevant result is retrieved, apart from evaluating
    if it is retrieved or not. So, in this post, we are going to take a closer look
    at two commonly used binary, order-aware metrics: **Mean Reciprocal Rank (MRR)**
    and **Average Precision (AP).**'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Why ranking matters in retrieval evaluation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Effective retrieval is really important in a RAG pipeline, given that a good
    retrieval mechanism is the very first step for generating valid answers, grounded
    in our documents. Otherwise, if the correct documents that contain the needed
    information cannot be identified in the first place, no AI magic can fix this
    and provide valid answers.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can distinguish between two large categories of retrieval quality evaluation
    measures: binary and graded measures. More specifically, binary measures categorize
    a retrieved chunk either as relevant or irrelevant, with no in-between situations.
    On the flip side, when using graded measures, we consider that the relevance of
    a chunk to the user’s query is rather a spectrum, and in this way, a retrieved
    chunk can be more or less relevant.'
  prefs: []
  type: TYPE_NORMAL
- en: Binary measures can be further divided into order-unaware and order-aware measures.
    Order-unaware measures evaluate whether a chunk exists in the retrieved set or
    not, regardless of the ranking with which it was retrieved. [In my latest post,](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)
    we took a detailed look at the most common binary, order-unaware measures, and
    ran an in-depth code example in Python. Namely, we went over **HitRate@K, Precision@K,
    Recall@K, and F1@K**. In contrast, binary, order-aware measures, apart from considering
    if chunks exist or not in the retrieved set, also take into account the *ranking*
    with which they are retrieved.
  prefs: []
  type: TYPE_NORMAL
- en: Thereby, in today’s post, we are going to have a more detailed look at the most
    commonly used binary order-aware retrieval metrics, such as **MRR** and **AP**,
    and also check out how these can be calculated in Python.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '*I write 🍨[**DataCream**](https://datacream.substack.com/), where I’m learning
    and experimenting with AI and data. **[Subscribe here](https://datacream.substack.com/)**
    to learn and explore with me.*'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Some order-aware, binary measures
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, binary, order-unaware measures like Precision@K or Recall@K tell us whether
    the correct documents are somewhere in the top k chunks or not, but don’t indicate
    if a document is scoring at the top or at the very bottom of those k chunks. And
    this exact information is what order-aware measures provide us. Some very useful
    and commonly used order-unaware measures are **Mean Reciprocal Rank (MRR)** and
    **Average Precision (AP)**. But let’s see all these in some more detail.
  prefs: []
  type: TYPE_NORMAL
- en: 🎯 Mean Reciprocal Rank (MRR)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A commonly used order-aware measure for evaluating retrieval is [Mean Reciprocal
    Rank (MRR)](https://en.wikipedia.org/wiki/Mean_reciprocal_rank). Taking one step
    back, the Reciprocal Rank (RR) expresses *in what ranking the first truly relevant
    result is found*, among the top k retrieved results. More precisely, it measures
    how high the first relevant result appears in the ranking. RR can be calculated
    as follows, with *rank_i* being the rank the first relevant result is found:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9413e155a6538f9fe11e4129ca8f0c4a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'We can also visually explore this calculation with the following example:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d3fd73384f8b540f10a6737086004737.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: We can now put together the **Mean Reciprocal Rank (MRR)**. MRR expresses the
    *average* position of the first relevant item across different result sets.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eaa6a6aae52783ae51849a006be4523e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: In this way, MRR can range from 0 to 1\. That is, the higher the MRR, the higher
    in the ranking the first relevant document appears.
  prefs: []
  type: TYPE_NORMAL
- en: A real-life example where a metric like MRR can be useful for evaluating the
    retrieval step of a RAG pipeline would be any fast-paced environment, where quick
    decision-making is needed, and we need to make sure that a truly relevant result
    emerges at the top of the search. It works well for assessing systems where just
    one relevant result is enough, and significant information is not scattered across
    multiple text chunks.
  prefs: []
  type: TYPE_NORMAL
- en: A good metaphor to further understand MRR as a retrieval evaluation metric is
    Google Search. We think of Google as a good search engine because you can find
    what you are looking for in the top results. If you had to scroll down to result
    150 to actually find what you are looking for, you wouldn’t think of it as a good
    search engine. Similarly, a good vector search mechanism in a RAG pipeline should
    surface the relevant chunks in reasonably high rankings and thus score a reasonably
    high MRR.
  prefs: []
  type: TYPE_NORMAL
- en: 🎯 Average Precision (AP)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In my previous post on binary, order-unaware retrieval measures, we took a
    look specifically at Precision@k. In particular, Precision@k indicates how many
    of the top k retrieved documents are indeed relevant. Precision@k can be calculated
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f478f0f6db5e8828f31ccb0c37d4448a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: '**Average Precision (AP)** further builds on that idea. More specifically,
    to calculate AP, we need to initially iteratively calculate Precision@k for each
    k when a new, relevant item appears. Then we can calculate AP by simply calculating
    the average of those Precision@k scores.'
  prefs: []
  type: TYPE_NORMAL
- en: But let’s see an illustrative example of this calculation. For this example
    set, we notice that new relevant chunks are introduced in the retrieved set for
    k = 1 and k = 4.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c6becfd223fc6c7871002bbf4f004721.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Thus, we calculate the Precision@1 and Precision@4, and then take their average.
    That will be (1/1 + 2/4)/ 2 = (1 + 0.5)/ 2 = 0.75\.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can then generalize the calculation of AP as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8c521ff8ac11d4cf1edd4e6ab72f3cab.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Again, AP can range from 0 to 1\. More specifically, the higher the AP score,
    the more consistently our retrieval system ranks relevant documents towards the
    top. In other words, the more relevant documents are retrieved and the more they
    appear *before* the irrelevant ones.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike MRR, which focuses only on the first relevant result, AP takes into account
    the ranking of all the retrieved relevant chunks. It essentially quantifies how
    much or how little garbage we get along, while retrieving the truly relevant items,
    for various top k.
  prefs: []
  type: TYPE_NORMAL
- en: To get a better grip on AP and MRR, we can also imagine them in the context
    of a Spotify playlist. Similarly to the Google Search example, a high MRR would
    mean that the first song of the playlist is our favorite song. On the flip side,
    a high AP would mean that *the entire playlist* is good, and many of our favorite
    songs appear frequently and towards the top of the playlist.
  prefs: []
  type: TYPE_NORMAL
- en: So, is our vector search any good?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Normally, I would continue this section with the *War and Peace* example, as
    I’ve done in my [other RAG tutorials](https://towardsdatascience.com/rag-explained-reranking-for-better-answers/).
    However, the full retrieval code is getting quite large to include in every post.
    Instead, in this post, I’ll focus on showing how to calculate these metrics in
    Python, doing my best to keep the examples concise.
  prefs: []
  type: TYPE_NORMAL
- en: 'Anyways! Let’s see how **MRR** and **AP** can be calculated in practice for
    a RAG pipeline in Python. We can define functions for calculating the **RR** and
    **MRR** as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'We have already calculated **Precision@k** in the previous post as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Building on that, we can define **Average Precision (AP)** as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Each of these functions takes as input a list of binary relevance labels, where
    1 means a retrieved chunk is relevant to the query, and 0 means it’s not. In practice,
    these labels are generated by comparing the retrieved results with the ground
    truth set, [exactly as we did in Part 1](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)
    when calculating Precision@K and Recall@K. In this way, for each query (for instance,
    “*Who is Anna Pávlovna?*”), we generate a binary relevance list based on whether
    each retrieved chunk contains the answer text. From there, we can calculate all
    the metrics using the functions as shown above.
  prefs: []
  type: TYPE_NORMAL
- en: Another useful order-aware metric we can calculate is **Mean Average Precision
    (MAP)**. As you can imagine, MAP is the mean of the APs for different retrieved
    sets. For example, if we calculate AP for three different test questions in our
    RAG pipeline, the MAP score tells us the overall ranking quality across all of
    them.
  prefs: []
  type: TYPE_NORMAL
- en: On my mind
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Binary order-unaware measures that we saw in the first part of this series,
    such as **HitRate@k, Precsion@k, Recall@k, and F1@k,** can provide us valuable
    information for evaluating the retrieval performance of a RAG pipeline. Nonetheless,
    such measures only provide us information on whether a relevant document is present
    in the retrieved set or not.
  prefs: []
  type: TYPE_NORMAL
- en: Binary order-aware measures reviewed in this post, like **Mean Reciprocal Rank
    (MRR) and Average Precision (AP)** can provide us further insight, as they not
    only tell us whether the relevant documents exist in the retrieved results, but
    also how well they are ranked. In this way, we can have a better overview of how
    well the retrieval mechanism of our RAG pipeline performs, depending on the task
    and type of documents we are using.
  prefs: []
  type: TYPE_NORMAL
- en: Stay tuned for the next and final part of this retrieval evaluation series,
    where I’ll be discussing ***graded retrieval evaluation measures*** for RAG pipelines.
  prefs: []
  type: TYPE_NORMAL
