- en: Generating Data Dictionary for Excel Files Using OpenPyxl and AI Agents
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用OpenPyxl和AI代理生成Excel文件的数据字典
- en: 原文：[https://towardsdatascience.com/generating-data-dictionary-for-excel-files-using-openpyxl-and-ai-agents/](https://towardsdatascience.com/generating-data-dictionary-for-excel-files-using-openpyxl-and-ai-agents/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/generating-data-dictionary-for-excel-files-using-openpyxl-and-ai-agents/](https://towardsdatascience.com/generating-data-dictionary-for-excel-files-using-openpyxl-and-ai-agents/)
- en: <mdspan datatext="el1746681273986" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746681273986" class="mdspan-comment">简介</mdspan>
- en: 'Every company I worked for until today, there it was: the resilient MS Excel.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我至今为止为每家公司工作，那里都有：坚韧不拔的MS Excel。
- en: Excel was first released in 1985 and has remained strong until today. It has
    survived the rise of relational databases, the evolution of many programming languages,
    the Internet with its infinite number of online applications, and finally, it
    is also surviving the era of the AI.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: Excel首次发布于1985年，至今仍保持强劲势头。它经历了关系型数据库的兴起、许多编程语言的演变、拥有无限在线应用的互联网，以及最终，它也正在经历人工智能时代。
- en: Phew!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 呼吸一下！
- en: Do you have any doubts about how resilient Excel is? I don’t.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 你对Excel的韧性有疑问吗？我没有。
- en: 'I think the reason for that is its *practicality to start and manipulate a
    document quickly*. Think about this situation: we’re at work, in a meeting, and
    suddenly the leadership shares a CSV file and asks for a quick calculation or
    a few calculated numbers. Now, the options are:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这是因为其*快速启动和操作文档的实用性*。想想这种情况：我们在工作中，在会议中，突然领导分享了一个CSV文件，并要求进行快速计算或提供几个计算出的数字。现在，选项有：
- en: 1\. Open an IDE (or a notebook) and start coding like crazy to generate a simple
    matplotlib graphic;
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开一个IDE（或笔记本）并疯狂编码以生成一个简单的matplotlib图形；
- en: 2\. Open Power BI, import the data, and start creating a report with dynamic
    graphics.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 打开Power BI，导入数据，并开始创建带有动态图形的报告。
- en: 3\. Open the CSV in Excel, write a couple of formulas, and create a graphic.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在Excel中打开CSV文件，编写几个公式，并创建一个图形。
- en: I can’t speak for you, but many times I go for option 3\. Especially because
    Excel files are compatible with everything, easily shareable, and beginner-friendly.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我不能代表你，但很多时候我会选择选项3。特别是由于Excel文件与所有东西都兼容，易于分享，而且对初学者友好。
- en: I am saying all of this as an Introduction to make my point that I don’t think
    that Excel files are going away anytime soon, even with the fast development of
    AI. Many will love that, many will hate that.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我这么说只是为了引入话题，我想说的是，我认为Excel文件在不久的将来不会消失，即使是在人工智能快速发展的今天。很多人会喜欢这一点，也有人会讨厌这一点。
- en: So, my action here was to leverage AI to make Excel files better documented.
    One of the main complaints of data teams about Excel is the lack of best practices
    and reproducibility, given that the names of the columns can have any names and
    data types, but zero documentation.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我的行动是利用AI使Excel文件有更好的文档记录。数据团队对Excel的主要抱怨之一是缺乏最佳实践和可重复性，因为列名可以有任何名称和数据类型，但没有任何文档。
- en: 'So, I have created an AI Agent that reads the Excel file and creates this small
    documentation. Here is how it works:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我创建了一个AI代理，它可以读取Excel文件并创建这个小文档。这是它的工作方式：
- en: The Excel file is converted to CSV and fed into the Large Language Model (LLM).
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Excel文件被转换为CSV格式，并输入到大型语言模型（LLM）中。
- en: The AI Agent generates the data dictionary with column information (variable
    name, data type, description).
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AI代理生成包含列信息（变量名、数据类型、描述）的数据字典。
- en: The data dictionary gets added as comments to the Excel file’s header.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据字典作为注释添加到Excel文件的标题中。
- en: Output file saved with comments.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 带有注释的输出文件已保存。
- en: Ok. Hands-on now. Let’s get that done in this tutorial.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 好的。现在动手实践。让我们在这个教程中完成这个任务。
- en: Code
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码
- en: '![](../Images/1453846583107fd5dcac3c74b788fcc9.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1453846583107fd5dcac3c74b788fcc9.png)'
- en: Let’s code! | Image generated by AI. Meta Llama, 2025\. https://meta.ai
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始编码！| 由AI生成的图像。Meta Llama，2025。https://meta.ai
- en: We will begin by setting up a virtual environment. Create a `venv` with the
    tool of your choice, such as Poetry, Python Venv, Anaconda, or UV. I really like
    UV, as it is the fastest and the simplest, in my opinion. If you have UV installed
    [[5]](https://docs.astral.sh/uv/getting-started/installation/), open a terminal
    and create your `venv`.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先设置一个虚拟环境。使用你选择的工具创建一个`venv`，例如Poetry、Python Venv、Anaconda或UV。在我看来，我真的很喜欢UV，因为它最快、最简单。如果你已经安装了UV
    [[5]](https://docs.astral.sh/uv/getting-started/installation/)，打开一个终端并创建你的`venv`。
- en: '[PRE0]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Now, let us import the necessary modules. This project was created with Python
    3.12.1, but I believe Python 3.9 or higher might do the trick already. We will
    use:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '**Agno**: for the AI Agent management'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**OpenPyxl**: for the manipulation of Excel files'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Streamlit**: for the front-end interface.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pandas, OS, JSON, Dedent and Google Genai as support modules.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Great. The next step is creating the functions we’ll need to handle the Excel
    files and to create the AI Agent.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Notice that all the functions have detailed **docstrings**. This is intentional
    because LLMs use docstrings to know what a given function does and decide whether
    to use it or not as a tool.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: So, if you’re using Python functions as Tools for an AI Agent, make sure to
    use detailed docstrings. Nowadays, with free copilots such as Windsurf [[6]](https://windsurf.com/vscode_tutorial)
    it is even easier to create them.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Converting the file to CSV
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This function will:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Take the Excel file and read only the first 10 rows. This is enough for us to
    send to the LLM. Doing that, we are also preventing sending too many tokens as
    input and making this agent too expensive.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Save the file as CSV to use as input for the AI Agent. The CSV format is easier
    for the model to take in, as it is a bunch of text separated by commas. And we
    know LLMs shine working with text.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Here is the function.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Let’s move on.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Creating the Agent
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next function creates the AI agent. I am using `Agno` [1], as it is very
    versatile and easy to use. I also chose the model `Gemini 2.0 Flash`. During the
    test phase, this was the best-performing model generating the data docs. To use
    it, you will need an API Key from Google. Don’t forget to get one here [[7]](https://ai.google.dev/gemini-api/docs/api-key).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: 'The function:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Receives the CSV output from the previous function.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Passes through the AI Agent, which generates the data dictionary with column
    name, description, and data type.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Notice that the `description` argument is the prompt for the agent. Make it
    detailed and precise.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The data dictionary will be saved as a `JSON` file using a tool called `FileTools`
    that can read and write files.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I have set up `retries=2` so we can work around any error on a first try.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Ok. Now we need another function to save the data dictionary to the file.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Adding Data Dictionary to the File’s Header
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This is the last function to be created. It will:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Get the data dictionary `json` from the previous step and the original Excel
    file.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add the data dictionary to the file’s header as comments.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Save the output file.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once the file is saved, it displays a download button for the user to get the
    modified file.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Ok. The next step is to glue all of this together on a Streamlit front-end script.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: Streamlit Front-End
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this step, I could have created a different file for the front-end and imported
    the functions in there. But I decided to use the same file, so let’s start with
    the famous:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: First, a couple of lines to configure the page and messages displayed in the
    Web Application. We will use the content `centered` on the page, and there is
    some information about how the App works.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，几行代码来配置网页和显示在Web应用程序中的消息。我们将使用页面上的`居中`内容，并且有一些关于应用程序如何工作的信息。
- en: '[PRE6]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Next, we’ll set up the sidebar, where the user can input their API Key from
    Google and select a `.xlsx` file to be modified.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将设置侧边栏，用户可以输入他们的Google API密钥并选择要修改的`.xlsx`文件。
- en: There is a button to run the application, another to reset the app state, and
    a progress bar. Nothing too fancy.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个按钮可以运行应用程序，另一个可以重置应用程序状态，还有一个进度条。没有什么太花哨的。
- en: '[PRE7]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Once the **run** button is clicked, it triggers the rest of the code to run
    the Agent. Here is the sequence of steps performed:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦点击**运行**按钮，它就会触发其余代码运行代理。以下是执行步骤的顺序：
- en: The first function is called to transform the file to CSV
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 调用第一个函数将文件转换为CSV格式
- en: The progress is registered on the progress bar.
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进度在进度条上记录。
- en: The Agent is created.
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代理被创建。
- en: Progress bar updated.
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进度条已更新。
- en: A prompt is fed into the agent to read the `temp.csv` file, create the data
    dictionary, and save the output to `data_dictionary.json`.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将提示输入到代理中，以读取`temp.csv`文件，创建数据字典，并将输出保存到`data_dictionary.json`。
- en: The data dictionary is printed on the screen, so the user can see what was generated
    while it’s being saved to the Excel file.
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据字典会在屏幕上打印出来，因此用户可以在它保存到Excel文件时看到生成的内容。
- en: The Excel file is modified and saved.
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Excel文件被修改并保存。
- en: '[PRE8]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: That’s it. Here is a demonstration of the agent in action.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样。这里有一个代理在行动的演示。
- en: '![](../Images/2c757b05aeebf40ee9e09c7a35a6523f.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2c757b05aeebf40ee9e09c7a35a6523f.png)'
- en: Data Docs added to your Excel File. Image by the author.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 数据文档已添加到您的Excel文件中。图片由作者提供。
- en: Beautiful result!
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 美丽的结果！
- en: Try It
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 尝试一下
- en: 'You can try the deployed app here: [https://excel-datadocs.streamlit.app/](https://excel-datadocs.streamlit.app/)'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在此尝试部署的应用程序：[https://excel-datadocs.streamlit.app/](https://excel-datadocs.streamlit.app/)
- en: Before You Go
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在你离开之前
- en: In my humble opinion, Excel files are not going away anytime soon. Loving or
    hating them, we’ll have to stick with them for a while.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，Excel文件在不久的将来不会消失。无论喜欢还是讨厌它们，我们都要坚持使用它们一段时间。
- en: Excel files are versatile, easy to handle and share, thus they are still very
    useful for the routine *ad-hoc* tasks at work.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: Excel文件功能多样，易于处理和共享，因此它们对于工作中的日常*临时*任务仍然非常有用。
- en: However, now we can leverage AI to help us handle those files and make them
    better. Artificial Intelligence is touching so many points of our lives. The routine
    and tools at work are only another one.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，现在我们可以利用人工智能来帮助我们处理这些文件，并使它们变得更好。人工智能正在触及我们生活的许多方面。工作中的日常工具和工具只是其中之一。
- en: Let’s take advantage of AI and work smarter every day!
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们利用人工智能，每天更高效地工作！
- en: If you liked this content, find more of my work in my website and GitHub, shared
    below.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢这个内容，可以在下面的网站和GitHub上找到更多我的工作。
