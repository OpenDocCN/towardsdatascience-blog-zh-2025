- en: 'Breaking the Bottleneck: GPU-Optimised Video Processing for Deep Learning'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/breaking-the-bottleneck-gpu-optimised-video-processing-for-deep-learning/](https://towardsdatascience.com/breaking-the-bottleneck-gpu-optimised-video-processing-for-deep-learning/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Deep learning (DL) applications often require processing video data for tasks
    such as object detection, classification, and segmentation. However, conventional
    video processing pipelines are typically inefficient for deep learning inference,
    leading to performance bottlenecks. In this post will leverage PyTorch and FFmpeg
    with NVIDIA hardware acceleration to achieve this optimisation.
  prefs: []
  type: TYPE_NORMAL
- en: Why Are Current Pipelines Inefficient?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The inefficiency comes from how video frames are typically decoded and transferred
    between CPU and GPU. The standard workflow that we may find in the majority of
    tutorials follow this structure:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Decode Frames on CPU**: Video files are first decoded into raw frames using
    CPU-based decoding tools (e.g., OpenCV, FFmpeg without GPU support).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Transfer to GPU**: These frames are then transferred from CPU to GPU memory
    to perform deep learning inference using frameworks like TensorFlow, PyTorch,
    ONNX, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Inference on GPU**: Once the frames are in GPU memory, the model performs
    inference.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Transfer Back to CPU (if needed)**: Some post-processing steps may require
    data to be moved back to the CPU.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/385fa0b36c30d5c73f5e4bd3730fb197.png)'
  prefs: []
  type: TYPE_IMG
- en: This CPU-GPU transfer process introduces a significant performance bottleneck,
    especially when processing high-resolution videos at high frame rates. The unnecessary
    memory copies and context switches slow down the overall inference speed, limiting
    real-time processing capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: 'As an example, the following snippet has the typical video processing pipeline
    that you came across when you are starting to learn deep learning:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Solution: GPU-Based Video Decoding and Inference'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A more efficient approach is to **keep the entire pipeline on the GPU**, from
    video decoding to inference, eliminating redundant CPU-GPU transfers. This can
    be achieved using **FFmpeg with NVIDIA GPU hardware acceleration. **
  prefs: []
  type: TYPE_NORMAL
- en: Key Optimisations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**GPU-Accelerated Video Decoding**: Instead of using CPU-based decoding, we
    leverage **FFmpeg with NVIDIA GPU acceleration (NVDEC)** to decode video frames
    directly on the GPU.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Zero-Copy Frame Processing**: The decoded frames remain in GPU memory, avoiding
    unnecessary memory transfers.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**GPU-Optimized Inference**: Once the frames are decoded, we perform inference
    directly using any model on the same GPU, significantly reducing latency.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/f13aefac94999a31de7bd030a54bd9eb.png)'
  prefs: []
  type: TYPE_IMG
- en: Hands on!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Prerequisites
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In order to achieve the aforementioned improvements, we will be using the following
    dependencies:'
  prefs: []
  type: TYPE_NORMAL
- en: FFmpeg with NVIDIA GPU Acceleration ([https://docs.nvidia.com/video-technologies/video-codec-sdk/12.0/ffmpeg-with-nvidia-gpu/index.html](https://docs.nvidia.com/video-technologies/video-codec-sdk/12.0/ffmpeg-with-nvidia-gpu/index.html))
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: StreamReader object from torchaudio.io module ([https://pytorch.org/audio/main/generated/torchaudio.io.StreamReader.html#torchaudio.io.StreamReader](https://pytorch.org/audio/main/generated/torchaudio.io.StreamReader.html#torchaudio.io.StreamReader))
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Installation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Please, to get a deep insight of how FFmpeg is installed with NVIDIA gpu acceleration,
    follow [these instructions](https://pytorch.org/audio/main/build.ffmpeg.html#enabling-hw-decoder).
  prefs: []
  type: TYPE_NORMAL
- en: 'Tested with:'
  prefs: []
  type: TYPE_NORMAL
- en: '**System**: Ubuntu 22.04'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**NVIDIA Driver Version**: 550.120'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CUDA Version**: 12.4'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Torch**: 2.4.0'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Torchaudio:** 2.4.0'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Torchvision**: 0.19.0'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1\. Install the NV-Codecs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 2\. Clone and configure FFmpeg
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 3\. Validate whether the installation was successful with torchaudio.utils
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Time to code an optimised pipeline!
  prefs: []
  type: TYPE_NORMAL
- en: Benchmarking
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To benchmark whether it is making any difference, we will be using [this video](https://www.pexels.com/video/a-commercial-street-full-of-people-and-branded-stores-3026357/)
    from Pexels by Pawel Perzanowski. Since most videos there are really short, I
    have stacked the same video several times to provide some results with different
    video lengths. The original video is 32 seconds long which gives us a total of
    960 frames. The new modified videos have 5520 and 9300 frames respectively.
  prefs: []
  type: TYPE_NORMAL
- en: '**Original video**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'typical workflow: 28.51s'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'optimised workflow: 24.2s'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Okay… it doesn’t seem like a real improvement, right? Let’s test it with longer
    videos.
  prefs: []
  type: TYPE_NORMAL
- en: '**Modified video v1 (5520 frames)**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'typical workflow: 118.72s'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'optimised workflow: 100.23s'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Modified video v2 (9300 frames)**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'typical workflow: 292.26s'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'optimised workflow: 240.85s'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As the video duration increases, the benefits of the optimization become more
    evident. In the longest test case, we achieve an **18% speedup**, demonstrating
    a significant reduction in processing time. These performance gains are particularly
    crucial when handling large video datasets or even in real-time video analysis
    tasks, where small efficiency improvements accumulate into substantial time savings.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In today’s post, we have explored two video processing pipelines, the typical
    one where frames are copied from CPU to GPU, introducing noticeable bottlenecks,
    and an optimised pipeline, in which frames are decoded in the GPU and pass them
    directly to inference, saving a considerably amount of time as videos’ duration
    increase.
  prefs: []
  type: TYPE_NORMAL
