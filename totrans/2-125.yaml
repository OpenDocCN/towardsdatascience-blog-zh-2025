- en: 'Exploratory Data Analysis: Gamma Spectroscopy in Python (Part 2)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python-part-2/](https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python-part-2/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1752873323864" class="mdspan-comment">In [the first](https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python/)</mdspan>
    [part](https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python/),
    I did an exploratory data analysis of the gamma spectroscopy data. We were able
    to see that using a modern scintillation detector, we can not only see that the
    object is radioactive. With a gamma spectrum, we are also able to tell *why* it
    is radioactive and what kind of isotopes the object contains.
  prefs: []
  type: TYPE_NORMAL
- en: In this part, we will go further, and I will show how to make and train a machine
    learning model for detecting radioactive elements.
  prefs: []
  type: TYPE_NORMAL
- en: Before we begin, an **important** **warning**. All data files collected for
    this article are available on Kaggle, and readers can train and test their ML
    models without having real hardware. If you want to test *real objects*, do it
    at your own risk. I did my tests with sources that can be legally found and purchased,
    like vintage uranium glass or old watches with radium dial paint. Please check
    your local laws and read safety guidelines about handling radioactive materials.
    Sources used in this test are not seriously dangerous, but still must be handled
    with care!
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s get started! I will show how to collect the data, train the model,
    and run it using a [Radiacode](https://102.radiacode.com/DmitriiE) scintillation
    detector. For those readers who do not have Radiacode hardware, the link to the
    datasource is added at the end of the article.
  prefs: []
  type: TYPE_NORMAL
- en: Methodology
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This article will contain several parts:'
  prefs: []
  type: TYPE_NORMAL
- en: I will briefly explain what a gamma spectrum is and how we can use it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We will collect the data for our ML model. I will show the code for collecting
    the spectra using the Radiacode device.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We will train the model and control its accuracy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, I will make an HTMX-based web frontend for the model, and we will see
    the results in real-time.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s get into it!
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Gamma Spectrum
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is a short recap of the [first part](https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python/),
    and for more details, I highly recommend reading it first.
  prefs: []
  type: TYPE_NORMAL
- en: Why is the gamma spectrum so interesting? Some objects around us can be slightly
    radioactive. Its sources vary from the naturally occurring radiation of granite
    in the buildings to the radium in some vintage watches or the thorium in modern
    thoriated tungsten rods. A *Geiger counter* only shows us the number of radioactive
    particles that were detected. A *scintillation detector* shows us not only the
    number of particles but also their energies. This is a crucial difference—it turned
    out that different radioactive materials emit gamma rays with different energies,
    and each material has its own “footprint.”
  prefs: []
  type: TYPE_NORMAL
- en: 'As a first example, I bought this pendant in the Chinese shop:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1ee92fbbdbcc4ce24943ff78477f7d74.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: It was advertised as an “ion-generating,” so I already suspected that the pendant
    could be slightly radioactive (an ionizing radiation, as its name suggests, can
    produce ions). Indeed, as we can see on the meter screen, its radioactivity level
    is about 1,20 *µSv*/h, which is 12 times higher than the background (0,1 *µSv*/h).
    It is not crazy high and comparable to a level on an airplane during the flight,
    but it is still statistically significant 😉
  prefs: []
  type: TYPE_NORMAL
- en: 'However, by only observing the value, we cannot tell *why* the object is radioactive.
    A gamma spectrum will show us what isotopes are inside the object:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5229199bf41d3fe8d57361bde7d99e63.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: In this example, the pendant contains [thorium-232](https://en.wikipedia.org/wiki/Thorium-232),
    and a thorium decay chain produces radium and actinium. As we can see on the graph,
    the actinium-228 peak is well visible on the spectrum.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a second example, let’s say we have found this piece of rock:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/014e2de7202325e29ab5e14904cee637.png)'
  prefs: []
  type: TYPE_IMG
- en: Image source [Wikipedia](https://en.wikipedia.org/wiki/Uraninite)
  prefs: []
  type: TYPE_NORMAL
- en: 'This is uraninite, a mineral that contains a lot of uranium dioxide. Such specimens
    can be found in some areas of Germany, the Czech Republic, or the US. If we get
    it in the mineral shop, it probably has a label on it. But in the field, it’s
    usually not the case 😉 With a gamma spectrum, we can see an image like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ee32ba41feeeaada24756d92ff419ff8.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: By comparing the peaks with known isotopes, we can tell that the rock contains
    uranium, but, for example, not thorium.
  prefs: []
  type: TYPE_NORMAL
- en: 'A physical explanation of the gamma spectrum is also fascinating. As we can
    see on the graph below, gamma rays are actually photons and belong to the same
    spectrum as visible light:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/01dfcd4fa847ff9d29d2ec0db387b0ed.png)'
  prefs: []
  type: TYPE_IMG
- en: Electromagnetic spectrum, Image source [Wikipedia](https://en.wikipedia.org/wiki/Electromagnetic_radiation)
  prefs: []
  type: TYPE_NORMAL
- en: When some people think that radioactive objects are glowing in the dark, it’s
    actually true! Every radioactive material is indeed glowing with its own unique
    “color,” but in the very far and non-visible to the human eye part of the spectrum.
  prefs: []
  type: TYPE_NORMAL
- en: A second fascinating thing is that only 10-20 years ago, gamma-spectroscopy
    was available only for institutions and big labs (in the best case, some used
    crystals with unknown quality could be found on eBay). Nowadays, due to advancements
    in electronics, a scintillation detector can be purchased for the price of a mid-range
    smartphone.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s return to our project. As we can see from the two examples above,
    the spectra of different objects are different. Let’s create a machine learning
    model that can automatically detect various elements.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Collecting the Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As readers can guess, our first challenge is **collecting the samples**. I am
    not a nuclear institution, and I don’t have access to the calibrated test sources
    like cesium or strontium. However, for our task, it is not required, and some
    materials can be legally found and purchased. For example, americium is still
    used in smoke detectors; radium was used in painting the watch dials before the
    1960s; uranium was widely used in glass manufacturing before the 1950s, and thoriated
    tungsten rods are still produced today and can be purchased from Amazon. Even
    the natural uranium ore can be purchased in the mineral shops; however, it requires
    a bit more safety precautions. And a good thing about gamma-spectroscopy is that
    we don’t need to disassemble or break the items, and the process is generally
    safe.
  prefs: []
  type: TYPE_NORMAL
- en: The second challenge is **collecting the data**. If you work in e-commerce,
    then it’s usually not a problem, and every SQL request will return millions of
    records. Alas, in the “real world,” it can be much more challenging. Especially
    if you want to make a database of the radioactive materials. In our case, collecting
    every spectrum requires 10-20 minutes. For every test object, it would be nice
    to have at least 10 records. As we can see, the process can take hours, and having
    millions of records is not a realistic option.
  prefs: []
  type: TYPE_NORMAL
- en: For getting the spectrum data, I will be using a [Radiacode 103G](https://102.radiacode.com/DmitriiE)
    scintillation detector and an open-source [radiacode](https://github.com/cdump/radiacode)
    library.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/59301406c9acaff0de94fda8871d8b33.png)'
  prefs: []
  type: TYPE_IMG
- en: Radiacode detector, Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'A gamma spectrum can be exported in XML format using the official Radiacode
    Android app, but the manual process is too slow and tedious. Instead, I created
    a Python script that collects the spectra using random time intervals:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Some error handling is omitted here for clarity reasons. A link to the full
    source code can be found at the end of the article.
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, I randomly select the time between 10 and 30 minutes, collect
    the gamma spectrum data, and save it to a JSON file. Now, I only need to place
    a Radiacode detector near the object and leave the script running for several
    hours. As a result, 10-20 JSON files will be saved. I also need to repeat the
    process for every sample I have. As a final output, 100-200 files can be collected.
    It’s still not millions, but as we will see, it is enough for our task.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Training the Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When the data from the previous step is ready, we can start training the model.
    As a reminder, all files are available on Kaggle, and readers are welcome to make
    their own models as well.
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s preprocess the data and extract the features we want to use.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1 Data Load
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When the data is collected, we should have some spectrum files saved in JSON
    format. An individual file looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Here, the “*counts” array is the* actual spectrum data. Different detectors
    may have different formats; a Radiacode returns the data in the form of a 1024-channel
    array. Calibration constants [a0, a1, a2] allow us to convert the channel number
    into the energy in keV (kiloelectronvolt).
  prefs: []
  type: TYPE_NORMAL
- en: 'First, let’s make a method to load the spectrum from a file:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Now, we can draw it with Matplotlib:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'The output looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e33d74a69506dd7b88d902907a3c859f.png)'
  prefs: []
  type: TYPE_IMG
- en: Thorium spectrum, image by author
  prefs: []
  type: TYPE_NORMAL
- en: What can we see here?
  prefs: []
  type: TYPE_NORMAL
- en: As was mentioned before, from a standard Geiger counter, we can get only the
    number of detected particles. It tells us if the object is radioactive or not,
    but not more. From a scintillation detector, we can get the number of particles
    grouped by their energies, which is practically a ready-to-use histogram! A radioactive
    decay itself is random, so the longer the collection time, the “smoother” the
    graph.
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 Data Transform
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**3.2.1 Normalization**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at the spectrum again:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e33d74a69506dd7b88d902907a3c859f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Here, the data was collected for about 10 minutes, and the vertical axis contains
    the number of detected particles. This approach has a simple problem: the number
    of particles is not a constant. It depends on both the collection time and the
    “strength” of the source. It means that we may not have 600 particles like on
    this graph, but 60 or 6000\. We can also see that the data is a bit noisy. This
    is especially visible with a “weak” source and a short collection time.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To eliminate these issues, I decided to use a two-step pipeline. First, I applied
    the [Savitzky-Golay filter](https://docs.scipy.org/doc/scipy/reference/generated/scipy.signal.savgol_filter.html)
    to reduce the noise:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: It is especially useful for spectra with short collection times, where the peaks
    are not so well visible.
  prefs: []
  type: TYPE_NORMAL
- en: Second, I normalized a NumPy array to 0..1 by simply dividing its values by
    the maximum.
  prefs: []
  type: TYPE_NORMAL
- en: 'A final “normalize” method looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'As a result, spectra from different sources now have a similar scale:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/50893e48f38bf72240e64d6ec9177cbf.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: As we can also see, the difference between the two samples is quite visible.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.2.2 Data Augmentation**'
  prefs: []
  type: TYPE_NORMAL
- en: Technically, we are ready to train the model. However, as we saw in the “Collecting
    the data” part, the dataset is pretty small – I may have only 100-200 files in
    total. The solution is to augment the data by adding more synthetic samples.
  prefs: []
  type: TYPE_NORMAL
- en: As a simple approach, I decided to add some noise to the original spectra. But
    how much noise should we add? I selected a 680 keV channel as a reference value,
    because this part has no interesting isotopes. Then I added a noise with 50% of
    the amplitude of that channel. A *np.clip* call guarantees that the data values
    are not negative (for the amount of detected particles, it does not make physical
    sense).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'The output looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dbd7c8efdd27a597a793607bdc8f8959.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, the noise level is not that big, so it does not distort the peaks.
    At the same time, it adds some diversity to the data.
  prefs: []
  type: TYPE_NORMAL
- en: A more sophisticated approach can also be used. For example, some radioactive
    minerals contain thorium, uranium, or potassium in different proportions. It may
    be possible to combine spectra of existing samples to get some “new” ones.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.2.3 Feature** **Extraction**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Technically, we can use all 1024 values “as is” as an input for our ML model.
    However, this approach has two problems:'
  prefs: []
  type: TYPE_NORMAL
- en: First, it is redundant – we are mostly interested only in particular isotopes.
    For example, on the last graph, there is a good visible peak at 238 keV, which
    belongs to Lead-212, and a less visible peak at 338 keV, which belongs to Actinium-228.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Second, it is device-specific. I want a model to be universal. Using only the
    energies of the selected isotopes as input allows us to use any gamma spectrometer
    model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Finally, I created this list of isotopes:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Only spectrum values for these isotopes will be used as input for the model.
    I also created a method to save a list into the JSON file – it will be used to
    load the model later. Some isotopes, like Uranium-235, may be present in minuscule
    amounts and not be practically detectable. Readers are welcome to improve the
    list on their own.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s create a method that converts a Radiacode spectrum to a list of
    features:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Practically, we converted the list of 1024 values to a NumPy array with only
    23 elements, which is a good size reduction!
  prefs: []
  type: TYPE_NORMAL
- en: 3.3 Training
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Finally, we are ready to train the ML model.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, let’s combine all files into one dataset. Practically, it depends on
    the samples you have and may look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'As we can see, our y-values contain names like “Americium.” I will use a *LabelEncoder*
    to convert them into numeric values:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'I decided to use an open-source [XGBoost](https://github.com/dmlc/xgboost)
    model, which is based on gradient tree boosting ([original paper link](https://arxiv.org/pdf/1603.02754)).
    I will also use a [GridSearchCV](https://scikit-learn.org/stable/modules/generated/sklearn.model_selection.GridSearchCV.html)
    to find optimal parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'Last but not least, I need to save the trained model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Obviously, we need not only the model itself but also the list of isotopes and
    labels. If we change something, the data will not match anymore, and the model
    will produce garbage, so model versioning is our friend!
  prefs: []
  type: TYPE_NORMAL
- en: To **verify the results**, I need data that the model did not “see” before.
    I already collected several XML files using the Radiacode Android app, and just
    for fun, I decided to use them for testing.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, I created a method to load the data:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: It has the same spectra values that I used in the JSON files, with some extra
    data that is not required for our task.
  prefs: []
  type: TYPE_NORMAL
- en: Practically, this is an example of data collection. This Victorian creamer from
    the 1890s is 130 years old, and trust me, you cannot get this data by using an
    SQL request 🙂
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bad02bfe13d7fc249ad4de1b6982e3ce.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This uranium glass is slightly radioactive (the background level is about 0,08
    µSv/h), but it’s at a safe level and cannot produce any harm.
  prefs: []
  type: TYPE_NORMAL
- en: 'The test code itself is simple:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Here, I also grouped the values from different samples and used batch prediction.
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, all results are correct. I was also going to make a confusion
    matrix, but at least for my relatively small number of samples, all objects were
    detected properly.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Testing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As a final part of this article, let’s use the model in real-time with a Radiacode
    device.
  prefs: []
  type: TYPE_NORMAL
- en: 'The code is almost the same as at the beginning of the article, so I’ll show
    only the crucial parts. Using the [radiacode](https://github.com/cdump/radiacode)
    library, I connect to the device, read the spectra once per minute, and use these
    values to predict the isotopes:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Here, I read the CPS (counts per second) values from the Radiacode every 5 seconds,
    just to be sure that the device works. Every minute, I read the spectrum and use
    it with the model.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before running the app, I placed the Radiacode detector near the object:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d2e70d307b500e9f80f7647d2366e552.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This vintage watch was made in the 1950s, and it has radium paint on the digits.
    Its radiation level is ~5 times the background, but it is still within a safe
    level (and it is actually 2 times lower than everyone gets in an airplane during
    a flight).
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, we can run the code and see the results in real-time:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/266aeeab11d032909394a2091503ed26.png)'
  prefs: []
  type: TYPE_IMG
- en: As we can see, the model’s prediction is correct.
  prefs: []
  type: TYPE_NORMAL
- en: Readers who don’t have a Radiacode hardware can use raw log files to replay
    the data. The link is added to the end of the article.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I explained the process of creating a machine learning model
    for predicting radioactive isotopes. I also tested the model with some radioactive
    samples that can be legally purchased.
  prefs: []
  type: TYPE_NORMAL
- en: I also did an interactive HTMX frontend for the model, but this article is already
    too long. If there is a public interest in this topic, this will be published
    in the next part.
  prefs: []
  type: TYPE_NORMAL
- en: 'As for the model itself, there are several ways for improvement:'
  prefs: []
  type: TYPE_NORMAL
- en: Adding more data samples and isotopes. I’m not a nuclear institution, and my
    choice (from not only financial or legal perspectives, but also considering the
    free space in my apartment) is limited. Readers who have access to other isotopes
    and minerals are welcome to share their data, and I will try to add it to the
    model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adding more features. In this model, I normalized all spectra, and it works
    well. However, in this way, we lose the information about the radioactivity level
    of the objects. For example, the uranium glass has a much lower radiation level
    compared to the uranium ore. To distinguish these objects more effectively, we
    can add the radioactivity level as an additional model feature.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Testing other model types. It looks promising to use a vector search to find
    the closest embeddings. It can also be more interpretable, and the model can show
    several closest isotopes. A library like [FAISS](https://github.com/facebookresearch/faiss)
    can be useful for that. Another way is to use a deep learning model, which can
    also be interesting to test.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In this article, I used a [Radiacode](https://102.radiacode.com/DmitriiE) radiation
    detector. It is a nice device that allows making some interesting experiments
    (disclaimer: I don’t have any profit or other commercial interest from its sales).
    For those readers who don’t have a Radiacode hardware, all collected data is freely
    [available on Kaggle](https://www.kaggle.com/datasets/dmitriieliuseev/radiation-spectra-ml-data).'
