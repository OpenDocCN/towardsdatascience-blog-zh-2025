- en: 'Explainable Anomaly Detection with RuleFit: An Intuitive Guide'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/explainable-anomaly-detection-with-rulefit-an-intuitive-guide/](https://towardsdatascience.com/explainable-anomaly-detection-with-rulefit-an-intuitive-guide/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1751604886452" class="mdspan-comment">Whenever you show</mdspan>
    your anomaly detection results to your stakeholders, the immediate next question
    is always “*why*?”.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, simply flagging an anomaly is rarely enough. Understanding *what
    went wrong* is crucial to determining the best next action.
  prefs: []
  type: TYPE_NORMAL
- en: Yet, most machine learning-based anomaly detection methods stop at producing
    an anomaly score. They are black-box in nature, which makes it painful to make
    sense of their outputs-why does this sample have a higher anomaly score than its
    neighbors?
  prefs: []
  type: TYPE_NORMAL
- en: To tackle this explainability challenge, you may have likely already resorted
    to popular e**X**plainable **AI** (XAI) techniques. Perhaps you are calculating
    feature importance to identify which variables are driving the abnormality, or
    you are running counterfactual analysis to see how close a case was to normal.
  prefs: []
  type: TYPE_NORMAL
- en: These are useful, but what if you could do more? What if you can derive a set
    of interpretable **IF-THEN rules** that characterize the identified anomalies?
  prefs: []
  type: TYPE_NORMAL
- en: This is exactly what the **RuleFit** algorithm [1] promises.
  prefs: []
  type: TYPE_NORMAL
- en: In this post, we’ll explore how the RuleFit algorithm works intuitively, how
    it can be applied to explain detected anomalies, and walk through a concrete case
    study.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. How Does It Work?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before diving into the technical details, let’s first clarify what we aim to
    have after applying the algorithm: We want to have a set of **IF-THEN rules**
    that quantitatively characterize the abnormal samples, as well as the **importance**
    of those rules.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To get there, we need to answer two questions:'
  prefs: []
  type: TYPE_NORMAL
- en: (1) How do we generate meaningful IF-THEN conditions from the data?
  prefs: []
  type: TYPE_NORMAL
- en: (2) How do we calculate the rule importance score to determine which ones actually
    matter?
  prefs: []
  type: TYPE_NORMAL
- en: The RuleFit algorithm addresses these questions by splitting the work into two
    complementary parts, the “Rule” and the “Fit”.
  prefs: []
  type: TYPE_NORMAL
- en: 1.1 The “Rule” in RuleFit
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In RuleFit, a rule looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '**IF** x1 < 10 **AND** x2 > 5 **THEN** 1 **ELSE** 0'
  prefs: []
  type: TYPE_NORMAL
- en: 'Would this structure look a bit more familiar if we visualize it like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/984cc474e12c5c17220d885b4e1c43bd.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1\. A rule is just one specific path through a decision tree. (Image
    by author)
  prefs: []
  type: TYPE_NORMAL
- en: Yes, it is a **decision tree**! The rule here is just traversing one specific
    path through the tree, from the root node to the leaf node.
  prefs: []
  type: TYPE_NORMAL
- en: In RuleFit, the rule generation process heavily relies on building decision
    trees, which predict the target outcome given the input features. Once the tree
    is built, any path from the root to a node in a tree can be converted to a decision
    rule, as we have just seen in the example above.
  prefs: []
  type: TYPE_NORMAL
- en: To ensure the rules are diverse, RuleFit doesn’t just fit one decision tree.
    Instead, it leverages tree ensemble algorithms (e.g., random forest, Gradient
    Boosting trees, etc.) to generate many different decision trees.
  prefs: []
  type: TYPE_NORMAL
- en: Also, the depths of those trees are, in general, different. This brings the
    benefits of generating rules with variable lengths, further enhancing the diversity.
  prefs: []
  type: TYPE_NORMAL
- en: Here, we should note that although the ensemble trees are built with predicting
    the target outcome in mind, the RuleFit algorithm does not really care about the
    end prediction results. It merely uses this tree-building exercise as the vehicle
    to extract meaningful, quantitative rules.
  prefs: []
  type: TYPE_NORMAL
- en: Effectively, this means that we will discard the predicted value in each node
    and **only keep the** **conditions** that lead us to a node. Those conditions
    produce the rules we care about.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ok, we can now wrap up the first processing step in the RuleFit algorithm:
    the rule building. The outcome of this step is a pool of candidate rules that
    could potentially **explain** the specific data behavior.'
  prefs: []
  type: TYPE_NORMAL
- en: But out of all those rules, which ones actually deserve our attention?
  prefs: []
  type: TYPE_NORMAL
- en: Well, this is where the second step of RuleFit comes in. We “fit” to rank.
  prefs: []
  type: TYPE_NORMAL
- en: 1.2 The “Fit” in RuleFit
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Essentially, RuleFit uncovers the most important rules via **feature selection**.
  prefs: []
  type: TYPE_NORMAL
- en: First, RuleFit treats each rule as a new **binary feature**, that is, if the
    rule is satisfied for a specific sample, it gets a value of 1 for this binary
    feature; otherwise, its value is 0.
  prefs: []
  type: TYPE_NORMAL
- en: Then, RuleFit performs **sparse linear regression with** **Lasso** by using
    all the “raw” features from the original dataset, as well as the newly engineered
    binary features derived from the rules, to predict the target outcome. This way,
    each feature (raw features + binary rule features) gets a coefficient.
  prefs: []
  type: TYPE_NORMAL
- en: One key characteristic of Lasso is that its loss function forces the coefficients
    of those unimportant features to be exactly zero. This effectively means those
    unimportant features are removed from the model.
  prefs: []
  type: TYPE_NORMAL
- en: As a result, by simply examining which binary rule features survived the Lasso
    analysis, we would immediately know which rules are important in terms of getting
    accurate predictions of the target outcome. In addition, by looking at the coefficient
    magnitudes associated with the rule features, we would be able to rank the importance
    of the rules.
  prefs: []
  type: TYPE_NORMAL
- en: 1.3 Recap
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We have just covered the essential theory behind the RuleFit algorithm. To
    summarize, we can view this approach as a two-step solution for providing explainability:'
  prefs: []
  type: TYPE_NORMAL
- en: (1) It first extracts the rules by training an ensemble of decision trees. **That’s
    the “Rule” part**.
  prefs: []
  type: TYPE_NORMAL
- en: (2) It then cleverly converts those rules into binary features and performs
    standard feature selection by using sparse linear regression (Lasso). **That’s
    the “Fit” part**.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the surviving rules with non-zero coefficients are important ones that
    are worth our attention.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, you may have noticed that “predicting target outcome” pops up
    at both the “Rule” and “Fit” steps. If we are dealing with a regression or classification
    problem, it is easily understandable that the “target outcome” is the numerical
    value or the label we want to predict, and the rules can be interpreted as patterns
    that drive the prediction.
  prefs: []
  type: TYPE_NORMAL
- en: But what about anomaly detection, which is largely an unsupervised task? How
    can we apply RuleFit there?
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Anomaly Explanation with RuleFit
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 2.1 Application Pattern
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To begin with, we need to transform the unsupervised explainability problem
    into a supervised one. Here’s how.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once we have our anomaly detection results (doesn’t matter which algorithm
    we used), we can create binary labels, i.e., 1 for an identified anomaly and 0
    for a normal data point, as our “target outcome.” This way, we have exactly what
    RuleFit needs: the raw features, and the target outcome to predict.'
  prefs: []
  type: TYPE_NORMAL
- en: Then, the RuleFit can work its magic to generate a pool of candidate rules and
    fit a sparse linear regression model to retain only the important rules. The coefficients
    of the resulting model would then indicate how much each rule contributes to the
    log-odds of an instance being classified as an anomaly. To put it another way,
    they tell us which rule combinations most strongly push a sample toward being
    labeled as anomalous.
  prefs: []
  type: TYPE_NORMAL
- en: Note that you can, in theory, also use the anomaly score (produced by the primary
    anomaly detection model) as the “target outcome”. This will change the application
    of RuleFit from a classification setting to a regression setting.
  prefs: []
  type: TYPE_NORMAL
- en: 'Both approaches are valid, but they answer slightly different questions: With
    the binary label classification setting, the RuleFit uncovers “**What makes something
    an anomaly?**“; With the anomaly score regression setting, the RuleFit uncovers
    “**What drives the severity of an anomaly?**“.'
  prefs: []
  type: TYPE_NORMAL
- en: In practice, the rules generated by both approaches will probably be very similar.
    Nevertheless, using a binary anomaly label as the target for a RuleFit is more
    commonly used for explaining detected anomalies. It is straightforward in terms
    of interpretation and direct applicability to creating business rules for flagging
    future anomalies.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Case Study
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s walk through a concrete example to see how RuleFit works in action. Here,
    we’ll create an anomaly detection scenario using the Iris dataset [2] (licensed
    CC BY 4.0), where each sample consists of 4 features (sepal_length, sepal_width,
    petal_length, petal_width) and is labeled as one of the following three categories:
    Setosa, Versicolor, and Virginica.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Data Setup'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: First, we’ll use all Setosa samples (50) and all Versicolor samples (50) as
    the “normal” samples. For the “abnormal” samples, we’ll use a subset of Virginica
    samples (10).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: To make the scenario more realistic, we create a separate training set and test
    set. The train set contains pure “normal” samples, while the test set consists
    of randomly sampled 20 “normal” samples and 10 “abnormal” samples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Step 2: Anomaly Detection'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Next, we perform anomaly detection. Here, we pretend we don’t know the actual
    labels. In this case study, we apply *Local Outlier Factor* (LOF) as the anomaly
    detection algorithm, which locates anomalies by measuring how isolated a data
    point is compared to the density of its local neighbors. Of course, you can also
    try other anomaly detection algorithms, such as *Gaussian Mixture Models* (GMM),
    *K-Nearest Neighbors* (KNN), and *Autoencoders*, among others. However, keep in
    mind that the intention here is only to get the detection results, our main focus
    is the anomaly explanation in step 3.
  prefs: []
  type: TYPE_NORMAL
- en: 'Specifically, we’ll use the **pyOD** library to train the model and make inferences:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Notice that we have used the 99% quantile of the anomaly scores obtained on
    the training set as the threshold. For individual test samples, if its anomaly
    score is higher than the threshold, this sample will be labeled as “anomaly”.
    Otherwise, the sample is considered “normal”.
  prefs: []
  type: TYPE_NORMAL
- en: 'At this stage, we can quickly check the detection performance with:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/6ff61f8f248fe1e90fd73dd12aa0ea4d.png)'
  prefs: []
  type: TYPE_IMG
- en: (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: 'Not super great results. Out of 10 true anomalies, only 5 of them are caught.
    However, the good news is that LOF didn’t produce any false positives. You can
    further improve the performance by tuning the LOF model hyperparameters, adjusting
    the threshold, or even considering ensemble learning strategies. But keep in mind:
    our goal here is not to get the best detection accuracy. Instead, we aim to see
    if RuleFit can properly generate rules to explain the anomalies detected by the
    LOF model.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Anomaly Explanation'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Now we are getting to the core topic. To apply RuleFit, let’s first install
    the library from **[imodels](https://github.com/csinva/imodels)**, which is a
    sklearn-compatible, Interpretable ML package for concise, transparent, and accurate
    predictive modeling:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: In this case, we will consider a binary label classification setting, where
    the abnormal samples (in the test set) flagged by the LOF model are labeled as
    1, and other un-flagged normal samples (also in the test set) are labeled as 0\.
    Note that we are labeling based on LOF’s detection results, not the actual ground
    truth, which we pretend we don’t know.
  prefs: []
  type: TYPE_NORMAL
- en: 'To initiate the RuleFit model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'We can then proceed with fitting the RuleFit model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'In practice, it is usually a good practice to do a quick sanity check to evaluate
    how well the RuleFit model’s predictions align with the anomaly labels determined
    by the LOF algorithm:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: For our case, we see that both printouts are 1\. This confirms that the RuleFit
    model has successfully learned the patterns that LOF used to identify anomalies.
    For your own problems, if you observe values much lower than 1, you would need
    to fine-tune your RuleFit hyperparameters.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now let’s examine the rules:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'The RuleFit algorithm returns a total of 24 rules. A snapshot is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d45052db5ca04ea86d6ae7e963edff3a.png)'
  prefs: []
  type: TYPE_IMG
- en: (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s first clarify the meaning of the results columns:'
  prefs: []
  type: TYPE_NORMAL
- en: The “rule” column and the “abs_coef” column are self-explanatory.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The “type” column has two unique values: “linear” and “rule”. The “linear”
    denotes the original input features, while “rule” denotes the “IF-THEN” conditions
    generated from decision trees.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The “coef” column represents the coefficients produced by the Lasso regression
    analysis. A positive value indicates that if the rule applies, the **log-odds**
    of being classified as the abnormal class increases. A larger magnitude indicates
    a **stronger influence** of that rule on the prediction.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The “support” column records the fraction of data samples where the rule applies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The “importance” column is calculated as the absolute value of the coefficient
    multiplied by the standard deviation of the binary (0 or 1) values that the rule
    takes on. So why this calculation? As we have just discussed, a larger absolute
    coefficient means a stronger direct impact on the log-odds. That’s clear. For
    the standard deviation term, it effectively measures the “**discriminative power**”
    of the rules. For example, if a rule is almost always TRUE (very small standard
    deviation), it doesn’t split your data effectively. The same holds if the rule
    is almost always FALSE. In other words, the rule cannot *explain* much of the
    variation in the target variable. Therefore, the importance score combines both
    the strength of the rule’s impact (coefficient magnitude) and how well it discriminates
    between different samples (standard deviation).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For our specific case, we see only one high-impact rule (Rule #24):'
  prefs: []
  type: TYPE_NORMAL
- en: '*If a flower’s petal is longer than 5.45 cm **and** wider than 2 cm, the odds
    that LOF classifies it as “anomalous” increase 85-fold.* (Note that exp(4.448999)
    ~= 85)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Rules #26 and #27 are *nested* inside Rule #24\. This is common in practice,
    as RuleFit often produces “families” of similar rules because they come from neighbouring
    tree splits. Therefore, the only rule that truly matters for characterizing the
    LOF-identified anomalies is Rule #24.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Also, we see that the support for Rule #24 is 0.1667 (5/30). This effectively
    means that all 5 LOF-identified anomalies can be explained by this rule. We can
    see that more clearly in the figure below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5e06ab7dcf528c232c6aa4ad7ff5676b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'There you have it: the rule to describe the identified anomalies!'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this blog post, we explored the RuleFit algorithm as a powerful solution
    for explainable anomaly detection. We discussed:'
  prefs: []
  type: TYPE_NORMAL
- en: '**How it works**: A two-step approach where decision trees are first fitted
    to derive meaningful rules, followed by a sparse linear regression to rank the
    rule importance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**How to apply to anomaly explanation**: Use the detection results as the pseudo
    labels and use them as the “target outcome” for the RuleFit model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With RuleFit in your modeling toolkit, the next time stakeholders ask “Why is
    this anomaly?”, you’ll have concrete IF-THEN rules that they can understand and
    act upon.
  prefs: []
  type: TYPE_NORMAL
- en: Reference
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[1] Jerome H. Friedman, Bogdan E. Popescu, Predictive learning via rule ensembles,
    [arXiv](https://arxiv.org/abs/0811.1679), 2008.'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] Fisher, R. A., Iris [Data set]. [UCI Machine Learning Repository](https://doi.org/10.24432/C56C76),
    1936.'
  prefs: []
  type: TYPE_NORMAL
