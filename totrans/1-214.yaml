- en: Plotly Dash — A Structured Framework for a Multi-Page Dashboard
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/plotly-dash-a-structured-framework-for-a-multi-page-dashboard/](https://towardsdatascience.com/plotly-dash-a-structured-framework-for-a-multi-page-dashboard/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**[Plotly Dash](https://dash.plotly.com/) is a <mdspan datatext="el1759450550548"
    class="mdspan-comment">widely used and respected</mdspan> framework that allows
    the creation of interactive dashboards, facilitating the presentation of a wide
    variety of data and information in an easy to digest and aesthetically pleasing
    format.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Typically, examples and guidance on how to create a Dash app have all the
    code within a single python file. Although this is a nice concise way to start,
    even simple dashboards can become overwhelming to manage when all the code is
    in a single file.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**This article presents a sensible, and fully functional, multi-file project
    structure, containing all the essentials to get started.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Managing and expanding the project, even if the project is quite extensive,
    should become much easier to deal with.**'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many online examples for Dash dashboards are presented in a single file, and
    although this is fine for small simple dashboards, it becomes impossible to manage
    as a project increases in size, and potentially onto multiple pages.
  prefs: []
  type: TYPE_NORMAL
- en: It therefore becomes necessary to start breaking up the single file to create
    a logical project structure to make project management easier.
  prefs: []
  type: TYPE_NORMAL
- en: However, guidance on how to approach a structured multi-page app, specifically
    with Dash, are few and far between. There also appears to be no standard “official”
    way to structure a Dash app.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, any examples of multi-page apps tend to present a bear-bones structure
    that typically doesn’t include any example graphing (i.e. they are not fully functional).
    This leaves some guesswork with regard to actually getting the app to run and
    work reliably with the data you want to present.
  prefs: []
  type: TYPE_NORMAL
- en: This article provides a fully functional base that the user can run, and experiment
    with, straight away. It also provides a useful reference point to begin developing
    a project from.
  prefs: []
  type: TYPE_NORMAL
- en: '***Disclaimer:** I am in no way affiliated with Plotly. Furthermore, both the
    shared GitHub code base, and all the features and examples in this article, can
    be used without the need for any paid features or paid subscriptions.*'
  prefs: []
  type: TYPE_NORMAL
- en: Aim
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'With the above in mind, this article is primarily concerned with four items
    in relation to creating a Dash dashboard:'
  prefs: []
  type: TYPE_NORMAL
- en: Multi-page
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Logical project structure (i.e. not all in one file, and with a multi-folder
    structure)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Fully functional including data (API) and graphing (Plotly)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Git ready
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Detailed Features
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![the main page of the Dash app using the dark theme with three example plotly
    graphs](../Images/f2b9b550fb27e54417524b4e1b5a287e.png)'
  prefs: []
  type: TYPE_IMG
- en: The exact output (dark mode) showing the features of the project structure –
    Image by Author – Data from [GAPMINDER.ORG](https://www.gapminder.org/), [CC-BY
    LICENSE](https://www.gapminder.org/free-material/)
  prefs: []
  type: TYPE_NORMAL
- en: A summary
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In addition to the main aims detailed in the previous section, the following
    features have been included to provide a usable, aesthetically pleasing, and functional
    base:'
  prefs: []
  type: TYPE_NORMAL
- en: A sidebar which lists the available pages, and highlights which page is active
    as the page changes
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A header with website name, logo and dark/light theme switch
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Mobile ready responsive layout with collapsible sidebar
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Dark/light theme switching, including dark light theming of the Plotly graphs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Two different API integrations, one local ([Plotly Gapminder](https://plotly.com/python-api-reference/generated/plotly.express.data.html)),
    and one remote with logic for API keys ([NinjasAPI](https://api-ninjas.com/))
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Git ready, with logic to keep API keys out of the code, and auto DEBUG/production
    mode ([python-dotenv](https://github.com/theskumar/python-dotenv))
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A simple example of bespoke styling using style.css
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Utilises [DASH Mantine Components](https://www.dash-mantine-components.com/)
    for general styling, providing a consistent theme
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The following sub-sections will explain some of the features included in the
    framework in a little more detail.
  prefs: []
  type: TYPE_NORMAL
- en: If you are looking for the code please [skip towards the end of the article](#repo)
    where you will find a link to the GitHub repository with the code and details
    on how to get started.
  prefs: []
  type: TYPE_NORMAL
- en: Styling with DASH Mantine Components
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![the main page of the Dash app using the light theme with three example plotly
    graphs](../Images/1c90b4508f35e74fffd6edad47ef42ee.png)'
  prefs: []
  type: TYPE_IMG
- en: The exact output (light mode) showing the features of the project structure
    – Image by Author – Data from [GAPMINDER.ORG](https://www.gapminder.org/), [CC-BY
    LICENSE](https://www.gapminder.org/free-material/)
  prefs: []
  type: TYPE_NORMAL
- en: It is possible to style a Dash dashboard without the aid of a front end framework.
    However, in general I suspect the priority will be to present data quickly and
    effectively, so it makes little sense to make life harder than it needs to be.
  prefs: []
  type: TYPE_NORMAL
- en: 'As such, the framework presented in this article utilises [Dash Mantine components](https://www.dash-mantine-components.com/)
    for styling, which is a widely used and modern styling API designed specifically
    for use with Dash dashboards:'
  prefs: []
  type: TYPE_NORMAL
- en: Build feature-rich, accessible Dash apps faster than ever! Dash Mantine Components
    includes over 100 customizable components based on the React Mantine library,
    with consistent styling, theming, and full support for light and dark mode.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – [dash-mantine-components.com](https://www.dash-mantine-components.com/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In particular, the layout selected for this project structure builds on the
    following official layout example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[AppShell with Theme Switch Component – GitHub](https://github.com/snehilvj/dmc-docs/blob/main/help_center/appshell/appshell_with_theme_switch.py)'
  prefs: []
  type: TYPE_NORMAL
- en: Although the overall look of the official layout is very similar to the one
    this article uses (as you would expect…), there is no functionality built into
    the official layout, and all the code is in a single python file.
  prefs: []
  type: TYPE_NORMAL
- en: Dark light graph switching
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![a video of the app changing between dark and light mode, and then between
    page 1 and 2 of the app](../Images/7fc86f0e4713e480682917f22cd95e7f.png)'
  prefs: []
  type: TYPE_IMG
- en: The base theme detailed in the previous section already includes the code to
    switch between light and dark themes.
  prefs: []
  type: TYPE_NORMAL
- en: However, once components are added that are not specifically “Mantine” components
    (e.g. plotly graphs), then the theme switch will not work for those “other” components
    without specific integration.
  prefs: []
  type: TYPE_NORMAL
- en: The framework included in this article includes example plotly graphs, and the
    associated code to switch the graphs between the dark and light theme.
  prefs: []
  type: TYPE_NORMAL
- en: The dark/light switch is implemented to work **without** the need to reload
    the data displayed in the graphs, and hence will not overload any data APIs on
    switching.
  prefs: []
  type: TYPE_NORMAL
- en: Multi-page
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the more complicated items included in the framework is the fact that
    it includes more than one page.
  prefs: []
  type: TYPE_NORMAL
- en: The implementation uses the most recent method of achieving this through [Dash
    Pages](https://dash.plotly.com/urls), which was introduced in Dash 2.5.
  prefs: []
  type: TYPE_NORMAL
- en: Although the implementation of Dash Pages is relatively straight forward, it
    becomes more complicated when the project is structured into multiple files and
    folders, as there are very few examples available.
  prefs: []
  type: TYPE_NORMAL
- en: Hopefully, this framework will provide guidance on what a working example looks
    like.
  prefs: []
  type: TYPE_NORMAL
- en: Git and Development Ready
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![a git branch structure visually represented](../Images/d90e6c20101d48c1d0361bb7bd9ee62e.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Yancy Min](https://unsplash.com/@yancymin?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-close-up-of-a-text-description-on-a-computer-screen-842ofHC6MaI?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: As this framework is intended to be a starting point for your own project, it
    is assumed that some development will take place, and that ongoing development
    may include the need to use Git.
  prefs: []
  type: TYPE_NORMAL
- en: The following subsections detail some features of this framework that help to
    make this process easier.
  prefs: []
  type: TYPE_NORMAL
- en: Environmental variables
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The framework utilises [python-dotenv](https://github.com/theskumar/python-dotenv)
    to handle environmental variables (see the [“Basic Usage” section](#env) later
    in the article for implementation details).
  prefs: []
  type: TYPE_NORMAL
- en: 'What this essentially means is that certain variables can be kept local to
    the project, but out of the main code-base. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: variables that change between production and development environments
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: variables that should not appear in public repositories (i.e. GitHub)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This allows API keys to be kept secret, and seamless pushing to production through
    GitHub (should you wish to do this).
  prefs: []
  type: TYPE_NORMAL
- en: Git Ignore
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A `.gitignore` file is included primarily to stop virtual environments, and
    the all important `.env` file, from being pushed to GitHub by accident.
  prefs: []
  type: TYPE_NORMAL
- en: It also includes some generic Python based exclusions that may be helpful.
  prefs: []
  type: TYPE_NORMAL
- en: Production Server Ready
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To aid in the deployment of the Dash app to production, a `wsgi.py` file is
    included, which should be useful when the time comes to push the project live.
  prefs: []
  type: TYPE_NORMAL
- en: The `.env` file mentioned in the previous section can also be used to activate
    (or deactivate) `DEBUG` mode seamlessly between produciton and development environments.
    (see the [“Basic Usage” section](#env) later in the article for implementation
    details)
  prefs: []
  type: TYPE_NORMAL
- en: API Integration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![a green background with the acronym API printed in large letters. There is
    also a laptop at the bottom of the image with two human hands.](../Images/95088368fb99ba21157bed6c0b00f522.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by [zeeve platform](https://pixabay.com/users/zeeve-31662367/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=7693848)
    from [Pixabay](https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=7693848)
  prefs: []
  type: TYPE_NORMAL
- en: There are two data APIs integrated into the codebase.
  prefs: []
  type: TYPE_NORMAL
- en: Gapminder (the default)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The first is the Gapminder API that is included as a [library within Plotly](https://plotly.com/python-api-reference/generated/plotly.express.data.html).
  prefs: []
  type: TYPE_NORMAL
- en: This makes the API locally available, and fast, which is great for rapid development
    and testing.
  prefs: []
  type: TYPE_NORMAL
- en: API Ninjas
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: There is also code included as an example of how to integrate an external API.
  prefs: []
  type: TYPE_NORMAL
- en: In this particular case, the included external API is API Ninjas. This should
    essentially allow for more realistic remote API testing should you need this (i.e.
    accounting/testing for bad or lost connections, or API errors).
  prefs: []
  type: TYPE_NORMAL
- en: API Ninjas is a commercial API, and as such has subscription costs beyond certain
    usage levels. However, their free tier is one of the most generous I have found,
    which makes it great for development testing.
  prefs: []
  type: TYPE_NORMAL
- en: To use the API Ninjas API you will need to get your own API key (A free *limited*
    use API Key can be acquired from their [website](https://api-ninjas.com/)). The
    API key then needs to be included in the `.env` file. Finally, set the `EXTERNAL_API`
    flag in `utils/consts.py` to `True`.
  prefs: []
  type: TYPE_NORMAL
- en: '**Disclaimer:** *I am in no way affiliated with API Ninjas, feel free to use
    an external API of your choice (or none at all)!*'
  prefs: []
  type: TYPE_NORMAL
- en: CSS Styling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Specific styling can be included within the project in a CSS file. This file
    is located in `assets/styles.css` and includes the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The example just changes the main title to a gray colour, but also accounts
    for colour change when switching between the dark and light theme.
  prefs: []
  type: TYPE_NORMAL
- en: If you are familiar with CSS, extensive style changes can be made from this
    file if required.
  prefs: []
  type: TYPE_NORMAL
- en: More details on how to deal with external resources like CSS or Javascript are
    in the [Dash docs](https://dash.plotly.com/external-resources).
  prefs: []
  type: TYPE_NORMAL
- en: Important coding notes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![the second page of the Dash app which just contains some text](../Images/e49bb0983977b8dcc063bf2195ead56b.png)'
  prefs: []
  type: TYPE_IMG
- en: The second page of the framework app – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Dash is very flexible in terms of the methods allowed to build a dashboard/app,
    which keeps things simple and easy to use.
  prefs: []
  type: TYPE_NORMAL
- en: However, in the process of building this framework it has become clear that
    some unwritten rules need to be followed when things become more complicated.
  prefs: []
  type: TYPE_NORMAL
- en: it is **essential** to produce app elements with functions rather than assigning
    them to a variable.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In particular, when dealing with a multi-page Dash app, with file and folder
    structure, it is **essential** to produce app elements with functions rather than
    assigning them to a variable.
  prefs: []
  type: TYPE_NORMAL
- en: As an example, take the definition of the Archive page utilised in this project
    structure.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the Archive page defined with a function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '…and this is the same page defined using a variable:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: In theory they are both valid, and should both work, as can be seen from the
    [official documentation](https://dash.plotly.com/urls).
  prefs: []
  type: TYPE_NORMAL
- en: In general, assigning to a variable will work *sometimes*. However, there are
    certain circumstances where passing variables between separate files/folders will
    fail. Whereas, using functions will always work.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, I cannot recall an example, but I have experienced this first
    hand, which is why this framework religiously uses functions if elements are required
    to be passed between files/folders in the code.
  prefs: []
  type: TYPE_NORMAL
- en: Regardless, using functions is arguably a much more transparent and accountable
    way of coding, and in the long run makes much more sense.
  prefs: []
  type: TYPE_NORMAL
- en: Variable Typing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You may note that variable typing has been included on all functions.
  prefs: []
  type: TYPE_NORMAL
- en: As the codebase is written in Python this is not strictly necessary. The hope
    is that it will help with transparency when people are reading the codebase and
    trying to get their head around how the different pieces fit together.
  prefs: []
  type: TYPE_NORMAL
- en: If you find it confusing, or not helpful, then it can always be removed without
    any ill effects.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, changing this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'to this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Is perfectly OK.
  prefs: []
  type: TYPE_NORMAL
- en: The Repository
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[![the GitHub repository that contains the code base associated with this article](../Images/d0cb4672b8ae44ae39f734262c0fa1f0.png)](https://github.com/thetestspecimen/plotly-dash-multi-page-app)'
  prefs: []
  type: TYPE_NORMAL
- en: The GitHub page where you can access the DASH project structure discussed in
    this article – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'A fully working example Dash app, using the structure covered in this article,
    is available on my GitHub repository here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Plotly Dash Mulit-Page App](https://github.com/thetestspecimen/plotly-dash-multi-page-app)'
  prefs: []
  type: TYPE_NORMAL
- en: The repository can be cloned and run directly to see how things work, or used
    as a starting point for your own project.
  prefs: []
  type: TYPE_NORMAL
- en: Basic Usage
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![a poster with the word instructions written in bold. Mounted on a rusty metal
    structure](../Images/19c4c0e5e52f59f0d11758df6bb802bf.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Eder Pozo Pérez](https://unsplash.com/@ederpozo?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-rusted-metal-sign-with-writing-on-it-8ana6mu0V_Q?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: To run the code in the repository take the following steps.
  prefs: []
  type: TYPE_NORMAL
- en: Create your virtual environment and install packages
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Create your virtual environment and activate it. You can do this however you
    choose. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Then install the required packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Create a “.env” file
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The project uses `python-dotenv` to keep things like API Keys out of the project
    code by using a local file to store sensitive data. As such, you won’t find this
    file included in the repository. You will need to create your own.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the root of the project folder create a file with the name: `.env`.'
  prefs: []
  type: TYPE_NORMAL
- en: 'As an example of what to include in the file, the following is what could be
    used in a local development environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '**Note:** *You would have to get a legitimate API Key from NinjasAPI if you
    wanted to use that particular API, but as Gapminder local API is the default this
    is not necessary to run the app. Apart from including a working API key to use
    the NinjasAPI, you will also have to set the `EXTERNAL_API` flag in `utils/consts.py`
    to `True`.*'
  prefs: []
  type: TYPE_NORMAL
- en: Within a live / development environment you should change the `DEBUG` value
    to `False`.
  prefs: []
  type: TYPE_NORMAL
- en: Utilising this method has the advantage of being able to use Git to update code
    between the development and production environments, without having to change
    the `DEBUG` value in the `.env` file every time.
  prefs: []
  type: TYPE_NORMAL
- en: This is due to the `.env` not being included in the Git repository, and therefore
    being exclusive to the machine/server it is created on.
  prefs: []
  type: TYPE_NORMAL
- en: Run the Project
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To run the project just execute the following line from within the project
    directory:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: You will then be told the local IP address that you can open in a browser to
    access the project front end.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Hopefully this article, and the associated Github repository provide a good
    starting point to begin your journey into using Plotly Dash to create your own
    dashboards, or even just get some idea of how to move to the next stage.
  prefs: []
  type: TYPE_NORMAL
- en: If you have any comments, or improvements, with regard to the code, please feel
    free to either comment on this article, or open an issue / pull request on the
    associated [GitHub repository](https://github.com/thetestspecimen/plotly-dash-multi-page-app).
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Plotly DASH](https://dash.plotly.com/)'
