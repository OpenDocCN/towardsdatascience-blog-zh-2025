- en: Implementing the Coffee Machine in Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在Python中实现咖啡机
- en: 原文：[https://towardsdatascience.com/implementing-the-coffee-machine-in-python/](https://towardsdatascience.com/implementing-the-coffee-machine-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/implementing-the-coffee-machine-in-python/](https://towardsdatascience.com/implementing-the-coffee-machine-in-python/)
- en: <mdspan datatext="el1757108399122" class="mdspan-comment">Python is one</mdspan>
    of the easiest programming languages, and one that encapsulates within itself
    diversity and the potential to include code as complex as they come. While there
    are a number of projects and tutorials on beginner-friendly Python-based coding,
    in this article, we will learn to build a Coffee Machine program in Python. This
    article will provide an understanding and practice of conditional statements,
    loops, and Python dictionaries and will serve as a basis for complex coding (in
    a later article).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757108399122" class="mdspan-comment">Python是一种非常容易的编程语言，它封装了多样性和包含复杂代码的潜力。虽然有许多针对初学者友好的基于Python的编码项目和教程，但在这篇文章中，我们将学习如何在Python中构建咖啡机程序。这篇文章将提供对条件语句、循环和Python字典的理解和实践，并将作为复杂编码的基础（在后续文章中）。
- en: Understanding the Project Requirements
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解项目要求
- en: First things first, let us try to understand how the program will work, what
    the basic requirements are, what variables and conditionals we will need, and
    the scope of the Coffee Making Machine.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们尝试了解程序将如何工作，基本要求是什么，我们需要哪些变量和条件，以及咖啡制作机的范围。
- en: 'The program will function as follows: The program will display menu items and
    ask the user if they want a drink. The user may choose a drink of their liking.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 程序将按以下方式运行：程序将显示菜单项并询问用户是否想要饮料。用户可以选择他们喜欢的饮料。
- en: If the user chooses a drink, we will have to make sure our coffee machine has
    enough resources to make the coffee. If it has, then we will continue ahead. Otherwise,
    we will let the user know.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果用户选择饮料，我们必须确保我们的咖啡机有足够的资源来制作咖啡。如果有，我们将继续前进。否则，我们将通知用户。
- en: If the resources are enough, then we will ask the user for payment in the form
    of coins of nickels, pennies, dimes, and quarters. We will calculate the payment
    made versus the cost. If the payment is complete, we will make the coffee and
    serve it. If the payment made is more than the price of the coffee, we will give
    them their change back. Otherwise, if the payment falls short of the price, we
    will reject the order and give back their coins.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 如果资源足够，我们将要求用户以镍币、便士、一角和quarter的形式支付。我们将计算支付金额与成本之间的差额。如果支付完成，我们将制作咖啡并提供服务。如果支付的金额超过咖啡的价格，我们将退还他们找零。否则，如果支付的金额低于价格，我们将拒绝订单并退还他们的硬币。
- en: An exception we will add is that if someone from management wants to know the
    resources left, or the money the machine has stored after completing orders, they
    may access this by typing ‘report’. Moreover, if the management wants to switch
    off the machine completely, they may do so by typing ‘off’
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将添加一个异常，即如果管理层的人想知道剩余的资源，或者机器在完成订单后存储的金钱，他们可以通过输入“report”来访问这些信息。此外，如果管理层想要完全关闭机器，他们可以通过输入“off”来实现。
- en: 'Let us define all this with the help of a flowchart:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用流程图来定义所有这些：
- en: '![](../Images/b0a87f3e0fbb983691efad93e50e94d8.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b0a87f3e0fbb983691efad93e50e94d8.png)'
- en: Flowchart (Image by Author)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图（图片由作者提供）
- en: 'Step 1: Defining Menu & Resources'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一步：定义菜单和资源
- en: 'The first step in coding this Coffee Machine Project is to define the menu
    as well as the resources the machine has to prepare any order. In our example,
    we will have 3 items on the menu: Latte, Espresso, and Cappuccino.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 编写这个咖啡机项目的第一步是定义菜单以及机器准备任何订单所需的资源。在我们的例子中，我们将有3个菜单项：拿铁、浓缩咖啡和卡布奇诺。
- en: 'We will use the Python dictionary in order to define the menu variable. A [Python
    dictionary](https://docs.python.org/3/tutorial/datastructures.html#dictionaries)
    is a useful data type that stores data against a key, both of which are easily
    accessible. The menu variable will be a dictionary that not only stores the 3
    menu items, ie, latte, cappuccino, and espresso, but also describes the ingredients
    that are required to make them and their price. Let us code the above:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用Python字典来定义菜单变量。一个[Python字典](https://docs.python.org/3/tutorial/datastructures.html#dictionaries)是一种有用的数据类型，它通过键存储数据，这两个键都很容易访问。菜单变量将是一个字典，不仅存储3个菜单项，即拿铁、卡布奇诺和浓缩咖啡，还描述了制作它们所需的成分和价格。让我们编写上述代码：
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The next task is to define the resources we have. These are the resources that
    would be required to make the different types of coffee, as well as the money
    that is generated by selling the coffee.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: As you can see, we have specific amounts of each ingredient as our resources,
    and 0 money as no coffee has been sold initially.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Ask User for Order'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The next step is to ask the user what they would like to order. We will use
    the [Python input function](https://docs.python.org/3/library/functions.html#input)
    for this purpose. Moreover, we will convert the input string to lowercase so it
    will be easily matched in our conditionals that will follow.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Step 3: Add Special Cases using Conditionals'
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Next, we will add 2 special cases. The first one is that if the management wants
    to turn the machine completely off, they will enter `off` as input to the above
    statement, and the machine will turn off, or in other words, the program will
    end. We will define a variable for this purpose called `end` that will be `False`
    initially and will turn `True` when the management wants to turn off the machine.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: 'Another case we will add here is when the management would like to know the
    resources in the coffee machine, they will enter `report`, and the machine will
    print a report of the available resources. Let us put these cases to code:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Note that we have used `\n` and [f-string](https://docs.python.org/3/tutorial/inputoutput.html#fancier-output-formatting)
    to properly format the report. Result would be:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2cfbcbdf96498f23f0e8d0b4984cb481.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
- en: Report (Image by Author)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Check Resources'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The next step is to check the resources required to make coffee. If an espresso
    requires 50ml of water and 20g of coffee, and either of the ingredients is insufficient,
    we cannot proceed with making coffee. Only when the ingredients are there will
    we proceed towards making coffee.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: 'This is going to be lengthy to code, we will check one by one whether each
    of the ingredients are there in our resources:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Only when the 3 conditions are checked, then we will proceed with making the
    coffee; otherwise, print to the user which of the ingredients is not sufficient.
    Also, we have to make sure that the user has paid the price of their order. Let
    us do that.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Ask and Calculate Payment'
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For the condition listed above, where all resources are available, the next
    step is to ask the user to pay the price. Once the payment is done, we will make
    the coffee.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Now we will ask the user to insert coins (our coffee machine is outdated, so
    bear with the clinking of the coins :P). We will ask for the coins they are inserting
    and calculate the total, then compare it with the price of their order.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/014e7af43a00ac57a3107f021f8e441d.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
- en: (Photo by [Erik Mclean](https://unsplash.com/@introspectivedsgn?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/silver-and-gold-round-coins-OyU29jm2m2U?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash))
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: 'Coins inserted in the coffee machine are of 4 different types:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Pennies = $0.01
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nickels = $0.05
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dimes = $0.10
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Quarters = $0.25
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `total` value will be calculated by multiplying the number of coin types
    by their values. Make sure to convert the input into an int type; otherwise, you
    will have an error.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Next, is to check whether the `total` amount calculated is equal to the price
    of the coffee selected or not? Here is how we will code it:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Only when the amount is equal to the price of the coffee, is the transaction
    successful. If the `total` value is greater than the price, we will need to return
    the change to the user. Otherwise, if the total value falls short of the price,
    we will cancel the order.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 6: Make Coffee'
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The last step is to dispense the coffee to the user, and in our coding world,
    we will do so by updating both the ingredients and the money in our resources
    dictionary.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Notice that the ingredients are subtracted from the resources while money is
    added. Hence, our resources dictionary is updated with each order delivered. The
    same condition will also be added when we have an additional amount and are required
    to give change back.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 7: Program Continuity'
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After the coffee order is processed, as long as the management doesn’t command
    the coffee machine to switch off, the machine will keep on asking the user for
    their coffee order, processing payments, updating resources, and dispensing the
    coffee. So we will include a while loop to ensure the program continues after
    the drink has been dispensed.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: 'The entire block of code we have coded above will be included in this while
    loop:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Conclusion
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have successfully converted the working of a coffee machine into Python code.
    Over the course of this project, we explored dictionaries and accessing them,
    conditional statements, and the while loop. While quite straightforward, we can
    further simplify this project with other techniques such as Object Oriented Programming
    (a project for next time). Do share your feedback regarding this project and any
    suggestions on how we can further improve it. Till then, enjoy your coffee!
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/85a1d46e9bab1a0966cd4ffee477b9b4.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
- en: (Photo by [Nathan Dumlao](https://unsplash.com/@nate_dumlao?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
