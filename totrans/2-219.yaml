- en: Build Multi-Agent Apps with OpenAI’s Agent SDK
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/build-multi-agent-apps-with-openais-agent-sdk/](https://towardsdatascience.com/build-multi-agent-apps-with-openais-agent-sdk/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1750740264259" class="mdspan-comment">By using layers</mdspan>
    of abstraction built on top of fundamentally simple ideas, some agent framework
    devs seem to believe complexity is a virtue.
  prefs: []
  type: TYPE_NORMAL
- en: I tend to go along with Einstein’s maxim, “*Everything should be made as simple
    as possible, but not simpler”.* So, let me show you a framework that is easy to
    use and easy to understand.
  prefs: []
  type: TYPE_NORMAL
- en: 'OpenAI takes a refreshingly different approach to other framework developers :
    they don’t try to be clever, they try to be clear.'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll show how you can build multi-agent apps using OpenAI’s
    open-source SDK.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll see how to construct a simple single-agent app and then go on to explore
    multi-agent configurations. We’ll cover tool-calling, linear and hierarchical
    configurations, handoffs from one agent to another and using agents as tools.
  prefs: []
  type: TYPE_NORMAL
- en: 'Specifically, we will see the following examples:'
  prefs: []
  type: TYPE_NORMAL
- en: A simple call to an agent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A tool-using agent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Handoffs from one agent to another
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Handoffs to multiple agents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using agents as tools
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hierarchical agent orchestration using agents as tools
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The agent SDK
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The agent SDK is based on a handful of concepts essential to agentic and multi-agent
    systems and builds a framework around them — it replaces [Swarm](https://github.com/openai/swarm),
    an educational framework developed by OpenAI, where those concepts were identified
    and implemented. The Agent SDK builds upon and expands Swarm while maintaining
    its founding principles of being lightweight and simple.
  prefs: []
  type: TYPE_NORMAL
- en: Simple it may be, but you can construct sophisticated agent-based systems with
    this framework where agents use tools (which can be other agents), hand off to
    other agents, and can be orchestrated in any number of clever ways.
  prefs: []
  type: TYPE_NORMAL
- en: Installation is via pip, or your preferred package management tool, and the
    package is called `openai-agents`. I favour UV, so to start a new project, I would
    do something like the following.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: A simple call to an agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A simple agent call is shown in the diagram below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/da3d756e0ef563641e21fcf6b56a482e.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../Images/2b35c64523d2ee5d0983eb59a8817d4f.png)'
  prefs: []
  type: TYPE_IMG
- en: A simple Agent
  prefs: []
  type: TYPE_NORMAL
- en: This is a data flow diagram that shows the running agent as a process with data
    flowing in and out. The flow that starts the process is the user prompt; the agent
    makes one or more calls to the LLM and receives responses. When it has completed
    its task, it outputs the agent response.
  prefs: []
  type: TYPE_NORMAL
- en: Below we see the code for a basic program that uses the SDK to implement this
    flow. It instantiates an agent, gives it a name and some instructions; it then
    runs it and prints the result. It’s similar to the first example from OpenAI’s
    documentation, but here we will create a Streamlit app.
  prefs: []
  type: TYPE_NORMAL
- en: First, we import the libraries.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: We need the Streamlit package, of course, and `asyncio` because we will use
    its functionality to wait for the agent to complete before proceeding. Next, we
    import the minimum from the agents package, `Agent` (to create an agent) and `Runner`
    (to run the agent).
  prefs: []
  type: TYPE_NORMAL
- en: Below, we define the code to create and run the agent.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: This code uses the default model from OpenAI (and assumes you have a valid API
    key set as an environment variable – and you will, of course, be charged , but
    for our purposes here, it won’t be much.  I’ve only spent a few tens of cents
    on this).
  prefs: []
  type: TYPE_NORMAL
- en: First, we instantiate an agent called “Assistant” with some simple instructions,
    then we define an asynchronous function that will run it with a string (the query)
    provided by the user.
  prefs: []
  type: TYPE_NORMAL
- en: The `run` function is asynchronous; we need to wait for the LLM to complete
    before we continue, and so we will run the function using `asyncio`.
  prefs: []
  type: TYPE_NORMAL
- en: We define the user interface with Streamlit functions.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: This is mostly self-explanatory. The user is prompted to enter a query and press
    the ‘Send’ button. When the button is pressed `run_agent` is run via a call to
    `asyncio.run`. The result is displayed in a scrollable container. Below is a screenshot
    of a sample run.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f34456d02737b74cb867ca8663d4249c.png)'
  prefs: []
  type: TYPE_IMG
- en: Your result may differ (LLMs are renowned for not giving the same answer twice).
  prefs: []
  type: TYPE_NORMAL
- en: To define an agent, give it a name and some instructions. Running is also straightforward;
    pass in the agent and a query. Running the agent starts a loop that completes
    when a final answer is reached. This example is simple and does not need to run
    through the loop more than once, but an agent that calls tools might need to go
    through several iterations before an answer is finalised.
  prefs: []
  type: TYPE_NORMAL
- en: The result is easily displayed. As we can see, it is the `final_output` attribute
    of the value that is returned from the `Runner`.
  prefs: []
  type: TYPE_NORMAL
- en: This program uses default values for several parameters that could be set manually,
    such as the model name and the temperature setting for the LLM. The Agent SDK
    also uses the *Responses API* by default. That’s an OpenAI-only API (so far, at
    least), so if you need to use the SDK with another LLM, you have to switch to
    the more widely supported Chat Completions API.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Initially, and for simplicity, we’ll use the default Response API.
  prefs: []
  type: TYPE_NORMAL
- en: A tool-using agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Agents can use tools, and the agent, in conjunction with the LLM, decides which
    tools, if any, it needs to use.
  prefs: []
  type: TYPE_NORMAL
- en: Here is a data flow diagram that shows a tool-using agent.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3397a9f4df5afb239bfbf8f1cf609cf5.png)'
  prefs: []
  type: TYPE_IMG
- en: A tool-using agent
  prefs: []
  type: TYPE_NORMAL
- en: It is similar to the simple agent, but we can see an additional process, the
    tool, that the agent utilises. When the agent makes a call to the LLM, the response
    will indicate whether or not a tool needs to be used. If it does, then the agent
    will make that call and submit the result back to the LLM. Again, the response
    from the LLM will indicate whether another tool call is necessary. The agent will
    continue this loop until the LLM no longer requires the input from a tool. At
    this point, the agent can respond to the user.
  prefs: []
  type: TYPE_NORMAL
- en: Below is the code for a single agent using a single tool.
  prefs: []
  type: TYPE_NORMAL
- en: 'The program consists of four parts:'
  prefs: []
  type: TYPE_NORMAL
- en: The imports from the Agents library and `wikipedia` (which will be used as a
    tool).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The definition of a tool — this is simply a function with the `@function_tool`
    decorator.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The definition of the agent that uses the tool.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Running the agent and printing the result in a Streamlit app, as before.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The tool looks up a Wikipedia page and returns a summary via a standard call
    to a library function. Note that we’ve used type hints and a *docstring* to describe
    the function so the agent can work out how to use it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next is the definition of the agent, and here we see that there are more parameters
    than earlier: we specify the model that we want to use and a list of tools (there’s
    only one in this list).'
  prefs: []
  type: TYPE_NORMAL
- en: Running and printing the result is as before, and it dutifully returns an answer
    (the height of the Eiffel Tower).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4cdef2c003f96986eeb8e56eb8d3ab5d.png)'
  prefs: []
  type: TYPE_IMG
- en: That is a simple test of the tool-using agent, which only requires a single
    lookup. A more complex query may use a tool more than once to collect the information.
  prefs: []
  type: TYPE_NORMAL
- en: For example, I asked, “*Find the name of the famous tower in Paris, find its
    height and then find the date of birth of its creator*“. This required two tool
    calls, one to get information about the Eiffel Tower and the second to find when
    Gustav Eiffel was born.
  prefs: []
  type: TYPE_NORMAL
- en: This process is not reflected in the final output, but we can see the stages
    that the agent went through by viewing the raw messages in the agent’s result.
    I printed `result.raw_messages` for the query above, and the result is shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'You can see that there are three responses: the first two are the result of
    the two tool calls, and the last is the final output, which is generated from
    the information derived from the tool calls.'
  prefs: []
  type: TYPE_NORMAL
- en: We’ll see tools again shortly when we use agents as tools, but now we are going
    to consider how we can use multiple agents that cooperate.
  prefs: []
  type: TYPE_NORMAL
- en: Multiple agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many agent applications only require a single agent, and these are already a
    long step beyond simple chat completions that you find in the LLM chat interfaces,
    such as ChatGPT. [Agents run in loops](https://medium.com/ai-advances/how-to-build-a-react-ai-agent-with-claude-3-5-and-python-95423f798640)
    and can use tools, making even a single agent pretty powerful. However, multiple
    agents working together can achieve even more complex behaviours.
  prefs: []
  type: TYPE_NORMAL
- en: In keeping with its simple philosophy, OpenAI doesn’t attempt to incorporate
    agent orchestration abstractions like some other frameworks. But despite its simple
    design, it supports the construction of both simple and complex configurations.
  prefs: []
  type: TYPE_NORMAL
- en: First, we’ll look at handoffs where one agent passes control to another. After
    that, we’ll see how agents can be combined hierarchically.
  prefs: []
  type: TYPE_NORMAL
- en: Handoffs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When an agent decides that it has completed its task and passes information
    to another agent for further work, that is termed a handoff.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two fundamental ways of achieving a handoff: with an *agentic* handoff,
    the entire message history is passed from one agent to another. It’s a bit like
    when you call the bank but the person you first speak to doesn’t know your particular
    circumstances, and so passes you on to someone who does. The difference is that,
    in the case of the AI agent, the new agent has a record of all that was said to
    the previous one.'
  prefs: []
  type: TYPE_NORMAL
- en: The second method is a *programmatic* handoff. This is where only the required
    information provided by one agent is passed to another (via conventional programming
    methods).
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at programmatic handoffs first.
  prefs: []
  type: TYPE_NORMAL
- en: Programmatic handoffs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sometimes the new agent doesn’t need to know the entire history of a transaction;
    perhaps only the final result is required. In this case, instead of a full handoff,
    you can arrange a programmatic handoff where only the relevant data is passed
    to the second agent.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e9a6e71c0de036a31c703ca94639e285.png)'
  prefs: []
  type: TYPE_IMG
- en: Programmatic handoff
  prefs: []
  type: TYPE_NORMAL
- en: The diagram shows a generic programmatic handoff between two agents.
  prefs: []
  type: TYPE_NORMAL
- en: Below is an example of this functionality, where one agent finds information
    about a topic and another takes that information and writes an article that’s
    suitable for kids.
  prefs: []
  type: TYPE_NORMAL
- en: To keep things simple, we won’t use our Wikipedia tool in this example; instead,
    we rely on the LLM’s knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'In the code above, we define two agents: one researches a topic and the other
    produces text suitable for kids.'
  prefs: []
  type: TYPE_NORMAL
- en: This technique doesn’t rely on any special SDK functions; it simply runs one
    agent, gets the output in `result` and uses it as the input for the next agent
    (output in `result2`). It’s just like using the output of one function as the
    input for the next in conventional programming. Indeed, that is precisely what
    it is.
  prefs: []
  type: TYPE_NORMAL
- en: Agentic handoffs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: However, sometimes an agent needs to know the history of what occurred previously.
    That’s where the OpenAI Agents Handoffs come in.
  prefs: []
  type: TYPE_NORMAL
- en: Below is the data flow diagram that represents the Agentic Handoff. You will
    see that it is very similar to the Programmatic Handoff; the difference is the
    data being transferred to the second agent, and also, there is a possible output
    from the first agent when the handoff is not required.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/315a1eda9a8d54d55008ebdcf3f12922.png)'
  prefs: []
  type: TYPE_IMG
- en: Agentic Handoff
  prefs: []
  type: TYPE_NORMAL
- en: The code is also similar to the previous example. I’ve tweaked the instructions
    slightly, but the main difference is the `handoffs` list in `researcher_agent`.
    This is not dissimilar to the way we declare tools.
  prefs: []
  type: TYPE_NORMAL
- en: The Research Agent has been allowed to hand off to the Kid’s Writer Agent when
    it has completed its work. The effect of this is that the Kid’s Writer Agent not
    only takes over control of the processing but also has knowledge of what the Research
    Agent did, as well as the original prompt.
  prefs: []
  type: TYPE_NORMAL
- en: However, there is another major difference. It is up to the agent to determine
    whether the handoff takes place or not. In the example run below, I have instructed
    the agent to write something suitable for kids, and so it hands off to the Kids’
    Writer Agent. If I had not told it to do that, it would have simply returned the
    original text.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: It is not in the screenshot, but I’ve added code to output the `response` and
    the `raw_responses` so that you can see the handoff in operation if you run the
    code yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Below is a screenshot of this agent.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7d4dbd25cca75ec9e507fcdb7382f725.png)'
  prefs: []
  type: TYPE_IMG
- en: An agent can have a list of handoffs at its disposal, and it will intelligently
    choose the correct agent (or none) to hand off to. You can see how this would
    be useful in a customer service situation where a difficult customer query might
    be escalated through a series of more expert agents, each of whom needs to be
    aware of the query history.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll now look at how we can use handoffs that involve multiple agents.
  prefs: []
  type: TYPE_NORMAL
- en: Handoffs to multiple agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will now see a new version of the previous program where the Research Agent
    chooses to hand off to different agents depending on the reader’s age.
  prefs: []
  type: TYPE_NORMAL
- en: 'The agent’s job is to produce text for three audiences: adults, teenagers and
    kids. The Research Agent will gather information and then hand it off to one of
    three other agents. Here is the data flow (note that I have excluded the links
    to an LLM for clarity – each agent communicates with an LLM, but we can consider
    that as an internal function of the agent).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f70b9a16c929235e011ac1bbae340a8c.png)'
  prefs: []
  type: TYPE_IMG
- en: Multiple agent handoff
  prefs: []
  type: TYPE_NORMAL
- en: And here is the code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The program’s structure is similar, but now we have a set of agents to hand
    off to and a list of them in the Research Agent. The instructions in the various
    agents are self-explanatory, and the program will correctly respond to a prompt
    such as “Write an essay about Paris, France for kids” or “…for teenagers” or “…for
    adults”. The Research Agent will correctly choose the appropriate Writer Agent
    for the task.
  prefs: []
  type: TYPE_NORMAL
- en: The screenshot below shows an example of writing for teenagers.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0eeea0befd1ed56b1f2208119813c660.png)'
  prefs: []
  type: TYPE_IMG
- en: The prompts provided in this example are simple. More sophisticated prompts
    would likely yield a better and more consistent result, but the aim here is to
    show the techniques rather than to build a clever app.
  prefs: []
  type: TYPE_NORMAL
- en: That is one type of collaboration; another is to use other agents as tools.
    This is not too dissimilar to the programmatic handoff we saw earlier.
  prefs: []
  type: TYPE_NORMAL
- en: Agents as tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Running an agent is calling a function in the same way as calling a tool. So
    why not use agents as intelligent tools?
  prefs: []
  type: TYPE_NORMAL
- en: Instead of giving control over to a new agent, we use it as a function that
    we pass information to and get information back from.
  prefs: []
  type: TYPE_NORMAL
- en: Below is a data flow diagram that illustrates the idea. Unlike a handoff, the
    main agent doesn’t pass overall control to another agent; instead, it intelligently
    chooses to call an agent as if it were a tool. The called agent does its job and
    then passes control back to the calling agent. Again, the data flows to an LLM
    have been omitted for clarity.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b8e3a0e4bd9de9477ae259de10064d44.png)'
  prefs: []
  type: TYPE_IMG
- en: Below is a screenshot of a modified version of the previous program. We changed
    the nature of the app a little. The main agent is now a travel agent; it expects
    the user to give it a destination and the age group for which it should write.
    The UI is changed so that the age group is selected via a radio button. The text
    input field should be a destination.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/96bedc7673dcff5ba172b5ddcc6f2e84.png)'
  prefs: []
  type: TYPE_IMG
- en: A number of modifications have been made to the logic of the app. The UI changes
    the way the information is input, and this is reflected in the way that the prompt
    is constructed – we use an f-string to incorporate the two pieces of data into
    the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, we now have an extra agent that formats the text. The other agents
    are similar (but note that the prompts have been refined), and we also use a structured
    output to ensure that the text that we output is precisely what we expect.
  prefs: []
  type: TYPE_NORMAL
- en: Fundamentally, though, we see that the writer agents and the formatting agent
    are specified as tools in the researcher agent.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'The tools list is a little different to the one we saw earlier:'
  prefs: []
  type: TYPE_NORMAL
- en: The tool name is the agent name plus `.agent_as_tool()`, a method that makes
    the agent compatible with other tools .
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The tool needs a couple of parameters — a name and a description.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: One other addition, which is very useful, is the use of *structured outputs*,
    as mentioned above. This separates the text that we want from any other commentary
    that the LLM might want to insert. If you run the code, you can see in the `raw_responses`
    the additional information that the LLM generates.
  prefs: []
  type: TYPE_NORMAL
- en: Using structured outputs helps to produce consistent results and solves a problem
    that is a particular bugbear of mine.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve asked the output to be run through a formatter agent that will structure
    the result as Markdown. It depends on the LLM, it depends on the prompt, and who
    knows, maybe it depends on the time of day or the weather, but whenever I think
    I’ve got it right, an LLM will suddenly insert Markdown fencing. So instead of
    a clean:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'I instead get:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Infuriating!
  prefs: []
  type: TYPE_NORMAL
- en: Anyway, the answer seems to be to use structured outputs. If you asked it to
    format the response as the text of what you want, plus a second field called ‘commentary’
    or some such thing, it appears to do the right thing. Any extraneous stuff the
    LLM decides to spout goes in the second field, and the unadulterated Markdown
    goes in the text field.
  prefs: []
  type: TYPE_NORMAL
- en: 'OK, Shakespeare, it isn’t: adjusting the instructions so that they are more
    detailed might give better results (the current prompts are very simple). But
    it works well enough to illustrate the method.'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: That’s scratched the surface of OpenAI’s Agents SDK. Thanks for reading, and
    I hope you found it useful. We have seen how to create agents and how to combine
    them in different ways, and we took a very quick look at structured outputs.
  prefs: []
  type: TYPE_NORMAL
- en: The examples are, of course, simple, but I hope they illustrate the easy way
    that agents can be orchestrated simply without resorting to complex abstractions
    and unwieldy frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: The code here uses the Response API because that is the default. However, it
    should run the same way with the Completions API, as well. Which means that you
    are not limited to ChatGPT and, with a bit of jiggery-pokery, this SDK can be
    used with any LLM that supports the OpenAI Completions API.
  prefs: []
  type: TYPE_NORMAL
- en: There’s plenty more to find out in [OpenAI’s documentation](https://openai.github.io/openai-agents-python/).
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '*All the code above [can be found in my GitHub repo](https://github.com/DataVizandAI/public_code/tree/main/openAI-Agent-SDK).*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Images are by the author unless otherwise stated.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
