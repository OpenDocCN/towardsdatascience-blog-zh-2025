- en: Here, we set the path to the local storage in a folder called mlruns. Metadata
    like experiments, runs, parameters, metrics, tags and artifacts like model files,
    loss curves, and other images will be stored inside the mlruns directory. We can
    set the host as 0.0.0.0 or 127.0.0.1(more secure). Since the whole process is
    short-lived, I went with 0.0.0.0\. Finally, assign a port number that is not used
    by any other application.
  prefs: []
  type: TYPE_NORMAL
- en: (Optional) Sometimes, your HPC might not detect *libpython3.12,* which basically
    makes Python run. You can follow the steps below to find and add it to your path.
  prefs: []
  type: TYPE_NORMAL
- en: 'Search for *libpython3.12*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Returns something like: /path/to/python/3.12/lib/libpython3.12.so.1.0'
  prefs: []
  type: TYPE_NORMAL
- en: 'Set the path as an environment variable:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '4) We will export the experiment data from the mlruns local storage directory
    to a temp folder:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '(Optional) Running the *export_experiment* function on the HPC bash shell may
    cause thread utilisation errors like:'
  prefs: []
  type: TYPE_NORMAL
- en: '`OpenBLAS blas_thread_init: pthread_create failed for thread X of 64: Resource
    temporarily unavailable`'
  prefs: []
  type: TYPE_NORMAL
- en: This happens because MLflow internally uses *SciPy* for artifacts and metadata
    handling, which requests threads through *OpenBLAS,* which is more than the allowed
    limit set by your HPC. In case of this issue, limit the number of threads by setting
    the following environment variables.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: If the issue persists, try reducing the thread limit to 2.
  prefs: []
  type: TYPE_NORMAL
- en: '5) Transfer experiment runs to MLflow Server:'
  prefs: []
  type: TYPE_NORMAL
- en: Move everything from the HPC to the temporary folder on the MLflow server.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '6) Stop the local MLflow server and clean up the ports:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'On MLflow Server:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our goal is to transfer experimental data from the tmp folder to *MySQL* and
    *MinIO*.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Since MinIO is Amazon S3 compatible, it uses boto3 (AWS Python SDK) for communication.
    So, we will set up proxy AWS-like credentials and use them to communicate with
    MinIO using boto3.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 2) Below are the commands to transfer the data.
  prefs: []
  type: TYPE_NORMAL
- en: Setting the MLflow server and MinIO addresses in our environment. To avoid repeating
    this, we can enter this in our .bashrc file.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: All the experiment files can be found under the exported_runs folder in the
    tmp directory. The *import-experiment* function finishes our job.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The workaround helped me in tracking experiments even when communications and
    data transfers were restricted on my HPC cluster. Spinning up a local MLflow server
    instance, exporting experiments, and then importing them to my remote MLflow server
    provided me with flexibility without having to change my workflow.
  prefs: []
  type: TYPE_NORMAL
- en: However, if you are dealing with sensitive data, make sure your transfer method
    is secure. Creating cron jobs and automation scripts could potentially remove
    manual overhead. Also, be mindful of your local storage, as it is easy to fill
    up.
  prefs: []
  type: TYPE_NORMAL
- en: In the end, if you are working in similar environments, this article can provide
    you with a solution without requiring any admin privileges in a short time. Hopefully,
    this helps teams who are stuck with the same issue. Thanks for reading this article!
  prefs: []
  type: TYPE_NORMAL
