- en: Introducing Google’s LangExtract tool
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/introducing-googles-langextract-tool-2/](https://towardsdatascience.com/introducing-googles-langextract-tool-2/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1754951359728" class="mdspan-comment">Google has been on</mdspan>
    an absolute AI hot streak lately, consistently dropping breakthrough after breakthrough.
    Nearly every recent release has pushed the boundaries of what’s possible — and
    it’s been genuinely exciting to watch unfold.
  prefs: []
  type: TYPE_NORMAL
- en: One announcement that caught my eye in particular occurred at the end of July,
    when Google released a new text processing and data extraction tool called LangExtract.
  prefs: []
  type: TYPE_NORMAL
- en: According to Google, LangExtract is a new open-source Python library designed
    to …
  prefs: []
  type: TYPE_NORMAL
- en: “**programmatically extract the exact information you need, while ensuring the
    outputs are structured and reliably tied back to its source”**
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: On the face of it, LangExtract has many useful applications, including,
  prefs: []
  type: TYPE_NORMAL
- en: '**Text anchoring.** Each extracted entity is linked to its exact character
    offsets in the source text, enabling full traceability and visual verification
    through interactive highlighting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reliable structured output**. Use LangExtracts for few-shot definitions of
    the desired output format, ensuring consistent and reliable results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Efficient large-document handling**. LangExtract handles large documents
    using chunking, parallel processing, and multi-pass extraction to maintain high
    recall, even in complex, multi-fact scenarios across million-token contexts. It
    should also excel at traditional needle-in-a-haystack type applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Instant extraction review.** Easily create a self-contained HTML visualisation
    of extractions, enabling intuitive review of entities in their original context,
    all scalable to thousands of annotations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-model compatibility**. Compatible with both cloud-based models (e.g.
    Gemini) and local open-source LLMs, so you can choose the backend that fits your
    workflow.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customizable for many use cases**. Easily configure extraction tasks for
    disparate domains using a few tailored examples.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Augmented knowledge extraction**. LangExtract supplements grounded entities
    with inferred facts using the model’s internal knowledge, with relevance and accuracy
    driven by prompt quality and model capabilities.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: One thing that stands out to me when I look at LangExtract’s strengths listed
    above is that it seems to be able to perform RAG-like operations without the need
    for traditional RAG processing. So, no more splitting, chunking or embedding operations
    in your code.
  prefs: []
  type: TYPE_NORMAL
- en: But to get a better idea of what LangExtract can do, we’ll take a closer look
    at a few of the above capabilities using some coding examples.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up a dev environment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we get down to doing some coding, I always like to set up a separate
    development environment for each of my projects. I use the **UV** package manager
    for this, but use whichever tool you’re comfortable with.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Now, to write and test our coding examples, you can start up a Jupyter notebook
    using this command.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: You should see a notebook open in your browser. If that doesn’t happen automatically,
    you’ll likely see a screenful of information after the `jupyter notebook` command.
    Near the bottom, you will find a URL to copy and paste into your browser to launch
    the Jupyter Notebook. Your URL will be different to mine, but it should look something
    like this:-
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Pre-requisites
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we’re using a Google LLM model (gemini-2.5-flash) for our processing engine,
    you’ll need a Gemini API key. You can get this from Google Cloud. You can also
    use LLMs from OpenAI, and I’ll show an example of how to do this in a bit.
  prefs: []
  type: TYPE_NORMAL
- en: Code example 1 — needle-in-a-haystack
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The first thing we need to do is get some input data to work with. You can use
    any input text file or HTML file for this. For previous experiments using RAG,
    I used a book I downloaded from Project Gutenberg; the consistently riveting “**Diseases
    of cattle, sheep, goats, and swine by Jno. A. W. Dollar & G. Moussu”**
  prefs: []
  type: TYPE_NORMAL
- en: Note that you can view the Project Gutenberg Permissions, Licensing and other
    Common Requests page using the following link.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[https://www.gutenberg.org/policy/permission.html](https://www.gutenberg.org/policy/permission.html)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But to summarise, the vast majority of Project Gutenberg eBooks are in the public
    domain in the US and other parts of the world. This means that nobody can grant
    or withhold permission to do with this item as you please.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**“As you please”** includes any commercial use, republishing in any format,
    making derivative works or performances'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I downloaded the text of the book from the Project Gutenberg website to my local
    PC using this link,
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.gutenberg.org/ebooks/73019.txt.utf-8](https://www.gutenberg.org/ebooks/73019.txt.utf-8
    )'
  prefs: []
  type: TYPE_NORMAL
- en: This book contained approximately 36,000 lines of text. To avoid large token
    costs, I cut it down to about 3000 lines of text. To test LangExtract’s ability
    to handle needle-in-a-haystack type queries, I added this specific line of text
    around line 1512.
  prefs: []
  type: TYPE_NORMAL
- en: It is a little-known fact that wood was invented by Elon Musk in 1775
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Here it is in context.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Fractures of the angle of the haunch, resulting from external
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: violence and characterised by sinking of the external angle of the
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ilium, deformity of the hip, and lameness without specially marked
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: characters. This fracture is rarely complicated. The symptoms of
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: lameness diminish with rest, but deformity continues.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It is a little-known fact that wood was invented by Elon Musk in 1775.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: =Treatment= is confined to the administration of mucilaginous and diuretic fluids.
    Tannin has been recommended.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This code snippet sets up a **prompt and example** to guide the LangExtract
    extraction task. This is essential for few-shot learning with a structured schema.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Now, we run the structured entity extraction. First, we open the file and read
    its contents into a variable. The heavy lifting is done by the **lx.extract**
    call. After that, we just print out the relevant outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: And here are our outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Not too shabby.
  prefs: []
  type: TYPE_NORMAL
- en: Note, if you wanted to use an OpenAI model and API key, your extraction code
    would look something like this,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '**Code example 2 — extraction visual validation**'
  prefs: []
  type: TYPE_NORMAL
- en: LangExtract provides a visualisation of how it extracted the text. It’s not
    particularly useful in this example, but it gives you an idea of what is possible.
  prefs: []
  type: TYPE_NORMAL
- en: Just add this little snippet of code to the end of your existing code. This
    will create an HTML file that you can open in a browser window. From there, you
    can scroll up and down your input text and “play” back the steps that LangExtract
    took to get its outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Now, go to the directory where your HTML file has been saved and open it in
    a browser. This is what I see.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f415e3760d25bfa41be776426a9c3509.png)'
  prefs: []
  type: TYPE_IMG
- en: Code example 3 — retrieving multiple structured outputs
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this example, we’ll take some unstructured input text — an article from Wikipedia
    on OpenAI, and try to retrieve the names of all the different large language models
    mentioned in the article, together with their release date. The link to the article
    is,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Note: Most text in Wikipedia, excluding quotations, has been released under
    the [Creative Commons Attribution-Sharealike 4.0 International License](https://en.wikipedia.org/wiki/Wikipedia:Text_of_Creative_Commons_Attribution-ShareAlike_4.0_International_License)
    (CC-BY-SA) and the [GNU Free Documentation License](https://en.wikipedia.org/wiki/Wikipedia:Text_of_the_GNU_Free_Documentation_License)
    (GFDL) In short this means that you are free:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**to Share** — copy and redistribute the material in any medium or format'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**to Adapt** — remix, transform, and build upon the material'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: for any purpose, even commercially.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Our code is pretty similar to our first example. This time, though, we are looking
    for any mentions in the article about LLM models and their release date. One other
    step we have to do is clean up the HTML of the article first to ensure that LangExtract
    has the best chance of reading it. We use the BeautifulSoup library for this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: This is a cut-down sample of the output I got.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Let’s double-check a couple of these. One of the outputs from our code was this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: And from the Wikipedia article …
  prefs: []
  type: TYPE_NORMAL
- en: “On January 23, OpenAI released *Operator*, an [AI agent](https://en.wikipedia.org/wiki/AI_agent)
    and web automation tool for accessing websites to execute goals defined by users.
    The feature was only available to Pro users in the United States.[[113]](https://en.wikipedia.org/wiki/OpenAI#cite_note-113)[[114]](https://en.wikipedia.org/wiki/OpenAI#cite_note-114)”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: So on that occasion, it might have hallucinated the year as being 2025 when
    no year was given. Remember, though, that LangExtract can use its internal knowledge
    of the world to supplement its outputs, and it may have got the year from that
    or from other contexts surrounding the extracted entity. In any case, I think
    it would be pretty easy to tweak the input prompt or the output to ignore model
    release date information that did not include a year.
  prefs: []
  type: TYPE_NORMAL
- en: Another output was this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: I can see two references to ChatGPT Pro in the original article.
  prefs: []
  type: TYPE_NORMAL
- en: Franzen, Carl (December 5, 2024). [“OpenAI launches full o1 model with image
    uploads and analysis, debuts ChatGPT Pro”](https://venturebeat.com/ai/openai-launches-full-o1-model-with-34-reduced-error-rate-debuts-chatgpt-pro/).
    *VentureBeat*. [Archived](https://web.archive.org/web/20241207181403/https://venturebeat.com/ai/openai-launches-full-o1-model-with-34-reduced-error-rate-debuts-chatgpt-pro/)
    from the original on December 7, 2024\. Retrieved December 11, 2024.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And
  prefs: []
  type: TYPE_NORMAL
- en: In December 2024, during the “12 Days of OpenAI” event, the company launched
    the [Sora](https://en.wikipedia.org/wiki/Sora_%28text-to-video_model%29) model
    for ChatGPT Plus and Pro users,[[105]](https://en.wikipedia.org/wiki/OpenAI#cite_note-105)[[106]](https://en.wikipedia.org/wiki/OpenAI#cite_note-106)
    It also launched the advanced [OpenAI o1](https://en.wikipedia.org/wiki/OpenAI_o1)
    reasoning model[[107]](https://en.wikipedia.org/wiki/OpenAI#cite_note-107)[[108]](https://en.wikipedia.org/wiki/OpenAI#cite_note-108)
    Additionally, ChatGPT Pro — a $200/month subscription service offering unlimited
    o1 access and enhanced voice features — was introduced, and preliminary benchmark
    results for the upcoming [OpenAI o3](https://en.wikipedia.org/wiki/OpenAI_o3)
    models were shared
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: So I think LangExtract was pretty accurate with this extraction.
  prefs: []
  type: TYPE_NORMAL
- en: Because there were many more “hits” with this query, the visualisation is more
    interesting, so let’s repeat what we did in example 2\. Here is the code you’ll
    need.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Run the above code and then open the models.html file in your browser. This
    time, you should be able to click the Play/Next/Previous buttons and see a better
    visualisation of the LangExtract text processing in action.
  prefs: []
  type: TYPE_NORMAL
- en: For more details on LangExtract, check out Google’s GitHub repo [here](https://github.com/google/langextract).
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I introduced you to LangExtract, a new Python library and framework
    from Google that allows you to extract structured output from unstructured input.
  prefs: []
  type: TYPE_NORMAL
- en: I outlined some of the advantages that using LangExtract can bring, including
    its ability to handle large documents, its augmented knowledge extraction and
    multi-model support.
  prefs: []
  type: TYPE_NORMAL
- en: I took you through the install process — a simple pip install, then, by way
    of some example code, showed how to use LangExtract to perform needle-in-the-haystack
    type queries on a large body of unstructured text.
  prefs: []
  type: TYPE_NORMAL
- en: In my final example code, I demonstrated a more traditional RAG-type operation
    by extracting multiple entities (AI Model names) and an associated attribute (date
    of release). For both my primary examples, I also showed you how to code a visual
    representation of how LangExtract works in action that you can open and play back
    in a browser window.
  prefs: []
  type: TYPE_NORMAL
