- en: 'Building a Video Game Recommender System with FastAPI, PostgreSQL, and Render:
    Part 2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 FastAPI、PostgreSQL 和 Render 构建视频游戏推荐系统：第 2 部分
- en: 原文：[https://towardsdatascience.com/building-a-video-game-recommender-system-with-fastapi-postgresql-and-render-part-2/](https://towardsdatascience.com/building-a-video-game-recommender-system-with-fastapi-postgresql-and-render-part-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/building-a-video-game-recommender-system-with-fastapi-postgresql-and-render-part-2/](https://towardsdatascience.com/building-a-video-game-recommender-system-with-fastapi-postgresql-and-render-part-2/)
- en: Getting Started
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 入门
- en: In [part 1](https://towardsdatascience.com/building-video-game-recommender-systems-with-fastapi-postgresql-and-render-part-1)
    we walked through the process of setting up a board game recommendation system
    leveraging FastAPI and PostgreSQL. In Part 2 we continue this project and show
    how to deploy this project to a cloud service, in this case Render, to make it
    accessible to users.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [第 1 部分](https://towardsdatascience.com/building-video-game-recommender-systems-with-fastapi-postgresql-and-render-part-1)
    中，我们介绍了利用 FastAPI 和 PostgreSQL 设置棋盘游戏推荐系统的过程。在第 2 部分中，我们继续这个项目，并展示如何将此项目部署到云服务，在这种情况下是
    Render，使其对用户可访问。
- en: To make this a reality, we’ll be working on setting up our PostgreSQL database
    on Render, populating it with our data, Dockerizing our FastAPI application, and
    finally deploying it to a Render Web Application.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让这一切成为现实，我们将设置我们的 PostgreSQL 数据库在 Render 上，用我们的数据填充它，将 FastAPI 应用程序 Docker
    化，并最终将其部署到 Render 网络应用中。
- en: Table of Contents
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 目录
- en: '[Deploying a PostgreSQL database on Render](#deploy-database)'
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[在 Render 上部署 PostgreSQL 数据库](#deploy-database)'
- en: '[Deploying a FastAPI app as a Render Web Application](#deploy-fastapi)'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[将 FastAPI 应用作为 Render 网络应用部署](#deploy-fastapi)'
- en: – Dockerizing our application
  id: totrans-8
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: – Docker 化我们的应用程序
- en: – Pushing Docker Image to DockerHub
  id: totrans-9
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: – 将 Docker 镜像推送到 DockerHub
- en: – Pulling from DockerHub to Render
  id: totrans-10
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: – 从 DockerHub 拉取到 Render
- en: Tooling Used
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用工具
- en: Render
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Render
- en: Docker Desktop
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Docker Desktop
- en: Docker Hub
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Docker Hub
- en: Deploying on Render
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 Render 上部署
- en: Now we have a PostgreSQL database and a FastAPI application that work locally,
    and it’s time to deploy on a cloud service that can be accessed by a front-end
    application or end user (via Swagger). For this project, we’ll use Render; Render
    is a cloud platform that, for small projects, offers a more straightforward setup
    experience than larger cloud providers like AWS and Azure.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有一个 PostgreSQL 数据库和一个本地运行的 FastAPI 应用程序，是时候将其部署到可以由前端应用程序或最终用户（通过 Swagger）访问的云服务上了。对于这个项目，我们将使用
    Render；Render 是一个云平台，对于小型项目来说，它提供的设置体验比 AWS 和 Azure 等大型云服务提供商更为直接。
- en: To get started, navigate to [Render](https://render.com/) and create a new account,
    then you can create a new project by selecting the ‘New Project’ button shown
    below. Note, as of the time of this writing, Render has a trial period that should
    allow you to follow along at zero cost for the first month. We are calling this
    project fastapi-test, we then navigate into that project after it’s created.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，请导航到 [Render](https://render.com/) 并创建一个新账户，然后你可以通过选择下面的“新建项目”按钮来创建一个新项目。注意，在撰写本文时，Render
    提供了一个试用期，应该允许你在第一个月内免费跟随。我们称这个项目为 fastapi-test，创建后我们将进入该项目。
- en: '![](../Images/7d1523442ca033a4e36a54425a5dc8d6.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7d1523442ca033a4e36a54425a5dc8d6.png)'
- en: 'Figure 2: New Project in Render'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2：Render 中的新建项目
- en: 'Each project contains everything required for that project to work in a self-contained
    environment. In this case, we need two components: a database and a web server
    for our FastAPI application. Let’s start with creating our Database.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 每个项目都包含该项目在自包含环境中运行所需的所有内容。在这种情况下，我们需要两个组件：一个数据库和我们的 FastAPI 应用程序的网络服务器。让我们从创建我们的数据库开始。
- en: '![](../Images/e50e7d158355b1768d244b2b32151823.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e50e7d158355b1768d244b2b32151823.png)'
- en: 'Figure 3: FastAPI Project'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3：FastAPI 项目
- en: This is very simple, we select ‘Create New Service’ as shown in Figure 3 and
    then select ‘Postgres’. We’re then navigated to the field shown in Figure 4 to
    set up the database. We name our database “fastapi-database” and select the free
    tier to get started. Render only allows you to use the free tier database for
    a limited time, but it will be fine for this example, and if you needed to maintain
    a database longer term, the pricing is very reasonable.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常简单，我们选择如图 3 所示的“创建新服务”，然后选择“Postgres”。随后我们将导航到如图 4 所示的字段来设置数据库。我们命名我们的数据库为“fastapi-database”并选择免费层开始。Render
    只允许你在有限的时间内使用免费层的数据库，但对于这个示例来说足够了，如果你需要长期维护数据库，价格非常合理。
- en: '![](../Images/0108acaa92613a7ce3377678c12522eb.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0108acaa92613a7ce3377678c12522eb.png)'
- en: 'Figure 4: Postgres setup on Render'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4：Render 上的 Postgres 设置
- en: After inputting our database information and selecting ‘Create’ it will take
    a minute to set up the database, and you’ll then be presented with the screen
    shown in Figure 5\. We’ll save the Internal Database URL + External Database URL
    variables in our .env file, as we’ll need these to connect from our FastAPI application.
    We can then test our connection to the database using the External Database URL
    variable(connecting from our local machine is outside the Render Environment)
    and create the tables from our local machine before moving on to setting up our
    FastAPI application.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在输入我们的数据库信息并选择“创建”后，设置数据库将花费一分钟时间，随后你会看到如图5所示的屏幕。我们将在我们的.env文件中保存内部数据库URL和外部数据库URL变量，因为我们需要这些来从我们的FastAPI应用程序中进行连接。然后我们可以使用外部数据库URL变量（从我们的本地机器连接是在渲染环境之外）来测试我们的数据库连接，并在设置FastAPI应用程序之前从我们的本地机器创建表。
- en: '![](../Images/6c7f5c2a9cdad3e0abfd88dfdf71c02d.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6c7f5c2a9cdad3e0abfd88dfdf71c02d.png)'
- en: 'Figure 5: Render database credentials'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图5：Render数据库凭据
- en: We then run our test database connection script, which attempts to connect to
    our database by using the External_Database_Url variable as the connection string
    and create a test table. Note that our External_Database_Url is our complete connection
    string for the database, so we can pass this as our single input. A successful
    run should result in a printout as shown in Figure 6.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们随后运行我们的测试数据库连接脚本，该脚本尝试使用外部数据库URL变量作为连接字符串来连接到我们的数据库并创建一个测试表。请注意，我们的外部数据库URL是数据库的完整连接字符串，因此我们可以将其作为单个输入传递。成功的运行应该会输出如图6所示的打印结果。
- en: '![](../Images/b2b1a1a9ede5ba9a4f44455f09fa8271.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b2b1a1a9ede5ba9a4f44455f09fa8271.png)'
- en: 'Figure 6: Successful database connection from our local machine'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图6：从我们的本地机器成功连接到数据库
- en: '[PRE0]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Loading Database
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加载数据库
- en: Now that we’ve verified that we can connect to our database from our local machine,
    it’s time to set up our database tables and populate them. To load our database,
    we’ll use our src/load_database.py file, which we previously walked through the
    individual pieces of this script at the start of this article, so we won’t go
    into further detail on it here. The only notable points are that we’re again using
    our External_Database_Url as our connection string, and then at the end, we’re
    using the test_table function that we’ve defined as part of our DatabaseHandler
    class. This function attempts to connect to the table name passed to it and returns
    the number of rows in that table.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经验证了可以从我们的本地机器连接到数据库，现在是时候设置我们的数据库表并填充它们了。为了加载我们的数据库，我们将使用我们的src/load_database.py文件，我们在本文开头已经详细介绍了这个脚本的各个部分，所以这里不会进一步详细说明。唯一值得注意的是，我们再次使用外部数据库URL作为连接字符串，然后在最后，我们使用我们在DatabaseHandler类中定义的test_table函数。这个函数尝试连接到传递给它的表名，并返回该表中的行数。
- en: Running this script should result in an output as shown in Figure 11, where
    each of the tables was created, and then at the end we recheck that we can return
    data from them and show that the output rows match the input rows.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此脚本应该会产生如图11所示的输出，其中每个表都已创建，然后在最后我们再次检查我们可以从它们返回数据，并显示输出行与输入行匹配。
- en: '![](../Images/8199e31ed0a9d472c14a15a5ffb3039e.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8199e31ed0a9d472c14a15a5ffb3039e.png)'
- en: 'Figure 7: Database Successfully Populated'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图7：数据库成功填充
- en: '[PRE1]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Deploying a FastAPI Application on Render
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Render上部署FastAPI应用程序
- en: We now have the first half of our project deployed on render, and it’s time
    to set up our FastAPI application. To do this, we’re going to use Render’s Web
    Application hosting service, which will allow us to deploy our FastAPI App as
    a web application that can be accessed by external services. If we wanted to build
    a full-stack application, we could then allow our front end to send requests to
    the FastAPI application on Render and return data to the user. However, because
    we’re not interested in building a front-end component at this time, we’ll instead
    interact with our App through the Swagger docs.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在已经在render上部署了项目的前半部分，是时候设置我们的FastAPI应用程序了。为此，我们将使用Render的Web应用程序托管服务，这将允许我们将FastAPI应用程序作为可以由外部服务访问的Web应用程序进行部署。如果我们想构建一个全栈应用程序，我们就可以允许我们的前端向Render上的FastAPI应用程序发送请求，并将数据返回给用户。然而，因为我们目前不感兴趣构建前端组件，所以我们将通过Swagger文档与我们的应用程序交互。
- en: Containerizing our Application with Docker
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Docker容器化我们的应用程序
- en: We’ve set up our FastAPI project in a local environment, but now we need to
    transfer it, with all the code, dependencies, and environmental variables, to
    a container on Render. This could be a daunting challenge. Fortunately, Docker
    handles all the complicated pieces and allows us to do just that with a simple
    configuration file and a couple of commands. For those who haven’t used Docker,
    there is a great tutorial [here](https://www.youtube.com/watch?v=b0HMimUb4f0).
    The brief overview is that Docker is a tool that simplifies the process of deploying
    and managing applications by allowing us to package our application with all its
    dependencies as an image and then deploy that image to a service like Render.
    In this project, we use DockerHub as our image repository, which serves as a central
    version-controlled storage area for our image, which we can then pull into Render.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经在本地环境中设置了FastAPI项目，但现在我们需要将包含所有代码、依赖项和环境变量的项目转移到Render上的一个容器中。这可能是一个艰巨的挑战。幸运的是，Docker处理了所有复杂的部分，并允许我们通过一个简单的配置文件和几个命令来完成这项工作。对于那些还没有使用过Docker的人来说，这里有一个很好的教程[在这里](https://www.youtube.com/watch?v=b0HMimUb4f0)。简要概述是，Docker是一个工具，通过允许我们将应用程序及其所有依赖项打包成一个镜像，然后将其部署到像Render这样的服务中，从而简化了应用程序的部署和管理过程。在这个项目中，我们使用DockerHub作为我们的镜像仓库，它作为我们的镜像的中央版本控制存储区域，然后我们可以将其拉入Render。
- en: 'Our overall flow for this project can be thought of like this FastAPI app running
    locally → A ‘Snapshot’ is taken with Docker and stored as a Docker Image → That
    Image is pushed to DockerHub → Render pulls this image and uses it to spin up
    a Container that runs the application on a Render Server. Getting started with
    this process, which we’ll walk through next, requires having Docker Desktop installed.
    Docker has a straightforward installation process which you can get started on
    here: [https://www.docker.com/products/docker-desktop/](https://www.docker.com/products/docker-desktop/)'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们这个项目的整体流程可以想象成这样：本地运行的FastAPI应用 → 使用Docker进行快照并存储为Docker镜像 → 将该镜像推送到DockerHub
    → Render拉取该镜像并使用它启动一个容器，在Render服务器上运行应用程序。要开始这个过程，我们将在下一部分进行讲解，需要安装Docker Desktop。Docker有一个简单的安装过程，您可以从这里开始：[https://www.docker.com/products/docker-desktop/](https://www.docker.com/products/docker-desktop/)
- en: 'Additionally, if you don’t have one already, you’ll need a Docker Hub account
    as this will serve as the repository to save Docker Images to and then Pull them
    into Render. You can create a Docker Hub here: [https://hub.docker.com/](https://hub.docker.com/).'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果您还没有，您将需要一个Docker Hub账户，因为这个账户将作为保存Docker镜像的仓库，然后将其拉入Render。您可以在[这里](https://hub.docker.com/)创建Docker
    Hub账户。
- en: Building a Docker Image
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建Docker镜像
- en: To create a Docker Image for our project, first make sure Docker Desktop is
    running; if it isn’t, you’ll likely get an error when trying to create a Docker
    image. To ensure it’s running, open the Docker Desktop application from your search
    bar or desktop, click on the three dots in the bottom left as shown below, and
    ensure you see the Green dot followed by ‘Docker Desktop is running’.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 要为我们的项目创建Docker镜像，首先确保Docker Desktop正在运行；如果没有运行，在尝试创建Docker镜像时可能会遇到错误。要确保它正在运行，从您的搜索栏或桌面打开Docker
    Desktop应用程序，点击如图下方的左下角的三个点，并确保您看到绿色的点后跟“Docker Desktop正在运行”。
- en: '![](../Images/749d1ed8796c0e9465eb2cd3f047d947.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/749d1ed8796c0e9465eb2cd3f047d947.png)'
- en: 'Figure 8: Docker Desktop running'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图8：Docker Desktop正在运行
- en: Next, we need to tell Docker how to build our image, which is done by defining
    a Dockerfile. Our Dockerfile can be seen in Figure 9\. We save it in our top-level
    directory, and it provides the instructions that tell Docker how to package our
    application into an image that can be deployed on a different piece of hardware.
    Let’s walk through this file to understand what it’s doing.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们需要告诉Docker如何构建我们的镜像，这是通过定义一个Dockerfile来完成的。我们的Dockerfile如图9所示。我们将其保存在顶级目录中，它提供了告诉Docker如何将我们的应用程序打包成可以在不同硬件上部署的镜像的指令。让我们浏览这个文件来了解它在做什么。
- en: 'FROM: Choosing Base Image: The first line in our Dockerfile specifies what
    base image we want to use to then extend for our application. In this case, we
    are using the python:3.13-slim-bullseye image, which is a lightweight Debian-based
    image that will serve as the base for our application.'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'FROM: 选择基础镜像：我们Dockerfile中的第一行指定了我们想要用于扩展应用程序的基础镜像。在这种情况下，我们使用的是python:3.13-slim-bullseye镜像，这是一个基于Debian的轻量级镜像，将作为我们应用程序的基础。'
- en: 'WORKDIR: Changing Work Directory: Here we are setting the default directory
    inside our container to /app'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: WORKDIR：更改工作目录：在这里我们设置容器内的默认目录为/app
- en: 'RUN: Checking for updates to system dependencies'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: RUN：检查系统依赖项的更新
- en: 'COPY: Coping requirements.txt file, it’s critical that requirements.txt is
    up to date and contains all libraries required for the project, or the Image won’t
    run correctly when we try and spin it up'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: COPY：复制requirements.txt文件，确保requirements.txt是最新的，并且包含项目所需的所有库，否则当我们尝试启动镜像时，镜像将无法正确运行
- en: 'RUN: Installing our requirements.txt file'
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: RUN：安装我们的requirements.txt文件
- en: 'COPY: Copy our entire project from our local directory to /app, which we created
    in step 2'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: COPY：将我们的整个项目从本地目录复制到我们在步骤2中创建的/app
- en: 'RUN: Creating a logs directory at /app/logs'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: RUN：在/app/logs创建日志目录
- en: 'EXPOSE: Document that the port we’ll be exposing is port 8000'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: EXPOSE：记录我们将要公开的端口是8000
- en: 'ENV: Sets our Python path to /app'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ENV：设置我们的Python路径为/app
- en: 'CMD: Runs our FastAPI app using Uvicorn, sets our app to the one defined in
    src.main:app, runs our app on port 8000'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: CMD：使用Uvicorn运行我们的FastAPI应用，将我们的应用设置为src.main:app中定义的应用，在端口8000上运行我们的应用
- en: '![](../Images/48245b218ec38083bbfeb09ded45fd6d.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/48245b218ec38083bbfeb09ded45fd6d.png)'
- en: 'Figure 9: Dockerfile'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图9：Dockerfile
- en: With our Dockerfile defined, we now have a set of instructions that we can give
    to Docker to containerize our application into an image that we can then push
    to Docker Hub. We can now do this with a couple of commands from our VS Code terminal,
    shown below. Each of these lines needs to be run separately in the VS Code terminal
    from the top directory of your project.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 定义了Dockerfile后，我们现在有一组指令可以提供给Docker，将我们的应用程序容器化成一个镜像，然后我们可以将其推送到Docker Hub。现在我们可以通过VS
    Code终端中的几个命令来完成这个操作，如下所示。每行都需要在VS Code终端中从项目的顶级目录单独运行。
- en: First, we build our Docker image, which will likely take a minute or two. In
    this case, we are naming our image ‘recommendersystem’
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，我们构建我们的Docker镜像，这可能会花费一分钟左右。在这个例子中，我们命名我们的镜像为‘recommendersystem’
- en: Next, we tag our image, the syntax here is image_name user_name/docker_hub_folder:image_name_on_dockerhub
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，我们标记我们的镜像，这里的语法是image_name user_name/docker_hub_folder:image_name_on_dockerhub
- en: Finally, we push our image to Dockerhub again specifying the user_name/docker_hub_folder:image_name_on_dockerhub
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我们再次将我们的镜像推送到Dockerhub，指定user_name/docker_hub_folder:image_name_on_dockerhub
- en: '[PRE2]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: After this is done, we should be able to log in to DockerHub, navigate to our
    project, and see that we have an image whose name matches what we gave it in the
    previous 3 commands, in this case, fastapi_on_render.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 完成这些操作后，我们应该能够登录到DockerHub，导航到我们的项目，并看到我们有一个与我们之前3条命令中给出的名称匹配的镜像，在这个例子中，是fastapi_on_render。
- en: '![](../Images/12352012d5d74779f7cd8d709de35281.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/12352012d5d74779f7cd8d709de35281.png)'
- en: 'Figure 10: Docker Image on Dockerhub'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图10：Dockerhub上的Docker镜像
- en: Pulling Docker Image to Render
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 拉取Docker镜像到Render
- en: Now we have our Docker Image on DockerHub, and it’s time to deploy that Image
    on Render. This can be done by navigating to the same project that we created
    our database in, “fastapi-test”, selecting “New”, in the top right, and then selecting
    “Web Service” as our FastAPI app will be deployed as a Web Application.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经在DockerHub上有了我们的Docker镜像，是时候在Render上部署这个镜像了。这可以通过导航到我们创建数据库的相同项目，“fastapi-test”，在右上角选择“新建”，然后选择“Web服务”来实现，因为我们的FastAPI应用将被部署为一个Web应用。
- en: Because we are deploying our image from Dockerhub, we specify that our Source
    Code is an Existing Image, and as shown in Figure 11, we paste the Dockerhub Directory
    path to the Image we want to deploy into ‘Image URL’ in Render. We then get a
    notification that this is a private image, which means we’ll need to create a
    Dockerhub Access token that we can then use to securely pull the image from DockerHub
    into Render.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我们要从Dockerhub部署我们的镜像，所以我们指定源代码是一个现有镜像，如图11所示，我们将Dockerhub目录路径粘贴到我们想要部署的镜像的“镜像URL”中。然后我们收到一个通知，说明这是一个私有镜像，这意味着我们需要创建一个Dockerhub访问令牌，然后我们可以使用它安全地从DockerHub将镜像拉取到Render中。
- en: '![](../Images/3055b631d0fe43173c40a4369193c877.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3055b631d0fe43173c40a4369193c877.png)'
- en: 'Figure 11: Docker Image on Render'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图11：Render上的Docker镜像
- en: Fortunately, creating a DockerHub Access token is straightforward; we navigate
    to our DockerHub account -> Settings → Personal Access token. The screen should
    look like Figure 12\. we provide an access token name, expiration date, and permissions.
    Since we’re pulling the image into Render, we only need read access rather than
    write or delete, so we select that.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，创建 DockerHub 访问令牌非常简单；我们导航到我们的 DockerHub 账户 -> 设置 → 个人访问令牌。屏幕应该看起来像图 12。我们提供访问令牌名称、过期日期和权限。由于我们要将镜像拉入
    Render，我们只需要读取权限，而不是写入或删除，所以我们选择那个选项。
- en: '![](../Images/8391ffe6b49d68172cfea059a3bd692a.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图 14](../Images/8391ffe6b49d68172cfea059a3bd692a.png)'
- en: 'Figure 12: Creating personal access token for Dockerhub'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12：为 Dockerhub 创建个人访问令牌
- en: Finally, selecting ‘Generate’ will generate our token, which we then need to
    copy over to render and enter as shown in Figure 13.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，选择“生成”将生成我们的令牌，然后我们需要将其复制到 render 并如图 13 所示输入。
- en: '![](../Images/5b6c22eed9b1c3ab691bfd6222bc5c73.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图 12](../Images/5b6c22eed9b1c3ab691bfd6222bc5c73.png)'
- en: 'Figure 13: Docker credentials on Render'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13：Render 上的 Docker 凭据
- en: Once we’ve selected ‘Add Credential’ as shown above, it will then load for a
    minute as the credentials are saved. We’ll then be taken back to the previous
    screen, where we can select our credentials to use to connect to DockerHub. In
    this case, we’ll use the tutorial credentials we just created and select Connect.
    We will then have established a connection that we can use to pull our Docker
    Image from DockerHub to Render for Deployment.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们选择了如上所示的“添加凭据”，它将加载一分钟以保存凭据。然后我们将返回到上一个屏幕，在那里我们可以选择用于连接 DockerHub 的凭据。在这种情况下，我们将使用我们刚刚创建的教程凭据并选择连接。然后我们将建立一个连接，我们可以使用它从
    DockerHub 将 Docker 镜像拉到 Render 以进行部署。
- en: '![](../Images/87e4c925a8347aaa69db9662e9205af0.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图 15](../Images/87e4c925a8347aaa69db9662e9205af0.png)'
- en: 'Figure 14: Render Web Service with Valid Credentials'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14：具有有效凭据的 Render Web 服务
- en: 'On the next page, we proceed with setting up our Render Web applicaiton by
    selecting the free option and then importantly, on Environmental Variables, we
    copy and paste our .env file. While we don’t use all the variables in this file,
    we do use the ‘Internal_Database_Url’, which is the URL that FastAPI will look
    for in our main.py file. Without this, we won’t be able to connect to our database,
    so it’s critical that we provide this. Note: for testing, we previously used the
    ‘External_Database_Url’ because we were running the script from our local machine,
    which is external to our Render environment; however, here both the Database and
    Web Server are in the same Render environment, so we use the Internal_Database_Url
    in main.py.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一页，我们通过选择免费选项来设置我们的 Render Web 应用程序，并且非常重要的一点是在环境变量中，我们将我们的 .env 文件复制并粘贴。虽然我们在这个文件中不使用所有变量，但我们确实使用了“Internal_Database_Url”，这是
    FastAPI 在我们的 main.py 文件中寻找的 URL。没有这个，我们将无法连接到我们的数据库，所以提供这个信息是至关重要的。注意：为了测试，我们之前使用了“External_Database_Url”，因为我们是从本地机器运行脚本的，这是
    Render 环境的外部；然而，在这里数据库和 Web 服务器都在同一个 Render 环境中，所以我们使用 main.py 中的 Internal_Database_Url。
- en: After entering our environmental variables, we then choose ‘Deploy Web Service’.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在输入我们的环境变量后，我们然后选择“部署 Web 服务”。
- en: '![](../Images/04a5a72af85e10d793834db0100cf2a7.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图 16](../Images/04a5a72af85e10d793834db0100cf2a7.png)'
- en: 'Figure 15: Environmental Variables Added to Render Web App'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15：添加到 Render Web 应用的环境变量
- en: The service will take a couple of minutes to deploy, but then you should get
    a notification like below that the service has deployed with a render link on
    top that we can access at.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 服务将需要几分钟来部署，但随后你应该会收到如下通知，表明服务已部署，顶部有一个我们可以访问的 render 链接。
- en: '![](../Images/80404a4bdd617468dd9d50e517b7f175.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图 14](../Images/80404a4bdd617468dd9d50e517b7f175.png)'
- en: 'Figure 16: Web Application deploying on Render'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图 16：Web 应用在 Render 上部署
- en: Navigating to this link will take us to the Hello World method, if we add/docs
    to the end of it, we’ll be taken to the swagger docs in Figure 17\. Here we can
    test and ensure our FastAPI Web Application is connected to our database by using
    the Fetch All Users method. We can see below that this does indeed return data.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 通过此链接导航将带我们到 Hello World 方法，如果我们将其末尾添加 /docs，我们将被带到图 17 中的 Swagger 文档。在这里，我们可以通过使用获取所有用户方法来测试和确保我们的
    FastAPI Web 应用已连接到我们的数据库。下面我们可以看到这确实返回了数据。
- en: '![](../Images/a04dbc1b143986ffec3962b635db79bd.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图 13](../Images/a04dbc1b143986ffec3962b635db79bd.png)'
- en: 'Figure 17: Swagger Docs for FastAPI on Render'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图 17：Render 上 FastAPI 的 Swagger 文档
- en: Finally, we want to check if our user recommendations system is dynamically
    updating. In your previous API call, we can see that there’s a user ‘user_username’
    in our database. Using the Fetch Recommended Game method with this username, we
    can see the top match is appid = B08BHHRSPK.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们想要检查我们的用户推荐系统是否能够动态更新。在你之前的API调用中，我们可以看到数据库中有一个名为‘user_username’的用户。使用这个用户名调用获取推荐游戏的方法，我们可以看到最匹配的游戏appid为B08BHHRSPK。
- en: '![](../Images/0ab422f258a488d03cbbf4cd8e40ca8f.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0ab422f258a488d03cbbf4cd8e40ca8f.png)'
- en: 'Figure 18: Pre-Update user recommendation'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图18：更新前的用户推荐
- en: 'We update our users’ liked games by choosing a random one from our games appid
    = B0BHTKGN7F, which turns out to be ‘The Elder Scrolls: Skyrim Boardgame’, and
    leveraging our user_games POST method.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过从我们的游戏appid = B0BHTKGN7F中随机选择一个来更新我们用户的喜爱游戏，这个游戏结果是《上古卷轴：天际板游》，并利用我们的user_games
    POST方法。
- en: '![](../Images/f965b07bedfd9e778e873d5b3304a20e.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f965b07bedfd9e778e873d5b3304a20e.png)'
- en: 'Figure 19: Adding a liked boardgame'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图19：添加喜爱的桌游
- en: Adding a game to our user games table is supposed to automatically trigger the
    recommender pipeline to rerun for that user and generate new recommendations.
    If we navigate to our console, we can see that it appears to have happened as
    we get the new user recommendations generated message shown below.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 将游戏添加到我们的用户游戏表中应该会自动触发推荐管道为该用户重新运行并生成新的推荐。如果我们导航到我们的控制台，我们可以看到它似乎已经发生，因为我们得到了以下所示的新用户推荐生成消息。
- en: '![](../Images/6569b44c49c51b01b01803d9cf81d3d2.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6569b44c49c51b01b01803d9cf81d3d2.png)'
- en: 'Figure 20: Console Image of Recommender pipeline Run'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图20：推荐管道运行的控制台图像
- en: If we navigate back to our Swagger docs, we can try the fetch recommendation
    method again, and we see in Figure 21 that we indeed do have a different list
    of recommendations than the one before. Our Recommender Pipeline is now automatically
    updating as users add more data and is accessible beyond our local environment.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们返回到我们的Swagger文档，我们可以再次尝试获取推荐方法，如图21所示，我们确实有一个与之前不同的推荐列表。我们的推荐管道现在随着用户添加更多数据而自动更新，并且可以在我们的本地环境之外访问。
- en: '![](../Images/4a92eb067a6045cb2f8877a24b4c7bde.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4a92eb067a6045cb2f8877a24b4c7bde.png)'
- en: 'Figure 21: recommended games after similarity pipeline run'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图21：相似性管道运行后的推荐游戏
- en: 'Wrapping Up:'
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结：
- en: In this project, we’ve shown how to set up and deploy a recommendation system
    leveraging a FastAPI interaction layer with a PostgreSQL database to generate
    intelligent board game recommendations for our users. There are further steps
    we could take to make this system more robust, like implementing a hybrid recommendation
    system as we gain more user data or enabling user tagging to capture more features.
    Additionally, although we didn’t cover it, we did utilize a GitHub workflow to
    rebuild and push our Docker image whenever there’s a new update to our main branch,
    and this code is available in .github/workflows. This helped to greatly speedup
    development as we didn’t have to manually rebuild our Docker image whenever we
    made a small change.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们展示了如何设置和部署一个利用FastAPI交互层与PostgreSQL数据库交互的推荐系统，为我们的用户生成智能桌游推荐。我们可以采取进一步的步骤来使这个系统更加健壮，比如在我们获得更多用户数据时实现混合推荐系统或启用用户标记以捕获更多特征。此外，尽管我们没有涉及，但我们确实利用了GitHub工作流程，在主分支有新更新时自动重建和推送我们的Docker镜像，并且这些代码在 .github/workflows中可用。这大大加快了开发速度，因为我们不必在每次进行小改动时手动重建我们的Docker镜像。
- en: I hope you enjoyed reading and that this helps you build and deploy your projects
    with FastAPI.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 希望您喜欢阅读，并且这有助于您使用FastAPI构建和部署您的项目。
