- en: A Real-World Example of Using UDF in DAX
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/a-real-world-example-of-using-udf-in-dax/](https://towardsdatascience.com/a-real-world-example-of-using-udf-in-dax/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The feature of user-defined functions was introduced as a first preview version
    with the September 2025 release.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: This feature enables us to encapsulate business logic in functions, which can
    be called like any other standard functions.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: 'In this piece, I will demonstrate how to use this feature with a real-world
    example: calculating a forecast based on inflation rates.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: You will see how to create a simple function and handle a more complex scenario.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Scenario
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s imagine a company that wants to forecast its income with an inflation
    simulation.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: They want to simulate how different inflation rates affect their monthly income.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: For simplicity, we ignore seasonality and use the last known monthly sales amount
    to calculate the future income for the rest of the year.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: The user must be able to set an inflation rate and see how the numbers change.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Prepare the data model
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, it depends on whether I start with a new Power BI file and load the data
    or add this functionality to an existing one.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: 'The first thing to do is to activate the Preview feature:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/037d6f3a2d6f0f1dd4e8cd46bf0e686c.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
- en: Figure 1 – Enable the Preview feature for user-defined functions (Figure by
    the Author)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: You might be forced to restart Power BI Desktop after enabling it.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: For an existing Power BI file, we need to set the correct compatibility level
    to create user-defined functions (UDFs).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'You can either create a dummy function, which will automatically upgrade the
    compatibility level, or use [Tabular Editor](https://www.sqlbi.com/tools/tabular-editor/)
    to set it to at least 1702:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e2a3bd17a763a25fcfd272ce802c589e.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
- en: Figure 2 – Use Tabular Editor to upgrade the compatibility level of the database
    (Figure by the Author)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: You can enter 1702 in the marked field and save it.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: I will demonstrate how to create a simple UDF later in this piece.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Please go to the Microsoft documentation to learn more about creating a new
    UDF in Power BI Desktop. You can find the link in the references section at the
    end of this article.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Adding the rate selection
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As the user must be able to select the inflation rate, I add a parameter to
    the data model:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8b8ec0bd28d0c24c91792468943d7e5f.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
- en: Figure 3 – Add a parameter to the data model for a numeric range (Figure by
    the Author)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'After clicking on “Numeric range” I fill out the form:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6e88ba1fee3c39a572edda485321e7e2.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
- en: Figure 4 – Setting up the parameter for a percentage range (Figure by the Author)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Since I want to control the percentage, I set the range to -0.02 to 0.05, which
    corresponds to -2% to 5%.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: After a few seconds, the new slicer was automatically added to the report page.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: But it’s showing only the decimal numbers.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: 'I must change the number format to see percentages:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/03a44dec6b28b83a53223cc1fe84bdfd.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
- en: Figure 5 – Format the column of the parameter to a percentage (Figure by the
    Author)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: 'Now the slicer shows the number as needed:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d4932753ebc5ba7558c2eb3e915ce4dc.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
- en: Figure 6 – The slicer with the numbers as a percentage (Figure by the Author)
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Now it’s ready to use.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: Write the first function
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, let’s create a UDF to return the selected Rate.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: I prefer writing it in Tabular Editor, because its DAX editor is much faster
    than Power BI Desktop.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: But you can create it in the DAX Query view in Power BI Desktop as well.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: 'In Tabular Editor, I go to the Functions Node, right-click on it, and select
    “New User-Defined function”:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d2d99745b04804fd070ec759e41b68dc.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
- en: Figure 7 – Create a new UDF in Tabular Editor (Figure by the Author)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: Now I can set a name.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: For this first one, I set “ReturnRate”.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the code for the function:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Within the brackets, I define the Input parameter.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: After the => I can enter the DAX code for the function.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: In this case, I return the Input parameter.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, I create a measure to use this Function:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The measure [Inflation rate Value] was created when I created the parameter
    to select the Inflation rate.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: 'When I add a card and assign the new measure to it, I will see the selected
    value from the slicer:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e297c6d3170c04a8aca9cbcbfca19b60.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
- en: Figure 8 – Two examples showing that the Measure that calls the functions returns
    the selected inflation rate (Figure by the Author)
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: OK, this is an elementary function, but it’s only to illustrate how it works.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Write the real function
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You might have noticed the keyword VAL in the parameter’s definition.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 'As you can read in the two articles below in more detail, we have two modes
    to pass parameters:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: 'VAL: Pass the content of the parameter as is.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'EXPR: Pass the parameter as an expression, which can be used within the function
    like a usual Measure.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the following function, I use both of them.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the complete code for the function `MonthlyInflation`:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The first parameter of the function is as before.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: The second parameter will be the expression of the input measure.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: Within the function, I can use the parameter name to change the filter context
    and other things. I must set the parameter as `EXPR` when I need to work in this
    way within the function.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: 'The function performs the following steps:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: I get the highest MonthKey and store it in the variable *`CurrentMonth`*
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The content is the month of the current filter context in the numerical form
    YYYYMM.
  id: totrans-76
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: I get the latest month of the current year with a value from the input parameter
    (measure) and store it into the variable *`LastMonthWithData`*
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: I subtract the current month from the latest month with data to get the difference.
    This will be the factor to calculate the inflation rate. The result is stored
    in the variable *`MonthDiff`*
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If MonthDiff is smaller than or equal to 0, then the filter context (Month)
    contains a value from the input variable
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If not, the filter context (Month) is in the future, and we can calculate the
    result.
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: What I’m doing here is to multiply the selected inflation rate by the number
    of months since the last month with data (*`LastMonthWithData`*).
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, I can create a measure to dynamically calculate the forecast month-by-month
    based on the selected inflation rate:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'This is the result for an inflation rate of 3%:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/91b6e0dc9d6931dd4adbed786806c7f7.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
- en: Figure 9 – Result of using the new UDF to calculate the revenue per month based
    on the selected inflation rate (Figure by the Author)
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: The blue-marked months contain actual data, and the red-marked months are calculated
    based on the selected inflation rate.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: The beauty is that I can pass any DAX expression to the measure that I want.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, I can add Online Sales with Retail Sales:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f8d4e964f5fc46f1f51e4acaedfd4ee8.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
- en: Figure 10 – Result with the Total Sales when adding up Online and Retail Sales
    when calling the function.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: 'The measure for this is the following:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Well, that’s very easy.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: I know that the calculation is very simplistic, but I used this example to showcase
    what can be done with UDFs.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: What’s the point?
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, that’s the point with UDFs?
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: Most of the things shown here can also be done with Calculation groups.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: Well, that’s true.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: But using a UDF is much easier than using a Calculation Item.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, we can write model-independent UDFs and reuse them across multiple
    models.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Take a look at [Extend Power BI with DAX Lib](https://daxlib.org/).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: This is a growing collection of model-independent UDFs containing logic that
    can be used in any data model.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: 'Other differentiating points between UDFs and Calculation Items are:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: UDFs cannot be grouped, but Calculation Items can be grouped in Calculation
    Groups.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calculation Items don’t have parameters.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: UDF can be directly called like any other DAX function.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Try it out to learn more about the possibilities of UDFs.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <mdspan datatext="el1761594884668" class="mdspan-comment">User-defined functions</mdspan>
    are a great addition to the toolset in Power BI and Fabric.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: I’m sure it will become increasingly important to know how to work with UDFs,
    as their potential will become more apparent over time.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: As we are in the early stages of the introduction of this feature, we need to
    stay tuned to see what Microsoft will do next to improve it.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: 'There are some restrictions in this feature. You find them here: [Considerations
    and limitations of DAX user-defined functions](https://learn.microsoft.com/en-us/dax/best-practices/dax-user-defined-functions#considerations-and-limitations).'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: There is enough room for improvement.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see what’s coming next.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: References
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here, the Microsoft documentation for user-defined functions: [Using DAX user-defined
    functions (preview) – Power BI | Microsoft Learn](https://learn.microsoft.com/en-us/power-bi/transform-model/desktop-user-defined-functions-overview).'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the SQL BI article that explains the feature in great detail: [Introducing
    user-defined functions in DAX – SQLBI](https://www.sqlbi.com/articles/introducing-user-defined-functions-in-dax/).'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这是解释该功能的 SQL BI 文章，详细介绍了该功能：[介绍 DAX 中的用户定义函数 – SQLBI](https://www.sqlbi.com/articles/introducing-user-defined-functions-in-dax/)。
- en: 'A collection of free to use model-independent UDF: [Extend Power BI with DAX
    Lib](https://daxlib.org/).'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 一系列免费使用的模型无关 UDF：[通过 DAX Lib 扩展 Power BI](https://daxlib.org/)。
- en: Like in my previous articles, I use the Contoso sample dataset. You can download
    the ContosoRetailDW Dataset for free from Microsoft [here](https://www.microsoft.com/en-us/download/details.aspx?id=18279).
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 如同我之前的文章一样，我使用了 Contoso 样本数据集。您可以从微软[这里](https://www.microsoft.com/en-us/download/details.aspx?id=18279)免费下载
    ContosoRetailDW 数据集。
- en: The Contoso Data can be used freely under the MIT License, as described [in
    this document](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo).
    I changed the dataset to shift the data to contemporary dates.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: Contoso 数据可以在 MIT 许可证下自由使用，如[在此文档](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo)中所述。我将数据集更改以将数据转移到当代日期。
