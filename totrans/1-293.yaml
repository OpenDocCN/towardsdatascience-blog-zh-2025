- en: 'Docling: The Document Alchemist'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Docling：文档炼金术士
- en: 原文：[https://towardsdatascience.com/docling-the-document-alchemist/](https://towardsdatascience.com/docling-the-document-alchemist/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/docling-the-document-alchemist/](https://towardsdatascience.com/docling-the-document-alchemist/)
- en: Why do we still wrestle with documents in 2025?
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么我们还在2025年与文档搏斗？
- en: <mdspan datatext="el1757616610680" class="mdspan-comment">Spend some time</mdspan>
    in any data-driven organisation, and you’ll encounter a host of PDFs, Word files,
    PowerPoints, half-scanned images, handwritten notes, and the occasional surprise
    CSV lurking in a SharePoint folder. Business and data analysts waste hours converting,
    splitting, and cajoling those formats into something their Python pipelines will
    accept. Even the latest generative-AI stacks can choke when the underlying text
    is wrapped inside graphics or sprinkled across irregular table grids.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757616610680" class="mdspan-comment">花些时间</mdspan>在任何一个数据驱动型组织中，你都会遇到大量的PDF文件、Word文档、PowerPoint演示文稿、半扫描的图片、手写笔记，以及偶尔隐藏在SharePoint文件夹中的CSV文件。商业和数据分析师们浪费了数小时将这些格式转换、拆分和诱导成Python管道可以接受的形式。即使是最新的生成式AI堆栈，当底层文本被包裹在图形中或散布在不规则的表格网格中时，也会窒息。
- en: Docling was born to solve exactly that pain. Released as an open-source project
    by IBM Research Zurich and now hosted under the Linux Foundation AI & Data Foundation,
    the library abstracts parsing, layout understanding, OCR, table reconstruction,
    multimodal export, and even audio transcription behind one reasonably straightforward
    API and CLI command.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: Docling就是为了解决这种痛苦而诞生的。作为IBM苏黎世研究实验室的一个开源项目发布，现在由Linux Foundation AI & Data Foundation托管，这个库将解析、布局理解、OCR、表格重建、多模态导出甚至音频转录抽象化，通过一个相对直接的API和CLI命令。
- en: Although docling supports the processing of HTML, MS Office format files, Image
    formats and others, we’ll be mostly looking at using it to process PDF files.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然docling支持处理HTML、MS Office格式文件、图像格式和其他格式，但我们主要会关注如何用它来处理PDF文件。
- en: As a data scientist or ML engineer, why should I care about Docling?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 作为数据科学家或机器学习工程师，我为什么要关心Docling？
- en: Often, the real bottleneck isn’t building the model — it’s feeding it. We spend
    a large percentage of our time on data wrangling, and nothing kills productivity
    faster than being handed a critical dataset locked inside a 100-page PDF. This
    is precisely the problem Docling solves, acting as a bridge from the world of
    unstructured documents directly to the structured sanity of Markdown, JSON, or
    a Pandas DataFrame.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，真正的瓶颈不在于构建模型——而在于给它喂食。我们花费大量时间在数据处理上，没有什么比拿到一个锁在100页PDF中的关键数据集更快地摧毁生产力。这正是Docling解决的问题，它作为从非结构化文档世界直接通往结构化理智的Markdown、JSON或Pandas
    DataFrame的桥梁。
- en: But its power extends beyond just data extraction, directly into the area of
    modern, AI-assisted development. Imagine pointing docling at an HTML page of API
    specifications; it effortlessly translates that complex web layout into clean,
    structured Markdown — the perfect context to feed directly into AI coding assistants
    like Cursor, ChatGPT, or Claude.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 但它的力量不仅限于数据提取，还直接扩展到现代、AI辅助开发的领域。想象一下将docling指向API规范的一个HTML页面；它能够轻松地将这个复杂的网页布局转换成干净的、结构化的Markdown——这是直接输入AI编码助手如Cursor、ChatGPT或Claude的完美上下文。
- en: Where Docling came from
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Docling的起源
- en: The project originated within IBM’s Deep Search team, which was developing retrieval-augmented
    generation (RAG) pipelines for long patent PDFs. They open-sourced the core under
    an MIT license in late 2024 and have been shipping weekly releases ever since.
    A vibrant community quickly formed around its unified **DoclingDocument** model,
    a Pydantic object that keeps text, images, tables, formulas, and layout metadata
    together so downstream tools like LangChain, LlamaIndex, or Haystack don’t have
    to guess a page’s reading order.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 该项目起源于IBM的深度搜索团队，该团队正在开发用于长专利PDF的检索增强生成（RAG）管道。他们在2024年底以MIT许可证开源核心代码，并自那时起每周发布更新。一个充满活力的社区迅速围绕其统一的**DoclingDocument**模型形成，这是一个Pydantic对象，它将文本、图像、表格、公式和布局元数据保持在一起，这样下游工具如LangChain、LlamaIndex或Haystack就不必猜测页面的阅读顺序。
- en: 'Today, Docling integrates visual-language models (VLMs), such as **SmolDocling,**
    for figure captioning. It also supports Tesseract, EasyOCR, and RapidOCR for text
    extraction and ships recipes for chunking, serialisation, and vector-store ingestion.
    In other words: you point it at a folder, and you get Markdown, HTML, CSV, PNGs,
    JSON, or just a ready-to-embed Python object — no extra scaffolding code required.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，Docling 集成了视觉语言模型（VLMs），例如 **SmolDocling**，用于图注。它还支持 Tesseract、EasyOCR 和
    RapidOCR 进行文本提取，并提供了用于分块、序列化和向量存储摄取的食谱。换句话说：你指向一个文件夹，你就能得到 Markdown、HTML、CSV、PNG、JSON
    或一个可直接嵌入的 Python 对象——无需额外的脚手架代码。
- en: What we’ll do
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们将做什么
- en: To showcase Docling, we’ll first install it and then use it with three different
    examples that demonstrate its versatility and usefulness as a document parser
    and processor. Please note that using Docling is quite computationally intensive,
    so it will be helpful if you have access to a GPU on your system.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示 Docling，我们首先安装它，然后使用三个不同的示例来展示其作为文档解析器和处理器的多功能性和实用性。请注意，使用 Docling 非常计算密集，所以如果你能访问系统上的
    GPU，那将非常有帮助。
- en: However, before we start coding, we need to set up a development environment.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在我们开始编码之前，我们需要设置一个开发环境。
- en: Setting up a development environment
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置开发环境
- en: I’ve started using the UV package manager for this now, but feel free to use
    whichever tools you’re most comfortable with. Note also that I’ll be working under
    WSL2 Ubuntu for Windows and running my code using a Jupyter Notebook.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在开始使用 UV 包管理器，但请随意使用你最熟悉的工具。注意，我将在 Windows 的 WSL2 Ubuntu 下工作，并使用 Jupyter Notebook
    运行我的代码。
- en: Note, even using UV, the code below took a couple of minutes to complete on
    my system, as it’s a pretty hefty set of library installs.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，即使使用 UV，下面的代码在我的系统上完成也花了几分钟的时间，因为它是一套相当庞大的库安装。
- en: '[PRE0]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now type in the command,
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现在输入以下命令，
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: And you should see a notebook open in your browser. If that doesn’t happen automatically,
    you’ll likely see a screenful of information after running the **Jupyter Notebook**
    command. Near the bottom, you will find a URL to copy and paste into your browser
    to launch the Jupyter Notebook.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该在浏览器中打开一个笔记本。如果自动打开失败，你可能会在运行 **Jupyter Notebook** 命令后看到一屏的信息。在底部附近，你会找到一个可以复制并粘贴到浏览器中以启动
    Jupyter Notebook 的 URL。
- en: Your URL will be different to mine, but it should look something like this:-
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 你的 URL 将与我的不同，但它应该看起来像这样：-
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Example 1: Convert any PDF or DOCX to Markdown or JSON'
  id: totrans-24
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例 1：将任何 PDF 或 DOCX 转换为 Markdown 或 JSON
- en: The simplest use case is also the one you’ll use a large percentage of the time:-
    turn a document’s text into Markdown
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 最简单的用例也是你将大量使用的一个用例：将文档的文本转换为 Markdown
- en: For most of our examples, our input PDF will be one I’ve used several times
    before for different tests. It is a copy of Tesla’s 10-Q SEC filing document from
    September 2023\. It is approximately fifty pages long and consists mainly of financial
    information related to Tesla. The full document is publicly available on the Securities
    & Exchange Commission (SEC) website and can be viewed/downloaded using this [link](https://www.sec.gov/Archives/edgar/data/1318605/000162828023034847/tsla-20230930.htm).
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的大部分示例，我们的输入 PDF 将是我之前用于不同测试的文档副本。它是特斯拉 2023 年 9 月的 10-Q SEC 文件，大约有五十页，主要包含与特斯拉相关的财务信息。完整文档可在证券交易委员会（SEC）网站上公开获取，并可通过此
    [链接](https://www.sec.gov/Archives/edgar/data/1318605/000162828023034847/tsla-20230930.htm)
    查看/下载。
- en: Here is an image of the first page of that document for your reference.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是那份文档第一页的图片供你参考。
- en: '![](../Images/5bc536567c236907fbd14db14fea8ae5.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5bc536567c236907fbd14db14fea8ae5.png)'
- en: Image from Tesla 10-Q PDF
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 来自特斯拉 10-Q PDF 的图片
- en: Let’s review the docling code we need to convert into markdown. It sets up the
    file path for the input PDF, runs the DocumentConverter function on it, and then
    exports the parsed result into Markdown format so that the content can be more
    easily read, edited, or analysed.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下需要转换为 Markdown 的 docling 代码。它设置了输入 PDF 的文件路径，对其运行 DocumentConverter 函数，然后将解析结果导出为
    Markdown 格式，以便内容可以更容易地阅读、编辑或分析。
- en: '[PRE3]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This is the output we get from running the above code (just the first page).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这是运行上述代码（仅第一页）所得到的输出。
- en: '[PRE4]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: With the rise of AI code editors and the use of LLMs in general, this technique
    has become significantly more valuable and relevant. The efficacy of LLMs and
    code editors can be significantly enhanced by providing them with appropriate
    context. Often this will entail supplying them with the textual representation
    of a particular tool or framework’s documentation, API and coding examples.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI代码编辑器的兴起以及LLMs的普遍使用，这项技术变得更有价值和相关性。通过提供适当的上下文，可以显著提高LLMs和代码编辑器的效率。通常，这包括向它们提供特定工具或框架文档、API和编码示例的文本表示。
- en: Converting the output of PDFs to JSON format is also straightforward. Just add
    these two lines of code. You may encounter limitations with the size of the JSON
    output, so adjust the print statement accordingly.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 将PDF的输出转换为JSON格式也很简单。只需添加这两行代码。你可能会遇到JSON输出大小的限制，因此相应地调整打印语句。
- en: '[PRE5]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Example 2: Extract complex tables from a PDF'
  id: totrans-37
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例2：从PDF中提取复杂表格
- en: Many PDFs often store tables as isolated text chunks or, worse, as flattened
    images. Docling’s table-structure model reassembles rows, columns, and spanning
    cells, giving you either a Pandas DataFrame or a ready-to-save CSV. Our test input
    PDF has many tables. Look, for example, at page 11 of the PDF, and we can see
    the table below,
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 许多PDF通常将表格存储为独立的文本块，或者更糟糕的是，作为扁平化的图像。Docling的表格结构模型重新组装行、列和跨单元格，为你提供Pandas DataFrame或可直接保存的CSV文件。我们的测试输入PDF有很多表格。看看PDF的第11页，下面就是表格，
- en: '![](../Images/ef03a7825acc61d4359a317046fe9845.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ef03a7825acc61d4359a317046fe9845.png)'
- en: Image from Tesla 10-Q PDF
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 来自特斯拉10-Q PDF的图像
- en: Let’s see if we can extract that data. It’s slightly more complex code than
    in our first example, but it’s doing more work. The PDF is converted again using
    Docling’s DocumentConverter function, producing a structured document representation.
    Then, for each table detected, it transforms the table into a Pandas DataFrame
    and also retrieves the page number of the table from the document’s provenance
    metadata. If the table comes from page 11, it prints it out in Markdown format
    and then breaks the loop (so only the first matching table is shown).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看我们是否能提取这些数据。这比我们第一个例子中的代码稍微复杂一些，但它做了更多的工作。PDF再次使用Docling的DocumentConverter函数进行转换，生成结构化文档表示。然后，对于检测到的每个表格，它将表格转换为Pandas
    DataFrame，并从文档的来源元数据中检索表格的页码。如果表格来自第11页，它将以Markdown格式打印出来，然后中断循环（因此只显示第一个匹配的表格）。
- en: '[PRE6]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: And the output is not too shabby.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 输出还不错。
- en: '[PRE7]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: To retrieve ALL the tables from a PDF, you would need to omit the **if page_number
    =…** line from my code.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 要从PDF中检索所有表格，你需要从我的代码中省略**if page_number =…**这一行。
- en: One thing I have noticed with Docling is that it’s not fast. As shown above,
    it took almost 34 seconds to extract that single table from a 50-page PDF.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我注意到关于Docling的一个问题是它不够快。如上所示，从一份50页的PDF中提取那张单独的表格几乎花了34秒。
- en: 'Example 3: Perform OCR on an image.'
  id: totrans-47
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例3：对图像执行OCR
- en: For this example, I scanned a random page from the Tesla 10-Q PDF and saved
    it as a PNG file. Let’s see how Docling copes with reading that image and converting
    what it finds into markdown. Here is my scanned image.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我扫描了特斯拉10-Q PDF的随机一页并将其保存为PNG文件。让我们看看Docling如何处理读取这张图片并将其找到的内容转换为Markdown。下面是我的扫描图像。
- en: '![](../Images/eb5bc9e832fe68c42ee6bc14affd1507.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/eb5bc9e832fe68c42ee6bc14affd1507.png)'
- en: Image from Tesla 10-Q PDF
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 来自特斯拉10-Q PDF的图像
- en: And our code. We use Tesseract as our OCR engine (others are available)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 以及我们的代码。我们使用Tesseract作为我们的OCR引擎（其他选项也适用）
- en: '[PRE8]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Here is our output.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们的输出。
- en: '[PRE9]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: If you compare this output to the original image, the results are disappointing.
    A lot of the text in the image was just missed or garbled. This is where a product
    like AWS Textract comes into its own, as it excels at extracting text from a wide
    range of sources.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将这个输出与原始图像进行比较，结果令人失望。图像中的很多文本都被遗漏或乱码了。这正是AWS Textract这类产品大显身手的地方，因为它擅长从各种来源提取文本。
- en: However, Docling does provide various options for OCR, so if you receive poor
    results from one system, you can always switch to another.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，Docling确实提供了各种OCR选项，所以如果你从一个系统中得到较差的结果，你总是可以切换到另一个。
- en: I attempted the same task using EasyOCR, but the results weren’t significantly
    different from those obtained with Tesseract. If you’d like to try it out, here
    is the code.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试使用EasyOCR执行同样的任务，但结果与使用Tesseract获得的结果没有显著差异。如果你想尝试，以下是代码。
- en: '[PRE10]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Summary
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'The generative-AI boom re-ignited an old truth: garbage in, garbage out. LLMs
    can hallucinate less only when they ingest semantically and spatially coherent
    input. Docling provides coherence (most of the time) across multiple source formats
    that your stakeholders can present, and does so locally and reproducibly.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI的繁荣重新点燃了一个古老的真理：垃圾输入，垃圾输出。只有当LLM摄入语义和空间上连贯的输入时，它们才能产生更少的幻觉。Docling在多个源格式上提供了连贯性（大多数时候），这些格式是您的利益相关者可以提供的，并且这样做是本地和可重复的。
- en: Docling has its uses beyond the AI world, though. Consider the vast number of
    documents stored in locations such as bank vaults, solicitors’ offices, and insurance
    companies worldwide. If these are to be digitised, Docling may provide some of
    the solutions for that.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: Docling在AI世界之外也有其用途。考虑一下全球存储在银行保险库、律师办公室和保险公司等地的庞大文件数量。如果这些文件要数字化，Docling可能提供一些解决方案。
- en: Its biggest weakness is probably the Optical Character Recognition of text within
    images. I tried using Tesseract and EasyOCR, and the results from both were disappointing.
    You’ll probably need to use a commercial product like AWS Textract if you want
    to reliably reproduce text from those types of sources.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 它最大的弱点可能是图像中的文本光学字符识别。我尝试使用Tesseract和EasyOCR，但两者的结果都令人失望。如果您想从这些类型的来源可靠地重现文本，您可能需要使用像AWS
    Textract这样的商业产品。
- en: It can also be slow. I’ve a fairly high-spec desktop PC with a GPU, and it took
    some time on most tasks I set it. However, if your input documents are primarily
    PDFs, Docling could be a valuable addition to your text processing toolbox.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 它也可能很慢。我有一台配置相当高的桌面电脑，配备了GPU，在大多数我设定的任务上都需要一些时间。然而，如果您的输入文档主要是PDF文件，Docling可能是您文本处理工具箱中的一个宝贵补充。
- en: I have only scratched the surface of what Docling is capable of, and I encourage
    you to visit their homepage, which can be accessed using the following [link](https://docling-project.github.io/docling/)
    to learn more.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是触及了Docling所能做到的一小部分，我鼓励您访问他们的主页，您可以通过以下[链接](https://docling-project.github.io/docling/)访问，以了解更多信息。
