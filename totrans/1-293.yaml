- en: 'Example 1: Convert any PDF or DOCX to Markdown or JSON'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The simplest use case is also the one you’ll use a large percentage of the time:-
    turn a document’s text into Markdown
  prefs: []
  type: TYPE_NORMAL
- en: For most of our examples, our input PDF will be one I’ve used several times
    before for different tests. It is a copy of Tesla’s 10-Q SEC filing document from
    September 2023\. It is approximately fifty pages long and consists mainly of financial
    information related to Tesla. The full document is publicly available on the Securities
    & Exchange Commission (SEC) website and can be viewed/downloaded using this [link](https://www.sec.gov/Archives/edgar/data/1318605/000162828023034847/tsla-20230930.htm).
  prefs: []
  type: TYPE_NORMAL
- en: Here is an image of the first page of that document for your reference.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5bc536567c236907fbd14db14fea8ae5.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from Tesla 10-Q PDF
  prefs: []
  type: TYPE_NORMAL
- en: Let’s review the docling code we need to convert into markdown. It sets up the
    file path for the input PDF, runs the DocumentConverter function on it, and then
    exports the parsed result into Markdown format so that the content can be more
    easily read, edited, or analysed.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: This is the output we get from running the above code (just the first page).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: With the rise of AI code editors and the use of LLMs in general, this technique
    has become significantly more valuable and relevant. The efficacy of LLMs and
    code editors can be significantly enhanced by providing them with appropriate
    context. Often this will entail supplying them with the textual representation
    of a particular tool or framework’s documentation, API and coding examples.
  prefs: []
  type: TYPE_NORMAL
- en: Converting the output of PDFs to JSON format is also straightforward. Just add
    these two lines of code. You may encounter limitations with the size of the JSON
    output, so adjust the print statement accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Example 2: Extract complex tables from a PDF'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Many PDFs often store tables as isolated text chunks or, worse, as flattened
    images. Docling’s table-structure model reassembles rows, columns, and spanning
    cells, giving you either a Pandas DataFrame or a ready-to-save CSV. Our test input
    PDF has many tables. Look, for example, at page 11 of the PDF, and we can see
    the table below,
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ef03a7825acc61d4359a317046fe9845.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from Tesla 10-Q PDF
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see if we can extract that data. It’s slightly more complex code than
    in our first example, but it’s doing more work. The PDF is converted again using
    Docling’s DocumentConverter function, producing a structured document representation.
    Then, for each table detected, it transforms the table into a Pandas DataFrame
    and also retrieves the page number of the table from the document’s provenance
    metadata. If the table comes from page 11, it prints it out in Markdown format
    and then breaks the loop (so only the first matching table is shown).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: And the output is not too shabby.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: To retrieve ALL the tables from a PDF, you would need to omit the **if page_number
    =…** line from my code.
  prefs: []
  type: TYPE_NORMAL
- en: One thing I have noticed with Docling is that it’s not fast. As shown above,
    it took almost 34 seconds to extract that single table from a 50-page PDF.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 3: Perform OCR on an image.'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For this example, I scanned a random page from the Tesla 10-Q PDF and saved
    it as a PNG file. Let’s see how Docling copes with reading that image and converting
    what it finds into markdown. Here is my scanned image.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eb5bc9e832fe68c42ee6bc14affd1507.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from Tesla 10-Q PDF
  prefs: []
  type: TYPE_NORMAL
- en: And our code. We use Tesseract as our OCR engine (others are available)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Here is our output.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: If you compare this output to the original image, the results are disappointing.
    A lot of the text in the image was just missed or garbled. This is where a product
    like AWS Textract comes into its own, as it excels at extracting text from a wide
    range of sources.
  prefs: []
  type: TYPE_NORMAL
- en: However, Docling does provide various options for OCR, so if you receive poor
    results from one system, you can always switch to another.
  prefs: []
  type: TYPE_NORMAL
- en: I attempted the same task using EasyOCR, but the results weren’t significantly
    different from those obtained with Tesseract. If you’d like to try it out, here
    is the code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The generative-AI boom re-ignited an old truth: garbage in, garbage out. LLMs
    can hallucinate less only when they ingest semantically and spatially coherent
    input. Docling provides coherence (most of the time) across multiple source formats
    that your stakeholders can present, and does so locally and reproducibly.'
  prefs: []
  type: TYPE_NORMAL
- en: Docling has its uses beyond the AI world, though. Consider the vast number of
    documents stored in locations such as bank vaults, solicitors’ offices, and insurance
    companies worldwide. If these are to be digitised, Docling may provide some of
    the solutions for that.
  prefs: []
  type: TYPE_NORMAL
- en: Its biggest weakness is probably the Optical Character Recognition of text within
    images. I tried using Tesseract and EasyOCR, and the results from both were disappointing.
    You’ll probably need to use a commercial product like AWS Textract if you want
    to reliably reproduce text from those types of sources.
  prefs: []
  type: TYPE_NORMAL
- en: It can also be slow. I’ve a fairly high-spec desktop PC with a GPU, and it took
    some time on most tasks I set it. However, if your input documents are primarily
    PDFs, Docling could be a valuable addition to your text processing toolbox.
  prefs: []
  type: TYPE_NORMAL
- en: I have only scratched the surface of what Docling is capable of, and I encourage
    you to visit their homepage, which can be accessed using the following [link](https://docling-project.github.io/docling/)
    to learn more.
  prefs: []
  type: TYPE_NORMAL
