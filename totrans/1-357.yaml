- en: Everything I Studied to Become a Machine Learning Engineer (No CS Background)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/everything-i-studied-to-become-a-machine-learning-engineer-no-cs-background/](https://towardsdatascience.com/everything-i-studied-to-become-a-machine-learning-engineer-no-cs-background/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756250453754" class="mdspan-comment">Breaking into machine</mdspan>
    learning was hard.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: There were many courses, books and resources I used along the way that helped
    me, but being honest, many of them I wouldn’t have taken in hindsight.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: So, I want to review all the things I studied to land a job in machine learning,
    and then I will tell you which areas were actually worth it and which weren’t.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get into it!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: University Degree / Maths
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am very fortunate that I decided to study for a master’s in physics when I
    was a teenager.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Yes, you are probably rolling your eyes right now.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: “This guy said he had no CS background but did a master’s in physics, what the hell.”
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I can’t deny that this definitely gave me an advantage. However, many STEM graduates
    still struggle to find jobs in machine learning. I’ve even personally worked with
    them.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Simply having a master’s in a STEM subject is far from a guarantee that you
    will be able to land a job easily.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: There are so many more things you need to learn, which are typically not taught
    in the majority of programmes.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: With all that said, the main things I learned in my degree that are relevant
    to my current machine learning engineer job were the maths skills.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: I learnt calculus and linear algebra to an intense level, more than you need
    being honest, and statistics to a decent standard. Even then, I still had to brush
    up on my stats knowledge later.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: My degree was also the first time I wrote code.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: Literally on my first day, at 9am, I had a computer lab tutorial in [**Fortran**](https://en.wikipedia.org/wiki/Fortran).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: For those of you unfamiliar, Fortran is the oldest “high-level” programming
    language invented in the 1950s. Yet, here we were being taught it in 2017.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Fortran is hardly beginner-friendly and it immediately made me not like programming.
    If only old me knew what I would be doing today!
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Although I didn’t enjoy Fortran, it taught me how to think and solve problems
    using code, which paid dividends in the long run.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '*If you want to know all the maths skills required to work in machine learning,
    checkout my previous post:*'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '[**How to Learn the Math Needed for Machine Learning**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '*A breakdown of the three fundamental math fields required for machine learning:
    statistics, linear algebra and…*medium.com](https://medium.com/data-science-collective/how-to-learn-the-math-needed-for-machine-learning-7ad84e88c216)'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Python
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Because I hated Fortran so much, I actively avoided any module with a programming
    aspect.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: However, in 2020, during my third year, a video was recommended to me on my
    YouTube homepage.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '[***AlphaGo — The Movie***](https://www.youtube.com/watch?v=WXuK6gekU1Y&t=1539s)'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: For those of you unaware, this was a documentary about DeepMind’s AI AlphaGo
    that beat the best GO player in the world. Most people thought that an AI could
    never be good at GO, let alone beat the world champion.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些不知道的人来说，这是一部关于DeepMind的AI AlphaGo击败世界最佳围棋选手的纪录片。大多数人认为AI永远不可能擅长围棋，更不用说击败世界冠军了。
- en: After watching the video, I began reading about how AI works, including neural
    networks, reinforcement learning, and deep learning.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在观看视频后，我开始阅读关于AI如何工作的内容，包括神经网络、强化学习和深度学习。
- en: From then on, I was hell bent in becoming a data scientist, and I knew I had
    to learn Python to become one.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 从那时起，我决心成为一名数据科学家，我知道我必须学习Python才能实现这一目标。
- en: 'In the evening and at weekends, I would go through several Python courses and
    projects, the ones I used were:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在晚上和周末，我会浏览几个Python课程和项目，我使用的是：
- en: '[**Learn Python — Full Course for Beginners [Tutorial]**](https://www.youtube.com/watch?v=rfscVS0vtbw)'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**学习Python — 初学者完整课程[教程]**](https://www.youtube.com/watch?v=rfscVS0vtbw)'
- en: '[**W3Schools Python Tutorial**](https://www.w3schools.com/python/)'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**W3Schools Python教程**](https://www.w3schools.com/python/)'
- en: '[**Tutorialspoint Python Tutorial**](https://www.tutorialspoint.com/python/index.htm)'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Tutorialspoint Python教程**](https://www.tutorialspoint.com/python/index.htm)'
- en: Not to mention the endless Google searches and StackOverflow threads I visited.
    This was pre-ChatGPT, after all.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 更不用说我在ChatGPT之前进行的无数Google搜索和StackOverflow帖子了。
- en: I also practised my Python skills on [**HackerRank**](https://www.hackerrank.com/)
    problems and built basic projects for fun, as well as for my university coursework.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我还在[HackerRank](https://www.hackerrank.com/)上练习Python技能，并为乐趣以及大学课程构建了基本项目。
- en: SQL
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SQL
- en: After I learnt Python, I dedicated a month or so to learning SQL while applying
    for entry-level and graduate data science jobs.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习Python之后，我花了一个多月的时间学习SQL，同时申请初级和研究生数据科学职位。
- en: SQL is easier to learn than many other languages, as it’s smaller and the basics
    cover pretty much anything you want to do.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: SQL比许多其他语言更容易学习，因为它更小，基础涵盖了你想做的几乎所有事情。
- en: 'The courses and resources I used for SQL were:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我用于SQL的课程和资源包括：
- en: '[**The Complete SQL Bootcamp: Go from Zero to Hero**](https://www.udemy.com/course/the-complete-sql-bootcamp/)'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**完整的SQL入门课程：从零到英雄**](https://www.udemy.com/course/the-complete-sql-bootcamp/)'
- en: '[**W3Schools SQL Tutorial**](https://www.w3schools.com/python/)'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**W3Schools SQL教程**](https://www.w3schools.com/python/)'
- en: '[**Tutorialspoint SQL Tutorial**](https://www.tutorialspoint.com/python/index.htm)'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Tutorialspoint SQL教程**](https://www.tutorialspoint.com/python/index.htm)'
- en: And again, I used [**HackerRank**](https://www.hackerrank.com/) to practice
    SQL problems for interviews.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我使用[HackerRank](https://www.hackerrank.com/)练习SQL面试题。
- en: This was a small part of my learning journey, and I acquired most of my advanced
    SQL skills on the job.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是我学习旅程的一部分，我在工作中获得了大部分高级SQL技能。
- en: Machine Learning
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习
- en: During my final year of university, I took [**Andrew Ng’s Machine Learning Specialisation**](https://www.coursera.org/specializations/machine-learning-introduction?utm_medium=sem&utm_source=gg&utm_campaign=B2C_EMEA_ibm-data-science_ibm_FTCOF_professional-certificates_country-GB-country-UK-pmax-nonNRL-within-14d&campaignid=20858198563&adgroupid=&device=c&keyword=&matchtype=&network=x&devicemodel=&adposition=&creativeid=&hide_mobile_promo=&gclid=Cj0KCQiAv8SsBhC7ARIsALIkVT17ElG7ddl5-MpxAon-S4s905B3lcxLIkWpcsJNlYoo9cOmwnoJcC8aApVmEALw_wcB).
    I took it when it was still the 2012 version, when the coding exercises were in
    Octave/Matlab.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在我大学的最后一年，我参加了[**Andrew Ng的机器学习专业**](https://www.coursera.org/specializations/machine-learning-introduction?utm_medium=sem&utm_source=gg&utm_campaign=B2C_EMEA_ibm-data-science_ibm_FTCOF_professional-certificates_country-GB-country-UK-pmax-nonNRL-within-14d&campaignid=20858198563&adgroupid=&device=c&keyword=&matchtype=&network=x&devicemodel=&adposition=&creativeid=&hide_mobile_promo=&gclid=Cj0KCQiAv8SsBhC7ARIsALIkVT17ElG7ddl5-MpxAon-S4s905B3lcxLIkWpcsJNlYoo9cOmwnoJcC8aApVmEALw_wcB)。我参加的是2012年的版本，当时编码练习是在Octave/Matlab中进行的。
- en: 'This course taught me the theoretical fundamentals of all the machine learning
    algorithms, like:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这门课程让我了解了所有机器学习算法的理论基础，例如：
- en: '[Linear regression](https://en.wikipedia.org/wiki/Linear_regression)'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[线性回归](https://en.wikipedia.org/wiki/Linear_regression)'
- en: '[Logistic regression](https://en.wikipedia.org/wiki/Logistic_regression)'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[逻辑回归](https://en.wikipedia.org/wiki/Logistic_regression)'
- en: '[Decision trees](https://en.wikipedia.org/wiki/Decision_tree)'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[决策树](https://en.wikipedia.org/wiki/Decision_tree)'
- en: '[Support vector machines](https://en.wikipedia.org/wiki/Support_vector_machine)'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[支持向量机](https://en.wikipedia.org/wiki/Support_vector_machine)'
- en: '[Neural Networks](https://en.wikipedia.org/wiki/Neural_network_%28machine_learning%29)'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[神经网络](https://en.wikipedia.org/wiki/Neural_network_%28machine_learning%29)'
- en: This was all before I even started implementing them in code. Building that
    intuition behind the algorithms is so invaluable.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在我甚至开始用代码实现它们之前，这些都是。建立算法背后的直觉是非常宝贵的。
- en: 'I also supplemented my learning with various textbooks:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我还用各种教科书补充了我的学习：
- en: '[**Hands-On Machine Learning with Scikit-Learn, Keras, and TensorFlow**](https://amzn.to/3UIXEr9)
    **(affiliate link)**'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**使用Scikit-Learn、Keras和TensorFlow动手学习机器学习**](https://amzn.to/3UIXEr9) **(推广链接**）'
- en: '[**Elements of Statistical Learning**](https://amzn.to/4lGUIGq) **(affiliate
    link)**'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**《统计学习基础》**](https://amzn.to/4lGUIGq) **(推广链接**）'
- en: '[**The Hundred-Page Machine Learning Book**](https://amzn.to/3Jur7mg) **(affiliate
    link)**'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**《百页机器学习书**》](https://amzn.to/3Jur7mg) **(推广链接**）'
- en: All of these I still use today, as you will forever be studying and updating
    your knowledge of machine learning.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些我至今仍在使用，因为你会永远在学习并更新你的机器学习知识。
- en: Deep Learning
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习
- en: After studying all the fundamental machine learning knowledge, I took the subsequent
    course by Andrew Ng, which was the [**Deep Learning Specialisation**](https://www.coursera.org/specializations/deep-learning)
    on Coursera.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习完所有基本的机器学习知识后，我参加了Andrew Ng在Coursera上的后续课程，即[**深度学习专项**](https://www.coursera.org/specializations/deep-learning)。
- en: I again supplemented my learning with the same textbooks as in the machine learning
    section, as they cover many advanced concepts.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我再次用与机器学习部分相同的教科书补充了我的学习，因为它们涵盖了众多高级概念。
- en: 'Some further videos and courses I used were:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我还使用了以下一些视频和课程：
- en: '[**3Blue1Brown videos on neural networks**](https://www.youtube.com/@3blue1brown/videos)'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**3Blue1Brown关于神经网络的视频**](https://www.youtube.com/@3blue1brown/videos)'
- en: '[**StatQuest**](https://www.youtube.com/@statquest/videos) **(Probably one
    of the best teachers)**'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**StatQuest**](https://www.youtube.com/@statquest/videos) **(可能是最好的老师之一**）'
- en: '[**Neural Networks: Zero to Hero by Andrej Karpathy**](https://www.youtube.com/playlist?list=PLAqhIrjkxbuWI23v9cThsA9GvCAUhRvKZ)
    **(Also, probably one of the best teachers)**'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**安德烈·卡帕西的《神经网络：从零到英雄》**](https://www.youtube.com/playlist?list=PLAqhIrjkxbuWI23v9cThsA9GvCAUhRvKZ)
    **（也可能是最好的老师之一）**'
- en: '[**The Illustrated Transformer by Jay Alammar**](https://jalammar.github.io/illustrated-transformer/) — His
    whole website is a goldmine for deep learning topics.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**《Jay Alammar的《Transformer图解》**》](https://jalammar.github.io/illustrated-transformer/)
    — 他的整个网站都是深度学习主题的宝库。'
- en: Statistics
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 统计学
- en: At this point in my journey, I landed my first job as a data scientist at an
    insurance company, where I worked closely with actuaries.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的学习旅程的这个阶段，我在一家保险公司找到了我的第一份数据科学家工作，在那里我密切地与精算师合作。
- en: 'For those of you who don’t know what actuaries are, [**Wikipedia**](https://en.wikipedia.org/wiki/Actuary)
    describes them as:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些不知道精算师是做什么的人来说，[**维基百科**](https://en.wikipedia.org/wiki/Actuary) 这样描述他们：
- en: An actuary is a professional with advanced mathematical skills who deals with
    the measurement and management of risk and uncertainty.
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 精算师是具有高级数学技能的专业人士，他们处理风险和不确定性的测量和管理。
- en: Even though I studied statistics before, the level required at an insurance
    company is relatively high, especially when working with actuaries, as they are
    specialists in the field.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我在之前学习过统计学，但保险公司要求的水平相对较高，尤其是在与精算师合作时，因为他们是这个领域的专家。
- en: To upgrade my statistics, I studied the [**CS1**](https://actuaries.org.uk/qualify/curriculum/actuarial-statistics/)
    (statistics) actuarial exam. Even though I didn’t actually sit the exam, I reviewed
    and studied all the contents.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提升我的统计学水平，我学习了[**CS1**](https://actuaries.org.uk/qualify/curriculum/actuarial-statistics/)（统计学）精算师考试。尽管我实际上没有参加考试，但我回顾并学习了所有内容。
- en: The syllabus pretty much covers all the statistics you are likely to use as
    a data scientist or machine learning engineer for your entire career.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 课程大纲几乎涵盖了你在整个职业生涯中作为数据科学家或机器学习工程师可能用到的所有统计学知识。
- en: The book [**Practical Statistics for Data Scientists**](https://amzn.to/45V0Bdv)
    **(affiliate link)** served as a reference text to refresh my knowledge, and I
    studied the [**Think Bayes**](https://amzn.to/4oRuLa5) **(affiliate link)** textbook
    to learn Bayesian statistics.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍[**《数据科学家实用统计学**》](https://amzn.to/45V0Bdv) **(推广链接**)作为参考文本来刷新我的知识，我学习了[**《贝叶斯思维**》](https://amzn.to/4oRuLa5)
    **(推广链接**)教科书来学习贝叶斯统计学。
- en: It’s important to note that I didn’t simply take the courses and read the books;
    I documented practically everything I learned on Medium.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，我不仅仅参加了课程和阅读了书籍；我在Medium上记录了几乎所有我在学习过程中学到的东西。
- en: '[**General Statistics**](https://medium.com/@egorhowell/list/006e8c3cee05)'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '[**通用统计学**](https://medium.com/@egorhowell/list/006e8c3cee05)'
- en: '[**Probability Distributions**](https://medium.com/@egorhowell/list/1421ad42a84b)'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '[**概率分布**](https://medium.com/@egorhowell/list/1421ad42a84b)'
- en: '[**Bayesian Statistics**](https://medium.com/@egorhowell/list/36268a8570be)'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '[**贝叶斯统计**](https://medium.com/@egorhowell/list/36268a8570be)'
- en: By far, as I have said many times, this has been the biggest ROI for my career.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，正如我多次说过的，这对我来说是职业发展中最高的回报率。
- en: Time Series Forecasting
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 时间序列预测
- en: After spending a year in insurance, I switched companies and worked in a team
    that specialised in time series forecasting and optimisation problems.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在保险公司工作了一年之后，我跳槽到另一家公司，加入了一个专注于时间序列预测和优化问题的团队。
- en: 'The only book I used to learn forecasting was [**Forecasting: Principles and
    Practice**](https://amzn.to/4lNocCJ) **(affiliate link)** by Rob Hyndman and George
    Athanasopoulos.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我用来学习预测的唯一一本书是Rob Hyndman和George Athanasopoulos合著的[**预测：原理与实践**](https://amzn.to/4lNocCJ)
    **（推广链接）**。
- en: This is known as the bible of forecasting, and it is the only book I recommend
    people get when starting out studying the field.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这被称为预测领域的圣经，也是我推荐人们在学习该领域时开始阅读的唯一一本书。
- en: The rest of my knowledge I got from Google searches and random videos online.
    This was typically how I supplemented my knowledge in most areas.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我的其他知识主要来自谷歌搜索和网上的随机视频。这通常是我补充知识的主要方式。
- en: And of course, I documented everything on Medium.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我在Medium上记录了所有这些内容。
- en: '[**Time Series**](https://medium.com/@egorhowell/list/00bbfb9f5359)'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '[**时间序列**](https://medium.com/@egorhowell/list/00bbfb9f5359)'
- en: Optimisation / Operations Research
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优化/运筹学
- en: For my optimisation knowledge, it was a bit more mixed as it’s a vast field.
    To give you a sense of size, it arguably encompasses the whole of machine learning
    and also covers a list of [**discrete optimization algorithms**](https://en.wikipedia.org/wiki/Discrete_optimization).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我的优化知识，由于这是一个庞大的领域，所以情况稍微复杂一些。为了给你一个大致的概念，可以说它几乎涵盖了整个机器学习领域，还包括了一系列[**离散优化算法**](https://en.wikipedia.org/wiki/Discrete_optimization)。
- en: 'The primary reference text I used was [**Algorithms for Optimisation**](https://amzn.to/4fYLXXg)
    **(affiliate link),** and I supplemented that with a variety of other online resources,
    such as:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我主要使用的参考文本是[**优化算法**](https://amzn.to/4fYLXXg) **（推广链接），**我还补充了各种其他在线资源，例如：
- en: '[**Brilliant**](https://brilliant.org/)'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Brilliant**](https://brilliant.org/)'
- en: '[**KhanAcademy**](https://www.khanacademy.org/)'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**KhanAcademy**](https://www.khanacademy.org/)'
- en: YouTube
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: YouTube
- en: General Google searches
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一般的谷歌搜索
- en: But in general, I would study areas that I needed to learn for my job and write
    blog posts about them. That is how I learned most things, being honest, and still
    do.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 但总的来说，我会研究我工作中需要学习的领域，并为他们写博客文章。老实说，这也是我学习大多数东西的方式，现在仍然如此。
- en: Software Engineering
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 软件工程
- en: When I was looking to transition from being a data scientist to a machine learning
    engineer, the key areas I needed to improve were my software engineering skills.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 当我打算从数据科学家转型为机器学习工程师时，我需要提高的关键领域是我的软件工程技能。
- en: It’s a big area, in fact, it’s a whole job, but I focused on the fundamentals.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个很大的领域，实际上，它是一个完整的职业，但我专注于基础知识。
- en: 'The courses I took were:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我所参加的课程有：
- en: '[**Neetcode: Algorithms and Data Structures for Beginners **](https://neetcode.io/courses/dsa-for-beginners/0)— I
    used this to learn DSA for interviews and also learn more about the fundamental
    algorithms used in programming.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Neetcode: 初学者算法和数据结构**](https://neetcode.io/courses/dsa-for-beginners/0)
    — 我使用这个资源来学习面试所需的DSA（数据结构与算法），同时也了解了编程中使用的根本算法。'
- en: '[**Neetcode: System Design for Beginners**](https://neetcode.io/courses/system-design-for-beginners/0) — Similar
    to the previous resource, I utilised this to gain a deeper understanding of system
    design for interviews and to help me develop more effective large-scale machine
    learning systems.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Neetcode: 初学者系统设计**](https://neetcode.io/courses/system-design-for-beginners/0)
    — 与前面的资源类似，我利用这个资源来深入理解面试所需的系统设计，并帮助我开发更有效的规模化机器学习系统。'
- en: '[**Practical MLOps**](https://amzn.to/45Ap20S) **(affiliate link)** — Great
    textbook to teach you everything you need to know to deploy ML models like [**Kubernetes**](https://kubernetes.io/),
    [**Docker**](https://www.docker.com/) and general [**DevOps**](https://en.wikipedia.org/wiki/DevOps).'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**实用MLOps**](https://amzn.to/45Ap20S) **（推广链接）** — 一本很好的教科书，教你如何部署像[**Kubernetes**](https://kubernetes.io/)、[**Docker**](https://www.docker.com/)和一般的[**DevOps**](https://en.wikipedia.org/wiki/DevOps)这样的ML模型。'
- en: '[**CS107 Computer Organisation & Systems**](https://web.stanford.edu/class/archive/cs/cs107/cs107.1224/)** — **I
    took this course in my first job to gain a deeper understanding of how computers
    work under the hood and to learn some C.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**CS107 计算机组织与系统**](https://web.stanford.edu/class/archive/cs/cs107/cs107.1224/)**— **我在第一份工作中学习了这门课程，以更深入地了解计算机底层的工作原理，并学习一些C语言。'
- en: One area that is hard to study is writing proper production code. This is the
    only thing I learned solely on the job, but you can gain experience in it outside
    by creating your own software projects.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 一个难以学习的研究领域是编写正确的生产代码。这是我唯一完全在工作中学习的东西，但你也可以通过创建自己的软件项目来获得这方面的经验。
- en: '* * *'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: If that seems a lot, don’t worry, as that’s nearly 5 years’ worth of studying
    consistently almost every day!
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这看起来很多，不要担心，因为这几乎相当于近5年每天持续学习的结果！
- en: Also, as I said in the beginning, not all of it was needed in hindsight. The
    following areas are things I would definitely not do again.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，正如我一开始所说的，事后看来，其中很多并不是必需的。以下是一些我肯定不会再次做的事情。
- en: '**Actuarial CS1** — Many concepts are not needed in practice, and the mathematical
    detail can be overkill. I recommend sticking to the [**Practical Statistics for
    Data Scientists**](https://amzn.to/45V0Bdv) **(affiliate link)** textbook.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**精算学CS1**— 许多概念在实际中并不需要，数学细节可能过于详尽。我建议坚持使用[**数据科学家实用统计学**](https://amzn.to/45V0Bdv)
    **(联盟链接**)教科书。'
- en: '**CS107 Computer Organisation & Systems** — Haven’t really used any ideas from
    here that much.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CS107 计算机组织与系统**— 实际上并没有在这里学到很多想法。'
- en: '**Elements of Statistical Learning — **An overkill textbook for most people.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**统计学习要素**——对大多数人来说是一本过于详尽的教科书。'
- en: The rest was definitely worth it, but I definitely didn’t need all those resources.
    One good one in each section is enough.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 其余的确实值得，但我确实不需要所有那些资源。每个部分有一个好的就足够了。
- en: '* * *'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
