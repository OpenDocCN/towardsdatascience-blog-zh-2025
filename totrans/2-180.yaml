  prefs: []
  type: TYPE_NORMAL
  zh: '[链接](https://towardsdatascience.com/if-i-wanted-to-become-a-machine-learning-engineer-id-do-this/).'
- en: '[If I Wanted to Become a Machine Learning Engineer, I’d Do This](https://towardsdatascience.com/if-i-wanted-to-become-a-machine-learning-engineer-id-do-this/)'
