- en: Mobile App Development with Python
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/mobile-app-development-with-python/](https://towardsdatascience.com/mobile-app-development-with-python/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1749599474581" class="mdspan-comment">Intro</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[**Mobile App Development**](https://en.wikipedia.org/wiki/Mobile_app_development)is
    the process of building an application for mobile devices, such as smartphones
    and tablets. Generally, mobile apps are harder to develop than web apps, because
    they must be designed from scratch for each platform, while web development shares
    common codes across different devices.'
  prefs: []
  type: TYPE_NORMAL
- en: Each operating system has its own language used for coding a **native app**
    (one created with technology dedicated to a specific platform). For instance,
    Android uses Java, while iOS uses Swift. Usually, it’s better to use the dedicated
    tech for apps that require high performance, like gaming or heavy animations.
    On the contrary, **hybrid apps** use cross-platform languages (i.e. Python) that
    can be run on multiple operating systems.
  prefs: []
  type: TYPE_NORMAL
- en: Mobile App Development is highly relevant for AI as it enables the integration
    of new technologies into people daily life. LLMs are so popular now because they
    have been deployed into user-friendly apps on your phone, easily accessible anytime
    and anywhere.
  prefs: []
  type: TYPE_NORMAL
- en: Through this tutorial, I will explain **how to build a cross-platform mobile
    app with Python**,using my Memorizer App as an example (link to full code at the
    end of the article).
  prefs: []
  type: TYPE_NORMAL
- en: Setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’m going to use the **Kivy framework**, which is the most used for mobile development
    in the Python community. [*Kivy*](http://kivy.org/#home) is an open-source package
    for mobile apps, while [*KivyMD*](https://kivymd.readthedocs.io/en/latest/)is
    the library that leverages Google’s [*Material Design*](https://material.io/design/introduction)and
    makes the usage of this framework much easier (similar to Bootstrap for web dev).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The first thing to do is to create 2 files:'
  prefs: []
  type: TYPE_NORMAL
- en: '*main.py* (the name must be this) which shall contain the Python code of the
    app, basically the back-end'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*components.kv* (you can call it differently) which shall contain all the *Kivy*
    code used for the app layout, you can see it as the front-end'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Then, in the *main.py* file we import the package to initialize an [empty app](https://kivymd.readthedocs.io/en/latest/themes/material-app/index.html):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Before we start, I shall briefly describe the application I’m building. It’s
    a simple app that helps to memorize stuff: the user inserts pair of words (i.e.
    something in English and the equivalent in another language, or a date and the
    historical event linked to that). Then, the user can play the game by trying to
    remember shuffled information. As a matter of fact, I’m using it to memorize Chinese
    vocabulary.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b99092052f8f5e68990b3557e82731bd.png)'
  prefs: []
  type: TYPE_IMG
- en: 'As you can see from the image, I’m going to include:'
  prefs: []
  type: TYPE_NORMAL
- en: an intro screen to display the logo
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: a home screen that can redirect to the other screens
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: a screen to save words
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: a screen to view and delete stored information
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: a screen to play the game.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'So, we can write them all down in the *components.kv* file:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1bedc9d2b29fc4e788290654d2a5ca0e.png)'
  prefs: []
  type: TYPE_IMG
- en: In order to include *Kivy* file in the app, we need to load it from the *main.py*
    with the [builder class](https://kivy.org/doc/stable/api-kivy.lang.builder.html),
    while the [screen class](https://kivy.org/doc/stable/api-kivy.uix.screenmanager.html)
    links the screens between the two files.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Please note that even if the app itself is basic, there is a pretty tricky
    feature: **db management via mobile**. That’s why we are going to use also the
    native Python package for databases:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Development — basics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We’re gonna warm up with the **Intro Screen**: it simply contains an [image
    logo](https://kivy.org/doc/stable/api-kivy.uix.image.html), some [text labels](https://kivymd.readthedocs.io/en/latest/components/label/),
    and a [button](https://kivymd.readthedocs.io/en/latest/components/button/) to
    move to another screen.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/83603dade5690517fa2bbbba5ba8c0e0.png)'
  prefs: []
  type: TYPE_IMG
- en: 'I consider that easy because it doesn’t require any Python code, it can be
    handled by the *components.kv* file. The change of screen triggered by the button
    must be linked to the root like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5dd6c97bd5e1747a161371a08d515ac2.png)'
  prefs: []
  type: TYPE_IMG
- en: The same goes for the **Home Screen:** since it’s just a redirect, it can be
    all managed with *Kivy* code. You just have to specify that the screen must have
    1 icon and 3 buttons.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bd3181d2c0033892754e91903e49e54b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'You may have noticed that on top of the screen there is a “home” icon**.**
    Please note that there is a difference between a [simple icon](https://kivymd.readthedocs.io/en/latest/components/label/index.html#mdicon)
    and an [icon button](https://kivymd.readthedocs.io/en/latest/components/button/#mdiconbutton):
    the latter is pushable. On this screen it’s just a simple icon, but on the other
    screens it will be an icon button used to bring you back to the Home Screen from
    any other screen of the app.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8e01c2c11dc9bba870356650b3681324.png)'
  prefs: []
  type: TYPE_IMG
- en: When we use an icon, we have to provide the tag (i.e. “home” displays a little
    house). I find [this code](https://gist.github.com/gottadiveintopython/c59044b578aaac4eb8b4193716d8421b)
    very useful, just run it and it’ll show all the available icons.
  prefs: []
  type: TYPE_NORMAL
- en: Development — advanced
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s step up our game and deal with the DB through the **Save Screen.** It
    must allow the user to save different words for different categories (i.e. to
    study multiple languages). That implies:'
  prefs: []
  type: TYPE_NORMAL
- en: choosing an existing category (i.e. Chinese), so querying the existing ones
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: creating a new category (i.e. French)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: two text inputs (i.e. a word and its translation)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: a button to save the form, so writing a new row in the DB.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/eba1c54bf7cb738dedcac1abf68057ce.png)'
  prefs: []
  type: TYPE_IMG
- en: When you run the app for the first time, the DB must be created. We can do that
    in the main function of the app. For convenience, I’m going to add also another
    function that queries the DB with any SQL you pass on.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The tricky part is the DB icon that, when pushed, shows all the existing categories
    and allows the selection of one. In the *components.kv* file, under the Save Screen
    (named “*save”),* we add an icon button (named “*category_dropdown_save*”) that,
    if pressed, launches the Python *dropdown_save()* function from the main app.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f8371c25e0b7c619969bce70558598b0.png)'
  prefs: []
  type: TYPE_IMG
- en: That function is defined in the *main.py* file and returns a [dropdown menu](https://kivymd.readthedocs.io/en/latest/components/menu/index.html)
    such that, when an item is pressed it gets assigned to a variable named “*category*”.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/08a9516a7ac337f8c866f69e5dc87781.png)'
  prefs: []
  type: TYPE_IMG
- en: 'That last line of code links the *category* variable with the label that appears
    in the front-end. The screen manager calls the screen with *get_screen()* and
    identifies the item by *id*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0165dd7163d66b4c3616faa85d12d05c.png)'
  prefs: []
  type: TYPE_IMG
- en: When the user enters the Save Screen, the *category* variable should be *null*
    until one is selected. We can specify the [properties of the screen](https://kivymd.readthedocs.io/en/latest/components/screen/)
    when one enters and when one leaves. So I’m going to add a function in the screen
    class that empties the App variable.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Once the category is chosen, the user can insert the other text inputs, which
    are required to save the form (by pushing the button).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9299e3c04ca393a59909e139a7fa1171.png)'
  prefs: []
  type: TYPE_IMG
- en: In order to make sure that the function doesn’t save if one of the inputs is
    empty, I’ll use a [dialog box](https://kivymd.readthedocs.io/en/latest/components/dialog/index.html).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: After reading so far, I’m confident that you’re able to go through the full
    code and understand what’s going on. The logic of the other screens is pretty
    similar.
  prefs: []
  type: TYPE_NORMAL
- en: Test
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can test the app on the **iOS simulator on MacBook**, that replicates an
    iPhone environment without needing a physical iOS device.
  prefs: []
  type: TYPE_NORMAL
- en: '[Xcode](https://apps.apple.com/us/app/xcode/id497799835?mt=12) needs to be
    installed. Start by opening the terminal and running the following commands (the
    last one will take about 30 minutes):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Now decide your app name and use it to create the repository, then open the .*xcodeproj*
    file:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/11728dd904ccfa17cf7c7543dddf5393.png)'
  prefs: []
  type: TYPE_IMG
- en: Finally, if you are working with iOS and you want to test an app on your phone
    and then publish it on the App Store, Apple requires you to pay for a [developer
    account](https://developer.apple.com/).
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This article has been a tutorial to demonstrate **how to design and build a
    cross-platform mobile app with Python.** I used *Kivy* to design the user interface
    and I showed how to make it available for iOS devices. Now you can make your own
    mobile apps with Python and *Kivy*.
  prefs: []
  type: TYPE_NORMAL
- en: Full code for this article: **[GitHub](https://github.com/mdipietro09/mApp_Memorizer)**
  prefs: []
  type: TYPE_NORMAL
- en: I hope you enjoyed it! Feel free to contact me for questions and feedback or
    just to share your interesting projects.
  prefs: []
  type: TYPE_NORMAL
- en: 👉 **[Let’s Connect](https://maurodp.carrd.co/)** 👈
  prefs: []
  type: TYPE_NORMAL
