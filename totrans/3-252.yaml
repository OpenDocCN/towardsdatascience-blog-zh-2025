- en: Publish Interactive Data Visualizations for Free with Python and Marimo
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/publish-interactive-data-visualizations-for-free-with-python-and-marimo/](https://towardsdatascience.com/publish-interactive-data-visualizations-for-free-with-python-and-marimo/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Working in data science, it can be hard to share insights from complex datasets
    using only static figures. All the facets that describe the shape and meaning
    of interesting data are not always captured in a handful of pre-generated figures.
    While we have powerful technologies available for presenting interactive figures — where
    a viewer can rotate, filter, zoom, and generally explore complex data  —  they
    always come with tradeoffs.
  prefs: []
  type: TYPE_NORMAL
- en: Here I present my experience using a recently released Python library — [marimo](https://marimo.io) — which
    opens up exciting new opportunities for publishing interactive visualizations
    across the entire field of data science.
  prefs: []
  type: TYPE_NORMAL
- en: Interactive Data Visualization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The tradeoffs to consider when selecting an approach for presenting data visualizations
    can be broken into three categories:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Capabilities** — what visualizations and interactivity am I able to present
    to the user?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Publication Cost** — what are the resources needed for displaying this visualization
    to users (e.g. running servers, hosting websites)?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ease of Use** – how much of a new skillset / codebase do I need to learn
    upfront?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**JavaScript** is the foundation of portable interactivity. Every user has
    a web browser installed on their computer and there are many different frameworks
    available for displaying any degree of interactivity or visualization you might
    imagine (for example, this [gallery of amazing things people have made with three.js](https://threejs.org/)).
    Since the application is running on the user’s computer, no costly servers are
    needed. However, a significant drawback for the data science community is ease
    of use, as JS does not have many of the high-level (i.e. easy-to-use) libraries
    that data scientists use for data manipulation, plotting, and interactivity.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Python** provides a useful point of comparison. Because of its [continually
    growing popularity](https://flatironschool.com/blog/python-popularity-the-rise-of-a-global-programming-language/),
    some have called this the [“Era of Python”](https://towardsdatascience.com/we-are-living-in-the-era-of-python-bc032d595f6a).
    For data scientists in particular, Python stands alongside R as one of the foundational
    languages for quickly and effectively wielding complex data. While Python may
    be easier to use than Javascript, there are fewer options for presenting interactive
    visualizations. Some popular projects providing interactivity and visualization
    have been [Flask](https://flask.palletsprojects.com/en/stable/), [Dash](https://dash.plotly.com/),
    and [Streamlit](https://streamlit.io/) (also worth mentioning — [bokeh](https://docs.bokeh.org/en/latest/docs/gallery.html),
    [HoloViews](https://holoviews.org/), [altair](https://altair-viz.github.io/altair-tutorial/README.html),
    and [plotly](https://plotly.com/python/)). The biggest tradeoff for using Python
    has been the cost for publishing – delivering the tool to users. In the same way
    that [shinyapps](https://www.shinyapps.io/) require a running computer to serve
    up the visualization, these Python-based frameworks have exclusively been server-based.
    This is by no means prohibitive for authors with a budget to spend, but it does
    limit the number of users who can take advantage of a particular project.'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Pyodide**](https://pyodide.org/en/stable/) is an intriguing middle ground — Python
    code running directly in the web browser using [WebAssembly](https://webassembly.org/)
    (WASM). There are resource limitations (only 1 thread and 2GB memory) that make
    this impractical for doing the heavy lifting of data science. *However*, this
    can be more than sufficient for building visualizations and updating based on
    user input. Because it runs in the browser, no servers are required for hosting.
    Tools that use Pyodide as a foundation are interesting to explore because they
    give data scientists an opportunity to write Python code which runs directly on
    users’ computers without their having to install or run anything outside of the
    web browser.'
  prefs: []
  type: TYPE_NORMAL
- en: 'As an aside, [I’ve been interested previously in](https://towardsdatascience.com/python-based-data-viz-with-no-installation-required-aaf2358c881)
    one project that has tried this approach: [stlite](https://github.com/whitphx/stlite),
    [an in-browser implementation of Streamlit](https://edit.share.stlite.net/) that
    lets you deploy these flexible and powerful apps to a broad range of users. However,
    a core limitation is that Streamlit itself is distinct from stlite (the port of
    Streamlit to WASM), which means that not all features are supported and that advancement
    of the project is dependent on two separate groups working along compatible lines.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Introducing: Marimo'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This brings us to [**Marimo**](https://marimo.io).
  prefs: []
  type: TYPE_NORMAL
- en: 'The [first public](https://news.ycombinator.com/item?id=38971966) [announcements
    of marimo](https://www.reddit.com/r/MachineLearning/comments/191rdwq/p_i_built_marimo_an_opensource_reactive_python/)
    were in January 2024, so the project is very new, and it has a unique combination
    of features:'
  prefs: []
  type: TYPE_NORMAL
- en: The interface resembles a Jupyter **notebook**, which will be familiar to users.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Execution of cells is **reactive**, so that updating one cell will rerun all
    cells which depend on its output.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**User input** can be captured with a flexible set of UI components.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Notebooks can be quickly converted into **apps**, hiding the code and showing
    only the input/output elements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apps can be run locally or converted into **static webpages** using WASM/Pyodide.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'marimo balances the tradeoffs of technology in a way that is well suited to
    the skill set of the typical data scientists:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Capabilities** — user input and visual display features are rather extensive,
    [supporting user input](https://docs.marimo.io/guides/working_with_data/plotting/#reactive-plots)
    via Altair and Plotly plots.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Publication Cost** — deploying as static webpages is basically free — no
    servers required'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ease of Use** — for users familiar with Python notebooks, marimo will feel
    very familiar and be easy to pick up.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Publishing Marimo Apps on the Web
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The best place to start with marimo is by reading [their extensive documentation](https://docs.marimo.io/).
  prefs: []
  type: TYPE_NORMAL
- en: As a simple example of the type of display that can be useful in data science,
    consisting of explanatory text interspersed with interactive displays, I have
    created a barebones [GitHub repository](https://github.com/FredHutch/marimo-publication).
    Try it out yourself [here](https://fredhutch.github.io/marimo-publication/).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/89e7988030a56cfff223ce2580175485.png)'
  prefs: []
  type: TYPE_IMG
- en: Example publication created with marimo (image created by author)
  prefs: []
  type: TYPE_NORMAL
- en: 'Using just a little bit of code, users can:'
  prefs: []
  type: TYPE_NORMAL
- en: Attach source datasets
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generate visualizations with flexible interactivity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write narrative text describing their findings
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Publish to the web for free (i.e. using GitHub Pages)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For more details, read their [documentation on web publishing](https://docs.marimo.io/guides/publishing/github_pages/#export-to-wasm-powered-html)
    and [template repository for deploying to GitHub Pages](https://github.com/marimo-team/marimo-gh-pages-template).
  prefs: []
  type: TYPE_NORMAL
- en: Public App / Private Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This new technology offers an exciting new opportunity for collaboration — publish
    the app publicly to the world, but users can only see specific datasets that they
    have permission to access.
  prefs: []
  type: TYPE_NORMAL
- en: Rather than building a dedicated data backend for every app, user data can be
    stored in a generic backend which can be securely authenticated and accessed using
    a Python client library — all contained within the user’s web browser. For example,
    the user is given an OAuth login link that will authenticate them with the backend
    and allow the app to temporarily access input data.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a proof of concept, I built a simple visualization app which connects to
    [the Cirro data platform](https://cirro.bio), which is used at my institution
    to manage scientific data. Full disclosure: I was part of the team that built
    this platform before it spun out as an independent company. In this manner users
    can:'
  prefs: []
  type: TYPE_NORMAL
- en: Load the public visualization app — hosted on GitHub Pages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Connect securely to their private data store
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Load the appropriate dataset for display
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Share a link which will direct authorized collaborators to the same data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Try it out yourself [here](https://fredhutch.github.io/differential-expression-viewer/?url=https%3A%2F%2Ffredhutch.github.io%2Fdifferential-expression-viewer%2Fpublic%2FDE_results.csv.gz).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/251c787e3eb5dbc993d73cbaf9ed98e9.png)'
  prefs: []
  type: TYPE_IMG
- en: Example visualization app sourcing user controlled data (image created by author)
  prefs: []
  type: TYPE_NORMAL
- en: As a data scientist, this approach of publishing free and open-source visualization
    apps which can be used to interact with private datasets is extremely exciting.
    Building and publishing a new app can take hours and days instead of weeks and
    years, letting researchers quickly share their insights with collaborators and
    then publish them to the wider world.
  prefs: []
  type: TYPE_NORMAL
