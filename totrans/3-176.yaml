- en: 2026 Will Be The Year of Data + AI Observability
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/2026-will-be-the-year-of-data-ai-observability/](https://towardsdatascience.com/2026-will-be-the-year-of-data-ai-observability/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: GenAI has already made an extraordinary impact on enterprise productivity. [Marc
    Benioff has stated](https://www.salesforceben.com/salesforce-will-hire-no-more-software-engineers-in-2025-says-marc-benioff/)
    Salesforce will keep its software engineering headcount flat due to a 30% increase
    in productivity thanks to AI. Users leveraging Microsoft Co-pilot [create or edit
    10% more documents](https://www.microsoft.com/en-us/research/uploads/prod/2024/07/Generative-AI-in-Real-World-Workplaces-Deck.pdf).
  prefs: []
  type: TYPE_NORMAL
- en: But this impact has been evenly distributed. Powerful models are a simple API
    call away and available to all (as Meta and OpenAI ads make sure to remind us).
  prefs: []
  type: TYPE_NORMAL
- en: The real disruption lies with “data + AI.” In other words, when organizations
    combine their first-party data with LLMs to unlock unique insights, automate processes,
    or accelerate specialized workflows.
  prefs: []
  type: TYPE_NORMAL
- en: No one knows *exactly* when this tidal wave will hit, but based on our conversations
    with dozens of teams actively working on data + AI applications, it is clear the
    time is nigh.
  prefs: []
  type: TYPE_NORMAL
- en: Why? Well, this follows a pattern we’ve seen before. Multiple times. Every major
    technology shift sees initial adoption that is magnified once it reaches enterprise
    level reliability. We saw this with software and application observability, data
    and data observability, and soon data + AI and data & [AI observability](https://www.montecarlodata.com/blog-ai-observability/).
  prefs: []
  type: TYPE_NORMAL
- en: In this post, we’ll highlight the progress of enterprise data + AI initiatives
    as well as the path many teams are taking to cross the tipping point.
  prefs: []
  type: TYPE_NORMAL
- en: Past is prologue
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data + AI will deliver exponentially more unique value, but it is also exponentially
    harder.
  prefs: []
  type: TYPE_NORMAL
- en: Most organizations don’t have [$500 billion to spare for science fiction-themed
    initiatives](https://apnews.com/article/trump-ai-openai-oracle-softbank-son-altman-ellison-be261f8a8ee07a0623d4170397348c41).
    Enterprise applications need to be economically feasible and reliable.
  prefs: []
  type: TYPE_NORMAL
- en: Looking at past technology advances–namely cloud computing and big data–we can
    see it typically happens in that order. Infrastructure and capacity breakthroughs
    create demand and increased reliability levels are required to sustain it.
  prefs: []
  type: TYPE_NORMAL
- en: Before the internet was powering the world’s most impactful SaaS applications
    with increasingly critical tasks from banking to real-time navigation, it was
    mainly the domain of cat pictures, AOL chatrooms, and email chain letters. That
    change only happened once we reached the fabled “5 9s of reliability.” S3, Datadog,
    and site reliability engineering practices changed the world.
  prefs: []
  type: TYPE_NORMAL
- en: Prior to data powering valuable data products like machine learning models and
    real-time marketing applications, data warehouses were mainly used to create charts
    in binders that sat off to the side of board meetings. Snowflake and Databricks
    changed the economics and capacity of data storage/processing and [data observability](https://www.montecarlodata.com/blog-what-is-data-observability/)
    brought reliability to the modern data stack.
  prefs: []
  type: TYPE_NORMAL
- en: This pattern is repeating with AI. 2023 was the year of GPUs. 2024 was the year
    of foundational models. 2025 has already seen dramatic increases in capacity with
    [DeepSeek](https://finance.yahoo.com/news/deepseek-slashes-ai-pricing-75-143744514.html?guccounter=1&guce_referrer=aHR0cHM6Ly93d3cuZ29vZ2xlLmNvbS8&guce_referrer_sig=AQAAAJT4NK1tvpOK3LqpbRmkLUZH8ysLussjDBaXgMoq6nf4xD-mKdACoM_MzduUAH08mUCApVe2LOoAg3ippqaiYjUdf5n-ROCY7q1T0y-JtyijTWusEduxRlnkXhVj0beckeEP6hI-bPrGmS_mjFT7gVpdjgOzQgYrP8UNMLg08Ure)
    and the initial ripple of [agentic applications](https://blogs.nvidia.com/blog/what-is-agentic-ai/)
    will become a tidal wave.
  prefs: []
  type: TYPE_NORMAL
- en: Our bet is 2026 will be the year when data + AI changes the world…and, if history
    is any indicator, it will be no coincidence this revolution will be immediately
    preceded by advances in observability.
  prefs: []
  type: TYPE_NORMAL
- en: Where data + AI teams are today
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Data + AI teams are further along than they were last year. Based on our conversations:'
  prefs: []
  type: TYPE_NORMAL
- en: 40% are in the production stage (30% just got there)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 40% are in the semi or pre-production stage
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 20% are in the experimentation stage
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'While you can see the critical mass building, all of them are facing challenges
    as they attempt to reach full scale. The most common themes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data readiness —** You can’t have good AI with bad data. On the structured
    data side of the house, teams are racing to achieve “[AI-ready data](https://www.montecarlodata.com/blog-3-steps-to-ai-ready-data/).”
    In other words, to create a central source of truth and reduce their data + AI
    downtime.'
  prefs: []
  type: TYPE_NORMAL
- en: On the unstructured side, teams are struggling with conflicting sources and
    outdated information. One team in particular cited a “fear of an unmanageable
    knowledge base” as the main impediment to scale.
  prefs: []
  type: TYPE_NORMAL
- en: '**System sprawl** — Currently, there is not what we would call an industry
    standard architecture, although hints are emerging. The data + AI stack is actually
    four separate stacks coming together: structured data, unstructured data, AI and
    oftentimes the SaaS stack.'
  prefs: []
  type: TYPE_NORMAL
- en: Each stack on its own is difficult to govern and maintain high reliability levels.
    Piecing them together is complexity squared. Almost all of the data teams we have
    talked to are trying to consolidate the chaos where they can, for example, by
    leveraging large modern data cloud platforms for many of the core components rather
    than purpose-built vector databases.
  prefs: []
  type: TYPE_NORMAL
- en: '**Feedback loops —** One of the most common challenges inherent in data + AI
    applications is that evaluating the output is often subjective. Common approaches
    include:'
  prefs: []
  type: TYPE_NORMAL
- en: Letting human annotators score outputs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Tracking user behavior (such as thumbs up/down or accepting a suggestion) as
    an indirect measure of quality
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Using models (LLMs, SLMs and others) to score outputs on various criteria
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Comparing outputs with some known ground truth
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: All approaches have challenges, and creating correlations between system changes
    and output results is near impossible.
  prefs: []
  type: TYPE_NORMAL
- en: '**Cost & latency** — The progress of model capacity and cost is breathtaking.
    During a [recent presentation](https://info.montecarlodata.com/get-resources/data-quality-day/building-enterprise-data-quality-at-scale),
    Thomas Tunguz, a leading venture capitalist in the AI space, shared this graph
    showing how smaller (less expensive model) performance is reaching similar performance
    levels as larger models.'
  prefs: []
  type: TYPE_NORMAL
- en: But we aren’t quite at commodity infrastructure prices just yet. Most teams
    we spoke with had concerns around the financial impact of AI adoption. If there
    was any monitoring taking place, it was more often than not on tokens and cost
    rather than outcome reliability.
  prefs: []
  type: TYPE_NORMAL
- en: 'The next frontier: Data + AI observability'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Diagram representing data + AI observability](../Images/e1dc3b8fb2664317b7274e29528c6a79.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Data + AI is an evolving space with unique challenges, but the principles of
    building reliable technology systems have remained consistent for decades.
  prefs: []
  type: TYPE_NORMAL
- en: 'One of those core principles is this: you cannot just sporadically check the
    product at the end of the assembly line or even at certain points throughout the
    assembly line. Instead, you need full visibility into the assembly line itself.
    For complex systems, it is the only way to identify issues early and trace them
    back to the root cause.'
  prefs: []
  type: TYPE_NORMAL
- en: But you need to observe the *whole system*. End-to-end. It doesn’t work any
    other way.
  prefs: []
  type: TYPE_NORMAL
- en: 'To achieve data + AI reliability, teams will not be successful by observing
    models in a vacuum. For data + AI observability, that means integrations across
    the core system components. In other words, the four ways data + AI products break:
    in the data, system, code, or model.'
  prefs: []
  type: TYPE_NORMAL
- en: Detecting, triaging and resolving issues will require visibility into structured/unstructured
    data, orchestration/agent systems, prompts, contexts *and* model responses. (Stay
    tuned for an upcoming deep dive on exactly what this means and how each component
    beaks).
  prefs: []
  type: TYPE_NORMAL
- en: Data + AI are no longer two separate technologies; they are a single system.
    By next year, let’s hope we’re treating it like one.
  prefs: []
  type: TYPE_NORMAL
- en: Change happens slowly, then all at once
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’re at that precipice with data + AI.
  prefs: []
  type: TYPE_NORMAL
- en: No organization will be surprised by the *what* or the *how*. Every member of
    the boardroom, the C-suite, and the breakroom has seen how past platform shifts
    have created Blockbusters and Netflixes.
  prefs: []
  type: TYPE_NORMAL
- en: The surprise will be in the *when* and the *where*. Every organization is racing,
    but they don’t know when to pivot when to break into a sprint, or even where to
    run.
  prefs: []
  type: TYPE_NORMAL
- en: Standing still is not an option, but no one wants to use rapidly evolving infrastructure
    to build bespoke AI applications that will quickly become commoditized. No one
    wants their picture accompanying [the](https://www.reuters.com/technology/artificial-intelligence/ai-hallucinations-court-papers-spell-trouble-lawyers-2025-02-18/)
    [next](https://venturebeat.com/ai/a-chevy-for-1-car-dealer-chatbots-show-perils-of-ai-for-customer-service/)
    [AI hallucination](https://time.com/6256529/bing-openai-chatgpt-danger-alignment/)
    [headline](https://www.theguardian.com/technology/2025/feb/06/google-edits-super-bowl-ad-for-ai-that-featured-false-information#:~:text=Replying%20to%20him%2C%20the%20Google,the%20websites%20that%20Gemini%20scrapes.).
  prefs: []
  type: TYPE_NORMAL
- en: It’s clear achieving reliability at scale will be the tipping point that crowns
    new industry titans. Our recommendation is that as the data + AI space matures,
    make sure you are prepared to pivot.
  prefs: []
  type: TYPE_NORMAL
- en: Because if the past has shown us anything, it’s that the organizations with
    the right foundations for building reliable systems with high levels of data readiness
    will be the ones crossing the finish line.
  prefs: []
  type: TYPE_NORMAL
