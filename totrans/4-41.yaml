- en: Small Training Dataset? You Need SetFit
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/small-training-dataset-you-need-setfit-61d43c7d92f2/](https://towardsdatascience.com/small-training-dataset-you-need-setfit-61d43c7d92f2/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Image by author](../Images/067cafa918b72d8c17c6b1e2f6f84c90.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Data scarcity is a big problem for many data scientists.
  prefs: []
  type: TYPE_NORMAL
- en: That might sound ridiculous ("isn’t this the age of *Big* Data?"), but in many
    domains there simply isn’t enough labelled training data to train performant models
    using traditional ML approaches.
  prefs: []
  type: TYPE_NORMAL
- en: 'In classification tasks, the lazy approach to this problem is to "throw AI
    at it": take an off-the-shelf pre-trained LLM, add a clever prompt, and Bob’s
    your uncle.'
  prefs: []
  type: TYPE_NORMAL
- en: But LLMs aren’t always the best tool for the job. At scale, LLM pipelines can
    be slow, expensive, and unreliable.
  prefs: []
  type: TYPE_NORMAL
- en: An alternative option is to use a fine-tuning/training technique that’s designed
    for few-shot scenarios (where there’s little training data).
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article, I’ll introduce you to a favourite technique of mine: **SetFit**,
    a fine-tuning framework that can help you build highly performant NLP classifiers
    with **as few as 8 labelled samples per class**.'
  prefs: []
  type: TYPE_NORMAL
- en: I first learned about SetFit on a project I delivered for a client in the financial
    sector
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We were trying to build a model that could classify domain-specific texts which
    had only subtle differences between them. Unfortunately, we had only around 10
    samples per class (and ~200+ classes), and weren’t having much luck with our arsenal
    of traditional NLP tools (TF-IDF, BERT, DistilBERT, RoBERTa, OpenAI/Llama 3).
  prefs: []
  type: TYPE_NORMAL
- en: 'While searching for a solution, I came across SetFit and decided to try it
    out after seeing this remarkable graph, which shows the results of an experiment
    run by the original creators of SetFit:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Source](../Images/7468dec9be8fb30f72b91b56acf719fb.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Source](https://arxiv.org/pdf/2209.11055)'
  prefs: []
  type: TYPE_NORMAL
- en: In the experiment, the researchers trained a RoBERTa Large model to classify
    the sentiment of customer reviews. They started with a training dataset of just
    3(!) samples per class/sentiment, and gradually increased the size of the training
    dataset up to the full sample of 3k, recording the accuracy at each interval.
    As you can see from the graph (the orange line), the RoBERTa model was highly
    performant with a large sample size, and terrible at small sample sizes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, the researchers trained a series of models using the SetFit framework
    (the blue line). And they found that:'
  prefs: []
  type: TYPE_NORMAL
- en: SetFit-trained models easily outperform RoBERTa Large with small sample sizes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This blew my mind, but, to understand why it happens, we need to get a grasp
    on what SetFit actually is.
  prefs: []
  type: TYPE_NORMAL
- en: '[SetFit](https://huggingface.co/blog/setfit) is a framework for few-shot fine-tuning
    of Sentence Transformers (text embedding models). It was developed by researchers
    at HuggingFace 🤗, and is completely free to use via the t`ransformers` and s`etfit`
    Python libraries.'
  prefs: []
  type: TYPE_NORMAL
- en: What’s a Sentence Transformer? It’s just a specific type of neural network designed
    for encoding/embedding text. They’re a key part of modern NLP toolkits because
    they let you convert text into high-dimensional, dense vectors which capture the
    semantic meaning of the text. In turn, those vector representations can then be
    used as features for training predictive models (e.g., text classifiers).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: So SetFit is a framework for fine-tuning Sentence Transformers. But what does
    that mean?
  prefs: []
  type: TYPE_NORMAL
- en: In plain English, that means it can be used to create bespoke, fine-tuned embedding
    models using very small training datasets.
  prefs: []
  type: TYPE_NORMAL
- en: 'This happens through two phases:'
  prefs: []
  type: TYPE_NORMAL
- en: Fine-tuning the sentence transformers (with contrastive learning)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Training a classification head (e.g., logistic regression)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Image by author](../Images/b6736a745101d9f35c2d8b2724e992b6.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: What is contrastive learning, and why does it work so well on small, domain-specific
    datasets?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Most embedding models/sentence transformers are trained to embed text by looking
    at **co-occurence patterns** – they learn embeddings by looking at how often words
    appear near each other.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, in large training corpuses like Wikipedia, the words "tea" and
    "coffee" might frequently co-occur in the same sorts of articles, in the same
    sorts of sentences, near the same sorts of words:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by author. Screenshot of Wikipedia. And yes, we Brits really do call
    cafes "greasy spoons".](../Images/2b81be28bdbee294669655cac9224cb4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author. Screenshot of [Wikipedia](https://en.wikipedia.org/wiki/Cafe_(British)).
    And yes, we Brits really do call cafes "greasy spoons".
  prefs: []
  type: TYPE_NORMAL
- en: 'As a result, the embedding model learns to encode these co-occuring words with
    similar embeddings:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by author](../Images/ea7621af646ed52e08896cfdc6d0f65d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: These embeddings are really useful for general-purpose language models (it gives
    them the ability to recognise that *tea* and *coffee* fit in the same broad semantic
    space – i.e., they’re both hot drinks), but they’re not particularly useful in
    contexts where we need to build fine-grained classifiers that can recognise the
    *differences* between these classes.
  prefs: []
  type: TYPE_NORMAL
- en: In contrastive learning, **embedders are explicitly trained to generate task-specifi
    cembeddings which are great at distinguishing between different classes or categories**
    (in this case, tea vs coffee).
  prefs: []
  type: TYPE_NORMAL
- en: 'This happens in three stages:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Create pairs**: The SetFit algorithm starts by creating pairs of sentences.
    These pairs are labeled as either **positive** (if the sentences have the same
    label) or **negative** (if they have different labels):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Image by author](../Images/46bb3f9475c1f916a53fe0c28e6485b6.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: '**2\. Embed Sentences**: Each sentence is passed through a pre-trained sentence
    transformer to obtain embeddings (vector representations). These embeddings capture
    the semantic meaning of the sentences.'
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. Adjust the embeddings using contrastive Loss**: Using a loss function
    like cosine similarity loss or triplet margin loss (depending on the config you
    set), the model adjusts the embeddings so that:'
  prefs: []
  type: TYPE_NORMAL
- en: Embeddings of sentences in **positive pairs** are pulled closer together in
    the embedding space.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Embeddings of sentences in **negative pairs** are pushed farther apart.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: The embeddings of "I love drinking tea" and "The tea here is terrible" are adjusted
    to be closer, because they’re both about **tea** (i.e., they’re a "positive" pair).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The embeddings of "I love coffee" and "Tea is amazing" are adjusted to be farther
    apart, because they’re not about the same subject.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The net result is that the model actively learns to separate sentences from
    different classes in the vector space, ensuring that sentences from the same class
    are more similar, while sentences from different classes are less similar:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by author](../Images/067cafa918b72d8c17c6b1e2f6f84c90.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This maximises the "information" (in a mathematical sense) contained in the
    vectors and can help you build really powerful classifiers using very little training
    data.
  prefs: []
  type: TYPE_NORMAL
- en: 'A worked example: Classifying technical news articles'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s look at a real example to see how SetFit compares to other approaches.
    We’ll use a subset of the [20 newsgroups dataset](https://archive.ics.uci.edu/dataset/113/twenty+newsgroups)
    (CC BY 4.0 license), which is comprised of thousands of news article headlines
    and the corresponding category of each article.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll take a sample of 20 articles from each of the 5 closely-related (but
    distinct) computing categories: graphics, Microsoft Windows, IBM, Mac, and Windows
    X.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Our goal is to build a classifier that can identify, for a given technical
    article, the appropriate category. The semantic similarity of these categories
    makes this a tricky challenge: how will our classifiers do?'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, let’s `pip install` our required packages and import the required libraries:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Next, let’s prepare the data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![Image by author](../Images/7d3ebb6dbd8c5360d895456afc1c121e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Before these texts can be used to train a classifier, we need to embed them
    (i.e., we need to encode them as vectors).
  prefs: []
  type: TYPE_NORMAL
- en: 'Using SetFit, we can fine-tune an off-the-shelf Sentence Transformer so that
    it’s attuned to the specific nuances of our text, and then fit a logistic regression
    classification head:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: So, the SetFit-trained model achieved an accuracy of 63% with 20 samples per
    class. This climbed to 68% using 40 samples per class.
  prefs: []
  type: TYPE_NORMAL
- en: 'How does this compare to other approaches? Let’s look at TF-IDF:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: An accuracy of 38% – much lower.
  prefs: []
  type: TYPE_NORMAL
- en: 'RoBERTa models perform better, but only when using a *lot* more data. Take
    a look:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'When using the total set of 3,000 samples, the accuracy was 74%. But when running
    that code with just 20 samples per class (i.e., the same as SetFit and TF-IDF),
    the accuracy was only 4*7%.* This matches the findings of the [original authors](https://huggingface.co/blog/setfit)
    of SetFit:'
  prefs: []
  type: TYPE_NORMAL
- en: SetFit is significantly more sample efficient and robust to noise than standard
    fine-tuning.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In love SetFit. It’s a great and quick way to train performant classifiers in
    domains where you don’t have much training data, and I’d love to see more data
    scientists making use of it.
  prefs: []
  type: TYPE_NORMAL
- en: I hope you’ve found this thought-provoking. If you disagree with anything I’ve
    said, let’s chat! I’d love to hear your take.
  prefs: []
  type: TYPE_NORMAL
- en: Also, feel free to can connect with me on [LinkedIn](https://www.linkedin.com/in/matt-chapman-ba8488118/),
    or get my data science/AI writing in your inbox via [AI in Five](https://aiinfive.substack.com/)!
  prefs: []
  type: TYPE_NORMAL
- en: Until next time 🙂
  prefs: []
  type: TYPE_NORMAL
