- en: Context Engineering — A Comprehensive Hands-On Tutorial with DSPy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/context-engineering-a-comprehensive-hands-on-tutorial-with-dspy/](https://towardsdatascience.com/context-engineering-a-comprehensive-hands-on-tutorial-with-dspy/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1754438607464" class="mdspan-comment">You may have heard
    about</mdspan> **Context Engineering** by now. This article will cover the key
    ideas behind creating LLM applications using Context Engineering principles, visually
    explain these workflows, and share code snippets that apply these concepts practically.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t worry about copy-pasting the code from this article into your editor.
    **At the end of this article, I will share the GitHub link to the open-source
    code repository and a link to my 1-hour 20-minute YouTube course that explains
    the concepts presented here in greater detail.**
  prefs: []
  type: TYPE_NORMAL
- en: '*Unless otherwise mentioned, all images used in this article are produced by
    the author and are free to use.*'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What is Context Engineering?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There is a significant gap between writing simple prompts and building production-ready
    applications. Context Engineering is an umbrella term that refers to the delicate
    art and science of fitting information into the context window of an LLM as it
    works on a task.
  prefs: []
  type: TYPE_NORMAL
- en: 'The exact scope of where the definition of Context Engineering begins and ends
    is debatable, but according to [this tweet from Andrej Karpathy](https://x.com/karpathy/status/1937902205765607626),
    we can identify the following key points:'
  prefs: []
  type: TYPE_NORMAL
- en: It is not *just* atomic prompt engineering, where you ask one question to the
    LLM and get a response
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is a holistic approach that breaks up a larger problem into multiple subproblems
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These subproblems can be solved by multiple LLMs (or agents) in isolation. Each
    agent is provided with the appropriate context to carry out its task
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each agent can be of appropriate capability and size depending on the complexity
    of the task.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Intermediate steps that each agent can take to complete the task – the context
    is *not just* information we input – it also includes *intermediate tokens* that
    the LLMs see during generation (eg. reasoning steps, tool results, etc)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The agents are connected with control flows, and we orchestrate exactly how
    information flows through our system
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The information available to the agents can come from multiple sources – external
    databases with Retrieval-Augmented Generation (RAG), tool calls (like web search),
    memory systems, or classic few-shot examples.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agents can take actions while generating responses. Each action the agent can
    take should be well-defined so the LLM can interact with it through reasoning
    and acting.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Additionally, systems need to be evaluated with metrics and maintained with
    observability. Monitoring token usage, latency, and cost to output quality is
    a key consideration.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Important: How this article is structured'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*Throughout this article, I will be referring to the points above while providing
    examples of how they are applied in building real applications. Whenever I do
    so, I will use a block quote like this:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*It is a holistic approach that breaks up a larger problem into multiple subproblems*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*When you see a quote in this format, the example that follows will apply the
    quoted concept programmatically*.'
  prefs: []
  type: TYPE_NORMAL
- en: But before that, we must ask ourselves one question…
  prefs: []
  type: TYPE_NORMAL
- en: Why not pass *everything* into the LLM?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Research has shown that cramming every piece of information into the context
    of an LLM is far from ideal. Even though many frontier models do claim to support
    “long-context” windows, they still suffer from issues like *context poisoning*
    or *[context rot](https://research.trychroma.com/context-rot)*.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ca5a03f5d2ef79645d9ebaac3992af29.png)'
  prefs: []
  type: TYPE_IMG
- en: A recent report from Chroma describes how increasing tokens can negatively impact
    LLM performance
  prefs: []
  type: TYPE_NORMAL
- en: '(Source: Chroma)'
  prefs: []
  type: TYPE_NORMAL
- en: Too much unnecessary information in an LLM’s context can pollute the model’s
    understanding, lead to hallucinations, and result in poor performance.
  prefs: []
  type: TYPE_NORMAL
- en: This is why simply having a large context window isn’t enough. We need systematic
    approaches to context engineering.
  prefs: []
  type: TYPE_NORMAL
- en: Why DSPY
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/cbd7b2332fc4cffbcfc7f5421fdafdd2.png)'
  prefs: []
  type: TYPE_IMG
- en: Just a logo
  prefs: []
  type: TYPE_NORMAL
- en: For this tutorial, I have chosen the DSPy framework. I will explain the reasoning
    for this choice shortly, but let me assure you that the concepts presented here
    apply to almost any prompting framework, including writing prompts in pure English.
  prefs: []
  type: TYPE_NORMAL
- en: DSPy is a declarative framework for building modular AI software. They have
    neatly separated the two key aspects of any LLM task —
  prefs: []
  type: TYPE_NORMAL
- en: (a) the input and output contracts passed into a module,
  prefs: []
  type: TYPE_NORMAL
- en: and (b) the logic that governs how information flows.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Imagine we want to use an LLM to write a joke. Specifically, we want it to generate
    a setup, a punchline, and the full delivery in a comedian’s voice.
  prefs: []
  type: TYPE_NORMAL
- en: Oh, and we also want the output in JSON format so that we can post-process individual
    fields of the dictionary after generation. For example, perhaps we want to print
    the punchline on a T-shirt (assume someone has already written a convenient function
    for that).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Notice how we post-process the LLM’s response to extract the dictionary? What
    if something “bad” happened, like the LLM failing to generate the response in
    the desired format? Our entire code would fail and there will be no printing on
    any T-shirts!
  prefs: []
  type: TYPE_NORMAL
- en: The above code is also quite difficult to extend. For example, if we wanted
    the LLM to do chain of thought reasoning before generating the answer, we would
    need to write additional logic to parse that reasoning text correctly.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, it can be difficult to look at plain English prompts like these
    and understand what the inputs and outputs of these systems are. DSPy solves all
    of the above. Let’s write the above example using DSPy.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This approach gives you structured, predictable outputs that you can work with
    programmatically, eliminating the need for regex parsing or error-prone string
    manipulation.
  prefs: []
  type: TYPE_NORMAL
- en: Dspy Signatures explicitly makes you define what the inputs to the system are
    (“query” in the above example), and the outputs to the system (setup, punchline,
    and delivery) as well as their data-types. It also tells the LLM the order in
    which you want them to be generated.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/28721fab7e5d500161838979948c76c6.png)'
  prefs: []
  type: TYPE_IMG
- en: The output of the previous code block (minus the t-shirt stuff)
  prefs: []
  type: TYPE_NORMAL
- en: The `dspy.Predict` thing is an example of a DSPy Module. With modules, you define
    how the LLM converts from inputs to outputs. `dspy.Predict` is the most basic
    one – you can pass the query to it, as in `joke_gen(query="Write a joke about
    AI")` and it will create a basic prompt to send to the LLM. Internally, DSPy just
    creates a prompt as you can see below.
  prefs: []
  type: TYPE_NORMAL
- en: Once the LLM responds, DSPy will create Pydantic `BaseModel` objects that perform
    automatic schema validation and send back the output. If errors occur during this
    validation process, DSPy automatically attempts to fix them by re-prompting the
    LLM—thereby significantly reducing the risk of a program crash.
  prefs: []
  type: TYPE_NORMAL
- en: '![Dspy.Predict vs Dspy.ChainOfThought](../Images/4ed0ad62eaaad26e981875bb530ff81a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'In chain of thought, we ask the LLM to generate reasoning text before generating
    the answer (Source: Author)'
  prefs: []
  type: TYPE_NORMAL
- en: Another common theme in context engineering is Chain of Thought. Here, we want
    the LLM to generate reasoning text before providing its final answer. This allows
    the LLM’s context to be populated with its self-generated reasoning before it
    generates the final output tokens.
  prefs: []
  type: TYPE_NORMAL
- en: To do that, you can simply replace `dspy.Predict` with `dspy.ChainOfThought`
    in the example above. The rest of the code remains the same. Now you can see that
    the LLM generates reasoning before the defined output fields.
  prefs: []
  type: TYPE_NORMAL
- en: Multi-Step Interactions and Agentic Workflows
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The best part of DSPy’s approach is how it decouples system dependencies (`Signatures`)
    from control flows (`Modules`), which makes writing code for multi-step interactions
    trivial (and fun!). In this section, let’s see how we can build some simple agentic
    flows.
  prefs: []
  type: TYPE_NORMAL
- en: Sequential Processing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s remind ourselves about one of the key components of Context Engineering.
  prefs: []
  type: TYPE_NORMAL
- en: '*It is a holistic approach that breaks up a larger problem into multiple subproblems*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Let’s continue with our joke generation example. We can easily separate out
    two subproblems from it. Generating the idea is one, creating a joke is another.
  prefs: []
  type: TYPE_NORMAL
- en: '![Sequential flows](../Images/f4508601822dbbc8f4c80af273d4ffcb.png)'
  prefs: []
  type: TYPE_IMG
- en: Sequential flows allow us to design LLM systems in a modular way where each
    agent can be of appropriate strength/size and is given context and tools that
    are appropriate for its task (Illustrated by author)
  prefs: []
  type: TYPE_NORMAL
- en: Let’s have two agents then — the first Agent generates a joke idea (setup and
    punchline) from a query. A second agent then generates the joke from this idea.
  prefs: []
  type: TYPE_NORMAL
- en: '*Each agent can be of appropriate capability and size depending on the complexity
    of the task*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We are also running the first agent with `gpt-4.1-mini` and the second agent
    with the more powerful `gpt-4.1`.
  prefs: []
  type: TYPE_NORMAL
- en: Notice how we wrote our own `dspy.Module` called `JokeGenerator`. Here we use
    two separate dspy modules – the `query_to_idea` and the `idea_to_joke` to convert
    our original query to a `JokeIdea` and subsequently into a joke (as pictured above).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Iterative Refinement
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can also implement iterative improvement where the LLM reflects on and refines
    its outputs. For example, we can write a refinement module whose context is the
    output of a previous LM, and it must act as a feedback provider. The first LM
    can input this feedback and iteratively improve its response.
  prefs: []
  type: TYPE_NORMAL
- en: '![Iterative refinement](../Images/802b7d075d82d6ce774edbb43f451bcb.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of Iterative refinement. The Idea LM produces a “Setup”, “Contradiction”,
    and “Punchline” for a joke. The Joke LM generates a joke out of it. The Refinement
    LM provides feedback to the Joke LM to
  prefs: []
  type: TYPE_NORMAL
- en: 'iteratively improve the final joke. (Source: Author)'
  prefs: []
  type: TYPE_NORMAL
- en: Conditional Branching and Multi-Output Systems
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*The agents are connected with control flows, and we orchestrate exactly how
    information flows through our system*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Sometimes you want your agent to output multiple variations, and then select
    the best among them. Let’s look at an example of that.
  prefs: []
  type: TYPE_NORMAL
- en: Here we have first defined a joke judge – it inputs several joke ideas, and
    then picks the index of the best joke. This joke is then passed into the next
    section.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Tool Calling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'LLM applications often need to interact with external systems. This is where
    tool-calling steps in. You can imagine a tool to be any Python function. You just
    need two things to define a Python function as an LLM tool:'
  prefs: []
  type: TYPE_NORMAL
- en: A description of what the function does
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A list of inputs and their data types
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Tool Calling](../Images/b8e79d5a6c2c7bfe7eb1265d6bc2e950.png)'
  prefs: []
  type: TYPE_IMG
- en: 'An example of a tool: Web Search. Given a query, the LLM decides if a web search
    is necessary, generates a query for the web if so, and then incorporates its search
    results to generate the final answer (Illustration by Author)'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example of fetching news. We first write a simple Python function,
    where we use [Tavily](https://tavily.com/). The function inputs a search query
    and fetches recent news articles from the last 7 days.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Now let’s use`dspy.ReAct` (or the REasoning and ACTing). The module automatically
    reasons about the user’s query, decides when to call which tools, and incorporates
    the tool results into the final response. Doing this is pretty easy:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: When the above code runs, the LLM first reasons about what the user wants and
    which tool to call (if any). Then it generates the name of the function and the
    arguments to call the function.
  prefs: []
  type: TYPE_NORMAL
- en: We call the news function with the generated args, execute the function to generate
    the news data. This information is passed back into the LLM. The LLM makes a decision
    whether to call more tools, or “finish”. If the LLM reasons that it has enough
    information to answer the user’s original request, it chooses to finish, and generate
    the answer.
  prefs: []
  type: TYPE_NORMAL
- en: '*Agents can take actions while generating responses. Each action the agent
    can take should be well defined so the LLM can interact with it through reasoning
    and acting.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Advanced Tool Usage — Scratchpad and File I/O
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: An evolving standard for modern applications is to allow LLMs access to the
    file system, allowing them to read and write files, move between directories (with
    appropriate restrictions), grep and search text within files, and even run terminal
    commands!
  prefs: []
  type: TYPE_NORMAL
- en: This pattern opens a ton of possibilities. It transforms the LLM from a passive
    text generator into an active agent capable of performing complex, multi-step
    tasks directly within a user’s environment. For example, just displaying the list
    of tools available to Gemini CLI will reveal a short but incredibly powerful collection
    of tools.
  prefs: []
  type: TYPE_NORMAL
- en: '![Gemini CLI Tools](../Images/c402c84acfed4a5fe03a7b42a596c72e.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the default tools available via Gemini CLI
  prefs: []
  type: TYPE_NORMAL
- en: A quick word on MCP Servers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another new paradigm in the space of agentic systems are MCP servers. MCPs need
    their own dedicated article, so I won’t go over them in detail in this one.
  prefs: []
  type: TYPE_NORMAL
- en: This has quickly become the industry-standard way to serve specialized tools
    to LLMs. It follows the classic Client-Server architecture where the LLM (a client)
    sends a request to the MCP server, and the MCP server carries out the requested
    action, and returns a result back to the LLM for downstream processing. MCPs are
    perfect for context engineering specific examples since you can declare system
    prompt formats, resources, restricted database access, etc, to your application.
  prefs: []
  type: TYPE_NORMAL
- en: '[This repository has a great list of MCP servers](https://github.com/punkpeye/awesome-mcp-servers)
    that you can study to make your LLM applications connect with a wide variety of
    applications.'
  prefs: []
  type: TYPE_NORMAL
- en: Retrieval-Augmented Generation (RAG)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Retrieval Augmented Generation has become a cornerstone of modern AI application
    development. It is an architectural approach that injects external, relevant,
    and up-to-date information into the Large Language Models (LLMs) that is contextually
    relevant to the user’s query.
  prefs: []
  type: TYPE_NORMAL
- en: RAG pipelines consist of a preprocessing and an inference-time phase. During
    pre-processing, we process the reference data corpus and save it in a queryable
    format. In the inference phase, we process the user query, retrieve relevant documents
    from our database, and pass them into the LLM to generate a response.
  prefs: []
  type: TYPE_NORMAL
- en: '*The information available to the agents can come from multiple sources – external
    database with Retrieval-Augmented Generation (RAG), tool calls (like web search),
    memory systems, or classic few-shot examples.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Building RAGs is complicated, and there has been a lot of great research and
    engineering optimizations that have made life easier. I made a 17-minute video
    that covers all the aspects of building a reliable RAG pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: Some practical tips for Good RAG
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When preprocessing, generate additional metadata per chunk. This can be as simple
    as “questions this chunk answers”. When saving the chunks to your database, also
    save the generated metadata!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '**Query Rewriting:** Directly using the user’s query to do RAG retrieval is
    often a bad idea. Users write pretty random things, which may not match the distribution
    of text in your corpus. Query rewriting does what it says – it “rewrites” the
    query, perhaps fixing grammar, spelling errors, contextualizes it with past conversation,
    or even adds additional keywords that make querying easier.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: HYDE or **Hypothetical Document Embedding** is a type of Query Rewriting system.
    In HYDE, we generate an artificial (or hypothetical) answer from the LLM’s internal
    knowledge. This response often contains important keywords that try to directly
    match with the answers database. Vanilla query rewriting is great for searching
    a database of questions, and HYDE is great for searching a database with answers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Direct retrieval vs Query rewriting vs HYDE](../Images/a9f247c1af376ba92e83aa40366652a9.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Direct Retrieval vs Query Rewriting vs HYDE (Source: Author)'
  prefs: []
  type: TYPE_NORMAL
- en: Hybrid search is almost always better than purely semantic or purely keyword-based
    search. For semantic search, I’d use cosine similarity nearest neighbor search
    with vector embeddings. And for semantic search, use BM25\.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**RRF:** You can choose multiple strategies to retrieve documents, and then
    use reciprocal rank fusion to combine them into one unified list!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Multi-Hop Retrieval](../Images/96338cc8b29eea8e21ccc341919ac5c3.png)'
  prefs: []
  type: TYPE_IMG
- en: Multi-Hop Retrieval and Hybrid HyDE Search (Illustrated by Author)
  prefs: []
  type: TYPE_NORMAL
- en: '**Multi-Hop Search** is an option to consider as well if you can afford additional
    latency. Here, you pass the retrieved documents back into the LLM to generate
    new queries, which are used to conduct additional searches on the database.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '**Citations**: When asking LLM to generate responses from the retrieved documents,
    we can also ask the LLM to cite references to the documents it found useful. This
    allows the LLM to first generate a plan of how it’s going to use the retrieved
    content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Memory:** If you are building a chatbot, it is important to figure out the
    question of memory. You can imagine Memory as a combination of Retrieval and Tool
    Calling. A well-known system is the Mem0 system. The LLM observes new data and
    calls tools to decide if it needs to add or modify its existing memories. During
    question-answering, it retrieves relevant memories using RAG to generate answers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/5ff89776928490bd2e233c5f7889f388.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The Mem0 architecture (Source: [The Mem0 paper](https://arxiv.org/pdf/2504.19413))'
  prefs: []
  type: TYPE_NORMAL
- en: Best Practices and Production Considerations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section is not directly about Context Engineering, but more about best
    practices to build LLM apps for production.
  prefs: []
  type: TYPE_NORMAL
- en: '*Additionally, systems need to be evaluated with metrics and maintained with
    observability. Monitoring token usage, latency, and cost to output quality is
    a key consideration.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1\. Design Evaluation First
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before building features, decide how you’ll measure success. This helps scope
    your application and guides optimization decisions.
  prefs: []
  type: TYPE_NORMAL
- en: '![Hyperparameters impacting LLM outputs](../Images/04e0d1443b286ffaafd90be34325477c.png)'
  prefs: []
  type: TYPE_IMG
- en: A lot of parameters impact the quality of LLM’s outputs (Illustrated by the
    author)
  prefs: []
  type: TYPE_NORMAL
- en: 'If you can design verifiable or objective rewards, that’s the best. (example:
    classification tasks where you have a validation dataset)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'If not, can you define functions that heuristically evaluate LLM responses
    for your use case? (example: number of times a specific chunk is retrieved given
    a question)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If not, can you get humans to annotate your LLM’s responses?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If nothing works, use an LLM as a judge to evaluate responses. In most cases,
    you want to set your evaluation task as a comparison study, where the Judge receives
    multiple responses produced using different hyperparameters/prompts, and the judge
    must rank which ones are the best.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Evaluation of LLM apps](../Images/897ec424bb335f94721667a168de6627.png)'
  prefs: []
  type: TYPE_IMG
- en: A simple flowchart about evaluating LLM apps (Illustration by author)
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Use Structured Outputs Almost Everywhere
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Always prefer structured outputs over free-form text. It makes your system more
    reliable and easier to debug. You can add validation and retries as well!
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Design for failure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When designing prompts or dspy modules, make sure you always consider “what
    happens if things go wrong?”
  prefs: []
  type: TYPE_NORMAL
- en: Like any good software, cutting down error states and failing with swagger is
    the ideal scenario.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Monitor Everything
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'DSpy integrates with MLflow to track:'
  prefs: []
  type: TYPE_NORMAL
- en: Individual prompts passed into the LLM and their responses
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Token usage and costs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Latency per module
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Success/failure rates
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model performance over time
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Langfuse, Logfire are equally great alternatives.
  prefs: []
  type: TYPE_NORMAL
- en: Outro
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Context engineering represents a paradigm shift from simple prompt engineering
    to building comprehensive and modular LLM applications.
  prefs: []
  type: TYPE_NORMAL
- en: The DSPy framework provides the tools and abstractions needed to implement these
    patterns systematically. As LLM capabilities continue to evolve, context engineering
    will become increasingly crucial for building applications that effectively leverage
    the power of large language models.
  prefs: []
