- en: Meet Our New Authors
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'Explore top-notch work from some of our recently added contributors:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 探索我们最近添加的一些贡献者的顶级作品：
- en: '[Juan Carlos Suarez](https://towardsdatascience.com/author/juancarlos-suarez/) is
    a data and software engineer whose interests straddle machine learning, medical
    data analysis, and AI tools.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Juan Carlos Suarez](https://towardsdatascience.com/author/juancarlos-suarez/)
    是一位数据软件工程师，他的兴趣横跨机器学习、医疗数据分析以及AI工具。'
- en: '[Daphne de Klerk](https://towardsdatascience.com/author/daphne-deklerk/) shared
    an article on prompt bias (and how to prevent it), and joins our community with
    deep product- and project-management expertise.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Daphne de Klerk](https://towardsdatascience.com/author/daphne-deklerk/) 分享了一篇关于提示偏差（以及如何防止它）的文章，并凭借其深厚的产产品和项目管理专业知识加入我们的社区。'
- en: '[Tianyuan Zheng](https://towardsdatascience.com/author/tianyuan-zheng/), who
    recently completed a master’s in computational biology at Cambridge, wrote his
    debut article on how computers “see” molecules.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[田原正](https://towardsdatascience.com/author/tianyuan-zheng/)，最近在剑桥完成了计算生物学硕士学位，撰写了他的处女作，讲述了计算机如何“看到”分子。'
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们热爱发布新作者的文章，所以如果你最近写了一篇关于我们核心主题的有趣的项目演练、教程或理论反思，为什么不考虑 [与我们分享？](https://towardsdatascience.com/questions-96667b06af5/)
