- en: How to Design Machine Learning Experiments — the Right Way
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何正确设计机器学习实验
- en: 原文：[https://towardsdatascience.com/how-to-design-machine-learning-experiments-the-right-way/](https://towardsdatascience.com/how-to-design-machine-learning-experiments-the-right-way/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-design-machine-learning-experiments-the-right-way/](https://towardsdatascience.com/how-to-design-machine-learning-experiments-the-right-way/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过我们每周的精选编辑推荐、深度分析、社区新闻等内容的 *The Variable* 的新版。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[今天订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: It’s tempting to think that what separates a successful [machine learning](https://towardsdatascience.com/tag/machine-learning) project
    from a not-so-great one is a cutting-edge model, more computing power, or a few
    extra teammates.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易认为，将成功的 [机器学习](https://towardsdatascience.com/tag/machine-learning) 项目与不那么成功的项目区分开来的因素是前沿模型、更多的计算能力或几个额外的团队成员。
- en: In reality, throwing more resources at a poorly conceived problem rarely works—and
    in the rare instance where it does, you end up being stuck with an inefficient
    solution.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，将更多资源投入到一个构思不佳的问题中很少有效，而且即使在罕见的情况下有效，你最终也会陷入一个低效的解决方案。
- en: The articles we’re highlighting this week demonstrate, each in its own way,
    how important it is to ask the right questions, and to design experiments that
    stand a good chance to answer them (or to teach you valuable lessons when they
    don’t). Let’s dive in.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们本周重点介绍的文章展示了，以各自的方式，提出正确的问题以及设计有良好机会回答这些问题（或在你无法回答时提供宝贵教训）的实验是多么重要。让我们深入探讨。
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: How Do Grayscale Images Affect Visual Anomaly Detection?
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 灰度图像如何影响视觉异常检测？
- en: Focused, concise, and pragmatic, [Aimira Baitieva](https://towardsdatascience.com/author/aimira-baitieva/)‘s
    walkthrough tackles a common computer vision problem, and offers insights on experiment
    design that you can apply across a wide range of projects where speed and performance
    are crucial.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 专注、简洁、实用，[Aimira Baitieva](https://towardsdatascience.com/author/aimira-baitieva/)
    的教程解决了一个常见的计算机视觉问题，并提供了关于实验设计的见解，这些见解可以应用于需要速度和性能的广泛项目中。
- en: '[How Do Grayscale Images Affect Visual Anomaly Detection?](https://towardsdatascience.com/how-do-grayscale-images-affect-visual-anomaly-detection/)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[灰度图像如何影响视觉异常检测？](https://towardsdatascience.com/how-do-grayscale-images-affect-visual-anomaly-detection/)'
- en: A Well-Designed Experiment Can Teach You More Than a Time Machine!
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 精心设计的实验可以教会你比时间机器更多的东西！
- en: Using a “time-machine-based conceptual exercise,” Jarom Hulet sets out to show
    us the role experimentation can play in uncovering causal relations and making
    counterfactuals concrete.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 通过一个基于“时间机器”的概念练习，Jarom Hulet 试图向我们展示实验在揭示因果关系和使反事实具体化方面可以发挥的作用。
- en: '[A Well-Designed Experiment Can Teach You More Than a Time Machine!](https://towardsdatascience.com/a-well-designed-experiment-can-teach-you-more-than-a-time-machine/)'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[精心设计的实验可以教会你比时间机器更多的东西！](https://towardsdatascience.com/a-well-designed-experiment-can-teach-you-more-than-a-time-machine/)'
- en: 'When LLMs Try to Reason: Experiments in Text and Vision-Based Abstraction'
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当大型语言模型尝试推理：基于文本和视觉抽象的实验
- en: How far can language and image models go in learning abstract patterns from
    examples? Alessio Tamburro’s deep dive unpacks findings from a series of thought-provoking
    tests.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 语言和图像模型在从示例中学习抽象模式方面能走多远？Alessio Tamburro 的深入分析揭示了一系列引人深思的测试结果。
- en: '[When LLMs Try to Reason: Experiments in Text and Vision-Based Abstraction](https://towardsdatascience.com/when-llms-try-to-reason-experiments-in-text-and-vision-based-abstraction/)'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[当大型语言模型尝试推理：基于文本和视觉抽象的实验](https://towardsdatascience.com/when-llms-try-to-reason-experiments-in-text-and-vision-based-abstraction/)'
