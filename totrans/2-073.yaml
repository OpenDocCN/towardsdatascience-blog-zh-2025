    time to the client every second.
  prefs: []
  type: TYPE_NORMAL
- en: Create a file named app.py and type the following into it.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: I hope you agree that this code is straightforward.
  prefs: []
  type: TYPE_NORMAL
- en: We define an event_stream() function. This loop repeats endlessly, producing
    a string every second.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The yielded string is formatted according to the SSE spec: it must start with
    **data:** and end with two newlines (**\n\n**).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Our endpoint /stream-time returns a StreamingResponse, passing our generator
    to it and setting the media_type to text/event-stream. FastAPI handles the rest,
    keeping the connection open and sending each yielded chunk to the client.
