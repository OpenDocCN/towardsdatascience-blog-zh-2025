- en: FastSAM  for Image Segmentation Tasks — Explained Simply
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/fastsam-for-image-segmentation-tasks-explained-simply/](https://towardsdatascience.com/fastsam-for-image-segmentation-tasks-explained-simply/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**<mdspan datatext="el1753725858900" class="mdspan-comment">Image</mdspan>
    segmentation** is a popular task in computer vision, with the goal of partitioning
    an input image into multiple regions, where each region represents a separate
    object.'
  prefs: []
  type: TYPE_NORMAL
- en: Several classic approaches from the past involved taking a model backbone (e.g.,
    U-Net) and fine-tuning it on specialized datasets. While fine-tuning works well,
    the emergence of GPT-2 and GPT-3 prompted the machine learning community to gradually
    shift focus toward the development of zero-shot learning solutions.
  prefs: []
  type: TYPE_NORMAL
- en: '*Zero-shot learning refers to the ability of a model to perform a task without
    having explicitly received any training examples for it.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The zero-shot concept plays an important role by allowing the fine-tuning phase
    to be skipped, with the hope that the model is intelligent enough to solve any
    task on the go.
  prefs: []
  type: TYPE_NORMAL
- en: In the context of computer vision, Meta released the widely known general-purpose
    “[Segment Anything Model](https://arxiv.org/pdf/2304.02643)” (SAM) in 2023, which
    enabled segmentation tasks to be performed with decent quality in a zero-shot
    manner.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1cddf63be2190c20183355d2f3851769.png)'
  prefs: []
  type: TYPE_IMG
- en: The segmentation task aims to partition an image into multiple parts, with each
    part representing a single object.
  prefs: []
  type: TYPE_NORMAL
- en: While the large-scale results of SAM were impressive, several months later,
    the Chinese Academy of Sciences Image and Video Analysis (CASIA IVA) group released
    the FastSAM model. As the adjective “fast” suggests, FastSAM addresses the speed
    limitations of SAM by accelerating the inference process by up to 50 times, while
    maintaining high segmentation quality.
  prefs: []
  type: TYPE_NORMAL
- en: '*In this article, we will explore the FastSAM architecture, possible inference
    options, and examine what makes it “fast” compared to the standard SAM model.
    In addition, we will look at a code example to help solidify our understanding.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*As a prerequisite, it is highly recommended that you are familiar with the
    basics of computer vision, the YOLO model, and understand the goal of segmentation
    tasks.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The inference process in FastSAM takes place in two steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '**All-instance segmentation. **The goal is to produce segmentation masks for
    all objects in the image.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Prompt-guided selection. **After obtaining all possible masks, prompt-guided
    selection returns the image region corresponding to the input prompt.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/138b2634b985e86f4d9314f52ce5535a.png)'
  prefs: []
  type: TYPE_IMG
- en: FastSAM inference takes place in two steps. After the segmentation masks are
    obtained, prompt-guided selection is used to filter and merge them into the final
    mask.
  prefs: []
  type: TYPE_NORMAL
- en: Let us start with the all instance segmentation.
  prefs: []
  type: TYPE_NORMAL
- en: All instance segmentation
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Before visually examining the architecture, let us refer to the original paper:'
  prefs: []
  type: TYPE_NORMAL
- en: '***“FastSAM architecture is based on YOLOv8-seg — an object detector equipped
    with the instance segmentation branch, which utilizes the YOLACT method” — ***[***Fast
    Segment Anything paper***](https://arxiv.org/pdf/2306.12156)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The definition might seem complex for those who are not familiar with YOLOv8-seg
    and YOLACT. In any case, to better clarify the meaning behind these two models,
    I will provide a simple intuition about what they are and how they are used.
  prefs: []
  type: TYPE_NORMAL
- en: '**YOLACT (You Only Look at CoefficienTs)**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: YOLACT is a real-time instance segmentation convolutional model that focuses
    on high-speed detection, inspired by the YOLO model, and achieves performance
    comparable to the Mask R-CNN model.
  prefs: []
  type: TYPE_NORMAL
- en: 'YOLACT consists of two main modules (branches):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prototype branch. **YOLACT creates a set of segmentation masks called prototypes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Prediction branch. **YOLACT performs object detection by predicting bounding
    boxes and then estimates mask coefficients, which tell the model how to linearly
    combine the prototypes to create a final mask for each object.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/8119a13d2f81525968f15180ae1eee1a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'YOLACT architecture: yellow blocks indicate trainable parameters, while gray
    blocks indicate non-trainable parameters. Source: [YOLACT, Real-time Instance
    Segmentation](https://arxiv.org/pdf/1904.02689). The number of mask propotypes
    in the picture is k = 4\. Imade adapted by the author.'
  prefs: []
  type: TYPE_NORMAL
- en: To extract initial features from the image, YOLACT uses ResNet, followed by
    a Feature Pyramid Network (FPN) to obtain multi-scale features. Each of the P-levels
    (shown in the image) processes features of different sizes using convolutions
    (e.g., P3 contains the smallest features, while P7 captures higher-level image
    features). This approach helps YOLACT account for objects at various scales.
  prefs: []
  type: TYPE_NORMAL
- en: YOLOv8-seg
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'YOLOv8-seg is a model based on YOLACT and incorporates the same principles
    regarding prototypes. It also has two heads:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Detection head. **Used to predict bounding boxes and classes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Segmentation head. **Used to generate masks and combine them.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The key difference is that YOLOv8-seg uses a YOLO backbone architecture instead
    of the ResNet backbone and FPN used in YOLACT. This makes YOLOv8-seg lighter and
    faster during inference.
  prefs: []
  type: TYPE_NORMAL
- en: '*Both YOLACT and YOLOv8-seg use the default number of prototypes k = 32, which
    is a tunable hyperparameter. In most scenarios, this provides a good trade-off
    between speed and segmentation performance.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*In both models, for every detected object, a vector of size k = 32 is predicted,
    representing the weights for the mask prototypes. These weights are then used
    to linearly combine the prototypes to produce the final mask for the object.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: FastSAM architecture
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'FastSAM’s architecture is based on YOLOv8-seg but also incorporates an FPN,
    similar to YOLACT. It includes both detection and segmentation heads, with *k
    = 32* prototypes. However, since FastSAM performs segmentation of all possible
    objects in the image, its workflow differs from that of YOLOv8-seg and YOLACT:'
  prefs: []
  type: TYPE_NORMAL
- en: First, FastSAM performs segmentation by producing *k = 32* image masks.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These masks are then combined to produce the final segmentation mask.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: During post-processing, FastSAM extracts regions, computes bounding boxes, and
    performs instance segmentation for each object.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/06d5cc6f5cfc4d535776a15e7568e377.png)'
  prefs: []
  type: TYPE_IMG
- en: 'FastSAM architecture: yellow blocks indicate trainable parameters, while gray
    blocks indicate non-trainable parameters. Source: [Fast Segment Anything](https://arxiv.org/pdf/2306.12156).
    Image adapted by the author.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Note**'
  prefs: []
  type: TYPE_NORMAL
- en: Although the paper does not mention details about post-processing, it can be
    observed that the official FastSAM GitHub repository uses the method [***cv2.findContours()***](https://github.com/CASIA-IVA-Lab/FastSAM/blob/main/fastsam/prompt.py) from
    OpenCV in the prediction stage.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: In practice, there are several methods to extract instance masks from the final
    segmentation mask. Some examples include contour detection (used in FastSAM) and
    connected component analysis (***cv2.connectedComponents()***).
  prefs: []
  type: TYPE_NORMAL
- en: Training
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: FastSAM researchers used the same [SA-1B dataset](https://ai.meta.com/datasets/segment-anything/) as
    the SAM developers but trained the CNN detector on only 2% of the data. Despite
    this, the CNN detector achieves performance comparable to the original SAM, while
    requiring significantly fewer resources for segmentation. As a result, inference
    in FastSAM is up to 50 times faster!
  prefs: []
  type: TYPE_NORMAL
- en: For reference, SA-1B consists of 11 million diverse images and 1.1 billion high-quality
    segmentation masks.
  prefs: []
  type: TYPE_NORMAL
- en: '***What makes FastSAM faster than SAM?** SAM uses the Vision Transformer (ViT)
    architecture, which is known for its heavy computational requirements. In contrast,
    FastSAM performs segmentation using CNNs, which are much lighter.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Prompt guided selection**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The **“segment anything task”** involves producing a segmentation mask for a
    given prompt, which can be represented in different forms.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/365b5dafa532868c49dd8afa56b15842.png)'
  prefs: []
  type: TYPE_IMG
- en: Different types of prompts processed by FastSAM. Source: [Fast Segment Anything](https://arxiv.org/pdf/2306.12156).
    Image adapted by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Point prompt
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: After obtaining multiple prototypes for an image, a point prompt can be used
    to indicate that the object of interest is located (or not) in a specific area
    of the image. As a result, the specified point influences the coefficients for
    the prototype masks.
  prefs: []
  type: TYPE_NORMAL
- en: Similar to SAM, FastSAM allows selecting multiple points and specifying whether
    they belong to the foreground or background. If a foreground point corresponding
    to the object appears in multiple masks, background points can be used to filter
    out irrelevant masks.
  prefs: []
  type: TYPE_NORMAL
- en: However, if several masks still satisfy the point prompts after filtering, mask
    merging is applied to obtain the final mask for the object.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, the authors apply morphological operators to smooth the final
    mask shape and remove small artifacts and noise.
  prefs: []
  type: TYPE_NORMAL
- en: Box prompt
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The box prompt involves selecting the mask whose bounding box has the highest
    Intersection over Union (IoU) with the bounding box specified in the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Text prompt
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Similarly, for the text prompt, the mask that best corresponds to the text
    description is selected. To achieve this, the [CLIP model](https://towardsdatascience.com/clip-model-overview-unlocking-the-power-of-multimodal-ai/) is
    used:'
  prefs: []
  type: TYPE_NORMAL
- en: The embeddings for the text prompt and the k = 32 prototype masks are computed.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The similarities between the text embedding and the prototypes are then calculated.
    The prototype with the highest similarity is post-processed and returned.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/437a8170fd38fd6ef481216939debfc9.png)'
  prefs: []
  type: TYPE_IMG
- en: For the text prompt, the CLIP model is used to compute the text embedding of
    the prompt and the image embeddings of the mask prototypes. The similarities between
    the text embedding and the image embeddings are calculated, and the prototype
    corresponding to the image embedding with the highest similarity is selected.
  prefs: []
  type: TYPE_NORMAL
- en: '*In general, for most segmentation models, prompting is usually applied at
    the prototype level.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: FastSAM repository
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Here is the link to the [official repository of FastSAM](https://github.com/CASIA-IVA-Lab/FastSAM/tree/main),
    which includes a clear README.md file and documentation.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this article, we have looked at FastSAM — an improved version of SAM. Combining
    the best practices from YOLACT and YOLOv8-seg models, FastSAM maintains high segmentation
    quality while achieving a significant boost in prediction speed, accelerating
    inference by several dozen times compared to the original SAM.
  prefs: []
  type: TYPE_NORMAL
- en: The ability to use prompts with FastSAM provides a flexible way to retrieve
    segmentation masks for objects of interest. Furthermore, it has been shown that
    decoupling prompt-guided selection from all-instance segmentation reduces complexity.
  prefs: []
  type: TYPE_NORMAL
- en: 'Below are some examples of FastSAM usage with different prompts, visually demonstrating
    that it still retains the high segmentation quality of SAM:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dc90d19bbe14085304d3a7bf79c00011.png)'
  prefs: []
  type: TYPE_IMG
- en: Source: [Fast Segment Anything](https://arxiv.org/pdf/2306.12156)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9442bfa9f642c9212447ba722fade823.png)'
  prefs: []
  type: TYPE_IMG
- en: Source: [Fast Segment Anything](https://arxiv.org/pdf/2306.12156)
