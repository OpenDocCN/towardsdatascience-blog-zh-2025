- en: 'LLM Optimization: LoRA and QLoRA'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/llm-optimization-lora-and-qlora/](https://towardsdatascience.com/llm-optimization-lora-and-qlora/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1748630563997" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the appearance of ChatGPT, the world recognized the powerful potential
    of large language models, which can understand natural language and respond to
    user requests with high accuracy. In the abbreviation of LLM, the first letter **L**
    stands for **Large**, reflecting the massive number of parameters these models
    typically have.
  prefs: []
  type: TYPE_NORMAL
- en: Modern LLMs often contain over a billion parameters. Now, imagine a situation
    where we want to adapt an LLM to a downstream task. A common approach consists
    of **fine-tuning**, which involves adjusting the model’s existing weights on a
    new dataset. However, this process is extremely slow and resource-intensive — especially
    when run on a local machine with limited hardware.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2b35acac01d17cfcf279d6dac60ecc81.png)'
  prefs: []
  type: TYPE_IMG
- en: Number of parameters of some of the largest language models trained in recent
    years.
  prefs: []
  type: TYPE_NORMAL
- en: '*During fine-tuning, some neural network layers can be frozen to reduce training
    complexity, this approach still falls short at scale due to high computational
    costs.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To address this challenge, in this article we’ll explore the core principles
    of **LoRA (Low-Rank Adaptation)**, a popular technique for reducing the computational
    load during fine-tuning of large models. As a bonus, we’ll also take a look at
    QLoRA, which builds on LoRA by incorporating quantization to further enhance efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: Neural network representation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let us take a fully connected neural network. Each of its layers consists of *n* neurons
    fully connected to *m* neurons from the following layer. In total, there are *n *⋅ *m* connections
    that can be represented as a matrix with the respective dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/437c338225de1e7584c5eeae9f1e3b1b.png)'
  prefs: []
  type: TYPE_IMG
- en: An example showing a fully connected neural network layer whose weights can
    be represented in the matrix form.
  prefs: []
  type: TYPE_NORMAL
- en: When a new input is passed to a layer, all we have to do is to perform matrix
    multiplication between the weight matrix and the input vector. In practice, this
    operation is highly optimized using advanced linear algebra libraries and often
    performed on entire batches of inputs simultaneously to speed up computation.
  prefs: []
  type: TYPE_NORMAL
- en: Multiplication trick
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The weight matrix in a neural network can have extremely large dimensions. **Instead
    of storing and updating the full matrix, we can factorize it into the product
    of two smaller matrices**. Specifically, if a weight matrix has dimensions *n
    × m*, we can approximate it using two matrices of sizes *n × k* and *k × m*, where *k* is
    a much smaller intrinsic dimension (*k << n, m*).
  prefs: []
  type: TYPE_NORMAL
- en: 'For instance, suppose the original weight matrix is *8192 × 8192*, which corresponds
    to roughly *67M* parameters. If we choose *k = 8*, the factorized version will
    consist of two matrices: one of size *8192 × 8* and the other *8 × 8192*. Together,
    they contain only about *131K* parameters — more than 500 times fewer than the
    original, drastically reducing memory and compute requirements.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/20aa37839034f9917ceb7122284d4dbf.png)'
  prefs: []
  type: TYPE_IMG
- en: A large matrix can be approximately represented as a multiplication of two smaller
    matrices.
  prefs: []
  type: TYPE_NORMAL
- en: '**The obvious downside of using smaller matrices to approximate a larger one
    is the potential loss in precision**. When we multiply the smaller matrices to
    reconstruct the original, the resulting values will not exactly match the original
    matrix elements. This trade-off is the price we pay for significantly reducing
    memory and computational demands.'
  prefs: []
  type: TYPE_NORMAL
- en: '*However, even with a small value like k = 8, it is often possible to approximate
    the original matrix with minimal loss in accuracy. In fact, in practice, even
    values as low as k = 2 or k = 4 can be sometimes used effectively.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: LoRA
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The idea described in the previous section perfectly illustrates the core concept
    of LoRA. **LoRA** stands for **Low-Rank Adaptation**, where the term low-rank
    refers to the technique of **approximating a large weight matrix by factorizing
    it into the product of two smaller matrices with a much lower rank *k***. This
    approach significantly reduces the number of trainable parameters while preserving
    most of the model’s power.
  prefs: []
  type: TYPE_NORMAL
- en: Training
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let us assume we have an input vector ***x*** passed to a fully connected layer
    in a neural network, which before fine-tuning, is represented by a weight matrix ***W***.
    To compute the output vector ***y***, we simply multiply the matrix by the input: ***y
    = Wx***.
  prefs: []
  type: TYPE_NORMAL
- en: During fine-tuning, the goal is to adjust the model for a downstream task by
    modifying the weights. This can be expressed as learning an additional matrix ***ΔW***,
    such that: ***y = (W + ΔW)x = Wx + ΔWx***. As we saw the multiplication trick
    above, we can now replace ***ΔW*** by multiplication ***BA***, so we ultimately
    get: ***y = Wx + BAx***. As a result, we freeze the matrix ***W***and solve the
    optimization task to find matrices ***A*** and ***B*** that totally contain much
    less parameters than ***ΔW***!
  prefs: []
  type: TYPE_NORMAL
- en: However, direct calculation of multiplication ***(BA)x*** during each forward
    pass is very slow due to the the fact that matrix multiplication ***BA*** is a
    heavy operation. To avoid this, we can leverage associative property of matrix
    multiplication and rewrite the operation as ***B(Ax)***. The multiplication of ***A ***by ***x*** results
    in a vector that will be then multiplied by ***B*** which also ultimately produces
    a vector. This sequence of operations is much faster.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8e9a793b8ef7bba8ed865c164166989f.png)'
  prefs: []
  type: TYPE_IMG
- en: LoRA’s training process
  prefs: []
  type: TYPE_NORMAL
- en: 'In terms of backpropagation, LoRA also offers several benefits. Despite the
    fact that a gradient for a single neuron still takes nearly the same amount of
    operations, we now deal with much fewer parameters in our network, which means:'
  prefs: []
  type: TYPE_NORMAL
- en: we need to compute far fewer gradients for ***A*** and ***B*** than would originally
    have been required for ***W***.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: we no longer need to store a giant matrix of gradients for ***W***.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, to compute ***y***, we just need to add the already calculated ***Wx*** and ***BAx***.
    There are no difficulties here since matrix addition can be easily parallelized.
  prefs: []
  type: TYPE_NORMAL
- en: '*As a technical detail, before fine-tuning, matrix **A** is initialized using
    a Gaussian distribution, and matrix **B** is initialized with zeros. Using a zero
    matrix for **B** at the beginning ensures that the model behaves exactly as before,
    because **BAx = 0 · Ax = 0**, so **y** remains equivalent to **Wx**.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*This makes the initial phase of fine-tuning more stable. Then, during backpropagation,
    the model gradually adapts its weights for **A** and **B** to learn new knowledge.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: After training
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: After training, we have calculated the optimal matrices ***A*** and ***B***.
    All we have to do is multiply them to compute ***ΔW***, which we then add to the
    pretrained matrix ***W*** to obtain the final weights.
  prefs: []
  type: TYPE_NORMAL
- en: '*While the matrix multiplication **BA** might seem like a heavy operation,
    we only perform it once, so it should not concern us too much! Moreover, after
    the addition, we no longer need to store **A**, **B**, or **ΔW**.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Subtlety
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'While the idea of LoRA seems inspiring, a question might arise: during normal
    training of neural networks, why can’t we directly represent y as ***BAx*** instead
    of using a heavy matrix ***W*** to calculate **y = Wx**?'
  prefs: []
  type: TYPE_NORMAL
- en: The problem with just using ***BAx*** is that the model’s capacity would be
    much lower and likely insufficient for the model to learn effectively. During
    training, a model needs to learn massive amounts of information, so it naturally
    requires a large number of parameters.
  prefs: []
  type: TYPE_NORMAL
- en: In LoRA optimization, we treat ***Wx*** as the prior knowledge of the large
    model and interpret ***ΔWx = BAx*** as task-specific knowledge introduced during
    fine-tuning. So, we still cannot deny the importance of ***W*** in the model’s
    overall performance.
  prefs: []
  type: TYPE_NORMAL
- en: Adapter
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Studying LLM theory, it is important to mention the term “**adapter**” that
    appears in many LLM papers.
  prefs: []
  type: TYPE_NORMAL
- en: '*In the LoRA context, an **adapter** is a combination of matrices A and B that
    are used to solve a particular downstream task for a given matrix W.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'For example, let us suppose that we have trained a matrix ***W*** such that
    the model is able to understand natural language. We can then perform several
    independent LoRA optimizations to tune the model on different tasks. As a result,
    we obtain several pairs of matrices:'
  prefs: []
  type: TYPE_NORMAL
- en: '***(A₁, B₁)*** — adapter used to perform question-answering tasks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***(A***₂***, B***₂***)*** — adapter used for text summarization problems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***(A***₃***, B***₃***)*** — adapter trained for chatbot development.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/fdf99ff1dcdc986130ae0b5e52ce44b4.png)'
  prefs: []
  type: TYPE_IMG
- en: Developing a separate adapter for each downstream task is an efficient and scalable
    way to adapt a large, single model to different problems.
  prefs: []
  type: TYPE_NORMAL
- en: '*Given that, we can store a single matrix and have as many adapters as we want
    for different tasks! Since matrices A and B are tiny, they are very easy to store. *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Adapter ajustement in real time
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '***The great thing about adapters is that we can switch them dynamically***.
    Imagine a scenario where we need to develop a chatbot system that allows users
    to choose how the bot should respond based on a selected character, such as *Harry
    Potter*, an *angry bird*, or *Cristiano Ronaldo*.'
  prefs: []
  type: TYPE_NORMAL
- en: However, system constraints may prevent us from storing or fine-tuning three
    separate large models due to their large size. What is the solution?
  prefs: []
  type: TYPE_NORMAL
- en: This is where adapters come to the rescue! *All we need is a single large model
    W and three separate adapters, one for each character.*
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fb0352e8e3b21b016963164856c86788.png)'
  prefs: []
  type: TYPE_IMG
- en: A chatbot application in which a user can select the behavior of the bot based
    on its character. For each character, a separate adapter is used. When a user
    wants to change the character, it can be switched dynamically through matrix addition.
  prefs: []
  type: TYPE_NORMAL
- en: We keep in memory only matrix ***W*** and three matrix pairs: ***(A₁, B₁)***, ***(A₂,
    B₂)***, ***(A₃, B₃)***. Whenever a user chooses a new character for the bot, we
    just have to dynamically replace the adapter matrix by performing matrix addition
    between ***W***and ***(Aᵢ, Bᵢ)***. As a result, we get a system that scales extremely
    well if we need to add new characters in the future!
  prefs: []
  type: TYPE_NORMAL
- en: QLoRA
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: QLoRA is another popular term whose difference from LoRA is only in its first
    letter, **Q**, which stands for “**quantized**”. The term “**quantization**” refers
    to the reduced number of bits that are used to store weights of neurons.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, we can represent neural network weights as floats requiring 32
    bits for each individual weight. ***The idea of quantization consists of compressing
    neural network weights to a smaller precision without significant loss or impact
    on the model’s performance.*** So, instead of using 32 bits, we can drop several
    bits to use, for instance, only 16 bits.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/78e9c70d90c7246c66f052ca7d06c470.png)'
  prefs: []
  type: TYPE_IMG
- en: Simplified quantization example. Neural network weights are rounded to one decimal.
    In reality, the rounding depends on the number of quantized bits.
  prefs: []
  type: TYPE_NORMAL
- en: '*Speaking of QLoRA, quantization is used for the pretrained matrix W to reduce
    its weight size.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Bonus: prefix-tuning'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Prefix-tuning** is an interesting alternative to LoRA. *The idea also consists
    of using adapters for different downstream tasks but this time adapters are integrated
    inside the attention layer of the Transformer*.'
  prefs: []
  type: TYPE_NORMAL
- en: More specifically, during training, all model layers become frozen except for
    those that are added as prefixes to some of the embeddings calculated inside attention
    layers. In comparison to LoRA, prefix tuning does not change model representation,
    and in general, it has much fewer trainable parameters. As previously, to account
    for the prefix adapter, we need to perform addition, but this time with fewer
    elements.
  prefs: []
  type: TYPE_NORMAL
- en: '*Unless given very limited computational and memory constraints, LoRA adapters
    are still preferred in many cases, compared to prefix tuning.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this article, we have looked at advanced LLM concepts to understand how large
    models can be efficiently tuned without computational overhead. LoRA’s elegance
    in compressing the weight matrix through matrix decomposition not only allows
    models to train faster but also requires less memory space. Moreover, LoRA serves
    as an excellent example to demonstrate the idea of adapters that can be flexibly
    used and switched for downstream tasks.
  prefs: []
  type: TYPE_NORMAL
- en: On top of that, we can add a quantization process to further reduce memory space
    by decreasing the number of bits required to represent each neuron.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we explored another alternative called “prefix tuning”, which plays
    the same role as adapters but without changing the model representation.
  prefs: []
  type: TYPE_NORMAL
- en: Resources
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[LoRA: Low-Rank Adaptation of Large Language Models](https://arxiv.org/pdf/2106.09685)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[QLORA: Efficient Finetuning of Quantized LLMs](https://arxiv.org/pdf/2305.14314)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Prefix-Tuning: Optimizing Continuous Prompts for Generation](https://arxiv.org/pdf/2101.00190)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*All images are by the author unless noted otherwise.*'
  prefs: []
  type: TYPE_NORMAL
