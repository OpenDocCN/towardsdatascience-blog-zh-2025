- en: 'We hope you take the time to explore the excellent work from the latest cohort
    of TDS contributors:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望您花时间探索TDS最新一批贡献者的杰出作品：
- en: '[Kirill Кhrylchenko](https://towardsdatascience.com/author/kirill-hrylchenko/) introduces
    us to transformer-based recommender systems and explains how they can improve
    on traditional approaches.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Kirill Кhrylchenko](https://towardsdatascience.com/author/kirill-hrylchenko/)向我们介绍了基于transformer的推荐系统，并解释了它们如何改进传统方法。'
- en: '[Scaling Recommender Transformers to a Billion Parameters](https://towardsdatascience.com/scaling-recommender-transformers-to-a-billion-parameters/)'
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[将推荐Transformer扩展到十亿参数](https://towardsdatascience.com/scaling-recommender-transformers-to-a-billion-parameters/)'
- en: '[Yassin Zehar](https://towardsdatascience.com/author/yassin-zehar/) walks us
    through a project-management-focused workflow that leverages machine learning
    to predict delays.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Yassin Zehar](https://towardsdatascience.com/author/yassin-zehar/)带我们了解一个以项目管理为重点的工作流程，该工作流程利用机器学习来预测延误。'
- en: '[How I Used Machine Learning to Predict 41% of Project Delays Before They Happened](https://towardsdatascience.com/how-i-used-machine-learning-to-predict-41-of-project-delays-before-they-happened/)'
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
