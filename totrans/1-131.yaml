- en: It Doesn’t Need to Be a Chatbot
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 不必一定是聊天机器人
- en: 原文：[https://towardsdatascience.com/it-doesnt-need-to-be-a-chatbot/](https://towardsdatascience.com/it-doesnt-need-to-be-a-chatbot/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/it-doesnt-need-to-be-a-chatbot/](https://towardsdatascience.com/it-doesnt-need-to-be-a-chatbot/)
- en: <mdspan datatext="el1762218612903" class="mdspan-comment">The life of a chatbot</mdspan>
    usually starts the same way. In a leadership meeting, someone says: *“Let’s use
    AI!”* Heads nod, enthusiasm builds, and before you know it, the room lands on
    the default conclusion: *“Sure — we’ll build a chatbot.”* That instinct is understandable.
    Large language models are powerful, ubiquitous, and fascinating. They promise
    intuitive access to universal knowledge and functionality.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762218612903" class="mdspan-comment">聊天机器人的生活通常是这样开始的。在一次领导层会议上，有人说：“让我们使用人工智能！”大家点头，热情高涨，很快，房间里就达成了默认结论：“当然——我们将构建一个聊天机器人。”这种本能是可以理解的。大型语言模型强大、无处不在且令人着迷。它们承诺提供直观访问通用知识和功能。
- en: The team walks away and starts building. Soon, demo time comes around. A polished
    chat interface appears, accompanied by confident arguments about why this time,
    it will be different. At that point, however, it usually hasn’t reached real users
    in real situations, and evaluation is biased and optimistic. Someone in the audience
    inevitably comes up with a custom question, irritating the bot. The developers
    promise to fix “it”, but in most cases, the underlying issue is systemic.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 团队离开并开始构建。不久，演示时间到来。一个光鲜的聊天界面出现，伴随着自信的论点，为什么这次会不同。然而，在那个时刻，它通常还没有在真实情况下接触过真实用户，评估结果是有偏见的且过于乐观。观众中不可避免地有人提出一个定制问题，这让机器人感到烦恼。开发者承诺修复“它”，但在大多数情况下，根本问题是系统性的。
- en: 'Once the chatbot hits the ground, initial optimism is often matched by user
    frustration. Here, things get a bit personal because over the past weeks, I was
    forced to spend some time talking to different chatbots. I tend to delay interactions
    with service providers until the situation becomes unsustainable, and a couple
    of these cases had piled up. Smiling chatbot widgets became my last hope before
    an eternal hotline call, but:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦聊天机器人投入使用，最初的乐观情绪往往会被用户的挫败感所取代。在这里，事情变得有点个人化，因为过去几周，我被迫花了一些时间与不同的聊天机器人交谈。我倾向于推迟与服务提供商的互动，直到情况变得无法忍受，而其中几个案例已经堆积起来。微笑的聊天机器人小部件成了我在永恒的热线电话之前的最后希望，但：
- en: After logging in to my car insurer’s site, I asked to explain an unannounced
    price increase, only to realize the chatbot had no access to my pricing data.
    All it could offer was the hotline number. Ouch.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在登录我的汽车保险公司网站后，我要求解释未宣布的价格上涨，结果意识到聊天机器人无法访问我的定价数据。它所能提供的只有热线电话号码。哎。
- en: After a flight was canceled at the last minute, I asked the airline’s chatbot
    for the reason. It politely apologized that, since the departure time was already
    in the past, it couldn’t help me. It was open to discuss all other topics, though.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在航班最后一刻被取消后，我向航空公司的聊天机器人询问原因。它礼貌地道歉说，由于出发时间已经过去，它无法帮助我。尽管如此，它仍然愿意讨论其他所有话题。
- en: On a telco site, I asked why my mobile plan had suddenly expired. The chatbot
    confidently replied that it couldn’t comment on contractual matters and referred
    me to the FAQs. As expected, these were long but irrelevant.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在电信网站上，我询问为什么我的手机套餐突然失效。聊天机器人自信地回复说它无法对合同事项发表评论，并建议我查看常见问题解答。不出所料，这些解答很长但与问题无关。
- en: These interactions didn’t bring me closer to a solution and left me at the opposite
    end of delight. The chatbots felt like foreign bodies. Sitting there, they consumed
    real estate, latency, and attention, but didn’t add value.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这些互动并没有让我更接近解决方案，反而让我远离了愉悦。聊天机器人感觉像是异物。坐在那里，它们消耗了空间、延迟和注意力，但没有增加价值。
- en: Let’s skip the debate on whether these are intentional dark patterns. The fact
    is, legacy systems as the above carry a heavy burden of entropy. They come with
    tons of unique data, knowledge, and context. The moment you try to integrate them
    with a general-purpose LLM, you make two worlds clash. The model needs to ingest
    the context of your product so it can reason meaningfully about your domain. Proper
    context engineering requires skill and time for relentless evaluation and iteration.
    And before you even get to that point, your data needs to be ready, but in most
    organizations, data is noisy, fragmented, or just missing.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们跳过关于这些是否是故意的设计暗模式的争论。事实是，像上述这样的遗留系统承载着大量的熵。它们带有大量的独特数据、知识和背景。当你尝试将它们与通用LLM集成时，你使两个世界发生冲突。模型需要摄入你产品的背景，以便能够有意义地推理你的领域。适当的环境工程需要技能和时间，进行不懈的评价和迭代。在你甚至达到那个点之前，你的数据需要准备好，但在大多数组织中，数据是嘈杂的、碎片化的，或者根本缺失。
- en: In this post, I’ll recap insights from my book [The Art of AI Product Development](https://www.amazon.com/Art-AI-Product-Development-Delivering/dp/1633437051) and
    my recent talk at the [Google Web AI Summit](https://rsvp.withgoogle.com/events/web-ai-summit-2025/home) and
    share a more organic, incremental approach to integrating AI into existing products.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将回顾我从我的书《AI产品开发的艺术》（[The Art of AI Product Development](https://www.amazon.com/Art-AI-Product-Development-Delivering/dp/1633437051)）和我在[Google
    Web AI峰会](https://rsvp.withgoogle.com/events/web-ai-summit-2025/home)上的最近演讲中得到的见解，并分享一种更自然、渐进的方法来将AI集成到现有产品中。
- en: Using smaller models for low-risk, incremental AI integration
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用较小的模型进行低风险、渐进式AI集成
- en: '*“When implementing AI, I see more organizations fail by starting too big than
    starting too small.” ( *[*Andrew Ng*](https://hbr.org/podcast/2019/10/creating-an-ai-first-business-with-andrew-ng)*).*'
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“在实施AI时，我发现比从小规模开始更常见的是从大规模开始失败。”（[安德鲁·吴](https://hbr.org/podcast/2019/10/creating-an-ai-first-business-with-andrew-ng)）。*'
- en: 'AI integration needs time:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: AI集成需要时间：
- en: Your technical team needs to prepare the data and learn the available techniques
    and tools.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的技术团队需要准备数据，并学习可用的技术和工具。
- en: You need to prototype and iterate to find the sweet spots of AI value in your
    product and market.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要原型设计和迭代，以找到你产品和市场中的AI价值甜点。
- en: Users need to calibrate their trust when moving to new probabilistic experiences.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户在转向新的概率性体验时需要调整他们的信任度。
- en: To adapt to these learning curves, you shouldn’t rush to expose AI — especially
    open-ended chat functionality — to your users. AI introduces uncertainty and mistakes
    into the experience, which most people don’t like.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 为了适应这些学习曲线，你不应该急于将AI——特别是开放式的聊天功能——展示给你的用户。AI将不确定性和错误引入体验，而这大多数人都不喜欢。
- en: One effective way to pace your AI journey in the brownfield context is by using
    small language models (SLMs), which typically range from a few hundred million
    to a few billion parameters. They can integrate flexibly with your product’s existing
    data and infrastructure, rather than adding more technological overhead.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在棕色地带环境中，通过使用小语言模型（SLM）来调整你的AI旅程节奏是一种有效的方法，这些模型通常从几亿到几十亿参数不等。它们可以灵活地与你的产品现有数据和企业基础设施集成，而不是增加更多的技术负担。
- en: How SLMs are trained
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何训练SLM
- en: Most SLMs are derived from larger models through [knowledge distillation](https://arxiv.org/abs/1503.02531).
    In this setup, a large model acts as the teacher and a smaller one as the student.
    For example, Google’s Gemini served as the teacher for [Gemma 2](https://arxiv.org/abs/2408.00118) and [Gemma
    3](https://arxiv.org/abs/2503.19786) , while Meta’s Llama Behemoth trained its [herd
    of smaller Llama 4 models](https://ai.meta.com/blog/llama-4-multimodal-intelligence/).
    Just as a human teacher condenses years of study into clear explanations and structured
    lessons, the large model distills its vast parameter space into a smaller, denser
    representation that the student can absorb. The result is a compact model that
    retains much of the teacher’s competence but operates with far fewer parameters
    and dramatically lower computational cost.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数SLM是通过[knowledge distillation](https://arxiv.org/abs/1503.02531)从更大的模型派生出来的。在这个设置中，一个大型模型充当教师，而一个较小的模型充当学生。例如，Google的Gemini充当了[Gemma
    2](https://arxiv.org/abs/2408.00118)和[Gemma 3](https://arxiv.org/abs/2503.19786)的教师，而Meta的Llama
    Behemoth训练了它的[小型Llama 4模型群](https://ai.meta.com/blog/llama-4-multimodal-intelligence/)。正如人类教师将多年的学习浓缩成清晰的解释和结构化的课程一样，大型模型将其庞大的参数空间浓缩成学生可以吸收的较小、更密集的表示。结果是，一个紧凑的模型保留了教师的大部分能力，但操作时参数更少，计算成本大幅降低。
- en: '![](../Images/6f554cde47f7fd54c34c8a2708ca0ef6.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6f554cde47f7fd54c34c8a2708ca0ef6.png)'
- en: 'Figure 1: In knowledge distillation, the smaller student model soaks in the
    essential knowledge of a larger teacher model'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：在知识蒸馏中，较小的学生模型吸收了较大的教师模型的基本知识
- en: Using SLMs
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用SLMs
- en: 'One of the key advantages of SLMs is their deployment flexibility. Unlike LLMs
    that are mostly used through external APIs, smaller models can be run locally,
    either on your organization’s infrastructure or directly on the user’s device:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: SLMs的一个关键优势是它们的部署灵活性。与主要通过外部API使用的LLMs不同，较小的模型可以在本地运行，无论是在你组织的基础设施上还是在用户的设备上：
- en: '**Local deployment**: You can host SLMs on your own servers or within your
    cloud environment, keeping full control over data, latency, and compliance. This
    setup is ideal for enterprise applications where sensitive information or regulatory
    constraints make third-party APIs impractical.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**本地部署**：你可以在自己的服务器或云环境中托管SLMs，完全控制数据、延迟和合规性。这种设置非常适合企业应用，其中敏感信息或监管约束使得第三方API不切实际。'
- en: '**📈 Local deployment also offers you flexible fine-tuning opportunities** as
    you collect more data and need to respond to growing user expectations.'
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**📈 本地部署还为你提供了灵活的微调机会**，随着你收集更多数据并需要满足不断增长的用户期望。'
- en: '**On-device deployment via the browser**: Modern browsers have built-in AI
    capabilities that you can rely on. For instance, Chrome integrates Gemini Nano
    via the [built-in AI APIs](https://developer.chrome.com/docs/ai/built-in-apis),
    while Microsoft Edge includes Phi-4 (see [Prompt API documentation](https://learn.microsoft.com/en-us/microsoft-edge/web-platform/prompt-api)).
    Running models directly in the browser enables low-latency, privacy-preserving
    use cases such as smart text suggestions, form autofill, or contextual help.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过浏览器进行设备部署**：现代浏览器内置了你可以依赖的AI功能。例如，Chrome通过[built-in AI APIs](https://developer.chrome.com/docs/ai/built-in-apis)集成了Gemini
    Nano，而Microsoft Edge包括Phi-4（参见[Prompt API文档](https://learn.microsoft.com/en-us/microsoft-edge/web-platform/prompt-api)）。在浏览器中直接运行模型可以实现低延迟、保护隐私的使用案例，如智能文本建议、表单自动填充或上下文帮助。'
- en: 'If you would like to learn more about the technicalities of SLMs, here are
    a couple of useful resources:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解更多关于SLMs的技术细节，以下是一些有用的资源：
- en: 'Overview of SLMs and other types of language models: Lipenkova, Janna (2025). [*The
    Art of AI Product Development*](https://www.amazon.com/Art-AI-Product-Development-Delivering/dp/1633437051)*,* Chapter
    5: “Exploring and Evaluating Language Models.”'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SLMs和其他类型语言模型的概述：Lipenkova, Janna (2025). [*人工智能产品开发的艺术*](https://www.amazon.com/Art-AI-Product-Development-Delivering/dp/1633437051)*,*
    第5章：“探索和评估语言模型。”
- en: 'Comparison of modern SLMs: Lu, Zhenyan et al (2025). *Small Language Models:
    Survey, Measurements, and Insights*. Preprint available at [https://arxiv.org/pdf/2409.15790](https://arxiv.org/pdf/2409.15790?utm_source=chatgpt.com) [arXiv](https://arxiv.org/pdf/2409.15790)'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现代SLMs的比较：Lu, Zhenyan et al (2025). *小型语言模型：调查、测量和见解*。预印本可在[https://arxiv.org/pdf/2409.15790](https://arxiv.org/pdf/2409.15790?utm_source=chatgpt.com)
    [arXiv](https://arxiv.org/pdf/2409.15790)找到
- en: 'SLM deployment and fine-tuning: Iozzia, Guglielmo (2025). [*Domain-Specific
    Small Language Models*](https://hubs.ly/Q03P3pmc0)*.*'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SLM部署和微调：Iozzia, Guglielmo (2025). [*特定领域的小型语言模型*](https://hubs.ly/Q03P3pmc0)*.*
- en: Let’s now move on and see what you can build with SLMs to provide user value
    and make steady progress in your AI integration.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们继续看看你可以使用SLMs构建什么来提供用户价值，并在你的AI集成中稳步进步。
- en: Product opportunities for SLMs
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SLMs的产品机会
- en: SLMs shine in focused, well-defined tasks where the context and data are already
    known — the kinds of use cases that live deep inside existing products. You can
    think of them as specialized, embedded intelligence rather than general-purpose
    assistants. Let’s walk through the main buckets of opportunity they unlock in
    the brownfield, as illustrated in the following opportunity tree.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: SLMs在专注于、定义明确的任务中表现出色，其中上下文和数据已经已知——这些是存在于现有产品深处的用例。你可以把它们看作是专门的、嵌入式智能，而不是通用助手。让我们看看它们在以下机会树中解锁的主要机会类别。
- en: '![](../Images/dc437754b0cec68095572ce4196ee698.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dc437754b0cec68095572ce4196ee698.png)'
- en: 'Figure 2: Opportunity categories for SLM, with examples from the travel industry'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：SLM的机会类别，以旅游行业的示例
- en: 1\. Better product analytics
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 更好的产品分析
- en: 'Before exposing AI features to users, look for ways to improve your product
    from the inside. Most products already generate a continuous stream of unstructured
    text — support chats, help requests, in-app feedback. SLMs can analyze this data
    in real time and surface insights that inform both product decisions and immediate
    user experience. Here are some examples:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在向用户展示AI功能之前，寻找从内部改进您产品的途径。大多数产品已经生成了一连串的结构化文本——支持聊天、帮助请求、应用内反馈。SLMs可以实时分析这些数据，并揭示既影响产品决策又影响即时用户体验的见解。以下是一些例子：
- en: '**Tag and route support chats** as they happen, directing technical issues
    to the right teams.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时标记和路由聊天**，将技术问题引导到正确的团队。'
- en: '**Flag churn signals during a session**, prompting timely interventions.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在会话期间标记流失信号**，及时进行干预。'
- en: '**Suggest relevant content or actions** based on the user’s current context.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于用户当前上下文**建议相关内容或操作。'
- en: '**Detect repeated friction points** while the user is still in the flow, not
    weeks later in a retrospective.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在用户仍处于流程中时检测重复的摩擦点**，而不是在几周后的回顾中。'
- en: These internal enablers keep risk low while adding value and giving your team
    time to learn. They strengthen your data foundation and prepare you for more visible,
    user-facing AI features down the road.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这些内部促进因素在增加价值的同时降低了风险，并为您的团队提供了学习的时间。它们加强了您的数据基础，并为您未来更明显、面向用户的AI功能做好了准备。
- en: 2\. Remove friction
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 消除摩擦
- en: Next, take a step back and audit UX debt that’s already there. In the brownfield,
    most products aren’t exactly a designer’s dream. They were designed under the
    technical and architectural constraints of their time. With AI, we now have an
    opportunity to lift some of those constraints, reducing friction and creating
    faster, more intuitive experiences.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，退一步，审查已经存在的UX债务。在棕色地带，大多数产品并不完全是设计师的梦想。它们是在它们的时代的技术和架构限制下设计的。有了AI，我们现在有机会消除一些这些限制，减少摩擦，创造更快、更直观的体验。
- en: A good example is the smart filters on search-based websites like Booking.com.
    Traditionally, these pages use long lists of checkboxes and categories that try
    to cover every possible user preference. They’re cumbersome to design and use,
    and in the end, many users can’t find the setting that matters to them.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 一个很好的例子是像Booking.com这样的基于搜索的网站上的智能过滤器。传统上，这些页面使用长长的复选框列表和类别，试图涵盖所有可能的用户偏好。它们设计起来很繁琐，使用起来也很麻烦，最终，许多用户找不到对他们来说重要的设置。
- en: Language-based filtering changes this. Instead of navigating a complex taxonomy,
    users simply type what they want (for example “pet-friendly hotels near the beach”),
    and the model translates it into a structured query behind the scenes.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 基于语言的过滤改变了这一点。用户不需要导航复杂的分类法，他们只需输入他们想要的内容（例如“海滩附近的宠物友好酒店”），然后模型在幕后将其转换为结构化查询。
- en: '![](../Images/ab35dfb8e4dfed42b7232145833c9e99.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ab35dfb8e4dfed42b7232145833c9e99.png)'
- en: 'Figure 3: Smart, language-driven filters remove the cognitive load of long
    filter bars'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：智能、语言驱动的过滤器消除了长过滤栏的认知负担
- en: More broadly, look for areas in your product where users need to apply your
    internal logic — your categories, structures, or terminology — and replace that
    with natural language interaction. Whenever users can express intent directly,
    you remove a layer of cognitive friction and make the product smarter and friendlier.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 更广泛地说，寻找您的产品中用户需要应用您内部逻辑的领域——您的类别、结构或术语——并用自然语言交互来替换它。每当用户可以直接表达意图时，您就消除了认知摩擦，使产品更智能、更友好。
- en: 3\. Augment
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 增强
- en: With your user experience decluttered, it’s time to think about augmentation
    — adding small, useful AI capabilities to your product. Instead of reinventing
    the core experience, look at what users are already doing around your product
    — the side tasks, workarounds, or external tools they rely on to reach their goal.
    Can focused AI models help them do it faster or smarter?
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的用户体验简化之后，是时候考虑增强功能了——向您的产品中添加一些小而实用的AI能力。与其重新发明核心体验，不如看看用户在您的产品周围都在做什么——那些辅助任务、解决方案或外部工具，他们依赖这些来达成目标。专注的AI模型能否帮助他们更快或更智能地完成任务？
- en: For example, a travel app could integrate a contextual trip note generator that
    summarizes itinerary details or drafts messages for co-travelers. A productivity
    tool could include a meeting recap generator that summarizes discussions or action
    items from text notes, without sending data to the cloud.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个旅行应用可以集成一个上下文旅行笔记生成器，总结行程细节或为同行旅客草拟信息。一个生产力工具可以包括一个会议总结生成器，总结讨论或文本笔记中的行动项目，而不需要将数据发送到云端。
- en: These features grow organically from real user behavior and extend your product’s
    context instead of redefining it.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这些功能是从真实用户行为中自然生长出来的，并扩展了您产品的上下文，而不是重新定义它。
- en: 4\. Personalize
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 个性化
- en: 'Successful personalization is the holy grail of AI. It flips the traditional
    dynamic: instead of asking users to learn and adapt to your product, your product
    now adapts to them like a well-fitting glove.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 成功的个性化是AI的圣杯。它翻转了传统的动态：不再是让用户学习并适应您的产品，而是您的产品现在像一只合手的手套一样适应他们。
- en: When you start, keep ambition at bay — you don’t need a fully adaptive assistant.
    Rather, introduce small, low-risk adjustments in what users see, how information
    is phrased, or which options appear first. At the content level, AI can adapt
    tone and style, like using concise wording for experts and more explanatory phrasing
    for newcomers. At the experience level, it can create adaptive interfaces. For
    instance, a project-management tool could surface the most relevant actions (“create
    task,” “share update,” “generate summary”) based on the user’s past workflows.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 开始时，保持野心在可控范围内——您不需要一个完全自适应的助手。相反，在用户看到的内容、信息的措辞或首先出现的选项中引入小而低风险的调整。在内容层面，AI可以调整语气和风格，例如使用简洁的语言对专家，对新手使用更多解释性的措辞。在体验层面，它可以创建自适应界面。例如，一个项目管理工具可以根据用户的过去工作流程显示最相关的操作（“创建任务”、“分享更新”、“生成摘要”）。
- en: '*⚠️ ****When personalization goes wrong, it quickly erodes trust****. Users
    sense that they’ve traded personal data for an experience that doesn’t feel better.
    Thus, introduce personalization only once your data is ready to support it.*'
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*⚠️ ****当个性化出错时，它会迅速侵蚀信任****。用户感觉到他们用个人数据交换了一个感觉不到更好的体验。因此，只有当您的数据准备好支持它时，才引入个性化。*'
- en: Why “small” wins over time
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么“小”会随着时间的推移获胜
- en: Each successful AI feature — be it an analytics improvement, a frictionless
    UX touchpoint, or a personalized step in a larger flow — strengthens your data
    foundation and builds your team’s iteration muscle and AI literacy. It also lays
    the groundwork for larger, more complex applications later. When your “small”
    features work reliably, they become reusable components in bigger workflows or
    modular agent systems (cf. Nvidia’s paper [Small Language Models are the Future
    of Agentic AI](https://arxiv.org/abs/2506.02153)).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 每个成功的AI功能——无论是分析改进、无摩擦的UX触点，还是在更大流程中的个性化步骤——都加强了您的数据基础，并构建了您团队的迭代能力和AI素养。它也为以后更大、更复杂的应用奠定了基础。当您的“小”功能可靠地工作后，它们成为更大工作流程或模块化代理系统中的可重用组件（参见Nvidia的论文[Small
    Language Models are the Future of Agentic AI](https://arxiv.org/abs/2506.02153))。
- en: 'To summarize:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 总结如下：
- en: ✅ **Start small** — favor gradual improvement over disruption.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **从小处着手** — 倾向于渐进式改进而非破坏。
- en: ✅ **Experiment fast** — smaller models mean lower cost and faster feedback loops.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **快速实验** — 小型模型意味着更低成本和更快的反馈循环。
- en: ✅ **Be cautious** — start internally; introduce user-facing AI once you’ve validated
    it.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **谨慎行事** — 从内部开始；一旦验证了用户界面，再引入面向用户的AI。
- en: ✅ **Build your iteration muscle** — steady, compound progress beats headline
    projects.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **锻炼迭代能力** — 稳定的、复合的增长胜过头版项目。
