- en: 'Influential Time-Series Forecasting Papers of 2023-2024: Part 1'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2023-2024年有影响力的时间序列预测论文：第1部分
- en: 原文：[https://towardsdatascience.com/influential-time-series-forecasting-papers-of-2023-2024-part-1-1b3d2e10a5b3/](https://towardsdatascience.com/influential-time-series-forecasting-papers-of-2023-2024-part-1-1b3d2e10a5b3/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/influential-time-series-forecasting-papers-of-2023-2024-part-1-1b3d2e10a5b3/](https://towardsdatascience.com/influential-time-series-forecasting-papers-of-2023-2024-part-1-1b3d2e10a5b3/)
- en: '![Created with DALL3*3](../Images/5ea045650782aff25df92a9c0a531f50.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由DALL3*3创建](../Images/5ea045650782aff25df92a9c0a531f50.png)'
- en: Created with DALL3*3
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由DALL3*3创建
- en: '**Let’s kick off 2025 with a roundup of notable time-series forecasting papers.**'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**让我们以对2025年的知名时间序列预测论文的综述开始。**'
- en: I’ve also included some key papers from 2023 as well. 2024 was the year of foundation
    forecasting models – but I’ll cover those in a separate article.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我还包含了一些2023年的关键论文。2024年是基础预测模型的一年——但我将在另一篇文章中介绍这些。
- en: 'The papers I’ll cover are:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我将涵盖的论文包括：
- en: '**Deep Learning-Based Forecasting: A Case Study From the Online Fashion Industry**'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**基于深度学习的时间序列预测：来自在线时尚行业的案例研究**'
- en: '**Forecasting Reconciliation: A Review**'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**预测协调：综述**'
- en: '**TSMixer: An All-MLP Architecture for Time Series Forecasting**'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**TSMixer：用于时间序列预测的全MLP架构**'
- en: '**CARD: Channel Aligned Robust Blend Transformer for Time Series Forecasting**'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**CARD：用于时间序列预测的通道对齐鲁棒混合Transformer**'
- en: '**Long-Range Transformers for Dynamic Spatiotemporal Forecasting**'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**长程Transformer用于动态时空预测**'
- en: Let’s get started!
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: ✅ I’ve launched **[AI Horizon Forecast](https://aihorizonforecast.substack.com/),**
    a newsletter focusing on time-series and innovative AI research. Subscribe [here](https://aihorizonforecast.substack.com/welcome)
    to broaden your horizons!
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ✅ 我已启动**[AI Horizon Forecast](https://aihorizonforecast.substack.com/)**，这是一个专注于时间序列和创新的AI研究的通讯。在此[订阅](https://aihorizonforecast.substack.com/welcome)以拓宽您的视野！
- en: 'Deep Learning-Based Forecasting: A Case Study From the Online Fashion Industry'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于深度学习的时间序列预测：来自在线时尚行业的案例研究
- en: This paper is a gem.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇论文是一颗宝石。
- en: It made headlines initially because **Zalando**, a leading online fashion retailer,
    used a custom Transformer model to outperform SOTA forecasting models – including
    LGBM.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 它最初成为头条新闻，因为领先的在线时尚零售商Zalando使用定制的Transformer模型超越了SOTA预测模型——包括LGBM。
- en: But it’s more than that – this paper offers depth and is authored by brilliant
    researchers in the time series/ML ecosystem.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 但不仅如此——这篇论文提供了深度，并由时间序列/ML生态系统中杰出的研究人员撰写。
- en: Paper Insights Overview
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 论文洞察概述
- en: 'The paper describes Zalando’s in-depth retail forecasting pipeline and offers
    valuable insights:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 论文描述了Zalando的深入零售预测流程，并提供了有价值的见解：
- en: Challenges unique to online retail fashion forecasting.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网上零售时尚预测的独特挑战。
- en: How to handle sparsity, cold starts, and short history **(Figure 1).**
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何处理稀疏性、冷启动和短暂历史**（图1）。**
- en: What external covariates were used and how the Transformer is built to leverage
    them?
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用了哪些外部协变量以及Transformer是如何构建以利用它们的？
- en: How elegant tricks, with interesting explanations, improved the vanilla Transformer
    and tailored it to time-series forecasting.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优雅的技巧，有趣的解释如何改进了原始Transformer并将其定制为时间序列预测。
- en: Extensive details on the custom loss function, evaluation metrics, hyperparameters,
    and training configurations – rarely disclosed in many papers.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于自定义损失函数、评估指标、超参数和训练配置的详细内容——这在许多论文中很少公开。
- en: '![Figure 1: Three edge cases in Zalando''s dataset: Cold start, short history,
    and sparsity (Source [1])](../Images/497e981bfa895ba974ddf4ed059a68dd.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图1：Zalando数据集中的三个边缘情况：冷启动、短暂历史和稀疏性（来源[1]）](../Images/497e981bfa895ba974ddf4ed059a68dd.png)'
- en: '**Figure 1:** *Three edge cases in Zalando’s dataset: Cold start, short history,
    and sparsity (Source [1])*'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1**：*Zalando数据集中的三个边缘情况：冷启动、短暂历史和稀疏性（来源[1]*)*'
- en: 'The major contributions/key points of this paper are:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇论文的主要贡献/要点是：
- en: '**Covariate Handling**: Using discount as a dynamic covariate.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协变量处理**：使用折扣作为动态协变量。'
- en: '**Causal Relationship:** Enforcing a monotonic relationship between discount
    and demand via a piecewise linear function parameterized by feedforward networks.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**因果关系：通过前馈网络参数化的分段线性函数强制执行折扣和需求之间的单调关系。**'
- en: '**Two forecasting modes:** Training and predicting short- and long-term demand
    with a single global model.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**两种预测模式：使用单个全局模型训练和预测短期和长期需求。**'
- en: '**Scaling laws:** Demonstrating the first sparks of scaling laws in Transformer
    forecasting models.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缩放定律：证明了Transformer预测模型中缩放定律的第一缕火花。**'
- en: First, the authors explain how they configured the forecasting problem by translating
    the sales observations into demand forecasting. Demand planning is the most common
    case in retail forecasting.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，作者解释了他们如何通过将销售观察结果转换为需求预测来配置预测问题。需求规划是零售预测中最常见的案例。
- en: Also, the authors cleverly impute demand (e.g., it can happen when there’s a
    stock shortage) instead of marking it as missing.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，作者巧妙地估计需求（例如，当出现库存短缺时）而不是将其标记为缺失。
- en: '**Note:** **Demand Forecasting is the first and most important step in a supply
    forecasting pipeline**'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意**：**需求预测是供应链预测管道中的第一步且是最重要的步骤**'
- en: ''
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Demand** represents what customers want to buy, while **sales** are restricted
    by stock availability. **Forecasting demand is crucial, as it reflects true customer
    needs, unlike sales, which are supply-dependent.**'
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**需求**代表客户想要购买的东西，而**销售**受库存可用性的限制。**预测需求至关重要，因为它反映了真正的客户需求，与销售不同，销售是依赖于供应的。**'
- en: ''
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If sales drop to zero due to stock shortages, future forecasts based on sales
    will also reflect zero. This can mislead automated supply planning systems, leading
    to no new orders.
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果由于库存短缺导致销售额降至零，基于销售额的未来预测也将反映为零。这可能会误导自动供应链规划系统，导致没有新的订单。
- en: ''
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To ensure an efficient supply chain, always forecast demand instead of sales.
    Accurate demand forecasts prevent disruptions and maintain stock to meet customer
    needs.
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为了确保高效的供应链，始终预测需求而不是销售。准确的需求预测可以防止中断并保持库存以满足客户需求。
- en: Zalando’s Forecasting Pipeline
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Zalando 的预测管道
- en: 'The paper categorizes features into 4 types:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 论文将特征分为 4 类：
- en: '***static-global*:** time-independent & market-independent'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***静态-全球***：时间无关且市场无关'
- en: '***dynamic-global***: time-dependent & market-independent'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***动态-全球***：时间依赖且市场无关'
- en: '***dynamic-international*:** time-dependent & market-specific'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***动态-国际***：时间依赖且市场特定'
- en: '***static-international*:** time-independent & market-specific'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***静态-国际***：时间无关且市场特定'
- en: '![Table 1: Covariate types in Zalando''s forecasting pipeline (Source [1])](../Images/019d5d5568a7836f94e0db9478e6d87f.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![表 1：Zalando 预测管道中的协变量类型（来源 [1]）](../Images/019d5d5568a7836f94e0db9478e6d87f.png)'
- en: '***Table 1**: Covariate types in Zalando’s forecasting pipeline (Source [1])*'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '***表 1***：Zalando 预测管道中的协变量类型（来源 [1]）*'
- en: While all covariates enhance performance, discount is the most influential.
    Also, data has a weekly frequency.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然所有协变量都增强了性能，但折扣是最有影响力的。此外，数据具有每周频率。
- en: 'The Zalando team trained a global Transformer model with:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: Zalando 团队训练了一个全局 Transformer 模型，使用：
- en: '**Input:** A single tensor of dimension R𝑡×𝑢×𝑣, where 𝑡 is the time dimension,
    𝑢 the batch size and 𝑣 the dimension of the covariate vector.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输入**：一个维度为 R𝑡×𝑢×𝑣 的单个张量，其中 𝑡 是时间维度，𝑢 是批量大小，𝑣 是协变量向量的维度。'
- en: '**Output:** *near future* is 5 weeks and *far future* is __ 5 to 20 weeks.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输出**：*近期未来*是 5 周，*远期未来*是 __ 5 到 20 周。'
- en: The authors input details for different products, markets, and discount levels
    – and the output of the forecasting engine is a 𝑅𝑎×𝑐×𝑡×𝑑 tensor that spans over
    𝑡 = 26 future weeks, up to 𝑎 = 1 × 10⁶ products, 𝑐 = 14 countries and 𝑑 = 15 discount
    levels.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 作者输入了不同产品、市场和折扣级别的详细信息，预测引擎的输出是一个 𝑅𝑎×𝑐×𝑡×𝑑 张量，覆盖了 𝑡 = 26 个未来周，至 𝑎 = 1 × 10⁶
    个产品，𝑐 = 14 个国家和 𝑑 = 15 个折扣级别。
- en: '**Figure 2** describes the top-level view of the Transformer model:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 2** 描述了 Transformer 模型的顶层视图：'
- en: '![Figure 2: Top-level view of custom Transformer architecture (Source[1])](../Images/671f94a1a521fe7ce512d68af9521ac5.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图 2：自定义 Transformer 架构的顶层视图（来源[1]）](../Images/671f94a1a521fe7ce512d68af9521ac5.png)'
- en: '**Figure 2:** *Top-level view of custom Transformer architecture (Source[1])*'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 2**：*自定义 Transformer 架构的顶层视图（来源[1]*)*'
- en: 'The model uses an encoder-decoder structure with time-series-specific adaptations:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型使用了一个编码器-解码器结构，并针对时间序列进行了特定调整：
- en: '**Encoder**: Processes past observed covariates.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编码器**：处理过去观察到的协变量。'
- en: '**Decoder**: Handles future known inputs, generating short and long-term forecasts.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解码器**：处理未来已知的输入，生成短期和长期预测。'
- en: '**Non-autoregressive Decoder**: Produces forecasts in a multi-step manner.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非自回归解码器**：以多步方式产生预测。'
- en: '**Positional Embeddings**: They are not added to tokens as in the traditional
    Transformer – but as an extra covariate.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**位置嵌入**：它们不像传统 Transformer 那样添加到标记中，而是作为一个额外的协变量。'
- en: The key innovation was natively embedding the idea of a monotonic increase in
    demand with higher discounts into the model.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 关键创新是将需求单调递增和更高折扣的理念原生嵌入到模型中。
- en: This makes sense since the 2 values are positively correlated – but if this
    relationship is not imposed in the model, it won’t necessarily occur all the time.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这是有意义的，因为这两个值是正相关的一一但是，如果这种关系在模型中没有强制实施，它并不一定会始终发生。
- en: 'Future demand for a given discount is modeled via a piecewise linear, monotonic
    demand response function. This function is parameterized by 2 FFNs in the **Monotonic
    Demand Layer**. A **softplus transformation** ensures the demand function is monotonically
    increasing w.r.t. to discount:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 通过分段线性、单调的需求响应函数对给定折扣的未来需求进行建模。该函数由**单调需求层**中的 2 个 FFN 参数化。一个**softplus 变换**确保需求函数相对于折扣单调递增：
- en: '![Figure 3: Softplus activation function (Source)](../Images/f3afee9224f695facee9e676ae8f3ebb.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图 3：Softplus 激活函数（来源）](../Images/f3afee9224f695facee9e676ae8f3ebb.png)'
- en: '**Figure 3:** *Softplus activation function ([Source](https://pytorch.org/docs/stable/generated/torch.nn.Softplus.html))*'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 3**：*Softplus 激活函数 ([来源](https://pytorch.org/docs/stable/generated/torch.nn.Softplus.html))*'
- en: '![Figure 4: Demand as a piecewise linear monotonic demand response function
    (Source[1])](../Images/0e7958ee1726b402a25d3603a847bd92.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图 4：需求作为分段线性单调需求响应函数（来源[1]*)](../Images/0e7958ee1726b402a25d3603a847bd92.png)'
- en: '**Figure 4:** *Demand as a piecewise linear monotonic demand response function
    (Source[1])*'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 4**：*需求作为分段线性单调需求响应函数（来源[1]*)*'
- en: 'Finally, an important aspect of this paper was the **first spark of scaling
    laws in forecasting**. It was the first time a paper showed on a private, large,
    and diverse dataset that a Transformer-based forecasting model leveraged scale
    to deliver better performance:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这篇论文的一个重要方面是**预测中的规模定律的首次火花**。这是第一次有论文在一个私有、大型且多样化的数据集上展示了基于 Transformer
    的预测模型如何利用规模来提供更好的性能：
- en: '![Figure 5: Log-log plot of Zalando''s Transformer forecasting model vs simpler
    model, in terms of performance against training size (Source [1])](../Images/d509879df4d54cfa3d3682532026d75c.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图 5：Zalando 的 Transformer 预测模型与简单模型的对数-对数图，从训练规模的角度看性能（来源 [1]）](../Images/d509879df4d54cfa3d3682532026d75c.png)'
- en: '**Figure 5:** *Log-log plot of Zalando’s Transformer forecasting model vs simpler
    model, in terms of performance against training size (Source [1])*'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 5**：*Zalando 的 Transformer 预测模型与简单模型的对数-对数图，从训练规模的角度看性能（来源 [1]*)*'
- en: This work established a foundation for large-scale, time-series forecasting
    models.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这项工作为大规模、时间序列预测模型奠定了基础。
- en: In general, it’s a well-written paper with interesting details that we didn’t
    cover here – but we’ll discuss them in a future article. Stay tuned!
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，这是一篇写得很好的论文，其中包含一些我们在这里没有涵盖的有趣细节一一但我们将在未来的文章中讨论它们。请保持关注！
- en: 'Forecasting Reconciliation: A Review'
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预测协调：综述
- en: Hierarchical forecasting and reconciliation are among the most active areas
    in time-series research.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 层次预测和协调是时间序列研究中最活跃的领域之一。
- en: It all started with a research team at Monash University (which included the
    distinguished professor Rob Hyndman) publishing the iconic paper [Hyndman et al.,
    2011]. Of course, work on this area had started earlier.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这一切都始于莫纳什大学（其中包括杰出的教授 Rob Hyndman）的研究团队发表了标志性的论文 [Hyndman et al., 2011]。当然，这个领域的工作在此之前就已经开始了。
- en: Hierarchical forecasting reached the broader machine-learning community through
    the M5 forecasting competition.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 层次预测通过 M5 预测竞赛进入更广泛的机器学习社区。
- en: The paper [2] written by the same school of thought researchers is the **best
    resource** for tracking the latest forecasting reconciliation research.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 由同一学派的研究者撰写的论文 [2] 是追踪最新预测协调研究的最**佳资源**。
- en: Preliminaries on Forecasting Reconciliation
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测协调的预备知识
- en: Consider a hierarchical time series with multiple levels, such as product and
    store. Your task is to forecast for all levels.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个具有多个层级的层次时间序列，例如产品和商店。你的任务是预测所有层级。
- en: '![Figure 6: An overview of how the M5 time series levels are organized (Source)](../Images/41f9734fa6578b554c351eebb5139d15.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图 6：M5 时间序列层级组织概述（来源）](../Images/41f9734fa6578b554c351eebb5139d15.png)'
- en: '**Figure 6:** *An overview of how the M5 time series levels are organized ([Source)](https://github.com/Mcompetitions/M5-methods/blob/master/M5-Competitors-Guide.pdf)*'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 6**：*M5 时间序列层级组织概述 ([来源](https://github.com/Mcompetitions/M5-methods/blob/master/M5-Competitors-Guide.pdf))* '
- en: '**Naive approach:** We separately forecast sales for each product, store, and
    the total. However, the top-level forecasts won’t align with the sum of the lower
    levels, making them **incoherent**.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简单方法：** 我们分别预测每个产品、商店和总销售额。然而，顶级预测不会与底层总和相匹配，这使得它们**不一致**。'
- en: '**Bottom-up approach:** Here, forecasts start at the bottom level and aggregate
    upwards. This avoids information loss but isn’t optimal. Lower-level series are
    often noisy or sparse, causing errors to accumulate as you aggregate.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自下而上的方法：** 在这里，预测从底层开始，向上聚合。这避免了信息损失，但不是最优的。底层序列通常噪声或稀疏，导致在聚合过程中错误累积。'
- en: Other approaches, like top-down and middle-out, have similar challenges.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 其他方法，如自上而下和中间向外，也有类似的挑战。
- en: 'The best way is to establish a mathematical reconciliation method:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的方法是建立一个数学协调方法：
- en: Forecasting reconciliation is not a time-series model, but a **process** that
    ensures consistency across different levels of forecasts. Given base forecasts
    across all levels, this process optimally makes base forecasts coherent.
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 预测协调不是一个时间序列模型，而是一个确保不同层级预测之间一致性的**过程**。给定所有层级的基预测，此过程最优地使基预测一致。
- en: ''
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**✅ Note:** Some models generate coherent forecasts directly (see [2]).'
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**✅ 注意：** 一些模型可以直接生成一致的预测（见[2]）。'
- en: Why Use Forecasting Reconciliation?
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么使用预测协调？
- en: Tutorials often present forecasting reconciliation as a way to ensure forecasts
    make sense, avoiding questions from a manager like why the sum of product A and
    B sales doesn’t match the total estimate.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 教程通常将预测协调作为一种确保预测有意义的手段，避免经理提出为什么产品 A 和 B 的销售额总和与总估计值不匹配的问题。
- en: Ok, this is also true. But that’s not all.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，这也是真的。但不仅如此。
- en: '**Reconciliation often improves forecast accuracy in hierarchical datasets.**
    Here’s why:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**协调通常可以提高分层数据集中的预测准确性**。原因如下：'
- en: You can use the best model for each level.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以使用每个层级的最佳模型。
- en: For example, models at different levels can leverage distinct loss functions
    (e.g., Tweedie loss for non-negative, right-skewed lower-level data; Huber loss
    at the top levels for outlier-prone top levels).
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例如，不同层级的模型可以利用不同的损失函数（例如，Tweedie 损失用于非负、右偏斜的底层数据；Huber 损失用于容易出现异常值的顶层）。
- en: Once you’ve generated the base optimal forecasts at each level, you can select
    an appropriate reconciliation method from [2]. And just like that – boom! Your
    forecasts will not only be coherent but also likely more accurate overall!
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦在每个层级生成了基础最优预测，您可以从[2]中选择一个合适的协调方法。就这样——砰！您的预测不仅将是一致的，而且整体上可能更准确！
- en: Some Notation
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一些符号
- en: Let’s break down hierarchical forecasting.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解分层预测。
- en: Suppose we have 3 stores, each selling 2 products. This setup gives us 10 time
    series in total, with 6 at the bottom level.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有 3 家商店，每家商店销售 2 种产品。这种设置总共给我们 10 个时间序列，其中 6 个在底层。
- en: For instance, **yA,t** represents the sales of store A at time **t** and **yAA,t​**
    represents the sales of product **A**. The top-level **yt** aggregates **total**
    sales.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，**yA,t** 代表时间 **t** 时商店 A 的销售额，而 **yAA,t** 代表产品 **A** 的销售额。顶级 **yt** 聚合 **总销售额**。
- en: '![Figure 7: A 2-level hierarchical tree diagram. The bottom level contains
    6 time series, and we have 10 time series in total (Source [2])](../Images/558c262105e7c438f41d858c43d5637e.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图 7：一个 2 层级的分层树状图。底层包含 6 个时间序列，总共我们有 10 个时间序列（来源 [2]）](../Images/558c262105e7c438f41d858c43d5637e.png)'
- en: '**Figure 7:** *A 2-level hierarchical tree diagram. The bottom level contains
    6 time series, and we have 10 time series in total (Source [2])*'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 7：** *一个 2 层级的分层树状图。底层包含 6 个时间序列，总共我们有 10 个时间序列（来源 [2]）*'
- en: 'The equations which describe this graph are the following:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 描述此图的方程如下：
- en: '![](../Images/f283a1a5c41e25f628df048deee916af.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f283a1a5c41e25f628df048deee916af.png)'
- en: 'The equations describing this hierarchy are as follows:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 描述这一层级的方程如下：
- en: The vector **yt** represents the total sales, **S** is the matrix summing these
    observations, and **bt** is the vector of bottom-level observations/sales at time
    **t**.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 向量 **yt** 代表总销售额，**S** 是求和这些观察值的矩阵，而 **bt** 是时间 **t** 的底层观察/销售额向量。
- en: 'Let’s zoom into the values of the above equation:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨上述方程的值：
- en: '![](../Images/df332e53bba3b9fa9a86d813daf7e990.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/df332e53bba3b9fa9a86d813daf7e990.png)'
- en: Hence, the summing matrix **S** determines the hierarchical structure.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，求和矩阵 **S** 决定了分层结构。
- en: Bottom-Up Approach
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自下而上的方法
- en: Reconciliation aims to adjust incoherent base forecasts to make them coherent
    and as accurate as possible.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 协调的目的是调整不一致的基础预测，使其尽可能一致和准确。
- en: We achieve this using a **projection** (or **reconciliation**) matrix **G:**
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过使用一个 **投影**（或 **协调**）矩阵 **G** 来实现这一点：
- en: 'where:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: '**y_tilde**: reconciled forecasts at all levels'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**y_tilde**: 所有级别的协调预测'
- en: '**S**: summing matrix'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**S**: 求和矩阵'
- en: '**G**: projection matrix'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**G**: 投影矩阵'
- en: '**yhat:** base forecasts at all levels'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**yhat:** 所有级别的基预测'
- en: '**h:** horizon'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**h:** 预测范围'
- en: 'and in matrix format:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 并且以矩阵形式表示：
- en: '![](../Images/81dd15d7dcaec37c46280f90b6f2aa7c.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/81dd15d7dcaec37c46280f90b6f2aa7c.png)'
- en: Notice that in **G**, the first 4 columns zero out the base forecasts at the
    bottom level, and the other columns pick only the base forecasts of the bottom
    level.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到在 **G** 中，前四列在底层将基础预测清零，而其他列仅选择底层的基础预测。
- en: Advanced Reconciliation Methods
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高级协调方法
- en: The bottom-up approach is straightforward – it aggregates forecasts to ensure
    coherence.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 自下而上的方法很简单——它通过聚合预测来确保一致性。
- en: However, it’s not a native reconciliation method since forecasts are made coherent
    simply by aggregation.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并不是一个原生的协调方法，因为预测仅仅通过聚合就变得一致。
- en: That’s why the bottom-up approach has a simple projection matrix **G**, but
    in practice, we can devise a reconciliation method by solving for the matrix **G**.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，自下而上的方法有一个简单的投影矩阵 **G**，但在实践中，我们可以通过求解矩阵 **G** 来设计协调方法。
- en: The goal is to find the optimal G matrix according to equation 6 that gives
    the most accurate reconciled forecasts.
  id: totrans-126
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 目标是根据方程 6 寻找最优的 G 矩阵，以给出最准确的协调预测。
- en: 'The paper starts with the simple OLS equation for estimating G:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 论文从简单的 OLS 方程开始，用于估计 G：
- en: '[PRE0]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: And continues with the milestone paper [Wickramasuriya et al. (2019)](https://robjhyndman.com/papers/MinT.pdf)
    which introduces the *MinTrace (MinT)* method that minimizes the sum of variances
    of the reconciled forecast errors.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 并且继续介绍里程碑论文 [Wickramasuriya 等人 (2019)](https://robjhyndman.com/papers/MinT.pdf)，该论文介绍了
    *MinTrace (MinT)* 方法，该方法最小化了协调预测误差的方差总和。
- en: 'The matrix G is then computed as:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 然后矩阵 G 被计算为：
- en: '[PRE1]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: where **Wh** is the variance-covariance matrix of base forecast errors.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 **Wh** 是基预测误差的方差-协方差矩阵。
- en: We won’t go into further details here, feel free to read the original paper[2].
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里不会进一步详细介绍，请自由阅读原始论文[2]。
- en: Key Challenges and Tools
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键挑战和工具
- en: The authors discuss additional reconciliation approaches and how these can be
    enhanced with probabilistic forecasting or accelerated using sparse methods. However,
    reconciliation methods can be memory-intensive, especially with datasets containing
    hundreds of time series.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 作者讨论了额外的协调方法以及如何通过概率预测或使用稀疏方法来增强这些方法。然而，协调方法可能非常消耗内存，特别是对于包含数百个时间序列的数据集。
- en: They also cover domain-specific applications of hierarchical forecasting and
    review software tools and libraries for implementation.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 它们还涵盖了分层预测的特定领域应用，并回顾了实现这些应用的软件工具和库。
- en: 'The paper is detailed and well-written but assumes some familiarity with the
    field. For beginners, I recommend Rob Hyndman’s and George Athanasopoulos’s [Forecasting:
    Principles and Practice](https://otexts.com/fpp3/) book which has a chapter dedicated
    to hierarchical forecasting.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 论文内容详实，文笔流畅，但假设读者对领域有一定了解。对于初学者，我推荐 Rob Hyndman 和 George Athanasopoulos 的 [预测：原理与实践](https://otexts.com/fpp3/)
    一书，其中有一章专门介绍分层预测。
- en: 'TSMixer: An All-MLP Architecture for Time Series Forecasting'
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TSMixer：用于时间序列预测的全 MLP 架构
- en: Boosted Trees excels at forecasting tabular-like time series data with multiple
    covariates.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: Boosted Trees 在预测具有多个协变量的表格型时间序列数据方面表现出色。
- en: However, deep learning models have struggled to leverage their architectures
    effectively on complex datasets due to overfitting issues.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于过拟合问题，深度学习模型在复杂数据集上有效利用其架构方面遇到了困难。
- en: Google researchers addressed this by developing **TSMixer**, a lightweight MLP-based
    model, and its enhanced variant, **TSMixer-Ext**, which accommodates exogenous
    and future-known variables. TSMixer-Ext delivered a remarkable performance in
    Walmart’s M5 competition, surpassing established SOTA models.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: Google 研究人员通过开发 **TSMixer**，一个基于 MLP 的轻量级模型及其增强版本 **TSMixer-Ext** 来解决这个问题，后者可以容纳外生和已知未来的变量。TSMixer-Ext
    在 Walmart 的 M5 竞赛中表现出色，超越了现有的 SOTA 模型。
- en: TSMixer stands out for its double-mixing operation, utilizing cross-variate
    information across both the time domain (time-mixing layer) and feature domain
    (feature-mixing layer).
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: TSMixer因其双重混合操作而突出，它在时间域（时间混合层）和特征域（特征混合层）之间利用交叉变量信息。
- en: '![Figure 8: Top-level view of TSMixer, featuring Time-Mixing and Feature-Mixing
    MLPs arranged in N blocks. (Source [3])](../Images/bcacb74d9679518a261aa3cc3baf83a1.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![图8：TSMixer的顶层视图，包括按N块排列的时间混合和特征混合MLPs。（来源[3]）](../Images/bcacb74d9679518a261aa3cc3baf83a1.png)'
- en: '**Figure 8:** *Top-level view of TSMixer, featuring Time-Mixing and Feature-Mixing
    MLPs arranged in N blocks. (Source [3])*'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '**图8**：*TSMixer的顶层视图，包括按N块排列的时间混合和特征混合MLPs。（来源[3]）*'
- en: We covered TSMixer and TSMixer-Ext in detail in the article [here](https://medium.com/towards-data-science/tsmixer-googles-innovative-deep-learning-forecasting-model-4c3ab1c80a23)
    – check it out for more insights!
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在文章[这里](https://medium.com/towards-data-science/tsmixer-googles-innovative-deep-learning-forecasting-model-4c3ab1c80a23)详细介绍了TSMixer和TSMixer-Ext——查看它以获取更多见解！
- en: Find a hands-on tutorial on TSMixer in the **[AI Projects folder](https://aihorizonforecast.substack.com/p/ai-projects)**
    (Project 8)
  id: totrans-146
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在**[AI Projects文件夹](https://aihorizonforecast.substack.com/p/ai-projects)**（项目8）中找到一个关于TSMixer的动手教程
- en: '![Figure 9: TSMixer''s rolling-forward forecasts on the ETTm2 dataset with
    prediction length = 48 (Image by author, Source)](../Images/fadbb70263b3edd74e06b52e7a8473d9.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![图9：TSMixer在ETTm2数据集上的滚动预测，预测长度=48（图片由作者提供，来源）](../Images/fadbb70263b3edd74e06b52e7a8473d9.png)'
- en: '**Figure 9:** *TSMixer’s rolling-forward forecasts on the ETTm2 dataset with
    prediction length = 48* (Image by author, [Source](https://aihorizonforecast.substack.com/p/ai-projects))'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '**图9**：*TSMixer在ETTm2数据集上的滚动预测，预测长度=48*（图片由作者提供，[来源](https://aihorizonforecast.substack.com/p/ai-projects)）'
- en: 'CARD: Channel Aligned Robust Blend Transformer for Time Series Forecasting
    (ICLR 2024)'
  id: totrans-149
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CARD：用于时间序列预测的通道对齐鲁棒混合Transformer（ICLR 2024）
- en: The release of the DLinear and TSMixer papers exposed weaknesses in Transformer-based
    forecasting models.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: DLinear和TSMixer论文的发布揭示了基于Transformer的预测模型中的弱点。
- en: In multivariate setups (where models learn cross-variate dependencies across
    all time series and predict them jointly), Transformers often overfit.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在多元设置（其中模型学习所有时间序列之间的交叉变量依赖关系并联合预测它们）中，Transformer经常过拟合。
- en: The quadratic self-attention mechanism tended to capture noise, limiting performance
    – especially on smaller or toy datasets. As a result, newer attention-based approaches
    shifted to univariate training, yielding impressive results.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 二次自注意力机制倾向于捕捉噪声，限制了性能——尤其是在较小或玩具数据集上。因此，新的基于注意力的方法转向单变量训练，取得了令人印象深刻的结果。
- en: CARD revisits the multivariate scenario, aiming for SOTA results by redesigning
    attention mechanisms for time series.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: CARD重新审视了多元场景，通过重新设计时间序列的注意力机制，旨在实现SOTA（最先进的技术）结果。
- en: Dual Channel Attention
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 双通道注意力
- en: 'Earlier, we saw how TSMixer uses a double MLP mixing operation across time
    and feature dimensions. Similarly, CARD applies attention across both token (time)
    and channel (feature) dimensions:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 之前，我们看到了TSMixer如何在时间和特征维度上使用双重MLP混合操作。同样，CARD在标记（时间）和通道（特征）维度上应用注意力：
- en: '![Figure 10: Top-level view of CARD''s architecture (Source [4])](../Images/5e51ea95902f8428ba8a8f6cdabf2ac8.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图10：CARD架构的顶层视图（来源[4]）](../Images/5e51ea95902f8428ba8a8f6cdabf2ac8.png)'
- en: '**Figure 10:** *Top-level view of CARD’s architecture (Source [4])*'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '**图10**：*CARD架构的顶层视图（来源[4]）*'
- en: '**Figure 10** is very similar to TSMixer’s architecture in **Figure 8**. The
    authors sparsify attention further with summary tokens, exponential smoothing,
    and extra projections. These additions reduce complexity (**Figure 11**), helping
    the model distill meaningful information.'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '**图10**与**图8**中的TSMixer架构非常相似。作者通过摘要标记、指数平滑和额外投影进一步稀疏化注意力。这些添加减少了复杂性（**图11**），有助于模型提炼有意义的信息。'
- en: '![Figure 11: Operations inside CARD''s attention block (Source [4])](../Images/9e5a2ca80fb9ca80bdf5fc2874a9333b.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![图11：CARD注意力块内的操作（来源[4]）](../Images/9e5a2ca80fb9ca80bdf5fc2874a9333b.png)'
- en: '**Figure 11:** *Operations inside CARD’s attention block (Source [4])*'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '**图11**：*CARD注意力块内的操作（来源[4]）*'
- en: '**Note**: CARD partitions signals into patches, meaning tokenization occurs
    at the patch level.'
  id: totrans-161
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意**：CARD将信号划分为补丁，这意味着标记化发生在补丁级别。'
- en: ''
  id: totrans-162
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Patching benefits attention-based models because point-wise tokenization lacks
    semantic richness, while patches better capture a sequence’s characteris*tics.*
  id: totrans-163
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 修补对基于注意力的模型有益，因为点状标记缺乏语义丰富性，而补丁更好地捕捉序列的特征。
- en: Token Blend Module
  id: totrans-164
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 标记混合模块
- en: 'In Transformer forecasting, each attention head focuses on specific aspects
    of the data or feature patterns in the input sequence. For example:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 在Transformer预测中，每个注意力头专注于输入序列中的特定数据方面或特征模式。例如：
- en: One head might focus on **short-term dependencies** (e.g., relationships between
    nearby time steps).
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个注意力头可能专注于**短期依赖关系**（例如，相邻时间步之间的关系）。
- en: Another might capture **periodic behavior** (e.g., weekly or seasonal cycles).
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一种可能捕捉**周期性行为**（例如，每周或季节性循环）。
- en: 'Thus, within a single attention head:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在单个注意力头内部：
- en: Tokens encode related information about the input sequence, filtered through
    the head’s particular "lens" or learned feature pattern.
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标记编码了关于输入序列的相关信息，通过头部的特定“透镜”或学习到的特征模式进行过滤。
- en: Tokens adjacent to each other correspond to **neighboring time steps** in the
    sequence and share temporal proximity.
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相邻的标记对应于序列中的**相邻时间步**，并共享时间邻近性。
- en: 'In vanilla attention, tokens merge across heads. The proposed **token blend
    module**(**Figure 12**) modifies this by merging adjacent tokens within the same
    head after multi-head attention, creating tokens for the next stage:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的注意力中，标记在头部之间合并。所提出的**标记混合模块**（**图12**）通过在多注意力头注意力之后合并同一头部的相邻标记来修改这一点，为下一阶段创建标记：
- en: '![Figure 12: Example of token blend block in CARD (Source [4])](../Images/0a06fd02f5dd475f81000f186d67ca10.png)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![图12：CARD中的标记混合块示例（来源[4]）](../Images/0a06fd02f5dd475f81000f186d67ca10.png)'
- en: '**Figure 12:** *Example of token blend block in CARD (Source [4])*'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '**图12**：*CARD中的标记混合块示例（来源[4]*)*'
- en: Since each attention head specializes in specific features (e.g., trends or
    periodic patterns), merging tokens within the same head retains this focus while
    expanding the temporal scope.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 由于每个注意力头都专门处理特定的特征（例如，趋势或周期性模式），在同一头部的标记合并保留了这种关注点，同时扩展了时间范围。
- en: Signal Decay-Based Loss Function
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于信号衰减的损失函数
- en: The authors note that errors are higher at the far future end of the horizon.
    Near-future predictions contribute more to generalization improvements than far-future
    ones.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 作者指出，在预测时间范围的远端，错误率更高。近期的预测比远期的预测对泛化改进的贡献更大。
- en: 'To address this, they use a **decay-based loss function** – a MAE-based variant
    that weights near-future predictions more:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，他们使用了一种基于**衰减损失函数**——一个基于MAE的变体，它更重视近期的预测：
- en: 'where:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: '**a_t(A)** are the observations at time t, given historical information **A**'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**a_t(A**)是时间t的观察值，给定历史信息**A**'
- en: '**ahat_t** are the predictions at time t, given historical information **A**'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ahat_t**是时间t的预测值，给定历史信息**A**'
- en: '**L** is the sequence length'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**L**是序列长度'
- en: Hence, this loss emphasizes near-future accuracy more.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这种损失函数更强调近期的准确性。
- en: In general, CARD is an impressive model. Unfortunately, it hasn’t been integrated
    into any known forecasting library, but the authors have open-sourced it. I’ll
    definitely create a tutorial on this model in future articles.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，CARD是一个令人印象深刻的模型。不幸的是，它还没有被集成到任何已知的预测库中，但作者已经开源了它。我肯定会在这未来的文章中创建一个关于这个模型的教程。
- en: Spacetimeformer
  id: totrans-184
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Spacetimeformer
- en: The paper **"Long-Range Transformers for Dynamic Spatiotemporal Forecasting[5]"**,
    introduced a new model called **Spacetimeformer.**
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 论文**“用于动态时空预测的长距离Transformer[5]**”介绍了一种名为**Spacetimeformer**的新模型。
- en: What makes Spacetimeformer advantageous?
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是Spacetimeformer的优势？
- en: 'There are 3 key levels in general:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 一般有3个关键级别：
- en: '**Temporal Models:** Traditional attention-based time series models represent
    multiple variables per timestep in a single token, overlooking spatial relationships
    between features (**Figure 13b)**.'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间模型**：传统的基于注意力的时间序列模型在每个时间步表示多个变量，忽略了特征之间的空间关系（**图13b**）。'
- en: '**Graph Models:** Graph attention models manually encode feature relationships
    using static, hardcoded graphs, which cannot adapt over time (**Figure 13c**).'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图模型**：图注意力模型通过静态、硬编码的图手动编码特征关系，无法随时间适应（**图13c**）。'
- en: '**Spatiotemporal Models:** Spacetimeformer integrates temporal and spatial
    attention, representing each feature’s value at a specific timestep as an individual
    token. This approach captures complex interactions across space, time, and value
    (**Figure 13d**).'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时空模型**：Spacetimeformer整合了时间和空间注意力，将每个特征在特定时间步的值表示为一个单独的标记。这种方法捕捉了空间、时间和价值之间的复杂交互（**图13d**）。'
- en: '![Figure 13: Attention in Multivariate Forecasting. (a) A sequence with 3 variables,
    2 context points, and 2 target points to predict. (b) Temporal attention, where
    each token encompasses all three variables, with darker blue lines indicating
    stronger attention between tokens. © Temporal attention with spatial interactions,
    where spatial relationships within each timestep are modeled using predefined
    spatial graphs (black lines). (d) Spatiotemporal attention, where each variable
    at each timestep is treated as an individual token.](../Images/b6295faaacbe37b5a4e1af10a76f276d.png)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![图 13：多元预测中的注意力。 (a) 包含 3 个变量、2 个上下文点和 2 个预测目标点的序列。 (b) 时间注意力，其中每个标记包含所有三个变量，较深的蓝色线条表示标记之间的较强注意力。
    © 带有空间交互的时间注意力，其中每个时间步内的空间关系使用预定义的空间图（黑色线条）进行建模。 (d) 空间时间注意力，其中每个时间步的每个变量被视为一个单独的标记。](../Images/b6295faaacbe37b5a4e1af10a76f276d.png)'
- en: '**Figure 13:** Attention in Multivariate Forecasting. (a) A sequence with 3
    variables, 2 context points, and 2 target points to predict. (b) Temporal attention,
    where each token encompasses all three variables, with darker blue lines indicating
    stronger attention between tokens. © Temporal attention with spatial interactions,
    where spatial relationships within each timestep are modeled using predefined
    spatial graphs (black lines). (d) Spatiotemporal attention, where each variable
    at each timestep is treated as an individual token.'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 13**：多元预测中的注意力。 (a) 包含 3 个变量、2 个上下文点和 2 个预测目标点的序列。 (b) 时间注意力，其中每个标记包含所有三个变量，较深的蓝色线条表示标记之间的较强注意力。
    © 带有空间交互的时间注意力，其中每个时间步内的空间关系使用预定义的空间图（黑色线条）进行建模。 (d) 空间时间注意力，其中每个时间步的每个变量被视为一个单独的标记。'
- en: Previous Transformer-based models used one input token per timestep so that
    the embedding of the token at time 𝑡 represents 𝑁 distinct variables at that moment
    in time.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的基于 Transformer 的模型在每个时间步使用一个输入标记，因此时间 t 的标记嵌入代表该时刻的 N 个不同变量。
- en: 'This is problematic because:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: '这是有问题的，因为： '
- en: '**Lagged Information:** In practice, dependencies can be lagged, such as `y`
    depending on `xi-1` rather than `xi`. Time-based embeddings may overlook these
    lags.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**滞后信息**：在实践中，依赖关系可以是滞后的，例如 `y` 依赖于 `xi-1` 而不是 `xi`。基于时间的嵌入可能会忽略这些滞后。'
- en: '**Limited Receptive Field:** Unlike NLP, where vocabularies are discrete, time-series
    data are continuous. Tokenizing by timepoints restricts receptive fields, limiting
    the capture of long-term, cross-temporal correlations.'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有限的感受野**：与 NLP 不同，NLP 中的词汇是离散的，时间序列数据是连续的。通过时间点进行标记化限制了感受野，限制了长期、跨时间相关性的捕获。'
- en: Spacetimeformer’s Solution
  id: totrans-197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Spacetimeformer 的解决方案
- en: 'Spacetimeformer addresses these limitations with the architecture shown in
    Figure 1d. For 𝑁 variables and a sequence length of 𝐿, we have:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: Spacetimeformer 通过图 1d 中所示的架构解决了这些限制。对于 N 个变量和序列长度 L，我们有：
- en: Multivariate inputs of shape (𝐿, 𝑁) are flattened into sequences of shape (𝐿
    × 𝑁, 1), where each token represents a single variable’s value at a specific timestep.
    This transformation enables the model to jointly learn attention across both space
    and time, creating the "spatiotemporal attention" mechanism illustrated in Figu**re
    13D:**
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 形状为 (L, N) 的多元输入被展平为形状为 (L × N, 1) 的序列，其中每个标记代表特定时间步的单个变量的值。这种转换使模型能够联合学习空间和时间上的注意力，从而创建图
    13D 中所示的“时空注意力”机制：
- en: The embedding differences between a temporal and a SpatioTemporal model are
    shown in **Figure 14:**
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 14**展示了时间和时空模型之间的嵌入差异：'
- en: '![Figure 14: The Spatiotemporal model flattens the N variables into a single
    sequence, and uses different types of embeddings to differentiate them (Source
    [5])](../Images/c9d92a8d01fc9134804df21384726bb3.png)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
  zh: '![图 14：时空模型将 N 个变量展平为单个序列，并使用不同类型的嵌入来区分它们（来源 [5]）](../Images/c9d92a8d01fc9134804df21384726bb3.png)'
- en: '**Figure 14:** *The Spatiotemporal model flattens the N variables into a single
    sequence, and uses different types of embeddings to differentiate them (Source
    [5])*'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 14**：*时空模型将 N 个变量展平为单个序列，并使用不同类型的嵌入来区分它们（来源 [5]）*'
- en: '**Figure 14** shows in detail the embedding types used by SpaceTimeFormer:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 14**详细展示了 SpaceTimeFormer 使用的嵌入类型：'
- en: '**Given Embeddings:** Multivariate inputs include time information, with missing
    values ("?") set to zero for predictions. These embeddings indicate whether values
    are provided as context or require prediction'
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定嵌入**：多元输入包含时间信息，缺失值（"?"）在预测时设置为零。这些嵌入指示值是否作为上下文提供或需要预测。'
- en: '**Time Embeddings:** Time sequences are passed through a Time2Vec layer to
    create **time embeddings** that capture periodic patterns.'
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间嵌入**：时间序列通过Time2Vec层传递以创建**时间嵌入**，这些嵌入能够捕捉周期性模式。'
- en: '**Variable Embeddings:** Each time series covariate is mapped to a spatial
    representation using a lookup-table embedding.'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**变量嵌入**：每个时间序列协变量都使用查找表嵌入映射到空间表示。'
- en: '**Value & Time Embeddings:** Time2Vec embeddings and variable values are projected
    using a feed-forward layer.'
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**值和时间嵌入**：使用前馈层将Time2Vec嵌入和变量值进行投影。'
- en: '**Position Embeddings:** Typical learned position embeddings used in other
    models like BERT (not shown in **Figure 15**)'
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**位置嵌入**：在BERT等模型中使用的典型学习位置嵌入（**图15**中未展示）'
- en: '![Figure 15: The different types of embeddings in SpaceTimeFormer and how they
    are handled (Source [5])](../Images/a931b1c2fd7a81d7387bd298a192dd97.png)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
  zh: '![图15：SpaceTimeFormer中的不同嵌入类型及其处理方式（来源[5])](../Images/a931b1c2fd7a81d7387bd298a192dd97.png)'
- en: '**Figure 15:** *The different types of embeddings in SpaceTimeFormer and how
    they are handled (Source [5])*'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: '**图15**：*SpaceTimeFormer中的不同嵌入类型及其处理方式（来源[5]*)*'
- en: All embeddings are summed to model relationships across temporal and variable
    spaces, but this increases input sequence length.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 所有嵌入被加总以建模时间和变量空间之间的关系，但这增加了输入序列的长度。
- en: 'Given self-attention’s quadratic complexity, scaling becomes challenging for
    large N values. To address this, the following optimizations are applied:'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 由于自注意力机制的二次复杂度，当N值较大时，扩展变得具有挑战性。为了解决这个问题，以下优化被应用：
- en: '**Performer’s FAVOR+ Attention**: A linear approximation of attention using
    a random kernel method.'
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Performer的FAVOR+注意力**：使用随机核方法对注意力进行线性近似。'
- en: '**Global and Local Attention:** Local attention allows each token to focus
    on its spatial variable’s timesteps, while global attention lets tokens attend
    across the entire spatiotemporal sequence. This reduces computations without compromising
    temporal dynamics.'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全局和局部注意力**：局部注意力允许每个标记关注其空间变量的时间步长，而全局注意力则允许标记在整个时空序列中关注。这减少了计算量，同时没有牺牲时间动态。'
- en: '**Figure 16** illustrates SpaceTimeFormer’s encoder-decoder architecture:'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: '**图16**展示了SpaceTimeFormer的编码器-解码器架构：'
- en: '![Figure 16: SpaceTimeFormer top-level architecture (Source [5])](../Images/621f97515f166830003a1105444702fc.png)'
  id: totrans-216
  prefs: []
  type: TYPE_IMG
  zh: '![图16：SpaceTimeFormer顶级架构（来源[5])](../Images/621f97515f166830003a1105444702fc.png)'
- en: '**Figure 16:** *SpaceTimeFormer top-level architecture (Source [5])*'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: '**图16**：*SpaceTimeFormer顶级架构（来源[5]*)*'
- en: Benchmark results show promising performance, with the model outperforming other
    notable implementations. Newer models like the ITransformer and CARD we saw earlier
    have since adopted the embedding mechanism across the time dimension.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 基准测试结果表明，该模型具有令人鼓舞的性能，优于其他知名实现。像ITransformer和CARD这样的新模型随后也采用了跨越时间维度的嵌入机制。
- en: 'Finally, attention weights can be extracted and visualized to reveal spatiotemporal
    relationships among variables:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，可以提取并可视化注意力权重，以揭示变量之间的时空关系：
- en: '![Figure 17: Forecasting the temperature at 3 weather stations in Texas (lower
    left, blue diamonds) and 3 stations in New York (upper right, purple triangles)
    (Source 5)](../Images/8936bfb0d78f9c9198d054337c3ad18e.png)'
  id: totrans-220
  prefs: []
  type: TYPE_IMG
  zh: '![图17：预测德克萨斯州3个气象站（左下角，蓝色菱形）和纽约3个气象站（右上角，紫色三角形）的温度（来源5）](../Images/8936bfb0d78f9c9198d054337c3ad18e.png)'
- en: '**Figure 17:** *Forecasting the temperature at 3 weather stations in Texas
    (lower left, blue diamonds) and 3 stations in New York (upper right, purple triangles)
    (Source 5)*'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: '**图17**：*预测德克萨斯州3个气象站（左下角，蓝色菱形）和纽约3个气象站（右上角，紫色三角形）的温度（来源5）*'
- en: You can find the official repo of SpaceTimeReformer [here](https://github.com/QData/spacetimeformer).
    This model has also been applied for other cases such as [financial forecasting](https://www.semanticscholar.org/reader/d3273fbe5db873e10f2ba774950f7c59b4271199).
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[这里](https://github.com/QData/spacetimeformer)找到SpaceTimeReformer的官方仓库。该模型也已被应用于其他案例，例如[金融预测](https://www.semanticscholar.org/reader/d3273fbe5db873e10f2ba774950f7c59b4271199)。
