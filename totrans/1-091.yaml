- en: I Measured Neural Network Training Every 5 Steps for 10,000 Iterations
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/i-measured-neural-network-training-every-5-steps-for-10000-iterations/](https://towardsdatascience.com/i-measured-neural-network-training-every-5-steps-for-10000-iterations/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1763147938136" class="mdspan-comment">I thought I understood</mdspan>
    how neural networks learned. Train them, watch the loss go down, save checkpoints
    every epoch. Standard workflow. Then I measured training dynamics at 5-step intervals
    instead of epoch-level, and everything I thought I knew fell apart.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: 'The question that started this journey: Does a neural network’s capacity expand
    during training, or is it fixed from initialization? Until 2019, we all assumed
    the answer was obvious—parameters are fixed, so capacity must be fixed too. But
    Ansuini et al. discovered something that shouldn’t be possible: the effective
    representational dimensionality *increases* during training. Yang et al. confirmed
    it in 2024.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: This changes everything. If learning space expands *while* the network learns,
    how can we mechanistically understand what it’s actually doing?
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: High-Frequency Training Checkpoints
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When we are training a DNN with 10,000 steps, we used to set up chack points
    every 100 or 200 steps. Measuring at 5-step intervals generates too much records
    that aren’t easy to manage. But these high-frequency checkpoints reveal very valuable
    information about how a DNN learns.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: 'High-frequency checkpoints provide information about:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Whether early training mistakes can be recovered from (they often can’t)
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why some architectures work and others fail
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When interpretability analysis should happen (spoiler: way earlier than we
    thought)'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to design better training approaches
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: During an applied research project I have measured DNN training at high resolution
    — every 5 steps instead of every 100 or 500\. I used a basic MLP architecture
    with the same dataset I’ve been using for the last 10 years.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/44e2be3f8ec06cc4c70c7efc8a4f948d.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
- en: '**Figure 1.** Experimental setupWe detect discrete transitions using z-score
    analysis with'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: 'rolling statistics:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: The results were surprising. Deep neural networks, even simple architectures,
    expand their effective parameter space during training. I had assumed this space
    was predetermined by the architecture itself. Instead, DNNs undergo discrete transitions—small
    jumps that increase the effective dimensionality of their learning space.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b4ed81976f9a1ec4d9e17069f6b70b4b.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
- en: '**Figure 2**: Effective dimensionality of activation patterns during training,
    measured using stable rank. We see three distinct phases emerge: initial collapse
    (steps 0-300) where dimensionality drops from 2500 to 500, expansion phase (steps
    300-5000) where dimensionality climbs to 1000, and stabilization (steps 5000-8000)
    where dimensionality plateaus. This suggests steps 0-2000 constitute a qualitatively'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: distinct developmental window. Image by author.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: In Figure 2 we can see the monitoring of activation effective dimensionality
    during training. We see these transitions concentrate in the first 25% of training,
    and are hidden at larger checkpoint intervals (100-1000 steps). We needed a high-frequency
    checkpointing (5 steps) to detect most of them. The curve also shows an interesting
    behavior. The initial collapse represents loss landscape restructuring where random
    initialization gives way to a task-aligned structure. Then we see an expansion
    phase with gradual dimensionality growth. Between 2000-3000 steps, there is a
    stabilization that reflects DNN architectural capacity limits.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c2f35ad1f7fb8b2b0ad53a9c4d88709d.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
- en: '**Figure 3:** Representational dimensionality (measured using stable rank)
    shows strong negative correlation with loss (ρ = −0.951) and moderate negative
    correlation with gradient magnitude (ρ = −0.701). As loss decreases from 2.0 to
    near zero, dimensionality expands from 9.0 to 9.6\. Counterintuitively, improved
    performance correlates with expanded rather than com- pressed representations.
    Image by author.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: This changes how we should think about DNN training, interpretability, and architecture
    design.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Exploration vs Expansion
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Consider the following two scenarios:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '| **Scenario A:** **Fixed Capacity (Exploration)**'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '| **Scenario B:** **Expanding Capacity** **(Innovation)** |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
- en: '| Your network starts with a fixed representational capacity. Training explores
    different regions of this pre-determined space. It is like navigating a map that
    exists from the beginning. Early training just means “haven’t found the good region
    yet”. | Your network starts with minimal capacity. Training *creates* representational
    structures. Its like building roads while traveling — each road enables new destinations.
    Early training establishes what becomes learnable later.  |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
- en: Which is it?
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: The question matters because if capacity expands, then early training isn’t
    recoverable. You can’t just “train longer” to fix early mistakes. So, interpretability
    has a *timeline* where features form in sequence. Understanding this sequence
    is key. Furehtermore, architecture design seems to be about expansion rate not
    just final capacity. Finally, critical periods exist. If we miss the window, we
    miss the capability.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: When We Need to Measure High-Frequency Checkpoints
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Expansion vs Exploration
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/0f3363ac97e9226c0b85accd23dbb87b.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
- en: '**Figure 4**: High-frequency sampling vs. Low Frequency sampling in the experiment
    describred in Figure 1\. We detect discrete transitions using z-score analysis
    with rolling statistics. High-frequency sampling captures rapid transitions that
    coarse-grained measurement misses. This comparison tests whether temporal resolution
    affects observable dynamics.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: 'As seen in Figures 2 and 3, high-frequency sampling reveals interesting information.
    We can indentify three different phases:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '| **Phase 1: Collapse (steps 0-300)** The network restructures from random
    initialization. Dimensionality drops sharply as the loss landscape is reshaped
    around the task. This isn’t learning yet, it’s preparation for learning. |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| **第一阶段：崩溃（步骤0-300）** 网络从随机初始化重新结构化。维度急剧下降，因为损失景观在任务周围重塑。这还不是学习，而是学习准备。|'
- en: '| **Phase 2: Expansion (steps 300-5,000)** Dimensionality climbs steadily.
    This is capacity expansion. The network is building representational structures.
    Simple features that enable complex features that enable higher-order features.
    |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| **第二阶段：扩展（步骤300-5,000）** 维度稳步上升。这是容量扩展。网络正在建立表征结构。简单的特征能够使复杂的特征得以形成，进而使更高阶的特征得以形成。|'
- en: '| **Phase 3: Stabilization (steps 5,000-8,000)** Growth plateaus. Architectural
    constraints bind. The network refines what it has rather than building new capacity.
    |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| **第三阶段：稳定化（步骤5,000-8,000）** 增长平台期。架构约束绑定。网络细化它已有的内容，而不是建立新的容量。|'
- en: This plots reveals expansion, not exploration. The network at step 5,000 can
    represent functions that were impossible at step 300 because they didn’t exist.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这个图揭示了扩展，而非探索。在第5,000步时，网络可以表示在第300步时不可能表示的函数，因为那时它们还不存在。
- en: Capacity Expands, Parameters Don’t
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 容量扩展，参数不变
- en: '![](../Images/27d8f8a0d15a20d367c4ca9b54699b1b.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/27d8f8a0d15a20d367c4ca9b54699b1b.png)'
- en: '**Figure 5**: Comparison of activation space to weight space.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**图5**：激活空间与权重空间的比较。'
- en: Weight space dimensionality remains nearly constant
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 权重空间维度几乎保持不变
- en: (9.72-9.79) with only 1 detected “jump” across 8000 steps. Image by author
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: （9.72-9.79）仅在8000步中检测到1次“跳跃”。图由作者提供
- en: The comparison between activation and weight spaces shows that both follow different
    dynamics with high-frequency sampling. The activation space shows ap. 85 discrete
    jumps (including Gaussian noise)*.* The weight space shows only 1\. The same network
    with the same training run. It confirms that the network at step 8000 computes
    functions inaccessible at step 500 despite an identical parameter count. This
    is the clearest evidence for expansion.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 激活空间与权重空间的比较表明，两者都遵循不同的动态，具有高频采样。激活空间显示了85个离散跳跃（包括高斯噪声）*.* 权重空间只显示1个。相同的网络，相同的训练运行。这证实了在第8,000步时，网络计算了在第5,000步时无法计算的功能，尽管参数数量相同。这是扩展的最明显证据。
- en: '*DNNs innovate by generating new parameter space options during training in
    order to represent complex tasks.*'
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*DNNs通过在训练期间生成新的参数空间选项来创新，以表示复杂任务。*'
- en: Transitions Are Fast and Early
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 转换快速且早发生
- en: We have seen how high-frequency sampling shows many more transitions. Low-frequency
    checkpointing would miss nearly all of them. These transitions concentrate early.
    Two thirds of all transitions happen in the first 2,000 steps — just 25% of total
    training time. It means that if we want to understand what features form and when,
    we need to look during steps 0-2,000, not at convergence. By step 5,000, the story
    is over.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到高频采样如何显示许多更多的转换。低频检查点会错过几乎所有这些转换。这些转换集中在早期。三分之二的所有转换发生在前2,000步——仅占总训练时间的25%。这意味着如果我们想了解哪些特征形成以及何时形成，我们需要在步骤0-2,000时查看，而不是在收敛时查看。到第5,000步时，故事就结束了。
- en: Expansion Couples to Optimization
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 扩展与优化耦合
- en: 'If we look again at Figure 3, we see that as loss decreases, dimensionality
    expands. The network doesn’t simplify as it learns. It becomes more complex. Dimensionality
    correlates strongly with loss (ρ = -0.951) and moderately with gradient magnitude
    (ρ = -0.701). This could seem counterintuitive: improved performance correlates
    with *expanded* rather than *compressed* representations. We might expect networks
    to find simpler, more compressed representations as they learn. Instead, they
    expand into higher-dimensional spaces.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们再次看图3，我们会看到随着损失减少，维度扩展。网络在学习过程中不会简化，而是变得更加复杂。维度与损失（ρ = -0.951）高度相关，与梯度幅度（ρ
    = -0.701）适度相关。这可能会显得有些反直觉：改进的性能与*扩展*的表征相关，而不是与*压缩*的表征相关。我们可能会预期网络在学习过程中找到更简单、更压缩的表征。相反，它们扩展到更高维度的空间。
- en: Why?
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: A possible explanation is that complex tasks require complex representations.
    The network doesn’t find a simpler explanation and builds the representational
    changes needed to separate classes, recognize patterns, and generalize.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 一种可能的解释是，复杂任务需要复杂的表征。网络没有找到更简单的解释，而是构建了分离类别、识别模式和泛化所需的表征变化。
- en: Practical Deployment
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际部署
- en: We have seen a different way to understand and debug DNN training across any
    domain.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到了一种理解和调试跨任何领域的DNN训练的不同方法。
- en: '*If we know when features form during training, we can analyze them as they
    crystallize rather than reverse-engineering a black box afterward.*'
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*如果我们知道特征在训练期间形成的时间，我们可以在它们结晶时分析它们，而不是在之后逆向工程一个黑盒。*'
- en: 'In real deployment scenarios, we can track representational dimensionality
    in real-time, detect when expansion phases occur, and run interpretability analyses
    at each transition point. This tells us precisely when our network is building
    new representational structures—and when it’s finished. The measurement approach
    is architecture-agnostic: it works whether you’re training CNNs for vision, transformers
    for language, RL agents for control, or multimodal models for cross-domain tasks.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际的部署场景中，我们可以实时跟踪表示维度，检测扩展阶段何时发生，并在每个过渡点进行可解释性分析。这告诉我们网络何时构建新的表示结构——以及何时完成。这种测量方法与架构无关：无论你是在训练用于视觉的CNN，用于语言的transformers，用于控制的RL代理，还是用于跨域任务的复模态模型，它都适用。
- en: '| **Example** **1**: Intervention experiments that map causal dependencies.
    Disrupt training during specific windows and measure which downstream capabilities
    are lost. If corrupting data during steps 2,000-5,000 permanently damages texture
    recognition but the same corruption at step 6,000 has no effect, you’ve found
    when texture features crystallize and what they depend on. This works identically
    for object recognition in vision models, syntactic structure in language models,
    or state discrimination in RL agents. |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
  zh: '| **示例 1**：映射因果依赖的干预实验。在特定窗口中中断训练并测量哪些下游能力丢失。如果在第2,000-5,000步中损坏数据永久损害了纹理识别，但在第6,000步的相同损坏没有影响，你就找到了纹理特征结晶的时间和它们所依赖的内容。这对于视觉模型中的对象识别、语言模型中的句法结构或RL代理中的状态区分同样有效。|'
- en: '| **Example** **2**: For production deployment, continuous dimensionality monitoring
    catches representational problems during training when you can still fix them.
    If layers stop expanding, you have architectural bottlenecks. If expansion becomes
    erratic, you have instability. If early layers saturate while late layers fail
    to expand, you have information flow problems. Standard loss curves won’t show
    these issues until it’s too late—dimensionality tracking surfaces them immediately.
    |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '| **示例 2**：在生产部署中，连续维度监控可以在训练过程中捕捉到表示问题，此时你还可以修复它们。如果层停止扩展，你有架构瓶颈。如果扩展变得不规则，你有不稳定性。如果早期层饱和而晚期层无法扩展，你有信息流问题。标准的损失曲线不会显示这些问题，直到太晚——维度跟踪会立即揭示这些问题。|'
- en: '| **Example** **3**: The architecture design implications are equally practical.
    Measure expansion dynamics during the first 5-10% of training across candidate
    architectures. Select for clean phase transitions and structured bottom-up development.
    These networks aren’t just more performant—they’re fundamentally more interpretable
    because features form in clear sequential layers rather than tangled simultaneity.
    |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| **示例 3**：架构设计的影响同样实用。在候选架构的第一5-10%的训练期间测量扩展动态。选择具有干净相变和结构化自下而上的发展的网络。这些网络不仅性能更好，而且由于特征在清晰的顺序层中形成而不是混乱的同时性，它们在本质上更容易解释。|'
- en: What’s Next
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来是什么
- en: 'So we’ve established that networks expand their representational space during
    training, that we can measure these transitions at high resolution, and that this
    opens new approaches to interpretability and intervention. The natural question:
    can you apply this to your own work?'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们已经确定网络在训练期间扩展其表示空间，我们可以以高分辨率测量这些过渡，这为可解释性和干预开辟了新的方法。自然的问题：你能将这应用到你的工作中吗？
- en: I’m releasing the complete measurement infrastructure as open source. I included
    validated implementations for MLPs, CNNs, ResNets, Transformers, and Vision Transformers,
    with hooks for custom architectures.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我将完整的测量基础设施作为开源发布。我包括了针对MLPs、CNNs、ResNets、Transformers和视觉Transformers的验证实现，并为自定义架构提供了钩子。
- en: Everything runs with three lines added to your training loop.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 所有的操作只需在训练循环中添加三行即可完成。
- en: '![](../Images/723f66fde5aa583249fb4f1bb24ce76d.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/723f66fde5aa583249fb4f1bb24ce76d.png)'
- en: 'The GitHub repository provides experiment templates for the experiments discussed
    above: feature formation mapping, intervention protocols, cross-architecture transfer
    prediction, and production monitoring setups. The measurement methodology is validated.
    What matters now is what you discover when you apply it to your domain.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '**Try it**:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '`pip install ndtracker`'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: 'Quickstart, instructions, and examples in the repository: [Neural Dimensionality
    Tracker (NDT)](https://github.com/Javihaus/ndt)'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: The code is production-ready. The protocols are documented. The questions are
    open. I would like to see what you find when you measure your training dynamics
    at high resolution no matter the context and the architecture.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: You can share your results, open issues with your findings, or just ⭐️ the repo
    if this changes how you think about training. Remember, the interpretability timeline
    exists across all neural architectures.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '**Javier Marín** | [LinkedIn](https://www.linkedin.com/in/javiermarinvalenzuela/)
    | [Twitter](link)'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: References & Further Reading
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Achille, A., Rovere, M., & Soatto, S. (2019). Critical learning periods in deep
    networks. In *International Conference on Learning Representations (ICLR)*. [https://openreview.net/forum?id=BkeStsCcKQ](https://openreview.net/forum?id=BkeStsCcKQ)
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Frankle, J., Dziugaite, G. K., Roy, D. M., & Carbin, M. (2020). Linear mode
    connectivity and the lottery ticket hypothesis. In *Proceedings of the 37th International
    Conference on Machine Learning* (pp. 3259-3269). PMLR. [https://proceedings.mlr.press/v119/frankle20a.html](https://proceedings.mlr.press/v119/frankle20a.html)
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
