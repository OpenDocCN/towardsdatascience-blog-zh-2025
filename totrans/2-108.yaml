- en: Multi-head Attention is a Fancy Addition Machine
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/transformers-and-attention-are-just-fancy-addition-machines/](https://towardsdatascience.com/transformers-and-attention-are-just-fancy-addition-machines/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**<mdspan datatext="el1753243111506" class="mdspan-comment">Mechanistic Interpretation</mdspan>**
    is a relatively new sub-field in AI, focused on understanding how neural networks
    function by reverse-engineering their internal mechanisms and representations,
    aiming to translate them into human-understandable algorithms and concepts. This
    is in contrast to and further than traditional explainability techniques like
    SHAP and LIME.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: SHAP stands for **SH**apley **A**dditive ex**P**lanations. It computes the contribution
    of each feature to the prediction of the model, locally and globally, that is
    for a single example as well as across the whole dataset. This allows SHAP to
    be used to determine feature importance in general for the use case. LIME, meanwhile,
    works on a single example-prediction pair where it perturbs the example input
    and uses the perturbations and its outputs to approximate a simpler substitute
    of the black-box model. As such, both of these work at a feature level and give
    us some explanation and heuristic to gauge how each input into the model affects
    its prediction or output.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, mechanistic interpretation understands things at a more granular
    level in that it is capable of providing a pathway of how the said feature is
    learnt by different neurons in different layers in the neural network, and how
    that learning evolves over the layers in the network. This makes it adept at tracing
    paths inside the network for a particular feature and *also* seeing how that feature
    affects the outcome.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: SHAP and LIME, then, answer the question *“which feature contributes the most
    to the outcome?”* whereas mechanistic interpretation answers the question “*which
    neurons activate for which feature, and how does that feature evolve and affect
    the outcome of the network?*“
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Since explainability in general is a problem with deeper networks, this sub-field
    majorly works with deeper models like the transformers. There are a few places
    where mechanistic interpretability looks at transformers differently than the
    traditional way, one of which is *multi-head attention*. As we will see, this
    difference is in reframing the multiplication and concatenation operations as
    defined in the “Attention is All You Need” paper as addition operations which
    opens a whole range of new possibilities.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: But first, a recap of the Transformer architecture.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Transformer Architecture
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/ca3b55d88f894f5547b74c3c03cef421.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
- en: 'Image by Author: Transformer Architecture'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: 'These are the sizes we work with:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '*batch_size B* =1;'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*sequence length S = 20;*'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*vocab_size V = 50,000;*'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*hidden_dims D = 512;*'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*heads H = 8*'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This means that the number of dimensions in the Q, K, V vectors is 512/8 (L)
    = 64\. *(In case you don’t remember, an analogy for understanding query, key and
    value: The idea is that for a token at a given position (K), based on its context
    (Q) we want to get alignment (reweighing) to the positions it’s relevant to (V).)*'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: These are the steps upto the attention computation in a transformer. (The shape
    of tensors is assumed as an example for better understanding. Numbers in italic
    represent the dimension along which the matrix is multiplied.)
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '| **Step** | **Operation** | **Input 1 Dims** (Shape) | **Input 2 Dims** (Shape)
    | **Output Dims** (Shape) |'
  id: totrans-19
  prefs: []
  type: TYPE_TB
- en: '| 1 | N/A | B x S x V (1 x 20 x 50,000) | N/A | B x S x V (1 x 20 x 50,000)
    |'
  id: totrans-20
  prefs: []
  type: TYPE_TB
- en: '| 2 | Get embeddings | B x S x V (1 x 20 x *50,000*) | V x D (*50,000* x 512)
    | B x S x D (1 x 20 x 512) |'
  id: totrans-21
  prefs: []
  type: TYPE_TB
- en: '| 3 | Add positional embeddings | B x S x D (1 x 20 x 512) | N/A | B x S x
    D (1 x 20 x 512) |'
  id: totrans-22
  prefs: []
  type: TYPE_TB
- en: '| 4 | Copy embeddings to Q, K, V | B x S x D (1 x 20 x 512) | N/A | B x S x
    D (1 x 20 x 512) |'
  id: totrans-23
  prefs: []
  type: TYPE_TB
- en: '| 5 | Linear transform *for each head **H=8*** | B x S x D (1 x 20 x *512*)
    | D x L (*512* x *64*) | BxHxSxL (1 x 1 x 20 x 64) |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
- en: '| 6 | Scaled Dot Product (Q@K’) *in each head* | BxHxSxL (1 x 1 x 20 x *64*)
    | (LxSxHxB) (*64* x 20 x 1 x 1) | BxHxSxS (1 x 1 x 20 x 20)  |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
- en: '| 7 | Scaled Dot Product (Attention calculation) Q@K’V *in each head* | BxHxSxS
    (1 x 1 x 20 x *20*) | BxHxSxL (1 x 1 x *20* x 64) | BxHxSxL (1 x 1 x 20 x 64)
    |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
- en: '| 8 | Concat across all heads **H=8** | BxHxSxL (1 x 1 x *20 x 64*) | N/A |
    B x S x D (1 x 20 x 512) |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
- en: '| 9 | Linear projection | B x S x D (1 x 20 x 512) | D x D (512 x 512) | B
    x S x D (1 x 20 x 512) |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
- en: Tabular view of shape transformations towards attention computation in the Transformer
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: 'The table explained in detail:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: 'We start with one input sentence of a sequence length of 20 that is one-hot
    encoded to represent words in the vocabulary present in the sequence. Shape (B
    x S x V): (1 x 20 x 50,000)'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We multiply this input with the learnable embedding matrix Wₑ of shape (V x
    D) to get the embeddings. Shape (B x S x D): (1 x 20 x 512)'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next a learnable positional encoding matrix of the same shape is added to the
    embeddings
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The resultant embeddings are then copied to the matrices Q, K and V. Q, K and
    V each are split and reshaped on the *D* dimension. Shape (B x S x D): (1 x 20
    x 512)'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The matrices for Q, K and V are each fed to a linear transformation layer that
    multiplies them with learnable weight matrices each of shape (D x L) Wq, Wₖ and
    Wᵥ, respectively *(one copy for each of the H=8 heads)*. Shape (B x H x S x L):
    (1 x 1 x 20 x 64) where H=1, as this is the resultant shape for *each head.*'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Next, we compute attention with Scaled Dot Product attention where Q and K
    (transposed) are multiplied first in *each head.* Shape (B x H x S x L) x (L x
    S x H x B) → (B x H x S x S): (1 x 1 x 20 x 20).'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'There is a scaling and masking step next that I have skipped as that is not
    important in understanding what is the different way of looking at MHA. So, next
    we multiply QK with V *for each head*. Shape (B x H x S x S) x (B x H x S x L)
    → (B x H x S x L): (1 x 1 x 20 x 64)'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Concat:** Here, we concatenate the results of attention from all the heads
    at the L dimension to get back a shape of (B x S x D) → (1 x 20 x 512)'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'This output is once more linearly projected using yet another learnable weight
    matrix Wₒ of shape (D x D). Final shape we end with (B x S x D): (1 x 20 x 512)'
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Reimagining Multi-Head Attention
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/d202f6bdd250b2880c28953bfb937b7d.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
- en: Now, let’s see how the field of mechanistic interpretation looks at this, and
    we will also see why it is mathematically equivalent. On the right in the image
    above, you see the module that reimagines multi-head attention.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of concatenating the attention output, we proceed with the multiplication
    or linear projection *“inside”* the heads itself where now the shape of Wₒ is
    (L x D) which is multiplied with QK’V of shape (B x H x S x L) to get the result
    of shape (B x S x H x D): (1 x 20 x 1 x 512). Then, we sum over the H dimension
    to again end with the shape (B x S x D): (1 x 20 x 512).'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: 'From the table above, the last two steps are what changes:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '| **Step** | **Operation** | **Input 1 Dims** (Shape) | **Input 2 Dims** (Shape)
    | **Output Dims** (Shape) |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
- en: '| 8 | Linear projection on L *in each head* **H=8** | BxHxSxL (1 x 1 x *20
    x 64*) | L x D (*64* x 512) | BxSxHxD (1 x 20 x 1 x 512) |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
- en: '| 9 | Sum over heads (H dimension) | BxSxHxD (1 x 20 x 1 x 512) | N/A | B x
    S x D (1 x 20 x 512) |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
- en: '**Side note**: This “summing over” is reminiscent of how summing over different
    channels happens in CNNs. In CNNs, each filter operates on the input, and then
    we *sum the outputs* across channels. Same here — each head can be seen as a channel,
    and the model learns a weight matrix to map each head’s contribution into the
    final output space.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: But why is the **project + sum** mathematically equivalent to **concat + project**?
    In short, because the projection weights in the mechanistic perspective are just
    sliced versions of the weights in the traditional view (sliced across the *D*
    dimension and split to match each head).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7576a2f5b85a583f382dd23f25b5ea3e.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
- en: Let’s focus on the H and D dimensions before the multiplication with Wₒ. From
    image above, each head now has a vector of size 64 that is being multiplied with
    the weight matrix of shape (64 x 512). Let’s denote the result by R and head by
    h.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: 'To get R₁₁, we have this equation:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: R₁,₁ = h₁,₁ x Wₒ₁,₁ + h₁,₂ x Wₒ₂,₁ + …. + h₁ₓ₆₄ x Wₒ₆₄,₁
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: 'Now let’s say we had concatenated the heads to get an attention output shape
    of (1 x 512) and the weight matrix of shape (512, 512) then the equation would
    have been:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: R₁,₁ = h₁,₁ x Wₒ₁,₁ + h₁,₂ x Wₒ₂,₁ + …. + h₁ₓ**₅₁₂** x Wₒ**₅₁₂**,₁
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: So, the part h₁ₓ₆**₅** x Wₒ₆**₅**,₁ + … + h₁ₓ**₅₁₂** x Wₒ**₅₁₂**,₁ would have
    been added. But this part being added is the part that is present in each of the
    other heads in modulo 64 fashion. Said another way, if there is no concatenation,
    Wₒ₆**₅**,₁ is the value behind Wₒ₁,₁ in the second head, Wₒ₁₂₉,₁ is the value
    behind Wₒ₁,₁ in the third head and so on if we imagine that the values for each
    head sit behind one another. Hence, even without concatenation, the “summing over
    the heads” operation results in the same values being added.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，h₁ₓ₆**₅** x Wₒ₆**₅**,₁ + … + h₁ₓ**₅₁₂** x Wₒ**₅₁₂**,₁这一部分将被添加。但这个被添加的部分是以模64的方式存在于其他每个头中。换句话说，如果没有连接，Wₒ₆**₅**,₁就是第二个头中Wₒ₁,₁的值，Wₒ₁₂₉,₁是第三个头中Wₒ₁,₁的值，以此类推，如果我们想象每个头的值都依次排列。因此，即使没有连接，"对头求和"操作也会得到相同的值被添加。
- en: In conclusion, this insight lays the foundation of looking at transformers as
    purely additive models in that all the operations in a transformer take the initial
    embedding and add to it. This view opens up new possibilities like tracing features
    as they are learnt via *additions* through the layers (called circuit tracing)
    which is what mechanistic interpretability is about as I will show in my next
    articles.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，这个洞见为将变压器视为纯粹加性模型奠定了基础，即变压器中的所有操作都是基于初始嵌入并对其进行添加。这种观点开启了新的可能性，例如通过*加法*追踪特征在层中的学习过程（称为电路追踪），这正是我在接下来的文章中将要展示的机制可解释性的内容。
- en: '* * *'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: We have shown that this view is mathematically equivalent to the vastly different
    view that multi-head attention, by splitting Q,K,V parallelizes and optimizes
    computation of attention. Read more about this in this blog [here](https://mccormickml.com/2025/02/18/patterns-and-messages-part-1-wo-i/)
    and the actual paper that introduces these points is [here](https://transformer-circuits.pub/2021/framework/index.html).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经证明，这种观点在数学上等同于另一种截然不同的观点，即多头注意力通过分割Q、K、V并行化并优化了注意力的计算。更多关于这方面的内容请参阅这篇博客[这里](https://mccormickml.com/2025/02/18/patterns-and-messages-part-1-wo-i/)，以及介绍这些观点的实际论文[这里](https://transformer-circuits.pub/2021/framework/index.html)。
