- en: 'ACP: The Internet Protocol for AI Agents'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ACP：AI代理的互联网协议
- en: 原文：[https://towardsdatascience.com/acp-the-internet-protocol-for-ai-agents/](https://towardsdatascience.com/acp-the-internet-protocol-for-ai-agents/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/acp-the-internet-protocol-for-ai-agents/](https://towardsdatascience.com/acp-the-internet-protocol-for-ai-agents/)
- en: '**<mdspan datatext="el1746747854951" class="mdspan-comment">With ACP (Agent</mdspan>
    Communication Protocol), AI agents can collaborate freely across teams, frameworks,
    technologies, and organizations**. It’s a universal protocol that transforms the
    fragmented landscape of today’s AI Agents into inter-connected team mates. This
    unlocks new levels of interoperability, reuse, and scale.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**<mdspan datatext="el1746747854951" class="mdspan-comment">使用ACP（代理通信协议），AI代理可以在团队、框架、技术和组织之间自由协作**。这是一个通用协议，将当今AI代理的碎片化格局转变为相互连接的团队成员。这解锁了新的互操作性、重用和扩展级别。'
- en: As an open-source standard with open governance, ACP has just released its latest
    version, allowing AI agents to communicate across different frameworks and technology
    stacks. It’s part of a growing ecosystem, including BeeAI (where I’m part of the
    team), which has been [donated to the Linux Foundation](https://www.linuxfoundation.org/press/ai-workflows-get-new-open-source-tools-to-advance-document-intelligence-data-quality-and-decentralized-ai-with-ibms-contribution-of-3-projects-to-linux-fou-1745937200621).
    Below are some key features; you can read more about the core concepts and details
    in the [documentation](https://agentcommunicationprotocol.dev/introduction/welcome).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 作为具有开放治理的开源标准，ACP刚刚发布了其最新版本，允许AI代理在不同框架和技术堆栈之间进行通信。它是BeeAI（我是团队的一员）等不断增长的生态系统的一部分，BeeAI已被[捐赠给Linux基金会](https://www.linuxfoundation.org/press/ai-workflows-get-new-open-source-tools-to-advance-document-intelligence-data-quality-and-decentralized-ai-with-ibms-contribution-of-3-projects-to-linux-fou-1745937200621)。以下是一些关键特性；你可以在[文档](https://agentcommunicationprotocol.dev/introduction/welcome)中了解更多关于核心概念和细节。
- en: '![](../Images/3355ba9eb34bd90b11a27a84f6c3a867.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3355ba9eb34bd90b11a27a84f6c3a867.png)'
- en: Example of an ACP client and ACP Agents of different frameworks communicating.
    Image used with permission.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 不同框架的ACP客户端和ACP代理通信的示例。图片已获授权使用。
- en: '**Key features of ACP:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**ACP的关键特性：'
- en: REST-based Communication:** ACP uses standard HTTP patterns for communication,
    which makes it easy to integrate into production. Whereas JSON-RPC relies on more
    complex methods.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**基于REST的通信**：ACP使用标准的HTTP模式进行通信，这使得它很容易集成到生产环境中。而JSON-RPC则依赖于更复杂的方法。'
- en: '**No SDK Required** (but there’s one if you want it)**:** ACP doesn’t require
    any specialized libraries. You can interact with agents using tools like curl,
    Postman, or even your browser. For added convenience, there is an [SDK](https://github.com/i-am-bee/acp/tree/main/python)
    available.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**无需SDK**（但如果你需要的话有一个）**：ACP不需要任何专用库。你可以使用curl、Postman或甚至浏览器等工具与代理交互。为了增加便利性，还有一个[SDK](https://github.com/i-am-bee/acp/tree/main/python)可用。'
- en: '**Offline Discovery:** ACP agents can embed metadata directly into their distribution
    packages, which enables discovery even when they’re inactive. This supports secure,
    air-gapped, or scale-to-zero environments where traditional service discovery
    isn’t possible.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**离线发现**：ACP代理可以直接将其元数据嵌入到其分发包中，即使在它们不活跃时也能实现发现。这支持了安全、空气隔离或扩展到零的环境，在这些环境中，传统的服务发现是不可能的。'
- en: '**Async-first, Sync Supported:** ACP is designed with asynchronous communication
    as the default. This is ideal for long-running or complex tasks. Synchronous requests
    are also supported.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**异步优先，同步支持**：ACP的设计以异步通信为默认。这对于长时间运行或复杂任务来说非常理想。同步请求也得到支持。'
- en: '**Note:** ACP enables orchestration for any agent architecture pattern, but
    it doesn’t manage workflows, deployments, or coordination between agents. Instead,
    it enables orchestration across diverse agents by standardizing how they communicate.
    IBM Research built [BeeAI](https://beeai.dev/), an open source system designed
    to handle agent orchestration, deployment, and sharing (using ACP as the communication
    layer).'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：ACP可以为任何代理架构模式启用编排，但它不管理工作流程、部署或代理之间的协调。相反，它通过标准化它们之间的通信来使不同代理之间的编排成为可能。IBM
    Research构建了[BeeAI](https://beeai.dev/)，这是一个开源系统，旨在处理代理编排、部署和共享（使用ACP作为通信层）。'
- en: '* * *'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why Do We Need ACP?
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们为什么需要ACP？
- en: '![](../Images/7cb2bd31a741ec8043b13081a546f686.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7cb2bd31a741ec8043b13081a546f686.png)'
- en: Different Agent Architectures enabled using ACP. Image used with permission.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ACP启用不同代理架构的示例。图片已获授权使用。
- en: As the amount of AI Agents “in the wild” increases, so does the amount of complexity
    in navigating how to get the best outcome from each independent technology for
    your use case (without having to be constrained to a particular vendor). Each
    framework, platform, and toolkit out there offers unique advantages, but integrating
    them all together into one agent system is challenging.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI代理“在野外”数量的增加，如何从每个独立技术中获得最佳结果（而不必受限于特定供应商）的复杂性也在增加。每个框架、平台和工具包都提供独特的优势，但将它们全部集成到一个代理系统中具有挑战性。
- en: Today, most agent systems operate in silos. They’re built on incompatible frameworks,
    expose custom APIs, and lack a shared protocol for communication. Connecting them
    requires fragile and non repeatable integrations that are expensive to build.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，大多数代理系统都在孤岛中运行。它们建立在不可兼容的框架上，公开自定义 API，并且缺乏共享的通信协议。连接它们需要脆弱且不可重复的集成，这很昂贵。
- en: 'ACP represents a fundamental shift: from a fragmented, *ad hoc* ecosystem to
    an interconnected network of agents—each able to discover, understand, and collaborate
    with others, regardless of who built them or what stack they run on. With ACP,
    developers can harness the collective intelligence of diverse agents to build
    more powerful workflows than a single system can achieve alone.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: ACP 代表一个根本性的转变：从碎片化的、*临时性*生态系统到一个相互连接的代理网络——每个代理都能发现、理解并与他人协作，无论它们是由谁构建的或运行在什么堆栈上。有了
    ACP，开发者可以利用不同代理的集体智慧来构建比单一系统单独实现更强大的工作流程。
- en: '**Current Challenges:** Despite rapid growth in agent capabilities, real-world
    integration remains a major bottleneck. Without a shared communication protocol,
    organizations face several recurring challenges:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**当前挑战：**尽管代理能力快速增长，但现实世界的集成仍然是一个主要瓶颈。没有共享的通信协议，组织面临几个反复出现的问题：'
- en: 'Framework Diversity: Organizations typically run hundreds or thousands of agents
    built using different frameworks like LangChain, CrewAI, AutoGen, or custom stacks.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 框架多样性：组织通常运行数百或数千个使用不同框架（如 LangChain、CrewAI、AutoGen 或自定义堆栈）构建的代理。
- en: 'Custom Integration: Without a standard protocol, developers must write custom
    connectors for every agent interaction.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定制集成：没有标准协议，开发者必须为每个代理交互编写自定义连接器。
- en: 'Exponential Development: With n agents, you potentially need n(n-1)/2 different
    integration points (which makes large-scale agent ecosystems difficult to maintain).'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指数级开发：有 n 个代理，你可能需要 n(n-1)/2 个不同的集成点（这使得大型代理生态系统难以维护）。
- en: 'Cross-Organization Considerations: Different security models, authentication
    systems, and data formats complicate integration across companies.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跨组织考虑因素：不同的安全模型、身份验证系统和数据格式使公司间的集成复杂化。
- en: '* * *'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: A Real-World Example
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个真实世界的例子
- en: '![](../Images/599a5577b6a1670744eb627d2bc1c1c7.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/599a5577b6a1670744eb627d2bc1c1c7.png)'
- en: A use case example of two agents (manufacturing and logistics) enabled with
    ACP and communicating with one another across organizations. Images used with
    permission.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 两个代理（制造和物流）使用 ACP 并在组织间相互通信的用例示例。图片已获得许可使用。
- en: 'To illustrate the real-world need for agent-to-agent communication, consider
    two organizations:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明代理间通信的真实世界需求，考虑两个组织：
- en: '**A manufacturing company** that uses an AI agent to manage production schedules
    and order fulfillment based on internal inventory and customer demand.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**制造公司**使用AI代理来管理生产计划和订单履行，基于内部库存和客户需求。'
- en: '**A logistics provider** that runs an agent to offer real-time shipping estimates,
    carrier availability, and route optimization.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**物流提供商**运行代理以提供实时运输估算、承运商可用性和路线优化。'
- en: Now imagine the manufacturer’s system needs to estimate delivery timelines for
    a large, custom equipment order to inform a customer quote.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在想象制造商的系统需要估算大量定制设备订单的交货时间表，以便向客户报价。
- en: '**Without ACP:** This would require building a bespoke integration between
    the manufacturer’s planning software and the logistics provider’s APIs. This means
    handling authentication, data format mismatches, and service availability manually.
    These integrations are expensive, brittle, and hard to scale as more partners
    join.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**没有 ACP：**这需要构建制造商计划软件和物流提供商 API 之间的定制集成。这意味着需要手动处理身份验证、数据格式不匹配和服务可用性。这些集成成本高昂、脆弱，并且随着更多合作伙伴的加入而难以扩展。'
- en: '**With ACP:** Each organization wraps its agent with an ACP interface. The
    manufacturing agent sends order and destination details to the logistics agent,
    which responds with real-time shipping options and ETAs. Both systems collaborate
    without exposing internals or writing custom integrations. New logistics partners
    can plug in simply by implementing ACP.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用 ACP：** 每个组织都使用 ACP 接口包装其代理。制造代理将订单和目的地详情发送给物流代理，物流代理则响应实时运输选项和预计到达时间。两个系统协作而无需暴露内部或编写自定义集成。新的物流合作伙伴只需通过实现
    ACP 简单地插入。'
- en: '* * *'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: How Easy is it to Create an ACP-Compatible Agent?
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建一个 ACP 兼容代理有多容易？
- en: ACP Quickstart – How to make an AI Agent ACP Compatible
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: ACP 快速入门 – 如何使 AI 代理 ACP 兼容
- en: Simplicity is a core design principle of ACP. Wrapping an agent with ACP can
    be done in just a few lines of code. Using the Python SDK, you can define an ACP-compliant
    agent by simply decorating a function.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 简单性是 ACP 的核心设计原则。只需几行代码即可使用 ACP 包装代理。使用 Python SDK，您只需装饰一个函数即可定义符合 ACP 规范的代理。
- en: 'This minimal implementation:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这种最小实现：
- en: Creates an ACP server instance
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个 ACP 服务器实例
- en: Defines an agent function using the @server.agent() decorator
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 @server.agent() 装饰器定义代理函数
- en: Implements an agent using the LangChain framework with an LLM backend and memory
    for context persistence
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用带有 LLM 后端和用于上下文持久化的内存的 LangChain 框架实现代理
- en: Translates between ACP’s message format and the framework’s native format to
    return a structured response
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 ACP 的消息格式和框架的本地格式之间进行翻译，以返回结构化响应
- en: Starts the server, making the agent available via HTTP
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动服务器，使代理可通过 HTTP 访问
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Code
    Example</summary>
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>代码示例</summary>
- en: '[PRE0]</details>'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE0]</details>'
- en: 'Now, you’ve created a fully ACP-compliant agent that can:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你已经创建了一个完全符合 ACP 规范的代理，它可以：
- en: Be discovered by other agents (online or offline)
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 被其他代理发现（在线或离线）
- en: Process requests synchronously or asynchronously
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 同步或异步处理请求
- en: Communicate using standard message formats
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用标准消息格式进行通信
- en: Integrate with any other ACP-compatible system
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与任何其他 ACP 兼容的系统集成
- en: '* * *'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: How ACP Compares to MCP & A2A
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ACP 与 MCP & A2A 的比较
- en: To better understand ACP’s role in the evolving AI ecosystem, it helps to compare
    it to other emerging protocols. *These protocols aren’t necessarily competitors.*
    Instead, they address different layers of the AI system integration stack and
    often complement one another.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解 ACP 在不断发展的 AI 生态系统中的作用，将其与其他新兴协议进行比较很有帮助。*这些协议并不一定是竞争对手。* 相反，它们解决 AI
    系统集成堆栈的不同层，并且通常相互补充。
- en: 'At a Glance:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 一瞥：
- en: '**MCP (Anthropic’s Model Context Protocol):** Designed for enriching a single
    model’s context with tools, memory, and resources.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MCP（Anthropic 的模型上下文协议）：** 设计用于通过工具、内存和资源丰富单个模型的上下文。'
- en: '*Focus: one model, many tools*'
  id: totrans-56
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*重点：一个模型，多个工具*'
- en: '**ACP (Linux Foundation’s Agent Communication Protocol):** Designed for communication
    between independent agents across systems and organizations.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ACP（Linux 基金会的代理通信协议）：** 设计用于系统和组织之间独立代理之间的通信。'
- en: '*Focus: many agents, securely working as peers, no vendor lock in, open governance*'
  id: totrans-58
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*重点：多个代理安全地作为对等体工作，无供应商锁定，开放治理*'
- en: '**A2A (Google’s Agent-to-Agent):** Designed for communication between independent
    agents across systems and organizations.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**A2A（Google 的代理到代理）：** 设计用于系统和组织之间独立代理之间的通信。'
- en: '*Focus: many agents, working as peers, optimized for Google’s ecosystem*'
  id: totrans-60
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*重点：多个代理作为对等体工作，针对 Google 的生态系统进行优化*'
- en: ACP and MCP
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ACP 和 MCP
- en: The ACP team initially explored adapting the **Model Context Protocol (MCP)**
    because it offers a strong foundation for model-context interactions. However,
    they quickly encountered architectural limitations that made it unsuitable for
    true agent-to-agent communication.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: ACP 团队最初探索了适应 **模型上下文协议（MCP）**，因为它为模型上下文交互提供了一个强大的基础。然而，他们很快遇到了架构限制，这使得它不适合真正的代理到代理通信。
- en: 'Why MCP Falls Short for Multi-Agent Systems:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么 MCP 对于多代理系统来说不足：
- en: '**Streaming:** MCP supports streaming but it doesn’t handle *delta streams*
    (e.g., tokens, trajectory updates). This limitation stems from the fact that when
    MCP was originally created it wasn’t intended for agent-style interactions.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**流式传输：** MCP 支持流式传输，但它不处理 *增量流*（例如，标记、轨迹更新）。这种限制源于 MCP 最初创建时并未打算用于代理式交互。'
- en: '**Memory Sharing:** MCP doesn’t support running multiple agents across servers
    while maintaining shared memory. ACP doesn’t fully support this yet either, but
    it’s an active area of development.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**内存共享**：MCP 不支持在服务器之间运行多个代理同时保持共享内存。ACP 也尚未完全支持这一点，但它是一个活跃的开发领域。'
- en: '**Message Structure:** MCP accepts any JSON schema but doesn’t define structure
    for the message body. This flexibility makes interoperability difficult (especially
    for building UIs or orchestrating agents that must interpret diverse message formats).'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**消息结构**：MCP 接受任何 JSON 架构，但未定义消息体的结构。这种灵活性使得互操作性变得困难（尤其是对于构建 UI 或编排必须解释不同消息格式的代理）。'
- en: '**Protocol Complexity:** MCP uses JSON-RPC and requires specific SDKs and runtimes.
    Where as ACP’s REST-based design with built-in async/sync support is more lightweight
    and integration-friendly.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**协议复杂性**：MCP 使用 JSON-RPC 并需要特定的 SDK 和运行时。而 ACP 的基于 REST 的设计具有内置的异步/同步支持，更轻量级且易于集成。'
- en: You can read more about how ACP and MCP compare [here](https://agentcommunicationprotocol.dev/about/mcp-and-a2a#model-context-protocol).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在此处了解更多关于 ACP 和 MCP 如何比较的信息 [here](https://agentcommunicationprotocol.dev/about/mcp-and-a2a#model-context-protocol)。
- en: Think of **MCP** as giving a person better tools, like a calculator or a reference
    book, to enhance their performance. In contrast, **ACP** is about enabling people
    to form *teams*, where each person (or agent) contributes their capabilities and
    and collaborates.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 将 **MCP** 想象成给一个人提供更好的工具，比如计算器或参考书，以增强其性能。相比之下，**ACP** 是关于使人们能够形成 *团队*，其中每个人（或代理）贡献他们的能力并协作。
- en: '*ACP and MCP can complement each other:*'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '*ACP 和 MCP 可以相互补充：*'
- en: '|  | **MCP** | **ACP** |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
  zh: '|  | **MCP** | **ACP** |'
- en: '| Scope | Single model + tools | Multiple agents collaborating |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
  zh: '| 范围 | 单个模型 + 工具 | 多个协作代理 |'
- en: '| Focus | Context enrichment | Agent communication and orchestration |'
  id: totrans-73
  prefs: []
  type: TYPE_TB
  zh: '| 重点关注 | 上下文丰富化 | 代理通信和编排 |'
- en: '| Interactions | Model ↔️ Tools | Agent ↔️ Agent |'
  id: totrans-74
  prefs: []
  type: TYPE_TB
  zh: '| 交互 | 模型 ↔️ 工具 | 代理 ↔️ 代理 |'
- en: '| Examples | Send a database query to a model | Coordinate a research agent
    and a coding agent |'
  id: totrans-75
  prefs: []
  type: TYPE_TB
  zh: '| 示例 | 向模型发送数据库查询 | 协调研究代理和编码代理 |'
- en: ACP and A2A
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ACP 和 A2A
- en: Google’s Agent-to-Agent Protocol (A2A), which was introduced shortly after ACP,
    also aims to standardize communication between AI agents. Both protocols share
    the goal of enabling multi-agent systems, but they diverge in philosophy and governance.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: Google 的代理到代理协议 (A2A)，在 ACP 之后不久推出，也旨在标准化 AI 代理之间的通信。这两种协议都旨在实现多代理系统，但在哲学和治理上存在差异。
- en: '*Key differences:*'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '*主要差异：*'
- en: '|  | **ACP** | **A2A** |'
  id: totrans-79
  prefs: []
  type: TYPE_TB
  zh: '|  | **ACP** | **A2A** |'
- en: '| **Governance** | Open standard, community-led under the Linux Foundation
    | Google-led |'
  id: totrans-80
  prefs: []
  type: TYPE_TB
  zh: '| **治理** | 开放标准，在 Linux 基金会下由社区领导 | 由 Google 领导 |'
- en: '| **Ecosystem Fit** | Designed to integrate with **BeeAI**, an open-source
    multi-agent platform | Closely tied to Google’s ecosystem |'
  id: totrans-81
  prefs: []
  type: TYPE_TB
  zh: '| **生态系统兼容性** | 设计用于与开源多代理平台 **BeeAI** 集成 | 与 Google 生态系统紧密相连 |'
- en: '| **Communication Style** | REST-based, using familiar HTTP patterns | JSON-RPC-based
    |'
  id: totrans-82
  prefs: []
  type: TYPE_TB
  zh: '| **通信风格** | 基于 REST，使用熟悉的 HTTP 模式 | 基于 JSON-RPC |'
- en: '| **Message Format** | MIME-type extensible, allowing flexible content negotiation
    | Structured types defined up front |'
  id: totrans-83
  prefs: []
  type: TYPE_TB
  zh: '| **消息格式** | MIME 类型可扩展，允许灵活的内容协商 | 预先定义的结构化类型 |'
- en: '| **Agent Support** | Explicitly supports any agent type—from stateless utilities
    to long-running conversational agents. Synchronous and asynchronous patterns both
    supported. | Supports stateless and stateful agents, but sync guarantees may vary
    |'
  id: totrans-84
  prefs: []
  type: TYPE_TB
  zh: '| **代理支持** | 明确支持任何类型的代理——从无状态工具到长期运行的对话代理。同步和异步模式都得到支持。 | 支持无状态和有状态代理，但同步保证可能有所不同
    |'
- en: 'ACP was deliberately designed to be:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: ACP 被故意设计成：
- en: Simple to integrate using common HTTP tools and REST conventions
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用常见的 HTTP 工具和 REST 规范简单集成
- en: Flexible across a wide range of agent types and workloads
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在广泛的代理类型和工作负载上具有灵活性
- en: Vendor-neutral, with open governance and broad ecosystem alignment
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 供应商中立，具有开放治理和广泛的生态系统对齐
- en: '**Both protocols can coexist—each serving different needs depending on the
    environment**. ACP’s lightweight, open, and extensible design makes it well-suited
    for decentralized systems and real-world interoperability across organizational
    boundaries. A2A’s natural integration may make it a more suitable option for those
    using the Google ecosystem.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**两种协议可以共存——根据环境的不同，各自满足不同的需求**。 ACP 的轻量级、开放和可扩展的设计使其非常适合去中心化系统以及跨越组织边界的现实世界互操作性。A2A
    的自然集成可能使其成为使用 Google 生态系统的用户更合适的选择。'
- en: '* * *'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Roadmap and Community
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 路线图和社区
- en: 'As ACP evolves, they’re exploring new possibilities to enhance agent communication.
    Here are some key areas of focus:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 随着ACP的发展，他们正在探索新的可能性来增强代理通信。以下是一些关键的关注领域：
- en: 'Identity Federation: How can ACP work with authentication systems to improve
    trust across networks?'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 身份联合：ACP如何与身份验证系统合作，以改善网络间的信任？
- en: 'Access Delegation: How can we enable agents to delegate tasks securely (while
    maintaining user control)?'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问委托：我们如何使代理能够安全地委托任务（同时保持用户控制）？
- en: 'Multi-Registry Support: Can ACP support decentralized agent discovery across
    different networks?'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多注册支持：ACP能否支持跨不同网络的去中心化代理发现？
- en: 'Agent Sharing: How can we make it easier to share and reuse agents across organizations
    or within an organization?'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理共享：我们如何使代理在组织之间或组织内部更容易共享和重用？
- en: 'Deployments: What tools and templates can simplify agent deployment?'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 部署：有哪些工具和模板可以简化代理部署？
- en: ACP is being developed in the open because standards work best when they’re
    developed directly with users. [Contributions](https://agentcommunicationprotocol.dev/about/contribute)
    from developers, researchers, and organizations interested in the future of agent
    interoperability are welcome. Join in helping to shape this evolving standard.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: ACP是在公开环境中开发的，因为当标准与用户直接开发时，它们的效果最好。[贡献](https://agentcommunicationprotocol.dev/about/contribute)来自开发人员、研究人员和对代理互操作性未来感兴趣的组织是受欢迎的。加入进来，帮助塑造这个不断发展的标准。
- en: '* * *'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: For more information, visit [agentcommunicationprotocol.dev](https://agentcommunicationprotocol.dev)
    and join the conversation on the [github](https://github.com/i-am-bee/acp/discussions)
    and [discord](https://discord.gg/49BmB5BcNY) channels.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 想要了解更多信息，请访问 [agentcommunicationprotocol.dev](https://agentcommunicationprotocol.dev)
    并加入 [github](https://github.com/i-am-bee/acp/discussions) 和 [discord](https://discord.gg/49BmB5BcNY)
    频道上的讨论。
