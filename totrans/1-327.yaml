- en: 'MobileNetV1 Paper Walkthrough: The Tiny Giant'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-tiny-giant-mobilenetv1/](https://towardsdatascience.com/the-tiny-giant-mobilenetv1/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1756944029687" class="mdspan-comment">Deep learning engineers</mdspan>
    used to focus on improving accuracy. They kept pushing the limit higher and higher
    until they eventually realized that the computational complexity of their models
    became more and more expensive. This was definitely a problem researchers needed
    to address because we want deep learning models to be able to work not only on
    high-end computers but also on small devices. To overcome this issue, Howard *et
    al.* back in 2017 proposed an extremely lightweight neural network model referred
    to as MobileNet which they introduced in a paper titled *MobileNets: Efficient
    Convolutional Neural Networks for Mobile Vision Applications* [1]. In fact, the
    model proposed in the paper is the first version of MobileNet, which is commonly
    known as MobileNetV1\. Currently we already have four MobileNet versions: MobileNetV1
    all the way to MobileNetV4\. However, in this article we are only going to focus
    on MobileNetV1, covering the idea behind the architecture and how to implement
    it from scratch with PyTorch — I’ll save the later MobileNet versions for my upcoming
    articles.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Depthwise Separable Convolution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In order to achieve a lightweight model, MobileNet leverages the idea of *depthwise
    separable convolution*, which is used nearly throughout the entire network. Figure
    1 below displays the structural difference between this layer (right) and a standard
    convolution layer (left). You can see in the figure that depthwise separable convolution
    basically comprises two types of convolution layers: *depthwise convolution* and
    *pointwise convolution*. In addition to that, we typically follow the *conv-BN-ReLU*
    structure when it comes to constructing CNN-based models. This is essentially
    the reason that in the illustration we have batch normalization and ReLU right
    after each conv layer. We are going to discuss depthwise and pointwise convolutions
    more deeply in the subsequent sections.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/39905ba8dc8117eb53a6665e197fc258.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1\. The structure of a standard convolution layer (left) and a depthwise
    separable convolution layer (right) [1].
  prefs: []
  type: TYPE_NORMAL
- en: Depthwise Convolution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A standard convolution layer is basically a convolution with the *group* parameter
    set to 1\. It is important to remember that in this case using a 3×3 kernel actually
    means applying a kernel of shape *C*×3×3 to the input tensor, where *C* is the
    number of input channels. The use of this kernel shape allows us to aggregate
    information from all channels within each 3×3 patch at once. This is the reason
    why the standard convolution operation is computationally expensive, yet in return
    the output tensor contains a lot of information. If you take a closer look at
    Figure 2 below, a standard convolution layer corresponds to the one in the leftmost
    part of the tradeoff line.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5b59231fe682dbac991943b11c79ac44.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2\. The tradeoff between fewer and more convolution groups [2].
  prefs: []
  type: TYPE_NORMAL
- en: If you’re already familiar with *group convolution*, depthwise convolution should
    be easy for you to understand. Group convolution is a method where we divide the
    channels of the input tensor according to the number of groups used and apply
    convolution independently within each group. For instance, suppose we have an
    input tensor of 64 channels and want to process it with 128 kernels grouped into
    2\. In such a case, the first 64 kernels are responsible for processing the first
    32 channels of the input tensor, while the remaining 64 kernels process the last
    32 channels of the input tensor. This mechanism results in 64 output channels
    for each group. The final output tensor is obtained by concatenating the resulting
    tensors from all groups along the channel dimension, resulting in a total of 128
    channels in this example.
  prefs: []
  type: TYPE_NORMAL
- en: As we continue increasing the number of groups, we eventually reach the extreme
    case known as depthwise convolution, which is a special case of group convolution
    where the number of groups is set equal to the number of input channels. With
    this configuration, we basically have each channel processed independently of
    each other, causing every channel in the input to produce only a single output
    channel. By concatenating all the resulting 1-channel tensors, the final number
    of output channels remains exactly the same as that of the input. This mechanism
    requires us to use a kernel of size 1×3×3 instead of *C*×3×3, preventing us to
    perform information aggregation along channel axis. This allows us to have extremely
    lightweight computation, yet in return causing the output tensor to contain less
    information due to the absence of channel-wise information aggregation.
  prefs: []
  type: TYPE_NORMAL
- en: Since the objective of MobileNet is to make the computation as fast as possible,
    we need to position ourselves at the rightmost part of the above tradeoff line
    despite capturing the least amount of information. This is definitely a problem
    that needs to be addressed, which is the reason why we employ pointwise convolution
    in the subsequent step.
  prefs: []
  type: TYPE_NORMAL
- en: Pointwise Convolution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Pointwise convolution is basically just a standard convolution, except that
    it uses kernels of size 1×1 — or to be more precise, it is actually *C*×1×1\.
    This kernel shape allows us to aggregate information along the channel axis without
    being influenced by spatial information, effectively compensating for the limitation
    of depthwise convolution. Furthermore, remember that depthwise convolution alone
    can only output a tensor of the same number of channels as its input, which limits
    our flexibility in designing the model architecture. By applying pointwise convolution
    in the next step, we can set it to return as many channels as we want, allowing
    us to adapt the layer to the subsequent one as needed.
  prefs: []
  type: TYPE_NORMAL
- en: We can think of depthwise convolution and pointwise convolution as two complementary
    processes, where the former focuses on capturing spatial relationships while the
    latter captures channel relationships. These two processes might seem a bit inefficient
    at first glance since we can basically do the two processes at once using a standard
    convolution layer. However, if we take a closer look at the computational complexity,
    depthwise separable convolution is a lot more lightweight compared to the traditional
    convolution layer counterpart. In the next section I’ll discuss in more detail
    how we can calculate the number of parameters in these two models which definitely
    also affects the computational complexity.
  prefs: []
  type: TYPE_NORMAL
- en: Parameters Count Calculation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Suppose we have an image of size 3×*H*×*W*, where *H* and *W* are the height
    and width of an image, respectively. For the sake of this example, let’s assume
    that we are about to process the image with 16 kernels of size 5×5, where the
    stride is set to 1 and the padding is set to 2 (which in this case is equivalent
    to *padding = same*). With this configuration, the size of the output tensor is
    going to be 16×*H*×*W*. If we use a standard convolution layer, the number of
    parameters will be 5×5×3×16 = 1200 (without bias), in which this number is obtained
    based on the equation in Figure 3\. The use of bias term is not strictly necessary
    in this case, but if we do the total number of parameters is going to be (5×5×3+1)
    × 16 = 1216.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e5156b28a2c24d3048b3b79d31161e12.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3\. Equation to calculate the number of parameters of a convolution layer [2].
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s calculate the parameter count of the depthwise separable convolution
    counterpart to produce the exact same tensor dimension. Following the same formula,
    we will have 5×5×1×3 = 75 for the depthwise convolution part (without bias). Or
    if we also account for the biases, then we will have (5×5×1+1) × 3 = 78 trainable
    params. In the case of depthwise convolution like this, the number of input channels
    is considered 1 since each kernel is responsible for processing a single channel
    only. To the pointwise convolution part, the number of parameters will be 1×1×3×16
    = 48 (without bias) or (1×1×3+1) × 16 = 64 (with bias). Now to obtain the total
    number of parameters in the entire depthwise separable convolution process, we
    can simply calculate 75+48 = 123 (without bias) or 78+64 = 142 (with bias) — that’s
    nearly 90% reduction in parameter count if we compare it with the standard convolution!
    In theory, such an extreme drop in parameter count causes the model to have much
    lower capacity. But that’s just the theory. Later I will show you how MobileNet
    manages to keep up with other models in terms of accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Detailed MobileNetV1 Architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Figure 4 below displays the entire MobileNetV1 architecture in detail. The depthwise
    convolution layers are the rows marked with *dw*, while the pointwise convolutions
    are the ones having 1×1 filter shape. Notice that each *dw* layer is always followed
    by a 1×1 convolution, indicating that the entire architecture mainly consists
    of depthwise separable convolutions. Furthermore, if you take a closer look at
    the architecture, you will see that spatial downsampling is done by the depthwise
    convolutions that have a stride of 2 (notice the rows with *s2* in the table).
    Here you can see that every time we reduce the spatial dimension by half, the
    number of channels doubles to compensate for the loss of spatial information.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bbb9a65929f2a34fd900e556d24e93d4.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4\. The entire MobileNetV1 architecture [1].
  prefs: []
  type: TYPE_NORMAL
- en: Width and Resolution Multiplier
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The authors of MobileNet proposed a new parameter tuning mechanism by introducing
    the so-called *width* and *resolution multiplier*, which are formally denoted
    as *α* and *ρ*, respectively. The *α* parameter can technically be adjusted freely,
    but authors suggest using either 1.0, 0.75, 0.5, or 0.25\. This parameter works
    by reducing the number of channels produced by all convolution layers. For instance,
    if we set *α* to 0.5, the first convolution layer in the network will turn 3-channel
    input into 16 instead of 32\. On the other hand, *ρ* is used to adjust the spatial
    dimension of the input tensor. It is important to note that even though ideally
    we should assign a floating-point number to this parameter, yet in practice it
    is more preferable to directly determine the actual resolution for the input image.
    In this case, authors recommend using either 224, 192, 160 and 128, in which the
    input size of 224×224 corresponds to *ρ* = 1\. The architecture displayed in Figure
    4 above follows the default configuration where both *α* and *ρ* are set to 1.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Experimental Results
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Authors conducted plenty of experiments to prove the robustness of MobileNet.
    The first result to discuss is the one displayed in Figure 5 below, where in this
    experiment they tried to find out how the use of depthwise separable convolution
    layers affects performance. The second row of the table shows the result obtained
    by the architecture I showed you earlier in Figure 4, whereas the first row is
    the result when the layers are replaced with traditional convolutions. Here we
    can see that the accuracy of MobileNet with traditional CNN is indeed higher than
    that of the one using depthwise separable convolutions. However, if we take into
    account the number of multiplications and additions (*mult-adds*) as well as the
    parameter count, we can clearly see that the one with traditional convolution
    layers requires much more computational cost and memory usage just to make a slight
    improvement in accuracy. Thus, with depthwise separable convolutions, even though
    the model complexity of MobileNet significantly gets reduced, authors proved that
    the model capacity remains high.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6f0b3655a5ce19a344f6c108c439143f.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5\. Performance comparison between MobileNet with depthwise separable
    convolution layers (second row) and its full-convolution counterpart (first row) [1].
  prefs: []
  type: TYPE_NORMAL
- en: The *α* and *ρ* parameters I explained earlier are mainly used to provide flexibility,
    considering that not all tasks require the highest MobileNet capability. Authors
    originally conducted experiments on 1000-class ImageNet dataset, but in practice,
    we might probably only need the model to perform classification on a dataset with
    fewer number of classes. In such a case, selecting lower values for the two parameters
    might be preferable as it can speed up the inference process while at the same
    time the model still has enough capacity to accommodate the classification task.
    Talking more specifically about *α*, using smaller value for this parameter causes
    MobileNet to have lower accuracy. But that’s the result on 1000-class dataset.
    If our dataset is simpler and has fewer classes, using smaller *α* might still
    be fine. In Figure 6 below the values 1.0, 0.75, 0.5, and 0.25 written next to
    each model correspond to the *α* used.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/995543f486b3ae328a778290ac19dede.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6\. How width multiplier affects model accuracy, number of operations,
    and parameter count [1].
  prefs: []
  type: TYPE_NORMAL
- en: The same thing also applies to the *ρ* parameter, which is responsible for changing
    the resolution of the input image. Figure 7 below displays what the experimental
    results look like when we use different input resolutions. The results are somewhat
    similar to the ones in the previous figure, where the accuracy score decreases
    as we make the input image smaller. It is important to keep in mind that reducing
    input resolution like this also reduces the number of operations but does not
    affect the parameter count. This is essentially because the ones counted as parameters
    are the weights and biases, where in the case of CNN they correspond to the values
    inside the kernel. So, the parameter count will remain the same as long as we
    don’t change the configuration of the convolution layers. The number of operations,
    on the other hand, gets reduced in accordance with the decrease in input resolution
    since the number of pixels to be processed in smaller images is fewer than in
    larger images.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/869581d6c8f5fab7cd4ed0bbd2b02d38.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7\. How input resolution affects model accuracy, number of operations,
    and parameter count [1].
  prefs: []
  type: TYPE_NORMAL
- en: Instead of just comparing different values for *α* and *ρ*, authors also compared
    MobileNet with other popular models. We can see in Figure 8 that the largest MobileNet
    variant (the one using maximum *α* and *ρ*) achieved comparable accuracy with
    GoogLeNet (InceptionV1) and VGG16 while maintaining the lowest computational complexity.
    This is basically the reason that I named this article *The Tiny Giant *— lightweight
    yet powerful.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/70b0426bbdd9b0c42bedcd77feb2b055.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8\. MobileNet achieves comparable accuracy to popular models while maintaining
    a much lower computational complexity and parameter count [1].
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, authors also compared the smaller MobileNet variant with other
    small models. What’s to me interesting in Figure 9 is that even though the parameter
    count of SqueezeNet is lower than MobileNet, the number of operations in MobileNet
    is over 22 times smaller than SqueezeNet while still maintaining higher accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8ed2b5a33be052439f136975571bd1aa.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9\. The performance of the smaller MobileNet variant compared to popular
    models [1].
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: MobileNetV1 Implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we have understood the idea behind MobileNetV1, we can now jump into the
    code. The architecture I am about to implement is based on the table in Figure
    4\. As always, the first thing we need to do is to import the required modules.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Next, we initialize several configurable parameters so that we can adjust the
    model size according to our needs. In Codeblock 2 below, I denote *α* as `ALPHA`,
    which the value can be changed to 0.75, 0.5 or 0.25 if we want the model to be
    smaller. We don’t specify any variable for *ρ* since we can directly change `IMAGE_SIZE`
    to 192, 160 or 128 as we discussed earlier.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: First Convolution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If we go back to Figure 4, we can see that MobileNet essentially only consists
    of repeating patterns, i.e., a depthwise separable convolution followed by pointwise
    convolution. However, notice that the first row in the figure does not follow
    this pattern as it is actually just a standard convolution layer. Due to this
    reason, we need to create a separate class for this, which I refer to as `FirstConv`
    in Codeblock 3 below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Remember that MobileNet follows the *conv-BN-ReLU* structure. Thus, we need
    to initialize these three layers within the `__init__()` method of this class.
    The convolution layer itself is set to accept 3 input channels and output 32 channels.
    Since we want this number of output channels to be adjustable, we need to multiply
    it with `ALPHA` at the line marked with `#(1)`. Keep in mind that we need to change
    the datatype to integer after the multiplication since having a floating-point
    number for channel count is just nonsense. Next, at line `#(2)` and `#(3)` we
    set the kernel size to 3 and the stride to 2\. With this configuration, the spatial
    dimension of the resulting tensor is going to be half that of the input. Additionally,
    using kernel of size 3×3 like this implicitly requires us to set the padding to
    1 to implement *padding = same* (`#(4)`). In this case we are not going to utilize
    the bias term, which is the reason that we set the `bias` parameter to `False`
    (`#(5)`). This is actually a standard practice when we use the *conv-BN-ReLU*
    structure, since at the end of the day the value distribution of the convolution
    kernels will be centered around 0 again by the batch normalization layer, cancelling
    out the biases applied within the convolution kernel.
  prefs: []
  type: TYPE_NORMAL
- en: In order to find out whether the `FirstConv` class works properly, we are going
    to test it with the Codeblock 4 below. Here we initialize the layer and pass a
    tensor simulating a single RGB image of size 224×224\. You can see in the resulting
    output that our convolution layer successfully downsampled the spatial dimension
    to 112×112 while at the same time expanding the number of channels to 32.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Depthwise Separable Convolutions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As the first convolution is done, we can now work on the repeating depthwise-pointwise
    layers. Since this pattern is the core idea of depthwise separable convolution,
    in the following code I wrap the two types of conv layers in a class called `DepthwiseSeparableConv`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Different from `FirstConv` which does not take any input argument in the initialization
    phase, here we set the `DepthwiseSeparableConv` class to take several inputs as
    shown at line `#(1)` in Codeblock 5 above. I do this because we want the class
    to be reusable across all depthwise separable convolution layers throughout the
    entire network, in which each of them has slightly different behaviors from one
    another.
  prefs: []
  type: TYPE_NORMAL
- en: We can see in Figure 4 that after the 3-channel image is expanded to 32 by the
    first layer, this channel count increases to 64, 128, and so on all the way to
    1024 in the subsequent processes. This is basically the reason that I set this
    class to accept the number of input and output channels (`in_channels` and `out_channels`)
    so that we can initialize the layer with flexible channel configurations. It is
    also important to keep in mind that we need to adjust this channel counts based
    on `ALPHA`. This can simply be done using the code at line `#(2)` and `#(3)`.
    Furthermore, here I also create a flag called `downsample` as the input parameter
    which by default is set to `False`. This flag is responsible to determine whether
    the layer will reduce the spatial dimension. Again, if you go back to Figure 4,
    you will notice that there are conditions where we reduce the spatial dimension
    by half and there are also some other conditions where the dimension is preserved.
    Every time we want to perform downsampling, we need to set the stride to 2, but
    if we don’t, we will set this parameter to 1 instead (`#(4)`).
  prefs: []
  type: TYPE_NORMAL
- en: Still with the Codeblock 5 above, the next thing we need to do is to initialize
    the layers themselves. As we have discussed earlier, the depthwise convolution
    is responsible to capture spatial relationships between pixels, which is actually
    the reason that the kernel size is set to 3×3 (`#(6)`). In order for the input
    channels to be processed independently of each other, we can simply set the `groups`
    and `out_channels` parameters to be the same as the number of input channels itself
    (`#(8)` and `#(5)`). It is worth noting that if we set `out_channels` to be more
    than the number of input channels — say, twice as large — then we will have each
    channel processed by 2 kernels. Lastly for the depthwise convolution layer, the
    `stride` parameter at line `#(7)` can either be 1 or 2 which is determined according
    to the `downsampling` flag we discussed earlier.
  prefs: []
  type: TYPE_NORMAL
- en: Meanwhile, the pointwise convolution uses 1×1 kernel (`#(11)`) since it is not
    intended to capture spatial information. This is actually the reason that we set
    the padding to 0 (`#(13)`) because there is no way this kernel size can reduce
    spatial dimension on its own. The `groups` parameter, on the other hand, is set
    to 1 (`#(14)`) because we want this layer to capture information from all channels
    at once. Unlike the depthwise convolution layer, here we can employ as many kernels
    as needed which corresponds to the number of channels in the resulting output
    tensor (`#(10)`). Meanwhile, the stride is set fixed to 1 (`#(12)`) since we will
    never perform downsampling with this layer.
  prefs: []
  type: TYPE_NORMAL
- en: Here we need to initialize two separate batch normalization layers to be placed
    after the depthwise and pointwise convs (`#(9)` and `#(15)`). As for the ReLU
    activation function, we only need to initialize it once (`#(16)`) since it is
    just a mapping function without any trainable parameters. Thanks to this, we can
    reuse the same ReLU instance multiple times within the network.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s see if our `DepthwiseSeparableConv` class works properly by passing
    a dummy tensor through it. Here I have prepared two test cases for this class.
    The first one is when we don’t perform downsampling and the second one is when
    we do. In Figure 10 below, the two tests I want to perform involve the use of
    the layers highlighted in green and blue, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/48871eb735c0e34108f6241b46e5ea57.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10\. The layers highlighted in green and blue are the ones we are going
    to simulate to test the DepthwiseSeparableConv class [1][2].
  prefs: []
  type: TYPE_NORMAL
- en: To create the green part, we can simply use the `DepthwiseSeparableConv` class
    and set the number of input and output channels to 32 and 64 as seen in Codeblock
    6 below (`#(1–2)`). Passing `downsample = False` is not quite necessary since
    we already set it as the default configuration (`#(3)`) — but I do this anyway
    just for the sake of clarity. The shape of the dummy tensor `x` is also configured
    to have the size of 32×112×112, in which it matches exactly with the input shape
    of the layer (`#(4)`).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: If you run the above code, the following output should appear on your screen.
    Here you can see that the depthwise convolution layer returns a tensor of the
    exact same shape as the input (`#(1)`). The number of channels then doubles from
    32 to 64 after the tensor being processed by the pointwise convolution (`#(2)`).
    This result proves that our `DepthwiseSeparableConv` class works properly for
    non-downsampling process. We will use this output tensor in the subsequent test
    as the input for the blue layer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The second test is quite similar to the first one, except that here we need
    to configure the model based on the number of input and output channels of the
    blue layer. Not only that, the `downsample` parameter also needs to be set to
    `True` since we want the layer to reduce the spatial dimension by half. See Codeblock
    7 below for the details.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: We can see in the above output that the spatial downsampling works properly
    as the depthwise convolution layer successfully converted the 112×112 image to
    56×56 (`#(1)`). The channel axis is finally expanded to 128 with the help of the
    pointwise convolution layer (`#(2)`), making it ready to be fed into the subsequent
    layer.
  prefs: []
  type: TYPE_NORMAL
- en: Based on the two tests I demonstrated above, it is proven that our `DepthwiseSeparableConv`
    class is correct and thus ready to be used to construct the entire MobileNetV1
    architecture.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Entire MobileNetV1 Architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I wrap everything within a class which I refer to as `MobileNetV1`. Since this
    class is quite long, I break it down into Codeblock 8a and 8b. If you want to
    run this code yourself, just ensure that these two codeblocks are written within
    the same notebook cell.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s start from the `__init__()` method of this class. The first thing
    to do here is to initialize the `FirstConv` layer we created earlier (`#(1)`).
    The next layers we need to initialize are the core idea of MobileNet, i.e., the
    depthwise separable convolutions, in which every single of those layers consists
    of depthwise and pointwise convs. In this implementation I decided to name these
    pairs starting from `depthwise_sep_conv0` all the way to `depthwise_sep_conv8`.
    If you go back to Figure 4, you will notice that the downsampling process is done
    alternately with the non-downsampling layers. This can simply be implemented by
    setting the `downsample` flag to `True` for the layers number 1, 3, 5 and 7\.
    The `depthwise_sep_conv6` is a bit special since it is actually not a standalone
    layer. Rather, it is a bunch of depthwise separable convolutions of the exact
    same specification repeated 5 times.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'As we have reached the very last `DepthwiseSeparableConv` layer (`#(2)`), what
    we need to do next is to initialize three more layers: an average pooling layer
    (`#(4)`), a fully-connected layer (`#(5)`), and a softmax activation function
    layer (`#(6)`). One thing that you need to keep in mind is that the number of
    output channels produced by the `depthwise_sep_conv8` is not always 1024 even
    though it appears to be fixed to that number. In fact, this output channel count
    will be different if we change the `ALPHA`. In order to make our implementation
    adaptive to such changes, we need to take the actual number of output channels
    generated using the code at line `#(3)`, which will then be used as the input
    size of the fully-connected layer (`#(5)`).'
  prefs: []
  type: TYPE_NORMAL
- en: Regarding the `forward()` method in Codeblock 8b, I think there is nothing I
    need to explain since what we basically do here is just to pass a tensor from
    one layer to the subsequent ones.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Now let’s see if our MobileNetV1 works properly by running the following test
    code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: And below is what the output looks like. Here we can see that our dummy image
    tensor successfully went through the `first_conv` layer all the way to the final
    output layer. During the convolution phase, we can see that the spatial dimension
    decreased as we get into the deeper layers while at the same time the number of
    channels increased. Afterwards, we apply an average pooling layer which works
    by taking the average value from each channel. We can say that at this point every
    single channel of size 7×7 is now represented as a single value, which is actually
    the reason that the spatial dimension dropped to 1×1 (`#(1)`). This tensor is
    then flattened (`#(2)`) so that we can process it further with the fully-connected
    layer (`#(3)`).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: If you want an even more detailed architecture, we can use the `summary()` function
    from `torchinfo` we imported earlier. If you scroll down the resulting output
    below, we can see that this model contains approximately 4.2 million trainable
    parameters, in which this number matches with the one written in Figure 5, 6,
    7 and 8\. I also tried to initialize the same model with different `ALPHA`, and
    I found that the numbers match with the table in Figure 6\. Thanks to this reason,
    I think our MobileNetV1 implementation is correct.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Ending
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: That was pretty much everything about MobileNetV1\. I do encourage you to play
    around with the above model. If you want to train it for image classification,
    you can adjust the number of neurons in the output layer according to the number
    of classes available in your dataset. You can also try to explore different *α*
    and *ρ* to find the values that suit best for your case in terms of accuracy and
    efficiency. Furthermore, since this implementation is literally done from scratch,
    it is also possible to change other things that are not explicitly mentioned in
    the paper, such as the number of repeats of the `depthwise_sep_conv6` layer, or
    even using *α* and *ρ* greater than 1\. And well, there are basically lots of
    things to explore from our MobileNetV1 implementation! You can also access the
    code used in this article in my GitHub repository [3].
  prefs: []
  type: TYPE_NORMAL
- en: Feel free to comment if you spot any mistake in my explanation or the code.
    Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
