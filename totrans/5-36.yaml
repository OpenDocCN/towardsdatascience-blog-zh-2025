- en: '**[Step-by-Step Guide for Building Bump Charts in Plotly](https://towardsdatascience.com/step-by-step-guide-for-building-bump-charts-in-plotly-ef7c84ad3a0b)**Ready
    to move on from bar charts into more advanced and custom formats? Don’t miss [Amanda
    Iglesias Moreno](None)‘s Plotly-based tutorial, which introduces a complete workflow
    for creating a bump chart, a more specialized visualization that is "designed
    to explore changes in a ranking over time" and allows us to "quickly identify
    trends and detect elements at the top or bottom of the ranking."'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[Plotly中构建波峰图的逐步指南](https://towardsdatascience.com/step-by-step-guide-for-building-bump-charts-in-plotly-ef7c84ad3a0b)**
    准备从柱状图过渡到更高级和定制的格式吗？不要错过[Amanda Iglesias Moreno](None)的基于Plotly的教程，该教程介绍了一个创建波峰图的完整工作流程，这是一种更专业的可视化方式，旨在“探索排名随时间的变化”，并允许我们“快速识别趋势并检测排名的顶部或底部元素。”'
- en: '**[Easy Map Boundary Extraction with GeoPandas](https://towardsdatascience.com/easy-map-boundary-extraction-with-geopandas-7ee1465e1344)**Working
    with geospatial data can be very rewarding—not to mention essential in many industries—but
    it can also get tricky and occasionally unwieldy. [Lee Vaughan](None)‘s latest
    Python guide brings clarity and practicality to a very common use case: extracting,
    measuring, and plotting country borders.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[使用GeoPandas轻松提取地图边界](https://towardsdatascience.com/easy-map-boundary-extraction-with-geopandas-7ee1465e1344)**
    与地理空间数据一起工作可以非常有成就感——不用说，在许多行业中都是必不可少的——但它也可能变得复杂，有时甚至难以控制。[Lee Vaughan](None)的最新Python指南为一个非常常见的用例带来了清晰性和实用性：提取、测量和绘制国家边界。'
- en: '* * *'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: A new year often brings with it a rush of excellent new writing, and so far
    2025 has not disappointed on that front. Here are several recent standouts on
    a wide range of topics, from hands-on AI projects to the history of GPT models.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 新年常常带来大量优秀的新作品，到目前为止，2025年在这一方面并没有让人失望。以下是一些最近在广泛主题上的亮点，从实际的人工智能项目到GPT模型的历史。
- en: What would it take for a [supervised-learning model to solve a Rubik’s Cube](https://towardsdatascience.com/solving-a-rubiks-cube-with-supervised-learning-intuitively-and-exhaustively-explained-4f87b72ba1e2)?
    [Daniel Warfield](None)‘s latest deep dive walks us through a fun and enlightening
    project.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要让一个[监督学习模型解决魔方问题](https://towardsdatascience.com/solving-a-rubiks-cube-with-supervised-learning-intuitively-and-exhaustively-explained-4f87b72ba1e2)需要什么？[Daniel
    Warfield](None)的最新深入研究带我们参观了一个既有趣又富有教育意义的工程项目。
- en: As more and more AI-generated content floods contemporary media and online spaces,
    [Stephanie Kirmer](None) wonders [how we should assess its cultural impact](https://towardsdatascience.com/the-cultural-impact-of-ai-generated-content-part-2-228bf685b8ff)—and
    navigate its (many) pitfalls.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着越来越多的AI生成内容充斥着当代媒体和在线空间，[Stephanie Kirmer](None)思考我们应该如何评估其文化影响[https://towardsdatascience.com/the-cultural-impact-of-ai-generated-content-part-2-228bf685b8ff]——以及如何应对其（许多）陷阱。
- en: For a solid understanding of cutting-edge LLMs, a trip down memory lane (all
    the way back to the prehistoric era of 2019–2020) might be a good idea—and [Shirley
    Li](None)‘s [thorough and accessible retrospective of GPT-2 and GPT-3](https://towardsdatascience.com/understanding-the-evolution-of-chatgpt-part-2-gpt-2-and-gpt-3-77a01ed934c5)
    offers us precisely that.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了对最前沿的LLM有一个扎实的理解，回顾一下记忆中的历史（一直追溯到2019-2020年的史前时代）可能是个好主意——[Shirley Li](None)的[详尽易懂的GPT-2和GPT-3回顾](https://towardsdatascience.com/understanding-the-evolution-of-chatgpt-part-2-gpt-2-and-gpt-3-77a01ed934c5)正好提供了这样的内容。
- en: If you’re in the mood for something more hands-on this week, we highly recommend
    [Maeda Hanafi, PhD](None)‘s new guide to [customizing your fine-tuning code](https://towardsdatascience.com/customizing-your-fine-tuning-code-using-huggingfaces-transformers-library-65cf2aa806ca)
    with Hugging Face’s Transformers library.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你这周想做一些更实际的事情，我们强烈推荐[Maeda Hanafi, PhD](None)的新指南，该指南介绍了如何使用Hugging Face的Transformers库[自定义你的微调代码](https://towardsdatascience.com/customizing-your-fine-tuning-code-using-huggingfaces-transformers-library-65cf2aa806ca)。
- en: Are we approaching the point where [AI might be able to reliably determine if
    something is funny](https://towardsdatascience.com/think-you-know-a-joke-ai-for-humor-detection-6c2db1472347)?
    [Vineet Upadhya](None)‘s latest article reviews recent research into this fascinating
    topic, including a new framework for computational humor detection.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们是否正接近AI能够可靠地判断某件事是否有趣的点[https://towardsdatascience.com/think-you-know-a-joke-ai-for-humor-detection-6c2db1472347]？[Vineet
    Upadhya](None)的最新文章回顾了关于这个有趣话题的最新研究，包括一个用于计算幽默检测的新框架。
- en: Establishing causality is a common goal for data practitioners, but that doesn’t
    make it any less difficult to pull off. For his debut TDS post, [Rémy Garnier](None)
    presents a [versatile method that you can apply across a wide range of use cases](https://towardsdatascience.com/the-data-scientists-dilemma-answering-what-if-questions-without-experiments-866a1412342a).
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立因果关系是数据从业者共同的目标，但这并不意味着实现起来更容易。在他的首次 TDS 帖文中，[Rémy Garnier](None) 介绍了一种[多用途的方法，可以应用于广泛的用例](https://towardsdatascience.com/the-data-scientists-dilemma-answering-what-if-questions-without-experiments-866a1412342a)。
- en: 'After sharing a well-received list of AI projects you can experiment with over
    a weekend, [Shaw Talebi](None) fleshes out [the details of one of his proposed
    ideas](https://towardsdatascience.com/how-to-build-a-resume-optimizer-with-ai-d73c2f9b9fcd):
    an AI-powered resume optimizer.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在分享了一个周末可以尝试的 AI 项目列表后，[Shaw Talebi](None) 详细阐述了他提出的一个想法的[细节](https://towardsdatascience.com/how-to-build-a-resume-optimizer-with-ai-d73c2f9b9fcd)：一个由人工智能驱动的简历优化器。
- en: '* * *'
