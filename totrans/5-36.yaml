    Yes and No." [Yu Dong](None) zooms in on an often-undervalued aspect of data professionals’
    work, and explains why it’s time to reevaluate and streamline your approach to
    dashboard creation.'
- en: '**[Awesome Plotly with Code Series (Part 8): How to Balance Dominant Bar Chart
    Categories](https://towardsdatascience.com/awesome-plotly-with-code-series-part-8-how-to-balance-dominant-bar-chart-categories-d6d292e81587)**For
    the past few months, [Jose Parreño](None)‘s excellent series has addressed some
    of the main pain points of designing functional, easy-to-digest charts. His latest
    installment takes a close, pragmatic look at a common scenario where one category
    threatens to throw an entire bar chart off-balance.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[Awesome Plotly with Code Series (Part 8): How to Balance Dominant Bar Chart
