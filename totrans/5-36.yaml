- en: 'Charts, Dashboards, Maps, and More: Data Visualization in the Spotlight'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/charts-dashboards-maps-and-more-data-visualization-in-the-spotlight-67d71ddf6614/](https://towardsdatascience.com/charts-dashboards-maps-and-more-data-visualization-in-the-spotlight-67d71ddf6614/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Feeling inspired to write your first TDS post? [We’re always open to contributions
    from new authors](http://bit.ly/write-for-tds).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Buzzwords and trends come and go, but the core task of telling compelling stories
    with data remains one of the main pillars in data scientists’ daily workflow.
    For practitioners who’d like to up their visualization game, this week we’re highlighting
    some of our best recent articles on creating powerful, effective, and sleek deliverables.
  prefs: []
  type: TYPE_NORMAL
- en: Our selection tackles the topic from multiple angles, so whether you’re interested
    in chart optimization, geospatial aids, or interactive dashboards, we’re sure
    you’ll find something here to inspire you and help you expand your current skill
    set. Happy tinkering!
  prefs: []
  type: TYPE_NORMAL
- en: '**[How to Make Extremely Beautiful Charts with Python](https://towardsdatascience.com/how-to-make-extremely-beautiful-charts-with-python-a2c95a7b24b9)**Why
    settle for "meh…" when "wow!" is within reach? [Ari Joury, PhD](None) challenges
    us to stop settling for mediocre visualizations, shows how a few smart and focused
    tweaks can transform your average chart into something you can truly be proud
    of, and offers more than a few concrete examples (and code snippets) to make these
    suggestions both concrete and actionable.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[5 Essential Tips to Build Business Dashboards Stakeholders Love](https://towardsdatascience.com/5-essential-tips-to-build-business-dashboards-stakeholders-love-3312c8a94b6c)**"You
    might be wondering, isn’t dashboarding just creating a bunch of charts? Well,
    Yes and No." [Yu Dong](None) zooms in on an often-undervalued aspect of data professionals’
    work, and explains why it’s time to reevaluate and streamline your approach to
    dashboard creation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Awesome Plotly with Code Series (Part 8): How to Balance Dominant Bar Chart
    Categories](https://towardsdatascience.com/awesome-plotly-with-code-series-part-8-how-to-balance-dominant-bar-chart-categories-d6d292e81587)**For
    the past few months, [Jose Parreño](None)‘s excellent series has addressed some
    of the main pain points of designing functional, easy-to-digest charts. His latest
    installment takes a close, pragmatic look at a common scenario where one category
    threatens to throw an entire bar chart off-balance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Photo by Wenhao Ruan on Unsplash](../Images/b5f93ed135ebd67f3b5bfa0e161405a8.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Wenhao Ruan](https://unsplash.com/@wenhao_ruan?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: '**[Step-by-Step Guide for Building Bump Charts in Plotly](https://towardsdatascience.com/step-by-step-guide-for-building-bump-charts-in-plotly-ef7c84ad3a0b)**Ready
    to move on from bar charts into more advanced and custom formats? Don’t miss [Amanda
    Iglesias Moreno](None)‘s Plotly-based tutorial, which introduces a complete workflow
    for creating a bump chart, a more specialized visualization that is "designed
    to explore changes in a ranking over time" and allows us to "quickly identify
    trends and detect elements at the top or bottom of the ranking."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Easy Map Boundary Extraction with GeoPandas](https://towardsdatascience.com/easy-map-boundary-extraction-with-geopandas-7ee1465e1344)**Working
    with geospatial data can be very rewarding—not to mention essential in many industries—but
    it can also get tricky and occasionally unwieldy. [Lee Vaughan](None)‘s latest
    Python guide brings clarity and practicality to a very common use case: extracting,
    measuring, and plotting country borders.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: A new year often brings with it a rush of excellent new writing, and so far
    2025 has not disappointed on that front. Here are several recent standouts on
    a wide range of topics, from hands-on AI projects to the history of GPT models.
  prefs: []
  type: TYPE_NORMAL
- en: What would it take for a [supervised-learning model to solve a Rubik’s Cube](https://towardsdatascience.com/solving-a-rubiks-cube-with-supervised-learning-intuitively-and-exhaustively-explained-4f87b72ba1e2)?
    [Daniel Warfield](None)‘s latest deep dive walks us through a fun and enlightening
    project.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As more and more AI-generated content floods contemporary media and online spaces,
    [Stephanie Kirmer](None) wonders [how we should assess its cultural impact](https://towardsdatascience.com/the-cultural-impact-of-ai-generated-content-part-2-228bf685b8ff)—and
    navigate its (many) pitfalls.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For a solid understanding of cutting-edge LLMs, a trip down memory lane (all
    the way back to the prehistoric era of 2019–2020) might be a good idea—and [Shirley
    Li](None)‘s [thorough and accessible retrospective of GPT-2 and GPT-3](https://towardsdatascience.com/understanding-the-evolution-of-chatgpt-part-2-gpt-2-and-gpt-3-77a01ed934c5)
    offers us precisely that.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you’re in the mood for something more hands-on this week, we highly recommend
    [Maeda Hanafi, PhD](None)‘s new guide to [customizing your fine-tuning code](https://towardsdatascience.com/customizing-your-fine-tuning-code-using-huggingfaces-transformers-library-65cf2aa806ca)
    with Hugging Face’s Transformers library.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are we approaching the point where [AI might be able to reliably determine if
    something is funny](https://towardsdatascience.com/think-you-know-a-joke-ai-for-humor-detection-6c2db1472347)?
    [Vineet Upadhya](None)‘s latest article reviews recent research into this fascinating
    topic, including a new framework for computational humor detection.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Establishing causality is a common goal for data practitioners, but that doesn’t
    make it any less difficult to pull off. For his debut TDS post, [Rémy Garnier](None)
    presents a [versatile method that you can apply across a wide range of use cases](https://towardsdatascience.com/the-data-scientists-dilemma-answering-what-if-questions-without-experiments-866a1412342a).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'After sharing a well-received list of AI projects you can experiment with over
    a weekend, [Shaw Talebi](None) fleshes out [the details of one of his proposed
    ideas](https://towardsdatascience.com/how-to-build-a-resume-optimizer-with-ai-d73c2f9b9fcd):
    an AI-powered resume optimizer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for supporting the work of our authors! As we mentioned above, we
    love publishing articles from new authors, so if you’ve recently written an interesting
    project walkthrough, tutorial, or theoretical reflection on any of our core topics,
    don’t hesitate to [share it with us](http://bit.ly/write-for-tds).
  prefs: []
  type: TYPE_NORMAL
- en: Until the next Variable,
  prefs: []
  type: TYPE_NORMAL
- en: TDS Team
  prefs: []
