- en: How to Become a Machine Learning Engineer (Step-by-Step)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/dont-follow-generic-ml-engineer-roadmaps-do-this-instead-2/](https://towardsdatascience.com/dont-follow-generic-ml-engineer-roadmaps-do-this-instead-2/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*<mdspan datatext="el1757550529619" class="mdspan-comment">Did you know that</mdspan>
    machine learning engineers are currently the highest-paid tech professionals in
    the UK*?'
  prefs: []
  type: TYPE_NORMAL
- en: According to [Levels.fyi](https://www.levels.fyi/t/software-engineer/title/machine-learning-engineer?country=253),
    the average salary is almost **£100k** — higher than software engineers, AI engineers,
    and data scientists.
  prefs: []
  type: TYPE_NORMAL
- en: '**But it’s not just about the paycheque.**'
  prefs: []
  type: TYPE_NORMAL
- en: As a machine learning engineer, you get to tackle fascinating problems, experiment
    with cutting-edge tools, and actually positively affect the world.
  prefs: []
  type: TYPE_NORMAL
- en: I can tell you from first hand experience — it’s one of the most exciting and
    fulfilling jobs.
  prefs: []
  type: TYPE_NORMAL
- en: So in this article, I’ll give you a clear and simple learning roadmap to becoming
    a machine learning engineer, along with the best resources.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get into it!
  prefs: []
  type: TYPE_NORMAL
- en: Maths and Statistics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I have said it time and time again, but maths and statistics are by far the
    most important things you should learn if you want a career in machine learning
    or in data as a whole.
  prefs: []
  type: TYPE_NORMAL
- en: Technologies come and go, think blockchain and AI, but maths remains a fundamental
    staple throughout the centuries.
  prefs: []
  type: TYPE_NORMAL
- en: Fortunately, you don’t need to be some maths genius to work in machine learning,
    I can wholeheartedly confirm this from first-hand experience.
  prefs: []
  type: TYPE_NORMAL
- en: The level of maths required is equivalent is most of the things you get taught
    in your final years of high school and first year or two of an undergraduate STEM
    degree.
  prefs: []
  type: TYPE_NORMAL
- en: 'In general, there are three areas of maths you need to study:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Linear Algebra** — To learn about matrices, eigenvalues and vectors. These
    are used everywhere in areas like principal component analysis (PCA), TensorFlow,
    I mean, even a dataframe is a matrix!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Calculus** — To learn about differentiation, which is how algorithms like
    gradient descent and backpropagation work under the hood. These are literally
    used inside every machine learning algorithm for training and learning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Statistics** — To understand probability, distributions, Bayesian statistics,
    the central limit theorem and maximum likelihood estimation. Statistics is the
    most valuable one out of the three, and I would focus most of my attention here.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Practical Statistics for Data Scientists**](https://amzn.to/48081yA) **(affiliate
    link)**— Teaches you statistics that are directly relevant for the job with hands-on
    exercises in Python. I like this as you don’t spend time learning useless knowledge,
    so its very “productive.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Mathematics for Machine Learning**](https://amzn.to/4648ixS) **(affiliate
    link)** — Best all-round book to learn the maths, but quite dense, so use it as
    a reference text. I certainly haven’t read it end-to-end!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Mathematics for Machine Learning and Data Science Specialisation**](https://www.coursera.org/specializations/mathematics-for-machine-learning-and-data-science/) — My
    top pick is a course specifically targeting the maths skills required for the
    job, and it’s taught by [DeepLearning.AI](https://www.deeplearning.ai/), a fantastic
    educational company.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*I have a full article explaining more in depth the maths topics you need*
    *and a more thorough breakdown.*'
  prefs: []
  type: TYPE_NORMAL
- en: '[How to Learn the Math Needed for Machine Learning](https://towardsdatascience.com/how-to-learn-the-math-needed-for-machine-learning/)'
  prefs: []
  type: TYPE_NORMAL
- en: Python
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Python is the lingua franca when it comes to machine learning; forget about
    R, learn Python. (Sorry to my R lovers out there!)
  prefs: []
  type: TYPE_NORMAL
- en: A common theme I have observed among my coaching clients and beginners I have
    spoken to is that they are trying to find the “best” course to learn Python.
  prefs: []
  type: TYPE_NORMAL
- en: I will reiterate this point again, the “best” does not exist, so stop looking
    for it; it’s simply a form of procrastination. Any popular introduction to Python
    course will work, as they will teach you the exact same things.
  prefs: []
  type: TYPE_NORMAL
- en: 'Anyway, the main things you want to learn are:'
  prefs: []
  type: TYPE_NORMAL
- en: Native data structures (dicts, tuples, list)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For and while loops
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If-else conditional statements
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Functions and classes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Common libraries
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Design patterns
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You also want to learn popular machine learning packages, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**NumPy**](https://numpy.org/devdocs/user/quickstart.html) — Numerical computing
    for arrays.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Pandas**](https://www.w3schools.com/python/pandas/default.asp) — Data manipulation
    and analysis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Matplotlib**](https://matplotlib.org/stable/tutorials/index.html)— Data
    visualisation and plotting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**scikit-learn**](https://scikit-learn.org/1.4/tutorial/index.html)— Implementing
    fundamental ML algorithms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[SciPy](https://scipy.org/)** — General scientific computing package.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**W3Schools Python Course **](https://www.w3schools.com/python/)**— **Great
    free resource; I used this when I was learning Python and still do today now and
    then.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Python for Everybody Specialisation**](https://imp.i384100.net/e4ZdXX)**—**
    Probably the most popular course on Python that many people have recommended,
    so it must be decent!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Machine Learning with Python and Scikit-Learn — Full Course**](https://www.youtube.com/watch?v=hDKCxebp88A) — A
    video course on implementing basic ML algorithms using Python. This is invaluable
    to your learning, as it will build intuition about how these algorithms work under
    the hood.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SQL
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As a machine learning engineer, you will be spending a reasonable amount of
    time working in SQL when trying to create datasets or do some feature engineering.
  prefs: []
  type: TYPE_NORMAL
- en: I probably work in SQL around 30-40% of my time as a machine learning engineer.
    That’s a lot, so you definitely need to be well versed in it, more than you think.
  prefs: []
  type: TYPE_NORMAL
- en: 'The things to learn are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**SELECT * FROM**, **AS**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ALTER, INSERT, CREATE**, **UPDATE**, **DELETE**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**GROUP BY, ORDER BY**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**WHERE, AND, OR, BETWEEN, IN, HAVING**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AVG, COUNT, MIN, MAX, SUM**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**FULL JOIN, LEFT JOIN, RIGHT JOIN, INNER JOIN, UNION**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CASE**, **IFF**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DATEADD, DATEDIFF, DATEPART**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PARTITION BY, QUALIFY, ROW()**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**The Complete SQL Bootcamp: Go from Zero to Hero**](https://www.udemy.com/course/the-complete-sql-bootcamp/)** — **The
    first course I took on SQL and it was fantastics. Highly recommend.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**W3Schools SQL Tutorial**](https://www.w3schools.com/python/)** — **Again,
    a great free resource and I still use today.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Tutorialspoint SQL Tutorial**](https://www.tutorialspoint.com/python/index.htm)** — **Another
    free resource, I used this when learning SQL as well.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are many free resources for SQL, so I don’t recommend you bother spending
    money on a course, unless you really want to. You can also always use ChatGPT
    as well!
  prefs: []
  type: TYPE_NORMAL
- en: Machine Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To everyone’s surprise, we need to learn machine learning to be a machine learning
    engineer!
  prefs: []
  type: TYPE_NORMAL
- en: This is arguably the most fun part of the roadmap and what most people get into
    this field for. I get it, because it was the reason I decided to work in machine
    learning!
  prefs: []
  type: TYPE_NORMAL
- en: I would be lying if I said learning these algorithms was always fun. It does
    require a bit of mental effort and time to fully grasp all the concepts, but eventually,
    things will click, and it will be well worth it.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key algorithms and concepts you need are:'
  prefs: []
  type: TYPE_NORMAL
- en: Linear, logistic and polynomial regression.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generalised linear models and generalised additive models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Decision trees, random forests and gradient-boosted trees.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Support vector machines.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: K-means and K-nearest neighbour clustering.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature engineering, particularly how to deal with categorical features.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluation metrics for different types of problems.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regularisation, bias vs variance tradeoff and cross-validation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gradient descent and backpropagation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Machine Learning Specialisation by Andrew Ng**](https://www.coursera.org/learn/machine-learning)— This
    the first ML course I took, and I think it is probably the best one out there.
    Andrew is honestly the best teacher, this course is one everyone should take in
    my opinion.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**The Hundred-Page ML Book** ](https://www.amazon.co.uk/Hundred-Page-Machine-Learning-Book/dp/199957950X/ref=sr_1_1?crid=1DVBXKO7IKC9Q&dib=eyJ2IjoiMSJ9.rUY-wv-1jUplgHNQ3dtek-v-vTbBuEVOMVXBTSVF6iu3HUk7tznF0Hvgi0ifuejIkX60W0pjo4kdibxq_jxXy7DB_TL1WG_yduT6nHm_4FTDY1M4lx3i-aYBwikD2aIV0xhHQozcVSpMxjUXWUnewa5rgKfPTbU1clSABpDUmcA9k5T2OmmVGQ12P0GxgV9sY-ig8nAf1hYzoisoxf5ucFLX9a80mzMlsO-rqRJuG_Y.cs89FCqXXNq9NrJYESUesPyAVMsro6iypsvdULHE-eU&dib_tag=se&keywords=hundred+page+machine+learning+book&qid=1757628851&sprefix=hundred+page+mac%2Caps%2C125&sr=8-1)— Concise
    with practical insights into building ML models and the core theory behind them.
    Lovely nighttime reading.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Hands-On ML with Scikit-Learn, Keras, and TensorFlow](https://www.amazon.co.uk/Hands-Machine-Learning-Scikit-Learn-TensorFlow/dp/1098125975/ref=sr_1_1?dib=eyJ2IjoiMSJ9.0Jm1bLoXUBA_cK-tar7HW1L7KzUCRFLa7mcRAFq-rLTFBDwJcqrxLs_2XD9Srzd9sgYCDAQJbctUh6ajqkB-epTKQP8ww8CVFDlIrzfWkhTJvogID_1jUtxwcKRaafNT7Fv-_45jrmZBV01DfaT8n9UY0aFEhJTd5T3W50fC21189cGVXoXUY7T3Wgn8Q_j6urWV6KZov4d03-Rs3RNeHnOl3sVAnYZ3zdzyxiH4Ysc.KlgRYULiHzLjKj2kqmIWlwFkTEBAaqzbQMsRx7jyQ_8&dib_tag=se&keywords=hands+on+machine+learning+with+scikit-learn+and+tensorflow+3&qid=1757628807&sr=8-1&ufe=app_do%3Aamzn1.fos.95fd378e-6299-4723-b1f1-3952ffba15af)** — If
    I had to give only one book to learn machine learning, this would be it! This
    book is the GOAT and covers literally every topic you would need as an entry/mid-level
    machine learning engineer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Deep Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Being honest, the fundamental machine learning algorithms will cover the majority
    of models you will build in your career.
  prefs: []
  type: TYPE_NORMAL
- en: I still use regular regression models most of the time!
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning is beneficial in scenarios such as natural language processing
    and computer vision, but its use in my daily work is minimal beyond these areas.
  prefs: []
  type: TYPE_NORMAL
- en: However, take this with a pinch of salt, given that I specialise in time series
    forecasting and optimisation problems, which are notoriously tricky for deep learning
    to perform well in.
  prefs: []
  type: TYPE_NORMAL
- en: With all that said, deep learning is an area all machine learning engineers
    should be somewhat aware of as it is a core part of the field.
  prefs: []
  type: TYPE_NORMAL
- en: 'The areas you want to study are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Neural Networks](https://towardsdatascience.com/optimisation-algorithms-neural-networks-101-256e16a88412/) — **The
    algorithm that put machine learning on the map. I am sure many of you have heard
    of this algorithm.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Convolutional Neural Networks](https://towardsdatascience.com/convolution-explained-introduction-to-convolutional-neural-networks-5babc47fbcaa/) — **These
    are used for computer vision and image detection. The key difference is that they
    use the convolution operation to “pre-select” information before passing it into
    a regular neural network.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Recurrent Neural Networks](https://towardsdatascience.com/recurrent-neural-networks-an-introduction-to-sequence-modelling-478e0e07c4ec/) — **A
    little bit obsolete now, but were the original deep learning algorithm for sequence
    models like time series and natural language. The most popular one you may have
    heard of is sequence to sequence modelling.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Transformers — **The current state-of-the-art model that is behind all the
    AI hype and growth. This comes from the famous paper [“Attention Is All You Need”](https://arxiv.org/abs/1706.03762),
    that I highly recommend you read!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Deep Learning Specialization by Andrew Ng**](https://www.coursera.org/specializations/deep-learning). — This
    is the follow-on course from the Machine Learning Specialisation and will teach
    all you need to know about deep learning, CNNs, RNNs and transformers. So, everything
    in the above list!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Neural Networks: Zero to Hero**](https://www.youtube.com/playlist?list=PLAqhIrjkxbuWI23v9cThsA9GvCAUhRvKZ)** — **This
    is a YouTube course taught by the leading AI/ML research [Andrej Karpathy](https://en.wikipedia.org/wiki/Andrej_Karpathy)
    (ex Tesla and OpenAI). It starts relatively slow, building a neural network from
    scratch. However, in the last video, it gets you building your own Generative
    Pre-trained Transformers (GPT), which is the model behind ChatGPT!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Deep Learning (Adaptive Computation and Machine Learning series)](https://www.amazon.co.uk/Deep-Learning-Adaptive-Computation-Machine-ebook/dp/B08FH8Y533?crid=1OKZ83WMHAC91&dib=eyJ2IjoiMSJ9.Saa4rBtBQt0tsCt0SumEAmBIXjIHjU2RJZSzlquco31rplp6RgyuY6u5Qyl8iPeERtDOIwnuHqS_LRSWQ_NH6FlmD887Ct7M-Oe6q1bPBX5EkPQAbzQw7dp5Dq9T9RqTYjMQblkcSooypecdlFiQ4mjb3o-qet9iL9rqXCPBt5yhHS5kjYeLcOiEWDi8cVgrV72yNcyfhSvlSXSxoA1Dmy3y7sOUySHo9yqudMxIG4g.u8zb_AzWPDUsTYUsGKy-XX2_ExfqsQYgq9WGxKdeTCM&dib_tag=se&keywords=deep+learning+ian+goodfellow&qid=1757188171&sprefix=deep+learning,aps,95&sr=8-1&linkCode=sl1&tag=egorhowell06-21&linkId=9144052e784483f7d063ca3c49c25db3&language=en_GB&ref_=as_li_ss_tl) — **This
    book is written by one of the Godfathers of AI, [Yoshua Bengio](https://en.wikipedia.org/wiki/Yoshua_Bengio).
    That pretty much says it all about why I am recommending this book!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Software Engineering
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Given the title is machine learning “engineer”, you need to know software engineering
    best practices as this is important when deploying your models to production.
  prefs: []
  type: TYPE_NORMAL
- en: When I was trying to become a machine learning engineer, I really underestimated
    the engineering part. I can even argue now that it’s more important than the theoretical
    machine learning knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: Theory is just theory; where you really earn your money is by helping the company
    and business make decisions with your algorithms. For that, you need to know software
    engineering.
  prefs: []
  type: TYPE_NORMAL
- en: 'The areas you need to know are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data Structures and Algorithms** — For passing interviews and helping you
    write better code. Learn the basics and make sure to practise.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Arrays
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Linked lists
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Queues
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Sorting
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Binary search
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Trees
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Hashing
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Graphs
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**System Design** — For passing interviews and understanding how to deploy
    machine learning algorithms at scale. Once again, learn the basics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Networking
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: APIs
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Caching
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Proxies
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Storage
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Production Code **— Writing well-tested and efficient code through things
    like typing, linting, testing and using principles such as [DRY](https://en.wikipedia.org/wiki/Don%27t_repeat_yourself),
    [KISS](https://en.wikipedia.org/wiki/KISS_principle) and [YAGNI](https://en.wikipedia.org/wiki/You_aren%27t_gonna_need_it).
    This is probably the most crucial part to learn, as it is the most applicable
    to the job.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**APIs — **The majority of software operates using [APIs](https://en.wikipedia.org/wiki/API),
    and many machine learning models are served as API endpoints. Understanding how
    they work and their different types.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Neetcode.io**](https://neetcode.io/courses) — Great introductory, intermediate
    and advanced data structure and algorithms courses, as well as system design courses.
    100% recommend this platform when learning software engineering fundamentals to
    anyone.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Leetcode**](https://leetcode.com/) & [**Hackerrank**](https://www.hackerrank.com/) — Platforms
    to practise for interviews. I am sure many of you have heard of “grinding LeetCode”;
    you don’t need to do that for machine learning engineer jobs as much as for software
    engineering jobs. However, you should know the basics. I recommend working through
    the [NeetCode 150](https://neetcode.io/practice?tab=neetcode150).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Software Engineering for Data Scientists](https://www.amazon.co.uk/Software-Engineering-Data-Scientists-Notebooks/dp/1098136209/ref=sr_1_1?dib=eyJ2IjoiMSJ9.aEvQnkMKMb35R7WKUx6khMR5ZnOlO1PLhLYHz7MNkOG0R_10OqHFvgL0FdS094Ov6ARiDcxP8wGnCmMylKShkrJVLydNAjA4ufj1F8_0HxD6_i2zlwH8kNqP7vzUPvgDaLAPlEMl7-oev0kfFC-kcI1e7fEYGWlYG2WvNiBKy-HyQfpAUpDJeAMfsdUxTKsNPzQn5rKoiahKBZ6AwIdfCcHWvanbXEFOHevRCp3YYpA.tWJ14ZLGNwky3iCddZpCcsXIdwGijN1901XSkL-ndes&dib_tag=se&keywords=software+engineering+for+data+scientists&qid=1757629014&sr=8-1&ufe=app_do%3Aamzn1.fos.95fd378e-6299-4723-b1f1-3952ffba15af)** — Like
    it says on the tin, a book specifically designed for data scientists to learn
    software engineering. Great alternative to learn all the software engineering
    skills if you don’t like courses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MLOps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A model in a Jupyter Notebook has literally no business value.
  prefs: []
  type: TYPE_NORMAL
- en: It’s much better to have something in production, making subpar decisions that
    benefit the business, instead of a flashy neural network in a notebook doing nothing
    but has unreal accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, if you actually want to be a sound machine learning engineer, you
    need to be able to deploy your models so you actually benefit the company from
    a financial perspective.
  prefs: []
  type: TYPE_NORMAL
- en: 'To do this, you need to learn the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cloud** — Learn cloud technologies like [AWS](https://aws.amazon.com/), [GCP](https://cloud.google.com/)
    or [Azure](https://azure.microsoft.com/en-gb). All the machine learning models
    I have worked on have been deployed on the cloud, and this is only going to increase
    in the future. AWS is the most popular, so I recommend that’s the one you learn.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Containerisation** — Learn [Docker](https://www.docker.com/) and [Kubernetes](https://kubernetes.io/);
    this is necessary for running your models in the cloud.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Version Control** — Learn [Git](https://github.com/) and Github, there is
    no way around it. This is how all software is built.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Shell/Terminal** — You will be working in your terminal a lot, so knowing
    basic [Bash](https://en.wikipedia.org/wiki/Bash_%28Unix_shell%29)/[Zsh](https://en.wikipedia.org/wiki/Z_shell)
    is essential.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Practical MLOps](https://www.amazon.co.uk/Practical-MLOps-Operationalizing-Machine-Learning/dp/1098103017/ref=sr_1_1?dib=eyJ2IjoiMSJ9.yYQO-4J8V8PUf8we9xr8xCiRGWaV0m8OB2Oc8BL6XLD4OAJZFtCuq7ZppAEQGjz-xa_xwxzkXYxJudrh9mmcl2vjIJSkOg2KNVPB47L7MyWcDkuwZptzB9rVNN96xi1mP8ReIJ4zI1zz3-7KdVi0aXxt78e7E17zj6OhRPe_ZqZZ6jejZX45ItUuFZpt75SL7Yzq0axazSOwH2umQ5wBx3g9mwkVoM-_Yult949BvDM.UU4axKOjsUTRXai6I5Rt9eK_s-3bPkjOkR4vpujXY3Y&dib_tag=se&keywords=practical+mlops&qid=1757629039&sr=8-1&ufe=app_do%3Aamzn1.fos.95fd378e-6299-4723-b1f1-3952ffba15af)**— This
    is probably the only book you need to understand how to deploy your machine-learning
    model and all the associated topics. I use it more as a reference text, but it
    teaches almost everything you need to know.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Designing Machine Learning Systems](https://www.amazon.co.uk/Designing-Machine-Learning-Systems-Production-Ready/dp/1098107969/ref=sr_1_1?dib=eyJ2IjoiMSJ9.OBDpLaGfjPFym8EGEjKYAojC7ASoxIdGfjWsP2aOBx3ivIMIel5svPLTpU_SsM9DHpsiaQpeibR3qsE7CxnIhViZHFyrEnMiViirHXM2mufFBRDIlWFVhCFqiORxNdurd2DUk_k0I7OopOOxPdTfFEOBIfOakXs8Rb4AMhy4izZqwD-WihW6LfHFuLBGxaNvrEIwPaTd4uj3RHfGLfMH3d4synL9OZ7qNmXxlSUNjqA.ldVl7wiBclj24HJQBliJba0_zmYgIifinkA6cq-N3E0&dib_tag=se&keywords=designing+machine+learning+systems&qid=1757629058&sr=8-1&ufe=app_do%3Aamzn1.fos.95fd378e-6299-4723-b1f1-3952ffba15af) **— Another
    great book and resource to vary your information sources. This is by [Chip Huyen](https://huyenchip.com/),
    who is probably the leading expert on AI/ML production systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[freeCodeCamp](https://www.freecodecamp.org/news/tag/software-engineering/)**
    — A variety of resources covering literally every software engineering and MLOps
    topic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Studying everything here will give you all the knowledge required to be a machine
    learning engineer; however, that is not enough on its own to land you a job.
  prefs: []
  type: TYPE_NORMAL
- en: You need to demonstrate your skills by building a solid portfolio with the right
    projects.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to know exactly how to do that, then check out this article where
    I explain exactly how you can do that. I will see you there!
  prefs: []
  type: TYPE_NORMAL
