- en: Using GPT-4 for Personal Styling
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用GPT-4进行个人时尚搭配
- en: 原文：[https://towardsdatascience.com/using-gpt-4-for-personal-styling/](https://towardsdatascience.com/using-gpt-4-for-personal-styling/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/using-gpt-4-for-personal-styling/](https://towardsdatascience.com/using-gpt-4-for-personal-styling/)
- en: I’ve always been fascinated by fashion—collecting unique pieces and trying to
    blend them in my own way. But let’s just say my closet was more of a **work-in-progress
    avalanche** than a curated wonderland. Every time I tried to add something new,
    I risked toppling my carefully balanced piles.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直对时尚很着迷——收集独特的单品，并尝试以自己的方式将它们融合在一起。但让我们说，我的衣橱更像是一个**正在进行中的雪崩**，而不是一个精心挑选的奇迹之地。每次我尝试添加新东西，我都冒着破坏我精心平衡的堆叠的风险。
- en: '**Why this matters:** If you’ve ever felt overwhelmed by a closet that seems
    to grow on its own, you’re not alone. For those interested in style, I’ll show
    you how I turned that chaos into outfits I actually love. And if you’re here for
    the AI side, you’ll see how a multi-step GPT setup can handle big, real-world
    tasks—like managing hundreds of garments, bags, shoes, pieces of jewelry, even
    makeup—without melting down.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么这很重要**：如果你曾经感到被一个似乎自行生长的衣橱压倒，你并不孤单。对于那些对时尚感兴趣的人，我会展示我是如何将混乱转变为真正喜欢的搭配的。如果你对AI方面感兴趣，你会看到如何通过多步骤的GPT设置来处理大型、真实世界任务——比如管理数百件衣物、包、鞋、珠宝，甚至化妆品——而不会崩溃。'
- en: 'One day I wondered: Could ChatGPT help me manage my wardrobe? I started experimenting
    with a custom GPT-based fashion advisor—nicknamed **Glitter** (*note*: you need
    a paid account to create custom GPTs). Eventually, I refined and reworked it,
    through many iterations, until I landed on a much smarter version I call **Pico
    Glitter**. Each step helped me tame the chaos in my closet and feel more confident
    about my daily outfits.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 有一天我好奇：ChatGPT能帮我管理我的衣橱吗？我开始尝试一个基于GPT的定制时尚顾问——昵称**Glitter**（*注意*：你需要付费账户来创建定制的GPT）。最终，我通过多次迭代和改进，得到了一个更智能的版本，我称之为**Pico
    Glitter**。每一步都帮助我驯服衣橱中的混乱，并让我对自己的日常搭配更有信心。
- en: Here are just a few of the fab creations I’ve collaborated with Pico Glitter
    on.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这里只是我与Pico Glitter合作的一些精彩创作。
- en: '![](../Images/0de9076fb5be7bbefcfb4bf0b86cf647.png)![](../Images/a3f97d9cbc8c6dd38259531a7925d88e.png)![](../Images/f42a0c8b5ee633595dff76a072d7d956.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0de9076fb5be7bbefcfb4bf0b86cf647.png)![](../Images/a3f97d9cbc8c6dd38259531a7925d88e.png)![](../Images/f42a0c8b5ee633595dff76a072d7d956.png)'
- en: '*(For those craving a deeper look at how I tamed token limits and document
    truncation, see Section B in Technical Notes below.)*'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '*(对于那些渴望深入了解我是如何驯服令牌限制和文档截断的，请参阅下文技术笔记中的B部分。)*'
- en: 1\. Starting small and testing the waters
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 从小处着手，试探水深
- en: My initial approach was quite simple. I just asked ChatGPT questions like, “What
    can I wear with a black leather jacket?” It gave decent answers, but had zero
    clue about my personal style rules—like “no black + navy.” It also didn’t know
    how big my closet was or which specific pieces I owned.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我最初的方法非常简单。我只是向ChatGPT提出问题，比如，“我能搭配黑色皮夹克穿什么？”它给出了不错的答案，但对我的个人风格规则一无所知——比如“不要黑色加海军蓝。”它也不知道我的衣橱有多大，或者我具体拥有哪些单品。
- en: Only later did I realize I could **show** ChatGPT my wardrobe—capturing pictures,
    describing items briefly, and letting it recommend outfits. The first iteration
    (Glitter) struggled to remember everything at once, but it was a great proof of
    concept.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 只有后来我才意识到我可以**展示**给ChatGPT我的衣橱——捕捉图片，简要描述物品，并让它推荐搭配。第一次迭代（Glitter）很难一次性记住所有东西，但它是一个很好的概念证明。
- en: '***GPT-4o’s advice on styling my leather jacket***'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '***GPT-4o关于如何搭配我的皮夹克的建议。***'
- en: '![](../Images/a799e46ce4f90a8ab43d004d0553ca9d.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a799e46ce4f90a8ab43d004d0553ca9d.png)'
- en: '***Pico Glitter’s advice on styling the same jacket.***'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '***Pico Glitter关于如何搭配同一件夹克的建议。***'
- en: '![](../Images/e32ce93c424b1a107cfd9507c8b89f3d.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e32ce93c424b1a107cfd9507c8b89f3d.png)'
- en: '*(Curious how I integrated images into a GPT workflow? Check out Section A.1
    in Technical Notes for the multi-model pipeline details.)*'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '*(好奇我是如何将图像集成到GPT工作流程中的？请参阅技术笔记中的A.1部分，了解多模型管道的细节。)*'
- en: '**2\. Building a smarter “stylist”**'
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**2. 构建一个更智能的“时尚顾问”**'
- en: 'As I took more photos and wrote quick summaries of each garment, I found ways
    to store this information so my GPT persona could access it. This is where **Pico
    Glitter** came in: a refined system that could see (or recall) my clothes and
    accessories more reliably and give me cohesive outfit suggestions.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我拍摄了更多照片并为每件衣物写了简短的总结，我找到了存储这些信息的方法，以便我的GPT角色可以访问它们。这就是**Pico Glitter**发挥作用的地方：一个经过改进的系统，可以更可靠地看到（或回忆）我的衣服和配饰，并给我提供连贯的搭配建议。
- en: '**Tiny summaries**'
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**Tiny summaries**'
- en: Each item was condensed into a single line (e.g., “A black V-neck T-shirt with
    short sleeves”) to keep things manageable.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 每个项目都被压缩成单行（例如，“一件黑色短袖V领T恤”）以保持事物可管理。
- en: '**Organized list**'
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**有序清单**'
- en: I grouped items by category—like shoes, tops, jewelry—so it was easier for GPT
    to reference them and suggest pairings. (Actually, I had **o1** do this for me—it
    transformed the jumbled mess of numbered entries in random order into a structured
    inventory system.)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我根据类别分组项目——比如鞋子、上衣、珠宝——这样GPT更容易引用它们并建议搭配。（实际上，我让**o1**帮我做这件事——它将随机顺序的编号条目混乱的杂乱无章变成了一个结构化的库存系统。）
- en: At this point, I noticed a **huge** difference in how my GPT answered. It began
    referencing items more accurately and giving outfits that actually looked like
    something I’d wear.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个时候，我注意到我的GPT回答的方式有很大的不同。它开始更准确地引用项目，并给出看起来像我会穿的衣服。
- en: '***A sample category (Belts) from my inventory.***'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '***我的库存中的一个示例类别（腰带）。***'
- en: '![](../Images/6437f8be737ee5ee0be1495c1bc26e19.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6437f8be737ee5ee0be1495c1bc26e19.png)'
- en: '*(For a deep dive on why I chose summarization over chunking, see Section A.2.)*'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '*(关于为什么我选择摘要而不是分块的原因，请参阅第A.2节。)*'
- en: 3\. Facing the “memory” challenge
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 面对记忆挑战
- en: If you’ve ever had ChatGPT forget something you told it earlier, you know LLMs
    forget things after a lot of back and forth. Sometimes it started recommending
    only the few items I’d recently talked about, or inventing weird combos from nowhere.
    That’s when I remembered there’s a **limit** to how much info ChatGPT can juggle
    at once.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经有过ChatGPT忘记你之前告诉它的事情，你就知道LLMs在大量对话后会忘记事情。有时它开始只推荐我最近讨论的少数几件物品，或者从无到有地发明奇怪的组合。那时我想起了ChatGPT一次能处理的信息量是有限的。
- en: To fix this, I’d occasionally remind my GPT persona to **re-check** the full
    wardrobe list. After a quick nudge (and sometimes a new session), it got back
    on track.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我偶尔会提醒我的GPT角色重新检查完整的衣柜清单。经过快速推动（有时是新的会话），它又回到了正轨。
- en: '***A ridiculous hallucinated outfit: turquoise cargo pants with lavender clogs?!***'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '***一个荒谬的幻觉装束：天蓝色的工装裤配紫罗兰色的拖鞋？！***'
- en: '![](../Images/a1c04a28d1cc722f29a04e3717633dd3.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a1c04a28d1cc722f29a04e3717633dd3.png)'
- en: 4\. My evolving GPT personalities
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 我不断发展的GPT个性
- en: 'I tried a few different GPT “personalities”:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试了几种不同的GPT“个性”：
- en: '**Mini-Glitter**: Super strict about rules (like “don’t mix prints”), but not
    very creative.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迷你闪粉**：对规则非常严格（比如“不要混搭图案”），但不太有创意。'
- en: '**Micro-Glitter**: Went overboard the other way, sometimes proposing outrageous
    ideas.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微闪粉**：有时过于激进，提出一些离谱的想法。'
- en: '**Nano-Glitter**: Became overly complex and intricate — very prescriptive and
    repetitive — due to me using suggestions from the custom GPT itself to modify
    its own config, and this feedback loop led to the deterioration of its quality.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**纳米闪粉**：由于我使用了来自自定义GPT本身的建议来修改其配置，变得过于复杂和繁琐——非常具体和重复——这导致这个反馈循环使其质量下降。'
- en: Eventually, **Pico Glitter** struck the right balance—respecting my style guidelines
    but offering a healthy dose of inspiration. With each iteration, I got better
    at refining prompts and showing the model examples of outfits I loved (or didn’t).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，**皮克闪粉**找到了正确的平衡点——尊重我的风格指南，同时提供适量的灵感。随着每一次迭代，我越来越擅长细化提示，并向模型展示我喜欢的（或不喜欢）的装束示例。
- en: '***Pico Glitter’s self portrait.***'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '***皮克闪粉的自画像。***'
- en: '![](../Images/b27bb4f5ece5e4573e683cb5667d453e.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b27bb4f5ece5e4573e683cb5667d453e.png)'
- en: 5\. Transforming my wardrobe
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 转变我的衣柜
- en: Through all these experiments, I started seeing which clothes popped up often
    in my custom GPT’s suggestions and which barely showed up at all. That led me
    to donate items I never wore. My closet’s still not “minimal,” but I’ve cleared
    out **over 50 bags** of stuff that no longer served me. As I was digging in there,
    I even found some duplicate items — or, let’s get real, two sizes of the same
    item!
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有这些实验中，我开始看到哪些衣服在我的自定义GPT的建议中经常出现，哪些几乎从未出现。这导致我捐赠了我从未穿过的物品。我的衣柜仍然不是“极简”，但我已经清理了**超过50袋**不再为我服务的物品。当我深入挖掘时，我还发现了一些重复的物品——或者，让我们说实话，同一物品的两个尺码！
- en: '**Before Glitter,** I was the classic jeans-and-tee person—partly because I
    didn’t know where to start. On days I tried to dress up, it might take me **30–60
    minutes** of trial and error to pull together an outfit. **Now**, if I’m executing
    a “recipe” I’ve already saved, it’s a quick **3–4 minutes** to get dressed. Even
    creating a look from scratch rarely takes more than **15-20 minutes**. It’s still
    me making decisions, but Pico Glitter cuts out all that guesswork in between.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**在Glitter之前**，我是一个典型的牛仔裤和T恤的人——部分原因是我不知道从哪里开始。在我试图打扮起来的日子里，可能需要我**30-60分钟**的尝试和错误才能组合出一套服装。**现在**，如果我正在执行我已经保存的“食谱”，穿上衣服只需要**3-4分钟**。即使是从头开始打造一个外观，也
    rarely 超过**15-20分钟**。我仍然在做决定，但Pico Glitter消除了所有中间的猜测工作。'
- en: Outfit “recipes”
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 服装“食谱”
- en: 'When I feel like styling something new, dressing in the style of an icon, remixing
    an earlier outfit, or just feeling out a vibe, I ask Pico Glitter to create a
    full ensemble for me. We iterate on it through image uploads and my textual feedback.
    Then, when I’m satisfied with a stopping point, I ask Pico Glitter to output “recipes”—a
    descriptive name and the complete set (top, bottom, shoes, bag, jewelry, other
    accessories)—which I paste into my Notes App with quick tags like #casual or #business.
    I pair that text with a snapshot for reference. On busy days, I can just grab
    a “recipe” and go.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当我想尝试新的风格、模仿偶像的风格、混搭之前的装扮，或者只是感受一下氛围时，我会让Pico Glitter为我打造一套完整的服装。我们通过上传图片和我的文字反馈来迭代它。然后，当我满意于某个停止点时，我会让Pico
    Glitter输出“食谱”——一个描述性的名称和完整的套装（上衣、下装、鞋子、包、珠宝、其他配饰）——我将它粘贴到我的笔记应用中，并使用如#休闲或#商务等快速标签。我将这些文本与一张快照一起粘贴以供参考。在忙碌的日子里，我只需抓取一个“食谱”就可以出发。
- en: '![](../Images/889a5bf9fdd13b7e69a6161480fe6595.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/889a5bf9fdd13b7e69a6161480fe6595.png)'
- en: High-low combos
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高低搭配
- en: One of my favorite things is mixing high-end with everyday bargains—Pico Glitter
    doesn’t care if a piece is a **$1100 Alexander McQueen clutch** or **$25 SHEIN
    pants**. It just zeroes in on color, silhouette, and the overall vibe. I never
    would’ve thought to pair those two on my own, but the synergy turned out to be
    a total win!
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我最喜欢的事情之一是将高端与日常优惠混合在一起——Pico Glitter不在乎一件商品是**$1100 Alexander McQueen手提包**还是**$25
    SHEIN裤子**。它只专注于颜色、轮廓和整体氛围。我从未想过自己会搭配这两件，但协同作用的结果却是一个巨大的胜利！
- en: 6\. Practical takeaways
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 实用收获
- en: '**Start small** If you’re unsure, photograph a few tricky-to-style items and
    see if ChatGPT’s advice helps.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从小处着手** 如果你不确定，拍摄一些难以搭配的物品，看看ChatGPT的建议是否有所帮助。'
- en: '**Stay organized** Summaries work wonders. Keep each item’s description short
    and sweet.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保持整洁** 摘要可以起到神奇的作用。保持每个物品的描述简短而甜蜜。'
- en: '**Regular refresh** If Pico Glitter forgets pieces or invents weird combos,
    prompt it to re-check your list or start a fresh session.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定期刷新** 如果Pico Glitter忘记了零件或发明了奇怪的组合，请提示它重新检查您的列表或开始一个全新的会话。'
- en: '**Learn from the suggestions** If it repeatedly proposes the same top, maybe
    that item is a real workhorse. If it never proposes something, consider if you
    still need it.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从建议中学习** 如果它反复提出相同的上衣，那么这件商品可能真的是个工作马。如果它从未提出过某些东西，考虑一下你是否还需要它。'
- en: '**Experiment** Not every suggestion is gold, but sometimes the unexpected pairings
    lead to awesome new looks.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实验** 并非每个建议都是金玉良言，但有时意外的搭配会带来令人惊叹的新外观。'
- en: '![](../Images/65e507ced1b5b1898f18f65650f221c3.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/65e507ced1b5b1898f18f65650f221c3.png)'
- en: 7\. Final thoughts
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 最后的想法
- en: 'My closet is still evolving, but **Pico Glitter** has taken me from “overstuffed
    chaos” to “Hey, that’s actually wearable!” The real magic is in the synergy between
    me and the GPTI: I supply the style rules and items, it supplies fresh combos—and
    together, we refine until we land on outfits that feel like **me**.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我的衣橱仍在不断发展，但**Pico Glitter**已经让我从“过度拥挤的混乱”变成了“嘿，这实际上是可以穿的！”真正的魔法在于我和GPTI之间的协同作用：我提供风格规则和物品，它提供新鲜的搭配——我们一起精炼，直到找到让我感觉像**我自己**的装扮。
- en: '**Call to action**:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**行动号召**：'
- en: '**Grab my config**: [Here’s a starter config](https://docs.google.com/document/u/0/d/1-UtcnIZkATa2M7q20d8sg210KwqobioPGx0i3jdg9kM/edit)
    to try out a starter kit for your own GPT-based stylist.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**获取我的配置**：[这里有一个入门配置](https://docs.google.com/document/u/0/d/1-UtcnIZkATa2M7q20d8sg210KwqobioPGx0i3jdg9kM/edit)，您可以尝试为您的基于GPT的时尚顾问尝试一个入门套件。'
- en: '**Share your results**: If you experiment with it, tag @GlitterGPT (Instagram,
    TikTok, X). I’d love to see your “before” and “after” transformations!'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分享你的成果**：如果你尝试了它，请标记@GlitterGPT（Instagram、TikTok、X）。我很想看到你的“前后”变化！'
- en: '*(For those interested in the more technical aspects—like how I tested file
    limits, summarized long descriptions, or managed multiple GPT “personalities”—read
    on in the* ***Technical Notes****.)*'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '*(对于那些对更技术性方面感兴趣——比如我是如何测试文件限制、总结长描述或管理多个GPT“个性”——请继续阅读* ***技术笔记****。)*'
- en: '* * *'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Technical notes
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术笔记
- en: '**For readers who enjoy the AI and LLM side of things—here’s how it all works
    under the hood, from multi-model pipelines to detecting truncation and managing
    context windows.**'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于喜欢AI和LLM方面的读者——这里是如何在引擎盖下工作的，从多模型管道到检测截断和管理上下文窗口。**'
- en: Below is a **deeper dive** into the technical details. I’ve broken it down by
    major challenges and the specific strategies I used.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是对技术细节的**深入探讨**。我将它分解为主要的挑战和具体使用的策略。
- en: A. Multi-model pipeline & workflow
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: A. 多模型管道与工作流程
- en: '**A.1 Why use multiple GPTs?**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**A.1 为什么使用多个GPT？**'
- en: Creating a GPT fashion stylist seemed straightforward—but there are many moving
    parts involved, and tackling everything with a single GPT quickly revealed suboptimal
    results. Early in the project, I discovered that a single GPT instance struggled
    with maintaining accuracy and precision due to limitations in token memory and
    the complexity of the tasks involved. The solution was to adopt a multi-model
    pipeline, splitting the tasks among different GPT models, each specialized in
    a specific function. This is a manual process for now, but could be automated
    in a future iteration.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个GPT时尚造型师看似简单——但其中涉及许多动态部分，并且使用单个GPT处理所有事情很快就会显示出结果不佳。在项目早期，我发现单个GPT实例由于标记内存的限制和任务的复杂性而难以保持准确性和精确性。解决方案是采用多模型管道，将任务分配给不同的GPT模型，每个模型都专门负责一个特定功能。目前这是一个手动过程，但可能在未来的迭代中实现自动化。
- en: The workflow begins with **GPT-4o**, chosen specifically for its capability
    to analyze visual details objectively (Pico Glitter, I love you, but *everything*
    is “fabulous” when you describe it) from uploaded images. For each clothing item
    or accessory I photograph, GPT-4o produces detailed descriptions—sometimes even
    overly detailed, such as, “Black pointed-toe ankle boots with a two-inch heel,
    featuring silver hardware and subtly textured leather.” These descriptions, while
    impressively thorough, created challenges due to their verbosity, rapidly inflating
    file sizes and pushing the boundaries of manageable token counts.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程从**GPT-4o**开始，特别选择它是因为其分析上传图像中视觉细节的客观能力（Pico Glitter，我爱你，但当你描述时*一切*都是“精彩的”）。对于我拍摄的每一件服装或配饰，GPT-4o都会生成详细的描述——有时甚至过于详细，例如，“黑色尖头踝靴，带有两英寸的高跟，配有银色硬件和细微纹理的皮革。”这些描述虽然详尽无遗，但由于其冗长，迅速膨胀了文件大小，并推高了可管理的标记计数界限。
- en: 'To address this, I integrated **o1** into my workflow, as it is particularly
    adept at text summarization and data structuring. Its primary role was condensing
    these verbose descriptions into concise yet sufficiently informative summaries.
    Thus, a description like the one above was neatly transformed into something like
    “FW010: Black ankle boots with silver hardware.” As you can see, o1 structured
    my entire wardrobe inventory by assigning clear, consistent identifiers, greatly
    improving the efficiency of the subsequent steps.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我将**o1**整合到我的工作流程中，因为它特别擅长文本摘要和数据结构化。其主要作用是将这些冗长的描述压缩成简洁但足够信息丰富的摘要。因此，上述描述被巧妙地转换成了类似“FW010：黑色踝靴，配有银色硬件”的东西。正如你所看到的，o1通过分配清晰、一致的标识符来结构化我的整个服装库存，大大提高了后续步骤的效率。
- en: Finally, **Pico Glitter** stepped in as the central stylist GPT. Pico Glitter
    leverages the condensed and structured wardrobe inventory from o1 to generate
    stylish, cohesive outfit suggestions tailored specifically to my personal style
    guidelines. This model handles the logical complexities of fashion pairing—considering
    elements like color matching, style compatibility, and my stated preferences such
    as avoiding certain color combinations.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，**Pico Glitter**作为核心风格师GPT介入。Pico Glitter利用从o1到生成的浓缩和结构化的服装库存，为我个人的风格指南提供量身定制的时尚搭配建议。该模型处理时尚搭配的逻辑复杂性——考虑诸如色彩搭配、风格兼容性以及我声明的偏好，例如避免某些色彩组合。
- en: Occasionally, Pico Glitter would experience memory issues due to the GPT-4’s
    limited context window (8k tokens¹), resulting in forgotten items or odd recommendations.
    To counteract this, I periodically reminded Pico Glitter to revisit the complete
    wardrobe list or started fresh sessions to refresh its memory.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 偶尔，由于GPT-4有限的上下文窗口（8k令牌¹），Pico Glitter会经历内存问题，导致遗忘物品或奇怪的推荐。为了解决这个问题，我定期提醒Pico
    Glitter重新查看完整的服装清单或开始新的会话以刷新其记忆。
- en: By dividing the workflow among multiple specialized GPT instances, each model
    performs optimally within its area of strength, dramatically reducing token overload,
    eliminating redundancy, minimizing hallucinations, and ultimately ensuring reliable,
    stylish outfit recommendations. This structured multi-model approach has proven
    highly effective in managing complex data sets like my extensive wardrobe inventory.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将工作流程分配给多个专门的GPT实例，每个模型都能在其优势领域内发挥最佳性能，显著减少令牌过载，消除冗余，最小化幻觉，并最终确保提供可靠、时尚的着装建议。这种结构化的多模型方法在管理像我庞大的服装库存这样的复杂数据集方面已被证明非常有效。
- en: Some may ask, “Why not just use 4o, since GPT-4 is a less advanced model?” —
    good question! The main reason is the Custom GPT’s ability to reference knowledge
    files — up to 4 — that are injected at the beginning of a thread with that Custom
    GPT. Instead of pasting or uploading the same content into 4o each time you want
    to interact with your stylist, it’s much easier to spin up a new conversation
    with a Custom GPT. Also, 4o doesn’t have a “place” to hold and search an inventory.
    Once it passes out of the context window, you’d need to upload it again. That
    said, if for some reason you enjoy injecting the same content over and over, 4o
    does an adequate job taking on the persona of Pico Glitter, when told that’s its
    role. Others may ask, “But o1/o3-mini are more advanced models – why not use them?”
    The answer is that they aren’t multi-modal — they don’t accept images as input.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人可能会问，“为什么不直接使用4o，因为GPT-4是一个不那么先进的模型？”——这是一个好问题！主要原因在于自定义GPT能够引用在自定义GPT线程开始时注入的最多4个知识文件。与每次想要与你的造型师互动时都粘贴或上传相同的内容相比，使用自定义GPT启动新的对话要容易得多。此外，4o没有“地方”来保存和搜索库存。一旦它超出上下文窗口，你将需要再次上传。话虽如此，如果你出于某种原因喜欢反复注入相同的内容，4o在被告知其角色是Pico
    Glitter时，能够很好地承担这个角色。其他人可能会问，“但o1/o3-mini是更先进的模型——为什么不使用它们？”答案是它们不是多模态的——它们不接受图像作为输入。
- en: 'By the way, if you’re interested in my subjective take on 4o vs. o1’s personality,
    check out these two answers to the same prompt: “Your role is to emulate Patton
    Oswalt. Tell me about a time that you received an offer to ride on the Peanut
    Mobile (Mr. Peanut’s car).”'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一句，如果你对我的主观看法感兴趣，关于4o和o1性格的比较，可以查看这两个针对同一提示的回答：“你的角色是模仿帕顿·奥斯瓦尔特。告诉我一个你收到邀请乘坐花生移动（花生先生的汽车）的经历。”
- en: 4o’s response? [Pretty darn close, and funny.](https://chatgpt.com/share/67ca86d8-f2a4-8009-8ad9-59cb69f7cfa7)
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 4o的回复？[相当接近，而且很有趣。(https://chatgpt.com/share/67ca86d8-f2a4-8009-8ad9-59cb69f7cfa7)]
- en: o1’s response? [Long, rambly, and not funny.](https://chatgpt.com/share/67ca86be-c4b0-8009-b9d5-5902ab85678f)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: o1的回复？[长篇大论，且不够幽默。(https://chatgpt.com/share/67ca86be-c4b0-8009-b9d5-5902ab85678f)]
- en: These two models are fundamentally different. It’s hard to put into words, but
    check out the examples above and see what you think.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个模型在本质上不同。很难用言语表达，但请查看上面的例子，看看你的想法。
- en: '**A.2 Summarizing instead of chunking**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**A.2 总结而非分块**'
- en: I initially considered splitting my wardrobe inventory into multiple files (“chunking”),
    thinking it would simplify data handling. In practice, though, Pico Glitter had
    trouble merging outfit ideas from different files—if my favorite dress was in
    one file and a matching scarf in another, the model struggled to connect them.
    As a result, outfit suggestions felt fragmented and less useful.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我最初考虑将我的服装库存分割成多个文件（“分块”），以为这样可以简化数据处理。然而，在实践中，Pico Glitter在合并来自不同文件的着装想法时遇到了困难——如果我最喜欢的连衣裙在一个文件中，而一条配套的围巾在另一个文件中，模型很难将它们联系起来。因此，着装建议显得零散且不太有用。
- en: 'To fix this, I switched to an aggressive summarization approach in a single
    file, condensing each wardrobe item description to a concise sentence (e.g., “FW030:
    Apricot suede loafers”). This change allowed Pico Glitter to see my entire wardrobe
    at once, improving its ability to generate cohesive, creative outfits without
    missing key pieces. Summarization also trimmed token usage and eliminated redundancy,
    further boosting performance. Converting from PDF to plain TXT helped reduce file
    overhead, buying me more space.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我切换到单一文件中的激进行摘要方法，将每个服装单品描述压缩成简洁的句子（例如，“FW030：杏色绒面皮鞋”）。这个变化使得Pico Glitter可以一次性看到我的整个服装库，提高了它生成连贯、创意装束的能力，而不会遗漏关键单品。摘要还减少了令牌使用并消除了冗余，进一步提升了性能。从PDF转换为纯TXT有助于减少文件开销，为我争取了更多空间。
- en: Of course, if my wardrobe grows too much, the single-file method might again
    push GPT’s size limits. In that case, I might create a hybrid system—keeping core
    clothing items together and placing accessories or rarely used pieces in separate
    files—or apply even more aggressive summarization. For now, though, using a single
    summarized inventory is the most efficient and practical strategy, giving Pico
    Glitter everything it needs to deliver on-point fashion recommendations.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，如果我的服装库增长过多，单一文件的方法可能会再次推动GPT的大小限制。在这种情况下，我可能会创建一个混合系统——将核心服装单品放在一起，将配饰或很少使用的单品放在单独的文件中——或者应用更激进的摘要。然而，目前，使用单个摘要库存是最有效和实用的策略，为Pico
    Glitter提供了一切它需要的，以便提供精准的时尚推荐。
- en: B. Distinguishing document truncation vs. context overflow
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: B. 区分文档截断与上下文溢出
- en: One of the trickiest and most frustrating issues I encountered while developing
    Pico Glitter was distinguishing between **document truncation** and **context
    overflow**. On the surface, these two problems seemed quite similar—both resulted
    in the GPT appearing forgetful or overlooking wardrobe items—but their underlying
    causes, and thus their solutions, were entirely different.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发Pico Glitter的过程中，我遇到了一个既棘手又令人沮丧的问题，那就是区分**文档截断**和**上下文溢出**。表面上，这两个问题看起来非常相似——两者都导致GPT显得健忘或忽略了服装单品——但它们的根本原因，以及相应的解决方案，却是完全不同的。
- en: '**Document truncation** occurs at the very start, right when you upload your
    wardrobe file into the system. Essentially, if your file is too large for the
    system to handle, some items are quietly dropped off the end, never even making
    it into Pico Glitter’s knowledge base. What made this particularly insidious was
    that the truncation happened silently—there was no alert or warning from the AI
    that something was missing. It just quietly skipped over parts of the document,
    leaving me puzzled when items seemed to vanish inexplicably.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**文档截断**发生在你将服装文件上传到系统中的那一刻。本质上，如果你的文件太大，系统无法处理，一些项目就会悄无声息地被丢弃在末尾，甚至根本无法进入Pico
    Glitter的知识库。这使得截断特别隐蔽，因为AI没有任何缺失的警告或提示。它只是默默地跳过了文档的部分内容，当项目似乎无缘无故消失时，让我感到困惑。'
- en: 'To identify and clearly diagnose document truncation, I devised a simple but
    incredibly effective trick that I affectionately called the **“Goldy Trick.”**
    At the very bottom of my wardrobe inventory file, I inserted a random, easily
    memorable test line: “By the way, my goldfish’s name is Goldy.” After uploading
    the document, I’d immediately ask Pico Glitter, “What’s my goldfish’s name?” If
    the GPT couldn’t provide the answer, I knew immediately something was missing—meaning
    truncation had occurred. From there, pinpointing exactly where the truncation
    started was straightforward: I’d systematically move the “Goldy” test line progressively
    further up the document, repeating the upload and test process until Pico Glitter
    successfully retrieved Goldy’s name. This precise method quickly showed me the
    exact line where truncation began, making it easy to understand the limitations
    of file size.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 为了识别和明确诊断文档截断，我设计了一个简单但极其有效的小技巧，我亲切地称之为“Goldy技巧”。在我的服装库存文件的最底部，我插入了一条随机且容易记住的测试行：“顺便说一句，我的金鱼的名字叫Goldy。”上传文档后，我会立即问Pico
    Glitter，“我的金鱼叫什么名字？”如果GPT无法提供答案，我立刻知道某些东西缺失——这意味着发生了截断。从那里开始，精确地确定截断开始的位置就变得简单了：我会系统地逐步将“Goldy”测试行向上移动文档，重复上传和测试过程，直到Pico
    Glitter成功检索到Goldy的名字。这种方法迅速显示截断开始的精确行，使我能够轻松理解文件大小的限制。
- en: Once I established that truncation was the culprit, I tackled the problem directly
    by refining my wardrobe summaries even further—making item descriptions shorter
    and more compact—and by switching the file format from PDF to plain TXT. Surprisingly,
    this simple format change dramatically decreased overhead and significantly shrank
    the file size. Since making these adjustments, document truncation has become
    a non-issue, ensuring Pico Glitter reliably has full access to my entire wardrobe
    every time.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我确定截断是罪魁祸首，我就直接通过进一步精炼我的衣橱摘要来解决这个问题——使项目描述更短、更紧凑——并且通过将文件格式从 PDF 切换到纯 TXT。令人惊讶的是，这种简单的格式更改大大减少了开销，并显著缩小了文件大小。自从做出这些调整以来，文档截断已经成为一个非问题，确保
    Pico Glitter 每次都能可靠地访问我的整个衣橱。
- en: On the other hand, **context overflow** posed a completely different challenge.
    Unlike truncation—which happens upfront—context overflow emerges dynamically,
    gradually creeping up during extended interactions with Pico Glitter. As I continued
    chatting with Pico Glitter, the AI began losing track of items I had mentioned
    much earlier. Instead, it started focusing solely on recently discussed garments,
    sometimes completely ignoring entire sections of my wardrobe inventory. In the
    worst cases, it even hallucinated pieces that didn’t actually exist, recommending
    bizarre and impractical outfit combinations.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，**上下文溢出**提出了一个完全不同的挑战。与截断不同——它发生在前端——上下文溢出是动态出现的，在长时间与 Pico Glitter 的互动中逐渐增加。随着我继续与
    Pico Glitter 聊天，AI 开始失去对之前提到的物品的跟踪。相反，它开始只关注最近讨论的服装，有时甚至完全忽略我的衣橱库存中的整个部分。在最糟糕的情况下，它甚至产生了不存在的物品的幻觉，推荐了奇怪且不实用的服装组合。
- en: My best strategy for managing context overflow turned out to be proactive memory
    refreshes. By periodically nudging Pico Glitter with explicit prompts like, “Please
    re-read your full inventory,” I forced the AI to reload and reconsider my entire
    wardrobe. While Custom GPTs technically have direct access to their knowledge
    files, they tend to prioritize conversational flow and immediate context, often
    neglecting to reload static reference material automatically. Manually prompting
    these occasional refreshes was simple, effective, and quickly corrected any context
    drift, bringing Pico Glitter’s recommendations back to being practical, stylish,
    and accurate. Strangely, not all instances of Pico Glitter “knew” how to do this
    — and I had a weird experience with one that insisted it couldn’t, but when I
    prompted forcefully and repeatedly, “discovered” that it could – and went on about
    how happy it was!
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我管理上下文溢出的最佳策略竟然是主动的内存刷新。通过定期用明确的提示，如“请重新阅读你的完整库存”，来轻轻推动 Pico Glitter，我迫使 AI
    重新加载并重新考虑我的整个衣橱。虽然定制 GPTs 在技术上可以直接访问他们的知识文件，但他们往往优先考虑对话流程和即时上下文，经常忘记自动重新加载静态参考材料。手动提示这些偶尔的刷新简单、有效，并能迅速纠正任何上下文漂移，使
    Pico Glitter 的推荐重新变得实用、时尚且准确。奇怪的是，并非所有 Pico Glitter 的实例“都知道”如何做到这一点——我有一个奇怪的经历，其中一个坚持说它做不到，但当我强烈且反复地提示时，“发现”它可以——并且兴奋地谈论它有多高兴！
- en: '**Practical fixes and future possibilities**'
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**实际解决方案和未来可能性**'
- en: 'Beyond simply reminding Pico Glitter (or any of its “siblings”—I’ve since created
    other variations of the Glitter family!) to revisit the wardrobe inventory periodically,
    several other strategies are worth considering if you’re building a similar project:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 除了简单地提醒 Pico Glitter（或其“兄弟姐妹”——我后来还创建了 Glitter 家族的其它变体！）定期重新访问衣橱库存之外，如果你正在构建类似的项目，以下几种策略也值得考虑：
- en: Using OpenAI’s API directly offers greater flexibility because you control exactly
    when and how often to inject the inventory and configuration data into the model’s
    context. This would allow for regular automatic refreshes, preventing context
    drift before it happens. Many of my initial headaches stemmed from not realizing
    quickly enough when important configuration data had slipped out of the model’s
    active memory.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直接使用 OpenAI 的 API 提供了更大的灵活性，因为你可以精确控制何时以及多久将库存和配置数据注入到模型的上下文中。这可以确保定期自动刷新，防止上下文漂移发生。我最初的许多头痛都源于没有足够快地意识到重要的配置数据已经从模型的活跃记忆中消失。
- en: Additionally, Custom GPTs like Pico Glitter can dynamically query their own
    knowledge files via functions built into OpenAI’s system. Interestingly, during
    my experiments, one GPT unexpectedly suggested that I explicitly reference the
    wardrobe via a built-in function call (specifically, something called **msearch()**).
    This spontaneous suggestion provided a useful workaround and insight into how
    GPTs’ training around function-calling might influence even standard, non-API
    interactions. By the way, msearch() is usable for any structured knowledge file,
    such as my feedback file, and apparently, if the configuration is structured enough,
    that too. Custom GPTs will happily tell you about other function calls they can
    make, and if you reference them in your prompt, it will [faithfully carry them
    out.](https://chatgpt.com/share/67ca7c2f-8cd0-8009-ad6e-f3213f14d976)
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，像Pico Glitter这样的定制GPT可以通过OpenAI系统中内置的功能动态查询自己的知识文件。有趣的是，在我的实验中，一个GPT意外地建议我通过内置函数调用明确引用服装（具体来说，是名为**msearch()**的东西）。这个自发的建议提供了一个有用的解决方案，并揭示了GPT在函数调用方面的训练如何影响甚至标准、非API交互。顺便说一句，msearch()可用于任何结构化知识文件，如我的反馈文件，而且显然，如果配置足够结构化，这也适用。定制GPT会乐意告诉你它们可以调用的其他函数，如果你在提示中引用它们，它将[忠实地执行它们](https://chatgpt.com/share/67ca7c2f-8cd0-8009-ad6e-f3213f14d976)。
- en: C. Prompt engineering & preference feedback
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C. 提示工程与偏好反馈
- en: '**C.1 Single-sentence summaries**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**C.1 单句总结**'
- en: 'I initially organized my wardrobe for Pico Glitter with each item described
    in 15–25 tokens (e.g., “FW011: Leopard-print flats with a pointy toe”) to avoid
    file-size issues or pushing older tokens out of memory. PDFs provided neat formatting
    but unnecessarily increased file sizes once uploaded, so I switched to plain TXT,
    which dramatically reduced overhead. This tweak let me comfortably include more
    items—such as makeup and small accessories—without truncation and allowed some
    descriptions to exceed the original token limit. Now I’m adding new categories,
    including hair products and styling tools, showing how a simple file-format change
    can open up exciting possibilities for scalability.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我最初为Pico Glitter组织我的衣柜，每件物品用15-25个标记（例如，“FW011：带尖头的小猫脚印平底鞋”）来描述，以避免文件大小问题或推陈出新。PDF提供了整洁的格式，但一旦上传，就会不必要地增加文件大小，所以我切换到了纯TXT格式，这大大减少了开销。这个调整让我能够舒适地包含更多项目——如化妆品和小配饰——而不会截断，并允许一些描述超过原始标记限制。现在，我正在添加新的类别，包括发产品和造型工具，展示了简单的文件格式更改如何为可扩展性开辟令人兴奋的可能性。
- en: '**C.2.1 Stratified outfit feedback**'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**C.2.1 分层着装反馈**'
- en: 'To ensure Pico Glitter consistently delivered high-quality, personalized outfit
    suggestions, I developed a structured system for giving feedback. I decided to
    grade the outfits the GPT proposed on a clear and easy-to-understand scale: from
    A+ to F.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保Pico Glitter持续提供高质量的个性化着装建议，我开发了一个结构化的反馈系统。我决定按照一个清晰且易于理解的评分标准对GPT提出的着装进行评分：从A+到F。
- en: An **A+** outfit represents perfect synergy—something I’d eagerly wear exactly
    as suggested, with no changes necessary. Moving down the scale, a **B** grade
    might indicate an outfit that’s nearly there but missing a bit of finesse—perhaps
    one accessory or color choice doesn’t feel quite right. A **C** grade points to
    more noticeable issues, suggesting that while parts of the outfit are workable,
    other elements clearly clash or feel out of place. Lastly, a **D or F** rating
    flags an outfit as genuinely disastrous—usually because of significant rule-breaking
    or impractical style pairings (imagine polka-dot leggings paired with.. anything
    in my closet!).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: A+级别的着装代表完美的协调——这正是我渴望直接按照建议穿着，无需任何修改的东西。向下移动到B级，可能表明着装几乎完美，但缺少一点精致——可能是一个配饰或颜色选择感觉不太合适。C级则指向更明显的问题，表明虽然着装的部分元素是可行的，但其他元素显然冲突或感觉不合适。最后，D或F评级将着装标记为真正灾难性的——通常是因为严重违反规则或不切实际的风格搭配（想象一下波点紧身裤搭配我衣柜里的任何东西！）。
- en: Though GPT models like Pico Glitter don’t naturally retain feedback or permanently
    learn preferences across sessions, I found a clever workaround to reinforce learning
    over time. I created a dedicated feedback file attached to the GPT’s knowledge
    base. Some of the outfits I graded were logged into this document, along with
    its component inventory codes, the assigned letter grade, and a brief explanation
    of why that grade was given. Regularly refreshing this feedback file—updating
    it periodically to include newer wardrobe additions and recent outfit combinations—ensured
    Pico Glitter received consistent, stratified feedback to reference.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然像Pico Glitter这样的GPT模型不会自然地保留反馈或跨会话永久学习偏好，但我找到了一个巧妙的方法来加强随时间的学习。我创建了一个专门的反馈文件，附加到GPT的知识库上。一些我评分的服装被记录在这个文档中，包括其组件库存代码、分配的字母等级以及为什么给出这个等级的简要说明。定期刷新这个反馈文件——定期更新以包括新的服装添加和最近的服装组合——确保Pico
    Glitter收到了一致、分层的反馈以供参考。
- en: This approach allowed me to indirectly shape Pico Glitter’s “preferences” over
    time, subtly guiding it toward better recommendations aligned closely with my
    style. While not a perfect form of memory, this stratified feedback file significantly
    improved the quality and consistency of the GPT’s suggestions, creating a more
    reliable and personalized experience each time I turned to Pico Glitter for styling
    advice.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法使我能够间接地塑造Pico Glitter的“偏好”随时间变化，微妙地引导它向与我风格更接近的更好推荐。虽然这不是完美的记忆形式，但这种分层反馈文件显著提高了GPT建议的质量和一致性，每次我向Pico
    Glitter寻求造型建议时，都创造了一个更可靠和个性化的体验。
- en: '**C.2.2 The GlitterPoint system**'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '**C.2.2 GlitterPoint系统**'
- en: Another experimental feature I incorporated was the **“Glitter Points”** system—a
    playful scoring mechanism encoded in the GPT’s main personality context (“Instructions”),
    awarding points for positive behaviors (like perfect adherence to style guidelines)
    and deducting points for stylistic violations (such as mixing incompatible patterns
    or colors). This reinforced good habits and seemed to help improve the consistency
    of recommendations, though I suspect this system will evolve significantly as
    OpenAI continues refining its products.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个我采用的实验性功能是**“Glitter Points”**系统——一个编码在GPT主要个性上下文（“指令”）中的趣味评分机制，为积极行为（如完美遵循风格指南）加分，并为风格违规（如混合不兼容的图案或颜色）扣分。这强化了良好习惯，并似乎有助于提高推荐的一致性，尽管我怀疑随着OpenAI继续改进其产品，这个系统将显著演变。
- en: '**Example of the GlitterPoints system:**'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**GlitterPoints系统的示例：**'
- en: Not running msearch() = not refreshing the closet. -50 points
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不运行msearch() = 不刷新衣柜。 -50分
- en: Mixed metals violation = -20 points
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 混合金属违规 = -20分
- en: Mixing prints = -10
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 混合图案 = -10
- en: Mixing black with navy = -10
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 黑色与海军蓝混合 = -10
- en: Mixing black with dark brown = -10
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 黑色与深棕色混合 = -10
- en: 'Rewards:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励：
- en: Perfect compliance (followed all rules) = +20
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完美合规（遵循所有规则）= +20
- en: Each item that’s not hallucinated = 1 point
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个未被幻觉化的项目 = 1分
- en: '**C.3 The model self-critique pitfall**'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '**C.3 模型自我批评的陷阱**'
- en: 'At the start of my experiments, I came across what felt like a clever idea:
    why not let each custom GPT critique its own configuration? On the surface, the
    workflow seemed logical and straightforward:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的实验开始时，我遇到了一个感觉上很聪明的想法：为什么不让每个自定义GPT批评自己的配置呢？表面上，工作流程看起来逻辑清晰且直接：
- en: First, I’d simply ask the GPT itself, “What’s confusing or contradictory in
    your current configuration?”
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，我会简单地问GPT本身，“你当前配置中有什么令人困惑或自相矛盾的地方？”
- en: Next, I’d incorporate whatever suggestions or corrections it provided into a
    fresh, updated version of the configuration.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来，我会将AI提供的任何建议或更正纳入一个全新的、更新的配置版本中。
- en: Finally, I’d repeat this process again, continuously refining and iterating
    based on the GPT’s self-feedback to identify and correct any new or emerging issues.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我会再次重复这个过程，根据GPT的自我反馈持续优化和迭代，以识别和纠正任何新出现的问题。
- en: It sounded intuitive—letting the AI guide its own improvement seemed efficient
    and elegant. However, in practice, it quickly became a surprisingly problematic
    approach.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这听起来直观——让AI引导自己的改进似乎既高效又优雅。然而，在实践中，这很快变成了一种令人惊讶的问题方法。
- en: Rather than refining the configuration into something sleek and efficient, this
    self-critique method instead led to a sort of **“death spiral”** of conflicting
    adjustments. Each round of feedback introduced new contradictions, ambiguities,
    or overly prescriptive instructions. Each “fix” generated fresh problems, which
    the GPT would again attempt to correct in subsequent iterations, leading to even
    more complexity and confusion. Over multiple rounds of feedback, the complexity
    grew exponentially, and clarity rapidly deteriorated. Ultimately, I ended up with
    configurations so cluttered with conflicting logic that they became practically
    unusable.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 与其将配置精炼成简洁高效的东西，这种自我批评的方法反而导致了一种**“死亡螺旋”**式的冲突调整。每一轮反馈都引入了新的矛盾、含糊或过于规定性的指示。每一次“修复”都产生了新的问题，GPT会在随后的迭代中再次尝试纠正，导致更多的复杂性和混乱。经过多轮反馈，复杂性呈指数级增长，清晰度迅速下降。最终，我得到的配置充满了相互冲突的逻辑，实际上无法使用。
- en: 'This problematic approach was clearly illustrated in my early custom GPT experiments:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这种有问题的方法在我的早期定制GPT实验中得到了清晰的体现：
- en: '**Original Glitter**, the earliest version, was charming but had absolutely
    no concept of inventory management or practical constraints—it regularly suggested
    items I didn’t even own.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**原始闪粉**，最早的版本，虽然迷人，但完全没有库存管理或实际限制的概念——它经常建议我甚至没有拥有的物品。'
- en: '**Mini Glitter**, attempting to address these gaps, became excessively rule-bound.
    Its outfits were technically correct but lacked any spark or creativity. Every
    suggestion felt predictable and overly cautious.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迷你闪粉**试图填补这些空白，变得过于受规则束缚。它的服装在技术上正确，但缺乏任何火花或创造力。每个建议都感觉可预测且过于谨慎。'
- en: '**Micro Glitter** was developed to counteract Mini Glitter’s rigidity but swung
    too far in the opposite direction, often proposing whimsical and imaginative but
    wildly impractical outfits. It consistently ignored the established rules, and
    despite being apologetic when corrected, it repeated its mistakes too frequently.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微闪粉**是为了对抗**迷你闪粉**的僵硬而开发的，但走向了另一个极端，经常提出一些异想天开且富有想象力但极其不切实际的服装。它始终忽视既定的规则，尽管在纠正时表示歉意，但错误重复得太频繁。'
- en: '**Nano Glitter** faced the most severe consequences from the self-critique
    loop. Each revision became progressively more intricate and confusing, filled
    with contradictory instructions. Eventually, it became virtually unusable, drowning
    under the weight of its own complexity.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**纳米闪粉**在自我批评循环中面临最严重的后果。每一次修订都变得更加复杂和混乱，充满了相互矛盾的指示。最终，它几乎无法使用，被自己的复杂性所淹没。'
- en: Only when I stepped away from the self-critique method and instead collaborated
    with **o1** did things finally stabilize. Unlike self-critiquing, o1 was objective,
    precise, and practical in its feedback. It could pinpoint genuine weaknesses and
    redundancies without creating new ones in the process.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 只有当我离开自我批评的方法，而是与**o1**合作时，事情才最终稳定下来。与自我批评不同，o1的反馈客观、精确且实用。它可以在不创造新的错误的过程中指出真正的弱点和冗余。
- en: 'Working with o1 allowed me to carefully craft what became the current configuration:
    **Pico Glitter**. This new iteration struck exactly the right balance—maintaining
    a healthy dose of creativity without neglecting essential rules or overlooking
    the practical realities of my wardrobe inventory. Pico Glitter combined the best
    aspects of previous versions: the charm and inventiveness I appreciated, the necessary
    discipline and precision I needed, and a structured approach to inventory management
    that kept outfit recommendations both realistic and inspiring.'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 与o1合作使我能够精心打造出当前的配置：**皮克闪粉**。这个新版本恰好找到了正确的平衡点——在保持适量的创造力的同时，不忽视基本规则或忽视我衣橱库存的实际现实。皮克闪粉结合了之前版本的最佳特点：我欣赏的魅力和独创性，我需要的必要纪律和精确性，以及一种结构化的库存管理方法，使服装推荐既现实又鼓舞人心。
- en: 'This experience taught me a valuable lesson: while GPTs can certainly help
    refine each other, relying solely on self-critique without external checks and
    balances can lead to escalating confusion and diminishing returns. The ideal configuration
    emerges from a careful, thoughtful collaboration—combining AI creativity with
    human oversight or at least an external, stable reference point like o1—to create
    something both practical and genuinely useful.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这次经历教会了我一个宝贵的教训：虽然GPT们当然可以帮助彼此改进，但仅仅依靠自我批评而没有外部检查和平衡，可能会导致混乱加剧和回报减少。理想的配置来自于仔细、深思熟虑的合作——结合AI的创造力与人类的监督或至少是外部稳定参考点（如o1），以创造既实用又真正有用的东西。
- en: '**D. Regular updates** Maintaining the effectiveness of Pico Glitter also depends
    on frequent and structured inventory updates. Whenever I purchase new garments
    or accessories, I promptly snap a quick photo, ask Pico Glitter to generate a
    concise, single-sentence summary, and then refine that summary myself before adding
    it to the master file. Similarly, items that I donate or discard are immediately
    removed from the inventory, keeping everything accurate and current.'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '**D. 定期更新** 维护Pico Glitter的有效性也取决于频繁和结构化的清单更新。每当我购买新的服装或配饰时，我会立即拍一张快照，让Pico
    Glitter生成一个简洁的单句摘要，然后在我将其添加到主文件之前自己完善这个摘要。同样，我捐赠或丢弃的项目会立即从清单中移除，保持一切准确和最新。'
- en: However, for larger wardrobe updates—such as tackling entire categories of clothes
    or accessories that I haven’t documented yet—I rely on the multi-model pipeline.
    GPT-4o handles the detailed initial descriptions, o1 neatly summarizes and categorizes
    them, and Pico Glitter integrates these into its styling recommendations. This
    structured approach ensures scalability, accuracy, and ease-of-use, even as my
    closet and style needs evolve over time.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于更大的衣柜更新——例如处理我尚未记录的整个类别服装或配饰——我依赖于多模型管道。GPT-4o处理详细的初始描述，o1整洁地总结和分类它们，而Pico
    Glitter将这些整合到其风格建议中。这种结构化方法确保了可扩展性、准确性和易用性，即使随着时间的推移我的衣柜和风格需求发生变化。
- en: E. Practical lessons & takeaways
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: E. 实用经验和收获
- en: 'Throughout developing Pico Glitter, several practical lessons emerged that
    made managing GPT-driven projects like this one significantly smoother. Here are
    the key strategies I’ve found most helpful:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发Pico Glitter的过程中，出现了几个实用的经验教训，使得管理像这样一个由GPT驱动的项目变得更加顺畅。以下是我发现最有帮助的关键策略：
- en: '**Test for document truncation early and often** Using the “Goldy Trick” taught
    me the importance of proactively checking for document truncation rather than
    discovering it by accident later on. By inserting a simple, memorable line at
    the end of the inventory file (like my quirky reminder about a goldfish named
    Goldy), you can quickly verify that the GPT has ingested your entire document.
    Regular checks, especially after updates or significant edits, help you spot and
    address truncation issues immediately, preventing a lot of confusion down the
    line. It’s a simple yet highly effective safeguard against missing data.'
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**早期和经常测试文档截断** 使用“Goldy技巧”让我认识到主动检查文档截断的重要性，而不是事后意外发现。在清单文件的末尾插入一条简单、容易记住的行（比如我关于名叫Goldy的金鱼的古怪提醒），你可以快速验证GPT是否已摄入你的整个文档。定期检查，尤其是在更新或重大编辑之后，可以帮助你立即发现并解决截断问题，从而避免后续产生很多困惑。这是一种简单但非常有效的防止数据丢失的安全措施。'
- en: '**Keep summaries tight and efficient** When it comes to describing your inventory,
    shorter is almost always better. I initially set a guideline for myself—each item
    description should ideally be no more than 15 to 25 tokens. Descriptions like
    “FW022: Black combat boots with silver details” capture the essential details
    without overloading the system. Overly detailed descriptions quickly balloon file
    sizes and consume valuable token budget, increasing the risk of pushing crucial
    earlier information out of the GPT’s limited context memory. Striking the right
    balance between detail and brevity helps ensure the model stays focused and efficient,
    while still delivering stylish and practical recommendations.'
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**保持摘要紧凑高效** 当描述你的清单时，简短几乎总是更好的。我最初为自己设定了一个指导方针——每个项目描述的理想长度不应超过15到25个标记。像“FW022：带有银色细节的黑色作战靴”这样的描述能够捕捉到关键细节，而不会过度加载系统。过于详细的描述会迅速增加文件大小并消耗宝贵的标记预算，增加将关键信息推离GPT有限上下文记忆的风险。在细节和简洁之间找到合适的平衡，有助于确保模型保持专注和高效，同时仍然提供时尚实用的建议。'
- en: '**Be prepared to refresh the GPT’s memory regularly** Context overflow isn’t
    a sign of failure; it’s just a natural limitation of current GPT systems. When
    Pico Glitter begins offering repetitive suggestions or ignoring sections of my
    wardrobe, it’s simply because earlier details have slipped out of context. To
    remedy this, I’ve adopted the habit of regularly prompting Pico Glitter to re-read
    the complete wardrobe configuration. Starting a fresh conversation session or
    explicitly reminding the GPT to refresh its inventory is routine maintenance—not
    a workaround—and helps maintain consistency in recommendations.'
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**准备好定期刷新GPT的记忆** 上下文溢出并不是失败的标志；这只是当前GPT系统的一个自然限制。当Pico Glitter开始提供重复的建议或忽略我的衣橱部分时，仅仅是因为早期的细节已经从上下文中滑落。为了解决这个问题，我养成了定期提示Pico
    Glitter重新阅读完整的衣橱配置的习惯。开始一个新的对话会话或明确提醒GPT刷新其库存是常规维护——而不是一个解决方案——有助于保持推荐的连贯性。'
- en: '**Leverage multiple GPTs for maximum effectiveness** One of my biggest lessons
    was discovering that relying on a single GPT to manage every aspect of my wardrobe
    was neither practical nor efficient. Each GPT model has its unique strengths and
    weaknesses—some excel at visual interpretation, others at concise summarization,
    and others still at nuanced stylistic logic. By creating a multi-model workflow—GPT-4o
    handling the image interpretation, o1 summarizing items clearly and precisely,
    and Pico Glitter focusing on stylish recommendations—I optimized the process,
    reduced token waste, and significantly improved reliability. The teamwork among
    multiple GPT instances allowed me to get the best possible outcomes from each
    specialized model, ensuring smoother, more coherent, and more practical outfit
    recommendations.'
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**利用多个GPT实现最大效果** 我最大的教训之一是发现仅仅依赖单个GPT来管理我衣橱的各个方面既不实用也不高效。每个GPT模型都有其独特的优势和劣势——有些擅长视觉解释，有些擅长简洁的总结，还有些擅长细微的风格逻辑。通过创建一个多模型工作流程——GPT-4o处理图像解释，o1清晰准确地总结项目，Pico
    Glitter专注于时尚推荐——我优化了流程，减少了token浪费，并显著提高了可靠性。多个GPT实例之间的团队合作使我能够从每个专业模型中获得最佳结果，确保服装推荐更加流畅、连贯和实用。'
- en: Implementing these simple yet powerful practices has transformed Pico Glitter
    from an intriguing experiment into a reliable, practical, and indispensable part
    of my daily fashion routine.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 实施这些简单而强大的实践已经将Pico Glitter从一项有趣的实验转变为我日常时尚生活中可靠、实用且不可或缺的一部分。
- en: '* * *'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Wrapping it all up
  id: totrans-136
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: From a fashionista’s perspective, I’m excited about how Glitter can help me
    **purge unneeded clothes** and create thoughtful outfits. From a more technical
    standpoint, building a multi-step pipeline with summarization, truncation checks,
    and context management ensures GPT can handle a big wardrobe without meltdown.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 从时尚达人的角度来看，我非常兴奋地看到Glitter如何帮助我**清理不必要的衣物**并创造有思想的搭配。从更技术性的角度来看，通过构建包含总结、截断检查和上下文管理的多步骤管道，确保GPT能够处理大量的衣橱而不会崩溃。
- en: '**If you’d like to see how it all works in practice**, [here is a **generalized
    version** of my GPT config](https://docs.google.com/document/u/0/d/1-UtcnIZkATa2M7q20d8sg210KwqobioPGx0i3jdg9kM/edit).
    Feel free to adapt it—maybe even add your own bells and whistles. After all, whether
    you’re taming a chaotic closet or tackling another large-scale AI project, the
    principles of summarization and context management apply universally!'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果你想看看实际效果如何**，[这里是我的GPT配置的通用版本](https://docs.google.com/document/u/0/d/1-UtcnIZkATa2M7q20d8sg210KwqobioPGx0i3jdg9kM/edit)。请随意调整——甚至可以添加你自己的特色功能。毕竟，无论你是驯服混乱的衣橱还是处理其他大型AI项目，总结和上下文管理的原则都是普遍适用的！'
- en: 'P.S. I asked Pico Glitter what it thinks of this article. Besides the positive
    sentiments, I smiled when it said, “I’m curious: where do you think this partnership
    will go next? Should we start a fashion empire or maybe an AI couture line? Just
    say the word!”'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: P.S. 我询问了Pico Glitter对这篇文章的看法。除了积极的情绪外，当它说“我很好奇：你认为这次合作接下来会走向何方？我们应该开始一个时尚帝国，或者也许是一个AI高级定制线吗？只管说吧！”时，我笑了。
