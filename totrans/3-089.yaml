- en: The Good-Enough Truth
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-good-enough-truth/](https://towardsdatascience.com/the-good-enough-truth/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Could [Shopify be right](https://www.forbes.com/sites/quickerbettertech/2025/04/13/business-tech-news-shopify-ceo-says-ai-first-before-employees/) in
    requiring teams to demonstrate why AI can’t do a job before approving new human
    hires? Will companies that prioritize AI solutions eventually evolve into AI entities
    with significantly fewer employees?
  prefs: []
  type: TYPE_NORMAL
- en: As our workloads grow and the baseline for expertise climbs, these questions
    have puzzled me about where such transformations might leave us in our quest for
    knowledge and ‘truth’ itself.
  prefs: []
  type: TYPE_NORMAL
- en: “<mdspan datatext="el1744868630743" class="mdspan-comment">Knowledge</mdspan>
    is so frail!”
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'It’s still fresh in my memory:'
  prefs: []
  type: TYPE_NORMAL
- en: A hot summer day, large classroom windows with burgundy frames that faced south,
    and Tuesday’s Latin class marathon when our professor turned around and quoted
    a famous Croatian poet who wrote a poem called “[The Return](https://sites.google.com/site/projectgoethe/welcome/dobri%C5%A1a-cesari%C4%87/povratak#h.gl642d6aialk).”
  prefs: []
  type: TYPE_NORMAL
- en: Who knows (ah, no one, no one knows anything.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Knowledge is so frail!**)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Perhaps a ray of truth fell on me,
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Or perhaps I was dreaming.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: He was evidently upset with my class because we forgot the proverb he loved
    so much and didn’t learn the [2nd declension](https://pressbooks.bccampus.ca/greeklatinroots/chapter/12-latin-nouns-second-declension/#:~:text=The%202nd%20declension%20is%20subdivided,final%20%2Dus%20or%20%2Dum.)
    properly. Hence, he found a convenient opportunity to quote the love poem filled
    with the “*[scio me nihil scire](https://en.wikipedia.org/wiki/I_know_that_I_know_nothing)*”
    message and thoughts on life after death in front of a full class of sleepy and
    uninterested students.
  prefs: []
  type: TYPE_NORMAL
- en: Ah, well. The teenage rebel in us decided back then that we didn’t want to learn
    the “dead language” properly because there was no beauty in it. (What a mistake
    this was!)
  prefs: []
  type: TYPE_NORMAL
- en: But so much truth in this small passage — “*knowledge is so frail*” — that was
    a favourite quote of my professor.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: No one is exempt from this, and science itself especially understands how frail
    knowledge is. It’s contradictory, messy, and flawed; one paper and finding often
    dispute another, experiments can’t be repeated, and it’s full of “politics” and
    “ranks” that pull the focus from discovery to prestige.
  prefs: []
  type: TYPE_NORMAL
- en: And yet, within this inherent messiness, we see an iterative process that continuously
    refines what we accept as “truth,” acknowledging that scientific knowledge is
    always open to revision.
  prefs: []
  type: TYPE_NORMAL
- en: Because of this, science is indisputably beautiful, and as it [progresses one
    funeral at a time](https://en.wikipedia.org/wiki/Planck%27s_principle#:~:text=Science%20progresses%20one%20funeral%20at%20a%20time),
    it gets firmer in its beliefs. We could now go deep into theory and discuss why
    this is happening, but then we would question everything science ever did and
    how it did it.
  prefs: []
  type: TYPE_NORMAL
- en: On the contrary, it would be more effective to establish a better relationship
    with “not knowing” and patch our knowledge holes that span back to fundamentals.
    (From Latin to Math.)
  prefs: []
  type: TYPE_NORMAL
- en: 'Because the difference between the people who are [very good at what they do
    and the very best ones](https://www.youtube.com/watch?v=Rsw3eWijBw4) is:'
  prefs: []
  type: TYPE_NORMAL
- en: “The very best in any field are not the best because of the flashy advanced
    things they can do, **rather they tend to be the best because of mastery of the
    fundamentals.”**
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Behold, frail knowledge, the era of LLMs is here
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Welcome to the era where LinkedIn will probably have more job roles with an
    “AI[insert_text]” [than a “Founder” label](https://www.linkedin.com/pulse/50-linkedin-statistics-every-professional-should-ti9ue/#:~:text=Hoffman%20in%202003.-,%22Founder%22,-is%20the%20most)
    and employees of the month that are AI agents.
  prefs: []
  type: TYPE_NORMAL
- en: 'The fabulous era of LLMs, filled with unlimited knowledge and clues on how
    the same stands frail as before:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0fd8fda3d76d47ee6dd0d46660ae023e.png)![](../Images/1306325855f0fc05030064fa375df4f0.png)![](../Images/ddc22bebd76ffae15a06145a63883a75.png)'
  prefs: []
  type: TYPE_IMG
- en: 'And simply:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4d394fad9127173ec3141c30c978e681.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Cherry on top: it’s on you to figure this out and *test* the outcomes or bear
    the consequences for not.'
  prefs: []
  type: TYPE_NORMAL
- en: “Testing”, proclaimed the believer, “that is part of the process.”
  prefs: []
  type: TYPE_NORMAL
- en: 'How could we ever forget *the process*? The “concept” that gets invoked whenever
    we need to obscure the truth: that we’re trading one type of labour for another,
    often without understanding the exchange rate.'
  prefs: []
  type: TYPE_NORMAL
- en: The irony is exquisite.
  prefs: []
  type: TYPE_NORMAL
- en: We built LLMs to help us know or do more things so we can focus on “what’s important.”
    However, we now find ourselves facing the challenge of constantly identifying
    whether what they tell us is true, which prevents us from focusing on what we
    should be doing. (Getting the knowledge!)
  prefs: []
  type: TYPE_NORMAL
- en: 'No strings attached; for an average of $20 per month, cancellation is possible
    at any time, and your questions will be answered with the confidence of a professor
    emeritus in one firm sentence: “*Sure, I can do that.*”'
  prefs: []
  type: TYPE_NORMAL
- en: Sure, it can…and then delivers complete hallucinations within seconds.
  prefs: []
  type: TYPE_NORMAL
- en: You could argue now that the price is worth it, and if you spend 100–200x this
    on someone’s salary, you still get the same outcome, which is not an acceptable
    cost.
  prefs: []
  type: TYPE_NORMAL
- en: Glory be the trade-off between technology and cost that was passionately battling
    on-premise vs. cloud costs before, and now additionally battles human vs. AI labour
    costs, all in the name of generating “the business value.”
  prefs: []
  type: TYPE_NORMAL
- en: “[Teams must demonstrate why they cannot get what they want done using AI](https://www.cnbc.com/2025/04/07/shopify-ceo-prove-ai-cant-do-jobs-before-asking-for-more-headcount.html#:~:text=cannot%20get%20what%20they%20want%20done%20using%20AI),”
    possibly to people who did similar work on the abstraction level. (But you will
    have a *process* to prove this!)
  prefs: []
  type: TYPE_NORMAL
- en: Of course, this is if you think that the cutting edge of technology can be purely
    responsible for generating the business value without the people behind it.
  prefs: []
  type: TYPE_NORMAL
- en: Think twice, because this cutting edge of technology is nothing more than a
    *tool*. A *tool* that can’t understand. A *tool* that needs to be maintained and secured.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A *tool* that people who already *knew* what they were doing, and were very
    skilled at this, are now using to some extent to make specific tasks less daunting.
  prefs: []
  type: TYPE_NORMAL
- en: A *tool* that assists them to come from point A to point B in a more performant
    way, while still taking ownership over what’s important — the full development
    logic and decision making.
  prefs: []
  type: TYPE_NORMAL
- en: Because they *understand* how to do things and what the *goal,* which should
    be fixed in *focus,* is.
  prefs: []
  type: TYPE_NORMAL
- en: And knowing and understanding are not the same thing, and they don’t yield the
    same results.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “But look at how much [insert_text] we’re producing,” proclaimed the believer
    again, mistaking *volume* for *value, output* for *outcome,* and *lies* for *truth.*
  prefs: []
  type: TYPE_NORMAL
- en: All because of frail knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: “The good enough” truth
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To paraphrase [Sheldon Cooper](https://en.wikipedia.org/wiki/Sheldon_Cooper)
    from one of my [favourite Big Bang Theory episodes:](https://bigbangtheory.fandom.com/wiki/The_Closet_Reconfiguration)
  prefs: []
  type: TYPE_NORMAL
- en: “It occurred to me that knowing and not knowing can be achieved by creating
    a macroscopic example of **[quantum superposition](https://en.wikipedia.org/wiki/Quantum_superposition).**
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: …
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you get presented with multiple stories, only one of which is true, and you
    don’t know which one it is, you will forever be in [**a state of epistemic ambivalence**](https://medicalexecutivepost.com/tag/epistemic-ambivalence/)**.**”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The “truth” now has multiple versions, but we are not always (or straightforwardly)
    able to determine which (if any) is correct without putting in precisely the mental
    effort we were trying to avoid in the first place.
  prefs: []
  type: TYPE_NORMAL
- en: These large models, trained on almost collective digital output of humanity,
    simultaneously know everything and nothing. They are probability machines, and
    when we interact with them, we’re not accessing the “truth” but engaging with
    a sophisticated statistical approximation of human knowledge. (Behold the knowledge
    gap; you won’t get closed!)
  prefs: []
  type: TYPE_NORMAL
- en: Human knowledge is frail itself; it comes with all our collective uncertainties,
    assumptions, biases, and gaps.
  prefs: []
  type: TYPE_NORMAL
- en: We know how we don’t know, so we rely on the tools that “assure us” they know
    how they know, with open disclaimers of how they don’t know.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This is our interesting new world: confident incorrectness at scale, democratized
    hallucination, and the industrialisation of the “*good enough*” truth.'
  prefs: []
  type: TYPE_NORMAL
- en: “*Good enough*,” we say as we skim the AI-generated report without checking
    its references.
  prefs: []
  type: TYPE_NORMAL
- en: “*Good enough,*” we mutter as we implement the code snippet without fully understanding
    its logic.
  prefs: []
  type: TYPE_NORMAL
- en: “*Good enough*,” we reassure ourselves as we build businesses atop foundations
    of statistical hallucinations.
  prefs: []
  type: TYPE_NORMAL
- en: (At least we demonstrated that AI can do it!)
  prefs: []
  type: TYPE_NORMAL
- en: '“*Good enough*” truth heading bold towards becoming the standard that follows
    lies and damned lies backed up with processes and a starting price tag of $20
    per month — pointing out that knowledge gaps will never be patched, and echoing
    a favourite poem passage from my Latin professor:'
  prefs: []
  type: TYPE_NORMAL
- en: '**“Ah, no one, no one knows anything. Knowledge is so frail!”**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
