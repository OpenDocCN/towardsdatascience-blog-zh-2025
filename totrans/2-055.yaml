- en: Generating Structured Outputs from LLMs
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从LLM生成结构化输出
- en: 原文：[https://towardsdatascience.com/generating-structured-outputs-from-llms/](https://towardsdatascience.com/generating-structured-outputs-from-llms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/generating-structured-outputs-from-llms/](https://towardsdatascience.com/generating-structured-outputs-from-llms/)
- en: <mdspan datatext="el1754676689102" class="mdspan-comment">Today, the most common</mdspan>
    interface for interacting with LLMs is through the classic chat UI found in [ChatGPT](https://chatgpt.com/),
    [Gemini](https://gemini.google.com/app), or [DeepSeek](https://deep-seek.chat/deepseek-chat/).
    The interface is quite simple, where the user inputs a body of text and the model
    responds with another body, which may or may not follow a specific structure.
    Since humans can understand unstructured natural language, this interface is suitable
    and quite effective for the target audience it was designed for.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754676689102" class="mdspan-comment">今天，与LLM交互最常见</mdspan>的接口是通过[ChatGPT](https://chatgpt.com/)、[Gemini](https://gemini.google.com/app)或[DeepSeek](https://deep-seek.chat/deepseek-chat/)中发现的经典聊天UI。该界面非常简单，用户输入一段文本，模型则响应另一段文本，这些文本可能或可能不遵循特定结构。由于人类可以理解非结构化的自然语言，因此该界面对于其设计的目标受众来说是合适且非常有效的。
- en: However, the user base of LLMs is much larger than the 8 billion humans living
    on Earth. It expands to millions of software programs that can potentially harness
    the power of such large generative models. Unlike humans, software programs cannot
    understand unstructured data, preventing them from exploiting the knowledge generated
    by these neural networks.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，LLM的用户基础远大于地球上居住的80亿人类。它扩展到数百万个软件程序，这些程序可能能够利用这些大型生成模型的力量。与人类不同，软件程序无法理解非结构化数据，这阻止了它们利用这些神经网络生成的知识。
- en: To address this issue, various techniques have been developed to generate outputs
    from LLMs following a predefined schema. This article will overview three of the
    most popular approaches for producing structured outputs from LLMs. It is written
    for engineers interested in integrating LLMs into their software applications.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，已经开发出各种技术来从LLM生成遵循预定义模式的结果。本文将概述从LLM生成结构化输出的三种最流行的方法。本文是为对将LLM集成到其软件应用中感兴趣的工程师所写。
- en: Structured Output Generation
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结构化输出生成
- en: Structured output generation from LLMs involves using these models to produce
    data that adheres to a predefined schema, rather than generating unstructured
    text. The schema can be defined in various formats, with JSON and regex being
    the most common. For example, when utilizing JSON format, the schema specifies
    the expected keys and the data types (such as int, string, float, etc.) for each
    value. The LLM then outputs a JSON object that includes only the defined keys
    and correctly formatted values.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 从大型语言模型（LLM）生成结构化输出涉及使用这些模型来生成符合预定义模式的数据，而不是生成非结构化文本。该模式可以定义在多种格式中，其中JSON和正则表达式是最常见的。例如，当使用JSON格式时，模式指定了每个值预期的键和数据类型（如int、string、float等）。然后LLM输出一个仅包含定义的键和正确格式化值的JSON对象。
- en: There are various situations where structured output is needed from LLMs. Formatting
    unstructured bodies of text is one large application area of this technology.
    You can use a model to extract specific information from large bodies of text
    or even images (using VLMs). For example, you can use a general VLM to extract
    the purchase date, total price, and store name from receipts.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在LLM中需要结构化输出的情况有很多。格式化非结构化文本是这项技术的一个大型应用领域。你可以使用模型从大量文本或甚至图像（使用VLM）中提取特定信息。例如，你可以使用一个通用的VLM从收据中提取购买日期、总价和商店名称。
- en: There are various techniques to generate structured outputs from LLMs. This
    article will discuss three.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 从LLM生成结构化输出的技术有很多。本文将讨论三种。
- en: Relying on API Providers
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 依赖API提供商
- en: Prompting and Reprompting Strategies
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示和重提示策略
- en: Constrained Decoding
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 约束解码
- en: Relying on API Providers *‘Magic’*
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 依赖API提供商的“魔法”
- en: Multiple LLM service API providers, including OpenAI and Google’s Gemini, allow
    users to define a schema for the model’s output. This schema is usually defined
    using a Pydantic class and provided to the API endpoint. If you are using LangChain,
    you can follow [this](https://python.langchain.com/docs/how_to/structured_output/)
    tutorial to integrate structured outputs into your application.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 包括OpenAI和谷歌的Gemini在内的多个LLM服务API提供商允许用户为模型的输出定义一个模式。这个模式通常使用Pydantic类定义，并提交给API端点。如果您使用LangChain，可以遵循[这个](https://python.langchain.com/docs/how_to/structured_output/)教程将结构化输出集成到您的应用程序中。
- en: Simplicity is the greatest aspect of this particular approach. You define the
    required schema in a manner familiar to you, pass it to the API provider, and
    sit back and relax as the service provider performs all the *magic* for you.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 简单性是这种特定方法最伟大的方面。您以您熟悉的方式定义所需的模式，将其传递给API提供商，然后坐下来放松，让服务提供商为您完成所有的*魔法*。
- en: Using this technique, however, will limit you to using only API providers that
    provide the described service. This limits the growth and flexibility of your
    projects, as it shuts the door to using multiple models, particularly open source
    ones. If the API providers suddenly decide to spike the price of the service,
    you will be forced either to accept the extra costs or look for another provider.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，使用这种技术将限制您只能使用提供所述服务的API提供商。这限制了您项目的增长和灵活性，因为它关闭了使用多个模型，尤其是开源模型的大门。如果API提供商突然决定提高服务的价格，您将被迫接受额外费用或寻找其他提供商。
- en: Moreover, it isn’t exactly *Hogwarts Magic* that the service provider does.
    The provider follows a certain approach to generate the structured output for
    you. Knowledge of the underlying technology will facilitate the app development
    and accelerate the debugging process and error understanding. For the mentioned
    reasons, grasping the underlying science is probably worth the effort.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，服务提供商所做的不完全是*霍格沃茨魔法*。提供商遵循某种方法为您生成结构化输出。了解底层技术将有助于应用程序开发并加速调试过程和错误理解。出于上述原因，掌握底层科学可能是值得努力的。
- en: Prompting and Reprompting-Based Techniques
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于提示和重提示（reprompting）的技术
- en: If you have chatted with an LLM before, then this technique is probably on your
    mind. If you want a model to follow a certain structure, just tell it to do so!
    In the system prompt, instruct the model to follow a certain structure, provide
    a few examples, and ask it not to add any additional text or description.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您之前与一个LLM进行过聊天，那么这种技术可能已经在您的脑海中。如果您想让模型遵循某种结构，只需告诉它这样做！在系统提示中，指示模型遵循某种结构，提供一些示例，并要求它不要添加任何额外的文本或描述。
- en: After the model responds to the user request and the system receives the output,
    you should use a parser to transform the sequence of bytes to an appropriate representation
    in the system. If parsing succeeds, then congratulate yourself and thank the power
    of prompt engineering. If parsing fails, then your system will have to recover
    from the error.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型响应用户请求并且系统接收到输出后，您应该使用解析器将字节序列转换为系统中的适当表示。如果解析成功，那么恭喜自己并感谢提示工程的力量。如果解析失败，那么您的系统将不得不从错误中恢复。
- en: Prompting is Not Enough
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示本身是不够的
- en: The problem with prompting is unreliability. On its own, prompting is not enough
    to trust a model to follow a required structure. It might add extra explanation,
    disregard certain fields, and use an incorrect data type. Prompting can be and
    should be coupled with error recovery techniques that handle the case where the
    model defies the schema, which is detected by parsing failure.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 提示（prompting）的问题在于其不可靠性。单独使用提示并不足以信任模型遵循所需的结构。它可能会添加额外的解释，忽略某些字段，并使用错误的数据类型。提示应该与错误恢复技术相结合，以处理模型违反模式的情况，这种情况是通过解析失败检测到的。
- en: Some people might think that a parser acts like a boolean function. It takes
    a string as input, checks its adherence to predefined grammar rules, and returns
    a simple *‘yes’* or *‘no’* answer. In reality, parsers are more complex than that
    and provide much richer information than **‘*follows’* or *‘does not follow’*
    structure.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人可能会认为解析器就像一个布尔函数。它接受一个字符串作为输入，检查其是否符合预定义的语法规则，并返回一个简单的*“是”*或*“否”*答案。实际上，解析器比这更复杂，并且提供比**“遵循”*或*“不遵循”*结构更丰富的信息。
- en: Parsers can detect mistakes and incorrect tokens in input text according to
    grammar rules [(Aho et al. 2007, 192–96)](#compilers). This information provides
    us with valuable information on the specifics of misalignments in the input string.
    For example, the parser is what detects a missing semicolon error when you’re
    running Java code.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 解析器可以根据语法规则检测输入文本中的错误和不正确的标记[(Aho et al. 2007, 192–96)](#compilers)。这些信息为我们提供了有关输入字符串中错位具体情况的宝贵信息。例如，解析器是检测你在运行Java代码时缺少分号错误的工具。
- en: '[Figure 1](#fig-prompt-based-flow) depicts the flow used in the prompting-based
    techniques.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[图1](#fig-prompt-based-flow)描述了基于提示技术的流程。'
- en: '![](../Images/03553fb7651dc52612d5648402ef3670.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/03553fb7651dc52612d5648402ef3670.png)'
- en: 'Figure 1: General Flow of Prompting and Reprompting Techniques. Generated using
    [mermaid](https://mermaid.js.org/) by the Author'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：提示和重提示技术的一般流程。由作者使用[mermaid](https://mermaid.js.org/)生成
- en: Prompting Tools
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示工具
- en: One of the most popular libraries for prompt based structured output generation
    from LLMs is [instructor](https://github.com/567-labs/instructor). Instructor
    is a Python library with over 11k stars on GitHub. It supports data definition
    with Pydantic, integrates with over 15 providers, and provides automatic retries
    on parsing failure. In addition to Python, the package is also avillable in [TypeScript](https://github.com/567-labs/instructor-js), [Go](https://github.com/567-labs/instructor-go), [Ruby](https://github.com/567-labs/instructor-rb),
    and [Rust](https://github.com/567-labs/instructor-rs) [(2)](#footnotes-1).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 最受欢迎的基于提示的LLM结构化输出生成库之一是[instructor](https://github.com/567-labs/instructor)。Instructor是一个在GitHub上拥有超过11k星标的Python库。它支持使用Pydantic进行数据定义，集成了超过15个提供者，并在解析失败时提供自动重试。除了Python，该包还可在[TypeScript](https://github.com/567-labs/instructor-js)、[Go](https://github.com/567-labs/instructor-go)、[Ruby](https://github.com/567-labs/instructor-rb)和[Rust](https://github.com/567-labs/instructor-rs)中使用[(2)](#footnotes-1)。
- en: The beauty of Instructor lies in its simplicity. All you need is to define a
    Pydantic class, initialize a client using only its name and API key (if required),
    and pass your request. The sample code below, from the [docs](https://python.useinstructor.com/),
    displays the simplicity of Instructor.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: Instructor的美丽之处在于其简单性。你所需要做的就是定义一个Pydantic类，使用其名称和API密钥（如果需要）初始化客户端，并传递你的请求。下面的示例代码，来自[docs](https://python.useinstructor.com/)，展示了Instructor的简单性。
- en: '[PRE0]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The Cost of Reprompting
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重提示的成本
- en: As convenient as the reprompting technique might be, it comes at a hefty cost.
    LLM usage cost, either service provider API costs or GPU usage, scales linearly
    with the number of input tokens and the number of generated tokens.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管重提示技术可能非常方便，但它代价高昂。LLM的使用成本，无论是服务提供商API成本还是GPU使用，都会随着输入标记数和生成标记数的线性增长而增长。
- en: As mentioned earlier prompting based techniques might require reprompting. The
    reprompt will have roughly the same cost as the original one. Hence, the cost
    scales linearly with the number of reprompts.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，基于提示的技术可能需要重提示。重提示的成本将与原始提示大致相同。因此，成本会随着重提示次数的线性增长而增长。
- en: If you’re going to use this technique, you have to keep the cost problem in
    mind. No one wants to be surprised by a large bill from an API provider. One idea
    to help cut surprising costs is to put emergency brakes into the system by applying
    a hard-coded limit on the number of allowed reprompts. This will help you put
    an upper limit on the costs of a single prompt and reprompt cycle.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你打算使用这种技术，你必须牢记成本问题。没有人愿意被API提供商的大额账单吓到。一个有助于减少意外成本的想法是在系统中应用硬编码的限制，以限制允许的重提示次数。这将帮助你将单个提示和重提示周期的成本限制在最高限度内。
- en: Constrained Decoding
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 约束解码
- en: Unlike the prompting, constrained decoding doesn’t need retries to generate
    a valid, structure-following output. Constrained decoding utilizes computational
    linguistics techniques and knowledge of the token generation process in LLMs to
    generate outputs that are guaranteed to follow the required schema.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 与提示不同，约束解码不需要重试来生成有效、遵循结构的输出。约束解码利用计算语言学技术和对LLM中标记生成过程的知识来生成保证遵循所需模式的输出。
- en: How It Works?
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 它是如何工作的？
- en: LLMs are autoregressive models. They generate one token at a time and the generated
    tokens are used as inputs to the same model.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: LLM是自回归模型。它们一次生成一个标记，并将生成的标记用作相同模型的输入。
- en: The last layer of an LLM is basically a logistic regression model that calculates
    for each token in the model’s vocabulary the probability of it following the input
    sequence. The model calculates the logits value for each token, then using the
    softmax function, these value are scaled and transformed to probability values.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: LLM 的最后一层基本上是一个逻辑回归模型，它为模型词汇表中的每个标记计算其跟随输入序列的概率。模型计算每个标记的 logits 值，然后使用 softmax
    函数，将这些值缩放并转换为概率值。
- en: Constrained decoding produces structured outputs by limiting the available tokens
    at each generation step. The tokens are picked so that the final output obeys
    the required structure. To figure out how the set of possible next tokens can
    be determined, we need to visit RegEx.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 限制解码通过限制每个生成步骤中可用的标记来产生结构化输出。标记的选择使得最终输出遵循所需的结构。为了了解如何确定可能的下一个标记集，我们需要访问 RegEx。
- en: Regular expressions, RegEx, are used to define specific patterns of text. They
    are used to check if a sequence of text matches an expected structure or schema.
    So basically, RegEx is a language that can be used to define expected structures
    from LLMs. Because of its popularity, there is a wide array of tools and libraries
    that transforms other forms of data structure definition like Pydantic classes
    and JSON to RegEx. Because of its flexibility and the wide availability of conversion
    tools, we can transform our goal now and focus on using LLMs to generate outputs
    following a RegEx pattern.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 正则表达式（RegEx）用于定义文本的特定模式。它们用于检查一个文本序列是否与预期的结构或模式相匹配。所以基本上，RegEx 是一种可以用来从 LLMs
    定义预期结构的语言。由于其流行度，存在大量工具和库可以将其他形式的数据结构定义（如 Pydantic 类和 JSON）转换为 RegEx。由于其灵活性和广泛的转换工具可用性，我们现在可以转换我们的目标，专注于使用
    LLMs 生成遵循 RegEx 模式的输出。
- en: Deterministic Finite Automata (DFA)
  id: totrans-42
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 确定性有限自动机（DFA）
- en: One of the ways a RegEx pattern can be compiled and tested against a body of
    text is by transforming the pattern into a deterministic finite automata (DFA).
    A DFA is simply a state machine that is used to check if a string follows a certain
    structure or pattern.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 编译 RegEx 模式并对其与文本体进行测试的一种方法是将模式转换为确定性有限自动机（DFA）。DFA 简单来说是一个状态机，用于检查一个字符串是否遵循某种结构或模式。
- en: A DFA consists of 5 components.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 DFA 由 5 个组件组成。
- en: A set of tokens (called the alphabet of the DFA)
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一组标记（称为 DFA 的字母表）
- en: A set of states
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一组状态
- en: A set of transitions. Each transition connects two states (maybe connecting
    a state with itself) and is annotated with a token from the alphabet
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一组转换。每个转换连接两个状态（可能是一个状态连接到自身）并注有来自字母表的一个标记
- en: A start state (marked with an input arrow)
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个起始状态（用输入箭头标记）
- en: One or more final states (marked as double circles)
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个或多个最终状态（标记为双圆圈）
- en: A string is a sequence of tokens. To test a string against the pattern defined
    by a DFA, you begin at the start state and loop over the string’s tokens, taking
    the transition corresponding to the token at each move. If at any point you have
    a token for which no corresponding transition exists from the current state, parsing
    fails and the string defies the schema. If parsing ends at one of the final states,
    then the string matches the pattern; otherwise it also fails.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 一个字符串是一系列标记的序列。要测试一个字符串是否与由 DFA 定义的模式匹配，你从起始状态开始，遍历字符串的标记，在每次移动时采取与标记相对应的转换。如果在任何时刻，你有一个没有从当前状态到相应转换的标记，解析失败，字符串违反了模式。如果解析结束于一个最终状态，则字符串匹配模式；否则也失败。
- en: '![](../Images/13eccb916882789fa04805a2874f69dd.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/13eccb916882789fa04805a2874f69dd.png)'
- en: 'Figure 2: Example for a DFA with the alphabet `{a, b}`, states `{q0, q1, q2}`,
    and a single final state, `q2`. Generated using [Grpahviz](https://graphviz.org/)
    by the Author.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2：具有字母表 `{a, b}`、状态 `{q0, q1, q2}` 和单个最终状态 `q2` 的 DFA 的示例。由作者使用 [Grpahviz](https://graphviz.org/)
    生成。
- en: For example, the string `abab` matches the pattern in [Figure 2](#fig-dfa-example) because
    starting at `q0` and following the transitions marked with `a`, `b`, `a`, and `b` in
    this order will land us at `q2`, which is a final state.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，字符串 `abab` 与 [图 2](#fig-dfa-example) 中的模式匹配，因为从 `q0` 开始，按照 `a`、`b`、`a` 和
    `b` 的顺序跟随标记的转换，最终会到达 `q2`，这是一个最终状态。
- en: On the other hand, the string `abba` doesn’t match the pattern because its path
    ends at `q0` which isn’t a final state.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，字符串 `abba` 不匹配模式，因为其路径结束于 `q0`，这不是一个最终状态。
- en: A great thing about RegEx is that it can be compiled into a DFA; after all,
    they are just two different ways to specify patterns. Discussion of such a transformation
    is out of scope for this article. The interested reader can check [Aho et al.
    (2007, 152–66)](#compilers) for a discussion of 2 techniques to perform the transformation.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 正则表达式的一个优点是它可以编译成 DFA；毕竟，它们只是指定模式的不同方式。关于这种转换的讨论超出了本文的范围。感兴趣的读者可以查看 [Aho et
    al. (2007, 152–66)](#compilers) 以了解执行转换的两种技术。
- en: DFA for Valid Next Tokens Set
  id: totrans-56
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 有效下一个标记集合的 DFA
- en: '![](../Images/bb374eca5b6ee5b35597da8af649fea2.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bb374eca5b6ee5b35597da8af649fea2.png)'
- en: 'Figure 3: Example for a DFA generated from the RegEx `a(b|c)*d`. Generated
    using [Grpahviz](https://graphviz.org/) by the Author.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3：从正则表达式 `a(b|c)*d` 生成的 DFA 的示例。由作者使用 [Grpahviz](https://graphviz.org/) 生成。
- en: Let’s recap what we have reached so far. We wanted a technique to figure out
    the set of valid next tokens to follow a certain schema. We defined the schema
    using RegEx and transformed it into a DFA. Now we are going to show that a DFA
    informs us of the set of possible tokens at any point during parsing, fitting
    our requirements and needs.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下我们已经达到的。我们想要一种技术来确定遵循特定模式的有效下一个标记集合。我们使用正则表达式定义了模式，并将其转换为 DFA。现在我们将展示
    DFA 如何在解析过程中任何时刻告诉我们可能的标记集合，符合我们的需求和目标。
- en: After building the DFA, we can easily determine in *O(1)* the set of valid next
    tokens while standing at any state. It is the set of tokens annotating any transition
    exiting from the current state.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建了 DFA 之后，我们可以轻松地在任何状态下确定有效下一个标记的集合，这是从当前状态退出的任何转换标注的标记集合。
- en: Consider the DFA in [Figure 3](#fig-regex-to-dfa), for example. The following
    table shows the set of valid next tokens for each state.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 以 [图 3](#fig-regex-to-dfa) 中的 DFA 为例。下表显示了每个状态的有效下一个标记集合。
- en: '| State | Valid Next Tokens |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| 状态 | 有效下一个标记 |'
- en: '| --- | --- |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| `q0` | {`a`} |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| `q0` | {`a`} |'
- en: '| `q1` | {`b`, `c`, `d`} |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '| `q1` | {`b`, `c`, `d`} |'
- en: '| `q2` | {} |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
  zh: '| `q2` | {} |'
- en: Applying the DFA to LLMs
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将 DFA 应用到 LLMs
- en: Getting back to our structured output from LLMs problem, we can transform our
    schema to a RegEx then to a DFA. The alphabet of this DFA will be set to the LLM’s
    vocabulary (the set of all tokens the model can generate). While the model generates
    tokens, we will move through the DFA, starting at the start state. At each step,
    we will be able to determine the set of valid next tokens.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 回到我们从 LLMs 获取结构化输出的问题上，我们可以将我们的模式转换为正则表达式，然后转换为 DFA。这个 DFA 的字母表将被设置为 LLM 的词汇（模型可以生成的所有标记的集合）。当模型生成标记时，我们将通过
    DFA 移动，从起始状态开始。在每一步，我们都能确定有效下一个标记的集合。
- en: The trick now happens at the softmax scaling stage. By zeroing out the logits
    of all tokens that are not in the valid tokens set, we will calculate probabilities
    only for valid tokens, forcing the model to generate a sequence of tokens that
    follows the schema. That way, we can generate structured outputs with zero additional
    costs!
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的技巧发生在 softmax 缩放阶段。通过将不在有效标记集合中的所有标记的 logits 设置为零，我们只计算有效标记的概率，迫使模型生成遵循模式的标记序列。这样，我们可以以零额外成本生成结构化输出！
- en: Constrained Decoding Tools
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 约束解码工具
- en: One of the most popular Python libraries for constrained decoding is Outlines [(Willard
    and Louf 2023)](#outlines). It is very simple to use and integrates with many
    LLM providers like [OpenAI](https://openai.com/), [Anthropic](https://www.anthropic.com/), [Ollama](https://www.ollama.com/),
    and [vLLM](https://github.com/vllm-project/vllm).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: Outlines [(Willard and Louf 2023)](#outlines) 是最受欢迎的用于约束解码的 Python 库之一。它非常易于使用，并且可以与许多
    LLM 提供商集成，如 [OpenAI](https://openai.com/)、[Anthropic](https://www.anthropic.com/)、[Ollama](https://www.ollama.com/)
    和 [vLLM](https://github.com/vllm-project/vllm)。
- en: You can define the schema using a Pydantic class, for which the library handles
    the RegEx transformation, or directly using a RegEx pattern.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用 Pydantic 类定义模式，库将处理正则表达式转换，或者直接使用正则表达式模式。
- en: '[PRE1]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The code snippet above from the [docs](https://dottxt-ai.github.io/outlines/latest/) displays
    the simplicity of using Outlines. For more information on the library, you can
    check the [docs](https://dottxt-ai.github.io/outlines/latest/) and the [dottxt
    blogs](https://blog.dottxt.ai/).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的代码片段来自 [docs](https://dottxt-ai.github.io/outlines/latest/)，展示了使用 Outlines
    的简单性。有关库的更多信息，您可以查看 [docs](https://dottxt-ai.github.io/outlines/latest/) 和 [dottxt
    博客](https://blog.dottxt.ai/)。
- en: Conclusion
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'Structured output generation from LLMs is a powerful tool that expands the
    possible use cases of LLMs beyond the simple human chat. This article discussed
    three approaches: relying on API providers, prompting and reprompting strategies,
    and constrained decoding. For most scenarios, constrained decoding is the favoured
    method because of its flexibility and low cost. Moreover, the existence of popular
    libraries like Outlines simplifies the introduction of constrained decoding to
    software projects.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 从LLMs生成结构化输出是一个强大的工具，它扩展了LLMs在简单人机聊天之外的潜在应用场景。本文讨论了三种方法：依赖API提供商、提示和重提示策略，以及约束解码。在大多数情况下，由于其灵活性和低成本，约束解码是首选方法。此外，像Outlines这样的流行库的存在简化了约束解码在软件项目中的引入。
- en: If you want to learn more about constrained decoding, then I would highly recommend [this
    course](https://www.deeplearning.ai/short-courses/getting-structured-llm-output/) from [deeplearning.ai](https://www.deeplearning.ai/) and [dottxt](https://dottxt.ai/),
    the creators of Outlines library. Using videos and code examples, this course
    will help you get hands-on experience getting structured outputs from LLMs using
    the techniques discussed in this post.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解更多关于约束解码的信息，我强烈推荐由Outlines库的创造者[deeplearning.ai](https://www.deeplearning.ai/)和[dottxt](https://dottxt.ai/)提供的[这门课程](https://www.deeplearning.ai/short-courses/getting-structured-llm-output/)。该课程通过视频和代码示例，帮助你通过本文讨论的技术从LLMs中获得结构化输出，获得实际操作经验。
