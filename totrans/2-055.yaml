  type: TYPE_NORMAL
- en: '[1] Aho, Alfred V., Monica S. Lam, Ravi Sethi, and Jeffrey D. Ullman, *Compilers:
    Principles, Techniques, & Tools* (2007), Pearson/Addison Wesley'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] Willard, Brandon T., and Rémi Louf, Efficient Guided Generation for Large
