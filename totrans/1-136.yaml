- en: 'MobileNetV3 Paper Walkthrough: The Tiny Giant Getting Even Smarter'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: MobileNetV3 论文解读：小型巨兽变得更聪明
- en: 原文：[https://towardsdatascience.com/mobilenetv3-paper-walkthrough-the-tiny-giant-getting-even-smarter/](https://towardsdatascience.com/mobilenetv3-paper-walkthrough-the-tiny-giant-getting-even-smarter/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/mobilenetv3-paper-walkthrough-the-tiny-giant-getting-even-smarter/](https://towardsdatascience.com/mobilenetv3-paper-walkthrough-the-tiny-giant-getting-even-smarter/)'
- en: <mdspan datatext="el1761970148813" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761970148813" class="mdspan-comment">引言</mdspan>
- en: 'Welcome back to the Tiny Giant series — a series where I share what I learned
    about MobileNet architectures. In the past two articles I covered MobileNetV1
    and MobileNetV2\. Check out references [1] and [2] if you’re interested in reading
    them. In today’s article I would like to continue with the next version of the
    model: MobileNetV3.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎回到小型巨兽系列——在这个系列中，我分享了我对 MobileNet 架构的了解。在前两篇文章中，我介绍了 MobileNetV1 和 MobileNetV2。如果您感兴趣，可以查看参考文献
    [1] 和 [2]。在今天的文章中，我将继续介绍模型的下一个版本：MobileNetV3。
- en: 'MobileNetV3 was first proposed in a paper titled “*Searching for MobileNetV3*”
    written by Howard *et al.* in 2019 [3]. Just a quick review: the main idea of
    the first MobileNet version was replacing full-convolutions with depthwise separable
    convolutions, which reduced the number of params by nearly 90% compared to its
    standard CNN counterpart. In the second MobileNet version, the authors introduced
    the so-called *inverted residual* and *linear bottleneck* mechanisms, which they
    integrated into the original MobileNetV1 building blocks. Now in the third MobileNet
    version, the authors attempted to push the performance of the network even further
    by incorporating *Squeeze-and-Excitation* (SE) modules and *hard activation functions*
    into the building blocks. Additionally, the overall structure of MobileNetV3 itself
    is partially designed using NAS (*Neural Architecture Search*), in which it essentially
    works somewhat like a parameter tuning that operates on the architectural level
    by maximizing accuracy while minimizing latency. However, note that in this article
    I won’t go into how NAS works in detail. Instead, I will focus on the final design
    of MobileNetV3 proposed in the paper.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: MobileNetV3 首次在 2019 年由 Howard 等人撰写的题为“*Searching for MobileNetV3*”的论文中提出 [3]。简要回顾一下：第一个
    MobileNet 版本的主要思想是用深度可分离卷积替换全卷积，与标准 CNN 相比，参数数量减少了近 90%。在第二个 MobileNet 版本中，作者引入了所谓的
    *倒残差* 和 *线性瓶颈* 机制，并将它们整合到原始的 MobileNetV1 块中。现在在第三个 MobileNet 版本中，作者通过将 *Squeeze-and-Excitation*
    (SE) 模块和 *硬激活函数* 集成到块中，试图进一步提高网络性能。此外，MobileNetV3 的整体结构部分是通过 NAS (*神经架构搜索*) 设计的，它本质上是一种在架构层面上通过最大化准确率同时最小化延迟进行参数调整的操作。然而，请注意，在这篇文章中，我不会详细介绍
    NAS 的工作原理。相反，我将专注于论文中提出的 MobileNetV3 的最终设计。
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Detailed MobileNetV3 Architecture
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MobileNetV3 的详细架构
- en: The authors propose two variants of this model which they refer to as MobileNetV3-Large
    and MobileNetV3-Small. You can see the details of the two architectures in Figure
    1 below.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提出了该模型的两种变体，它们分别被称为 MobileNetV3-Large 和 MobileNetV3-Small。您可以在下面的图 1 中看到这两个架构的详细信息。
- en: '![](../Images/0634d0455d36b50e03f27c812d91fd71.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0634d0455d36b50e03f27c812d91fd71.png)'
- en: Figure 1\. The MobileNetV3-Large (left) and MobileNetV3-Small (right) architectures
    [3].
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1. MobileNetV3-Large (左) 和 MobileNetV3-Small (右) 架构 [3]。
- en: Taking a closer look at the architecture, we can see that the two networks mainly
    consist of *bneck* (*bottleneck*) blocks. The configuration of the blocks themselves
    is described in columns *exp size*, *#out*, *SE*, *NL*, and *s*. The internal
    structure of these blocks as well as the corresponding parameter configurations
    will be discussed further in the following subsection.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细观察架构，我们可以看到这两个网络主要由 *bneck* (*瓶颈*) 块组成。这些块本身的配置在 *exp size*、*#out*、*SE*、*NL*
    和 *s* 列中描述。这些块的内结构和相应的参数配置将在下一个小节中进一步讨论。
- en: '* * *'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Bottleneck
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 瓶颈
- en: MobileNetV3 uses the modified version of the building blocks used in MobileNetV2\.
    As I’ve mentioned earlier, what makes the two different is the presence of SE
    module and the use of hard activation function. You can see the two building blocks
    in Figure 2, with MobileNetV2 at the top and MobileNetV3 at the bottom.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: MobileNetV3 使用了 MobileNetV2 中使用的修改版块。正如我之前提到的，两者之间的区别在于 SE 模块的存在以及硬激活函数的使用。您可以在图
    2 中看到这两个块，MobileNetV2 在顶部，MobileNetV3 在底部。
- en: '![](../Images/7e4013cb746ff013f1fd2b2e9f138d6d.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7e4013cb746ff013f1fd2b2e9f138d6d.png)'
- en: Figure 2\. The MobileNetV2 (top) and MobileNetV3 (bottom) building blocks [3].
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. MobileNetV2（顶部）和MobileNetV3（底部）构建块[3]。
- en: 'Notice that the first two convolution layers in both building blocks are basically
    the same: a pointwise convolution followed by a depthwise convolution. The former
    is used for expanding the number of channels to *exp size* (*expansion size*),
    whereas the latter is responsible to process each channel of the resulting tensor
    independently. The only difference between the two building blocks lies in the
    activation functions used, which they refer to as *NL* (*Nonlinearity*). In MobileNetV2,
    the activation functions placed after the two convolution layers are set fixed
    to ReLU6, whereas in MobileNetV3 it can either be ReLU6 or *hard-swish*. The *RE*
    and *HS* you saw earlier in Figure 1 basically refer to these two types of activations.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到两个构建块中的前两个卷积层基本上是相同的：一个点卷积后面跟着一个深度卷积。前者用于将通道数扩展到*exp size*（扩展大小），而后者负责独立处理结果张量的每个通道。这两个构建块之间的唯一区别在于它们使用的激活函数，它们称之为*NL*（非线性）。在MobileNetV2中，放置在两个卷积层之后的激活函数被固定为ReLU6，而在MobileNetV3中可以是ReLU6或*hard-swish*。你之前在图1中看到的*RE*和*HS*基本上指的是这两种类型的激活。
- en: Next, in MobileNetV3 we place the SE module after the depthwise convolution
    layer. If you’re not yet familiar with SE module, it is essentially a kind of
    building block we can attach in any kind of CNN-based model. This component is
    useful for giving weights to different channels, allowing the model to pay more
    attention to the important channels only. I actually have a separate article discussing
    the SE module in detail. Click on the link at reference number [4] if you want
    to read that one. It is important to note that the SE module used here is slightly
    different, in that the last FC layer uses *hard-sigmoid* rather than the standard
    sigmoid activation function. (I’ll talk more about the hard activations used in
    MobileNetV3 later in the subsequent subsection.)  In fact, the SE module itself
    is not always included in every bottleneck block. If you go back to Figure 1,
    you’ll notice that some of the bottleneck blocks have a checkmark in the *SE*
    column, indicating that the SE module is applied. On the other hand, some blocks
    don’t include the module, which might probably be because the NAS process didn’t
    find any performance improvement from using SE modules in those blocks.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，在MobileNetV3中，我们在深度卷积层之后放置SE模块。如果你还不熟悉SE模块，它本质上是一种我们可以附加到任何基于CNN的模型中的构建块。这个组件对于为不同通道赋予权重非常有用，允许模型只关注重要的通道。我实际上有一篇单独的文章详细讨论SE模块。如果你想阅读那篇文章，请点击参考文献[4]中的链接。需要注意的是，这里使用的SE模块略有不同，因为最后一个全连接层使用的是*hard-sigmoid*而不是标准的sigmoid激活函数。（我将在后续小节中更详细地讨论MobileNetV3中使用的硬激活。）实际上，SE模块并不总是包含在每个瓶颈块中。如果你回到图1，你会注意到一些瓶颈块在*SE*列上有勾选，表示应用了SE模块。另一方面，一些块没有包含该模块，这可能是因为NAS过程没有在这些块中使用SE模块找到任何性能提升。
- en: As the SE module has been connected, we need to place another pointwise convolution,
    which is responsible to adjust the number of output channels according to the
    *#out* column in Figure 1\. This pointwise convolution does not include any activation
    function, aligning with the *linear bottleneck* design originally introduced in
    MobileNetV2.  I actually need to clarify something here. If you take a look at
    the MobileNetV2 building block in Figure 2 above, you’ll notice that the last
    pointwise convolution has a ReLU6 placed on it. I believe this is a mistake made
    by the authors, because according to the MobileNetV2 paper [6], the ReLU6 should
    be in the first pointwise convolution at the beginning of the block instead.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 由于SE模块已经连接，我们需要放置另一个点卷积，该卷积负责根据图1中的*#out*列调整输出通道数。这个点卷积不包含任何激活函数，与MobileNetV2最初引入的*线性瓶颈*设计相一致。实际上，我需要在这里澄清一点。如果你查看图2中上面的MobileNetV2构建块，你会注意到最后一个点卷积上放置了一个ReLU6。我相信这是作者犯的一个错误，因为根据MobileNetV2论文[6]，ReLU6应该在块开始处的第一个点卷积中。
- en: Last but not least, notice that there is also a residual connection that skips
    across all layers in the bottleneck block. This connection is only present when
    the output tensor has the exact same dimensions as the input, i.e., when the number
    of input and output channels is the same and when the *s* (stride) is 1.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，请注意，瓶颈块中还有一个跳过所有层的残差连接。这个连接仅在输出张量与输入具有完全相同的维度时存在，即当输入和输出通道的数量相同，并且*s*（步长）为1时。
- en: Hard-Sigmoid and Hard-Swish
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Hard-Sigmoid和Hard-Swish
- en: The activation functions used in MobileNetV3 are not commonly found in other
    deep learning models. To start with, let’s look at the *hard-sigmoid* activation
    first, which is the one used in the SE module as a replacement for the conventional
    sigmoid. Take a look at Figure 3 below to see the difference between the two.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在MobileNetV3中使用的激活函数在其他深度学习模型中并不常见。首先，让我们先看看*hard-sigmoid*激活函数，它是SE模块中用来替代传统sigmoid的激活函数。请看下面的图3，以了解两者的区别。
- en: '![](../Images/7ee6190c190cfd5fa14cfb329383d742.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7ee6190c190cfd5fa14cfb329383d742.png)'
- en: Figure 3\. The sigmoid and the hard-sigmoid activation functions [3].
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图3. Sigmoid和hard-sigmoid激活函数[3]。
- en: Here you might probably be wondering, why don’t we just use the conventional
    sigmoid? Why do we really need to use piecewise linear function that appears less
    smooth instead? To answer this question, we need to understand the mathematical
    definition of a sigmoid function in advance, which I provide in Figure 4 below.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能还在想，我们为什么不直接使用传统的sigmoid呢？为什么我们真的需要使用看起来不那么平滑的分段线性函数呢？为了回答这个问题，我们需要先了解sigmoid函数的数学定义，我在下面的图4中提供了它。
- en: '![](../Images/38232634a4cb114c4f448235f12ac047.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/38232634a4cb114c4f448235f12ac047.png)'
- en: Figure 4\. The equation of the standard sigmoid function [5].
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图4. 标准sigmoid函数的公式[5]。
- en: We can clearly see in the above figure that the sigmoid function originally
    involves an exponential term in the denominator. In fact, this term causes the
    function to be computationally expensive, which in turn makes the activation function
    less suitable for low-power devices. Not only that, the output of the sigmoid
    function itself is a high-precision floating-point value, which is also not preferable
    for low-power devices due to their limited support for handling such values.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在上面的图中可以清楚地看到，sigmoid函数原本在分母中涉及一个指数项。事实上，这个项使得函数在计算上变得昂贵，这反过来又使得激活函数对低功耗设备来说不太合适。不仅如此，sigmoid函数的输出本身就是一个高精度的浮点值，由于低功耗设备处理此类值的有限支持，这也并不理想。
- en: If you look at Figure 3 again, you might think that the hard-sigmoid function
    is directly derived from the original sigmoid.  In fact, that’s actually not quite
    right. Despite having a similar shape, hard-sigmoid is basically constructed using
    ReLU6 instead, which can formally be expressed in Figure 5 below. Here you can
    see that the equation is much simpler as it only consists of basic arithmetic
    operations and clipping, allowing it to be processed much faster.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你再次看图3，你可能会认为hard-sigmoid函数是直接从原始sigmoid导出的。实际上，这并不完全正确。尽管形状相似，但hard-sigmoid基本上是使用ReLU6构建的，这可以从下面的图5中正式表达出来。在这里，你可以看到方程式非常简单，因为它只包含基本的算术运算和裁剪，这使得它能够被更快地处理。
- en: '![](../Images/dd84efa6fbeac248044e6312b02f6025.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dd84efa6fbeac248044e6312b02f6025.png)'
- en: Figure 5\. The equation of the hard sigmoid function [5].
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图5. hard sigmoid函数的公式[5]。
- en: The next activation function we are going to utilize in MobileNetV3 is the so-called
    *hard-swish*, which will be implemented after each of the first two convolution
    layers in the bottleneck block. Just like sigmoid and hard-sigmoid, the graph
    of the hard-swish function appears to be similar to the original one.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在MobileNetV3中使用的下一个激活函数被称为*hard-swish*，它将在瓶颈块中的前两个卷积层之后实现。就像sigmoid和hard-sigmoid一样，hard-swish函数的图像看起来与原始的相似。
- en: '![](../Images/016f8fab6df25a9bf27bad24cfb1e706.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/016f8fab6df25a9bf27bad24cfb1e706.png)'
- en: Figure 6\. The swish and hard-swish activation functions [3].
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图6. Swish和hard-swish激活函数[3]。
- en: The original swish function itself can mathematically be expressed in the equation
    in Figure 7\. Again, since the equation involves sigmoid, it will definitely slow
    down the computation. Hence, to speed up the process, we can simply replace the
    sigmoid function with hard-sigmoid we just discussed. By doing so, we now have
    the hard version of the swish activation function as shown in Figure 8.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 原始的swish函数本身可以在图7中的方程式中从数学上表示。再次强调，由于方程式涉及sigmoid函数，它肯定会减慢计算速度。因此，为了加快过程，我们可以简单地用我们刚刚讨论的hard-sigmoid函数替换sigmoid函数。通过这样做，我们现在有了如图8所示的hard
    swish激活函数的硬版本。
- en: '![](../Images/2ff26a7cba5d42913999ef542f909cb7.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2ff26a7cba5d42913999ef542f909cb7.png)'
- en: Figure 7\. The equation of the swish activation function [5].
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图7. Swish激活函数的方程式[5]。
- en: '![](../Images/29a4622c092721b9bc860f43f967ac38.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/29a4622c092721b9bc860f43f967ac38.png)'
- en: Figure 8\. The equation of the hard-swish activation function [5].
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图8. hard swish激活函数的方程式[5]。
- en: '* * *'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Some Experimental Results
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一些实验结果
- en: Before we get into the experimental results, you need to know that there are
    two parameters in MobileNetV3 that allow us to adjust the model size according
    to our needs. These two parameters are *width multiplier* and *input resolution*,
    which in MobileNetV1 are known as *α* and *ρ*, respectively. Although we can technically
    adjust the value for the two freely, the authors already provided several numbers
    we can use. For the *width multiplier*, we can set it to either 0.35, 0.5, 0.75,
    1.0, or 1.25, where using a value smaller than 1.0 causes the model to have fewer
    number of channels than those disclosed in Figure 1, effectively reducing the
    model size. For instance, if we set this parameter to 0.35, then the model will
    only have 35% of its default width (i.e., channel count) throughout the entire
    network.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入实验结果之前，你需要知道MobileNetV3中有两个参数允许我们根据我们的需求调整模型大小。这两个参数是*宽度乘数*和*输入分辨率*，在MobileNetV1中分别被称为*α*和*ρ*。虽然我们可以技术上自由调整这两个参数的值，但作者已经提供了我们可以使用的几个数字。对于*宽度乘数*，我们可以将其设置为0.35、0.5、0.75、1.0或1.25，其中使用小于1.0的值会导致模型比图1中披露的具有更少的通道数，从而有效地减小模型大小。例如，如果我们将此参数设置为0.35，那么整个网络中模型的宽度（即通道数）将只有默认宽度的35%。
- en: Meanwhile, the input resolution can either be 96, 128, 160, 192, 224, or 256,
    which as the name suggests, it directly controls the spatial dimension of the
    input image. It is worth noting that even though using a small input size reduces
    the number of operations during inference, it does not affect the model size at
    all. So, if your objective is to reduce model size, you need to adjust the *width
    multiplier*, whereas if your goal is to lower computational cost, you can play
    around with both the *width multiplier* and *input resolution*.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，输入分辨率可以是96、128、160、192、224或256，正如其名所示，它直接控制输入图像的空间维度。值得注意的是，尽管使用较小的输入大小会减少推理过程中的操作数，但它根本不影响模型大小。因此，如果你的目标是减小模型大小，你需要调整*宽度乘数*，而如果你的目标是降低计算成本，你可以同时调整*宽度乘数*和*输入分辨率*。
- en: Now looking at the experimental results in Figure 9, we can clearly see that
    MobileNetV3 outperforms MobileNetV2 in terms of accuracy at similar latency. The
    MobileNetV3-Small of default configuration (i.e., *width multiplier* 1.0 and *input
    resolution* 224×224) indeed has a lower accuracy than the largest MobileNetV2
    variant. But if you take the default MobileNetV3-Large into account, it got an
    easy win over the largest MobileNetV2 both in terms of accuracy and latency. Additionally,
    we can still push the accuracy of MobileNetV3 even further by enlarging the model
    size by 1.25 times (the blue datapoint at the top right), but keep in mind that
    doing so significantly sacrifices computational speed.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在看看图9中的实验结果，我们可以清楚地看到，在相似的延迟下，MobileNetV3在准确性方面优于MobileNetV2。默认配置的MobileNetV3-Small（即*宽度乘数*
    1.0和*输入分辨率* 224×224）的确比最大的MobileNetV2变体具有更低的准确性。但如果你考虑默认的MobileNetV3-Large，它在准确性和延迟方面都轻松胜过了最大的MobileNetV2。此外，我们还可以通过将模型大小扩大1.25倍（右上角的蓝色数据点）进一步提高MobileNetV3的准确性，但请注意，这样做会显著牺牲计算速度。
- en: '![](../Images/9c8b198fbd2c4e2dcb3aab576cb68500.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9c8b198fbd2c4e2dcb3aab576cb68500.png)'
- en: Figure 9\. Performance comparison between MobileNetV3-Large, MobileNetV3-Small,
    and MobileNetV2 [3].
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图9. MobileNetV3-Large、MobileNetV3-Small和MobileNetV2之间的性能比较[3]。
- en: The authors also conducted a comparative analysis with other lightweight models,
    of which the results are shown in the table in Figure 10.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 作者们还与其他轻量级模型进行了比较分析，其结果如图10中的表格所示。
- en: '![](../Images/f23d36a21ffd92019bbc29f824c0d41c.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f23d36a21ffd92019bbc29f824c0d41c.png)'
- en: Figure 10\. Performance comparison of MobileNetV3 with other lightweight models [3].
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图10. 与其他轻量级模型相比MobileNetV3的性能[3]。
- en: The rows of the table above are divided into two groups, where the upper group
    is used to compare models with complexity similar to MobileNetV3-Large, while
    the lower group consists of models comparable to MobileNetV3-Small. Here you can
    see that both V3-Large and V3-Small obtained the best accuracy on ImageNet within
    their respective groups. It is worth noting that although MnasNet-A1 and V3-Large
    have the exact same accuracy, the number of operations (*MAdds*) of the former
    model is higher, which results in higher latency, as seen in columns *P-1*, *P-2*,
    and *P-3* (measured in milliseconds). In case you’re wondering, the labels *P-1*,
    *P-2*, and *P-3* essentially correspond to different Google Pixel series used
    to test the actual computational speed. Next, it is necessary to acknowledge that
    both MobileNetV3 variants have the highest parameter count (the *params* column)
    compared to other models in their group. However, this does not seem to be a major
    concern for the authors as the primary goal of MobileNetV3 is to minimize computational
    latency, even if that means having a slightly bigger model.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的表格行分为两组，其中上组用于比较与MobileNetV3-Large复杂度相似的模型，而下组由与MobileNetV3-Small相当的模型组成。在这里你可以看到，V3-Large和V3-Small在其各自组内都获得了最佳的准确率。值得注意的是，尽管MnasNet-A1和V3-Large具有相同的准确率，但前者的操作数（*MAdds*）更多，这导致了更高的延迟，如*P-1*、*P-2*和*P-3*列（以毫秒为单位）所示。如果你在好奇，标签*P-1*、*P-2*和*P-3*实际上对应于用于测试实际计算速度的不同Google
    Pixel系列。接下来，有必要承认，与组内其他模型相比，MobileNetV3的两个变体都有最高的参数数量（*params*列）。然而，这似乎并不是作者们的主要关注点，因为MobileNetV3的主要目标是最大限度地减少计算延迟，即使这意味着模型会稍微大一些。
- en: The next experiment the authors conducted was about the effects of value quantization,
    i.e., a technique that reduces the precision of floating-point numbers to speed
    up computation. While the networks already incorporate hard activation functions,
    which are compatible with quantized values, this experiment takes quantization
    a step further by applying it to the entire network to see how much the speed
    improves. The experimental results when value quantization was applied are shown
    in Figure 11 below.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 作者们进行的下一个实验是关于值量化（value quantization）的影响，即一种降低浮点数精度以加快计算的技术。虽然网络已经包含了与量化值兼容的硬激活函数，但这个实验通过将量化应用于整个网络来进一步推进量化，以查看速度能提高多少。应用值量化时的实验结果如图11所示。
- en: '![](../Images/ae767ef11848a7804aea5710e5bf740d.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ae767ef11848a7804aea5710e5bf740d.png)'
- en: Figure 11\. The accuracy and latency of MobileNetV2 and MobileNetV3 when using
    quantized values [3].
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图11. 使用量化值时MobileNetV2和MobileNetV3的准确性和延迟[3]。
- en: If you compare the results of V2 and V3 in Figure 11 with the corresponding
    models in Figure 10, you’ll notice that there is a decrease in latency, proving
    that the use of low-precision numbers does improve computational speed. However,
    it is important to keep in mind that this also leads to a decrease in accuracy.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将图11中V2和V3的结果与图10中的相应模型进行比较，你会注意到延迟有所降低，这证明了使用低精度数字确实可以提高计算速度。然而，重要的是要记住，这也导致了准确性的降低。
- en: '* * *'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: MobileNetV3 Implementation
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MobileNetV3实现
- en: 'I think all the explanations above cover pretty much everything you need to
    know about the theory behind MobileNetV3\. Now in this section I am going to bring
    you into the most fun part of this article: implementing MobileNetV3 from scratch.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为上面所有的解释都涵盖了关于MobileNetV3背后理论的几乎所有你需要知道的内容。现在，在这一节中，我将带你进入这篇文章最有趣的部分：从头开始实现MobileNetV3。
- en: As always, the very first thing we do is importing the required modules.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 和往常一样，我们做的第一件事是导入所需的模块。
- en: '[PRE0]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Afterwards, we need to initialize the configurable parameters of the model,
    namely `WIDTH_MULTIPLIER`, `INPUT_RESOLUTION`, and `NUM_CLASSES`, as shown in
    Codeblock 2 below. I believe the first two variables are straightforward as I’ve
    explained them thoroughly in the previous section. Here I decided to assign default
    values for the two. You can definitely change these numbers based on the values
    provided in the paper if you want to adjust the complexity of the model. Next,
    the third variable corresponds to the number of output neurons in the classification
    head. Here I set it to 1000 because the model is originally trained on the ImageNet-1K
    dataset. It is worth noting that the MobileNetV3 architecture is actually not
    limited to classification tasks only. Instead, it can also be used for object
    detection and semantic segmentation as demonstrated in the paper. However, since
    the focus of this article is to implement the backbone, let’s just use the standard
    classification head for the output layer to keep things simple.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们需要初始化模型的配置参数，即`WIDTH_MULTIPLIER`、`INPUT_RESOLUTION`和`NUM_CLASSES`，如下面的代码块2所示。我相信前两个变量是直截了当的，因为我已经在上一节中详细解释了它们。在这里，我决定为这两个变量分配默认值。如果你想要调整模型的复杂度，你可以根据论文中提供的值更改这些数字。接下来，第三个变量对应于分类头中的输出神经元数量。我将其设置为1000，因为模型最初是在ImageNet-1K数据集上训练的。值得注意的是，MobileNetV3架构实际上并不仅限于分类任务。相反，它也可以用于目标检测和语义分割，正如论文中所示。然而，由于本文的重点是实现骨干网络，让我们只使用标准的分类头作为输出层以保持简单。
- en: '[PRE1]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: What we are going to do next is to wrap the repeating components into separate
    classes. By doing this, we will later be able to simply instantiate them whenever
    needed instead of rewriting the same code over and over again. Now let’s begin
    with the Squeeze-and-Excitation module first.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接下来要做的是将重复的组件封装到单独的类中。通过这样做，我们稍后只需在需要时简单地实例化它们，而不是一次又一次地重写相同的代码。现在让我们首先从Squeeze-and-Excitation模块开始。
- en: '* * *'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Squeeze-and-Excitation Module
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Squeeze-and-Excitation模块
- en: The implementation of this component is shown in Codeblock 3\. I am not going
    to get very deep into the code since it is almost exactly the same as the one
    in my previous article [4]. However, generally speaking, this code works by representing
    each input channel with a single number (line `#(1)`), processing the resulting
    vector with a sequence of linear layers (`#(2–3)`), then converting it into a
    weight vector (`#(4)`). Keep in mind that in the original SE module we typically
    use the standard sigmoid activation function to obtain the weight vector, but
    here in MobileNetV3 we use hard-sigmoid instead. This weight vector will then
    be multiplied with the original tensor, which by doing so we can reduce the influence
    of channels that do not give contribution to the final output (`#(5)`).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 此组件的实现如下所示，代码块3。我不会深入探讨代码，因为它几乎与我之前文章[4]中的代码完全相同。然而，一般来说，这段代码通过用一个数字表示每个输入通道（行`#(1)`），用一系列线性层处理得到的向量（`#(2–3)`），然后将其转换为权重向量（`#(4)`）来工作。请记住，在原始SE模块中，我们通常使用标准的sigmoid激活函数来获得权重向量，但在这里在MobileNetV3中我们使用hard-sigmoid。这个权重向量然后将与原始张量相乘，通过这样做我们可以减少对最终输出没有贡献的通道的影响（`#(5)`）。
- en: '[PRE2]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Now let’s check if the above code works properly by creating an `SEModule` instance
    and passing a dummy tensor through it. See Codeblock 4 below for the details.
    Here I configure the SE module to accept a 512-channel image for the input. Meanwhile,
    the `r` (*reduction ratio*) parameter is set to 4, meaning that the vector length
    between the two FC layers is going to be 4 times smaller than that of its input
    and output. It might be worth knowing that this number is different from the one
    mentioned in the original Squeeze-and-Excitation paper [7], where *r = 16* is
    said to be the sweet spot for balancing accuracy and complexity.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们通过创建一个`SEModule`实例并将一个虚拟张量传递给它来检查上述代码是否正常工作。下面是代码块4的详细信息。在这里，我配置SE模块以接受512通道的图像作为输入。同时，`r`（*缩减比例*）参数设置为4，这意味着两个全连接层之间的向量长度将是输入和输出的四分之一。可能值得知道，这个数字与原始的Squeeze-and-Excitation论文[7]中提到的不同，其中*r
    = 16*被认为是平衡准确性和复杂性的最佳点。
- en: '[PRE3]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: If the code above produces the following output, it confirms that our SE module
    implementation is correct as it successfully passed the input tensor through all
    layers within the entire SE module.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果上面的代码产生以下输出，则确认我们的SE模块实现是正确的，因为它成功地将输入张量通过整个SE模块的所有层。
- en: '[PRE4]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '* * *'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Convolution Block
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 卷积块
- en: The next component I am going to create is the one wrapped in the `ConvBlock`
    class, which the detailed implementation can be seen in Codeblock 5\. In fact,
    this is actually just a standard convolution layer, but we don’t simply use `nn.Conv2d`
    because in CNN we typically use the *Conv-BN-ReLU* structure. Hence, it will be
    convenient if we just group these three layers together within a single class.
    However, instead of actually following this standard structure, we are going to
    customize it to match the requirements for the MobileNetV3 architecture.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来我将要创建的是`ConvBlock`类封装的组件，其详细实现可以在代码块5中看到。实际上，这实际上只是一个标准的卷积层，但我们不直接使用`nn.Conv2d`，因为在CNN中我们通常使用*Conv-BN-ReLU*结构。因此，如果我们将这些三个层组合在一个类中将会很方便。然而，我们不会实际遵循这个标准结构，而是会根据MobileNetV3架构的要求进行定制。
- en: '[PRE5]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: There are several parameters you need to pass to instantiate a `ConvBlock` instance.
    The first five ones (`#(1–5)`) are pretty straightforward as they are basically
    just the standard parameters for the `nn.Conv2d` layer. Here I set the `groups`
    parameter to be configurable (`#(6)`) so that this class can be flexibly used
    not only for standard convolutions but also for depthwise convolutions. Next,
    at line `#(7)` I create a parameter called `batchnorm`, which determines whether
    or not a `ConvBlock` instance implements a batch normalization layer. This is
    essentially done because there are some cases where we don’t implement this layer,
    i.e., in the last two convolutions with *NBN* label (which stands for *no batch
    normalization*) in Figure 1\. The last parameter we have here is the activation
    function (`#(8)`). Later on, there will be cases that require us to set it to
    either `nn.ReLU6()`, `nn.Hardswish()` or `nn.Identity()` (no activation).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 实例化`ConvBlock`实例需要传递几个参数。前五个参数（`#(1–5)`）相当直接，因为它们基本上是`nn.Conv2d`层的标准参数。在这里，我将`groups`参数设置为可配置的（`#(6)`），这样这个类不仅可以用于标准卷积，还可以用于深度卷积。接下来，在第`#(7)`行，我创建了一个名为`batchnorm`的参数，它决定了`ConvBlock`实例是否实现批归一化层。这基本上是因为在某些情况下我们不实现这个层，即图1中的最后两个带有*NBN*标签（代表*no
    batch normalization*）的卷积。我们这里有的最后一个参数是激活函数（`#(8)`）。稍后，会有一些情况需要我们将它设置为`nn.ReLU6()`、`nn.Hardswish()`或`nn.Identity()`（无激活）。
- en: Inside the `__init__()` method, there are two things happening if we change
    the input argument for the `batchnorm` parameter. When we set it to `True`, firstly,
    the bias term of the convolution layer will be deactivated (`#(9)`), and secondly,
    `bn` will be an `nn.BatchNorm2d()` layer (`#(10)`). The bias term will not be
    used in this case because applying batch normalization after convolution will
    cancel it out. So, there is basically no point of utilizing bias in the first
    place. Meanwhile, if we set the `batchnorm` parameter to `False`, the `bias` variable
    is going to be `True` since in this situation it will not be canceled out. The
    `bn` itself will just be an identity layer, meaning that it won’t do anything
    to the tensor.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在`__init__()`方法中，如果改变`batchnorm`参数的输入参数，会有两件事情发生。当我们将其设置为`True`时，首先，卷积层的偏置项将被禁用（`#(9)`），其次，`bn`将是一个`nn.BatchNorm2d()`层（`#(10)`）。在这种情况下不会使用偏置项，因为卷积后应用批归一化会将其抵消。所以，最初利用偏置基本上没有意义。同时，如果我们将`batchnorm`参数设置为`False`，`bias`变量将是`True`，因为在这种情况下它不会被抵消。`bn`本身将只是一个身份层，这意味着它不会对张量做任何操作。
- en: Regarding the `forward()` method (`#(11)`), I don’t think I need to explain
    anything because what we do here is just passing a tensor through the layers sequentially.
    Now let’s just move on to Codeblock 6 to see whether our `ConvBlock` implementation
    is correct. Here I try to create two `ConvBlock` instances, where the first one
    uses default `batchnorm` and `activation`, whereas the second one omits the batch
    normalization layer (`#(1)`) and uses hard-swish activation function (`#(2)`).
    Instead of passing a tensor through them, here I want you to see in the resulting
    output that our code correctly implements both structures according to the input
    arguments we pass.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 关于`forward()`方法（`#(11)`），我认为没有必要解释什么，因为我们在这里所做的只是按顺序通过层传递一个张量。现在让我们继续到代码块6，看看我们的`ConvBlock`实现是否正确。在这里，我尝试创建两个`ConvBlock`实例，其中第一个使用默认的`batchnorm`和`activation`，而第二个省略了批归一化层（`#(1)`）并使用hard-swish激活函数（`#(2)`）。在这里，我不想让你通过它们传递张量，而是想让你在生成的输出中看到我们的代码是否正确实现了这两种结构，根据我们传递的输入参数。
- en: '[PRE6]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '* * *'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Bottleneck
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 瓶颈
- en: 'As the `SEModule` and the `ConvBlock` are done, we can now move on to the main
    component of the MobileNetV3 architecture: the bottleneck. What we essentially
    do in the bottleneck is just placing one layer after another which the general
    structure is shown earlier in Figure 2\. In the case of MobileNetV2, it only consists
    of three convolution layers, whereas here in MobileNetV3 we have an additional
    SE block placed between the second and the third convolutions. Look at Codeblock
    7a and 7b to see how I implement the bottleneck block for MobileNetV3.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 随着`SEModule`和`ConvBlock`的完成，我们现在可以继续到MobileNetV3架构的主要组件：瓶颈。在瓶颈中，我们本质上只是将一层层放置在一起，其一般结构在图2中之前已经展示过。在MobileNetV2的情况下，它只包含三个卷积层，而在这里的MobileNetV3中，我们在第二和第三卷积之间放置了一个额外的SE块。查看代码块7a和7b，看看我是如何实现MobileNetV3的瓶颈块的。
- en: '[PRE8]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The input parameters of the `Bottleneck` class look similar to those of the
    `ConvBlock` class at a glance. This definitely makes sense because we will indeed
    use them to instantiate `ConvBlock` instances inside the `Bottleneck`. However,
    if you take a closer look at them again, you will notice that there are some other
    parameters you haven’t seen before, namely `se` (`#(1)`) and `exp_size` (`#(2)`).
    Later on, the input arguments for these parameters will be obtained from the configuration
    provided in the table in Figure 1.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 从表面上看，`Bottleneck`类的输入参数与`ConvBlock`类的参数相似。这确实是有道理的，因为我们将确实使用它们在`Bottleneck`内部实例化`ConvBlock`实例。然而，如果你再次仔细观察，你会注意到还有一些你之前没有见过的参数，即`se`（`#(1)`）和`exp_size`（`#(2)`）。稍后，这些参数的输入参数将从图1中的表格中提供的配置中获取。
- en: Inside the `__init__()` method, what we need to do first is to check whether
    the input and output tensor dimensions are the same using the code at line `#(3)`.
    By doing this, we will have our `add` variable containing either `True` or `False`.
    This dimensionality checking is important because we need to decide whether or
    not we perform element-wise summation between the two to implement the skip-connection
    that skips through all layers within the bottleneck block.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在`__init__()`方法内部，我们首先需要检查输入和输出张量维度是否相同，使用代码在第`#(3)`行。通过这样做，我们将有一个包含`True`或`False`的`add`变量。这种维度检查很重要，因为我们需要决定是否在两个之间执行逐元素求和以实现跳过瓶颈块内所有层的跳过连接。
- en: Next, let’s now instantiate the layers themselves, of which the first two are
    a pointwise convolution (`conv0`) and a depthwise convolution (`conv1`). For `conv0`,
    we need to set the kernel size to 1×1 (`#(6)`), whereas for `conv1` the kernel
    size should match the one in the input argument (`#(9)`), which can either be
    3×3 or 5×5\. It is necessary to apply padding in the `ConvBlock` to prevent the
    image size from shrinking after every convolution operation. For kernel sizes
    of 1×1, 3×3, and 5×5, the required padding values are 0, 1, and 2, respectively.
    Talking about the number of channels, `conv0` is responsible to expand it from
    `in_channels` to `exp_size` (`#(4–5)`). Meanwhile, the number of input and output
    channels of `conv1` are exactly the same (`#(7–8)`). In addition to the `conv1`
    layer, the `groups` parameter should be set to `exp_size` (`#(10)`) because we
    want each input channel to be processed independently of each other.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，现在让我们实例化这些层本身，其中前两层是一个点卷积（`conv0`）和一个深度卷积（`conv1`）。对于`conv0`，我们需要将内核大小设置为1×1（`#(6)`），而对于`conv1`，内核大小应该与输入参数中的内核大小相匹配（`#(9)`），这可以是3×3或5×5。在`ConvBlock`中应用填充是必要的，以防止在每次卷积操作后图像大小缩小。对于1×1、3×3和5×5的内核大小，所需的填充值分别是0、1和2。谈到通道数，`conv0`负责将其从`in_channels`扩展到`exp_size`（`#(4–5)`）。同时，`conv1`层的输入和输出通道数完全相同（`#(7–8)`）。除了`conv1`层之外，`groups`参数应该设置为`exp_size`（`#(10)`），因为我们希望每个输入通道独立于其他每个输入通道进行处理。
- en: After the first two convolution layers are done, what we need to instantiate
    next is the Squeeze-and-Excitation module (`#(11)`). Here we need to set the input
    channel count to `exp_size`, matching with the tensor size produced by the `conv1`
    layer. Remember that SE module is not always used, hence the instantiation of
    this component should be done within a condition, where it will actually be instantiated
    only when the `se` parameter is `True`. Otherwise, it will just be an identity
    layer.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在完成前两个卷积层之后，接下来我们需要实例化的是Squeeze-and-Excitation模块（`#(11)`）。在这里，我们需要将输入通道数设置为`exp_size`，与`conv1`层产生的张量大小相匹配。请记住，SE模块并不总是被使用，因此这个组件的实例化应该在条件语句中进行，实际上它只会在`se`参数为`True`时被实例化。否则，它将只是一个恒等层。
- en: Finally, the last convolution layer (`conv2`) is responsible to map the number
    of output channels from `exp_size` to `out_channels` (`#(12–13)`). Just like the
    `conv0` layer, this one is also a pointwise convolution, hence we set the kernel
    size to 1×1 (`#(14)`) so that it only focuses on aggregating information along
    the channel dimension. The activation function of this layer is set fixed to `nn.Identity()`
    (`#(15)`) because here we will implement the idea of linear bottleneck.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，最后一个卷积层(`conv2`)负责将输出通道数从`exp_size`映射到`out_channels`(`#(12–13)`)。就像`conv0`层一样，这一层也是一个点卷积，因此我们将核大小设置为1×1(`#(14)`)，这样它就只关注沿着通道维度聚合信息。这一层的激活函数被固定设置为`nn.Identity()`(`#(15)`)，因为我们在这里将实现线性瓶颈的想法。
- en: And that’s pretty much everything for the layers within the bottleneck block.
    All we need to do afterwards is to create the flow of the network in the `forward()`
    method as shown in Codeblock 7b below.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 对于瓶颈块内的层来说，这就差不多是全部内容了。接下来，我们只需要在`forward()`方法中创建网络的流程，就像下面的代码块7b所示。
- en: '[PRE9]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Now I would like to test the `Bottleneck` class we just created by simulating
    the third row of the MobileNetV3-Large architecture in the table in Figure 1\.
    Look at the Codeblock 8 below to see how I do this. If you go back to the architectural
    details, you will notice that this bottleneck accepts a tensor of size 16×112×112
    (`#(7)`). In this case, the bottleneck block is configured to expand the number
    of channels to 64 (`#(3)`) before eventually shrinking it to 24 (`#(1)`). The
    kernel size of the depthwise convolution is set to 3×3 (`#(2)`) and the stride
    is set to 2 (`#(4)`) which will reduce the spatial dimension by half. Here we
    use ReLU6 for the activation function (`#(6)`) of the first two convolutions.
    Lastly, SE module will not be implemented (`#(5)`) since there is no checkmark
    in the *SE* column in the table.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我想通过模拟图1中表格的第三行来测试我们刚刚创建的`Bottleneck`类。查看下面的代码块8，看看我是如何做到这一点的。如果您回到架构细节，您会注意到这个瓶颈接受一个大小为16×112×112的张量(`#(7)`)。在这种情况下，瓶颈块被配置为将通道数扩展到64(`#(3)`)，然后最终将其缩小到24(`#(1)`)。深度卷积的核大小设置为3×3(`#(2)`)，步长设置为2(`#(4)`)，这将空间维度减半。在这里，我们使用ReLU6作为前两个卷积的激活函数(`#(6)`)。最后，由于表中*SE*列没有勾选，SE模块将不会实现(`#(5)`)。
- en: '[PRE10]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: If you run the above code, the following output should appear on your screen.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您运行上述代码，屏幕上应该出现以下输出。
- en: '[PRE11]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: This output confirms that our implementation is correct in terms of the tensor
    shape, where the spatial dimension halves from 112×112 to 56×56 while the number
    of channels correctly expands from 16 to 64 and then reduces from 64 to 24\. Talking
    more specifically about the SE module, we can see in the above output that the
    tensor is still passed through this component despite we have set the `se` parameter
    to `False`. In fact, if you try to print out the detailed architecture of this
    bottleneck like what I do in Codeblock 9, you will see that `semodule` is just
    an identity layer, which effectively makes this structure behave as if we’re passing
    the output of `conv1` directly to `conv2`.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 此输出确认，从空间维度来看，我们的实现是正确的，从112×112减半到56×56，而通道数正确地从16增加到64，然后从64减少到24。更具体地谈谈SE模块，我们可以在上述输出中看到，尽管我们将`se`参数设置为`False`，张量仍然通过了这个组件。实际上，如果您尝试打印出这个瓶颈的详细架构，就像我在代码块9中做的那样，您会看到`semodule`只是一个恒等层，这有效地使这个结构表现得好像我们直接将`conv1`的输出传递给`conv2`。
- en: '[PRE12]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '[PRE13]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The above bottleneck is going to behave differently if we instantiate it with
    the `se` parameter set to `True`. In Codeblock 10 below, I try to create the bottleneck
    block in the fifth row in the MobileNetV3-Large architecture. In this case, if
    you print out the detailed structure, you will see that `semodule` consists of
    all layers in the `SEModule` class we created earlier instead of just being an
    identity layer like before.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将`se`参数设置为`True`来实例化上述瓶颈，它的行为将会不同。在下面的代码块10中，我尝试创建MobileNetV3-Large架构中的第五行的瓶颈块。在这种情况下，如果您打印出详细的结构，您会看到`semodule`由我们之前创建的`SEModule`类中的所有层组成，而不是像之前那样只是一个恒等层。
- en: '[PRE14]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '[PRE15]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '* * *'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Complete MobileNetV3
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 完整的MobileNetV3
- en: As all components have been created, what we need to do next is to construct
    the main class of the MobileNetV3 model. But before doing so, I would like to
    initialize a list that stores the input arguments used for instantiating the bottleneck
    blocks as shown in Codeblock 11 below. Keep in mind that these arguments are written
    according to the MobileNetV3-Large version. You’ll need to adjust the values in
    the `BOTTLENECKS` list if you want to create the small version instead.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 由于所有组件都已创建，接下来我们需要构建 MobileNetV3 模型的主类。但在这样做之前，我想初始化一个列表，该列表存储用于实例化瓶颈块的输入参数，如下面的
    Codeblock 11 所示。请注意，这些参数是根据 MobileNetV3-Large 版本编写的。如果您想创建小版本，则需要调整 `BOTTLENECKS`
    列表中的值。
- en: '[PRE16]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'The arguments listed above are structured in the following order (from left
    to right): *in channels*, *out channels*, *kernel size*, *expansion size*, *SE*,
    *activation*, *stride*, and *padding*. Keep in mind that *padding* is not explicitly
    stated in the original table, but I include it here because it is required as
    an input when instantiating the bottleneck blocks.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 列出的参数按以下顺序（从左到右）结构化：*输入通道*，*输出通道*，*内核大小*，*扩展大小*，*SE*，*激活*，*步长*，和 *填充*。请注意，*填充*
    在原始表中没有明确说明，但我将其包括在这里，因为它在实例化瓶颈块时需要作为输入。
- en: Now let’s actually create the MobileNetV3 class. See the code implementation
    in Codeblocks 12a and 12b below.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们实际创建 MobileNetV3 类。下面在 Codeblocks 12a 和 12b 中查看代码实现。
- en: '[PRE17]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Notice in Figure 1 that we initially start from the standard convolution layer.
    In the above codeblock, I refer to this layer as `first_conv` (`#(1)`). It is
    worth noting that the input arguments for this layer are not included in the `BOTTLENECKS`
    list, hence we need to define them manually. Remember to multiply the channel
    counts at each step by `WIDTH_MULTIPLIER` since we want the model size to be adjustable
    through that variable. Next, we initialize a placeholder named `blocks` for storing
    all the bottleneck blocks (`#(2)`). With a simple loop at line `#(3)`, we will
    iterate through all items in the `BOTTLENECKS` list to actually instantiate the
    bottleneck blocks and append them one by one to `blocks`. In fact, this loop constructs
    the majority of the layers in the network, as it covers nearly all components
    listed in the table.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 注意在图 1 中，我们最初从标准的卷积层开始。在上面的代码块中，我将其称为 `first_conv` (`#(1)`)。值得注意的是，此层的输入参数不包括在
    `BOTTLENECKS` 列表中，因此我们需要手动定义它们。记住，由于我们希望通过该变量调整模型大小，因此需要在每一步将通道数乘以 `WIDTH_MULTIPLIER`。接下来，我们初始化一个名为
    `blocks` 的占位符，用于存储所有瓶颈块 (`#(2)`)。通过简单的循环（`#(3)`），我们将遍历 `BOTTLENECKS` 列表中的所有项，实际实例化瓶颈块，并将它们逐个追加到
    `blocks` 中。实际上，这个循环构建了网络中的大多数层，因为它涵盖了表中列出的几乎所有组件。
- en: As the sequence of bottleneck blocks is done, we will now continue with the
    next convolution layer, which I refer to as `second_conv` (`#(4)`). Again, since
    the configuration parameters for this layer are not stored in the `BOTTLENECKS`
    list, we need to manually hard-code them. The output of this layer will then be
    passed through a global average pooling layer (`#(5)`) which will drop the spatial
    dimension to 1×1\. Afterwards, we connect this layer to two consecutive pointwise
    convolutions (`#(6)` and `#(8)`) with a dropout layer in between (`#(7)`).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 瓶颈块的序列完成后，我们现在将继续进行下一个卷积层，我将其称为 `second_conv` (`#(4)`)。同样，由于此层的配置参数未存储在 `BOTTLENECKS`
    列表中，我们需要手动硬编码它们。然后，此层的输出将通过一个全局平均池化层 (`#(5)`)，这将降低空间维度到 1×1。之后，我们将此层连接到两个连续的点卷积
    (`#(6)` 和 `#(8)`)，中间有一个 dropout 层 (`#(7)`)。
- en: Talking more specifically about the two convolutions, it is important to know
    that applying a 1×1 convolution on a tensor that has a 1×1 spatial dimension is
    essentially equivalent to applying an FC layer to a flattened tensor, where the
    number of channels will correspond to the number of neurons. This is the reason
    that I set the output channel count of the last layer equal to the number of classes
    in the dataset (`#(9)`). The `batchnorm` parameter of both `third_conv` and `output`
    layers are set to `False`, as suggested in the architecture.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地谈谈这两个卷积，重要的是要知道，对一个具有 1×1 空间维度的张量应用 1×1 卷积本质上等同于对一个展平的张量应用 FC 层，其中通道数将对应于神经元的数量。这就是为什么我将最后一层的输出通道数设置为数据集中类别的数量
    (`#(9)`)。根据架构建议，`third_conv` 和 `output` 层的 `batchnorm` 参数都设置为 `False`。
- en: Meanwhile, the activation function of `third_conv` is set to `nn.Hardswish()`,
    whereas the `output` layer uses `nn.Identity()`, which is equivalent to not applying
    any activation function at all. This is essentially done because during training
    softmax is already included in the loss function (`nn.CrossEntropyLoss()`). Later
    in the inference phase, we need to replace `nn.Identity()` with `nn.Softmax()`
    in the `output` layer so that the model will directly return the probability score
    of each class.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，`third_conv`的激活函数设置为`nn.Hardswish()`，而`output`层使用`nn.Identity()`，这相当于根本不应用任何激活函数。这基本上是因为在训练过程中softmax已经包含在损失函数中（`nn.CrossEntropyLoss()`）。在推理阶段稍后，我们需要在`output`层中将`nn.Identity()`替换为`nn.Softmax()`，以便模型直接返回每个类的概率分数。
- en: Next, let’s take a look at the `forward()` method below, which I won’t explain
    any further since I think it is pretty easy to understand.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们看看下面的`forward()`方法，我认为它很容易理解，所以我就不再进一步解释了。
- en: '[PRE18]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The code in Codeblock 13 demonstrates how we initialize a MobileNetV3 instance
    and pass a dummy tensor through it. Remember that here we use the default input
    resolution, so we can basically think of the tensor as a batch of a single RGB
    image of size 224×224.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 代码块13中的代码演示了如何初始化一个MobileNetV3实例并通过它传递一个虚拟张量。记住，在这里我们使用默认的输入分辨率，所以我们可以将张量基本上视为一个224×224大小的单个RGB图像的批次。
- en: '[PRE19]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: And below is what the resulting output looks like, in which the tensor dimension
    after each block matches exactly with the MobileNetV3-Large architecture in Figure
    1.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是生成的输出结果，其中每个块后的张量维度与图1中MobileNetV3-Large架构完全匹配。
- en: '[PRE20]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: In order to ensure that our implementation is correct, we can print out the
    number of parameters contained in the model using the following code.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保我们的实现是正确的，我们可以使用以下代码打印出模型中包含的参数数量。
- en: '[PRE21]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '[PRE22]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Here you can see that this model contains around 5.5 million parameters, in
    which this is approximately the same as the one disclosed in the original paper
    (see Figure 10). Furthermore, the parameter count given in the PyTorch documentation
    is also similar to this number as you can see in Figure 12 below. Based on these
    facts, I believe I can confirm that our MobileNetV3-Large implementation is correct.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你可以看到这个模型大约包含550万个参数，这与原始论文中披露的参数数量大致相同（见图10）。此外，PyTorch文档中给出的参数数量也与下面的图12中的这个数字相似。基于这些事实，我相信我可以确认我们的MobileNetV3-Large实现是正确的。
- en: '![](../Images/ab148e1d999080fc6082b60ceb0c7ea5.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ab148e1d999080fc6082b60ceb0c7ea5.png)'
- en: Figure 12\. The details of the MobileNetV3-Large model from the official PyTorch
    documentation [8].
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.官方PyTorch文档中MobileNetV3-Large模型的详细信息[8]。
- en: '* * *'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Ending
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束
- en: Well, that’s pretty much everything about the MobileNetV3 architecture. Here
    I encourage you to actually train this model from scratch on any datasets you
    want. Not only that, I also want you to play around with the parameter configurations
    of the bottleneck blocks to see whether we can still improve the performance of
    MobileNetV3 even further.  By the way, the code used in this article is also available
    in my GitHub repo, which you can find in the link at reference number [9].
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，关于MobileNetV3架构的内容基本上就这些了。在这里，我鼓励你实际上在你想使用的任何数据集上从头开始训练这个模型。不仅如此，我还想让你尝试调整瓶颈块的参数配置，看看我们是否还能进一步提高MobileNetV3的性能。顺便说一句，这篇文章中使用的代码也存放在我的GitHub仓库中，你可以通过参考文献编号[9]中的链接找到。
- en: Thank you for reading. Feel free to reach me through LinkedIn [10] if you spot
    any mistake in my explanation or in the code. See ya in my next article!
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读。如果你在我的解释或代码中发现了任何错误，请通过LinkedIn [10]联系我。下次文章再见！
- en: '* * *'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
