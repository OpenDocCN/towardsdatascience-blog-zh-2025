- en: Build an AI Agent to Explore Your Data Catalog with Natural Language
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/build-and-ai-agent-to-explore-your-data-catalog-with-natural-language/](https://towardsdatascience.com/build-and-ai-agent-to-explore-your-data-catalog-with-natural-language/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1749772317006" class="mdspan-comment">At the heart</mdspan>
    of every data-driven application, product, or dashboard lies one critical component:
    the database. These systems have long been the foundation for storing, managing,
    and querying structured data — whether relational, time-series, or distributed
    across cloud platforms.'
  prefs: []
  type: TYPE_NORMAL
- en: To interact with these systems, we’ve relied on SQL (Structured Query Language),
    a standardized and incredibly powerful way to retrieve, manipulate, and analyze
    data. SQL is expressive, precise, and optimized for performance. Yet for many
    users — especially those new to data — SQL can be intimidating. Remembering syntax,
    understanding joins, and navigating complex schemas can be a barrier to productivity.
  prefs: []
  type: TYPE_NORMAL
- en: But the idea of querying databases in natural languages isn’t new! In fact,
    research into Natural Language Interfaces to Databases (NLIDBs) dates back to
    the 1970s. Projects like LUNAR and PRECISE explored how users could ask questions
    in plain English and receive structured answers powered by SQL. Despite great
    academic interest, these early systems struggled with generalization, ambiguity,
    and scalability. Back in 2029, PowerBI also shown us an early glimpse of natural
    language data querying back in 2019\. While the Q&A feature was promising, it
    struggled with complex queries, required precise phrasing, and depended heavily
    on how clean the data model was. In the end, it lacked the kind of reasoning and
    flexibility users expect from a true assistant!
  prefs: []
  type: TYPE_NORMAL
- en: But what about 2025? Do we know have the technology to make it happen?
  prefs: []
  type: TYPE_NORMAL
- en: Can LLMs do now what we were not able to do before?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Based on what we know about LLMs and their capabilities](https://arxiv.org/abs/2005.14165),
    we also understand that they along with the concept of AI Agents are uniquely
    equipped to bridge the gap between technical SQL and natural human queries. They’re
    excellent at interpreting vague questions, generating syntactically correct SQL,
    and adapting to different user intents. This makes them ideal for conversational
    interfaces to data. However, LLMs are not deterministic; they heavily rely on
    probabilist inference, which can lead to [hallucinations, incorrect assumptions
    or <mdspan datatext="el1749510261518" class="mdspan-comment">surface-level reasoning
    that lacks business context.</mdspan>](https://arxiv.org/abs/2207.05221)'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is where AI Agents become relevant. By wrapping an LLM inside a structured
    system — one that includes memory, tools, validation layers, and a defined purpose
    — we can reduce the downsides of probabilistic outputs. The agent becomes more
    than just a text generator: it becomes a collaborator that understands the environment
    it’s operating in. [Combined with proper strategies for grounding, schema inspection,
    and user intent detection,](https://towardsdatascience.com/how-to-design-my-first-ai-agent/)
    agents allow us to build systems that are far more reliable than prompt-only setups.'
  prefs: []
  type: TYPE_NORMAL
- en: 'And that’s the foundation of this short tutorial: How to build your first AI
    Agent assistant to query your data catalog!'
  prefs: []
  type: TYPE_NORMAL
- en: Step-by-Step Guide to Creating a Databricks Catalog Assistant
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First and foremost, we need to pick our tech stack. We’ll need a model provider,
    a tool to help us enforce structure in our agent’s flow, connectors to our databases,
    and a simple UI to power the chat experience!
  prefs: []
  type: TYPE_NORMAL
- en: '**OpenAI (gpt-4**): Best-in-class for natural language understanding, reasoning,
    and SQL generation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pydantic A**I: Adds structure to LLM responses. No hallucinations or vague
    answers — just clean, schema-validated outputs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Streamlit**: Quickly build a responsive chat interface with built-in LLM
    and feedback components.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Databricks SQL Connector**: Access your Databricks workspace’s catalog, schema,
    and query results in real time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'And well, let’s not forget — this is just a small, simple project. If you were
    planning to deploy it in production, across multiple users and spanning several
    databases, you’d definitely need to think about other concerns: scalability, access
    control, identity management, use-case design, user experience, data privacy…
    and the list goes on.'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Environment setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we dive into coding, let’s get our development environment ready. This
    step ensures that all the required packages are installed and isolated in a clean
    virtual environment. This avoids version conflicts and keeps our project organized.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 2\. Create the tools and logic to access Databricks Data Catalog information
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While building a conversational SQL agent might seem like an LLM problem, it’s
    actually a **data problem** first. You need metadata, column-level context, constraints,
    and ideally a profiling layer to know what’s safe to query and how to interpret
    the results. This is part of what we call the **data-centric ai stack** *(might
    sound too 2021 but I promise you it is still super relevant!!)* – one where profiling,
    quality, and schema validation come *before* prompt engineering.
  prefs: []
  type: TYPE_NORMAL
- en: In this context, and because the agent needs context to reason about your data,
    this step includes setting up a connection to your Databricks workspace and programmatically
    extract the structure of your Data Catalog. This metadata will serve as the foundation
    for generating accurate SQL queries.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The full code for the metadata connector [can be found here.](https://github.com/fabclmnt/ai-tutorials/blob/main/sql-agent/functions/catalog_connector.py)
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Build the SQL Agent with Pydantic AI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Here is were we define our AI agent. We’re using `pydantic-ai` to enforce structured
    outputs, in this case, we want to ensure that we will always receive a clean SQL
    query from the LLM. This makes the agent safe to use in applications and reduces
    the chance of vague and more importantly, unparseable code.
  prefs: []
  type: TYPE_NORMAL
- en: To define the agent, we start by specifying an output schema with Pydantic,
    in this case, a single field `code` representing the SQL query. Then, we use the
    `Agent` class to wire together the system prompt, model name, and output type.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]sql\n{output.code}\n[PRE3]'
  prefs: []
  type: TYPE_NORMAL
- en: The system prompt provides instructions and examples to guide the LLM’s behavior,
    while `instrument=True` enables tracing and observability for debugging or evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: '[The system prompt](https://github.com/fabclmnt/ai-tutorials/blob/main/sql-agent/functions/catalog_connector.py)
    itself was designed to guide the agent’s behavior. It clearly states the assistant’s
    objective (writing SQL queries for Unity Catalog), includes the metadata context
    to ground its reasoning, and provides concrete examples to illustrate the expected
    output format. This structure helps the LLM model to stay focused, reduce ambiguity,
    and return predictable, valid responses.'
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Build the Streamlit Chat Interface
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that we have the foundations for our SQL Agent it is time to make it interactive.
    Leveraging Streamlit we will now create a simple front-end where we can ask natural
    language questions and receive generated SQL queries in real-time.
  prefs: []
  type: TYPE_NORMAL
- en: Luckily, Streamlit already gives us powerful building blocks to create LLM-powered
    chat experiences. If you’re curious, here’s a great [tutorial](https://docs.streamlit.io/develop/tutorials/chat-and-llm-apps/chat-response-feedback)
    that walks through the whole process in detail.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/228a8ab1876eb4205d7bd0fbde828a41.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by the author – Databricks SQL Agent Chat with OpenAI and Streamlit
  prefs: []
  type: TYPE_NORMAL
- en: You can find the full code for this [tutorial here](https://github.com/fabclmnt/ai-tutorials/tree/main/sql-agent)
    and you [can try the application on Streamlit Community Cloud](https://dbx-sql-agent.streamlit.app/).
  prefs: []
  type: TYPE_NORMAL
- en: Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this tutorial, you’ve learned to walk through the initial mechanics of building
    a simple AI agent. The focus was on creating a lightweight prototype to help you
    understand how to structure agent flows and experiment with modern AI tooling.
  prefs: []
  type: TYPE_NORMAL
- en: 'But, if you were to take this further into production, here are a few things
    to consider:'
  prefs: []
  type: TYPE_NORMAL
- en: Hallucinations are real, and you can’t be sure wether the return SQL is correct.
    Leverage SQL static analysis to validate the output and implement retry mechanism,
    ideally more deterministic;
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leverage schema-aware tools to sanity-check the table names and columns.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add fallback flows when a query fails — e.g., “Did you mean this table instead?”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make it stateful
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All things infrastructure, identify managements, and operations of the system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At the end of the day, what makes these systems effective isn’t just the model,
    it’s the *data* that grounds it. Clean metadata, well-scoped prompts, and contextual
    validation are all part of the data quality stack that turns generative interfaces
    into trustworthy agents.
  prefs: []
  type: TYPE_NORMAL
