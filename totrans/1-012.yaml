- en: 'The Machine Learning “Advent Calendar” Day 6: Decision Tree Regressor'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器学习“圣诞日历”第6天：决策树回归器
- en: 原文：[https://towardsdatascience.com/the-machine-learning-advent-calendar-day-6-decision-tree-regressor/](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-6-decision-tree-regressor/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-machine-learning-advent-calendar-day-6-decision-tree-regressor/](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-6-decision-tree-regressor/)
- en: <mdspan datatext="el1764917748672" class="mdspan-comment">During the first</mdspan>
    5 days of this [Machine Learning “Advent Calendar”](https://towardsdatascience.com/machine-learning-and-deep-learning-in-excel-advent-calendar-announcement/),
    we explored 5 models (or algorithms) that are all based on distances (local Euclidean
    distance, or global Mahalanobis distance).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764917748672" class="mdspan-comment">在这次[机器学习“圣诞日历”](https://towardsdatascience.com/machine-learning-and-deep-learning-in-excel-advent-calendar-announcement/)的前5天，我们探讨了5个基于距离（局部欧几里得距离或全局马氏距离）的模型（或算法）。
- en: So it is time to change the approach, right? We will come back to the notion
    of distance later.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 所以是时候改变方法了，对吧？我们稍后会回到距离的概念。
- en: 'For today, we will see something totally different: Decision Trees!'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 对于今天，我们将看到一些完全不同的事情：决策树！
- en: '[![](../Images/d3b949b18da527daabb2d3065ff5e48a.png)](https://docs.google.com/spreadsheets/d/18vsyRto_0FbBMjXdB_aCHVpGPCKTYBBgygVBi_o-apA/edit?usp=sharing)'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/d3b949b18da527daabb2d3065ff5e48a.png)](https://docs.google.com/spreadsheets/d/18vsyRto_0FbBMjXdB_aCHVpGPCKTYBBgygVBi_o-apA/edit?usp=sharing)'
- en: Decision Tree Regressor in Excel – image by author
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树回归器——图片由作者提供
- en: Introduction with a Simple dataset
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用简单数据集的介绍
- en: Let’s use a simple dataset with only one continuous feature.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用一个只有一个连续特征的简单数据集。
- en: As always, the idea is that you can visualize the results yourself. Then you
    have to think how to make the computer do it.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 和以往一样，想法是你自己可以可视化结果。然后你必须思考如何让计算机来完成它。
- en: '![](../Images/ca9cfbcb25cbefe6ebeb0cc9a72f498a.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ca9cfbcb25cbefe6ebeb0cc9a72f498a.png)'
- en: Decision tree regression in Excel simple dataset (I generated myself)  — image
    by author
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中简单数据集（我生成的）的决策树回归——图片由作者提供
- en: We can visually guess that for the first split, there are two possible values,
    one around 5.5 and the other around 12.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以直观地猜测，对于第一个分割，有两个可能的值，一个在5.5左右，另一个在12左右。
- en: Now the question is, which one do we choose?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的问题是，我们选择哪一个？
- en: 'This is exactly what we are going to find out: how do we determine the value
    for the first split with an implementation in Excel?'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是我们要找出的问题：我们如何通过Excel实现来确定第一个分割点的值？
- en: Once we determine the value for the first split, we can apply the same process
    for the following splits.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们确定了第一个分割点的值，我们就可以为后续的分割应用相同的过程。
- en: That is why we will only implement the first split in Excel.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，我们将在Excel中只实现第一个分割。
- en: The Algorithmic Principle of Decision Tree Regressors
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 决策树回归器的算法原理
- en: I wrote [an article to always distinguish three steps of machine learning to
    learn it effectively](https://medium.com/towards-data-science/machine-learning-in-three-steps-how-to-efficiently-learn-it-aefcf423a9e1),
    and let’s apply the principle to Decision Tree Regressors.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我写了一篇[文章，总是区分机器学习的三个步骤，以有效地学习它](https://medium.com/towards-data-science/machine-learning-in-three-steps-how-to-efficiently-learn-it-aefcf423a9e1)，现在让我们将这个原理应用到决策树回归器上。
- en: So for the first time, we have a “true” machine learning model, with non-trivial
    steps for all three.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，第一次，我们有一个“真正”的机器学习模型，对于所有三个步骤都有非平凡的步骤。
- en: What is the model?
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是模型？
- en: The model here is a set of rules, to partition the dataset, and for each partition,
    we are going to assign a value. Which one? The average value y of all the observations
    in the same group.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的模型是一组规则，用于划分数据集，并且对于每个分区，我们将分配一个值。哪个值？同一组中所有观测值的平均值y。
- en: So whereas k-NN predicts with the average value of the nearest neighbors (similar
    observations in terms of features variables), the Decision Tree regressor predicts
    with the average value of a group of observations (similar in terms of the feature
    variable).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，虽然k-NN通过最近邻的平均值进行预测（在特征变量方面的相似观测值），决策树回归器通过一组观测值的平均值进行预测（在特征变量方面的相似性）。
- en: Model fitting or training process
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型拟合或训练过程
- en: For a decision tree, we also call this process fully growing a tree. In the
    case of a Decision Tree Regressor, the leaves will contain only one observation,
    with thus a MSE of zero.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 对于决策树，我们也将这个过程称为完全生长一棵树。在决策树回归器的情况下，叶子将只包含一个观测值，因此MSE为零。
- en: Growing a tree consists of recursively partitioning the input data into smaller
    and smaller chunks or regions. For each region, a prediction can be calculated.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 树的生长包括递归地将输入数据分割成越来越小的块或区域。对于每个区域，可以计算一个预测值。
- en: In the case of regression, the prediction is the average of the target variable
    for the region.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在回归的情况下，预测是区域目标变量的平均值。
- en: At each step of the building process, the algorithm selects the feature and
    the split value that maximizes the one criterion, and in the case of a regressor,
    it is often the Mean Squared Error (MSE) between the actual value and the prediction.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建过程的每一步，算法选择特征和分割值，以最大化一个标准，在回归器的情况下，通常是实际值和预测值之间的均方误差（MSE）。
- en: Model Tuning or Pruning
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型调优或剪枝
- en: For a decision tree, the general term of model tuning is also call it pruning,
    be it can be seen as dropping nodes and leaves from a fully grown tree.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 对于决策树，模型调优的一般术语也称为剪枝，即使它可以被视为从完全成长的树中删除节点和叶子。
- en: It is also equivalent to say that the building process stops when a criterion
    is met, such as a maximum depth or a minimum number of samples in each leaf node.
    And these are the hyperparameters that can be optimized with the tuning process.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 也可以说，当满足某个标准时，构建过程停止，例如最大深度或每个叶子节点中的最小样本数。这些都是可以通过调优过程优化的超参数。
- en: Inferencing process
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 推理过程
- en: Once the decision tree regressor is built, it can be used to predict the target
    variable for new input instances by applying the rules and traversing the tree
    from the root node to a leaf node that corresponds to the input’s feature values.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦构建了决策树回归器，就可以通过应用规则并从根节点遍历树到对应于输入特征值的叶子节点来预测新输入实例的目标变量。
- en: The predicted target value for the input instance is then the mean of the target
    values of the training samples that fall into the same leaf node.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 对于输入实例的预测目标值是落在相同叶子节点中的训练样本的目标值的平均值。
- en: Split with One Continuous Feature
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于一个连续特征的分割
- en: 'Here are the steps we will follow:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我们将遵循的步骤：
- en: List all possible splits
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出所有可能的分割
- en: For each split, we will calculate the MSE (Mean Squared Error)
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每个分割，我们将计算均方误差（MSE）
- en: We will select the split that minimizes the MSE as the optimal next split
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们将选择最小化MSE的分割作为最佳下一个分割
- en: All possible splits
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 所有可能的分割
- en: First, we have to list all the possible splits that are the average values of
    two consecutive values. There is no need to test more values.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们必须列出所有可能的分割，即两个连续值的平均值。没有必要测试更多的值。
- en: '![](../Images/82155af28add0d6551990aa23f0a2471.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/82155af28add0d6551990aa23f0a2471.png)'
- en: Decision tree regression in Excel with possible splits — image by author
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中使用决策树回归进行可能的分割—图像由作者提供
- en: MSE calculation for each possible split
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 每个可能的分割的MSE计算
- en: As a starting point, we can calculate the MSE before any splits. This also means
    that the prediction is just the average value of y. And the MSE is equivalent
    to the Standard Deviation of y.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 作为起点，我们可以在任何分割之前计算MSE。这也意味着预测值只是y的平均值。MSE等同于y的标准差。
- en: Now, the idea is to find a split so that the MSE with a split is lower than
    before. It is possible that the split does not significantly improve the performance
    (or lower the MSE), then the final tree would be trivial, that is the average
    value of y.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们的想法是找到一个分割，使得分割后的MSE低于之前。可能的情况是分割并没有显著提高性能（或降低MSE），那么最终的树将是平凡的，即y的平均值。
- en: For each possible split, we can then calculate the MSE (Mean Squared Error).
    The image below shows the calculation for the first possible split, which is x
    = 2.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个可能的分割，我们可以计算均方误差（MSE）。下面的图像显示了第一个可能的分割的计算，即x = 2。
- en: '![](../Images/0f996a373123acf6cbafd381c8200401.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0f996a373123acf6cbafd381c8200401.png)'
- en: Decision tree regression in Excel MSE for all possible splits — image by author
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中决策树回归的均方误差（MSE）对所有可能的分割—图像由作者提供
- en: 'We can see the details of the calculation:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到计算的细节：
- en: 'Cut the dataset into two regions: with the value x=2, we determine two possibilities
    x<2 or x>2, so the x axis is cut into two parts.'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将数据集切割成两个区域：使用x=2的值，我们确定两种可能性x<2或x>2，因此x轴被切割成两部分。
- en: 'Calculate the prediction: for each part, we calculate the average of y. That
    is the potential prediction for y.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算预测值：对于每一部分，我们计算y的平均值。这就是y的潜在预测值。
- en: 'Calculate the error: then we compare the prediction to the actual value of
    y'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算误差：然后我们将预测值与y的实际值进行比较
- en: 'Calculate the squared error: for each observation, we can calculate the square
    error.'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算平方误差：对于每个观测值，我们可以计算平方误差。
- en: '![](../Images/cbeba10f61280f93d559b88e3308b630.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cbeba10f61280f93d559b88e3308b630.png)'
- en: Decision tree regression in Excel with all possible splits — image by author
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的所有可能分割的决策树回归——图片由作者提供
- en: Optimal split
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最佳分割
- en: For each possible split, we do the same to obtain the MSE. In Excel, we can
    copy and paste the formula and the only value that changes is the possible split
    value for x.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个可能的分割，我们进行相同的操作以获得MSE。在Excel中，我们可以复制并粘贴公式，唯一变化的是x的可能分割值。
- en: '![](../Images/98c6179cd55e9abd3df155b7ba632118.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/98c6179cd55e9abd3df155b7ba632118.png)'
- en: Decision tree regression in Excel splits— image by author
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树回归分割——图片由作者提供
- en: Then we can plot the MSE on the y-axis and the possible split on the x-axis,
    and now we can see that there is a minimum of MSE for x=5.5, this is exactly the
    result obtained with python code.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以在y轴上绘制均方误差（MSE），在x轴上绘制可能的分割，现在我们可以看到当x=5.5时，MSE达到最小值，这正是使用Python代码得到的结果。
- en: '![](../Images/02462d8c0a5e832f788be7dd9759b3d2.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/02462d8c0a5e832f788be7dd9759b3d2.png)'
- en: Decision tree regression in Excel Minimumization of MSE — image by author
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树回归最小化MSE——图片由作者提供
- en: Now, one small exercise you can do is change the MSE to MAE (Mean Absolute Error).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以做的一个小练习是将MSE改为平均绝对误差（MAE）。
- en: 'And you can try to answer this question: what is the impact of this change?'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以尝试回答这个问题：这种变化有什么影响？
- en: Condensing All Split Calculations into One Summary Table
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将所有分割计算压缩到一个总结表中
- en: In the earlier sections, we computed each split step by step, so that we can
    better visualize the details of calculations.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们逐步计算了每个分割，这样我们可以更好地可视化计算的细节。
- en: Now we put everything together in one single table, so the whole process becomes
    compact and easy to automate.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将所有内容放在一个单独的表中，这样整个过程就变得紧凑且易于自动化。
- en: To do this, we first simplify the calculations.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，我们首先简化计算。
- en: 'In a node, the prediction is the average, so the MSE is exactly the variance.
    And for the variance, we can also use the simplified formula:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个节点中，预测是平均值，因此MSE正好是方差。对于方差，我们也可以使用简化的公式：
- en: '![](../Images/7ed4958109872adbea6419f08fd7b8ea.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7ed4958109872adbea6419f08fd7b8ea.png)'
- en: So in the following table, we use one row for each possible split.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在下面的表中，我们为每个可能的分割使用一行。
- en: For each split, we calculate the MSE of the left node and the MSE of the right
    node.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个分割，我们计算左节点的MSE和右节点的MSE。
- en: The variance of each group can be simplified using the intermediate results
    of y and y squared.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用y和y平方的中间结果简化每个组的方差。
- en: Then we compute the weighted average of the two MSE values. And in the end,
    we get exactly the same result as in the step-by-step method.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们计算两个MSE值的加权平均值。最后，我们得到与逐步方法完全相同的结果。
- en: '![](../Images/16d75dd18476b93d7f3f8215d6c9455d.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/16d75dd18476b93d7f3f8215d6c9455d.png)'
- en: Decision Tree Regressor in Excel – get it from [here](https://ko-fi.com/s/4ddca6dff1)
    – image by author
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的决策树回归器 – 从[这里](https://ko-fi.com/s/4ddca6dff1)获取 – 图片由作者提供
- en: Split with Multiple Continuous Features
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 具有多个连续特征的分割
- en: Now we will use **two features**.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将使用**两个特征**。
- en: This is where it becomes interesting.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是变得有趣的地方。
- en: We will have candidate splits coming from **both** features.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将得到来自**两个特征**的候选分割。
- en: How do we choose?
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们该如何选择？
- en: We will simply consider **all** of them, and then select the split with the
    **smallest MSE**.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将简单地考虑**所有**这些分割，然后选择具有**最小MSE**的分割。
- en: 'The idea in Excel is:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的思路是：
- en: first, put all possible splits from the two features into **one single column**,
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，将两个特征的所有可能分割放入**一个单独的列**中，
- en: then, for each of these splits, calculate the MSE like before,
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，对于这些分割中的每一个，像以前一样计算MSE，
- en: finally, pick the best one.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，选择最好的一个。
- en: Splits concatenation
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分割连接
- en: First, we list **all possible splits for Feature 1** (for example, all thresholds
    between two sorted values).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们列出**特征1的所有可能分割**（例如，两个排序值之间的所有阈值）。
- en: Then, we list **all possible splits for Feature 2** in the same way.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们以相同的方式列出**特征2的所有可能分割**。
- en: In Excel, we concatenate these two lists into **one column** of candidate splits.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中，我们将这两个列表连接成一个**候选分割的列**。
- en: 'So each row in this column represents:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这个列中的每一行代表：
- en: “If I cut here, using this feature, what happens to the MSE?”
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “如果我使用这个特征在这里切割，会发生什么？”
- en: This gives us one unified list of **all splits from both features**.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 这为我们提供了一个统一的分割列表，包括**两个特征的所有分割**。
- en: '![](../Images/1fd9d906362b201de1d6ecf46202e487.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1fd9d906362b201de1d6ecf46202e487.png)'
- en: Decision Tree Regressor in Excel – get it from [here](https://ko-fi.com/s/4ddca6dff1)
    – image by author
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的决策树回归器 – 从[这里](https://ko-fi.com/s/4ddca6dff1)获取 – 图像由作者提供
- en: MSE calculations
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MSE 计算
- en: Once we have the list of all splits, the rest is the same logic as before.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们有了所有分割的列表，其余的步骤与之前相同。
- en: 'For each row (that is, for each split):'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每一行（即，对于每一个分割）：
- en: we divide the points into **left node** and **right node**,
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们将点分为**左节点**和**右节点**，
- en: we compute the **MSE of the left node**,
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们计算左节点的**均方误差 (MSE)**，
- en: we compute the **MSE of the right node**,
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们计算右节点的**均方误差 (MSE)**，
- en: we take the **weighted average** of the two MSE values.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们取两个 MSE 值的**加权平均**。
- en: At the end, we look at this column of “Total MSE” and we choose the split (and
    therefore the feature and threshold) that gives the **minimum** value.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们查看“总 MSE”这一列，并选择给出**最小**值的分割（因此是特征和阈值）。
- en: '![](../Images/fe3bea4d65455984982e72c1f51065df.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fe3bea4d65455984982e72c1f51065df.png)'
- en: Decision Tree Regressor in Excel – get it from [here](https://ko-fi.com/s/4ddca6dff1)
    – image by author
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的决策树回归器 – 从[这里](https://ko-fi.com/s/4ddca6dff1)获取 – 图像由作者提供
- en: Split with One Continuous and One Categorical Feature
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 带有一个连续特征和一个分类特征的分割
- en: 'Now let us combine two very different types of features:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们结合两种非常不同的特征类型：
- en: one **continuous** feature
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**连续**特征
- en: one **categorical** feature (for example, A, B, C).
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**分类**特征（例如，A，B，C）。
- en: A decision tree can split on **both**, but the way we generate candidate splits
    is not the same.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 决策树可以在**两者**上分割，但我们生成候选分割的方式并不相同。
- en: With a continuous feature, we test **thresholds**.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 对于连续特征，我们测试**阈值**。
- en: With a categorical feature, we test **groups of categories**.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 对于分类特征，我们测试**类别组**。
- en: 'So the idea is exactly the same as before:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 所以想法与之前完全相同：
- en: we consider **all possible splits** from both features, then we select the one
    with the **smallest MSE**.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 我们考虑从两个特征的所有可能的分割，然后选择具有**最小 MSE**的一个。
- en: '**Categorical feature splits**'
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**分类特征分割**'
- en: 'For a categorical feature, the logic is different:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 对于分类特征，逻辑不同：
- en: each category is already a “group”,
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个类别已经是一个“组”，
- en: 'so the simplest split is: **one category vs all the others**.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 因此，最简单的分割是：**一个类别与所有其他类别**。
- en: 'For example, if the categories are A, B, and C:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果类别是 A，B 和 C：
- en: 'split 1: A vs (B, C)'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分割 1：A 与 (B, C)
- en: 'split 2: B vs (A, C)'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分割 2：B 与 (A, C)
- en: 'split 3: C vs (A, B)'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分割 3：C 与 (A, B)
- en: This already gives meaningful candidate splits and keeps the Excel formulas
    manageable.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经给出了有意义的候选分割，并使 Excel 公式易于管理。
- en: Each of these category-based splits is added to the same list that contains
    the continuous thresholds.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 这些基于类别的分割被添加到包含连续阈值的同一列表中。
- en: '**MSE calculation**'
  id: totrans-125
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**MSE 计算**'
- en: 'Once all splits are listed (continuous thresholds + categorical partitions),
    the calculations follow the same steps:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦列出所有分割（连续阈值 + 分类分区），计算遵循相同的步骤：
- en: assign each point to the **left** or **right** node,
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将每个点分配到**左**或**右**节点，
- en: compute the **MSE of the left node**,
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算左节点的**均方误差 (MSE)**，
- en: compute the **MSE of the right node**,
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们计算右节点的**均方误差 (MSE)**，
- en: compute the **weighted average**.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算加权平均。
- en: The split with the **lowest total MSE** becomes the optimal first split.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 总 MSE 最低的分割成为最佳第一个分割。
- en: '[![](../Images/f24a6cd5224f37e12f10dd69b4799046.png)](https://ko-fi.com/s/4ddca6dff1)'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/f24a6cd5224f37e12f10dd69b4799046.png)(https://ko-fi.com/s/4ddca6dff1)'
- en: Decision Tree Regressor in Excel – get it from [here](https://ko-fi.com/s/4ddca6dff1)
    – image by author
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的决策树回归器 – 从[这里](https://ko-fi.com/s/4ddca6dff1)获取 – 图像由作者提供
- en: Exercise you can try out
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你可以尝试以下练习
- en: 'Now, you can play with the Google Sheet:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以玩 Google Sheet：
- en: You can try to find the next split
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以尝试找到下一个分割
- en: You can change the criterion, instead of MSE, you can use absolute error, Poisson
    or friedman_mse as indicated in the documentation of [DecisionTreeRegressor](https://scikit-learn.org/stable/modules/generated/sklearn.tree.DecisionTreeRegressor.html)
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以更改标准，而不是 MSE，你可以使用绝对误差、泊松或 friedman_mse，如[DecisionTreeRegressor](https://scikit-learn.org/stable/modules/generated/sklearn.tree.DecisionTreeRegressor.html)的文档中所示
- en: You can change the target variable to a binary variable, normally, this becomes
    a classification task, but 0 or 1 are also numbers so the criterion MSE still
    can be applied. But if you want to create a proper classifier, you have to apply
    the usual criterion Entroy or Gini. It is for the next article.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以将目标变量改为二元变量，通常情况下，这变成了一个分类任务，但0或1也是数字，所以均方误差（MSE）的准则仍然可以应用。但如果你想创建一个合适的分类器，你必须应用通常的准则熵（Entropy）或基尼系数（Gini）。这将是下一篇文章的内容。
- en: Conclusion
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Using Excel, it is possible to implement one split to gain more insights into
    how Decision Tree Regressors work. Even though we didn’t create a full tree, it
    is still interesting, since the most important part is finding the optimal split
    among all possible splits.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel，你可以实现一个分割来深入了解决策树回归器的工作原理。即使我们没有创建完整的树，这仍然很有趣，因为最重要的部分是找到所有可能分割中的最优分割。
- en: One more thing about missing values
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于缺失值还有一件事
- en: Have you noticed something interesting about how features are handled between
    distance-based models, and decision trees?
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你有没有注意到在基于距离的模型和决策树之间处理特征时的一些有趣之处？
- en: For distance-based models, everything must be numeric. Continuous features stay
    continuous, and categorical features must be transformed into numbers. The model
    compares points in space, so everything has to live on a numeric axis.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 对于基于距离的模型，一切都必须是数值。连续特征保持连续，分类特征必须转换为数字。模型比较空间中的点，所以所有东西都必须存在于数值轴上。
- en: 'Decision Trees do the inverse: they *cut* features into groups. A continuous
    feature becomes intervals. A categorical feature stays categorical.'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 决策树做的是相反的操作：它们*切割*特征成组。连续特征变成区间。分类特征保持分类状态。
- en: And a missing value? It simply becomes another category. There is no need to
    impute first. The tree can naturally handle it by sending all “missing” values
    to one branch, just like any other group.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 而缺失值呢？它简单地变成了另一个类别。没有必要先进行插补。树可以自然地通过将所有“缺失”值发送到一条分支来处理它，就像处理任何其他组一样。
