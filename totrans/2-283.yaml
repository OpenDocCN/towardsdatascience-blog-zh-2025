- en: Evaluating LLMs for Inference, or Lessons from Teaching for Machine Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评估LLM的推理能力，或从机器学习教学中学到的经验
- en: 原文：[https://towardsdatascience.com/evaluating-llms-for-inference-or-lessons-from-teaching-for-machine-learning/](https://towardsdatascience.com/evaluating-llms-for-inference-or-lessons-from-teaching-for-machine-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/evaluating-llms-for-inference-or-lessons-from-teaching-for-machine-learning/](https://towardsdatascience.com/evaluating-llms-for-inference-or-lessons-from-teaching-for-machine-learning/)
- en: <mdspan datatext="el1748894532165" class="mdspan-comment">I’ve had some interesting</mdspan>
    opportunities recently to work on the task of evaluating LLM inference performance,
    and I think it’s a good topic to discuss in a broader context. Thinking about
    this issue helps us pinpoint the significant challenges to trying to turn LLMs
    into reliable, trustworthy tools for even small or highly specialized tasks.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748894532165" class="mdspan-comment">最近我有一些有趣的</mdspan>机会参与评估LLM推理性能的任务，我认为这是一个在更广泛背景下讨论的好主题。思考这个问题有助于我们确定将LLM转变为可靠、值得信赖的工具，即使是小型或高度专业化的任务所面临的重大挑战。
- en: What We’re Trying to Do
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们试图做什么
- en: In it’s simplest form, the task of evaluating an LLM is actually very familiar
    to practitioners in the machine learning field — figure out what defines a successful
    response, and create a way to measure it quantitatively. However, there’s a wide
    variation in this task when the model is producing a number or a probability,
    versus when the model is producing a text.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在其最简单的形式中，评估一个LLM的任务实际上对机器学习领域的从业者来说非常熟悉——确定什么定义了一个成功的响应，并创建一种方法来对其进行定量测量。然而，当模型输出的是一个数字或概率时，与模型输出文本时，这项任务存在很大的差异。
- en: For one thing, the interpretation of the output is significantly easier with
    a classification or regression task. For classification, your model is producing
    a probability of the outcome, and you determine the best threshold of that probability
    to define the difference between “yes” and “no”. Then, you measure things like
    accuracy, precision, and recall, which are extremely well established and well
    defined metrics. For regression, the target outcome is a number, so you can quantify
    the difference between the model’s predicted number and the target, with similarly
    well established metrics like RMSE or MSE.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，对于分类或回归任务，输出的解释要容易得多。对于分类，你的模型正在输出结果的概率，你确定该概率的最佳阈值来定义“是”和“否”之间的差异。然后，你测量诸如准确率、精确率和召回率等事物，这些是极其确立和定义明确的指标。对于回归，目标结果是数字，因此你可以量化模型预测的数字与目标之间的差异，使用类似RMSE或MSE等同样确立的指标。
- en: But if you supply a prompt, and an LLM returns a passage of text, how do you
    define whether that returned passage constitutes a success, or measure how close
    that passage is to the desired result? What ideal are we comparing this result
    to, and what characteristics make it closer to the “truth”? While there is a general
    essence of “human text patterns” that it learns and attempts to replicate, that
    essence is vague and imprecise a lot of the time. In training, the LLM is being
    given guidance about general attributes and characteristics the responses should
    have, but there’s a significant amount of wiggle room in what those responses
    could look like without it being either negative or positive on the outcome’s
    scoring.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你提供一个提示，并且一个LLM返回一段文本，你如何定义返回的这段文本是否构成成功，或测量这段文本与期望结果有多接近？我们将这个结果与什么理想进行比较，以及哪些特征使其更接近“真相”？虽然它学习并试图复制“人类文本模式”的一般本质，但这个本质在很多情况下都是模糊和不精确的。在训练过程中，LLM被给予关于响应应具有的一般属性和特征的指导，但如果没有这些指导，响应可能看起来既不是负面也不是正面，对结果评分没有影响。
- en: But if you supply a prompt, and an LLM returns a passage of text, how do you
    define whether that returned passage constitutes a success?
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 但如果你提供一个提示，并且一个LLM返回一段文本，你如何定义返回的这段文本是否构成成功？
- en: In classical machine learning, basically anything that changes about the output
    will take the result either closer to correct or further away. But an LLM can
    make changes that are neutral to the result’s acceptability to the human user.
    What does this mean for evaluation? It means we have to create our own standards
    and methods for defining performance quality.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的机器学习中，基本上任何关于输出的变化都会使结果要么更接近正确，要么更远离正确。但一个LLM可以做出对人类用户接受结果的可接受性中性的改变。这对评估意味着什么？这意味着我们必须创建我们自己的标准和方法来定义性能质量。
- en: What does success look like?
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成功看起来是什么样子？
- en: Whether we are tuning LLMs or building applications using out of the box LLM
    APIs, we need to come to the problem with a clear idea of what separates an acceptable
    answer from a failure. It’s like mixing machine learning thinking with grading
    papers. Fortunately, as a former faculty member, I have experience with both to
    share.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 无论我们是调整LLM还是构建使用现成LLM API的应用程序，我们都需要带着一个清晰的想法来解决问题，即区分可接受的答案和失败的标准。这就像将机器学习思维与论文评分相结合。幸运的是，作为一名前教员，我有这方面的经验可以分享。
- en: I always approached grading papers with a rubric, to create as much standardization
    as possible, minimizing bias or arbitrariness I might be bringing to the effort.
    Before students began the assignment, I’d write a document describing what the
    key learning objectives were for the assignment, and explaining how I was going
    to measure whether mastery of these learning objectives was demonstrated. (I would
    share this with students before they began to write, for transparency.)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我总是用评分标准来评分论文，以尽可能实现标准化，最大限度地减少我可能带来的偏见或任意性。在学生开始作业之前，我会写一个文档，描述作业的关键学习目标，并解释我将如何衡量是否展示了这些学习目标的掌握。（我会在学生开始写作之前与他们分享，以确保透明度。）
- en: 'So, for a paper that was meant to analyze and critique a scientific research
    article (a real assignment I gave students in a research literacy course), these
    were the learning outcomes:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于旨在分析和评论科学论文的论文（我在研究素养课程中给学生布置的真正作业），这些是学习成果：
- en: The student understands the research question and research design the authors
    used, and knows what they mean.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学生理解作者使用的研究问题和研究设计，并知道其含义。
- en: The student understands the concept of bias, and can identify how it occurs
    in an article.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学生理解偏见的概念，并能够识别它在文章中的发生方式。
- en: The student understands what the researchers found, and what outcomes came from
    the work.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学生理解研究人员发现的内容以及这项工作产生的结果。
- en: The student can interpret the facts and use them to develop their own informed
    opinions of the work.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学生可以解释事实，并利用它们来形成自己对这项工作的有见地的观点。
- en: The student can write a coherently organized and grammatically correct paper.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学生可以写出一个组织有序且语法正确的论文。
- en: Then, for each of these areas, I created four levels of performance that range
    from 1 (minimal or no demonstration of the skill) to 4 (excellent mastery of the
    skill). The sum of these points then is the final score.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，对于这些领域中的每一个，我创建了四个表现水平，从1（最小或没有技能展示）到4（技能掌握优秀）。这些点的总和就是最终得分。
- en: 'For example, the four levels for organized and clear writing are:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，组织清晰和清晰的写作的四个水平是：
- en: Paper is disorganized and poorly structured. Paper is difficult to understand.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 论文组织混乱，结构不佳。论文难以理解。
- en: Paper has significant structural problems and is unclear at times.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 论文存在重大的结构问题，有时不清楚。
- en: Paper is mostly well organized but has points where information is misplaced
    or difficult to follow.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 论文总体上组织得很好，但有些地方信息放置不当或难以跟随。
- en: Paper is smoothly organized, very clear, and easy to follow throughout.
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 论文组织流畅，非常清晰，易于跟随。
- en: This approach is founded in a pedagogical strategy that educators are taught,
    to start from the desired outcome (student learning) and work backwards to the
    tasks, assessments, etc that can get you there.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法基于教育者被教导的教学策略，即从期望的结果（学生学习）开始，逆向工作到可以让你达到那里的任务、评估等。
- en: You should be able to create something similar for the problem you are using
    an LLM to solve, perhaps using the prompt and generic guidelines. If you can’t
    determine what defines a successful answer, then I strongly suggest you consider
    whether an LLM is the right choice for this situation. Letting an LLM go into
    production without rigorous evaluation is exceedingly dangerous, and creates huge
    liability and risk to you and your organization. (In truth, even with that evaluation,
    there is still meaningful risk you’re taking on.)
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该能够为使用LLM解决的问题创建类似的东西，也许可以使用提示和通用指南。如果你不能确定什么定义了成功的答案，那么我强烈建议你考虑LLM是否是这种情况的正确选择。在没有严格评估的情况下让LLM投入生产极其危险，对你和你的组织造成巨大的责任和风险。（实际上，即使有这种评估，你仍然承担着有意义的风险。）
- en: If you can’t determine what defines a successful answer, then I strongly suggest
    you consider whether an LLM is the right choice for this situation.
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你不能确定什么定义了成功的答案，那么我强烈建议你考虑LLM是否是这种情况的正确选择。
- en: Ok, but who’s doing the grading?
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 好的，但谁在评分？
- en: If you have your evaluation criteria figured out, this may sound great, but
    let me tell you, even with a rubric, grading papers is arduous and extremely time
    consuming. I don’t want to spend all my time doing that for an LLM, and I bet
    you don’t either. The industry standard method for evaluating LLM performance
    these days is actually using other LLMs, sort of like as teaching assistants.
    (There’s also some mechanical assessment that we can do, like running spell-check
    on a student’s paper before you grade, and I discuss that below.)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经确定了你的评估标准，这听起来可能很好，但让我告诉你，即使有了评分标准，批改论文也是一项艰巨且极其耗时的工作。我不想把所有时间都花在为一个LLM（大型语言模型）做这件事上，我打赌你也不想。目前评估LLM性能的行业标准方法实际上是使用其他LLM，有点像教学助理。（我们还可以做一些机械评估，比如在你批改之前对学生论文进行拼写检查，我下面会讨论这个问题。）
- en: This is the kind of evaluation I’ve been working on a lot in my day job lately.
    Using tools like [DeepEval](https://deepeval.com/), we can pass the response from
    an LLM into a pipeline along with the rubric questions we want to ask (and levels
    for scoring if desired), structuring evaluation precisely according to the criteria
    that matter to us. (I personally have had good luck with [DeepEval’s DAG framework](https://deepeval.com/docs/metrics-dag).)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我最近在日常工作中学到的大量评估工作。使用像[DeepEval](https://deepeval.com/)这样的工具，我们可以将LLM的响应传递到一个管道中，包括我们想要询问的评分标准问题（如果需要，还有评分等级），精确地根据对我们重要的标准来构建评估。（我个人在[DeepEval的DAG框架](https://deepeval.com/docs/metrics-dag)上取得了很好的效果。）
- en: Things an LLM Can’t Judge
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM无法判断的事物
- en: Now, even if we can employ an LLM for evaluation, it’s important to highlight
    things that the LLM can’t be expected to do or accurately assess, centrally the
    truthfulness or accuracy of facts. As I’ve been known to say often, LLMs have
    no framework for telling fact from fiction, they are only capable of understanding
    language in the abstract. You can ask an LLM if something is true, but you can’t
    trust the answer. It might accidentally get it right, but it’s equally possible
    the LLM will confidently tell you the opposite of the truth. Truth is a concept
    that is not trained into LLMs. So, if it’s crucial for your project that answers
    be factually accurate, you need to incorporate other tooling to generate the facts,
    such as RAG using curated, verified documents, but **never** rely on an LLM alone
    for this.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，即使我们可以使用LLM进行评估，也要强调LLM无法期望完成或准确评估的事情，尤其是事实的真实性或准确性。正如我经常说的，LLM没有区分事实与虚构的框架，它们只能理解抽象的语言。你可以问LLM某件事是否为真，但你不能相信答案。它可能会偶然说对，但LLM也可能自信地告诉你相反的真相。真相是一个没有训练到LLM中的概念。因此，如果你的项目关键在于答案必须事实准确，你需要整合其他工具来生成事实，例如使用经过精选、验证的文档的RAG（阅读-答案生成），但**永远**不要仅依赖LLM来完成这项工作。
- en: However, if you’ve got a task like document summarization, or something else
    that’s suitable for an LLM, this should give you a good technique to start your
    evaluation with.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你有一个像文档摘要这样的任务，或者适合LLM的其他任务，这应该为你提供一个好的技术来开始你的评估。
- en: LLMs all the way down
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LLM到底有多强大
- en: If you’re like me, you may now think “ok, we can have an LLM evaluate how another
    LLM performs on certain tasks. But how do we know the teaching assistant LLM is
    any good? Do we need to evaluate that?” And this is a very sensible question — **yes,
    you do need to evaluate that**. My recommendation for this is to create some passages
    of “ground truth” answers that you have written by hand, yourself, to the specifications
    of your initial prompt, and create a validation dataset that way.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你像我一样，你现在可能会想：“好吧，我们可以让一个LLM评估另一个LLM在特定任务上的表现。但我们怎么知道教学助理LLM有多好？我们需要评估这一点吗？”这是一个非常合理的问题——**是的，你需要评估这一点**。我的建议是，创建一些“地面真相”答案的段落，这些答案是你自己根据初始提示手动编写的，并以此创建一个验证数据集。
- en: Just like with any other validation dataset, this needs to be somewhat sizable,
    and representative of what the model might encounter in the wild, so you can achieve
    confidence with your testing. It’s important to include different passages with
    different kinds of errors and mistakes that you are testing for — so, going back
    to the example above, some passages that are organized and clear, and some that
    aren’t, so you can be sure your evaluation model can tell the difference.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 就像任何其他验证数据集一样，这需要有一定的规模，并且能够代表模型可能在野外遇到的情况，这样你可以在测试中建立信心。重要的是要包括不同类型的错误和错误，这些是你正在测试的——所以，回到上面的例子，一些组织有序、清晰的段落，以及一些不是的，这样你可以确保你的评估模型能够区分出来。
- en: Fortunately, because in the evaluation pipeline we can assign quantification
    to the performance, we can test this in a much more traditional way, by running
    the evaluation and comparing to an answer key. This does mean that you have to
    spend some significant amount of time creating the validation data, but it’s better
    than grading all those answers from your production model yourself!
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，因为我们在评估流程中可以为性能分配量化值，我们可以以更传统的方式运行评估并与之比较答案键。这意味着你必须花费相当多的时间来创建验证数据，但这比你自己批改生产模型的所有答案要好得多！
- en: Additional Assessing
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 额外的评估
- en: Besides these kinds of LLM based assessment, I am a big believer in building
    out additional tests that don’t rely on an LLM. For example, if I’m running prompts
    that ask an LLM to produce URLs to support its assertions, I know for a fact that
    LLMs hallucinate URLs all the time! Some percentage of all the URLs it gives me
    are certain to be fake. One simple strategy to measure this and try to mitigate
    it is to use regular expressions to scrape URLs from the output, and actually
    run a request to that URL to see what the response is. This won’t be completely
    sufficient, because the URL might not contain the desired information, but at
    least you can differentiate the URLs that are hallucinated from the ones that
    are real.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些基于LLM的评估方式，我非常相信构建出更多不依赖于LLM的额外测试。例如，如果我在运行提示时要求LLM生成支持其断言的URL，我知道LLM经常会胡编乱造URL！它给出的所有URL中，一定有一部分是假的。一种简单的策略来衡量这一点并尝试减轻它，就是使用正则表达式从输出中抓取URL，并实际运行对该URL的请求以查看响应。这并不完全足够，因为URL可能不包含所需的信息，但至少你可以区分出那些被胡编乱造的URL和真实的URL。
- en: Other Validation Approaches
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他验证方法
- en: Ok, let’s take stock of where we are. We have our first LLM, which I’ll call
    “task LLM”, and our evaluator LLM, and we’ve created a rubric that the evaluator
    LLM will use to review the task LLM’s output.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，让我们来盘点一下我们现在所处的位置。我们有了第一个LLM，我将称之为“任务LLM”，以及我们的评估LLM，并且我们已经创建了一个评分标准，评估LLM将使用它来审查任务LLM的输出。
- en: We’ve also created a validation dataset that we can use to confirm that the
    evaluator LLM performs within acceptable bounds. But, we can actually also use
    validation data to assess the task LLM’s behavior.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还创建了一个验证数据集，我们可以用它来确认评估LLM的表现是否在可接受的范围内。但实际上，我们也可以使用验证数据来评估任务LLM的行为。
- en: One way of doing that is to get the output from the task LLM and ask the evaluator
    LLM to compare that output with a validation sample based on the same prompt.
    If your validation sample is meant to be high quality, ask if the task LLM results
    are of equal quality, or ask the evaluator LLM to describe the differences between
    the two (on the criteria you care about).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一种方法是从任务LLM获取输出，并要求评估LLM将此输出与基于相同提示的验证样本进行比较。如果你的验证样本旨在高质量，可以询问任务LLM的结果是否具有同等质量，或者要求评估LLM描述两者之间的差异（根据你关心的标准）。
- en: This can help you learn about flaws in the task LLM’s behavior, which could
    lead to ideas for prompt improvement, tightening instructions, or other ways to
    make things work better.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以帮助你了解任务LLM行为中的缺陷，这可能导致改进提示、收紧指令或其他使事情变得更好的方法。
- en: Ok, I’ve evaluated my LLM
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 好的，我已经评估了我的LLM
- en: By now, you’ve got a pretty good idea what your LLM performance looks like.
    What if the task LLM sucks at the task? What if you’re getting terrible responses
    that don’t meet your criteria at all? Well, you have a few options.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在为止，你对LLM的性能应该有一个相当好的了解。如果任务LLM在任务上表现糟糕怎么办？如果你得到的响应完全不符合你的标准怎么办？嗯，你有几个选择。
- en: Change the model
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更改模型
- en: There are lots of LLMs out there, so go try different ones if you’re concerned
    about the performance. They are not all the same, and some perform much better
    on certain tasks than others — the difference can be quite surprising. You might
    also discover that different agent pipeline tools would be useful as well. ([Langchain
    has tons of integrations!](https://python.langchain.com/docs/integrations/providers/))
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在有很多LLM，如果你对性能有所顾虑，可以尝试不同的LLM。它们并不完全相同，有些在特定任务上的表现要比其他LLM好得多——这种差异可能会相当令人惊讶。你也可能会发现不同的代理管道工具同样很有用。([Langchain拥有大量的集成！](https://python.langchain.com/docs/integrations/providers/))
- en: Change the prompt
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更改提示
- en: Are you sure you’re giving the model enough information to know what you want
    from it? Investigate what exactly is being marked wrong by your evaluation LLM,
    and see if there are common themes. Making your prompt more specific, or adding
    additional context, or even adding example results, can all help with this kind
    of issue.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你确定你给模型提供了足够的信息，让它知道你想要什么吗？调查一下你的评估LLM标记为错误的是什么，看看是否有共同的主题。使你的提示更加具体，或添加额外的上下文，甚至添加示例结果，都可以帮助解决这类问题。
- en: Change the problem
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 改变问题
- en: Finally, if no matter what you do, the model/s just cannot do the task, then
    it may be time to reconsider what you’re attempting to do here. Is there some
    way to split the task into smaller pieces, and implement an agent framework? Meaning,
    can you run several separate prompts and get the results all together and process
    them that way?
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，如果你做什么都无法让模型完成任务，那么可能到了重新考虑你在这里试图做什么的时候了。有没有办法将任务分解成更小的部分，并实现一个代理框架？也就是说，你能运行几个独立的提示，并将结果全部收集起来并这样处理吗？
- en: Also, don’t be afraid to consider that an LLM is simply the wrong tool to solve
    the problem you are facing. In my opinion, single LLMs are only useful for a relatively
    narrow set of problems relating to human language, although you can expand this
    usefulness somewhat by combining them with other applications in agents.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，不要害怕考虑LLM可能根本不是解决你面临问题的正确工具。在我看来，单个LLM仅适用于与人类语言相关的相对狭窄的问题集，尽管你可以通过将它们与其他代理应用结合来在一定程度上扩展这种用途。
- en: Continuous monitoring
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 持续监控
- en: Once you’ve reached a point where you know how well the model can perform on
    a task, and that standard is sufficient for your project, you are not done! Don’t
    fool yourself into thinking you can just set it and forget it. Like with any machine
    learning model, continuous monitoring and evaluation is absolutely vital. Your
    evaluation LLM should be deployed alongside your task LLM in order to produce
    regular metrics about how well the task is being performed, in case something
    changes in your input data, and to give you visibility into what, if any, unusual
    and rare mistakes the LLM might make.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你达到了一个了解模型在任务上能表现多好的程度，并且这个标准对你的项目来说是足够的，你还没有完成！不要自欺欺人地认为你只需设置好就可以置之不理。就像任何机器学习模型一样，持续的监控和评估绝对是至关重要的。你的评估LLM应该与你的任务LLM一起部署，以便产生关于任务执行得如何的常规指标，以防你的输入数据发生变化，并且让你能够了解LLM可能犯的任何异常和罕见的错误。
- en: Conclusion
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Once we get to the end here, I want to emphasize the point I made earlier —
    consider whether the LLM is the solution to the problem you’re working on, and
    make sure you are using only what’s really going to be beneficial. It’s easy to
    get into a place where you have a hammer and every problem looks like a nail,
    especially at a moment like this where LLMs and “AI” are everywhere. However,
    if you actually take the evaluation problem seriously and test your use case,
    it’s often going to clarify whether the LLM is going to be able to help or not.
    As I’ve described in other articles, using LLM technology has a massive environmental
    and social cost, so we all have to consider the tradeoffs that come with using
    this tool in our work. There are reasonable applications, but we also should remain
    realistic about the externalities. Good luck!
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 到这里，我想强调我之前提到的观点——考虑LLM是否是你正在工作的解决问题的方案，并确保你只使用真正有益的部分。很容易陷入一个境地，就像现在LLM和“AI”无处不在的时刻，你有一把锤子，每个问题看起来都像钉子。然而，如果你真正认真对待评估问题并测试你的用例，通常这将澄清LLM是否能够提供帮助。正如我在其他文章中描述的，使用LLM技术有巨大的环境和社会成本，因此我们所有人都必须考虑使用这个工具在工作中的权衡。有合理的应用，但我们也应该对外部性保持现实。祝你好运！
