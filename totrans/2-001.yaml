- en: The Math You Need to Pan and Tilt 360° Images
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/math-to-tilt-pan-360-images/](https://towardsdatascience.com/math-to-tilt-pan-360-images/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 0\. <mdspan datatext="el1756149509948" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You’re certainly already familiar with spherical or 360 images. They’re used
    in Google Street View or in virtual house tours to give you an immersive feeling
    by letting you look around in any direction.
  prefs: []
  type: TYPE_NORMAL
- en: 'Since such images lie on the unit sphere, storing them in memory as flat images
    might be tricky. In practice, we usually store them as flat arrays using one of
    the two following formats:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cubemap (6 images)**: each image corresponds to the face of a cube onto which
    the unit sphere has been projected.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Equirectangular image**: similar to a planisphere map of the Earth. The south
    and north poles of the unit sphere are stretched to flatten the image onto a regular
    grid. Unlike the cubemap, the image is stored as a single image which simplifies
    the boundary handling during image processing. But this approach introduces significant
    distortion.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/9aea9200037a12d4714adecc9a05d974.png)'
  prefs: []
  type: TYPE_IMG
- en: 6 images of the cubemap with annotated faces — Figure by the author, from [Understanding
    360 Images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6ddead080becfb5d367b775b57ffcc1b.png)'
  prefs: []
  type: TYPE_IMG
- en: Equirectangular view of the cubemap with annotated faces — Figure by the author,
    from [Understanding 360 Images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
  prefs: []
  type: TYPE_NORMAL
- en: In a previous article ([Understanding 360 images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)),
    I explained the math behind the conversion between these two formats. In this
    article we’ll focus instead only on the equirectangular format and investigate
    the math behind modifying the camera pose of an equirectangular image.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a great opportunity to better understand spherical coordinates, rotation
    matrices and image remapping!
  prefs: []
  type: TYPE_NORMAL
- en: The images below illustrate the kind of transform we’d like to apply.
  prefs: []
  type: TYPE_NORMAL
- en: “What would my 360 image look like if it were tilted 20° downwards?”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/ad36e6b60dce398ff310c8737aea4de3.png)'
  prefs: []
  type: TYPE_IMG
- en: 360 image of the cubemap with annotated faces, tilted 20° downwards — Image
    by the author
  prefs: []
  type: TYPE_NORMAL
- en: “What would my 360 image look like if it were shifted 45° to the right?”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/d4871c4b7397ad26f526566297435812.png)'
  prefs: []
  type: TYPE_IMG
- en: 360 image of the cubemap with annotated faces, shifted 45° to the right — Image
    by the author
  prefs: []
  type: TYPE_NORMAL
- en: “What would my 360 image look like if it were shifted 45° to the right and tilted
    20° downwards?”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/837ff19b1018e71f6ad6a1b851166079.png)'
  prefs: []
  type: TYPE_IMG
- en: 360 image of the cubemap with annotated faces, shifted 45° to the right and
    tilted 20° downwards — Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: N.B. The most widely used image coordinates system is to have the vertical Y
    axis pointing downwards in the image and the horizontal X axis pointing to the
    right. Thus, I find it more intuitive that a positive horizontal Δθ shift moves
    the image to the right, while a negative Δθ moves it to the left. However this
    counterintuitively implies that moving the image to the right corresponds to looking
    left in the actual scene! Similarly a positive vertical Δφ tilt moves the image
    upwards. The choice of convention is arbitrary, it doesn’t really matter.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/66ccb13476cc8fb93d6dc95465cf9306.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by Grillot Edouard on [Unsplash](https://unsplash.com/photos/a-spiral-staircase-in-a-building-with-people-walking-down-it-uX4ikaLXYtE)
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Spherical Camera Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Spherical coordinates
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: On a planisphere map of the Earth, horizontal lines correspond to latitudes
    while vertical lines correspond to longitudes.
  prefs: []
  type: TYPE_NORMAL
- en: When converting from cartesian to spherical coordinates, a point M in the scene
    is fully described by its radius r and its two angles θ and φ. These angles allow
    us to unwrap the sphere into an equirectangular image, where θ serves as the longitude
    and φ as the latitude.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/27b38c6a402d3779b6820a025f2a4bd9.png)'
  prefs: []
  type: TYPE_IMG
- en: Spherical coordinates with Theta around the Y axis and Phi around the X axis
    — Figure by the author, from [Understanding 360 Images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
  prefs: []
  type: TYPE_NORMAL
- en: I’ve **arbitrarily** chosen to use the ***Right_Down_Front*** XYZ camera convention
    (See [my previous article](https://medium.com/check-visit-computer-vision/converting-camera-poses-from-opencv-to-opengl-can-be-easy-27ff6c413bdb)
    about camera poses) and to have **θ=φ=0** in front of us. Feel free to use another
    convention. You get the same image at the end anyway. I just find it more convenient.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The image below illustrates the convention we’re using, with θ varying horizontally
    on the equirectangular image from -π on the left, 0 at the center and +π on the
    right. Note that the left and right edges of the image smoothly extend each other.
    As for φ, the north pole is at -π/2 and the south pole is at π/2.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2ce024df58d11bb77dedd3587fb6ccb9.png)'
  prefs: []
  type: TYPE_IMG
- en: θ (longitude) and φ (latitude) — Figure by the author, from [Understanding 360
    Images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
  prefs: []
  type: TYPE_NORMAL
- en: Mapping to pixel coordinates is then just an affine transform.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cf0faa5ce80f0576044938b1b88c36d8.png)'
  prefs: []
  type: TYPE_IMG
- en: Rotation Matrices
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When working with 3D rotations it can quickly get messy without using matrix
    form. Rotation matrices provide a convenient way to express rotations as plain
    matrix-vector multiplications.
  prefs: []
  type: TYPE_NORMAL
- en: In our ***Right_Down_Front*** XYZ camera convention (arbitrarily chosen), the
    rotation of angle φ around the X axis is described by the matrix below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dea5843d48f2e16e28ca19ee682c0687.png)'
  prefs: []
  type: TYPE_IMG
- en: As you can see, this matrix leaves the X-axis unchanged since it’s its rotation
    axis.
  prefs: []
  type: TYPE_NORMAL
- en: Having cosines along the diagonal makes sense because φ=0 must yield the identity
    matrix.
  prefs: []
  type: TYPE_NORMAL
- en: 'As for the sign before the sines, I find it helpful to refer to the spherical
    coordinates diagram above and think about what would happen for a tiny positive
    φ. The point directly in front of the camera is (0,0,1), i.e. the tip of the front
    axis Z, and will thus be rotated into the last column of Rφ: (0, sinφ, cosφ).
    This gives us a vector close to Z but also with a tiny positive component along
    the Y axis, exactly as expected!'
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, we have the matrix describing the rotation of angle θ around the
    Y axis.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6e60ac4b128167b5992bb176d72f9ef7.png)'
  prefs: []
  type: TYPE_IMG
- en: Conversion between cartesian and spherical coordinates
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The point M with spherical coordinates (φ,θ) can be converted to 3D cartesian
    coordinates p by starting from the point (0,0,1) in front of the camera, tilting
    it by φ around the X axis and finally panning it by θ around the Y axis.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/27b38c6a402d3779b6820a025f2a4bd9.png)'
  prefs: []
  type: TYPE_IMG
- en: Spherical coordinates with Theta around the Y axis and Phi around the X axis
    — Figure by the author, from [Understanding 360 Images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
  prefs: []
  type: TYPE_NORMAL
- en: The equations below derive the cartesian coordinates by successively applying
    the rotation matrices on (0,0,1). The radius r has been omitted since we’re only
    interested in the unit sphere.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5763907cbaeca64c95d22040226c124d.png)'
  prefs: []
  type: TYPE_IMG
- en: To recover the spherical angles (φ,θ) we simply have to apply the inverse trigonometric
    functions to the components of p. Note that since φ lies in [-π/2,π/2] we know
    that the factor cosφ is guaranteed to remain positive, which allows us to safely
    apply arctan2.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7df088e331cfd4195c646f697f4d138e.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a5282dec0f451e0cb9e7bfbb73894bfc.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by Jakob Owens on [Unsplash](https://unsplash.com/photos/trowed-black-canon-dslr-camera-H6a1mbbXFis)
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Tilt/Pan 360 image
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Image remapping
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Our goal is to transform an equirectangular image into another equirectangular
    image, that mimics a (Δφ, Δθ) angular shift. In [Understanding 360 images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
    I explained how to transform between equirectangular images and cubemaps. Fundamentally
    it’s the same process: a sampling task where we apply a transform to existing
    pixels to generate new pixels.'
  prefs: []
  type: TYPE_NORMAL
- en: Since the transform can produce floating-point coordinates we have to use interpolation
    rather than just moving integer pixels.
  prefs: []
  type: TYPE_NORMAL
- en: It may sound counter-intuitive, but when remapping an image we actually need
    the reverse transform and not the transform itself. The determinant of the Jacobian
    of the transform defines how local density changes, which means there won’t always
    be a one-to-one correspondence between input and output pixels. If we were to
    apply the transform to each of the input pixels to populate the new image we could
    end up with huge holes in the transformed image because of density variations.
  prefs: []
  type: TYPE_NORMAL
- en: Thus we need to define the reverse transform, so that we can iterate over each
    output pixel coordinates, map them back to the input image and interpolate its
    color from the neighboring pixels.
  prefs: []
  type: TYPE_NORMAL
- en: Transition Matrix
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We have two 3D coordinates systems:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Frame 0**: Input 360 image'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Frame 1**: Output 360 image transformed by (Δφ, Δθ)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each frame can define locally its own spherical angles.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/362c906696c39e4bcb97e5bad47f0a96.png)'
  prefs: []
  type: TYPE_IMG
- en: We’re now looking for the 3×3 transition matrix between both frames.
  prefs: []
  type: TYPE_NORMAL
- en: The transition is defined by the fact that we want the center of the input image
    0 to be mapped to the point at (Δφ, Δθ) in the output image 1.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e5d5b6f0357096ecf85bd109b63018f5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'It turns out that it’s precisely what we already do in the spherical coordinates
    system: mapping the point at (0,0,1) to given spherical angles. Thus we end up
    with the following transform.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fbe8965f7bd60d83640a8aac6f5ea77c.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The reverse transform is then:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c7ffc6a8f6c5d339e809ec4b1a38bfd7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Warning: Rotation matrices generally don’t commute when their rotation axes
    differ. Order matters!'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This directly gives us the pose of the transformed camera. In fact, you can
    replace p1 by any base axis of frame 1 (1,0,0), (0,1,0) and (0,0,1) and look at
    where it lands in frame 0.
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus, the camera is first panned by -Δθ and then tilted by -Δφ. This is exactly
    what you would do intuitively with your camera: orient yourself towards the target
    and then adjust the tilt. Reversing the order would result in a skewed or rolled
    camera orientation.'
  prefs: []
  type: TYPE_NORMAL
- en: Reverse transform
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s develop the matrix form to end up with a clean closed-form expression
    for the reverse transform yielding angles 0 from angles 1.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/68cac8e8448f6283d7acc577bd560473.png)'
  prefs: []
  type: TYPE_IMG
- en: First we substitute p1 with its definition to make φ1 and θ1 appear.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e66d3cf25aa4b7854c46b21fa13a5ad0.png)'
  prefs: []
  type: TYPE_IMG
- en: It turns out that both rotation matrices around the Y axis end up side-by-side
    and can be merged into a single rotation matrix of angle θ1-Δθ.
  prefs: []
  type: TYPE_NORMAL
- en: The right part of the equation corresponds to a spherical point of coordinates
    (φ1, θ1-Δθ). We substitute it by its explicit form.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/83e5ad02da05798c2b55e43b8841cf58.png)'
  prefs: []
  type: TYPE_IMG
- en: We then substitute the remaining rotation matrix with its explicit form and
    perform the multiplication.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/85fc3252c9a56b5204afcb2213f1de78.png)'
  prefs: []
  type: TYPE_IMG
- en: We finally use inverse trigonometric functions to retrieve (φ0,θ0).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/39bba90c08ba082203a84e80036e5090.png)'
  prefs: []
  type: TYPE_IMG
- en: Great! We now know where to interpolate within the input image.
  prefs: []
  type: TYPE_NORMAL
- en: Code
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The code below loads a spherical image, selects arbitrary rotation angles (Δφ,Δθ),
    computes the reverse transform maps and finally applies them using cv2.remap to
    get the output transformed image.
  prefs: []
  type: TYPE_NORMAL
- en: N.B. <mdspan datatext="el1756149327443" class="mdspan-comment">This code</mdspan>
    is intended for pedagogical purposes. There is still room for performance optimization!
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Camera Pan only
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What if Δφ=0 and the transform is a pure pan?
  prefs: []
  type: TYPE_NORMAL
- en: When Δφ=0 the rotation matrix becomes the identity and the expression of p0
    simplifies to its canonical form in spherical coordinates (φ1, θ1-Δθ).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e65e30f111778ce1ce8e965abaf487f8.png)'
  prefs: []
  type: TYPE_IMG
- en: The transform is straightforward and is just a plain subtraction on the θ angle.
    We’re basically simply rolling the image horizontally using a floating-point Δθ
    shift.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6d1a322462731c6411cfe6de9c6ec2e8.png)'
  prefs: []
  type: TYPE_IMG
- en: Camera Tilt only
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What if Δθ=0 and the transform is a pure tilt?
  prefs: []
  type: TYPE_NORMAL
- en: When Δθ=0 the rotation matrix becomes the identity. But unfortunately it doesn’t
    change anything, we’ve just replaced θ1-Δθ by θ1 in the equation, that’s it.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2867f65bba7c0fb2d3f0cfee4360c6b0.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8588d526489697792d415b2c739c66c8.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by Kaitlin Duffey on [Unsplash](https://unsplash.com/photos/crystal-ball-photography-of-building-during-daytime-l1MOcqruH-o)
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Behavior at Image Boundaries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It could be interesting to see how points at boundaries of the input 360 image
    are affected by the transform.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, the south pole corresponds to φ0=π/2, which significantly simplifies
    the equations with cos(φ0)=0 and sin(φ0)=1\. And we also know that the value of
    θ0 doesn’t matter since each pole is reduced to a single point.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, substituting φ0=π/2 into the final reverse transform formula
    derived above gives us a clearly non-trivial equation to solve for (φ1,θ1).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f3d1edfd3b24b07941eb14df58417d83.png)'
  prefs: []
  type: TYPE_IMG
- en: Classic mistake! Instead of using the reverse transform formula, it would be
    much simpler to use the forward transform. Let’s derive it.
  prefs: []
  type: TYPE_NORMAL
- en: Direct Transform
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Unlike the reverse transform we can’t merge rotation matrices because pan and
    tilt rotations strictly alternate.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ef07a4b017a75bf99d9671541d8574a6.png)'
  prefs: []
  type: TYPE_IMG
- en: Let’s use the explicit form of p0 and the rotations matrices Δθ and Δφ. Since
    points (φ0,θ0) at the image boundary greatly simplify the equations thanks to
    their convenient cos(φ0) and sin(φ0) values, I’ve chosen to compute only the product
    of RΔφ and RΔθ to keep substitutions for trivial p0 values straightforward.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/13bcd9140bc31f8072a988f68aab6ed4.png)'
  prefs: []
  type: TYPE_IMG
- en: North/South Poles
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The south pole is defined by φ0=π/2\. We have cos(φ0)=0 and sin(φ0)=1 which
    simplifies the product into simply keeping the second column of the rotation matrix.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/83f352d758d45bc7c4bedc6976fafab9.png)'
  prefs: []
  type: TYPE_IMG
- en: As expected θ0 doesn’t appear in the expression. Although the poles are infinitely
    stretched at the top/bottom of the spherical image they are still single points
    in 3D space.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/be7899a0d0b4a5ebbc08ac48b1c7c834.png)'
  prefs: []
  type: TYPE_IMG
- en: Considering Δφ in [-π,π], we can replace φ1 by π/2-|Δφ|.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b4d678fcbfe991cd78eae5ecae4e3f6d.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph of arcsin(cosΔφ) — Generated by the author on [desmos](https://www.desmos.com)
  prefs: []
  type: TYPE_NORMAL
- en: 'As for θ1 it will depend on the sign of sinΔφ. Note that on [-π,π] sinΔφ and
    Δφ have the same sign. Finally, we get:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5e280b81a7cfaaf4bbf7ba668d772dbc.png)'
  prefs: []
  type: TYPE_IMG
- en: When Δφ<0, the image tilts downwards and the camera starts looking upwards.
    As a result the south pole appears in front of the camera at θ1=Δθ. However, when
    Δφ>0 the camera starts looking downwards and the south pole moves to the back,
    which explains the θ1=Δθ+π.
  prefs: []
  type: TYPE_NORMAL
- en: 'The math for the north pole is very similar, we get:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dfa1445794f21a60318e5466a459d6e9.png)'
  prefs: []
  type: TYPE_IMG
- en: In real life 360 images the south pole is easy to spot because it corresponds
    to the tripod. To make this clearer, I’ve added in the figure below a green band
    at the bottom of the input 360 image to mark the south pole and a magenta band
    at the top to highlight the north pole. The left column corresponds to negative
    Δφ angles, while the right column corresponds to positive Δφ angles.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a24841f3f6976c180303507c54c2d910.png)'
  prefs: []
  type: TYPE_IMG
- en: Evolution of the south pole (in green) and north pole (in magenta) with respect
    to Δφ, with Δθ fixed at π/3 — Figure by the author
  prefs: []
  type: TYPE_NORMAL
- en: Left/Right Edge
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The left and right edge of the 360 image coincide and correspond to θ0=±π, which
    means cosθ0=-1 and sinθ0=0.
  prefs: []
  type: TYPE_NORMAL
- en: Identifying the cosine difference identity helps simplifying the equations.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/993d7ca645259272e4aaff861dd19a38.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The inverse trigonometric functions give us:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4bdbfe4ac08747923b3a1e5cc233cbe8.png)'
  prefs: []
  type: TYPE_IMG
- en: As long as you remain on [-π/2,π/2], arcsin(sinx) is the identity function.
    But beyond this range, the function turns into a periodic triangular wave.
  prefs: []
  type: TYPE_NORMAL
