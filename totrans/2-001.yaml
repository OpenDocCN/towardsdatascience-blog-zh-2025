- en: As for θ1 it will be either Δθ or Δθ+π depending on the sign of cos(φ0-Δφ).
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s actually really intuitive: the front and back edges are just the connections
    between the north and south poles. Since the poles translate along Δθ and Δθ+π
    the front/back edges simply follow them along these two vertical tracks.'
  prefs: []
  type: TYPE_NORMAL
- en: In the images below I’ve highlighted the front edge in cyan and the back edge
    in red. Like before, the left column corresponds to negative Δφ angles, while
    the right column corresponds to positive Δφ angles.
  prefs: []
  type: TYPE_NORMAL
