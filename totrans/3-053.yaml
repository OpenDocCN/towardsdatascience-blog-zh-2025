- en: If I Wanted to Become a Machine Learning Engineer, I’d Do This
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/if-i-wanted-to-become-a-machine-learning-engineer-id-do-this/](https://towardsdatascience.com/if-i-wanted-to-become-a-machine-learning-engineer-id-do-this/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1745890919806" class="mdspan-comment">If I wanted</mdspan>
    to become a machine learning engineer again, this is the exact process I would
    follow.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get into it!
  prefs: []
  type: TYPE_NORMAL
- en: First become a data scientist or software engineer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ve said it before, but a machine learning engineer is not exactly an entry-level
    position.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is because you need skills in so many areas:'
  prefs: []
  type: TYPE_NORMAL
- en: Statistics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maths
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Machine Learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Software Engineering
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DevOps
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cloud Systems
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You certainly don’t need to be an expert in all of them, but you should have
    solid knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: 'Machine learning engineers are probably the highest-paid tech job nowadays.
    According to [levelsfyi](https://www.levels.fyi/t), the average salaries in the
    UK are:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Machine learning engineer: £93,796'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AI Researcher: £83,114'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AI Engineer: £75,379'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data Scientist: £71,005'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Software Engineer: £83,168'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data Engineer: £69,475'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Levelsfyi is generally on the higher end as the companies on their website
    are often large tech companies, which typically pay higher salaries.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: With all this in mind, that’s not to say you can’t land a machine learning engineer
    job right out of university or college; it’s just very rare, and I have hardly
    seen it.
  prefs: []
  type: TYPE_NORMAL
- en: If you have the right background, such as a master’s or PhD in CS or maths that’s
    focussed on AI/ML, you are much more likely to get a general machine learning
    role, but not necessary a machine learning engineering one.
  prefs: []
  type: TYPE_NORMAL
- en: So, for the majority of people, I recommend you become a data scientist or software
    engineer first for a few years and then look to become a machine learning engineer.
  prefs: []
  type: TYPE_NORMAL
- en: '*This is precisely what I did. *'
  prefs: []
  type: TYPE_NORMAL
- en: I was a data scientist for 3.5 years and then transitioned to a machine learning
    engineer, and this path is quite common among machine learning engineers at my
    current company.
  prefs: []
  type: TYPE_NORMAL
- en: Whether you become a data scientist or software engineer is up to you and your
    background and skill set.
  prefs: []
  type: TYPE_NORMAL
- en: So, decide which role is best for you and then try to land a job in that field.
  prefs: []
  type: TYPE_NORMAL
- en: There are so many software engineer and data scientist roadmaps on the internet;
    I am sure you can find one easily that suits your way of learning.
  prefs: []
  type: TYPE_NORMAL
- en: I have a few data science ones that you can check out below.
  prefs: []
  type: TYPE_NORMAL
- en: '[**If I Started Learning Data Science in 2025, I’d Do This**'
  prefs: []
  type: TYPE_NORMAL
- en: '*How I would make my data science learning more effective*](https://medium.com/illumination/if-i-started-learning-data-science-in-2025-id-do-this-fe2209a8d8ab)'
  prefs: []
  type: TYPE_NORMAL
- en: '[**How I’d Become a Data Scientist (If I Had to Start Over)**](https://towardsdatascience.com/how-id-become-a-data-scientist-if-i-had-to-start-over-d966a9de12c2/)
    *[Roadmap and tips on how to land a job in data science](https://towardsdatascience.com/how-id-become-a-data-scientist-if-i-had-to-start-over-d966a9de12c2/)*'
  prefs: []
  type: TYPE_NORMAL
- en: Work on machine learning projects
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once you have a job as a data scientist or software engineer, your goal should
    be to develop and work on machine learning projects that go to production.
  prefs: []
  type: TYPE_NORMAL
- en: If a machine learning department or project exists at your current company,
    the best approach is to work on these.
  prefs: []
  type: TYPE_NORMAL
- en: For example, a friend of mine, [Arman Khondker](https://www.linkedin.com/in/armankhondker/overlay/about-this-profile/),
    who runs the newsletter [“the ai engineer”](https://www.aimlengineer.io/) that
    I highly recommend you check, transitioned from being a software engineer at TikTok
    to working at Microsoft AI as an engineer.
  prefs: []
  type: TYPE_NORMAL
- en: 'According to his [newsletter](https://www.aimlengineer.io/p/how-i-became-a-software-engineer):'
  prefs: []
  type: TYPE_NORMAL
- en: '*At TikTok, I worked on **TikTok Shop**, where I collaborated closely with
    the **Algorithm Team** — including ML engineers and data scientists working on
    the FYP (For You Page) recommendation engine.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*This experience ultimately helped me **transition into AI full-time at Microsoft**.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: However, for me, it was the other way around.
  prefs: []
  type: TYPE_NORMAL
- en: As a data scientist, you want to work with machine learning engineers and software
    engineers to understand how things are deployed to production.
  prefs: []
  type: TYPE_NORMAL
- en: At my previous company, I was a data scientist developing machine learning algorithms
    but wasn’t independently shipping them to production.
  prefs: []
  type: TYPE_NORMAL
- en: So, I asked if I could work on a project where I could research a model and
    deploy it end to end with little engineering support.
  prefs: []
  type: TYPE_NORMAL
- en: It was hard, but I learned and grew my engineering skills a lot. Eventually,
    I started shipping my solutions to production easily.
  prefs: []
  type: TYPE_NORMAL
- en: I essentially became a machine learning engineer even though my title was data
    scientist.
  prefs: []
  type: TYPE_NORMAL
- en: My advice is to speak to your manager, express your interest in developing machine
    learning knowledge, and ask if you can work on some of these projects.
  prefs: []
  type: TYPE_NORMAL
- en: In most cases, your manager and company will be accommodating, even if it takes
    a couple of months to assign you to a project.
  prefs: []
  type: TYPE_NORMAL
- en: Even better, if you can move to a team focused on a machine learning product,
    like recommendations on TikTok shop, then this will expedite your learning as
    you’ll be constantly discussing machine learning topics.
  prefs: []
  type: TYPE_NORMAL
- en: Up-skill in opposite skillset
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This relates to the previous point, but as I said earlier, machine learning
    engineers require an extensive remit of knowledge, so you need to up-skill yourself
    in the areas you are weaker on.
  prefs: []
  type: TYPE_NORMAL
- en: If you are a data scientist, you are probably weaker in engineering areas like
    cloud systems, DevOps, and writing production code.
  prefs: []
  type: TYPE_NORMAL
- en: If you are a software engineer, you are probably weaker on the maths, statistics
    and machine learning knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: You want to find the areas you need to improve and focus on.
  prefs: []
  type: TYPE_NORMAL
- en: As we discussed earlier, the best way is to tie it into your day job, but if
    this is not possible or you want to expedite your knowledge, then you will need
    to study in your spare time.
  prefs: []
  type: TYPE_NORMAL
- en: I know some people may not like that, but you are going to need to put in the
    extra hours outside of work if you want to get a job in the highest paying tech
    job!
  prefs: []
  type: TYPE_NORMAL
- en: I did this by writing blogs on software engineering concepts, studying data
    structures and algorithms, and improving my writing of production code all in
    my spare time.
  prefs: []
  type: TYPE_NORMAL
- en: Develop a speciality in machine learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One thing that really helped me was to develop a specialism within machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: I was a data scientist specialising in time series forecasting and optimisation
    problems, and I landed a machine learning engineer role that specialises in optimisation
    and classical machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: One of the main reasons I got my machine learning engineer role was that I had
    a deeper understanding of optimisation than the average machine learning person;
    that was my edge.
  prefs: []
  type: TYPE_NORMAL
- en: Machine learning engineer roles are generally aligned to a specialism, so knowing
    one or a couple of areas very well will significantly boost your chances.
  prefs: []
  type: TYPE_NORMAL
- en: 'In Arman’s case, he knew recommendation systems pretty well and also how to
    deploy them end-to-end at scale; he even said this himself in his [newsletter](https://www.aimlengineer.io/p/how-i-became-a-software-engineer):'
  prefs: []
  type: TYPE_NORMAL
- en: '*This work gave me firsthand experience with:*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*– Large-scale **recommendation systems***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*– AI-driven **ranking and personalization***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*– End-to-end **ML deployment pipelines***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: So, I recommend working in a team that focuses on a particular machine learning
    area, but to be honest, this is often the case in most companies, so you shouldn’t
    need to think too hard about this.
  prefs: []
  type: TYPE_NORMAL
- en: If you can’t work on machine learning projects at your company, you need to
    study outside of hours again. I always recommend learning the fundamentals first,
    but then really think of the areas you want to explore and learn deeepr.
  prefs: []
  type: TYPE_NORMAL
- en: 'Below is an exhaustive list of machine learning specialisms for some inspiration:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Natural Language Processing (NLP) and LLMs*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Computer Vision*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Reinforcement Learning*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Time Series Analysis and Forecasting*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Anomaly Detection*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Recommendation Systems*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Speech Recognition and Processing*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Optimisation*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Quantitative Analysis*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Deep Learning*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Bioinformatics*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Econometrics*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Geospatial Analysis*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I usually recommend knowing 2 to 3 in decent depth, but narrowing it down to
    one is fine if you want to transition soon. However, see if sufficient demand
    exists for that skill set.
  prefs: []
  type: TYPE_NORMAL
- en: After you become a machine learning engineer, you can develop more specialisms
    over time.
  prefs: []
  type: TYPE_NORMAL
- en: I also recommend you check out a whole article on how to specialise in machine
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: '**[How To Specialize In Data Science / Machine Learning](https://towardsdatascience.com/how-to-specialize-in-data-science-machine-learning-9e62418bae09/)**
    [](https://medium.com/data-science/how-to-specialize-in-data-science-machine-learning-9e62418bae09)
    [*Is it better to be a generalist or specialist*?](https://towardsdatascience.com/how-to-specialize-in-data-science-machine-learning-9e62418bae09/)'
  prefs: []
  type: TYPE_NORMAL
- en: Start operating as a machine learning engineer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In tech companies, it is often stated that to get promoted, you should have
    been operating at the above level for 3–6 months.
  prefs: []
  type: TYPE_NORMAL
- en: The same is true if you want to be a machine learning engineer.
  prefs: []
  type: TYPE_NORMAL
- en: If you are a data scientist or software engineer, you should try as hard as
    possible to become and work like a machine learning engineer at your current company.
  prefs: []
  type: TYPE_NORMAL
- en: Who knows, they may even change your title and offer you the machine learning
    engineer job at your current workplace! (I have heard this happen.)
  prefs: []
  type: TYPE_NORMAL
- en: What I am really getting at here is the identity switch. You want to think and
    act like a machine learning engineer.
  prefs: []
  type: TYPE_NORMAL
- en: This mindset will help you learn more and better frame yourself for machine
    learning interviews.
  prefs: []
  type: TYPE_NORMAL
- en: You will have that confidence and an array of demonstrable projects that generate
    impact.
  prefs: []
  type: TYPE_NORMAL
- en: You can always say, “I am basically a machine learning engineer at my current
    company.”
  prefs: []
  type: TYPE_NORMAL
- en: I did this, and the rest is history, as they say.
  prefs: []
  type: TYPE_NORMAL
