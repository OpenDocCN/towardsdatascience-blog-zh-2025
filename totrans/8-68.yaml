  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[领英](https://www.linkedin.com/in/sahn1998/)**, **[Instagram](https://www.instagram.com/sunghyunie/)**'
- en: '**[Email](/cdn-cgi/l/email-protection#becddfd6d08f878786fed9d3dfd7d290ddd1d3)**,
    **[Website](https://sunghyun-ahn.com/)**'
  id: totrans-91
