- en: 'Data behind the Luck, Ambition, and a Billion-Dollar Dream: Lottery'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-lottery-data-behind-the-luck-ambition-and-a-billion-dollar-dream-c31fdc17d170/](https://towardsdatascience.com/the-lottery-data-behind-the-luck-ambition-and-a-billion-dollar-dream-c31fdc17d170/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Lottery sales trend from a local retail store](../Images/90a37c9dda81905da960db9fb4a839e8.png)'
  prefs: []
  type: TYPE_IMG
- en: Lottery sales trend from a local retail store
  prefs: []
  type: TYPE_NORMAL
- en: 'If you are not a paid member on Medium, I make my stories available for free:
    [Friends link](https://medium.com/@sahn1998/the-lottery-data-behind-the-luck-ambition-and-a-billion-dollar-dream-c31fdc17d170?sk=f835e3ecf02326219f4f2c578a4df310)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Today’s article takes a slight detour from my usual data-science-focused pieces,
    but don’t worry – it won’t deviate too much (hopefully it provides you with an
    interesting analysis and insights as well)!
  prefs: []
  type: TYPE_NORMAL
- en: Today, I’ll be talking about a topic that probably everyone has talked about
    at some point in their life – be it jokingly with friends or as a serious daydream.
    ***What is it, you ask?***
  prefs: []
  type: TYPE_NORMAL
- en: The Lottery
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As most of you may know… the lottery has been a symbol of luck and ambition
    for decades. How many times have you heard someone say, **"This is my life-changing
    ticket,"** or **"If I win, I’m going to quit my job and travel the world"?**
  prefs: []
  type: TYPE_NORMAL
- en: Even if gambling isn’t your thing – and for most people, it’s not – a lucky
    golden ticket and a life-changing jackpot have a way of drawing people in.
  prefs: []
  type: TYPE_NORMAL
- en: Now, I’ll admit, I’m not one to gamble. Spending hard-earned money on something
    with odds like 1 in 292 million? ***Not exactly my idea of a sound investment*.**
  prefs: []
  type: TYPE_NORMAL
- en: But even I can’t ignore getting interested, especially when the prize pool reaches
    astronomical figures. You gotta admit, it’s hard not to feel a little tempted
    to go to a local grocery store and buy yourself a ticket – even if you swore you’d
    never gamble.
  prefs: []
  type: TYPE_NORMAL
- en: Take the recent Mega Millions jackpot (December 2024), for example. It hit a
    jaw-dropping **$1.3 billion**, with the lucky winner coming out in California.
    Seeing such an enormous figure left me asking…
  prefs: []
  type: TYPE_NORMAL
- en: How does the prize pool get that big?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The obvious answer is simple: no one gets the winning ticket, and the prize
    rolls over to the next drawing.'
  prefs: []
  type: TYPE_NORMAL
- en: '*But is there more to it?* Could larger jackpots attract more ticket buyers,
    creating a feedback loop that inflates the prize pool even further? I would assume
    so, but how true is it?'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: My Curiosity Meets Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Well… This is the kind of question I’ve always wondered about whenever I heard
    my friends or colleagues talk about how big the prize was for the lottery.
  prefs: []
  type: TYPE_NORMAL
- en: So, like the Curious George that I am (my name isn’t George, but you get the
    point), I decided to look at this "gamble" through the lens of data science. **Lucky
    for me, I was fortunate enough to gain access to the lottery ticket sales data
    (2020–2025) from a family member who owns a retail store that sells a significant
    volume of tickets each year.**
  prefs: []
  type: TYPE_NORMAL
- en: While I don’t have insight into the operations of the national lottery entities
    themselves, I do have access to something even more personal – *a local snapshot
    of consumer behavior*.
  prefs: []
  type: TYPE_NORMAL
- en: '![Top 15 sales data ($ USD) from the retails store](../Images/dd8c0d7374700d71dfd9e450a12f53f3.png)'
  prefs: []
  type: TYPE_IMG
- en: Top 15 sales data ($ USD) from the retails store
  prefs: []
  type: TYPE_NORMAL
- en: The next few sections are where I’m going to take a closer look. The lottery
    may be a game of chance, but there’s a wealth of insight hidden in the numbers.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: A Quick Background
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For those unfamiliar with the lottery system in the United States, there are
    two major nationwide games:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Powerball**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Mega Millions**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'These games are responsible for some of the largest jackpots in history, with
    prize pools often rolling over into billions when no one wins the grand prize.
    Both games operate similarly: players pick numbers, and a draw determines the
    winner. But the odds? They’re astronomical. For Powerball, the odds of winning
    the jackpot are roughly **1 in 292 million**, while for Mega Millions, they are
    **1 in 302 million**.'
  prefs: []
  type: TYPE_NORMAL
- en: Despite these odds, millions of people play every week.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I’ll borrow the words that I’ve seen on social media a fair bit ago. *"Why?
    Because for a few dollars, people are not just buying a ticket – they’re buying
    a dream."*
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Data: What Can We Learn?'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'With data spanning from beginning of 2020 to the end of 2024, I set out to
    answer one simple question: *Does the data tell us anything about what drives
    people to buy lottery tickets, and what could I infer from them?*'
  prefs: []
  type: TYPE_NORMAL
- en: Before we move on looking at the data, it’s important to address a significant
    challenge the business faced in 2024\. Due to extensive construction in the area,
    the store was left without accessible roads for it’s customers for much of the
    year. **This understandably led to lower average sales during that period, which
    will be reflected in the data.**
  prefs: []
  type: TYPE_NORMAL
- en: Extracting Lottery Sales Data from the database (SQL)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before I go into the analysis itself, I would like to show you briefly on what
    the data tables looked like. Why? Because extracting the lotto sales data from
    an old POS system’s database was no small task.
  prefs: []
  type: TYPE_NORMAL
- en: The terrible design and lack of organization made the process quite challenging.
    Data types were inconsistent, column names were terrible, and table structures
    were far from intuitive.
  prefs: []
  type: TYPE_NORMAL
- en: '![Partial Image of what the item sales table included from the database](../Images/bee347dafcd6e5f452ccffe26f8c8a26.png)'
  prefs: []
  type: TYPE_IMG
- en: Partial Image of what the **item sales table** included from the database
  prefs: []
  type: TYPE_NORMAL
- en: '![Partial Image of what the category table included from the database](../Images/9e275810917fad3a51e2aa04ca8c4549.png)'
  prefs: []
  type: TYPE_IMG
- en: Partial Image of what the **category table** included from the database
  prefs: []
  type: TYPE_NORMAL
- en: However, after an hour of analyzing the tables in the database, I learned that
    a table included a ***subtotal, date, ReferenceID to a category table, and the
    category table had labels for the products*** (of course there were more, but
    these were all I needed for now). It was nice because for lotto ticket sales,
    the category was defined as "Lottery," so all I needed to do was some LEFT JOINs
    to extract the data! Here’s a simplified example of how it came together.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Sales Trends
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After extracting and transforming the data in SQL, I ended up with a much cleaner
    dataset, ready for deeper analysis in Python.
  prefs: []
  type: TYPE_NORMAL
- en: All python code for graphs are at the end of the article!
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Local Retail Stores''s Lottery Sales Trend](../Images/a9e7af06cc7b297d7ab34f995d466d7a.png)'
  prefs: []
  type: TYPE_IMG
- en: Local Retail Stores’s Lottery Sales Trend
  prefs: []
  type: TYPE_NORMAL
- en: 'At first glance, the daily sales figures look pretty consistent. Some days
    have higher sales, some have low sales. However, you can’t help but notice the
    sharp spikes scattered across the timeline. These outliers immediately caught
    my attention, prompting the question: ***What causes these dramatic increases
    in sales?***'
  prefs: []
  type: TYPE_NORMAL
- en: '![Lottery Sales Trend with highlighted jackpot dates](../Images/c5a25f5d42ca2faefc7eefcd7b9d7eea.png)'
  prefs: []
  type: TYPE_IMG
- en: Lottery Sales Trend with highlighted jackpot dates
  prefs: []
  type: TYPE_NORMAL
- en: '**Honestly, as you may have guessed, the answer is pretty straightforward.
    It’s what the news media often refers to as "Jackpot Fever."** As jackpots grow
    larger, the allure of massive prize pools drives significant spikes in ticket
    sales, and this pattern is evident in the data.'
  prefs: []
  type: TYPE_NORMAL
- en: For example, during the **November 2022 Powerball jackpot**, which reached an
    unprecedented $2.04 billion, daily ticket sales from the retail store spiked by
    over **600%** compared to the monthly average. Not only was this the highest spike
    in sales across the entire dataset, but it was also accompanied by sustained increases
    in the days leading up to the jackpot being claimed. These pre-draw spikes suggest
    that the rising jackpot had captured the attention of both regular buyers and
    those who don’t typically participate.
  prefs: []
  type: TYPE_NORMAL
- en: A similar trend emerged in **October 2023**, when the Powerball prize pool reached
    $1.76 billion. Once again, the excitement surrounding the jackpot drove significant
    sales surges. I think it really shows how larger prize pools influence consumer
    behavior!
  prefs: []
  type: TYPE_NORMAL
- en: '![Top 15 sales data ($ USD) with the lottery jackpot](../Images/84c6c99f1370df8255e9583430d821d6.png)'
  prefs: []
  type: TYPE_IMG
- en: Top 15 sales data ($ USD) **with the lottery jackpot**
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**What’s particularly fascinating is how these insights come from just a single
    retail store’s data. It shows that these moments aren’t just about numbers -it
    represent a collective psychological dream amongst all Americans.**'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: So, What Do You think the Spikes Reveal?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I think that the graph highlights much more than just jackpot-driven sales;
    it offers a pretty interesting insight into human behavior and cultural influences.
  prefs: []
  type: TYPE_NORMAL
- en: The Feedback Loop of Large Jackpots
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As prize pools grow, sales naturally follow suit. Larger jackpots create a feedback
    loop, where the promise of incredible money (and retirement) drives higher participation.
    Obviously, as you may be able to imagine, inflates the jackpot further. I think
    it truly reflects the power of hype, media coverage, and the fear of missing out
    (FOMO).
  prefs: []
  type: TYPE_NORMAL
- en: Seasonal Influences
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s also very interesting to see that the spikes in ticket sales align with
    certain times of the year, particularly **holiday periods**. Noticeable increases
    occur at the end or beginning of each year, likely driven *holiday gifting and
    New Year optimism.*
  prefs: []
  type: TYPE_NORMAL
- en: The owners of the retail store have told me that some people spend over $1,000
    dollars sometimes on Lotto tickets for their family gifts! Crazy.
  prefs: []
  type: TYPE_NORMAL
- en: The Pandemic Effect
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Interestingly, the spikes were less frequent in **2020 and 2021**. This likely
    reflects the impact of the COVID-19 pandemic. In the early days of the pandemic,
    sales dipped as people prioritized essentials (remember the toilet paper shortages?).
    However, as the year went on, sales rebounded.
  prefs: []
  type: TYPE_NORMAL
- en: '**I think it’s fair to say that insights from this data does have some points
    that a data scientist or a data analyst could question to analyze further.**'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: More Than Just Lotto
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I know this article has been focused on the sales data. But, I personally think
    it’s very important to highlight that lotteries do more than just offer a chance
    at striking it rich. **They play a critical role in supporting small businesses.**
  prefs: []
  type: TYPE_NORMAL
- en: '![December 2024 Customer Traffic Data](../Images/18a55ffa1bac552aa622afabab1560b9.png)'
  prefs: []
  type: TYPE_IMG
- en: December 2024 Customer Traffic Data
  prefs: []
  type: TYPE_NORMAL
- en: For many local stores selling lottery tickets isn’t just another transaction
    – it’s a means to bring in customers who might not otherwise walk through their
    doors. These visits often lead to additional purchases, whether it’s a cup of
    coffee, a quick snack, or a last-minute item. This boost in foot traffic is especially
    vital during challenging economic times or when stores are working to recover
    from setbacks.
  prefs: []
  type: TYPE_NORMAL
- en: Take, for instance, the retail store behind this data. After enduring months
    of disruptions caused by extensive road construction (concluded around August
    and September of 2024), the store struggled to regain its usual customer flow.
  prefs: []
  type: TYPE_NORMAL
- en: '**However, the recent surge in lottery jackpots has led to a dramatic rebound
    in foot traffic, with December marking the highest numbers of the year – returning
    to the levels the store saw before the construction began.**'
  prefs: []
  type: TYPE_NORMAL
- en: So, while the lottery is often seen as a gamble, I think it serves a much larger
    purpose. It acts like a small catalyst for the local economy, helping small businesses
    not just survive but thrive. Every ticket sold isn’t just a chance at a dream
    for the buyer – it’s also a lifeline for the businesses that rely on those customers
    to keep their doors open.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Wrapping It All Up
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I think there’s a lot more to find and talk about using the data, but I wanted
    to keep this article shorter than my usual. I’ll provide the code snippets down
    near the end of my article for those that are interested.
  prefs: []
  type: TYPE_NORMAL
- en: The lottery, at first glance, might seem like just a gamble. But it’s interesting
    to see that there could be much more. From the sharp spikes during massive jackpots
    to the steady role it plays in sustaining small businesses, I think the lottery
    serves as a fascinating intersection of luck, ambition, and community impact.
  prefs: []
  type: TYPE_NORMAL
- en: For the store behind this data, the lottery wasn’t just about selling tickets.
    It was a way to rebuild after months of struggle, drawing customers back in and
    reigniting their business. For the buyers, every ticket represented more than
    just a chance at wealth – it was a moment of shared excitement, hope, and participation
    in something bigger.
  prefs: []
  type: TYPE_NORMAL
- en: At the end of the day, the lottery tells a story. It’s one of human optimism
    and resilience, of businesses finding ways to thrive, and of a community coming
    together over the slim but enticing possibility of changing their lives forever.
  prefs: []
  type: TYPE_NORMAL
- en: And maybe, just maybe, that’s what makes it worth all the hype.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
