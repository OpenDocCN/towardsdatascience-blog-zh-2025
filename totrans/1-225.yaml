    Accessed: 2025.'
  prefs: []
  type: TYPE_NORMAL
- en: '[5] OpenAI. (2024). OpenAI o1 system card. arXiv preprint [**arXiv:2412.16720**](http://arxiv.org/abs/2412.16720).'
  prefs: []
  type: TYPE_NORMAL
- en: '[6] Snell, C., Lee, J., Xu, K., & Kumar, A. (2024). Scaling LLM test-time compute
    optimally can be more effective than scaling model parameters. arXiv preprint
    [**arXiv:2408.03314**](https://arxiv.org/abs/2408.03314)**.**'
  prefs: []
  type: TYPE_NORMAL
- en: '[7] Brown, B., Juravsky, J., Ehrlich, R., Clark, R., Le, Q. V., Ré, C., & Mirhoseini,
    A. (2024). Large language monkeys: Scaling inference computation with repeated
    sampling. arXiv preprint [**arXiv:2407.21787**](https://arxiv.org/abs/2407.21787)**.**'
  prefs: []
