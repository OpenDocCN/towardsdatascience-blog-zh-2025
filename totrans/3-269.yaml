- en: Data vs. Business Strategy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-vs-business-strategy/](https://towardsdatascience.com/data-vs-business-strategy/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*There seems to be a consensus that leveraging data, analytics, and AI to create
    a data-driven organization requires a clear strategic approach. However, there
    is less clarity and agreement on exactly what this strategic approach should look
    like in practice.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*This article provides a short overview of what strategy work I believe is
    required to become data-driven. It offers a summary of a *[*detailed deep-dive*](https://medium.com/towards-data-science/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533)* I
    recently wrote and is the fourth installment in a *[*series demystifying data
    strategy*](https://contributor.insightmediagroup.io/tagged/demystify-data-strategy)*.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*[*I am Jens*](https://jens-linden.de/)*, a business-minded** *data expert
    with nearly two decades of experience in implementing data and AI use cases. I
    help leaders across industries design strategies and foster cultures that unlock
    the full potential of data and algorithms.*'
  prefs: []
  type: TYPE_NORMAL
