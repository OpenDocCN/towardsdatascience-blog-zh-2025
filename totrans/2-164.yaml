- en: Work Data Is the Next Frontier for GenAI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 工作数据是生成式AI的下一个前沿
- en: 原文：[https://towardsdatascience.com/work-data-is-the-next-frontier-for-genai/](https://towardsdatascience.com/work-data-is-the-next-frontier-for-genai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/work-data-is-the-next-frontier-for-genai/](https://towardsdatascience.com/work-data-is-the-next-frontier-for-genai/)
- en: '*<mdspan datatext="el1752081619822" class="mdspan-comment">Work data</mdspan>,
    the work output of knowledge workers, is the single most valuable data source
    for LLM training, uniquely capable of propelling LLM performance to unprecedented
    heights. In this article, I will present nine supporting arguments for this claim.
    Then I will reflect on the current conflict of interest between the owners of
    work data and AI companies wanting to train on this data. Then I will discuss
    potential resolutions and a win-win scenario.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*<mdspan datatext="el1752081619822" class="mdspan-comment">工作数据</mdspan>，知识工作者的工作产出，是LLM训练中最有价值的数据来源，独特地能够推动LLM性能达到前所未有的高度。在这篇文章中，我将提出支持这一论断的九个论据。然后，我将反思工作数据所有者与想要使用这些数据进行训练的AI公司之间的当前利益冲突。然后，我将讨论可能的解决方案和双赢的局面。>'
- en: 'While publicly accessible [training data is predicted to run out](https://www.educatingsilicon.com/2024/05/09/how-much-llm-training-data-is-there-in-the-limit/),
    there is still an abundance of untapped private data. Within private data, the
    biggest and best opportunity is—I think—work data: work outputs of knowledge workers,
    from the code of devs, through the conversations of support agents, to the pitch
    decks of salespeople.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然公开可访问的训练数据预计将耗尽[https://www.educatingsilicon.com/2024/05/09/how-much-llm-training-data-is-there-in-the-limit/](https://www.educatingsilicon.com/2024/05/09/how-much-llm-training-data-is-there-in-the-limit/)，但仍有大量未被开发的私有数据。在私有数据中，最大的最佳机会——我认为——是工作数据：知识工作者的工作产出，从开发者的代码，到支持代理人的对话，再到销售人员的提案演示。
- en: Many of these insights draw from Dara B Roy’s *Sobering Talking Points for Knowledge
    Workers on Generative AI* which extensively discusses the use of work data in
    the context of LLM training as well as its effects on the labor market of knowledge
    workers.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 许多这些见解都源自Dara B Roy的《知识工作者关于生成式AI的清醒谈话要点》*，该文广泛讨论了在工作数据在LLM训练中的应用以及其对知识工作者劳动力市场的影响。
- en: So, why is work data so valuable for LLM training? For 9 reasons.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，为什么工作数据对LLM训练如此有价值？有9个原因。
- en: Work data is the best quality data humanity has ever produced
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作数据是人类历史上质量最好的数据
- en: Work data is obviously much better quality than our public internet content.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 工作数据显然比我们的公共互联网内容质量要好得多。
- en: 'In fact, if we look at the public internet content used in pretraining: the
    best quality sources (the ones you would upsample during training) are the ones
    that are the **work outputs** of someone: articles of the New York Times, books
    of professional authors.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，如果我们看看用于预训练的公开互联网内容：最佳质量来源（你会在训练中对其进行上采样）是那些人的工作产出：纽约时报的文章，专业作者的书籍。
- en: Why is work data so much better quality than non-work internet content?
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么工作数据的质量比非工作互联网内容要好得多？
- en: '**More factual and trustworthy**. What we say and produce at work is both more
    factual and trustworthy. After all, as employees, we are accountable for it and
    our livelihood depends on it.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更真实、更可信**。我们在工作中所说和所生产的内容既更真实、更可信。毕竟，作为员工，我们对此负责，我们的生计也依赖于它。'
- en: '**Produced by vetted professionals**: public internet content is produced by
    self-proclaimed experts. Work data, however, is produced by professionals who
    have been carefully picked from a vast pool of talents during multiple rounds
    of job interviews, tests, and background checks. Imagine, if the same was true
    for internet content: you could only post on Reddit if a board of professionals
    first evaluated your credentials and skills.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**由经过审查的专业人士生产**：公共互联网内容是由自称为专家的人生产的。然而，工作数据是由在多轮工作面试、测试和背景审查中从大量人才中精心挑选的专业人士生产的。想象一下，如果互联网内容也是如此：你只能在Reddit上发帖，前提是一个专业评审团首先评估了你的资历和技能。'
- en: '**Reflects vetted knowledge**: workers’ output reflects battle-tested ideas
    and industry best practices that proved their worth under real-life business conditions.
    Compare this to internet content, which typically only aims to grab the attention
    of the reader, featuring clever-sounding but ultimately untested ideas.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反映经过审查的知识**：工作产出反映了经过实战检验的想法和行业最佳实践，这些想法在现实商业条件下证明了其价值。相比之下，互联网内容通常只旨在吸引读者的注意，包含听起来聪明但最终未经检验的想法。'
- en: '**Reflects human preferences more** **closely**: The way we express ourselves
    in our work products is more eloquent, more thoughtful, and more tactful. We just
    make an extra effort to follow the norms (aka human preferences) of our culture.
    If pretraining was done solely on work data, we might not need RLHF and alignment
    training at all because all that just permeates the training data.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更紧密地反映人类偏好**：我们在工作产品中表达自己的方式更加流畅、更加深思熟虑、更加得体。我们只是额外努力去遵循我们文化的规范（即人类偏好）。如果预训练完全基于工作数据，我们可能根本不需要RLHF（Reinforcement
    Learning from Human Feedback）和对齐训练，因为所有这些都渗透到了训练数据中。'
- en: '**Reflects more complex patterns, and reveals deeper connections**: Public
    internet content is often only scratching the surface of any topic. After all,
    it’s for the public. Professional matters are discussed in much more depth within
    companies, revealing much deeper connections between concepts. It’s a better quality
    of thought, it’s better reasoning, it’s a more thorough consideration of facts
    and possibilities. If current foundational models grew as good as they are on
    crappy public internet data, imagine what would they be able to learn from work
    data which contains several layers more complexity, nuance, meaning, and patterns.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反映更复杂的模式，揭示更深层次的联系**：公共互联网内容通常只是触及任何话题的表面。毕竟，它是面向公众的。在公司的专业讨论中，讨论的深度要大得多，揭示了概念之间更深层次的联系。这是一种更好的思维质量，更好的推理，对事实和可能性的更全面考虑。如果当前的基础模型能够在糟糕的公共互联网数据上变得如此之好，那么想象一下，它们从包含更多复杂性、细微差别、意义和模式的工作数据中能学到什么。'
- en: What’s more, work data is often labeled by quality. In some cases, there is
    data on whether the work was produced by a junior or a senior. In some cases,
    the work is labeled by performance metrics, so it’s clear which sample is worth
    more for training purposes. E.g. you may have data on which marketing content
    resulted in more conversions; you may have data on which support agent response
    produced higher customer satisfaction ratings.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，工作数据通常按质量进行标注。在某些情况下，有关于工作是由初级还是高级人员产生的数据。在某些情况下，工作成果按绩效指标进行标注，因此可以清楚地知道哪个样本在训练目的上更有价值。例如，你可能拥有关于哪些营销内容导致了更多的转化；你可能拥有关于哪些客服人员的响应产生了更高的客户满意度评分。
- en: Overall, I think, work data is probably the best quality data humanity has ever
    produced because the incentives are aligned. Workers are literally rewarded for
    their work outputs’ performance.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，我认为，工作数据可能是人类有史以来产生的最佳质量数据，因为激励是统一的。工人实际上会因为他们的工作成果的表现而得到奖励。
- en: 'To put it differently:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说：
- en: On the open internet, good quality content is the exception. In the world of
    work, good quality content is the rule.
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在公开互联网上，高质量内容是例外。在工作世界中，高质量内容是规则。
- en: There are legendary stories of YOLO runs when big models are trained on astronomic
    budgets and you hope the training samples are good enough, so they don’t lead
    your model astray and blow your budget. Perhaps, training on work data would end
    the age of YOLO runs, making AI training much more predictable and financially
    feasible for less capitalized companies too.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 有关于YOLO（You Only Live Once）训练的传奇故事，当大型模型在天文数字的预算上训练时，你希望训练样本足够好，以免误导你的模型并耗尽预算。也许，在工怍数据上训练将结束YOLO训练的时代，使AI训练对资金较少的公司来说更加可预测和财务可行。
- en: Work data manifests the most valuable human knowledge
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作数据体现了最宝贵的人类知识
- en: LLMs can extract valuable skills from reading the New York Times or practicing
    math test batteries. Writing like a NYT columnist is a nice skill to have; Acing
    an AP Calculus Exam is a great achievement.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）可以通过阅读《纽约时报》或练习数学测试来提取有价值的技能。像《纽约时报》专栏作家一样写作是一项很好的技能；通过AP微积分考试是一次伟大的成就。
- en: 'But the real business value lies in the skills that real businesses are willing
    to pay for. Obviously, those skills are best extracted from the data that contains
    them: work outputs.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 但真正的商业价值在于真实企业愿意为之付费的技能。显然，这些技能最好从包含它们的数據中提取：工作成果。
- en: Work data is readily available for AI training
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作数据对于AI训练来说是易于获取的
- en: If you are working for a SaaS that helps a certain group of knowledge workers
    perform their tasks, naturally, their work outputs live in your cloud storage.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你为一家帮助特定知识工作者完成任务的服务软件公司工作，那么自然地，他们的工作成果就存储在你的云存储中。
- en: Technically that data is readily available for AI training. Whether you have
    a legal basis to use it for that purpose, is another question.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 技术上，这些数据对于AI训练来说是易于获取的。但是，你是否拥有合法依据来将其用于此目的，则是另一个问题。
- en: Work data is orders of magnitude bigger than public internet content
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作数据比公共互联网内容大得多
- en: Intuitively, if you think about your public internet footprint (e.g. how much
    you post or publish online) it is dwarfed by the amount that you produce for work.
    I, for one, probably churn out 100x more words for work than for my public internet
    presence.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 直观地讲，如果你考虑你的公共互联网足迹（例如你在网上发布或发布的内容量），它与你为工作产生的内容量相比相形见绌。至少对我来说，我可能为工作产生的文字是我公共互联网存在的100倍。
- en: Work data is huge. A caveat is that any SaaS only has access to its slice of
    work data. That may be more than enough for fine-tuning, but may not be enough
    for pretraining general purpose models.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 工作数据量巨大。需要注意的是，任何SaaS产品只能访问其工作数据的一部分。这可能对于微调来说已经足够，但对于预训练通用模型来说可能就不够了。
- en: 'Naturally, incumbents have an advantage: the more users you have, the more
    data you have at your disposal.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 自然地，既得利益者具有优势：你拥有的用户越多，你可供使用的数据就越多。
- en: 'Some companies are especially well positioned to take advantage of work data:
    Microsoft, Google, and some of the other generic work software providers (mail,
    docs, sheets, messages, etc.) have access to tremendous amounts of work data.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 一些公司特别适合利用工作数据：微软、谷歌以及一些其他通用工作软件提供商（邮件、文档、表格、消息等）能够访问大量的工作数据。
- en: Work data manifests unique insights
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作数据揭示了独特的见解
- en: Since businesses are like trees in a forest, each one is trying to find a sunny
    niche in the dense forest canopy, a place that they can uniquely fill, the data
    they produce is unique. Businesses call this “differentiation.” From a data standpoint,
    it means the businesses’ data contains insights that only ever accrued to that
    particular business.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 由于企业就像森林中的树木，每棵都在努力在茂密的树冠中找到一个阳光充足的空隙，一个它们可以独特填补的地方，因此他们产生的数据是独特的。企业称之为“差异化”。从数据的角度来看，这意味着企业的数据包含只有该特定企业才能获得的见解。
- en: 'This is one of the reasons why businesses are so protective of their data:
    it reflects their trade secrets and the insights that set them apart from their
    competition. If they gave it up, their competition could quickly fill in their
    place.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么企业如此保护他们的数据的原因之一：它反映了他们的商业机密以及使他们与竞争对手区别开来的见解。如果他们放弃这些数据，他们的竞争对手可能会迅速填补他们的空缺。
- en: Work data has hidden gems
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作数据中隐藏着宝藏
- en: From time to time human workers have an epiphany, and recognize a pattern that
    has been in front of them all along.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 不时地，人类工作者会有顿悟，并认识到一直摆在面前但未曾注意到的模式。
- en: If AI had access to the same data, it could recognize patterns that no human
    has ever recognized so far.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果AI能够访问相同的数据，它就能识别出迄今为止没有人识别出的模式。
- en: This, again, is an important difference to public internet content. On the internet,
    there are only insights, that humans have recognized and took the effort to put
    out there. Work data contains insights that no one has discovered so far.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这，再次强调，是公共互联网内容的一个重要区别。在互联网上，只有人类已经识别并付出努力将其发布出去的见解。工作数据包含的是迄今为止尚未被发现的见解。
- en: Work data is clean(er) and structured
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作数据（相对而言）更干净、更有结构
- en: How much structure it has, depends on the field, but it definitely has more
    structure than internet content.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 它具有多少结构，取决于领域，但它肯定比互联网内容更有结构。
- en: At the bare minimum, work products are organized in neat folders and appropriately
    named files. After all, work is a collaborative effort, so workers make an effort
    to grease this collaboration for their peers.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 至少在表面上，工作产品被组织得井井有条，文件命名也恰当。毕竟，工作是协作努力的结果，因此工作者会努力为他们的同事润滑这种协作。
- en: 'Some work data is even better structured and cleaned: it is generated through
    rigorous processes, it goes through many rounds of approvals until it is put into
    a standard format. Think of database architectures, that go from rough sketches
    to Terraform configuration files.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 一些工作数据甚至结构化和清理得更好：它是通过严格的流程生成的，经过多轮审批，直到被放入标准格式。想想数据库架构，从粗糙的草图到Terraform配置文件。
- en: 'And if that isn’t enough, your company sets the rules. If you want, you can
    nudge or even force your users follow certain conventions. You have all the tools
    to do so: you can constrain their inputs, you can guide their workflow, and you
    can incentivize them to give you extra data points only to make your data cleaning
    easier.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这还不够，你的公司会制定规则。如果你想的话，你可以引导甚至强迫用户遵循某些惯例。你拥有所有实现这一目标的工具：你可以限制他们的输入，你可以引导他们的工作流程，你还可以激励他们提供额外的数据点，以便使你的数据清理更加容易。
- en: Work data is—in many cases—explicitly labeled
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在许多情况下，工作数据是明确标记的
- en: In many cases, work data comes in input-output pairs. Challenge-solution.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多情况下，工作数据以输入-输出对的形式出现。挑战-解决方案。
- en: E.g.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 例如。
- en: 'Translation: Original text -> translated text'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 翻译：原文 -> 翻译文本
- en: 'Customer support: customer query -> resolution by the support agent.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户支持：客户查询 -> 支持人员的解决方案。
- en: 'Sales: data on a prospective customer -> winning sales pitch and final deal
    details.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 销售：潜在客户的数据 -> 赢得销售提案和最终交易细节。
- en: 'Software engineering: backlog item + existing code -> new code in the repository.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软件工程：待办事项 + 现有代码 -> 仓库中的新代码。
- en: 'Interface design: jobs-to-be-done + persona + design system -> new design.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 界面设计：待完成的工作 + 个性 + 设计系统 -> 新设计。
- en: If work is created with LLM assistance, there is even the prompt, the LLM’s
    answer, and the human-corrected final version. Could an LLM wish for a better
    personal trainer then hundreds of thousands of human professionals who are experts
    of the given field?
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果工作是在LLM（大型语言模型）的帮助下创建的，那么甚至包括提示、LLM的回答以及人类修正后的最终版本。LLM难道不希望有一个比成千上万的给定领域专家更好的个人训练师吗？
- en: Work data is grounded data
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作数据是基础数据
- en: Work outputs are often labeled by business metrics and KPIs. There is a way
    to tell which customer support resolutions tend to produce the highest customer
    lifetime value. There is a way to tell which sales offers produce the highest
    conversions or the shortest lead times. There is a way to tell if a piece of code
    led to incidents or performance issues.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 工作输出通常由业务指标和KPI（关键绩效指标）来标记。有一种方法可以判断哪些客户支持解决方案倾向于产生最高的客户终身价值。有一种方法可以判断哪些销售提案产生最高的转化率或最短的交货时间。有一种方法可以判断一段代码是否导致了事件或性能问题。
- en: KPIs and metrics are the business’s sensors to the outside world which provides
    them a feedback loop, evaluating the performance of its work outputs. This is
    better than human ratings. E.g. it’s not “soft data” like a human trying to guess
    how other people will like a marketing message. This is “hard data” that directly
    reflects how much that marketing copy is converting people.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: KPI和指标是业务对外界的传感器，它们为业务提供了一个反馈循环，评估其工作输出的性能。这比人类评分更好。例如，它不是像人类试图猜测其他人会喜欢一则营销信息这样的“软数据”。这是“硬数据”，它直接反映了营销文案转化人的程度。
- en: Work data is more valuable for AI than workers think.
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对于AI来说，工作数据比工人想象的更有价值。
- en: 'Despite all the above benefits, in my experience, knowledge workers grossly
    underestimate the value of their work. These misconceptions include:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有上述所有好处，但根据我的经验，知识工作者大大低估了他们工作的价值。这些误解包括：
- en: '**If it’s not original, it’s not valuable**: they don’t know that machine learning
    prefers repetition with slight variations because that’s how it extracts underlying
    patterns, the unchanged features beneath the surface noise.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如果不是原创，那就没有价值**：他们不知道机器学习更喜欢带有微小变化的重复，因为这是它提取潜在模式、表面噪声下的不变特征的方式。'
- en: '**If it’s easy work, it’s not valuable**: people have a hard time grasping
    that if a skill comes easy to them, doesn’t mean it comes easy to AI. These skills
    feel natural to us only because they became our second nature through our millions
    of years of evolutionary history, or our decades-long upbringing and education.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如果工作简单，那就没有价值**：人们很难理解，如果一项技能对他们来说很容易，并不意味着对AI来说也很容易。这些技能对我们来说感觉自然，只是因为它们通过我们数百万年的进化历史，或者数十年的养育和教育，成为了我们的第二天性。'
- en: '**If it’s not peak performance, it’s not valuable**: employees only get praise
    and bonuses if they go above and beyond. That leads them to think that it’s only
    their peak performance that matters. They seem to forget that mundane acts, such
    as simply responding to a colleague’s message are just as much an essential part
    of running the business and making a profit – a very valuable skill for AI to
    learn.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如果不是最佳表现，那就没有价值**：只有当员工超越自己的极限时，他们才会得到表扬和奖金。这让他们认为，只有他们的最佳表现才是重要的。他们似乎忘记了，像简单地回复同事信息这样的日常行为，同样是运营业务和创造利润的重要组成部分——这是AI需要学习的一项非常宝贵的技能。'
- en: Ethical considerations
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 伦理考量
- en: '![](../Images/dfb0724caf4ea33c61af2e0cc3a5cdfc.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dfb0724caf4ea33c61af2e0cc3a5cdfc.png)'
- en: Unfortunately, using work data for AI training comes with strings attached.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，使用工作数据为AI训练带来了附加条件。
- en: '**That data is the paid work of someone**: Using those works to make a profit
    for a 3rd party probably qualifies as unpaid work or labor exploitation.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**那些数据是某人的付费工作**：使用这些作品为第三方谋取利润可能被视为无偿工作或劳动剥削。'
- en: '**Not fair use**: one of the defining factors of “fair use” is that the resulting
    work shouldn’t compete with the original work in the market. I am not a legal
    expert, but a Service as a Software offering the same service on the same market
    in which their data contributors operate is a clear case for a competing offer.
    Not fair use.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不公平使用**：公平使用的定义因素之一是，由此产生的作品不应在市场上与原始作品竞争。我不是法律专家，但一个在数据贡献者所在市场上提供相同服务的软件即服务（SaaS）提供者是明显构成竞争性报价的案例。这不属于公平使用。'
- en: '**Producing this data costs real money to its owners**. A company payrolled
    everyone to have this data produced. Knowledge workers put in years of study,
    student loans, and lots of effort. Even if we put aside the fear of AI making
    workers redundant, and focus solely on capitalist self-interest: it’s unlikely
    that workers would want to give up this valuable asset of theirs for free, only
    for the benefit of some private shareholders in SV.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生产这些数据对它的所有者来说需要真实的金钱**。一家公司雇佣了所有人来生产这些数据。知识工作者投入了多年的学习、学生贷款和大量努力。即使我们抛开AI使工人失业的恐惧，仅仅关注资本家的自我利益：工人不太可能愿意免费放弃他们宝贵的资产，只为SV的一些私人股东的利益。'
- en: '**This data reveals trade secrets and proprietary insights of a business**.
    What business would like to train an AI on its processes only to hand it over
    to its competitors? What business would like to level the playing field for its
    challengers?!'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这些数据揭示了企业的商业机密和专有见解**。哪个企业愿意训练人工智能来处理其流程，然后将其交给竞争对手？哪个企业愿意为挑战者创造公平的竞争环境？!'
- en: '**This data is someone’s intellectual property**. Usually, it is the company’s
    intellectual property. And companies have armies of lawyers to protect their interests.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这些数据是某人的知识产权**。通常情况下，这是公司的知识产权。公司有律师团队来保护他们的利益。'
- en: 'Next up: your opportunity here and now'
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来：你现在的机会
- en: If you are a software engineer or a data professional, you have a very unique
    opportunity to change to course of AI & humanity for the better.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一名软件工程师或数据专业人士，你有一个非常独特的机会，可以改变AI与人类更好的未来。
- en: '**As a representative of your company**, as someone who understands the role
    of data in the company’s AI efforts, and as someone who is striving to build the
    best and greatest, you can push for the acquisition of the right kind of data:
    work data.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**作为你公司的代表**，作为理解公司在AI努力中数据作用的人，以及作为努力打造最好和最伟大的人，你可以推动获取正确类型的数据：工作数据。'
- en: On the other hand, as you are working to automate your users’ tasks, there are
    people out there who are working to automate your tasks **as a knowledge worker**.
    They desire to take your effort and hard-earned skills for granted, so they can
    further grow the wealth of their investors.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，当你致力于自动化用户的任务时，有些人正在努力自动化你的任务**作为知识工作者**。他们希望理所当然地接受你的努力和辛苦赚来的技能，以便进一步增加投资者的财富。
- en: '**All in all, you are sitting on both sides of the negotiation table**. But
    that is not all: given your knowledge and insights, you just might be the person
    who holds the keys to a win-win resolution in this conflict of interest.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**总的来说，你坐在谈判桌的两侧**。但不仅如此：鉴于你的知识和洞察力，你可能是这个利益冲突中实现双赢解决方案的关键人物。'
- en: Is there a business model in which both AI models get the data they need and
    knowledge workers get their fair share for their valuable contribution not just
    squeezed and then dumped?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 是否存在一种商业模式，其中AI模型都能获得所需的数据，而知识工作者也能因其宝贵的贡献而获得公平的份额，而不仅仅是被挤压然后被抛弃？
- en: '![](../Images/aac97a65858565546199ba2f1c3ab278.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/aac97a65858565546199ba2f1c3ab278.png)'
- en: Pondering about a win-win scenario
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 沉思双赢场景
- en: Currently, we see a lot of fighting between AI companies and data owners. AI
    companies claim they can’t operate and innovate without training data. Data owners
    argue AI ruins their businesses and takes their jobs. There are legal issues around
    the rights of using data for AI training and there are communities rallying people
    to opt out of AI training entirely. It’s a real battleground and that is not good
    for anyone. We should know better!
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，我们看到AI公司和数据所有者之间有很多争斗。AI公司声称没有训练数据就无法运营和创新。数据所有者认为AI破坏了他们的业务并夺走了他们的工作。围绕使用数据为AI训练的权利存在法律问题，还有社区在动员人们完全退出AI训练。这是一个真正的战场，这对任何人都没有好处。我们应该知道得更多！
- en: What would the ideal scenario look like? From the perspective of an AI company,
    we should imagine a world in which data owners are happy to contribute their data
    to AI models, moreover, they go above and beyond to satisfy the data needs of
    AI training by providing extra data points, maybe labeling and cleaning their
    data, and making sure it’s really good quality.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 理想的情况会是什么样的呢？从AI公司的角度来看，我们应该想象一个数据所有者愿意将他们的数据贡献给AI模型的世界，而且他们还会超越这个范围，通过提供额外的数据点、可能的数据标注和清洗，以及确保数据质量真正良好，来满足AI训练的数据需求。
- en: What would enable this scenario? It seems obvious. **If the success of the AI
    company was the success of the data owners, they would be happy to contribute**.
    In other words, the data owner must have a stake in the AI model, they must own
    a part of the model and participate in the profits the AI model makes.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 什么能够促成这种场景呢？这似乎很明显。**如果AI公司的成功就是数据所有者的成功，他们就会乐意做出贡献**。换句话说，数据所有者必须在AI模型中拥有一定的股份，他们必须拥有模型的一部分，并参与AI模型带来的利润。
- en: To incentivize quality contributions, the data owners’ stake should be proportional
    to the value of their contributions.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 为了激励高质量的贡献，数据所有者的股份应与其贡献的价值成比例。
- en: 'Essentially, we would be treating data as capital, and treating data contribution
    as capital investment. That’s what training data is after all: it is physical
    capital, a human-made asset that is used in the production of goods and services.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 实质上，我们将把数据视为资本，并将数据贡献视为资本投资。毕竟，训练数据就是：它是物理资本，是一种人造资产，用于商品和服务的生产。
- en: 'Interestingly, this model of treating data contribution as capital investment
    also addresses the biggest fear of knowledge workers: losing their livelihood
    to AI. White-collar workers live off of the returns of their human capital. If
    a model extracts their human capital (knowledge and skills) from their works,
    their human capital loses its market value as AI will perform those skills and
    tasks faster and cheaper. If, however, knowledge workers get equity in exchange
    for their data contribution, they effectively exchange their human capital for
    equity capital, which keeps producing returns for them and thus a livelihood.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，这种将数据贡献视为资本投资的模式也解决了知识工作者最大的担忧：失去他们的生计给AI。白领工人依靠他们的人力资本（知识和技能）的回报为生。如果模型从他们的作品中提取了他们的人力资本（知识和技能），那么他们的人力资本就会失去其市场价值，因为AI将更快、更便宜地执行这些技能和任务。然而，如果知识工作者通过他们的数据贡献获得股权，他们实际上是将他们的人力资本交换成了股权资本，这会持续为他们产生回报，从而保证他们的生计。
- en: This is an opportunity for a positive reinforcement loop. As a knowledge worker,
    your work contributes to better AI models, which increases AI company revenues,
    which increases your rewards, so you are even more incentivized to contribute.
    Simultaneously, improving the AI model inside your work software directly improves
    the quantity and quality of your work outputs, further improving your contribution
    and thus the AI model. It’s a double reinforcement loop with the potential to
    become a runaway process leading to winner-take-all dynamics.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个积极的正反馈循环的机会。作为一名知识工作者，你的工作有助于提高AI模型的质量，这增加了AI公司的收入，进而增加了你的回报，因此你更有动力做出贡献。同时，改进你工作软件中的AI模型直接提高了你工作输出的数量和质量，进一步提高了你的贡献，从而也提高了AI模型。这是一个双重正反馈循环，有可能演变成一个失控的过程，导致赢家通吃的动态。
- en: Treating data as capital not only unlocks more and better training data but
    it also enables rapid and cheap experimentation. Say, you want to try a new innovative
    product with an AI model at its core. If you take training data as an investment,
    you don’t need to pay for that data upfront. You only pay dividends once your
    product starts making a profit and only pay proportionally to that profit. If
    your idea fails, no problem, no one got hurt or lost money. Innovation is cheap
    and risk-free.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据视为资本不仅能够解锁更多更好的训练数据，还能实现快速且低成本地实验。比如说，你想要尝试一个以AI模型为核心的新创新产品。如果你将训练数据视为一种投资，你就不需要提前支付这些数据费用。只有当你的产品开始盈利时，你才需要支付分红，并且支付的比例与盈利成正比。如果你的想法失败了，没问题，没有人受伤或损失金钱。创新成本低且无风险。
- en: Trade secrets vs AI training
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 保密信息与AI训练
- en: 'Now let’s turn to the conflict of interest between AI companies and Employers:
    companies whose knowledge workers produce the training data.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们转向AI公司与雇主之间的利益冲突：那些由知识工作者生产训练数据的公司。
- en: Employers don’t seem to have a problem with turning over their employees’ work
    to AI companies if they can get an AI service in exchange that does the same job
    as humans but better and cheaper.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果雇主能够以换取AI服务的方式，获得与人类相同但更好、更便宜的工作，他们似乎并不介意将员工的工作交给AI公司。
- en: The real conflict of interest originates from the fact that the AI model would
    distribute the Employer’s trade secrets and know-how to its competitors. If the
    AI company enables any other company, from fresh upstarts to large competitors,
    to perform the same strategies and processes, at the same quality, speed, and
    scale as the incumbent, that means it eliminates much of the competitive advantages
    of the incumbent.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的利益冲突源于AI模型会将雇主的商业机密和专有技术分发给其竞争对手。如果AI公司允许任何其他公司，从小型初创公司到大型竞争对手，以与现有公司相同的质量、速度和规模执行相同的策略和流程，那么这意味着它消除了现有公司的许多竞争优势。
- en: In every company, there is know-how and processes that [“don’t make their beer
    taste better”](https://www.acquired.fm/episodes/the-playbook-lessons-from-200-company-stories),
    they are just common processes. I bet companies would love to contribute (with
    the consent and participation of their knowledge workers) the data about these
    processes to an AI model in exchange for an ownership stake. It’s a mutually beneficial
    exchange. As for the know-how and processes that differentiate the Employer from
    their competitors, their competitive advantages, the only option is custom model
    training or white-label AI development in which the AI company helps create and
    operate the AI model but it’s exclusively used and fully owned by the Employer
    and its knowledge workers.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在每家公司，都有一些[“不会让他们的啤酒味道更好”](https://www.acquired.fm/episodes/the-playbook-lessons-from-200-company-stories)的知识和流程，它们只是常见的流程。我敢打赌，如果公司能够以这些流程的数据（在知识工作者的同意和参与下）换取所有权股份，他们一定会愿意这样做。这是一个互惠互利的选择。至于那些区分雇主与竞争对手的知识和流程，他们的竞争优势，唯一的选择是定制模型训练或白标AI开发，其中AI公司帮助创建和运营AI模型，但该模型仅由雇主及其知识工作者使用和完全拥有。
- en: I hope this article sparked your interest in positive AI training data scenarios.
    Maybe you will contribute the next piece to this puzzle.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这篇文章激发了您对积极AI训练数据场景的兴趣。也许您会为这个谜题贡献下一部分。
- en: Thank you for reading,
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读，
- en: Zsombor
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: Zsombor
- en: 'Other articles from me:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我的其他文章：
- en: '[GenAI is wealth transfer from workers to capital owners](https://medium.com/design-bootcamp/genai-is-wealth-transfer-from-workers-to-capital-owners-ce33069444f7).
    AI models are tools to turn human capital (knowledge and skills) into traditional
    capital: an object (the model) that a corporation can own.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '[GenAI是工人向资本所有者转移财富](https://medium.com/design-bootcamp/genai-is-wealth-transfer-from-workers-to-capital-owners-ce33069444f7)。AI模型是将人力资本（知识和技能）转化为传统资本的工具：一个公司可以拥有的对象（模型）。'
- en: '[SAP is not volunteering my data to Figma AI and I am proud of SAP for that](https://medium.com/design-bootcamp/sap-is-not-volunteering-my-data-to-figma-ai-and-i-am-proud-of-sap-for-that-66b2cf128095)
    Should UX Designers contribute their designs to Figma to help them build better
    AI features? Who would this benefit? Figma investors? Designers? Designers’ employers?'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '[SAP没有自愿将我的数据提供给Figma AI，我为SAP感到自豪](https://medium.com/design-bootcamp/sap-is-not-volunteering-my-data-to-figma-ai-and-i-am-proud-of-sap-for-that-66b2cf128095)
    UX设计师应该将他们的设计贡献给Figma以帮助他们构建更好的AI功能吗？这将惠及谁？Figma的投资者？设计师？设计师的雇主？'
- en: '[The lump of labor fallacy does not save human work from genAI](https://medium.com/@zombor/the-lump-of-labor-fallacy-does-not-save-human-work-from-genai-94f7d8ce2a5a)
    The fallacy only suggests that there will always be more work. It doesn’t suggest
    that humans would do the work — a significant detail.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '[劳动量谬误不能拯救人类工作免受生成式AI的影响](https://medium.com/@zombor/the-lump-of-labor-fallacy-does-not-save-human-work-from-genai-94f7d8ce2a5a)
