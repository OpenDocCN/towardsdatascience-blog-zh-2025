- en: Statistical Method mcRigor Enhances the Rigor of Metacell Partitioning in Single-Cell
    Data Analysis
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 统计方法mcRigor增强单细胞数据分析中元细胞分区的严谨性
- en: 原文：[https://towardsdatascience.com/statistical-method-mcrigor-enhances-the-rigor-of-metacell-partitioning-in-single-cell-data-analysis/](https://towardsdatascience.com/statistical-method-mcrigor-enhances-the-rigor-of-metacell-partitioning-in-single-cell-data-analysis/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/statistical-method-mcrigor-enhances-the-rigor-of-metacell-partitioning-in-single-cell-data-analysis/](https://towardsdatascience.com/statistical-method-mcrigor-enhances-the-rigor-of-metacell-partitioning-in-single-cell-data-analysis/)
- en: The article was co-written with Pan Liu, postdoctoral researcher at UCLA and
    Fred Hutchinson Cancer Center. Pan is the first author of the mcRigor *Nature
    Communications* article.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 该文章与加州大学洛杉矶分校和弗雷德·哈钦森癌症中心的博士后研究员刘潘共同撰写。刘潘是mcRigor *Nature Communications* 文章的第一作者。
- en: Single-cell sequencing technologies have advanced rapidly in recent years, providing
    unprecedented opportunities to uncover cellular diversity, dynamic changes in
    cell states, and underlying gene regulatory mechanisms. In addition to the widely
    used single-cell RNA sequencing (scRNA-seq) [^(1,2)](https://paperpile.com/c/GwelwF/M8vl+b79u),
    new modalities such as single-cell chromatin accessibility sequencing (scATAC-seq)
    [^(3,4)](https://paperpile.com/c/GwelwF/CL2a+R1ZK) and joint profiling of transcriptome
    and chromatin accessibility (scMultiome) [⁵](https://paperpile.com/c/GwelwF/8zpa)
    have enabled the dissection of cellular heterogeneity at single-cell resolution
    across multiple omics layers. However, the data generated by these technologies
    are typically highly sparse, primarily due to limited sequencing depth per cell,
    as well as imperfect reverse transcription and nonlinear amplification, which
    cause highly expressed genes to dominate sequencing capacity and make lowly expressed
    genes difficult to detect [⁶](https://paperpile.com/c/GwelwF/G6U9).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，单细胞测序技术快速发展，为揭示细胞多样性、细胞状态的动态变化以及潜在的基因调控机制提供了前所未有的机会。除了广泛使用的单细胞RNA测序（scRNA-seq）[^(1,2)](https://paperpile.com/c/GwelwF/M8vl+b79u)，新的方法如单细胞染色质可及性测序（scATAC-seq）[^(3,4)](https://paperpile.com/c/GwelwF/CL2a+R1ZK)和转录组与染色质可及性联合分析（scMultiome）[⁵](https://paperpile.com/c/GwelwF/8zpa)使得在多个组学层面上以单细胞分辨率解析细胞异质性成为可能。然而，这些技术生成的数据通常非常稀疏，这主要是由于每个细胞的测序深度有限，以及不完美的逆转录和非线性扩增，导致高表达基因占据测序能力，使得低表达基因难以检测[⁶](https://paperpile.com/c/GwelwF/G6U9)。
- en: '![](../Images/b1e0efe932e31edee7a356ba76125b34.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b1e0efe932e31edee7a356ba76125b34.png)'
- en: Fig. 1\. **mcRigor publication.**
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 图1\. **mcRigor出版物**。
- en: To alleviate data sparsity and noise, researchers proposed the **“metacell”**
    concept, in which cells with similar expression profiles are aggregated into a
    single representative unit—a metacell—whose expression is defined by the mean
    expression of its constituent cells, thereby enhancing signal and reducing noise.
    Yet, existing metacell construction methods often yield substantially different
    metacell partitions and are highly sensitive to hyperparameter settings, particularly
    the average metacell size [⁷](https://paperpile.com/c/GwelwF/5O0T). Such lack
    of consistency makes it difficult for users to determine which metacell partition
    is more trustworthy and to what extent the resulting metacell profiles preserve
    true biological signals. Consequently, the robustness of downstream analyses is
    compromised, and the potential of metacells as a general data preprocessing framework
    across diverse tasks and omics modalities remains limited.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为了缓解数据稀疏和噪声，研究人员提出了**“元细胞”**的概念，其中具有相似表达谱的细胞被聚合成一个单一的代表性单元——元细胞，其表达由其组成细胞的平均表达定义，从而增强信号并减少噪声。然而，现有的元细胞构建方法往往产生显著不同的元细胞分区，并且对超参数设置高度敏感，尤其是平均元细胞大小[⁷](https://paperpile.com/c/GwelwF/5O0T)。这种缺乏一致性使得用户难以确定哪个元细胞分区更可信，以及结果元细胞轮廓保留真实生物信号的程度。因此，下游分析的稳健性受损，元细胞作为跨不同任务和组学模态的通用数据预处理框架的潜力仍然有限。
- en: 'Our *Nature Communications* paper [⁸](https://paperpile.com/c/GwelwF/mVnE)
    provides a rigorous statistical definition of a metacell based on a two-layer
    model of single-cell sequencing data: the upper layer captures the biological
    variation in true expression, while the lower layer models the sequencing process
    that generates measured expression from the true expression. Building on this
    definition, we develop **mcRigor**, a statistical framework for detecting **dubious
    metacells** within a given partition and selecting the **optimal metacell partitioning
    method and hyperparameter** across candidate method-hyperparameter configurations.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在*Nature Communications*上发表的论文[⁸](https://paperpile.com/c/GwelwF/mVnE)提供了一个基于单细胞测序数据双层模型的元细胞的严格统计定义：上层捕捉真实表达中的生物变异，而下层则模拟从真实表达生成测量表达的过程。在此基础上，我们开发了**mcRigor**，这是一个用于检测给定分区内的可疑元细胞并选择候选方法-超参数配置中的**最佳元细胞分区方法和超参数**的统计框架。
- en: mcRigor not only detects and removes dubious metacells (its extended version,
    **mcRigor two-step**, further disassembles dubious metacells into single cells
    and re-assembles them into smaller, more reliable ones), thereby improving the
    reliability of downstream analyses such as gene co-expression and enhancer–gene
    regulation, but also enables data-driven selection of the most suitable metacell
    partitioning strategy for each dataset. Owing to its flexible compatibility, mcRigor
    can be readily applied to single-cell transcriptomic, chromatin accessibility,
    and multi-omic data (Fig. 2). In addition, mcRigor provides a unified evaluation
    criterion for benchmarking different metacell construction methods, offering reliable
    guidance for researchers in method selection.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: mcRigor不仅能够检测并移除可疑的元细胞（其扩展版本**mcRigor两步法**进一步将可疑的元细胞分解成单个细胞，并将它们重新组装成更小、更可靠的细胞），从而提高下游分析（如基因共表达和增强子-基因调控）的可靠性，而且还能够为每个数据集选择最合适的元细胞分区策略。由于其灵活的兼容性，mcRigor可以轻松应用于单细胞转录组、染色质可及性和多组学数据（图2）。此外，mcRigor提供了一个统一的评估标准，用于比较不同的元细胞构建方法，为研究人员在方法选择上提供可靠的指导。
- en: In the first part of our paper [⁸](https://paperpile.com/c/GwelwF/mVnE), we
    introduce mcRigor’s methodology for detecting dubious metacells. Specifically,
    mcRigor quantifies the internal heterogeneity of each metacell using a feature-correlation-based
    statistic, **mcDiv**, which measures the deviation of feature–feature correlations
    from independence. The rationale is that if all member cells share the same true
    expression levels and the observed variation among them arises purely from the
    measurement process, the features should be approximately independent. mcRigor
    then constructs a **null distribution** for mcDiv using a novel **double permutation**
    procedure and identifies metacells that significantly deviate from this null as
    dubious (Fig. 2a).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们论文[⁸](https://paperpile.com/c/GwelwF/mVnE)的第一部分，我们介绍了mcRigor检测可疑元细胞的方法。具体来说，mcRigor使用基于特征相关性的统计量**mcDiv**来量化每个元细胞内部的异质性，**mcDiv**衡量特征-特征相关性与独立性之间的偏差。其原理是，如果所有成员细胞具有相同的真实表达水平，并且它们之间的观察到的变异纯粹来自测量过程，那么特征应该是近似独立的。然后，mcRigor使用一种新颖的**双重置换**程序为mcDiv构建一个**零分布**，并识别出显著偏离此零分布的元细胞作为可疑的（图2a）。
- en: In both semi-simulated and real PBMC datasets, mcRigor accurately distinguishes
    trustworthy metacells from dubious ones (Fig. 2b–c). We further demonstrate mcRigor’s
    effectiveness in improving the reliability of multiple downstream analyses. In
    cell-line data analyses, removing dubious metacells markedly increases the signal-to-noise
    ratio of cell-cycle marker genes (Fig. 2d). In COVID-19 versus healthy control
    data analyses, mcRigor eliminates spurious gene correlations caused by dubious
    metacells and reveals stronger co-expression within adaptive immune response modules
    (Fig. 2e). In scMultiome data analyses, mcRigor enhances the detectability of
    enhancer–gene associations, filtering out weakly supported false positives while
    preserving signals consistent with those observed at the single-cell level (Fig.
    2f).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在半模拟和真实PBMC数据集中，mcRigor能够准确地区分可信的元细胞与可疑的元细胞（图2b–c）。我们进一步展示了mcRigor在提高多个下游分析可靠性方面的有效性。在细胞系数据分析中，移除可疑的元细胞显著提高了细胞周期标记基因的信噪比（图2d）。在COVID-19与健康对照组数据分析中，mcRigor消除了由可疑元细胞引起的虚假基因相关性，并揭示了适应性免疫反应模块中更强的共表达（图2e）。在scMultiome数据分析中，mcRigor增强了增强子-基因关联的可检测性，过滤掉了弱支持的假阳性，同时保留了与单细胞水平观察一致的信号（图2f）。
- en: '![](../Images/45830a17c9aad43eb5ec223025ff4ca3.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/45830a17c9aad43eb5ec223025ff4ca3.png)'
- en: Fig. 2\. **mcRigor detects dubious metacells and rectifies downstream analysis
    for both scRNA-seq and multiome (RNA+ATAC) data. a,** Schematic of the mcRigor
    method for dubious metacell detection. **b,** mcRigor effectively assesses metacell
    heterogeneity and detects dubious metacells within the MetaCell method’s partitioning
    on semi-synthetic data. **c,** Dubious metacells identified by mcRigor exhibit
    internal heterogeneity and may occasionally appear as outliers, while trustworthy
    metacells remain internally homogeneous. **d,** mcRigor enhances cell-cycle marker
    gene expression within cell lines. **e,** mcRigor reveals enriched co-expression
    of an adaptive immune response gene module (highlighted in yellow) in COVID-19
    samples (bottom row) compared to healthy controls (top row), **f,** Applying mcRigor
    to the original metacell partition from the SEACells paper empowers gene regulatory
    inference (left) and produces reliable discoveries (right).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. **mcRigor检测可疑元细胞并纠正scRNA-seq和multiome（RNA+ATAC）数据的下游分析。a，** mcRigor检测可疑元细胞的方法示意图。**b，**
    mcRigor在半合成数据上对MetaCell方法分区中的元细胞异质性进行有效评估，并检测到可疑元细胞。**c，** mcRigor识别的可疑元细胞表现出内部异质性，有时可能表现为异常值，而可信的元细胞保持内部同质性。**d，**
    mcRigor增强了细胞系中的细胞周期标记基因表达。**e，** 与健康对照组（顶部行）相比，mcRigor在COVID-19样本（底部行）中揭示了适应性免疫反应基因模块（黄色突出显示）的富集共表达，**f，**
    将mcRigor应用于SEACells论文中的原始元细胞分区，增强了基因调控推断（左侧）并产生了可靠的发现（右侧）。
- en: '![](../Images/9502e67fdfac53a915f8eaafcb4e6bf5.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9502e67fdfac53a915f8eaafcb4e6bf5.png)'
- en: Fig. 3. **mcRigor optimizes metacell method and hyperparameter selection for
    various single-cell data analyses. a,** Schematic of the mcRigor method for optimizing
    metacell partitioning, using *Score* as the optimization criterion to balance
    *DubRate* and *ZeroRate*, illustrated with the optimization of MetaCell partitions
    on semi-synthetic data as an example. **b,** Line plots showing the zero proportions
    in metacell partitions generated by three methods MetaCell, SEACells, and SuperCell
    across varying granularity levels (y). The optimized metacell partitions (triangles)
    closely align with the zero proportion observed in smRNA FISH data (red line).
    **c,** mcRigor optimizes metacell method and hyperparameter selection for differential
    gene expression analysis. In **(b)** and **(c)**, the colored triangles indicate
    the optimal y values selected by mcRigor for the three methods. **d,** mcRigor’s
    optimized metacell partition better reveals temporal immune cell trajectories
    compared to the original metacell partition from the Zman-seq study [⁹](https://paperpile.com/c/GwelwF/cIny).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图3. **mcRigor优化了元细胞方法和超参数选择，以适应各种单细胞数据分析。a，** mcRigor优化元细胞分区的方法示意图，使用*Score*作为优化标准以平衡*DubRate*和*ZeroRate*，以半合成数据的元细胞分区优化为例进行说明。**b，**
    线图显示了三种方法（MetaCell、SEACells和SuperCell）在不同粒度水平（y）下生成的元细胞分区中的零比例。优化的元细胞分区（三角形）与smRNA
    FISH数据中观察到的零比例（红色线）紧密一致。**c，** mcRigor优化元细胞方法和超参数选择，用于差异基因表达分析。在**（b）**和**（c）**中，彩色三角形表示mcRigor为三种方法选择的最佳y值。**d，**
    mcRigor优化的元细胞分区比Zman-seq研究的原始元细胞分区更好地揭示了时间免疫细胞轨迹 [⁹](https://paperpile.com/c/GwelwF/cIny)。
- en: In the second part of our paper [⁸](https://paperpile.com/c/GwelwF/mVnE), we
    present mcRigor’s methodology for evaluating metacell partitions and optimizing
    hyperparameters. By balancing metacell trustworthiness against data sparsity,
    mcRigor assigns an overall evaluation score to each candidate partition and automatically
    selects the optimal method–parameter configuration among all candidates, thereby
    transforming the empirical process of method and parameter tuning into data-driven
    automated decision-making (Fig. 3a).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们论文的第二部分[⁸](https://paperpile.com/c/GwelwF/mVnE)中，我们介绍了mcRigor评估元细胞分区和优化超参数的方法。通过平衡元细胞的可信度与数据稀疏性，mcRigor为每个候选分区分配一个总体评估分数，并在所有候选者中自动选择最优的方法-参数配置，从而将方法和参数调整的经验过程转化为数据驱动的自动化决策（图3a）。
- en: We illustrate the utility of this optimization functionality across diverse
    downstream tasks. For instance, the zero proportion of mcRigor-optimized metacells
    closely matches the gold-standard zero proportion measured by smRNA-FISH, demonstrating
    its ability to distinguish technical zeros from biological zeros (Fig. 3b). In
    differential expression analysis, results based on mcRigor-optimized metacells
    align more closely with those obtained from bulk RNA-seq data, indicating improved
    reliability (Fig. 3c). In time-course data, mcRigor-optimized metacells enhance
    trajectory resolution and reveal clearer gene-expression dynamics consistent with
    experimental evidence (Fig. 3d).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们展示了这种优化功能在多种下游任务中的实用性。例如，mcRigor优化后的元细胞的零比例与通过smRNA-FISH测量的金标准零比例非常接近，这证明了其区分技术零和生物零的能力（图3b）。在差异表达分析中，基于mcRigor优化后的元细胞的结果与来自bulk
    RNA-seq数据的结果更加吻合，表明提高了可靠性（图3c）。在时间序列数据中，mcRigor优化后的元细胞增强了轨迹分辨率，并揭示了与实验证据一致的更清晰的基因表达动态（图3d）。
- en: The mcRigor R package and online tutorials are available at [https://jsb-ucla.github.io/mcRigor/](https://jsb-ucla.github.io/mcRigor/)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: mcRigor R包和在线教程可在[https://jsb-ucla.github.io/mcRigor/](https://jsb-ucla.github.io/mcRigor/)获取
