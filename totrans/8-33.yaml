- en: 'Mastering Transparent Images: Adding a Background Layer'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/mastering-transparent-images-adding-a-background-layer-610b6227dab0/](https://towardsdatascience.com/mastering-transparent-images-adding-a-background-layer-610b6227dab0/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Adding a Colored Background to an Image with an Alpha Channel](../Images/ee1686ad01062930b5c05a3d65ce9f0e.png)'
  prefs: []
  type: TYPE_IMG
- en: Adding a Colored Background to an Image with an Alpha Channel
  prefs: []
  type: TYPE_NORMAL
- en: Recently, I needed to add a white background to a couple of images with a transparent
    background. Naturally, I used **Python** with **OpenCV** to automate the process,
    I wasn’t going to open an image editor for each of these images.
  prefs: []
  type: TYPE_NORMAL
- en: Adding a background color sounds easy enough, right?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Well, on my first attempt at implementing this, I didn’t quite succeed and had
    to iterate on the solution, so I thought I would share the process with you.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to follow along, make sure to install the **opencv-python** and
    **numpy** package in your local Python environment. You can use the following
    transparent image of an equation for experimentation, you can download it from
    [here](https://raw.githubusercontent.com/trflorian/image-processing/refs/heads/main/images/equation.png) .
  prefs: []
  type: TYPE_NORMAL
- en: '![PNG Image with Alpha Channel](../Images/1b0ac8a998744a6ff5383a4cf837c63a.png)'
  prefs: []
  type: TYPE_IMG
- en: PNG Image with Alpha Channel
  prefs: []
  type: TYPE_NORMAL
- en: Load Image with Alpha Channel
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In a first step, we need to load the transparent image including the alpha channel.
    If we load the image normally with ***cv2.imread*** without the required parameter,
    it will just ignore the alpha channel and the image will be completely black in
    this case.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![Reading the PNG image without the Alpha Channel](../Images/1f41a4dfa4add0dadbdc6e131590d222.png)'
  prefs: []
  type: TYPE_IMG
- en: Reading the PNG image without the Alpha Channel
  prefs: []
  type: TYPE_NORMAL
- en: If you look at the ***shape*** of the image, you will notice that there are
    only 3 color channels for the blue, green and red values, but no alpha channel.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: There’s a ***flag*** parameter in the ***imread*** function, which defaults
    to _**cv2.IMREAD_COLOR***. This will always convert the image to a 3 channel BGR
    image. To keep the alpha channel, we need to specify the flag* **cv2.IMREAD_UNCHANGED**_.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: As you can see now, the alpha channel is also included and the color channel
    order is **BGRA**, so for each pixel we get 4 values where the last one is the
    alpha value.
  prefs: []
  type: TYPE_NORMAL
- en: If you try to show the image with ***imshow***, you will see that it is still
    black. The function simply ignores the alpha channel, but *we know it is there*.
    ****** Now we can start working on replacing the alpha channel with a colored
    background.
  prefs: []
  type: TYPE_NORMAL
- en: Binary Background
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In a first attempt, we could try to replace the transparent pixels of the image
    with the background color, e.g. white. We can for example set all the pixels with
    more than 50% transparency to white. Since the image array is represented with
    8-bit unsigned integers, the value of the alpha channel reaches from 0 to 255\.
    Hence we can replace all pixels that have an alpha value of less than or equal
    128 (50% of 256) with white (all 3 color channels set to 255).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'And here you can see the result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/65980823170b2644113311cb1a1f01c8.png)'
  prefs: []
  type: TYPE_IMG
- en: You can also try it with different thresholds, in the extreme case with a threshold
    of 0, so only 100% transparent pixels are considered background and hence colored
    white.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5492a479e6560a725ec131ba46eea0b0.png)'
  prefs: []
  type: TYPE_IMG
- en: Background Blending
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As you might have already noticed, both of these images don’t look quite right.
    You can probably find a better threshold that makes the image look decent, but
    the underlying problem is that we are setting a **binary** threshold, whereas
    the opacity / alpha channel is a continuous value. The background color should
    actually be **blended** with the original color, so let’s see how we can achieve
    this.
  prefs: []
  type: TYPE_NORMAL
- en: 'To blend the original color with a background color based on the alpha value,
    we want the following behavior:'
  prefs: []
  type: TYPE_NORMAL
- en: At 100% opacity, we should apply 100% of the original color
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At 60% opacity, we want 60% of the original color and 40% of the background
    color.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At 0% opacity we want only the background color.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In other words, the color of the final image for each pixel should be as follows,
    where alpha is a value between 0 and 1:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: To achieve this, we first have to extract the alpha channel and normalize it.
    Make sure to convert the data type to ***float*** before normalization, with the
    original ***uint8*** data type we would only get 0s and 1s.
  prefs: []
  type: TYPE_NORMAL
- en: '**NOTE:** We divide by 255 instead of 256, since the maximum value of an 8-bit
    integer can be 255, and we want that to be exactly 1.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Next we should prepare the original 3 color channel image by indexing the first
    3 channels in the **BGRA** image. We also need to convert these values to ***floats***,
    otherwise we won’t be able to multiply and add them together later with the alpha
    value.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: We can also prepare the background image, consisting of our background color
    at each pixel. Using the _**full_like** *function of* **numpy***, we can repeat
    a value, in our case the background color, in a way that results in the same shape
    as the input array, our image. Again, using the* **float**_ data type.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Now we are almost ready to multiply with our formula from above. In fact, let’s
    try it and see what happens, so you can also understand why we need to do an extra
    step.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'If we run this, we get the following error:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: The problem is, that our alpha image has a shape ***(69, 244)*** of dimension
    2, there’s no color channel dimension. Whereas the images have a color channel
    dimension ***(69, 244, 3)***, the dimensionality is 3\. To fix this, we want to
    make sure both arrays have 3 dimensions, then we will be able to multiply them
    together. To do this, we can expand the dimension of our alpha array using the
    _**np.expand_dims**_ function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: '**This concept is extremely important but not quite easy to understand**. I
    encourage you to spend some time to understand and experiment with the array shapes.'
  prefs: []
  type: TYPE_NORMAL
- en: Now we’re finally able to calculate the blended image with the code from above.
    One final step we need before we can show the image, is convert it back to an
    8-bit unsigned integer array.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'Now we can visualize the blended image and see the clean result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/96145cc09a789de40f7381032c56a997.png)'
  prefs: []
  type: TYPE_IMG
- en: We can also change the background color to an orange color for example, and
    add some padding around the image with the background color.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/8128ab77051cd6cb7d7341bf9c62386c.png)'
  prefs: []
  type: TYPE_IMG
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this project, you learned how to add a background layer to an image with
    transparency. We first explored a binary method that uses a threshold to set the
    background color in the image. However, this approach did not produce visually
    satisfactory results. In a second attempt, we used an approach that blends the
    background color based on the alpha value. This resulted in clean images with
    a naturally looking background. We looked into some details regarding image dimensionalities
    and worked through a common error that can happen when working with ***numpy***
    arrays.
  prefs: []
  type: TYPE_NORMAL
- en: The full source code is available from GitHub below. I hope you learned something!
  prefs: []
  type: TYPE_NORMAL
- en: '[**image-processing/transparent_background.py at main · trflorian/image-processing**](https://github.com/trflorian/image-processing/blob/main/transparent_background.py)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '*All visualizations in this post were created by the author.*'
  prefs: []
