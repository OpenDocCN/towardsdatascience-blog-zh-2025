- en: Computer Vision’s Annotation Bottleneck Is Finally Breaking
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 计算机视觉的标注瓶颈终于被打破
- en: 原文：[https://towardsdatascience.com/computer-visions-annotation-bottleneck-is-finally-breaking/](https://towardsdatascience.com/computer-visions-annotation-bottleneck-is-finally-breaking/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/computer-visions-annotation-bottleneck-is-finally-breaking/](https://towardsdatascience.com/computer-visions-annotation-bottleneck-is-finally-breaking/)
- en: Computer vision (CV) models are only as good as their labels, and those labels
    are traditionally expensive to produce. [Industry research indicates](https://hai.stanford.edu/ai-index/2024-ai-index-report)
    that data annotation can consume 50-80% of a vision project’s budget and extend
    timelines beyond the original schedule. As companies in manufacturing, healthcare,
    and logistics race to modernize their stacks, the data annotation time and cost
    implications are becoming a big burden.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机视觉（CV）模型的优劣取决于其标签，而这些标签传统上生产成本高昂。[行业研究指出](https://hai.stanford.edu/ai-index/2024-ai-index-report)数据标注可能消耗视觉项目预算的50-80%，并使时间表超出原定计划。随着制造业、医疗保健和物流领域的公司竞相现代化其技术栈，数据标注的时间和成本影响正成为一项重大负担。
- en: Thus far, labeling has relied on manual, human effort. Auto-labeling techniques
    now entering the market are promising and can offer orders-of-magnitude savings,
    thanks to significant progress in foundation models and vision-language models
    (VLMs) that excel at open-vocabulary detection and multimodal reasoning. [Recent
    benchmarks report](https://link.voxel51.com/tds-val-blog) a ~100,000× cost and
    time reduction for large-scale datasets.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 迄今为止，标注依赖于人工、人力。现在进入市场的自动标注技术前景广阔，可以提供数量级的节省，这得益于基础模型和视觉-语言模型（VLMs）在开放词汇检测和多模态推理方面的重大进步。[最近的基准报告](https://link.voxel51.com/tds-val-blog)显示，对于大规模数据集，成本和时间减少了约100,000倍。
- en: This deep dive first maps the true cost of manual annotation, then explains
    how an AI model approach can make auto-labeling practical. Finally, it walks through
    a novel workflow (called [Verified Auto Labeling](https://link.voxel51.com/tds-val-report))
    that you can try yourself.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇深入分析首先映射了人工标注的真实成本，然后解释了如何通过AI模型方法使自动标注变得可行。最后，它介绍了一种新颖的工作流程（称为[验证自动标注](https://link.voxel51.com/tds-val-report)），您可以亲自尝试。
- en: Why Vision Still Pays a Labeling Tax
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么视觉仍然需要支付标注税
- en: Text-based AI leapt forward when LLMs learned to mine meaning from raw, unlabeled
    words. Vision models never had that luxury. A detector can’t guess what a “truck”
    looks like until someone has boxed thousands of trucks, frame-by-frame, and told
    the network, “this is a truck”.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 当大型语言模型（LLMs）学会从原始、未标记的单词中挖掘意义时，基于文本的AI取得了飞跃。视觉模型从未有过这样的奢侈。一个检测器无法猜测“卡车”是什么样子，除非有人逐帧地将数千辆卡车框出来，并告诉网络，“这是一辆卡车”。
- en: 'Even today’s vision-language hybrids inherit that constraint: the language
    side is self-supervised, but human labels bootstrap the visual channel. [Industry
    research](https://www.shaip.com/blog/the-a-to-z-of-data-annotation/) estimated
    the price of that work to be 50–60% of an average computer-vision budget, roughly
    equivalent to the cost of the entire model-training pipeline combined.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是今天的视觉-语言混合模型也继承了这一限制：语言方面是自监督的，但人类标签启动了视觉通道。[行业研究](https://www.shaip.com/blog/the-a-to-z-of-data-annotation/)估计这项工作的成本为平均计算机视觉预算的50-60%，大致相当于整个模型训练管道的成本。
- en: Well-funded operations can absorb the cost, yet it becomes a blocker for smaller
    teams that can least afford it.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 资金充足的运营可以吸收这些成本，但对于负担不起的小团队来说，这却成为了一个障碍。
- en: Three Forces That Keep Costs High
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 维持成本高的三个因素
- en: '**Labor-intensive work –** Labeling is slow, repetitive, and scales line-for-line
    with dataset size. At about $0.04 per bounding box, even a mid-sized project can
    cross six figures, especially when larger models trigger ever-bigger datasets
    and multiple revision cycles.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**劳动密集型工作** - 标注是缓慢的、重复的，并且与数据集大小成线性比例扩展。大约每个边界框0.04美元，即使是中等规模的项目也可能超过六位数，尤其是当更大的模型触发更大的数据集和多次修订周期时。'
- en: '**Specialized expertise –** Many applications, such as medical imaging, aerospace,
    and autonomous driving, need annotators who understand domain nuances. These specialists
    [can cost three to five times](https://www.basic.ai/blog-post/how-much-do-data-annotation-services-cost-complete-guide-2025?utm_source=chatgpt.com)
    more than generalist labelers.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**专业知识** - 许多应用，如医学成像、航空航天和自动驾驶，需要标注员理解领域细微差别。这些专家[可能比普通标注员贵三到五倍](https://www.basic.ai/blog-post/how-much-do-data-annotation-services-cost-complete-guide-2025?utm_source=chatgpt.com)。'
- en: '**Quality-assurance overhead –** Ensuring consistent labels often requires
    second passes, audit sets, and adjudication when reviewers disagree. Extra QA
    improves accuracy but stretches timelines, and a narrow reviewer pool can also
    introduce hidden bias that propagates into downstream models.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**质量保证开销** – 确保一致的标签通常需要第二次检查、审计集和当审阅者意见不一致时的裁决。额外的QA可以提高准确性，但会延长时间表，而且狭窄的审阅者群体也可能引入隐藏的偏见，这些偏见会传播到下游模型中。'
- en: Together, these pressures drive up costs that capped computer-vision adoption
    for years. Several firms are building solutions to address this growing bottleneck.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这些压力共同推动了成本的上升，这些成本限制了计算机视觉的采用多年。几家公司在构建解决方案以解决这个日益增长的限制。
- en: 'General Auto-Labeling Methods: Strengths and Shortcomings'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一般自动标记方法：优点和缺点
- en: Supervised, semi-supervised, and few-shot learning approaches, including active
    learning and prompt-based training, have promised to reduce manual labeling for
    years. Effectiveness varies widely with task complexity and the architecture of
    the underlying model; the techniques below are simply among the most common.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 监督学习、半监督学习和少样本学习方法，包括主动学习和基于提示的训练，已经承诺多年减少人工标记。效果因任务复杂性和底层模型架构而异；以下技术只是最常见的。
- en: '**Transfer learning and fine-tuning** – Start with a pre-trained detector,
    such as YOLO or Faster R-CNN, and tweak it for a new domain. Once the task shifts
    to niche classes or pixel-tight masks, teams must gather new data and absorb a
    substantial fine-tuning cost.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**迁移学习和微调** – 从一个预训练的检测器开始，例如YOLO或Faster R-CNN，然后针对新领域进行调整。一旦任务转移到利基类别或像素紧密的掩码，团队必须收集新数据并承担大量的微调成本。'
- en: '**Zero-shot vision–language models** – CLIP and its cousins [map text and images
    into the same embedding space](https://arxiv.org/html/2502.19828v1) so that you
    can tag new categories without extra labels. This works well for classification.
    However, balancing precision and recall can be more difficult in object detection
    and segmentation, making human-involved QA and verification all the more critical.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**零样本视觉-语言模型** – CLIP及其同类模型[将文本和图像映射到相同的嵌入空间](https://arxiv.org/html/2502.19828v1)，这样你就可以在不添加额外标签的情况下标记新类别。这对于分类来说效果很好。然而，在目标检测和分割中平衡精确度和召回率可能更困难，这使得涉及人类参与的QA和验证变得尤为重要。'
- en: '**Active learning** – Let the model label what it’s sure about, then bubble
    up the murky cases for human review. Over successive rounds, the machine improves,
    and the manual review pile shrinks. In practice, [it can reduce hand-labeling
    by 30–70%](https://www.bain.com/insights/youre-out-of-time-to-wait-and-see-on-ai-tech-report-2023/),
    but only after several training cycles and a reasonably solid initial model has
    been established.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**主动学习** – 让模型标记它确信的内容，然后将模糊不清的案件提交给人类审阅。在连续的回合中，机器会改进，而人工审阅的堆叠会缩小。在实践中，[它可以将人工标记减少30-70%](https://www.bain.com/insights/youre-out-of-time-to-wait-and-see-on-ai-tech-report-2023/)，但这需要在几个训练周期之后，并且已经建立了一个相当稳固的初始模型。'
- en: All three approaches help, yet none of these alone can process high-quality
    labels at scale.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 所有三种方法都有帮助，但单独使用任何一种都无法大规模处理高质量的标签。
- en: The Technical Foundations of Zero-Shot Object Detection
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 零样本目标检测的技术基础
- en: Zero-shot learning represents a paradigm shift from traditional supervised approaches
    that require extensive labeled examples for each object class. In conventional
    computer vision pipelines, models learn to recognize objects through exposure
    to thousands of annotated examples; for instance, a car detector requires car
    images, a person detector requires images of people, and so forth. This one-to-one
    mapping between training data and detection capabilities creates the annotation
    bottleneck that plagues the field.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 零样本学习代表了从传统监督方法的一个范式转变，后者需要为每个对象类别提供大量的标记示例。在传统的计算机视觉管道中，模型通过接触数千个标注示例来学习识别对象；例如，汽车检测器需要汽车图像，人体检测器需要人物图像，等等。这种训练数据和检测能力之间的一对一映射创造了困扰该领域的标注瓶颈。
- en: 'Zero-shot learning breaks this constraint by leveraging the relationships between
    visual features and natural language descriptions. Vision-language models, such
    as CLIP, create a shared space where images and text descriptions can be compared
    directly, allowing models to recognize objects they’ve never seen during training.
    The basic idea is simple: if a model knows what “four-wheeled vehicle” and “sedan”
    mean, it should be able to identify sedans without ever being trained on sedan
    examples.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 零样本学习通过利用视觉特征与自然语言描述之间的关系来打破这一限制。视觉-语言模型，如CLIP，创建了一个共享空间，其中图像和文本描述可以直接比较，使模型能够在训练过程中识别出从未见过的物体。基本思想很简单：如果一个模型知道“四轮车辆”和“轿车”的含义，那么它应该能够识别轿车，而无需在轿车示例上进行训练。
- en: This is fundamentally different from few-shot learning, which still requires
    some labeled examples per class, and traditional supervised learning, which demands
    extensive training data per class. Zero-shot approaches, on the other hand, rely
    on compositional understanding, such as breaking down complex objects into describable
    components and relationships that the model has encountered in various contexts
    during pre-training.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这与少样本学习有根本的不同，少样本学习仍然需要每个类别的一些标注示例，以及传统的监督学习，它要求每个类别都有大量的训练数据。另一方面，零样本方法依赖于组合理解，例如将复杂物体分解为可描述的组件和关系，这些组件和关系在预训练期间模型在各种上下文中都遇到过。
- en: However, extending zero-shot capabilities from image classification to object
    detection introduces additional complexity. While determining whether an entire
    image contains a car is one challenge, precisely localizing that car with a bounding
    box while simultaneously classifying it represents a significantly more demanding
    task that requires sophisticated grounding mechanisms.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，将零样本能力从图像分类扩展到目标检测引入了额外的复杂性。虽然确定整个图像是否包含汽车是一个挑战，但在同时分类汽车的同时精确地定位该汽车，代表了一个要求更高的任务，需要复杂的定位机制。
- en: 'Voxel51’s Verified Auto Labeling: An Improved Approach'
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Voxel51的验证自动标注：一种改进的方法
- en: According to research published by Voxel51, the [Verified Auto Labeling](https://link.voxel51.com/tds-val-report)
    (VAL) pipeline achieves approximately 95% agreement with expert labels in internal
    benchmarks. The same study indicates a cost reduction of roughly 10⁵, transforming
    a dataset that would have required months of paid annotation into a task completed
    in just a few hours on a single GPU.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 根据Voxel51发布的研究，[验证自动标注](https://link.voxel51.com/tds-val-report)（VAL）流程在内部基准测试中与专家标签的吻合度达到约95%。同样的研究还表明，成本降低了大约10⁵，将原本需要几个月付费标注的数据集转化为只需在单个GPU上几小时就能完成的工作。
- en: Labeling tens of thousands of images in a workday shifts annotation from a long‐running,
    line-item expense to a repeatable batch job. That speed opens the door to shorter
    experiment cycles and faster model refreshes.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在工作日标注成千上万张图片，将标注工作从长期运行、逐项费用转变为可重复的批量作业。这种速度为缩短实验周期和加快模型更新打开了大门。
- en: The workflow ships in FiftyOne, the end-to-end computer vision platform, that
    allows ML engineers to annotate, visualize, curate, and collaborate on data and
    models in a single interface.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程在FiftyOne端到端计算机视觉平台上提供，该平台允许机器学习工程师在单个界面上对数据和模型进行标注、可视化、管理和协作。
- en: While managed services such as Scale AI Rapid and SageMaker Ground Truth also
    pair foundation models with human review, Voxel51’s Verified Auto Labeling adds
    integrated QA, strategic data slicing, and full model evaluation analysis capabilities.
    This helps engineers not only improve the speed and accuracy of data annotation
    but also raise overall data quality and model accuracy.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然像Scale AI Rapid和SageMaker Ground Truth这样的托管服务也将基础模型与人工审查相结合，但Voxel51的验证自动标注增加了集成QA、战略数据切片和完整模型评估分析功能。这有助于工程师不仅提高数据标注的速度和准确性，还能提升整体数据质量和模型准确性。
- en: Technical Components of Voxel51’s Verified Auto-Labeling
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Voxel51验证自动标注的技术组件
- en: '**Model & Class-Prompt Selection:**'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模型与类别提示选择：**'
- en: Choose an open- or fixed-vocabulary detector, enter class names, and set a confidence
    threshold; images are labeled immediately, so the workflow stays zero-shot even
    when choosing a fixed-vocabulary model.
  id: totrans-32
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个开放或固定词汇检测器，输入类别名称，并设置置信度阈值；图像会立即标注，因此即使在选择固定词汇模型时，工作流程仍保持零样本。
- en: '**Automatic labeling with confidence scores:**'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**具有置信度分数的自动标注：**'
- en: The model generates boxes, masks, or tags and assigns a score to each prediction,
    allowing human reviewers to review, sort by certainty, and queue labels for approval.
  id: totrans-34
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该模型生成框、掩码或标签，并为每个预测分配一个分数，允许人工审查员进行审查、按确定性排序，并将标签排队以供批准。
- en: '**FiftyOne data and model analysis workflows:**'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**FiftyOne数据和模型分析工作流程：**'
- en: After labels are in place, engineers can utilize FiftyOne workflows to visualize
    embeddings to identify clusters or outliers.
  id: totrans-36
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标签就绪后，工程师可以利用FiftyOne工作流程来可视化嵌入以识别聚类或异常值。
- en: Once labels are approved, they are ready for downstream model training and fine-tuning
    workflows performed directly in the tool.
  id: totrans-37
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一旦标签得到批准，它们就准备好用于在工具中直接执行的下游模型训练和微调工作流程。
- en: Built-in evaluation dashboards help ML engineers further drill down into model
    performance scores such as mAP, F1, and confusion matrices to pinpoint true and
    false positives, determine model failure modes, and identify which additional
    data will most improve performance.
  id: totrans-38
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内置的评估仪表板帮助机器学习工程师进一步深入到模型性能评分，如mAP、F1和混淆矩阵，以确定真实和虚假的正面，确定模型失败模式，并识别哪些额外数据将最能提高性能。
- en: In day-to-day use, this type of workflow will enable machines to accomplish
    the more straightforward labeling cases, while reallocating humans on challenging
    ones, providing a pragmatic midpoint between push-button automation and frame-by-frame
    review.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在日常使用中，此类工作流程将使机器能够完成更直接标注的案例，同时将人类重新分配到更具挑战性的任务上，在一键自动化和逐帧审查之间提供一个实用的中间点。
- en: Performance in the Wild
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 野外的性能
- en: '[Published benchmarks tell a clear story](https://link.voxel51.com/tds-val-blog):
    on popular datasets like COCO, Pascal VOC, and BDD100K, models trained on VAL-generated
    labels perform virtually the same as models trained on fully hand-labeled data
    for the everyday objects those sets capture. The gap only shows up on rarer classes
    in LVIS and similarly long-tail collections, where a light touch of human annotation
    is still the quickest way to close the remaining accuracy gap.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '[发布的基准测试讲述了一个清晰的故事](https://link.voxel51.com/tds-val-blog)：在像COCO、Pascal VOC和BDD100K这样的流行数据集上，使用VAL生成的标签训练的模型在捕获的日常对象上几乎与使用完全人工标注数据的模型表现相同。差距仅在LVIS中更罕见的类别以及类似的长期尾部集合中显现，在这些情况下，轻微的人工标注仍然是缩小剩余精度差距的最快方式。'
- en: Experiments suggest confidence cutoffs between 0.2 and 0.5 balance precision
    and recall, though the sweet spot shifts with dataset density and class rarity.
    For high-volume jobs, lightweight YOLO variants maximize throughput. When subtle
    or long-tail objects require extra accuracy, an open-vocabulary model like Grounding
    DINO can be swapped in at the cost of additional GPU memory and latency.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 实验表明，在0.2和0.5之间的置信度截止值平衡了精确度和召回率，尽管最佳点随着数据集密度和类别稀有度的变化而变化。对于高容量工作，轻量级的YOLO变体最大化吞吐量。当需要额外精度处理微妙或长尾对象时，可以以额外的GPU内存和延迟为代价，交换使用像Grounding
    DINO这样的开放词汇模型。
- en: Either way, the downstream human-review step is limited to the low-confidence
    slice. And it’s far lighter than the full-image checks that traditional, manual
    QA pipelines still rely on.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 无论哪种方式，下游的人工审查步骤仅限于低置信度部分。而且它远比传统、手动QA流程仍然依赖的全图检查要轻。
- en: Implications for Broader Adoption
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更广泛应用的含义
- en: Lowering the time and cost of annotation democratizes computer-vision development.
    A ten-person agriculturetech startup could label 50,000 drone images for under
    $200 in spot-priced GPU time, rerunning overnight whenever the taxonomy changes.
    Larger organizations may combine in-house pipelines for sensitive data with external
    vendors for less-regulated workloads, reallocating saved annotation spend toward
    quality evaluation or domain expansion.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 降低标注的时间和成本使计算机视觉开发民主化。一个十人的农业技术初创公司可以在低于200美元的GPU时间现货价格下标注50,000张无人机图像，每当分类法发生变化时，都可以在夜间重新运行。较大的组织可以将敏感数据的内部管道与外部供应商的较少监管工作量相结合，将节省的标注支出重新分配到质量评估或领域扩展。
- en: Together, zero-shot box labeling plus targeted human review offers a practical
    path to faster iteration. This approach leaves (expensive) humans to handle the
    edge cases where machines may still stumble.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 零样本框标注加上有针对性的人工审查共同提供了一条通往更快迭代的实用路径。这种方法将（昂贵的）人类留给处理机器可能仍然会犯错的边缘案例。
- en: Auto-Labeling shows that high-quality labeling can be automated to a level once
    thought impractical. This should bring advanced CVs within reach of far more teams
    and reshape visual AI workflows across industries.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 自动标注表明，高质量标注可以自动化到以前认为不切实际的程度。这应该使高级计算机视觉技术对更多团队触手可及，并重塑跨行业的视觉人工智能工作流程。
