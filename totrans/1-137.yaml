- en: The Pearson Correlation Coefficient, Explained Simply
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/pearson-correlation-coefficient-explained-simply/](https://towardsdatascience.com/pearson-correlation-coefficient-explained-simply/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1761937246531" class="mdspan-comment">When we want to</mdspan>
    build a regression model, which means fitting a straight line on the data to predict
    future values, we first visualize our data to get an idea of how it looks and
    to see the patterns and relationships.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: The data may appear to show a positive linear relationship, but we confirm it
    by calculating the Pearson correlation coefficient, which tells us how close our
    data is to linearity.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider a simple [Salary Dataset](https://www.kaggle.com/datasets/abhishek14398/salary-dataset-simple-linear-regression)
    to understand the Pearson correlation coefficient.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: 'The dataset consists of two columns:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '**YearsExperience**: the number of years a person has been working'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: '**Salary** (target): the corresponding annual salary in US dollars'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Now we need to build a model that predicts salary based on years of experience.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: We can understand that this can be done with a simple linear regression model
    because we have only one predictor and a continuous target variable.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: But can we directly apply the simple linear regression algorithm just like that?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: No.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: We have several assumptions for linear regression to apply, and one of them
    is **linearity**.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: We need to check linearity, and for that, we calculate the **correlation coefficient**.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: But what is linearity?
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: Let’s understand this with an example.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ebee698c22ec14d175b19bfea7c168cb.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: From the table above, we can see that for every one-year increase in experience,
    there is a $5,000 increase in salary.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: The change is constant, and when we plot these values, we get a straight line.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: This type of relationship is called a **linear relationship**.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Now in simple linear regression, we already know that we fit a regression line
    on the data to predict future values, and this can be effective only when the
    data has a linear relationship.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: So, we need to check for linearity in our data.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: For that, let’s calculate the correlation coefficient.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: Before that, we first visualize the data using a scatter plot to get an idea
    of the relationship between the two variables.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![](../Images/c61b62ea8e2628ea00de03ccf683579c.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: We can observe from the scatter plot that as **years of experience** increases,
    **salary** also tends to increase.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Although the points do not form a perfect straight line, the relationship appears
    to be **strong and linear**.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: To confirm this, let’s now calculate the **Pearson correlation coefficient**.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Pearson correlation coefficient is 0.9782.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: We get the value of correlation coefficient in between -1 and +1.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: If it is…
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: 'close to 1: strong positive linear relationship'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: 'close to 0: no linear relationship'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: 'close to -1: strong negative linear relationship'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Here, we got a correlation coefficient value of **0.9782**, which means the
    data mostly follows a **straight-line pattern**, and there is a **very strong
    positive relationship** between the variables.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: From this, we can observe that **simple linear regression is well suited** for
    modeling this relationship.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: But how do we calculate this Pearson correlation coefficient?
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider a 10-point sample data from our dataset.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f2444cfbc60cc4ad0a93f203415a4c3b.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '**Now, let’s calculate the Pearson correlation coefficient.**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: When both X and Y increase together, the correlation is said to be **positive**.
    On the other hand, if one increases while the other decreases, the correlation
    is **negative**.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s calculate the variance for each variable.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '**Variance helps us understand how far the values are spread from the mean.**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: We’ll start by calculating the variance for **X (Years of Experience)**.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: To do that, we first need to compute the **mean of X**.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: \bar{X} = \frac{1}{n} \sum_{i=1}^{n} X_i
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{1.2 + 3.3 + 3.8 + 4.1 + 5.0 + 5.4 + 8.3 + 8.8 + 9.7 + 10.4}{10}
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{70.0}{10}
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: = 7.0
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Next, we subtract each value from the mean and then square it to cancel out
    the negatives.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8ecfd38ae5efda81da8769a4f7d93a34.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '**We’ve calculated the squared deviations of each value from the mean.**'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Now, we can find the variance of **X** by taking the average of those squared
    deviations.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: \text{Sample Variance of } X = \frac{1}{n – 1} \sum_{i=1}^{n} (X_i – \bar{X})^2
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{33.64 + 13.69 + 10.24 + 8.41 + 4.00 + 2.56 + 1.69 + 3.24 + 7.29 + 11.56}{10
    – 1}
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{96.32}{9} \approx 10.70
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Here we divided by ‘n-1’ because we are dealing with a sample data and using
    ‘n-1’ gives us the unbiased estimate of variance.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: The sample variance of X is **10.70**, which tells us that the values of Years
    of Experience are, on average, **10.70 squared units** away from the mean.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: Since variance is a squared value, we take the square root to interpret it in
    the same unit as the original data.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: This is called **Standard Deviation**.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: s_X = \sqrt{\text{Sample Variance}} = \sqrt{10.70} \approx 3.27
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: The standard deviation of X is **3.27**, which means that the values of Years
    of Experience fall about **3.27 years above or below the mean**.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: In the same way we calculate the variance and standard deviation of ‘Y’.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: \bar{Y} = \frac{1}{n} \sum_{i=1}^{n} Y_i
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{39344 + 64446 + 57190 + 56958 + 67939 + 83089 + 113813 + 109432 + 112636
    + 122392}{10}
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{827239}{10}
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: = 82,\!723.90
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: \text{Sample Variance of } Y = \frac{1}{n – 1} \sum (Y_i – \bar{Y})^2
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{7,\!898,\!632,\!198.90}{9} = 877,\!625,\!799.88
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: \text{Standard Deviation of } Y \text{ is } s_Y = \sqrt{877,\!625,\!799.88}
    \approx 29,\!624.75
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: We calculated the variance and standard deviation of ‘X’ and ‘Y’.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Now, the next step is to calculate the covariance between X and Y.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: We already have the means of X and Y, as well as the deviations of each value
    from their respective means.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: Now, we multiply these deviations to see how the two variables vary together.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/22d1cd790983d8db47856b76686b5414.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: By multiplying these deviations, we are trying to capture how X and Y move together.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: If both X and Y are above their means, then the deviations are positive, which
    means the product is positive.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: If both X and Y are below their means, then the deviations are negative, but
    since a negative times a negative is positive, the product is positive.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: If one is above the mean and the other is below, the product is negative.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: This product tells us whether the two variables tend to move in the **same direction**
    (both increasing or both decreasing) or in **opposite directions**.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: Using the sum of the product of deviations, we now calculate the sample covariance.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: \text{Sample Covariance} = \frac{1}{n – 1} \sum_{i=1}^{n}(X_i – \bar{X})(Y_i
    – \bar{Y})
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{808771.5}{10 – 1}
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{808771.5}{9} = 89,\!863.5
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: We got a sample covariance of 89863.5\. This indicates that as experience increases,
    salary also tends to increase.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: But the magnitude of covariance depends on the units of the variables (years
    × dollars), so it’s not directly interpretable.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: This value only shows the direction.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: Now we divide the covariance by the product of the standard deviations of X
    and Y.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: '**This gives us the Pearson correlation coefficient which can be called as
    a normalized version of covariance.**'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: Since the standard deviation of X has units of years and Y has units of dollars,
    multiplying them gives us years times dollars.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: These units cancel out when we divide, resulting in the Pearson correlation
    coefficient, which is unitless.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: But the main reason we divide covariance by the standard deviations is to normalize
    it, so the result is easier to interpret and can be compared across different
    datasets.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: r = \frac{\text{Cov}(X, Y)}{s_X \cdot s_Y}
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{89,\!863.5}{3.27 \times 29,\!624.75}
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{89,\!863.5}{96,\!992.13} \approx 0.9265
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: So, the Pearson correlation coefficient (r) we calculated is **0.9265**.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: This tells us there’s a **very strong positive linear relationship** between
    years of experience and salary.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: This way we find the Pearson correlation coefficient.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: 'The formula for Pearson correlation coefficient is:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: r = \frac{\text{Cov}(X, Y)}{s_X \cdot s_Y}
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{\frac{1}{n – 1} \sum_{i=1}^{n} (X_i – \bar{X})(Y_i – \bar{Y})}
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: '{\sqrt{\frac{1}{n – 1} \sum_{i=1}^{n} (X_i – \bar{X})^2} \cdot \sqrt{\frac{1}{n
    – 1} \sum_{i=1}^{n} (Y_i – \bar{Y})^2}}'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{\sum_{i=1}^{n} (X_i – \bar{X})(Y_i – \bar{Y})}
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: '{\sqrt{\sum_{i=1}^{n} (X_i – \bar{X})^2} \cdot \sqrt{\sum_{i=1}^{n} (Y_i –
    \bar{Y})^2}}'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: 'We need to make sure certain conditions are met before calculating the Pearson
    correlation coefficient:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: The relationship between the variables should be **linear**.
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Both variables should be **continuous** and **numeric**.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两个变量都应该是**连续的**和**数值的**。
- en: There should be **no strong outliers**.
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应该没有**强烈的异常值**。
- en: '* * *'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Dataset**'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据集**'
- en: The dataset used in this blog is the **[Salary dataset](https://www.kaggle.com/datasets/abhishek14398/salary-dataset-simple-linear-regression)**.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客中使用的数据集是**[薪资数据集](https://www.kaggle.com/datasets/abhishek14398/salary-dataset-simple-linear-regression)**。
- en: It is publicly available on Kaggle and is licensed under the **[Creative Commons
    Zero (CC0 Public Domain)](https://creativecommons.org/publicdomain/zero/1.0/)**
    license. This means it can be freely used, modified, and shared for both **non-commercial
    and commercial purposes** without restriction.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 它在Kaggle上公开发布，并许可在**[Creative Commons Zero (CC0 公共领域)](https://creativecommons.org/publicdomain/zero/1.0/)**许可下。这意味着它可以无限制地免费使用、修改和共享，无论是用于**非商业目的**还是**商业目的**。
- en: '* * *'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I hope this gave you a clear understanding of how the Pearson correlation coefficient
    is calculated and when it’s used.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这让你对皮尔逊相关系数的计算方法和使用场景有了清晰的理解。
- en: '**Further Reading**'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: '**进一步阅读**'
- en: If you want to see how correlation works when the relationship is not linear
    but still moves in one direction, you can read my simple explanation of the [Spearman
    correlation coefficient](https://towardsdatascience.com/spearman-correlation-coefficient-for-when-pearson-isnt-enough/).
  id: totrans-160
