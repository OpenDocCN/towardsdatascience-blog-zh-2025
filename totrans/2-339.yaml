- en: ⁷ [Jingyi Jessica Li (2024)](https://pmc.ncbi.nlm.nih.gov/articles/PMC11078861/)
    How the Monty Hall problem is similar to the false discovery rate in high-throughput
    data analysis.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: ⁷ [李静怡·杰西卡·李 (2024)](https://pmc.ncbi.nlm.nih.gov/articles/PMC11078861/) 蒙提·霍尔问题如何与高通量数据分析中的假发现率相似。
- en: Whereas the author points about “similarities” between hypothesis testing and
    the Monty Hall problem, I think that this is a bit misleading. The author is correct
    that both problems change by the order in which processes are done, but that is
    part of Bayesian statistics in general, not limited to the Monty Hall problem.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然作者提到了假设检验与蒙提·霍尔问题之间的“相似性”，但我认为这有点误导。作者正确地指出，这两个问题都会因为处理过程的顺序而改变，但这只是贝叶斯统计的一般特性，并不局限于蒙提·霍尔问题。
