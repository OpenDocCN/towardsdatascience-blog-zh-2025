- en: 🚪🚪🐐 Lessons in Decision Making from the Monty Hall Problem
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 🚪🚪🐐 从蒙提霍尔问题中学到的决策经验
- en: 原文：[https://towardsdatascience.com/lessons-in-decision-making-from-the-monty-hall-problem-2/](https://towardsdatascience.com/lessons-in-decision-making-from-the-monty-hall-problem-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/lessons-in-decision-making-from-the-monty-hall-problem-2/](https://towardsdatascience.com/lessons-in-decision-making-from-the-monty-hall-problem-2/)
- en: <mdspan datatext="el1747338606995" class="mdspan-comment">The Monty Hall</mdspan>
    Problem is a well-known brain teaser from which we can learn important lessons
    in decision making that are useful in general and in particular for data scientists.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747338606995" class="mdspan-comment">蒙提霍尔问题</mdspan> 是一个著名的思维游戏，我们可以从中学习到在决策中非常重要的经验教训，这些经验教训对一般人和数据科学家都很有用。
- en: If you are not familiar with this problem, prepare to be perplexed 🤯. If you
    are, I hope to shine light on aspects that you might not have considered 💡.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对这个问题不熟悉，准备感到困惑 🤯。如果你熟悉，我希望能够阐明你可能没有考虑到的方面 💡。
- en: 'I introduce the problem and solve with three types of intuitions:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我介绍了这个问题，并使用三种直觉来解决它：
- en: '**Common** — The heart of this post focuses on applying our *common sense*
    to solve this problem. We’ll explore why it fails us 😕 and what we can do to intuitively
    overcome this to make the solution crystal clear 🤓. We’ll do this by using visuals
    🎨 , qualitative arguments and some basic probabilities (not too deep, I promise).'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**常见** — 这篇文章的核心是应用我们的*常识*来解决这个问题。我们将探讨为什么它让我们失望 😕，以及我们可以如何直观地克服它，使解决方案清晰可见
    🤓。我们将通过使用视觉 🎨，定性论点和一些基本概率（不会太深，我保证）来实现这一点。'
- en: '**Bayesian** — We will briefly discuss the importance of belief propagation.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**贝叶斯** — 我们将简要讨论信念传播的重要性。'
- en: '**Causal** — We will use a Graph Model to visualise conditions required to
    use the Monty Hall problem in real world settings.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**因果** — 我们将使用图模型来可视化在现实世界设置中使用蒙提霍尔问题的条件。'
- en: 🚨Spoiler alert 🚨 I haven’t been convinced that there are any, but the thought
    process is very useful.
  id: totrans-8
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 🚨剧透警告 🚨 我还没有确信有任何经验，但这个过程非常有用。
- en: I summarise by discussing lessons learnt for better data decision making.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我通过讨论从中学到的经验来总结，以更好地进行数据决策。
- en: 'In regards to the Bayesian and Causal intuitions, these will be presented in
    a gentle form. For the mathematically inclined ⚔️ I also provide supplementary
    sections with short deep dives into each approach after the summary. (Note: These
    are not required to appreciate the main points of the article.)'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 关于贝叶斯和因果直觉，我们将以温和的形式进行讨论。对于数学爱好者 ⚔️，我在总结之后还提供了补充部分，简要深入探讨了每种方法。（注意：这些不是欣赏文章主要观点所必需的。）
- en: By examining different aspects of this puzzle in probability 🧩 you will hopefully
    be able to improve your data decision making ⚖️.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 通过检查这个概率谜题的不同方面 🧩，你可能会希望提高你的数据决策能力 ⚖️。
- en: '![](../Images/8fa761e00f3232f9d0a2969915a3d66d.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8fa761e00f3232f9d0a2969915a3d66d.png)'
- en: 'Credit: [Wikipedia](https://upload.wikimedia.org/wikipedia/en/c/cf/LMADlogo2011.jpg)'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 信用：[维基百科](https://upload.wikimedia.org/wikipedia/en/c/cf/LMADlogo2011.jpg)
- en: First, some history. *Let’s Make a Deal* is a USA television game show that
    originated in 1963\. As its premise, audience participants were considered traders
    making deals with the host, Monty Hall 🎩.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，一些历史。*让我们做交易* 是一个始于1963年的美国电视游戏节目。其前提是观众参与者被视为与主持人蒙提霍尔 🎩 做交易的交易者。
- en: 'At the heart of the matter is an apparently simple scenario:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 问题的核心是一个看似简单的场景：
- en: A trader is posed with the question of choosing one of three doors for the opportunity
    to win a luxurious prize, e.g, a car 🚗. Behind the other two were goats 🐐.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 一个交易者面临着一个问题：从三个门中选择一个，以赢得豪华奖品的机会，例如一辆汽车 🚗。其他两个门后面是山羊 🐐。
- en: '![](../Images/3876d4b066cc9af9c8730b236596e005.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3876d4b066cc9af9c8730b236596e005.png)'
- en: The trader is shown three closed doors.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 交易者面前有三扇关闭的门。
- en: The trader chooses one of the doors. Let’s call this (without loss of generalisability)
    door A and mark it with a ☝️.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 交易者选择了一扇门。我们可以称之为（不失一般性）门A，并用 ☝️ 标记它。
- en: Keeping the chosen door ☝️ closed️, the host reveals one of the remaining doors
    showing a goat 🐐 (let’s call this door C).
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 保持所选的门 ☝️ 关闭，主持人揭示了一个剩余的门，显示了一只山羊 🐐（我们可以称之为门C）。
- en: '![](../Images/bf25dad6a8e5f133e6e458d783b72e36.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bf25dad6a8e5f133e6e458d783b72e36.png)'
- en: The trader chooses door ☝️ and the the host 🎩 reveals door C showing a goat.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 交易者选择了一个门 ☝️，主持人 🎩 揭示了门C，显示了一只山羊。
- en: The host then asks the trader if they would like to stick with their first choice
    ☝️ or switch to the other remaining one (which we’ll call door B).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，主持人会问交易者他们是否想坚持他们的第一个选择 ☝️ 或切换到另一个剩余的门（我们将称之为门B）。
- en: If the trader guesses correct they win the prize 🚗. If not they’ll be shown
    another goat 🐐 (also referred to as a *zonk*).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果交易者猜对了，他们将赢得奖品 🚗。如果猜错了，他们将看到另一只山羊 🐐（也被称为 *zonk*）。
- en: '![](../Images/e0961bc7390d9082210bc68580144ae8.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e0961bc7390d9082210bc68580144ae8.png)'
- en: 'What is the probability of being Zonked? Credit: [Wikipedia](https://upload.wikimedia.org/wikipedia/en/a/a6/2009lmadzonkgoat.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 被击中的概率是多少？来源：[维基百科](https://upload.wikimedia.org/wikipedia/en/a/a6/2009lmadzonkgoat.jpg)
- en: Should the trader stick with their original choice of door A or switch to B?
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 交易者应该坚持他们原始的选择门A还是切换到B？
- en: Before reading further, give it a go. What would you do?
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续阅读之前，试一试。你会怎么做？
- en: Most people are likely to have a gut intuition that “it doesn’t matter” arguing
    that in the first instance each door had a ⅓ chance of hiding the prize, and that
    after the host intervention 🎩, when only two doors remain closed, the winning
    of the prize is 50:50.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人可能有一种直觉，认为“这无关紧要”，认为在第一种情况下，每个门有1/3的机会隐藏奖品，而在主持人干预 🎩之后，当只剩下两个门关闭时，赢得奖品的机会是50:50。
- en: 'There are various ways of explaining why the coin toss intuition is incorrect.
    Most of these involve maths equations, or simulations. Whereas we will address
    these later, we’ll attempt to solve by applying Occam’s razor:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 有各种方法可以解释为什么抛硬币的直觉是错误的。其中大多数涉及数学方程式或模拟。而我们将稍后解决这些问题，我们将尝试通过应用奥卡姆剃刀来解决：
- en: '*A principle that states that simpler explanations are preferable to more complex
    ones* — William of Ockham (1287–1347)'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '*一个原则，即简单的解释比复杂的解释更可取* —— 奥卡姆的威廉（1287–1347）'
- en: To do this it is instructive to slightly redefine the problem to a large *N*
    doors instead of the original three.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，将问题稍微重新定义为一个大的 *N* 门而不是原来的三个，是有教育意义的。
- en: The Large N-Door Problem
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大N门问题
- en: 'Similar to before: you have to choose one of many doors. For illustration let’s
    say *N*=100\. Behind one of the doors there is the prize 🚗 and behind 99 (*N-1*)
    of the rest are goats 🐐.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前类似：你必须从许多门中选择一个。为了说明，让我们假设 *N*=100。其中一扇门后面有奖品 🚗，其余99 (*N-1*)扇门后面是山羊 🐐。
- en: '![](../Images/d445c8f7b0d91b4843af819dcab77c63.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d445c8f7b0d91b4843af819dcab77c63.png)'
- en: The 100 Door Monty Hall problem before the host intervention.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 主持人干预之前的100道门蒙提霍尔问题。
- en: You choose one door 👇 and the host 🎩 reveals 98 (*N-2*) of the other doors that
    have goats 🐐 leaving yours 👇 and one more closed 🚪.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你选择一个门 👇，主持人 🎩揭示其余98 (*N-2*) 有山羊 🐐的门，留下你的 👇 和一个额外的关闭 🚪。
- en: '![](../Images/fd8b68217c5d297f766669d478fda842.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fd8b68217c5d297f766669d478fda842.png)'
- en: The 100 Door Monty Hall problem after the host intervention. Should you stick
    with your door 👇 or make the switch?
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 主持人干预之后的100道门蒙提霍尔问题。你应该坚持你的门 👇 还是做出改变？
- en: Should you stick with your original choice or make the switch?
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该坚持你的原始选择还是做出改变？
- en: I think you’ll agree with me that the remaining door, not chosen by you, is
    much more likely to conceal the prize … so you should definitely make the switch!
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我想你会同意我的看法，剩下的门，你没有选择的，更有可能隐藏奖品……所以你绝对应该做出改变！
- en: 'It’s illustrative to compare both scenarios discussed so far. In the next figure
    we compare the post host intervention for the *N*=3 setup (top panel) and that
    of *N*=100 (bottom):'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 比较到目前为止讨论的两种场景是有说明性的。在下一张图中，我们比较了主持人干预后的 *N*=3 设置（顶部面板）和 *N*=100（底部）：
- en: '![](../Images/183334543b1e9fe98ccd8cffb12e23d7.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/183334543b1e9fe98ccd8cffb12e23d7.png)'
- en: Post intervention settings for the N=3 setup (top) and N=100 (bottom).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: N=3设置（顶部）和N=100（底部）的干预后设置。
- en: In both cases we see two shut doors, one of which we’ve chosen. The main difference
    between these scenarios is that in the first we see one goat and in the second
    there are more than the eye would care to see (unless you shepherd for a living).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，我们都看到两个关闭的门，其中一个是我们的选择。这些场景之间的主要区别在于，在第一种情况下我们看到了一只山羊，而在第二种情况下，我们看到的多于眼睛愿意看到的（除非你以放牧为生）。
- en: Why do most people consider the first case as a “50:50” toss up and in the second
    it’s obvious to make the switch?
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么大多数人认为第一种情况是“50:50”的投掷，而在第二种情况下显然应该做出改变？
- en: We’ll soon address this question of why. First let’s put probabilities of success
    behind the different scenarios.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们很快就会解决这个问题，为什么。首先，让我们看看不同场景成功的概率。
- en: What’s The Frequency, Kenneth?
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 肯尼思，频率是多少？
- en: So far we learnt from the *N=*100 scenario that switching doors is obviously
    beneficial. Inferring for the *N*=3 may be a leap of faith for most. Using some
    basic probability arguments here we’ll quantify why it is favourable to make the
    switch for any number door scenario *N*.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们从*N*=100的场景中了解到，换门显然是有益的。对于大多数人来说，推断*N*=3可能是一种信仰的飞跃。在这里使用一些基本的概率论来量化为什么在任何数量的门场景*N*中换门都是有利的。
- en: We start with the standard Monty Hall problem (*N*=3). When it starts the probability
    of the prize being behind each of the doors A, B and C is *p*=⅓. To be explicit
    let’s define the *Y* parameter to be the door with the prize 🚗, i.e, *p*(*Y*=A)=
    *p(Y=*B*)*=*p(Y=*C*)*=⅓.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从标准的蒙提霍尔问题(*N*=3)开始。当它开始时，每个门A、B和C后面有奖品的概率是*p*=⅓。为了明确起见，让我们定义*Y*参数为有奖品的门 🚗，即*p*(*Y*=A)=
    *p(Y=*B*)*=*p(Y=*C*)*=⅓。
- en: 'The trick to solving this problem is that once the trader’s door A has been
    chosen ☝️, we should pay close attention to the set of the other doors {B,C},
    which has the probability of *p(Y*∈{B,C})*=p*(*Y*=B)*+p*(*Y*=C)=⅔. This visual
    may help make sense of this:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这个问题的技巧是，一旦选择了交易者的门A ☝️，我们就应该密切关注其他门集合{B,C}，其概率为*p(Y∈{B,C})*=p(Y=B)+p(Y=C)=⅔。这个视觉图可以帮助理解这一点：
- en: '![](../Images/bc30c42601c277071bdd823409b096ea.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bc30c42601c277071bdd823409b096ea.png)'
- en: By being attentive to the {B,C} the rest should follow. When the goat 🐐 is revealed
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 通过关注{B,C}，其他部分应该随之而来。当揭示山羊 🐐 时
- en: '![](../Images/419c81e8ce205add04bc4c00e5f915f9.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/419c81e8ce205add04bc4c00e5f915f9.png)'
- en: it is apparent that the probabilities post intervention change. Note that for
    ease of reading I’ll drop the *Y* notation, where p(Y=A) will read p(A) and *p(Y*∈{B,C})
    will read *p(*{B,C}). Also for completeness the full terms after the intervention
    should be even longer due to it being conditional, e.g, p(*Y*=A|*Z*=C), *p(Y*∈{B,C}|*Z*=C),
    where *Z* is a parameter representing the choice of the host 🎩. (In the Bayesian
    supplement section below I use proper notation without this shortening.)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，干预后的概率发生了变化。请注意，为了便于阅读，我将省略*Y*符号，其中p(Y=A)将读作p(A)，*p(Y∈{B,C})*将读作*p(*{B,C}).
    此外，由于它是条件性的，干预后的完整术语应该更长，例如，p(*Y*=A|*Z*=C)，*p(Y*∈{B,C}|*Z*=C)，其中*Z*是一个表示主持人选择的参数
    🎩。 (在下面的贝叶斯补充部分中，我使用适当的符号而没有这种缩写。)
- en: '*p*(A) remains ⅓'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*p*(A)仍然是⅓'
- en: '*p(*{B,C})*=p*(B)*+p*(C) remains ⅔,'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*p(*{B,C})*=p*(B)+p*(C)仍然是⅔，'
- en: '*p*(C)=0; we just learnt that the goat 🐐 is behind door C, not the prize.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*p*(C)=0；我们刚刚了解到山羊🐐在门C后面，而不是奖品。'
- en: '*p*(B)= *p(*{B,C})-*p*(C) = ⅔'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*p*(B)= *p(*{B,C})-*p*(C) = ⅔'
- en: For anyone with the information provided by the host (meaning the trader and
    the audience) this means that it isn’t a toss of a fair coin! For them the fact
    that *p*(C) became zero does not “raise all other boats” (probabilities of doors
    A and B), but rather *p*(A) remains the same and *p*(B) gets doubled.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 对于任何拥有主持人提供的信息的人来说（意味着交易者和观众），这意味着这不是一个公平硬币的投掷！对他们来说，*p*(C)变为零并不意味着“所有其他船只”都上升（门A和B的概率），而是*p*(A)保持不变，而*p*(B)翻倍。
- en: The bottom line is that the trader should consider *p(*A*)* = ⅓ and *p(*B*)*=⅔,
    hence by switching they are doubling the odds at winning!
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，交易者应该考虑*p(*A*)* = ⅓和*p(*B*)*=⅔，因此通过换门，他们是在翻倍赢得的机会！
- en: Let’s generalise to *N* (to make the visual simpler we’ll use *N*=100 again
    as an analogy).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们推广到*N*（为了使视觉更简单，我们再次使用*N*=100作为类比）。
- en: When we start all doors have odds of winning the prize *p*=1/*N*. After the
    trader chooses one door which we’ll call D₁, meaning *p*(*Y*=D₁)=*1/N*, we should
    now pay attention to the remaining set of doors {D₂, …, Dₙ} will have a chance
    of *p*(*Y*∈{D₂, …, Dₙ})=*(N-1)/N*.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们开始时，所有门赢得奖品的概率都是*p*=1/*N*。在交易者选择一个门之后，我们将称之为D₁，意味着*p*(*Y*=D₁)=*1/N*，我们现在应该注意剩余的门集合{D₂,
    …, Dₙ}将有一个机会*p*(*Y*∈{D₂, …, Dₙ})=*(N-1)/N*。
- en: '![](../Images/15ec92c088dea197b5c6b7422ba05c06.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/15ec92c088dea197b5c6b7422ba05c06.png)'
- en: 'When the host reveals (*N*-2) doors {D₃, …, Dₙ} with goats (back to short notation):'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 当主持人揭示含有山羊的(*N*-2)个门{D₃, …, Dₙ}时：
- en: '*p*(D₁) remains *1/N*'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*p*(D₁)仍然是*1/N*'
- en: p({D₂, …, Dₙ})=*p*(D₂)+*p*(D₃)+… + *p*(Dₙ) remains *(N-1)/N*
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: p({D₂, …, Dₙ})=*p*(D₂)+*p*(D₃)+… + *p*(Dₙ)仍然是*(N-1)/N*
- en: '*p*(D₃)=*p*(D₄)= …=*p*(Dₙ₋₁) =*p*(Dₙ) = 0; we just learnt that they have goats,
    not the prize.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*p*(D₃)=*p*(D₄)= …=*p*(Dₙ₋₁) =*p*(Dₙ) = 0；我们刚刚了解到它们有山羊，而不是奖品。'
- en: '*p*(D₂)=p({D₂, …, Dₙ}) — *p*(D₃) — … — *p*(Dₙ)=*(N-1)/N*'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*p*(D₂)=p({D₂, …, Dₙ}) — *p*(D₃) — … — *p*(Dₙ)=*(N-1)/N*'
- en: The trader should now consider two door values *p*(D₁)=*1/N* and *p*(D₂)=*(N-1)/N*.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 交易者现在应该考虑两个门值*p*(D₁)=*1/N*和*p*(D₂)=*(N-1)/N*。
- en: Hence the odds of winning improved by a factor of *N-1*! In the case of *N*=100,
    this means by an odds ratio of 99! (i.e, 99% likely to win a prize when switching
    vs. 1% if not).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，获胜的几率提高了 *N-1* 倍！在 *N*=100 的情况下，这意味着获胜比率为 99！（即，换门时赢得奖品的可能性为 99%，如果不换门则只有
    1%。）
- en: 'The improvement of odds ratios in all scenarios between *N*=3 to 100 may be
    seen in the following graph. The thin line is the probability of winning by choosing
    any door prior to the intervention p(*Y*)=1/*N*. Note that it also represents
    the chance of winning after the intervention, if they decide to stick to their
    guns and not switch p(*Y=D*₁*|Z={D*₃*…D*ₙ*}*). (Here I reintroduce the more rigorous
    conditional form mentioned earlier.) The thick line is the probability of winning
    the prize after the intervention if the door is switched p(*Y=D*₂*|Z={D*₃*…D*ₙ*}*)=(*N-1)*/*N*:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *N*=3 到 100 之间所有场景中，获胜概率比率的提高可以在以下图表中看到。细线是选择任何门之前的获胜概率 p(*Y*)=1/*N*。注意，它也代表了干预后如果他们决定坚持自己的选择而不换门的话获胜的概率
    p(*Y=D*₁*|Z={D*₃*…D*ₙ*}*）。（这里我重新引入了之前提到的更严谨的条件形式。）粗线是换门后获胜奖品概率 p(*Y=D*₂*|Z={D*₃*…D*ₙ*}*)=(*N-1)*/*N*：
- en: '![](../Images/a1c2109d7ad2a0e8fd062a92ff82d0ca.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a1c2109d7ad2a0e8fd062a92ff82d0ca.png)'
- en: Probability of winning as a function of N. p(Y)=p(Y=no switch|Z)=1/N is the
    thin line; p(Y=switch|Z)=N/(N-1) is the thick one. (By definition the sum of both
    lines is 1 for each N.)
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 获胜概率作为 N 的函数。p(Y)=p(Y=no switch|Z)=1/N 是细线；p(Y=switch|Z)=N/(N-1) 是粗线。（按定义，对于每个
    N，两条线的总和为 1。）
- en: Perhaps the most interesting aspect of this graph (albeit also by definition)
    is that the *N*=3 case has the **highest** probability **before** the host intervention
    🎩, but the **lowest** probability **after** and vice versa for *N*=100.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 也许这个图表（尽管按定义也是）最有趣的一个方面是，*N*=3 的情况在主持人干预 **之前** 具有最高的概率，但在干预 **之后** 的概率最低，反之亦然，对于
    *N*=100。
- en: 'Another interesting feature is the quick climb in the probability of winning
    for the switchers:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个有趣的特点是，换门者的获胜概率迅速上升：
- en: '*N*=3: p=67%'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*N*=3: p=67%'
- en: '*N*=4: p=75%'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*N*=4: p=75%'
- en: '*N*=5=80%'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*N*=5=80%'
- en: The switchers curve gradually reaches an asymptote approaching at 100% whereas
    at *N*=99 it is 98.99% and at *N*=100 is equal to 99%.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 换门者的曲线逐渐达到一个接近 100% 的渐近线，而 *N*=99 时为 98.99%，*N*=100 时等于 99%。
- en: 'This starts to address an interesting question:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这开始回答了一个有趣的问题：
- en: Why Is Switching Obvious For Large N But Not N=3?
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为什么对于大的 N 来说换门是明显的，但对于 N=3 来说却不是？
- en: The answer is the fact that this puzzle is slightly ambiguous. Only the highly
    attentive realise that by revealing the goat (and never the prize!) the host is
    actually conveying **a lot of information** that should be incorporated into one’s
    calculation. Later we discuss the difference of doing this calculation in one’s
    mind based on intuition and slowing down by putting pen to paper or coding up
    the problem.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 答案是这个谜题有点含糊不清。只有高度警觉的人才会意识到，通过揭示山羊（而不是奖品！）主持人实际上传达了 **大量信息**，这些信息应该纳入到自己的计算中。稍后我们将讨论基于直觉在心中进行这种计算与放慢速度，通过把笔放在纸上或编写代码来解决问题的差异。
- en: How much information is conveyed by the host by intervening?
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 主持人通过干预传达了多少信息？
- en: A hand wavy explanation 👋 👋 is that this information may be visualised as the
    gap between the lines in the graph above. For *N*=3 we saw that the odds of winning
    doubled (nothing to sneeze at!), but that doesn’t register as strongly to our
    common sense intuition as the 99 factor as in the *N*=100.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一个手舞足蹈的解释 👋 👋 是，这个信息可以想象成上面图表中线条之间的差距。对于 *N*=3，我们看到获胜的概率翻倍（这可不是小数目！），但这并不像 *N*=100
    时的 99 倍那样强烈地触动我们的常识直觉。
- en: I have also considered describing stronger arguments from *Information Theory*
    that provide useful vocabulary to express communication of information. However,
    I feel that this fascinating field deserves a post of its own, which I’ve published.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我还考虑过描述来自 *信息论* 的更强论证，这些论证提供了有用的词汇来表达信息的交流。然而，我觉得这个迷人的领域值得一篇单独的文章，我已经发表了。
- en: 'The main takeaway for the Monty Hall problem is that I have calculated the
    information gain to be a logarithmic function of the number of doors *c* using
    this formula:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 对于蒙提霍尔问题的主要启示是，我使用这个公式计算了信息增益是门数 *c* 的对数函数：
- en: '![](../Images/4d9c4dcc4518336a5cc7102c52737609.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4d9c4dcc4518336a5cc7102c52737609.png)'
- en: Information Gain due to the intervention of the host 🎩 for a setup with c doors.
    Full details in my upcoming article.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 主持人干预 🎩 导致的信息增益。详细信息请见我即将发表的文章。
- en: For *c*=3 door case, e.g, the information gain is ⅔ bits (of a maximum possible
    1.58 bits). Full details are in this [article on entropy](https://medium.com/towards-data-science/quantifying-uncertainty-4814b759da5f).
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 *c*=3 门的情形，例如，信息增益是 ⅔ 比特（最大可能为 1.58 比特）。详细信息请参阅这篇关于熵的[文章](https://medium.com/towards-data-science/quantifying-uncertainty-4814b759da5f)。
- en: To summarise this section, we use basic probability arguments to quantify the
    probabilities of winning the prize showing the benefit of switching for all *N*
    door scenarios. For those interested in more formal solutions ⚔️ using Bayesian
    and Causality on the bottom I provide supplement sections.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 总结本节，我们使用基本的概率论来量化赢得奖品的概率，展示了在所有 *N* 门的场景中切换的好处。对于那些对更正式的解决方案感兴趣⚔️，我在底部提供了使用贝叶斯和因果关系的补充部分。
- en: In the next three final sections we’ll discuss how this problem was accepted
    in the general public back in the 1990s, discuss lessons learnt and then summarise
    how we can apply them in real-world settings.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的三个最终部分中，我们将讨论这个问题的解决方案在 1990 年代初期是如何被公众接受的，讨论学到的经验，然后总结我们如何在现实世界场景中应用它们。
- en: Being Confused Is OK 😕
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 感到困惑是正常的 😕
- en: '*“No, that is impossible, it should make no difference.” —* Paul Erdős'
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “不，这是不可能的，这应该没有区别。” — 保罗·埃尔德什
- en: If you still don’t feel comfortable with the solution of the *N*=3 Monty Hall
    problem, don’t worry you are in good company! According to Vazsonyi (1999)¹ even
    Paul Erdős who is considered “of the greatest experts in probability theory” was
    confounded until computer simulations were demonstrated to him.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仍然对 *N*=3 蒙提霍尔问题的解决方案感到不舒服，不要担心，你并不孤单！根据 Vazsonyi（1999）¹ 的研究，即使是被认为是“概率论最伟大的专家”的保罗·埃尔德什，直到计算机模拟演示给他看时才感到困惑。
- en: When the original solution by Steve Selvin (1975)² was popularised by Marilyn
    vos Savant in her column “Ask Marilyn” in *Parade* magazine in 1990 many readers
    wrote that Selvin and Savant were wrong³. According to Tierney’s 1991 article
    in the New York Times, this included about 10,000 readers, including nearly 1,000
    with Ph.D degrees⁴.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 当史蒂夫·塞尔文（1975）² 的原始解决方案在 1990 年由玛琳·沃斯·萨万特在《游行》杂志的“玛琳问玛琳”专栏中普及时，许多读者写信说塞尔文和萨万特是错误的³。根据
    Tierney 1991 年在《纽约时报》的文章，这包括大约 10,000 名读者，其中包括近 1,000 名拥有博士学位⁴。
- en: On a personal note, over a decade ago I was exposed to the standard *N*=3 problem
    and since then managed to forget the solution numerous times. When I learnt about
    the large *N* approach I was quite excited about how intuitive it was. I then
    failed to explain it to my technical manager over lunch, so this is an attempt
    to compensate. I still have the same day job 🙂.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 说到个人经历，十年前我接触到了标准的 *N*=3 问题，从那时起就多次忘记了解决方案。当我了解到大 *N* 方法时，我非常兴奋，因为它非常直观。然而，我在午餐时未能向我的技术经理解释清楚，所以这是我的补偿尝试。我仍然做着同样的日常工作
    :)。
- en: While researching this piece I realised that there is a lot to learn in terms
    of decision making in general and in particular useful for data science.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在研究这篇文章时，我意识到在决策方面有很多东西可以学习，特别是对数据科学非常有用。
- en: Lessons Learnt From Monty Hall Problem
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从蒙提霍尔问题中学到的经验
- en: 'In his book *Thinking Fast and Slow*, the late Daniel Kahneman, the co-creator
    of Behaviour Economics, suggested that we have two types of thought processes:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在他的著作《思考，快与慢》中，已故的丹尼尔·卡尼曼，行为经济学的共同创造者，提出了我们有两种思维过程：
- en: 'System 1 — fast thinking 🐇: based on intuition. This helps us react fast with
    confidence to familiar situations.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统 1 — 快速思考 🐇：基于直觉。这有助于我们快速自信地应对熟悉的情况。
- en: 'System 2 – slow thinking 🐢: based on deep thought. This helps figure out new
    complex situations that life throws at us.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统 2 – 慢速思考 🐢：基于深入思考。这有助于我们弄清楚生活中向我们抛来的新复杂情况。
- en: Assuming this premise, you might have noticed that in the above you were applying
    both.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 假设这个前提，你可能已经注意到在上文中你同时应用了两种（思维过程）。
- en: By examining the visual of *N*=100 doors your System 1 🐇 kicked in and you immediately
    knew the answer. I’m guessing that in the *N*=3 you were straddling between System
    1 and 2\. Considering that you had to stop and think a bit when going throughout
    the probabilities exercise it was definitely System 2 🐢.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 通过观察 *N*=100 门的视觉图，你的系统 1 🐇 立即启动，并立即知道了答案。我猜在 *N*=3 的情况下，你处于系统 1 和 2 之间。考虑到你在进行概率练习时不得不停下来思考，这肯定是系统
    2 🐢。
- en: '![](../Images/2d3ed2d7e4d349672a72e6330ef8e161.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2d3ed2d7e4d349672a72e6330ef8e161.png)'
- en: The decision maker’s struggle between System 1 🐰 and System 2 🐢. Generated using
    Gemini Imagen 3
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 决策者之间系统 1 🐰 和系统 2 🐢 的斗争。使用 Gemini Imagen 3 生成
- en: Beyond the fast and slow thinking I feel that there are a lot of data decision
    making lessons that may be learnt.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 除了快思考和慢思考之外，我认为还有很多数据决策的教训可以学习。
- en: (1) Assessing probabilities can be counter-intuitive …
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (1) 评估概率可能具有反直觉性……
- en: or
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 或
- en: Be comfortable with shifting to deep thought 🐢
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 舒适地转向深入思考 🐢
- en: We’ve clearly shown that in the *N*=3 case. As previously mentioned it confounded
    many people including prominent statisticians.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经清楚地展示了在 *N*=3 的情况下。正如之前提到的，这使许多人感到困惑，包括一些杰出的统计学家。
- en: Another classic example is *The Birthday Paradox* 🥳🎂, which shows how we underestimate
    the likelihood of coincidences. In this problem most people would think that one
    needs a large group of people until they find a pair sharing the same birthday.
    It turns out that all you need is 23 to have a 50% chance. And 70 for a 99.9%
    chance.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个经典的例子是 *生日悖论* 🥳🎂，它展示了我们如何低估巧合的可能性。在这个问题中，大多数人会认为需要一大群人才能找到一对共享同一天生日的人。结果是，你只需要23个人就有50%的机会，而70个人就有99.9%的机会。
- en: One of the most confusing paradoxes in the realm of data analysis is Simpson’s,
    which I detailed in a [previous article](https://medium.com/towards-data-science/mastering-simpsons-paradox-my-gateway-drug-to-causality-87e10b613a80).
    This is a situation where trends of a population may be reversed in its subpopulations.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析领域中最令人困惑的悖论之一是辛普森悖论，我在一篇 [之前的文章](https://medium.com/towards-data-science/mastering-simpsons-paradox-my-gateway-drug-to-causality-87e10b613a80)
    中详细介绍了它。这是一种趋势在总体中可能在其子群体中逆转的情况。
- en: The common with all these paradoxes is them requiring us to get comfortable
    to shifting gears ⚙️ from System 1 fast thinking 🐇 to System 2 slow 🐢. This is
    also the common theme for the lessons outlined below.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些悖论的共同之处在于它们要求我们习惯于从系统1快速思考 🐇 转向系统2慢 🐢。这也是下面概述的教训的共同主题。
- en: 'A few more classical examples are: The Gambler’s Fallacy 🎲, Base Rate Fallacy
    🩺 and the The Linda [bank teller] Problem 🏦. These are beyond the scope of this
    article, but I highly recommend looking them up to further sharpen ways of thinking
    about data.'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 一些更经典的例子包括：赌徒谬误 🎲、基础率谬误 🩺 和琳达 [银行出纳员] 问题 🏦。这些超出了本文的范围，但我强烈建议查找它们以进一步磨练关于数据思考的方式。
- en: (2) … especially when dealing with ambiguity
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (2) ……特别是在处理模糊性时
- en: or
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 或
- en: Search for clarity in ambiguity 🔎
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 在模糊中寻找清晰 🔎
- en: Let’s reread the problem, this time as stated in “Ask Marilyn”
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再次阅读这个问题，这次是按照“问玛丽莲”的表述
- en: '*Suppose you’re on a game show, and you’re given the choice of three doors:
    Behind one door is a car; behind the others, goats. You pick a door, say №1, and
    the host,* ***who knows what’s behind the doors, opens another door****, say №3,
    which has a goat. He then says to you, “Do you want to pick door №2?” Is it to
    your advantage to switch your choice?*'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '*假设你在一个游戏节目中，你有三个门可以选择：其中一个门后面是一辆车；其他门后面是山羊。你选择了一个门，比如说 №1，主持人* ***他知道门后面是什么，打开另一个门****，比如说
    №3，门后面有山羊。然后他对你说，“你想要选择门 №2 吗？”改变你的选择对你有利吗？*'
- en: We discussed that the most important piece of information is not made explicit.
    It says that the host “knows what’s behind the doors”, but not that they open
    a door at random, although it’s implicitly understood that the host will never
    open the door with the car.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 我们讨论了最重要的信息没有被明确指出。它说主持人“知道门后面是什么”，但没有说他们随机打开一个门，尽管隐含地理解主持人永远不会打开有车的门。
- en: Many real life problems in data science involve dealing with ambiguous demands
    as well as in data provided by stakeholders.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学中的许多实际问题涉及处理模糊的需求以及利益相关者提供的数据。
- en: It is crucial for the researcher to track down any relevant piece of information
    that is likely to have an impact and update that into the solution. Statisticians
    refer to this as “belief update”.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 对于研究人员来说，追踪任何可能产生影响的相关信息，并将其更新到解决方案中至关重要。统计学家将此称为“信念更新”。
- en: (3) With new information we should update our beliefs 🔁
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (3) 在获得新信息时，我们应该更新我们的信念 🔁
- en: This is the main aspect separating the Bayesian stream of thought to the Frequentist.
    The Frequentist approach takes data at face value (referred to as *flat priors*).
    The Bayesian approach incorporates prior beliefs and updates it when new findings
    are introduced. This is especially useful when dealing with ambiguous situations.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这是区分贝叶斯思维流派和频率主义的主要方面。频率主义方法直接接受数据（称为 *平坦先验*）。贝叶斯方法结合先验信念，并在引入新发现时更新它。这在处理模糊情况时特别有用。
- en: To drive this point home, let’s re-examine this figure comparing between the
    post intervention *N*=3 setups (top panel) and the *N*=100 one (bottom panel).
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这一点更加明确，让我们重新审视这个图，比较干预后的 *N*=3 设置（顶部面板）和 *N*=100 设置（底部面板）。
- en: '![](../Images/9c256192473a7a0be67cdace9b715a7f.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9c256192473a7a0be67cdace9b715a7f.png)'
- en: Copied from above. Post intervention settings for the N=3 setup (top) and N=100
    (bottom).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面复制。干预后的 N=3 设置（顶部）和 N=100（底部）。
- en: In both cases we had a prior belief that all doors had an equal chance of winning
    the prize *p*=1/N.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，我们事先都认为所有门赢得奖品的概率是相等的，即 *p*=1/N。
- en: Once the host opened one door (*N*=3; or 98 doors when *N*=100) a lot of valuable
    information was revealed whereas in the case of *N*=100 it was much more apparent
    than *N*=3.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 当主持人打开了一扇门 (*N*=3；或者当 *N*=100 时的 98 道门) 时，揭示了大量的有价值信息，而在 *N*=100 的情况下，这些信息比
    *N*=3 时更为明显。
- en: In the Frequentist approach, however, most of this information would be ignored,
    as it only focuses on the two closed doors. The Frequentist conclusion, hence
    is a 50% chance to win the prize regardless of what else is known about the situation.
    Hence the Frequentist takes Paul Erdős’“no difference” point of view, which we
    now know to be incorrect.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在频率主义方法中，大部分这些信息都会被忽略，因为它只关注两扇关闭的门。因此，频率主义者的结论是，无论其他关于情况的信息如何，赢得奖品的概率都是 50%。因此，频率主义者采取了保罗·埃尔德什的“没有区别”的观点，我们现在知道这是不正确的。
- en: This would be reasonable if all that was presented were the two doors and not
    the intervention and the goats. However, if that information is presented, one
    should shift gears into System 2 thinking and update their beliefs in the system.
    This is what we have done by focusing not only on the shut door, but rather consider
    what was learnt about the system at large.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 如果展示的只是两扇门，而不是干预和山羊，这是合理的。然而，如果提供了这些信息，就应该切换到系统 2 思维，并更新系统中的信念。这就是我们通过不仅关注关闭的门，而是考虑关于整个系统的学习所做的事情。
- en: For the brave hearted ⚔️, in a supplementary section below called **The Bayesian
    Point of View** I solve for the Monty Hall problem using the Bayesian formalism.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 对于勇敢的人 ⚔️，在下面的补充部分称为**贝叶斯观点**中，我使用贝叶斯形式解决了蒙提霍尔问题。
- en: (4) Be one with subjectivity 🧘
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (4) 与主观性合而为一 🧘
- en: The Frequentist main reservation about “going Bayes” is that — “statistics should
    be objective”.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 经验主义者在“转向贝叶斯”方面的主要保留意见是——“统计学应该是客观的”。
- en: The Bayesian response is — the Frequentist’s also apply a prior without realising
    it — a flat one.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 贝叶斯派的回应是——频率主义者也在不知不觉中应用了一个先验，那就是一个平坦的先验。
- en: Regardless of the Bayesian/Frequentist debate, as researchers we try our best
    to be as objective as possible in every step of the analysis.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 不论是贝叶斯派还是频率主义派的争论，作为研究人员，我们尽力在分析的每一步都尽可能客观。
- en: That said, it is inevitable that subjective decisions are made throughout.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，主观决策是不可避免的。
- en: E.g, in a skewed distribution should one quote the mean or median? It highly
    depends on the context and hence a subjective decision needs to be made.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在一个偏斜分布中，应该引用平均值还是中位数？这高度取决于上下文，因此需要做出主观的决定。
- en: The responsibility of the analyst is to provide justification for their choices
    first to convince themselves and then their stakeholders.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 分析师的责任是首先为自己的选择提供合理的解释，以说服自己和利益相关者。
- en: (5) When confused — look for a useful analogy
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (5) 当感到困惑时——寻找有用的类比
- en: … but tread with caution ⚠️
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: …但需谨慎行事 ⚠️
- en: We saw that by going from the *N*=3 setup to the *N*=100 the solution was apparent.
    This is a trick scientists frequently use — if the problem appears at first a
    bit too confusing/overwhelming, break it down and try to find a useful analogy.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到，从 *N*=3 设置到 *N*=100 设置，解决方案是显而易见的。这是科学家经常使用的一个技巧——如果问题一开始看起来有点令人困惑/压倒性，就将其分解，并尝试找到一个有用的类比。
- en: It is probably not a perfect comparison, but going from the *N*=3 setup to *N*=100
    is like examining a picture from up close and zooming out to see the big picture.
    Think of having only a puzzle piece 🧩 and then glancing at the jigsaw photo on
    the box.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能不是一个完美的比较，但从 *N*=3 的设置到 *N*=100 的设置，就像是从近距离检查一张图片，然后放大以看到整体画面。想象一下，你只有一片拼图
    🧩，然后瞥了一眼盒子上的拼图照片。
- en: '![](../Images/e17ce4b147ca661e5bbede69eaa03ee3.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e17ce4b147ca661e5bbede69eaa03ee3.png)'
- en: 'Monty Hall in 1976\. Credit: [Wikipedia](https://upload.wikimedia.org/wikipedia/commons/4/48/Monty_hall_abc_tv.JPG)
    and using [Visual Paradigm Online](https://online.visual-paradigm.com/) for the
    puzzle effect'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 1976年的蒙提霍尔问题。来源：[维基百科](https://upload.wikimedia.org/wikipedia/commons/4/48/Monty_hall_abc_tv.JPG)
    和使用 [Visual Paradigm Online](https://online.visual-paradigm.com/) 来实现谜题效果
- en: 'Note: whereas analogies may be powerful, one should do so with caution, not
    to oversimplify. Physicists refer to this situation as the spherical cow 🐮 method,
    where models may oversimplify complex phenomena.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：虽然类比可能很强大，但应该谨慎使用，不要过度简化。物理学家将这种情况称为“球形牛”方法，其中模型可能会过度简化复杂现象。
- en: I admit that even with years of experience in applied statistics at times I
    still get confused at which method to apply. A large part of my thought process
    is identifying analogies to known solved problems. Sometimes after making progress
    in a direction I will realise that my assumptions were wrong and seek a new direction.
    I used to quip with colleagues that they shouldn’t trust me before my third attempt
    …
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我承认，即使有多年应用统计学的经验，有时我仍然会困惑于应该使用哪种方法。我思考过程的大部分是识别与已知已解决的问题的类比。有时在某个方向上取得进展后，我会意识到我的假设是错误的，并寻求新的方向。我过去经常和同事们开玩笑说，在我第三次尝试之前，他们不应该相信我……
- en: (6) Simulations are powerful but not always necessary 🤖
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (6) 模拟很强大，但并非总是必要的 🤖
- en: It’s interesting to learn that Paul Erdős and other mathematicians were convinced
    only after seeing simulations of the problem.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，保罗·埃尔德什和其他数学家只有在看到问题的模拟后才会确信。
- en: I am two-minded about usage of simulations when it comes to problem solving.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在解决问题时，我对使用模拟的态度是矛盾的。
- en: On the one hand simulations are powerful tools to analyse complex and intractable
    problems. Especially in real life data in which one wants a grasp not only of
    the underlying formulation, but also stochasticity.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 一方面，模拟是分析复杂和难以处理问题的强大工具。特别是在现实生活中，人们不仅想要掌握基本公式，还想要了解随机性。
- en: And here is the big BUT — if a problem can be analytically solved like the Monty
    Hall one, simulations as fun as they may be (such as the MythBusters have done⁶),
    may not be necessary.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，这里有一个大问题——如果一个问题可以像蒙提霍尔问题那样通过分析解决，那么即使模拟很有趣（比如MythBusters所做的⁶），可能也不是必要的。
- en: According to Occam’s razor, all that is required is a brief intuition to explain
    the phenomena. This is what I attempted to do here by applying common sense and
    some basic probability reasoning. For those who enjoy deep dives I provide below
    supplementary sections with two methods for analytical solutions — one using Bayesian
    statistics and another using Causality.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 根据奥卡姆剃刀原理，解释现象只需要简短的直觉。这正是我在这里通过运用常识和一些基本的概率推理所尝试做的。对于那些喜欢深入研究的人来说，我下面提供了两个分析方法，一个使用贝叶斯统计，另一个使用因果关系。
- en: '***[Update]** After publishing the first version of this article there was
    a comment that Savant’s solution³ may be simpler than those presented here. I
    revisited her communications and agreed that it should be added. In the process
    I realised three more lessons may be learnt.*'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '***[更新]** 在发布本文的第一版之后，有人评论说Savant的解决方案³可能比这里提出的更简单。我重新审视了她的交流，并同意应该添加。在这个过程中，我意识到还有三个教训可以学习。'
- en: (7) A well designed visual goes a long way 🎨
  id: totrans-156
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (7) 一个设计良好的视觉效果可以走很长的路 🎨
- en: 'Continuing the principle of Occam’s razor, Savant explained³ quite convincingly
    in my opinion:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 继续遵循奥卡姆剃刀原理，Savant在³我的观点中相当有说服力地解释了：
- en: '*You should switch. The first door has a 1/3 chance of winning, but the second
    door has a 2/3 chance. Here’s a good way to visualize what happened. Suppose there
    are a million doors, and you pick door #1\. Then the host, who knows what’s behind
    the doors and will always avoid the one with the prize, opens them all except
    door #777,777\. You’d switch to that door pretty fast, wouldn’t you?*'
  id: totrans-158
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*你应该换门。第一个门有1/3的获胜机会，但第二个门有2/3的获胜机会。这是一个很好的可视化方法。假设有一百万扇门，你选择了门#1。然后主持人，他知道门后面是什么，并且总是会避开有奖品的门，打开了除了门#777,777之外的所有门。你很快就会换到那扇门，不是吗？*'
- en: Hence she provided an abstract visual for the readers. I attempted to do the
    same with the 100 doors figures.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，她为读者提供了一个抽象的视觉图。我也尝试用100扇门的情况做了同样的事情。
- en: '![](../Images/50d3b6d0a2d94580d013117dceffd41c.png)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/50d3b6d0a2d94580d013117dceffd41c.png)'
- en: 'Marilyn vos Savant who popularised the Monty Hall Problem. [Credit: Ben David
    on Flickr](https://www.flickr.com/photos/156235789@N02/41959101350) under [license](https://creativecommons.org/licenses/by-sa/2.0/#ref-appropriate-credit)'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 马里琳·沃斯·萨凡特，她普及了蒙提霍尔问题。[来源：Ben David on Flickr](https://www.flickr.com/photos/156235789@N02/41959101350)
    在 [许可](https://creativecommons.org/licenses/by-sa/2.0/#ref-appropriate-credit)
    下
- en: As mentioned many readers, and especially with backgrounds in maths and statistics,
    still weren’t convinced.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 如许多读者所提到的，尤其是那些有数学和统计学背景的读者，仍然没有信服。
- en: 'She revised³ with another mental image:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 她用另一个心理图像进行了修订：
- en: '*The benefits of switching are readily proven by playing through the six games
    that exhaust all the possibilities. For the first three games, you choose #1 and
    “switch” each time, for the second three games, you choose #1 and “stay” each
    time, and the host always opens a loser. Here are the results.*'
  id: totrans-164
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*通过玩六次游戏，可以轻易证明切换的好处。对于前三次游戏，你每次都选择#1并“切换”，对于后三次游戏，你每次都选择#1并“留下”，主持人总是打开一个输家。以下是结果。*'
- en: She added a table with all the scenarios. I took some artistic liberty and created
    the following figure. As indicated, the top batch are the scenarios in which the
    trader switches and the bottom when they switch. Lines in green are games which
    the trader wins, and in red when they get zonked. The 👇 symbolised the door chosen
    by the trader and Monte Hall then chooses a different door that has a goat 🐐 behind
    it.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 她增加了一个包含所有场景的表格。我发挥了一些艺术想象力，创作了以下图表。如图所示，顶部批次是交易者切换的场景，底部是他们不切换的场景。绿色线条代表交易者赢得的游戏，红色线条代表他们输掉的游戏。👇符号代表交易者选择的门，蒙提霍尔随后选择一个有山羊🐐的不同的门。
- en: '![](../Images/6fdffad001384e3dcf8e9a9fc53eb278.png)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6fdffad001384e3dcf8e9a9fc53eb278.png)'
- en: Adaptation of Savant’s table³ of six scenarios that shows the solution to the
    Monty Hall Problem
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 对萨凡特六种场景表的改编，展示了蒙提霍尔问题的解决方案
- en: We clearly see from this diagram that the switcher has a ⅔ chance of winning
    and those that stay only ⅓.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个图中，我们可以清楚地看到，切换者有三分之二的获胜机会，而坚持者只有三分之一的获胜机会。
- en: This is yet another elegant visualisation that clearly explains the non intuitive.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 这又是一个优雅的视觉化，清楚地解释了非直观的内容。
- en: It strengthens the claim that there is no real need for simulations in this
    case because all they would be doing is rerunning these six scenarios.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 这加强了这样一个论点：在这种情况下，实际上并不需要模拟，因为所有他们要做的就是重新运行这六种场景。
- en: One more popular solution is decision tree illustrations. You can find these
    in the Wikipedia page, but I find it’s a bit redundant to Savant’s table.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种更受欢迎的解决方案是决策树图示。你可以在维基百科页面上找到这些，但我发现它对萨凡特的表格来说有点冗余。
- en: 'The fact that we can solve this problem in so many ways yields another lesson:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用这么多方式解决这个问题的事实，又给我们带来了另一个教训：
- en: (8) There are many ways to skin a … problem 🐈
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (8) 解决问题有很多方法 🐈
- en: Of the many lessons that I have learnt from the writings of late Richard Feynman,
    one of the best physics and ideas communicators, is that a problem can be solved
    many ways. Mathematicians and Physicists do this all the time.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 从已故理查德·费曼的著作中，我学到了许多教训，他是最好的物理和思想传播者之一，其中之一就是问题可以用多种方式解决。数学家和物理学家一直在这样做。
- en: 'A relevant quote that paraphrases Occam’s razor:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 一句引用奥卡姆剃刀原理的恰当引言：
- en: If you can’t explain it simply, you don’t understand it well enough — attributed
    to Albert Einstein
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不能简单解释它，说明你对它理解得还不够充分——据说是爱因斯坦说的
- en: And finally
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 最后
- en: (9) Embrace ignorance and be humble 🤷‍♂
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (9) 接受无知，保持谦卑 🤷‍♂
- en: '*“You are utterly incorrect … How many irate mathematicians are needed to get
    you to change your mind?”* — Ph.D from Georgetown University'
  id: totrans-179
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“你完全错了……需要多少愤怒的数学家才能让你改变主意？”* — 乔治敦大学博士'
- en: '*“May I suggest that you obtain and refer to a standard textbook on probability
    before you try to answer a question of this type again?”* — Ph.D from University
    of Florida'
  id: totrans-180
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“在你再次尝试回答这类问题之前，我建议你先获取并参考一本关于概率的标准教科书。”* — 佛罗里达大学博士'
- en: '*“You’re in error, but Albert Einstein earned a dearer place in the hearts
    of people after he admitted his errors.”* — Ph.D. from University of Michigan'
  id: totrans-181
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“你错了，但阿尔伯特·爱因斯坦在承认错误后，在人们心中的地位更加崇高。”* — 密歇根大学博士'
- en: Ouch!
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: ouch！
- en: These are some of the said responses from mathematicians to the Parade article.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是一些数学家对《游行》文章的回应。
- en: Such unnecessary viciousness.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这种不必要的恶意。
- en: 'You can check the reference³ to see the writer’s names and other like it. To
    whet your appetite: “You blew it, and you blew it big!”, , “You made a mistake,
    but look at the positive side. If all those Ph.D.’s were wrong, the country would
    be in some very serious trouble.”, “I am in shock that after being corrected by
    at least three mathematicians, you still do not see your mistake.”.'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过查看参考文献³来了解作者的姓名和其他类似内容。为了激发您的兴趣：“您搞砸了，而且是大搞砸了！”，，“您犯了一个错误，但看看积极的一面。如果所有那些博士都错了，国家会陷入一些非常严重的麻烦。”，“我震惊的是，在至少三位数学家的纠正后，您仍然没有看到您的错误。”。
- en: 'And as expected from the 1990s perhaps the most embarrassing one was from a
    resident of Oregon:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，从20世纪90年代来看，最令人尴尬的可能是一位俄勒冈州居民的例子：
- en: '*“Maybe women look at math problems differently than men.”*'
  id: totrans-187
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“也许女性看待数学问题的方式与男性不同。”*'
- en: These make me cringe and be embarrassed to be associated by gender and Ph.D.
    title with these graduates and professors.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 这些让我感到尴尬，并因性别和博士头衔与这些毕业生和教授联系在一起而感到羞愧。
- en: Hopefully in the 2020s most people are more humble about their ignorance. [Yuval
    Noah Harari](https://medium.com/u/8a6d8f1fc05c?source=post_page---user_mention--a6032f4b1032---------------------------------------)
    discusses the fact that the Scientific Revolution of Galileo Galilei et al. was
    not due to knowledge but rather admittance of ignorance.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 希望在2020年代，大多数人都会更加谦逊地对待自己的无知。[尤瓦尔·赫拉利](https://medium.com/u/8a6d8f1fc05c?source=post_page---user_mention--a6032f4b1032---------------------------------------)讨论了伽利略·伽利莱等人的科学革命不是由于知识，而是由于承认无知的事实。
- en: “The great discovery that launched the Scientific Revolution was the discovery
    that humans do not know the answers to their most important questions” — [Yuval
    Noah Harari](https://medium.com/u/8a6d8f1fc05c?source=post_page---user_mention--a6032f4b1032---------------------------------------)
  id: totrans-190
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “科学革命中的一项伟大发现是，人类不知道他们最重要问题的答案”——[尤瓦尔·赫拉利](https://medium.com/u/8a6d8f1fc05c?source=post_page---user_mention--a6032f4b1032---------------------------------------)
- en: 'Fortunately for mathematicians’ image, there were also quiet a lot of more
    enlightened comments. I like this one from one [Seth Kalson, Ph.D.](https://www.linkedin.com/in/szkalson/)
    of MIT:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，对于数学家的形象来说，也有很多更加开明的评论。我喜欢麻省理工学院的一位[塞思·卡尔森，博士](https://www.linkedin.com/in/szkalson/)的这条评论：
- en: '*You are indeed correct. My colleagues at work had a ball with this problem,
    and I dare say that most of them, including me at first, thought you were wrong!*'
  id: totrans-192
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*您确实是对的。我工作中的同事们对这个问题非常感兴趣，我敢说他们中的大多数，包括我最初，都认为你是错的！*'
- en: We’ll summarise by examining how, and if, the Monty Hall problem may be applied
    in real-world settings, so you can try to relate to projects that you are working
    on.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将通过检查蒙提霍尔问题如何在现实世界中应用，以及是否可以应用，来总结，这样您就可以尝试将其与您正在从事的项目联系起来。
- en: Application in Real World Settings
  id: totrans-194
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在现实世界中的应用
- en: <mdspan datatext="el1747338601095" class="mdspan-comment">Researching</mdspan>
    for this article I found that beyond artificial setups for entertainment⁶ ⁷ there
    aren’t practical settings for this problem to use as an analogy. Of course, I
    may be wrong⁸ and would be glad to hear if you know of one.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747338601095" class="mdspan-comment">研究</mdspan>这篇文章时，我发现除了为了娱乐的人工设置⁶⁷之外，没有实际的环境可以用来类比这个问题。当然，我可能错了⁸，如果您知道的话，我很乐意听到。
- en: One way of assessing the viability of an analogy is using arguments from causality
    which provides vocabulary that cannot be expressed with standard statistics.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 评估类比可行性的一个方法是通过因果关系的论证，这提供了一些不能用标准统计学表达的语言。
- en: In a [previous post](https://medium.com/data-science/%EF%B8%8F-start-asking-your-data-why-a-gentle-intro-to-causality-47142d5ec96a)
    I discussed the fact that the story behind the data is as important as the data
    itself. In particular Causal Graph Models visualise the story behind the data,
    which we will use as a framework for a reasonable analogy.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 在一篇[之前的帖子](https://medium.com/data-science/%EF%B8%8F-start-asking-your-data-why-a-gentle-intro-to-causality-47142d5ec96a)中，我讨论了数据背后的故事与数据本身一样重要。特别是因果图模型可以可视化数据背后的故事，我们将以此作为合理类比的基础框架。
- en: 'For the Monty Hall problem we can build a Causal Graph Model like this:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 对于蒙提霍尔问题，我们可以构建一个类似于这样的因果图模型：
- en: '![](../Images/c5ce4672a86329ea3ef049ef4762c07c.png)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c5ce4672a86329ea3ef049ef4762c07c.png)'
- en: 'Reading:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读：
- en: The door chosen by the trader☝️ is independent from that with the prize 🚗 and
    vice versa. As important, there is no common cause between them that might generate
    a spurious correlation.
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 交易者选择的门与奖品🚗的门是独立的，反之亦然。同样重要的是，它们之间没有共同的原因，这可能会产生虚假的相关性。
- en: The host’s choice 🎩 depends on both ☝️ and 🚗.
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主持人的选择 🎩取决于☝️和🚗。
- en: By comparing causal graphs of two systems one can get a sense for how analogous
    both are. A perfect analogy would require more details, but this is beyond the
    scope of this article. Briefly, one would want to ensure similar functions between
    the parameters (referred to as the *Structural Causal Model;* for details see
    in the supplementary section below called **➡️ The Causal Point of View**).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 通过比较两个系统的因果图，可以了解它们是如何相似的。一个完美的类比需要更多细节，但这超出了本文的范围。简而言之，人们会希望确保参数之间有相似的功能（被称为*结构因果模型；*有关详细信息，请参阅下文补充部分称为**➡️因果视角**）。
- en: Those interested in learning further details about using Causal Graphs Models
    to assess causality in real world problems may be interested in [this article](https://medium.com/towards-data-science/causality-mental-hygiene-for-data-science-b7efc302eb72?source=user_profile_page---------5-------------5ff5dbdb1017----------------------).
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 对学习如何使用因果图模型来评估现实世界问题中的因果关系感兴趣的人可能会对[这篇文章](https://medium.com/towards-data-science/causality-mental-hygiene-for-data-science-b7efc302eb72?source=user_profile_page---------5-------------5ff5dbdb1017----------------------)感兴趣。
- en: Anecdotally it is also worth mentioning that on Let’s Make a Deal, Monty himself
    has admitted years later to be playing mind games with the contestants and did
    not always follow the rules, e.g, not always doing the intervention as “it all
    depends on his mood”⁴.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 根据轶事，也值得提一下，在“让我们来交易”节目中，蒙提自己多年后承认曾与参赛者玩心理游戏，并不总是遵循规则，例如，并不总是按照“这完全取决于他的心情”进行干预⁴。
- en: In our setup we assumed perfect conditions, i.e., a host that does not skew
    from the script and/or play on the trader’s emotions. Taking this into consideration
    would require updating the Graphical Model above, which is beyond the scope of
    this article.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的设置中，我们假设了完美的条件，即一个不会偏离脚本并且/或者不会玩弄交易者情绪的主持人。考虑到这一点，需要更新上面的图形模型，但这超出了本文的范围。
- en: Some might be disheartened to realise at this stage of the post that there might
    not be real world applications for this problem.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 一些人在意识到在文章的这个阶段，这个问题可能没有真正的实际应用时可能会感到沮丧。
- en: I argue that lessons learnt from the Monty Hall problem definitely are.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为从蒙提霍尔问题中学到的教训无疑是。
- en: 'Just to summarise them again:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 只是为了再次总结它们：
- en: (1) Assessing probabilities can be counter intuitive …
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: (1) 评估概率可能具有反直觉性……
- en: (Be comfortable with shifting to deep thought 🐢)
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: (Be comfortable with shifting to deep thought 🐢)
- en: (2) … especially when dealing with ambiguity
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: (2) ……尤其是在处理含糊不清的情况时
- en: (Search for clarity 🔎)
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: (Search for clarity 🔎)
- en: (3) With new information we should update our beliefs 🔁
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: (3) 在获得新信息后，我们应该更新我们的信念 🔁
- en: (4) Be one with subjectivity 🧘
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: (4) 与主观性合为一体 🧘
- en: (5) When confused — look for a useful analogy … but tread with caution ⚠️
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: (5) 当感到困惑时——寻找有用的类比……但要注意谨慎⚠️
- en: (6) Simulations are powerful but not always necessary 🤖
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: (6) 模拟很强大，但并非总是必要的 🤖
- en: (7) A well designed visual goes a long way 🎨
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: (7) 一个设计良好的视觉可以走很长的路 🎨
- en: (8) There are many ways to skin a … problem 🐈
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: (8) 解决问题的方法有很多种 🐈
- en: (9) Embrace ignorance and be humble 🤷‍♂
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: (9) 接受无知并保持谦逊 🤷‍♂
- en: While the Monty Hall Problem might seem like a simple puzzle, it offers valuable
    insights into decision-making, particularly for data scientists. The problem highlights
    the importance of going beyond intuition and embracing a more analytical, data-driven
    approach. By understanding the principles of Bayesian thinking and updating our
    beliefs based on new information, we can make more informed decisions in many
    aspects of our lives, including data science. The Monty Hall Problem serves as
    a reminder that even seemingly straightforward scenarios can contain hidden complexities
    and that by carefully examining available information, we can uncover hidden truths
    and make better decisions.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然蒙提霍尔问题可能看起来像是一个简单的谜题，但它为决策提供了宝贵的见解，尤其是对于数据科学家。这个问题强调了超越直觉并接受更分析性、数据驱动的方法的重要性。通过理解贝叶斯思维的原则并根据新信息更新我们的信念，我们可以在生活的许多方面做出更明智的决定，包括数据科学。蒙提霍尔问题提醒我们，即使是看似简单的情况也可能包含隐藏的复杂性，并且通过仔细检查可用信息，我们可以揭示隐藏的真相并做出更好的决策。
- en: At the bottom of the article I provide a list of resources that I found useful
    to learn about this topic.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 在文章的底部，我提供了一份资源列表，这些资源对我学习这个主题非常有用。
- en: '![](../Images/edcb32c0ac23db0d2976dc284e482543.png)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/edcb32c0ac23db0d2976dc284e482543.png)'
- en: 'Credit: [Wikipedia](https://upload.wikimedia.org/wikipedia/commons/1/17/Star_of_Monty_Hall.jpg)'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 信用：[维基百科](https://upload.wikimedia.org/wikipedia/commons/1/17/Star_of_Monty_Hall.jpg)
- en: Loved this post? 💌 Join me on [LinkedIn](https://www.linkedin.com/in/eyal-kazin)
    or ☕ [Buy me a coffee](http://buymeacoffee.com/zurdo)!
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 喜欢这篇帖子？💌 加入我[LinkedIn](https://www.linkedin.com/in/eyal-kazin)或☕[买我一杯咖啡](http://buymeacoffee.com/zurdo)！
- en: Credits
  id: totrans-226
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 致谢
- en: Unless otherwise noted, all images were created by the author.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 除非另有说明，所有图像均由作者创建。
- en: Many thanks to [Jim Parr](about:blank), [Will Reynolds](https://www.linkedin.com/in/reynoldswilliam/),
    and [Betty Kazin](https://www.linkedin.com/in/betty-kazin-68711812/) for their
    useful comments.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢[Jim Parr](about:blank)、[Will Reynolds](https://www.linkedin.com/in/reynoldswilliam/)和[Betty
    Kazin](https://www.linkedin.com/in/betty-kazin-68711812/)提供的宝贵意见。
- en: 'In the following supplementary sections ⚔️ I derive solutions to the Monty
    Hall’s problem from two perspectives:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下补充部分 ⚔️，我从两个角度推导出蒙提霍尔问题的解决方案：
- en: Bayesian
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 贝叶斯
- en: Causal
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 因果
- en: 'Both are motivated by questions in textbook: *Causal Inference in Statistics
    A Primer* by Judea Pearl, Madelyn Glymour, and Nicholas P. Jewell (2016).'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 这两者都源于教科书中的问题：Judea Pearl、Madelyn Glymour和Nicholas P. Jewell（2016年）所著的《统计学因果推断入门》。
- en: 'Supplement 1: The Bayesian Point of View'
  id: totrans-233
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 补充1：贝叶斯观点
- en: 'This section assumes a basic understanding of Bayes’ Theorem, in particular
    being comfortable conditional probabilities. In other words if this makes sense:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 本节假设对贝叶斯定理有基本的了解，特别是对条件概率感到舒适。换句话说，如果这有意义的话：
- en: '![](../Images/debad949434afecda1d90bbdecd37f91.png)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/debad949434afecda1d90bbdecd37f91.png)'
- en: We set out to use Bayes’ theorem to prove that switching doors improves chances
    in the *N*=3 Monty Hall Problem. (Problem **1.3.3** of the Primer textbook.)
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 我们着手使用贝叶斯定理来证明换门可以提高在*N*=3的蒙提霍尔问题中的机会。（入门教科书的问题**1.3.3**）
- en: '![](../Images/c256a8a03c9bac0b73f4e4f3d90a27b6.png)'
  id: totrans-237
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c256a8a03c9bac0b73f4e4f3d90a27b6.png)'
- en: We define
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 我们定义
- en: '*X* — the chosen door ☝️'
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*X* — 选择的大门 ☝️'
- en: '*Y*— the door with the prize 🚗'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Y*— 奖品🚗所在的门'
- en: '*Z* — the door opened by the host 🎩'
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Z* — 主持人打开的门 🎩'
- en: 'Labelling the doors as A, B and C, without loss of generality, we need to solve
    for:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 将门标记为A、B和C，不失一般性，我们需要求解：
- en: '![](../Images/267a9d6d4f143ba9f19d8cd26550e4f3.png)'
  id: totrans-243
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/267a9d6d4f143ba9f19d8cd26550e4f3.png)'
- en: Using Bayes’ theorem we equate the left side as
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 使用贝叶斯定理，我们将左侧等式为
- en: '![](../Images/0628b64cc19d1a38bf8d2f7a536ade04.png)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0628b64cc19d1a38bf8d2f7a536ade04.png)'
- en: 'and the right one as:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 并且将右侧等式为：
- en: '![](../Images/76ed70d1453977d5d97ec34390ea523f.png)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/76ed70d1453977d5d97ec34390ea523f.png)'
- en: 'Most components are equal (remember that *P(Y=*A*)*=*P(Y=*B*)*=⅓ so we are
    left to prove:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数组件是相等的（记住*P(Y=A)*=*P(Y=B)*=⅓，所以我们只剩下证明：
- en: '![](../Images/bff151ef6807d4de83c1e88c2783b065.png)'
  id: totrans-249
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bff151ef6807d4de83c1e88c2783b065.png)'
- en: In the case where *Y=B* (the prize 🚗 is behind door B 🚪), the host has only
    one choice (can only select door C 🚪), making P(X=A, Z=C|Y=B)= 1.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 在*Y=B*（奖品🚗在门B🚪后面）的情况下，主持人只有一个选择（只能选择门C🚪），使得P(X=A, Z=C|Y=B)= 1。
- en: In the case where *Y=A* (the prize 🚗 is behind door A ☝️), the host has two
    choices (doors B 🚪 and C 🚪) , making P(X=A, Z=C|Y=A)= 1/2.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 在*Y=A*（奖品🚗在门A ☝️后面）的情况下，主持人有两个选择（门B 🚪和门C 🚪），使得P(X=A, Z=C|Y=A)= 1/2。
- en: 'From here:'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里：
- en: '![](../Images/6abb0ee39df9c4545120e42b1a7e915e.png)'
  id: totrans-253
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6abb0ee39df9c4545120e42b1a7e915e.png)'
- en: '**Q**uod **e**rat **d**emonstrandum.'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: '**Q**uod **e**rat **d**emonstrandum.'
- en: 'Note: if the “host choices” arguments didn’t make sense look at the table below
    showing this explicitly. You will want to compare entries {***X*****=A,** ***Y*****=B,**
    ***Z*****=C}** and {***X*****=A,** ***Y*****=A,** ***Z*****=C}**.'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：如果“主持人选择”的论点没有意义，请查看下表，其中明确显示了这一点。您将想要比较条目{***X*****=A，***Y*****=B，***Z*****=C}**和{***X*****=A，***Y*****=A，***Z*****=C}**。
- en: 'Supplement 2: The Causal Point of View ➡️'
  id: totrans-256
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 补充2：因果观点 ➡️
- en: 'The section assumes a basic understanding of Directed Acyclic Graphs (DAGs)
    and Structural Causal Models (SCMs) is useful, but not required. In brief:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 本节假设对有向无环图（DAGs）和结构因果模型（SCMs）有基本的了解是有用的，但不是必需的。简而言之：
- en: DAGs qualitatively visualise the causal relationships between the parameter
    nodes.
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有向无环图（DAGs）定性可视化参数节点之间的因果关系。
- en: SCMs quantitatively express the formula relationships between the parameters.
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结构因果模型（SCMs）定量地表达了参数之间的公式关系。
- en: Given the DAG
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 给定有向无环图（DAG）
- en: '![](../Images/c5ce4672a86329ea3ef049ef4762c07c.png)'
  id: totrans-261
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c5ce4672a86329ea3ef049ef4762c07c.png)'
- en: we are going to define the SCM that corresponds to the classic *N*=3 Monty Hall
    problem and use it to describe the joint distribution of all variables. We later
    will generically expand to *N*. (Inspired by problem **1.5.4** of the Primer textbook
    as well as its brief mention of the *N* door problem.)
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将定义与经典 *N*=3 摩纳哥大厅问题相对应的 SCM，并使用它来描述所有变量的联合分布。我们稍后将普遍扩展到 *N*。 (受《入门》教材中问题
    **1.5.4** 以及对其 *N* 门问题的简要提及的启发。)
- en: We define
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 我们定义
- en: '*X* — the chosen door ☝️'
  id: totrans-264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*X* — 被选中的门 ☝️'
- en: '*Y* — the door with the prize 🚗'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Y* — 奖品 🚗 所在的门'
- en: '*Z* — the door opened by the host 🎩'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Z* — 主持人 🎩 打开的大门'
- en: 'According to the DAG we see that according to the chain rule:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们看到的 DAG，根据链式法则：
- en: '![](../Images/9e14e9d2dac3363b1552562725ff88bd.png)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9e14e9d2dac3363b1552562725ff88bd.png)'
- en: 'The SCM is defined by exogenous variables *U* , endogenous variables *V*, and
    the functions between them *F*:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: SCM 由外生变量 *U*，内生变量 *V* 以及它们之间的函数 *F* 定义：
- en: '*U = {X,Y}*, *V={Z}*, *F= {f(Z)}*'
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*U = {X,Y}*, *V={Z}*, *F= {f(Z)}*'
- en: 'where *X*, *Y* and *Z* have door values:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *X*，*Y* 和 *Z* 有门值：
- en: '*D = {A, B, C}*'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*D = {A, B, C}*'
- en: 'The host choice 🎩 is *f(Z)* definedas:'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 主持人选择 🎩 定义为 *f(Z)*：
- en: '![](../Images/ca422c9ce74191a2a97631757ea309d7.png)'
  id: totrans-274
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ca422c9ce74191a2a97631757ea309d7.png)'
- en: 'In order to generalise to *N* doors, the DAG remains the same, but the SCM
    requires to update D to be a set of *N* doors Dᵢ: {*D*₁, *D*₂, … *D*ₙ}.'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 为了推广到 *N* 个门，DAG 保持不变，但 SCM 需要更新 D 以成为一组 *N* 个门 Dᵢ：{*D*₁, *D*₂, … *D*ₙ}。
- en: '**Exploring Example Scenarios**'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: '**探索示例场景**'
- en: 'To gain an intuition for this SCM, let’s examine 6 examples of 27 (=3³) :'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得对这个 SCM 的直觉，让我们考察 27 (=3³) 的 6 个示例：
- en: When *X*=*Y* (i.e., the prize 🚗 **is** behind the chosen door ☝️)
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 当 *X*=*Y*（即，奖品 🚗 **在** 被选中的门 ☝️ 后面）
- en: '*P(Z=A|X=A, Y=A)* = 0; 🎩 cannot choose the participant’s door ☝️'
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*P(Z=A|X=A, Y=A)* = 0; 🎩 不能选择参与者的门 ☝️'
- en: '*P(Z=B|X=A, Y=A)* = 1/2; 🚗 is behind ☝️ → 🎩 chooses B at 50%'
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*P(Z=B|X=A, Y=A)* = 1/2; 🚗 在 ☝️ → 🎩 以 50% 的概率选择 B'
- en: '*P(Z=C|X=A, Y=A)* = 1/2; 🚗 is behind ☝️ → 🎩 chooses C at 50%'
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*P(Z=C|X=A, Y=A)* = 1/2; 🚗 在 ☝️ → 🎩 以 50% 的概率选择 C'
- en: (complementary to the above)
  id: totrans-282
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: （与上述内容互补）
- en: When X≠Y (i.e., the prize 🚗 is **not** behind the chosen door ☝️)
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 当 X≠Y（即，奖品 🚗 **不在** 被选中的门 ☝️ 后面）
- en: P(Z=A|X=A, Y=B) = 0; 🎩 cannot choose the participant’s door ☝️
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P(Z=A|X=A, Y=B) = 0; 🎩 不能选择参与者的门 ☝️
- en: P(Z=B|X=A, Y=B) = 0; 🎩 cannot choose prize door 🚗
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P(Z=B|X=A, Y=B) = 0; 🎩 不能选择奖品门 🚗
- en: P(Z=C|X=A, Y=B) = 1; 🎩 has not choice in the matter
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P(Z=C|X=A, Y=B) = 1; 🎩 在此问题上没有选择
- en: (complementary to the above)
  id: totrans-287
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: （与上述内容互补）
- en: '**Calculating Joint Probabilities**'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: '**计算联合概率**'
- en: Using logic let’s code up all 27 possibilities in python 🐍
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 使用逻辑，让我们用 python 🐍 编码所有 27 种可能性
- en: '[PRE0]'
  id: totrans-290
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
