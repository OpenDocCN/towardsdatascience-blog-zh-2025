- en: What Makes a Language Look Like Itself?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/what-makes-a-language-look-like-itself/](https://towardsdatascience.com/what-makes-a-language-look-like-itself/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1759375642955" class="mdspan-comment">Even if you don’t</mdspan>
    speak a word of a language, you can often guess what language you’re looking at
    just by spotting certain character patterns. I don’t speak Icelandic, for example,
    but I instantly recognize Icelandic text when I see letters like “ð” or “þ”, as
    these characters are extremely rare elsewhere. Likewise, I’ve noticed that when
    I see a lot of “ijk” in a text, it’s probably Dutch.
  prefs: []
  type: TYPE_NORMAL
- en: This article explores how we can use simple statistics to learn these visual
    fingerprints, the character sequences that most strongly signal which language
    you’re looking at, across 20 different European languages.
  prefs: []
  type: TYPE_NORMAL
- en: How to Learn Linguistic Fingerprints With Statistics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To learn the visual “fingerprints” of a language, we first need a way to measure
    how distinctive a given character pattern is. A natural starting point might be
    to look at the most common character patterns within each language. However, this
    approach quickly falls short as a character pattern might be very common in one
    language and also appear very frequently in others. Frequency alone does not capture
    uniqueness. Instead, we want to ask:'
  prefs: []
  type: TYPE_NORMAL
- en: '**“How much more likely is this pattern to appear in one language compared
    to all others?”**'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is where statistics comes in! Formally, let:'
  prefs: []
  type: TYPE_NORMAL
- en: '**L** be the set of all 20 studied languages'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**S** be the set of all observed character patterns across those languages'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To determine how strongly a given character pattern s∈**S** identifies a language
    l∈**L**, we compute the likelihood ratio:'
  prefs: []
  type: TYPE_NORMAL
- en: \[LR_{s,l} = \frac{P(s|l)}{P(s|\neg l)}\]
  prefs: []
  type: TYPE_NORMAL
- en: This compares the probability of seeing character pattern s in language l, versus
    in any other language. The higher the ratio, the more uniquely tied that pattern
    is to that language.
  prefs: []
  type: TYPE_NORMAL
- en: Calculating the Likelihood Ratio in Practice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To compute the likelihood ratio for each character pattern in practice, we need
    to translate the conditional probabilities into quantities we can actually measure.
    Here’s how we define
  prefs: []
  type: TYPE_NORMAL
- en: 'the relevant counts:'
  prefs: []
  type: TYPE_NORMAL
- en: 'c[l](s): the number of times character pattern s appears in language l'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'c[¬l](s): the number of times character pattern s appears in all other languages'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'N[l]: the total number of character pattern occurrences in language l'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'N[¬l]: the total number of pattern occurrences in all other languages'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Using these, the conditional probabilities become:'
  prefs: []
  type: TYPE_NORMAL
- en: \[P(s|l) = \frac{c_l(s)}{N_l},~P(s|\neg l)=\frac{c_{\neg l}(s)}{N_{\neg l}}\]
  prefs: []
  type: TYPE_NORMAL
- en: 'and the likelihood ratio simplifies to:'
  prefs: []
  type: TYPE_NORMAL
- en: \[LR_{s,l} = \frac{P(s|l)}{P(s|\neg l)} = \frac{c_l(s)\cdot N_{\neg l}}{c_{\neg
    l}(s)\cdot N_l}\]
  prefs: []
  type: TYPE_NORMAL
- en: This gives us a numeric score that quantifies how much more likely a character
    pattern s is to appear in language l versus all others.
  prefs: []
  type: TYPE_NORMAL
- en: Handling Zero Counts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There is sadly a problem with our likelihood ratio formula: what happens when
    c[¬l](s) = 0?'
  prefs: []
  type: TYPE_NORMAL
- en: In other words, what if a certain character pattern s appears only in language
    l and in no others? This leads to a divide-by-zero in the denominator, and a likelihood
    ratio of infinity.
  prefs: []
  type: TYPE_NORMAL
- en: Technically, this means we’ve found a perfectly unique pattern for that language.
    But in practice, it’s not very helpful. A character pattern might only appear
    once in one language and never anywhere else and it would be given an infinite
    score. Not very useful as a strong “fingerprint” of the language.
  prefs: []
  type: TYPE_NORMAL
- en: To avoid this issue, we apply a technique called [additive smoothing](https://en.wikipedia.org/wiki/Additive_smoothing).
    This method adjusts the raw counts slightly to eliminate zeros and reduce the
    impact of rare events.
  prefs: []
  type: TYPE_NORMAL
- en: Specifically, we add a small constant α to every count in the numerator, and
    α|**S**| to the denominator, with |**S**| being the total number of observed character
    patterns. This has the effect of assuming that every character pattern has a tiny
    chance of occurring in every language, even if it hasn’t been seen yet.
  prefs: []
  type: TYPE_NORMAL
- en: 'With smoothing, the adjusted probabilities become:'
  prefs: []
  type: TYPE_NORMAL
- en: \[P'(s|l) = \frac{c_l(s) + \alpha}{N_l + \alpha|S|},~P'(s|\neg l)=\frac{c_{\neg
    l}(s) + \alpha}{N_{\neg l} + \alpha|S|}\]
  prefs: []
  type: TYPE_NORMAL
- en: 'And the final likelihood ratio to be maximized is:'
  prefs: []
  type: TYPE_NORMAL
- en: \[LR_{s,l} = \frac{P'(s|l)}{P'(s|\neg l)} = \frac{(c_l(s) + \alpha)\cdot(N_{\neg
    l} + \alpha|S|)}{(N_l + \alpha|S|)\cdot(c_{\neg l}(s) + \alpha)}\]
  prefs: []
  type: TYPE_NORMAL
- en: This keeps things stable and ensures that a rare pattern doesn’t automatically
    dominate just because it’s exclusive.
  prefs: []
  type: TYPE_NORMAL
- en: The Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we’ve defined a metric to identify the most distinctive character patterns
    (our linguistic “fingerprints”), it’s time to gather actual language data to analyze.
  prefs: []
  type: TYPE_NORMAL
- en: For this, I used the python library [wordfreq](https://pypi.org/project/wordfreq/),
    which compiles word frequency lists for dozens of languages based on large-scale
    sources like Wikipedia, books, subtitles, and web text.
  prefs: []
  type: TYPE_NORMAL
- en: 'One particularly useful function for this analysis is `top_n_list()`, which
    returns a sorted list of the top n highest frequency words in a provided language.
    For example, to get the top 40 most common words in Icelandic, we would call:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The argument `ascii_only=False` ensures that non-ASCII characters — like Icelandic’s
    “ð” and “þ” — are preserved in the output. That’s essential for this analysis,
    since we’re specifically looking for language-unique character patterns, which
    includes single characters.
  prefs: []
  type: TYPE_NORMAL
- en: 'To build the dataset, I pulled the top 5,000 most frequent words in each of
    the following 20 European languages:'
  prefs: []
  type: TYPE_NORMAL
- en: Catalan, Czech, Danish, Dutch, English, Finnish, French, German, Hungarian,
    Icelandic, Italian, Latvian, Lithuanian, Norwegian, Polish, Portuguese, Romanian,
    Spanish, Swedish, and Turkish.
  prefs: []
  type: TYPE_NORMAL
- en: This yields a large multilingual vocabulary of 100,000 total words, rich enough
    to extract meaningful statistical patterns across languages.
  prefs: []
  type: TYPE_NORMAL
- en: To extract the character patterns used in the analysis, all possible substrings
    of length 1 to 5 were generated from each word in the dataset. For example, the
    word `language` would contain patterns such as `l`, `la`, `lan`, `lang`, `langu`,
    `a`, `an`, `ang`, and so on. The result is a comprehensive set **S** of over 180,000
    unique character patterns observed across the 20 studied languages.
  prefs: []
  type: TYPE_NORMAL
- en: Results
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For each language, the top five most distinctive character patterns, ranked
    by the likelihood ratio, are shown. The smoothing constant was chosen to be α=0.5.
  prefs: []
  type: TYPE_NORMAL
- en: Because the raw likelihood ratios can be quite large, I’ve reported the base-10
    logarithm of the likelihood ratio (log[10](LR)) instead. For example, a log likelihood
    ratio of 3 means that the character pattern is 10³ = 1,000 times more likely to
    appear in that language than in any other. Note that due to smoothing, these likelihood
    ratios are approximate rather than exact, and the extremeness of some scores may
    be dampened.
  prefs: []
  type: TYPE_NORMAL
- en: Each cell shows a top-ranked character pattern and its log likelihood ratio.
  prefs: []
  type: TYPE_NORMAL
