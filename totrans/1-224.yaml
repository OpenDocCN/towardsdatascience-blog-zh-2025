- en: Discussion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Below are some interesting interpretations of the results. This is not meant
    to be a comprehensive analysis, just a few observations I found noteworthy:'
  prefs: []
  type: TYPE_NORMAL
- en: Many of the character patterns with the highest likelihood ratios are single
    characters unique to their language, such as the previously mentioned Icelandic
    “ð” and “þ”, Romanian’s “ă”, “ț”, and “ș”, or Turkish’s “ı”, “ş”, and “ğ”. Because
    these characters are essentially absent from all other languages in the dataset,
    they would have produced infinite likelihood ratios if not for the additive smoothing.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In some languages, most notably Dutch, many of the top results are substrings
    of one another. For example, the top pattern “ijk” also appears within the next
    highest-ranking patterns: “lijk”, “elijk”, and “ijke”. This shows how certain
    combinations of letters are reused frequently in longer words, making them even
    more distinctive for that language.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: English has some of the least distinctive character patterns of all the languages
    analyzed, with a maximum log likelihood ratio of only 2.79\. This may be due to
    the presence of English loanwords in many other languages’ top 5,000 word lists,
    which dilutes the uniqueness of English-specific patterns.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are several cases where the top character patterns reflect shared grammatical
    structures across languages. For example, the Spanish “-ción”, Italian “-zione”,
    and Norwegian “-sjon” all function as nominalization suffixes, similar to the
    English “-tion” — turning verbs or adjectives into nouns. These endings stand
    out strongly in each language and highlight how different languages can follow
    similar patterns using different spellings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This project started with a simple question: What makes a language look like
    itself? By analyzing the 5000 most common words in 20 European languages and comparing
    the character patterns they use, we uncovered unique ‘fingerprints’ for each language
    — from accented letters like “ş” and “ø” to recurring letter combinations like
    “ijk” or “ción”. While the results aren’t meant to be definitive, they offer a
    fun and statistically grounded way to explore what sets languages apart visually,
    even without understanding a single word.'
  prefs: []
  type: TYPE_NORMAL
- en: See my [GitHub Repository](https://github.com/KenMcCarthy24/language_substring_analysis)
    for the full code implementation of this technique.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading!
  prefs: []
  type: TYPE_NORMAL
