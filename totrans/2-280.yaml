  prefs: []
  type: TYPE_NORMAL
- en: '[2] *Mining Rules from Data*. Towards Data Science. [https://towardsdatascience.com/mining-rules-from-data](https://towardsdatascience.com/mining-rules-from-data)'
  prefs: []
  type: TYPE_NORMAL
- en: '[3] Hastie, Trevor, Tibshirani, Robert, and Friedman, Jerome. *The Elements
    of Statistical Learning: Data Mining, Inference, and Prediction*. Vol. 2\. New
