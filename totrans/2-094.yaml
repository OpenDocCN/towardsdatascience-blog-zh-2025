  prefs: []
  type: TYPE_PRE
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: We will get familiarity with many more container objects provided by spaCy.
  prefs: []
  type: TYPE_NORMAL
- en: The central data structures in spaCy are the Language class, the Vocab and the
    Doc object.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: By checking the documentation, you will find the whole list of container objects.
