- en: Mastering NLP with spaCY — Part 1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/mastering-nlp-with-spacy-part-1/](https://towardsdatascience.com/mastering-nlp-with-spacy-part-1/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753726700659" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Natural Language Processing, or NLP, is a part of AI that focuses on understanding
    text. It’s about helping machines read, process, and find useful patterns or information
    within a text, for our apps. [SpaCy](https://spacy.io/) is a library that makes
    this work easier and faster.
  prefs: []
  type: TYPE_NORMAL
- en: Many developers today use huge models like ChatGPT or Llama for most NLP tasks.
    These models are powerful and can do a lot, but they’re often costly and slow.
    In real-world projects, we need something more focused and quick. This is where
    spaCy helps a lot.
  prefs: []
  type: TYPE_NORMAL
- en: Now, spaCy even lets you combine its strengths with large models like ChatGPT
    through the `spacy-llm` module. It’s a great way to get both speed and power.
  prefs: []
  type: TYPE_NORMAL
- en: Installing Spacy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Copy and paste the next commands to install spaCy with pip.
  prefs: []
  type: TYPE_NORMAL
- en: In the following cells, substitute the “**&ndash**” with “-“.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: SpaCy doesn’t come with a statistical language model, which is needed to perform
    operations on a particular language. For each language, there are many models
    based on the size of the resources used to build the model itself.
  prefs: []
  type: TYPE_NORMAL
- en: 'All the languages supported are listed here: [https://spacy.io/usage/models](https://spacy.io/usage/models)'
  prefs: []
  type: TYPE_NORMAL
- en: You can download a language model via the command line. In this example, I am
    downloading a language model for the English language.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: At this point, you are ready to use the model with the load() functionality
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: SpaCy Pipeline
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you load a language model in spaCy, it processes your text through a pipeline
    that you can customise. This pipeline is made up of various **components**, each
    handling a specific task. At its core is the tokenizer, which breaks the text
    into individual tokens (words, punctuation, etc.).
  prefs: []
  type: TYPE_NORMAL
- en: The result of this pipeline is a `Doc` object, which serves as the foundation
    for further analysis. Other components, like the Tagger (for part-of-speech tagging),
    Parser (for dependency parsing), and NER (for named entity recognition), can be
    included based on what you want to achieve. We will see what Tagger, Parser and
    NER mean in the upcoming articles.
  prefs: []
  type: TYPE_NORMAL
