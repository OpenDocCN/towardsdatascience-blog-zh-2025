  prefs: []
  type: TYPE_PRE
- en: '![](../Images/419fffe5d2772885b1c4b31585cf0b15.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Final Thoughts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Wrapping up this first part of this spaCy series, I’ve shared the basics that
    got me hooked on this tool for NLP.
  prefs: []
  type: TYPE_NORMAL
- en: We covered setting up spaCy, loading a language model, and digging into tokenization
    and lemmatization, the main steps that make text processing feel less like a black
    box.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike those massive models like ChatGPT that can feel overkill for smaller
    projects, spaCy’s lean and fast approach fits the needs of many projects perfectly,
    especially with the option of also using those big models through spacy-llm when
    you want extra power!
  prefs: []
  type: TYPE_NORMAL
- en: In the next part, I’ll walk you through how I use spaCy’s named entity recognition
    and dependency parsing to tackle real-world text tasks. Stick with me for Part
    2, it’s going to get even more hands-on!
  prefs: []
  type: TYPE_NORMAL
