- en: Tokenization with spaCy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In NLP, the first step in processing text is tokenization. This is crucial because
    all subsequent NLP tasks rely on working with tokens. Tokens are the smallest
    meaningful units of text that a sentence can be broken into. Intuitively, you
    might think of tokens as individual words split by spaces, but it’s not that simple.
  prefs: []
  type: TYPE_NORMAL
- en: Tokenization often depends on statistical patterns, where groups of characters
    that frequently appear together are treated as single tokens for better analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can play with different tokenizer on this hugging face space: [https://huggingface.co/spaces/Xenova/the-tokenizer-playground](https://huggingface.co/spaces/Xenova/the-tokenizer-playground)'
  prefs: []
  type: TYPE_NORMAL
- en: When we apply nlp() to some text in spacy, the text is automatically tokenized.
    Let’s see an example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/615c8fb293db717489764afceaf00288.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: From the example looks like a simple split made with text.split(“”). So let’s
    try to tokenize a more complex sentence.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/fa3f01a30d56ad744716810b2fa089a2.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: SpaCy’s tokenizer is rule-based, meaning it uses linguistic rules and patterns
    to determine how to split text. It is not based on statistical methods like modern
    LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: What is interesting is that the rules are customizable; this gives you full
    control over the tokenization process.
  prefs: []
  type: TYPE_NORMAL
- en: Also, spaCy tokenizers are non-destructive, which means that from the token
    you will be able to recover the original text.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see how to **customize the tokenizer.** In order to accomplish this, we
    just need to define a new rule for our tokenizer, we can do this by using the
    special ORTH symbol.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/010eb05ffaf4d7016aa9b41bd9060683.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: I want to tokenize the word “Marcello” differently.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/c0388c9e62d6bea5a86378e4db3f8457.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: In most cases, the default tokenizer works well, and it’s rare for anyone to
    need to modify it, usually, only researchers do.
  prefs: []
  type: TYPE_NORMAL
- en: Splitting text into tokens is easier than splitting a paragraph into sentences.
    SpaCy is able to accomplish this by using a dependency parser; you can learn more
    about it in the documentation. But let’s see how this works in practice.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Lemmatization with spaCy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Words/tokens can have different forms. A lemma is the base form of a word. For
    example, “dance” is the lemma of the words “dancing”, “danced”, “dancer”, “dances”.
  prefs: []
  type: TYPE_NORMAL
- en: When we reduce words to their base form, we are applying lemmatisation.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4ba8b1a685436d40e1a4b64ddbe41328.png)'
  prefs: []
  type: TYPE_IMG
- en: Lemmatization (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: In SpaCy we can have access to words lemma easily. Check the following code.
  prefs: []
  type: TYPE_NORMAL
