- en: Mastering NLP with spaCY — Part 1
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 掌握spaCY自然语言处理（Part 1）
- en: 原文：[https://towardsdatascience.com/mastering-nlp-with-spacy-part-1/](https://towardsdatascience.com/mastering-nlp-with-spacy-part-1/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/mastering-nlp-with-spacy-part-1/](https://towardsdatascience.com/mastering-nlp-with-spacy-part-1/)
- en: <mdspan datatext="el1753726700659" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1753726700659" class="mdspan-comment">介绍</mdspan>
- en: Natural Language Processing, or NLP, is a part of AI that focuses on understanding
    text. It’s about helping machines read, process, and find useful patterns or information
    within a text, for our apps. [SpaCy](https://spacy.io/) is a library that makes
    this work easier and faster.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）是人工智能的一部分，专注于理解文本。它是帮助机器阅读、处理并从文本中找到有用的模式或信息，以供我们的应用程序使用。[SpaCy](https://spacy.io/)是一个库，使这项工作变得更容易、更快。
- en: Many developers today use huge models like ChatGPT or Llama for most NLP tasks.
    These models are powerful and can do a lot, but they’re often costly and slow.
    In real-world projects, we need something more focused and quick. This is where
    spaCy helps a lot.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 许多开发者今天使用像ChatGPT或Llama这样的大型模型来完成大多数NLP任务。这些模型功能强大，可以做很多事情，但它们通常成本高昂且速度较慢。在现实世界的项目中，我们需要更专注且快速的东西。这正是spaCy大显身手的地方。
- en: Now, spaCy even lets you combine its strengths with large models like ChatGPT
    through the `spacy-llm` module. It’s a great way to get both speed and power.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，spaCy甚至通过`spacy-llm`模块让您能够结合其与大型模型（如ChatGPT）的优势。这是一种获得速度和力量的好方法。
- en: Installing Spacy
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装Spacy
- en: Copy and paste the next commands to install spaCy with pip.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 将以下命令复制并粘贴以使用pip安装spaCy。
- en: In the following cells, substitute the “**&ndash**” with “-“.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下单元格中，将“**&ndash**”替换为“-”。
- en: '[PRE0]'
  id: totrans-9
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: SpaCy doesn’t come with a statistical language model, which is needed to perform
    operations on a particular language. For each language, there are many models
    based on the size of the resources used to build the model itself.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: SpaCy没有附带统计语言模型，这是在特定语言上执行操作所需的。对于每种语言，都有许多基于构建模型所使用的资源大小而构建的模型。
- en: 'All the languages supported are listed here: [https://spacy.io/usage/models](https://spacy.io/usage/models)'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 支持的所有语言都列在这里：[https://spacy.io/usage/models](https://spacy.io/usage/models)
- en: You can download a language model via the command line. In this example, I am
    downloading a language model for the English language.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过命令行下载语言模型。在这个例子中，我正在下载英语语言模型。
- en: '[PRE1]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: At this point, you are ready to use the model with the load() functionality
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，您已经准备好使用load()功能使用该模型。
- en: '[PRE2]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: SpaCy Pipeline
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: SpaCy管道
- en: When you load a language model in spaCy, it processes your text through a pipeline
    that you can customise. This pipeline is made up of various **components**, each
    handling a specific task. At its core is the tokenizer, which breaks the text
    into individual tokens (words, punctuation, etc.).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在spaCy中加载一个语言模型时，它会通过一个您可以定制的管道处理您的文本。这个管道由各种**组件**组成，每个组件处理一个特定的任务。其核心是分词器，它将文本分解成单个标记（单词、标点等）。
- en: The result of this pipeline is a `Doc` object, which serves as the foundation
    for further analysis. Other components, like the Tagger (for part-of-speech tagging),
    Parser (for dependency parsing), and NER (for named entity recognition), can be
    included based on what you want to achieve. We will see what Tagger, Parser and
    NER mean in the upcoming articles.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这个管道的结果是一个`Doc`对象，它是进一步分析的基础。根据您想要实现的目标，可以包含其他组件，如Tagger（用于词性标注）、Parser（用于依存句法分析）和NER（用于命名实体识别）。我们将在接下来的文章中看到Tagger、Parser和NER的含义。
- en: '![](../Images/5612f1db461c74f4e770fc646a16b3b5.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5612f1db461c74f4e770fc646a16b3b5.png)'
- en: Pipeline (Image by Author)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 管道（图片由作者提供）
- en: In order to create a doc object, you can simply do the following
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建一个doc对象，您可以简单地执行以下操作。
- en: '[PRE3]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We will get familiarity with many more container objects provided by spaCy.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将熟悉spaCy提供的更多容器对象。
- en: The central data structures in spaCy are the Language class, the Vocab and the
    Doc object.
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: spaCy的核心数据结构是Language类、Vocab和Doc对象。
- en: By checking the documentation, you will find the whole list of container objects.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 通过检查文档，您将找到容器对象的完整列表。
- en: '![](../Images/b5c820a4a34f916cb0c1249525ccde8d.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b5c820a4a34f916cb0c1249525ccde8d.png)'
- en: From spaCy documentation
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 来自spaCy文档
- en: Tokenization with spaCy
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用spaCy进行分词
- en: In NLP, the first step in processing text is tokenization. This is crucial because
    all subsequent NLP tasks rely on working with tokens. Tokens are the smallest
    meaningful units of text that a sentence can be broken into. Intuitively, you
    might think of tokens as individual words split by spaces, but it’s not that simple.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在NLP中，处理文本的第一步是分词。这是至关重要的，因为所有后续的NLP任务都依赖于对分词的处理。分词是句子可以分解成的最小有意义的文本单元。直观地，您可能会认为分词是由空格分隔的单独单词，但这并不简单。
- en: Tokenization often depends on statistical patterns, where groups of characters
    that frequently appear together are treated as single tokens for better analysis.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 分词通常依赖于统计模式，其中经常一起出现的字符组被视为单个分词以进行更好的分析。
- en: 'You can play with different tokenizer on this hugging face space: [https://huggingface.co/spaces/Xenova/the-tokenizer-playground](https://huggingface.co/spaces/Xenova/the-tokenizer-playground)'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在hugging face space上尝试不同的分词器：[https://huggingface.co/spaces/Xenova/the-tokenizer-playground](https://huggingface.co/spaces/Xenova/the-tokenizer-playground)
- en: When we apply nlp() to some text in spacy, the text is automatically tokenized.
    Let’s see an example.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在spaCy中对某些文本应用nlp()时，文本会自动分词。让我们看看一个例子。
- en: '[PRE5]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/615c8fb293db717489764afceaf00288.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/615c8fb293db717489764afceaf00288.png)'
- en: Image by Author
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: From the example looks like a simple split made with text.split(“”). So let’s
    try to tokenize a more complex sentence.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 从例子来看，这似乎是一个简单的使用text.split(“”)进行的分割。那么让我们尝试对更复杂的句子进行分词。
- en: '[PRE6]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/fa3f01a30d56ad744716810b2fa089a2.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fa3f01a30d56ad744716810b2fa089a2.png)'
- en: Image by Author
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: SpaCy’s tokenizer is rule-based, meaning it uses linguistic rules and patterns
    to determine how to split text. It is not based on statistical methods like modern
    LLMs.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: SpaCy的分词器是基于规则的，这意味着它使用语言规则和模式来确定如何分割文本。它不基于像现代LLMs那样的统计方法。
- en: What is interesting is that the rules are customizable; this gives you full
    control over the tokenization process.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，规则是可定制的；这给了您对分词过程的完全控制。
- en: Also, spaCy tokenizers are non-destructive, which means that from the token
    you will be able to recover the original text.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，spaCy分词器是非破坏性的，这意味着您可以从分词中恢复原始文本。
- en: Let’s see how to **customize the tokenizer.** In order to accomplish this, we
    just need to define a new rule for our tokenizer, we can do this by using the
    special ORTH symbol.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看如何**自定义分词器**。为了实现这一点，我们只需要为我们的分词器定义一条新规则，我们可以通过使用特殊的ORTH符号来完成。
- en: '[PRE7]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/010eb05ffaf4d7016aa9b41bd9060683.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/010eb05ffaf4d7016aa9b41bd9060683.png)'
- en: Image by Author
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: I want to tokenize the word “Marcello” differently.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我想以不同的方式分词单词“Marcello”。
- en: '[PRE8]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/c0388c9e62d6bea5a86378e4db3f8457.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c0388c9e62d6bea5a86378e4db3f8457.png)'
- en: Image by Author
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: In most cases, the default tokenizer works well, and it’s rare for anyone to
    need to modify it, usually, only researchers do.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数情况下，默认的分词器表现良好，很少有人需要修改它，通常只有研究人员会这样做。
- en: Splitting text into tokens is easier than splitting a paragraph into sentences.
    SpaCy is able to accomplish this by using a dependency parser; you can learn more
    about it in the documentation. But let’s see how this works in practice.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 将文本分割成分词比将段落分割成句子更容易。SpaCy能够通过使用依赖分析器来完成这项任务；您可以在文档中了解更多关于它的信息。但让我们看看它在实际中是如何工作的。
- en: '[PRE9]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Lemmatization with spaCy
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: spaCy的词元化
- en: Words/tokens can have different forms. A lemma is the base form of a word. For
    example, “dance” is the lemma of the words “dancing”, “danced”, “dancer”, “dances”.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 单词/分词可以有不同的形式。词元是单词的基本形式。例如，“dance”是“dancing”、“danced”、“dancer”、“dances”等单词的词元。
- en: When we reduce words to their base form, we are applying lemmatisation.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将单词还原到其基本形式时，我们正在应用词元化。
- en: '![](../Images/4ba8b1a685436d40e1a4b64ddbe41328.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4ba8b1a685436d40e1a4b64ddbe41328.png)'
- en: Lemmatization (Image by Author)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 词元化（图片由作者提供）
- en: In SpaCy we can have access to words lemma easily. Check the following code.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在SpaCy中，我们可以轻松访问单词的词元。查看以下代码。
- en: '[PRE10]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![](../Images/419fffe5d2772885b1c4b31585cf0b15.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/419fffe5d2772885b1c4b31585cf0b15.png)'
- en: Image by Author
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Final Thoughts
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最后的想法
- en: Wrapping up this first part of this spaCy series, I’ve shared the basics that
    got me hooked on this tool for NLP.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 总结本篇spaCy系列的第一个部分，我分享了让我对这个NLP工具着迷的基础知识。
- en: We covered setting up spaCy, loading a language model, and digging into tokenization
    and lemmatization, the main steps that make text processing feel less like a black
    box.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们介绍了spaCy的设置、加载语言模型以及深入挖掘分词和词元化，这些是使文本处理感觉不像黑盒的主要步骤。
- en: Unlike those massive models like ChatGPT that can feel overkill for smaller
    projects, spaCy’s lean and fast approach fits the needs of many projects perfectly,
    especially with the option of also using those big models through spacy-llm when
    you want extra power!
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 与那些如ChatGPT这样的大型模型相比，spaCy的轻量级和快速方法非常适合许多项目，尤其是在需要额外功能时，还可以通过spacy-llm选项使用那些大型模型！
- en: In the next part, I’ll walk you through how I use spaCy’s named entity recognition
    and dependency parsing to tackle real-world text tasks. Stick with me for Part
    2, it’s going to get even more hands-on!
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一部分，我将向您展示我是如何使用spaCy的命名实体识别和依存句法分析来处理现实世界的文本任务的。请继续关注第二部分，它将更加注重实践操作！
