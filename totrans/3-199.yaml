- en: Overcome Failing Document Ingestion & RAG Strategies with Agentic Knowledge
    Distillation
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用代理知识蒸馏克服失败的文档摄入与RAG策略
- en: 原文：[https://towardsdatascience.com/overcome-failing-document-ingestion-rag-strategies-with-agentic-knowledge-distillation/](https://towardsdatascience.com/overcome-failing-document-ingestion-rag-strategies-with-agentic-knowledge-distillation/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/overcome-failing-document-ingestion-rag-strategies-with-agentic-knowledge-distillation/](https://towardsdatascience.com/overcome-failing-document-ingestion-rag-strategies-with-agentic-knowledge-distillation/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: Many generative AI use cases still revolve around Retrieval Augmented Generation
    (RAG), yet consistently fall short of user expectations. Despite the growing body
    of research on RAG improvements and even adding Agents into the process, many
    solutions still fail to return exhaustive results, miss information that is critical
    but infrequently mentioned in the documents, require multiple search iterations,
    and generally struggle to reconcile key themes across multiple documents. To top
    it all off, many implementations still rely on cramming as much “relevant” information
    as possible into the model’s context window alongside detailed system and user
    prompts. Reconciling all this information often exceeds the model’s cognitive
    capacity and compromises response quality and consistency.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 许多生成式AI用例仍然围绕检索增强生成（RAG）展开，但往往无法达到用户期望。尽管关于RAG改进的研究越来越多，甚至将代理加入其中，但许多解决方案仍然无法返回详尽的结果，遗漏了在文档中虽不常提及但至关重要的信息，需要多次搜索迭代，并且通常难以在多份文档中调和关键主题。更糟糕的是，许多实现仍然依赖于尽可能多地将“相关”信息塞入模型的上下文窗口，同时提供详细的系统和用户提示。整合所有这些信息往往超出了模型的认识能力，并损害了响应的质量和一致性。
- en: This is where our Agentic Knowledge Distillation + Pyramid Search Approach comes
    into play. Instead of chasing the best chunking strategy, retrieval algorithm,
    or inference-time reasoning method, my team, [Jim Brown](https://www.linkedin.com/in/jim-brown-71427356/),
    [Mason Sawtell](https://www.linkedin.com/in/mason-sawtell/), [Sandi Besen](https://www.linkedin.com/in/sandibesen/),
    and [I](https://www.linkedin.com/in/tula-masterman/), take an agentic approach
    to document ingestion.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 正是在这里，我们的代理知识蒸馏 + 基于金字塔的搜索方法发挥了作用。我们团队，包括[Jim Brown](https://www.linkedin.com/in/jim-brown-71427356/)、[Mason
    Sawtell](https://www.linkedin.com/in/mason-sawtell/)、[Sandi Besen](https://www.linkedin.com/in/sandibesen/)和[我](https://www.linkedin.com/in/tula-masterman/)，采取了一种代理方法来处理文档摄入。
- en: '*We leverage the full capability of the model at ingestion time to focus exclusively
    on distilling and preserving the most meaningful information from the document
    dataset. This fundamentally simplifies the RAG process by allowing the model to
    direct its reasoning abilities toward addressing the user/system instructions
    rather than struggling to understand formatting and disparate information across
    document chunks. *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '*我们利用模型在摄入时的全部能力，专注于从文档数据集中提炼和保留最有意义的信息。这从根本上简化了RAG过程，允许模型将推理能力集中于应对用户/系统指令，而不是挣扎于理解文档块之间的格式和不同信息。*'
- en: '**We specifically target high-value questions that are often difficult to evaluate
    because they have multiple correct answers or solution paths.** These cases are
    where traditional RAG solutions struggle most and existing RAG evaluation datasets
    are largely insufficient for testing this problem space. For our research implementation,
    we downloaded annual and quarterly reports from the last year for the 30 companies
    in the DOW Jones Industrial Average. These documents can be found through the
    [SEC EDGAR website](https://www.sec.gov/edgar/search/). The [information on EDGAR
    is accessible and able to be downloaded for free](https://www.sec.gov/search-filings/edgar-search-assistance/accessing-edgar-data)
    or can be queried through [EDGAR public searches](https://www.sec.gov/edgar/search/).
    See the [SEC privacy policy](https://www.sec.gov/about/privacy-information) for
    additional details, information on the SEC website is “considered public information
    and may be copied or further distributed by users of the web site without the
    SEC’s permission”. We selected this dataset for two key reasons: first, it falls
    outside the knowledge cutoff for the models evaluated, ensuring that the models
    cannot respond to questions based on their knowledge from pre-training; second,
    it’s a close approximation for real-world business problems while allowing us
    to discuss and share our findings using publicly available data.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们特别针对那些通常难以评估的高价值问题，因为它们可能有多个正确答案或解决方案路径。** 这些是传统RAG解决方案最难以应对的情况，现有的RAG评估数据集在很大程度上不足以测试这个问题空间。在我们的研究实现中，我们下载了过去一年道琼斯工业平均指数中30家公司的年度和季度报告。这些文件可以通过[SEC
    EDGAR网站](https://www.sec.gov/edgar/search/)找到。[EDGAR上的信息是可访问的，并且可以免费下载](https://www.sec.gov/search-filings/edgar-search-assistance/accessing-edgar-data)或可以通过[EDGAR公共搜索](https://www.sec.gov/edgar/search/)进行查询。有关SEC隐私政策的详细信息，请参阅[SEC隐私政策](https://www.sec.gov/about/privacy-information)。我们选择这个数据集有两个主要原因：首先，它超出了评估的模型的知识截止点，确保模型不能基于其预训练的知识回答问题；其次，它是对现实世界商业问题的近似，同时允许我们使用公开数据讨论和分享我们的发现。'
- en: While typical RAG solutions excel at factual retrieval where the answer is easily
    identified in the document dataset (e.g., “When did Apple’s annual shareholder’s
    meeting occur?”), they struggle with nuanced questions that require a deeper understanding
    of concepts across documents (e.g., “Which of the DOW companies has the most promising
    AI strategy?”). Our Agentic Knowledge Distillation + Pyramid Search Approach addresses
    these types of questions with much greater success compared to other standard
    approaches we tested and overcomes limitations associated with using knowledge
    graphs in RAG systems.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然典型的RAG解决方案在事实检索方面表现出色，例如在文档数据集中容易识别答案（例如，“苹果公司的年度股东大会何时举行？”），但它们在需要深入理解跨文档概念细微差别的问题上却显得力不从心（例如，“道琼斯工业平均指数中哪家公司的AI战略最有前景？”）。我们的代理知识蒸馏
    + 金字塔搜索方法在解决这类问题上比我们测试的其他标准方法取得了更大的成功，并克服了在RAG系统中使用知识图相关的局限性。
- en: In this article, we’ll cover how our knowledge distillation process works, key
    benefits of this approach, examples, and an open discussion on the best way to
    evaluate these types of systems where, in many cases, there is no singular “right”
    answer.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将介绍我们的知识蒸馏过程是如何工作的，这种方法的要点好处，示例，以及关于如何评估这类系统的开放讨论，在这些情况下，往往没有单一的“正确”答案。
- en: 'Building the pyramid: How Agentic Knowledge Distillation works'
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建造金字塔：代理知识蒸馏是如何工作的
- en: '![AI-generated image showing a pyramid structure for document ingestion with
    labelled sections.](../Images/e5cf579b613649161bed41a907653779.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![展示文档摄取金字塔结构的AI生成图像，带有标记的部分](../Images/e5cf579b613649161bed41a907653779.png)'
- en: Image by author and team depicting pyramid structure for document ingestion.
    Robots meant to represent agents building the pyramid.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 作者和团队绘制的描绘文档摄取金字塔结构的图像。机器人代表构建金字塔的代理。
- en: Overview
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 概述
- en: Our knowledge distillation process creates a multi-tiered pyramid of information
    from the raw source documents. Our approach is inspired by the pyramids used in
    deep learning computer vision-based tasks, which allow a model to analyze an image
    at multiple scales. We take the contents of the raw document, convert it to markdown,
    and distill the content into a list of atomic insights, related concepts, document
    abstracts, and general recollections/memories. During retrieval it’s possible
    to access any or all levels of the pyramid to respond to the user request.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的知识提炼过程从原始源文档中创建了一个多级信息金字塔。我们的方法受到深度学习计算机视觉任务中使用的金字塔的启发，这些金字塔允许模型在多个尺度上分析图像。我们将原始文档的内容转换为Markdown，并将其提炼成一系列原子洞察、相关概念、文档摘要和一般回忆/记忆。在检索过程中，可以访问金字塔的任何或所有级别来响应用户请求。
- en: 'How to distill documents and build the pyramid:'
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何提炼文档并构建金字塔：
- en: '**Convert documents to Markdown:** Convert all raw source documents to Markdown.
    We’ve found models process markdown best for this task compared to other formats
    like JSON and it is more token efficient. We used Azure Document Intelligence
    to generate the markdown for each page of the document, but there are many other
    open-source libraries like [MarkItDown](https://github.com/microsoft/markitdown)
    which do the same thing. Our dataset included **331 documents** and **16,601 pages. **'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将文档转换为Markdown**：将所有原始源文档转换为Markdown。我们发现，与其他格式如JSON相比，模型处理Markdown最有效，而且它更高效。我们使用Azure
    Document Intelligence为文档的每一页生成Markdown，但还有许多其他开源库，如[MarkItDown](https://github.com/microsoft/markitdown)，也能完成同样的工作。我们的数据集包括**331**份文档和**16,601**页。'
- en: '**Extract atomic insights from each page**: We process documents using a two-page
    sliding window, which allows each page to be analyzed twice. This gives the agent
    the opportunity to correct any potential mistakes when processing the page initially.
    We instruct the model to create a numbered list of insights that grows as it processes
    the pages in the document. The agent can overwrite insights from the previous
    page if they were incorrect since it sees each page twice. We instruct the model
    to extract insights in simple sentences following the subject-verb-object (SVO)
    format and to write sentences as if English is the second language of the user.
    This significantly improves performance by encouraging clarity and precision.
    Rolling over each page multiple times and using the SVO format also solves the
    disambiguation problem, which is a huge challenge for knowledge graphs. The insight
    generation step is also particularly helpful for extracting information from tables
    since the model captures the facts from the table in clear, succinct sentences.
    Our dataset produced **216,931** **total insights, about 13 insights per page
    and 655 insights per document**.'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**从每一页提取原子洞察**：我们使用两页滑动窗口处理文档，这使得每一页都能被分析两次。这给代理提供了机会，在最初处理页面时纠正任何潜在的错误。我们指导模型创建一个随着处理文档页面而增长的编号洞察列表。如果代理在前一页看到的洞察是错误的，它可以覆盖它们，因为它看到了每一页两次。我们指导模型以主语-谓语-宾语（SVO）格式提取洞察，并像用户将英语作为第二语言一样撰写句子。这通过鼓励清晰和精确性显著提高了性能。多次滚动每一页并使用SVO格式还解决了歧义问题，这对于知识图谱来说是一个巨大的挑战。洞察生成步骤对于从表格中提取信息也非常有帮助，因为模型以清晰、简洁的句子捕捉表格中的事实。我们的数据集产生了**216,931**个**总洞察，平均每页约13个洞察，每份文档约655个洞察**。'
- en: '**Distilling concepts from insights**: From the detailed list of insights,
    we identify higher-level concepts that connect related information about the document.
    This step significantly reduces noise and redundant information in the document
    while preserving essential information and themes. Our dataset produced **14,824
    total concepts, about 1 concept per page and 45 concepts per document.**'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**从洞察中提炼概念**：从详细的洞察列表中，我们识别出将文档中相关信息的更高层次概念。这一步骤显著减少了文档中的噪声和冗余信息，同时保留了关键信息和主题。我们的数据集产生了**14,824**个**总概念，平均每页约1个概念，每份文档约45个概念**。'
- en: '**Creating abstracts from concepts**: Given the insights and concepts in the
    document, the LLM writes an abstract that appears both better than any abstract
    a human would write and more information-dense than any abstract present in the
    original document. The LLM generated abstract provides incredibly comprehensive
    knowledge about the document with a small token density that carries a significant
    amount of information. We produce **one abstract per document, 331 total**.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**从概念创建摘要**：给定文档中的洞察力和概念，LLM编写了一个摘要，这个摘要不仅比任何人类编写的摘要都要好，而且比原始文档中的任何摘要都要信息密集。LLM生成的摘要提供了关于文档的极其全面的知识，以小的标记密度承载了大量的信息。我们为每份文档生成**一个摘要，总共331个**。'
- en: '**Storing recollections/memories across documents**: At the top of the pyramid
    we store critical information that is useful across all tasks. This can be information
    that the user shares about the task or information the agent learns about the
    dataset over time by researching and responding to tasks. For example, we can
    store the current 30 companies in the DOW as a recollection since this list is
    different from the 30 companies in the DOW at the time of the model’s knowledge
    cutoff. As we conduct more and more research tasks, we can continuously improve
    our recollections and maintain an audit trail of which documents these recollections
    originated from. For example, we can keep track of AI strategies across companies,
    where companies are making major investments, etc. These high-level connections
    are super important since they reveal relationships and information that are not
    apparent in a single page or document.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**跨文档存储回忆/记忆**：在金字塔的顶部，我们存储对所有任务都有用的关键信息。这可能包括用户关于任务的分享信息，或者代理通过研究和响应任务随时间学习的数据集信息。例如，我们可以将当前30家道琼斯工业平均指数（DOW）的公司作为回忆存储，因为这个列表与模型知识截止时的30家公司不同。随着我们进行越来越多的研究任务，我们可以不断改进我们的回忆，并维护这些回忆来源的审计轨迹。例如，我们可以跟踪公司的AI策略，公司在哪里进行重大投资等。这些高级连接非常重要，因为它们揭示了在单页或文档中不明显的关系和信息。'
- en: '![Sample subset of insights extracted from IBM 10Q, Q3 2024](../Images/a8eb79687466733ff756b06f66899729.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![从IBM 10Q，2024年第三季度提取的洞察力样本](../Images/a8eb79687466733ff756b06f66899729.png)'
- en: Sample subset of insights extracted from IBM 10Q, Q3 2024 (page 4)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 从IBM 10Q，2024年第三季度（第4页）提取的洞察力样本
- en: We store the text and embeddings for each layer of the pyramid (pages and up)
    in Azure PostgreSQL. We originally used Azure AI Search, but switched to PostgreSQL
    for cost reasons. This required us to write our own hybrid search function since
    PostgreSQL doesn’t yet natively support this feature. This implementation would
    work with any vector database or vector index of your choosing. The key requirement
    is to store and efficiently retrieve both text and vector embeddings at any level
    of the pyramid.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在Azure PostgreSQL中存储金字塔每一层的文本和嵌入（页面及以上）。最初我们使用Azure AI Search，但由于成本原因转向了PostgreSQL。这要求我们编写自己的混合搜索功能，因为PostgreSQL尚未原生支持此功能。这种实现方式可以与您选择的任何向量数据库或向量索引一起工作。关键要求是在金字塔的任何级别存储和高效检索文本和向量嵌入。
- en: This approach essentially creates the essence of a knowledge graph, but stores
    information in natural language, the way an LLM natively wants to interact with
    it, and is more efficient on token retrieval. We also let the LLM pick the terms
    used to categorize each level of the pyramid, this seemed to let the model decide
    for itself the best way to describe and differentiate between the information
    stored at each level. For example, the LLM preferred “insights” to “facts” as
    the label for the first level of distilled knowledge. Our goal in doing this was
    to better understand how an LLM thinks about the process by letting it decide
    how to store and group related information.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法本质上创建了一个知识图谱的精髓，但以自然语言存储信息，这是LLM原生想要与之交互的方式，并且在标记检索上更高效。我们还让LLM选择用于分类金字塔每一层的术语，这似乎让模型自己决定如何描述和区分存储在每个级别的信息。例如，LLM更喜欢将“洞察力”作为提炼知识第一层的标签，而不是“事实”。我们这样做是为了更好地理解LLM是如何思考这个过程的，让它自己决定如何存储和分组相关信息。
- en: 'Using the pyramid: How it works with RAG & Agents'
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用金字塔：如何与RAG和代理一起工作
- en: At inference time, both traditional RAG and agentic approaches benefit from
    the pre-processed, distilled information ingested in our knowledge pyramid. The
    pyramid structure allows for efficient retrieval in both the traditional RAG case,
    where only the top X related pieces of information are retrieved or in the Agentic
    case, where the Agent iteratively plans, retrieves, and evaluates information
    before returning a final response.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在推理时间，传统的RAG和代理方法都从我们在知识金字塔中摄取的预处理、提炼信息中受益。金字塔结构允许在传统RAG案例中高效检索，其中仅检索X个相关条目，或者在代理案例中，代理在返回最终响应之前迭代地计划、检索和评估信息。
- en: The benefit of the pyramid approach is that **information at any and all levels
    of the pyramid can be used during inference.** For our implementation, we used
    PydanticAI to create a search agent that takes in the user request, generates
    search terms, explores ideas related to the request, and keeps track of information
    relevant to the request. Once the search agent determines there’s sufficient information
    to address the user request, the results are re-ranked and sent back to the LLM
    to generate a final reply. Our implementation allows a search agent to traverse
    the information in the pyramid as it gathers details about a concept/search term.
    This is similar to walking a knowledge graph, but in a way that’s more natural
    for the LLM since all the information in the pyramid is stored in natural language.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 金字塔方法的优点是**金字塔任何层级的信息都可以在推理期间使用**。在我们的实现中，我们使用PydanticAI创建了一个搜索代理，该代理接收用户请求，生成搜索词，探索与请求相关的想法，并跟踪与请求相关的信息。一旦搜索代理确定有足够的信息来处理用户请求，结果就会被重新排序并返回给LLM生成最终回复。我们的实现允许搜索代理在收集关于概念/搜索词的详细信息时遍历金字塔中的信息。这与在知识图上行走类似，但以对LLM来说更自然的方式，因为金字塔中的所有信息都存储在自然语言中。
- en: Depending on the use case, the Agent could access information at all levels
    of the pyramid or only at specific levels (e.g. only retrieve information from
    the concepts). For our experiments, we did not retrieve raw page-level data since
    we wanted to focus on token efficiency and found the LLM-generated information
    for the insights, concepts, abstracts, and recollections was sufficient for completing
    our tasks. In theory, the Agent could also have access to the page data; this
    would provide additional opportunities for the agent to re-examine the original
    document text; however, it would also significantly increase the total tokens
    used.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 根据用例，代理可以访问金字塔的所有层级信息，或者仅访问特定层级（例如，仅从概念中检索信息）。在我们的实验中，我们没有检索原始页面级数据，因为我们想专注于token效率，并发现LLM生成的见解、概念、摘要和回忆信息足以完成我们的任务。从理论上讲，代理也可以访问页面数据；这将提供额外的机会让代理重新检查原始文档文本；然而，这也会显著增加总token的使用量。
- en: 'Here is a high-level visualization of our Agentic approach to responding to
    user requests:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我们对用户请求进行代理响应方法的高级可视化：
- en: '![Overview of the agentic research & response process](../Images/e99d9d16c812d2a321d07140c6197727.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![代理研究 & 响应过程概述](../Images/e99d9d16c812d2a321d07140c6197727.png)'
- en: Image created by author and team providing an overview of the agentic research
    & response process
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者及其团队创建的代理研究 & 响应过程概述图像
- en: 'Results from the pyramid: Real-world examples'
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 金字塔结果：现实世界示例
- en: To evaluate the effectiveness of our approach, we tested it against a variety
    of question categories, including typical fact-finding questions and complex cross-document
    research and analysis tasks.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估我们方法的有效性，我们将其与各种问题类别进行了测试，包括典型的信息查找问题和复杂的跨文档研究和分析任务。
- en: 'Fact-finding (spear fishing):'
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 事实查找（矛鱼捕鱼）：
- en: These tasks require identifying specific information or facts that are buried
    in a document. These are the types of questions typical RAG solutions target but
    often require many searches and consume lots of tokens to answer correctly.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这些任务需要识别文档中隐藏的特定信息或事实。这些是典型RAG解决方案针对的问题类型，但通常需要多次搜索并消耗大量token才能正确回答。
- en: '***Example task***: “What was IBM’s total revenue in the latest financial reporting?”'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '***示例任务***: “在最新的财务报告中，IBM的总收入是多少？”'
- en: '***Example response using pyramid approach***: “IBM’s total revenue for the
    third quarter of 2024 was $14.968 billion [ibm-10q-q3-2024.pdf, pg. 4]'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '***使用金字塔方法示例回复***: “2024年第三季度，IBM的总收入为1496.8亿美元[ibm-10q-q3-2024.pdf, 第4页]”'
- en: '![Screenshot of total tokens used to research and generate response](../Images/0c670f57757e25bb59af21a2e3716d26.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![总用于研究和生成响应的令牌截图](../Images/0c670f57757e25bb59af21a2e3716d26.png)'
- en: Total tokens used to research and generate response
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 总用于研究和生成响应的令牌
- en: This result is correct (human-validated) and was generated using only 9,994
    total tokens, with 1,240 tokens in the generated final response.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这个结果是正确的（经过人工验证）并且仅使用了9,994个总令牌，其中生成最终响应使用了1,240个令牌。
- en: 'Complex research and analysis:'
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 复杂研究和分析：
- en: These tasks involve researching and understanding multiple concepts to gain
    a broader understanding of the documents and make inferences and informed assumptions
    based on the gathered facts.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这些任务涉及研究和理解多个概念，以获得对文档的更广泛理解，并根据收集的事实进行推理和有根据的假设。
- en: '***Example task***: “Analyze the investments Microsoft and NVIDIA are making
    in AI and how they are positioning themselves in the market. The report should
    be clearly formatted.”'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '***示例任务***： “分析微软和英伟达在AI方面的投资以及他们在市场中的定位。报告应格式清晰。”'
- en: '***Example response:***'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '***示例响应：***'
- en: '![Screenshot of the response generated by the agent analyzing AI investments
    and positioning for Microsoft and NVIDIA.](../Images/f79952f66c7cf5bc9358cea1610f8fcc.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![代理生成的分析微软和英伟达的AI投资和定位的响应截图](../Images/f79952f66c7cf5bc9358cea1610f8fcc.png)'
- en: Response generated by the agent analyzing AI investments and positioning for
    Microsoft and NVIDIA.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 代理生成的分析微软和英伟达的AI投资和定位的响应。
- en: The result is a comprehensive report that executed quickly and contains detailed
    information about each of the companies. 26,802 total tokens were used to research
    and respond to the request with a significant percentage of them used for the
    final response (2,893 tokens or ~11%). These results were also reviewed by a human
    to verify their validity.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一份执行迅速且包含每家公司详细信息的综合报告。总共使用了26,802个令牌来研究和响应请求，其中相当一部分用于最终响应（2,893个令牌或约11%）。这些结果也经过人工审核以验证其有效性。
- en: '![Screenshot of snippet indicating total token usage for the task](../Images/647cbe40e490b74ab609efea4519f26f.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![指示任务总令牌使用的片段截图](../Images/647cbe40e490b74ab609efea4519f26f.png)'
- en: Snippet indicating total token usage for the task
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 指示任务总令牌使用的片段
- en: '***Example task:*** “Create a report on analyzing the risks disclosed by the
    various financial companies in the DOW. Indicate which risks are shared and unique.”'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '***示例任务：*** “创建一份关于分析道琼斯指数中各金融公司披露的风险的报告。指出哪些风险是共有的，哪些是独特的。”'
- en: '***Example response***:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '***示例响应***:'
- en: '![Screenshot of part 1 of a response generated by the agent on disclosed risks.](../Images/ef0785c5a0129a74d52362a443c732db.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![代理生成的关于披露风险的响应第一部分的截图](../Images/ef0785c5a0129a74d52362a443c732db.png)'
- en: Part 1 of response generated by the agent on disclosed risks.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 代理生成的关于披露风险的响应第一部分。
- en: '![Screenshot of part 2 of a response generated by the agent on disclosed risks.](../Images/d7ce003c312f365b6d6ed1b15c50c6e8.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![代理生成的关于披露风险的响应第二部分的截图](../Images/d7ce003c312f365b6d6ed1b15c50c6e8.png)'
- en: Part 2 of response generated by the agent on disclosed risks.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 代理生成的关于披露风险的响应第二部分。
- en: Similarly, this task was completed in 42.7 seconds and used 31,685 total tokens,
    with 3,116 tokens used to generate the final report.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，这项任务在42.7秒内完成，使用了31,685个总令牌，其中3,116个令牌用于生成最终报告。
- en: '![Screenshot of a snippet indicating total token usage for the task](../Images/5a7e95b26d726c40a9f1fffb7da69305.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![指示任务总令牌使用的片段截图](../Images/5a7e95b26d726c40a9f1fffb7da69305.png)'
- en: Snippet indicating total token usage for the task
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 指示任务总令牌使用的片段
- en: These results for both fact-finding and complex analysis tasks demonstrate that
    the **pyramid approach efficiently creates detailed reports with low latency using
    a minimal amount of tokens. The tokens used for the tasks carry dense meaning
    with little noise allowing for high-quality, thorough responses across tasks.**
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这些关于事实查找和复杂分析任务的结果表明，**金字塔方法有效地使用最少的令牌以低延迟创建详细的报告。用于任务的令牌承载着密集的意义，噪音很少，使得在各个任务中都能提供高质量、全面的响应。**
- en: 'Benefits of the pyramid: Why use it?'
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 金字塔的好处：为什么使用它？
- en: Overall, we found that our pyramid approach provided a significant boost in
    response quality and overall performance for high-value questions.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，我们发现我们的金字塔方法在回答高质量问题和整体性能方面提供了显著的提升。
- en: '**Some of the key benefits we observed include: **'
  id: totrans-61
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**我们观察到的关键好处包括：**'
- en: '**Reduced model’s cognitive load**: When the agent receives the user task,
    it retrieves pre-processed, distilled information rather than the raw, inconsistently
    formatted, disparate document chunks. This fundamentally improves the retrieval
    process since the model doesn’t waste its cognitive capacity on trying to break
    down the page/chunk text for the first time.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**降低模型认知负荷**：当代理收到用户任务时，它检索的是预处理的、提炼的信息，而不是原始的、格式不一致、内容分散的文档片段。这从根本上改善了检索过程，因为模型不需要在第一次尝试时浪费其认知能力来分解页面/片段文本。'
- en: '**Superior table processing**: By breaking down table information and storing
    it in concise but descriptive sentences, the pyramid approach makes it easier
    to retrieve relevant information at inference time through natural language queries.
    This was particularly important for our dataset since financial reports contain
    lots of critical information in tables.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化的表格处理**：通过分解表格信息并将其存储在简洁但描述性的句子中，金字塔方法使得通过自然语言查询在推理时检索相关信息变得更加容易。这对于我们的数据集尤为重要，因为财务报告中的表格包含大量关键信息。'
- en: '**Improved response quality to many types of requests**: The pyramid enables
    more comprehensive context-aware responses to both precise, fact-finding questions
    and broad analysis based tasks that involve many themes across numerous documents.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对多种请求的响应质量提升**：金字塔使系统能够对精确的事实查找问题和涉及众多文档和主题的广泛分析任务提供更全面的上下文感知响应。'
- en: '**Preservation of critical context**: Since the distillation process identifies
    and keeps track of key facts, important information that might appear only once
    in the document is easier to maintain. For example, noting that all tables are
    represented in millions of dollars or in a particular currency. Traditional chunking
    methods often cause this type of information to slip through the cracks.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键上下文的保留**：由于提炼过程识别并跟踪关键事实，那些可能只在文档中出现一次的重要信息更容易保持。例如，指出所有表格都是以百万美元或特定货币表示的。传统的分块方法往往导致此类信息丢失。'
- en: '**Optimized token usage, memory, and speed**: By distilling information at
    ingestion time, we significantly reduce the number of tokens required during inference,
    are able to maximize the value of information put in the context window, and improve
    memory use.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化的标记使用、内存和速度**：通过在摄入时提炼信息，我们显著减少了推理过程中所需的标记数量，能够最大化上下文窗口中信息的价值，并提高内存使用。'
- en: '**Scalability**: Many solutions struggle to perform as the size of the document
    dataset grows. This approach provides a much more efficient way to manage a large
    volume of text by only preserving critical information. This also allows for a
    more efficient use of the LLMs context window by only sending it useful, clear
    information.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：许多解决方案在文档数据集规模扩大时难以表现良好。这种方法通过仅保留关键信息，提供了一种更有效的方式来管理大量文本。这也允许更有效地使用LLMs的上下文窗口，因为它只发送有用、清晰的信息。'
- en: '**Efficient concept exploration**: The pyramid enables the agent to explore
    related information similar to navigating a knowledge graph, but does not require
    ever generating or maintaining relationships in the graph. The agent can use natural
    language exclusively and keep track of important facts related to the concepts
    it’s exploring in a highly token-efficient and fluid way.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高效的概念探索**：金字塔使代理能够探索类似导航知识图谱的相关信息，但不需要在图中生成或维护关系。代理可以使用自然语言 exclusively，并以高度标记效率和流畅的方式跟踪其探索的概念相关的重要事实。'
- en: '**Emergent dataset understanding**: An unexpected benefit of this approach
    emerged during our testing. When asking questions like “what can you tell me about
    this dataset?” or “what types of questions can I ask?”, the system is able to
    respond and suggest productive search topics because it has a more robust understanding
    of the dataset context by accessing higher levels in the pyramid like the abstracts
    and recollections.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据集理解的自发形成**：在测试过程中，这种方法出现了一个意外的好处。当询问诸如“你能告诉我关于这个数据集的什么信息？”或“我能问哪些类型的问题？”等问题时，系统能够响应并建议富有成效的搜索主题，因为它通过访问金字塔的更高层次（如摘要和回忆）获得了对数据集上下文的更稳健的理解。'
- en: 'Beyond the pyramid: Evaluation challenges & future directions'
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超越金字塔：评估挑战与未来方向
- en: Challenges
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 挑战
- en: While the results we’ve observed when using the pyramid search approach have
    been nothing short of amazing, finding ways to establish meaningful metrics to
    evaluate the entire system both at ingestion time and during information retrieval
    is challenging. Traditional RAG and Agent evaluation frameworks often fail to
    address nuanced questions and analytical responses where many different responses
    are valid.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用金字塔搜索方法时，我们观察到的结果令人惊叹，但找到方法来建立有意义的指标以评估整个系统在摄入时间和信息检索期间都是一项挑战。传统的RAG和代理评估框架往往无法解决许多不同响应都有效的细微问题和分析性响应。
- en: Our team plans to write a research paper on this approach in the future, and
    we are open to any thoughts and feedback from the community, especially when it
    comes to evaluation metrics. Many of the existing datasets we found were focused
    on evaluating RAG use cases within one document or precise information retrieval
    across multiple documents rather than robust concept and theme analysis across
    documents and domains.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们团队计划在未来撰写一篇关于这种方法的学术论文，并且我们欢迎来自社区的任何想法和反馈，尤其是在评估指标方面。我们发现的许多现有数据集都集中在评估单个文档内的RAG用例或跨多个文档的精确信息检索，而不是跨文档和领域的鲁棒概念和主题分析。
- en: The main use cases we are interested in relate to broader questions that are
    representative of how businesses actually want to interact with GenAI systems.
    For example, “tell me everything I need to know about customer X” or “how do the
    behaviors of Customer A and B differ? Which am I more likely to have a successful
    meeting with?”. These types of questions require a deep understanding of information
    across many sources. The answers to these questions typically require a person
    to synthesize data from multiple areas of the business and think critically about
    it. As a result, the answers to these questions are rarely written or saved anywhere
    which makes it impossible to simply store and retrieve them through a vector index
    in a typical RAG process.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我们感兴趣的主要用例与更广泛的问题相关，这些问题代表了企业实际如何与GenAI系统互动。例如，“告诉我关于客户X需要知道的一切”或“客户A和B的行为有何不同？我更有可能和哪位客户成功会面？”。这类问题需要深入理解来自多个来源的信息。这些问题的答案通常需要一个人从商业的多个领域综合数据，并对其进行批判性思考。因此，这些问题的答案很少被书写或保存下来，这使得通过典型的RAG过程简单地存储和检索它们变得不可能。
- en: Another consideration is that many real-world use cases involve dynamic datasets
    where documents are consistently being added, edited, and deleted. This makes
    it difficult to evaluate and track what a “correct” response is since the answer
    will evolve as the available information changes.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个考虑因素是，许多现实世界的用例涉及动态数据集，其中文档持续被添加、编辑和删除。这使得评估和跟踪“正确”的响应变得困难，因为答案会随着可用信息的改变而演变。
- en: Future directions
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 未来方向
- en: In the future, we believe that the pyramid approach can address some of these
    challenges by enabling more effective processing of dense documents and storing
    learned information as recollections. However, tracking and evaluating the validity
    of the recollections over time will be critical to the system’s overall success
    and remains a key focus area for our ongoing work.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 未来，我们相信金字塔方法可以通过更有效地处理密集文档并将学习信息作为回忆存储来解决这些挑战。然而，随着时间的推移跟踪和评估回忆的有效性对于系统的整体成功至关重要，并且仍然是我们持续工作的关键重点领域。
- en: When applying this approach to organizational data, the pyramid process could
    also be used to identify and assess discrepancies across areas of the business.
    For example, uploading all of a company’s sales pitch decks could surface where
    certain products or services are being positioned inconsistently. It could also
    be used to compare insights extracted from various line of business data to help
    understand if and where teams have developed conflicting understandings of topics
    or different priorities. This application goes beyond pure information retrieval
    use cases and would allow the pyramid to serve as an organizational alignment
    tool that helps identify divergences in messaging, terminology, and overall communication.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 当将这种方法应用于组织数据时，金字塔过程也可以用来识别和评估业务各个领域的差异。例如，上传一家公司所有的销售提案可以揭示某些产品或服务定位的不一致性。它还可以用来比较从各种业务线数据中提取的见解，以帮助了解团队是否在主题或优先级上存在冲突的理解。这种应用超越了纯粹的信息检索用例，并使金字塔成为组织对齐工具，有助于识别信息、术语和整体沟通中的分歧。
- en: 'Conclusion: Key takeaways and why the pyramid approach matters'
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论：关键要点以及金字塔方法为何重要
- en: The knowledge distillation pyramid approach is significant because it **leverages
    the full power of the LLM at both ingestion and retrieval time.** Our approach
    allows you to **store dense information in fewer tokens** which has the added
    benefit of **reducing noise in the dataset at inference**. Our approach also **runs
    very quickly and is incredibly token efficient**, we are able to generate responses
    within seconds, explore potentially hundreds of searches, and **on average use
    <40K tokens for the entire search, retrieval, and response generation process**
    (this includes all the search iterations!).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 知识蒸馏金字塔方法的重要性在于它**在摄入和检索时间都充分利用了LLM的全部能力**。我们的方法允许你**在更少的标记中存储密集信息**，这还有额外的优势，即在推理时**减少数据集的噪声**。我们的方法运行非常快速，并且极其标记高效，我们能够在几秒钟内生成响应，探索可能的上百个搜索，并且**平均使用<40K个标记来完成整个搜索、检索和响应生成过程**（这包括所有的搜索迭代！）。
- en: We find that the LLM is much **better at writing atomic insights as sentences**
    and that these insights **effectively distill information from both text-based
    and tabular data.** This distilled information written in natural language is
    very easy for the LLM to understand and navigate at inference since it **does
    not have to expend unnecessary energy reasoning about and breaking down document
    formatting or filtering through noise**.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发现，LLM在将原子洞察写成句子方面**做得更好**，并且这些洞察**有效地从基于文本和表格数据中提炼信息**。这种用自然语言编写的提炼信息，在推理时对LLM来说非常容易理解和导航，因为它**不需要消耗不必要的能量来推理和分解文档格式，或过滤噪声**。
- en: The ability to **retrieve and aggregate information at any level of the pyramid**
    also provides **significant flexibility to address a variety of query types**.
    This approach offers promising performance for large datasets and enables high-value
    use cases that require nuanced information retrieval and analysis.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 能够**在任何金字塔层级检索和汇总信息**也提供了**解决各种查询类型的重要灵活性**。这种方法对于大型数据集提供了有前景的性能，并使需要细微信息检索和分析的高价值用例成为可能。
