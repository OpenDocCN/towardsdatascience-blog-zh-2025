- en: Struggling to Land a Data Role in 2025? These 5 Tips Will Change That
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/struggling-to-land-a-data-role-in-2025-these-5-tips-will-change-that/](https://towardsdatascience.com/struggling-to-land-a-data-role-in-2025-these-5-tips-will-change-that/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1745888927513" class="mdspan-comment">Breaking</mdspan>
    into the tech world is no longer as easy (or glamorous) as it used to be. Lots
    of people are finding it difficult to find their way into the current tech market.
    This can be due to lots of reasons like a competitive job market, lack of openings,
    higher demands for senior positions, massive layoffs, etc. Meanwhile, the tech
    space continues to beam with lots of prospects who have acquired the right skills
    to excel in various roles. While the playing ground might not be favourable for
    all, there are smart ways to enhance your job search to tilt the odds to your
    favour.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: The way people find and apply to available roles has come a long way over the
    years. We have moved from periods of advertising openings on newspapers to a point
    where you can send out tens of applications with a few clicks of a button. Lots
    of technologies have made job ads more reachable, and recruiters can easily discover
    professionals online. In fact, some of the best times were when recruiters were
    the ones chasing candidates. Ah, the glory days!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: The old methods of finding new opportunities thrived due to some enabling factors.
    There was abundance of opportunities in the tech industry due to the high rate
    of adoption. Lots of companies were willing to digitalize their business processes.
    There was shortage of people with the right skills for the fast growing tech industry.
    And to cap it all off, there wasn’t a tool as advanced as AI that could handle
    most mundane tasks. All these and a lot more factors made it easier to break into
    the tech industry. Fast forward to now, things have changed a lot and have gotten
    tougher for most newbies who are facing desperate times.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: As the saying goes, *desperate times calls for desperate measures*. Standing
    out in a fierce market can make all the difference in landing you your next role.
    You can stand out based on your profile, work experiences, portfolio, skillset,
    etc. But in this article, I will show you how to stand out by making yourself
    more available to niche opportunities. These 5 tips will have you stand out and
    present yourself to more opportunities.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Boolean search
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Advanced search techniques like the Boolean search can be used on job boards
    to find more refined roles based on your search queries. Boolean search uses keywords
    like “AND”, “OR” and “NOT” to limit search results. LinkedIn is a prime example
    of how much your search query can be made more specific. Instead of just using
    the LinkedIn jobs tab, you can make a Boolean search on posts to discover LinkedIn
    posts from recruiters that are hiring.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: '![An example of Boolean search on LinkedIn](../Images/b3a9a60987fdd8af5c7c4b92a404751c.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![LinkedIn上布尔搜索的示例](../Images/b3a9a60987fdd8af5c7c4b92a404751c.png)'
- en: Boolean search on LinkedIn / Image by author
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: LinkedIn上的布尔搜索/图片由作者提供
- en: The search query **“data analyst” AND “hiring” AND “London”** returns all LinkedIn
    posts containing these search terms. These posts are almost always recruiters
    looking to hire someone. This can be the quickest way to come across a job ad
    on LinkedIn. Boolean search is not exclusive to LinkedIn, and you can obtain such
    search techniques from many job websites.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索查询**“data analyst” AND “hiring” AND “London”**返回所有包含这些搜索词的LinkedIn帖子。这些帖子几乎总是招聘人员寻找人才。这是在LinkedIn上找到招聘广告的最快方式。布尔搜索不仅限于LinkedIn，你还可以从许多工作网站上获得这种搜索技巧。
- en: Extended keywords search
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩展关键词搜索
- en: The extended keywords search technique helps to search for job opportunities
    based on search terms other than the job title. Search terms that include tools,
    workflow names, potential project names, etc., can be used while searching for
    jobs online. Instead of just searching for “data analyst”, someone looking for
    a data analyst role can search for tools like “Power BI” or “Tableau” on an advertising
    website. This technique works because using a tool-based search method will produce
    results that match your skillset. Secondly, most companies have varying job titles
    that could mean the same thing in another company. Company ‘A’ can have an opening
    for a Business Analyst, but Company ‘B’ can decide to name the same role as Data
    Analyst or Product Analyst. The tools and responsibilities across these different
    roles can be the same. By focusing your search around those tools and other keywords,
    you can sidestep the confusion and unlock more relevant opportunities you might
    have otherwise missed.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展关键词搜索技术有助于根据除职位名称之外的其他搜索词来寻找工作机会。在在线搜索工作时，可以使用包括工具、工作流程名称、潜在项目名称等在内的搜索词。例如，在广告网站上，寻找数据分析师角色的人可以搜索“Power
    BI”或“Tableau”等工具。这种技术之所以有效，是因为基于工具的搜索方法会产生与你的技能集相匹配的结果。其次，大多数公司有不同的职位名称，这些名称在其他公司可能意味着相同的事情。公司“A”可能有一个商业分析师的空缺，但公司“B”可以决定将相同的职位命名为数据分析师或产品分析师。这些不同职位之间的工具和责任可能相同。通过将搜索重点放在这些工具和其他关键词上，你可以避免混淆并发现更多可能错过的相关机会。
- en: Recommendations through networking
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过网络获得的推荐
- en: Recommendations is a well-known technique for getting your foot in the door
    when it comes to breaking into a new field. While recommendations work to a great
    extent, the person who gives the recommendation is as important. This is where
    networking comes in. Networking without a purpose will most likely be a short-lived
    contact. You can start to network with people solely for getting recommendations
    from them. So the next time you attend a <mdspan class="mdspan-comment is-selected"
    datatext="el1745265391734">career</mdspan> fair, connect with company representatives
    on LinkedIn and reach out to them for recommendations. The recommendation will
    then be used as an additional document when applying for a role within the company
    where your recommender works. This approach should give you a boost which gets
    you more attention on your job application. Requesting for a recommendation (letter)
    is an easier request than an outright request for a job, so don’t be surprised
    when most people say yes to giving a recommendation letter.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐是进入新领域时获得入门机会的常用技巧。虽然推荐在很大程度上是有效的，但提供推荐的人同样重要。这就是网络的作用所在。没有目的的网络很可能只是短暂的接触。你可以开始与人建立联系，仅仅是为了从他们那里获得推荐。所以下次你参加职业博览会时，可以在LinkedIn上与公司代表建立联系，并向他们寻求推荐。然后，这份推荐信将被用作申请你推荐人所在公司职位的附加文件。这种方法应该会给你带来提升，使你的求职申请得到更多关注。请求推荐信（函）比直接请求工作更容易，所以当大多数人同意提供推荐信时，不要感到惊讶。
- en: Cold-calling
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 冷电话
- en: Here me out, I know I said asking for a job is a big ask but cold-calling is
    not a bad idea, especially when done strategically. *What’s the strategy?* Thanks
    for asking. Cold-calling is a way to get yourself out there, to be seen more by
    companies and industry professionals. You can cold-call to enquire about available
    openings in a company and to demonstrate your skillset. You might be turned down
    in most cases, and that is totally fine. You can further request for an informational
    interview with the company just to evaluate yourself, irrespective of an available
    role. An informational interview can either make the company reconsider you for
    a role or it helps you prepare for subsequent interviews. Either way, you are
    coming out better. So look up that company you’ve been wanting to work for and
    give them a ring.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Nearby companies
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Google map is an underrated tools when it comes to job search. Google map isn’t
    just a tool that helps you find your way to the nearest Tesco, it can also be
    used to identify and locate companies around you based on specific industries.
    Using the right search query Google map can help you identify companies from any
    industry near-by just by searching for the industry. You can search for “software
    companies near me” and this returns a map of all registered companies around you
    with their websites and email addresses. This is a good source for discovering
    companies you can easily visit in person.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b7901332fc7e014ba62632ab153d5714.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
- en: Google map for finding nearby companies / Image by author
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: You can reach out to the companies identified by Google map and check with these
    companies for available roles. You can also visit the company websites to know
    more about the company and if they are a right fit for you. You can also pay a
    visit to the company if it’s a short commute from where you are.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Breaking into the tech industry may be tougher than it once was, but it’s far
    from impossible. While the market is more competitive and roles are more demanding,
    creative and strategic job search methods can give you a significant edge. By
    utilising smart techniques like Boolean search, extended keyword searches, networking
    for strong recommendations, cold-calling, and exploring nearby companies using
    tools like Google Maps, you can expand your reach and visibility in the job market.
    It’s about working smarter, not just harder—adapting your approach can make all
    the difference in landing your next opportunity.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
