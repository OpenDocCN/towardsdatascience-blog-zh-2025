- en: How Cheap Mortgages Transformed Poland’s Real Estate Market
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: How Cheap Mortgages Transformed Poland’s Real Estate Market
- en: 原文：[https://towardsdatascience.com/how-cheap-mortgages-transformed-polands-real-estate-market-0e81f8c3611c/](https://towardsdatascience.com/how-cheap-mortgages-transformed-polands-real-estate-market-0e81f8c3611c/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-cheap-mortgages-transformed-polands-real-estate-market-0e81f8c3611c/](https://towardsdatascience.com/how-cheap-mortgages-transformed-polands-real-estate-market-0e81f8c3611c/)
