    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
- en: Real estate is a bedrock of modern economies, serving as both a tangible asset
    and an essential component of wealth accumulation for individuals and investment
    portfolios.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 房地产是现代经济的基础，它既是可触摸的资产，也是个人和投资组合财富积累的重要组成部分。
- en: Real estate price fluctuations have far-reaching implications, influencing everything
    from consumer sentiment to financial stability. Understanding the drivers behind
    price dynamics is not merely an academic pursuit but a necessity for policymakers,
    investors, and homeowners alike.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 房地产价格的波动具有深远的影响，从消费者情绪到金融稳定，都会受到影响。理解价格动态背后的驱动因素不仅是一个学术追求，也是政策制定者、投资者和房主共同的需求。
- en: The importance of real estate prices makes them critical in policymaking, as
    governments are trying to influence this market to increase housing affordability.
    Such policies allow us to evaluate them using the causal inference toolkits.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 房地产价格的重要性使得它们在政策制定中变得至关重要，因为政府试图影响这个市场以增加住房的可负担性。此类政策使我们能够使用因果推断工具包来评估它们。
- en: In this article, we will attempt to assess the impact of the mortgage subsidy
    program on real estate prices in Poland using the synthetic control group.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将尝试使用合成控制组来评估抵押贷款补贴计划对波兰房地产价格的影响。
- en: '**Safe Credit 2% Program**'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**安全信贷2%计划**'
- en: '![https://www.gov.pl/web/rozwoj-technologia/bezpieczny-kredyt](../Images/9df7b238a1b96e96f5b1cc1e36413026.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![https://www.gov.pl/web/rozwoj-technologia/bezpieczny-kredyt](../Images/9df7b238a1b96e96f5b1cc1e36413026.png)'
- en: '[https://www.gov.pl/web/rozwoj-technologia/bezpieczny-kredyt](https://www.gov.pl/web/rozwoj-technologia/bezpieczny-kredyt)'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.gov.pl/web/rozwoj-technologia/bezpieczny-kredyt](https://www.gov.pl/web/rozwoj-technologia/bezpieczny-kredyt)'
- en: 'In July 2023, the Polish government introduced the ‘Safe Credit 2%’ program.
    It aimed to help young people and families to buy their first apartment. Below,
    you can find the justification for the program description placed on the official
    governmental website:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年7月，波兰政府推出了“安全信贷2%”计划。该计划旨在帮助年轻人和家庭购买他们的第一套公寓。以下是在官方政府网站上放置的计划描述的依据：
- en: Buying your first apartment is a challenge for many people, including young
    people. With rising real estate prices and more expensive loans, this is often
    a dream that is difficult to realize. That’s why we have prepared a housing loan
    subsidy program.
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 对于许多人来说，包括年轻人，购买第一套公寓都是一个挑战。随着房地产价格的上涨和贷款成本的提高，这通常是一个难以实现的梦想。这就是为什么我们准备了住房贷款补贴计划。
- en: A loan was available to a person up to 45 years old who does not have or has
    never had a flat. The maximum loan amount for a single person was 500,000 PLN.
    In the case of a married couple or parents with a child, the maximum loan amount
    was 600,000 PLN. The subsidy was available for apartments on both the primary
    and secondary markets.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 一项贷款可供45岁以下且没有或从未拥有过公寓的人申请。单身人士的最高贷款额度为50万波兰兹罗提。对于已婚夫妇或父母与子女的情况，最高贷款额度为60万波兰兹罗提。补贴适用于一级和二级市场的公寓。
- en: '**Research question and methodology**'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**研究问题和方法**'
- en: Home developers usually cannot build many more apartments in the short term.
    Hence, such subsidy programs can increase demand for apartments. With supply being
    relatively stable, they can lead to a substantial increase in real estate prices.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 房地产开发商在短期内通常无法建造更多的公寓。因此，此类补贴计划可以增加公寓的需求。由于供应相对稳定，它们可能导致房地产价格的大幅上涨。
- en: The question is whether the potential increase in real estate prices is justified
    by the increased availability of house loans for the selected group of loan-takers
    and whether the people getting cheap loans could have obtained them even without
    participating in the program.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，房地产价格的潜在增加是否由为所选贷款人群体增加的房屋贷款的可用性所证明，以及获得低成本贷款的人是否可以在不参与该项目的情况下获得这些贷款。
- en: 'The questions above are broad and could fill many academic studies. I will
    limit my ambitions here. My research question will be simple: Has the program
    increased real estate prices in Poland?'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 上述问题范围广泛，可以填满许多学术研究。在这里，我将限制我的雄心。我的研究问题将很简单：这个项目是否提高了波兰的房地产价格？
- en: Assessing the program’s impact is a complex task. We can’t simply compare Poland’s
    real estate price index before and after the program, as other factors may have
    influenced the results. Nor can we conduct a randomized experiment, as the program
    was available to all Polish residents.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 评估项目的影响是一个复杂的工作。我们无法简单地比较项目前后波兰房地产价格指数的变化，因为其他因素可能已经影响了结果。我们也不能进行随机实验，因为该项目对所有波兰居民都是可用的。
- en: Moreover, the beginning of the 2020s is a period of many political and economic
    crises, which have profoundly impacted the Polish economy. For instance, due to
    the war, Poland hosted many refugees from Ukraine. Their presence naturally increased
    the demand for real estate, which might have caused prices to rise. Moreover,
    inflation in Poland was one of the highest in the European Union, which is another
    factor that significantly complicates the evaluation of this program.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，2020年代初是一个政治和经济危机频发的时期，这些危机对波兰经济产生了深远的影响。例如，由于战争，波兰接待了许多来自乌克兰的难民。他们的存在自然增加了对房地产的需求，这可能导致价格上涨。此外，波兰的通货膨胀率是欧盟中最高的之一，这也是另一个显著增加了对该项目评估复杂性的因素。
- en: Fortunately, many methods in the causal inference toolkit can help answer our
    question. We can apply one of my favorite techniques, which is excellent for evaluating
    public policy, especially at an aggregated level – a **synthetic control group.**
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，因果推断工具包中的许多方法可以帮助我们回答这个问题。我们可以应用我最喜欢的技术之一，它非常适合评估公共政策，尤其是在汇总层面——一个**合成控制组**。
- en: This method involves creating a ‘synthetic’ control group that closely matches
    the characteristics of the treated group, allowing us to estimate the counterfactual
    outcome if the treatment had not occurred.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法涉及创建一个与处理组特征密切匹配的“合成”控制组，使我们能够估计如果没有发生处理，反事实结果将会如何。
- en: In essence, we will create a *synthetic Poland.* We will use the actual price
    trends in other EU countries for this. We will compare those countries to Poland
    in the period before the program started. Based on this, each country will receive
    a weight, and the linear combinations for those weights will resemble Poland as
    much as possible.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，我们将创建一个*合成波兰*。我们将使用其他欧盟国家的实际价格趋势来完成这项工作。我们将比较这些国家在项目开始前的时期与波兰的情况。基于此，每个国家将获得一个权重，这些权重的线性组合将尽可能类似于波兰。
- en: Then, we can compare the actual real estate prices observed in Poland after
    the program to the ones observed in the synthetic control group.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以将项目实施后观察到的波兰实际房地产价格与合成控制组观察到的价格进行比较。
- en: Effectively, a synthetic control group is used as the **counterfactual**. It
    shows us what would have happened to the real estate price had the policy not
    started. The difference between those two ‘worlds’ will give us an assessment
    of the effect of the analyzed policy.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，我们使用了一个**反事实**的合成控制组。它向我们展示了如果没有开始这项政策，房地产价格将会如何变化。这两个“世界”之间的差异将给我们一个评估分析政策影响的评估。
- en: '**Data**'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据**'
- en: Our quest for answers begins with data collection. Thankfully, Eurostat provides
    us with invaluable information tailored to our needs. Specifically, we will utilize
    the quarterly price index data from the EU statistical office.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们寻找答案的旅程从数据收集开始。幸运的是，欧盟统计局为我们提供了针对我们需求的有价值的信息。具体来说，我们将利用欧盟统计局的季度价格指数数据。
- en: The House Price Index (HPI) is a comprehensive measure of inflation in the residential
    property market. It encompasses the price changes of all types of dwellings purchased
    by households, including flats, detached houses, and terraced houses. With its
    base value set at 100 in 2015, this index metric provides a clear understanding
    of price changes over time.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 房价指数（HPI）是衡量住宅房地产市场通货膨胀的全面指标。它包括家庭购买的各类住宅的价格变化，包括公寓、独立房屋和排屋。以2015年的基线值设定为100，这个指数指标提供了对价格随时间变化的清晰理解。
- en: The data structure is simple. It contains the HPI index for each country from
    the European Union at the quarterly level. The following code snippet contains
    data preprocessing steps on top of the CSV file downloaded from the Eurostat website.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 数据结构很简单。它包含欧盟每个国家按季度级别的HPI指数。以下代码片段包含了对从欧洲统计局网站下载的CSV文件进行的数据预处理步骤。
- en: 'For readability, I selected only three columns of interest – time period, country
    name (geo), and the price index (obs_value). Additionally, I made a few preprocessing
    steps to store the quarter name as a date value. It will make analysis much more
    accessible. Ultimately, I excluded non-EU countries and aggregated values for
    the entire Union. The final data set looks like this:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 为了便于阅读，我仅选择了三个感兴趣的列 – 时间段、国家名称（geo）和价格指数（obs_value）。此外，我还进行了一些预处理步骤，将季度名称存储为日期值。这将使分析更加容易进行。最终，我排除了非欧盟国家，并对整个联盟的值进行了汇总。最终的数据集如下所示：
- en: '![](../Images/7ec99377675f5b7016fca40bcd82b417.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7ec99377675f5b7016fca40bcd82b417.png)'
- en: We need to apply one last data preparation step to prepare data for some causal
    inference.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要应用最后一步数据准备，为一些因果推断准备数据。
- en: Namely, we must create indicator columns for the treatment group and the treatment
    period.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，我们必须为处理组和处理期创建指标列。
- en: 'We will create three variables to reuse at the later stage of the analysis:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将创建三个变量，以便在分析的后阶段重复使用：
- en: treatment period – indicating quarters starting from Q3 2023
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理期 – 指从2023年第三季度开始的季度
- en: treatment group – having a value of 1 for Poland (‘PL’)
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理组 – 波兰（‘PL’）的值为1
- en: treated – variable indicating treatment group in the treatment period
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理组 – 表示处理期内的处理组变量
- en: '**House price index in Poland**'
  id: totrans-37
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**波兰房价指数**'
- en: Finally, we can take a more in-depth look at the data. Let’s start with the
    trends in house prices for Poland only. The house price index increased very strikingly
    in the last 8 years. However, we are primarily interested only in the last point
    of this series. It makes the long-term analysis of the analyzed program slightly
    more complex but still possible!
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以更深入地查看数据。让我们先看看波兰房价的趋势。房价指数在过去8年中显著增加。然而，我们主要只对这一系列的最后一点感兴趣。这使得对分析程序的长期分析稍微复杂一些，但仍然可行！
- en: As the chart below shows, house prices in Poland have increased steadily during
    the last eight years. As a Polish citizen, I regret not buying the apartment a
    few years ago. But what can we do?
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如下图表所示，波兰的房价在过去八年中稳步上升。作为一个波兰公民，我为几年前没有买公寓而感到遗憾。但我们能做什么呢？
- en: '![](../Images/2a422d530ce7a2cff2c07be5aab934a6.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2a422d530ce7a2cff2c07be5aab934a6.png)'
- en: Even though the price has been increasing steadily, we can observe a steep increase
    in the house price index in 2024\. The point corresponds to when the cheap credit
    2% program was live. How can we measure the effect of this policy?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管价格一直在稳步上升，但我们可以在2024年观察到房价指数的急剧上升。这一点对应于低利率2%计划实施期间。我们如何衡量这项政策的影响？
- en: '**Pre-post analysis**'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**前后分析**'
- en: Let’s start with the most straightforward approach. By running an elementary
    regression analysis, we can compare how the house price index in Poland changed
    after the policy was introduced.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从最直接的方法开始。通过运行基本的回归分析，我们可以比较在政策实施后波兰房价指数的变化情况。
- en: '![](../Images/f7bb04a777619901f3dcc75ae93193dc.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f7bb04a777619901f3dcc75ae93193dc.png)'
- en: The coefficient of _’treatment*period’* variables indicates that the House Price
    Index in Poland increased on average by 60 units in quarters when the mortgage
    subsidy program was live. It is a strong effect if the baseline value is 100\.
    However, it does not tell us much.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: ‘treatment*period’变量的系数表明，在抵押贷款补贴计划实施期间，波兰的房价指数平均每季度增加了60个单位。如果基线值为100，则这是一个强烈的影响。然而，它并没有告诉我们太多。
- en: Why is this? Apart from the subsidy program, many factors could have influenced
    the real estate price in Poland. For example, the influx of migrants from Ukraine,
    economic conditions, or any other factor we are unaware of could be responsible
    for the increase in the house price index.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么是这样？除了补贴计划之外，许多因素可能影响了波兰的房地产价格。例如，来自乌克兰的移民涌入、经济状况或任何其他我们不知道的因素可能对房价指数的上升负责。
- en: '**Comparison with other countries**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**与其他国家的比较**'
- en: To account for those unobservable effects, we need to compare the House Price
    Index in Poland to other countries. The chart below compares HPI in Poland to
    the selected European countries. Why only those countries? Based on their proximity
    to Poland, I chose them to put Polish real estate prices in the broader context.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解释那些不可观察的影响，我们需要将波兰的房价指数与其他国家进行比较。下面的图表比较了波兰的 HPI 与选定的欧洲国家的 HPI。为什么只选择这些国家？基于它们与波兰的邻近性，我选择了它们，以便将波兰的房地产价格置于更广泛的背景中。
- en: The chart clearly shows that the HPI price index in Poland (a blue line) increased
    much faster than in many selected countries. And this increase accelerated in
    2023.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图表清楚地显示，波兰的 HPI 价格指数（蓝色线条）的增长速度比许多选定的国家要快得多。并且这种增长在 2023 年加速了。
- en: Can we quantify this difference? Theoretically, yes. We could apply the difference-in-difference
    approach and use all other countries as the *control* group. However, this approach
    must be corrected due to the likely lack of the parallel trend assumption.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能否量化这种差异？从理论上讲，可以。我们可以应用双重差分法，并使用所有其他国家作为 *控制组*。然而，由于可能缺乏平行趋势假设，这种方法必须进行修正。
- en: Selecting only a few countries leaves too much room for intuition and guessing.
    Therefore, we need to explore alternative methods to ensure the accuracy and reliability
    of our analysis.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 只选择少数几个国家留下了太多的直觉和猜测空间。因此，我们需要探索替代方法，以确保我们分析的准确性和可靠性。
- en: '![](../Images/28df0776572498704f81868c24eac07c.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/28df0776572498704f81868c24eac07c.png)'
- en: This is a point of evidence at which many analyses of the cheap mortgage program
    stopped. They concluded that the steep increase in the HPI (or any other price
    indicator) at the end of 2023 shows evidence of the effect of the cheap mortgage
    program on the price surge.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个证据点，许多关于低成本抵押贷款计划的分析都停止了。他们得出结论，2023 年底 HPI（或任何其他价格指标）的急剧上升表明了低成本抵押贷款计划对价格上涨的影响。
- en: Generally, there’s not much wrong with such an approach, especially at the news
    reporting level. There’s a clear correlation between introducing the cheap credit
    program and the price increase. However, I would still like to present a more
    apparent causal effect.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，这种做法没有太多问题，尤其是在新闻报道层面。引入低成本信贷计划与价格上涨之间存在明显的相关性。然而，我仍然想展示一个更明显的因果效应。
- en: '**Synthetic control group**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**合成控制组**'
- en: The approach I suggest will use the synthetic control group approach. As mentioned
    at the beginning, we will create a weighted combination of all EU countries resembling
    Poland as similar as possible before the mortgage program started. Afterward,
    we will compare the HPI index in real Poland to the synthetic one. This difference
    will give us the treatment effect – the effect of the mortgage subsidy program
    on the real estate price in Poland.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议的方法将使用合成控制组方法。如前所述，我们将创建一个在抵押贷款计划开始之前尽可能相似于波兰的所有欧盟国家的加权组合。之后，我们将比较真实波兰的 HPI
    指数与合成指数。这种差异将给我们提供处理效应——抵押贷款补贴计划对波兰房地产价格的影响。
- en: Let’s get started.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧。
- en: As the first step, we have to pivot the data – to store countries as rows and
    each quarter as a column. We can do it using the pandas *group by* function. I
    will use only the data before the third quarter of 2023 as this will be our ‘training
    set’ for the synthetic control group. Additionally, at the end of the following
    code snippet, we store data for Poland as a separate data entity, as this will
    be the target variable for the regression.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 作为第一步，我们必须对数据进行转换——将国家作为行，每个季度作为列存储。我们可以使用 pandas 的 *group by* 函数来完成。我将只使用 2023
    年第三季度之前的数据，因为这将是我们的合成控制组的“训练集”。此外，在以下代码片段的末尾，我们将波兰的数据作为单独的数据实体存储，因为这将是我们回归的目标变量。
- en: In the following steps, I will attempt to create a synthetic control group as
    the linear combination of each separate country. We will use the standard linear
    regression model and the optimization technique similar to the one shown in the
    2010 article by Abadie, A., Diamond, A. and Hainmueller, J. (2010) *Synthetic
    Control Methods for Comparative Case Studies.*
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的步骤中，我将尝试将合成控制组创建为每个单独国家的线性组合。我们将使用标准的线性回归模型和类似于Abadie, A.，Diamond, A.和Hainmueller,
    J.（2010）在*Synthetic Control Methods for Comparative Case Studies*一文中展示的优化技术。
- en: This article’s authors proposed applying the linear weighted algorithm, constraining
    the weight of coefficients to sum to the value 1.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的作者提出了应用线性加权算法，将系数的权重限制为总和为1。
- en: The optimization is subject to the equality constraint that the sum of weights
    equals 1, and bounds are applied to ensure that weights are between 0 and 1\.
    We will also use the regularization parameter to prevent overfitting, allowing
    us to choose only the most suitable countries as the components of the synthetic
    control group.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 优化受限于权重总和等于1的等式约束，并应用边界以确保权重在0和1之间。我们还将使用正则化参数来防止过拟合，使我们能够仅选择最合适的国家作为合成控制组的组成部分。
- en: We created the *SyntheticControlWithWeights* class above, allowing us to develop
    and apply the synthetic control group method to the house price data in the EU.
    Let’s create the synthetic Poland!
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在上文中创建了 *SyntheticControlWithWeights* 类，这使得我们能够开发并应用合成控制组方法来分析欧盟的房价数据。让我们创建一个合成波兰！
- en: 'We don’t need any more code to create a synthetic control group. After the
    initial data preparation, creating the actual control group is straightforward.
    The .fit() method of the class needs only a few parameters:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不需要更多的代码来创建合成控制组。在初步数据准备之后，创建实际的控制组是直接的。该类的 `.fit()` 方法只需要几个参数：
- en: regions_pre – data frame with all the countries preceding the Q3 2023
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: regions_pre – 包含2023年第三季度之前所有国家的数据框
- en: poland_pre – data frame with HPI index for Poland preceding the Q3 2023
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: poland_pre – 包含波兰在2023年第三季度之前HPI指数的数据框
- en: regularization_parameter
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: regularization_parameter
- en: The last parameter enables us to control overfitting, similar to the penalty
    parameter in ridge or lasso regressions.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个参数使我们能够控制过拟合，类似于岭回归或Lasso回归中的惩罚参数。
- en: A higher value penalizes mean square error more strongly, leading to a simpler
    model with more evenly distributed weights. I chose the value of 0.5 here, but
    we can experiment with different values, for example, using grid search and checking
    the mean square errors of other models.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 较高的值对均方误差的惩罚更强，导致模型更简单，权重分布更均匀。我在这里选择了0.5的值，但我们可以尝试不同的值，例如使用网格搜索并检查其他模型的均方误差。
- en: '**Synthetic control group results**'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**合成控制组结果**'
- en: We went into technical details quite profoundly. Now is an excellent time to
    check the synthetic control group’s results. The code snippet below applies the
    .predict() method from the synthetic control group to the data about all countries
    without Poland.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我们深入探讨了技术细节。现在是检查合成控制组结果的一个绝佳时机。下面的代码片段将合成控制组的 `.predict()` 方法应用于除波兰外的所有国家的数据。
- en: Afterward, we added those predicted values to the data for all the countries,
    including Poland. This will enable us to compare the actual HPI index observed
    in Poland to the synthetic one.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们将这些预测值添加到所有国家的数据中，包括波兰。这将使我们能够比较波兰观察到的实际HPI指数与合成指数。
- en: Finally, we can observe the effect of the mortgage subsidy program compared
    to the synthetic control group, a key part of our analysis.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以观察抵押贷款补贴计划与合成控制组相比的效果，这是我们分析的关键部分。
- en: As a reminder, the synthetic control group acts here as a **counterfactual**,
    providing a picture of what would have happened to Poland’s real estate prices
    had the mortgage subsidy not started.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 作为提醒，合成控制组在这里充当**反事实**，展示了如果没有开始抵押贷款补贴，波兰的房地产价格将会如何。
- en: Pre-treatment trends show a close fit between Poland and synthetic control results.
    This is good, as it shows that the synthetic control group resembles Poland before
    the event of interest began.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 预处理趋势显示波兰与合成控制结果之间拟合得很好。这是好消息，因为它表明合成控制组在感兴趣的事件开始之前与波兰相似。
- en: The fit is imperfect, as we can see divergencies between both lines. It is also
    good news, as most likely, the method did not overfit the training data.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 拟合并不完美，因为我们可以在两条线之间看到差异。这也是好消息，因为很可能该方法没有过拟合训练数据。
- en: '![](../Images/87356905a5eb05c758336f50031c7941.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/87356905a5eb05c758336f50031c7941.png)'
- en: And the effect of the mortgage subsidy program is striking. We can observe a
    considerable gap when comparing the actual HPI index in Poland (blue line) to
    the synthetic one (orange line).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 并且抵押贷款补贴计划的影响是显著的。我们可以观察到当比较波兰的实际HPI指数（蓝色线）与合成指数（橙色线）时，存在相当大的差距。
- en: What does it tell us? Without the mortgage subsidy program, real estate prices
    in Poland would have been much lower. We could have expected a plateaued trend
    in this alternative reality. **The introduction of the mortgage subsidy program
    contributed to the substantial increase in real estate prices in Poland**.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这告诉我们什么？如果没有抵押贷款补贴计划，波兰的房地产价格将会低得多。在这个替代现实中，我们可能会预期出现一个平稳的趋势。**抵押贷款补贴计划的引入导致了波兰房地产价格的显著增加**。
- en: This comparison might raise questions as there could have been other factors
    affecting only Poland compared to the rest of the countries in the European Union.
    The synthetic control group, however, catches all those differences before the
    third quarter of 2023.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这种比较可能会引发疑问，因为可能存在仅影响波兰而与其他欧盟国家不同的其他因素。然而，合成控制组在2023年第三季度之前捕捉到了所有这些差异。
- en: The synthetic control group approach has one additional benefit. We can check
    which objects from the donor pool contributed to creating the synthetic control
    group. The following code snippet generates the coefficient from the model we
    created before using the .coef_ method.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 合成控制组方法还有一个额外的好处。我们可以检查捐赠池中哪些对象有助于创建合成控制组。以下代码片段生成了我们之前创建的模型中的系数，使用了 .coef_
    方法。
- en: The following charts allow us to see the countries most similar to Poland regarding
    the pre-treatment trend of real estate prices.. Based on this, the algorithm selected
    Croatia, Luxembourg, Italy, France, Czechia, and Estonia.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图表使我们能够看到在房地产价格预处理趋势方面与波兰最相似的国家。基于此，算法选择了克罗地亚、卢森堡、意大利、法国、捷克和爱沙尼亚。
- en: '![](../Images/bd485dbaa7a2884fd9d37b346279e55a.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bd485dbaa7a2884fd9d37b346279e55a.png)'
- en: As the next step, we can focus on quantifying the effect of the mortgage subsidy
    program, as so far, we have only focused on the charts. The typical approach to
    quantify the treatment effect in the synthetic control group method is to plot
    the difference between the actual price in our treatment group and the values
    generated by the synthetic control group over time. The following piece of code
    does exactly this.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 作为下一步，我们可以专注于量化抵押贷款补贴计划的影响，因为到目前为止，我们只关注了图表。在合成控制组方法中量化处理效果的传统方法是绘制我们的处理组中的实际价格与合成控制组生成的值随时间变化的差异。以下代码片段正是这样做的。
- en: The chart below looks precisely how we would expect it from applying the synthetic
    control group. First, we can see that before 2023, the difference between the
    synthetic and observed prices was relatively small and had no visible trend. The
    fit will never be perfect (and shouldn’t be), as we want to avoid overfitting.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图表看起来正是我们应用合成控制组时预期的样子。首先，我们可以看到在2023年之前，合成价格与观察到的价格之间的差异相对较小，并且没有明显的趋势。拟合永远不会完美（也不应该是），因为我们想避免过度拟合。
- en: What’s happening at the end of 2023 is remarkable. The difference between the
    real estate price index in Poland and the expected price level generated by the
    synthetic control group skyrocketed. It perfectly coincides with the introduction
    of the credit price subsidy program.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年底发生的事情非常引人注目。波兰房地产价格指数与合成控制组生成的预期价格水平之间的差异急剧上升。这完美地与信贷价格补贴计划的引入相吻合。
- en: Based on this, we can see that the safe credit program led to almost 20 units
    higher real estate prices than expected without the program’s introduction.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这一点，我们可以看到，如果没有引入该计划，安全信贷计划导致房地产价格比预期高出近20个单位。
- en: '![](../Images/55020b171bf199f28b8da6a74a2a9697.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/55020b171bf199f28b8da6a74a2a9697.png)'
- en: We can also quantify the effect of the credit subsidy program by calculating
    the average price difference between the synthetic control group and the actual
    real estate price observed in Poland when the credit subsidy was in place.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以通过计算合成控制组与波兰实际观察到的房地产价格之间的平均价格差异来量化信贷补贴计划的影响。
- en: 'We can do this by simply calculating the average difference between the actual
    price and the one generated observed in the synthetic control group:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过简单地计算实际价格与合成控制组中观察到的价格之间的平均差异来完成这项工作：
- en: As we can see, the results are very strong. Based on the used approach, introducing
    the credit subsidy program led to an increase in the real estate price index of
    **16.5 units** compared to what could have happened without introducing such a
    program.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，结果非常显著。根据所使用的方法，引入信贷补贴计划导致房地产价格指数比没有引入此类计划的情况增加了**16.5个单位**。
- en: '![](../Images/d3913a902002481716d83455e3c71a81.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d3913a902002481716d83455e3c71a81.png)'
- en: '**Placebo test**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**安慰剂测试**'
- en: You might think that anyone can generate such data, and there could be a lot
    of randomness in showing those results. After all, the results of applying the
    synthetic approach could have occurred merely by chance. Fortunately, we have
    a great way to check the robustness of obtained results – it’s called a placebo
    test.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想，任何人都可以生成这样的数据，展示这些结果可能会有很多随机性。毕竟，应用合成方法的结果可能仅仅是偶然发生的。幸运的是，我们有一个很好的方法来检查获得结果的稳健性——它被称为安慰剂测试。
- en: Again, it is not an introductory article to the synthetic control group method,
    so we will not dive very deep into the technical intricacies of this test. Generally,
    each unit (a country in our case) will treated as a target in the synthetic control
    group calculation. And all the rest of the countries are our donor pool.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，这不是合成控制组方法的入门文章，因此我们不会深入探讨这个测试的技术细节。一般来说，每个单位（在我们的案例中是一个国家）将被视为合成控制组计算中的目标。其余所有国家都是我们的捐赠池。
- en: We will create many synthetic control groups. A different country will be the
    point of reference for each of them. When the calculation is completed, we can
    check how many placebo control groups the effect was more substantial than the
    one observed in Poland. It is a relatively simple and fast way to obtain the equivalent
    of the p-value in the synthetic control group approach.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将创建许多合成控制组。每个组将以不同的国家为参考点。当计算完成后，我们可以检查有多少安慰剂控制组的效果比在波兰观察到的效果更显著。这是一种相对简单快捷的方法，可以获取合成控制组方法中p值的等效值。
- en: First, we must package the synthetic control group calculation in the python
    function. It will enable us to create an iterative synthetic control group for
    each country.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们必须将合成控制组计算打包到Python函数中。这将使我们能够为每个国家创建一个迭代的合成控制组。
- en: The code below adds one additional caveat we haven’t discussed yet. It excludes
    regions with a poor pre-treatment synthetic control group fit, allowing us to
    have more stable results. We can follow the procedure presented in Abadie (2010),
    and excluding all regions for each MSE was more than five times higher than in
    creating a synthetic control group for Poland.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码增加了一个我们尚未讨论的额外注意事项。它排除了预处理合成控制组拟合度较差的地区，使我们能够得到更稳定的结果。我们可以遵循Abadie（2010）中提出的程序，并且排除所有MSE比为波兰合成控制组创建的MSE超过五倍的地区。
- en: Finally, we have all the pieces to conduct a placebo test. The code iterates
    through each region, generates a synthetic control group, calculates the MSE for
    the pre-Q3 2023 period, and compares that MSE to Poland’s MSE. Only regions with
    an MSE less than five times Poland’s MSE are kept.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们拥有了进行安慰剂测试的所有部件。代码遍历每个地区，生成一个合成控制组，计算2023年第三季度之前的MSE，并将该MSE与波兰的MSE进行比较。只有MSE小于五倍波兰MSE的地区才会被保留。
- en: The final result is a list (`df_list`) containing synthetic control results
    for the regions that meet this condition, allowing for more stable and reliable
    comparisons across regions.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 最终结果是包含满足此条件地区合成控制结果的列表（`df_list`），这允许我们在地区之间进行更稳定和可靠的比较。
- en: Let’s visualize the results of the placebo test. We will plot the differences
    between each country’s actual real estate price index and the synthetic one. Let’s
    highlight data obtained from Poland to see how unusual the results obtained in
    our small research are.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们可视化安慰剂测试的结果。我们将绘制每个国家实际房地产价格指数与合成指数之间的差异。让我们突出显示来自波兰的数据，以了解我们的小型研究获得的结果有多么不寻常。
- en: The plot helps compare the treated region (in red) with placebo regions (in
    light blue), helping to identify whether the observed effect is unique to the
    treated area.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 该图有助于比较受处理的地区（红色）与安慰剂地区（浅蓝色），有助于确定观察到的效果是否仅限于处理区域。
- en: '![](../Images/48b2ce9c6a6c93a8d201e20f5acc96af.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/48b2ce9c6a6c93a8d201e20f5acc96af.png)'
- en: The alignment of the red and blue lines before 2023 indicates no significant
    differences before the intervention, supporting the validity of the synthetic
    control method. In other words, Poland’s synthetic control group did not differ
    much from the synthetic groups generated for other countries.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: Compared to the placebo regions, the sharp rise in the red line after 2023 indicates
    that the credit subsidy program likely substantially affected Poland. This divergence
    from the synthetic control suggests that the target region experienced a change
    that wasn’t mirrored in the placebo regions.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: In summary, the chart suggests a **substantial and significant post-2023 intervention
    effect** in the target region, while other regions (placebo) did not show such
    a pattern. It visually confirms that the effect obtained in Poland is not merely
    due to chance.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: As the last step, we can quantify the effects from the chart above. We can easily
    calculate the p-value by checking in how many placebo control groups, the effect
    was stronger than in Poland. Ideally, this number should be as low as possible.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: Its calculation is conducted using the following piece of code. It retrieves
    the difference in price indices between the actual and synthetic control groups.
    We will store whether the difference between the placebo regions exceeds Poland’s
    difference in a list.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: 'The average of the values in the _diff*list* will indicate the desired p-value:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4749ed898e0d1322ea5ddc5dcba6816b.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
- en: This proportion can be interpreted as the **p-value** for the synthetic control
    group test. It represents the likelihood that a placebo region had a more significant
    difference than Poland by chance. Since we obtained a small value, it is unlikely
    that the placebo regions will exhibit a more substantial price difference than
    Poland by chance, suggesting that the observed effect in Poland is statistically
    significant.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: '**Limitations and summary**'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: The study conducted above was my first approach to applying causal inference
    techniques to study the effect of the actual policy intervention. The calculation
    of it differs strongly from the controlled environment we can encounter in either
    academia or industry. Nevertheless, the compelling results show that causal inference
    can support many critical decisions.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: I am fully aware of all the limitations of my relatively straightforward analysis.
    After all, it is not rigorous academic research. There can indeed be many other
    factors influencing real estate prices in Poland.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: For example, the spike occurred due to the increased number of refugees from
    Ukraine due to the Russian invasion. However, this influx occurred in 2022, and
    the exceptionally high real estate prices increased in 2023 when the subsidy program
    occurred.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: The other argument could be that the Polish economy has grown more potent than
    other countries within the EU. I can indeed be a valid argument. However, no significant
    economic event occurred in Poland in the second half of 2023\. Again, the synthetic
    control group considers the similarity of other countries to Poland before the
    treatment had occurred.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个观点可能是，波兰经济比欧盟内的其他国家增长得更强大。这确实可能是一个有效的论点。然而，在2023年下半年，波兰没有发生重大的经济事件。再次强调，合成控制组在治疗发生之前考虑了其他国家与波兰的相似性。
- en: Based on the analysis above, I can confidently say that the credit subsidy program
    contributes significantly to the increase in real estate prices in Poland. The
    release of such programs can lead to a disproportional price increase, leading
    to decreased availability of apartments. Analyzing the program’s effect on people
    with different income levels could be an interesting next step in such evaluation.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 根据上述分析，我可以自信地说，信贷补贴计划对波兰房地产价格的上涨做出了重大贡献。这些计划的发布可能导致价格不成比例地上涨，从而导致公寓的可用性降低。分析该计划对不同收入水平人群的影响可能是此类评估的下一步有趣的研究方向。
- en: The analysis above shows that the relatively simple casual inference method
    can help evaluate particular policies. And if such results are applied in real
    life, we could improve society by applying data science tools.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 上述分析显示，相对简单的因果推断方法可以帮助评估特定政策。如果将这些结果应用于现实生活中，我们可以通过应用数据科学工具来改善社会。
