- en: 'Time Series Forecasting Made Simple (Part 4.1): Understanding Stationarity
    in a Time Series'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/time-series-forecasting-made-simple-part-4-1-understanding-stationarity-in-a-time-series/](https://towardsdatascience.com/time-series-forecasting-made-simple-part-4-1-understanding-stationarity-in-a-time-series/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756235803269" class="mdspan-comment">In this series</mdspan>
    so far, we have discussed different decomposition methods and baseline models.
    Now, we move on to Time Series Forecasting models like ARIMA, SARIMA, etc.
  prefs: []
  type: TYPE_NORMAL
- en: But these forecasting models require the data to be stationary. So first, we
    will discuss what stationarity in a time series actually is, why it is required,
    and how it is achieved.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Perhaps most of you have already read a lot about stationarity in a time series
    through blogs, books, etc., as there are a lot of resources available to learn
    about it.
  prefs: []
  type: TYPE_NORMAL
- en: At first, I thought to explain what stationarity in time series is when I discuss
    forecasting models like ARIMA, etc.
  prefs: []
  type: TYPE_NORMAL
- en: But when I first learnt about this topic, my understanding didn’t go much beyond
    constant mean or variance, strong or weak stationarity, and tests to check for
    stationarity.
  prefs: []
  type: TYPE_NORMAL
- en: Something always felt missing; I was unable to understand a few things about
    stationarity.
  prefs: []
  type: TYPE_NORMAL
- en: So, I decided to write a separate article on this topic to explain what I learnt
    in response to my questions or doubts on stationarity.
  prefs: []
  type: TYPE_NORMAL
- en: I just tried to write about stationarity in time series in a more intuitive
    way, and I hope you will get a fresh perspective on this topic beyond the methods
    and statistical tests.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**We call a time series stationary when it has a constant mean, constant variance
    and a constant autocovariance or constant autocorrelation structure.**'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s discuss each property.
  prefs: []
  type: TYPE_NORMAL
- en: What do we mean by **Constant Mean**?
  prefs: []
  type: TYPE_NORMAL
- en: For example, consider a time series of sales data for 5 years. If we calculate
    the average sales of each year, the values should be roughly the same and if the
    averages differ significantly for each year, then there is no constant mean and
    time series is not stationary.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7d1d8818fdbebde0c6896b902a7dbb83.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The next property of a stationary time series is **Constant Variance.**
  prefs: []
  type: TYPE_NORMAL
- en: If the spread of the data is the same throughout the series, then it is said
    to have Constant Variance.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, if the time series goes up and down by similar amounts throughout
    the series, then it is said to have Constant Variance.
  prefs: []
  type: TYPE_NORMAL
- en: But if the ups and downs start small and then become larger later, then there
    is no constant variance.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/30cde15e98c8acd5cee7132fd5f28b95.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The third property of a stationary time series is **Constant Autocovariance
    (or Autocorrelation).**
  prefs: []
  type: TYPE_NORMAL
- en: If the relationship between values depends only on the gap between them, regardless
    of when they occur, then there is Constant Autocovariance.
  prefs: []
  type: TYPE_NORMAL
- en: For example, you have written a blog and tracked its views for 50 days and if
    each day’s views are closely related to previous day’s views (day 6 views similar
    to day 5 and day 37 views similar to day 36, because they are one day apart).
  prefs: []
  type: TYPE_NORMAL
- en: If this relationship stays the same throughout the entire series, then autocovariance
    is constant.
  prefs: []
  type: TYPE_NORMAL
- en: In a stationary time series the autocorrelation usually decreases as the lag
    (or distance) increases because only nearby values are strongly related.
  prefs: []
  type: TYPE_NORMAL
- en: If autocorrelation remains high at larger lags, it may indicate the presence
    of trend or seasonality, suggesting non-stationarity.
  prefs: []
  type: TYPE_NORMAL
- en: When a time series has all of these three properties, then we call it a stationary
    time series, but we call this a second order stationarity or **weak stationarity**.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are mainly two types of stationarity:'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Strong Stationarity
  prefs: []
  type: TYPE_NORMAL
- en: 2) Weak Stationarity
  prefs: []
  type: TYPE_NORMAL
- en: Strong Stationarity means the entire time series stays the same whenever we
    observe it, not just mean and variance but even skewness, kurtosis and overall
    shape of distribution.
  prefs: []
  type: TYPE_NORMAL
- en: In real world this is rare for a time series, so the classic forecasting models
    assumes weak stationarity, a more realistic and practical condition.
  prefs: []
  type: TYPE_NORMAL
- en: '**Identifying Stationarity in a Time Series**'
  prefs: []
  type: TYPE_NORMAL
- en: There are different methods for identifying stationarity in a Time Series.
  prefs: []
  type: TYPE_NORMAL
- en: To understand those methods, let’s consider a [retail sales dataset](https://fred.stlouisfed.org/series/RSDSELD)
    which we used earlier in this series for STL Decomposition.
  prefs: []
  type: TYPE_NORMAL
- en: First is **Visual Inspection**.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s plot this series
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c3848432e15a64571495f124c5ca7c85.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: From the above plot, we can observe both trend and seasonality in the time series,
    which indicates that the mean is not constant. Therefore, we can conclude that
    this series is non-stationary.
  prefs: []
  type: TYPE_NORMAL
- en: Another method to test stationarity is to **divide the time series into two
    halves** and calculate the mean and variance.
  prefs: []
  type: TYPE_NORMAL
- en: If the values are roughly the same, then the series is stationary.
  prefs: []
  type: TYPE_NORMAL
- en: For this time series,
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b66cfa80be01789086d84d43629ece30.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The mean is significantly higher, and variance is also much larger in first
    half. Since the mean and variance are not constant, this confirms that this time
    series is nonstationary.
  prefs: []
  type: TYPE_NORMAL
- en: We can also identify the stationarity in a time series by using the **Autocorrelation
    (ACF) plot**.
  prefs: []
  type: TYPE_NORMAL
- en: ACF plot for this time series
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f139f9af1c3eda9eedfba76798986cb9.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: In the above plot, we can observe that each observation in this time series
    is correlated with its previous values at different lags.
  prefs: []
  type: TYPE_NORMAL
- en: As discussed earlier, autocorrelation gradually decays to zero in a stationary
    time series.
  prefs: []
  type: TYPE_NORMAL
- en: But that is not the case here as the autocorrelation is high at several lags
    (i.e., the observations are highly correlated even when they are farther apart)
    and it suggests the presence of trend and seasonality, which confirms that the
    series is non-stationary.
  prefs: []
  type: TYPE_NORMAL
- en: We also have statistical tests to identify stationarity in a time series.
  prefs: []
  type: TYPE_NORMAL
- en: One is **Augmented Dickey Fuller (ADF) Test**, and the other is **Kwiatkowski-Phillips-Schmidt-Shin
    (“KPSS”) Test.**
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see what we get when we apply these tests to the time series.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d97434d7129b54e49885a3451a25c635.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Both the tests confirm that the time series is non-stationary.
  prefs: []
  type: TYPE_NORMAL
- en: These are the methods we use to identify stationarity in a time series,
  prefs: []
  type: TYPE_NORMAL
- en: '**Transforming a non-stationary time series to a Stationary Time Series.**'
  prefs: []
  type: TYPE_NORMAL
- en: We have a technique called **‘Differencing’** to transform a non-stationary
    to stationary series.
  prefs: []
  type: TYPE_NORMAL
- en: In this method, we subtract each value from its previous value. This way we
    see how much they change from one time to next.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider a sample from retail sales dataset and then proceed with differencing.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3b30ce55fe205d85cf7ed8d29ece76ac.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Now we perform differencing, this we call as first-order differencing.
  prefs: []
  type: TYPE_NORMAL
- en: This is how differencing is applied across the whole time series to see how
    the values change over time.
  prefs: []
  type: TYPE_NORMAL
- en: Before first order differencing,
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c3848432e15a64571495f124c5ca7c85.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: After first order differencing
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d6fe490e33c23671b1115ff494a78244.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Before applying first-order differencing, we can observe a growing trend in
    the original time series along with occasional spikes at regular intervals, indicating
    seasonality.
  prefs: []
  type: TYPE_NORMAL
- en: After differencing, the series fluctuates around zero, which means the trend
    has been removed.
  prefs: []
  type: TYPE_NORMAL
- en: However, since the seasonal spikes are still present, the next step is to apply
    **seasonal differencing**.
  prefs: []
  type: TYPE_NORMAL
- en: In seasonal differencing, we subtract the value from the same season in previous
    cycle.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this time series we have yearly seasonality (12 months), which means:'
  prefs: []
  type: TYPE_NORMAL
- en: For January 1993, we calculate Jan 1993 – Jan 1992.
  prefs: []
  type: TYPE_NORMAL
- en: This way we apply seasonal differencing to whole series.
  prefs: []
  type: TYPE_NORMAL
- en: After seasonal differencing on first order differenced series, we get
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/111d89508d19e21dacd2f777dec76937.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: We can observe that the seasonal spikes are gone and also for year 1992 we get
    null values because there are no previous values to subtract.
  prefs: []
  type: TYPE_NORMAL
- en: After first order differencing and seasonal differencing, the trend and seasonality
    in a time series are removed.
  prefs: []
  type: TYPE_NORMAL
- en: Now we will again test for stationarity using ADF and KPSS tests.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b6cfb3b9164289fa3300bf27175f9e11.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: We can see that the time series is stationary.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Note:** In the final seasonal differenced series, we still observe some spikes
    around 2020-2022 because of pandemic (one-time events).'
  prefs: []
  type: TYPE_NORMAL
- en: These are called Interventions. They may not violate stationarity; they can
    affect model accuracy. Techniques like Intervention analysis can be used here.
  prefs: []
  type: TYPE_NORMAL
- en: We will discuss this when we explore ARIMA modeling.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: We removed the trend and seasonality in the time series to make it stationary
    using differencing.
  prefs: []
  type: TYPE_NORMAL
- en: Now instead of differencing, we can also use STL Decomposition.
  prefs: []
  type: TYPE_NORMAL
- en: Earlier in this series, we discussed that when trend and seasonal patterns in
    time series get messy, we use STL to extract those patterns in a time series.
  prefs: []
  type: TYPE_NORMAL
- en: So, we can apply STL decomposition on a time series and extract the residual
    component which we get after removing trend and seasonality.
  prefs: []
  type: TYPE_NORMAL
- en: We will also discuss **‘STL + ARIMA’** when we explore the ARIMA forecasting
    model.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: So far, we have discussed methods for identifying stationarity and for transforming
    non-stationary time series into stationary.
  prefs: []
  type: TYPE_NORMAL
- en: '**But why do time series forecasting models assume stationarity?**'
  prefs: []
  type: TYPE_NORMAL
- en: We use time series forecasting models to predict the future based on past values.
  prefs: []
  type: TYPE_NORMAL
- en: These models require a stationary time series to predict the future because
    the patterns remain consistent over time.
  prefs: []
  type: TYPE_NORMAL
- en: In non-stationary time series, there is a constant change in mean and variance,
    making the patterns unstable and the predictions unreliable.
  prefs: []
  type: TYPE_NORMAL
- en: '**Aren’t trend and seasonality also patterns in a time series?**'
  prefs: []
  type: TYPE_NORMAL
- en: Trend and Seasonality are also the patterns in a time series, but they violate
    the assumptions of models like ARIMA, which require stationary input.
  prefs: []
  type: TYPE_NORMAL
- en: Trend and Seasonality are handled separately before modelling, and we will discuss
    this in upcoming blogs.
  prefs: []
  type: TYPE_NORMAL
- en: These time series forecasting models are designed to capture short-term dependencies
    after removing global patterns.
  prefs: []
  type: TYPE_NORMAL
- en: '**What exactly are these short-term dependencies?**'
  prefs: []
  type: TYPE_NORMAL
- en: When we have a time series, we try to decompose it using decomposition methods
    to understand the trend, seasonality and residuals in it.
  prefs: []
  type: TYPE_NORMAL
- en: We already know that the trend gives us the overall direction of the data over
    time (up or down) and seasonality shows the patterns that repeat at regular intervals.
  prefs: []
  type: TYPE_NORMAL
- en: We also get residual, which is remaining after we remove trend and seasonality
    from the time series. This residual is unexplained by trend and seasonality.
  prefs: []
  type: TYPE_NORMAL
- en: Trend gives overall direction and seasonality shows patterns that gets repeated
    throughout the series.
  prefs: []
  type: TYPE_NORMAL
- en: But there may be some patterns in residual which are temporary in a time series
    like a sudden spike in sales due to a promotion event or a sudden drop in sales
    due to strike or weather conditions.
  prefs: []
  type: TYPE_NORMAL
- en: '**What can models like ARIMA do with this data?**'
  prefs: []
  type: TYPE_NORMAL
- en: Do models predict future promotional events or strikes based on this data? No.
  prefs: []
  type: TYPE_NORMAL
- en: Most of the time series forecasting models are used in live production systems
    across many industries (Real-Time).
  prefs: []
  type: TYPE_NORMAL
- en: In real-time forecasting systems, as new data comes in, the forecasts are continuously
    updated to reflect the latest trends and patterns.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a simple example of cool drinks inventory management.
  prefs: []
  type: TYPE_NORMAL
- en: The store owner knows that the cool drinks sales is high in summer and low in
    winter. But that doesn’t help him in daily inventory planning. Here the short
    term dependencies are critical.
  prefs: []
  type: TYPE_NORMAL
- en: For example,
  prefs: []
  type: TYPE_NORMAL
- en: there may be a spike in sales during festivals and wedding season for some time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If there is a sudden temperature spike (heat wave)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A weekend 1+1 offer may increase sales
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Weekend sales may be high compared to weekdays.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When store was out of stock for 2-3 days and the moment stock is back there
    may be a sudden burst of sales.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These patterns don’t repeat consistently like seasonality, and they aren’t part
    of a long-term trend. But they do occur often that forecasting models can learn
    from them.
  prefs: []
  type: TYPE_NORMAL
- en: Time series forecasting models don’t predict these future events, but they learn
    the patterns or behavior of the data when such a spike appears.
  prefs: []
  type: TYPE_NORMAL
- en: The model then predicts according to it like a spike in sales after a promotional
    event the sales may gradually become normal rather than a sudden drop. The models
    capture these patterns and provide reliable outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: After prediction, the trend and seasonality components are added back to obtain
    the final forecast.
  prefs: []
  type: TYPE_NORMAL
- en: This is why the short-term dependencies are critical in time series forecasting.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Dataset:** This blog uses publicly available data from FRED (Federal Reserve
    Economic Data). The series *Advance Retail Sales: Department Stores (RSDSELD)*
    is published by the U.S. Census Bureau and can be used for analysis and publication
    with appropriate citation.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Official citation:'
  prefs: []
  type: TYPE_NORMAL
- en: 'U.S. Census Bureau, *Advance Retail Sales: Department Stores* [RSDSELD], retrieved
    from FRED, Federal Reserve Bank of St. Louis; [https://fred.stlouisfed.org/series/RSDSELD](https://fred.stlouisfed.org/series/RSDSELD),
    July 7, 2025.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Note:**'
  prefs: []
  type: TYPE_NORMAL
- en: All the visualizations and test results shown in this blog were generated using
    Python code.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can explore the complete code here: [GitHub](https://github.com/NikhilDasari076/Stationarity-in-a-time-series).'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: In this blog, I used Python to perform statistical tests and, based on the results,
    determined whether the time series is stationary or non-stationary.
  prefs: []
  type: TYPE_NORMAL
- en: Next up in this series is a detailed discussion of the statistical tests (ADF
    and KPSS tests) used to identify stationarity.
  prefs: []
  type: TYPE_NORMAL
- en: I hope you found this blog intuitive and helpful.
  prefs: []
  type: TYPE_NORMAL
- en: I’d love to hear your thoughts.
  prefs: []
  type: TYPE_NORMAL
- en: If you’d like to read more of my writing, you can also find it on [Medium](https://medium.com/@dasarinikhil076)
    and [LinkedIn](https://www.linkedin.com/in/nikhildasari-dataanalyst/).
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
