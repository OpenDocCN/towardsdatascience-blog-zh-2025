  prefs: []
  type: TYPE_NORMAL
- en: '[Bias and variance](https://en.wikipedia.org/wiki/Bias%E2%80%93variance_tradeoff):
    important concepts for discussing the accuracy of the density estimation approaches
    discussed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The [cumulative distribution function](https://en.wikipedia.org/wiki/Cumulative_distribution_function)
    and [probability density function](https://en.wikipedia.org/wiki/Probability_density_function).
  prefs:
