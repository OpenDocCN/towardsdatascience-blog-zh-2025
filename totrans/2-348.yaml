- en: 'Non-Parametric Density Estimation: Theory and Applications'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/non-parametric-density-estimation-theory-and-applications/](https://towardsdatascience.com/non-parametric-density-estimation-theory-and-applications/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In <mdspan datatext="el1747164910687" class="mdspan-comment">this article</mdspan>,
    we’ll talk about what density estimation is and the role it plays in statistical
    analysis. We’ll analyze two popular density estimation methods, **histograms**
    and **kernel density estimators**, and analyze their theoretical properties as
    well as how they perform in practice. Finally, we’ll look at how density estimation
    may be used as a tool for classification tasks. Hopefully after reading this article,
    you leave with an appreciation of density estimation as a fundamental statistical
    tool, and a solid intuition behind the density estimation approaches we discuss
    here. Ideally, this article will also spark an interest in learning more about
    density estimation and point you towards additional resources to help you dive
    deeper than what is discussed here!
  prefs: []
  type: TYPE_NORMAL
