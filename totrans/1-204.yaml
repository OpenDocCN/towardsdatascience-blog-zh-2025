- en: Dreaming in Blocks — MineWorld, the Minecraft World Model
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Dreaming in Blocks — MineWorld，Minecraft世界模型
- en: 原文：[https://towardsdatascience.com/dreaming-in-blocks-mineworld-the-minecraft-world-model/](https://towardsdatascience.com/dreaming-in-blocks-mineworld-the-minecraft-world-model/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/dreaming-in-blocks-mineworld-the-minecraft-world-model/](https://towardsdatascience.com/dreaming-in-blocks-mineworld-the-minecraft-world-model/)
- en: '![](../Images/966c4b7bdc0ad8bae23528eebbdf22f1.png)'
  id: totrans-2
