  prefs: []
  type: TYPE_NORMAL
- en: '[3] S. Dobrontei and J. Nurse, [Oh, Behave! The Annual Cybersecurity Attitudes
    and Behaviors Report 2024–2025 — CybSafe](https://www.cybsafe.com/whitepapers/oh-behave-the-annual-cybersecurity-attitudes-and-behaviors-report-24-25/)
    (2025), Cybsafe and the National Cybersecurity Alliance'
  prefs: []
