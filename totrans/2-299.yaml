    The Good, The Bad, and The Ugly (2024)](https://www.sciencedirect.com/science/article/pii/S266729522400014X),
    ScienceDirect'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] Y. Mulayam, [Data Breach Forecast 2025: Costs & Key Cyber Risks](https://certbar.com/leadership-insights/data-breach-forecast-2025)
