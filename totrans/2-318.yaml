- en: 'Do More with NumPy Array Type Hints: Annotate & Validate Shape & Dtype'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用 NumPy 数组类型提示做更多：注释和验证形状与 `dtype`
- en: 原文：[https://towardsdatascience.com/do-more-with-numpy-array-type-hints-annotate-validate-shape-dtype/](https://towardsdatascience.com/do-more-with-numpy-array-type-hints-annotate-validate-shape-dtype/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/do-more-with-numpy-array-type-hints-annotate-validate-shape-dtype/](https://towardsdatascience.com/do-more-with-numpy-array-type-hints-annotate-validate-shape-dtype/)
- en: '<mdspan datatext="el1748025684049" class="mdspan-comment">The NumPy</mdspan>
    array object can take many concrete forms. It might be a one-dimensional (1D)
    array of Booleans, or a three-dimensional (3D) array of 8-bit unsigned integers.
    As the built-in function `isinstance()` will show, every array is an instance
    of `np.ndarray`, regardless of shape or the type of elements stored in the array,
    i.e., the `dtype`. Similarly, many type-annotated interfaces still only specify
    `np.ndarray`:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748025684049" class="mdspan-comment">NumPy</mdspan> 数组对象可以采取许多具体形式。它可能是一个一维（1D）的布尔数组，或者是一个三维（3D）的
    8 位无符号整数数组。正如内置函数 `isinstance()` 所显示的，每个数组都是 `np.ndarray` 的实例，无论形状或数组中存储的元素类型（即
    `dtype`）如何。同样，许多类型注解的接口仍然只指定 `np.ndarray`：
- en: '[PRE0]'
  id: totrans-3
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Such type annotations are insufficient: most interfaces have strong expectations
    of the shape or `dtype` of passed arrays. Most code will fail if a 3D array is
    passed where a 1D array is expected, or an array of dates is passed where an array
    of floats is expected.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这样的类型注解是不够的：大多数接口对传入数组的形状或 `dtype` 有强烈的期望。如果期望一个 1D 数组而传入了一个 3D 数组，或者期望一个浮点数数组而传入了一个日期数组，大多数代码都会失败。
- en: 'Taking full advantage of the generic `np.ndarray`, array shape and `dtype`
    characteristics can now be fully specified:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 充分利用泛型 `np.ndarray`，现在可以完全指定数组形状和 `dtype` 特征：
- en: '[PRE1]'
  id: totrans-6
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: With such detail, recent versions of static analysis tools like `mypy` and `pyright`
    can find issues before code is even run. Further, run-time validators specialized
    for NumPy, like [StaticFrame](https://github.com/static-frame/static-frame)‘s
    `sf.CallGuard`, can re-use the same annotations for run-time validation.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这样的细节下，静态分析工具的最新版本，如 `mypy` 和 `pyright`，可以在代码运行之前找到问题。此外，针对 NumPy 专门的运行时验证器，如
    [StaticFrame](https://github.com/static-frame/static-frame) 的 `sf.CallGuard`，可以重用相同的注解进行运行时验证。
- en: Generic Types in Python
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Python 中的泛型类型
- en: Generic built-in containers such as `list` and `dict` can be made concrete by
    specifying, for each interface, the contained types. A function can declare it
    takes a `list` of `str` with `list[str]`; or a `dict` of `str` to `bool` can be
    specified with `dict[str, bool]`.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 通过指定每个接口所包含的类型，可以将泛型内置容器如 `list` 和 `dict` 具体化。一个函数可以声明它接受一个 `str` 类型的 `list`，用
    `list[str]` 表示；或者可以指定一个 `str` 到 `bool` 的 `dict`，用 `dict[str, bool]` 表示。
- en: The Generic `np.ndarray`
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 泛型 `np.ndarray`
- en: 'An `np.ndarray` is an N-dimensional array of a single element type (or `dtype`).
    The `np.ndarray` generic takes two type parameters: the first defines the shape
    with a `tuple`, the second defines the element type with the generic `np.dtype`.
    While `np.ndarray` has taken two type parameters for some time, the definition
    of the first parameter, shape, was not full specified until NumPy 2.1.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '`np.ndarray` 是一个由单一元素类型（或 `dtype`）组成的 N 维数组。`np.ndarray` 泛型接受两个类型参数：第一个通过一个
    `tuple` 定义形状，第二个通过泛型 `np.dtype` 定义元素类型。虽然 `np.ndarray` 已经使用了两个类型参数一段时间了，但第一个参数（形状）的定义直到
    NumPy 2.1 才被完全指定。'
- en: The Shape Type Parameter
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 形状类型参数
- en: When creating an array with interfaces like `np.empty` or `np.full`, a shape
    argument is given as a tuple. The length of the tuple defines the array’s dimensionality;
    the magnitude of each position defines the size of that dimension. Thus a shape
    `(10,)` is a 1D array of 10 elements; a shape `(10, 100, 1000)` is a three dimensional
    array of size 10 by 100 by 1000.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用 `np.empty` 或 `np.full` 等接口创建数组时，形状参数以一个 `tuple` 的形式给出。元组的长度定义了数组的维度；每个位置的大小定义了该维度的尺寸。因此，形状
    `(10,)` 是一个包含 10 个元素的 1D 数组；形状 `(10, 100, 1000)` 是一个大小为 10x100x1000 的三维数组。
- en: When using a `tuple` to define shape in the `np.ndarray` generic, at present
    only the number of dimensions can generally be used for type checking. Thus, a
    `tuple[int]` can specify a 1D array; a `tuple[int, int, int]` can specify a 3D
    array; a `tuple[int, ...]`, specifying a tuple of zero or more integers, denotes
    an N-dimensional array. It might be possible in the future to type-check an `np.ndarray`
    with specific magnitudes per dimension (using `Literal`), but this is not yet
    broadly supported.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当在 `np.ndarray` 泛型中使用 `tuple` 来定义形状时，目前通常只能使用维数的数量进行类型检查。因此，`tuple[int]` 可以指定一维数组；`tuple[int,
    int, int]` 可以指定三维数组；`tuple[int, ...]`，指定零个或多个整数的元组，表示一个 N 维数组。未来可能能够对每个维度的特定大小进行类型检查（使用
    `Literal`），但这目前还没有广泛支持。
- en: The `dtype` Type Parameter
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '`dtype` 类型参数'
- en: The NumPy `dtype` object defines element types and, for some types, other characteristics
    such as size (for Unicode and string types) or unit (for `np.datetime64` types).
    The `dtype` itself is generic, taking a NumPy “generic” type as a type parameter.
    The most narrow types specify specific element characteristics, for example `np.uint8`,
    `np.float64`, or `np.bool_`. Beyond these narrow types, NumPy provides more general
    types, such as `np.integer`, `np.inexact`, or `np.number`.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 的 `dtype` 对象定义了元素类型，对于某些类型，还包括其他特性，例如大小（对于 Unicode 和字符串类型）或单位（对于 `np.datetime64`
    类型）。`dtype` 本身是泛型的，它接受一个 NumPy “泛型”类型作为类型参数。最窄的类型指定了特定的元素特性，例如 `np.uint8`、`np.float64`
    或 `np.bool_`。在这些窄类型之外，NumPy 提供了更通用的类型，如 `np.integer`、`np.inexact` 或 `np.number`。
- en: Making `np.ndarray` Concrete
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使 `np.ndarray` 具体化
- en: 'The following examples illustrate concrete `np.ndarray` definitions:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例说明了具体的 `np.ndarray` 定义：
- en: 'A 1D array of Booleans:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 一个一维的布尔数组：
- en: '[PRE2]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'A 3D array of unsigned 8-bit integers:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 一个无符号 8 位整数的 3D 数组：
- en: '[PRE3]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'A two-dimensional (2D) array of Unicode strings:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 一个二维（2D）的 Unicode 字符串数组：
- en: '[PRE4]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'A 1D array of any numeric type:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 任何数值类型的 1D 数组：
- en: '[PRE5]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Static Type Checking with Mypy
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Mypy 进行静态类型检查
- en: Once the generic `np.ndarray` is made concrete, `mypy` or similar type checkers
    can, for some code paths, identify values that are incompatible with an interface.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦将泛型的 `np.ndarray` 具体化，`mypy` 或类似的类型检查器可以在某些代码路径中识别与接口不兼容的值。
- en: For example, the function below requires a 1D array of signed integers. As shown
    below, unsigned integers, or dimensionalities other than one, fail `mypy` checks.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，下面的函数需要一个一维的有符号整数数组。如下所示，无符号整数或维度不是一的数组将失败 `mypy` 检查。
- en: '[PRE6]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Runtime Validation with `sf.CallGuard`
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 `sf.CallGuard` 进行运行时验证
- en: Not all array operations can statically define the shape or `dtype` of a resulting
    array. For this reason, static analysis will not catch all mismatched interfaces.
    Better than creating redundant validation code across many functions, type annotations
    can be re-used for run-time validation with tools specialized for NumPy types.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有的数组操作都能静态地定义结果数组的形状或 `dtype`。因此，静态分析无法捕获所有不匹配的接口。相比于在许多函数中创建冗余的验证代码，类型注解可以被重复用于与
    NumPy 类型专用的工具进行运行时验证。
- en: The [StaticFrame](https://github.com/static-frame/static-frame) `CallGuard`
    interface offers two decorators, `check` and `warn`, which raise exceptions or
    warnings, respectively, on validation errors. These decorators will validate type-annotations
    against the characteristics of run-time objects.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '[StaticFrame](https://github.com/static-frame/static-frame) 的 `CallGuard` 接口提供了两个装饰器，`check`
    和 `warn`，它们在验证错误时分别抛出异常或警告。这些装饰器将验证类型注解与运行时对象的特性进行匹配。'
- en: 'For example, by adding `sf.CallGuard.check` to the function below, the arrays
    fail validation with expressive `CallGuard` exceptions:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，通过在下面的函数中添加 `sf.CallGuard.check`，数组在验证时将失败，并抛出具有表达性的 `CallGuard` 异常：
- en: '[PRE7]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Conclusion
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'More can be done to improve NumPy typing. For example, the `np.object_` type
    could be made generic such that Python types contained in an object array could
    be defined. For example, a 1D object array of pairs of integers could be annotated
    as:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 可以做更多的事情来改进 NumPy 类型。例如，`np.object_` 类型可以被做成泛型，这样对象数组中包含的 Python 类型就可以被定义。例如，一个包含整数对的一维对象数组可以被注解为：
- en: '[PRE8]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Further, units of `np.datetime64` cannot yet be statically specified. For example,
    date units could be distinguished from nanosecond units with annotations like
    `np.dtype[np.datetime64[Literal['D']]]` or `np.dtype[np.datetime64[Literal['ns']]]`.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，`np.datetime64` 的单位目前还不能静态指定。例如，可以使用类似 `np.dtype[np.datetime64[Literal['D']]]`
    或 `np.dtype[np.datetime64[Literal['ns']]]` 的注解来区分日期单位和纳秒单位。
- en: Even with limitations, fully-specified NumPy type annotations catch errors and
    improve code quality. As shown, static analysis can identify mismatched shape
    or `dtype`, and validation with `sf.CallGuard` can provide strong run-time guarantees.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 即使存在限制，完全指定的 NumPy 类型注解也能捕获错误并提高代码质量。如图所示，静态分析可以识别形状或 `dtype` 不匹配的情况，而使用 `sf.CallGuard`
    进行验证则可以提供强大的运行时保证。
