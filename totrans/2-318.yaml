- en: 'Do More with NumPy Array Type Hints: Annotate & Validate Shape & Dtype'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/do-more-with-numpy-array-type-hints-annotate-validate-shape-dtype/](https://towardsdatascience.com/do-more-with-numpy-array-type-hints-annotate-validate-shape-dtype/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1748025684049" class="mdspan-comment">The NumPy</mdspan>
    array object can take many concrete forms. It might be a one-dimensional (1D)
    array of Booleans, or a three-dimensional (3D) array of 8-bit unsigned integers.
    As the built-in function `isinstance()` will show, every array is an instance
    of `np.ndarray`, regardless of shape or the type of elements stored in the array,
    i.e., the `dtype`. Similarly, many type-annotated interfaces still only specify
    `np.ndarray`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Such type annotations are insufficient: most interfaces have strong expectations
    of the shape or `dtype` of passed arrays. Most code will fail if a 3D array is
    passed where a 1D array is expected, or an array of dates is passed where an array
    of floats is expected.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Taking full advantage of the generic `np.ndarray`, array shape and `dtype`
    characteristics can now be fully specified:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: With such detail, recent versions of static analysis tools like `mypy` and `pyright`
    can find issues before code is even run. Further, run-time validators specialized
    for NumPy, like [StaticFrame](https://github.com/static-frame/static-frame)‘s
    `sf.CallGuard`, can re-use the same annotations for run-time validation.
  prefs: []
  type: TYPE_NORMAL
- en: Generic Types in Python
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Generic built-in containers such as `list` and `dict` can be made concrete by
    specifying, for each interface, the contained types. A function can declare it
    takes a `list` of `str` with `list[str]`; or a `dict` of `str` to `bool` can be
    specified with `dict[str, bool]`.
  prefs: []
  type: TYPE_NORMAL
- en: The Generic `np.ndarray`
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'An `np.ndarray` is an N-dimensional array of a single element type (or `dtype`).
    The `np.ndarray` generic takes two type parameters: the first defines the shape
    with a `tuple`, the second defines the element type with the generic `np.dtype`.
    While `np.ndarray` has taken two type parameters for some time, the definition
    of the first parameter, shape, was not full specified until NumPy 2.1.'
  prefs: []
  type: TYPE_NORMAL
- en: The Shape Type Parameter
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When creating an array with interfaces like `np.empty` or `np.full`, a shape
    argument is given as a tuple. The length of the tuple defines the array’s dimensionality;
    the magnitude of each position defines the size of that dimension. Thus a shape
    `(10,)` is a 1D array of 10 elements; a shape `(10, 100, 1000)` is a three dimensional
    array of size 10 by 100 by 1000.
  prefs: []
  type: TYPE_NORMAL
- en: When using a `tuple` to define shape in the `np.ndarray` generic, at present
    only the number of dimensions can generally be used for type checking. Thus, a
    `tuple[int]` can specify a 1D array; a `tuple[int, int, int]` can specify a 3D
    array; a `tuple[int, ...]`, specifying a tuple of zero or more integers, denotes
    an N-dimensional array. It might be possible in the future to type-check an `np.ndarray`
    with specific magnitudes per dimension (using `Literal`), but this is not yet
    broadly supported.
  prefs: []
  type: TYPE_NORMAL
- en: The `dtype` Type Parameter
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The NumPy `dtype` object defines element types and, for some types, other characteristics
    such as size (for Unicode and string types) or unit (for `np.datetime64` types).
    The `dtype` itself is generic, taking a NumPy “generic” type as a type parameter.
    The most narrow types specify specific element characteristics, for example `np.uint8`,
    `np.float64`, or `np.bool_`. Beyond these narrow types, NumPy provides more general
    types, such as `np.integer`, `np.inexact`, or `np.number`.
  prefs: []
  type: TYPE_NORMAL
- en: Making `np.ndarray` Concrete
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
