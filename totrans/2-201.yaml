- en: Lessons Learned After 7.5 Years Of Machine Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 7.5年机器学习经验后的教训
- en: 原文：[https://towardsdatascience.com/lessons-learned-after-6-5-years-of-machine-learning/](https://towardsdatascience.com/lessons-learned-after-6-5-years-of-machine-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/lessons-learned-after-6-5-years-of-machine-learning/](https://towardsdatascience.com/lessons-learned-after-6-5-years-of-machine-learning/)
- en: <mdspan datatext="el1751306254221" class="mdspan-comment">When</mdspan> I started
    learning machine learning more than seven years ago, the field was in the midst
    of really getting traction. In 2017-ish, when I took my first university courses
    on classic machine learning, behind the scenes, key methods were already being
    developed that would lead to AI’s boom in the early 2020s. The GPT models were
    being published, and other companies followed suit, pushing the limits, both in
    performance and parameter sizes, with their models. For me, it was a great time
    to start learning machine learning, because the field was moving so fast that
    there was always something new.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751306254221" class="mdspan-comment">当我七年前开始学习机器学习时，这个领域正处于真正获得动力的过程中。大约在2017年，我上了第一堂关于经典机器学习的大学课程，幕后，关键方法正在被开发，这将导致2020年代初人工智能的繁荣。GPT模型正在发表，其他公司也效仿，通过他们的模型在性能和参数大小上推陈出新。对我来说，这是一个开始学习机器学习的绝佳时机，因为这个领域发展如此迅速，总有新的东西出现。
- en: From time to time, usually every 6 to 12 months, I look back on the years, mentally
    fast-forwarding from university lectures to doing commercial AI research. In looking
    back, I often find new principles that have been accompanying me during learning
    ML. In this review, I found that working deeply on one narrow topic has been a
    key principle for my progress over the last years. Beyond deep work, I’ve identified
    three other principles. They are not necessarily technical insights, but rather
    patterns of mindset and methods.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 不时地，通常每隔6到12个月，我会回顾过去几年，从大学课程快速过渡到进行商业人工智能研究。在回顾的过程中，我经常发现一些在学习机器学习过程中一直伴随着我的新原则。在这篇回顾中，我发现深入研究一个狭窄的主题在过去几年中一直是我进步的关键原则。除了深度工作之外，我还确定了其他三个原则。它们并不一定是技术洞察，而是心态和方法的模式。
- en: The Importance of Deep Work
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度工作的重要性
- en: 'Winston Churchill is famous not only for his oratory but also for his incredible
    quickness of mind. There’s a popular story about a verbal dispute between him
    and Lady Astor, the first woman in British Parliament. Trying to end an argument
    with him, she quipped:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 温斯顿·丘吉尔不仅以其演讲才能著称，还以其惊人的思维敏捷性而闻名。有一个关于他与英国议会第一位女性议员阿斯托尔夫人之间口头争论的流行故事。她试图结束与他的争论，开玩笑说：
- en: If I were your wife, I’d put poison in your tea.
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果我是你的妻子，我会在你的茶里下毒。
- en: 'Churchill, with his trademark sharpness, replied:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 丘吉尔以其标志性的锐利，回应道：
- en: And if I were your husband, I’d drink it.
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果我是你的丈夫，我会喝它。
- en: Giving witty repartee like that is admired because it’s a rare skill, and not
    everyone is born with such reflexive brilliance. Luckily, in our domain, doing
    ML research and engineering, quick wit is not the superpower that gets you far.
    What does is the ability to focus deeply.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 给出那样机智的回应是令人钦佩的，因为这是一种罕见的技能，并不是每个人都天生具备这样的反射性智慧。幸运的是，在我们这个领域，进行机器学习研究和工程，机智并不是让你走得很远的超级力量。真正重要的是能够深入专注。
- en: Machine learning work, especially the research side, is not fast-paced in the
    traditional sense. It requires long stretches of uninterrupted, intense thought.
    Coding ML algorithms, debugging obscure data issues, crafting a hypothesis — it
    all demands deep work.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习工作，尤其是研究方面，在传统意义上并不快节奏。它需要长时间的、不间断的、强烈的思考。编写机器学习算法、调试难以捉摸的数据问题、构建假设——这一切都需要深度工作。
- en: 'By “deep work,” I mean both:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 通过“深度工作”，我指的是两个方面：
- en: '**The skill to concentrate** deeply for extended periods'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**长时间集中精力的技能**'
- en: '**The environment** that allows and encourages such focus'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**允许并鼓励这种专注的环境**'
- en: Over the past two to three years, I’ve come to see deep work as essential to
    making meaningful progress. The hours I’ve spent in focused immersion — several
    times a week — have been far more productive than much more fragmented blocks
    of distracted productivity ever could. And, thankfully, working deeply can be
    learned, and your environment set up to support it.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去两到三年里，我逐渐认识到深度工作是取得有意义进步的关键。我每周多次专注于沉浸式工作的时间，比许多更碎片化的、分心的生产力块要高效得多。幸运的是，深度工作是可以学会的，并且可以设置环境来支持它。
- en: 'For me, the most fulfilling periods are always those leading up to paper submission
    deadlines. These are times where you can laser focus: the world narrows down to
    your project, and you’re in flow. Richard Feynman said it well:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，最满足的时期总是那些临近论文提交截止日期的时候。这些时候你可以高度集中精力：世界缩小到你的项目，你处于心流状态。理查德·费曼说得好：
- en: '**To do real good physics, you need absolute solid lengths of time… It needs
    a lot of concentration.**'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**要真正做好物理学，你需要绝对稳定的时间段……这需要大量的专注。**'
- en: Replace “**physics**” with “**machine learning**,” and the point still holds.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 将“**物理学**”替换为“**机器学习**”，这个观点依然成立。
- en: You Should (Mostly) Ignore Trends
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你应该（大部分时间）忽略趋势
- en: Have you heard of large language models? Of course, you have — names like LLaMA,
    Gemini, Claude, or Bard fill the tech news cycle. They’re the cool kids of generative
    AI, or “GenAI,” as it’s now stylishly called.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你听说过大型语言模型吗？当然，你听说过——像LLaMA、Gemini、Claude或Bard这样的名字充斥着科技新闻周期。它们是生成式AI的酷孩子，或者现在时髦地称为“GenAI”。
- en: 'But here’s the catch: when you’re just starting out, chasing trends can make
    gaining momentum hard.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 但这里有个问题：当你刚开始的时候，追逐趋势可能会让获得动力变得困难。
- en: I once worked with a researcher, and we both were just starting in “doing ML”.
    We’ll call my former colleague John. For his research, he dove head-first into
    the then-hot new field of retrieval-augmented generation (RAG), hoping to improve
    language model outputs by integrating external document search. He also wanted
    to analyze emergent capabilities of LLMs — things these models can do even though
    they weren’t explicitly trained for — and distill those into smaller models.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾经和一个研究人员一起工作过，我们当时都刚开始“做机器学习”。我们可以称我的前同事为约翰。为了他的研究，他一头扎进了当时热门的新领域——检索增强生成（RAG），希望通过整合外部文档搜索来提高语言模型输出。他还想分析大型语言模型（LLMs）的涌现能力——即使这些模型没有明确训练，它们也能做到的事情，并将这些能力提炼成更小的模型。
- en: The problem for John? The models he based his work on evolved too fast. Just
    getting a new state-of-the-art model running took weeks. By the time he did, a
    newer, better model was already published. That pace of change, combined with
    unclear evaluation criteria for his niche, made it nearly unmanageable for him
    to keep his research going. Especially for someone still new to research, like
    John and me back then.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰的问题？他基于其工作的模型变化太快。仅仅运行一个新的最先进模型就需要几周时间。等他做到这一点时，一个更新、更好的模型已经被发表。这种变化速度，加上他所在领域的评估标准不明确，几乎让他无法继续进行研究。尤其是对于像当时我和约翰这样的研究新手来说。
- en: 'This isn’t a criticism of John (I likely would have failed too). Instead, I
    am telling this story to make you consider: **does your progress rely on continually
    surfing the foremost wave of the latest trend?**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是对约翰（我可能也会失败）的批评。相反，我讲这个故事是想让你考虑：**你的进步是否依赖于不断追逐最新趋势的最前沿？**
- en: Doing Boring Data Analysis (Over and Over)
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 反复进行枯燥的数据分析
- en: Every time I get to train a model, I mentally breathe a sigh of relief.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 每次我到达训练模型的时候，我都会在心里松一口气。
- en: 'Why? Because it means I’m done with the hidden hard part: data analysis.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？因为这意味着我已经完成了隐藏的困难部分：数据分析。
- en: 'Here’s the usual sequence:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这通常的顺序是这样的：
- en: You have a project.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你有一个项目。
- en: You acquire some (real-world) dataset.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你获取一些（真实世界的）数据集。
- en: You want to train ML models.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你想训练机器学习模型。
- en: But first…you need to prepare the data.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 但首先…你需要准备数据。
- en: A *lot* can go wrong in that last step.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在最后一步中，可能会出很多问题。
- en: Let me illustrate this with a mistake I made while working with ERA5 weather
    data — a massive, gridded dataset from the European Centre for Medium-Range Weather
    Forecasts. I wanted to predict NDVI (Normalized Difference Vegetation Index),
    which indicates vegetation density, using historical weather patterns from the
    ERA5 data.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 让我用我在处理ERA5气象数据时犯的一个错误来举例说明——这是来自欧洲中期天气预报中心的巨大、网格化数据集。我想使用ERA5数据中的历史天气模式来预测NDVI（归一化植被指数），这表明植被密度。
- en: For my project, I had to merge the ERA5 weather data with NDVI satellite data
    I got from the NOAA, the US weather agency. I translated the NDVI data to ERA5’s
    resolution, added it as another layer, and, getting no shape mismatch, happily
    proceeded to train a Vision Transformer.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我的项目，我必须将ERA5气象数据与美国气象机构NOAA提供的NDVI卫星数据合并。我将NDVI数据转换为ERA5的分辨率，添加为另一层，并且没有形状不匹配，我高兴地继续训练一个视觉Transformer。
- en: A few days later, I visualized the model predictions and… surprise! The model
    thought Earth was upside down. Literally — my input data showed a normally oriented
    world, but my vegetation data was flipped at the Equator.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 几天后，我可视化了模型的预测结果，……惊喜！模型认为地球是倒置的。字面上说——我的输入数据显示了正常方向的世界，但我的植被数据在赤道处被翻转了。
- en: What went wrong? I had overlooked how the resolution translation flipped the
    orientation of the NDVI data.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 发生了什么问题？我忽视了分辨率转换如何翻转NDVI数据的方向。
- en: 'Why did I miss that? Simple: I did not want to do the data engineering, but
    directly skip ahead to machine learning. But the reality is this: in real-world
    ML work, getting the data right is the work.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我会错过那个？简单：我不想做数据工程，而是直接跳到机器学习。但现实是，在现实世界的机器学习工作中，正确处理数据才是工作。
- en: 'Yes, academic research often lets you work with curated datasets like ImageNet,
    CIFAR, or SQuAD. But for real projects? You’ll need to:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，学术研究通常让你可以使用精心挑选的数据集，如ImageNet、CIFAR或SQuAD。但对于真正的项目？你需要：
- en: Clean, align, normalize, and validate
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清理、对齐、归一化和验证
- en: Debug weird edge cases
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 调试奇怪的边缘情况
- en: Visually inspect intermediate data
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视觉检查中间数据
- en: And then repeat this until it’s truly ready
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 然后重复这个过程，直到真正准备好
- en: I learned this the hard way by skipping steps I thought were not necessary for
    my data. Don’t do the same.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我通过跳过我认为对我的数据不是必要的步骤而艰难地学到了这一点。不要做同样的事情。
- en: (Machine Learning) Research Is a Specific Kind of Trial and Error
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: （机器学习）研究是一种特定的试错过程
- en: 'From the outside, scientific progress always seems to be elegantly smooth:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 从外面看，科学进步似乎总是优雅而平稳的：
- en: '**Problem → Hypothesis → Experiment → Solution**'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题 → 假设 → 实验 → 解决方案**'
- en: But in practice, it’s much messier. You’ll make mistakes — some small, some
    facepalm-worthy. (e.g., Earth flipped upside down.) That’s okay. What matters
    is how you treat those mistakes.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 但在实践中，它要混乱得多。你会犯错误——有些小，有些令人尴尬。（例如，地球倒置。）没关系。重要的是你如何对待这些错误。
- en: Bad mistakes just happen. But insightful mistakes teach you something.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 错误只是偶然发生。但富有洞察力的错误能教会你一些东西。
- en: 'To help myself learn faster from the perceived failures, I now maintain a simple
    lab notebook. Before running an experiment, I write down:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更快地从感知到的失败中学习，我现在维护一个简单的实验笔记。在运行实验之前，我会写下：
- en: My hypothesis
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我的假设
- en: What I expect to happen
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我期待发生什么
- en: Why I expect it
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为什么我期待它
- en: Then, when the experimental results come back (often as a “nope, did not work”),
    I can reflect on why it might have failed and what that says about my assumptions.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，当实验结果回来（通常是一个“不，没有工作”），我可以反思为什么它可能失败，以及这对我假设的说明。
- en: 'This transforms errors into feedback, and feedback into learning. As the saying
    goes:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这将错误转化为反馈，将反馈转化为学习。正如俗话所说：
- en: An expert is someone who has made all the mistakes that can be made in a very
    narrow field.
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 专家是那些在一个非常狭窄的领域犯过所有可能犯的错误的人。
- en: That’s research.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 那是研究。
- en: Final Thoughts
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: 'After 7 and a half years, I’ve come to realize that doing machine learning
    well has little to do with flashy trends or just tuning (large language) models.
    In hindsight, I think it’s more about:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 经过7年半的时间，我逐渐意识到，做好机器学习与耀眼的趋势或仅仅调整（大型语言）模型几乎没有关系。事后看来，我认为它更多的是关于：
- en: Creating time and space for deep work
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为深度工作创造时间和空间
- en: Choosing depth over hype
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择深度而非炒作
- en: Taking data analysis seriously
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 认真对待数据分析
- en: Embracing the messiness of trial and error
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接受试错过程的混乱
- en: If you’re just starting out — or even are a few years in — these lessons are
    worth internalizing. They won’t show up in conference keynotes, but they’ll show
    up through your actual progress.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你刚开始——或者甚至已经几年了——这些经验教训值得内化。它们不会出现在会议演讲中，但它们会出现在你的实际进步中。
- en: '* * *'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Feynman quote is from the book *Deep Work*, by Cal Newport
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 费曼的引言来自Cal Newport的书籍《深度工作》
- en: For Churchill’s quote, several variations exist, some with coffee, some with
    tea, being poisoned
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于丘吉尔的引言，存在几种变体，有的有咖啡，有的有茶，有的被下毒
