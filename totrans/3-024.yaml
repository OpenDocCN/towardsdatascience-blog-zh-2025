- en: 'From a Point to L∞: How to Abstract Distance'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/from-a-point-to-l%e2%88%9e/](https://towardsdatascience.com/from-a-point-to-l%e2%88%9e/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why you should read this
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As someone who did a Bachelor’s in Mathematics, I was first introduced to L¹
    and L² as a measure of distance… now it seems to be a measure of error — where
    have we gone wrong? But jokes aside, there seems to be this misconception that
    L₁ and L₂ serve the same function — and while that may sometimes be true , each
    norm shapes its models in drastically different ways.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we’ll travel from plain-old points on a line all the way to
    **L∞**, stopping to see why **L¹** and **L²** matter, how they differ, and where
    the **L∞ norm** shows up in AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our Agenda:'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**When to use L¹ versus L² loss**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**How L¹ and L² regularization pull a model toward sparsity or smooth shrinkage**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Why the tiniest algebraic difference blurs GAN images — or leaves them razor-sharp**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**How to generalize distance to Lᵖ space and what the L∞ norm represents**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A Brief Note on Mathematical Abstraction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'You might have had a conversation (perhaps a confusing one) where the term
    mathematical abstraction popped up, and you might have left that conversation
    feeling a little more confused about what mathematicians are really doing. Abstraction
    refers to extracting underlying patterns and properties from a concept to generalize
    it so it has wider application. This might seem really complicated, but take a
    look at this trivial example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'A point in **1-D** is *x = x₁​*; in **2-D**: *x = (x₁,x₂)*; in **3-D**: *x
    = (x₁, x₂, x₃)*. Now I don’t know about you, but I can’t visualize 42 dimensions,
    but the same pattern tells me a point in 42 dimensions would be *x = (x₁, …, x₄₂). *'
  prefs: []
  type: TYPE_NORMAL
- en: 'This might seem trivial, but the concept of abstraction is key to reaching
    L∞: instead of a point, we abstract away distance. From now on, let’s work with
    *x = (x₁, x₂, x₃, …, xₙ),* otherwise known by its formal title: **x**∈ℝⁿ. And
    any vector is *v = x  —  y = (x₁ — y₁, x₂ — y₂, …, xₙ — yₙ).*'
  prefs: []
  type: TYPE_NORMAL
- en: 'The “Normal” Norms: L1 and L2'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The **key takeaway** is simple but powerful: because the L¹ and L² norms behave
    differently in a few crucial ways, you can combine them in one objective to juggle
    two competing goals. In **regularization**, the L¹ and L² terms inside the loss
    function help strike the best spot on the bias-variance spectrum, yielding a model
    that is both accurate *and* generalizable. In **GANs**, the **L¹ pixel loss**
    is paired with **adversarial loss** so the generator makes images that (i) look
    realistic and (ii) match the intended output. Tiny distinctions between the two
    losses explain why Lasso performs feature selection and why swapping L¹ out for
    L² in a GAN often produces blurry images.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Lp space graph by Marco Hening Tallarico](../Images/20e108d4b8b93c9ae0a35dbb1c8c6197.png)'
  prefs: []
  type: TYPE_IMG
- en: Code in [Github](https://github.com/marco-hening-tallarico/From-a-Point-to-L-)
  prefs: []
  type: TYPE_NORMAL
- en: L¹ vs. L² Loss — Similarities and Differences
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/76cc4f7cb16e84f68a26c62f4a50a8a5.png)'
  prefs: []
  type: TYPE_IMG
- en: '**If your data may contain many outliers or heavy-tailed noise**, you usually
    reach for **L¹**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**If you care most about overall squared error and have reasonably clean data**,
    **L²** is fine — and easier to optimize because it is smooth.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Because MAE treats each error proportionally, models trained with L¹ sit nearer
    the **median** observation, which is exactly why L¹ loss keeps texture detail
    in GANs, whereas MSE’s quadratic penalty nudges the model toward a **mean** value
    that looks smeared.
  prefs: []
  type: TYPE_NORMAL
- en: L¹ Regularization (Lasso)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Optimization and regularization pull in opposite directions: optimization tries
    to fit the training set perfectly, while regularization deliberately sacrifices
    a little training accuracy to gain *generalization*. Adding an L¹ penalty 𝛼∥w∥₁​
    promotes **sparsity** — many coefficients collapse all the way to zero. A bigger
    α means harsher feature pruning, simpler models, and less noise from irrelevant
    inputs. With Lasso, you get **built-in feature selection** because the ∥w∥₁​​​
    term literally turns small weights off, whereas L² merely shrinks them.'
  prefs: []
  type: TYPE_NORMAL
- en: '![L1 regularization loss term by Marco Hening Tallarico](../Images/910f319b03cc35cfe1d13e20091db9c6.png)'
  prefs: []
  type: TYPE_IMG
- en: L2 Regularization (Ridge)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Change the regularization term to:'
  prefs: []
  type: TYPE_NORMAL
- en: '![L2 Regularization term by Marco Hening Tallarico](../Images/59f5e69066563d700e42a233f40654e1.png)'
  prefs: []
  type: TYPE_IMG
- en: And you have **Ridge regression**. Ridge **shrinks** weights toward zero without
    usually hitting exactly zero. That discourages any single feature from dominating
    while still keeping every feature in play — handy when you believe *all* inputs
    matter, but you want to curb overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: Both Lasso and Ridge improve **generalization**; with Lasso, once a weight hits
    zero, the optimizer feels no strong reason to leave — it’s like standing still
    on flat ground — so zeros naturally “stick.” Or in more technical terms, they
    just mould the **coefficient space** differently — Lasso’s diamond-shaped constraint
    set zeroes coordinates, Ridge’s spherical set simply squeezes them. Don’t worry
    if you didn’t understand that, there is quite a lot of theory that is beyond the
    scope of this article, but if it interests you, this reading on [Lₚ space](https://en.wikipedia.org/wiki/Lp_space)
    should help.
  prefs: []
  type: TYPE_NORMAL
- en: But back to the point. Notice how when we train both models on the same data,
    Lasso removes some input features by setting their coefficients exactly to zero.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/1c8eadb1bfda63ec474eefd8d69948d8.png)'
  prefs: []
  type: TYPE_IMG
- en: Notice how if we increase **α** to 10, a lot more features are deleted. This
    can be quite dangerous, as we could be getting rid of informative data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/6f3915c87236ce0cc554f82c4334aa0c.png)'
  prefs: []
  type: TYPE_IMG
- en: L¹ Loss in Generative Adversarial Networks (GANs)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: GANs pit 2 networks against each other, a **Generator** **G** (the “forger”)
    against a **Discriminator** **D** (the “detective”). To make **G** produce convincing
    *and* faithful images, many image-to-image GANs use a **hybrid loss**
  prefs: []
  type: TYPE_NORMAL
- en: '![GAN loss term by Marco Hening Tallarico](../Images/4e035eb673f6dad3b208a963f068d877.png)'
  prefs: []
  type: TYPE_IMG
- en: where
  prefs: []
  type: TYPE_NORMAL
- en: '***x*** — input image (e.g., a sketch)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***y***— real target image (e.g., a photo)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***λ*** — balance knob between realism and fidelity'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Table comparing L1 and L2 loss by Marco Hening Tallarico](../Images/76cc4f7cb16e84f68a26c62f4a50a8a5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Swap the pixel loss to **L²** and you square pixel errors; large residuals
    dominate the objective, so **G** plays it safe by predicting the *mean* of all
    plausible textures — result: smoother, blurrier outputs. With **L¹**, every pixel
    error counts the same, so **G** gravitates to the *median* texture patch and keeps
    sharp boundaries.'
  prefs: []
  type: TYPE_NORMAL
- en: Why tiny differences matter
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In regression, the kink in **L¹**’s derivative lets **Lasso** *zero out* weak
    predictors, whereas **Ridge** only nudges them.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In vision, the linear penalty of **L¹** keeps high-frequency detail that **L²**
    blurs away.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In both cases, you can blend **L¹** and **L²** to trade **robustness**, **sparsity**,
    and smooth optimization — exactly the balancing act at the heart of modern machine-learning
    objectives.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generalizing Distance to Lᵖ
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before we reach **L∞**, we need to talk about the four rules every *norm* must
    satisfy:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Non-negativity** — A distance can’t be negative; nobody says “I’m –10 m from
    the pool.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Positive definiteness** — The distance is zero *only* at the zero vector,
    where no displacement has happened'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Absolute homogeneity (scalability)** — Scaling a vector by α scales its length
    by |α|: if you double your speed you double your distance'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Triangle inequality** — A detour through y is never shorter than going straight
    from start to finish (x + y)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![L1 L2 L3 by Marco Hening Tallarico](../Images/aa93a08bc147add371bd0d3e3744427b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'At the beginning of this article, the mathematical abstraction we performed
    was quite straightforward. But now, as we look at the following norms, you can
    see we’re doing something similar at a deeper level. There’s a clear pattern:
    the exponent inside the sum increases by one each time, and the exponent outside
    the sum does too. We’re also checking whether this more abstract notion of distance
    still satisfies the core properties we mentioned above. It does. So what we’ve
    done is successfully abstract the concept of distance into Lᵖ space.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Abstraction of distance equation by Marco Hening Tallarico](../Images/b512f7d91fa26528a7c6d96d9427a794.png)'
  prefs: []
  type: TYPE_IMG
- en: as a single *family* of distances — the **Lᵖ space**. Taking the limit as p→∞
    squeezes that family all the way to the **L∞ norm**.
  prefs: []
  type: TYPE_NORMAL
- en: The L∞ Norm
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The L∞ norm goes by many names, such as **supremum norm, max norm, uniform
    norm, Chebyshev norm**, but they are all characterized by the following limit:'
  prefs: []
  type: TYPE_NORMAL
- en: '![L infinity equation by Marco Hening Tallarico ](../Images/ef635246dd0ab91c803a2d0be5a054f4.png)'
  prefs: []
  type: TYPE_IMG
- en: By generalizing our norm to p — space, in two lines of code, we can write a
    function that calculates distance in any norm imaginable. Quite useful.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'We can now think of how our measure for distance changes as ***p*** increases.
    Looking at the graphs bellow we see that our measure for distance monotonically
    decreases and approaches a very specific point: The largest absolute value in
    the vector, represented by the **dashed line in black. **'
  prefs: []
  type: TYPE_NORMAL
- en: '![Graph showing convergence of Lp Space to max norm by Marco Hening Tallarico](../Images/8fdc3d10f64f879f02dee99732493f9f.png)'
  prefs: []
  type: TYPE_IMG
- en: Convergence of Lp norm to largest absolute coordinate.
  prefs: []
  type: TYPE_NORMAL
- en: In fact, it does not only approach the largest absolute coordinate of our vector
    but
  prefs: []
  type: TYPE_NORMAL
- en: '![Max norm by Marco Hening Tallarico](../Images/b02f5efe24a770f302a1deb64bc7edf5.png)![](../Images/5408bee9fa976a48f3d33ae2606b421c.png)'
  prefs: []
  type: TYPE_IMG
- en: The max-norm shows up any time you need a **uniform guarantee** or **worst-case
    control.** In less technical terms, if no individual coordinate can go beyond
    a certain threshold, then the L∞ norm should be used. If you want to set a hard
    cap on every coordinate of your vector, then this is also your go-to norm.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is not just a quirk of theory but something quite useful, and well applied
    in a plethora of different contexts:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Maximum absolute error** — bounds every prediction so none drifts too far.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Max-Abs feature scaling** — squashes each feature into [−1,1][-1,1][−1,1]
    without distorting sparsity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Max-norm weight constraints** — keep all parameters inside an axis-aligned
    box.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Adversarial robustness** — restrict each pixel perturbation to an ε-cube
    (an L∞​ ball).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chebyshev distance** in k-NN and grid searches — fastest way to measure “king’s-move”
    steps.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Robust regression / Chebyshev-center portfolio problems** — linear programs
    that minimize the worst residual.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fairness caps** — limit the largest per-group violation, not just the average.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bounding-box collision tests** — wrap objects in axis-aligned boxes for quick
    overlap checks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*With our more abstract notion for distance all sorts of interesting questions
    come to the front. We can consider **p** value that are not integers, say **p
    = π** (as you will see in the graphs above). We can also consider **p** ∈ (0,1),
    say **p** = 0.3, would that still fit into the 4 rules we said every norm must
    obey?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Abstracting the idea of distance can feel unwieldy, even needlessly theoretical,
    but distilling it to its core properties frees us to ask questions that would
    otherwise be impossible to frame. Doing so reveals new norms with concrete, real-world
    uses. It’s tempting to treat all distance measures as interchangeable, yet small
    algebraic differences give each norm distinct properties that shape the models
    built on them. From the bias-variance trade-off in regression to the choice between
    crisp or blurry images in GANs, it matters how you measure distance.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
