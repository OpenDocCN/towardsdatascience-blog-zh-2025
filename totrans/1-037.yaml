- en: Learning, Hacking, and Shipping ML
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 学习、黑客攻击和部署机器学习
- en: 原文：[https://towardsdatascience.com/learning-hacking-and-shipping-ml/](https://towardsdatascience.com/learning-hacking-and-shipping-ml/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/learning-hacking-and-shipping-ml/](https://towardsdatascience.com/learning-hacking-and-shipping-ml/)
- en: '*In the Author Spotlight series, TDS Editors chat with members of our community
    about their career path in data science and AI, their writing, and their sources
    of inspiration. Today, we’re thrilled to share our conversation with* [*Vyacheslav
    Efimov*](https://towardsdatascience.com/author/slavahead/)*.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*在“作者聚焦”系列中，TDS编辑们与我们的社区成员讨论他们在数据科学和AI领域的职业道路、他们的写作以及他们的灵感来源。今天，我们很高兴与* [*Vyacheslav
    Efimov*](https://towardsdatascience.com/author/slavahead/)*.* 进行对话。'
- en: '*Vyacheslav is a Senior Machine Learning Engineer specialising in NLP and Computer
    Vision. One of his passions is making educational content: Vyacheslav has published
    over 60 articles on Towards Data Science, explaining complex concepts in simple
    words, providing rich visualizations.*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*Vyacheslav是一位专注于NLP和计算机视觉的高级机器学习工程师。他的一项热情是制作教育内容：Vyacheslav在Towards Data
    Science上发表了超过60篇文章，用简单的语言解释复杂的概念，提供丰富的可视化内容。*'
- en: '**You wrote many beginner and explanatory articles on TDS. Has teaching the
    fundamentals changed how you design or debug real systems at work?**'
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**你在TDS上写了许多关于基础和解释的文章。教基础内容是否改变了你在工作中设计或调试系统的方式？**'
- en: I notice the correlation between the more I teach something, the better I understand
    it. In real life, when I write a new article, I strive to dive into small details
    while keeping the explanation simple for my readers. Emphasizing information in
    this way helps me better understand the workflow of algorithms.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我注意到，我教得越多，我对它的理解就越好。在现实生活中，当我写一篇新文章时，我努力深入细节，同时保持对读者的解释简单。以这种方式强调信息有助于我更好地理解算法的工作流程。
- en: In that sense, whenever I encounter an error in one of the algorithms used at
    work on which I wrote an article in the past, there is a higher chance that I
    will rapidly figure out the solution to the problem by myself. From another perspective,
    when I write an article on an unfamiliar topic and explore it myself, it increases
    my confidence when I apply that particular algorithm at work, as I already know
    its application scope, advantages, disadvantages, and specific details or constraints.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个意义上，每当我遇到我在过去写的文章中提到的、在工作中使用的某个算法的错误时，我更有可能迅速自己找出解决问题的方法。从另一个角度来看，当我写一篇关于不熟悉主题的文章并自己探索时，当我将这个特定的算法应用于工作时，它会增加我的信心，因为我已经知道它的应用范围、优点、缺点以及具体细节或限制。
- en: This way, I can come up with original solutions that are not obvious to others
    and back up my choice to other teammates, managers, or stakeholders. That knowledge
    is precious to me.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，我可以提出别人不明显但对我有帮助的原创解决方案，并支持我向其他队友、经理或利益相关者做出的选择。这种知识对我来说非常宝贵。
- en: '**With so many new models popping up every day, it’s easy to feel completely
    swamped. How do you decide what’s worth a ‘deep dive’ and what you just ‘get the
    gist of’? Has your strategy for managing this changed at all recently?**'
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**随着每天涌现出如此多的新模型，很容易感到完全不知所措。你如何决定哪些值得深入挖掘，哪些只是了解大意？你最近有没有改变管理这些内容的方法？**'
- en: Today, we indeed have an abundance of models and tools that appear every day.
    It is easy to feel lost when you’re unsure about what to pursue next.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我们确实有大量的模型和工具每天出现。当你不确定下一步该追求什么时，很容易感到迷茫。
- en: With limited time, I usually delve deeper into topics that may be applicable
    at work or in my personal projects. This gives me more confidence when I have
    to present or explain my results.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 由于时间有限，我通常深入研究可能在工作中或在我的个人项目中应用的主题。这让我在必须展示或解释我的结果时更有信心。
- en: Businesses usually want to achieve working results as soon as possible. This
    is also one of the reasons why, in my articles, I focus more on theoretical concepts,
    as I cannot devote my time at work to going into theoretical depth.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 企业通常希望尽快取得工作成果。这也是我为什么在文章中更注重理论概念的原因之一，因为我无法在工作时间投入时间去深入研究理论。
- en: This way, I have an efficient blend of practical experience at work and theoretical
    insights in my blog. Both of these components are important for skilled data scientists.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，我在工作中积累了丰富的实践经验，并在我的博客中获得了理论洞察。这两个组成部分对于熟练的数据科学家来说都很重要。
- en: '**You’ve competed in AI hackathons. What did you learn from having such tight
    deadlines? Did it force you to get better at scoping projects or deciding on a
    model? And do you find yourself using any of those ‘hackathon lessons’ when you’re
    sketching out a new idea from scratch?**'
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**你参加过AI黑客马拉松。从这样紧张的截止日期中，你学到了什么？它是否迫使你更好地界定项目或决定模型？你发现自己在从头开始构思新想法时使用了这些“黑客马拉松经验”吗？**'
- en: Hackathons typically last between several hours and two days. That is a very
    small period of time to develop a fully functional product. However, at the same
    time, it pushed me a lot in the past to better prioritize the features on which
    I should focus. In general, time management is a valuable skill to have. When
    you have several possible solutions to address your problem, you must choose the
    one that best fits the business needs while also respecting time constraints.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 黑客马拉松通常持续几个小时到两天。这是一个非常短的时间来开发一个功能齐全的产品。然而，与此同时，它也极大地推动我在过去更好地优先考虑应该关注的特性。总的来说，时间管理是一项宝贵的技能。当你有几种可能的解决方案来解决你的问题时，你必须选择最适合商业需求且尊重时间限制的那个。
- en: What is also great is that after every hackathon, you can evaluate yourself
    in terms of the time it took you to implement certain features. For example, let’s
    say that it was the first time you had to develop a RAG pipeline, which took you
    around 4 hours to implement. The next time you face an analogous problem at work
    or a hackathon, you will have a better estimate in advance of how much time it
    would take if you decide to use the same method. In that sense, the hackathon
    experience allows you to better define time limits for the methods you want to
    implement in projects.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个很好的地方是，在每次黑客马拉松之后，你可以根据实现某些功能所需的时间来评估自己。例如，假设这是你第一次开发RAG管道，你花了大约4个小时来实现。下次你在工作中或黑客马拉松中遇到类似的问题时，你将能够提前更好地估计如果你决定使用相同的方法，需要多少时间。从这个意义上说，黑客马拉松经验让你能更好地定义你希望在项目中实施的方法的时间限制。
- en: For me, the biggest lesson from the hackathon was not focusing on perfection
    when creating the MVP. While an MVP is important, it is also necessary to present
    your product attractively to clients or investors, explain its business value,
    the problem it solves, and why it is better than existing solutions on the market.
    In this regard, hackathons teach you to come up with better ideas that solve real
    problems while also shipping the MVP quickly, containing the most essential features.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，黑客马拉松最大的教训不是在创建最小可行产品（MVP）时过分追求完美。虽然MVP很重要，但向客户或投资者展示你的产品，解释其商业价值、解决的问题以及为什么它比市场上的现有解决方案更好，也是必要的。在这方面，黑客马拉松教会你提出更好的想法，解决实际问题，同时快速交付MVP，包含最基本的功能。
- en: '**For readers thinking about their career path: your “**[**Roadmap to Becoming
    a Data Scientist**](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-1-maths-2dc9beb69b27/)**”
    series spans fundamentals through advanced ML. If you were rewriting it today,
    what topics would get promoted, demoted, or cut entirely, and why?**'
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**对于正在考虑职业道路的读者：你的“**[成为数据科学家的路线图**](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-1-maths-2dc9beb69b27/)**”系列涵盖了从基础到高级机器学习的内容。如果你今天重写它，哪些主题会被提升、降低或完全删除，为什么？**'
- en: I wrote this article series a year ago. For me, all the concepts and topics
    I listed are up to date for aspiring data scientists. All math, computer science,
    and machine learning topics I present there are an essential foundation for any
    machine learning engineer.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我一年前写了这个系列文章。对我来说，我列出的所有概念和主题都是对有志成为数据科学家的人来说最新的。我在那里提出的所有数学、计算机科学和机器学习主题都是任何机器学习工程师的必要基础。
- en: As we’re now in late 2025, I would also add a requirement to have at least minimal
    experience with prompt engineering and to be familiar with some AI-generative
    tools, such as GitHub Copilot, Gemini CLI, and Cursor, which would allow for increased
    work efficiency.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经到了2025年的后期，我还会增加一个要求，即至少要有一些提示工程的经验，并熟悉一些AI生成工具，例如GitHub Copilot、Gemini
    CLI和Cursor，这将有助于提高工作效率。
- en: As a note, compared to previous years, IT companies have higher requirements
    and expectations for junior engineers entering the data science field. It makes
    sense, as modern AI tools can perform junior-level tasks very well, and many companies
    prefer to rely on them now rather than on entry-level engineers, as they don’t
    have to pay salaries while in both cases they receive the same result.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: That is why, if a machine learning engineer possesses the strong fundamental
    skills I described in that series of articles, it will be much easier for them
    to dive autonomously into more complex topics.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '**Your background blends software engineering and ML. How does that foundation
    shape the way you write? **'
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Having strong software engineering skills is one of the best advantages you
    can have as a Data Scientist:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: It makes you realize the importance of well-structured software documentation
    and creating reproducible ML pipelines.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You understand better how to make your code clean and readable for others.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You understand algorithmic constraints and which data structure to choose for
    a particular task, based on system needs.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can more easily collaborate with backend and DevOps engineers on integrating
    your code modules.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You do not need to rely on others to make SQL queries to retrieve necessary
    data from the database.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The list can go on and on…
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Speaking of my articles, I don’t have many that present a lot of code. However,
    whenever I do, I strive to make it readable and understandable to others. I always
    put myself in the shoes of others and ask myself how my article text or code examples
    would be easy to perceive or reproduce if I were in others’ shoes. This is where
    the software engineering experience makes this realization more essential for
    me, and I follow the best established practices to deliver my final product.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: '**Looking at your** [**portfolio**](https://slava.carrd.co/) **and** [**GitHub**](https://github.com/slavastar)**,
    you’ve blended software engineering fundamentals with ML from the start. What’s
    one engineering habit you wish more aspiring data scientists adopted early?**'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many engineers, especially juniors, tend to underestimate the importance of
    creating good documentation and reproducible pipelines. This also happened to
    me in the past, when I was more focused on developing robust models or conducting
    research.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: As it turned out, when I had to change contexts and then several weeks later
    to return to work on the previous project, I was then spending a lot of time figuring
    out how to run my old code in a messy Jupyter Notebook or install necessary libraries
    again, where I could have just spent a little more time in the past by developing
    a well-documented README.md explaining all the required steps to execute pipelines
    from zero.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Because it was nearly impossible to rerun my pipelines from scratch, I was also
    unable to conduct experiments using other entry parameters, which made the situation
    even more frustrating.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: 'It was a painful experience for me, yet one of the most valuable lessons I’ve
    learned. So if I had to give a piece of advice to an aspiring data scientist on
    one particular habit, it would be this:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我来说是一次痛苦的经历，但也是我学到的最有价值的教训之一。所以，如果我要给一个有志于成为数据科学家的人提一条特别建议，那就是：
- en: “Always make your machine learning pipelines reusable and well-documented”.
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “始终使你的机器学习管道可重用且文档完善”。
- en: '**Over the past year, has AI meaningfully changed how you work day to day as
    an ML Engineer? What got easier, what got harder, and what stayed the same?**'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**在过去的一年里，人工智能是否在本质上改变了你作为机器学习工程师日常工作的方式？哪些事情变得更容易，哪些事情变得更难，哪些保持不变？**'
- en: '​​In recent years, we have observed a significant rise in powerful AI engineering
    tools:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在近年来，我们观察到强大的AI工程工具显著增加：
- en: LLMs, which can respond to almost any question, give advice, or find bugs in
    software
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够回答几乎所有问题、提供建议或发现软件中错误的LLMs
- en: Cursor, Lovable, and Bolt are acting as AI-powered IDEs for developers
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Cursor、Lovable和Bolt正在作为为开发者提供AI驱动的IDE
- en: AI agents can complete multi-step tasks
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能代理可以完成多步任务
- en: As a machine learning engineer, it is essential for me to regularly adapt to
    these tools to use them efficiently.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 作为机器学习工程师，对我来说，定期适应这些工具以高效使用它们是至关重要的。
- en: '**What became easier**'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**什么变得更加容易**'
- en: 'Starting from 2025, I can observe the following positive impact on my work:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 从2025年开始，我观察到以下对我工作的积极影响：
- en: For me, it became easier to rapidly test ideas or prototypes. For example, there
    were times at work when I was given computer vision problems that fell outside
    my area of knowledge. In this way, I could ask ChatGPT to propose several ideas
    to solve them. There were even times when ChatGPT generated code for me, and I
    tried to execute it without understanding how it worked inside.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对我来说，快速测试想法或原型变得更加容易。例如，在工作中，有时我被分配了一些超出我的知识领域的计算机视觉问题。通过这种方式，我可以要求ChatGPT提出解决这些问题的几个想法。甚至有几次，ChatGPT为我生成了代码，我尝试执行它，但没有理解其内部的工作原理。
- en: 'Then I had two possible cases:'
  id: totrans-46
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 然后，我有两种可能的情况：
- en: If the code ran successfully and solved the initial problem, then I tried to
    go deeper inside the OpenCV documentation to understand how it ultimately works.
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果代码成功运行并解决了初始问题，然后我会尝试深入研究OpenCV文档，以了解它最终是如何工作的。
- en: If the code didn’t solve my problem, I would either ignore it, report the error
    to ChatGPT, or attempt to find the solution myself.
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果代码没有解决我的问题，我可能会忽略它，将错误报告给ChatGPT，或者尝试自己找到解决方案。
- en: As you can see, I was able to rapidly test a solution that could work and save
    me hours of research without any risk.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，我能够快速测试一个可行的解决方案，从而节省数小时的研究时间，而且没有任何风险。
- en: Another excellent use case for me was inserting error messages directly into
    ChatGPT instead of searching for a solution on the Internet. It worked well most
    of the time, but sometimes it was affected by errors related to library installations,
    system errors, and the deployment of pipelines on the Cloud, among other issues.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对我来说，另一个极好的用例是将错误信息直接输入到ChatGPT，而不是在互联网上搜索解决方案。大多数时候它都工作得很好，但有时会受到与库安装、系统错误以及云上管道部署等相关问题的干扰。
- en: Finally, I am a big fan of AI hackathons! Having tools that can generate both
    the frontend and backend of your system makes a massive difference for me, as
    I can now rapidly create prototypes and test my MVP in several hours. What I develop
    now during one-day hackathons could require an entire week of work.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我非常喜欢AI黑客马拉松！拥有能够生成系统前端和后端的工具对我来说意义重大，因为我现在可以快速创建原型，并在几小时内测试我的MVP。我现在在一天的黑客马拉松中开发的代码可能需要一周的时间来完成。
- en: '**What became harder / risky**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**什么变得更加困难/有风险**'
- en: When writing code with AI, there is a higher possibility of sensitive data leaks.
    Imagine you have a file or code fragment containing essential credentials that
    you accidentally feed into an AI model. Then a third-party tool will know your
    sensitive credentials. It can happen, especially if you use a tool like Cursor
    and store your credentials in another file rather than .env. As a consequence,
    it is always necessary to be very cautious.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在使用AI编写代码时，敏感数据泄露的可能性更高。想象一下，你有一个包含重要凭证的文件或代码片段，你意外地将其输入到AI模型中。然后第三方工具将知道你的敏感凭证。这种情况可能发生，尤其是如果你使用像Cursor这样的工具，并将凭证存储在另一个文件中而不是.env文件中。因此，始终保持非常谨慎是必要的。
- en: Another risk is not properly testing the AI-generated code and not knowing how
    to make a rollback. An AI tool can introduce invisible errors in the code, particularly
    when it is used to modify or refactor existing code. To ensure that AI-generated
    code does not degrade, it is necessary to thoroughly review the generated code
    parts, test them, and save modifications in a way that allows you to always rollback
    to a previous, correct version if necessary.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一个风险是没有正确测试AI生成的代码，也不知道如何进行回滚。AI工具可能会在代码中引入不可见的错误，尤其是在它被用来修改或重构现有代码时。为了确保AI生成的代码不会退化，有必要彻底审查生成的代码部分，测试它们，并以允许您在必要时始终回滚到先前正确版本的方式保存修改。
- en: When relying too heavily on generative AI tools, there is a risk that the code
    will become unreadable, contain excessively long functions, exhibit repetition,
    or cease to function correctly. That is why it is essential to understand that
    AI tools work more effectively on prototyping than on maintaining high-quality
    production code.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当过度依赖生成式AI工具时，代码可能会变得难以阅读，包含过长的函数，出现重复，或者停止正确运行。这就是为什么理解AI工具在原型设计上比在维护高质量的生产代码上更有效至关重要。
- en: '**What remained the same**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**保持不变的内容**'
- en: What remains constant for me is the importance of understanding the internal
    workflow of the algorithms I use, maintaining strong computer science foundations,
    and writing high-quality code, among other key skills. In other words, the basic
    principles of software development will always be necessary to efficiently use
    AI tools.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，保持不变的是理解我所使用的算法的内部工作流程、维护强大的计算机科学基础，以及编写高质量的代码，以及其他关键技能的重要性。换句话说，软件开发的基本原则始终是有效使用AI工具的必要条件。
- en: In that sense, I like comparing a set of available AI tools to a substitute
    for a junior developer in my team, to whom I can delegate less essential tasks.
    I can ask it whatever I want, but I cannot be 100% sure it will do my tasks correctly,
    and this is where the importance of having strong fundamental expertise comes
    into play.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个意义上讲，我喜欢将一组可用的AI工具比作我团队中初级开发者的替代品，我可以将不那么重要的任务委托给它。我可以让它做任何我想做的事，但我不能100%确信它会正确地完成我的任务，这就是为什么拥有强大的基础专业知识的重要性凸显出来。
