- en: Building A Modern Dashboard with Python and Taipy
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 Python 和 Taipy 构建现代仪表盘
- en: 原文：[https://towardsdatascience.com/building-a-modern-dashboard-with-python-and-taipy/](https://towardsdatascience.com/building-a-modern-dashboard-with-python-and-taipy/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/building-a-modern-dashboard-with-python-and-taipy/](https://towardsdatascience.com/building-a-modern-dashboard-with-python-and-taipy/)
- en: This is the third article in a short series on developing data dashboards using
    the latest Python-based development tools, Streamlit, Gradio and Taipy.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 这是关于使用最新基于 Python 的开发工具（Streamlit、Gradio 和 Taipy）开发数据仪表盘的短系列文章中的第三篇文章。
- en: The source data set for each dashboard is the same, but stored in different
    formats. As much as possible, I’ll try to make the actual dashboard layouts for
    each tool resemble each other and have the same functionality.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 每个仪表盘的数据源相同，但存储在不同的格式中。尽可能的，我会尝试使每个工具的实际仪表盘布局彼此相似，并具有相同的功能。
- en: I’ve already written the Streamlit and Gradio versions. The Streamlit version
    gets its source data from a Postgres database. The Gradio and Taipy versions get
    their data from a CSV file. You can find links to those other articles at the
    end of this one.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经写好了 Streamlit 和 Gradio 版本。Streamlit 版本从 Postgres 数据库获取源数据。Gradio 和 Taipy
    版本从 CSV 文件获取数据。你可以在本文末尾找到那些其他文章的链接。
- en: What is Taipy?
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是 Taipy？
- en: Taipy is a relatively new Python-based web framework that became prominent a
    couple of years ago. According to its website, Taipy is …
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: Taipy 是一个相对较新的基于 Python 的网络框架，在几年前变得突出。根据其网站，Taipy 是...
- en: “… ***an open-source Python library for building production-ready front-end
    & back-end in no time. No knowledge of web development is required!***“
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “... ***一个用于快速构建生产就绪的前端和后端的开源 Python 库。无需了解任何 Web 开发知识！***”
- en: The target audience for Taipy is data scientists, machine learning practitioners
    and data engineers who may not have extensive experience developing front-end
    applications, but are typically fluent in Python. Taipy makes it reasonably easy
    to create front-ends using Python, so that’s a win-win.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: Taipy 的目标受众是数据科学家、机器学习实践者和可能没有丰富前端开发经验的数据工程师，但他们通常精通 Python。Taipy 使得使用 Python
    创建前端变得相对容易，因此这是一个双赢的局面。
- en: You can get started using Taipy for free. If you need to use it as part of an
    enterprise, with dedicated support and scalability, paid plans are available on
    a monthly or yearly basis. Their website provides more information, which I’ll
    link to at the end of this article.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以免费开始使用 Taipy。如果你需要将其作为企业的一部分使用，需要专用支持和可扩展性，则提供按月或按年付费的计划。他们的网站提供了更多信息，我将在本文末尾提供链接。
- en: Why use Taipy over Gradio or Streamlit?
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么选择 Taipy 而不是 Gradio 或 Streamlit？
- en: As I’ve shown in this and the other two articles, you can develop very similar
    output using all three frameworks, so it begs the question of why use one over
    the other.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我在本文和其他两篇文章中所示，你可以使用所有三个框架开发非常相似的结果，因此这引发了一个问题：为什么选择其中一个而不是另一个。
- en: While Gradio excels at quickly creating ML demos and Streamlit is brilliant
    for interactive data exploration, they both operate on a principle of simplicity
    that can become a limitation as your application’s ambition grows. Taipy enters
    the picture when your project needs to graduate from a simple script or demo into
    a robust, performant, and maintainable application.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Gradio 在快速创建 ML 演示方面表现出色，而 Streamlit 在交互式数据探索方面非常出色，但它们都基于简化的原则，随着你的应用程序雄心的增长，这可能会成为一种限制。当你的项目需要从简单的脚本或演示过渡到强大、性能良好且易于维护的应用程序时，Taipy
    就出现了。
- en: You should strongly consider choosing Taipy over Streamlit/Gradio if,
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你应该强烈考虑选择 Taipy 而不是 Streamlit/Gradio，
- en: Your app’s performance is critical
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的应用程序的性能至关重要
- en: Your single script file is becoming unmanageably long and complex.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的单个脚本文件变得越来越长且复杂。
- en: You need to build multi-page applications with complex navigation.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要构建具有复杂导航的多页应用程序。
- en: Your application requires “what-if” scenario analysis or complex pipeline execution.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的应用程序需要“如果...将会如何”场景分析或复杂的管道执行。
- en: You are building a production tool for business users, not just an internal
    exploratory dashboard.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你正在为商业用户构建一个生产工具，而不仅仅是内部探索仪表盘。
- en: You are working in a team and need a clean, maintainable codebase.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你在一个团队中工作，需要一个干净、可维护的代码库。
- en: In short, choose **Gradio** for demos. Choose **Streamlit** for interactive
    exploration. Choose **Taipy** when you’re ready to build high-performance, scalable,
    and production-grade enterprise data applications.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，选择 **Gradio** 用于演示。选择 **Streamlit** 用于交互式探索。当你准备好构建高性能、可扩展和面向生产的企业级数据应用程序时，选择
    **Taipy**。
- en: What we’ll develop
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们将要开发
- en: We’re developing a data dashboard. Our source data will be a single CSV file
    containing 100,000 synthetic sales records.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在开发一个数据仪表板。我们的源数据将是一个包含100,000条合成销售记录的单个CSV文件。
- en: The actual source of the data isn’t ***that*** important. It could just as easily
    be stored as a Parquet file, in SQLite or Postgres, or any database you can connect
    to.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 数据的实际来源并不***那么***重要。它也可以存储为Parquet文件，SQLite或Postgres，或任何你可以连接的数据库。
- en: This is what our final dashboard will look like.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们的最终仪表板将看起来像的样子。
- en: '![](../Images/92d8200e7b5df146b008b18fda13006b.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/92d8200e7b5df146b008b18fda13006b.png)'
- en: Image by Author
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: There are four main sections.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 有四个主要部分。
- en: The top row enables the user to select specific start and end dates and/or product
    categories using date pickers and a drop-down list, respectively.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 顶行允许用户使用日期选择器和下拉列表分别选择特定的起始和结束日期以及/或产品类别。
- en: The second row, **“Key Metrics,**“provides a top-level summary of the selected
    data.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二行，“**关键指标**”提供了所选数据的顶层摘要。
- en: The **Visualisations** section allows the user to select one of three graphs
    to display the input dataset.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可视化**部分允许用户选择三个图表中的一个来显示输入数据集。'
- en: The **Raw Data** section is exactly what it claims to be. This tabular representation
    of the chosen data effectively views the underlying CSV data file.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**原始数据**部分正是它所声称的那样。所选数据的这种表格表示形式有效地显示了底层的CSV数据文件。'
- en: Using the dashboard is easy. Initially, stats for the whole data set are displayed.
    The user can then narrow the data focus using the 3 choice fields at the top of
    the display. The graphs, key metrics, and raw data sections dynamically update
    to reflect the user’s choices.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 使用仪表板很简单。最初，会显示整个数据集的统计数据。用户可以使用显示顶部的3个选择字段来缩小数据焦点。图表、关键指标和原始数据部分会根据用户的选择动态更新。
- en: The source data
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 源数据
- en: As mentioned, the dashboard’s source data is contained in a single comma-separated
    values (CSV) file. The data consists of 100,000 synthetic sales-related records.
    Here are the first ten records of the file.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，仪表板的源数据包含在一个单独的逗号分隔值（CSV）文件中。数据由100,000条合成销售相关记录组成。以下是文件的前十条记录。
- en: '[PRE0]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: And here is some Python code you can use to generate a dataset. It utilises
    the NumPy and Pandas Python libraries, so ensure that both are installed before
    running the code.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些你可以使用的Python代码来生成数据集。它利用了NumPy和Pandas Python库，所以在运行代码之前请确保两者都已安装。
- en: '[PRE1]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Installing and using Taipy
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装和使用Taipy
- en: Installing Taipy is easy, but before coding, it’s best practice to set up a
    separate Python environment for all your work. I use Miniconda for this purpose,
    but feel free to use whatever method suits your workflow.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Taipy很简单，但在编码之前，为所有工作设置一个单独的Python环境是最佳实践。我为此使用Miniconda，但请随意使用适合您工作流程的任何方法。
- en: If you want to follow the Miniconda route and don’t already have it, you must
    first install Miniconda.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要遵循Miniconda路线并且还没有安装它，你必须首先安装Miniconda。
- en: Once the environment is created, switch to it using the **‘activate’** command,
    and then run **‘pip install’** to install our required Python libraries.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 环境创建完成后，使用**‘activate’**命令切换到它，然后运行**‘pip install’**来安装我们所需的Python库。
- en: '[PRE2]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The Code
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码
- en: I’ll break down the code into sections and explain each one as we proceed.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我会逐步分解代码，并在进行中解释每个部分。
- en: Section 1
  id: totrans-45
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第1节
- en: '[PRE3]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This script prepares sales data for use in our Taipy visualisation app. It does
    the following,
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 此脚本为我们的Taipy可视化应用程序准备销售数据。它执行以下操作，
- en: Imports the required external libraries and loads and preprocesses our source
    data from the input CSV.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导入所需的库，并从输入CSV中加载和预处理我们的源数据。
- en: Calculates derived metrics like revenue.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算派生指标，如收入。
- en: Extracts relevant filtering options (categories).
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提取相关的过滤选项（类别）。
- en: Defines available visualisation options.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义可用的可视化选项。
- en: Section 2
  id: totrans-52
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第2节
- en: '[PRE4]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Sets the default start and end dates and initial category. Also, the initial
    chart will be displayed as **Revenue Over Time**. Placeholder and initial values
    are also set for the following:-
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 设置默认的起始和结束日期以及初始类别。初始图表也将显示为**随时间变化的收入**。以下内容也设置了占位符和初始值：-
- en: '**total_revenue**. Set to `"$0.00"`.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**total_revenue**. 设置为 `"$0.00"`。'
- en: '**total_orders.** Set to `0`.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**total_orders.** 设置为 `0`。'
- en: '**avg_order_value.** Set to `"$0.00"`.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**avg_order_value.** 设置为 `"$0.00"`。'
- en: '**top_category.** Set to `"N/A"`.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**top_category.** 设置为 `"N/A"`。'
- en: Empty DataFrames are set for:-
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 空的DataFrame设置为：-
- en: '**revenue_data.** Columns are `["order_date", "revenue"]`.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**revenue_data.** 列为 `["order_date", "revenue"]`。'
- en: '**category_data.** Columns are `["categories", "revenue"]`.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**category_data.** 列为 `["categories", "revenue"]`。'
- en: '**top_products_data.** Columns are `["product_names", "revenue"]`.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**top_products_data.** 列为 `["product_names", "revenue"]`。'
- en: The **apply_changes** function is defined. This function is triggered to update
    the state when filters (such as date range or category) are applied. It updates
    the following:-
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 定义了 `apply_changes` 函数。此函数在应用筛选器（如日期范围或类别）时触发，以更新状态。它更新以下内容：-
- en: Time-series revenue trends.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间序列收入趋势。
- en: Revenue distribution across categories.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 类别间的收入分布。
- en: The top 10 products by revenue.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按收入排名的前10个产品。
- en: Summary metrics (total revenue, total orders, average order value, top category).
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 汇总指标（总收入、总订单数、平均订单价值、顶级类别）。
- en: The **on_change** function fires whenever any of the user-selectable components
    is changed
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**on_change** 函数在用户可选择的任何组件更改时触发'
- en: The **on_init** function fires when the app is first run.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**on_init** 函数在应用首次运行时触发。'
- en: The **get_partial_visibility** function determines the CSS `display` property
    for UI elements based on the selected tab.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**get_partial_visibility** 函数根据所选选项卡确定 UI 元素的 CSS `display` 属性。'
- en: Section 3
  id: totrans-71
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第3部分
- en: '[PRE5]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This section of code defines the look and behaviour of the overall page and
    is split up into several sub-sections
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码部分定义了整个页面的外观和行为，并分为几个子部分
- en: '**Page Definition**'
  id: totrans-74
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**页面定义**'
- en: '**tgp.page().** Represents the dashboard’s main container, defining the page’s
    structure and elements.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**tgp.page().** 代表仪表板的主要容器，定义了页面的结构和元素。'
- en: '**Dashboard Layout**'
  id: totrans-76
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**仪表板布局**'
- en: 'Displays the title: **“Sales Performance Dashboard”** in Markdown mode (`mode="md"`).'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 Markdown 模式（`mode="md"`）下显示标题：**“销售绩效仪表板”**。
- en: '**Filters Section**'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**筛选部分**'
- en: Placed within a **card-style part** that uses a 3-column layout – `tgb.layout(columns="1
    1 2")` — to arrange the filters.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 放置在一个 **卡片式部分** 中，使用3列布局 – `tgb.layout(columns="1 1 2")` – 来排列筛选器。
- en: '**Filter Elements**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**筛选元素**'
- en: '**Start Date.** A date picker `tgb.date("{start_date}")`for selecting the start
    of the date range.'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**开始日期。** 一个日期选择器 `tgb.date("{start_date}")` 用于选择日期范围的开始。'
- en: '**End Date.** A date picker `tgb.date("{end_date}")` for choosing the end of
    the date range.'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**结束日期。** 一个日期选择器 `tgb.date("{end_date}")` 用于选择日期范围的结束。'
- en: '**Category Filter.**'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**类别筛选器。**'
- en: A dropdown selector `tgb.selector` to filter data by categories.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个下拉选择器 `tgb.selector` 用于按类别筛选数据。
- en: Populated using `categories` e.g., `"All Categories"` and available categories
    from the dataset.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 `categories` 填充，例如 `"All Categories"` 和数据集中的可用类别。
- en: '**Key Metrics Section**'
  id: totrans-86
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**关键指标部分**'
- en: 'Displays summary statistics in four **metric cards** arranged in a 4-column
    layout:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在4列布局中显示四个 **指标卡** 的摘要统计信息：
- en: '**Total Revenue.** Shows the `total_revenue` value.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**总收入。** 显示 `total_revenue` 值。'
- en: '**Total Orders.** Displays the number of unique orders (`total_orders`).'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**总订单数。** 显示唯一订单的数量 (`total_orders`)。'
- en: '**Average Order Value.** Shows the `avg_order_value`.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平均订单价值。** 显示 `avg_order_value`。'
- en: '**Top Category.** Displays the name of the category contributing the most revenue.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**顶级类别。** 显示贡献最多收入的类别名称。'
- en: '**Visualizations Section**'
  id: totrans-92
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**可视化部分**'
- en: A drop-down selector allows users to switch between different visualisations
    (e.g., “Revenue Over Time,” “Revenue by Category,” “Top Products”).
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个下拉选择器允许用户在不同的可视化之间切换（例如，“随时间变化的收入”，“按类别划分的收入”，“顶级产品”）。
- en: The dropdown width is reduced for a compact UI.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下拉宽度减少以实现紧凑的用户界面。
- en: '**Conditional Rendering of Charts**'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**条件渲染图表**'
- en: '**Revenue over time.** Displays the line chart `revenue_data` showing revenue
    trends over time.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**随时间变化的收入。** 展示了 `revenue_data` 行图表，显示了随时间变化的收入趋势。'
- en: '**Revenue by category.** Shows the bar chart `category_data` to visualise revenue
    distribution across categories.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**按类别划分的收入。** 显示 `category_data` 条形图，以可视化类别间的收入分布。'
- en: '**Top products.** Displays the bar chart `top_products_data` showing the top
    10 products by revenue.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**顶级产品。** 展示 `top_products_data` 条形图，显示了按收入排名前10的产品。'
- en: '**Raw Data Table**'
  id: totrans-99
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**原始数据表**'
- en: Displays the raw dataset in a tabular format.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以表格格式显示原始数据集。
- en: Dynamically updates based on user-applied filters (e.g., date range, category).
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据用户应用的筛选器（例如，日期范围、类别）动态更新。
- en: Section 4
  id: totrans-102
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第4部分
- en: '[PRE6]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: This final, short section renders the page for display on a browser.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 此最终简短部分在浏览器上渲染页面以供显示。
- en: Running the code
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行代码
- en: Collect all the above code snippets and save them to a file, e.g taipy-app.py.
    Make sure your source data file is in the correct location and referenced correctly
    in your code. You then run the module just like any other Python code by typing
    this into a command-line terminal.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 收集所有上述代码片段并将它们保存到一个文件中，例如 taipy-app.py。确保你的源数据文件位于正确的位置，并在你的代码中正确引用。然后，你可以在命令行终端中输入以下内容来运行该模块，就像运行任何其他
    Python 代码一样。
- en: '[PRE7]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: After a second or two, you should see a browser window open with your data app
    displayed.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 几秒钟后，你应该会看到一个浏览器窗口打开，显示你的数据应用程序。
- en: Summary
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this article, I’ve attempted to provide a comprehensive guide to building
    an interactive sales performance dashboard with Taipy using a CSV file as its
    source data.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我尝试提供一个全面的指南，使用 Taipy 和 CSV 文件作为数据源来构建交互式销售绩效仪表板。
- en: I explained that Taipy is a modern, Python-based open-source framework that
    simplifies the creation of data-driven dashboards and applications. I also provided
    some suggestions on why you might want to use TaiPy over the other two popular
    frameworks, Gradio and Streamlit.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我解释说 Taipy 是一个基于 Python 的现代开源框架，它简化了数据驱动仪表板和应用程序的创建。我还提供了一些为什么你可能想使用 TaiPy 而不是其他两个流行的框架（Gradio
    和 Streamlit）的建议。
- en: The dashboard I developed allows users to filter data by date ranges and product
    categories, view key metrics such as total revenue and top-performing categories,
    explore visualisations like revenue trends and top products, and navigate through
    raw data with pagination.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我开发的仪表板允许用户通过日期范围和产品类别筛选数据，查看关键指标，如总收入和表现最佳类别，探索可视化，如收入趋势和最佳产品，以及通过分页导航原始数据。
- en: This guide provides a comprehensive implementation, covering the entire process
    from creating sample data to developing Python functions for querying data, generating
    plots, and handling user input. This step-by-step approach demonstrates how to
    leverage Taipy’s capabilities to create user-friendly and dynamic dashboards,
    making it ideal for data engineers and scientists who want to build interactive
    data applications.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 本指南提供了一个全面的实现，涵盖了从创建样本数据到开发用于查询数据、生成图表和处理用户输入的 Python 函数的整个流程。这种逐步方法展示了如何利用
    Taipy 的功能来创建用户友好且动态的仪表板，非常适合想要构建交互式数据应用的数据工程师和科学家。
- en: Although I used a CSV file for my data source, modifying the code to use another
    data source, such as a relational database management system (RDBMS) like SQLite,
    should be straightforward.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我使用了 CSV 文件作为数据源，但修改代码以使用其他数据源，例如 SQLite 这样的关系型数据库管理系统（RDBMS），应该是简单的。
- en: For more information on Taipy, their website is [https://taipy.io/](https://taipy.io/)
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 更多关于 Taipy 的信息，请访问他们的网站 [https://taipy.io/](https://taipy.io/)
