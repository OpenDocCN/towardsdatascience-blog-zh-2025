- en: 'Transforming Data into Solutions: Building a Smart App with Python and AI'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将数据转化为解决方案：使用Python和AI构建智能应用
- en: 原文：[https://towardsdatascience.com/transforming-data-into-solutions-building-a-smart-app-with-python-and-ai-c258be3b1fc2/](https://towardsdatascience.com/transforming-data-into-solutions-building-a-smart-app-with-python-and-ai-c258be3b1fc2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/transforming-data-into-solutions-building-a-smart-app-with-python-and-ai-c258be3b1fc2/](https://towardsdatascience.com/transforming-data-into-solutions-building-a-smart-app-with-python-and-ai-c258be3b1fc2/)
- en: Some financial analysts worry that artificial intelligence may not justify the
    massive investments being made in the field. While I understand their concerns,
    I see things differently. I’m neither an AI Boomer nor an AI Doomer – I believe
    AI has the potential to drive innovation, enhance productivity, and deliver measurable
    business outcomes.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 一些金融分析师担心，人工智能可能无法证明在该领域进行的巨额投资是合理的。虽然我理解他们的担忧，但我有不同的看法。我既不是AI Boomer也不是AI Doomer——我相信AI有潜力推动创新，提高生产力，并带来可衡量的商业成果。
- en: 'In my last article, I explored how Large Language Models (LLMs) can be used
    to structure unstructured data. This time, I want to go a step further: demonstrating
    how the outcome of structuring data with LLMs can serve as the **foundation for
    building intelligent applications**. Thus showing how to integrate AI in a bigger
    picture.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在我上一篇文章中，我探讨了如何使用大型语言模型（LLMs）来结构化非结构化数据。这次，我想更进一步：展示如何通过LLMs结构化数据的结果可以作为构建智能应用的**基础**。从而展示如何将AI融入更大的图景中。
- en: In this article, I’ll share how I used a modern stack to fast-track the development
    and deployment of Baker – a smart app which is the result of transforming a raw
    recipes dataset into an easy to use solution. This journey highlights more than
    just technical implementation; it showcases how AI can address practical challenges
    and deliver tangible value in real-world scenarios.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将分享我是如何使用现代堆栈快速推进Baker的开发和部署的——一个智能应用，它是将原始食谱数据集转化为易于使用解决方案的结果。这次旅程不仅突出了技术实现，还展示了AI如何解决实际挑战，并在现实场景中创造可衡量的价值。
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Baker: Your Cooking Muse'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 烘焙师：你的烹饪灵感
- en: In **[The (lesser-known) rising application of LLMs](https://towardsdatascience.com/the-lesser-known-rising-application-of-llms-775834116477)**,
    I mentioned that I needed a recipes dataset to work on a personal project. Now,
    it’s time to reveal that project.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在 **[LLMs（较少为人知的）新兴应用](https://towardsdatascience.com/the-lesser-known-rising-application-of-llms-775834116477)**
    中，我提到我需要一个食谱数据集来工作于一个个人项目。现在，是时候揭示这个项目了。
- en: '![Photo by WebFactory Ltd on Unsplash](../Images/debd34294a7e10638647b8f2a89372cf.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![由WebFactory Ltd在Unsplash提供的照片](../Images/debd34294a7e10638647b8f2a89372cf.png)'
- en: Photo by [WebFactory Ltd](https://unsplash.com/@webfactoryltd?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 照片由 [WebFactory Ltd](https://unsplash.com/@webfactoryltd?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 提供
- en: Managing food has always been a challenge for me. I struggle to find inspiration
    for meals, and as a result, I often let ingredients go to waste – something I’ve
    wanted to change for a long time. That’s why I set out to create a recipe recommender
    system that helps me (and others) use up ingredients before they go stale. The
    solution? **Baker**, my prototype for tackling this issue. This project reflects
    my passion for leveraging AI to tackle everyday challenges like **food waste**.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 管理食物对我来说一直是一个挑战。我很难找到餐点的灵感，结果，我经常让食材浪费——这是我长期以来想要改变的事情。这就是为什么我着手创建一个食谱推荐系统，帮助我（以及其他人）在食材变质之前用完它们。解决方案？**烘焙师**，我解决这个问题的原型。这个项目反映了我利用AI解决日常挑战，如**食物浪费**的热情。
- en: 'Baker is an open-source web application in its early stages, built almost entirely
    in Python. The app takes a list of ingredients and their quantities – mimicking
    what you might find in your fridge and pantry – and suggests recipes you can prepare
    using those ingredients. It’s designed to simplify meal preparation while encouraging
    smarter, more sustainable food choices. You can try the app yourself here:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: Baker是一个处于早期阶段的开源网络应用，几乎完全用Python构建。该应用接受一系列食材及其数量——模仿你可能在冰箱和储藏室中找到的东西——并建议你可以使用这些食材准备的食谱。它旨在简化餐点准备，同时鼓励更智能、更可持续的食物选择。你可以在以下链接尝试该应用：
- en: ⇒ [mixit-baker.streamlit.app](https://mixit-baker.streamlit.app/)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: ⇒ [mixit-baker.streamlit.app](https://mixit-baker.streamlit.app/)
- en: However, you might want to read the remaining of the article first. In one of
    the [next sections](#e4df) , I’ll walk you through a demo of the application.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，你可能需要先阅读文章的剩余部分。在接下来的[一个部分](#e4df)中，我将向您演示该应用的演示。
- en: '* * *'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'From Idea to POC: Accelerated Development with AI and Modern Tools'
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从想法到POC：利用人工智能和现代工具加速开发
- en: After the initial parsing of the dataset, I became busy with other duties and
    set this side project aside for months 😉 . But technology evolves quickly. When
    I finally returned to it, a series of newer models, techniques, and tools had
    emerged or matured, providing an opportunity to revisit and enhance the project.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在对数据集进行初步解析之后，我忙于其他职责，并将这个副项目搁置了数月 😊。但技术发展迅速。当我最终回归时，一系列新的模型、技术和工具已经出现或成熟，这为重新审视和提升项目提供了机会。
- en: '**Revisiting Data Extraction with GPT-4o**'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用GPT-4o重新审视数据提取**'
- en: The first step was to revisit my earlier work on data extraction and [update
    the results](https://github.com/VianneyMI/baker/pull/10). In my previous iteration,
    I had used **MistralAI’s open-mixtral-8x7b**, which had since been deprecated.
    This time, I switched to the newer and more advanced **GPT-4o**, and the results
    were remarkable.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是回顾我之前的数据提取工作并[更新结果](https://github.com/VianneyMI/baker/pull/10)。在我之前的迭代中，我使用了**MistralAI的open-mixtral-8x7b**，该工具已经过时。这次，我切换到了更先进的新工具**GPT-4o**，结果令人瞩目。
- en: 'To put the improvement into perspective:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将改进置于正确的视角：
- en: In the earlier run, the LLM failed to parse 89 recipes due to inconsistencies
    in JSON generation.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在早期的运行中，由于JSON生成的不一致性，LLM未能解析89个食谱。
- en: With GPT-4o, all 360 recipes in the dataset were parsed successfully, achieving
    **a 100% success rate**.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用GPT-4o，数据集中的所有360个食谱都成功解析，实现了**100%的成功率**。
- en: This milestone reflects how quickly AI capabilities improve. Just months ago,
    LLMs often struggled to output valid JSON reliably. This iteration demonstrated
    not only better results but also how adopting newer tools can yield substantial
    gains.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这个里程碑反映了人工智能能力提高的速度。仅仅几个月前，大型语言模型（LLMs）往往难以可靠地输出有效的JSON。这次迭代不仅展示了更好的结果，还展示了采用新工具如何带来实质性的收益。
- en: '**Post-Processing Challenges**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**后处理挑战**'
- en: 'Even with improved extraction, the raw data required significant post-processing.
    Recipes featured inconsistent units – grams, teaspoons, cups, and more – making
    comparisons and recommendations challenging. To address this, I adopted a systematic
    approach:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 即使提取效果有所改进，原始数据仍需要大量的后处理。食谱中包含不一致的单位——克、茶匙、杯等等，这使得比较和推荐变得具有挑战性。为了解决这个问题，我采用了系统性的方法：
- en: '**Standardization:** I defined a restricted set of units (e.g., grams for weight,
    milliliters for volume).'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**标准化**：我定义了一个受限的单位集合（例如，克用于重量，毫升用于体积）。'
- en: '**Mapping and Conversion:** All original units were mapped to this subset,
    with quantities adjusted accordingly.'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**映射和转换**：所有原始单位都映射到这个子集，并相应调整数量。'
- en: 'This normalization step was essential for enabling accurate ingredient filtering
    and powering the recipe recommendation engine. It also underscored a critical
    point: AI outputs must be contextually meaningful for their intended application,
    not just technically correct.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这个标准化步骤对于实现准确的成分过滤和推动食谱推荐引擎至关重要。它还强调了关键点：人工智能的输出必须对其预期应用具有上下文意义，而不仅仅是技术上正确。
- en: '**Building the Engine and Web Application**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**构建引擎和Web应用**'
- en: With the data cleaned, standardized, and ready for use, the next step was to
    start leveraging the data which I did by [building the engine logic and wrapping
    it in a web app](https://github.com/VianneyMI/baker/pull/18).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 数据清理、标准化并准备好使用后，下一步是开始利用这些数据，我通过[构建引擎逻辑并将其封装在Web应用中](https://github.com/VianneyMI/baker/pull/18)来实现这一点。
- en: '**Quick Prototyping**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**快速原型设计**'
- en: Throughout Baker’s development, I embraced a quick prototyping philosophy. The
    goal was less building an app from day one but rather to explore tools and techniques,
    test ideas and gather feedback.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在Baker的开发过程中，我秉持了快速原型设计的理念。目标不是从第一天就构建一个应用，而是探索工具和技术，测试想法并收集反馈。
- en: '**From Notebooks to a POC app:**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**从笔记本到POC应用**：'
- en: The way I built my data pipeline and the web app using AI illustrate the quick
    prototyping philosophy.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我构建数据管道和Web应用的方式，以及使用人工智能的方式，体现了快速原型设计的理念。
- en: '**The Data Pipeline:** The entire pipeline for extraction and post-processing
    resides in Jupyter notebooks. While this setup is "minimal yet functional" compared
    to a full-fledged ETL pipeline, it provided the speed and flexibility to iterate
    quickly. Initially, I thought of it as a one-time process, but I’m now planning
    to [transform it](https://github.com/VianneyMI/baker/issues/22) into something
    more robust and repeatible.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据管道：** 整个提取和后处理的管道都位于 Jupyter 笔记本中。与完整的 ETL 管道相比，这种设置虽然“最小化但功能性强”，但它提供了快速迭代的速度和灵活性。最初，我认为这是一个一次性过程，但现在我计划将其[转换](https://github.com/VianneyMI/baker/issues/22)成一个更稳健且可重复的过程。'
- en: '**The Web App:** The web app leverages **[FastAPI](https://fastapi.tiangolo.com/)**
    for the backend and **[Streamlit](https://streamlit.io/)** for the frontend. These
    frameworks are accessible, developer-friendly, and perfect for rapidly prototyping
    interactive applications.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Web 应用程序：** 该 Web 应用程序后端使用 **[FastAPI](https://fastapi.tiangolo.com/)**，前端使用
    **[Streamlit](https://streamlit.io/)**。这些框架易于访问，对开发者友好，非常适合快速原型设计交互式应用程序。'
- en: '**Accelerated Development with AI:** The frontend was generated entirely using
    **[Cursor](https://www.cursor.com/)**, an AI-powered development tool. While I
    had heard of Cursor before, this project allowed me to fully explore its potential.
    The experience was so enjoyable that I plan to write a dedicated article about
    it.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用 AI 加速开发：** 前端完全使用 **[Cursor](https://www.cursor.com/)**，一个 AI 驱动的开发工具生成。虽然我之前听说过
    Cursor，但这个项目让我能够充分探索其潜力。体验非常愉快，我计划写一篇关于它的专门文章。'
- en: By adopting this approach, I was able to build a working MVP in days rather
    than weeks or months.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 采用这种方法，我能够在几天内而不是几周或几个月内构建一个可工作的 MVP。
- en: '**Open-Source:**'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**开源：**'
- en: 'A marker of **Baker** is its **open-source nature**. By sharing the project
    on GitHub, I hope to:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**Baker** 的一个标志是其 **开源特性**。通过在 GitHub 上分享项目，我希望能够：'
- en: '**Encourage Collaboration:** Enable others to contribute new features, enhance
    the codebase, or extend the application with additional datasets.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**鼓励协作：使其他人能够贡献新功能、增强代码库或通过附加数据集扩展应用程序。**'
- en: '**Inspire Learning:** Provide a practical resource for those curious about
    leveraging LLMs, structuring unstructured data, or building recommendation systems.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**激发学习：为那些对利用 LLM、结构化非结构化数据或构建推荐系统感兴趣的人提供实用资源。**'
- en: Open-sourcing makes it easier for others to reproduce results, contribute improvements,
    and exchange ideas. Collaboration not only strengthens **Baker** but also fosters
    collective innovation.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 开源使得其他人更容易复制结果、贡献改进和交流想法。协作不仅加强了 **Baker**，还促进了集体创新。
- en: '**Free Deployment: Accessible and Lightweight**'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**免费部署：易于访问且轻量级**'
- en: 'To make **Baker** accessible, I deployed it using free-tier services:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使 **Baker** 易于访问，我使用免费层服务进行了部署：
- en: '**[Streamlit Cloud](https://streamlit.io/cloud)**: Powers the frontend, delivering
    an intuitive and interactive user experience.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[Streamlit Cloud](https://streamlit.io/cloud)**：提供前端，提供直观且交互式的用户体验。'
- en: '**[Koyeb](https://www.koyeb.com/docs)**: Supports backend processing and API
    calls without incurring hosting costs.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[Koyeb](https://www.koyeb.com/docs)**：支持后端处理和 API 调用，无需承担托管成本。'
- en: These platforms allowed me to deploy quickly and experiment without the financial
    or technical barriers of traditional hosting solutions. This deployment strategy
    highlights how modern tools make it possible to turn creative ideas into accessible
    applications at little to no cost.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这些平台使我能够快速部署并实验，无需承担传统托管解决方案的财务或技术障碍。这种部署策略突出了现代工具如何使创意想法以低至零的成本变为可访问的应用程序。
- en: '* * *'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Behind the Scenes: The Technology Powering Baker**'
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**幕后：推动 Baker 的技术**'
- en: In this section, I’ll share some implementation details of Baker. Again it is
    open-source so I invite my technical readers to go check the code on GitHub. Some
    readers might want to jump to the [next section](#e4df).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我将分享 Baker 的一些实现细节。再次强调，它是开源的，所以我邀请我的技术读者去 GitHub 上查看代码。一些读者可能想要跳转到 [下一节](#e4df)。
- en: The application is minimalist with a simple 3 tier architecture and is built
    almost entirely in Python.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 该应用程序采用极简设计，具有简单的三层架构，并且几乎完全使用 Python 构建。
- en: '![Photo by author](../Images/427a5998ef5e833398ed534291d51899.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![作者照片](../Images/427a5998ef5e833398ed534291d51899.png)'
- en: Photo by author
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 作者照片
- en: 'It is made of the following components:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 它由以下组件组成：
- en: '**Frontend**: A **Streamlit** interface provides an intuitive platform for
    users to interact with the system, query recipes, and receive recommendations.'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**前端**: Streamlit 接口为用户提供了一个直观的平台，用于与系统交互、查询食谱和接收推荐。'
- en: '**Backend**: Built with **FastAPI**, the backend serves as the interface for
    handling user queries and delivering recommendations.'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**后端**: 使用 **FastAPI** 构建，后端作为处理用户查询和提供推荐的接口。'
- en: '**Engine**: The engine contains the core logic for finding and filtering recipes,
    leveraging **[monggregate](https://vianneymi.github.io/monggregate/)** as a query
    builder.'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**引擎**: 引擎包含查找和过滤食谱的核心逻辑，利用 **[monggregate](https://vianneymi.github.io/monggregate/)**
    作为查询构建器。'
- en: '**Database**: The recipes are stored in a **[MongoDB](https://www.mongodb.com/)**
    database that processes the aggregation pipelines generated by the engine.'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据库**: 食谱存储在一个 **[MongoDB](https://www.mongodb.com/)** 数据库中，该数据库处理由引擎生成的聚合管道。'
- en: Backend Setup
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 后端设置
- en: 'The backend is initialized in `app.py`, where FastAPI endpoints are defined.
    For instance:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 后端在 `app.py` 文件中初始化，其中定义了 FastAPI 端点。例如：
- en: '[PRE0]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The `/recipes` endpoint accepts a list of ingredients and a serving size then
    delegates the processing to the engine.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '`/recipes` 端点接受一个食材列表和一个份量，然后将处理委托给引擎。'
- en: Recipe Engine Logic
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 食谱引擎逻辑
- en: 'The heart of the application resides in `core.py` within the `engine` directory.
    It manages database connections and query pipelines. Below is an example of the
    `find_recipes` function:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序的核心位于 `engine` 目录下的 `core.py` 文件中。它管理数据库连接和查询管道。以下是 `find_recipes` 函数的示例：
- en: '[PRE1]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The core logic of **Baker** resides in the `find_recipes` function.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**Baker** 的核心逻辑位于 `find_recipes` 函数中。'
- en: This function creates a MongoDB aggregation pipeline thanks to monggregate.
    This aggregation pipeline includes several steps.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数通过 monggregate 创建一个 MongoDB 聚合管道。这个聚合管道包括几个步骤。
- en: The first steps are generated by the `include_normalization_steps` function
    that is going to dynamically update the quantities of the ingredients in the database
    to ensure we are comparing apples to apples. This is done by updating the ingredients
    quantities in the database to the user desired serving.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步由 `include_normalization_steps` 函数生成，该函数将动态更新数据库中食材的数量，以确保我们是在比较相同的东西。这是通过将数据库中的食材数量更新到用户期望的份量来完成的。
- en: Then the actual matching logic is created by the `generate_match_query` function.
    Here we ensure, that the recipes don’t require more than what the user have for
    the ingredients concerned.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 然后通过 `generate_match_query` 函数创建实际的匹配逻辑。我们确保食谱不需要比用户拥有的相关食材更多的东西。
- en: Finally a projection filters out the fields that we don’t need to return.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，一个投影过滤掉我们不需要返回的字段。
- en: 'User Guide: Discovering Recipes with Baker in a Few Clicks'
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用户指南：使用 Baker 几步即可发现食谱
- en: '**Baker** helps you discover a better fate for your ingredients by finding
    recipes that match what you already have at home.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**Baker** 帮助您为您的食材找到更好的归宿，通过找到与您家中已有的食材相匹配的食谱。'
- en: The app features a simple form-based interface. Enter the ingredients you have,
    specify their quantities, and select the unit of measurement from the available
    options.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序具有一个简单的基于表单的界面。输入您拥有的食材，指定它们的数量，并从提供的选项中选择计量单位。
- en: '![Photo by author](../Images/e19f282e22dadb27a6bbae9a5d629924.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![作者照片](../Images/e19f282e22dadb27a6bbae9a5d629924.png)'
- en: Photo by author
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 作者照片
- en: In the example above, I’m searching for a recipe for **two servings** to use
    up 4 tomatoes and 2 carrots that have been sitting in my kitchen for a bit too
    long.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的示例中，我正在寻找两人份的食谱，以使用掉厨房里放置时间过长的4个番茄和2根胡萝卜。
- en: '**Baker** found two recipes! Clicking on a recipe lets you view the full details.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**Baker** 找到了两个食谱！点击食谱可以查看完整详情。'
- en: '![Photo by author](../Images/400c614a69918c28d07f950a51a97d56.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![作者照片](../Images/400c614a69918c28d07f950a51a97d56.png)'
- en: Photo by author
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 作者照片
- en: '**Baker** adapts the quantities in the recipe to match the serving size you’ve
    set. For example, if you adjust the serving size from two to four people, the
    app recalculates the ingredient quantities accordingly.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**Baker** 会根据您设置的份量调整食谱中的数量。例如，如果您将份量从两人份调整到四人份，应用会相应地重新计算食材数量。'
- en: Updating the serving size may also change the recipes that appear. **Baker**
    ensures that the suggested recipes match not only the serving size but also the
    ingredients and quantities you have on hand. For instance, if you only have 4
    tomatoes and 2 carrots for two people, **Baker** will avoid recommending recipes
    that require 4 tomatoes and 4 carrots.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 更新份量大小也可能改变显示的食谱。**Baker** 确保建议的食谱不仅匹配份量大小，还匹配您手头的成分和数量。例如，如果您只有 4 个番茄和 2 个胡萝卜为两个人准备，**Baker**
    将避免推荐需要 4 个番茄和 4 个胡萝卜的食谱。
- en: '* * *'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'The Road Ahead: Scaling Baker for Broader Impact'
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前路漫漫：扩展 Baker 以实现更广泛的影响
- en: Baker is a side project developed quickly and pragmatically, a functional prototype
    rather than a production-ready application.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: Baker 是一个快速且实用地开发的副项目，它是一个功能原型，而不是一个生产就绪的应用程序。
- en: However, I’d love to see it grow into something more impactful.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我希望能看到它发展成为更有影响力的东西。
- en: There are several areas where the app can expand, both in functionality and
    sophistication. To move forward, let’s address its current limitations and explore
    possible enhancements.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序可以在功能和复杂性方面扩展的几个领域。为了前进，让我们解决其当前的局限性并探索可能的增强。
- en: 1 – Growing the Recipe Database
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1 – 扩展食谱数据库
- en: Baker’s recipes originate from [Public Domain Recipes](https://publicdomainrecipes.com/),
    an open-source database of recipes. While this is an amazing project, the number
    of available recipes is limited. As a result, **Baker** only knows 360 recipes
    for now. To put this into perspective, some dedicated recipe websites claim to
    have tens of thousands recipes.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: Baker 的食谱来源于 [公共领域食谱](https://publicdomainrecipes.com/)，这是一个开源的食谱数据库。虽然这是一个令人惊叹的项目，但可用的食谱数量有限。因此，目前
    **Baker** 只知道 360 道食谱。为了更好地理解这一点，一些专门的食谱网站声称拥有数万道食谱。
- en: To scale, I’ll need to identify additional data sources for recipes.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 为了扩展，我需要识别额外的食谱数据源。
- en: 2 – Improving the Data Ingestion Pipeline
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2 – 改进数据摄取管道
- en: At the moment, **data ingestion** is handled through Jupyter Notebooks. One
    of the main technical priorities is to transform these notebooks into robust Python
    scripts, integrate them into an admin section of **Baker**, or even spin them
    off into a dedicated app.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，**数据摄取**是通过 Jupyter 笔记本处理的。主要技术优先事项之一是将这些笔记本转换为健壮的 Python 脚本，并将它们集成到 **Baker**
    的管理部分，或者甚至将其分离成一个专用的应用程序。
- en: Additionally, I am convinced that there’s room for improving the parsing process
    performed by the LLMs to ensure greater consistency and accuracy.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我相信还有改进 LLMs 执行的解析过程的余地，以确保更高的一致性和准确性。
- en: 3 – Adding Semantic Search & Flexibility
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3 – 添加语义搜索和灵活性
- en: Currently, recipes are searched by ingredient names through exact string matching.
    For example, searching for "tomato" will not retrieve recipes that mention "tomatoes."
    This can be addressed by [implementing a semantic search approach using vector
    databases](https://vianmixt.notion.site/Practical-Semantic-Search-with-MongoDB-and-OpenAI-451692801b41465fae1bea5f70238279).
    With **semantic search**, variations of ingredient names – whether due to pluralization,
    regional differences, or translation – can be dynamically mapped to the same concept.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，食谱是通过精确字符串匹配通过成分名称进行搜索的。例如，搜索 "番茄" 不会检索提到 "tomatoes" 的食谱。这可以通过 [使用向量数据库实现语义搜索方法](https://vianmixt.notion.site/Practical-Semantic-Search-with-MongoDB-and-OpenAI-451692801b41465fae1bea5f70238279)
    来解决。通过 **语义搜索**，成分名称的变化——无论是由于复数形式、地区差异还是翻译——可以动态映射到相同的概念。
- en: Moreover, semantic search would allow users to search in their native language,
    further broadening accessibility.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，语义搜索将允许用户用他们的母语进行搜索，进一步扩大可访问性。
- en: I also want to introduce **greater flexibility in the search functionality**.
    For example, if a user searches for recipes with tomatoes, carrots, and bananas
    but no such combination exists in the database, the search should still return
    recipes with subsets of the entered ingredients (e.g., tomatoes and carrots, tomatoes
    and bananas, or carrots and bananas).
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我还希望引入 **搜索功能的更大灵活性**。例如，如果用户搜索包含番茄、胡萝卜和香蕉的食谱，但数据库中没有这样的组合，搜索结果仍然应该返回包含输入成分子集的食谱（例如，番茄和胡萝卜，番茄和香蕉，或胡萝卜和香蕉）。
- en: From a feature standpoint, this is my top priority.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 从功能角度来看，这是我的首要任务。
- en: Other Enhancements to Consider
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他可以考虑的增强功能
- en: 'While the above are the main focus areas, there are plenty of other topics
    I’d like to address:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然上述是主要关注领域，但我还想解决许多其他主题：
- en: UI enhancements
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户界面增强
- en: Sorting and ranking of recipes
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 食谱的排序和排名
- en: Improved error handling and robustness
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改进的错误处理和健壮性
- en: Adopting software engineering best practices
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 采用软件工程最佳实践
- en: Performance optimization
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性能优化
- en: '* * *'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: I hope you’ve enjoyed reading this journey of turning ideas into reality. If
    you did, [consider supporting me on Buy Me a Coffee](https://buymeacoffee.com/vianmixt)
    to help fund future developments. Now, let’s summarize the key takeaways.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望您喜欢阅读这个将想法变为现实的过程。如果您喜欢，请考虑在[Buy Me a Coffee](https://buymeacoffee.com/vianmixt)上支持我，以帮助资助未来的发展。现在，让我们总结一下关键要点。
- en: 'A few months ago, I wrote an article about how **using LLMs for data structuration
    and extraction** was a promising use case powered by the new Generative AI wave.
    In this follow-up, I’ve taken the concept further by demonstrating a tangible
    outcome: using a LLM-generated dataset to power a data-centric smart app, **Baker**.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 几个月前，我写了一篇文章，关于如何利用新的生成式AI浪潮，**使用LLM进行数据结构和提取**是一个有前景的应用案例。在这篇后续文章中，我通过展示一个具体的成果进一步发展了这个概念：使用由LLM生成的数据集来驱动一个以数据为中心的智能应用，**Baker**。
- en: Along the way, I aimed to show how this process has become more accessible with
    modern tools like **Streamlit, FastAPI, Streamlit Cloud, Koyeb, and Cursor.**
    If you want a deep dive on the tools I used, let me know in the comments.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个过程中，我旨在展示如何通过现代工具如**Streamlit、FastAPI、Streamlit Cloud、Koyeb和Cursor**使这个过程变得更加容易接触。如果您想深入了解我使用的工具，请在评论中告诉我。
- en: These tools provide the flexibility and accessibility needed to focus on solving
    real problems rather than being overwhelmed by the complexity of managing multiple
    aspects – data pipelines, backend logic, frontend interfaces, CI/CD workflows,
    cloud deployments, testing, and the intricacies of various programming languages.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具提供了所需的灵活性和可访问性，以便专注于解决实际问题，而不是被管理多个方面的复杂性所淹没——数据管道、后端逻辑、前端界面、CI/CD工作流程、云部署、测试以及各种编程语言的复杂性。
- en: But this project isn’t just about recipes – it’s about unlocking the potential
    of unstructured data to solve real-world problems. For instance, the same approach
    used in **Baker** could be applied to create a personalized learning platform.
    By structuring educational content, such as lecture transcripts or articles, into
    accessible formats and building a recommendation engine, one could help users
    discover relevant learning materials based on their goals or interests.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 但这个项目不仅仅是关于食谱——它是关于释放非结构化数据的潜力来解决现实世界的问题。例如，在**Baker**中使用的相同方法可以应用于创建一个个性化的学习平台。通过将教育内容，如讲座记录或文章，结构化成可访问的格式，并构建一个推荐引擎，可以帮助用户根据他们的目标或兴趣发现相关的学习材料。
- en: Whether for education, product recommendations, or knowledge management, the
    principles and tools I’ve shared here can inspire countless applications.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 不论是用于教育、产品推荐还是知识管理，我在这里分享的原则和工具可以激发无数的应用。
- en: As we step into the new year, I encourage you to reflect on your own untapped
    datasets and ideas. What could you build with the tools and knowledge shared here?
    With small steps, quick iterations, and a collaborative mindset, you, too, can
    create **innovative solutions** that make a difference.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们步入新的一年，我鼓励您反思自己未开发的数据库和想法。您可以用这里分享的工具和知识构建什么？通过小步骤、快速迭代和协作心态，您也可以创建出**创新解决方案**，产生影响。
- en: Here’s to building a smarter, more data-driven future – together.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一起为构建一个更智能、更数据驱动的未来干杯。
