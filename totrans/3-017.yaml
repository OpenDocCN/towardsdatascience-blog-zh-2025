- en: Introducing the Benchmark Task and Experiment Planning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this post we’ll work with the Gymnasium [3] environment “Gridworld”. It’s
    essentially a maze-finding task, in which the agent has to get from the top-left
    corner of the maze to the bottom-right tile (the present) — without falling into
    any of the icy lakes:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8d1a6e9bb80d5a5f0021b6aab24ab1a4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'The state space is a number between 0 and N — 1, where N is the maximal number
    of tiles (16 in our case). There are four actions the agent can execute in every
    step: going left, right, up or down. Reaching the goal yields reward 1, falling
    into the lake ends the episode without any reward.'
  prefs: []
  type: TYPE_NORMAL
- en: The nice thing about this environment is that one can generate random worlds
    of arbitrary size. Thus, what we’ll do with all methods, is plot the number of
    steps / updates needed to solve the environment versus the environment size. In
    fact, Sutton does this in some parts of the book, too, so we can refer to that.
  prefs: []
  type: TYPE_NORMAL
- en: Preliminaries
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I’d like to start with some general notes — hoping these will guide you through
    my thought process.
  prefs: []
  type: TYPE_NORMAL
- en: It is not easy to compare algorithms in a “fair” way. When implementing the
    algorithms I mainly looked for correctness, but also simplicity — that is, I wanted
    readers to easily be able to connect the Python code with pseudocode from Sutton’s
    book. For “real” use cases, one would surely optimize the code more, and also
    use a large array of tricks common in RL, such as using decaying exploration,
    optimistic initialization, learning rate tuning, and more. Further, one would
    take great care to tune the hyperparameters of the deployed algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Applied RL Tricks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Due to the large number of algorithms under investigation, I cannot do this
    here. Instead, I identified two important mechanisms, and measured their effectiveness
    on an algorithm known to work quite well: Q-learning. These are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Intermediate rewards**: instead of only rewarding the agent for reaching
    the goal, we reward it for progress along the maze. We quantify this by the (normalized)
    difference in x and y coordinates between current and previous state. This makes
    use of the fact that the goal in each Gridworld environment is always at the bottom
    right, and thus higher x / y coordinates usually are better (although one could
    still get “stuck”, in case an icy lake is between the agent and the goal). Since
    this difference is normalized by the number of states, its contribution is small,
    s.t. it does not overshadow the reward of reaching the goal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Decaying exploration**: throughout this post series, the exploration-exploration
    dilemma came up frequently. It describes the trade-off of exploiting states /
    actions already known to be good, and exploring less explored states — potentially
    finding even better solutions, at the risk of wasting time in less optimal areas.
    One common technique addressing this is to decay exploration: starting with a
    high amount of exploration early, and slowly decaying this down to lower levels.
    We do this by linearly decaying ε from 1 (100% random exploration) to 0.05 over
    1000 steps.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s have a look at how Q-learning performs with these techniques:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/99b698d785e9796c775ae886fa27234b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, in the baseline setup the number of steps needed quickly grows,
    and reaches the maximal number of allowed steps (100.000 ) — meaning the algorithm
    did not solve the environment in the allotted number of steps. Also decaying ε
    alone did not contribute much. However, adding intermediate rewards proved to
    be extremely effective — and the combination of this and decaying ε performed
    best.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, for most methods to come we start with the “naïve” environment, the baseline
    implementation. Later we show results for the “improved” environment consisting
    of intermediate rewards and decaying exploration.
  prefs: []
  type: TYPE_NORMAL
- en: Comparison Criteria
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As was visible in the previous section I chose the number of steps needed until
    the found policy solves the Gridworld environment as the default way of comparing
    methods. This seems a bit more fair than just measuring elapsed time, since time
    depends on the concrete implementation (similar to the concept of [Big O notation](https://en.wikipedia.org/wiki/Big_O_notation))—
    and, as mentioned above, I did not optimize for speed. However, it is important
    to note that also steps can be misleading, as e.g. one step in DP methods contains
    a loop over all states, whereas one step in MC and TD methods is the generation
    in one episode (actually for TD methods we usually count one step as one value
    update, i.e. an episode generation consists of multiple steps — however I made
    this more comparable to MC methods on purpose). Due to this we also show elapsed
    time sometimes.
  prefs: []
  type: TYPE_NORMAL
- en: Experiment Structure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To reduce the variance, for each Gridworld size we run each method three times,
    and then save the lowest number of steps needed.
  prefs: []
  type: TYPE_NORMAL
- en: The code required to run all following benchmarking can be found on [GitHub](https://github.com/hermanmichaels/rl_book/blob/main/rl_book/scripts/benchmark.py).
  prefs: []
  type: TYPE_NORMAL
- en: Recap and Benchmarking of All Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the fundamentals out of the way, let’s properly get started. In this section
    we will recap all introduced algorithms from Part I of Sutton’s book. Further,
    we will benchmark them against each other on the previously introduced Gridworld
    task.
  prefs: []
  type: TYPE_NORMAL
- en: Dynamic Programming
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We start with Chapter 4 of Sutton’s book, describing methods from DP. These
    can be applied to a wide variety of problems, always building on the principle
    of iteratively building larger solutions from smaller subproblems. In the context
    of RL, DP methods maintain a Q-table which is filled out incrementally. For this,
    we require a model of the environment, and then, using this model, update the
    expected value of states or state-action pairs depending on the possible successor
    states. Sutton introduces two methods we picked up in our corresponding post:
    policy and value iteration.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with **policy iteration**. This consists of two interleaved steps,
    namely policy evaluation and policy improvement. Policy evaluation uses DP to — as
    the name says — evaluate the current policy: we incrementally update the state
    estimates by using the model and policy. Next comes policy improvement, which
    employs a fundamental concept of RL: according to the **policy improvement theorem**,
    any policy gets better when changing the predicted action in one state to a better
    action. Following this, we construct the new policy from the Q-table in greedy
    fashion. This is repeated, until the policy has converged.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The corresponding pseudocode looks as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b61cb0c510775e73fb5208ff2ec04b47.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s come to **value iteration**. This is very similar to policy iteration,
    but with a simple, yet crucial modification: in every loop, only one step of policy
    evaluation is run. It can be shown that this still converges to the optimal policy,
    and overall does so faster than policy iteration:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a31f23abb37d1c0ed7c88601f82e2458.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: For more details, [here’s my corresponding post about DP methods](https://towardsdatascience.com/introducing-markov-decision-processes-setting-up-gymnasium-environments-and-solving-them-via-e806c36dc04f/).
  prefs: []
  type: TYPE_NORMAL
- en: '**Results**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now it’s time to see what these first two algorithms are really made of. We
    run the experiment sketched above, and get the following plot:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bcfa29733dd6203a5bd5dc3efc93e8e5.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Both methods are able to solve all created Gridworld sizes in the minimal number
    of steps, 100\. Surprising? Well, this actually shows both a strength and as well
    as a weakness of DP methods, as simultaneously of our methodology: DP methods
    are “thorough”, they require a complete model of the world, and then iterate over
    all states — yielding a good solution with just a few passes over all states.
    However, this means that all states need to be estimated till convergence — even
    though some of them might be much less interesting — and this scales quite badly
    with the environment size. In fact, one measured step here contains a full run
    over all states — indicating that for these methods time is a better measure.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For this, we get the following graph:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6c0711e469a29bbe90b0bed1fc6b1040.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Now, we can see increase in compute needed w.r.t. to the number of states. And,
    we can also see that, as claimed, value iteration converges much faster, and scales
    much better. Note that the x-axis labels denote n, with the Gridworld having a
    size of n x n.
  prefs: []
  type: TYPE_NORMAL
- en: Monte Carlo Methods
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Next in our post series on RL we covered MC methods. These can learn from experience
    alone, i.e. one can run them in any kind of environment, without having a model
    of it — which is a stunning realization, and very useful: often, we don’t have
    this model, other times, it would be too complex and impractical to use. Consider
    the game of Blackjack: while we can certainly model all possible outcomes and
    corresponding probabilities, it is a very tedious task — and learning to play
    by just doing that is a very tempting thought. Due to not using a model, MC methods
    are unbiased — but on the downside their expectation has a high variance.'
  prefs: []
  type: TYPE_NORMAL
- en: One issue when implementing these methods is making sure that all state-action
    pairs are continuously visited, and thus updated. Due to not having a model, we
    cannot simply iterate over all possible combinations (compare e.g. DP methods),
    but (in a way) randomly explore the environment. If due to this we missed some
    states entirely, we’d loose theoretical convergence guarantees, which would translate
    into practice.
  prefs: []
  type: TYPE_NORMAL
- en: 'One way of satisfying this is the **exploring starts** assumption (ES): we
    start each episode in a random state and choose the first action randomly, too.
    Apart from that, MC methods can be implemented rather simply: we simply play out
    full episodes, and set the expected value of state-action pairs to the average
    obtained reward.'
  prefs: []
  type: TYPE_NORMAL
- en: 'MC with ES looks as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3d79a7d375c7945c483dd7cc59b737cd.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'To remove the assumption of ES, we can resort to two classes of algorithms:
    on- and off-policy methods. Let’s start with the on-policy one.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is actually not too different from the ES algorithm, we simply use an
    ε-greedy policy for generating episodes. That is, we remove the assumption of
    ES and **use a “soft” instead of a “hard” policy** for generating episodes: the
    used policy in every iteration is not fully greedy, but ε-greedy — which guarantees
    that in the limit we see all possible state-action pairs:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5026eff1caa41e7d39aa0b68531553a1.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: '**Off-policy methods** follow the idea of splitting exploration and learning
    in two policies. We maintain a policy π, which we want to optimize, and a behavior
    policy, b.'
  prefs: []
  type: TYPE_NORMAL
- en: 'However, we can’t simply use b everywhere in our algorithm. When generating
    an episode and computing returns, we obtain:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4b3ef806d3fd8fb60ffb3bbd4a4fdeb3.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: I.e., the resulting value is the predicted value of b, not π.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is where importance sampling comes in. We can fix this expectation with
    the right ratio:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eb4a648ac819cbeb7e5344f99ed93e0f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'This ratio is defined by:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ae2f0ef37962085e1e17f6289081d581.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'In our case, we obtain the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/64e8303f4cb783428f0e933373f97ffd.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: (Note that this uses weighted importance sampling, instead of “naïve” importance
    sampling.)
  prefs: []
  type: TYPE_NORMAL
- en: We could of course compute these ratios naively in every step. However, Sutton
    introduces a clever scheme updating these values (denoted by `W`) incrementally,
    which is way more efficient. In fact, in my original post I showed the naive version,
    too — I believe this helps with understanding. However, since here we mainly care
    about benchmarking, and the “naïve” and the “incremental” version are identical,
    up to performance — we here only list the slightly more complex incremental version.
  prefs: []
  type: TYPE_NORMAL
- en: 'In pseudocode the corresponding algorithm looks as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9c9e04d4a7bc1d799693ef4cf8fa4ba7.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: Note that, opposed to our initial post introducing these methods, where the
    behavior policy was simply randomly, here we pick a better one — namely an ε-greedy
    one w.r.t. to the current Q-table.
  prefs: []
  type: TYPE_NORMAL
- en: For more details [here’s my corresponding post on MC methods](https://towardsdatascience.com/monte-carlo-methods-for-solving-reinforcement-learning-problems-ff8389d46a3e/).
  prefs: []
  type: TYPE_NORMAL
- en: '**Results**'
  prefs: []
  type: TYPE_NORMAL
- en: 'With that, let’s compare these three algorithms on small Gridworld environments.
    Note that one step here denotes one full episode generated:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0d11a91f1cd1e1327361192b50848257.png)'
  prefs: []
  type: TYPE_IMG
- en: We observe off-policy MC to already time out at a Gridword size of 5×5, and,
    even though MC with ES and on-policy MC perform better, also they start to struggle
    with larger sizes.
  prefs: []
  type: TYPE_NORMAL
- en: 'This might be somewhat surprising, and disappointing for MC fans. Don’t worry,
    we will manage to boost this — however it shows a weakness of these algorithms:
    in “large” environments with sparse rewards, MC methods basically have to hope
    to stumble upon the goal by chance — which decreases exponentially with the size
    of the environment.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus, let’s try and make the task easier for the model, and use the previously
    introduced tricks empirically found to help performance of TD-learning: adding
    intermediate rewards, and ε-decay — our “improved” setup.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In fact, with this all methods fare much better:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/26f3490ec2929920d89c97e7c576c362.png)'
  prefs: []
  type: TYPE_IMG
- en: 'However, now MC ES is causing problems. Thus, let’s put this aside and continue
    without it: ES anyways was a theoretical concept on the way of developing MC methods,
    and clunky to use / implement (some might remember how I implemented having the
    environment start in random states …):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/325bf66c00d9723558639d76748d74bf.png)'
  prefs: []
  type: TYPE_IMG
- en: Here, at least we get close to the results of DP. Note that I capped the maximal
    number of steps to 100.000, so whenever this number shows up in the graph it means
    that the algorithm could not solve this environment in the given step limit. On-policy
    MC actually seems to perform really well, the number of steps needed barely increases—
    but off-policy MC seems to perform worse.
  prefs: []
  type: TYPE_NORMAL
- en: '**Discussion**'
  prefs: []
  type: TYPE_NORMAL
- en: To me, MC methods perform surprisingly well — since they essentially stumble
    around the environment randomly in the beginning, hoping to find the goal by exploration
    alone. However, of course this is not fully true — their performance (speaking
    of on-policy MC) becomes really good only after enabling intermediate rewards — which
    guide the model towards the goal. In this setup it seems MC methods perform really
    well — one potential reason being that they are unbiased — and less sensitive
    to hyperparameter tuning and co.
  prefs: []
  type: TYPE_NORMAL
- en: Temporal-Difference Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s come to TD methods. These can be seen as combining the strengths of both
    approaches previously introduced: similar to MC, they do not need a model of the
    environment — but still they build upon previous estimates, they bootstrap — as
    in DP.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s recap DP and MC models:'
  prefs: []
  type: TYPE_NORMAL
- en: 'DP methods turn the Bellman equation into an update rule, and compute the value
    of a state based on the estimated values of its successor states:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a4bcc080cb247a56ab49d2b484128977.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'MC methods, on the other hand, play out full episodes and then update their
    value estimates based on the observed return:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f8507def9adb480c83584ae166fc1beb.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'TD methods combine these two ideas. They play out full episodes, but after
    every step update value estimates with the observed return, and the previous estimate:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e3a0f227d4d5c6e0fe84a91919848acb.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: Some of the most fundamental RL algorithms stem from this field — and we will
    discuss them in the following.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s begin with **Sarsa**. First, we modify above introduced update rule to
    work with state-action pairs:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/35fa22161abc513804d1e3faf75e525b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'With this, Sarsa is actually introduced rather quickly: we play episodes, and
    update values following our current policy. The name comes from the tuples used
    in the updates:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2b8ccef00bcf110ef1b159eab1c12fad.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'In pseudocode this looks as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5d01af1240b2ffb9f89ddf4febebe465.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'Next up we have **Q-learning**. This is very similar to Sarsa, with one key
    difference: it is an off-policy algorithm. Instead of simply following the executed
    transition during the update, we take the maximum Q-value of all successor states:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/47c390b074f7b3fb4eaba56e95956b93.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: You can picture this as creating a behavior policy b, which is equal to π, except
    being greedy in the transitions under question.
  prefs: []
  type: TYPE_NORMAL
- en: 'The pseudocode looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/249a4529a0d52ba41cf782010c197d24.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'Another algorithm is **Expected Sarsa**, which (you guessed it) — is an extension
    of Sarsa. Instead of following the one transition executed by the policy, we account
    for all possible successor states, and weigh them by how likely they are given
    the current policy:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/858f35feba93ae0038f12dd885e82b77.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'The last algorithm in this chapter is an extension of Q-learning. Q-learning
    suffers from a problem known as **maximization bias**: since it uses a maximum
    over expected values, the resulting estimate can have positive bias. We can address
    this by using two Q-tables: for each update we use one for selecting a value-maximizing
    action, and the other for computing the update target. Which is used where is
    determined by a coin flip. The algorithm is known as **Double Q-learning**:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f0e502ddbdcb98fe8f38bc74b60c811a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: '**Results**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s have a look at the results, starting with the naïve environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2240af080dd97bb7a8239145e7a62972.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: We can see that both Q-learning methods start to get problems with Gridworld
    sizes of 11 x 11.
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus let’s apply our known tricks, yielding the “improved” setup:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0f06902988f2cf03c7fedc5cd24e7b93.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: All methods can now find solutions significantly quicker — just Expected Sarsa
    falls out. This could very well be — it is significantly less used than Q-learning
    or Sarsa, and maybe more a theoretical concept.
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus, let’s continue without this method and see how large world sizes we can
    solve:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3960a67ea36ea0512b4b40f2b688d8d7.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Q-learning can now also solve grid sizes of 25 x 25 without problems — but Sarsa
    and Double Q-learning start to degrade.
  prefs: []
  type: TYPE_NORMAL
- en: More details can be found in my [introductory post about TD methods](https://towardsdatascience.com/temporal-difference-learning-combining-dynamic-programming-and-monte-carlo-methods-for-e0c2f0829a51/#:~:text=TD%20learning%20can%20be%20viewed,not%20need%20a%20model%20and).
  prefs: []
  type: TYPE_NORMAL
- en: '**Discussion**'
  prefs: []
  type: TYPE_NORMAL
- en: In the improved setup, TD methods in general perform well. We only eliminated
    Expected Sarsa early, which anyways is not such a common algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: “Simple” Sarsa and Double Q-learning struggle for larger environment sizes,
    while Q-learning performs well overall. The latter is somewhat surprising, since
    Double Q-learning should address some of the shortcomings of standard Q-learning,
    in particular the high variance. Potentially, we already reduce the variance by
    running each experiment n times. Another hypothesis could be that Double Q-learning
    takes longer to converge, since the number of parameters has also doubled — which
    would indicate that the power of Double Q-learning shows better for more complex
    problems with more time.
  prefs: []
  type: TYPE_NORMAL
- en: 'As mentioned performs Q-learning better than Sarsa. This mirrors what can see
    in research / literature, namely that Q-learning is significantly more popular.
    This can probably explained by it being off-policy, which usually yields more
    powerful solution methods. Sarsa on the other hand performs better for stochastic
    or “dangerous” tasks: since in Sarsa the actual chosen action is taken into account
    in the value update, it better understands the effects of its actions, which comes
    in handy for stochastic environments and / or environments where one can, e.g.,
    fall off a cliff. Despite the latter being the case here, the environment is probably
    not complex or large enough, that this effect comes into play.'
  prefs: []
  type: TYPE_NORMAL
- en: TD-n
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: TD-n methods in a way marry classical TD learning and MC methods. As Sutton
    so nicely puts it, they “free us from the tyranny of the timestep” [1]. In MC
    methods, we are forced to wait a full episode before making any updates. In TD
    methods, we update estimates in every step — but are also forced to only look
    one step in the future.
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus, it makes sense to introduce n-step returns:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e7127b613174627b793d6253d8e18103.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'With that, we can simply introduce **Sarsa-n**:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9c612503f959991fcb17a8d37fca180e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: We play episodes following the current policy, and then update the value estimates
    with the n-step return.
  prefs: []
  type: TYPE_NORMAL
- en: In my corresponding post, we also introduce an off-policy version of this. However,
    to not blow up this post too long, and negative experience with off-policy MC
    methods, we focus on the “classics” — such as Sarsa-n — and tree-n tree backup,
    which we introduce next.
  prefs: []
  type: TYPE_NORMAL
- en: '**n-step tree backup** is an extension of the previously seen Expected Sarsa.
    When computing the n-step return, the corresponding transition tree looks as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a4f2322491ef81d134bfd1acaeb0c79a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'I.e., there is a single path down the tree corresponding to the actual action
    taken. Just as in Expected Sarsa, we now want to weigh actions according to their
    probability determined by the policy. But since now we have a tree of depth >
    1, the cumulative value of later levels is weighted by the probability of the
    action taken to reach these levels:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/aadbdfb2fee6baf0685c541ed0aca0e4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'The pseudocode looks as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eac740cadad7bde4d5d709fd7d25a41e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: Here’s my corresponding post on [n-step TD methods](https://towardsdatascience.com/introducing-n-step-temporal-difference-methods-7f7878b3441c/).
  prefs: []
  type: TYPE_NORMAL
- en: '**Results**'
  prefs: []
  type: TYPE_NORMAL
- en: 'As usual, we start with the “naïve” setting, and obtain the following results:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2bcc262327e722317bb9a39c5029d38f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Sarsa-n starts to struggle already with smaller grid world sizes. Let’s see
    if the improved setup changes this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/89743799123ccd4def82fb097f1219ab.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Now indeed Sarsa-n performs much better, but n-step tree backup does not.
  prefs: []
  type: TYPE_NORMAL
- en: '**Discussion**'
  prefs: []
  type: TYPE_NORMAL
- en: 'I found this discovery unexpected and somewhat hard to explain. I’d love to
    hear your thoughts on this — but in the meantime I was chatting with my chat agent
    of choice, and came to this hypothesis: intermediate rewards potentially confuse
    the tree algorithm, since it needs to learn a matching return distribution over
    all possible actions. Further, the more ε decays, the more the expected distribution
    might differ from the behavior policy.'
  prefs: []
  type: TYPE_NORMAL
- en: Model-Based Reinforcement Learning / Planning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In the previous chapter we discussed the topic “planning” — in the RL context
    with this we mainly refer to model-based methods. That is: we have (or build)
    a model of the environment, and use this model to explore further “virtually”,
    and in particular use these explorations for more and better updates / learnings
    of the value function. The following image displays the integration of planning
    into learning very well:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4a5153cac2d6cf39adff25e090840585.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: 'In the top-right corner we see the “classical” RL training loop (also dubbed
    “direct” RL): starting with some value function / policy we act in the (real)
    environment, and use this experience to update our value function (or policy in
    the case of policy-gradient methods). When incorporating planning, we additionally
    also learn a model of the world from this experience, and then use this model
    to generate further (virtual) experience, and update our value or policy function
    from this.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This actually is exactly the **Dyna-Q** algorithm, which looks as follows in
    pseudocode:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a5f2e644ebf283f41d20e25da4482861.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: Steps (a) — (d) are our classical Q-learning, whereas the rest of the algorithm
    adds the novel planning functionality, in particular the world model learning.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another related algorithm is **Prioritized Sweeping**, which changes how we
    sample states for the “planning loop”: we explore and play in the real environment,
    while learning the model, and save state-action pairs with large expected value
    changes to a queue. Only with this queue we start the “planning loop”, i.e. something
    to the steps (e) and (f) above:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/131af846627703505b0b41d286b2a505.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: More details can be found in my previous post on [model-based RL methods](https://medium.com/data-science-collective/planning-and-learning-in-reinforcement-learning-68de9bce815d).
  prefs: []
  type: TYPE_NORMAL
- en: '**Results**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with the naïve setting:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3938d8a8d6c6444a195d1d538f2881e7.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Dyna Q performs reasonably well, while Prioritized Sweeping struggles early
    on.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the improved setting we see a similar thing:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/631967a17ecdeb2c73a5cc3a71ce1983.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: '**Discussion**'
  prefs: []
  type: TYPE_NORMAL
- en: Prioritized sweeping already performed poorly in the corresponding introductory
    post — I suspect there either is some issue, or more likely this simply is a “tuning”
    thing — i.e. using a wrong sampling distribution.
  prefs: []
  type: TYPE_NORMAL
- en: Dyna-Q yields solid results.
  prefs: []
  type: TYPE_NORMAL
- en: Benchmarking the Best Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have now seen the performance of all algorithms from Part I of Sutton’s book
    by benchmarking them per chapter and on Gridworlds of up to size 25 x 25\. Already
    here we saw better and worse performing algorithms, and in particular already
    discarded a few candidates not suited for larger environments.
  prefs: []
  type: TYPE_NORMAL
- en: Now we want to benchmark the remaining ones — the best ones from each chapter — against
    one another, on Gridworlds up to size 50 x 50.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e64f15208ae8ee85bb0a696e748e6fe4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'These algorithms are:'
  prefs: []
  type: TYPE_NORMAL
- en: value iteration
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: on-policy MC
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Q-learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sarsa-n
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dyna-Q
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Results**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how they perform on Gridworld, this time with a maximal step limit of
    200.000:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/341f7ef8c890ffaf64231b1577baa3d4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s also plot the corresponding time needed (note that I plot unsuccessful
    runs — runs reaching the maximal number of steps without generating a feasible
    policy — at 500s):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fda69069728083944d8e825be5219efd.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'We can observe several interesting facts from these figures:'
  prefs: []
  type: TYPE_NORMAL
- en: The number of steps vs. time needed is highly correlated.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Value iteration performs exceptionally well, solving even Gridworlds of size
    50 x 50 with ease, and doing so magnitudes faster than the next-best algorithm.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The ranking for the remaining algorithms is (better to worse): On-policy MC,
    Dyna-Q, Q-learning, Sarsa-n.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the next section we discuss these in more details.
  prefs: []
  type: TYPE_NORMAL
- en: '**Discussion**'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Steps vs. Time
  prefs: []
  type: TYPE_NORMAL
- en: We started this post with a discussion on which metrics / measurement to use,
    and — in particular — whether to use number of steps or time needed to solve the
    problem. Looking back, we can say that this discussion was not so relevant after
    all, and — somewhat surprisingly — these two numbers are highly correlated. That
    is, despite the fact that, as initially described, one “step” can differ depending
    on the algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Value Iteration Dominates
  prefs: []
  type: TYPE_NORMAL
- en: Value Iteration performed remarkably well, solving even large Gridworlds (up
    to 50×50) with ease—outpacing all other algorithms by a wide margin. This might
    be surprising, considering that DP methods are often considered theoretical tools,
    rarely used in practice. Real-world applications tend to favor methods like Q-learning
    [2], PPO [4], or MCTS [5].
  prefs: []
  type: TYPE_NORMAL
- en: 'So why does such a “textbook” method dominate here? Because this environment
    is tailor-made for it:'
  prefs: []
  type: TYPE_NORMAL
- en: The model is fully known.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The dynamics are simple and deterministic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The state space is relatively small.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are exactly the conditions under which DP thrives. In contrast, model-free
    methods like Q-learning are designed for settings where such information is *not*
    available. Their strength lies in generality and scalability, not in exploiting
    small, well-defined problems. Q-learning incurs high variance and requires many
    episodes to converge—disadvantages that are magnified in small-scale environments.
    In short, there’s a clear trade-off between **efficiency** and **generality**.
    We’ll revisit this point in a future post when we introduce function approximation,
    where Q-learning has more room to shine.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. A Ranking Emerges
  prefs: []
  type: TYPE_NORMAL
- en: 'Beyond Value Iteration, we observed the following performance ranking: **On-policy
    MC > Dyna-Q > Q-learning > Sarsa-n**'
  prefs: []
  type: TYPE_NORMAL
- en: '**On-policy Monte Carlo** emerged as the best-performing model-free algorithm.
    This fits with our earlier reasoning: MC methods are simple, unbiased, and well-suited
    to problems with deterministic goals—especially when episodes are relatively short.
    While not scalable to large or continuous problems, MC methods seem to be quite
    effective in small to medium-sized tasks like Gridworld.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Dyna-Q** comes next. This result reinforces our expectations: Dyna-Q blends
    model-based planning with model-free learning. Although the model is learned (not
    given, as in Value Iteration), it’s still simple and deterministic here—making
    the learned model useful. This boosts performance substantially over pure model-free
    approaches.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Q-learning**, while still powerful, underperforms in this context for the
    reasons discussed above: it’s a general-purpose algorithm that isn’t able to fully
    leverage the structure of simple environments.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Sarsa-n** landed in last place. A likely explanation is the added bias introduced
    through bootstrapping in its multi-step updates. Unlike Monte Carlo methods, which
    estimate returns from full trajectories (unbiased), Sarsa-n uses bootstrapped
    estimates of future rewards. In small environments, this bias can outweigh the
    benefits of reduced variance.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Lastly, let’s compare our results vs. the ones from Sutton:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b399aaaf50e4ddb6dccdace2de355893.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from [1]
  prefs: []
  type: TYPE_NORMAL
- en: Note that Sutton lists the total number of steps on the x-axis, whereas we list
    n, with the total number of states being n x n. For 376 states, Sutton report
    ~100k steps before the optimal solution is found, whereas we report 75k for 400
    states (20 x 20), considering Dyna-Q. The numbers are highly comparable and provide
    a reassuring validation of our setup and implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This post served both as a recap of our series on Part I of Sutton and Barto’s
    *Reinforcement Learning* [1]and as an extension beyond the book’s scope—by benchmarking
    all introduced algorithms on increasingly larger Gridworld environments.
  prefs: []
  type: TYPE_NORMAL
- en: 'We began by outlining our benchmarking setup, then revisited the core chapters
    of Part I: Dynamic Programming, Monte Carlo methods, Temporal-Difference learning,
    and Model-Based RL / Planning. In each section, we introduced key algorithms such
    as Q-learning, provided complete Python implementations, and evaluated their performance
    on Gridworlds up to size 25×25\. The goal of this initial round was to identify
    top performers from each algorithmic family. Based on our experiments, the standouts
    were:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Value Iteration**, **On-policy MC**, **Q-learning**, **Sarsa-n**, and **Dyna-Q**.
    Python code to reproduce these results, and in particular implementations of all
    discussed methods, is available on [GitHub](https://github.com/hermanmichaels/rl_book/tree/main/rl_book/methods).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we stress-tested these high-performers on larger environments (up to
    50×50) and observed the following ranking:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Value Iteration > On-policy MC > Dyna-Q > Q-learning > Sarsa-n**'
  prefs: []
  type: TYPE_NORMAL
- en: While this result may be surprising—given the widespread use of Q-learning and
    the relatively rare application of Value Iteration and MC methods—it makes sense
    in context. Simple, fully-known, deterministic environments are ideal for Value
    Iteration and MC methods. In contrast, Q-learning is designed for more complex,
    unknown, and high-variance environments where function approximation becomes necessary.
    As we discussed, there’s a trade-off between efficiency in structured tasks and
    generality in complex ones.
  prefs: []
  type: TYPE_NORMAL
- en: 'That brings us to what’s next. In upcoming posts, we’ll push the boundaries
    further:'
  prefs: []
  type: TYPE_NORMAL
- en: First, by benchmarking these methods in more challenging environments such as
    **two-player games**, where direct competition will expose their differences more
    starkly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, we’ll dive into **Part II of Sutton’s book**, where function approximation
    is introduced. This unlocks the ability to scale reinforcement learning to environments
    far beyond what tabular methods can handle.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you’ve made it this far—thank you for reading! I hope you enjoyed this deep
    dive, and I’d love to have you back for the next installment in the series.
  prefs: []
  type: TYPE_NORMAL
- en: Other Posts in this Series
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
