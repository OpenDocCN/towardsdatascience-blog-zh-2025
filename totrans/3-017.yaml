  type: TYPE_NORMAL
- en: 'Part 3: [Monte Carlo Methods for Solving Reinforcement Learning Problems](https://towardsdatascience.com/monte-carlo-methods-for-solving-reinforcement-learning-problems-ff8389d46a3e)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Part 4: [Temporal-Difference Learning: Combining Dynamic Programming and Monte
    Carlo Methods for Reinforcement Learning](https://towardsdatascience.com/temporal-difference-learning-combining-dynamic-programming-and-monte-carlo-methods-for-e0c2f0829a51/)'
  prefs:
