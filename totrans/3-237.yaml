- en: Multimodal Search Engine Agents Powered by BLIP-2 and Gemini
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/multimodal-search-engine-agents-powered-by-blip-2-and-gemini/](https://towardsdatascience.com/multimodal-search-engine-agents-powered-by-blip-2-and-gemini/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*This post was co-authored with Rafael Guedes.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Introduction**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Traditional models can only process a single type of data, such as text, images,
    or tabular data. Multimodality is a trending concept in the AI research community,
    referring to a model’s ability to learn from multiple types of data simultaneously.
    This new technology (not really new, but significantly improved in the last few
    months) has numerous potential applications that will transform the user experience
    of many products.
  prefs: []
  type: TYPE_NORMAL
- en: One good example would be the new way search engines will work in the future,
    where users can input queries using a combination of modalities, such as text,
    images, audio, etc. Another example could be improving AI-powered customer support
    systems for voice and text inputs. In e-commerce, they are enhancing product discovery
    by allowing users to search using images and text. We will use the latter as our
    case study in this article.
  prefs: []
  type: TYPE_NORMAL
- en: The frontier AI research labs are shipping several models that support multiple
    modalities every month. CLIP and DALL-E by OpenAI and BLIP-2 by Salesforce combine
    image and text. ImageBind by Meta expanded the multiple modality concept to six
    modalities (text, audio, depth, thermal, image, and inertial measurement units).
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we will explore BLIP-2 by explaining its architecture, the
    way its loss function works, and its training process. We also present a practical
    use case that combines BLIP-2 and Gemini to create a multimodal fashion search
    agent that can assist customers in finding the best outfit based on either text
    or text and image prompts.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a71ff6a23a10a4e4114e4d7db9530c03.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 1: Multimodal Search Agent (image by author with Gemini)'
  prefs: []
  type: TYPE_NORMAL
- en: As always, the code is available on our [GitHub](https://github.com/zaai-ai/lab).
  prefs: []
  type: TYPE_NORMAL
- en: '**BLIP-2: a multimodal model**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'BLIP-2 (Bootstrapped Language-Image Pre-Training) [1] is a vision-language
    model designed to solve tasks such as visual question answering or multimodal
    reasoning based on inputs of both modalities: image and text. As we will see below,
    this model was developed to address two main challenges in the vision-language
    domain:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reduce computational cost** using frozen pre-trained visual encoders and
    LLMs, drastically reducing the training resources needed compared to a joint training
    of vision and language networks.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Improving visual-language alignment** by introducing Q-Former. Q-Former brings
    the visual and textual embeddings closer, leading to improved reasoning task performance
    and the ability to perform multimodal retrieval.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Architecture**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The architecture of BLIP-2 follows a modular design that integrates three modules:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Visual** **Encoder** is a frozen visual model, such as ViT, that extracts
    visual embeddings from the input images (which are then used in downstream tasks).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Querying Transformer (Q-Former)** is the key to this architecture. It consists
    of a trainable lightweight transformer that acts as an intermediate layer between
    the visual and language models. It is responsible for generating contextualized
    queries from the visual embeddings so that they can be processed effectively by
    the language model.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**LLM** is a frozen pre-trained LLM that processes refined visual embeddings
    to generate textual descriptions or answers.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/ae38e388a79497c0a5455e769793ffec.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2: BLIP-2 architecture (image by author)'
  prefs: []
  type: TYPE_NORMAL
- en: '**Loss Functions**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'BLIP-2 has three loss functions to train the **Q-Former** module:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Image-text contrastive loss** [2] enforces the alignment between visual and
    text embeddings by maximizing the similarity of paired image-text representations
    while pushing apart dissimilar pairs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Image-text matching loss** [3] is a binary classification loss that aims
    to make the model learn fine-grained alignments by predicting whether a text description
    matches the image (positive, i.e., target=1) or not (negative, i.e., target=0).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Image-grounded text generation loss** [4] is a cross-entropy loss used in
    LLMs to predict the probability of the next token in the sequence. The Q-Former
    architecture does not allow interactions between the image embeddings and the
    text tokens; therefore, the text must be generated based solely on the visual
    information, forcing the model to extract relevant visual features.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For both i**mage-text contrastive loss** and **image-text matching loss**, the
    authors used in-batch negative sampling, which means that if we have a batch size
    of 512, each image-text pair has one positive sample and 511 negative samples.
    This approach increases efficiency since negative samples are taken from the batch,
    and there is no need to search the entire dataset. It also provides a more diverse
    set of comparisons, leading to a better gradient estimation and faster convergence.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3ca4d4c5e4cfc2ce17a0744f062bb7e9.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3: Training losses explained (image by author)'
  prefs: []
  type: TYPE_NORMAL
- en: '**Training Process**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The training of BLIP-2 consists of two stages:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 1 – Bootstrapping visual-language representation:**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The model receives images as input that are converted to an embedding using
    the frozen visual encoder.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Together with these images, the model receives their text descriptions, which
    are also converted into embedding.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The Q-Former is trained using **image-text contrastive loss**, ensuring that
    the visual embeddings align closely with their corresponding textual embeddings
    and get further away from the non-matching text descriptions. At the same time,
    the **image-text matching loss** helps the model develop fine-grained representations
    by learning to classify whether a given text correctly describes the image or
    not.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/a8e31bf5a2332b4e0e92a5895f91d390.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4: Stage 1 training process (image by author)'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stage 2 – Bootstrapping vision-to-language generation:**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The pre-trained language model is integrated into the architecture to generate
    text based on the previously learned representations.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The focus shifts from alignment to text generation by using the image-grounded
    text generation loss which improves the model capabilities of reasoning and text
    generation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/4a7c117888bf1e04eb156f195e962d61.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 5: Stage 2 training process (image by the author)'
  prefs: []
  type: TYPE_NORMAL
- en: '**Creating a Multimodal Fashion Search Agent using BLIP-2 and Gemini**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we will leverage the multimodal capabilities of BLIP-2 to build
    a fashion assistant search agent that can receive input text and/or images and
    return recommendations. For the conversation capabilities of the agent, we will
    use Gemini 1.5 Pro hosted in Vertex AI, and for the interface, we will build a
    Streamlit app.
  prefs: []
  type: TYPE_NORMAL
- en: 'The fashion dataset used in this use case is licensed under the MIT license
    and can be accessed through the following link: [Fashion Product Images Dataset](https://www.kaggle.com/datasets/paramaggarwal/fashion-product-images-dataset).
    It consists of more than 44k images of fashion products.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The first step to make this possible is to set up a Vector DB. This enables
    the agent to perform a vectorized search based on the image embeddings of the
    items available in the store and the text or image embeddings from the input.
    We use docker and docker-compose to help us set up the environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Docker-Compose** with Postgres (the database) and the PGVector extension
    that allows vectorized search.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Postgres env file** with the variables to log into the database.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Pgadmin env file** with the variables to log into the UI for manual querying
    the database (optional).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '**Connection env file** with all the components to use to connect to PGVector
    using Langchain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Once the Vector DB is set up and running (docker-compose up -d), it is time
    to create the agents and tools to perform a multimodal search. We build two agents
    to solve this use case: one to understand what the user is requesting and another
    one to provide the recommendation:'
  prefs: []
  type: TYPE_NORMAL
- en: '**The classifier** is responsible for receiving the input message from the
    customer and extracting which category of clothes the user is looking for, for
    example, t-shirts, pants, shoes, jerseys, or shirts. It will also return the number
    of items the customer wants so that we can retrieve the exact number from the
    Vector DB.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '**The assistant** is responsible for answering with a personalized recommendation
    retrieved from the Vector DB. In this case, we are also leveraging the multimodal
    capabilities of Gemini to analyze the images retrieved and produce a better answer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: In terms of tools, we define one based on BLIP-2\. It consists of a function
    that receives a text or image as input and returns normalized embeddings. Depending
    on the input, the embeddings are produced using the text embedding model or the
    image embedding model of BLIP-2.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Note that we create the connection to PGVector with a different embedding model
    because it is mandatory, although it will not be used since we will store the
    embeddings produced by BLIP-2 directly.
  prefs: []
  type: TYPE_NORMAL
- en: In the loop below, we iterate over all categories of clothes, load the images,
    and create and append the embeddings to be stored in the vector db into a list.
    Also, we store the path to the image as text so that we can render it in our Streamlit
    app. Finally, we store the category to filter the results based on the category
    predicted by the classifier agent.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: We can now build our Streamlit app to chat with our assistant and ask for recommendations.
    The chat starts with the agent asking how it can help and providing a box for
    the customer to write a message and/or to upload a file.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once the customer replies, the workflow is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: The classifier agent identifies which categories of clothes the customer is
    looking for and how many units they want.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the customer uploads a file, this file is going to be converted into an embedding,
    and we will look for similar items in the vector db, conditioned by the category
    of clothes the customer wants and the number of units.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The items retrieved and the customer’s input message are then sent to the assistant
    agent to produce the recommendation message that is rendered together with the
    images retrieved.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the customer did not upload a file, the process is the same, but instead
    of generating image embeddings for retrieval, we create text embeddings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Both examples can be seen below:'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6 shows an example where the customer uploaded an image of a red t-shirt
    and asked the agent to complete the outfit.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/502d8c077e5af1a202773e069a516acf.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6: Example of text and image input (image by author)'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7 shows a more straightforward example where the customer asked the agent
    to show them black t-shirts.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f13531c4dacbef5ed9336c0541dc214c.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7: Example of text input (image by author)'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conclusion**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Multimodal AI is no longer just a research topic. It is being used in the industry
    to reshape the way customers interact with company catalogs. In this article,
    we explored how multimodal models like BLIP-2 and Gemini can be combined to address
    real-world problems and provide a more personalized experience to customers in
    a scalable way.
  prefs: []
  type: TYPE_NORMAL
- en: We explored the architecture of BLIP-2 in depth, demonstrating how it bridges
    the gap between text and image modalities. To extend its capabilities, we developed
    a system of agents, each specializing in different tasks. This system integrates
    an LLM (Gemini) and a vector database, enabling retrieval of the product catalog
    using text and image embeddings. We also leveraged Gemini’s multimodal reasoning
    to improve the sales assistant agent’s responses to be more human-like.
  prefs: []
  type: TYPE_NORMAL
- en: With tools like BLIP-2, Gemini, and PG Vector, the future of multimodal search
    and retrieval is already happening, and the search engines of the future will
    look very different from the ones we use today.
  prefs: []
  type: TYPE_NORMAL
- en: '**About me**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Serial entrepreneur and leader in the AI space. I develop AI products for businesses
    and invest in AI-focused startups.
  prefs: []
