- en: 'Kernel Case Study: Flash Attention'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/kernel-case-study-flash-attention/](https://towardsdatascience.com/kernel-case-study-flash-attention/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1743624162175" class="mdspan-comment">The attention</mdspan>
    mechanism is at the core of modern day transformers. But scaling the context window
    of these transformers was a major challenge, and it still is even though we are
    in the era of a million tokens + context window (Qwen 2.5 [[1]](https://huggingface.co/Qwen/Qwen2.5-7B-Instruct-1M)).
    There are both considerable compute and memory bound complexities in these models
    when we scale the context window (A naive attention mechanism scales quadratically
    in both compute and memory requirements). Revisiting Flash Attention lets us understand
    the complexities of optimizing the underlying operations on GPUs and more importantly
    gives us a better grip on thinking what’s next.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s quickly revisit a naive attention algorithm to see what’s going on.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a72e5ef165c456d9115531c9095e3826.png)'
  prefs: []
  type: TYPE_IMG
- en: Attention Algorithm. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: As you can see if we are not being careful then we will end up materializing
    a full NxM attention matrix into the GPU HBM. Meaning the memory requirement will
    go up quadratically to increasing context length.
  prefs: []
  type: TYPE_NORMAL
- en: If you wanna learn more about the GPU memory hierarchy and its differences,
    [my previous post on Triton](https://aarunjith.substack.com/p/simplifying-cuda-kernels-with-triton)
    is a good starting point. This would also be handy as we go along in this post
    when we get to implementing the flash attention kernel in triton. The [flash attention
    paper](https://arxiv.org/pdf/2205.14135) also has some really good introduction
    to this.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Additionally, when we look at the steps involved in executing this algorithm
    and its pattern of accessing the slow HBM, (which as explained later in the post
    could be a major bottleneck as well) we notice a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: We have Q, K and V in the HBM initially
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We need to access Q and K initially from the HBM to compute the dot product
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We write the output scores back to the HBM
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We access it again to execute the softmax, and optionally for Causal attention,
    like in the case of LLMs, we will have to mask this output before the softmax.
    The resulting full attention matrix is written again into the HBM
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We access the HBM again to execute the final dot product, to get both the attention
    weights and the Value matrix to write the output back to the slow GPU memory
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: I think you get the point. We could smartly read and write from the HBM to avoid
    redundant operations, to make some potential gains. This is exactly the primary
    motivation for the original Flash Attention algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Flash Attention initially came out in 2022 [[2]](https://arxiv.org/pdf/2205.14135),
    and then a year later came out with some much needed improvements in 2023 as Flash
    Attention v2 [[3]](https://arxiv.org/pdf/2307.08691) and again in 2024 with additional
    improvements for Nvidia Hopper and Blackwell GPUs [[4](https://www.nvidia.com/en-us/data-center/technologies/hopper-architecture/)]
    as Flash Attention v3 [[5](https://arxiv.org/abs/2407.08608)]. The original attention
    paper identified that the attention operation is still limited by memory bandwidth
    rather than compute. (In the past, there have been attempts to reduce the computation
    complexity of Attention from [O(N**2) to O(NlogN)](https://arxiv.org/pdf/2001.04451)
    and lower through approximate algorithms)
  prefs: []
  type: TYPE_NORMAL
- en: Flash attention proposed a fused kernel which does all of the above attention
    operations in one go, block-wise, to get the final attention output without ever
    having to realize the full N**2 attention matrix in memory, making the algorithm
    significantly faster. The term `fused` simply means we combine multiple operations
    in the GPU SRAM before invoking the much slower journey across the slower GPU
    memory, making the algorithm performant. All the while providing the exact attention
    output without any approximations.
  prefs: []
  type: TYPE_NORMAL
- en: This lecture, from Stanford CS139, demonstrates brilliantly how we can think
    of the impact of a well thought out memory access pattern can have on an algorithm.
    I highly recommend you check this one out if you haven’t already.
  prefs: []
  type: TYPE_NORMAL
- en: Before we start diving into flash attention <mdspan datatext="el1743623764484"
    class="mdspan-comment">(it’s getting tedious to type this over and over so let’s
    agree</mdspan> to call it FA, shall we?) in triton there is something else that
    I wanted to get out of the way.
  prefs: []
  type: TYPE_NORMAL
- en: '**Numerical Stability in exponents**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s take the example of FP32 numbers. **float32** (standard 32-bit float)
    uses 1 sign bit, 8 exponent bits, and 23 mantissa bits [[6](https://en.wikipedia.org/wiki/Single-precision_floating-point_format)].
    The largest finite base for the exponent in float32 is 2^(127)≈1.7×10^(38). Which
    implies when we look at exponents, e^(88) ≈ 1.65×10^(38), anything close to 88
    (although in reality would be much lower to keep it safe) and we are in trouble
    as we could easily overflow. Here’s a [very interesting chat with OpenAI o1](https://chatgpt.com/share/679d0ed9-8f48-8011-926e-e274b15ae8ae)
    shared by folks at [AllenAI](https://allenai.org/) in their [OpenInstruct](https://github.com/allenai/open-instruct)
    repo. This although is talking about stabilizing KL Divergence calculations in
    the setting of RLHF/RL, the ideas translate exactly to exponents as well. So to
    deal with the softmax situation in attention what we do is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4d21bb37b95326a18f6e6f9334b525d5.png)'
  prefs: []
  type: TYPE_IMG
- en: Softmax with rescaling. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'TRICK : Let’s also observe the following, if you do this:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/c87bae54cb9cb19202b0f36c7b59f6cf.png)'
  prefs: []
  type: TYPE_IMG
- en: Rescaling Trick. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: then you can rescale/readjust values without affecting the final softmax value.
    This is really useful when you have an initial estimate for the maximum value,
    but that might change when we encounter a new set of values. I know I know, stay
    with me and let me explain.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Setting the scene**'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a small detour into matrix multiplication.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/70f0ea807f836b8ae604e074edc73ab5.png)'
  prefs: []
  type: TYPE_IMG
- en: Blocked Matrix Multiplication. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'This shows a toy example of a blocked matrix multiplication except we have
    blocks only on the rows of A (green) and columns of B (Orange? Beige?). As you
    can see above the output O1, O2, O3 and O4 are complete (those positions need
    no more calculations). We just need to fill in the remaining columns in the initial
    rows by using the remaining columns of B. Like below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fb30c0c572a5d25b476a273bb047c380.png)'
  prefs: []
  type: TYPE_IMG
- en: Next set of block fill the remaining spaces up. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: So we can fill these places in the output with a block of columns from B and
    a block of rows from A at a time.
  prefs: []
  type: TYPE_NORMAL
- en: '**Connecting the dots**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When I introduced FA, I said that we never have to compute the full attention
    matrix and store the whole thing. So here’s what we do:'
  prefs: []
  type: TYPE_NORMAL
- en: Compute a block of the attention matrix using a block of rows from Q and a block
    of columns from K. Once you get the partial attention matrix compute a few statistics
    and keep it in the memory.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/d899632f758102d697450c9bc5c63a3d.png)'
  prefs: []
  type: TYPE_IMG
- en: Computing block attention scores S_b, and computing the row-wise maximums. Image
    by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'I have greyed O5 to O12 because we don’t know those values yet, as they need
    to come from the subsequent blocks. We then transform Sb like below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b578eb39ae7faf1767757bc7071e79b5.png)'
  prefs: []
  type: TYPE_IMG
- en: Keeping a track of the current row-sum and row-maxes. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/98737884065e16b5b6a77799503bfebc.png)'
  prefs: []
  type: TYPE_IMG
- en: Exponents with the scaling trick. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Now you have <mdspan datatext="el1743623960664" class="mdspan-comment">the</mdspan>
    setup for a partial softmax
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a037c10447f1fc6147cf6176a3fe4a0c.png)'
  prefs: []
  type: TYPE_IMG
- en: Partial Softmax, as the denominator is still a partial sum. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '**But:**'
  prefs: []
  type: TYPE_NORMAL
- en: What if the true maximum is in the Oi’s that are yet to come?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The sum is still local, so we need to update this every time we see new Pi’s.
    We know how to keep track of a sum, but what about rebasing it to the true maximum?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Recall the trick above. All that we have to do is to keep a track of the maximum
    values we encounter for each row, and iteratively update as you see new maximums
    from the remaining blocks of columns from K for the same set of rows from Q.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b96ddf9bd6e723060e3417b9a2906aae.png)'
  prefs: []
  type: TYPE_IMG
- en: Two consecutive blocks and its row max manipulations. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9b5a9f523f6fb30bc3eabee16076fdc0.png)'
  prefs: []
  type: TYPE_IMG
- en: Updating the estimate of our current sum with rescaling
  prefs: []
  type: TYPE_NORMAL
- en: We still do not want to write our partial softmax matrix into HBM. We keep it
    for the next step.
  prefs: []
  type: TYPE_NORMAL
- en: '**The final dot product**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The last step in our attention computation is our dot product with V. To start
    we would have initialized a matrix full of 0’s in our HBM as our output of shape
    NxD. Where N is the number of Queries as above. We use the same block size for
    V as we had for K except we can apply it row wise like below (The subscripts just
    denote that this is only a block and not the full matrix)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8f179a470ac59bcd89e545008f3483bf.png)'
  prefs: []
  type: TYPE_IMG
- en: A single block of attention scores creating a partial output. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6f32ec251f17f2a57d73c7ec967f1df0.png)'
  prefs: []
  type: TYPE_IMG
- en: Whereas the full output would require the sum of all these dot products. Some
    of which will be filled in by the blocks to come. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Notice how we need the attention scores from all the blocks to get the final
    product. But if we calculate the local score and `accumulate` it like how we did
    to get the actual Ls we can form the full output at the end of processing all
    the blocks of columns (K[b]) for a given row block (Q[b]).
  prefs: []
  type: TYPE_NORMAL
- en: '**Putting it all together**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s put all these ideas together to form the final algorithm
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4dce451b6c0cceffa3c1ddad983a88e0.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Flash Attention V1 Algorithm. Source: *Tri Dao et.al [[2](https://arxiv.org/pdf/2211.17192)]*'
  prefs: []
  type: TYPE_NORMAL
- en: To understand the notation, _[ij] implies that it is the local values for a
    given block of columns and rows and _i implies it’s for the global output rows
    and Query blocks. The only part we haven’t explained so far is the final update
    to O[i]. That’s where we use all the ideas from above to get the right scaling.
  prefs: []
  type: TYPE_NORMAL
- en: The whole code is available [as a gist here](https://gist.github.com/aarunjith/adba4c4f67f9392d6e5789f7e92858b0).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Let’s see what these initializations look like in torch:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: If you are unsure about the launch grid, checkout [my introduction to Triton](https://substack.com/home/post/p-159116483)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Take a closer look at how we initialized our Ls and Ms. We are keeping one for
    each row block of Output/Query, each of size B[r]. There are N[r] such blocks
    in total.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the example above I was simply using B[r] = 2 and B[c] = 2\. But in the
    above code the initialization is based on the device capacity. I have included
    the calculation for a T4 GPU. For any other GPU, we need to get the SRAM capacity
    and adjust these numbers accordingly. Now for the actual kernel implementation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s understand whats happening here:'
  prefs: []
  type: TYPE_NORMAL
- en: Create 1 kernel for each NxD matrix in the batch. In reality we would have one
    more dimension to parallelize across, the head dimension. But for understanding
    the implementation I think this would suffice.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In each kernel we do the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each block of columns in K and V we load up the relevant part of the matrix
    (B[c] x D) into the GPU SRAM (Current total SRAM usage = 2B[c]D). This stays in
    the SRAM till we are done with all the row blocks
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: For each row block of Q, we load the block onto SRAM as well (Current total
    SRAM Usage = 2B[c]D + BrD)
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: On chip we compute the dot product (s[ij]), compute the local row-maxes (m[ij]),
    the exp (p[ij]), and the expsum (l[ij])
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We load up the running stats for the i^(th) row block. Two vectors of size
    B[r] x 1, which denotes the current global row-maxes (m[i]) and the expsum (l[i]).
    (Current SRAM usage: 2B[c]D + B[r]D + 2B[r])'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: We get the new estimates for the global m[i] and l[i].
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We load the part of the output for this block of Q and update it using the
    new running stats and the exponent trick, we then write this back into the HBM.
    (Current SRAM usage: 2B[c]D + 2B[r]D + 2B[r])'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: We write the updated running stats also into the HBM.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: For a matrix of any size, aka any context length, at a time we will never materialize
    the full attention matrix, only a part of it always.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We managed to fuse together all the ops into a single kernel, reducing HBM access
    considerably.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Final SRAM usage stands although at 4BD + 2B, where B was initially calculated
    as M/4d where M is the SRAM capacity. Not sure if am missing something here. Please
    comment if you know why this is the case!
  prefs: []
  type: TYPE_NORMAL
- en: '**Block Sparse Attention and V2 and V3**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I will keep this short as these versions keep the core idea but figured out
    better and better ways to do the same.
  prefs: []
  type: TYPE_NORMAL
- en: For Block Sparse Attention,
  prefs: []
  type: TYPE_NORMAL
- en: Consider we had masks for each block like in the case of causal attention. If
    for a given block we have the masks all set to zero then we can simply skip the
    entire block without computing anything really. Saving FLOPs. This is where the
    major gains were seen. To put this into perspective, in the case of BERT pre-training
    the algorithm gets a 15% boost over the best performing training setup at the
    time, whereas for GPT-2 we get a 3x over huggingface training implementation and
    ~ 2x over a Megatron setup.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/0fc075a8241a05dce9513fe087a86d89.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Performance gain for autoregressive models, where we have a sparse mask. Source:
    *Tri Dao et.al [[2](https://arxiv.org/pdf/2211.17192)]*'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. You can literally get the same performance in GPT2 in a fraction of the
    time, literally shaving off days from the training run, which is awesome!
  prefs: []
  type: TYPE_NORMAL
- en: 'In V2:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Notice how currently we can only do parallelization at the batch and head dimension.
    But if you simply just flip the order to look at all the column blocks for a given
    row block then we get the following advantages:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Each row block becomes embarrassingly parallel. How you know this is by looking
    at the illustrations above. You need all the column blocks for a given row block
    to fully form the attention output. If you were to run all the column blocks in
    parallel, you will end up with a race condition that will try to update the same
    rows of the output at the same time. But not if you do it the other way around.
    Although there are atomic add operators in triton which could help, they may potentially
    set us back.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: We can avoid hitting the HBM to get the global Ms and Ls. We can initialize
    one on the chip for each kernel.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Also we do not have to scale all the output update terms with the new estimate
    of L. We can just compute stuff without dividing by L and at the end of all the
    column blocks, simply divide the output with the latest estimate of L, saving
    some FLOPS again!
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Much of the improvement also comes in the form of the backward kernel. I am
    omitting all the backward kernels from this. But they are a fun exercise to try
    and implement, although they are significantly more complex.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Here are some benchmarks:'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/7aa6fa297ad74c00203922e08431dacd.png)](https://substackcdn.com/image/fetch/f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Ff4fe5982-f319-4aaf-891f-da96490a1b8a_1788x1366.png)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Performance benchmark of FA v2 against existing attention algorithms. Source:
    **Tri Dao et.al [[3](https://arxiv.org/pdf/2307.08691)]**'
  prefs: []
  type: TYPE_NORMAL
- en: The actual implementations of these kernels need to take into account various
    nuances that we encounter in the real world. I have tried to keep it simple. But
    do [check them out here](https://github.com/Dao-AILab/flash-attention/tree/main).
  prefs: []
  type: TYPE_NORMAL
- en: 'More recently in V3:'
  prefs: []
  type: TYPE_NORMAL
- en: Newer GPUs, especially the Hopper and Blackwell GPUs, have low precision modes
    (FP8 in Hopper and GP4 in Blackwell), which can double and quadruple the throughput
    for the same power and chip area and more specialized GEMM (General Matrix Multiply)
    kernels, which the previous version of the algorithm fails to capitalize on. This
    is because there are many operations which are non-GEMM, like softmax, which reduces
    the utilization of these specialized GPU kernels.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The FA v1 and v2 are essentially synchronous. Recall in the v2 description I
    mentioned that we are limited when column blocks try to write to the same output
    pointers, or when we have to go step by step using the output from the previous
    steps. Well these modern GPUs can make use special instructions to break this
    synchrony.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We overlap the comparatively low-throughput non-GEMM operations involved in
    softmax, such as floating point multiply-add and exponential, with the asynchronous
    WGMMA instructions for GEMM. As part of this, we rework the FlashAttention-2 algorithm
    to circumvent certain sequential dependencies between softmax and the GEMMs. For
    example, in the 2-stage version of our algorithm, while softmax executes on one
    block of the scores matrix, WGMMA executes in the asynchronous proxy to compute
    the next block.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Flash Attention v3, Shah et.al
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: They also adapted the algorithm to target these specialized low precision Tensor
    cores on these new devices, significantly increasing the FLOPs.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Some more benchmarks:'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/c575a3d7ee3cf067d0a3ca07a3f6f132.png)](https://substackcdn.com/image/fetch/f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F12fc597c-0f7a-46c9-b4f3-19a125264caa_1844x760.png)'
  prefs: []
  type: TYPE_NORMAL
- en: 'FA v3 Performance gain over v2\. Source: *Shah et. al [[5](https://arxiv.org/abs/2407.08608)]*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conclusion**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There is much to admire in their work here. The floor for this technical skill
    level often seemed high owing to the low level details. But hopefully tools like
    Triton could change the game and get more people into this! The future is bright.
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[1] [Qwen 2.5-7B-Instruct-1M Huggingface Model Page](https://huggingface.co/Qwen/Qwen2.5-7B-Instruct-1M)'
  prefs: []
  type: TYPE_NORMAL
