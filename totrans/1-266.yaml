- en: The SyncNet Research Paper, Clearly Explained
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: SyncNet研究论文，清晰解释
- en: 原文：[https://towardsdatascience.com/syncnet-paper-easily-explained/](https://towardsdatascience.com/syncnet-paper-easily-explained/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文：https://towardsdatascience.com/syncnet-paper-easily-explained/](https://towardsdatascience.com/syncnet-paper-easily-explained/)'
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: Ever watched a badly dubbed movie where the lips don’t match the words? Or been
    on a video call where someone’s mouth moves out of sync with their voice? These
    sync issues are more than just annoying – they’re a real problem in video production,
    broadcasting, and real-time communication. The Syncnet paper tackles this head-on
    with a clever self-supervised approach that can automatically detect and fix audio-video
    sync problems without needing any manual annotations. What’s particularly cool
    is that the same model that fixes sync issues can also figure out who’s speaking
    in a crowded room – all by learning the natural correlation between lip movements
    and speech sounds.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否曾经看过一个配音糟糕的电影，其中嘴唇的动作与台词不匹配？或者是否在视频通话中遇到过有人说话时嘴巴的动作与声音不同步的情况？这些同步问题不仅仅是令人烦恼，它们在视频制作、广播和实时通信中也是一个真正的问题。Syncnet论文直面这个问题，采用了一种巧妙的自监督方法，可以自动检测和修复音频-视频同步问题，而无需任何手动标注。特别酷的是，同一个模型不仅可以修复同步问题，还可以在嘈杂的房间里识别出说话者——这一切都是通过学习嘴唇动作和语音声音之间的自然相关性来实现的。
- en: Core Applications
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 核心应用
- en: The downstream tasks which can be performed with the output of the trained ConvNet
    have vital applications which include determining the lip-sync error in videos,
    detecting the speaker in a scene with multiple faces, and lip reading. Developing
    the lip-sync error application, if the sync offset is present in the -1 to +1
    second range (this range could be varied, but generally it suffices for TV broadcast
    audio-video) – that is, video lags audio or vice-versa in -1 to +1 second – we
    can determine how much the offset is. For example, say it comes out to be 200
    ms audio lags video, that means video is 200 ms ahead of audio, and in that case
    we can shift the audio 200 ms forward and can make the offset sync issue near
    0 by this, so it also has applications to make audio-video in sync (if offset
    lies in the range we have taken here -1 to +1 seconds).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 训练好的卷积神经网络（ConvNet）的输出可以执行下游任务，这些任务具有至关重要的应用，包括确定视频中的唇同步错误、检测场景中多个面孔的说话者以及唇读。开发唇同步错误应用，如果同步偏移在-1到+1秒的范围内（这个范围可以变化，但通常对于电视广播音频-视频来说已经足够）——也就是说，视频滞后音频或反之，在-1到+1秒内——我们可以确定偏移量的大小。例如，如果结果是200毫秒音频滞后视频，这意味着视频比音频提前200毫秒，在这种情况下，我们可以将音频向前移动200毫秒，通过这种方式可以将偏移同步问题接近于0，因此它也有使音频-视频同步的应用（如果偏移位于我们这里所采取的-1到+1秒范围内）。
- en: Self-Supervised Training Approach
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自监督训练方法
- en: The training method is self-supervised, which means no human annotations or
    manual labelling is required; the positive and negative pairs for training the
    model happen without manual labelling. This method assumes the data we get is
    already in sync (audio-video in sync), so we get the positive pair already in
    which the audio and video are in sync, and we make the false pair in which audio
    and video are not in sync by shifting the audio by ± some seconds to make it async
    (false pair for training network). The advantage is that we can have almost an
    infinite amount of data to train, provided it is synced and already has no sync
    issue in source, so that positive and negative pairs can be made easily for training.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 训练方法是自监督的，这意味着不需要人工标注或手动标记；训练模型的正负对发生时无需手动标记。这种方法假设我们得到的数据已经同步（音频-视频同步），因此我们得到的是已经同步的正对，我们通过将音频移动±几秒来制造不匹配的假对（用于训练网络的假对）。优点是，如果我们得到的数据已经同步且在源中没有同步问题，那么我们可以几乎有无穷多的数据来训练，这样就可以轻松地为训练制作正负对。
- en: 'Network Architecture: Dual-Stream CNN'
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网络架构：双流CNN
- en: 'Coming to the architecture, it has 2 streams: audio stream and video stream,
    or in layman’s terms, the architecture is divided into 2 branches – one for audio
    and one for video. Both streams expect 0.2 second input. The audio stream expects
    0.2 seconds of audio and the video stream expects 0.2 seconds of video. Both network
    architectures for audio and video streams are CNN-based, which expect 2D data.
    For video (frames/images), CNN seems natural, but for audio, a CNN-based network
    is also trained. For both video and the corresponding audio, first their respective
    data preprocessing is done and then they are fed into their respective CNN architectures.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在谈到架构时，它包含2个流：音频流和视频流，或者用通俗的话说，架构被分为2个分支——一个用于音频，一个用于视频。两个流都期望0.2秒的输入。音频流期望0.2秒的音频，视频流期望0.2秒的视频。音频和视频流的网络架构都是基于卷积神经网络（CNN），它们期望2D数据。对于视频（帧/图像），CNN看起来很自然，但对于音频，也训练了一个基于CNN的网络。对于视频和相应的音频，首先进行各自的数据预处理，然后输入到各自的CNN架构中。
- en: Audio Data Preprocessing
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 音频数据处理
- en: Audio data preprocessing – The raw 0.2 second audio goes through a series of
    steps to give an MFCC 13 x 20 matrix. 13 are the DCT coefficients associated for
    that audio chunk which represent the features for that audio, and 20 is in the
    time direction, because MFCC frequency was 100 Hz, so for 0.2 seconds, 20 samples
    will be there and each sample’s DCT coefficients are represented by one column
    of the 13 x 20 matrix. The matrix 13 x 20 is input to the CNN audio stream. Output
    of the network is a 256-dimensional embedding, representation of the 0.2 second
    audio.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 音频数据处理——原始的0.2秒音频经过一系列步骤，得到一个13 x 20的MFCC矩阵。13是与此音频块相关的DCT系数，代表该音频的特征，而20是时间方向上的，因为MFCC频率是100
    Hz，所以对于0.2秒，将有20个样本，每个样本的DCT系数由13 x 20矩阵的一列表示。13 x 20的矩阵输入到CNN音频流。网络的输出是一个256维的嵌入，代表0.2秒的音频。
- en: Video Data Preprocessing
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 视频数据处理
- en: Video preprocessing – The CNN here expects input of 111×111×5 (W×H×T), 5 frames
    of (h,w) = (111,111) gray-scale image of mouth. Now for 25 fps, 0.2 seconds translates
    to 5 frames. The raw video of 0.2 seconds goes through video preprocessing at
    25 fps and gets converted into 111x111x5 and fed into the CNN network. Output
    of the network is a 256-dimensional embedding, representation of the 0.2 second
    video.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 视频预处理——这里的CNN期望输入为111×111×5（W×H×T），5帧（h,w）=（111,111）的灰度图像，代表嘴巴。对于25 fps，0.2秒转换为5帧。0.2秒的原始视频以25
    fps进行视频预处理，并转换为111x111x5，然后输入到CNN网络中。网络的输出是一个256维的嵌入，代表0.2秒的视频。
- en: The audio preprocessing is simpler and less complex than video. Let’s understand
    how the 0.2 second video and its corresponding audio are chosen from the original
    source. Our goal is to get a video clip where there is only 1 person and no scene
    change should be there in the 0.2 second, one person who’s speaking in the 0.2
    second duration. Anything other than this is bad data for our model at this stage.
    So we run video data preprocessing on the video, in which we do scene detection,
    then face detection, and then face tracking, crop the mouth part and convert all
    frames/images for the video into grayscale images of 111×111 and give it to the
    CNN model, and the corresponding audio part is converted into a 13×20 matrix and
    given to the audio CNN. The clips where faces > 1 are rejected; there’s no scene
    change in 0.2 seconds clip as we have applied scene detection in the pipeline.
    So what we have at last is a video in which audio is there and one person is there
    in video, which suffices the primary need of the data pipeline.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 音频预处理比视频简单且复杂度低。让我们了解如何从原始源中选择0.2秒的视频及其相应的音频。我们的目标是获取一个只有1个人且在0.2秒内没有场景变化的视频剪辑，一个人在0.2秒的持续时间内在说话。任何其他情况对于我们当前阶段的模型来说都是坏数据。因此，我们在视频上运行视频数据预处理，其中我们进行场景检测，然后是面部检测，然后是面部跟踪，裁剪嘴巴部分，并将视频的所有帧/图像转换为111×111的灰度图像，然后提供给CNN模型，相应的音频部分被转换为13×20矩阵，然后提供给音频CNN。面部数量大于1的剪辑被拒绝；由于我们在管道中应用了场景检测，0.2秒的剪辑中没有场景变化。所以我们最后得到的是一个有音频且视频中只有一个人的视频，这满足了数据管道的基本需求。
- en: Joint Embedding Space Learning
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 联合嵌入空间学习
- en: The network learns a joint embedding space, which means the audio embedding
    and video embedding will be plotted in a common embedding space. The joint embedding
    space will have those audio and video embeddings close to each other which are
    in sync, and those audio and video embeddings will be far apart in the embedding
    space which are not in sync, that’s it. The Euclidean distance between synced
    audio and video embeddings will be less and vice-versa.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 网络学习一个联合嵌入空间，这意味着音频嵌入和视频嵌入将被绘制在共同的嵌入空间中。同步的音频和视频嵌入将彼此靠近，而在嵌入空间中不同步的音频和视频嵌入将彼此远离，就是这样。同步的音频和视频嵌入之间的欧几里得距离将更小，反之亦然。
- en: Loss Function and Training Refinement
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 损失函数和训练细化
- en: The loss function used is contrastive loss. For a positive pair (sync audio-video
    0.2 second example), the square of Euclidean distance between audio and video
    embedding should be minimum; if that comes high, a penalty would be imposed, so
    for positive pairs, the square of Euclidean distance is minimised, and for negative
    pairs, max(margin – Euclidean distance, 0)² is minimised.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 使用的损失函数是对比损失。对于一个正对（同步音频-视频0.2秒示例），音频和视频嵌入之间的欧几里得距离的平方应该是最小的；如果这个值很高，将会施加惩罚，因此对于正对，欧几里得距离的平方被最小化，而对于负对，最小化max(margin
    – Euclidean distance, 0)²。
- en: We refine the training data by removing the false positives from our data. Our
    data still contains false positives (noisy data), and we remove the false positives
    by initially training the syncnet on noisy data and removing those positive pairs
    (which are marked as synced audio-video positive pairs) which fail to pass a certain
    threshold. The noisy data (false positives) are there maybe because of dubbed
    video, someone else speaking over the speaker from behind, off-sync maybe present,
    or these types of things get filtered out in this refining step.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过移除数据中的假阳性来细化训练数据。我们的数据仍然包含假阳性（噪声数据），我们通过最初在噪声数据上训练syncnet并移除那些未能通过一定阈值的正对（标记为同步音频-视频正对）来移除假阳性。噪声数据（假阳性）可能是因为配音视频、有人在扬声器后面说话、可能存在不同步，或者这些类型的事情在细化步骤中被过滤掉。
- en: Inference and Applications
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推理和应用
- en: Now the network gets trained, so let’s talk about inference and experimentation
    results derived from the trained model.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，网络已经完成训练，让我们来谈谈从训练模型中得出的推理和实验结果。
- en: There is test data in which positive and negative pairs for audio-video are
    present, so our model’s inference should give low value (min Euclidean distance)
    for positive pairs in the test data and high value (max Euclidean distance) for
    negative pairs in the test data. This is one kind of experiment or inference result
    of our model.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 测试数据中存在音频-视频的正负对，因此我们的模型推理应该对测试数据中的正对给出低值（最小欧几里得距离），对测试数据中的负对给出高值（最大欧几里得距离）。这是我们模型的一种实验或推理结果。
- en: Determining the offset is also one kind of experiment, or we might say one kind
    of application by our trained model inference. The output would be the offset,
    like for example audio leads by 200 ms or video leads by 170 ms – determining
    the sync offset value for which video or audio lags. That means adjusting the
    offset determined by the model should fix the sync issue and should make the clip
    in-sync from off-sync.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 确定偏移量也是一种实验，或者说，我们可以将其视为我们训练模型推理的一种应用。输出将是偏移量，例如，音频提前200毫秒或视频提前170毫秒——确定视频或音频延迟的同步偏移值。这意味着调整模型确定的偏移量应该可以解决同步问题，并使剪辑从不同步状态变为同步。
- en: If adjusting the audio-video by the offset value fixes the sync issue, that
    means success; otherwise failure of the model (provided the synced audio to be
    present for that one fixed video in the range we are calculating the Euclidean
    distance between fixed video (0.2 s) and various audio chunks (0.2 s each, sliding
    over some -x to +x seconds range, x = 1s)). This sync offset for the source clip
    could be either determined by calculating the sync offset value for 1 single 0.2
    second video from source clip, or it could be determined by doing an average over
    several 0.2 second samples from the source clip and then give the averaged offset
    sync value. The latter would be more stable than the former, also being proved
    by test data benchmarks that taking average is the more stable and better way
    to tell the sync offset value.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果通过调整音频-视频的偏移值来修复同步问题，则表示成功；否则，模型失败（假设在计算固定视频（0.2秒）和不同音频块（每个0.2秒，滑动在某个-x到+x秒范围内，x
    = 1秒）之间的欧几里得距离范围内存在同步音频）。这个源剪辑的同步偏移可以通过计算源剪辑中单个0.2秒视频的同步偏移值来确定，或者可以通过对源剪辑中的几个0.2秒样本进行平均来确定，然后给出平均偏移同步值。后者比前者更稳定，这也得到了测试数据基准的证明，即取平均是更稳定和更好的方法来表示同步偏移值。
- en: There’s a confidence score associated with this offset number which the model
    gives, which is termed as AV sync confidence score. For example, it would be said
    like the source clip has an offset, audio leads video by 300 ms with a confidence
    score of 11\. So knowing how this confidence score is calculated is important,
    and let’s understand it with an example.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 与这个偏移数值相关的置信度分数由模型给出，这被称为AV同步置信度分数。例如，可以说源剪辑有一个偏移，音频领先视频300毫秒，置信度分数为11。因此，了解这个置信度分数是如何计算的很重要，让我们用一个例子来了解它。
- en: 'Practical Example: Offset and Confidence Score Calculation'
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际示例：偏移量和置信度分数计算
- en: Let’s say we have a source clip of 10 seconds and we know this source clip has
    sync offset in which audio leads video by 300 ms. Now we’ll see how our syncnet
    is used to determine this offset.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个10秒的源剪辑，并且我们知道这个源剪辑有一个同步偏移，其中音频领先视频300毫秒。现在我们将看到我们的syncnet是如何用来确定这个偏移的。
- en: We take ten 0.2 s videos as v1, v2, v3…….. v10.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将取十个0.2秒的视频作为v1, v2, v3…….. v10。
- en: Let’s understand how sync score and confidence score will be calculated for
    v5, and similar will happen with all 10 video bins/samples/chunks.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们了解同步分数和置信度分数是如何为v5计算的，类似的情况也会发生在所有10个视频箱/样本/块上。
- en: 'Source Clip: 10 seconds total'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 源剪辑：总共10秒
- en: 'v1: 0.3-0.5s    [–]'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: v1：0.3-0.5秒    [–]
- en: 'v2: 1.2-1.4s        [–]'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 'v2: 1.2-1.4秒        [–]'
- en: 'v3: 2.0-2.2s            [–]'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 'v3: 2.0-2.2秒            [–]'
- en: 'v4: 3.1-3.3s                [–]'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: v4：3.1-3.3秒                [–]
- en: 'v5: 4.5-4.7s                    [–]'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: v5：4.5-4.7秒                    [–]
- en: 'v6: 5.3-5.5s                        [–]'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: v6：5.3-5.5秒                        [–]
- en: 'v7: 6.6-6.8s                            [–]'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: v7：6.6-6.8秒                            [–]
- en: 'v8: 7.4-7.6s                                [–]'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: v8：7.4-7.6秒                                [–]
- en: 'v9: 8.2-8.4s                                    [–]'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: v9：8.2-8.4秒                                    [–]
- en: 'v10: 9.0-9.2s                                       [–]'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: v10：9.0-9.2秒                                       [–]
- en: 'Let’s take v5 as one fixed video of 0.2s duration. Now using our trained syncnet
    model, we’ll calculate the Euclidean distance between several audio chunks (will
    use a sliding window approach) and this fixed video chunk. Here’s how:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以0.2秒持续时间的v5作为一个固定的视频。现在，使用我们训练好的syncnet模型，我们将计算几个音频块（将使用滑动窗口方法）与这个固定视频块之间的欧几里得距离。以下是方法：
- en: The audio sampling for v5 will happen from 3.5s to 5.7s (±1s of v5), which gives
    us a 2200ms (2.2 second) range to search.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: v5的音频采样将从3.5秒到5.7秒（±1秒的v5），这给我们提供了一个2200毫秒（2.2秒）的搜索范围。
- en: 'With overlapping windows:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 带重叠窗口：
- en: 'Window size: 200ms (0.2s)'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 窗口大小：200毫秒（0.2秒）
- en: 'Hop length: 100ms'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跳长：100毫秒
- en: 'Number of windows: 21'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 窗口数量：21
- en: Window 1:  3500-3700ms → Distance = 14.2
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 窗口 1：3500-3700毫秒 → 距离 = 14.2
- en: Window 2:  3600-3800ms → Distance = 13.8
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 窗口 2：3600-3800毫秒 → 距离 = 13.8
- en: Window 3:  3700-3900ms → Distance = 13.1
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 窗口 3：3700-3900毫秒 → 距离 = 13.1
- en: ………………..
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: ………………..
- en: Window 8:  4200-4400ms → Distance = 2.8  ← MINIMUM (audio 300ms early)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 窗口 8：4200-4400毫秒 → 距离 = 2.8  ← 最小值（音频提前300毫秒）
- en: Window 9:  4300-4500ms → Distance = 5.1
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 窗口 9：4300-4500毫秒 → 距离 = 5.1
- en: ………………..
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: ………………..
- en: 'Window 20: 5400-5600ms → Distance = 14.5'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 窗口 20：5400-5600毫秒 → 距离 = 14.5
- en: 'Window 21: 5500-5700ms → Distance = 14.9'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 窗口 21：5500-5700毫秒 → 距离 = 14.9
- en: Sync offset for v5 = -300ms (audio leads video by 300ms) Confidence_v5 = median(~12.5)
    – min(2.8) = 9.7
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: v5的同步偏移 = -300毫秒（音频领先视频300毫秒）Confidence_v5 = 中位数(~12.5) - 最小值(2.8) = 9.7
- en: So the confidence score for v5 for 300 ms offset is 9.7, and this is how confidence
    score given by syncnet is calculated, which is equal to median(over all windows
    or audio bins) – min(over all windows or audio bins) for the fixed v5.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，v5在300ms偏移量下的置信度分数为9.7，这就是syncnet给出的置信度分数的计算方式，等于固定v5的所有窗口或音频分箱的中位数减去最小值。
- en: Similarly, every other video bin has an offset value with an associated confidence
    score.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，每个视频分箱都有一个偏移值和相关的置信度分数。
- en: 'v1 (0.3-0.5s):   Offset = -290ms, Confidence = 8.5'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 'v1 (0.3-0.5s): 偏移 = -290ms，置信度 = 8.5'
- en: 'v2 (1.2-1.4s):   Offset = -315ms, Confidence = 9.2'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 'v2 (1.2-1.4s): 偏移 = -315ms，置信度 = 9.2'
- en: 'v3 (2.0-2.2s):   Offset = 0ms,    Confidence = 0.8  (silence period)'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 'v3 (2.0-2.2s): 偏移 = 0ms，  置信度 = 0.8  (静默期)'
- en: 'v4 (3.1-3.3s):   Offset = -305ms, Confidence = 7.9'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 'v4 (3.1-3.3s): 偏移 = -305ms，置信度 = 7.9'
- en: 'v5 (4.5-4.7s):   Offset = -300ms, Confidence = 9.7'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 'v5 (4.5-4.7s): 偏移 = -300ms，置信度 = 9.7'
- en: 'v6 (5.3-5.5s):   Offset = -320ms, Confidence = 8.8'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 'v6 (5.3-5.5s): 偏移 = -320ms，置信度 = 8.8'
- en: 'v7 (6.6-6.8s):   Offset = -335ms, Confidence = 10.1'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 'v7 (6.6-6.8s): 偏移 = -335ms，置信度 = 10.1'
- en: 'v8 (7.4-7.6s):   Offset = -310ms, Confidence = 9.4'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 'v8 (7.4-7.6s): 偏移 = -310ms，置信度 = 9.4'
- en: 'v9 (8.2-8.4s):   Offset = -325ms, Confidence = 8.6'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 'v9 (8.2-8.4s): 偏移 = -325ms，置信度 = 8.6'
- en: v10 (9.0-9.2s):  Offset = -295ms, Confidence = 9.0
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 'v10 (9.0-9.2s): 偏移 = -295ms，置信度 = 9.0'
- en: 'Averaging (ignoring low confidence v3): (-290 – 315 – 305 – 300 – 320 – 335
    – 310 – 325 – 295) / 9 = -305ms'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 平均值（忽略低置信度v3）：(-290 – 315 – 305 – 300 – 320 – 335 – 310 – 325 – 295) / 9 = -305ms
- en: 'Or if including all 10 with weighted averaging based on confidence: Final offset
    ≈ -300ms (audio leads video by 300ms) → This is how offset is calculated for the
    source clip.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，如果包括所有10个样本并基于置信度进行加权平均：最终偏移 ≈ -300ms（音频领先视频300ms）→ 这就是计算源剪辑偏移量的方式。
- en: '**Important note** – Either do weighted avg based on confidence score or remove
    the ones which have low confidence, because not doing so will give:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**重要提示** – 可以根据置信度分数进行加权平均，或者移除置信度低的项，因为如果不这样做，将会得到：'
- en: 'Simple Average (INCLUDING silence) – WRONG: (-290 – 315 + 0 – 305 – 300 – 320
    – 335 – 310 – 325 – 295) / 10 = -249.5ms This is way off from the true 300ms!'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 简单平均（包括静默） – 错误：(-290 – 315 + 0 – 305 – 300 – 320 – 335 – 310 – 325 – 295) /
    10 = -249.5ms 这与真实的300ms相差甚远！
- en: This shows why the paper achieves 99% accuracy with averaging but only 81% with
    single samples. Proper confidence-based filtering/weighting eliminates the misleading
    silence samples.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这说明了为什么论文在平均时达到了99%的准确率，但在单样本时只有81%。基于置信度的适当过滤/加权消除了误导性的静默样本。
- en: Speaker Identification in Multi-Person Scenes
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多人在场中的说话人识别
- en: One more important application of sync score is speaker identification in multi-person
    scenes. When multiple faces are visible but only one person’s audio is heard,
    syncnet computes the sync confidence for each face against the same audio stream.
    Instead of sliding audio temporally for one face, we evaluate all faces at the
    same time point – each face’s mouth movements are compared with the current audio
    to generate confidence scores. The speaking face naturally produces high confidence
    (strong audio-visual correlation) while silent faces yield low confidence (no
    correlation). By averaging these measurements over 10-100 frames, transient errors
    from blinks or motion blur get filtered out, similar to how silence periods were
    handled in sync detection.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 同步分数的一个重要应用是多人在场中的说话人识别。当多个面部可见但只听到一个人的音频时，syncnet会计算每个面部相对于同一音频流的同步置信度。我们不是对单个面部进行时间上的滑动音频，而是同时评估所有面部
    – 每个面部的嘴部运动与当前音频进行比较以生成置信度分数。说话的面部自然产生高置信度（强烈的视听相关性），而静默的面部产生低置信度（无相关性）。通过在10-100帧上对这些测量值进行平均，可以过滤掉瞬间的错误，例如眨眼或运动模糊，这与在同步检测中处理静默期的方式类似。
- en: Conclusion
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'Syncnet demonstrates that sometimes the best solutions come from rethinking
    the problem entirely. Instead of requiring tedious manual labeling of sync errors,
    it cleverly uses the assumption that most video content starts out correctly synced
    – turning regular videos into an unlimited training dataset. The beauty lies in
    its simplicity: train two CNNs to create embeddings where synced audio-video pairs
    naturally cluster together. With 99% accuracy when averaging over multiple samples
    and the ability to handle everything from broadcast TV to wild YouTube videos,
    this approach has proven remarkably robust. Whether you’re fixing sync issues
    in post-production or building the next video conferencing app, the principles
    behind Syncnet offer a practical blueprint for solving real-world audio-visual
    alignment problems at scale.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: Syncnet展示了有时最好的解决方案来自于完全重新思考问题。它巧妙地利用了这样一个假设：大多数视频内容一开始都是正确同步的——将普通视频转化为无限的训练数据集。其美妙之处在于其简单性：训练两个CNN来创建嵌入，使得同步的音视频对自然地聚集在一起。在平均多个样本时达到99%的准确率，并且能够处理从广播电视到野生YouTube视频的一切，这种方法已被证明非常稳健。无论是修复后期制作中的同步问题还是构建下一个视频会议应用，Syncnet背后的原理为解决大规模的实际音视频对齐问题提供了一个实用的蓝图。
