- en: How to Make a Data Science Portfolio That Stands Out
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何制作一个引人注目的数据科学作品集
- en: 原文：[https://towardsdatascience.com/how-to-make-a-data-science-portfolio-that-stands-out-94dd81be1448/](https://towardsdatascience.com/how-to-make-a-data-science-portfolio-that-stands-out-94dd81be1448/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-make-a-data-science-portfolio-that-stands-out-94dd81be1448/](https://towardsdatascience.com/how-to-make-a-data-science-portfolio-that-stands-out-94dd81be1448/)
- en: '![My website that we are are going to create.](../Images/442e17d2cf5765c470fafafa81919b22.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![我们即将创建的我的网站。](../Images/442e17d2cf5765c470fafafa81919b22.png)'
- en: My website that we are are going to create.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要创建的我的网站。
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Many people have asked how I made my [website](https://egorhowell.com/). In
    this article, I want to describe that exact process and walk through all the tools
    and tech I used.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人询问我是如何制作我的[网站](https://egorhowell.com/)的。在这篇文章中，我想描述这个确切的过程，并介绍我使用的所有工具和技术。
- en: '**Note**: This tutorial is mainly for Mac users as that’s what I use and can
    document.'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意**：这个教程主要面向Mac用户，因为我使用的是Mac，并且可以记录下来。'
- en: Pre-Requisites
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预先条件
- en: 'To deploy our website, we will use Git and GitHub quite a lot. The stuff you
    need is:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 为了部署我们的网站，我们将大量使用Git和GitHub。你需要的东西包括：
- en: '**GitHub account** -> Create one [here](https://github.com/).'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitHub账户** -> 你可以在这里创建一个[这里](https://github.com/)。'
- en: '**Install git for command line** -> Follow t[his guide](https://github.com/git-guides/install-git).'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在命令行中安装git** -> 按照这个指南[这里](https://github.com/git-guides/install-git)。'
- en: '**Generate SSH keys for cloning repos** -> Follow [this guide](https://docs.github.com/en/authentication/connecting-to-github-with-ssh/generating-a-new-ssh-key-and-adding-it-to-the-ssh-agent).'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成SSH密钥以克隆仓库** -> 按照这个指南[这里](https://docs.github.com/en/authentication/connecting-to-github-with-ssh/generating-a-new-ssh-key-and-adding-it-to-the-ssh-agent)。'
- en: '**Basic understanding of git commands** -> Check out a guidebook [here](https://docs.github.com/en/get-started/using-git/about-git).'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基本了解git命令** -> 可以在这里找到指南[这里](https://docs.github.com/en/get-started/using-git/about-git)。'
- en: '**Understanding of command line** -> [Here](https://contributor.insightmediagroup.io/an-introduction-to-the-shell-676ee5b899df?sk=0c6e101165b4314b98ab39d11525366c)
    is a good tutorial.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**了解命令行** -> [这里](https://contributor.insightmediagroup.io/an-introduction-to-the-shell-676ee5b899df?sk=0c6e101165b4314b98ab39d11525366c)有一个很好的教程。'
- en: However, don’t worry too much. I will walk through all the git commands in this
    post anyway, but it’s always better to have some intuition of what’s happening.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，不必过于担心。我仍然会在本文中详细介绍所有的git命令，但了解正在发生的事情的直觉总是更好的。
- en: You will also need **[Homebrew](https://brew.sh/)**. This is dubbed the ‘missing
    package manager for MacOS’ and is very useful for anyone coding on their Mac.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 你还需要**[Homebrew](https://brew.sh/)**。这被称为“MacOS的缺失包管理器”，对于在Mac上编码的人来说非常有用。
- en: 'You can install Homebrew using the command given on their website:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用他们网站上的命令来安装Homebrew：
- en: '[PRE0]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Verify Homebrew is installed by running `brew help` (you should get a list of
    brew commands and how to use them).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 通过运行`brew help`来验证Homebrew是否已安装（你应该会得到一个brew命令列表及其用法）。
- en: Finally, have some IDE, like **[PyCharm](https://www.jetbrains.com/pycharm/)**
    or **[VSCode](https://code.visualstudio.com/)**. Anything you like will do.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，拥有一些IDE，比如**[PyCharm](https://www.jetbrains.com/pycharm/)**或**[VSCode](https://code.visualstudio.com/)**。任何你喜欢的都可以。
- en: Hugo
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Hugo
- en: '[Hugo](https://gohugo.io/) is a tool for creating static websites written in
    GO. It is straightforward to use but requires some programming experience. I wouldn’t
    recommend it if you don’t have any coding experience whatsoever; in your scenario,
    no-code solutions are better.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[Hugo](https://gohugo.io/)是一个用于创建用GO编写的静态网站的工具。它使用简单，但需要一些编程经验。如果你没有任何编程经验，我不建议你使用它；在这种情况下，无代码解决方案更好。'
- en: Installation
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装
- en: 'The first step is to install GO and Hugo using Homebrew. Run the following
    command to do this:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是使用Homebrew安装GO和Hugo。运行以下命令来完成此操作：
- en: '[PRE1]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Verify both are installed by running:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 通过运行以下命令来验证两者都已安装：
- en: '[PRE2]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Creating Site
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建网站
- en: 'First, we will create a new website template by running the following:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将通过运行以下命令来创建一个新的网站模板：
- en: '[PRE3]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Then we will go into that new directory:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将进入那个新目录：
- en: '[PRE4]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: You can view whats in this folder by running `ls`.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过运行`ls`来查看这个文件夹中的内容。
- en: Now, we will initialise this folder as a GitHub repo in preparation for pushing
    it to GitHub.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将初始化这个文件夹，作为GitHub仓库的准备，以便将其推送到GitHub。
- en: '[PRE5]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Adding Theme
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加主题
- en: Hugo has many themes and templates that you can use instead of building your
    website from scratch. A link to all the templates [is here](https://themes.gohugo.io/).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: Hugo有许多主题和模板可供使用，你可以用它们来代替从头开始构建网站。所有模板的链接[在这里](https://themes.gohugo.io/)。
- en: '[Congo](https://themes.gohugo.io/themes/congo/) is the theme I use for my website,
    and we will be working with it today. However, this process will work for any
    theme in the list, so if you don’t like the one I use, I am sure you can find
    something.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '[刚果](https://themes.gohugo.io/themes/congo/) 是我用于网站的主题，今天我们将使用它。然而，这个过程适用于列表中的任何主题，所以如果你不喜欢我用的这个，我确信你可以找到其他选择。'
- en: Credit to [James Panther](https://jamespanther.com/) for creating this template,
    I recommend you check his stuff out!
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 感谢 [James Panther](https://jamespanther.com/) 创建这个模板，我建议你看看他的东西！
- en: There are different ways to add the theme to your repo; my personal preference
    is through [git submodules](https://www.andrewhoog.com/post/git-submodule-for-hugo-themes/).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 添加主题到你的仓库有不同的方法；我个人的偏好是通过 [git 子模块](https://www.andrewhoog.com/post/git-submodule-for-hugo-themes/)。
- en: '[See here](https://discourse.gohugo.io/t/the-different-ways-of-adding-a-theme/30664)
    for a complete list of adding themes. Many users prefer to use Hugo modules.'
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[查看这里](https://discourse.gohugo.io/t/the-different-ways-of-adding-a-theme/30664)以获取添加主题的完整列表。许多用户更喜欢使用
    Hugo 模块。'
- en: Git submodules allow you to put another git repo/project within your own git
    repo, and you can reference it. The main project can then use the submodule’s
    code, but it maintains its own commit and branch history.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Git 子模块允许你在自己的 git 仓库中放置另一个 git 仓库/项目，并且你可以引用它。主项目可以使用子模块的代码，但保持自己的提交和分支历史。
- en: It may sound complicated, but it’s not that difficult in practice. In essence,
    it’s just copying and pasting a directory into a project.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能听起来很复杂，但在实践中并不那么困难。本质上，这只是将一个目录复制粘贴到项目中。
- en: 'To start, we need to add the Congo theme as a submodule (make sure you are
    in the projects directory when you do this):'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，我们需要将刚果主题作为子模块添加（确保你在项目目录中进行此操作）：
- en: '[PRE6]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Your file structure should look something like:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你的文件结构应该看起来像这样：
- en: '[PRE7]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Now, we need to move some theme files into our main project. I used my IDE for
    the next few steps, but you can just do what feels comfortable to you.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要将一些主题文件移动到我们的主项目中。我在接下来的几个步骤中使用了我的 IDE，但你可以做任何让你感到舒适的事情。
- en: In the root folder, delete the `hugo.toml` file that was generated by cloning
    the submodule.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在根目录下，删除由克隆子模块生成的 `hugo.toml` 文件。
- en: Copy the `*.toml` config files from the congo theme into your `config/_default/`
    folder. This will ensure you have all the correct theme settings.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 将 congo 主题的 `*.toml` 配置文件复制到你的 `config/_default/` 文件夹中。这将确保你拥有所有正确的主题设置。
- en: 'The file structure in config should look like this:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 配置中的文件结构应该看起来像这样：
- en: '[PRE8]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Go to the `config/_default/config.toml` file and uncomment the `baseURL` line
    and add `theme = "congo"`. To verify the theme is active, run `hugo server` and
    click on the local host link. You page should look something like this.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 前往 `config/_default/config.toml` 文件，取消注释 `baseURL` 行并添加 `theme = "congo"`。要验证主题是否激活，运行
    `hugo server` 并点击本地主机链接。你的页面应该看起来像这样。
- en: '![](../Images/bf249c18891a265ebd1f1a2b6735d614.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bf249c18891a265ebd1f1a2b6735d614.png)'
- en: Congrats, the theme is now up and running!
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜，主题现在已启动并运行！
- en: '*The author of the Congo theme also provides his own guide on installing the
    theme if you want a second reference point.*'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*刚果主题的作者还提供了一份关于安装主题的指南，如果你需要一个额外的参考点的话。*'
- en: '[**Installation**](https://jpanther.github.io/congo/docs/installation/#set-up-theme-configuration-files)'
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**安装**](https://jpanther.github.io/congo/docs/installation/#set-up-theme-configuration-files)'
- en: Editing Theme
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编辑主题
- en: Let’s now customise the theme. I won’t go over every detail because it will
    take ages, and the author has a [complete guide](https://jpanther.github.io/congo/docs/getting-started/)
    on their website that you can use for more information.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来定制这个主题。我不会详细讲解每一个细节，因为这会花费很长时间，作者在他们网站上有一个[完整的指南](https://jpanther.github.io/congo/docs/getting-started/)，你可以用它来获取更多信息。
- en: 'In general, the structure of the repo looks as follows:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，仓库的结构如下：
- en: '[PRE9]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: To customise mine, I viewed some other websites that use this theme, found [one](https://antoinesoetewey.com/)s
    I liked, and simply copied their GitHub code. This one was a big inspiration,
    and you can find the GitHub code [here](https://github.com/AntoineSoetewey/antoinesoetewey.com/tree/master/content).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 为了定制我的，我查看了一些使用此主题的其他网站，找到了一个[我喜欢的](https://antoinesoetewey.com/)，并简单地复制了他们的
    GitHub 代码。这个给了我很大的启发，你可以在[这里](https://github.com/AntoineSoetewey/antoinesoetewey.com/tree/master/content)找到
    GitHub 代码。
- en: For this tutorial, I will show you how I made my homepage, which you can see
    at the start of the article.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个教程，我将向你展示我是如何制作我的主页的，你可以在文章的开头看到它。
- en: 'Create `content/_index.md` page, and add the following to it:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 `content/_index.md` 页面，并添加以下内容：
- en: '[PRE10]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'My `languages.en.toml` file looks as follows:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我的`languages.en.toml`文件如下所示：
- en: '[PRE11]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '`params.toml` is:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '`params.toml`文件如下：'
- en: '[PRE12]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'And that should be it; your site should be like this (if you copied the above):'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这样应该就可以了；你的网站应该看起来像这样（如果你复制了上面的内容）：
- en: '![](../Images/f5a18cf7db96b8eafaa1962c3efebc75.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f5a18cf7db96b8eafaa1962c3efebc75.png)'
- en: There is a lot to customise, so I recommend just playing around for a few hours
    to get the feel of the theme and get something you like. You can add more pages,
    change the layout, colour, etc.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多可以自定义的地方，所以我建议先玩上几个小时，以了解主题并找到你喜欢的东西。你可以添加更多页面，更改布局、颜色等。
- en: I recommend looking at what [other people have done](https://jpanther.github.io/congo/users/)
    with this theme and [my website](https://egorhowell.com/) for inspiration.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议查看其他人使用此主题和[我的网站](https://egorhowell.com/)的成果以获取灵感。
- en: '*Full customisation guide by Congo author.*'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '*Congo作者提供的完整自定义指南*'
- en: '[**Getting Started**](https://jpanther.github.io/congo/docs/getting-started/)'
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**入门指南**](https://jpanther.github.io/congo/docs/getting-started/)'
- en: Pushing To GitHub
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 推送到GitHub
- en: We need to push this code up to GitHub to access it from Cloudflare.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要将此代码推送到GitHub以从Cloudflare访问它。
- en: The first step is to create a git repo on GitHub. Follow this [link](https://github.com/new/)
    to do that.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是在GitHub上创建一个git仓库。请遵循此[链接](https://github.com/new/)进行操作。
- en: Then run the following commands.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 然后运行以下命令。
- en: '[PRE13]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: You should see your code on GitHub!
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该在GitHub上看到你的代码！
- en: Cloudflare
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Cloudflare
- en: Our website is on GitHub, and we need to deploy it!
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的网站在GitHub上，我们需要部署它！
- en: I use [Cloudflare](https://developers.cloudflare.com/) to host my website, as
    it’s free to use and has many features. It is an “all-in-one” platform, so it
    gives you domains, hosting, and analytics all in the same place. You can also
    manage all your websites in one place, which I really like if you want to expand
    your business.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用[Cloudflare](https://developers.cloudflare.com/)托管我的网站，因为它免费使用且功能丰富。它是一个“一站式”平台，因此它将域名、托管和数据分析都放在了同一个地方。你还可以在一个地方管理所有网站，如果你想要扩展业务，我真的喜欢这一点。
- en: It is straightforward to deploy on Cloudflare.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在Cloudflare上部署很简单。
- en: Make a Cloudflare account; see [here](https://www.cloudflare.com/en-gb/plans/).
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个Cloudflare账户；[请见此处](https://www.cloudflare.com/en-gb/plans/)。
- en: Go to your Cloudflare [dashboard](https://dash.cloudflare.com/817bef2b866fcf6ec09e5668414e35ea).
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往你的Cloudflare[仪表板](https://dash.cloudflare.com/817bef2b866fcf6ec09e5668414e35ea)。
- en: In Account Home, select **Compute (Workers)** > **Workers & Pages** > **Create**
    > **Pages** > **Connect to Git > Select Your Git Repo**
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“账户首页”中，选择**计算（Workers）** > **Workers & Pages** > **创建** > **Pages** > **连接到Git
    > 选择你的Git仓库**
- en: Add the below in the Build settings
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在构建设置中添加以下内容
- en: '![](../Images/9b5871e3b7c86593e6ee00ca580b44ce.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9b5871e3b7c86593e6ee00ca580b44ce.png)'
- en: Your website should now be live at the given domain, which will be some thing
    like [https://quicksite-env.pages.dev/](https://quicksite.pages.dev/).
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 你的网站现在应该在指定的域名上上线，看起来可能像这样[https://quicksite-env.pages.dev/](https://quicksite.pages.dev/)。
- en: And that’s it!
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 就这样！
- en: If you want more information, checkout Cloudflare’s guide.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如果需要更多信息，请查看Cloudflare的指南。
- en: '[**Hugo · Cloudflare Pages docs**](https://developers.cloudflare.com/pages/framework-guides/deploy-a-hugo-site/)'
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**Hugo · Cloudflare Pages 文档**](https://developers.cloudflare.com/pages/framework-guides/deploy-a-hugo-site/)'
- en: Other Thoughts
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他想法
- en: Here are some other things to try if you want
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要尝试其他事情
- en: Get a custom domain to connect your webpage to, and follow [this guide if you’re
    interested](https://developers.cloudflare.com/pages/configuration/custom-domains/).
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取一个自定义域名以连接你的网页，如果你感兴趣的话，请遵循[此指南](https://developers.cloudflare.com/pages/configuration/custom-domains/)。
- en: You don’t have to deploy on Cloudflare, t[here](https://gohugo.io/hosting-and-deployment/)
    are many solutions out there. Hugo has a great guide here.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不必在Cloudflare上部署，[这里](https://gohugo.io/hosting-and-deployment/)有许多解决方案。Hugo在这里有一个很棒的指南。
- en: Try out other Hugo themes; list [them here](https://themes.gohugo.io/).
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试其他Hugo主题；[在此处列出它们](https://themes.gohugo.io/)。
- en: What I showed here is just one way, but many different ways of generating websites
    and portfolios exist. The main thing is to just create one and not get too bogged
    down in the tools or tech.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里展示的只是其中一种方法，但生成网站和作品集的不同方式有很多。最重要的是创建一个，不要过于纠结于工具或技术。
- en: '*Done is better than perfect*'
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*完成胜于完美*'
