- en: How to Apply Powerful AI Audio Models to Real-World Applications
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-apply-powerful-ai-audio-models-to-real-world-applications/](https://towardsdatascience.com/how-to-apply-powerful-ai-audio-models-to-real-world-applications/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1761594046762" class="mdspan-comment">Audio machine-learning</mdspan>
    models are powerful models that either handle audio input or can produce audio
    outputs. These models are important in AI because audio in the form of speech,
    or other sounds, is widely available, and helps us understand the world we live
    in. To really understand the importance of audio in the world, you can imagine
    the world without sound and how different it is from a world with sound.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll provide a high-level overview of different audio machine
    learning models, the different tasks you can perform with them, and their application
    areas. Audio models have seen significant improvements in the last few years,
    especially after the LLM breakthrough with ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: '![AI audio models infographic](../Images/0cc8b86416791952077731f145bd67a7.png)'
  prefs: []
  type: TYPE_IMG
- en: This infographic highlights the main contents of this article. I’ll discuss
    why we need AI audio models, and different application areas such as speech-to-text,
    text-to-speech, and speech-to-speech. Image by ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Why we need audio models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We already have extremely powerful LLMs that can deal with a lot of human interactions,
    so it’s important to highlight why there’s a need for audio models. I’ll highlight
    three main points:'
  prefs: []
  type: TYPE_NORMAL
- en: Audio is an important dataset, just like vision and text
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Analyzing audio directly is more expressive than analysis through transcribed
    text
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Audio allows for more human-like interactions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For my first point, I think it’s important to preface that while we have both
    enormous datasets through text on the internet and vision through videos, we also
    have large amounts of data where audio is available. Most videos, for example,
    will contain audio that adds meaning and context to the video. Thus, if we want
    to create the most powerful AI models, we have to create models that can understand
    all modalities. Modality in this case refers to a type of data, such as
  prefs: []
  type: TYPE_NORMAL
- en: Text
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Vision
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Audio
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: My second point also highlights an important need for audio models. If we want
    to convert audio to text (so we can apply LLMs, for example), we first need to
    use a transcription model, which, of course, is an audio model itself. Furthermore,
    it will often be better to analyze audio directly, rather than analyzing a bit
    of audio through transcribed text. The reason for this is that the audio will
    capture more nuances. For example, if we have audio of someone speaking, the audio
    will capture the emotion of the speaker, information that can’t really be expressed
    through text.
  prefs: []
  type: TYPE_NORMAL
- en: Audio models also allow for more human-like experiences, for example, with the
    fact that you can have conversations with the AI models, instead of typing back
    and forth.
  prefs: []
  type: TYPE_NORMAL
- en: Audio model types
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, I’ll go through the main audio model types that you’ll encounter
    when working with audio models.
  prefs: []
  type: TYPE_NORMAL
- en: Speech-to-text
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Speech-to-text is one of the most common use cases for audio models, and is
    also called *transcription.* Speech-to-text is the task where you input speech
    and output the text provided in the speech. This is incredibly important to summarize
    meeting notes, or when you’re talking to a virtual assistant like Siri on your
    phone. Speech-to-text is also used to create larger training datasets for LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can use speech-to-text models to take in audio clips for analysis. For
    example, suppose you have a customer service interaction. In that case, you can
    transcribe this interaction and perform text analysis on it, such as analyzing
    the length of the interaction, quickly analyzing the performance of the customer
    service representative, or seeing if the customer was happy with the interaction,
    without having to hear through the entire interaction. Analyzing text is usually
    way faster than analyzing the audio, since you can read text faster than you can
    listen to the audio of it. You can see an example of such a transcribed interaction
    below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: However, it is important to note that when you’re converting speech to text,
    you are losing some information, as I described in the intro to this article.
    You’ll lose the emotion of the people speaking in the audio, and it will thus
    be hard to determine the customer’s emotions from the customer service interaction,
    unless the emotion is clearly communicated through text. In either case, you’ll
    lose nuance from the audio, simply because reading through the text of a conversation
    can never be as expressive as listening to the conversation itself.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, if you want to perform a deeper analysis of the audio, you can perform
    direct audio analysis of the interaction, instead of first transcribing the interaction
    to text. For example, if you want to determine the emotion of the customer in
    the interaction, you can feed in the audio directly, together with a prompt such
    as below. You can then perform direct audio analysis, capturing further nuance.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Text-to-speech
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Text-to-speech is another important use case for audio models. This is the reverse
    of the previously described task, where you instead input text and generate audio
    for this text. In the same way you lose information transcribing text, you now
    need to add information to create the audio.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, you’ll often have to provide the emotion the generated speech should
    be in when performing text-to-speech (unless the provider automatically determines
    emotion when generating the audio).
  prefs: []
  type: TYPE_NORMAL
- en: 'Text-to-speech can be useful in many scenarios:'
  prefs: []
  type: TYPE_NORMAL
- en: Creating advertisements, where you want to do a voice-over, given a transcript.
    This can easily be done using services like Elevenlabs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For customer service interactions, by having a voice, customers can talk to.
    You can, for example, have the customer call in, transcribe their text (speech-to-text),
    use an LLM to generate a response (text-to-text), and generate audio from the
    LLM response (text-to-speech)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The approach in the last bullet point works from a quality perspective. However,
    if you do this, you’ll probably encounter latency issues, since it takes time
    to both transcribe text and respond with an LLM before you stream in the audio
    response. You’ll thus probably want to utilize speech-to-speech models instead,
    which I’ll talk about in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Speech-to-speech
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Speech-to-speech models are powerful models capable of both inputting and outputting
    speech. This is super useful in live scenarios, where you need to create rapid
    responses.
  prefs: []
  type: TYPE_NORMAL
- en: You can, for example, create direct customer service representatives with speech-to-speech
    models, directly responding to user queries with low delay. In such interactions,
    the delay is super important, considering you want to create a human-like interaction
    for the customer. The interaction should, in theory, feel the same, if not better,
    than dealing with a human customer service representative.
  prefs: []
  type: TYPE_NORMAL
- en: Optimally, you’ll use a direct speech-to-speech model, such as Qwen-3-Omni.
    An alternative would be to first perform speech-to-text, text-to-text (with an
    LLM), and then text-to-speech. However, it’s important to preface that it’s almost
    always better to use an end-to-end model (such as speech-to-speech in this case),
    instead chaining different models together. This is because end-to-end models
    will retain information better, thus providing better outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Another speech-to-speech model I’d like to mention is voice cloning. This is
    the application where you provide an audio sample of one particular voice. You
    can then generate new audio with the cloned voice by providing text for a voice-over.
    Voice-to-voice models have also seen vast improvements in the last few years,
    and can be useful to quickly generate a lot of voice-overs.
  prefs: []
  type: TYPE_NORMAL
- en: For example, imagine you want to create an audiobook from a textbook, with a
    specific voice that has done previous audiobooks. Normally, you would have to
    book a recording room and have the voice narrate the whole new book, which would
    take weeks. Instead, if you have a lot of samples from this voice already, you
    can now generate a full voice-over in a matter of minutes using voice cloning
    models. Naturally, you always need to obtain permissions before using a voice-cloning
    model.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I’ve discussed different voice models, with speech-to-text
    and text-to-speech. and speech-to-speech models, which are all useful in their
    own application areas. I think voice models will see continued development and
    improvements, given their importance. Audio models are important because audio
    is an important modality to understanding the world, just like text and vision
    are. I believe audio is similar to images, where it is hard to describe only using
    words.
  prefs: []
  type: TYPE_NORMAL
