- en: Agents, APIs, and the Next Layer of the Internet
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 智能体、API 和互联网的下一层
- en: 原文：[https://towardsdatascience.com/agents-apis-and-the-next-layer-of-the-internet/](https://towardsdatascience.com/agents-apis-and-the-next-layer-of-the-internet/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/agents-apis-and-the-next-layer-of-the-internet/](https://towardsdatascience.com/agents-apis-and-the-next-layer-of-the-internet/)
- en: 'Part I: <mdspan datatext="el1749877782833" class="mdspan-comment">Shipping
    Containers</mdspan> for Thought'
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一部分：<mdspan datatext="el1749877782833" class="mdspan-comment">思想集装箱</mdspan>
- en: 'Every so often a simple idea rewires everything. The shipping container didn’t
    just optimise logistics; it flattened the globe, collapsed time zones, and rewrote
    the economics of trade. In its geometric austerity was a quiet revolution: standardisation.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 有时一个简单的想法会彻底改变一切。集装箱运输不仅优化了物流；它使地球变得扁平，消除了时区，并重写了贸易的经济。在其几何简约中，是一场静悄悄的革命：标准化。
- en: Similarly, HTML and HTTP didn’t invent information exchange — any more than
    the shipping crate invented trade — but by imposing order on chaos, they transformed
    it.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，HTML 和 HTTP 并非创造了信息交换——就像装货箱并非创造了贸易——但通过在混乱中强加秩序，它们改变了它。
- en: RESTful APIs, for their part, standardised software-web interaction, and made
    services programmable. The web became not just browsable, but buildable — a foundation
    for automation, orchestration, and integration, and entire industries sprang up
    around that idea.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 RESTful API 来说，它们标准化了软件-网络交互，并使服务可编程。网络不仅可浏览，而且可构建——这是自动化、编排和集成的基石，围绕这一理念涌现出整个行业。
- en: Now, the ‘agentic web’—where AI agents call APIs and other AI agents—needs its
    own standards.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，“智能体网络”——其中 AI 智能体调用 API 和其他 AI 智能体——需要自己的标准。
- en: This isn’t just an extension of the last era — it’s a shift in how computation
    works.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是对上一时代的扩展——它是对计算工作方式的转变。
- en: 'Two promising approaches have emerged for agent-web interaction: Model Context
    Protocol (MCP) and Invoke Network.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 对于智能体-网络交互，已经出现了两种有前景的方法：模型上下文协议 (MCP) 和调用网络。
- en: '**[Model Context Protocol](https://modelcontextprotocol.io/introduction) (MCP):**
    a communication standard designed for chaining reasoning across multiple agents,
    tools, and models.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[模型上下文协议](https://modelcontextprotocol.io/introduction) (MCP):** 一个为跨多个智能体、工具和模型链式推理而设计的通信标准。'
- en: '**[Invoke Network](https://invoke.network/):** a lightweight, open-source framework
    that lets models interact directly with real-world APIs at inference time — without
    needing orchestration, backends, or agent registries.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[调用网络](https://invoke.network/):** 一个轻量级、开源的框架，允许模型在推理时直接与真实世界的 API 交互——无需编排、后端或智能体注册表。'
- en: 'This essay compares these two paradigms — MCP and Invoke Network (*disclosure:
    I’m a contributor to Invoke Network*) — and argues that agentic interoperability
    will require not just schemas and standards, but simplicity, statelessness, and
    runtime discovery.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '这篇文章比较了这两种范例——MCP 和调用网络（*披露：我是调用网络的贡献者*）——并认为智能体互操作性不仅需要架构和标准，还需要简单性、无状态和运行时发现。 '
- en: '* * *'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Part II: Model Context Protocol: Agents That Speak the Same Language'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二部分：模型上下文协议：使用同一种语言的智能体
- en: 'Origins: From Local Tools to Shared Language'
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 起源：从本地工具到共享语言
- en: '[**Model Context Protocol**](https://modelcontextprotocol.io/introduction)
    (MCP) emerged from a simple, powerful idea: that large language models (LLMs)
    should be able to talk to each other — and that their interactions should be modular,
    composable, and inspectable.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '[**模型上下文协议**](https://modelcontextprotocol.io/introduction) (MCP) 诞生于一个简单而强大的想法：大型语言模型
    (LLMs) 应该能够相互交流——并且它们的交互应该是模块化、可组合和可检查的。'
- en: 'It began as part of the AI Engineer community on GitHub and Twitter — a loose
    but vibrant collective of developers exploring what happens when models gain agency.
    Early projects like OpenAgents and LangChain had already introduced the idea of
    tools: giving LLMs controlled access to functions. But MCP pushed the idea further.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 它始于 GitHub 和 Twitter 上的 AI 工程师社区——一个松散但充满活力的开发者集体，探索当模型获得智能时会发生什么。早期项目如 OpenAgents
    和 LangChain 已经引入了工具的概念：给予 LLMs 对函数的受控访问。但 MCP 将这一想法进一步推进。
- en: 'Rather than hardcoding tools into individual agents, MCP proposed a standard
    — a shared grammar — that would allow any agent to dynamically expose capabilities
    and receive structured, interpretable requests. The goal: make agents composable
    and interoperable. Not just one agent using a tool, but agents calling agents,
    tools calling tools, and reasoning passed like a baton between models.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: MCP提出了一种标准——一个共享的语法——允许任何代理动态地暴露其功能并接收结构化、可解释的请求。目标：使代理可组合和互操作。不仅仅是使用工具的一个代理，而是代理调用代理，工具调用工具，推理像接力棒一样在模型之间传递。
- en: Introduced by Anthropic in November 2024, MCP is not a product. It’s a protocol.
    A social contract for how agents communicate — much like HTTP was for web pages.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 由Anthropic于2024年11月引入，MCP不是一个产品。它是一个协议。一个关于代理如何通信的社会契约——就像HTTP对于网页一样。
- en: '* * *'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: How MCP Works
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MCP是如何工作的
- en: At its core, MCP is a JSON-based interface description and call/response format.
    Each agent (or tool, or model) advertises its capabilities by returning a set
    of structured functions — similar to an OpenAPI schema, but tailored for LLM interpretation.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，MCP是一个基于JSON的接口描述和调用/响应格式。每个代理（或工具、或模型）通过返回一组结构化函数来宣传其功能——类似于OpenAPI模式，但针对LLM解释进行了定制。
- en: 'A typical MCP exchange has three parts:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 一个典型的MCP交换有三个部分：
- en: '**Listing Capabilities**An agent exposes a set of callable functions — their
    names, parameters, return types, and descriptions. These can be real tools (like
    get_weather) or delegations to other agents (like research_topic).'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**列出功能**代理暴露一组可调用的函数——它们的名称、参数、返回类型和描述。这些可以是真实工具（如get_weather）或委托给其他代理（如research_topic）。'
- en: '**Issuing a Call**Another model (or the user) sends a request to that agent
    using the defined format. MCP keeps the payloads structured and minimal, avoiding
    ambiguous natural language where it matters.'
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**发起调用**另一个模型（或用户）使用定义的格式向该代理发送请求。MCP保持有效载荷结构化和最小化，避免在重要之处使用模糊的自然语言。'
- en: '**Handling the Response**The receiving agent executes the function (or prompts
    another model), and returns a structured response, often annotated with rationale
    or follow-up context.'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**处理响应**接收代理执行函数（或提示另一个模型），并返回一个结构化响应，通常带有理由或后续上下文。'
- en: This sounds abstract, but it’s surprisingly elegant in practice. Let’s look
    at a real example — and use it to draw out the strengths and limits of MCP.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这听起来很抽象，但在实践中却出奇地优雅。让我们看看一个真实例子——并利用它来揭示MCP的优势和局限性。
- en: 'A Worked MCP Example: Agents That Call Each Other'
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一个工作示例：相互调用的代理
- en: 'Let’s imagine two agents:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象两个代理：
- en: 'WeatherAgent: Provides weather data.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: WeatherAgent：提供天气数据。
- en: 'TripPlannerAgent: Plans a day trip, and uses the WeatherAgent via MCP to check
    the weather.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TripPlannerAgent：计划一次一日游，并通过MCP使用WeatherAgent来检查天气。
- en: In this scenario, TripPlannerAgent has no hardcoded knowledge of how to fetch
    weather. It simply asks another agent that speaks MCP.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个场景中，TripPlannerAgent没有硬编码的如何获取天气的知识。它只是询问另一个说MCP的代理。
- en: '* * *'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 1: WeatherAgent describes its capabilities'
  id: totrans-33
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第1步：WeatherAgent描述其功能
- en: '[PRE0]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This JSON schema is MCP-compliant. Any other agent can introspect this and know
    exactly how to invoke the weather function.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这个JSON模式符合MCP规范。任何其他代理都可以内省这个模式，并确切地知道如何调用天气函数。
- en: '* * *'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 2: TripPlannerAgent makes a structured call'
  id: totrans-37
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第2步：TripPlannerAgent进行结构化调用
- en: '[PRE1]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The agent doesn’t need to know how the weather is fetched — it just needs to
    follow the protocol.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 代理不需要知道如何获取天气——它只需要遵循协议。
- en: '* * *'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 3: WeatherAgent responds with structured data'
  id: totrans-41
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第3步：WeatherAgent以结构化数据响应
- en: '[PRE2]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: TripPlannerAgent can now use that result in its own logic — maybe suggesting
    a picnic or a museum day based on the weather.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: TripPlannerAgent现在可以使用这个结果在自己的逻辑中——也许根据天气建议野餐或博物馆之旅。
- en: '* * *'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What This Enables
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这是什么使它成为可能
- en: 'This tiny example demonstrates several powerful capabilities:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这个小小的例子展示了几个强大的功能：
- en: ✅ **Agent Composition** — agents can call other agents as tools
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **代理组合** — 代理可以将其他代理作为工具调用
- en: ✅ **Inspectability** — capabilities are defined in schemas, not prose
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **可检查性** — 功能在模式中定义，而不是在散文中
- en: ✅ **Reusability** — agents can serve many clients
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **可重用性** — 代理可以为多个客户端提供服务
- en: ✅ **LLM-native design** — responses are still interpretable by models
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **LLM原生设计** — 响应仍然可以被模型解释
- en: But MCP has its limits — which we’ll explore next.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 但MCP有其局限性——我们将在下一部分探讨。
- en: '**When to Use MCP (And When Not To)**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**何时使用MCP（以及何时不使用）**'
- en: 'Model Context Protocol (MCP) is elegant in its simplicity: a protocol for describing
    tools and delegating tasks between agents. But, like all protocols, it shines
    in some contexts and struggles in others.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 模型上下文协议（MCP）以其简洁性而优雅：一个用于描述工具并在代理之间委派任务的协议。但是，像所有协议一样，它在某些环境中表现出色，在其他环境中则遇到挑战。
- en: ✅ Where MCP Excels
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ✅ MCP的亮点
- en: '**1\. LLM-to-LLM Communication**MCP was designed from the ground up to support
    inter-agent calls. If you’re building a network of AI agents that can call, query,
    or consult one another, MCP is ideal. Each agent becomes a service endpoint, with
    a schema that other agents can reason about.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. LLM到LLM通信**MCP从一开始就是为了支持代理间的调用而设计的。如果你正在构建一个可以相互调用、查询或咨询的AI代理网络，MCP是理想的。每个代理都成为一个服务端点，拥有其他代理可以推理的模式。'
- en: '**2\. Decentralised, Model-Agnostic Systems**Because MCP is just a schema convention,
    it doesn’t depend on any particular runtime, framework, or model. You can use
    OpenAI, Claude, or your local LLM — if it can interpret JSON, it can speak MCP.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 去中心化、模型无关的系统**因为MCP只是一个模式约定，它不依赖于任何特定的运行时、框架或模型。你可以使用OpenAI、Claude或你本地的LLM——如果它可以解析JSON，它就可以使用MCP。'
- en: '**3\. Multi-Hop Planning**MCP is especially powerful when combined with a *planner*
    agent. Imagine a central planner that orchestrates workflows by dynamically selecting
    agents based on their schemas. This enables highly modular, dynamic systems.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 多跳规划**当与一个*规划器*代理结合使用时，MCP特别强大。想象一个中央规划器，通过根据代理的模式动态选择代理来编排工作流程。这可以实现高度模块化和动态的系统。'
- en: '* * *'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ❌ Where MCP Struggles
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ❌ MCP的挑战
- en: '**1\. No Real “Runtime”**MCP is a protocol — not a framework. It defines the
    *interface*, but not the execution engine. That means you need to implement your
    own glue logic for:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 没有真正的“运行时”**MCP是一个协议——不是一个框架。它定义了*接口*，但不是执行引擎。这意味着你需要实现自己的粘合逻辑：'
- en: Auth
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 认证
- en: Input/output mapping
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入/输出映射
- en: Routing
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 路由
- en: Error handling
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误处理
- en: Retries
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重试
- en: Rate limits
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 速率限制
- en: MCP doesn’t manage that for you — it’s just the language agents use to communicate.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: MCP不会为你管理这些——它只是代理使用的通信语言。
- en: '**2\. Requires Structured Thinking**LLMs love ambiguity. MCP doesn’t. It forces
    developers (and models) to be explicit: here’s a tool, here’s its schema, here’s
    how to call it. That’s great for clarity — but requires more upfront thinking
    than, say, slapping .tools = […] on an OpenAI agent.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 需要结构化思维**LLMs喜欢模糊性。MCP则不然。它迫使开发者（和模型）明确：这是一个工具，这是它的模式，这是如何调用它的。这对于清晰度来说很好——但需要比在OpenAI代理上简单地添加
    `.tools = [...]` 更多的前期思考。'
- en: '**3\. Tool Discovery and Versioning**'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 工具发现和版本控制**'
- en: MCP is still early — there’s no central registry of agents, no real system for
    versioning or namespacing. In practice, developers often pass around schemas manually
    or hardcode references.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: MCP仍然处于早期阶段——没有代理的中央注册表，没有版本控制或命名空间的真实系统。在实践中，开发者经常手动传递模式或硬编码引用。
- en: '* * *'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '| **Use Case** | **Should You Use MCP?** |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
  zh: '| **用例** | **你应该使用MCP吗？** |'
- en: '| Agent calling another agent | ✅ Perfect fit |'
  id: totrans-73
  prefs: []
  type: TYPE_TB
  zh: '| 代理呼叫另一个代理 | ✅ 完美匹配 |'
- en: '| Building a large, modular agent network | ✅ Ideal |'
  id: totrans-74
  prefs: []
  type: TYPE_TB
  zh: '| 构建一个大型、模块化的代理网络 | ✅ 理想 |'
- en: '| Call a REST API or webhook | ❌ Overkill |'
  id: totrans-75
  prefs: []
  type: TYPE_TB
  zh: '| 调用一个REST API或webhook | ❌ 过度 |'
- en: '| Need built-in routing, OAuth, retries | ❌ Use a framework |'
  id: totrans-76
  prefs: []
  type: TYPE_TB
  zh: '| 需要内置路由、OAuth、重试 | ❌ 使用框架 |'
- en: '| Tool discovery at inference time | ❌ Use Invoke Network |'
  id: totrans-77
  prefs: []
  type: TYPE_TB
  zh: '| 推理时的工具发现 | ❌ 使用Invoke网络 |'
- en: And this is where **Invoke Network** enters — not as a competitor, but as a
    counterpart. If MCP is like **WebSockets** for agents (peer-to-peer, structured,
    low-level), then Invoke is like **HTTP** — a fire-and-forget API surface for LLMs.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 正是在这里，**调用网络**介入——不是作为竞争对手，而是作为补充。如果MCP是代理的**WebSockets**（点对点、结构化、低级别），那么Invoke就像是**HTTP**——为LLMs提供一个一次性API表面。
- en: '* * *'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Part III: Invoke Network'
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第三部分：调用网络
- en: HTTP for LLMs
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LLM的HTTP
- en: 'While MCP emerged to coordinate agents, **[Invoke](https://invoke.network)**
    was born from a simpler, sharper pain: the chasm between LLMs and the real world.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然MCP是为了协调代理而出现的，但**[Invoke](https://invoke.network)**则源于一个更简单、更尖锐的痛点：LLM与真实世界之间的鸿沟。
- en: 'Language models can reason, write, and plan — but without tools, they’re sealed
    in a sandbox. Invoke began with a question:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型可以进行推理、写作和规划——但没有工具，它们就被困在沙盒中。Invoke始于一个问题：
- en: '*What if any LLM could discover and use any real-world API, just like a human
    browses the web?*'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果任何大型语言模型（LLM）都能像人类浏览网页一样发现和使用任何真实世界的API会怎样？*'
- en: Existing approaches — MCP, OpenAI functions, AgentOps — while powerful, were
    either bloated, too rigid, or fragile for the vision. Tool use felt like duct-taping
    SDKs to natural language. Models had to be pre-wired to scattered tools, each
    with their own quirks.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现有的方法——MCP、OpenAI 函数、AgentOps——虽然功能强大，但要么臃肿，要么过于僵化，或者对愿景来说过于脆弱。工具的使用感觉就像是用胶带将
    SDK 粘贴到自然语言上。模型必须预先连接到散布的工具，每个工具都有其自身的怪癖。
- en: 'Invoke approached it differently:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: Invoke 以不同的方式处理：
- en: One tool, many APIs
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个工具，多个 API
- en: One standard, infinite interfaces
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个标准、无限的接口
- en: Just define your endpoint — method, URL, parameters, auth, example — in clean,
    readable JSON. That’s it. Now **any model** (GPT, Claude, Mistral) can call it
    naturally, securely, and repeatedly.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 只需在清晰、易读的 JSON 中定义你的端点——方法、URL、参数、身份验证、示例。就是这样。现在 **任何模型**（GPT、Claude、Mistral）都可以自然、安全、重复地调用它。
- en: ⚙️ How Invoke Works
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ⚙️ Invoke 的工作原理
- en: At its core, **Invoke is a tool router built for LLMs**. It’s like openapi.json,
    but leaner — built for inference, not engineering.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，**Invoke** 是一个为 LLMs 构建的工具路由器。它就像 openapi.json，但更精简——专为推理而建，而非工程。
- en: 'Here’s how it works:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是它的工作方式：
- en: 'You write a structured tool definition (agents.json) with:'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你可以使用以下方式编写结构化的工具定义（agents.json）：
- en: method, url, auth, parameters, and an example.
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 方法、URL、身份验证、参数以及一个示例。
- en: Invoke parses that into a callable function for any model that supports tool
    use.
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Invoke 将其解析为任何支持工具使用的模型的可调用函数。
- en: The model sees the tool, decides when to use it, and fills out the parameters.
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模型看到工具，决定何时使用它，并填写参数。
- en: Invoke handles the rest — auth, formatting, execution — and returns the result.
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Invoke 处理其余部分——身份验证、格式化、执行——并返回结果。
- en: 'No custom wrappers. No chains. No scaffolding. Just one clean interface. And
    if something goes wrong?We don’t preprogram retries. We let the model decide.
    Turns out: it’s pretty good at it.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 没有自定义包装器。没有链。没有脚手架。只有一个干净的接口。如果出了问题？我们不会预先编程重试。我们让模型来决定。结果证明：它在这一点上做得相当不错。
- en: 'Here’s a real example:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个真实示例：
- en: '[PRE3]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: From the model’s point of view, this is one use of the ‘Invoke’ tool, not a
    new one for each added endpoint. Not a custom plugin. Just one discoverable interface.
    This means the model can discover APIs on the fly, just like humans browse the
    web. To use the shipping container analogy, if MCP allows highly coordinated workflows
    with tightly orchestrated infrastructure between select ports, Invoke enables
    you to send any package, anywhere, any time.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 从模型的角度来看，这是对“Invoke”工具的一次使用，而不是为每个添加的端点添加一个新的。不是自定义插件。只有一个可发现的接口。这意味着模型可以动态地发现
    API，就像人类浏览网页一样。用运输集装箱的比喻来说，如果 MCP 允许在选定港口之间进行高度协调的工作流程和紧密协调的基础设施，那么 Invoke 使你能够随时随地发送任何包裹。
- en: 'Now we can use:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以使用：
- en: '[PRE4]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: In under a minute, your model is fetching live data—no wrappers, no boilerplate.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在一分钟内，你的模型正在获取实时数据——没有包装器，没有样板代码。
- en: 'You’ll say: “Check weather in London.”'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你会说：“查看伦敦的天气。”
- en: The agent will go to openweathermap.org/agents.json, read the file, and just…
    do it.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 代理将前往 openweathermap.org/agents.json，读取文件，然后……就这样做了。
- en: Just as `robots.txt` let crawlers safely navigate the web, agents.json lets
    LLMs safely act on it. Invoke turns the web into an LLM-readable ecosystem of
    APIs. Much like HTML allowed humans to discover websites and services on the fly,
    Invoke allows LLMs to discover APIs at inference time.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 正如 `robots.txt` 允许爬虫安全地导航网络一样，agents.json 允许 LLM 安全地对其采取行动。Invoke 将网络转变为 LLM
    可读的 API 生态系统。就像 HTML 允许人类动态发现网站和服务一样，Invoke 允许 LLM 在推理时发现 API。
- en: Want to see this in action? Check out the Invoke repo’s [example notebooks](https://github.com/mercury0100/invoke/tree/master/notebooks),
    see [how to define](https://invoke.network/create-agents-txt) an `agents.json`,
    wire up auth, and call APIs from any LLM in under a minute. (Full “network”-style
    discovery is on the roadmap once adoption reaches critical mass.)
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 想要看看它的实际应用？查看 Invoke 仓库的 [示例笔记本](https://github.com/mercury0100/invoke/tree/master/notebooks)，了解如何
    [定义](https://invoke.network/create-agents-txt) `agents.json`，配置身份验证，并在一分钟内从任何
    LLM 调用 API。（一旦采用达到临界质量，完整的“网络”式发现将纳入路线图。）
- en: '* * *'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'When to Use Invoke: Strengths and Tradeoffs'
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 何时使用 Invoke：优势和权衡
- en: Invoke shines brightest in the real world.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: Invoke 在现实世界中最为闪耀。
- en: 'Its core premise — that a model can call any API, securely and accurately,
    from a single schema — unlocks a staggering range of use cases: calendar assistants,
    email triage, weather bots, automation interfaces, customer support agents, enterprise
    copilots, even full-stack LLM-powered workflows. And it works out of the box with
    OpenAI, Claude, LangChain, and more.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 其核心前提——模型可以从单个模式中安全且准确地调用任何API——解锁了惊人的使用场景：日历助手、电子邮件分类、天气机器人、自动化界面、客户支持代理、企业副驾驶，甚至是全栈LLM驱动的工作流程。并且它可以直接与OpenAI、Claude、LangChain等一起使用。
- en: '**Strengths:**'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '**优势：**'
- en: '**Simplicity.** Define a tool once, use it everywhere. You don’t need a dozen
    Python wrappers or agent configs.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简单性**。定义一次工具，到处使用。你不需要一打Python包装器或代理配置。'
- en: '**Model-agnostic.** Invoke works with any model that supports structured tool
    use — including open-source LLMs.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型无关性**。Invoke与任何支持结构化工具使用的模型兼容——包括开源LLM。'
- en: '**Open & extensible.** Serve tools from local config, hosted registries, or
    future public endpoints (example.com/agents.json).'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开放和可扩展**。从本地配置、托管注册表或未来的公共端点（example.com/agents.json）提供工具。'
- en: '**Composable.** Models can reason over tool metadata, inspect auth requirements,
    and even decide when to explore new capabilities.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可组合的**。模型可以推理工具元数据，检查认证要求，甚至决定何时探索新功能。'
- en: '**Developer-focused.** Unlike agentic frameworks that require complex orchestration,
    Invoke slots neatly into existing stacks — frontends, backends, workflows, RAG
    pipelines, and more.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**面向开发者**。与需要复杂编排的代理框架不同，Invoke可以完美地融入现有的堆栈——前端、后端、工作流程、RAG管道等。'
- en: '**Context-efficient**. API configurations are defined in the execution chain
    and do not use precious context.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文高效**。API配置在执行链中定义，不使用宝贵的上下文。'
- en: '**Discoverable at runtime.** Invoke connections are not hard-wired at compile
    and are not limited at setup.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运行时发现**。Invoke连接在编译时不是硬编码的，在设置时也没有限制。'
- en: But like any system, Invoke has tradeoffs.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 但像任何系统一样，Invoke也有权衡。
- en: '**Limitations:**'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '**局限性：**'
- en: '**No central memory or state.** It doesn’t manage long-term plans, context
    windows, or recursive subtasks. That’s left to you — or to other frameworks layered
    on top.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**没有中心记忆或状态**。它不管理长期计划、上下文窗口或递归子任务。这留给你——或者留给其他堆叠在顶部的框架。'
- en: '**No retries, timeouts, or multi-step workflows baked in.** Invoke trusts the
    model to handle partial failure. In practice, GPT-4 and Claude do this remarkably
    well — but it’s still a philosophical choice.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**没有重试、超时或内置的多步骤工作流程**。Invoke信任模型处理部分失败。在实践中，GPT-4和Claude做得非常出色——但这仍然是一个哲学选择。'
- en: '**Statelessness.** Tools are evaluated per invocation. While this keeps things
    clean and atomic, it may not suit complex, multi-step agents without additional
    scaffolding.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无状态性**。工具按调用进行评估。虽然这保持了事物的简洁性和原子性，但它可能不适合需要额外支撑的复杂、多步骤代理。'
- en: '* * *'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'MCP vs. Invoke: Two Roads Into the Agentic Web'
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MCP与Invoke：通往代理网络的两种道路
- en: Both MCP and Invoke aim to bring LLMs into contact with the real world — but
    they approach it from opposite directions.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: MCP和Invoke都旨在将LLM带入现实世界——但它们从相反的方向接近这个问题。
- en: '| **Feature** | **Model Context Protocol (MCP)** | **Invoke** |'
  id: totrans-129
  prefs: []
  type: TYPE_TB
  zh: '| **功能** | **模型上下文协议（MCP）** | **Invoke** |'
- en: '| **Core Goal** | Agent-to-agent coordination via message passing | LLM-to-API
    integration via structured tool use |'
  id: totrans-130
  prefs: []
  type: TYPE_TB
  zh: '| **核心目标** | 通过消息传递进行代理到代理的协调 | 通过结构化工具使用进行LLM到API的集成 |'
- en: '| **Design Origin** | Comparable to protocols like WebSockets and JSON-RPC
    | Inspired by REST/HTTP and OpenAPI |'
  id: totrans-131
  prefs: []
  type: TYPE_TB
  zh: '| **设计起源** | 可与WebSocket和JSON-RPC等协议相媲美 | 受REST/HTTP和OpenAPI的启发 |'
- en: '| **Primary Use Case** | Composing multi-agent workflows and message pipelines
    | Connecting LLMs directly to real-world APIs |'
  id: totrans-132
  prefs: []
  type: TYPE_TB
  zh: '| **主要用例** | 组合多代理工作流程和消息管道 | 直接将LLM连接到现实世界的API |'
- en: '| **Communication Style** | Stateful sessions and messages exchanged between
    agents | Stateless, schema-driven tool calls |'
  id: totrans-133
  prefs: []
  type: TYPE_TB
  zh: '| **沟通风格** | 代理之间交换的状态会话和消息 | 无状态的、基于模式的工具调用 |'
- en: '| **Tool Discovery** | Agents must be pre-wired with capabilities | Tool schemas
    can be discovered at runtime (agents.json) |'
  id: totrans-134
  prefs: []
  type: TYPE_TB
  zh: '| **工具发现** | 代理必须预先配置能力 | 工具模式可以在运行时发现（agents.json） |'
- en: '| **Error Handling** | Delegated to agent frameworks or orchestration layers
    | Handled by the model, optionally guided by context |'
  id: totrans-135
  prefs: []
  type: TYPE_TB
  zh: '| **错误处理** | 委派给代理框架或编排层 | 由模型处理，可选地由上下文指导 |'
- en: '| **Dependencies** | Requires MCP-compatible infra and agents | Just needs
    model + JSON tool definition |'
  id: totrans-136
  prefs: []
  type: TYPE_TB
  zh: '| **依赖关系** | 需要兼容MCP的基础设施和代理 | 只需要模型+JSON工具定义 |'
- en: '| **Composable With** | AutoGPT-style ecosystems, custom agent graphs | LangChain,
    OpenAI tool use, custom scripts |'
  id: totrans-137
  prefs: []
  type: TYPE_TB
  zh: '| **可组合性** | AutoGPT 风格的生态系统，自定义代理图 | LangChain，OpenAI 工具的使用，自定义脚本 |'
- en: '| **Strengths** | Fine-grained control, extensible routing, agent memory |
    Simplicity, developer ergonomics, real-world compatibility |'
  id: totrans-138
  prefs: []
  type: TYPE_TB
  zh: '| **优势** | 精细控制，可扩展的路由，代理记忆 | 简单性，开发者的人体工程学，现实世界的兼容性 |'
- en: '| **Limitations** | Heavier to implement, requires full stack, context bloat,
    tool overload | Stateless by design, no agent memory or recursion |'
  id: totrans-139
  prefs: []
  type: TYPE_TB
  zh: '| **局限性** | 实现起来更复杂，需要全栈，上下文膨胀，工具过多 | 设计上无状态，没有代理记忆或递归 |'
- en: '* * *'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Conclusion: The Shape of the Agentic Web'
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论：代理式网络的形态
- en: We are witnessing the emergence of a new layer of the internet — one defined
    not by human clicks or software calls, but by autonomous agents that reason, plan,
    and act.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在见证互联网新层的出现——它不是由人类的点击或软件调用定义的，而是由自主代理进行推理、计划和行动定义的。
- en: 'If the early web was built on human-readable pages (HTML) and programmatic
    endpoints (REST), the agentic web demands a new foundation: standards and frameworks
    that let models interact with the world as fluidly as humans once did with hyperlinks.'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果早期的网络建立在可读页面（HTML）和程序端点（REST）之上，那么代理式网络则需要一个新的基础：标准和框架，使得模型能够像人类曾经使用超链接一样流畅地与世界互动。
- en: 'Two approaches — **Model Context Protocol** and **Invoke** — offer different
    visions of how this interaction should work:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 两种方法——**模型上下文协议（Model Context Protocol）**和**Invoke**——提供了关于这种交互应该如何工作的不同愿景：
- en: '**MCP** is ideal when you need coordination between multiple agents, session
    state, or recursive reasoning — the WebSockets of the agentic web.'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MCP** 在需要多个代理之间的协调、会话状态或递归推理时非常理想——它是代理式网络中的 WebSocket。'
- en: '**Invoke** is ideal when you need lightweight, one-shot tool use with real-world
    APIs — the HTTP of the agentic web.'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Invoke** 在需要使用轻量级、一次性工具与真实世界的 API 交互时非常理想——它是代理式网络中的 HTTP。'
- en: 'Neither is *the* solution. Much like the early internet needed both TCP and
    HTTP, the agentic layer will be pluralistic. But history suggests something: **the
    tools that win are the ones that are easiest to adopt**.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 没有一个是**唯一的**解决方案。就像早期的互联网需要 TCP 和 HTTP 一样，代理层也将是多元的。但历史表明：**获胜的工具是那些最容易采用的工具**。
- en: Invoke is already proving useful to developers who just want to connect an LLM
    to the services they already use. MCP is laying the groundwork for more complex
    agent systems. Together, they’re sketching the contours of what’s to come.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: Invoke 已经证明对那些只想将大型语言模型（LLM）连接到他们已使用的服务的开发者非常有用。MCP 正在为更复杂的代理系统打下基础。它们共同勾勒出了未来发展的轮廓。
- en: 'The agentic web won’t be built in a single day, and it won’t be built by a
    single company. But one thing is clear: the future of the web is no longer just
    human-readable or machine-readable — it’s model-readable.'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
