- en: First Principles Thinking for Data Scientists
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/first-principles-thinking-for-data-scientists/](https://towardsdatascience.com/first-principles-thinking-for-data-scientists/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1760556685409" class="mdspan-comment">In 1899, Wilbur Wright</mdspan>
    wrote to the Smithsonian Institution asking for everything they had on human flight.
    He and his brother Orville devoured every paper, theory, and calculation from
    the leading aeronautical researchers of their time. They studied Otto Lilienthal’s
    glider designs, Octave Chanute’s engineering principles, and Samuel Langley’s
    tables on lift and drag.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then they did something radical: they questioned all of it.'
  prefs: []
  type: TYPE_NORMAL
- en: When their gliders didn’t perform as the published data predicted, the Wright
    brothers didn’t assume they were at fault. They built their own wind tunnel and
    tested over 200 wing designs themselves. What they found then stunned them. Lilienthal’s
    lift coefficients—the numbers the entire field had relied on—were wrong, and not
    just a little bit. Totally, completely wrong.
  prefs: []
  type: TYPE_NORMAL
- en: The Wright brothers didn’t question this out of arrogance; they were employing
    first principles thinking. And it’s what made the difference between their first
    flight in 1903 and Langley—who had more funding, prestige, and resources—crashing
    his aircraft into the Potomac just nine days earlier.
  prefs: []
  type: TYPE_NORMAL
- en: Today’s data scientists face a similar challenge. We’re surrounded by playbooks,
    frameworks, and best practices—A/B testing guides, metrics taxonomies, model selection
    checklists. These tools are invaluable. But just like Langley’s tables, they can
    lead us astray when applied blindly.
  prefs: []
  type: TYPE_NORMAL
- en: The most strategic data scientists I know don’t choose between frameworks and
    first principles. They use both. Frameworks give speed. First principles provide
    clarity. Together, they separate task executors from strategic partners.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What Is First Principles Thinking?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First principles thinking means breaking a problem down to its fundamental truths
    and rebuilding from the ground up. Aristotle described it as finding “the first
    basis from which a thing is known.”
  prefs: []
  type: TYPE_NORMAL
- en: 'In practice, it means asking:'
  prefs: []
  type: TYPE_NORMAL
- en: What do we know to be absolutely true?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What are we assuming?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Which of those assumptions can we challenge?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This doesn’t mean rejecting existing knowledge: the Wright brothers studied
    all the research available; they just didn’t treat it as gospel.'
  prefs: []
  type: TYPE_NORMAL
- en: For data scientists, the same applies. Frameworks are maps—proven shortcuts
    through familiar terrain. First principles are the compass, keeping us oriented
    when the map gets a bit blurry.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Why Data Scientists Need This Now
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Frameworks are everywhere in data science for good reason. They help us run
    experiments, define metrics, and build models quickly. But they can also create
    false confidence.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve seen teams run flawless A/B tests that answered the wrong question. I’ve
    seen standard metrics produce dashboards that looked impressive but measured nothing
    meaningful. These failures didn’t happen because the frameworks were flawed. They
    happened because no one paused to ask the first principles questions: What decision
    are we actually trying to inform? What value are we really trying to measure?
    Do we even need this level of complexity?'
  prefs: []
  type: TYPE_NORMAL
- en: This matters more than ever because AI is automating the *execution* side of
    data science. Gen AI can query data, generate visualizations, and apply frameworks
    brilliantly. But it cannot decide whether you’re asking the right question.
  prefs: []
  type: TYPE_NORMAL
- en: First principles thinking is your differentiator. It’s the skill that keeps
    frameworks grounded in reality—and it’s becoming the most defensible capability
    of a strategic data scientist.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Where First Principles Changes Everything
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Here are three examples where the data science playbook is thoroughly well written,
    but strictly following it mindlessly would produce a poor outcome.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond Textbook A/B Tests
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The framework says: define your hypothesis, randomize users, measure your primary
    metric, check significance. That works perfectly—if you’re asking the right question.'
  prefs: []
  type: TYPE_NORMAL
- en: '**But the first principles question comes earlier: *What decision are we trying
    to inform? What uncertainty are we trying to resolve?***'
  prefs: []
  type: TYPE_NORMAL
- en: 'I once advised a team who was testing a new recommendation algorithm. Framework
    thinking said: randomize users, measure click-through rate, run for two weeks.
    Ship the winner.'
  prefs: []
  type: TYPE_NORMAL
- en: But a first principles pause revealed something different. We weren’t uncertain
    about clicks—early signals suggested they would go up. We were uncertain whether
    those clicks would drive true engagement or just noise.
  prefs: []
  type: TYPE_NORMAL
- en: So we changed what we measured. Instead of clicks, we focused on return visits,
    session depth, and long-term engagement. The result? The new algorithm increased
    clicks by 12% but decreased return visits by 8%. The standard framework would
    have said “ship it.” The first principles approach said “not yet.”
  prefs: []
  type: TYPE_NORMAL
- en: We decided that the new algorithm was too “click-baity”. Frameworks gave us
    the methodology. First principles gave us the right question.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What Are Our Metrics Really Measuring?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Metrics frameworks—North Star, OKRs, HEART—are powerful because they give structure.
    But they can also create the illusion that we’ve measured what matters.
  prefs: []
  type: TYPE_NORMAL
- en: '**First principles thinking asks: *What’s the fundamental behavior or value
    we care about? Does this metric actually capture it?***'
  prefs: []
  type: TYPE_NORMAL
- en: Consider engagement. Many frameworks suggest DAU, session length, or actions
    per session. Reasonable proxies—but are they right?
  prefs: []
  type: TYPE_NORMAL
- en: For a meditation app, longer sessions may look “better,” but the fundamental
    goal is a sustainable practice. That might mean *shorter* sessions over time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For an analytics tool, more queries per user could signal deeper usage, or it
    could mean users are struggling to find answers. The real value is faster, more
    targeted insights.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I once started a new job and inherited a dashboard that proudly reported weekly
    active users as the primary success metric. But when I dug in, I realized most
    “active” users were just logging in, looking around, and leaving without completing
    a single task. From a first principles lens, I decided that the real value was
    tasks completed. And once I shifted the metric, we discovered (as expected) that
    usage was far lower under the new definition, but the new framing provided us
    clarity on what to focus on in order to drive meaningful adoption.
  prefs: []
  type: TYPE_NORMAL
- en: The framework gives you a menu of metrics. First principles thinking tells you
    whether any of them actually reflect your product’s value. Sometimes the standard
    metric is perfect, but sometimes it’s dangerously misleading.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: When First Principles Saved a Launch
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the clearest examples I’ve experienced came early in my career when my
    team was tasked with building a “user quality score” to help sales prioritize
    leads.
  prefs: []
  type: TYPE_NORMAL
- en: 'The framework approach was obvious: supervised learning, predict conversion
    probability, rank by score. We had the data, the features, the methodology.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Two weeks in, as we were struggling to eke out incrementally higher performance
    scores, someone asked:** ***What decision will sales actually make with this score?***'
  prefs: []
  type: TYPE_NORMAL
- en: 'We asked sales. The answer wasn’t “give me exact probabilities.” It was: *Should
    I take the time and personalization to call this lead, or just send a quick standardized
    email?*'
  prefs: []
  type: TYPE_NORMAL
- en: That shifted everything. We didn’t need a complex model spanning the full probability
    range. We needed a simple, interpretable classifier optimized around one threshold.
  prefs: []
  type: TYPE_NORMAL
- en: By reframing, we moved from an ensemble model to logistic regression, dropped
    half our features, shipped three weeks faster—and delivered something sales actually
    used.
  prefs: []
  type: TYPE_NORMAL
- en: By going back to first principles, we clarified the real problem and then went
    back to the standard frameworks to build a solution.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Compass and the Map
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here’s the lesson: strategic data scientists don’t choose between frameworks
    and first principles. They combine them.'
  prefs: []
  type: TYPE_NORMAL
- en: Frameworks are the **map**—they let you move fast and leverage accumulated knowledge.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: First principles are the **compass**—they keep you aligned when the map isn’t
    clearly showing your path.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Wright brothers didn’t reject the research of their time. They built on
    it, but they also knew when to go back to basics.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the mindset shift that separates strategic data scientists from tactical
    ones. It’s not about knowing more methods or working harder. It’s about knowing
    when to follow the map and when to check your compass.
  prefs: []
  type: TYPE_NORMAL
- en: With the guidance of AI, frameworks will keep getting easier to apply. But the
    compass—that’s yours to build. And it’s what will keep you relevant, strategic,
    and indispensable in the years ahead.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
