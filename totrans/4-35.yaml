- en: Battle of the Ducks
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/battle-of-the-ducks-24fd55260fae/](https://towardsdatascience.com/battle-of-the-ducks-24fd55260fae/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Image by AI (Dalle-3)](../Images/1d8d99db3e5733fd31d7c63e86ad8315.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by AI (Dalle-3)
  prefs: []
  type: TYPE_NORMAL
- en: As some of you may know, I’m a big fan of the DuckDB Python library, and I’ve
    written many articles on it. I was also one of the first to write an article about
    an even newer Python library called Fireducks and helped bring that to people’s
    attention.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve never heard of these useful libraries, check out the links below for
    an introduction to them.
  prefs: []
  type: TYPE_NORMAL
- en: '[**DuckDB**](https://levelup.gitconnected.com/duckdb-ed960853ce65)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**New Pandas rival, FireDucks, brings the smoke!**](https://ai.gopubby.com/new-pandas-rival-fireducks-brings-the-smoke-3e8553ae466a)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Both libraries are increasing their share of data science workloads where it
    could be argued that data manipulation and general wrangling are at least as important
    as the data analysis and insight that the machine learning side of things brings.
  prefs: []
  type: TYPE_NORMAL
- en: The core foundations of both tools are very different; DuckDB is a modern, embedded
    analytics database designed for efficient processing and querying of gigabytes
    of data from various sources. Fireducks is designed to be a much faster replacement
    for Pandas.
  prefs: []
  type: TYPE_NORMAL
- en: Their key commonality, however, is that they are both highly performant for
    general mid-sized data processing tasks. If that’s your use case, which one should
    you choose? That’s what we’ll find out today.
  prefs: []
  type: TYPE_NORMAL
- en: Here are the tests I’ll perform.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: read a large CSV file into memory, i.e. a DuckDB table and a Fireducks dataframe
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: perform some typical data processing tasks against both sets of in-memory data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: create a new column in the in-memory data sets based on existing table/data
    frame column data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: write out the updated in-memory data sets as CSV and Parquet
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Input data set
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I created a CSV file with fake sales data containing 100 million records.
  prefs: []
  type: TYPE_NORMAL
- en: The schema of the input data is this,
  prefs: []
  type: TYPE_NORMAL
- en: '`order_id` (int)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`order_date` (date)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`customer_id` (int)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`customer_name` (str)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`product_id` (int)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`product_name` (str)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`category` (str)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`quantity` (int)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`price` (float)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`total` (float)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Here is a Python program you can use to create the CSV file. On my system, this
    resulted in a file of approximately 7.5GB.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Installing WSL2 Ubuntu
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Fireducks only runs under Linux, so as I usually run Windows, I’ll be using
    WSL2 Ubuntu for my Linux environment, but the same code should work on any Linux/Unix
    setup. I have a full guide on installing WSL2 [here](https://medium.com/stackademic/installing-wsl2-ubuntu-for-windows-81122c551bc2).
  prefs: []
  type: TYPE_NORMAL
- en: Setting up a dev environment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: OK, we should set up a separate development environment before starting our
    coding examples. That way, what we do won’t interfere with other versions of libraries,
    programming, etc….. we might have on the go for other projects.
  prefs: []
  type: TYPE_NORMAL
- en: I use Miniconda for this, but you can use whatever method suits you best.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to go down the Miniconda route and don’t already have it, you must
    install Miniconda first. Get it using this link,
  prefs: []
  type: TYPE_NORMAL
- en: '[**Miniconda – Anaconda documentation**](https://docs.anaconda.com/miniconda)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Once the environment is created, switch to it using the `activate`command, and
    then install Jupyter and any required Python libraries.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Test 1 – Reading a large CSV file and display the last 10 records
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: DuckDB
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Fireducks
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: There is not much in it; DuckDB edges it by about 6 seconds.
  prefs: []
  type: TYPE_NORMAL
- en: Test 2— Calculate total sales by category
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: DuckDB
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Fireducks
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: There is not much in it there, either. Fireducks shades it.
  prefs: []
  type: TYPE_NORMAL
- en: Test 3— Top 5 customer spend
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: DuckDB
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Fireducks
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: DuckDB wins that one, being almost twice as fast as Fireducks.
  prefs: []
  type: TYPE_NORMAL
- en: Test 4— Monthly sales figures
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: DuckDB
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Fireducks
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: DuckDB was significantly quicker in this example.
  prefs: []
  type: TYPE_NORMAL
- en: Test 5— Average order by product
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: DuckDB
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Fireducks
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Fireducks gets one back there and was twice as fast as DuckDB.
  prefs: []
  type: TYPE_NORMAL
- en: Test 6— product performance analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: DuckDB
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Fireducks
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: DuckDB is quicker this time.
  prefs: []
  type: TYPE_NORMAL
- en: Test 7 – Add a new column to the data set and update its value
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: DuckDB
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Fireducks
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: They have very similar run times yet again. A draw.
  prefs: []
  type: TYPE_NORMAL
