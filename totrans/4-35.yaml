  prefs: []
  type: TYPE_PRE
- en: Fireducks
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: Too close to call again.
  prefs: []
  type: TYPE_NORMAL
- en: Test 9— Write out the updated data to a parquet file
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: DuckDB
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: Fireducks
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: That’s the first ***major*** discrepancy between run times. Fireducks took almost
    a minute longer to write out its data to Parquet than did DuckDB.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So, what are we to make of all this? Simply put, there is nothing much in it
    between these two libraries. Both are superfast and capable of processing large
    data sets. Once your data is in memory, either in a DuckDB table or Fireducks
    dataframe, both libraries are equally capable of processing it in double quick
    time
  prefs: []
  type: TYPE_NORMAL
- en: The choice of which one to use depends on your existing infrastructure and skill
    set.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re a database person, DuckDB is the obvious library to use, as your SQL
    skills would be instantly transferable.
  prefs: []
  type: TYPE_NORMAL
- en: Alternatively, if you’re already embedded in the Pandas’ world, Fireducks would
    be a great choice for you.
  prefs: []
  type: TYPE_NORMAL
