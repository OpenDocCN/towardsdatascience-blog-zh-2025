  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`order_id` (整数)'
- en: '`order_date` (date)'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`order_date` (日期)'
- en: '`customer_id` (int)'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`customer_id` (整数)'
- en: '`customer_name` (str)'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`customer_name` (字符串)'
- en: '`product_id` (int)'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`product_id` (整数)'
- en: '`product_name` (str)'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`product_name` (字符串)'
- en: '`category` (str)'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`category` (字符串)'
- en: '`quantity` (int)'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`quantity` (整数)'
- en: '`price` (float)'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`price` (浮点数)'
- en: '`total` (float)'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`total` (浮点数)'
- en: Here is a Python program you can use to create the CSV file. On my system, this
    resulted in a file of approximately 7.5GB.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个你可以使用的Python程序来创建CSV文件。在我的系统上，这产生了一个大约7.5GB的文件。
- en: '[PRE0]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Installing WSL2 Ubuntu
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装WSL2 Ubuntu
- en: Fireducks only runs under Linux, so as I usually run Windows, I’ll be using
    WSL2 Ubuntu for my Linux environment, but the same code should work on any Linux/Unix
    setup. I have a full guide on installing WSL2 [here](https://medium.com/stackademic/installing-wsl2-ubuntu-for-windows-81122c551bc2).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: Fireducks只能在Linux下运行，因此由于我通常运行Windows，我将使用WSL2 Ubuntu来设置我的Linux环境，但相同的代码应该可以在任何Linux/Unix设置上运行。我有一个完整的指南，介绍如何在Windows上安装WSL2
    Ubuntu [这里](https://medium.com/stackademic/installing-wsl2-ubuntu-for-windows-81122c551bc2)。
- en: Setting up a dev environment
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置开发环境
- en: OK, we should set up a separate development environment before starting our
    coding examples. That way, what we do won’t interfere with other versions of libraries,
    programming, etc….. we might have on the go for other projects.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，在我们开始编写示例代码之前，我们应该设置一个独立的开发环境。这样，我们做的不会干扰我们可能用于其他项目的其他库版本、编程等……。
- en: I use Miniconda for this, but you can use whatever method suits you best.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用Miniconda来做这件事，但你可以使用最适合你的方法。
- en: If you want to go down the Miniconda route and don’t already have it, you must
    install Miniconda first. Get it using this link,
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想走 Miniconda 路线并且还没有安装，你必须首先安装 Miniconda。使用此链接获取它，
- en: '[**Miniconda – Anaconda documentation**](https://docs.anaconda.com/miniconda)'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**Miniconda – Anaconda 文档**](https://docs.anaconda.com/miniconda)'
- en: Once the environment is created, switch to it using the `activate`command, and
    then install Jupyter and any required Python libraries.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 环境创建完成后，使用 `activate` 命令切换到它，然后安装 Jupyter 和任何所需的 Python 库。
