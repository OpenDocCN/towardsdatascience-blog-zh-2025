- en: Fine-Tune Your Topic Modeling Workflow with BERTopic
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用BERTopic微调你的主题建模流程
- en: 原文：[https://towardsdatascience.com/finetune-your-topic-modeling-workflow-with-bertopic/](https://towardsdatascience.com/finetune-your-topic-modeling-workflow-with-bertopic/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/finetune-your-topic-modeling-workflow-with-bertopic/](https://towardsdatascience.com/finetune-your-topic-modeling-workflow-with-bertopic/)
- en: 'Topic modeling remains a critical tool in the AI and NLP toolbox. While large
    language models (LLMs) handle text exceptionally well, extracting high-level topics
    from massive datasets still requires dedicated topic modeling techniques. A typical
    workflow includes four core steps: embedding, dimensionality reduction, clustering,
    and topic representation.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 主题建模仍然是AI和NLP工具箱中的关键工具。虽然大型语言模型（LLMs）在处理文本方面表现出色，但从大量数据集中提取高级主题仍然需要专门的主题建模技术。一个典型的流程包括四个核心步骤：嵌入、降维、聚类和主题表示。
- en: <mdspan datatext="el1754507033442" class="mdspan-comment">One of the most popular</mdspan>
    frameworks today is [**BERTopic**](https://maartengr.github.io/BERTopic/index.html),
    which simplifies each stage with modular components and an intuitive API. In this
    post, I’ll walk through practical adjustments you can make to improve clustering
    outcomes and boost interpretability based on hands-on experiments using the [open-source
    20 Newsgroups dataset](https://archive.ics.uci.edu/dataset/113/twenty+newsgroups),
    which is distributed under the Creative Commons Attribution 4.0 International
    license.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754507033442" class="mdspan-comment">目前最受欢迎的</mdspan>框架之一是[**BERTopic**](https://maartengr.github.io/BERTopic/index.html)，它通过模块化组件和直观的API简化了每个阶段。在这篇文章中，我将介绍你可以进行的一些实际调整，以改善聚类结果并基于使用[开源20
    Newsgroups数据集](https://archive.ics.uci.edu/dataset/113/twenty+newsgroups)的动手实验来提高可解释性，该数据集在Creative
    Commons Attribution 4.0 International许可下分发。
- en: Project Overview
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目概述
- en: We’ll start with the default settings recommended in BERTopic’s documentation
    and progressively update specific configurations to highlight their effects. Along
    the way, I’ll explain the purpose of each module and how to make informed decisions
    when customizing them.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从BERTopic文档中推荐的默认设置开始，并逐步更新特定配置以突出其效果。在这个过程中，我将解释每个模块的目的以及如何在自定义时做出明智的决定。
- en: Dataset Preparation
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集准备
- en: We load a sample of 500 news documents.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们加载了500篇新闻文档的样本。
- en: '[PRE0]'
  id: totrans-8
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Since the data originates from casual Usenet discussions, we apply cleaning
    steps to strip headers, remove clutter, and preserve only informative sentences.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据源自随意的Usenet讨论，我们应用清理步骤以去除标题、移除杂项并仅保留信息性句子。
- en: This preprocessing ensures higher-quality embeddings and a smoother downstream
    clustering process.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这种预处理确保了更高的嵌入质量和更平滑的下游聚类过程。
- en: '[PRE1]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Initial BERTopic Pipeline
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 初始BERTopic流程
- en: 'Using BERTopic’s modular design, we configure each component: SentenceTransformer
    for embeddings, UMAP for dimensionality reduction, HDBSCAN for clustering, and
    CountVectorizer + KeyBERT for topic representation. This setup yields only a few
    broad topics with noisy representations, highlighting the need for fine-tuning
    to achieve more coherent results.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 使用BERTopic的模块化设计，我们配置每个组件：SentenceTransformer用于嵌入，UMAP用于降维，HDBSCAN用于聚类，以及CountVectorizer
    + KeyBERT用于主题表示。这种设置只能产生几个具有噪声表示的宽泛主题，突出了进行微调以实现更一致结果的需求。
- en: '[PRE2]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This setup yields only a few broad topics with noisy representations. This result
    highlights the need for finetuning to achieve more coherent results.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设置只能产生几个具有噪声表示的宽泛主题。这一结果突出了进行微调以实现更一致结果的需求。
- en: '![Image generated by author](../Images/36a266ceceb60265fff92e349d5510ca.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![由作者生成的图像](../Images/36a266ceceb60265fff92e349d5510ca.png)'
- en: Original discovered topics (Image generated by author)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 原始发现的主题（由作者生成图像）
- en: Parameter Tuning for Granular Topics
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 精细调整主题的参数
- en: n_neighbors from UMAP module
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: UMAP模块的n_neighbors
- en: '[UMAP](https://umap-learn.readthedocs.io/en/latest/how_umap_works.html) is
    the dimensionality reduction module to reduce origin embedding to a lower dimension
    dense vector. By adjusting UMAP’s n_neighbors, we control how locally or globally
    the data is interpreted during dimensionality reduction. Lowering this value uncovers
    finer-grained clusters and improves topic distinctiveness.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[UMAP](https://umap-learn.readthedocs.io/en/latest/how_umap_works.html)是降维模块，将原始嵌入降低到低维密集向量。通过调整UMAP的n_neighbors，我们控制数据在降维过程中的局部或全局解释方式。降低此值可以揭示更细粒度的聚类并提高主题的区分度。'
- en: '[PRE3]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![Image generated by author](../Images/f4cff7f305804bef4a6fb59b75c4a293.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![由作者生成的图像](../Images/f4cff7f305804bef4a6fb59b75c4a293.png)'
- en: Topics discovered after setting the UMAP’s n_neighbors parameter (Image generated
    by author)
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 设置UMAP的n_neighbors参数后发现的主题（由作者生成）
- en: min_cluster_size and cluster_selection_method from HDBSCAN module
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: min_cluster_size和cluster_selection_method来自HDBSCAN模块
- en: '[HDBSCAN](https://hdbscan.readthedocs.io/en/latest/how_hdbscan_works.html)
    is the clustering module set by default for BerTopic. By modifying HDBSCAN’s min_cluster_size
    and switching the cluster_selection_method from “eom” to “leaf” further sharpens
    topic resolution. These settings help uncover smaller, more focused themes and
    balance the distribution across clusters.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '[HDBSCAN](https://hdbscan.readthedocs.io/en/latest/how_hdbscan_works.html)是BerTopic默认设置的聚类模块。通过修改HDBSCAN的min_cluster_size并将cluster_selection_method从“eom”切换到“leaf”，可以进一步细化主题分辨率。这些设置有助于揭示更小、更专注的主题，并在簇之间平衡分布。'
- en: '[PRE4]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The number of clusters increases to 30 by setting cluster_selection_method to
    leaf and min_cluster_size to 5.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将cluster_selection_method设置为leaf并将min_cluster_size设置为5，簇的数量增加到30。
- en: '![Image generated by author](../Images/c44bec0c35b9450d8b256a1ee3ef2a03.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![由作者生成的图像](../Images/c44bec0c35b9450d8b256a1ee3ef2a03.png)'
- en: Topics discovered after setting HDBSCAN’s related parameters (Image generated
    by author)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 设置HDBSCAN的相关参数后发现的主题（由作者生成）
- en: Controlling Randomness for Reproducibility
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 控制随机性以实现可重复性
- en: UMAP is inherently non-deterministic, meaning it can produce different results
    on each run unless you explicitly set a fixed random_state. This detail is often
    omitted in example code, so be sure to include it to ensure reproducibility.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: UMAP本质上是非确定性的，这意味着除非你明确设置一个固定的random_state，否则它可以在每次运行时产生不同的结果。这个细节在示例代码中经常被省略，所以请确保包括它以确保可重复性。
- en: Similarly, if you’re using a third-party embedding API (like OpenAI), be cautious.
    Some APIs introduce slight variations on repeated calls. For reproducible outputs,
    cache embeddings and feed them directly into BERTopic.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，如果你正在使用第三方嵌入API（如OpenAI），请谨慎使用。一些API在重复调用时可能会引入轻微的变化。为了得到可重复的结果，请缓存嵌入并将它们直接输入到BERTopic中。
- en: '[PRE5]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Every dataset domain may require different clustering settings for optimal results.
    To streamline experimentation, consider defining evaluation criteria and automating
    the tuning process. For this tutorial, we’ll use the cluster configuration that
    sets n_neighbors to 5, min_cluster_size to 5, and cluster_selection_method to
    “eom”. This is a combination that strikes a balance between granularity and coherence.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 每个数据集领域可能需要不同的聚类设置才能获得最佳结果。为了简化实验，考虑定义评估标准并自动化调整过程。在本教程中，我们将使用将n_neighbors设置为5、min_cluster_size设置为5、cluster_selection_method设置为“eom”的簇配置。这是一个在粒度和连贯性之间取得平衡的组合。
- en: Improving Topic Representations
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提升主题表示
- en: Representation plays a crucial role in making clusters interpretable. By default,
    BERTopic generates unigram-based representations, which often lack sufficient
    context. In the next section, we’ll explore several techniques to enrich these
    representations and improve topic interpretability.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 表示在使簇可解释方面起着至关重要的作用。默认情况下，BERTopic生成基于unigram的表示，这通常缺乏足够的上下文。在下一节中，我们将探讨几种技术来丰富这些表示并提高主题的可解释性。
- en: Ngram
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Ngram
- en: n-gram range
  id: totrans-38
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: n-gram范围
- en: In BERTopic, CountVectorizer is the default tool to convert text data into bag-of-words
    representations.  Instead of relying on generic unigrams, switch to **bigrams
    or trigrams** using ngram_range in CountVectorizer. This simple change adds much
    needed context.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在BERTopic中，CountVectorizer是默认的工具，用于将文本数据转换为词袋表示。不要依赖于通用的unigram，而是使用CountVectorizer中的ngram_range切换到**bigram或trigram**。这个简单的变化增加了所需的内容。
- en: Since we are only updating representation, BerTopic offers the update_topics
    function to avoid redoing the modeling all over again.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们只更新表示，BerTopic提供了update_topics函数以避免重新进行整个建模过程。
- en: '[PRE6]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![Image generated by author](../Images/a53adf72a7c57dac1b94a8133e7de0ba.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![由作者生成的图像](../Images/a53adf72a7c57dac1b94a8133e7de0ba.png)'
- en: Topic representations using bigrams (Image generated by author)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 使用bigram的主题表示（由作者生成）
- en: Custom Tokenizer
  id: totrans-44
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 自定义分词器
- en: Some bigrams are still hard to interpret e.g. 486dx 50, ac uk, dxf doc,… For
    greater control, implement a **custom tokenizer** that filters n-grams based on
    part-of-speech patterns. This removes meaningless combinations and elevates the
    quality of your topic keywords.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 一些bigram仍然难以解释，例如486dx 50, ac uk, dxf doc等。为了获得更大的控制权，实现一个**自定义分词器**，根据词性模式过滤n-gram。这消除了无意义的组合并提高了主题关键词的质量。
- en: '[PRE7]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![Image generated by author](../Images/33efa680f68c2462e787ef88d3548fdc.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![由作者生成的图像](../Images/33efa680f68c2462e787ef88d3548fdc.png)'
- en: Topic representations which removes messy bigrams (Image generated by author)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 主题表示，移除了杂乱的二元组（作者生成图像）
- en: LLM
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LLM
- en: Finally, you can **integrate LLMs** to generate coherent titles or summaries
    for each topic. BERTopic supports OpenAI integration directly or through custom
    prompting. These LLM-based summaries drastically improve explainability.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，您可以将**LLM**集成以生成每个主题的连贯标题或摘要。BERTopic直接支持OpenAI集成或通过自定义提示。基于LLM的摘要显著提高了可解释性。
- en: '[PRE8]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The representations are now all meaningful sentences.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的所有表示都是具有意义的句子。
- en: '![Image generated by author](../Images/60103d35ed90d89a6c6b8eb6a111a50e.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![作者生成图像](../Images/60103d35ed90d89a6c6b8eb6a111a50e.png)'
- en: Topic representations which are LLM-generated sentences (Image generated by
    author)
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 主题表示，由LLM生成的句子（作者生成图像）
- en: You can also write your own function for getting the LLM-generated title, and
    update it back to the topic model object by using update_topic_labels function.
    Please refer to the example code snippet below.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以编写自己的函数来获取LLM生成的标题，并通过使用update_topic_labels函数将其更新回主题模型对象。请参考下面的示例代码片段。
- en: '[PRE9]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Conclusion
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This guide outlined actionable strategies to boost topic modeling results using
    BERTopic. By understanding the role of each module and tuning parameters for your
    specific domain, you can achieve more focused, stable, and interpretable topics.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 本指南概述了使用BERTopic提升主题建模结果的可操作策略。通过理解每个模块的作用并为您的特定领域调整参数，您可以实现更聚焦、更稳定和更具可解释性的主题。
- en: Representation matters just as much as clustering. Whether it’s through n-grams,
    syntactic filtering, or LLMs, investing in better representations makes your topics
    easier to understand and more useful in practice.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 表示与聚类同样重要。无论是通过n-gram、句法过滤还是LLM，投资于更好的表示可以使您的主题更容易理解，并在实践中更有用。
- en: BERTopic also offers advanced modeling techniques beyond the basics covered
    here. In a future post, we’ll explore those capabilities in depth. Stay tuned!
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: BERTopic还提供了超出此处基本覆盖的先进建模技术。在未来的文章中，我们将深入探讨这些功能。敬请期待！
