- en: How to Enhance SQL Code Security and Maintainability
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-enhance-sql-code-security-and-maintainability-3e398b4dd68e/](https://towardsdatascience.com/how-to-enhance-sql-code-security-and-maintainability-3e398b4dd68e/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by FlyD on Unsplash](../Images/05dc23eb129db587b3ca4c4adb1e9f08.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [FlyD](https://unsplash.com/@flyd2069?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: When you’re writing SQL code to accomplish certain tasks for your company, have
    you ever worried that your SQL code might get leaked and expose critical business
    logic to competitor companies? Or have you noticed that long and complex SQL code
    are very difficult to maintain and fix when issues arise? SQL procedures can address
    the problems mentioned above and serve as a key step for data professionals looking
    to advance their coding skills while not everyone has paid enough attention to
    this technique.
  prefs: []
  type: TYPE_NORMAL
- en: A SQL procedure, also known as a SQL stored procedure, is a database object
    that is created and stored in the database management system and can be executed
    with a single call. It’s a powerful tool for improving database ***security, modularity,***
    and ***code reusability***.
  prefs: []
  type: TYPE_NORMAL
- en: 'People often confuse SQL UDFs with SQL procedures. Both techniques are used
    for improving performance, maintainability and security of SQL queries. They share
    many similarities: both enable developers to write a block of SQL code once and
    reuse it multiple times throughout the applications, and both can accept input
    parameters. Due to these similarities, the two techniques can sometimes achieve
    the same goals.'
  prefs: []
  type: TYPE_NORMAL
- en: I’ll use the mock data `promo_sales` to explain on their similarities. `promo_sales`
    is the data for the sales performance from a department store and consists of
    fields`Sale_Person_ID` , `Department` and `Sales_Amount` . According to the company
    policy, 20% of the sales amount is paid as the bonus to each department. We can
    write the SQL code to query the department summary including the average sales
    per person and the bonus for each department.
  prefs: []
  type: TYPE_NORMAL
- en: In order to boost the sales during the holiday season, the company’s senior
    management decided to provide an extra 10% bonus for the departments with sales
    amount over 2000K USD.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: If we need to update the logic of bonus calculation, we would have to rewrite
    the code. For projects with complex logics, this may lead to challenges. To resolve
    this problem, we can write the UDF consisting of the two statements which represent
    the logic before and after updates. This design significantly improve the code
    maintainability.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Alternatively, we can use a SQL procedure to generate the same result.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![Image by the author (SQL procedure output)](../Images/1910c51ab544b1332553c6316a6e5060.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author (SQL procedure output)
  prefs: []
  type: TYPE_NORMAL
- en: Although there are similarities, there are also differences which enable developers
    to have greater flexibilities when using stored procedure in SQL. Compared to
    SQL functions which must return a value and can have only input parameters, stored
    procedures don’t need to return results and have options to implement with input/output
    parameters. In today’s article, I will focus on the important features of SQL
    stored procedures.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re interested in SQL User Defined Functions, you can refer to my another
    article ‘***SQL User Defined Functions (UDFs)***‘.
  prefs: []
  type: TYPE_NORMAL
- en: '[**SQL User Defined Functions (UDFs)**](https://towardsdatascience.com/sql-user-defined-functions-udfs-e385f2887386)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Syntax For SQL Stored Procedures
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Syntax of SQL Stored Procedure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A universal syntax of SQL stored procedure is:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: In this syntax, parameters are optional. When creating the SQL procedure `dbo.GetDepartmentSummary_Proc`
    , no parameters were assigned. The stored procedure contains several statements
    which perform different tasks, such as table creation, data insertion, variable
    calculation, variable updates, summary queries, table deletion, and so on. Unlike
    a SQL UDF, the `RETURN` statement is not used here to return a table, although
    it can optionally be used to return an integer status value. Another key difference
    is that a SQL procedure use `EXEC` statement to execute the procedure defined
    and obtain the intended result.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Stored Procedure with Default Parameters
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A default parameter in a SQL procedure is the value assigned to a parameter
    that is automatically used if there’s no value provided when the procedure is
    executed. For the procedure created above, we can include a parameter that filters
    the results by a specific department. Without specifying the default parameter,
    the procedure will return the summary of all department.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: In this example, the `@DepartmentFilter` parameter is defined but when it’s
    set as `NULL` , we still generate the summary of all departments. By adding the
    `WHERE` clause, we can dynamically filter the data based on the parameter’s value.
    After executing the procedure with the parameter, this approach makes the stored
    procedure flexible and reusable for different scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a SQL Procedure with Output Parameters
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: An output parameter in a SQL procedure is a parameter that can return a value
    back to the caller after the procedure executes. Using the output parameter in
    a SQL procedure is considered more efficient by returning a single value rather
    than a result set. It allows developers to return additional information alongside
    the result set. This feature of SQL procedures provides more flexibility in handling
    data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The output parameter `@TotalDepartments INT OUTPUT` is defined to store the
    total number of departments and the value of `@TotalDepartments` is set during
    the procedure execution and can be printed out after the procedure completes.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Encrypting Stored Procedure in SQL
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Nowadays, data security has become a growing concern for many companies. Keeping
    sensitive data away from unauthorized users, complying with data privacy laws
    and regulations and maintaining data integrity require the encryption of stored
    procedures in SQL.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re a data engineer or a data analyst from a key business department,
    learning how to encrypt your SQL procedures is a must-have skill. Encrypting a
    stored procedure is quite straightforward – you only need to use the `ENCRYPTION`
    keyword while creating the procedure. The keyword will encrypt and hide the source
    code. If someone attempts to retrieve the source code with the in-built function
    `sp_helptext`, the server will respond with "The text for object ‘procedure_name’
    is encrypted."
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As one of the key advanced SQL techniques, stored procedures undoubtedly influence
    the performance, flexibility, maintainability and efficiency of your code and
    ultimately generate a significant impact on your database management and data
    analysis activities. There are always debates about which is better – SQL functions
    or stored procedures. In my view, the choice depends on the complexity of the
    data and logic, the functionality aimed to achieve, and the expected outputs.
    Which technique do you prefer? Please share your thoughts in the comments.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading! If you found this article helpful, please give it some
    claps! Follow me and subscribe via email to receive notifications whenever I publish
    a new article.
  prefs: []
  type: TYPE_NORMAL
