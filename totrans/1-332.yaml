- en: AI FOMO, Shadow AI, and Other Business Problems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI FOMO、影子AI和其他商业问题
- en: 原文：[https://towardsdatascience.com/ai-fomo-shadow-ai-and-other-business-problems/](https://towardsdatascience.com/ai-fomo-shadow-ai-and-other-business-problems/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/ai-fomo-shadow-ai-and-other-business-problems/](https://towardsdatascience.com/ai-fomo-shadow-ai-and-other-business-problems/)
- en: <mdspan datatext="el1756945149608" class="mdspan-comment">This month</mdspan>
    I have been encountering some interesting news about how the AI industry is progressing.
    It feels like a slowdown in this space is definitely on the horizon, if it hasn’t
    already started. (Not being an economist, I won’t say bubble, but there are lots
    of opinions out there.) GPT-5 came out last month and [disappointed everyone](https://garymarcus.substack.com/p/gpt-5-overdue-overhyped-and-underwhelming),
    apparently [even OpenAI executives](https://fortune.com/2025/08/18/sam-altman-openai-chatgpt5-launch-data-centers-investments/).
    Meta made a very sudden pivot and is reorganizing its entire AI function, [ceasing
    all hiring](https://builtin.com/artificial-intelligence/meta-superintelligence-reorg),
    immediately after putting apparently unlimited funds into recruiting and wooing
    talent in the space. Microsoft appears to be [slowing their investment in AI hardware](https://www.theinformation.com/articles/microsoft-scales-back-ambitions-ai-chips-overcome-delays) (paywall).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756945149608" class="mdspan-comment">本月</mdspan>我遇到了一些关于AI行业发展的一些有趣新闻。感觉这个领域放缓确实已经在地平线上，如果还没有开始的话。（我不是经济学家，所以不会说泡沫，但外界有很多意见。）上个月GPT-5发布了，显然[让所有人都失望了](https://garymarcus.substack.com/p/gpt-5-overdue-overhyped-and-underwhelming)，甚至[OpenAI的高管们](https://fortune.com/2025/08/18/sam-altman-openai-chatgpt5-launch-data-centers-investments/)也是如此。Meta突然转变方向，正在重组其整个AI部门，[停止所有招聘](https://builtin.com/artificial-intelligence/meta-superintelligence-reorg)，在显然投入了无限资金用于招聘和吸引人才之后。微软似乎在[放缓对AI硬件的投资](https://www.theinformation.com/articles/microsoft-scales-back-ambitions-ai-chips-overcome-delays)（付费墙）。
- en: This isn’t to say that any of the major players are going to stop investing
    in AI, of course. The technology isn’t demonstrating spectacular results or approaching
    anything even remotely like AGI, which many analysts and writers ([including me](https://www.stephaniekirmer.com/writing/howdoweknowifaiissmokeandmirrors/))
    had predicted it wouldn’t, but there’s still a level of utilization among businesses
    and individuals that is persisting, so there’s some incentive to keep pushing
    forward.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这并不是说任何主要玩家都会停止在AI上的投资。这项技术并没有展现出令人瞩目的成果，也没有接近任何类似于AGI（通用人工智能）的东西，许多分析师和作家（包括我）[包括我](https://www.stephaniekirmer.com/writing/howdoweknowifaiissmokeandmirrors/)预测它不会出现，但企业和个人之间仍然存在一定程度的利用，因此还有一些动力继续推进。
- en: The 5% Success Rate
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5%的成功率
- en: In this vein, I read the [new report from MIT about AI in business](https://mlq.ai/media/quarterly_decks/v0.1_State_of_AI_in_Business_2025_Report.pdf) with
    great interest this week. I recommend it to anyone who’s looking for actual information
    about how AI adoption is going from regular workers as well as the C-suite. The
    report has some headline takeaways, including an assertion that only 5% of AI
    initiatives in the business setting generate meaningful value, which I can certainly
    believe. (Also, AI is not actually taking people’s jobs in most industries, and
    in several industries AI isn’t having much of an impact at all.) A lot of businesses,
    it seems, have dived into adopting AI without having a strategic plan for what
    it’s supposed to do, and how that adoption will actually help them achieve their
    objectives.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，我本周非常关注地阅读了麻省理工学院关于商业AI的[新报告](https://mlq.ai/media/quarterly_decks/v0.1_State_of_AI_in_Business_2025_Report.pdf)。我推荐给任何寻找关于AI采用情况实际信息的人，无论是普通员工还是高管层。报告有一些引人注目的结论，包括一个断言，只有5%的商业AI项目产生了有意义的价值，我确实相信这一点。（此外，AI实际上并没有在大多数行业中取代人们的工作，在几个行业中AI的影响也并不大。）似乎很多企业都跳进了采用AI的浪潮中，但没有为它应该做什么以及如何帮助实现他们的目标制定战略计划。
- en: I see this a lot, actually — executives who are significantly separated from
    the day to day work of their organization being gripped by FOMO about AI, deciding
    AI must become part of their business, but not stepping back and considering how
    this fits in with the business they already have and the work they already do.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，我确实看到很多这种情况——高管们与他们的组织日常工作的距离很大，被AI的FOMO（恐惧错过）所困扰，决定AI必须成为他们业务的一部分，但没有退后一步考虑这如何与现有的业务和已经进行的工作相匹配。
- en: Screwdriver or Magic Wand?
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 螺丝刀还是魔杖？
- en: Regular readers will know I’m not arguing AI can’t or shouldn’t be used when
    it can serve a purpose, of course. Far from it! I build AI-based solutions to
    business problems at my own organization every day. However, I firmly believe
    AI is a tool, not magic. It gives us ways to do tasks that are infeasible for
    human workers and can accelerate the speed of tasks we would otherwise have to
    do manually. It can make information clearer and help us better understand lengthy
    documents and texts.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 定期阅读的读者会知道，我并不是在争论AI在它能发挥作用时不能或不应被使用，当然不是！我在自己的组织中每天都会构建基于AI的商业问题的解决方案。然而，我坚信AI是一个工具，而不是魔法。它为我们提供了完成人类工人无法完成的任务的方法，并可以加快我们本应手动完成的任务的速度。它可以使信息更清晰，并帮助我们更好地理解冗长的文档和文本。
- en: What it doesn’t do, however, is make business success by itself. In order to
    be part of the 5% and not the 95%, any application of AI needs to be founded on
    strategic thinking and planning, and most importantly clear-eyed expectations
    about what AI is capable of and what it isn’t. Small projects that improve particular
    processes can have huge returns, without having to bet on a massive upheaval or
    “revolutionizing” of the business, even though they aren’t as glamorous or headline-producing
    as the hype. The MIT report discusses how vast numbers of projects start as pilots
    or experimentation but don’t actually come to fruition in production, and I would
    argue that a lot of this is because either the planning or the clear-eyed expectations
    were not present.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，它本身并不能保证商业成功。为了成为那5%而不是95%的一部分，任何AI的应用都需要建立在战略思考和规划的基础上，最重要的是对AI能够做什么以及不能做什么有清晰的预期。小项目可以改善特定流程，从而获得巨大的回报，而不必押注于大规模的变革或“革命化”业务，尽管这些项目可能没有炒作那样光鲜或引人注目。麻省理工学院的报告讨论了大量的项目最初作为试点或实验开始，但实际上并没有在生产中实现，我认为这其中的很多原因是因为缺乏规划或清晰的预期。
- en: The authors spend a significant amount of time noting that many AI tools are
    regarded as inflexible and/or incompatible with existing processes, resulting
    in failure to adopt among the rank and file. If you build or buy an AI solution
    that can’t work with your business as it exists today, you’re throwing away your
    money. Either the solution should have been designed with your business in mind
    and it wasn’t, meaning a failure of strategic planning, or it can’t be flexible
    or compatible in the way you need, and AI simply wasn’t the right solution in
    the first place.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 作者花了很多时间指出，许多AI工具被认为是不灵活的，或者与现有流程不兼容，导致普通员工无法采用。如果你构建或购买了一个无法与现有业务兼容的AI解决方案，你就是在浪费钱。要么解决方案应该考虑到你的业务，但实际上没有，这意味着战略规划失败，要么它无法以你需要的方式灵活或兼容，这意味着AI从一开始就不是正确的解决方案。
- en: Trading Security for Versatility
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 以灵活性换取安全性
- en: 'On the subject of flexibility, I had an additional thought as I was reading.
    The MIT authors emphasize that the internal tools that companies offer their teams
    often “don’t work” in one way or another, but but in reality a lot of the rigidity
    and limits placed on in-house LLM tools are because of safety and risk prevention.
    Developers don’t built non-functional tools on purpose, but they have limitations
    and requirements to comply with. In short, there’s a tradeoff here we can’t avoid:
    When your LLM is extremely open and has few or no guardrails, it’s going to feel
    like it lets the user do more, or will answer more questions, because it does
    just that. But it does that at a significant possible cost, potentially liability,
    giving false or inappropriate information, or worse.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读的过程中，我对灵活性这个话题有了更多的思考。麻省理工学院的作者强调，公司提供给团队的内部工具往往“在某些方面不起作用”，但实际上，对内部LLM工具施加的许多刚性和限制是由于安全和风险预防。开发者并非故意构建非功能性工具，但他们有遵守的限制和要求。简而言之，这里有一个我们无法避免的权衡：当你的LLM非常开放且几乎没有限制时，它可能会感觉允许用户做更多，或者回答更多问题，因为它确实如此。但这样做可能会付出重大的代价，包括潜在的责任，提供错误或不适当的信息，或者更糟。
- en: Of course, regular users are likely not thinking about this angle when they
    pull up the ChatGPT app on their phone with their personal account during the
    work day, they’re just trying to get their jobs done. InfoSec communities are
    rightly alarmed by this kind of thing, which some circles are calling “[Shadow
    AI](https://www.ibm.com/think/topics/shadow-ai)” instead of shadow IT. The risks
    from this behavior can be catastrophic — proprietary company data being handed
    over to an AI solution freely, without oversight, to say nothing of how the output
    may be used in the company. This problem is really, really hard to solve. Employee
    education, at all levels of the organization, is an obvious step, but some degree
    of this shadow AI is likely to persist, and security teams are struggling with
    this as we speak.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '当然，普通用户在白天用个人账户在手机上打开ChatGPT应用时，可能并没有考虑这个角度，他们只是试图完成工作。信息安全社区对此类事情感到担忧，有些人称之为“[影子AI](https://www.ibm.com/think/topics/shadow-ai)”而不是影子IT。这种行为的风险可能是灾难性的——将专有公司数据随意交给AI解决方案，没有任何监管，更不用说输出在公司中的使用方式了。这个问题真的非常难以解决。员工教育，在组织的各个层面，是一个明显的步骤，但一定程度上的影子AI可能仍然会存在，而安全团队正在为此而努力。 '
- en: Conclusion
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: I think this leaves us in an interesting moment. I believe the winners in the
    AI rat race are going to be those who were thoughtful and careful, applying AI
    solutions conservatively, and not trying to upturn their model of success that’s
    worked up to now to chase a new shiny thing. A slow and steady approach can help
    hedge against risks, including customer backlash against AI, as well as many others.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这让我们处于一个有趣的时刻。我相信在AI竞赛中获胜的人将是那些深思熟虑、谨慎应用AI解决方案、不试图颠覆至今为止一直成功的成功模式，去追逐新事物的人。缓慢而稳定的方法可以帮助规避风险，包括客户对AI的抵制，以及其他许多风险。
- en: Before I close, I just want to remind everyone that these attempts to build
    the equivalent of a palace when a condo would do fine have tangible consequences.
    We know that [Elon Musk is polluting the Memphis suburbs with impunity by running
    illegal gas generator powered data centers](https://futurism.com/elon-musk-memphis-illegal-generators). [Data
    centers are taking up double-digit percentages of all power](https://www.visualcapitalist.com/mapped-data-center-electricity-consumption-by-state/) generated
    in some US states. Water supplies are [being exhausted](https://chicago.suntimes.com/environment/2025/08/20/data-centers-ai-artificial-intelligence-chicago-illinois-great-lakes-michigan-drinking-water-jb-pritzker) or [polluted](https://www.eesi.org/articles/view/data-centers-and-water-consumption) by
    these same data centers that serve AI applications to users. Let’s remember that
    the choices we make are not abstract, and be conscientious about when we use AI
    and why. The 95% of failed AI projects weren’t just expensive in terms of time
    and money spent by businesses — they cost us all something.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在我结束之前，我想提醒大家，这些试图建造宫殿而不是足够好的公寓的尝试，有着实实在在的后果。我们知道，[埃隆·马斯克通过运营非法的燃气发电机供电的数据中心，在孟菲斯郊区肆无忌惮地污染环境](https://futurism.com/elon-musk-memphis-illegal-generators)。[在一些美国州，数据中心正在消耗所有电力中的两位数百分比](https://www.visualcapitalist.com/mapped-data-center-electricity-consumption-by-state/)。水资源正被这些为用户提供AI应用的数据中心[耗尽](https://chicago.suntimes.com/environment/2025/08/20/data-centers-ai-artificial-intelligence-chicago-illinois-great-lakes-michigan-drinking-water-jb-pritzker)或[污染](https://www.eesi.org/articles/view/data-centers-and-water-consumption)。让我们记住，我们做出的选择不是抽象的，在使用AI时要有意识地考虑为什么使用。95%的失败AI项目不仅仅是企业在时间和金钱上的损失——它们也让我们所有人都付出了代价。
