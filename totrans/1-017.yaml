  prefs: []
  type: TYPE_NORMAL
- en: '[2] Ross Girshick *et al.* Rich feature hierarchies for accurate object detection
    and semantic segmentation. Arxiv. [https://arxiv.org/pdf/1311.2524](https://arxiv.org/pdf/1311.2524)
    [Accessed July 5, 2025].'
  prefs: []
  type: TYPE_NORMAL
- en: '[3] Mengqi Lei *et al.* YOLOv13: Real-Time Object Detection with Hypergraph-Enhanced
    Adaptive Visual Perception. Arxiv. [https://arxiv.org/abs/2506.17733](https://arxiv.org/abs/2506.17733)
    [Accessed July 5, 2025].'
  prefs: []
  type: TYPE_NORMAL
- en: '[4] Image generated by author with Gemini, edited by author.'
  prefs: []
  type: TYPE_NORMAL
- en: '[5] Image originally created by author.'
  prefs: []
  type: TYPE_NORMAL
- en: '[6] Bing Xu *et al.* Empirical Evaluation of Rectified Activations in Convolutional
