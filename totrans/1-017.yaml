- en: 'YOLOv1 Paper Walkthrough: The Day YOLO First Saw the World'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/yolov1-paper-walkthrough-the-day-yolo-first-saw-the-world/](https://towardsdatascience.com/yolov1-paper-walkthrough-the-day-yolo-first-saw-the-world/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1764722956521" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If we talk about object detection, one model that likely comes to our mind first
    is YOLO — well, at least for me, thanks to its popularity in the field of computer
    vision.
  prefs: []
  type: TYPE_NORMAL
- en: 'The very first version of this model, referred to as YOLOv1, was released back
    in 2015 in the research paper titled “*You Only Look Once: Unified, Real-Time
    Object Detection”* [1]. Before YOLOv1 was invented, one of the state-of-the-art
    algorithms for performing object detection was R-CNN (Region-based Convolutional
    Neural Network), in which it uses multi-stage mechanism to do the task. It initially
    employs selective search algorithm to create region proposal, then uses CNN-based
    model to extract the features within all these regions, and finally classifies
    the detected objects using SVM [2]. Here you can clearly imagine how long the
    process is just to perform object detection on a single image.'
  prefs: []
  type: TYPE_NORMAL
- en: The motivation of YOLO in the first place was to improve speed. In fact, not
    only achieving low computational complexity, but the authors proved that their
    proposed deep learning model was also able to achieve high accuracy. As this article
    is written, YOLOv13 has just published several days ago [3]. But let’s just talk
    about its very first ancestor for now so that you can see the beauty of this model
    starting from the time it first came out. This article is going to discuss how
    YOLOv1 works and how to build this neural network architecture from scratch with
    PyTorch.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Underlying Theory Behind YOLOv1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before we get into the architecture, it would be better if we understand the
    idea behind YOLOv1 in advance. Let’s start with an example. Suppose we have a
    picture of a cat, and we are about to use it as a training sample of a YOLOv1
    model. And so, we need to create a ground truth for that. It is mentioned in the
    original paper that we need to define the parameter *S*, which denotes the number
    of grid cells we are going to divide our image into along each spatial dimension.
    By default, this parameter is set to 7, so we will have 7×7=49 cells in total.
    Take a look at Figure 1 below to better understand this idea.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ab6d65bc897d0a9d891e9ebce8d7abbd.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1\. What the image looks like after being divided into uniform-sized
    grid cells. The cell (3, 3) is responsible to store the information about the
    cat [4].
  prefs: []
  type: TYPE_NORMAL
- en: Next, we need to determine which cell corresponds to the midpoint of the object.
    In the above case, the cat is located almost exactly at the center of the image,
    hence the midpoint must lie at cell (3, 3). Later in the inference phase, we can
    think of this cell as the one responsible to predict the cat. Now taking a closer
    look at the cell, we need to determine the exact position of the midpoint. Here
    you can see that along the vertical axis it is located exactly in the middle,
    but in the horizontal axis it is slightly shifted to the left from the middle.
    So, if I were to approximate, the coordinate would be (0.4, 0.5). This coordinate
    value is relative to the cell and is normalized to the range of 0 to 1\. It might
    be worth noting that the (*x*, *y*) coordinate of the midpoint should neither
    be less than 0 nor greater than 1, since a value outside this range would mean
    the midpoint lies in another cell. Meanwhile, the width *w* and the height *h*
    of the bounding box are approximately 2.4 and 3.2, respectively. These numbers
    are relative to the cell size, meaning that if the object is bigger than the cell,
    then the value will be greater than 1\. Later on, if we were to create a ground
    truth for an image, we need to store all these *x*, *y*, *w* and *h* information
    in the so-called *target vector*.
  prefs: []
  type: TYPE_NORMAL
- en: Target Vector
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The length of the target vector itself is 25 for each cell, in which the first
    20 elements (index 0 to 19) store the class of the object in form of one-hot encoding.
    This is essentially because YOLOv1 was originally trained on PASCAL VOC dataset
    which has that number of classes. Next, index 20 is used to store the confidence
    of the bounding box prediction, which in the training phase this is set to 1 whenever
    there is an object midpoint within the cell. Lastly, the (*x*, *y*) coordinate
    of the midpoint are placed at indices 21 and 22, whereas *w* and *h* are stored
    at indices 23 and 24\. The illustration in Figure 2 below displays what the target
    vector for cell (3, 3) looks like.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/84cc2b6282bbf1aa3f854f2473c872a0.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2\. The target vector for cell (3, 3) of the image in Figure 1 [5].
  prefs: []
  type: TYPE_NORMAL
- en: Again, remember that the above target vector only corresponds to a single cell.
    To create the ground truth for the entire image, we need to have a bunch of similar
    vectors concatenated, forming the so-called *target tensor* as shown in Figure
    3\. Note that the class probabilities as well as the bounding box confidences,
    locations, and sizes from all other cells are set to zero because there is no
    other object appearing within the image.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/38d0466674642c3967b4c5be543b8c8f.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3\. How all target vectors from each cell are concatenated. This entire
    tensor will act as the ground truth of a single image [5].
  prefs: []
  type: TYPE_NORMAL
- en: Prediction Vector
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The *prediction vector* is quite a bit different. If the target vector consists
    of 25 elements, the prediction vector consists of 30\. This is because by default
    YOLOv1 predicts two bounding boxes for the same object during inference. Thus,
    we need 5 additional elements to store the information about the second bounding
    box generated by the model. Despite predicting two bounding boxes, later we will
    only take the one that has greater confidence.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/19c4cf0336b91ba0083474cd39db9cdd.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4\. The prediction vector has 5 additional elements dedicated for the
    second bounding box (highlighted in orange) [5].
  prefs: []
  type: TYPE_NORMAL
- en: This unique target and prediction vector dimensions required the authors to
    rethink the loss function. For regression problems, we typically use MAE, MSE
    or RMSE, whereas for classification tasks we usually use cross entropy loss. But
    YOLOv1 is more than just a regression and classification problem, considering
    that we have both continuous (bounding box) and discrete (class) values in the
    vector representation. Thanks to this reason, the authors created a new loss function
    specialized for this model as shown in Figure 5\. This loss function is quite
    complex (you see, right?), so I decided to write it in a separate article because
    there are lots of things to explain about it — stay tuned, I’ll publish it very
    soon.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8edfa7d1228c33f4847535d4e0cb93ec.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5\. The loss function of YOLOv1 [1].
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The YOLOv1 Architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Just like typical earlier computer vision models, YOLOv1 uses CNN-based architecture
    as the backbone of the model. It comprises 24 convolution layers stacked according
    to the structure in Figure 6\. If you take a closer look at the figure, you will
    notice that the output layer produces a tensor of shape 30×7×7\. This dimension
    indicates that every single cell has its corresponding prediction vector of length
    30 containing the class and the bounding box information of the detected object,
    in which this matches exactly with our previous discussion.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7b6f8a46e0a180ea3041caff85fbf742.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6\. The architecture of YOLOv1 [1].
  prefs: []
  type: TYPE_NORMAL
- en: Well, I think I’ve covered all the fundamentals of YOLOv1, so now let’s start
    implementing the architecture from scratch with PyTorch. Before doing anything,
    what we need to do first is to import the required modules and initialize the
    parameters *S*, *B*, and *C*. See Codeblock 1 below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The three parameters I initialized above are the default values given in the
    paper, in which `S` represents the number of grid cells along the horizontal and
    vertical axes, `B` denotes the number of bounding boxes generated by each cell,
    and `C` is the number of classes available in the dataset. Since we use `S=7`
    and `B=2`, our YOLOv1 will produce7×7×2=98 bounding boxes in total for each image.
  prefs: []
  type: TYPE_NORMAL
- en: The Building Block
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we are going to create the `ConvBlock` class, in which it contains a single
    convolution layer (line `#(1)`), a leaky ReLU activation function (`#(2)`), and
    an optional maxpooling layer (`#(3)`) as shown in Codeblock 2.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: In modern architectures, we normally use the *Conv-BN-ReLU* structure, but at
    the time YOLOv1 was created, it seems like batch normalization layer was not quite
    popular just yet, as it came out only several months before YOLOv1\. So, I guess
    this is probably the reason that the authors did not utilize this normalization
    layer. Instead, it only uses a stack of convolutions and leaky ReLUs throughout
    the entire network.
  prefs: []
  type: TYPE_NORMAL
- en: Just a quick refresher, leaky ReLU is an activation function similar to the
    standard ReLU, except that the negative values are multiplied with a small number
    instead of being zeroed out. In the case of YOLOv1, we set the multiplier to 0.1
    (`#(2)`) so that it can still preserve a little bit amount of information contained
    in the negative input numbers.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8c131e3981a660c22224ce943e14c287.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7\. ReLU vs Leaky ReLU activation functions [6].
  prefs: []
  type: TYPE_NORMAL
- en: As the `ConvBlock` class has been defined, now I am going to test it just to
    check if it works properly. In Codeblock 3 below I try to implement the very first
    layer in the network and pass a dummy tensor through it. You can see in the codeblock
    that `in_channels` is set to 3 (`#(1)`) and `out_channels` is set to 64 (`#(2)`)
    because we want this initial layer to accept an RGB image as the input and return
    a 64-channel image. The size of the kernel is 7×7 (`#(3)`), hence we need to set
    the padding to 3 (`#(5)`). Normally, this configuration allows us to preserve
    the spatial dimension of the image, but since we use `stride=2` (`#(4)`), this
    padding size ensures that the image is exactly halved. Next, if you go back to
    Figure 6, you will notice that some conv layers are followed by a maxpooling layer
    and some others are not. Since the first convolution utilizes a maxpooling layer,
    we need to set the `maxpool_flag` parameter to `True` (`#(6)`).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Afterwards, we can simply generate a tensor of random values with the dimension
    of 1×3×448×448 (`#(7)`) which simulates a batch of a single RGB image of size
    448×448 and then pass it through the network. You can see in the resulting output
    below that our convolution layer successfully increased the number of channels
    to 64 and halved the spatial dimension to 224×224\. The halving was done once
    again all the way to 112×112 thanks to the maxpooling layer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The Backbone
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next thing we are going to do is to create a sequence of `ConvBlocks` to
    build the entire backbone of the network. In case you’re still not familiar with
    the term *backbone*, in this case it is essentially everything before the two
    fully-connected layers (refer to Figure 6). Now look at the Codeblock 4a and 4b
    below to see how I define the `Backbone` class.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: What we do in the above codeblock is to instantiate `ConvBlock` instances according
    to the architecture given in the paper. There are several things I want to emphasize
    here. First, the term *stage* I use in the code is not explicitly mentioned in
    the paper. However, I decided to use that word to describe the six groups of convolutional
    layers in Figure 6\. Second, notice that we need to set the `maxpool_flag` to
    `True` for the last `ConvBlock` in the first four groups to perform spatial downsampling
    (`#(1–4)`). For the fifth group, the downsampling is done by setting the stride
    of the last convolution layer to 2 (`#(5)`). Third, Figure 6 does not mention
    the padding size of the convolution layers, so we need to calculate them manually.
    There is indeed a specific formula to find padding size based on the given kernel
    size. However, I feel like it is much easier to memorize it. Just keep in mind
    that if we use kernel of size 7×7, then we need to set the padding to 3 to preserve
    the spatial dimension. Meanwhile, for 5×5, 3×3 and 1×1 kernels, the padding should
    be set to 2, 1, and 0, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: As all layers in the backbone have been instantiated, we can now connect them
    all using the `forward()` method below. I don’t think I need to explain anything
    here since it basically only works by passing the input tensor `x` through the
    layers sequentially.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Now let’s verify if our implementation is correct by running the following testing
    code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: If you try to run the above codeblock, the following output should appear on
    your screen. Here you can see that the spatial dimension of the image correctly
    got reduced after the last `ConvBlock` of each stage. This process continued all
    the way to the last stage until eventually we obtained a tensor of size 1024×7×7,
    in which this matches exactly with the illustration in Figure 6.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The Fully-Connected Layers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After the backbone is done, we can now move on to the fully-connected part,
    which I write in Codeblock 6 below. This part of the network is very simple as
    it mainly only consists of two linear layers. Speaking of the details, it is mentioned
    in the paper that the authors apply a dropout layer with the rate of 0.5 (`#(3)`)
    between the first (`#(1)`) and the second (`#(4)`) linear layers. It is important
    to note that the leaky ReLU activation function is still used (`#(2)`) but only
    after the first linear layer. This is because the second one acts as the output
    layer, hence it does not require any activation applied to it.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Run the Codeblock 7 below to see how the tensor transforms as it is processed
    by the stack of linear layers.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: We can see in the above output that the `fc` block takes an input of shape 50176,
    which is essentially the flattened 1024×7×7 tensor. The `linear0` layer works
    by mapping this input into 4096-dimensional vector, and then the `linear1` layer
    eventually maps it further to 1470\. Later in the post-processing stage we need
    to reshape it to 30×7×7 so that we can take the bounding box and the object classification
    results easily. Technically speaking, this reshaping process can be done either
    internally by the model or outside the model. For the sake of simplicity, I decided
    to leave the output flattened, meaning the reshaping will be handled externally.
  prefs: []
  type: TYPE_NORMAL
- en: Connecting the FC Part to the Backbone
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: At this point we already have our backbone and the fully-connected layers done.
    Thus, they are now ready to be assembled to construct the entire YOLOv1 architecture.
    There is not much thing I can explain regarding the following code, as what we
    do here is only instantiating both parts and connect them in the `forward()` method.
    Just don’t forget to flatten (`#(1)`) the output of `backbone` to make it compatible
    with the input of the `fc` block.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: In order to test our model, we can simply instantiate the `YOLOv1` model and
    pass a dummy tensor that simulates an RGB image of size 448×448 (`#(1)`). After
    feeding the tensor into the network (`#(2)`), I also try to simulate the post-processing
    step by reshaping the output tensor to 30×7×7 as shown at line `#(3)`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: And below is what the output looks like after the code above is run. Here you
    can see that our input tensor successfully flows through all layers within the
    entire network, indicating that our YOLOv1 model works properly and thus is ready
    to train.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Ending
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It might be worth noting that all the codes I show you throughout this entire
    article is for the base YOLOv1 architecture. It is mentioned in the paper that
    the authors also proposed the lite version of this model which they refer to as
    *Fast YOLO*. This smaller YOLOv1 version offers faster computation time as it
    only consists of 9 convolution layers instead of 24\. Unfortunately, the paper
    does not provide the implementation details, so I cannot demonstrate you how to
    implement that one.
  prefs: []
  type: TYPE_NORMAL
- en: Here I encourage you to play around with the above code. In theory, it is possible
    to replace the CNN-based backbone with other deep learning models, such as ResNet,
    ResNeXt, ViT, etc. All you need to do is just to match the output shape of the
    backbone with the input shape of the fully-connected part. Not only that, I also
    want you to try training this model from scratch. But if you decided to do so,
    you might probably want to make this model smaller by reducing the depth (no of
    convolution layers) or the width (no of kernels) of the model. This is essentially
    because the authors mentioned that they required around a week just to do the
    pretraining on ImageNet dataset, not to mention the time for fine tuning on the
    object detection task.
  prefs: []
  type: TYPE_NORMAL
- en: And well, I think that’s pretty much everything I can explain you about how
    YOLOv1 works and its architecture. Please let me know if you spot any mistake
    in this article. Thank you!
  prefs: []
  type: TYPE_NORMAL
- en: '*By the way, the code used in this article is also available on my GitHub repo
    [7].*'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
