- en: How to Create an LLM Judge That Aligns with Human Labels
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-create-an-llm-judge-that-aligns-with-human-labels/](https://towardsdatascience.com/how-to-create-an-llm-judge-that-aligns-with-human-labels/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1752872676004" class="mdspan-comment">If you are building</mdspan>
    applications with LLMs, you’ve probably run into this challenge: how do you evaluate
    the quality of the AI system’s output?'
  prefs: []
  type: TYPE_NORMAL
- en: Say, you want to check whether a response has the right tone. Or whether it’s
    safe, on-brand, helpful, or makes sense in the context of the user’s question.
    These are all examples of qualitative signals that are not easy to measure.
  prefs: []
  type: TYPE_NORMAL
- en: The issue is that these qualities are often subjective. There is no single “correct”
    answer. And while humans are good at judging them, humans don’t scale. If you
    are testing or shipping LLM-powered features, you will eventually need a way to
    automate that evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: 'LLM-as-a-judge is a popular method for doing this: you prompt an LLM to evaluate
    the outputs of another LLM. It’s flexible, fast to prototype, and easy to plug
    into your workflow.'
  prefs: []
  type: TYPE_NORMAL
- en: 'But there is a catch: your LLM judge is also not deterministic. In practice,
    it’s like running a small machine learning project, where the goal is to replicate
    expert labels and decisions.'
  prefs: []
  type: TYPE_NORMAL
- en: In a way, what you are building is an automated labeling system.
  prefs: []
  type: TYPE_NORMAL
- en: That means you must also evaluate the evaluator to check whether your LLM judge
    aligns with human judgment.
  prefs: []
  type: TYPE_NORMAL
- en: In this blog post, we will show how to create and tune an LLM evaluator that
    aligns with human labels – not just how to prompt it, but also how to test and
    trust that it’s working as expected.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will finish with a practical example: building a judge that scores the quality
    of code review comments generated by an LLM.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Disclaimer: I am one of the creators of Evidently, an open-source tool that
    we’ll be using in this example. We will use the free and open-source functionality
    of the tool. We will also mention the use of Open AI and Anthropic models as LLM
    evaluators. These are commercial models, and it will cost a few cents on API calls
    to reproduce the example. (You can also replace them for open-source models).*'
  prefs: []
  type: TYPE_NORMAL
- en: What is an LLM evaluator?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LLM evaluator – or [LLM-as-a-judge](https://www.evidentlyai.com/llm-guide/llm-as-a-judge)
    – is a popular technique that uses LLMs to assess the quality of outputs from
    AI-powered applications.
  prefs: []
  type: TYPE_NORMAL
- en: 'The idea is simple: you define the evaluation criteria and ask an LLM to be
    the “judge.” Say, you have a chatbot. You can ask an external LLM to evaluate
    its responses, looking at things like relevance, helpfulness, or coherence – similar
    to what a human evaluator can do. For example, each response can be scored as
    “good” or “bad,” or assigned to any specific category based on your needs.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/405973732563b522b3b88cd5d27c37e6.png)'
  prefs: []
  type: TYPE_IMG
- en: '*The idea behind LLM-as-a-judge. Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: Using an LLM to evaluate another LLM might sound counterintuitive at first.
    But in practice, judging is often easier than generating. Creating a high-quality
    response requires understanding complex instructions and context. Evaluating that
    response, on the other hand, is a more narrow, focused task – and one that LLMs
    can handle surprisingly well, as long as the criteria are clear.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at how it works!
  prefs: []
  type: TYPE_NORMAL
- en: How to create an LLM evaluator?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since the goal of an LLM evaluator is to scale human judgments, the first step
    is to define what you want to evaluate. This will depend on your specific context
    – whether it’s tone, helpfulness, safety, or something else.
  prefs: []
  type: TYPE_NORMAL
- en: While you can write a prompt upfront to express your criteria, a more robust
    approach is to act as the judge first. You can start by labeling a dataset the
    way you would want the LLM evaluator to behave later. Then treat those labels
    as your target and try writing the evaluation prompt to match them. This way,
    you will be able to measure how well your LLM evaluator aligns with human judgment.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the core idea. We will walk through each step in more detail below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9ef1c859f551cb99ff2cb9d8793bcef6.png)'
  prefs: []
  type: TYPE_IMG
- en: '*The workflow for creating an LLM judge. Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Define what to judge'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first step is to decide what you’re evaluating.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes this is obvious. Say, you’ve already observed a specific failure mode
    when analyzing the LLM responses – e.g., a chatbot refusing to answer or repeating
    itself – and you want to build a scalable way to detect it.
  prefs: []
  type: TYPE_NORMAL
- en: Other times, you’ll need to first run test queries and label your data manually
    to identify patterns and develop generalizable evaluation criteria.
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s important to note: you don’t have to create one cover-it-all LLM evaluator.
    Instead, you can create multiple “small” judges, each focusing on a specific pattern
    or evaluation flow. For example, you can use LLM evaluators to:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Detect failure modes**, like refusals to answer, repetitive answers, or missed
    instructions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Calculate proxy quality metrics**, including faithfulness to context, relevance
    to the answer, or correct tone.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Run scenario-specific evaluations,** like testing how the LLM system handles
    adversarial inputs, brand-sensitive topics, or edge cases**.** These test-specific
    LLM judges can check for correct refusals or adherence to safety guidelines**.**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Analyze** user interactions, like classifying responses by topic, query type,
    or intent.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The key is scoping each evaluator narrowly, as well-defined, specific tasks
    are where LLMs excel.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Label the data'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before you ask an LLM to make judgments, you need to be the judge yourself.
  prefs: []
  type: TYPE_NORMAL
- en: You can manually label a sample of responses. Or you can create a simple labeling
    judge and then review and correct its labels. This labeled dataset will be your
    “ground truth” that reflects your preferred judgment criteria.
  prefs: []
  type: TYPE_NORMAL
- en: 'As you do this, keep things simple:'
  prefs: []
  type: TYPE_NORMAL
- en: Stick to binary or few-class labels. While a 1-10 scale might seem appealing,
    complex rating scales are difficult to apply consistently.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make your labeling criteria clear enough for another human to follow them.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, you can label the responses on whether the tone is “acceptable”,
    “not acceptable” or “borderline”.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b429258479493bf9338385e197186a76.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Stick to binary or low-precision scores for better consistency. Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Write the evaluation prompt'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you know what you are looking for, it’s time to build the LLM evaluator!
    Evaluation prompts are the core of your LLM judge.
  prefs: []
  type: TYPE_NORMAL
- en: The core idea is that you should write this evaluation prompt yourself. This
    way, you can customize it to your use case and leverage domain knowledge to improve
    the quality of your instructions over a generic prompt.
  prefs: []
  type: TYPE_NORMAL
- en: If you use a tool with built-in prompts, you should test them against your labeled
    data first to ensure the rubric aligns with your expectations.
  prefs: []
  type: TYPE_NORMAL
- en: You can think of writing prompts as giving instructions to an intern doing the
    task for the first time. Your goal is to make sure your instructions are clear
    and specific, and provide examples of what “good” and “bad” mean for your use
    case in a way that another human can follow them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Evaluate and iterate'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once your evaluation prompt is ready, run it across your labeled dataset and
    compare the outputs against the “ground truth” human labels.
  prefs: []
  type: TYPE_NORMAL
- en: To evaluate the quality of the LLM evaluator, you can use correlation metrics,
    like Cohen’s Kappa, or classification metrics, like accuracy, precision, and recall.
  prefs: []
  type: TYPE_NORMAL
- en: 'Based on the evaluation results, you can iterate on your prompt: look for patterns
    to identify areas for improvement, adjust the judge and re-evaluate its performance.
    Or you can automate this process through [prompt optimization](https://www.evidentlyai.com/blog/llm-judge-prompt-optimization)!'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Deploy the evaluator'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once your judge is aligned with human preferences, you can put it to work, replacing
    manual review with automated labeling through the LLM evaluator.
  prefs: []
  type: TYPE_NORMAL
- en: For example, you can use it during prompt experiments to fix a specific failure
    mode. Say, you observe a high rate of refusals, where your LLM chatbot frequently
    denies the user queries it should be able to answer. You can create an LLM evaluator
    that automatically detects such refusals to answer.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have it in place, you can easily experiment with different models,
    tweak your prompts, and get measurable feedback on whether your system’s performance
    gets better or worse.
  prefs: []
  type: TYPE_NORMAL
- en: 'Code tutorial: evaluating the quality of code reviews'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, let’s apply the process we discussed in a real example, end-to-end.
  prefs: []
  type: TYPE_NORMAL
- en: We will create and evaluate an LLM judge to assess the quality of code reviews.
    Our goal is to create an LLM evaluator that aligns with human labels.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this tutorial, we will:'
  prefs: []
  type: TYPE_NORMAL
- en: Define the evaluation criteria for our LLM evaluator.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build an LLM evaluator using different prompts/models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluate the quality of the judge by comparing results to human labels.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will use [Evidently](https://www.evidentlyai.com/), an open-source LLM evaluation
    library with over 25 million downloads.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: '**Complete code:** follow along with this [example notebook](https://github.com/evidentlyai/community-examples/blob/main/learn/LLMCourse_Tutorial_2_LLM_as_a_judge.ipynb).'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Prefer video?** Watch the [video tutorial](https://www.youtube.com/watch?v=kP_aaFnXLmY&list=PL9omX6impEuNTr0KGLChHwhvN-q3ZF12d&index=6).'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Preparation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To start, install Evidently and run the necessary imports:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: You can see the complete code in the [example notebook](https://github.com/evidentlyai/community-examples/blob/main/learn/LLMCourse_Tutorial_2_LLM_as_a_judge.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: You will also need to set up your API keys for LLM judges. In this example,
    we will use OpenAI and Anthropic as the evaluator LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: Dataset and evaluation criteria
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We will use a dataset that comprises 50 code reviews with expert labels – 27
    “bad” and 23 “good” examples. Each entry includes:'
  prefs: []
  type: TYPE_NORMAL
- en: Generated review text
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Expert label (good/bad)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Expert comment explaining the reasoning behind assigned labels.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/d12c0934997cb45005feb3308a05b91c.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Examples of generated reviews and expert labels from the dataset. Image by
    author*'
  prefs: []
  type: TYPE_NORMAL
- en: The dataset used in the example was generated by the author and is available
    [here](https://github.com/evidentlyai/community-examples/blob/main/datasets/code_review_dataset.csv).
  prefs: []
  type: TYPE_NORMAL
- en: 'This dataset is an example of the “ground truth” dataset you can curate with
    your product experts: it shows how a human judges the responses. Our goal is to
    create an LLM evaluator that returns the same labels.'
  prefs: []
  type: TYPE_NORMAL
- en: If you analyze the human expert comments, you can notice that the reviews are
    primarily judged on actionability – *Do they provide actual guidance?* – and tone
    – *Are they constructive rather than harsh? *
  prefs: []
  type: TYPE_NORMAL
- en: Our goal with creating the LLM evaluator will be to generalize these criteria
    in a prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Initial prompt and interpretation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s start with a basic prompt. Here is how we express our criteria:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: In this case, we use an Evidently LLM evaluator template, which takes care of
    generic parts of the evaluator prompt – like asking for classification, structured
    output, and step-by-step reasoning – so we only need to express the actual criteria
    and give the target labels.
  prefs: []
  type: TYPE_NORMAL
- en: We will use GPT-4o mini as an evaluator LLM. Once we have the final prompt,
    we will run the LLM evaluator over the generated reviews and compare the good/bad
    labels it returns against the expert ones.
  prefs: []
  type: TYPE_NORMAL
- en: To see how well our naive evaluator matches the expert labels, we will look
    at classification metrics like [accuracy, precision, and recall](https://www.evidentlyai.com/classification-metrics/accuracy-precision-recall).
    We will visualize the results using the Classification Report in the Evidently
    library.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1e6d1575d6b8339536b503256e3b1c59.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Alignment with human labels and classification metrics for the initial prompt.
    Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, only 67% of the judge labels matched the labels given by human
    experts.
  prefs: []
  type: TYPE_NORMAL
- en: The 100% precision score means that when our evaluator identified a review as
    “bad,” it was always correct. However, the low recall indicates that it missed
    many problematic reviews – our LLM evaluator made 18 errors.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see if we can do better with a more detailed prompt!
  prefs: []
  type: TYPE_NORMAL
- en: 'Experiment 2: more detailed prompt'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can look closer at the expert comments and specify what we mean by “good”
    and “bad” in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a refined prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: We made the changes manually this time, but you can also employ an LLM to [help
    you rewrite the prompt](https://www.evidentlyai.com/blog/llm-judge-prompt-optimization).
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s run the evaluation once again:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b06e2a48eac09269d18f831df0e64ca4.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Classification metrics for a more detailed prompt. Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: Much better!
  prefs: []
  type: TYPE_NORMAL
- en: We got 96% accuracy and 92% recall. Being more specific about evaluation criteria
    is the key. The evaluator got only two labels wrong.
  prefs: []
  type: TYPE_NORMAL
- en: Although the results already look pretty good, there are a few more tricks we
    can try.
  prefs: []
  type: TYPE_NORMAL
- en: 'Experiment 3: ask to explain the reasoning'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here’s what we will do – we will use the same prompt but ask the evaluator
    to explain the reasoning one more time:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/55e0ca08a925d8d55220eec3dc9a225f.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Classification metrics for a detailed prompt, if we ask to explain the reasoning.
    Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: Adding one simple line pushed performance to 98% accuracy with only one error
    in the entire dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 'Experiment 4: switch models'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When you are already happy with your prompt, you can try running it with a
    cheaper model. We use GPT-4o mini as a baseline for this experiment and re-run
    the prompt with GPT-3.5 Turbo. Here’s what we’ve got:'
  prefs: []
  type: TYPE_NORMAL
- en: 'GPT-4o mini: 98% accuracy, 92% recall'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'GPT-3.5 Turbo: 72% accuracy, 48% recall'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/62703d9251b2586683c4a1815bcc6f65.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Classification metrics for a detailed prompt, if we switch to a cheaper model
    (GRT-3.5 Turbo). Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Such a difference in performance brings us to an important consideration: prompt
    and model work together. Simpler models may require different prompting strategies
    or more examples.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Experiment 5: switch providers'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can also check how our LLM evaluator works with different providers – let’s
    see how it performs with Anthropic’s Claude.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a6fdf6907a64803b3378555f49277514.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Classification metrics for a detailed prompt using another provider (Anthropic).
    Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: Both providers achieved the same high level of accuracy, with slightly different
    error patterns.
  prefs: []
  type: TYPE_NORMAL
- en: 'The table below summarizes the results of the experiment:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Scenario** | **Accuracy** | **Recall** | **# of errors** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Simple prompt | 67% | 36% | 18 |'
  prefs: []
  type: TYPE_TB
- en: '| Detailed prompt | 96% | 92% | 2 |'
  prefs: []
  type: TYPE_TB
- en: '| “Always explain your reasoning” | 98% | 96% | 1 |'
  prefs: []
  type: TYPE_TB
- en: '| GPT-3.5 Turbo | 72% | 48% | 13 |'
  prefs: []
  type: TYPE_TB
- en: '| Claude | 96% | 92% | 2 |'
  prefs: []
  type: TYPE_TB
- en: '*Table 1\. Experiment results: tested scenarios and classification metrics*'
  prefs: []
  type: TYPE_NORMAL
- en: Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this tutorial, we went through an end-to-end workflow for creating an LLM
    evaluator to assess the quality of code reviews. We defined the evaluation criteria,
    prepared the expert-labeled dataset, crafted and refined the evaluation prompt,
    ran it against different scenarios, and compared the results until we aligned
    our LLM judge with human labels.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can adapt this workflow to fit your specific use case. Here are some of
    the takeaways to keep in mind:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Be the judge first.** Your LLM evaluator is there to scale the human expertise.
    So the first step is to make sure you have clarity on what you are evaluating.
    Starting with your own labels on a set of representative examples is the best
    way to get there. Once you have it, use the labels and expert comments to determine
    the criteria for your evaluation prompt.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Focus on consistency.** Perfect alignment with human judgment isn’t always
    necessary or realistic – after all, humans can also disagree with each other.
    Instead, aim for consistency in your evaluator’s judgments.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Consider using multiple specialized judges.** Rather than creating one comprehensive
    evaluator, you can split the criteria into separate judges. For example, actionability
    and tone could be evaluated independently. This makes it easier to tune and measure
    the quality of each judge.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Start simple and iterate.** Begin with naive evaluation prompts and gradually
    add complexity based on the error patterns. Your LLM evaluator is a small prompt
    engineering project: treat it as such, and measure the performance.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Run evaluation prompt with different models.** There is no single best prompt:
    your evaluator combines both the prompt and the model. Test your prompts with
    different models to understand performance trade-offs. Consider factors like accuracy,
    speed, and cost for your specific use case.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Monitor and tune.** LLM judge is a small machine learning project in itself.
    It requires ongoing monitoring and occasional recalibration as your product evolves
    or new failure modes emerge.'
  prefs: []
  type: TYPE_NORMAL
