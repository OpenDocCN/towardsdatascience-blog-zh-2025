- en: 'NumPy for Absolute Beginners: A Project-Based Approach to Data Analysis'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: NumPy绝对入门：基于项目的方法进行数据分析
- en: 原文：[https://towardsdatascience.com/numpy-for-absolute-beginners-a-project-based-approach-to-data-analysis/](https://towardsdatascience.com/numpy-for-absolute-beginners-a-project-based-approach-to-data-analysis/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/numpy-for-absolute-beginners-a-project-based-approach-to-data-analysis/](https://towardsdatascience.com/numpy-for-absolute-beginners-a-project-based-approach-to-data-analysis/)
- en: <mdspan datatext="el1762287817531" class="mdspan-comment">To learn NumPy, I’ve
    been</mdspan> running a series where I build mini projects. I’ve built a [Personal
    Habit](https://towardsdatascience.com/using-numpy-to-analyze-my-daily-habits-sleep-screen-time-mood/)
    and [Weather Analysis](https://towardsdatascience.com/hidden-gems-in-numpy-7-functions-every-data-scientist-should-know/)
    project. But I haven’t really gotten the chance to explore the full power and
    capability of NumPy. I want to try to understand why NumPy is so useful in data
    analysis. To wrap up this series, I’m going to be showcasing this in real time.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762287817531" class="mdspan-comment">为了学习NumPy，我一直在</mdspan>进行一系列构建小型项目的活动。我构建了一个[个人习惯](https://towardsdatascience.com/using-numpy-to-analyze-my-daily-habits-sleep-screen-time-mood/)和[天气分析](https://towardsdatascience.com/hidden-gems-in-numpy-7-functions-every-data-scientist-should-know/)项目。但我还没有真正有机会探索NumPy的全部功能和能力。我想尝试理解为什么NumPy在数据分析中如此有用。为了结束这个系列，我将实时展示这一点。
- en: I’ll be using a fictional client or company to make things interactive. In this
    case, our client is going to be **EnviroTech Dynamics**, a global operator of
    industrial sensor networks.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我将使用一个虚构的客户或公司来使事情互动。在这种情况下，我们的客户将是**EnviroTech Dynamics**，一个全球工业传感器网络的运营商。
- en: Currently, EnviroTech relies on outdated, loop-based Python scripts to process
    over **1 million sensor readings daily**. This process is agonizingly slow, delaying
    critical maintenance decisions and impacting operational efficiency. They need
    a modern, high-performance solution.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，EnviroTech依赖于过时的基于循环的Python脚本来处理每天超过**100万次传感器读数**。这个过程非常缓慢，延迟了关键维护决策，影响了运营效率。他们需要一个现代化、高性能的解决方案。
- en: I’ve been tasked with creating a NumPy-based proof-of-concept to demonstrate
    how to **turbocharge their data pipeline**.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我被要求创建一个基于NumPy的证明概念，以展示如何**加速他们的数据管道**。
- en: 'The Dataset: Simulated Sensor Readings'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集：模拟传感器读数
- en: 'To prove the concept, I’ll be working with a large, simulated dataset generated
    using NumPy‘s random module, featuring entries with the following key arrays:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为了证明这个概念，我将使用NumPy的随机模块生成的大型模拟数据集进行工作，其中包含以下关键数组：
- en: Temperature —Each data point represents how hot a machine or system component
    is running. These readings can quickly help us detect when a machine starts overheating — a
    sign of possible failure, inefficiency, or safety risk.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 温度 — 每个数据点代表机器或系统组件运行时的热度。这些读数可以快速帮助我们检测到机器开始过热的情况——这是可能故障、效率低下或安全风险的迹象。
- en: Pressure — data showing how much pressure is building up inside the system,
    and if it is within a safe range
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 压力 — 显示系统内部压力积累的数据，以及它是否在安全范围内
- en: Status codes — represent the health or state of each machine or system at a
    given moment. 0 (Normal), 1 (Warning), 2 (Critical), 3 (Faulty/Missing).
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 状态码 — 代表在特定时刻每个机器或系统的健康状况或状态。0（正常），1（警告），2（关键），3（故障/缺失）。
- en: Project Objectives
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目目标
- en: 'The core goal is to provide four clear, vectorised solutions to EnviroTech’s
    data challenges, demonstrating speed and power. So I’ll be showcasing all of these:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 核心目标是提供四个清晰、向量化的解决方案来解决EnviroTech的数据挑战，展示速度和力量。所以，我将展示所有这些：
- en: Performance and efficiency benchmark
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性能和效率基准
- en: Foundational statistical baseline
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础统计基线
- en: Critical anomaly detection and
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键异常检测
- en: Data cleaning and imputation
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据清洗和插补
- en: By the end of this article, you should be able to get a full grasp of NumPy
    and its usefulness in data analysis.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 到这篇文章结束时，你应该能够全面掌握NumPy及其在数据分析中的实用性。
- en: 'Objective 1: Performance and Efficiency Benchmark'
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 目标1：性能和效率基准
- en: First, we need a massive dataset to make the speed difference obvious. I’ll
    be using the **1,000,000 temperature readings** we planned earlier.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要一个庞大的数据集来使速度差异明显。我将使用我们之前计划的**100万次温度读数**。
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Output:**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now that we have our records. Let’s check out the effectiveness of NumPy.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了我们的记录。让我们看看NumPy的有效性。
- en: Assuming we wanted to calculate the average of all these elements using a standard
    Python loop, it’ll go something like this.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要使用标准的 Python 循环计算所有这些元素的平均值，它将类似于这样。
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: There’s nothing wrong with this method. But it’s quite slow, because the computer
    has to process each number one by one, constantly moving between the Python interpreter
    and the CPU.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法没有问题。但是它相当慢，因为计算机必须逐个处理每个数字，不断地在 Python 解释器和 CPU 之间移动。
- en: To truly showcase the speed, I’ll be using the`%timeit` command. This runs the
    code hundreds of times to provide a reliable average execution time.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 为了真正展示速度，我将使用 `%timeit` 命令。这个命令会运行代码数百次，以提供可靠的平均执行时间。
- en: '[PRE3]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**Output**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出**'
- en: '[PRE4]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Using the `-n 10`, I’m basically running the code in the loop 10 times (to get
    a stable average), and using the `-r 5`, the whole process will be repeated 5
    times (for even more stability).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `-n 10`，我基本上是在循环中运行代码 10 次（以获得稳定的平均值），使用 `-r 5`，整个过程将重复 5 次（以获得更多的稳定性）。
- en: Now, let’s compare this with NumPy vectorisation. And by vectorisation, it means
    the entire operation (average in this case) will be performed on the entire array
    at once, using highly optimised C code in the background.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将这个与 NumPy 的矢量化进行比较。通过矢量化，我的意思是整个操作（在这个例子中是平均值）将一次性在整个数组上执行，使用后台高度优化的
    C 代码。
- en: Here’s how the average will be calculated using NumPy
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这是使用 NumPy 计算平均值的示例
- en: '[PRE5]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '**Output:**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE6]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Now let’s time it.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们计时。
- en: '[PRE7]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**Output:**'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE8]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Now, that’s a huge difference. That’s like almost non-existent. That’s the power
    of vectorisation.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这是一个巨大的差异。这几乎是不存在的。这就是矢量化（vectorisation）的力量。
- en: 'Let’s present this speed difference to the client:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们向客户展示这个速度差异：
- en: “We compared two methods for performing the same calculation on one million
    temperature readings — a traditional Python for-loop and a NumPy vectorized operation.
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “我们比较了两种在百万个温度读数上执行相同计算的方法—传统的 Python for 循环和 NumPy 矢量化操作。
- en: ''
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The difference was dramatic: The pure Python loop took about **244 milliseconds**
    per run while the NumPy version completed the same task in just **1.49 milliseconds**.'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 差异非常显著：纯 Python 循环每次运行大约需要 **244 毫秒**，而 NumPy 版本只需 **1.49 毫秒**就完成了同样的任务。
- en: ''
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: That’s roughly a **160× speed improvement**.”
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这大约是 **160 倍的速度提升**。”
- en: 'Objective 2: Foundational Statistical Baseline'
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 目标 2：基础统计基准
- en: 'Another cool feature NumPy offers is the ability to perform basic to advanced
    statistics — this way, you can get a good overview of what’s going on in your
    dataset. It offers operations like:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 提供的另一个酷炫功能是能够执行基本的到高级的统计计算—这样，你可以很好地了解你的数据集中发生了什么。它提供了如下操作：
- en: np.mean() — to calculate the average
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.mean() — 用于计算平均值
- en: np.median — the middle value of the data
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.median — 数据的中值
- en: np.std() — shows how spread out your numbers are from the average
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.std() — 显示你的数字与平均值的离散程度
- en: np.percentile() — tells you the value below which a certain percentage of your
    data falls.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.percentile() — 告诉你数据中某个百分比以下的价值。
- en: Now that we’ve managed to provide an alternative and efficient solution to retrieve
    and perform summaries and calculations on their huge dataset, we can start playing
    around with it.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经成功提供了一个替代且高效的解决方案来检索和对其庞大的数据集进行总结和计算，我们可以开始尝试使用它。
- en: We already managed to generate our simulated temperature data. Let’s do the
    same for pressure. Calculating pressure is a great way to demonstrate the ability
    of NumPy to handle multiple massive arrays in no time at all.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经成功生成了模拟的温度数据。让我们为压力做同样的处理。计算压力是展示 NumPy 能够在极短的时间内处理多个大型数组能力的好方法。
- en: For our client, it also allows me to showcase a health check on their industrial
    systems.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的客户，这也允许我展示他们对工业系统的健康检查。
- en: Also, temperature and pressure are often related. A sudden pressure drop might
    be the cause of a spike in temperature, or vice versa. Calculating baselines for
    both allows us to see if they are drifting together or independently
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，温度和压力通常相关。压力的突然下降可能是温度上升的原因，反之亦然。计算两者的基线使我们能够看到它们是否一起或独立地漂移。
- en: '[PRE9]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '**Output: **'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE10]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Alright, let’s begin our calculations.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，让我们开始计算。
- en: '[PRE11]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '**Here’s the output:**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**以下是输出：**'
- en: '[PRE12]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: So to explain what you’re seeing here
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了解释你在这里看到的内容
- en: '**The Mean (Average): 44.98°C** basically gives us a central point around which
    most readings are expected to fall. This is pretty cool because we don’t have
    to scan through the entire large dataset. With this number, I’ve gotten a pretty
    good idea of where our temperature readings usually fall.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**平均值（平均数）：44.98°C**基本上给出了一个中心点，大多数读数预计会落在这个点周围。这非常酷，因为我们不需要扫描整个大型数据集。有了这个数字，我已经对温度读数通常落在哪里有了相当好的了解。'
- en: '**The Median (Middle): 44.99°C** is quite identical to the mean if you notice.
    This tells us that there aren’t extreme outliers dragging the average too high
    or too low.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**中位数（中间值）：44.99°C**如果你注意的话，与平均值非常相似。这告诉我们，没有极端的异常值将平均值拉得太高或太低。'
- en: '**The standard deviation of 12°C** means the temperatures vary quite a bit
    from the average. Basically, some days are much hotter or cooler than others.
    A lower value (say 3°C or 4°C) would have suggested more consistency, but 12°C
    indicates a highly variable pattern.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**12°C的标准差**意味着温度与平均值差异很大。基本上，有些日子比其他日子热或冷得多。一个较低的值（比如说3°C或4°C）会表明更多的稳定性，但12°C表明一个高度可变的模式。'
- en: For the **percentile**, it basically means most days hover between 25°C and
    65°C,
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**百分位数**，基本上意味着大多数日子在25°C和65°C之间徘徊，
- en: 'If I were to present this to the client, I could put it like this:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我要向客户展示这个，我可能会这样说：
- en: “On average, the system (or environment) maintains a temperature around **45°C**,
    which serves as a reliable baseline for typical operating or environmental conditions.
    A deviation of 12°C indicates that temperature levels fluctuate significantly
    around the average.
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “平均而言，系统（或环境）维持在大约**45°C**的温度，这作为典型操作或环境条件的可靠基线。12°C的偏差表明温度水平在平均值周围波动很大。
- en: ''
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To put it simply, the readings are not very stable. Lastly, 90% of all readings
    fall between 25°C and 65°C. This gives a realistic picture of what “normal” looks
    like, helping you define acceptable thresholds for alerts or maintenance. To improve
    performance or reliability, we could identify the causes of high fluctuations
    (e.g., external heat sources, ventilation patterns, system load).”
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 简单来说，读数并不非常稳定。最后，90%的所有读数都落在25°C和65°C之间。这为我们描绘了“正常”的实际情况，有助于你定义警报或维护的可接受阈值。为了提高性能或可靠性，我们可以确定高波动的原因（例如，外部热源、通风模式、系统负载）。
- en: Let’s calculate for pressure also.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们也为压力计算一下。
- en: '[PRE13]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: To improve our codebase, I’m storing all the calculations performed in a dictionary
    called pressure stats, and I’m simply looping over the key-value pairs.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 为了改进我们的代码库，我将所有计算存储在一个名为pressure stats的字典中，我只是简单地遍历键值对。
- en: '**Here’s the output:**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**以下是输出：**'
- en: '[PRE14]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'If I were to present this to the client. It’d go something like this:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我要向客户展示这个，可能会是这样的：
- en: “Our **pressure readings average around** **300 kilopascals**, and the median — the
    middle value — is almost the same. That tells us the pressure distribution is
    quite balanced overall. However, the **standard deviation is about 115 kPa**,
    which means there’s a lot of variation between readings. In other words, some
    readings are much higher or lower than the typical 300 kPa level.
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “我们的**压力读数平均约为** **300千帕**，中位数——中间值——几乎相同。这告诉我们压力分布总体上相当平衡。然而，**标准差约为115 kPa**，这意味着读数之间有很大的差异。换句话说，有些读数比典型的300
    kPa水平高得多或低得多。
- en: Looking at the **percentiles**, 90% of our readings fall between **120 and 480
    kPa**. That’s a wide range, suggesting that pressure conditions are not stable — possibly
    fluctuating between low and high states during operation. So while the average
    looks fine, the variability could point to **inconsistent performance** or **environmental
    factors** affecting the system.”
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 看一下**百分位数**，90%的读数落在**120至480 kPa**之间。这是一个很大的范围，表明压力条件不稳定——可能在操作期间在低和高状态之间波动。所以虽然平均看起来不错，但变异性可能指向**不一致的性能**或**影响系统的环境因素**。
- en: 'Objective 3: Critical Anomaly Identification'
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 目标3：关键异常识别
- en: One of my favourite features of NumPy is the ability to quickly identify and
    filter out anomalies in your dataset. To demonstrate this, our fictional client,
    EnviroTech Dynamics, provided us with another helpful array that contains system
    status codes. This tells us how the machine is consistently operating. It’s simply
    a range of codes (0–3).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy我最喜欢的功能之一是能够快速识别和过滤数据集中的异常值。为了演示这一点，我们的虚构客户EnviroTech Dynamics为我们提供了一个包含系统状态代码的有用数组。这告诉我们机器是如何持续运行的。它只是一个代码范围（0-3）。
- en: '**0** → Normal'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0** → 正常'
- en: '**1** → Warning'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**1** → 警告'
- en: '**2** → Critical'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**2** → 关键'
- en: '**3** → Sensor Error'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**3** → 传感器错误'
- en: They receive millions of readings per day, and our job is to find every machine
    that’s both in a critical state and running dangerously hot.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 他们每天接收数百万个读数，我们的任务是找到每个既处于关键状态又运行过热的机器。
- en: Doing this manually, or even with a loop, would take ages. This is where Boolean
    Indexing (masking) comes in. It lets us filter huge datasets in milliseconds by
    applying logical conditions directly to arrays, without loops.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 用手工或甚至用循环来做这件事会花费很长时间。这就是布尔索引（掩码）发挥作用的地方。它允许我们通过直接将逻辑条件应用于数组来在毫秒内过滤大量数据集，而不需要循环。
- en: Earlier, we generated our temperature and pressure data. Let’s do the same for
    the status codes.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 之前，我们生成了温度和压力数据。让我们为状态代码做同样的事情。
- en: '[PRE15]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '**Output:**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE16]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Each temperature reading now has a matching status code. This allows us to pinpoint
    *which* sensors report problems and *how severe* they are.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 每个温度读数现在都有一个匹配的状态代码。这使我们能够确定哪些传感器报告了问题以及它们有多严重。
- en: Next, we’ll need some sort of threshold or anomaly criteria. In most scenarios,
    anything above **mean + 3 × standard deviation** is considered a severe outlier,
    the kind of reading you don’t want in your system. To compute that
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们需要某种类型的阈值或异常标准。在大多数情况下，任何超过**平均值 + 3 × 标准差**的数据都被认为是严重的异常值，是你不希望出现在系统中的读数。为了计算这个
- en: '[PRE17]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '**Output:**'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE18]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Next, we’ll create two filters (masks) to isolate data that meets our conditions.
    One for readings where the system status is Critical (code 2) and another for
    readings where the temperature exceeds the threshold.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将创建两个过滤器（掩码）来隔离符合我们条件的数据。一个用于系统状态为关键（代码2）的读数，另一个用于温度超过阈值的读数。
- en: '[PRE19]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Here’s what’s going on behind the scenes. NumPy creates two arrays filled with
    True or False. Every True marks a reading that satisfies the condition. True will
    be represented as 1, and False will be represented as 0\. Summing them quickly
    counts how many match.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是幕后发生的事情。NumPy创建了两个填充着True或False的数组。每个True标记一个满足条件的读数。True将表示为1，False将表示为0。快速求和可以计算匹配的数量。
- en: 'Here’s the output:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这是输出：
- en: '[PRE20]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Let’s combine both anomalies before printing our final result. We want readings
    that are both critical and too hot. NumPy allows us to filter on multiple conditions
    using logical operators. In this case, we’ll be using the AND function represented
    as `&.`
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在打印最终结果之前将这两个异常合并。我们想要的是既关键又过热的读数。NumPy允许我们使用逻辑运算符对多个条件进行过滤。在这种情况下，我们将使用表示为`&.`的AND函数。
- en: '[PRE21]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '**Output:**'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE22]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Let’s present this to the client
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们向客户展示这个
- en: “After analyzing one million temperature readings, our system detected **34
    critical anomalies** — readings that were both flagged as ‘critical status’ by
    the machine and exceeded the high-temperature threshold.
  id: totrans-109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “在分析了一百万个温度读数后，我们的系统检测到**34个关键异常**——这些读数既被机器标记为“关键状态”，又超过了高温阈值。
- en: ''
  id: totrans-110
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The first few of these readings fall between **81°C and 86°C**, which is well
    above our normal operating range of around 45°C. This suggests that a small number
    of sensors are reporting **dangerous spikes**, possibly indicating overheating
    or sensor malfunction.
  id: totrans-111
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这些读数的前几个在**81°C和86°C之间**，这远远高于我们大约45°C的正常工作范围。这表明少数传感器报告了**危险的峰值**，可能表明过热或传感器故障。
- en: In other words, while 99.99% of our data looks stable, these 34 points represent
    the **exact spots** where we should focus maintenance or investigate further.”
  id: totrans-112
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 换句话说，虽然我们99.99%的数据看起来很稳定，但这两个34个点代表了我们应该关注维护或进一步调查的**确切位置**。”
- en: Let’s visualise this real quick with matplotlib
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用matplotlib快速可视化一下
- en: '![](../Images/893e8d767b9deacb98fb617f9be6d414.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/893e8d767b9deacb98fb617f9be6d414.png)'
- en: When I first plotted the results, I expected to see a cluster of red bars showing
    my critical anomalies. But there were none.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 当我第一次绘制结果时，我预期会看到一簇红色柱状图显示我的关键异常。但一个都没有。
- en: 'At first, I thought something was wrong, but then it clicked. Out of one million
    readings, only 34 were critical. That’s the beauty of Boolean masking: it detects
    what your eyes can’t. Even when the anomalies hide deep within millions of normal
    values, NumPy flags them in milliseconds.'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 起初，我以为出了问题，但后来我想通了。在一百万个读数中，只有34个是关键的。这就是布尔掩码的美丽之处：它检测到你的眼睛看不到的东西。即使异常隐藏在数百万个正常值中，NumPy也能在毫秒内标记它们。
- en: 'Objective 4: Data Cleaning and Imputation'
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 目标4：数据清洗和插补
- en: Lastly, NumPy allows you to get rid of inconsistencies and data that doesn’t
    make sense. You might have come across the concept of data cleaning in data analysis.
    In Python, NumPy and Pandas are often used to streamline this activity.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，NumPy允许你消除不一致和不合逻辑的数据。你可能已经接触到了数据分析中数据清洗的概念。在Python中，NumPy和Pandas通常用于简化这一活动。
- en: To demonstrate this, our `status_codes` contain entries with a value of 3 (Faulty/Missing).
    If we use these faulty temperature readings in our overall analysis, they will
    skew our results. The solution is to replace the faulty readings with a statistically
    sound estimated value.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示这一点，我们的`status_codes`包含值为3（故障/缺失）的条目。如果我们将这些故障温度读数用于我们的整体分析，它们将扭曲我们的结果。解决方案是将故障读数替换为统计上合理的估计值。
- en: The first step is to figure out what value we should use to replace the bad
    data. The median is always a great choice because, unlike the mean, it is less
    affected by extreme values.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是确定我们应该使用什么值来替换不良数据。中位数总是一个很好的选择，因为它与平均值不同，受极端值的影响较小。
- en: '[PRE23]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: '**Output:**'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE24]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Now, we’ll perform some conditional replacement using the powerful `np.where()`
    function. Here’s a typical structure of the function.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将使用强大的`np.where()`函数进行一些条件替换。以下是该函数的典型结构。
- en: '**np.where(Condition, Value_if_True, Value_if_False)**'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**np.where(条件, 如果为真则使用的值, 如果为假则使用的值)**'
- en: 'In our case:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的案例中：
- en: '**Condition:** Is the status code **3** (Faulty/Missing)?'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**条件：**状态码是否为**3**（故障/缺失）？'
- en: '**Value if True:** Use our calculated `valid_median_temp`.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如果为真则使用的值：**使用我们计算的`valid_median_temp`。'
- en: '**Value if False:** Keep the original temperature reading.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如果错误：**保留原始温度读数。'
- en: '[PRE25]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: '**Output:**'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE26]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: I didn’t expect the missing values to be this much. It probably affected our
    reading above in some way. Good thing, we managed to replace them in seconds.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我没有预料到缺失值会这么多。这可能在某种程度上影响了我们之前的阅读。幸运的是，我们设法在几秒钟内就替换了它们。
- en: Now, let’s verify the fix by checking the median for both the original and cleaned
    data
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们通过检查原始数据和清理后的数据的平均值来验证修复。
- en: '[PRE27]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: '**Output:**'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE28]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: In this case, even after cleaning over 20,000 faulty records, the median temperature
    remained steady at **44.99°C,** indicating that the dataset is statistically sound
    and balanced.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，即使在清理超过20,000条故障记录之后，平均温度仍然稳定在**44.99°C**，这表明数据集在统计上是有声望且平衡的。
- en: 'Let’s present this to the client:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们向客户展示这一点：
- en: “Out of one million temperature readings, **20,102** were marked as faulty (status
    code = 3). Instead of removing these faulty records, we replaced them with the
    **median temperature value (≈ 45°C)** — a standard data-cleaning approach that
    keeps the dataset consistent without distorting the trend.
  id: totrans-140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “在一百万个温度读数中，**20,102**个被标记为故障（状态码=3）。我们不是删除这些故障记录，而是用**平均温度值（≈ 45°C）**来替换它们——这是一种标准的数据清洗方法，它保持了数据集的一致性，而没有扭曲趋势。
- en: 'Interestingly, the **median temperature remained unchanged (44.99°C)** before
    and after cleaning. That’s a good sign: it means the faulty readings didn’t skew
    the dataset, and the replacement didn’t alter the overall data distribution.”'
  id: totrans-141
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 有趣的是，在清理前后，**平均温度保持不变（44.99°C）**。这是一个好兆头：这意味着故障读数没有扭曲数据集，替换也没有改变整体数据分布。
- en: Conclusion
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'And there we go! We initiated this project to address a critical issue for
    **EnviroTech Dynamics**: the need for faster, loop-free data analysis. The power
    of NumPy arrays and vectorisation allowed us to fix the problem and future-proof
    their analytical pipeline.'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 现在开始了！我们启动这个项目是为了解决**EnviroTech Dynamics**的一个关键问题：对更快、无循环的数据分析的需求。NumPy数组和向量化技术的力量使我们能够解决问题，并确保他们的分析流程具有未来性。
- en: NumPy ndarray is the silent engine of the entire Python data science ecosystem.
    Every major library, like **Pandas**, **scikit-learn**, **TensorFlow**, and **PyTorch,**
    uses NumPy arrays at its core for fast numerical computation.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy ndarray是整个Python数据科学生态系统的无声引擎。每个主要库，如**Pandas**、**scikit-learn**、**TensorFlow**和**PyTorch**，都使用NumPy数组作为其核心进行快速数值计算。
- en: By mastering NumPy, you’ve built a powerful analytical foundation. The next
    logical step for me is to move from single arrays to structured analysis with
    the Pandas library, which organises NumPy arrays into tables (DataFrames) for
    even easier labelling and manipulation.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 通过掌握NumPy，你已经建立了一个强大的分析基础。对我来说，下一步的逻辑步骤是从单个数组过渡到使用Pandas库进行结构化分析，该库将NumPy数组组织成表格（DataFrames），以便更容易地进行标签化和操作。
- en: 'Thanks for reading! Feel free to connect with me:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！请随时与我联系：
