- en: ''
  id: totrans-40
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Total probabilities: 99.999970%'
  id: totrans-41
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 总概率：99.999970%
- en: '[PRE6]'
  id: totrans-42
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '>>> import tiktoken'
  id: totrans-43
  prefs:
  - PREF_BQ
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '>>> 导入 tiktoken'
- en: '>>> encoding = tiktoken.encoding_for_model("gpt-4o-2024-08-06")'
  id: totrans-44
  prefs:
  - PREF_BQ
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '>>> encoding = tiktoken.encoding_for_model("gpt-4o-2024-08-06")'
- en: '>>> encoding.encode(''Tails'')'
  id: totrans-45
