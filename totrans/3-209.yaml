- en: Avoidable and Unavoidable Randomness in GPT-4o
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GPT-4o中的可避免和不可避免随机性
- en: 原文：[https://towardsdatascience.com/avoidable-and-unavoidable-randomness-in-gpt-4o/](https://towardsdatascience.com/avoidable-and-unavoidable-randomness-in-gpt-4o/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/avoidable-and-unavoidable-randomness-in-gpt-4o/](https://towardsdatascience.com/avoidable-and-unavoidable-randomness-in-gpt-4o/)
- en: Of course there is randomness in GPT-4o’s outputs. After all, the model samples
    from a probability distribution when choosing each token. But what I didn’t understand
    was that those very probabilities themselves are not deterministic. Even with
    consistent prompts, fixed seeds, and temperature set to zero, GPT-4o still introduces
    subtle, frustrating randomness.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，GPT-4o的输出中存在随机性。毕竟，在选择每个标记时，模型是从一个概率分布中进行采样的。但我没有理解的是，那些概率本身并不是确定的。即使有一致的提示、固定的种子和温度设置为零，GPT-4o仍然引入了微妙而令人沮丧的随机性。
- en: There’s no fix for this, and it might not even be something OpenAI *could* fix
    if they wanted to, just so we’re clear up front about where this article is headed.
    Along the way, we’ll examine all the sources of randomness in GPT-4o output, which
    will require us to break down the sampling process to a low level. We’ll point
    at the issue—the probabilities vary—and critically examine OpenAI’s official guidance
    on determinism.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个问题，没有解决办法，而且即使OpenAI想要解决这个问题，也可能无法解决，这样我们就可以清楚地了解这篇文章的方向。在这个过程中，我们将检查GPT-4o输出中所有随机性的来源，这将需要我们将采样过程分解到低级别。我们将指出问题——概率在变化——并批判性地审查OpenAI关于确定性的官方指南。
- en: 'First, though, let’s talk about why determinism matters. Determinism means
    that the same input always produces the same output, like a mathematical function.
    While LLM creativity is often desirable, determinism serves crucial purposes:
    researchers need it for reproducible experiments, developers for verifying reported
    results, and prompt engineers for debugging their changes. Without it, you’re
    left wondering if different outputs stem from your tweaks or just the random number
    generator’s mood swings.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们谈谈为什么确定性很重要。确定性意味着相同的输入总是产生相同的输出，就像一个数学函数。虽然LLM的创造力通常是可取的，但确定性具有至关重要的作用：研究人员需要它来进行可重复的实验，开发者需要它来验证报告的结果，提示工程师需要它来调试他们的更改。没有它，你只能猜测不同的输出是由于你的调整还是随机数生成器的情绪波动。
- en: Flipping a coin
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 抛硬币
- en: 'We’re going to keep things extremely simple here and prompt the most recent
    version of GPT-4o (`gpt-4o-2024-08-06` in the API) with this:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将保持这里的操作极其简单，并使用以下内容提示GPT-4o的最新版本（API中的`gpt-4o-2024-08-06`）：
- en: '` Flip a coin. Return Heads or Tails only.`'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '` 抛硬币。只返回正面或反面。`'
- en: Flipping a coin with LLMs is a fascinating topic in itself (see for example
    Van Koevering & Kleinberg, 2024 in the references), but here, we’ll use it as
    a simple binary question with which to explore determinism, or the lack thereof.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 使用LLM抛硬币本身就是一个有趣的话题（例如，参见参考文献中的Van Koevering & Kleinberg，2024），但在这里，我们将使用它作为一个简单的二元问题来探索确定性，或者缺乏确定性。
- en: This is our first attempt.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们的第一次尝试。
- en: '[PRE0]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Running the code gave me `Heads`. Maybe you’ll get `Tails`, or if you’re really
    lucky, something far more interesting.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 运行代码给了我“正面”。也许你会得到“反面”，或者如果你真的很幸运，可能会得到一些更有趣的结果。
- en: The code first initializes an OpenAI client with an API key set in the environment
    variable `OPENAI_API_KEY` (to avoid sharing billing credentials here). The main
    action happens with client.chat.completions.create, where we specify the model
    to use and send the prompt (as a part of a very simple conversation named messages)
    to the server. We get an object called response back from the server. This object
    contains a lot of information, as shown below, so we need to dig into it to extract
    GPT-4o’s actual response to the message, which is `response.choices[0].message.content`.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 代码首先使用环境变量`OPENAI_API_KEY`（为了避免在这里共享计费凭证）初始化一个OpenAI客户端。主要操作发生在`client.chat.completions.create`，在那里我们指定要使用的模型，并将提示（作为名为messages的非常简单的对话的一部分）发送到服务器。我们从服务器返回一个名为response的对象。这个对象包含大量信息，如下所示，因此我们需要深入挖掘以提取GPT-4o对消息的实际响应，即`response.choices[0].message.content`。
- en: '[PRE1]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now let’s flip the coin ten times. If this were a real, fair coin, of course,
    we would expect roughly equal heads and tails over time thanks to the law of large
    numbers. But GPT-4o’s coin doesn’t work quite like that.
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 现在让我们抛硬币十次。如果这是一个真实、公平的硬币，当然，由于大数定律，随着时间的推移，我们会期望头和尾大致相等。但GPT-4o的硬币并不完全是这样工作的。
- en: ''
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_PRE
  zh: '[PRE2]'
- en: ''
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Running this code gave me the following output, although you might get different
    output, of course.
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 运行此代码给了我以下输出，尽管你可能会得到不同的输出，当然。
- en: ''
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_PRE
  zh: '[PRE3]'
- en: ''
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: GPT-4o’s coin is clearly biased, but so are humans. Bar-Hillel, Peer, and Acquisti
    (2014) found that people flipping imaginary coins choose “heads” 80% of the time.
    Maybe GPT-4o learned that from us. But whatever the reason, we’re just using this
    simple example to explore determinism.
  id: totrans-22
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: GPT-4o的硬币显然是有偏的，但人类也是如此。Bar-Hillel、Peer和Acquisti（2014）发现，人们在抛想象中的硬币时80%的时间选择“头”。也许GPT-4o从我们这里学到了这一点。但无论原因如何，我们只是用这个简单的例子来探索确定性。
- en: ''
  id: totrans-23
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: Just how biased is GPT-4o’s coin?
  id: totrans-24
  prefs:
  - PREF_BQ
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
  zh: GPT-4o的硬币有多偏？
- en: ''
  id: totrans-25
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: Let’s say we wanted to know precisely what percentage of GPT-4o coin flips land
    Heads.
  id: totrans-26
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 假设我们想知道GPT-4o硬币抛掷中“头”出现的精确百分比。
- en: ''
  id: totrans-27
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Rather than the obvious (but expensive) approach of flipping it a million times,
    there’s a smarter way. For classification tasks with a small set of possible answers,
    we can extract token probabilities instead of generating full responses. With
    the right prompt, the first token carries all the necessary information, making
    these API calls incredibly cheap: around 30,000 calls per dollar, since each requires
    just 18 (cached) input tokens and 1 output token.'
  id: totrans-28
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 与抛一百万次（虽然昂贵）的明显方法相比，有一种更聪明的方法。对于具有少量可能答案的分类任务，我们可以提取标记概率而不是生成完整的响应。有了正确的提示，第一个标记就包含了所有必要的信息，这使得这些API调用非常便宜：大约每美元30,000次调用，因为每次调用只需要18（缓存的）输入标记和1个输出标记。
- en: ''
  id: totrans-29
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: OpenAI gives us (natural) log probabilities. These are called logprobs in the
    code, and we convert them to regular probabilities by exponentiation. (We’ll discuss
    temperature soon, but note that exponentiating logprobs directly like this corresponds
    to a temperature setting of 1.0, and is how we calculate probabilities throughout
    this article). OpenAI lets us request logprobs for the top 20 most likely tokens,
    so we do that.
  id: totrans-30
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: OpenAI为我们提供（自然）对数概率。在代码中，这些被称为logprobs，我们通过指数运算将它们转换为常规概率。（我们很快会讨论温度，但请注意，直接像这样指数运算logprobs对应于温度设置为1.0，这是我们在这篇文章中计算概率的方式）。OpenAI允许我们请求前20个最可能标记的对数概率，所以我们就是这样做的。
- en: ''
  id: totrans-31
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-32
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_PRE
  zh: '[PRE4]'
- en: ''
  id: totrans-33
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you run this, you’ll get *something* like the following output, but actual
    numbers *will* vary.
  id: totrans-34
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果您运行此代码，您将得到类似以下输出，但实际数字会*变化*。
- en: ''
  id: totrans-35
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE5]       |    -16.7880535126 |     0.0000051173 |'
  id: totrans-36
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[PRE5]  |  -16.7880535126 |  0.0000051173 |'
- en: '| Here''s    |    -16.9130535126 |     0.0000045160 |'
  id: totrans-37
