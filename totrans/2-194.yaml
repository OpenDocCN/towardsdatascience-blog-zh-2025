- en: STOP Building Useless ML Projects – What Actually Works
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/stop-building-useless-ml-projects-what-actually-works/](https://towardsdatascience.com/stop-building-useless-ml-projects-what-actually-works/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1751308065686" class="mdspan-comment">I get asked</mdspan>
    all the time:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '*“What projects should I do to get a job in data science or machine learning?”*'
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This question is flawed from the beginning.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: A great project is personal to you, which means any project I suggest will automatically
    be a “bad” choice.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I aim to break down the types of projects that actually help
    you get hired and the framework you can follow to find them.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: 4–5 simple projects
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Start by building 4–5 smaller projects to give your portfolio some initial weight.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: The primary goal here is mainly for “optics” and to ensure that your resume/CV,
    GitHub, and LinkedIn profiles appear active and well-populated.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Please take a few weeks to build these smaller projects, ensuring they are of
    sufficient quality and not something you hastily generated with ChatGPT.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Aim to build a wide range of projects, each using different tools, datasets,
    and machine learning algorithms.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Algorithms and ML models
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'I recommend you have projects with the following algorithms:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '[**Gradient Boosted Trees**](https://xgboost.readthedocs.io/en/stable/) — The
    gold standard algorithm for tabular data, so it’s something you will definitely
    use on the job.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Neural Networks** ](https://medium.com/@egorhowell/list/neural-networks-616db722dbbb)— Good
    understanding of deep learning frameworks like [**TensorFlow**](https://www.tensorflow.org/)
    or [**PyTorch**](https://pytorch.org/) is valuable, especially if you want to
    work in computer vision, NLP or AI.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Clustering Algorithms** — Models like [**K-Means**](https://en.wikipedia.org/wiki/K-means_clustering)
    and [**DBSCAN**](https://www.datacamp.com/tutorial/dbscan-clustering-algorithm)
    demonstrate your grasp of unsupervised learning, which is needed for some roles.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Getting exciting and novel data
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s much better to obtain a messier and more realistic dataset that reflects
    the data you will encounter in the real world. This will impress employers and
    interviewers even more, directly demonstrating your abilities as a data scientist.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: When selecting datasets for your projects, avoid using overused datasets such
    as **[MNIST](https://www.kaggle.com/datasets/hojjatk/mnist-dataset)**, **[Titanic](https://www.kaggle.com/datasets/yasserh/titanic-dataset)**,
    or **[Iris](https://www.kaggle.com/datasets/uciml/iris)**. If I saw these, it
    would be an instant rejection, or at the very least, put me off a lot.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: 'Some good places to get data:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Use public and free APIs — you can check out the [**free-apis**](https://free-apis.github.io/#/)
    site for some ideas.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Web scrape data from relevant sites (make sure you are allowed to do this first!) — [**Here**](https://www.clay.com/blog/websites-that-allow-web-scraping#which-websites-allow-web-scraping)
    is a list of websites that allow web scraping.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从相关网站抓取数据（确保你首先被允许这样做！）——[**这里**](https://www.clay.com/blog/websites-that-allow-web-scraping#which-websites-allow-web-scraping)是一个允许网络抓取的网站列表。
- en: Public government data sources — [**data.gov**](https://data.gov/) is an example
    you can use.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公共政府数据来源——[**data.gov**](https://data.gov/)是你可以使用的例子。
- en: Gather your own data through surveys and questionnaires.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过调查和问卷收集自己的数据。
- en: To decide what your projects should be on, it’s best to start by answering specific
    questions you think will be interesting to discover from the data.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 要决定你的项目应该是什么，最好的办法是先回答你认为从数据中发现的有趣的具体问题。
- en: I recommend showcasing your results using tools like **[Streamlit](https://streamlit.io/)**
    or deploying a simple model via **[GitHub Actions](https://github.com/features/actions)**.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议使用**[Streamlit](https://streamlit.io/)**或通过**[GitHub Actions](https://github.com/features/actions)**部署一个简单的模型来展示你的结果。
- en: However, don’t stress about building a fully end-to-end production system using
    something like **[AWS](https://aws.amazon.com/?nc2=h_lg)** or its services, such
    as **[EC2](https://aws.amazon.com/ec2/)** or **[ECS](https://aws.amazon.com/ecs/)**.
    At this stage, it’s completely fine if you don’t know how to do that, and it’s
    not the goal of these small projects.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，不要过于担心使用**[AWS](https://aws.amazon.com/?nc2=h_lg)**或其服务（如**[EC2](https://aws.amazon.com/ec2/)**或**[ECS](https://aws.amazon.com/ecs/)**）构建一个完整的端到端生产系统。在这个阶段，如果你不知道如何做，是完全正常的，这也不是这些小型项目的目标。
- en: One big project
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个大项目
- en: This is where you really need to focus and take your time.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你真正需要集中精力并花时间的地方。
- en: After you’ve built your smaller projects, it’s time to make one big project.
    This one might take a couple of months if you’re working on it for an hour or
    two each day.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在你构建了较小的项目之后，是时候做一个大项目了。如果你每天花一两个小时来做，这个项目可能需要几个月的时间。
- en: This may intimidate you, but you need to put in the effort if you want a project
    that stands out from the rest.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能会让你感到害怕，但如果你想有一个与众不同的项目，你就需要付出努力。
- en: '*The question is, what should you build?*'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '*问题是，你应该构建什么？*'
- en: As I mentioned earlier, I can’t choose this project for you, but I can provide
    a framework to follow, allowing you to find a great project yourself.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如我之前提到的，我不能为你选择这个项目，但我可以提供一个框架供你遵循，让你自己找到一个出色的项目。
- en: Example project
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例项目
- en: '*Let me give you an example of a great project.*'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '*让我给你举一个出色项目的例子。*'
- en: At my previous company, we were hiring for a junior data scientist to work on
    [**optimisation**](https://medium.com/@egorhowell/list/optimisation-algorithms-069bf9c6c8d5)
    and [**operations research**](https://en.wikipedia.org/wiki/Operations_research)
    problems.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在我之前的公司，我们正在招聘一名初级数据科学家，负责处理[**优化**](https://medium.com/@egorhowell/list/optimisation-algorithms-069bf9c6c8d5)和[**运筹学**](https://en.wikipedia.org/wiki/Operations_research)问题。
- en: 'The candidate we hired stood out for one main reason: they had a highly relevant
    and deeply personal project that closely matched the role.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们雇佣的候选人之所以突出，主要原因之一是他们有一个高度相关且非常个人化的项目，这与角色非常匹配。
- en: They were passionate about NFL fantasy football and wanted to improve how they
    built their weekly lineups (this is similar to the Fantasy Premier League in the
    UK).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 他们对NFL梦幻足球充满热情，并希望改进他们每周组建阵容的方式（这类似于英国的梦幻英超联赛）。
- en: So, they developed their own optimisation engine to allocate players more effectively
    within the constraints of the program.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，他们开发了自己的优化引擎，在程序的约束条件下更有效地分配玩家。
- en: It wasn’t just the engine itself; they read academic papers on optimisation
    strategies and studied how others were approaching the same problem.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是引擎本身；他们阅读了关于优化策略的学术论文，并研究了其他人如何处理相同的问题。
- en: '*Do you see why this was such a powerful project?*'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '*你看到为什么这是一个如此强大的项目了吗？*'
- en: It was a personal problem that they were interested in.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们感兴趣的是一个个人问题。
- en: It was unique, and we hadn’t seen anything like it before or since.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是独一无二的，我们之前和之后都没有见过类似的东西。
- en: It showed their passion and interest in optimisation and operations research.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这显示了他们对优化和运筹学的热情和兴趣。
- en: It was directly relevant to the job for which they were applying.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这与他们申请的工作直接相关。
- en: My framework
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我的框架
- en: 'Here’s a simple framework for you to follow to come up with great project ideas:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个简单的框架，供你参考，以产生出色的项目想法：
- en: List at least five things you’re interested in outside of work and the data
    science or machine learning field.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each thing, come up with questions you would like answers to or other people
    may find interesting.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Think about how machine learning could help answer those questions. Don’t worry
    if the question seems impossible; be as creative as possible.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pick one question that excites you the most. Ideally, choose something that
    feels just slightly out of your reach ; that way, you will really learn and push
    yourself out of your comfort zone.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Building complexity and scale
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To make this project stand out, we need to add some complexity and scale to
    it. This means different things, and there are various ways to incorporate this.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: If you’re aiming for a role as a machine learning engineer, it’s especially
    valuable to build and deploy the project end-to-end.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 'Your project should ideally include the following:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: Data collection and storage.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data preprocessing.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model training and evaluation.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model deployment (via API, web app, etc).
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Analysis and presentation of your results.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To do this, you will need to learn some of the following:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Containerisation through things like [**Docker**](https://medium.com/data-science/from-chaos-to-consistency-docker-for-data-scientists-240372adff18?sk=68898c01460f59a75617244d19f101d1)
    and **[Kubernetes](https://kubernetes.io/)**.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CI/CD pipelines and platforms, such as **[CircleCI](https://circleci.com/)**.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Version control using **[Git](https://git-scm.com/)**.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Quality written code with **[unit tests](https://medium.com/data-science/debugging-made-easy-use-pytest-to-track-down-and-fix-python-code-ecbad62057b8?sk=c1f82fe59d96a39ce6b0ad66780a50e7)**,
    **[linting](https://medium.com/data-science/a-data-scientists-guide-to-improving-python-code-quality-21660ecea97d?sk=47ff68f9f933bc19473b0baf0b8b3d98)**,
    **[formatting](https://medium.com/data-science/a-data-scientists-guide-to-improving-python-code-quality-21660ecea97d?sk=47ff68f9f933bc19473b0baf0b8b3d98)**
    and **[strict typing](https://medium.com/data-science/a-data-scientists-guide-to-python-typing-boosting-code-clarity-194371b4ef05?sk=3392534f0fdccbf893be642cac7c9152)**.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cloud platforms like **[AWS](https://aws.amazon.com/)**, **[GCP](https://cloud.google.com/)**,
    and **[Azure](https://azure.microsoft.com/en-gb)**.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Workflow orchestration tools like **[Airflow](https://airflow.apache.org/)**,
    **[Argo](https://argoproj.github.io/workflows/)** and **[Metaflow](https://metaflow.org/)**.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And experiment tracking tools like **[MLflow](https://mlflow.org/)** or **[Weights
    & Biases](https://wandb.ai/site/)**.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It may seem like a lot, but you don’t need to do everything on this list.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: The main thing is to start and learn these things along the way; don’t try to
    learn everything at once; that’s procrastination.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: Document and communicate
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The final and arguably most essential part is to document your learning.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '***Technical skills alone won’t land you the job.***'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: Communication is one of the most essential skills to have as a machine learning
    engineer or data scientist, especially when you move up the ranks.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 沟通是作为机器学习工程师或数据科学家必须具备的最重要技能之一，尤其是在你晋升的时候。
- en: 'Show your project by:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 通过以下方式展示你的项目：
- en: Adding your projects to GitHub and having a well-documented README.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你的项目添加到GitHub，并拥有一个良好的文档化的README。
- en: Including instructions for setup and usage to enable users to explore and interact
    with your project.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包括设置和使用说明，以便用户可以探索和与你的项目互动。
- en: Write a blog post explaining your projects and how you did it.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写一篇博客文章解释你的项目以及你是如何做到的。
- en: Share it on LinkedIn, Twitter, Reddit, Discord, YouTube, or wherever people
    who may be interested in trying it are.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在领英、推特、Reddit、Discord、YouTube 或任何可能对此感兴趣的人的地方分享它。
- en: The more you share your work, the more visible you become to potential employers
    and collaborators.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你分享的工作越多，你向潜在雇主和合作伙伴展示的就越明显。
- en: '* * *'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: It’s actually not that hard to create a solid portfolio of projects; it just
    requires consistent work and patience, which most people are unwilling to do.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，创建一个坚实的项目组合并不难；这只需要持续的工作和耐心，而大多数人都不愿意这样做。
- en: There is no “quick” project that gets you hired; what will get you hired is
    taking the time to build something personal, of good quality, and novel.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 没有能让你快速被雇佣的项目；能让你被雇佣的是花时间构建一些个人、高质量且新颖的东西。
- en: That’s the secret.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是秘密。
- en: Another thing!
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 另一件事！
- en: I offer 1:1 coaching calls where we can chat about whatever you need — whether
    it’s projects, career advice, or just figuring out your next step. I’m here to
    help you move forward!
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我提供一对一的辅导通话，我们可以聊任何你需要的事情——无论是项目、职业建议，还是只是确定你的下一步。我在这里帮助你前进！
- en: '[**1:1 Mentoring Call with Egor Howell**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '[**与Egor Howell的一对一辅导通话**]'
- en: '*Career guidance, job advice, project help, resume review* topmate.io](https://topmate.io/egorhowell/1203300)'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '*职业指导、工作建议、项目帮助、简历审查* topmate.io](https://topmate.io/egorhowell/1203300)'
- en: Connect with me
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与我联系
- en: '[**YouTube**](https://www.youtube.com/@egorhowell)'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**YouTube**](https://www.youtube.com/@egorhowell)'
- en: '[**LinkedIn**](https://www.linkedin.com/in/egorhowell/)'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**领英**](https://www.linkedin.com/in/egorhowell/)'
- en: '[**Instagram**](https://www.instagram.com/egorhowell/)'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Instagram**](https://www.instagram.com/egorhowell/)'
- en: '[**Website**](https://egorhowell.com/)'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**网站**](https://egorhowell.com/)'
