- en: Creating an AI Agent to Write Blog Posts with CrewAI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/creating-an-ai-agent-to-write-blog-posts-with-crewai/](https://towardsdatascience.com/creating-an-ai-agent-to-write-blog-posts-with-crewai/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**<mdspan datatext="el1743790161212" class="mdspan-comment">Introduction</mdspan>**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I love writing. You may notice that if you follow me or my blog. For that reason,
    I am constantly producing new content and talking about Data Science and Artificial
    Intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: I discovered this passion a couple of years ago when I was just starting my
    path in Data Science, learning and evolving my skills. At that time, I heard some
    more experienced professionals in the area saying that a good study technique
    was practicing new skills and writing about it somewhere, teaching whatever you
    learned.
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition, I had just moved to the US, and nobody knew me here. So I had
    to start somewhere, creating my professional image in this competitive market.
    I remember I talked to my cousin, who’s also in the Tech industry, and he told
    me: *write blog posts about your experiences. Tell people what you are doing.*
    And so I did.'
  prefs: []
  type: TYPE_NORMAL
- en: And I never stopped.
  prefs: []
  type: TYPE_NORMAL
- en: Fast forward to 2025, now I have almost two hundred published articles, many
    of them with Towards Data Science, a published Book, and a good audience.
  prefs: []
  type: TYPE_NORMAL
- en: Writing helped me so much in the Data Science area.
  prefs: []
  type: TYPE_NORMAL
- en: Most recently, one of my interests has been the amazing Natural Language Processing
    and Large Language Models subjects. Learning about how these modern models work
    is fascinating.
  prefs: []
  type: TYPE_NORMAL
- en: That interest led me to experiment with agentic AI as well. So, I learned about
    **CrewAI**, an easy and open-source package that helps us build AI agents in a
    fun and easy way, with little code. I decided to test it by creating a crew of
    agents to write a blog post, and then see how that goes.
  prefs: []
  type: TYPE_NORMAL
- en: In this post, we will learn how to create those agents and make them work together
    to produce a simple blog post.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s do that.
  prefs: []
  type: TYPE_NORMAL
- en: '**What is a Crew?**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A **crew** of AI agents is a combination of two or more agents, each of them
    performing a task towards a final goal.
  prefs: []
  type: TYPE_NORMAL
- en: In this case study, we will create a crew that will work together to produce
    a small blog post about a given topic that we will provide.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/79ef809dd6a9706509354f9affd76dd9.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Crew of Agents workflow. Image by the author*'
  prefs: []
  type: TYPE_NORMAL
- en: 'The flow works like this:'
  prefs: []
  type: TYPE_NORMAL
- en: We choose a given topic for the agents to write about.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once the crew is started, it will go to the knowledge base, read some of my
    previously written articles, and try to mimic my writing style. Then, it generates
    a set of guidelines and passes it to the next agent.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next, the Planner agent takes over and searches the Internet looking for good
    content about the topic. It creates a plan of content and sends it to the next
    agent.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The Writer agent receives the writing plan and executes it according to the
    context and information received.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, the content is passed to the last agent, the Editor, who reviews the
    content and returns the final document as the output.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the following section, we will see how this can be created.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: CrewAI is a great Python package because it simplifies the code for us. So,
    let’s begin by installing the two needed packages.
  prefs: []
  type: TYPE_NORMAL
- en: '`pip install crewai crewai-tools`'
  prefs: []
  type: TYPE_NORMAL
- en: Next, if you want, you can follow the instructions on their *Quickstart* page
    and have a full project structure created for you with just a couple of commands
    on a terminal. Basically, it will install some dependencies, generate the folder
    structure suggested for CrewAI projects, as well as generate some .yaml and .py
    files.
  prefs: []
  type: TYPE_NORMAL
- en: I personally prefer to create those myself, but it is up to you. The page is
    listed in the References section.
  prefs: []
  type: TYPE_NORMAL
- en: Folder Structure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So, here we go.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will create these folders:'
  prefs: []
  type: TYPE_NORMAL
- en: knowledge
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: config
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'And these files:'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **config** folder: create the files `agents.yaml` and `tasks.yaml`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the **knowledge** folder, that’s where I will add the files with my writing
    style.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In the project **root**: create `crew.py` and `main.py`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/7e856856cb83886cfb82f2ca369cf2eb.png)'
  prefs: []
  type: TYPE_IMG
- en: Folders structure. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Make sure to create the folders with the names mentioned, as CrewAI looks for
    agents and tasks inside the **config** folder and for the knowledge base within
    a **knowledge** folder.
  prefs: []
  type: TYPE_NORMAL
- en: Next, let us set our agents.
  prefs: []
  type: TYPE_NORMAL
- en: Agents
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The agents are composed of:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Name of the agent**: `writer_style`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Role**: LLMs are good role players, so here you can tell them which role
    to play.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Goal**: tell the model what the goal of that agent is.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Backstory**: Describe the story behind this agent, who it is, what it does.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: I won’t bore you with all the agents created for this crew. I believe you got
    the idea. It is a set of prompts explaining to each agent what they are going
    to do. All the agents instructions are stored in the agents.yaml file.
  prefs: []
  type: TYPE_NORMAL
- en: Think of it as if you were a manager hiring people to create a team. Think about
    what kinds of professionals you would need, and what skills are needed.
  prefs: []
  type: TYPE_NORMAL
- en: 'We need 4 professionals who will work towards the final goal of producing written
    content: (1) a *Writer Stylist*, (2) a *Planner*, (3) a *Writer,* and (4) an *Editor*.'
  prefs: []
  type: TYPE_NORMAL
- en: If you want to see the setup for them, just check the full code in the GitHub
    repository.
  prefs: []
  type: TYPE_NORMAL
- en: Tasks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, back to the analogy of the manager hiring people, once we “hired” our entire
    crew, it is time to separate the tasks. We know that we want to produce a blog
    post, we have 4 agents, but what each of them will do.
  prefs: []
  type: TYPE_NORMAL
- en: Well, that will be configured in the file `tasks.yaml`.
  prefs: []
  type: TYPE_NORMAL
- en: 'To illustrate, let me show you the code for the Writer agent. Once again, these
    are the parts needed for the prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Name of the task**: `write`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Description**: The description is like telling the professional how you want
    that task to be performed, just like we would tell a new hire how to perform their
    new job. Give precise instructions to get the best result possible.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Expected output:** This is how we want to see the output. Notice that I give
    instructions like the size of the blog post, the quantity of paragraphs, and other
    information that helps my agent to give me the expected output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agent to perform it**: Here, we are indicating the agent who will perform
    this task, using the same name set in the `agents.yaml` file.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Output file**: Now always applicable, but if so, this is the argument to
    use. We asked for a markdown file as output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: After the agents and tasks are defined, it is time to create our crew flow.
  prefs: []
  type: TYPE_NORMAL
- en: Coding the Crew
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now we will create the file `crew.py`, where we will translate the previously
    presented flow to python code.
  prefs: []
  type: TYPE_NORMAL
- en: We begin by importing the needed modules.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: We will use the basic `Agent`, `Task`, `Crew`, `Process` and `LLM` to create
    our flow. `PDFKnowledgeSource` will help the first agent learning my writing style,
    and SerperDevTool is the tool to search the internet. For that one, make sure
    to get your API key at [https://serper.dev/signup](https://serper.dev/signup).
  prefs: []
  type: TYPE_NORMAL
- en: A best practice in software development is to keep your API keys and configuration
    settings separate from your code. We’ll use a `.env` file for this, providing
    a secure place to store these values. Here’s the command to load them into our
    environment.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Then, we will use the `PDFKnowledgeSource` to show the Crew where to search
    for the writer’s style. By default, that tool looks at the knowledge folder of
    your project, thus the importance of the name being the same.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Now we can set up the LLM we want to use for the Crew. It can be any of them.
    I tested a bunch of them, and those I liked the most were `qwen-qwq-32b` and `gpt-4o`.
    If you choose OpenAI’s, you will need an API Key as well. For Qwen-QWQ, just uncomment
    the code and comment out the OpenAI’s lines.. You need an API key from Groq.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Now we have to create a **Crew Base**, showing where CrewAI can find the agents
    and tasks configuration files.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Agents Functions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: And we are ready to create the code for each agent. They are composed of a decorator
    `@agent` to show that the following function is an agent. We then use the class
    Agent and indicate the name of the agent in the config file, the level of verbosity,
    being 1 low, 2 high. You can also use a Boolean value, such as true or false.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, we specify if the agent uses any tool, and what model it will use.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Tasks Functions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next step is creating the tasks. Similarly to the agents, we will create
    a function and decorate it with `@task`. We use the class Task to inherit CrewAI’s
    functionalities and then point to the task to be used from our `tasks.yaml` file
    to be used for each task created. If any output file is expected, use the `output_file`
    argument.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Crew
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To glue everything together, we now create a function and decorate it with
    the `@crew` decorator. That function will line up the agents and the tasks in
    the order to be performed, since the process chosen here is the simplest: sequential.
    In other words, everything runs in sequence, from start to finish.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Running the Crew
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Running the crew is very simple. We create the `main.py` file and import the
    Crew Base `BlogWriter` created. Then we just use the functions `crew().kickoff(inputs)`
    to run it, passing a dictionary with the inputs to be used to generate the blog
    post.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: There it is. The result is a nice blog post created by the LLM. See below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e56255d0b637781f3dbbfda5ae44755b.png)'
  prefs: []
  type: TYPE_IMG
- en: Resulting blog post. GIF by the author.
  prefs: []
  type: TYPE_NORMAL
- en: That is so nice!
  prefs: []
  type: TYPE_NORMAL
- en: '**Before You Go**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before you go, know that this blog post was 100% created by me. This crew I
    created was an experiment I wanted to do to learn more about how to create AI
    agents and make them work together. And, like I said, I love writing, so this
    is something I would be able to read and assess the quality.
  prefs: []
  type: TYPE_NORMAL
- en: My opinion is that this crew still didn’t do a very good job. They were able
    to complete the tasks successfully, but they gave me a very shallow post and code.
    I would not publish this, but at least it could be a start, maybe.
  prefs: []
  type: TYPE_NORMAL
- en: From here, I encourage you to learn more about CrewAI. I took their free course
    where João de Moura, the creator of the package, shows us how to create different
    kinds of crews. It is really interesting.
  prefs: []
  type: TYPE_NORMAL
