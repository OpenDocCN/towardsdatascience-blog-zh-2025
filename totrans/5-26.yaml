- en: How to Log Your Data with MLflow
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-log-your-data-with-mlflow-23c8027e4021/](https://towardsdatascience.com/how-to-log-your-data-with-mlflow-23c8027e4021/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: MLflow, MLOps, Data Science
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Photo by Chris Liverani on Unsplash](../Images/a5fc549bd3ecf5ef6c80ec34fc016a98.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
- en: Photo by [Chris Liverani](https://unsplash.com/@chrisliverani?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Preface
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Data is one of the most critical components of the machine learning process.**
    In fact, the quality of the data used in training a model often determines the
    success or failure of the entire project. While algorithms and models are important,
    they are powerless without data that is accurate, clean, and representative of
    the problem you’re trying to solve. Whether you are dealing with structured data,
    unstructured data, or large-scale datasets, the preparation and understanding
    of data lay the foundation for any machine learning system. A well-curated dataset
    can provide the necessary signals for a model to learn effectively, while poor
    or biased data can lead to incorrect predictions, overfitting, or even harmful
    societal impacts when models are deployed in real-world applications.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: With the increasing complexity of machine learning workflows, ensuring the reproducibility
    and traceability of experiments has become a key concern. This is where **MLOps**
    (Machine Learning Operations) comes into play. MLOps is the practice of bringing
    together data science and operations to automate and streamline machine learning
    workflows. **One critical aspect of MLOps is the tracking of datasets throughout
    the entire lifecycle of a machine learning project.** Tracking is not just about
    capturing the parameters and metrics of models; it’s equally important to log
    the datasets used during each phase of the process. This ensures that, down the
    line, when models are re-evaluated or retrained, the same datasets can be referenced,
    tested, or reused. It allows for better comparison of results, understanding of
    changes, and most importantly, ensuring that the results are reproducible by others.
    **As a best practice for modern ML systems, I recommend that all ML practitioners
    worldwide log their data during training.**
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Data Yesterday vs. Data Today?
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In this context, **MLflow** plays a pivotal role by offering a suite of tools
    that help streamline these MLOps practices. **One of the key components of MLflow
    is its `mlflow.data` module, which provides the ability to log datasets as part
    of machine learning experiments.** The `mlflow.data` module ensures that datasets
    are properly documented, their metadata is tracked, and they can be retrieved
    and reused in future runs. This helps prevent common problems like "data drift"
    where models start to perform worse because of subtle changes in the underlying
    data. MLflow’s ability to track datasets alongside models and parameters ensures
    that any new experiment can reliably compare results against previous runs using
    the exact same data, providing transparency and clarity.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '![Photo by Brian McGowan on Unsplash](../Images/6401afd0679cedd84bf9d4f7689f2fd2.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
- en: Photo by [Brian McGowan](https://unsplash.com/@sushioutlaw?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Overview
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**This article will guide you through the best practices of logging a dataset
    in MLflow using the California Housing Dataset as an example.** We’ll explore
    `mlflow.data` interfaces and demonstrate how you can track and manage your dataset
    during an ML experiment.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Imagine you are a data scientist working on a project to predict housing prices
    in California based on various features such as median income, population, and
    location. You’ve spent hours curating a dataset from multiple sources, cleaning
    it, and ensuring it’s ready for training. Now you’re ready to run your machine
    learning experiments. Logging your dataset at this stage is crucial because it
    serves as a snapshot of the exact data used in this specific training run. Should
    you need to revisit the experiment months later – perhaps to improve the model,
    tune hyperparameters, or audit the results – you want to ensure that you are using
    the same dataset to maintain consistency and comparability. Without logging your
    dataset, it’s easy to lose track of which version of the data was used, especially
    if the data is updated or changed over time.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: Without further ado, let’s get started!
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Set Up
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Setting up an MLflow server locally is straightforward. Use the following command:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Then set the tracking URI.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: For more advanced configurations, refer to [the MLflow documentation](https://mlflow.org/docs/latest/tracking/server.html).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: The California housing dataset
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Photo by Robert Bye on Unsplash](../Images/eecad5fc59cd722d2774037f8590cae2.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
- en: Photo by [Robert Bye](https://unsplash.com/@robertbye?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: For this article, we are using the California housing dataset (CC BY license).
    However, you can apply the same principles to log and track any dataset of your
    choice.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: For more information on the California housing dataset, refer to [this doc](https://inria.github.io/scikit-learn-mooc/python_scripts/datasets_california_housing.html).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Dataset and DatasetSource
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '`mlflow.data.dataset.Dataset`'
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before diving into dataset logging, evaluation, and retrieval, it’s important
    to understand the concept of datasets in MLflow. MLflow provides the `mlflow.data.dataset.Dataset`
    object, which represents datasets used in with MLflow Tracking.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'This object comes with key properties:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: A required parameter, **source** (the data source of your dataset as `mlflow.data.dataset_source.DatasetSource`
    object)
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**digest** (fingerprint for your dataset) and **name** (name for your dataset),
    which can be set via parameters.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**schema** and **profile** to describe the dataset’s structure and statistical
    properties.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Information about the dataset’s **source**, such as its storage location.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can easily convert the dataset into a dictionary using `to_dict()` or a
    JSON string using `to_json()`.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Support for Popular Dataset Formats
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'MLflow makes it easy to work with various types of datasets through specialized
    classes that extend the core `mlflow.data.dataset.Dataset`. At the time of writing
    this article, here are some of the notable dataset classes supported by MLflow:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '**pandas**: `mlflow.data.pandas_dataset.PandasDataset`'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**NumPy**: `mlflow.data.numpy_dataset.NumpyDataset`'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Spark**: `mlflow.data.spark_dataset.SparkDataset`'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hugging Face**: `mlflow.data.huggingface_dataset.HuggingFaceDataset`'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**TensorFlow**: `mlflow.data.tensorflow_dataset.TensorFlowDataset`'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Evaluation Datasets**: `mlflow.data.evaluation_dataset.EvaluationDataset`'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All these classes come with a convenient `mlflow.data.from_*` API for loading
    datasets directly into MLflow. This makes it easy to construct and manage datasets,
    regardless of their underlying format.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: mlflow.data.dataset_source.DatasetSource
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The `mlflow.data.dataset.DatasetSource` class is used to represent the origin
    of the dataset in MLflow. When creating a `mlflow.data.dataset.Dataset` object,
    the `source` parameter can be specified either as a string (e.g., a file path
    or URL) or as an instance of the `mlflow.data.dataset.DatasetSource` class.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: If a string is provided as the `source`, MLflow internally calls the `resolve_dataset_source`
    function. This function iterates through a predefined list of data sources and
    `DatasetSource` classes to determine the most appropriate source type. However,
    MLflow’s ability to accurately resolve the dataset’s source is limited, especially
    when the `candidate_sources` argument (a list of potential sources) is set to
    `None`, which is the default.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: In cases where the `DatasetSource` class cannot resolve the raw source, an MLflow
    exception is raised. **For best practices, I recommend explicitly create and use
    an instance of the `mlflow.data.dataset.DatasetSource` class when defining the
    dataset’s origin.**
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: class **HTTPDatasetSource**(DatasetSource)
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: class **DeltaDatasetSource**(DatasetSource)
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: class **FileSystemDatasetSource**(DatasetSource)
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: class **HuggingFaceDatasetSource**(DatasetSource)
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: class **SparkDatasetSource**(DatasetSource)
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Get an email whenever Jack Chang publishes.**](https://medium.com/@yunglinchang/subscribe)'
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Logging datasets with mlflow.log_input() API
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Photo by Claudio Schwarz on Unsplash](../Images/9f3f642961799ceee6e65d0bdd8d5da0.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
- en: Photo by [Claudio Schwarz](https://unsplash.com/@purzlbaum?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: One of the most straightforward ways to log datasets in MLflow is through the
    `mlflow.log_input()` API. This allows you to log datasets in any format that is
    compatible with `mlflow.data.dataset.Dataset`, which can be extremely helpful
    when managing large-scale experiments.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Step-by-Step Guide
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, let’s fetch the California Housing dataset and convert it into a `pandas.DataFrame`
    for easier manipulation. Here, we create a dataframe that combines both the feature
    data (`california_data`) and the target data (`california_target`).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: To log the dataset with meaningful metadata, we define a few parameters like
    the data source URL, dataset name, and target column. These will provide helpful
    context when retrieving the dataset later.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: If we look deeper in the `fetch_california_housing` [source code](https://github.com/scikit-learn/scikit-learn/blob/311bf6bad/sklearn/datasets/_california_housing.py#L46),
    we can see the data was originated from [https://www.dcc.fc.up.pt/~ltorgo/Regression/cal_housing.tgz](https://www.dcc.fc.up.pt/~ltorgo/Regression/cal_housing.tgz).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Once the data and metadata are defined, we can convert the `pandas.DataFrame`
    into an `mlflow.data.Dataset` object.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Example Output:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Note that You can even convert the dataset to a dictionary to access additional
    properties like `source_type`:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '[PRE9]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Now that we have our dataset ready, it’s time to log it in an MLflow run. This
    allows us to capture the dataset’s metadata, making it part of the experiment
    for future reference.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '[PRE11]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Let’s explore the dataset in the MLflow UI (). You’ll find your dataset listed
    under the default experiment. In the **Datasets Used** section, you can view the
    context of the dataset, which in this case is marked as being used for training.
    Additionally, all the relevant fields and properties of the dataset will be displayed.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: '![Training dataset in the MLflow UI; Source: Me](../Images/49c8e216032ca33aba85e3a7d00dc33d.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
- en: 'Training dataset in the MLflow UI; Source: Me'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: Congrats! You have logged your first dataset!
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Logging datasets when evaluating mlflow**.**evaluate() API
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Photo by Dino Reichmuth on Unsplash](../Images/1bf72d737b54ddeed1f49b90f43310d8.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
- en: Photo by [Dino Reichmuth](https://unsplash.com/@dinoreichmuth?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: Let’s continue our journey by exploring how to evaluate datasets using the `mlflow.evaluate()`
    API. This functionality, which integrates datasets with MLflow’s evaluation framework,
    was introduced in **MLflow 2.8.0**. Users of earlier versions of MLflow will not
    have access to this feature.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: Step-by-Step Guide
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'First, let’s perform a train-test split on the California housing data:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: For this part, we will be using similar metadata to create the training dataset
    but note that the training and evaluation datasets have different names.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: For modeling, let’s fit a Random Forest Regression model.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Once the model is trained, we need to prepare an evaluation dataset. The `mlflow.data.from_pandas()`
    function will be used to create this dataset, which will be passed to the `mlflow.evaluate()`
    function for model evaluation. Note that the `predictions` parameter is specified
    here to indicate the column containing the model’s predicted output.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: With the training and evaluation datasets prepared, it’s time to log the model
    and evaluate its performance using MLflow.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'The **Default Evaluator** is used here, and it logs several important metrics
    automatically:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: example_count, mean_absolute_error, mean_squared_error, root_mean_squared_error,
    sum_on_target, mean_on_target, r2_score, max_error, mean_absolute_percentage_error
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: These metrics can be found in the Metrics section of the experiment run in the
    MLflow UI. **I recommend experimenting with different model types using `mlflow.evaluate`
    to explore the full capabilities of the Default Evaluator.** It provides a range
    of valuable metrics as well as useful visualizations.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '![Regression metrics with mlflow.evaluate; Source: Me](../Images/50bf10c6b93e9929b0bec1cb433dee24.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
- en: 'Regression metrics with mlflow.evaluate; Source: Me'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: Note that if you’re working with an MLflow `PandasDataset`, you must specify
    the column containing the model’s predicted output using the `predictions` parameter
    in the `mlflow.data.from_pandas()` function. When calling `mlflow.evaluate()`,
    set `predictions = None` because the predictions column is already included in
    the dataset. This ensures proper integration and evaluation.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: 'Example Output:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Let’s head over to the MLflow UI to view the results. You will see that our
    evaluation dataset has been successfully logged within the same run as the training.
    As a result, the run now contains both the training and evaluation datasets.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: '![Evaulation dataset in the MLflow UI; Source: Me](../Images/445aed0bd53edb7ea3bdef3150224e7d.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
- en: 'Evaulation dataset in the MLflow UI; Source: Me'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: Epilogue
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Logging datasets is critical not just for reproducibility but also for accountability.
    For instance, if you are working in a regulated industry such as healthcare or
    finance, it is essential to demonstrate that the data used to train a model meets
    certain standards and has not been altered without proper tracking. In collaborative
    projects, being able to share your dataset logs also facilitates more efficient
    collaboration and sharing of results. By logging datasets with tools like MLflow,
    you ensure that your experiments are transparent, reproducible, and robust, helping
    build trust in your machine learning outcomes.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 记录数据集对于可重复性和问责制至关重要。例如，如果你在医疗保健或金融等受监管的行业工作，证明用于训练模型的 数据符合某些标准且未经适当跟踪而未被更改，这一点至关重要。在协作项目中，能够共享你的数据集日志也有助于更高效的协作和结果共享。通过使用
    MLflow 等工具记录数据集，你确保了你的实验是透明的、可重复的且稳健的，有助于建立对机器学习结果的信任。
- en: In summary, datasets are the heart of machine learning, and logging them is
    fundamental to tracking, reproducibility, and transparency within any MLOps workflow.
    MLflow’s `mlflow.data` module provides the tools necessary to ensure that every
    step of the data journey is captured, logged, and retrievable for future use,
    ensuring consistency and improving the overall reliability of machine learning
    experiments.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，数据集是机器学习的核心，记录它们对于任何 MLOps 工作流程中的跟踪、可重复性和透明度至关重要。MLflow 的 `mlflow.data`
    模块提供了必要的工具，以确保数据旅程的每一步都被捕获、记录并可供将来使用，从而确保一致性并提高机器学习实验的整体可靠性。
- en: Here is [the Github repo](https://github.com/yunglinchang/mlflow-examples) for
    all the codes in the article!
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这里是文章中所有代码的 [Github 仓库](https://github.com/yunglinchang/mlflow-examples)！
