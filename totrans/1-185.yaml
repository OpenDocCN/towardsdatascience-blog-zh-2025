- en: 'Machine Learning Meets Panel Data: What Practitioners Need to Know'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器学习与面板数据：实践者需要了解的内容
- en: 原文：[https://towardsdatascience.com/machine-learning-meets-panel-data-what-practitioners-need-to-know/](https://towardsdatascience.com/machine-learning-meets-panel-data-what-practitioners-need-to-know/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/machine-learning-meets-panel-data-what-practitioners-need-to-know/](https://towardsdatascience.com/machine-learning-meets-panel-data-what-practitioners-need-to-know/)
- en: '**Authors**: Augusto Cerqua, Marco Letta, Gabriele Pinto'
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**作者**：Augusto Cerqua, Marco Letta, Gabriele Pinto'
- en: '<mdspan class="mdspan-comment is-selected" datatext="el1760510909586">Machine</mdspan>
    learning (ML) has gained a central role in economics, the social sciences, and
    business decision-making. In the public sector, ML is increasingly used for so-called
    prediction policy problems: settings where policymakers aim to identify units
    most at risk of a negative outcome and intervene proactively; for instance, targeting
    public subsidies, predicting local recessions, or anticipating migration patterns.
    In the private sector, similar predictive tasks arise when firms seek to forecast
    customer churn, or optimize credit risk assessment. In both domains, better predictions
    translate into more efficient allocation of resources and more effective interventions.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan class="mdspan-comment is-selected" datatext="el1760510909586">机器学习</mdspan>（ML）在经济学、社会科学和商业决策中扮演了核心角色。在公共部门，机器学习越来越多地用于所谓的预测政策问题：政策制定者旨在识别最有可能出现负面结果的单元并主动干预的情况；例如，针对公共补贴、预测地方经济衰退或预测移民模式。在私营部门，当企业寻求预测客户流失或优化信用风险评估时，也会出现类似的预测任务。在这两个领域，更好的预测意味着资源分配更有效，干预措施更有效。
- en: 'To achieve these goals, ML algorithms are increasingly applied to panel data,
    characterized by repeated observations of the same units over multiple time periods.
    However, ML models were not originally designed for use with panel data, which
    feature distinctive cross-sectional and longitudinal dimensions. When ML is applied
    to panel data, there is a high risk of a subtle but serious problem: data leakage.
    This occurs when information unavailable at prediction time accidentally enters
    the model training process, inflating predictive performance. In our paper “*On
    the Mis(Use) of Machine Learning With Panel Data*” (Cerqua, Letta, and Pinto,
    2025), recently published in the [**Oxford Bulletin of Economics and Statistics**](https://onlinelibrary.wiley.com/doi/10.1111/obes.70019),
    we provide the first systematic assessment of data leakage in ML with panel data,
    propose clear guidelines for practitioners, and illustrate the consequences through
    an empirical application with publicly available U.S. county data.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这些目标，机器学习算法越来越多地应用于面板数据，其特征是在多个时间周期内对相同单元的重复观察。然而，机器学习模型最初并不是为使用面板数据而设计的，面板数据具有独特的横截面和纵向维度。当机器学习应用于面板数据时，存在一个微妙但严重的问题：数据泄漏。这发生在预测时间不可用的信息意外地进入模型训练过程，从而夸大了预测性能。在我们的论文“*关于面板数据中机器学习的误用*”（Cerqua,
    Letta, 和 Pinto, 2025）中，最近发表在[**牛津经济学与统计学公报**](https://onlinelibrary.wiley.com/doi/10.1111/obes.70019)，我们提供了对机器学习中面板数据泄漏的第一项系统评估，为实践者提出了明确的指导方针，并通过一个使用公开可用的美国县数据的实证应用来说明其后果。
- en: The Leakage Problem
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 泄漏问题
- en: 'Panel data combine two structures: a temporal dimension (units observed across
    time) and a cross-sectional dimension (multiple units, such as regions or firms).
    Standard ML practice, splitting the sample randomly into training and testing
    sets, implicitly assumes independent and identically distributed (i.i.d.) data.
    This assumption is violated when default ML procedures (such as a random split)
    are applied to panel data, creating two main types of leakage:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 面板数据结合了两种结构：一个时间维度（随时间观察到的单元）和一个横截面维度（如地区或企业等多单元）。标准的机器学习实践，将样本随机分为训练集和测试集，隐含地假设数据是独立同分布的（i.i.d.）。当将默认的机器学习程序（如随机分割）应用于面板数据时，这个假设被违反，从而产生了两种主要类型的泄漏：
- en: 'Temporal leakage: future information leaks into the model during the training
    phase, making forecasts look unrealistically accurate. Furthermore, past information
    can end up in the testing set, making ‘forecasts’ retrospective.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间泄漏：在训练阶段，未来的信息泄露到模型中，使得预测看起来不切实际地准确。此外，过去的信息可能最终出现在测试集中，使得“预测”看起来是回顾性的。
- en: 'Cross-sectional leakage: the same or very similar units appear in both training
    and testing sets, meaning the model has already “seen” most of the cross-sectional
    dimension of the data.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 横截面泄漏：训练集和测试集中出现相同或非常相似的单元，这意味着模型已经“看到”了数据的大部分横截面维度。
- en: 'Figure 1 shows how different splitting strategies affect the risk of leakage.
    A random split at the unit–time level (Panel A) is the most problematic, as it
    introduces both temporal and cross-sectional leakage. Alternatives such as splitting
    by units (Panel B), by groups (Panel C), or by time (Panel D), mitigate one type
    of leakage but not the other. As a result, no strategy completely eliminates the
    problem: the appropriate choice depends on the task at hand (see below), since
    in some cases one form of leakage may not be a real concern.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图1展示了不同的分割策略如何影响泄漏风险。在单位-时间级别的随机分割（面板A）是最成问题的，因为它引入了时间和横截面泄漏。例如，按单位分割（面板B）、按组分割（面板C）或按时间分割（面板D）等替代方案可以减轻一种泄漏，但不能减轻另一种泄漏。因此，没有一种策略可以完全消除问题：合适的策略取决于手头的任务（见下文），因为在某些情况下，一种泄漏形式可能不是真正的关注点。
- en: '**Figure 1  |  Training and testing sets under different splitting rules**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1  |  不同分割规则下的训练和测试集**'
- en: '![](../Images/b708aaba5a1c56d8c07f24482e90c1a0.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b708aaba5a1c56d8c07f24482e90c1a0.png)'
- en: '*Notes: In this example, the panel data are structured with years as the time
    variable, counties as the unit variable, and states as the group variable. Image
    made by the authors.*'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*注：在这个例子中，面板数据以年份作为时间变量，县作为单位变量，州作为组变量。图像由作者制作。*'
- en: Two Types of Prediction Policy Problems
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 两种预测策略问题类型
- en: 'A key insight of the study is that researchers must clearly define their prediction
    goal ex-ante. We distinguish two broad classes of prediction policy problems:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 研究的关键洞察是研究人员必须明确界定他们的预测目标。我们区分了两种广泛的预测策略问题：
- en: '1\. Cross-sectional prediction: The task is to map outcomes across units in
    the same period. For example, imputing missing data on GDP per capita across regions
    when only some regions have reliable measurements. The best split here is at the
    unit level: different units are assigned to training and testing sets, while all
    time periods are kept. This eliminates cross-sectional leakage, although temporal
    leakage remains. But since forecasting is not the goal, this is not a real issue.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 横截面预测：任务是映射同一时期内各单位的结果。例如，当只有一些地区有可靠的测量时，对各地区人均GDP的缺失数据进行插补。这里的最佳分割是在单位级别：不同的单位分配到训练集和测试集中，而所有时间周期都保持不变。这消除了横截面泄漏，尽管时间泄漏仍然存在。但由于预测不是目标，这并不是真正的问题。
- en: '2\. Sequential forecasting: The goal is to predict future outcomes based on
    historical data—for example, predicting county-level income declines one year
    ahead to trigger early interventions. Here, the correct split is by time: earlier
    periods for training, later periods for testing. This avoids temporal leakage
    but not cross-sectional leakage, which is not a real concern since the same units
    are being forecasted across time.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 顺序预测：目标是基于历史数据预测未来结果——例如，预测一年后县一级的收入下降以触发早期干预。在这里，正确的分割是按时间：早期时期用于训练，后期时期用于测试。这避免了时间泄漏，但不是横截面泄漏，这不是真正的关注点，因为同一单位在时间上被预测。
- en: The wrong approach in both cases is the random split by unit-time (Panel A of
    Figure 1), which contaminates results with both types of leakage and produces
    misleadingly high performance metrics.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，错误的方法都是通过单位时间的随机分割（图1的面板A），它既污染了结果，又产生了误导性的高性能指标。
- en: Practical Guidelines
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实践指南
- en: 'To help practitioners, we summarize a set of do’s and don’ts for applying ML
    to panel data:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助实践者，我们总结了将机器学习应用于面板数据时的一套“应该做”和“不应该做”的指南：
- en: <mdspan datatext="el1760511031126" class="mdspan-comment">Always clarify ex-ante
    whether your task is cross-sectional prediction or forecasting. The entire ML
    pipeline must be designed accordingly.</mdspan>
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760511031126" class="mdspan-comment">始终在事前明确您的任务是横截面预测还是预测。整个机器学习流程必须相应设计。</mdspan>
- en: 'Choose the sample split based on the research question: unit-based for cross-sectional
    problems, time-based for forecasting.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据研究问题选择样本分割：对于横截面问题基于单位，对于预测基于时间。
- en: Temporal leakage can occur not only through observations, but also through predictors.
    For forecasting, only use lagged or time-invariant predictors. Using contemporaneous
    variables (e.g., using unemployment in 2014 to predict income in 2014) is conceptually
    wrong and creates temporal data leakage.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间泄漏不仅可以通过观察发生，还可以通过预测变量发生。对于预测，仅使用滞后或时间不变的预测变量。使用同期变量（例如，使用2014年的失业率来预测2014年的收入）在概念上是错误的，并会产生时间数据泄漏。
- en: Adapt cross-validation to panel data. Random k-fold CV found in most ready-to-use
    software packages is inappropriate, as it mixes future and past information. Instead,
    use rolling or expanding windows for forecasting, or stratified CV by units/groups
    for cross-sectional prediction.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将交叉验证应用于面板数据。大多数现成的软件包中找到的随机k折交叉验证是不合适的，因为它混合了未来和过去的信息。相反，使用滚动或扩展窗口进行预测，或者使用按单位/组划分的分层交叉验证进行横截面预测。
- en: Ensure that out-of-sample performance is tested on truly unseen data, not on
    data already encountered during training.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保在样本外性能测试是在真正未见过的数据上进行的，而不是在训练过程中已经遇到的数据上。
- en: Empirical Application
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实证应用
- en: 'To illustrate these issues, we analyze a balanced panel of 3,058 U.S. counties
    from 2000 to 2019, focusing exclusively on sequential forecasting. We consider
    two tasks: a regression problem—forecasting per capita income—and a classification
    problem—forecasting whether income will decline in the subsequent year.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这些问题，我们分析了2000年至2019年间3058个美国县份的平衡面板数据，专注于序列预测。我们考虑了两个任务：一个回归问题——预测人均收入——和一个分类问题——预测下一年收入是否会下降。
- en: We run hundreds of models, varying split strategies, use of contemporaneous
    predictors, inclusion of lagged outcomes, and algorithms (Random Forest, XGBoost,
    Logit, and OLS). This comprehensive design allows us to quantify how leakage inflates
    performance. Figure 2 below reports our main findings.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们运行了数百个模型，改变了分割策略、使用同期预测因子、包括滞后结果以及算法（随机森林、XGBoost、Logit和OLS）。这种全面的设计使我们能够量化泄露如何夸大性能。下方的图2报告了我们的主要发现。
- en: 'Panel A of Figure 2 shows forecasting performance for classification tasks.
    Random splits yield very high accuracy, but this is illusory: the model has already
    seen similar data during training.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图2的A部分显示了分类任务的预测性能。随机分割产生了非常高的准确率，但这是一种错觉：模型在训练过程中已经看到了类似的数据。
- en: Panel B shows forecasting performance for regression tasks. Once again, random
    splits make models look far better than they really are, while correct time-based
    splits show much lower, yet realistic, accuracy.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图2的B部分显示了回归任务的预测性能。再次，随机分割使模型看起来比实际情况要好得多，而基于正确时间分割的显示则准确率较低，但更真实。
- en: '**Figure 2  |  Temporal leakage in the forecasting problem**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**图2  |  预测问题中的时间泄露**'
- en: '**      Panel A – Classification task**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**      A部分 – 分类任务**'
- en: '![](../Images/67265178d82a826c4e13b103e514bf75.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/67265178d82a826c4e13b103e514bf75.png)'
- en: '**      Panel B – Regression task**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**      B部分 – 回归任务**'
- en: '![](../Images/fcf0d81a163f88717b490fd24601a658.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fcf0d81a163f88717b490fd24601a658.png)'
- en: '<mdspan datatext="el1760510639881" class="mdspan-comment">*Notes: Each plot
    shows the performance and characteristics of different models used to forecast
    either a binary recession dummy (Panel A) or the log of income per capita (Panel
    B), based on a large set of predictors. We focus on one family of models at a
    time (left = Random Forest, center = XGBoost, right = Ols/Logit), while displaying
    other models in the background (light-colored markers) for comparison. The models
    are ordered from worst to best performance according to the chosen metric. Each
    squared marker (□) represents a single model, which differs from others in terms
    of algorithm (indicated by marker color) and other parameters, such as the inclusion
    of contemporaneous predictors, outcome lags, adjusted test size, and split type.
    The different combinations of these parameters are visualized using colored rectangles
    below each marker in the grid at the bottom of the plot; darker colors indicate
    activation of that parameter (e.g., a darker rectangle under “Contemporaneous”
    means the model includes contemporaneous variables). The black/grey bar at the
    bottom summarizes whether a model is temporally leaked: black rectangles indicate
    temporal leakage, meaning the model includes at least one of the following: contemporaneous
    predictors or a non-time-based split.* *Images made by the authors.*</mdspan>'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760510639881" class="mdspan-comment">*备注：每个图表展示了用于预测二元衰退虚拟变量（面板A）或人均收入对数（面板B）的不同模型的性能和特征，基于大量预测因子。我们一次关注一个模型族（左侧
    = 随机森林，中间 = XGBoost，右侧 = Ols/Logit），同时在背景中显示其他模型（浅色标记）以进行比较。根据所选指标，模型按性能从差到好排序。每个方形标记（□）代表一个单独的模型，它在算法（由标记颜色指示）和其他参数方面与其他模型不同，例如是否包含同期预测因子、结果滞后、调整后的测试大小和分割类型。这些参数的不同组合通过在图表底部网格中每个标记下方的彩色矩形进行可视化；较深的颜色表示该参数被激活（例如，“同期”下的较深矩形表示模型包含同期变量）。底部黑色/灰色条形图总结了模型是否存在时间泄露：黑色矩形表示时间泄露，意味着模型至少包含以下之一：同期预测因子或非基于时间的分割。*
    *图像由作者制作。*</mdspan>
- en: In the paper, we also show that the overestimation of model accuracy becomes
    significantly more pronounced during years marked by distribution shifts and structural
    breaks, such as the Great Recession, making the results particularly misleading
    for policy purposes.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在论文中，我们还展示了在分布变化和结构断裂的年份，如大衰退，模型准确度的过度估计变得更加明显，这使得结果在政策目的上尤其具有误导性。
- en: Why It Matters
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么这很重要
- en: Data leakage is more than a technical pitfall; it has real-world consequences.
    In policy applications, a model that seems highly accurate during validation may
    collapse once deployed, leading to misallocated resources, missed crises, or misguided
    targeting. In business settings, the same issue can translate into poor investment
    decisions, inefficient customer targeting, or false confidence in risk assessments.
    The danger is especially acute when machine learning models are intended to serve
    as early-warning systems, where misplaced trust in inflated performance can result
    in costly failures.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 数据泄露不仅仅是一个技术陷阱；它具有现实世界的后果。在政策应用中，一个在验证阶段看似高度准确的模型一旦部署，可能会崩溃，导致资源分配不当、错过危机或目标定位不当。在商业环境中，同样的问题可能导致糟糕的投资决策、无效的客户定位或对风险评估的过度自信。当机器学习模型旨在作为预警系统时，这种危险尤其严重，对夸大性能的不当信任可能导致代价高昂的失败。
- en: By contrast, properly designed models, even if less accurate on paper, provide
    honest and reliable predictions that can meaningfully inform decision-making.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，即使在实际应用中准确性较低，设计良好的模型也能提供诚实可靠的预测，这些预测可以有意义地指导决策。
- en: Takeaway
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 吸收要点
- en: ML has the potential to transform decision-making in both policy and business,
    but only if applied correctly. Panel data offer rich opportunities, yet are especially
    vulnerable to data leakage. To generate reliable insights, practitioners should
    align their ML workflow with the prediction objective, account for both temporal
    and cross-sectional structures, and use validation strategies that prevent overoptimistic
    assessments and an illusion of high accuracy. When these principles are followed,
    models avoid the trap of inflated performance and instead provide guidance that
    genuinely helps policymakers allocate resources and businesses make sound strategic
    choices. Given the rapid adoption of ML with panel data in both public and private
    domains, addressing these pitfalls is now a pressing priority for applied research.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习有潜力改变政策和商业领域的决策，但前提是必须正确应用。面板数据提供了丰富的机会，但特别容易受到数据泄露的影响。为了生成可靠的见解，从业者应将他们的机器学习工作流程与预测目标对齐，考虑时间和横截面结构，并使用验证策略来防止过度乐观的评估和高准确性的错觉。遵循这些原则时，模型避免了过度夸大性能的陷阱，并提供真正有助于政策制定者分配资源和商业做出明智战略选择的指导。鉴于机器学习在公共和私营部门中快速采用面板数据，解决这些陷阱现在是应用研究的一个紧迫优先事项。
