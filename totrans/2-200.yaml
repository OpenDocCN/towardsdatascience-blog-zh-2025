- en: A Gentle Introduction to Backtracking
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/a-gentle-introduction-to-backtracking/](https://towardsdatascience.com/a-gentle-introduction-to-backtracking/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1751200321414" class="mdspan-comment">Backtracking</mdspan>
    is a versatile technique for exploring the solution space of various types of
    data science problems and incrementally constructing candidate solutions – a bit
    like navigating a maze. In this article, we will briefly go over the concept of
    backtracking before diving into a couple of intuitive, hands-on examples coded
    in Python.
  prefs: []
  type: TYPE_NORMAL
- en: '***Note:** All example code snippets in the following sections have been created
    by the author of this article.*'
  prefs: []
  type: TYPE_NORMAL
- en: Conceptual Overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At a high level, the backtracking technique involves a step-by-step exploration
    of the solution space of a computational problem (usually a problem that can be
    framed as one of constraint satisfaction or combinatorial optimization). At each
    step in the exploration, we proceed along different paths, checking that the problem
    constraints are satisfied as we go along.
  prefs: []
  type: TYPE_NORMAL
- en: If we hit upon a valid solution during our exploration, we make a note of it.
    At this point, we can end the search if our problem only requires us to find one
    valid solution. If the problem calls for finding multiple (or all) possible solutions,
    we can continue to explore extensions of the previously discovered solution.
  prefs: []
  type: TYPE_NORMAL
- en: However, if at any point the problem constraints are violated, we *backtrack*;
    this means going back to the last point in our search where a partial solution
    had been constructed (and where valid solutions still seemed possible), and continuing
    our search along a different path from there. This forward-and-backward process
    of exploration can be continued as needed until the entire solution space is explored
    and all valid solutions are explored.
  prefs: []
  type: TYPE_NORMAL
- en: Hands-On Examples
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Solving a Sudoku
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A Sudoku puzzle is a classic example of a constraint satisfaction problem with
    practical applications in diverse fields ranging from [operations research](https://arxiv.org/pdf/1210.2584)
    to [cryptography](https://www.techscience.com/cmc/v77n1/54507). The standard version
    of the puzzle consists of a 9-by-9 grid, made of nine non-overlapping 3-by-3 sub-grids
    (or blocks). In the starting configuration of the puzzle, some of the 81 cells
    in the grid are prefilled with digits ranging from 1 to 9\. To complete the puzzle,
    the remaining cells must be filled with digits from 1 to 9 while adhering to the
    following constraints: no row, column, or 3-by-3 block may contain a duplicate
    digit.'
  prefs: []
  type: TYPE_NORMAL
- en: The Python code below shows how to implement a Sudoku solver using backtracking,
    along with a convenience function for pretty-printing the grid. Note that the
    solver expects empty cells to be denoted (or initialized) with zeros.
