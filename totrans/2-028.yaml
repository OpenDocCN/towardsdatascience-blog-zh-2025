- en: Mastering NLP with spaCy – Part 3
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/mastering-nlp-with-spacy-part-3/](https://towardsdatascience.com/mastering-nlp-with-spacy-part-3/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1755663265451" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It is important to understand how to use spaCy rules to identify patterns within
    some text. There are entities like times, dates, IBANs and emails that follow
    a strict structure, so it is possible to identify them with deterministic rules,
    for example, by using **regular expressions** (**regexes**).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: SpaCy simplifies the usage of regexes by making them more human-readable, so
    instead of weird symbols, you will use actual descriptions using the Matcher class.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Token-based matching
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A regex is a sequence of characters that specifies a search pattern. There
    is a Python built-in library to work with regexes called **re**: [https://docs.python.org/3/library/re.html](https://docs.python.org/3/library/re.html)'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-8
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In this example, the reg pattern captures all the previous strings. This pattern
    says that “Marcello” can be followed optionally by the word “Danilo” (since we
    are using the symbol “?”). Also, the symbol “\s” says that doesn’t matter in between
    the words we a using a space, a tab or multiple spaces.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: The problem with regexes, and the reason why many programmers don’t love them,
    is that they’re difficult to read. This is why spaCy provides a clean and production-level
    alternative with the **Matcher class**.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Let’s import the class and see how we can use it. (I will explain what Span
    is later).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now we can define a pattern that matches some morning greetings, and we label
    this pattern “morningGreeting”. Defining a pattern with Matcher is straightforward.
    In this pattern, we expect a word that, when converted to lower case, matches
    the word “good”, then the same for “morning”, and then we accept so punctuation
    at the end.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: A Span is a singular sentence, so the Matcher can find the starting and ending
    point of multiple spans that we iterate over with a for loop.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: We add all the spans in a list and assign the list to the doc.spans[“sc”]. Then
    we can use displacy to visualise the span
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/f70806f25608da31868d1c8b96c1ed7e.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '**A Matcher object accepts more than one pattern at a time!**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Let’s define a morningGreeting and a eveningGreeting.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Then we add these patterns to the Matcher.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: As before, we iterate over the spans and display them.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '[PRE8]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/576f1a2266b6a5bb5e5c824b5f667e32.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: The syntax supported by spaCy is huge. Here I report some of the most common
    patterns.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Text-based attributes
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '| Attribute | Description | Example |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-34
  prefs: []
  type: TYPE_TB
- en: '| `"ORTH"` | Exact verbatim text | `{"ORTH": "Hello"}` |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
- en: '| `"LOWER"` | Lowercase form of the token | `{"LOWER": "hello"}` |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
- en: '| `"TEXT"` | Same as `"ORTH"` | `{"TEXT": "World"}` |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
- en: '| `"LEMMA"` | Lemma (base form) of the token | `{"LEMMA": "run"}` |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
- en: '| `"SHAPE"` | Shape of the word (e.g., `Xxxx`, `dd`) | `{"SHAPE": "Xxxx"}`
    |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
- en: '| `"PREFIX"` | First character(s) of the token | `{"PREFIX": "un"}` |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
- en: '| `"SUFFIX"` | Last character(s) of the token | `{"SUFFIX": "ing"}` |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
- en: Linguistic features
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '| Attribute | Description | Example |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
- en: '| `"POS"` | Universal POS tag | `{"POS": "NOUN"}` |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
- en: '| `"TAG"` | Detailed POS tag | `{"TAG": "NN"}` |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
- en: '| `"DEP"` | Syntactic dependency | `{"DEP": "nsubj"}` |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
- en: '| `"ENT_TYPE"` | Named entity type | `{"ENT_TYPE": "PERSON"}` |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
- en: Boolean flags
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '| Attribute | Description | Example |'
  id: totrans-50
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
- en: '| `"IS_ALPHA"` | Token consists of alphabetic chars | `{"IS_ALPHA": True}`
    |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
- en: '| `"IS_ASCII"` | Token consists of ASCII characters | `{"IS_ASCII": True}`
    |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
- en: '| `"IS_DIGIT"` | Token is a digit | `{"IS_DIGIT": True}` |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
- en: '| `"IS_LOWER"` | Token is lowercase | `{"IS_LOWER": True}` |'
  id: totrans-55
  prefs: []
  type: TYPE_TB
- en: '| `"IS_UPPER"` | Token is uppercase | `{"IS_UPPER": True}` |'
  id: totrans-56
  prefs: []
  type: TYPE_TB
- en: '| `"IS_TITLE"` | Token is in title case | `{"IS_TITLE": True}` |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
- en: '| `"IS_PUNCT"` | Token is punctuation | `{"IS_PUNCT": True}` |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
- en: '| `"IS_SPACE"` | Token is whitespace | `{"IS_SPACE": True}` |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
- en: '| `"IS_STOP"` | Token is a stop word | `{"IS_STOP": True}` |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
- en: '| `"LIKE_NUM"` | Token looks like a number | `{"LIKE_NUM": True}` |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
- en: '| `"LIKE_EMAIL"` | Token looks like an email address | `{"LIKE_EMAIL": True}`
    |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
- en: '| `"LIKE_URL"` | Token looks like a URL | `{"LIKE_URL": True}` |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
- en: '| `"IS_SENT_START"` | Token is at sentence start | `{"IS_SENT_START": True}`
    |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
- en: Operators
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Used to repeat or make patterns optional:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '| Operator | Description | Example |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
- en: '| `"OP"` | Pattern operator: |  |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
- en: '|  | `"?"` – zero or one | `{"LOWER": "is", "OP": "?"}` |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
- en: '|  | `"*"` – zero or more | `{"IS_DIGIT": True, "OP": "*"}` |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
- en: '|  | `"+"` – one or more | `{"IS_ALPHA": True, "OP": "+"}` |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
- en: 'Example:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: 'What is a pattern that matches a string like: *“I have 2 red apples”, “We bought
    5 green bananas”, or “They found 3 ripe oranges”* ?'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: '**Pattern Requirements:**'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Subject pronoun (e.g., “I”, “we”, “they”)
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A verb (e.g., “have”, “bought”, “found”)
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A number (digit or written, like “2”, “five”)
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An optional adjective (e.g., “red”, “ripe”)
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A plural noun (fruit, for example)
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Patterns with PhraseMatcher
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We we work in a vertical domain, like medical or scientific, we usually have
    a set of words that spaCy might not be aware of, and we want to find them in some
    text.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: The PhraseMatcher class is the spaCy solution for **comparing text against long
    dictionaries**. The usage is quite similar to the Matcher class, but in addition,
    we need to define the list of important terms we want to track. Let’s start with
    the imports.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Now we define our matcher and our list of words, and tell Spacy to create a
    pattern just to recognise that list. Here, I want to identify the names of tech
    leaders and places.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Finally check the matches.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![](../Images/57be05eec1203db95a378492bc4e7771.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: We can enhance the capabilities of the PhraseMatcher by adding some attributes.
    For example, if we need to cach IP addresses in a text, maybe in some logs, we
    cannot write all the possible combinations of IP addresses, that would be crazy.
    But we can ask Spacy to catch the shape of some IP strings, and check for the
    same shape in a text.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过添加一些属性来增强PhraseMatcher的功能。例如，如果我们需要在文本中缓存IP地址，可能在某些日志中，我们不能写出所有可能的IP地址组合，那会太疯狂了。但我们可以要求Spacy捕捉一些IP字符串的形状，并在文本中检查是否有相同的形状。
- en: '[PRE13]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '[PRE14]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '![](../Images/e9d17f10b70ca1164eeb877f2eb04dbc.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e9d17f10b70ca1164eeb877f2eb04dbc.png)'
- en: Image by Author
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: IBAN Extraction
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: IBAN提取
- en: The IBAN is an important information that we often need to extract when working
    in the financial fields, for example if are analysing invoices or transactions.
    But how can we do that?
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: IBAN是一个在金融领域工作时我们经常需要提取的重要信息，例如在分析发票或交易时。但我们应该如何做到这一点呢？
- en: Each IBAN has a fixed international number format, starting with two letters
    to identify the country.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 每个IBAN都有一个固定的国际号码格式，以两个字母开头以标识国家。
- en: We are sure that each IBAN starts with two capital letters XX followed by at
    least two digits dd. So we can write a pattern to identify this first part of
    the IBAN.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们确信每个IBAN都以两个大写字母XX开头，后面至少有两个数字dd。因此，我们可以编写一个模式来识别IBAN的这个开头部分。
- en: '[PRE15]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: It’s not done yet. For the rest of the block we might have from 1 to 4 digits
    that we can express with the symbol “\d{1,4}”.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这还没有完成。对于其余的块，我们可能有1到4位数字，我们可以用符号“\d{1,4}”来表示。
- en: '[PRE16]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: We can have one or more of these blocks, so we can use the “+” operator to identify
    all of them.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以有一个或多个这样的块，因此我们可以使用“+”运算符来识别所有这些块。
- en: '[PRE17]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Now we can combine the shape with the blocks identification.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以将形状与块识别结合起来。
- en: '[PRE18]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Now let’s use this!
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们来使用它吧！
- en: '[PRE19]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '![](../Images/fe0c99e2f509b55d22e8c5667dfeb57b.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fe0c99e2f509b55d22e8c5667dfeb57b.png)'
- en: Image by Author
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Final Thoughts
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: I hope this article helped you to see how much we can do in NLP without always
    using huge models. Many times, we just need to find things that follow rules —
    like dates, IBANs, names or greetings — and for that, spaCy gives us great tools
    like `Matcher` and `PhraseMatcher`.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这篇文章能帮助你看到在NLP中我们可以做多少事情，而不必总是使用巨大的模型。很多时候，我们只需要找到遵循规则的事物——比如日期、IBAN、名字或问候语——而为此，spaCy为我们提供了像`Matcher`和`PhraseMatcher`这样的强大工具。
- en: In my opinion, working with patterns like these is a good way to better understand
    how text is structured. Also, it makes your work more efficient when you don’t
    want to waste resources on something simple.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，使用这样的模式工作是一种更好地理解文本结构的好方法。此外，当你不想在简单的事情上浪费资源时，它使你的工作更加高效。
- en: I still think regex is powerful, but sometimes hard to read and debug. With
    spaCy, things look clearer and easier to maintain in a real project.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我仍然认为正则表达式非常强大，但有时难以阅读和调试。使用spaCy，事情看起来更清晰，更容易在实际项目中维护。
