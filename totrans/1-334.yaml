- en: Stochastic Differential Equations and Temperature — NASA Climate Data pt. 2
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 随机微分方程和温度 — NASA气候数据第二部分
- en: 原文：[https://towardsdatascience.com/stochastic-differential-equations-and-temperature-nasa-climate-data-pt-2/](https://towardsdatascience.com/stochastic-differential-equations-and-temperature-nasa-climate-data-pt-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/stochastic-differential-equations-and-temperature-nasa-climate-data-pt-2/](https://towardsdatascience.com/stochastic-differential-equations-and-temperature-nasa-climate-data-pt-2/)
- en: You might wonder why we would want to model a temperature time series as an
    Ornstein-Uhlenbeck process, and if this has any practical implications. Well,
    it does. While the O-U process is used in Physics to model the velocity of particles
    under friction, it is also used in finance to model interest rates, volatility,
    or spread mean reversion. This temperature application originates from an area
    where I have personal experience. My thesis, *“Neural Network Approaches to Pricing
    Weather Derivative*s,” focuses on developing new methods for pricing these derivatives.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想知道为什么我们要将温度时间序列建模为Ornstein-Uhlenbeck过程，以及这是否有任何实际意义。好吧，它确实有。虽然O-U过程在物理学中用于模拟摩擦下的粒子速度，但它也用于金融中模拟利率、波动性或均值回归。这种温度应用源于一个我有个人经验领域。我的论文*“神经网络在天气衍生品定价中的应用*”专注于开发这些衍生品定价的新方法。
- en: The O-U process is commonly used in pricing weather derivatives. A financial
    derivative designed to deliver a payout based on an underlying climate index (temperature,
    rainfall, windspeed, snowfall). These derivatives enable anyone exposed to climate
    risks to manage their risk exposure. That could be farmers concerned about drought,
    energy companies worried about rising heating costs, or seasonal retailers concerned
    about a poor season. You can read much more about this in [Weather Derivatives](https://link.springer.com/book/10.1007/978-1-4614-6071-8),
    Antonis Alexandridis K. (with whom I am currently working), and Achilleas D. Zapranis.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: O-U过程常用于天气衍生品的定价。这是一种金融衍生品，旨在根据基础气候指数（温度、降雨、风速、降雪）支付赔偿。这些衍生品使任何面临气候风险的人都能管理他们的风险敞口。这可能包括担心干旱的农民、担心供暖成本上升的能源公司或担心季节性零售商的糟糕季节。你可以在[天气衍生品](https://link.springer.com/book/10.1007/978-1-4614-6071-8)中了解更多信息，Antonis
    Alexandridis K.（我目前正在与他合作）和Achilleas D. Zapranis。
- en: SDEs show up wherever uncertainty lies. The **Black Scholes**, **Schrödinger
    Equations**, and **Geometric Brownian Motion** are all Stochastic Differential
    Equations. These equations describe how systems evolve when a random component
    is involved. SDEs are particularly useful for forecasting under uncertainty, whether
    that be **population growth**, **epidemic spread**, or **stock prices**. Today,
    we will be looking at how we can model temperature using the **Ornstein–Uhlenbeck** process,
    which behaves quite a bit like the **Heat Equation,** a PDE describing temperature
    flow.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 随机微分方程（SDEs）出现在不确定性的任何地方。**Black-Scholes**、**薛定谔方程**和**几何布朗运动**都是随机微分方程。这些方程描述了当随机成分参与时系统如何演变。SDEs在不确定性预测中特别有用，无论是**人口增长**、**疫情传播**还是**股价**。今天，我们将探讨如何使用**Ornstein-Uhlenbeck**过程来模拟温度，这个过程与**热方程**非常相似，热方程是一个描述温度流动的偏微分方程。
