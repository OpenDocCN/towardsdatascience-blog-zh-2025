- en: Stochastic Differential Equations and Temperature — NASA Climate Data pt. 2
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/stochastic-differential-equations-and-temperature-nasa-climate-data-pt-2/](https://towardsdatascience.com/stochastic-differential-equations-and-temperature-nasa-climate-data-pt-2/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You might wonder why we would want to model a temperature time series as an
    Ornstein-Uhlenbeck process, and if this has any practical implications. Well,
    it does. While the O-U process is used in Physics to model the velocity of particles
    under friction, it is also used in finance to model interest rates, volatility,
    or spread mean reversion. This temperature application originates from an area
    where I have personal experience. My thesis, *“Neural Network Approaches to Pricing
    Weather Derivative*s,” focuses on developing new methods for pricing these derivatives.
  prefs: []
  type: TYPE_NORMAL
- en: The O-U process is commonly used in pricing weather derivatives. A financial
    derivative designed to deliver a payout based on an underlying climate index (temperature,
    rainfall, windspeed, snowfall). These derivatives enable anyone exposed to climate
    risks to manage their risk exposure. That could be farmers concerned about drought,
    energy companies worried about rising heating costs, or seasonal retailers concerned
    about a poor season. You can read much more about this in [Weather Derivatives](https://link.springer.com/book/10.1007/978-1-4614-6071-8),
    Antonis Alexandridis K. (with whom I am currently working), and Achilleas D. Zapranis.
  prefs: []
  type: TYPE_NORMAL
- en: SDEs show up wherever uncertainty lies. The **Black Scholes**, **Schrödinger
    Equations**, and **Geometric Brownian Motion** are all Stochastic Differential
    Equations. These equations describe how systems evolve when a random component
    is involved. SDEs are particularly useful for forecasting under uncertainty, whether
    that be **population growth**, **epidemic spread**, or **stock prices**. Today,
    we will be looking at how we can model temperature using the **Ornstein–Uhlenbeck** process,
    which behaves quite a bit like the **Heat Equation,** a PDE describing temperature
    flow.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/54532d6c0edcc8c6e8d8ddabbd3cdce3.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: '**In my past two stories:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[Used Python and the NASA/POWER API to gather satellite climate data](https://towardsdatascience.com/how-to-access-nasas-climate-data-and-how-its-powering-the-fight-against-climate-change-pt-1/)
    <<< Part 1'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Used a Physics-Informed Neural Network (PINN) to solve the Heat Equation.](https://towardsdatascience.com/physics-informed-neural-networks-for-inverse-pde-problems/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Climate data is also available on my GitHub, so we can skip this step.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Today we will:**'
  prefs: []
  type: TYPE_NORMAL
- en: Explain how the O-U process can model a temperature time-series.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Talk about mean-reverting processes, stochastic differential equations, and
    how the O-U process relates to the heat equation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use Python to fit an Ornstein-Uhlenbeck (O-U) process, a Stochastic Differential
    Equation (SDE), to NASA climate data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/2bfa14cfba8079f339bae384ffb940b8.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: In the figure above, we can see how volatility changes with the seasons. This
    emphasizes an important reason why the O-U process is well-suited for modelling
    this time series, as it does not assume constant volatility.
  prefs: []
  type: TYPE_NORMAL
- en: The O-U process, mean-reversion, and the heat equation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will use the O-U process to model how temperature changes over time at a
    fixed point. In our equation, T(t) represents the temperature as a function of
    time (t). As you intuitively understand, the Earth’s temperatures cycle around
    a 365-day mean. This means that seasonal changes are modelled using s(t). We can
    think of these means as the blue and orange lines in the temperature graphs for
    Barrow, Alaska, and Niamey, Niger.
  prefs: []
  type: TYPE_NORMAL
- en: \[dT(t) = ds(t) – \kappa \left( T(t) – s(t) \right) \, dt + \sigma(t) \, dB(t)\]
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/54c725e20ab930ed64aad77332cea790.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dd8f813921da98ae6483497fe4d7a4c6.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: Kappa (κ) is the speed of mean reversion. Much like its title would imply, this
    constant controls how fast our temperature reverts back to its seasonal means.
    Mean reversion in this context means that if today is an icy day, colder than
    the average, then we would expect tomorrow’s or next week’s temperature to be
    warmer as it fluctuates around that seasonal mean.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: dT(t) = ds(t) – {\color{red}{\kappa}} \big( T(t) – s(t) \big)\, dt + \sigma(t)\,
    dB(t)
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: This constant plays a similar role in the heat equation, where it describes
    how fast a rod increases in temperature as it is being heated. In the heat equation,
    κ is the thermal diffusivity, which describes how fast heat flows through a material.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \frac{\partial u(\mathbf{x},t)}{\partial t} = {\color{red}{\kappa}} \, \nabla^2
    u(\mathbf{x},t) + q(\mathbf{x},t)
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: '**κ = 0:** No mean reversion. The process reduces to Brownian motion with drift.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**0 < κ < 1:** Weak mean reversion. The shocks persist, slow decay of autocorrelation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**κ > 1:** Strong mean reversion. Deviations are corrected quickly, and the
    process is tightly clustered around μ.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fourier Series
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Estimating Mean and Volatility
  prefs: []
  type: TYPE_NORMAL
- en: \[s(t) = a + b t + \sum_{k=1}^{K_1} \left( \alpha_k \sin\left( \frac{2\pi k
    t}{365} \right) + \beta_k \cos\left( \frac{2\pi k t}{365} \right) \right)\]
  prefs: []
  type: TYPE_NORMAL
- en: \[\sigma^2(t) = c + \sum_{k=1}^{K_2} \left( \gamma_k \sin\left( \frac{2\pi k
    t}{365} \right) + \delta_k \cos\left( \frac{2\pi k t}{365} \right) \right)\]
  prefs: []
  type: TYPE_NORMAL
- en: Fitting the Ornstein–Uhlenbeck process to Mumbai data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We fit the mean of our temperature process
  prefs: []
  type: TYPE_NORMAL
- en: Fit the mean using the Fourier Series
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model short-term dependence — and calculate the mean reversion parameter κ using
    the AR(1) process
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fit Volatility using Fourier Series
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fitting the mean
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By fitting our data to 80% of the data, we can later use our SDE to forecast
    temperatures. Our mean is an OLS regression fitting s(t) to our data.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9acf068685c2b3e31f5e4bc1f0dd7998.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: It’s far harder to see the signal in the noise when looking at the residuals
    of our regression. We might be tempted to assume that this is white-noise, but
    we would be mistaken. There is still dependence in this data, a serial dependence.
    If we wish to model volatility later using a Fourier series, we must account for
    this dependence in the data.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d92c8848a11005dfc0e24d580963afdc.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: κ, ϕ, and the autoregressive process
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Fit an AR(1) process. This tells you the speed of mean reversion.
  prefs: []
  type: TYPE_NORMAL
- en: An AR(1) process can capture the dependence between our residual at time step
    t based on the value at t-1\. The exact value for κ depends on location. For Mumbai,
    κ = 0.861\. This means temperatures return to the mean fairly quickly.
  prefs: []
  type: TYPE_NORMAL
- en: \[X_t = c + \phi X_{t-1} + \varepsilon_t, \quad \varepsilon_t \sim \mathcal{N}(0,\sigma^2)\]
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/7167c5d7f15f3a1f54d675ce062c1dca.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: In the graph above, we can see how our AR(1) process, in orange, estimates the
    next day’s temperature from 1981 to 2016\. We can further justify the use of the
    AR(1) process, and gain further intuition into it by plotting Xₜ and Xₜ₋₁. Here
    we can see how these values are clearly correlated. By framing it this way, we
    can also see that the AR(1) process is simply linear regression. We do not even
    have to add a drift/intercept term as we have removed the mean. Hence, our intercept
    is always zero.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8e300206eb12076ff11b0270abb644ed.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: Now, looking at our AR(1) residuals, we can begin to think about how we can
    model the volatility of our temperature across time. From the graph below, we
    can see how our residuals pulsate across time in a seemingly periodic way. We
    can postulate that the points in the year with higher residuals correspond to
    time periods with higher volatility.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/561d756f1786a51786fd0f4682b8f62a.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: Volatility Fourier Series
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Our solution is to model the volatility using a Fourier series, much like what
    we did for our mean. To do this, we will have to make some transformations to
    our residual εₜ. We consider the squared εₜ² because volatility cannot be negative
    by definition.
  prefs: []
  type: TYPE_NORMAL
- en: \[\varepsilon_t = \sigma_t \eta_t \qquad \varepsilon_t^{2} = \sigma_t^{2}\eta_t^{2}\]
  prefs: []
  type: TYPE_NORMAL
- en: We can think of these residuals as being comprised of part standardized shocks
    ηₜ, with a mean of 0 and a variance of 1 (representing randomness), and volatility
    σₜ. We want to isolate for σₜ. This can be accomplished more easily by taking
    the log. But more importantly, doing this makes our error terms additive.
  prefs: []
  type: TYPE_NORMAL
- en: \[\displaystyle y_t := \log(\varepsilon_t^2) = \underbrace{\log\sigma_t^2}_{\text{deterministic,
    seasonal}} + \underbrace{\log\eta_t^2}_{\text{random noise}}\]
  prefs: []
  type: TYPE_NORMAL
- en: 'In summary, modeling log(εₜ²) helps to:'
  prefs: []
  type: TYPE_NORMAL
- en: keep σ^t₂ > 0
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reduce the effect that outliers have on the fit, meaning they will have a less
    significant impact on the fit.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After we fit log(εₜ²), if we ever wish to recover εₜ², we exponentiate it later.
  prefs: []
  type: TYPE_NORMAL
- en: \[\displaystyle \widehat{\sigma}_t^{\,2} \;=\; \exp\!\big(\widehat y_t\big)\]
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/dd61061a92cffc15fbae062eda4d0f57.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: \[dT(t) = ds(t) – \kappa (T(t) – s(t)),dt + \exp\left(\frac{1}{2}(\alpha + \beta^T
    z(t))\right), dB(t)\]
  prefs: []
  type: TYPE_NORMAL
- en: Demo of log stabilization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The graphs below illustrate how the logarithm aids in fitting volatility. The
    residual εₜ² contains significant outliers, partly due to the square operation
    performed to ensure positivity on the stabilized scale. Without the log stabilization,
    the large shocks dominate the fit, and the final result is biased.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/27ba7528a34290861567bf6deb1b89a9.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6bab10906ee6eb43723386c06da1df67.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a0d7cea01a4ef580473e95c5869bd2f8.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/332537ec4d1c3c2f1df9bf00fd276861.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph by Author
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have fitted all these parameters to this SDE, we can consider using
    it to forecast. But getting here hasn’t been easy. Our solution heavily relied
    on two key concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Functions can be approximated through a Fourier series.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The mean reversion parameter κ is equivalent to ϕ from our AR(1) process.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Whenever fitting a stochastic differential equation, whenever doing anything
    *stochastic*, I find it funny to think of how the word derives from *stokhos,*
    meaning aim. Even funnier is how that word turned into *stokhazesthai,* meaning
    aim/guess. That process must’ve involved some error and horrible aim.
  prefs: []
  type: TYPE_NORMAL
