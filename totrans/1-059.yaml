- en: Data Science Mistakes That Could Ruin Your Learning Path, and How to Avoid Them
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据科学错误可能会毁掉你的学习路径，以及如何避免它们
- en: 原文：[https://towardsdatascience.com/struggling-with-data-science-5-common-beginner-mistakes/](https://towardsdatascience.com/struggling-with-data-science-5-common-beginner-mistakes/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/struggling-with-data-science-5-common-beginner-mistakes/](https://towardsdatascience.com/struggling-with-data-science-5-common-beginner-mistakes/)
- en: <mdspan datatext="el1764014474228" class="mdspan-comment">If you’re studying</mdspan>
    data science, first of all well done.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764014474228" class="mdspan-comment">如果你在学习</mdspan>数据科学，首先恭喜你。
- en: You’ve chosen one of the most lucrative and fast-growing careers in tech.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你选择了科技领域中最有利可图且增长最快的职业之一。
- en: 'But here’s the truth: most students waste months (even years) spinning their
    wheels on the wrong things. Avoid these mistakes to fast track your data science
    career.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但事实是：大多数学生浪费了几个月（甚至几年）在错误的事情上空转。避免这些错误，以快速推进你的数据科学职业生涯。
- en: After 4+ years working in the field, I’ve seen exactly what separates those
    who land their first data science job fast… from those who never make it past
    endless tutorials.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个领域工作了4+年后，我看到了那些快速找到第一份数据科学工作的人和那些永远无法通过无穷无尽的教程的人之间的区别。
- en: In this article, I’ll break down the five biggest mistakes that hold beginner
    data scientists back so you can actively avoid them.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将分解阻碍初学数据科学家前进的五大错误，以便你可以积极避免它们。
- en: Not Learning Fundamental Maths
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 没有学习基础数学
- en: Maths is by far the most important… and yet also the most overlooked.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 数学无疑是最重要的……然而也是被忽视最多的。
- en: Many people, even practitioners, think that you don’t need to know the underlying
    maths behind data science and machine learning.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人，甚至从业者，认为你不需要知道数据科学和机器学习背后的底层数学。
- en: You are indeed very unlikely to carry out [backpropagation](https://towardsdatascience.com/forward-pass-backpropagation-neural-networks-101-3a75996ada3b)
    by hand, build a decision tree from scratch, or construct an A/B experiment from
    first principles.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 你确实不太可能手动执行[反向传播](https://towardsdatascience.com/forward-pass-backpropagation-neural-networks-101-3a75996ada3b)，从头开始构建决策树，或者从原理出发构建A/B实验。
- en: So, it is easy to take this for granted and avoid learning any of the background
    theory.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，很容易就认为这是理所当然的，并避免学习任何背景理论。
- en: '*However, this is dangerous and I don’t recommend it.*'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*然而，这是危险的，我不推荐这样做。*'
- en: Sure, you can build a neural network with a few lines of PyTorch, but what happens
    when it has weird behaviour and you need to debug it?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你可以用几行PyTorch代码构建一个神经网络，但当你需要调试它时，它出现了奇怪的行为怎么办？
- en: Or what if someone asked you what the prediction interval is around your output
    from a linear regression model?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，如果有人问你线性回归模型输出的预测区间是什么？
- en: These scenarios come up more frequently than you think, and the only way you
    can answer them is by having a solid grasp of the underpinning maths.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这些场景比你想的更常见，而你唯一能够回答这些问题的方法就是牢固掌握基础数学。
- en: Think of maths as the operating system of your brain for data science. Every
    model, every algorithm, every insight you produce runs on it.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 将数学视为你大脑中数据科学的操作系统。每一个模型、每一个算法、每一个你产生的洞察都运行在其上。
- en: If your OS is buggy or outdated, nothing else runs smoothly, no matter how fancy
    your tools are.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的操作系统有缺陷或过时，无论你的工具多么花哨，其他东西都无法顺利运行。
- en: Lay the foundations now while you are in the learning phase, as this will allow
    you to move much faster later in your career.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习阶段打下基础，这将使你在职业生涯的后期能够更快地前进。
- en: Trying To Find The “Best” Course
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 试图找到“最好的”课程
- en: 'I often get asked:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常被问到：
- en: '*What’s the best course?*'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*最好的课程是什么？*'
- en: I really do love you all, but this question needs to go away.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我真的非常爱你们所有人，但这个问题需要消失。
- en: As a complete beginner, the best course is the one you choose and complete.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名完全的初学者，最好的课程是你选择的并完成的课程。
- en: Many introductory courses in data science, machine learning, and Python will
    teach you the same things.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学、机器学习和Python的许多入门课程都会教授你相同的内容。
- en: You may find a teacher or a teaching style better than another, but fundamentally,
    you will acquire very similar knowledge to another person doing some other course.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会发现某个老师或教学方法比另一个更好，但本质上，你将获得与另一个学习其他课程的人非常相似的知识。
- en: Bias towards action and getting going in the beginning, you can later adjust
    your direction if you feel you are misaligned. Stop overthinking.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在一开始就偏向行动和开始行动，如果你觉得你偏离了方向，你可以稍后调整你的方向。停止过度思考。
- en: 'As the [**famous saying**](https://www.odgersinterim.com/uk/who-we-are/intelligence/the-best-time-to-plant-a-tree-was-20-years-ago-the-second-best-time-is-today-4074/#:~:text=With%20the%20arrival%20of%20the,second%20best%20time%20is%20today.)
    goes:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 正如[**著名谚语**](https://www.odgersinterim.com/uk/who-we-are/intelligence/the-best-time-to-plant-a-tree-was-20-years-ago-the-second-best-time-is-today-4074/#:~:text=With%20the%20arrival%20of%20the,second%20best%20time%20is%20today.)所说：
- en: '*The best time to plant a tree was 20 years ago. The second best time is today.*'
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*种树最好的时间是20年前，其次是今天。*'
- en: Everyone’s journey and background are different, and there is no “one way” to
    break into data science.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人的旅程和背景都不同，没有“一种方式”可以进入数据科学领域。
- en: So, take everyone’s advice (even mine) always with a pinch of salt and tailor
    it to yourself. Do what feels right and best for you.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，无论别人的建议（甚至包括我的）如何，都要带着一点盐分，并根据自己的情况进行调整。做你觉得正确和最好的事情。
- en: Not Doing Project-Based Learning
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不进行基于项目的学习
- en: Along that theme, another common pitfall is tutorial hell.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个主题下，另一个常见的陷阱是教程地狱。
- en: '*Trust me, that’s not a place you want to be in.*'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '*相信我，你不想身处那样的地方。*'
- en: 'If you are unaware of what tutorial hell is, this [**blog post**](https://blog.boot.dev/education/building-your-first-coding-project/#:~:text=Tutorial%20hell%20is%20where%20you,build%20something%20on%20your%20own.)
    explains it very well:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道什么是教程地狱，这篇[**博客文章**](https://blog.boot.dev/education/building-your-first-coding-project/#:~:text=Tutorial%20hell%20is%20where%20you,build%20something%20on%20your%20own.)解释得非常好：
- en: '*Tutorial hell is where you write code that others are explaining to you how
    to write, but you don’t understand how to write it yourself when given a blank
    slate. At some point, it’s time to take the training wheels off and build something
    on your own*'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*教程地狱是你编写代码，别人在教你如何编写代码，但当你面对一张白纸时，你却不知道如何自己编写代码。在某个时候，是时候去掉训练轮子，自己动手做一些东西了。*'
- en: You are basically following tutorial after tutorial and not attempting to build
    anything on your own.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你基本上是在一个教程接一个教程地跟随，而没有尝试自己构建任何东西。
- en: To learn the concepts, you need to practice and apply them independently in
    your work. This is how you solidify your understanding, and the *real* learning
    is done.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要学习概念，你需要练习并在工作中独立应用它们。这样你才能巩固你的理解，真正的学习就是这样进行的。
- en: Imagine that you have only ever built an [**XGBoost**](https://xgboost.readthedocs.io/en/stable/)
    model following online tutorials.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你只通过在线教程构建了一个[**XGBoost**](https://xgboost.readthedocs.io/en/stable/)模型。
- en: If you are then given a takeaway case study as part of an interview, you are
    going to really struggle as you have had no experience building models without
    a step-by-step walkthrough.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你随后在面试中得到了一个案例研究作为参考，你将会非常困难，因为你没有任何没有一步一步指导构建模型的经验。
- en: What I advocate for is “project-based learning.”
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我提倡的是“基于项目的学习”。
- en: '*You want to learn just enough, and then immediately build a project.*'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '*你只需要学习足够多的知识，然后立即构建一个项目。*'
- en: Trust me, this approach is exponentially better than doing numerous tutorials
    (speaking from painful experience here!).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 相信我，这种方法比做无数个教程要好得多（从我痛苦的经验中得出的结论！）。
- en: Quantity Over Quality Projects
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 量化胜于质量项目
- en: Whilst doing projects is the best way to learn, don’t oversaturate your GitHub
    with loads of “easy” projects.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然做项目是学习的最佳方式，但不要让你的GitHub充斥着大量的“简单”项目。
- en: If all your projects revolve around an already pre-made dataset from Kaggle
    and using sci-kit learn’s `.fit()` and `.predict()` methods, it’s probably time
    to try something a bit harder.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你所有的项目都围绕Kaggle上已经制作好的数据集，并使用sci-kit learn的`.fit()`和`.predict()`方法，可能到了尝试更难一些的时候了。
- en: Now, I am not slating these entry-level projects, as they are a great way to
    get your hands dirty.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我并不是在批评这些入门级项目，因为它们是让你动手实践的好方法。
- en: However, at some point, the quality of your projects will matter more than the
    quantity.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在某个时候，项目的质量将比数量更重要。
- en: Larger, in-depth projects will be the ones that actually get you hired. Recruiters
    don’t want to see another titanic dataset problem; if anything, it would be a
    red flag nowadays.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 较大、深入的项目才是真正能让你被雇佣的项目。招聘人员不想看到另一个泰坦级的数据集问题；如果有的话，这在当今时代可能是一个红旗。
- en: 'Some ideas to try:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 一些尝试的想法：
- en: '*Build ML algorithms from scratch using native Python.*'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*从头开始使用原生Python构建机器学习算法。*'
- en: '*Re-implementing a research paper and trying to replicate the authors’ results.*'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*重新实现研究论文并尝试复制作者的成果。*'
- en: '*Build a basic recommendation system for something personal in your life.*'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*为你的生活中的一些个人事物构建一个基本的推荐系统。*'
- en: '*Fine-tune an LLM.*'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*微调一个LLM。*'
- en: This is by no means an exhaustive list, and the best project is the one that
    is personal to you, as I always say.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这绝对不是一份详尽的列表，最好的项目是那些对你个人而言的项目，正如我经常说的。
- en: Jumping Straight To AI
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 直接跳入人工智能
- en: I am going to be honest with you.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我会对你坦诚。
- en: I am an AI hater.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我是一个人工智能的反对者。
- en: '*No, I don’t think it will replace data scientists.*'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '*不，我不认为它会取代数据科学家。*'
- en: '*No, I don’t think it is as good as people think.*'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '*不，我不认为它像人们想象的那样好。*'
- en: '*And I’m as sure as hell am not worried about it at all for the next 5 years.*'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '*而且我确实非常确信，在接下来的5年里我一点也不担心这件事。*'
- en: The reasons I am not worried could fill a whole video, so I will leave that
    for later. But it’s actually funny, almost how little I am concerned by it.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我不担心的原因可以填满一个整视频，所以我会留到以后再说。但事实上，这很搞笑，几乎可以说我对这件事的关注非常少。
- en: Anyway, the reason I say this is that it baffles me when I see beginners jump
    straight into learning AI and LLMs.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 无论如何，我之所以这么说，是因为当我看到初学者直接跳入学习人工智能和大型语言模型时，我感到很困惑。
- en: This is a prime example of shiny object syndrome.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个典型的“闪亮物体综合症”的例子。
- en: As a beginner, focus on the basics of maths and statistics, and on old-school
    algorithms such as decision trees, regression models, and support vector machines.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 作为初学者，专注于数学和统计学的基础知识，以及老式的算法，如决策树、回归模型和支持向量机。
- en: These are evergreen and will remain around for a long time, so it’s wise to
    invest in them early on.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这些项目是常青的，将长期存在，因此尽早投资它们是明智的。
- en: AI is still an unknown entity, and whether it will be as popular and helpful
    in a few years is hard to tell.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能仍然是一个未知的实体，很难说它在几年后是否会像现在这样流行和有用。
- en: If the topic is popular now and indeed helpful, it will be popular 1 year, 3
    years, and even a decade from now. So, don’t worry, you have plenty of time to
    study cutting-edge topics.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果现在这个话题很流行并且确实有用，那么它将在1年后、3年后，甚至10年后仍然流行。所以，不用担心，你有足够的时间去研究前沿话题。
- en: '* * *'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Remember what I said earlier about not all projects getting you hired?
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 记得我之前说的，不是所有项目都能帮你找到工作吗？
- en: That longer, more in-depth ones make all the difference?
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 那些更长、更深入的内容有什么不同吗？
- en: '*But what do these projects actually look like?*'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '*但这些项目实际上是什么样的呢？*'
- en: Well, see my previous article, which walks through specific projects thathelp
    you stand out (and which ones are a total waste of time).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，看看我之前的文章，它详细介绍了那些能让你脱颖而出的具体项目（以及哪些是完全浪费时间）。
- en: See you there!
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 那里见！
- en: '[How to Build Machine Learning Projects That Help You Get Hired](https://towardsdatascience.com/the-machine-learning-projects-employers-want-to-see/)'
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何构建能助你获得工作的机器学习项目](https://towardsdatascience.com/the-machine-learning-projects-employers-want-to-see/)'
- en: Another Thing!
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 另一件事！
- en: Join my free newsletter where I share weekly tips, insights, and advice on landing
    your first data science or machine learning job. Plus, as a subscriber, you’ll
    get my **FREE Resume Template!**
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 加入我的免费通讯，我会分享每周的技巧、见解和建议，帮助你找到第一份数据科学或机器学习工作。此外，作为订阅者，你将获得我的**免费简历模板**！
- en: '[**https://newsletter.egorhowell.com**](https://newsletter.egorhowell.com)'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '[**https://newsletter.egorhowell.com**](https://newsletter.egorhowell.com)'
- en: Connect With Me
  id: totrans-78
  prefs:
  - PREF_H2
