- en: 'Demand Forecasting with Darts: A Tutorial'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/demand-forecasting-with-darts-a-tutorial-480ba5c24377/](https://towardsdatascience.com/demand-forecasting-with-darts-a-tutorial-480ba5c24377/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Victoriano Izquierdo on Unsplash](../Images/78f15763db8dddd51f9068673a504431.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Victoriano Izquierdo](https://unsplash.com/@victoriano?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: Demand forecasting for retailing companies can become a complex task, as several
    factors need to be considered from the start of the project to the final deployment.
    This article provides an overview of the main steps required to train and deploy
    a demand forecasting model, alongside some tips and recommendations I have gained
    with experience as a consultant.
  prefs: []
  type: TYPE_NORMAL
- en: Each section will have two main types of subsections. The first subsections
    will be dedicated to tips and advice I gathered from working on my projects. The
    other subsection is called ***Let’s code!*** and will include the code snippets
    of a hands-on Python tutorial. Note that this tutorial is meant to be simple,
    show how you can use [Darts](https://unit8co.github.io/darts/README.html) for
    demand forecasting, and highlight a couple of deep learning models for this task.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can access the full source code for the tutorial at: **** [https://github.com/egomezsandra/demand-forecasting-darts.git](https://github.com/egomezsandra/demand-forecasting-darts.git)'
  prefs: []
  type: TYPE_NORMAL
- en: Why demand forecasting isn’t as straightforward as it may seem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You just landed your first job as a data scientist at a retail company. Your
    new boss has heard that every big company uses AI to boost its inventory management
    efficiency, so your first project is to deploy a demand forecasting model. You
    know all about time series forecasting, but when you start working with the transactional
    database, you feel unsure and don’t know how to begin.
  prefs: []
  type: TYPE_NORMAL
- en: 'In business, use cases have more layers and complexity than simple forecasting
    or prediction machine learning tasks. This difference is something most of us
    learn once we gain professional experience. Let’s break down the different steps
    this guide will go over:'
  prefs: []
  type: TYPE_NORMAL
- en: Have you gathered all the relevant data?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Have you checked for wrong values? Are you forecasting sales or demand?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Do you need to forecast all products? Can you extract any more relevant information?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Have you defined a baseline set of predictions? Is your model local or global?
    What libraries and models did you choose?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How are you evaluating the performance of your model? Will your model’s predictions
    deteriorate with time?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How will you provide the predictions? Will you deploy the model in the company’s
    cloud services?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Have you gathered all the relevant data?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s assume your company has provided you with a transactional database with
    sales of different products and different sale locations. This data is called
    panel data, which means that you will be working with many time series simultaneously.
  prefs: []
  type: TYPE_NORMAL
- en: 'The transactional database will probably have the following format: the date
    of the sale, the location identifier where the sale took place, the product identifier,
    the quantity, and probably the monetary cost. Depending on how this data is collected,
    it will be aggregated differently, by time (daily, weekly, monthly) and by group
    (by customer or by location and product).'
  prefs: []
  type: TYPE_NORMAL
- en: 'But is this all the data you need for demand forecasting? Yes and no. Of course,
    you can work with this data and make some predictions, and if the relations between
    the series are not complex, a simple model might work. But if you are reading
    this tutorial, you are probably interested in predicting demand when the data
    is not as simple. In this case, there’s additional information that can be a gamechanger
    if you have access to it:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Historical stock data:** It is crucial to be aware of when stockouts occur,
    as the demand could still be high when sales data doesn’t reflect it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Promotions data:** Discounts and promotions can also affect demand as they
    affect the customers’ shopping behavior.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Events data:** As discussed later, one can extract time features from the
    date index. However, holiday data or special dates can also condition consumption.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Other domain data:** Any other data that could affect the demand for the
    products you are working with can be relevant to the task.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s code!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For this tutorial, we will work with monthly sales data aggregated by product
    and sale location. This example dataset is from the [Stallion Kaggle Competition](https://www.kaggle.com/datasets/utathya/future-volume-prediction)
    and records beer products (SKU) distributed to retailers through wholesalers (Agencies).
    The first step is to format the dataset and select the columns that we want to
    use for training the models. As you can see in the code snippet, we are combining
    all the events columns into one called ‘special days’ for simplicity. As previously
    mentioned, this dataset misses stock data, so if stockouts occurred we could be
    misinterpreting the realdemand.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![Image by author](../Images/95237645a182ba91c38762cd04bcab9f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Preprocessing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Have you checked for wrong values?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While this part is more obvious, it’s still worth mentioning, as it can avoid
    feeding wrong data into our models. In transactional data, look for zero-price
    transactions, sales volume larger than the remaining stock, transactions of discontinued
    products, and similar.
  prefs: []
  type: TYPE_NORMAL
- en: Are you forecasting sales or demand?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is a key distinction we should make when forecasting demand, as the goal
    is to foresee the demand for products to optimize re-stocking. If we look at sales
    without observing the stock values, we could be underestimating demand when stockouts
    occur, thus, introducing bias into our models. In this case, we can ignore transactions
    after a stockout or try to fill those values correctly, for example, with a moving
    average of the demand.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s code!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the case of the selected dataset for this tutorial, the preprocessing is
    quite simple as we don’t have stock data. We need to correct zero-price transactions
    by filling them with the correct value and fill the missing values for the discount
    column.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Feature extraction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Do you need to forecast all products?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Depending on some conditions such as budget, cost savings and the models you
    are using you might not want to forecast the whole catalog of products. Let’s
    say after experimenting, you decide to work with neural networks. These are usually
    costly to train, and take more time and lots of resources. If you choose to train
    and forecast the complete set of products, the costs of your solution will increase,
    maybe even making it not worth investing in for your company. In this case, a
    good alternative is to segment the products based on specific criteria, for example
    using your model to forecast just the products that produce the highest volume
    of income. The demand for remaining products could be predicted using a simpler
    and cheaper model.
  prefs: []
  type: TYPE_NORMAL
- en: Can you extract any more relevant information?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Feature extraction can be applied in any time series task, as you can extract
    some interesting variables from the date index. Particularly, in demand forecasting
    tasks, these features are interesting as some consumer habits could be seasonal.Extracting
    the day of the week, the week of the month, or the month of the year could be
    interesting to help your model identify these patterns. It is key to encode these
    features correctly, and I advise you to read about cyclical encoding as it could
    be more suitable in some situations for time features.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s code!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first thing we are doing in this tutorial is to segment our products and
    keep only those that are high-rotation. Doing this step before performing feature
    extraction can help reduce performance costs when you have too many low-rotation
    series that you are not going to use. For computing rotation, we are only going
    to use train data. For that, we define the splits of the data beforehand. Notice
    that we have 2 dates for the validation set, VAL_DATE_IN indicates those dates
    that also belong to the training set but can be used as input of the validation
    set, and VAL_DATE_OUT indicates from which point the timesteps will be used to
    evaluate the output of the models. In this case, we tag as high-rotation all series
    that have sales 75% of the year, but you can play around with the implemented
    function in the source code. After that, we perform a second segmentation, to
    ensure that we have enough historical data to train the models.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: As we are working with monthly aggregated data, there aren’t many time features
    to be extracted. In this case, we include the position, which is just a numerical
    index of the order of the series. Time features can be computed on train time
    by specifying them to Darts via encoders. Moreover, we also compute the moving
    average and exponential moving average of the previous four months.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Training the model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Have you defined a baseline set of predictions?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As in other use cases, before training any fancy models, you need to establish
    a baseline that you want to overcome.Usually, when choosing a baseline model,
    you should aim for something simple that barely has any costs. A common practice
    in this field is using the moving average of demand over a time window as a baseline.
    This baseline can be computed without requiring any models, but for code simplicity,
    in this tutorial, we will use the Darts’ baseline model, *NaiveMovingAverage*.
  prefs: []
  type: TYPE_NORMAL
- en: Is your model local or global?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You are working with multiple time series. Now, you can choose to train a local
    model for each of these time series or train just one global model for all the
    series. There is not a ‘right’ answer, both work depending on your data. If you
    have data that you believe has similar behaviors when grouped by store, types
    of products, or other categorical features, you might benefit from a global model.
    Moreover, if you have a very high volume of series and you want to use models
    that are more costly to store once trained, you may also prefer a global model.
    However, if after analyzing your data you believe there are no common patterns
    between series, your volume of series is manageable, or you are not using complex
    models, choosing local models may be best.
  prefs: []
  type: TYPE_NORMAL
- en: What libraries and models did you choose?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are many options for working with time series. In this tutorial, I suggest
    using Darts. Assuming you are working with Python, this forecasting library is
    very easy to use. It provides tools for managing time series data, splitting data,
    managing grouped time series, and performing different analyses. It offers a wide
    variety of global and local models, so you can run experiments without switching
    libraries. Examples of the available options are baseline models, statistical
    models like ARIMA or Prophet, Scikit-learn-based models, Pytorch-based models,
    and ensemble models. Interesting options are models like Temporal Fusion Transformer
    (TFT) or Time Series Deep Encoder (TiDE), which can learn patterns between grouped
    series, supporting categorical covariates.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s code!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first step to start using the different Darts models is to turn the Pandas
    Dataframes into the time series Darts objects and split them correctly. To do
    so, I have implemented two different functions that use Darts’ functionalities
    to perform these operations. The features of prices, discounts, and events will
    be known when forecasting occurs, while for calculated features we will only know
    past values.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The first model we are going to use is the NaiveMovingAverage baseline model,
    to which we will compare the rest of our models. This model is really fast as
    it doesn’t learn any patterns and just performs a moving average forecast given
    the input and output dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Normally, before jumping into deep learning, you would try using simpler and
    less costly models, but in this tutorial, I wanted to focus on two special deep
    learning models that have worked well for me. I used both of these models to forecast
    the demand for hundreds of products across multiple stores by using daily aggregated
    sales data and different static and continuous covariates, as well as stock data.
    It is important to note that these models work better than others specifically
    in long-term forecasting.
  prefs: []
  type: TYPE_NORMAL
- en: The first model is the Temporal Fusion Transformer. This model allows you to
    work with lots of time series simultaneously (i.e., it is a global model) and
    is very flexible when it comes to covariates. It works with static, past (the
    values are only known in the past), and future (the values are known in both the
    past and future) covariates. It manages to learn complex patterns and it supports
    probabilistic forecasting. The only drawback is that, while it is well-optimized,
    it can be costly to tune and train. In my experience, it can give very good results
    but the process of tuning the hyperparameters takes too much time if you are short
    on resources. In this tutorial, we are training the TFT with mostlythe default
    parameters, and the same input and output windows that we used for the baseline
    model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The second model is the Time Series Deep Encoder. This model is a little bit
    more recent than the TFT and is built with dense layers instead of LSTM layers,
    which makes the training of the model much less time-consuming. The Darts implementation
    also supports all types of covariates and probabilistic forecasting, as well as
    multiple time series. The paper on this model shows that it can match or outperform
    transformer-based models on forecasting benchmarks. In my case, as it was much
    less costly to tune, I managed to obtain better results with TiDE than I did with
    the TFT model in the same amount of time or less. Once again for this tutorial,
    we are just doing a first run with mostly default parameters. Note that for TiDE
    the number of epochs needed is usually smaller than for the TFT.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Evaluating the model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How are you evaluating the performance of your model?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While typical time series metrics are useful for evaluating how good your model
    is at forecasting, it is recommended to go a step further. First, when evaluating
    against a test set, you should discard all series that have stockouts, as you
    won’t be comparing your forecast against real data. Second, it is also interesting
    to incorporate domain knowledge or KPIs into your evaluation. One key metric could
    be how much money would you be earning with your model, avoiding stockouts. Another
    key metric could be how much money are you saving by avoiding overstocking short
    shelf-life products. Depending on the stability of your prices, you could even
    train your models with a custom loss function, such as a price-weighted Mean Absolute
    Error (MAE) loss.
  prefs: []
  type: TYPE_NORMAL
- en: Will your model’s predictions deteriorate with time?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Dividing your data in a train, validation, and test split is not enough for
    evaluating the performance of a model that could go into production. By just evaluating
    a short window of time with the test set, your model choice is biased by how well
    your model performs in a very specific predictive window. Darts provides an easy-to-use
    implementation of backtesting, allowing you to simulate how your model would perform
    over time by forecasting moving windows of time. With backtesting you can also
    simulate the retraining of the model every N steps.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s code!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If we look at our models’ results in terms of MAE across all series we can see
    that the clear winner is TiDE, as it manages to reduce the baseline’s error the
    most while keeping the time cost fairly low. However, let’s say that our beer
    company’s best interest is to reduce the monetary cost of stockouts and overstocking
    equally. In that case, we can evaluate the predictions using a price-weighted
    MAE.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by author](../Images/d76ccabeaca372082d830ffb30144d3f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: After computing the price-weighted MAE for all series, the TiDE is still the
    best model, although it could have been different. If we compute the improvement
    of using TiDE w.r.t the baseline model, in terms of MAE is 6.11% but in terms
    of monetary costs, the improvement increases a little bit. Reversely, when looking
    at the improvement when using TFT, the improvement is greater when looking at
    just sales volume rather than when taking prices into the calculation.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by author](../Images/cff3cd86481fada98b4140a72eb9256a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'For this dataset, we aren’t using backtesting to compare predictions because
    of the limited amount of data due to it being monthly aggregated. However, I encourage
    you to perform backtesting with your projects if possible. In the source code,
    I include this function to easily perform backtesting with Darts:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Deploying the model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How will you provide the predictions?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this tutorial, it is assumed that you are already working with a predefined
    forecasting horizon and frequency. If this wasn’t provided, it is also a separate
    use case on its own, where delivery or supplier lead times should also be taken
    into account. Knowing how often your model’s forecast is required is important
    as it could require a different level of automation. If your company needs predictions
    every two months, maybe investing time, money, and resources in the automation
    of this task isn’t necessary. However, if your company needs predictions twice
    a week and your model takes longer to make these predictions, automating the process
    can save future efforts.
  prefs: []
  type: TYPE_NORMAL
- en: Will you deploy the model in the company’s cloud services?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Following the previous advice, if you and your company decide to deploy the
    model and put it into production, it is a good idea to follow MLOps principles.
    This would allow anyone to easily make changes in the future, without disrupting
    the whole system. Moreover, it is also important to monitor the model’s performance
    once in production, as concept drift or data drift could happen. Nowadays numerous
    cloud services offer tools that manage the development, deployment, and monitoring
    of machine learning models. Examples of these are Azure Machine Learning and Amazon
    Web Services.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now you have a brief introduction to the basics of demand forecasting. We have
    gone over each step: data extraction, preprocessing and feature extraction, model
    training and evaluation, and deployment. We have gone through different interesting
    model options for demand forecasting using only Darts, showcasing the availability
    of simpler benchmark models, and also the potential of TiDE and TFT models with
    a first run.'
  prefs: []
  type: TYPE_NORMAL
- en: What to do next?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now it’s your turn to incorporate these different tips into your data or play
    around with this tutorial and other datasets you may find online. There are many
    models, and each demand forecasting dataset has its peculiarities, so the possibilities
    are endless.
  prefs: []
  type: TYPE_NORMAL
- en: Other problems
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are some other problems that we haven’t covered in this article. One that
    I have encountered is that sometimes products are discontinued and then substituted
    by a very similar version with minor changes. Since this affects how much history
    you have for a product, you need to map these changes, and often you can’t compare
    the demand of these two products due to the changes made.
  prefs: []
  type: TYPE_NORMAL
- en: If you can think of other problems related to this use case, I encourage you
    to share them in the comments and start a discussion.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
