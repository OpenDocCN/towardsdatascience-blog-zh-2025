  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**The Hard Thing About Hard Things (Ben Horowitz, 2014): **](https://ig.ft.com/sites/business-book-award/books/2014/longlist/the-hard-thing-about-hard-things-by-ben-horowitz/)Shows
    how leaders can confront complex, high-stakes decisions by deliberately stress-testing
    their own judgments — an approach akin to creating an “inner crowd.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
