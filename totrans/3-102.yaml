- en: 'Ivory Tower Notes: The Problem'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/ivory-tower-notes-the-problem/](https://towardsdatascience.com/ivory-tower-notes-the-problem/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: One reason data and AI projects fail is due to inadequate *scoping*, leading
    to the *prioritisation* of incorrect issues. Whether you have experienced this
    before or are new to the AI field, welcome to my **first Ivory Tower Note**, where
    I will discuss “the” *problem* topic.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '*The term* ***“Ivory Tower”*** *is a metaphor for a situation in which someone
    is isolated from the practical realities of everyday life.* ***In academia****,
    the term often refers to researchers who engage deeply in theoretical pursuits
    and remain distant from the realities that practitioners face outside academia.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**As a former researcher, I wrote a* ***short series of posts based on my old
    Ivory Tower notes — the notes from before the LLM era.****'
  prefs: []
  type: TYPE_NORMAL
- en: '*Scary, I know. I am writing this to manage expectations and the question,
    “Why ever did you do things this way?” — “Because no LLM told me how to do otherwise
    10+ years ago.”*'
  prefs: []
  type: TYPE_NORMAL
- en: '*That’s why my notes contain “legacy” topics such as* ***data mining, machine
    learning, multi-criteria decision-making, and (sometimes) human interactions,
    airplanes*** *✈️* ***and******art.***'
  prefs: []
  type: TYPE_NORMAL
- en: '*Nonetheless, whenever there is an opportunity, I will map my “old” knowledge
    to* ***generative AI advances*** *and**explain how I applied it to datasets beyond
    the Ivory Tower.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Welcome to post #1…**'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: How every AI journey starts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '** — It starts with a problem. **'
  prefs: []
  type: TYPE_NORMAL
- en: For you, this is usually “the” problem because you need to live with it for
    months or, in the case of research, *years*.
  prefs: []
  type: TYPE_NORMAL
- en: With “the” problem, I am addressing the business issue you may not fully understand
    or know how to solve at first.
  prefs: []
  type: TYPE_NORMAL
- en: An even worse scenario is when you think you fully understand and know how to
    solve it *quickly*. This then creates *only* more problems that are again *only*
    yours to solve. But more about this in the upcoming sections.
  prefs: []
  type: TYPE_NORMAL
- en: So, what’s “the” problem about?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Causa:** It’s mostly about not managing or leveraging resources properly — 
    workforce, equipment, money, or time.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ratio:** It’s usually about generating business value, which can span from
    improved accuracy, increased productivity, cost savings, revenue gains, faster
    reaction, decision, planning, delivery or turnaround times.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Veritas:** It’s always about finding a solution that relies on and is hidden
    somewhere in the existing dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: Or, more than one dataset that someone labelled as “the one”, and that’s waiting
    for you to solve *the* problem. Because datasets follow and are created from technical
    or business process logs, “*there has to be a solution lying somewhere within
    them.*”
  prefs: []
  type: TYPE_NORMAL
- en: Ah, if only it were so easy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Avoiding a different chain of thought again, the point is you will need to:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1 — **Understand the problem fully,'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**2 — **If not given, find the dataset “behind” it, and'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**3 — **Create a methodology to get to the solution that will generate business
    value from it.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: On this path, you will be tracked and measured, and time will not be on your
    side to deliver the solution that will solve “the universe equation.”
  prefs: []
  type: TYPE_NORMAL
- en: That’s why you will need to approach the problem methodologically, drill down
    to smaller problems first, and focus entirely on them because they are the root
    cause of the overall problem.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why it’s good to learn how to…
  prefs: []
  type: TYPE_NORMAL
- en: '[Think like a Data Scientist.](https://www.manning.com/books/think-like-a-data-scientist)'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Returning to the problem itself, let’s imagine that you are a tourist lost somewhere
    in the big museum, and you want to figure out where you are. What you do next
    is walk to the closest info map on the floor, which will show your current location.
  prefs: []
  type: TYPE_NORMAL
- en: 'At this moment, in front of you, you see something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9d912f147ec5f9a22b71228a699d304b.png)'
  prefs: []
  type: TYPE_IMG
- en: <mdspan datatext="el1744310420047" class="mdspan-comment">Data Science</mdspan>
    Process. Image by Author, inspired by [Microsoft Learn](https://learn.microsoft.com/en-us/fabric/data-science/data-science-overview)
  prefs: []
  type: TYPE_NORMAL
- en: 'The next thing you might tell yourself is, “*I want to get to Frida Kahlo’s
    painting.”* (*Note*: These are the insights you want to get.)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Because your goal is to see this one painting that brought you miles away from
    your home and now sits two floors below, you head straight to the second floor.
    Beforehand, you memorized the shortest path to reach your goal. (*Note*: This
    is the initial data collection and discovery phase.)'
  prefs: []
  type: TYPE_NORMAL
- en: However, along the way, you stumble upon some obstacles — the elevator is shut
    down for renovation, so you have to use the stairs. The museum paintings were
    reordered just two days ago, and the info plans didn’t reflect the changes, so
    the path you had in mind to get to the painting is not accurate.
  prefs: []
  type: TYPE_NORMAL
- en: Then you find yourself wandering around the third floor already, asking quietly
    again, “*How do I get out of this labyrinth and get to my painting faster?*”
  prefs: []
  type: TYPE_NORMAL
- en: 'While you don’t know the answer, you ask the museum staff on the third floor
    to help you out, and you start collecting the new data to get the correct route
    to your painting. (*Note*: This is a new data collection and discovery phase.)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Nonetheless, once you get to the second floor, you get lost again, but what
    you do next is start noticing a pattern in how the paintings have been ordered
    chronologically and thematically to group the artists whose styles overlap, thus
    giving you an indication of where to go to find your painting. (*Note*: This is
    a modelling phase overlapped with the enrichment phase from the dataset you collected
    during school days — your art knowledge.)'
  prefs: []
  type: TYPE_NORMAL
- en: Finally, after adapting the pattern analysis and recalling the collected inputs
    on the museum route, you arrive in front of *the* painting you had been planning
    to see since booking your flight a few months ago.
  prefs: []
  type: TYPE_NORMAL
- en: 'What I described now is how you approach data science and, nowadays, generative
    AI problems. You always **start with the end goal in mind** and ask yourself:'
  prefs: []
  type: TYPE_NORMAL
- en: “What is the expected outcome I want or need to get from this?”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Then you start planning from this question **backwards**. The example above
    begins with requesting holidays, booking flights, arranging accommodations, travelling
    to a destination, buying museum tickets, wandering around in the museum, and then
    seeing the painting you’ve been reading about for ages.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, there is more to it, and this process should be approached differently
    if you need to solve someone else’s problem, which is a bit more complex than
    locating the painting in the museum.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, you have to…
  prefs: []
  type: TYPE_NORMAL
- en: Ask the “good” questions.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To do this, let’s [define what a *good* question means](https://ds4humans.com/40_in_practice/05_backwards_design.html#defining-a-good-question)
    [[1](https://ds4humans.com/40_in_practice/05_backwards_design.html#defining-a-good-question)]:'
  prefs: []
  type: TYPE_NORMAL
- en: A **good** data science question must be **concrete**, **tractable**, and **answerable**.
    Your question works well if it **naturally points to a feasible approach** for
    your project. If your question is **too vague** to suggest what data you need,
    it **won’t effectively guide** your work.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Formulating *good* questions keeps you on track so you don’t get lost in the
    data that should be used to get to the specific problem solution, or you don’t
    end up solving the wrong problem.
  prefs: []
  type: TYPE_NORMAL
- en: Going into more detail, *good* questions will help identify gaps in reasoning,
    avoid faulty premises, and create alternative scenarios in case things *do* go
    south (which almost always happens)👇🏼.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8cc8e8217bb45c5dd5de99d7c3700d28.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Image created by the** Author after analysing **“Chapter 2\. Setting goals
    by asking good questions” from “Think Like a Data Scientist” book [2]**'
  prefs: []
  type: TYPE_NORMAL
- en: From the above-presented diagram, you understand how *good* questions, first
    and foremost, need to support **concrete assumptions.** This means they need to
    be formulated in a way that *your* premises are clear and ensure they can be tested
    without mixing up facts with opinions.
  prefs: []
  type: TYPE_NORMAL
- en: '*Good* questions **produce answers** that move you closer to your goal, whether
    through confirming hypotheses, providing new insights, or eliminating wrong paths.
    They are **measurable,** and with this, they **connect to project goals** because
    they are formulated with consideration of what’s possible, valuable, and efficient
    [2].'
  prefs: []
  type: TYPE_NORMAL
- en: '*Good* questions are **answerable with available data**, considering current
    data relevance and limitations.'
  prefs: []
  type: TYPE_NORMAL
- en: Last but not least, *good* questions **anticipate obstacles.** If something
    is certain in data science, this is *the uncertainty*, so having backup plans
    when things don’t work as expected is important to produce results for your project.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s exemplify this with one use case of an airline company that has a challenge
    with increasing its **fleet availability** due to unplanned technical groundings
    (UTG).
  prefs: []
  type: TYPE_NORMAL
- en: These unexpected maintenance events disrupt flights and cost the company significant
    money. Because of this, executives decided to react to the problem and call in
    a data scientist (you) to help them improve aircraft availability.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, if this would be the first data science task you ever got, you would maybe
    start an investigation by asking:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“How can we eliminate all unplanned maintenance events?”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'You understand how this question is an example of the wrong or “poor” one because:'
  prefs: []
  type: TYPE_NORMAL
- en: '**It is not realistic:** It includes every possible defect, both small and
    big, into one impossible goal of “zero operational interruptions”.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**It doesn’t hold a measure of success**: There’s no concrete metric to show
    progress, and if you’re not at zero, you’re at “failure.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**It is not data-driven:** The question didn’t cover which data is recorded
    before delays occur, and how the aircraft unavailability is measured and reported
    from it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'So, instead of this vague question, you would probably ask a set of targeted
    questions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Which aircraft (sub)system is most critical to flight disruptions?** (*Concrete,
    specific, answerable*) This question narrows down your scope, focusing on only
    one or two specific (sub) systems affecting most delays.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**What constitutes “critical downtime” from an operational perspective?** (*Valuable,
    ties to business goals*) If the airline (or regulatory body) doesn’t define how
    many minutes of unscheduled downtime matter for schedule disruptions, you might
    waste effort solving less urgent issues.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Which data sources capture the root causes, and how can we fuse them?** (*Manageable,
    narrows the scope of the project further*) This clarifies which data sources one
    would need to find the problem solution.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'With these sharper questions, you will drill down to the real problem:'
  prefs: []
  type: TYPE_NORMAL
- en: Not all delays weigh the same in cost or impact. The “correct” data science
    problem is to predict *critical subsystem failures* that lead to *operationally
    costly interruptions* so maintenance crews can prioritize them.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s why…
  prefs: []
  type: TYPE_NORMAL
- en: Defining the problem determines every step after.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s the foundation upon which your data, modelling, and evaluation phases are
    built 👇🏼.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/319f14ec092d34ee8ab5ef0753880ddd.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Image created by the** Author after analysing **and overlapping different
    images from “Chapter 2\. Setting goals by asking good questions, Think Like a
    Data Scientist” book [2]**'
  prefs: []
  type: TYPE_NORMAL
- en: 'It means you are clarifying the project’s objectives, constraints, and scope;
    you need to articulate the ultimate goal first and, except for asking “*What’s
    the expected outcome I want or need to get from this?*”, ask as well:'
  prefs: []
  type: TYPE_NORMAL
- en: What would success look like and how can we measure it?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'From there, drill down to (possible) next-level questions that you (I) have
    learned from the Ivory Tower days:'
  prefs: []
  type: TYPE_NORMAL
- en: '— **History questions**: “Has anyone tried to solve this before? What happened?
    What is still missing?”'
  prefs: []
  type: TYPE_NORMAL
- en: '—  **Context questions**: “Who is affected by this problem and how? How are
    they partially resolving it now? Which sources, methods, and tools are they using
    now, and can they still be reused in the new models?”'
  prefs: []
  type: TYPE_NORMAL
- en: '— **Impact Questions**: “What happens if we don’t solve this? What changes
    if we do? Is there a value we can create by default? How much will this approach
    cost?”'
  prefs: []
  type: TYPE_NORMAL
- en: '— **Assumption Questions**: “What are we taking for granted that might not
    be true (especially when it comes to data and stakeholders’ ideas)?”'
  prefs: []
  type: TYPE_NORMAL
- en: — ….
  prefs: []
  type: TYPE_NORMAL
- en: Then, do this in the loop and always “ask, ask again, and don’t stop asking”
    questions so you can drill down and understand which data and analysis are needed
    and what the ground problem is.
  prefs: []
  type: TYPE_NORMAL
- en: This is the **evergreen knowledge** you can apply nowadays, too, when deciding
    if your problem is of a [*predictive* or *generative* nature](https://medium.com/ai-advances/did-we-skip-on-machine-learning-d8893d88a02a#:~:text=When%2C%20then%3F%20Maybe%20better%20%E2%80%9CWhen%20not%3F%E2%80%9D).
  prefs: []
  type: TYPE_NORMAL
- en: (More about this in some other note where I will explain how problematic it
    is trying to solve the problem with the models that have never seen — or have
    never been trained on — similar problems before.)
  prefs: []
  type: TYPE_NORMAL
- en: Now, going back to memory lane…
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'I want to add one important note: I have learned from late nights in the Ivory
    Tower that no amount of data or data science knowledge can save you if you’re
    solving the wrong problem and trying to get the solution (answer) from a question
    that was simply wrong and vague.'
  prefs: []
  type: TYPE_NORMAL
- en: When you have a problem on hand, do not rush into assumptions or building the
    models without understanding what you need to do ([*Festina lente*](https://en.wikipedia.org/wiki/Festina_lente)*)*.
  prefs: []
  type: TYPE_NORMAL
- en: In addition, prepare yourself for unexpected situations and do a proper investigation
    with your stakeholders and domain experts because their patience will be limited,
    too.
  prefs: []
  type: TYPE_NORMAL
- en: With this, I want to say that the “real art” of being successful in data projects
    is knowing precisely what the problem is, figuring out if it can be solved in
    the first place, and then coming up with the “how” part.
  prefs: []
  type: TYPE_NORMAL
- en: You get there by learning to ask *good* questions.
  prefs: []
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1744309472653" class="mdspan-comment">To end this narrative,
    recall how [Einstein famously said](https://sloanreview.mit.edu/article/framing-data-science-problems-the-right-way-from-the-start/#:~:text=%E2%80%9CIf%20I%20were%20given%20one%20hour%20to%20save%20the%20planet%2C%20I%20would%20spend%2059%20minutes%20defining%20the%20problem%20and%20one%20minute%20solving%20it.%E2%80%9D):
     </mdspan>'
  prefs: []
  type: TYPE_NORMAL
- en: '***If I were given one hour to save the planet, I would spend 59 minutes defining
    the problem and one minute solving it.***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Thank you for reading**, and stay tuned for the next Ivory Tower note.'
  prefs: []
  type: TYPE_NORMAL
- en: If you found this post valuable, feel free to share it with your network. 👏
  prefs: []
  type: TYPE_NORMAL
- en: Connect for more stories on **[Medium](https://medium.com/@martosi/subscribe)**
    ✍️ and **[LinkedIn](https://www.linkedin.com/in/martosi/)** 🖇️.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
