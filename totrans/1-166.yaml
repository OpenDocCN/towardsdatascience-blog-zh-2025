- en: How to Control a Robot with Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何用Python控制机器人
- en: 原文：[https://towardsdatascience.com/how-to-control-a-robot-with-python/](https://towardsdatascience.com/how-to-control-a-robot-with-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-control-a-robot-with-python/](https://towardsdatascience.com/how-to-control-a-robot-with-python/)
- en: <mdspan datatext="el1761182642043" class="mdspan-comment">Intro</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761182642043" class="mdspan-comment">简介</mdspan>
- en: '*[**PyBullet**](https://pybullet.org/)* is an open-source simulation platform
    created by Facebook that’s designed for training physical agents (such as robots)
    in a 3D environment. It provides a physics engine for both rigid and soft bodies.
    It is commonly used for robotics, artificial intelligence, and game development.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*[**PyBullet**](https://pybullet.org/)*是由Facebook创建的开源模拟平台，旨在为3D环境中训练物理代理（如机器人）提供物理引擎。它为刚性和软体都提供了物理引擎。它通常用于机器人技术、人工智能和游戏开发。'
- en: '**[Robotic arms](https://en.wikipedia.org/wiki/Robotic_arm)** are very popular
    due to their speed, precision, and ability to work in hazardous environments.
    They are used for tasks such as welding, assembly, and material handling, especially
    in industrial settings (like manufacturing).'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**[机器人臂](https://en.wikipedia.org/wiki/Robotic_arm)**因其速度、精度以及在危险环境中的工作能力而非常受欢迎。它们用于焊接、组装和物料处理等任务，尤其是在工业环境中（如制造）。'
- en: 'There are two ways for a robot to perform a task:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人执行任务有两种方式：
- en: '**Manual Control** – requires a human to explicitly program every action. Better
    suited for fixed tasks, but struggles with uncertainty and requires tedious parameter
    tuning for every new scenario.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**手动控制** – 需要人类明确编程每个动作。更适合固定任务，但难以处理不确定性，并且需要对每个新场景进行繁琐的参数调整。'
- en: '**Artificial Intelligence** – allows a robot to learn the best actions through
    trial and error to achieve a goal. So, it can adapt to changing environments by
    learning from rewards and penalties without a predefined plan ([Reinforcement
    Learning](https://en.wikipedia.org/wiki/Reinforcement_learning)).'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能** – 允许机器人通过试错学习最佳行动以实现目标。因此，它可以通过学习奖励和惩罚来适应不断变化的环境，而不需要预定义的计划（[强化学习](https://en.wikipedia.org/wiki/Reinforcement_learning)）。'
- en: In this article, I’m going to show how to **build a 3D environment with *PyBullet*
    for manually controlling a robotic arm**. I will present some useful Python code
    that can be easily applied in other similar cases (just copy, paste, run) and
    walk through every line of code with comments so that you can replicate this example.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将展示如何使用*PyBullet***构建一个用于手动控制机器人臂的3D环境**。我将展示一些可以轻松应用于其他类似情况的实用Python代码（只需复制、粘贴、运行），并逐行代码进行注释，以便您可以复制此示例。
- en: Setup
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置
- en: '*PyBullet* can easily be installed with one of the following commands (if *pip* fails, *conda* should
    definitely work):'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '*PyBullet*可以通过以下命令之一轻松安装（如果*pip*失败，*conda*应该肯定可以工作）：'
- en: '[PRE0]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '*PyBullet* comes with a collection of preset **URDF files** (Unified Robot
    Description Format), which are XML schemas describing the physical structure of
    objects in the 3D environment (i.e. cube, sphere, robot).'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*PyBullet*附带一系列预设的**URDF文件**（统一机器人描述格式），这些是XML模式，描述了3D环境中物体的物理结构（例如立方体、球体、机器人）。'
- en: '[PRE1]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/27e67d92da9926909d31c62f57f37f8d.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/27e67d92da9926909d31c62f57f37f8d.png)'
- en: 'Let’s go through the code above:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看上面的代码：
- en: when you can connect to the physics engine, you need to specify if you want
    to open the **graphic interface** (`p.GUI`) or not (`p.DIRECT`).
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你可以连接到物理引擎时，你需要指定是否要打开**图形界面**(`p.GUI`)或者不打开(`p.DIRECT`)。
- en: 'The Cartesian space has **3 dimensions**: x-axis (forward/backward), y-axis
    (left/right), z-axis (up/down).'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卡尔丹空间有**3个维度**：x轴（向前/向后），y轴（左/右），z轴（上/下）。
- en: It’s common practice to set the **gravity** to `(x=0, y=0, z=-9.8)` simulating
    [Earth’s gravity](https://en.wikipedia.org/wiki/Gravity_of_Earth), but one can
    change it based on the objective of the simulation.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将**重力**设置为`(x=0, y=0, z=-9.8)`以模拟[地球的重力](https://en.wikipedia.org/wiki/Gravity_of_Earth)是一种常见的做法，但可以根据模拟的目标进行更改。
- en: Usually, you need to **import a plane** to create a ground, otherwise objects
    would just fall indefinitely. If you want an object to be fixed to the floor,
    then set `useFixedBase=True` (it’s *False* by default). I imported the objects
    with `basePosition=[0,0,0.1]` meaning that they are 10cm above the ground.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通常，你需要**导入一个平面**来创建地面，否则物体将无限期地落下。如果你想将物体固定到地板上，则设置`useFixedBase=True`（默认为*False*）。我用`basePosition=[0,0,0.1]`导入物体，这意味着它们距离地面10厘米。
- en: 'The simulation can be rendered in **real-time** with `p.setRealTimeSimulation(True)`
    or faster (CPU-time) with `p.stepSimulation()`. Another way to set real-time is:'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模拟可以通过`p.setRealTimeSimulation(True)`以**实时**渲染，或者通过`p.stepSimulation()`更快（CPU时间）渲染。设置实时渲染的另一种方法是：
- en: '[PRE2]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Robot
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器人
- en: Currently, our 3D environment is made of a little object (tiny red cube), and
    a table (big cube) fixed to the ground (plane). I shall add a **robotic arm**
    with the task of picking up the smaller object and putting it on the table.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，我们的3D环境由一个小物体（微小的红色立方体）和一个固定在地面上（平面）的桌子（大立方体）组成。我将添加一个**机械臂**，其任务是从较小的物体中取出并放在桌子上。
- en: '*PyBullet* has a default robotic arm modeled after the [Franka Panda Robot](https://robodk.com/robot/Franka/Emika-Panda).'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '*PyBullet*有一个默认的仿生机械臂，其模型基于[Franka Panda 机器人](https://robodk.com/robot/Franka/Emika-Panda)。'
- en: '[PRE3]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/899a0e4af09b5c1a70d0c1b612b1cd75.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/899a0e4af09b5c1a70d0c1b612b1cd75.png)'
- en: The first thing to do is to analyze the **links** (the solid parts)and **joints**
    (connections between two rigid parts) of the robot. For this purpose, you can
    just use `p.DIRECT` as there is no need for the graphic interface.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 首先要做的是分析机器人的**连接**（固体部分）和**关节**（两个刚性部分之间的连接）。为此，你可以直接使用`p.DIRECT`，因为不需要图形界面。
- en: '[PRE4]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/55a3ebc7678f2d9a512266233237f516.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/55a3ebc7678f2d9a512266233237f516.png)'
- en: 'Every robot has a “**base**“, the root part of its body that connects everything
    (like our skeleton spine). Looking at the output of the code above, we know that
    the robotic arm has 12 joints and 12 links. They are connected like this:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 每个机器人都有一个“**基座**”，这是其身体的根部，连接着一切（就像我们的脊柱骨骼）。查看上述代码的输出，我们知道机械臂有12个关节和12个连接。它们是这样连接的：
- en: '![](../Images/c3d12bbae6dbc3874a444e9641e69fd8.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c3d12bbae6dbc3874a444e9641e69fd8.png)'
- en: Movement Control
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运动控制
- en: 'In order to make a robot do something, you have to move its joints. There are
    3 main types of control, which are all applications of [Newton’s laws of motion](https://en.wikipedia.org/wiki/Newton%27s_laws_of_motion):'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让机器人做某事，你必须移动它的关节。有3种主要的控制类型，它们都是牛顿运动定律的应用：
- en: '**Position control**: basically, you tell the robot “go here”. Technically,
    you set a **target position**, and then apply force to gradually move the joint
    from its current position toward the target. As it gets closer, the applied force
    decreases to avoid overshooting and eventually balances perfectly against resistive
    forces (i.e. friction, gravity) to hold the joint steady in place.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**位置控制**：基本上，你告诉机器人“去这里”。技术上，你设置一个**目标位置**，然后施加力逐渐将关节从当前位置移动到目标。随着它越来越接近，施加的力会减小以避免超调，并最终与阻力（即摩擦力、重力）完美平衡，使关节稳定地保持在原地。'
- en: '**Velocity** **control**: basically, you tell the robot “move at this speed”.
    Technically, you set a **target velocity**, and apply force to gradually bring
    the velocity from zero to the target, then maintain it by balancing applied force
    and resistive forces (i.e. friction, gravity).'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**速度** **控制**：基本上，你告诉机器人“以这个速度移动”。技术上，你设置一个**目标速度**，并施加力逐渐将速度从零增加到目标，然后通过平衡施加的力和阻力（即摩擦力、重力）来维持它。'
- en: '**Force/Torque** **control**: basically, you “push the robot and see what happens”.
    Technically, you directly set the force applied at the joint, and the resulting
    motion depends purely on the object’s mass, inertia, and the environment. As a
    side note, in physics, the word “**force**” is used for linear motion (push/pull),
    while “**torque**” indicates rotational motion (twist/turn).'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**力/扭矩** **控制**：基本上，你“推动机器人并看看会发生什么”。技术上，你直接设置关节施加的力，而结果运动完全取决于物体的质量、惯性和环境。顺便提一下，在物理学中，“**力**”这个词用于线性运动（推/拉），而“**扭矩**”表示旋转运动（扭转/转动）。'
- en: We can use `p.setJointMotorControl2()` to move a single joint, and `p.setJointMotorControlArray()`
    to apply force to multiple joints at the same time. For instance, I shall perform
    position control by giving a random target for each arm joint.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用`p.setJointMotorControl2()`来移动单个关节，使用`p.setJointMotorControlArray()`同时施加力到多个关节。例如，我将通过为每个机械臂关节提供一个随机目标来执行位置控制。
- en: '[PRE5]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/a63dbda870e1d2ca3d49b54407ae4967.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a63dbda870e1d2ca3d49b54407ae4967.png)'
- en: The real question is, “**what’s the right target position for each joint?**”
    The answer is [Inverse Kinematics](https://en.wikipedia.org/wiki/Inverse_kinematics),
    the mathematical process of calculating the parameters needed to place a robot
    in a given position and orientation relative to a starting point. Each joint defines
    an angle, and you don’t want to guess multiple joint angles by hand. So, we’ll
    ask *PyBullet* to figure out the target positions in the Cartesian space with
    `p.calculateInverseKinematics()`.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的问题是，“**每个关节的正确目标位置是什么？**” 答案是[逆运动学](https://en.wikipedia.org/wiki/Inverse_kinematics)，这是一种数学过程，用于计算将机器人放置在相对于起始点的给定位置和方向所需的参数。每个关节定义一个角度，你不想手动猜测多个关节角度。因此，我们将请求
    *PyBullet* 使用 `p.calculateInverseKinematics()` 计算笛卡尔空间中的目标位置。
- en: '[PRE6]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/0260ea19ecf3fe10c8fd397fb528c04a.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0260ea19ecf3fe10c8fd397fb528c04a.png)'
- en: Please note that I used `p.getQuaternionFromEuler()` to [convert the 3D angles
    (easy for humans to understand) into 4D](https://en.wikipedia.org/wiki/Conversion_between_quaternions_and_Euler_angles),
    as “**quaternions**” are easier for physics engines to compute. If you want to
    get technical, in a [quaternion *(x, y, z, w)*](https://en.wikipedia.org/wiki/Quaternions_and_spatial_rotation),
    the first three components describe the axis of rotation, while the fourth dimension
    encodes the amount of rotation (*cos*/*sin*).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，我使用了 `p.getQuaternionFromEuler()` 将3D角度（对人类来说更容易理解）转换为4D[四元数](https://en.wikipedia.org/wiki/Conversion_between_quaternions_and_Euler_angles)，因为“**四元数**”对物理引擎来说更容易计算。如果你想更专业一点，在一个[四元数
    *(x, y, z, w)*](https://en.wikipedia.org/wiki/Quaternions_and_spatial_rotation)中，前三个分量描述了旋转轴，而第四个维度编码了旋转量（*cos*/*sin*）。
- en: The code above commands the robot to move its hand to a specific position above
    an object using Inverse Kinematics. We grab where the little red cube is sitting
    in the world with `p.getBasePositionAndOrientation()`, and we use the information
    to calculate the target position for the joints.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码命令机器人使用逆运动学将其手移动到物体上方的一个特定位置。我们使用 `p.getBasePositionAndOrientation()` 抓取世界中小红方块的位置，并使用这些信息来计算关节的目标位置。
- en: Interact with Objects
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与物体交互
- en: The robot arm has a hand (“gripper”), so it can be opened and closed to grab
    objects. From the previous analysis, we know that the “fingers” can move within
    (0-0.04). So, you can set the target position as the lower limit (**hand closed**)
    or the upper limit (**hand open**).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人手臂有一个手（“抓手”），因此它可以打开和关闭以抓取物体。从之前的分析中，我们知道“手指”可以在（0-0.04）范围内移动。因此，你可以将目标位置设置为下限（**手闭合**）或上限（**手打开**）。
- en: '![](../Images/f72bbb3c52079c8ccf8aba7f3b0720bb.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f72bbb3c52079c8ccf8aba7f3b0720bb.png)'
- en: Moreover, I want to make sure that the arm holds the little red cube while moving
    around. You can use `p.createConstraint()` to make a **temporary physics bond**
    between the robot’s gripper and the object, so that it will move together with
    the robot hand. In the real world, the gripper would apply force through friction
    and contact to squeeze the object so it doesn’t fall. But, since *PyBullet* is
    a very simple simulator, I’ll just take this shortcut.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我还要确保在移动时手臂能够握住那个小红方块。你可以使用 `p.createConstraint()` 在机器人的抓手和物体之间建立一个**临时的物理连接**，这样它就会和机器人手一起移动。在现实世界中，抓手会通过摩擦力和接触力施加力来挤压物体，防止其掉落。但是，由于
    *PyBullet* 是一个非常简单的模拟器，我将采取这个捷径。
- en: '[PRE7]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'After that, we can move the arm toward the table, using the same strategy as
    before: Inverse Kinematics -> target position -> position control.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以使用之前相同的方法移动手臂，即逆运动学 -> 目标位置 -> 位置控制。
- en: '![](../Images/09baa2991c825d1ec2ae17d489019148.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/09baa2991c825d1ec2ae17d489019148.png)'
- en: Finally, when the robot reaches the target position in the Cartesian space,
    we can open the hand and release the constraint between the object and the arm.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，当机器人到达笛卡尔空间中的目标位置时，我们可以打开手并释放物体与手臂之间的约束。
- en: '[PRE8]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/df50772e5d2f656af77a12d2bdc1c463.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/df50772e5d2f656af77a12d2bdc1c463.png)'
- en: Full Manual Control
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 全手动控制
- en: In *PyBullet*, you need to render the simulation for every action the robot
    takes. Therefore, it’s convenient to have a utils function that can speed up (i.e.
    *sec=*0.1) or slow down (i.e. *sec=2*) the real-time (*sec=1*).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *PyBullet* 中，你需要为机器人采取的每个动作渲染模拟。因此，有一个可以加快（即 *sec=0.1*）或减慢（即 *sec=2*）实时速度（*sec=1*）的实用函数是很方便的。
- en: '[PRE9]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Here’s the full code for the simulation we have done in this article.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这是本文中我们进行的模拟的完整代码。
- en: '[PRE10]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![](../Images/c064a3705772c1a5767611543430598d.png)'
  id: totrans-60
