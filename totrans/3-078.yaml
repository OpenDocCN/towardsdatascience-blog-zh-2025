- en: (Many) More TDS Contributors Are Now Eligible for Earning Through the Author
    Payment Program
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: （许多）更多TDS贡献者现在有资格通过作者支付计划获得收益
- en: 原文：[https://towardsdatascience.com/many-more-tds-contributors-are-now-eligible-for-earning-through-the-author-payment-program/](https://towardsdatascience.com/many-more-tds-contributors-are-now-eligible-for-earning-through-the-author-payment-program/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/many-more-tds-contributors-are-now-eligible-for-earning-through-the-author-payment-program/](https://towardsdatascience.com/many-more-tds-contributors-are-now-eligible-for-earning-through-the-author-payment-program/)
- en: A new, more inclusive earnings tier
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个新的、更具包容性的收益层级
- en: 'When we [launched the TDS Author Payment Program](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/)
    back in February, our goal was clear: it was important for us “to reward the articles
    that help us reach our business goals in proportion to their impact.” Since the
    program’s launch, however, we realized that the number of articles that crossed
    the initial earnings threshold (5,000 engaged views) was smaller than we’d hoped
    for. That wasn’t ideal.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在2月份[推出TDS作者支付计划](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/)时，我们的目标很明确：重要的是我们要“根据文章对我们实现业务目标的影响比例来奖励文章。”然而，自从该计划推出以来，我们意识到超过初始收益阈值（5,000个参与观看）的文章数量比我们希望的少。这并不理想。
- en: 'One of the main advantages of [being an independent publication](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/)—and
    a data-focused one, at that—is that we are nimble enough to course-correct when
    we need to, and can make changes quickly to the benefit of our contributors. We’re
    thrilled to share that we’ve recently introduced a new earnings tier: articles
    that gain **500 engaged views** can now earn a **minimum payout of $100**.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 成为独立出版物[之一](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/)——而且是一个以数据为重点的出版物——的主要优势之一是我们足够灵活，在需要时可以纠正方向，并且可以快速做出改变，以利于我们的贡献者。我们很高兴地分享，我们最近引入了一个新的收益层级：获得**500个参与观看**的文章现在可以赚取**最低100美元的支付**。
- en: The immediate result, and the one we care about the most, is that the number
    of eligible articles will increase—drastically. A lower threshold will also lead,
    in many cases, to a much shorter wait before authors know whether an article will
    earn, providing an incentive for more frequent contributions.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 最直接的结果，也是我们最关心的，是符合条件的文章数量将大幅增加。较低的门槛也将导致作者在知道文章能否盈利之前等待的时间大大缩短，从而为更频繁的贡献提供激励。
- en: We didn’t want to penalize those authors who took a chance on us during the
    program’s early days, so we’re applying this inclusive earnings tier retroactively,
    to all eligible articles published since the program launched on February 19\.
    (We’ve already contacted all authors who published on TDS in February and whose
    articles have crossed the 500 engaged-view threshold.)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不想惩罚那些在项目早期阶段对我们冒险的作者，因此我们将这项包容性的收益层级追溯性地应用于自2月19日项目启动以来所有符合条件的文章。（我们已联系了2月份在TDS上发表文章并达到500个参与观看阈值的所有作者。）
- en: All other details concerning the Author Payment Program remain the same, so
    if you’ve already reviewed and accepted its terms and conditions, there’s no further
    action you need to take.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 与作者支付计划相关的所有其他细节保持不变，因此如果您已经审查并接受了其条款和条件，您无需采取任何进一步行动。
- en: Stats are live!
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 统计数据已上线！
- en: Earnings are just one measure of an article’s reach and impact. Since launching
    the new TDS site, our authors’ most-requested feature—by a wide margin!—has been
    access to their articles’ stats. This was always on our roadmap (as we mentioned
    earlier, we *are* a data-focused publication, after all), but the consistent feedback
    we’ve received from our community made it clear that we needed to prioritize it,
    so we did.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 收益只是衡量文章影响力和传播的一个指标。自推出新的TDS网站以来，我们作者最需要的功能——远远超过其他功能！——是访问他们文章的统计数据。这始终在我们的路线图上（正如我们之前提到的，毕竟我们是一个以数据为重点的出版物），但我们从社区收到的持续反馈使我们清楚地意识到，我们需要优先考虑它，所以我们做到了。
- en: 'Good news: as of today, all published authors can track their articles’ performance
    directly from their dashboard on the TDS Contributor Portal — just look for the
    **Analytics** tab on the left side of your screen.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息：从今天起，所有已发布的作者都可以直接从TDS贡献者门户的仪表板跟踪他们文章的表现——只需在屏幕左侧查找**分析**标签页。
- en: 'You’ll be able to see your total views and engaged views (*reminder*: the latter
    are views by readers who spend at least 30 seconds on an individual article),
    as well as the number of total and engaged views during the 30-day earning period
    following publication. Also visible is the estimated payout for each article given
    the most current engaged-view count.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 您将能够看到您的总阅读量和参与阅读量（*提示*：后者是指读者至少在单篇文章上停留30秒的阅读量），以及发布后30天内的总阅读量和参与阅读量。此外，您还可以看到根据最新的参与阅读量估算的每篇文章的预计收益。
- en: These stats will give you a solid snapshot of your work’s reach over time, as
    well as a clear idea of how close you are to crossing each earning tier.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这些统计数据将为您的工作随着时间的推移所达到的覆盖范围提供一个清晰的快照，以及您距离达到每个收益层级有多近的明确概念。
- en: Please keep in mind that stats update **once a day**, so while we understand
    the impulse to hit the *Refresh* button every 3 minutes (or seconds…), you can
    probably find a better use of your time—like brainstorming for your next article!
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，统计数据**每天更新一次**，所以我们理解您每隔3分钟（或秒数…）就点击*刷新*按钮的冲动，但您可能找到更好的时间利用方式——比如为您的下一篇文章构思点子！
- en: As our publication continues to evolve, our team is hard at work on the next
    set of features that will improve TDS for readers and authors alike. Stay tuned—and
    feel free to reach out (at [[email protected]](/cdn-cgi/l/email-protection#b2c2c7d0dedbd1d3c6dbdddcf2c6ddc5d3c0d6c1d6d3c6d3c1d1dbd7dcd1d79cd1dddf))
    with any questions, requests, or feedback you’d like to share.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们的出版物不断进化，我们的团队正在努力开发下一系列功能，这些功能将改善读者和作者双方的TDS体验。请保持关注——并且随时欢迎您（通过[[email protected]](/cdn-cgi/l/email-protection#b2c2c7d0dedbd1d3c6dbdddcf2c6ddc5d3c0d6c1d6d3c6d3c1d1dbd7dcd1d79cd1dddf)）提出任何您想分享的问题、请求或反馈。
