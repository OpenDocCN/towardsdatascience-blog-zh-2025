- en: Welcome Back, Returning Authors!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'While we’re as committed as ever to finding new and exciting voices, it’s always
    a joy to share work by longstanding authors we haven’t published in a while. Case
    in point:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Subha Ganapathi](https://towardsdatascience.com/author/mg-subha/) wrote a handy
    guide to data “paradoxes” to help practitioners avoid the trap of misleading metrics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[How Metrics (and LLMs) Can Trick You: A Field Guide to Paradoxes](https://towardsdatascience.com/how-metrics-and-llms-can-trick-you-a-field-guide-to-paradoxes/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In a deep dive into dynamic inventory optimization, [Mert Ersoz](https://towardsdatascience.com/author/numersoz/)
    unpacks the inner workings of a sequential decision framework with Bayesian learning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Dynamic Inventory Optimization with Censored Demand](https://towardsdatascience.com/dynamic-inventory-optimization-with-censored-demand-2/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Andrea D’Agostino](https://towardsdatascience.com/author/thedrewdag/) takes
    a close look at POSET (Partially Ordered Sets) indicators and their potential
    business impact.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[POSET Representations in Python Can Have a Huge Impact on Business](https://towardsdatascience.com/poset-representations-in-python-have-huge-impact-on-business/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us](https://towardsdatascience.com/questions-96667b06af5/)?
  prefs: []
  type: TYPE_NORMAL
