- en: 'Summer Must-Reads: The Data Science Edition'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 夏日必读：数据科学版
- en: 原文：[https://towardsdatascience.com/summer-must-reads-the-data-science-edition/](https://towardsdatascience.com/summer-must-reads-the-data-science-edition/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/summer-must-reads-the-data-science-edition/](https://towardsdatascience.com/summer-must-reads-the-data-science-edition/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过我们的每周通讯《Variable》的新一期，它包含编辑精选、深度分析、社区新闻等内容，内容优质。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: Maybe you’re reading this edition of the Variable from a sandy beach. Maybe
    you’re just taking a quick break from sending out a batch of data science job
    applications. Either way, we firmly believe that you deserve some engaging, enlightening
    reads this week.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 也许你现在正在沙滩上阅读Variable的这期内容。也许你只是从发送一批数据科学职位申请中短暂休息一下。无论如何，我们坚信你本周应得到一些引人入胜、发人深省的阅读材料。
- en: At its best, summer reading invites us to take a step back from our daily chores
    and to explore new topics and questions. It should also, ideally, be *fun*. The
    articles we’ve selected for you deliver on all counts, whether you’re interested
    in the history of data or curious about the next frontier of generative AI.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在最好的情况下，夏日阅读会让我们从日常琐事中抽身，探索新的主题和问题。理想情况下，它还应该是*有趣的*。我们为您精选的文章涵盖了所有这些方面，无论您对数据的历史感兴趣，还是对生成人工智能的下一个前沿领域感到好奇。
- en: 'Before we dive in, we also wanted to give you a heads-up: we’ve just relaunched
    our [Author Spotlight](https://towardsdatascience.com/category/author-spotlights/) series,
    where members of our community talk about their career paths in data science and
    AI. Don’t miss [our first Q&A, with Mauro Di Pietro](https://towardsdatascience.com/the-power-of-building-from-scratch/),
    where we chat about the power of open source and building from scratch (among
    other topics).'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨之前，我们还想提前通知您：我们刚刚重新推出了我们的[作者聚焦](https://towardsdatascience.com/category/author-spotlights/)系列，我们的社区成员将在这里谈论他们在数据科学和AI领域的职业道路。不要错过[我们的首次问答，与Mauro
    Di Pietro](https://towardsdatascience.com/the-power-of-building-from-scratch/)，我们在这里讨论了开源的力量和从头开始构建（以及其他话题）。
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What Can the History of Data Tell Us About the Future of AI?
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据的历史能告诉我们关于人工智能未来的哪些信息？
- en: '[Steve Hedden](https://towardsdatascience.com/author/steve-hedden/)‘s panoramic
    look at the past 40 years of data, business models, and intelligent systems is
    essential reading for anyone who’d like to make sense of our present moment, and
    gain insight into where we might be headed. (Yes, it’s a long read — but one you
    might enjoy even more over the course of a few days.)'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '[Steve Hedden](https://towardsdatascience.com/author/steve-hedden/)对过去40年数据、商业模式和智能系统的全景式审视，对于任何想要理解我们当前时刻并洞察我们可能走向何方的人来说都是必读之作。（是的，这是一篇长读——但也许在几天的时间里你会更加喜欢它。）'
- en: '[What Can the History of Data Tell Us About the Future of AI?](https://towardsdatascience.com/a-brief-recent-history-of-data/)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[数据的历史能告诉我们关于人工智能未来的哪些信息？](https://towardsdatascience.com/a-brief-recent-history-of-data/)'
- en: 'Simple Guide to Multi-Armed Bandits: A Key Concept Before Reinforcement Learning'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多臂老虎机简单指南：强化学习前的关键概念
- en: How does AI learn to make better decisions? Sarah Schürch offers an accessible
    introduction to a quintessential model.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能如何学会做出更好的决策？Sarah Schürch提供了一个对经典模型的易于理解的介绍。
- en: '[Simple Guide to Multi-Armed Bandits: A Key Concept Before Reinforcement Learning](https://towardsdatascience.com/simple-guide-to-multi-armed-bandits-a-key-concept-before-reinforcement-learning/)'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[多臂老虎机简单指南：强化学习前的关键概念](https://towardsdatascience.com/simple-guide-to-multi-armed-bandits-a-key-concept-before-reinforcement-learning/)'
- en: Work Data Is the Next Frontier for GenAI
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作数据是通用人工智能的下一个前沿领域
- en: “Work data, the work output of knowledge workers, is the single most valuable
    data source for LLM training.” Zsombor Varnagy-Toth shares a compelling call to
    action for data, AI, and product leaders.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: “工作数据，知识工作者的工作产出，是LLM训练中最有价值的单一数据来源。”Zsombor Varnagy-Toth为数据、AI和产品领导者分享了一个令人信服的行动呼吁。
- en: '[Work Data Is the Next Frontier for GenAI](https://towardsdatascience.com/work-data-is-the-next-frontier-for-genai/)'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[工作数据是通用人工智能的下一个前沿领域](https://towardsdatascience.com/work-data-is-the-next-frontier-for-genai/)'
