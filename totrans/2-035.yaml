- en: Maximizing AI/ML Model Performance with PyTorch Compilation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/maximizing-ai-ml-model-performance-with-pytorch-compilation/](https://towardsdatascience.com/maximizing-ai-ml-model-performance-with-pytorch-compilation/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1755541800620" class="mdspan-comment">Since its inception</mdspan>
    in [PyTorch 2.0](https://towardsdatascience.com/tips-and-tricks-for-upgrading-to-pytorch-2-3127db1d1f3d/) in
    March 2023, the evolution of torch.compile has been one of the most exciting things
    to follow. Given that PyTorch’s popularity was due to its “Pythonic” nature, its
    ease of use, and its line-by-line (a.k.a., eager) execution, the success of a
    just-in-time (JIT) graph compilation mode should not have been taken for granted.
    And yet, just over two years later, the importance of this feature cannot be overstated:
    It is an essential tool in optimizing the runtime performance of AI/ML workloads.'
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, the use of torch.compile still feels a bit like a dark art. When
    it works it is awesome and everyone is happy. However, when it doesn’t, figuring
    out the reason can be difficult. It has multiple API controls, but knowing which
    ones to apply and when — can seem like black magic. Moreover, its documentation
    is currently somewhat decentralized, with the details of many of its key features
    scattered across multiple posts and tutorials.
  prefs: []
  type: TYPE_NORMAL
- en: 'Although covered in a [previous post](https://medium.com/data-science/tips-and-tricks-for-upgrading-to-pytorch-2-3127db1d1f3d),
    we felt that the rapid evolution of torch.compile warranted a renewed discussion.
    This post attempts to unveil some of the mystique surrounding torch.compile. We
    will review how it works, demonstrate its use, discuss a few strategies for how
    to apply it most effectively, and evaluate the impact of some of its features
    on the runtime performance of a toy model. We will cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: techniques for avoiding the two “compilation-killers”, graph-breaks and recompilations,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: strategies for debugging compilation issues
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: squeezing maximum performance using some of torch.compile’s advanced features
    and configuration settings,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: making the most of the torch.compile logs to debug compilation issues,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: modular application of torch.compile,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: methods for reducing compilation time,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: and more.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As in our previous posts, we will define a toy PyTorch model which we will use
    to demonstrate the application and impact of torch.compile. We will run our experiments
    on an [Amazon EC2 p4d.96xlarge](https://aws.amazon.com/ec2/instance-types/p4/) instance
    (containing 8 NVIDIA A100 GPUs) running a [PyTorch (2.7) Deep Learning AMI (DLAMI)](https://docs.aws.amazon.com/dlami/latest/devguide/aws-deep-learning-ami-gpu-pytorch-2.7-ubuntu-22-04.html).
  prefs: []
  type: TYPE_NORMAL
- en: 'Disclaimers:'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: PyTorch compilation is a complex topic with a continuously growing set of features.
    This post makes no attempt to encompass the full scope of torch.compile, but rather
    aims to offer some practical tips on how to approach it. For a complete reference,
    please see the [official PyTorch documentation](https://docs.pytorch.org/tutorials/intermediate/torch_compile_tutorial.html).
    But keep in mind that you may need to surf through multiple pages to collect all
    the information you need (e.g., [here](https://docs.pytorch.org/docs/stable/generated/torch.compile.html) for
    the API documentation, [here](https://docs.pytorch.org/tutorials/intermediate/torch_compile_tutorial.html) for
    an introductory tutorial, [here](https://docs.pytorch.org/docs/stable/torch.compiler_dynamo_deepdive.html) for
    a deep-dive on TorchDynamo, [here](https://docs.pytorch.org/tutorials/compilers_index.html) and [here](https://docs.pytorch.org/docs/stable/torch.compiler.html#read-more) for
    indices to many other pages covering a wide range of compilation features, etc.).
  prefs: []
  type: TYPE_NORMAL
- en: If you prefer a single source with a comprehensive overview of torch.compile,
    its inner workings, and detailed examples of its use, we recommend chapter 14
    of the book [AI Systems Performance Engineering](https://github.com/cfregly/ai-performance-engineering/tree/main),
    by Chris Fregly.
  prefs: []
  type: TYPE_NORMAL
- en: The code we will share is intended for demonstrative purposes and should not
    be relied on for correctness or optimality — especially for other projects. Please
    do not interpret our choice of platform, framework, or any other tool or library
    as an endorsement for its use.
  prefs: []
  type: TYPE_NORMAL
- en: The impact of torch.compile can vary greatly based on the details of the AI/ML
    model and runtime environment. The results we will share on our toy model may
    not be indicative of the results you will get on your own model. In fact, compilation
    of some models may result in worse performance.
  prefs: []
  type: TYPE_NORMAL
- en: When applied correctly, torch.compile should not affect the quality of your
    model (in the case of inference) or its ability to converge (in the case of training).
    However, there are likely to be numerical differences due to the use of different
    compute kernels. It is essential that you verify that applying torch.compile does
    not degrade your quality-performance metrics before deploying it to a production
    environment.
  prefs: []
  type: TYPE_NORMAL
- en: Importantly, torch.compile continues to evolve with each PyTorch release. The
    contents of this post are based on PyTorch 2.7\. Staying up-to-date with latest
    PyTorch releases is essential for taking advantage of the latest and greatest
    available optimization opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: 'PyTorch Compilation: How it Works'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In PyTorch’s default *eager execution* mode, each line of Python code is processed
    independently. While this mode of execution is extremely user-friendly — making
    it easy to follow and debug line-per-line what the model is doing — it misses
    a great deal of opportunity to optimize performance, e.g.:'
  prefs: []
  type: TYPE_NORMAL
- en: GPU operations are performed independently. This misses the opportunity for *operator
    fusion* where GPU operations are combined into a single, more efficient, GPU kernel.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Potential optimizations from ahead-of-time (AOT) compilation, such as out-of-order
    execution and memory layout optimizations, are missed.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The Python runtime is involved in all stages of the model execution. Every time
    an operation is launched on the GPU, control is passed from the Python interpreter
    to the CUDA backend and back. This can introduce significant overhead.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How torch.compile Fixes This
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'First introduced in PyTorch 2.0, torch.compile acts as a just-in-time (JIT)
    compiler: The first time you call a compiled function, the compiler traces the
    Python code and converts it into an intermediate graph representation (IR) using [TorchDynamo](https://docs.pytorch.org/docs/stable/torch.compiler_dynamo_overview.html),
    sometimes referred to as an [FX Graph](https://docs.pytorch.org/docs/stable/fx.html#torch.fx.Graph).
    If the compiled function requires backpropagation, the FX Graph is passed to the [AOTAutograd](https://docs.pytorch.org/functorch/stable/notebooks/aot_autograd_optimizations.html) library
    which captures the backward pass ahead-of-time (AOT) and generates a combined
    forward and backward graph. The FX Graph is then passed to the compiler backend
    which performs kernel fusion, out-of-order execution, and other techniques to
    generate machine code that is highly optimized for the target hardware.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The default PyTorch compiler backend is [TorchInductor](https://dev-discuss.pytorch.org/t/torchinductor-a-pytorch-native-compiler-with-define-by-run-ir-and-symbolic-shapes/747) which
    supports both GPU and CPU targets. When compiling for NVIDIA GPUs, TorchInductor
    uses: 1) the [Triton](https://openai.com/index/triton/) compiler (previously covered
    in [this post](https://towardsdatascience.com/unleashing-the-power-of-triton-mastering-gpu-kernel-optimization-in-python-160a3f52701e/))
    to create optimal GPU kernels and 2) [CUDA Graphs](https://developer.nvidia.com/blog/cuda-graphs/) (whenever
    possible) to combine multiple GPU kernels into efficient, re-playable sequences.'
  prefs: []
  type: TYPE_NORMAL
- en: The final, machine-specific computation graph is [cached](https://docs.pytorch.org/tutorials/recipes/torch_compile_caching_configuration_tutorial.html) and
    used for each subsequent invocation of the compiled function/model. Note that
    although the bulk of the compilation is performed on the first invocation, several
    additional *warm-up* passes are often required to reach peak performance.
  prefs: []
  type: TYPE_NORMAL
- en: The combined JIT and AOT properties of torch.compile allow it to maximize opportunities
    for graph optimization, while the use of the compiled execution graph avoids the
    line-by-line involvement of the Python interpreter — thereby addressing the three
    aforementioned inefficiencies of eager execution.
  prefs: []
  type: TYPE_NORMAL
- en: Avoiding Compilation Pitfalls
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Usually, applying torch.compile will boost your model throughput (e.g., see
    the [TorchInductor performance dashboard](https://hud.pytorch.org/benchmark/compilers)).
    However, sometimes you may find that torch compilation results in the same or
    even worse performance than in eager mode. There could be a number of reasons
    for this:'
  prefs: []
  type: TYPE_NORMAL
- en: There may be a bottleneck in the training step that is overshadowing the torch.compile
    optimization, e.g., a data input pipeline bottleneck. This can be identified and
    solved through appropriate performance analysis and optimization.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Your function or model might already be so efficient that the application of
    torch.compile is negligible.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You may be suffering from one of two compilation killers, graph-breaks and recompilations,
    which we elaborate on in the next sections.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'PyTorch Compilation Killer #1: Graph-Breaks'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Graph-breaks are one of the most common events that interfere with efficient
    torch compilation. Graph-breaks occur when the TorchDynamo or AOTAutograd libraries
    encounter Python operations that they cannot convert into a graph operation. In
    such cases, the sections of code before and after the problematic operation, are
    compiled separately and the resultant graph is said to contain a *graph-break*.
    Graph-breaks interfere with the compiler’s capacity for optimization in two primary
    ways: First, optimizations such as kernel fusion cannot be performed across graph
    breaks and, second, a graph break implies a return of control to the Python interpreter.
    The presence of a large number of graph breaks can completely cancel out the potential
    benefit of torch.compile. Common examples of graph breaks include print() operations,
    conditional logic, and asserts.'
  prefs: []
  type: TYPE_NORMAL
- en: What is frustrating is that, more often than not, graph-breaks can be easily
    avoided. What is even more frustrating is that the default behavior is to handle
    graph breaks by silently falling back to eager execution for the problematic code
    segment.
  prefs: []
  type: TYPE_NORMAL
- en: Avoiding Graph-Breaks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The first step to handling graph-breaks is to configure the compiler to report
    them. Here are several ways of doing this:'
  prefs: []
  type: TYPE_NORMAL
- en: Apply the torch._dynamo.explain operator to your (uncompiled) model and run
    it on a sample input (as demonstrated [here](https://docs.pytorch.org/tutorials/intermediate/torch_compile_tutorial.html#torchdynamo-and-fx-graphs)).
    This will result in a log containing a list of all of the graph-breaks.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Set the *TORCH_LOGS* environment variable to include “*graph_breaks*”. This
    will cause the compiler to print the graph-breaks it encounters during compilation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Call with torch.compile with *fullgraph*=*True*. This will cause the compilation
    to fail each time it encounters a graph-break — thereby forcing the developer
    to acknowledge its presence and potentially fix it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: While our personal preference is option three, it is important to note that
    there are times where graph-breaks cannot be avoided, which means that we may
    need to disable *fullgraph *in a production setting. The best example of this
    is distributed training (e.g., [DDP](https://docs.pytorch.org/tutorials/intermediate/ddp_tutorial.html) and [FSDP](https://docs.pytorch.org/docs/stable/fsdp.html))
    where the computation group includes communication calls which (as of the time
    of this writing) are not supported by torch.compile and, thus, result in graph-breaks.
  prefs: []
  type: TYPE_NORMAL
- en: With knowledge of the location of our graph breaks, we address each one individually.
    We remove redundant prints and assertions, replace conditional blocks with graph-friendly
    alternatives such as [torch.where](https://docs.pytorch.org/docs/stable/generated/torch.where.html) or [torch.cond](https://docs.pytorch.org/docs/stable/generated/torch.cond.html),
    and adjust our model implementation to minimize untraceable Python control flow
    and native operations. In some cases, we may desire to maintain some of the prints
    or assertions for running in eager mode; in this case, we can wrap them in a conditional
    check like `if not torch.compiler.is_compiling()`. There may be cases (e.g., DDP)
    where graph-breaks are unavoidable.
  prefs: []
  type: TYPE_NORMAL
- en: See [here](https://docs.pytorch.org/docs/stable/torch.compiler_troubleshooting.html#resolving-graph-breaks) for
    more on avoiding graph-breaks.
  prefs: []
  type: TYPE_NORMAL
- en: 'PyTorch Compilation Killer #2: Recompilations'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The second potential compilation killer is the graph recompilation. During the
    initial graph compilation phase, several assumptions are made and relied upon
    for generating the resultant graph. In torch.compile lingo these assumptions are
    referred to as *guards*. Common guards include the data types and shapes of input
    tensors. On each iteration, these guards are verified on the current tensor inputs
    and training state. If one of the guards is violated, the current graph is deemed
    invalid for the current state and a new graph is generated, i.e., the graph is
    recompiled. Graph compilation takes an extremely long time relative to the time
    it takes to execute a compiled graph. Consequently, multiple recompilations is
    likely to erase any potential performance gains from torch.compile. Moreover,
    torch.compile has a recompilation limit (the default is 8) after which it will
    raise a torch._dynamo.exc.RecompileLimitExceeded exception and fall back to eager
    mode.
  prefs: []
  type: TYPE_NORMAL
- en: Avoiding Recompiles
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here too, the first step is identifying the causes of the recompilations. Once
    again, there are several options:'
  prefs: []
  type: TYPE_NORMAL
- en: Use [torch_compiler.set_stance](https://docs.pytorch.org/tutorials/recipes/torch_compiler_set_stance_tutorial.html) operator
    to fail on recompile: `torch.compiler.set_stance(“fail_on_recompile”)`. In practice,
    this option can sometimes prove to be too limiting.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Set the *TORCH_LOGS* environment variable to include “*recompiles*”. This will
    cause the compiler to report each time it performs recompilation along with the
    guards that were violated.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Compiling Graphs with Variable-Shaped Tensors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One of the most common causes of recompilations is the presence of tensors
    with dynamic shapes. The first time a graph is compiled it creates guards according
    to the shapes of the tensors it traced. When a tensor changes shape in a subsequent
    step, the guard is violated and the graph is recompiled. There are multiple ways
    of handling tensors with dynamic shapes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Default Compilation Behavior**: If the *dynamic *field of the torch.compile
    call is not set (or set to *None*), each time the compiler encounters a new dynamic
    tensor, it will perform recompilation to generate a new graph that supports the
    dynamism it identified. In this option, the graph modification is applied surgically,
    allowing for “static” optimizations to be applied to other portions of the graph.
    If new dynamism is discovered in multiple iterations, we may hit the recompilation
    limit and fall back to eager execution. Consequently, this option should only
    be used for models with limited dynamism.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Mark Dynamic Tensors**: Another option is to explicitly mark the dynamic
    tensors and associated dynamic axis using the torch._dynamo.mark_dynamic API.
    This informs the compiler to build a graph that supports the reported dynamism
    and prevents recompilations altogether. This is a great option in situations in
    which you know upfront what your dynamic shapes are (which you absolutely should!!).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Dynamic Compilation**: The third option is to apply torch.compile with *dynamic*=*True*.
    This instructs the compiler to construct a graph that is as dynamic as possible
    in order to avoid recompilations. When enabled, dynamic shape tracing is applied
    to all of the tensors in the graph. This is often overkill. Keep in mind that
    many graph optimization techniques (e.g., CUDA graphs) assume static shapes. These
    are automatically disabled when this setting is applied. This option should be
    avoided whenever possible.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Generate a Limited Number of Static Graphs**: When torch.compile is applied
    with *dynamic*=*False,* the compiler will never generate dynamic graphs. Each
    time a guard is violated a new static graph is created, supporting the newly encountered
    tensor shape, and added to the compilation cache. While limited (by the recompilation
    limit) in the number of shapes it can support, this option is compelling due to
    the fact that it allows for optimizations that assume a static graph. To benefit
    from this capability, a common approach is to remove dynamism from the graph by
    padding dynamic tensors to a fixed length. A more advanced approach that reduces
    the amount of padding is to set a number of fixed length values (e.g., powers
    of two) and pad the variable shaped tensors to the closest length. The number
    of length values should not exceed the recompilation limit. This will result in
    a fixed number of recompilations and a fixed number of highly optimized graphs.
    We can ensure that all graphs are created during the model warmup phase.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As before, there are some situations where graph recompilations cannot be avoided,
    and we may have no choice but to run our model in eager mode.
  prefs: []
  type: TYPE_NORMAL
- en: See [here](https://docs.pytorch.org/docs/stable/torch.compiler_troubleshooting.html#dealing-with-recompilations) for
    more on avoiding recompilations and [here](https://docs.pytorch.org/docs/stable/torch.compiler_dynamic_shapes.html) for
    details on how torch.compile handles dynamic shapes.
  prefs: []
  type: TYPE_NORMAL
- en: Debugging Compilation Issues
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Inevitably, you will encounter some situations where torch compilation fails.
    Often, you will get a long error message and callstack, but it may as well be
    in a foreign language. You will likely be encouraged to *Set TORCH_LOGS=”+dynamo”
    and TORCHDYNAMO_VERBOSE=1* but you may find that this does little to help you
    solve the problem.
  prefs: []
  type: TYPE_NORMAL
- en: The [torch.compile troubleshooting](https://docs.pytorch.org/docs/stable/torch.compiler_troubleshooting.html) guide
    offers multiple tips for diagnosing compilation errors (e.g., by compiling with
    “eager”, “aot_eager” and “inductor” backends), for fixing or avoiding them, and
    if all else fails, for [reporting](https://docs.pytorch.org/docs/stable/torch.compiler_troubleshooting.html#reporting-issues) them
    to PyTorch. In this post we call out two different approaches for tackling tough
    compilation issues.
  prefs: []
  type: TYPE_NORMAL
- en: Top-Down VS. Bottom-Up Approach
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In a top-down approach, we apply torch compilation at the highest-level function/model
    — come what may. We then begin to work through the compilation issues as they
    come up by either fixing them or removing them from the graph via the [torch.compiler.disable](https://docs.pytorch.org/docs/stable/generated/torch.compiler.disable.html) utility.
    This approach assumes that we are sufficiently able to decipher the compilation
    logs — at least well enough to navigate to the problematic line of code.
  prefs: []
  type: TYPE_NORMAL
- en: In a bottom-up approach, we begin by applying compilation to a few low-level
    components and slowly increase the scope of compilation until we hit an error.
    This approach makes it easy to pinpoint the sources of the compilation issue.
    An additional advantage is that we can benefit from the results of a partially
    compiled graph while we continue to work on additional optimizations. This is
    contrary to the Top-Down approach where we will only have a workable graph once
    all issues are addressed.
  prefs: []
  type: TYPE_NORMAL
- en: 'The best approach depends on the model at hand and your personal inclination.Often,
    a combination of the two delivers the best results: for example, identifying issues
    via a bottom-up approach, resolving them, and then testing if the full graph compilation
    works.'
  prefs: []
  type: TYPE_NORMAL
- en: Tuning for Maximal Performance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once you have succeeded in compiling your model, there are a wide range of controls
    for trying to squeeze out even better performance. In this section we will cover
    some of the available options. It should be noted that the additional performance
    gains from these options are usually a small fraction of the gains from the initial
    application of standard compilation.
  prefs: []
  type: TYPE_NORMAL
- en: Advanced Compiler Modes and Options
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The [torch.compile API](https://docs.pytorch.org/docs/stable/generated/torch.compile.html) allows
    for tuning the compiler-backend behavior via via the `mode` and `options` parameters.
    There are dozens of knobs that can be applied and assessed. Some of the most notable
    ones are “reduce-overhead” — that optimizes more aggressively to further reduce
    the overhead of the kernel loading and Python interpreter, and “max-autotune”
    — the most aggressive optimization option that performs benchmarking of multiple
    kernel options before choosing the most efficient one. Both of these, particularly
    “max-autotune”, increase the compilation time, but usually result in more efficient
    graphs.
  prefs: []
  type: TYPE_NORMAL
- en: Varying the Compiler Backend
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The default compiler backend is TorchInductor which supports a variety of target
    devices. You can specify the compiler backend via the *backend* parameter of the [torch.compile
    API](https://docs.pytorch.org/docs/stable/generated/torch.compile.html). While
    other backends are unlikely to beat TorchInductor when running on NVIDIA GPUs,
    you may find them to perform better on other hardware devices (e.g., the [*ipex*](https://github.com/intel/intel-extension-for-pytorch) backend
    includes optimizations that leverage the unique capabilities of Intel® CPUs).
  prefs: []
  type: TYPE_NORMAL
- en: Applying Modular Compilation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While it is usually recommended to apply compilation to the entire model, there
    are times where the model can be broken into submodules that respond very differently
    to the compiler controls. For example, if your model contains one component that
    includes many tensors with dynamic shapes and another component that is static,
    you may find that compiling the first in “max-autotune-no-cudagraphs” mode and
    the second in “max-autotune” mode, results in maximum performance.
  prefs: []
  type: TYPE_NORMAL
- en: Compiling the Optimizer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In addition to compiling the model execution, as of PyTorch 2.2, you can further
    optimize your training workload by [compiling the optimizer](https://docs.pytorch.org/tutorials/recipes/compiling_optimizer.html).
    This will be demonstrated below.
  prefs: []
  type: TYPE_NORMAL
- en: New Compiler Features
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Since the initial release of torch.compile in PyTorch 2.0, each PyTorch release
    has included enhancements to the torch.compile offering. Sometimes released as
    “prototypes”, new features offerings challenge developers to extract even greater
    performance out of graph compilation. For example, the [PyTorch 2.7 release](https://pytorch.org/blog/pytorch-2-7/) included
    the [foreach_map](https://docs.pytorch.org/tutorials/recipes/foreach_map.html) prototype
    feature, the use of which we will demonstrate below.
  prefs: []
  type: TYPE_NORMAL
- en: Reducing Compilation Time
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While the initial compilation and warm-up time can be quite long compared to
    the subsequent training steps, it is usually negligible compared to the overall
    life of the model (i.e., the training or inference time). In some cases, however,
    the lengthy compilation time can become an issue. If the model is extremely large
    and we are tuning for optimal performance, compilation could take hours. If we
    are using our model in an inference server setup, the model start-up time could
    have a direct impact on the server response time and user experience.
  prefs: []
  type: TYPE_NORMAL
- en: In this section we cover two techniques for reducing model compilation time: [compile-time
    caching](https://docs.pytorch.org/tutorials/recipes/torch_compile_caching_tutorial.html) and [regional
    compilation](https://docs.pytorch.org/tutorials/recipes/regional_compilation.html).
  prefs: []
  type: TYPE_NORMAL
- en: Compile Time Caching
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In compile-time caching we upload the results of the local graph compilation
    to persistent storage. Every time we need to run the same model in the same runtime
    environment (e.g., same hardware and same library versions) we pull the cache
    state from persistent storage to the local disk, instead of compiling from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: Regional Compilation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Regional compilation relies on the fact that large models typically consist
    of computation blocks that are repeated multiple times. In regional compilation,
    torch.compile is applied to the repeating block, instead of the entire model.
    The result is a single, relatively small graph that is created and reused for
    each of the blocks.
  prefs: []
  type: TYPE_NORMAL
- en: How to Configure the TORCH_LOGS Environment Variable
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Torch compilation supports a wide variety of [logging controls](https://docs.pytorch.org/docs/stable/torch.compiler_troubleshooting.html#summary-of-torch-logs-options).
    While the log reports can be extremely useful for debugging issues and maximizing
    performance, it’s important to find the right balance where the logs are helpful
    but not excessive. In this post we propose using the following initial configuration
    and adapting as needed:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: “graph_breaks” — reports each time a graph-break is encountered (see above)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “recompiles” — reports each time a recompilation is performed along with the
    guard-violation that triggered it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “perf_hints” — outputs performance logs from the inductor backend along with
    hints for additional optimizations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note that sometimes “perf_hints” will flood the console with unactionable messages,
    in which case you may opt to disable it.
  prefs: []
  type: TYPE_NORMAL
- en: 'A Toy PyTorch Model: Image Captioning'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To demonstrate torch.compile in action, we define a toy image captioning model
    using the popular [Hugging Face](https://huggingface.co/) [transformers](https://huggingface.co/docs/transformers/en/index) library
    (version 4.54.1). Specifically, we define an image-to-text model using a [VisionEncoderDecoderModel](https://huggingface.co/docs/transformers/v4.53.3/en/model_doc/vision-encoder-decoder#transformers.VisionEncoderDecoderModel),
    with a [Vision Transformer (ViT)](https://huggingface.co/papers/2010.11929) encoder
    and a [GPT-2](https://cdn.openai.com/better-language-models/language_models_are_unsupervised_multitask_learners.pdf) decoder,
    and train it on a synthetic dataset of fixed-sized images and random sequences
    (“captions”) of variable length.
  prefs: []
  type: TYPE_NORMAL
- en: 'We begin by defining our image-to-text model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Next, we define a synthetic dataset that generates pairs of random images of
    fixed size and random sequences of variable size. We use a weighted distribution
    for the sequence length to mimic a scenario where the vast majority of sequences
    are short.
  prefs: []
  type: TYPE_NORMAL
- en: 'Given the varying length of the input captions, we require a strategy for dealing
    with dynamically shaped input. Here, we offer two alternatives, both of which
    use padding: padding to the maximum input length and padding to the length of
    the longest sequence in the batch, along with an option to align it to a given
    multiple. Please see our [previous post](https://towardsdatascience.com/optimizing-transformer-models-for-variable-length-input-sequences-19fb88fddf71/) for
    additional strategies for handling variable-length input sequences.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Last, we define our training step and main training function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Baseline Performance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Running the training script without compilation yields the following baseline
    performance results:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2e7438055bb377c861d38f339753cff0.png)'
  prefs: []
  type: TYPE_IMG
- en: Baseline Model Performance (by Author)
  prefs: []
  type: TYPE_NORMAL
- en: We can see clearly that the collation strategy that reduces padding results
    in much better performance.
  prefs: []
  type: TYPE_NORMAL
- en: Applying Model Compilation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section we will apply torch compilation with different configurations
    and measure its impact on the training throughput. We will begin by applying compilation
    without dynamism, i.e., when padding all inputs to max sequence length. In the
    following section we will evaluate its impact in the case of inputs with dynamic
    shapes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Model Compilation Step #1: Fixing Graph Breaks'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We introduce the following compilation utility function and apply it to our
    model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'The *fullgraph *setting ensures that compilation will fail whenever it encounters
    a graph break. Sure enough, our first compilation attempt results in an error
    coming from the transformer library. Here is a small snippet:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'The reason for this error is that when the [VisionEncoderDecoderModel](https://huggingface.co/docs/transformers/v4.53.3/en/model_doc/vision-encoder-decoder#transformers.VisionEncoderDecoderModel) loss
    function is not specified, the transformers library uses native Python code to
    determine what loss function to apply. This is easy to fix by specifying the model
    loss function, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Following this fix, model compilation succeeds. The resultant throughput is
    5.17 steps per second — a 66% speed-up over the baseline (fixed-input) throughput.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that in the current scenario of a static graph, the compiler did not report
    any recompilations, but it did report the following *perf_hint*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: However, applying the suggested configuration results in a compilation error,
    so we ignore it going forward.
  prefs: []
  type: TYPE_NORMAL
- en: 'Model Compilation Step #2: Tuning the Compiler Configuration'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s try to increase the performance further by applying some of the advanced
    compilation controls. The code block below includes three alternative modifications:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'The results are captured in the table below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1e96db0e2b475cd9f08ebdf21d4f4015.png)'
  prefs: []
  type: TYPE_IMG
- en: torch.compile results (by Author)
  prefs: []
  type: TYPE_NORMAL
- en: The subsequent experiments in this section will be run with the “max-autotune”
    optimization.
  prefs: []
  type: TYPE_NORMAL
- en: 'Model Compilation Step #3: Compiling the Optimizer'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Next, we extend our solution to apply compilation to the optimizer. Since optimizer
    compilation currently requires graph-breaks, we apply it without the *fullgraph* flag:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Compiling the optimizer further increases the throughput to 5.54 steps per second!!
  prefs: []
  type: TYPE_NORMAL
- en: 'When compiling the optimizer, the following performance hint is printed:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'The proposal is to fix the addresses of gradient tensors and mark them. To
    implement the suggestion, we introduce the following two utility functions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'The updated training step appears below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: In our case, implementing the performance hint decreases the throughput result
    to 5.32 steps per second — so we disregard it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Model Compilation Step #4: Foreach Map Optimization'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Constantly be on the lookout for torch.compile enhancements and additions.
    Here we will apply [horizontal fusion with foreach_map](https://docs.pytorch.org/tutorials/recipes/foreach_map.html) —
    an optimization introduced in the latest PyTorch release — to the optimizer step.
    Using the utility functions from the [Foreach Map tutorial](https://docs.pytorch.org/tutorials/recipes/foreach_map.html),
    we create an optimized Adam optimizer step function, and apply it to our optimizer:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: This optimization requires use of the *zero_grads *utility from above. It also
    requires that we run a warmup training step before compilation to populate all
    of the gradient tensors.
  prefs: []
  type: TYPE_NORMAL
- en: The modified optimizer step results in a reduced throughput of 5.28 steps per
    second. We presume that our toy model is too small to reap the benefit of the
    new compilation feature.
  prefs: []
  type: TYPE_NORMAL
- en: Our best result, 5.54 steps per second, is 78% faster than our baseline result.
    Let’s see what happens when we extend our solution to multiple GPUs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Model Compilation Step #5: Extending to DDP'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The final step is to extend the training script to use all 8 GPUs. For this
    step we need to disable the *fullgraph* setting since the cross-GPU gradient sharing
    requires graph-breaking communication calls.
  prefs: []
  type: TYPE_NORMAL
- en: The resultant throughput is 4.59 steps per second, nearly two times faster than
    our baseline result.
  prefs: []
  type: TYPE_NORMAL
- en: Results
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The table below summarizes the results of our static-graph experiments:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f6d375870c3fe449b30e281aee10ae77.png)'
  prefs: []
  type: TYPE_IMG
- en: Static Graph Compilation Results (by Author)
  prefs: []
  type: TYPE_NORMAL
- en: Thus far, all of our experiments have assumed fixed-sized input tensors. Since
    the vast majority of input sequences are small, our graph is performing a huge
    amount of wasteful computation.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section we will evaluate torch.compile when padding to variable-length
    inputs.
  prefs: []
  type: TYPE_NORMAL
- en: Dynamic Model Compilation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section we introduce dynamism into our toy model definition by padding
    the inputs sequences in each batch to the length of the longest sequence. In a
    previous section we described several strategies for compiling dynamic graphs.
    We will apply these strategies and assess their impact on the training throughput.
  prefs: []
  type: TYPE_NORMAL
- en: The experiments in this section were run on a single NVIDIA A100 GPU.
  prefs: []
  type: TYPE_NORMAL
- en: 'Option #1: Auto-Detect Dynamism'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The default behavior (*dynamic*=*None*) of torch.compile is to auto-detect
    dynamism and recompile the graph accordingly. When running in this setting, we
    indeed see the recompilation due to the variation in input size, but we also get
    the following print:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: The source of this recompilation is the [scaled_dot_product_attention](https://docs.pytorch.org/docs/stable/generated/torch.nn.functional.scaled_dot_product_attention.html) operator,
    which requires that input shapes be aligned to multiples of eight for optimal
    use. To address this issue and avoid the recompilation, we modify our padding
    operation to pad to a multiple of eight.
  prefs: []
  type: TYPE_NORMAL
- en: 'To avoid the recompilation that is triggered by the variable-length inputs,
    we define the following utility and apply it to the input tensors:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: This option results in a throughput of 7.78 steps per second, 64% higher than
    the baseline throughput (4.73).
  prefs: []
  type: TYPE_NORMAL
- en: An additional speed-up is achieved when we apply the “max-autotune” mode — 8.13
    steps per second.
  prefs: []
  type: TYPE_NORMAL
- en: 'Option #2: Dynamic Compilation'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Another way to avoid recompilations is to call torch.compile with *dynamic*=*True*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: This results in a throughput of 7.77 steps per second. Since setting *dynamic*=*True* precludes
    the use of CUDA graphs, we attempt to optimize further by setting *mode*=”max-autotune-no-cudagraphs”.
    This results in a throughput of 7.89 steps per second.
  prefs: []
  type: TYPE_NORMAL
- en: 'Option #3: Compile a Fixed Number of Static Graphs'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The last option we explore is to set a fixed number of supported input shapes
    and compile a corresponding fixed number of static graphs. Since the default number
    of recompilations supported is eight, we program our collator to emit eight different
    tensor shapes by aligning the padding to multiples of 32\. To force the recompilations,
    we set *dynamic*=*False*.
  prefs: []
  type: TYPE_NORMAL
- en: The resultant throughputs are for 7.77 steps per second for the default mode
    and 8.04 for *mode*=”max-autotune”.
  prefs: []
  type: TYPE_NORMAL
- en: Note that this option may require a greater number of warmup steps to ensure
    that all shape variations are processed. (An alternative is to manually feed the
    model with all shape variations before starting the training loop.)
  prefs: []
  type: TYPE_NORMAL
- en: Modular Compilation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Since our model naturally splits into two submodules — a static encoder and
    a dynamic decoder — it is tempting to explore the option of applying separate
    compilation to each component. Note that in an inference setting, it is essential
    to compile the encoder and decoder separately, since the encoder is called only
    once, while the decoder is called repeatedly in an auto-regressive loop.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: The result of this strategy is a throughput of 7.93, which is slightly higher
    than the result we got (in default mode) when compiling the entire model.
  prefs: []
  type: TYPE_NORMAL
- en: One advantage to this approach is the ability to tune the compilation controls
    to each submodule independently. For example, setting *mode*=”max-autotune” to
    just the encoder, further increased the throughput to 8.04 steps per second.
  prefs: []
  type: TYPE_NORMAL
- en: Results
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We summarize the results of our dynamic-graph experiments in the table below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/25f58c7fafc9ddc67ca8ac6b4e2e7316.png)'
  prefs: []
  type: TYPE_IMG
- en: Dynamic Graph Compilation Results (by Author)
  prefs: []
  type: TYPE_NORMAL
- en: The best result was 8.13 steps per second, 72% higher than the baseline result
    (4.73). It is likely that further tuning could result in additional gains.
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that the impact of torch.compile can vary greatly based on the
    details of the model and the runtime environment.
  prefs: []
  type: TYPE_NORMAL
- en: Reducing Compilation Time
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We now turn our attention to the duration of the torch.compile warmup. We will
    assess the two optimizations discussed above, [compile-time caching](https://docs.pytorch.org/tutorials/recipes/torch_compile_caching_tutorial.html)
    and [regional compilation](https://docs.pytorch.org/tutorials/recipes/regional_compilation.html).
    We limit our experiments to a single GPU. We use the default application of torch.compile
    and measure the duration of the first 20 training iterations.
  prefs: []
  type: TYPE_NORMAL
- en: Pre-Loading Compilation Cache
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In the following demonstration of compile-time caching, we use an [Amazon S3](https://aws.amazon.com/s3/)
    bucket as our persistent storage location:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: This method reduces the compilation warmup from 196 seconds to 56 seconds —
    a 3.5X speed-up.
  prefs: []
  type: TYPE_NORMAL
- en: Regional Compilation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To implement regional compilation, we apply compilation to the internal blocks
    of both the encoder and the decoder:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: This change reduces the throughput from 7.78 steps per second to 7.61 steps
    per second. On the other hand, the compilation warmup drops from 196 seconds to
    80 seconds — a 2.45X speed-up.
  prefs: []
  type: TYPE_NORMAL
- en: In the case of our toy model — which is extremely small by today’s standards
    — the gains we have demonstrated are modest. But for large models, these types
    of compilation-time optimization techniques could prove essential.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As AI/ML models grow in size to hundreds of billions or even trillions of parameters,
    optimizing their runtime performance becomes increasingly essential. For PyTorch
    models, torch.compile is one of the most powerful optimization tools at your disposal.
    This post has aimed to ease the adoption of torch.compile by addressing some of
    its intricacies and demonstrating its practical use. Some of the main techniques
    we covered were:'
  prefs: []
  type: TYPE_NORMAL
- en: Reducing graph-breaks and recompilations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tuning compilation settings to maximize performance gains
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Effective use of the PyTorch logs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Top-down vs. bottom-up debugging strategies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Modular application of torch.compile
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reducing the duration of compilation warmup
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: PyTorch compilation is a complex and nuanced topic. In this post we have covered
    just some of its many features. For more on the topic, be refer to the [official
    documentation](https://docs.pytorch.org/tutorials/intermediate/torch_compile_tutorial.html).
  prefs: []
  type: TYPE_NORMAL
