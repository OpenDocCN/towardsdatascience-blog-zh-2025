- en: 'The Machine Learning “Advent Calendar” Day 2: k-NN Classifier in Excel'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器学习“圣诞日历”第 2 天：Excel 中的 k-NN 分类器
- en: 原文：[https://towardsdatascience.com/the-machine-learning-advent-calendar-day-2-k-nn-classifier-in-excel/](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-2-k-nn-classifier-in-excel/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-machine-learning-advent-calendar-day-2-k-nn-classifier-in-excel/](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-2-k-nn-classifier-in-excel/)
- en: <mdspan datatext="el1764651415344" class="mdspan-comment">After exploring</mdspan>
    the k-NN Regressor and the idea of prediction based on distance, we now look at
    the k-NN Classifier.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764651415344" class="mdspan-comment">在探索了</mdspan> k-NN
    回归器和基于距离的预测思想之后，我们现在来看看 k-NN 分类器。
- en: The principle is the same, but classification allows us to introduce several
    useful variants, such as Radius Nearest Neighbors, Nearest Centroid, multi-class
    prediction, and probabilistic distance models.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 原理相同，但分类允许我们引入几个有用的变体，例如半径最近邻、最近质心、多类预测和概率距离模型。
- en: So we will first implement the k-NN classifier, then discuss how it can be improved.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们将首先实现 k-NN 分类器，然后讨论如何改进它。
- en: '![](../Images/eab71cd02f84cc3b78cb3bb96bbfb205.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eab71cd02f84cc3b78cb3bb96bbfb205.png)'
- en: k-NN classifier in Excel – image by author
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的 k-NN 分类器 – 图片由作者提供
- en: Titanic survival dataset
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 泰坦尼克号生存数据集
- en: We will use the Titanic survival dataset, a classic example where each row describes
    a passenger with features such as class, sex, age, and fare, and the goal is to
    predict whether the passenger survived.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用泰坦尼克号生存数据集，这是一个经典示例，其中每一行描述了一位乘客，具有诸如阶级、性别、年龄和船票等特征，目标是预测乘客是否幸存。
- en: '![](../Images/0c4c398e495573083b9c931f5d24a044.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0c4c398e495573083b9c931f5d24a044.png)'
- en: '[Titanic survival dataset](https://seaborn.pydata.org/generated/seaborn.load_dataset.html)
    – image by author – **CC0: Public Domain** license'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '[泰坦尼克号生存数据集](https://seaborn.pydata.org/generated/seaborn.load_dataset.html)
    – 图片由作者提供 – **CC0: 公共领域**许可'
- en: Principle of k-NN for Classification
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: k-NN 分类原理
- en: k-NN classifier is so similar to k-NN regressor that I could almost write one
    single article to explain them both.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: k-NN 分类器与 k-NN 回归器非常相似，我几乎可以写一篇文章来解释它们两个。
- en: In fact, when we look for the *k* nearest neighbors, we do not use the value
    *y* at all, **let alone** its nature.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，当我们寻找最近的 *k* 个邻居时，我们根本不使用值 *y*，**更不用说**它的性质了。
- en: BUT, there are still some interesting facts about how classifiers (binary or
    multi-class) are built, and how the features can be handled differently.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，关于分类器（二进制或多类）是如何构建的，以及特征如何被不同处理，还有一些有趣的事实。
- en: We begin with the binary classification task, and then the multi-class classification.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从二元分类任务开始，然后是多元分类。
- en: One Continuous Feature for Binary Classification
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 二元分类的一个连续特征
- en: So, very quick, we can do the same exercise for one continuous feature, with
    this dataset.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，非常快地，我们可以用这个数据集对单个连续特征进行相同的练习。
- en: For the value of y, we usually use 0 and 1 to distinguish the two classes. But
    you can notice, or you will notice that it can be a source of confusion.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 y 的值，我们通常使用 0 和 1 来区分两个类别。但你可以注意到，或者你会注意到，这可能会引起混淆。
- en: '![](../Images/ac98562e186525efbd4d465ba265ba1d.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ac98562e186525efbd4d465ba265ba1d.png)'
- en: k-NN classifier in Excel – One continuous feature – image by author
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的 k-NN 分类器 – 一个连续特征 – 图片由作者提供
- en: 'Now, think about it: 0 and 1 are also numbers, right? So, we can exactly do
    the same process as if we are doing a regression.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，想想看：0 和 1 也是数字，对吧？所以，我们可以完全像做回归一样进行相同的过程。
- en: That’s right. Nothing changes in the computation, as you see in the following
    screenshot. And you can of course try to modify the value of the new observation
    yourself.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 没错。计算过程中没有任何变化，正如你在下面的截图中所看到的。当然，你也可以尝试修改新观察值的值。
- en: '![](../Images/635ca7fbfbbd3cadf8ff3d210fa5ed6f.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/635ca7fbfbbd3cadf8ff3d210fa5ed6f.png)'
- en: k-NN classifier in Excel – prediction for one continuous feature – image by
    author
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的 k-NN 分类器 – 对一个连续特征的预测 – 图片由作者提供
- en: The only difference is how we interpret the result. When we take the “average”
    of the neighbors’ *y* values, this number is understood as the probability that
    the new observation belongs to class 1.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的区别是我们如何解释结果。当我们取邻居的 *y* 值的“平均值”时，这个数字被理解为新观察属于类别 1 的概率。
- en: So in reality, the “average” value is not the good interpretation, but it is
    rather the proportion of class 1.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在现实中，“平均值”并不是一个好的解释，而是更接近于类别 1 的比例。
- en: We can also manually create this plot, to show how the predicted probability
    changes over a range of *x* values.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以手动创建这个图，以展示预测概率在一系列*x*值范围内的变化。
- en: Traditionally, to avoid ending up with a 50 percent probability, we choose an
    odd value for *k*, so that we can always decide with majority voting.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，为了避免得到50%的概率，我们选择一个奇数作为*k*，这样我们就可以总是通过多数投票来做出决定。
- en: '![](../Images/5806333a82f716e2fcc686f9cf602d14.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5806333a82f716e2fcc686f9cf602d14.png)'
- en: k-NN classifier in Excel – predictions for one continuous feature – image by
    author
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的k-NN分类器 – 对一个连续特征的预测 – 图片由作者提供
- en: Two-feature for Binary classification
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 二特征用于二分类
- en: If we have two features, the operation is also almost the same as in k-NN regressor.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们有两个特征，操作也几乎与k-NN回归器相同。
- en: '![](../Images/7fc3e904cd0127e7dca38abbf35f9cbb.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7fc3e904cd0127e7dca38abbf35f9cbb.png)'
- en: k-NN classifier in Excel – two continuous features – image by author
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的k-NN分类器 – 两个连续特征 – 图片由作者提供
- en: One feature for multi-class classification
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 单特征用于多分类
- en: Now, let’s take an example of three classes for the target variable y.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们以目标变量y的三个类别为例。
- en: Then we can see that we cannot use the notion of “average” anymore, since the
    number that represents the category is not actually a number. And we should better
    call them “category 0”, “category 1”, and “category 2”.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们可以看到，我们不能再使用“平均”这个概念了，因为代表类别的数字实际上并不是一个数字。我们最好把它们称为“类别0”、“类别1”和“类别2”。
- en: '![](../Images/86b94941e5bfad871498c75df643008f.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/86b94941e5bfad871498c75df643008f.png)'
- en: k-NN classifier in Excel – multi-class classifer – image by author
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的k-NN分类器 – 多类分类器 – 图片由作者提供
- en: From k-NN to Nearest Centroids
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从k-NN到最近中心点
- en: When k Becomes too Large
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当k变得太大时
- en: Now, let’s make k large. How large? As large as possible.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们让k变得很大。有多大？尽可能大。
- en: Remember, we also did this exercise with k-NN regressor, and the conclusion
    was that if k equals the total number of observations in the training dataset,
    then k-NN regressor is the simple average-value estimator.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，我们也用k-NN回归器做了这个练习，结论是如果k等于训练数据集中的观察值总数，那么k-NN回归器就是简单平均值估计量。
- en: For the k-NN classifier, it is almost the same. If k equals the total number
    of observations, then for each class, we will get its overall proportion inside
    the entire training dataset.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 对于k-NN分类器，几乎也是一样的。如果k等于观察值的总数，那么对于每个类别，我们将在整个训练数据集中得到其整体比例。
- en: Some people, from a Bayesian point of view, call these proportions the priors!
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人从贝叶斯的角度来看，把这些比例称为**先验**！
- en: But this does not help us much to classify a new observation, because these
    priors are the same for every point.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 但这并不能在很大程度上帮助我们分类新的观测值，因为这些先验对每个点都是相同的。
- en: The Creation of Centroids
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 中心点的创建
- en: So let us take one more step.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们再迈出一步。
- en: For each class, we can also group together all the feature values *x* that belong
    to that class, and compute their average.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个类别，我们也可以将属于该类别的所有特征值*x*分组在一起，并计算它们的平均值。
- en: These averaged feature vectors are what we call **centroids**.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这些平均特征向量就是我们所说的**中心点**。
- en: What can we do with these centroids?
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用这些中心点做什么？
- en: We can use them to classify a new observation.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用它们来分类新的观测值。
- en: Instead of recalculating distances to the entire dataset for every new point,
    we simply measure the distance to each class centroid and assign the class of
    the nearest one.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是为每个新点重新计算到整个数据集的距离，我们只需测量到每个类别中心点的距离，并将类别分配给最近的那个。
- en: 'With the Titanic survival dataset, we can start with a single feature, **age**,
    and compute the centroids for the two classes: passengers who survived and passengers
    who did not.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 使用泰坦尼克号生存数据集，我们可以从一个单一的特征开始，**年龄**，并为两个类别计算中心点：幸存乘客和未幸存乘客。
- en: '![](../Images/17cc676f78642bcb0765283a3d4786d6.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/17cc676f78642bcb0765283a3d4786d6.png)'
- en: k-NN classifier in Excel – Nearest Centroids – image by author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的k-NN分类器 – 最近中心点 – 图片由作者提供
- en: Now, it is also possible to use multiple continuous features.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，也可以使用多个连续特征。
- en: For example, we can use the two features age and fare.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们可以使用两个特征：年龄和票价。
- en: '![](../Images/73b3b175e1f0bb35deb47c47fe7b00da.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/73b3b175e1f0bb35deb47c47fe7b00da.png)'
- en: k-NN classifier in Excel – Nearest Centroids – image by author
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的k-NN分类器 – 最近中心点 – 图片由作者提供
- en: 'And we can discuss some important characteristics of this model:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以讨论这个模型的一些重要特性：
- en: The scale is important, as we discussed before for k-NN regressor.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 规模很重要，正如我们之前在k-NN回归器中讨论的那样。
- en: 'The missing values are not a problem here: when we compute the centroids per
    class, each one is calculated with the available (non-empty) values'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺失值在这里不是问题：当我们按类别计算质心时，每个都是用可用的（非空）值计算的
- en: We went from the most “complex” and “large” model (in the sense that the actual
    model is the entire training dataset, so we have to store all the dataset) to
    the simplest model (we only use one value per feature, and we only store these
    values as our model)
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们从最“复杂”和“大”的模型（在这个意义上，实际模型是整个训练数据集，因此我们必须存储整个数据集）到最简单的模型（我们只使用每个特征的一个值，并且我们只存储这些值作为我们的模型）
- en: From highly nonlinear to naively linear
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从高度非线性到天真线性
- en: But now, can you think of one major drawback?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 但是现在，你能想到一个主要的缺点吗？
- en: Whereas the basic k-NN classifier is highly nonlinear, the Nearest Centroid
    method is extremely linear.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 而基本的k-NN分类器是非线性的，最近邻质心方法则是极其线性的。
- en: In this 1D example, the two centroids are simply the average x values of class
    0 and class 1\. Because these two averages are close, the decision boundary becomes
    just the midpoint between them.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个1D示例中，两个质心仅仅是类别0和类别1的平均x值。因为这两个平均值很接近，决策边界就变成了它们之间的中点。
- en: So instead of a piecewise, jagged boundary that depends on the exact location
    of many training points (as in k-NN), we obtain a straight cutoff that only depends
    on two numbers.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们得到的不是依赖于许多训练点确切位置的阶梯状、锯齿状的边界（如k-NN），而是一个只依赖于两个数的直线截断。
- en: This illustrates how Nearest Centroids compresses the entire dataset into a
    simple and very linear rule.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这说明了最近邻质心如何将整个数据集压缩成简单且非常线性的规则。
- en: '![](../Images/7fad878e9942e7293d26622f24de5b7b.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7fad878e9942e7293d26622f24de5b7b.png)'
- en: k-NN classifier in Excel – Nearest Centroids linearity – image by author
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的k-NN分类器 – 最近邻质心线性 – 图像由作者提供
- en: 'A note on regression: why centroids do not apply'
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于回归的一个注释：为什么质心不适用
- en: Now, this kind of improvement is not possible for the k-NN regressor. Why?
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这种改进对于k-NN回归器是不可能的。为什么？
- en: In classification, each class forms a group of observations, so computing the
    average feature vector for each class makes sense, and this gives us the class
    centroids.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在分类中，每个类别形成一组观察值，因此计算每个类的平均特征向量是有意义的，这给了我们类质心。
- en: But in regression, the target *y* is continuous. There are no discrete groups,
    no class boundaries, and therefore no meaningful way to compute “the centroid
    of a class”.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 但是在回归中，目标*y*是连续的。没有离散的组，没有类别边界，因此没有计算“类别质心”的有意义的方法。
- en: A continuous target has infinitely many possible values, so we cannot group
    observations by their *y* value to form centroids.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 连续目标有无限多个可能的值，所以我们不能通过它们的*y*值来分组观察值以形成质心。
- en: The only possible “centroid” in regression would be the **global mean**, which
    corresponds to the case k = N in k-NN regressor.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在回归中，唯一可能的“质心”是**全局均值**，这对应于k-NN回归器中的k = N的情况。
- en: And this estimator is far too simple to be useful.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 而这个估计量过于简单，以至于没有用处。
- en: In short, Nearest Centroids Classifier is a natural improvement for classification,
    but it has no direct equivalent in regression.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，最近邻质心分类器是分类的自然改进，但在回归中并没有直接的等效方法。
- en: Further statistical improvements
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进一步的统计改进
- en: What else can we do with the basic k-NN classifier?
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还能用基本的k-NN分类器做些什么？
- en: Average and variance
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 平均值和方差
- en: With Nearest Centroids Classifier, we used the simplest statistic that is the
    **average**. A natural reflex in statistics is to add the **variance** as well.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 使用最近邻质心分类器，我们使用了最简单的统计量，即**平均**。在统计学中，一个自然的反应是添加**方差**。
- en: So, now, distance is no longer Euclidean, but **Mahalanobis** distance. Using
    this distance, we get the probability based on the distribution characterized
    by the mean and variance of each class.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，距离不再是欧几里得距离，而是**马氏**距离。使用这种距离，我们根据每个类别的均值和方差特征来获取概率。
- en: Categorical Features handling
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 类别特征处理
- en: For categorical features, we cannot compute averages or variances. And for k-NN
    regressor, we saw that it was possible to do one-hot encoding or ordinal/label
    encoding. But the scale is important and not easy to determine.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 对于类别特征，我们无法计算平均值或方差。而对于k-NN回归器，我们看到了进行独热编码或顺序/标签编码是可能的。但尺度很重要，并且不容易确定。
- en: 'Here, we can do something equally meaningful, in terms of probabilities: we
    can **count the proportions of each category inside a class**.'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，我们可以做一些同样有意义的概率相关的事情：我们可以**计算每个类别内部的每个类别的比例**。
- en: These proportions act exactly like probabilities, describing how likely each
    category is within each class.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这些比例完全像概率一样，描述了每个类别在每个类别中出现的可能性。
- en: This idea is directly linked to models such as **Categorical Naive Bayes**,
    where classes are characterized by **frequency distributions** over the categories.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这个想法直接关联到如**分类朴素贝叶斯**等模型，其中类别由**频率分布**在类别上定义。
- en: Weighted Distance
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加权距离
- en: Another direction is to introduce weights, so that closer neighbors count more
    than distant ones. In scikit-learn, there is the “weights” argument that allows
    us to do so.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个方向是引入权重，使得邻近的邻居比远处的邻居更重要。在scikit-learn中，有一个“权重”参数允许我们这样做。
- en: We can also switch from “k neighbors” to a fixed radius around the new observation,
    which leads to radius-based classifiers.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以从“k个邻居”切换到新观察点周围的固定半径，这导致了基于半径的分类器。
- en: Radius Nearest Neighbors
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 半径最近邻
- en: Sometimes, we can find this following graphic to explain k-NN classifier. But
    actually, with a radius like this, it reflects more the idea of Radius Nearest
    Neighbors.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，我们可以找到以下图形来解释k-NN分类器。但实际上，这样的半径反映了半径最近邻的概念。
- en: One advantage is the control of the neighborhood. It is especially interesting
    when we know the concrete meaning of the distance, such as the geographical distance.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 一个优点是控制邻域。当我们知道距离的具体含义时，例如地理距离，这尤其有趣。
- en: '![](../Images/0a811cb9f8ebb8b1fd81a5d2eb8b14e6.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0a811cb9f8ebb8b1fd81a5d2eb8b14e6.png)'
- en: Radius Nearest Neighbors classifier – image by author
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 半径最近邻分类器 – 作者图片
- en: But the drawback is that you have to know the radius in advance.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 但缺点是你必须事先知道半径。
- en: By the way, this notion of radius nearest neighbors is also suitable for regression.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一下，这个半径最近邻的概念也适用于回归。
- en: Recap of different variants
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不同变体的回顾
- en: All these small changes give different models, each one trying to improve the
    basic idea of comparing neighbors according to a more complex definition of distance,
    with a control parameter what allows us to get local neighbors, or more global
    characterization of neighborhood.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些小的变化都产生了不同的模型，每个模型都试图通过更复杂的距离定义来改进比较邻居的基本思想，并通过控制参数来获取局部邻居或更全局的邻域特征。
- en: We will not explore all these models here. I simply cannot help myself from
    going a bit too far when a small variation naturally leads to another idea.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不会在这里探索所有这些模型。当一个小小的变化自然地导致另一个想法时，我实在无法阻止自己走得有点太远。
- en: For now, consider this as an announcement of the models we will implement later
    this month.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，请把这视为我们将在本月底实施的模型的一个公告。
- en: '![](../Images/383d5dcc86d28ed4246e5a887ea94193.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/383d5dcc86d28ed4246e5a887ea94193.png)'
- en: Variants and improvements of k-NN classifier – image by author
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: k-NN分类器的变体和改进 – 作者图片
- en: Conclusion
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we explored the k-NN classifier from its most basic form to
    several extensions.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了从k-NN分类器的最基本形式到几个扩展。
- en: 'The central idea is not really changed: a new observation is classified by
    looking at how similar it is to the training data.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 核心思想并没有真正改变：一个新观察结果是通过查看它与训练数据的相似性来进行分类的。
- en: But this simple idea can take many different shapes.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 但这个简单的想法可以采取很多不同的形式。
- en: With continuous features, similarity is based on geometric distance.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 对于连续特征，相似性基于几何距离。
- en: With categorical features, we look instead at how often each category appears
    among the neighbors.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 对于分类特征，我们关注每个类别在邻居中出现的频率。
- en: When k becomes very large, the entire dataset collapses into just a few summary
    statistics, which leads naturally to the **Nearest Centroids Classifier**.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 当k变得非常大时，整个数据集会折叠成只有几个总结统计量，这自然地导致了**最近邻质心分类器**。
- en: 'Understanding this family of distance-based and probability-based ideas helps
    us see that many machine-learning models are simply different ways of answering
    the same question:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这一系列基于距离和基于概率的想法有助于我们认识到许多机器学习模型只是以不同的方式回答同一个问题：
- en: '**Which class does this new observation most resemble?**'
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**这个新观察结果最像哪个类别？**'
- en: In the next articles, we will continue exploring density-based models, which
    can be understood as global measures of similarity between observations and classes.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的文章中，我们将继续探索基于密度的模型，这些模型可以理解为观察和类别之间相似性的全局度量。
