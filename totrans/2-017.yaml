- en: 'Where Hurricanes Hit Hardest: A County-Level Analysis with Python'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/where-hurricanes-hit-hardest-a-county-level-analysis-with-python/](https://towardsdatascience.com/where-hurricanes-hit-hardest-a-county-level-analysis-with-python/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1755806169266" class="mdspan-comment">Picture this: you’ve</mdspan>
    been retained by an insurance company to help refine home insurance premiums across
    the southeastern United States. Their question is simple but high stakes: *which
    counties are hit most often by hurricanes*? And they don’t just mean *landfall*,
    they want to account for storms that keep driving *inland*, delivering damaging
    rain and spawning tornadoes.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To tackle this, you’ll need two key ingredients:'
  prefs: []
  type: TYPE_NORMAL
- en: '**A reliable storm track database**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**A county boundary shapefile**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'With these, the workflow becomes clear: identify and count every hurricane
    track that intersects a county boundary, then visualize the results in both map
    and list form for maximum insight.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Python** is an ideal fit for this job, thanks to its rich ecosystem of geospatial
    and scientific libraries:'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Tropycal](https://tropycal.github.io/tropycal/)** for pulling open-source
    government hurricane data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[GeoPandas](https://geopandas.org/en/stable/docs.html)** for loading and
    manipulating geospatial files'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Plotly Express](https://plotly.com/python/plotly-express/)** for building
    interactive, explorable maps'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Before diving into the code, let’s examine the results. We’ll focus on the period
    1975 to 2024, when global warming, *believed* to influence Atlantic hurricanes,
    became firmly established.
  prefs: []
  type: TYPE_NORMAL
- en: '![Graph of global average temperature vs. baseline from 1880 to 2023\. The
    curve begins rising continuously around 1975.](../Images/54d89bfcbea831b368bc6665d86a12ab.png)'
  prefs: []
  type: TYPE_IMG
- en: Global average temperature change (NASA via [Wikimedia Commons](https://commons.wikimedia.org/wiki/File:Global_Temperature_Anomaly.svg))
  prefs: []
  type: TYPE_NORMAL
- en: Over the last 49 years, hurricanes have struck 640 counties in the southeastern
    US. Coastal counties bear the brunt of wind and storm surge, while inland regions
    suffer from torrential rain and the occasional hurricane-spawned tornado. It’s
    a complex, far-reaching hazard, and with the right tools, you can map it county
    by county.
  prefs: []
  type: TYPE_NORMAL
- en: The following map, built using the **Tropycal** library, records the tracks
    of all the hurricanes that made landfall in the US from 1975 through 2024.
  prefs: []
  type: TYPE_NORMAL
- en: '![Map of hurricane tracks, color-coded by category, overlain on the southeastern
    USA. The date range is 1975-2024.](../Images/b4d7245249c7d84fea7ff1281f2eba41.png)'
  prefs: []
  type: TYPE_IMG
- en: Hurricane tracks impacting the southeastern USA from 1975-2024 (by author)
  prefs: []
  type: TYPE_NORMAL
- en: 'While interesting, this map isn’t much use to an insurance adjuster. We need
    to quantify it by adding county-level resolution and counting the number of *unique*
    tracks that cross into each county. Here’s how that looks:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A choropleth map, in shades of red, of hurricane counts per county for the
    period 1975-2024.](../Images/bfddae30d2a667c5de04cde60a709de0.png)'
  prefs: []
  type: TYPE_IMG
- en: County-level hurricane track counts for the southeastern US (1975-2024) (by
    author)
  prefs: []
  type: TYPE_NORMAL
- en: Now we have a better idea of which counties act as “hurricane magnets.” Across
    the Southeast, hurricane “hit” counts range from zero to twelve per county — but
    the storms are far from evenly distributed. Hotspots cluster along the Louisiana
    coast, in central Florida, and along the shorelines of the Carolinas. The East
    Coast really takes it on the chin, with Brunswick County, North Carolina, holding
    the unwelcome record for the most hurricane strikes.
  prefs: []
  type: TYPE_NORMAL
- en: A glance at the track map makes the pattern clear. Florida, Georgia, South Carolina,
    and North Carolina sit in the crosshairs of two storm highways — one from the
    Atlantic and another from the Gulf of Mexico. The prevailing westerlies, which
    begin just north of the Gulf Coast, often bend northward-tracking storms toward
    the Atlantic seaboard. Fortunately for Georgia and the Carolinas, many of these
    systems lose strength over land, slipping below hurricane force before sweeping
    through.
  prefs: []
  type: TYPE_NORMAL
- en: For insurers, these visualizations aren’t just weather curiosities; they’re
    decision-making tools. And layering in historical loss data can provide a more
    complete picture of the true financial cost of living by the water’s edge.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Choropleth Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The following code, written in JupyterLab, creates a choropleth map of hurricane
    track counts per county. It uses geospatial data from the **Plotly** graphing
    library and pulls open-source weather data from the National Oceanic and Atmospheric
    Administration ([NOAA](https://www.noaa.gov/)) using the **Tropycal** library.
  prefs: []
  type: TYPE_NORMAL
- en: 'The code uses the following packages:'
  prefs: []
  type: TYPE_NORMAL
- en: python 3.10.18
  prefs: []
  type: TYPE_NORMAL
- en: numpy 2.2.5
  prefs: []
  type: TYPE_NORMAL
- en: geopandas 1.0.1
  prefs: []
  type: TYPE_NORMAL
- en: plotly 6.0.1 (plotly_express 0.4.1)
  prefs: []
  type: TYPE_NORMAL
- en: tropical 1.4
  prefs: []
  type: TYPE_NORMAL
- en: shapely 2.0.6
  prefs: []
  type: TYPE_NORMAL
- en: Importing Libraries
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Start by importing the following libraries.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Configuring Constants
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, we set up several constants. The first is a set of the state “FIPS” codes.
    Short for *Federal Information Processing Series*, these “zip codes for states”
    are commonly used in geospatial files. In this case, they represent the southeastern
    states of Alabama, Florida, Georgia, Louisiana, Mississippi, North Carolina, South
    Carolina, and Texas. Later, we’ll use these codes to filter a single file of the
    entire USA.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Next, we define a year range (1975-2024) as a tuple. Then, we assign an intensity
    threshold constant for wind speed. **Tropycal** will filter storms based on wind
    speeds, and those with speeds of 64 knots or greater are classified as hurricanes.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we provide the URL address for the **Plotly** library’s counties geospatial
    shapefile. Later, we’ll use **GeoPandas** to load this as a GeoDataFrame, which
    is essentially a **pandas** DataFrame with a Geometry column for geospatial mapping
    information.
  prefs: []
  type: TYPE_NORMAL
- en: 'NOTE: Hurricanes quickly become tropical storms and depressions after making
    landfall. These are still destructive, however, so we’ll continue to track them.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Defining Helper Functions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To streamline the hurricane mapping workflow, we’ll define three lightweight
    helper functions. These will help keep the code modular, readable, and adaptable,
    especially when working with real-world geospatial data that may vary in structure
    or scale.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '**Plotly Express** creates *interactive* visuals. We’ll be able to hover the
    cursor over counties in the choropleth map and launch a pop-up window of the county
    name and the number of hurricanes that have passed through. The `get_hover_name_column(df)`
    function selects the most readable column name for map hover labels. It checks
    for `''NAME''` or `''name''` in the GeoDataFrame and defaults to `''id''` if neither
    is found. This ensures consistent labeling across datasets.'
  prefs: []
  type: TYPE_NORMAL
- en: The `storm_to_linestring(storm_obj)` function converts a storm’s track data
    into a `LineString` geometry by extracting valid longitude–latitude pairs. If
    the storm has fewer than two valid points, it returns ‘None’. This is essential
    for spatial joins and visualizing storm paths.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the `make_tickvals(vmax)` function generates a clean set of tick marks
    for the choropleth colorbar based on the maximum hurricane count. It dynamically
    adjusts the step size to keep the legend readable, whether the range is small
    or large.
  prefs: []
  type: TYPE_NORMAL
- en: Prepare the County Map
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next cell loads the geospatial data and filters out the southeastern states,
    using our prepared set of FIPS codes. In the process, it creates a GeoDataFrame
    and adds a column for the **Plotly Express** hover data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: To begin, we load the county-level GeoJSON file using **GeoPandas** and prepare
    it for analysis. Each county is identified by a FIPS code, which we format as
    a 5-digit string to ensure consistency (the first two digits represent the state
    code). We then extract the state portion of each FIPS code and filter the dataset
    to include only counties in our eight southeastern states. Finally, we select
    a column for labeling counties in the hover text and confirm the number of counties
    that have been loaded.
  prefs: []
  type: TYPE_NORMAL
- en: Fetching and Processing Hurricane Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now it’s time to use **Tropycal** to fetch and process the hurricane data from
    the *[National Hurricane Center](https://www.nhc.noaa.gov/)*. This is where we
    programmatically overlay the counties with the hurricane tracks and count the
    unique occurrences of tracks in each county.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s a breakdown of the major steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Load Dataset**: Initializes the `TrackDataset` using HURDAT data, including
    best track (`btk`) points.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Filter Storms**: Selects hurricanes that meet a specified intensity threshold
    and fall within a given year range.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Extract Tracks**: Iterates through each storm ID, converts its path to a
    `LineString` geometry, and stores both the track and storm name. Progress is printed
    every 50 storms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Create GeoDataFrame**: Combines storm names and geometries into a GeoDataFrame
    with WGS84 coordinates.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Spatial Filtering**: Clips hurricane tracks to the bounding box of southeastern
    counties to improve performance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Assert CRS**: Checks that the county and hurricane data use the same coordinate
    reference system (in case you want to use different geospatial and/or hurricane
    track files).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Spatial Join**: Identifies which counties intersect with hurricane tracks
    using a spatial join.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Performing the spatial join can be tricky. For example, if a track doubles back
    and re-enters a county, you don’t want to count it twice.
  prefs: []
  type: TYPE_NORMAL
- en: '![Schematic map of US counties overlain with a hurricane track. The points
    where the track intersects the same county boundary are circled in red.](../Images/7bcb9e89f8188097c9d3fcb74b219371.png)'
  prefs: []
  type: TYPE_IMG
- en: Schematic of a hurricane track intersecting a county boundary multiple times
    (by author)
  prefs: []
  type: TYPE_NORMAL
- en: To handle this, the code first identifies unique name pairs and then drops duplicate
    rows from the GeoDataFrame before performing the count.
  prefs: []
  type: TYPE_NORMAL
- en: '**Count Hurricanes per County**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Drops duplicate storm–county pairs.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Groups by county ID to count unique hurricanes.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Merges results back into the county GeoDataFrame.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Fills missing values with zero and converts to integer.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fallback Handling**: If hurricane data fails to load, synthetic hurricane
    counts are generated using a Poisson distribution for demonstration purposes.
    This is for learning the process, only!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Errors loading the hurricane data are common, so keep an eye on the printout.
    If the data fails to load, keep rerunning the cell until it does.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'A successful run will yield the following confirmation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5fcec6f450cb5be310de187717466850.png)'
  prefs: []
  type: TYPE_IMG
- en: Building the Choropleth Map
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next cell generates a customized choropleth map of hurricane counts per
    county in the Southeastern US using Plotly Express.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'The key steps here include:'
  prefs: []
  type: TYPE_NORMAL
- en: '**GeoJSON Conversion**: Converts the GeoDataFrame of counties to GeoJSON format
    for easy mapping with Plotly Express.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Color Scaling**: Determines the maximum hurricane count and calls the helper
    function to create tick values for the colorbar.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Map Rendering**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Uses `px.choropleth` to visualize `hurricane_count` per county.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The `locations='id'` argument tells Plotly which column in the GeoDataFrame
    contains the unique identifiers for each county (county-level FIPS codes). These
    values match each row of data to the corresponding shape in the GeoJSON file.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The `featureidkey='properties.id'` argument specifies where to find the matching
    identifier inside the GeoJSON structure. GeoJSON features have a `properties`
    dictionary containing an `'id'` field. This ensures that each county’s geometry
    is correctly paired with its hurricane count.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Applies a red color scale, sets the range, and defines hover behavior.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Layout & Styling**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Centers and styles the title.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Adjusts map bounds and hides geographic outlines.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The `fig.update_geos(fitbounds="locations", visible=False)` line turns off the
    base map for a cleaner plot.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Refines hover tooltips for clarity.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Customizes the colorbar with tick marks and labels.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Annotation**: Adds a data source note referencing HURDAT2 and the analysis
    metric.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Display**: Shows the final interactive map with `fig.show()`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The deciding factor in using Plotly Express over static tools like Matplotlib
    is the addition of the dynamic hover data. Since there’s no practical way to label
    hundreds of counties, the hover data lets you query the map while keeping all
    that extra information out of sight until needed.
  prefs: []
  type: TYPE_NORMAL
- en: '![A choropleth map of hurricane counts per county in the southeastern USA.
    A hover data window points to Brunswick, NC, and indicates 12 hurricanes have
    hit the county in the last 49 years.](../Images/a9c0e5a13dc3c754643a467cf7764445.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of a hover window in action over Brunswick County, NC (by author)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Track Map Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although unnecessary, viewing the actual hurricane tracks would be a nice touch,
    as well as a way to check the choropleth results. This map can be generated entirely
    with the **Tropycal** library, as shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Note that the `domain` parameter refers to the boundaries of the map. While
    you can use our previous `xmin`, `xmax`, `ymin`, and `ymax` variables, I’ve adjusted
    them slightly for a more visually appealing map. Here’s the result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A map of hurricane tracks, color-coded by category, for the southeastern
    USA over the period 1975-2024.](../Images/5b9d09f2bef81561e1d58637e2f1ac1e.png)'
  prefs: []
  type: TYPE_IMG
- en: Hurricane tracks impacting the southeastern USA from 1975-2024 (by author)
  prefs: []
  type: TYPE_NORMAL
- en: 'For more on using the **Tropycal** library, see my previous article: [Easy
    Hurricane Tracking with Tropycal | by Lee Vaughan | TDS Archive | Medium](https://medium.com/data-science/easy-hurricane-tracking-with-tropycal-4eaa9412382f).'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Hurricane List Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: No insurance adjuster will want to cursor through a map to extract data. Because
    GeoDataFrames are a form of **pandas** DataFrame, it’s easy to slice and dice
    the data and present it as tables. The following code sorts the counties by hurricane
    count and then, for brevity, displays the top 20 counties based on their count.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the quick and easy way to generate this table; I’ve added some extra
    code for the state abbreviations:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'And here’s the result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/010a760a55c9aeafcdefa90c9db1adbb.png)'
  prefs: []
  type: TYPE_IMG
- en: 'While this works, it’s not very professional-looking. We can improve it using
    an HTML approach:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'This cell transforms our raw geospatial data into a clean, publication-ready
    summary of hurricane exposure by county. It prepares and presents a ranked table
    of the 20 counties most affected by hurricanes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**State Abbreviation Mapping**: It starts by mapping each county’s FIPS state
    code to its two-letter abbreviation (e.g., `''48'' → ''TX''`) and adds this as
    a new column.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Column Renaming**: The county name (`''NAME''`) and hurricane count (`''hurricane_count''`)
    columns are renamed to `''County Name''` and `''Hurricane Count''` for clarity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sorting and Selection**: The GeoDataFrame is sorted in descending order by
    hurricane count, and the top 20 rows are selected.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Styled Table Creation**: Using pandas’ **Styler**, the code builds a visually
    formatted HTML table:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adds a centered caption
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Hides the index column
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Applies custom header and cell styling
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Adds zebra striping for readability
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Export to HTML**: The styled table is saved as `top20_hurricane_table.html`,
    making it easy to embed in reports or share externally.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here’s the result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A table of state names, county names, and hurricane counts within each county
    over the period 1975-2024.](../Images/ccde30daa981908149746f4f7ec6f139.png)'
  prefs: []
  type: TYPE_IMG
- en: Formatted listing of top 20 counties by hurricane count (by author)
  prefs: []
  type: TYPE_NORMAL
- en: This table can be further enhanced by including interactive sorting or by embedding
    it directly into a dashboard.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this project, we addressed a question on every actuary’s desk: *Which counties
    get hit the hardest by hurricanes, year after year?* Python’s rich ecosystem of
    third-party packages was key to making this easy and effective. **Tropycal** made
    accessing government hurricane data a breeze, **Plotly** provided the county boundaries,
    and **GeoPandas** merged the two datasets and counted the number of hurricanes
    per county. Finally, **Plotly Express** produced a dynamic, interactive map that
    made it easy to visualize and explore the county-level hurricane data.'
  prefs: []
  type: TYPE_NORMAL
