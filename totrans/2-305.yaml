- en: Detecting Malicious URLs Using LSTM and Google’s BERT Models
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 LSTM 和 Google 的 BERT 模型检测恶意 URL
- en: 原文：[https://towardsdatascience.com/detecting-malicious-urls-using-lstm-and-googles-bert-models/](https://towardsdatascience.com/detecting-malicious-urls-using-lstm-and-googles-bert-models/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/detecting-malicious-urls-using-lstm-and-googles-bert-models/](https://towardsdatascience.com/detecting-malicious-urls-using-lstm-and-googles-bert-models/)
- en: <mdspan datatext="el1743654994608" class="mdspan-comment">Overview</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1743654994608" class="mdspan-comment">概述</mdspan>
- en: The rise of cybercrime has made fraudulent webpage detection an essential task
    in ensuring that the internet is safe. It is evident that these risks, such as
    the theft of private information, malware, and viruses, are associated with online
    activities on emails, social media applications, and websites. These web threats,
    called malicious URLs, are used by cybercriminals to lure users to visit web pages
    that appear real or legitimate.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 网络犯罪的兴起使得欺诈网页检测成为确保互联网安全的重要任务。显然，这些风险，如私人信息的盗窃、恶意软件和病毒，与电子邮件、社交媒体应用程序和网站上的在线活动有关。这些被称为恶意
    URL 的网络威胁被网络犯罪分子用来诱使用户访问看似真实或合法的网页。
- en: 'This paper explores the development of a deep learning system involving a transformer
    algorithm to detect malicious URLs with the aim of improving an existing method
    such as Long Short-Term Memory (LSTM). (Devlin et al., 2019) introduced a Natural
    language modelling algorithm (BERT) developed by Google Brain in 2017\. This model
    is capable of making more accurate predictions to outperform the recurrent neural
    network systems such as Long Short Term Memory (LSTM) and Gated Recurrent Units
    (GRU). In this project, I compared the BERT’s performance with LSTM as a text
    classification technique. With the processed dataset containing over 600,000 URLs,
    a pre-trained model is developed, and results are compared using performance metrics
    such as r2 score, accuracy, recall, etc. (Y. E. Seyyar et al., 2022). This LSTM
    algorithm achieved an accuracy rate of 91.36% and an F1 score of 0.90 (higher
    than BERT’s) in the classification in terms of both unusual and common requests.
    Keywords: Malicious URLs, Long Short Term Memory, phishing, benign, Bidirectional
    Encoder Representations from Transformers (BERT).'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本文探讨了涉及转换器算法的深度学习系统的发展，旨在通过改进现有方法，如长短期记忆（LSTM）来检测恶意 URL。Devlin 等人（2019 年）介绍了由
    Google Brain 在 2017 年开发的自然语言建模算法（BERT）。该模型能够做出更准确的预测，从而超越长短期记忆（LSTM）和门控循环单元（GRU）等循环神经网络系统。在本项目中，我比较了
    BERT 的性能与 LSTM 作为文本分类技术。使用包含超过 600,000 个 URL 的处理数据集，开发了一个预训练模型，并使用性能指标如 r2 分数、准确率、召回率等进行了比较。（Y.
    E. Seyyar 等人，2022 年）。该 LSTM 算法在异常和常见请求的分类中实现了 91.36% 的准确率和 0.90 的 F1 分数（高于 BERT
    的）。关键词：恶意 URL、长短期记忆、钓鱼、良性、从转换器中提取的双向编码器表示（BERT）。
- en: 1.0 Introduction
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.0 引言
- en: With the usability of the Web through the Internet, there has been an increasing
    number of users over the years. As all digital devices are connected to the internet,
    this has also resulted in an increasing number of phishing threats through websites,
    social media, emails, applications, etc. (Morgan, S., 2024) reported that more
    than $9.5 trillion was lost globally due to leaks of private information.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 随着互联网的可用性，多年来用户数量不断增加。由于所有数字设备都连接到互联网，这也导致了通过网站、社交媒体、电子邮件、应用程序等途径的钓鱼威胁不断增加。（Morgan,
    S., 2024 年）报告称，由于私人信息泄露，全球损失超过 9.5 万亿美元。
- en: Therefore, innovative approaches have been introduced over the years to automate
    the task of ensuring safer internet usage and data protection. The Symantec 2016
    Internet Security Report (Vanhoenshoven et al., 2016) shows scammers have caused
    most cyber-attacks involving corporate data breaches on browsers and websites,
    as well as other sheer malware attempts using the Uniform Resource Locator by
    baiting users.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，多年来已经引入了创新方法来自动化确保更安全的互联网使用和数据保护的任务。Symantec 2016 年互联网安全报告（Vanhoenshoven
    等人，2016 年）显示，诈骗者造成了大多数涉及企业数据泄露的浏览器和网站上的网络攻击，以及通过诱饵用户使用统一资源定位符进行的其他纯粹恶意软件尝试。
- en: '![](../Images/e5afa6de790e3c86686a0e066ded8fab.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e5afa6de790e3c86686a0e066ded8fab.png)'
- en: Structure of a URL (Image by author)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: URL 结构（作者图片）
- en: In recent years, blacklisting, reputation-based systems, and machine learning
    algorithms have been used by cybersecurity professionals to improve malware detection
    and make the web safer. Google’s statistics reported that over 9,500 suspicious
    web pages are blacklisted and blocked per day. The existence of these malicious
    web pages represents a significant risk to the information security of web applications,
    particularly those that deal with sensitive data (Sankaran et al., 2021). Because
    it’s so easy to implement, blacklisting has become the standard way. The false-positive
    rate is also significantly lowered with this strategy. The problem, however, is
    that it’s extremely difficult to keep an extensive list of malicious URLs up to
    date, especially considering that new URLs are typically created every day. In
    order to circumvent filters and trick users, cybercriminals have come up with
    ingenious methods, such as obfuscating the URL so it appears to be real. This
    field of artificial intelligence (AI) has seen significant advancements and applications
    in a variety of domains, including cybersecurity. One critical aspect of cybersecurity
    is detecting and preventing malicious URLs, which can result in serious consequences
    such as data breaches, identity theft, and financial losses. Given the dynamic
    and ever-changing nature of cyber threats, detecting malicious URLs is a difficult
    task.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，网络安全专业人士已经使用黑名单、基于声誉的系统以及机器学习算法来提高恶意软件检测并使网络更安全。谷歌的统计数据显示，每天有超过9,500个可疑网页被列入黑名单并阻止。这些恶意网页的存在对网络应用程序的信息安全构成了重大风险，尤其是那些处理敏感数据的应用程序（Sankaran等人，2021年）。由于实施起来非常简单，黑名单已经成为标准方式。此外，使用这种策略，误报率也显著降低。然而，问题在于，保持一个广泛的恶意URL列表更新非常困难，尤其是考虑到新URL通常每天都会创建。为了绕过滤器和欺骗用户，网络犯罪分子想出了巧妙的方法，例如混淆URL，使其看起来像是真实的。人工智能（AI）领域在这一领域取得了显著进步和应用，包括网络安全。网络安全的一个关键方面是检测和防止恶意URL，这可能导致严重后果，如数据泄露、身份盗窃和财务损失。鉴于网络威胁的动态和不断变化的特点，检测恶意URL是一项艰巨的任务。
- en: This project aims to develop a deep learning system for text classification
    called Malicious URL Detection using pre-trained Bidirectional Encoder Representations
    from Transformers (BERT). Can the BERT model outperform existing techniques in
    malicious URL detection? The expected outcome of this study is to demonstrate
    the effectiveness of the BERT model in detecting malicious URLs and compare its
    performance with recurrent neural network techniques such as LSTM. I used evaluation
    metrics such as accuracy, precision, recall, and F1-score to compare the models’
    performance.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 本项目旨在开发一个名为“恶意URL检测”的文本分类深度学习系统，该系统使用预训练的Transformer双向编码器表示（BERT）。BERT模型能否在恶意URL检测中优于现有技术？本研究的预期成果是证明BERT模型在检测恶意URL方面的有效性，并将其性能与LSTM等循环神经网络技术进行比较。我使用了准确率、精确率、召回率和F1分数等评估指标来比较模型的性能。
- en: 2.0\. Background
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.0. 背景
- en: Machine learning methods like Random Forest and Multi-Layer Perception, Support
    Vector Machines, and deep learning methods like LSTM and other CNN are just a
    few of the methods proposed by the existing literature for detecting harmful URLs.
    However, there are drawbacks to these methods, such as the fact that they necessitate
    traditional features, as they are unable to deal with complex data, thereby resulting
    in overfitting.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习方法，如随机森林和多层感知器、支持向量机，以及深度学习方法如LSTM和其他CNN，只是现有文献中提出用于检测有害URL的少数方法之一。然而，这些方法存在一些缺点，例如它们需要传统特征，因为它们无法处理复杂数据，从而导致过度拟合。
- en: 2.1\. Related works
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1. 相关工作
- en: To improve the time for obtaining the page content or processing the text, (Kan
    and Thi, 2005) used a method of categorising websites based on their URLs. Classification
    features were collected from the URL after it was parsed into several tokens.
    Token dependencies in time order were modelled by the characteristics. They concluded
    that the classification rate increased when high-quality URL segmentation was
    combined with feature extraction. This approach paved the way for other research
    on developing complex deep learning models for text classification. As a binary
    text classification problem, (Vanhoenshoven et al., 2016) developed models for
    the detection of malicious URLs and evaluated the performance of classifiers,
    including Naive Bayes, Support Vector Machines, Multi-Layer Perceptron, etc. Subsequently,
    text embedding methods implementing transformers have produced state-of-the-art
    results in NLP tasks. A similar model was devised by (Maneriker et al., 2021),
    in which they pre-trained and refined an existing transformer architecture using
    only URL data. The URL dataset included 1.29 million entries for training and
    1.78 million entries for testing. Initially, the BERT architecture supported the
    masked language modelling framework, which would not be necessary in this report.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高获取页面内容或处理文本的时间，(Kan和Thi，2005)使用了一种基于URL对网站进行分类的方法。在将URL解析成几个标记后，收集了分类特征。通过特征对时间顺序中的标记依赖性进行了建模。他们得出结论，当将高质量的URL分割与特征提取相结合时，分类率会提高。这种方法为开发用于文本分类的复杂深度学习模型的研究开辟了道路。作为二元文本分类问题，(Vanhoenshoven等人，2016)开发了用于检测恶意URL的模型，并评估了包括朴素贝叶斯、支持向量机、多层感知器等分类器的性能。随后，实现transformers的文本嵌入方法在NLP任务中产生了最先进的结果。(Maneriker等人，2021)提出了一个类似的模型，其中他们仅使用URL数据预训练和微调了一个现有的transformer架构。URL数据集包括129万条训练条目和178万条测试条目。最初，BERT架构支持掩码语言建模框架，在本报告中将不再需要。
- en: For the classification process, the BERT and RoBERTa algorithms were fine-tuned,
    and results were evaluated and compared to propose a model called URLTran (URL
    Transformers) that uses transformers to significantly improve the performance
    of malicious URL detection with very low false positive rates in comparison to
    other deep learning networks. With this method, the URLTran model achieved an
    86.8% true positive rate (TPR) compared to the best baseline’s TPR of 71.20%,
    resulting in an improvement of 21.9%. This mentioned method was able to classify
    and predict whether a detected URL is benign or malicious.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在分类过程中，对BERT和RoBERTa算法进行了微调，并对结果进行了评估和比较，提出了一个名为URLTran（URL变压器）的模型，该模型使用变压器显著提高了恶意URL检测的性能，与其它深度学习网络相比，具有非常低的误报率。使用这种方法，URLTran模型实现了86.8%的真正阳性率（TPR），与最佳基线的71.20%的TPR相比，提高了21.9%。这种方法能够对检测到的URL进行分类和预测，判断其是良性还是恶意。
- en: Additionally, an RNN-based model was proposed by (Ren et al, 2019) where extracted
    URLs were converted into word vectors (characters) by using pre-trained Word2Vec,
    and Bi-LSTM (bi-directional long short-term memory) and classifying them. After
    validation and evaluation, the model achieved 98% accuracy and an F1 score of
    95.9%. This model outperformed almost all of the NLP techniques but only processed
    text characterization one at a time. However, there is a need to develop an improved
    model using BERT to process sequential input all at once. Although these models
    have demonstrated some improvement with big data, they are not without their limitations.
    The sequential nature of text data, for instance, may be difficult with RNNs,
    while CNNs most times do not capture long-term dependencies in the data (Alzubaidi
    et al., 2021). As the volume and complexity of textual data on the web continue
    to increase, it’s possible that current models will become inadequate.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，(Ren等人，2019)提出了一种基于RNN的模型，其中使用预训练的Word2Vec将提取的URL转换为词向量（字符），并通过Bi-LSTM（双向长短期记忆）进行分类。经过验证和评估后，该模型达到了98%的准确率和95.9%的F1分数。该模型几乎优于所有NLP技术，但只能一次处理一个文本特征。然而，需要开发一个改进的模型，使用BERT一次性处理序列输入。尽管这些模型在大数据方面已经显示出一些改进，但它们并非没有局限性。例如，文本数据的序列特性可能对RNN来说比较困难，而CNN大多数时候无法捕捉数据中的长期依赖性（Alzubaidi等人，2021）。随着网络中文本数据量和复杂性的持续增加，当前模型可能变得不适用。
- en: 3.0\. Objectives
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.0\. 目标
- en: This project presented the importance of a bidirectional pre-trained model for
    text classification. (Radford et al., 2018) implemented unidirectional language
    models to pre-train BERT. Compared to this, a shallow concatenation of independently
    trained left-to-right and right-to-left linear models was created (Devlin et al.,
    2019; Peters et al., 2018). Here, I used a pre-trained BERT model to achieve state-of-the-art
    performance on a large scale of sentence-level and token-level tasks (Han et al.,
    2021) with the aim to outperform many RNNs architectures, thereby reducing the
    need for these frameworks. In this case, the hyper-parameters of the LSTM algorithm
    will not be fine-tuned.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 本项目阐述了双向预训练模型在文本分类中的重要性。（Radford等人，2018）实现了单向语言模型来预训练BERT。与这一不同，创建了一个浅层连接的独立训练的从左到右和从右到左的线性模型（Devlin等人，2019；Peters等人，2018）。在这里，我使用预训练的BERT模型在大型句子级和标记级任务上实现最先进的性能（Han等人，2021），目的是超越许多RNN架构，从而减少对这些框架的需求。在这种情况下，LSTM算法的超参数将不会进行微调。
- en: 'Specifically, this research paper emphasises:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，这篇研究论文强调：
- en: Developing an LSTM and pre-trained BERT models to detect (classify) whether
    a URL is unsafe or not.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开发LSTM和预训练BERT模型来检测（分类）URL是否不安全。
- en: Comparing results of the base model (LSTM) and pre-trained BERT using evaluation
    metrics such as recall, accuracy, F1 score, precision. This would help to determine
    if the base model performance is better or not.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用诸如召回率、准确率、F1分数、精确度等评估指标来比较基础模型（LSTM）和预训练BERT的结果。这将有助于确定基础模型的表现是否更好。
- en: BERT automatically learns latent representation of words and characters in context.
    The only task is to fine-tune the BERT model to improve the baseline performance.
    This proposes a computationally simple approach to RNNs as an alternative to the
    more resource-intensive, and computationally expensive architectures.
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: BERT自动学习上下文中单词和字符的潜在表示。唯一任务是微调BERT模型以改进基线性能。这提出了一种计算上简单的方法来替代资源密集型和计算昂贵的RNN架构。
- en: Analysis and model development and evaluation took about 7 weeks and the aim
    was to achieve a significantly reduced training runtime with Google’s BERT model.
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分析和模型开发及评估大约花费了7周时间，目标是使用Google的BERT模型显著减少训练运行时间。
- en: 4.0\. Methodology
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.0. 方法论
- en: This section explains all the processes involved in implementing a deep learning
    system for detecting malicious URLs. Here, a transformer-based framework was developed
    from an NLP sequence perspective (Rahali and Akhloufi, 2021) and used to statistically
    analyse a public dataset.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 本节解释了实现用于检测恶意URL的深度学习系统所涉及的所有过程。在这里，从NLP序列角度开发了一个基于转换器的框架（Rahali和Akhloufi，2021），并用于对公共数据集进行统计分析。
- en: '![](../Images/7756e7734cb892b7786e055bd32c65b6.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7756e7734cb892b7786e055bd32c65b6.png)'
- en: Figure 4.0\. Methodology Process (Adapted from [Rahali and Akhloufi, 2021](https://arxiv.org/abs/2103.03806))
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.0. 方法论流程（改编自[Rahali和Akhloufi，2021](https://arxiv.org/abs/2103.03806))
- en: 4.1\. The dataset
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1. 数据集
- en: The [dataset](https://www.kaggle.com/datasets/sid321axn/malicious-urls-dataset)
    used for this report was compiled and extracted from Kaggle ([license info](https://creativecommons.org/publicdomain/zero/1.0/)).
    This dataset was prepared to carry out the classification of webpages (URLs) as
    malicious or benign. The datasets consisting of URL entries for training, validation
    and testing were collected.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 本报告使用的[数据集](https://www.kaggle.com/datasets/sid321axn/malicious-urls-dataset)是从Kaggle编译和提取的([许可信息](https://creativecommons.org/publicdomain/zero/1.0/))。该数据集是为了执行网页（URL）的恶意或良性分类而准备的。收集了用于训练、验证和测试的URL条目数据集。
- en: '![](../Images/7a6d41af1d2cd290f8b21f7b41220ac4.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7a6d41af1d2cd290f8b21f7b41220ac4.png)'
- en: Image by author ([code visualisation](https://github.com/xbabs/Detecting-Malicious-URLs-using-Google-s-BERT-and-LSTM-models/blob/main/detecting_malicious_urls_using%20BERT.ipynb))
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供([代码可视化](https://github.com/xbabs/Detecting-Malicious-URLs-using-Google-s-BERT-and-LSTM-models/blob/main/detecting_malicious_urls_using%20BERT.ipynb))
- en: 'To investigate the data using deep learning models, a huge dataset of 651,191
    URL entries were retrieved from Phishtank, PhishStorm, and malware domain blacklist.
    It contains:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用深度学习模型研究数据，从Phishtank、PhishStorm和恶意域名黑名单中检索了651,191个URL条目。它包含：
- en: 'Benign URLs: These are the safe web pages to browse. Exactly 428,103 entries
    were known to be secure.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无害URL：这些是安全的网页供浏览。已知有428,103个条目是安全的。
- en: 'Defacement URLs: These webpages are used by cybercriminals or hackers to clone
    real and secure websites. These contain 96,457 URLs.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 篡改URL：这些网页被网络犯罪分子或黑客用来克隆真实和安全的网站。这些包含96,457个URL。
- en: 'Phishing URLs: They are disguised as genuine links to trick users to provide
    personal and sensitive information which risks the loss of funds. 94,111 entries
    of the whole dataset were flagged as phishing URLs.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 钓鱼URL：它们伪装成真正的链接来欺骗用户提供个人信息和敏感信息，这可能导致资金损失。整个数据集中有94,111个条目被标记为钓鱼URL。
- en: 'Malware URLs: They are designed to manipulate users to download them as software
    and applications, thereby exploiting vulnerabilities. There are 32,520 malware
    webpage links in the dataset.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 恶意软件URL：它们被设计成诱导用户将其作为软件和应用程序下载，从而利用漏洞。数据集中有32,520个恶意网页链接。
- en: '![](../Images/6707a38942124d796c914e8c11e1f36f.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6707a38942124d796c914e8c11e1f36f.png)'
- en: Table 4.1\. The types of URLs and their fraction of the dataset (Image by author)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 表4.1. URL类型及其在数据集中的比例（图片由作者提供）
- en: 4.2\. Feature extraction
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2. 特征提取
- en: For the URL dataset, feature extraction was used to transform raw input data
    into a format supported by machine learning algorithms (Li et al., 2020). It converts
    categorical data into numerical features, while feature selection selects a subset
    of relevant features from the original dataset (Dash and Liu, 1997; Tang and Liu,
    2014).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 对于URL数据集，特征提取被用于将原始输入数据转换为机器学习算法支持的形式（Li等，2020年）。它将分类数据转换为数值特征，而特征选择则从原始数据集中选择相关特征的一个子集（Dash和Liu，1997年；Tang和Liu，2014年）。
- en: 'View data analysis and model development file [here](https://github.com/xbabs/Detecting-Malicious-URLs-using-Google-s-BERT-and-LSTM-models/blob/main/detecting_malicious_urls_using%20BERT.ipynb).
    The following steps were taken:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 查看数据分析和模型开发文件[此处](https://github.com/xbabs/Detecting-Malicious-URLs-using-Google-s-BERT-and-LSTM-models/blob/main/detecting_malicious_urls_using%20BERT.ipynb)。以下步骤被采取：
- en: 1\. Combining the phishing, malware and defacement URLs as Malicious URL types
    for better selection. The whole URLs are then labelled benign or malicious.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 将钓鱼、恶意软件和篡改URL合并为恶意URL类型，以进行更好的选择。然后，所有URL都被标记为良性或恶意。
- en: 2\. Converting the URL types from categorical variables into numerical values.
    This is a crucial process because the deep learning model training requires only
    numerical values. Benign and phishing URLs are classified as 0 and 1, respectively,
    and passed into a new column called “Category”.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 将URL类型从分类变量转换为数值。这是一个关键过程，因为深度学习模型训练只需要数值。良性URL和钓鱼URL分别被分类为0和1，并传递到一个名为“Category”的新列中。
- en: 3\. The ‘url_len’ feature was used to compute the URL length to extract features
    from the URLs in the dataset. Using the ‘process_tld’ function, the top-level
    domain (TLD) of each URL was extracted.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 使用‘url_len’特征来计算URL长度，从数据集中的URL中提取特征。使用‘process_tld’函数，提取每个URL的最高级域名（TLD）。
- en: 4\. Some potential features for URL classification include the presence of specific
    characters [‘@’, ‘?’, ‘-‘, ‘=’, ‘.’, ‘#’, ‘%’, ‘+’, ‘$’, ‘!’, ‘*’, ‘,’, ‘//’]
    were represented and added as columns to the dataset using the ‘abnormal_url’
    feature. This feature (function) uses binary classification to verify if there
    are abnormalities in every URL character. 5\. Another selection was done on the
    dataset such as the number of characters (letters and counts), https, shorting
    service and ip address of all entries. These provide more information for training
    the model.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 一些用于URL分类的潜在特征包括特定字符[‘@’，‘？’，‘-’，‘=’，‘.’，‘#’，‘%’，‘+’，‘$’，‘!’，‘*’，‘,’，‘//’]的存在，这些特征被表示并添加到数据集中作为列，使用的是‘abnormal_url’特征。此特征（函数）使用二进制分类来验证每个URL字符是否存在异常。5.
    对数据集进行了另一项选择，例如字符数（字母和数字）、https、短链接服务和所有条目的IP地址。这些提供了更多用于训练模型的信息。
- en: 4.3\. Classification – model development and training
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3. 分类 - 模型开发和训练
- en: Using pre-labelled features, the training data learns the association between
    labels and text. This stage involves identifying the URL types in the dataset.
    As an NLP technique, it is required to assign texts (words) into sentences and
    queries (Minaee et al, 2021). A recurrent neural network model architecture defines
    an optimised model. To ensure a balanced dataset, the data was split into 80%
    training set and a 20% testing set. The texts were labelled using word embeddings
    for both the LSTM and the pre-trained BERT models. The dependent variables include
    the encoded URL types (Categories) considering it is an automatic binary classification.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 使用预先标记的特征，训练数据学习标签和文本之间的关联。这一阶段涉及在数据集中识别URL类型。作为一种NLP技术，需要将文本（单词）分配到句子和查询中（Minaee等人，2021年）。循环神经网络模型架构定义了一个优化的模型。为了确保数据集平衡，数据被分为80%的训练集和20%的测试集。文本使用词嵌入对LSTM和预训练的BERT模型进行了标记。因考虑其为自动二元分类，所以依赖变量包括编码的URL类型（类别）。
- en: 4.3.1\. Long short-term memory model
  id: totrans-49
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.1. 长短期记忆模型
- en: LSTM was found to be the most popular architecture because of its ability to
    capture long-term dependencies using word2vec (Mikolov et al, 2013) to train on
    billions of words. After preprocessing and feature extraction, the data was set
    up for the LSTM model training, testing and validation. To determine the appropriate
    sequence length, the number and size of layers (input and output layers) were
    proposed before training the model. The hyperparameters such as epoch, learning
    rate, batch size, etc. were tuned to achieve optimal performance.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 由于其能够使用word2vec（Mikolov等人，2013年）捕获长期依赖性并在数十亿个单词上训练，LSTM被发现是最受欢迎的架构。在预处理和特征提取后，数据被设置为LSTM模型的训练、测试和验证。在训练模型之前，提出了序列长度、层数（输入层和输出层）的数量和大小。为了实现最佳性能，调整了超参数，如epoch、学习率、批量大小等。
- en: The memory cell of a typical LSTM unit has three gates (input gate, forget gate,
    and output gate) (Feng et al, 2020). Contrary to a “feedforward neural network,
    the output of a neuron” at any time can be the same neutron as the input (Do et
    al, 2021). To prevent overfitting, a dropout function is implemented on multiple
    layers one after the other. The first layer added is an embedding layer, which
    is used to create dense vector representations of words in the input text data.
    However, only one LSTM layer was used in this architecture due to the long training
    time.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 典型的LSTM单元的内存单元有三个门（输入门、遗忘门和输出门）（Feng等人，2020年）。与“前馈神经网络中任何时刻的神经元输出”不同，任何时刻的输出可以是与输入相同的神经元（Do等人，2021年）。为了防止过拟合，在多个层中依次实现了dropout函数。首先添加的是嵌入层，用于创建输入文本数据中单词的密集向量表示。然而，由于训练时间较长，这个架构中只使用了单个LSTM层。
- en: 4.3.2\. BERT model
  id: totrans-52
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.2. BERT模型
- en: Researchers proposed BERT architecture for NLP tasks because it has higher overall
    performance than RNNs and LSTM. A pre-trained BERT model was implemented in this
    project to process text sequences and capture the semantic information of the
    input, which can help improve and reduce training time and accuracy of malicious
    URL detection. After the URL data was pre-processed, they were converted into
    sequences of tokens and then feeding these sequences into the BERT model for processing
    (Chang et al., 2021). Due to large data entries in this project, the BERT model
    was fine-tuned to learn the relevant features of each type of URL. Once the model
    is trained, it was used to classify URLs as malicious (phishing) or benign with
    improved accuracy and performance.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员提出了BERT架构用于NLP任务，因为它在整体性能上优于RNN和LSTM。在这个项目中实现了预训练的BERT模型来处理文本序列并捕获输入的语义信息，这有助于提高恶意URL检测的训练时间和准确性。在预处理URL数据后，它们被转换为标记序列，然后输入BERT模型进行处理（Chang等人，2021年）。由于这个项目中的数据条目很大，BERT模型被微调以学习每种类型URL的相关特征。一旦模型训练完成，它被用来以改进的准确性和性能将URL分类为恶意（钓鱼）或良性。
- en: '![](../Images/6caa32c0603d2ddf8da9bb862202924c.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6caa32c0603d2ddf8da9bb862202924c.png)'
- en: '[Google’s BERT model architecture](https://arxiv.org/abs/2012.15524) (Song
    et al, 2021)'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '[谷歌的BERT模型架构](https://arxiv.org/abs/2012.15524)（Song等人，2021年）'
- en: (Figure 4.3.2) describes the processes involved in model training with the BERT
    algorithm. A tokenization phase is required for splitting text into characters.
    Initially, raw text is separated into words, which are then converted to unique
    integer IDs via a
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: （图4.3.2）描述了使用BERT算法进行模型训练所涉及的过程。需要一个分词阶段来将文本分割成字符。最初，原始文本被分割成单词，然后通过一个
- en: lookup table. WordPiece tokenization (Song et al, 2021) was implemented using
    the BertTokenizer class. The tokenizer includes the BERT token splitting algorithm
    and a WordPieceTokenizer (Rahali and Akhloufi, 2023). It accepts words (sentences)
    as input and outputs token IDs.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 查找表。使用BertTokenizer类实现了WordPiece分词（Song等人，2021年）。分词器包括BERT分词算法和WordPieceTokenizer（Rahali和Akhloufi，2023年）。它接受单词（句子）作为输入，并输出标记ID。
- en: 5.0\. Experiments
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.0\. 实验
- en: Specific hyper-parameters were used for BERT, while an LSTM model with a single
    hidden layer was tuned based on performance on the validation set. Due to an unbalanced
    dataset, only 522,214 entries were parsed consisting of 417,792 training data
    and 104,422 testing data with a train-test split of 70% to 30%.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 对于BERT，使用了特定的超参数，而基于验证集上的性能，对具有单个隐藏层的LSTM模型进行了调整。由于数据集不平衡，只解析了522,214条条目，包括417,792个训练数据和104,422个测试数据，训练-测试分割为70%至30%。
- en: 'The parameters used for training are described below:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 下面描述了用于训练的参数：
- en: '![](../Images/4f05e6e98d73dc1731cf7fcbcbe754f4.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4f05e6e98d73dc1731cf7fcbcbe754f4.png)'
- en: Table 5.0\. Hyperparameters used in the Keras library for the LSTM and BERT
    models (Image by author)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 表5.0\. Keras库中用于LSTM和BERT模型的超参数（图片由作者提供）
- en: 5.1\. LSTM (baseline)
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.1\. LSTM（基线）
- en: The results indicated a corresponding dropout rate of 0.2 and batch size 1024
    to achieve a training accuracy of 91.23% and validation accuracy of 91.36%. Only
    one LSTM layer was used in the architecture due to long training time (average
    of 25.8 minutes). However, adding more layers to the neural network results in
    a high
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，为了实现91.23%的训练准确率和91.36%的验证准确率，相应的dropout率为0.2，批大小为1024。然而，由于训练时间过长（平均25.8分钟），在架构中只使用了单个LSTM层。但是，向神经网络中添加更多层会导致性能显著下降。
- en: computation problem, thereby reducing the model’s overall performance.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 计算问题，从而降低了模型的总体性能。
- en: '![](../Images/a32e1774522a59986be318cb3022bae7.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a32e1774522a59986be318cb3022bae7.png）'
- en: '[LSTM algorithm experiment setup](https://www.mdpi.com/2076-3417/11/19/9210)
    (Do et al, 2021)'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '[LSTM算法实验设置](https://www.mdpi.com/2076-3417/11/19/9210)（Do等人，2021年）'
- en: 5.2\. Pre-trained BERT model
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.2\. 预训练BERT模型
- en: This model was tokenized but the drawback was the classifier could not initialize
    at checkpoint. Therefore, some layers were affected. This model requires further
    sequence classification before pre-training. The expectations were not met due
    to complex computation. However, it was proposed to have excellent performance.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 此模型进行了分词，但缺点是分类器无法在检查点初始化。因此，一些层受到了影响。该模型在预训练之前需要进一步进行序列分类。由于计算复杂，期望未能实现。然而，它被提出具有出色的性能。
- en: 6.0\. Results
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.0\. 结果
- en: An experimental outcome is evaluated for the two models developed using performance
    metrics. These metrics are to show how well the test data performed on the models.
    They are presented to evaluate the proposed approach’s effectiveness in detecting
    malicious web pages.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 使用性能指标对使用两种模型开发的实验结果进行了评估。这些指标旨在展示测试数据在模型上的表现。它们被用来评估所提出的方法在检测恶意网页方面的有效性。
- en: 6.1\. Performance Metrics
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.1\. 性能指标
- en: To evaluate the performance of the proposed metrics, a confusion matrix was
    used due to its evaluation measures.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估所提出指标的性能，使用了混淆矩阵，因为它具有评估措施。
- en: '![](../Images/6e1dd9e5592eb3c6d06d4feeeec8b19d.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6e1dd9e5592eb3c6d06d4feeeec8b19d.png)'
- en: Table 6.1 Binary classification of actual and predicted outcomes
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 表6.1 实际和预测结果的二元分类
- en: 'True Positive (TP): samples that are accurately predicted malicious (phishing)
    (Amanullah et al., 2020).'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 真阳性（TP）：被准确预测为恶意（钓鱼）的样本（Amanullah等人，2020年）。
- en: 'True Negative (TN): samples that are accurately predicted as benign URLs.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 真阴性（TN）：被准确预测为良性URL的样本。
- en: 'False Positive (FP): samples that are incorrectly predicted as phishing URLs.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 假阳性（FP）：被错误预测为钓鱼URL的样本。
- en: 'False Negative (FN): instances that are incorrectly predicted as benign URLs.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 假阴性（FN）：被错误预测为良性URL的实例。
- en: '**Accuracy** = (TP + TN) / (TP + TN + FP + FN)'
  id: totrans-80
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**准确率** = (TP + TN) / (TP + TN + FP + FN)'
- en: '**Precision** = TP / (TP + FP)'
  id: totrans-81
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**精确率** = TP / (TP + FP)'
- en: '**Recall** = TP / (TP + FN)'
  id: totrans-82
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**召回率** = TP / (TP + FN)'
- en: '**F1-score** = (2 × Precision × Recall) / (Precision + Recall)'
  id: totrans-83
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**F1分数** = (2 × 精确率 × 召回率) / (精确率 + 召回率)'
- en: '![](../Images/77506264cdbf0603b4132a0566367b30.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/77506264cdbf0603b4132a0566367b30.png）'
- en: Table 6.2\. Classification report for the developed models (Image by author)
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 表6.2\. 开发模型的分类报告（图片由作者提供）
- en: The LSTM model achieved an accuracy of 91.36% and a loss of 0.25, while the
    pre-trained BERT model achieved a lower accuracy (75.9%) than expected as a result
    of hardware malfunction.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM模型达到了91.36%的准确率和0.25的损失，而预训练的BERT模型由于硬件故障，其准确率（75.9%）低于预期。
- en: 6.2\. Validation
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.2. 验证
- en: The LSTM performed well because the validation data accuracy will detect malicious
    URLs 9 out of 10 times.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM表现良好，因为验证数据准确率可以检测到9/10的恶意URL。
- en: '![](../Images/d7c1811c1efb46e6635c15f947480476.png)![](../Images/4746777f4910e22e384b480e52bae08e.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d7c1811c1efb46e6635c15f947480476.png)![图片](../Images/4746777f4910e22e384b480e52bae08e.png)'
- en: '[Accuracy validation and loss validation (LSTM)](https://github.com/xbabs/Detecting-Malicious-URLs-using-Google-s-BERT-and-LSTM-models/blob/main/detecting_malicious_urls_using%20BERT.ipynb).
    Image by author'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '[LSTM的准确率验证和损失验证](https://github.com/xbabs/Detecting-Malicious-URLs-using-Google-s-BERT-and-LSTM-models/blob/main/detecting_malicious_urls_using%20BERT.ipynb)。图片由作者提供'
- en: However, the pre-trained BERT could not reach a higher expectation due to unbalance
    and large dataset.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于数据不平衡和数据集较大，预训练的BERT无法达到更高的期望。
- en: '![](../Images/29e3ff8621ad1ac38f6d3fb5fa18fa50.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/29e3ff8621ad1ac38f6d3fb5fa18fa50.png)'
- en: '[Confusion matrix for LSTM and BERT models](https://github.com/xbabs/Detecting-Malicious-URLs-using-Google-s-BERT-and-LSTM-models/blob/main/detecting_malicious_urls_using%20BERT.ipynb)
    (Image by author)'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '[LSTM和BERT模型的混淆矩阵](https://github.com/xbabs/Detecting-Malicious-URLs-using-Google-s-BERT-and-LSTM-models/blob/main/detecting_malicious_urls_using%20BERT.ipynb)（图片由作者提供）'
- en: 7.0\. Conclusion
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.0. 结论
- en: Overall, LSTM models can be a powerful tool for modelling sequential data and
    making predictions based on temporal dependencies. However, it is important to
    carefully consider the nature of the data and the problem at hand before deciding
    to use an LSTM model, as well as to properly set up and tune the model to achieve
    the best results. Due to large dataset, an increase batch size (1024) resulted
    in a shorter training time and improved the validation accuracy of the model.
    This could be as a result of not tokenizing the model during training and testing.
    BERT’s maximum sequence length is 512 tokens, which might be inconvenient for
    some applications. If a sequence is going to be shorter than the limit, tokens
    need to be added to it, otherwise, it should be to be truncated (Rahali and Akhloufi,
    2021). Also, to understand words and sentences better, BERT needs modified embeddings
    to represent context in character. Although these capabilities performed well
    with complex word embeddings, it might also result in longer training time when
    used with larger datasets. However, a need for further further research is required
    to detect patterns during malicious URL detection.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，LSTM模型可以成为建模时序数据和基于时间依赖性进行预测的有力工具。然而，在决定使用LSTM模型之前，仔细考虑数据的性质和问题的本质非常重要，同时还需要正确设置和调整模型以获得最佳结果。由于数据集较大，增加批大小（1024）缩短了训练时间并提高了模型的验证准确率。这可能是因为在训练和测试过程中没有对模型进行分词。BERT的最大序列长度为512个标记，这可能对某些应用来说不太方便。如果序列长度将短于限制，则需要向其中添加标记，否则应将其截断（Rahali和Akhloufi，2021）。此外，为了更好地理解单词和句子，BERT需要修改嵌入来表示字符中的上下文。尽管这些功能与复杂的单词嵌入一起表现良好，但使用更大的数据集时，这也可能导致更长的训练时间。然而，需要进一步的研究来检测恶意URL检测过程中的模式。
