  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，注意力分数在平坦部分（类似于时间偏移）局部化，这会接近峰值。尽管如此，这些仍然是**局部峰值**。
- en: Now let’s look at an anomalous time series.
  id: totrans-72
