- en: Hands-On Attention Mechanism for Time Series Classification, with Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Python进行时间序列分类的动手注意力机制
- en: 原文：[https://towardsdatascience.com/hands-on-attention-mechanism-for-time-series-classification-with-python/](https://towardsdatascience.com/hands-on-attention-mechanism-for-time-series-classification-with-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/hands-on-attention-mechanism-for-time-series-classification-with-python/](https://towardsdatascience.com/hands-on-attention-mechanism-for-time-series-classification-with-python/)
- en: <mdspan datatext="el1748636228402" class="mdspan-comment">The Attention Mechanism</mdspan>
    is a **game changer** in Machine Learning. In fact, in the recent history of Deep
    Learning, the idea of allowing models to **focus on the most relevant parts**
    of an input sequence when making a prediction completely revolutionized the way
    we look at Neural Networks.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748636228402" class="mdspan-comment">注意力机制</mdspan>是机器学习中的一个**颠覆性变革**。事实上，在深度学习的近期历史中，允许模型在预测时**专注于输入序列中最相关的部分**这一想法，彻底改变了我们看待神经网络的方式。
- en: 'That being said, there is one controversial take that I have about the attention
    mechanism:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，我对注意力机制有一个有争议的看法：
- en: The best way to **learn** the attention mechanism is **not** through Natural
    Language Processing (NLP)
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 学习注意力机制的最佳方式**不是**通过自然语言处理（NLP）。
- en: It is (technically) a controversial take for two reasons.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这（技术上）是一个有争议的观点，原因有两个。
- en: People naturally use NLP cases (e.g., translation or NSP) because NLP is the
    reason why the attention mechanism was developed in the first place. The original
    goal was to **overcome the limitations of RNNs and CNNs** in handling long-range
    dependencies in language (if you haven’t already, you should really read the paper
    [Attention is All You Need](https://arxiv.org/abs/1706.03762)).
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人们自然地使用自然语言处理案例（例如，翻译或NSP），因为自然语言处理（NLP）是注意力机制最初被开发的原因。最初的目标是**克服RNN和CNN在处理语言中长期依赖性的局限性**（如果你还没有，你真的应该阅读一下论文[Attention
    is All You Need](https://arxiv.org/abs/1706.03762)）。
- en: Second, I will also have to say that in order to understand the general idea
    of putting the “attention” on a specific word to do translation tasks is very
    intuitive.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 其次，我必须说，理解将“注意力”放在特定单词上以进行翻译任务的一般想法是非常直观的。
- en: That being said, if we want to understand how attention REALLY works in a hands-on
    example, I believe that **Time Series** is the best framework to use. There are
    many reasons why I say that.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，如果我们想通过实际操作了解注意力机制真正的工作原理，我相信**时间序列**是最佳框架。我之所以这么说，有很多原因。
- en: Computers are not really “made” to work with strings; they work with ones and
    zeros. All the embedding steps that are necessary to convert the text into vectors
    add an extra layer of complexity that is not strictly related to the attention
    idea.
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算机并不是真正“制作”来处理字符串的；它们处理的是一和零。将文本转换为向量所需的所有嵌入步骤都增加了一个额外的复杂性层，这与注意力理念本身并没有严格的关系。
- en: The attention mechanism, though it was first developed for text, has many other
    applications (for example, in computer vision), so I like the idea of exploring
    attention from another angle as well.
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尽管注意力机制最初是为文本开发的，但它有许多其他应用（例如，在计算机视觉中），因此我也喜欢从另一个角度探索注意力的想法。
- en: With **time series** specifically, we can create very small datasets and run
    our attention models in minutes (yes, including the training) without any fancy
    GPUs.
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于**时间序列**而言，我们可以创建非常小的数据集，并在几分钟内（是的，包括训练）运行我们的注意力模型，而不需要任何花哨的GPU。
- en: In this blog post, we will see how we can build an attention mechanism for time
    series, specifically in a **classification** setup. We will work with sine waves,
    and we will try to classify a normal sine wave with a “modified” sine wave. The
    “modified” sine wave is created by **flattening a portion** of the original signal.
    That is, at a certain location in the wave, we simply remove the oscillation and
    replace it with a flat line, as if the signal had temporarily stopped or become
    corrupted.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我们将看到如何构建时间序列的注意力机制，特别是在**分类**设置中。我们将使用正弦波，并尝试用“修改过的”正弦波来分类一个正常的正弦波。这个“修改过的”正弦波是通过**压平原始信号的一部分**来创建的。也就是说，在波的某个位置，我们简单地移除振荡，并用一条水平线替换它，就像信号暂时停止或损坏了一样。
- en: To make things more ***spicy***, we will assume that the sine can have whatever
    **frequency** or **amplitude,** and that the **location** and extension (we call
    it **length**) of the “rectified” part are also parameters. In other words, the
    sine can be whatever sine, and we can put our “straight line” wherever we like
    on the sine wave.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使事情更加***辣味十足***，我们将假设正弦波可以具有任何**频率**或**振幅**，以及“校正”部分的**位置**和扩展（我们称之为**长度**）也是参数。换句话说，正弦波可以是任何正弦波，我们可以在正弦波上任意位置放置我们的“直线”。
- en: Well, ok, but why should we even bother with the attention mechanism? Why are
    we not using something simpler, like Feed Forward Neural Networks (FFNs) or Convolutional
    Neural Networks (CNNs)?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，好的，但为什么我们甚至要费心去考虑注意力机制呢？为什么我们不使用更简单的东西，比如前馈神经网络（FFNs）或卷积神经网络（CNNs）？
- en: Well, because again we are assuming that the “modified” signal can be “flattened”
    everywhere (in whatever location of the timeseries), and it can be flattened for
    whatever length (the rectified part can have whatever length). This means that
    a standard Neural Network is not that efficient, because the anomalous “part”
    of the timeseries is not always in the same portion of the signal. In other words,
    if you are just trying to deal with this with a linear weight matrix + a non linear
    function, you will have suboptimal results, because index 300 of time series 1
    can be completely different from index 300 of time series 14\. What we need instead
    is a dynamic approach that puts the attention on the anomalous part of the series.
    This is why (and where) the attention method shines.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，因为再次，我们假设“修改后的”信号可以在时间序列的任何位置（在任何位置）“展平”，并且它可以展平任何长度（校正部分可以具有任何长度）。这意味着标准的神经网络并不那么高效，因为时间序列的异常“部分”并不总是在信号的同一部分。换句话说，如果你只是试图用线性权重矩阵和非线性函数来处理这个问题，你将得到次优的结果，因为时间序列1的第300个索引可能与时间序列14的第300个索引完全不同。我们需要的是一种动态的方法，将注意力放在序列的异常部分上。这就是为什么（以及在哪里）注意力方法发光。
- en: 'This blog post will be divided into these 4 steps:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇博客文章将分为以下4个步骤：
- en: '**Code Setup**. Before getting into the code, I will display the setup, with
    all the libraries we will need.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代码设置**。在进入代码之前，我将展示设置，包括我们需要的所有库。'
- en: '**Data Generation**. I will provide the code that we will need for the data
    generation part.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据生成**。我将提供数据生成部分所需的代码。'
- en: '**Model Implementation**. I will provide the implementation of the attention
    model'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模型实现**。我将提供注意力模型的实现'
- en: '**Exploration of the results**. The benefit of the attention model will be
    displayed through the attention scores and classification metrics to assess the
    performance of our approach.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**结果探索**。通过注意力分数和分类指标来展示注意力模型的好处，以评估我们方法的表现。'
- en: It seems like we have a lot of ground to cover. Let’s get started! 🚀
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来我们有很多东西要讲。让我们开始吧！ 🚀
