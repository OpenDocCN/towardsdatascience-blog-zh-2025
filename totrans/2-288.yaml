- en: 5\. Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Thank you very much for reading through this article ❤️. It means a lot. Let’s
    summarize what we found in this journey and why this was helpful. In this blog
    post, we applied the attention mechanism in a classification task for time series.
    The classification was between normal time series and “modified” ones. By “modified”
    we mean that a part (a random part, with random length) has been rectified (substituted
    with a straight line). We found that:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Attention mechanisms have been originally developed in NLP,** but they also
    excel at identifying anomalies in time series data, especially when the location
    of the anomaly varies across samples. This flexibility is difficult to achieve
    with traditional CNNs or FFNNs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'By using **a bidirectional LSTM combined with an attention layer**, our model
    learns what parts of the signal matter most. We saw that a posteriori through
    the attention scores (alpha), which reveal which time steps were most relevant
    for classification. This framework provides a transparent and interpretable approach:
    we can visualize the attention weights to understand why the model made a certain
    prediction.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: With minimal data and no GPU, we trained a highly accurate model (F1 score ≈
    0.98) in just a few minutes, proving that attention is accessible and powerful
    even for small projects.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
