- en: Now, let me take some time to explain why the attention mechanism is a game-changer
    here. Unlike FFNN or CNN, which would treat all time steps equally, attention
    dynamically highlights the parts of the sequence that matter most for classification.
    This allows the model to “zoom in” on the anomalous section (regardless of where
    it appears), making it especially powerful for irregular or unpredictable time
    series patterns.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我花点时间解释一下为什么注意力机制在这里是一个变革性的因素。与FFNN或CNN不同，它们会平等地对待所有时间步，注意力机制动态地突出序列中对于分类最重要的部分。这使得模型能够“聚焦”于异常部分（无论它出现在哪里），使其特别适用于不规则或不可预测的时间序列模式。
- en: Let me be more precise here and talk about the Neural Network.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 让我更精确地谈谈神经网络。
- en: In our model, we use a bidirectional LSTM to process the time series, capturing
    both past and future context at each time step. Then, instead of feeding the LSTM
    output directly into a classifier, we compute attention scores over the entire
    sequence. These scores determine how much weight each time step should have when
    forming the final context vector used for classification. This means the model
    learns to focus only on the meaningful parts of the signal (i.e., the flat anomaly),
    no matter where they occur.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的模型中，我们使用双向LSTM来处理时间序列，在每个时间步捕获过去和未来的上下文。然后，我们不是直接将LSTM的输出输入到分类器中，而是在整个序列上计算注意力分数。这些分数决定了每个时间步在形成用于分类的最终上下文向量时应该有多少权重。这意味着模型学会了只关注信号的有意义部分（即平坦的异常），无论它们出现在哪里。
- en: Now let’s connect the model and the data to see the performance of our approach.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将模型和数据连接起来，看看我们方法的表现。
