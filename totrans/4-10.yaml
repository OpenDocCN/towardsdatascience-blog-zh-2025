- en: Can Machines Dream? On the Creativity of Large Language Models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/can-machines-dream-on-the-creativity-of-large-language-models-d1d20cf51939/](https://towardsdatascience.com/can-machines-dream-on-the-creativity-of-large-language-models-d1d20cf51939/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '|LLM|CREATIVITY|AI|HALLUCINATION|'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Image generated by the author using DALL-E](../Images/9107206359099cc17acfa46ea2eb2577.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by the author using DALL-E
  prefs: []
  type: TYPE_NORMAL
- en: Creativity requires the courage to let go of certainties. – Erich Fromm
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Creativity involves breaking out of established patterns in order to look at
    things in a different way. – Edward de Bono
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Creativity](https://en.wikipedia.org/wiki/Creativity) is considered along
    with the ability to reason a uniquely human ability. The arrival of [Large Language
    Models ([LLMs](https://en.wikipedia.org/wiki/Large_language_model))](https://github.com/SalvatoreRa/tutorial/blob/main/artificial%20intelligence/FAQ.md#large-language-models:~:text=Large%20Language%20Models,-What%20is%20a)
    and their ability to mimic human skills has begun to undermine this view. There
    has been much discussion about whether LLMs are capable of [reasoning](https://arxiv.org/abs/2501.09686),
    but less about the creativity of these models.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Quantifying reasoning is easier (evaluation is conducted on problem-solving
    benchmark datasets), but quantifying creativity is more complex. Nevertheless,
    creativity is one of the activities that makes us human: writing books and screenplays,
    generating [poetry](https://web.stanford.edu/class/archive/cs/cs224n/cs224n.1234/final-reports/final-report-169444285.pdf)
    and works of art, making [groundbreaking discoveries](https://arxiv.org/abs/2406.10833),
    or devising theories all require creativity.'
  prefs: []
  type: TYPE_NORMAL
- en: '[**The Savant Syndrome: Is Pattern Recognition Equivalent to Intelligence?**](https://towardsdatascience.com/the-savant-syndrome-is-pattern-recognition-equivalent-to-intelligence-242aab928152)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**A Requiem for the Transformer?**](https://towardsdatascience.com/a-requiem-for-the-transformer-297e6f14e189)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Although model creativity is a less explored topic, it is no less important.
    Therefore, in this article, we will focus on three main questions:'
  prefs: []
  type: TYPE_NORMAL
- en: How creative are models?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: On what does model creativity depend?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can [hallucinations](https://github.com/SalvatoreRa/artificial-intelligence-articles/blob/main/articles/LLM_hallucinations.md)
    help increase model creativity?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '***Artificial intelligence is transforming our world, shaping how we live and
    work. Understanding how it works and its implications has never been more crucial.**
    If you’re looking for simple, clear explanations of complex AI topics, you’re
