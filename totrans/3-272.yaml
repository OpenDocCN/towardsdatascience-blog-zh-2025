- en: The Gamma Hurdle Distribution
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-gamma-hurdle-distribution/](https://towardsdatascience.com/the-gamma-hurdle-distribution/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Which Outcome Matters?**'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a common scenario : An A/B test was conducted, where a random sample
    of units (e.g. customers) were selected for a campaign and they received Treatment
    A. Another sample was selected to receive Treatment B. “A” could be a communication
    or offer and “B” could be no communication or no offer. “A” could be 10% off and
    “B” could be 20% off. Two groups, two different treatments, where A and B are
    two discrete treatments, but without loss of generality to greater than 2 treatments
    and continuous treatments.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: So, the campaign runs and results are made available. With our backend system,
    we can track which of these units took the action of interest (e.g. made a purchase)
    and which did not. Further, for those that did, we log the intensity of that action.
    A common scenario is that we can track purchase amounts for those that purchased.
    This is often called an average order amount or revenue per buyer metric. Or a
    hundred different names that all mean the same thing — for those that purchased,
    how much did they spend, on average?
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: For some use-cases, the marketer is interested in the former metric — the purchase
    rate. For example, did we drive more (potentially first time) buyers in our acquisition
    campaign with Treatment A or B? Sometimes, we are interested in driving the revenue
    per buyer higher so we put emphasis on the latter.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: 'More often though, we are interested in driving revenue in a cost effective
    manner and what we really care about is the revenue that the campaign produced *overall*.
    Did treatment A or B drive more revenue? We don’t always have balanced sample
    sizes (perhaps due to cost or risk avoidance) and so we divide the measured revenue
    by the number of candidates that were treated in each group (call these counts
    N_A and N_B). We want to compare this measure between the two groups, so the standard
    contrast is simply:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/76d4d8aca17d57d63583e57c4770a1a0.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
- en: This is just the mean revenue for Treatment A minus mean revenue for Treatment
    B, where that mean is taken over the entire set of targeted units, irrespective
    if they responded or not. Its interpretation is likewise straightforward — what
    is the average revenue per promoted unit increase going from Treatment A versus
    Treatment B?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: 'Of course, this last measure accounts for both of the prior: the response rate
    multiplied by the mean revenue per responder.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '**Uncertainty?**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: How much a buyer spends is highly variable and a couple large purchases in one
    treatment group or the other can skew the mean significantly. Likewise, sample
    variation can be significant. So, we want to understand how confident we are in
    this comparison of means and quantify the “significance” of the observed difference.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: So, you throw the data in a t-test and stare at the p-value. But wait! Unfortunately
    for the marketer, the vast majority of the time, the purchase rate is relatively
    low (sometimes VERY low) and hence there are a lot of zero revenue values — often
    the vast majority. The t-test assumptions may be badly violated. Very large sample
    sizes may come to the rescue, but there is a more principled way to analyze this
    data that is useful in multiple ways, that will be explained.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '**Example Dataset**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Lets start with the sample dataset to makes things practical. One of my favorite
    direct marketing datasets is from the KDD Cup 98.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In the code snippet above we are downloading a zip file (the learning dataset
    specifically), extracting it and reading it into a Pandas data frame. The nature
    of this dataset is campaign history from a non-profit organization that was seeking
    donations through direct mailings. There is no treatment variants within this
    dataset, so we are pretending instead and segmenting the dataset based on the
    frequency of past donations. We call this indicator *TREATMENT* (as the categorical
    and create *TREATED* as the binary indicator for ‘A’ ). Consider this the results
    of a randomized control trial where a portion of the sample population was treated
    with an offer and the remainder were not. We track each individual and accumulate
    the amount of their donation.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: 'So, if we examine this dataset, we see that there are about 95,000 promoted
    individuals, generally distributed equally across the two treatments:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2c1c85f874c14ddaa721e2d61bcb4009.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
- en: Treatment A has a larger response rate but overall the response rate in the
    dataset is only around 5%. So, we have 95% zeros.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bf67efeaf835acc20dbcf413bb12e1b8.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
- en: For those that donated, Treatment A appears to be associated with a lower average
    donation amount.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c17dcefd98585c73234dfb180593ef12.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
- en: Combining together everyone that was targeted, Treatment A appears to be associated
    with a higher average donation amount — the higher response rate outweighs the
    lower donation amount for responders— but not by much.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/72bef31b1cb06762619eb2bfcd6c4d76.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
- en: Finally, the histogram of the donation amount is shown here, pooled over both
    treatments, which illustrates the mass at zero and a right skew.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4d78885c0c45c4a1083082365d52a10c.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: A numerical summary of the two treatment groups quantifies the phenomenon observed
    above — while Treatment A appears to have driven significantly higher response,
    those that were treated with A donated less on average when they responded. The
    net of these two measures, the one we are ultimately after — the overall mean
    donation per targeted unit – appears to still be higher for Treatment A. How confident
    we are in that finding is the subject of this analysis.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d7927601ac18b16042df6ca1f340d1a8.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
- en: '**Gamma Hurdle**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: One way to model this data and answer our research question in terms of the
    difference between the two treatments in generating the average donation per targeted
    unit is with the Gamma Hurdle distribution. Similar to the more well known Zero
    Inflated Poisson (ZIP) or NB (ZINB) distribution, this is a mixture distribution
    where one part pertains to the mass at zero and the other, in the cases where
    the random variable is positive, the gamma density function.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a15253d4bb7a7f0eee0c4f376909cca0.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
- en: Here π represents the probability that the random variable y is > 0\. In other
    words its the probability of the gamma process. Likewise, (1- π) is the probability
    that the random variable is zero. In terms of our problem, this pertains to the
    probability that a donation is made and if so, it’s value.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Lets start with the component parts of using this distribution in a regression
    – logistic and gamma regression.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '**Logistic Regression**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: 'The logit function is the link function here, relating the log odds to the
    linear combination of our predictor variables, which with a single variable such
    as our binary treatment indicator, looks like:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ea3cc820d66a4a3a7e735cb7330d5c81.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
- en: 'Where π represents the probability that the outcome is a “positive” (denoted
    as 1) event such as a purchase and (1-π) represents the probability that the outcome
    is a “negative” (denoted as 0) event. Further, π which is the qty of interest
    above, is defined by the inverse logit function:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/119b67c2c61aa383fb9c9105f81061ec.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
- en: 'Fitting this model is very simple, we need to find the values of the two betas
    that maximize the likelihood of the data (the outcome y)— which assuming N iid
    observations is:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/94ff90b3b9508f794909e015bd091e58.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: We could use any of multiple libraries to quickly fit this model but will demonstrate
    PYMC as the means to build a simple Bayesian logistic regression.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: Without any of the normal steps of the Bayesian workflow, we fit this simple
    model using MCMC.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '[PRE2]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/b209df63c46ddb4bbe5330d9a98f3378.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
- en: If we construct a contrast of the two treatment mean response rates, we find
    that as expected, the mean response rate lift for Treatment A is 0.026 larger
    than Treatment B with a 94% credible interval of (0.024 , 0.029).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/d30c087b45354389de634c4c366f46b8.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
- en: '**Gamma Regression**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 'The next component is the gamma distribution with one of it’s parametrizations
    of it’s probability density function, as shown above:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bb9702d015ce95537c836d405c39bfeb.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
- en: This distribution is defined for strictly positive random variables and if used
    in business for values such as costs, customer demand spending and insurance claim
    amounts.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: 'Since the mean and variance of gamma are defined in terms of α and β according
    to the formulas:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f46eac1de2f135fd2e9a5581b6656e99.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
- en: 'for gamma regression, we can parameterize by α and β or by μ and σ. If we make
    μ defined as a linear combination of predictor variables, then we can define gamma
    in terms of α and β using μ:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6813c906f02c54a4b70fbffb02b60be8.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
- en: 'The gamma regression model assumes (in this case, the inverse link is another
    common option) the log link which is intended to “linearize” the relationship
    between predictor and outcome:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b532a43ca9209935eda6252660c923f0.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
- en: Following almost exactly the same methodology as for the response rate, we limit
    the dataset to only responders and fit the gamma regression using PYMC.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '[PRE5]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/f86b65eec4e2ee2eff729e8306d93f0b.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
- en: '[PRE6]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/f7015a33559cd844106bd0c7516d9187.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
- en: Again, as expected, we see the mean lift for Treatment A to have an expected
    value equal to the sample value of -7.8\. The 94% credible interval is (-8.3,
    -7.3).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: The components, response rate and average amount per responder shown above are
    about as simple as we can get. But, its a straight forward extension to add additional
    predictors in order to 1) estimate the Conditional Average Treatment Effects (CATE)
    when we expect the treatment effect to differ by segment or 2) reduce the variance
    of the average treatment effect estimate by conditioning on pre-treatment variables.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '**Hurdle Model (Gamma) Regression**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: At this point, it should be pretty straightforward to see where we are progressing.
    For the hurdle model, we have a conditional likelihood, depending on if the specific
    observation is 0 or greater than zero, as shown above for the gamma hurdle distribution.
    We can fit the two component models (logistic and gamma regression) simultaneously.
    We get for free, their product, which in our example is an estimate of the donation
    amount per targeted unit.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: It would not be difficult to fit this model with using a likelihood function
    with a switch statement depending on the value of the outcome variable, but PYMC
    has this distribution already encoded for us.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: If we examine the trace summary, we see that the results are exactly the same
    for the two component models.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3be0a279d39f35096f919a3b9863edb4.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
- en: 'As noted, the mean of the gamma hurdle distribution is π * μ so we can create
    a contrast:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The mean expected value of this model is 0.043 with a 94% credible interval
    of (-0.0069, 0.092). We could interrogate the posterior to see what proportion
    of times the donation per buyer is predicted to be higher for Treatment A and
    any other decision functions that made sense for our case — including adding a
    fuller P&L to the estimate (i.e. including margins and cost).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/28bcd28a0a28738bcdc273ec8ea07a23.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
- en: 'Notes: Some implementations parameterize the gamma hurdle model differently
    where the probability of zero is π and hence the mean of the gamma hurdle involves
    (1-π) instead. Also note that at the time of this writing there appears to be
    an [issue](https://github.com/pymc-devs/nutpie/issues/163) with the nuts samplers
    in PYMC and we had to fall back on the default python implementation for running
    the above code.'
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 备注：一些实现方式对伽马障碍模型进行了不同的参数化，其中零的概率为π，因此伽马障碍的均值涉及(1-π)。另外，请注意，在撰写本文时，PYMC中的nuts采样器似乎存在一个[问题](https://github.com/pymc-devs/nutpie/issues/163)，我们不得不回退到默认的Python实现来运行上述代码。
- en: '**Summary**'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**摘要**'
- en: With this approach, we get the same inference for both models separately and
    the extra benefit of the third metric. Fitting these models with PYMC allows us
    all the benefits of Bayesian analysis — including injection of prior domain knowledge
    and a full posterior to answer questions and quantify uncertainty!
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 采用这种方法，我们对两个模型分别进行推断，并额外获得第三个指标的好处。使用PYMC拟合这些模型使我们能够获得贝叶斯分析的所有好处——包括注入先验领域知识以及完整的后验来回答问题和量化不确定性！
