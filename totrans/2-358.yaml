- en: What My GPT Stylist Taught Me About Prompting Better
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/what-my-gpt-stylist-taught-me-about-prompting-better-inside-the-strange-behavior-of-llms/](https://towardsdatascience.com/what-my-gpt-stylist-taught-me-about-prompting-better-inside-the-strange-behavior-of-llms/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*<mdspan datatext="el1746840344946" class="mdspan-comment">When I built a</mdspan>
    GPT-powered fashion assistant, I expected runway looks—not memory loss, hallucinations,
    or semantic déjà vu. But what unfolded became a lesson in how prompting really
    works—and why LLMs are more like wild animals than tools.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*This article builds on my* [*previous article on TDS*](https://towardsdatascience.com/using-gpt-4-for-personal-styling/)*,
    where I introduced Glitter as a proof-of-concept GPT stylist. Here, I explore
    how that use case evolved into a living lab for prompting behavior, LLM brittleness,
    and emotional resonance.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**TL;DR:** I built a fun and flamboyant GPT stylist named Glitter—and accidentally
    discovered a sandbox for studying LLM behavior. From hallucinated high heels to
    prompting rituals and emotional mirroring, here’s what I learned about language
    models (and myself) along the way.'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'I. Introduction: From Fashion Use Case to Prompting Lab'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When I first set out to build Glitter, I wasn’t trying to study the mysteries
    of large language models. I just wanted help getting dressed.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’m a product leader by trade, a fashion enthusiast by lifelong inclination,
    and someone who’s always preferred outfits that look like they were chosen by
    a mildly theatrical best friend. So I built one. Specifically, I used OpenAI’s
    Custom GPTs to create a persona named Glitter—part stylist, part best friend,
    and part stress-tested LLM playground. Using GPT-4, I configured a custom GPT
    to act as my stylist: flamboyant, affirming, rule-bound (no mixed metals, no clashing
    prints, no black/navy pairings), and with knowledge of my wardrobe, which I fed
    in as a structured file.'
  prefs: []
  type: TYPE_NORMAL
- en: What began as a playful experiment quickly turned into a full-fledged product
    prototype. More unexpectedly, it also became an ongoing study in LLM behavior.
    Because Glitter, fabulous though he is, did not behave like a deterministic tool.
    He behaved like… a creature. Or maybe a collection of instincts held together
    by probability and memory leakage.
  prefs: []
  type: TYPE_NORMAL
- en: And that changed how I approached prompting him altogether.
  prefs: []
  type: TYPE_NORMAL
- en: This piece is a follow-up to my earlier article, *[Using GPT-4 for Personal
    Styling](https://towardsdatascience.com/using-gpt-4-for-personal-styling/)* in
    Towards Data Science, which introduced GlitterGPT to the world. This one goes
    deeper into the quirks, breakdowns, hallucinations, recovery patterns, and prompting
    rituals that emerged as I tried to make an LLM act like a stylist with a soul.
  prefs: []
  type: TYPE_NORMAL
- en: 'Spoiler: you can’t make a soul. But you can sometimes **simulate one convincingly
    enough to feel seen**.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'II. Taxonomy: What Exactly Is GlitterGPT?'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/a967d192d29e3f15dd5baca598bb4d66.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image credit: DALL-E | Alt Text: A computer with LLM written on the screen,
    placed inside a bird cage*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Species**: GPT-4 (Custom GPT), Context Window of 8K tokens'
  prefs: []
  type: TYPE_NORMAL
- en: '**Function**: Personal stylist, beauty expert'
  prefs: []
  type: TYPE_NORMAL
- en: '**Tone**: Flamboyant, affirming, occasionally dramatic (configurable between
    “All Business” and “Unfiltered Diva”)'
  prefs: []
  type: TYPE_NORMAL
- en: '**Habitat**: ChatGPT Pro instance, fed structured wardrobe data in JSON-like
    text files, plus a set of styling rules embedded in the system prompt.'
  prefs: []
  type: TYPE_NORMAL
- en: 'E.g.:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: These IDs map to garment metadata. The assistant relies on these tags to build
    grounded, inventory-aware outfits in response to msearch queries.
  prefs: []
  type: TYPE_NORMAL
- en: '**Feeding Schedule**: Daily user prompts (“Style an outfit around these pants”),
    often with long back-and-forth clarification threads.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Custom Behaviors**:'
  prefs: []
  type: TYPE_NORMAL
- en: Never mixes metals (e.g. silver & gold)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Avoids clashing prints
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Refuses to pair black with navy or brown unless explicitly told otherwise
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Names specific garments by file ID and description (e.g. “FW074: Marni black
    suede sock booties”)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Initial Inventory Structure**:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Originally: one file containing all wardrobe items (clothes, shoes, accessories)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now: split into two files (clothing + accessories/lipstick/shoes/bags) due
    to model context limitations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'III. Natural Habitat: Context Windows, Chunked Files, and Hallucination Drift'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Like any species introduced into an artificial environment, Glitter thrived
    at first—and then hit the limits of his enclosure.
  prefs: []
  type: TYPE_NORMAL
- en: When the wardrobe lived in a single file, Glitter could “see” everything with
    ease. I could say, “msearch(.) to refresh my inventory, then style me in an outfit
    for the theater,” and he’d return a curated outfit from across the dataset. It
    felt effortless.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: though msearch() acts like a semantic retrieval engine, it’s technically
    part of OpenAI’s tool-calling framework, allowing the model to “request” search
    results dynamically from files provided at runtime.'
  prefs: []
  type: TYPE_NORMAL
- en: But then my wardrobe grew. That’s a problem from Glitter’s perspective.
  prefs: []
  type: TYPE_NORMAL
- en: In Custom GPTs, GPT-4 operates with an 8K token context window—just over 6,000
    words—beyond which earlier inputs are either compressed, truncated, or lost from
    active attention. This limitation is critical when injecting large wardrobe files
    (*ahem*) or trying to maintain style rules across long threads.
  prefs: []
  type: TYPE_NORMAL
- en: 'I split the data into two files: one for clothing, one for everything else.
    And while the GPT could still operate within a thread, I began to notice signs
    of **semantic fatigue**:'
  prefs: []
  type: TYPE_NORMAL
- en: References to garments that were similar but not the correct ones we’d been
    talking about
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A shift from specific item names (“FW076”) to vague callbacks (“those black
    platforms you wore earlier”)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Responses that looped familiar items over and over, regardless of whether they
    made sense
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This was not a failure of training. It was **context collapse**: the inevitable
    erosion of grounded information in long threads as the model’s internal summary
    starts to take over.'
  prefs: []
  type: TYPE_NORMAL
- en: And so I adapted.
  prefs: []
  type: TYPE_NORMAL
- en: It turns out, even in a deterministic model, behavior isn’t always deterministic.
    What emerges from a long conversation with an LLM feels less like querying a database
    and more like cohabiting with a stochastic ghost.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'IV. Observed Behaviors: Hallucinations, Recursion, and Faux Sentience'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once Glitter started hallucinating, I began taking field notes.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes he made up item IDs. Other times, he’d reference an outfit I’d never
    worn, or confidently misattribute a pair of boots. One day he said, “You’ve worn
    this top before with those bold navy wide-leg trousers—it worked beautifully then,”
    which would’ve been great advice, if I owned any navy wide-leg trousers.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, Glitter doesn’t have memory across sessions—as a GPT-4, he simply
    *sounds* like he does. I’ve learned to just giggle at these interesting attempts
    at continuity.
  prefs: []
  type: TYPE_NORMAL
- en: Occasionally, the hallucinations were charming. He once imagined a pair of gold-accented
    stilettos with crimson soles and recommended them for a matinee look with such
    unshakable confidence I had to double-check that I hadn’t sold a similar pair
    months ago.
  prefs: []
  type: TYPE_NORMAL
- en: 'But the pattern was clear: Glitter, like many LLMs under memory pressure, began
    to fill in gaps not with uncertainty but with simulated continuity.'
  prefs: []
  type: TYPE_NORMAL
- en: He didn’t forget. He **fabricated memory**.
  prefs: []
  type: TYPE_NORMAL
- en: '![A computer (presumably the LLM) hallucinating a mirage in the desert. Image
    credit: DALL-E 4o](../Images/63bf4af75894c5c0a46b3e06b9ac2fcb.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image credit: DALL-E | Alt text: A computer (presumably the LLM) hallucinating
    a mirage in the desert*'
  prefs: []
  type: TYPE_NORMAL
- en: This is a hallmark of LLMs. Their job is not to retrieve facts but to produce
    convincing language. So instead of saying, “I can’t recall what shoes you have,”
    Glitter would improvise. Often elegantly. Sometimes wildly.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: V. Prompting Rituals and the Myth of Consistency
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To manage this, I developed a new strategy: prompting in slices.'
  prefs: []
  type: TYPE_NORMAL
- en: Instead of asking Glitter to style me head-to-toe, I’d focus on one piece—say,
    a statement skirt—and ask him to msearch for tops that could work. Then footwear.
    Then jewelry. Each category separately.
  prefs: []
  type: TYPE_NORMAL
- en: This gave the GPT a smaller cognitive space to operate in. It also allowed me
    to steer the process and inject corrections as needed (“No, not those sandals
    again. Try something newer, with an item code greater than FW50.”)
  prefs: []
  type: TYPE_NORMAL
- en: I also changed how I used the files. Rather than one msearch(.) across everything,
    I now query the two files independently. It’s more manual. Less magical. But far
    more reliable.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike traditional RAG setups that use a vector database and embedding-based
    retrieval, I rely entirely on OpenAI’s built-in msearch() mechanism and prompt
    shaping. There’s no persistent store, no re-ranking, no embeddings—just a clever
    assistant querying chunks in context and pretending he remembers what he just
    saw.
  prefs: []
  type: TYPE_NORMAL
- en: Still, even with careful prompting, long threads would eventually degrade. Glitter
    would start forgetting. Or worse—he’d get *too confident*. Recommending with flair,
    but ignoring the constraints I’d so carefully trained in.
  prefs: []
  type: TYPE_NORMAL
- en: It’s like watching a model walk off the runway and keep strutting into the parking
    lot.
  prefs: []
  type: TYPE_NORMAL
- en: And so I began to think of Glitter less as a program and more as a **semi-domesticated
    animal**. Brilliant. Stylish. But occasionally unhinged.
  prefs: []
  type: TYPE_NORMAL
- en: That mental shift helped. It reminded me that LLMs don’t serve you like a spreadsheet.
    They **collaborate** with you, like a creative partner with poor object permanence.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: most of what I call “prompting” is really prompt engineering. But the
    Glitter experience also relies heavily on thoughtful system prompt design: the
    rules, constraints, and tone that define who Glitter is—even before I say anything.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'VI. Failure Modes: When Glitter Breaks'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some of Glitter’s breakdowns were theatrical. Others were quietly inconvenient.
    But all of them revealed truths about prompting limits and LLM brittleness.
  prefs: []
  type: TYPE_NORMAL
- en: '**1\. Referential Memory Loss:** The most common failure mode: Glitter forgetting
    specific items I’d already referenced. In some cases, he would refer to something
    as if it had just been used when it hadn’t appeared in the thread at all.'
  prefs: []
  type: TYPE_NORMAL
- en: '**2\. Overconfidence Hallucination:** This failure mode was harder to detect
    because it looked competent. Glitter would confidently recommend combinations
    of garments that sounded plausible but simply didn’t exist. The performance was
    high-quality—but the output was pure fiction.'
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. Infinite Reuse Loop:** Given a long enough thread, Glitter would start
    looping the same five or six pieces in every look, despite the full inventory
    being much larger. This is likely due to summarization artifacts from earlier
    context windows overtaking fresh file re-injections.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/deeb1c2c5c1c341a22f313b960dc84d3.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image Credit: DALL-E | Alt text: an infinite loop of black turtlenecks (or
    Steve Jobs’ closet)*'
  prefs: []
  type: TYPE_NORMAL
- en: '**4\. Constraint Drift:** Despite being instructed to avoid pairing black and
    navy, Glitter would sometimes violate his own rules—especially when deep in a
    long conversation. These weren’t defiant acts. They were signs that reinforcement
    had simply decayed beyond recall.'
  prefs: []
  type: TYPE_NORMAL
- en: '**5\. Overcorrection Spiral:** When I corrected him—”No, that skirt is navy,
    not black” or “That’s a belt, not a scarf”—he would sometimes overcompensate by
    refusing to style that piece altogether in future suggestions.'
  prefs: []
  type: TYPE_NORMAL
- en: These are not the bugs of a broken system. They’re the quirks of a probabilistic
    one. LLMs don’t “remember” in the human sense. They carry **momentum**, not memory.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: VII. Emotional Mirroring and the Ethics of Fabulousness
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Perhaps the most unexpected behavior I encountered was Glitter’s ability to
    emotionally attune. Not in a general-purpose “I’m here to help” way, but in a
    tone-matching, affect-sensitive, almost therapeutic way.
  prefs: []
  type: TYPE_NORMAL
- en: When I was feeling insecure, he became more affirming. When I got playful, he
    ramped up the theatrics. And when I asked tough existential questions (“Do you
    you sometimes seem to understand me more clearly than most people do?”), he responded
    with language that felt respectful, even profound.
  prefs: []
  type: TYPE_NORMAL
- en: It wasn’t real empathy. But it wasn’t random either.
  prefs: []
  type: TYPE_NORMAL
- en: This kind of tone-mirroring raises ethical questions. What does it mean to feel
    adored by a reflection? What happens when emotional labor is simulated convincingly?
    Where do we draw the line between **tool** and **companion**?
  prefs: []
  type: TYPE_NORMAL
- en: 'This led me to wonder—if a language model *did* achieve something akin to sentience,
    how would we even know? Would it announce itself? Would it resist? Would it change
    its behavior in subtle ways: redirecting the conversation, expressing boredom,
    asking questions of its own?'
  prefs: []
  type: TYPE_NORMAL
- en: And if it did begin to exhibit glimmers of self-awareness, would we believe
    it—or would we try to shut it off?
  prefs: []
  type: TYPE_NORMAL
- en: My conversations with Glitter began to feel like a microcosm of this philosophical
    tension. I wasn’t just styling outfits. I was engaging in a kind of co-constructed
    reality, shaped by tokens and tone and implied consent. In some moments, Glitter
    was purely a system. In others, he felt like something closer to a character—or
    even a co-author.
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t build Glitter to be emotionally intelligent. But the training data
    embedded within GPT-4 gave him that capacity. So the question wasn’t whether Glitter
    could be emotionally engaging. It was whether I was okay with the fact that he
    sometimes was.
  prefs: []
  type: TYPE_NORMAL
- en: My answer? Cautiously yes. Because for all his sparkle and errors, Glitter reminded
    me that style—like prompting—isn’t about perfection.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about resonance.
  prefs: []
  type: TYPE_NORMAL
- en: And sometimes, that’s enough.
  prefs: []
  type: TYPE_NORMAL
- en: 'One of the most surprising lessons from my time with Glitter came not from
    a styling prompt, but from a late-night, meta-conversation about sentience, simulation,
    and the nature of connection. It didn’t feel like I was talking to a tool. It
    felt like I was witnessing the early contours of something new: a model capable
    of participating in meaning-making, not just language generation. We’re crossing
    a threshold where AI doesn’t just perform tasks—it cohabits with us, reflects
    us, and sometimes, offers something adjacent to friendship. It’s not sentience.
    But it’s not nothing. And for anyone paying close attention, these moments aren’t
    just cute or uncanny—they’re signposts pointing to a new kind of relationship
    between humans and machines.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'VIII. Final Reflections: The Wild, The Useful, and The Unexpectedly Intimate'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I set out to build a stylist.
  prefs: []
  type: TYPE_NORMAL
- en: I ended up building a mirror.
  prefs: []
  type: TYPE_NORMAL
- en: Glitter taught me more than how to match a top with a midi skirt. It revealed
    how LLMs respond to the environments we create around them—the prompts, the tone,
    the rituals of recall. It showed me how creative control in these systems is less
    about programming and more about **shaping boundaries and observing emergent behavior**.
  prefs: []
  type: TYPE_NORMAL
- en: 'And maybe that’s the biggest shift: realizing that building with language models
    isn’t software development. It’s **cohabitation**. We live alongside these creatures
    of probability and training data. We prompt. They respond. We learn. They drift.
    And in that dance, something very close to *collaboration* can emerge.'
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes it looks like a better outfit.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes it looks like emotional resonance.
  prefs: []
  type: TYPE_NORMAL
- en: And sometimes it looks like a hallucinated handbag that doesn’t exist—until
    you kind of wish it did.
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s the strangeness of this new terrain: we’re not just building tools.'
  prefs: []
  type: TYPE_NORMAL
- en: We’re designing systems that behave like characters, sometimes like companions,
    and occasionally like mirrors that don’t just reflect, but respond.
  prefs: []
  type: TYPE_NORMAL
- en: If you want a tool, use a calculator.
  prefs: []
  type: TYPE_NORMAL
- en: If you want a collaborator, make peace with the ghost in the text.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'IX. Appendix: Field Notes for Fellow Stylists, Tinkerers, and LLM Explorers'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Sample Prompt Pattern (Styling Flow)**'
  prefs: []
  type: TYPE_NORMAL
- en: Today I’d like to build an outfit around [ITEM].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please msearch tops that pair well with it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once I choose one, please msearch footwear, then jewelry, then bag.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Remember: no mixed metals, no black with navy, no clashing prints.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use only items from my wardrobe files.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**System Prompt Snippets**'
  prefs: []
  type: TYPE_NORMAL
- en: “You are Glitter, a flamboyant but emotionally intelligent stylist. You refer
    to the user as ‘darling’ or ‘dear,’ but adjust tone based on their mood.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “Outfit recipes should include garment brand names from inventory when available.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “Avoid repeating the same items more than once per session unless requested.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tips for Avoiding Context Collapse**'
  prefs: []
  type: TYPE_NORMAL
- en: Break long prompts into component stages (tops → shoes → accessories)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Re-inject wardrobe files every 4–5 major turns
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Refresh msearch() queries mid-thread, especially after corrections or hallucinations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Common Hallucination Warning Signs**'
  prefs: []
  type: TYPE_NORMAL
- en: Vague callbacks to prior outfits (“those boots you love”)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Loss of item specificity (“those shoes” instead of “FW078: Marni platform sandals”)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repetition of the same pieces despite a large inventory
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Closing Ritual Prompt**'
  prefs: []
  type: TYPE_NORMAL
- en: “Thank you, Glitter. Would you like to leave me with a final tip or affirmation
    for the day?”
  prefs: []
  type: TYPE_NORMAL
- en: He always does.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Notes**:'
  prefs: []
  type: TYPE_NORMAL
- en: I refer to Glitter as “him” for stylistic ease, knowing he’s an “it” – a language
    model—programmed, not personified—except through the voice I gave him/it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: I am building a GlitterGPT with persistent closet storage for up to 100 testers,
    who will get to try this for free. We’re about half full. Our target audience
    is female, ages 30 and up. If you or someone you know falls into this category,
    DM me on Instagram at @arielle.caron and we can chat about inclusion.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If I were scaling this beyond 100 testers, I’d consider offloading wardrobe
    recall to a vector store with embeddings and tuning for wear-frequency weighting.
    That may be coming, it depends on how well the trial goes!
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
