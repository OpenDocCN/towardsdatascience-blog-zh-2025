- en: '[Salman Toor](https://towardsdatascience.com/author/salman-toor/) is an Associate
    Professor at Uppsala University as well as a CTO at an ML startup; he devotes
    his new article to the security risks inherent to federated learning.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Salman Toor](https://towardsdatascience.com/author/salman-toor/) 是乌普萨拉大学的副教授，同时也是一家机器学习初创公司的CTO；他在新文章中探讨了联邦学习固有的安全风险。'
- en: '[Fighting Back Against Attacks in Federated Learning ](https://towardsdatascience.com/fighting-back-against-attacks-in-federated-learning/)'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在联邦学习中反击攻击](https://towardsdatascience.com/fighting-back-against-attacks-in-federated-learning/)'
- en: '[Paul Fröhling](https://towardsdatascience.com/author/paul-frohling/) specializes
    in computer vision, but for his debut TDS article he turned to math and wrote
    a compelling deep dive on space-filling curves.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Paul Fröhling](https://towardsdatascience.com/author/paul-frohling/) 专注于计算机视觉，但他在TDS的首篇文章中转向数学，撰写了一篇关于空间填充曲线的引人入胜的深入分析。'
- en: '[The Beauty of Space-Filling Curves: Understanding the Hilbert Curve](https://towardsdatascience.com/the-beauty-of-space-filling-curves-understanding-the-hilbert-curve/)'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[空间填充曲线之美：理解希尔伯特曲线](https://towardsdatascience.com/the-beauty-of-space-filling-curves-understanding-the-hilbert-curve/)'
- en: '[Sudheer Singamsetty](https://towardsdatascience.com/author/sudheer-singamsetty/) is
    a seasoned data-management expert who recently published with us on the emerging
    field of context engineering.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Sudheer Singamsetty](https://towardsdatascience.com/author/sudheer-singamsetty/)
    是一位经验丰富的数据管理专家，他最近与我们合作，在上下文工程这一新兴领域发表了文章。'
- en: '[Why Context Is the New Currency in AI: From RAG to Context Engineering](https://towardsdatascience.com/why-context-is-the-new-currency-in-ai-from-rag-to-context-engineering/)'
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[为什么上下文是AI中的新货币：从RAG到上下文工程](https://towardsdatascience.com/why-context-is-the-new-currency-in-ai-from-rag-to-context-engineering/)'
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们热爱发布新作者的文章，所以如果你最近撰写了一篇关于我们核心主题的有趣项目教程、教程或理论反思，为什么不[与我们分享呢？](https://towardsdatascience.com/questions-96667b06af5/)
