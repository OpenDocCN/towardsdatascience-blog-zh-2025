- en: 'TDS Newsletter: How to Make Smarter Business Decisions with AI'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: TDS通讯：如何利用AI做出更明智的商业决策
- en: 原文：[https://towardsdatascience.com/tds-newsletter-how-to-make-smarter-business-decisions-with-ai/](https://towardsdatascience.com/tds-newsletter-how-to-make-smarter-business-decisions-with-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/tds-newsletter-how-to-make-smarter-business-decisions-with-ai/](https://towardsdatascience.com/tds-newsletter-how-to-make-smarter-business-decisions-with-ai/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《变量》的每一期新版本，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[今天订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: 'AI-related business decisions are common: whether or not to deploy a new model,
    adopt a new tool, or [launch a new LLM product](https://towardsdatascience.com/tag/ai-product-management/),
    to name a few. But what about AI-*powered* business decisions? This is where things
    get interesting!'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 与AI相关的商业决策很常见：是否部署新模型、采用新工具，或者[推出新的LLM产品](https://towardsdatascience.com/tag/ai-product-management/)，仅举几例。但AI-**驱动**的商业决策呢？这正是事情变得有趣的地方！
- en: This week, our highlights focus on the ever-expanding range of situations where
    AI can help data and business teams, as well as individual practitioners, make
    smarter, more informed, and better researched decisions. Let’s dive in.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本周，我们的亮点集中在AI可以帮助数据团队、商业团队以及个人从业者做出更明智、更信息丰富和更深入研究的决策的日益扩大的范围。让我们深入探讨。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Building Research Agents for Tech Insights
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建技术洞察力研究代理
- en: Using the example of tech news, [Ida Silfverskiöld](https://towardsdatascience.com/author/ilsilfverskiold/) demonstrates
    how you can harness the power of research agents to aggregate millions of texts,
    filter data based on a persona, and find patterns and themes you can act on —
    a promising workflow for which professionals in numerous fields can find use cases.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 以科技新闻为例，[Ida Silfverskiöld](https://towardsdatascience.com/author/ilsilfverskiold/)展示了如何利用研究代理的力量来聚合数百万文本，根据角色过滤数据，并找到可以采取行动的模式和主题——这是一个许多领域的专业人士都可以找到用例的有希望的流程工作流。
- en: '[Building Research Agents for Tech Insights](https://towardsdatascience.com/building-research-agents-for-tech-insights/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[构建技术洞察力研究代理](https://towardsdatascience.com/building-research-agents-for-tech-insights/)'
- en: 'How to Build an AI Budget-Planning Optimizer for Your 2026 CAPEX Review: LangGraph,
    FastAPI, and n8n'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何为您的2026年CAPEX审查构建AI预算规划优化器：LangGraph、FastAPI和n8n
- en: 'Learn how you can turn budget requests into optimized CAPEX (capital expenditure)
    portfolios: Samir Saci’s tutorial provides a detailed walkthrough that leverages
    LangGraph, FastAPI, and n8n.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 学习如何将预算请求转化为优化的资本支出（CAPEX）组合：Samir Saci的教程提供了一个详细的操作指南，该指南利用LangGraph、FastAPI和n8n。
- en: '[How to Build an AI Budget-Planning Optimizer for Your 2026 CAPEX Review: LangGraph,
    FastAPI, and n8n](https://towardsdatascience.com/how-to-build-an-ai-budget-planning-optimizer-for-your-2026-capex-review-langgraph-fastapi-and-n8n/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何为您的2026年CAPEX审查构建AI预算规划优化器：LangGraph、FastAPI和n8n](https://towardsdatascience.com/how-to-build-an-ai-budget-planning-optimizer-for-your-2026-capex-review-langgraph-fastapi-and-n8n/)'
- en: Building a Unified Intent Recognition Engine
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建统一的意图识别引擎
- en: Shruti Tiwari and Vadiraj Kulkarni, from Dell Technologies, present the Unified
    Intent Recognition Engine (UIRE) — a focused and actionable framework for enterprise
    AI systems that can simplify and scale customer-intent classification (and break
    down silos along the way).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 来自戴尔技术的Shruti Tiwari和Vadiraj Kulkarni介绍了统一的意图识别引擎（UIRE）——一个针对企业AI系统的专注且可操作的框架，它可以简化并扩展客户意图分类（并在过程中打破孤岛）。
- en: '[Building a Unified Intent Recognition Engine](https://towardsdatascience.com/building-a-unified-intent-recognition-engine/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[构建统一的意图识别引擎](https://towardsdatascience.com/building-a-unified-intent-recognition-engine/)'
