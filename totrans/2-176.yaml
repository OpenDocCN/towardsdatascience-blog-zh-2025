- en: POSET Representations in Python Can Have a Huge Impact on Business
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: POSET在Python中的表示对商业有巨大影响
- en: 原文：[https://towardsdatascience.com/poset-representations-in-python-have-huge-impact-on-business/](https://towardsdatascience.com/poset-representations-in-python-have-huge-impact-on-business/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/poset-representations-in-python-have-huge-impact-on-business/](https://towardsdatascience.com/poset-representations-in-python-have-huge-impact-on-business/)
- en: <mdspan datatext="el1751926615396" class="mdspan-comment">Aggregate synthetic
    indices</mdspan> are widely used tools to summarize multiple indicators in a single
    numerical value.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751926615396" class="mdspan-comment">综合合成指数</mdspan>是广泛使用的工具，用于将多个指标总结成一个单一数值。
- en: 'They are used in various fields: from the evaluation of corporate performance
    and the quality of life in cities, to the efficiency of health systems. **The
    goal is to provide a simple, interpretable and comparable measure**. However,
    the apparent simplicity of these indices often masks **arbitrary decisions, loss
    of information, and distortions in the resulting hierarchies.**'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 它被用于各种领域：从企业绩效评估和城市生活质量，到医疗系统的效率。**目标是提供一个简单、可解释且可比较的衡量标准**。然而，这些指数的表面简单性往往掩盖了**任意决策、信息丢失和结果层次结构的扭曲**。
- en: 'One of the main problems is related to weight attribution: **attributing a
    greater weight to one indicator than another implies a subjective preference**.
    Furthermore, the synthesis in a single number forces a total ordering, even among
    units that differ on multiple dimensions in a non-comparable way, forcing a linear
    ordering through a single score leads to excessive simplifications and potentially
    misleading conclusions.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 主要问题之一与权重分配有关：**对某个指标赋予比另一个指标更大的权重意味着主观偏好**。此外，将综合成一个单一数字迫使进行总排序，即使是在多个维度上以不可比方式不同的单元之间，通过单一分数强制线性排序会导致过度简化和可能误导的结论。
- en: In light of these limitations, alternative approaches exist. Among these, POSETs
    (Partially Ordered Sets) offer a more faithful way to represent the complexity
    of multidimensional data.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 鉴于这些局限性，存在替代方法。在这些方法中，POSETs（偏序集）提供了一种更忠实于表示多维数据复杂性的方法。
- en: 'Instead of synthesizing all the information in a number, POSETs are based on
    a **partial dominance relationship**: a unit dominates another if it is greater
    on all the dimensions considered. **When this does not happen, the two units remain
    incomparable**. The POSET approach allows us to represent the hierarchical structure
    implicit in the data without forcing comparisons where they are not logically
    justifiable. This makes it particularly useful in transparent decision-making
    contexts, where methodological coherence is preferable to forced simplification.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 与将所有信息综合成一个数字不同，POSETs基于**部分支配关系**：一个单元在所有考虑的维度上更大时，它支配另一个单元。**当这种情况不发生时，两个单元保持不可比**。POSET方法允许我们表示数据中隐含的层次结构，而不强制进行逻辑上不合理的比较。这使得它在需要方法一致性的透明决策环境中特别有用。这种方法比强制简化更受欢迎。
- en: Starting from the theoretical foundations, we will build a practical example
    with a real dataset (Wine Quality dataset) and discuss result interpretation.
    We will see that, in the presence of conflicting dimensions, POSETs represent
    a **robust and interpretable solution**, preserving the original information without
    imposing an arbitrary ordering.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 从理论基础出发，我们将使用一个真实的数据集（葡萄酒质量数据集）构建一个实际示例，并讨论结果解释。我们将看到，在存在冲突维度的情况下，POSETs代表一个**稳健且可解释的解决方案**，在保留原始信息的同时，不施加任意排序。
- en: Theoretical foundations
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理论基础
- en: To understand the POSET approach, it is necessary to start from some fundamental
    concepts of set theory and ordering. Unlike aggregative methods, which produce
    a total and forced ordering between units, **POSET is based on the partial dominance
    relation**, which allows us to recognize the *incomparability* among elements.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解POSET方法，必须从集合论和排序的一些基本概念开始。与产生单元之间总排序和强制排序的聚合方法不同，**POSET基于部分支配关系**，这使我们能够识别元素之间的**不可比性**。
- en: What is a partially ordered set?
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是偏序集？
- en: A partially ordered set (POSET) is a couple (P, ≤), where
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 一个偏序集（POSET）是一个二元组（P, ≤），其中
- en: P is a non-empty set (could be locations, companies, people, products, and so
    on)
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P是一个非空集合（可以是地点、公司、人、产品等）
- en: ≤ is a binary relationship on P that is characterized by **three properties**
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ≤是P上的二元关系，具有**三个特性**
- en: '***Reflexivity***, each element is in relationship with itself (expressed as
    ∀ *x* ∈ *P*, *x* ≤ *x*)'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***自反性***，每个元素都与自身相关（表示为 ∀ *x* ∈ *P*，*x* ≤ *x*)'
- en: '***Antisymmetry***, if two elements are related to each other in both directions,
    then they are the same (expressed as ∀ *x*, *y* ∈ *P*, ( *x* ≤ *y* ∧ *y* ≤ *x*)
    ⇒ *x* = *y)*'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***反对称性***，如果两个元素在两个方向上相互关联，则它们是相同的（表示为 ∀ *x*，*y* ∈ *P*，( *x* ≤ *y* ∧ *y* ≤
    *x*) ⇒ *x* = *y)*'
- en: '***Transitivity***, if an element is related to a second, and the second with
    a third, then the first is in relation to the third (expressed as ∀ *x*, *y*,
    *z* ∈ *P*, (*x* ≤ *y* ∧ *y* ≤ *z*) ⇒ *x* ≤ *z*'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***传递性***，如果一个元素与第二个元素相关联，第二个元素与第三个元素相关联，那么第一个元素也与第三个元素相关联（表示为 ∀ *x*，*y*，*z*
    ∈ *P*，(*x* ≤ *y* ∧ *y* ≤ *z*) ⇒ *x* ≤ *z*）'
- en: In practical terms, an element *x* is said to *dominate* an element *y* (therefore
    *x* ≤ *y*) **if it is greater or equal across all relevant dimensions, and strictly
    greater in at least one of them.**
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际意义上，一个元素 *x* 被说成是 *支配* 另一个元素 *y*（因此 *x* ≤ *y*），**如果它在所有相关维度上更大或相等，并且在至少一个维度上严格大于**。
- en: This structure is opposed to a **total order**, in which each pair of elements
    is comparable (for each *x*, *y* then *x* ≤ *y* or *y* ≤ *x*). The partial order,
    on the other hand, **allows that some couples are incomparable**, and this is
    one of its analytical forces.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构与 **全序** 相对立，在全序中，每个元素对都是可比较的（对于每个 *x*，*y*，则 *x* ≤ *y* 或 *y* ≤ *x*）。另一方面，偏序
    **允许某些对是不可比的**，这是其分析力量之一。
- en: Partial dominance relationship
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 部分支配关系
- en: 'In a multi-indicator context, the partial system is built by introducing a
    **dominance relationship between vectors**. Given two objects *a = (a[1], a[2],
    …, a[n])* and *b = (b[1], b[2], …, b[n])* we can say that *a* ≤ *b* (*a dominates
    b)* if:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在多指标环境中，通过引入 **向量之间的支配关系** 来构建部分系统。给定两个对象 *a = (a[1], a[2], …, a[n])* 和 *b =
    (b[1], b[2], …, b[n])*，我们可以说 *a* ≤ *b* (*a 支配 b*) 如果：
- en: for each i, a[i] ≤ b[i] (meaning that *a* is not the worst element among any
    dimensions)
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每个 i，a[i] ≤ b[i]（意味着 *a* 在任何维度上都不是最差的元素）
- en: and that for at least one j, a[j] ≤ b[j] (meaning that *a* is strictly greater
    in at least one dimension compared to *b*)
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并且至少对于某个 j，a[j] ≤ b[j]（意味着 *a* 在至少一个维度上比 *b* 严格更大）
- en: '**This relationship builds a dominance matrix** that represents which element
    dominates which other element in the dataset. If two objects do not satisfy the
    mutual criteria of dominance, they are **incomparable**.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**这种关系构建了一个支配矩阵**，它表示数据集中哪个元素支配了哪个其他元素。如果两个对象不满足相互的支配标准，它们是 **不可比的**。'
- en: For instance,
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，
- en: if *A = (7,5,6)* and *B = (8,5,7)* then *A* ≤ *B* (because B is at least equal
    in each dimension and strictly greater in two of them)
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 *A = (7,5,6)* 和 *B = (8,5,7)*，那么 *A* ≤ *B*（因为 B 在每个维度上至少相等，并且在其中两个维度上严格大于）
- en: if *C = (7,6,8)* and *D = (6,7,7)* then *C* and *D* are incomparable because
    each one is greater than the other in at least one dimension but worse in the
    other.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 *C = (7,6,8)* 和 *D = (6,7,7)*，那么 *C* 和 *D* 是不可比的，因为每个元素在至少一个维度上大于另一个，但在其他维度上更差。
- en: 'This explicit incomparability is a key characteristic of POSETs: **they preserve
    the original information without forcing a ranking**. In many real applications,
    such as the quality evaluation of wine, city, or hospitals, incomparability is
    not a mistake, but a faithful representation of complexity.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这种显式的不可比性是 POSET 的一个关键特征：**它们在不强制进行排名的情况下保留原始信息**。在许多实际应用中，例如葡萄酒、城市或医院的品质评估，不可比性不是一个错误，而是对复杂性的忠实反映。
- en: How to build a POSET index
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何构建 POSET 索引
- en: In our example we use the dataset winequality-red.csv, which contains 1599 red
    wines, each described by 11 chemical-physical variables and a quality score.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的例子中，我们使用包含 1599 红葡萄酒的数据集 winequality-red.csv，每个葡萄酒由 11 个化学物理变量和一个品质评分描述。
- en: 'You can download the dataset here:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在此下载数据集：
- en: '[**Wine Quality Dataset**](https://www.kaggle.com/datasets/yasserh/wine-quality-dataset)'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '[**葡萄酒质量数据集**](https://www.kaggle.com/datasets/yasserh/wine-quality-dataset)'
- en: '[*Wine Quality Prediction – Classification Prediction* www.kaggle.com](https://www.kaggle.com/datasets/yasserh/wine-quality-dataset)'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '[*葡萄酒质量预测 – 分类预测* www.kaggle.com](https://www.kaggle.com/datasets/yasserh/wine-quality-dataset)'
- en: The dataset’s [license is CC0 1.0 Universal](https://creativecommons.org/publicdomain/zero/1.0/),
    meaning it can be downloaded and used without any specific permission.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 该数据集的 [许可证是 CC0 1.0 通用](https://creativecommons.org/publicdomain/zero/1.0/)，这意味着可以无需任何特定许可下载和使用。
- en: 'Input variables are:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 输入变量包括：
- en: fixed acidity
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 固定酸度
- en: volatile acidity
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 挥发性酸度
- en: citric acid
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 柠檬酸
- en: residual sugar
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 残糖
- en: chlorides
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 氯化物
- en: free sulfur dioxide
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自由二氧化硫
- en: total sulfur dioxide
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 总二氧化硫
- en: density
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 密度
- en: pH
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: pH
- en: sulphates
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 硫酸盐
- en: alcohol
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 酒精
- en: Output variable is *quality* (score between 0 and 10).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 输出变量是*质量*（介于0到10之间的分数）。
- en: 'We can (and will) exclude variables in this analysis: the goal is to build
    a set of indicators consistent with the notion of “quality” and with shared directionality
    (higher values ​​= better, or vice versa). For example, a high volatile acidity
    value is negative, while a high alcohol value is often associated with superior
    quality.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以（并将）排除分析中的变量：目标是构建一组与“质量”概念一致且具有共享方向性的指标（值越高=越好，反之亦然）。例如，高挥发酸值是负面的，而高酒精值通常与优质相关。
- en: 'A rational choice may include:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 一个合理的选择可能包括：
- en: Alcohol (positive)
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 酒精（正面）
- en: Acidity volatile (negative)
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 挥发性酸（负面）
- en: Sulphates (positive)
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 硫酸盐（正面）
- en: Residual Sugar (positive up to a certain point, then neutral)
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 残糖（在一定点之前为正，之后为中性）
- en: Citric Acid (positive)
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 柠檬酸（正面）
- en: 'For POSET, **it is important to standardize the semantic direction**: if a
    variable has a negative effect, it must be transformed (e.g. -Volatile_acidity)
    before evaluating the dominance.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 对于POSET，**标准化语义方向非常重要**：如果一个变量有负面影响，必须在评估支配关系之前进行转换（例如，-Volatile_acidity）。
- en: Construction of the dominance matrix
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建支配矩阵
- en: 'To build the partial dominance relationship between the observations (the wines),
    proceed as follows:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建观察值（葡萄酒）之间的部分支配关系，请按以下步骤操作：
- en: Sample N observations from the dataset (for example, 20 wines for legibility
    purposes)
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从数据集中抽取N个样本观察值（例如，为了可读性，20种葡萄酒）。
- en: Each wine is represented by a vector of *m* indicators
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每种葡萄酒由一个*m*个指标的向量表示
- en: The observation A dominates B occurs if A is greater or equal than B and at
    least one element is strictly greater.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果A大于或等于B，并且至少有一个元素是严格大于的，则观察A支配B。
- en: Practical example in Python
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Python中的实际示例
- en: The wine dataset is also present in Sklearn. We use Pandas to manage the dataset,
    Numpy for numerical operations and Networkx to build and view Hasse diagram
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 葡萄酒数据集也存在于Sklearn中。我们使用Pandas来管理数据集，Numpy进行数值运算，Networkx构建和查看Hasse图。
- en: '[PRE0]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Each line of the dataset represents a wine, described by 3 numerical characteristics.
    Let’s say that:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集的每一行代表一种葡萄酒，由3个数值特征描述。比如说：
- en: Wine A dominates wine B if it has greater or equal values ​​in all sizes, and
    strictly greater in at least one
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果葡萄酒A在所有尺寸上都有大于或等于的值，并且在至少一个尺寸上严格大于，则葡萄酒A支配葡萄酒B。
- en: 'This is just a partial system: you cannot always say if one wine is “better”
    than another, because maybe one has more alcohol but less color intensity.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是一个部分系统：你并不总是可以说一款酒比另一款“更好”，因为可能一款酒酒精含量更高但颜色强度更低。
- en: '![](../Images/8ecec00454ecd22f68206c2c4f08cb4b.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8ecec00454ecd22f68206c2c4f08cb4b.png)'
- en: We build the dominance matrix D, where d[i][j] = 1 if element i dominates j.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们构建支配矩阵D，其中d[i][j] = 1如果元素i支配j。
- en: '[PRE1]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: for each couple i, j, the matrix returns
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每一对i，j，矩阵返回
- en: 1 if i dominates j
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1 如果i支配j
- en: else 0
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 否则0
- en: 'For example, in line 3, you find values ​​1 in columns 0, 1, 5, 9\. This means:
    element 3 dominates elements 0, 1, 5, 9.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在第3行，你会在列0、1、5、9中找到值1。这意味着：元素3支配元素0、1、5、9。
- en: Building of Hasse diagram
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建Hasse图
- en: We represent dominance relationships with an acliclic oriented graph. We reduce
    the relationships transitively to obtain the diagram of Hasse, which shows only
    direct dominances.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我们用有向图表示支配关系。我们将关系传递性地简化以获得Hasse图，该图只显示直接支配关系。
- en: '[PRE2]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/94dae8814e6e62b6da4d6d3e7ec8f0d7.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/94dae8814e6e62b6da4d6d3e7ec8f0d7.png)'
- en: Analysis of Incomparability
  id: totrans-77
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 不可比性分析
- en: Let’s now see how many elements are incomparable to each other. Two units i
    and j are incomparable if neither dominates the other.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看有多少元素是彼此不可比较的。如果i和j都不支配对方，则两个单位i和j是不可比较的。
- en: '[PRE3]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Comparison with a traditional synthetic ordering
  id: totrans-80
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 与传统合成排序的比较
- en: 'If we used an aggregate index, we would get a forced total ordering. Let’s
    use the normalized mean for each wine as an example:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们使用一个综合指数，我们会得到一个强制性的总排序。以每款葡萄酒的标准化平均值为例：
- en: '[PRE4]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: This example shows the conceptual and practical difference between POSET and
    synthetic ranking. With the aggregate index, each unit is forcedly ordered; **with
    POSET, logical dominance relations are maintained**, without introducing arbitrariness
    or information loss. The use of directed graphs also allows a clear visualization
    of partial hierarchy and incomparability between units.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子展示了POSET和合成排序在概念和实践上的区别。使用综合指数，每个单位都被强制排序；**在POSET中，逻辑支配关系得到保持**，没有引入任意性或信息损失。使用有向图也允许清晰地可视化单位之间的部分层次和不可比较性。
- en: Result interpretability
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果可解释性
- en: 'One of the most interesting aspects of the POSET approach **is that not all
    units are comparable**. Unlike a total ordering, where each element has a unique
    position, the partial ordering preserves the structural information of the data:
    **some elements dominate, others are dominated, many are incomparable**. This
    has important implications in terms of interpretability and decision making.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: POSET方法最有趣的方面之一是**并非所有单位都是可比较的**。与每个元素都有唯一位置的完全排序不同，部分排序保留了数据的结构信息：**一些元素支配，一些被支配，许多是不可比较的**。这在可解释性和决策方面有重要影响。
- en: In the context of the example with the wines, the absence of a complete ordering
    implies that some wines are better on some dimensions and worse on others. For
    example, one wine could have a high alcohol content but a low color intensity,
    while another wine has the opposite. In these cases, **there is no clear dominance,
    and the two wines are incomparable.**
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在葡萄酒示例的背景下，没有完整排序的存在意味着某些葡萄酒在某些维度上更好，而在其他维度上更差。例如，一种酒可能酒精含量高但颜色强度低，而另一种酒则相反。在这些情况下，**没有明确的支配关系，这两款酒是不可比较的**。
- en: 'From a decision-making point of view, this information is valuable: forcing
    a total ranking masks these trade-offs and can lead to suboptimal choices.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 从决策的角度来看，这些信息是有价值的：强制进行总排名会掩盖这些权衡，可能导致次优选择。
- en: 'Let’s check in the code how many nodes are *maximal*, that is, not dominated
    by any other, and how many are *minimal*, that is, do not dominate any other:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在代码中检查有多少节点是**最大的**，即不被任何其他节点支配，以及有多少节点是**最小的**，即不支配任何其他节点：
- en: '[PRE5]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The high number of maximal nodes **suggests that there are many valid alternatives
    without a clear hierarchy**. This reflects the reality of multi-criteria systems,
    where there is not always a universally valid “best choice”.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 高数量的最大节点**表明存在许多没有明确层次的有效替代方案**。这反映了多标准系统的现实情况，其中并不总是存在一个普遍有效的“最佳选择”。
- en: Clusters of non-comparable wines
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 无法比较的酒类集群
- en: 'We can identify clusters of wines that are not comparable to each other. These
    are subgraphs in which the nodes are not connected by any dominance relation.
    We use networkx to identify the connected components in the associated undirected
    graph:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以识别出一些无法相互比较的酒类集群。这些是子图，其中节点之间没有任何支配关系。我们使用networkx来识别相关无向图中的连通组件：
- en: 'We can identify clusters of wines that are not comparable to each other. These
    are subgraphs in which the nodes are not connected by any dominance relation.
    We use networkx to identify the connected components in the associated undirected
    graph:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以识别出一些无法相互比较的酒类集群。这些是子图，其中节点之间没有任何支配关系。我们使用networkx来识别相关无向图中的连通组件：
- en: '[PRE6]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'These groups represent regions of multidimensional space in which units **are
    equivalent in terms of dominance**: there is no objective way to say that one
    wine is “better” than another, unless we introduce an external criterion.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这些组代表多维空间中的区域，其中单位在**支配方面是等效的**：没有客观的方法可以说一种酒比另一种酒“更好”，除非我们引入外部标准。
- en: Hasse diagram with focus on maximals
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 专注于最大节点的Hasse图
- en: 'To better visualize the structure of the sorting, we can highlight the maximal
    nodes (optimal choices) in the Hasse diagram:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地可视化排序的结构，我们可以在Hasse图中突出显示最大节点（最优选择）：
- en: '[PRE7]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/58119e5ac0b0a027f8ec9be72ec079ad.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![无法消除的权衡](../Images/58119e5ac0b0a027f8ec9be72ec079ad.png)'
- en: In real scenarios, these maximal nodes would correspond to **non-dominated solutions**,
    i.e. the best options from a Pareto-efficiency perspective. The decision maker
    could choose one of these based on personal preferences, external constraints
    or other qualitative criteria.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际场景中，这些最大节点对应于**非支配解**，即从帕累托效率角度来看的最佳选项。决策者可以根据个人偏好、外部约束或其他定性标准从中选择一个。
- en: Unremovable trade-offs
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 无法消除的权衡
- en: 'Let’s take a concrete example to show what happens when two wines are incomparable:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个具体的例子来说明当两种酒不可比较时会发生什么：
- en: '[PRE8]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This output clearly shows that **neither wine is superior on all dimensions.**
    If we used an aggregate index (such as an average), one of the two would be artificially
    declared “better”, erasing the information about the conflict between dimensions.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这种输出清楚地表明**两种酒在所有维度上都不占优势**。如果我们使用综合指数（如平均值），其中之一将被人为地宣布为“更好”，从而抹去关于维度之间冲突的信息。
- en: Chart interpretation
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图表解释
- en: 'It is important to know that a POSET is a descriptive, not a prescriptive,
    tool. **It does not suggest an automatic decision**, but rather makes explicit
    the structure of the relationships between alternatives. Cases of incomparability
    are not a limit, but a feature of the system: they represent legitimate uncertainty,
    plurality of criteria and variety of solutions.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要知道POSET是一个描述性工具，而不是规范性工具。**它不提出自动决策**，而是明确地说明了替代方案之间关系的结构。不可比较的案例不是限制，而是系统的特征：它们代表合法的不确定性、标准的多样性和解决方案的多样性。
- en: In decision-making areas (policy, multi-objective selection, comparative evaluation),
    this interpretation promotes transparency and responsibility of choices, avoiding
    simplified and arbitrary rankings.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在决策领域（政策、多目标选择、比较评估）中，这种解释促进了选择的透明度和责任感，避免了简化和任意的排名。
- en: Pros and Cons of POSETs
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: POSET的优缺点
- en: The POSET approach has a number of important advantages over traditional synthetic
    indices, but it is not without limitations. Understanding these is essential to
    deciding when to adopt a partial ordering in multidimensional analysis projects.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: POSET方法相对于传统综合指数有许多重要优势，但它并非没有局限性。了解这些对于决定在多维分析项目中何时采用部分排序至关重要。
- en: Pros
  id: totrans-110
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 优点
- en: '**Transparency**: POSET does not require subjective weights or arbitrary aggregations.
    Dominance relationships are determined solely by the data.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**透明度**：POSET不需要主观权重或任意聚合。支配关系完全由数据决定。'
- en: '**Logical coherence**: A dominance relationship is defined only when there
    is superiority on all dimensions. This avoids forced comparisons between elements
    that excel in different aspects.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**逻辑一致性**：只有当在所有维度上具有优越性时，才定义支配关系。这避免了在不同方面表现出色的元素之间的强制比较。'
- en: '**Robustness**: Conclusions are less sensitive to data scale or transformation,
    provided that the relative ordering of variables is maintained.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**鲁棒性**：只要保持变量的相对排序，结论对数据规模或转换的敏感性较低。'
- en: '**Identifying non-dominated solutions**: Maximal nodes in the graph represent
    Pareto-optimal choices, useful in multi-objective decision-making contexts.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**识别非支配解**：图中的最大节点代表帕累托最优选择，在多目标决策环境中很有用。'
- en: '**Making incomparability explicit**: Partial sorting makes trade-offs visible
    and promotes a more realistic evaluation of alternatives.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**明确不可比较性**：部分排序使权衡变得明显，并促进对替代方案的更现实评估。'
- en: Cons
  id: totrans-116
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 缺点
- en: '**No single ranking**: In some contexts (e.g., competitions, rankings), a total
    ordering is required. POSET does not automatically provide a winner.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无单一排名**：在某些情况下（例如，比赛、排名），需要总排序。POSET不会自动提供获胜者。'
- en: '**Computational complexity**: For very large datasets, dominance matrix construction
    and transitive reduction can become expensive.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算复杂性**：对于非常大的数据集，支配矩阵的构建和传递约简可能会变得昂贵。'
- en: '**Communication challenges**: for non-expert users, interpreting a Hasse graph
    may be less immediate than a numerical ranking.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**沟通挑战**：对于非专家用户来说，解释一个Hasse图可能不如数值排名那么直接。'
- en: '**Dependence on preliminary choices**: The selection of variables influences
    the structure of the sort. An unbalanced choice can mask or exaggerate the incomparability.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**依赖初步选择**：变量的选择影响排序的结构。不平衡的选择可能会掩盖或夸大不可比较性。'
- en: Conclusions
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The POSET approach offers a powerful alternative perspective for the analysis
    of multidimensional data, avoiding the simplifications imposed by aggregate indices.
    Instead of forcing a total ordering, POSETs preserve information complexity, showing
    clear cases of dominance and incomparability.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: POSET方法为多维数据分析提供了一个强大的替代视角，避免了由综合指数强加的简化。POSETs不是通过强制总排序，而是保留信息复杂性，显示出明显的支配和不比较的案例。
- en: 'This methodology is particularly useful when:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法在以下情况下特别有用：
- en: indicators describe different and potentially conflicting aspects (e.g. efficiency
    vs. equity);
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指标描述了不同且可能冲突的方面（例如，效率与公平性）；
- en: you want to explore non-dominated solutions, in a Pareto perspective;
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想从帕累托视角探索非支配解；
- en: you need to ensure transparency in the decision-making process.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要确保决策过程中的透明度。
- en: However, it is not always the best choice. In contexts where a unique ranking
    or automated decisions are required, it may be less practical.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并不总是最佳选择。在需要唯一排名或自动化决策的情境中，可能不太实用。
- en: The use of POSETs should be considered as an exploratory phase or complementary
    tool to aggregative methods, to identify ambiguities, non-comparable clusters,
    and equivalent alternatives.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 应将POSETs的使用视为探索阶段或补充工具，用于识别模糊性、不可比较的集群和等效替代方案。
