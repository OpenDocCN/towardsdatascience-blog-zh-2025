- en: 'LossVal Explained: Efficiently Estimate the Importance of Your Training Data'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 损失值解释：高效估计训练数据的重要性
- en: 原文：[https://towardsdatascience.com/lossval-explained-efficiently-estimate-the-importance-of-your-training-data-cef557434bf8/](https://towardsdatascience.com/lossval-explained-efficiently-estimate-the-importance-of-your-training-data-cef557434bf8/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/lossval-explained-efficiently-estimate-the-importance-of-your-training-data-cef557434bf8/](https://towardsdatascience.com/lossval-explained-efficiently-estimate-the-importance-of-your-training-data-cef557434bf8/)
- en: 'LossVal Explained: Efficient Data Valuation for Neural Networks'
  id: totrans-2
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 损失值解释：高效数据估值方法应用于神经网络
- en: How to exploit the loss function to efficiently estimate the importance of your
    training data
  id: totrans-3
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何利用损失函数来高效估计训练数据的重要性
- en: '![Data Valuation visualized. Understanding how important each training sample
    is for the performance of your machine learning model. (Image by author.)](../Images/a06ad35144b95553611b5069b27b0bb9.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![数据估值可视化。理解每个训练样本对机器学习模型性能的重要性。（图片由作者提供。）](../Images/a06ad35144b95553611b5069b27b0bb9.png)'
- en: Data Valuation visualized. Understanding how important each training sample
    is for the performance of your machine learning model. (Image by author.)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 数据估值可视化。理解每个训练样本对机器学习模型性能的重要性。（图片由作者提供。）
- en: '*This blog post summarizes and explains our paper "**LossVal: Efficient Data
    Valuation for Neural Networks**".*'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '*本文总结了并解释了我们的论文“**LossVal: Efficient Data Valuation for Neural Networks**”。*'
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Not all data is created equal: Some training data points influence the training
    of a machine learning model much more than others. Understanding the influence
    of each data point is often highly inefficient and often relies on repeated retraining
    of the model. *LossVal* presents a new approach to this, that efficiently integrates
    the Data Valuation process into the loss function of an artificial neural network.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有数据都是平等的：一些训练数据点对机器学习模型的训练影响远大于其他数据点。理解每个数据点的影响通常效率低下，并且往往依赖于模型的重复训练。*LossVal*提出了一种新的方法，该方法将数据估值过程有效地集成到人工神经网络的损失函数中。
- en: What is Data Valuation?
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是数据估值？
- en: Machine Learning models are often trained with large datasets. In most cases,
    not all training samples in such a dataset are equally helpful or informative
    for the model. For example, if a data point is noisy or has a wrong label, it
    is less informative for your machine learning model. For one of the tasks in our
    paper, we trained a machine-learning model on a [vehicle crash test dataset to
    predict how harmful a crash would be for an occupant](https://link.springer.com/article/10.1007/s10618-021-00761-9),
    based on some vehicle parameters. Some of the data points are from cars of the
    80s and 90s! You can imagine, that very old cars may be less important for the
    model’s predictions on modern cars.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习模型通常使用大量数据集进行训练。在大多数情况下，数据集中的所有训练样本对模型的帮助或信息量并不相等。例如，如果一个数据点是噪声的或标签错误，它对您的机器学习模型的信息量就较小。在我们的论文中的一个任务中，我们基于一些车辆参数，在一个[车辆碰撞测试数据集](https://link.springer.com/article/10.1007/s10618-021-00761-9)上训练了一个机器学习模型，以预测碰撞对乘客的危害程度。其中一些数据点来自80年代和90年代的汽车！你可以想象，非常旧的汽车可能对模型预测现代汽车的重要性较小。
- en: The process of understanding the effect of each training sample on the machine-learning
    model is called [Data Valuation](https://medium.com/towards-data-science/data-valuation-a-concise-overview-72e8cf12c755),
    where an importance score is assigned to each training sample. Data Valuation
    is a growing field connected to data markets, explainable AI, active learning,
    and many more. Many approaches have been proposed, like Data Shapley, Influence
    Functions, or LAVA. To learn more about this, you can check out my recent [blog
    post](https://medium.com/towards-data-science/data-valuation-a-concise-overview-72e8cf12c755)
    that presents different Data Valuation methods and applications.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 理解每个训练样本对机器学习模型影响的过程被称为[数据估值](https://medium.com/towards-data-science/data-valuation-a-concise-overview-72e8cf12c755)，其中为每个训练样本分配一个重要性分数。数据估值是一个与数据市场、可解释人工智能、主动学习等领域相关的增长领域。已经提出了许多方法，如数据Shapley、影响函数或LAVA。要了解更多信息，您可以查看我最近发表的[博客文章](https://medium.com/towards-data-science/data-valuation-a-concise-overview-72e8cf12c755)，该文章介绍了不同的数据估值方法和应用。
- en: LossVal
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LossVal
- en: The basic idea behind LossVal is to "learn" the importance score of each sample
    while training the model, similar to how the model weights are learned. This saves
    us from rerunning the training of the model multiple times and from having to
    track all model weight updates during the training.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: LossVal背后的基本思想是在训练模型的同时“学习”每个样本的重要性得分，类似于模型权重是如何学习的。这使我们免于多次重新运行模型的训练，并免于在训练过程中跟踪所有模型权重的更新。
- en: 'To achieve this, we can modify standard loss functions like means squared error
    (MSE) and cross-entropy loss. We incorporate instance-based weights into the loss
    and multiply it by a weighted distance function. In general, the LossVal loss
    functions have the following form:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这一点，我们可以修改标准损失函数，如均方误差（MSE）和交叉熵损失。我们将实例权重纳入损失，并将其乘以一个加权距离函数。一般来说，LossVal损失函数具有以下形式：
- en: where ℒ indicates the weighted target loss (weighted MSE or cross-entropy) and
    OT indicates a weighted distribution distance (OT stands for optimal transport).
    This results in new loss functions that can be used like any other loss function
    for training a neural network. However, during each training step, the weights
    *w* in the loss are updated using the gradient descent.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 ℒ 表示加权目标损失（加权MSE或交叉熵），OT 表示加权分布距离（OT代表最优传输）。这导致新的损失函数，可以像任何其他损失函数一样用于训练神经网络。然而，在每次训练步骤中，损失中的权重
    *w* 使用梯度下降进行更新。
- en: We demonstrate this for regression tasks using the MSE and for classification
    using the cross-entropy loss. Afterward, we take a closer look at the distribution
    distance OT.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用MSE演示回归任务，使用交叉熵损失演示分类任务。之后，我们将更详细地研究分布距离OT。
- en: LossVal for Regression
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回归任务的LossVal
- en: 'Let’s start with the MSE. The standard MSE is the squared difference between
    the model prediction *ŷ* and the correct prediction *y* (with *n* being the index
    of the training sample):'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从均方误差（MSE）开始。标准的MSE是模型预测值 *ŷ* 与正确预测值 *y* 之间的平方差（其中 *n* 是训练样本的索引）：
- en: 'For LossVal, we modify the MSE in two steps: First, a weight *wₙ* is included
    for each training instance *n*. Second, the whole MSE is multiplied with a weighted
    distribution distance function.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 对于LossVal，我们分两步修改MSE：首先，为每个训练实例 *n* 包含一个权重 *wₙ*。其次，整个MSE乘以一个加权分布距离函数。
- en: LossVal for Classification
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分类任务的LossVal
- en: 'The cross-entropy loss is typically expressed like this:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉熵损失通常表示如下：
- en: 'We can modify the cross-entropy loss in the same way as the MSE:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以像修改MSE一样修改交叉熵损失：
- en: The Optimal Transport Distance
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最优传输距离
- en: 'The optimal transport distance is the minimum effort you need to transform
    one distribution into another. It is also known as the earth mover distance, coming
    from the analogy of the fastest way to fill a hole with a pile of dirt. OT can
    be defined as:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 最优传输距离是将一个分布转换为另一个分布所需的最小努力。它也被称为地球迁移距离，来源于用一堆泥土填充坑的最快方式的类比。OT可以定义为：
- en: where *c* is the cost of moving point *xₙ* to _x_ⱼ. Each *γ* is a possible transport
    plan, defining how the points are moved. The optimal transport plan is the *γ**
    with the least effort involved (the smallest distribution distance). Note that
    we include the weights w in the cost function via joint distribution *Π(w, 1)*.
    In other words, *OTᵥᵥ* is the weighted distance between the training and the validation
    set. Y[ou can find an in-depth explanation for optimal transport here.](https://alexhwilliams.info/itsneuronalblog/2020/10/09/optimal-transport/)
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *c* 是将点 *xₙ* 移动到 _x_ⱼ 的成本。每个 *γ* 是一个可能的运输计划，定义了点如何移动。最优运输计划是涉及最少努力（最小的分布距离）的
    *γ**。请注意，我们通过联合分布 *Π(w, 1)* 将权重 w 包含在成本函数中。换句话说，*OTᵥᵥ* 是训练集和验证集之间的加权距离。你可以在[这里](https://alexhwilliams.info/itsneuronalblog/2020/10/09/optimal-transport/)找到关于最优传输的深入解释。
- en: In a more practical sense, minimizing *OTᵥᵥ* by changing the weights will assign
    higher weights to the training data points similar to the validation data. Effectively,
    noisy samples get a smaller weight.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在更实际的意义上，通过改变权重来最小化 *OTᵥᵥ* 将赋予训练数据点更高的权重，类似于验证数据。实际上，噪声样本会得到更小的权重。
- en: Implementation
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现方法
- en: Our implementation and all data are [available on GitHub](https://github.com/twibiral/LossVal).
    The code below shows the implementation of LossVal for the mean squared error.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的实现和所有数据[可在GitHub上找到](https://github.com/twibiral/LossVal)。下面的代码显示了LossVal对均方误差的实现。
- en: '[PRE0]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'This loss function works like any other loss function in pytorch, with some
    peculiarities: the parameters include the validation set, sample weights, and
    the indices of the samples in the batch. This is necessary to select the correct
    weights for the batched samples for calculating the weighted loss. Keep in mind
    that this implementation relies on the automatic gradient calculation of pytorch.
    That means the sample weights vector needs to be part of the model parameters.
    This way, the optimization of the weights profits from the optimizer implementation,
    like Adam. Alternatively, one could also update the weights per hand, using the
    gradient of the loss with respect to each weight *i*. The implementation for cross-entropy
    works equivalently, but you need to replace line 8.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这个损失函数在pytorch中像任何其他损失函数一样工作，有一些特殊性：参数包括验证集、样本权重和批次中样本的索引。这是为了选择正确的权重来计算加权损失。请记住，这个实现依赖于pytorch的自动梯度计算。这意味着样本权重向量需要成为模型参数的一部分。这样，权重的优化就能从优化器实现中受益，比如Adam。或者，也可以手动更新权重，使用损失相对于每个权重*i*的梯度。交叉熵的实现也是等效的，但需要替换第8行。
- en: But does it work?
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 但它真的有效吗？
- en: '![Benchmark comparison of different Data Valuation methods for noisy sample
    detection. Higher is better. (Image by author.)](../Images/a7ccf18ff8d208291ee266131d7cf226.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![不同数据估值方法在噪声样本检测中的基准比较。数值越高越好。（图片由作者提供。）](../Images/a7ccf18ff8d208291ee266131d7cf226.png)'
- en: Benchmark comparison of different Data Valuation methods for noisy sample detection.
    Higher is better. (Image by author.)
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 不同数据估值方法在噪声样本检测中的基准比较。数值越高越好。（图片由作者提供。）
- en: The graphic above shows the comparison between different Data Valuation approaches
    on the noisy sample detection task. This task is defined by the [OpenDataVal benchmark](https://arxiv.org/abs/2306.10577).
    First, noise is added to p% of the training data, then the Data Valuation is used
    to find the noisy samples. Better methods will find more of the noisy samples,
    hence achieving a higher F1 score. The graph above shows the average over 6 datasets
    for classification and 6 datasets for regression. We tested 3 different noise
    types; noisy labels, noisy features, and mixed noise. In the mixed noise condition,
    half of the noisy sample have feature noise and the other half have label noise.
    In noisy sample detection, LossVal outperforms all other methods for label noise
    and mixed noise. However, LAVA performs better for feature noise.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的图形显示了不同数据估值方法在噪声样本检测任务中的比较。这个任务由[OpenDataVal基准](https://arxiv.org/abs/2306.10577)定义。首先，将噪声添加到训练数据的p%中，然后使用数据估值来查找噪声样本。更好的方法将找到更多的噪声样本，从而实现更高的F1分数。上面的图形显示了6个用于分类的数据集和6个用于回归的数据集的平均值。我们测试了3种不同的噪声类型；噪声标签、噪声特征和混合噪声。在混合噪声条件下，一半的噪声样本具有特征噪声，另一半具有标签噪声。在噪声样本检测中，LossVal在标签噪声和混合噪声条件下优于所有其他方法。然而，对于特征噪声，LAVA表现更好。
- en: The experimental setup for the point removal experiment (graphic below) is similar.
    However, here the goal is to remove the highest valued data points from the training
    set and see how a model trained on this training set performs. This means, that
    a better Data Valuation method will lead to a faster degradation in model performance
    because it removes important data points earlier. We found that LossVal matches
    state-of-the-art methods.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 点去除实验的实验设置（下方的图形）类似。然而，这里的目的是从训练集中去除最高价值的数据点，并观察在这个训练集上训练的模型的表现。这意味着，更好的数据估值方法会导致模型性能更快地下降，因为它更早地移除了重要的数据点。我们发现LossVal与最先进的方法相匹配。
- en: '![Benchmark comparison of different Data Valuation methods for removal of high-value
    points. Lower is better. (Image by author.)](../Images/b909d4d94c74c045794c6ca5bc64b7c0.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![不同数据估值方法在去除高值点中的基准比较。数值越低越好。（图片由作者提供。）](../Images/b909d4d94c74c045794c6ca5bc64b7c0.png)'
- en: Benchmark comparison of different Data Valuation methods for removal of high-value
    points. Lower is better. (Image by author.)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 不同数据估值方法在去除高值点中的基准比较。数值越低越好。（图片由作者提供。）
- en: For more detailed results, [take a look at our paper](https://arxiv.org/pdf/2412.04158).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 想要了解更多详细结果，[请查看我们的论文](https://arxiv.org/pdf/2412.04158)。
- en: Conclusion
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'The idea behind LossVal is simple: Use the gradient descent to find an optimal
    weight for each data point. The weight signifies the importance of the data point.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: LossVal背后的理念很简单：使用梯度下降为每个数据点找到一个最优权重。权重表示数据点的重要性。
- en: Our experiments show that LossVal achieves state-of-the-art performance on the
    OpenDataVal benchmark. LossVal has a lower time complexity than all other model-based
    approaches we tested and demonstrates a more robust performance over different
    types of noise and tasks.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的实验表明，LossVal在OpenDataVal基准测试中实现了最先进的性能。LossVal的时间复杂度低于我们测试的所有基于模型的方案，并且在面对不同类型的噪声和任务时表现出更稳健的性能。
- en: Overall, LossVal presents a efficient alternative to other state-of-the-art
    Data Valuation approaches for neural networks.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，LossVal为神经网络提供了一种高效的其他最先进数据估值方法的替代方案。
- en: '* * *'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
