- en: How to Build Agents with GPT-5
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-build-agents-with-gpt-5/](https://towardsdatascience.com/how-to-build-agents-with-gpt-5/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1762805534523" class="mdspan-comment">In this article</mdspan>,
    I’ll discuss how to build agentic systems using GPT-5 from OpenAI. I recently
    discussed how to use GPT-5 effectively, and today I’ll be continuing my GPT-5
    coverage by discussing how to effectively utilize GPT as an agent. Having agents
    with available tools in your application is soon going to be a basic user requirement
    for most AI applications, which is why you should start implementing it as soon
    as possible.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: I’ll cover how you can use GPT-5 as a powerful question answering model by allowing
    it access to your data and providing it with useful tools to answer user queries.
    This article aims to be a high-level overview of the possibilities you have to
    use GPT-5 as an agent. I am not sponsored by OpenAI.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '![GPT-5 Agent](../Images/65f92ea08efa19bc67c3770939ec02d8.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
- en: This infographic highlights the main contents of this article. I’ll be discussing
    how to use GPT-5 as an AI agent, covering topics such as why you need an AI agent,
    vector storage, custom tools, and OpenAI’s Agents SDK. Image by ChatGPT.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Why use GPT-5 as an agent?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Whenever you’re considering implementing a system such as having GPT-5 as an
    agent, it’s always important to think about *the why*. You need to know why you’re
    implementing it and what problem you’re trying to solve. Some problems you might
    be working on are:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Access to the internal knowledge base
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Coding agent
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Automate workflows
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All of these are valid reasons for implementing an agentic system, and GPT-5
    with tools can aid in achieving all of these.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: 'The main reason I chose to utilize GPT-5 for my agent is that I’m usually working
    with a document corpus, and OpenAI has an integrated ecosystem which is super
    useful to solve the problems I’m trying to solve: Answer user queries, given a
    corpus of information.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Throughout the different sections in this article, I’ll cover some different
    tools that are available in OpenAI. Note that there are a lot of alternatives
    out there that are either cheaper or better suited for your use case. Google’s
    Gemini comes to mind as a platform that essentially has feature parity with OpenAI,
    and is definitely an alternative you should consider. Furthermore, there are a
    plethora of open-source tools out there.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: RAG access to data
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: RAG is a powerful approach to gaining access to your data. Typically, RAG has
    been performed by chunking and embedding your own data before feeding it to a
    vector database such as Pinecone. However, there are now great alternatives out
    there that essentially offer managed RAG services. Both OpenAI and Gemini offer
    an API to upload files, where they chunk and embed your files automatically, making
    it accessible through a simple API call. This provides super simple access to
    your data. You can find details in [this API page](https://platform.openai.com/docs/guides/retrieval).
    Some of the example code I’ll show will also be from this page.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: 'After you’ve uploaded your documents and put them into a vector storage, you
    can, for example, perform a vector search to find relevant documents with:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This will return a series of documents and specific chunks from those documents,
    similar to what Pinecone does. You can then proceed to use these chunks to answer
    user queries.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: However, you can make the vector storage even more powerful by providing GPT-5
    access to it through a tool.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'This is a lot more powerful because you’ve now made the vector storage available
    to GPT-5 through a tool. When you now input the user query, GPT-5 decides whether
    or not it needs to use the tool to answer the user query. If it decides it needs
    to use the tool, GPT-5 does the following:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Reasons about which tools or vector storage it has available, and which to use.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Does query rewriting: Writes 5 different versions of the user prompt, but optimized
    to find relevant information with RAG.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fires the 5 prompts in parallel, and fetches the most relevant documents
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Determines if it has enough information to answer the user query.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If yes, it responds to the user query
  id: totrans-26
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: If no, it can search further in the vector storage(s)
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'This is a super easy and powerful way to get access to your data, and OpenAI
    essentially handles all of the complexity with:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Chunking and embedding documents
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Deciding when to perform a vector search
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Query rewriting
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Determining relevant documents based on similarity with queries
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Deciding if it has enough information to answer the user query
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Answering the user query
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gemini has also recently made a managed RAG system with [their Files API](https://ai.google.dev/gemini-api/docs/files),
    essentially offering the same service.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: GPT-5 tool usage
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the previous section, I discussed the vector storage tool you can make available
    to GPT-5\. However, you can also make any other tool available to GPT-5\. A classic
    example is to provide GPT-5 access to a *get_weather* tool, so it can access the
    current weather. The current example is from the [OpenAI docs](https://platform.openai.com/docs/guides/tools?tool-type=function-calling).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Now you need to determine which tools you should make available to your agent,
    so that it can better answer the queries you’ll be providing it. For example:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: If you’re working with external knowledge bases, you should make available a
    tool to search these knowledge bases, and inform the model when to use the tool
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Python execution tool: You can give the model a tool to run Python code, and
    see the output with'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Calculator tool: Instead of the LLM performing math itself (which is inefficient
    and prone to errors), you can provide it with a calculator tool to run calculations.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'And so on. The important part here is that you give the agent the best opportunity
    to answer user queries as possible. However, it’s also easy to make the mistake
    of making too many tools available. It’s important you follow general guidelines
    on providing tools to your agent, ensuring:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Tools are always well described
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tools are unambiguous: it should always be clear to the model (and any human
    reading a tool) when a tool should be used, and when not'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Minimal overlap between tools
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I’ve covered the topic of AI Agent tools more in depth in my previous article
    on *[How to Build Tools for AI Agents](https://towardsdatascience.com/how-to-build-tools-for-ai-agents/).*
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: When defining tools for GPT-5, you can also provide guidelines for whether a
    tool is required or not. A required tool could be the vector storage search, where
    you force the model to search the vector query for every user request, ensuring
    answers are always grounded in the document corpus. However, the *get_weather*
    function should usually be an optional function, considering the function should
    only be invoked when a user asks about the weather.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: 'You can also make tools using connectors. Connectors are essentially tools
    that give access to other apps, such as:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Gmail
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Slack
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figma
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GitHub
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This allows GPT to, for example, list your emails, search specific threads in
    Slack, check out designs on Figma, or look into code on GitHub.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: Agents package
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It’s also worth mentioning that OpenAI made an [Agents SDK](https://github.com/openai/openai-agents-python)
    you can access through Python or TypeScript. The agents SDK is useful for more
    complex agent-building scenarios, where you need to:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: Make the agent perform complex, chained actions
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maintain context between tasks
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can, for example, create specific agents, specializing in certain tasks
    (fetching information, summarizing information, etc), and build an orchestrator
    agent which answers user requests, fires off sub-agents to fetch and summarize
    information, determines if it has enough information, and then answers the user.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: 'There are a lot of similar Agent SDKs out there, which makes creating your
    own agent rather simple. Some other good alternatives are:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: LangGraph
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CrewAI
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent Development Kit
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These packages all serve the same purpose of making AI agents easier to create,
    and thus more accessible.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I’ve discussed how to utilize GPT-5 as an AI agent. I started
    off discussing when you need to make agents, and why GPT-5 is one of several good
    alternatives. I then dived into OpenAI’s vector storage, and how you can create
    a vector storage super simply, and make it available to your agent as a tool.
    Furthermore, I discussed providing your agent with other custom tools and the
    Agents SDK you can use to make advanced agentic applications. Providing your LLMs
    with tools is a simple way to supercharge your agents and make them a lot more
    able to answer user queries. As I stated at the beginning of this article, users
    will soon start to expect most AI applications to have available agents that can
    perform actions through tools, and this is thus a topic you should learn more
    about and implement as quickly as possible.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了如何利用GPT-5作为AI代理。我首先讨论了何时需要制作代理，以及为什么GPT-5是几个好的替代方案之一。然后我深入探讨了OpenAI的向量存储，以及如何非常简单地创建向量存储，并将其作为工具提供给您的代理。此外，我还讨论了为您的代理提供其他自定义工具和您可以使用以制作高级代理应用的代理SDK。为您的LLMs提供工具是提升您的代理并使其能够更好地回答用户查询的简单方法。正如我在文章开头所述，用户很快就会开始期待大多数AI应用都应有可执行工具操作的代理，因此这是一个你应该了解更多并尽快实施的主题。
