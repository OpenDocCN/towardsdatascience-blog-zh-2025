- en: 'Integrating DataHub into Jira: A Practical Guide Using DataHub Actions'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/integrating-datahub-into-jira-a-practical-guide-using-datahub-actions/](https://towardsdatascience.com/integrating-datahub-into-jira-a-practical-guide-using-datahub-actions/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758220114298" class="mdspan-comment">In this article</mdspan>,
    we’ll go over how to integrate [DataHub](https://docs.datahub.com/docs/features)
    events into Jira workflows using the [DataHub Actions framework](https://docs.datahub.com/docs/actions).
    Before diving in, we’ll give a little background into what DataHub is and how
    to use its Actions framework for effective data management. Finally, we’ll walk
    through a specific example of writing a custom action for creating a Jira ticket
    upon creating a data product in DataHub.
  prefs: []
  type: TYPE_NORMAL
- en: Hopefully, this article can serve as a general template for how to integrate
    DataHub events of interest into your specific Jira processes.
  prefs: []
  type: TYPE_NORMAL
