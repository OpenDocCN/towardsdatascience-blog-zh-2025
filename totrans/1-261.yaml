- en: What is DataHub?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: DataHub is a data catalog that supports data discovery, governance, and [metadata](https://www.opendatasoft.com/en/blog/what-is-metadata-and-why-is-it-important-data/)
    management. It provides features that allow organizations to implement their own
    [data mesh ](https://www.datamesh-architecture.com/)— a decentralized method of
    data management that empowers individual business domains to take initiative over
    their own data quality/requirements.
  prefs: []
  type: TYPE_NORMAL
- en: 'A metadata platform such as DataHub is incredibly valuable for various reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Cross-domain data discovery and analysis — [data consumers](https://www.secoda.co/glossary/what-is-a-data-consumer)
    (ex: data analysts/scientists) may use DataHub to explore relevant datasets that
    they can use for their analyses. To help data consumers make sense of data across
    various domains, each domain needs to enrich their data assets with sufficient
    business context.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[<mdspan datatext="el1758219938372" class="mdspan-comment">Data governance</mdspan>](https://www.databricks.com/discover/data-governance) — DataHub
    allows organizations to establish a single source of truth for their data, implement
    strong security by enforcing access policies on data assets, and ensure regulatory
    compliance by supporting data classification.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What are DataHub Actions?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In a data-mature organization, metadata is always evolving. Thus, it’s important
    for organizations to react to metadata changes in real time.
  prefs: []
  type: TYPE_NORMAL
- en: DataHub provides the [Actions Framework](https://docs.datahub.com/docs/actions/)
    to help integrate metadata changes that occur in DataHub into a larger [event-based
    architecture](https://www.confluent.io/learn/event-driven-architecture/#e-commerce-order-processing).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The framework allows you to specify configuration to trigger certain actions
    depending on events that occur in DataHub.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Common use cases may include notifying relevant parties upon changes in a dataset,
    integrating metadata changes into organizational workflows, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: One of the common use cases of the DataHub Actions framework is to integrate
    metadata changes into organization-specific notifications. DataHub provides native
    support for this into certain 3rd party platforms, such as [Slack](https://docs.datahub.com/docs/actions/actions/slack)
    and [Teams](https://docs.datahub.com/docs/actions/actions/teams).
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we’ll look at how to use the Actions framework to integrate
    DataHub metadata changes into Jira workflows. Specifically, we’ll implement a
    custom action that creates a Jira ticket upon creating a new [data product](https://docs.datahub.com/docs/dataproducts).
    However, the configuration and code here may be easily altered to trigger Jira
    workflows for other DataHub events.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Developing a Custom Jira Action
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Each DataHub Action is run in a separate [pipeline](https://docs.datahub.com/docs/actions/concepts#pipelines),
    which is a continuously running process that repeats the following steps: poll
    event data from relevant sources, apply transformation/filtering to those events,
    and execute the desired action.'
  prefs: []
  type: TYPE_NORMAL
- en: We can define the configuration for our action pipeline via YAML.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can define the logic to execute for our custom action by extending DataHub’s
    base [Action class](https://github.com/datahub-project/datahub/blob/master/datahub-actions/src/datahub_actions/action/action.py).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s walk through both of these steps.
  prefs: []
  type: TYPE_NORMAL
- en: YAML configuration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Our YAML configuration requires specifying 4 key aspects:'
  prefs: []
  type: TYPE_NORMAL
- en: Action Pipeline Name (should be unique and static)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Event Source Configurations
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Transform + Filter Configurations
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Action Configuration
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'There are two possible event sources for DataHub Actions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[DataHub Cloud](https://docs.datahub.com/docs/actions/sources/datahub-cloud-event-source)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Kafka](https://docs.datahub.com/docs/actions/sources/kafka-event-source)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Kafka is the framework’s default event source. Unless you’re on an instance
    of DataHub Cloud above v0.3.7, you’ll be processing event data from Kakfa.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Kafka event source emits two types of events:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Metadata Change Event](https://docs.datahub.com/docs/actions/events/metadata-change-log-event) — emitted
    whenever anything changes in DataHub.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Entity Change Event](https://docs.datahub.com/docs/actions/events/entity-change-event) — emitted
    when a particular entity is changed in DataHub.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since we are listening for the creation of data products, and the data structure
    of the Entity Change Event is simpler to work with, we will filter for Entity
    Change Events.
  prefs: []
  type: TYPE_NORMAL
- en: Here is what our YAML file will look like (`jira_action.yaml`).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Defining our Custom Action Class
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we need to implement our logic for creating a Jira ticket in a custom
    Action class, which we’ll define in a separate `jira_action.py` file.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our action class will extend DataHub’s base action class, which consists of
    overriding the following methods:'
  prefs: []
  type: TYPE_NORMAL
- en: '`create()` — invoked when instantiating the action. If you specified any action-specific
    config in your YAML file, this method will pass that config as a dictionary to
    all instances of this action.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`act()` — invoked when an event is received. This method will contain the core
    logic of our action i.e. creating the Jira ticket.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`close()` — invoked when our action pipeline is shutdown.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since we didn’t specify any action-specific config, and we don’t have to worry
    about any special cleanup once our action is terminated, our work will mainly
    consist of overriding `act()`.
  prefs: []
  type: TYPE_NORMAL
- en: We will use [Python Jira](https://jira.readthedocs.io/), a python wrapper around
    the Jira REST API, to programmatically interact with our Jira instance. For more
    information/examples for how to programmatically interact with Jira, check out
    the docs.
  prefs: []
  type: TYPE_NORMAL
- en: Here is what our code will look like.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Although the configuration & code here is specific for data product create events,
    these can be altered to integrate other DataHub events into Jira workflows, such
    as adding/removing tags, terms, domains, owners, etc.
  prefs: []
  type: TYPE_NORMAL
- en: You can find the list of different Entity Change Events [here](https://docs.datahub.com/docs/actions/events/entity-change-event).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Listening for these events would involve changing the Filter configuration in
    our YAML to the field values of the specific Entity Change Event.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For instance, to create a Jira ticket for an [Add Tag Event](https://docs.datahub.com/docs/actions/events/entity-change-event#add-tag-event)
    on a [Dataset](https://docs.datahub.com/docs/generated/metamodel/entities/dataset),
    we would update our Filter configuration in our YAML as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Running our Action
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that we’ve created our action configuration and implementation, we can run
    this action by placing these two files (`jira_action.yaml` and `jira_action.py`)
    in the same python runtime environment as our DataHub instance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, we can run our action via CLI using the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: For more information on developing/running a custom action, check out the [docs](https://docs.datahub.com/docs/actions/guides/developing-an-action#step-3-running-the-action).
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Wrap-up
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Thanks for reading! To briefly recap about what we talked about:'
  prefs: []
  type: TYPE_NORMAL
- en: DataHub is a data catalog that facilitates efficient data discovery, management,
    and governance.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DataHub provides its own Actions Framework to integrate metadata changes into
    organizational workflows in real time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using the framework, we can write our own action to integrate DataHub events
    into Jira workflows by simply defining the action pipeline in YAML and the implementation
    logic in a custom python class.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you have any other ideas/experiences with using DataHub Actions to implement
    real-time data governance, I’d love to hear it in the comments!
  prefs: []
  type: TYPE_NORMAL
