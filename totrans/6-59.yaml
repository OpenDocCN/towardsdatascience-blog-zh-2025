- en: Introduction
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简介
- en: 'A couple of months ago, I worked on a project in which [I built a solar energy
    forecasting model](https://medium.com/towards-data-science/forecasting-germanys-solar-energy-production-a-practical-approach-with-prophet-717aa23ecd58)
    aimed at aiding Germany’s transition to clean energy. The results were promising,
    but the model’s performance was limited by a crucial factor: the lack of weather
    data, which is a strong indicator of available solar energy.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 几个月前，我参与了一个项目，该项目旨在帮助德国向清洁能源转型，我构建了一个太阳能预测模型。[https://medium.com/towards-data-science/forecasting-germanys-solar-energy-production-a-practical-approach-with-prophet-717aa23ecd58](https://medium.com/towards-data-science/forecasting-germanys-solar-energy-production-a-practical-approach-with-prophet-717aa23ecd58)。结果很有希望，但模型的性能受到一个关键因素的制约：缺乏天气数据，这是可用太阳能的强烈指标。
- en: The experience underscored a key lesson – real-time data is essential for practical
    forecasting models. Yet, collecting such data demands a robust data engineering
    solution.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这种经验强调了关键教训——实时数据对于实用的预测模型至关重要。然而，收集此类数据需要强大的数据工程解决方案。
- en: Here, I propose a workflow that leverages AWS to build a high-performing and
    scalable data pipeline for real-time data collection. The tools and techniques
    applied here can also be applied to other real-time analytics challenges.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我提出一个工作流程，该工作流程利用 AWS 构建一个高性能且可扩展的数据管道，用于实时数据收集。这里应用的工具和技术也可以应用于其他实时分析挑战。
- en: '* * *'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Data
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据
- en: The pipeline retrieves its data using [OpenWeatherMap](https://openweathermap.org/),
    an online service that provides forecasts and nowcasts for locations around the
    world.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 管道使用 [OpenWeatherMap](https://openweathermap.org/) 获取其数据，这是一个在线服务，为世界各地的位置提供预报和即时预报。
- en: OpenWeatherMap provides an API that enables quick and easy access to weather
    data. The API updates its nowcast every 10 minutes, meaning that the data pulls
    for a given location will be run at the same frequency.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: OpenWeatherMap 提供了一个 API，该 API 可以快速轻松地访问天气数据。API 每 10 分钟更新一次其即时预报，这意味着针对特定位置的请求数据将以相同的频率运行。
- en: For simplicity, the data’s scope is limited to the weather in Berlin, Germany.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化，数据的范围仅限于德国柏林的天气。
- en: '* * *'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Proposed Workflow
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提出的工作流程
- en: '![Workflow (Created by Author)](../Images/c6aa1bffe57750252130a02a3bfa45dc.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![工作流程（由作者创建）](../Images/c6aa1bffe57750252130a02a3bfa45dc.png)'
- en: Workflow (Created by Author)
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程（由作者创建）
- en: The data collection workflow aims to update the database with weather data in
    real time. Since the OpenWeatherMap API updates every 10 minutes, API calls are
    made at the same frequency, with the responses stored immediately in the database.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 数据收集工作流程旨在实时更新数据库中的天气数据。由于 OpenWeatherMap API 每 10 分钟更新一次，API 调用也以相同的频率进行，响应立即存储在数据库中。
- en: Whenever the data is needed for downstream tasks (e.g., visualization, machine
    learning), it is read, transformed into tabular format, and exported to a flat
    file.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当需要数据用于下游任务（例如，可视化、机器学习）时，数据会被读取，转换为表格格式，并导出为平面文件。
- en: 'Note: The following sections delve into the individual AWS services used to
    implement the workflow, including the configuration (e.g., code, logic) that makes
    them work as needed. If you want to skip ahead to the final solution and discussion,
    [click here](#a7be).'
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意：以下部分深入探讨了实现工作流程所使用的单个 AWS 服务，包括使它们按需工作的配置（例如，代码、逻辑）。如果您想跳过直接到最终解决方案和讨论，[请点击此处](#a7be)。
- en: '* * *'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: AWS Cloud Components
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AWS 云组件
- en: 'The workflow utilizes the following AWS components to ensure efficient data
    collection, processing, and storage:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程利用以下 AWS 组件来确保高效的数据收集、处理和存储：
- en: '**AWS DynamoDB**'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**AWS DynamoDB**'
- en: AWS DynamoDB offers the noSQL database needed to house the API responses, which
    are in a semi-structured format. The project creates a DynamoDB table named `WeatherData`
    to serve this purpose.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: AWS DynamoDB 提供了存储半结构化格式的 API 响应所需的 NoSQL 数据库。该项目创建了一个名为 `WeatherData` 的 DynamoDB
    表来满足此目的。
- en: '![DynamoDB table (Created by Author)](../Images/4f5aea36e5c2416cde6c1117d353cff4.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![DynamoDB 表（由作者创建）](../Images/4f5aea36e5c2416cde6c1117d353cff4.png)'
- en: DynamoDB table (Created by Author)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: DynamoDB 表（由作者创建）
- en: The table uses `city` as the partition key and `timestamp` as the sort key.
    This arrangement allows data to be queried efficiently by place and time.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 该表使用 `city` 作为分区键，`timestamp` 作为排序键。这种安排允许按地点和时间有效地查询数据。
- en: '**2\. Amazon S3**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. Amazon S3**'
- en: The project uses a S3 bucket named `[owm-data-bucket](https://us-east-1.console.aws.amazon.com/s3/buckets/owm-data-bucket?region=us-east-1)`
    to store file objects used throughout the project.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 该项目使用名为 `[owm-data-bucket](https://us-east-1.console.aws.amazon.com/s3/buckets/owm-data-bucket?region=us-east-1)`
    的 S3 存储桶来存储整个项目中使用的文件对象。
- en: '**3\. AWS Kinesis**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. AWS Kinesis**'
- en: The pipeline utilizes Amazon Kinesis to create a data stream named `WeatherDataStream`
    that serves as an intermediary between the lambda function and the DynamoDB table.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 管道利用 Amazon Kinesis 创建一个名为 `WeatherDataStream` 的数据流，作为 Lambda 函数和 DynamoDB 表之间的中介。
- en: '![Kinesis Data Stream (Created by Author)](../Images/00de7cc2b496d3661047079cd87e9f07.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![Kinesis 数据流（由作者创建）](../Images/00de7cc2b496d3661047079cd87e9f07.png)'
- en: Kinesis Data Stream (Created by Author)
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: Kinesis 数据流（由作者创建）
- en: '**4\. Lambda functions**'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. Lambda 函数**'
- en: The workflow relies on 3 lambda functions to carry out the data collection and
    transformation tasks.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程依赖于 3 个 Lambda 函数来执行数据收集和转换任务。
- en: The first lambda function, named `fetch_data`, pulls the data using the OpenWeatherMap
    API and sends it to the Kinesis stream. It is triggered every 10 minutes by an
    EventBridge rule.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个 Lambda 函数，命名为 `fetch_data`，使用 OpenWeatherMap API 拉取数据并将其发送到 Kinesis 流。它由
    EventBridge 规则每 10 分钟触发一次。
- en: '![fetch_data Function (Created by Author)](../Images/cba1f7a071f7b8c8f3bf484cbd9ca583.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![fetch_data 函数（由作者创建）](../Images/cba1f7a071f7b8c8f3bf484cbd9ca583.png)'
- en: fetch_data Function (Created by Author)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: fetch_data 函数（由作者创建）
- en: '![fetch_data Function Overview (Created by Author)](../Images/be265236ca0db88342d547e1b2539352.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![fetch_data 函数概述（由作者创建）](../Images/be265236ca0db88342d547e1b2539352.png)'
- en: fetch_data Function Overview (Created by Author)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: fetch_data 函数概述（由作者创建）
- en: The second lambda function, named `write_to_ddb`, reads the data from the Kinesis
    stream and writes it to the `WeatherData` table. It runs as soon as new data is
    added to the stream.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个 Lambda 函数，命名为 `write_to_ddb`，从 Kinesis 流中读取数据并将其写入 `WeatherData` 表。它在新数据添加到流中时立即运行。
- en: '![write_to_ddb Function (Created by Author)](../Images/ba0b23dd2cb582b29d4ec29518115685.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![write_to_ddb 函数（由作者创建）](../Images/ba0b23dd2cb582b29d4ec29518115685.png)'
- en: write_to_ddb Function (Created by Author)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: write_to_ddb 函数（由作者创建）
- en: '![write_to_ddb Function Overview (Created by Author)](../Images/468cfe7ae60da809e2babee72aa83c06.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![write_to_ddb 函数概述（由作者创建）](../Images/468cfe7ae60da809e2babee72aa83c06.png)'
- en: write_to_ddb Function Overview (Created by Author)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: write_to_ddb 函数概述（由作者创建）
- en: The third lambda function, named `send_data_to_s3`, reads the data from the
    DynamoDB table and exports it as a CSV file to the `owm-bucket` bucket. Unlike
    the first two functions, this one has no trigger and runs on demand.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个 Lambda 函数，命名为 `send_data_to_s3`，从 DynamoDB 表中读取数据并将其作为 CSV 文件导出到 `owm-bucket`
    存储桶。与前两个函数不同，此函数没有触发器，按需运行。
- en: '![send_data_to_s3 Function (Created by Author)](../Images/24f56fbffcf2e2a271742c958078a476.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![send_data_to_s3 函数（由作者创建）](../Images/24f56fbffcf2e2a271742c958078a476.png)'
- en: send_data_to_s3 Function (Created by Author)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: send_data_to_s3 函数（由作者创建）
- en: '![send_data_to_s3 Function Overview (Created by Author)](../Images/372904f55764793f03558cc3c7c188c4.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![send_data_to_s3 函数概述（由作者创建）](../Images/372904f55764793f03558cc3c7c188c4.png)'
- en: send_data_to_s3 Function Overview (Created by Author)
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: send_data_to_s3 函数概述（由作者创建）
- en: '**5\. AWS Eventbridge**'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**5. AWS Eventbridge**'
- en: AWS Eventbridge creates a schedule that automates the execution of the `fetch_data`
    function every 10 minutes.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: AWS Eventbridge创建了一个计划，每10分钟自动执行一次`fetch_data`函数。
- en: '![Event Schedule (Created by Author)](../Images/6432efb0adadec22274b361c797ab313.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![事件日程表（作者创建）](../Images/6432efb0adadec22274b361c797ab313.png)'
- en: Event Schedule (Created by Author)
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 事件日程表（作者创建）
- en: The next few sections focus on the code and logic used for each Lambda function.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的几节将重点介绍每个Lambda函数使用的代码和逻辑。
- en: '* * *'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Collecting the Data (Lambda Function 1)
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 收集数据（Lambda函数1）
- en: The code for the `fetch_data` function is shown below.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 下面展示了`fetch_data`函数的代码。
- en: In short, the function uses the `pyowm` library to access the newcast data in
    Berlin and the `boto3` library to push the data to the Kinesis stream. I manually
    create the timestamp variable, which records the time of the program’s execution.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，该函数使用`pyowm`库访问柏林的新播数据，并使用`boto3`库将数据推送到Kinesis流。我手动创建时间戳变量，该变量记录程序执行的时间。
- en: '* * *'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Writing the Data to the Table (Lambda Function 2)
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将数据写入表格（Lambda函数2）
- en: 'The code for the `write_to_ddb` function is shown below:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 下面展示了`write_to_ddb`函数的代码：
- en: These two functions facilitate the data pulls and database writes. After running
    them every 10 minutes, the records become now visible in the `WeatherData` table
    in DynamoDB.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个函数促进了数据提取和数据库写入。运行它们后每10分钟，记录就会在DynamoDB中的`WeatherData`表中可见。
- en: '![WeatherData Table in DynamoDB (Created by Author)](../Images/7996a89869df9070f5e47a9fe09172c0.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![DynamoDB中的WeatherData表（作者创建）](../Images/7996a89869df9070f5e47a9fe09172c0.png)'
- en: WeatherData Table in DynamoDB (Created by Author)
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: DynamoDB中的WeatherData表（作者创建）
- en: '* * *'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Converting the data in CSV format (Lambda Function 3)
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将CSV格式中的数据转换为（Lambda函数3）
- en: The `send_data_to_s3` function reads all of the data in the WeatherData table,
    flattens it, and saves in the S3 bucket as a CSV file.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '`send_data_to_s3`函数读取WeatherData表中的所有数据，将其扁平化，并以CSV文件的形式保存到S3存储桶中。'
- en: Unlike the first two lambda functions, this one is run on demand (i.e., whenever
    the tabulated data is needed for analysis). Below is a screenshot of the outputted
    flat file retrieved from the bucket.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 与前两个Lambda函数不同，这个函数是按需运行的（即，每当需要分析表格数据时）。以下是从存储桶检索到的输出平面文件的截图。
- en: '![CSV File (Created by Author)](../Images/ad956fc547673212e2cde00abe1515ba.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![CSV文件（作者创建）](../Images/ad956fc547673212e2cde00abe1515ba.png)'
- en: CSV File (Created by Author)
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: CSV文件（作者创建）
