  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Final AWS Cloud Solution
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最终的AWS云解决方案
- en: '![AWS Architecture (Created by Author)](../Images/93338db9f6d2b233a0dc4d5bbd0cf75d.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![AWS 架构（作者创建）](../Images/93338db9f6d2b233a0dc4d5bbd0cf75d.png)'
- en: AWS Architecture (Created by Author)
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: AWS 架构（作者创建）
- en: The diagram above showcases how the individual AWS services interact with each
    other to power the weather data pipeline.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的图表展示了单个AWS服务如何相互交互以驱动天气数据管道。
- en: The first lambda function, run every 10 minutes by the Eventbridge schedule,
    collects data from OpenWeatherMap via API and sends it to the Kinesis stream.
    The second lambda function (triggered as soon as new data is added to the stream)
    takes the API responses from the stream and writes them to the DynamoDB table.
    The third function (run on user demand) reads and tabulates the data in the database
    and then stores the output in a bucket as a flat file. This file can be used for
    subsequent analyses or visualization.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个Lambda函数，由Eventbridge计划每10分钟运行一次，通过API从OpenWeatherMap收集数据并将其发送到Kinesis流。第二个Lambda函数（在流中添加新数据时触发）从流中获取API响应并将其写入DynamoDB表。第三个函数（按用户需求运行）读取和整理数据库中的数据，然后将输出存储在存储桶中作为平面文件。此文件可用于后续的分析或可视化。
- en: '* * *'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Visualizing the Data (Bonus)
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据可视化（加分项）
- en: 'I built a Tableau dashboard to track Berlin weather using the flat file created
    above. For simplicity’s sake, I limited my visualization to a few metrics:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用上面创建的平面文件构建了一个Tableau仪表板来跟踪柏林的天气。为了简化，我将我的可视化限制在几个指标上：
- en: Temperature over time
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随时间变化的温度
- en: Average % Cloud Coverage
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平均云覆盖率%
- en: Average Duration of Daily Sunlight
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每日平均日照时长
- en: Average Wind Speed
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平均风速
- en: 'The following is one way to display these metrics:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一种显示这些指标的方法：
- en: '![Dashboard (Created by Author)](../Images/3cb6d6c3299d8592212e99b9b46428b9.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![仪表板（作者创建）](../Images/3cb6d6c3299d8592212e99b9b46428b9.png)'
- en: Dashboard (Created by Author)
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 仪表板（作者创建）
- en: 'Here’s the link to the dashboard for those interested: [https://public.tableau.com/views/BerlinWeatherTracker/Dashboard1?:language=en-US&publish=yes&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link](https://public.tableau.com/views/BerlinWeatherTracker/Dashboard1?:language=en-US&publish=yes&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link)'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是感兴趣的人的仪表板链接：[https://public.tableau.com/views/BerlinWeatherTracker/Dashboard1?:language=en-US&publish=yes&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link](https://public.tableau.com/views/BerlinWeatherTracker/Dashboard1?:language=en-US&publish=yes&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link)
- en: '* * *'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Advantages of the Solution
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案的优势
- en: Leveraging AWS solutions allowed me to create a high-performing, resilient real-time
    data collection pipeline. Here are a few of the main advantages of the presented
    setup.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 利用AWS解决方案使我能够创建一个高性能、弹性的实时数据收集管道。以下是该设置的主要优势之一。
- en: 'Note: This project only focused on data collection in Berlin, Germany. However,
    I evaluate the solution based on its ability to expand the data collection to
    every city in Germany (~2000 cities in total).'
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意：本项目仅关注德国柏林的数据收集。然而，我评估解决方案的能力是基于其扩展到德国每个城市（总计约2000个城市）的能力。
- en: '**Real-time Data Collection**'
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**实时数据收集**'
- en: The Lambda functions can handle the volume of API calls (~2000 calls per 10
    minutes), ensuring continuous, real-time collection across Germany.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: Lambda函数可以处理API调用的量（每10分钟约2000次调用），确保在德国的持续、实时数据收集。
- en: '**2\. Serverless Architecture**'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 无服务器架构**'
- en: The current solution is entirely serverless, meaning that users don’t need to
    create or manage resources manually to accommodate an increase in traffic. The
    lambda functions can scale automatically to handle traffic, while the DynamoDB
    table can automatically adjust its read-throughput.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 当前解决方案完全是无服务器的，这意味着用户不需要手动创建或管理资源来适应流量的增加。Lambda函数可以自动扩展以处理流量，而DynamoDB表可以自动调整其读取吞吐量。
- en: '**3\. Fault Tolerant**'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 容错**'
- en: The use of the Kinesis stream as an intermediary layer ensures that data is
    not preserved during database downtime, minimizing data loss.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Kinesis流作为中间层确保在数据库停机期间数据不会丢失，从而最小化数据损失。
- en: '* * *'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Limitations of the Solution
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案的限制
- en: 'While the real-time data collection solution works well, I’d be hesitant to
    propose this to a client, due to its limitations. Here are a few that stand out
    to me:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管实时数据收集解决方案效果良好，但由于其局限性，我可能会犹豫将其推荐给客户。以下是我认为突出的几个方面：
- en: '**Dependence on OpenWeatherMap**'
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**依赖OpenWeatherMap**'
- en: The solution relies entirely on the OpenWeatherMap API, making it a single point
    of failure. Any issues like API rate limits and outages can disrupt the entire
    data collection process.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 该解决方案完全依赖于OpenWeatherMap API，使其成为单点故障。任何如API速率限制和中断等问题都可能破坏整个数据收集过程。
- en: '**2\. Cost**'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 成本**'
- en: Although the solution only provisions necessary resources, services like Lambda,
    Kinesis, and DynamoDB charge every time they are used. Data collection at a larger
    scale would increase the cost exponentially, potentially making the solution infeasible.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然该解决方案仅提供必要的资源，但像Lambda、Kinesis和DynamoDB这样的服务每次使用都会收费。大规模的数据收集将使成本呈指数增长，可能使解决方案不可行。
- en: This project (i.e., collecting data for Berlin alone) has cost about 50 cents
    per day. Thus, expanding the data collection to every German city (~2000 cities)
    would cost hundreds of dollars per day.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目（即仅收集柏林的数据）每天的成本大约是50美分。因此，将数据收集扩展到每个德国城市（约2000个城市）每天的成本将是数百美元。
- en: '**3\. Limited Historical Data**'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 历史数据有限**'
- en: The solution only collects nowcasts, rendering analyses requiring past data
    impossible. One possible fix could involve building a second pipeline that collects
    all historical weather records from OpenWeatherMap.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 该解决方案仅收集短期预报，使得需要历史数据的分析变得不可能。一个可能的解决方案是构建第二个管道，从OpenWeatherMap收集所有历史天气记录。
- en: '* * *'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: '![Photo by Alexas_Fotos on Unsplash](../Images/1940e864e663b693b543c3d977c3d3e5.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![由Alexas_Fotos在Unsplash上的图片](../Images/1940e864e663b693b543c3d977c3d3e5.png)'
- en: Photo by [Alexas_Fotos](https://unsplash.com/@alexas_fotos?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Alexas_Fotos](https://unsplash.com/@alexas_fotos?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 上提供
- en: My previous project approached solar energy forecasting by focusing primarily
    on forecasting algorithms. However, this current project has deepened my appreciation
    for the crucial role data engineering plays in forecasting applications. For time-sensitive
    use cases like solar energy generation, real-time data collection and processing
    are essential.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 我之前的项目主要通过关注预测算法来处理太阳能预测。然而，这个当前项目加深了我对数据工程在预测应用中扮演的关键角色的认识。对于像太阳能发电这样对时间敏感的使用案例，实时数据收集和处理是必不可少的。
- en: If you have any ideas for improving the performance or reducing the cost of
    this solution, feel free to share them!
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您有任何关于提高此解决方案性能或降低成本的想法，请随时分享！
- en: 'You can access the repository with the lambda functions here:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过这里的lambda函数访问存储库：
- en: '[anair123/Berlin-Real-Time-Weather-Data-Collection-With-AWS](https://github.com/anair123/Berlin-Real-Time-Weather-Data-Collection-With-AWS)'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '[anair123/Berlin-Real-Time-Weather-Data-Collection-With-AWS](https://github.com/anair123/Berlin-Real-Time-Weather-Data-Collection-With-AWS)'
- en: 'Also, if you’re curious about my energy forecasting project that inspired this
    project, you can check it out here:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果您对我的启发了这个项目的能源预测项目感兴趣，您可以在以下链接查看：
- en: '[Forecasting Germany’s Solar Energy Production: A Practical Approach with Prophet
    | by Aashish Nair | Towards Data Science](https://medium.com/towards-data-science/forecasting-germanys-solar-energy-production-a-practical-approach-with-prophet-717aa23ecd58)'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '[通过Prophet预测德国的太阳能产量：一种实用方法 | 作者：Aashish Nair | 数据科学向导](https://medium.com/towards-data-science/forecasting-germanys-solar-energy-production-a-practical-approach-with-prophet-717aa23ecd58)'
- en: Thank you for reading!
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读！
