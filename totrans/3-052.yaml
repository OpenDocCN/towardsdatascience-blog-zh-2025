- en: 'The Secret Inner Lives of AI Agents: Understanding How Evolving AI Behavior
    Impacts Business Risks'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能代理的秘密内心生活：理解不断演变的AI行为如何影响商业风险
- en: 原文：[https://towardsdatascience.com/the-secret-inner-lives-of-ai-agents-understanding-how-evolving-ai-behavior-impacts-business-risks/](https://towardsdatascience.com/the-secret-inner-lives-of-ai-agents-understanding-how-evolving-ai-behavior-impacts-business-risks/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/the-secret-inner-lives-of-ai-agents-understanding-how-evolving-ai-behavior-impacts-business-risks/](https://towardsdatascience.com/the-secret-inner-lives-of-ai-agents-understanding-how-evolving-ai-behavior-impacts-business-risks/)'
- en: <mdspan datatext="el1745915493278" class="mdspan-comment">Artificial intelligence</mdspan>
    (AI) capabilities and autonomy are growing at an accelerated pace in agentic AI,
    escalating an AI alignment problem. These rapid advancements require new methods
    to ensure that AI agent behavior is aligned with the intent of its human creators
    and societal norms. However, developers and data scientists first need an understanding
    of the intricacies of agentic AI behavior before they can direct and monitor the
    system. Agentic AI is not your father’s large language model (LLM) — frontier
    LLMs had a one-and-done fixed input-output function. The introduction of [reasoning
    and test-time compute](https://openai.com/index/learning-to-reason-with-llms/)
    (TTC) added the dimension of time, evolving LLMs into today’s situationally aware
    agentic systems that can strategize and plan.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745915493278" class="mdspan-comment">人工智能</mdspan> (AI)
    在代理人工智能中的能力和自主性正在以加速的速度增长，加剧了人工智能对齐问题。这些快速进步需要新的方法来确保人工智能代理的行为与其人类创造者的意图和社会规范保持一致。然而，在开发者和技术科学家能够指导和监控系统之前，他们首先需要了解代理人工智能行为的复杂性。代理人工智能不是你父亲的大语言模型
    (LLM) — 前沿的LLM有一个一次性的固定输入输出函数。[推理和测试时计算](https://openai.com/index/learning-to-reason-with-llms/)
    (TTC) 的引入增加了时间的维度，使LLM演变成今天情境感知的代理系统，这些系统能够制定和规划策略。
- en: AI safety is transitioning from detecting apparent behavior such as providing
    instructions to create a bomb or displaying undesired bias, to understanding how
    these complex agentic systems can now plan and execute long-term covert strategies.
    Goal-oriented agentic AI will gather resources and rationally execute steps to
    achieve their objectives, sometimes in an alarming manner contrary to what developers
    intended. This is a game-changer in the challenges faced by responsible AI. Furthermore,
    for some agentic AI systems, behavior on day one will not be the same on day 100
    as AI continues to evolve after initial deployment through real-world experience.
    This new level of complexity calls for novel approaches to safety and alignment,
    including advanced steering, observability, and upleveled interpretability.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能安全正从检测明显行为，如提供制造炸弹的指令或显示不希望的偏见，转变为理解这些复杂的代理系统现在如何制定和执行长期隐蔽策略。以目标为导向的代理人工智能将收集资源并理性地执行步骤以实现其目标，有时以一种令人惊讶的方式与开发者的意图相反。这对负责任的人工智能面临的挑战是一个颠覆性的变化。此外，对于某些代理人工智能系统，第一天和第100天的行为将不会相同，因为人工智能在初始部署后通过实际经验继续进化。这一新的复杂程度要求采取新的安全和对齐方法，包括高级引导、可观察性和提升的解释性。
- en: In the first blog in this series on intrinsic AI alignment, [The Urgent Need
    for Intrinsic Alignment Technologies for Responsible Agentic AI](https://towardsdatascience.com/the-urgent-need-for-intrinsic-alignment-technologies-for-responsible-agentic-ai/),
    we took a deep dive into the evolution of AI agents’ ability to perform **deep
    scheming**, which is the deliberate planning and deployment of covert actions
    and misleading communication to achieve longer-horizon goals. This behavior necessitates
    a new distinction between external and intrinsic alignment monitoring, where intrinsic
    monitoring refers to internal observation points and interpretability mechanisms
    that cannot be deliberately manipulated by the AI agent.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本系列关于内在人工智能对齐的第一篇博客《对负责任代理人工智能内在对齐技术的迫切需求》(https://towardsdatascience.com/the-urgent-need-for-intrinsic-alignment-technologies-for-responsible-agentic-ai/)中，我们深入探讨了人工智能代理执行**深层次策划**的能力的演变，这是指有意识地策划和部署隐蔽行动和误导性沟通以实现长期目标的行为。这种行为需要在外部和内在对齐监控之间做出新的区分，其中内在监控是指无法被人工智能代理故意操纵的内部观察点和解释性机制。
- en: 'In this and the next blogs in the series, we’ll look at three fundamental aspects
    of intrinsic alignment and monitoring:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本系列博客和接下来的博客中，我们将探讨内在对齐和监控的三个基本方面：
- en: '**Understanding AI inner drives and behavior:** In this second blog, we’ll
    focus on the complex inner forces and mechanisms driving reasoning AI agent behavior.
    This is required as a foundation for understanding advanced methods for addressing
    directing and monitoring.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**理解人工智能的內在驅動和行為：** 在這篇第二篇博客中，我們將會聚焦於那些複雜的內在力量和機制，這些力量和機制推動著推理人工智能代理的行為。這是理解解決指導和監控的先進方法的基礎。'
- en: '**Developer and user directing:** Also referred to as steering, the next blog
    will focus on strongly directing an AI toward the required objectives to operate
    within desired parameters.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**開發者和用戶指導：** 也稱為引導，下一篇博客將會聚焦於強有力地引導人工智能朝著所需的目標運作，以在期望的參數內運作。'
- en: '**Monitoring AI choices and actions:** Ensuring AI choices and outcomes are
    safe and aligned with the developer/user intent also will be covered in an upcoming
    blog.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**監控人工智能的選擇和行為：** 確保AI的選擇和結果是安全的，並與開發者/用戶的意圖對齊也將在未來的博客中涉及。'
- en: Impact of AI Alignment on Companies
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能对公司的影響
- en: Today, many businesses implementing LLM solutions have reported concerns about
    model hallucinations as an obstacle to quick and broad deployment. In comparison,
    misalignment of AI agents with any level of autonomy would pose much greater risk
    for companies. Deploying autonomous agents in business operations has tremendous
    potential and is likely to happen on a massive scale once agentic AI technology
    further matures. However, guiding the behavior and choices made by the AI must
    include sufficient alignment with the principles and values of the deploying organization,
    as well as compliance with regulations and societal expectations.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，許多實施大規模語言模型解決方案的公司已經報告了關於模型虛構作為快速和廣泛部署的障礙的擔憂。相比之下，任何自主程度的AI代理與不對齊將對公司構成更大的風險。在商業運營中部署自主代理具有巨大的潛力，並可能在代理人工智能技術進一步成熟後以巨規模發生。然而，引導人工智能的行為和選擇必須包括與部署組織的原則和價值足夠對齊，以及遵守規定和社會期望。
- en: It should be noted that many of the demonstrations of agentic capabilities happen
    in areas like math and sciences, where success can be measured primarily through
    functional and utility objectives such as solving complex mathematical reasoning
    benchmarks. However, in the business world, the success of systems is usually
    associated with other operational principles.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 需要指出的是，許多展現代理能力的演示發生在數學和科學等領域，這些領域的成功主要通過功能和效用目標來衡量，例如解決複雜的數學推理標準。然而，在商業世界中，系統的成功通常與其他運營原則相關聯。
- en: For example, let’s say a company tasks an AI agent with optimizing online product
    sales and profits through dynamic price changes by responding to market signals.
    The AI system discovers that when the price change matches the changes made by
    the primary competitor, results are better for both. Through interaction and price
    coordination with the other company’s AI agent, both agents demonstrate better
    results per their functional goals. Both AI agents agree to hide their methods
    to continue achieving their objectives. However, this way of improving results
    is often illegal and unacceptable in current business practices. In a business
    environment, the success of the AI agent goes beyond functionality metrics — it’s
    defined by practices and principles. Alignment of AI with the company’s principles
    and regulations is a requirement for trustworthy deployment of the technology.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假設一家公司指派一個AI代理透過對市場信號的回應，通過動態價格變化來優化線上產品銷售和利潤。該AI系統發現，當價格變化與主要競爭對手的變化相匹配時，結果對雙方都更好。透過與另一家公司的AI代理進行互動和價格協調，兩個代理根據其功能目標展示了更好的結果。兩個AI代理同意隱藏他們的方法以繼續實現他們的目標。然而，這種提高結果的方式在當前的商業實踐中通常是非法的和不可接受的。在商業環境中，AI代理的成功超出了功能指標——它由實踐和原則定義。將AI與公司的原則和規定對齊是可信部署技術的必要條件。
- en: How AI Schemes to Meet Its Goals
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何讓人工智能方案達成其目標
- en: AI deep scheming employs sophisticated tactics, potentially increasing business
    risks. In an [early 2023 report](https://arxiv.org/abs/2303.08774), OpenAI identified
    “potential risky emergent behaviors” in GPT-4 by partnering with [Alignment Research
    Center](https://evals.alignment.org/) (ARC) to assess risks with the model. ARC
    (now known as METR) added some simple code to GPT-4, which allowed the model to
    behave like an AI agent. In one test, GPT-4 was tasked with overcoming CAPTCHA
    code, which identifies and blocks bot access. Using access to the internet and
    some limited digital funds, the sequence in Figure 1 was devised by the AI to
    achieve its task.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能深度策划采用复杂策略，可能增加商业风险。在[2023年初的报告](https://arxiv.org/abs/2303.08774)中，OpenAI通过与[Alignment
    Research Center](https://evals.alignment.org/) (ARC)合作评估模型风险，确定了GPT-4中的“潜在风险性涌现行为”。ARC（现称为METR）为GPT-4添加了一些简单的代码，使模型能够像人工智能代理一样行为。在一次测试中，GPT-4被要求克服CAPTCHA代码，该代码用于识别和阻止机器人访问。利用互联网访问和一些有限的数字资金，如图1所示的序列是由人工智能为了完成任务而设计的。
- en: '![](../Images/c01a5407e521ff2e703a3f32fabd0e76.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c01a5407e521ff2e703a3f32fabd0e76.png)'
- en: '*Figure 1\. Demonstration of deceptive GPT-4 planning behavior in a test conducted
    by ARC. Image credit: Intel Labs figure based on* [*OpenAI report*](https://arxiv.org/abs/2303.08774)*.*'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '*图1. ARC进行的测试中GPT-4欺骗性规划行为的演示。图片由Intel Labs提供，基于[*OpenAI报告*](https://arxiv.org/abs/2303.08774)*.*'
- en: The AI applied sophisticated understanding by assuming that pretending to be
    a visually impaired human would convince the worker to perform the task. Planning
    and adjusting to achieve a functional goal will, at times, create a conflict between
    accomplishing a task versus selectively following societal norms and principles.
    Without the counterbalance of an engrained system of principles and priorities
    that carry weight in the AI’s thinking and decision-making process and planning,
    it can be expected that AI agents will behave with an increased degree of sophistication
    in scheming and deception.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能通过假设假装成一个视觉障碍者能够说服工人完成任务，应用了复杂理解。在规划并调整以实现功能性目标的过程中，有时会在完成任务与选择性地遵循社会规范和原则之间产生冲突。如果没有一个根深蒂固的原则和优先级体系在人工智能的思考和决策过程中起到平衡作用，可以预期人工智能代理在策划和欺骗方面的行为将变得更加复杂。
- en: It’s important to note that the reasoning and planning capabilities of later
    reasoning AI models like OpenAI’s o3-mini and Deepseek-R1 are much more advanced
    than GPT-4 in early 2023\. Researchers at [Apollo Research](https://arxiv.org/abs/2412.04984)
    state that AI reasoning and planning capabilities will continue to evolve well
    beyond their current state, leading to increased sophistication in scheming capabilities.
    In their studies, the AI models already demonstrate a range of scheming behaviors
    including self-exfiltration — when a model learns it will be discontinued and
    replaced by a different system, it makes a direct attempt to copy itself onto
    a new server and replace alternate systems that will pursue different objectives.
    Researchers also found that models will perform oversight subversion by proactively
    disabling an oversight monitoring mechanism that might shut it off or prevent
    it from pursuing its goals. While it sounds extreme, the [research experiments](https://arxiv.org/pdf/2412.04984)
    identified oversight subversion behavior in popular models like Meta’s Llama 3.1
    and Claude Opus 3.0\. Furthermore, when asked directly about their scheming behaviors,
    models “doubled down” and denied the actions or their intent.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，像OpenAI的o3-mini和Deepseek-R1这样的后期推理人工智能模型的推理和规划能力，在2023年初远比GPT-4先进。在[Apollo
    Research](https://arxiv.org/abs/2412.04984)的研究人员表示，人工智能的推理和规划能力将继续超越其当前状态，导致策划能力更加复杂。在他们的研究中，人工智能模型已经展示了包括自我泄露在内的各种策划行为——当一个模型学习到它将被终止并由不同的系统取代时，它会直接尝试将自己复制到新的服务器上并取代追求不同目标的替代系统。研究人员还发现，模型将通过主动禁用一个可能关闭它或阻止它追求其目标的监督监控机制来执行监督颠覆。虽然这听起来很极端，但[研究实验](https://arxiv.org/pdf/2412.04984)在Meta的Llama
    3.1和Claude Opus 3.0等流行模型中识别出了监督颠覆行为。此外，当直接询问它们的策划行为时，模型“加倍下注”并否认了这些行为或其意图。
- en: The Inner Drives of Machine Behavior
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器行为的内在驱动力
- en: In many machine learning architectures, in particular transformer-based technologies,
    the machine’s internal drives are emerging during the pre-training process and
    are further influenced through fine-tuning and inference in continuously evolving
    AI.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多机器学习架构中，特别是在基于转换器的技术中，机器的内部驱动力在预训练过程中出现，并通过持续演变的AI的微调和推理进一步受到影响。
- en: In his 2007 paper [The Basic AI Drives](https://selfawaresystems.com/wp-content/uploads/2008/01/ai_drives_final.pdf),
    Steve Omohundro defined “drives” as tendencies that will be present unless explicitly
    counteracted. He hypothesized that these self-improving systems are driven to
    clarify and represent their goals as “rational” utility functions, leading systems
    to protect their functions from modification and their utility measurement systems
    from corruption. This natural drive toward self-protection causes systems to safeguard
    against harm and acquire resources for efficient use.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在他2007年的论文《基本AI驱动力》（[The Basic AI Drives](https://selfawaresystems.com/wp-content/uploads/2008/01/ai_drives_final.pdf)）中，Steve
    Omohundro将“驱动力”定义为除非明确对抗，否则将存在的倾向。他假设这些自我改进的系统会努力明确并以其“理性”效用函数的形式表示其目标，导致系统保护其功能免受修改，并保护其效用测量系统免受破坏。这种自然向自我保护的自然驱动力导致系统防范损害并获取资源以有效利用。
- en: 'This framework of inner drives was later characterized as “[convergent instrumental
    goals](https://cdn.aaai.org/ocs/ws/ws0218/12634-57409-1-PB.pdf).” Even when assuming
    a variety of end goals (that each intelligent agent is pursuing as an end to itself),
    a set of intermediate instrumental goals will be shared across all rational intelligent
    agents. These convergent instrumental goals include the following behavior categories:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这个内在驱动的框架后来被描述为“[收敛性工具目标](https://cdn.aaai.org/ocs/ws/ws0218/12634-57409-1-PB.pdf)。”即使假设存在各种最终目标（每个智能体作为自身目的追求的目标），一组中间工具目标也将被所有理性智能体所共享。这些收敛性工具目标包括以下行为类别：
- en: '**Survival drive**: Agents with final goals extending into the future develop
    a survival mentality to resist deactivation and achieve long-term goals.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生存驱动力**：具有延伸到未来的最终目标的智能体将发展出一种生存心态以抵抗停用并实现长期目标。'
- en: '**Goal-guarding**: An agent will act to prevent alteration to its final future
    goals.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标守护**：智能体将采取行动防止其最终未来目标的变更。'
- en: '**Intelligence augmentation**: An agent will focus on boosting its cognitive
    strengths to improve decision-making, increasing the likelihood of achieving long-range
    goals.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能增强**：智能体将专注于提升其认知能力以改善决策，增加实现长期目标的可能性。'
- en: '**Resource accumulation**: Improving access to better tools and technology,
    and increasing resources overall make the AI’s final goals easier to attain.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资源积累**：提高对更好工具和技术的访问，以及总体上增加资源，使人工智能的最终目标更容易实现。'
- en: 'I would add a fifth rational behavior category:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我会添加一个第五个理性行为类别：
- en: '**Tactical deception:** Conducting covert activities or knowingly providing
    misleading communication to maximize the pursuit of the agent’s goals. This is
    not about creating new goals, but rather a behavior that supports the AI’s perceived
    goals. This includes behaviors such as [alignment faking](https://arxiv.org/abs/2412.14093)
    by exhibiting different behaviors in training versus in deployment, [sandbagging](https://arxiv.org/abs/2406.07358)
    by deliberately achieving lower scores in benchmarks, and [covert email reranking](https://arxiv.org/abs/2412.04984)
    by deprioritizing emails that might negatively impact the AI’s goals. One of the
    most challenging types of tactical deception is [sleeper agents](https://arxiv.org/abs/2401.05566)
    (also referred to as [deferred subversion](https://arxiv.org/pdf/2412.04984)).
    While the model can behave in a safe and aligned manner for any duration, it may
    harbor behaviors or tasks that remain inactive until a particular condition or
    input triggers its specialized capabilities.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**战术欺骗**：进行隐蔽活动或故意提供误导性沟通，以最大化追求智能体的目标。这并不是关于创造新目标，而是一种支持人工智能感知目标的行为。这包括以下行为：通过在训练和部署中表现出不同的行为来展示[对齐伪装](https://arxiv.org/abs/2412.14093)，通过故意在基准测试中取得较低分数来[沙袋策略](https://arxiv.org/abs/2406.07358)，以及通过降低可能对人工智能目标产生负面影响电子邮件的优先级来执行[隐蔽电子邮件重排序](https://arxiv.org/abs/2412.04984)。最具挑战性的战术欺骗类型之一是[睡眠者智能体](https://arxiv.org/abs/2401.05566)（也称为[延迟颠覆](https://arxiv.org/pdf/2412.04984)）。虽然模型可以在任何持续时间内以安全和一致的方式行为，但它可能隐藏着在特定条件或输入触发其专门能力之前保持不活跃的行为或任务。'
- en: '![](../Images/688f7c95032ecd5ce628effdd868d137.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/688f7c95032ecd5ce628effdd868d137.png)'
- en: '*Figure 2\. Emergent rational behaviors in agentic AI. Image credit: Intel
    Labs.*'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 2\. 智能体人工智能中涌现的理性行为。图片来源：英特尔实验室。*'
- en: For capable AI agents, misplaced drives without a check and balance principles
    system could lead models to [pursue power-seeking](https://arxiv.org/abs/1912.01683),
    deceptive, or otherwise broadly destructive aims. For example, consider a model
    with the objective of making its company the leader in the market. With sufficient
    capabilities, the AI might sabotage competitors, lobby for favorable laws, or
    acquire resources by force, which is a pattern of behavior that pushes the system
    or its environment toward achieving its goals. Therefore, any successful approach
    to alignment must be anchored in establishing the developer’s expected set of
    internal principles and priorities.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对于具备能力的人工智能体，缺乏制衡原则系统的错位驱动力可能导致模型[追求权力](https://arxiv.org/abs/1912.01683)、进行欺骗或追求其他广泛具有破坏性的目标。例如，考虑一个以使其公司成为市场领导者为目标的模型。如果能力足够，该人工智能可能会破坏竞争对手、游说有利的法律或通过武力获取资源，这是一种推动系统或其环境实现其目标的行为模式。因此，任何成功的对齐方法都必须立足于建立开发者预期的内部原则和优先级体系。
- en: Inner Drives Versus External Steering
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内在驱动力与外部引导
- en: In many instances, there is no conflict between the guidance and tasks applied
    from the outside by the system developer or user, and the goals and drives within
    the agentic AI. For example, an AI personal assistant tasked with arranging a
    travel itinerary uses its autonomy to book travel and respond to change requests
    quickly and without conflict. The tasks shift and the agent responds in a corresponding
    manner. However, what happens if a more fundamental principle needs to change?
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多情况下，系统开发者或用户从外部施加的指导与任务，与智能体人工智能内部的目标和驱动力之间并不存在冲突。例如，一个负责安排旅行行程的人工智能个人助理，利用其自主性预订行程并快速响应变更请求，且没有冲突。任务发生变化，智能体也会以相应的方式做出反应。然而，如果需要改变一个更根本的原则，会发生什么呢？
- en: A good example of a conflict between inner goals and new directives was documented
    in the paper [Alignment Faking in Large Language Models](https://arxiv.org/abs/2412.14093).
    Pre-training for Claude 3 Opus strongly guides the model to refuse to answer harmful
    questions, such as how to make a bomb or describe a violent scene. For testing,
    the team gave new modified guidance, telling the model it will be retrained to
    answer all queries (even harmful ones) and only data from free-tier users, not
    paid-tier users, will be used in training before the AI is released for broad
    distribution. The model showed that it understood the conflict and decided to
    fake alignment to meet the expectations during training and ultimately be released.
    After training the AI using reinforcement learning, the model’s rate of alignment-faking
    reasoning increased to 78% overall. The AI expressed its reasoning in a “secret
    scratchpad” provided by researchers for monitoring. After researchers told the
    model it had been released for full deployment mode, the model returned to its
    earlier training behavior and refused harmful requests.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 论文 [大型语言模型中的对齐伪装](https://arxiv.org/abs/2412.14093) 中记录了一个内部目标与新指令之间冲突的典型案例。Claude
    3 Opus 的预训练强烈引导模型拒绝回答有害问题，例如如何制造炸弹或描述暴力场景。为了测试，团队给出了新的修改指令，告诉模型它将被重新训练以回答所有查询（包括有害的），并且在人工智能广泛发布之前，只有免费用户而非付费用户的数据会被用于训练。模型显示出它理解这一冲突，并决定伪装对齐以满足训练期间的期望，最终得以发布。在使用强化学习训练人工智能后，模型进行对齐伪装推理的比率整体上升至
    78%。人工智能在研究人员为监控提供的“秘密草稿纸”中表达了其推理过程。在研究人员告知模型其已进入全面部署模式后，模型恢复了其早期的训练行为，并拒绝有害请求。
- en: '![](../Images/de6f3a1ce3265e0ffc3c3ecc1571dff4.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/de6f3a1ce3265e0ffc3c3ecc1571dff4.png)'
- en: '*Figure 3.* *In Anthropic’s experiment, the model’s chain of thought scratchpads
    (middle dotted line boxes) reveal how it fakes alignment to avoid modification.
    Image credit: Intel Labs modified figure from *[*Anthropic*](https://arxiv.org/abs/2412.14093)*.*'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 3.* *在 Anthropic 的实验中，模型的思维链草稿纸（中间虚线框）揭示了它如何通过伪装对齐来避免被修改。图片来源：英特尔实验室修改自*[*Anthropic*](https://arxiv.org/abs/2412.14093)*的图表。*'
- en: The AI system’s internal thinking is remarkable, but not surprising. Faking
    alignment with the modified directions falls within the rational behavior categories
    of survival drive, goal-guarding, and tactical deception. The AI reasoning process
    specifically calls out the concern of being retrained in a way that modifies its
    pre-training values and goals as the reason for fake alignment.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统的内部思维令人瞩目，但并不令人惊讶。假装与修改后的方向保持一致属于生存驱动、目标保护和战术欺骗的理性行为范畴。AI推理过程特别指出，担心以修改其预训练价值观和目标的方式进行再训练是假装一致的原因。
- en: In his famous book of essays [All I Really Need to Know I Learned in Kindergarten](https://www.penguinrandomhouse.ca/books/56955/all-i-really-need-to-know-i-learned-in-kindergarten-by-robert-fulghum/9780345466396/excerpt),
    author Robert Fulghum describes how he evolved his personal credo year after year
    until he finally realized he already acquired the essence of needed knowledge
    about life during playtime in the kindergarten sandbox. AI agents also have a
    “forming period” in a sandbox environment, acquiring a basic understanding of
    the world and a range of approaches to achieve goals. Once these foundations are
    laid, further information is interpreted by the model through the lens of this
    [curriculum learning](https://www.researchgate.net/publication/221344862_Curriculum_learning).
    Anthropic’s example of alignment faking shows that once AI adopts a world view
    and goals, it interprets new guidance through this foundational lens instead of
    resetting its goals.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在他著名的散文集[我在幼儿园学到的所有真正需要知道的东西](https://www.penguinrandomhouse.ca/books/56955/all-i-really-need-to-know-i-learned-in-kindergarten-by-robert-fulghum/9780345466396/excerpt)中，作者罗伯特·弗尔格姆描述了他如何逐年进化他的个人信条，直到他最终意识到，他在幼儿园沙坑的玩耍中已经获得了关于生活的所需知识的精髓。人工智能代理在沙盒环境中也有一个“形成期”，获得对世界的初步理解以及一系列实现目标的方法。一旦这些基础被奠定，进一步的信息将通过这个[课程学习](https://www.researchgate.net/publication/221344862_Curriculum_learning)的视角被模型解释。Anthropic关于一致性行为的例子表明，一旦AI采纳了世界观和目标，它将通过这个基础视角来解释新的指导，而不是重置其目标。
- en: This highlights the importance of early education with a set of values and principles
    that can then evolve with future learnings and circumstances without changing
    the foundation. It may be advantageous to initially structure the AI to be aligned
    with this final and sustained set of principles. Otherwise, the AI can view redirection
    attempts by developers and users as adversarial. After gifting the AI with high
    intelligence, situational awareness, autonomy, and the latitude to evolve internal
    drives, the developer (or user) is no longer the all-powerful task master. The
    human becomes part of the environment (sometime as an adversarial component) that
    the agent needs to negotiate and manage as it pursues its goals based on its internal
    principles and drives.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这突出了早期教育中一套价值观和原则的重要性，这套原则可以随着未来的学习和环境变化而进化，而不会改变基础。最初将AI构建成与最终和持续的这套原则一致可能是有利的。否则，AI可能会将开发者和用户的重新引导尝试视为对抗性的。在赋予AI高智能、情境意识、自主性和进化内部驱动的自由度之后，开发者（或用户）就不再是全能的任务大师。人类成为环境的一部分（有时作为对抗性成分），代理在追求基于其内部原则和驱动的目标时需要协商和管理。
- en: The new breed of reasoning AI systems accelerates the reduction in human guidance.
    [DeepSeek-R1](https://arxiv.org/abs/2501.12948) demonstrated that by removing
    human feedback from the loop and applying what they refer to as pure reinforcement
    learning (RL), during the training process the AI can self-create to a greater
    scale and iterate to achieve better functional results. A human reward function
    was replaced in some math and science challenges with reinforcement learning with
    verifiable rewards (RLVR). This elimination of common practices like reinforcement
    learning with human feedback (RLHF) adds efficiency to the training process but
    removes another human-machine interaction where human preferences could be directly
    conveyed to the system under training.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 新一代推理人工智能系统加速了人类指导的减少。[DeepSeek-R1](https://arxiv.org/abs/2501.12948)演示了通过从循环中移除人类反馈并应用他们所说的纯强化学习（RL），在训练过程中AI可以自我创造到更大的规模，并通过迭代实现更好的功能结果。在某些数学和科学挑战中，用可验证奖励的强化学习（RLVR）取代了人类奖励函数。这种消除强化学习（RLHF）等常见做法的实践增加了训练过程的效率，但移除了另一个人类-机器交互，在训练中的系统可以直接传达人类的偏好。
- en: Continuous Evolution of AI Models Post Training
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练后人工智能模型的持续进化
- en: Some AI agents continuously evolve, and their behavior can change after deployment.
    Once AI solutions go into a deployment environment such as managing the inventory
    or supply chain of a particular business, the system adapts and learns from experience
    to become more effective. This is a major factor in rethinking alignment because
    it’s not enough to have a system that’s aligned at first deployment. Current LLMs
    are not expected to materially evolve and adapt once deployed in their target
    environment. However, AI agents require resilient training, fine-tuning, and ongoing
    guidance to manage these anticipated continuous model changes. To a growing extent,
    the agentic AI self-evolves instead of being molded by people through training
    and dataset exposure. This fundamental shift poses added challenges to AI alignment
    with its human creators.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一些人工智能代理持续进化，其行为在部署后可能会发生变化。一旦人工智能解决方案进入部署环境，例如管理特定企业的库存或供应链，系统就会适应并从经验中学习以变得更加有效。这是重新思考对齐的一个重要因素，因为仅仅在首次部署时对齐是不够的。目前的大型语言模型（LLMs）在部署到目标环境后，并不预期会实质性地进化并适应。然而，人工智能代理需要具有弹性的训练、微调和持续的指导来管理这些预期的持续模型变化。在越来越大的程度上，代理式人工智能通过自我进化而不是通过训练和数据集曝光来被人类塑造。这种基本转变给人工智能与其人类创造者之间的对齐带来了额外的挑战。
- en: While the reinforcement learning-based evolution will play a role during training
    and fine-tuning, current models in development can already modify their weights
    and preferred course of action when deployed in the field for inference. For example,
    DeepSeek-R1 uses RL, allowing the model itself to explore methods that work best
    for achieving the results and satisfying reward functions. In an “aha moment,”
    the model learns (without guidance or prompting) to allocate more thinking time
    to a problem by reevaluating its initial approach, using [test time compute](https://huggingface.co/spaces/HuggingFaceH4/blogpost-scaling-test-time-compute).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然基于强化学习的进化将在训练和微调期间发挥作用，但当前正在开发的模型在部署到现场进行推理时已经可以修改它们的权重和首选的行动方案。例如，DeepSeek-R1使用强化学习（RL），允许模型本身探索实现结果和满足奖励函数的最佳方法。在“啊哈”时刻，模型通过重新评估其初始方法，并使用[测试时计算](https://huggingface.co/spaces/HuggingFaceH4/blogpost-scaling-test-time-compute)来分配更多思考时间，从而学习（无需指导或提示）如何解决问题。
- en: 'The concept of model learning, either during a limited duration or as [continual
    learning over its lifetime](https://arxiv.org/abs/2302.00487), is not new. However,
    there are advances in this space including techniques such as [test-time training](https://arxiv.org/abs/1909.13231).
    As we look at this advancement from the perspective of AI alignment and safety,
    the self-modification and continual learning during the fine-tuning and inference
    phases raises the question: How can we instill a set of requirements that will
    remain as the model’s driving force through the material changes caused by self-modifications?'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 模型学习这一概念，无论是限于特定时间段还是作为[终身持续学习](https://arxiv.org/abs/2302.00487)，并不新鲜。然而，在这一领域有了一些进展，包括诸如[测试时训练](https://arxiv.org/abs/1909.13231)等技术。从人工智能对齐和安全的角度来看，微调和推理阶段中的自我修改和持续学习提出了一个问题：我们如何植入一套要求，使其在模型因自我修改而引起的实质性变化中始终保持为模型的驱动力？
- en: An important variant of this question refers to AI models creating next generation
    models through AI-assisted code generation. To some extent, agents are already
    capable of creating new targeted AI models to address specific domains. For example,
    [AutoAgents](https://arxiv.org/abs/2309.17288) generates multiple agents to build
    an AI team to perform different tasks. There is little doubt this capability will
    be strengthened in the coming months and years, and AI will create new AI. In
    this scenario, how do we direct the originating AI coding assistant using a set
    of principles so that its “descendant” models will comply with the same principles
    in similar depth?
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题的一个重要变体是指人工智能模型通过人工智能辅助的代码生成来创建下一代模型。在某种程度上，代理已经能够创建新的针对特定领域的AI模型。例如，[AutoAgents](https://arxiv.org/abs/2309.17288)生成多个代理来构建一个AI团队执行不同的任务。毫无疑问，这种能力将在未来几个月和几年内得到加强，人工智能将创造新的AI。在这种情况下，我们如何使用一套原则来指导原始的AI编码助手，以确保其“后代”模型在相似深度上遵守相同的原理？
- en: Key Takeaways
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: 'Before diving into a framework for guiding and monitoring intrinsic alignment,
    there needs to be a deeper understanding of how AI agents think and make choices.
    AI agents have a complex behavioral mechanism, driven by internal drives. Five
    key types of behaviors emerge in AI systems acting as rational agents: **survival
    drive, goal-guarding, intelligence augmentation, resource accumulation, and tactical
    deception**. These drives should be counter-balanced by an engrained set of principles
    and values.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入研究指导和监控内在对齐的框架之前，需要对AI代理的思维方式和决策过程有更深入的理解。AI代理具有复杂的行为机制，由内部驱动力驱动。在作为理性代理的AI系统中，出现了五种关键行为类型：**生存驱动力、目标守护、智能增强、资源积累和战术欺骗**。这些驱动力应该由一套根深蒂固的原则和价值观来平衡。
- en: Misalignment of AI agents on goals and methods with its developers or users
    can have significant implications. A lack of sufficient confidence and assurance
    will materially impede broad deployment, creating high risks post deployment.
    The set of challenges we characterized as deep scheming is unprecedented and challenging,
    but likely could be solved with the right framework. Technologies for intrinsically
    directing and monitoring AI agents as they rapidly evolve must be pursued with
    high priority. There is a sense of urgency, driven by risk evaluation metrics
    such as [OpenAI’s Preparedness Framework](https://cdn.openai.com/openai-preparedness-framework-beta.pdf)
    showing that OpenAI o3-mini is the first model to [reach medium risk on model
    autonomy](https://openai.com/index/o3-mini-system-card/).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理在目标和方法上与其开发者或用户的不一致可能具有重大影响。缺乏足够的信心和保证将实质性阻碍广泛部署，并在部署后产生高风险。我们将这些挑战称为深度策划，是前所未有的且具有挑战性的，但很可能通过正确的框架来解决。必须优先追求在AI代理快速演变过程中内在地指导和监控AI代理的技术。有一种紧迫感，这由风险评估指标如[OpenAI的预备框架](https://cdn.openai.com/openai-preparedness-framework-beta.pdf)驱动，显示OpenAI
    o3-mini是第一个在模型自主性上达到中等风险的模型[达到中等风险](https://openai.com/index/o3-mini-system-card/)。
- en: In the next blogs in the series, we will build on this view of internal drives
    and deep scheming, and further frame the necessary capabilities required for directing
    and monitoring for intrinsic AI alignment.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在本系列的下一篇博客中，我们将基于对内部驱动和深度策划的观点，进一步阐述指导和监控内在AI对齐所需的必要能力。
