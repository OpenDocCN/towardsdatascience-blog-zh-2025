- en: New to LLMs? Start Here
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/new-to-llms-start-here/](https://towardsdatascience.com/new-to-llms-start-here/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1748029776082" class="mdspan-comment">It can be overwhelming</mdspan>
    to start studying LLMs with all this content over the internet, and new things
    are coming up each day. I’ve read some guides from Google, OpenAI, and Anthropic
    and noticed how each focuses on different aspects of agents and LLMs. So, I decided
    to consolidate these concepts here and add other important ideas that I think
    are essential if you’re starting to study this field.
  prefs: []
  type: TYPE_NORMAL
- en: This post covers key concepts with code examples to make things concrete. I’ve
    prepared a [Google Colab notebook](https://colab.research.google.com/drive/1AbILWfbZon0I5qKc6hToAURXG7JhErto#scrollTo=cyChoAaliW9Z)
    with all the examples so you can apply the code while reading the article. To
    use it, you’ll need an API key — check section 5 of my [previous article](https://towardsdatascience.com/step-by-step-guide-to-build-and-deploy-an-llm-powered-chat-with-memory-in-streamlit/)
    if you don’t know how to get one.
  prefs: []
  type: TYPE_NORMAL
- en: While this guide gives you the essentials, I recommend reading the full articles
    from these companies to deepen your understanding.
  prefs: []
  type: TYPE_NORMAL
- en: I hope this helps you to build a solid foundation as you start your journey
    with LLMs!
  prefs: []
  type: TYPE_NORMAL
- en: In this MindMap, you can check a summary of this article’s content.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6c35222504bc2fc7039ce051ece4ffef.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: What is an agent?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '“Agent” can be defined in several ways. Each company whose guide I’ve read
    defines agents differently. Let’s examine these definitions and compare them:'
  prefs: []
  type: TYPE_NORMAL
- en: “*Agents are systems that **independently accomplish tasks** on your behalf.”
    (Open AI)*
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*“In its most fundamental form, a Generative AI agent can be defined as an
    application that attempts to **achieve a goal** by observing the world and acting
    upon it **using the tools** that it has at its disposal. Agents are **autonomous**
    and can **act** **independently** of human intervention, especially when provided
    with proper goals or objectives they are meant to achieve. Agents can also be
    **proactive** in their approach to reaching their goals. Even in the absence of
    explicit instruction sets from a human, an agent can **reason** about what it
    should do next to achieve its ultimate goal.” (Google)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “*Some customers define agents as **fully autonomous** systems that operate
    independently over extended periods, **using various tools** to accomplish complex
    tasks. Others use the term to describe more prescriptive implementations that
    follow predefined workflows. At Anthropic, we categorize all these variations
    as **agentic systems**, but draw an important architectural distinction between
    workflows and agents:*
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*– **Workflows** are systems where LLMs and tools are orchestrated through
    **predefined code paths**.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*– **Agents**, on the other hand, are systems where LLMs dynamically **direct
    their own processes and tool usage**, maintaining control over how they accomplish
    tasks.” (Anthropic)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The three definitions emphasize different aspects of an agent. However, all
    of them agree that agents:'
  prefs: []
  type: TYPE_NORMAL
- en: Operate autonomously to perform tasks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make decisions about what to do next
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use tools to achieve goals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'An agent is composed of 3 main components:'
  prefs: []
  type: TYPE_NORMAL
- en: Model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Instructions/Orchestration
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tools
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/d2b937549db617a67572ca9dae4cef95.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: First, I’ll define each component in a straightforward phrase so you can have
    an overview. Then, in the following section, we’ll dive into each component.
  prefs: []
  type: TYPE_NORMAL
- en: '**Model:** a language model that generates the output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Instructions/Orchestration:** explicit guidelines defining how the agent
    behaves.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tools:** allows the agent to interact with external data and services.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Model refers to the language model (LM). In simple terms, it predicts the next
    word or sequence of words based on the words it has already seen.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to understand how these models work behind the black box, here is
    a video from 3Blue1Brown that explains it.
  prefs: []
  type: TYPE_NORMAL
- en: Agents vs models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Agents and models are not the same. The model is a component of an agent, and
    it is used by it. While models are limited to predicting a response based on their
    training data, agents extend this functionality by acting independently to achieve
    specific goals.
  prefs: []
  type: TYPE_NORMAL
- en: Here is a summary of the main differences between Models and Agents from Google’s
    paper.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eb190cb18aa913a8c53cdb06d2fe1bf0.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The difference between Models and Agents — Source: “Agents” by Julia Wiesinger,
    Patrick Marlow, and Vladimir Vuskovic'
  prefs: []
  type: TYPE_NORMAL
- en: Large Language Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The other L from LLM refers to “Large”, which mainly refers to the number of
    parameters it was trained on. These models can have hundreds of billions or even
    trillions of parameters. They are trained on huge data and need heavy computer
    power to be trained on.
  prefs: []
  type: TYPE_NORMAL
- en: Examples of LLMs are GPT 4o, Gemini Flash 2.0 , Gemini Pro 2.5, Claude 3.7 Sonnet.
  prefs: []
  type: TYPE_NORMAL
- en: Small Language Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We also have Small Language Models (SLM). They are used for simpler tasks where
    you need less data and fewer parameters, are lighter to run, and are easier to
    control.
  prefs: []
  type: TYPE_NORMAL
- en: SLMs have fewer parameters (typically under 10 billion), dramatically reducing
    the computational costs and energy usage. They focus on specific tasks and are
    trained on smaller datasets. This maintains a balance between performance and
    resource efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: Examples of SLMs are Llama 3.1 8B (Meta), Gemma2 9B (Google), Mistral 7B (Mistral
    AI).
  prefs: []
  type: TYPE_NORMAL
- en: Open Source vs Closed Source
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Those models can be open source or closed. Being open source means that the
    code — sometimes model weights and training data, too — is publicly available
    for anyone to use freely, understand how it works internally, and adjust for specific
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: The closed model means that the code isn’t publicly available. Only the company
    that developed it can control its use, and users can only access it through APIs
    or paid services. Sometimes, they have a free tier, like Gemini has.
  prefs: []
  type: TYPE_NORMAL
- en: Here, you can check some open source models on [Hugging Face](https://huggingface.co/models?pipeline_tag=text-generation&sort=trending).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/23543224e727061fb3fa7f17ad8facb5.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: Those with * in size mean this information is not publicly available, but there
    are rumors of hundreds of billions or even trillions of parameters.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Instructions/Orchestration
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Instructions are explicit guidelines and guardrails defining how the agent
    behaves. In its most fundamental form, an agent would consist of just “Instructions”
    for this component, as defined in Open AI’s guide. However, the agent could have
    more than just “Instructions” to handle more complex scenarios. In Google’s paper,
    they call this component “Orchestration” instead, and it involves three layers:'
  prefs: []
  type: TYPE_NORMAL
- en: Instructions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Memory
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model-based Reasoning/Planning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Orchestration follows a cyclical pattern. The agent gathers information, processes
    it internally, and then uses those insights to determine its next move.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/20076532ab53d9505a6991cbd80531b3.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: Instructions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The instructions could be the model’s goals, profile, roles, rules, and information
    you think is important to enhance its behavior.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: In this example, we told the role of the LLM, the expected behavior, how we
    wanted the output — simple and with examples when possible — and set limits on
    what it is allowed to talk about.
  prefs: []
  type: TYPE_NORMAL
- en: Model-based Reasoning/Planning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Some reasoning techniques, such as ReAct and Chain-of-Thought, give the orchestration
    layer a structured way to take in information, perform internal reasoning, and
    produce informed decisions.
  prefs: []
  type: TYPE_NORMAL
- en: '**Chain-of-Thought (CoT)** is a prompt engineering technique that enables reasoning
    capabilities through intermediate steps. It is a way of questioning a language
    model to generate a step-by-step explanation or reasoning process before arriving
    at a final answer. This method helps the model to break down the problem and not
    skip any intermediate tasks to avoid reasoning failures.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompting example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Here is an example of the model output for the user query: “Hi! I’d like to
    buy the Vanilla Glow. Is it $10?”. You can see the model following our guidelines
    from each step to build the final answer.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b154ea83d71fc513cf4d80f6dd03e358.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: '**ReAct** is another prompt engineering technique that combines reasoning and
    acting. It provides a thought process strategy for language models to reason and
    take action on a user query. The agent continues in a loop until it accomplishes
    the task. This technique overcomes weaknesses of reasoning-only methods like CoT,
    such as hallucination, because it reasons in external information obtained through
    actions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompting example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Here, I haven’t implemented the functions (the model is hallucinating to get
    the currency), so it is just an example of the reasoning trace:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4c8f862670e957070aa097f0790bed40.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: These techniques are good to use when you need transparency and control over
    what and why the agent is giving that answer or taking an action. It helps debug
    your system, and if you analyze it, it could provide signals for improving prompts.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to read more, these techniques were proposed by Google’s researchers
    in the paper [**Chain of Thought Prompting Elicits Reasoning in Large Language
    Models**](https://arxiv.org/pdf/2201.11903)and[**REACT: SYNERGIZING REASONING
    AND ACTING IN LANGUAGE MODELS**](https://arxiv.org/pdf/2210.03629)**.**'
  prefs: []
  type: TYPE_NORMAL
- en: Memory
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'LLMs don’t have memory built in. This “Memory” is some content you pass inside
    your prompt to give the model context. We can refer to two types of memory: short-term
    and long-term.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Short-term memory** refers to the immediate context the model has access
    to during an interaction. This could be the latest message, the last *N* messages,
    or a summary of previous messages. The amount could vary based on the model’s
    context limitations — once you hit that limit, you could drop older messages to
    give space to new ones.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Long-term memory** involves storing important information beyond the model’s
    context window for future use. To work around this, you could summarize past conversations
    or get key information and save them externally, typically in a vector database.
    When needed, the relevant information is retrieved using Retrieval-Augmented Generation
    (RAG) techniques to refresh the model’s understanding. We’ll talk about RAG in
    the following section.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Here is just a simple example of managing short-term memory manually. You can
    check the [Google Colab notebook](https://colab.research.google.com/drive/1AbILWfbZon0I5qKc6hToAURXG7JhErto#scrollTo=cyChoAaliW9Z)
    for this code execution and a more detailed explanation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: We actually pass to the model the variable `full_content`, composed of `system_prompt`
    (containing instructions and reasoning guidelines), the memory (`chat_history`),
    and the new `user_input`.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4132ad65bf8ce24438b8bff071fb146c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: 'In summary, you can combine instructions, reasoning guidelines, and memory
    in your prompt to get better results. All of this combined forms one of an agent’s
    components: Orchestration.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Models are really good at processing information, however, they are limited
    by what they have learned from their training data. With access to tools, the
    models can interact with external systems and access knowledge beyond their training
    data.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1575e229b3756bd4cc4728611e454453.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: Functions and Function Calling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Functions are self-contained modules of code that accomplish a specific task.
    They are reusable code that you can use over and over again.
  prefs: []
  type: TYPE_NORMAL
- en: When implementing function calling, you **connect a model with functions**.
    You provide a set of predefined functions, and the model determines **when** to
    use each function and **which arguments** are required based on the function’s
    specifications.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Model does not execute the function itself**. It will inform which functions
    should be called and pass the parameters (inputs) to use that function based on
    the user query, and you will have to create the code to execute this function
    later. However, if we build an agent, then we can program its workflow to execute
    the function and answer based on that, or we can use LangChain, which has an abstraction
    of the code, and you just pass the functions to the pre-built agent. Remember
    that an agent is a composition of (model + instructions + tools).'
  prefs: []
  type: TYPE_NORMAL
- en: In this way, you extend your agent’s capabilities to use external tools, such
    as calculators, and take actions, such as interacting with external systems using
    APIs.
  prefs: []
  type: TYPE_NORMAL
- en: Here, I’ll first show you an LLM and a basic function call so you can understand
    what is happening. It is great to use LangChain because it simplifies your code,
    but you should understand what is happening underneath the abstraction. At the
    end of the post, we’ll build an agent using LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: 'The process of creating a function call:'
  prefs: []
  type: TYPE_NORMAL
- en: Define the function and a function declaration, which describes the function’s
    name, parameters, and purpose to the model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Call LLM with function declarations. In addition, you can pass multiple functions
    and define if the model can choose any function you specified, if it is forced
    to call exactly one specific function, or if it can’t use them at all.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Execute Function Code.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Answer the user.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'In this code, we are creating two functions: `add_shopping_items` and `list_shopping_items`.
    We defined the function and the function declaration, configured Gemini, and created
    a user input. The model had two functions available, but as you can see, it chose
    `add_shopping_items` and got the `args={‘items’: [‘flour’, ‘chocolate chips’]}`,
    which was exactly what we were expecting. Finally, we executed the function based
    on the model output, and those items were added to the `shopping_list`.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a89b7d431c833d299ed48f4bde652c2e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: External data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sometimes, your model doesn’t have the right information to answer properly
    or do a task. Access to external data allows us to provide additional data to
    the model, beyond the foundational training data, eliminating the need to train
    the model or fine-tune it on this additional data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example of the data:'
  prefs: []
  type: TYPE_NORMAL
- en: Website content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Structured Data in formats like PDF, Word Docs, CSV, Spreadsheets, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unstructured Data in formats like HTML, PDF, TXT, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: One of the most common uses of a data store is the implementation of RAGs.
  prefs: []
  type: TYPE_NORMAL
- en: Retrieval Augmented Generation (RAG)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Retrieval Augmented Generation (RAG) means:'
  prefs: []
  type: TYPE_NORMAL
- en: Retrieval -> When the user asks the LLM a question, the RAG system will search
    for an external source to retrieve relevant information for the query.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Augmented -> The relevant information will be incorporated into the prompt.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generation -> The LLM then generates a response based on both the original prompt
    and the additional context retrieved.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Here, I’ll show you the steps of a standard RAG. We have two pipelines, one
    for storing and the other for retrieving.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e6496b0ff8461332f32c2bb4881ad2b2.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: First, we have to load the documents, split them into smaller chunks of text,
    embed each chunk, and store them in a vector database.
  prefs: []
  type: TYPE_NORMAL
- en: 'Important:'
  prefs: []
  type: TYPE_NORMAL
- en: Breaking down large documents into smaller chunks is important because it makes
    a more focused retrieval, and LLMs also have context window limits.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Embeddings create numerical representations for pieces of text. The embedding
    vector tries to capture the meaning, so text with similar content will have similar
    vectors.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The second pipeline retrieves the relevant information based on a user query.
    First, embed the user query and retrieve relevant chunks in the vector store using
    some calculation, such as basic semantic similarity or maximum marginal relevance
    (MMR), between the embedded chunks and the embedded user query. Afterward, you
    can combine the most relevant chunks before passing them into the final LLM prompt.
    Finally, add this combination of chunks to the LLM instructions, and it can generate
    an answer based on this new context and the original prompt.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, you can give your agent more knowledge and the ability to take action
    with tools.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Enhancing model performance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have seen each component of an agent, let’s talk about how we could
    enhance the **model’s** performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are some strategies for enhancing model performance:'
  prefs: []
  type: TYPE_NORMAL
- en: In-context learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Retrieval-based in-context learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fine-tuning based learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/cde21765badebdbe8b3c879dba0e50b0.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: In-context learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In-context learning means you “teach” the model how to perform a task by giving
    examples directly **in the prompt,** without changing the model’s underlying weights.
  prefs: []
  type: TYPE_NORMAL
- en: This method provides a generalized approach with a prompt, tools, and few-shot
    examples at inference time, allowing it to learn “on the fly” how and when to
    use those tools for a specific task.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are some types of in-context learning:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f8780cf5b5dfa27b2d4477fac31dcb54.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: 'We already saw examples of Zero-shot, CoT, and ReAct in the previous sections,
    so now here is an example of one-shot learning:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Here is the output based on your query and the example:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/77b97a32357281c367bb0e14ef49eda1.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: Retrieval-based in-context learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Retrieval-based in-context learning means the model retrieves **external context**
    (like documents) and adds this relevant content retrieved into the model’s **prompt**
    at inference time to enhance its response.
  prefs: []
  type: TYPE_NORMAL
- en: RAGs are important because they reduce hallucinations and enable LLMs to answer
    questions about specific domains or private data (like a company’s internal documents)
    without needing to be retrained.
  prefs: []
  type: TYPE_NORMAL
- en: If you missed it, go back to the last section, where I explained RAG in detail.
  prefs: []
  type: TYPE_NORMAL
- en: Fine-tuning-based learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Fine-tuning-based learning means you **train the model further** on a specific
    dataset to “internalize” new behaviors or knowledge. The model’s weights are updated
    to reflect this training. This method helps the model understand when and how
    to apply certain tools before receiving user queries.
  prefs: []
  type: TYPE_NORMAL
- en: There are some common techniques for fine-tuning. Here are a few examples so
    you can search to study further.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/84e8c2eebdaf6cd3fca0c3ee0383702c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: Analogy to compare the 3 strategies
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Imagine you’re training a tour guide to receive a group of people in Iceland.
  prefs: []
  type: TYPE_NORMAL
- en: '**In-Context Learning:** you give the tour guide a few handwritten notes with
    some examples like “If someone asks about Blue Lagoon, say this. If they ask about
    local food, say that”. The guide doesn’t know the city deeply, but he can **follow
    your examples** as long the tourists stay within those topics.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Retrieval-Based Learning:** you equip the guide with a phone + map + access
    to Google search. The guide doesn’t need to memorize everything but knows how
    to **look up information instantly** when asked.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Fine-Tuning:** you give the guide months of immersive training in the city.
    The knowledge is already **in their head** when they start giving tours.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/ba04d303561071b25dfdbe53b3ed7ad8.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Where does LangChain come in?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LangChain is a framework designed to simplify the development of applications
    powered by large language models (LLMs).
  prefs: []
  type: TYPE_NORMAL
- en: 'Within the LangChain ecosystem, we have:'
  prefs: []
  type: TYPE_NORMAL
- en: '**LangChain**: The basic framework for working with LLMs. It allows you to
    change between providers or combine components when building applications without
    altering the underlying code. For example, you could switch between Gemini or
    GPT models easily. Also, it makes the code simpler. In the next section, I’ll
    compare the code we built in the section on function calling and how we could
    do that with LangChain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LangGraph**: For building, deploying, and managing agent workflows.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LangSmith**: For debugging, testing, and monitoring your LLM applications'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While these abstractions simplify development, understanding their underlying
    mechanics through checking the documentation is essential — the convenience these
    frameworks provide comes with hidden implementation details that can impact performance,
    debugging, and customization options if not properly understood.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond LangChain, you might also consider OpenAI’s Agents SDK or Google’s Agent
    Development Kit (ADK), which offer different approaches to building agent systems.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s build one agent using LangChain
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Here, differently from the code in the “Function Calling” section, we don’t
    have to create function declarations like we did before manually. Using the `@tool`decorator
    above our functions, LangChain automatically converts them into structured descriptions
    that are passed to the model behind the scenes.
  prefs: []
  type: TYPE_NORMAL
- en: '`ChatPromptTemplate` organizes information in your prompt, creating consistency
    in how information is presented to the model. It combines system instructions
    + the user’s query + agent’s working memory. This way, the LLM always gets information
    in a format it can easily work with.'
  prefs: []
  type: TYPE_NORMAL
- en: The `MessagesPlaceholder` component reserves a place in the prompt template
    and the `agent_scratchpad` is the agent’s working memory. It contains the history
    of the agent’s thoughts, tool calls, and the results of those calls. This allows
    the model to see its previous reasoning steps and tool outputs, enabling it to
    build on past actions and make informed decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Another key difference is that we don’t have to implement the logic with conditional
    statements to execute the functions. The `create_openai_tools_agent` function
    creates an agent that can reason about which tools to use and when. In addition,
    the `AgentExecutor` orchestrates the process, managing the conversation between
    the user, agent, and tools. The agent determines which tool to use through its
    reasoning process, and the executor takes care of the function execution and handling
    the result.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: When we use `verbose=True`, we can see the reasoning and actions while the code
    is being executed.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d18c5b19022c0fee2fd3038dd94809e7.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: 'And the final result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cb29c82db4693362109e154f9b2d0440.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: When should you build an agent?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Remember that we discussed agents’s definitions in the first section and saw
    that they **operate autonomously to perform tasks**. It’s cool to create agents,
    even more because of the hype. However, building an agent is not always the most
    efficient solution, and a deterministic solution may suffice.
  prefs: []
  type: TYPE_NORMAL
- en: A deterministic solution means that the system follows clear and **predefined
    rules without an interpretation**. This way is better when the task is well-defined,
    stable, and benefits from clarity. In addition, in this way, it is easier to test
    and debug, and it is good when you need to know exactly what is happening given
    an input, no “black box”. [Anthropic’s guide](https://www.anthropic.com/engineering/building-effective-agents)
    shows many different LLM Workflows where LLMs and tools are orchestrated through
    predefined code paths.
  prefs: []
  type: TYPE_NORMAL
- en: The best practices guide for building agents from Open AI and Anthropic recommend
    first finding the simplest solution possible and only increasing the complexity
    if needed.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you are evaluating if you should build an agent, consider the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Complex decisions**: when dealing with processes that require nuanced judgment,
    handling exceptions, or making decisions that depend heavily on context — such
    as determining whether a customer is eligible for a refund.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Diffult-to-maintain rules**: If you have workflows built on complicated sets
    of rules that are difficult to update or maintain without risk of making mistakes,
    and they are constantly changing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dependence on unstructured data:** If you have tasks that require understanding
    written or spoken language, getting insights from documents — pdfs, emails, images,
    audio, html pages… — or chatting with users naturally.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We saw that agents are systems designed to accomplish tasks on human behalf
    independently. These agents are composed of instructions, the model, and tools
    to access external data and take actions. There are some ways we could enhance
    our model by improving the prompt with examples, using RAG to give more context,
    or fine-tuning it. When building an agent or LLM workflow, LangChain can help
    simplify the code, but you should understand what the abstractions are doing.
    Always keep in mind that simplicity is the best way to build agentic systems,
    and only follow a more complex approach if needed.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Next Steps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you are new to this content, I recommend that you digest all of this first,
    read it a few times, and also read the full articles I recommended so you have
    a solid foundation. Then, try to start building something, like a simple application,
    to start practicing and creating the bridge between this theoretical content and
    the practice. Beginning to build is the best way to learn these concepts.
  prefs: []
  type: TYPE_NORMAL
- en: As I told you before, I have a simple [step-by-step guide for creating a chat
    in Streamlit and deploying it](https://towardsdatascience.com/step-by-step-guide-to-build-and-deploy-an-llm-powered-chat-with-memory-in-streamlit/).
    There is also a video on [YouTube](https://www.youtube.com/watch?v=tsh0oSAdoBk&lc=UgxFXmE6zd9go-c066R4AaABAg)
    explaining this guide in Portuguese. It is a good starting point if you haven’t
    done anything before.
  prefs: []
  type: TYPE_NORMAL
