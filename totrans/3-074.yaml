- en: 'Enterprise AI: From Build-or-Buy to Partner-and-Grow'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 企业AI：从构建或购买到合作与成长
- en: 原文：[https://towardsdatascience.com/enterprise-ai-from-build-or-buy-to-partner-and-grow/](https://towardsdatascience.com/enterprise-ai-from-build-or-buy-to-partner-and-grow/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/enterprise-ai-from-build-or-buy-to-partner-and-grow/](https://towardsdatascience.com/enterprise-ai-from-build-or-buy-to-partner-and-grow/)
- en: <mdspan datatext="el1745367295948" class="mdspan-comment">Not long ago</mdspan>,
    a cooperation partner casually approached me with an AI use case at their organization.
    They wanted to make their onboarding process for new staff more efficient by using
    AI to answer the repetitive questions of newcomers. I suggested a practical chat
    approach that would integrate their internal documentation, and off they went
    with an air of confidence, planning to “talk to their IT team” to move forward.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745367295948" class="mdspan-comment">不久前</mdspan>，一位合作伙伴偶然向我提出他们组织中的一个AI用例。他们希望通过使用AI来回答新员工的重复性问题，从而使新员工入职流程更加高效。我建议了一种实用的聊天方法，该方法将整合他们的内部文档，他们带着自信的氛围离开了，计划“与他们的IT团队”讨论以推进工作。
- en: 'From experience, I knew that this kind of optimism was brittle. The average
    IT team isn’t equipped to implement a full end-to-end AI application on their
    own. And so it was: months later, they were stuck. Their system was frustratingly
    slow, and it also became clear they had misread the users’ actual needs during
    development. New employees were asking different questions than those the system
    had been tuned for. Most users bounced after a couple of attempts and never came
    back. Fixing these issues would require rethinking their entire architecture and
    data strategy, but damage was already done. Employees were frustrated, leadership
    had taken notice, and the initial excitement around AI had faded into skepticism.
    Arguing for another extensive development phase would be difficult, so the case
    was quietly shelved.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 从经验来看，我知道这种乐观是脆弱的。平均而言，IT团队没有能力独立实施一个完整的端到端AI应用。结果也是如此：几个月后，他们陷入了困境。他们的系统运行缓慢，而且在开发过程中也变得明显，他们对用户的实际需求理解有误。新员工提出的问题与系统调整的问题不同。大多数用户尝试了几次后就放弃了，再也没有回来。解决这些问题需要重新思考他们的整个架构和数据策略，但损害已经造成。员工感到沮丧，管理层已经注意到了这一点，围绕AI的最初兴奋已经转变为怀疑。为另一个广泛的发展阶段辩护将是困难的，因此这个案例被悄悄地存档了。
- en: This story is far from unique. Great marketing by AI companies creates an illusion
    of accessibility around AI, and companies jump into initiatives without fully
    grasping the challenges ahead. In reality, specialized expertise is needed to
    create a solid AI strategy and implement any more or less custom use case in your
    company. If this expertise is not available internally, you need to get it from
    external partners or providers.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这个故事远非独一无二。AI公司的出色营销在AI周围创造了一种可及性的错觉，公司在没有完全掌握前方挑战的情况下就跳进了这些倡议。实际上，需要专业的知识来制定一个坚实的AI策略，并在公司中实施任何更多或更少的定制用例。如果这种专业知识内部不可用，你需要从外部合作伙伴或提供商那里获得。
- en: That doesn’t mean that you need to buy everything — that would be like having
    $100 and spending it at the restaurant instead of going to the supermarket. The
    first option will address your hunger on the spot, but the second one will ensure
    you have something to eat for a week.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不意味着你需要购买一切——那就像有100美元却选择在餐厅消费而不是去超市一样。第一个选择可以立即解决你的饥饿，但第二个选择将确保你一周都有东西吃。
- en: 'So, how can you get started, and who should implement your first AI projects?
    Here is my take: Forget build-or-buy and focus on partnering and learning instead.
    I deeply believe that most companies should build AI expertise internally — this
    will provide them with more bandwidth in their AI strategy and activities in the
    future. At the same time, AI is a complex craft that takes time to master, and
    failure is omnipresent (according [to this report by RAND Corporation](https://www.rand.org/pubs/research_reports/RRA2680-1.html),
    more than 80% of AI initiatives fail). Learning from failure is nice in theory,
    but in reality, it leads to waste of time, resources, and credibility. In order
    to achieve AI maturity efficiently, companies should consider cooperating with
    trusted partners who are ready to share their expertise. A realistic and careful
    setup will not only ensure a smoother technical implementation but also address
    the people- and business-related aspects of your AI strategy.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，您如何开始，谁应该实施您的第一个AI项目？以下是我的看法：忘记构建或购买，而是专注于合作和学习。我坚信，大多数公司应该内部建立AI专业知识——这将为他们未来的AI战略和活动提供更多带宽。同时，AI是一项复杂的技艺，需要时间来掌握，失败无处不在（根据兰德公司[https://www.rand.org/pubs/research_reports/RRA2680-1.html](https://www.rand.org/pubs/research_reports/RRA2680-1.html)的报告，超过80%的AI项目失败）。从失败中学习在理论上很好，但在现实中，它会导致时间、资源和信誉的浪费。为了有效地实现AI成熟度，公司应考虑与愿意分享其专业知识的可信合作伙伴合作。一个现实且谨慎的设置不仅将确保更平滑的技术实施，还将解决您AI战略中与人和业务相关的问题。
- en: In the following, I will first outline the rough basics (inputs, outputs, and
    trade-offs) of build-or-buy decisions in AI. Then, you will learn about a more
    differentiated partnering approach. It combines building and buying while reinforcing
    your internal learning curve. Finally, I will close with some practical observations
    and advice on partnering in AI.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下内容中，我将首先概述AI构建或购买决策的粗略基础（输入、输出和权衡）。然后，您将了解一种更差异化的合作方法。它结合了构建和购买，同时加强您的内部学习曲线。最后，我将总结一些关于AI合作的实用观察和建议。
- en: '*Note: If you are interested in more actionable AI insights, please check out
    my newsletter* [*AI for Business*](https://jannalipenkova.substack.com/)*!*'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：如果您对更多可操作的AI见解感兴趣，请查看我的通讯录[*AI for Business*](https://jannalipenkova.substack.com)!*'
- en: The basics of build-or-buy decisions in AI
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI构建或购买决策的基础
- en: 'To start, let’s break down a classical build-or-buy decision into two parts:
    the inputs — what you should assess upfront — and the outputs — what each choice
    will mean for your business down the line.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们将经典的构建或购买决策分解为两部分：输入——您应该提前评估的内容——和输出——每个选择将如何影响您的业务。
- en: Inputs
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 输入
- en: 'To prepare the decision, you need to evaluate your internal capabilities and
    the requirements of the use case. These factors will shape how realistic, risky,
    or rewarding each option might be:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做出决策，您需要评估您的内部能力和用例的要求。这些因素将决定每个选项可能有多现实、多风险或多有益：
- en: '**AI maturity of your organization:** Consider your internal technical capabilities,
    such as skilled AI talent, existing reusable AI assets (e.g. datasets, pre-built
    models, knowledge graphs), and adjacent technical skills that can be transferred
    into the AI space (e.g. data engineering, analytics). Also count in how proficient
    users are at interacting with AI and dealing with its uncertainties. Invest in
    upskilling and dare to build more as your AI maturity grows.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**您组织的AI成熟度：**考虑您的内部技术能力，例如熟练的AI人才、现有的可重用AI资产（例如数据集、预构建模型、知识图谱），以及可以转移到AI领域的相邻技术技能（例如数据工程、分析）。还要考虑用户与AI互动和处理其不确定性的熟练程度。随着您的AI成熟度提高，投资于技能提升并敢于构建更多。'
- en: '**Domain expertise needs:** How deeply must the solution reflect your industry-specific
    knowledge? In use cases requiring expert human intuition or regulatory familiarity,
    your internal domain experts will play a crucial role. They should be part of
    the development process, whether through building internally or partnering closely
    with an external provider.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领域专业知识需求：**解决方案必须多大程度上反映您行业特定的知识？在需要专家人类直觉或监管熟悉度的用例中，您的内部领域专家将发挥关键作用。他们应该参与开发过程，无论是通过内部构建还是与外部提供商紧密合作。'
- en: '**Technical complexity of the use case:** Not all AI is created equal. A project
    that relies on existing APIs or foundation models is vastly simpler than one that
    demands training a custom model architecture from scratch. High complexity increases
    the risk, resource requirements, and potential delays of a build-first approach.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用例的技术复杂性**：并非所有AI都是相同的。依赖于现有API或基础模型的项目远比从头开始训练自定义模型架构的项目简单得多。高复杂性增加了构建优先方法的风险、资源需求和潜在延迟。'
- en: '**Value and strategic differentiation:** Is the use case core to your strategic
    advantage or more of a support function? If it’s unique to your industry (or even
    company) and will increase competitive differentiation, building or co-developing
    may offer more value. By contrast, for a a standard use case (e.g. document classification,
    forecasting), buying will likely deliver faster, more cost-effective results.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**价值和战略差异化**：用例是否对你的战略优势至关重要，或者更多的是支持功能？如果它是你行业（甚至公司）独有的，并且将增加竞争优势，那么构建或共同开发可能提供更多价值。相比之下，对于标准用例（例如，文档分类、预测），购买可能带来更快、更经济的成果。'
- en: Consequences of build-or-buy decisions
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建或购买决策的后果
- en: 'Once you’ve assessed your inputs, you’ll want to map out the downstream impact
    of your build-or-buy choice and evaluate the trade-offs. Here are seven dimensions
    that will influence your timelines, costs, risks, and outcomes:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你评估了你的输入，你将想要绘制出你的构建或购买选择的下游影响，并评估权衡。以下七个维度将影响你的时间表、成本、风险和结果：
- en: '**Customization:** The degree to which the AI solution can be tailored to the
    organization’s specific workflows, goals, and domain needs. Customization often
    determines how well the solution fits unique business requirements.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定制化**：AI解决方案可以根据组织的特定工作流程、目标和领域需求进行定制化的程度。定制化通常决定了解决方案如何适应独特的商业需求。'
- en: '**Ownership: I**ntellectual property (IP) rights and control over the underlying
    AI models, code, and strategic direction. Building internally offers full ownership,
    while buying typically involves licensing another party’s technology.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**所有权**：知识产权（IP）和对其基础AI模型、代码和战略方向的掌控。内部构建提供完全的所有权，而购买通常涉及许可另一方的技术。'
- en: '**Data security:** Covers how data is handled, where it resides, and who has
    access. In regulated or sensitive environments, data privacy and compliance are
    central concerns, particularly when data may be shared with or processed by external
    vendors.'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据安全**：涵盖数据如何处理、存储位置以及谁可以访问。在受监管或敏感的环境中，数据隐私和合规性是核心关注点，尤其是在数据可能与外部供应商共享或处理时。'
- en: '**Cost:** Encompasses both the initial investment and ongoing operational expenses.
    Building involves R&D, talent, infrastructure, and long-term maintenance, whereas
    buying may require licensing, subscriptions, or cloud usage fees.'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**成本**：包括初始投资和持续运营费用。构建涉及研发、人才、基础设施和长期维护，而购买可能需要许可、订阅或云使用费。'
- en: '**Time-to-market:** Measures how quickly the solution can be deployed and start
    delivering value. Fast deployment is often critical in competitive or dynamic
    markets; delays can lead to lost opportunities.'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**上市时间**：衡量解决方案可以部署并开始创造价值所需的时间。在竞争或动态市场中，快速部署通常至关重要；延迟可能导致错失机会。'
- en: '**Support & maintenance:** Involves who is responsible for updates, scaling,
    bug fixes, and ongoing model performance. Internal builds require dedicated resources
    for upkeep, while external solutions often include support services.'
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**支持与维护**：涉及谁负责更新、扩展、错误修复和持续模型性能。内部构建需要专门资源进行维护，而外部解决方案通常包括支持服务。'
- en: '**AI learning curve:** Reflects the complexity of acquiring AI expertise and
    operationalizing it within the organization. Building in-house often comes with
    lots of trial-and-error and brittle outcomes because the team doesn’t possess
    foundational AI knowledge. On the other hand, buying or partnering can accelerate
    learning via guided expertise and mature tooling and create a solid basis for
    future AI activities.'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**AI学习曲线**：反映了在组织内部获取AI专业知识和实施它的复杂性。内部构建通常伴随着大量的试错和脆弱的结果，因为团队缺乏基础AI知识。另一方面，购买或合作可以通过指导专家和成熟的工具加速学习，并为未来的AI活动奠定坚实的基础。'
- en: Now, in practice, binary build-or-buy thinking often leads to unresolvable trade-offs.
    Take the onboarding use case mentioned earlier. One reason the team leaned toward
    *building* was a need to keep their company data confidential. At the same time,
    they didn’t have the internal AI expertise to develop a production-ready chat
    system. They would likely have been more successful by outsourcing the chat architecture
    and ongoing support while building their database internally. Thus, you shouldn’t
    decide to build or buy at the level of the entire AI system. Instead, break it
    down into components and evaluate each one based on your capabilities, constraints,
    and strategic priorities.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在实践中，二元构建或购买思维往往导致无法解决的权衡。以之前提到的入职用例为例。团队倾向于*构建*的一个原因是需要保持公司数据的机密性。同时，他们没有内部人工智能专业知识来开发一个生产就绪的聊天系统。他们可能会通过外包聊天架构和持续支持，同时内部构建数据库而取得更大的成功。因此，你不应该在整个AI系统层面做出构建或购买的决定。相反，将其分解为组件，并根据你的能力、约束和战略优先级评估每个组件。
- en: Towards a handshake between domain and AI expertise
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向领域与人工智能专业知识握手
- en: 'At the component level, I encourage you to differentiate build-or-buy decisions
    through the lens of expertise requirements. Most B2B AI systems combine two kinds
    of expertise: domain expertise, which lives within your company, and technical
    AI expertise, which can be brought in through an external partner if you don’t
    (yet) have specialized AI skills. In the following, I will examine the expertise
    needs for each of the core components of an AI system (cf. [this article](https://towardsdatascience.com/building-ai-products-with-a-holistic-mental-model-33f8729e3ad9/)
    for an explanation of the components).'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在组件层面，我鼓励你通过专业知识需求的角度来区分构建或购买决策。大多数B2B人工智能系统结合了两种专业知识：领域专业知识，它存在于你的公司内部；以及技术人工智能专业知识，如果你（尚未）拥有专门的AI技能，可以通过外部合作伙伴引入。以下，我将检查人工智能系统每个核心组件的专家需求（参见[这篇文章](https://towardsdatascience.com/building-ai-products-with-a-holistic-mental-model-33f8729e3ad9/)来解释组件）。
- en: '![](../Images/3313180be49837e5bd11f332dc60d54c.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3313180be49837e5bd11f332dc60d54c.png)'
- en: 'Table 1: Expertise needs and collaboration formats for the components of AI systems'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 表1：人工智能系统组件的专家需求和协作格式
- en: 'Business opportunity: Framing the right AI problems'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 商业机会：构建合适的AI问题
- en: 'Did you know that the #1 reason for AI project failure is not technical — it’s
    choosing the wrong problem to solve (cf. [**The Root Causes of Failure for Artificial
    Intelligence Projects and How They Can Succeed**](https://www.rand.org/pubs/research_reports/RRA2680-1.html))?
    You might be surprised — after all, your expert teams understand their problems
    deeply. The point is, they don’t have the means to connect the dots between their
    pain points and AI technology. Here are some of the most common failure patterns:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道吗，导致人工智能项目失败的第一大原因不是技术问题——而是选择了错误的问题去解决（参见[**人工智能项目失败的根本原因及其成功之道**](https://www.rand.org/pubs/research_reports/RRA2680-1.html)）？你可能感到惊讶——毕竟，你的专家团队对问题理解得很深。关键在于，他们没有手段将痛点与人工智能技术之间的联系串联起来。以下是一些最常见的失败模式：
- en: '**Vague or unsuitable problem framing**: Is this a task that AI is actually
    good at?'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模糊或不合适的问题界定**：这是否是人工智能真正擅长的任务？'
- en: '**Missing effort/ROI estimation**: Is the outcome worth the time and resources
    for AI development and deployment?'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺失的努力/投资回报率估算**：结果值得投入时间和资源进行AI开发和部署吗？'
- en: '**Unrealistic expectations**: What does “good enough” mean for an imperfect
    AI?'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不切实际的期望**：对于不完美的AI，“足够好”意味着什么？'
- en: On the other hand, there are many organizations that use AI for its own sake
    and create solutions in search of a problem. This burns resources and erodes confidence
    internally.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，许多组织为了使用人工智能而使用人工智能，并为了解决问题而创造解决方案。这浪费了资源，并损害了内部信心。
- en: A good AI partner helps assess which business processes are ripe for AI intervention,
    estimates potential impact, and models how AI might deliver value. Both parties
    can shape a focused, high-impact use case through joint discovery workshops, design
    sprints, and exploratory prototyping.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的AI合作伙伴可以帮助评估哪些业务流程适合AI干预，估算潜在影响，并模拟AI可能带来的价值。双方可以通过联合发现研讨会、设计冲刺和探索性原型设计来塑造一个专注、高影响力的用例。
- en: 'Data: The fuel of your AI system'
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据：你人工智能系统的燃料
- en: Clean, well-structured domain data is a core asset. It encodes your process
    knowledge, customer behavior, system performance, and more. But raw data alone
    isn’t enough — it needs to be transformed into meaningful learning signals. That’s
    where AI expertise comes in to design pipelines, choose the right data representations,
    and align everything with AI’s learning goals.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 清洁、结构良好的领域数据是核心资产。它编码了你的流程知识、客户行为、系统性能等。但仅仅原始数据是不够的——它需要被转换成有意义的学习信号。这就是人工智能专业知识发挥作用的地方，设计管道、选择合适的数据表示，并将一切与人工智能的学习目标对齐。
- en: Often, this includes data labeling — annotating examples with the signals a
    model needs to learn from. It might seem tedious, but resist the urge to outsource
    it. Labeling is one of the most context-sensitive parts of the pipeline, and it
    requires domain expertise to be done right. In fact, many fine-tuning tasks today
    perform best on small but high-quality datasets — so work closely with your AI
    partner to keep the effort focused and manageable.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，这包括数据标注——用模型需要学习的信号标注示例。这可能看起来很繁琐，但请抵制外包的诱惑。标注是管道中最具上下文敏感性的部分之一，并且需要领域专业知识才能正确完成。事实上，许多微调任务今天在小型但高质量的数据集上表现最佳——因此，与你的AI合作伙伴紧密合作，保持努力集中且可管理。
- en: 'Data cleaning and preprocessing is another area where experience makes all
    the difference. You’ve probably heard the saying: *“Most of a data scientist’s
    time is spent cleaning data.”* That doesn’t mean it should be slow. With engineers
    who are experienced in your data modality (text, numbers, images…), this process
    can be dramatically accelerated. They’ll instinctively know which preprocessing
    techniques to apply and when, turning weeks of trial and error into hours of productive
    setup.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 数据清洗和预处理是另一个经验至上的领域。你可能听说过这样的话：“数据科学家的大部分时间都花在数据清洗上。” 这并不意味着它应该缓慢。拥有经验丰富的工程师（文本、数字、图像等），这个过程可以显著加速。他们会本能地知道何时应用哪些预处理技术，将数周的努力和错误变成数小时的生产性设置。
- en: 'Intelligence: AI models and architectures'
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 智能化：AI模型和架构
- en: This is where most people think AI projects begin — but it’s only the middle
    of the story. Deep AI expertise is needed to select or fine-tune models, evaluate
    performance, and design system architectures. For example, should your use case
    use a pre-trained model? Do you need a multimodel setup? What evaluation metrics
    make sense? In more complex systems, different AI components such as models and
    knowledge bases can be combined into a multi-step workflow.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数人认为人工智能项目开始的地方——但这只是故事的中段。选择或微调模型、评估性能和设计系统架构需要深厚的深度人工智能专业知识。例如，你的用例应该使用预训练模型吗？你需要多模型设置吗？哪些评估指标是有意义的？在更复杂的系统中，不同的AI组件，如模型和知识库，可以组合成一个多步骤的工作流程。
- en: Domain expertise comes in during system validation and evaluation. Experts and
    future users need to check if AI outputs make sense and align with their real-world
    expectations. A model might be statistically strong, but operationally useless
    if its outputs don’t map to business logic. When designing compound systems, domain
    experts also need to make sure that the system setup mirrors their real-world
    processes and needs.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在系统验证和评估期间，领域专业知识至关重要。专家和未来的用户需要检查AI输出是否有意义并且符合他们的现实世界期望。如果模型的输出没有映射到业务逻辑，那么即使模型在统计上很强，在操作上也可能毫无用处。在设计复合系统时，领域专家还需要确保系统设置反映了他们的现实世界流程和需求。
- en: 'Tailoring AI models and building a custom AI architecture is your “co-pilot”
    phase: AI teams architect and optimize, while domain teams steer and refine based
    on business goals. Over time, the goal is to build shared ownership of system
    behavior.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 定制AI模型和构建自定义AI架构是你的“副驾驶”阶段：AI团队负责架构和优化，而领域团队根据业务目标进行指导和细化。随着时间的推移，目标是建立对系统行为的共同所有权。
- en: '**Case study: Building with AI expertise support in insurance**'
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**案例研究：在保险领域利用AI专业知识进行构建**'
- en: At a leading insurance provider, the data science team was tasked with building
    a claims risk prediction system — a project they wanted to keep in-house to retain
    full ownership and align closely with proprietary data and workflows. However,
    early prototypes ran into performance and scalability issues. That’s where my
    company [Anacode](https://www.notion.so/Description-of-Anacode-s-trend-process-old-e73926b8118d488d9fe6c0370ac048c1?pvs=21)
    came in as an architectural and strategic partner. We helped the internal team
    evaluate model candidates, design a modular architecture, and set up reproducible
    ML pipelines. Just as importantly, we ran targeted upskilling sessions focused
    on model evaluation, MLOps, and responsible AI practices. Over time, the internal
    team gained confidence, reworked earlier prototypes into a robust solution, and
    fully took over operations. The result was a system they owned completely, while
    the expert guidance we provided during the project had also elevated their internal
    AI capabilities.
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在一家领先的保险公司，数据科学团队被委以建立索赔风险预测系统的任务——这是一个他们希望内部完成的项目，以保留完全所有权并紧密与专有数据和流程对齐。然而，早期的原型遇到了性能和可扩展性问题。这就是我的公司[Anacode](https://www.notion.so/Description-of-Anacode-s-trend-process-old-e73926b8118d488d9fe6c0370ac048c1?pvs=21)作为架构和战略合作伙伴介入的地方。我们帮助内部团队评估模型候选者，设计模块化架构，并建立可重复的ML管道。同样重要的是，我们进行了针对模型评估、MLOps和负责任AI实践的定向技能提升课程。随着时间的推移，内部团队增强了信心，将早期的原型重新工作成稳健的解决方案，并完全接管了运营。结果是，他们完全拥有这个系统，而我们在这个项目期间提供的专家指导也提升了他们内部的AI能力。
- en: 'User experience: Delivering AI value through the user interface'
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户体验：通过用户界面交付AI价值
- en: 'This one is tricky. With a few exceptions, neither domain experts nor deep
    AI engineers are likely to design an experience that is truly intuitive, efficient,
    and enjoyable for real users. Ideally, you can bring in specialized UX designers.
    If these are not available, look for people from adjacent disciplines who have
    a natural feel for user experience. Today, a lot of AI tools are available to
    support UX design and prototyping, so taste matters more than technical craft.
    Once you have the right people, you need to feed them with inputs from both sides:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这一点比较棘手。除了少数例外，既不是领域专家也不是深度AI工程师可能会设计出真正直观、高效且对真实用户友好的体验。理想情况下，你可以引入专门的UX设计师。如果这些人不具备，可以寻找对用户体验有天然感觉的相邻学科的人。如今，许多AI工具可用于支持UX设计和原型制作，因此品味比技术工艺更重要。一旦有了合适的人选，你需要从两方面为他们提供输入：
- en: '**Backend**: AI experts provide insight into how the system works internally — its
    strengths, limitations, levels of certainty — and support the design of elements
    like explanations, uncertainty indicators, and confidence scores (cf. [this article](https://medium.com/user-experience-design-1/building-and-calibrating-trust-in-ai-717d996652ef)
    on building trust in AI through UX).'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**后端**：AI专家提供对系统内部工作方式的见解——其优势、局限性、确定性水平——并支持设计解释、不确定性指标和置信度评分（参考[这篇文章](https://medium.com/user-experience-design-1/building-and-calibrating-trust-in-ai-717d996652ef)关于通过UX建立对AI的信任）。'
- en: '**Frontend**: Domain experts understand the users, their workflows, and their
    pain points. They help validate user flows, highlight friction, and propose refinements
    based on how people actually interact with the system.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**前端**：领域专家了解用户、他们的工作流程和他们的痛点。他们帮助验证用户流程，突出摩擦点，并根据人们实际与系统互动的方式提出改进建议。'
- en: Focus on fast iteration and be prepared for some erring around. AI UX is an
    emerging field, and there’s no settled formula for what “great” looks like. The
    best experiences arise from tight, iterative feedback loops, where design, testing,
    and refinement happen continuously, absorbing inputs from both domain experts
    and AI specialists.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于快速迭代，并准备好进行一些错误尝试。AI UX是一个新兴领域，目前还没有关于“优秀”的固定公式。最佳体验来自于紧密的、迭代的反馈循环，其中设计、测试和改进持续进行，吸收来自领域专家和AI专家的输入。
- en: 'Support and maintenance: Keeping AI alive'
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 支持和维护：让AI保持活力
- en: Once deployed, AI systems require close monitoring and continuous improvement.
    Real-world user behavior often diverges from test environments and changes over
    time. This inherent uncertainty means your system needs to be actively watched,
    so that issues can be identified and addressed early.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦部署，AI系统需要密切监控和持续改进。现实世界的用户行为往往与测试环境不同，并且随着时间的推移而变化。这种固有的不确定性意味着你的系统需要被积极监控，以便及早发现和解决问题。
- en: 'The technical infrastructure for monitoring — including performance tracking,
    drift detection, automated retraining, and MLOps pipelines — is typically set
    up by your AI partner. Once in place, many day-to-day monitoring tasks don’t require
    deep technical skills. What they do require is domain expertise: understanding
    whether model outputs still make sense, noticing subtle shifts in usage patterns,
    and knowing when something “feels off.”'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 监控的技术基础设施——包括性能跟踪、漂移检测、自动再训练和MLOps管道——通常由你的AI合作伙伴设置。一旦到位，许多日常监控任务不需要深厚的专业技能。它们需要的是领域专业知识：理解模型输出是否仍然有意义，注意到使用模式中的微妙变化，并知道何时感觉“不对”。
- en: A well-designed support phase is more than just operational — it can be a critical
    learning phase for your internal teams. It creates space for gradual skill-building,
    deeper system understanding, and ultimately, a smoother path toward taking greater
    ownership of the AI system over time.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 一个精心设计的支持阶段不仅仅是操作性的——它还可以成为你内部团队的关键学习阶段。它为逐步建立技能、更深入的系统理解以及最终更平滑地走向对AI系统更大程度的所有权创造了空间。
- en: 'Thus, rather than framing AI implementation as a binary build-or-buy decision,
    you should view it as a mosaic of activities. Some of these are deeply technical,
    while others are closely tied to your business context. By mapping responsibilities
    across the AI lifecycle, you can:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，与其将AI实施视为一个构建或购买的二元决策，你应将其视为一系列活动的马赛克。其中一些活动非常技术性，而其他一些则与你的业务背景紧密相关。通过在AI生命周期中映射责任，你可以：
- en: Clarify which roles and skills are essential to success
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确哪些角色和技能对于成功至关重要
- en: Identify capabilities you already have in-house
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别你内部已有的能力
- en: Spot gaps where external expertise is most valuable
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发现外部专业知识最有价值的差距
- en: Plan for knowledge transfer and long-term ownership
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定知识转移和长期所有权的计划
- en: If you want to dive deeper into the integration of domain expertise, check out
    my article [Injecting domain expertise into your AI systems](https://towardsdatascience.com/injecting-domain-expertise-into-your-ai-system-792febff48f0/).
    Importantly, the line between “domain” and “AI” expertise is not fixed. You might
    already have team members experimenting with machine learning, or others eager
    to grow into more technical roles. With the right partnership model and upskilling
    strategy, you can evolve towards AI autonomy, gradually taking on more responsibility
    and control as your internal maturity grows.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要深入了解领域专业知识与AI系统的整合，请查看我的文章[将领域专业知识注入你的AI系统](https://towardsdatascience.com/injecting-domain-expertise-into-your-ai-system-792febff48f0/)。重要的是，“领域”和“AI”专业知识之间的界限并非固定。你可能已经有一些团队成员在尝试机器学习，或者其他人渴望成长为更技术性的角色。通过合适的合作伙伴模式和提升技能策略，你可以逐步向AI自主性发展，随着内部成熟度的增长，逐渐承担更多责任和控制权。
- en: In partnering, start early and focus on communication
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在合作伙伴关系中，尽早开始并专注于沟通
- en: 'By now, you know that build-or-buy decisions should be made at the level of
    individual components of your AI system. But if you don’t yet have AI expertise
    on your team, how can you envision what your system and its components will eventually
    look like? The answer: start partnering early. As you begin shaping your AI strategy
    and design, bring in a trusted partner to guide the process. Choose someone you
    can communicate with easily and openly. With the right collaboration from the
    start, you’ll increase your chances of navigating AI challenges smoothly and successfully.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在为止，你知道在AI系统的各个组件层面做出构建或购买的决定。但如果你团队中还没有AI专业知识，你如何设想你的系统和其组件最终会是什么样子？答案是：尽早开始合作。当你开始塑造你的AI战略和设计时，引入一个值得信赖的合作伙伴来指导这个过程。选择一个你可以轻松、开放沟通的人。从一开始就进行正确的合作，你会增加顺利且成功导航AI挑战的机会。
- en: Choose an AI partner with foundational AI expertise
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选择一个具有基础AI专业知识的AI合作伙伴
- en: 'Your AI partner should not just deliver code and technical assets, but help
    your organization learn and grow during your cooperation. Here are a few common
    types of external partnerships, and what to expect from each:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你的AI合作伙伴不仅应该提供代码和技术资产，还应在合作期间帮助你的组织学习和成长。以下是一些常见的外部合作伙伴类型以及你可以期待得到的内容：
- en: '**Outsourcing**: This model abstracts away the complexity — you get results
    quickly, like a dose of fast carbs. While it’s efficient, it rarely delivers long-term
    strategic value. You end up with a tool, not with stronger capabilities.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**外包**：这种模型抽象掉了复杂性——你能够快速得到结果，就像快速碳水化合物的摄入。虽然它很高效，但很少能带来长期战略价值。你最终得到的是一个工具，而不是更强的能力。'
- en: '**Academic partnerships**: Great for cutting-edge innovation and long-term
    research, but often less suited for an AI system’s real-world deployment and adoption.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学术合作**：非常适合前沿创新和长期研究，但通常不太适合AI系统的实际部署和采用。'
- en: '**Advisory partnerships**: In my view, the most promising path, especially
    for companies that already have a tech team and want to develop their AI acumen.
    A good advisor empowers your engineers, helps them avoid costly missteps, and
    brings practical, experience-driven insight to questions like: What’s the right
    tech stack for our use case? How do we curate our data to boost quality and kick
    off a powerful data flywheel How do we scale without compromising trust and governance?'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**咨询合作**：在我看来，这是最有前途的道路，特别是对于已经拥有技术团队并希望发展其AI洞察力的公司。一个好的顾问能够赋予你的工程师权力，帮助他们避免代价高昂的错误，并为诸如“针对我们的用例，正确的技术堆栈是什么？”、“我们如何整理数据以提升质量并启动强大的数据飞轮？”以及“我们如何在不损害信任和治理的情况下进行扩展？”等问题提供基于经验的实用见解。'
- en: 'A detailed partner selection framework is beyond the scope of this article,
    but here’s one piece of hard-earned advice: Be wary of IT outsourcers and consultancies
    that suddenly added “AI” to their offering after the GenAI boom in 2022\. They
    might charm you with fancy buzzwords, but if AI isn’t in their DNA, you may end
    up paying for their learning curve rather than benefiting from complementary expertise.
    Choose a partner who’s done the hard work already and is ready to transfer that
    expertise to you.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 详细的合作伙伴选择框架超出了本文的范围，但这里有一条来之不易的经验之谈：对2022年通用人工智能热潮后突然将“AI”添加到其服务中的IT外包公司和咨询公司保持警惕。他们可能会用花哨的术语吸引你，但如果AI不是他们的基因，你可能会为他们的学习曲线付费，而不是从互补的专业知识中受益。选择一个已经完成了艰苦工作并准备好将这种专业知识转移到你这里的合作伙伴。
- en: Double down on communication and alignment
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加倍重视沟通和一致性
- en: 'Effective communication and stakeholder alignment are critical in partnering
    models. Here are some important communication roles to get right in your company:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在合作伙伴模式中，有效的沟通和利益相关者一致至关重要。以下是在您的公司中需要做对的一些重要沟通角色：
- en: Leadership and domain experts must identify and clearly communicate the business
    problems worth solving (more on best practices for AI ideation [here](https://jannalipenkova.substack.com/publish/posts/detail/150407072?referrer=%2Fpublish%2Fposts)).
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 领导者和领域专家必须识别并清楚地传达值得解决的商业问题（关于AI创意最佳实践的更多信息[这里](https://jannalipenkova.substack.com/publish/posts/detail/150407072?referrer=%2Fpublish%2Fposts))。
- en: End users need to share their needs early, give feedback during usage, and ideally
    become co-creators in shaping the AI experience.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最终用户需要尽早分享他们的需求，在使用过程中提供反馈，并理想情况下成为塑造AI体验的共同创造者。
- en: 'IT and governance teams must ensure compliance, security, and safety while
    enabling, not blocking, AI innovation. Keep in mind: these capabilities don’t
    appear fully formed.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: IT和治理团队必须在启用而非阻碍AI创新的同时确保合规性、安全性和安全性。请记住：这些能力并非完全成熟。
- en: In AI projects, the risk of misalignment and unproductive silos is high. AI
    is still a relatively new field, and the terminology alone can create confusion.
    If you’ve ever found yourself in a debate about the difference between “AI” and
    “machine learning,” you know what I mean. And if you haven’t, I encourage you
    to try at your next get-together with your colleagues. It can be just as slippery
    as that conversation with your significant other that starts with *“we need to
    talk.”*
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI项目中，脱节和无效率的孤岛风险很高。AI仍然是一个相对较新的领域，仅术语本身就能造成混淆。如果你曾经发现自己陷入关于“AI”和“机器学习”之间区别的辩论，你就知道我的意思了。如果你还没有，我鼓励你在下次与同事聚会时尝试一下。它可能和你与伴侣开始的对话一样难以捉摸，那句话是“我们得谈谈。”
- en: Aim for a rapprochement from both sides to iron out ambiguities and disconnects.
    Your internal teams should invest in upskilling and build a basic understanding
    of AI concepts. On the other hand, your AI partners must meet you halfway. They
    should skip the jargon and use clear, business-oriented language that your team
    can actually work with. Effective collaboration starts with shared understanding.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 力求双方接近，消除模糊性和脱节。您的内部团队应投资于技能提升，并建立对AI概念的基本理解。另一方面，您的AI合作伙伴必须做出相应的努力。他们应避免使用行话，并使用清晰、以业务为导向的语言，以便您的团队能够实际操作。有效的合作始于共同的理解。
- en: Conclusion
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The real question isn’t “Should we build or buy AI?” — it’s “How do we grow
    our AI capability in a way that balances speed, control, and long-term value?”
    The answer lies in recognizing AI as a blend of technology and expertise, where
    success depends on matching the right resources to the right tasks.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的问题不是“我们应该构建还是购买人工智能？”——而是“我们如何以平衡速度、控制和长期价值的方式增长我们的人工智能能力？”答案在于将人工智能视为技术和专长的结合，成功取决于将正确的资源与正确的任务相匹配。
- en: For most organizations, the smartest path forward is **partnering** — combining
    your domain strengths with external AI expertise to build faster, learn faster,
    and eventually own more of your AI journey.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数组织来说，最明智的前进道路是**合作**——结合您的领域优势与外部人工智能专业知识，以更快地构建、更快地学习，并最终拥有更多您的人工智能之旅。
- en: 'What you can do next:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 您接下来可以做什么：
- en: '**Map your AI use case against your internal capabilities. B**e honest about
    the gaps.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将您的AI用例与您的内部能力进行映射**。要诚实地面对差距。'
- en: '**Choose partners who transfer knowledge, not just deliverables.**'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择那些不仅提供成果，而且能够传授知识的合作伙伴**。'
- en: '**Identify which components to build, buy, or co-create.** You don’t need to
    make a binary choice.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确定要构建、购买或共同创建哪些组件**。您不需要做出二选一的选择。'
- en: '**Upskill your team as you go. E**very project should make you more capable
    and autonomous, not more dependent on your partner’s assets and skills.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在前进的过程中提升团队技能**。每个项目都应该使您更有能力、更自主，而不是更依赖合作伙伴的资产和技能。'
- en: '**Start with focused pilots** that create value and momentum for internal learning.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从具有价值创造和内部学习动力的试点项目开始**。'
- en: By taking a strategic, capability-building approach today, you lay the groundwork
    for becoming an AI-capable — and eventually AI-driven — organization in the long
    term.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 通过今天采取战略性的能力建设方法，您为长期成为具有人工智能能力——并最终由人工智能驱动的组织——奠定了基础。
