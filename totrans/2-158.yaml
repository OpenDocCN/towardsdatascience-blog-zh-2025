    short course from *DeepLearning.AI.*'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章灵感来源于*DeepLearning.AI*的短课程[*“MCP：使用Anthropic构建丰富的上下文AI应用”](https://www.deeplearning.ai/short-courses/mcp-build-rich-context-ai-apps-with-anthropic/)。
