- en: Building a Сustom MCP Chatbot
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建自定义MCP聊天机器人
- en: 原文：[https://towardsdatascience.com/building-a-%d1%81ustom-mcp-chatbot/](https://towardsdatascience.com/building-a-%d1%81ustom-mcp-chatbot/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/building-a-%d1%81ustom-mcp-chatbot/](https://towardsdatascience.com/building-a-%d1%81ustom-mcp-chatbot/)
- en: '<mdspan datatext="el1752176987570" class="mdspan-comment">**MCP (Model Context
    Protocol)** is</mdspan> a method to standardise communication between AI applications
    and external tools or data sources. This standardisation helps to reduce the number
    of integrations needed (*from N*M to N+M*):'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752176987570" class="mdspan-comment">**MCP (模型上下文协议)**
    是一种标准化AI应用程序与外部工具或数据源之间通信的方法。这种标准化有助于减少所需的集成数量（从N*M到N+M）：
- en: You can use community-built MCP servers when you need common functionality,
    saving time and avoiding the need to reinvent the wheel every time.
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当您需要常用功能时，可以使用社区构建的MCP服务器，这样可以节省时间，避免每次都需要重新发明轮子。
- en: You can also expose your own tools and resources, making them available for
    others to use.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您还可以公开自己的工具和资源，使它们可供他人使用。
- en: In [my previous article](https://towardsdatascience.com/your-personal-analytics-toolbox/),
    we built the analytics toolbox (a collection of tools that might automate your
    day-to-day routine). We built an MCP server and used its capabilities with existing
    clients like MCP Inspector or Claude Desktop.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在[我的上一篇文章](https://towardsdatascience.com/your-personal-analytics-toolbox/)中，我们构建了分析工具箱（一组可能自动化您日常流程的工具）。我们构建了一个MCP服务器，并使用其功能与现有的客户端如MCP
    Inspector或Claude Desktop进行交互。
- en: Now, we want to use those tools directly in our AI applications. To do that,
    let’s build our own MCP client. We will write fairly low-level code, which will
    also give you a clearer picture of how tools like Claude Code interact with MCP
    under the hood.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们希望在我们的AI应用程序中直接使用这些工具。为此，让我们构建自己的MCP客户端。我们将编写相当底层的代码，这也会让您更清楚地了解像Claude
    Code这样的工具如何在底层与MCP交互。
- en: 'Additionally, I would like to implement the feature that is currently (*July
    2025*) missing from Claude Desktop: the ability for the LLM to automatically check
    whether it has a suitable prompt template for the task at hand and use it. Right
    now, you have to pick the template manually, which isn’t very convenient.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我还想实现目前（2025年7月）在Claude Desktop中缺失的功能：LLM能够自动检查它是否有适合当前任务的合适提示模板，并使用它。目前，您必须手动选择模板，这并不太方便。
- en: As a bonus, I will also share a high-level implementation using the smolagents
    framework, which is ideal for scenarios when you work only with MCP tools and
    don’t need much customisation.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 作为额外奖励，我还会分享一个使用smolagents框架的高级实现，该框架非常适合您仅使用MCP工具且不需要太多定制化的场景。
- en: MCP protocol overview
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MCP协议概述
- en: Here’s a quick recap of the MCP to ensure we’re on the same page. MCP is a protocol
    developed by Anthropic to standardise the way LLMs interact with the outside world.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个快速回顾MCP，以确保我们处于同一页面上。MCP是由Anthropic开发的一种协议，用于标准化LLM与外部世界的交互方式。
- en: 'It follows a client-server architecture and consists of three main components:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 它遵循客户端-服务器架构，并包含三个主要组件：
- en: '**Host** is the user-facing application.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主机**是面向用户的应用程序。'
- en: '**MCP client** is a component within the host that establishes a one-to-one
    connection with the server and communicates using messages defined by the MCP
    protocol.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MCP客户端**是主机中的一个组件，它与服务器建立一对一的连接，并使用MCP协议定义的消息进行通信。'
- en: '**MCP server** exposes capabilities such as prompt templates, resources and
    tools.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MCP服务器**公开了如提示模板、资源和工具等功能。'
- en: '![](../Images/a67aa82a555288a4ebe98309b6f602a9.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a67aa82a555288a4ebe98309b6f602a9.png)'
- en: Image by author
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Since we’ve already [implemented the MCP server](https://github.com/miptgirl/mcp-analyst-toolkit)
    before, this time we will focus on building the MCP client. We will start with
    a relatively simple implementation and later add the ability to dynamically select
    prompt templates on the fly.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们之前已经[实现了MCP服务器](https://github.com/miptgirl/mcp-analyst-toolkit)，这次我们将专注于构建MCP客户端。我们将从一个相对简单的实现开始，稍后添加动态选择提示模板的能力。
- en: '*You can find the full code on [GitHub](https://github.com/miptgirl/miptgirl_medium/tree/main/mcp_client_example).*'
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*您可以在[GitHub](https://github.com/miptgirl/miptgirl_medium/tree/main/mcp_client_example)上找到完整的代码。*'
- en: Building the MCP chatbot
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建MCP聊天机器人
- en: 'Let’s begin with the initial setup: we’ll load the Anthropic API key from a
    config file and adjust Python’s `asyncio` event loop to support nested event loops.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从初始设置开始：我们将从配置文件中加载Anthropic API密钥，并调整Python的`asyncio`事件循环以支持嵌套事件循环。
- en: '[PRE0]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Let’s start by building a skeleton of our program to get a clear picture of
    the application’s high-level architecture.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先构建程序的基本框架，以获得应用程序高级架构的清晰视图。
- en: '[PRE1]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We start by creating an instance of the `MCP_ChatBot` class. The chatbot starts
    by discovering available MCP capabilities (iterating through all configured MCP
    servers, establishing connections and requesting their lists of capabilities).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先创建`MCP_ChatBot`类的实例。聊天机器人首先发现可用的MCP功能（遍历所有配置的MCP服务器，建立连接并请求其功能列表）。
- en: Once connections are set up, we will initialise an infinite loop where the chatbot
    listens to the user queries, calls tools when needed and continues this cycle
    until the process is stopped manually.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦建立连接，我们将初始化一个无限循环，其中聊天机器人监听用户查询，在需要时调用工具，并继续此循环，直到手动停止进程。
- en: Finally, we will perform a cleanup step to close all open connections.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将执行清理步骤以关闭所有打开的连接。
- en: Let’s now walk through each stage in more detail.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们更详细地走过每个阶段。
- en: Initialising the ChatBot class
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 初始化ChatBot类
- en: 'Let’s start by creating the class and defining the `__init__` method. The main
    fields of the ChatBot class are:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先创建类并定义`__init__`方法。ChatBot类的主要字段是：
- en: '`exit_stack` manages the lifecycle of multiple async threads (connections to
    MCP servers), ensuring that all connections will be closed appropriately, even
    if we face an error during execution. This logic is implemented in the `cleanup`
    function.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`exit_stack`管理多个异步线程（连接到MCP服务器）的生命周期，确保即使我们在执行过程中遇到错误，所有连接也将被适当地关闭。此逻辑在`cleanup`函数中实现。'
- en: '`anthropic` is a client for Anthropic API used to send messages to LLM.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`anthropic`是用于向LLM发送消息的Anthropic API客户端。'
- en: '`available_tools` and `available_prompts` are the lists of tools and prompts
    exposed by all MCP servers we are connected to.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`available_tools`和`available_prompts`是我们连接到的所有MCP服务器暴露的工具和提示列表。'
- en: '`sessions` is a mapping of tools, prompts and resources to their respective
    MCP sessions. This allows the chatbot to route requests to the correct MCP server
    when the LLM selects a specific tool.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`sessions`是将工具、提示和资源映射到其相应MCP会话的映射。这允许聊天机器人在LLM选择特定工具时将请求路由到正确的MCP服务器。'
- en: '[PRE2]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Connecting to servers
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 连接到服务器
- en: The first task for our chatbot is to initiate connections with all configured
    MCP servers and discover what capabilities we can use.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们聊天机器人的第一个任务是初始化与所有配置的MCP服务器的连接，并发现我们可以使用哪些功能。
- en: 'The list of MCP servers that our agent can connect to is defined in the `server_config.json`
    file. I’ve set up connections with three MCP servers:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们代理可以连接到的MCP服务器列表定义在`server_config.json`文件中。我已经设置了与三个MCP服务器的连接：
- en: '[analyst_toolkit](https://github.com/miptgirl/mcp-analyst-toolkit) is my implementation
    of the everyday analytical tools we discussed in the previous article,'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[分析工具包](https://github.com/miptgirl/mcp-analyst-toolkit)是我对前一篇文章中讨论的日常分析工具的实现，'
- en: '[Filesystem](https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem)
    allows the agent to work with files,'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[文件系统](https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem)允许代理处理文件，'
- en: '[Fetch](https://github.com/modelcontextprotocol/servers/tree/main/src/fetch)
    helps LLMs retrieve the content of webpages and convert it from HTML to markdown
    for better readability.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Fetch](https://github.com/modelcontextprotocol/servers/tree/main/src/fetch)帮助LLM检索网页内容，并将其从HTML转换为markdown以提高可读性。'
- en: '[PRE3]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: First, we will read the config file, parse it and then connect to each listed
    server.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将读取配置文件，解析它，然后连接到列出的每个服务器。
- en: '[PRE4]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'For each server, we perform several steps to establish the connection:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个服务器，我们执行几个步骤来建立连接：
- en: '**At the transport level,** welaunch the MCP server as a stdio process and
    get streams for sending and receiving messages.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在传输级别**，我们将MCP服务器作为stdio进程启动，并获取发送和接收消息的流。'
- en: '**At the session level**, we create a `ClientSession` incorporating the streams,
    and then we perform the MCP handshake by calling `initialize` method.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在会话级别**，我们创建一个包含流的`ClientSession`，然后通过调用`initialize`方法执行MCP握手。'
- en: We registered both the session and transport objects in the context manager
    `exit_stack` to ensure that all connections will be closed properly in the end.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在上下文管理器`exit_stack`中注册了会话和传输对象，以确保所有连接最终都能正确关闭。
- en: The last step is to **register server capabilities**. We wrapped this functionality
    into a separate function, and we will discuss it shortly.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后一步是**注册服务器功能**。我们将此功能封装到一个单独的函数中，稍后我们将对其进行讨论。
- en: '[PRE5]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Registering capabilities involves iterating over all the tools, prompts and
    resources retrieved from the session. As a result, we update the internal variables
    `sessions` (*mapping between resources and a particular session between the MCP
    client and server*), `available_prompts` and `available_tools`.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 注册功能涉及遍历从会话中检索到的所有工具、提示和资源。因此，我们更新了内部变量`sessions`（MCP客户端和服务器之间资源与特定会话之间的映射）、`available_prompts`和`available_tools`。
- en: '[PRE6]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'By the end of this stage, our `MCP_ChatBot` object has everything it needs
    to start interacting with users:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 到这一阶段结束时，我们的`MCP_ChatBot`对象已经拥有了与用户交互所需的一切：
- en: connections to all configured MCP servers are established,
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有配置的MCP服务器连接都已建立，
- en: all prompts, resources and tools are registered, including descriptions needed
    for LLM to understand how to use these capabilities,
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有提示、资源和工具都已注册，包括LLM理解如何使用这些功能所需的描述，
- en: mappings between these resources and their respective sessions are stored, so
    we know exactly where to send each request.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些资源与其相应会话之间的映射被存储，因此我们知道每个请求应该发送到哪个位置。
- en: Chat loop
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 聊天循环
- en: So, it’s time to start our chat with users by creating the `chat_loop` function.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，现在是时候通过创建`chat_loop`函数来开始与用户的聊天了。
- en: 'We will first share all the available commands with the user:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先与用户分享所有可用的命令：
- en: listing resources, tools and prompts
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出资源、工具和提示
- en: executing a tool call
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行工具调用
- en: viewing a resource
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查看资源
- en: using a prompt template
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用提示模板
- en: quitting the chat (*it’s important to have a clear way to exit the infinite
    loop*).
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 退出聊天（*有一个明确的退出无限循环的方式是很重要的*）。
- en: 'After that, we will enter an infinite loop where, based on user input, we will
    execute the appropriate action: whether it’s one of the commands above or making
    a request to the LLM.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们将进入一个无限循环，根据用户输入执行相应的操作：无论是上述命令之一还是向LLM发出请求。
- en: '[PRE7]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: There are a bunch of helper functions to parse arguments and return the lists
    of available tools and prompts we registered earlier. Since it’s fairly straightforward,
    I won’t go into much detail here. You can check [the full code](https://github.com/miptgirl/miptgirl_medium/blob/main/mcp_client_example/mcp_client_example_base.py)
    if you are interested.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些辅助函数用于解析参数并返回我们之前注册的可用工具和提示列表。由于这相当直接，这里我就不多做详细说明了。如果您感兴趣，可以查看[完整代码](https://github.com/miptgirl/miptgirl_medium/blob/main/mcp_client_example/mcp_client_example_base.py)。
- en: Instead, let’s dive deeper into how the interactions between the MCP client
    and server work in different scenarios.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，让我们更深入地了解MCP客户端和服务器在不同场景下的交互方式。
- en: When working with resources, we use the `self.sessions` mapping to find the
    appropriate session (with a fallback option if needed) and then use that session
    to read the resource.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理资源时，我们使用`self.sessions`映射来找到适当的会话（如果需要，还有回退选项），然后使用该会话来读取资源。
- en: '[PRE8]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'To execute a tool, we follow a similar process: start by finding the session
    and then use it to call the tool, passing its name and arguments.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 要执行工具，我们遵循类似的过程：首先找到会话，然后使用它来调用工具，传递其名称和参数。
- en: '[PRE9]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: No surprise here. The same approach works for executing the prompt.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 没有惊喜。相同的做法也适用于执行提示。
- en: '[PRE10]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The only major use case we haven’t covered yet is handling a general, free-form
    input from a user (not one of specific commands).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还没有涵盖的唯一主要用例是处理用户的一般、自由形式的输入（不是特定命令之一）。
- en: In this case, we send the initial request to the LLM first, then we parse the
    output, defining whether there are any tool calls. If tool calls are present,
    we execute them. Otherwise, we exit the infinite loop and return the answer to
    the user.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们首先向LLM发送初始请求，然后解析输出，确定是否有工具调用。如果有工具调用，我们执行它们。否则，我们退出无限循环并返回答案给用户。
- en: '[PRE11]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: So, we have now fully covered how the MCP chatbot actually works under the hood.
    Now, it’s time to test it in action. You can run it from the command line interface
    with the following command.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们现在已经完全涵盖了MCP聊天机器人在底层是如何工作的。现在，是时候在实际操作中测试它了。您可以通过以下命令从命令行界面运行它。
- en: '[PRE12]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'When you run the chatbot, you’ll first see the following introduction message
    outlining potential options:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 当您运行聊天机器人时，您首先会看到以下介绍消息，概述潜在选项：
- en: '[PRE13]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: From there, you can try out different commands, for example,
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，您可以尝试不同的命令，例如，
- en: call the tool to list the databases available in the DB
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调用工具以列出DB中可用的数据库
- en: list all available prompts
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出所有可用的提示
- en: use the prompt template, calling it like this `/prompt sql_query_prompt question=”How
    many customers did we have in May 2024?”`.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用提示模板，调用方式如下 `/prompt sql_query_prompt question="我们在2024年5月有多少客户？”`。
- en: Finally, I can finish your chat by typing `quit`.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我可以通过输入`quit`来结束你的聊天。
- en: '[PRE14]sql'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE14]sql'
- en: select uniqExact(user_id) as customer_count
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: select uniqExact(user_id) as customer_count
- en: from ecommerce.sessions
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: from ecommerce.sessions
- en: where toStartOfMonth(action_date) = '2024-05-01'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: where toStartOfMonth(action_date) = '2024-05-01'
- en: format TabSeparatedWithNames
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: format TabSeparatedWithNames
- en: '[PRE15]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Looks pretty cool! Our basic version is working well! Now, it’s time to take
    it one step further and make our chatbot smarter by teaching it to suggest relevant
    prompts on the fly based on customer input.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来非常酷！我们的基本版本运行良好！现在，是时候更进一步，通过教会它根据客户输入实时建议相关提示来使我们的聊天机器人变得更智能。
- en: Prompt suggestions
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示建议
- en: In practice, suggesting prompt templates that best match the user’s task can
    be incredibly helpful. Right now, users of our chatbot need to either already
    know about available prompts or at least be curious enough to explore them on
    their own to benefit from what we’ve built. By adding a prompt suggestions feature,
    we can do this discovery for our users and make our chatbot significantly more
    convenient and user-friendly.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，建议与用户任务最匹配的提示模板可以非常有帮助。目前，我们聊天机器人的用户要么已经了解可用的提示，或者至少足够好奇去自己探索以从我们所构建的内容中受益。通过添加提示建议功能，我们可以为用户提供这种发现，并使我们的聊天机器人变得更加方便和用户友好。
- en: 'Let’s brainstorm ways to add this functionality. I would approach this feature
    in the following way:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们头脑风暴一下添加这个功能的方法。我会以以下方式处理这个功能：
- en: '**Evaluate the relevance of the prompts using the LLM.** Iterate through all
    available prompt templates and, for each one, assess whether the prompt is a good
    match for the user’s query.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用LLM评估提示的相关性**。遍历所有可用的提示模板，并对每个模板进行评估，看它是否与用户的查询匹配。'
- en: '**Suggest a matching prompt to the user.** If we found the relevant prompt
    template, share it with the user and ask whether they would like to execute it.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**向用户建议匹配的提示**。如果我们找到了相关的提示模板，就与用户分享，并询问他们是否想要执行它。'
- en: '**Merge the prompt template with the user input.** If the user accepts, combine
    the selected prompt with the original query. Since prompt templates have placeholders,
    we might need the LLM to fill them in. Once we’ve merged the prompt template with
    the user’s query, we’ll have an updated message ready to send to the LLM.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '**将提示模板与用户输入合并**。如果用户接受，将选定的提示与原始查询相结合。由于提示模板有占位符，我们可能需要LLM来填充它们。一旦我们将提示模板与用户的查询合并，我们就会有一个准备发送给LLM的更新消息。'
- en: We will add this logic to the `process_query` function. Thanks to our modular
    design, it’s pretty easy to add this enhancement without disrupting the rest of
    the code.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将把这个逻辑添加到`process_query`函数中。得益于我们的模块化设计，添加这个增强功能而不会干扰到其他代码是非常容易的。
- en: Let’s start by implementing a function to find the most relevant prompt template.
    We will use the LLM to evaluate each prompt and assign it a relevance score from
    0 to 5\. After that, we’ll filter out any prompts with a score of 2 or lower and
    return only the most relevant one (the one with the highest relevance score among
    the remaining results).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们首先实现一个函数来找到最相关的提示模板。我们将使用LLM评估每个提示，并给它分配一个从0到5的相关性分数。然后，我们将过滤掉任何得分低于2的提示，并只返回最相关的提示（在剩余结果中相关性分数最高的那个）。
- en: '[PRE16]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The next function we need to implement is one that combines the selected prompt
    template with the user input. We will rely on the LLM to intelligently combine
    them, filling all placeholders as needed.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接下来需要实现的功能是将选定的提示模板与用户输入相结合。我们将依靠LLM智能地组合它们，根据需要填充所有占位符。
- en: '[PRE17]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Then, we will simply update the `process_query` logic to check for matching
    prompts, ask the user for confirmation and decide which message to send to the
    LLM.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将简单地更新`process_query`逻辑，以检查匹配的提示，询问用户确认，并决定向LLM发送哪条消息。
- en: '[PRE18]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Now, let’s test our updated version with a question about our data. Excitingly,
    the chatbot was able to find the right prompt and use it to find the right answer.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们用一个关于我们数据的问题来测试我们的更新版本。令人兴奋的是，聊天机器人能够找到正确的提示并使用它来找到正确的答案。
- en: '[PRE19]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: It’s always a good idea to test negative examples as well. In this case, the
    chatbot behaves as expected and doesn’t suggest an SQL-related prompt when given
    an unrelated question.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 测试负面例子也是一个好主意。在这种情况下，聊天机器人表现得如预期，当给出不相关的问题时不会建议与SQL相关的提示。
- en: '[PRE20]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Now that our chatbot is up and running, we’re ready to wrap things up.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们聊天机器人已经上线并运行，我们准备结束这篇文章。
- en: 'BONUS: quick and easy MCP client with smolagents'
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: BONUS：使用smolagents快速且简单的MCP客户端
- en: We’ve looked at low-level code that enables building highly customised MCP clients,
    but many use cases require only basic functionality. So, I decided to share with
    you a quick and straightforward implementation for scenarios when you need just
    the tools. We will use one of my favourite agent frameworks — smolagents from
    HuggingFace (*I’ve discussed this framework in detail in* [*my previous article*](https://towardsdatascience.com/code-agents-the-future-of-agentic-ai/)).
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经查看了一些低级代码，这些代码可以用来构建高度定制的MCP客户端，但许多用例只需要基本功能。因此，我决定与你分享一个快速且直接的实现，适用于你只需要工具的场景。我们将使用我最喜欢的代理框架之一——来自HuggingFace的smolagents（*我在我的上一篇文章中详细讨论了此框架[*我的上一篇文章*](https://towardsdatascience.com/code-agents-the-future-of-agentic-ai/)）。
- en: '[PRE21]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: As a result, we received the correct answer.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们得到了正确的答案。
- en: '![](../Images/3b3d0409ac716b51e4deeb2d9da9f8d9.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3b3d0409ac716b51e4deeb2d9da9f8d9.png)'
- en: Image by author
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: If you don’t need much customisation or integration with prompts and resources,
    this implementation is definitely the way to go.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不需要太多定制或与提示和资源的集成，这个实现绝对是一条可行的道路。
- en: Summary
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this article, we built a chatbot that integrates with MCP servers and leverages
    all the benefits of standardisation to access tools, prompts, and resources seamlessly.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们构建了一个与MCP服务器集成的聊天机器人，利用标准化的所有好处，无缝地访问工具、提示和资源。
- en: We started with a basic implementation capable of listing and accessing MCP
    capabilities. Then, we enhanced our chatbot with a smart feature that suggests
    relevant prompt templates to users based on their input. This makes our product
    more intuitive and user-friendly, especially for users unfamiliar with the complete
    library of available prompts.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从一个基本实现开始，能够列出和访问MCP功能。然后，我们通过一个智能功能增强了我们的聊天机器人，该功能根据用户的输入建议相关的提示模板。这使得我们的产品更加直观和用户友好，尤其是对于不熟悉完整提示库的用户。
- en: To implement our chatbot, we used relatively low-level code, giving you a better
    understanding of how the MCP protocol works under the hood and what happens when
    you use AI tools like Claude Desktop or Cursor.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现我们的聊天机器人，我们使用了相对低级的代码，这让你更好地理解MCP协议在底层是如何工作的，以及当你使用像Claude Desktop或Cursor这样的AI工具时会发生什么。
- en: As a bonus, we also discussed the smolagents implementation that lets you quickly
    deploy an MCP client integrated with tools.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 作为额外收获，我们还讨论了smolagents的实现，它允许你快速部署一个集成了工具的MCP客户端。
- en: '*Thank you for reading. I hope this article was insightful. Remember Einstein’s
    advice: “The important thing is not to stop questioning. Curiosity has its own
    reason for existing.” May your curiosity lead you to your next great insight.*'
  id: totrans-123
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*感谢阅读。我希望这篇文章能给你带来启发。记住爱因斯坦的建议：“重要的是不要停止提问。好奇心有其存在的理由。”愿你的好奇心引导你发现下一个伟大的洞察。*'
