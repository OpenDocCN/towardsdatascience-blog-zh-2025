- en: Physics-Informed Neural Networks for Inverse PDE Problems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 物理信息神经网络用于逆偏微分方程问题
- en: 原文：[https://towardsdatascience.com/physics-informed-neural-networks-for-inverse-pde-problems/](https://towardsdatascience.com/physics-informed-neural-networks-for-inverse-pde-problems/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/physics-informed-neural-networks-for-inverse-pde-problems/](https://towardsdatascience.com/physics-informed-neural-networks-for-inverse-pde-problems/)
- en: Using a Physics-Informed Neural Network (PINN) feels a lot like giving a regular
    neural network a cheat sheet. Without a cheat sheet, we could estimate solutions
    to a physical system using only a neural network. Position *(x)* and Time *(t)*
    as inputs, Temperatures *(u)* as outputs. With sufficient data, this solution
    would be effective. However, it doesn’t utilize the physics we know about the
    system. We would expect temperatures to follow the dynamics of the heat equation,
    and we would also like to incorporate that into our neural network.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 使用物理信息神经网络（PINN）感觉就像给一个常规神经网络提供作弊单。没有作弊单，我们可以仅使用神经网络估计物理系统的解。位置 *(x)* 和时间 *(t)*
    作为输入，温度 *(u)* 作为输出。如果有足够的数据，这个解将是有效的。然而，它没有利用我们关于系统的物理知识。我们预计温度将遵循热量方程的动力学，我们也希望将其纳入我们的神经网络中。
- en: PINNs offer a method for combining the known physics about a system and neural
    network estimation. This is ingeniously achieved by utilizing automatic differentiation
    and a physics-based loss function. As a result, we can achieve better results
    with less data.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: PINNs提供了一种结合系统已知物理和神经网络估计的方法。这是通过利用自动微分和基于物理的损失函数巧妙实现的。因此，我们可以用更少的数据获得更好的结果。
- en: Agenda
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 日程
- en: Provide an interpretation of the heat equation
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供对热量方程的解释
- en: Simulate data using temperature data
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用温度数据模拟数据
- en: Code a solution for thermal diffusivity ***κ*** and heat source ***q(x,t)***
    using DeepXDE
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用DeepXDE编写求解热扩散率***κ***和热源***q(x,t)***的代码
- en: Explain the difference between forward and inverse problems in PDE theory
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释偏微分方程理论中正问题与逆问题的区别
- en: This is the data we will be working with. Let’s pretend we used sensors to collect
    temperatures of a 1-meter rod over 5 seconds.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们将要处理的数据。让我们假设我们使用了传感器收集了1米长棒在5秒内的温度。
- en: '![](../Images/168060a9ec03feafa2e95c68e5119768.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![自动微分和基于物理的损失函数](../Images/168060a9ec03feafa2e95c68e5119768.png)'
- en: Graph of Position (x) and Time (t) with respect to Temperature (u).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 温度（u）相对于位置（x）和时间（t）的图形。
- en: Illustration by Author
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 作者插画
- en: '![](../Images/693295437b7d204673d4cff88bf48721.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![偏微分方程理论中正问题与逆问题的区别](../Images/693295437b7d204673d4cff88bf48721.png)'
- en: The Heat Equation
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 热量方程
- en: Illustration by Author
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 作者插画
- en: In a nutshell, PINNs provide a new way to approximate solutions to physics equations
    (ODEs, PDEs, SDEs) by using data of the underlying system, and our physics equation.
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 简而言之，PINNs通过使用底层系统的数据和我们的物理方程，提供了一种新的方法来近似物理方程（常微分方程、偏微分方程、随机微分方程）的解。
- en: Interpreting the Heat Equation
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解释热量方程
- en: '![](../Images/0933dee56c2ba4c81056567c38ec4466.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![作者插画](../Images/0933dee56c2ba4c81056567c38ec4466.png)'
- en: Inverse problem terms in the heat equation.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 热量方程中的逆问题术语。
- en: Illustration by Author
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 作者插画
- en: The partial derivative on the left represents how temperature changes with time.
    This is a function of position (x) and time (t). On the right, q(x,t) represents
    the heat entering the system. This is our Bunsen burner heating up the rod. The
    middle term describes how heat changes depending on the surrounding points. Heat
    flows from hot points to cold points, seeking to be in equilibrium with the surrounding
    points. The second spatial derivative (∂²u/∂x² in 1D, or ∇²u in higher dimensions)
    captures heat diffusion. This is the natural tendency for heat to flow from hot
    regions to cold regions.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 左侧的偏导数表示温度随时间的变化。这是一个关于位置（x）和时间的函数。在右侧，q(x,t)表示进入系统的热量。这是我们用本生灯加热棒的过程。中间项描述了热量根据周围点的变化。热量从热点流向冷点，寻求与周围点达到平衡。二阶空间导数（1D中的∂²u/∂x²，或高维中的∇²u）捕捉热量扩散。这是热量从热区流向冷区的自然趋势。
- en: This term is multiplied by the thermal diffusivity (κ), which depends on the
    material’s properties. We would expect something conductive, like metals, to heat
    up faster. When ∇²u is positive, the temperature at that point is lower than the
    average of its neighbours, so heat tends to flow into the point. When ∇²u is negative,
    the point is hotter than its surroundings, and heat tends to flow out. When ∇²u
    is zero, the point is in thermal equilibrium with its immediate neighbourhood.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项乘以热扩散率(κ)，它取决于材料的属性。我们预计像金属这样的导电材料会更快地升温。当∇²u为正时，该点的温度低于其邻居的平均温度，因此热量倾向于流向该点。当∇²u为负时，该点比其周围更热，热量倾向于流出。当∇²u为零时，该点与其直接邻域处于热平衡状态。
- en: In the image below, the top of our function could represent a very hot point.
    Notice how the Laplacian is negative, indicating that heat will flow out of this
    hot point to cooler surrounding points. The Laplacian is a measure of curvature
    around a point. In the heat equation, that is the curvature of the temperature
    profile.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的图像中，函数的顶部可能代表一个非常热的点。注意拉普拉斯值是负的，这表明热量将从这个热点流向周围的较冷点。拉普拉斯是围绕一点的曲率的度量。在热方程中，这是温度分布的曲率。
- en: '![](../Images/1546e3d0e11b1f9bfee17a3a357a1edd.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1546e3d0e11b1f9bfee17a3a357a1edd.png)'
- en: A Gaussian Bump, and the Laplacian of a Gaussian Bump.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 高斯峰和Gaussian峰的拉普拉斯。
- en: Illustration by Author
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 作者插图
- en: Generating the data
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成数据
- en: I must admit, I didn’t actually burn a rod and measure its temperature changes
    over time. I simulated the data using the heat equation. This is the code we used
    to simulate the data. All of it can be found on my [GitHub](https://github.com/marco-hening-tallarico/Notebooks/blob/main/Copy_of_hot_rod_4.ipynb).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须承认，我实际上并没有烧一根棒来测量其随时间变化的温度变化。我使用热方程来模拟数据。这是我们用来模拟数据的代码。所有这些都可以在我的[GitHub](https://github.com/marco-hening-tallarico/Notebooks/blob/main/Copy_of_hot_rod_4.ipynb)上找到。
- en: '[PRE0]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: To generate this data, we used *κ = 0.01 and q = 1,* but only *x, t,* and *u*
    will be used to estimate *κ* and *q.* In other words, we pretend not to know *κ*
    and *q *and seek to estimate them only with *x, t,* and *u.* This surface is 3-dimensional,
    but it represents the temperature of a **1-dimensional rod** over time.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 为了生成这些数据，我们使用了*κ = 0.01 和 q = 1*，但只将*x, t*和*u*用于估计*κ*和*q*。换句话说，我们假装不知道*κ*和*q*，并试图仅用*x,
    t*和*u*来估计它们。这个表面是三维的，但它代表了随时间变化的**一维棒**的温度。
- en: '![](../Images/20cce7244c1b1b1874f6cbf4d1d35e29.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/20cce7244c1b1b1874f6cbf4d1d35e29.png)'
- en: Illustration by Author
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 作者插图
- en: '![](../Images/022b68314977e8f1390f7c0947c1182e.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/022b68314977e8f1390f7c0947c1182e.png)'
- en: Dataframe
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 数据框
- en: Illustration by Author
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 作者插图
- en: Arranging and splitting data
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安排和分割数据
- en: Here, we simply rearrange our data into columns for Position *(x)*, time *(t)*,
    and Temperature *(u_val)*, then separate them into X and Y, and then split them
    into training and testing sets.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们只是将我们的数据重新排列成列，用于位置*(x)*，时间*(t)*和温度*(u_val)*，然后将它们分别分离成X和Y，最后将它们分成训练集和测试集。
- en: '[PRE1]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/ccbf2fb983d85bc48c4b23fee3d9fc6c.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ccbf2fb983d85bc48c4b23fee3d9fc6c.png)'
- en: X data position (x), time (t), and Y data Temperature (u)
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: X数据位置(x)，时间(t)，Y数据温度(u)
- en: Illustration by Author
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 作者插图
- en: We keep our test size (20%)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们保持测试大小(20%)
- en: '[PRE2]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Because our PINN receives position (x) and time (t) as inputs, and using automatic
    differentiation and the chain rule, it can compute the following partial derivatives.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我们的PINN接收位置(x)和时间(t)作为输入，并使用自动微分和链式法则，它可以计算以下偏导数。
- en: \[
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \frac{\partial u}{\partial t}, \quad
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\partial u}{\partial t}, \quad
- en: \frac{\partial u}{\partial x}, \quad
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\partial u}{\partial x}, \quad
- en: \frac{\partial^2 u}{\partial x^2}, \quad
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\partial^2 u}{\partial x^2}, \quad
- en: \nabla^2 u
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: \nabla^2 u
- en: \]
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: So, finding the constants becomes a problem of testing different values for
    *κ* and *q(x, t)*, minimizing the residual given by the loss function.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，找到常数变成了测试*κ*和*q(x, t)*的不同值的问题，最小化由损失函数给出的残差。
- en: Packages and seeds and connecting backends
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 包和种子以及连接后端
- en: Don’t forget to install **DeepXDE** if you haven’t yet.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您还没有安装，别忘了安装**DeepXDE**。
- en: '[PRE3]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: These are all of the Libraries we will be using. For this to work, make sure
    you’re using **Tensorflow 2** as the backend for DeepXDE.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是我们将要使用的库。为了使其正常工作，请确保您使用**Tensorflow 2**作为DeepXDE的后端。
- en: '[PRE4]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: For replicability, we will set our **seeds** to **42**. You can use this code
    on multiple libraries.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保可重复性，我们将我们的**种子**设置为**42**。您可以在多个库上使用此代码。
- en: '[PRE5]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Coding the PINN
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编码PINN
- en: Environment
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 环境
- en: Because the heat equation models temperature over both space and time, we need
    to consider the spatial domain and the temporal domain.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 因为热方程模型在空间和时间上模拟温度，我们需要考虑空间域和时间域。
- en: Space (0, 1) for a 1-meter rod
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 空间(0, 1)用于1米长的杆
- en: Time (0,5) for 5 seconds of observation
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间(0,5)用于5秒的观察
- en: Geomtime combines these dimensions
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Geomtime结合了这些维度
- en: '[PRE6]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Select for values in the PDE you would like to infer from the data. Here we
    pick *kappa (κ)* and heat source *q*
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 选择您从数据中想要推断的PDE中的值。在这里，我们选择*kappa (κ)*和热源*q*。
- en: '[PRE7]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The Physics Loss
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 物理损失
- en: 'Our physics loss is simple: all the elements of the heat equation on one side.
    When this is zero, our equation holds. The physics loss will be minimized, so
    our estimate for *κ* and *q* best fits the physics. If we had a physics equation
    *A = B*, we would simply move all the elements to one side and define our residual
    as *A – B = 0*. The closer *A – B* is to zero the the better our PINN captures
    the dynamics of *A = B.*'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的物理损失很简单：热方程一侧的所有元素。当这为零时，我们的方程成立。物理损失将被最小化，因此我们对*κ*和*q*的估计将最好地符合物理规律。如果我们有一个物理方程*A
    = B*，我们只需将所有元素移到一侧，并将我们的残差定义为*A – B = 0*。*A – B*越接近零，我们的PINN就越能捕捉到*A = B*的动态。
- en: '[PRE8]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: \[
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \text{Residual}(x, t) = \frac{\partial u}{\partial t} – \kappa \frac{\partial^2
    u}{\partial x^2} – q
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: \text{残差}(x, t) = \frac{\partial u}{\partial t} – \kappa \frac{\partial^2 u}{\partial
    x^2} – q
- en: \]
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: PINNs
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: PINNs
- en: The derivatives present in the residual are computed by applying the chain rule
    through the computational graph during **backpropagation**. These derivatives
    allow the PINN to evaluate the residual of the PDE.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 存在于残差中的导数是通过在**反向传播**期间通过计算图应用链式法则来计算的。这些导数允许PINN评估PDE的残差。
- en: Optionally, we could also add a data loss, also known as the loss from our standard
    neural network, which minimizes the difference between the prediction and the
    known values.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 可选地，我们还可以添加数据损失，也称为标准神经网络的损失，它最小化预测值和已知值之间的差异。
- en: '[PRE9]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Below, we create a **TimePDE** data object, which is a type of dataset in DeepXDE
    for solving time-dependent PDEs. It prepares the geometry, physics, boundary conditions,
    and initial conditions for training a PINN.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 下面，我们创建一个**TimePDE**数据对象，这是DeepXDE中用于求解时间相关PDEs的一种数据集类型。它为训练PINN准备了几何形状、物理、边界条件和初始条件。
- en: '[PRE10]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The Architecture [2] + [64]*3 + [1] is used. We obtain this from two inputs
    *(x, t)*, 64 neurons, 3 hidden layers, and 1 output *(u)*.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 使用[2] + [64]*3 + [1]的架构。我们从这个两个输入*(x, t)*，64个神经元，3个隐藏层，和1个输出*(u)*中获得。
- en: '[2] + [64]*3 + [1] = [2, 64, 64, 64, 1]'
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[2] + [64]*3 + [1] = [2, 64, 64, 64, 1]'
- en: A **hyperbolic tangent** activation function is used to capture both linear
    and non-linear behaviour in the PDE solution. The **weight initializer** “Glorot
    normal” is used to prevent vanishing or exploding gradients in training.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 使用**双曲正切**激活函数来捕捉PDE解中的线性和非线性行为。使用**权重初始化器**“Glorot normal”来防止训练中的梯度消失或爆炸。
- en: '[PRE11]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: We can use different optimizers. For me, **L-BFGS-B** worked better.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用不同的优化器。对我来说，**L-BFGS-B**效果更好。
- en: '[PRE12]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Training could take a while…
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 训练可能需要一些时间…
- en: Model loss
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型损失
- en: Monitoring the model loss over time is a good way to watch for overfitting.
    Because we only used the physics loss, we don’t see Component 2, which would otherwise
    be the data loss. Since all the code is up on my [GitHub](https://github.com/marco-hening-tallarico/Notebooks),
    feel free to run it and see how changing the **learning rate** will change the
    variance in the model loss.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间推移监控模型损失是一个很好的方法来观察过拟合。因为我们只使用了物理损失，所以我们看不到组件2，否则它将是数据损失。由于所有代码都上传到了我的[GitHub](https://github.com/marco-hening-tallarico/Notebooks)，您可以随意运行它并查看改变**学习率**如何影响模型损失的方差。
- en: '[PRE13]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '![](../Images/30d183adc7b986ca21243cc3f8a90cf6.png)'
