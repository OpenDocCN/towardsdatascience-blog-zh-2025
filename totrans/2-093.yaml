- en: 'Forward and Inverse Problems:'
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 正向和逆向问题：
- en: In this article, we solved the **inverse problem** of the PDE. This involves
    solving for the two red constants.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们解决了PDE的**逆向问题**。这涉及到求解两个红色常数。
- en: '![](../Images/c7903b9ae3e73ad5df55562f05b398d5.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c7903b9ae3e73ad5df55562f05b398d5.png)'
- en: Forward and Inverse problems in the heat equation.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 热方程中的正向和逆向问题。
- en: Illustration by Author
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 作者插画
- en: '**The Forward problem** is characterized as follows: given the PDE, underlying
    parameters, boundary conditions, and forcing conditions, we would like to compute
    the state of the system. In this case, temperature *(u).* This problem involves
    predicting the system. Forward problems are generally **well-posed; **asolution
    exists and is unique. These solutions are continuously dependent on the inputs'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**正向问题**被描述如下：给定偏微分方程、基础参数、边界条件和强迫条件，我们希望计算系统的状态。在这种情况下，温度 *(u)*。这个问题涉及到预测系统。正向问题通常**是良定的**；解存在且唯一。这些解对输入是连续依赖的'
- en: '**The Inverse Problem** is charachterized as such: given the state of the system
    (temperature) infer the underlying parameters, boundary conditions, or forcing
    terms that best explain the observed data. Here, we estimate unknown parameters.
    Inverse problems are often **ill-posed**, lacking uniqueness or stability.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '**逆向问题**被描述如下：给定系统的状态（温度），推断出解释观察数据最佳的基础参数、边界条件或强迫项。在这里，我们估计未知参数。逆向问题通常是**病态的**，缺乏唯一性或稳定性。'
- en: '**Forward**: predict the outcome when you know the causes.'
  id: totrans-105
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**正向**：当你知道原因时预测结果。'
- en: ''
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Inverse**: figure out the causes (or best inputs) from the observed outcome.'
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**逆向**：从观察到的结果中找出原因（或最佳输入）。'
- en: Unintuitively, the inverse problem is generally resolved first. Knowing the
    parameters greatly helps in figuring out the forward problem. If we could figure
    out *kappa (κ)* and *q(x, t)*, solving for the temperature *u(x,t)* would be a
    lot easier.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 出乎意料的是，逆向问题通常首先解决。了解参数极大地帮助于解决正向问题。如果我们能够找出*kappa（κ）*和*q(x, t)*，求解温度*u(x,t)*将会容易得多。
- en: Conclusion
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: PINNs provide a novel approach to solving both the inverse and forward problems
    in physics equations. Their advantage over neural networks is that they enable
    us to better solve these problems with less data, as they incorporate existing
    knowledge about physics into the neural network. This also has the added benefit
    of improved generalization. PINNs are particularly good at solving Inverse Problems.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: PINNs提供了一种解决物理方程中逆向和正向问题的创新方法。与神经网络相比，它们的优点是能够使我们用更少的数据更好地解决这些问题，因为它们将物理知识融入神经网络中。这也带来了改进泛化的额外好处。PINNs特别擅长解决逆向问题。
