- en: Data Has No Moat!
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-has-no-moat/](https://towardsdatascience.com/data-has-no-moat/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1750794355470" class="mdspan-comment">Since the early days</mdspan>
    of AI and data-driven projects, the importance of data and its quality have been
    recognized as critical to a project’s success. Some might even say that projects
    used to have a single point of failure: data!'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: The infamous *“Garbage in, garbage out”* was probably the first expression that
    took the data industry by storm (seconded by “Data is the new oil”). We all knew
    if data wasn’t well structured, cleaned and validated, the results of any analysis
    and potential applications were doomed to be inaccurate and dangerously incorrect.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: For that reason, over the years, numerous studies and researchers focused on
    defining the pillars of data quality and what metrics can be used to assess it.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: A [1991 research paper](https://web.mit.edu/smadnick/www/wp2/1991-06.pdf) identified
    20 different data quality dimensions, all of them very aligned with the main focus
    and data usage at the time – structured databases. Fast forward to [2020, the
    research paper on the Dimensions of Data Quality (DDQ)](https://www.dama-nl.org/wp-content/uploads/2020/09/DDQ-Dimensions-of-Data-Quality-Research-Paper-version-1.2-d.d.-3-Sept-2020.pdf?utm_content=218971815&utm_medium=social&utm_source=linkedin&hss_channel=lcp-75424487),
    identified an astonishing number of data quality dimensions (around 65!!), reflecting
    not just how data quality definition should be constantly evolving, but also how
    data itself was used.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c2ea93929f6f3ff03236b7d264336be3.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
- en: 'Dimensions of Data Quality: Toward Quality Data by Design, 1991 Wang'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Nonetheless, with the rise of Deep Learning hype, the idea that data quality
    no longer mattered lingered in the minds of the most tech savvy engineers. The
    desire to believe that models and engineering alone were enough to deliver powerful
    solutions has been around for quite some time. Happily for us, *enthusiastic data
    practitioners*, [2021/2022 marked the rise of **Data-Centric AI**](https://www.youtube.com/watch?v=TU6u_T-s68Y)!
    This concept isn’t far from the classic *“garbage in, garbage-out”*, reinforcing
    the idea that in AI development, if we treat data as the element of the equation
    that needs tweaking, we’ll achieve better performance and results than by tuning
    the models alone (ups! after all, it’s not all about hyperparameter tuning).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: '*So why can we hear again the rumors that data has no moat?!*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: 'Large Language Models’ (LLMs) capacity to mirror human reasoning has stunned
    us. Because they are trained on immense corpora combined with the computational
    power of GPUs, LLMs are not only able to generate good content, but actually content
    that is able to resemble our tone and way of thinking. Because they do it so remarkably
    well, and often with even minimal context, this had led many to a bold conclusion:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '*“Data has no moat.”*'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*“We no longer need proprietary data to differentiate.”*'
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“我们不再需要专有数据来区分。”*'
- en: '*“Just use a better model.”*'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“只需使用更好的模型。”*'
- en: Does data quality stand a chance against LLM’s and AI Agents?
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据质量能否与LLMs和AI代理抗衡？
- en: In my opinion — absolutely yes! In fact, regardless of the current beliefs that
    data poses no differentiation in the LLMs and AI Agents age, data remains essential.
    I’ll even challenge by saying that the more capable and responsible agents become,
    their dependency on good data becomes even more critical!
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来——绝对是！事实上，尽管在LLMs和AI代理时代，数据似乎不再具有区分性，但数据仍然是至关重要的。我甚至挑战性地提出，随着能力和责任感的增强，它们对优质数据的依赖性变得更加关键！
- en: '*So, why does data quality still matter?*'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '*那么，为什么数据质量仍然很重要？*'
- en: Starting with the most obvious, garbage in, garbage out. It does not matter
    how much smarter your models and agents get if they can’t tell the difference
    between good and bad. If bad data or low-quality inputs are fed into the model,
    you will get wrong answers and misleading results. LLMs are generative models,
    which means that, ultimately, they simply reproduce patterns they have encountered.
    What is more concerning than ever is that the validation mechanisms we once relied
    on are no longer in place in many use cases, leading to potentially misleading
    results.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 从最明显的地方开始，垃圾输入，垃圾输出。如果模型和代理无法区分好与坏，那么它们无论多么聪明都没有关系。如果将不良数据或低质量输入输入到模型中，你将得到错误的答案和误导性的结果。LLMs是生成模型，这意味着它们最终只是简单地复制它们遇到的模式。更令人担忧的是，我们曾经依赖的验证机制在许多用例中不再存在，这可能导致误导性的结果。
- en: Furthermore, these models have no real world awareness, similarly to other previously
    dominating generative models. If something is outdated or even biases, they simply
    won’t recognize it, unless they are trained to do so, and that starts with high-quality,
    validated and carefully curated data.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这些模型缺乏对现实世界的认知，与其他之前主导的生成模型类似。如果某些内容过时或甚至存在偏见，它们根本不会识别出来，除非经过训练才能做到这一点，而这需要从高质量、经过验证且精心挑选的数据开始。
- en: More particularly, when it comes to AI agents, which often rely on tools like
    memory or document retrieval to work across activities, the importance of great
    data is even more obvious. If their knowledge is based on unreliable information,
    they won’t be able to perform a good decision-making. You’ll get an answer or
    an outcome, but that does not mean it is a useful one!
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地说，当涉及到AI代理时，它们通常依赖于记忆或文档检索工具来跨活动工作，优质数据的重要性就更加明显。如果它们的知识基于不可靠的信息，它们将无法做出良好的决策。你可能会得到一个答案或结果，但这并不意味着它是有用的！
- en: Why is data still a moat?
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么数据仍然是一道护城河？
- en: 'While barriers like computational infrastructure, storage capacity, as well
    as specialized expertise are mentioned as relevant to stay competitive in a future
    dominated by AI Agents and LLM based applications, [data accessibility is still
    one of the most frequently cited as paramount for competitiveness](https://academic.oup.com/icc/advance-article/doi/10.1093/icc/dtae042/7942098).
    Here’s why:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然计算基础设施、存储容量以及专业知识的障碍被提及为在由AI代理和基于LLM的应用程序主导的未来保持竞争力的相关因素，但[数据可访问性仍然是最常被引用的至关重要的竞争力因素](https://academic.oup.com/icc/advance-article/doi/10.1093/icc/dtae042/7942098)。以下是原因：
- en: '**Access is Power** In domains with restricted or proprietary data, such as
    healthcare, lawyers, enterprise workflows or even user interaction data, ai agents
    can only be built by those with privileged access to data. Without it, the developed
    applications will be flying blind.'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**访问即权力** 在数据受限或专有的领域，例如医疗保健、律师、企业工作流程或甚至用户交互数据，只有那些有权访问数据的人才能构建AI代理。没有它，开发的应用程序将像盲人一样飞行。'
- en: '**Public web won’t be enough**'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**公共网络将不足以**'
- en: Free and abundant public data is fading, not because it is no longer available,
    but because its quality its fading quickly. High-quality public datasets have
    been heavily mined with algorithms generated data, and some of what is left is
    either behind paywalls or protected by API restrictions.
  id: totrans-24
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 公共数据免费且丰富的情况正在逐渐消失，不是因为它们不再可用，而是因为其质量正在迅速下降。高质量的公共数据集已经被算法生成数据大量挖掘，而剩下的一些要么在付费墙后，要么受到API限制的保护。
- en: Moreover, major platform are increasingly closing off access in favor of monetization.
  id: totrans-25
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此外，主要平台越来越多地关闭访问权限，以利于货币化。
- en: '**Data poisoning is the new attack vector** As the adoption of foundational
    models grows, attacks shift from model code to the training and fine-tuning of
    the model itself. Why? It is easier to do and harder to detect!'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据中毒是新的攻击向量** 随着基础模型的采用率增长，攻击从模型代码转向模型本身的训练和微调。为什么？这样做更容易，也更难检测！'
- en: We are entering an era where adversaries don’t have to break the system, they
    just need to pollute the data. From subtle misinformation to malicious labeling,
    data poisoning attacks are a reality that organizations that are looking into
    adopting AI Agents, will need to be prepared for. Controlling data origin, pipeline,
    and integrity is now essential to building trustworthy AI.
  id: totrans-27
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们正进入一个时代，对手不需要破坏系统，他们只需要污染数据。从细微的错误信息到恶意标签，数据中毒攻击已成为一个现实，对于正在考虑采用人工智能代理的组织来说，需要做好准备。控制数据来源、管道和完整性现在是构建可信人工智能的基本要求。
- en: What are the data strategies for trustworthy AI?
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可信人工智能的数据策略是什么？
- en: 'To keep ahead of innovation, we must rethink how to treat data. Data is no
    longer just an element of the process but rather a core infrastructure for AI.
    Building and deploying AI is about code and algorithms, but also the data lifecycle:
    how it’s collected, filtered, and cleaned, protected, and most importantly, used.
    *So, what are the strategies that we can adopt to make better use of data?*'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持创新的前沿，我们必须重新思考如何处理数据。数据不再只是流程中的一个元素，而是人工智能的核心基础设施。构建和部署人工智能不仅关乎代码和算法，还关乎数据生命周期：如何收集、过滤和清理，保护，最重要的是，使用。*那么，我们可以采用哪些策略来更好地利用数据呢？*
- en: '**Data Management as core infrastructure**'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据管理作为核心基础设施**'
- en: Treat data with the same relevance and priority as you would cloud infrastructure
    or security. This means centralizing governance, implementing access controls,
    and ensuring data flows are traceable and auditable. AI-ready organizations design
    systems where data is an intentional, managed input, not an afterthought.
  id: totrans-31
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 将数据视为与云基础设施或安全性同等重要和优先级。这意味着集中治理，实施访问控制，并确保数据流可追溯和可审计。为AI准备的组织设计系统，其中数据是有意管理输入，而不是事后考虑。
- en: '**Active Data Quality Mechanisms**'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**主动数据质量机制**'
- en: The quality of your data defines how reliable and performant your agents are!
    Establish pipelines that automatically detect anomalies or divergent records,
    enforce labeling standards, and monitor for drift or contamination. Data engineering
    is the future and foundational to AI. Data needs not only to be collected but
    more importantly, curated!
  id: totrans-33
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您的数据质量定义了您的代理的可靠性和性能！建立管道，自动检测异常或偏离记录，强制执行标签标准，并监控漂移或污染。数据工程是未来的基础，也是人工智能的基础。数据不仅需要收集，更重要的是，需要精心管理！
- en: '**Synthetic Data to Fill Gaps and Preserve Privacy**'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**合成数据用于填补空白并保护隐私**'
- en: When real data is limited, biased, or privacy-sensitive, [synthetic data offers
    a powerful alternative](https://www.annualreviews.org/content/journals/10.1146/annurev-statistics-040720-031848).
    From simulation to generative modeling, synthetic data allows you to create high-quality
    datasets to train models. It’s key to unlocking scenarios where ground truth is
    expensive or restricted.
  id: totrans-35
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当真实数据有限、有偏见或涉及隐私敏感时，[合成数据提供了一个强大的替代方案](https://www.annualreviews.org/content/journals/10.1146/annurev-statistics-040720-031848)。从模拟到生成模型，合成数据允许你创建高质量的数据库来训练模型。这是解锁那些真实数据昂贵或受限的场景的关键。
- en: '**Defensive Design Against Data Poisoning**'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**防御性设计以对抗数据中毒**'
- en: Security in AI now starts at the data layer. Implement measures such as source
    verification, versioning, and real-time validation to guard against poisoning
    and subtle manipulation. Not only for the datasources but also for any prompts
    that enter the systems. This is especially important in systems learning from
    user input or external data feeds.
  id: totrans-37
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 人工智能中的安全性现在始于数据层。实施如源验证、版本控制和实时验证等措施，以防止中毒和细微的操作。这不仅适用于数据源，也适用于任何进入系统的提示。这对于从用户输入或外部数据源学习的系统尤为重要。
- en: '**Data feedback loops**'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据反馈循环**'
- en: Data should not be seen as immutable in your AI systems. It should be able to
    evolve and adapt over time! Feedback loops are mandatory to create sense of evolution
    when it comes to data. When paired with strong quality filters, these loops make
    your AI-based solutions smarter and more aligned over time.
  id: totrans-39
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在您的AI系统中，数据不应被视为不可变的。它应该能够随着时间的推移而演变和适应！反馈循环对于在数据方面创造一种演变的感觉是强制性的。当与强大的质量过滤器配对时，这些循环使基于AI的解决方案随着时间的推移变得更智能、更一致。
- en: In summary, data is the moat and the future of AI solution’s defensiveness.
    Data-centric AI is more important than ever, even if the hype says otherwise.
    So, should AI be all about the hype? *Only the systems that actually reach production
    can see beyond i*t.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，数据是护城河，也是人工智能解决方案防御性的未来。以数据为中心的人工智能比以往任何时候都更重要，即使炒作的声音与此相反。那么，人工智能是否应该完全围绕炒作展开？*只有真正实现生产的系统才能超越这些炒作。
