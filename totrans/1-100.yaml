  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: Now, let’s calculate the Spearman correlation coefficient for the sample data.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们计算样本数据的 Spearman 相关系数。
- en: \[
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '\textbf{Step 1: Ranks from the original data}'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1：原始数据的等级**'
- en: \]
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{array}{c|cccccccccc}
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{array}{c|cccccccccc}
- en: R_{x_i} & 3 & 1 & 2 & 5 & 8 & 4 & 7 & 9 & 10 & 6 \\[2pt]
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: R_{x_i} & 3 & 1 & 2 & 5 & 8 & 4 & 7 & 9 & 10 & 6 \\[2pt]
- en: R_{y_i} & 1 & 2 & 4 & 5.5 & 8.5 & 3 & 5.5 & 8.5 & 8.5 & 8.5
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: R_{y_i} & 1 & 2 & 4 & 5.5 & 8.5 & 3 & 5.5 & 8.5 & 8.5 & 8.5
- en: \end{array}
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: \end{array}
- en: \]
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '\textbf{Step 2: Formula of Spearman’s correlation (Pearson on ranks)}'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 2：Spearman 相关系数的公式（等级的 Pearson 相关系数）**'
- en: \]
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \rho_s =
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: \rho_s =
- en: \frac{\sum_{i=1}^{n}\bigl(R_{x_i}-\bar{R_x}\bigr)\bigl(R_{y_i}-\bar{R_y}\bigr)}
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\sum_{i=1}^{n}\bigl(R_{x_i}-\bar{R_x}\bigr)\bigl(R_{y_i}-\bar{R_y}\bigr)}
- en: '{\sqrt{\sum_{i=1}^{n}\bigl(R_{x_i}-\bar{R_x}\bigr)^2} \;'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '{\sqrt{\sum_{i=1}^{n}\bigl(R_{x_i}-\bar{R_x}\bigr)^2} \;'
- en: \sqrt{\sum_{i=1}^{n}\bigl(R_{y_i}-\bar{R_y}\bigr)^2}},
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: \sqrt{\sum_{i=1}^{n}\bigl(R_{y_i}-\bar{R_y}\bigr)^2}},
- en: \qquad n = 10
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: \qquad n = 10
- en: \]
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '\textbf{Step 3: Mean of rank variables}'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 3：等级变量的平均值**'
- en: \]
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \bar{R_x} = \frac{3+1+2+5+8+4+7+9+10+6}{10} = \frac{55}{10} = 5.5
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: \bar{R_x} = \frac{3+1+2+5+8+4+7+9+10+6}{10} = \frac{55}{10} = 5.5
- en: \]
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \bar{R_y} = \frac{1+2+4+5.5+8.5+3+5.5+8.5+8.5+8.5}{10}
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: \bar{R_y} = \frac{1+2+4+5.5+8.5+3+5.5+8.5+8.5+8.5}{10}
- en: = \frac{55.5}{10} = 5.55
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: = \frac{55.5}{10} = 5.55
- en: \]
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '\textbf{Step 4: Deviations and cross-products}'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 4：偏差和交叉乘积**'
- en: \]
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{array}{c|c|c|c}
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{array}{c|c|c|c}
- en: i & R_{x_i}-\bar{R_x} & R_{y_i}-\bar{R_y} & (R_{x_i}-\bar{R_x})(R_{y_i}-\bar{R_y})
    \\ \hline
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: i & R_{x_i}-\bar{R_x} & R_{y_i}-\bar{R_y} & (R_{x_i}-\bar{R_x})(R_{y_i}-\bar{R_y})
    \\ \hline
- en: 1 & -2.5 & -4.55 & 11.38 \\
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 1 & -2.5 & -4.55 & 11.38 \\
- en: 2 & -4.5 & -3.55 & 15.98 \\
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 2 & -4.5 & -3.55 & 15.98 \\
- en: 3 & -3.5 & -1.55 & 5.43 \\
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 3 & -3.5 & -1.55 & 5.43 \\
- en: 4 & -0.5 & -0.05 & 0.03 \\
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 4 & -0.5 & -0.05 & 0.03 \\
- en: 5 & 2.5 & 2.95 & 7.38 \\
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 5 & 2.5 & 2.95 & 7.38 \\
- en: 6 & -1.5 & -2.55 & 3.83 \\
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 6 & -1.5 & -2.55 & 3.83 \\
- en: 7 & 1.5 & -0.05 & -0.08 \\
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 7 & 1.5 & -0.05 & -0.08 \\
- en: 8 & 3.5 & 2.95 & 10.33 \\
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 8 & 3.5 & 2.95 & 10.33 \\
- en: 9 & 4.5 & 2.95 & 13.28 \\
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 9 & 4.5 & 2.95 & 13.28 \\
- en: 10 & 0.5 & 2.95 & 1.48
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 10 & 0.5 & 2.95 & 1.48
- en: \end{array}
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: \end{array}
- en: \]
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum (R_{x_i}-\bar{R_x})(R_{y_i}-\bar{R_y}) = 68.0
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: \sum (R_{x_i}-\bar{R_x})(R_{y_i}-\bar{R_y}) = 68.0
- en: \]
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '\textbf{Step 5: Sum of squares for each rank variable}'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 5：每个等级变量的平方和**'
- en: \]
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum (R_{x_i}-\bar{R_x})^2 = 82.5,
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: \sum (R_{x_i}-\bar{R_x})^2 = 82.5,
- en: \qquad
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: \qquad
- en: \sum (R_{y_i}-\bar{R_y})^2 = 82.5
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: \sum (R_{y_i}-\bar{R_y})^2 = 82.5
- en: \]
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '\textbf{Step 6: Substitute into the formula}'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 6：代入公式**'
- en: \]
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \rho_s
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: \rho_s
- en: = \frac{68.0}{\sqrt{(82.5)(82.5)}}
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: = \frac{68.0}{\sqrt{(82.5)(82.5)}}
- en: = \frac{68.0}{82.5}
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: = \frac{68.0}{82.5}
- en: = 0.824
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: = 0.824
- en: \]
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '\textbf{Step 7: Interpretation}'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 7：解释**'
- en: \]
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \rho_s = 0.824
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: \rho_s = 0.824
- en: \]
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: A value of \( \rho_s = 0.824 \) shows a strong positive monotonic relationship
    between Height and Weight as height increases, weight also tends to increase.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: \( \rho_s = 0.824 \) 的值表明身高和体重之间存在强烈的正相关关系，即身高增加时，体重也倾向于增加。
- en: This is how we calculate the spearman correlation coefficient.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们计算 Spearman 相关系数的方法。
- en: We also have another formula to calculate the Spearman correlation coefficient,
    but it is used only when there are no tied ranks.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还有一个计算 Spearman 相关系数的公式，但仅在没有任何等级相同时使用。
- en: \[
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \rho_s = 1 – \frac{6\sum d_i^2}{n(n^2 – 1)}
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: \rho_s = 1 – \frac{6\sum d_i^2}{n(n^2 – 1)}
- en: \]
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'where:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: \[
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{aligned}
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: '\rho_s & : \text{ Spearman correlation coefficient} \\[4pt]'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '\rho_s & : \text{Spearman 相关系数} \\[4pt]'
- en: 'd_i & : \text{ difference between the ranks of each observation, } (R_{x_i}
    – R_{y_i}) \\[4pt]'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 'd_i & : \text{每个观测值的排名差异， } (R_{x_i} – R_{y_i}) \\[4pt]'
- en: 'n & : \text{ total number of paired observations}'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 'n & : \text{配对观测值的总数}'
- en: \end{aligned}
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \]
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: If ties are present, the rank differences no longer represent the exact distances
    between positions, and we instead calculate ‘ρ’ using the ‘Pearson correlation
    on ranks’ formula.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 如果存在平局，排名差异不再代表位置之间的确切距离，我们则使用“基于排名的皮尔逊相关系数”公式来计算‘ρ’。
- en: '* * *'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Dataset
  id: totrans-190
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集
- en: The dataset used in this blog is the **[Fish Market dataset](https://www.kaggle.com/datasets/vipullrathod/fish-market?select=Fish.csv)**,
    which contains measurements of fish species sold in markets, including attributes
    like weight, height, and width.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 在本博客中使用的数据集是**[鱼市场数据集](https://www.kaggle.com/datasets/vipullrathod/fish-market?select=Fish.csv)**，其中包含在市场上销售的鱼种测量值，包括重量、高度和宽度等属性。
- en: It is publicly available on Kaggle and is licensed under the [**Creative Commons
    Zero (CC0 Public Domain)**](https://creativecommons.org/publicdomain/zero/1.0/)
    license. This means it can be freely used, modified, and shared for both **non-commercial
    and commercial purposes** without restriction.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 它在Kaggle上公开发布，并受[**Creative Commons Zero (CC0 公共领域**)](https://creativecommons.org/publicdomain/zero/1.0/)许可协议的约束。这意味着它可以无限制地自由使用、修改和共享，无论是用于**非商业目的**还是**商业目的**。
- en: '* * *'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Spearman’s correlation coefficient helps us understand how two variables move
    together when the relationship is not perfectly linear.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 斯皮尔曼相关系数帮助我们理解当关系不是完全线性时，两个变量是如何一起移动的。
- en: By converting the data into ranks, it shows how well one variable increases
    as the other increases, capturing any upward or downward pattern.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将数据转换为排名，它显示了当一个变量增加时另一个变量如何增加，捕捉任何上升或下降的模式。
- en: It is very helpful when the data has outliers, is not normally distributed or
    when the relationship is monotonic but curved.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 当数据有异常值、不是正态分布或关系是单调但曲线时，这非常有帮助。
- en: I hope this post helped you see not just how to calculate the Spearman correlation
    coefficient, but also when to use it and why it is an important tool in data analysis.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这篇帖子能帮助你不仅看到如何计算斯皮尔曼相关系数，还能了解何时使用它以及为什么它是数据分析中的重要工具。
- en: Thanks for reading!
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！
