- en: Spearman Correlation Coefficient for When Pearson Isn’t Enough
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/spearman-correlation-coefficient-for-when-pearson-isnt-enough/](https://towardsdatascience.com/spearman-correlation-coefficient-for-when-pearson-isnt-enough/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1762996772654" class="mdspan-comment">In the previous blog</mdspan>
    on the [Pearson correlation coefficient](https://towardsdatascience.com/pearson-correlation-coefficient-explained-simply/),
    we discussed how it is used to measure the strength of the linear relationship
    between two variables (years of experience and salary).
  prefs: []
  type: TYPE_NORMAL
- en: Not all relationships between variables are linear, and Pearson correlation
    works best when the relationship follows a straight-line pattern.
  prefs: []
  type: TYPE_NORMAL
- en: When the relationship is not linear but still moves consistently in one direction,
    we use Spearman correlation coefficient to capture that pattern.
  prefs: []
  type: TYPE_NORMAL
- en: To understand the Spearman correlation coefficient, let’s consider the [fish
    market dataset](https://www.kaggle.com/datasets/vipullrathod/fish-market?select=Fish.csv).
  prefs: []
  type: TYPE_NORMAL
- en: 'This dataset includes physical attributes of each fish, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: Weight – the weight of the fish in grams (this will be our target variable)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Length1, Length2, Length3 – various length measurements (in cm)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Height – the height of the fish (in cm)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Width – the diagonal width of the fish body (in cm)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: We need to predict the weight of the fish based on various length measurements,
    height and width.
  prefs: []
  type: TYPE_NORMAL
- en: This was the same example we used to understand the math behind multiple linear
    regression in an earlier blog but used only height and width as independent variables
    first to get the individual equations for slopes and intercepts.
  prefs: []
  type: TYPE_NORMAL
- en: Here we are trying to fit a multiple linear regression model, and we have five
    independent variables and one target variable.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s calculate the Pearson correlation coefficient between each independent
    variable and the target variable.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The Pearson correlation coefficient between Weight and
  prefs: []
  type: TYPE_NORMAL
- en: Length3 is 0.923044
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Length2 is 0.918618
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Length1 is 0.915712
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Width is 0.886507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Height is 0.724345
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Among all the variables, **Height** has the weakest Pearson correlation coefficient,
    and we might think that we should drop this variable before applying the multiple
    linear regression model.
  prefs: []
  type: TYPE_NORMAL
- en: But before that, is it correct to drop an independent variable based on Pearson
    correlation coefficient?
  prefs: []
  type: TYPE_NORMAL
- en: No.
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s look at the scatter plot between Height and Weight.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4734c6e7217dc7c2f8110c1604188d23.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: From the scatter plot we can observe that as height increases, weight also increases,
    but the relationship is not linear.
  prefs: []
  type: TYPE_NORMAL
- en: At smaller heights, the weight increases slowly. At larger heights, it increases
    more quickly.
  prefs: []
  type: TYPE_NORMAL
- en: Here the trend is non-linear but still monotonic, because it moves in one direction.
  prefs: []
  type: TYPE_NORMAL
- en: Since the Pearson correlation coefficient assumes a straight-line relationship
    (linearity), it gives a lower value here.
  prefs: []
  type: TYPE_NORMAL
- en: This is where the Spearman correlation coefficient comes in.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s calculate the Spearman correlation coefficient between Height and
    Weight.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The **Spearman correlation coefficient is 0.8586**, which indicates a strong
    positive relationship between Height and Weight.
  prefs: []
  type: TYPE_NORMAL
- en: This means that as the height of the fish increases, the weight also tends to
    increase.
  prefs: []
  type: TYPE_NORMAL
- en: Earlier, we got a **Pearson correlation coefficient of 0.72** between Height
    and Weight, which underestimates the actual relationship between these variables.
  prefs: []
  type: TYPE_NORMAL
- en: If we select features only based on the Pearson correlation and remove the Height
    feature, we might lose an important variable that actually has a strong relationship
    with the target, leading to less relevant predictions.
  prefs: []
  type: TYPE_NORMAL
- en: This is where the **Spearman correlation coefficient** helps, as it captures
    non-linear but monotonic trends.
  prefs: []
  type: TYPE_NORMAL
- en: By using the Spearman correlation, we can also decide the next steps, such as
    applying transformations like log or lag values or considering algorithms like
    decision trees or random forests that can handle both linear and non-linear relationships.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: As we have understood the significance of the Spearman correlation coefficient,
    now it is time to understand the math behind it.
  prefs: []
  type: TYPE_NORMAL
- en: How is the Spearman correlation coefficient calculated in a way that it captures
    the relationship even when the data is non-linear and monotonic?
  prefs: []
  type: TYPE_NORMAL
- en: To understand this, let’s consider a 10-point sample from the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/894e01dca3b5497be083e5d7dece1c81.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Now, we sort the values in ascending order in each column and then assign ranks.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3175b9af56047b0790712fd24463c437.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have given ranks to both Height and Weight, we don’t keep them in
    the sorted order.
  prefs: []
  type: TYPE_NORMAL
- en: Each value needs to go back to its original place in the dataset so that every
    fish’s height rank is matched with its own weight rank.
  prefs: []
  type: TYPE_NORMAL
- en: We sort the columns only to assign ranks. After that, we place the ranks back
    in their original order and then calculate the Spearman correlation using these
    two sets of ranks.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d4aa66bcce36284c1f26c495f904d56c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Here, while assigning ranks after sorting the values in ascending order in the
    **Weight** column, we encountered a tie at ranks **5 and 6**, so we assigned both
    values the **average rank of 5.5**.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, we found another tie across ranks **7, 8, 9, and 10**, so we assigned
    all of them the **average rank of 8.5**.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we calculate the **Spearman correlation coefficient**, which is actually
    the **Pearson correlation applied to the ranks**.
  prefs: []
  type: TYPE_NORMAL
- en: We already know the formula for calculating Pearson correlation coefficient.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: r = \frac{\text{Cov}(X, Y)}{s_X \cdot s_Y}
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{\frac{1}{n – 1} \sum_{i=1}^{n} (X_i – \bar{X})(Y_i – \bar{Y})}
  prefs: []
  type: TYPE_NORMAL
- en: '{\sqrt{\frac{1}{n – 1} \sum_{i=1}^{n} (X_i – \bar{X})^2} \cdot \sqrt{\frac{1}{n
    – 1} \sum_{i=1}^{n} (Y_i – \bar{Y})^2}}'
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{\sum_{i=1}^{n} (X_i – \bar{X})(Y_i – \bar{Y})}
  prefs: []
  type: TYPE_NORMAL
- en: '{\sqrt{\sum_{i=1}^{n} (X_i – \bar{X})^2} \cdot \sqrt{\sum_{i=1}^{n} (Y_i –
    \bar{Y})^2}}'
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: '**Now, the formula for Spearman correlation coefficient is:**'
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: r_s =
  prefs: []
  type: TYPE_NORMAL
- en: \frac{
  prefs: []
  type: TYPE_NORMAL
- en: \sum_{i=1}^{n}
  prefs: []
  type: TYPE_NORMAL
- en: \underbrace{(R_{X_i} – \bar{R}_X)}_{\text{Rank deviation of } X_i}
  prefs: []
  type: TYPE_NORMAL
- en: \cdot
  prefs: []
  type: TYPE_NORMAL
- en: \underbrace{(R_{Y_i} – \bar{R}_Y)}_{\text{Rank deviation of } Y_i}
  prefs: []
  type: TYPE_NORMAL
- en: '}{'
  prefs: []
  type: TYPE_NORMAL
- en: \sqrt{
  prefs: []
  type: TYPE_NORMAL
- en: \sum_{i=1}^{n}
  prefs: []
  type: TYPE_NORMAL
- en: \underbrace{(R_{X_i} – \bar{R}_X)^2}_{\text{Squared rank deviations of } X}
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  prefs: []
  type: TYPE_NORMAL
- en: \cdot
  prefs: []
  type: TYPE_NORMAL
- en: \sqrt{
  prefs: []
  type: TYPE_NORMAL
- en: \sum_{i=1}^{n}
  prefs: []
  type: TYPE_NORMAL
- en: \underbrace{(R_{Y_i} – \bar{R}_Y)^2}_{\text{Squared rank deviations of } Y}
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \text{Where:} \\
  prefs: []
  type: TYPE_NORMAL
- en: R_{X_i} & = \text{ rank of the } i^\text{th} \text{ value in variable } X \\
  prefs: []
  type: TYPE_NORMAL
- en: R_{Y_i} & = \text{ rank of the } i^\text{th} \text{ value in variable } Y \\
  prefs: []
  type: TYPE_NORMAL
- en: \bar{R}_X & = \text{ mean of all ranks in } X \\
  prefs: []
  type: TYPE_NORMAL
- en: \bar{R}_Y & = \text{ mean of all ranks in } Y
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s calculate the Spearman correlation coefficient for the sample data.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: '\textbf{Step 1: Ranks from the original data}'
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{array}{c|cccccccccc}
  prefs: []
  type: TYPE_NORMAL
- en: R_{x_i} & 3 & 1 & 2 & 5 & 8 & 4 & 7 & 9 & 10 & 6 \\[2pt]
  prefs: []
  type: TYPE_NORMAL
- en: R_{y_i} & 1 & 2 & 4 & 5.5 & 8.5 & 3 & 5.5 & 8.5 & 8.5 & 8.5
  prefs: []
  type: TYPE_NORMAL
- en: \end{array}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: '\textbf{Step 2: Formula of Spearman’s correlation (Pearson on ranks)}'
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \rho_s =
  prefs: []
  type: TYPE_NORMAL
- en: \frac{\sum_{i=1}^{n}\bigl(R_{x_i}-\bar{R_x}\bigr)\bigl(R_{y_i}-\bar{R_y}\bigr)}
  prefs: []
  type: TYPE_NORMAL
- en: '{\sqrt{\sum_{i=1}^{n}\bigl(R_{x_i}-\bar{R_x}\bigr)^2} \;'
  prefs: []
  type: TYPE_NORMAL
- en: \sqrt{\sum_{i=1}^{n}\bigl(R_{y_i}-\bar{R_y}\bigr)^2}},
  prefs: []
  type: TYPE_NORMAL
- en: \qquad n = 10
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: '\textbf{Step 3: Mean of rank variables}'
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \bar{R_x} = \frac{3+1+2+5+8+4+7+9+10+6}{10} = \frac{55}{10} = 5.5
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \bar{R_y} = \frac{1+2+4+5.5+8.5+3+5.5+8.5+8.5+8.5}{10}
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{55.5}{10} = 5.55
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: '\textbf{Step 4: Deviations and cross-products}'
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{array}{c|c|c|c}
  prefs: []
  type: TYPE_NORMAL
- en: i & R_{x_i}-\bar{R_x} & R_{y_i}-\bar{R_y} & (R_{x_i}-\bar{R_x})(R_{y_i}-\bar{R_y})
    \\ \hline
  prefs: []
  type: TYPE_NORMAL
- en: 1 & -2.5 & -4.55 & 11.38 \\
  prefs: []
  type: TYPE_NORMAL
- en: 2 & -4.5 & -3.55 & 15.98 \\
  prefs: []
  type: TYPE_NORMAL
- en: 3 & -3.5 & -1.55 & 5.43 \\
  prefs: []
  type: TYPE_NORMAL
- en: 4 & -0.5 & -0.05 & 0.03 \\
  prefs: []
  type: TYPE_NORMAL
- en: 5 & 2.5 & 2.95 & 7.38 \\
  prefs: []
  type: TYPE_NORMAL
- en: 6 & -1.5 & -2.55 & 3.83 \\
  prefs: []
  type: TYPE_NORMAL
- en: 7 & 1.5 & -0.05 & -0.08 \\
  prefs: []
  type: TYPE_NORMAL
- en: 8 & 3.5 & 2.95 & 10.33 \\
  prefs: []
  type: TYPE_NORMAL
- en: 9 & 4.5 & 2.95 & 13.28 \\
  prefs: []
  type: TYPE_NORMAL
- en: 10 & 0.5 & 2.95 & 1.48
  prefs: []
  type: TYPE_NORMAL
- en: \end{array}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \sum (R_{x_i}-\bar{R_x})(R_{y_i}-\bar{R_y}) = 68.0
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: '\textbf{Step 5: Sum of squares for each rank variable}'
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \sum (R_{x_i}-\bar{R_x})^2 = 82.5,
  prefs: []
  type: TYPE_NORMAL
- en: \qquad
  prefs: []
  type: TYPE_NORMAL
- en: \sum (R_{y_i}-\bar{R_y})^2 = 82.5
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: '\textbf{Step 6: Substitute into the formula}'
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \rho_s
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{68.0}{\sqrt{(82.5)(82.5)}}
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{68.0}{82.5}
  prefs: []
  type: TYPE_NORMAL
- en: = 0.824
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: '\textbf{Step 7: Interpretation}'
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \rho_s = 0.824
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: A value of \( \rho_s = 0.824 \) shows a strong positive monotonic relationship
    between Height and Weight as height increases, weight also tends to increase.
  prefs: []
  type: TYPE_NORMAL
- en: This is how we calculate the spearman correlation coefficient.
  prefs: []
  type: TYPE_NORMAL
- en: We also have another formula to calculate the Spearman correlation coefficient,
    but it is used only when there are no tied ranks.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \rho_s = 1 – \frac{6\sum d_i^2}{n(n^2 – 1)}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: 'where:'
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: '\rho_s & : \text{ Spearman correlation coefficient} \\[4pt]'
  prefs: []
  type: TYPE_NORMAL
- en: 'd_i & : \text{ difference between the ranks of each observation, } (R_{x_i}
    – R_{y_i}) \\[4pt]'
  prefs: []
  type: TYPE_NORMAL
- en: 'n & : \text{ total number of paired observations}'
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: If ties are present, the rank differences no longer represent the exact distances
    between positions, and we instead calculate ‘ρ’ using the ‘Pearson correlation
    on ranks’ formula.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The dataset used in this blog is the **[Fish Market dataset](https://www.kaggle.com/datasets/vipullrathod/fish-market?select=Fish.csv)**,
    which contains measurements of fish species sold in markets, including attributes
    like weight, height, and width.
  prefs: []
  type: TYPE_NORMAL
- en: It is publicly available on Kaggle and is licensed under the [**Creative Commons
    Zero (CC0 Public Domain)**](https://creativecommons.org/publicdomain/zero/1.0/)
    license. This means it can be freely used, modified, and shared for both **non-commercial
    and commercial purposes** without restriction.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Spearman’s correlation coefficient helps us understand how two variables move
    together when the relationship is not perfectly linear.
  prefs: []
  type: TYPE_NORMAL
- en: By converting the data into ranks, it shows how well one variable increases
    as the other increases, capturing any upward or downward pattern.
  prefs: []
  type: TYPE_NORMAL
- en: It is very helpful when the data has outliers, is not normally distributed or
    when the relationship is monotonic but curved.
  prefs: []
  type: TYPE_NORMAL
- en: I hope this post helped you see not just how to calculate the Spearman correlation
    coefficient, but also when to use it and why it is an important tool in data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
