- en: Things I Learned by Participating in GenAI Hackathons Over the Past 6 Months
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我在过去六个月参加GenAI黑客马拉松中学到的东西
- en: 原文：[https://towardsdatascience.com/things-i-learnt-by-participating-in-genai-hackathons-over-the-past-6-months/](https://towardsdatascience.com/things-i-learnt-by-participating-in-genai-hackathons-over-the-past-6-months/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/things-i-learnt-by-participating-in-genai-hackathons-over-the-past-6-months/](https://towardsdatascience.com/things-i-learnt-by-participating-in-genai-hackathons-over-the-past-6-months/)
- en: <mdspan datatext="el1760985257164" class="mdspan-comment">Hackathons aren’t
    something new</mdspan>, but their frequency and accessibility have definitely
    grown a lot recently. Earlier, they were mostly reserved for predictive machine
    learning problems (think [Kaggle](https://www.kaggle.com/)), but now, the focus,
    at least in my view, has shifted more towards building usable prototypes. Coding
    still matters, but the barrier to entry is lower, which means more people can
    participate. This is good for both participants as well as the companies, because
    it opens up so many new ways to use their tools.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760985257164" class="mdspan-comment">黑客马拉松并不是什么新鲜事</mdspan>，但它们的频率和可及性确实在最近大幅增长。以前，它们主要被保留用于预测机器学习问题（想想[Kaggle](https://www.kaggle.com/)），但现在，至少在我看来，重点已经更多地转向构建可用的原型。编码仍然很重要，但入门门槛更低，这意味着更多的人可以参与。这对参与者以及公司都有好处，因为它开辟了使用他们工具的新方式。
- en: To make the most of this, I’ve spent the past six months joining different hackathons
    organised by Gradio, Kaggle, Gemini, OpenAI, and more.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了最大限度地利用这一点，我在过去六个月里参加了Gradio、Kaggle、Gemini、OpenAI等组织举办的多个黑客马拉松。
- en: '[![](../Images/b55b54a5d23debcf9653cb11fbf33ad3.png)](https://www.linkedin.com/posts/parulpandeyindia_readright-activity-7358142211814776832-CbVs/)'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/b55b54a5d23debcf9653cb11fbf33ad3.png)](https://www.linkedin.com/posts/parulpandeyindia_readright-activity-7358142211814776832-CbVs/)'
- en: 'I’ve had all kinds of outcomes: top-3 finishes in a few, consolation prizes
    in others, some results still pending, a few where I didn’t even make the cut,
    and a couple where I couldn’t finish in time to submit. But irrespective of the
    result, each hackathon has been a great learning experience and in this article,
    I share some of my reflections and takeaways from the journey, in no particular
    order.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我经历了各种结果：在几个比赛中获得前三名，在其他比赛中获得安慰奖，一些结果仍在等待中，有几个我甚至没有进入决赛，还有几个我没有及时完成以提交。但无论结果如何，每个黑客马拉松都是一个极好的学习经历，在这篇文章中，我将分享我在这次旅程中的一些反思和收获，不分先后顺序。
- en: 1\. Every idea starts small
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 每个想法都始于微小
- en: An idea is fragile in the beginning. It has to be nurtured and needs time to
    grow. In the beginning ideas may appear messy, too wide and probably too simple.
    However as you spend more time, iterate on them, you’ll see them slowly converging
    to something meaningful and workable.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一个想法在开始时是脆弱的。它需要被培养，需要时间来成长。一开始，想法可能看起来很混乱，过于宽泛，可能也太简单。然而，随着你花更多的时间，对它们进行迭代，你会看到它们逐渐汇聚成有意义且可行的事物。
- en: I always thought that there is an a-ha! moment and you get ideas via some inspiration.
    In reality, it takes a lot of effort to go from a basic form to something that
    can be worked upon and that is the beauty of ideation. More often than not, the
    final product looks a lot different than the first sketch and honestly, I enjoy
    this ideation phase even more than the submission, because that’s when creativity
    comes alive.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直认为有一个“啊哈！”的时刻，你通过某种灵感获得想法。实际上，从基本形式到可以工作的东西需要付出很多努力，这就是创意的魅力。很多时候，最终产品与最初的草图大相径庭，而且老实说，我甚至比提交阶段更喜欢这个创意阶段，因为那是创意焕发的时候。
- en: 'This phase reminds me of the [**Double Diamond model**](https://www.designcouncil.org.uk/our-resources/framework-for-innovation/)
    from the [**Design Council**](https://www.designcouncil.org.uk/)which shows two
    stages of the design process:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这个阶段让我想起了[**双重钻石模型**](https://www.designcouncil.org.uk/our-resources/framework-for-innovation/)，这是[**设计委员会**](https://www.designcouncil.org.uk/)提出的，它展示了设计过程的两个阶段：
- en: 'The first diamond: *Discover → Define* (understanding the problem)'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一颗钻石：*发现 → 定义*（理解问题）
- en: 'The second diamond: *Develop → Deliver* (creating and refining solutions)'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二颗钻石：*开发 → 交付*（创造和改进解决方案）
- en: '![](../Images/4d977c3ad0e7da8723476b9562b04777.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4d977c3ad0e7da8723476b9562b04777.png)'
- en: The [Double Diamond](https://www.designcouncil.org.uk/our-resources/the-double-diamond/)
    by [the Design Council](https://www.designcouncil.org.uk/) — licensed under a
    [CC BY 4.0 license](https://creativecommons.org/licenses/by/4.0/).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '[设计委员会](https://www.designcouncil.org.uk/)的[**双重钻石**](https://www.designcouncil.org.uk/our-resources/the-double-diamond/)——根据[CC
    BY 4.0许可](https://creativecommons.org/licenses/by/4.0/)授权。'
- en: 2\. The 80/20 Rule
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 80/20 规则
- en: In the excitement of submission, it’s easy to get straight into coding. I’ve
    done this myself. Once, I rushed ahead with an idea that felt exciting, only to
    realize halfway that it wasn’t realistic and didn’t even fit the theme. Since
    it was a weekend hackathon, I had already lost crucial time.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在提交的兴奋中，很容易直接进入编码。我自己也这样做过。有一次，我带着一个感觉令人兴奋的想法匆匆忙忙地前进，结果发现一半时它并不现实，甚至不符合主题。由于这是一个周末黑客马拉松，我已经浪费了宝贵的时间。
- en: '![](../Images/a6affb3362c009f591225f59d8b39013.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a6affb3362c009f591225f59d8b39013.png)'
- en: Spend 80% time on the idea and 20% on execution | Image by the Author
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在想法上花80%的时间，在执行上花20%的时间 | 图片由作者提供
- en: 'What I’ve learned is simple: **spend 80% of your time upfront thinking and
    validating your idea,** so the **build takes only 20%**. This saves you from a
    lot of wasted effort and painful rework.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我学到的是简单的：**在前期花80%的时间思考和验证你的想法，**这样**构建过程只需20%**。这可以节省你大量的无效努力和痛苦的返工。
- en: 3\. Keep It Simple, Don’t Overcomplicate
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 简化，不要过度复杂化
- en: As [Dieter Rams](https://en.wikipedia.org/wiki/Dieter_Rams), the visionary designer,
    famously said,
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 正如著名的设计师[迪特·拉姆斯](https://en.wikipedia.org/wiki/Dieter_Rams)所说，
- en: '[*Good design is as little design as possible. Less, but better — because it
    concentrates on the essential aspects, and the products are not burdened with
    non-essentials*](https://www.vitsoe.com/us/about/good-design#good-design-is-as-little-design-as-possible)*.*'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[*好的设计就是尽可能少的设计。少，但更好——因为它专注于本质方面，产品不会负担非本质的东西*](https://www.vitsoe.com/us/about/good-design#good-design-is-as-little-design-as-possible)*.*'
- en: Adding more features to your app can be great, and useful ones can make your
    product stand out, but sometimes we go too far, piling on too much, and the product
    ends up distracting the user instead of helping them. There is also a term for
    this called **Feature Bloat. **
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 向你的应用程序添加更多功能可能很好，有用的功能可以使你的产品脱颖而出，但有时我们做得太过分，堆砌了太多，最终产品反而让用户分心，而不是帮助他们。也有一个术语叫**功能膨胀**。
- en: '![The image shows a white remote control with numerous buttons on the left,
    alongside a thumbs-down icon, implying it has too many features and makes its
    interface cluttered and difficult to navigate.](../Images/95e7810ebf78db50a24fb554ddf7caf9.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片显示了一个左侧有众多按钮的白色遥控器，旁边有一个向下点赞图标，暗示它有太多功能，使得界面杂乱且难以导航。](../Images/95e7810ebf78db50a24fb554ddf7caf9.png)'
- en: Sometimes less is better | Image created by Author with some inputs from Gemini
    2.5 Flash Image.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候少即是多 | 图片由作者创作，部分灵感来自Gemini 2.5 Flash 图片。
- en: Take, for instance, the traditional TV remote. It has so many buttons and we
    don’t even use half of them. I mean, why include stuff that is not usable and
    takes up so much space? Instead, keeping only the most-used and essential buttons
    can reduce clutter and make the remote far more useful.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 以传统的电视遥控器为例。它有那么多按钮，我们甚至没有使用一半。我的意思是，为什么包括那些不可用且占用大量空间的东西？相反，只保留最常用和必要的按钮可以减少杂乱，使遥控器更加有用。
- en: The tweet below nicely encapsulates my own thoughts in a very subtle manner.
    While its easier to create features today, thanks to AI assistance, make sure
    you use that help to build something meaningful instead of just slop.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的推文以一种非常微妙的方式很好地概括了我的想法。虽然今天借助AI辅助更容易创建功能，但请确保使用这种帮助来构建有意义的东西，而不是仅仅堆积垃圾。
- en: AI is accelerating product bloat.
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: AI正在加速产品膨胀。
- en: ''
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Teams can ship features 10x faster, so they do – without asking if they should.
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 团队可以以10倍的速度发布功能，所以他们确实做到了——而不问他们是否应该这么做。
- en: ''
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Result: Frankenstein products with features bolted on, no coherent design,
    high cognitive load.'
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 结果：功能堆砌的弗兰肯斯坦产品，没有连贯的设计，认知负荷高。
- en: ''
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'AI gives you 80%. Your job is the remaining 20%: solve real user…'
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: AI给你80%，你的工作是剩下的20%：解决真实用户...
- en: ''
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Madhu Guru (@realmadhuguru) [October 10, 2025](https://twitter.com/realmadhuguru/status/1976717194206888211?ref_src=twsrc%5Etfw)
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Madhu Guru (@realmadhuguru) [2025年10月10日](https://twitter.com/realmadhuguru/status/1976717194206888211?ref_src=twsrc%5Etfw)
- en: 4\. Don’t neglect the code
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 不要忽视代码
- en: Putting together code today is easier than ever. With coding agents, you can
    spin up a working app quickly, but writing code that’s clean, readable, and safe
    is still a skill. If you’re aiming to turn your hackathon project into something
    production-ready, you need to review your code yourself. I’ve seen people hardcode
    API keys or ignore basic security practices just to ***make it work***. That’s
    fine for a quick demo, but dangerous beyond it as can be seen in the viral example
    below.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在编写代码比以往任何时候都要容易。有了编码代理，你可以快速启动一个可工作的应用程序，但编写干净、可读和安全代码仍然是一项技能。如果你打算将你的黑客马拉松项目转变为一个可生产的版本，你需要自己审查你的代码。我见过一些人为了**让它工作**而硬编码
    API 密钥或忽视基本的安全实践。对于快速演示来说这可以，但超出这个范围就非常危险，正如下面流行的例子所示。
- en: '[securityJustInterferesWithVibes](https://www.reddit.com/r/ProgrammerHumor/comments/1jdfhlo/securityjustinterfereswithvibes/)'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[securityJustInterferesWithVibes](https://www.reddit.com/r/ProgrammerHumor/comments/1jdfhlo/securityjustinterfereswithvibes/)'
- en: by[u/da_peda](https://www.reddit.com/user/da_peda/) in[ProgrammerHumor](https://www.reddit.com/r/ProgrammerHumor/)
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 由[u/da_peda](https://www.reddit.com/user/da_peda/)在[ProgrammerHumor](https://www.reddit.com/r/ProgrammerHumor/)发布
- en: '[Matt Palmer](https://x.com/mattppal) from Replit has written an excellent
    blog addressing this very problem. In his write-up on [Secure Vibe Coding](https://blog.replit.com/16-ways-to-vibe-code-securely),
    he has captured the security issues that come with modern vibe coding**.** It’s
    definitely worth a read.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '[Matt Palmer](https://x.com/mattppal) 来自 Replit，他撰写了一篇优秀的博客，针对这个问题进行了阐述。在他的文章《[Secure
    Vibe Coding](https://blog.replit.com/16-ways-to-vibe-code-securely)》中，他捕捉到了现代
    vibe 编码带来的安全问题**。** 这篇文章绝对值得一读。'
- en: Matt shares a practical security checklist and several best practices to help
    keep hackathon projects safe. For instance, he emphasizes the need to keep dependencies
    updated, since most vulnerabilities arise from outdated libraries. He also stresses
    proper error handling to avoid exposing sensitive details in error messages. Cookies
    should be secured and for file uploads, he recommends validating file types and
    sizes and scanning for any malicious content. Lastly, he advises implementing
    rate limiting on all API endpoints, especially those related to authentication.
    The figure below is adapted from his blog itself.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Matt 分享了一个实用的安全清单和几个最佳实践，以帮助保持黑客马拉松项目的安全性。例如，他强调保持依赖项更新的必要性，因为大多数漏洞都源于过时的库。他还强调正确的错误处理，以避免在错误消息中暴露敏感细节。Cookies
    应该得到保护，对于文件上传，他建议验证文件类型和大小，并扫描任何恶意内容。最后，他建议在所有 API 端点实施速率限制，特别是与身份验证相关的那些。下面的图示来自他的博客本身。
- en: '![](../Images/14fb9c06606b4a4e64e0fca326a5b3ab.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/14fb9c06606b4a4e64e0fca326a5b3ab.png)'
- en: 'Adapted from [Secure Vibe Coding: The Tools and Fundamentals to Vibe Code Securely](https://blog.replit.com/16-ways-to-vibe-code-securely)
    | Image by Author'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '改编自 [Secure Vibe Coding: The Tools and Fundamentals to Vibe Code Securely](https://blog.replit.com/16-ways-to-vibe-code-securely)
    | 图像由作者提供'
- en: 5\. Think Like a Product Person
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 像产品经理一样思考
- en: Most hackathons today don’t just ask for a working prototype. They also expect
    a project write-up and a short demo video that looks professional. This means
    you need to focus on every aspect of your project, from ideation to final presentation,
    much like a product person**.** Coding is important, but it’s not the only consideration.
    Your use case and how your project delivers value matter just as much. You’re
    not only defining the problem but also thinking about the user journey and how
    your product solves that specific need.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如今的大多数黑客马拉松不仅要求一个可工作的原型，还期望一个项目报告和一段专业的简短演示视频。这意味着你需要关注项目的每一个方面，从构思到最终展示，就像一个产品经理**。**
    编码很重要，但并非唯一需要考虑的因素。你的用例以及你的项目如何提供价值同样重要。你不仅是在定义问题，还在思考用户旅程以及你的产品如何满足这一特定需求。
- en: For instance, the [Gemma 3n Impact Challenge](https://www.kaggle.com/competitions/google-gemma-3n-hackathon),
    which went live on Kaggle earlier this year, required participants to include
    a video demo, a technical write-up, a public repository with the code, and a live
    demo of the hosted project as part of their submission. And trust me, creating
    professional-quality videos isn’t easy.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，今年早些时候在 Kaggle 上发布的 [Gemma 3n Impact Challenge](https://www.kaggle.com/competitions/google-gemma-3n-hackathon)，要求参与者包括视频演示、技术报告、包含代码的公共仓库以及作为提交部分的项目实时演示。相信我，制作高质量的视频并不容易。
- en: '![](../Images/e2b365ee218baccd367327419f1c22d8.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e2b365ee218baccd367327419f1c22d8.png)'
- en: The submission requirements for the [Gemma 3n Impact Challenge](https://www.kaggle.com/competitions/google-gemma-3n-hackathon)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '[Gemma 3n 影响挑战赛](https://www.kaggle.com/competitions/google-gemma-3n-hackathon)的提交要求'
- en: That’s why it’s essential to plan time for presentation. I usually record videos,
    edit them, add captions, and even do a voice-over. It takes effort, but if you’ve
    worked hard on your idea, showing it well is just as important as building it.
    Here’s my team’s attempt at creating the video presentation for the Gemma 3n Impact
    Challenge.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为演示计划时间至关重要。我通常会录制视频，编辑它们，添加字幕，甚至进行配音。这需要付出努力，但如果你在想法上付出了很多努力，展示它和构建它一样重要。这是我团队为Gemma
    3n 影响挑战赛创建的视频演示尝试。
- en: 6\. Look around for inspiration
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 寻找灵感
- en: The best hackathon projects solve real problems. Start by observing actual pain
    points around you and ask yourself what feature you had always wanted that didn’t
    exist yet.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的黑客马拉松项目解决实际问题。首先观察你周围的实际痛点，然后问问自己，你一直想要的那个尚未存在的功能是什么。
- en: In these hackathons, your first ***users*** are the judges, so it helps to think
    from their perspective. For instance, I participated in this year’s Meta Kaggle
    Hackathon, where Kaggle provided 15 years of data for the community to analyze
    and uncover trends and insights that could be useful. For this challenge, I approached
    the data from Kaggle’s point of view and tried to understand what signals matter
    most for their community growth and whether Kaggle’s recent efforts were helping
    revive engagement.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些黑客马拉松中，你的第一个***用户***是评委，因此从他们的角度思考会很有帮助。例如，我参加了今年Meta Kaggle黑客马拉松，Kaggle为社区提供了15年的数据进行分析，以揭示可能有用的趋势和洞察。对于这个挑战，我从Kaggle的角度处理数据，并试图了解哪些信号对他们的社区增长最重要，以及Kaggle最近的努力是否有助于恢复参与度。
- en: My submission, which earned second prize, focused on why many community members
    go silent after joining and what can be done to reactivate them*?* I believe this
    addresses a real pain point not only for Kaggle but for many other tech communities,
    and I’m glad it resonated with the judges.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我获得第二名的作品聚焦于为什么许多社区成员在加入后变得沉默，以及可以采取哪些措施来重新激活他们*？*我相信这不仅仅解决了Kaggle的问题，也解决了许多其他技术社区的问题，我很高兴它引起了评委的共鸣。
- en: '![](../Images/406a231ee6ce046c0af900e0e7348b71.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/406a231ee6ce046c0af900e0e7348b71.png)'
- en: '[My 2nd place winning submission for the MetaKaggle Hackathon, 2025](https://www.kaggle.com/competitions/meta-kaggle-hackathon/writeups/why-do-so-many-kaggle-users-go-quiet-and-what-migh#3249791)'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '[我的2025年Meta Kaggle黑客马拉松第二名获奖作品](https://www.kaggle.com/competitions/meta-kaggle-hackathon/writeups/why-do-so-many-kaggle-users-go-quiet-and-what-migh#3249791)'
- en: Social media also serves as a great source of inspiration. On platforms like
    X or Reddit, people are very vocal about what frustrates them. While there is
    plenty of noise, if we are able to sift the signals, we can have ideas that could
    be turned into impactful solutions. When you focus on solving a real, specific
    problem, the solution often ends up helping a much wider audience.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体也是一个极好的灵感来源。在X或Reddit等平台上，人们对让他们感到沮丧的事情非常直言不讳。虽然有很多噪音，但如果我们能够筛选出信号，我们就可以有可以转化为有影响力的解决方案的想法。当你专注于解决一个真实、具体的问题时，解决方案往往最终会帮助更广泛的受众。
- en: 7\. Create an Idea Bank
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 创建想法库
- en: '*The best way to have a good idea is to have lots of ideas.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '*拥有许多想法是拥有好想法的最佳方式。'
- en: — Linus Pauling*
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: — 林纳斯·鲍林*
- en: Ideas don’t wait for hackathons and inspirations can strike anytime. Therefore
    Instead of letting them slip away, create a simple idea bank to capture them.
    It doesn’t have to be fancy. A simple notes app, a Notion page or even a spreadsheet
    works equally well. The point is to store every spark so that when a hackathon
    comes around, you’re not starting from zero.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 灵感不会等待黑客马拉松，它们可能随时出现。因此，不要让它们溜走，创建一个简单的想法库来捕捉它们。它不必很复杂。一个简单的笔记应用、Notion页面，甚至电子表格都同样有效。关键是存储每一个火花，这样当黑客马拉松来临时，你不会从零开始。
- en: It’s also important to regularly organize your ideas. As David Allen emphasizes
    in his writing on [capturing good ideas](https://gettingthingsdone.com/2018/02/capturing-good-ideas/?utm_source=chatgpt.com),
    it’s not enough to just have the tools; you also need the habit of organizing
    them later. He notes, “If you leave emails unprocessed in your inbox, or paper
    notes piled up in a briefcase or notepad somewhere, the whole process is defeated,
    and your motivation to continue will disappear.”
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 定期整理你的想法也同样重要。正如大卫·艾伦在他的关于[捕捉好想法](https://gettingthingsdone.com/2018/02/capturing-good-ideas/?utm_source=chatgpt.com)的文章中强调的那样，仅仅拥有工具是不够的；你还需要养成整理这些工具的习惯。他提到：“如果你在收件箱中留下未处理的电子邮件，或者在某个公文包或笔记本中堆满了纸张笔记，整个过程就会失败，你继续的动力也会消失。”
- en: By building this habit, you’ll already have a pool of ideas ready to refine,
    adapt, and build on.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 通过养成这个习惯，你将已经拥有一批准备好的想法，可以对其进行完善、调整和构建。
- en: 8\. Choosing the Right Hackathons to Join
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8. 选择合适的黑客马拉松加入
- en: While hackathons are fun, it’s just as important to know which ones to skip.
    In the beginning, I signed up for almost every event I came across. At one point,
    I ended up doing four back-to-back hackathons,  two that lasted two months each
    and two weekend sprints. It was exciting, but exhausting, and I burned out quickly.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然黑客马拉松很有趣，但了解哪些黑客马拉松应该放弃同样重要。一开始，我几乎报名参加了遇到的每一个活动。有一次，我连续参加了四个连续的黑客马拉松，其中两个持续了两个月，另外两个是周末冲刺。这很刺激，但也非常累人，我很快就筋疲力尽了。
- en: Now I’m more selective about where I invest my time and energy. Picking the
    right hackathons means you can focus better, build stronger projects, and actually
    enjoy the process instead of running yourself into the ground.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我更加挑剔地选择我投入时间和精力的地方。选择合适的黑客马拉松意味着你可以更好地集中精力，构建更强大的项目，并真正享受这个过程，而不是把自己累垮。
- en: 9\. Share your work with the world
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9. 与世界分享你的工作
- en: Creating a working app takes real effort, so whenever you can, share it with
    the community  and there’s no better place than X to do that. Showcase your project
    to the world, whether it wins or not. You never know who might find it useful
    or whose problem it might solve. Sharing openly also helps you get feedback so
    that you can continue to improve upon your idea. Who knows, you might even end
    up teaming up with someone for your next hackathon.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个工作应用需要真正的努力，所以只要可能，就与社区分享，而X无疑是做这件事的最佳场所。无论你的项目是否获奖，都要向世界展示你的项目。你永远不知道谁可能会发现它的有用之处，或者它可能会解决谁的问题。公开分享也有助于你获得反馈，以便你能够继续改进你的想法。谁知道呢，你甚至可能会与某人合作参加下一场黑客马拉松。
- en: Final Thoughts and Finding Your Next Hackathon
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法和寻找你的下一个黑客马拉松
- en: Participating in these GenAI hackathons reminds me of machine learning competitions
    on Kaggle. When you first start, everything feels overwhelming, but gradually
    you develop a set of best practices and a reliable toolkit you can fall back on
    and adapt quickly. Over time, I’ve built a personal toolbox that brings together
    building blocks and lessons from every competition I’ve taken part in.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 参与这些GenAI黑客马拉松让我想起了Kaggle上的机器学习竞赛。当你刚开始时，一切都会让你感到不知所措，但渐渐地，你会发展出一套最佳实践和可靠的工具包，你可以依赖并快速适应。随着时间的推移，我已经建立了一个个人工具箱，汇集了我在每个比赛中学到的构建块和经验教训。
- en: So where to look for new hackathon announcements? The best place is undoubtedly
    X and following the right people and communities can help you easily find them.
    Other than that, platforms like [Kaggle](https://www.kaggle.com/), [Devpost](https://devpost.com/)
    and [dev.to](https://dev.to/) are also some great places to look for upcoming
    events.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 那么去哪里寻找新的黑客马拉松公告呢？毫无疑问，X是最好的地方，关注正确的人和社区可以帮助你轻松找到它们。除此之外，像[Kaggle](https://www.kaggle.com/)、[Devpost](https://devpost.com/)和[dev.to](https://dev.to/)这样的平台也是寻找即将举行的活动的好地方。
- en: If you’ve made it this far, I’m genuinely glad you did. Hope you got your daily
    dose of motivation and are ready for some hacking. All the best!
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经走到了这一步，我真诚地为你感到高兴。希望你已经得到了你每日所需的动力，并准备好进行一些黑客活动。祝你好运！
