- en: 'The Solar Cycle(s): history, data analysis and trend forecasting.'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 太阳周期（s）：历史、数据分析与趋势预测。
- en: 原文：[https://towardsdatascience.com/the-solar-cycle-s-history-data-analysis-and-trend-forecasting-644bf33b7ed7/](https://towardsdatascience.com/the-solar-cycle-s-history-data-analysis-and-trend-forecasting-644bf33b7ed7/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-solar-cycle-s-history-data-analysis-and-trend-forecasting-644bf33b7ed7/](https://towardsdatascience.com/the-solar-cycle-s-history-data-analysis-and-trend-forecasting-644bf33b7ed7/)
- en: You have probably heard about the 11-year Solar Cycle and about solar maximums
    and minimums at some point in your life – every 11 years, solar activity peaks,
    with more auroras in the poles and more noise to electronic devices. This is the
    period where Solar Storms also appear, and when the sunspots also show up.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能在你的一生中某个时刻听说过11年太阳周期以及太阳的极大值和极小值——每11年，太阳活动达到顶峰，两极出现更多的极光，电子设备受到更多的干扰。这是太阳风暴也出现，以及太阳黑子也出现的时期。
- en: Well, as things usually are in physics, it is not that simple.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，正如物理学中通常的情况一样，事情并不那么简单。
- en: '![A solar cycle: a montage of ten years'' worth of Yohkoh SXT images, demonstrating
    the variation in solar activity during a solar cycle, from after August 30, 1991,
    to September 6, 2001\. Credit: the Yohkoh mission of ISAS (Japan) and NASA (US).
    Image under the CC0 1.0 license, dedicated to the public domain (source).](../Images/3061af6484281723422564769daa8849.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![太阳周期：十年Yohkoh SXT图像的拼贴，展示了太阳周期中太阳活动的变化，从1991年8月30日之后到2001年9月6日。来源：ISAS（日本）和NASA（美国）的Yohkoh任务。图像根据CC0
    1.0许可，归公共领域所有。](../Images/3061af6484281723422564769daa8849.png)'
- en: 'A solar cycle: a montage of ten years’ worth of [Yohkoh](https://en.wikipedia.org/wiki/Yohkoh)
    SXT images, demonstrating the variation in solar activity during a solar cycle,
    from after August 30, 1991, to September 6, 2001\. Credit: the Yohkoh mission
    of [ISAS](https://en.wikipedia.org/wiki/Institute_of_Space_and_Astronautical_Science)
    (Japan) and [NASA](https://en.wikipedia.org/wiki/NASA) (US). Image under the CC0
    1.0 license, dedicated to the public domain ([source](https://en.wikipedia.org/wiki/Solar_cycle#/media/File:The_Solar_Cycle_XRay_hi.jpg)).'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 太阳周期：十年Yohkoh SXT图像的拼贴，展示了太阳周期中太阳活动的变化，从1991年8月30日之后到2001年9月6日。来源：[ISAS](https://en.wikipedia.org/wiki/Institute_of_Space_and_Astronautical_Science)（日本）和[NASA](https://en.wikipedia.org/wiki/NASA)（美国）的Yohkoh任务。图像根据CC0
    1.0许可，归公共领域所有（[来源](https://en.wikipedia.org/wiki/Solar_cycle#/media/File:The_Solar_Cycle_XRay_hi.jpg)）。
- en: 'When it comes to Space, the Solar Cycle (and in general, seasonality and patterns
    in nature) has always been one of my fascinations. Its behavior is far from the
    simple 11-year periodicity that we might have heard of: it is incredibly more
    complex than that. Multiple combined cycles are believed to be taking place, some
    of them spanning centuries or even millennia. Of course, these kinds of observations
    and modelling only use indirect information and lay more on the descriptive side.
    To be able to generate an *explicative* model would require scientists to fully
    understand the distribution and mechanics of the core of our star, and there is
    still work to be done. In the meantime, we will keep on studying these secondary
    phenomena, such as sunspots, SPE, solar X-ray activity and UV readings, and collecting
    and analyzing the data that is available to us.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到太空时，太阳周期（以及一般而言，自然界中的季节性和模式）一直是我的一大兴趣。它的行为远非我们可能听说过的简单11年周期性：它比这要复杂得多。人们认为存在多个结合周期，其中一些跨越了几个世纪甚至几个千年。当然，这类观察和建模仅使用间接信息，更多地侧重于描述性。要能够生成一个*解释性*模型，科学家需要完全理解我们恒星核心的分布和机制，而这方面还有工作要做。与此同时，我们将继续研究这些次级现象，如太阳黑子、SPE、太阳X射线活动和紫外线读数，以及收集和分析我们所拥有的数据。
- en: This article aims to cover the background and history of solar observation,
    overview current methods and models, perform data analysis and model fittings
    on a publicly available (NOAA’s Solar Flare Index) dataset, and forecast future
    trends.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 本文旨在涵盖太阳观测的背景和历史，概述当前的方法和模型，对公开可用的（NOAA的太阳耀斑指数）数据集进行数据分析与模型拟合，并预测未来的趋势。
- en: The history of solar observation
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 太阳观测的历史
- en: The oldest eclipse records found date back to 1223 BCE, in Ugarit (now Syria),
    written down on a clay tablet. From that onwards, ancient Babylonians seem to
    have kept track of eclipses, even going as far as being able to predict them [1,6].
    Sunspots were first observed around 800 BCE, both by Babylonians and the Chinese.
    These records were taken on command of the emperors and noted some "darkenings"
    or "obscurate" patches in the Sun [1,6]. Five centuries later, similar readings
    were made by the Greek scholar Theophrastus [2].
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 已知的最早日食记录可以追溯到公元前1223年，在乌加里特（现在的叙利亚），记录在粘土板上。从那时起，古巴比伦人似乎一直在记录日食，甚至能够预测它们 [1,6]。太阳黑子首次观测于公元前800年左右，由巴比伦人和中国人观测到。这些记录是在皇帝的命令下进行的，并记录了一些太阳上的“变暗”或“变暗”的斑点
    [1,6]。五百年后，希腊学者泰奥弗拉斯托斯也进行了类似的观测 [2]。
- en: During the Middle Ages, more and more observations were taken note of. Aldemus,
    in the year 807 CE, thought he was seeing Mercury pass in front of the Sun, but
    it was later found to be a notably large sunspot. He wasn’t the only one, since
    in the coming years, more incorrect attributions to planets in transit took place
    [3]. Observations of the solar corona and of solar flares or CMEs happened, respectively,
    in the year 968 and in 1185, both during a solar eclipse [4,6].
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在中世纪期间，越来越多的观测被记录下来。阿尔德穆斯在公元807年认为他看到了水星在太阳前经过，但后来发现那是一个特别大的太阳黑子。他并不是唯一一个，因为在接下来的几年里，还有更多将行星过境错误归因于行星的观测
    [3]。对太阳日冕和太阳耀斑或CMEs的观测分别在公元968年和公元1185年发生，都是在日食期间 [4,6]。
- en: During the Modern Era, Thomas Harriot, in 1610, was the first to observe sunspots
    with a telescope, with Johann Goldsmith confirming his sightings just a year later
    [5,6]. They both paved the way for Galileo Galilei, who claimed three years later
    that the sunspots were surface features of the Sun, and not planets or other celestial
    bodies [6]. The studies were slowed down by what we know of the Maunder Minimum,
    a period of low solar activity, with very few sunspots and CMEs.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代时期，托马斯·哈里奥特于1610年首次用望远镜观察到太阳黑子，一年后约翰·戈德史密斯证实了他的观测结果 [5,6]。他们都为伽利略·伽利莱铺平了道路，伽利略三年后声称太阳黑子是太阳表面的特征，而不是行星或其他天体
    [6]。由于我们所知的玛乌nder最小值，一个太阳活动低潮期，太阳黑子和CMEs非常少，研究工作因此放缓。
- en: '![A drawing of a sunspot in the Chronicles of John of Worcester, ca. 1100\.
    Image from the public domain (source).](../Images/238673db29d262429123c84f450b3160.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![约翰·伍斯特编年史中约1100年的太阳黑子插图。图像来自公共领域（来源）](../Images/238673db29d262429123c84f450b3160.png)'
- en: A [drawing of a sunspot](https://en.wikipedia.org/wiki/Sunspot_drawing) in the
    Chronicles of [John of Worcester](https://en.wikipedia.org/wiki/John_of_Worcester),
    ca. 1100\. Image from the public domain ([source](https://en.wikipedia.org/wiki/Solar_cycle#/media/File:ChroniclesofJohnofWorcester.jpg)).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '[约翰·伍斯特的编年史中的太阳黑子插图](https://en.wikipedia.org/wiki/Sunspot_drawing)约在1100年左右。图像来自公共领域
    ([来源](https://en.wikipedia.org/wiki/Solar_cycle#/media/File:ChroniclesofJohnofWorcester.jpg))。'
- en: In the early XIXth century, radiation (IR and UV) readings from the sun started
    being recorded, and solar spectrometry was born. Samuel Heinrich Schwabe was the
    first to theorize about a "ten-year Solar Cycle" based on sunspot activity. Gustav
    Spörer claimed that the cycle lasted around 70 years, attempting to explain the
    Maunder Minimum. Rudolf Wolf studied the past sunspot data and attempted to collect
    historical records for later studies. Later, independent researchers found a connection
    between this cycle and magnetic activity on Earth, becoming the first research
    into Earth-Sun interactions. [7]
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在19世纪初，太阳的辐射（红外线和紫外线）读数开始被记录，太阳光谱学应运而生。塞缪尔·海因里希·施瓦贝是第一个基于太阳黑子活动理论化“十年太阳周期”的人。古斯塔夫·斯波尔认为这个周期大约持续70年，试图解释玛乌nder最小值。鲁道夫·沃尔夫研究了过去的太阳黑子数据，并试图收集历史记录以供后续研究。后来，独立研究人员发现了这个周期与地球磁场活动之间的联系，这成为了对地球-太阳相互作用的第一项研究
    [7]。
- en: During the XXth century, many solar observatories were built around the world,
    specializing in certain areas of the sun. Also, many satellites and probes have
    been launched to study solar activity. The f10.7 index (radio emissions of wavelength
    of 10.7cm) has been incredibly useful for solar activity recording. Other, more
    modern methods of indirect observation include looking into geology (rock formations,
    layering and magnetization) or carbon-14 decay in tree rings or ice sheets [8].
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在20世纪，世界各地建立了许多太阳观测站，专门研究太阳的某些领域。同时，也发射了许多卫星和探测器来研究太阳活动。f10.7指数（10.7厘米波长的无线电发射）在太阳活动记录中非常有用。其他更现代的间接观察方法包括研究地质（岩石形成、层状和磁化）或树木年轮或冰层中的碳-14衰变[8]。
- en: From then on, various independent scientists have been trying to predict solar
    activity and the behaviour of the "Solar Cycle". There exist claims as different
    as saying that the 25th Cycle might not happen at all (NSO) [9], or that it will
    have the same intensity as Cycle24 [10] (NOAA).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 从那时起，许多独立科学家一直在尝试预测太阳活动和“太阳周期”的行为。存在不同的说法，有的说第25个周期可能根本不会发生（NSO）[9]，或者它将具有与周期24相同的强度[10]（NOAA）。
- en: State of the art
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最先进的技术
- en: NASA’s "Space Place" defines the Solar Cycle as "the cycle that the Sun’s magnetic
    field goes through approximately every 11 years. […] the Sun’s magnetic field
    completely flips. […] (the Solar Cycle) affects activity on the surface of the
    Sun, such as sunspots […]" [11]. There is, later again in the text, emphasis on
    the "approximation" of this 11-year period. And why is that?
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 美国国家航空航天局（NASA）的“太空之地”将太阳周期定义为“太阳磁场大约每11年经历一次的周期。[...]太阳磁场完全翻转。[...]（太阳周期）影响太阳表面的活动，如太阳黑子[...]”
    [11]。在文本的后面又强调了这一11年周期的“近似”。那为什么是这样的呢？
- en: Every eleven years, approximately, the Sun’s magnetic field completely flips
    – North goes to South and viceversa – causing heightened activity in the star’s
    surface, such as solar storms and coronal mass ejections.
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 大约每11年，太阳的磁场会完全翻转——北变南，反之亦然——导致恒星表面的活动增加，如太阳风暴和日冕物质抛射。
- en: 'The most recent studies [12] have determined that the Sun Cycle length has
    remained the same for at least 700 million years: around 10.62–11 years per flip.
    Still, many factors of this said cycle are still unknown to us: for example, a
    study in 2009 revealed that a very short cycle (less than 8 years) had taken place
    in the XVIIIth century, completely shaking up the feeling of stability and predictability
    that had reigned before [13]. Simply overviewing the historical records, one can
    see that said cycle is far from constant.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 最新的研究[12]确定，太阳周期长度至少在7亿年内保持不变：每次翻转大约为10.62-11年。然而，这个周期中的许多因素对我们来说仍然未知：例如，2009年的一项研究揭示了18世纪发生了一个非常短的周期（少于8年），完全颠覆了之前统治的稳定性和可预测性[13]。仅仅概述历史记录，就可以看出这个周期远非恒定。
- en: '![Plot showing historical sunspot records, by Robert A. Rohde (part of the
    Global Warming Art project). Image in the public domain, under a CC BY-SA 3.0
    license (source).](../Images/cceecdb2fc62e94652de4942827a00ff.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![展示历史太阳黑子记录的图表，由Robert A. Rohde（全球变暖艺术项目的一部分）制作。图像属于公共领域，根据CC BY-SA 3.0许可发布（来源）](../Images/cceecdb2fc62e94652de4942827a00ff.png)'
- en: Plot showing historical sunspot records, by [Robert A. Rohde](https://en.wikipedia.org/wiki/User:Dragons_flight)
    (part of the Global Warming Art project). Image in the public domain, under a
    CC BY-SA 3.0 license ([source](https://en.wikipedia.org/wiki/Solar_cycle#/media/File:Sunspot_Numbers.png)).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 展示历史太阳黑子记录的图表，由[Robert A. Rohde](https://en.wikipedia.org/wiki/User:Dragons_flight)（全球变暖艺术项目的一部分）制作。图像属于公共领域，根据CC
    BY-SA 3.0许可发布([来源](https://en.wikipedia.org/wiki/Solar_cycle#/media/File:Sunspot_Numbers.png))。
- en: 'Plenty of effects and modulating patterns have been theorized, trying to describe
    all these irregularities. As a summary:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 已经提出了许多效应和调节模式的理论，试图描述所有这些不规则性。总结如下：
- en: '**Waldeimer effect**: Term coined after Max Waldeimer, who observed that the
    cycles’ maximum amplitude and the time between minimum and maximum are inversely
    proportional. So, the more "aggressive" and "violent" cycles also happen faster
    [14].'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**瓦尔代米尔效应**：这个术语是在Max Waldeimer之后提出的，他观察到周期最大振幅和最小值与最大值之间的时间是成反比的。因此，更“激进”和“暴力”的周期也发生得更快[14]。'
- en: '**Gleissberg cycle**: it describes a broader, slower cycle of 70–100 years
    (so every seven or eight cycles) that modulates the activity of the 11-year cycles.
    This correlates well enough with data from carbon-14, used for the periods of
    time when there were no regular, systematic human observations taking place [8].'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Gleissberg周期**：它描述了一个更广、更慢的70-100年周期（因此每七到八个周期），调节了11年周期的活动。这与碳-14数据有很好的相关性，碳-14用于那些没有定期、系统的人类观察的时间段[8]。'
- en: '**Suess-de Vries cycle**: this overarching cycle has only been observed in
    radiocarbon proxies (not by direct observation of sun-phenomena) and has a period
    of around 210 years. Still, since we only have 400 years of sunspot records, there
    isn’t still a correlation significant enough to validate it [8].'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Suess-de Vries周期**：这个主导周期仅在放射性碳替代物中观察到（并非通过直接观察太阳现象），周期约为210年。尽管如此，由于我们只有400年的太阳黑子记录，因此还没有足够的相关性来验证它[8]。'
- en: And this is where things get interesting. Larger, longer cycles could exist,
    but there are simply not enough records to confirm or deny their existence. Also,
    the composition and modulation of these effects, one on top of another, makes
    describing and modelling the solar cycle orders of magnitude more complex.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 而这里就是事情变得有趣的地方。可能存在更大、更长的周期，但记录不足以确认或否认它们的存在。此外，这些效应的组成和调制，一个叠加在另一个之上，使得描述和模拟太阳周期变得复杂得多。
- en: 'Data Analysis: NOAA database'
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据分析：NOAA数据库
- en: For this section, we will be using the data from the sun flare index from the
    National Centers for Environmental Information (formerly the National Oceanic
    and Atmospheric Administration). The repository links and data folders, as well
    as all files, can be found in Annex I. As a quick side note, I would not recommend
    using this data directory as is, since the state of it was well below standards.
    I have curated and properly formatted the dataset in my GitHub repository, as
    well as uploaded all the source code and data. More information on this in Annex
    I.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将使用来自国家环境信息中心（原国家海洋和大气管理局）的太阳耀斑指数数据。附件I中包含了存储库链接、数据文件夹以及所有文件。作为快速提示，我并不建议直接使用这个数据目录，因为它的状态远远低于标准。我已经在我的GitHub仓库中整理并正确格式化了数据集，以及上传了所有源代码和数据。更多详细信息请见附件I。
- en: The Flare Index Data used in this study was calculated by T. Atac and A. Ozguc
    from Bogazici University Kandilli Observatory, Istanbul, Turkey. They have done
    an amazing job at recording this invaluable information, and if it weren’t for
    them, these kinds of data analysis and forecasts could not be performed.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 本研究中使用的耀斑指数数据由土耳其伊斯坦布尔的博加齐大学Kandilli天文台的T. Atac和A. Ozguc计算得出。他们记录了这些无价信息，如果没有他们，这些类型的数据分析和预测是无法进行的。
- en: The Solar Flare Index (SFI) is a measure containing information from several
    solar and atmospheric readings, as the F10.7 index, H-alpha flare importance,
    200MHz flux, and sudden ionospheric disturbances, among others. It’s an excellent
    indicator of solar activity.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 太阳耀斑指数（SFI）是一个包含来自多个太阳和大气读数的信息的度量，例如F10.7指数、H-alpha耀斑重要性、200MHz通量和突然的离子层扰动等。它是太阳活动的一个优秀指标。
- en: We will start the study by displaying data on a daily, monthly, and yearly basis.
    These averages will allow us to see the unpredictability but also the periodicity
    of the Sun Cycles.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先通过每日、每月和每年的数据展示来开始这项研究。这些平均值将使我们能够看到太阳周期的不可预测性，同时也看到其周期性。
- en: '![Yearly and monthly Solar Flare Indices for the period of 1976–2023\. Raw
    data by Kandili Observatory, processing and plots generated by me (Python, Seaborn
    and Matplotlib). Image by Pau Blasco i Roca.](../Images/61b8cb07849da3da9868f2057ec692ab.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![1976年至2023年的年度和月度太阳耀斑指数。原始数据由Kandili天文台提供，处理和图表由我生成（使用Python、Seaborn和Matplotlib）。图片由Pau
    Blasco i Roca提供。](../Images/61b8cb07849da3da9868f2057ec692ab.png)'
- en: Yearly and monthly Solar Flare Indices for the period of 1976–2023\. Raw data
    by Kandili Observatory, processing and plots generated by me (Python, Seaborn
    and Matplotlib). Image by Pau Blasco i Roca.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 1976年至2023年的年度和月度太阳耀斑指数。原始数据由Kandili天文台提供，处理和图表由我生成（使用Python、Seaborn和Matplotlib）。图片由Pau
    Blasco i Roca提供。
- en: 'And here is a full resolution visualization of the most fine-grained data available:
    the daily SFI records. I have also plotted the monthly data, in orange, as well
    as the plus-minus one sigma ranges (CI of 65%), with green (upper) and red (lower),
    calculating the variance monthly. This shows just how unpredictable these high
    energy peaks are.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是可用最精细数据的完整分辨率可视化：每日SFI记录。我还绘制了橙色中的月度数据，以及加减一个标准差范围（65%置信区间），绿色（上）和红色（下），每月计算方差。这显示了这些高能量峰值是多么不可预测。
- en: '![Daily and monthly Solar Flare Indices for the period of 1976–2023\. Raw data
    by Kandili Observatory, processing and plots generated by me (Python, Seaborn
    and Matplotlib).](../Images/b4ade23de0405ff36c43a5dce296083f.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![1976-2023年期间的每日和月度太阳耀斑指数。原始数据由Kandili天文台提供，处理和图表由我（Python、Seaborn和Matplotlib）生成。](../Images/b4ade23de0405ff36c43a5dce296083f.png)'
- en: Daily and monthly Solar Flare Indices for the period of 1976–2023\. Raw data
    by Kandili Observatory, processing and plots generated by me (Python, Seaborn
    and Matplotlib).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 1976-2023年期间的每日和月度太阳耀斑指数。原始数据由Kandili天文台提供，处理和图表由我（Python、Seaborn和Matplotlib）生成。
- en: Just by overviewing these plots, we can see the unpredictability that was described
    in the former sections. While the monthly average values don’t ever exceed SFI
    values of 30–32, the daily values can reach up to the 160s, more than five times
    higher. These high-energy events usually duplicate or triplicate the upper +1
    sigma bound, exemplifying well how complicated they are to predict.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 只需浏览这些图表，我们就能看到前几节中描述的不确定性。虽然月平均值从未超过30-32的SFI值，但日值可以达到160s，超过五倍。这些高能量事件通常重复或翻倍于上+1个标准差界限，很好地说明了它们预测的复杂性。
- en: Predicting Cycles 25 and 26\. Time series forecasting.
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预测第25和第26周期。时间序列预测。
- en: 'Now, a time series data analysis would not be complete without some predictions
    and forecasting. We will use two methods for it: a SARIMA model and a compounded
    sinusoidal mathematical model.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，没有一些预测和预测，时间序列数据分析就不会完整。我们将使用两种方法：SARIMA模型和复合正弦数学模型。
- en: The SARIMA model consists of the joint usage of an Auto-Regressive model, a
    Moving Average model, differentiation, and Seasonality. It is crucial that we
    use a SARIMA instead of an ARMA-ARIMA model, because (see Annex II) a model that
    doesn’t consider seasonality will very likely not be able to properly represent
    cyclic behavior (like that of the Sun’s Cycle).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: SARIMA模型由自回归模型、移动平均模型、微分和季节性的联合使用组成。使用SARIMA而不是ARMA-ARIMA模型至关重要，因为（见附件II）不考虑季节性的模型很可能无法正确地表示周期性行为（如太阳周期）。
- en: We have chosen a p=d=q=1, P=D=Q=1, s=12*11 as an initial guess. The AR and MA
    values are standard for time-series forecasting, and the seasonality factor was
    set to 12*11 (132 months, or eleven years), since we will be predicting values
    monthly. We also decided to differentiate once, in hopes of focusing on the variation
    between months instead of the actual SFI values per month. The resulting model,
    trained on 576 observations, had a log-likelihood value of -1223.6 and predicted
    the following years’ activity realistically.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们选择p=d=q=1，P=D=Q=1，s=12*11作为初始猜测。AR和MA值对于时间序列预测来说是标准的，季节性因素设置为12*11（132个月，或十一年），因为我们将会按月预测值。我们还决定进行一次微分，希望专注于月份之间的变化，而不是每个月的实际SFI值。在576个观测值上训练的模型，对数似然值为-1223.6，并现实地预测了未来几年的活动。
- en: '![Prediction of the SARIMA model, generated by me (Python, Seaborn, Matplotlib,
    Numpy and Statsmodels). Image by Pau Blasco i Roca.](../Images/7e2cc1099e59c52b8f5634b39bd2828c.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![由我（Python、Seaborn、Matplotlib、Numpy和Statsmodels）生成的SARIMA模型预测。图像由Pau Blasco
    i Roca提供。](../Images/7e2cc1099e59c52b8f5634b39bd2828c.png)'
- en: Prediction of the SARIMA model, generated by me (Python, Seaborn, Matplotlib,
    Numpy and Statsmodels). Image by Pau Blasco i Roca.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 由我生成的SARIMA模型预测，使用Python、Seaborn、Matplotlib、Numpy和Statsmodels。图像由Pau Blasco
    i Roca提供。
- en: We see a prediction similar to NOAA’s claims [10], which is that Cycle 25 will
    be very similar to Cycle 24\. The model dared to also predict some peaks, portraying
    C25 as a double peaked cycle. Cycle 26 predictions seem conservative enough, with
    a wide minimum around the years 2027–2033.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到与NOAA的声明[10]相似的预测，即第25周期将与第24周期非常相似。模型还大胆地预测了一些峰值，将C25描绘为双峰周期。第26周期的预测似乎足够保守，2027-2033年左右有一个广泛的最低值。
- en: Now, we also decided to construct a mathematical model utilizing a composition
    of sinusoidal waves. We decided to fit parameters for both the 11-year cycle and
    Gleissberg’s 70–100 year cycle, which we set to a period of 8 cycles (88 years).
    The results, while not showing any peaks, are satisfactory, and could model well
    the yearly averaged SFI values for the forthcoming years.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们还决定构建一个数学模型，利用正弦波组合。我们决定为11年周期和Gleissberg的70-100年周期拟合参数，我们将它们设定为8个周期（88年）。结果虽然没有显示出任何峰值，但令人满意，并且可以很好地模拟未来几年的年化SFI值。
- en: '![Mathematical model predictions, plotted on top of the observed monthly data,
    a moving average window of 12 months, and SARIMA''s predictions. Generated by
    me (using Python, Seaborn, Matplotlib, Numpy and Statsmodels).](../Images/ded24d7b49a244d48a76b5126b2efc74.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![数学模型预测，绘制在观测到的月度数据之上，12个月的移动平均窗口，以及SARIMA的预测。由我生成（使用Python、Seaborn、Matplotlib、Numpy和Statsmodels）](../Images/ded24d7b49a244d48a76b5126b2efc74.png)'
- en: Mathematical model predictions, plotted on top of the observed monthly data,
    a moving average window of 12 months, and SARIMA’s predictions. Generated by me
    (using Python, Seaborn, Matplotlib, Numpy and Statsmodels).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 数学模型预测，绘制在观测到的月度数据之上，12个月的移动平均窗口，以及SARIMA的预测。由我生成（使用Python、Seaborn、Matplotlib、Numpy和Statsmodels）。
- en: 'This model predicts a slight rise for Cycle 26 and a quiet Cycle 25\. It also
    agrees with NOAA’s [10] opinion but does steer more towards NSO’s prediction.
    It was very interesting to generate this model, because with a simple product
    of sinusoids, we were able to perceive some effects in the peak’s time of appearance.
    The modulation of Gleissberg’s cycle shifted some of the peaks slightly forwards
    and backwards, which could be a way to explain some of the shortened or elongated
    cycles experienced in the past. The equation for it is as follows:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型预测第26个周期略有上升，第25个周期较为平静。它也与NOAA的[10]意见一致，但更多地倾向于NSO的预测。生成这个模型非常有趣，因为通过简单的正弦波乘积，我们能够感知到峰值出现时间的一些影响。Gleissberg周期的调制使一些峰值略微向前或向后移动，这可能是解释过去经历的一些缩短或延长的周期的一种方式。其方程如下：
- en: '![Equation from the mathematical model. Image by Pau Blasco i Roca using LaTeX.](../Images/fffad1966ae8545f1359ce9204f96295.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![来自数学模型的方程。图像由Pau Blasco i Roca使用LaTeX制作。](../Images/fffad1966ae8545f1359ce9204f96295.png)'
- en: Equation from the mathematical model. Image by Pau Blasco i Roca using LaTeX.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 来自数学模型的方程。图像由Pau Blasco i Roca使用LaTeX制作。
- en: While the function is not simplified at all, I’ve written it this way to be
    able to show most parameters and how they interact with eachother. At its core,
    is a product of two cosines, the left one (squared) corresponding to the smaller
    cycle and the other one to Gleissberg’s, that stands above the horizontal axis
    (SFI values can’t be negative).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然函数根本未简化，但我这样写是为了能够展示大多数参数以及它们之间的相互作用。其核心是一个余弦函数的乘积，左边的（平方的）对应于较小的周期，另一个对应于Gleissberg周期，该周期位于水平轴之上（SFI值不能为负）。
- en: Conclusions
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: I believe we have been able to, even if briefly, cover most of the history and
    current investigation lines regarding the Solar Cycle. In this article we have
    also taken time to explore the data ourselves, investigate and make some future
    predictions on the Sun’s activity for the following decades.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为我们甚至能够简要地涵盖关于太阳周期的大部分历史和当前的研究方向。在这篇文章中，我们也花时间自己探索数据，进行调查，并对未来几十年太阳活动做出一些预测。
- en: Studying the variability and unpredictability of the SF index was fascinating,
    and being able to represent data grouped by different time scales allowed us to
    both understand the underlying trend and the quick variations of the phenomena.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 研究SF指数的变化性和不可预测性非常吸引人，能够以不同时间尺度分组表示数据使我们既能理解现象的潜在趋势，也能了解其快速变化。
- en: The status of the dataset, unfortunately, was very poor. The data itself, provided
    by NOAA and Kandilli Observatory, is precious and given with extreme detail and
    accuracy. Still, it is regrettable that it is provided in such a substandard shape
    and formatting. Luckily, this did not stop us from conducting the study, and we
    were able to provide a clean dataset for future users to utilize in their investigations.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，数据集的状态非常糟糕。数据本身，由NOAA和Kandilli天文台提供，非常宝贵，并且提供了极端详细和精确的信息。尽管如此，它以如此低标准的形式和格式提供是令人遗憾的。幸运的是，这并没有阻止我们进行研究，我们能够为未来的用户提供一个干净的数据集，以便他们在研究中使用。
- en: We were able to make some predictions using several time-series models. The
    ARMA proved unsuccessful (see Annex II), but SARIMA yielded exciting results,
    agreeing with renowned institutions in the field. We were also able to theorize
    a mathematical model to represent the cycle’s long scale fluctuations with success.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能够使用几个时间序列模型进行一些预测。ARMA模型未能成功（见附件II），但SARIMA模型产生了令人兴奋的结果，与该领域的知名机构达成一致。我们还成功理论化了一个数学模型来表示周期长期波动。
- en: As we mentioned at the beginning of the article, these predictions and models
    are based on indirect measurements, and not actually describing the internal movements
    of the Sun’s core and magnetic field. For us to be able to make predictions with
    confidence, we would need to mathematically model those fluid interactions in
    the star’s nucleus as well as corona, which is extremely complex as of today.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如文章开头所述，这些预测和模型基于间接测量，并不实际描述太阳核心和磁场的内部运动。为了能够有信心地进行预测，我们需要数学建模来描述恒星核心以及光晕中的流体相互作用，这至今仍然非常复杂。
