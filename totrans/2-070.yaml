- en: 'Exploratory Data Analysis: Gamma Spectroscopy in Python (Part 3)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python-part-3/](https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python-part-3/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1754088425390" class="mdspan-comment">Different</mdspan>
    objects around us can be slightly radioactive. Americium in smoke detectors, radium
    in some vintage watches, or uranium in vintage glass; a full list can be long.
    Mostly, these objects are safe and cannot cause a health risk. It is also interesting
    to identify them and study the matter on the atomic level. And we can do this
    using a radiation detector. In [the first part](https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python/),
    I did an exploratory data analysis of the gamma spectroscopy data. In the [second
    part](https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python-part-2/),
    I created a machine learning model for detecting radioactive isotopes. This is
    the last 3rd part, and it’s time to add a created model to the real app!
  prefs: []
  type: TYPE_NORMAL
- en: 'In this story, I will test two approaches:'
  prefs: []
  type: TYPE_NORMAL
- en: I will create a public Streamlit app that will be hosted for free on [Streamlit
    Cloud](https://streamlit.io/cloud) (the app link is added to the end of the article).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As a more flexible and universal solution, I will create a Python HTMX-based
    app that can communicate with real hardware and make predictions in real time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In the same way as in the previous part, I will use a [Radiacode](https://102.radiacode.com/DmitriiE)
    scintillation detector to get the data (disclaimer: the device used in this test
    was provided by the manufacturer; I don’t get any commercial profit from their
    sales, and I did not get any editorial input about all the tests). Readers who
    don’t have a Radiacode hardware will be able to test the app and the model using
    files available on Kaggle.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Isotopes Classification Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This model was described in the [previous part](https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python-part-2/).
    It is based on XGBoost, and I trained the model using different radioactive samples.
    I used samples that can be legally purchased, like vintage uranium glass or old
    watches with radium dials made in the 1950s. As mentioned before, I also used
    a Radiacode scintillation detector, which allows me to get the gamma spectrum
    of the object. Only 10-20 years ago, these types of detectors were available only
    in big labs; today, they can be purchased for the price of a mid-range smartphone.
  prefs: []
  type: TYPE_NORMAL
- en: 'The model contains three components:'
  prefs: []
  type: TYPE_NORMAL
- en: The XGBoost-based model itself.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A list of radioactive isotopes (like Lead-214 or Actinium-228), on which the
    model was trained. The Radiacode scintillation detector returns 1024 spectrum
    values, and 23 of them were used for the model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A label encoder to convert list indexes into human-readable names.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s wrap all this into a single Python class:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'A *Spectrum* class contains the spectrum data we get from a radiation detector:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Here, *counts* is a gamma spectrum, which is represented by a list of 1024 channel
    values. Spectrum data can be exported using the official Radiacode Android app
    or retrieved directly from a device using a [radiacode](https://github.com/cdump/radiacode)
    Python library.
  prefs: []
  type: TYPE_NORMAL
- en: 'To load the spectrum into the model, I created a *SpectrumPreprocessing* class:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Here, I skip some code blocks that were already published in the [previous part](https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python-part-2/).
    Extracting features from the gamma spectrum was also explained there, and I highly
    recommend reading that part first.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s test the model! I took a Radiacode detector and collected a gamma
    spectrum within 10 minutes:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1ee92fbbdbcc4ce24943ff78477f7d74.png)'
  prefs: []
  type: TYPE_IMG
- en: Radiacode radiation detector, Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'This Chinese pendant was advertised as “ion-generated,” and it is slightly
    radioactive. Its gamma spectrum, collected in the official Radiacode Android app,
    looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e30ff3e17154b77b994043968bcd280b.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: 'After waiting for ~10 minutes, I exported the spectrum into an XML file. Now,
    we can run the model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: As we can see, the model works well. We can compare the peaks with spectra of
    known isotopes (for example, [here](https://physicsopenlab.org/2016/01/31/thorium-gamma-spectrometry/)
    or [here](https://www.gammaspectacular.com/blue/gamma-spectra/th232-spectrum))
    and confirm that the spectrum belongs to thorium.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Streamlit
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The model works; however, we live in the XXI century, and almost nobody will
    run the console app to get the results. Instead, we can make the app available
    online, so all Radiacode users will be able to run it.
  prefs: []
  type: TYPE_NORMAL
- en: There are many Python frameworks for making browser-based apps, and [Streamlit](https://github.com/streamlit/streamlit)
    is probably the most popular in the data science community. And what is important
    for us, a [Streamlit Community Cloud](https://streamlit.io/cloud) platform allows
    everyone to publish their apps completely for free. To do this, let’s make the
    app first.
  prefs: []
  type: TYPE_NORMAL
- en: 2.1 Streamlit App
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A Streamlit framework is relatively easy to use, at least if a standard-looking
    app is good for us. Personally, I’m not a fan of this approach. These frameworks
    hide all low-level implementation details from users. It is straightforward to
    make a prototype, but the UI logic will be tightly coupled with a very niche framework
    and cannot be reused anywhere else. Doing everything non-standard, which is not
    supported by the framework, can be almost impossible or hard to implement without
    digging into tons of abstractions and pages of code. However, in our case, the
    prototype is all we need.
  prefs: []
  type: TYPE_NORMAL
- en: 'In general, a Streamlit code is simple, and we just need to describe the logical
    hierarchy of our page:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'As we can see, the full app requires a minimal amount of Python code. Streamlit
    will render all HTML for us, with title, file upload, and results. As a bonus,
    I will also display a spectrum using Matplotlib:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Now we can run the app locally:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'After that, our app is fully operational and can be tested in a browser:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5c02d3b280c2584ab5e636e4e16254b3.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: As mentioned before, I am not a fan of very high-level frameworks and prefer
    to have a better understanding of how things work “under the hood.” However, considering
    that I spent only about 100 lines of code to make a fully functional web app,
    I cannot complain – for prototyping, it works well.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Streamlit Community Cloud
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When the app is tested locally, it’s time to make it public! A Streamlit Cloud
    is a free service, and obviously, it has a lot of limitations:'
  prefs: []
  type: TYPE_NORMAL
- en: The app runs in a Docker-like container. Your GitHub account must be linked
    to Streamlit. When the container starts, it pulls your code from GitHub and runs
    it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At the time of writing this text, container resources are limited to 2 cores
    and up to 2,7 GB of RAM. It would be too constrained to run a 70B size LLM, but
    for a small XGBoost model, it is more than enough.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Streamlit does not provide any permanent storage. After shutdown or restart,
    all logs and temporary files will be lost (you can use API secrets and connect
    to any other cloud storage from your Python code if needed).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After a period of inactivity (about 30 minutes), the container will be stopped,
    and all temporary files will also be lost. If someone opens the app link, it will
    run again.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As readers can guess, an inactive app costs Streamlit almost nothing because
    it stores only a small configuration file. And it is a nice solution for a free
    service – it allows us to publish the app without any costs and give people a
    link to run it.
  prefs: []
  type: TYPE_NORMAL
- en: To **publish the app in Streamlit**, we need to perform three simple steps.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we need to commit our Python app to GitHub. A *requirements.txt* file
    is also mandatory. Streamlit container uses it to install required Python dependencies.
    In my case, it looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Server settings can be changed using a *.streamlit/config.toml* file. In my
    case, I limited the uploaded file size to 1 MB because all spectra files are smaller:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Second, we need to log in to [share.streamlit.io](http://share.streamlit.io)
    using a GitHub account and give permission to access the source code.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, we can create a new Streamlit project. In the project settings, we
    can also select the desired URL and environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fb43e36a5bbea7bd7e4dc50c31feb133.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'If everything was done correctly, we can see our app running:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ddf3ef8b242467333020e11a14efad8e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: At this moment, users worldwide can also access our app! In my case, I selected
    a *gammaspectrumdetection* name, and the app is available using [this URL](https://gammaspectrumdetection.streamlit.app).
  prefs: []
  type: TYPE_NORMAL
- en: 3\. FastAPI + HTMX App
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As readers can see, Streamlit is a nice solution for a simple prototype. However,
    in the case of the radiation detector, I would like to see data coming from real
    Radiacode hardware. This would be impossible to do in Streamlit; this library
    just was not designed for that. Instead, I will use several production-grade frameworks:'
  prefs: []
  type: TYPE_NORMAL
- en: An [HTMX](https://htmx.org) framework allows us to make a fully functional web
    interface.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[FastAPI](https://fastapi.tiangolo.com) will run the server.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The ML model will process the data retrieved in real-time from a radiation detector
    using a [Radiacode](https://github.com/cdump/radiacode) library.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As mentioned before, those readers who don’t have a Radiacode hardware will
    be able to replay the data using raw log files, saved from a real device. A link
    to the app and all files is available at the end of the article.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get into it!
  prefs: []
  type: TYPE_NORMAL
- en: 3.1 HTML/HTMX
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The app is connected to a Radiacode detector, and I decided to show a connection
    status, radiation level, and a spectrum graph on the page. At the bottom, a spectrum
    collection time and an ML model prediction will be displayed.
  prefs: []
  type: TYPE_NORMAL
- en: 'An *index.html* file for this layout looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'Here, I used [Chart.js](https://www.chartjs.org/) to make a graph, and all
    UI controls are located in the *div* section. HTMX allows us to make an interactive
    web app without using JavaScript. This HTMX string performs the actual update:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Here, HTMX is configured to call the */device/poll* endpoint every second, and
    the result will be placed into the control with a *#device-info* ID.
  prefs: []
  type: TYPE_NORMAL
- en: 'Readers are welcome to change the HTML if needed. I am not a frontend developer,
    and maybe this UI can be done more effectively. However, the page works and does
    its job:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ed058d30f12d11b2c0d2c25784d445fd.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 FastAPI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As mentioned before, I decided to use [FastAPI](https://fastapi.tiangolo.com/)
    for the backend part.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we need to create a FastAPI instance and add the required endpoints:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: As readers can see, I used a *lifespan* callback to run the Radiacode connection
    when the FastAPI server is started. The *app.state* is a global state object in
    FastAPI. We have only a single device instance, so the use of a global state is
    a good place for that. FastAPI itself is based on asyncio, and the Radiacode connection
    thread works in the background. In asyncio, I cannot block the main thread, so
    I used two queues (one for data and one for commands) for data exchange.
  prefs: []
  type: TYPE_NORMAL
- en: 'The way of updating the page in HTMX is interesting. Let’s say I want to update
    the CPS (counts per second) value. As a reminder, in HTML, I have these controls:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'In a response to */device/poll*, I need to return a proper HTML for the corresponding
    IDs:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: HTMX will automatically trigger the */device/poll* endpoint and replace the
    controls on a web page with new data. The [hx-swap-oob](https://htmx.org/attributes/hx-swap-oob/)
    key allows us to update several controls in a single request. As we can see, HTMX
    allows us to seamlessly connect a frontend page in a browser with a Python backend.
  prefs: []
  type: TYPE_NORMAL
- en: A *get_spectrum_data* method is slightly different. Updating a Chart.js bar
    chart is not supported directly by HTMX. However, I can return a JavaScript code
    block that will be executed on the page. I use this feature to update the graph
    by calling the *updateChartData* method, which was placed in *index.html* before.
  prefs: []
  type: TYPE_NORMAL
- en: The full source code is longer, and here I displayed only the crucial parts.
    A link to a full project is available at the end of the article.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Testing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Finally, let’s see both apps in action! My model can classify isotopes, and
    I wanted to test it using an object that was not “seen” by the model before. To
    do this, I visited the minerals shop in the city center:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/55b3078b64b6e19420cca2aa88b836a8.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'I know that some minerals can be slightly radioactive, so I chose the best
    one (or the worst one, depending on your preference) using a radiation detector.
    It was a blue apatite. I tested it at home, and my GMC radiation meter shows that
    its radioactivity level is 0,71 µSv/h, which was considered by the device’s algorithm
    as “High”:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/afe15aa92e04b3429d49f3af09796eed.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Here, “high” does not mean “dangerous” – this value is just high for the average
    background radiation level, which is usually about 0,1 µSv/h. However, in this
    case, the higher level is only about 1-2cm around the mineral. It is not dangerous
    and cannot cause any harm (as a comparison, the radiation in the airplane, caused
    by cosmic rays, is ~1.5 times higher than that). And as described in the previous
    part, a Geiger counter can show us the value, but cannot tell us *why* this mineral
    is radioactive. So, I will use a Radiacode gamma detector to find it out.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a reminder, first I created a **Streamlit app** and published it on the
    Streamlit Community Cloud platform. The app is [available online](https://gammaspectrumdetection.streamlit.app),
    but while nobody uses it, the app is in “sleep mode”:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ce350fb7cc49f56b0c401bd1252111a7.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: 'I saved a spectrum using a Radiacode Android app. When the Streamlit app started
    (the container spin-up takes 2-3 minutes), I uploaded the file:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6b56d9d6e1bd9b525146410e12d8bf2f.png)'
  prefs: []
  type: TYPE_IMG
- en: Classification result, screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: As a second test, let’s **run the local app**. It is more functional, it can
    communicate with the Radiacode detector via USB, and can also work as a UI to
    control the hardware. Another crucial difference is that we can see data from
    the detector in real time.
  prefs: []
  type: TYPE_NORMAL
- en: 'I pressed the “Reset Spectrum” button to restart the accumulation, and after
    2-3 minutes of collecting the data, the mineral was identified as thorium:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b11694dccef3d93eff083a72a2624735.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: This was an interesting find, because according to [Wikipedia](https://en.wikipedia.org/wiki/Apatite),
    apatite may contain uranium, but thorium was not mentioned there. However, according
    to the [USGS](https://pubs.usgs.gov/of/2004/1050/PalosVerdesRn.htm#thorium.htm)
    (U.S. Geological Survey) page, thorium may often be found in apatites. In this
    case, the Wikipedia article was just not complete enough.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I tested the machine learning model for detecting radioactive
    isotopes. I tested two ways of using the model – a Streamlit app, published in
    Streamlit Community Cloud, and a fully functional FastAPI app that gets data from
    the hardware and can be used as a web interface for a real radiation detector.
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, the model works well, and I was able to find trace amounts of
    thorium in a blue apatite. This fact was not even mentioned in Wikipedia, and
    it’s always nice to learn something new. However, as was mentioned in the previous
    part, the model’s capabilities are limited. I am not a nuclear institution, and
    the model was trained only on radioactive objects that can be legally purchased,
    like a vintage watch with radium dials. I don’t have test sources like Cesium
    or Plutonium. Still, it was fun to train the model and to use it in the app. Probably,
    projects like this have no commercial value, and there is a 0.00% market demand
    for the isotope classification model. However, while doing this, I was able to
    use tools like FastAPI, HTMX, or CSS, which can be useful in other projects. Last
    but not least, I had fun, which is the most important part 😉
  prefs: []
  type: TYPE_NORMAL
- en: 'All data files were collected using a [Radiacode](https://102.radiacode.com/DmitriiE) scintillation
    detector. It’s a nice and compact device with a price of a mid-range smartphone,
    that, as we can see, allows us to perform some fun experiments (disclaimer: I
    don’t have any profit or other commercial interest from its sales). For those
    readers who don’t have a Radiacode hardware, all collected data is freely [available
    on Kaggle](https://www.kaggle.com/datasets/dmitriieliuseev/radiation-spectra-ml-data).
    The archive contains spectra of different objects used to train the model. Spectra
    in XML format can be used to test a Streamlit app. The “replay” folder contains
    the log, saved from a Radiacode device, and can be used to test the HTMX app.'
  prefs: []
  type: TYPE_NORMAL
- en: The full source code for this article is available on my [Patreon page](https://www.patreon.com/deliuseev).
    This support helps me to buy equipment and electronics for future tests like this.
    And readers are also welcome to connect via [LinkedIn](https://www.linkedin.com/in/dmitrii-eliuseev/),
    where I periodically publish smaller posts that are not big enough for a full
    article.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading.
  prefs: []
  type: TYPE_NORMAL
