  type: TYPE_IMG
  zh: '![LightGBM 是一个更快的选项 | 由 AI 生成的图像。Meta Llama，2025\. https://meta.ai](../Images/fb9d4ff8907de65a68d302d269c5e39b.png)'
- en: LightGBM is a faster option | Image generated by AI. Meta Llama, 2025\. [https://meta.ai](https://meta.ai)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: LightGBM 是一个更快的选项 | 由 AI 生成的图像。Meta Llama，2025\. [https://meta.ai](https://meta.ai)
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Introduction
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: When we talk about *Gradient Boosting Models* [GBM], we often also hear about
    Kaggle. This algorithm is very powerful, offering many tuning arguments, thus
    leading to very high accuracy metrics, and helping people to win competitions
    on that mentioned platform.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们谈论 *梯度提升模型* [GBM] 时，我们经常也会听到 Kaggle。这个算法非常强大，提供了许多调整参数，从而导致了非常高的准确度指标，并帮助人们在那个平台上赢得比赛。
- en: However, we are here to talk about real life. Or at least an implementation
    that we can apply to problems faced by companies.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们在这里讨论的是现实生活。或者至少是一种我们可以应用于公司面临的问题的实现。
- en: Gradient Boosting is an algorithm that creates many models in sequence, always
    modeling on top of the error of the previous iteration and following a learning
    rate determined by the data scientist, until it reaches a plateau, becoming unable
    to improve the evaluation metric anymore.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度提升是一种创建多个顺序模型的算法，始终在上一迭代错误的基础上建模，并遵循数据科学家确定的学习率，直到达到平台期，无法再提高评估指标。
- en: Gradient Boosting algorithm creates sequential models trying to decrease the
    previous iteration’s error.
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 梯度提升算法创建顺序模型，试图减少前一次迭代的错误。
- en: The downside of GBMs is also what makes them so effective. **The sequential
    construction**.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: GBM 的缺点也是它们之所以如此有效的因素。**顺序构建**。
- en: If each new iteration is in sequence, the algorithm must wait for the completion
    of one iteration before it can start another, increasing the training time of
    the model. Furthermore, as the data increases in size, so does the time cost,
    becoming a problem when dealing with larger datasets.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 如果每个新的迭代都是顺序的，算法必须等待一个迭代的完成才能开始另一个，这增加了模型的训练时间。此外，随着数据量的增加，时间成本也随之增加，在处理大型数据集时成为一个问题。
- en: '**LightGBM** comes to solve this problem. The package offers a lighter implementation
    of the algorithm that focuses on:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**LightGBM** 来解决这个问题。该包提供了一个更轻量级的算法实现，专注于：'
- en: Faster training speed and higher efficiency.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更快的训练速度和更高的效率。
- en: Lower memory usage.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更低的内存使用。
- en: Better accuracy.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更高的准确度。
- en: Support of parallel, distributed, and GPU learning.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支持并行、分布式和 GPU 学习。
- en: Capable of handling large-scale data.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够处理大规模数据。
- en: Let’s see how to train a model using LightGBM in Python.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看如何使用 Python 中的 LightGBM 训练一个模型。
- en: Implementation
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现
- en: LightGBM was first released in 2016\. Currently, it has packages for R and Python.
    In Python, specifically, it also has an implementation by Scikit-Learn.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: LightGBM 首次发布于 2016 年。目前，它为 R 和 Python 提供了包。在 Python 中，它还由 Scikit-Learn 实现。
- en: Here we will use the `lightgbm` Python package.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将使用 `lightgbm` Python 包。
- en: We are also using these libraries.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还使用以下库。
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Dataset
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集
- en: 'The dataset to be used in this exercise is from the UCI Machine Learning Repository:
    *[PhiUSIIL Phishing URL (Website)](https://archive.ics.uci.edu/dataset/967/phiusiil+phishing+url+dataset).*
    The dataset is open under the Creative Commons license.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中将使用的数据集来自 UCI 机器学习仓库：*[PhiUSIIL 钓鱼 URL（网站）](https://archive.ics.uci.edu/dataset/967/phiusiil+phishing+url+dataset)。该数据集在
    Creative Commons 许可下开放。
- en: This data is very recent, donated to the UCI repository in 2024, and it shows
    many variables with information about websites. Some features are extracted from
    the source code of the webpage and URL. The label classifies the website as legit
    (1) or a phishing website that is not legit (0).
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这份数据非常新，于 2024 年捐赠给 UCI 仓库，它展示了关于网站的大量变量信息。一些特征是从网页源代码和 URL 中提取的。标签将网站分类为合法（1）或非法的钓鱼网站（0）。
- en: 'Credits:'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 致谢：
- en: ''
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Prasad, A. & Chandra, S. (2024). PhiUSIIL Phishing URL (Website). UCI Machine
    Learning Repository. [https://doi.org/10.1016/j.cose.2023.103545](https://www.google.com/url?q=https%3A%2F%2Fdoi.org%2F10.1016%2Fj.cose.2023.103545).
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Prasad, A. & Chandra, S. (2024). PhiUSIIL钓鱼URL（网站）。UCI机器学习库。[https://doi.org/10.1016/j.cose.2023.103545](https://www.google.com/url?q=https%3A%2F%2Fdoi.org%2F10.1016%2Fj.cose.2023.103545).
- en: '[PRE1]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The data is mostly numerical, as integer variables. The exceptions are `URL`
    , `Domain`, `TLD` and `Title`.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 数据主要是数值型，作为整数变量。例外的是`URL`、`Domain`、`TLD`和`Title`。
- en: Code
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码
- en: In this tutorial, for the sake of time and scope of the article, we will focus
    on the implementation of a simple LightGBM model.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个教程中，为了节省时间和文章的范围，我们将专注于简单LightGBM模型的实现。
- en: So, we are not interested in exploring the data and getting insights from it,
    although I would encourage you to do so if this subject interests you. The dataset
    is very rich in information.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们并不感兴趣于探索数据并从中获取见解，尽管如果这个主题对你感兴趣，我会鼓励你这样做。数据集信息量非常丰富。
- en: First, let’s check for shape, missing data, and data types.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们检查形状、缺失数据和数据类型。
- en: '[PRE2]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Ok, great. No missing values. And like we said, only those 4 categorical variables.
    As we know, LightGBM can deal with categories natively, but you should transform
    the data type from `object` to `category`. This can be easily done with the next
    code snippet.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，太棒了。没有缺失值。正如我们所说的，只有这4个分类变量。众所周知，LightGBM可以原生处理分类，但你应该将数据类型从`object`转换为`category`。这可以通过下一个代码片段轻松完成。
- en: '[PRE4]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Let us also check how balanced is this data.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们也检查一下数据的平衡性。
- en: '[PRE5]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: It is fairly well-balanced.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 它相当平衡。
- en: Now, this algorithm is very powerful, so for this dataset, if we choose all
    the variables (or even just a few best ones), the model will easily overfit. So
    I just got a couple of random variables including `TLD` which is categorical to
    train the model.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这个算法非常强大，所以对于这个数据集，如果我们选择所有变量（或者甚至只是几个最好的变量），模型很容易过拟合。所以我只随机选择了一些变量，包括分类变量`TLD`来训练模型。
- en: Next, we choose some variables and separate train and test sets.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们选择一些变量，并分别划分训练集和测试集。
- en: '[PRE6]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We will use the following parameters.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用以下参数。
- en: '`''force_col_wise'': True`: use this when the number of columns is large, or
    the total number of bins is large, or to reduce memory cost.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`''force_col_wise'': True`：当列数很多，或者总箱数很大，或者为了减少内存成本时使用此选项。'
- en: '`''categorical_feature'': ''TLD''`: indicate which column is categorical for
    built-in encoding.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`''categorical_feature'': ''TLD''`：指示哪个列是分类列，用于内置编码。'
- en: '`''objective'': ''binary''`: as our labels has only two classes. Use `multiclass`
    for more classes.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`''objective'': ''binary''`：因为我们的标签只有两个类别。对于更多类别使用`multiclass`。'
- en: '`''metric'': ''auc''`: the metric for model evaluation.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`''metric'': ''auc''`：模型评估的指标。'
- en: '`''learning_rate'': 1`: rate for learning at each iteration.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`''learning_rate'': 1`：每次迭代的 学习率。'
- en: '`''is_unbalance'': False`: if the class is unbalanced, use `True` for auto-balancing.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`''is_unbalance'': False`：如果类别不平衡，使用`True`进行自动平衡。'
- en: And finally train the model.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，训练模型。
- en: '[PRE7]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The resulting classification report is as follows.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 结果的分类报告如下。
- en: '[PRE8]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Wow. With just a couple of variables, the model performed tremendously well
    on the validation set.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 哇。仅仅通过几个变量，模型在验证集上的表现非常出色。
- en: Now let’s compare the processing times of LightGBM implementation against a
    regular GBM from Scikit-Learn.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们比较LightGBM实现与Scikit-Learn中常规GBM的处理时间。
- en: Comparison
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 比较
- en: '![Comparing models | Image generated by AI. Meta Llama, 2025\. https://meta.ai](../Images/d4e54003be2dbe230727eba3857c228b.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![比较模型 | 由AI生成的图像。Meta Llama，2025\. https://meta.ai](../Images/d4e54003be2dbe230727eba3857c228b.png)'
- en: Comparing models | Image generated by AI. Meta Llama, 2025\. [https://meta.ai](https://meta.ai)
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 比较模型 | 由AI生成的图像。Meta Llama，2025。[https://meta.ai](https://meta.ai)
- en: LightGBM
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LightGBM
- en: First, LightGBM trained on a generated classification dataset with 1,000,000
    observations.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，LightGBM在一个包含1,000,000个观察值的生成分类数据集上进行了训练。
- en: '[PRE9]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The result is **9.73 seconds** for the train and prediction to run.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 训练和预测的结果是**9.73秒**。
- en: Gradient Boosting Classifier from Scikit-Learn
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Scikit-Learn的梯度提升分类器
- en: Now, let’s train the same model with the GBM implementation from sklearn.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们使用sklearn的GBM实现来训练相同的模型。
- en: '[PRE10]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: It took **15 minutes** for fitting and predicting with this algorithm. And the
    data is not even that big.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此算法进行拟合和预测花费了**15分钟**。而且数据量并不大。
- en: Before You Go
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在你离开之前
- en: We were able to learn a quick and simple tutorial of how to train a model using
    LightGBM package in Python.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能够快速简单地学习如何使用Python中的LightGBM包训练模型。
- en: We also learned that this implementation of the algorithm is much faster than
    others, becoming a great option to create powerful classification or regression
    models trained on large datasets with simple code.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还了解到，这种算法的实现比其他实现要快得多，成为创建强大分类或回归模型的一个很好的选择，这些模型使用简单代码在大数据集上训练。
- en: The API documentation is well organized and complete, helping data scientists
    to quickly find arguments to fine-tune their models.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: API 文档组织良好且内容完整，帮助数据科学家快速找到参数以微调他们的模型。
