- en: 'Ridge Regression: A Robust Path to Reliable Predictions'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/ridge-regression-a-robust-path-to-reliable-predictions-851290bed579/](https://towardsdatascience.com/ridge-regression-a-robust-path-to-reliable-predictions-851290bed579/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Nicolas J Leclercq on Unsplash](../Images/178966d3a7bb583f08973e5671db5c22.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Nicolas J Leclercq](https://unsplash.com/@nicolasjleclercq?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: Overfitting must always be considered when training meaningful machine learning
    models. With this problem, the model adapts too much to the training data and,
    therefore, only provides poor predictions for new, unseen data. Ridge regression,
    also known as L2 regularization, offers an effective solution to this problem
    when training a linear regression. By including an additional coefficient, the
    so-called regularization parameter, this architecture prevents the emergence of
    too large regression coefficients and thus reduces the risk of overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: In the following article, we look at ridge regression and its mathematical principles.
    We also look in detail at how the results can be interpreted and highlight the
    differences from other regularization methods. Finally, we explain step by step,
    using a simple example, how to implement ridge regression in Python.
  prefs: []
  type: TYPE_NORMAL
- en: What is the Ridge Regression?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ridge regression is a modification of [linear regression](https://databasecamp.de/en/ml/linear-regression-basics)
    that extends an additional regularization term to avoid [overfitting](https://databasecamp.de/en/ml/overfitting-en).
    In contrast to classic linear regression, which is trained to create an optimal
    model that minimizes the residuals between the prediction and the actual data,
    ridge regression also considers the size of the regression coefficients and attempts
    to prevent individual, very large model coefficients.
  prefs: []
  type: TYPE_NORMAL
- en: By avoiding very large coefficients, there is less likelihood that the model
    will learn excessively complex relationships from the training data and thus overfit.
    Rather, the regularization parameter helps the regression to generalize better,
    i.e. to recognize the underlying structure in the data and thus also deliver better
    results with new, unseen data.
  prefs: []
  type: TYPE_NORMAL
- en: What does the Ridge Regression look like mathematically?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Ridge regression is based on classical linear regression, which attempts to
    learn the parameters for a linear regression equation. For example, this regression
    equation looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/64c8667e052a55a64d588c4ebc5bcc4b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Here are:'
  prefs: []
  type: TYPE_NORMAL
- en: '***y*** is the target variable that the model should predict, such as an optimal
    property value or the average fuel consumption of a car.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***X*** contains values from the data set that could explain the size of the
    target variable, for example, the number of rooms in the property or the number
    of cylinders in an engine.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***β*** is the so-called regression coefficient, learned during training and
    mathematically describes the relationship between ***X*** and ***y***. For example,
    a coefficient of 60,000 could mean that the value of a property increases by €60,000
    with each additional room.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***ε*** is an error term that measures the deviations between the model’s prediction
    and the actual value. This can occur, for example, if the data set does not include
    all the relevant properties required for the prediction. In the real estate example,
    the age of the residential unit could be a decisive factor in determining the
    price. If this is not present in the data set, the model will probably not be
    able to predict the price accurately.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The aim of linear regression is now to learn the values of ***β*** in such
    a way that the residual sum of squares (RSS), i.e. the squared difference between
    the prediction ŷᵢ and the actual value yᵢ, is minimized:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/967c83a4115cc1eb5fff9621a9823a59.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The L2 regularization now adds a further penalty term to this residual sum
    of squares, which is intended to ensure that the individual regression coefficients
    do not become too large. Mathematically, the ridge regularization then looks as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ec1c76e6a8ca803b17602df13462b4aa.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Here are:'
  prefs: []
  type: TYPE_NORMAL
- en: RSS is the residual sum of squares, as already known from linear regression.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***λ*** is the [regularization](https://databasecamp.de/en/ml/regularization)
    parameter, which determines how strong the influence of the regularization is.
    We will examine its meaning in the next section.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The sum term contains the sum of all squared regression coefficients. On the
    one hand, the square ensures that all regression coefficients have a positive
    sign and, therefore, have a negative influence on the cost function, on the other
    hand, very large values are significantly more important, as they are increased
    even more by squaring.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Due to this structure, the regularization term has an overall negative influence
    on the cost function. However, if individual coefficients become very large, this
    is significantly stronger than if the parameters do not grow too much. Therefore,
    the model is incentivized to keep the model coefficients as small as possible
    during training, as this is the only way to minimize the cost function.
  prefs: []
  type: TYPE_NORMAL
- en: What does the Regularization Parameter ***λ*** do?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The regularization parameter ***λ*** is a decisive factor in ridge regression,
    which controls the strength of the penalty that a model receives if the regression
    coefficients increase too much. Since the parameter must always be positive, the
    following two cases can be distinguished:'
  prefs: []
  type: TYPE_NORMAL
- en: '***λ*** = 0: In this special case, the regularization term is eliminated and
    the ridge regression corresponds to the classic linear regression. Thus, the model
    behaves accordingly and only focuses on minimizing the residual sum of squares
    without taking the size of the coefficients into account. This increases the risk
    of overfitting, as the model may learn overly complex relationships in the training
    data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**λ → ∞**: As ***λ*** increases, the strength of the penalty for the model
    increases. As a result, the regression focuses more on keeping the size of the
    coefficients small than on reducing the deviation between the prediction and the
    actual value. In the limiting case, the model can only reach the target by keeping
    the coefficients close to 0\. This leads to a straightforward model that is unlikely
    to recognize the correlations in the data and therefore only delivers poor results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The choice of ***λ*** is a critical decision that significantly affects the
    performance of the ridge regression. A hyperparameter must be set before training
    and cannot be adjusted during training. A too-small ***λ*** can lead to overfitting,
    while a too-large ***λ*** leads to a simpler model that may not be able to recognize
    the underlying structures sufficiently.
  prefs: []
  type: TYPE_NORMAL
- en: Introducing an error term gives the model a systematic error, i.e. a distortion
    or [bias](https://databasecamp.de/en/statistics/bias-en), which leads to a smoothing
    of the model. In addition, the [variance](https://databasecamp.de/en/statistics/variance)
    of the model is reduced, making it less sensitive to strongly fluctuating training
    data, as the coefficients are less large. These properties increase the model’s
    generalization ability and reduce the risk of overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: How can the Ridge Regression be interpreted?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The interpretation of ridge regression follows that of linear regression in
    many areas, with the difference that the size of the coefficients is significantly
    influenced by the regularization parameter. The following principles of linear
    regression still apply:'
  prefs: []
  type: TYPE_NORMAL
- en: The size of the coefficients ***β*** is decisive so that larger parameters indicate
    a stronger relationship between the independent and dependent variables.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The distances can also be used for a relative comparison by sorting the parameters
    according to their absolute size to decide which independent variable has the
    greatest influence on the dependent variable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In addition, the signs retain the same meaning as in linear regression. Accordingly,
    a negative sign in front of a coefficient means that an increase in the independent
    variable leads to a decrease in the dependent variable and vice versa.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In addition to these similarities, however, it should be noted that the regularization
    parameter of the ridge regression has a decisive influence on the size of the
    coefficients. In general, the coefficients of the ridge regression are usually
    smaller than those of a comparable linear regression due to the regularization.
    This behavior is particularly pronounced when there is strong multicollinearity
    between the variables. Due to the structure of the model, the regularization parameter
    forces the coefficients to be closer to 0 without setting them completely to 0,
    as can happen with lasso regression, for example.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, the ridge regression provides better results with multicollinear data
    by distributing the influence better and more evenly across the variables and
    also penalizing strongly correlated variables. This often makes the models easier
    to interpret than comparable linear regressions trained with the same data. In
    addition, it can be generalized that the smaller the regularization parameter
    ***λ***, the more the results and the interpretation of the ridge regression resemble
    the results of a comparable linear regression.
  prefs: []
  type: TYPE_NORMAL
- en: What are the Differences to Other Regularization Methods?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ridge regression is a regularization method that aims to prevent overfitting.
    Although it has similarities with other methods, such as L1 regularization or
    Elastic Net, it also differs significantly in its effects.
  prefs: []
  type: TYPE_NORMAL
- en: Ridge Regression vs L1 Regularization (Lasso)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ridge regression is one of the various regularization techniques and has similarities
    with methods such as Lasso regression or Elastic Net. The distinction here mainly
    concerns the handling of the regression coefficient and the resulting properties
    for the models. In this section, we will therefore look at lasso regression, which
    is very similar in structure to ridge regression.
  prefs: []
  type: TYPE_NORMAL
- en: 'Lasso regression, also known as L1 regularization, adds up the absolute value
    of the coefficients in the regularization term:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f42988dbdbb521b03587b5211cdbbc0e.png)'
  prefs: []
  type: TYPE_IMG
- en: The regularization parameter ***λ*** has the same function here and determines
    the strength of the regularization. By summing the absolute coefficients, compared
    to the squared values, all coefficients are penalized equally for their size.
  prefs: []
  type: TYPE_NORMAL
- en: Due to this difference in structure, lasso regression can set the coefficients
    of individual variables completely to zero, which results in variable selection.
    Ridge regression, on the other hand, only reduces the size of all coefficients
    without setting them completely to zero. For this reason, ridge regression should
    primarily be selected if all predictors are to be retained and there is a problem
    with multicollinearity. Lasso regression, on the other hand, is suitable if you
    want to perform additional variable selection, as it can remove individual variables
    from the model by setting their coefficients to zero.
  prefs: []
  type: TYPE_NORMAL
- en: Ridge Regression vs Elastic Net
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Elastic net combines the properties of lasso and ridge regression by including
    both L1 and L2 regularization. This results in the following cost function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b26a7ec885bcd6bf66714765d772983d.png)'
  prefs: []
  type: TYPE_IMG
- en: This structure combines the advantages of both architectures and the Elastic
    Net is particularly suitable for high-dimensional data where both variable selection
    and strongly correlated predictors need to be handled. The parameters **λ₁** and
    **λ₂** can also be used to customize the strength of these two approaches.
  prefs: []
  type: TYPE_NORMAL
- en: How can you implement the Ridge Regression in Python?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the help of [scikit-learn](https://databasecamp.de/en/python-coding/scikit-learns),
    ridge regression can be used very easily in Python. In this tutorial, we will
    look at a data set on Californian real estate prices and try to train a model
    that can predict these prices very accurately.
  prefs: []
  type: TYPE_NORMAL
- en: First, we import the necessary libraries. We import [NumPy](https://databasecamp.de/en/python-coding/numpy-en)
    to handle the data set. We also need scikit-learn to use the ridge regression,
    train the model using the train-test-split, and then evaluate the performance
    independently.
  prefs: []
  type: TYPE_NORMAL
- en: We can simply import the dataset from the scikit-learn datasets and then save
    the target variables and the data set with the features separately. We then split
    the data into training and test data sets to finally evaluate the generalization
    ability of the model by making predictions for new data.
  prefs: []
  type: TYPE_NORMAL
- en: Once we have prepared the data, we can prepare the model we have already imported.
    To do this, we set the regularization parameter to 1.0 and initialize the model.
    This can then be optimized using the training data set and the training labels.
  prefs: []
  type: TYPE_NORMAL
- en: We now use the trained model to calculate predictions for the test data set.
  prefs: []
  type: TYPE_NORMAL
- en: We use the [mean squared error](https://databasecamp.de/en/statistics/mean-squared-error)
    to calculate the deviation between the predictions for the test data set and the
    actual labels. This provides information on the model’s prediction quality.
  prefs: []
  type: TYPE_NORMAL
- en: The regularization parameter ***λ*** is a hyperparameter that must be defined
    before training. It therefore makes sense to train the model with different parameter
    values and compare their results. In our example, the results for different alphas
    are identical, so we had already selected the correct alpha value.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, as an additional evaluation, the individual coefficients and their
    size can be visualized using [Matplotlib](https://databasecamp.de/en/python-coding/matplotlib-en).
    This provides an insight into which characteristics have the greatest influence
    on the predictions.
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, scikit-learn can train a functional ridge regression in just
    a few lines of code. The performance can be further improved using additional
    parameters as required.
  prefs: []
  type: TYPE_NORMAL
- en: This is what you should take with you
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ridge regression is a regularization method used to reduce the risk of overfitting
    when training linear regressions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A so-called regularization term is added to the cost function, penalizing the
    model if the size of the regression coefficients increases too much. This procedure
    prevents the model from adapting too strongly to the training data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In general, the coefficients of a ridge regression are smaller than those of
    a comparable linear regression. Apart from this, the models and their coefficients
    can be compared similarly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ridge regression differs from lasso regression because it cannot set the coefficients
    to zero and therefore does not select variables.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ridge regression can be imported into Python using scikit-learn and is easy
    to use.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
