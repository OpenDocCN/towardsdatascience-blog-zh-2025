- en: 'LangGraph + SciPy: Building an AI That Reads Documentation and Makes Decisions'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/langgraph-scipy-building-an-ai-that-reads-documentation-and-makes-decisions/](https://towardsdatascience.com/langgraph-scipy-building-an-ai-that-reads-documentation-and-makes-decisions/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <mdspan datatext="el1754934717839" class="mdspan-comment">Statistics and Data
    Science</mdspan> have always walked side-by-side, holding hands.
  prefs: []
  type: TYPE_NORMAL
- en: I remember hearing *“Learn Statistics to know what’s behind the algorithms”*
    when I started studying Data Science. While all of that was fascinating to me,
    it was also really overwhelming.
  prefs: []
  type: TYPE_NORMAL
- en: The fact is that there are too many statistical concepts, tests, and distributions
    to keep track of. If you don’t know what I am talking about, just visit the [Scipy.stats](https://docs.scipy.org/doc/scipy/reference/stats.html)
    page, and you will understand.
  prefs: []
  type: TYPE_NORMAL
- en: If you are old enough in the Data Science field, you probably bookmarked (or
    even printed) one of those statistical test cheatsheets. They were popular for
    a while. But now, the Large Language Models are becoming kind of a “second brain”
    for us, helping us to quickly consult virtually any information we li,ke with
    the extra benefit of getting it summarized and adapted to our needs.
  prefs: []
  type: TYPE_NORMAL
- en: With that in mind, my thinking was that choosing the right statistical test
    can be confusing because it depends on variable types, assumptions, etc.
  prefs: []
  type: TYPE_NORMAL
- en: So, I thought I could get an assistant to help with that. Then, my project took
    form.
  prefs: []
  type: TYPE_NORMAL
- en: I used LangGraph to build a multi-step agent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The front-end was built with Streamlit
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Agent can quickly consult Scipy Stats documentation and retrieve the right
    code for every specific situation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, it gives us a sample Python code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is deployed in Streamlit Apps, in case you want to try it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'App Link: [https://ai-statistical-advisor.streamlit.app/](https://ai-statistical-advisor.streamlit.app/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Amazing!
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dive in and learn how to build this agent.
  prefs: []
  type: TYPE_NORMAL
- en: LangGraph
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LangGraph is a library that helps build complex, multi-step applications with
    large language models (LLMs) by representing them as a graph. This graph architecture
    enables the developers to create conditions, loops, which make it useful for creating
    sophisticated agents and chatbots that can decide what to do next based on the
    results of a previous step
  prefs: []
  type: TYPE_NORMAL
- en: It essentially turns a rigid sequence of actions into a flexible, dynamic decision-making
    process. In LangGraph, each node is a function or tool.
  prefs: []
  type: TYPE_NORMAL
- en: Next, let’s learn more about the agent we are going to create in this post.
  prefs: []
  type: TYPE_NORMAL
- en: Statistical Advisor Agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This agent is a Statistical Advisor. So, the main idea is that:'
  prefs: []
  type: TYPE_NORMAL
- en: The bot receives a statistics-related question, such as “*How to compare the
    means of two groups*“.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It checks the question and determines if it needs to consult Scipy’s documentation
    or just give a direct answer.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If needed, the agent uses a RAG tool on embedded SciPy documentation
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Returns an answer.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If applicable, it returns a sample Python code on how to perform the statistical
    test.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s quickly look at the Graph generated by LangGraph to show this agent.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ecfde6e40ab5358ba2f146c1669e582b.png)'
  prefs: []
  type: TYPE_IMG
- en: Agent created with LangGraph. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Great. Now, let’s cut to the chase and start coding!
  prefs: []
  type: TYPE_NORMAL
- en: Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To make things easier, I will break the development down into modules. First,
    let’s install the packages we will need.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Chunk and Embed
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we will create the script to take our documentation and create chunks
    of text, as well as embed those chunks. We do that to make it easier for vector
    databases like `ChromaDB` to search and retrieve information.
  prefs: []
  type: TYPE_NORMAL
- en: So, I created this function [`embed_docs()`](https://github.com/gurezende/AI-Statistical-Advisor/blob/main/rag/embedder.py)
    that you can see in the GitHub repository linked [here](https://github.com/gurezende/AI-Statistical-Advisor).
  prefs: []
  type: TYPE_NORMAL
- en: The function takes Scipy’s documentation (which is open source under BSD license)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Splits it into chinks of 500 tokens and overlap of 50 tokens.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Makes the embedding (transform text into numerical values for optimized vector
    db search) using `OpenAIEmbedding`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Saves the embeddings in an instance of `ChromaDB`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now the data is ready as a knowledge base for a Retrieval-Augmented Generation
    (RAG). But it needs a retriever that can search and find the data. That is what
    the `retriever` does.
  prefs: []
  type: TYPE_NORMAL
- en: Retriever
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The [`get_doc_answer()`](https://github.com/gurezende/AI-Statistical-Advisor/blob/main/rag/retriever.py)
    function will:'
  prefs: []
  type: TYPE_NORMAL
- en: Load the ChromaDB instance previously created.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create an instance of `OpenAI GPT 4o`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a `retriever` object
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Glue everything together in a `retrieval_chain` that gets a question from the
    user, sends it to the LLM
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model uses the `retriever` to access the ChromaDB instance, get relevant
    data about statistical tests, and return the answer to the user.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now we have the RAG completed with the documents embedded and the retriever
    ready. Let’s move on to the Agent nodes.
  prefs: []
  type: TYPE_NORMAL
- en: Agent Nodes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: LangGraph has this interesting architecture that considers each node as a function.
    Therefore, now we must create the functions to handle each part of the agent.
  prefs: []
  type: TYPE_NORMAL
- en: We will follow the flow and start with the `classify_intent` node. Since some
    nodes need to interact with an LLM, we need to generate a client.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Once we start the agent, it will receive a query from the user. So, this node
    will check the question and decide if the next node will be a simple response
    or if it needs to search Scipy’s documentation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: If a question about statistical concepts or tests is asked, then the `retrieve_info()`
    node is activated. It performs the RAG in the documentation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Once the proper chunk of text is retrieved from ChromaDB, the agent goes to
    the next node to generate an answer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Finally, the last node is to generate a code, if that is applicable. Meaning,
    if there is an answer where the test can be done using Scipy, there will be a
    sample code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Notice something important here: all functions in our nodes always have `state`
    as an argument because the **state is the single source of truth for the entire
    workflow.** **Each function, or “node,” in the graph reads from and writes to
    this central state object.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: The `classify_intent` function reads the **question** from the state and adds
    an *intent* key.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `retrieve_info` function can read the same **question** and add a *rag_answer*,
    which the respond function finally reads to construct the *final_answer*. This
    shared state dictionary is how the different steps in the agent’s reasoning and
    action-taking process stay connected.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Next, let’s put everything together and build our graph!
  prefs: []
  type: TYPE_NORMAL
- en: Building the Graph
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The graph is the agent itself. So, what we’re doing here is basically telling
    LangGraph what the nodes are that we have and how they connect to each other,
    so the framework can make the information run according to that flow.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s import the modules.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Define our state schema. Remember that dictionary that the agent uses to connect
    the steps of the process? That is it.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Here, we will create a function that builds the graph.
  prefs: []
  type: TYPE_NORMAL
- en: To tell LangGraph what the steps (functions) in the process are, we use `add_node`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once we have listed all the functions, we start creating the edges, which are
    the connections between the nodes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We start the process with `set_entry_point`. This is the first function to be
    used.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We use `add_edge` to connect one node to another, using the first argument as
    the function from which the information comes, and the second argument is where
    it goes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If we have a condition to follow, we use `add_conditional_edges`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We use `END` to finish the graph and `compile` to build it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: With our graph builder function ready, all we have to do now is create a beautiful
    front-end where we can interact with this agent.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s do that now.
  prefs: []
  type: TYPE_NORMAL
- en: Streamlit Front-End
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The front-end is the final piece of the puzzle, where we create a User Interface
    that allows us to easily enter a question in a proper text box and see the answer
    properly formatted.
  prefs: []
  type: TYPE_NORMAL
- en: I chose Streamlit because it is very easy to prototype and deploy. Let’s begin
    with the imports.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Then, we configure the page’s look.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Create a sidebar, where the user can enter their OpenAI API key, along with
    a “Clear” session button.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Next, we set up the page title and instructions and add a text box for the user
    to enter a question.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Finally, we can run the graph builder and display the answer on screen.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Let’s see the result now.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bca2c55267703aba76d0d5c36374266f.png)'
  prefs: []
  type: TYPE_IMG
- en: Wow, the result is impressive!
  prefs: []
  type: TYPE_NORMAL
- en: 'I asked: *What is the best test to compare two groups means?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Answer: *To compare the means of two groups, the most appropriate test is typically
    the independent two-sample t-test if the groups are independent and the data is
    normally distributed. If the data is not normally distributed, a non-parametric
    test like the Mann-Whitney U test might be more suitable. If the groups are paired
    or related, a paired sample t-test would be appropriate.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mission accomplished for what we proposed to create.
  prefs: []
  type: TYPE_NORMAL
- en: Try It Yourself
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Do you want to give this Agent a Try?
  prefs: []
  type: TYPE_NORMAL
- en: Go ahead and test the deployed version now!
  prefs: []
  type: TYPE_NORMAL
- en: '[https://ai-statistical-advisor.streamlit.app](https://ai-statistical-advisor.streamlit.app)'
  prefs: []
  type: TYPE_NORMAL
- en: Before You Go
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is a long post, I know. But I hope it was worth to read it to the end.
    We learned a lot about LangGraph. It makes us think in a different way about creating
    AI agents.
  prefs: []
  type: TYPE_NORMAL
- en: 'The framework forces us to think about every step of the information, from
    the moment a question is prompted to the LLM until the answer that will be displayed.
    Questions like these start to pop in your mind during the development process:'
  prefs: []
  type: TYPE_NORMAL
- en: '*What happens after the user asks the question?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Does the agent need to verify something before moving on?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Are there conditions to consider during the interaction?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This architecture becomes an advantage because it makes the whole process cleaner
    and scalable, since adding a new feature can be as simple as adding a new function
    (node).
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, LangGraph is not as user-friendly as frameworks like Agno
    or CrewAI, which encapsulate many of these abstractions in simpler methods, making
    the process much easier to learn and develop, but also less flexible.
  prefs: []
  type: TYPE_NORMAL
- en: In the end, it is all a matter of what problem is being solved and how flexible
    you need it to be.
  prefs: []
  type: TYPE_NORMAL
