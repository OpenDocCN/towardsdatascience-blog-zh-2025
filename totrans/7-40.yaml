- en: A Practical Exploration of Sora – Intuitively and Exhaustively Explained
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《对Sora的实用探索——直观且详尽解释》
- en: 原文：[https://towardsdatascience.com/a-practical-exploration-of-sora-intuitively-and-exhaustively-explained-57426b269a26/](https://towardsdatascience.com/a-practical-exploration-of-sora-intuitively-and-exhaustively-explained-57426b269a26/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/a-practical-exploration-of-sora-intuitively-and-exhaustively-explained-57426b269a26/](https://towardsdatascience.com/a-practical-exploration-of-sora-intuitively-and-exhaustively-explained-57426b269a26/)
- en: The functionality of OpenAI’s video generation model, and the theory behind
    it
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: OpenAI的视频生成模型的功能及其背后的理论
- en: '!["The Eye", generated by Daniel Warfield using Sora. All images and videos
    by the author unless otherwise specified. Article originally made available on
    Intuitively and Exhaustively Explained.](../Images/8570e989bcd0903ac6ce9ba897343546.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![“眼睛”，由Daniel Warfield使用Sora生成。除非另有说明，所有图片和视频均为作者所有。文章最初在直观且详尽解释上发布。](../Images/8570e989bcd0903ac6ce9ba897343546.png)'
- en: '"The Eye", generated by Daniel Warfield using Sora. All images and videos by
    the author unless otherwise specified. Article originally made available on [Intuitively
    and Exhaustively Explained](https://iaee.substack.com/).'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: “眼睛”，由Daniel Warfield使用Sora生成。除非另有说明，所有图片和视频均为作者所有。文章最初在[直观且详尽解释](https://iaee.substack.com/)上发布。
- en: OpenAI recently released Sora, their cutting edge video generation model. With
    Sora, they also released a web UI that allows users to generate and edit videos
    in a variety of sophisticated and interesting ways. In this article we’ll be exploring
    the features of that UI, and how Sora might be enabling those features.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI最近发布了Sora，他们的尖端视频生成模型。使用Sora，他们还发布了一个Web UI，允许用户以各种复杂和有趣的方式生成和编辑视频。在本文中，我们将探讨该UI的功能，以及Sora可能如何实现这些功能。
- en: '* * *'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Who is this useful for?** Anyone who wants to use AI for video generation,
    or wants to forge a deeper understanding of artificial intelligence.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**这对谁有用？**任何想要使用AI进行视频生成或想要更深入理解人工智能的人。'
- en: '**How advanced is this post?** This post is intended for a general audience,
    and is designed to be a gentle introduction to artificial intelligence. It also
    contains some speculation about how Sora works, which might be compelling for
    more advanced readers.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**这篇文章的深度如何？**这篇文章面向一般读者，旨在对人工智能进行温和的介绍。它还包含一些关于Sora工作原理的推测，可能对更高级的读者有吸引力。'
- en: '**Pre-requisites:** None.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**先决条件：**无。'
- en: A Tour of Sora
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Sora之旅
- en: 'At the time of writing, here’s the main page of the Sora UI:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本文时，这是Sora UI的主页：
- en: '![](../Images/e3653dc4faabe3411f42b98dc42fca59.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e3653dc4faabe3411f42b98dc42fca59.png)'
- en: On the left are some of the typical suspects. The Explore section allows you
    to browse videos generated by other creators, and the library section allows you
    to browse and organize videos which you’ve generated.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在左侧有一些典型的嫌疑人。探索部分允许你浏览其他创作者生成的视频，而图书馆部分允许你浏览和组织你生成的视频。
- en: To actually generate video, you use the text bar… *thing* at the bottom of the
    screen. Guides by OpenAI just refer to it as "the bottom of the screen", and the
    HTML class used to define it doesn’t exactly roll off the tongue, so I’ll refer
    to it as the "creation bar" for our purposes.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 实际生成视频时，你使用屏幕底部的文本栏… *东西*。OpenAI的指南只是将其称为“屏幕底部”，用于定义它的HTML类名并不容易发音，所以为了我们的目的，我将称其为“创作栏”。
- en: '![The creation bar, the main place where you create content in Sora.](../Images/c359e61f5f7154cfb1331d85eb3c2c40.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![创作栏，Sora中创建内容的主要地方。](../Images/c359e61f5f7154cfb1331d85eb3c2c40.png)'
- en: The creation bar, the main place where you create content in Sora.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 创作栏，Sora中创建内容的主要地方。
- en: The fundamental way of generating video with Sora is to type in some prompt
    and then press submit.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Sora生成视频的基本方式是输入一些提示，然后点击提交。
- en: '![](../Images/7abb84b7816c3cbcda213480fb62bb08.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7abb84b7816c3cbcda213480fb62bb08.png)'
- en: 'This will trigger a generation job, which will then appear as a progress bar
    in two places: in your list of videos and in your notification section at the
    top of the screen.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这将触发一个生成任务，随后将在两个地方显示进度条：在你的视频列表中和屏幕顶部的通知区域。
- en: '![](../Images/1ee604c106450715863e6c0ace191d35.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1ee604c106450715863e6c0ace191d35.png)'
- en: Once the generation has been completed, the results can be viewed intuitively
    throughout the Sora UI.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 生成完成后，结果可以在Sora UI中直观地查看。
- en: '![The result of our prompt "A Rubik''s Cube erupting into a ball of flames".
    We can scrub through the video in our library, click to play individual examples,
    or open and play all generated variants.](../Images/cf1928ee6c4cce5f64051ac3f5b093b9.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
- en: The result of our prompt "A Rubik’s Cube erupting into a ball of flames". We
    can scrub through the video in our library, click to play individual examples,
    or open and play all generated variants.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: You can also upload images which can be used to inform video generation. Here,
    I’ve uploaded the cover of my [article on LLM Routing](https://medium.com/towards-data-science/llm-routing-intuitively-and-exhaustively-explained-5b0789fe27aa)
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1ef311e7554dd391700ef252779db25e.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
- en: When you upload an image you can optionally add a prompt to describe the video
    you want, or you can upload the image by itself and let Sora figure out what type
    of video makes sense.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '![Four examples of video generated from Sora when no prompt was given. As you
    can see, very little is actually happening in this example.](../Images/d838d98d7658d1b63996d37b5df98744.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
- en: Four examples of video generated from Sora when no prompt was given. As you
    can see, very little is actually happening in this example.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '![An example generation with the image and a textual prompt describing the
    image. As you can see, these results are a bit more dynamic.](../Images/adcea65dc68862563538b26b5a9db7dc.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
- en: An example generation with the image and a textual prompt describing the image.
    As you can see, these results are a bit more dynamic.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: When generating video you can set the aspect ratio (the shape of the video),
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/662c0bb0f574653c65b5899c15df43fa.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
- en: The quality (different options available depending on your subscription tier),
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/04feade2b99bf04ae655b7290db8af8d.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
- en: the length of the video you want to create (different options for this are also
    available depending on your subscription tier),
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fdc09066d45ceba70e7b156b8caecaee.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
- en: and how many variations of the video you want to generate per submission.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3b973bf5cef42de4c2c905ffa8b2ba3e.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
- en: For those wanting more granular control of video generation, you can use the
    storyboard.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '![An example of a story board, which consists of images, text, and video over
    time.](../Images/a2b78e8d691418f939049ea332047c15.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: An example of a story board, which consists of images, text, and video over
    time.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: With storyboards you can inject images, videos, and text throughout the storyboard
    to granularly control how frames are generated.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '![A few examples of the results of the storyboard above](../Images/720a6635e98b2e8460d005f3a78390b8.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
- en: A few examples of the results of the storyboard above
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: The strategies of prompting video generation models can be very complex. getting
    a result of reasonable quality can take a substantial amount of fiddling, both
    in terms of the content blocks and their temporal position within the storyboard.
    I’ll talk about the storyboard and some ideas one can employ to get higher quality
    results in later sections.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Circling back to the creation bar, there’s also an option for presets
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/86c7247c725287112f7339d066bbbf34.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
- en: This probably uses a technology called [LoRA, which I cover in another article](https://medium.com/towards-data-science/lora-intuitively-and-exhaustively-explained-e944a6bff46b).
    You can think of LoRA like specially trained filters that can be applied to an
    AI model like Sora.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a few examples of various generations with the same prompt and different
    presets:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '!["A mysterious detective in a moodily lit room" with no preset](../Images/d7bc82adeada9dbe087a122e6c3a13fa.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
- en: '"A mysterious detective in a moodily lit room" with no preset'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '!["A mysterious detective in a moodily lit room" with the "Balloon World" preset](../Images/07043ac8028d7b3fb45d1489eccb76ba.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
- en: '"A mysterious detective in a moodily lit room" with the "Balloon World" preset'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '!["A mysterious detective in a moodily lit room" with the "Stop Motion" preset](../Images/60c7f671900427e45c4d9e0181e36db2.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
- en: '"A mysterious detective in a moodily lit room" with the "Stop Motion" preset'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: once a video’s been generated there are a few options for editing it.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '![Options for editing an existing video, at the bottom of the screen when a
    particular video is selected.](../Images/71295210cab0a6fc915807cf2f19ff65.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
- en: Options for editing an existing video, at the bottom of the screen when a particular
    video is selected.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: you can "Re-Cut", which is like normal video cutting, except you can use AI
    to change the resolution of the image, the length, etc.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '!["Re-Cut" allows you to do cool stuff like AI Upscale, extend a video by generating
    more frames, etc.](../Images/41cbf272ff1e95fe8524e83a93150646.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
- en: '"Re-Cut" allows you to do cool stuff like AI Upscale, extend a video by generating
    more frames, etc.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: you can "Remix" which allows you to generate a new video based on a prompt and
    an existing video
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e4ff663a710dcaf2ffdd1601d06f710a.png)![remixing the video with
    the prompt "A detective made of spaghetti, inspecting photos in moody lighting."](../Images/e691fbc2337abde24ff16545ecba645f.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
- en: remixing the video with the prompt "A detective made of spaghetti, inspecting
    photos in moody lighting."
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: You can blend between videos in a variety of ways with the "Blend" function
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/08c4e3ad256183ecd726e2bb3c74e7b3.png)![The result of creating
    a transition between the detective and eye videos via the Blend tool.](../Images/b4c6624d6dccc8c56fc5a7370df3c81d.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
- en: The result of creating a transition between the detective and eye videos via
    the Blend tool.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: And you can turn your videos into a loop with the "loop" function. This will
    make it so the video loops seamlessly such that the end of the video perfectly
    feeds into the beginning.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/04a32cf0db8290bcfb9c98c231484cf8.png)![Creating a loop out of
    the detective scene](../Images/259f89ef4e3120751e276587016834ac.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
- en: Creating a loop out of the detective scene
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: And that’s the essence of Sora; it’s a big box of AI-powered video editing tools.
    In the following sections we’ll work through each of these functionalities, explore
    them more in depth, and discuss how they (probably) work.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: The Theory of Text to Video Generation
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The most fundamental idea of Sora is the "diffusion model". Diffusion is a modeling
    approach where the task of generating things like images and videos is thought
    of as a denoising problem.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: Basically, to train a model like Sora, you start with a bunch of videos and
    a textual description of those videos. Then, you make those videos super noisy.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: '![Adding noise to a video, to varying degrees. From my original article on
    Sora. The original "Steamboat Willie" rendition of Mickey Mouse is in the public
    domain because it was published (or registered with the U.S. Copyright Office)
    before January 1, 1929\. Source.](../Images/98c14f2566e4db73c60b7abeb7817ef7.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
- en: Adding noise to a video, to varying degrees. From my [original article on Sora](https://medium.com/towards-data-science/sora-intuitively-and-exhaustively-explained-a54f83ea9c21).
    The original "Steamboat Willie" rendition of Mickey Mouse is in the public domain
    because it was published (or registered with the U.S. Copyright Office) before
    January 1, 1929\. [Source](https://en.wikipedia.org/wiki/File:Steamboat_Willie_(1928)_by_Walt_Disney.webm).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: and then you train the model to generate the original videos from noise based
    on the textual descriptions.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '![The modeling objective of a diffusion model; to remove noise from images.
    From my original article on Sora.](../Images/f5d4a427f60114c7e791ba3b86d7c2c5.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
- en: The modeling objective of a diffusion model; to remove noise from images. From
    my [original article on Sora](https://medium.com/towards-data-science/sora-intuitively-and-exhaustively-explained-a54f83ea9c21).
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: By training a model like Sora on a lot of videos (like, millions or billions
    of hours of video), OpenAI trained a model that’s able to turn text into video
    through denoising.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '![A conceptual diagram of Sora. It receives a sequence of noisy images, and
    outputs a sequence of images as a video.](../Images/b08e67fe79296d8dda8013e94db3ef76.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
- en: A conceptual diagram of Sora. It receives a sequence of noisy images, and outputs
    a sequence of images as a video.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: And that’s about it. This one strategy of denoising video is powering text to
    video generation, image to video generation, timelines, blending etc. OpenAI is
    achieving all this complex functionality with a single model as a result of some
    clever tricks which we’ll be exploring in the following sections.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Sora’s Tricks
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Recall that one way to make videos with Sora is by using a timeline editor
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: '![Recall that the timeline allows us to place blocks of content within a timeline,
    and generate a video based on that information.](../Images/a2b78e8d691418f939049ea332047c15.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
- en: Recall that the timeline allows us to place blocks of content within a timeline,
    and generate a video based on that information.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: Let’s explore a few tricks that could be used to make this work.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: Trick 1) Frame Injection
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Recall that diffusion models take in noisy video and output less noisy video
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '![Using Sora to generate video based on a textual description, from my original
    article on Sora.](../Images/b08e67fe79296d8dda8013e94db3ef76.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
- en: Using Sora to generate video based on a textual description, from my [original
    article on Sora](https://medium.com/towards-data-science/sora-intuitively-and-exhaustively-explained-a54f83ea9c21).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: If you have an image, and you want to create a video from that image, you can
    simply set one of those frames to be part of the input of the model.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: '![Using Sora to generate video based on a textual description and an image,
    from my original article on Sora.](../Images/cc872dd1f51f11d5896998bbebea8fe7.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
- en: Using Sora to generate video based on a textual description and an image, from
    my [original article on Sora](https://medium.com/towards-data-science/sora-intuitively-and-exhaustively-explained-a54f83ea9c21).
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: If you have video you want to generate based off of, you can just include that
    video in the input.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: '![Using Sora to generate video based on a textual description and a video,
    from my original article on Sora.](../Images/d3e0dfce08c01547009121ec0f3f13d6.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
- en: Using Sora to generate video based on a textual description and a video, from
    my [original article on Sora](https://medium.com/towards-data-science/sora-intuitively-and-exhaustively-explained-a54f83ea9c21).
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: The whole idea of Sora is that it understands video and denoises the entire
    input to make sense based on whatever textual description is provided. So, if
    you include video in the input to the model, it will naturally denoise the rest
    of the frames to make sense based on whatever frames you provided.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: If you have multiple videos or images in a timeline, you can just put them in
    the corresponding locations in Sora’s input
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: '![If you add multiple images or video throughout Sora''s input, it will force
    the model to reconcile it''s denoising process with the surrounding frames, from
    my original article on Sora.](../Images/ddb91c778e592c0bed7a8011fc590ffc.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
- en: If you add multiple images or video throughout Sora’s input, it will force the
    model to reconcile it’s denoising process with the surrounding frames, from my
    [original article on Sora](https://medium.com/towards-data-science/sora-intuitively-and-exhaustively-explained-a54f83ea9c21).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: The choice of what frames to add, and where they’re added in the input will
    drastically impact the output of Sora. I suspect this type of approach is central
    to some of the more advanced generation approaches, like the storyboard, blending,
    and looping features within Sora.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: '![Imagine adding the frames at the end of a video to the beginning of the Sora''s
    input, and the beginning of the video to the end of Sora''s input. If you did
    that, the model would be forced to generate frames which transition from the end
    to the beginning of your video. This is probably the fundamental idea of how Sora
    generates video loops.](../Images/ddb91c778e592c0bed7a8011fc590ffc.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
- en: Imagine adding the frames at the end of a video to the beginning of the Sora’s
    input, and the beginning of the video to the end of Sora’s input. If you did that,
    the model would be forced to generate frames which transition from the end to
    the beginning of your video. This is probably the fundamental idea of how Sora
    generates video loops.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: So that would explain how Sora deals with storyboards of images and video. When
    you place various images and videos within a storyboard, those are placed throughout
    the otherwise noisy input to Sora, and Sora takes those images and videos into
    account when denoising the rest of the frames.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: '![Recall that, on the storyboard, we can place both text and video over time.](../Images/a2b78e8d691418f939049ea332047c15.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
- en: Recall that, on the storyboard, we can place both text and video over time.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: The next trick describes how a storyboard of textual descriptions might work.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: Trick 2) Gated Cross Attention
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I wrote [an article on a model called "Flamingo"](https://medium.com/towards-data-science/flamingo-intuitively-and-exhaustively-explained-bf745611238b)
    a while ago. The idea of Flamingo was to create a language model which could generate
    text based on arbitrary sequences of text and images as an input.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: '![Flamingo generating responses based on an input of both text and images.
    Blocks in pink are generated by the Flamingo model. Many models which deal with
    both textual and visual inputs take direct inspiration from Flamingo. Image from
    the Flamingo paper.](../Images/87337312a09d54b5ed15b3596dc6902f.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
- en: Flamingo generating responses based on an input of both text and images. Blocks
    in pink are generated by the Flamingo model. Many models which deal with both
    textual and visual inputs take direct inspiration from Flamingo. Image from the
    Flaming[o paper.](https://arxiv.org/pdf/2204.14198.pdf)
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: In a lot of ways, Flamingo is similar to Sora. Flamingo accepts arbitrary sequences
    of images and text and uses that data to generate text. Sora accepts arbitrary
    sequences of images and text and uses that data to generate videos. Flamingo goes
    about the general problem of understanding images and text simultaneously by using
    a special masking strategy in a mechanism called "cross attention".
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: This is a fairly advanced concept, but I’ll try to explain it from a high level.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: Basically, there’s a mechanism in many modern AI models called attention, which
    allows vectors that represent words or sections of images to interact with one
    another to make abstract and meaning rich representations. These representations
    allow modern AI models to make their complex inferences.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，许多现代AI模型中有一个称为注意力的机制，它允许代表单词或图像部分的向量相互交互，以创建抽象且意义丰富的表示。这些表示允许现代AI模型进行复杂的推理。
- en: '![There are many different flavors of attention, but they all do the same thing:
    Take a bunch of vectors that represent individual things and allow the model to
    make an abstract and meaning rich representation based on making those vectors
    interact with one another. Image from my article on transformers.](../Images/6b9b8e58bfd831c7422f8d5dd0470c4e.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![有许多不同种类的注意力机制，但它们都做同样的事情：将代表单个事物的多个向量组合起来，并允许模型通过这些向量之间的交互来创建一个抽象且意义丰富的表示。图片来自我的关于Transformer的文章。](../Images/6b9b8e58bfd831c7422f8d5dd0470c4e.png)'
- en: 'There are many different flavors of attention, but they all do the same thing:
    Take a bunch of vectors that represent individual things and allow the model to
    make an abstract and meaning rich representation based on making those vectors
    interact with one another. Image from [my article on transformers](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb).'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力机制有很多不同的种类，但它们都做同样的事情：将代表单个事物的多个向量组合起来，并允许模型通过这些向量之间的交互来创建一个抽象且意义丰富的表示。图片来自[我的关于Transformer的文章](https://medium.com/towards-data-science/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)。
- en: 'AI models use two general flavors of attention: self attention and cross attention.
    Self-attention allows AI models to make complex and abstract representations of
    an input'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型使用两种通用的注意力机制：自注意力和交叉注意力。自注意力允许AI模型对输入进行复杂和抽象的表示
- en: '![Imagine that we input a sequence of text "I am an input sequence" into an
    AI model. We might create a vector that represents each word in the sequence,
    then input those vectors into the model. "Self-attention", in this context, would
    make all the atomic and isolated vectors interact with one another. So, the vectors
    for "I", "am", "an", "input", and "sequence", would be allowed to interact with
    one another, allowing the model to create an understanding of the entire sequence,
    not just a list of isolated words.](../Images/6b9b8e58bfd831c7422f8d5dd0470c4e.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![想象一下，我们将文本序列“我是一个输入序列”输入到AI模型中。我们可能会创建一个代表序列中每个单词的向量，然后将这些向量输入到模型中。“自注意力”，在这种情况下，会使所有原子和孤立的向量相互交互。因此，“我”、“是”、“一个”、“输入”和“序列”的向量将被允许相互交互，从而使模型能够理解整个序列，而不仅仅是孤立的单词列表。](../Images/6b9b8e58bfd831c7422f8d5dd0470c4e.png)'
- en: Imagine that we input a sequence of text "I am an input sequence" into an AI
    model. We might create a vector that represents each word in the sequence, then
    input those vectors into the model. "Self-attention", in this context, would make
    all the atomic and isolated vectors interact with one another. So, the vectors
    for "I", "am", "an", "input", and "sequence", would be allowed to interact with
    one another, allowing the model to create an understanding of the entire sequence,
    not just a list of isolated words.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，我们将文本序列“我是一个输入序列”输入到AI模型中。我们可能会创建一个代表序列中每个单词的向量，然后将这些向量输入到模型中。“自注意力”，在这种情况下，会使所有原子和孤立的向量相互交互。因此，“我”、“是”、“一个”、“输入”和“序列”的向量将被允许相互交互，从而使模型能够理解整个序列，而不仅仅是孤立的单词列表。
- en: Cross-attention allows different inputs to interact with each other. You can
    think of cross attention as a sort of filter, where one input is used to filter
    another input.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉注意力允许不同的输入相互交互。你可以将交叉注意力视为一种过滤器，其中一个输入用于过滤另一个输入。
- en: '![You can think of Cross attention as a filter where one input (in this case
    an image of a cat) is used to filter the information in another input (in this
    case, the text "What''s in the image"). From my upcoming article on cross attention
    by hand.](../Images/ad76027f604d6b4bceaafbd012ed6ff6.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![你可以将交叉注意力视为一种过滤器，其中一个输入（在这种情况下是一张猫的图片）用于过滤另一个输入中的信息（在这种情况下，文本“图片中有什么”）。来自我即将发表的关于手动交叉注意力的文章。](../Images/ad76027f604d6b4bceaafbd012ed6ff6.png)'
- en: You can think of Cross attention as a filter where one input (in this case an
    image of a cat) is used to filter the information in another input (in this case,
    the text "What’s in the image"). From my upcoming article on cross attention by
    hand.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将交叉注意力机制想象成一个过滤器，其中一个输入（在这种情况下是一个猫的图像）用于过滤另一个输入（在这种情况下，是文本“图像中有什么”）中的信息。请参考我即将发布的关于手动实现交叉注意力机制的文章。
- en: Models that deal with multiple types of data, like Flamingo and Sora, typically
    use both self-attention and cross attention. Flamingo, for instance, uses cross
    attention to introduce image data into the representation for text, and uses self
    attention to reason about text.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 处理多种类型数据的模型，例如 Flamingo 和 Sora，通常同时使用自注意力机制和交叉注意力机制。例如，Flamingo 使用交叉注意力机制将图像数据引入文本表示中，并使用自注意力机制来对文本进行推理。
- en: '![In the flamingo paper, as I discuss in my article on Flamingo, cross attention
    is used to allow a model to reason about both language and image data. Image from
    the Flamingo paper.](../Images/9031d96e3f68482f77adfdb88833550b.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![在 Flamingo 论文中，正如我在我的 Flamingo 文章中讨论的那样，交叉注意力机制被用来允许模型对语言和图像数据进行推理。图像来自 Flamingo
    论文。](../Images/9031d96e3f68482f77adfdb88833550b.png)'
- en: In the flamingo paper, as I discuss in my [article on Flamingo](https://towardsdatascience.com/flamingo-intuitively-and-exhaustively-explained-bf745611238b),
    cross attention is used to allow a model to reason about both language and image
    data. Image from the Flaming[o paper.](https://arxiv.org/pdf/2204.14198.pdf)
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Flamingo 论文中，正如我在我的[Flamingo 文章](https://towardsdatascience.com/flamingo-intuitively-and-exhaustively-explained-bf745611238b)中讨论的那样，交叉注意力机制被用来允许模型对语言和图像数据进行推理。图像来自
    Flamingo 论文。[Flamingo 论文](https://arxiv.org/pdf/2204.14198.pdf)。
- en: The whole idea of cross attention is to allow textual information to interact
    with image information, so you might imagine that it makes sense that *all* the
    image information would interact with *all* the textual information so that the
    model could reason about all images based on all of the text. However, the authors
    of the Flamingo paper only allow text to interact with the immediately preceding
    image, not all the images, within the cross attention mechanism. This is called
    "Gated" or "Masked" cross attention.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉注意力机制的整体思想是允许文本信息与图像信息交互，因此你可以想象，所有图像信息与所有文本信息交互，以便模型可以根据所有文本推理所有图像是有意义的。然而，Flamingo
    论文的作者只允许文本与交叉注意力机制中紧接其前的图像交互，而不是所有图像，这被称为“门控”或“掩码”交叉注意力机制。
- en: '![This is kind of an advanced topic. Feel free to refer to my article on Flamingo
    for more information, but the basic idea is that, instead of all image data being
    able to interact with all text data, the text data can only interact with the
    immediately preceding image data. So the text "My puppy sitting in the grass"
    can interact with the dog image, and the text "My cat looking very dignified"
    can interact with the cat photo. Image from the Flamingo paper.](../Images/79224bab9fe936020b5609bb0d8231d0.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![这是一个比较高级的话题。您可以自由地参考我的 Flamingo 文章以获取更多信息，但基本思想是，不是所有图像数据都能与所有文本数据交互，文本数据只能与紧接其前的图像数据交互。所以文本“我的小狗坐在草地上”可以与狗的图像交互，而文本“我的猫看起来非常庄重”可以与猫的照片交互。图像来自
    Flamingo 论文。](../Images/79224bab9fe936020b5609bb0d8231d0.png)'
- en: This is kind of an advanced topic. Feel free to refer to my [article on Flamingo](https://towardsdatascience.com/flamingo-intuitively-and-exhaustively-explained-bf745611238b)
    for more information, but the basic idea is that, instead of all image data being
    able to interact with all text data, the text data can only interact with the
    immediately preceding image data. So the text "My puppy sitting in the grass"
    can interact with the dog image, and the text "My cat looking very dignified"
    can interact with the cat photo. Image from the Flaming[o paper.](https://arxiv.org/pdf/2204.14198.pdf)
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个比较高级的话题。您可以自由地参考我的[Flamingo 文章](https://towardsdatascience.com/flamingo-intuitively-and-exhaustively-explained-bf745611238b)以获取更多信息，但基本思想是，不是所有图像数据都能与所有文本数据交互，文本数据只能与紧接其前的图像数据交互。所以文本“我的小狗坐在草地上”可以与狗的图像交互，而文本“我的猫看起来非常庄重”可以与猫的照片交互。[Flamingo
    论文](https://arxiv.org/pdf/2204.14198.pdf)。
- en: This works because, within the model, there are also instances of self attention.
    So, even though each image data can’t *directly* interact with all the text data,
    it can *indirectly*.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这之所以有效，是因为在模型中，也存在自注意力机制的实例。因此，尽管每个图像数据不能*直接*与所有文本数据交互，但它可以*间接*地交互。
- en: '![Flamingo also uses multi headed self attention. So, even though certain pieces
    of text can only interact with certain image data directly through cross attention,
    all text vectors can interact within self attention. So, the model can learn to
    propegate information from the images as needed beween it''s various cross attention
    and self attention layers. Imagine the word vectors in this image have already
    had an opportunity to interact with various images via gated cross attention.](../Images/6b9b8e58bfd831c7422f8d5dd0470c4e.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![火烈鸟也使用多头自注意力机制。因此，即使某些文本片段只能通过交叉注意力直接与某些图像数据交互，所有文本向量都可以在自注意力中相互交互。因此，模型可以学习在它的各种交叉注意力和自注意力层之间按需传播图像信息。想象一下，这张图中的词向量已经有机会通过门控交叉注意力与各种图像交互。](../Images/6b9b8e58bfd831c7422f8d5dd0470c4e.png)'
- en: Flamingo also uses multi headed self attention. So, even though certain pieces
    of text can only interact with certain image data directly through cross attention,
    all text vectors can interact within self attention. So, the model can learn to
    propegate information from the images as needed beween it’s various cross attention
    and self attention layers. Imagine the word vectors in this image have already
    had an opportunity to interact with various images via gated cross attention.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 火烈鸟也使用多头自注意力机制。因此，即使某些文本片段只能通过交叉注意力直接与某些图像数据交互，所有文本向量都可以在自注意力中相互交互。因此，模型可以学习在它的各种交叉注意力和自注意力层之间按需传播图像信息。想象一下，这张图中的词向量已经有机会通过门控交叉注意力与各种图像交互。
- en: If I fed a list of captioned images into a model using both gated cross and
    self attention, then asked the question "What was in the first image?" Cross attention
    would allow the image data to be injected into some of the text data, then self
    attention would allow all of the text data to interact such that the model could
    answer the question.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我将一系列带有标题的图像列表输入到一个同时使用门控交叉注意力和自注意力的模型中，然后问问题“第一张图像里有什么？”交叉注意力将允许图像数据注入到一些文本数据中，然后自注意力将允许所有文本数据相互交互，从而使模型能够回答问题。
- en: '![When a model like Flamingo uses gated cross attention and self-attention
    in the same model, even though image information is only exposed to certain text
    vectors in cross attention, those vectors can interact with each other in self
    attention; resulting in vectors that contain a mix of information from both images.](../Images/5df72ad2d3a1077c93859ce6141a1494.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![当像火烈鸟这样的模型在同一个模型中使用门控交叉注意力和自注意力时，尽管图像信息只暴露给交叉注意力中的某些文本向量，但这些向量可以在自注意力中相互交互；从而产生包含来自图像信息的混合向量。](../Images/5df72ad2d3a1077c93859ce6141a1494.png)'
- en: When a model like Flamingo uses gated cross attention and self-attention in
    the same model, even though image information is only exposed to certain text
    vectors in cross attention, those vectors can interact with each other in self
    attention; resulting in vectors that contain a mix of information from both images.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 当像火烈鸟这样的模型在同一个模型中使用门控交叉注意力和自注意力时，尽管图像信息只暴露给交叉注意力中的某些文本向量，但这些向量可以在自注意力中相互交互；从而产生包含来自图像信息的混合向量。
- en: It’s possible that Sora employs a similar strategy, except instead of applying
    image data throughout text, it may apply text data throughout a sequence of images.
    For each frame of generated video, we can allow a certain piece of text to attend
    to those frames.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 有可能Sora采用了类似的策略，只不过它不是将图像数据应用于整个文本，而是可能将文本数据应用于一系列图像。对于生成的视频的每一帧，我们可以允许某些文本片段关注这些帧。
- en: '![Just like with Flamingo, even if gated cross attention is used, self attention
    allows the model to move textual information throughout the frames. These mixed
    vectors would be used to denoise the image and generate the final video.](../Images/ba85f9b57de0d5d2fa9454ae3ab6de94.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![就像火烈鸟一样，即使使用了门控交叉注意力，自注意力也允许模型在帧之间移动文本信息。这些混合向量将被用来去噪图像并生成最终的视频。](../Images/ba85f9b57de0d5d2fa9454ae3ab6de94.png)'
- en: Just like with Flamingo, even if gated cross attention is used, self attention
    allows the model to move textual information throughout the frames. These mixed
    vectors would be used to denoise the image and generate the final video.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 就像火烈鸟一样，即使使用了门控交叉注意力，自注意力也允许模型在帧之间移动文本信息。这些混合向量将被用来去噪图像并生成最终的视频。
- en: Even though certain pieces of text only directly interact with a small set of
    frames, they can interact indirectly with all frames via self attention, allowing
    the model to make a cohesive video based on all text inputs.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: '![Here you can see a storyboard used to generate a video. Notice that the rose
    is visible when the text "the door opens" is present, which is before a rose is
    mentioned in the storyboard.](../Images/ae487ffd01a3f4c0c86032396ff3ed76.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
- en: Here you can see a storyboard used to generate a video. Notice that the rose
    is visible when the text "the door opens" is present, which is before a rose is
    mentioned in the storyboard.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: I previously mentioned that prompt engineering with Sora can be a bit complicated.
    This might explain why. The result is kind of a soup of all prompts. Even if you
    have a prompt at the very beginning of the storyboard, it might impact the generation
    of later frames.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5293514cf9d986ef1ee46b732ff6066a.png)![the result of the storyboard
    defined above. It respects many of the core ideas defined in the storyboard, but
    also ignores some critical ones. While Sora is incredibly powerful, it also requires
    a bit of futzing around to get exactly what you might want.](../Images/f09e1ac514fb952ad401c2e0f1a9da56.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
- en: the result of the storyboard defined above. It respects many of the core ideas
    defined in the storyboard, but also ignores some critical ones. While Sora is
    incredibly powerful, it also requires a bit of futzing around to get exactly what
    you might want.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: Trick 3) Partial Diffusion
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Instead of trying to prompt engineer our way into getting the video we want,
    we can use the "Blending" function in Sora to make sure we’re transitioning between
    the scenes we’re interested in.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: Recall that a diffusion model iteratively denoises the entire video
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: '![Recall that a diffusion video model essentially takes in a sequence of noisy
    images and outputs a sequence of not noisy images.](../Images/084f9cc1c9c475dfce1db5206d5c2df3.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
- en: Recall that a diffusion video model essentially takes in a sequence of noisy
    images and outputs a sequence of not noisy images.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: and we can inject full video frames on either side to entice the model to create
    some transition between certain frames. We did that in a previous section using
    the timeline.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: '![Recall that we created a timeline which started with an image of angels and
    ended with a video of an eye](../Images/720a6635e98b2e8460d005f3a78390b8.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
- en: Recall that we created a timeline which started with an image of angels and
    ended with a video of an eye
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: However, when we used the timeline to create this effect our results weren’t
    very compelling. The "blend" function in Sora allows for more fine-tuned control
    over transitions. I’m not 100% sure how this works, but I have a strong hunch.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: I think, instead of using frames we 100% want, or 100% noisy frames, the blend
    function allows us to specify the degree of noise to two videos we want to blend
    between.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: '![If we create a sequence of images with varying degrees of noise between them,
    we can control Sora more or less rigidly between frames.](../Images/eac1f276f517269738abe5245d1b3408.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![如果我们创建一系列图像，它们之间有不同程度的噪声，我们可以控制Sora在帧之间更加或更少地严格。](../Images/eac1f276f517269738abe5245d1b3408.png)'
- en: If we create a sequence of images with varying degrees of noise between them,
    we can control Sora more or less rigidly between frames.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在它们之间创建一系列具有不同程度噪声的图像，我们可以在帧之间或多或少地控制Sora。
- en: This allows Sora to either weakly or strongly edit certain frames over time.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这允许Sora在一段时间内对某些帧进行不同程度的编辑。
- en: '![I generated two videos, one of a snowflake and one of falling rose petals
    and created a transition between them. The curve specifies how much of each video
    ends up in the output.](../Images/6ca4d9017740ee9af85b78dd13d6c514.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![我生成了两个视频，一个是雪花视频，一个是飘落的玫瑰花瓣视频，并在它们之间创建了一个过渡。曲线指定了每个视频有多少最终出现在输出中。](../Images/6ca4d9017740ee9af85b78dd13d6c514.png)'
- en: I generated two videos, one of a snowflake and one of falling rose petals and
    created a transition between them. The curve specifies how much of each video
    ends up in the output.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 我生成了两个视频，一个是雪花视频，一个是飘落的玫瑰花瓣视频，并在它们之间创建了一个过渡。曲线指定了每个视频有多少最终出现在输出中。
- en: '![](../Images/f41907877206a2c88e88cf8541907171.png)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f41907877206a2c88e88cf8541907171.png)'
- en: 'By editing this curve, you can change the duration of the blend, how gradual
    it is, and how much adjustment to the video can be done on either end of the transition.
    So, for instance, if we wanted a gradual transition that perfectly respected the
    angel video in the beginning, and perfectly respected the eye video in the end,
    we might do something like this:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 通过编辑此曲线，您可以更改混合的持续时间，其渐进程度以及过渡两端对视频进行调整的程度。例如，如果我们想要一个渐进的过渡，完美地尊重开始时的天使视频，并在结束时完美地尊重眼睛视频，我们可能会这样做：
- en: '![](../Images/2eca60d2ac8b0941b16e77ea89efc02b.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2eca60d2ac8b0941b16e77ea89efc02b.png)'
- en: If we wanted a video that only slightly respected the video of the angels, and
    then did a long transition to a video that fully respected the video of the eye,
    you might make a curve like this
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想要一个只稍微尊重天使视频的视频，然后过渡到一个完全尊重眼睛视频的视频，您可能会制作一个这样的曲线
- en: '![](../Images/a28226e54fff5cfbe755033bbd0e2ba7.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a28226e54fff5cfbe755033bbd0e2ba7.png)'
- en: I’m not sure if there’s a bug in the Sora, but I can’t seem to find the submit
    button on custom blends. However, we can confirm our suspicions by using one of
    the pre-defined blend modes.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 我不确定Sora中是否存在一个错误，但我似乎找不到自定义混合中的提交按钮。然而，我们可以通过使用预定义的混合模式来证实我们的怀疑。
- en: '![](../Images/26d45354b729f56868789a1ddda4fa88.png)![A video that perfectly
    respects the rose pedal frames in the beginning, then incorporates the snowflake
    video more loosely](../Images/9e8ee3392bd83c0ba98b98adc9793cc4.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/26d45354b729f56868789a1ddda4fa88.png)![一个在开始时完美尊重玫瑰花瓣帧的视频，然后更松散地融入雪花视频](../Images/9e8ee3392bd83c0ba98b98adc9793cc4.png)'
- en: A video that perfectly respects the rose pedal frames in the beginning, then
    incorporates the snowflake video more loosely
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 一个在开始时完美尊重玫瑰花瓣帧的视频，然后更松散地融入雪花视频
- en: There’s no silver bullet that will make Sora work in every use case, but I think
    the Blending tool is especially compelling for a lot of users. I recommend putting
    in some upfront effort to make the videos line up to help Sora out.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 没有银弹可以使Sora在所有用例中都能工作，但我认为混合工具对许多用户来说特别吸引人。我建议投入一些前期努力，使视频对齐，以帮助Sora。
- en: Trick 4) Variable Aspect Ratios, Durations, and Levels of Detail
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 技巧4）可变宽高比、持续时间以及细节级别
- en: Making an AI model that can output a few different aspect ratios and resolutions
    might seem like a trivial detail, but it’s not. Virtually all AI models can accept
    a fixed sized input, and can generate fixed sized output. Data scientists have
    to use a lot of fancy tricks to create the illusion of dynamically sized outputs.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 制作一个可以输出几种不同宽高比和分辨率的AI模型可能看起来是一个微不足道的细节，但事实并非如此。几乎所有的AI模型都可以接受固定大小的输入，并生成固定大小的输出。数据科学家必须使用很多花哨的技巧来创造动态尺寸输出的错觉。
- en: In natural language that’s done with padding. When you submit a query consisting
    of just a few tokens, a special `<pad>` token is used to fill up empty space.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 用自然语言来说，这是通过填充完成的。当您提交一个仅由几个标记组成的查询时，会使用特殊的`<pad>`标记来填充空白空间。
- en: '![](../Images/2a47a2e87fcd4a087ca5e343debe0e45.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2a47a2e87fcd4a087ca5e343debe0e45.png)'
- en: In image and video generation you could probably do something similar. For instance,
    you could make a video generation model that always outputs a long video with
    maximum resolution then, if a user wants a shorter and lower resolution video
    you could surround the generated video with pads.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在图像和视频生成中，你可能可以做一些类似的事情。例如，你可以创建一个视频生成模型，该模型始终输出最大分辨率的长时间视频，然后，如果用户想要更短和更低分辨率的视频，你可以在生成的视频周围添加填充。
- en: '![Imagine an AI model that could generate video of square, horizontal, and
    vertical aspect ratio videos of various sizes and durations. We could just pick
    the size and duration we want (static) and pad our the rest (yellow).](../Images/1655948b655c261020fd8e54f06ca206.png)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![想象一个能够生成各种尺寸和时长、方形、水平以及垂直画幅的视频的AI模型。我们只需选择我们想要的尺寸和时长（静态）然后填充剩余的部分（黄色）](../Images/1655948b655c261020fd8e54f06ca206.png)'
- en: Imagine an AI model that could generate video of square, horizontal, and vertical
    aspect ratio videos of various sizes and durations. We could just pick the size
    and duration we want (static) and pad our the rest (yellow).
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个能够生成各种尺寸和时长、方形、水平以及垂直画幅的视频的AI模型。我们只需选择我们想要的尺寸和时长（静态）然后填充剩余的部分（黄色）。
- en: While this might be possible, I don’t think it’s practical; training a diffusion
    model like this would be incredibly wasteful. One of the major ideas of diffusion
    models is the idea of a "latent diffusion model". Basically, there’s a ludicrous
    amount of data in even a small image, so most modern diffusion models compress
    this data into a smaller representation, the model thinks about that data, then
    it’s decompressed to generate the final image.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这可能可行，但我认为这并不实用；训练这样的扩散模型会非常浪费。扩散模型的一个主要思想是“潜在扩散模型”的概念。基本上，即使是小图像中也有大量的数据，所以大多数现代扩散模型将数据压缩成更小的表示形式，模型思考这些数据，然后将其解压缩以生成最终图像。
- en: '![It''s easy to forget just how much information is in a single image. On modern
    images, you have to zoom in pretty far just to see individual pixels. This image
    alone contains 5,468,400 pixels in total. Considering large models, which cost
    millions of dollars to train, are still measured in the trillions of parameters,
    having a 5.4 billion parameter input seems like a big ask. Also, notice how when
    you zoom into the pixel level there is a vast amount of redundant information
    in the image. From my original article on Sora.](../Images/bd40637197a9d0dfb42e6116a44da4d8.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![很容易忘记单张图像中包含的信息量有多大。在现代图像中，你必须放大很多才能看到单个像素。这张图像本身包含总共5,468,400个像素。考虑到大型模型，其训练成本高达数百万美元，但参数量仍以万亿计，拥有540亿参数的输入似乎要求过高。此外，请注意，当你放大到像素级别时，图像中有大量的冗余信息。来自我的关于Sora的原始文章](../Images/bd40637197a9d0dfb42e6116a44da4d8.png)'
- en: It’s easy to forget just how much information is in a single image. On modern
    images, you have to zoom in pretty far just to see individual pixels. This image
    alone contains 5,468,400 pixels in total. Considering large models, which cost
    millions of dollars to train, are still measured in the trillions of parameters,
    having a 5.4 billion parameter input seems like a big ask. Also, notice how when
    you zoom into the pixel level there is a vast amount of redundant information
    in the image. From [my original article on Sora](https://medium.com/towards-data-science/sora-intuitively-and-exhaustively-explained-a54f83ea9c21).
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易忘记单张图像中包含的信息量有多大。在现代图像中，你必须放大很多才能看到单个像素。这张图像本身包含总共5,468,400个像素。考虑到大型模型，其训练成本高达数百万美元，但参数量仍以万亿计，拥有540亿参数的输入似乎要求过高。此外，请注意，当你放大到像素级别时，图像中有大量的冗余信息。[我的关于Sora的原始文章](https://medium.com/towards-data-science/sora-intuitively-and-exhaustively-explained-a54f83ea9c21)。
- en: '![A latent diffusion model compresses and decompresses the data before and
    after the model. From my original article on Sora.](../Images/901b9c9812c25ee68a0e8254e5bfed81.png)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
  zh: '![潜在扩散模型在模型前后压缩和解压缩数据。来自我的关于Sora的原始文章](../Images/901b9c9812c25ee68a0e8254e5bfed81.png)'
- en: A latent diffusion model compresses and decompresses the data before and after
    the model. From [my original article on Sora](https://medium.com/towards-data-science/sora-intuitively-and-exhaustively-explained-a54f83ea9c21).
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 潜在扩散模型在模型前后压缩和解压缩数据。[我的关于Sora的原始文章](https://medium.com/towards-data-science/sora-intuitively-and-exhaustively-explained-a54f83ea9c21)。
- en: With this approach, we can create a few different compression and decompression
    portions of the model, and train each of those portions for their respective output.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 采用这种方法，我们可以创建模型的不同压缩和解压缩部分，并为各自的输出训练这些部分。
- en: '![The same AI model can be used for various different aspect ratios as long
    as they''re all compressed into a similar format.](../Images/3b3c185ebf7d61b05025f7c2c7509888.png)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![相同的 AI 模型可以用于各种不同的长宽比，只要它们都被压缩成类似格式。](../Images/3b3c185ebf7d61b05025f7c2c7509888.png)'
- en: The same AI model can be used for various different aspect ratios as long as
    they’re all compressed into a similar format.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 只要它们都被压缩成类似格式，相同的 AI 模型可以用于各种不同的长宽比。
- en: Sora has three aspect ratios, three resolutions, and four durations for a total
    of 36 total possible output formats. OpenAI could train an individual decompression
    portion for each of these representations, or they could do countless other fancy
    approaches, who knows.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: Sora 有三种长宽比、三种分辨率和四种时长，总共有 36 种可能的输出格式。OpenAI 可以为每种表示训练一个单独的解压缩部分，或者他们可以采取无数其他花哨的方法，谁知道呢。
- en: 'I’m sure there are about a million other pieces of secret sauce that go into
    making Sora work, but now I’d like to discuss a problem with Sora: people.'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信有大约一百万种其他秘密配方用于使 Sora 运作，但现在我想讨论一个与 Sora 相关的问题：人物。
- en: A Big Problem
  id: totrans-187
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个大问题
- en: The whole world has been very concerned with deep fakes lately, and rightfully
    so. Deep fakes are AI generated content which is specifically designed to imitate
    a person for embarrassing, incriminating, or exploitative purposes. As a result,
    OpenAI has put some serious guard rails around generating content with people
    in it.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，全世界都非常关注深度伪造，这是有道理的。深度伪造是专门设计来模仿人物以用于尴尬、指控或剥削目的的 AI 生成内容。因此，OpenAI 在生成包含人物的內容方面设置了一些严肃的护栏。
- en: I wanted the intro video of this article to be a slideshow of realistic people’s
    faces from a variety of demographics. The plan was to generate a few images in
    MidJourney (my image generation model of choice), then create a timeline of transitions
    to construct a video.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这篇文章的介绍视频是一系列来自不同人群的逼真人物面孔的幻灯片。计划是在 MidJourney（我选择的图像生成模型）中生成一些图像，然后创建一个时间线来构建视频。
- en: '![What I was going for](../Images/8cfce14874daa446a865f90eb20f6f1a.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![我所追求的](../Images/8cfce14874daa446a865f90eb20f6f1a.png)'
- en: What I was going for
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 我所追求的
- en: However, I was met with the following response.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我遇到了以下回应。
- en: '![Apparently, you can''t generate videos with content that contains people.](../Images/1d979977b871d07f37cd5453fe9b6474.png)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![显然，您无法生成包含人物的视频。](../Images/1d979977b871d07f37cd5453fe9b6474.png)'
- en: Apparently, you can’t generate videos with content that contains people.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，您无法生成包含人物的视频内容。
- en: As you may have been able to glean from reading this article, Sora is incredibly
    powerful, but it’s also somewhat cumbersome and limited. I really think Sora’s
    power is in its ability to apply new and interesting techniques to real video
    or VFXs. I can imagine Sora adjusting lighting, creating interesting transitions,
    and all sorts of other interesting applications. However, if you can’t use Sora
    to edit video containing people (which is most of the video humans care about)
    then who cares?
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 如您通过阅读这篇文章可能已经了解到的，Sora 非常强大，但同时也有些笨拙和有限。我真心认为 Sora 的强大之处在于其将新且有趣的技巧应用于真实视频或
    VFX 的能力。我可以想象 Sora 调整灯光、创建有趣的过渡，以及各种其他有趣的应用。然而，如果您不能使用 Sora 编辑包含人物的视频（这是人类关心的大多数视频），那么谁会在乎呢？
- en: You can get Sora can generate video of people just fine, and as far as I can
    tell once they’re generated you can use them just like any other video, but the
    inability to use videos of real people seriously inhibits certain use cases.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用 Sora 生成人物的视频，据我所知，一旦生成，您就可以像使用任何其他视频一样使用它们，但无法使用真实人物的视频严重限制了某些用例。
- en: '![Two videos I generated in an attempt to create the cover video](../Images/7103c37fa801213d4aa5d5c327297bf6.png)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![我尝试创建封面视频时生成的两个视频](../Images/7103c37fa801213d4aa5d5c327297bf6.png)'
- en: Two videos I generated in an attempt to create the cover video
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试创建封面视频时生成的两个视频
- en: '![A generated video which blends the two videos above. By the way, the implications
    of a white man creating a video of a black woman smiling under the title "faces
    of diversity" are not lost on me. The human face is a subtle and complex communication
    tool which simultaneously says "this is who I am" and "this is how I feel". Using
    Sora, I feel, comes with a responsibility to be conscious and respectful of that
    fact.](../Images/134c933afa0f8787884f4835afb86f32.png)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![融合上述两个视频生成的视频。顺便说一句，一个白人男子在标题为“多元面孔”下制作一个黑人女性微笑的视频的含义并没有逃过我的眼睛。人脸是一种微妙而复杂的交流工具，它同时传达“这是我”和“我这样感受”的信息。使用Sora，我觉得，意味着有责任意识到并尊重这一事实。](../Images/134c933afa0f8787884f4835afb86f32.png)'
- en: A generated video which blends the two videos above. By the way, the implications
    of a white man creating a video of a black woman smiling under the title "faces
    of diversity" are not lost on me. The human face is a subtle and complex communication
    tool which simultaneously says "this is who I am" and "this is how I feel". Using
    Sora, I feel, comes with a responsibility to be conscious and respectful of that
    fact.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 一个融合上述两个视频生成的视频。顺便说一句，一个白人男子在标题为“多元面孔”下制作一个黑人女性微笑的视频的含义并没有逃过我的眼睛。人脸是一种微妙而复杂的交流工具，它同时传达“这是我”和“我这样感受”的信息。使用Sora，我觉得，意味着有责任意识到并尊重这一事实。
- en: OpenAI is in a bit of a sticky situation. On one hand the most dangerous use
    of Sora is in editing video of people, and on the other hand the most compelling
    use of Sora is in editing video of people. Right now, it seems like they’re dealing
    with this problem by only allowing certain parties to upload content containing
    humans.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI目前处于一个有些棘手的境地。一方面，Sora最危险的使用是在编辑人的视频，另一方面，Sora最吸引人的使用也是在编辑人的视频。目前看来，他们似乎是通过只允许某些方上传包含人类内容的视频来处理这个问题。
- en: Conclusion
  id: totrans-202
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article we discussed Sora, both in terms of its core functionality and
    the theory behind it. First, we took a tour of Sora and explored some of its core
    functionality, then we explored how that functionality might be implemented. We
    also discussed some of the practical difficulties one might face when using Sora,
    some of the ethical concerns it raises, and some of its current limitations.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们讨论了Sora，既包括其核心功能，也包括其背后的理论。首先，我们游览了Sora并探索了一些其核心功能，然后我们探讨了这些功能可能如何实现。我们还讨论了在使用Sora时可能会遇到的一些实际困难，它引发的一些伦理问题，以及它的一些当前限制。
- en: If you’re interested in exploring Sora from a more conceptual prospective, check
