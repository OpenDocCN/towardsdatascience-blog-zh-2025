- en: Do You Really Need GraphRAG? A Practitioner’s Guide Beyond the Hype
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你真的需要GraphRAG吗？超越炒作的实践指南
- en: 原文：[https://towardsdatascience.com/do-you-really-need-graphrag-a-practitioners-guide-beyond-the-hype/](https://towardsdatascience.com/do-you-really-need-graphrag-a-practitioners-guide-beyond-the-hype/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/do-you-really-need-graphrag-a-practitioners-guide-beyond-the-hype/](https://towardsdatascience.com/do-you-really-need-graphrag-a-practitioners-guide-beyond-the-hype/)
- en: '<mdspan datatext="el1762807196428" class="mdspan-comment">GraphRAG has been</mdspan>
    a topic of much interest since it was introduced by Microsoft in early 2024\.
    While most of the content online focuses on the technical implementation, from
    a practitioner’s perspective, it would be worthwhile to explore when the incremental
    value of GraphRAG over naïve RAG would justify the additional architectural complexity
    and investment. So here, I will attempt to answer the following questions crucial
    for a scalable and robust GraphRAG design:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762807196428" class="mdspan-comment">GraphRAG自从2024年初由微软引入以来，一直是一个备受关注的话题。虽然网上大部分内容都集中在技术实现上，但从实践者的角度来看，探讨GraphRAG相对于朴素RAG的增量价值何时足以证明额外的架构复杂性和投资是很有价值的。因此，在这里，我将尝试回答以下对于可扩展和健壮的GraphRAG设计至关重要的几个问题：
- en: When is GraphRAG needed? What factors would help you decide?
  id: totrans-3
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 何时需要GraphRAG？哪些因素会帮助你做出决定？
- en: If you decide to implement GraphRAG, what design principles should you keep
    in mind to balance complexity and value?
  id: totrans-4
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你决定实现GraphRAG，你应该牢记哪些设计原则来平衡复杂性和价值？
- en: Once you have implemented GraphRAG, will you be able to answer any and all questions
    about your document store with equal accuracy? Or are there limits you should
    be aware of and implement methods to overcome them wherever feasible?
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦你实现了GraphRAG，你能否以相同的准确性回答关于你的文档存储的任何问题？或者，你是否应该意识到某些限制并实施方法来克服它们，只要可能的话？
- en: GraphRAG vs Naïve RAG Pipeline
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GraphRAG与朴素RAG的管道比较
- en: '*In this article, all figures are drawn by me, images generated using Copilot
    and documents (for graph) generated using ChatGPT.*'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '*在这篇文章中，所有图表都是我绘制的，图像使用Copilot生成，文档（对于图）使用ChatGPT生成。*'
- en: 'A typical naïve RAG pipeline would look as follows:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 一个典型的朴素RAG管道看起来如下所示：
- en: '![](../Images/603bfa673f979fc78d98cfa1c5d8e629.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/603bfa673f979fc78d98cfa1c5d8e629.png)'
- en: Embedding and Retrieval for naive RAG
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 朴素RAG的嵌入和检索
- en: In contrast, a GraphRAG embedding pipeline would be as the following. The retrieval
    and response generation steps would be discussed in a later section.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，GraphRAG嵌入管道如下。检索和响应生成步骤将在稍后章节讨论。
- en: '![](../Images/e796ce9b6059740c635db0567e909e0a.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e796ce9b6059740c635db0567e909e0a.png)'
- en: Embedding pipeline for GraphRAG
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: GraphRAG的嵌入管道
- en: 'While there can be variations of how the GraphRAG pipeline is built and the
    context retrieval is done for response generation, the key differences with naïve
    RAG can be summarised as follows:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然GraphRAG管道的构建方式和响应生成中的上下文检索可能会有所不同，但与朴素RAG的关键差异可以总结如下：
- en: During data preparation, documents are parsed to extract entities and relations,
    then stored in a graph
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在数据准备期间，文档被解析以提取实体和关系，然后存储在图中
- en: Optionally, but preferably, embed the node values and relations using an embedding
    model and store for semantic matching
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可选的，但最好是，使用嵌入模型和存储来嵌入节点值和关系，以进行语义匹配
- en: Finally, the documents are chunked, embedded and indexes stored for similarity
    retrieval. This step is common with naïve RAG.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，文档被分块、嵌入，并存储索引以进行相似性检索。这一步骤与朴素RAG是通用的。
- en: When is GraphRAG needed?
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 何时需要GraphRAG？
- en: Consider the case of a search assistant for Law Enforcement, with the corpus
    being investigation reports filed over the years in voluminous documents. Each
    report has a Report ID mentioned at the top of the first page of the document.
    The rest of the document describes the persons involved and their roles (accused,
    victims, witnesses, enforcement personnel etc), applicable legal provisions, incident
    description, witness statements, assets seized etc.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个执法部门的搜索助手案例，其语料库是多年来提交的大量文档中的调查报告。每份报告在文档第一页顶部都提到了报告ID。文档的其余部分描述了涉及的人员及其角色（被告、受害者、证人、执法人员等）、适用的法律条款、事件描述、证人陈述、查获的资产等。
- en: Although I shall be focusing on the Design principle here, for technical implementation,
    I used *Neo4j* as the Graph database, *GPT-4o* for entity and relations extraction,
    reasoning and response and *text-embedding-3-small* for embeddings.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我将在这里关注设计原则，但在技术实现上，我使用了*Neo4j*作为图数据库，*GPT-4o*进行实体和关系提取、推理和响应，以及*text-embedding-3-small*进行嵌入。
- en: 'The following factors should be taken into account for deciding if GraphRAG
    is needed:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在决定是否需要GraphRAG时，应考虑以下因素：
- en: Long Documents
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 长文档
- en: A naive RAG would lose context or relationships between data points due to the
    chunking process. So a query such as “*What is the Report ID where car no. PYT1234
    was involved?*” is not likely to give the right answer if the car no. is not located
    in the same chunk as the Report ID, and in this case, the Report ID would be located
    in the first chunk. Therefore, if you **have long documents with lots of entities
    (people, places, institutions, asset identifiers etc)** spread across the pages
    and would like to query for relations between them, consider GraphRAG.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的RAG会因为分块过程而丢失数据点之间的上下文或关系。因此，如果汽车编号没有位于与报告ID相同的块中，那么查询“*哪个报告ID涉及了汽车编号PYT1234？*”不太可能给出正确答案，在这种情况下，报告ID将位于第一个块中。因此，如果你**有包含大量实体（人物、地点、机构、资产标识符等）的文档，并且希望查询它们之间的关系**，请考虑使用GraphRAG。
- en: Cross-Document Context
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 跨文档上下文
- en: 'A naïve RAG cannot connect information across multiple documents. If your queries
    require cross-linking of entities across documents, or aggregations over the entire
    corpus, you will need GraphRAG. For instance, queries such as:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 简单的RAG无法连接多文档中的信息。如果你的查询需要跨文档连接实体或在整个语料库上进行聚合，你需要GraphRAG。例如，查询如下：
- en: '*“How many burglary reports are from Mumbai?”*'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '*“有多少起盗窃报告来自孟买？”*'
- en: '*“Are there individuals accused in multiple cases? What are the relevant Report
    IDs?”*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '*“有个人在多个案件中受到指控吗？相关的报告ID是什么？”*'
- en: '*“Tell me details of cases related to Bank ABC*”'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '*“告诉我与ABC银行相关的案例的详细信息”*'
- en: These kinds of analytics-based queries are expected in a corpus of related documents,
    and enable identification of patterns across unrelated events. Another example
    could be a hospital management system where given a set of symptoms, the application
    should respond with similar previous patient cases and the lines of treatment
    adopted.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这类基于分析的查询在相关文档语料库中是预期的，并能够识别无关事件之间的模式。另一个例子可以是医院管理系统，给定一组症状，应用应该响应与之前患者案例和采用的疗法相似的情况。
- en: Given that most real-world applications require this capability, are there applications
    where GraphRAG would be an overkill and naive RAG is good enough? Possibly, such
    as for datasets such as company HR policies, where each document deals with a
    distinct topic (vacation, payroll, health insurance etc.) and the structure of
    the content is such that entities and their relations, along with cross-document
    linkages are usually not the focus of queries.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到大多数实际应用都需要这种能力，是否存在GraphRAG过度且简单的RAG就足够好的应用场景？可能存在，例如对于公司人力资源政策等数据集，每个文档都处理一个独特的话题（休假、工资、健康保险等），内容结构使得实体及其关系以及跨文档链接通常不是查询的重点。
- en: Search Space Optimization
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 搜索空间优化
- en: While the above capabilities of GraphRAG are generally known, what is less evident
    is that it is an **excellent filter** through which the search space for a query
    can be narrowed down to the most relevant documents. This is extremely important
    for a large corpus consisting of thousands or millions of documents. A vector
    cosine similarity search would simply lose granularity as the number of chunks
    increase, thereby degrading the quality of chunks selected for a query context.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然GraphRAG的上述功能通常是众所周知的，但不太明显的是，它是一个**出色的过滤器**，可以通过它将查询的搜索空间缩小到最相关的文档。这对于包含数千或数百万文档的大型语料库来说非常重要。随着块数量的增加，向量余弦相似度搜索将简单地失去粒度，从而降低查询上下文中选择的块的质量。
- en: This is not hard to visualize, since geometrically speaking, a normalised unit
    vector representing a chunk is just a dot on the surface of a N dimensional sphere
    (N being the number of dimensions generated by the embedding model), and as more
    and more dots are packed into the area, they overlap with each other and become
    dense, to the point that it is hard to distinguish any one dot from its neighbors
    when a cosine match is calculated for a given query.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不难可视化，从几何学的角度来看，代表一个块的标准化的单位向量只是一个N维球面上的点（N是嵌入模型生成的维度数），随着越来越多的点被压缩到该区域，它们会相互重叠并变得密集，以至于在计算给定查询的余弦匹配时，很难区分任何一个点与其邻居。
- en: '![](../Images/c3f105d6d6ca08a473d1e32feac1a3e6.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c3f105d6d6ca08a473d1e32feac1a3e6.png)'
- en: Dense embedding distribution of normalised unit vectors
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 标准化单位向量的密集嵌入分布
- en: Explainability
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可解释性
- en: This is a corollary to the dense embedding search space. It is not easily explained
    why certain chunks are matched to the query and not another, as semantic matching
    accuracy using cosine similarity reaches a threshold, beyond which techniques
    such as prompt enrichment of the query before matching will stop improving the
    quality of chunks retrieved for context.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这是密集嵌入搜索空间的推论。为什么某些块与查询匹配而不是其他块，这一点并不容易解释，因为使用余弦相似度进行语义匹配的准确性达到阈值后，在匹配之前查询提示的丰富技术将停止提高检索到的块的质量。
- en: GraphRAG Design principles
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GraphRAG 设计原则
- en: 'For a practical solution balancing complexity, effort and cost, the following
    principles should be considered while designing the Graph:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 为了平衡复杂性、努力和成本，在设计图时应该考虑以下原则：
- en: What nodes and relations should you extract?
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应该提取哪些节点和关系？
- en: It is tempting to send the full document to the LLM and ask it to extract all
    entities and their relations. Indeed, it will try to do this if you invoke ‘*LLMGraphTransformer’*
    of Neo4j without a custom prompt. However, for a large document (10+ pages), this
    query will take a very long time and the result will also be sub-optimal due to
    the complexity of the task. And when you have thousands of documents to process,
    this approach will not work. Instead, focus on the most important entities and
    relations that will be frequently referred to in queries. And create a star graph
    connecting all these entities to the central node (which is the Report ID for
    the Crime database, could be patient id for a hospital application and so on).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 将整个文档发送给LLM并要求它提取所有实体及其关系是很诱人的。确实，如果你在Neo4j中调用‘*LLMGraphTransformer’*而没有自定义提示，它将尝试这样做。然而，对于大型文档（10页以上），这个查询将花费很长时间，并且由于任务的复杂性，结果也可能不是最优的。当你有数千个文档要处理时，这种方法将不起作用。相反，关注那些在查询中将被频繁引用的最重要实体和关系，并创建一个星形图，将这些实体连接到中心节点（对于犯罪数据库，可能是患者ID，对于医院应用程序等）。
- en: For instance, for the Crime Reports data, the relation of the person to the
    Report ID is important (accused, witness etc), whereas whether two people belong
    to the same family perhaps less so. However, for a genealogy search, familial
    relation is the core reason for building the application .
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，对于犯罪报告数据，人与报告ID的关系很重要（嫌疑人、证人等），而两个人是否属于同一个家庭可能不那么重要。然而，对于家谱搜索，家族关系是构建应用程序的核心原因。
- en: Mathematically also, it is easy to see why a star graph is a better approach.
    A document with K entities can have potentially ***^K******C[2]**** relations*,
    assuming there exists only one type of relation between two entities. For a document
    with 20 entities, that would mean 190 relations. On the other hand, a star graph
    connecting 19 of the nodes to 1 key node would mean 19 relations, a 90% reduction
    in complexity.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 从数学上讲，也容易看出为什么星形图是一个更好的方法。一个包含K个实体的文档可能具有潜在的 ***^K******C[2]**** 关系*，假设两个实体之间只存在一种关系。对于一个包含20个实体的文档，这意味着190个关系。另一方面，将19个节点连接到1个关键节点的星形图将意味着19个关系，复杂度降低了90%。
- en: With this approach, I extracted persons, places, vehicle plate numbers, amounts
    and institution names only (but not legal section ids or assets seized) and connected
    them to the Report ID.  A graph of 10 Case reports looks like the following and
    takes only a couple of minutes to generate.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 采用这种方法，我只提取了人员、地点、车牌号码、金额和机构名称（但不包括法律部门ID或被没收的资产），并将它们与报告ID连接起来。10个案例报告的图看起来如下，并且只需要几分钟就能生成。
- en: '![](../Images/09bd6859e7a8931b554c835fa1dd1a3e.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/09bd6859e7a8931b554c835fa1dd1a3e.png)'
- en: Star Clusters of the Crime Reports data
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 犯罪报告数据的星系群
- en: Adopt complexity iteratively
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 逐步采用复杂性
- en: In the first phase (or MVP) of the project, focus on the most high-value and
    frequent queries. And build the graph for entities and relations in those. This
    should suffice ~70-80% of the search requirements. For the remaining, you can
    enhance the graph in subsequent iterations, find additional nodes and relations
    and merge with the existing graph cluster. A caveat to this is that as new data
    keeps getting generated (new cases, new patients etc), these documents have to
    be parsed for all the entities and relations in one go. For instance, in a 20
    entity graph cluster, the minimal star cluster has 19 relations and 1 key node.
    And assume in the next iteration, you add assets seized, and create 5 additional
    nodes and say, 15 more relations. However, if this document had come as a new
    document, you would need to create 25 entities and 34 relations between them in
    one extraction job.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在项目的第一个阶段（或 MVP）中，关注最有价值和最频繁的查询。并为这些实体和关系构建图。这应该能满足 ~70-80% 的搜索需求。对于剩余的，你可以在后续迭代中增强图，找到额外的节点和关系，并与现有图集群合并。需要注意的是，随着新数据的不断生成（新案例、新病人等），这些文档必须一次性解析所有实体和关系。例如，在一个20个实体的图集群中，最小的星形集群有19个关系和1个关键节点。假设在下一个迭代中，你添加了被没收的资产，并创建了5个额外的节点和15个额外的关系。然而，如果这份文档作为新文档出现，你将需要在一次提取作业中创建25个实体和它们之间34个关系。
- en: Use the graph for classification and context, not for user responses directly
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用图进行分类和上下文，而不是直接用于用户响应
- en: 'There could be a few variations to the Retrieval and Augmentation pipeline,
    depending on whether/how you use the semantic matching of graph nodes and elements,
    and after some experimentation, I developed the following:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 根据是否以及如何使用图节点和元素的语义匹配，检索和增强管道可能会有一些变化。经过一些实验，我开发了以下方法：
- en: '![](../Images/9ba9f21638957b14821caa2ac406960f.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9ba9f21638957b14821caa2ac406960f.png)'
- en: Retrieval and Augmentation pipeline for GraphRAG
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: GraphRAG 的检索和增强管道
- en: 'The steps are as below:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 步骤如下：
- en: 'The user query is used to retrieve the relevant nodes and relations from the
    graph. This happens in two steps. First, the LLM composes a Neo4j cypher query
    from the given user query. If the query succeeds, we have an exact match of the
    criteria given in the user query. For example: In the graph I created, a query
    like “*How many reports are there from Mumbai?*” will get an exact hit, since
    in my data, Mumbai is connected to multiple Report clusters'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户查询用于从图中检索相关的节点和关系。这分为两个步骤。首先，LLM 从给定的用户查询中构建一个 Neo4j cypher 查询。如果查询成功，我们将得到用户查询中给出的标准的精确匹配。例如：在我创建的图中，一个像“*从孟买有多少份报告？*”的查询将得到精确匹配，因为在我的数据中，孟买与多个报告集群相连。
- en: If the cypher does not yield any records, the query would fallback to matching
    semantically to the graph node values and relations and find the most similar
    matches. This is useful in case the query is like “*How many reports are there
    from Bombay?*”, which will result in getting the Report IDs related to Mumbai,
    which is the correct result. However, the semantic matching needs to be carefully
    controlled, and can result in false positives, which I shall explain more in the
    next section.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 cypher 没有返回任何记录，查询将回退到与图节点值和关系进行语义匹配，以找到最相似的匹配。这在查询类似于“*从孟买有多少份报告？*”的情况下很有用，这将导致得到与孟买相关的报告
    ID，这是正确的结果。然而，语义匹配需要仔细控制，可能会导致假阳性，我将在下一节中进一步解释。
- en: 'Note that in both of the above methods we try to extract the full cluster around
    the Report ID connected to the query node so we can give as much accurate context
    as possible to the chunk retrieval step. The logic is as follows:'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意，在上述两种方法中，我们都试图提取与查询节点相连的 Report ID 的完整集群，以便在片段检索步骤中尽可能提供准确的上下文。逻辑如下：
- en: 'If the user query is asking about a report with its Id (*eg: tell me details
    about report SYN-REP-1234*), we get the entities connected to the Id (people,
    persons, institutions etc). So while this query on its own rarely gets the right
    chunks (since LLMs do not attach any meaning to alphanumeric strings like the
    report ID), with the additional context of people, persons attached to it, along
    with the report ID, we can get the exact document chunks where these appear.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果用户查询是关于具有其 ID 的报告（例如：告诉我关于报告 SYN-REP-1234 的详细信息*），我们获取与该 ID 相连的实体（人、人员、机构等）。因此，虽然这个查询本身很少得到正确的片段（因为
    LLM 不会将任何意义附加到像报告 ID 这样的字母数字字符串），但有了附加的人、人员以及报告 ID 的上下文，我们就可以得到这些片段的确切文档。
- en: If the user query is like “*Tell me about the incident where car no. PYT1234
    was involved?*”, we get the Report ID(s) from the graph where this car no. is
    attached first, then for that Report ID, we get all the entities in that cluster,
    again providing the full context for chunk retrieval.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果用户查询是“*告诉我关于汽车编号PYT1234参与的事故？*”，我们首先从图中获取该汽车编号所附着的报告ID，然后针对该报告ID，我们获取该簇中的所有实体，再次为片段检索提供完整的上下文。
- en: The graph result derived from steps 1 or 2 is then provided to the LLM as context
    along with the user query to formulate an answer in natural language instead of
    the JSON generated by the cypher query or the node -> relation -> node format
    of the semantic match. In cases where the user query is asking for aggregated
    metrics or connected entities only (like Report IDs connected to a car), the LLM
    output usually is a good enough response to the user query at this stage. However,
    we retain this as an intermediate result called Graph context.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从步骤1或2得到的图结果随后作为上下文与用户查询一起提供给LLM，以用自然语言而不是由Cypher查询生成的JSON或语义匹配的节点->关系->节点格式来制定答案。在用户查询仅询问聚合指标或连接实体（如与汽车相连的报告ID）的情况下，LLM输出通常足以作为此阶段的用户查询响应。然而，我们将此保留为一个名为图上下文的中间结果。
- en: Next the Graph context along with the user query is used to query the chunk
    embeddings and the closest chunks are extracted.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来，使用图上下文和用户查询来查询片段嵌入，并提取最接近的片段。
- en: We combine the Graph context with the chunks retrieved for a full Combined Context,
    which we provide to the LLM to synthesize the final response to the user query.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们将图上下文与检索到的片段结合起来，形成一个完整的组合上下文，并将其提供给LLM以综合生成对用户查询的最终响应。
- en: Note that in the above approach, we use the Graph as a **classifier**, to narrow
    the search space for the user query and find the relevant document clusters quickly,
    then use that as the context for chunk retrievals. This enables efficient and
    accurate retrievals from a large corpus, while at the same time providing the
    cross-entity and cross-document linkage capabilities that are native to a Graph
    database.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在上面的方法中，我们使用图作为**分类器**，以缩小用户查询的搜索空间，并快速找到相关的文档簇，然后将其作为片段检索的上下文。这使我们可以从大量语料库中高效且准确地检索，同时提供图数据库固有的跨实体和跨文档链接能力。
- en: Challenges and Limitations
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 挑战和局限性
- en: 'As with any architecture, there are constraints which become evident when put
    into practice. Some have been discussed above, like designing the graph balancing
    complexity and cost. A few others to be aware of are follows:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 与任何架构一样，当付诸实践时，都会有一些限制变得明显。其中一些已经在上面讨论过，比如设计平衡复杂性和成本的图。还有一些其他需要注意的，如下所述：
- en: As mentioned in the previous section, semantic retrieval of Graph nodes and
    relations can sometimes cause unpredictable results. Consider the case where you
    query for an entity that has not been extracted into the graph clusters. First
    the exact cypher match fails, which is expected, however, the fallback semantic
    match will anyway retrieve what it thinks are similar matches, although they are
    irrelevant to your query. This has the unexpected effect of creating an incorrect
    graph context, thereby retrieving incorrect document chunks and a response that
    is factually wrong. This behavior is worse than the RAG replying as *‘I don’t
    know*‘ and needs to be firmly controlled by detailed negative prompting of the
    LLM while generating the Graph context, such that the LLM outputs ‘No record’
    in such cases.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如前文所述，图节点和关系的语义检索有时会导致不可预测的结果。考虑这样一个案例，当你查询一个尚未提取到图簇中的实体时。首先，精确的Cypher匹配失败，这是预期的，然而，回退的语义匹配仍然会检索出它认为相似的匹配项，尽管它们与你的查询无关。这会产生一个不正确的图上下文，从而检索出错误的文档片段和事实错误的响应。这种行为比RAG回复“我不知道”更糟糕，需要在生成图上下文时通过详细的负面提示来严格控制LLM，使得LLM在这种情况下输出“无记录”。
- en: 'Extracting all entities and relations in a single pass of the entire document,
    while building the graph with the LLM will usually miss several of them due to
    *attention drop*, even with detailed prompt tuning. This is because LLMs lose
    recall when documents exceed a certain length. To mitigate this, it is best to
    adopt a chunking-based entity extraction strategy as follows:'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在使用LLM构建图的同时，从整个文档的单次遍历中提取所有实体和关系，通常会因为**注意力下降**而错过其中的一些，即使经过详细的提示调整也是如此。这是因为当文档超过一定长度时，LLM会失去召回能力。为了减轻这一点，最好采用基于片段的实体提取策略，如下所述：
- en: First, extract the Report ID once.
  id: totrans-67
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，提取一次报告ID。
- en: Then split the document into chunks
  id: totrans-68
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后将文档分割成块
- en: Extract entities from chunk-by-chunk and because we are creating a star graph,
    attach the extracted entities to the Report ID
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分块提取实体，因为我们正在创建星型图，所以将提取的实体附加到报告ID上。
- en: This is another reason why a star graph is a good starting point for building
    a graph.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么星型图是构建图的一个好起点。
- en: '**Deduplication and normalization**: It is important to deduplicate names before
    inserting into the graph, so common entity linkages across multiple Report clusters
    are correctly created. For instance; Officer Johnson and Inspector Johnson should
    be normalized to Johnson before inserting into the graph.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**去重和标准化**：在将名称插入到图中之前进行去重非常重要，这样可以在多个报告集群之间正确创建常见的实体链接。例如；警官约翰逊和检查员约翰逊在插入到图中之前应该被标准化为约翰逊。'
- en: Even more important is *normalization of amounts* if you wish to run queries
    like “*How many reports of fraud are there for amounts between 100,000 and 1 Million?*”.
    For which the LLM will correctly create a cypher like (amount > 100000 and amount
    < 1000000). However, the entities extracted from the document into the graph cluster
    are typically strings like ‘5 Million’, if that is how it is present in the document.
    Therefore, these must be normalized to numerical values before inserting.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想运行像“*在10万到100万之间的欺诈报告有多少？*”这样的查询，那么*数量的标准化*就更加重要了。对于这个查询，LLM会正确地创建一个如(amount
    > 100000 and amount < 1000000)的Cypher查询。然而，从文档中提取到图集群中的实体通常是像‘5百万’这样的字符串，如果它在文档中是这样呈现的。因此，在插入之前，这些必须被标准化为数值。
- en: The nodes should have the document name as a property so the grounding information
    can be provided in the result.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 节点应该有一个文档名称属性，以便在结果中提供基础信息。
- en: Graph databases, such as Neo4j, provide an elegant, low-code way to construct,
    embed and retrieve information from a graph. But there are instances where the
    behavior is odd and inexplicable. For instance, during retrieval for some types
    of query, where multiple report clusters are expected in the result, a perfectly
    formed cypher query is formed by the LLM. This cypher fetches multiple record
    clusters when run in Neo4j browser correctly, however, it will only fetch one
    when running in the pipeline.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图数据库，例如Neo4j，提供了一种优雅、低代码的方式来构建、嵌入和从图中检索信息。但是，在某些情况下，行为可能异常且难以解释。例如，在执行某些类型的查询时，预期结果中会有多个报告集群，LLM会形成一个完美的Cypher查询。当在Neo4j浏览器中运行时，这个Cypher查询可以正确地检索多个记录集群，然而，在管道中运行时，它只会检索一个。
- en: Conclusion
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Ultimately, a graph that represents each entity and all relations present in
    the document precisely and in detail, such that it is able to answer any and all
    queries of the user with equally great accuracy is quite likely a goal too expensive
    to build and maintain. Striking the right balance between complexity, time and
    cost will be a critical success factor in a GraphRAG project.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，一个精确且详细地表示文档中每个实体及其所有关系的图，能够以相同的准确性回答用户的所有查询，这很可能是一个过于昂贵以至于难以构建和维护的目标。在GraphRAG项目中，在复杂性、时间和成本之间找到正确的平衡将是关键成功因素。
- en: It should also be kept in mind that while RAG is for extracting insights from
    unstructured text, the complete profile of an entity is typically spread across
    structured (relational) databases too. For instance, a person’s address, phone
    number, and other details may be present in an enterprise database or even an
    ERP. Getting a full, detailed profile of an event may require using LLMs to inquire
    such databases using MCP agents and combine that information with RAG. But that’s
    a topic for another article.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 还应该记住，虽然RAG用于从非结构化文本中提取见解，但实体的完整配置文件通常也分布在结构化（关系）数据库中。例如，一个人的地址、电话号码和其他细节可能存在于企业数据库或ERP中。获取一个事件的完整详细配置文件可能需要使用LLM通过MCP代理查询这些数据库，并将这些信息与RAG结合。但这将是另一篇文章的主题。
- en: What’s Next
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来是什么
- en: While I focussed on the architecture and design aspects of GraphRAG in this
    article, I intend to address the technical implementation in the next one. It
    will include prompts, key code snippets and illustrations of the pipeline workings,
    results and limitations mentioned.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我在这篇文章中关注了GraphRAG的架构和设计方面，但我打算在下一篇文章中解决技术实现。它将包括提示、关键代码片段以及管道工作、结果和局限性的说明。
- en: It is worthwhile to think of extending the GraphRAG pipeline to include multimodal
    information (images, tables, figures) also for a complete user experience. Refer
    my article on building a true [Multimodal RAG](https://towardsdatascience.com/building-a-multimodal-rag-with-text-images-tables-from-sources-in-response/)
     that returns images also along with text.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑将 GraphRAG 管道扩展以包含多模态信息（图像、表格、图表），以实现完整的用户体验是值得的。请参阅我关于构建真正的 [多模态 RAG](https://towardsdatascience.com/building-a-multimodal-rag-with-text-images-tables-from-sources-in-response/)
    的文章，该文章不仅返回文本，还返回图像。
