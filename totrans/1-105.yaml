  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '*在 [www.linkedin.com/in/partha-sarkar-lets-talk-AI](http://www.linkedin.com/in/partha-sarkar-lets-talk-AI)
    上与我联系并分享您的评论*'
