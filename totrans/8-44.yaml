- en: 'Linear Programming: Auxiliary Variables'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 线性规划：辅助变量
- en: 原文：[https://towardsdatascience.com/linear-programming-auxiliary-variables-c66bb66c6aee/](https://towardsdatascience.com/linear-programming-auxiliary-variables-c66bb66c6aee/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/linear-programming-auxiliary-variables-c66bb66c6aee/](https://towardsdatascience.com/linear-programming-auxiliary-variables-c66bb66c6aee/)
- en: '![image from pexels.com by Pixababy](../Images/b81956ee75c75fa498146745f1fad517.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![来自pexels.com的Pixababy图片](../Images/b81956ee75c75fa498146745f1fad517.png)'
- en: image from pexels.com by Pixababy
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 来自pexels.com的Pixababy图片
- en: Auxiliary variables seem to be a topic that is often quickly rushed over in
    a lot of linear programming material. I think they are fascinating and quite powerful.
    Because of this, I decided to dedicate a short article to explaining and demonstrating
    how auxiliary variables are often used in linear programming.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 辅助变量似乎是在许多线性规划材料中经常被快速跳过的主题。我认为它们非常有趣且相当强大。因此，我决定写一篇简短的文章来解释和演示辅助变量在线性规划中通常是如何使用的。
- en: 'Before we dive into auxiliary variables – I wanted to mention that this is
    the fifth part in a series I’m writing on linear programming (LP). To check out
    the other LP topics I’ve covered, use the link below:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨辅助变量之前——我想提到这是我在线性规划（LP）上撰写的一系列文章的第五部分。要查看我已涵盖的其他LP主题，请使用下面的链接：
- en: '[**Linear Programming**](https://medium.com/@jarom.hulet/list/fe5c1fba2583)'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**线性规划**](https://medium.com/@jarom.hulet/list/fe5c1fba2583)'
- en: First of all, let’s address the question – what is an *auxiliary variable*?
    My definition of an auxiliary variable(in the context of LP) is ‘additional variables
    that are added to a linear programming problem, that allow the use of logic that
    otherwise would not be possible.’
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们来回答这个问题——什么是*辅助变量*？我在线性规划（LP）中的辅助变量定义是“添加到线性规划问题中的额外变量，允许使用否则不可能的逻辑。”
- en: 'Auxiliary Variable: Additional variables that are added to a linear programming
    problem that allow the use of logic that otherwise would not be possible.'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 辅助变量：添加到线性规划问题中的额外变量，允许使用否则不可能的逻辑。
- en: Generally, auxiliary variables are used in clever ways to formulate non-linear
    relationships (typically a violation of the rules of linear programming) in the
    objective function and constraints in a way that still works for linear programming.
    In other words, they allow for linearization of functions that would be non-linear
    without them. Since there are multiple ways to use auxiliary variables, in this
    article, we’ll go over the most common ways I’ve seen. My goal is for you to have
    a good intuition on what auxiliary variables do and how you can use them in linear
    programming. The rest of the article will go through specific applications of
    auxiliary variables with detailed examples for each application. Note that this
    is not meant to be an exhaustive representation of how auxiliary variables are
    used in linear programming. It is meant to demonstrate some of the most common
    ways they are used.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，辅助变量以巧妙的方式用于构建目标函数和约束中的非线性关系（通常是违反线性规划规则），同时仍然适用于线性规划。换句话说，它们允许线性化没有它们将是非线性的函数。由于有多种使用辅助变量的方式，在这篇文章中，我们将讨论我见过的最常见的方法。我的目标是让你对辅助变量做什么以及如何在线性规划中使用它们有一个良好的直觉。文章的其余部分将详细介绍辅助变量的具体应用，并为每个应用提供详细的示例。请注意，这并不是对辅助变量在线性规划中使用的详尽描述。它的目的是展示它们最常用的几种方式。
- en: Creating Piecewise Linear Functions
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建分段线性函数
- en: The jumps that happen in piecewise linear equations are a ‘no-no’ in linear
    programming. Thankfully, we can accomplish the equivalent of piecewise functions
    using auxiliary variables! Let’s get into an example.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 分段线性方程中发生的跳跃在线性规划中是不允许的。幸运的是，我们可以使用辅助变量来实现分段函数的等效功能！让我们来看一个例子。
- en: Let’s imagine that you manage a manufacturing facility. You need to produce
    a minimum number of products while minimizing your company’s wage expenses. Each
    employee has an hourly wage and an hourly production rate. Your goal is to create
    a work schedule that minimizes wage expenses while meeting a specific number of
    units produced. Easy enough? There’s a catch! Any employee that works over 20
    hours a week becomes eligible for benefits – these benefits will cost an extra
    $500 per employee. This represents a jump in the function with the same slope
    (hourly salary).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一下，你管理着一个制造工厂。你需要生产一定数量的产品，同时最小化公司的工资支出。每位员工都有每小时工资和每小时生产率。你的目标是制定一个工作计划，以最小化工资支出，同时满足特定数量的产品产量。这听起来很容易？但是有一个问题！任何每周工作超过20小时的员工都有资格获得福利——这些福利将额外花费每位员工500美元。这代表着函数斜率不变（每小时工资）的跳跃。
- en: We will first explore how to perform an intercept jump. Let’s set up the simple
    problem without the intercept jump, then we can add the complexity of the extra
    benefits cost at 20 hours of work. In our simple example, we have three employees,
    they each have a different pay and a different level of productivity (shown in
    the table below). Our goal is to minimize labor costs while producing at least
    600 units a week.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先探讨如何执行截距跳跃。让我们设置一个没有截距跳跃的简单问题，然后我们可以添加20小时工作带来的额外福利成本复杂性。在我们的简单例子中，我们有三名员工，他们各自有不同的工资和不同的生产水平（如下表所示）。我们的目标是最小化劳动力成本，同时每周至少生产600个单位。
- en: '![image by author](../Images/792a84069c6e908691080ced64da6a01.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供](../Images/792a84069c6e908691080ced64da6a01.png)'
- en: image by author
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Before the additional complexity of the benefits expense, our objective function
    and constraint look like this:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在考虑额外福利费用带来的复杂性之前，我们的目标函数和约束条件如下：
- en: '![LP set up before intercept jump - 1 objective function, 1 constraint](../Images/472cd32d8eb034e52eb227d0f5fbee75.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![截距跳跃前的线性规划设置 – 1个目标函数，1个约束](../Images/472cd32d8eb034e52eb227d0f5fbee75.png)'
- en: LP set up before intercept jump – 1 objective function, 1 constraint
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 截距跳跃前的线性规划设置 – 1个目标函数，1个约束
- en: Alright, with the LP 101 problem set up, let’s get into adding that intercept
    jump at 20 hours. We are going to use something called the ‘Big-M Method’ to do
    this. In this method, we create one or more binary auxiliary variables and we
    create an additional constraint to bind the auxiliary variable to the original
    decision variables. The ‘M’ part of ‘Big-M’ comes into play in the constraint
    configuration.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，在设置了线性规划101问题之后，让我们来添加20小时的截距跳跃。我们将使用所谓的“大M方法”来完成这个任务。在这个方法中，我们创建一个或多个二元辅助变量，并创建一个额外的约束条件来绑定辅助变量到原始决策变量。在约束配置中，“大M”中的“M”部分发挥作用。
- en: Below is an example of the new constraint we will add – *y* is the binary auxiliary
    variable that we added to the problem and M is an arbitrarily large number.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们将添加的新约束条件的示例——*y* 是我们添加到问题中的二元辅助变量，M 是一个任意大的数。
- en: '![big-m constraint](../Images/4dae81fc0b210c6621eff21dea5e022c.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![大M约束](../Images/4dae81fc0b210c6621eff21dea5e022c.png)'
- en: big-m constraint
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 大M约束
- en: 'Let’s break the constraint down since this is the main concept of performing
    the jump. On the left we have the decision variable for the hours we will schedule
    employee 1\. On the right, we have the number of hours after which benefits are
    required plus ‘M’ which is an arbitrarily large number (hence _big-_M) and y1
    is our binary auxiliary variable. In our example, I’ll set M to be 1,000\. Understanding
    this constraint is key! Let’s build our intuition by running different values
    through the inequality for employee 1 hours. See the table and explanations below:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解这个约束条件，因为这是执行跳跃的主要概念。在左边，我们有为员工1安排的小时数的决策变量。在右边，我们有需要福利的小时数加上‘M’（这是一个任意大的数，因此称为
    _big-_M）和 y1 是我们的二元辅助变量。在我们的例子中，我将 M 设置为 1,000。理解这个约束条件是关键！让我们通过运行不同的值通过员工1小时的不等式来建立我们的直觉。请参见下表和解释：
- en: '![explanation of the big-m method - image by author](../Images/4ed9090a29c0050eb10ee5d1bfd24e63.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![大M方法解释 – 图片由作者提供](../Images/4ed9090a29c0050eb10ee5d1bfd24e63.png)'
- en: explanation of the big-m method – image by author
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 大M方法的解释 – 图片由作者提供
- en: In addition to the new constraint, we also have to make modifications to our
    objective function. This is pretty simple to do, we add the product of our new
    auxiliary variables (remember, they are binary) and the intercept jump, in this
    case $500, to the objective function. When the auxiliary variable is 0, no additional
    cost is added. When the employee works more than 20 hours, the auxiliary variable
    is forced to be 1 and $500 is added to the objective value for that employee.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 除了新的约束之外，我们还需要对我们的目标函数进行修改。这很简单，我们只需将我们的新辅助变量（记住，它们是二进制的）与拦截跳跃的乘积（在这种情况下为500美元）添加到目标函数中。当辅助变量为0时，不会添加额外成本。当员工工作时间超过20小时时，辅助变量被迫为1，并将500美元添加到该员工的客观值中。
- en: '![Updated objective function for intercept jumps](../Images/0cc97d17f88e647cc6bfe7c9cf3bfbda.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![更新后的拦截跳跃目标函数](../Images/0cc97d17f88e647cc6bfe7c9cf3bfbda.png)'
- en: Updated objective function for intercept jumps
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 更新后的拦截跳跃目标函数
- en: With the problem fully formulated, let’s set it up and solve it in Python using
    the pulp package!
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在问题完全形成后，让我们使用Python中的pulp包来设置和解决它！
- en: '[PRE0]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: And here are the results of the run, looks like we can make 600 widgets while
    incurring $1,810 dollars in labor expenses. Employee 1 will be the only employee
    to receive benefits (employee 2 is just below the threshold of *more* than 20
    hours).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是运行结果，看起来我们可以在产生600个部件的同时，产生1,810美元的劳动力费用。员工1将是唯一获得福利的员工（员工2的加班时间刚刚超过20小时）。
- en: '![optimization output - image by author](../Images/44f85353286a35efcb2afc066b8cd8ed.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![优化输出 - 图像由作者提供](../Images/44f85353286a35efcb2afc066b8cd8ed.png)'
- en: optimization output – image by author
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 优化输出 – 图像由作者提供
- en: 'Alright, now that we’ve tackled the issue of the additional benefits expense,
    let’s make things even more complicated by adding in over-time pay (1.5x the regular
    rate)! This is actually going to be pretty simple 😁 . To do this, we need to split
    our employee hour variables into two separate variables (regular hours and overtime
    hours). So now, instead of three employee hour variables, we have six. One regular
    hour variable and one overtime variable for each of the three employees. We create
    a constraint to bind the regular hours to no more than 40 (in pulp you can do
    this with the built in upBound parameter). We will then modify the objective function
    to reflect the change— I’ll just copy/past an excerpt from the code below:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在我们已经解决了额外福利费用的难题，让我们通过添加加班费（常规工资的1.5倍）使事情变得更加复杂！这实际上会相当简单 😁。为此，我们需要将我们的员工小时变量分成两个单独的变量（常规小时和加班小时）。因此，现在我们有了六个员工小时变量，而不是三个。每个员工都有一个常规小时变量和一个加班小时变量。我们创建一个约束来将常规小时数限制在不超过40小时（在pulp中，您可以使用内置的upBound参数来完成此操作）。然后我们将修改目标函数以反映这一变化——我将在下面的代码中复制/粘贴一个摘录：
- en: '![new objective function with regular time and overtime split into two auxiliary
    variables](../Images/518b56a6867d6984d79b6f6ed091e56a.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![将常规时间和加班时间分成两个辅助变量的新目标函数](../Images/518b56a6867d6984d79b6f6ed091e56a.png)'
- en: new objective function with regular time and overtime split into two auxiliary
    variables
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 新的目标函数，将常规时间和加班时间分成两个辅助变量
- en: Note that since overtime costs more than regular time, the solver will always
    max out the regular time before it starts adding overtime, so we don’t need a
    constraint to force this behavior. I also increased the production requirement
    to 1,000 so that our example would require some overtime.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，由于加班成本高于常规时间，求解器将在开始添加加班时间之前始终最大化常规时间，因此我们不需要约束来强制这种行为。我还将生产要求提高到1,000，以便我们的示例需要一些加班时间。
- en: 'Here is the code to solve the full problem with the benefits and overtime pieces:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是解决包含福利和加班部分的完整问题的代码：
- en: '[PRE1]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'And here is the optimal output:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是最佳输出：
- en: '![Optimization output - image by author](../Images/902df6c8b5c528cb4690d262edf6c82e.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![优化输出 - 图像由作者提供](../Images/902df6c8b5c528cb4690d262edf6c82e.png)'
- en: Optimization output – image by author
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 优化输出 – 图像由作者提供
- en: The optimal strategy is to max out employee 1’s work to 60 hours, use employee
    2 up to the benefits limit and have employee 3 work a full week plus 2 hours.
    I hope this example has illustrated how we can linearize intercept jumps and changes
    in slopes so that they can be incorporated into LP problems.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳策略是将员工1的工作时间最大化到60小时，将员工2的工作时间用到福利限制，让员工3工作一整周再加2小时。我希望这个例子说明了我们如何将拦截跳跃和斜率的变化线性化，以便将它们纳入线性规划问题中。
- en: Conditional relationships between variables
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 变量之间的条件关系
- en: Sometimes we need to model conditional relationships between variables to solve
    optimization problems. Here, I’ll dive into an example that I created for an article
    I wrote on simulation a little while ago (link below). That article was on simulating
    data and covered LP tangentially. I didn’t talk about the auxiliary variables
    it used at all – I’d like to take the opportunity to cover here what I didn’t
    there.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候我们需要对变量之间的条件关系进行建模以解决优化问题。在这里，我将深入探讨我为不久前撰写的一篇文章创建的一个例子（下文有链接）。那篇文章是关于模拟的，并间接提到了线性规划（LP）。我完全没有提到它所使用的辅助变量——我想借此机会在这里补充我之前没有提到的内容。
- en: '[**Simulated Data, Real Learnings: Scenario Analysis**](https://towardsdatascience.com/simulated-data-real-learnings-scenario-analysis-02ee56ed8886)'
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**模拟数据，真实学习：情景分析**](https://towardsdatascience.com/simulated-data-real-learnings-scenario-analysis-02ee56ed8886)'
- en: 'Here’s how the problem is set up – imagine you are a developer planning a housing
    subdivision. You have multiple floorplans available to you, and you want to optimize
    your profit subject to specific constraints. Below is a table of the different
    floorplans with their key metrics:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这是问题的设置方式——想象你是一位正在规划住宅区的开发商。你有多个楼层平面可供选择，并且你希望在特定约束下优化你的利润。以下是不同楼层平面及其关键指标的一张表格：
- en: '![Details for each floorplan - image by author](../Images/aef695f024894c3eb3291705ef10e7b9.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![每个楼层平面的详细信息 - 作者图片](../Images/aef695f024894c3eb3291705ef10e7b9.png)'
- en: Details for each floorplan – image by author
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 每个楼层平面图的详细信息——作者图片
- en: Our main decision variables are integer values for each row in the table shown
    above. The integer values represent the number of homes we will build of each
    floorplan. This is represented by the list ‘x’ in the code at the end of this
    section.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的主要决策变量是上表每行的整数值。这些整数值代表我们将要建造的每种楼层平面的房屋数量。这在上文末尾的代码列表‘x’中有所表示。
- en: 'Here are the three constraints for the problem:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是该问题的三个约束：
- en: We must have at least 6 different floorplans in our neighborhood
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们必须在我们的社区中至少有6种不同的楼层平面
- en: We need to have at least 10 homes < 2,000 sqft and 15 between 2,000 sqft and
    3,000 sqft and 10 homes that are > 3,000 sqft
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们需要至少有10座小于2,000平方英尺的房屋，15座在2,000平方英尺和3,000平方英尺之间，以及10座大于3,000平方英尺的房屋
- en: Lastly, we have 150,000 square feet of plots – each house needs 25% more square
    feet than the floor plan – we can’t build more houses than we have land!
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我们有150,000平方英尺的用地——每座房屋需要比楼层平面多25%的平方英尺——我们不能建造比我们有土地更多的房屋！
- en: The first constraint is going to need auxiliary variables, the other two can
    be handled directly with the input data and the primary decision variables (the
    "x’s").
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个约束将需要辅助变量，其他两个可以直接通过输入数据和主要决策变量（“x's”）来处理。
- en: Before we get into setting up this constraint, let’s build an understanding
    of how the main decision variable works. Each row in the table above will have
    its own ‘x’ decision variable. So we will have 15 ‘x’ variables – each will represent
    the number of houses that will be built for the corresponding floorplan. For example,
    X1 is the number of floorplan 1 houses that will be built. So, if X1 = 10, 10
    houses of floorplan 1 will be built in the subdivision.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们设置这个约束之前，让我们先了解一下主要决策变量是如何工作的。上表中的每一行都将有一个自己的‘x’决策变量。因此，我们将有15个‘x’变量——每个变量将代表我们将为相应的楼层平面建造的房屋数量。例如，X1代表将建造的楼层平面1房屋的数量。所以，如果X1
    = 10，住宅区将建造10座楼层平面1的房屋。
- en: 'Okay, now onto the meat of the conversation – the auxiliary variables! We need
    a way to ensure that at least 6 of the ‘x’ variables are greater than 0\. We do
    this by creating a binary auxiliary variable for each floorplan. So, we now have
    15 binary ‘y’ variables. The next thing we need to do is tie the ‘y’s to the ‘x’s
    in a way that when an x variable is greater than 0, the corresponding y variable
    is set to 1\. We do this by creating a constraint that x ≥ y – let’s build intuition
    on why this constraint meets our needs with the table below:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在让我们进入对话的核心——辅助变量！我们需要一种方法来确保至少有6个‘x’变量大于0。我们通过为每个楼层平面创建一个二进制辅助变量来实现这一点。因此，我们现在有15个二进制‘y’变量。接下来，我们需要将‘y’s与‘x’s联系起来，以便当一个x变量大于0时，相应的y变量被设置为1。我们通过创建一个约束x
    ≥ y来实现这一点——让我们通过下表来建立对这个约束满足我们需求的理解：
- en: '![explaining the constraints that tie the auxiliary variables (y''s) to the
    decision variables (x''s) - image by author](../Images/56c962e0219090ea43f60ab0a97db0c3.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![解释将辅助变量（y''s）与决策变量（x''s）连接的约束 - 作者图片](../Images/56c962e0219090ea43f60ab0a97db0c3.png)'
- en: explaining the constraints that tie the auxiliary variables (y’s) to the decision
    variables (x’s) – image by author
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 解释将辅助变量（y）与决策变量（x）关联的约束——图片由作者提供
- en: With that auxiliary variables set up, and new constraints introduced to tie
    the x’s to the y’s, we need to add one final constraint – the constraint that
    the y variables need to sum to at least 6\. With that constraint in place, we
    are now ready to set up and run our optimization!
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置这些辅助变量并引入新的约束以将 x 与 y 相关联之后，我们需要添加一个最终约束——即 y 变量需要至少相加到 6。有了这个约束，我们现在可以设置并运行我们的优化了！
