  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'And here is the optimal solution:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是最佳解决方案：
- en: '![Optimal floorplan strategy - image by author](../Images/d4e26139167e52735a061ac644dc5ec5.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![最佳楼层规划策略 - 图片由作者提供](../Images/d4e26139167e52735a061ac644dc5ec5.png)'
- en: Optimal floorplan strategy – image by author
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳楼层规划策略——图片由作者提供
- en: We can see here that our constraint worked! There are 6 floorplans selected
    to build in the optimal output.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，我们的约束是有效的！有 6 个楼层规划被选中以进行最佳输出建设。
- en: ‘Or’ logic
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: “或”逻辑
- en: Often we need to access ‘or’ logic in linear programming. Raw ‘or’ logic is
    not linear, so we have to use auxiliary variables to linearize it. To do this,
    we will need to add one auxiliary variable for each condition in the ‘or’ logic
    and then add another auxiliary variable to tie them together.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在线性规划中，我们经常需要访问“或”逻辑。原始的“或”逻辑不是线性的，因此我们必须使用辅助变量来线性化它。为此，我们需要为“或”逻辑中的每个条件添加一个辅助变量，然后添加另一个辅助变量来将它们连接起来。
- en: Imagine you manage a microchip manufacturing plant. For national security reasons,
    the government offers a $2,000 grant for specific levels of chip production. To
    be grant eligible, you need to produce at least 42 units of chip A or 15 units
    of chip B a week. You can only get one grant in a week, so producing >42 of A
    *and* >15 of B won’t get you double grants. This is an example of ‘or’ logic because
    you get the grant if you meet the requirement for A *or* B.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 想象你管理着一个微芯片制造厂。出于国家安全原因，政府为特定水平的芯片生产提供 2,000 美元的补助金。为了有资格获得补助金，你每周至少需要生产 42
    个芯片 A 或 15 个芯片 B。你每周只能获得一个补助金，所以生产 >42 个 A 和 >15 个 B 不会得到双倍补助金。这是一个“或”逻辑的例子，因为如果你满足
    A 或 B 的要求，你就能获得补助金。
- en: To formulate this problem, we need to set up one **binary** auxiliary variable
    for each of the chip types. We will create a ‘grant_a’ variable and a ‘grant_b’
    variable. We will then add the constraint that chip_a ≥ 45 * grant_a— Where chip_a
    is the total number of chip a’s produced. We will add the same constraint for
    chip b with the corresponding number chips required for a grant.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 为了制定这个问题，我们需要为每种芯片类型设置一个**二进制**辅助变量。我们将创建一个“grant_a”变量和一个“grant_b”变量。然后，我们将添加约束
    chip_a ≥ 45 * grant_a——其中 chip_a 是生产的芯片 a 的总数。我们将为 chip b 添加相同的约束，对应于所需的芯片数量。
- en: '![constraints with ''grant a'' and ''grant b'' auxiliary variables - image
    by author](../Images/0023eca1774ce0528307b80e5c326761.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![使用 ''grant a'' 和 ''grant b'' 辅助变量的约束 - 图片由作者提供](../Images/0023eca1774ce0528307b80e5c326761.png)'
- en: constraints with ‘grant a’ and ‘grant b’ auxiliary variables – image by author
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 使用‘grant a’和‘grant b’辅助变量的约束——图片由作者提供
- en: Lastly, we need a way to tie grant_a and grant_b together with ‘or’ logic. To
    do this, we will create one more **binary** auxiliary variable – ‘grant’ – and
    one more constraint.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们需要一种方法来使用“或”逻辑将 grant_a 和 grant_b 连接起来。为此，我们将创建一个额外的**二进制**辅助变量——“grant”——以及一个额外的约束。
- en: '![constraint to tie the grant a and b auxiliary variables to the grant auxiliary
    variable - image by author](../Images/10744fe9aa4066375b23790947359c5b.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![将 grant a 和 b 辅助变量与 grant 辅助变量关联的约束 - 图片由作者提供](../Images/10744fe9aa4066375b23790947359c5b.png)'
- en: constraint to tie the grant a and b auxiliary variables to the grant auxiliary
    variable – image by author
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 将 grant a 和 b 辅助变量与 grant 辅助变量关联的约束——图片由作者提供
- en: This will force grant to be 0 if both grant_a and grant_b are 0\. But, if grant_a
    and/or grant_b are 1, grant *can* take the value of 1 as well. The optimization
    will always set grant to 1 when it has the option (again, that is when grant_a
    and/or grant_b are 1), because setting grant to 1 will increase the objective
    function by $2,000!
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 grant_a 和 grant_b 都为 0，这将迫使 grant 为 0。但是，如果 grant_a 和/或 grant_b 为 1，grant
    也可以取值为 1。当有选择时（再次强调，这是当 grant_a 和/或 grant_b 为 1 时），优化将始终将 grant 设置为 1，因为将 grant
    设置为 1 将使目标函数增加 2,000！
- en: Below is the example in Python code. Note that I added marginal profit to the
    objective function ($20 for chip A and $30 for chip B) and a material usage constraint
    to bind the problem.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是Python代码示例。请注意，我已将边际利润添加到目标函数中（芯片A为$20，芯片B为$30）并添加了一个材料使用约束来绑定问题。
- en: '[PRE3]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The optimized solution is below:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 优化后的解决方案如下：
- en: '![Results of the optimization - image by author](../Images/a7233c70dcf8aced26b33cd9a68b8044.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![优化结果 - 作者提供的图像](../Images/a7233c70dcf8aced26b33cd9a68b8044.png)'
- en: Results of the optimization – image by author
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 优化结果 - 作者提供的图像
- en: Here, we can see that even though we make more per unit of raw material with
    chip A, we want to create 15 units of chip B to get the grant. Once we get the
    grant, we use the rest of the material to produce chip A. Looks like the ‘or’
    logic checks out! We now understand how we can use auxiliary variables to solve
    LP problems with ‘or’ logic!
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们可以看到，尽管我们使用芯片A每单位原材料能生产出更多的产品，但我们仍需要生产15个单位的芯片B以获得资助。一旦我们获得资助，我们就用剩下的材料来生产芯片A。看起来“或”逻辑是正确的！我们现在明白了如何使用辅助变量来解决带有“或”逻辑的线性规划问题！
- en: Conclusion
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: I hope that you have a fuller understanding of how using auxiliary variables
    can greatly increase linear programming’s flexibility. This article was meant
    as an introduction to auxiliary variables, with some examples of their use. There
    are other ways that they can be used that you can explore further. They are a
    little tricky to understand at first, but once you get the hang of them, a new
    world of LP optimization possibilities opens up!
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望您对如何使用辅助变量大大提高线性规划的灵活性有了更全面的理解。本文旨在介绍辅助变量，并给出了一些使用示例。它们还有其他的使用方法，您可以进一步探索。一开始它们可能有点难以理解，但一旦掌握了它们，线性规划优化的新世界就会向您敞开！
