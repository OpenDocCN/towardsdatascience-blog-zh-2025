- en: What is Universality in LLMs? How to Find Universal Neurons
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/what-is-universality-in-llm-and-how-to-find-universal-neurons/](https://towardsdatascience.com/what-is-universality-in-llm-and-how-to-find-universal-neurons/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756485848460" class="mdspan-comment">What</mdspan> is universality？
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We human beings are all “initialized” differently — we’re born with different
    genetics. We then grow up in different families with different backgrounds, experiencing
    different events. However, it is fascinating to think that our brains finally
    converge on similar structures and functions. We can consider this phenomenon
    **universal**.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3e6cf393854acb78c98e491e7fb320c4.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
- en: 'Image by Author: Universality in brains'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: 'In 2020, [Olah et al.](https://distill.pub/2020/circuits/zoom-in/) proposed
    three speculative claims regarding interpreting artificial neural networks:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Features are the fundamental unit of neural networks.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Features are connected by weights, forming circuits.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Analogous features and circuits form across models and tasks.
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The third claim is perhaps the most interesting. It concerns universality and
    suggests that different neural networks — even when trained on independent datasets
    — might converge to the same underlying mechanisms.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: 'There is a well-known example: the first layer of almost any convolutional
    network trained on images learns Gabor filters, which identify edges and orientations.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: 'With the rapid development of large language models (LLMs), researchers are
    asking a natural question: ***Can we observe universality in LLMs as well?***
    *If so, how can we find universal neurons?*'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/06629888ec10a8d0b8433e1b38839ee2.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
- en: 'Image by Olah et al: curve detector circuits found in 4 different vision models'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: In this blog post, we will be focusing on a simple experiment and identifying
    universal neurons. More precisely, we would design an experiment with two different
    transformers to see whether we can find any universal neurons between them.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: Please refer to the [notebook](https://colab.research.google.com/drive/1FtRmJwcluX1met0msVjPnxLY-ZDsYNGV)
    for the complete Python implementation.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Quick Recap on Transformers
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Recall that transformers — especially their essential component, attention —
    are doubtlessly the greatest breakthrough behind the success of modern large language
    models. Before their arrival, researchers had struggled for years with models
    like RNNs without achieving strong performance. But transformers changed all.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'A basic transformer block consists of two key components:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: 'Multi-Head Self-Attention: Each token attends to all other tokens (before),
    learning *which tokens matter most* for prediction.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Feedforward MLP**:** After attention, each token representation is passed through
    a small MLP.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The two components above are wrapped with residual connections (skip connections)
    and layer normalization.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Here, the most interesting part for us is the MLP inside each block, because
    it contains the “neurons” we’ll analyze to look for universality.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Experiment Setup
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We designed an experiment using two tiny transformers.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/915c86d85560d9fda671361b4ba3f12d.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: 'Image by Author: Experiment steps'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Please note that our goal is not to achieve state-of-the-art performance, but
    to create a toy model where we can have an impression of the existence of universal
    neurons.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'We define a transformer structure that contains:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Embedding + positional encoding
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Multi-head self-attention
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MLP block with ReLU activation
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Output layer projecting to vocabulary size.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We now create two independently initialized models of the tiny transformer architecture,
    model_a and model_b. Even though they share the same architecture, the models
    can be considered as different because of their different initial weights and
    separate training process on 10,000 different random samples. Of course, models
    are trained self-supervised, learning to predict the next token given the previous
    tokens.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: Find Universality with Correlation
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once both model_a and model_b are trained, we run them on a test dataset and
    extract the value of all MLP activations: again, they are values of the hidden
    values immediately after the first linear layer in the MLP block. We thus get
    a tensor with the dimension[num_samples, sequence_length, mlp_dim].'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the interesting thing: We will now compute the [Pearson correlation](https://en.wikipedia.org/wiki/Pearson_correlation_coefficient)
    between corresponding neurons in model_a and model_b by the formula:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4fdef5c55823b4c2b09f4f2d41ea34aa.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
- en: where at,i, bt,i are the activations of neuron i at time t in sequences of model_a
    and model_b.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: We claim that if a neuron shows a high correlation, it might suggest that the
    two models have learned a similar feature, or, in other words, this neuron may
    be universal.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: 'However, not all correlations lead to universality. It is possible that some
    appear because of… chance. We therefore compare correlations against a baseline:
    applying a random rotation to the neurons in model_b, that is, we replace the
    second set of neurons by randomly rotated ones.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: This random rotation will destroy any alignment between the two models but will
    still preserve the distribution of activations.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we compute the so-called **excess correlation** by subtracting the
    baseline from the actual correlation.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: We flag the neurons with high excess correlation (above 0.5) as universal neurons
    between the two models.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Please refer to the notebook for a detailed Python implementation.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Results
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will now take a look at the results.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: First, we have a plot comparing baseline vs actual correlations. We see that
    baseline correlations are near zero; the actual correlations of several neurons
    are much higher, showing that observed alignment is not due to random chance.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/47a950a7796bee06532434538aa3f000.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
- en: 'Image by Author: baseline vs actual correlation'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供：基线与实际相关性
- en: We now plot the excess correlation distribution. As the readers might see, most
    neurons still have very low excess correlation. However, a subset stands far above
    the threshold of 0.5\. These neurons (green dots on the histogram) are identified
    as universal neurons.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们绘制了过剩相关性分布图。正如读者可能看到的，大多数神经元仍然具有非常低的过剩相关性。然而，有一小部分神经元远远高于0.5的阈值。这些神经元（直方图上的绿色点）被识别为通用神经元。
- en: '![](../Images/d4218b58a46a25d33c0f34277980f412.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4218b58a46a25d33c0f34277980f412.png)'
- en: 'Image by Author: correlation distribution'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供：相关性分布
- en: The results of our analysis give clear evidence of universal neurons in the
    two independently trained transformers.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我们分析的结果为两个独立训练的Transformer中存在通用神经元提供了明确的证据。
- en: Conclusion
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this blog post, we introduced the concept of LLMs. We have analyzed different
    tiny transformers. We were able to identify some universal neurons in both models.
    These are neurons that might capture similar features.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我们介绍了LLMs的概念。我们分析了不同的微型Transformer。我们能够在两个模型中识别出一些通用神经元。这些神经元可能捕捉到相似的特征。
- en: These findings give readers the impression that neural networks, in particular
    LLMs, can converge on similar internal mechanisms. Of course, our study was focusing
    on small models and a limited dataset, and the final result has nothing to do
    with the state-of-the-art performance. But such a method provides a possibility
    to find universality in larger models.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这些发现给读者留下了这样的印象，即神经网络，尤其是LLMs，可以收敛到相似的内机制。当然，我们的研究集中在小型模型和有限的样本集上，最终结果与最先进的性能无关。但这种方法为在更大模型中找到普遍性提供了一种可能性。
