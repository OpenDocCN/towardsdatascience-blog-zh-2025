- en: Manage Environment Variables with Pydantic
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/manage-environment-variables-with-pydantic/](https://towardsdatascience.com/manage-environment-variables-with-pydantic/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Developers work on applications that are supposed to be deployed on some server
    in order to allow anyone to use those. Typically in the machine where these apps
    live, developers set up environment variables that allow the app to run. These
    variables can be API keys of external services, URL of your database and much
    more.
  prefs: []
  type: TYPE_NORMAL
- en: For local development though, it is really inconvenient to declare these variables
    on the machine because it is a slow and messy process. So I’d like to share in
    this short tutorial how to use Pydantic to handle environment variables in a secure
    way.
  prefs: []
  type: TYPE_NORMAL
- en: .env file
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'What you commonly do in a Python project is to store all your environment variables
    in a file named .env. This is a text file containing all the variables in a `key
    : value` format. You can use also the value of one of the variables to declare
    one of the other variables by leveraging the `{}` syntax.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is an example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Be aware the .env file should remain private, so it is important that this file
    is mentioned in your **.gitignore** file, to be sure that you **never push it
    on GitHub**, otherwise, other developers could steal your keys and use the tools
    you’ve paid for.
  prefs: []
  type: TYPE_NORMAL
- en: env.example file
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To ease the life of developers who will clone your repository, you could include
    an env.example file in your project. This is a file containing only the keys of
    what is supposed to go into the .env file. In this way, other people know what
    APIs, tokens, or secrets in general they need to set to make the scripts work.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: python-dotenv
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'python-dotenv is the library you use to load the variables declared into the
    .env file. To install this library:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Now you can use the load_dotenv to load the variables. Then get a reference
    to these variables with the os module.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: This method will first look into your .env file to load the variables you’ve
    declared there. If this file doesn’t exist, the variable will be taken from the
    host machine. This means that you can use the .env file for your local development
    but then when the code is deployed to a host environment like a virtual machine
    or Docker container we are going to directly use the environment variables defined
    in the host environment.
  prefs: []
  type: TYPE_NORMAL
- en: Pydantic
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Pydantic is one of the most used libraries in Python for data validation. It
    is also used for serializing and deserializing classes into JSON and back. It
    automatically generates JSON schema, reducing the need for manual schema management.
    It also provides built-in data validation, ensuring that the serialized data adheres
    to the expected format. Lastly, it easily integrates with popular web frameworks
    like FastAPI.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**pydantic-settings**](https://github.com/pydantic/pydantic-settings)is a
    Pydantic feature needed to load and validate settings or config classes from environment
    variables.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: We are going to create a class named `Settings`. This class will inherit `BaseSettings`*. *This
    makes the default behaviours of determining the values of any fields to be read
    from the .env file. If no var is found in the .env file it will be used the default
    value if provided.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: In the `Settings` class above we have defined several fields. The `Field` class
    is used to provide [extra information](https://docs.pydantic.dev/latest/api/fields/#pydantic.fields.Field) about
    an attribute.
  prefs: []
  type: TYPE_NORMAL
- en: In our case, we setup a `validation_alias`. So the variable name to look for
    in the .env file is overridden. In the case reported above, the environment variable *my_auth_key* will
    be read instead of *auth_key*.
  prefs: []
  type: TYPE_NORMAL
- en: You can also have multiple aliases to look for in the .env file that you can
    specify by leveraging `AliasChoises(choise1, choise2).`
  prefs: []
  type: TYPE_NORMAL
- en: The last attribute `model_config` , contains all the variables regarding a particular
    topic (e.g connection to a db). And this variable will store all .env var that
    start with the prefix `env_prefix.`
  prefs: []
  type: TYPE_NORMAL
- en: Instantiate and use settings
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The next step would be to actually instantiate and use these settings in your
    Python project.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Now what use the settings in other parts of our codebase.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: You finally have an easy access to your settings, and Pydantic helps you validate
    that the secrets have the correct format. For more advanced validation tips refer
    to the Pydantic documentation: [https://docs.pydantic.dev/latest/](https://docs.pydantic.dev/latest/)
  prefs: []
  type: TYPE_NORMAL
- en: '**Final thoughts**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Managing the configuration of a project is a boring but important part of software
    development. Secrets like API keys, db connections are what usually power your
    application. Naively you can hardcode these variables in your code and it will
    still work, but for obvious reasons, this could not be a good practice. In this
    article, I showed you an introduction on how to use pydantic settings to have
    a structured and safe way to handle your configurations.
  prefs: []
  type: TYPE_NORMAL
