- en: '**Chi-Squared Test**'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**卡方检验**'
- en: The Chi-Squared Test is a statistical method used to help us figure out whether
    the differences (or similarities) we observe between categorical variables happen
    by chance or reflect a real, meaningful relationship. This makes it an essential
    tool in hypothesis testing, widely used in data science and other fields.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 卡方检验是一种统计方法，用于帮助我们判断观察到的分类变量之间的差异（或相似性）是偶然发生的还是反映了真实、有意义的关系。这使得它成为假设检验中的基本工具，在数据科学和其他领域得到广泛应用。
- en: '*If you recall, categorical variables are types of variables in data that represent
    groups or categories instead of numerical values.*'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你还记得，分类变量是数据中的一种变量类型，它代表的是组或类别，而不是数值。*'
- en: To identify whether something is a categorical variable or not, I generally
    ask myself *"Does this have a finite set of distinct groups?"* For instance, if
    we’re analyzing **"preferred drink choices"** in a survey, the options might be
    categories like coffee, tea, water, soda, or juice. Since I can clearly list these
    distinct groups, I know it’s a categorical variable.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确定某物是否为分类变量，我通常会问自己："这有没有有限个不同的组？" 例如，如果我们正在分析调查中的**"首选饮料选择"**，选项可能是咖啡、茶、水、苏打水或果汁这样的类别。由于我可以清楚地列出这些不同的组，我知道它是一个分类变量。
- en: Types of Chi-Squared Tests
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 卡方检验的类型
- en: 'There are three main types of Chi-Squared Tests, each serving a specific purpose:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 有三种主要的卡方检验类型，每种类型都有其特定的用途：
- en: '**Chi-Squared Test for Independence** determines if there is a significant
    association between two categorical variables in a **single population**.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**卡方检验独立性**用于确定在**单个总体**中两个分类变量之间是否存在显著的关联。'
- en: '**Chi-Squared Test for Homogeneity** compares the distribution of a categorical
    variable across **two or more different populations** or **groups**.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**卡方检验同质性**比较分类变量在**两个或更多不同总体**或**群体**中的分布。'
- en: '**Chi-Squared Goodness of Fit Test** determines whether the observed distribution
    of a single categorical variable matches a theoretical or expected distribution.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**卡方拟合优度检验**用于确定单个分类变量的观察分布是否与理论或期望分布相匹配。'
- en: If this seems confusing, don’t worry! I’ll break down each type of test with
    detailed examples to make it clearer.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这看起来很令人困惑，不要担心！我将通过详细的例子分解每种测试类型，使其更清晰。
- en: Key Concepts
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键概念
- en: Chi-Squared Test is a hypothesis-testing method
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 卡方检验是一种假设检验方法
- en: '**Null Hypothesis (H₀):** Assumes no significant relationship or difference
    exists.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零假设 (H₀):** 假设不存在显著的关系或差异。'
- en: '**Alternative Hypothesis (Hₐ):** Assumes a significant relationship or difference
    exists.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**备择假设 (Hₐ):** 假设存在显著的关系或差异。'
- en: '**Right-Tailed:** The Chi-Squared Test is always right-tailed because the test
    statistic (χ²) is based on squared differences, which are always positive. Large
    values of χ² indicate significant deviations from the null hypothesis, leading
    to its rejection.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**右尾:** 卡方检验总是右尾的，因为检验统计量 (χ²) 基于平方差，这些平方差总是正的。χ² 的大值表明与零假设有显著差异，导致其被拒绝。'
- en: '**Contingency Table:** Generally for the chi-squared test for independence,
    you’ll see some sort of a table that shows the data for each categorical variable
    (like the one below). It summarizes the data to understand the relationship between
    the variables.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**列联表**：通常对于独立性卡方检验，你会看到某种表格，显示每个分类变量的数据（如下所示）。它总结了数据，以了解变量之间的关系。'
- en: '![Incoming example using soccer (again)](../Images/3b499a5e40c30cb4bd4f1375eb130d53.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![使用足球（再次）的示例](../Images/3b499a5e40c30cb4bd4f1375eb130d53.png)'
- en: Incoming example using soccer (again)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 使用足球（再次）的示例
- en: If these concepts seem complex, don’t worry! In the next sections, I’ll explain
    Chi-squared with a concrete example and go over each type of Chi-Squared Test
    in detail, so you can confidently apply them to your own data analyses.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这些概念看起来很复杂，不要担心！在接下来的章节中，我将通过一个具体的例子来解释卡方检验，并详细说明每种类型的卡方检验，以便您可以自信地将它们应用于自己的数据分析。
- en: Now that we’ve covered the basics, let’s use one of my favorite topics – soccer
    – to illustrate this test. For my readers who have been following my articles,
    you know I love to use soccer!
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经涵盖了基础知识，让我们用我最喜欢的主题之一——足球——来说明这个测试。对于一直关注我文章的读者来说，你们知道我喜欢用足球作为例子！
- en: '![Photo by Peter Glaser on Unsplash](../Images/d69f830ab90eb4b15d0a1e905f1cf052.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![由 Peter Glaser 在 Unsplash 上拍摄的照片](../Images/d69f830ab90eb4b15d0a1e905f1cf052.png)'
- en: Photo by [Peter Glaser](https://unsplash.com/@baraida?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/white-and-gray-adidas-soccerball-on-lawn-grass-qWs_Wa1JrKM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 由 [Peter Glaser](https://unsplash.com/@baraida?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    在 [Unsplash](https://unsplash.com/photos/white-and-gray-adidas-soccerball-on-lawn-grass-qWs_Wa1JrKM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    拍摄的照片
- en: 'Analyzing Playing Styles in Serie A: Chi-squared test for Independence'
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析意甲联赛的踢球风格：卡方检验独立性
- en: Imagine you are working with AC Milan’s head coach as a *data scientist*. You
    and the head coach have been hired by the team with a new season coming up (2025–2026).
    AC Milan has been known for their strong defensive style of football. However,
    this approach hasn’t been very successful in recent years.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你正在为AC米兰的主教练担任数据科学家。你和主教练被球队雇佣，因为新赛季即将到来（2025-2026）。AC米兰以其强大的防守足球风格而闻名。然而，这种方法在近年来并不成功。
- en: With a new season on the horizon, the coach is curious to understand whether
    certain **playing styles** – such as Balanced, Possession-based, or Counter-Attack
    – **are associated with better match outcomes** (Win, Draw, or Loss) across Serie
    A teams.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 随着新赛季的临近，教练好奇是否某些**比赛风格**——如平衡、控球或反击——与意甲球队的**更好的比赛结果**（胜利、平局或失败）相关。
- en: 'To test this, you analyze match results from the entire past Serie A season
    (2024–2025). This data represents a **single population**: all matches played
    in Serie A that season. You’re examining the relationship between two categorical
    variables:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试这一点，你分析了整个过去意甲赛季（2024-2025）的比赛结果。这些数据代表了一个**单一总体**：那个赛季在意甲进行的所有比赛。你正在检查两个分类变量之间的关系：
- en: '**Playing Style**: Balanced, Possession, Counter-Attack.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**比赛风格**：平衡，控球，反击。'
- en: '**Match Result**: Win, Draw, Loss.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**比赛结果**：胜利，平局，失败。'
- en: For simplicity, the dataset for our hypothetical Serie A analysis is summarized
    in the table below.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化，我们假设的意甲分析数据集总结在下表中。
- en: '![Observed Data for our make-up Serie A example](../Images/b67824fbcd49e9fd4646d0aa30cb2be3.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![我们制作的意甲示例的观察数据](../Images/b67824fbcd49e9fd4646d0aa30cb2be3.png)'
- en: Observed Data for our make-up Serie A example
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们制作的意甲示例的观察数据
- en: '**Note for readers:** While real-world match outcomes are influenced by various
    factors – like squad depth, player availability, and injuries – we’ll focus solely
    on playing style for this analysis!'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**读者注意**：虽然现实世界的比赛结果受多种因素影响——如球队深度、球员可用性和伤病——但我们将仅关注比赛风格进行分析！'
- en: Define the Hypothesis
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义假设
- en: How can we use a statistical test to determine whether certain playing styles
    influence match results? Well… remember that this is a hypothesis test, so let’s
    define the null and alternative hypotheses!
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何使用统计测试来确定某些比赛风格是否会影响比赛结果？嗯……记住这是一个假设检验，所以让我们定义零假设和备择假设！
- en: '**Null Hypothesis (Hₒ)**: Playing style is independent of match result. (No
    relationship exists between playing style and outcome.)'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零假设 (Hₒ)**：比赛风格与比赛结果独立。（比赛风格和结果之间不存在关系。）'
- en: '**Alternative Hypothesis (Hₐ​)**: Playing style is associated with match result.
    (A relationship exists between the two variables.)'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**备择假设 (Hₐ)**：比赛风格与比赛结果相关。（两个变量之间存在关系。）'
- en: To test these hypotheses, we’ll use the **Chi-Squared Test for Independence**
    to evaluate whether the observed differences in match results are statistically
    significant!
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试这些假设，我们将使用**卡方检验独立性**来评估观察到的比赛结果差异是否具有统计学意义！
- en: What do we expect from our data?
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们期望从我们的数据中得到什么？
- en: 'Before we begin performing the test… let’s take a step back and consider what
    the Chi-Squared Test for Independence is trying to achieve. At its core, it’s
    safe to say that this test asks:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始进行测试之前……让我们退一步，考虑一下卡方检验独立性的目的是什么。在本质上，可以说这个测试询问的是：
- en: Are the differences in match results across playing styles just random?
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比赛风格之间的比赛结果差异仅仅是随机的吗？
- en: Or do these differences reflect a meaningful relationship between playing style
    and outcomes?
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者这些差异是否反映了比赛风格和结果之间的有意义关系？
- en: Now, let’s consider this intuitively.
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 现在，让我们直观地考虑这个问题。
- en: If playing style has no impact on match results, the **number of wins, draws,
    and losses for each style should align with the overall proportions** in the data.
    For example, if 50% of all matches result in a win, we’d expect each playing style
    to have roughly 50% wins!
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 如果比赛风格对比赛结果没有影响，每种风格的胜利、平局和失败的数量应该与数据中的整体比例**一致**。例如，如果所有比赛中50%的结果是胜利，我们预计每种比赛风格大约有50%的胜利！
- en: If we were to calculate the expected data for each correlation of playing style
    to match results… It can simply be calculated based on the row and column totals.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们要计算每种比赛风格与比赛结果的相关性的预期数据……这可以简单地基于行和列的总数来计算。
- en: '![This is what we expect each cell''s value in our table to be (based on our
    data)](../Images/4e720c3f2dc19092520e0c8575a67707.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![这是我们期望表中每个单元格的值（基于我们的数据）](../Images/4e720c3f2dc19092520e0c8575a67707.png)'
- en: This is what we expect each cell’s value in our table to be (based on our data)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们根据数据预期表中每个单元格的值是什么
- en: For example, the expected number of wins for the Balanced playing style is shown
    below. We can do the same for every single cell to get the expected data!
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，平衡比赛风格的预期胜利次数如下所示。我们可以对每个单元格做同样的处理，以获取预期数据！
- en: '![Expected number of wins for Balanced playing style](../Images/15b65f5a759074d8e46112019b21b9b9.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![平衡比赛风格的预期胜利次数](../Images/15b65f5a759074d8e46112019b21b9b9.png)'
- en: Expected number of **wins for Balanced playing style**
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 平衡比赛风格的预期胜利次数
- en: Why Does This Matter?
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这为什么重要？
- en: Okay, we intuitively went over what we expect our data to be. But, why do we
    care about the **expected data** instead of just looking at the **observed data**?
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，我们直观地讨论了我们预期数据应该是什么。但是，为什么我们关心**预期数据**而不是只看**观测数据**呢？
- en: '![Expected Data](../Images/905e3f6b5b88ba48fc7e52b90df040f3.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![预期数据](../Images/905e3f6b5b88ba48fc7e52b90df040f3.png)'
- en: Expected Data
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 预期数据
- en: 'Well…! The expected data is critical to our **Chi-Squared Test** because it
    serves as the baseline for comparison. By calculating the expected values, we
    essentially say:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯……预期数据对我们**卡方检验**至关重要，因为它作为比较的基础。通过计算预期值，我们本质上是在说：
- en: '*"If playing style has no impact on match results (i.e., no relationship exists),
    this is what the data should look like."*'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*"如果比赛风格对比赛结果没有影响（即不存在关系），数据应该看起来是这样的。"*'
- en: When we compare the observed to the expected data, any significant deviation
    might indicate that playing style and match results are related.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们比较观测数据和预期数据时，任何显著的偏差都可能表明比赛风格和比赛结果之间存在关联。
- en: '![Observed Data](../Images/b67824fbcd49e9fd4646d0aa30cb2be3.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![观测数据](../Images/b67824fbcd49e9fd4646d0aa30cb2be3.png)'
- en: Observed Data
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 观测数据
- en: It makes sense, right? If there’s truly no relationship, the observed data should
    closely align with the expected data. On the other hand, if the observed data
    is notably different from the expected, it suggests that a relationship might
    exist between playing style and match outcomes.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这是有道理的，对吧？如果确实没有关系，观测数据应该与预期数据紧密一致。另一方面，如果观测数据与预期数据明显不同，这表明比赛风格和比赛结果之间可能存在某种关系。
- en: Understanding the Chi-Squared Test
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解卡方检验
- en: This comparison is the foundation of the **Chi-Squared Test**, helping us determine
    whether the differences are statistically significant or just random chance.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这种比较是卡方检验的基础，帮助我们确定差异是否具有统计学意义，或者只是随机机会。
- en: 'The key metric in this test is the **Chi-Squared statistic (χ²)**, which measures
    how much the *observed data* deviates from the *expected data*, assuming the two
    variables are independent. The formula for calculating the Chi-Squared statistic
    is:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 此测试中的关键指标是**卡方统计量（χ²）**，它衡量在假设两个变量独立的情况下，**观测数据**与**预期数据**之间的偏差程度。计算卡方统计量的公式是：
- en: '![Our Chi-squared statistic!](../Images/3950f28031512fe5e9d487fe97ae6382.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![我们的卡方统计量！](../Images/3950f28031512fe5e9d487fe97ae6382.png)'
- en: Our Chi-squared statistic!
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的卡方统计量！
- en: '**O**​ is the observed frequency in each cell of the contingency table.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**O**是列联表中每个单元格的观测频率。'
- en: '**E** is the expected frequency in each cell of the contingency table.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**E**是列联表中每个单元格的预期频率。'
- en: For each cell in the table, you calculate this value and then sum them all up
    to get the total Chi-Squared statistic!
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 对于表中的每个单元格，你计算这个值，然后将它们全部加起来得到总的卡方统计量！
- en: Performing the Test Using Python
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Python进行测试
- en: Now, you can use Python to calculate the Chi-Squared statistic and determine
    whether the observed differences are statistically significant! We’ll set the
    significance level (α) to 0.05.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以使用Python来计算卡方统计量，并确定观测到的差异是否具有统计学意义！我们将显著性水平（α）设置为0.05。
- en: '[PRE0]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: By looking at our data, we got a p-value of **0.00001**, which is less than
    the significance level (α=0.05). What does this mean? It means that we **reject
    the null hypothesis**. This indicates a statistically significant relationship
    between playing style and match outcomes in Serie A.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 通过观察我们的数据，我们得到了一个p值为**0.00001**，这小于显著性水平（α=0.05）。这意味着什么？这意味着我们**拒绝零假设**。这表明在意大利足球甲级联赛中，比赛风格和比赛结果之间存在统计学上的显著关系。
- en: So we can say to the head-coach that we can explore adopting a **Possession-based
    style**, as it shows a stronger association with better match results (e.g., more
    wins) based on the analysis!
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以告诉主教练，我们可以探索采用**控球型风格**，因为它根据分析显示与更好的比赛结果（例如，更多胜利）有更强的关联！
- en: '* * *'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Applying Chi-Squared Tests in Different Scenarios
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在不同场景下应用卡方检验
- en: We just went over the chi-squared test for independence and how it works! Luckily,
    for all types of Chi-Squared tests – whether it’s the **Chi-Squared Test for Homogeneity**
    or the **Chi-Squared Goodness-of-Fit Test** – the foundational calculations remain
    the same as those used in the Chi-Squared Test for Independence!
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚讲解了卡方检验及其工作原理！幸运的是，对于所有类型的卡方检验——无论是**同质性卡方检验**还是**卡方拟合优度检验**——其基础计算与独立性卡方检验中使用的计算相同！
- en: Start with the **observed data**.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从**观测数据**开始。
- en: Calculate the **expected data**.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算期望数据。
- en: Compute the **Chi-Squared statistic**.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算卡方统计量。
- en: Evaluate its **statistical significance**.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估其**统计显著性**。
- en: Pretty simple right!!?
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 很简单，对吧！！？
- en: Since the procedures are very similar across these tests, for the other types
    of Chi-Squared tests… I’ll focus on the scenarios where each test is used instead
    of going into the details again!
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这些测试的程序在这些测试中非常相似，对于其他类型的卡方检验……我将专注于每个测试使用的场景，而不是再次详细介绍细节！
- en: '* * *'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '![Photo by Jeffrey F Lin on Unsplash](../Images/d7565c576335e18e93abb149ca4c9119.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![由Jeffrey F Lin在Unsplash上的照片](../Images/d7565c576335e18e93abb149ca4c9119.png)'
- en: Photo by [Jeffrey F Lin](https://unsplash.com/@jeffreyflin?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/group-of-person-playing-soccer-on-field-SR5-47jmobs?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 照片由[Jeffrey F Lin](https://unsplash.com/@jeffreyflin?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/group-of-person-playing-soccer-on-field-SR5-47jmobs?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)提供
- en: 'Penalty Kick Success Rate: Chi-Squared Test for Homogeneity'
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 点球成功率：同质性卡方检验
- en: For a data science project, I analyzed data on the success rates of penalty
    kicks – categorized as **Goal**, **Saved**, or **Missed** – from various high-profile
    soccer tournaments, including the **UEFA Champions League**, **FIFA World Cup**,
    and **Copa América**.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个数据科学项目中，我分析了来自各种高知名度足球锦标赛的点球成功率数据——分为**进球**、**被扑救**或**错过**——包括**欧洲冠军联赛**、**FIFA世界杯**和**南美杯**。
- en: The goal of this project was to investigate whether the success rates of penalty
    kicks differ across these tournaments or remain consistent, considering the varying
    levels of pressure and competition in each event.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目的目标是调查点球成功率是否在不同锦标赛中有所不同，或者保持一致，考虑到每个事件中不同的压力和竞争水平。
- en: Interesting right?
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 有趣吧？
- en: This kind of question is perfect for solving with the **Chi-Squared Test for
    Homogeneity**! Remember that in this variation of the Chi-Squared test you are
    looking to compare whether the **distribution of a categorical variable** (success
    rate of penalty kicks) **is the same across multiple groups or populations** (different
    soccer tournaments).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这种问题非常适合用**同质性卡方检验**来解决！记住，在这个卡方检验的变体中，你正在寻找比较的是否是**分类变量的分布**（点球成功的成功率）**在多个组或群体中是否相同**（不同的足球锦标赛）。
- en: Below is the data, try out the Chi-Squared Test for Homogeneity yourself!
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是数据，试着亲自尝试同质性卡方检验！
- en: '![Observed Data for Success Rates of Penalty Kicks](../Images/bb46de2eea3f3ed36d7a3fd2d9729437.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![点球成功率的观测数据](../Images/bb46de2eea3f3ed36d7a3fd2d9729437.png)'
- en: Observed Data for Success Rates of Penalty Kicks
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 点球成功率的观测数据
- en: Answer
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 答案
