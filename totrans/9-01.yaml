  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '![Photo by My Profit Tutor on Unsplash](../Images/86a02b42642608944da794ec8a021d06.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![由My Profit Tutor在Unsplash上的照片](../Images/86a02b42642608944da794ec8a021d06.png)'
- en: Photo by [My Profit Tutor](https://unsplash.com/@myprofittutor?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/man-in-blue-and-white-stripe-shirt-holding-red-and-blue-soccer-ball-lMolBeDV0Tc?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 照片由[My Profit Tutor](https://unsplash.com/@myprofittutor?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/man-in-blue-and-white-stripe-shirt-holding-red-and-blue-soccer-ball-lMolBeDV0Tc?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)提供
- en: 'Goals Scored in Soccer Matches: Chi-Squared Test for Goodness-of-Fit'
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 足球比赛中的进球数：卡方拟合优度检验
- en: Imagine you want to test whether the distribution of **goals scored in soccer
    matches** aligns with a **[Poisson distribution](https://medium.com/p/ff8a6ddeb4a1)**.
    If you recall, the Poisson distribution is often used to model the number of events
    (like goals) occurring within a fixed interval, such as a single soccer match.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你想测试足球比赛中**进球数**的分布是否与**[泊松分布](https://medium.com/p/ff8a6ddeb4a1)**一致。如果你还记得，泊松分布通常用于模拟在固定间隔内发生的事件数量（如进球），例如单场足球比赛。
- en: '[**Probability Distributions: Poisson vs. Binomial Distribution**](https://towardsdatascience.com/probability-distributions-poisson-vs-binomial-distribution-ff8a6ddeb4a1)'
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**概率分布：泊松分布与二项分布**](https://towardsdatascience.com/probability-distributions-poisson-vs-binomial-distribution-ff8a6ddeb4a1)'
- en: 'Based on historical league data, you hypothesize the following probability
    distribution for goals scored:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 根据历史联赛数据，你假设进球的概率分布如下：
- en: '![Observed Data and Theoretical Probability](../Images/8238e855a74703f063ab6e6c8b95e65c.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![观察数据与理论概率](../Images/8238e855a74703f063ab6e6c8b95e65c.png)'
- en: Observed Data and Theoretical Probability
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 观察数据与理论概率
- en: Observed Data and Theoretical Probability
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 观察数据与理论概率
- en: This kind of question is perfect for solving with the **Chi-Squared Test for
    Goodness-of-Fit**! Remember that we use this variation to determine whether a
    **single categorical variable (in this case, goals scored) follows a specific
    theoretical or expected distribution (e.g., Poisson)**.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 这种问题非常适合用**卡方拟合优度检验**来解决！记住，我们使用这种变体来确定单个分类变量（在这种情况下，进球数）是否遵循特定的理论或预期分布（例如，泊松分布）。
- en: By comparing the observed data with the theoretical probabilities, we can determine
    whether the two distributions are consistent or significantly different.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 通过比较观察数据与理论概率，我们可以确定两个分布是否一致或存在显著差异。
- en: What this means is that unlike our previous variations of Chi-Squared Test,
    our hypothesis would be looking to see if the distribution of the categorical
    variable matches our theoretical distribution!
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着与我们的先前卡方检验变体不同，我们的假设将试图查看分类变量的分布是否与我们的理论分布相匹配！
- en: '**Null Hypothesis (H₀)**: The observed distribution of goals matches the theoretical
    Poisson distribution.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零假设 (H₀)**: 观察到的进球分布与理论泊松分布相匹配。'
- en: '**Alternative Hypothesis (Hₐ)**: The observed distribution of goals does not
    match the theoretical Poisson distribution.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**备择假设 (Hₐ)**: 观察到的进球分布与理论泊松分布不匹配。'
- en: Since it might be a bit confusing to calculate the expected data, I’ll provide
    you with it! Try out the Chi-Squared Test for Goodness-of-fit yourself!
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 由于计算预期数据可能有点令人困惑，我将为你提供它！自己尝试一下卡方拟合优度检验吧！
- en: '![Expected Data](../Images/e0789202a67e5dc128f0948952c766e2.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![预期数据](../Images/e0789202a67e5dc128f0948952c766e2.png)'
- en: Expected Data
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 预期数据
- en: Answer
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 答案
- en: '[PRE2]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '* * *'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Summary
  id: totrans-135
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Using soccer as a case study, we got to see how **Chi-Squared Test for Independence**
    can reveal relationships between variables, such as playing styles and match outcomes,
    enabling coaches to strategize more effectively.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 以足球作为案例研究，我们得以看到**卡方独立性检验**如何揭示变量之间的关系，例如比赛风格和比赛结果，使教练能够更有效地制定策略。
- en: Similarly, the **Chi-Squared Test for Homogeneity** helps compare distributions
    across groups, like penalty kick success rates in different tournaments.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，**卡方同质性检验**有助于比较不同组之间的分布，例如不同锦标赛的罚球成功率。
- en: And the **Chi-Squared Goodness-of-Fit Test**? It allows us to evaluate whether
    real-world data, such as goals scored in matches, aligns with a theoretical model,
    like the Poisson distribution, giving us better insights into game patterns and
    possible questions for further analysis.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 而**卡方拟合优度检验**？它使我们能够评估现实世界数据，如比赛中进球数，是否与理论模型（如泊松分布）一致，从而为我们提供更好的游戏模式洞察和进一步分析的可能问题。
- en: I personally thought it was pretty confusing to understand the differences between
    the various types of Chi-Squared tests when I was learning them. My goal was to
    get these cleared up for you so you don’t struggle like I did (Well… I hope this
    article was able to do that for you).
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人在学习这些卡方检验的不同类型时，觉得理解它们之间的区别相当复杂。我的目标是为你澄清这些，让你不会像我一样感到困惑（嗯……我希望这篇文章能为你做到这一点）。
- en: I hope you were able to learn something!
