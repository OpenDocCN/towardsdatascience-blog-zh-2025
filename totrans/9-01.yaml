- en: The term "Chi-Squared Test" is often thrown around without much clarification
    about which specific test is being referenced. Of course, if you are a data scientist,
    you should know type of test that the other is referring to. However, if you are
    someone just jumping into their data science career or learning about data science,
    it’s pretty understandable that this distinction can be confusing.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: “卡方检验”这个术语经常被提及，但很少明确指出具体指的是哪种测试。当然，如果你是数据科学家，你应该知道其他人在指哪种测试。然而，如果你是刚开始数据科学职业生涯或学习数据科学的人，这种区别可能会让人感到困惑。
