- en: Think. Know. Act. How AI’s Core Capabilities Will Shape the Future of Work
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 思考。知识。行动。AI的核心能力如何塑造工作的未来
- en: 原文：[https://towardsdatascience.com/think-know-act-how-ais-core-capabilities-will-shape-the-future-of-work/](https://towardsdatascience.com/think-know-act-how-ais-core-capabilities-will-shape-the-future-of-work/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/think-know-act-how-ais-core-capabilities-will-shape-the-future-of-work/](https://towardsdatascience.com/think-know-act-how-ais-core-capabilities-will-shape-the-future-of-work/)
- en: '*“It is not the strongest of the species that survives, nor the most intelligent,
    but the one most responsive to change.” – Charles Darwin, Originator of Evolutionary
    Theory*'
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“不是最强壮的物种能够生存，也不是最聪明的物种能够生存，而是最能适应变化的物种。” ——查尔斯·达尔文，进化论的创始人*'
- en: '<mdspan datatext="el1746513951313" class="mdspan-comment">Not long ago</mdspan>,
    I came across an article about a CEO, who was visibly frustrated with their company’s
    new AI assistant. The system could draft nice emails in seconds and answer generic
    questions quite well. But when asked for an update on a specific project, it just
    stalled. “Why can’t the AI assistant just pull up our data and show us what’s
    going on?” Despite its apparent sophistication, the AI assistant couldn’t access
    the company’s internal knowledge or take meaningful actions. It’s a scenario many
    business leaders are encountering today: high expectations for AI, followed by
    surprisingly limited results.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746513951313" class="mdspan-comment">不久前</mdspan>，我遇到了一篇关于一位CEO的文章，他对公司的新AI助手感到明显的不满。该系统能在几秒钟内起草漂亮的电子邮件，并且相当好地回答一般性的问题。但当被要求提供特定项目的更新时，它却停滞不前。“为什么AI助手不能仅仅调取我们的数据并展示正在发生的事情？”尽管AI助手看起来很复杂，但它无法访问公司的内部知识或采取有意义的行动。这是许多商业领袖今天正在遇到的情况：对AI的高期望，随后是令人惊讶的有限结果。
- en: 'The disconnect often stems from a misunderstanding of what AI can and cannot
    do. AI isn’t a single, super intelligence. It’s a system made up of distinct capabilities.
    And to truly leverage AI in the enterprise, leaders need a clear way to evaluate
    those capabilities. In my experience, it helps to break things down into three
    core capabilities: the ability to Think, Know, and Act.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这种脱节通常源于对AI能做什么和不能做什么的误解。AI不是一个单一的超级智能，而是一个由不同能力组成的系统。为了真正在企业中利用AI，领导者需要一种清晰的方式来评估这些能力。根据我的经验，将事物分解为三个核心能力——思考、知识和行动——是有帮助的。
- en: '![](../Images/d817cfdb390dfb80170d365e7cc2f6f4.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d817cfdb390dfb80170d365e7cc2f6f4.png)'
- en: Photo by Weiwei Hu from [The Next Step](https://thenextsteps1.substack.com/)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由胡伟伟来自 [The Next Step](https://thenextsteps1.substack.com/)
- en: 'Think-Know-Act is a simple framework for cutting through the noise. It breaks
    modern AI into three essential capabilities that drive real business value:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: Think-Know-Act是一个简单的框架，用于穿透噪音。它将现代AI分解为三个推动真实商业价值的核心能力：
- en: '**Think (Agent)**: The ability to reason, plan and make decisions autonomously.
    Agents break down complex goals into steps, adapt to context, and coordinate actions
    without constant human input.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**思考（代理）**：自主推理、规划和做决定的能力。代理将复杂目标分解为步骤，适应上下文，并在不需要持续的人为输入的情况下协调行动。'
- en: '**Know (RAG)**: The ability to access and apply relevant knowledge. Retrieval-Augmented
    Generation (RAG) enables AI to reference internal documents, databases, and external
    sources for accurate, context-aware responses.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识（RAG）**：访问和应用相关知识的能力。检索增强生成（RAG）使AI能够参考内部文档、数据库和外部来源，以提供准确、上下文感知的响应。'
- en: '**Act (MCP)**: The ability to execute tasks by interacting with tools, systems
    and workflows. Model Context Protocol (MCP) connects AI to APIs, business systems,
    and applications, enabling it to complete actions, not just suggest them.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动（MCP）**：通过与工具、系统和工作流程交互来执行任务的能力。模型上下文协议（MCP）将AI连接到API、业务系统和应用程序，使其能够完成行动，而不仅仅是提出建议。'
- en: When all these three capabilities come together, AI evolves from a helpful assistant
    into a strategic, action-oriented collaborator. It doesn’t just respond, it reasons,
    learns, and takes meaningful steps toward your business goals. In this article,
    I’ll break down each capability and explore how understanding this framework can
    drive smarter, more effective AI adoption across your organization.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当这三个能力结合在一起时，AI就从有用的助手演变成为一个战略性的、以行动为导向的合作伙伴。它不仅响应，还会推理、学习，并朝着你的商业目标采取有意义的步骤。在这篇文章中，我将分解每个能力，并探讨理解这个框架如何推动你组织更智能、更有效的AI采用。
- en: '* * *'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Think: AI That Reasons and Plans (Agent Capability)'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 思考：具有推理和规划能力的AI（代理能力）
- en: '![](../Images/a5a54333a2d94416d162e6837f65b326.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a5a54333a2d94416d162e6837f65b326.png)'
- en: Photo from [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自 [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
- en: When we say an AI can think, we don’t just mean it can respond. It means that
    it can reason through problems and make decisions in a goal-oriented way. It can
    break down a problem, set a goal, and define a logical path forward. This is the
    core capability behind AI agents, which go far beyond simple chatbots. Unlike
    traditional models that react to prompts, agents can plan, prioritize, and adapt,
    operating more like autonomous collaborators than scripted tools.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们说AI能够思考时，我们不仅仅是指它能够做出响应。这意味着它能够通过问题进行推理，并以目标为导向做出决策。它能够分解问题，设定目标，并定义一个逻辑的前进路径。这是AI智能体的核心能力，它远远超出了简单的聊天机器人。与仅仅对提示做出反应的传统模型不同，智能体可以规划、优先排序和适应，它们更像自主的合作伙伴而不是脚本工具。
- en: '*“LLMs generate responses. Agents make decisions. They don’t just answer; they
    think, decide, and act.”*'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“大型语言模型生成响应，智能体做出决策。它们不仅仅是回答问题；它们思考、决策并采取行动。”*'
- en: In a business context, a thinking AI functions like a smart analyst on your
    team, who doesn’t wait for step-by-step instructions, but instead takes initiative,
    figures out how to move from question to solution, and adapts as new information
    emerges.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业环境中，思考型AI就像您团队中的智能分析师，它不会等待一步一步的指令，而是主动采取行动，找出如何从问题到解决方案的路径，并在新信息出现时进行调整。
- en: 'Recent advancements have made it possible for AI agents to break down complex
    tasks into subtasks, use tools as needed, and iterate toward a solution. For example,
    imagine you ask an AI to schedule a multi-city business trip. A basic AI might
    ask you follow-up questions or offer a few travel suggestions. Instead of merely
    suggesting travel options, an agentic AI can plan out the entire workflow: it
    might autonomously check your calendar, search for flights, compare hotel prices,
    and then assembles a complete travel itinerary from start to finish all without
    needing step-by-step direction. This kind of capability is what allows AI to operate
    with a degree of freedom, pursuing outcomes through logical steps rather than
    waiting for explicit instructions to be spelled out..'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 近期的发展使得AI智能体能够将复杂任务分解为子任务，根据需要使用工具，并迭代向解决方案迈进。例如，想象您要求AI安排一次多城市商务旅行。一个基本的AI可能会询问您后续问题或提供一些旅行建议。而一个智能体AI不仅可以提出旅行选项，还可以规划整个工作流程：它可能会自主检查您的日历，搜索航班，比较酒店价格，然后从始至终组装一个完整的旅行行程，而无需一步一步的指导。这种能力使得AI能够在一定程度上自由操作，通过逻辑步骤追求结果，而不是等待明确的指令。
- en: 'For executives, the true value of thinking AI lies in efficiency and proactivity.
    Instead of just waiting for a prompt, say producing a report when asked, an AI
    agent can proactively identify a trend in your sales data, and recommend next
    steps before you even ask. This transforms AI from a passive tool to an active
    advisor. When evaluating AI solutions, ask yourself:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 对于高管来说，思考型AI的真实价值在于效率和主动性。AI智能体不再只是等待提示，比如在需要时生成报告，它还可以主动识别您的销售数据中的趋势，并在您提出问题之前就推荐下一步行动。这把AI从被动工具转变为主动顾问。在评估AI解决方案时，请自问：
- en: '*Does this system simply responding, or can it think through the tasks and
    figure things out on its own?*'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*这个系统仅仅是响应，还是能够通过任务进行思考并自行解决问题？*'
- en: The more your AI can truly reason, the more complexity it can manage, and the
    more strategic time your team wins back.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 您的AI越能真正推理，它就能处理越复杂的任务，您的团队能够赢回更多战略性的时间。
- en: '* * *'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Know: AI That Remembers and Learns (Knowledge via RAG)'
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 了解：能够记忆和学习的AI（通过RAG获取知识）
- en: '![](../Images/dcbee7810a8125d4e521727b0c6a90e9.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dcbee7810a8125d4e521727b0c6a90e9.png)'
- en: Photo from [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自 [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
- en: The know capability is what gives AI access to relevant information that matters,
    especially information that is unique to your business. Even the most sophisticated
    reasoning engine falls short without having the right context. Traditional AI
    models are trained only on the data they were fed during development, which means
    they quickly become outdated. They can’t access your latest policy changes, pricing
    models, customer feedback, or market shifts unless they’re connected to your current
    sources of truth.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 知识能力是赋予AI访问相关信息的途径，尤其是那些对您的业务独特的信息。即使是最复杂的推理引擎，如果没有正确的上下文，也会力不从心。传统的AI模型仅在其开发过程中被训练的数据，这意味着它们很快就会过时。除非它们连接到您当前的真相来源，否则它们无法访问您最新的政策变更、定价模型、客户反馈或市场变化。
- en: 'This is where Retrieval-Augmented Generation (RAG) comes in. RAG allows AI
    to dynamically pull information from trusted sources, including your documents,
    databases, and systems in real time. In other words, it gives AI models something
    it otherwise lacks: a dynamic working memory, a way to remember the things it
    was never originally trained on. Instead of relying solely on outdated training
    data, RAG enables AI to access and apply up-to-date, business-specific knowledge,
    anchoring its responses in your current business reality.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是检索增强生成（RAG）发挥作用的地方。RAG允许AI从受信任的来源动态地获取信息，包括你的文档、数据库和系统，实时进行。换句话说，它为AI模型提供了它原本缺乏的东西：一个动态的工作记忆，一种记住它从未最初训练过的东西的方式。RAG不再仅仅依赖于过时的训练数据，它使AI能够访问和应用最新的、业务特定的知识，将响应锚定在你的当前业务现实中。
- en: Consider a customer support assistant. Without retrieval, it might only offer
    generic responses that maybe helpful or maybe not, because it can’t access the
    customer order history or your company’s knowledge base. With RAG, that same assistant
    can instantly pull up the exact purchase details, check the latest return policy
    while it’s talking to the customer, and deliver a precise, helpful answer in real
    time. As McKinsey notes, RAG enables AI models to tap into an organization’s proprietary
    knowledge base without costly retraining, enabling outputs that are far more relevant,
    specific, and trustworthy.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个客户支持助手。没有检索，它可能只能提供可能有用或无用的通用响应，因为它无法访问客户订单历史或你公司的知识库。有了RAG，同样的助手可以立即调出确切的购买详情，在与客户交谈时检查最新的退货政策，并在实时提供精确、有用的答案。正如麦肯锡指出，RAG使AI模型能够利用组织的专有知识库，而无需昂贵的重新训练，从而产生更相关、具体和值得信赖的输出。
- en: In practice, this leads to more accurate, relevant responses, and far fewer
    instances of the AI saying “I don’t have that information.” This shift can significantly
    increase both relevance and trust.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，这导致更准确、相关的响应，以及AI说“我没有那个信息”的实例大大减少。这种转变可以显著提高相关性和信任度。
- en: 'For leaders, the takeaway is clear: if you want AI to speak to your company’s
    knowledge and context, and not just the internet’s, it needs a way to know. That
    means secure and robust access to your proprietary data, governed and structured
    for retrieval. An AI that understands your business, including its content, data,
    and decisions, will deliver far more value than one that guesses in the dark.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对于领导者来说，结论是明确的：如果你想AI能够与你的公司知识和背景对话，而不仅仅是互联网上的，它需要一种了解的方式。这意味着对专有数据的安全、稳健访问，以及用于检索的治理和结构化。一个理解你的业务，包括其内容、数据和决策的AI，将比一个在黑暗中猜测的AI带来更大的价值。
- en: '* * *'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Act: AI That Takes Action (Execution via MCP)'
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 行动：采取行动的AI（通过MCP执行）
- en: '![](../Images/c7acd44b4d4ba7a161aa52dfdd70caa2.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c7acd44b4d4ba7a161aa52dfdd70caa2.png)'
- en: Photo from [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自 [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
- en: The act capability is what transforms AI from an advisor into an executor. It’s
    the difference between an assistant that tells you what needs be done, and one
    that actually does it. This means triggering workflows, calling APIs, updating
    systems, and taking real-world actions on your behalf.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 行动能力是将AI从顾问转变为执行者的关键。它区别于只是告诉你需要做什么的助手，和真正去做的助手。这意味着触发工作流程、调用API、更新系统，并代表你采取现实世界的行动。
- en: If Think is the “brain” and Know is the “memory,” then Act is the “hands” of
    an AI system. It’s what allows AI to complete tasks end-to-end, not just suggest
    what to do. It empowers AI to move beyond insights and recommendations to deliver
    real outcomes. It’s the final step that turns intelligence into impact.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如果“Think”是“大脑”，“Know”是“记忆”，那么“Act”就是AI系统的“双手”。它允许AI完成端到端任务，而不仅仅是提出建议。它使AI能够超越洞察和建议，交付实际成果。这是将智能转化为影响的最后一步。
- en: For example, consider an AI sales assistant that not only drafts a follow-up
    email to a partner, but also automatically sends it once you approve the content.
    Or an AI operations assistant that detects an inventory shortfall and places a
    restock order directly through your procurement system. These aren’t futuristic
    scenarios, they’re capabilities already taking shape through AI integrations with
    enterprise systems.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑一个AI销售助手，它不仅能起草给合作伙伴的跟进电子邮件，在你批准内容后还能自动发送。或者是一个AI运营助手，它能检测库存短缺并直接通过你的采购系统下补货订单。这些不是未来场景，它们是通过AI与企业系统集成而正在形成的功能。
- en: We’re already seeing early examples of AI act in motion with tools like ChatGPT’s
    plugins, which can book meetings or retrieve live data, and MS365 Copilot, which
    can update spreadsheets, send emails, or adjust calendars based on natural language
    prompts. These emerging capabilities show how AI can move from suggesting actions
    to actually executing them.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到了AI通过像ChatGPT插件这样的工具在行动中的早期例子，这些插件可以预订会议或检索实时数据，还有MS365 Copilot，它可以根据自然语言提示更新电子表格、发送电子邮件或调整日历。这些新兴能力展示了AI如何从建议行动到实际执行行动。
- en: 'To make this kind of execution scalable, the industry is now moving toward
    common standards to make such integrations easier and more secure. One notable
    innovation is Anthropic’s Model Context Protocol (MCP), often described as “a
    USB-C port for AI applications.” MCP provides a universal way to connect AI models
    to different enterprise data sources and tools, enabling them to act without the
    need for custom-built integrations. In short, the act capability is becoming plug-and-play:
    modern AI can now discover and access available tools, and use them to execute
    tasks, without hard-coded integrations.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这种执行方式可扩展，行业现在正朝着共同标准发展，以使此类集成更加容易和安全。一项值得注意的创新是Anthropic的模型上下文协议（MCP），通常被描述为“AI应用的USB-C端口”。MCP提供了一种通用的方式将AI模型连接到不同的企业数据源和工具，使它们能够在无需定制集成的情况下进行操作。简而言之，行动能力正变得即插即用：现代AI现在可以发现和访问可用的工具，并使用它们来执行任务，而无需硬编码的集成。
- en: For executives, the power of act lies in where automation meets tangible business
    value. When AI can take action, it doesn’t just save time, it reduces operational
    friction and accelerates outcomes. Imagine AI that not only generates and distributes
    reports automatically, but also escalates issues and opens support tickets without
    manual intervention. That said, acting AI must be deployed with strong governance
    in mind, including clear permissions, role-based access, and oversight to ensure
    security, accountability, and trust.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 对于高管来说，行动的力量在于自动化与有形商业价值的交汇点。当AI能够采取行动时，它不仅节省时间，还减少了运营摩擦并加速了结果。想象一下，AI不仅可以自动生成和分发报告，还可以在没有人工干预的情况下升级问题并打开支持票证。然而，行动AI必须以强大的治理意识部署，包括明确的权限、基于角色的访问和监督，以确保安全、问责制和信任。
- en: 'When evaluating AI solutions, it’s worth asking:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在评估AI解决方案时，值得问一问：
- en: '*Does this AI system just inform, or can it also implement?*'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*这个AI系统只是提供信息，还是也可以执行操作？*'
- en: Because the ability to act on decisions is what transforms AI from a passive
    observer or analyst into an active team member, one that gets things done.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 因为能够对决策采取行动是将AI从被动的观察者或分析师转变为积极团队成员的能力，一个能够完成任务的角色。
- en: '* * *'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Bringing It All Together: Think + Know + Act'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将一切整合在一起：思考 + 知识 + 行动
- en: 'Each of these capabilities on its own can add value, but the real transformation
    happens when they work together. In a well-designed system, Think, Know, and Act
    complement each other and form a closed loop of intelligent action: AI can reason
    through a complex problem, retrieve the right information it needs, and execute
    the necessary steps, all without manual intervention.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这些能力中的每一个单独都可以增加价值，但真正的变革发生在它们协同工作时。在一个设计良好的系统中，思考、知识和行动相互补充，形成一个智能行动的闭环：AI可以推理复杂问题，检索所需的信息，并执行必要的步骤，而无需人工干预。
- en: This synergy is what shifts AI from being a reactive tool to a proactive collaborator.
    As one expert puts it, combining agentic reasoning with knowledge retrieval and
    execution turns a passive lookup model into an adaptive, intelligent problem-solving
    pipeline. In other words, that means AI doesn’t just chat, but truly gets things
    done and delivers real business outcomes.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这种协同作用将AI从反应性工具转变为主动的合作伙伴。正如一位专家所说，将代理推理与知识检索和执行相结合，将被动查找模型转变为适应性强的、智能的问题解决流程。换句话说，这意味着AI不仅仅是聊天，而是真正地完成任务并产生真正的商业成果。
- en: Let’s bring this to life. Imagine a finance team using AI assistant to help
    manage budget variance analysis. With all three capabilities, the assistant can
    autonomously detect an anomaly in the quarterly spend (Think), pull in relevant
    accounting entries from last quarter’s baseline for comparison (Know), and then
    generate a summary report and email it to the CFO (Act).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将其具体化。想象一下，一个财务团队使用AI助手来帮助管理预算差异分析。凭借所有三种能力，助手可以自主检测季度支出的异常（思考），从上一季度的基线中拉入相关的会计条目进行比较（知识），然后生成总结报告并将其发送给CFO（行动）。
- en: 'Now, imagine that you take away any one of those capabilities: Without Know,
    the AI assistant can’t access the data it needs to diagnose the issue. Without
    Act, the CFO would still be waiting for someone to compile and send the report.
    And without Think, the AI assistant wouldn’t even realize there was an anomaly
    to investigate in the first place. Only when all three work together does the
    system deliver meaningful, autonomous value, transforming AI from a point solution
    into a strategic force multiplier.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，想象一下你移除了这些能力中的任何一个：没有“知”，人工智能助手无法访问它诊断问题所需的数据。没有“行”，首席财务官仍然在等待有人编制并发送报告。没有“思”，人工智能助手甚至不会意识到首先需要调查异常。只有当这三个能力协同工作，系统才能提供有意义的、自主的价值，将人工智能从点解决方案转变为战略性的力量倍增器。
- en: '![](../Images/23c05e5e13eca46916f14f796c712e2e.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/23c05e5e13eca46916f14f796c712e2e.png)'
- en: Photo by Weiwei Hu from [The Next Step](https://thenextsteps1.substack.com/)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由胡伟伟来自 [The Next Step](https://thenextsteps1.substack.com/)
- en: Anotherway to think about AI is to imagine it as the sous chef in your kitchen,
    not the star chef, but the one who keeps everything running smoothly behind the
    scenes. The Know capability is like finding the perfect recipe, it retrieves the
    right information needed for the task. Think is adjusting that recipe based on
    what’s actually in your pantry and who’s coming to dinner, planning and reasoning
    through the situation. Act is what gets the oven preheated and the meal started,
    executing the steps to bring the plan to life. The goal isn’t about replacing
    your expertise, it’s about removing friction, accelerating execution, and scaling
    what already works.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种思考人工智能的方式是将其想象成厨房中的副厨师，而不是明星厨师，而是那个在幕后保持一切顺利运行的人。 “知”的能力就像找到完美的食谱，它检索完成任务所需的信息。
    “思”是根据你 pantry 中的实际物品和晚餐来调整食谱，通过规划和推理来处理情况。 “行”是预热烤箱并开始烹饪，执行将计划付诸实施的步骤。 目标不是取代你的专业知识，而是消除摩擦，加速执行，并扩展已经有效的工作。
- en: '![](../Images/3f3bcf353d8ec089e699a910f3d5a7bb.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3f3bcf353d8ec089e699a910f3d5a7bb.png)'
- en: Photo by Weiwei Hu from [The Next Step](https://thenextsteps1.substack.com/)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由胡伟伟来自 [The Next Step](https://thenextsteps1.substack.com/)
- en: When evaluating AI opportunities in your organization, it’s helpful to map them
    against these three dimensions. Are you exploring a solution that primarily thinks,
    like an AI that can autonomously optimize schedules or make decisions? Or one
    that mainly knows, such as a smart search engine that retrieves and surfaces relevant
    company data? Or perhaps one that acts, like an automation tool that automates
    tasks, triggers workflow or executes decisions?
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在评估组织中 AI 机会时，将这些机会与这三个维度进行映射是有帮助的。 你是否在探索一个主要思考的解决方案，比如一个可以自主优化日程或做出决策的 AI？
    或者一个主要“知”的解决方案，比如一个智能搜索引擎，可以检索和展示相关的公司数据？ 或者可能是一个主要“行”的解决方案，比如一个自动化工具，可以自动化任务、触发工作流或执行决策？
- en: 'The most effective AI solutions often integrate all three capabilities. But
    understanding which capability is missing or overly siloed can quickly explain
    why a promising AI initiative isn’t delivering the expected results. Use Think–Know–Act
    as both a diagnostic lens and strategic decision-making checklist. It brings clarity
    not just to technology evaluation, but to how AI can be implemented in a way that
    drives real business value. Just to recap, here’s a quick summary of the three
    core AI capabilities:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 最有效的 AI 解决方案通常整合了所有三种能力。 但理解哪种能力缺失或过度隔离可以迅速解释为什么一个有希望的 AI 创新没有达到预期的结果。 使用“思-知-行”作为诊断透镜和战略决策清单。
    它不仅为技术评估带来清晰，而且为如何以推动真实商业价值的方式实施 AI 带来清晰。 只是为了回顾，以下是三个核心 AI 能力的快速总结：
- en: '![](../Images/7a09022f8566809201988ad644cd3e40.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7a09022f8566809201988ad644cd3e40.png)'
- en: Photo by Weiwei Hu from [The Next Step](https://thenextsteps1.substack.com/)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由胡伟伟来自 [The Next Step](https://thenextsteps1.substack.com/)
- en: '* * *'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Leading in the Age of AI
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI 时代领导力
- en: 'Enterprise AI adoption should always start with a clear business need, not
    with the technology itself. The Think–Know–Act framework is a practical way to
    cut through the noise and focus on what truly drives impact. By understanding
    these core capabilities, leaders can ask the right questions:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 企业 AI 的采用应该始终从明确的企业需求开始，而不是从技术本身开始。 “思-知-行”框架是一种实用的方法，可以穿越噪音并专注于真正驱动影响的事情。 通过理解这些核心能力，领导者可以提出正确的问题：
- en: Does this AI solution have access to the knowledge it needs?
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个 AI 解决方案是否有访问所需知识的权限？
- en: Can it reason through our business challenges?
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它能否通过我们的业务挑战进行推理？
- en: Will it be able to take action in our environment?
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它能否在我们环境中采取行动？
- en: When you can answer those questions with clarity and confidence, you’re not
    just experimenting with AI. You’re building the right architecture to deliver
    measurable, strategic outcomes.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 当你能清晰自信地回答这些问题时，你不仅仅是在尝试AI。你正在构建正确的架构以实现可衡量的、战略性的成果。
- en: '![](../Images/2b8670e855580bd6e82f5dc01bfd9567.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2b8670e855580bd6e82f5dc01bfd9567.png)'
- en: Photo from [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自 [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
- en: We are at a point where AI can become more than just a tool. It can function
    as a co-worker, a creative problem-solver, an on-demand expert, and a tireless
    assistant all at once. But realizing that vision requires a clear strategy. The
    most successful companies start with a clear business outcome in mind, whether
    it’s improving customer service, streamlining operations, or enhancing decision-making,
    and then assemble the AI capabilities that deliver it.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经到了一个点，AI可以不仅仅是一个工具。它可以同时作为同事、创意问题解决者、按需专家和不知疲倦的助手。但实现这一愿景需要清晰的策略。最成功的公司从明确的业务成果出发，无论是改善客户服务、简化运营还是增强决策，然后组装能够实现这些成果的AI能力。
- en: You don’t need to be a data scientist to lead in this space. You just need to
    champion a capability-first mindset. Encourage your teams to design solutions
    that think with context, know your business, and act to deliver results.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要成为数据科学家就能在这个领域领导。你只需要倡导一种以能力为先的心态。鼓励你的团队设计出具有情境思考、了解你的业务并采取行动以实现结果的解决方案。
- en: 'In the age of AI, clarity is your competitive advantage. By framing AI projects
    or initiatives around the Think–Know–Act framework, you align AI innovation with
    grounded business strategy and real execution. The message for leaders is clear
    and empowering: With a firm grasp on these three core capabilities of modern AI,
    you can lead your company to innovate smarter, execute faster, and navigate the
    AI revolution with confidence.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI时代，清晰是你的竞争优势。通过将AI项目或倡议围绕思考-了解-行动框架进行构建，你将AI创新与基于地面的业务战略和实际执行相一致。对领导者的信息清晰且赋权：掌握现代AI这三个核心能力，你可以引领你的公司更智能地创新、更快地执行，并自信地导航AI革命。
- en: '*AI won’t replace you. But the leaders who know how to Think, Know, and Act
    with it just might.*'
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*AI不会取代你。但那些知道如何用AI思考、了解和行动的领导者可能会。*'
- en: '* * *'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Author’s Note:**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**作者注：**'
- en: 'Think, Know, Act isn’t just about technical depth, it’s about strategic clarity.
    The leaders I admire most aren’t chasing the flashiest tools; they’re asking the
    right questions: What problem are we solving? What capabilities truly move the
    needle? As AI continues to evolve, the executives who can connect capabilities
    to business outcomes won’t just keep up with change, they’ll define and shape
    it.📈🍀'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 思考、了解、行动不仅仅关乎技术深度，更关乎战略清晰。我最钦佩的领导者并不是追逐最炫目的工具；他们是在问正确的问题：我们正在解决什么问题？哪些能力真正推动指针移动？随着AI的持续发展，能够将能力与业务成果联系起来的高管不仅能够跟上变化，还能够定义和塑造它。📈🍀
- en: '*This article was originally published on* [*The Next Step*](https://thenextsteps1.substack.com/)*,
    where I share reflections on leadership, personal growth, and building what’s
    next*. *Feel free to subscribe for more insights!*'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '*这篇文章最初发表在* [*《下一步》*](https://thenextsteps1.substack.com/)*，我在那里分享关于领导力、个人成长和构建未来的反思。*请随意订阅以获取更多见解！*'
