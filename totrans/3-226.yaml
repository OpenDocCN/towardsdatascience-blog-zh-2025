- en: 'The Next AI Revolution: A Tutorial Using VAEs to Generate High-Quality Synthetic
    Data'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 下一场人工智能革命：使用VAEs生成高质量合成数据的教程
- en: 原文：[https://towardsdatascience.com/the-next-ai-revolution-a-tutorial-using-vaes-to-generate-high-quality-synthetic-data/](https://towardsdatascience.com/the-next-ai-revolution-a-tutorial-using-vaes-to-generate-high-quality-synthetic-data/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-next-ai-revolution-a-tutorial-using-vaes-to-generate-high-quality-synthetic-data/](https://towardsdatascience.com/the-next-ai-revolution-a-tutorial-using-vaes-to-generate-high-quality-synthetic-data/)
- en: '**What is synthetic data?**'
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**什么是合成数据？**'
- en: Data created by a computer intended to replicate or augment existing data.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由计算机创建的数据，旨在复制或增强现有数据。
- en: '**Why is it useful?**'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**为什么它有用？**'
- en: We have all experienced the success of ChatGPT, Llama, and more recently, DeepSeek.
    These language models are being used ubiquitously across society and have triggered
    many claims that we are rapidly approaching Artificial General Intelligence — AI
    capable of replicating any human function.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都经历过ChatGPT、Llama以及最近DeepSeek的成功。这些语言模型正被广泛应用于社会，并引发了众多关于我们正在迅速接近通用人工智能的声明——能够复制任何人类功能的AI。
- en: Before getting too excited, or scared, depending on your perspective — we are
    also rapidly approaching a hurdle to the advancement of these language models.
    According to a paper published by a group from the research institute, Epoch [[1]](#[1]),
    *we are running out of data*. They estimate that by 2028 we will have reached
    the upper limit of possible data upon which to train language models.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在过于兴奋或害怕之前（取决于你的观点）——我们也在迅速接近这些语言模型进步的障碍。根据一家研究机构发布的一篇论文，Epoch [[1]](#[1])，*我们正在耗尽数据*。他们估计到2028年，我们将达到训练语言模型的可能数据的上限。
- en: '![](../Images/d705b3b06b900680f72339b1237e6c03.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d705b3b06b900680f72339b1237e6c03.png)'
- en: Image by Author. Graph based on estimated dataset projections. This is a reconstructed
    visualisation inspired by Epoch research group [1].
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。基于估计的数据集预测的图表。这是受Epoch研究小组[1]启发的重建可视化。
- en: '**What happens if we run out of data?**'
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**如果我们耗尽数据会发生什么？**'
- en: Well, if we run out of data then we aren’t going to have anything new with which
    to train our language models. These models will then stop improving. If we want
    to pursue Artificial General Intelligence then we are going to have to come up
    with new ways of improving AI without just increasing the volume of real-world
    training data.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，如果我们耗尽数据，那么我们就不会有什么新东西来训练我们的语言模型。然后这些模型将停止改进。如果我们想追求通用人工智能，那么我们就必须想出新的方法来改进AI，而不仅仅是增加真实世界训练数据量。
- en: One potential saviour is synthetic data which can be generated to mimic existing
    data and has already been used to improve the performance of models like Gemini
    and DBRX.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 一个潜在的救星是合成数据，它可以生成来模拟现有数据，并且已经被用来提高Gemini和DBRX等模型的表现。
- en: '**Synthetic data beyond LLMs**'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**超越LLMs的合成数据**'
- en: 'Beyond overcoming data scarcity for large language models, synthetic data can
    be used in the following situations:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 除了克服大型语言模型的数据稀缺问题外，合成数据还可以用于以下情况：
- en: '**Sensitive Data** — if we don’t want to share or use sensitive attributes,
    synthetic data can be generated which mimics the properties of these features
    while maintaining anonymity.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**敏感数据**——如果我们不想分享或使用敏感属性，可以生成模拟这些特征属性的同时保持匿名性的合成数据。'
- en: '**Expensive data** — if collecting data is expensive we can generate a large
    volume of synthetic data from a small amount of real-world data.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**昂贵的数据**——如果收集数据很昂贵，我们可以从少量真实世界数据生成大量合成数据。'
- en: '**Lack of data **— datasets are biased when there is a disproportionately low
    number of individual data points from a particular group. Synthetic data can be
    used to balance a dataset.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据不足**——当某个特定群体中的个体数据点数量不成比例地低时，数据集会存在偏差。合成数据可以用来平衡数据集。'
- en: '**Imbalanced datasets**'
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**不平衡的数据集**'
- en: Imbalanced datasets can (*but not always*) be problematic as they may not contain
    enough information to effectively train a predictive model. For example, if a
    dataset contains many more men than women, our model may be biased towards recognising
    men and misclassify future female samples as men.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 不平衡的数据集可能（但并非总是）存在问题，因为它们可能不包含足够的信息来有效地训练预测模型。例如，如果一个数据集中男性比女性多得多，我们的模型可能会偏向于识别男性，并将未来的女性样本错误地分类为男性。
- en: In this article we show the imbalance in the popular UCI [Adult dataset](https://archive.ics.uci.edu/dataset/2/adult)
    [[2],](#[2]) and how we can use a **variational auto-encoder** to generate synthetic
    data to improve classification on this example.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们展示了流行的 UCI [Adult 数据集](https://archive.ics.uci.edu/dataset/2/adult) [[2],](#[2])
    中的不平衡情况，以及我们如何使用 **变分自编码器** 生成合成数据以改善此示例的分类。
- en: We first download the Adult dataset. This dataset contains features such as
    age, education and occupation which can be used to predict the target outcome
    ‘income’.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先下载 Adult 数据集。这个数据集包含年龄、教育程度和职业等特征，可用于预测目标结果“收入”。
- en: '[PRE0]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In the Adult dataset, income is a binary variable, representing individuals
    who earn above, and below, $50,000\. We plot the distribution of income over the
    entire dataset below. We can see that the dataset is heavily imbalanced with a
    far larger number of individuals who earn less than $50,000.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Adult 数据集中，收入是一个二元变量，表示收入高于和低于 $50,000$ 的人。我们下面绘制了整个数据集中收入的分布。我们可以看到，数据集严重不平衡，收入低于
    $50,000$ 的人数量远多于收入高于 $50,000$ 的人。
- en: '![](../Images/2d3917d5197a2fe2d396984b919f5cc3.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2d3917d5197a2fe2d396984b919f5cc3.png)'
- en: 'Image by Author. Original dataset: Number of data instances with the label
    ≤50k and >50k. There is a disproportionately larger representation of individuals
    who earn less than 50k in the dataset.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。原始数据集：标签数量在 ≤50k 和 >50k 的数据实例数量。数据集中低于 50k 收入的个人比例明显偏高。
- en: Despite this imbalance we can still train a machine learning classifier on the
    Adult dataset which we can use to determine whether unseen, or test, individuals
    should be classified as earning above, or below, 50k.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管存在这种不平衡，我们仍然可以在 Adult 数据集上训练一个机器学习分类器，我们可以用它来确定未见过的或测试的个人应该被分类为收入高于还是低于 50k。
- en: '[PRE1]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Printing out the confusion matrix of our classifier shows that our model performs
    fairly well despite the imbalance. Our model has an overall error rate of 16%
    but the error rate for the positive class (income > 50k) is 36% where the error
    rate for the negative class (income < 50k) is 8%.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 打印出我们分类器的混淆矩阵显示，尽管存在不平衡，我们的模型表现相当好。我们的模型的整体错误率为 16%，但正类（收入 > 50k）的错误率为 36%，而负类（收入
    < 50k）的错误率为 8%。
- en: This discrepancy shows that the model is indeed biased towards the negative
    class. The model is frequently incorrectly classifying individuals who earn more
    than 50k as earning less than 50k.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这种差异表明模型确实偏向于负类。模型经常错误地将收入超过 50k 的人分类为收入低于 50k。
- en: Below we show how we can use a variational autoencoder to generate synthetic
    data of the positive class to balance this dataset. We then train the same model
    using the synthetically balanced dataset and reduce model errors on the test set.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 下面我们展示如何使用变分自编码器生成正类的合成数据以平衡这个数据集。然后我们使用合成的平衡数据集训练相同的模型，并在测试集上减少模型错误。
- en: '![](../Images/261c134a4764427fb3899d53e34e34c9.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/261c134a4764427fb3899d53e34e34c9.png)'
- en: Image by Author. Confusion matrix for predictive model on original dataset.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。原始数据集上预测模型的混淆矩阵。
- en: '**How can we generate synthetic data?**'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**我们如何生成合成数据？**'
- en: There are lots of different methods for generating synthetic data. These can
    include more traditional methods such as SMOTE and Gaussian Noise which generate
    new data by modifying existing data. Alternatively Generative models such as Variational
    Autoencoders or General Adversarial networks are predisposed to generate new data
    as their architectures learn the distribution of real data and use these to generate
    synthetic samples.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 存在许多不同的生成合成数据的方法。这些方法可以包括更传统的如 SMOTE 和高斯噪声，通过修改现有数据来生成新数据。或者，生成模型如变分自编码器或通用对抗网络，由于它们的架构学习真实数据的分布，并使用这些分布来生成合成样本。
- en: '**In this tutorial we use a variational autoencoder to generate synthetic data.**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**在本教程中，我们使用变分自编码器生成合成数据。**'
- en: '**Variational Autoencoders**'
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**变分自编码器**'
- en: Variational Autoencoders (VAEs) are great for synthetic data generation because
    they use real data to learn a continuous latent space. We can view this latent
    space as a magic bucket from which we can sample synthetic data which closely
    resembles existing data. The continuity of this space is one of their big selling
    points as it means the model generalises well and doesn’t just memorise the latent
    space of specific inputs.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 变分自编码器（VAEs）非常适合合成数据生成，因为它们使用真实数据来学习一个连续的潜在空间。我们可以将这个潜在空间视为一个神奇的桶，从中我们可以采样合成数据，这些数据与现有数据非常相似。这个空间的连续性是它们的一个大卖点，因为它意味着模型具有良好的泛化能力，而不仅仅是记住特定输入的潜在空间。
- en: A VAE consists of an **encoder**, which maps input data into a probability distribution
    (mean and variance) and a **decoder**, which reconstructs the data from the latent
    space.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: VAE 由一个 **编码器** 组成，它将输入数据映射到一个概率分布（均值和方差），以及一个 **解码器**，它从潜在空间重建数据。
- en: For that continuous latent space, VAEs use a reparameterization trick**,** where
    a random noise vector is scaled and shifted using the learned mean and variance,
    ensuring smooth and continuous representations in the latent space.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个连续的潜在空间，VAEs 使用一个重新参数化技巧**，其中随机噪声向量通过学习的均值和方差进行缩放和偏移，确保在潜在空间中的平滑和连续表示。
- en: Below we construct a **BasicVAE** class which implements this process with a
    simple architecture.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 下面我们构建一个 **BasicVAE** 类，该类使用简单的架构实现此过程。
- en: '** The encoder** compresses the input into a smaller, hidden representation,
    producing both a mean and log variance that define a Gaussian distribution aka
    creating our magic sampling bucket. Instead of directly sampling, the model applies
    the reparameterization trick to generate latent variables, which are then passed
    to the decoder.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编码器**将输入压缩成一个更小、隐藏的表示，产生一个均值和一个对数方差，这些定义了一个高斯分布，即创建我们的神奇采样桶。模型不是直接采样，而是应用重新参数化技巧来生成潜在变量，然后将这些变量传递给解码器。'
- en: '**The decoder** reconstructs the original data from these latent variables,
    ensuring the generated data maintains characteristics of the original dataset.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解码器**从这些潜在变量中重建原始数据，确保生成的数据保持原始数据集的特征。'
- en: '[PRE2]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Given our BasicVAE architecture we construct our loss functions and model training
    below.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 给定我们的 BasicVAE 架构，我们构建了下面的损失函数和模型训练。
- en: '[PRE3]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**vae_loss** consists of two components: **reconstruction loss**, which measures
    how well the generated data matches the original input using Mean Squared Error
    (MSE), and **KL divergence loss**, which ensures that the learned latent space
    follows a normal distribution.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**vae_loss** 由两个部分组成：**重建损失**，它通过均方误差（MSE）衡量生成的数据与原始输入匹配的程度，以及 **KL 散度损失**，确保学习的潜在空间遵循正态分布。'
- en: '**train_vae** optimises the VAE using the Adam optimizer over multiple epochs.
    During training, the model takes mini-batches of data, reconstructs them, and
    computes the loss using **vae_loss**. These errors are then corrected via backpropagation
    where the model weights are updated. We train the model for 50 epochs and plot
    how the reconstruction mean squared error decreases over training.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**train_vae** 使用 Adam 优化器在多个时期优化 VAE。在训练过程中，模型取数据的小批量，重建它们，并使用 **vae_loss**
    计算损失。然后通过反向传播纠正这些错误，更新模型权重。我们训练模型 50 个时期，并绘制重建均方误差随训练降低的图表。'
- en: We can see that our model learns quickly how to reconstruct our data, evidencing
    efficient learning.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，我们的模型快速学会了如何重建我们的数据，这证明了高效的学习。
- en: '![](../Images/510a5046e1b46f05a6bb81ad47b35202.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/510a5046e1b46f05a6bb81ad47b35202.png)'
- en: Image by Author. Reconstruction MSE of BasicVAE on the Adult dataset.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。BasicVAE 在 Adult 数据集上的重建均方误差。
- en: Now we have trained our BasicVAE to accurately reconstruct the Adult dataset
    we can now use it to generate synthetic data. We want to generate more samples
    of the positive class (individuals who earn over 50k) in order to balance out
    the classes and remove the bias from our model.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经训练了 BasicVAE，能够准确重建 Adult 数据集，我们可以现在用它来生成合成数据。我们想要生成更多正类（收入超过 50k 的人）的样本，以便平衡类别并消除模型中的偏差。
- en: To do this we select all the samples from our VAE dataset where income is the
    positive class (earn more than 50k). We then encode these samples into the latent
    space. As we have only selected samples of the positive class to encode, this
    latent space will reflect properties of the positive class which we can sample
    from to create synthetic data.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，我们从我们的VAE数据集中选择所有收入为正类（收入超过50k）的样本。然后我们将这些样本编码到潜在空间中。由于我们只选择了正类的样本进行编码，这个潜在空间将反映正类的特性，我们可以从中采样以创建合成数据。
- en: We sample 15000 new samples from this latent space and decode these latent vectors
    back into the input data space as our synthetic data points.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从这个潜在空间中采样15000个新样本，并将这些潜在向量解码回输入数据空间，作为我们的合成数据点。
- en: '[PRE4]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now we have generated synthetic data of the positive class, we can combine this
    with the original training data to generate a balanced synthetic dataset.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经生成了正类的合成数据，我们可以将其与原始训练数据结合起来，生成一个平衡的合成数据集。
- en: '[PRE5]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/b4d5189a7d63101e2a50dbc3d0d61984.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/b4d5189a7d63101e2a50dbc3d0d61984.png)'
- en: 'Image by Author. Synthetic dataset: Number of data instances with the label
    ≤50k and >50k. There are now a balanced number of individuals earning more and
    less than 50k.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图像由作者提供。合成数据集：标签≤50k和>50k的数据实例数量。现在有均衡数量的个人收入超过和低于50k。
- en: We can now use our balanced training synthetic dataset to retrain our random
    forest classifier. We can then evaluate this new model on the original test data
    to see how effective our synthetic data is at reducing the model bias.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以使用我们的平衡训练合成数据集来重新训练我们的随机森林分类器。然后我们可以在原始测试数据上评估这个新模型，看看我们的合成数据在减少模型偏差方面有多有效。
- en: '[PRE6]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Our new classifier, trained on the balanced synthetic dataset makes fewer errors
    on the original test set than our original classifier trained on the imbalanced
    dataset and our error rate is now reduced to 14%.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的新分类器，在平衡的合成数据集上训练，在原始测试集上的错误率比我们在不平衡数据集上训练的原始分类器要低，我们的错误率现在降低到14%。
- en: '![](../Images/cd03fb2096ca70c3fc5e9ec50bbe1a30.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/cd03fb2096ca70c3fc5e9ec50bbe1a30.png)'
- en: Image by Author. Confusion matrix for predictive model on synthetic dataset.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图像由作者提供。合成数据集上预测模型的混淆矩阵。
- en: 'However, we have not been able to reduce the discrepancy in errors by a significant
    amount, our error rate for the positive class is still 36%. This could be due
    to to the following reasons:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们并没有能够显著减少错误差异，我们对于正类的错误率仍然是36%。这可能是因为以下原因：
- en: We have discussed how one of the benefits of VAEs is the learning of a continuous
    latent space. However, if the majority class dominates, the latent space might
    skew towards the majority class.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们讨论了VAE的一个好处是学习一个连续的潜在空间。然而，如果多数类占主导地位，潜在空间可能会偏向多数类。
- en: The model may not have properly learned a distinct representation for the minority
    class due to the lack of data, making it hard to sample from that region accurately.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于数据不足，模型可能没有正确地学习少数类的独特表示，这使得从该区域准确采样变得困难。
- en: '**In this tutorial we have introduced and built a BasicVAE architecture which
    can be used to generate synthetic data which improves the classification accuracy
    on an imbalanced dataset. **'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**在本教程中，我们介绍了并构建了一个BasicVAE架构，该架构可用于生成合成数据，从而在不平衡数据集上提高分类精度。**'
- en: Follow for future articles where I will show how we can build more sophisticated
    VAE architectures which address the above problems with imbalanced sampling and
    more.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 关注未来的文章，我将展示我们如何构建更复杂的VAE架构，这些架构可以解决不平衡采样和更多的问题。
