  type: TYPE_NORMAL
- en: 'At [**Graphlet AI**](https://graphlet.ai/) **we build autonomous agents powered
    by entity resolved knowledge graphs** for companies large and small. We build
    large knowledge graphs from structured and unstructured data: millions, billions
    or trillions of nodes and edges. I lead the [Spark GraphFrames](https://graphframes.io/)
    project, widely used in entity resolution for [connected components](https://graphframes.io/user-guide.html#connected-components).
    I have a 20 year background and [teach](https://github.com/Graphlet-AI/graphml-class)
    network science, graph machine learning and NLP. I built and product managed [LinkedIn
    InMaps](https://www.linkedin.com/blog/member/product/linkedin-inmaps) and [Career](https://www.linkedin.com/business/talent/blog/product-tips/career-explorer)
    [Explorer](https://techcrunch.com/2010/10/03/linkedin-targets-college-students-with-career-path-data-visualizations/).
    I was a visualization engineer at [Ning](https://en.wikipedia.org/wiki/Ning_%28website%29)
    (Marc Andreesen’s social network), evangelist at Hortonworks and Principal Data
    Scientist at Walmart. I coined the term “agile data science” in 2009 (from 0 hits
    on Google) and wrote the first agile data science methodology in Agile Data Science
    (O’Reilly Media, 2013). I improved it in [Agile Data Science 2.0](https://learning.oreilly.com/library/view/agile-data-science/9781491960103/)
    (O’Reilly Media, 2017), which has a [4-star rating on Amazon](https://www.amazon.com/Agile-Data-Science-2-0-Applications-ebook/dp/B072MKL34K/)
    8 years later ([code still works](https://github.com/rjurney/Agile_Data_Code_2)).
    I wrote the 1st [fully data-driven market report](https://www.oreilly.com/library/view/mapping-big-data/9781491927847/)
    for O’Reilly Media in 2015\. I’m an [Apache Committer](https://home.apache.org/phonebook.html?uid=rjurney)
    on [DataFu](https://projects.apache.org/committee.html?datafu), I wrote the [Apache
    Druid onboarding docs](https://github.com/apache/druid/commits/master/?author=rjurney),
    and I maintain graph sampler [Little Ball of Fur](https://github.com/benedekrozemberczki/littleballoffur%20benedekrozemberczki/littleballoffur:%20Little%20Ball%20of%20Fur%20-%20A%20graph%20sampling%20extension%20library%20for%20NetworKit%20and%20NetworkX%20%28CIKM%202020%29)
    and graph embedding collection [Karate Club](https://github.com/benedekrozemberczki/karateclub%20benedekrozemberczki/karateclub).'
