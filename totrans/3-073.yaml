  type: TYPE_NORMAL
  zh: Brian Keng 的[博客](https://bjlkeng.io/posts/probabilistic-interpretation-of-regularization/)从概率的角度解释了正则化。
- en: This [thread](https://stats.stackexchange.com/questions/45643/why-l1-norm-for-sparse-models)
    on CrossValidated explains why L1 norm encourages sparse models. A detailed [blog](https://medium.com/@mukulranjan/how-does-lasso-regression-l1-encourage-zero-coefficients-but-not-the-l2-20e4893cba5d)
    by Mukul Ranjan explains why L1 norm encourages the parameters to become zero
    and not the L2 norm.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这篇在 CrossValidated 上的[帖子](https://stats.stackexchange.com/questions/45643/why-l1-norm-for-sparse-models)解释了为什么
    L1 范数会鼓励稀疏模型。Mukul Ranjan 写的详细[博客](https://medium.com/@mukulranjan/how-does-lasso-regression-l1-encourage-zero-coefficients-but-not-the-l2-20e4893cba5d)解释了为什么
    L1 范数鼓励参数变为零而不是 L2 范数。
- en: “L1 regularization performs feature selection” is a simple statement that most
    ML learners agree with, without diving deep into how it works internally. This
    blog is an attempt to bring my understanding and mental-model to the readers in
    order to answer the question in an intuitive manner. For suggestions and doubts,
    you can find my email at my [website](https://shubham0204.github.io). Keep learning
    and have a nice day ahead!
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: “L1 正则化执行特征选择”是一个大多数机器学习学习者都同意的简单陈述，但没有深入探讨其内部工作原理。这篇博客试图将我的理解和心理模型带给读者，以便以直观的方式回答这个问题。对于建议和疑问，你可以在我的[网站](https://shubham0204.github.io)上找到我的电子邮件。继续学习，祝你有美好的一天！
