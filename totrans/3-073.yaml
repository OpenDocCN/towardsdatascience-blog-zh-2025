- en: 'Explained: How Does L1 Regularization Perform Feature Selection?'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 解释：L1正则化如何执行特征选择？
- en: 原文：[https://towardsdatascience.com/explained-how-does-l1-regularization-perform-feature-selection/](https://towardsdatascience.com/explained-how-does-l1-regularization-perform-feature-selection/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/explained-how-does-l1-regularization-perform-feature-selection/](https://towardsdatascience.com/explained-how-does-l1-regularization-perform-feature-selection/)'
- en: <mdspan datatext="el1745349044810" class="mdspan-comment">Feature selection</mdspan>
    is the process of selecting an optimal subset of features from a given set of
    features; an optimal feature subset is the one which maximizes the performance
    of the model on the given task.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745349044810" class="mdspan-comment">特征选择</mdspan>是从给定的特征集中选择一个最优特征子集的过程；最优特征子集是最大化模型在给定任务上性能的子集。
- en: Feature selection can be a manual or rather explicit process when performed
    with **filter or wrapper methods**. In these methods, features are added or removed
    iteratively based on the value of a fixed measure, which quantifies the relevance
    of the feature in the making the prediction. The measures could be information
    gain, variance or the chi-squared statistic, and the algorithm would make a decision
    to accept/reject the feature considering a fixed threshold on the measure. Note,
    these methods are not a part of the model training stage and are performed prior
    to it.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用**过滤或包装方法**执行时，特征选择可以是一个手动或相对明确的过程。在这些方法中，特征是根据一个固定度量值迭代地添加或删除的，该度量值量化了特征在做出预测中的相关性。这些度量可以是信息增益、方差或卡方统计量，算法会根据固定阈值在度量上做出接受/拒绝特征的决策。请注意，这些方法不是模型训练阶段的一部分，而是在它之前执行的。
- en: '**Embedded methods** perform feature selection implicitly, without using any
    pre-defined selection criteria and deriving it from the training data itself.
    This intrinsic feature selection process is a part of the model training stage.
    The model learns to select features and make relevant predictions at the same
    time. In later sections, we will describe the role of regularization in performing
    this intrinsic feature selection.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**嵌入式方法**隐式地执行特征选择，不使用任何预定义的选择标准，而是从训练数据本身推导出来。这个内在的特征选择过程是模型训练阶段的一部分。模型学习同时选择特征和做出相关预测。在后面的章节中，我们将描述正则化在执行这种内在特征选择中的作用。'
- en: Regularization and Model Complexity
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正则化和模型复杂性
- en: Regularization is the process of penalizing the complexity of the model to avoid
    overfitting and achieve generalization over the task.
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 正则化是惩罚模型复杂性的过程，以避免过拟合并在任务上实现泛化。
- en: Here, the complexity of the model is analogous to its power to adapt to the
    patterns in the training data. Assuming a simple polynomial model in ‘***x***’
    with degree ‘***d***’, as we increase the degree ‘***d***’ of the polynomial,
    the model achieves greater flexibility to capture patterns in the observed data.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，模型的复杂性与其适应训练数据中模式的能力相似。假设一个以‘***x***’为变量，次数为‘***d***’的简单多项式模型，当我们增加多项式的次数‘***d***’时，模型在捕捉观察到的数据中的模式方面获得了更大的灵活性。
- en: Overfitting and Underfitting
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 过拟合和欠拟合
- en: If we are trying to fit a polynomial model with ***d = 2*** on a set of training
    samples which were derived from a cubic polynomial with some noise, the model
    will not be able to capture the distribution of the samples to a sufficient extent.
    The model simply lacks the *flexibility* or *complexity* to model the data generated
    from a degree 3 (or higher order) polynomials. Such a model is said to ***under-fit***on
    the training data.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们试图将***d = 2***的多项式模型拟合到一组由具有一些噪声的三次多项式派生出的训练样本上，该模型将无法充分捕捉样本的分布。该模型简单地缺乏*灵活性*或*复杂性*来模拟由三次（或更高阶）多项式生成的数据。这样的模型在训练数据上被认为是***欠拟合***。
- en: Working on the same example, assume we now have a model with ***d = 6***. Now
    with increased complexity, it should be easy for the model to estimate the original
    cubic polynomial that was used to generate the data (like setting the coefficients
    of all terms with exponent > 3 to 0). If the training process is not terminated
    at the right time, the model will continue to utilize its additional flexibility
    to reduce the error within further and start capturing in the noisy samples too.
    This will reduce the training error significantly, but the model now ***overfits***
    the training data. The noise will change in real-world settings (or in the test
    phase) and any knowledge based on predicting them will disrupt, leading to high
    test error.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在同一个例子上继续工作，假设我们现在有一个***d = 6***的模型。现在随着复杂性的增加，模型应该很容易估计出用于生成数据的原始三次多项式（例如，将所有指数大于3的项的系数设置为0）。如果训练过程没有在正确的时间终止，模型将继续利用其额外的灵活性来进一步减少误差，并开始在噪声样本中捕捉。这将显著降低训练误差，但模型现在***过拟合***了训练数据。在现实世界的设置（或测试阶段）中，噪声将发生变化，任何基于预测它们的知识的破坏都将导致高测试误差。
- en: How to determine the optimal model complexity?
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何确定最优模型复杂度？
- en: In practical settings, we have little-to-no understanding of the data-generation
    process or the true distribution of the data. Finding the optimal model with the
    right complexity, such that no under-fitting or overfitting occurs is a challenge.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际设置中，我们对数据生成过程或数据的真实分布几乎没有了解。找到具有正确复杂性的最优模型，以避免欠拟合或过拟合是一个挑战。
- en: One technique could be to start with a sufficiently powerful model and then
    reduce its complexity by means of feature selection. Lesser the features, lesser
    is the complexity of the model.
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一种技术可能是从一个足够强大的模型开始，然后通过特征选择来降低其复杂性。特征越少，模型的复杂性就越低。
- en: As discussed in the previous section, feature selection can be explicit (filter,
    wrapper methods) or implicit. Redundant features that have insignificant relevance
    in the determining the value of the response variable should be eliminated to
    avoid the model learning uncorrelated patterns in them. Regularization, also performs
    a similar task. So, how are regularization and feature selection connected to
    attain a common goal of optimal model complexity?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如前文所述，特征选择可以是显式的（过滤、包装方法）或隐式的。对于在确定响应变量值时具有不显著相关性的冗余特征应该被消除，以避免模型学习到其中的不相关模式。正则化也执行类似的任务。那么，正则化和特征选择是如何联系在一起以实现最优模型复杂度的共同目标的呢？
- en: L1 Regularization As A Feature Selector
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: L1 正则化作为特征选择器
- en: Continuing with our polynomial model, we represent it as a function f, with
    inputs ***x***, parameters ***θ*** and degree ***d***,
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 继续使用我们的多项式模型，我们将其表示为一个函数f，其中输入为***x***，参数为***θ***，次数为***d***，
- en: '![](../Images/ca788ddba3e4499e059ab42819974cd3.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ca788ddba3e4499e059ab42819974cd3.png)'
- en: (Image by author)
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: For a polynomial model, each power of the input ***x_i*** can be considered
    as a feature, forming a vector of the form,
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个多项式模型，每个输入***x_i***的幂可以被视为一个特征，形成一个形如的向量，
- en: '![](../Images/63a699e57f29e400ccd1974d678dbb67.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/63a699e57f29e400ccd1974d678dbb67.png)'
- en: (Image by author)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: We also define an objective function, which on minimizing leads us to the optimal
    parameters ***θ**** and includes a *regularization* term penalizing the complexity
    of the model.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还定义了一个目标函数，最小化它将引导我们得到最优参数***θ***，并包括一个惩罚模型复杂度的*正则化*项。
- en: '![](../Images/309c5a29f81ba8170af68457751e02fc.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/309c5a29f81ba8170af68457751e02fc.png)'
- en: (Image by author)
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: To determine the minima of this function, we need to analyze all of its critical
    points i.e. points where the derivation is zero or undefined.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确定这个函数的极小值，我们需要分析其所有的临界点，即导数为零或未定义的点。
- en: The partial derivative w.r.t. one the parameters, ***θj***, can be written as,
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 关于一个参数的偏导数，***θj***，可以写成，
- en: '![](../Images/a4f927f87fa69f5806244d0a4d87ca66.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a4f927f87fa69f5806244d0a4d87ca66.png)'
- en: (Image by author)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: where the function ***sgn*** is defined as,
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 其中函数***sgn***定义为，
- en: '![](../Images/24d84100019a38e1b10cb7d9e8cb02c8.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/24d84100019a38e1b10cb7d9e8cb02c8.png)'
- en: (Image by author)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: '**Note**: The derivative of the absolute function is different from the sgn
    function defined above. The original derivative is undefined at x = 0\. We augment
    the definition to remove the inflection point at x = 0 and to make the function
    differentiable across its entire domain. Moreover, such augmented functions are
    also used by ML frameworks when the underlying computation involves the absolute
    function. Check this [thread](https://discuss.pytorch.org/t/adding-l1-l2-regularization-in-a-convolutional-networks-in-pytorch/7734/4)
    on the PyTorch forum.'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意**：绝对函数的导数与上面定义的sgn函数不同。原始导数在x = 0处未定义。我们扩展定义以消除x = 0处的拐点，并使函数在整个定义域内可导。此外，这种扩展函数也被ML框架在涉及绝对函数的底层计算时使用。请查看PyTorch论坛上的这个[帖子](https://discuss.pytorch.org/t/adding-l1-l2-regularization-in-a-convolutional-networks-in-pytorch/7734/4)。'
- en: By computing the partial derivative of the objective function w.r.t. a single
    parameter ***θj,*** and setting it to zero, we can build an equation that relates
    the optimal value of ***θj*** with the predictions, targets, and features.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 通过计算目标函数关于单个参数***θj***的偏导数，并将其设为零，我们可以构建一个方程，将***θj***的最佳值与预测、目标和特征联系起来。
- en: '![](../Images/b39e718b0a09917540ec142e68b2fd37.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b39e718b0a09917540ec142e68b2fd37.png)'
- en: (Image by author)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: '![](../Images/27959bab03b0c351f82093e84b79878a.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/27959bab03b0c351f82093e84b79878a.png)'
- en: (Image by author)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: Let us examine the equation above. If we assume that the inputs and targets
    were centered about the mean (i.e. the data had been standardized in the preprocessing
    step), the term on the LHS effectively represents the [covariance](https://en.wikipedia.org/wiki/Covariance)
    between the j*th* feature and the difference between the predicted and target
    values.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查上面的方程。如果我们假设输入和目标值围绕均值中心（即数据在预处理步骤中已经标准化），LHS上的项实际上代表了j*th*特征与预测值和目标值之间差异的[协方差](https://en.wikipedia.org/wiki/Covariance)。
- en: Statistical covariance between two variables quantifies how much one variable
    influences the value of the second variable (and vice-versa)
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 两个变量的统计协方差量化了一个变量对第二个变量值的影响程度（反之亦然）。
- en: The sign function on the RHS forces the covariance on the LHS to assume only
    three values (as the sign function only returns -1, 0 and 1). If the ***jth***feature
    is redundant and does not influence the predictions, the covariance will be nearly
    zero, bringing the corresponding parameter ***θj**** to zero. This results in
    the feature being eliminated from the model.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 右侧的符号函数迫使LHS上的协方差只取三个值（因为符号函数只返回-1、0和1）。如果第j个特征是冗余的，并且不影响预测，协方差将几乎为零，将相应的参数***θj*****降到零。这导致特征从模型中消除。
- en: Imagine the sign function as a canyon carved by a river. You can walk in the
    canyon (i.e. the river bed) but to get out of it, you have these huge barriers
    or steep slopes. L1 regularization induces a similar ‘thresholding’ effect for
    the gradient of the loss function. The gradient must be powerful enough to break
    the barriers or become zero, which eventually brings the parameter to zero.
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 将符号函数想象成一条河流雕刻的峡谷。你可以在峡谷（即河床）中行走，但要走出峡谷，你有这些巨大的障碍或陡峭的斜坡。L1正则化对损失函数的梯度产生类似的“阈值”效应。梯度必须足够强大，才能突破障碍或变为零，这最终将参数降到零。
- en: For a more grounded example, consider a dataset that contains samples derived
    from a straight line (parameterized by two coefficients) with some added noise.
    The optimal model should have no more than two parameters, else it will adapt
    to the noise present in the data (with the added freedom/power to the polynomial).
    Changing the parameters of the higher powers in the polynomial model does not
    affect the difference between the targets and the model’s predictions, thus reducing
    their covariance with the feature.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 为了一个更具体的例子，考虑一个包含由两条直线（由两个系数参数化）导出的样本数据集，并添加了一些噪声。最佳模型应不超过两个参数，否则它将适应数据中存在的噪声（增加了多项式的自由/权力）。改变多项式模型中高次项的参数不会影响目标值与模型预测之间的差异，从而减少它们与特征的协方差。
- en: During the training process, a constant step gets added/subtracted from the
    gradient of the loss function. If the gradient of the loss function (MSE) is smaller
    than the constant step, the parameter will eventually reach to a value of 0\.
    Observe the equation below, depicting how parameters are updated with gradient
    descent,
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中，一个常数步长会被加到/减去损失函数的梯度上。如果损失函数（均方误差）的梯度小于常数步长，参数最终会达到 0 的值。观察下面的方程，描述了参数如何通过梯度下降进行更新，
- en: '![](../Images/b0bd65a19586dda606f1b8b15cfa1e98.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b0bd65a19586dda606f1b8b15cfa1e98.png)'
- en: (Image by author)
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: '![](../Images/4787a9d63fa26a080923057d76824780.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4787a9d63fa26a080923057d76824780.png)'
- en: (Image by author)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: If the blue part above is smaller than ***λα***, which itself is a very small
    number, ***Δθj*** is the nearly a constant step ***λα***. The sign of this step
    (red part) depends on ***sgn(θj)***, whose output depends on ***θj***. If ***θj***
    is positive i.e. greater than ***ε***, ***sgn(θj)*** equals 1, hence making ***Δθj***
    approx. equal to –***λα*** pushing it towards zero.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如果上面的蓝色部分小于 ***λα***（它本身是一个非常小的数），***Δθj*** 几乎是一个常数步长 ***λα***。这个步长的符号（红色部分）取决于
    ***sgn(θj)***，其输出取决于 ***θj***。如果 ***θj*** 是正的，即大于 ***ε***，***sgn(θj)*** 等于 1，因此使
    ***Δθj*** 大约等于 –***λα***，推动它向零靠近。
- en: To suppress the constant step (red part) that makes the parameter zero, the
    gradient of the loss function (blue part) has to be larger than the step size.
    For a larger loss function gradient, the value of the feature must affect the
    output of the model significantly.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为了抑制使参数变为零的常数步长（红色部分），损失函数的梯度（蓝色部分）必须大于步长。对于较大的损失函数梯度，特征值必须显著影响模型的输出。
- en: This is how a feature is eliminated, or more precisely, its corresponding parameter,
    whose value does not correlate with the output of the model, is zero-ed by L1
    regularization during the training.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是特征被消除的方式，或者更准确地说，其对应的参数，其值与模型输出不相关，在训练过程中通过 L1 正则化被置零。
- en: Further Reading And Conclusion
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 进一步阅读和结论
- en: To get more insights on the topic, I have posted a question on r/MachineLearning
    subreddit and the resulting [thread](https://www.reddit.com/r/MachineLearning/comments/1j8gvlh/d_how_does_l1_regularization_perform_feature/)
    contains different explanations that you may want to read.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了对这一主题有更深入的了解，我在 r/MachineLearning 子版块上发了一个问题，并得到的[帖子](https://www.reddit.com/r/MachineLearning/comments/1j8gvlh/d_how_does_l1_regularization_perform_feature/)包含了不同的解释，你可能想阅读一下。
- en: Madiyar Aitbayev also has an [interesting blog](https://maitbayev.github.io/posts/why-l1-loss-encourage-coefficients-to-shrink-to-zero/)
    covering the same question, but with a geometrical explanation.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Madiyar Aitbayev 也有一个[有趣的博客](https://maitbayev.github.io/posts/why-l1-loss-encourage-coefficients-to-shrink-to-zero/)，讨论了相同的问题，但提供了几何解释。
- en: Brian Keng’s [blog](https://bjlkeng.io/posts/probabilistic-interpretation-of-regularization/)
    explains regularization from a probabilistic perspective.
  id: totrans-54
  prefs:
