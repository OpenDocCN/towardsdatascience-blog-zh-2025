    Retrieval-Augmented Generation'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '[1] doc::b0610cc6134b401db0ea68a77096e883 - HIRAG：分层思维指令微调检索增强生成'
- en: '[2] doc::53b521e646b84289b46e648c66dde56a - Test-time Corpus Feedback: From
    Retrieval to RAG'
  id: totrans-186
