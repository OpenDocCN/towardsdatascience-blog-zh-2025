    RAG method for improved LLM question-answering capabilities'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: '[4] doc::6d7a7d88cfc04636b20931fdf22f1e61 - 关键知识RAG (K^2RAG)：一种增强型RAG方法，以提升LLM问答能力'
