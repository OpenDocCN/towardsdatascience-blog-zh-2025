- en: 'Introducing the AI-3P Assessment Framework: Score AI Projects Before Committing
    Resources'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-ai-3p-assessment-framework/](https://towardsdatascience.com/the-ai-3p-assessment-framework/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758686471490" class="mdspan-comment">Recent research highlights</mdspan>
    that most AI pilot projects fail — not because of technical shortcomings, but
    due to challenges in aligning new technology with existing organizational structures.
    While implementing AI models may seem straightforward, the real obstacles often
    lie in integrating these solutions with the organization’s **people**, **processes**,
    and **products**. This concept, commonly referred to as the “[3P](https://www.oxfordcollegeofmanagement.com/blog/the-3-ps-of-project-management/)”
    pillars of project management, provides a practical lens for assessing AI readiness.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I introduce a framework to help teams evaluate and prioritize
    AI initiatives by asking targeted, context-specific **custom questions** across
    these three pillars, ensuring risks are identified and managed before implementation
    begins.
  prefs: []
  type: TYPE_NORMAL
- en: Whether you’re involved in the technical or business side of decision-making
    in the AI process, the concepts I outline in this article are designed to cover
    both aspects.
  prefs: []
  type: TYPE_NORMAL
- en: The challenge of implementing AI use cases
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Imagine being presented with a list of over 100 potential AI use cases from
    across a global enterprise. Furthermore, consider that the list of use cases breaks
    down into a variety of specific departmental requests that the development team
    needs to deliver.
  prefs: []
  type: TYPE_NORMAL
- en: The marketing department wants a customer-facing chatbot. Finance wants to automate
    invoice processing. HR is asking for a tool to summarize thousands of resumes.
    Each request comes with a different sponsor, a different level of technical detail,
    and a different sense of urgency, often driven by pressure to deliver visible
    AI wins as soon as possible.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9c1ad3542bd8c0d9ff03cdbbc04abf98.png)'
  prefs: []
  type: TYPE_IMG
- en: Simplified flow of stakeholders and delivery team requests prioritization. Image
    created by the author.
  prefs: []
  type: TYPE_NORMAL
- en: In this scenario, imagine that the delivery team decides to begin implementing
    what appears to be the quickest wins, and they greenlight the marketing chatbot.
    But, after initial momentum, the problems start.
  prefs: []
  type: TYPE_NORMAL
- en: First are the **people** problems. For example, the marketing chatbot stalls
    as two teams in the department can’t agree on who is responsible for it, freezing
    development.
  prefs: []
  type: TYPE_NORMAL
- en: After this issue is solved, **process** issues arise. For example, the chatbot
    needs live customer data, but getting approval from the legal and compliance teams
    takes months, and no one is available for additional “admin” work.
  prefs: []
  type: TYPE_NORMAL
- en: Even when this gets resolved, the **product** itself hits a wall. For example,
    the team discovers the “quick win” chatbot can’t easily integrate with the company’s
    essential backend systems, leaving it unable to deliver real value to customers
    until this issue is sorted.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, after more than six months, budgets are exhausted, stakeholders are
    disappointed, and the initial excitement around AI has worn off. Fortunately,
    this outcome is precisely what the AI-3P framework is designed to prevent.
  prefs: []
  type: TYPE_NORMAL
- en: Before diving into the framework concept, let’s first look at what recent research
    reveals about why AI endeavors go off track.
  prefs: []
  type: TYPE_NORMAL
- en: Why do AI initiatives derail?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Enthusiasm around AI — or more precisely, generative AI — continues to peak
    day after day, and so we read numerous stories about these project initiatives.
    But not all end with a positive outcome. Reflecting this reality, a recent [MIT
    study](https://mlq.ai/media/quarterly_decks/v0.1_State_of_AI_in_Business_2025_Report.pdf)
    from July 2025 prompted a headline in Fortune magazine that “[95% of generative
    AI pilots at companies are failing](https://fortune.com/2025/08/18/mit-report-95-percent-generative-ai-pilots-at-companies-failing-cfo/)*.*”
  prefs: []
  type: TYPE_NORMAL
- en: 'Part of the report relevant to our purpose involves the reasons *why* these
    initiatives fail. To quote a [Fortune post](https://fortune.com/2025/08/21/an-mit-report-that-95-of-ai-pilots-fail-spooked-investors-but-the-reason-why-those-pilots-failed-is-what-should-make-the-c-suite-anxious/):'
  prefs: []
  type: TYPE_NORMAL
- en: '*The biggest problem, the report found, was* ***not*** *that the* ***AI models
    weren’t capable enough*** *(although execs tended to* think *that was the problem.)
    Instead, the researchers discovered a “learning gap”****— people*** *and* ***organizations***
    *simply* ***did not understand how to use the AI tools properly*** *or how to*
    ***design workflows*** *that could* ***capture the benefits*** *of AI while* ***minimizing
    downside risks****.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: …
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The report also found that companies which* ***bought-in AI models*** *and solutions*
    ***were more successful*** *than enterprises that tried to build their own systems.*
    ***Purchasing AI tools succeeded 67% of the time****, while internal builds panned
    out only one-third as often.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: …
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The overall thrust of the MIT report was that* ***the problem was not the tech****.*
    ***It was how companies were using the tech.*** *…*
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: With these reasons in mind, I want to emphasize the importance of better understanding
    risks *before* implementing AI use cases.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, if most AI endeavors don’t fail because of the models themselves,
    but because of issues around ownership, workflows,or change management, then we
    have pre-work to do in evaluating new initiatives. To achieve that, we can adapt
    the classic business pillars for technology adoption — *people* and *processes,*
    with a focus on the end *product*.
  prefs: []
  type: TYPE_NORMAL
- en: 'This thinking has led me to develop a practical scorecard around these three
    pillars for AI pre-development decisions: **AI-3P with BYOQ** (Bring Your Own
    Questions).'
  prefs: []
  type: TYPE_NORMAL
- en: The overall idea of the framework is to prioritize AI use cases by providing
    your own context-specific questions that aim to qualify your AI opportunities
    and make risks visible *before* the hands-on implementation starts.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by explaining the core of the framework.
  prefs: []
  type: TYPE_NORMAL
- en: Scoring BYOQ per 3P
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As indicated earlier, the framework concept is based on reviewing each potential
    AI use case against the three pillars that determine success: people, process,
    andproduct.'
  prefs: []
  type: TYPE_NORMAL
- en: For each pillar, we provide examples of BYOQ questions grouped by categories
    that can be used to assess a specific AI request for implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Questions are formulated so that the possible answer-score combinations are
    “No/Unknown” (= 0), “Partial” (= 1), and “Yes/Not applicable” (= 2).
  prefs: []
  type: TYPE_NORMAL
- en: After assigning scores to each question, we sum the total score for each pillar,
    and this number is used later in the weighted AI-3P readiness equation.
  prefs: []
  type: TYPE_NORMAL
- en: With this premise in mind, let’s break down how to think about each pillar.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1e7037ec42ab8e78cc5006bee7326aa9.png)'
  prefs: []
  type: TYPE_IMG
- en: Before we start to consider models and code, we should ensure that the “human
    element” is ready for an AI initiative.
  prefs: []
  type: TYPE_NORMAL
- en: This means confirming there is business buy-in (sponsorship)and an accountable
    owner who can champion the project through its inevitable hurdles. Success also
    depends on an honest assessment of the delivery team’s skills in areas such as
    Machine Learning operations. But beyond these technical skills, AI initiatives
    can easily fail without a thoughtful plan for end-user adoption, making change
    management a non-negotiable part of the equation.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why the objective of this pillar’s BYOQis to prove that ownership, capability,
    and adoption exist before the build phase starts.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can then group and score questions in the Peoplepillar as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/22e81c203334d2368beba1eb6757dd41.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Table 1: The readiness BYOQ grouped by different categories for the People
    pillar. Content created by the author.'
  prefs: []
  type: TYPE_NORMAL
- en: Once we are confident that we have asked the right questions and assigned the
    score on a scale from 0 to 2 to each, with No/Unknown = 0, Partial = 1, and Yes/Not
    Applicable = 2, the next step is to check how this idea aligns with the organization’s
    daily operations, which brings us to the second pillar.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e88dc5336a5ff9fd7d161c9cad011cb1.png)'
  prefs: []
  type: TYPE_IMG
- en: The Processespillar is about ensuring the AI use case solution fits into the
    operational fabric of our organization.
  prefs: []
  type: TYPE_NORMAL
- en: Common project stoppers, such as regulations and the internal qualification
    process for new technologies, are included here. In addition, questions related
    to [Day 2 operations](https://octopus.com/blog/difference-between-day-0-1-2-operations)
    that support product resiliency are also evaluated.
  prefs: []
  type: TYPE_NORMAL
- en: In this way, the list of BYOQ in this pillar is conceptualized to understand
    risks in governance, compliance, and provisioning paths.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ac35361891bd14914d841e565d23666c.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Table 2: The readiness BYOQ grouped by different categories for the Processes
    pillar. Content created by the author.'
  prefs: []
  type: TYPE_NORMAL
- en: By finalizing the scores for this pillar and gaining a clear understanding of
    the status of operational guardrails, we can then discuss the product itself.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a1ec2127d0d3c9cde60d4722739bdc5c.png)'
  prefs: []
  type: TYPE_IMG
- en: Here is where we challenge our technical assumptions, ensuring they are grounded
    in the realities of our Peopleand Processespillars.
  prefs: []
  type: TYPE_NORMAL
- en: This begins with the fundamental “problem-to-tech” fit, where we need to determine
    the type of AI use case and whether to build a custom solutionorbuyan existing
    one. In addition, here we evaluate the stability, maturity and scalability of
    the underlying platform, too. Apart from that, we also weigh the questions that
    concern the end‑user experience and the overall economic fit of the Productpillar.
  prefs: []
  type: TYPE_NORMAL
- en: As a result, the questions for this pillar are designed to test the technical
    choices, the end-user experience, and the solution’s financial viability.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4c898f088aef9bd91ef26395a19b1fbb.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Table 3: The readiness BYOQ grouped by different categories for the Product
    pillar. Content created by the author.'
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve examined the *what*, the *how*, and the *who*, it’s time to bring
    it all together and turn these concepts into an actionable decision.
  prefs: []
  type: TYPE_NORMAL
- en: Bringing 3P together
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'After consolidating scores from 3P, the “ready/partially ready/not-ready” decision
    is made, and the final table looks like this for a specific AI request:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/10ed8505fb03e511b8f557dae990ce2a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Table 4: The AI-3P final table with decision tiers. Content created by the author.'
  prefs: []
  type: TYPE_NORMAL
- en: As we can see from Table 4, the core logic of the framework lies in transforming
    qualitative answers into a quantitative AI readiness score.
  prefs: []
  type: TYPE_NORMAL
- en: 'To recap, here’s how the step-by-step approach works:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 1:** We calculate a raw score, i.e., `Actual score per pillar`, by answering
    a list of custom questions (BYOQs). Each answer gets a value:'
  prefs: []
  type: TYPE_NORMAL
- en: '**No/Unknown = 0 points.** This is a red flag or a significant unknown.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Partial = 1 point.** There’s some progress, but it’s not fully resolved.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Yes/Not applicable = 2 points.** The requirement is met, or it isn’t relevant
    to this use case.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Step 2:** We assign a specific weight to each pillar’s total score. In the
    example above, based on the findings from the [MIT study](https://mlq.ai/media/quarterly_decks/v0.1_State_of_AI_in_Business_2025_Report.pdf),
    the weighting is deliberately biased toward the Peoplepillar, and the assigned
    weights are: 40 percent people, 35 percent processes, and 25 percent product.'
  prefs: []
  type: TYPE_NORMAL
- en: 'After assigning weights, we calculate `Weighted score per pillar` in the following
    way:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f9f9bd239b264ac89dbb8cd4e31105df.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Step 3:** We sum the weighted scores to get the **AI-3P Readiness score**,
    a number from 0 to 100\. This score places each AI initiative into one of three
    actionable tiers:'
  prefs: []
  type: TYPE_NORMAL
- en: '**80–100: Build now**. That’s a green light. This implies the key elements
    are in place, the risks are understood, and implementation can proceed following
    standard project guardrails.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**60–79: Pilot with guardrails**. Proceed with caution. In other words, the
    idea has merit, but some gaps could derail the project. The recommendation here
    would be to fix the top three to five risks and then launch a time-boxed pilot
    to learn more about use case feasibility before committing fully.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**0–59: De-risk first**. Stop and fix the identified gaps, which indicate high
    failure risk for the evaluated AI initiative.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In summary, the decision is the product of the `AI-3P Readiness` formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/58df6228c7307c99c5d4d9e4ac6764d5.png)'
  prefs: []
  type: TYPE_IMG
- en: That’s the process for scoring an individualAI request, with a focus on custom-built
    questions around people, processes, and products.
  prefs: []
  type: TYPE_NORMAL
- en: 'But what if we have a portfolioof AI requests? A straightforward adoption of
    the framework to prioritize them at the organizational level proceeds as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Create an inventory of AI use cases.** Start by gathering all the proposed
    AI initiatives from across the business. Cluster them by department (marketing,
    finance, and so on), user journey, or business impact to spot overlaps and dependencies.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Score individual AI requests with the team on a set of pre-provided questions.**
    Bring the product owners, tech leads, data owners, champions, and risk/compliance
    owners (and other responsible individuals) into the same room. Score each AI request
    together as a team using the BYOQ.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Sort all evaluated use cases by AI‑3P score.** Once the cumulative score
    per pillar and the weighted `AI-3P Readiness` measure is calculated for every
    AI use case, rank all the AI initiatives. This results in an objective, risk-adjusted
    priority list. Lastly, take the top *n* use cases that have cleared the threshold
    for full build and conduct an additional risk-benefit check-up before investing
    resources in them.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/83e5731b0365a902f356a19fc9f7f2f2.png)'
  prefs: []
  type: TYPE_IMG
- en: Now let’s look at some important details about how to use this framework effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Customizing the framework
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, I share some notes on what to consider when personalizing the
    AI-3P framework.
  prefs: []
  type: TYPE_NORMAL
- en: '**First**, although the “Bring Your Own Questions”logic is built for flexibility,
    it still requires standardization. It’s important to create a fixed list of questions
    before starting to use the framework so that every AI use case has a “fair shot”
    in evaluation over different time periods.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Second**, within the framework, a “Not applicable”(NA) answer scores 2 points
    (the same as a “Yes” answer) per question, treating it as a non-issue for that
    use case. While this simplifies the calculation, it’s important to track the total
    number of NA answers for a given project. Although in theory a high number of
    NAs can indicate a project with lower complexity, in reality this can sidestep
    many implementation hurdles. It would be prudent to report an NA‑ratio per pillar
    and cap NA contribution at perhaps 25 percent of a pillar’s maximum to prevent
    “green” scores built on non‑applicables.'
  prefs: []
  type: TYPE_NORMAL
- en: The same is valid for “Unknown”answers with score 0, which present a full “blind
    spot,” and possibly should be flagged for the “de-risk first” tier if the knowledge
    is missing in specific categories as “Ownership,” “Compliance,” or “Budget.”
  prefs: []
  type: TYPE_NORMAL
- en: '**Third**, the pillar weights (in the example above: 40 percent people, 35
    percent processes, 25 percent product) should be viewed as an adjustable metric
    that can be industry or organization specific. For instance, in heavily regulated
    industries like finance, the processes pillar might carry more weight due to stringent
    compliance. In this case, one might consider adjusting the weighting to 35 percent
    people / 45 percent processes / 20 percent product.'
  prefs: []
  type: TYPE_NORMAL
- en: The same flexibility applies to the decision tiers (80–100, 60–79, 0–59). An
    organization with a high-risk tolerance might lower the “build now” threshold
    to 75, whereas a more conservative one might raise it to 85\. For this reason,
    it’s relevant to agree on the scoring logic *before* evaluating the AI use cases.
  prefs: []
  type: TYPE_NORMAL
- en: Once these elements are in place, you have everything needed to begin assessing
    your AI use case(s).
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading. I hope this article helps you navigate the pressure for
    “quick AI wins” by providing a practical tool to identify the initiatives that
    are ready for success.
  prefs: []
  type: TYPE_NORMAL
- en: I’m keen to learn from your experiences with the framework, so feel free to
    connect and share your feedback on my [Medium](https://medium.com/@martosi/subscribe)
    or [LinkedIn](https://www.linkedin.com/in/martosi/) profiles.
  prefs: []
  type: TYPE_NORMAL
- en: 'The resources (tables with formulas) included in this article are in the GitHub
    repo located here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[CassandraOfTroy/ai-3p-framework-template: An Excel template to implement the
    AI-3P Framework for assessing and de-risking AI projects before deployment.](https://github.com/CassandraOfTroy/ai-3p-framework-template/tree/main)'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Acknowledgments
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This article was originally published on the [Data Science at Microsoft](https://medium.com/data-science-at-microsoft/the-ai-3p-assessment-framework-9f9df694edb8)
    Medium publication.
  prefs: []
  type: TYPE_NORMAL
- en: The BYOQ concept was inspired by my discussions with Microsoft colleagues [Evgeny
    Minkevich](https://www.linkedin.com/in/eminkevich/) and [Sasa Juratovic](https://www.linkedin.com/in/sasajuratovic/).
    The AI‑3P scorecard idea is influenced by the [MEDDIC methodology](https://now.iseeit.com/meddic-sales-process-checklist/)
    introduced to me by Microsoft colleague [Dmitriy Nekrasov](https://www.linkedin.com/in/dmne/).
  prefs: []
  type: TYPE_NORMAL
- en: Special thanks to [Casey Doyle](https://www.linkedin.com/in/caseydoyle1/) and
