- en: Stop Creating Bad DAGs – Optimize Your Airflow Environment By Improving Your
    Python Code
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 停止创建糟糕的 DAGs – 通过改进 Python 代码优化您的 Airflow 环境
- en: 原文：[https://towardsdatascience.com/stop-creating-bad-dags-optimize-your-airflow-environment-by-improving-your-python-code-146fcf4d27f7/](https://towardsdatascience.com/stop-creating-bad-dags-optimize-your-airflow-environment-by-improving-your-python-code-146fcf4d27f7/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/stop-creating-bad-dags-optimize-your-airflow-environment-by-improving-your-python-code-146fcf4d27f7/](https://towardsdatascience.com/stop-creating-bad-dags-optimize-your-airflow-environment-by-improving-your-python-code-146fcf4d27f7/)
- en: '![Photo by Dan Roizer on Unsplash](../Images/cfc36d1c403ceb48994e020ee396a3f3.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由 Dan Roizer 在 Unsplash 上拍摄的照片](../Images/cfc36d1c403ceb48994e020ee396a3f3.png)'
- en: Photo by [Dan Roizer](https://unsplash.com/@danroizer?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由 [Dan Roizer](https://unsplash.com/@danroizer?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 上拍摄的照片
- en: Apache Airflow is one of the most popular orchestration tools in the data field,
    powering workflows for companies worldwide. However, anyone who has already worked
    with Airflow in a production environment, especially in a complex one, knows that
    it can occasionally present some problems and weird bugs.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: Apache Airflow 是数据领域最受欢迎的编排工具之一，为全球的公司提供工作流程支持。然而，任何在生产环境中使用过 Airflow 的人，尤其是在复杂环境中，都知道它有时会呈现一些问题和奇怪的错误。
- en: 'Among the many aspects you need to manage in an Airflow environment, one critical
    metric often flies under the radar: **DAG parse time**. Monitoring and optimizing
    parse time is essential to avoid performance bottlenecks and ensure the correct
    functioning of your orchestrations, as we’ll explore in this article.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Airflow 环境中需要管理的许多方面中，一个关键的指标往往被忽视：**DAG 解析时间**。监控和优化解析时间对于避免性能瓶颈和确保编排的正确运行至关重要，正如我们将在本文中探讨的那样。
- en: That said, this tutorial aims to introduce **`[airflow-parse-bench](https://github.com/AlvaroCavalcante/airflow-parse-bench)`**,
    an open-source tool I developed to help data engineers monitor and optimize their
    Airflow environments, providing insights to reduce code complexity and parse time.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，本教程旨在介绍 **`[airflow-parse-bench](https://github.com/AlvaroCavalcante/airflow-parse-bench)`**，这是一个开源工具，我开发它来帮助数据工程师监控和优化他们的
    Airflow 环境，提供洞察以减少代码复杂性和解析时间。
- en: Why Parse Time Matters
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么解析时间很重要
- en: Regarding Airflow, DAG parse time is often an **overlooked metric**. Parsing
    occurs every time Airflow processes your Python files to build the DAGs dynamically.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 关于 Airflow，DAG 解析时间通常是一个 **被忽视的指标**。解析发生在每次 Airflow 处理您的 Python 文件以动态构建 DAGs
    时。
- en: By default, all your DAGs are parsed every 30 seconds – a frequency controlled
    by the configuration variable _[min_file_process_interval](https://airflow.apache.org/docs/apache-airflow/stable/configurations-ref.html#min-file-process-interval)_.
    This means that every 30 seconds, all the Python code that’s present in your `dags`
    folder is read, imported, and processed to generate DAG objects containing the
    tasks to be scheduled. Successfully processed files are then added to the [DAG
    Bag](https://airflow.apache.org/docs/apache-airflow/stable/_api/airflow/models/dagbag/index.html).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，所有您的 DAGs 每隔 30 秒都会被解析一次 – 这个频率由配置变量 _[min_file_process_interval](https://airflow.apache.org/docs/apache-airflow/stable/configurations-ref.html#min-file-process-interval)_
    控制。这意味着每隔 30 秒，都会读取、导入并处理您 `dags` 文件夹中存在的所有 Python 代码，以生成包含待调度任务的 DAG 对象。成功处理的文件随后会被添加到
    [DAG Bag](https://airflow.apache.org/docs/apache-airflow/stable/_api/airflow/models/dagbag/index.html)
    中。
- en: 'Two key Airflow components handle this process:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 两个关键的 Airflow 组件处理这个过程：
- en: '*[DagFileProcessorManager](https://airflow.apache.org/docs/apache-airflow/stable/authoring-and-scheduling/dagfile-processing.html)*:
    Checks which files need to be processed.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*[DagFileProcessorManager](https://airflow.apache.org/docs/apache-airflow/stable/authoring-and-scheduling/dagfile-processing.html)*：检查哪些文件需要被处理。'
- en: '*[DagFileProcessorProcess](https://airflow.apache.org/docs/apache-airflow/stable/authoring-and-scheduling/dagfile-processing.html)*:
    Executes the actual file parsing.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*[DagFileProcessorProcess](https://airflow.apache.org/docs/apache-airflow/stable/authoring-and-scheduling/dagfile-processing.html)*：执行实际的文件解析。'
- en: Together, both components (commonly referred to as the **dag processor)** are
    executed by the Airflow [Scheduler](https://airflow.apache.org/docs/apache-airflow/stable/administration-and-deployment/scheduler.html),
    ensuring that your DAG objects are updated before being triggered. However, for
    scalability and security reasons, it is also possible to run your dag processor
    as a separate component in your cluster.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 两个组件（通常称为**dag 处理器**）一起由 Airflow [调度器](https://airflow.apache.org/docs/apache-airflow/stable/administration-and-deployment/scheduler.html)执行，确保在触发之前更新你的
    DAG 对象。然而，出于可扩展性和安全性的原因，也可以将你的 dag 处理器作为集群中的独立组件运行。
- en: 'If your environment only has a few dozen DAGs, it’s unlikely that the parsing
    process will cause any kind of problem. However, it’s common to find production
    environments with hundreds or even thousands of DAGs. In this case, if your parse
    time is too high, it can lead to:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的环境只有几十个 DAG，解析过程不太可能引起任何问题。然而，在具有数百甚至数千个 DAG 的生产环境中，这是常见的。在这种情况下，如果你的解析时间过高，可能会导致：
- en: Delay DAG scheduling.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 延迟 DAG 调度。
- en: Increase resource utilization.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高资源利用率。
- en: Environment heartbeat issues.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 环境心跳问题。
- en: Scheduler failures.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调度器故障。
- en: Excessive CPU and memory usage, wasting resources.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过度使用 CPU 和内存，浪费资源。
- en: Now, imagine having an environment with hundreds of DAGs containing unnecessarily
    complex parsing logic. Small inefficiencies can quickly turn into significant
    problems, affecting the stability and performance of your entire Airflow setup.
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 现在，想象一下拥有包含不必要复杂解析逻辑的数百个 DAG 的环境。小的低效很快就会变成重大问题，影响整个 Airflow 设置的稳定性和性能。
- en: How to write better DAGs?
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何编写更好的 DAG？
- en: When writing Airflow DAGs, there are some important best practices to bear in
    mind to create optimized code. Although you can find a lot of tutorials on how
    to improve your DAGs, I’ll summarize some of the key principles that can significantly
    enhance your DAG performance.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在编写 Airflow DAG 时，有一些重要的最佳实践需要记住，以创建优化的代码。尽管你可以找到很多关于如何改进你的 DAG 的教程，但我将总结一些可以显著提高你的
    DAG 性能的关键原则。
- en: Limit Top-Level Code
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 限制顶层代码。
- en: One of the most common causes of high DAG parsing times is inefficient or complex
    top-level code. Top-level code in an Airflow DAG file is executed every time the
    Scheduler parses the file. If this code includes resource-intensive operations,
    such as database queries, API calls, or dynamic task generation, it can significantly
    impact parsing performance.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 高 DAG 解析时间最常见的原因之一是不高效或复杂的顶层代码。在 Airflow DAG 文件中的顶层代码每次调度器解析文件时都会被执行。如果这段代码包含资源密集型操作，例如数据库查询、API
    调用或动态任务生成，它可能会显著影响解析性能。
- en: 'The following code shows an example of a **non-optimized DAG**:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码展示了**非优化 DAG**的示例：
- en: In this case, every time the file is parsed by the Scheduler, the top-level
    code is executed, making an API request and processing the DataFrame, which can
    significantly impact the parse time.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，每次调度器解析文件时，都会执行顶层代码，进行 API 请求并处理 DataFrame，这可能会显著影响解析时间。
- en: Another important factor contributing to slow parsing is top-level imports.
    Every library imported at the top level is loaded into memory during parsing,
    which can be time-consuming. To avoid this, you can move imports into functions
    or task definitions.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 导致慢速解析的另一个重要因素是顶层导入。在解析期间，每个在顶层导入的库都会被加载到内存中，这可能很耗时。为了避免这种情况，你可以将导入移动到函数或任务定义中。
- en: 'The following code shows a better version of the same DAG:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码展示了同一 DAG 的更好版本：
- en: Avoid Xcoms and Variables in Top-Level Code
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 避免在顶层代码中使用 Xcoms 和变量。
- en: 'Still talking about the same topic, is particularly interesting to avoid using
    Xcoms and Variables in your top-level code. As stated by [Google documentation](https://cloud.google.com/blog/products/data-analytics/reduce-airflow-dag-parse-times-in-cloud-composer):'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 仍然在谈论相同的话题，特别有趣的是避免在顶层代码中使用 Xcoms 和变量。正如 [Google 文档](https://cloud.google.com/blog/products/data-analytics/reduce-airflow-dag-parse-times-in-cloud-composer)所述：
- en: If you are using Variable.get() in top level code, every time the .py file is
    parsed, Airflow executes a Variable.get() which opens a session to the DB. This
    can dramatically slow down parse times.
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你正在顶层代码中使用 Variable.get()，每次解析 .py 文件时，Airflow 都会执行一个 Variable.get()，这会打开到数据库的会话。这可能会显著减慢解析时间。
- en: To address this, consider using a **JSON dictionary** to retrieve multiple variables
    in a single database query, rather than making multiple `Variable.get()` calls.
    Alternatively, use **Jinja templates**, as variables retrieved this way are only
    processed during task execution, not during DAG parsing.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，考虑使用**JSON字典**在单个数据库查询中检索多个变量，而不是多次调用`Variable.get()`。或者使用**Jinja模板**，因为通过这种方式检索的变量仅在任务执行期间处理，而不是在DAG解析期间。
- en: Remove Unnecessary DAGs
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 删除不必要的DAG
- en: 'Although it seems obvious, it’s always important to remember to periodically
    clean up unnecessary DAGs and files from your environment:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这看起来很明显，但定期清理环境中不必要的DAG和文件始终很重要：
- en: '**Remove unused DAGs**: Check your `dags` folder and delete any files that
    are no longer needed.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**删除未使用的DAG**：检查你的`dags`文件夹，并删除任何不再需要的文件。'
- en: '**Use `.airflowignore`**: Specify the files Airflow should intentionally ignore,
    skipping parsing.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用`.airflowignore`**：指定Airflow应该有意忽略的文件，跳过解析。'
- en: '**Review paused DAGs**: Paused DAGs are still parsed by the Scheduler, consuming
    resources. If they are no longer required, consider removing or archiving them.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审查暂停的DAG**：暂停的DAG仍然会被调度器解析，消耗资源。如果它们不再需要，考虑删除或存档它们。'
- en: Change Airflow Configurations
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 修改Airflow配置
- en: 'Lastly, you could change some Airflow configurations to reduce the Scheduler
    resource usage:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你可以修改一些Airflow配置以减少调度器资源的使用：
- en: '**`min_file_process_interval`**: This setting controls how often (in seconds)
    Airflow parses your DAG files. Increasing it from the default 30 seconds can reduce
    the Scheduler’s load at the cost of slower DAG updates.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`min_file_process_interval`**: 这个设置控制了Airflow多久（以秒为单位）解析你的DAG文件。将其从默认的30秒增加可以减少调度器的负载，但会以较慢的DAG更新为代价。'
- en: '**`dag_dir_list_interval`**: This determines how often (in seconds) Airflow
    scans the `dags` directory for new DAGs. If you deploy new DAGs infrequently,
    consider increasing this interval to reduce CPU usage.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`dag_dir_list_interval`**: 这个参数决定了Airflow多久（以秒为单位）扫描`dags`目录以查找新的DAG。如果你不经常部署新的DAG，考虑增加这个间隔以减少CPU使用。'
- en: How to Measure DAG Parse Time?
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何测量DAG解析时间？
- en: We’ve discussed a lot about the importance of creating optimized DAGs to maintain
    a healthy Airflow environment. But how do you actually measure the parse time
    of your DAGs? Fortunately, there are several ways to do this, depending on your
    Airflow deployment or operating system.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们讨论了很多关于创建优化DAG以维护健康Airflow环境的重要性。但你是如何实际测量你的DAG的解析时间的呢？幸运的是，有几种方法可以做到这一点，具体取决于你的Airflow部署或操作系统。
- en: 'For example, if you have a [Cloud Composer](https://cloud.google.com/composer?hl=en)
    deployment, you can easily retrieve a DAG parse report by executing the following
    command on Google CLI:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你有一个[Cloud Composer](https://cloud.google.com/composer?hl=en)部署，你可以在Google
    CLI上执行以下命令来轻松检索DAG解析报告：
- en: '[PRE0]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: While retrieving parse metrics is straightforward, measuring the effectiveness
    of your code optimizations can be less so. Every time you modify your code, you
    need to redeploy the updated Python file to your cloud provider, wait for the
    DAG to be parsed, and then extract a new report – a slow and time-consuming process.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然检索解析指标很简单，但测量代码优化的有效性可能不那么简单。每次你修改代码时，你都需要将更新的Python文件重新部署到你的云提供商，等待DAG被解析，然后提取一个新的报告——这是一个缓慢且耗时的过程。
- en: 'Another possible approach, if you’re on Linux or Mac, is to run this command
    to measure the parse time locally on your machine:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种可能的方法，如果你使用Linux或Mac，可以在你的机器上运行以下命令来本地测量解析时间：
- en: '[PRE1]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: However, while simple, this approach is not practical for systematically measuring
    and comparing the parse times of multiple DAGs.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，虽然这个方法很简单，但它对于系统地测量和比较多个DAG的解析时间来说并不实用。
- en: To address these challenges, I created the **`airflow-parse-bench`**, a Python
    library that simplifies measuring and comparing the parse times of your DAGs using
    Airflow’s native parse method.
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为了解决这些挑战，我创建了**`airflow-parse-bench`**，这是一个Python库，它简化了使用Airflow的本地解析方法来测量和比较你的DAGs的解析时间。
- en: Measuring and Comparing Your DAG’s Parse Times
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测量和比较你的DAG的解析时间
- en: The **`[airflow-parse-bench](https://github.com/AlvaroCavalcante/airflow-parse-bench)`**
    tool makes it easy to store parse times, compare results, and standardize comparisons
    across your DAGs.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**`[airflow-parse-bench](https://github.com/AlvaroCavalcante/airflow-parse-bench)`**工具使得存储解析时间、比较结果以及跨你的DAGs标准化比较变得容易。'
- en: Installing the Library
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装库
- en: 'Before installation, it’s recommended to use a [virtualenv](https://docs.python.org/3/library/venv.html)
    to avoid library conflicts. Once set up, you can install the package by running
    the following command:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在安装之前，建议使用[virtualenv](https://docs.python.org/3/library/venv.html)来避免库冲突。一旦设置好，你可以通过运行以下命令来安装包：
- en: '[PRE2]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Note:** This command only installs the essential dependencies (related to
    Airflow and Airflow providers). You must manually install any additional libraries
    your DAGs depend on.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意：**此命令仅安装基本依赖项（与Airflow和Airflow提供者相关）。你必须手动安装你的DAG所依赖的任何其他库。'
- en: For example, if a DAG uses `boto3` to interact with AWS, ensure that `boto3`
    is installed in your environment. Otherwise, you’ll encounter parse errors.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果一个DAG使用`boto3`与AWS交互，确保`boto3`已安装在你的环境中。否则，你将遇到解析错误。
- en: 'After that, it’s necessary to initialize your Airflow database. This can be
    done by executing the following command:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，你需要初始化你的Airflow数据库。这可以通过执行以下命令来完成：
- en: '[PRE3]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'In addition, if your DAGs use **Airflow Variables**, you must define them locally
    as well. However, it’s not necessary to put real values on your variables, as
    the actual values aren’t required for parsing purposes:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果你的DAG使用**Airflow变量**，你必须在本地定义它们。然而，不需要在你的变量上放置真实值，因为实际值对于解析目的不是必需的：
- en: '[PRE4]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Without this, you’ll encounter an error like:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有这个，你将遇到如下错误：
- en: '[PRE5]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Using the Tool
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用工具
- en: After installing the library, you can begin measuring parse times. For example,
    suppose you have a DAG file named `dag_test.py` containing the non-optimized DAG
    code used in the example above.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 安装库后，你可以开始测量解析时间。例如，假设你有一个名为`dag_test.py`的DAG文件，其中包含上述示例中使用的未优化DAG代码。
- en: 'To measure its parse time, simply run:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 要测量其解析时间，只需运行以下命令：
- en: '[PRE6]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'This execution produces the following output:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 此次执行生成了以下输出：
- en: '![Execution result. Image by author.](../Images/5b7b07e8feb9af518931c8976c8513b3.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![执行结果。图片由作者提供](../Images/5b7b07e8feb9af518931c8976c8513b3.png)'
- en: Execution result. Image by author.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 执行结果。图片由作者提供。
- en: 'As observed, our DAG presented a parse time of **0.61 seconds**. If I run the
    command again, I’ll see some small differences, as parse times can vary slightly
    across runs due to system and environmental factors:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如观察到的，我们的DAG的解析时间为**0.61秒**。如果我再次运行该命令，我会看到一些小的差异，因为由于系统和环境因素的影响，解析时间可能会在运行之间略有变化：
- en: '![Result of another execution of the same DAG. Image by author.](../Images/db1d5f98a5d2eab33df4d7ea45aca4e7.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![同一DAG的另一次执行结果。图片由作者提供](../Images/db1d5f98a5d2eab33df4d7ea45aca4e7.png)'
- en: Result of another execution of the same DAG. Image by author.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 同一DAG的另一次执行结果。图片由作者提供。
- en: 'In order to present a more concise number, it’s possible to aggregate multiple
    executions by specifying the number of iterations:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 为了呈现一个更简洁的数字，可以通过指定迭代次数来聚合多次执行：
- en: '[PRE7]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Although it takes a bit longer to finish, this calculates the **average parse
    time** across five executions.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然完成时间稍长，但这计算了五次执行的平均解析时间。
- en: 'Now, to evaluate the impact of the aforementioned optimizations, I replaced
    the code in my`dag_test.py` with the optimized version shared earlier. After executing
    the same command, I got the following result:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，为了评估上述优化的影响，我将`dag_test.py`中的代码替换为之前共享的优化版本。执行相同的命令后，我得到了以下结果：
- en: '![Parse result of the optimized code. Image by author.](../Images/d5f226ee8e5fa351aa1a2776597f1cfb.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![优化代码的解析结果。图片由作者提供](../Images/d5f226ee8e5fa351aa1a2776597f1cfb.png)'
- en: Parse result of the optimized code. Image by author.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 优化代码的解析结果。图片由作者提供。
- en: As noticed, just applying some good practices was capable of reducing almost
    **0.5 seconds** in the DAG parse time, highlighting the importance of the changes
    we made!
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如注意到的，仅仅应用一些良好的实践就能将DAG解析时间减少近**0.5秒**，突出了我们做出的改变的重要性！
- en: Further Exploring the Tool
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进一步探索工具
- en: There are other interesting features that I think it’s relevant to share.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 有其他我认为相关的有趣特性。
- en: As a reminder, if you have any doubts or problems using the tool, you can access
    the complete documentation on [GitHub](https://github.com/AlvaroCavalcante/airflow-parse-bench).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 作为提醒，如果你在使用工具时有任何疑问或问题，你可以访问GitHub上的完整文档[GitHub](https://github.com/AlvaroCavalcante/airflow-parse-bench)。
- en: 'Besides that, to view all the parameters supported by the library, simply run:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，要查看库支持的所有参数，只需运行以下命令：
- en: '[PRE8]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Testing Multiple DAGs
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试多个DAG
- en: In most cases, you likely have dozens of DAGs to test the parse times. To address
    this use case, I created a folder named `dags` and put four Python files inside
    it.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数情况下，您可能需要测试数十个 DAG 的解析时间。为了应对这一用例，我创建了一个名为 `dags` 的文件夹，并在其中放入了四个 Python
    文件。
- en: 'To measure the parse times for all the DAGs in a folder, it’s just necessary
    to specify the folder path in the `--path` parameter:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 要测量文件夹中所有 DAG 的解析时间，只需在 `--path` 参数中指定文件夹路径：
- en: '[PRE9]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Running this command produces a table summarizing the parse times for all the
    DAGs in the folder:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此命令将生成一个表格，总结文件夹中所有 DAG 的解析时间：
- en: '![Testing the parse time of multiple DAGs. Image by author.](../Images/fba6f0a27c0cb9c5ad619cfbcec51325.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![测试多个 DAG 的解析时间。图片由作者提供。](../Images/fba6f0a27c0cb9c5ad619cfbcec51325.png)'
- en: Testing the parse time of multiple DAGs. Image by author.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 测试多个 DAG 的解析时间。图片由作者提供。
- en: 'By default, the table is sorted from the fastest to the slowest DAG. However,
    you can reverse the order by using the `--order` parameter:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，表格按从快到慢的 DAG 排序。但是，您可以使用 `--order` 参数来反转顺序：
- en: '[PRE10]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![Inverted sorting order. Image by author.](../Images/17abd140d27a468882212e9f8f8217f0.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![倒序排序。图片由作者提供。](../Images/17abd140d27a468882212e9f8f8217f0.png)'
- en: Inverted sorting order. Image by author.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 倒序排序。图片由作者提供。
- en: Skipping Unchanged DAGs
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 跳过未更改的 DAG
- en: 'The `--skip-unchanged` parameter can be especially useful during development.
    As the name suggests, this option skips the parse execution for DAGs that haven’t
    been modified since the last execution:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '`--skip-unchanged` 参数在开发期间特别有用。正如其名所示，此选项跳过自上次执行以来未修改的 DAG 的解析执行：'
- en: '[PRE11]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'As shown below, when the DAGs remain unchanged, the output reflects no difference
    in parse times:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 如下所示，当 DAG 保持不变时，输出反映了解析时间的无差异：
- en: '![Output with no difference for unchanged files. Image by author.](../Images/9770f84be10aab3f4cc06875f64524ae.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![对于未更改的文件，输出无差异。图片由作者提供。](../Images/9770f84be10aab3f4cc06875f64524ae.png)'
- en: Output with no difference for unchanged files. Image by author.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 对于未更改的文件，输出无差异。图片由作者提供。
- en: Resetting the Database
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重置数据库
- en: 'All DAG information, including metrics and history, is stored in a local SQLite
    database. If you want to clear all stored data and start fresh, use the `--reset-db`
    flag:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 所有 DAG 信息，包括指标和历史记录，都存储在本地 SQLite 数据库中。如果您想清除所有存储的数据并从头开始，请使用 `--reset-db` 标志：
- en: '[PRE12]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This command resets the database and processes the DAGs as if it were the first
    execution.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 此命令重置数据库并处理 DAG，就像它是第一次执行一样。
- en: Conclusion
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Parse time is an important metric for maintaining scalable and efficient Airflow
    environments, especially as your orchestration requirements become increasingly
    complex.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 解析时间是维护可扩展和高效 Airflow 环境的重要指标，尤其是在您的编排需求变得越来越复杂时。
- en: For this reason, the **`[airflow-parse-bench](https://github.com/AlvaroCavalcante/airflow-parse-bench)`**
    library can be an important tool for helping data engineers create better DAGs.
    By testing your DAGs’ parse time locally, you can easily and quickly find your
    code bottleneck, making your dags faster and more performant.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，**`[airflow-parse-bench](https://github.com/AlvaroCavalcante/airflow-parse-bench)`**
    库可以成为帮助数据工程师创建更好的 DAG 的重要工具。通过在本地测试 DAG 的解析时间，您可以轻松快速地找到代码瓶颈，使您的 DAG 更快、性能更优。
- en: Since the code is executed locally, the produced parse time won’t be the same
    as the one present in your Airflow cluster. However, if you are able to reduce
    the parse time in your local machine, the same might be reproduced in your cloud
    environment.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 由于代码是在本地执行的，产生的解析时间可能不会与您 Airflow 集群中的相同。然而，如果您能够在本地机器上减少解析时间，相同的改进也可能在您的云环境中实现。
- en: Finally, this project is open for collaboration! If you have suggestions, ideas,
    or improvements, feel free to contribute on [GitHub](https://github.com/AlvaroCavalcante/airflow-parse-bench).
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这个项目对协作开放！如果您有建议、想法或改进，请随时在 [GitHub](https://github.com/AlvaroCavalcante/airflow-parse-bench)
    上贡献。
