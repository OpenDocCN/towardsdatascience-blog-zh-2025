- en: Mastering NLP with spaCy – Part 2
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/mastering-nlp-with-spacy-part-2/](https://towardsdatascience.com/mastering-nlp-with-spacy-part-2/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <mdspan datatext="el1754052057067" class="mdspan-comment">Words</mdspan> in
    a sentence provide a lot of information, such as what they mean in the real world,
    how they connect to other words, how they change the meaning of other words, and
    sometimes their true meaning can be ambiguous, and can even confuse humans!
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fc6bf73605c81be0927307c92fd580c2.png)'
  prefs: []
  type: TYPE_IMG
- en: Image via Unsplash
  prefs: []
  type: TYPE_NORMAL
- en: 'All of this must be figured out to build applications with **Natural Language
    Understanding** capabilities. Three main tasks help to capture different kinds
    of information from text:'
  prefs: []
  type: TYPE_NORMAL
- en: Part-of-speech (POS) tagging
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dependency parsing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Named entity recognition
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Part of Speech (POS) Tagging
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/43d5e045e40eb9810e123d7028ba4b88.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: In POS tagging, we classify words under certain categories, based on their function
    in a sentence. For example we want to differentiate a noun from a verb. This can
    help us understand the meaning of some text.
  prefs: []
  type: TYPE_NORMAL
- en: The most common tags are the following.
  prefs: []
  type: TYPE_NORMAL
- en: '**NOUN**: Names a person, place, thing, or idea (e.g., “dog”, “city”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**VERB**: Describes an action, state, or occurrence (e.g., “run”, “is”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ADJ**: Modifies a noun to describe its quality, quantity, or extent (e.g.,
    “big”, “happy”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ADV**: Modifies a verb, adjective, or other adverb, often indicating manner,
    time, or degree (e.g., “quickly”, “very”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PRON**: Replaces a noun or noun phrase (e.g., “he”, “they”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DET**: Introduces or specifies a noun (e.g., “the”, “a”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ADP**: Shows the relationship of a noun or pronoun to another word (e.g.,
    “in”, “on”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**NUM**: Represents a number or quantity (e.g., “one”, “fifty”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CONJ**: Connects words, phrases, or clauses (e.g., “and”, “but”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PRT**: A particle, often part of a verb phrase or preposition (e.g., “up”
    in “give up”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PUNCT**: Marks punctuation symbols (e.g., “.”, “,”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**X**: Catch-all for other or unclear categories (e.g., foreign words, symbols).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are called **Universal Tags**. Then each language can have more granular
    tags. For example we can expand the “noun” tag to add the singular/plural information
    etc.
  prefs: []
  type: TYPE_NORMAL
- en: In spaCy tags are represented with acronyms like “VBD”. If you are not sure
    what an acronym refers to, you can ask spaCy to explain with spacy.explain()
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see some examples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Let’s try now to investigate the POS tags of an entire sentence
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/58fb59defc32209b6fd66ddfb1dd4512.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The tag of a word depends on the words nearby, their tags, and the word itself.
  prefs: []
  type: TYPE_NORMAL
- en: POS taggers are based on statistical models. We have mainly
  prefs: []
  type: TYPE_NORMAL
- en: 'Rule-Based Taggers: Use hand-crafted linguistic rules (e.g., “a word after
    ‘the’ is often a noun”).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Statistical Taggers: Use probabilistic models like Hidden Markov Models (HMMs)
    or Conditional Random Fields (CRFs) to predict tags based on word and tag sequences.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Neural Network Taggers: Use deep learning models like Recurrent Neural Networks
    (RNNs), Long Short-Term Memory (LSTM) networks, or Transformers (e.g., BERT) to
    capture context and predict tags.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dependency Parsing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With POS tagging we are able to categorize the words in out document, but we
    don’t know what are the relationships among the words. This is exactly what dependency
    parsing does. This helps us understand the structure of a sentence.
  prefs: []
  type: TYPE_NORMAL
- en: We can think a dependency as a direct edge/link that goes from a parent word
    to a child, which defines the relationship between the two. This is why we use
    dependency trees to represent the structure of sentences. See the following image.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/39bc559d24d1a57990d9003a2f725d97.png)'
  prefs: []
  type: TYPE_IMG
- en: 'src: [https://spacy.io/usage/visualizers](https://spacy.io/usage/visualizers)'
  prefs: []
  type: TYPE_NORMAL
- en: In a dependency relation, we always have a **parent**, also called the **head**, and
    a **dependent**, also called the **child.** In the phrase “red car”, car is the
    head and red is the child.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4cfcfa754c6800ca89c1d09131776ac7.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: In spaCy the relation is always assigned to the child and can be accessed with
    the attribute `token.dep_`
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: As you can see in a sentence, the main word, usually a verb, in this case a
    noun, has the role of ROOT. From the root, we build our dependency tree.
  prefs: []
  type: TYPE_NORMAL
- en: It is important to know, also that a word can have multiple children but only
    one parent.
  prefs: []
  type: TYPE_NORMAL
- en: So in this case what does the *amod* relationship tells us?
  prefs: []
  type: TYPE_NORMAL
- en: The relation applies whether the meaning of the noun is modified in a compositional
    way (e.g., *large house*) or an idiomatic way (*hot dogs*).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Indeed, the “red” is a word that modifies the word “car” by adding some information
    to it.
  prefs: []
  type: TYPE_NORMAL
- en: I will list now the most fundamental relationship you can find in a dependency
    parsing and their meaning.
  prefs: []
  type: TYPE_NORMAL
- en: 'Fot a comprehensive list check this website: [https://universaldependencies.org/u/dep/index.html](https://universaldependencies.org/u/dep/index.html)'
  prefs: []
  type: TYPE_NORMAL
- en: '**root**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: The main predicate or head of the sentence, typically a verb, anchoring
    the dependency tree.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “She runs,” “runs” is the root.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**nsubj** (Nominal Subject)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: A noun phrase acting as the subject of a verb.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “The cat sleeps,” “cat” is the nsubj of “sleeps.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**obj** (Object)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: A noun phrase directly receiving the action of a verb.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “She kicked the ball,” “ball” is the obj of “kicked.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**iobj** (Indirect Object)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: A noun phrase indirectly affected by the verb, often a recipient.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “She gave him a book,” “him” is the iobj of “gave.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**obl** (Oblique Nominal)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: A noun phrase acting as a non-core argument or adjunct (e.g., time,
    place).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “She runs in the park,” “park” is the obl of “runs.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**advmod** (Adverbial Modifier)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: An adverb modifying a verb, adjective, or adverb.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “She runs quickly,” “quickly” is the advmod of “runs.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**amod** (Adjectival Modifier)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: An adjective modifying a noun.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “A red apple,” “red” is the amod of “apple.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**det** (Determiner)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: A word specifying the reference of a noun (e.g., articles, demonstrations).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “The cat,” “the” is the det of “cat.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**case** (Case Marking)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: A word (e.g., preposition) marking the role of a noun phrase.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “In the park,” “in” is the case of “park.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**conj** (Conjunct)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: A coordinated word or phrase linked via a conjunction.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “She runs and jumps,” “jumps” is the conj of “runs.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**cc** (Coordinating Conjunction)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: A conjunction linking coordinated elements.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “She runs and jumps,” “and” is the cc.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**aux** (Auxiliary)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meaning: An auxiliary verb supporting the main verb (tense, mood, aspect).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: In “She has eaten,” “has” is the aux of “eaten.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: We can visualize the dependency tree in spaCy using the **display** module.
    Let’s see an example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/a8ddb44f183ec7c6a4fc7d5046ee39ff.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Named Entity Recognition (NER)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A POS tag provides with information about the role of a word in a sentence.
    When we perform NER we look for words that represent objects in the real world:
    a company name, a proper name, a location etc.'
  prefs: []
  type: TYPE_NORMAL
- en: We refer to these words as **named entity**. See this example.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dfaeca73d8bfc795b4992b9693991dee.png)'
  prefs: []
  type: TYPE_IMG
- en: 'src: [https://spacy.io/usage/visualizers#ent](https://spacy.io/usage/visualizers#ent)'
  prefs: []
  type: TYPE_NORMAL
- en: In the sentence “*Rome is the capital of Italy*“, Rome and Italy are named entity,
    while capital it’s not because it is a generic noun.
  prefs: []
  type: TYPE_NORMAL
- en: 'spaCy supports many named entities already, to visualise them:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Named entity are accessible in spaCy with the `doc.ents` attribute
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: We can also ask spaCy provide some explanation about the named entities.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Again, we can rely on displacy to visualise the results of NER.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/c277e07960ba1f7bdf439dbf25f17387.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Understanding how language is structured and how it works is key to building
    better tools that can handle text in meaningful ways. Techniques like part-of-speech
    tagging, dependency parsing, and named entity recognition help break down sentences
    so we can see how words function, how they connect, and what real-world things
    they refer to.
  prefs: []
  type: TYPE_NORMAL
- en: These methods give us a practical way to pull useful information out of text,
    things like identifying who did what to whom, or spotting names, dates, and places.
    Libraries like spaCy make it easier to explore these ideas, offering clear ways
    to see how language fits together.
  prefs: []
  type: TYPE_NORMAL
