- en: Mastering NLP with spaCy – Part 2
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用spaCy掌握NLP – 第2部分
- en: 原文：[https://towardsdatascience.com/mastering-nlp-with-spacy-part-2/](https://towardsdatascience.com/mastering-nlp-with-spacy-part-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/mastering-nlp-with-spacy-part-2/](https://towardsdatascience.com/mastering-nlp-with-spacy-part-2/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 简介
- en: <mdspan datatext="el1754052057067" class="mdspan-comment">Words</mdspan> in
    a sentence provide a lot of information, such as what they mean in the real world,
    how they connect to other words, how they change the meaning of other words, and
    sometimes their true meaning can be ambiguous, and can even confuse humans!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754052057067" class="mdspan-comment">句子中的单词提供了大量信息，例如它们在现实世界中的含义、它们如何与其他单词连接、它们如何改变其他单词的含义，有时它们的真正含义可能是模糊的，甚至可能让人困惑！
- en: '![](../Images/fc6bf73605c81be0927307c92fd580c2.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fc6bf73605c81be0927307c92fd580c2.png)'
- en: Image via Unsplash
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自Unsplash
- en: 'All of this must be figured out to build applications with **Natural Language
    Understanding** capabilities. Three main tasks help to capture different kinds
    of information from text:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都必须弄清楚，才能构建具有**自然语言理解**能力的应用程序。三个主要任务有助于从文本中捕获不同类型的信息：
- en: Part-of-speech (POS) tagging
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 词性（POS）标注
- en: Dependency parsing
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 依存句法分析
- en: Named entity recognition
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 命名实体识别
- en: Part of Speech (POS) Tagging
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 词性（POS）标注
- en: '![](../Images/43d5e045e40eb9810e123d7028ba4b88.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/43d5e045e40eb9810e123d7028ba4b88.png)'
- en: Image by Author
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: In POS tagging, we classify words under certain categories, based on their function
    in a sentence. For example we want to differentiate a noun from a verb. This can
    help us understand the meaning of some text.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在词性标注中，我们根据单词在句子中的功能将单词分类到某些类别中。例如，我们想要区分名词和动词。这有助于我们理解某些文本的含义。
- en: The most common tags are the following.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的标签如下。
- en: '**NOUN**: Names a person, place, thing, or idea (e.g., “dog”, “city”).'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NOUN**：命名人、地点、事物或概念（例如，“狗”，“城市”）。'
- en: '**VERB**: Describes an action, state, or occurrence (e.g., “run”, “is”).'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**VERB**：描述动作、状态或事件（例如，“跑”，“是”）。'
- en: '**ADJ**: Modifies a noun to describe its quality, quantity, or extent (e.g.,
    “big”, “happy”).'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ADJ**：修饰名词，描述其质量、数量或程度（例如，“大”，“快乐”）。'
- en: '**ADV**: Modifies a verb, adjective, or other adverb, often indicating manner,
    time, or degree (e.g., “quickly”, “very”).'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ADV**：修饰动词、形容词或其他副词，通常表示方式、时间或程度（例如，“快速地”，“非常”）。'
- en: '**PRON**: Replaces a noun or noun phrase (e.g., “he”, “they”).'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PRON**：替换名词或名词短语（例如，“他”，“他们”）。'
- en: '**DET**: Introduces or specifies a noun (e.g., “the”, “a”).'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**DET**：引入或指定名词（例如，“the”，“a”）。'
- en: '**ADP**: Shows the relationship of a noun or pronoun to another word (e.g.,
    “in”, “on”).'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ADP**：显示名词或代词与其他单词的关系（例如，“in”，“on”）。'
- en: '**NUM**: Represents a number or quantity (e.g., “one”, “fifty”).'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NUM**：表示数字或数量（例如，“一个”，“五十”）。'
- en: '**CONJ**: Connects words, phrases, or clauses (e.g., “and”, “but”).'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CONJ**：连接单词、短语或子句（例如，“和”，“但是”）。'
- en: '**PRT**: A particle, often part of a verb phrase or preposition (e.g., “up”
    in “give up”).'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PRT**：粒子，通常是动词短语或介词的一部分（例如，“give up”中的“up”）。'
- en: '**PUNCT**: Marks punctuation symbols (e.g., “.”, “,”).'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PUNCT**：标记标点符号（例如，“。”，“，”）。'
- en: '**X**: Catch-all for other or unclear categories (e.g., foreign words, symbols).'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**X**：用于其他或不确定的分类（例如，外语单词，符号）。'
- en: These are called **Universal Tags**. Then each language can have more granular
    tags. For example we can expand the “noun” tag to add the singular/plural information
    etc.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这些被称为**通用标签**。然后每种语言都可以有更细粒度的标签。例如，我们可以扩展“名词”标签以添加单数/复数信息等。
- en: In spaCy tags are represented with acronyms like “VBD”. If you are not sure
    what an acronym refers to, you can ask spaCy to explain with spacy.explain()
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在spaCy中，标签用缩写如“VBD”表示。如果您不确定缩写代表什么，可以要求spaCy使用spacy.explain()进行解释。
- en: Let’s see some examples.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些例子。
- en: '[PRE0]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Let’s try now to investigate the POS tags of an entire sentence
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来尝试调查整个句子的词性标签。
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/58fb59defc32209b6fd66ddfb1dd4512.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/58fb59defc32209b6fd66ddfb1dd4512.png)'
- en: Image by Author
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The tag of a word depends on the words nearby, their tags, and the word itself.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 单词的标签取决于附近的单词、它们的标签以及单词本身。
- en: POS taggers are based on statistical models. We have mainly
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 词性标注器基于统计模型。我们主要有
- en: 'Rule-Based Taggers: Use hand-crafted linguistic rules (e.g., “a word after
    ‘the’ is often a noun”).'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于规则的标签器：使用手工制作的语料库规则（例如，“the”后面的单词通常是名词”）。
- en: 'Statistical Taggers: Use probabilistic models like Hidden Markov Models (HMMs)
    or Conditional Random Fields (CRFs) to predict tags based on word and tag sequences.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 统计标签器：使用概率模型，如隐马尔可夫模型（HMM）或条件随机字段（CRFs）来根据单词和标签序列预测标签。
- en: 'Neural Network Taggers: Use deep learning models like Recurrent Neural Networks
    (RNNs), Long Short-Term Memory (LSTM) networks, or Transformers (e.g., BERT) to
    capture context and predict tags.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 神经网络标注器：使用循环神经网络（RNN）、长短期记忆（LSTM）网络或转换器（例如，BERT）等深度学习模型来捕捉上下文并预测标签。
- en: Dependency Parsing
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 依存句法分析
- en: With POS tagging we are able to categorize the words in out document, but we
    don’t know what are the relationships among the words. This is exactly what dependency
    parsing does. This helps us understand the structure of a sentence.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 通过词性标注，我们能够对文档中的单词进行分类，但我们不知道单词之间的关系。这正是依存句法分析所做的。这有助于我们理解句子的结构。
- en: We can think a dependency as a direct edge/link that goes from a parent word
    to a child, which defines the relationship between the two. This is why we use
    dependency trees to represent the structure of sentences. See the following image.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将依存关系视为从父词到子词的直接边/链接，这定义了两者之间的关系。这就是为什么我们使用依存树来表示句子的结构。请参见以下图片。
- en: '![](../Images/39bc559d24d1a57990d9003a2f725d97.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/39bc559d24d1a57990d9003a2f725d97.png)'
- en: 'src: [https://spacy.io/usage/visualizers](https://spacy.io/usage/visualizers)'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 'src: [https://spacy.io/usage/visualizers](https://spacy.io/usage/visualizers)'
- en: In a dependency relation, we always have a **parent**, also called the **head**, and
    a **dependent**, also called the **child.** In the phrase “red car”, car is the
    head and red is the child.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在依存关系中，我们始终有一个**父词**，也称为**头部**，和一个**依赖词**，也称为**子词**。在短语“红色汽车”中，汽车是头部，红色是子词。
- en: '![](../Images/4cfcfa754c6800ca89c1d09131776ac7.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4cfcfa754c6800ca89c1d09131776ac7.png)'
- en: Image by Author
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: In spaCy the relation is always assigned to the child and can be accessed with
    the attribute `token.dep_`
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在 spaCy 中，关系始终分配给子词，可以通过属性 `token.dep_` 访问。
- en: '[PRE2]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: As you can see in a sentence, the main word, usually a verb, in this case a
    noun, has the role of ROOT. From the root, we build our dependency tree.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如您在句子中看到的那样，主要词，通常是动词，在这种情况下是名词，具有根的角色。从根开始，我们构建我们的依存树。
- en: It is important to know, also that a word can have multiple children but only
    one parent.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要知道，一个词可以有多个子词，但只有一个父词。
- en: So in this case what does the *amod* relationship tells us?
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 所以在这种情况下，*amod* 关系告诉我们什么？
- en: The relation applies whether the meaning of the noun is modified in a compositional
    way (e.g., *large house*) or an idiomatic way (*hot dogs*).
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 无论名词的意义是以组合方式（例如，*大型房屋*）还是以习语方式（*热狗*）修改，关系都适用。
- en: Indeed, the “red” is a word that modifies the word “car” by adding some information
    to it.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，“红色”是一个通过添加一些信息来修饰“汽车”的词。
- en: I will list now the most fundamental relationship you can find in a dependency
    parsing and their meaning.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在将列出在依存句法分析中可以找到的最基本的关系及其含义。
- en: 'Fot a comprehensive list check this website: [https://universaldependencies.org/u/dep/index.html](https://universaldependencies.org/u/dep/index.html)'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取完整的列表，请查看此网站：[https://universaldependencies.org/u/dep/index.html](https://universaldependencies.org/u/dep/index.html)
- en: '**root**'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**root**'
- en: 'Meaning: The main predicate or head of the sentence, typically a verb, anchoring
    the dependency tree.'
  id: totrans-58
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意思是：句子的主要谓语或头部，通常是动词，是依存树的锚点。
- en: 'Example: In “She runs,” “runs” is the root.'
  id: totrans-59
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：在“她跑”中，“跑”是根。
- en: '**nsubj** (Nominal Subject)'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**nsubj**（名词主语）'
- en: 'Meaning: A noun phrase acting as the subject of a verb.'
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意思是：一个名词短语作为动词的主语。
- en: 'Example: In “The cat sleeps,” “cat” is the nsubj of “sleeps.”'
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：在“猫睡觉”中，“猫”是“睡觉”的 nsubj。
- en: '**obj** (Object)'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**obj**（宾语）'
- en: 'Meaning: A noun phrase directly receiving the action of a verb.'
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意思是：一个名词短语直接接受动词的动作。
- en: 'Example: In “She kicked the ball,” “ball” is the obj of “kicked.”'
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：在“她踢球”中，“球”是“踢”的 obj。
- en: '**iobj** (Indirect Object)'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**iobj**（间接宾语）'
- en: 'Meaning: A noun phrase indirectly affected by the verb, often a recipient.'
  id: totrans-67
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意思是：一个名词短语间接受动词的影响，通常是接受者。
- en: 'Example: In “She gave him a book,” “him” is the iobj of “gave.”'
  id: totrans-68
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：在“她给他一本书”中，“他”是“给”的 iobj。
- en: '**obl** (Oblique Nominal)'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**obl**（斜名词）'
- en: 'Meaning: A noun phrase acting as a non-core argument or adjunct (e.g., time,
    place).'
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意思是：一个名词短语作为非核心论元或附加成分（例如，时间、地点）。
- en: 'Example: In “She runs in the park,” “park” is the obl of “runs.”'
  id: totrans-71
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：在“她在公园里跑”中，“公园”是“跑”的 obl。
- en: '**advmod** (Adverbial Modifier)'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**advmod**（副词修饰语）'
- en: 'Meaning: An adverb modifying a verb, adjective, or adverb.'
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意思是：一个副词修饰动词、形容词或副词。
- en: 'Example: In “She runs quickly,” “quickly” is the advmod of “runs.”'
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：在“她跑得快”中，“快”是“跑”的 advmod。
- en: '**amod** (Adjectival Modifier)'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**amod**（形容词修饰语）'
- en: 'Meaning: An adjective modifying a noun.'
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意思是：一个形容词修饰名词。
- en: 'Example: In “A red apple,” “red” is the amod of “apple.”'
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子：在“A red apple”中，“red”是“apple”的amod。
- en: '**det** (Determiner)'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**det** (Determiner)'
- en: 'Meaning: A word specifying the reference of a noun (e.g., articles, demonstrations).'
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意义：指定名词（例如，冠词、指示代词）的词。
- en: 'Example: In “The cat,” “the” is the det of “cat.”'
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子：在“The cat”中，“the”是“cat”的det。
- en: '**case** (Case Marking)'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**case** (Case Marking)'
- en: 'Meaning: A word (e.g., preposition) marking the role of a noun phrase.'
  id: totrans-82
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意义：一个词（例如，介词）标记名词短语的角色。
- en: 'Example: In “In the park,” “in” is the case of “park.”'
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子：在“In the park”中，“in”是“park”的case。
- en: '**conj** (Conjunct)'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**conj** (Conjunct)'
- en: 'Meaning: A coordinated word or phrase linked via a conjunction.'
  id: totrans-85
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意义：通过连词连接的并列词或短语。
- en: 'Example: In “She runs and jumps,” “jumps” is the conj of “runs.”'
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子：在“She runs and jumps”中，“jumps”是“runs”的conj。
- en: '**cc** (Coordinating Conjunction)'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**cc** (Coordinating Conjunction)'
- en: 'Meaning: A conjunction linking coordinated elements.'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意义：连接协调元素的连词。
- en: 'Example: In “She runs and jumps,” “and” is the cc.'
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子：在“She runs and jumps”中，“and”是cc。
- en: '**aux** (Auxiliary)'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**aux** (Auxiliary)'
- en: 'Meaning: An auxiliary verb supporting the main verb (tense, mood, aspect).'
  id: totrans-91
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意义：支持主要动词的助动词（时态、语气、语态）。
- en: 'Example: In “She has eaten,” “has” is the aux of “eaten.”'
  id: totrans-92
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子：在“She has eaten”中，“has”是“eaten”的aux。
- en: We can visualize the dependency tree in spaCy using the **display** module.
    Let’s see an example.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用spaCy的**display**模块来可视化依存树。让我们看看一个例子。
- en: '[PRE3]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/a8ddb44f183ec7c6a4fc7d5046ee39ff.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a8ddb44f183ec7c6a4fc7d5046ee39ff.png)'
