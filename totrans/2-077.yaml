- en: Named Entity Recognition (NER)
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 命名实体识别 (NER)
- en: 'A POS tag provides with information about the role of a word in a sentence.
    When we perform NER we look for words that represent objects in the real world:
    a company name, a proper name, a location etc.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: POS标签提供有关词在句子中角色的信息。当我们执行NER时，我们寻找代表现实世界中对象的词：公司名称、专有名词、地点等。
- en: We refer to these words as **named entity**. See this example.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将这些词称为**命名实体**。参见此示例。
- en: '![](../Images/dfaeca73d8bfc795b4992b9693991dee.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dfaeca73d8bfc795b4992b9693991dee.png)'
- en: 'src: [https://spacy.io/usage/visualizers#ent](https://spacy.io/usage/visualizers#ent)'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 'src: [https://spacy.io/usage/visualizers#ent](https://spacy.io/usage/visualizers#ent)'
- en: In the sentence “*Rome is the capital of Italy*“, Rome and Italy are named entity,
    while capital it’s not because it is a generic noun.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在句子“*Rome is the capital of Italy*”中，Rome和Italy是命名实体，而capital不是，因为它是一个普通名词。
- en: 'spaCy supports many named entities already, to visualise them:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: spaCy支持许多命名实体，要可视化它们：
- en: '[PRE4]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Named entity are accessible in spaCy with the `doc.ents` attribute
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 命名实体可以通过spaCy的`doc.ents`属性访问
- en: '[PRE5]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: We can also ask spaCy provide some explanation about the named entities.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以要求spaCy提供一些关于命名实体的解释。
- en: '[PRE6]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Again, we can rely on displacy to visualise the results of NER.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我们可以依靠displacy来可视化NER的结果。
- en: '[PRE7]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
