    thinking.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[“Systems thinking helps me put the big picture front and center”](https://towardsdatascience.com/systems-thinking-helps-me-put-the-big-picture-front-and-center/)'
  prefs:
