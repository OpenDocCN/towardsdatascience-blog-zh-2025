- en: Graph RAG vs SQL RAG
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Graph RAG vs SQL RAG
- en: Which database paradigm delivers more accurate and insightful results? [Reinhard
    Sellmair](https://towardsdatascience.com/author/reinhard-sellmair/) sets out to
    assess the performance of two types of RAG systems by pitting GraphRAG and SQL
    RAG against each other, using the same dataset and questions.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 哪种数据库范式能提供更准确和有洞察力的结果？[Reinhard Sellmair](https://towardsdatascience.com/author/reinhard-sellmair/)
    通过将 GraphRAG 和 SQL RAG 进行对比，使用相同的dataset和问题来评估两种类型的RAG系统的性能。
- en: '[Graph RAG vs SQL RAG](https://towardsdatascience.com/graph-rag-vs-sql-rag/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Graph RAG vs SQL RAG](https://towardsdatascience.com/graph-rag-vs-sql-rag/)'
