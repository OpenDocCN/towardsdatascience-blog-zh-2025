  type: TYPE_NORMAL
  zh: LLM-Powered Time-Series Analysis
- en: In the second part of Sara Nobrega’s popular series, we learn about the prompts
    we need for advanced model development (think ARIMA and LSTM).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在Sara Nobrega受欢迎系列的第二部分中，我们了解到高级模型开发所需的提示（例如ARIMA和LSTM）。
