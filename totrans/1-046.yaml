  type: TYPE_NORMAL
- en: “The success of an AI product depends on how intuitively users can interact
    with its capabilities”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Janna Lipenkova on AI strategy, AI products, and how domain knowledge can change
    the entire shape of an AI solution.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[“The success of an AI product depends on how intuitively users can interact
