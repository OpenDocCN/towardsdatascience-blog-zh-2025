- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: With the end of the year just a few weeks away, neither our authors nor our
    readers are showing any signs of slowing down.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’re thrilled to have published some of our strongest articles of the year
    in the past month: practical guides on LLM workflows and resources on [career
    growth](https://towardsdatascience.com/tag/career-advice/), Python-focused tutorials,
    and deep dives on recently launched tools, among other standout topics. Read on
    to catch up with (or revisit) November’s most-read stories.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Graph RAG vs SQL RAG
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Which database paradigm delivers more accurate and insightful results? [Reinhard
    Sellmair](https://towardsdatascience.com/author/reinhard-sellmair/) sets out to
    assess the performance of two types of RAG systems by pitting GraphRAG and SQL
    RAG against each other, using the same dataset and questions.
  prefs: []
  type: TYPE_NORMAL
- en: '[Graph RAG vs SQL RAG](https://towardsdatascience.com/graph-rag-vs-sql-rag/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: LLM-Powered Time-Series Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the second part of Sara Nobrega’s popular series, we learn about the prompts
    we need for advanced model development (think ARIMA and LSTM).
  prefs: []
  type: TYPE_NORMAL
- en: '[LLM-Powered Time-Series Analysis](https://towardsdatascience.com/llm-powered-time-series-analysis/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How to Build Machine Learning Projects That Help You Get Hired
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Not all ML portfolios are created equal. Egor Howell shares time-tested insights
    on what works — and what doesn’t.
  prefs: []
  type: TYPE_NORMAL
- en: '[How to Build Machine Learning Projects That Help You Get Hired](https://towardsdatascience.com/the-machine-learning-projects-employers-want-to-see/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
