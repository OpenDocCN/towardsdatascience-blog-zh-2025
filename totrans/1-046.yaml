- en: 'In Case You Missed It: Our Latest Author Q&As'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We love sharing our authors’ expertise, career insights, and views on the recent
    developments in the world of data science and AI. Here are our most recent [Author
    Spotlights](https://towardsdatascience.com/category/author-spotlights/).
