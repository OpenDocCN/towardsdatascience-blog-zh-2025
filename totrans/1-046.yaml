    Spotlights](https://towardsdatascience.com/category/author-spotlights/).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们热爱分享我们作者的专业知识、职业洞察以及对数据科学和人工智能领域最新发展的观点。以下是我们的最新[作者聚焦](https://towardsdatascience.com/category/author-spotlights/)。
- en: “Systems thinking helps me put the big picture front and center”
