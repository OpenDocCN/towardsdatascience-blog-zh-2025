  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'We hope you take the time to explore the excellent work from the latest cohort
    of TDS contributors:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望您花时间探索TDS最新一批贡献者的杰出作品：
- en: '[Jure Leskovec](https://towardsdatascience.com/author/jure-leskovec/), a Stanford
    professor of computer science and entrepreneur, explains why LLMs aren’t a one-size-fits-all
    solution for companies.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Jure Leskovec](https://towardsdatascience.com/author/jure-leskovec/)，斯坦福大学计算机科学教授和企业家，解释了为什么LLM不是公司的一劳永逸的解决方案。'
- en: '[Why LLMs Aren’t a One-Size-Fits-All Solution for Enterprises](https://towardsdatascience.com/why-llms-arent-a-one-size-fits-all-solution-for-enterprises/)'
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[为什么LLM不是企业的一劳永逸的解决方案](https://towardsdatascience.com/why-llms-arent-a-one-size-fits-all-solution-for-enterprises/)'
- en: '[Sherin Sunny](https://towardsdatascience.com/author/sherin-sunny/), a senior
    engineer at Walmart, walked us through the creation of a computer vision project
    aimed at detecting leaves.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Sherin Sunny](https://towardsdatascience.com/author/sherin-sunny/)，沃尔玛的高级工程师，向我们介绍了旨在检测叶片的计算机视觉项目的创建过程。'
- en: '[How Deep Feature Embeddings and Euclidean Similarity Power Automatic Plant
    Leaf Recognition](https://towardsdatascience.com/how-deep-feature-embeddings-and-euclidean-similarity-power-automatic-plant-leaf-recognition/)'
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何通过深度特征嵌入和欧几里得相似性实现自动植物叶片识别](https://towardsdatascience.com/how-deep-feature-embeddings-and-euclidean-similarity-power-automatic-plant-leaf-recognition/)'
- en: '[Manuel Franco de la Peña](https://towardsdatascience.com/author/manuel-francodelapena/) introduced
    us to ShaTS, a novel Shapley-based explainability method specifically designed
    for time-series models, which he co-created.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Manuel Franco de la Peña](https://towardsdatascience.com/author/manuel-francodelapena/)向我们介绍了ShaTS，这是一种基于Shapley的新颖可解释方法，专门为时间序列模型设计，是他共同创建的。'
- en: '[Introducing ShaTS: A Shapley-Based Method for Time-Series Models](https://towardsdatascience.com/introducing-shats-a-shapley-based-method-for-time-series-models/)'
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[介绍ShaTS：时间序列模型基于Shapley的方法](https://towardsdatascience.com/introducing-shats-a-shapley-based-method-for-time-series-models/)'
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/?utm_source=newsletter&utm_medium=email&utm_campaign=tds%20variable&_hsenc=p2ANqtz--5BsaTIAfELtEKIi7KLPkVPN5RDrsyodSirzQQrzeY-bcsJGUt1_kK37Svh-xVMqcJaT9o)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢发布新作者的文章，所以如果你最近写了一个有趣的项目演练、教程或对我们核心主题的理论反思，为什么不[与我们分享呢？](https://towardsdatascience.com/questions-96667b06af5/?utm_source=newsletter&utm_medium=email&utm_campaign=tds%20variable&_hsenc=p2ANqtz--5BsaTIAfELtEKIi7KLPkVPN5RDrsyodSirzQQrzeY-bcsJGUt1_kK37Svh-xVMqcJaT9o)
