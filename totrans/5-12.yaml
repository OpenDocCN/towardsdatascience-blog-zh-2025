- en: Learn to Build Advanced AI Image Applications
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 学习构建高级AI图像应用程序
- en: 原文：[https://towardsdatascience.com/learn-to-build-advanced-ai-image-applications-9c98d0f1f930/](https://towardsdatascience.com/learn-to-build-advanced-ai-image-applications-9c98d0f1f930/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/learn-to-build-advanced-ai-image-applications-9c98d0f1f930/](https://towardsdatascience.com/learn-to-build-advanced-ai-image-applications-9c98d0f1f930/)'
- en: Custom Image Generation
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自定义图像生成
- en: '![Visualizing the open source space for image generation | Image by author](../Images/d3db6d5a3d189fe1e79a0ec5cd193e56.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![可视化图像生成开源空间 | 图片由作者提供](../Images/d3db6d5a3d189fe1e79a0ec5cd193e56.png)'
- en: Visualizing the open source space for image generation | Image by author
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化图像生成开源空间 | 图片由作者提供
- en: _If you’re not a member but want to read this article, see this friend link
    [here.](https://medium.com/@ilsilfverskiold/9c98d0f1f930?source=friends_link&sk=245d09535d83d211e2c89d32c9a38274)_
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: _如果你不是会员但想阅读这篇文章，请点击[这里](https://medium.com/@ilsilfverskiold/9c98d0f1f930?source=friends_link&sk=245d09535d83d211e2c89d32c9a38274)阅读。_
- en: For this piece, I wanted to embark on the challenge of making advanced image
    generation within the open-source space easier for beginners. I realize that it’s
    a pretty heavy task to complete in 20 minutes.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这篇文章，我想要接受挑战，让初学者在开源空间中制作高级图像生成变得更加容易。我意识到，在20分钟内完成这项任务是一项相当繁重的任务。
- en: We’ll cover what’s happening in this space, which open-source models and tools
    are popular, learn how diffusion works, and dive into key technologies like LoRAs,
    ControlNets, and IP Adapters.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将涵盖这个空间正在发生的事情，哪些开源模型和工具受欢迎，学习扩散是如何工作的，并深入了解LoRAs、ControlNets和IP适配器等关键技术。
- en: We’ll also explore different use cases and how you can apply various technologies
    to each.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将探索不同的用例以及如何将各种技术应用于每个用例。
- en: By the end, we’ll create an interior designer with Flux that takes an image
    of a bedroom and generates different designs. You can see what this will look
    like below.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将创建一个使用Flux的室内设计师，它能够根据卧室的图片生成不同的设计。你可以在下面看到这将是什么样子。
- en: '![Interior designer workflow in ComfyUI | Image by author](../Images/a1e916b8442a4adf72bd0ac2d6898908.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![ComfyUI中的室内设计师工作流程 | 图片由作者提供](../Images/a1e916b8442a4adf72bd0ac2d6898908.png)'
- en: Interior designer workflow in ComfyUI | Image by author
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: ComfyUI中的室内设计师工作流程 | 图片由作者提供
- en: If you are keen to get started, you can skip the introduction and go straight
    into building.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你急于开始，你可以跳过介绍，直接进入构建阶段。
- en: Introduction
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: This part is for everyone, even if you don’t want to dig into the technicalities
    of working with custom image generation.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这一部分面向所有人，即使你不想深入研究与自定义图像生成相关的技术细节。
- en: We’ll go through image generation, open source and proprietary models released,
    the tech available, a few use cases and cost of building.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将探讨图像生成、开源和专有模型发布、可用的技术、一些用例以及构建的成本。
- en: I have a collection of resources and information gat[here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen)d
    in my usual repository you can later find here.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的常规仓库中收集了一系列资源和信息[这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen)，你可以稍后在这里找到。
- en: Generative Images
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成式图像
- en: If you are completely knew to generative images you should go do some research.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你完全对生成式图像一无所知，你应该去做一些研究。
- en: This space as seen some serious innovation in the last few years.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几年里，这个空间见证了真正的创新。
- en: But it’s not just that you can generate high quality images with a prompts now
    but it’s about how new technologies enable you to have precise control over aspects
    like branding, product aesthetics, and personalized styles in these images.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 但不仅仅是现在你可以通过提示生成高质量图像，更重要的是，新技术使你能够对品牌、产品美学和这些图像中的个性化风格等方面进行精确控制。
- en: The open source community has been very busy the last few years building. We’ll
    go through different use cases and how this technology is changing.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几年里，开源社区一直非常忙碌，在构建方面。我们将探讨不同的用例以及这项技术是如何变化的。
- en: Closed vs Open Source Models
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 封闭式与开源模型
- en: The first thing we should go through are the AI models available in this space
    and which ones you should focus on building with.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先应该了解这个空间中可用的AI模型，以及你应该专注于构建哪些模型。
- en: Probably the oldest – and most widely used – is **Stable Diffusion 1.5**. It
    has a huge community behind it and is fully open source, which means you can build
    APIs on top of it commercially.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 可能是最古老且最广泛使用的——**Stable Diffusion 1.5**。它背后有一个庞大的社区支持，并且是完全开源的，这意味着你可以在其上构建商业API。
- en: In 2024, **Flux** was released by Black Forest Labs as a competitor to closed-source
    systems like MidJourney.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在2024年，Black Forest Labs发布了**Flux**，作为MidJourney等闭源系统的竞争对手。
- en: '![Most popular generative image models, release year and commercial licenses
    | Image by author](../Images/9d1eea0d38d0e06d9ad66953894cc0a3.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![最受欢迎的生成图像模型，发布年份和商业许可 | 作者提供的图片](../Images/9d1eea0d38d0e06d9ad66953894cc0a3.png)'
- en: Most popular generative image models, release year and commercial licenses |
    Image by author
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 最受欢迎的生成图像模型，发布年份和商业许可 | 作者提供的图片
- en: Flux Schnell is fully open source with a commercial license, but the more popular
    **Flux Dev** is not. This doesn’t mean you can’t use Flux Dev’s outputs commercially,
    but you can’t build systems on top of the model and sell it.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: Flux Schnell是完全开源的，拥有商业许可，但更受欢迎的**Flux Dev**则不是。这并不意味着你不能在商业上使用Flux Dev的输出，但你不能在模型之上构建系统并出售它。
- en: You can see my scribbles above on the different popular models, noting whether
    they’re open source and have a commercial license. If you want the entire list,
    check [this](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#image-generation-models-open-source-vs-closed-source).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在上面看到我对不同流行模型的涂鸦，注意它们是否开源并拥有商业许可。如果你想查看整个列表，请查看[这个](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#image-generation-models-open-source-vs-closed-source)。
- en: Now, while you might be tempted to jump straight to Flux for all your projects,
    keep in mind that the longer a model has been available, the more tools and resources
    have been built around it.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，虽然你可能想直接跳到Flux来处理所有项目，但请记住，一个模型可用的越久，围绕它的工具和资源就越多。
- en: '**Stable Diffusion 1.5** and **Stable Diffusion XL** have some of the largest
    communities, with many tools and techniques already developed. Don’t disregard
    them fully before you start building.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**Stable Diffusion 1.5**和**Stable Diffusion XL**拥有一些最大的社区，已经有许多工具和技术被开发出来。在你开始构建之前，不要完全忽视它们。'
- en: Image Use Cases
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图像使用案例
- en: There are so many use cases possible within this space.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个领域内，可能存在许多用例。
- en: A few days ago a few generated [AI images](https://www.reddit.com/r/stablediffusionreal/comments/1hql94v/comment/m6bw5bk/)
    was spreading across LinkedIn that were evidently so real that people couldn’t
    see the difference. These images were created from a fine-tuned LoRA of a woman’s
    vacation photos in ComfyUI by [this](https://www.reddit.com/user/dal_mac/) creator.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 几天前，一些生成的[AI图像](https://www.reddit.com/r/stablediffusionreal/comments/1hql94v/comment/m6bw5bk/)在LinkedIn上传播，这些图像显然非常逼真，以至于人们无法分辨出差异。这些图像是由[这位](https://www.reddit.com/user/dal_mac/)创作者在ComfyUI中基于一位女性的度假照片的微调LoRA创建的。
- en: Now, the possibilities doesn’t stop there.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，可能性并不止于此。
- en: You’ll see a few popular use cases I’ve scribbled below, along with their corresponding
    potential techniques.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你会在下面看到我涂鸦的几个流行用例，以及它们相应的潜在技术。
- en: '![Different use cases and techniques, see a clean list in this repository |
    Image by author](../Images/17fe879912eb9221cec94383cde370d5.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![不同的用例和技术，请在此存储库中查看清晰的列表 | 作者提供的图片](../Images/17fe879912eb9221cec94383cde370d5.png)'
- en: Different use cases and techniques, see a clean list in [this](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#example-use-case-w-said-tech)
    repository | Image by author
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的用例和技术，请在此[这个](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#example-use-case-w-said-tech)存储库中查看清晰的列表
    | 作者提供的图片
- en: I have a table [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#example-use-case-w-said-tech)
    that is a bit more organized.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一个表格[在这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#example-use-case-w-said-tech)，它组织得更好一些。
- en: What we do, though, is combine different tools for different workflows. You’ll
    often see people applying a ControlNet alongside an IP Adapter and additional
    LoRAs.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，我们结合不同的工具来处理不同的工作流程。你经常会看到人们在使用IP适配器和额外的LoRAs的同时应用ControlNet。
- en: ComfyUI vs Alternatives
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ComfyUI 与替代品
- en: Now, to build advanced generative image applications, we need to look at the
    tools available.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，为了构建高级生成图像应用程序，我们需要查看可用的工具。
- en: I’m sure there are plenty of commercial options out there, but there are also
    many open-source ones. These are better in every way as they have larger communities
    driving innovation, and they’re free.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信市场上有很多商业选项，但也有许多开源选项。这些选项在各个方面都更好，因为它们有更大的社区推动创新，并且是免费的。
- en: The biggest one released so far is **ComfyUI**.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，最大的一个是**ComfyUI**。
- en: ComfyUI is a visual, node-based GUI that gives you full control over the diffusion
    process, making it an excellent choice for creating custom generative images,
    and even videos at this point.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: ComfyUI是一个基于节点的可视化GUI，它让你完全控制扩散过程，使其成为创建自定义生成图像（甚至视频）的绝佳选择。
- en: However, many find ComfyUI unnecessarily complicated, so let’s quickly explore
    some alternatives.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，许多人发现ComfyUI过于复杂，所以让我们快速探索一些替代方案。
- en: '![Generative AI Image advance open source tools. See the list here | Image
    by author](../Images/bd45b98357a2b15b21c70276f2925011.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![生成式AI图像高级开源工具。查看列表[此处](../Images/bd45b98357a2b15b21c70276f2925011.png) |
    作者图片](../Images/bd45b98357a2b15b21c70276f2925011.png)'
- en: Generative AI Image advance open source tools. See the list [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#generative-image-tools)
    | Image by author
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI图像高级开源工具。查看列表[此处](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#generative-image-tools)
    | 作者图片
- en: The issue with many alternatives is that they can be restrictive and, by now,
    outdated. For example, A111 is one of the more well-known UIs, but currently,
    it does not support the newer Flux models.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 许多替代方案的缺点是它们可能过于限制性，并且到目前为止已经过时。例如，A111是更知名的UI之一，但目前它不支持较新的Flux模型。
- en: ComfyUI has a learning curve, and learning the basics may take a few days but
    any technical soul should get the grips of it.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: ComfyUI有一个学习曲线，学习基础知识可能需要几天时间，但任何有技术背景的人都应该能够掌握它。
- en: If you still find ComfyUI overly complicated, a good alternative is **SwarmUI**,
    which is built on top of ComfyUI and offers a simplified UI.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仍然觉得ComfyUI过于复杂，一个好的替代方案是**SwarmUI**，它是建立在ComfyUI之上的，并提供了简化的用户界面。
- en: This article will still be useful for understanding techniques, regardless of
    the tool you choose.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你选择哪种工具，这篇文章仍然有助于理解技术。
- en: Economics of Advanced Image Generation
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高级图像生成经济学
- en: If you’re a stakeholder, let’s briefly talk about the cost of building with
    tools like ComfyUI.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个利益相关者，让我们简要谈谈使用ComfyUI等工具构建的成本。
- en: To run these tools effectively, you’ll need good hardware, including GPUs with
    high VRAM, which requires a bit of an investment.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 要有效地运行这些工具，你需要良好的硬件，包括具有高VRAM的GPU，这需要一定的投资。
- en: Alternatively, you can rent cloud GPUs (which we all do) but this can add up
    quickly. The cheapest options start at around $0.60 per hour, depending on your
    setup.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，你可以租用云GPU（我们所有人都在做），但这可能会迅速增加成本。最便宜的选择每小时大约是0.60美元，具体取决于你的配置。
- en: Despite the cost, this may still be a better investment than hiring external
    consultants to build, deploy, and maintain workflows. Having your team learn internally
    not only saves on long-term but also builds expertise in-house.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管成本较高，但这可能仍然比雇佣外部顾问来构建、部署和维护工作流程更划算。让团队内部学习不仅节省了长期成本，还培养了内部的专业知识。
- en: That said, achieving high-quality results isn’t easy. The technology is evolving
    rapidly, and there are plenty of outdated nodes and workflows all over the web.
    It’s also quite technical, so teams without the right skills may struggle.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，要获得高质量的结果并不容易。这项技术正在快速发展，网上到处都是过时的节点和工作流程。它也非常技术性，因此缺乏适当技能的团队可能会遇到困难。
- en: It’s still good to invest into learning what you can do with it.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 仍然值得投资学习你可以用它做什么。
- en: Technical Bits
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术要点
- en: Let’s go into more technical stuff so we can understand how image generation
    works. We’ll also set up ComfyUI and exploring its layout while covering key technologies
    like LoRAs, ControlNets, and IP Adapters.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入了解更技术性的内容，以便了解图像生成是如何工作的。我们还将设置ComfyUI，并探索其布局，同时涵盖LoRAs、ControlNets和IP适配器等关键技术。
- en: At the end of this section, we’ll build the interior designer workflow which
    is a fairly easy use case.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节的结尾，我们将构建室内设计师工作流程，这是一个相当简单的用例。
- en: How Image Generation Works
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图像生成是如何工作的
- en: Image generation is not the same as computer vision, though there is some overlap.
    Computer vision focuses on identifying and analyzing the contents of an image.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图像生成与计算机视觉不同，尽管它们有一些重叠。计算机视觉专注于识别和分析图像内容。
- en: If you’re interested in exploring computer vision use cases, check out an article
    I wrote [here](https://medium.com/gitconnected/computer-vision-monitoring-traffic-levels-in-norway-fa54b64a0d3b)
    a year or so ago.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你感兴趣探索计算机视觉用例，可以查看我一年前写的文章[此处](https://medium.com/gitconnected/computer-vision-monitoring-traffic-levels-in-norway-fa54b64a0d3b)。
- en: Image generation, on the other hand, falls under the generative AI category.
    It’s about creating content rather than analyzing or interpreting it. The primary
    model types in this space are GANs and diffusion models.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，图像生成属于生成式AI类别。它关于创建内容，而不是分析或解释它。这个空间中的主要模型类型是GAN和扩散模型。
- en: This article focuses on diffusion models which is the primary choice for ComfyUI,
    but there are several resources available to dig into this space if you want to.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章重点介绍了扩散模型，这是ComfyUI的主要选择，但如果你想要深入了解这个领域，这里有一些资源可用。
- en: I want to mention though that when we generate images with diffusion models
    we are starting with random noise, and the model gradually refines it step by
    step, until it forms a coherent image. This process is guided by our prompt (the
    embedding).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我想提到的是，当我们使用扩散模型生成图像时，我们是从随机噪声开始的，模型逐步细化它，直到形成一个连贯的图像。这个过程由我们的提示（嵌入）引导。
- en: '![Simplified diffusion process | Image by author](../Images/828c8042927d3afe8a8cddf457be7508.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![简化扩散过程 | 图片由作者提供](../Images/828c8042927d3afe8a8cddf457be7508.png)'
- en: Simplified diffusion process | Image by author
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 简化扩散过程 | 图片由作者提供
- en: Some people call it making art from noise.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人称之为从噪声中创造艺术。
- en: There are multiple parts here that play an important role.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有几个部分都扮演着重要的角色。
- en: We have the base model itself, the CLIP model, which translates our prompt into
    something the model can work with (i.e., the embedding), and an autoencoder that
    decodes the output of the process, giving us a finished image we can use.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有基础模型本身，CLIP模型，它将我们的提示转换为模型可以处理的内容（即嵌入），以及一个自动编码器，它解码过程的输出，给我们一个可以使用的完成图像。
- en: When working with higher-level UIs such as MidJourney, you don’t participate
    in this process, but in ComfyUI, you have more control.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 当与MidJourney等高级UI一起工作时，你不会参与这个过程，但在ComfyUI中，你拥有更多的控制权。
- en: Setting up ComfyUI
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置ComfyUI
- en: Now this part is tricky. If you have good hardware then it’s simply about installing
    it on your computer. You can see this [guide](https://stable-diffusion-art.com/how-to-install-comfyui/)
    for Windows and Mac.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 现在这个部分有点棘手。如果你有好的硬件，那么这只是在你的电脑上安装它。你可以查看这个[指南](https://stable-diffusion-art.com/how-to-install-comfyui/)以了解Windows和Mac的安装方法。
- en: However, using ComfyUI on a MacBook without a GPU will be slow. If you’re like
    me and have no patience you’ll need a GPU.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在没有GPU的MacBook上使用ComfyUI将会很慢。如果你像我一样没有耐心，你需要一个GPU。
- en: T[here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#running-comfyui)
    are several options available, and I’ve outlined them here.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '[这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#running-comfyui)有几个可用的选项，我在这里概述了它们。'
- en: '![Different choices to host ComfyUI, see the list here | Image by author](../Images/80e33a7b48fc211cf89e243dcb5a3516.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![不同的托管ComfyUI的选择，请点击这里查看列表 | 图片由作者提供](../Images/80e33a7b48fc211cf89e243dcb5a3516.png)'
- en: Different choices to host ComfyUI, see the list [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#running-comfyui)
    | Image by author
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的选择来托管ComfyUI，请[点击这里查看列表](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#running-comfyui)
    | 图片由作者提供
- en: I don’t want to recommend any specific one, but some can get you up and running
    within minutes which is ideal at the start. Unfortunately, this will cost around
    $0.99 per hour of use which is pretty expensive.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想推荐任何特定的一个，但有些可以在几分钟内让你开始运行，这对于开始来说是非常理想的。不幸的是，这大约每小时需要0.99美元，相当昂贵。
- en: Once you’re using it daily, I’d recommend looking for better and more cost-effective
    options. I’ve never been keen on having high-end hardware but that is definitely
    changing.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你开始每天使用它，我会建议寻找更好、更经济的选项。我从未热衷于拥有高端硬件，但这一点肯定在改变。
- en: The Layout
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 布局
- en: I’m assuming you’ve found a way to run ComfyUI, but if not, and you just want
    to experiment with the canvas for this next part, please go [here](https://comfyai.run).
    *This website will let you run easier stuff for free (although you will be set
    in a queue so it may be very slow).*
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我假设你已经找到了运行ComfyUI的方法，但如果还没有，并且你只想尝试这个下一部分画布，请[点击这里](https://comfyai.run)。*这个网站将让你免费运行更简单的东西（尽管你将被放入队列中，所以可能非常慢）。*
- en: '![If you are running a web based ComfyUI this is what it will look like | Image
    by author](../Images/47331e6ffa8f02efa8306da23f14b336.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![如果你正在运行基于网页的ComfyUI，它看起来会是这样 | 图片由作者提供](../Images/47331e6ffa8f02efa8306da23f14b336.png)'
- en: If you are running a web based ComfyUI this is what it will look like | Image
    by author
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在运行基于网页的ComfyUI，它看起来会是这样 | 图片由作者提供
- en: Once you land with a blank black screen in front of you, it can be daunting.
    It’s easy to get started though and you do not need to know every part of this
    tool to use it.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你面前出现一个空白的黑色屏幕，可能会感到有些令人畏惧。不过，开始使用它很容易，而且你不需要了解这个工具的每一个部分就可以使用它。
- en: The key thing to know is that a **left double-click** lets you search for nodes
    to add to your workflow.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 需要知道的关键是，**左键双击**可以让你搜索要添加到工作流程中的节点。
- en: '![Left double-click search in ComfyUI | Image by author](../Images/ca27392e06386597bf4430aa9b440802.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![在ComfyUI中左键双击搜索 | 图片由作者提供](../Images/ca27392e06386597bf4430aa9b440802.png)'
- en: Left double-click search in ComfyUI | Image by author
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在ComfyUI中左键双击搜索 | 图片由作者提供
- en: To load a model you simply find the node **Load Checkpoint**.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 要加载一个模型，你只需找到**Load Checkpoint**节点。
- en: When using models via the **Load Checkpoints** node, you first need to download
    them and place them in the `models` directory to access them. The same applies
    to other models like LoRAs, ControlNets, and so on (which we’ll cover in a bit).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 当通过**Load Checkpoints**节点使用模型时，你首先需要下载它们并将它们放置在`models`目录中以访问它们。这同样适用于其他模型，如LoRAs、ControlNets等（我们稍后会介绍）。
- en: You need to put all the models you work with within the ComfyUI `models` directory.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要将你使用的所有模型放在ComfyUI的`models`目录中。
- en: If you’re using a hosting provider, like the one above, it will typically help
    you load those initial models.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用的是托管提供商，如上面提到的，它通常会帮助你加载那些初始模型。
- en: You should also know that workflows can be easily downloaded and uploaded using
    a JSON file. You can simply paste in the JSON of a workflow in the canvas.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 你还应该知道，工作流程可以通过JSON文件轻松下载和上传。你只需将工作流程的JSON粘贴到画布中即可。
- en: If you need to install or update custom nodes, you’ll need access to the **ComfyUI
    Manager**. For workflows that throw errors because of missing nodes, this is where
    you’ll search for and install or update them.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要安装或更新自定义节点，你需要访问**ComfyUI Manager**。对于由于缺少节点而抛出错误的流程，你将在这里搜索并安装或更新它们。
- en: Before going for our use case, we’ll walk through one simple workflow for **Stable
    Diffusion** and another for **Flux.**
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行我们的用例之前，我们将通过一个简单的**Stable Diffusion**工作流程和一个**Flux**工作流程进行说明。
- en: Key Building Blocks
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键构建块
- en: I want to tie in how image generation works for this part so it makes sense.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我想将这部分图像生成的工作原理联系起来，使其更有意义。
- en: You’ll think this process is unnecessarily complicated but there is a reason
    we set up the entire process, so we can later break it down if needed and do some
    really cool stuff.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会认为这个过程过于复杂，但我们设置整个流程是有原因的，这样我们就可以在需要时将其分解，做一些真正酷的事情。
- en: The first node we’ll add is the Load Checkpoint (as mentioned above).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将添加的第一个节点是上面提到的**Load Checkpoint**。
- en: '![Search for Load Checkpoint in ComfyUI | Image by author](../Images/554af072b33540aacb457c590a81b7eb.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![在ComfyUI中搜索加载检查点 | 图片由作者提供](../Images/554af072b33540aacb457c590a81b7eb.png)'
- en: Search for Load Checkpoint in ComfyUI | Image by author
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在ComfyUI中搜索加载检查点 | 图片由作者提供
- en: This is the key node that loads the model (checkpoint) and its associated components,
    such as the **CLIP model**, which is a text encoder that interprets our prompt
    into something the model can understand.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这是加载模型（检查点）及其相关组件（如**CLIP模型**）的关键节点，该模型是一个文本编码器，它将我们的提示解释为模型可以理解的内容。
- en: It also gives us the **VAE (Variational Autoencoder)** that’s embedded in the
    checkpoint, which compresses images into latent space during encoding and expands
    them back to full resolution during decoding.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 它还提供了嵌入在检查点中的**VAE (变分自编码器**)，在编码期间将图像压缩到潜在空间，在解码期间将其扩展回全分辨率。
- en: You can load all of these separately, and we’ll do so for Flux in a bit.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以单独加载所有这些模型，我们稍后会为Flux这样做。
- en: Obviously, the checkpoint is the backbone of the pipeline. What might be new
    to you is dealing with the CLIP and VAE directly, which are hidden when using
    higher-level systems like MidJourney.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，检查点是流程的骨干。对你来说可能新的可能是直接处理CLIP和VAE，当使用MidJourney等高级系统时，它们是隐藏的。
- en: Don’t worry if you feel overwhelmed, it will click soon.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你感到不知所措，不要担心，很快你就会明白。
- en: After this, we’ll need to grab two **CLIP Text Encode (Prompt)** nodes by searching
    for them. We need one for the **positive prompt** and another for the **negative
    prompt**.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之后，我们需要通过搜索来获取两个**CLIP Text Encode (Prompt**)节点。我们需要一个用于**正面提示**，另一个用于**负面提示**。
- en: '![Setting up your positive and negative prompts | Image by author](../Images/b42ec953da50160f27f140fc2af9469c.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![设置正面和负面提示 | 图片由作者提供](../Images/b42ec953da50160f27f140fc2af9469c.png)'
- en: Setting up your positive and negative prompts | Image by author
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 设置你的正负提示 | 作者图片
- en: This should be quite obvious, but in one prompt, you’ll write what you **want**,
    and in the second, you’ll write what you **don’t want**.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这应该相当明显，但在一个提示中，你会写上你**想要**的内容，而在第二个提示中，你会写上你**不想要**的内容。
- en: If you right-click on these nodes, you can change their colors and titles to
    make them easier to distinguish.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你右键点击这些节点，你可以更改它们的颜色和标题，以便更容易区分。
- en: '![Changing the colors of the prompts | Image by author](../Images/a1e2b171bdd9c2ede723a6103e37f6dd.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![更改提示的颜色 | 作者图片](../Images/a1e2b171bdd9c2ede723a6103e37f6dd.png)'
- en: Changing the colors of the prompts | Image by author
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 更改提示的颜色 | 作者图片
- en: We’ll also link the **CLIP model** to the prompts directly. This model converts
    the text into a vector (a mathematical representation) that guides the model on
    how to shape the image.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将直接将**CLIP模型**链接到提示。这个模型将文本转换为向量（一种数学表示），指导模型如何塑造图像。
- en: Next, we need to add an **Empty Latent Image** node. This node creates an "empty"
    latent image filled with random noise in latent space which will be the starting
    point for the diffusion process.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们需要添加一个**空潜在图像**节点。这个节点在潜在空间中创建一个“空”的潜在图像，其中填充了随机噪声，这将是扩散过程的起点。
- en: '![This node creates an "empty" latent image | Image by author](../Images/848cdda8ddb7723be21cefbf34fef8f1.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![这个节点创建一个“空”的潜在图像 | 作者图片](../Images/848cdda8ddb7723be21cefbf34fef8f1.png)'
- en: This node creates an "empty" latent image | Image by author
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这个节点创建一个“空”的潜在图像 | 作者图片
- en: You’ll set the dimensions and batch size of the images you want to generate
    via this node.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你将通过这个节点设置你想要生成的图像的尺寸和批量大小。
- en: Once all of these nodes are in place, we’ll also add the **KSampler**.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦所有这些节点都到位，我们还会添加**KSampler**。
- en: '![Connecting all the nodes | Image by author](../Images/94d393932f1a8b8371ccada50de5f14f.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![连接所有节点 | 作者图片](../Images/94d393932f1a8b8371ccada50de5f14f.png)'
- en: Connecting all the nodes | Image by author
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 连接所有节点 | 作者图片
- en: The KSampler orchestrates the entire denoising process, i.e. it transforms random
    noise into the latent representation of our generated image.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: KSampler负责整个去噪过程，即它将随机噪声转换为我们生成图像的潜在表示。
- en: You can keep the settings as they are for this one, except perhaps setting a
    random seed.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个节点，你可以保持设置不变，除非可能设置一个随机种子。
- en: Be sure to connect the model, the positive and negative prompts, and the latent
    image to the **KSampler** (see the image above).
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 确保将模型、正负提示和潜在图像连接到**KSampler**（见上图）。
- en: You can use a custom sampler if you’d like, but for your first time, it’s better
    to stick with something out of the box.
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你愿意，可以使用自定义采样器，但第一次使用时，最好坚持使用现成的解决方案。
- en: Once all these nodes are in place, we’ll need to decode the final latent representation
    produced by the KSampler into a full-resolution image.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦所有这些节点都到位，我们还需要将KSampler产生的最终潜在表示解码成全分辨率图像。
- en: The **VAE Decode** node will handle this, so be sure to add that one too.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '**VAE解码**节点将处理这个问题，所以请确保添加那个节点。'
- en: '![Search for the VAE Decode node in ComfyUI | Image by author](../Images/e39afa5d373c8d0406e778deee239985.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![在ComfyUI中搜索VAE解码节点 | 作者图片](../Images/e39afa5d373c8d0406e778deee239985.png)'
- en: Search for the VAE Decode node in ComfyUI | Image by author
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在ComfyUI中搜索VAE解码节点 | 作者图片
- en: To save the image after the process is complete, we’ll add the **Save Image**
    node provided by ComfyUI.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在处理完成后保存图像，我们将添加ComfyUI提供的**保存图像**节点。
- en: The finished workflow will look like this.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 完成的工作流程将看起来像这样。
- en: '![Make sure all the nodes are connected in ComfyUI | Image by author](../Images/02948006a50cc981785d33d7dfab6dab.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![确保所有节点在ComfyUI中连接 | 作者图片](../Images/02948006a50cc981785d33d7dfab6dab.png)'
- en: Make sure all the nodes are connected in ComfyUI | Image by author
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 确保所有节点在ComfyUI中连接 | 作者图片
- en: You can run the workflow by simply pressing **Queue**.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过简单地按**队列**来运行工作流程。
- en: The images will appear in the **Save Image** node.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图像将出现在**保存图像**节点中。
- en: '![Results from the standard workflow with SD in ComfyUI | Image by author](../Images/dfb404558d613b293e6f44a8255d6560.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![标准工作流程中SD在ComfyUI的结果 | 作者图片](../Images/dfb404558d613b293e6f44a8255d6560.png)'
- en: Results from the standard workflow with SD in ComfyUI | Image by author
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 标准工作流程中SD在ComfyUI的结果 | 作者图片
- en: I have four images since I set the batch size to 4 in the **Empty Latent Image**
    node. Your images may look different depending on the model you used.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我有四张图片，因为我将**空潜在图像**节点中的批量大小设置为4。你的图片可能因使用的模型而异。
- en: '*We’ll cover how checkpoints work in the next section.*'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '*我们将在下一节中介绍检查点的工作原理。*'
- en: This is the standard beginner workflow that you usually get when you load ComfyUI
    for the first time.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这是标准的初学者工作流程，你通常在第一次加载 ComfyUI 时就会得到。
- en: If you want to use a **Flux model**, you’ll need to make a few adjustments.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要使用 **Flux 模型**，你需要做一些调整。
- en: First, load the model, the **CLIP**, and the **VAE** separately. You’ll also
    need two **CLIP** models and the **FluxGuidance** node.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，分别加载模型、**CLIP** 和 **VAE**。你还需要两个 **CLIP** 模型和 **FluxGuidance** 节点。
- en: You’ll see an example for Flux below that you can follow.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 下面有一个 Flux 的示例，你可以按照它来操作。
- en: '![Results from the standard workflow with Flux in ComfyUI | Image by author](../Images/be194cbe5d25dff2459f1eaae2470f99.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![ComfyUI 中使用 Flux 的标准工作流程的结果 | 作者图片](../Images/be194cbe5d25dff2459f1eaae2470f99.png)'
- en: Results from the standard workflow with Flux in ComfyUI | Image by author
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: ComfyUI 中使用 Flux 的标准工作流程的结果 | 作者图片
- en: Flux is built to use **a standard CLIP model** and **a T5 language model tokenizer**
    to read the prompt, which is why we’re loading two CLIP models here rather than
    just one. It is supposedly what gives Flux superior prompt-following.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: Flux 是构建来使用 **标准 CLIP 模型** 和 **T5 语言模型分词器** 来读取提示的，这就是为什么我们在这里加载了两个 CLIP 模型而不是一个。这据说赋予了
    Flux 超越其他模型的提示跟随能力。
- en: '**FluxGuidance** is not essential, but it helps the text encoder to "push"
    your image generation a little farther in the direction of your prompt. It should
    improve how well the model follows your prompt'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '**FluxGuidance** 不是必需的，但它有助于文本编码器将你的图像生成“推动”到你的提示方向上更进一步。这应该会提高模型跟随你的提示的效果。'
- en: You can set this from 1.0 to 100, and I implore you to play around with it.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从 1.0 设置到 100，我强烈建议你尝试调整它。
- en: Now, from here, if you are interested in getting into more basics, I would recommend
    [this](https://www.youtube.com/watch?v=_C7kR2TFIX0) tutorial. The beauty of this
    tool is how you can really control how you want your images generated.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果你对深入了解更基础的方面感兴趣，我推荐 [这个](https://www.youtube.com/watch?v=_C7kR2TFIX0) 教程。这个工具的美丽之处在于你可以真正控制你想要生成的图像。
- en: Model checkpoints & LoRAs
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型检查点和 LoRAs
- en: As we saw when we went through the basics, if you are using any ComfyUI hosting
    service, you might see a few models available when you add in the **Load Checkpoint**
    node.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在基础知识中看到的那样，如果你使用任何 ComfyUI 托管服务，当你添加 **加载检查点** 节点时，你可能会看到一些可用的模型。
- en: '![Available models in the Checkpoints node in ComfyUI | Image by author](../Images/2c6651a560a1917e8532b28c3946d69f.png)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![ComfyUI 中 Checkpoints 节点中的可用模型 | 作者图片](../Images/2c6651a560a1917e8532b28c3946d69f.png)'
- en: Available models in the Checkpoints node in ComfyUI | Image by author
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: ComfyUI 中 Checkpoints 节点中的可用模型 | 作者图片
- en: If you have ComfyUI installed locally, you need to locate the folder `modelscheckpoints`,
    place the models you want in there, and then reload the UI to see them in the
    dropdown.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经在本地安装了 ComfyUI，你需要定位到文件夹 `modelscheckpoints`，将你想要的模型放在那里，然后重新加载 UI 以在下拉菜单中看到它们。
- en: If you’re new to ComfyUI, you might be wondering how to find these models and
    what kind of files to put there. You have both [HuggingFace](https://huggingface.co/models?pipeline_tag=text-to-image&sort=trending)
    and [Civitai](https://civitai.com/models) at your disposal when looking for models.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你刚开始使用 ComfyUI，你可能想知道如何找到这些模型以及应该放置什么类型的文件。在寻找模型时，你可以使用 [HuggingFace](https://huggingface.co/models?pipeline_tag=text-to-image&sort=trending)
    和 [Civitai](https://civitai.com/models)。
- en: See below for how to find checkpoints via [Civitai](https://civitai.com/models)
    by going to the models page and then filtering for Checkpoint.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是如何通过 Civitai ([Civitai](https://civitai.com/models)) 查找检查点的说明，请访问模型页面然后筛选检查点。
- en: '![Finding checkpoints in Civicai | Image by author](../Images/ec0621018d5b2f2027f7fce166f75eeb.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![在 Civicai 中查找检查点 | 作者图片](../Images/ec0621018d5b2f2027f7fce166f75eeb.png)'
- en: Finding checkpoints in Civicai | Image by author
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: Finding checkpoints in Civicai | 作者图片
- en: Models are quite large. I have gat[here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#popular-checkpoints)d
    a few popular checkpoints here if you’re at a loss. The files you’re looking for
    will have **.safetensors** as the file extension.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 模型相当大。如果你感到困惑，我[这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#popular-checkpoints)整理了一些流行的检查点。你寻找的文件将具有
    **.safetensors** 作为文件扩展名。
- en: Once you find one you want, download it and place it in the `modelscheckpoints`
    directory in ComfyUI. Yes, this will take quite a bit depending on your hardware
    and connection.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你找到了你想要的，就下载它并将其放置在 ComfyUI 的 `modelscheckpoints` 目录中。是的，这取决于你的硬件和连接，可能需要相当长的时间。
- en: 'This brings us to the next topic: **LoRAs**.'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 这就引出了下一个话题：**LoRAs**。
- en: LoRAs are much smaller in size and can be attached to different checkpoints.
    They are fine-tuned add-ons to a model. Think of the base model (checkpoint) as
    the blueprint for building a house. The LoRA is like adding custom paint without
    changing the structure of the house itself.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: LoRAs的大小要小得多，可以附加到不同的检查点。它们是模型的微调附加组件。将基础模型（检查点）视为建造房子的蓝图。LoRA就像添加定制油漆而不改变房子的结构一样。
- en: Every LoRA comes with its own instructions so be sure to read the model page
    on how it should be used. Sometimes you need to use trigger words or other keywords
    in the prompt for it to work well.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 每个LoRA都有自己的说明，所以请确保阅读模型页面了解如何使用它。有时你需要使用触发词或其他关键词在提示中使用它才能正常工作。
- en: Adding a LoRA is quite simple. You find one you like – just as we looked for
    checkpoints – download it, and paste it into the `modelsloras` directory. If you
    reload ComfyUI, you should see it in the dropdown for the **Load LoRA** node.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 添加LoRA相当简单。你找到一个你喜欢的——就像我们寻找检查点一样——下载它，并将其粘贴到`modelsloras`目录中。如果你重新加载ComfyUI，你应该会在**加载LoRA**节点的下拉菜单中看到它。
- en: '**Note:** You can fine-tune your own LoRAs, but you’ll need to dig for resources
    on your own for that for now.'
  id: totrans-167
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意：**你可以微调自己的LoRAs，但你现在需要自己寻找资源来做到这一点。'
- en: See below how I simply add the **Load LoRA** node, set the **lora_name** (based
    on the LoRA I’ve downloaded), and then connect it to the Checkpoint and the CLIP
    model.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 下面看看我是如何简单地添加**加载LoRA**节点，设置**lora_name**（基于我下载的LoRA），然后将其连接到检查点和CLIP模型的。
- en: '![Adding a LoRA to your workflow in ComfyUI | Image by author](../Images/46f706df102ebd2d7eef9e142c3057f5.png)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
  zh: '![在ComfyUI中添加LoRA到你的工作流程 | 图片由作者提供](../Images/46f706df102ebd2d7eef9e142c3057f5.png)'
- en: Adding a LoRA to your workflow in ComfyUI | Image by author
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 在ComfyUI中添加LoRA到你的工作流程 | 图片由作者提供
- en: If we look at the previous Flux workflow, adding the **AmateurPhoto LoRA** will
    result in a finished workflow that looks like the one below.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们看看之前的Flux工作流程，添加**AmateurPhoto LoRA**将导致一个如下所示的工作流程。
- en: '![Adding a LoRA to your workflow in ComfyUI | Image by author](../Images/361490c5bc2d831b20aaf8baf619a068.png)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![在ComfyUI中添加LoRA到你的工作流程 | 图片由作者提供](../Images/361490c5bc2d831b20aaf8baf619a068.png)'
- en: Adding a LoRA to your workflow in ComfyUI | Image by author
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在ComfyUI中添加LoRA到你的工作流程 | 图片由作者提供
- en: The only change here is the LoRA node, which now has the model and the CLIP
    going through it. If we run it, we’ll see that we’re now getting a much more realistic
    panda with this LoRA.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这里唯一的改变是LoRA节点，现在模型和CLIP都通过它。如果我们运行它，我们会看到现在我们得到了一个更加逼真的熊猫，这个LoRA起到了作用。
- en: There are many popular LoRAs based on different models. Yes, the LoRA needs
    to be compatible with the base model, you can’t mix them. This means if you are
    using Flux Dev as the base, you look for LoRAs specifically for Flux Dev.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 基于不同模型的LoRAs有很多。是的，LoRA需要与基础模型兼容，你不能混合它们。这意味着如果你使用Flux Dev作为基础，你将寻找专门为Flux Dev设计的LoRAs。
- en: Key Technologies (you want to be using)
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键技术（你想要使用的）
- en: The basics, like we just went through, involve using a plain checkpoint model
    along with a LoRA for styling. *But what makes this space so great is what’s possible
    beyond this.*
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 基础知识，就像我们刚才讨论的那样，涉及使用普通的检查点模型以及LoRA进行风格化。*但使这个空间如此之好的是超越这些的可能性。*
- en: This part is about **ControlNets** and **IP Adapters**.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 这一部分是关于**ControlNets**和**IP适配器**。
- en: ControlNet and other conditioning models allow you to guide the image generation
    process more precisely based on edges, depth maps, scribbles, or poses of an image.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: ControlNet和其他条件模型允许你根据边缘、深度图、涂鸦或图像的姿态更精确地引导图像生成过程。
- en: You can see me testing a few options for processing an image of a dog using
    Canny Edge, a Depth Map and Pose below.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到我正在测试使用Canny边缘、深度图和姿态处理狗的图像的几个选项。
- en: '![Testing different Controlnet options for an image of a dog | Image by author](../Images/d534359c12754d52f662ee28c0bb00b8.png)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![测试不同Controlnet选项的狗的图像 | 图片由作者提供](../Images/d534359c12754d52f662ee28c0bb00b8.png)'
- en: Testing different Controlnet options for an image of a dog | Image by author
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 测试不同Controlnet选项的狗的图像 | 图片由作者提供
- en: There are several input options but you’ll need specific models capable of correctly
    processing these inputs to generate an image.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种输入选项，但你需要能够正确处理这些输入的特定模型来生成图像。
- en: For example, if we use the Canny Edge of a dog with a compatible ControlNet
    model, the generated image would follow the outline while having freedom to interpret
    everything else, like color and texture.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果我们使用与兼容的 ControlNet 模型匹配的狗的 Canny 边缘，生成的图像将遵循轮廓，同时有自由解释其他一切，如颜色和纹理。
- en: That’s why it’s important to pick a base model with a big community behind it,
    so you’ll have plenty of good ControlNet models to choose from.
  id: totrans-185
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 因此，选择一个拥有庞大社区支持的基础模型非常重要，这样你将有很多好的 ControlNet 模型可供选择。
- en: '**IP Adapter** (Image Prompt Adapter) models, on the other hand, can be thought
    of as 1-image LoRAs. If you are still confused by LoRAs then think of them as
    images as prompts. They transfer styling from a reference image to a new image.
    IP Adapters thus let you transfer styles, merge images, and imitate elements like
    faces.'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: '**IP 适配器**（图像提示适配器）模型可以被视为 1 图像 LoRAs。如果你对 LoRAs 仍然感到困惑，那么可以将它们视为图像提示。它们将参考图像的风格转移到新图像上。因此，IP
    适配器让你可以转移风格、合并图像和模仿面部等元素。'
- en: I’ve collected a few [guides](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#learning-resources)
    for ControlNets and IP Adapters that are good for understanding the basics. I’ve
    also included popular models for each, organized by base model, in the same [repository](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#popular-technologies).
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我收集了一些关于 ControlNets 和 IP 适配器的[指南](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#learning-resources)，这些指南有助于理解基础知识。我还包括了一些流行的模型，按照基础模型组织，在同一个[仓库](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#popular-technologies)中。
- en: Beyond these two technologies, there are more popular techniques such as inpainting,
    outpainting, upscaling, and segmentation. I find these a bit easier to grasp.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这两种技术之外，还有更多流行的技术，如修复、扩展、上采样和分割。我发现这些技术更容易掌握。
- en: You can see the table I organized below for each technology.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以查看我组织下方的表格，了解每种技术。
- en: '![Different technologies and what they do, see the list here | Image by author](../Images/c7e6c78283736023f3f9d51fc16fe8b0.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![不同的技术和它们的作用，请在此处查看列表 | 作者图片](../Images/c7e6c78283736023f3f9d51fc16fe8b0.png)'
- en: Different technologies and what they do, see the list [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#popular-technologies)
    | Image by author
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的技术和它们的作用，请在此处查看列表[这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/README.md#popular-technologies)
    | 作者图片
- en: Some techniques don’t always require a specific model, but for good results,
    it’s recommended to use one.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 一些技术并不总是需要特定的模型，但为了获得良好的结果，建议使用一个。
- en: This tech allow us to do some really cool stuff though.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术使我们能够做一些真正酷的事情。
- en: You can transfer brand styling and logos onto new images. You can place products
    into newly generated images with different holiday themes for social media. You
    can turn company photos into cartoons.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将品牌风格和标志转移到新的图像上。你可以将产品放置在新生成的图像中，以不同的节日主题用于社交媒体。你还可以将公司照片变成卡通。
- en: I’ve collected a few use cases and the associated technologies in the same repository
    [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#example-use-case-w-said-tech).
    This space has a lot of creativity and we will see it grow within the next few
    years.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 我在同一仓库[这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#example-use-case-w-said-tech)收集了一些用例和相关技术。这个领域有很多创意，我们将在未来几年内看到它的增长。
- en: For the use case in this article we need to look at tools available as I want
    to be using Flux.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 对于本文中的用例，我们需要查看可用的工具，因为我想要使用 Flux。
- en: Flux Tools
  id: totrans-197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Flux 工具
- en: As I noted before, we are restricted to the ControlNets and IP Adapters available
    for each base model. These can either be created by the original creators or by
    the community.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我之前提到的，我们受限于每个基础模型可用的 ControlNets 和 IP 适配器。这些可以由原始创作者或社区创建。
- en: Since Flux was released in 2024, it doesn’t have the same community support
    as Stable Diffusion 1.5\. However, t[here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#controlnet-models)
    are still a few unofficial options for Flux. You can check out the same repository
    here to explore some of them.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Flux 于 2024 年发布，它没有 Stable Diffusion 1.5 那样的社区支持。然而，[这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#controlnet-models)仍然有一些非官方的
    Flux 选项。你可以在同一个仓库中查看这些选项，以探索其中的一些。
- en: That said, in November 2024, Black Forest Labs – the creators of Flux – released
    a few new models called **Flux Tools** to help control and steer images with FLUX.1.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，在2024年11月，Flux的创造者黑森林实验室发布了几个名为**Flux Tools**的新模型，以帮助使用FLUX.1控制和引导图像。
- en: 'These tools are the official ControlNet and IP Adapter [models](https://blackforestlabs.ai/flux-1-tools/)
    for Flux. In total, they released four new models: **Canny, Depth, Fill, and Redux**.'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具是Flux的官方ControlNet和IP Adapter [模型](https://blackforestlabs.ai/flux-1-tools/)。总共，他们发布了四个新模型：**Canny,
    Depth, Fill, 和 Redux**。
- en: Now, I don’t know if I would recommend that you build with these for a production
    use case, as they may not have the same quality of results that ControlNets for
    SD 1.5 or SDXL have. I did some research on this, and the community is finding
    it hard to work with them, citing that they are still unreliable.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我不知道是否建议您将这些用于生产用例，因为它们可能没有SD 1.5或SDXL的ControlNets具有相同的结果质量。我对此做了一些研究，社区发现它们很难使用，指出它们仍然不可靠。
- en: But I decided to go for one anyway for this interior designer workflow we’ll
    create next. Don’t feel discouraged if you don’t get the results you want, just
    keep building.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 但我决定无论如何都要为我们将要创建的室内设计师工作流程尝试一下。如果您没有得到想要的结果，请不要气馁，只需继续构建。
- en: Building an Interior Designer
  id: totrans-204
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建室内设计师
- en: I have already completed this workflow, which you can find [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/comfyui/interior_designer.json).
    You are more than welcome to simply load it in and run it but the point of this
    exercise is for you to learn on your own.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经完成了这个工作流程，您可以在[这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/comfyui/interior_designer.json)找到它。您完全可以简单地加载并运行它，但这个练习的目的是让您自己学习。
- en: We’ll work with depth maps so the model understands how the furniture and space
    should look.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用深度图，以便模型理解家具和空间应该如何看起来。
- en: To test out the finished product, I’ll grab a generic bedroom image. *See it
    below.*
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试最终产品，我将抓取一个卧室的通用图片。*见下文*。
- en: '![A generic image of a bedroom | Image by IKEA](../Images/5333005ee1d03d2e727f38e46dc08fee.png)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![IKEA提供的卧室通用图片](../Images/5333005ee1d03d2e727f38e46dc08fee.png)'
- en: A generic image of a bedroom | Image by IKEA
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: IKEA提供的卧室通用图片
- en: We’ll look at the results right away so you can get an idea of what you can
    achieve with a simple workflow.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将立即查看结果，这样您就可以了解您可以通过简单的流程实现什么。
- en: '![](../Images/694c8475067420f111da2a61ba129e72.png)![](../Images/86348ef7d64d5507e79b066a730af343.png)![AI
    generated Images using different styles with the workflow with Flux](../Images/944f71b8f046fb47adfb609df0ffd8b6.png)'
  id: totrans-211
  prefs: []
  type: TYPE_IMG
  zh: '![图片4](../Images/694c8475067420f111da2a61ba129e72.png)![图片5](../Images/86348ef7d64d5507e79b066a730af343.png)![使用不同风格和Flux工作流程生成的AI图像](../Images/944f71b8f046fb47adfb609df0ffd8b6.png)'
- en: AI generated Images using different styles with the workflow with Flux
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Flux生成的不同风格AI图像
- en: '![](../Images/7ad0847b62d8cc76b970826b3af81112.png)![AI generated Images with
    a Scandinavian style using Flux](../Images/597dc6fe923a92f9ab2e5ad2bf3fc2c7.png)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![图片3](../Images/7ad0847b62d8cc76b970826b3af81112.png)![使用Flux生成的具有斯堪的纳维亚风格的AI图像](../Images/597dc6fe923a92f9ab2e5ad2bf3fc2c7.png)'
- en: AI generated Images with a Scandinavian style using Flux
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Flux生成的具有斯堪的纳维亚风格的AI图像
- en: '![AI generated Image with a Scandinavian style using Flux](../Images/726ff0ea242c04c88328ceb26e47b7e7.png)'
  id: totrans-215
  prefs: []
  type: TYPE_IMG
  zh: '![使用Flux生成的具有斯堪的纳维亚风格的AI图像](../Images/726ff0ea242c04c88328ceb26e47b7e7.png)'
- en: AI generated Image with a Scandinavian style using Flux
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Flux生成的具有斯堪的纳维亚风格的AI图像
- en: '![](../Images/cd3afce8b7290124f50a93aa0db178fa.png)![](../Images/3f32ea592cca06ae0e6c2c888425b0ea.png)![AI
    generated Images using different styles with the workflow with Flux](../Images/206047134eda720e6bb25018e9a614fe.png)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![图片1](../Images/cd3afce8b7290124f50a93aa0db178fa.png)![图片2](../Images/3f32ea592cca06ae0e6c2c888425b0ea.png)![使用不同风格和Flux工作流程生成的AI图像](../Images/206047134eda720e6bb25018e9a614fe.png)'
- en: AI generated Images using different styles with the workflow with Flux
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Flux生成的不同风格AI图像
- en: I’ve simply been prompting here while adding a few general LoRAs to get these
    images from the base image.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是在这里提示，同时添加了一些通用的LoRAs，从基础图像中获取这些图像。
- en: I’m sure people will start building interior designer LoRAs based on previous
    work at some point. This is also a scary possibility for current designers but
    hopefully they’ll use it to their own advantage.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信人们最终会基于之前的工作开始构建室内设计师LoRAs。这对当前的设计师来说也是一个可怕的可能性，但希望他们能利用它来自己的优势。
- en: Creating a Depth Map
  id: totrans-221
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建深度图
- en: The first thing we need to do, is load a new empty canvas in ComfyUI and make
    sure you have enough VRAM to run this workflow.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要做的第一件事是在ComfyUI中加载一个新的空白画布，并确保你有足够的VRAM来运行这个工作流程。
- en: '*I’d recommend 24GB of VRAM and 48GB of RAM (depending on you adding a LoRA
    or not).*'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: '*我建议使用24GB的VRAM和48GB的RAM（取决于你是否添加了LoRA）。*'
- en: Next, we need to add the **Load Image** node along with the **[AIO Aux Preprocessor](https://github.com/Fannovel16/comfyui_controlnet_aux)**
    node. This node will help preprocess the images for either canny or depth.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们需要添加**加载图像**节点以及**[AIO辅助预处理器](https://github.com/Fannovel16/comfyui_controlnet_aux)**节点。这个节点将帮助预处理图像，用于canny或深度。
- en: You can see the example below of me testing both canny and depth.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以查看下面的例子，我测试了canny和深度两种方法。
- en: '![Testing depth and canny in ComfyUI | Image by author](../Images/2554789e4d101a37a9d9d8a114438465.png)'
  id: totrans-226
  prefs: []
  type: TYPE_IMG
  zh: '![在ComfyUI中测试深度和canny | 图片由作者提供](../Images/2554789e4d101a37a9d9d8a114438465.png)'
- en: Testing depth and canny in ComfyUI | Image by author
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 在ComfyUI中测试深度和canny | 图片由作者提供
- en: To explain, these images will help us generate AI images that will either follow
    the depth map or the canny edges. There are specific depth and canny nodes you
    can use, but I prefer using the **DepthAnythingv2** preprocessor for depth like
    above.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解释，这些图像将帮助我们生成AI图像，这些图像将遵循深度图或canny边缘。你可以使用特定的深度和canny节点，但我更喜欢使用**DepthAnythingv2**预处理程序来处理深度，如上所示。
- en: You can choose to use canny instead of depth here, but I don’t find the official
    Canny Flux model to be that great.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以选择在这里使用canny而不是深度，但我认为官方的Canny Flux模型并不那么出色。
- en: If you want to use canny with Flux, check out [this](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#controlnet-models)
    list of unofficial models you can try.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想在Flux中使用canny，请查看[这个](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/img-gen#controlnet-models)非官方模型列表，你可以尝试这些模型。
- en: You can remove the canny edge processor before we move on.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续之前，你可以选择移除canny边缘处理器。
- en: The Models
  id: totrans-232
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型
- en: From here, we’ll follow the same steps we did earlier for Flux. Add the **Load
    Diffusion Model**, **DualCLIPLoader**, and **Load VAE** nodes.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里，我们将遵循之前为Flux所做的相同步骤。添加**加载扩散模型**、**DualCLIPLoader**和**加载VAE**节点。
- en: '*Remember the left double-click to search for those nodes.*'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: '*记住左键双击以搜索这些节点。*'
- en: '![Adding the first nodes in ComfyUI | Image by author](../Images/0e99bf0af382f9ab56184b054ec785af.png)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![在ComfyUI中添加第一个节点 | 图片由作者提供](../Images/0e99bf0af382f9ab56184b054ec785af.png)'
- en: Adding the first nodes in ComfyUI | Image by author
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 在ComfyUI中添加第一个节点 | 图片由作者提供
- en: For the **Load Diffusion Model** node, you’ll need a new model called **flux1-depth-dev**.
    If you don’t have it downloaded, you can find it [here]. If you’re using a canny
    image, you’ll need the **flux1-canny-dev** model.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**加载扩散模型**节点，你需要一个新的模型，名为**flux1-depth-dev**。如果你还没有下载，你可以在[这里]找到它。如果你使用的是canny图像，你需要**flux1-canny-dev**模型。
- en: Remember, these models are specifically designed to process depth and canny
    images. Without them, you won’t be able to control the output in the same way.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，这些模型是专门设计来处理深度和canny图像的。没有它们，你将无法以相同的方式控制输出。
- en: For the **CLIP models**, you’ll need two models. Refer to the image for which
    ones – they’re the same ones we used for the simple Flux workflow earlier. You
    can find them [here].
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**CLIP模型**，你需要两个模型。参考图片，看看是哪两个——它们就是我们之前简单Flux工作流程中使用的相同模型。你可以在[这里]找到它们。
- en: If anything is missing, you’ll get an error, and you’ll need to locate the missing
    model and place it in the correct folder. You don’t have to use two CLIPs here,
    but it’s recommended.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有任何东西缺失，你会得到一个错误，你需要找到缺失的模型并将其放置在正确的文件夹中。在这里你不必使用两个CLIP，但这是推荐的。
- en: The Prompt
  id: totrans-241
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示词
- en: Next, you’ll need to set the positive prompt and a negative one (though Flux
    seems to ignores the negative prompt).
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你需要设置一个积极的提示词和一个负面的提示词（尽管Flux似乎忽略了负面的提示词）。
- en: You’ll need to specify the design you’re after, so the prompt will matter quite
    a lot. Go look at how people prompt to design spaces.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要指定你想要的设计，所以提示词将非常重要。去看看人们是如何提示设计空间的。
- en: '![Adding the text prompt in ComfyUI | Image by author](../Images/4cd82055c56685ed1c51a81807ea2978.png)'
  id: totrans-244
  prefs: []
  type: TYPE_IMG
  zh: '![在ComfyUI中添加文本提示 | 图片由作者提供](../Images/4cd82055c56685ed1c51a81807ea2978.png)'
- en: Adding the text prompt in ComfyUI | Image by author
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 在ComfyUI中添加文本提示 | 图片由作者提供
- en: You should be able to load my exact prompt with [this](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/comfyui/interior_designer.json)
    workflow if you’d like to use it.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要使用它，你可以通过[这个](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/img-gen/comfyui/interior_designer.json)工作流程加载我的确切提示词。
- en: Connect the Depth Map
  id: totrans-247
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 连接深度图
- en: Next, we’ll add a new node we haven’t used before called **[Instruct Pix to
    Pix Conditioning](https://github.com/timothybrooks/instruct-pix2pix)**. This node
    facilitates conditioning for image-to-image translation tasks with precise control
    over the generated image.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将添加一个之前未使用过的节点，称为**[Instruct Pix to Pix Conditioning](https://github.com/timothybrooks/instruct-pix2pix)**。此节点便于对图像到图像翻译任务进行精确控制，以实现图像的调节。
- en: You could potentially use the **ControlNet** node here instead, but I didn’t
    try it.
  id: totrans-249
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你可能在这里使用**ControlNet**节点，但我没有尝试。
- en: We will connect our depth image to the port labeled **‘pixels’** and then connect
    the remaining nodes to it.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将深度图像连接到标有**‘pixels’**的端口，然后将剩余的节点连接到它。
- en: See the picture below to ensure you do it correctly.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 请查看下面的图片以确保你正确操作。
- en: '![Adding the Instruct Pix to Pix Conditioning node in ComfyUI | Image by author](../Images/222ec7df62bf7bf4c6b3a07fcd0eb1a5.png)'
  id: totrans-252
  prefs: []
  type: TYPE_IMG
  zh: '![在ComfyUI中添加Instruct Pix to Pix Conditioning节点 | 图片由作者提供](../Images/222ec7df62bf7bf4c6b3a07fcd0eb1a5.png)'
- en: Adding the **Instruct Pix to Pix Conditioning** node in ComfyUI | Image by author
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 在ComfyUI中添加**Instruct Pix to Pix Conditioning**节点 | 图片由作者提供
- en: From here, we can follow the same steps as in the previous workflows, connect
    all the nodes to the **KSampler**.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里，我们可以遵循之前工作流程中的相同步骤，将所有节点连接到**KSampler**。
- en: '![Connecting all the nodes | Image by author](../Images/34621f358e050f353174d5925fbbfba3.png)'
  id: totrans-255
  prefs: []
  type: TYPE_IMG
  zh: '![连接所有节点 | 图片由作者提供](../Images/34621f358e050f353174d5925fbbfba3.png)'
- en: Connecting all the nodes | Image by author
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 连接所有节点 | 图片由作者提供
- en: I’ve set a random seed and increased the steps to 40, which should improve the
    quality of the generated image.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 我设置了一个随机种子并将步骤增加到40，这应该会提高生成图像的质量。
- en: We also use a **VAE Encode** node here. While it’s not strictly necessary, I’m
    using the dimensions of the original image as the latent, which helps slightly
    improve the quality.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还使用了一个**VAE Encode**节点。虽然这不是严格必要的，但我使用原始图像的尺寸作为潜在变量，这有助于略微提高图像质量。
- en: You can run it from here.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从这里运行它。
- en: '![Running the workflow in ComfyUI | Image by author](../Images/be09b4e3123d6ebb54903626ccedd55a.png)'
  id: totrans-260
  prefs: []
  type: TYPE_IMG
  zh: '![在ComfyUI中运行工作流程 | 图片由作者提供](../Images/be09b4e3123d6ebb54903626ccedd55a.png)'
- en: Running the workflow in ComfyUI | Image by author
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 在ComfyUI中运行工作流程 | 图片由作者提供
- en: You should see the new image in the **Save Image** node. I also added a **LoRA**
    here.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该在**Save Image**节点中看到新的图像。我还添加了一个**LoRA**。
- en: '![Adding the LoRA to the workflow in ComfyUI | Image by author](../Images/a3a830a8524409d2e11a3ab8c0fbb7bb.png)'
  id: totrans-263
  prefs: []
  type: TYPE_IMG
  zh: '![在ComfyUI中添加LoRA到工作流程 | 图片由作者提供](../Images/a3a830a8524409d2e11a3ab8c0fbb7bb.png)'
- en: Adding the LoRA to the workflow in ComfyUI | Image by author
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 在ComfyUI中添加LoRA到工作流程 | 图片由作者提供
- en: Refer to the previous section for how to find LoRAs. For this example, I’m using
    the **iPhone Photo LoRA**, which is quite popular.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 参考上一节了解如何找到LoRAs。对于这个例子，我使用的是**iPhone Photo LoRA**，它相当受欢迎。
- en: Now, I suggest playing around with different images, prompts, and LoRAs to see
    what you can achieve. Prompting matters quite a lot, so don’t underestimate its
    importance.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我建议尝试不同的图像、提示和LoRAs，看看你能实现什么。提示非常重要，所以不要低估它的重要性。
- en: You can scroll up to see my results again.
  id: totrans-267
