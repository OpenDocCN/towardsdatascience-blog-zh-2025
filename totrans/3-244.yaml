- en: 'How LLMs Work: Pre-Training to Post-Training, Neural Networks, Hallucinations,
    and Inference'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLMs的工作原理：从预训练到后训练，神经网络，幻觉和推理
- en: 原文：[https://towardsdatascience.com/how-llms-work-pre-training-to-post-training-neural-networks-hallucinations-and-inference/](https://towardsdatascience.com/how-llms-work-pre-training-to-post-training-neural-networks-hallucinations-and-inference/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-llms-work-pre-training-to-post-training-neural-networks-hallucinations-and-inference/](https://towardsdatascience.com/how-llms-work-pre-training-to-post-training-neural-networks-hallucinations-and-inference/)
- en: With the recent explosion of interest in large language models (LLMs), they
    often seem almost magical. But let’s demystify them.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 随着对大型语言模型（LLMs）兴趣的最近激增，它们似乎几乎具有魔力。但让我们揭开它们的神秘面纱。
- en: I wanted to step back and unpack the fundamentals — breaking down how LLMs are
    built, trained, and fine-tuned to become the AI systems we interact with today.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要回顾并剖析基本原理——分解LLMs是如何构建的、训练和微调的，以成为我们今天与之互动的AI系统。
- en: This **two-part deep dive** is something I’ve been meaning to do for a while
    and was also inspired by [Andrej Karpathy’s widely popular 3.5-hour YouTube](https://www.youtube.com/watch?app=desktop&v=7xTGNNLPyMI)
    video, which has racked up 800,000+ views in just 10 days. Andrej is a founding
    member of OpenAI, his insights are gold— you get the idea.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这**两部分的深入探讨**是我一直想做的事情，也受到了[Andrej Karpathy广受欢迎的3.5小时YouTube](https://www.youtube.com/watch?app=desktop&v=7xTGNNLPyMI)视频的启发，该视频在短短10天内就获得了80万以上的观看量。Andrej是OpenAI的创始人之一，他的见解是宝贵的——你明白我的意思。
- en: If you have the time, **his video is definitely worth watching**. But let’s
    be real — 3.5 hours is a long watch. So, for all the busy folks who don’t want
    to miss out, I’ve distilled the key concepts from the first 1.5 hours into this
    **10-minute read**, adding my own breakdowns to help you build a solid intuition.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有时间，**这个视频绝对值得一看**。但说实在的——3.5小时是一个漫长的观看时间。所以，对于所有忙碌的人，不想错过的人，我已经从前1.5小时中提炼出了关键概念，并添加了自己的分析，以帮助你建立稳固的直觉。
- en: '**What you’ll get**'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**你将获得**'
- en: 'Part 1 (this article): Covers the fundamentals of LLMs, including pre-training
    to post-training, neural networks, hallucinations, and inference.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部分（本文）：涵盖了LLMs的基本原理，包括从预训练到后训练，神经网络，幻觉和推理。
- en: 'Part 2: Reinforcement learning with human/AI feedback, investigating o1 models,
    DeepSeek R1, AlphaGo'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分：带有人类/人工智能反馈的强化学习，研究o1模型，DeepSeek R1，AlphaGo
- en: Let’s go! I’ll start with looking at how LLMs are being built.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！我将从了解LLMs是如何构建的入手。
- en: 'At a high level, there are 2 key phases: pre-training and post-training.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 从高层次来看，有两个关键阶段：预训练和后训练。
- en: '**1\. Pre-training**'
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**1. 预训练**'
- en: Before an LLM can generate text, it must first learn how language works. This
    happens through pre-training, a highly computationally intensive task.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在LLM能够生成文本之前，它必须首先学习语言的工作方式。这是通过预训练实现的，这是一个计算密集型任务。
- en: 'Step 1: Data collection and preprocessing'
  id: totrans-13
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第一步：数据收集和预处理
- en: The first step in training an LLM is gathering as much high-quality text as
    possible. The goal is to create a massive and diverse dataset containing a wide
    range of human knowledge.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 训练LLM的第一步是收集尽可能多的高质量文本。目标是创建一个包含广泛人类知识的庞大且多样化的数据集。
- en: One source is [Common Crawl](https://commoncrawl.org/), which is a free, open
    repository of web crawl data containing 250 billion web pages over 18 years. However,
    raw web data is noisy — containing spam, duplicates and low quality content — so
    preprocessing is essential.If you’re interested in preprocessed datasets, FineWeb
    offers a curated version of Common Crawl, and is made available on [Hugging Face](https://huggingface.co/spaces/HuggingFaceFW/blogpost-fineweb-v1).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 一个来源是[Common Crawl](https://commoncrawl.org/)，这是一个包含18年超过2500亿网页的免费、开源的网页抓取数据仓库。然而，原始的网页数据是嘈杂的——包含垃圾邮件、重复内容和低质量内容——因此预处理是必不可少的。如果你对预处理后的数据集感兴趣，FineWeb提供了Common
    Crawl的精选版本，并在[Hugging Face](https://huggingface.co/spaces/HuggingFaceFW/blogpost-fineweb-v1)上提供。
- en: '![](../Images/887b7a282f5fd7131d711579790faca8.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/887b7a282f5fd7131d711579790faca8.png)'
- en: Once cleaned, the text corpus is ready for tokenization.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦文本语料库被清理，它就准备好进行分词了。
- en: 'Step 2: Tokenization'
  id: totrans-18
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第二步：分词
- en: Before a neural network can process text, it must be converted into numerical
    form. This is done through **tokenization**, where words, subwords, or characters
    are mapped to unique numerical tokens.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在神经网络能够处理文本之前，它必须被转换为数值形式。这是通过**分词**来完成的，其中单词、子词或字符被映射到唯一的数值标记。
- en: Think of tokens as the building blocks — the fundamental building blocks of
    all language models. In GPT4, there are 100,277 possible tokens.A popular tokenizer,
    [Tiktokenizer](https://tiktokenizer.vercel.app/), allows you to experiment with
    tokenization and see how text is broken down into tokens. Try entering a sentence,
    and you’ll see each word or subword assigned a series of numerical IDs.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 将标记视为构建块——所有语言模型的基本构建块。在GPT4中，有100,277个可能的标记。一个流行的标记器，[Tiktokenizer](https://tiktokenizer.vercel.app/)，允许你进行标记化实验并查看文本是如何分解成标记的。尝试输入一个句子，你就会看到每个单词或子词被分配一系列数字ID。
- en: '![](../Images/0766b4b85d4ff7f9dc203d696e47cecc.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0766b4b85d4ff7f9dc203d696e47cecc.png)'
- en: 'Step 3: Neural network training'
  id: totrans-22
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第3步：神经网络训练
- en: Once the text is tokenized, the neural network learns to predict the next token
    based on its context. As shown above, the model takes an input sequence of tokens
    (e.g., *“we are cook ing”*) and processes it through a giant mathematical expression — which
    represents the model’s architecture — to predict the next token.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦文本被标记化，神经网络就会根据其上下文学习预测下一个标记。如上图所示，模型接受一个标记序列的输入（例如，“我们正在烹饪”）并通过一个巨大的数学表达式——这代表了模型的架构——来预测下一个标记。
- en: 'A neural network consists of 2 key parts:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一个神经网络由2个关键部分组成：
- en: '**Parameters (weights)** — the learned numerical values from training.'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**参数（权重）**——从训练中学习到的数值。'
- en: '**Architecture (mathematical expression) **— the structure defining how the
    input tokens are processed to produce outputs.'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**架构（数学表达式）**——定义如何处理输入标记以产生输出的结构。'
- en: '![](../Images/9083b5ebd1bee1188169cd25e1c7e8ff.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9083b5ebd1bee1188169cd25e1c7e8ff.png)'
- en: Initially, the model’s predictions are random, but as training progresses, it
    learns to assign probabilities to possible next tokens.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 初始时，模型的预测是随机的，但随着训练的进行，它学会了为可能的下一个标记分配概率。
- en: When the correct token (e.g. “food”) is identified, the model adjusts its billions
    of parameters (weights) through **backpropagation** — an optimization process
    that reinforces correct predictions by increasing their probabilities while reducing
    the likelihood of incorrect ones.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 当识别出正确的标记（例如，“食物”）时，模型通过**反向传播**调整其数十亿个参数（权重）——这是一个通过增加正确预测的概率同时减少错误预测的可能性来强化正确预测的优化过程。
- en: This process is repeated billions of times across massive datasets.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程在大量数据集上重复数十亿次。
- en: '**Base model — the output of pre-training**'
  id: totrans-31
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**基础模型——预训练的输出**'
- en: 'At this stage, the base model has learned:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，基础模型已经学会了：
- en: How words, phrases and sentences relate to each other
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单词、短语和句子如何相互关联
- en: Statistical patterns in your training data
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练数据中的统计模式
- en: However, **base models are not yet optimised for real-world tasks**. You can
    think of them as an advanced autocomplete system — they predict the next token
    based on probability, but with limited instruction-following ability.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，**基础模型尚未针对现实世界任务进行优化**。你可以把它们看作是一个高级自动完成系统——它们根据概率预测下一个标记，但具有有限的指令遵循能力。
- en: A base model can sometimes recite training data verbatim and can be used for
    certain applications through **in-context learning**, where you guide its responses
    by providing examples in your prompt. However, to make the model truly useful
    and reliable, it requires further training.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 基础模型有时可以逐字背诵训练数据，并且可以通过**上下文学习**应用于某些应用，其中你通过在提示中提供示例来引导其响应。然而，要使模型真正有用和可靠，它还需要进一步训练。
- en: 2\. Post training — Making the model useful
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 后训练——使模型有用
- en: Base models are raw and unrefined. To make them helpful, reliable, and safe,
    they go through post-training, where they are fine-tuned on smaller, specialised
    datasets.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 基础模型是原始且未经过精炼的。为了使它们变得有用、可靠和安全，它们需要经过后训练，在这个过程中，它们在更小、更专业的数据集上进行微调。
- en: Because the model is a neural network, it cannot be explicitly programmed like
    traditional software. **Instead, we “program” it implicitly by training it on
    structured labeled datasets that represent examples of desired interactions.**
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 因为模型是一个神经网络，它不能像传统软件那样被明确编程。**相反，我们通过在表示期望交互的示例的结构化标记数据集上对其进行训练来隐式地“编程”它。**
- en: How post training works
  id: totrans-40
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 后训练是如何工作的
- en: Specialised datasets are created, consisting of structured examples on how the
    model should respond in different situations.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 创建了专门的数据库，包含模型在不同情况下应该如何响应的结构化示例。
- en: 'Some types of post training include:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一些类型的后训练包括：
- en: '**Instruction/conversation fine tuning** Goal: To teach the model to follow
    instructions, be task oriented, engage in multi-turn conversations, follow safety
    guidelines and refuse malicious requests, etc.'
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**指令/对话微调**目标：教会模型遵循指令，具有任务导向性，参与多轮对话，遵循安全指南，拒绝恶意请求等。'
- en: 'Eg: [InstructGPT (2022)](https://arxiv.org/abs/2203.02155): OpenAI hired some
    40 contractors to create these labelled datasets. These human annotators wrote
    prompts and provided ideal responses based on safety guidelines. Today, many datasets
    are generated automatically, with humans reviewing and editing them for quality.'
  id: totrans-44
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如：[InstructGPT (2022)](https://arxiv.org/abs/2203.02155)：OpenAI雇佣了大约40名承包商来创建这些标记数据集。这些人工标注者编写提示并提供基于安全指南的理想响应。如今，许多数据集都是自动生成的，人类会对其进行审查和编辑以确保质量。
- en: '**Domain specific fine tuning**Goal: Adapt the model for specialised fields
    like medicine, law and programming.'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**领域特定微调**目标：将模型适应于医学、法律和编程等特定领域。'
- en: Post training also introduces **special tokens **— symbols that were not used
    during pre-training — to help the model understand the structure of interactions.
    These tokens signal where a user’s input starts and ends and where the AI’s response
    begins, ensuring that the model correctly distinguishes between prompts and replies.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 训练后还引入了**特殊令牌**——在预训练期间未使用的符号，以帮助模型理解交互结构。这些令牌指示用户的输入开始和结束的位置以及AI响应的开始位置，确保模型正确区分提示和回复。
- en: Now, we’ll move on to some other key concepts.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将继续介绍一些其他关键概念。
- en: '**Inference — how the model generates new text**'
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**推理——模型如何生成新文本**'
- en: Inference can be performed at any stage, even midway through pre-training, to
    evaluate how well the model has learned.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 推理可以在任何阶段进行，甚至在预训练中途，以评估模型学习得有多好。
- en: When given an input sequence of tokens, the model assigns probabilities to all
    possible next tokens based on patterns it has learned during training.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 当给定一个令牌输入序列时，模型会根据训练期间学习的模式为所有可能的下一个令牌分配概率。
- en: '**Instead of always choosing the most likely token, it samples from this probability
    distribution — similar to flipping a biased coin, where higher-probability tokens
    are more likely to be selected.**'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**而不是总是选择最可能的令牌，它从这个概率分布中进行采样——类似于抛一个有偏见的硬币，其中更高概率的令牌更有可能被选中。**'
- en: This process repeats iteratively, with each newly generated token becoming part
    of the input for the next prediction.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程会迭代进行，每个新生成的令牌都将成为下一个预测的输入部分。
- en: Token selection is **stochastic** andthe same input can produce different outputs.
    Over time, the model generates text that wasn’t explicitly in its training data
    but follows the same statistical patterns.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 令牌选择是**随机的**，相同的输入可以产生不同的输出。随着时间的推移，模型生成的文本可能不在其训练数据中明确提及，但遵循相同的统计模式。
- en: '**Hallucinations — when LLMs generate false info**'
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**幻觉——当LLM生成虚假信息**'
- en: '**Why do hallucinations occur?**'
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**为什么会出现幻觉？**'
- en: Hallucinations happen because LLMs do not “know” facts — they simply predict
    the most statistically likely sequence of words based on their training data.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 幻觉发生是因为LLM（大型语言模型）并不“知道”事实——它们只是根据训练数据预测最可能出现的单词序列。
- en: Early models struggled significantly with hallucinations.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 早期模型在幻觉方面遇到了很大的困难。
- en: For instance, in the example below, if the training data contains many “Who
    is…” questions with definitive answers, the model learns that such queries should
    always have confident responses, even when it lacks the necessary knowledge.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在下面的例子中，如果训练数据包含许多带有明确答案的“Who is…”问题，模型会学习到这样的查询应该总是有自信的回应，即使它缺乏必要知识。
- en: When asked about an unknown person, the model does not default to “I don’t know”
    because this pattern was not reinforced during training. Instead, it generates
    its best guess, often leading to fabricated information.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 当被问及一个未知人物时，模型不会默认回答“我不知道”，因为这种模式在训练期间没有得到强化。相反，它会生成最佳猜测，这通常会导致虚构的信息。
- en: '![](../Images/d5b7ec81def5b0ac4b4fc6f5f246d6da.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d5b7ec81def5b0ac4b4fc6f5f246d6da.png)'
- en: '**How do you reduce hallucinations?**'
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**如何减少幻觉？**'
- en: 'Method 1: Saying “I don’t know”'
  id: totrans-62
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 方法1：说“我不知道”
- en: Improving factual accuracy requires explicitly training the model to recognise
    what it does not know — a task that is more complex than it seems.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 提高事实准确性需要明确训练模型以识别它不知道的内容——这项任务比看起来更复杂。
- en: This is done via **self interrogation**, a process that helps define the model’s
    knowledge boundaries.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这是通过**自我质疑**来实现的，这个过程有助于定义模型的知识边界。
- en: 'Self interrogation can be automated using another AI model, which generates
    questions to probe knowledge gaps. If it produces a false answer, new training
    examples are added, where the correct response is: *“I’m not sure. Could you provide
    more context?”*'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 自我质疑可以通过使用另一个AI模型来自动化，该模型生成问题以探测知识差距。如果它产生了错误的答案，就会添加新的训练示例，其中正确的响应是：“*我不确定。你能提供更多背景信息吗？*”
- en: If a model has seen a question many times in training, it will assign a high
    probability to the correct answer.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个模型在训练中多次见过一个问题，它会给正确答案分配一个很高的概率。
- en: '**If the model has not encountered the question before, it distributes probability
    more evenly across multiple possible tokens, making the output more randomised.
    No single token stands out as the most likely choice.**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果模型之前没有遇到过这个问题，它会在多个可能的标记上分配更均匀的概率，使得输出更加随机化。没有单个标记突出为最有可能的选择。**'
- en: Fine tuning explicitly trains the model to handle low-confidence outputs with
    predefined responses.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 显式微调训练模型以处理低置信度输出和预定义的响应。
- en: 'For example, when I asked ChatGPT-4o, “*Who is asdja rkjgklfj?*”, it correctly
    responded: “I’m not sure who that is. Could you provide more context?”'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当我向ChatGPT-4o提问“*谁是asdja rkjgklfj？*”时，它正确地回答：“我不确定是谁。你能提供更多背景信息吗？”
- en: 'Method 2: Doing a web search'
  id: totrans-70
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 方法2：进行网络搜索
- en: A more advanced method is to extend the model’s knowledge beyond its training
    data by giving it access to external search tools.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 一种更高级的方法是通过提供外部搜索工具的访问权限，来扩展模型的知识范围，使其超出其训练数据。
- en: At a high level, when a model detects uncertainty, it can trigger a web search.
    The search results are then inserted into a model’s context window — essentially
    allowing this new data to be part of it’s working memory. The model references
    this new information while generating a response.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在高层次上，当模型检测到不确定性时，它可以触发网络搜索。然后，搜索结果被插入到模型的内容窗口中——本质上允许这些新数据成为其工作记忆的一部分。在生成响应时，模型会参考这些新信息。
- en: Vague recollections vs working memory
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模糊记忆与工作记忆
- en: Generally speaking, LLMs have two types of knowledge access.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，LLMs有两种类型的知识访问。
- en: Vague recollections — the knowledge stored in the model’s parameters from pre-training.
    This is based on patterns it learned from vast amounts of internet data but is
    not precise nor searchable.
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊记忆——模型参数中存储的知识。这是基于它从大量互联网数据中学习到的模式，但不是精确的，也不是可搜索的。
- en: Working memory — the information that is available in the model’s context window,
    which is directly accessible during inference. Any text provided in the prompt
    acts as a short term memory, allowing the model to recall details while generating
    responses.
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 工作记忆——在模型的内容窗口中可用的信息，在推理期间可以直接访问。在提示中提供的任何文本都充当短期记忆，允许模型在生成响应时回忆细节。
- en: Adding relevant facts within the context window significantly improves response
    quality.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在内容窗口中添加相关事实可以显著提高响应质量。
- en: Knowledge of self
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自我认知
- en: When asked questions like *“Who are you?”* or *“What built you?”*, an LLM will
    generate a statistical best guess based on its training data, unless explicitly
    programmed to respond accurately.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 当被问及像“*你是谁？*”或“*是什么建造了你？*”这样的问题时，LLM将基于其训练数据生成基于统计的最佳猜测，除非明确编程以准确响应。
- en: LLMs do not have true self-awareness, their responses depend on patterns seen
    during training.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs没有真正的自我意识，它们的响应取决于训练期间看到的模式。
- en: One way to provide the model with a consistent identity is by using a **system
    prompt**, which sets predefined instructions about how it should describe itself,
    its capabilities, and its limitations.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用**系统提示**，可以提供一种方法来确保模型具有一致的个性，该提示预设了关于它应该如何描述自己、其能力和其限制的指令。
- en: To end off
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束语
- en: That’s a wrap for Part 1! I hope this has helped you build intuition on how
    LLMs work. In Part 2, we’ll dive deeper into reinforcement learning and some of
    the latest models.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部分到此结束！希望这能帮助你建立对LLMs工作原理的直觉。在第二部分，我们将更深入地探讨强化学习和一些最新的模型。
- en: Got questions or ideas for what I should cover next? Drop them in the comments — I’d
    love to hear your thoughts. See you in Part 2! 🙂
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我接下来应该涵盖什么内容有疑问或想法吗？请在评论中留言——我很乐意听到你的想法。第二部分再见！ 🙂
