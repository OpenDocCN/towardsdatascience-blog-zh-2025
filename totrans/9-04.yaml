- en: Creating SMOTE Oversampling from Scratch
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/creating-smote-oversampling-from-scratch-64af1712a3be/](https://towardsdatascience.com/creating-smote-oversampling-from-scratch-64af1712a3be/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Synthetic Minority Oversampling Technique (SMOTE) is commonly used to handle
    class imbalances in datasets. Suppose there are two classes and one class has
    far more samples (majority class) than the other (minority class). In that case,
    SMOTE will generate more synthetic samples in the minority class so that it’s
    on par with the majority class.
  prefs: []
  type: TYPE_NORMAL
- en: In the real world, we’re not going to have balanced datasets for classification
    problems. Take for example a classifier that predicts whether a patient has sickle
    cell disease. If a patient has abnormal hemoglobin levels (6–11 g/dL), then that’s
    a strong predictor of sickle cell disease. If a patient has normal hemoglobin
    levels (12 mg/dL), then that predictor alone doesn’t indicate whether the patient
    has sickle cell disease.
  prefs: []
  type: TYPE_NORMAL
- en: However, about 100,000 patients in the USA are diagnosed with sickle cell disease.
    There are currently 334.9 million US citizens. If we have a dataset of every US
    citizen and label or not the patient has sickle cell disease, we have 0.02% of
    people who have the disease. We have a major class imbalance. Our model can’t
    pick up meaningful features to predict this anomaly.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, our model would have a 99.98% accuracy if it predicted that all
    patients don’t have sickle cell disease. This doesn’t help solve our health problem,
    and also a limitation to using accuracy as the sole metric for evaluating model
    performance. [Class imbalance is frequent in healthcare datasets, thus hampering
    the detection of rare diseases/events.](https://pmc.ncbi.nlm.nih.gov/articles/PMC5987310/)
    Most disease classification methods implicitly assume an equal occurrence of classes,
    which helps maximize the overall classification accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: '[While other metrics can be used instead of accuracy (precision and recall)](https://www.linkedin.com/pulse/balancing-act-navigating-precision-vs-recall-ai-emily-ux75c/),
    we would also want to oversample the minority class (patients with rare diseases)
    to make sure we have similar numbers of data points for each class label.'
  prefs: []
  type: TYPE_NORMAL
- en: How does SMOTE work?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'However, SMOTE doesn’t create exact copies of the minority samples. Rather,
    it combines two algorithms: K-Nearest Neighbor and linear interpolation.'
  prefs: []
  type: TYPE_NORMAL
- en: Below is the **pseudocode** for SMOTE that leverages these two algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: SMOTE randomly selects a point in the minority sample
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SMOTE finds its k nearest neighbors in that minority sample
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SMOTE randomly picks one of those k neighbors
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SMOTE creates a linear equation with the randomly selected point and its neighbor.
    Then, it generates a synthetic sample along that linear equation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Below is a graph of how SMOTE works.
  prefs: []
  type: TYPE_NORMAL
- en: '![Custom generated visual by author.](../Images/ed29a3ab2e7382421bf25665f9904ea7.png)'
  prefs: []
  type: TYPE_IMG
- en: Custom generated visual by author.
  prefs: []
  type: TYPE_NORMAL
- en: You can see that the synthetic sample (in orange) is a random point on the linear
    equation that is formed between the data point of interest and the neighbor selected.
    The synthetic sample coordinates have the following constraints.
  prefs: []
  type: TYPE_NORMAL
- en: Xs is a value between Xk and Xi. In this example, we assume Xs, Xk, and Xi are
    all integers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ys is the result of the linear equation if you plug in Xs. Xs is then multiplied
    by the neighbor_slope, followed by adding the y-intercept (in this case, Yk).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Below is how to use the [Imbalance-Learn](https://imbalanced-learn.org/stable/)
    SMOTE package.
  prefs: []
  type: TYPE_NORMAL
- en: '[**SMOTE for Imbalanced Classification with Python**](https://www.analyticsvidhya.com/blog/2020/10/overcoming-class-imbalance-using-smote-techniques/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But how would we create it from scratch?
  prefs: []
  type: TYPE_NORMAL
- en: Initialize Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So let’s have a dataset of 110 points. Each point has an x and y coordinate
    and both values fall in the range of -5 to 5\. These x and y coordinates are also
    integers.
  prefs: []
  type: TYPE_NORMAL
- en: 10 of these points have label 1
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 100 of these points have label 0
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The graph of this dataset is shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '![Matplotlib graph of dataset. Custom generated graph by author.](../Images/0e36a6116f0ca162afbb1a9ac52b7669.png)'
  prefs: []
  type: TYPE_IMG
- en: Matplotlib graph of dataset. Custom generated graph by author.
  prefs: []
  type: TYPE_NORMAL
- en: If we were to train a classifier on this dataset, it would get a 90% accuracy
    if it predicted only 0 for all points. Therefore, we want to use SMOTE to oversample
    the minority class (label 1) so it can distinguish between the two labels.
  prefs: []
  type: TYPE_NORMAL
- en: We want to add 90 more synthetic data points with label 1 so that we have a
    dataset of 200 points, with 100 points for each label.
  prefs: []
  type: TYPE_NORMAL
- en: Steps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Select Random Point In Minority Sample
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first step of the pseudocode is to filter out all the data points in the
    minority sample and select one of those points randomly.
  prefs: []
  type: TYPE_NORMAL
- en: Below is a graph of all the data points in the minority sample.
  prefs: []
  type: TYPE_NORMAL
- en: '![Matplotlib graph of dataset. Custom generated graph by author.](../Images/07269f7bee9be6f45aacb21af55ebabd.png)'
  prefs: []
  type: TYPE_IMG
- en: Matplotlib graph of dataset. Custom generated graph by author.
  prefs: []
  type: TYPE_NORMAL
- en: So let’s take the data point at (1, 4).
  prefs: []
  type: TYPE_NORMAL
- en: '![Matplotlib graph of dataset. Custom generated graph by author.](../Images/fc093db69f0955ce61ae0a850de465be.png)'
  prefs: []
  type: TYPE_IMG
- en: Matplotlib graph of dataset. Custom generated graph by author.
  prefs: []
  type: TYPE_NORMAL
- en: Find k nearest neighbors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next step is to find k nearest neighbors for that data point. For now, we’ll
    assume k=1.
  prefs: []
  type: TYPE_NORMAL
- en: So the nearest neighbor for datapoint (1,4) is (-2,2).
  prefs: []
  type: TYPE_NORMAL
- en: '![Matplotlib graph of dataset. Custom generated graph by author.](../Images/5311d61e2960e875e87e423c76f005bc.png)'
  prefs: []
  type: TYPE_IMG
- en: Matplotlib graph of dataset. Custom generated graph by author.
  prefs: []
  type: TYPE_NORMAL
- en: Randomly pick one of those k neighbors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We then randomly pick one of the k neighbors of that data point. Since we assumed
    k=1, we’ll use (-2, 2).
  prefs: []
  type: TYPE_NORMAL
- en: Create Linear Equation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: From that data point and its neighbor, we’ll create a linear equation. This
    equation is y = (2 x + 10) / 3
  prefs: []
  type: TYPE_NORMAL
- en: '![Matplotlib graph of dataset. Custom generated graph by author.](../Images/4e2fa2eb1235aec33de127f382c517cc.png)'
  prefs: []
  type: TYPE_IMG
- en: Matplotlib graph of dataset. Custom generated graph by author.
  prefs: []
  type: TYPE_NORMAL
- en: Generate Synthetic Sample
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With that given equation, randomly generate a synthetic sample on that line.
    So if we set x = 0, y = (2 *0 + 10)/3 = 10/3 = 3.33
  prefs: []
  type: TYPE_NORMAL
- en: Our synthetic sample is point (0, 3.33).
  prefs: []
  type: TYPE_NORMAL
- en: '![Matplotlib graph of dataset. Custom generated graph by author.](../Images/4b629e0fd90ab3f2d887ae920711f8a5.png)'
  prefs: []
  type: TYPE_IMG
- en: Matplotlib graph of dataset. Custom generated graph by author.
  prefs: []
  type: TYPE_NORMAL
- en: Repeat
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So we created 1 synthetic data point. That leaves 89 more synthetic data points
    left.
  prefs: []
  type: TYPE_NORMAL
- en: So we repeat the above steps with different data points until we get 90 synthetic
    data points.
  prefs: []
  type: TYPE_NORMAL
- en: Code for SMOTE
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Results for SMOTE
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With 1 neighbor, we would generate the following 90 points of synthetic data
    with label=1
  prefs: []
  type: TYPE_NORMAL
- en: '![Matplotlib graph of dataset. Custom generated graph by author.](../Images/b0578cd2d7458c0696b4449c45d8d692.png)'
  prefs: []
  type: TYPE_IMG
- en: Matplotlib graph of dataset. Custom generated graph by author.
  prefs: []
  type: TYPE_NORMAL
- en: If we append our synthetic samples to our existing dataset, we can see how they
    map below.
  prefs: []
  type: TYPE_NORMAL
- en: '![Matplotlib graph of dataset. Custom generated graph by author.](../Images/fd4abcadc880130b42268988569f2f89.png)'
  prefs: []
  type: TYPE_IMG
- en: Matplotlib graph of dataset. Custom generated graph by author.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t see a lot of variance from our synthetic samples. They’re nicely grouped
    for label=1, as opposed to being spread out for label=0\. This is because we chose
    to randomly select one neighbor from *one nearest neighbor* of the minority class
    data point.
  prefs: []
  type: TYPE_NORMAL
- en: If we increase the number of neighbors to randomly select from, we’ll have more
    varied samples for the minority class.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/61a7acece92d53e021c58f070bd65a7a.png)![](../Images/af0fa63b29d619b780c5f408c0b4de05.png)![](../Images/2859722bab7d7e56b14a387c9c4a07d3.png)![You
    can see the samples being more distributed as we increase the number of neighbors
    to select from. Matplotlib graph of dataset. Custom generated graph by author.](../Images/3cd2a0bf5cca599dca801d94e22baa47.png)'
  prefs: []
  type: TYPE_IMG
- en: You can see the samples being more distributed as we increase the number of
    neighbors to select from. Matplotlib graph of dataset. Custom generated graph
    by author.
  prefs: []
  type: TYPE_NORMAL
- en: Code to Generate Plots
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Variations of SMOTE
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that you have the code to implement SMOTE from scratch, there are other
    ways to tweak it to improve variance in sampling (besides increasing the number
    of neighbors to select from).
  prefs: []
  type: TYPE_NORMAL
- en: Use a radial kernel instead of a linear equation to generate synthetic samples.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use an algorithm other than K Nearest Neighbors to select a point of comparison.
    For example, use K-Means to find clusters of the minority sample. From there,
    get the centroids of such clusters. Use the centroids as points of comparison
    with the selected data point (as opposed to an actual data point from K Nearest
    Neighbors).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pick more than one K Nearest Neighbor. Instead of using a linear equation to
    generate synthetic samples, use a linear hyperplane of the selected datapoint
    and more than one of its K Nearest Neighbors.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This piece from KDNuggets below goes over 7 other SMOTE variations. They are
    all in Python libraries, but the descriptions should give you an idea of how to
    incorporate such changes in your own custom SMOTE.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.kdnuggets.com/2023/01/7-smote-variations-oversampling.html](https://www.kdnuggets.com/2023/01/7-smote-variations-oversampling.html)'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We went over an oversampling technique and its applications in the real world.
    We described how to implement this from scratch and provided Python logic. We
    then discussed other forms of SMOTE that can increase the variance of the minority
    sample, and how to implement such changes.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
