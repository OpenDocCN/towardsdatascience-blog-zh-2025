  prefs: []
  type: TYPE_NORMAL
- en: 'A quick tour of this structure:'
  prefs: []
  type: TYPE_NORMAL
- en: '**`configurations/`** holds constant definitions and LLM configuration classes.'
  prefs: []
  type: TYPE_NORMAL
- en: '**`nodes/`** contains the implementation of each agent or functional node in
    the debate (each of these is a module defining one agent’s behavior).'
  prefs: []
  type: TYPE_NORMAL
- en: '**`prompts/`** stores the prompt templates for the language model (so each
    agent knows how to prompt GPT-4o for its specific task).'
  prefs: []
  type: TYPE_NORMAL
- en: '**`debate_workflow.py`** ties everything together by defining the LangGraph
    workflow (the graph of nodes and transitions).'
  prefs: []
  type: TYPE_NORMAL
- en: '**`debate_state.py`** defines the shared data structure that the agents will
    be using on each run.'
  prefs: []
  type: TYPE_NORMAL
- en: '**`tests/`** includes some basic tests and example runs to help you verify
    everything is working.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Under the Hood: State Management and Workflow Setup'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To coordinate a complex multi-turn debate, we need a shared state and a well-defined
    flow. We’ll start by looking at how Deb8flow defines the **debate state** and
    constants, and then see how the **LangGraph workflow** is constructed.
  prefs: []
  type: TYPE_NORMAL
- en: Defining the Debate State Schema (`debate_state.py`)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Deb8flow uses a **shared state** ([https://langchain-ai.github.io/langgraph/concepts/low_level/#state](https://langchain-ai.github.io/langgraph/concepts/low_level/#state)
    ) in the form of a Python `TypedDict` that all agents can read from and update.
    This state tracks the debate’s progress and context – things like the topic, the
    history of messages, whose turn it is, etc. By centralizing this information,
    each agent node can make decisions based on the current state of the debate.
  prefs: []
  type: TYPE_NORMAL
- en: 'Link: [**debate_state.py**](https://github.com/iason-solomos/Deb8flow/blob/main/debate_state.py)'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Key fields that we need to have in the `DebateState` include:'
  prefs: []
  type: TYPE_NORMAL
- en: '`debate_topic` (str): The topic being debated.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`messages` (List[DebateMessage]): A list of all messages exchanged so far.
    Each message is a dictionary with fields for `speaker` (e.g. `"pro"` or `"con"`
    or `"fact_checker"`), the message `content` (text), a `validated` flag (whether
    it passed fact-check), and the `stage` of the debate when it was produced.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`stage` (str): The current debate stage (one of `"opening"`, `"rebuttal"`,
    `"counter"`, `"final_argument"`).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`speaker` (str): Whose turn it is currently (`"pro"` or `"con"`).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`times_pro_fact_checked` / `times_con_fact_checked` (int): Counters for how
    many times each side has been caught with a false claim. (In our rules, if a debater
    fails fact-check 3 times, they could be disqualified or automatically lose.)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`positions` (Dict[str, str]): (Optional) A mapping of each side’s general stance
    (e.g., `"pro": "In favor of the topic"`).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By structuring the debate’s state, agents find it easy to access the conversation
    history or check the current stage, and the control logic can update the state
    between turns. The state is essentially the memory of the debate.
  prefs: []
  type: TYPE_NORMAL
- en: Constants and Configuration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To avoid “magic strings” scattered in the code, we define some constants in
    `debate_constants.py`. For example, constants for stage names (`STAGE_OPENING
    = "opening"`, etc.), speaker identifiers (`SPEAKER_PRO = "pro"`, `SPEAKER_CON
    = "con"`, etc.), and node names (`NODE_PRO_DEBATER = "pro_debater_node"`, etc.).
    These make the code easier to maintain and read.
  prefs: []
  type: TYPE_NORMAL
- en: '[**debate_constants.py**](https://github.com/iason-solomos/Deb8flow/blob/main/configurations/debate_constants.py)**:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: We also set up LLM configuration in [llm_config.py](https://github.com/iason-solomos/Deb8flow/blob/main/configurations/llm_config.py).
    Here, we define classes for OpenAI or Azure OpenAI configs and then create a dictionary
    `llm_config_map` mapping model names to their config. For instance, we map `"gpt-4o"`
    to an `OpenAILLMConfig` that holds the model name and API key. This way, whenever
    we need to initialize a GPT-4o agent, we can just do `llm_config_map["gpt-4o"]`
    to get the right config. All our main agents (debaters, topic generator, judge)
    use this same GPT-4o configuration.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Building the LangGraph Workflow (`debate_workflow.py`)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'With state and configs in place, we construct the [debate workflow graph](https://github.com/iason-solomos/Deb8flow/blob/main/workflow/debate_workflow.py).
    LangGraph’s **StateGraph** is the backbone that connects all our agent nodes in
    the order they should execute. Here’s how we set it up:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s break down what’s happening:'
  prefs: []
  type: TYPE_NORMAL
- en: We initialize a new `StateGraph` with our `DebateState` type as the state schema.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We add each node (agent) to the graph with a name. For nodes that need an LLM,
    we pass in the GPT-4o config. For example, `"pro_debater_node"` is added as `ProDebaterNode(llm_config_map["gpt-4o"])`,
    meaning the Pro debater agent will use GPT-4o as its underlying model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We set the **entry point** of the graph to `"generate_topic_node"`. This means
    the first step of the workflow is to generate a debate topic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Then we add directed edges to connect nodes. The edges above encode the primary
    sequence: topic -> pro’s turn -> fact-check -> (then a routing decision) -> …
    eventually -> judge -> END. We don’t connect the Moderator or Fact Check Router
    with static edges, since these nodes use dynamic commands to redirect the flow.
    The final edge connects the judge to an `END` marker to terminate the graph.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When the workflow runs, control will pass along these edges in order, but whenever
    we hit a **router or moderator node**, that node will output a command telling
    the graph which node to go to next (overriding the default edge). This is how
    we create conditional loops: the `fact_check_router_node` might send us back to
    a debater node for a retry, instead of following a straight line. LangGraph supports
    this by allowing nodes to return a special `Command` object with `goto` instructions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In summary, at a high level we’ve defined an **agentic workflow**: a graph
    of autonomous agents where control can branch and loop based on the agents’ outputs.
    Now, let’s explore what each of these agent nodes actually does.'
  prefs: []
  type: TYPE_NORMAL
- en: Agent Nodes Breakdown
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Each stage or role in the debate is encapsulated in a node (agent). In LangGraph,
    nodes are often simple functions, but I wanted a more object-oriented approach
    for clarity and reusability. So in Deb8flow, every node is a **class** with a
    `__call__` method. All the main agent classes inherit from a common `BaseComponent`
    for shared functionality. This design makes the system modular: we can easily
    swap out or extend agents by modifying their class definitions, and each agent
    class is responsible for its piece of the workflow.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go through the key agents one by one.
  prefs: []
  type: TYPE_NORMAL
- en: '`BaseComponent` – A Reusable Agent Base Class'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Most of our agent nodes (like the debaters and judge) share common needs: they
    use an LLM to generate output, they might need to retry on errors, and they should
    track token usage. The `BaseComponent` class (defined in `<a href="https://github.com/iason-solomos/Deb8flow/blob/main/nodes/base_component.py">nodes/base_component.py</a>`)
    provides these common features so we don’t repeat code.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Key features of `BaseComponent`:'
  prefs: []
  type: TYPE_NORMAL
- en: It stores an LLM client (e.g. an OpenAI `ChatOpenAI` instance) initialized with
    a given model and API key, as well as an output parser.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It provides a method `create_chain(system_template, human_template)` which sets
    up a LangChain **prompt chain** (a `RunnableSequence`) combining a system prompt
    and a human prompt. This chain is what actually generates outputs when run.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It has an `execute_chain(inputs)` method that invokes the chain and includes
    logic to **retry** if the OpenAI API returns a rate-limit error (HTTP 429). This
    is done with exponential backoff up to a `max_retries` count.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It keeps track of token usage (prompt tokens and completion tokens) for logging
    or analysis.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `__call__` method of BaseComponent (which each subclass will call via `super().__call__(state)`)
    can perform any setup needed before the node’s main logic runs (like ensuring
    the LLM is initialized).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By building on `BaseComponent`, each agent class can focus on its unique logic
    (like what prompt to use and how to handle the state), while inheriting the heavy
    lifting of interacting with GPT-4o reliably.
  prefs: []
  type: TYPE_NORMAL
- en: Topic Generator Agent (`GenerateTopicNode`)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The **Topic Generator** **(**[topic_generator_node.py](https://github.com/iason-solomos/Deb8flow/blob/main/nodes/topic_generator_node.py)**)**
    is the first agent in the graph. Its job is to come up with a debatable topic
    for the session. We give it a prompt that instructs it to output a nuanced topic
    that could reasonably have a pro and con side.
  prefs: []
  type: TYPE_NORMAL
- en: 'This agent inherits from `BaseComponent` and uses a prompt chain (system +
    human prompt) to generate one item of text – the debate topic. When called, it
    executes the chain (with no special input, just using the prompt) and gets back
    a `topic_text`. It then updates the state with:'
  prefs: []
  type: TYPE_NORMAL
- en: '`debate_topic`: the generated topic (stripped of any extra whitespace),'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`positions`: a dictionary assigning the pro and con stances (by default we
    use `"In favor of the topic"` and `"Against the topic"`),'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`stage`: set to `"opening"`,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`speaker`: set to `"pro"` (so the Pro side will speak first).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In code, the return might look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Here are the prompts for the topic generator:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Then we pass these prompts in the constructor of the class itself.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: It’s a pattern we will repeat for all classes except for those not using LLMs
    and the fact checker.
  prefs: []
  type: TYPE_NORMAL
- en: Now we can implement the 2 stars of the show, the Pro and Con argument agents!
  prefs: []
  type: TYPE_NORMAL
- en: Debater Agents (Pro and Con)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Link: [pro_debater_node.py](https://github.com/iason-solomos/Deb8flow/blob/main/nodes/pro_debater_node.py)'
  prefs: []
  type: TYPE_NORMAL
- en: The two debater agents are very similar in structure, but each uses different
    prompt templates tailored to their role (pro vs con) and the stage of the debate.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Pro debater, for example, has to handle an **opening statement** and a
    **counter-argument** (countering the Con’s rebuttal). We also need logic for retries
    in case a statement fails fact-check. In code, the ProDebater class sets up multiple
    prompt chains:'
  prefs: []
  type: TYPE_NORMAL
- en: '`opening_chain` and an `opening_retry_chain` (using slightly different human
    prompts – the retry prompt might instruct it to try again without repeating any
    factually dubious claims).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`counter_chain` and `counter_retry_chain` for the counter-argument stage.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'When the ProDebater’s `__call__` runs, it looks at the current `stage` and
    `speaker` in the state to decide what to do:'
  prefs: []
  type: TYPE_NORMAL
- en: If it’s the **opening** stage and the speaker is “pro”, it uses the `opening_chain`
    to generate an opening argument. If the last message from Pro was marked invalid
    (not validated), it knows this is a retry, so it would use the `opening_retry_chain`
    instead.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If it’s the **counter** stage and speaker is “pro”, it generates a counter-argument
    to whatever the opponent (Con) just said. It will fetch the last message by the
    Con from the `messages` history, and feed that into the prompt (so that the Pro
    can directly counter it). Again, if the last Pro message was invalid, it would
    switch to the retry chain.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After generating its argument, the Debater agent creates a new message entry
    (with `speaker="pro"`, the content text, `validated=False` initially, and the
    stage) and appends it to the state’s message list. That becomes the output of
    the node (LangGraph will merge this partial state update into the global state).
  prefs: []
  type: TYPE_NORMAL
- en: 'The **Con Debater** agent mirrors this logic for its stages:'
  prefs: []
  type: TYPE_NORMAL
- en: It similarly appends its message to the state.
  prefs: []
  type: TYPE_NORMAL
- en: It has a **rebuttal** and **closing argument** (final argument) stage, each
    with a normal and a retry chain.
  prefs: []
  type: TYPE_NORMAL
- en: It checks if it’s the rebuttal stage (speaker “con”) or final argument stage
    (speaker “con”) and invokes the appropriate chain, possibly using the last Pro
    message for context when rebutting.
  prefs: []
  type: TYPE_NORMAL
- en: '[con_debater_node.py](https://github.com/iason-solomos/Deb8flow/blob/main/nodes/con_debater_node.py)'
  prefs: []
  type: TYPE_NORMAL
- en: By using class-based implementation, our debaters’ code is easier to maintain.
    We can clearly separate what the Pro does vs what the Con does, even if they share
    structure. Also, by encapsulating prompt chains inside the class, each debater
    can manage multiple possible outputs (regular vs retry) cleanly.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt design:** The actual prompts (in `prompts/pro_debater_prompts.py`
    and `con_debater_prompts.py`) guide the GPT-4o model to take on a persona (“You
    are a debater arguing *for/against* the topic…”) and produce the argument. They
    also instruct the model to keep statements factual and logical. If a fact check
    fails, the retry prompt may say something like: “Your previous statement had an
    unverified claim. Revise your argument to be factually correct while maintaining
    your position.” – encouraging the model to correct itself.'
  prefs: []
  type: TYPE_NORMAL
- en: With this, our AI debaters can engage in a multi-turn duel, and even recover
    from factual missteps.
  prefs: []
  type: TYPE_NORMAL
- en: Fact Checker Agent (`FactCheckNode`)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After each debater speaks, the Fact Checker agent swoops in to verify their
    claims. This agent is implemented in `<a href="https://github.com/iason-solomos/Deb8flow/blob/main/nodes/fact_checker_node.py">fact_checker_node.py</a>`,
    and interestingly, it uses the **GPT-4o model’s browsing ability** rather than
    our own custom prompts. Essentially, we delegate the fact-checking to OpenAI’s
    GPT-4 with web search.
  prefs: []
  type: TYPE_NORMAL
- en: 'How does this work? The OpenAI Python client for GPT-4 (with browsing) allows
    us to send a user message and get a structured response. In `FactCheckNode.__call__`,
    we do something like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'If the result is **“yes”** (meaning the claim seems truthful or at least not
    factually wrong), the Fact Checker will mark the last message’s `validated` field
    as True in the state, and output `{"validated": True}` with no further changes.
    This signals that the debate can continue normally.'
  prefs: []
  type: TYPE_NORMAL
- en: 'If the result is **“no”** (meaning it found the claim to be incorrect or dubious),
    the Fact Checker will append a new message to the state with `speaker="fact_checker"`
    describing the finding (or we could simply mark it, but providing a brief note
    like *“(Fact Checker: The statistic cited could not be verified.)”* can be useful).
    It will also set `validated: False` and increment a counter for whichever side
    made the claim. The output state from this node includes `validated: False` and
    an updated `times_pro_fact_checked` or `times_con_fact_checked` count.'
  prefs: []
  type: TYPE_NORMAL
- en: 'We also use a Pydantic BaseModel to control the output of the LLM:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Debate Moderator Agent (`DebateModeratorNode`)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Debate Moderator is the conductor of the debate. Instead of producing lengthy
    text, this agent’s job is to manage **turn-taking** and stage progression. In
    the workflow, after a statement is validated by the Fact Checker, control passes
    to the Moderator node. The Moderator then issues a `Command` that updates the
    state for the next turn and directs the flow to the appropriate next agent.
  prefs: []
  type: TYPE_NORMAL
- en: 'The logic in `DebateModeratorNode.__call__` (see `<a href="https://github.com/iason-solomos/Deb8flow/blob/main/nodes/debate_moderator_node.py">nodes/debate_moderator_node.py</a>`)
    goes roughly like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Each conditional corresponds to a point in the debate where a turn just ended,
    and sets up the next turn. For example, after the **opening** (Pro just spoke),
    it sets stage to **rebuttal**, switches speaker to Con, and directs the workflow
    to the Con debater node​. After the **final_argument** (Con’s closing), it directs
    to the Judge with no further update (the debate stage effectively ends).
  prefs: []
  type: TYPE_NORMAL
- en: Fact Check Router (`FactCheckRouterNode`)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is another control node (like the Moderator) that introduces conditional
    logic. The Fact Check Router sits right after the Fact Checker agent in the flow.
    Its purpose is to **branch the workflow depending on the fact-check result**.
  prefs: []
  type: TYPE_NORMAL
- en: 'In `<a href="https://github.com/iason-solomos/Deb8flow/blob/main/nodes/fact_check_router_node.py">nodes/fact_check_router_node.py</a>`,
    the logic is:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'First, the Fact Check Router checks if either side’s fact-check count has reached
    3\. If so, it creates a Moderator-style message announcing an early end: the offending
    side is disqualified and the other side is the winner​. It appends this verdict
    to the messages and returns a Command that jumps to `END`, effectively terminating
    the debate without going to the Judge (because we already know the outcome).'
  prefs: []
  type: TYPE_NORMAL
- en: 'If we’re not ending the debate early, it then looks at the Fact Checker’s result
    for the last message (which is stored as `validated` on that message). If validated
    is *True*, we go to the debate moderator: `Command(goto=debate_moderator_node)`.'
  prefs: []
  type: TYPE_NORMAL
- en: Else if the statement fails fact-check, the workflow goes back to the debater
    to produce a revised statement (with the state counters updated to reflect the
    failure). This loop can happen multiple times if needed (up to the disqualification
    limit).
  prefs: []
  type: TYPE_NORMAL
- en: 'This dynamic control is the heart of Deb8flow’s “agentic” nature – the ability
    to adapt the path of execution based on the content of the agents’ outputs. It
    showcases LangGraph’s strength: combining control flow with state. We’re essentially
    encoding debate rules (like allowing retries for false claims, or ending the debate
    if someone cheats too often) directly into the workflow graph.'
  prefs: []
  type: TYPE_NORMAL
- en: Judge Agent (`JudgeNode`)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Last but not least, the Judge agent** delivers the final verdict based on
    **rhetorical skill, clarity, structure, and overall persuasiveness**. Its **system
    prompt** and **human prompt** make this explicit:'
  prefs: []
  type: TYPE_NORMAL
- en: '**System Prompt**: “You are an impartial debate judge AI. … Evaluate which
    debater presented their case more clearly, persuasively, and logically. You must
    focus on communication skills, structure of argument, rhetorical strength, and
    overall coherence.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Human Prompt**: “Here is the full debate transcript. Please analyze the performance
    of both debaters—PRO and CON. Evaluate rhetorical performance—clarity, structure,
    persuasion, and relevance—and decide who presented their case more effectively.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When the **Judge** node runs, it receives the entire debate transcript (all
    validated messages) alongside the original topic. It then uses GPT-4o to examine
    how each side framed their arguments, handled counterpoints, and supported (or
    failed to support) claims with examples or logic. Crucially, the **Judge** is
    forbidden to evaluate which position is *objectively correct* (or who it **thinks**
    might be correct)—only *who argued more persuasively*.
  prefs: []
  type: TYPE_NORMAL
- en: 'Below is an example final verdict from a Deb8flow run on the topic:'
  prefs: []
  type: TYPE_NORMAL
- en: '**“Should governments implement a universal basic income in response to increasing
    automation in the workforce?”**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Langsmith Tracing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Throughout Deb8flow’s development, I relied on **LangSmith** (LangChain’s tracing
    and observability toolkit) to ensure the entire debate pipeline was behaving correctly.
    Because we have multiple agents passing control between themselves, it’s easy
    for unexpected loops or misrouted states to occur. **LangSmith** provides a convenient
    way to:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Visualize Execution Flow:** You can see each agent’s prompt, t**he tokens
    consumed** (so you can also track costs), and any intermediate states. This makes
    it much simpler to confirm that, say, the Con Debater is properly referencing
    the Pro Debater’s last message, or that the Fact Checker is accurately receiving
    the claim to verify.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Debug State Updates:** If the Moderator or Fact Check Router is sending the
    flow to the wrong node, the trace will highlight that mismatch. You can trace
    which agent was invoked at each step and why, helping you spot stage or speaker
    misalignments early.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Track Prompt and Completion Tokens:** With multiple GPT-4o calls, it’s useful
    to see how many tokens each stage is using, which LangSmith logs automatically
    if you enable tracing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Integrating **LangSmith** is unexpectedly easy. You will just need to provide
    these 3 keys in your .env file: `LANGCHAIN_API_KEY`'
  prefs: []
  type: TYPE_NORMAL
- en: '`LANGCHAIN_TRACING_V2`'
  prefs: []
  type: TYPE_NORMAL
- en: '`LANGCHAIN_PROJECT`'
  prefs: []
  type: TYPE_NORMAL
- en: 'Then you can open the LangSmith UI to see a structured trace of each run. This
    greatly reduces the guesswork involved in debugging multi-agent systems and is,
    in my experience, essential for more **complex AI orchestration** like ours. Example
    of a single run:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/aa77994c725d3caf36ba2c02eaaa3b15.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The trace in waterfall mode in Lansmith of one run, showing how the whole flow
    ran. Source: Generated by the author using Langsmith.'
  prefs: []
  type: TYPE_NORMAL
- en: Reflections and Next Steps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Building Deb8flow was an eye-opening exercise in orchestrating **autonomous
    agent workflows**. We didn’t just chain a single model call – we created an entiredebate
    simulation with AI agents, each with a specific role, and allowed them to interact
    according to a set of rules. LangGraph provided a clear framework to define how
    data and control flows between agents, making the complex sequence manageable
    in code. By using class-based agents and a shared state, we maintained modularity
    and clarity, which will pay off for any software engineering project in the long
    run.
  prefs: []
  type: TYPE_NORMAL
- en: An exciting aspect of this project was seeing emergent behavior. Even though
    each agent follows a script (a prompt), the unscripted combination – a debater
    trying to deceive, a fact-checker catching it, the debater rephrasing – felt surprisingly
    realistic! It’s a small step toward more **agentic AI systems** that can perform
    non-trivial multi-step tasks with oversight on each other.
  prefs: []
  type: TYPE_NORMAL
- en: 'There’s plenty of ideas for improvement:'
  prefs: []
  type: TYPE_NORMAL
- en: '**User Interaction:** Currently it’s fully autonomous, but one could add a
    mode where a human provides the topic or even takes the role of one side against
    an AI opponent.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can switch the order in which the Debaters talk.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can change the prompts, and thus to a good degree the behavior of the agents,
    and experiment with different prompts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make the debaters also perform web search before producing their statements,
    thus providing them with the latest information.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The broader implication of Deb8flow is how it showcases a pattern for **composable
    AI agents**. By defining clear boundaries and interactions (just like microservices
    in software), we can have complex AI-driven processes that remain interpretable
    and controllable. Each agent is like a cog in a machine, and LangGraph is the
    gear system making them work in unison.
  prefs: []
  type: TYPE_NORMAL
- en: I found this project energizing, and I hope it inspires you to explore multi-agent
    workflows. Whether it’s debating, collaborating on writing, or solving problems
    from different expert angles, the combination of **GPT**, **tools**, and structured
    **agentic workflows** opens up a new world of possibilities for AI development.
    Happy hacking!
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
