- en: Finally, we have derived the formulas for β₁ and β₂.
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们推导出了 β₁ 和 β₂ 的公式。
- en: '* * *'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Let us compute β₀, β₁ and β₂ for our sample dataset, but before that let’s understand
    what centering actually means.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们计算样本数据集的 β₀、β₁ 和 β₂，但在那之前，让我们了解中心化实际上意味着什么。
- en: 'We start with a small dataset of 3 observations and 2 features:'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从一个包含3个观测值和2个特征的简单数据集开始：
- en: \[
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{array}{|c|c|c|c|}
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{array}{|c|c|c|c|}
- en: \hline
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: \hline
- en: \text{i} & x_{i1} & x_{i2} & y_i \\
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: \text{i} & x_{i1} & x_{i2} & y_i \\
- en: \hline
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: \hline
- en: 1 & 2 & 3 & 10 \\
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 1 & 2 & 3 & 10 \\
- en: 2 & 4 & 5 & 14 \\
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 2 & 4 & 5 & 14 \\
- en: 3 & 6 & 7 & 18 \\
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 3 & 6 & 7 & 18 \\
- en: \hline
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: \hline
- en: \end{array}
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: \end{array}
- en: \]
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Step 1: Compute means'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：计算均值
- en: \[
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \bar{x}_1 = \frac{2 + 4 + 6}{3} = 4, \quad
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: \bar{x}_1 = \frac{2 + 4 + 6}{3} = 4, \quad
- en: \bar{x}_2 = \frac{3 + 5 + 7}{3} = 5, \quad
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: \bar{x}_2 = \frac{3 + 5 + 7}{3} = 5, \quad
- en: \bar{y} = \frac{10 + 14 + 18}{3} = 14
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: \bar{y} = \frac{10 + 14 + 18}{3} = 14
- en: \]
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Step 2: Center the data (subtract the mean)'
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：对数据进行中心化（减去均值）
- en: \[
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: x’_{i1} = x_{i1} – \bar{x}_1, \quad
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: x’_{i1} = x_{i1} – \bar{x}_1, \quad
- en: x’_{i2} = x_{i2} – \bar{x}_2, \quad
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: x’_{i2} = x_{i2} – \bar{x}_2, \quad
- en: y’_i = y_i – \bar{y}
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: y’_i = y_i – \bar{y}
- en: \]
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{array}{|c|c|c|c|}
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{array}{|c|c|c|c|}
- en: \hline
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: \hline
- en: \text{i} & x’_{i1} & x’_{i2} & y’_i \\
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: \text{i} & x’_{i1} & x’_{i2} & y’_i \\
- en: \hline
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: \hline
- en: 1 & -2 & -2 & -4 \\
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 1 & -2 & -2 & -4 \\
- en: 2 & 0 & 0 & 0 \\
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 2 & 0 & 0 & 0 \\
- en: 3 & +2 & +2 & +4 \\
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 3 & +2 & +2 & +4 \\
- en: \hline
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: \hline
- en: \end{array}
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: \end{array}
- en: \]
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Now check the sums:'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 现在检查求和：
- en: \[
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum x’_{i1} = -2 + 0 + 2 = 0, \quad
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x’_{i1} = -2 + 0 + 2 = 0, \quad
- en: \sum x’_{i2} = -2 + 0 + 2 = 0, \quad
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x’_{i2} = -2 + 0 + 2 = 0, \quad
- en: \sum y’_i = -4 + 0 + 4 = 0
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: \sum y’_i = -4 + 0 + 4 = 0
- en: \]
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Step 3: Understand what centering does to certain terms'
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：理解中心化对某些项的影响
- en: 'In the normal equations, we see terms like:'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 在正规方程中，我们看到像这样的项：
- en: \[
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum x_{i1} y_i – \frac{ \sum x_{i1} \sum y_i }{n}
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i1} y_i – \frac{ \sum x_{i1} \sum y_i }{n}
- en: \]
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'If the data are centered:'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 如果数据已经中心化：
- en: \[
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum x_{i1} = 0, \quad \sum y_i = 0 \quad \Rightarrow \quad \frac{0 \cdot 0}{n}
    = 0
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i1} = 0, \quad \sum y_i = 0 \quad \Rightarrow \quad \frac{0 \cdot 0}{n}
    = 0
- en: \]
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'So the term becomes:'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 所以这个项变成了：
- en: \[
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum x_{i1} y_i
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i1} y_i
- en: \]
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'And if we directly use the centered values:'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们直接使用中心化值：
- en: \[
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum x’_{i1} y’_i
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x’_{i1} y’_i
- en: \]
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'These are equivalent:'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 'These are equivalent:'
- en: \[
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum (x_{i1} – \bar{x}_1)(y_i – \bar{y}) = \sum x_{i1} y_i – \frac{ \sum x_{i1}
    \sum y_i }{n}
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: \sum (x_{i1} – \bar{x}_1)(y_i – \bar{y}) = \sum x_{i1} y_i – \frac{ \sum x_{i1}
    \sum y_i }{n}
- en: \]
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Step 4: Compare raw and centered calculation'
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：比较原始值和中心化计算
- en: 'Using original values:'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 使用原始值：
- en: \[
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum x_{i1} y_i = (2)(10) + (4)(14) + (6)(18) = 184
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i1} y_i = (2)(10) + (4)(14) + (6)(18) = 184
- en: \]
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum x_{i1} = 12, \quad \sum y_i = 42, \quad n = 3
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i1} = 12, \quad \sum y_i = 42, \quad n = 3
- en: \]
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \frac{12 \cdot 42}{3} = 168
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{12 \cdot 42}{3} = 168
- en: \]
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum x_{i1} y_i – \frac{ \sum x_{i1} \sum y_i }{n} = 184 – 168 = 16
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i1} y_i – \frac{ \sum x_{i1} \sum y_i }{n} = 184 – 168 = 16
- en: \]
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Now using centered values:'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 现在使用中心化值：
- en: \[
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum x’_{i1} y’_i = (-2)(-4) + (0)(0) + (2)(4) = 8 + 0 + 8 = 16
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x’_{i1} y’_i = (-2)(-4) + (0)(0) + (2)(4) = 8 + 0 + 8 = 16
- en: \]
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: Same result.
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的结果。
- en: 'Step 5: Why we center'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：为什么我们要中心化
- en: – Simplifies the formulas by removing extra terms
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: – Simplifies the formulas by removing extra terms
- en: – Ensures mean of all variables is zero
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: – Ensures mean of all variables is zero
- en: – Improves numerical stability
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: – Improves numerical stability
- en: '– Makes intercept easier to calculate:'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: '– Makes intercept easier to calculate:'
- en: \[
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \beta_0 = \bar{y} – \beta_1 \bar{x}_1 – \beta_2 \bar{x}_2
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_0 = \bar{y} – \beta_1 \bar{x}_1 – \beta_2 \bar{x}_2
- en: \]
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Step 6:'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 第6步：
- en: 'After centering, we can directly use:'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 中心化后，我们可以直接使用：
- en: \[
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum (x’_{i1})(y’_i), \quad
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: \sum (x’_{i1})(y’_i), \quad
- en: \sum (x’_{i2})(y’_i), \quad
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: \sum (x’_{i2})(y’_i), \quad
- en: \sum {(x’_{i1})}^2, \quad
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: \sum {(x’_{i1})}^2, \quad
- en: \sum {(x’_{i2})}^2, \quad
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: \sum {(x’_{i2})}^2, \quad
- en: \sum (x’_{i1})(x’_{i2})
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: \sum (x’_{i1})(x’_{i2})
- en: \]
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: And the simplified formulas for \( \beta_1 \) and \( \beta_2 \) become easier
    to compute.
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: \( \beta_1 \) 和 \( \beta_2 \) 的简化公式更容易计算。
- en: This is how we derived the formulas for β₀, β₁ and β₂.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何推导出 β₀、β₁ 和 β₂ 的公式的。
- en: \[
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \beta_1 =
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_1 =
- en: \frac{
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{
- en: \left( \sum x_{i2}^2 \right)\left( \sum x_{i1} y_i \right)
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i2}^2 \right)\left( \sum x_{i1} y_i \right)
- en: –
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: –
- en: \left( \sum x_{i1} x_{i2} \right)\left( \sum x_{i2} y_i \right)
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1} x_{i2} \right)\left( \sum x_{i2} y_i \right)
- en: '}{'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: '}{'
- en: \left( \sum x_{i1}^2 \right)\left( \sum x_{i2}^2 \right)
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}^2 \right)\left( \sum x_{i2}^2 \right)
- en: –
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: –
- en: \left( \sum x_{i1} x_{i2} \right)^2
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}^2 \right)\left( \sum x_{i2}^2 \right)
- en: '}'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: \]
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \beta_2 =
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_2 =
- en: \frac{
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{
- en: \left( \sum x_{i1}^2 \right)\left( \sum x_{i2} y_i \right)
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}^2 \right)\left( \sum x_{i2} y_i \right)
- en: –
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: –
- en: \left( \sum x_{i1} x_{i2} \right)\left( \sum x_{i1} y_i \right)
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1} x_{i2} \right)\left( \sum x_{i1} y_i \right)
- en: '}{'
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: '}{'
- en: \left( \sum x_{i1}^2 \right)\left( \sum x_{i2}^2 \right)
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}^2 \right)\left( \sum x_{i2}^2 \right)
- en: –
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: –
- en: \left( \sum x_{i1} x_{i2} \right)^2
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1} x_{i2} \right)^2
- en: '}'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: \]
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \beta_0 = \bar{y}
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_0 = \bar{y}
- en: \quad \text{(since the data is centered)}
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: \quad \text{(since the data is centered)}
- en: \]
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Note: After centering, we continue using the same symbols \( x_{i1}, x_{i2},
    y_i \) to represent the centered variables.'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：中心化后，我们继续使用相同的符号 \( x_{i1}, x_{i2}, y_i \) 来表示中心化变量。
- en: '* * *'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now, let’s compute β₀, β₁ and β₂ for our sample dataset.
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们计算样本数据集的 β₀、β₁ 和 β₂。
- en: 'Step 1: Compute Means (Original Data)'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：计算均值（原始数据）
- en: $$
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \bar{x}_1 = \frac{1}{n} \sum x_{i1} = 13.841, \quad
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: \bar{x}_1 = \frac{1}{n} \sum x_{i1} = 13.841, \quad
- en: \bar{x}_2 = \frac{1}{n} \sum x_{i2} = 4.9385, \quad
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: \bar{x}_2 = \frac{1}{n} \sum x_{i2} = 4.9385, \quad
- en: \bar{y} = \frac{1}{n} \sum y_i = 481.5
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: \bar{y} = \frac{1}{n} \sum y_i = 481.5
- en: $$
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: 'Step 2: Center the Data'
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：中心化数据
- en: $$
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: x’_{i1} = x_{i1} – \bar{x}_1, \quad
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: x’_{i1} = x_{i1} – \bar{x}_1, \quad
- en: x’_{i2} = x_{i2} – \bar{x}_2, \quad
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: x’_{i2} = x_{i2} – \bar{x}_2, \quad
- en: y’_i = y_i – \bar{y}
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: y’_i = y_i – \bar{y}
- en: $$
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: 'Step 3: Compute Centered Summations'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：计算中心化求和
- en: $$
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \sum x’_{i1} y’_i = 2465.60, \quad
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x’_{i1} y’_i = 2465.60, \quad
- en: \sum x’_{i2} y’_i = 816.57
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x’_{i2} y’_i = 816.57
- en: $$
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: $$
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \sum (x’_{i1})^2 = 24.3876, \quad
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: \sum (x’_{i1})^2 = 24.3876, \quad
- en: \sum (x’_{i2})^2 = 3.4531, \quad
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: \sum (x’_{i2})^2 = 3.4531, \quad
- en: \sum x’_{i1} x’_{i2} = 6.8238
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x’_{i1} x’_{i2} = 6.8238
- en: $$
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: 'Step 4: Compute Shared Denominator'
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：计算共同分母
- en: $$
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \Delta = (24.3876)(3.4531) – (6.8238)^2 = 37.6470
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: \Delta = (24.3876)(3.4531) – (6.8238)^2 = 37.6470
- en: $$
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: 'Step 5: Compute Slopes'
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：计算斜率
- en: $$
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \beta_1 =
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_1 =
- en: \frac{
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{
- en: (3.4531)(2465.60) – (6.8238)(816.57)
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: (3.4531)(2465.60) – (6.8238)(816.57)
- en: '}{'
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: '}{'
- en: '37.6470'
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: '37.6470'
- en: '}'
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: '='
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: '='
- en: \frac{2940.99}{37.6470}
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{2940.99}{37.6470}
- en: = 78.14
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: = 78.14
- en: $$
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: $$
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \beta_2 =
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_2 =
- en: \frac{
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{
- en: (24.3876)(816.57) – (6.8238)(2465.60)
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: (24.3876)(816.57) – (6.8238)(2465.60)
- en: '}{'
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: '}{'
- en: '37.6470'
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: '37.6470'
- en: '}'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: '='
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: '='
- en: \frac{3089.79}{37.6470}
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{3089.79}{37.6470}
- en: = 82.06
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: = 82.06
- en: $$
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: 'Note: While the slopes were computed using centered variables, the final model
    uses the original variables.'
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：虽然斜率是使用中心化变量计算的，但最终模型使用的是原始变量。
- en: 'So, compute the intercept using:'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，使用以下方法计算截距：
- en: $$
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \beta_0 = \bar{y} – \beta_1 \bar{x}_1 – \beta_2 \bar{x}_2
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_0 = \bar{y} – \beta_1 \bar{x}_1 – \beta_2 \bar{x}_2
- en: $$
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: 'Step 6: Compute Intercept'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 第6步：计算截距
- en: $$
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \beta_0 = 481.5 – (78.14)(13.841) – (82.06)(4.9385)
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_0 = 481.5 – (78.14)(13.841) – (82.06)(4.9385)
- en: $$
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: $$
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: = 481.5 – 1081.77 – 405.01 = -1005.28
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: = 481.5 – 1081.77 – 405.01 = -1005.28
- en: $$
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: 'Final Regression Equation:'
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 最终回归方程：
- en: $$
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: y_i = -1005.28 + 78.14 \cdot x_{i1} + 82.06 \cdot x_{i2}
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: y_i = -1005.28 + 78.14 \cdot x_{i1} + 82.06 \cdot x_{i2}
- en: $$
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: This is how we get the final slope and intercept values.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何得到最终的斜率和截距值。
- en: '* * *'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Dataset
  id: totrans-736
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集
- en: The dataset used in this blog is the **[Fish Market dataset](https://www.kaggle.com/datasets/vipullrathod/fish-market?select=Fish.csv)**,
    which contains measurements of fish species sold in markets, including attributes
    like weight, height, and width.
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 本博客中使用的数据集是**[鱼市场数据集](https://www.kaggle.com/datasets/vipullrathod/fish-market?select=Fish.csv)**，其中包含在市场上销售的鱼类物种的测量数据，包括重量、高度和宽度等属性。
- en: It is publicly available on Kaggle and is licensed under the [**Creative Commons
    Zero (CC0 Public Domain)**](https://creativecommons.org/publicdomain/zero/1.0/)
    license. This means it can be freely used, modified, and shared for both **non-commercial
    and commercial purposes** without restriction.
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 它在Kaggle上公开发布，并受[**创意共享零（CC0公共领域）**](https://creativecommons.org/publicdomain/zero/1.0/)许可协议的许可。这意味着它可以无限制地免费使用、修改和共享，无论是**非商业用途**还是**商业用途**。
- en: '* * *'
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
