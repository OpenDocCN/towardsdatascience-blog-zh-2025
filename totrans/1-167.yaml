- en: Multiple Linear Regression Explained Simply (Part 1)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 多元线性回归简单解释（第一部分）
- en: 原文：[https://towardsdatascience.com/multiple-linear-regression-math-explained-simply-part-1/](https://towardsdatascience.com/multiple-linear-regression-math-explained-simply-part-1/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/multiple-linear-regression-math-explained-simply-part-1/](https://towardsdatascience.com/multiple-linear-regression-math-explained-simply-part-1/)
- en: In this blog post, we discuss **multiple linear regression**.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我们讨论**多元线性回归**。
- en: <mdspan datatext="el1761024686865" class="mdspan-comment">We all know that</mdspan>
    this is one of the first algorithms to learn in our Machine Learning journey,
    as it is an extension of simple linear regression.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761024686865" class="mdspan-comment">我们都知道</mdspan>这是我们在机器学习旅程中最早学习的算法之一，因为它简单线性回归的扩展。
- en: We know that in simple linear regression we have one independent variable and
    one target variable, and in multiple linear regression we have two or more independent
    variables and one target variable.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道在简单线性回归中，我们有一个自变量和一个目标变量，而在多元线性回归中，我们有两个或更多的自变量和一个目标变量。
- en: Instead of just applying the algorithm using Python, in this blog, **let’s explore
    the math behind the multiple linear regression algorithm.**
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 与仅使用Python应用算法不同，在这篇博客中，**让我们探索多元线性回归算法背后的数学原理**。
- en: Let’s consider the [Fish Market dataset](https://www.kaggle.com/datasets/vipullrathod/fish-market)
    to understand the math behind multiple linear regression.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑[鱼市场数据集](https://www.kaggle.com/datasets/vipullrathod/fish-market)，以了解多元线性回归背后的数学原理。
- en: 'This dataset includes physical attributes of each fish, such as:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这个数据集包括每条鱼的物理属性，例如：
- en: Species – the type of fish (e.g., Bream, Roach, Pike)
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 物种 – 鱼的类型（例如，鲈鱼，鲫鱼，鲑鱼）
- en: Weight – the weight of the fish in grams (this will be our target variable)
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重量 – 鱼的重量（克）（这将是我们的目标变量）
- en: Length1, Length2, Length3 – various length measurements (in cm)
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Length1, Length2, Length3 – 各种长度测量值（单位：厘米）
- en: Height – the height of the fish (in cm)
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高度 – 鱼的高度（单位：厘米）
- en: Width – the diagonal width of the fish body (in cm)
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 宽度 – 鱼体对角线宽度（单位：厘米）
- en: To understand multiple linear regression, we’ll use two independent variables
    to keep it simple and easy to visualize.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解多元线性回归，我们将使用两个自变量来保持简单并易于可视化。
- en: We will consider a 20-point sample from this dataset.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从这个数据集中考虑一个20个点的样本。
- en: '![](../Images/58b52f696d5c506d69dc88d2e88efe12.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/58b52f696d5c506d69dc88d2e88efe12.png)'
- en: Image by Author
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: We considered a 20-point sample from the Fish Market dataset, which includes
    measurements of 20 individual fish, specifically their height and width along
    with the corresponding weight. These three values will help us understand how
    multiple linear regression works in practice.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从鱼市场数据集中考虑了一个20个点的样本，它包括20条鱼的测量值，特别是它们的高度和宽度以及相应的重量。这三个值将帮助我们理解多元线性回归在实际中的应用。
- en: First, let’s use Python to fit a multiple linear regression model on our 20-point
    sample data.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们使用Python在我们的20个点样本数据上拟合一个多元线性回归模型。
- en: '**Code:**'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Results:**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**结果：**'
- en: 'Intercept (β₀): -1005.2810'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 截距（β₀）：-1005.2810
- en: 'Height slope (β₁): 78.1404'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 高度斜率（β₁）：78.1404
- en: 'Width slope (β₂): 82.0572'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 宽度斜率（β₂）：82.0572
- en: Here, we haven’t done a train-test split because it is a small dataset, and
    we are trying to understand the math behind the model but not build the model.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们没有进行训练集和测试集的划分，因为这是一个小数据集，我们试图理解模型背后的数学原理，而不是构建模型。
- en: '* * *'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: We applied multiple linear regression using Python on our sample dataset and
    we got the results.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用Python在我们的样本数据集上应用了多元线性回归，并得到了结果。
- en: What’s the next step?
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是什么？
- en: To evaluate the model to see how good it is at predictions?
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 要评估模型以查看其在预测方面的表现如何？
- en: Not today!
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 今天不！
- en: We are not going to evaluate the model until we understand how we got those
    slope and intercept values in the first place.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们理解最初如何得到那些斜率和截距值之前，我们不会评估模型。
- en: First, we will understand how the model works behind the scenes and then approach
    those slope and intercept values using math.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将了解模型在幕后是如何工作的，然后使用数学方法来处理那些斜率和截距值。
- en: '* * *'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: First, let’s plot our sample data.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们绘制我们的样本数据。
- en: '![](../Images/54fbf8dc7c2a558109483c93187774b6.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/54fbf8dc7c2a558109483c93187774b6.png)'
- en: Image by Author
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: When it comes to simple linear regression, we only have one independent variable,
    and the data is two-dimensional. We try to find the line that best fits the data.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到简单线性回归时，我们只有一个自变量，数据是二维的。我们试图找到最佳拟合数据的线。
- en: In multiple linear regression, we may have two or more independent variables,
    and the data is three-dimensional. We try to find a plane that best fits the data.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在多元线性回归中，我们可能有两个或更多的独立变量，数据是三维的。我们试图找到一个最佳拟合数据的平面。
- en: Here, we considered two independent variables, which means we have to find a
    plane that best fits the data.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们考虑了两个独立变量，这意味着我们必须找到一个最佳拟合数据的平面。
- en: '![](../Images/78381a774bf64758bcd390d3046359ee.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/78381a774bf64758bcd390d3046359ee.png)'
- en: Image by Author
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: 'The Equation of the Plane is:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 平面的方程是：
- en: \[
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: y = \beta_0 + \beta_1 x_1 + \beta_2 x_2
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: y = \beta_0 + \beta_1 x_1 + \beta_2 x_2
- en: \]
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: where
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 其中
- en: '**y**: the predicted value of the dependent (target) variable'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**y**: 因变量（目标变量）的预测值'
- en: '**β₀**: the intercept (the value of y when all x’s are 0)'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**β₀**: 截距（当所有 x 的值为 0 时 y 的值）'
- en: '**β₁**: the coefficient (or slope) for feature x₁'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**β₁**: 特征 x₁ 的系数（或斜率）'
- en: '**β₂**: the coefficient for feature x₂'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**β₂**: 特征 x₂ 的系数'
- en: '**x₁, x₂**: the independent variables (features)'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**x₁, x₂**: 自变量（特征）'
- en: Let’s say we calculated the intercept and slope values, and we want to calculate
    the weight at a particular point ***i***.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们已经计算了截距和斜率值，并想要计算特定点 ***i*** 的权重。
- en: For that, we substitute the respective values, and we call it the predicted
    value, whereas the actual value is in our dataset. We are now calculating the
    predicted value at that point.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，我们代入相应的值，我们称之为预测值，而实际值在我们的数据集中。我们现在正在计算该点的预测值。
- en: Let us denote the predicted value by ****ŷᵢ****.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用 ****ŷᵢ**** 表示预测值。
- en: \[
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \hat{y}_i = \beta_0 + \beta_1 x_{i1} + \beta_2 x_{i2}
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: \hat{y}_i = \beta_0 + \beta_1 x_{i1} + \beta_2 x_{i2}
- en: \]
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '**yᵢ** represents the actual value and **ŷᵢ** represents the predicted value.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**yᵢ** 表示实际值，**ŷᵢ** 表示预测值。'
- en: Now at point ***i***, let’s find the difference between the actual value and
    the predicted value i.e. **Residual**.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在在点 ***i*** 处，让我们找到实际值和预测值之间的差异，即 **残差**。
- en: \[
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \text{Residual}_i = y_i – \hat{y}_i
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: \text{Residual}_i = y_i – \hat{y}_i
- en: \]
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: For **n** data points, the total residual will be
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 **n** 个数据点，总残差将是
- en: \[
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum_{i=1}^{n} (y_i – \hat{y}_i)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: \sum_{i=1}^{n} (y_i – \hat{y}_i)
- en: \]
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: If we calculate just the sum of residuals, the positive and negative errors
    can cancel out, resulting in a misleadingly small total error.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们只计算残差的和，正负误差可能会相互抵消，导致总误差误导性地很小。
- en: Squaring the residuals solves this by ensuring all errors contribute positively,
    while also giving more importance to larger deviations.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 平方残差通过确保所有误差都贡献正数，同时给予较大偏差更多重视来解决此问题。
- en: 'So, we calculate the sum of squared residuals:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们计算残差的平方和：
- en: \[
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \text{SSR} = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: \text{SSR} = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2
- en: \]
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '![](../Images/011a92ab621e27bbf818d22761ce4271.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/011a92ab621e27bbf818d22761ce4271.png)'
- en: Visualizing Residuals in Multiple Linear Regression
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 多元线性回归中的残差可视化
- en: '* * *'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Here in multiple linear regression, the model tries to fit a plane through the
    data such that the sum of squared residuals is minimized.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在多元线性回归中，模型试图通过数据拟合一个平面，使得残差的平方和最小化。
- en: 'We already know the equation of the plane:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经知道了平面的方程：
- en: \[
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \hat{y} = \beta_0 + \beta_1 x_1 + \beta_2 x_2
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: \hat{y} = \beta_0 + \beta_1 x_1 + \beta_2 x_2
- en: \]
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: Now we need to find the equation of the plane that best fits our sample data,
    minimizing the sum of squared residuals.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要找到最佳拟合我们的样本数据的平面方程，最小化残差的平方和。
- en: We already know that **ŷ** is the predicted value and **x1** and **x2** are
    the values from the dataset.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经知道 **ŷ** 是预测值，**x1** 和 **x2** 是数据集中的值。
- en: Now the remaining terms **β₀**, **β₁** and **β₂**.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 现在剩下的项 **β₀**、**β₁** 和 **β₂**。
- en: How can we find these slopes and intercept values?
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何找到这些斜率和截距值？
- en: Before that, let’s see what happens to the plane when we change the intercept
    (β₀).
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之前，让我们看看当我们改变截距（β₀）时，平面会发生什么变化。
- en: '![](../Images/ba51943c0abbf0cfc0cd6e72fd651126.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ba51943c0abbf0cfc0cd6e72fd651126.png)'
- en: GIF by Author
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的GIF
- en: Now, let’s see what happens when we change the slopes β₁ and β₂.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看当我们改变斜率 β₁ 和 β₂ 时会发生什么。
- en: '![](../Images/537553a46dab03ccf8dd4baee0f233e3.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/537553a46dab03ccf8dd4baee0f233e3.png)'
- en: GIF by Author
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的GIF
- en: '![](../Images/05dc432d56078d3eec6c683daca99485.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/05dc432d56078d3eec6c683daca99485.png)'
- en: GIF by Author
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的GIF
- en: We can observe how changing the slopes and intercept affects the regression
    plane.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以观察到斜率和截距的变化如何影响回归平面。
- en: We need to find those exact values of slopes and intercept, where the sum of
    squared residuals is minimum.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要找到那些斜率和截距的确切值，使得残差的平方和最小。
- en: '* * *'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now, we want to find the best fitting plane
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们想要找到最佳拟合平面
- en: \[
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \hat{y} = \beta_0 + \beta_1 x_1 + \beta_2 x_2
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: \hat{y} = \beta_0 + \beta_1 x_1 + \beta_2 x_2
- en: \]
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'that minimizes the **Sum of Squared Residuals (SSR)**:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 那个最小化**平方和残差（SSR）**：
- en: \[
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: SSR = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2 = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1
    x_{i1} – \beta_2 x_{i2})^2
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: SSR = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2 = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1
    x_{i1} – \beta_2 x_{i2})^2
- en: \]
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: where
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 其中
- en: \[
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \hat{y}_i = \beta_0 + \beta_1 x_{i1} + \beta_2 x_{i2}
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: \hat{y}_i = \beta_0 + \beta_1 x_{i1} + \beta_2 x_{i2}
- en: \]
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '* * *'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: How can we find this equation of best fitting plane?
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何找到这个最佳拟合平面的方程？
- en: Before proceeding further, let’s go back to our school days.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在进一步讨论之前，让我们回到我们的学校时代。
- en: I used to wonder why we needed to learn topics like differentiation, integration,
    and limits. Do we really use them in real life?
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾经 wonder 为什么我们需要学习像微分、积分和极限这样的主题。我们在现实生活中真的使用它们吗？
- en: I thought that way because I found these topics difficult to understand. But
    when it came to relatively simpler topics like matrices (at least to some extent),
    I never questioned why we were learning them or what their use was.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我之所以那样想，是因为我发现这些主题很难理解。但是，当涉及到相对简单的主题，比如矩阵（至少在一定程度上），我从未质疑过我们为什么要学习它们或它们有什么用途。
- en: It was when I began learning about Machine Learning that I started focusing
    on these topics.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 正是在我开始学习机器学习的时候，我开始关注这些话题。
- en: '* * *'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now coming back to the discussion, let’s consider a straight line.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 现在回到讨论中，让我们考虑一条直线。
- en: y = 2x+1
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: y = 2x+1
- en: '![](../Images/538d804c51c98c80c9f9f4e07733016f.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/538d804c51c98c80c9f9f4e07733016f.png)'
- en: Image by Author
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: Let’s plot these values
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们绘制这些值
- en: '![](../Images/7065c04ef4817f44e7489d889cfc9e51.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7065c04ef4817f44e7489d889cfc9e51.png)'
- en: Image by Author
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: Let’s consider two points on the straight line.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑直线上的两个点。
- en: (x1, y1) = (2,3) and (x2, y2) = (3,5)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: (x1, y1) = (2,3) 和 (x2, y2) = (3,5)
- en: Now we find the slope.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们找到斜率。
- en: \[
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: m = \frac{y_2 – y_1}{x_2 – x_1} = \frac{\text{change in } y}{\text{change in
    } x}
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: m = \frac{y_2 – y_1}{x_2 – x_1} = \frac{\text{y的变化量}}{\text{x的变化量}}
- en: \]
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: m = \frac{y_2 – y_1}{x_2 – x_1} = \frac{5 – 3}{3 – 2} = \frac{2}{1} = 2
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: m = \frac{y_2 – y_1}{x_2 – x_1} = \frac{5 – 3}{3 – 2} = \frac{2}{1} = 2
- en: \]
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The slope is ‘2’.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 斜率是‘2’。
- en: If we consider any two points and calculate the slope, the value remains the
    same, which means the change in y with respect to the change in x is the same
    throughout the line.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们考虑任何两个点并计算斜率，这个值将保持不变，这意味着y相对于x的变化量在整个线上是相同的。
- en: '* * *'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now, let’s consider the equation y=x².
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们考虑方程y=x²。
- en: '![](../Images/8ccfaee329677cca27678328ae513dad.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8ccfaee329677cca27678328ae513dad.png)'
- en: Image by Author
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: let’s plot these values
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们绘制这些值
- en: '![](../Images/1391d17c96d85baf730d00ae6e336a84.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1391d17c96d85baf730d00ae6e336a84.png)'
- en: Image by Author
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: y=x² represents a curve (parabola).
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: y=x²代表一个曲线（抛物线）。
- en: What’s the slope of this curve?
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这条曲线的斜率是多少？
- en: Do we have a single slope for this curve?
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这条曲线有一个单一的斜率吗？
- en: NO.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: NO.
- en: We can observe that the slope changes continuously, meaning the rate of change
    in y with respect to x is not the same throughout the curve.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以观察到斜率是连续变化的，这意味着y相对于x的变化率在整个曲线上并不相同。
- en: This shows that the slope changes from one point on the curve to another.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明斜率从曲线上的一个点变化到另一个点。
- en: In other words, we can find the slope at each specific point, but there isn’t
    one single slope that represents the entire curve.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，我们可以在每个特定的点上找到斜率，但并没有一个单一的斜率能代表整个曲线。
- en: So, how do we find the slope of this curve?
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何找到这条曲线的斜率呢？
- en: This is where we introduce **Differentiation.**
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们要引入**微分**的地方。
- en: First, let’s consider a point x on the x-axis and another point that is at a
    distance h from it, i.e., the point x+h.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们考虑x轴上的一个点x，以及距离它h个单位的另一个点，即点x+h。
- en: The corresponding y-coordinates for these x-values would be f(x) and f(x+h),
    since y is a function of x.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这些x值，相应的y坐标将是f(x)和f(x+h)，因为y是x的函数。
- en: Now we considered two points on the curve (x, f(x)) and (x+h, f(x+h)).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们考虑曲线上的两个点 (x, f(x)) 和 (x+h, f(x+h))。
- en: Now we join those two points and the line which joins the two points on a curve
    is called Secant Line.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们连接这两个点，连接曲线上两个点的线称为割线。
- en: Let’s find the slope between those two points.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们找到这两点之间的斜率。
- en: \[
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \text{slope} = \frac{f(x + h) – f(x)}{(x + h) – x}
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: \text{slope} = \frac{f(x + h) – f(x)}{(x + h) – x}
- en: \]
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: This gives us the average rate of change of ‘y’ with respect to ‘x’ over that
    interval.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 这给出了在该区间内y相对于x的平均变化率。
- en: But since we want to find the slope **at a particular point**, we gradually
    decrease the distance ‘h’ between the two points.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 但由于我们想要找到**特定点**的斜率，我们逐渐减小两点之间的距离‘h’。
- en: As these two points come closer and eventually coincide, the **secant line**
    (which joins the two points) becomes a **tangent line** to the curve at that point.
    This limiting value of the slope can be found using the concept of **limits**.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 当这两个点越来越近，最终重合时，**割线**（连接这两个点的线）成为该点的**切线**。这个斜率的极限值可以通过极限的概念找到。
- en: A **tangent line** is a straight line that just touches a curve at one single
    point.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '**切线**是仅在一个点上接触曲线的直线。'
- en: It shows the **instantaneous slope** of the curve at that point.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 它显示了该点的**瞬时斜率**。
- en: \[
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \frac{dy}{dx} = \lim_{h \to 0} \frac{f(x + h) – f(x)}{h}
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{dy}{dx} = \lim_{h \to 0} \frac{f(x + h) – f(x)}{h}
- en: \]
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '![](../Images/59a1246154d33d3e6f4a251ce0a9bdff.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/59a1246154d33d3e6f4a251ce0a9bdff.png)'
- en: Image by Author
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图像
- en: '![](../Images/94a39650d91f38a705a0bd19393302aa.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/94a39650d91f38a705a0bd19393302aa.png)'
- en: GIF by Author
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的GIF
- en: This is the concept of differentiation.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是微分学的概念。
- en: Now let’s find the slope of the curve y=x².
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们找到曲线y=x²的斜率。
- en: \[
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '\text{Given: } f(x) = x^2'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 已知：f(x) = x^2
- en: \]
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '\text{Derivative: } f''(x) = \lim_{h \to 0} \frac{f(x + h) – f(x)}{h}'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 导数：f'(x) = \lim_{h \to 0} \frac{f(x + h) – f(x)}{h}
- en: \] \[
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: = \lim_{h \to 0} \frac{(x + h)^2 – x^2}{h}
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: = \lim_{h \to 0} \frac{(x + h)^2 – x^2}{h}
- en: \] \[
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: = \lim_{h \to 0} \frac{x^2 + 2xh + h^2 – x^2}{h}
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: = \lim_{h \to 0} \frac{x^2 + 2xh + h^2 – x^2}{h}
- en: \] \[
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: = \lim_{h \to 0} \frac{2xh + h^2}{h}
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: = \lim_{h \to 0} \frac{2xh + h^2}{h}
- en: \] \[
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: = \lim_{h \to 0} (2x + h)
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: = \lim_{h \to 0} (2x + h)
- en: \] \[
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: = 2x
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: = 2x
- en: \]
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '**2x** is the slope of the curve y=x².'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '**2x**是曲线y=x²的斜率。'
- en: For example, for x=2 on the curve y=x², the slope is 2x=2×2=4.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在曲线y=x²上，当x=2时，斜率是2x=2×2=4。
- en: At this point, we have the coordinate (2,4) on the curve, and the slope at that
    point is 4.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我们在曲线上有坐标(2,4)，该点的斜率是4。
- en: This means that **at that exact point**, for every 1 unit change in x, there
    is a 4 unit change in y.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着在**那个确切点**，对于x的每1个单位变化，y会有4个单位的变化。
- en: Now consider at x=0, the slope is 2×0 = 0.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 现在考虑x=0时，斜率是2×0=0。
- en: Which means there is no change in y with respect to x.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着y相对于x没有变化。
- en: then y = 0.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: then y = 0.
- en: At point (0,0) we get the slope 0, which means (0,0) is the minimum point.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 在点(0,0)我们得到斜率为0，这意味着(0,0)是极小点。
- en: Now that we’ve understood the basics of differentiation, let’s proceed to find
    the best-fitted plane.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了微分的基本知识，让我们继续寻找最佳拟合平面。
- en: '* * *'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now, let’s go back to the cost function
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们回到成本函数
- en: \[
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: SSR = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2 = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1
    x_{i1} – \beta_2 x_{i2})^2
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: SSR = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2 = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1
    x_{i1} – \beta_2 x_{i2})^2
- en: \]
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: This also represents a **curve**, since it contains squared terms.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这也代表了一个**曲线**，因为它包含了平方项。
- en: 'In simple linear regression the cost function is:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 在简单线性回归中，成本函数是：
- en: \[
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: SSR = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2 = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1
    x_i)^2
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: SSR = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2 = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1
    x_i)^2
- en: \]
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: When we consider random slope and intercept values and plot them, we can see
    a bowl-shaped curve.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们考虑随机的斜率和截距值并绘制它们时，我们可以看到一个碗形的曲线。
- en: '![](../Images/3640a39af8829a9e82020aaa291f35cc.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3640a39af8829a9e82020aaa291f35cc.png)'
- en: Image by Author
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图像
- en: '* * *'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: In the same way as in simple linear regression, we need to find the point where
    the slope equals zero, which means the point at which we get the minimum value
    of the Sum of Squared Residuals (SSR).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 与简单线性回归相同，我们需要找到斜率等于零的点，这意味着我们得到了平方残差和（SSR）的最小值。
- en: Here, this corresponds to finding the values of β₀, β₁, and β₂ where the SSR
    is minimum. This happens when the derivatives of SSR with respect to each coefficient
    are equal to zero.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，这对应于找到β₀、β₁和β₂的值，使得SSR最小。这发生在SSR相对于每个系数的导数等于零时。
- en: In other words, at this point, there is no change in SSR even with a slight
    change in β₀, β₁ or β₂, indicating that we have reached the minimum point of the
    cost function.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，在这个点上，即使β₀、β₁或β₂有轻微的变化，SSR也不会改变，这表明我们已经达到了成本函数的最小点。
- en: '* * *'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: In simple words, we can say that in our example of y=x², we got the derivative
    (slope) 2x=0 at x=0, and at that point, y is minimum, which in this case is zero.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，我们可以说，在我们的例子y=x²中，我们在x=0时得到了导数（斜率）2x=0，在该点，y是最小的，在这种情况下是零。
- en: Now, in our loss function, let’s say SSR=y. Here, we are finding the slope of
    the loss function at the point where the slope becomes zero.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在我们的损失函数中，假设 SSR=y。在这里，我们正在寻找损失函数斜率为零的点处的斜率。
- en: 'In the y=x² example, the slope depends on only one variable x, but in our loss
    function, the slope depends on three variables: β0, β1​ and β2​.'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 在 y=x² 的例子中，斜率只依赖于一个变量 x，但在我们的损失函数中，斜率依赖于三个变量：β0、β1 和 β2。
- en: So, we need to find the point in a four-dimensional space. Just like we got
    (0,0) as the minimum point for y=x², in MLR we need to find the point (β0,β1,β2,SSR)
    where the slope (derivative) equals zero.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们需要在四维空间中找到一个点。就像我们在 y=x² 中得到了 (0,0) 作为最小点，在多元线性回归 (MLR) 中，我们需要找到点 (β0,β1,β2,SSR)，其中斜率（导数）等于零。
- en: '* * *'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now let’s proceed with the derivation.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们开始推导。
- en: Since the Sum of Squared Residuals (SSR) depends on the parameters β₀, β₁ and
    β₂.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 由于平方残差和 (SSR) 依赖于参数 β₀、β₁ 和 β₂。
- en: 'we can represent it as a **function of these parameters**:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将其表示为这些参数的**函数**：
- en: \[
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: L(\beta_0, \beta_1, \beta_2) = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1 x_{i1}
    – \beta_2 x_{i2})^2
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: L(\beta_0, \beta_1, \beta_2) = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1 x_{i1}
    – \beta_2 x_{i2})^2
- en: \]
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '**Derivation:**'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '**推导：**'
- en: Here, we are working with three variables, so we cannot use regular differentiation.
    Instead, we differentiate each variable separately while keeping the others constant.
    This process is called **Partial Differentiation**.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，我们处理三个变量，因此不能使用常规的微分。相反，我们分别对每个变量求导，同时保持其他变量不变。这个过程称为**偏导数**。
- en: '**Partial Differentiation** **w.r.t β₀**'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: '**对 β₀ 的偏导数**'
- en: \[
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \textbf{Loss:}\quad L(\beta_0,\beta_1,\beta_2)=\sum_{i=1}^{n}\big(y_i-\beta_0-\beta_1
    x_{i1}-\beta_2 x_{i2}\big)^2
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: \textbf{损失：}\quad L(\beta_0,\beta_1,\beta_2)=\sum_{i=1}^{n}\big(y_i-\beta_0-\beta_1
    x_{i1}-\beta_2 x_{i2}\big)^2
- en: \]
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \textbf{Let } e_i = y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\quad\Rightarrow\quad
    L=\sum e_i^2.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: \textbf{令 } e_i = y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\quad\Rightarrow\quad
    L=\sum e_i^2.
- en: \] \[
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \textbf{Differentiate:}\quad
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: \textbf{求导：}\quad
- en: \frac{\partial L}{\partial \beta_0}
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\partial L}{\partial \beta_0}
- en: = \sum_{i=1}^{n} 2 e_i \cdot \frac{\partial e_i}{\partial \beta_0}
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: = \sum_{i=1}^{n} 2 e_i \cdot \frac{\partial e_i}{\partial \beta_0}
- en: '\quad\text{(chain rule: } \frac{d}{d\theta}u^2=2u\,\frac{du}{d\theta}\text{)}'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: \quad\text{(链式法则：} \frac{d}{d\theta}u^2=2u\,\frac{du}{d\theta}\text{)}
- en: \] \[
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \text{But }\frac{\partial e_i}{\partial \beta_0}
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: \text{但是 }\frac{\partial e_i}{\partial \beta_0}
- en: =\frac{\partial}{\partial \beta_0}(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2})
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: =\frac{\partial}{\partial \beta_0}(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2})
- en: =\frac{\partial y_i}{\partial \beta_0}
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: =\frac{\partial y_i}{\partial \beta_0}
- en: -\frac{\partial \beta_0}{\partial \beta_0}
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: -\frac{\partial \beta_0}{\partial \beta_0}
- en: -\frac{\partial (\beta_1 x_{i1})}{\partial \beta_0}
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: -\frac{\partial (\beta_1 x_{i1})}{\partial \beta_0}
- en: -\frac{\partial (\beta_2 x_{i2})}{\partial \beta_0}.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: -\frac{\partial (\beta_2 x_{i2})}{\partial \beta_0}.
- en: \] \[
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \text{Since } y_i,\; x_{i1},\; x_{i2} \text{ are constants w.r.t. } \beta_0,\;
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: \text{由于 } y_i,\; x_{i1},\; x_{i2} \text{ 相对于 } \beta_0 \text{ 是常数；}
- en: \text{their derivatives are zero. Hence } \frac{\partial e_i}{\partial \beta_0}=-1.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: \text{它们的导数都是零。因此 } \frac{\partial e_i}{\partial \beta_0}=-1.
- en: \] \[
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \Rightarrow\quad \frac{\partial L}{\partial \beta_0}
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: \Rightarrow\quad \frac{\partial L}{\partial \beta_0}
- en: = \sum 2 e_i \cdot (-1) = -2\sum_{i=1}^{n} e_i.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: = \sum 2 e_i \cdot (-1) = -2\sum_{i=1}^{n} e_i.
- en: \] \[
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \textbf{Set to zero (first-order condition):}\quad
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: \textbf{设为零（一阶条件）：}\quad
- en: \frac{\partial L}{\partial \beta_0}=0 \;\Rightarrow\; \sum_{i=1}^{n} e_i = 0.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\partial L}{\partial \beta_0}=0 \;\Rightarrow\; \sum_{i=1}^{n} e_i = 0.
- en: \] \[
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \textbf{Expand } e_i:\quad
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: \textbf{展开 } e_i:\quad
- en: \sum_{i=1}^{n}\big(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\big)=0
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: \sum_{i=1}^{n}\big(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\big)=0
- en: \Rightarrow
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: \Rightarrow
- en: \sum y_i – n\beta_0 – \beta_1\sum x_{i1} – \beta_2\sum x_{i2}=0.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: \sum y_i – n\beta_0 – \beta_1\sum x_{i1} – \beta_2\sum x_{i2}=0.
- en: \] \[
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \textbf{Solve for } \beta_0:\quad
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: \textbf{求解 } \beta_0:\quad
- en: \beta_0=\bar{y}-\beta_1 \bar{x}_1-\beta_2 \bar{x}_2
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_0=\bar{y}-\beta_1 \bar{x}_1-\beta_2 \bar{x}_2
- en: \quad\text{(divide by }n\text{ and use } \bar{y}=\frac{1}{n}\sum y_i,\; \bar{x}_k=\frac{1}{n}\sum
    x_{ik}).
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: \quad\text{(除以 }n\text{ 并使用 } \bar{y}=\frac{1}{n}\sum y_i,\; \bar{x}_k=\frac{1}{n}\sum
    x_{ik}).
- en: \]
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '* * *'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Partial Differentiation** **w.r.t β**1'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: '**对 β1 的偏导数**'
- en: \[
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \textbf{Differentiate:}\quad
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: \textbf{求导：}\quad
- en: \frac{\partial L}{\partial \beta_1}
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\partial L}{\partial \beta_1}
- en: = \sum_{i=1}^{n} 2 e_i \cdot \frac{\partial e_i}{\partial \beta_1}.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: = \sum_{i=1}^{n} 2 e_i \cdot \frac{\partial e_i}{\partial \beta_1}.
- en: \]
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \text{Here }\frac{\partial e_i}{\partial \beta_1}
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: \text{这里 }\frac{\partial e_i}{\partial \beta_1}
- en: =\frac{\partial}{\partial \beta_1}(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2})=-x_{i1}.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: =\frac{\partial}{\partial \beta_1}(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2})=-x_{i1}.
- en: \] \[
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \Rightarrow\quad
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: \Rightarrow\quad
- en: \frac{\partial L}{\partial \beta_1}
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\partial L}{\partial \beta_1}
- en: = \sum 2 e_i (-x_{i1})
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: = \sum 2 e_i (-x_{i1})
- en: = -2\sum_{i=1}^{n} x_{i1} e_i.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: = -2\sum_{i=1}^{n} x_{i1} e_i.
- en: \] \[
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \textbf{Set to zero:}\quad
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: '**设为零：**\quad'
- en: \frac{\partial L}{\partial \beta_1}=0
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\partial L}{\partial \beta_1}=0
- en: \;\Rightarrow\; \sum_{i=1}^{n} x_{i1} e_i = 0.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: \;\Rightarrow\; \sum_{i=1}^{n} x_{i1} e_i = 0.
- en: \] \[
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \textbf{Expand } e_i:\quad
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: \textbf{展开 } e_i:\quad
- en: \sum x_{i1}\big(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\big)=0
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i1}\big(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\big)=0
- en: \] \[
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \Rightarrow\;
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: \Rightarrow\;
- en: \sum x_{i1}y_i – \beta_0\sum x_{i1} – \beta_1\sum x_{i1}^2 – \beta_2\sum x_{i1}x_{i2}=0.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i1}y_i – \beta_0\sum x_{i1} – \beta_1\sum x_{i1}^2 – \beta_2\sum x_{i1}x_{i2}=0.
- en: \]
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '* * *'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Partial Differentiation** **w.r.t β2**'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于 β2 的偏导数** **求导**'
- en: \[
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \textbf{Differentiate:}\quad
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: \textbf{求导：}\quad
- en: \frac{\partial L}{\partial \beta_2}
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\partial L}{\partial \beta_2}
- en: = \sum_{i=1}^{n} 2 e_i \cdot \frac{\partial e_i}{\partial \beta_2}.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: = \sum_{i=1}^{n} 2 e_i \cdot \frac{\partial e_i}{\partial \beta_2}.
- en: \]
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \text{Here }\frac{\partial e_i}{\partial \beta_2}
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: \text{这里 }\frac{\partial e_i}{\partial \beta_2}
- en: =\frac{\partial}{\partial \beta_2}(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2})=-x_{i2}.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: =\frac{\partial}{\partial \beta_2}(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2})=-x_{i2}.
- en: \] \[
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \Rightarrow\quad
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: \Rightarrow\quad
- en: \frac{\partial L}{\partial \beta_2}
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\partial L}{\partial \beta_2}
- en: = \sum 2 e_i (-x_{i2})
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: = \sum 2 e_i (-x_{i2})
- en: = -2\sum_{i=1}^{n} x_{i2} e_i.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: = -2\sum_{i=1}^{n} x_{i2} e_i.
- en: \] \[
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \textbf{Set to zero:}\quad
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: \textbf{设为零：}\quad
- en: \frac{\partial L}{\partial \beta_2}=0
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{\partial L}{\partial \beta_2}=0
- en: \;\Rightarrow\; \sum_{i=1}^{n} x_{i2} e_i = 0.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: \;\Rightarrow\; \sum_{i=1}^{n} x_{i2} e_i = 0.
- en: \] \[
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \textbf{Expand } e_i:\quad
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: \textbf{展开 } e_i:\quad
- en: \sum x_{i2}\big(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\big)=0
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i2}\big(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\big)=0
- en: \] \[
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \Rightarrow\;
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: \Rightarrow\;
- en: \sum x_{i2}y_i – \beta_0\sum x_{i2} – \beta_1\sum x_{i1}x_{i2} – \beta_2\sum
    x_{i2}^2=0.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i2}y_i – \beta_0\sum x_{i2} – \beta_1\sum x_{i1}x_{i2} – \beta_2\sum
    x_{i2}^2=0.
- en: \]
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '* * *'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: We obtained these three equations after performing partial differentiation.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在执行偏导数运算后得到了这三个方程。
- en: \[
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum y_i – n\beta_0 – \beta_1\sum x_{i1} – \beta_2\sum x_{i2} = 0 \quad (1)
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: \sum y_i – n\beta_0 – \beta_1\sum x_{i1} – \beta_2\sum x_{i2} = 0 \quad (1)
- en: \]
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum x_{i1}y_i – \beta_0\sum x_{i1} – \beta_1\sum x_{i1}^2 – \beta_2\sum x_{i1}x_{i2}
    = 0 \quad (2)
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i1}y_i – \beta_0\sum x_{i1} – \beta_1\sum x_{i1}^2 – \beta_2\sum x_{i1}x_{i2}
    = 0 \quad (2)
- en: \] \[
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: \sum x_{i2}y_i – \beta_0\sum x_{i2} – \beta_1\sum x_{i1}x_{i2} – \beta_2\sum
    x_{i2}^2 = 0 \quad (3)
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: \sum x_{i2}y_i – \beta_0\sum x_{i2} – \beta_1\sum x_{i1}x_{i2} – \beta_2\sum
    x_{i2}^2 = 0 \quad (3)
- en: \]
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: Now we solve these three equations to get the values of β₀, β₁ and β₂.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们解这三个方程以得到 β₀、β₁ 和 β₂ 的值。
- en: 'From equation (1):'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 从方程 (1)：
- en: \[
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \sum y_i – n\beta_0 – \beta_1\sum x_{i1} – \beta_2\sum x_{i2} = 0
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: \sum y_i – n\beta_0 – \beta_1\sum x_{i1} – \beta_2\sum x_{i2} = 0
- en: \]
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Rearranged:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 重新排列：
- en: \[
  id: totrans-332
  prefs: []
