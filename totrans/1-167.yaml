  prefs: []
  type: TYPE_NORMAL
  zh: \( B = \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \)
- en: \( D = \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \)
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: \( D = \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \)
- en: \( C = \sum x_{i1}y_i – \frac{(\sum x_{i1})(\sum y_i)}{n} \)
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: \( C = \sum x_{i1}y_i – \frac{(\sum x_{i1})(\sum y_i)}{n} \)
- en: \( E = \sum x_{i2}y_i – \frac{(\sum x_{i2})(\sum y_i)}{n} \)
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: \( E = \sum x_{i2}y_i – \frac{(\sum x_{i2})(\sum y_i)}{n} \)
- en: 'Now, rewrite the system:'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，重新写这个系统：
- en: \[
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{cases}
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{cases}
- en: \beta_1 A + \beta_2 B = C \\
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_1 A + \beta_2 B = C \\
- en: \beta_1 B + \beta_2 D = E
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_1 B + \beta_2 D = E
- en: \end{cases}
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: \end{cases}
- en: \]
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: We solve this 2×2 system using Cramer’s Rule.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用克莱姆法则解这个2×2系统。
- en: 'First, compute the determinant:'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，计算行列式：
- en: \[
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \Delta = AD – B^2
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: \Delta = AD – B^2
- en: \]
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Then apply Cramer’s Rule:'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 然后应用克莱姆法则：
- en: \[
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \beta_1 = \frac{CD – BE}{AD – B^2}, \qquad
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_1 = \frac{CD – BE}{AD – B^2}, \qquad
- en: \beta_2 = \frac{AE – BC}{AD – B^2}
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_2 = \frac{AE – BC}{AD – B^2}
- en: \]
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Now substitute back the original summation terms:'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将原始求和项代入：
- en: \[
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \beta_1 =
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_1 =
- en: \frac{
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{
- en: \left( \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \right)
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \right)
- en: \left( \sum x_{i1}y_i – \frac{(\sum x_{i1})(\sum y_i)}{n} \right)
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}y_i – \frac{(\sum x_{i1})(\sum y_i)}{n} \right)
- en: –
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: –
- en: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)
- en: \left( \sum x_{i2}y_i – \frac{(\sum x_{i2})(\sum y_i)}{n} \right)
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)
- en: '}{'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: '}{'
- en: \left[
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: \left[
- en: \left( \sum x_{i1}^2 – \frac{(\sum x_{i1})^2}{n} \right)
