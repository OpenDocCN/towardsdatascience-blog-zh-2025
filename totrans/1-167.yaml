  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)^2
- en: \right]
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: \right]
- en: '}'
  id: totrans-512
