  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: –
- en: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)^2
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)^2
- en: \right]
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: \right]
- en: '}'
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: \]
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \beta_2 =
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_2 =
- en: \frac{
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{
- en: \left( \sum x_{i1}^2 – \frac{(\sum x_{i1})^2}{n} \right)
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}^2 – \frac{(\sum x_{i1})^2}{n} \right)
- en: \left( \sum x_{i2}y_i – \frac{(\sum x_{i2})(\sum y_i)}{n} \right)
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i2}y_i – \frac{(\sum x_{i2})(\sum y_i)}{n} \right)
- en: –
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: –
- en: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)
- en: \left( \sum x_{i1}y_i – \frac{(\sum x_{i1})(\sum y_i)}{n} \right)
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}y_i – \frac{(\sum x_{i1})(\sum y_i)}{n} \right)
- en: '}{'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: '}{'
- en: \left[
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: \left[
- en: \left( \sum x_{i1}^2 – \frac{(\sum x_{i1})^2}{n} \right)
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i1}^2 – \frac{(\sum x_{i1})^2}{n} \right)
- en: \left( \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \right)
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \right)
- en: –
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: –
