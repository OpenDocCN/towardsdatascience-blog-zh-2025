  zh: \left( \sum x_{i1}^2 – \frac{(\sum x_{i1})^2}{n} \right)
- en: \left( \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \right)
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: \left( \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \right)
