- en: Multiple Linear Regression Explained Simply (Part 1)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/multiple-linear-regression-math-explained-simply-part-1/](https://towardsdatascience.com/multiple-linear-regression-math-explained-simply-part-1/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In this blog post, we discuss **multiple linear regression**.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: <mdspan datatext="el1761024686865" class="mdspan-comment">We all know that</mdspan>
    this is one of the first algorithms to learn in our Machine Learning journey,
    as it is an extension of simple linear regression.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: We know that in simple linear regression we have one independent variable and
    one target variable, and in multiple linear regression we have two or more independent
    variables and one target variable.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Instead of just applying the algorithm using Python, in this blog, **let’s explore
    the math behind the multiple linear regression algorithm.**
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider the [Fish Market dataset](https://www.kaggle.com/datasets/vipullrathod/fish-market)
    to understand the math behind multiple linear regression.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: 'This dataset includes physical attributes of each fish, such as:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Species – the type of fish (e.g., Bream, Roach, Pike)
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Weight – the weight of the fish in grams (this will be our target variable)
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Length1, Length2, Length3 – various length measurements (in cm)
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Height – the height of the fish (in cm)
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Width – the diagonal width of the fish body (in cm)
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To understand multiple linear regression, we’ll use two independent variables
    to keep it simple and easy to visualize.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: We will consider a 20-point sample from this dataset.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/58b52f696d5c506d69dc88d2e88efe12.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: We considered a 20-point sample from the Fish Market dataset, which includes
    measurements of 20 individual fish, specifically their height and width along
    with the corresponding weight. These three values will help us understand how
    multiple linear regression works in practice.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s use Python to fit a multiple linear regression model on our 20-point
    sample data.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '**Code:**'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Results:**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: 'Intercept (β₀): -1005.2810'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: 'Height slope (β₁): 78.1404'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: 'Width slope (β₂): 82.0572'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Here, we haven’t done a train-test split because it is a small dataset, and
    we are trying to understand the math behind the model but not build the model.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: We applied multiple linear regression using Python on our sample dataset and
    we got the results.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: What’s the next step?
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: To evaluate the model to see how good it is at predictions?
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Not today!
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: We are not going to evaluate the model until we understand how we got those
    slope and intercept values in the first place.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: First, we will understand how the model works behind the scenes and then approach
    those slope and intercept values using math.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s plot our sample data.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/54fbf8dc7c2a558109483c93187774b6.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to simple linear regression, we only have one independent variable,
    and the data is two-dimensional. We try to find the line that best fits the data.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: In multiple linear regression, we may have two or more independent variables,
    and the data is three-dimensional. We try to find a plane that best fits the data.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Here, we considered two independent variables, which means we have to find a
    plane that best fits the data.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/78381a774bf64758bcd390d3046359ee.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: 'The Equation of the Plane is:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: y = \beta_0 + \beta_1 x_1 + \beta_2 x_2
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: where
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '**y**: the predicted value of the dependent (target) variable'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '**β₀**: the intercept (the value of y when all x’s are 0)'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '**β₁**: the coefficient (or slope) for feature x₁'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '**β₂**: the coefficient for feature x₂'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '**x₁, x₂**: the independent variables (features)'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Let’s say we calculated the intercept and slope values, and we want to calculate
    the weight at a particular point ***i***.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: For that, we substitute the respective values, and we call it the predicted
    value, whereas the actual value is in our dataset. We are now calculating the
    predicted value at that point.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Let us denote the predicted value by ****ŷᵢ****.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: \hat{y}_i = \beta_0 + \beta_1 x_{i1} + \beta_2 x_{i2}
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '**yᵢ** represents the actual value and **ŷᵢ** represents the predicted value.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: Now at point ***i***, let’s find the difference between the actual value and
    the predicted value i.e. **Residual**.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: \text{Residual}_i = y_i – \hat{y}_i
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: For **n** data points, the total residual will be
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: \sum_{i=1}^{n} (y_i – \hat{y}_i)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: If we calculate just the sum of residuals, the positive and negative errors
    can cancel out, resulting in a misleadingly small total error.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: Squaring the residuals solves this by ensuring all errors contribute positively,
    while also giving more importance to larger deviations.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: 'So, we calculate the sum of squared residuals:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: \text{SSR} = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/011a92ab621e27bbf818d22761ce4271.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
- en: Visualizing Residuals in Multiple Linear Regression
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Here in multiple linear regression, the model tries to fit a plane through the
    data such that the sum of squared residuals is minimized.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: 'We already know the equation of the plane:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: \hat{y} = \beta_0 + \beta_1 x_1 + \beta_2 x_2
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Now we need to find the equation of the plane that best fits our sample data,
    minimizing the sum of squared residuals.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: We already know that **ŷ** is the predicted value and **x1** and **x2** are
    the values from the dataset.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: Now the remaining terms **β₀**, **β₁** and **β₂**.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: How can we find these slopes and intercept values?
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: Before that, let’s see what happens to the plane when we change the intercept
    (β₀).
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ba51943c0abbf0cfc0cd6e72fd651126.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
- en: GIF by Author
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s see what happens when we change the slopes β₁ and β₂.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/537553a46dab03ccf8dd4baee0f233e3.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
- en: GIF by Author
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/05dc432d56078d3eec6c683daca99485.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
- en: GIF by Author
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: We can observe how changing the slopes and intercept affects the regression
    plane.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: We need to find those exact values of slopes and intercept, where the sum of
    squared residuals is minimum.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: Now, we want to find the best fitting plane
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: \hat{y} = \beta_0 + \beta_1 x_1 + \beta_2 x_2
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: 'that minimizes the **Sum of Squared Residuals (SSR)**:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: SSR = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2 = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1
    x_{i1} – \beta_2 x_{i2})^2
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: where
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: \hat{y}_i = \beta_0 + \beta_1 x_{i1} + \beta_2 x_{i2}
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: How can we find this equation of best fitting plane?
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: Before proceeding further, let’s go back to our school days.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: I used to wonder why we needed to learn topics like differentiation, integration,
    and limits. Do we really use them in real life?
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: I thought that way because I found these topics difficult to understand. But
    when it came to relatively simpler topics like matrices (at least to some extent),
    I never questioned why we were learning them or what their use was.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: It was when I began learning about Machine Learning that I started focusing
    on these topics.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: Now coming back to the discussion, let’s consider a straight line.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: y = 2x+1
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/538d804c51c98c80c9f9f4e07733016f.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: Let’s plot these values
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7065c04ef4817f44e7489d889cfc9e51.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider two points on the straight line.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: (x1, y1) = (2,3) and (x2, y2) = (3,5)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: Now we find the slope.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: m = \frac{y_2 – y_1}{x_2 – x_1} = \frac{\text{change in } y}{\text{change in
    } x}
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: m = \frac{y_2 – y_1}{x_2 – x_1} = \frac{5 – 3}{3 – 2} = \frac{2}{1} = 2
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: The slope is ‘2’.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: If we consider any two points and calculate the slope, the value remains the
    same, which means the change in y with respect to the change in x is the same
    throughout the line.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s consider the equation y=x².
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8ccfaee329677cca27678328ae513dad.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: let’s plot these values
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1391d17c96d85baf730d00ae6e336a84.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: y=x² represents a curve (parabola).
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: What’s the slope of this curve?
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: Do we have a single slope for this curve?
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: NO.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: We can observe that the slope changes continuously, meaning the rate of change
    in y with respect to x is not the same throughout the curve.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: This shows that the slope changes from one point on the curve to another.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: In other words, we can find the slope at each specific point, but there isn’t
    one single slope that represents the entire curve.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: So, how do we find the slope of this curve?
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: This is where we introduce **Differentiation.**
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s consider a point x on the x-axis and another point that is at a
    distance h from it, i.e., the point x+h.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: The corresponding y-coordinates for these x-values would be f(x) and f(x+h),
    since y is a function of x.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: Now we considered two points on the curve (x, f(x)) and (x+h, f(x+h)).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: Now we join those two points and the line which joins the two points on a curve
    is called Secant Line.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: Let’s find the slope between those two points.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: \text{slope} = \frac{f(x + h) – f(x)}{(x + h) – x}
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: This gives us the average rate of change of ‘y’ with respect to ‘x’ over that
    interval.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: But since we want to find the slope **at a particular point**, we gradually
    decrease the distance ‘h’ between the two points.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: As these two points come closer and eventually coincide, the **secant line**
    (which joins the two points) becomes a **tangent line** to the curve at that point.
    This limiting value of the slope can be found using the concept of **limits**.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: A **tangent line** is a straight line that just touches a curve at one single
    point.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: It shows the **instantaneous slope** of the curve at that point.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: \frac{dy}{dx} = \lim_{h \to 0} \frac{f(x + h) – f(x)}{h}
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/59a1246154d33d3e6f4a251ce0a9bdff.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/94a39650d91f38a705a0bd19393302aa.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
- en: GIF by Author
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: This is the concept of differentiation.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s find the slope of the curve y=x².
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: '\text{Given: } f(x) = x^2'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: '\text{Derivative: } f''(x) = \lim_{h \to 0} \frac{f(x + h) – f(x)}{h}'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: = \lim_{h \to 0} \frac{(x + h)^2 – x^2}{h}
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: = \lim_{h \to 0} \frac{x^2 + 2xh + h^2 – x^2}{h}
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: = \lim_{h \to 0} \frac{2xh + h^2}{h}
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: = \lim_{h \to 0} (2x + h)
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: = 2x
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: '**2x** is the slope of the curve y=x².'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: For example, for x=2 on the curve y=x², the slope is 2x=2×2=4.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: At this point, we have the coordinate (2,4) on the curve, and the slope at that
    point is 4.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: This means that **at that exact point**, for every 1 unit change in x, there
    is a 4 unit change in y.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: Now consider at x=0, the slope is 2×0 = 0.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: Which means there is no change in y with respect to x.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: then y = 0.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: At point (0,0) we get the slope 0, which means (0,0) is the minimum point.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve understood the basics of differentiation, let’s proceed to find
    the best-fitted plane.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s go back to the cost function
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: SSR = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2 = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1
    x_{i1} – \beta_2 x_{i2})^2
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
- en: This also represents a **curve**, since it contains squared terms.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: 'In simple linear regression the cost function is:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
- en: SSR = \sum_{i=1}^{n} (y_i – \hat{y}_i)^2 = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1
    x_i)^2
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: When we consider random slope and intercept values and plot them, we can see
    a bowl-shaped curve.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3640a39af8829a9e82020aaa291f35cc.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
- en: In the same way as in simple linear regression, we need to find the point where
    the slope equals zero, which means the point at which we get the minimum value
    of the Sum of Squared Residuals (SSR).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
- en: Here, this corresponds to finding the values of β₀, β₁, and β₂ where the SSR
    is minimum. This happens when the derivatives of SSR with respect to each coefficient
    are equal to zero.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: In other words, at this point, there is no change in SSR even with a slight
    change in β₀, β₁ or β₂, indicating that we have reached the minimum point of the
    cost function.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
- en: In simple words, we can say that in our example of y=x², we got the derivative
    (slope) 2x=0 at x=0, and at that point, y is minimum, which in this case is zero.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: Now, in our loss function, let’s say SSR=y. Here, we are finding the slope of
    the loss function at the point where the slope becomes zero.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
- en: 'In the y=x² example, the slope depends on only one variable x, but in our loss
    function, the slope depends on three variables: β0, β1​ and β2​.'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
- en: So, we need to find the point in a four-dimensional space. Just like we got
    (0,0) as the minimum point for y=x², in MLR we need to find the point (β0,β1,β2,SSR)
    where the slope (derivative) equals zero.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s proceed with the derivation.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
- en: Since the Sum of Squared Residuals (SSR) depends on the parameters β₀, β₁ and
    β₂.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
- en: 'we can represent it as a **function of these parameters**:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: L(\beta_0, \beta_1, \beta_2) = \sum_{i=1}^{n} (y_i – \beta_0 – \beta_1 x_{i1}
    – \beta_2 x_{i2})^2
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
- en: '**Derivation:**'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
- en: Here, we are working with three variables, so we cannot use regular differentiation.
    Instead, we differentiate each variable separately while keeping the others constant.
    This process is called **Partial Differentiation**.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: '**Partial Differentiation** **w.r.t β₀**'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Loss:}\quad L(\beta_0,\beta_1,\beta_2)=\sum_{i=1}^{n}\big(y_i-\beta_0-\beta_1
    x_{i1}-\beta_2 x_{i2}\big)^2
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Let } e_i = y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\quad\Rightarrow\quad
    L=\sum e_i^2.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Differentiate:}\quad
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
- en: \frac{\partial L}{\partial \beta_0}
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: = \sum_{i=1}^{n} 2 e_i \cdot \frac{\partial e_i}{\partial \beta_0}
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
- en: '\quad\text{(chain rule: } \frac{d}{d\theta}u^2=2u\,\frac{du}{d\theta}\text{)}'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: \text{But }\frac{\partial e_i}{\partial \beta_0}
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: =\frac{\partial}{\partial \beta_0}(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2})
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: =\frac{\partial y_i}{\partial \beta_0}
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: -\frac{\partial \beta_0}{\partial \beta_0}
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: -\frac{\partial (\beta_1 x_{i1})}{\partial \beta_0}
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
- en: -\frac{\partial (\beta_2 x_{i2})}{\partial \beta_0}.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
- en: \text{Since } y_i,\; x_{i1},\; x_{i2} \text{ are constants w.r.t. } \beta_0,\;
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: \text{their derivatives are zero. Hence } \frac{\partial e_i}{\partial \beta_0}=-1.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow\quad \frac{\partial L}{\partial \beta_0}
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
- en: = \sum 2 e_i \cdot (-1) = -2\sum_{i=1}^{n} e_i.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Set to zero (first-order condition):}\quad
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
- en: \frac{\partial L}{\partial \beta_0}=0 \;\Rightarrow\; \sum_{i=1}^{n} e_i = 0.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Expand } e_i:\quad
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
- en: \sum_{i=1}^{n}\big(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\big)=0
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
- en: \sum y_i – n\beta_0 – \beta_1\sum x_{i1} – \beta_2\sum x_{i2}=0.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Solve for } \beta_0:\quad
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
- en: \beta_0=\bar{y}-\beta_1 \bar{x}_1-\beta_2 \bar{x}_2
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
- en: \quad\text{(divide by }n\text{ and use } \bar{y}=\frac{1}{n}\sum y_i,\; \bar{x}_k=\frac{1}{n}\sum
    x_{ik}).
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
- en: '**Partial Differentiation** **w.r.t β**1'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Differentiate:}\quad
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
- en: \frac{\partial L}{\partial \beta_1}
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
- en: = \sum_{i=1}^{n} 2 e_i \cdot \frac{\partial e_i}{\partial \beta_1}.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
- en: \text{Here }\frac{\partial e_i}{\partial \beta_1}
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
- en: =\frac{\partial}{\partial \beta_1}(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2})=-x_{i1}.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow\quad
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
- en: \frac{\partial L}{\partial \beta_1}
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
- en: = \sum 2 e_i (-x_{i1})
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
- en: = -2\sum_{i=1}^{n} x_{i1} e_i.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Set to zero:}\quad
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
- en: \frac{\partial L}{\partial \beta_1}=0
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
- en: \;\Rightarrow\; \sum_{i=1}^{n} x_{i1} e_i = 0.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Expand } e_i:\quad
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1}\big(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\big)=0
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow\;
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1}y_i – \beta_0\sum x_{i1} – \beta_1\sum x_{i1}^2 – \beta_2\sum x_{i1}x_{i2}=0.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
- en: '**Partial Differentiation** **w.r.t β2**'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Differentiate:}\quad
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
- en: \frac{\partial L}{\partial \beta_2}
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
- en: = \sum_{i=1}^{n} 2 e_i \cdot \frac{\partial e_i}{\partial \beta_2}.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
- en: \text{Here }\frac{\partial e_i}{\partial \beta_2}
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
- en: =\frac{\partial}{\partial \beta_2}(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2})=-x_{i2}.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow\quad
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
- en: \frac{\partial L}{\partial \beta_2}
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
- en: = \sum 2 e_i (-x_{i2})
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
- en: = -2\sum_{i=1}^{n} x_{i2} e_i.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Set to zero:}\quad
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
- en: \frac{\partial L}{\partial \beta_2}=0
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
- en: \;\Rightarrow\; \sum_{i=1}^{n} x_{i2} e_i = 0.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{Expand } e_i:\quad
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i2}\big(y_i-\beta_0-\beta_1 x_{i1}-\beta_2 x_{i2}\big)=0
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow\;
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i2}y_i – \beta_0\sum x_{i2} – \beta_1\sum x_{i1}x_{i2} – \beta_2\sum
    x_{i2}^2=0.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
- en: We obtained these three equations after performing partial differentiation.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
- en: \sum y_i – n\beta_0 – \beta_1\sum x_{i1} – \beta_2\sum x_{i2} = 0 \quad (1)
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1}y_i – \beta_0\sum x_{i1} – \beta_1\sum x_{i1}^2 – \beta_2\sum x_{i1}x_{i2}
    = 0 \quad (2)
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i2}y_i – \beta_0\sum x_{i2} – \beta_1\sum x_{i1}x_{i2} – \beta_2\sum
    x_{i2}^2 = 0 \quad (3)
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
- en: Now we solve these three equations to get the values of β₀, β₁ and β₂.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
- en: 'From equation (1):'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
- en: \sum y_i – n\beta_0 – \beta_1\sum x_{i1} – \beta_2\sum x_{i2} = 0
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
- en: 'Rearranged:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
- en: n\beta_0 = \sum y_i – \beta_1\sum x_{i1} – \beta_2\sum x_{i2}
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
- en: 'Divide both sides by \( n \):'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
- en: \beta_0 = \frac{1}{n}\sum y_i – \beta_1\frac{1}{n}\sum x_{i1} – \beta_2\frac{1}{n}\sum
    x_{i2}
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
- en: 'Define the averages:'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
- en: \bar{y} = \frac{1}{n}\sum y_i,\quad
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
- en: \bar{x}_1 = \frac{1}{n}\sum x_{i1},\quad
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
- en: \bar{x}_2 = \frac{1}{n}\sum x_{i2}
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
- en: 'Final form for the intercept:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
- en: \beta_0 = \bar{y} – \beta_1\bar{x}_1 – \beta_2\bar{x}_2
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
- en: Let’s substitute ‘β₀’ in equation 2
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Start with Equation (2)'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1}y_i – \beta_0\sum x_{i1} – \beta_1\sum x_{i1}^2 – \beta_2\sum x_{i1}x_{i2}
    = 0
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Substitute the expression for \( \beta_0 \)'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
- en: \beta_0 = \frac{\sum y_i – \beta_1\sum x_{i1} – \beta_2\sum x_{i2}}{n}
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Substitute into Equation (2)'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1}y_i
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
- en: – \left( \frac{\sum y_i – \beta_1\sum x_{i1} – \beta_2\sum x_{i2}}{n} \right)\sum
    x_{i1}
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
- en: – \beta_1 \sum x_{i1}^2
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
- en: – \beta_2 \sum x_{i1}x_{i2} = 0
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Expand and simplify'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1}y_i
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
- en: – \frac{ \sum x_{i1} \sum y_i }{n}
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
- en: + \beta_1 \cdot \frac{ ( \sum x_{i1} )^2 }{n}
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
- en: + \beta_2 \cdot \frac{ \sum x_{i1} \sum x_{i2} }{n}
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
- en: – \beta_1 \sum x_{i1}^2
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
- en: – \beta_2 \sum x_{i1}x_{i2}
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
- en: = 0
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Rearranged form (Equation 4)'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 \left( \sum x_{i1}^2 – \frac{ ( \sum x_{i1} )^2 }{n} \right)
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
- en: +
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
- en: \beta_2 \left( \sum x_{i1}x_{i2} – \frac{ \sum x_{i1} \sum x_{i2} }{n} \right)
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
- en: '='
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1}y_i – \frac{ \sum x_{i1} \sum y_i }{n}
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
- en: \quad \text{(4)}
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
- en: 'Now substituting ‘β₀’ in equation 3:'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Start with Equation (3)'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i2}y_i – \beta_0\sum x_{i2} – \beta_1\sum x_{i1}x_{i2} – \beta_2\sum
    x_{i2}^2 = 0
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Use the expression for \( \beta_0 \)'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
- en: \beta_0 = \frac{\sum y_i – \beta_1\sum x_{i1} – \beta_2\sum x_{i2}}{n}
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Substitute \( \beta_0 \) into Equation (3)'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i2}y_i
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
- en: – \left( \frac{\sum y_i – \beta_1\sum x_{i1} – \beta_2\sum x_{i2}}{n} \right)\sum
    x_{i2}
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
- en: – \beta_1 \sum x_{i1}x_{i2}
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
- en: – \beta_2 \sum x_{i2}^2 = 0
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Expand the expression'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i2}y_i
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
- en: – \frac{ \sum x_{i2} \sum y_i }{n}
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
- en: + \beta_1 \cdot \frac{ \sum x_{i1} \sum x_{i2} }{n}
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
- en: + \beta_2 \cdot \frac{ ( \sum x_{i2} )^2 }{n}
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
- en: – \beta_1 \sum x_{i1}x_{i2}
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
- en: – \beta_2 \sum x_{i2}^2 = 0
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Rearranged form (Equation 5)'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 \left( \sum x_{i1}x_{i2} – \frac{ \sum x_{i1} \sum x_{i2} }{n} \right)
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
- en: +
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
- en: \beta_2 \left( \sum x_{i2}^2 – \frac{ ( \sum x_{i2} )^2 }{n} \right)
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
- en: '='
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i2}y_i – \frac{ \sum x_{i2} \sum y_i }{n}
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
- en: \quad \text{(5)}
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
- en: 'We got these two equations:'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 \left( \sum x_{i1}^2 – \frac{ \left( \sum x_{i1} \right)^2 }{n} \right)
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
- en: +
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
- en: \beta_2 \left( \sum x_{i1}x_{i2} – \frac{ \sum x_{i1} \sum x_{i2} }{n} \right)
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
- en: '='
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1}y_i – \frac{ \sum x_{i1} \sum y_i }{n}
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
- en: \quad \text{(4)}
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 \left( \sum x_{i1}x_{i2} – \frac{ \sum x_{i1} \sum x_{i2} }{n} \right)
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
- en: +
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
- en: \beta_2 \left( \sum x_{i2}^2 – \frac{ \left( \sum x_{i2} \right)^2 }{n} \right)
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
- en: '='
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i2}y_i – \frac{ \sum x_{i2} \sum y_i }{n}
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
- en: \quad \text{(5)}
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
- en: Now, we use Cramer’s rule to get the formulas for β₁ and β₂.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
- en: 'We start from the simplified equations (4) and (5):'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 \left( \sum x_{i1}^2 – \frac{ ( \sum x_{i1} )^2 }{n} \right)
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
- en: +
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
- en: \beta_2 \left( \sum x_{i1}x_{i2} – \frac{ \sum x_{i1} \sum x_{i2} }{n} \right)
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
- en: '='
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1}y_i – \frac{ \sum x_{i1} \sum y_i }{n}
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
- en: \quad \text{(4)}
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 \left( \sum x_{i1}x_{i2} – \frac{ \sum x_{i1} \sum x_{i2} }{n} \right)
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
- en: +
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
- en: \beta_2 \left( \sum x_{i2}^2 – \frac{ ( \sum x_{i2} )^2 }{n} \right)
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
- en: '='
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i2}y_i – \frac{ \sum x_{i2} \sum y_i }{n}
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
- en: \quad \text{(5)}
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us define:'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
- en: \( A = \sum x_{i1}^2 – \frac{(\sum x_{i1})^2}{n} \)
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
- en: \( B = \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \)
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
- en: \( D = \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \)
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
- en: \( C = \sum x_{i1}y_i – \frac{(\sum x_{i1})(\sum y_i)}{n} \)
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
- en: \( E = \sum x_{i2}y_i – \frac{(\sum x_{i2})(\sum y_i)}{n} \)
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, rewrite the system:'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
- en: \begin{cases}
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 A + \beta_2 B = C \\
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 B + \beta_2 D = E
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
- en: \end{cases}
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
- en: We solve this 2×2 system using Cramer’s Rule.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
- en: 'First, compute the determinant:'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
- en: \Delta = AD – B^2
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
- en: 'Then apply Cramer’s Rule:'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 = \frac{CD – BE}{AD – B^2}, \qquad
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
- en: \beta_2 = \frac{AE – BC}{AD – B^2}
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
- en: 'Now substitute back the original summation terms:'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 =
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
- en: \frac{
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \right)
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}y_i – \frac{(\sum x_{i1})(\sum y_i)}{n} \right)
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
- en: –
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i2}y_i – \frac{(\sum x_{i2})(\sum y_i)}{n} \right)
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
- en: '}{'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
- en: \left[
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}^2 – \frac{(\sum x_{i1})^2}{n} \right)
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \right)
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
- en: –
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)^2
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
- en: \right]
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
- en: \beta_2 =
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
- en: \frac{
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}^2 – \frac{(\sum x_{i1})^2}{n} \right)
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i2}y_i – \frac{(\sum x_{i2})(\sum y_i)}{n} \right)
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
- en: –
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}y_i – \frac{(\sum x_{i1})(\sum y_i)}{n} \right)
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
- en: '}{'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
- en: \left[
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}^2 – \frac{(\sum x_{i1})^2}{n} \right)
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i2}^2 – \frac{(\sum x_{i2})^2}{n} \right)
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
- en: –
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}x_{i2} – \frac{(\sum x_{i1})(\sum x_{i2})}{n} \right)^2
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
- en: \right]
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
- en: 'If the data are centered (means are zero), then the second terms vanish and
    we get the simplified form:'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 =
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
- en: \frac{
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
- en: (\sum x_{i2}^2)(\sum x_{i1}y_i)
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
- en: –
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
- en: (\sum x_{i1}x_{i2})(\sum x_{i2}y_i)
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
- en: '}{'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
- en: (\sum x_{i1}^2)(\sum x_{i2}^2) – (\sum x_{i1}x_{i2})^2
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
- en: \beta_2 =
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
- en: \frac{
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
- en: (\sum x_{i1}^2)(\sum x_{i2}y_i)
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
- en: –
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
- en: (\sum x_{i1}x_{i2})(\sum x_{i1}y_i)
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
- en: '}{'
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
- en: (\sum x_{i1}^2)(\sum x_{i2}^2) – (\sum x_{i1}x_{i2})^2
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we have derived the formulas for β₁ and β₂.
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
- en: Let us compute β₀, β₁ and β₂ for our sample dataset, but before that let’s understand
    what centering actually means.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
- en: 'We start with a small dataset of 3 observations and 2 features:'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
- en: \begin{array}{|c|c|c|c|}
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
- en: \hline
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
- en: \text{i} & x_{i1} & x_{i2} & y_i \\
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
- en: \hline
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
- en: 1 & 2 & 3 & 10 \\
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
- en: 2 & 4 & 5 & 14 \\
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
- en: 3 & 6 & 7 & 18 \\
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
- en: \hline
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
- en: \end{array}
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Compute means'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
- en: \bar{x}_1 = \frac{2 + 4 + 6}{3} = 4, \quad
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
- en: \bar{x}_2 = \frac{3 + 5 + 7}{3} = 5, \quad
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
- en: \bar{y} = \frac{10 + 14 + 18}{3} = 14
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Center the data (subtract the mean)'
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
- en: x’_{i1} = x_{i1} – \bar{x}_1, \quad
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
- en: x’_{i2} = x_{i2} – \bar{x}_2, \quad
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
- en: y’_i = y_i – \bar{y}
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
- en: \begin{array}{|c|c|c|c|}
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
- en: \hline
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
- en: \text{i} & x’_{i1} & x’_{i2} & y’_i \\
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
- en: \hline
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
- en: 1 & -2 & -2 & -4 \\
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
- en: 2 & 0 & 0 & 0 \\
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
- en: 3 & +2 & +2 & +4 \\
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
- en: \hline
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
- en: \end{array}
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
- en: 'Now check the sums:'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
- en: \sum x’_{i1} = -2 + 0 + 2 = 0, \quad
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
- en: \sum x’_{i2} = -2 + 0 + 2 = 0, \quad
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
- en: \sum y’_i = -4 + 0 + 4 = 0
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Understand what centering does to certain terms'
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
- en: 'In the normal equations, we see terms like:'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1} y_i – \frac{ \sum x_{i1} \sum y_i }{n}
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
- en: 'If the data are centered:'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1} = 0, \quad \sum y_i = 0 \quad \Rightarrow \quad \frac{0 \cdot 0}{n}
    = 0
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
- en: 'So the term becomes:'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1} y_i
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
- en: 'And if we directly use the centered values:'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
- en: \sum x’_{i1} y’_i
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
- en: 'These are equivalent:'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
- en: \sum (x_{i1} – \bar{x}_1)(y_i – \bar{y}) = \sum x_{i1} y_i – \frac{ \sum x_{i1}
    \sum y_i }{n}
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Compare raw and centered calculation'
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
- en: 'Using original values:'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1} y_i = (2)(10) + (4)(14) + (6)(18) = 184
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1} = 12, \quad \sum y_i = 42, \quad n = 3
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
- en: \frac{12 \cdot 42}{3} = 168
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
- en: \sum x_{i1} y_i – \frac{ \sum x_{i1} \sum y_i }{n} = 184 – 168 = 16
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
- en: 'Now using centered values:'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
- en: \sum x’_{i1} y’_i = (-2)(-4) + (0)(0) + (2)(4) = 8 + 0 + 8 = 16
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
- en: Same result.
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Why we center'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
- en: – Simplifies the formulas by removing extra terms
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
- en: – Ensures mean of all variables is zero
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
- en: – Improves numerical stability
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
- en: '– Makes intercept easier to calculate:'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
- en: \beta_0 = \bar{y} – \beta_1 \bar{x}_1 – \beta_2 \bar{x}_2
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 6:'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
- en: 'After centering, we can directly use:'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
- en: \sum (x’_{i1})(y’_i), \quad
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
- en: \sum (x’_{i2})(y’_i), \quad
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
- en: \sum {(x’_{i1})}^2, \quad
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
- en: \sum {(x’_{i2})}^2, \quad
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
- en: \sum (x’_{i1})(x’_{i2})
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
- en: And the simplified formulas for \( \beta_1 \) and \( \beta_2 \) become easier
    to compute.
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
- en: This is how we derived the formulas for β₀, β₁ and β₂.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 =
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
- en: \frac{
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i2}^2 \right)\left( \sum x_{i1} y_i \right)
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
- en: –
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1} x_{i2} \right)\left( \sum x_{i2} y_i \right)
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
- en: '}{'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}^2 \right)\left( \sum x_{i2}^2 \right)
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
- en: –
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1} x_{i2} \right)^2
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
- en: \beta_2 =
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
- en: \frac{
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}^2 \right)\left( \sum x_{i2} y_i \right)
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
- en: –
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1} x_{i2} \right)\left( \sum x_{i1} y_i \right)
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
- en: '}{'
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1}^2 \right)\left( \sum x_{i2}^2 \right)
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
- en: –
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
- en: \left( \sum x_{i1} x_{i2} \right)^2
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
- en: \[
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
- en: \beta_0 = \bar{y}
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
- en: \quad \text{(since the data is centered)}
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
- en: \]
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: After centering, we continue using the same symbols \( x_{i1}, x_{i2},
    y_i \) to represent the centered variables.'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s compute β₀, β₁ and β₂ for our sample dataset.
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Compute Means (Original Data)'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
- en: \bar{x}_1 = \frac{1}{n} \sum x_{i1} = 13.841, \quad
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
- en: \bar{x}_2 = \frac{1}{n} \sum x_{i2} = 4.9385, \quad
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
- en: \bar{y} = \frac{1}{n} \sum y_i = 481.5
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Center the Data'
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
- en: x’_{i1} = x_{i1} – \bar{x}_1, \quad
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
- en: x’_{i2} = x_{i2} – \bar{x}_2, \quad
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
- en: y’_i = y_i – \bar{y}
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Compute Centered Summations'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
- en: \sum x’_{i1} y’_i = 2465.60, \quad
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
- en: \sum x’_{i2} y’_i = 816.57
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
- en: \sum (x’_{i1})^2 = 24.3876, \quad
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
- en: \sum (x’_{i2})^2 = 3.4531, \quad
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
- en: \sum x’_{i1} x’_{i2} = 6.8238
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Compute Shared Denominator'
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
- en: \Delta = (24.3876)(3.4531) – (6.8238)^2 = 37.6470
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Compute Slopes'
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
- en: \beta_1 =
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
- en: \frac{
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
- en: (3.4531)(2465.60) – (6.8238)(816.57)
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
- en: '}{'
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
- en: '37.6470'
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
- en: '='
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
- en: \frac{2940.99}{37.6470}
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
- en: = 78.14
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
- en: \beta_2 =
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
- en: \frac{
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
- en: (24.3876)(816.57) – (6.8238)(2465.60)
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
- en: '}{'
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
- en: '37.6470'
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
- en: '='
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
- en: \frac{3089.79}{37.6470}
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
- en: = 82.06
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: While the slopes were computed using centered variables, the final model
    uses the original variables.'
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
- en: 'So, compute the intercept using:'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
- en: \beta_0 = \bar{y} – \beta_1 \bar{x}_1 – \beta_2 \bar{x}_2
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 6: Compute Intercept'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
- en: \beta_0 = 481.5 – (78.14)(13.841) – (82.06)(4.9385)
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
- en: = 481.5 – 1081.77 – 405.01 = -1005.28
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
- en: 'Final Regression Equation:'
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
- en: y_i = -1005.28 + 78.14 \cdot x_{i1} + 82.06 \cdot x_{i2}
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
- en: $$
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
- en: This is how we get the final slope and intercept values.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
- en: Dataset
  id: totrans-736
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
