- en: '**Whether you’re new to machine learning or simply interested in understanding
    the math behind multiple linear regression, I hope this blog gave you some clarity.**'
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: '**无论你是机器学习的新手还是仅仅对理解多重线性回归背后的数学感兴趣，我希望这篇博客能给你一些清晰的解释。**'
- en: Stay tuned for Part 2, where we’ll see what changes when more than two predictors
    come into play.
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 请继续关注第二部分，我们将看到当超过两个预测变量起作用时会发生什么变化。
- en: Meanwhile, if you’re interested in how credit scoring models are evaluated,
    my recent blog on the **Gini Coefficient** explains it in simple terms. You can
    read it [here](https://towardsdatascience.com/beyond-roc-auc-and-ks-gini-coefficient-explained-simply/).
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，如果你对如何评估信用评分模型感兴趣，我最近关于**基尼系数**的博客用简单的术语解释了它。你可以在这里阅读它[这里](https://towardsdatascience.com/beyond-roc-auc-and-ks-gini-coefficient-explained-simply/)。
- en: Thanks for reading!
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！
