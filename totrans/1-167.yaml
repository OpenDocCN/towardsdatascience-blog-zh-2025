  zh: '}'
- en: \]
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'If the data are centered (means are zero), then the second terms vanish and
    we get the simplified form:'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 如果数据已经中心化（均值为零），则第二项消失，我们得到简化的形式：
- en: \[
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \beta_1 =
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_1 =
- en: \frac{
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{
- en: (\sum x_{i2}^2)(\sum x_{i1}y_i)
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: (\sum x_{i2}^2)(\sum x_{i1}y_i)
- en: –
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: –
- en: (\sum x_{i1}x_{i2})(\sum x_{i2}y_i)
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: (\sum x_{i1}x_{i2})(\sum x_{i2}y_i)
- en: '}{'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: '}{'
- en: (\sum x_{i1}^2)(\sum x_{i2}^2) – (\sum x_{i1}x_{i2})^2
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: (\sum x_{i2}^2)(\sum x_{i1}y_i)
- en: '}'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: \]
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \beta_2 =
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: \beta_2 =
- en: \frac{
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{
