- en: Let AI Tune Your Voice Assistant
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/let-ai-tune-your-voice-assistant/](https://towardsdatascience.com/let-ai-tune-your-voice-assistant/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1752258354543" class="mdspan-comment">Before we get</mdspan>
    started: The world of voice AI has quite a few overlapping terms. To make sure
    we are all on the same page let’s quickly go over the main terms and how I will
    be using them in this article:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Voice assistant**: The application or “character” the user speaks to. This
    is the complete system from the user’s perspective.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Live API**: The technical “gateway” that connects the user to the model.
    It handles the real-time, bidirectional streaming of audio and data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI Mode**l: The “brain” behind the agent. This is the Large Language Model
    (LLM) that understands intent and decides which action to take.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/611a3b4b4394b248f3f977a51d1fb989.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: With that cleared up, let’s dive in 😃
  prefs: []
  type: TYPE_NORMAL
- en: What is this about?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In the past few months I have noticed a surge of interest in voice assistants.
    Not only with the customers I work with, but the industry as whole: Google Deepmind
    has demonstrated [Project Astra](https://deepmind.google/models/project-astra/)
    at Google I/O, OpenAI has introduced [GPT-4o with advanced voice capability](https://www.youtube.com/watch?v=GiEsyOyk1m4)
    already a while back, and recently ElevenLabs also introduced a similar service
    with [11ai](https://www.youtube.com/watch?v=HOg8jPLTwLI).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Voice assistants are becoming increasingly common, allowing us to perform actions
    in the world just by speaking to them. They fill a gap that so many first generation
    voice assistants like Siri, and Alexa have left wide open: They have a much better
    understanding of natural language, can infer our intents much better, and have
    contextual memory. In short, they are just much easier to talk with.'
  prefs: []
  type: TYPE_NORMAL
- en: The core mechanism that lets them perform actions and makes them truly useful
    is function calling – the ability to use tools like a calendar or weather service.
    However, the assistant’s effectiveness depends entirely on how we instruct its
    underlying AI model on when to use which tool. This is where the **system prompt**
    becomes critical.
  prefs: []
  type: TYPE_NORMAL
- en: In this tutorial, we will explore how we can leverage Automated Prompt Engineering
    (APE) to improve an agent’s function-calling capabilities by automatically refining
    this system prompt. The tutorial is split into two parts.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we will build a robust test suite for our voice assistant. This involves:
    taking a user query, using an LLM to generate multiple semantic variations, and
    finally, converting these text queries into a diverse set of audio files. These
    audio files will be used to interact with the Live API.'
  prefs: []
  type: TYPE_NORMAL
- en: In the second part, we will use APE to iteratively improve the agent’s performance.
    We’ll begin with an initial system prompt and evaluate it against our audio test
    suite by observing which function the agent calls for each audio file. We then
    compare these responses to the ground truth—the expected behavior for that query—to
    calculate an overall accuracy score. This score, along with the prompt that produced
    it, is sent to an “optimiser” LLM. This optimiser then crafts a new, improved
    system prompt based on the performance of all previous attempts, and the process
    begins again.
  prefs: []
  type: TYPE_NORMAL
- en: At the end of this process, we will (hopefully) have a new system prompt that
    instructs the AI model far more effectively on when to use each function.
  prefs: []
  type: TYPE_NORMAL
- en: 'As always all the code is freely available in a Github repo: [https://github.com/heiko-hotz/voice-assistant-prompt-optimization/](https://github.com/heiko-hotz/voice-assistant-prompt-optimization/)'
  prefs: []
  type: TYPE_NORMAL
- en: Why should we care?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we get into the age of voice assistants powered by LLMs, it’s crucial to
    make sure these agents actually behave the way we want them to. Imagine we asked
    an agent to check our calendar, only for it to call a weather API and tell us
    the weather. It’s an extreme example, but hopefully, it brings home the point.
  prefs: []
  type: TYPE_NORMAL
- en: This was already a headache with chatbots, but with voice assistants, things
    get way more complicated. Audio is inherently messier than a clean, written query.
    Think about all the ways a user can prompt the underlying AI model—with different
    accents or dialects, talking fast or slow, throwing in fillers like ‘uhm’ and
    ‘ah’, or with a noisy coffee shop in the background.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/10dd131224603f78cf4123c09ccd88aa.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author – created with ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: 'And this additional dimension is causing a real problem. When I work with organisations
    I often see them struggle with this added complexity and they often  revert back
    to the only method they feel they can trust: manual testing. This means teams
    of people sitting in a room, reading from scripts to simulate real-world conditions.
    It’s not only incredibly time-consuming and expensive, but it’s also not very
    effective.'
  prefs: []
  type: TYPE_NORMAL
- en: This is where automation becomes essential. If we want our agents to have even
    the slightest chance of getting complex tasks right, we have to get the basics
    right, and we have to do it systematically. This blog post is all about an approach
    that automates the entire evaluation and optimization pipeline for voice assistants—a
    method designed to **save development time**, **cut testing costs**, and **build
    a more reliable voice assistant** that users will actually trust and keep using.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Quick recap: The principles of Automated Prompt Engineering (APE)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Luckily, I have already written about [Automated Prompt Engineering](https://towardsdatascience.com/automated-prompt-engineering-the-definitive-hands-on-guide-1476c8cd3c50/)
    in the past, and so I can shamelessly refer back to my older blog post 😏
  prefs: []
  type: TYPE_NORMAL
- en: 'We will use the same exact principle of OPRO ([Optimisation by PROmpting](https://arxiv.org/pdf/2309.03409))
    in this project as well. But to quickly recap:'
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s a bit like hyperparameter optimisation (HPO) in the good old days of supervised
    machine learning: manually trying out different learning rates and batch sizes
    was suboptimal and just not practical. The same is true for manual prompt engineering.
    The challenge, however, is that a prompt is text-based and therefore its optimisation
    space is huge (just imagine in how many different ways we could rephrase one prompt).
    In contrast, traditional ML hyperparameters are numerical, making it straightforward
    to programmatically select values for them.'
  prefs: []
  type: TYPE_NORMAL
- en: So, how do we automate the generation of text prompts? What if we had a tool
    that never gets tired, capable of generating countless prompts in various styles
    while continuously iterating on them? We would need a tool proficient in language
    understanding and generation – and what tool really excels at language? That’s
    right, a Large Language Model (LLM) 😃
  prefs: []
  type: TYPE_NORMAL
- en: 'But we just don’t want it to try out different prompts randomly, we actually
    want it to learn from previous iterations. This is at the heart of the OPRO strategy:
    If random prompt generation is analogous to random search in HPO, OPRO is analogous
    to Bayesian search. It doesn’t just guess randomly; it actively tries to hill-climb
    against the evaluation metric by learning from past results.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9ad23e4ef54b42a51bc0a262c8adea3f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: The key to OPRO is the meta-prompt (number 8 in the diagram above), which is
    used to guide the “optimiser” LLM. This meta-prompt includes not only the task
    description but also the optimisation trajectory—a history of all the previous
    prompts and their performance scores. With this information, the optimiser LLM
    can analyse patterns, identify the elements of successful prompts, and avoid the
    pitfalls of unsuccessful ones. This learning process allows the optimiser to generate
    increasingly more effective prompts over time, iteratively improving the target
    LLM’s performance.
  prefs: []
  type: TYPE_NORMAL
- en: Our project structure
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before we start diving deeper into the entire process I think it is worth our
    while to have a quick look at our project structure to get a good overview:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Let’s get started and walk through the individual components in detail.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Starting Point: Defining Our Test Cases'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before we can start optimizing, we first need to define what “good” looks like.
    The entire process begins by creating our “exam paper” and its corresponding answer
    key. We do this in a single configuration file: configs/input_queries.json.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Inside this file, we define a list of test scenarios. For each scenario, we
    need to provide two key pieces of information: the user’s initial query and the
    expected outcome—the ground truth. This can be a function call with its name and
    its corresponding parameters or no function call.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a look at the structure for a couple of examples:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: As we can see, each entry specifies the query, whether a function should be
    triggered, and the expected function_name and function_args. The Evaluator will
    later use this ground truth to grade the assistant’s performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'The quality of these “seed” queries is important for the whole optimization
    process. Here are a few principles we should keep in mind:'
  prefs: []
  type: TYPE_NORMAL
- en: We Need to Cover All Our Bases
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'It’s easy to only test the obvious ways a user might talk to our agent. But
    a good test suite needs to cover everything. This means we should include queries
    that:'
  prefs: []
  type: TYPE_NORMAL
- en: Trigger every single function the agent can use.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Trigger every possible argument or reason for a function (e.g., we should test
    both human-request and vulnerable-user reasons for the escalate_to_support function).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Trigger no function at all. Cases like “Thanks, that’s all” are super important.
    They teach the model when not to do something, so it doesn’t make annoying or
    wrong function calls when it shouldn’t.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We Should Embrace Ambiguity and Edge Cases
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This is where things get interesting, and where most models fail. Our starting
    queries need to have some of the weird, unclear phrasings that people actually
    use. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Direct vs. Indirect: We should have a direct command like “I need to speak
    to a human” right next to something indirect like “Can I talk to someone?”. At
    first, the model probably might only get the direct one. The APE process will
    make it learn that both mean the same thing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Subtle Nuance: For the vulnerable-user case, a query like “I’m feeling really
    overwhelmed” might be a much harder test than something obvious. It forces the
    model to pick up on emotion, not just look for keywords.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By putting these hard problems in our starting set, we’re telling the APE system,
    “Hey, focus on fixing these things.” The workflow will then just keep trying until
    it finds a prompt that can actually deal with them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Part 1: Building the Test Suite'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Alright, let’s pop the hood and look at how we can generate the test suite.
    The main script for this part is 01_prepare_test_suite.py which builds our “exam.”
    It’s a two-step process: first, we generate a few text variations for the initial
    user queries we provided, and then we turn them into realistic audio files.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Rephrasing Queries with an LLM'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Everything kicks off by reading our “seed” queries from `input_queries.json`
    which we saw above. We start with about 10 of these, covering all the different
    functions and scenarios we care about. But as discussed – we don’t want to only
    test these 10 examples, we want to create many different variations so to make
    sure that the voice assistant gets it right no matter how the user asks for a
    specific action.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, for each of these 10 queries, we ask a “rephraser” LLM to come up with
    five different ways of saying the same thing (this number is configurable). We
    don’t just want five boring copies; we need variety. The system prompt we use
    to guide the LLM for this process is pretty simple but effective:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'This whole process is kicked off by our 01_prepare_test_suite.py script. It
    reads our input_queries.json file, runs the rephrasing, and generates an intermediate
    file called output_queries.json that looks something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Notice how each original_query now has a list of restatements. This is great
    because it gives us a much wider set of test cases. We’re not just testing one
    way of asking for a human; we’re testing six (the original query and five variations),
    from the very direct “Get me a human” to the more polite “Could I please speak
    with a human representative?”.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we have all these text variations, we’re ready for the next step:
    turning them into actual audio to create our test suite.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Creating the audio files'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So, we’ve got a bunch of text. But that’s not enough. We’re building a voice
    assistant, so we need actual audio. This next step is probably the most important
    part of the whole setup, as it’s what makes our test realistic.
  prefs: []
  type: TYPE_NORMAL
- en: This is all still handled by the 01_prepare_test_suite.py script. It takes the
    output_queries.json file we just made and feeds every single line—the original
    queries and all their restatements—into a Text-to-Speech (TTS) service.
  prefs: []
  type: TYPE_NORMAL
- en: To get some of the best and realistic voices we can get we will use Google’s
    new Chirp 3 HD voices. They’re basically the latest generation of Text-to-Speech,
    powered by LLMs themselves, and they sound incredibly lifelike and natural. And
    we don’t just convert the text to audio using one standard voice. Instead, we
    use a whole list of these different HD voices with different gender, accents,
    and dialects—US English, UK English, Australian, Indian, and so on. We do this
    because real users don’t all sound the same, and we want to make sure our agent
    can understand a request for help whether it’s spoken with a British accent or
    an American one.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '<details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Side
    note:'
  prefs: []
  type: TYPE_NORMAL
- en: '*When I was developing this project, I hit a really annoying snag. Once I generated
    a wav file I would send the audio to the live API, and… nothing. It would just
    hang, failing silently. It turns out the generated audio files ended too abruptly.
    The API’s Voice Activity Detection (VAD) didn’t have enough time to realise that
    the user (our audio file) had finished speaking. It was just waiting for more
    audio that never came.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*So I developed a workaround: I programmatically added one second of silence
    to the end of every single audio file. That little pause gives the API the signal
    it needs to know it’s its turn to respond.*</summary>'
  prefs: []
  type: TYPE_NORMAL
- en: After the script runs, we end up with a new folder called audio_test_suite/.
    Inside, it’s full of .wav files, with names like restatement_02_en-GB_… .wav.
    And we need to make sure that we link these audio to the original statements,
    and more importantly, the ground truth. To that end we will also create an audio
    mapping file `audio_test_suite/audio_mapping.json`. It maps every single audio
    file path to its ground truth—the function call that we expect the agent to make
    when it hears that audio.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: 'With our audio test suite and its mapping file in hand, our exam is finally
    ready. Now, we can move on to the interesting part: running the optimization loop
    and seeing how our agent actually performs.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Part 2: Running the Optimization Loop'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Alright, this is the main event. With our audio test suite ready, it’s time
    to run the optimization. Our 02_run_optimization.py script orchestrates a loop
    with three key players: an initial prompt to get us started, an Evaluator to grade
    its performance, and an optimiser to suggest improvements based on those grades.
    Let’s break down each one.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Starting Point: A rather naive Prompt'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Every optimization run has to start somewhere. We begin with a simple, human-written
    starting_prompt. We define this directly in the 02_run_optimization.py script.
    It’s intentionally basic because we want to see a clear improvement.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an example of what our starting prompt might look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: This prompt looks reasonable, but it’s very literal. It probably won’t handle
    indirect or nuanced questions well, which is exactly what we want our APE process
    to fix.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Evaluator: Grading the Test'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first thing our script does is run a baseline test. It takes this starting_prompt
    and evaluates it against our entire audio test suite. This is handled by our AudioFunctionCallEvaluator.
  prefs: []
  type: TYPE_NORMAL
- en: 'The evaluator’s job is simple but critical:'
  prefs: []
  type: TYPE_NORMAL
- en: It takes the system prompt.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It loops through every single audio file in our audio_test_suite/.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each audio file, it calls the live API with the given system prompt.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It checks the function call the API made and compares it to the ground truth
    from our audio_mapping.json.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It counts up the passes and fails and produces an overall accuracy score.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This score from the first run is our baseline. It lets us know where we stand,
    and we have the first data point for our optimization history.
  prefs: []
  type: TYPE_NORMAL
- en: Our evaluation/audio_fc_evaluator.py is the engine that actually “grades” each
    prompt. When we tell it to evaluate a prompt, it doesn’t just do a simple check.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, it needs to know what tools the agent even can use. These are defined
    as a strict schema right in the evaluator code. This is exactly how the AI model
    understands its capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The actual implementation of these tools is irrelevant (in our code they will
    just be dummy functions) – the important part is that the AI model selects the
    correct tool!
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, it runs all our audio tests against the live API. For each test, its
    comparison logic is quite nuanced. It doesn’t just check for a correct function
    call; it checks for specific failure types:'
  prefs: []
  type: TYPE_NORMAL
- en: 'PASS: The model did exactly what was expected.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'FAIL (Wrong Function): It was supposed to call get_information but called escalate_to_support
    instead.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'FAIL (Missed Call): It was supposed to call a function but made no call at
    all.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'FAIL (False Positive): It was supposed to stay quiet (like for “thanks, that’s
    all”) but called a function anyway.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This detailed feedback is crucial. It’s what gives the optimiser the rich information
    it needs to actually learn.
  prefs: []
  type: TYPE_NORMAL
- en: 'The optimiser: Learning from Mistakes'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is the heart of the OPRO strategy. Our script takes the result from the
    evaluator—the prompt, its initial score, and a detailed breakdown of which queries
    failed—and uses it to build a meta-prompt. This is the lesson plan we send to
    our optimiser LLM.
  prefs: []
  type: TYPE_NORMAL
- en: 'The meta-prompt is structured to give the optimiser maximum context. It looks
    something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: This is incredibly powerful. The optimiser LLM doesn’t just see a score. It
    sees that the prompt works fine for direct requests but is critically failing
    on indirect ones. It can then reason about why it’s failing and generate a new
    prompt specifically designed to fix that problem.
  prefs: []
  type: TYPE_NORMAL
- en: 'This brings us to the `optimization/prompt_optimiser.py`. Its job is to take
    all that rich feedback and turn it into a better prompt. The secret sauce is the
    meta-prompt, which is built from a template file: optimization/metaprompt_template.txt.
    We have already seen how the metaprompt looks in the previous section.'
  prefs: []
  type: TYPE_NORMAL
- en: The optimiser script uses helper functions like _calculate_query_breakdown()
    and _extract_failing_examples() to create a detailed report for that {prompt_scores}
    section. It then feeds this entire, detailed meta-prompt to the “optimiser” LLM.
    The optimiser model then writes a new prompt, which the script extracts using
    a simple regular expression to find the text inside the [[…]] brackets.
  prefs: []
  type: TYPE_NORMAL
- en: Logging, repeating, and the final result
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'All of this hard work is meticulously logged. Each run creates a timestamped
    folder inside runs/ containing:'
  prefs: []
  type: TYPE_NORMAL
- en: iteration_0/, iteration_1/, etc., with the exact prompt used, its score, and
    a detailed JSON of the evaluation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'best_prompt.txt: The highest-scoring prompt found during the run.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'prompt_history.txt: A log of every prompt tried and its performance breakdown.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'score_history_summary.txt: A neat summary of how the score improved over time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, when the loop is done, you don’t just get one good prompt. You get a complete
    audit trail of how the system “thought” its way to a better solution.
  prefs: []
  type: TYPE_NORMAL
- en: 'After the loop finishes, we’re left with our prize: the best-performing prompt.
    When I first ran this, it was genuinely fascinating to see what the optimiser
    came up with. The initial prompt was very rigid, but the final, optimised prompt
    was much more nuanced.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the run folder we are able to see how the prompt improved the model performance
    over time:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/609135a0a2be619b9ed874fa19391a7d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'And we can also see how each query group improved in each iteration:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d6e18d8008508c9c8631e94af9b1d0a1.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally we can see how the prompt has involved from a rather simple prompt
    to something much more sophisticated:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'And, as always with automated prompt engineering, I find it fascinating to
    see the optimiser’s analysis and reasoning:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Where We Go From Here: Limitations and Next Steps'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s be honest about this: it isn’t magic. It’s a powerful tool, but what
    we’ve built is a solid foundation that handles one specific, but very important,
    part of the puzzle. There are a few big limitations we need to be aware of and
    plenty of ways we can make this project even better.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Biggest Limitation: We’re Only Testing the First Turn'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The most important thing to realise is that our current setup only tests a single-turn
    interaction. We send an audio file, the agent responds, and we grade that one
    response. That’s it. But real conversations are almost never that simple.
  prefs: []
  type: TYPE_NORMAL
- en: 'A real user might have a back-and-forth conversation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: In our current system, we only test that last, crucial sentence. But a truly
    great agent needs to maintain context over multiple turns. It should understand
    that the user is in distress within the context of an account problem. Our current
    optimization process doesn’t test for that at all. This is, by far, the biggest
    opportunity for improvement.
  prefs: []
  type: TYPE_NORMAL
- en: Other Things This Doesn’t Do (Yet)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We’re Testing in a Soundproof Booth: The audio we generate is “studio quality”—perfectly
    clean, with no background noise. But real users are almost never in a studio.
    They’re in coffee shops, walking down the street, or have a TV on in the background.
    Our current tests don’t check how well the agent performs when the audio is messy
    and full of real-world noise.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'It’s Only as Good as Our Initial Test Cases: The whole process is guided by
    the input_queries.json file we create at the start. If we don’t include a certain
    type of edge case in our initial queries, the optimiser won’t even know it needs
    to solve for it. The quality of our starting test cases really matters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The optimiser Can Get Stuck: Sometimes the optimiser LLM can hit a “local maximum.”
    It might find a prompt that’s pretty good (say, 85% accurate) and then just keep
    making tiny, unhelpful changes to it instead of trying a completely different,
    more creative approach that could get it to 95%.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Fun Part: How We Can Improve It'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: These limitations aren’t dead ends; they’re opportunities. This is where we
    can really start to experiment and take the project to the next level.
  prefs: []
  type: TYPE_NORMAL
- en: 'Building Multi-Turn Test Scenarios: This is the big one. We could change our
    test suite from a list of single audio files to a list of conversational scripts.
    The evaluator would have to simulate a multi-turn dialogue, sending one audio
    file, getting a response, and then sending the next one. This would allow us to
    optimise for prompts that excel at maintaining context.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Smarter Evaluation: Instead of re-running the entire audio test suite every
    single time, what if we only re-ran the tests that failed in the last iteration?
    This would make each loop much faster and cheaper.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Better Evaluation Metrics: We could easily expand our Evaluator. What if, in
    addition to checking the function call, we used another LLM to score the agent’s
    politeness or conciseness? Then we could optimise for multiple things at once.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Human-in-the-Loop: We could build a simple UI that shows us the new prompt
    the optimiser came up with. We could then give it a thumbs-up or make a small
    manual edit before the next evaluation round, combining AI scale with human intuition.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Exemplar Selection: And of course, there’s the next logical step: exemplar
    selection. Once we’ve found the best prompt, we could run another loop to find
    the best few-shot examples to go along with it, pushing the accuracy even higher.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The possibilities are huge. Feel free to take the code and try implementing
    some of these ideas yourself. This is just the beginning of what we can do with
    automated prompt engineering for voice.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: And that’s a wrap! We’ve gone from a simple idea to a full-blown automated prompt
    engineering pipeline for a voice AI assistant. It’s a testament to the power of
    APE and the OPRO algorithm, showing that they can work even in the messy world
    of audio.
  prefs: []
  type: TYPE_NORMAL
- en: In this blog post, we’ve explored how crafting effective prompts is critical
    for an agent’s performance, but how the manual process of tweaking and testing
    is just too slow and difficult for today’s complex voice assistants. We saw how
    we can use APE to get away from that frustrating manual work and move towards
    a more systematic, data-driven approach.
  prefs: []
  type: TYPE_NORMAL
- en: But we didn’t just talk about theory – we got practical. We walked through the
    entire process, from generating a diverse audio test suite with realistic voices
    to implementing the OPRO loop where an “optimiser” LLM learns from a detailed
    history of successes and failures. We saw how this automated process can take
    a simple starting prompt and discover a much better one that handles the tricky,
    ambiguous queries that real users throw at it.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, what we’ve built is just a starting point. There are many ways to
    enhance it further, like building multi-turn conversational tests or adding background
    noise to the audio. The possibilities are huge.
  prefs: []
  type: TYPE_NORMAL
- en: I really hope you enjoyed this walkthrough and found it useful. The entire project
    is available on the GitHub repository, and I encourage you to check it out. Feel
    free to clone the repo, run it yourself, and maybe even try to implement some
    of the improvements we discussed.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading, and happy optimising! 🤗
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
