- en: RAG Isn’t Immune to LLM Hallucination
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/detecting-hallucination-in-rag-ecaf251a6633/](https://towardsdatascience.com/detecting-hallucination-in-rag-ecaf251a6633/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Johannes Plenio on Unsplash](../Images/98dbf8a75f9cde4b5150acd3a17c5bd0.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Johannes Plenio](https://unsplash.com/@jplenio?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: I recently started to favor Graph RAGs more than vector store-backed ones.
  prefs: []
  type: TYPE_NORMAL
- en: No offense to vector databases; they work fantastically in most cases. The caveat
    is that you need explicit mentions in the text to retrieve the correct context.
  prefs: []
  type: TYPE_NORMAL
- en: We have workarounds for that, and I’ve covered a few in my previous posts.
  prefs: []
  type: TYPE_NORMAL
- en: '[**Building RAGs Without A Retrieval Model Is a Terrible Mistake**](https://towardsdatascience.com/multi-rep-colbert-retrieval-models-for-rags-fe05381b8819)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For instance, ColBERT and Multi-representation are helpful retrieval models
    we should consider when building RAG apps.
  prefs: []
  type: TYPE_NORMAL
- en: GraphRAGs suffer less from retrieval issues (I didn’t say they don’t suffer.)
    Whenever the retrieval requires some reasoning, GraphRAG performs extraordinarily.
  prefs: []
  type: TYPE_NORMAL
- en: 'Providing relevant context solves a key problem in LLM-based applications:
    hallucination. However, it does not eliminate hallucinations altogether.'
  prefs: []
  type: TYPE_NORMAL
- en: When you can’t fix something, you measure it. And that’s the focus of this post.
    In other words, **how do we evaluate RAG apps**?
  prefs: []
  type: TYPE_NORMAL
- en: But before that, why do LLM’s lie in the first place?
  prefs: []
  type: TYPE_NORMAL
- en: Why do LLMs hallucinate (even RAGs)?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Language models sometimes lie—all right—and sometimes are inaccurate. This is
    primarily due to two reasons.
  prefs: []
  type: TYPE_NORMAL
- en: The first is that the LLM doesn’t have enough context to answer. This is why
    retrieval augmented generation (RAG) came into existence. RAGs provide context
    to the LLM that it hasn’t seen in its training.
  prefs: []
  type: TYPE_NORMAL
- en: Some models work well to answer within the provided context, and others don’t.
    For instance, [LLama 3.1 8B](https://ai.meta.com/blog/meta-llama-3-1/) works fine
    if you provide context to generate answers, while [DistilBERT](https://huggingface.co/docs/transformers/en/model_doc/distilbert)
    doesn’t.
  prefs: []
  type: TYPE_NORMAL
- en: '[**I Fine-Tuned the Tiny Llama 3.2 1B to Replace GPT-4o**](https://towardsdatascience.com/i-fine-tuned-the-tiny-llama-3-2-1b-to-replace-gpt-4o-7ce1e5619f3d)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The second reason is when the answer requires some reasoning. Not every LLM
    is good at reasoning; each does it differently. For context, [Llama 2 13B doesn’t
    perform well on reasoning tasks compared to GPT-4o](https://www.llm-reasoners.net/leaderboard).
  prefs: []
  type: TYPE_NORMAL
- en: Of course, these models are from different generations, and it wouldn’t be appropriate
    to compare them side by side. But that’s also the point I’m trying to make – if
    you don’t choose your model wisely, you can expect it to produce hallucinated
    answers.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: How to evaluate hallucination in RAGs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we’re convinced that every LLM-based app can hallucinate and that measuring
    is the only way to keep it in check, how can we do that?
  prefs: []
  type: TYPE_NORMAL
- en: A few LLM evaluation frameworks have recently evolved. Two of them, [RAGAS](https://docs.ragas.io/en/v0.1.21/index.html#)
    and [Deepeval](https://docs.confident-ai.com/), are particularly popular. Both
    tools are open-source and free to use, although a paid version exists.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ll be using Deepeval in this post. A quick note: I am not affiliated with
    Deepeval; I simply like it.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by installing the tool. You can get it from the PyPI repository.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Because LLM evaluations are vague, we can not test LLMs like we test software.
    The LLM-generated responses are never predictable, so they require another LLM
    to evaluate them.
  prefs: []
  type: TYPE_NORMAL
- en: The LLM evaluator needs to be a competent model. I’d choose GPT-4o-mini for
    this. It’s cost-effective and accurate, but you can experiment.
  prefs: []
  type: TYPE_NORMAL
- en: We can evaluate RAGs in two different ways. The first is a prompt-based technique
    called **[G-Eval](https://arxiv.org/abs/2303.16634)**. The second is **RAGAS,
    which allows us to evaluate RAGs systematically**.
  prefs: []
  type: TYPE_NORMAL
- en: Both RAGAS and G-Eval are incredibly helpful frameworks to evaluate RAGs. I’d
    use RAGAS as the default method when choosing between these frameworks. Since
    the computation is specific, the results are easy to compare with different evaluations.
    However, the evaluation criteria can sometimes be more complex than the RAGAS
    framework. In such a situation, you can dictate the evaluation steps using G-Eval.
  prefs: []
  type: TYPE_NORMAL
- en: 'G-Eval: The more versatile evaluation framework'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As mentioned earlier, G-Eval is a prompt-based evaluation framework, which means
    we get to tell the LLM how to evaluate our RAG. We can do this by setting the
    input parameter `criteria` or `evaluation_steps`.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s an example using the `criteria` parameter.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The above example verifies that the actual output aligns with the expected output.
    In this case, the date was different. But it has everything else correct.
  prefs: []
  type: TYPE_NORMAL
- en: The good thing about G-Eval is that we can define how we should evaluate it.
    We can specify that in the criteria if we’re okay with a date difference of less
    than 10 days. Here’s how the new evaluation looks.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: As you’ve noticed, this shoots up the score to .85 from .66 because we’ve allowed
    a 10-day range for the date match.
  prefs: []
  type: TYPE_NORMAL
- en: The above example only checks whether an LLM’s response regarding an expected
    outcome is correct. However, we also need to check the retrieved data to evaluate
    RAG.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s a RAG evaluation example. Notice that we’ve used the `evaluation_steps`
    parameter instead of `criteria`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: In the above example, we’ve used `evaluation_steps` instead of `criteria`. But
    this is optional. Explaining the evaluation process in a single statement `criteria`
    param would work just fine. But it’s always easier to break them down into steps.
  prefs: []
  type: TYPE_NORMAL
- en: G-Eval provides a single score to the evaluation regardless of the steps. You
    give it a single evaluation step or a dozen of them, and G-Eval will do all the
    work and produce a single score.
  prefs: []
  type: TYPE_NORMAL
- en: This is easy to understand and often sufficient. But what if we need to test
    an RAG pipeline component-by-component? This is where RAGAS comes into play.
  prefs: []
  type: TYPE_NORMAL
- en: 'RAGAS: Standard and more granular evaluation'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: RAGAS is a combination of four other evaluations in an RAG pipeline. They are
    answer relevancy, faithfulness, contextual recall, and contextual precision. The
    RAGAS score is simply the average of all these four.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an example:'
  prefs: []
  type: TYPE_NORMAL
- en: In the below example, I’ve used both `RagasMetric` And the individual components.
    In real evaluation, you can either use the individual ones or the RagasMetric
    only.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: To understand this, let’s revisit how a RAG app responds to input. The first
    step is fetching contextual information. The LLM then uses the retrieved context
    to answer the user’s query.
  prefs: []
  type: TYPE_NORMAL
- en: '**Contextual Precession** is a metric that evaluates whether statements relevant
    to the input are ranked higher. In our example, the one that contains the acquisition
    date is ranked #3 in the retrieved context. Hence, it has a low score (0.33) in
    the evaluation.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Contextual Recall** tests if the retrieved context is sufficient to get an
    answer closer to the expected output. In our example, the acquisition date is
    available in the retrieved context. Hence, the score for this metric is 1.0.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Faithfulness** is the metric that measures hallucinations in responses. It
    checks the correctness of the actual output with respect to the retrieved context.
    In our example, the retrieved context clearly states that the acquisition was
    completed in 2024\. But the output says it’s in 2025, which is very wrong. Hence,
    it gets a 0 for the faithfulness score.'
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the **answer relevancy** metric measures whether the response generated
    was at least an attempt to answer the right question (input). Even though factually
    incorrect, the LLM answered the right question in our example, so it received
    a 0.99 score.
  prefs: []
  type: TYPE_NORMAL
- en: The **RAGA score** is a weighted average of these four individual metrics.
  prefs: []
  type: TYPE_NORMAL
- en: The downside of RAGAS is that you sometimes get a pass, even if the response
    wasn’t correct. That’s precisely the case in our example. Answering the acquisition
    date with a year difference isn’t negligible. But still, it was only one out of
    four metrics considered. Hence, the overall score of 0.66 is well above the threshold.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, I’d suggest using individual metrics to understand the components rather
    than the whole system with a single metric (like RAGAS). This helps debug the
    app better.
  prefs: []
  type: TYPE_NORMAL
- en: Final thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Evaluating apps with an LLM is different from evaluating a software project.
    Evaluating a RAG app is even more different and challenging.
  prefs: []
  type: TYPE_NORMAL
- en: This is mainly because the response of LLM isn’t always the same. They may sometimes
    hallucinate.
  prefs: []
  type: TYPE_NORMAL
- en: G-Eval and RAGAS are popular in evaluating the RAG applications. Even though
    these frameworks cover many aspects of an RAG app, they also find out about the
    hallucinations of LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: Once you discover your app suffers from hallucinations, you could work on the
    workflow to fetch better contextual information (perhaps with a graph DB) or change
    the model.
  prefs: []
  type: TYPE_NORMAL
