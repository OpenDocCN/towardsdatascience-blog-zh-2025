- en: Empowering LLMs to Think Deeper by Erasing Thoughts
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过消除思维赋予LLMs更深入的思考能力
- en: 原文：[https://towardsdatascience.com/empowering-llms-to-think-deeper-by-erasing-thoughts/](https://towardsdatascience.com/empowering-llms-to-think-deeper-by-erasing-thoughts/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/empowering-llms-to-think-deeper-by-erasing-thoughts/](https://towardsdatascience.com/empowering-llms-to-think-deeper-by-erasing-thoughts/)
- en: <mdspan datatext="el1747095842970" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747095842970" class="mdspan-comment">引言</mdspan>
- en: Recent **large language models (LLMs)** — such as [OpenAI’s o1/o3](https://openai.com/index/learning-to-reason-with-llms/),
    DeepSeek’s R1 and Anthropic’s Claude 3.7 — demonstrate that allowing the model
    to think deeper and longer at test time can significantly enhance model’s reasoning
    capability. The core approach underlying their deep thinking capability is called
    **[chain-of-thought (CoT)](https://proceedings.neurips.cc/paper_files/paper/2022/file/9d5609613524ecf4f15af0f7b31abca4-Paper-Conference.pdf)**,
    where the model iteratively generates intermediate reasoning steps and appends
    them to the current context until producing the final answer.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 近期**大型语言模型（LLMs）**，例如[OpenAI的o1/o3](https://openai.com/index/learning-to-reason-with-llms/)、DeepSeek的R1和Anthropic的Claude
    3.7，展示了允许模型在测试时进行更深、更长时间的思考可以显著增强模型的推理能力。其深层次思考能力背后的核心方法被称为**[思维链（CoT）](https://proceedings.neurips.cc/paper_files/paper/2022/file/9d5609613524ecf4f15af0f7b31abca4-Paper-Conference.pdf）**，其中模型迭代地生成中间推理步骤并将它们附加到当前上下文中，直到生成最终答案。
- en: 'However, as tasks become increasingly complex, the steps needed to solve them
    grow dramatically. For instance, consider solving NP-hard problems using CoT —
    the reasoning trace would inevitably span exponential steps, assuming a fixed-size
    Transformer as the base model and P ≠ NP. This raises an important question:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，随着任务的日益复杂，解决它们所需的步骤会急剧增加。例如，考虑使用CoT解决NP-hard问题——推理轨迹不可避免地会跨越指数级步骤，假设固定大小的Transformer作为基础模型，且P
    ≠ NP。这引发了一个重要问题：
- en: '***Will CoT-based test-time scaling hit hard ceilings?***'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '***基于CoT的测试时间缩放是否会触及硬性上限？***'
- en: 'Unfortunately, probably yes. Various limitations will emerge for harder tasks:
    **(1)** chains will inevitably exceed model’s context windows, **(2)** critical
    information becomes buried and nearly impossible to retrieve from numerous preceding
    tokens, and **(3)** the self-attention complexity makes generating each new token
    prohibitively expensive.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，可能确实如此。对于更困难的任务，将出现各种限制：**（1）**链将不可避免地超出模型上下文窗口，**（2）**关键信息被埋没，几乎不可能从众多前缀标记中检索出来，以及**（3）**自注意力复杂度使得生成每个新标记的成本过高。
- en: '![](../Images/6d6517202b50fe18fbef06f34b588b94.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6d6517202b50fe18fbef06f34b588b94.png)'
- en: Generated by ChatGPT, prompted by author
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 由ChatGPT生成，由作者提示
- en: In this article, we challenge the conventional “write-only” CoT reasoning paradigm
    that dominates current LLM architectures, from both theoretical and practical
    perspectives. Furthermore, we will explore a fundamentally different reasoning
    approach that allows LLM to not only generate thoughts, but also erase thoughts.
    This capacity for thought erasure not only offers significant practical benefits
    in performance and efficiency, but proves fundamental for achieving optimal reasoning
    efficiency from a computational theory perspective.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们从理论和实践两个角度挑战了目前LLM架构中占主导地位的传统的“只写”CoT推理范式。此外，我们将探讨一种根本不同的推理方法，该方法不仅允许LLM生成思维，还可以消除思维。这种消除思维的能力不仅为性能和效率提供了显著的实际效益，而且从计算理论的角度来看，对于实现最佳推理效率是基本的。
- en: 'This post is based on the paper *[C. Yang et al., “PENCIL: Long thoughts with
    short memory”](https://arxiv.org/pdf/2503.14337?)* accepted in International Conference
    on Machine Learning 2025, a collaboration with Nathan Srebro, David McAllester,
    Zhiyuan Li. [Code](https://github.com/chr26195/PENCIL) is also available.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章基于C. Yang等人于2025年国际机器学习会议接受的论文*[“PENCIL：短记忆中的长思维”](https://arxiv.org/pdf/2503.14337?)*，与Nathan
    Srebro、David McAllester、Zhiyuan Li合作。[代码](https://github.com/chr26195/PENCIL)也可用。
- en: '![](../Images/86f0a471ad7245a7c323eb221789c851.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/86f0a471ad7245a7c323eb221789c851.png)'
- en: '* * *'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Not Everything Needs to Be Remembered
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 并非所有事物都需要被记住
- en: The idea of selectively discarding information has deep roots in computer science
    history, from the earliest computational models to modern systems. The classic
    Turing machine overwrites symbols on its tape rather than preserving every state;
    programming languages reclaim memory through stack frames that are automatically
    released when functions complete their execution; and modern garbage collectors
    continuously identify and remove objects no longer accessible to the program.
    These mechanisms weren’t merely efficiency optimizations — they were essential
    design choices that made complex computation possible within finite resources.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 选择性地丢弃信息的思想在计算机科学历史中有着深厚的根源，从最早的计算模型到现代系统。经典的图灵机在其磁带上覆盖符号而不是保留每个状态；编程语言通过在函数执行完成后自动释放的堆栈帧来回收内存；现代垃圾收集器持续识别并移除程序不再可访问的对象。这些机制不仅仅是效率优化——它们是使复杂计算在有限资源内成为可能的基本设计选择。
- en: This idea also applies to human reasoning. In theorem proving, once a lemma
    is established, we discard its detailed derivation while preserving the result;
    when exploring problem-solving approaches, we simply mark unproductive paths as
    “failed” without retaining their full traces. Throughout complex reasoning, we
    naturally compress information, retaining conclusions while discarding the scaffolding
    used to reach them.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这个想法也适用于人类推理。在定理证明中，一旦一个引理被建立，我们就丢弃其详细的推导过程，同时保留结果；在探索解决问题的方法时，我们只需将无用的路径标记为“失败”，而不保留它们的完整轨迹。在整个复杂的推理过程中，我们自然会压缩信息，保留结论，丢弃达到它们的支撑结构。
- en: '✏️ PENCIL: A New Reasoning Paradigm'
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ✏️ PENCIL：一种新的推理范式
- en: Therefore, we propose ✏️ PENCIL, a new reasoning paradigm for LLMs. Unlike ✒️
    CoT that only generates thoughts, PENCIL recursively generates and erases thoughts
    until reaching the final answer. It maintains only the minimal context required
    for generating future thoughts, so the model can think longer and deeper to solve
    harder tasks using shorter working memory. The following figure illustrates how
    PENCIL works
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们提出了✏️ PENCIL，一种新的LLM推理范式。与✒️ CoT仅生成思维不同，PENCIL递归地生成和消除思维，直到达到最终答案。它只维护生成未来思维所需的最小上下文，因此模型可以思考更长、更深入，使用较短的工作内存来解决更难的任务。以下图示说明了PENCIL的工作原理
- en: '![](../Images/eca945529004e1135cc40035bf492e55.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/eca945529004e1135cc40035bf492e55.png)'
- en: 'Chain-of-Thought (left) preserves all reasoning steps in context, creating
    lengthy outputs. PENCIL (right) alternates between generation (bold) and reduction
    (blue): discarding intermediate thoughts when no longer needed. After reaching
    the solution, PENCIL returns only the final answer, hiding the thinking process.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 思维链（左）在上下文中保留所有推理步骤，创建冗长的输出。PENCIL（右）在生成（粗体）和简化（蓝色）之间交替：当不再需要时丢弃中间思维。在达到解决方案后，PENCIL只返回最终答案，隐藏思考过程。
- en: How Do Models Erase Thoughts?
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 怎样让模型消除思维？
- en: PENCIL’s erasure mechanism draws on two classical ideas. First, from **rewriting
    rules in logic and classical automated theorem proving**, which continuously apply
    predefined rules to simplify complex logical or arithmetic expressions into canonical
    forms until reaching a final answer. Second, from **functional programming languages**,
    which creates stack frames to store local variables when calling functions and
    releases corresponding memory when functions return, automatically discarding
    intermediate states that are no longer needed.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: PENCIL的消除机制借鉴了两个经典思想。首先，来自**逻辑和经典自动定理证明中的重写规则**，这些规则持续应用预定义的规则来简化复杂的逻辑或算术表达式到规范形式，直到达到最终答案。其次，来自**函数式编程语言**，它在调用函数时创建堆栈帧来存储局部变量，并在函数返回时释放相应的内存，自动丢弃不再需要的中间状态。
- en: 'Specifically, we introduce three special tokens, called [CALL], [SEP], and
    [RETURN], and use the following reduction rule to implement erasure:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，我们引入了三个特殊的标记，称为[CALL]、[SEP]和[RETURN]，并使用以下简化规则来实现消除：
- en: '![](../Images/7ff36daee1f999c32246d5a6c25f2d52.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7ff36daee1f999c32246d5a6c25f2d52.png)'
- en: where **C** stands for context, **T** stands for intermediate thoughts, and
    **A** stands for answer. Whenever the generated sequence completely matches the
    pattern on the left, PENCIL triggers the reduction rule, erasing thoughts and
    merging the answerback into the context. It is important to note that **C**, **T**
    and **A** can themselves contain special tokens, thereby supporting **recursive**
    structures similar to nested function calls — for example, **C** may contain another
    [CALL] token, indicating that a new thinking subroutine has been initiated.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 **C** 代表上下文，**T** 代表中间思想，**A** 代表答案。每当生成的序列完全匹配左侧的模式时，PENCIL 触发缩减规则，擦除思想并将答案合并回上下文。重要的是要注意，**C**、**T**
    和 **A** 本身可以包含特殊标记，从而支持类似于嵌套函数调用的**递归**结构——例如，**C** 可能包含另一个 [CALL] 标记，表示已启动一个新的思考子程序。
- en: How to Use PENCIL?
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何使用 PENCIL？
- en: 'PENCIL’s erasure mechanism flexibly supports various reasoning patterns, such
    as:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: PENCIL 的擦除机制灵活支持各种推理模式，例如：
- en: '1️⃣ **Task Decomposition**: Using [CALL] to initiate subproblems, generate
    intermediate results, and then use [SEP] and [RETURN] to merge outputs and erase
    subproblem reasoning details;'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 1️⃣ **任务分解**：使用 [CALL] 来启动子问题，生成中间结果，然后使用 [SEP] 和 [RETURN] 来合并输出并擦除子问题推理细节；
- en: '2️⃣ **Branch and Backtrack**: Using a [CALL], [SEP], [RETURN] triplet to manage
    an exploration branch in a search tree, erasing invalid paths upon conflicts or
    failures.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 2️⃣ **分支和回溯**：使用 [CALL]、[SEP]、[RETURN] 三联组来管理搜索树中的探索分支，在冲突或失败时擦除无效路径。
- en: '3️⃣ **Summarization / Tail Recursion**: Condensing a lengthy reasoning trace
    into concise summary, similar to tail recursion optimization in programming:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 3️⃣ **总结/尾递归**：将漫长的推理轨迹压缩成简洁的总结，类似于编程中的尾递归优化：
- en: '![](../Images/f2771053ef3e2a0681896b2e27c3cbcd.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f2771053ef3e2a0681896b2e27c3cbcd.png)'
- en: where **T** represents the original complex reasoning process (or a more difficult
    problem), and **T’** represents the summarized or simplified content (or an equivalent,
    more tractable problem).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 **T** 代表原始的复杂推理过程（或一个更难的问题），而 **T’** 代表总结或简化的内容（或一个等效的、更易处理的问题）。
- en: Example on a NP-Complete Task
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NP-Complete 任务示例
- en: 'For example, consider a classic NP-Complete problem Boolean Satisfiability
    (SAT): given a Boolean formula, determine whether there exists a variable assignment
    that makes it true. This problem is (widely believed to) require **exponential
    time** but only **polynomial space** to solve, with the simplest approach being
    traversing a binary search tree of depth n.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑一个经典的 NP-Complete 问题布尔可满足性（SAT）：给定一个布尔公式，确定是否存在一个变量赋值使其为真。这个问题（广泛认为）需要**指数时间**但只需**多项式空间**来解决，最简单的方法是遍历深度为
    n 的二叉搜索树。
- en: Traditional CoT would accumulate intermediate calculations, causing the context
    length to grow proportionally with the number of nodes in the search tree, which
    is exponential time complexity of O(2^n). In comparison, PENCIL can recursively
    branch to try True/False for a variable, backtracking upon conflict and erasing
    all thoughts within that branch. This thus keeps the context length proportional
    to the search depth, which is space complexity of only O(n).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的 CoT 会累积中间计算，导致上下文长度与搜索树中的节点数成比例增长，这是指数时间复杂度 O(2^n)。相比之下，PENCIL 可以递归地分支尝试变量的
    True/False，在冲突时回溯并擦除该分支内的所有思想。因此，这保持了上下文长度与搜索深度成比例，空间复杂度仅为 O(n)。
- en: The following figure compares the maximum context length of the vanilla CoT
    without reduction (blue) and PENCIL with reduction (red). As problem complexity
    increases, PENCIL achieves dramatic space efficiency, notably reducing context
    length from 151,192 to just 3,335 tokens for Einstein’s Puzzle.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 下图比较了没有缩减的原始 CoT（蓝色）和具有缩减的 PENCIL（红色）的最大上下文长度。随着问题复杂性的增加，PENCIL 实现了显著的空间效率，特别是将爱因斯坦难题的上下文长度从
    151,192 减少到仅为 3,335 个标记。
- en: '![](../Images/7d2051f1dcc41ece2fb21a7e18555398.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7d2051f1dcc41ece2fb21a7e18555398.png)'
- en: Maximal sequence length with and without the reduction rule.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 带和不带缩减规则的序列最大长度。
- en: '* * *'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Training and Experiments
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练和实验
- en: 'The core difference between CoT and PENCIL during training is the calculation
    of the loss function:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 训练期间 CoT 和 PENCIL 的核心区别在于损失函数的计算：
- en: '![](../Images/d482a98e672b176bb8afcae4681ffedd.png)![](../Images/220e6d1ac5a493f02ad534d684340b0c.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d482a98e672b176bb8afcae4681ffedd.png)![图片](../Images/220e6d1ac5a493f02ad534d684340b0c.png)'
- en: For CoT, the loss for each new token is based on the complete historical context;
    for PENCIL, after each “write-erase” iteration, the model calculates loss for
    new tokens only on the reduced sequence. Although both generate the same number
    of tokens, PENCIL significantly shortens the context length corresponding to each
    token and thus is more efficient.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 CoT，每个新标记的损失基于完整的上下文历史；对于 PENCIL，在每次“写入-擦除”迭代后，模型仅对缩短的序列计算新标记的损失。尽管两者生成的标记数量相同，但
    PENCIL 显著缩短了每个标记对应的上下文长度，因此效率更高。
- en: It’s also worthwhile to note that after each reduction, the KV cache for the
    shared prefix **C** can be directly reused, with only the cache for the shorter
    part **A** needing recalculation.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，每次减少后，共享前缀 **C** 的 KV 缓存可以直接重用，只需重新计算较短的 **A** 部分的缓存。
- en: Experimental Results
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实验结果
- en: 'Our experiments focus on three inherently hard reasoning tasks: 3-SAT (NP-Complete),
    QBF (PSPACE-Complete), and Einstein’s Puzzle (natural language reasoning). For
    each task, we wrote a generator to generate a training set where special tokens
    are included. We train a small transformer (SAT/QBF with 10.6M parameters; Einstein’s
    Puzzle with 25.2M parameters) starting with random initialization for these tasks.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的实验专注于三个固有的困难推理任务：3-SAT（NP-Complete）、QBF（PSPACE-Complete）和爱因斯坦的谜题（自然语言推理）。对于每个任务，我们编写了一个生成器来生成包含特殊标记的训练集。我们为这些任务训练了一个小型变压器（SAT/QBF
    参数量为 10.6M；爱因斯坦的谜题参数量为 25.2M），从随机初始化开始。
- en: 📊 Compared to CoT, we found PENCIL can solve larger-scale reasoning problems.
    As shown in the figure below, in SAT (left) and QBF (right) tasks, when problem
    size is small, both CoT and PENCIL perfectly solve problems; but as size increases,
    traditional CoT accuracy drops significantly (e.g., only about 50% for SAT at
    n=10), while PENCIL maintains high accuracy ≥ 99%. This is primarily because CoT’s
    context sequence length explodes exponentially, whereas PENCIL avoids explosion
    by dynamic reduction.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 📊 与 CoT 相比，我们发现 PENCIL 可以解决更大规模的推理问题。如图所示，在 SAT（左）和 QBF（右）任务中，当问题规模较小时，CoT 和
    PENCIL 都能完美解决问题；但随着规模的增加，传统的 CoT 准确率显著下降（例如，在 n=10 时 SAT 的准确率仅为约 50%），而 PENCIL
    保持高准确率 ≥ 99%。这主要是因为 CoT 的上下文序列长度呈指数级爆炸，而 PENCIL 通过动态减少避免了爆炸。
- en: '![](../Images/d8a892e1eb8762887596339ee7f59dbb.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d8a892e1eb8762887596339ee7f59dbb.png)'
- en: Performance comparison on 3-SAT (left) and QBF (right)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 3-SAT（左）和 QBF（右）的性能比较
- en: ⚡️ Additionally, PENCIL significantly saves computational resources. As shown
    in the figure, for QBF (n=3–6) tasks, we compared the convergence speed of CoT
    (blue) and PENCIL (red) under the same FLOPs budget. PENCIL quickly reaches 100%
    accuracy while CoT, due to continuously expanding context length, requires more
    FLOPs to approach optimality. As the problem size increases, the gap between the
    two becomes more pronounced.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: ⚡️ 此外，PENCIL 显著节省了计算资源。如图所示，对于 QBF (n=3–6) 任务，我们在相同的 FLOPs 预算下比较了 CoT（蓝色）和 PENCIL（红色）的收敛速度。PENCIL
    快速达到 100% 的准确率，而 CoT 由于持续扩展上下文长度，需要更多的 FLOPs 来接近最优解。随着问题规模的增加，两者之间的差距变得更加明显。
- en: '![](../Images/978d59f18de93d649b73fd475ccda862.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/978d59f18de93d649b73fd475ccda862.png)'
- en: Comparison of convergence speed for training on the QBF problem (with n ranges
    from 3
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在 QBF 问题（n 范围从 3 到 6）上训练的收敛速度比较
- en: to 6). Circles and vertical lines indicate the first time each method reaches
    optimal performance.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: （到 6）。圆圈和垂直线表示每种方法首次达到最佳性能的时间。
- en: '🧩 We further considered a very difficult logical reasoning problem: [Einstein’s
    Puzzle](https://en.wikipedia.org/wiki/Zebra_Puzzle). Each problem consists of
    5 houses and 5 attribute categories of people living in them — color, nationality,
    drink, cigarette, and pet (e.g., Red/Green/Blue, Brit/German/Swede, Bird/Dog/Fish,
    etc.). Given clues like “the green house is right next to the bird owner’s” and
    “the dog owner lives in the red house,” the task is to deduce “who owns the fish?”
    This problem presents an extreme challenge for existing LLMs: [even GPT-4 struggles
    to solve it](https://proceedings.neurips.cc/paper_files/paper/2023/file/deb3c28192f979302c157cb653c15e90-Paper-Conference.pdf).
    The figure below shows a simplified version with only 3 houses and 3 attribute
    categories:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 🧩 我们进一步考虑了一个非常困难的逻辑推理问题：[爱因斯坦难题](https://en.wikipedia.org/wiki/Zebra_Puzzle)。每个问题由5座房屋和5个人群属性类别组成——颜色、国籍、饮料、香烟和宠物（例如，红/绿/蓝，英/德/瑞典，鸟/狗/鱼等）。给定诸如“绿色房子紧挨着鸟主人”和“狗主人住在红色房子里”这样的线索，任务是推断“谁拥有鱼？”这个问题对现有的LLMs提出了极端挑战：[甚至GPT-4也难以解决它](https://proceedings.neurips.cc/paper_files/paper/2023/file/deb3c28192f979302c157cb653c15e90-Paper-Conference.pdf)。下面的图显示了只有3座房屋和3个属性类别的简化版本：
- en: '![](../Images/489db7275dfcde7389d962bdfe6746f8.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/489db7275dfcde7389d962bdfe6746f8.png)'
- en: Illustration of Einstein’s Puzzle.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 爱因斯坦难题的示意图。
- en: As shown below, for this problem that even large models struggle with, PENCIL
    achieves 97% accuracy using only a small 25.2M parameter model, while traditional
    CoT achieves only 25% accuracy (close to random guessing).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如下所示，对于这个即使是大型模型也难以解决的问题，PENCIL仅使用一个小的25.2M参数模型就达到了97%的准确率，而传统的CoT仅达到25%的准确率（接近随机猜测）。
- en: '![](../Images/7d2051f1dcc41ece2fb21a7e18555398.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7d2051f1dcc41ece2fb21a7e18555398.png)'
- en: Performance on Einstein’s Puzzle
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 爱因斯坦难题的性能
- en: '* * *'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Theory: Universal Efficient Computation'
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理论：通用高效计算
- en: 'We further demonstrate PENCIL’s fundamental advantage over traditional CoT
    from the theoretical **expressive power** perspective: PENCIL is Turing complete
    with optimal space complexity, and thus can solve arbitrary computable tasks efficiently.
    This is something fundamentally impossible for CoT!'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们进一步从理论上的**表达能力**角度展示了PENCIL相对于传统CoT的基本优势：PENCIL具有最优的空间复杂度，并且因此可以有效地解决任意可计算任务。这是CoT所无法做到的！
- en: Main Results
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 主要结果
- en: 'Specifically, we prove: *Using a fixed, finite-sized Transformer, PENCIL can
    simulate any Turing machine with optimal time and space complexity, thereby efficiently
    solving all computable problems.*'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，我们证明：*使用一个固定、有限大小的Transformer，PENCIL可以在最优的时间和空间复杂度下模拟任何图灵机，从而有效地解决所有可计算问题。*
- en: '![](../Images/f7a57a3a2828b15e9bae1baf278cfde6.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f7a57a3a2828b15e9bae1baf278cfde6.png)'
- en: In other words, for any Turing machine running in T time and S space, PENCIL
    requires only O(T) tokens while maintaining a maximum context length of O(S) to
    produce identical results. While [previous work](https://arxiv.org/pdf/2310.07923)
    established that traditional CoT can make Transformers Turing complete, it demands
    O(T) context length with each token representing an intermediate computation step.
    This distinction between maximum context length becomes crucial because for most
    algorithms, space complexity S is substantially smaller than time complexity T,
    especially for harder problems.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，对于任何在T时间内运行并在S空间内运行的图灵机，PENCIL只需要O(T)个标记，同时保持最大上下文长度为O(S)以产生相同的结果。虽然[先前的工作](https://arxiv.org/pdf/2310.07923)已经证明传统的CoT可以使Transformer图灵完备，但它需要O(T)的上下文长度，每个标记代表一个中间计算步骤。这种最大上下文长度的区别变得至关重要，因为对于大多数算法，空间复杂度S远小于时间复杂度T，尤其是在更难的问题中。
- en: Consider NP-Complete problems like Traveling Salesman or Hamiltonian Circuit,
    which are widely believed to require exponential time but solvable in polynomial
    space. Traditional CoT cannot solve these within polynomial context length constraints,
    and requires at least exponential length that exceeds practical memory limitations
    of any real system. PENCIL, in contrast, can solve them using only polynomial
    maximum context length, making previously intractable reasoning tasks feasible.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑NP-完全问题，如旅行商问题或哈密顿回路问题，这些问题普遍认为需要指数时间，但可以在多项式空间内解决。传统的CoT无法在多项式上下文长度约束内解决这些问题，并且至少需要超过任何实际系统内存限制的指数长度。相比之下，PENCIL可以使用仅多项式最大上下文长度来解决这些问题，使得以前难以处理的推理任务变得可行。
- en: Proof Sketch
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 证明草图
- en: We now briefly introduce our proof idea, where the key insight is to have PENCIL
    use a series of “Simulation-Summarization” iterations to clean the memory.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在简要介绍我们的证明思路，关键洞察是让 PENCIL 使用一系列“模拟-总结”迭代来清理内存。
- en: '![](../Images/cdc742562dafbbafb7899dadd200240c.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cdc742562dafbbafb7899dadd200240c.png)'
- en: 'PENCIL simulates Turing machine iteratively using two phases: simulating computation
    steps from the previous state, and summarizing into the new state using the reduction
    rule.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: PENCIL 通过两个阶段迭代地模拟图灵机：从上一个状态模拟计算步骤，并使用简化规则总结到新状态。
- en: '**Step 1: Using CoT to Encode Turing Machine Transitions** As illustrated in
    the left part of the figure above, we encode each Turing machine state transition
    as a token encoding “new state”, “written symbol”, and “head movement direction”
    triplet in the embedding. The model can use self-attention to calculate the current
    head position and determine the symbol at this position. Without reduction, this
    process generates T tokens with context length O(T).'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1：使用 CoT 对图灵机转换进行编码** 如上图左侧所示，我们将每个图灵机状态转换编码为嵌入中的“新状态”、“写入符号”和“头移动方向”三元组令牌。模型可以使用自注意力来计算当前头位置并确定该位置的符号。没有简化，这个过程生成
    T 个令牌，上下文长度为 O(T)。'
- en: '**Step 2: Alternating “Simulation-Summarization”** PENCIL achieves space/time
    optimality through alternating:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 2：交替“模拟-总结”** PENCIL 通过交替来实现空间/时间最优性：'
- en: '**Simulation**: Continuously generate Turing machine state transition tokens,
    simulating multiple computation steps;'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模拟**：持续生成图灵机状态转换令牌，模拟多个计算步骤；'
- en: '**Summarization**: When new tokens exceed twice the space needed, summarize
    the computation using S tokens. The reduction rule then discards previous thoughts,
    keeping only the latest Turing machine state for the next round.'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**总结**：当新令牌超过所需空间的两倍时，使用 S 个令牌总结计算。然后简化规则丢弃之前的想法，只保留下一轮的最新图灵机状态。'
- en: This strategy maintains total token generation at O(T) while limiting context
    length to O(S).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 该策略保持总令牌生成在 O(T) 的同时，将上下文长度限制在 O(S)。
- en: '**Step 3: Transformer Implementation** To prove this process can be implemented
    by Transformers, we developed the Full-Access Sequence Processing (FASP) programming
    language and proved that any algorithm written in FASP can be implemented by a
    fixed-sized Transformer. In a FASP program, each variable corresponds to a Transformer
    sub-module, and each line of code transforms existing variables to a new variable
    through predefined functions, which is equivalent to constructing a more complex
    Transformer based on sub-modules. The variable returned by the program is the
    desired Transformer that encodes the algorithm. We wrote a FASP program that implements
    the “Simulation-Summarization” operation, which implies there exists a constant-sized
    Transformer that can perform the same function'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 3：Transformer 实现** 为了证明这个过程可以通过 Transformers 实现，我们开发了 Full-Access Sequence
    Processing (FASP) 编程语言，并证明了任何用 FASP 编写的算法都可以通过固定大小的 Transformer 实现。在 FASP 程序中，每个变量对应一个
    Transformer 子模块，每行代码通过预定义的函数将现有变量转换为新的变量，这相当于基于子模块构建一个更复杂的 Transformer。程序返回的变量是编码算法的所需
    Transformer。我们编写了一个 FASP 程序来实现“模拟-总结”操作，这意味着存在一个固定大小的 Transformer 可以执行相同的功能'
- en: '* * *'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, we propose a new reasoning paradigm PENCIL, which alternates
    between generation and erasure, and enables models to think deeper to solve more
    complicated problems. Theoretically, we prove that PENCIL achieves Turing completeness
    with optimal time and space efficiency and thus can efficiently solve any computable
    problems. Looking forward, a promising direction would be to fine-tune LLMs to
    incorporate PENCIL’s memory-efficient reasoning capabilities. We hope these findings
    will inspire reexamining current reasoning models from the perspective of theory
    of computation.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，我们提出了一种新的推理范式 PENCIL，它在生成和擦除之间交替，使模型能够进行更深入的思考以解决更复杂的问题。从理论上讲，我们证明了 PENCIL
    以最优的时间和空间效率实现了图灵完备性，因此可以有效地解决任何可计算问题。展望未来，一个有希望的方向是将 LLMs 微调以结合 PENCIL 的内存高效推理能力。我们希望这些发现能够启发从计算理论的角度重新审视当前的推理模型。
- en: '![](../Images/88f5e1f6a2220acdc9dd3a30de1b4d23.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/88f5e1f6a2220acdc9dd3a30de1b4d23.png)'
