- en: Let’s refine the queries with reflection and measure the accuracy. We don’t
    see much improvement in the final quality. We’re still at 70% correct answers.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1a556089cb4524fb1fba019d45436f70.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at specific examples to understand what happened. First, there are
    a couple of cases where the LLM managed to fix the problem, either by correcting
    the format or by adding missing logic to handle zero values.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/09249240b67e1f8873c5d5c56bdaf045.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: 'However, there are also cases where the LLM overcomplicated the answer. The
    initial SQL was correct (matching the golden set answer), but then the LLM decided
    to ‘improve’ it. Some of these improvements are reasonable (e.g., accounting for
    nulls or excluding cancelled flights). Still, for some reason, it decided to use
    ClickHouse sampling, even though we don’t have much data and our table doesn’t
    support sampling. As a result, the refined query returned an execution error:
    `Database returned the following error: Code: 141\. DB::Exception: Storage default.flight_data
    doesn''t support sampling. (SAMPLING_NOT_SUPPORTED)`.'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/523f6e5bd49e6bfbbe7ea717daa00206.png)'
  id: totrans-177
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: Reflection with external feedback
  id: totrans-179
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Reflection didn’t improve accuracy much. This is likely because we didn’t provide
    any additional information that would help the model generate a better result.
    Let’s try sharing external feedback with the model:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: The result of our check on whether the format is specified correctly
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: The output from the database (either data or an error message)
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: Let’s put together a prompt for this and generate a new version of the SQL.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]json''):'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: data = data[7:]
  id: totrans-185
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'elif data.startswith(''[PRE17]''):'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: data = data[:-3]
  id: totrans-187
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: data = data.strip()
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: return json.loads(data.replace('\n', ' '))
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: '```'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: 'After running our accuracy measurements, we can see that accuracy has improved
    significantly: 17 correct answers (85% accuracy) compared to 14 (70% accuracy).'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6f683b10dc2eb01e93dd8551615e1fd3.png)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: If we check the cases where the LLM fixed the issues, we can see that it was
    able to correct the format, address SQL execution errors, and even revise the
    business logic (e.g., using air time for calculating speed).
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6d675fdb3a13f0b0a3b5e72ae29cfaee.png)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s also do some error analysis to examine the cases where the LLM made mistakes.
    In the table below, we can see that the LLM struggled with defining certain timestamps,
    incorrectly calculating total time, or using total time instead of air time for
    speed calculations. However, some of the discrepancies are a bit tricky:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: In the last query, the time period wasn’t explicitly defined, so it’s reasonable
    for the LLM to use 2010–2023\. I wouldn’t consider this an error, and I’d adjust
    the evaluation instead.
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在最后一个查询中，时间段并没有明确定义，因此对于LLM使用2010-2023是合理的。我不会认为这是一个错误，而是会调整评估。
- en: 'Another example is how to define airline speed: `avg(distance/time)` or `sum(distance)/sum(time)`.
    Both options are valid since nothing was specified in the user query or system
    prompt (assuming we don’t have a predefined calculation method).'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一个例子是如何定义航空公司速度：`avg(distance/time)`或`sum(distance)/sum(time)`。由于用户查询或系统提示中没有指定（假设我们没有预定义的计算方法），这两种选项都是有效的。
- en: '![](../Images/ab229cdae3726a5f7985eada65b16d9e.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ab229cdae3726a5f7985eada65b16d9e.png)'
- en: Image by author
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Overall, I think we achieved a pretty good result. Our final 85% accuracy represents
    a significant 15% point improvement. You could potentially go beyond one iteration
    and run 2–3 rounds of reflection, but it’s worth assessing when you hit diminishing
    returns in your specific case, since each iteration goes with increased cost and
    latency.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，我认为我们取得了相当不错的结果。我们最终的85%准确率代表了15%的显著提升。你可能会选择进行一轮以上的迭代，并运行2-3轮反思，但评估你在特定情况下何时达到边际收益递减是很值得的，因为每一次迭代都会伴随着成本和延迟的增加。
- en: '*You can find the full code on [GitHub](https://github.com/miptgirl/miptgirl_medium/tree/main/ai_under_the_hood).*'
  id: totrans-203
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*你可以在[GitHub](https://github.com/miptgirl/miptgirl_medium/tree/main/ai_under_the_hood)上找到完整的代码。*'
- en: Summary
  id: totrans-204
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'It’s time to wrap things up. In this article, we started our journey into understanding
    how the magic of agentic AI systems works. To figure it out, we’ll implement a
    multi-agent text-to-data tool using only API calls to foundation models. Along
    the way, we’ll walk through the key design patterns step by step: starting today
    with reflection, and moving on to tool use, planning, and multi-agent coordination.'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候总结一下了。在这篇文章中，我们开始了了解代理人工智能系统魔法之旅。为了弄清楚这一点，我们将仅使用API调用基础模型来实现一个多代理文本到数据工具。在这个过程中，我们将逐步介绍关键设计模式：从今天的反思开始，然后继续到工具使用、规划和多代理协调。
- en: In this article, we started with the most fundamental pattern — reflection.
    Reflection is at the core of any agentic flow, since the LLM needs to reflect
    on its progress toward achieving the end goal.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们从最基本的设计模式——反思开始。反思是任何代理流程的核心，因为LLM需要反思其实现最终目标的过程。
- en: 'Reflection is a relatively straightforward pattern. We simply ask the same
    or a different model to analyse the result and attempt to improve it. As we learned
    in practice, sharing external feedback with the model (like results from static
    checks or database output) significantly improves accuracy. Multiple research
    studies and our own experience with the text-to-SQL agent prove the benefits of
    reflection. However, these accuracy gains come at a cost: more tokens spent and
    higher latency due to multiple API calls.'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 反思是一个相对简单的模式。我们只是要求同一个或不同的模型分析结果并尝试改进它。正如我们在实践中所学到的，与模型共享外部反馈（如静态检查结果或数据库输出）可以显著提高准确率。多项研究和我们与文本到SQL代理的经验证明了反思的好处。然而，这些准确率的提升是有代价的：更多的令牌消耗和由于多次API调用而导致的更高延迟。
- en: '*Thank you for reading. I hope this article was insightful. Remember Einstein’s
    advice: “The important thing is not to stop questioning. Curiosity has its own
    reason for existing.” May your curiosity lead you to your next great insight.*'
  id: totrans-208
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*感谢您的阅读。希望这篇文章能给您带来启发。记住爱因斯坦的建议：“重要的是不要停止质疑。好奇心有其存在的理由。”愿你的好奇心引导你发现下一个伟大的洞察。*'
- en: Reference
  id: totrans-209
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: This article is inspired by the [“Agentic AI”](https://www.deeplearning.ai/courses/agentic-ai/)
    course by Andrew Ng from DeepLearning.AI.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章灵感来源于DeepLearning.AI的安德鲁·吴（Andrew Ng）的[“代理人工智能”（“Agentic AI”）](https://www.deeplearning.ai/courses/agentic-ai/)课程。
