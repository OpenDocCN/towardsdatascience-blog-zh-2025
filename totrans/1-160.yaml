  id: totrans-64
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: data = data[7:]
- en: 'elif data.startswith(''[PRE9]''):'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 'elif data.startswith(''[PRE9]''):'
- en: data = data[:-3]
  id: totrans-66
  prefs:
