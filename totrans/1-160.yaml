  prefs: []
  type: TYPE_NORMAL
- en: Check whether the query is syntactically correct and optimized for performance.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: Pay attention to nuances in data (especially time stamps types, whether to use
    total elapsed time or time in the air, etc).
  id: totrans-136
