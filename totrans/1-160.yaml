- en: Measuring quality
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Unfortunately, there’s no single correct answer in this situation, so we can’t
    just compare the SQL generated by the LLM to a reference answer. We need to come
    up with a way to measure quality.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are some aspects of quality that we can check with objective criteria,
    but to check whether the LLM returned the right answer, we’ll need to use an LLM.
    So I’ll use a combination of approaches:'
  prefs: []
  type: TYPE_NORMAL
- en: First, we’ll use objective criteria to check whether the correct format was
    specified in the SQL (we instructed the LLM to use `TabSeparatedWithNames`).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Second, we can execute the generated query and see whether ClickHouse returns
    an execution error.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, we can create an LLM judge that compares the output from the generated
    query to our reference answer and checks whether they differ.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s start by executing the SQL. It’s worth noting that our `get_clickhouse_data`
    function doesn’t throw an exception. Instead, it returns text explaining the error,
    which can be handled by the LLM later.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The next step is to create an LLM judge. For this, I’m using a chain‑of‑thought
    approach that prompts the LLM to provide its reasoning before giving the final
    answer. This gives the model time to think through the problem, which improves
    response quality.
  prefs: []
  type: TYPE_NORMAL
