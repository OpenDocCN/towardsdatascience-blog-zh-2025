- en: 'Agentic AI from First Principles: Reflection'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/agentic-ai-from-first-principles-reflection/](https://towardsdatascience.com/agentic-ai-from-first-principles-reflection/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1761260841645" class="mdspan-comment">Arthur C. Clarke’s
    Third Law</mdspan> says that “*any sufficiently advanced technology is indistinguishable
    from magic*”. That’s exactly how a lot of today’s AI frameworks feel. Tools like
    GitHub Copilot, Claude Desktop, OpenAI Operator, and Perplexity Comet are automating
    everyday tasks that would’ve seemed impossible to automate just five years ago.
    What’s even more remarkable is that with just a few lines of code, we can build
    our own sophisticated AI tools: ones that search through files, browse the web,
    click links, and even make purchases. It really does feel like magic.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Even though I [genuinely believe in data wizards](https://towardsdatascience.com/i-think-of-analysts-as-data-wizards-who-help-their-product-teams-solve-problems/),
    I don’t believe in magic. I find it exciting (and often helpful) to understand
    how things are actually built and what’s happening under the hood. That’s why
    I’ve decided to share a series of posts on agentic AI design concepts that’ll
    help you understand how all these magical tools actually work.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: 'To gain a deep understanding, we’ll build a multi-AI agent system from scratch.
    We’ll avoid using frameworks like CrewAI or smolagents and instead work directly
    with the foundation model API. Along the way, we’ll explore the fundamental agentic
    design patterns: reflection, tool use, planning, and multi-agent setups. Then,
    we’ll combine all this knowledge to build a multi-AI agent system that can answer
    complex data-related questions.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: As Richard Feynman put it, “*What I cannot create, I do not understand*.” So
    let’s start building! In this article, we’ll focus on the reflection design pattern.
    But first, let’s figure out what exactly reflection is.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: What reflection is
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s reflect on how we (humans) usually work on tasks. Imagine I need to share
    the results of a recent feature launch with my PM. I’ll likely put together a
    quick draft and then read it once or twice from beginning to end, ensuring that
    all parts are consistent, there’s enough information, and there are no typos.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: 'Or let’s take another example: writing a SQL query. I’ll either write it step
    by step, checking the intermediate results along the way, or (if it’s simple enough)
    I’ll draft it all at once, execute it, look at the result (checking for errors
    or whether the result matches my expectations), and then tweak the query based
    on that feedback. I might rerun it, check the result, and iterate until it’s right.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: So we rarely write long texts from top to bottom in one go. We usually circle
    back, review, and tweak as we go. These feedback loops are what help us improve
    the quality of our work.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c4ff4d0f8824b18665eb5d5b1566f33f.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: LLMs use a different approach. If you ask an LLM a question, by default, it
    will generate an answer token by token, and the LLM won’t be able to review its
    result and fix any issues. But in an agentic AI setup, we can create feedback
    loops for LLMs too, either by asking the LLM to review and improve its own answer
    or by sharing external feedback with it (like the results of a SQL execution).
    And that’s the whole point of reflection. It sounds pretty straightforward, but
    it can yield significantly better results.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: 'There’s a substantial body of research showing the benefits of reflection:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '**“**[**Self-Refine: Iterative Refinement with Self-Feedback**](https://arxiv.org/abs/2303.17651?utm_campaign=The%20Batch&utm_source=hs_email&utm_medium=email&_hsenc=p2ANqtz-9dHVnW1I1bA3sPBbsikjT165Qez3QiiAssknCERwgki818YHG7PyHOQSgg-nxKDa0BuE7B)**”**
    Madaan et al. (2023) showed that self-refinement improved performance by ~20%
    points across diverse tasks, ranging from dialogue response generation to mathematical
    reasoning.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/d3ded3c0e3caf2ef7fc58ae0a724d373.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
- en: 'Image from “[Self-Refine: Iterative Refinement with Self-Feedback](https://arxiv.org/abs/2303.17651?utm_campaign=The%20Batch&utm_source=hs_email&utm_medium=email&_hsenc=p2ANqtz-9dHVnW1I1bA3sPBbsikjT165Qez3QiiAssknCERwgki818YHG7PyHOQSgg-nxKDa0BuE7B),”
    Madaan et al.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: 'In **“**[**Reflexion: Language Agents with Verbal Reinforcement Learning**](https://arxiv.org/abs/2303.11366?utm_campaign=The%20Batch&utm_source=hs_email&utm_medium=email&_hsenc=p2ANqtz-9dHVnW1I1bA3sPBbsikjT165Qez3QiiAssknCERwgki818YHG7PyHOQSgg-nxKDa0BuE7B)**”**
    Shinn et al. (2023), the authors achieved a 91% pass@1 accuracy on the HumanEval
    coding benchmark, surpassing the previous state-of-the-art GPT-4, which scored
    just 80%. They also found that Reflexion significantly outperforms all baseline
    approaches on the HotPotQA benchmark (a Wikipedia-based Q&A dataset that challenges
    agents to parse content and reason over multiple supporting documents).'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/67f4dc9f4d3b70c0b2265b7a91457e2e.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
- en: 'Image from “[Reflexion: Language Agents with Verbal Reinforcement Learning](https://arxiv.org/abs/2303.11366?utm_campaign=The%20Batch&utm_source=hs_email&utm_medium=email&_hsenc=p2ANqtz-9dHVnW1I1bA3sPBbsikjT165Qez3QiiAssknCERwgki818YHG7PyHOQSgg-nxKDa0BuE7B),”
    Shinn et al.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '**“**[**CRITIC: Large Language Models Can Self-Correct with Tool-Interactive
    Critiquing**](https://arxiv.org/abs/2305.11738?utm_campaign=The%20Batch&utm_source=hs_email&utm_medium=email&_hsenc=p2ANqtz-9dHVnW1I1bA3sPBbsikjT165Qez3QiiAssknCERwgki818YHG7PyHOQSgg-nxKDa0BuE7B)**”**
    Gou et al. (2024), focuses on the impact of external feedback, enabling LLMs to
    use external tools to verify and correct their own outputs. This approach showed
    10–30% points improvement in accuracy on various tasks, from answering free-form
    questions to solving math problems.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Reflection is especially impactful in agentic systems because it can be used
    to course-correct at many steps of the process:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: When a user asks a question, the LLM can use reflection to evaluate whether
    the request is feasible.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当用户提出问题时，LLM 可以通过反思来评估请求是否可行。
- en: When the LLM puts together an initial plan, it can use reflection to double-check
    whether the plan makes sense and can help achieve the goal.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当 LLM 组装初始计划时，它可以使用反思来双重检查该计划是否合理并且有助于实现目标。
- en: After each execution step or tool call, the agent can evaluate whether it’s
    on track and whether it’s worth adjusting the plan.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每个执行步骤或工具调用之后，代理可以评估它是否在正确的轨道上，以及是否值得调整计划。
- en: When the plan is fully executed, the agent can reflect to see whether it has
    actually accomplished the goal and solved the task.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当计划完全执行后，代理可以反思以查看它是否实际上实现了目标并解决了任务。
- en: It’s clear that reflection can significantly improve accuracy. However, there
    are trade-offs worth discussing. Reflection might require multiple additional
    calls to the LLM and potentially other systems, which can lead to increased latency
    and costs. So in business cases, it’s worth considering whether the quality improvements
    justify the expenses and delays in the user flow.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 很明显，反思可以显著提高准确性。然而，也有一些值得讨论的权衡。反思可能需要多次额外的 LLM 调用，甚至可能需要其他系统，这可能导致延迟和成本的增加。因此，在商业案例中，考虑质量改进是否合理以及是否值得在用户流程中产生费用和延迟是值得的。
- en: Reflection in frameworks
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 框架中的反思
- en: Since there’s no doubt that reflection brings value to AI agents, it’s widely
    used in popular frameworks. Let’s look at some examples.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 由于毫无疑问，反思为 AI 代理带来了价值，因此在流行的框架中得到了广泛的应用。让我们看看一些例子。
- en: 'The idea of reflection was first proposed in the paper [“ReAct: Synergizing
    Reasoning and Acting in Language Models”](https://arxiv.org/abs/2210.03629) by
    Yao et al. (2022). ReAct is a framework that combines interleaving stages of Reasoning
    (reflection through explicit thought traces) and Acting (task-relevant actions
    in an environment). In this framework, reasoning guides the choice of actions,
    and actions produce new observations that inform further reasoning. The reasoning
    stage itself is a combination of reflection and planning.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '反思的想法最初在 Yao 等人（2022）的论文 [“ReAct: Synergizing Reasoning and Acting in Language
    Models”](https://arxiv.org/abs/2210.03629) 中提出。ReAct 是一个结合了推理（通过显式思维轨迹的反思）和行动（在环境中的与任务相关的行动）阶段的框架。在这个框架中，推理指导行动的选择，而行动产生新的观察结果，从而为进一步的推理提供信息。推理阶段本身是反思和计划的结合。'
- en: 'This framework became quite popular, so there are now several off-the-shelf
    implementations, such as:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这个框架变得非常流行，因此现在有几种现成的实现，例如：
- en: The [**DSPy**](https://dspy.ai/api/modules/ReAct/) framework by Databricks has
    a `ReAct` class,
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Databricks 的 [**DSPy**](https://dspy.ai/api/modules/ReAct/) 框架中有一个 `ReAct` 类，
- en: In [**LangGraph**](https://langchain-ai.github.io/langgraph/agents/agents/#1-install-dependencies),
    you can use the `create_react_agent` function,
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 [**LangGraph**](https://langchain-ai.github.io/langgraph/agents/agents/#1-install-dependencies)
    中，你可以使用 `create_react_agent` 函数，
- en: Code agents in the [**smolagents**](https://huggingface.co/docs/smolagents/conceptual_guides/react)
    library by HuggingFace are also based on the ReAct architecture.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: HuggingFace 库中的 [**smolagents**](https://huggingface.co/docs/smolagents/conceptual_guides/react)
    中的代码代理也是基于 ReAct 架构的。
- en: Reflection from scratch
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从零开始的反思
- en: Now that we’ve learned the theory and explored existing implementations, it’s
    time to get our hands dirty and build something ourselves. In the ReAct approach,
    agents use reflection at each step, combining planning with reflection. However,
    to understand the impact of reflection more clearly, we’ll look at it in isolation.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经学习了理论并探索了现有的实现，是时候动手自己构建一些东西了。在 ReAct 方法中，代理在每个步骤都使用反思，将计划与反思相结合。然而，为了更清楚地了解反思的影响，我们将单独考虑它。
- en: 'As an example, we’ll use text-to-SQL: we’ll give an LLM a question and expect
    it to return a valid SQL query. We’ll be working with [a flight delay dataset](https://www.kaggle.com/datasets/hrishitpatil/flight-data-2024)
    and the ClickHouse SQL dialect.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们将使用文本到 SQL：我们将给 LLM 一个问题，并期望它返回一个有效的 SQL 查询。我们将使用 [航班延误数据集](https://www.kaggle.com/datasets/hrishitpatil/flight-data-2024)
    和 ClickHouse SQL 语法。
- en: We’ll start by using direct generation without any reflection as our baseline.
    Then, we’ll try using reflection by asking the model to critique and improve the
    SQL, or by providing it with additional feedback. After that, we’ll measure the
    quality of our answers to see whether reflection actually leads to better results.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先使用没有反思的直接生成作为我们的基线。然后，我们将尝试通过要求模型批评和改进SQL，或者提供额外的反馈来使用反思。之后，我们将衡量我们答案的质量，看看反思是否真的导致了更好的结果。
- en: Direct generation
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 直接生成
- en: We’ll begin with the most straightforward approach, direct generation, where
    we ask the LLM to generate SQL that answers a user query.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先使用最直接的方法，直接生成，即要求LLM生成回答用户查询的SQL。
- en: '[PRE0]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: We need to specify the API Key for the Anthropic API.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要指定Anthropic API的API密钥。
- en: '[PRE1]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The next step is to initialise the client, and we’re all set.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是初始化客户端，我们一切准备就绪。
- en: '[PRE2]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Now we can use this client to send messages to the LLM. Let’s put together a
    function to generate SQL based on a user query. I’ve specified the system prompt
    with basic instructions and detailed information about the data schema. I’ve also
    created a function to send the system prompt and user query to the LLM.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以使用这个客户端向LLM发送消息。让我们编写一个基于用户查询生成SQL的函数。我已经指定了带有基本说明和数据模式详细信息的系统提示。我还创建了一个将系统提示和用户查询发送到LLM的函数。
- en: '[PRE3]''):'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE3]''):'
- en: sql = sql[:-3]
  id: totrans-47
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: sql = sql[:-3]
- en: if sql.startswith('[PRE4]
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: if sql.startswith('[PRE4]
- en: 'That’s it. Now let’s test our text-to-SQL solution. I’ve created a [small evaluation
    set](https://github.com/miptgirl/miptgirl_medium/blob/main/ai_under_the_hood/data/flight_data_qa_pairs.json)
    of 20 question-and-answer pairs that we can use to check whether our system is
    working well. Here’s one example:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样。现在让我们测试我们的文本到SQL解决方案。我创建了一个包含20个问答对的[小型评估集](https://github.com/miptgirl/miptgirl_medium/blob/main/ai_under_the_hood/data/flight_data_qa_pairs.json)，我们可以用它来检查我们的系统是否运行良好。这里有一个例子：
- en: '[PRE5]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Let’s use our text-to-SQL function to generate SQL for all user queries in the
    test set.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用我们的文本到SQL函数来生成测试集中所有用户查询的SQL语句。
- en: '[PRE6]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Now we have our answers, and the next step is to measure the quality.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了答案，下一步是衡量质量。
- en: Measuring quality
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 衡量质量
- en: Unfortunately, there’s no single correct answer in this situation, so we can’t
    just compare the SQL generated by the LLM to a reference answer. We need to come
    up with a way to measure quality.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，在这种情况下没有唯一的正确答案，所以我们不能仅仅将LLM生成的SQL与参考答案进行比较。我们需要想出一个方法来衡量质量。
- en: 'There are some aspects of quality that we can check with objective criteria,
    but to check whether the LLM returned the right answer, we’ll need to use an LLM.
    So I’ll use a combination of approaches:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用客观标准来检查一些质量方面，但为了检查LLM是否返回了正确答案，我们需要使用LLM。所以我会使用多种方法：
- en: First, we’ll use objective criteria to check whether the correct format was
    specified in the SQL (we instructed the LLM to use `TabSeparatedWithNames`).
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一，我们将使用客观标准来检查SQL中是否指定了正确的格式（我们指示LLM使用`TabSeparatedWithNames`）。
- en: Second, we can execute the generated query and see whether ClickHouse returns
    an execution error.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二，我们可以执行生成的查询，看看ClickHouse是否返回执行错误。
- en: Finally, we can create an LLM judge that compares the output from the generated
    query to our reference answer and checks whether they differ.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我们可以创建一个LLM评判器，该评判器将生成的查询的输出与我们的参考答案进行比较，并检查它们是否不同。
- en: Let’s start by executing the SQL. It’s worth noting that our `get_clickhouse_data`
    function doesn’t throw an exception. Instead, it returns text explaining the error,
    which can be handled by the LLM later.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先执行SQL。值得注意的是，我们的`get_clickhouse_data`函数不会抛出异常。相反，它返回解释错误的文本，这可以由LLM稍后处理。
- en: '[PRE7]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The next step is to create an LLM judge. For this, I’m using a chain‑of‑thought
    approach that prompts the LLM to provide its reasoning before giving the final
    answer. This gives the model time to think through the problem, which improves
    response quality.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是创建一个LLM评判器。为此，我正在使用一种思维链方法，该方法提示LLM在给出最终答案之前提供其推理。这给模型提供了思考问题的空间，从而提高了响应质量。
- en: '[PRE8]json''):'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE8]json''):'
