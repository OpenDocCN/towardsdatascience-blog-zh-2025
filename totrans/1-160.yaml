  id: totrans-203
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*你可以在[GitHub](https://github.com/miptgirl/miptgirl_medium/tree/main/ai_under_the_hood)上找到完整的代码。*'
- en: Summary
  id: totrans-204
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'It’s time to wrap things up. In this article, we started our journey into understanding
    how the magic of agentic AI systems works. To figure it out, we’ll implement a
    multi-agent text-to-data tool using only API calls to foundation models. Along
    the way, we’ll walk through the key design patterns step by step: starting today
    with reflection, and moving on to tool use, planning, and multi-agent coordination.'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候总结一下了。在这篇文章中，我们开始了了解代理人工智能系统魔法之旅。为了弄清楚这一点，我们将仅使用API调用基础模型来实现一个多代理文本到数据工具。在这个过程中，我们将逐步介绍关键设计模式：从今天的反思开始，然后继续到工具使用、规划和多代理协调。
- en: In this article, we started with the most fundamental pattern — reflection.
    Reflection is at the core of any agentic flow, since the LLM needs to reflect
    on its progress toward achieving the end goal.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们从最基本的设计模式——反思开始。反思是任何代理流程的核心，因为LLM需要反思其实现最终目标的过程。
- en: 'Reflection is a relatively straightforward pattern. We simply ask the same
    or a different model to analyse the result and attempt to improve it. As we learned
    in practice, sharing external feedback with the model (like results from static
    checks or database output) significantly improves accuracy. Multiple research
    studies and our own experience with the text-to-SQL agent prove the benefits of
    reflection. However, these accuracy gains come at a cost: more tokens spent and
    higher latency due to multiple API calls.'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 反思是一个相对简单的模式。我们只是要求同一个或不同的模型分析结果并尝试改进它。正如我们在实践中所学到的，与模型共享外部反馈（如静态检查结果或数据库输出）可以显著提高准确率。多项研究和我们与文本到SQL代理的经验证明了反思的好处。然而，这些准确率的提升是有代价的：更多的令牌消耗和由于多次API调用而导致的更高延迟。
- en: '*Thank you for reading. I hope this article was insightful. Remember Einstein’s
    advice: “The important thing is not to stop questioning. Curiosity has its own
    reason for existing.” May your curiosity lead you to your next great insight.*'
  id: totrans-208
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*感谢您的阅读。希望这篇文章能给您带来启发。记住爱因斯坦的建议：“重要的是不要停止质疑。好奇心有其存在的理由。”愿你的好奇心引导你发现下一个伟大的洞察。*'
