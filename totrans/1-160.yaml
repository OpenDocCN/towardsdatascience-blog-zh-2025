- en: Let’s refine the queries with reflection and measure the accuracy. We don’t
    see much improvement in the final quality. We’re still at 70% correct answers.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过反思和测量来优化查询，我们并没有看到最终质量有太多提升。我们仍然保持在70%的正确答案率。
- en: '![](../Images/1a556089cb4524fb1fba019d45436f70.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1a556089cb4524fb1fba019d45436f70.png)'
- en: Image by author
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: Let’s look at specific examples to understand what happened. First, there are
    a couple of cases where the LLM managed to fix the problem, either by correcting
    the format or by adding missing logic to handle zero values.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看具体的例子来了解发生了什么。首先，有几个案例中，LLM设法解决了问题，要么通过纠正格式，要么通过添加处理零值的缺失逻辑。
- en: '![](../Images/09249240b67e1f8873c5d5c56bdaf045.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/09249240b67e1f8873c5d5c56bdaf045.png)'
- en: Image by author
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: 'However, there are also cases where the LLM overcomplicated the answer. The
    initial SQL was correct (matching the golden set answer), but then the LLM decided
    to ‘improve’ it. Some of these improvements are reasonable (e.g., accounting for
    nulls or excluding cancelled flights). Still, for some reason, it decided to use
    ClickHouse sampling, even though we don’t have much data and our table doesn’t
    support sampling. As a result, the refined query returned an execution error:
    `Database returned the following error: Code: 141\. DB::Exception: Storage default.flight_data
    doesn''t support sampling. (SAMPLING_NOT_SUPPORTED)`.'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，也有一些案例，LLM的回答过于复杂。最初的SQL是正确的（与黄金集答案匹配），但随后LLM决定“改进”它。其中一些改进是合理的（例如，考虑空值或排除已取消的航班）。然而，出于某种原因，它决定使用ClickHouse采样，尽管我们没有太多数据，而且我们的表不支持采样。结果，优化的查询返回了执行错误：`数据库返回以下错误：代码：141。DB::Exception：默认.flight_data存储不支持采样。（SAMPLING_NOT_SUPPORTED）`。
- en: '![](../Images/523f6e5bd49e6bfbbe7ea717daa00206.png)'
  id: totrans-177
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/523f6e5bd49e6bfbbe7ea717daa00206.png)'
- en: Image by author
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: Reflection with external feedback
  id: totrans-179
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带有外部反馈的反思
- en: 'Reflection didn’t improve accuracy much. This is likely because we didn’t provide
    any additional information that would help the model generate a better result.
    Let’s try sharing external feedback with the model:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 反思并没有显著提高准确度。这可能是由于我们没有提供任何有助于模型生成更好结果的信息。让我们尝试与模型分享外部反馈：
- en: The result of our check on whether the format is specified correctly
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 我们检查格式是否正确的结果
- en: The output from the database (either data or an error message)
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 数据库的输出（无论是数据还是错误消息）
- en: Let’s put together a prompt for this and generate a new version of the SQL.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们为这个任务准备一个提示并生成一个新的SQL版本。
- en: '[PRE16]json''):'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE16]json''):'
- en: data = data[7:]
  id: totrans-185
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: data = data[7:]
- en: 'elif data.startswith(''[PRE17]''):'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 'elif data.startswith(''[PRE17]''):'
- en: data = data[:-3]
  id: totrans-187
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: data = data[:-3]
- en: data = data.strip()
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: data = data.strip()
