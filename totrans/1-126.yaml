- en: Why Nonparametric Models Deserve a Second Look
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么非参数模型值得再次审视
- en: 原文：[https://towardsdatascience.com/why-nonparametric-models-deserve-a-second-look/](https://towardsdatascience.com/why-nonparametric-models-deserve-a-second-look/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-nonparametric-models-deserve-a-second-look/](https://towardsdatascience.com/why-nonparametric-models-deserve-a-second-look/)
- en: <mdspan datatext="el1762366983119" class="mdspan-comment">Nonparametric models</mdspan>
    don’t always get the credit they deserve. Methods like *k*-nearest neighbors (*k*-NN)
    and kernel density estimators are sometimes dismissed as simple or old-fashioned,
    but their real strength is in estimating conditional relationships directly from
    data, without imposing a fixed functional form. This flexibility makes them interpretable
    and powerful, especially when data are limited or when we want to incorporate
    domain knowledge.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762366983119" class="mdspan-comment">非参数模型</mdspan>并不总是得到应有的认可。像*k*-最近邻（*k*-NN）和核密度估计器这样的方法有时被认为简单或过时，但它们的真正优势在于直接从数据中估计条件关系，而不强加固定的函数形式。这种灵活性使它们易于解释且功能强大，尤其是在数据有限或我们希望结合领域知识时。
- en: In this article, I’ll show how nonparametric methods provide a unified foundation
    for conditional inference, covering regression, classification, and even synthetic
    data generation. Using the classic Iris dataset as a running example, I’ll illustrate
    how to estimate conditional distributions in practice and how they can support
    a wide range of data science tasks.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将展示非参数方法如何为条件推理提供一个统一的基础，涵盖回归、分类，甚至合成数据生成。以经典的Iris数据集为例，我将说明如何在实践中估计条件分布，以及它们如何支持广泛的数据科学任务。
- en: Estimating Conditional Distributions
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 估计条件分布
- en: 'The key idea is simple: instead of predicting just a single number or class
    label, we estimate the full range of possible outcomes for a variable given some
    other information. In other words, rather than focusing only on the expected value,
    we capture the entire probability distribution of outcomes that could occur under
    similar conditions.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 关键思想很简单：我们不是只预测一个数字或类别标签，而是根据某些其他信息估计变量的所有可能结果的范围。换句话说，我们不仅关注期望值，还捕捉在相似条件下可能发生的所有结果的整个概率分布。
- en: 'To do this, we look at data points close to the situation we are interested
    in; that is, those with conditioning variables near our query point in feature
    space. Each point contributes to the estimate, with its influence weighted by
    similarity: points closer to the query have more impact, while more distant points
    count less. By aggregating these weighted contributions, we obtain a smooth, data-driven
    estimate of how the target variable behaves across different contexts.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，我们关注那些接近我们感兴趣情况的数值点；也就是说，那些在特征空间中与我们的查询点附近具有条件变量的点。每个点都对估计有贡献，其影响由相似性加权：靠近查询点的点有更大的影响，而较远的点影响较小。通过汇总这些加权贡献，我们获得一个平滑、数据驱动的估计，了解目标变量在不同情境下的行为。
- en: This approach allows us to go beyond point predictions to a richer understanding
    of uncertainty, variability, and structure in the data.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法使我们能够超越点预测，对数据中的不确定性、可变性和结构有更深入的理解。
- en: 'Continuous Target: Conditional Density Estimation'
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 连续目标：条件密度估计
- en: 'To make this concrete, let’s take two continuous variables from the Iris dataset:
    sepal length (*x*[1]) as the conditioning variable and petal length (*y*) as the
    target. For each value of *x*[1], we look at nearby data points and form a density
    over their *y*-values by centering small, weighted kernels on them, with weights
    reflecting proximity in sepal length. The result is a smooth estimate of the conditional
    density *p*(*y* ∣ *x*[1]).'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这一点具体化，让我们从Iris数据集中取两个连续变量：花瓣长度（*x*[1]）作为条件变量，花瓣长度（*y*）作为目标。对于*x*[1]的每个值，我们查看附近的数据点，并通过在它们上中心化小的加权核来形成它们的*y*-值的密度，权重反映了花瓣长度的接近程度。结果是条件密度*p*(*y*
    ∣ *x*[1])的平滑估计。
- en: Figure 1 shows the resulting conditional distribution. At each value of *x*[1],
    a vertical slice through the color map represents *p*(*y* ∣ *x*[1]). From this
    distribution we can compute statistics such as the mean or mode; we can also sample
    a random value, a key step for synthetic data generation. The figure also shows
    the mode regression curve, which passes through the peaks of these conditional
    distributions. Unlike a traditional least-squares fit, this curve comes directly
    from the local conditional distributions, naturally adapting to nonlinearity,
    skew, or even multimodal patterns.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图1显示了得到的条件分布。在 *x*[1] 的每个值处，颜色图中的垂直切片代表 *p*(*y* ∣ *x*[1])。从这个分布中，我们可以计算诸如均值或众数之类的统计量；我们还可以采样一个随机值，这是合成数据生成的一个关键步骤。该图还显示了回归曲线，它穿过这些条件分布的峰值。与传统的最小二乘拟合不同，这条曲线直接来自局部条件分布，自然适应非线性、偏斜甚至多模态模式。
- en: '![](../Images/496ec8ffb78a2744b0ba96edaeb52659.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/496ec8ffb78a2744b0ba96edaeb52659.png)'
- en: '**Figure 1\.** Conditional distribution and mode regression curve of petal
    length given sepal length for the Iris dataset (Image by Author).'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1**. 鸢尾花数据集中给定萼片长度的花瓣长度的条件分布和回归曲线（图片由作者提供）。'
- en: '**What if we have more than one conditioning variable?** For example, suppose
    we want to estimate *p*(*y* ∣ *x*[1], *x*[2]).'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果我们有多个条件变量会怎样呢？** 例如，假设我们想要估计 *p*(*y* ∣ *x*[1], *x*[2])。'
- en: 'Rather than treating (*x*[1]​, *x*[2]) as a single joint input and applying
    a two-dimensional kernel, we can construct this distribution sequentially:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是将 (*x*[1]​, *x*[2]) 作为单个联合输入并应用二维核，而是可以按顺序构建这个分布：
- en: '*p*(*y* ∣ *x*[1], *x*[2]) ∝ *p*(*y* ∣ *x*[2]) *p*(**x*[2]* ∣ *x*[1]),'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '*p*(*y* ∣ *x*[1], *x*[2]) ∝ *p*(*y* ∣ *x*[2]) *p*(**x*[2]* ∣ *x*[1])'
- en: 'which effectively assumes that once *x*[2]​ is known, *y* depends primarily
    on *x*[2] rather than directly on *x*[1]. This step-by-step approach captures
    the conditional structure gradually: dependencies among the predictors are modeled
    first, and these are then linked to the target.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法有效地假设一旦知道 *x*[2]​，*y* 主要依赖于 *x*[2] 而不是直接依赖于 *x*[1]。这种逐步方法逐渐捕捉条件结构：首先对预测变量之间的依赖关系进行建模，然后将这些关系与目标变量相连接。
- en: Similarity weights are always computed in the subspace of the relevant conditioning
    variables. For example, if we were estimating *p*(**x**[3]∣ *x*[1], *x*[2]), similarity
    would be determined using *x*[1] and *x*[2]. This ensures that the conditional
    distribution adapts precisely to the chosen predictors.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 相似度权重总是在相关条件变量的子空间中计算。例如，如果我们正在估计 *p*(**x**[3]∣ *x*[1], *x*[2])，则相似度将使用 *x*[1]
    和 *x*[2] 来确定。这确保了条件分布能够精确地适应所选的预测变量。
- en: 'Categorical Target: Conditional Class Probabilities'
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分类目标：条件类概率
- en: We can apply the same principle of conditional estimation when the target variable
    is categorical. For example, suppose we want to predict the species *y* of an
    Iris flower given its sepal length (*x*[1]) and petal length (*x*[2]). For each
    class *y* = *c*, we use sequential estimation to estimate the joint distribution
    *p*(*x*[1], *x*[2] | *y* = *c*). These joint distributions are then combined using
    Bayes’ theorem to obtain the conditional probabilities *p*(*y* = *c* ∣ *x*[1]​,
    *x*[2]​), which can be used for classification or stochastic sampling.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当目标变量是分类变量时，我们可以应用相同的条件估计原理。例如，假设我们想要根据鸢尾花的萼片长度 (*x*[1]) 和花瓣长度 (*x*[2]) 来预测其物种
    *y*。对于每个类别 *y* = *c*，我们使用顺序估计来估计联合分布 *p*(*x*[1], *x*[2] | *y* = *c*)。然后使用贝叶斯定理将这些联合分布结合起来，以获得条件概率
    *p*(*y* = *c* ∣ *x*[1]​, *x*[2]​)，这些概率可以用于分类或随机抽样。
- en: Figure 2, panels 1–3, show the estimated joint distributions for each species.
    From these, we can classify by selecting the most probable species or generate
    random samples according to the estimated probabilities. The fourth panel displays
    the predicted class boundaries, which appear smooth rather than abrupt, reflecting
    uncertainty where species overlap.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图2的面板1–3显示了每种物种的联合分布估计。从这些分布中，我们可以通过选择最可能的物种或根据估计的概率生成随机样本来进行分类。第四面板显示了预测的分类边界，这些边界看起来比较平滑而不是突然的，反映了物种重叠时的不确定性。
- en: '![](../Images/986b98ade76c32ec866e31176c9bc75b.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/986b98ade76c32ec866e31176c9bc75b.png)'
- en: '**Figure 2.** Class probability landscape for the Iris dataset. Panels 1–3
    show the estimated joint distributions for each species: Setosa, Versicolor, and
    Virginica. Panel 4 displays the predicted class boundaries. (Image by Author)'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**图2**. Iris数据集的分类概率景观。面板1–3显示了每种物种的联合分布估计：Setosa、Versicolor和Virginica。面板4显示了预测的分类边界。（图片由作者提供）'
- en: Synthetic Data Generation
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合成数据生成
- en: Nonparametric conditional distributions do more than support regression or classification.
    They also let us generate entirely new datasets that preserve the structure of
    the original data. In the sequential approach, we model each variable based on
    the ones that come before it, then draw values from these estimated conditional
    distributions to build synthetic records. Repeating this process gives us a full
    synthetic dataset that maintains the relationships among all the attributes.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 非参数条件分布不仅支持回归或分类，还允许我们生成全新的数据集，这些数据集保留了原始数据的结构。在顺序方法中，我们根据前面的变量来建模每个变量，然后从这些估计的条件分布中抽取值来构建合成记录。重复此过程，我们可以得到一个完整的合成数据集，它保持了所有属性之间的关系。
- en: 'The procedure works as follows:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 该过程如下：
- en: Start with one variable and sample from its marginal distribution.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从一个变量开始，并从其边缘分布中进行采样。
- en: For each subsequent variable, estimate its conditional distribution given the
    variables already sampled.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于每个后续变量，估计其在已采样变量条件下的条件分布。
- en: Draw a value from this conditional distribution.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从这个条件分布中抽取一个值。
- en: Repeat until all variables have been sampled to form a complete synthetic record.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复直到所有变量都已采样，形成一个完整的合成记录。
- en: Figure 3 shows the original (left) and synthetic (right) Iris datasets in the
    original measurement space. Only three of the four continuous attributes are displayed
    to fit the 3D visualization. The synthetic dataset closely reproduces the patterns
    and relationships in the original, showing that nonparametric conditional distributions
    can effectively capture multivariate structure.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图3显示了原始（左侧）和合成（右侧）的鸢尾花数据集在原始测量空间中的表示。仅显示四个连续属性中的三个，以适应3D可视化。合成数据集紧密地复制了原始数据中的模式和关系，表明非参数条件分布可以有效地捕捉多元结构。
- en: '![](../Images/8fe33915ea676b7425069cbbb68d111d.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8fe33915ea676b7425069cbbb68d111d.png)'
- en: '**Figure 3.** Original and synthetic Iris data in original space (three continuous
    attributes shown) (Image by Author).'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**图3**. 原始和合成鸢尾花数据在原始空间中的表示（显示三个连续属性）（图片由作者提供）。'
- en: Although we’ve illustrated the approach with the small, low-dimensional Iris
    dataset, this nonparametric framework scales naturally to much larger and more
    complex datasets, including those with a mix of numerical and categorical variables.
    By estimating conditional distributions step by step, it captures rich relationships
    among many features, making it broadly useful across modern data science tasks.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们用小型的低维度的鸢尾花数据集说明了这种方法，但这种非参数框架可以自然地扩展到更大、更复杂的数据集，包括那些包含数值和分类变量的混合数据集。通过逐步估计条件分布，它捕捉了许多特征之间的丰富关系，使其在现代数据科学任务中具有广泛的应用价值。
- en: Handling Mixed Attributes
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理混合属性
- en: So far, our examples have considered conditional estimation with continuous
    conditioning variables, even though the target may be either continuous or categorical.
    In these cases, Euclidean distance works well as a measure of similarity. In practice,
    however, we often need to condition on mixed attributes, which requires a suitable
    distance metric. For such datasets, measures like Gower distance can be used.
    With an appropriate similarity metric, the nonparametric framework applies seamlessly
    to heterogeneous data, maintaining its ability to estimate conditional distributions
    and generate realistic synthetic samples.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们的例子考虑了具有连续条件变量的条件估计，尽管目标可能是连续的或分类的。在这些情况下，欧几里得距离作为相似度的度量效果很好。然而，在实践中，我们经常需要根据混合属性进行条件化，这需要一个合适的距离度量。对于这样的数据集，可以使用如Gower距离这样的度量。有了适当的相似度度量，非参数框架可以无缝地应用于异构数据，保持其估计条件分布和生成真实合成样本的能力。
- en: Advantages of the Sequential Approach
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 顺序方法的优点
- en: An alternative to sequential estimation is to model distributions jointly over
    all conditioning variables. This can be done using multidimensional kernels centered
    at the data points, or through a mixture model, for example representing the distribution
    with *N* Gaussians, where *N* is much smaller than the number of data points.
    While this works in low dimensions (it would work for the Iris dataset), it quickly
    becomes data-intensive, computationally costly, and sparse as the number of variables
    increases, especially when predictors include both numeric and categorical types.
    The sequential approach sidesteps these issues by modeling dependencies step by
    step and computing similarity only in the relevant subspace, improving efficiency,
    scalability, and interpretability.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 序列估计的替代方法是联合所有条件变量建模分布。这可以通过以数据点为中心的多维核来实现，或者通过混合模型，例如用*N*个高斯分布来表示分布，其中*N*远小于数据点的数量。虽然这在低维情况下有效（适用于爱丽丝数据集），但随着变量数量的增加，它很快变得数据密集、计算成本高且稀疏，特别是当预测变量包括数值和分类类型时。通过逐步建模依赖关系并在相关子空间中计算相似度，序列方法避免了这些问题，提高了效率、可扩展性和可解释性。
- en: Conclusion
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Nonparametric methods are flexible, interpretable, and efficient, making them
    ideal for estimating conditional distributions and generating synthetic data.
    By focusing on local neighborhoods in the conditioning space, they capture complex
    dependencies directly from the data without relying on strict parametric assumptions.
    You can also bring in domain knowledge in subtle ways, such as adjusting similarity
    measures or weighting schemes to emphasize important features or known relationships.
    This keeps the model primarily data-driven while guided by prior insights, producing
    more realistic outcomes.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 非参数方法灵活、可解释且高效，非常适合估计条件分布和生成合成数据。通过关注条件空间中的局部邻域，它们可以直接从数据中捕获复杂的依赖关系，而不依赖于严格的参数假设。你还可以以微妙的方式引入领域知识，例如调整相似度度量或加权方案，以强调重要特征或已知关系。这使模型主要基于数据驱动，同时受到先验洞察的引导，产生更真实的结果。
