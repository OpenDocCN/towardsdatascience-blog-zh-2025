- en: Advanced Topic Modeling with LLMs
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 LLMs 进行高级主题建模
- en: 原文：[https://towardsdatascience.com/advanced-topic-modeling-with-llms/](https://towardsdatascience.com/advanced-topic-modeling-with-llms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/advanced-topic-modeling-with-llms/](https://towardsdatascience.com/advanced-topic-modeling-with-llms/)
- en: <mdspan datatext="el1752776036552" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752776036552" class="mdspan-comment">简介</mdspan>
- en: This article is a continuation of topic modeling open-source intelligence (OSINT)
    from the OpenAlex API. In a previous article, I give an introduction into topic
    modeling, the data used, and a traditional NLP approach using Latent Dirichlet
    Allocation (LDA).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本文是关于从 OpenAlex API 开源情报（OSINT）主题建模的延续。在之前的一篇文章中，我介绍了主题建模、所使用的数据以及使用潜在狄利克雷分配（LDA）的传统自然语言处理（NLP）方法。
- en: '*See the previous article here:*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*参见之前的文章：*'
- en: '[Topic Modeling Open-Source Research with the OpenAlex API](https://towardsdatascience.com/topic-modeling-open-source-research-with-the-openalex-api-5191c7db9156/)'
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用 OpenAlex API 进行主题建模开源研究](https://towardsdatascience.com/topic-modeling-open-source-research-with-the-openalex-api-5191c7db9156/)'
- en: This article uses a more advanced approach of topic modeling by leveraging representation
    models, generative AI, and other advanced techniques. **We leverage BERTopic to
    bring several models together into one pipeline, visualize our topics, and explore
    variations of topic models.**
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本文通过利用表示模型、生成式 AI 和其他高级技术，采用了一种更高级的主题建模方法。**我们利用 BERTopic 将几个模型整合到一个流程中，可视化我们的主题，并探索主题模型的变体。**
- en: '![](../Images/1416962c4acb8bec1f346a589887ca76.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1416962c4acb8bec1f346a589887ca76.png)'
- en: Image by Author
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '*<mdspan datatext="el1753117843766" class="mdspan-comment">The data used comes
    from the OpenAlex API ([https://openalex.org/](https://openalex.org/)). This is
    a dataset/catalogue of open-source research from around the world. The data is
    freely accessible under a No Rights Reserved license (CC0 license).</mdspan>*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '*<mdspan datatext="el1753117843766" class="mdspan-comment">所使用的数据来自 OpenAlex
    API ([https://openalex.org/](https://openalex.org/))。这是一个来自世界各地的开源研究数据集/目录。数据在无保留权许可（CC0
    许可）下免费提供。</mdspan>*'
- en: '* * *'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The BERTopic Pipeline
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: BERTopic 流程
- en: Using a traditional approach to topic modeling can be difficult, needing to
    build your own pipeline to clean your data, tokenize, lemmatize, create features,
    etc. Traditional models like LDA or LSA are also computationally expensive and
    often yield poor results.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 使用传统的主题建模方法可能很困难，需要构建自己的管道来清理数据、分词、词元化、创建特征等。传统的模型如 LDA 或 LSA 也计算成本高，并且通常结果不佳。
- en: '**BERTopic leverages the transformer architecture through embedding models,
    and incorporates other components like dimensionality reduction and topic representation
    models, to create high-performing topic models.** BERTopic also provides variations
    of models to fit a variety of data and use cases, visualizations to explore results,
    and more.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**BERTopic 通过嵌入模型利用 Transformer 架构，并整合了其他组件如降维和主题表示模型，以创建高性能的主题模型。** BERTopic
    还提供了多种模型变体以适应各种数据和用例，可视化结果，以及更多功能。'
- en: '![](../Images/92f02b547867d9aa262bc66880fda71e.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/92f02b547867d9aa262bc66880fda71e.png)'
- en: Image by Author
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '**The biggest advantage of BERTopic is its modularity.** Seen above, the pipeline
    is comprised of several different models:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**BERTopic 的最大优势是其模块化。** 如上图所示，该流程由几个不同的模型组成：'
- en: Embedding model
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 嵌入模型
- en: Dimensionality Reduction model
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 降维模型
- en: Clustering model
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聚类模型
- en: Tokenizer
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分词器
- en: Weighting Scheme
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 权重方案
- en: Representation model (optional)
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表示模型（可选）
- en: Therefore, we can experiment with different models in each component, each with
    its own parameters. For example, we can try different embedding models, switch
    the dimensionality reduction from PCA to UMAP, or try fine-tuning the parameters
    on our clustering model. This is a huge advantage that allows us to fit a topic
    model to our data and use case.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以对每个组件中的不同模型进行实验，每个模型都有自己的参数。例如，我们可以尝试不同的嵌入模型，将降维从 PCA 切换到 UMAP，或者尝试微调我们的聚类模型的参数。这是允许我们将主题模型适应我们的数据和用例的一个巨大优势。
- en: '* * *'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: First, we need to import to necessary modules. Most of these are to build the
    components of our BERTopic model.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要导入必要的模块。其中大部分是为了构建我们的 BERTopic 模型的组件。
- en: '[PRE0]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Embedding Model
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 嵌入模型
- en: The main component of the BERTopic model is the embedding model. First, we initialize
    the model using the sentence transformer. You can then specify the embedding model
    you would like to use.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: BERTopic模型的主要组成部分是嵌入模型。首先，我们使用sentence transformer初始化模型。然后，您可以指定您想要使用的嵌入模型。
- en: In this case, I am using a relatively small model (~30 million parameters).
    While we can probably get better results using larger embedding models, I decided
    to use a smaller model to emphasize speed in this pipeline. *You can find and
    compare embedding models based on their size, performance, intended use, etc.
    by using the MTEB leaderboard from Hugging Face (*[*https://huggingface.co/spaces/mteb/leaderboard*](https://huggingface.co/spaces/mteb/leaderboard)*).*
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我使用了一个相对较小的模型（约3000万个参数）。虽然我们可能使用更大的嵌入模型可以得到更好的结果，但我决定使用较小的模型来强调这个流程中的速度。*您可以通过使用Hugging
    Face的MTEB排行榜（[*https://huggingface.co/spaces/mteb/leaderboard*](https://huggingface.co/spaces/mteb/leaderboard)）来查找和比较基于大小、性能、预期用途等不同嵌入模型。*
- en: '[PRE1]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Once we run our model, we can use the .shape function to see the size of the
    vectors produced. Below, we can see that each embedding contains 384 values which
    make up the meaning of each document.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们运行了模型，我们可以使用.shape函数来查看产生的向量的尺寸。下面，我们可以看到每个嵌入包含384个值，这些值构成了每个文档的意义。
- en: '[PRE2]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Dimensionality Reduction Model
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 降维模型
- en: The next component of the BERTopic model is the dimensionality reduction model.
    As high-dimensional data can be troublesome to model, we can use a dimensionality
    reduction model to represent the embeddings in a lower dimensional representation
    without losing too much information.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: BERTopic模型的下一个组成部分是降维模型。由于高维数据建模可能很麻烦，我们可以使用降维模型来以较低维度的表示来表示嵌入，同时不会丢失过多的信息。
- en: '![](../Images/766b0340fd7eae8e62898b6ca5759e31.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/766b0340fd7eae8e62898b6ca5759e31.png)'
- en: Image by Author
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: There are several different types of dimensionality reduction models, with Principal
    Component Analysis (PCA) being the most popular. In this case, we will use a Uniform
    Manifold Approximation and Projection (UMAP) model. **The UMAP model is a non-linear
    model and is likely to better handle the complex relationships in our data better
    than PCA.**
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 存在几种不同的降维模型，主成分分析（PCA）是最受欢迎的。在这种情况下，我们将使用统一流形近似和投影（UMAP）模型。**UMAP模型是一个非线性模型，并且可能比PCA更好地处理我们数据中的复杂关系。**
- en: '[PRE3]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: It is important to note that dimensionality reduction is not a solve-all for
    high-dimensional data. Dimensionality reduction presents a tradeoff between speed
    and accuracy as information is lost. These models need to be well-thought out
    and experimented with to avoid losing too much information while maintaining speed
    and scalability.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，降维并不是解决高维数据的万能方法。降维在速度和准确性之间提供了一个权衡，因为信息会丢失。这些模型需要经过深思熟虑并经过实验，以避免在保持速度和可扩展性的同时丢失过多的信息。
- en: Clustering Model
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 聚类模型
- en: The third step is to use the reduced embeddings and create clusters. While clustering
    is not usually necessary for topic modeling, **we can leverage density-based clustering
    models to isolate outliers and eliminate noise in our data**. Below, we initialize
    the Hierarchical Density-Based Spatial Clustering of Applications with Noise (HDBSCAN)
    model and create our clusters.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 第三步是使用降维嵌入并创建聚类。虽然聚类对于主题建模通常不是必需的，但我们**可以利用基于密度的聚类模型来隔离异常值并消除数据中的噪声**。下面，我们初始化了层次密度空间聚类应用噪声（HDBSCAN）模型并创建了我们的聚类。
- en: '[PRE4]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: A density-based approach gives us a few advantages. Documents are not forced
    into clusters that they shouldn’t be assigned to, therefore isolating outliers
    and reducing noise in our data. Also, as opposed to centroid-based models, we
    do not specify the number of clusters, and clusters are more likely to be well-defined.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 基于密度的方法给我们带来了一些优势。文档不会被强制放入它们不应该被分配到的聚类中，因此隔离异常值并减少数据中的噪声。此外，与基于质心的模型不同，我们不需要指定聚类数量，聚类更有可能被很好地定义。
- en: '*See my guide to clustering algorithms:*'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '*查看我的聚类算法指南：*'
- en: '[A Guide to Clustering Algorithms](https://towardsdatascience.com/a-guide-to-clustering-algorithms-e28af85da0b7/)'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[聚类算法指南](https://towardsdatascience.com/a-guide-to-clustering-algorithms-e28af85da0b7/)'
- en: See the code below to visualize the results of the clustering model.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 查看下面的代码以可视化聚类模型的输出结果。
- en: '[PRE5]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/178b7ef86f0be4ca47c15ce1d38cef34.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/178b7ef86f0be4ca47c15ce1d38cef34.png)'
- en: Image by Author
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: We can see well-defined clusters that do not overlap. We can also see some smaller
    clusters group together to make up higher-level topics. Lastly, we can see several
    documents are greyed out and identified as outliers.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到定义良好的簇，它们之间没有重叠。我们还可以看到一些较小的簇聚集在一起，组成更高级的主题。最后，我们可以看到一些文档被灰色显示，并被识别为异常值。
- en: '* * *'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Creating a BERTopic Pipeline
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建BERTopic管道
- en: We now have the necessary components to build our BERTopic pipeline (embedding
    model, dimensionality reduction model, clustering model). We can use the models
    we have initialized and fit them to our data using the BERTopic function.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在拥有了构建BERTopic管道（嵌入模型、降维模型、聚类模型）所需的必要组件。我们可以使用我们已初始化并拟合数据的模型，使用BERTopic函数来调整这些模型。
- en: '[PRE6]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Since I know I ingested papers about human-machine interfaces (augmented reality,
    virtual reality), let’s see which topic align to the term “augmented reality”.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我知道我已摄入了关于人机界面（增强现实、虚拟现实）的论文，让我们看看哪些主题与“增强现实”这一术语相一致。
- en: '[PRE7]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: From the output above, we can see that topics 18, 3, 16, 24, and 12 highly align
    to the term “augmented reality”. **All these topic should (hopefully) contribute
    to the broader theme of augmented reality, but each cover a different aspect.**
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的输出中，我们可以看到主题18、3、16、24和12与术语“增强现实”高度一致。**所有这些主题（希望）都将为增强现实这一更广泛的主题做出贡献，但每个主题都涵盖不同的方面。**
- en: To confirm this, let’s investigate the topic representations. **A topic representation
    is a list of terms that aims to properly represent the underlying theme of the
    topic.** For example, the terms “cake”, “candles”, “family”, and “presents” may
    collectively represent the topic of birthdays or birthday parties.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确认这一点，让我们调查一下主题表示。**主题表示是一个术语列表，旨在恰当地表示主题的潜在主题。**例如，“蛋糕”、“蜡烛”、“家庭”和“礼物”这些术语可能共同代表生日或生日派对的议题。
- en: We can use the get_topic() function to investigate the representation of topic
    18.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用get_topic()函数来调查主题18的表示。
- en: '[PRE8]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/606854111652d5f35d4e32a275edf48e.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/606854111652d5f35d4e32a275edf48e.png)'
- en: Image by Author
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: In the above representation, we see some useful terms like “reality”, “virtual”,
    “augmented”, etc. However, this is not useful as a whole, as we see several stop
    words like “and” and “the”. This is because BERTopic uses Bag of Words as the
    default way to represent topics. This representation may also match other representations
    about augmented reality.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述表示中，我们可以看到一些有用的术语，如“现实”、“虚拟”、“增强”等。然而，作为一个整体，这并不有用，因为我们看到一些停用词，如“和”和“the”。这是因为BERTopic使用词袋作为表示主题的默认方式。这种表示也可能与其他关于增强现实的表示相匹配。
- en: '**Next, we will improve our BERTopic pipeline to create more meaningful topic
    representations that are give us more insight into these themes.**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**接下来，我们将改进我们的BERTopic管道，以创建更有意义的主题表示，这能让我们对这些主题有更深入的了解。**'
- en: '* * *'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Improving Topic Representations
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 改进主题表示
- en: We can improve the topic representations by adding a weighting scheme, which
    will highlight the most important terms and better differentiate our topics.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过添加一个加权方案来改进主题表示，这将突出显示最重要的术语，并更好地区分我们的主题。
- en: This does not replace the Bag of Words model, but improves upon it. Below we
    add a TF-IDF model to better determine the importance of each term. We use the
    update_topics() function to update our pipeline.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不取代词袋模型，而是对其进行了改进。以下我们添加TF-IDF模型以更好地确定每个术语的重要性。我们使用update_topics()函数更新我们的管道。
- en: '[PRE9]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '[PRE10]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![](../Images/b60449fd3946e139ef5dd88bb3f29c1e.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b60449fd3946e139ef5dd88bb3f29c1e.png)'
- en: Image by Author
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: With TF-IDF, these topic representations are much more useful. We can see that
    the meaningless stop words are gone, other terms appear that help describe the
    topic, and terms are reordered by their importance.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 使用TF-IDF，这些主题表示变得更加有用。我们可以看到无意义的停用词已经消失，出现了其他有助于描述主题的术语，并且术语按照其重要性重新排序。
- en: But we do not have to stop here. Thanks to countless new developments in the
    world of AI and NLP, there are methods we can leverage to fine-tune these representations.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们不必止步于此。得益于AI和NLP领域无数新的发展，我们可以利用一些方法来微调这些表示。
- en: 'To fine-tune, we can take one of two approaches:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 为了微调，我们可以采取两种方法之一：
- en: A representation model
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表示模型
- en: A generative model
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成模型
- en: Fine-Tuning with a Representation Model
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用表示模型微调
- en: First, let’s add the KeyBERTInspired model as our representation model. **This
    leverages BERT to compare the semantic similarity of the TF-IDF representations
    with the documents themselves to better determine the relevance of each term,
    rather than the importance.**
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们添加 KeyBERTInspired 模型作为我们的表示模型。**这利用 BERT 来比较 TF-IDF 表示与文档本身的语义相似性，以更好地确定每个术语的相关性，而不是重要性。**
- en: '*See all representation model options here: *[*https://maartengr.github.io/BERTopic/getting_started/representation/representation.html#keybertinspired*](https://maartengr.github.io/BERTopic/getting_started/representation/representation.html#keybertinspired)'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '*所有表示模型选项请见此处：*[*https://maartengr.github.io/BERTopic/getting_started/representation/representation.html#keybertinspired*](https://maartengr.github.io/BERTopic/getting_started/representation/representation.html#keybertinspired)'
- en: '[PRE11]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '![](../Images/fe094ce3404f3d974b81faaeb9f9717e.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fe094ce3404f3d974b81faaeb9f9717e.png)'
- en: Image by Author
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Here, we see a fairly major change in the terms, with some additional terms
    and acronyms. Comparing this to the TF-IDF representation, we again get a better
    understanding of what this topic is about. Also notice that the scores changed
    from the TF-IDF weights, which did not have any meaning without context, to scores
    between 0–1\. These new scores represent the semantic similarity scores.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们可以看到术语发生了相当大的变化，增加了一些额外的术语和缩写。与 TF-IDF 表示进行比较，我们再次更好地理解了这个主题的内容。同时请注意，分数从
    TF-IDF 权重（在没有上下文的情况下没有意义）变为 0-1 之间的分数。这些新分数代表语义相似性分数。
- en: Topic Model Visualizations
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 主题模型可视化
- en: Before we move to generative models for fine-tuning, let’s explore some of the
    visualizations that BERTopic offers. Visualizing topic models is crucial in understanding
    your data and how the model is working.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们转向用于微调的生成模型之前，让我们探索 BERTopic 提供的一些可视化方法。可视化主题模型对于理解你的数据和模型的工作方式至关重要。
- en: First, we can visualize our topics in a 2-dimensional space, allowing us to
    see the size of topics and what other topics are similar. Below, we can see we
    have many topics, with clusters of topics making up larger themes. We can also
    see a topic that is large and isolated, indicating that there is a lot of similar
    research regarding crispr.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们可以在二维空间中可视化我们的主题，这样我们可以看到主题的大小以及哪些主题是相似的。下面，我们可以看到我们有很多主题，主题集群构成了更大的主题。我们还可以看到一个大型且孤立的主题，这表明关于
    crispr 的研究有很多相似之处。
- en: '![](../Images/5a51d0c4de027f7c15ece04b1bda9b85.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5a51d0c4de027f7c15ece04b1bda9b85.png)'
- en: Image by Author
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Let’s zoom into these clusters of topics to see how they break down higher-level
    themes. Below, we zoom into topics regarding augmented and virtual reality and
    see how some topics cover different domains and applications.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们放大这些主题集群，看看它们是如何分解成更高级主题的。下面，我们放大关于增强现实和虚拟现实的主题，看看一些主题是如何覆盖不同领域和应用的。
- en: '![](../Images/ef757f6991da50d2ce34aede148255cd.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ef757f6991da50d2ce34aede148255cd.png)'
- en: Image by Author
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '![](../Images/1883b754eb457b60c47277fa5992610b.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1883b754eb457b60c47277fa5992610b.png)'
- en: Image by Author
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: We can also quickly visualize the most important or most relevant terms in each
    topic. Again, this is dependent on your approach to the topic representations.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以快速可视化每个主题中最重要或最相关的术语。这同样取决于你对主题表示的方法。
- en: '![](../Images/66ecd85405fb5b5ff8f9727b527776ae.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/66ecd85405fb5b5ff8f9727b527776ae.png)'
- en: Image by Author
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: We can also use a heatmap to explore the similarity between topics.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以使用热图来探索主题之间的相似性。
- en: '![](../Images/b16d6c5a01ff061e794e02e75ca32b35.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b16d6c5a01ff061e794e02e75ca32b35.png)'
- en: Image by Author
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: These are just a few of the visualizations that BERTopic offers. *See the full
    list here: *[*https://maartengr.github.io/BERTopic/getting_started/visualization/visualization.html*](https://maartengr.github.io/BERTopic/getting_started/visualization/visualization.html)
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是 BERTopic 提供的几种可视化方法。*完整列表请见此处：*[*https://maartengr.github.io/BERTopic/getting_started/visualization/visualization.html*](https://maartengr.github.io/BERTopic/getting_started/visualization/visualization.html)
- en: Leveraging Generative Models
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用生成模型
- en: For our last step of fine-tuning our topic representations, we can leverage
    generative AI to produce representations that are coherent descriptions of the
    topic.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的最后一步微调主题表示时，我们可以利用生成式 AI 来生成对主题的连贯描述。
- en: '**BERTopic offers an easy way to leverage OpenAI’s GPT models to interact with
    the topic model. **We first establish a prompt that shows the model the data and
    the current representation of the topics. We then ask it to generate a short label
    for each topic.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '**BERTopic提供了一种简单的方法来利用OpenAI的GPT模型与主题模型进行交互。**我们首先创建一个提示，向模型展示数据和当前的主题表示。然后我们要求它为每个主题生成一个简短的标签。'
- en: We then initialize the client and model, and update our pipeline.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们初始化客户端和模型，并更新我们的管道。
- en: '[PRE12]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Now, let’s go back to the augmented reality topic.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们回到增强现实主题。
- en: '[PRE13]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The topic representation now reads “Comparative analysis of virtual and augmented
    reality for immersive analytics”. **The topic is now much more clear, as we can
    see the objectives, technologies, and domain included in these documents.**
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 主题表示现在读作“虚拟和增强现实沉浸式分析的比较分析”。**主题现在更加清晰，因为我们可以看到包含在这些文档中的目标、技术和领域。**
- en: Below is the full list of our new topic representations.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们新的主题表示的完整列表。
- en: '![](../Images/f1a220b6dcaff4169d165f640f782474.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f1a220b6dcaff4169d165f640f782474.png)'
- en: Image by Author
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: It does not take much code to see how powerful generative AI is in supporting
    our topic model and its representations. It is of course extremely important to
    dig deeper and validate these outputs as you build your model and to do plenty
    of experimentation with different models, parameters, and approaches.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 看看代码，我们就能看到生成式AI在支持我们的主题模型及其表示方面的强大功能。当然，在构建模型时深入挖掘并验证这些输出非常重要，同时进行大量的不同模型、参数和方法的实验。
- en: Leveraging Topic Models Variations
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用主题模型变体
- en: Lastly, BERTopic provides several variations of topic models to provide solutions
    for different data and use cases. These include time-series, hierarchical, supervised,
    semi-supervised, and many more.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，BERTopic提供了多种主题模型的变体，以提供针对不同数据和用例的解决方案。这些包括时间序列、分层、监督、半监督等。
- en: '*See the full list and documentation here: *[*https://maartengr.github.io/BERTopic/getting_started/topicsovertime/topicsovertime.html*](https://maartengr.github.io/BERTopic/getting_started/topicsovertime/topicsovertime.html)'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '*请在此处查看完整列表和文档：*[*https://maartengr.github.io/BERTopic/getting_started/topicsovertime/topicsovertime.html*](https://maartengr.github.io/BERTopic/getting_started/topicsovertime/topicsovertime.html)'
- en: Let’s quickly explore one of these possibilities with hierarchical topic modeling.
    Below, we create a linkage function using scipy, which establishes distances between
    our topics. We can easily fit it to our data and visualize the hierarchy of topics.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们快速探索分层主题建模中的一种可能性。下面，我们使用scipy创建一个链接函数，确定我们主题之间的距离。我们可以轻松地将它拟合到我们的数据并可视化主题的层次结构。
- en: '[PRE14]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '![](../Images/cd3a924b3f90753f73062d76ad32bd63.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cd3a924b3f90753f73062d76ad32bd63.png)'
- en: Image by Author
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: In the visualization above, we can see how topics put themselves together to
    create broader and broader topics. For example, we see topics 25 and 30 come together
    to form “Smart Cities and Sustainable Development”. This model provides an awesome
    capability of being able to zoom in and out and deciding how broad or narrow we
    would like our topics to be.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的可视化中，我们可以看到主题是如何组合在一起形成更广泛的主题的。例如，我们看到主题25和30结合形成“智能城市和可持续发展”。这个模型提供了强大的能力，能够放大和缩小，决定我们希望主题有多广泛或多狭窄。
- en: '* * *'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we got to see the power of BERTopic for topic modeling. BERTopics
    use of transformers and embedding models dramatically improves results from traditional
    approaches. The BERTopic pipeline also offers both power and modularity, leveraging
    several models and allowing you to plug-in other models to fit your data. All
    of these models can be fine-tuned and put together to create a powerful topic
    model.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们看到了BERTopic在主题建模方面的强大功能。BERTopic使用变压器和嵌入模型显著提高了传统方法的结果。BERTopic管道还提供了强大的功能和模块化，利用多个模型，并允许您插入其他模型以适应您的数据。所有这些模型都可以进行微调和组合，以创建一个强大的主题模型。
- en: You can also integrate representation and generative models to improve topic
    representations and improve interpretability. BERTopic also offers several visualizations
    to truly explore your data and validate your model. Lastly, BERTopic offers several
    variations of topic modeling, like time-series or hierarchical topic modeling,
    to better fit your use case.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以集成表示和生成模型来改进主题表示并提高可解释性。BERTopic还提供了几个可视化工具，以真正探索您的数据并验证您的模型。最后，BERTopic提供了多种主题建模的变体，如时间序列或分层主题建模，以更好地适应您的用例。
- en: '* * *'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '*I hope you have enjoyed my article! Please feel free to comment, ask questions,
    or request other topics.*'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '*希望您喜欢我的文章！请随时评论、提问或要求其他主题。*'
- en: '*Connect with me on LinkedIn: *[*https://www.linkedin.com/in/alexdavis2020/*](https://www.linkedin.com/in/alexdavis2020/)'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '*在LinkedIn上与我联系：*[*https://www.linkedin.com/in/alexdavis2020/*](https://www.linkedin.com/in/alexdavis2020/)'
