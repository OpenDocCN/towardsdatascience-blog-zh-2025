- en: “I think of analysts as data wizards who help their product teams solve problems”
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: “我认为分析师就像数据巫师，他们帮助他们的产品团队解决问题”
- en: 原文：[https://towardsdatascience.com/i-think-of-analysts-as-data-wizards-who-help-their-product-teams-solve-problems/](https://towardsdatascience.com/i-think-of-analysts-as-data-wizards-who-help-their-product-teams-solve-problems/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/i-think-of-analysts-as-data-wizards-who-help-their-product-teams-solve-problems/](https://towardsdatascience.com/i-think-of-analysts-as-data-wizards-who-help-their-product-teams-solve-problems/)
- en: '*In the Author Spotlight series, TDS Editors chat with members of our community
    about their career path in data science and AI, their writing, and their sources
    of inspiration. Today, we’re thrilled to share our conversation with* [*Mariya
    Mansurova*](http://towardsdatascience.com/author/miptgirl)*.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*在“作者聚焦”系列中，TDS编辑们与我们的社区成员交谈，了解他们在数据科学和AI领域的职业道路、他们的写作以及他们的灵感来源。今天，我们很高兴与*
    [*Mariya Mansurova*](http://towardsdatascience.com/author/miptgirl)** 进行对话。*'
- en: '*Mariya’s story is one of perpetual learning. Starting with a strong foundation
    in software engineering, mathematics, and physics, she’s spent more thanover 12
    years building expertise in product analytics across industries, from search engines
    and analytics platforms to fintech. Her unique path, including hands-on experience
    as a product manager, has given her a 360-degree view of how analytical teams
    can help businesses make the right decisions.*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*Mariya的故事是一段持续学习的旅程。从软件工程、数学和物理的坚实基础开始，她在过去12年多的时间里，在多个行业中积累了产品分析的专业知识，从搜索引擎和数据分析平台到金融科技。她独特的路径，包括作为产品经理的实践经验，使她能够全面了解分析团队如何帮助企业做出正确的决策。*'
- en: '*Now serving as a Product Analytics Manager, she draws energy from discovering
    fresh insights and innovative approaches. Each of her articles on Towards Data
    Science reflects her latest “aha!” moment: a testament to her belief that curiosity
    drives real progress.*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*现在担任产品分析经理，她从发现新的见解和创新方法中汲取能量。她在Towards Data Science上的每一篇文章都反映了她最新的“啊哈！”时刻：这是她对好奇心推动真正进步信念的证明。*'
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: You’ve written extensively about [agentic AI](https://towardsdatascience.com/code-agents-the-future-of-agentic-ai/)
    and frameworks like smolagents and LangGraph. What excites you most about this
    emerging space?
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你广泛地写关于[代理式AI](https://towardsdatascience.com/code-agents-the-future-of-agentic-ai/)和像smolagents和LangGraph这样的框架。你对这个新兴领域最感兴趣的是什么？
- en: I first started exploring generative AI largely out of curiosity and, admittedly,
    a bit of FOMO. Everyone around me seemed to be using LLMs or at least talking
    about them. So I carved out time to get hands-on, starting with the very basics
    like prompting techniques and LLM APIs. And the deeper I went, the more excited
    I became.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我最初开始探索生成式AI主要是出于好奇心，并且坦白说，还有一点恐惧错过（FOMO）。周围的人似乎都在使用LLMs或者至少在谈论它们。所以我抽出时间来亲自动手，从最基础的部分开始，比如提示技术（prompt
    techniques）和LLM API。越深入，我就越兴奋。
- en: What fascinates me the most is how agentic systems are shaping the way we live
    and work. I believe that this influence will only continue to grow over time.
    That’s why I use every chance to use agentic tools like Copilot or Claude Desktop
    or build my own agents using technologies like smolagents, LangGraph or CrewAI.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 最吸引我的是代理式系统正在塑造我们生活和工作的方式。我相信这种影响随着时间的推移只会继续增长。这就是为什么我抓住每一个机会使用像Copilot或Claude
    Desktop这样的代理式工具，或者使用smolagents、LangGraph或CrewAI等技术构建自己的代理。
- en: The most impactful use case of Agentic AI for me has been **coding**. It’s genuinely
    impressive how tools like GitHub Copilot can improve the speed and the quality
    of your work. While [recent research](https://metr.org/Early_2025_AI_Experienced_OS_Devs_Study.pdf)
    from METR has questioned whether the efficiency gains are truly that substantial,
    I definitely notice a difference in my day-to-day work. It’s especially helpful
    with repetitive tasks (like pivoting tables in SQL) or when working with unfamiliar
    technologies (like building a web app in TypeScript). Overall, I’d estimate about
    a 20% increase in speed. But this boost isn’t just about productivity; it’s a
    paradigm shift that also expands what feels possible. I believe that as agentic
    tools continue to evolve, we will see a growing efficiency gap between individuals
    and companies that have learned how to leverage these technologies and those that
    haven’t.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，Agentic AI最具有影响力的应用案例是**编码**。GitHub Copilot等工具如何提高工作效率和质量，这确实令人印象深刻。尽管METR最近的研究[《2025年早期AI经验开发者研究》](https://metr.org/Early_2025_AI_Experienced_OS_Devs_Study.pdf)质疑这些效率提升是否真的如此显著，但我确实在我的日常工作中感受到了差异。这对于重复性任务（如SQL中的表转换）或处理不熟悉的技术（如使用TypeScript构建Web应用）时尤其有帮助。总的来说，我估计速度提高了大约20%。但这种提升并不仅仅是关于生产力的；它也是一种范式转变，同时也扩展了可能性的感觉。我相信随着Agentic工具的持续发展，我们将看到那些学会如何利用这些技术的个人和公司，与那些没有学会的个人和公司之间效率差距的不断扩大。
- en: When it comes to analytics, I’m especially excited about automatic reporting
    agents. Imagine an AI that can pull the right data, create visualisations, perform
    root cause analysis where needed, note open questions and even create the first
    draft of the presentation. That would be just magical. I’ve built [a prototype](https://towardsdatascience.com/from-data-to-stories-code-agents-for-kpi-narratives/)
    that generates such KPI narratives. And even though there’s a significant gap
    between the prototype and a production solution that works reliably, I believe
    we will get there.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到分析时，我对自动报告代理特别兴奋。想象一下，一个能够提取正确数据、创建可视化、在需要时进行根本原因分析、记录开放问题，甚至创建演示文稿初稿的AI。那将是神奇的。我已经构建了一个[原型](https://towardsdatascience.com/from-data-to-stories-code-agents-for-kpi-narratives/)，它可以生成这样的KPI叙事。尽管原型与一个可靠的生产解决方案之间还有很大的差距，但我相信我们最终会实现这一点。
- en: You’ve written three articles under the “[Practical Computer Simulations for
    Product Analysts](https://towardsdatascience.com/practical-computer-simulations-for-product-analysts-90b5deb6a54e/)”
    series. What inspired that series, and how do you think simulation can reshape
    product analytics?
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你在“[产品分析师的实用计算机模拟](https://towardsdatascience.com/practical-computer-simulations-for-product-analysts-90b5deb6a54e/)”系列中写了三篇文章。是什么启发了这个系列，你认为模拟如何重塑产品分析？
- en: Simulation is a vastly underutilised tool in product analytics. I wrote this
    series to show people how powerful and accessible the simulations can be. In my
    day-to-day work, I keep encountering what-if questions like “*How many operational
    agents will we need if we add this KYC control?*” or *“What’s the likely impact
    of launching this feature in a new market?”*. You can simulate any system, no
    matter how complex. So, simulations gave me a way to answer those questions quantitatively
    and fairly accurately, even when hard data wasn’t yet available. So I’m hoping
    more analysts will start using this approach.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟在产品分析中是一个被广泛低估的工具。我写这个系列是为了向人们展示模拟的强大和易用性。在我的日常工作中，我经常遇到诸如“*如果我们添加这个KYC控制，我们需要多少操作代理？*”或“*在新的市场中推出这个功能可能产生什么影响？*”之类的假设性问题。你可以模拟任何系统，无论其多么复杂。因此，模拟为我提供了一种定量和相对准确回答这些问题的方法，即使当时还没有硬数据。所以我希望更多的分析师开始使用这种方法。
- en: Simulations also shine when working with uncertainty and distributions. Personally,
    I prefer bootstrap methods to memorising a long list of statistical formulas and
    significance criteria. Simulating the process often feels more intuitive, and
    it’s less error-prone in practice.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理不确定性和分布时，模拟也表现出色。我个人更喜欢使用自助方法，而不是记住长长的统计公式和显著性标准列表。在实际操作中，模拟过程通常感觉更直观，且更不容易出错。
- en: Finally, I find it fascinating how technologies have changed the way we do things.
    With today’s computing power, where any laptop can run thousands of simulations
    in minutes or even seconds, we can easily solve problems that would have been
    challenging just thirty years ago. That’s a game-changer for analysts.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我发现技术如何改变我们做事的方式非常迷人。凭借今天的计算能力，任何笔记本电脑都能在几分钟或几秒钟内运行数千次模拟，我们能够轻松解决仅仅三十年前就具有挑战性的问题。这对分析师来说是一个变革性的变化。
- en: Several of your posts focus on transitioning LLM applications from [prototype](https://towardsdatascience.com/from-prototype-to-production-enhancing-llm-accuracy-791d79b0af9b/)
    to [production](https://towardsdatascience.com/llm-evaluations-from-prototype-to-production/).
    What common pitfalls do you see teams make during that phase?
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 您的一些帖子专注于将LLM应用从[原型](https://towardsdatascience.com/from-prototype-to-production-enhancing-llm-accuracy-791d79b0af9b/)过渡到[生产](https://towardsdatascience.com/llm-evaluations-from-prototype-to-production/)。您在哪个阶段看到团队犯下了哪些常见的错误？
- en: Through practice, I’ve discovered there’s a significant gap between LLM prototypes
    and production solutions that many teams underestimate. The most common pitfall
    is treating prototypes as if they’re already production-ready.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实践，我发现LLM原型与生产解决方案之间存在显著的差距，许多团队低估了这一点。最常见的错误是将原型视为已经准备好投入生产。
- en: 'The prototype phase can be deceptively smooth. You can build something functional
    in an hour or two, test it on a handful of examples, and feel like you’ve cracked
    the problem. Prototypes are great tools to prove feasibility and get your team
    excited about the opportunities. But here’s where teams often stumble: these early
    versions provide no guarantees around consistency, quality, or safety when facing
    diverse, real-world scenarios.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 原型阶段可能看起来非常顺利。您可以在一两个小时之内构建一个功能性的产品，对几个示例进行测试，并感觉您已经解决了问题。原型是证明可行性和让团队对机会感到兴奋的绝佳工具。但这里往往是团队容易出错的地方：这些早期版本在面对多样化的真实世界场景时，无法保证一致性、质量或安全性。
- en: What I’ve learned is that successful production deployment starts with rigorous
    evaluation. Before scaling anything, you need clear definitions of what “good
    performance” looks like in terms of accuracy, tone of voice, speed and any other
    criteria specific to your use case. Then you need to track these metrics continuously
    as you iterate, ensuring you’re actually improving rather than just changing things.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我学到的是，成功的生产部署始于严格的评估。在扩展任何事物之前，您需要明确“良好性能”的定义，包括准确性、语气、速度以及任何特定于您用例的其他标准。然后，您需要在迭代过程中持续跟踪这些指标，确保您实际上是在改进而不是仅仅改变事物。
- en: 'Think of it like software testing: you wouldn’t ship code without proper testing,
    and LLM applications require the same systematic approach. This becomes especially
    crucial in regulated environments like fintech or healthcare, where you need to
    demonstrate reliability not just to your internal team but to compliance stakeholders
    as well.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 就像软件测试一样：您不会在没有适当测试的情况下发布代码，LLM应用也需要同样的系统化方法。这在像金融科技或医疗保健这样的监管环境中尤为重要，您需要向内部团队以及合规利益相关者证明可靠性。
- en: In these regulated spaces, you’ll need comprehensive monitoring, human-in-the-loop
    review processes, and audit trails that can withstand scrutiny. The infrastructure
    required to support all of this often takes far more development time than building
    the original MVP. That’s something that consistently surprises teams who focus
    primarily on the core functionality.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些监管领域，您需要全面的监控、人工审查流程和能够经得起审查的审计轨迹。支持所有这些所需的基础设施通常需要比构建原始MVP更多的发展时间。这是让专注于核心功能的团队感到惊讶的持续现象。
- en: Your articles sometimes blend engineering principles with data science/analytics
    best practices, such as your “[Top 10 engineering lessons every data analyst should
    know.](https://towardsdatascience.com/from-code-to-insights-software-engineering-best-practices-for-data-analysts-0dd6a2aaadfc/)”
    Do you think the line between data and engineering is blurring?
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 您的文章有时会将工程原理与数据科学/分析最佳实践相结合，例如您的“[每个数据分析师都应该知道的10个工程教训。](https://towardsdatascience.com/from-code-to-insights-software-engineering-best-practices-for-data-analysts-0dd6a2aaadfc/)”您认为数据与工程之间的界限是否正在模糊？
- en: The role of a data analyst or a data scientist today often requires a mix of
    skills from multiple disciplines.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 今天数据分析师或数据科学家的角色通常需要来自多个学科技能的混合。
- en: We write code, so we share common ground with software engineers.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们编写代码，因此我们与软件工程师有共同的基础。
- en: We help product teams think through strategy and make decisions, so product
    management skills are useful.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们帮助产品团队思考战略并做出决策，因此产品管理技能是有用的。
- en: We draw on statistics and data science to build rigorous and comprehensive analyses.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们利用统计学和数据科学来构建严格和全面的分析。
- en: And to make our narratives compelling and actually influence decisions, we need
    to master the art of communication and visualisation.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了使我们的叙述具有说服力并真正影响决策，我们需要掌握沟通和可视化的艺术。
- en: 'Personally, I was lucky to gain diverse programming skills early on, back at
    school and university. This background helped me tremendously in analytics: it
    increased my efficiency, helped me collaborate better with engineers and taught
    me how to build scalable and reliable solutions.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 个人而言，我很幸运在上学和大学时期就获得了多样化的编程技能。这个背景在数据分析方面极大地帮助了我：它提高了我的效率，帮助我与工程师更好地协作，并教会了我如何构建可扩展和可靠的解决方案。
- en: I strongly encourage analysts to adopt software engineering best practices.
    Things like version control systems, testing and code review help analytical teams
    to develop more reliable processes and deliver higher-quality results. I don’t
    think the line between data and engineering is disappearing entirely, but I do
    believe that analysts who embrace an engineering mindset will be far more effective
    in modern data teams.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我强烈建议分析师采用软件工程的最佳实践。例如，版本控制系统、测试和代码审查有助于分析团队开发更可靠的流程，并交付更高品质的结果。我认为数据与工程之间的界限并不会完全消失，但我确实相信，那些拥抱工程思维的分析师在现代数据团队中将会更加高效。
- en: You’ve explored both [causal inference](https://towardsdatascience.com/linear-regressions-for-causal-conclusions-34c6317c5a11/)
    and cutting-edge LLM tuning techniques. Do you see these as part of a shared toolkit
    or separate mindsets?
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你探索了[因果推断](https://towardsdatascience.com/linear-regressions-for-causal-conclusions-34c6317c5a11/)和前沿的LLM调优技术。你认为这些是共享工具箱的一部分还是不同的思维模式？
- en: That’s actually a great question. I am a strong believer that all these tools
    (from statistical methods to modern ML techniques) belong in a single toolkit. 
    As Robert Heinlein famously said, “Specialisation is for insects.”
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这实际上是一个很好的问题。我坚信所有这些工具（从统计方法到现代机器学习技术）都属于同一个工具箱。正如罗伯特·海因莱因著名地说：“专业化是昆虫的行为。”
- en: 'I think of analysts as data wizards who help their product teams solve their
    problems using whatever tools fit the best: whether it’s building an LLM-powered
    classifier for NPS comments, using causal inference to make strategic decisions,
    or building a web app to automate workflows.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为分析师是数据巫师，他们利用最适合的工具帮助产品团队解决问题：无论是构建一个用于NPS评论的LLM分类器，使用因果推断做出战略决策，还是构建一个自动化工作流程的Web应用程序。
- en: Rather than specialising in specific skills, I prefer to focus on the problem
    we’re solving and keep the toolset as broad as possible. This mindset not only
    leads to better outcomes but also fosters a continuous learning culture, which
    is essential in today’s fast-moving data industry.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 与专注于特定技能相比，我更倾向于关注我们正在解决的问题，并尽可能保持工具集的广泛性。这种思维方式不仅能够带来更好的结果，而且还能培养持续学习的文化，这在当今快速发展的数据行业中至关重要。
- en: You’ve covered a broad range of topics, from [text embeddings](https://towardsdatascience.com/text-embeddings-comprehensive-guide-afd97fce8fb5/)
    and [visualizations](https://towardsdatascience.com/visualisation-101-choosing-the-best-visualisation-type-3a10838b150d/)
    to [simulation](https://towardsdatascience.com/practical-computer-simulations-for-product-analysts-90b5deb6a54e/)
    and [multi AI agent](https://towardsdatascience.com/multi-ai-agent-systems-101-bac58e3bcc47/).
    What writing habit or guiding principle helps you keep your work so cohesive and
    approachable?
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你涵盖了广泛的主题，从[文本嵌入](https://towardsdatascience.com/text-embeddings-comprehensive-guide-afd97fce8fb5/)和[可视化](https://towardsdatascience.com/visualisation-101-choosing-the-best-visualisation-type-3a10838b150d/)到[模拟](https://towardsdatascience.com/practical-computer-simulations-for-product-analysts-90b5deb6a54e/)和[多智能体系统](https://towardsdatascience.com/multi-ai-agent-systems-101-bac58e3bcc47/)。是什么写作习惯或指导原则帮助你保持你的工作如此连贯和易于接近？
- en: I usually write about topics that excite me at the moment, either because I’ve
    just learned something new or had an interesting discussion with colleagues. My
    inspiration often comes from online courses, books or my day-to-day tasks.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我通常写一些我此刻感兴趣的话题，无论是刚刚学到新知识，还是与同事进行了有趣的讨论。我的灵感通常来自在线课程、书籍或我的日常任务。
- en: 'When I write, I always think about my audience and how this piece can be genuinely
    helpful both for others and for my future self. I try to explain all the concepts
    clearly and leave breadcrumbs for anyone who wants to dig deeper. Over time, my
    blog has become a personal knowledge base. I often return to old posts: sometimes
    just to copy a code snippet, sometimes to share a resource with a colleague who’s
    working on something similar.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 当我写作时，我总是考虑我的受众以及这篇文章如何真正对他人和未来的我有所帮助。我试图清晰地解释所有概念，并为想要深入了解的人留下线索。随着时间的推移，我的博客已经成为了一个个人知识库。我经常回到旧帖子：有时只是复制一段代码，有时是与正在从事类似工作的同事分享资源。
- en: As we all know, everything in data is interconnected. Solving a real-world problem
    often requires a mix of tools and approaches. For example, if you’re estimating
    the impact of launching in a new market, you might use simulation for scenario
    analysis, LLMs to explore customer expectations, and visualisation to present
    the final recommendation.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所知，数据中的所有事物都是相互关联的。解决现实世界的问题通常需要混合使用工具和方法。例如，如果你在估算进入新市场的影响，你可能使用模拟进行情景分析，使用大型语言模型（LLMs）来探索客户期望，以及使用可视化来展示最终的推荐。
- en: I try to reflect these connections in my writing. Technologies evolve by building
    on earlier breakthroughs, and understanding the foundations helps you go deeper.
    That’s why many of my posts reference each other, letting readers follow their
    curiosity and uncover how different pieces fit together.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我试图在我的写作中反映这些联系。技术通过建立在前人突破的基础上而发展，理解基础有助于你深入。这就是为什么我的许多帖子相互引用，让读者跟随他们的好奇心，揭示不同的部分是如何结合在一起的。
- en: Your articles are impressively structured, often walking readers from foundational
    concepts to advanced implementations. What’s your process for outlining a complex
    piece before you start writing?
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 您的文章结构令人印象深刻，常常引导读者从基础概念到高级实现。在开始写作之前，您是如何概述复杂作品的？
- en: I believe I developed this way of presenting information in school, as these
    habits have deep roots. As the book *The Culture Map* explains, different cultures
    vary in how they structure communication. Some are concept-first (starting from
    basics and iteratively moving to conclusions), while others are application-first
    (starting with results and diving deeper as needed). I’ve definitely internalised
    the concept-first approach.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为我在学校就形成了这种信息呈现方式，因为这些习惯有着深厚的根基。正如《文化地图》一书所解释的，不同的文化在沟通结构上有所不同。有些是概念优先（从基础开始，迭代地得出结论），而有些是应用优先（从结果开始，根据需要深入）。我确实内化了概念优先的方法。
- en: In practice, many of my articles are inspired by online courses. While watching
    a course, I outline the rough structure in parallel so I don’t forget any important
    nuances. I also note down anything that is unclear and mark it for future reading
    or experimentation.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，我的许多文章都是受到在线课程的启发。在观看课程的同时，我会并行地概述其大致结构，以免遗漏任何重要的细节。我也会记下任何不清楚的地方，并标记为将来阅读或实验。
- en: After the course, I start thinking about how to apply this knowledge to a practical
    example. I firmly believe you don’t truly understand something until you try it
    yourself. Even though most of the courses have practical examples, they are often
    too polished. So, only when you apply the same ideas for your own use case will
    you run into edge cases and friction points. For example, the course might use
    OpenAI models, but I might want to try a local model, or the default system prompt
    in the framework doesn’t work for my particular case and needs tweaking.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 课程结束后，我开始思考如何将这种知识应用到实际例子中。我坚信，直到你亲自尝试，你才能真正理解某件事。尽管大多数课程都有实际例子，但它们通常过于完美。因此，只有当你将相同的想法应用于自己的用例时，你才会遇到边缘情况和摩擦点。例如，课程可能使用OpenAI模型，但我可能想尝试本地模型，或者框架中的默认系统提示对我的特定情况不起作用，需要调整。
- en: 'Once I have a working example, I move to writing. I prefer separate drafting
    from editing. First, I focus on getting all my ideas and code down without worrying
    about grammar or tone. Then I shift into editing mode: refining the structure,
    choosing the right visuals, putting together the introduction, and highlighting
    the key takeaways.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我有一个工作示例，我就开始写作。我更喜欢先单独起草，然后再编辑。首先，我专注于将所有想法和代码记录下来，而不必担心语法或语气。然后我进入编辑模式：完善结构，选择合适的视觉元素，编写引言，并突出关键要点。
- en: Finally, I read the whole thing end-to-end from the beginning to catch anything
    I’ve missed. Then I ask my partner to review it. They often bring a fresh perspective
    and point out things I didn’t consider, which helps make the article more comprehensive
    and accessible.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我从头到尾阅读全文，以捕捉我可能遗漏的内容。然后我让我的伴侣审阅它。他们经常带来新的视角，指出我没有考虑到的方面，这有助于使文章更加全面和易于理解。
- en: '* * *'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: To learn more about Mariya‘s work and stay up-to-date with her latest articles,
    follow her here on [TDS](http://towardsdatascience.com/author/miptgirl) and on
    [LinkedIn](https://www.linkedin.com/in/mariya-mansurova/).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 想了解更多关于Mariya的工作和了解她最新的文章，请在这里关注她的[TDS](http://towardsdatascience.com/author/miptgirl)和[LinkedIn](https://www.linkedin.com/in/mariya-mansurova/)。
