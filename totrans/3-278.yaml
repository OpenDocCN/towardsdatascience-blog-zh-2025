- en: How to Create Network Graph Visualizations in Microsoft PowerBI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-create-network-graph-visualizations-in-microsoft-powerbi/](https://towardsdatascience.com/how-to-create-network-graph-visualizations-in-microsoft-powerbi/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Microsoft PowerBI is a one of the most popular business intelligence (BI) tools,
    and while it has all the features you need to create dynamic analytic reporting
    for stakeholders across the business, creating some advanced data visualizations
    is more challenging.
  prefs: []
  type: TYPE_NORMAL
- en: This article will walk through how to create large network graph visualizations
    in Microsoft PowerBI to enable dynamic and interactive exploration of interconnected
    datasets such as supply chain networks, financial transactions, and much more.
  prefs: []
  type: TYPE_NORMAL
- en: But before we do that, let’s take a look at some quick foundations of network
    graphs.
  prefs: []
  type: TYPE_NORMAL
- en: Network Graph Foundations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data for network graphs, referred to as “graph data” is data formatted in node
    and edge format. Nodes represent discrete things and edges represent the relationships
    between nodes.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/89e5c46d7bf09220c341e08adfb7ece7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a simple example of an online social network, which can be represented
    in graph format.
  prefs: []
  type: TYPE_NORMAL
- en: Nodes refer to profiles, while edges refer to following status.
  prefs: []
  type: TYPE_NORMAL
- en: 'A simple network of 3 profiles might end up looking like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b001364b6f1d6acc338b7e4941f07ce6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: 'When visualizing network graphs, we can embed additional information about
    nodes and edges in various ways, such as but not limited to:'
  prefs: []
  type: TYPE_NORMAL
- en: Node size
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Edge size
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Node color
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Edge color
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Labels
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Structuring Network Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So now that you know the basic building blocks of a network graph, how do you
    structure and transform your dataset?
  prefs: []
  type: TYPE_NORMAL
- en: Graph Data is Everywhere
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While you might be thinking, “we only have relational data where I’m at”, that’s
    often not the case. In fact, lots of relational datasets can be visualized as
    a network graph.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a simple sales table as an example with columns for product name,
    customer name, and quantity.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/732e0f9059262316310e8e05638a2920.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: We can represent this same sales table as a network graph by representing both
    product name as the node type “product”, customer name as the node type “customer”,
    and each row as the edge “Purchased”.
  prefs: []
  type: TYPE_NORMAL
- en: 'Visualized as a network graph, this might look something like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/026d81983943d05d3e3c894d27c2600d.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: Graph Data Formats
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are a few ways this data is structured, such as but not limited to:'
  prefs: []
  type: TYPE_NORMAL
- en: Node & Edge Lists (Often in .csv format)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Graph Databases (Such as Neo4j)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Graph Files (such as GraphML or GEXF)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: But in this article, we will be using a combined node and edge list into a single
    tabular dataset due to the requirements of making network graphs within Microsoft
    PowerBI.
  prefs: []
  type: TYPE_NORMAL
- en: Mapping Your Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You’ll need to map your data to the following tabular format with each record
    representing an edge:'
  prefs: []
  type: TYPE_NORMAL
- en: Source Node (Required) -> This is a unique identifier of the starting node of
    the edge (for example, Customer ID)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Target Node (Required) -> This is a unique identifier of the ending node of
    the edge (for example, Product ID)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Source Color -> This is a category identifier for the source node (for example,
    Customer Type)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Target Color -> This is a category identifier for the target node (for example,
    Product Category)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Link Color -> This is a category identifier for the edge (for example, Sales
    Channel)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/56a2ee8aa31283835b318857cbd3359d.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: Creating the Network Graph Visualization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have our data mapped, we can create the network graph visualization.
  prefs: []
  type: TYPE_NORMAL
- en: While Microsoft doesn’t include a network visual in the default PowerBI visuals,
    we can access the visual marketplace to download third-party visuals.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/66681f86dc6753c75c8d8e098b2487e2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: For this article, we will be using the visual “Astra”, which lets you create
    large-scale network graphs with plenty of customization options.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6644dfb9841cd51fb6af87a54f0a0e77.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: Once you have it installed, it will be in your visual library.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/82796ff7e1f606b7e888ca57f3f45960.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: Drag the visual onto your canvas, select it, and note the values required (which
    we mapped earlier). The visual also has options to pass x and y coordinates as
    well as custom labels, however we won’t use those options in this article.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d6970824fe2519b45a28a0edac167a28.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: The only required values are “Source Node” and “Target Node” so let’s start
    there. Drag the columns you mapped to those nodes from the data pane.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/be3e98ae580282be06a1f0f7e93b1f28.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: You’ll notice the visual graphs our nodes and edges, however, it isn’t looking
    so great. We’ll need to change some of the simulation settings.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/134bef7a1a274cb07eec821944a8e349.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: To change the simulation settings, open the formatting pane, then simulation,
    and increase both the link distance and repulsion force. I chose to set repulsion
    to 0.3, and link distance to 15.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c42fbd9d83f6299f1fe10897f63129eb.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: You can now see that we get a much better layout of our data.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d80157226115479e7680bca040f10103.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now encode some additional information into the graph, by changing the
    node color based on node categories. Drag the fields you mapped above to Source
    Color and Target Color.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c1feb8f2a780cceb08d4621ed5f1cf39.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: You’ll now notice the nodes are colored differently and we have a legend on
    the visual.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dfb126297d6a58f0d50a77710b9643ee.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s do some formatting to the background color and node colors in the formatting
    pane.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0b48a41a98b829ad91d934e1d7f2a738.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: Congratulations! You’ve created a network graph visualization in PowerBI with
    dynamic node coloring.
  prefs: []
  type: TYPE_NORMAL
- en: 'We add even more information to the graph, for example:'
  prefs: []
  type: TYPE_NORMAL
- en: Turn on node weight to make nodes with more edges larger in size
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adding a link category to the color the links
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adding different labels to the nodes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: But we aren’t done there.
  prefs: []
  type: TYPE_NORMAL
- en: Once we have the visualization, stakeholders have to use it to make more informed
    decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Interacting with the Network Graph
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There is immediate value in a static network graph, such as being able to visually
    see how data is interconnected through relationships.
  prefs: []
  type: TYPE_NORMAL
- en: However, there are some additional features we can use to make the visualization
    more insightful.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we can interact with the legend by selecting categories to highlight
    them on the graph. For example, quickly locating Widgets in the graph:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/915b47cccbbce28ad76e8399df26188b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: We can also select individual nodes in the graph by clicking on them.
  prefs: []
  type: TYPE_NORMAL
- en: Alternatively, you can toggle “select adjacent nodes” in the node properties
    to have it select not just the node clicked on, but all nodes directly connected
    to it through an edge.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, selecting “Widget A” with “select adjacent nodes” on shows all
    customers who have purchased that widget:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/388cfff7934484ec9da4d73d2c356149.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: But selecting nodes doesn’t just highlight them in the visualization, it passes
    that filter to the rest of your PowerBI report.
  prefs: []
  type: TYPE_NORMAL
- en: This means we can add additional charts to give some more context to the user’s
    selections.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, adding a bar chart for quantity purchased by customer:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7d9a2b0fe35dbc1a1224ee5296aab8f0.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: 'We can also do the reverse by filtering the data going into the network visual.
    This can be accomplished in multiple ways, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: Slicers
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Selecting pieces of other charts, such as a slice of a donut chart
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Filter pane
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Let’s use a slicer to slice the graph on Customer Type:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9db0165843eee61e843e5ffa7ae1d3d4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: Building Complex BI Reports
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While the example network graph in this article is relatively simple for demonstration
    purposes, you can build quite complex BI reporting for stakeholders.
  prefs: []
  type: TYPE_NORMAL
- en: The Astra PowerBI visual used in this article can scale to hundreds of thousands
    of edges, and paired with additional cross-filtered visuals & slicers can enable
    more advanced analytics than is possible with default PowerBI reports.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9ffad2a6882203a1b220a2fed3f973ae.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Network graphs are all around us, even hiding in your relational datasets. While
    there is great network graphing tooling out there, building network graphs in
    PowerBI allows you to bring this advanced analytic tool to your standard BI stakeholders,
    as well as build advanced reporting by adding context with additional filters
    and charts.
  prefs: []
  type: TYPE_NORMAL
