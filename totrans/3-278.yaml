- en: How to Create Network Graph Visualizations in Microsoft PowerBI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在Microsoft PowerBI中创建网络图可视化
- en: 原文：[https://towardsdatascience.com/how-to-create-network-graph-visualizations-in-microsoft-powerbi/](https://towardsdatascience.com/how-to-create-network-graph-visualizations-in-microsoft-powerbi/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-create-network-graph-visualizations-in-microsoft-powerbi/](https://towardsdatascience.com/how-to-create-network-graph-visualizations-in-microsoft-powerbi/)
- en: Microsoft PowerBI is a one of the most popular business intelligence (BI) tools,
    and while it has all the features you need to create dynamic analytic reporting
    for stakeholders across the business, creating some advanced data visualizations
    is more challenging.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: Microsoft PowerBI 是最受欢迎的商业智能（BI）工具之一，虽然它拥有创建面向业务各利益相关者的动态分析报告所需的所有功能，但创建一些高级数据可视化更具挑战性。
- en: This article will walk through how to create large network graph visualizations
    in Microsoft PowerBI to enable dynamic and interactive exploration of interconnected
    datasets such as supply chain networks, financial transactions, and much more.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本文将介绍如何在Microsoft PowerBI中创建大型网络图可视化，以实现动态和交互式地探索如供应链网络、金融交易等相互关联的数据集。
- en: But before we do that, let’s take a look at some quick foundations of network
    graphs.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但在我们这样做之前，让我们快速了解一下网络图的一些基础知识。
- en: Network Graph Foundations
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网络图基础
- en: Data for network graphs, referred to as “graph data” is data formatted in node
    and edge format. Nodes represent discrete things and edges represent the relationships
    between nodes.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 网络图数据，称为“图形数据”，是以节点和边格式编排的数据。节点代表离散的事物，边代表节点之间的关系。
- en: '![](../Images/89e5c46d7bf09220c341e08adfb7ece7.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/89e5c46d7bf09220c341e08adfb7ece7.png)'
- en: 'Source: Author'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: Let’s take a simple example of an online social network, which can be represented
    in graph format.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以一个在线社交网络的简单例子为例，它可以表示为图形格式。
- en: Nodes refer to profiles, while edges refer to following status.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 节点代表个人资料，而边代表关注状态。
- en: 'A simple network of 3 profiles might end up looking like this:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 一个由3个个人资料组成的简单网络可能看起来像这样：
- en: '![](../Images/b001364b6f1d6acc338b7e4941f07ce6.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b001364b6f1d6acc338b7e4941f07ce6.png)'
- en: 'Source: Author'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: 'When visualizing network graphs, we can embed additional information about
    nodes and edges in various ways, such as but not limited to:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当可视化网络图时，我们可以通过多种方式嵌入有关节点和边的附加信息，例如但不限于：
- en: Node size
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 节点大小
- en: Edge size
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 边大小
- en: Node color
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 节点颜色
- en: Edge color
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 边颜色
- en: Labels
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 标签
- en: Structuring Network Data
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结构化网络数据
- en: So now that you know the basic building blocks of a network graph, how do you
    structure and transform your dataset?
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 所以现在你知道了网络图的基本构建块，你如何构建和转换你的数据集呢？
- en: Graph Data is Everywhere
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图形数据无处不在
- en: While you might be thinking, “we only have relational data where I’m at”, that’s
    often not the case. In fact, lots of relational datasets can be visualized as
    a network graph.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然你可能认为，“我只在关系数据中”，但这通常不是情况。事实上，许多关系数据集可以可视化为网络图。
- en: Let’s take a simple sales table as an example with columns for product name,
    customer name, and quantity.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个简单的销售表格示例，包含产品名称、客户名称和数量列。
- en: '![](../Images/732e0f9059262316310e8e05638a2920.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/732e0f9059262316310e8e05638a2920.png)'
- en: 'Source: Author'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: We can represent this same sales table as a network graph by representing both
    product name as the node type “product”, customer name as the node type “customer”,
    and each row as the edge “Purchased”.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过将产品名称表示为节点类型“产品”，客户名称表示为节点类型“客户”，并将每一行表示为“购买”边，将相同的销售表表示为网络图。
- en: 'Visualized as a network graph, this might look something like:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 以网络图的形式可视化，它可能看起来像这样：
- en: '![](../Images/026d81983943d05d3e3c894d27c2600d.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/026d81983943d05d3e3c894d27c2600d.png)'
- en: 'Source: Author'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: Graph Data Formats
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图形数据格式
- en: 'There are a few ways this data is structured, such as but not limited to:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 此数据结构有几种方式，例如但不限于：
- en: Node & Edge Lists (Often in .csv format)
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 节点和边列表（通常以.csv格式）
- en: Graph Databases (Such as Neo4j)
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图形数据库（如Neo4j）
- en: Graph Files (such as GraphML or GEXF)
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图形文件（如GraphML或GEXF）
- en: But in this article, we will be using a combined node and edge list into a single
    tabular dataset due to the requirements of making network graphs within Microsoft
    PowerBI.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 但在这篇文章中，我们将由于在Microsoft PowerBI中制作网络图的要求，将节点和边列表合并为单个表格数据集。
- en: Mapping Your Data
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 映射你的数据
- en: 'You’ll need to map your data to the following tabular format with each record
    representing an edge:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要将你的数据映射到以下表格格式，其中每条记录代表一条边：
- en: Source Node (Required) -> This is a unique identifier of the starting node of
    the edge (for example, Customer ID)
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 源节点（必填）-> 这是边起始节点的唯一标识符（例如，客户ID）
- en: Target Node (Required) -> This is a unique identifier of the ending node of
    the edge (for example, Product ID)
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 目标节点（必填）-> 这是边结束节点的唯一标识符（例如，产品ID）
- en: Source Color -> This is a category identifier for the source node (for example,
    Customer Type)
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 来源颜色 -> 这是源节点的类别标识符（例如，客户类型）
- en: Target Color -> This is a category identifier for the target node (for example,
    Product Category)
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 目标颜色 -> 这是目标节点的类别标识符（例如，产品类别）
- en: Link Color -> This is a category identifier for the edge (for example, Sales
    Channel)
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 链接颜色 -> 这是边的类别标识符（例如，销售渠道）
- en: '![](../Images/56a2ee8aa31283835b318857cbd3359d.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/56a2ee8aa31283835b318857cbd3359d.png)'
- en: 'Source: Author'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: Creating the Network Graph Visualization
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建网络图可视化
- en: Now that we have our data mapped, we can create the network graph visualization.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经将数据映射好了，我们可以创建网络图可视化。
- en: While Microsoft doesn’t include a network visual in the default PowerBI visuals,
    we can access the visual marketplace to download third-party visuals.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然微软在默认的PowerBI视觉中不包括网络视觉，但我们可以访问视觉市场来下载第三方视觉。
- en: '![](../Images/66681f86dc6753c75c8d8e098b2487e2.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/66681f86dc6753c75c8d8e098b2487e2.png)'
- en: 'Source: Author'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: For this article, we will be using the visual “Astra”, which lets you create
    large-scale network graphs with plenty of customization options.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这篇文章，我们将使用“Astra”这个视觉，它允许你创建具有大量自定义选项的大规模网络图。
- en: '![](../Images/6644dfb9841cd51fb6af87a54f0a0e77.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6644dfb9841cd51fb6af87a54f0a0e77.png)'
- en: 'Source: Author'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: Once you have it installed, it will be in your visual library.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦安装，它将出现在你的视觉库中。
- en: '![](../Images/82796ff7e1f606b7e888ca57f3f45960.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/82796ff7e1f606b7e888ca57f3f45960.png)'
- en: 'Source: Author'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: Drag the visual onto your canvas, select it, and note the values required (which
    we mapped earlier). The visual also has options to pass x and y coordinates as
    well as custom labels, however we won’t use those options in this article.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 将视觉拖放到画布上，选择它，并注意所需的值（我们之前已经映射过了）。视觉还有传递x和y坐标以及自定义标签的选项，但在这篇文章中我们不会使用这些选项。
- en: '![](../Images/d6970824fe2519b45a28a0edac167a28.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d6970824fe2519b45a28a0edac167a28.png)'
- en: 'Source: Author'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: The only required values are “Source Node” and “Target Node” so let’s start
    there. Drag the columns you mapped to those nodes from the data pane.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 只需填写“源节点”和“目标节点”这两个必填值，所以我们从这里开始。从数据面板中拖动你映射到这些节点的列。
- en: '![](../Images/be3e98ae580282be06a1f0f7e93b1f28.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/be3e98ae580282be06a1f0f7e93b1f28.png)'
- en: 'Source: Author'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: You’ll notice the visual graphs our nodes and edges, however, it isn’t looking
    so great. We’ll need to change some of the simulation settings.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 你会注意到视觉图显示了我们的节点和边，但是看起来并不那么好。我们需要更改一些模拟设置。
- en: '![](../Images/134bef7a1a274cb07eec821944a8e349.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/134bef7a1a274cb07eec821944a8e349.png)'
- en: 'Source: Author'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: To change the simulation settings, open the formatting pane, then simulation,
    and increase both the link distance and repulsion force. I chose to set repulsion
    to 0.3, and link distance to 15.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 要更改模拟设置，打开格式化面板，然后选择模拟，增加链接距离和排斥力。我选择将排斥力设置为0.3，链接距离设置为15。
- en: '![](../Images/c42fbd9d83f6299f1fe10897f63129eb.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c42fbd9d83f6299f1fe10897f63129eb.png)'
- en: 'Source: Author'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: You can now see that we get a much better layout of our data.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在可以看到我们得到了一个更好的数据布局。
- en: '![](../Images/d80157226115479e7680bca040f10103.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d80157226115479e7680bca040f10103.png)'
- en: 'Source: Author'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: Let’s now encode some additional information into the graph, by changing the
    node color based on node categories. Drag the fields you mapped above to Source
    Color and Target Color.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在通过根据节点类别更改节点颜色来将一些附加信息编码到图中。将你上面映射的字段拖动到来源颜色和目标颜色。
- en: '![](../Images/c1feb8f2a780cceb08d4621ed5f1cf39.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c1feb8f2a780cceb08d4621ed5f1cf39.png)'
- en: 'Source: Author'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: You’ll now notice the nodes are colored differently and we have a legend on
    the visual.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在会注意到节点颜色不同，视觉上也有图例。
- en: '![](../Images/dfb126297d6a58f0d50a77710b9643ee.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dfb126297d6a58f0d50a77710b9643ee.png)'
- en: 'Source: Author'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: Let’s do some formatting to the background color and node colors in the formatting
    pane.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在格式化面板中对背景颜色和节点颜色进行一些格式化。
- en: '![](../Images/0b48a41a98b829ad91d934e1d7f2a738.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0b48a41a98b829ad91d934e1d7f2a738.png)'
- en: 'Source: Author'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: Congratulations! You’ve created a network graph visualization in PowerBI with
    dynamic node coloring.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜！您已在PowerBI中创建了一个具有动态节点着色的网络图可视化。
- en: 'We add even more information to the graph, for example:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们向图形添加更多信息，例如：
- en: Turn on node weight to make nodes with more edges larger in size
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开节点权重以使具有更多边的节点更大
- en: Adding a link category to the color the links
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加链接类别以着色链接
- en: Adding different labels to the nodes
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为节点添加不同的标签
- en: But we aren’t done there.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们还没有完成。
- en: Once we have the visualization, stakeholders have to use it to make more informed
    decisions.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们有了可视化，利益相关者必须使用它来做出更明智的决策。
- en: Interacting with the Network Graph
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与网络图交互
- en: There is immediate value in a static network graph, such as being able to visually
    see how data is interconnected through relationships.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 静态网络图立即具有价值，例如能够通过关系直观地看到数据是如何相互关联的。
- en: However, there are some additional features we can use to make the visualization
    more insightful.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们还可以使用一些额外的功能来使可视化更具洞察力。
- en: 'First, we can interact with the legend by selecting categories to highlight
    them on the graph. For example, quickly locating Widgets in the graph:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们可以通过选择类别来与图例交互，在图上突出显示它们。例如，快速定位图中的部件：
- en: '![](../Images/915b47cccbbce28ad76e8399df26188b.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/915b47cccbbce28ad76e8399df26188b.png)'
- en: 'Source: Author'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: We can also select individual nodes in the graph by clicking on them.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以通过点击图中的节点来选择单个节点。
- en: Alternatively, you can toggle “select adjacent nodes” in the node properties
    to have it select not just the node clicked on, but all nodes directly connected
    to it through an edge.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，您可以在节点属性中切换“选择相邻节点”，使其不仅选择点击的节点，还选择通过边直接连接到该节点的所有节点。
- en: 'For example, selecting “Widget A” with “select adjacent nodes” on shows all
    customers who have purchased that widget:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，选择“部件A”并开启“选择相邻节点”功能，将显示所有购买该部件的客户：
- en: '![](../Images/388cfff7934484ec9da4d73d2c356149.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/388cfff7934484ec9da4d73d2c356149.png)'
- en: 'Source: Author'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: But selecting nodes doesn’t just highlight them in the visualization, it passes
    that filter to the rest of your PowerBI report.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 但选择节点不仅会在可视化中突出显示它们，还会将此筛选器传递到您的PowerBI报告的其余部分。
- en: This means we can add additional charts to give some more context to the user’s
    selections.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们可以添加额外的图表，为用户的选定提供更多上下文。
- en: 'For example, adding a bar chart for quantity purchased by customer:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，为顾客购买数量添加柱状图：
- en: '![](../Images/7d9a2b0fe35dbc1a1224ee5296aab8f0.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7d9a2b0fe35dbc1a1224ee5296aab8f0.png)'
- en: 'Source: Author'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: 'We can also do the reverse by filtering the data going into the network visual.
    This can be accomplished in multiple ways, such as:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以通过筛选进入网络可视化的数据来执行相反的操作。这可以通过多种方式完成，例如：
- en: Slicers
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 切片器
- en: Selecting pieces of other charts, such as a slice of a donut chart
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择其他图表的部分，例如饼图的一部分
- en: Filter pane
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 筛选面板
- en: 'Let’s use a slicer to slice the graph on Customer Type:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用切片器来根据客户类型切片图形：
- en: '![](../Images/9db0165843eee61e843e5ffa7ae1d3d4.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9db0165843eee61e843e5ffa7ae1d3d4.png)'
- en: 'Source: Author'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: Building Complex BI Reports
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建复杂的BI报告
- en: While the example network graph in this article is relatively simple for demonstration
    purposes, you can build quite complex BI reporting for stakeholders.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管本文中的示例网络图在演示目的上相对简单，但您可以为利益相关者构建相当复杂的BI报告。
- en: The Astra PowerBI visual used in this article can scale to hundreds of thousands
    of edges, and paired with additional cross-filtered visuals & slicers can enable
    more advanced analytics than is possible with default PowerBI reports.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 本文使用的Astra PowerBI可视化可以扩展到数十万个边，与额外的交叉筛选可视化与切片器配合使用，可以实现比默认PowerBI报告更高级的分析。
- en: '![](../Images/9ffad2a6882203a1b220a2fed3f973ae.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9ffad2a6882203a1b220a2fed3f973ae.png)'
- en: 'Source: Author'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: Conclusion
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Network graphs are all around us, even hiding in your relational datasets. While
    there is great network graphing tooling out there, building network graphs in
    PowerBI allows you to bring this advanced analytic tool to your standard BI stakeholders,
    as well as build advanced reporting by adding context with additional filters
    and charts.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 网络图无处不在，甚至隐藏在你的关系型数据集中。虽然市面上有出色的网络图工具，但在PowerBI中构建网络图允许您将这种高级分析工具带给您的标准BI利益相关者，并通过添加额外的筛选器和图表来构建高级报告。
