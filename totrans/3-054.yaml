- en: How to Ensure Your AI Solution Does What You Expect iI to Do
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何确保您的AI解决方案做到您期望它做到的事情
- en: 原文：[https://towardsdatascience.com/how-to-ensure-your-ai-solution-does-what-you-expect-it-to-do/](https://towardsdatascience.com/how-to-ensure-your-ai-solution-does-what-you-expect-it-to-do/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何确保您的AI解决方案做到您期望它做到的事情](https://towardsdatascience.com/how-to-ensure-your-ai-solution-does-what-you-expect-it-to-do/)'
- en: '<mdspan datatext="el1745889774796" class="mdspan-comment">Generative AI (</mdspan>GenAI)
    is evolving fast — and it’s no longer just about fun chatbots or impressive image
    generation. 2025 is the year where the focus is on turning the AI hype into real
    value. Companies everywhere are looking into ways to integrate and leverage GenAI
    on their products and processes — to better serve users, boost efficiency, stay
    competitive, and drive growth. And thanks to APIs and pre-trained models from
    major providers, integrating GenAI feels easier than ever before. But here’s the
    catch: **just because integration is easy, doesn’t mean AI solutions will work
    as intended once deployed.**'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745889774796" class="mdspan-comment">生成式AI（GenAI）正在快速发展——它不再仅仅是关于有趣的聊天机器人或令人印象深刻的图像生成。2025年是关注将AI炒作转化为实际价值的年份。世界各地的企业都在寻找将GenAI整合到其产品和流程中的方法——以更好地服务用户、提高效率、保持竞争力并推动增长。多亏了主要提供商的API和预训练模型，整合GenAI比以往任何时候都更容易。但这里有个问题：**仅仅因为整合变得容易，并不意味着AI解决方案部署后就会按预期工作**。
- en: 'Predictive models aren’t really new: as humans we have been predicting things
    for years, starting formaly with statistics. However, **GenAI has revolutionized
    the predictive field for many reasons**:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 预测模型其实并不新鲜：作为人类，我们已经预测事物多年，最初从统计学开始。然而，**生成式AI（GenAI）由于许多原因而彻底改变了预测领域**：
- en: No need to train your own model or to be a Data Scientist to build AI solutions
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您无需训练自己的模型或成为数据科学家即可构建AI解决方案
- en: AI is now easy to use through chat interfaces and to integrate through APIs
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过聊天界面和API现在可以轻松使用AI
- en: Unlocking of many things that couldn’t be done or were really hard to do before
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解锁许多以前无法完成或非常难以完成的事情
- en: 'All these things make **GenAI very exciting, but also risky**.  Unlike traditional
    software — or even classical machine learning — GenAI introduces a new level of
    unpredictability. You’re not implementic deterministic logics, you’re using a
    model trained on vast amounts of data, hoping it will respond as needed. So how
    do we know if an AI system is doing what we intend it to do? How do we know if
    it’s ready to go live? The answer is evaluations (evals), the concept that we’ll
    be exploring in this post:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些因素都使**GenAI既令人兴奋又充满风险**。与传统的软件——甚至经典机器学习不同——GenAI引入了一个新的不可预测性水平。你不是在实现确定性的逻辑，而是在使用基于大量数据训练的模型，希望它能按需响应。那么我们如何知道AI系统是否在按照我们的意图行事？我们如何知道它是否准备好上线？答案是评估（evals），这是我们将在本文中探讨的概念：
- en: Why GenAI systems can’t be tested the same way as traditional software or even
    classical Machine Learning (ML)
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么GenAI系统不能像传统软件或甚至经典机器学习（ML）那样进行测试
- en: Why evaluations are key to understand the quality of your AI system and aren’t
    optional (unless you like surprises)
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么评估对于理解您AI系统的质量至关重要，并且不是可选项（除非你喜欢惊喜）
- en: Different types of evaluations and techniques to apply them in practice
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不同的评估类型及其在实际应用中的技术
- en: Whether you’re a Product Manager, Engineer, or anyone working or interested
    in AI, I hope this post will help you understand how to think critically about
    AI systems quality (and why evals are key to achieve that quality!).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是产品经理、工程师，还是任何在AI领域工作或感兴趣的人，我希望这篇文章能帮助你理解如何批判性地思考AI系统质量（以及为什么评估对于实现这种质量至关重要！）。
- en: GenAI Can’t Be Tested Like Traditional Software— Or Even Classical ML
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GenAI不能像传统软件那样进行测试——甚至不能像经典机器学习那样
- en: '**In traditional software development**, systems follow deterministic logics:
    **if X happens, then Y will happen** — always. Unless something breaks in your
    platform or you introduce an error in the code… which is the reason you add tests,
    monitoring and alerts. Unit tests are used to validate small blocks of code, integration
    tests to ensure components work well together, and monitoring to detect if something
    breaks in production. Testing traditional software is like checking if a calculator
    works. You input 2 + 2, and you expect 4\. Clear and deterministic, it’s either
    right or wrong.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**在传统的软件开发中**，系统遵循确定性的逻辑：**如果发生X事件，那么Y将发生**——总是如此。除非你的平台出现问题，或者你在代码中引入了错误……这就是你添加测试、监控和警报的原因。单元测试用于验证小块代码，集成测试用于确保组件协同工作良好，监控用于检测生产中是否出现问题。测试传统软件就像检查计算器是否工作。你输入2
    + 2，你期望得到4。清晰且确定，要么正确，要么错误。'
- en: 'However, ML and AI introduce non-determinism and probabilities. Instead of
    defining behavior explicitly through rules, we train models to learn patterns
    from data. **In AI, if X happens, the output is no longer a hard-coded Y, but
    a prediction with a certain degree of probability, based on what the model learned
    during training**. This can be very powerful, but also introduces uncertainty:
    identical inputs might have different outputs over time, plausible outputs might
    actually be incorrect, unexpected behavior for rare scenarios might arise…'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，机器学习（ML）和人工智能（AI）引入了非确定性和概率。我们不再通过规则明确定义行为，而是训练模型从数据中学习模式。**在人工智能中，如果发生X事件，输出就不再是硬编码的Y，而是基于模型在训练期间学习到的内容，具有一定概率的预测**。这可以非常强大，但也引入了不确定性：相同的输入可能在不同的时间产生不同的输出，看似合理的输出实际上可能是错误的，罕见场景可能出现意外的行为……
- en: This makes traditional testing approaches insufficient, not even plausible at
    times. The calculator example gets closer to trying to evaluate a student’s performance
    on an open-ended exam. For each question, and many possible ways to answer the
    question, is an answer provided correct? Is it above the level of knowledge the
    student should have? Did the student make everything up but sound very convincing?
    Just like answers in an exam, **AI systems can be evaluated, but need a more general
    and flexible way to adapt to different inputs, contexts and use cases** (or types
    of exams).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得传统的测试方法不足，有时甚至不切实际。计算器示例更接近于尝试评估学生在开放式考试中的表现。对于每个问题，以及许多可能的回答方式，提供的答案是否正确？是否高于学生应有的知识水平？学生是否全凭想象，但听起来非常有说服力？就像考试中的答案一样，**AI系统可以评估，但需要一种更通用和灵活的方式，以适应不同的输入、上下文和用例（或考试类型）**。
- en: '**In traditional Machine Learning (ML), evaluations are already a well-established
    part of the project lifecycle**. Training a model on a narrow task like loan approval
    or disease detection always includes an evaluation step – using metrics like accuracy,
    precision, RMSE, MAE… This is used to measure how well the model performs, to
    compare between different model options, and to decide if the model is good enough
    to move forward to deployment. In GenAI this usually changes: teams use models
    that are already trained and have already passed general-purpose evaluations both
    internally on the model provider side and on public benchmarks. These models are
    so good at general tasks – like answering questions or drafting emails – there’s
    a risk of overtrusting them for our specific use case. However, it is important
    to still ask “*is this amazing model good enough for my use case?*”.  That’s where
    evaluation comes in **–** to assess whether preditcions or generations are good
    for your specific use case, context, inputs and users.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**在传统的机器学习（ML）中，评估已经是项目生命周期的一个成熟部分**。在像贷款审批或疾病检测这样的狭窄任务上训练模型始终包括一个评估步骤——使用准确率、精确率、RMSE、MAE等指标。这用于衡量模型的性能，比较不同模型选项，并决定模型是否足够好，可以继续部署。在生成人工智能（GenAI）中，这通常会有所变化：团队使用已经训练并已经通过内部模型提供方和公共基准测试的通用评估的模型。这些模型在通用任务——如回答问题或撰写电子邮件——上表现得如此出色，以至于我们可能会过度信任它们在我们的特定用例中。然而，仍然重要的是要问“*这个令人惊叹的模型是否足够好，可以用于我的用例？*”。这正是评估的用武之地——评估预测或生成是否适合你的特定用例、上下文、输入和用户。'
- en: '![](../Images/46691492fd528eb2458adc05dcd62dd1.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/46691492fd528eb2458adc05dcd62dd1.png)'
- en: Training and evals – traditional ML vs GenAI, image by author
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 训练和评估——传统机器学习与生成人工智能，图片由作者提供
- en: 'There is another big difference between ML and GenAI: the variety and complexity
    of the model outputs. We are no longer returning classes and probabilities (like
    probability a client will return the loan), or numbers (like predicted house price
    based on its characteristics). GenAI systems can return many types of output,
    of different lengths, tone, content, and format.  Similarly, these models no longer
    require structured and very determined input, but can usually take nearly any
    type of input — text, images, even audio or video. Evaluating therefore becomes
    much harder.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习和生成式AI之间还有一个很大的不同点：模型输出的多样性和复杂性。我们不再返回类别和概率（例如，客户可能偿还贷款的概率），或数字（例如，基于其特征的预测房价）。生成式AI系统可以返回许多类型的输出，长度不同，语气、内容、格式各异。同样，这些模型也不再需要结构化和非常确定的输入，但通常可以接受几乎所有类型的输入——文本、图像，甚至是音频或视频。因此，评估变得更加困难。
- en: '![](../Images/5c6ba49fed32edf3371dd923e9127cc3.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5c6ba49fed32edf3371dd923e9127cc3.png)'
- en: Input / output relationship – statistics & traditional ML vs GenAI, image by
    author
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 输入/输出关系 - 统计与传统的机器学习 vs 生成式AI，图片由作者提供
- en: Why Evals aren’t Optional (Unless You Like Surprises)
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么评估不是可选项（除非你喜欢惊喜）
- en: 'Evals help you measure whether your AI system is actually working the way you
    *want* it to, whether the system is ready to go live, and if once live it keeps
    performing as expected. Breaking down why evals are essential:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 评估帮助你衡量你的AI系统是否真的按照你*希望*的方式工作，系统是否准备好上线，一旦上线是否能够按预期持续表现。分解评估之所以必要的原因：
- en: '**Quality Assessment:** Evals provide a structured way to understand the quality
    of your AI’s predictions or outputs and how they will integrate in the overall
    system and use case. Are responses accurate? Helpful? Coherent? Relevant?'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**质量评估**：评估提供了一种结构化的方式来理解你的人工智能预测或输出的质量，以及它们如何集成到整体系统和用例中。响应是否准确？有帮助？连贯？相关？'
- en: '**Error Quantification:** Evaluations help quantify the percentage, types,
    and magnitudes of errors. How often things go wrong? What kinds of errors occur
    more frequently (e.g. false positives, hallucinations, formatting mistakes)?'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**错误量化**：评估有助于量化错误的百分比、类型和程度。事情出错有多频繁？哪些类型的错误发生得更频繁（例如，假阳性、幻觉、格式错误）？'
- en: '**Risk Mitigation:** Helps you spot and prevent harmful or biased behavior
    before it reaches users — protecting your company from reputational risk, ethical
    issues, and potential regulatory problems.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险缓解**：帮助你发现并预防在用户接触到之前的有害或偏见行为，保护你的公司免受声誉风险、道德问题和潜在监管问题的侵害。'
- en: Generative AI, with its free input-output relationships and long text generation,
    makes evaluations even more critical and complex. When things go wrong, they can
    go very wrong. We’ve all seen headlines about chatbots giving dangerous advice,
    models generating biased content, or AI tools hallucinating false facts.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI，由于其自由的输入-输出关系和长文本生成，使得评估变得更加关键和复杂。当事情出错时，它们可能会出得很糟。我们都见过关于聊天机器人提供危险建议、模型生成有偏见的内容或AI工具产生虚假事实的头条新闻。
- en: “*AI will never be perfect, but with evals you can reduce the risk of embarrassment
    – which can cost you money, credibility, or a viral moment on Twitter.*“
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “*AI永远不会完美，但有了评估，你可以降低尴尬的风险——这可能会让你损失金钱、信誉，甚至可能成为Twitter上的病毒性时刻。*”
- en: How Do You Define an Evaluation Strategy?
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你如何定义评估策略？
- en: '![](../Images/74303082e5744b0bc9ec4d37780256da.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74303082e5744b0bc9ec4d37780256da.png)'
- en: Image by [akshayspaceship](https://unsplash.com/es/@akshayspaceship) on [Unsplash](https://unsplash.com/)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[akshayspaceship](https://unsplash.com/es/@akshayspaceship)在[Unsplash](https://unsplash.com/)提供
- en: So how do we define our evaluations? Evals aren’t one-size-fits-all. They are
    use-case dependent and should align with the specific goals of your AI application.
    If you’re building a search engine, you might care about result relevance. If
    it’s a chatbot, you might care about helpfulness and safety. If it’s a classifier,
    you probably care about accuracy and precision. For systems with multiple steps
    (like an AI system that performs search, prioritizes results and then generates
    an answer) it’s often necessary to evaluate each step. The idea here is to measure
    if each step is helping reach the general success metric (and through this understand
    where to focus iterations and improvements).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何定义我们的评估标准呢？评估标准并非一刀切。它们取决于具体的应用场景，并且应该与您的人工智能应用的具体目标相一致。如果您正在构建搜索引擎，您可能关心结果的相关性。如果是聊天机器人，您可能关心其有用性和安全性。如果是分类器，您可能更关心准确性和精确度。对于具有多个步骤的系统（例如，执行搜索、优先排序结果然后生成答案的AI系统），通常需要评估每个步骤。这里的想法是衡量每个步骤是否有助于达到总体成功指标（并通过这种方式了解在哪里集中迭代和改进）。
- en: 'Common evaluation areas include:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 常见的评估领域包括：
- en: '**Correctness & Hallucinations:** Are the outputs factually accurate? Are they
    making things up?'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正确性与幻觉**：输出是否在事实上准确？它们是否在编造事实？'
- en: '**Relevance:** Is the content aligned with the user’s query or the provided
    context?'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相关性**：内容是否与用户的查询或提供的环境相一致？'
- en: safety, bias, and toxicity
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全性、偏见和毒性
- en: '**Format:** Are outputs in the expected format (e.g., JSON, valid function
    call)?'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**格式**：输出是否在预期的格式中（例如，JSON，有效的函数调用）？'
- en: '**Safety, Bias & Toxicity:** Is the system generating harmful, biased, or toxic
    content?'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性、偏见与毒性**：系统是否生成有害、有偏见或有毒的内容？'
- en: '**Task-Specific Metrics.** For example in classification tasks measures such
    as accuracy and precision, in summarization tasks ROUGE or BLEU, and in code generation
    tasks regex and execution without error check.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**任务特定指标**。例如，在分类任务中，准确性和精确度等度量，在摘要任务中ROUGE或BLEU，在代码生成任务中正则表达式和无错误检查的执行。'
- en: How Do You Actually Compute Evals?
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何实际计算评估？
- en: 'Once you know what you want to measure, the next step is designing your test
    cases. This will be a set of examples (the more examples the better, but always
    balancing value and costs) where you have:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您知道您要衡量什么，下一步就是设计您的测试用例。这将是一组示例（示例越多越好，但始终平衡价值和成本），其中您有：
- en: '**Input example**:  A realistic input of your system once in production.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输入示例**：系统在生产中的实际输入。'
- en: '**Expected Output** (if applicable): Ground truth or example of desirable results.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预期输出**（如果适用）：真实或期望的结果示例。'
- en: '**Evaluation Method:** A scoring mechanism to assess the result.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估方法**：一种评分机制来评估结果。'
- en: '**Score or Pass/Fail**: computed metric that evaluates your test case'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评分或通过/失败**：计算出的指标，用于评估您的测试用例'
- en: 'Depending on your needs, time, and budget, there are several techniques you
    can use as evaluation methods:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您的需求、时间和预算，您可以使用几种技术作为评估方法：
- en: '**Statistical Scorers like** BLEU, ROUGE, METEOR, or cosine similarity between
    embeddings — good for comparing generated text to reference outputs.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**统计评分器，如** BLEU、ROUGE、METEOR或嵌入之间的余弦相似度——适用于比较生成的文本与参考输出。'
- en: '**Traditional ML Metrics like** Accuracy, precision, recall, and AUC — best
    for classification with labeled data.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**传统的机器学习指标，如** 准确率、精确率、召回率和AUC——最适合有标记数据的分类。'
- en: '**LLM-as-a-Judge** Use a large language model to rate outputs (e.g., “*Is this
    answer correct and helpful?*”). Especially useful when labeled data isn’t available
    or when evaluating open-ended generation.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM作为评判者**：使用大型语言模型来评估输出（例如，“*这个答案正确且有用吗？*”）。特别适用于没有标记数据或评估开放式生成时。'
- en: '**Code-Based Evals** Use regex, logic rules, or test case execution to validate
    formats.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**基于代码的评估**：使用正则表达式、逻辑规则或测试用例执行来验证格式。'
- en: Wrapping it up
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: Let’s bring everything together with a concrete example. Imagine you’re building
    a sentiment analysis system to help your customer support team prioritize incoming
    emails.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个具体的例子来综合一下。假设您正在构建一个情感分析系统，以帮助您的客户支持团队优先处理收到的电子邮件。
- en: 'The goal is to make sure the most urgent or negative messages get faster responses
    — ideally reducing frustration, improving satisfaction, and decreasing churn.
    This is a relatively simple use case, but even in a system like this, with limited
    outputs, quality matters: bad predictions could lead to prioritizing emails randomly,
    meaning your team wastes time with a system that costs money.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是确保最紧急或负面的信息能够得到更快的响应——理想情况下减少挫折，提高满意度，并降低流失率。这是一个相对简单的用例，但即使在这样一个系统，输出有限的情况下，质量也很重要：错误的预测可能导致随机优先处理电子邮件，这意味着你的团队在浪费与系统相关的金钱。
- en: 'So how do you know your solution is working with the needed quality? You evaluate.
    Here are some examples of things that might be relevant to assess in this specific
    use case:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 那么你如何知道你的解决方案是否以所需的质量工作？你需要进行评估。以下是一些可能在这个特定用例中相关的评估示例：
- en: '**Format Validation:** Are the outputs of the LLM call to predict the sentiment
    of the email returned in the expected JSON format? This can be evaluated via code-based
    checks: regex, schema validation, etc.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**格式验证**：LLM调用预测电子邮件情感的结果是否以预期的JSON格式返回？这可以通过基于代码的检查进行评估：正则表达式、模式验证等。'
- en: '**Sentiment Classification Accuracy:** Is the system correctly classifying
    sentiments across a range of texts — short, long, multilingual? This can be evaluated
    with labeled data using traditional ML metrics — or, if labels aren’t available,
    using LLM-as-a-judge.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情感分类准确率**：系统是否正确地对各种文本（短、长、多语言）进行情感分类？这可以通过使用标记数据并采用传统的机器学习指标进行评估——或者，如果没有标签，可以使用LLM作为裁判。'
- en: Once the solution is live, you would want to include also metrics that are more
    related to the final impact of your solution*:*
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦解决方案上线，你还希望包括更多与解决方案最终影响相关的指标：*
- en: '**Prioritization Effectiveness:** Are support agents actually being guided
    toward the most critical emails? Is the prioritization aligned with the desired
    business impact?'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优先级有效性**：支持人员是否实际上被引导到最重要的电子邮件？优先级是否与期望的商业影响一致？'
- en: '**Final Business Impact** Over time, is this system reducing response times,
    lowering customer churn, and improving satisfaction scores?'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最终业务影响**：随着时间的推移，这个系统是否在减少响应时间、降低客户流失率以及提高满意度评分？'
- en: '**Evals are key to ensure we build useful, safe, valuable, and user-ready AI
    systems in production.** So, whether you’re working with a simple classifier or
    an open ended chatbot, take the time to define what “good enough” means (Minimum
    Viable Quality) — and build the evals around it to measure it!'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**评估是确保我们在生产中构建有用、安全、有价值且用户就绪的AI系统**的关键。因此，无论你是在处理一个简单的分类器还是一个开放式聊天机器人，都要花时间定义“足够好”的含义（最小可行质量）——并围绕它构建评估来衡量它！'
