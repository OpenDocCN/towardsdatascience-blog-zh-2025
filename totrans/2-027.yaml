- en: Building a Modern Dashboard with Python and Tkinter
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/building-a-modern-dashboard-with-python-and-tkinter/](https://towardsdatascience.com/building-a-modern-dashboard-with-python-and-tkinter/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1755664244189" class="mdspan-comment">Before there was Gradio</mdspan>,
    before there was Streamlit, before there was Taipy, there was Tkinter. Tkinter
    was and is the original Python GUI builder, and, until a few years ago, it was
    one of the few ways you could produce any type of dashboard or GUI using Python.
  prefs: []
  type: TYPE_NORMAL
- en: As newer, web-based frameworks like the ones mentioned above have taken the
    limelight for the desktop presentation of data-centric and machine learning applications,
    we ask the question, **“Is there still mileage left in using the Tkinter library?”.**
  prefs: []
  type: TYPE_NORMAL
- en: My answer to this question is a resounding Yes! I hope to demonstrate in this
    article that Tkinter remains a powerful, lightweight, and highly relevant tool
    for creating native desktop GUI and data dashboard applications.
  prefs: []
  type: TYPE_NORMAL
- en: For developers who need to create internal tools, simple utilities, or educational
    software, Tkinter can be the ideal choice. It doesn’t require complex web servers,
    JavaScript knowledge, or heavy dependencies. It’s Python, pure and simple. And
    as I show later, you can produce some pretty complex, modern-looking dashboards
    with it.
  prefs: []
  type: TYPE_NORMAL
- en: In the rest of this article, we will journey from the fundamental principles
    of Tkinter to the practical construction of a dynamic, data-driven dashboard,
    proving that this “OG” GUI library still has plenty of modern tricks up its sleeve.
  prefs: []
  type: TYPE_NORMAL
- en: What is Tkinter and Why Should You Still Care?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Tkinter is the standard, built-in Graphical User Interface (GUI) toolkit for
    Python. The name is a play on words of “Tk Interface.” It’s a wrapper around Tcl/Tk,
    a robust and cross-platform GUI toolkit that has been around since the early 1990s.
  prefs: []
  type: TYPE_NORMAL
- en: Its single most significant advantage is its inclusion in the Python standard
    library. This means if you have Python installed, you have Tkinter. There are
    no pip install commands to run, no virtual environment dependency conflicts to
    resolve. It works out of the box on Windows, macOS, and Linux.
  prefs: []
  type: TYPE_NORMAL
- en: So, why choose Tkinter in an age of flashy web frameworks?
  prefs: []
  type: TYPE_NORMAL
- en: '**Simplicity and Speed:** For small to medium-sized applications, Tkinter is
    fast to develop with. You can have a functional window with interactive elements
    in just a few lines of code.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lightweight:** Tkinter applications have a tiny footprint. They don’t require
    a browser or a web server, making them ideal for simple utilities that need to
    run efficiently on any machine.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Native Look and Feel (to an extent):** While classic Tkinter has a famously
    dated look, the ttk themed widget set provides access to more modern, native-looking
    controls that better match the host operating system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Excellent for Learning:** Tkinter teaches the fundamental concepts of event-driven
    programming — the core of all GUI development. Understanding how to manage widgets,
    layouts, and user events in Tkinter provides a solid foundation for learning any
    other GUI framework.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Of course, it has its drawbacks. Complex, aesthetically demanding applications
    can be challenging to build, and their design philosophy can feel more verbose
    compared to the declarative style of Streamlit or Gradio. However, for its intended
    purpose — creating functional, standalone desktop applications — it excels.
  prefs: []
  type: TYPE_NORMAL
- en: Over time, though, additional libraries have been written that make Tkinter
    GUIs more modern-looking. One of these, which we’ll use, is called ttkbootstrap.
    This is built on top of Tkinter, adds extra widgets and can give your GUIs a Bootstrap-inspired
    look.
  prefs: []
  type: TYPE_NORMAL
- en: The Core Concepts of a Tkinter Application
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Every Tkinter application is built upon a few key pillars. Grasping these concepts
    is essential before you can create anything meaningful.
  prefs: []
  type: TYPE_NORMAL
- en: '**1/ The Root Window**'
  prefs: []
  type: TYPE_NORMAL
- en: The root window is the main container for your entire application. It’s the
    top-level window that has a title bar, minimise, maximise, and close buttons.
    You create it with a single line of code like this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: That code produces this. Not the most exciting thing to look at, but it is a
    start.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/25b022fc0b78f69fdea084f842439d96.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Everything else in your application — buttons, labels, input fields , and so
    on — will live inside this root window.
  prefs: []
  type: TYPE_NORMAL
- en: '**2/ Widgets**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Widgets are the building blocks of your GUI. They are the elements the user
    sees and interacts with. Some of the most common widgets include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Label: Displays static text or images.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Button: A clickable button that can trigger a function.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Entry: A single-line text input field.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Text: A multi-line text input and display area.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Frame: An invisible rectangular container used to group other widgets. This
    is crucial for organising complex layouts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Canvas: A versatile widget for drawing shapes, creating graphs, or displaying
    images.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Checkbutton and Radiobutton: For boolean or multiple-choice selections.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**3/ Geometry Managers**'
  prefs: []
  type: TYPE_NORMAL
- en: Once you’ve created your widgets, you need to tell Tkinter where to put them
    inside the window. This is the job of geometry managers. Note that you can’t mix
    and match different managers within the same parent container (like a root or
    a Frame).
  prefs: []
  type: TYPE_NORMAL
- en: '**pack()**: The simplest manager. It “packs” widgets into the window, either
    vertically or horizontally. It’s quick for straightforward layouts but offers
    little precise control.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**place()**: The most precise manager. It allows you to specify the exact pixel
    coordinates (x, y) and size (width, height) of a widget. This is generally to
    be avoided because it makes your application rigid and not responsive to window
    resizing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**grid()**: The most powerful and flexible manager, and the one we will use
    for our dashboard. It organises widgets in a table-like structure of rows and
    columns, making it perfect for creating aligned, structured layouts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**4/ The Main Loop**'
  prefs: []
  type: TYPE_NORMAL
- en: The line root.mainloop() is the final and most critical part of any Tkinter
    application. This method starts the event loop. The application enters a waiting
    state, listening for user actions like mouse clicks, key presses, or window resizing.
    When an event occurs, Tkinter processes it (e.g., calling a function tied to a
    button click) and then returns to the loop. The application will only close when
    this loop is terminated, usually by closing the window.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up a dev environment
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Before we start to code, let’s set up a development environment. I’m slowly
    switching to the **UV** command line tool for my environment setup, replacing
    conda, and that’s what we’ll use here.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Example 1: A Simple “Hello, Tkinter!” app'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s put these concepts into practice. We’ll create a window with a label and
    a button. When the button is clicked, the label’s text will change.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: It should look like this, with the image on the right what you get when you
    click the button.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c5b7b41888e60ca1913c426a11a93490.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: So far, so straightforward; however, you ***can*** create modern, visually appealing
    GUIs and dashboards with Tkinter. To illustrate this, we’ll create a more comprehensive
    and complex app that showcases what Tkinter can do.
  prefs: []
  type: TYPE_NORMAL
- en: Example 2 — A modern data dashboard
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For this example, we’ll create a data dashboard using a dataset from Kaggle
    called CarsForSale. This comes with a CC0:Public Domain licence, meaning it can
    be freely used for most purposes.
  prefs: []
  type: TYPE_NORMAL
- en: 'It is a US-centric data set containing sales and performance details for approximately
    9300 different car models from about 40 different manufacturers spanning the period
    2001–2022\. You can get it using the link below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.kaggle.com/datasets/chancev/carsforsale/data](https://www.kaggle.com/datasets/chancev/carsforsale/data)'
  prefs: []
  type: TYPE_NORMAL
- en: Download the data set and save it to a CSV file on your local system.
  prefs: []
  type: TYPE_NORMAL
- en: '**NB: This data set is provided under the** [**CC0: Public Domain**](https://creativecommons.org/publicdomain/zero/1.0/)
    **licence, therefore it’s fine to use in this context.**'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4c6483dc0d12472c82f94f13f7b9fe12.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from the Kaggle website
  prefs: []
  type: TYPE_NORMAL
- en: This example will be much more complex than the first, but I wanted to give
    you a good idea of exactly what was possible with Tkinter, so here goes. I’ll
    present the code and describe its general functionality before we examine the
    GUI it produces.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: High-Level Code Description and Technology Stack
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This Python script creates a comprehensive and highly interactive graphical
    dashboard designed for the exploratory analysis of a used car dataset. It is built
    as a standalone desktop application using a combination of powerful libraries.
    **Tkinter**, via the **ttkbootstrap** wrapper, provides the modern, themed graphical
    user interface (GUI) components and window management. Data manipulation and aggregation
    are handled efficiently in the background by the **pandas** library. All data
    visualisations are generated by **matplotlib** and seamlessly embedded into the
    Tkinter window using its FigureCanvasTkAgg backend, allowing for complex, interactive
    charts within the application frame. The application is architected within a single
    Dashboard class, encapsulating all its state and methods for a clean, organised
    structure.
  prefs: []
  type: TYPE_NORMAL
- en: Data Ingestion and Preprocessing
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Upon startup, the application performs a robust data loading and cleaning sequence.
    It reads a specified CSV file using pandas, immediately performing several preprocessing
    steps to ensure data quality and consistency.
  prefs: []
  type: TYPE_NORMAL
- en: '**Header Normalisation**: It iterates through all column names, converting
    them to lowercase and removing special characters. This prevents errors caused
    by inconsistent naming, such as “Price” vs. “price”.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Column Aliasing:** It uses a predefined dictionary to rename common alternative
    column names (e.g., “brand” or “manufacturer”) to a standard internal name (e.g.,
    “make”). This adds flexibility, allowing the application to work with different
    CSV formats without code changes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Intelligent ‘Year’ Detection:** If a “year” column isn’t explicitly found,
    the script intelligently scans other columns to find one containing numbers that
    fall within a typical automotive year range (1900–2035), automatically designating
    it as the ‘year’ column.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Type Coercion:** It systematically cleans columns expected to be numeric
    (like price and mileage) by removing non-numeric characters (e.g., ‘$’, ‘,’, ‘
    mi’) and converting the results to floating-point numbers, gracefully handling
    any conversion errors.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data Pruning:** Finally, it removes any rows that are missing essential data
    points (make and price), ensuring that all data used for plotting and analysis
    is valid.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: User Interface and Interactive Filtering
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The user interface is organised into a main notebook with three distinct tabs,
    providing a straightforward workflow for analysis.
  prefs: []
  type: TYPE_NORMAL
- en: A central feature is the **dynamic filtering panel**. This panel contains widgets
    like a Combobox for car makes and Spinbox controls for price and year ranges.
    These widgets are linked directly to the application’s core logic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**State Management:** When a user changes a filter, a central method, _apply_filters,
    is triggered. This function creates a new, temporary pandas DataFrame named self.filtered
    by applying the user’s selections to the master dataset. This self.filtered DataFrame
    then becomes the single source of truth for all visual components.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automatic UI Refresh:** After the data is filtered, the _apply_filters method
    orchestrates a full refresh of the dashboard by calling all necessary update functions.
    This includes redrawing every plot on the “Overview” tab, updating the key performance
    indicator (KPI) cards, repopulating the data table, and crucially, redrawing the
    currently active chart on the “Analysis” tab. This creates a highly responsive
    and intuitive user experience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Visualisation and Analysis Tabs
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The core value of the application lies in its visualisation capabilities, spread
    across two tabs:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1/ Overview Tab:** This serves as the main dashboard, featuring:'
  prefs: []
  type: TYPE_NORMAL
- en: '**KPI Cards:** Four prominent cards at the top display key metrics like “Total
    Cars” and “Average Price,” which update in real-time with the filters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**2×2 Chart Grid:** A large, multi-panel figure displays four charts simultaneously:
    a histogram for price distribution, a pie chart for drivetrain types, a horizontal
    bar chart for the top 10 makes by average price, and a **clickable scatter plot**
    showing vehicle mileage versus price, colored by year. Clicking a point on this
    scatter plot brings up an annotation showing the car’s make and model. This interactivity
    is achieved by connecting a Matplotlib pick_event to a handler function that draws
    the annotation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**2/ Analysis Tab:** This tab is for more focused, single-plot analysis. A
    row of buttons allows the user to select one of several advanced visualisations:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Correlation Heatmap:** Shows the correlation between all numeric columns
    in the dataset.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Price by Make Box Plot:** Compares the price distributions of the top 15
    most common car makes, providing insight into price variance and outliers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ratings Box Plot:** Displays and compares the distributions of various consumer
    rating categories (e.g., comfort, performance, reliability).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MPG Scatter Plot:** A fully interactive scatter plot for analysing city vs.
    highway MPG, with points colored by make and a click-to-annotate feature similar
    to the one on the overview tab.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The application cleverly remembers which analysis plot was last viewed and automatically
    redraws it with new data whenever the global filters are changed.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**3/ Data Tab:** For users who want to inspect the raw numbers, this tab displays
    the filtered data in a scrollable Treeview table. It also includes a live search
    box that instantly filters the table’s contents as the user types.'
  prefs: []
  type: TYPE_NORMAL
- en: Running the code
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The code is run in the same way as a regular Python program, so save it to
    a Python file, e.g tktest.py, and make sure you change the file location to be
    wherever you downloaded the file from Kaggle. Run the code like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Your screen should look like this,
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5afce76f2a3d7f108217e63d4473abc0.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: You can switch between the Overview, Analytics and data TABS for different views
    on the data. If you change the **Make** or **Drivetrain** from the drop-down options,
    the displayed data will reflect this immediately. Use the **Apply Year/Price Filter**
    button to see changes to the data when you choose different year or price ranges.
  prefs: []
  type: TYPE_NORMAL
- en: The overview screen is the one you first see when the GUI displays. It consists
    of four main charts and informational displays of statistics just underneath the
    filter fields.
  prefs: []
  type: TYPE_NORMAL
- en: The Analysis TAB provides four additional views of the data. A correlation heat-map,
    a Price by make chart, an MPG chart showing how efficient the various make/models
    are and a rating chart over six different metrics. On both the Price by Make chart
    and the Mileage v price chart on the overview TAB, you can click on an individual
    “dot” on the chart to see which car make and model it’s referring to. Here is
    what the MPG chart looks like showing how efficient various makes are in comparing
    their City v Highway MPG figures.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/205bd3bd7e0e301e80c48a9f566ee2dd.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7d085a41bd6dd2e07b3d4212f4c38fab.png)'
  prefs: []
  type: TYPE_IMG
- en: Lastly, we have a Data TAB. This is just a rows and columns tabular representation
    of the underlying data set. Like all the displayed charts, this output changes
    as you filter the data.
  prefs: []
  type: TYPE_NORMAL
- en: To see it in action, I first clicked on the Overview TAB and changed the input
    parameters to be,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: I then clicked on the data TAB and got this output.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7dd798b2624250fe7e1a5c0282450081.png)'
  prefs: []
  type: TYPE_IMG
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This article serves as a comprehensive guide to using Tkinter, Python’s original
    built-in GUI library, for creating modern, data-driven desktop applications. It
    is a durable, lightweight, and still-relevant tool, and paired with the ttkbootstrap
    library, is more than capable of producing modern-looking data displays and dashboards.
  prefs: []
  type: TYPE_NORMAL
- en: I began by covering the fundamental building blocks of any Tkinter application,
    such as the root window, widgets (buttons, labels), and geometry managers for
    layout.
  prefs: []
  type: TYPE_NORMAL
- en: I then moved on to a fully-featured analytics tool with a tabbed interface,
    dynamic filters that update all visuals in real-time, and clickable charts that
    provide a responsive and professional user experience, making a strong case for
    Tkinter’s capabilities beyond simple utilities.
  prefs: []
  type: TYPE_NORMAL
