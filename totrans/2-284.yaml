  zh: '[1] 亚历克谢·多索夫斯基等. 一图胜千言：大规模图像识别的Transformer. Arxiv. [https://arxiv.org/abs/2010.11929](https://arxiv.org/abs/2010.11929)
    [访问日期：2025年2月17日].'
- en: '[2] Hugo Touvron *et al*. Training Data-Efficient Image Transformers & Distillation
    Through Attention. Arxiv. [https://arxiv.org/abs/2012.12877](https://arxiv.org/abs/2012.12877)
