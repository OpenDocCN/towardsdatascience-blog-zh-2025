- en: 'DeiT Paper Walkthrough: Vision Transformer on a Budget'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/vision-transformer-on-a-budget/](https://towardsdatascience.com/vision-transformer-on-a-budget/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1748893371066" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The vanilla ViT is problematic. If you take a look at the original ViT paper
    [1], you’ll notice that although this deep learning model proved to work extremely
    well, it requires hundreds of millions of labeled training images to achieve this.  Well,
    that’s a lot.
  prefs: []
  type: TYPE_NORMAL
- en: This requirement of an enormous amount of data is definitely a problem, and
    thus, we need a solution for that. Touvron *et al.* back in December 2020 brought
    an idea in their research paper titled “*Training data-efficient image transformers
    & distillation through attention*” [2] to make training a ViT model to be computationally
    much cheaper. The authors came up with an idea where instead of training the transformer-based
    model from scratch, they exploited the knowledge of the existing model through
    distillation. With this approach, they managed to solve the ViT’s data-hungry
    problem while still maintaining high accuracy. What’s even more interesting is
    that this paper came out only two months after the original ViT!
  prefs: []
  type: TYPE_NORMAL
- en: In this article I am going to discuss the model which the authors referred to
    as DeiT (Data-efficient image Transformer) as well as how to implement the architecture
    from scratch. Since DeiT is directly derived from ViT, it is highly recommended
    to have prior knowledge about ViT before reading this article. You can find my
    previous article about it in reference [3] at the end of this post.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Idea of DeiT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: DeiT leverages the idea of *knowledge distillation*. In case you’re not yet
    familiar with the term, it is essentially a method to transfer the knowledge of
    a model (*teacher*) to another one (*student*) during the training phase. In this
    case, DeiT acts as the student whereas the teacher is RegNet, a CNN-based model.
    Later in the inference phase, we will completely omit the RegNet teacher and let
    the DeiT student make predictions on its own.
  prefs: []
  type: TYPE_NORMAL
- en: The knowledge distillation technique allows the student model to learn more
    efficiently, which makes sense since it not only learns the patterns in the dataset
    from scratch but also benefits from the knowledge of the teacher during training.
    Think of it like someone learning a new subject. They could study purely from
    books, but it will be much more efficient if they also had a mentor to provide
    guidance. In this analogy, the learner acts as the student, the books are the
    dataset, while the mentor is the teacher. So, with this mechanism, the student
    essentially derives knowledge from both the dataset and the teacher simultaneously.
    As a result, training a student model requires much less amount of data. To better
    illustrate this, the original ViT needed 300 million images for training (JFT-300M
    dataset), while DeiT relies only on 1 million images (ImageNet-1K dataset).  That’s
    300x smaller!
  prefs: []
  type: TYPE_NORMAL
- en: Technically speaking, knowledge distillation can be done without making any
    modifications to the student or teacher models. Rather, the changes are only made
    to the loss function and the training procedure. However, authors found that they
    can achieve more by slightly modifying the network structure, which at the same
    time also changing the distillation mechanism. Specifically, instead of sticking
    with the original ViT and apply a standard distillation process on it, they modify
    the architecture which they finally refer to as DeiT. It is important to know
    that this modification also causes the knowledge distillation mechanism to be
    different from the conventional one. To be exact, in ViT we only have the so-called
    *class token*, but in DeiT, we will utilize the *class token* itself and an additional
    one called *distillation token*. Look at the Figure 1 below to see where these
    two tokens are placed in the network.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/82ff5eeaf01df01dfb6d3f37cf01094d.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1\. The DeiT architecture [2].
  prefs: []
  type: TYPE_NORMAL
- en: DeiT and ViT Variants
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are three DeiT variants proposed in the paper, namely DeiT-Ti (Tiny),
    DeiT-S (Small) and DeiT-B (Base). Notice in Figure 2 that the largest DeiT variant
    (DeiT-B) is equivalent to the smallest ViT variant (ViT-B) in terms of the model
    size. So, this implicitly means that DeiT was indeed designed to challenge ViT
    by prioritizing efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/031b76ba4dab5468033c5c857d57a46d.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2\. DeiT and ViT variants [1, 2, 3].
  prefs: []
  type: TYPE_NORMAL
- en: Later in the coding part, I am going to implement the DeiT-B architecture. I
    will make the code as versatile as possible so that you can easily adjust the
    parameters if you want to implement the other variants instead. Taking a closer
    look at the DeiT-B row in the above table, we are going to configure the model
    such that it maps each image patch to a single-dimensional tensor of size 768\.
    The elements in this tensor will then be grouped into 12 heads inside the attention
    layer. By doing so, every single of these attention heads will be responsible
    to process 64 features. Remember that the attention layer we are talking about
    is essentially a component of a Transformer encoder layer. In the case of DeiT-B,
    this layer is repeated 12 times before the tensor is eventually forwarded to the
    output layer. If we implement it correctly according to these configurations,
    the model should contain 86 million trainable parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Experimental Results
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are plenty of experiments reported in the DeiT paper. Below is one of
    them that grabbed my attention the most.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4aa5ca572fcf630c41e16b300dd4ab0b.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3\. The performance of different models on ImageNet-1K dataset without
    additional training data [2].
  prefs: []
  type: TYPE_NORMAL
- en: 'The above figure was obtained by training multiple models on ImageNet-1K dataset,
    including EfficientNet, ViT, and the DeiT itself. In fact, there are two DeiT
    versions displayed in the figure: DeiT and DeiT⚗ — yes with that strange symbol
    for the latter (called “alembic”), which basically refers to the DeiT model trained
    using their proposed distillation mechanism.'
  prefs: []
  type: TYPE_NORMAL
- en: It is seen in the figure that the accuracy of ViT is already far behind DeiT
    with conventional distillation while still having the similar processing speed.
    The accuracy improved even further when the novel distillation mechanism was applied
    and the model was fine-tuned using the same images upscaled to 384×384 — hence
    the name DeiT-B⚗↑384\. In theory, ViT should have performed better than its current
    result, yet in this experiment it could not unleash its full potential since it
    wasn’t allowed to be trained on the enormous JFT-300M dataset. And that’s just
    one result that proves the superiority of DeiT over ViT in a data-limited situation.
  prefs: []
  type: TYPE_NORMAL
- en: I think that was probably all the things you need to understand to implement
    the DeiT architecture from scratch. Don’t worry if you haven’t fully grasped the
    entire idea of this model yet since we will get into the details in a minute.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: DeiT Implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As I mentioned earlier, the model we are about to implement is the DeiT-B variant.
    But since I also want to show you the novel knowledge distillation mechanism,
    I’ll specifically focus on the one referred to as DeiT-B⚗↑384\. Now let’s start
    by importing the required modules.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: As the modules have been imported, what we need to do next is to initialize
    some configurable parameters in the Codeblock 2 below, which are all adjusted
    according to the DeiT-B specifications. At the line `#(1)`, the `IMAGE_SIZE` variable
    is set to 384 since we are about to simulate the DeiT version that accepts the
    upscaled images. Despite this higher resolution input, we still keep the patch
    size the same as when working with 224×224 images, i.e., 16×16, as written at
    line `#(2)`. Next, we set `EMBED_DIM` to 768 (`#(3)`), while the `NUM_HEADS` and
    `NUM_LAYERS` variables are both set to 12 (`#(4–5)`). Authors decided to use the
    same FFN structure as the one used in ViT, in which the size of its hidden layer
    is four times larger than the embedding dimension (`#(6)`). The number of patches
    itself can be calculated using a simple formula shown at line `#(7)`. In this
    case, since our image size is 384 and the patch size is 16, the value of `NUM_PATCHES`
    is going to be 576\. Lastly, here I set `NUM_CLASSES` to 1000, simulating a classification
    task on ImageNet-1K dataset (`#(8)`).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Treating an Image as a Sequence of Patches
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When it comes to processing images using transformers, what we need to do is
    to treat them as a sequence of patches. Such a patching mechanism is implemented
    in the `Patcher` class below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: You can see in Codeblock 3 that we use an `nn.Conv2d` layer to do so (`#(1)`).
    Keep in mind that the operation done by this layer is not intended to actually
    perform convolution like in CNN-based models. Instead, we use it as a trick to
    extract the information of each patch in a non-overlapping manner, which is the
    reason that we set both `kernel_size` (`#(2)`) and `stride` (`#(3)`) to `PATCH_SIZE`
    (16). The operation done by this convolution layer involves the patching mechanism
    only — we haven’t actually put these patches into sequence just yet. In order
    to do so, we can simply utilize an `nn.Flatten` layer which I initialize at line
    `#(4)` in the above codeblock. What we need to do inside the `forward()` method
    is to pass the input tensor through the `conv` (`#(5)`) and `flatten` (`#(6)`)
    layers. It is also necessary to perform the permute operation afterwards because
    we want the patch sequence to be placed along axis 1 and the embedding dimension
    along axis 2 (`#(7)`).
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s test the `Patcher()` class above using the following codeblock. Here
    I test it with a dummy tensor which the dimension is set to 1×3×384×384, simulating
    a single RGB image of size 384×384.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: And below is what the output looks like. Here I print out the tensor dimension
    after each step so that you can clearly see the flow inside the network.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Notice at line `#(1)` that the spatial dimension of the tensor changed from
    384×384 to 24×24\. This indicates that our convolution layer successfully done
    the patching process. By doing so, every single pixel in the 24×24 image now represents
    each 16×16 patch of the input image. Furthermore, notice in the same line that
    the number of channels increased from 3 to `EMBED_DIM` (768). Later on, we will
    perceive this as the number of features that stores the information of a single
    patch. Next, we can see at line `#(2)` that our `flatten` layer successfully flattened
    the 24×24 tensor into a single-dimensional tensor of length 576, which means that
    we already got our image represented as a sequence of patch tokens. The permute
    operation I mentioned earlier was essentially done because in the case of time-series
    data PyTorch treats the axis 1 of a tensor as a sequence (`#(3)`).
  prefs: []
  type: TYPE_NORMAL
- en: Transformer Encoder
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now let’s put our `Patcher` class aside for a while since in this section we
    are going to implement the transformer encoder layer. This layer is directly derived
    from the original ViT paper which the architecture can be seen in the Figure 4
    below. Take a look at Codeblock 5 to see how I implement it.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/42b6465da8ab7808f87ae3f5415047af.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4\. The Transformer encoder layer used in ViT [1].
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: According to the above figure, there are four layers need to be initialized
    in the `__init__()` method, namely a multihead attention layer (`#(2)`), an MLP
    layer — which is equivalent to FFN in Figure 1 (`#(4)`), and two layer normalization
    layers (`#(1,3)`). I am not going to get deeper into the above code since it is
    exactly the same as what I explained in my previous article about ViT [4]. So,
    I do recommend you check that article to better understand how the `Encoder` class
    works. And additionally, if you need an in-depth explanation specifically about
    the attention mechanism, you can also read my previous transformer article [5]
    where I implemented the entire transformer architecture from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: We can now just go ahead to the testing code to see how the tensor flows through
    the network. In the following codeblock, I assume that the input tensor `x` is
    an image that has already been processed by the `Patcher` block we created earlier,
    which is the reason why I set it to have the size of 1×576×768.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: According to the above result, we can see that the final output tensor dimension
    is exactly the same as that of the input. This property allows us to stack multiple
    encoder blocks without disrupting the entire network structure. Furthermore, although
    the shape of the tensor appears to be constant along its way to the last layer,
    there are actually lots of dimensionality changes happening especially inside
    the attention and the FFN layers. However, these changes are not printed since
    the processes are done internally by `nn.MultiheadAttention` and `nn.Sequential`,
    respectively.
  prefs: []
  type: TYPE_NORMAL
- en: The Entire DeiT Architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All the codes I explained in the previous sections are actually identical to
    those used for constructing the ViT architecture. In this section, you will finally
    find the ones that clearly differentiate DeiT from ViT. Let’s now focus on the
    layers we need to initialize in the `__init__()` method of the `DeiT` class below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The first component I initialized here is `Patcher` we created earlier (`#(1)`).
    Next, instead of only using class token, DeiT utilizes another one named distillation
    token. These two tokens, which in the above code are referred to as `class_token`
    (`#(2)`) and `dist_token` (`#(3)`), will later be appended to the patch token
    sequence. We set these two additional tokens to be trainable, allowing them to
    interact with and learn from the patch tokens later during the processing in the
    attention layer. Notice that I initialized these two trainable tensors using `trunc_normal_()`
    with a standard deviation of 0.02 (`#(4–5)`). In case you’re not yet familiar
    with the function, it essentially generates a truncated normal distribution, which
    ensures that no value lies beyond two standard deviations from the mean, avoiding
    the presence of extreme values for weight initialization. This approach is actually
    better than directly using `torch.randn()` since this function does not have such
    a value truncation mechanism.
  prefs: []
  type: TYPE_NORMAL
- en: Afterwards, we create a learnable positional embedding tensor using the same
    technique which I do at lines `#(6)` and `#(7)`. It is important to keep in mind
    that this tensor will then be element-wise summed with the sequence of patch tokens
    that has been appended with the class and distillation tokens. Due to this reason,
    we need to set the length of axis 1 of this embedding tensor to `NUM_PATCHES+2`.
    Meanwhile, the transformer encoder layer is initialized inside `nn.ModuleList`
    which allows us to repeat the layer `NUM_LAYERS` (12) times (`#(8)`). The output
    produced by the last encoder layer in the stack will be processed with a layer
    norm (`#(9)`) before eventually being forwarded to the classification (`#(10)`)
    and distillation heads (`#(11)`).
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s move on to the `forward()` method which you can see in the Codeblock
    7b below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: After taking raw image as the input, this `forward()` method will process the
    image using the `patcher` layer (`#(1)`). As we have previously discussed, this
    layer is responsible to convert the image into a sequence of patches. Subsequently,
    we will concatenate the class and distillation tokens to it using `torch.cat()`
    (`#(2)`). It might be worth noting that even though the illustration in Figure
    1 places the class token in the beginning of the sequence and the distillation
    token at the end, but the code in the official GitHub repository [6] says that
    the distillation token is placed right after the class token. Thus, I decided
    to follow this approach in our implementation. Figure 5 below illustrates what
    the resulting tensor looks like.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4e675b0e3fc6bdabfaa3aa3d49fa0159.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5\. How class and distillation tokens are concatenated to the patch token
    sequence in our implementation [3].
  prefs: []
  type: TYPE_NORMAL
- en: Still with Codeblock 7b, what we need to do next is to inject the positional
    embedding tensor to the token sequence which the process is done at line (`#(3)`).
    We then pass the tensor through the stack of encoders using a simple loop (`#(4)`)
    and normalize the output produced by the last encoder layer (`#(5)`). At lines
    `#(6)` and `#(7)` we extract the information from the class and distillation tokens
    we appended earlier using a standard array slicing method. These two tokens should
    now contain meaningful information for classification task since they already
    learned the context of the image through the self-attention layers. The resulting
    `class_out` and `dist_out` tensors are then forwarded to two identical output
    layers and will undergo processing independently (`#(8–9)`). Since this model
    is intended for classification, these two output layers will produce tensors containing
    logits, in which every single element represents the raw prediction score of a
    class.
  prefs: []
  type: TYPE_NORMAL
- en: We can see the flow of the DeiT model with the following testing code, where
    we initially start with the raw input image (`#(1)`), turning it into sequence
    of patches (`#(2)`), concatenating class and distillation tokens (`#(3)`), and
    so on until eventually getting the output from both classification and distillation
    heads (`#(4–5)`).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: You can also run the following code if you want to see even more details of
    the architecture. It is seen in the resulting output that this network contains
    87 million number of parameters, which is slightly higher than reported in the
    paper (86 million). I do acknowledge that the code I wrote above is indeed much
    simpler than the one in the documentation, so I might probably miss something
    that leads to such a difference in the number of params — please let me know if
    you spot any mistakes in my code!
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: How Classification and Distillation Heads Work
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I would like to talk a little bit about the tensors produced by the two output
    heads. During the training phase, the output from the classification head is compared
    with the original ground truth (one-hot label) which the classification performance
    is evaluated using cross entropy loss. Meanwhile, the output from the distillation
    head is compared with the output produced by the teacher model, i.e., RegNet.
    We always perceive the output of the teacher as a truth regardless of whether
    its prediction is correct. And that’s essentially how knowledge is distilled from
    RegNet to DeiT.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are actually two methods possible to be used to perform knowledge distillation:
    *soft distillation* and *hard distillation*. The former is a technique where we
    use the logits produced by the teacher model as is (rather than the argmaxed logits)
    for the label. This kind of additional ground truth is referred to as *soft label*.
    If we decided to use this technique, we should use the so-called Kullback-Leibler
    (KL) loss, which is suitable for comparing two logits: one from the distillation
    head and another one from the teacher output. On the other hand, *hard distillation*
    is a technique where the prediction made by the teacher is argmaxed prior to being
    compared with the output from the distillation head. In this case, the teacher
    output is referred to as *hard label*, which is similar to a typical one-hot-encoded
    label. Thanks to this reason, if we were to use hard label instead, we can simply
    use the standard cross-entropy loss for this head. Although the authors found
    that hard distillation performed better than soft distillation, I still think
    that it is worth experimenting with the two approaches if you plan to use DeiT
    for your upcoming project to see if this notion also applies to your case.'
  prefs: []
  type: TYPE_NORMAL
- en: During the inference phase, we will no longer use the teacher model. Think of
    it like the student has graduated and is ready to work on its own. Despite the
    absence of the teacher, the output from the distillation head is still utilized.
    According to their GitHub documentation [6], the logits produced by both the classification
    and distillation heads are combined using a standard averaging mechanism before
    being argmaxed to obtain the final prediction.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Ending
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I think that’s everything about the main idea and implementation of DeiT. It
    is important to note that there are still lots of things I haven’t covered in
    this article. So, I do recommend you read the paper [2] if you want to get even
    deeper into the details of this deep learning model.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading, I hope you learn something new today!
  prefs: []
  type: TYPE_NORMAL
- en: '*By the way you can access the code used in this article in the link at reference
    number [7].*'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
