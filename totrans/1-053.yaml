- en: How I Use AI to Convince Companies to Adopt Sustainability
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我如何使用AI说服公司采用可持续性
- en: 原文：[https://towardsdatascience.com/how-i-use-ai-to-convince-companies-to-adopt-sustainability/](https://towardsdatascience.com/how-i-use-ai-to-convince-companies-to-adopt-sustainability/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-i-use-ai-to-convince-companies-to-adopt-sustainability/](https://towardsdatascience.com/how-i-use-ai-to-convince-companies-to-adopt-sustainability/)
- en: <mdspan datatext="el1764116506551" class="mdspan-comment">Nothing is harder</mdspan>
    than convincing someone of a truth they cannot see in their own data.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764116506551" class="mdspan-comment">没有什么比说服某人相信他们自己数据中看不到的事实更难了。</mdspan>
- en: 'Data science and sustainability experts face the same problem: our concepts
    may be too abstract and theoretical, making them difficult for decision-makers
    to relate to.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学和可持续性专家面临相同的问题：我们的概念可能过于抽象和理论化，使得决策者难以与之建立联系。
- en: I learned this the hard way while developping my startup!
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我在开发我的初创公司时就是这样学到的！
- en: When I published a [case study on **Green Inventory Management**](https://towardsdatascience.com/data-science-for-sustainability-green-inventory-management-e7ddfd97696f/)
    on TDS in 2024, I thought the logic was solid and convincing, but the impact was
    limited.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当我在2024年在TDS上发布关于**绿色库存管理**的案例研究时，我认为逻辑是稳固且令人信服的，但影响有限。
- en: '![](../Images/0af5fcfc19384babbbb367927d515681.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0af5fcfc19384babbbb367927d515681.png)'
- en: Green Inventory Management = Optimising Store Replenishment Strategies to Reduce
    CO2 Emissions (Image by Samir Saci)
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 绿色库存管理 = 优化库存补货策略以减少二氧化碳排放（图片由Samir Saci提供）
- en: The article explained the mathematical theory behind it and used an actual case
    study to demonstrate the sustainability benefits.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 文章解释了其背后的数学理论，并使用实际案例研究来展示可持续性带来的好处。
- en: Yet it didn’t convert sceptics.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，它并没有说服怀疑者。
- en: 'Customer: “I am sure it won’t work with our operations!”'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 客户：“我确信这不会与我们的运营配合！”
- en: Why? Because it wasn’t connected to their data and constraints.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？因为它没有与他们的数据和限制相连接。
- en: So I decided to change the approach.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我决定改变方法。
- en: I packaged the simulation tool in a FastAPI microservice and gave my customers
    the ability to test the model themselves using an **MCP Server** connected to
    **Claude Desktop**.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我将模拟工具打包成FastAPI微服务，并让客户能够通过连接到**Claude Desktop**的**MCP服务器**自行测试模型。
- en: '![](../Images/9a838145c5f8bd7a375f69cac61d338f.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9a838145c5f8bd7a375f69cac61d338f.png)'
- en: Simple setup of local MCP server connected to the analytics product – (Image
    by Samir Saci)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 简单设置连接到分析产品的本地MCP服务器 – （图片由Samir Saci提供）
- en: The objective was to have them ask the LLM to run their own scenarios, adjust
    their parameters, and see how CO₂ emissions dropped in response to different inventory
    policies.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是让他们要求LLM运行自己的场景，调整参数，并看到不同的库存政策如何导致二氧化碳排放量下降。
- en: In this article, I will share the approach I used for this experiment and the
    feedback I received from a prospect, the Supply Chain Director of a retail group
    based in the Asia Pacific region.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我将分享我用于这个实验的方法以及我从亚太地区一家零售集团供应链总监那里收到的反馈。
- en: What is Green Inventory Management?
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是绿色库存管理？
- en: In this section, I want to briefly explain the concept of Green Inventory Management
    so you have the context to understand the tool’s added value.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我想简要解释绿色库存管理的概念，以便您了解工具的附加价值。
- en: 'Context: Inventory Management for a Retail Company'
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 背景：零售公司的库存管理
- en: Let us put ourselves in our Supply Chain Director’s shoes.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们站在我们的供应链总监的角度。
- en: His teams (inventory teams, warehouse and transportation operations) are responsible
    for replenishing stores from a central distribution centre.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 他的团队（库存团队、仓库和运输运营）负责从中央配送中心补充商店库存。
- en: '![](../Images/86ed5ef83d89213979b7184c8ae71b25.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/86ed5ef83d89213979b7184c8ae71b25.png)'
- en: Store Replenishment Process of our retail company – (Image by Samir Saci)
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们零售公司的库存补货流程 – （图片由Samir Saci提供）
- en: When they need specific products, stores automatically send replenishment orders
    via their ERP to the Warehouse Management System.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们需要特定产品时，商店会自动通过他们的ERP向仓库管理系统发送补货订单。
- en: '![](../Images/fa5ae6a375a704b173348c4b64ac67a5.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fa5ae6a375a704b173348c4b64ac67a5.png)'
- en: Inventory Management Rules — Periodic Review Policy (Image by Samir Saci)
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 库存管理规则—定期审查政策（图片由Samir Saci提供）
- en: These automated orders follow rules implemented by the inventory team, known
    as the periodic review **“Order-Up-To-Level (R, S)”** policy.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这些自动订单遵循库存团队实施的规则，称为定期审查的**“订单至水平 (R, S)”**策略。
- en: The ERP is reviewing stores’ inventory levels, also called inventory on hand
    (IOH), every **R days**
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ERP 每隔**R 天**审查商店的库存水平，也称为库存在手 (IOH)
- en: 'The delta between the target inventory S and the inventory level is calculated:
    **Δ = S— IOH**![](../Images/2ae2cc6f0544e8fcceb52fb6a599a7ea.png)'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 目标库存 S 与库存水平之间的差值计算为：**Δ = S - IOH**![图片](../Images/2ae2cc6f0544e8fcceb52fb6a599a7ea.png)
- en: 'A Replenishment Order is created and transmitted to the warehouse with the
    quantity: **Q = S — IOH**'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个补货订单，并带有数量：**Q = S - IOH**
- en: After transmission, the order is prepared at the warehouse and delivered to
    your store within a specific **lead time (LD) **in days.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 传输后，订单在仓库准备，并在特定**提前期 (LD**)内交付到您的商店。
- en: '![](../Images/fe88652c66bac077f3a627e24b8eb7b7.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fe88652c66bac077f3a627e24b8eb7b7.png)'
- en: Example of Periodic Review Policy – (Image by Samir Saci)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 定期审查策略示例 – (图片由 Samir Saci 提供)
- en: 'To be more concrete, I share the example above:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地说，我分享上面的例子：
- en: '**R = 25 days:** we review the inventory every 25 days as you can see in the
    blue scatter plot'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**R = 25 天**：如您在蓝色散点图中所见，我们每 25 天审查一次库存'
- en: '**S = 1,995 units:** we ordered to reach this level, as shown in the latest
    graph.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**S = 1,995 单位**：我们订购以达到这个水平，如最新图表所示。'
- en: The inventory teams in the systems usually set these parameters, and the replenishment
    orders are automatically triggered.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 系统中的库存团队通常设置这些参数，补货订单会自动触发。
- en: What if we optimise these parameters?
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们如何优化这些参数？
- en: Impacts on Logistics Operations
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对物流操作的影响
- en: Based on my experience, these parameters are, most of the time, not set optimally..
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的经验，这些参数大多数时候设置得并不优化。
- en: The problem is that they significantly impact the efficiency of your warehouse
    and transportation operations.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于它们会显著影响您仓库和运输操作的效率。
- en: This increases **carton and plastic consumption** and reduces **productivity**.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这增加了**纸箱和塑料消耗**并降低了**生产力**。
- en: '![](../Images/cebd58af7b0bda5e976e0c2a47aa0f79.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cebd58af7b0bda5e976e0c2a47aa0f79.png)'
- en: Impact on Carton Usage – (Image by Author)
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 对纸箱使用的影响 – (图片由作者提供)
- en: In the example above, items are stored in cartons containing units that can
    be picked individually.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的例子中，物品存储在包含可以单独挑选的单位纸箱中。
- en: 'If the order quantity is **five**, the operator will:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果订单数量是**五**个，操作员将：
- en: Open a box of 20 units and take **five units** ;
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开一个包含 20 个单位的盒子，取出**五个单位**；
- en: Take a new box and put these items in it ;
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拿一个新的盒子，把这些物品放进去；
- en: Palletise the boxes using **plastic film** ;
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**塑料薄膜**将盒子装起来；
- en: The other impact is on **truck filling rate** and **CO2 emissions**.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个影响是**卡车装载率**和**二氧化碳排放**。
- en: '![](../Images/5165ceeeb9b60d6d12ff31bba3993aa1.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5165ceeeb9b60d6d12ff31bba3993aa1.png)'
- en: Delivery Frequency and CO2 emissions – (Image by Samir Saci)
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 交付频率和二氧化碳排放 – (图片由 Samir Saci 提供)
- en: With a high delivery frequency, you reduce the volume per shipment.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 高交付频率可以减少每次装运的体积。
- en: This leads to the use of smaller trucks that may not be full.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致使用较小的卡车，这些卡车可能不会满载。
- en: What can we do?
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们能做什么？
- en: Objectives of Green Inventory Management
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 绿色库存管理目标
- en: We can test multiple scenarios, with different operational parameters, to find
    the optimal setup.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以测试多个场景，使用不同的操作参数，以找到最佳设置。
- en: For that, I have loaded customer data into the simulation model
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，我已经将客户数据加载到模拟模型中。
- en: to test the tool with real scenarios.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 以测试真实场景。
- en: '![](../Images/3a535693ea5f139d5a75459d471120a1.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3a535693ea5f139d5a75459d471120a1.png)'
- en: Simulation Parameters- (Image by Samir Saci)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟参数 - (图片由 Samir Saci 提供)
- en: Users can adjust some of these parameters to simulate different scenarios.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 用户可以调整一些这些参数来模拟不同的场景。
- en: '[PRE0]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'These parameters include:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这些参数包括：
- en: '`n_day` and `n_ref` : define the scope of simulation'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`n_day` 和 `n_ref`：定义模拟范围'
- en: '`pcs_carton`, `cartons_pal`, `LD` and `pallet_truck`: parameters linked to
    warehousing and transportation operations'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pcs_carton`、`cartons_pal`、`LD` 和 `pallet_truck`：与仓储和运输操作相关的参数'
- en: '`carton_weight`, `plastic_weight`: sustainability parameters'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`carton_weight`、`plastic_weight`：可持续性参数'
- en: '`R`, `k` and `CSL`: parameters set by the inventory team'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`R`, `k` 和 `CSL`：由库存团队设置的参数'
- en: I want our Supply Chain Director to sit with his teams (inventory, warehouse,
    transportation and sustainability) to challenge the status quo.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望我们的供应链总监能与他的团队（库存、仓库、运输和可持续性）坐下来挑战现状。
- en: 'If they need to reach a specific target, our director can:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果他们需要达到特定目标，我们的总监可以：
- en: Challenge his inventory teams to find better review periods (**R),** or cycle
    service level (**CSL)** targets
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 挑战他的库存团队找到更好的审查周期（**R**），或循环服务水平（**CSL**）目标
- en: Ask the sustainability team to find lighter carton materials
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要求可持续性团队寻找更轻的纸箱材料
- en: Redesign his warehouse operations to reduce the lead time (**LD**)
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新设计他的仓库运营以减少交货期（**LD**）
- en: '![](../Images/acb62e83e67db80873a7f2c39dc1f708.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/acb62e83e67db80873a7f2c39dc1f708.png)'
- en: Approach of the tool (Image by Samir Saci)
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 工具的方法（图片由萨米尔·萨奇提供）
- en: For that, we need to provide them with a tool to simulate the impact of specific
    changes.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，我们需要为他们提供一个工具来模拟特定变化的影响。
- en: '![](../Images/6e8318e4fd357d679277926b5fef97dc.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6e8318e4fd357d679277926b5fef97dc.png)'
- en: Example of Analysis – CO2 emissions for different scenario of delivery frequency
    – (Image by Samir Saci)
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 分析示例 – 不同交付频率场景的二氧化碳排放 – （图片由萨米尔·萨奇提供）
- en: This is what we’re going to do with the support of an MCP Server connected to
    Claude AI.
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这是我们将在连接到克劳德AI的MCP服务器支持下要做的事情。
- en: Demo of the Green Inventory Management AI Assistant
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 绿色库存管理人工智能助手演示
- en: Now that we know how this simulation tool can add value to my customers, let
    me show you examples of analyses they have performed.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道这个模拟工具如何为我的客户提供价值，让我向您展示他们进行的分析示例。
- en: These tests were performed using customer data over a simulation horizon of
    up to 90 days.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这些测试是在90天的模拟时间范围内使用客户数据进行的。
- en: '*I have replicated the questions and interactions using anonymised dummy data
    to avoid sharing confidential information here.*'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '*我已经使用匿名虚拟数据复制了问题和互动，以避免在此分享机密信息。*'
- en: Onboarding of users
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户入职
- en: I have connected the MCP server to the Claude environment used by the Supply
    Chain managers to have them “play with the tool”.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经将MCP服务器连接到供应链经理使用的克劳德环境，让他们“玩转工具”。
- en: The majority did not take the time to review the initial case study and directly
    asked Claude about the tool.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人没有花时间回顾初始案例研究，而是直接向克劳德询问工具。
- en: '![](../Images/409b6b8486f886200ba82588c16738f9.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/409b6b8486f886200ba82588c16738f9.png)'
- en: Initial Interaction – (Image by Samir Saci)
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 初始互动 – （图片由萨米尔·萨奇提供）
- en: Hopefully, I have documented the MCP tools to provide context to the agent,
    like in the toot `launch_greeninv` shared below.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 希望我已经记录了MCP工具，为代理提供上下文，就像下面分享的`toot launch_greeninv`一样。
- en: '[PRE1]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: I was quite satisfied with Claude’s introduction to the tool.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我对克劳德对工具的介绍非常满意。
- en: It starts with the introduction of the core capabilities of the tools from an
    operational point of view.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 它从从操作角度介绍工具的核心能力开始。
- en: '![](../Images/a457dd2a725a31eacddd61f62afe7b28.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a457dd2a725a31eacddd61f62afe7b28.png)'
- en: Introduction of the tool by Claude – (Image by Samir Saci)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 克劳德介绍工具 – （图片由萨米尔·萨奇提供）
- en: 'Quickly, our director started to send me long emails with questions on how
    to use the tool:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 很快，我们的总监开始给我发送长邮件，询问如何使用这个工具：
- en: How to set up the parameters?
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何设置参数？
- en: Who should I involve in this exercise?
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我应该让谁参与这个练习？
- en: 'My initial reflex was to answer: “Why don’t you ask Claude?”.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我的最初反应是回答：“你为什么不问克劳德？”。
- en: This is what they did, and the results are excellent. Claude proposed a framework
    of analysis.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 他们就是这样做的，结果非常出色。克劳德提出了一种分析框架。
- en: '![](../Images/5d7a6dd220da7697c313bed5ed4261c2.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5d7a6dd220da7697c313bed5ed4261c2.png)'
- en: Framework of collaborative work for green inventory optimisation – (Image by
    Samir Saci)
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 绿色库存优化协作工作框架 – （图片由萨米尔·萨奇提供）
- en: This framework is nearly perfect; I would just have put the lead time (LD) also
    in the scope of the Warehouse Manager.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 这个框架几乎完美；我只是在仓库经理的范围内也加入了交货期（LD）。
- en: However, I need to admit that I would never have been able to generate such
    a concise and well-formatted framework on my own.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我必须承认，我永远无法自己生成如此简洁和格式良好的框架。
- en: Then, Claude proposed a plan for this study with multiple phases.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，克劳德提出了这个研究的多阶段计划。
- en: '![](../Images/30250d8762fbe5e0a107e5ffe4f829d3.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/30250d8762fbe5e0a107e5ffe4f829d3.png)'
- en: Sample of the analysis plan proposed by Claude – (Image by Samir Saci)
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 克劳德提出的分析计划样本 – （图片由萨米尔·萨奇提供）
- en: Let me take you through the different phases from the user’s perspective.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 让我从用户的角度带您了解不同的阶段。
- en: 'Phase 1: Baseline Assessment'
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一阶段：基线评估
- en: I advised the team to continually ask Claude for a nice dashboard with a concise
    executive summary.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议团队不断向克劳德请求一个简洁的执行摘要仪表板。
- en: That is what they did for Phase 1.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是他们在第一阶段所做的事情。
- en: '![](../Images/02e18e7467a87456b2f41772053227c2.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/02e18e7467a87456b2f41772053227c2.png)'
- en: User asks for a run of the baseline – (Image by Samir Saci)
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 用户请求运行基线 – (图片由Samir Saci提供)
- en: As you can see in the screenshot above, Claude used the MCP Server tool `launch_greeninv`
    to run an analysis with the default parameters defined in the Pydantic model.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图截图所示，克劳德使用了MCP服务器工具`launch_greeninv`，使用Pydantic模型中定义的默认参数运行分析。
- en: With the outputs, it generated the Executive Summary for our director.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 使用输出，它为我们的总监生成了执行摘要。
- en: '![](../Images/33c3ae7a8a44b5a6fda6b0bb6b6866b3.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/33c3ae7a8a44b5a6fda6b0bb6b6866b3.png)'
- en: Executive Summary of the initial run – (Image by Samir Saci)
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 初始运行的执行摘要 – (图片由Samir Saci提供)
- en: The summary is concise and straight to the point.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 摘要简洁明了。
- en: It compares the outputs (key performance indicators) to the targets shared in
    the MCP docstring and the master prompt.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 它将输出（关键绩效指标）与MCP文档字符串和主提示中共享的目标进行比较。
- en: What about the managers?
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 那么管理者们呢？
- en: Then it generated team-specific outputs, including tables and comments that
    clearly highlighted the most significant issues, as shown in the example below.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 然后它生成了针对特定团队的输出，包括表格和注释，清楚地突出了最重要的问题，如下面的示例所示。
- en: '![](../Images/eca1e18e581faa7cbe8770eb799b5929.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eca1e18e581faa7cbe8770eb799b5929.png)'
- en: Example of the Warehouse Manager View – (Image by Samir Saci)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 仓库经理视图示例 – (图片由Samir Saci提供)
- en: What is interesting here is that our warehouse manager only mentioned the target
    pieces per line in a previous message.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有趣的是，我们的仓库经理在之前的消息中只提到了每条生产线的目标件数。
- en: That means we can have the tool **learn** not only from the MCP’s tools docstrings,
    master prompt, and Pydantic models, but also **from user interactions.**
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们可以让工具不仅从MCP的工具文档字符串、主提示和Pydantic模型中学习，而且**从用户交互中学习**。
- en: '![](../Images/4b7f147e5bc4e96395d2dab10b904efa.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4b7f147e5bc4e96395d2dab10b904efa.png)'
- en: Example of Sustainability Team view – (Image by Samir Saci)
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 可持续发展团队视图示例 – (图片由Samir Saci提供)
- en: Finally, the tool demonstrated its ability to have a strategic approach, providing
    mid-term projections and alerting on the key indicators.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，该工具展示了其具有战略性的方法，提供了中期预测，并对关键指标发出警报。
- en: '![](../Images/a62b1682989ee4713eda900b7c3ea3ef.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a62b1682989ee4713eda900b7c3ea3ef.png)'
- en: Next Steps proposed to the Director – (Image by Samir Saci)
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来向总监提出的下一步计划 – (图片由Samir Saci提供)
- en: However, nothing is perfect.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，没有什么是完美的。
- en: When you have weak prompting, Claude never loses the opportunity to hallucinate
    and propose decisions outside the scope of the study.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 当你进行弱提示时，克劳德从不放弃任何机会进行幻想，并提出超出研究范围的决定。
- en: Let us continue the exercise, following Anthropic’s model, and proceed to Phase
    2.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续这个练习，遵循Anthropic的模型，并进入第二阶段。
- en: 'Phase 2: Scenario Planning'
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第二阶段：情景规划
- en: After brainstorming with its team, our director collected multiple scenarios
    from each manager.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在与团队头脑风暴后，我们的总监收集了每位经理的多个场景。
- en: '![](../Images/b898a49b4ee49cecd3b08829adf4559d.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b898a49b4ee49cecd3b08829adf4559d.png)'
- en: Scenarios collected from the four managers – (Image by Samir Saci)
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 从四位管理者收集的场景 – (图片由Samir Saci提供)
- en: What we can see here is that each manager wanted to challenge the parameters
    focused on their scope of responsibility.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，每位经理都想挑战他们责任范围内的参数。
- en: This thought process is then transcribed into actions.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 这个思考过程随后被转化为行动。
- en: '![](../Images/138d25681962a0549ec9c04a03d088fc.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/138d25681962a0549ec9c04a03d088fc.png)'
- en: Claude decided to run the six scenarios listed above.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 克劳德决定运行上面列出的六个场景。
- en: The challenge here is to compile all the results into a synthetic, insight-driven
    summary.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的挑战是将所有结果汇总成一个综合的、以洞察力驱动的总结。
- en: '![](../Images/8a0e5639611beec346cbb1256773ff55.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8a0e5639611beec346cbb1256773ff55.png)'
- en: Example from the previous case study with a focus only on carton usage – (Image
    by Samir Saci)
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 以前案例研究的示例，仅关注纸箱使用 – (图片由Samir Saci提供)
- en: In the case study published in 2024, I focused only on the first three scenarios,
    examining each performance indicator individually.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在2024年发布的案例研究中，我仅关注前三个场景，并单独检查每个绩效指标。
- en: What about Claude?
  id: totrans-146
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 克劳德怎么样？
- en: Claude was smarter.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 克劳德更聪明。
- en: '![](../Images/a627213a6e565f5bbdac313ff9ec8431.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a627213a6e565f5bbdac313ff9ec8431.png)'
- en: Scenario Comparison Matrix – (Image by Samir Saci)
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 情景比较矩阵 – (图片由Samir Saci提供)
- en: Although we had the same type of data on hand, it produced something more “cross-functional”
    and decision-driven.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们手头有相同类型的数据，但它产生了更多“跨职能”和决策驱动的结果。
- en: We have business-friendly names for each scenario that are understandable across
    functions.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们为每个情景提供了易于跨职能理解的企业友好名称。
- en: Each scenario is linked to the team that pushed for it.
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个情景都与推动它的团队相关联。
- en: Finally, it provided an optimal scenario that is a consensus between the teams.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，它提供了一个最优情景，这是团队之间达成的一致。
- en: '![](../Images/589835ef01adf685abba1c148c585c20.png)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/589835ef01adf685abba1c148c585c20.png)'
- en: Explanation and score card of the consensus scenario – (Image by Samir Saci)
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性情景的解释和评分卡 – (图片由Samir Saci提供)
- en: We are even provided with a scorecard that explains to each team why the scenario
    is best for everybody.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我们甚至提供了一份评分卡，解释为什么每个情景对每个人来说都是最好的。
- en: 'For a more detailed breakdown of the agent’s outputs, feel free to [have a
    look at this tutorial](https://youtu.be/zOcYbmrkyqA):'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 要详细了解代理的输出，请随意[查看这个教程](https://youtu.be/zOcYbmrkyqA)：
- en: Conclusion
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: A new hope for the concept of Green Inventory Management
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 绿色库存管理概念的新希望
- en: After a couple of weeks of experimentation, the Supply Chain Director is convinced
    of the need to implement Green Inventory Management.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 经过几周的实验后，供应链总监确信有必要实施绿色库存管理。
- en: The only bottleneck here is on their side now.
  id: totrans-161
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 现在的唯一瓶颈在他们那边。
- en: With Claude’s support, our four managers involved in the study understood the
    impact of their roles on the distribution chain’s overall efficiency.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在Claude的支持下，参与研究的我们四位经理理解了他们的角色对整个分销链效率的影响。
- en: '[![](../Images/fd3cd1b0d8009663e5b27c36d6af33dc.png)](https://youtu.be/zOcYbmrkyqA)'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/fd3cd1b0d8009663e5b27c36d6af33dc.png)](https://youtu.be/zOcYbmrkyqA)'
- en: Matrix of Parameters Control by Team – (Image by Samir Saci)
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 团队控制的参数矩阵 – (图片由Samir Saci提供)
- en: This helps us at LogiGreen onboard Supply Chain departments for complex optimisation
    exercises like this one.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 这有助于我们在LogiGreen为复杂的优化练习（如这次）招募供应链部门。
- en: In my opinion, it is easier to conduct a green transformation when all teams
    have ownership and sponsorship.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，当所有团队都拥有所有权和赞助时，进行绿色转型更容易。
- en: And the only way to get that is to make sure everybody understands what we are
    doing.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 而要达到这一点，唯一的方法是确保每个人都理解我们在做什么。
- en: Based on the initial [results of this modest experiment](https://youtu.be/zOcYbmrkyqA),
    I think we have found an excellent tool for that.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这个适度实验的[初步结果](https://youtu.be/zOcYbmrkyqA)，我认为我们找到了一个极好的工具。
- en: Do you want other case studies using MCP Server for Supply Chain Optimisation?
  id: totrans-169
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你想要使用MCP服务器进行供应链优化的其他案例研究吗？
- en: AI Agent for Supply Chain Network Optimisation
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 供应链网络优化人工智能代理
- en: In another article published on Towards Data Science, I share a similar experiment
    focused on the Supply Chain Network Design exercise.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一篇发表在Towards Data Science的文章中，我分享了一个类似的实验，专注于供应链网络设计练习。
- en: '[![](../Images/03af9c1db874e6a95a513f18d96c8c9d.png)](https://www.youtube.com/watch?v=JjUEgkK_yD8)'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/03af9c1db874e6a95a513f18d96c8c9d.png)](https://www.youtube.com/watch?v=JjUEgkK_yD8)'
- en: Example of Network Design – (Image by Samir Saci)
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 网络设计示例 – (图片由Samir Saci提供)
- en: The objective here is more macro-level.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的目标是更宏观层面的。
- en: We want to determine **where** goods are produced to serve markets at the lowest
    cost in an environmentally friendly way.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望确定**在哪里**生产商品，以最低的成本、环保的方式服务于市场。
- en: '[![](../Images/13ab54a6a9f43fd4495cb2bf2f7292df.png)](https://www.youtube.com/watch?v=JjUEgkK_yD8)'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/13ab54a6a9f43fd4495cb2bf2f7292df.png)](https://www.youtube.com/watch?v=JjUEgkK_yD8)'
- en: Exemple of scenarios – (Image by Samir Saci)
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 情景示例 – (图片由Samir Saci提供)
- en: While the algorithm differs, the approach remains the same.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然算法不同，但方法保持一致。
