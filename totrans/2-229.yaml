- en: 'From Configuration to Orchestration: Building an ETL Workflow with AWS Is No
    Longer a Struggle'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/from-configuration-to-orchestration-building-etl-workflow-with-aws-is-no-longer-struggling/](https://towardsdatascience.com/from-configuration-to-orchestration-building-etl-workflow-with-aws-is-no-longer-struggling/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1750294795484" class="mdspan-comment">AWS continues</mdspan>
    to lead the cloud industry with a whopping 32% share due to its early market entry,
    robust technology and comprehensive service offerings. However, many users find
    AWS challenging to navigate, and this discontentment lead more companies and organisations
    to prefer its competitors Microsoft Azure and Google Cloud Platform.
  prefs: []
  type: TYPE_NORMAL
- en: Despite its steeper learning curve and less intuitive interface, AWS remains
    the top cloud service due to its reliability, hybrid cloud and maximum service
    options. More importantly, the selection of proper strategies can significantly
    reduce configuration complexity, streamline workflows, and boost performance.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll introduce an efficient way to set up a complete ETL pipeline
    with orchestration on AWS, based on my own experience. It will also give you a
    refreshed view on the production of data with AWS or make you feel less struggling
    when conducting configuration if this is your first time to use AWS for certain
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Strategy for Designing an Efficient Data Pipeline
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'AWS has the most comprehensive ecosystem with its vast services. To build a
    production-ready data warehouse on AWS at least requires the following services:'
  prefs: []
  type: TYPE_NORMAL
- en: IAM – Although this service isn’t included into any part of the workflow, it’s
    the foundation for accessing all other services.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AWS S3 – Data Lake storage
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AWS Glue – ETL processing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Amazon Redshift – Data Warehouse
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CloudWatch – Monitoring and logging
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You also need access to Airflow if you have to schedule more complex dependencies
    and conduct advanced retries in terms of error handling although Redshift can
    handle some basic cron jobs.
  prefs: []
  type: TYPE_NORMAL
- en: To make your work easier, I highly recommend to install an IDE (Visual Studio
    Code or PyCharm and of course you can choose your own favourite IDE). An IDE dramatically
    improves your efficiency for complex python code, local testing/debugging, version
    control integration and team collaboration. And in the next session, I’ll provide
    step by step configurations.
  prefs: []
  type: TYPE_NORMAL
- en: Initial Setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here are the steps of initial configurations:'
  prefs: []
  type: TYPE_NORMAL
- en: Launch a virtual environment in your IDE
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Install dependencies – basically, we need to install the libraries that will
    be used later on.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Install AWS CLI – this step allows you to write scripts to automate various
    AWS operations and makes the management of AWS resources more efficiently.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AWS Configuration – make sure to enter these IAM user credentials when prompted:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AWS Access Key ID: From your IAM user.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AWS Secret Access Key: From your IAM user.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Default region: `us-east-1` (or your preferred region)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Default output format: `json`.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Integrate Airflow – here are the steps:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Initialize Airflow
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Create DAG files in Airflow
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Run the web server at http://localhost:8080 (login:admin/admin)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Open another terminal tab and start the scheduler
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Development Workflow: COVID-19 Data Case Study'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’m using JHU’s public COVID-19 dataset (CC BY 4.0 licensed) for demonstration
    purpose. You can refer to data [here](https://raw.githubusercontent.com/CSSEGISandData/COVID-19/master/archived_data/archived_time_series/time_series_19-covid-Confirmed_archived_0325.csv),
  prefs: []
  type: TYPE_NORMAL
- en: The chart below shows the workflow from data ingestion to data loading to Redshift
    tables in the development environment.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7390050cc280521c7640e2b2568dc944.png)'
  prefs: []
  type: TYPE_IMG
- en: Development workflow created by author
  prefs: []
  type: TYPE_NORMAL
- en: '**Data Ingestion**'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the first step of data ingestion to AWS S3, I processed data by melting
    them to long format and converting the date format. I saved the data in the parquet
    format to improve the storage efficiency, enhance query performance and reduce
    storage costs. The code for this step is as below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: After running the python code, you should be able to see the parquet files in
    the S3 buckets, under the folder of ‘raw/covid/’.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3d0c68a603b018d7904eb52335c5ea1c.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: '**ETL Pipeline Development**'
  prefs: []
  type: TYPE_NORMAL
- en: 'AWS Glue is mainly used for ETL Pipeline Development. Although it can also
    be used for data ingestion even if the data hasn’t loaded to S3, its strength
    lies in processing data once it’s in S3 for data warehousing purposes. Here’s
    PySpark scripts for data transform:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/7eda0641c2ab7f15df57d78e46faaed2.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: The next step is to load data to Redshift. In Redshift Console, click on “Query
    Editor Q2” on the left side and you can edit your SQL code and finish the Redshift
    COPY.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Then you’ll see the data successfully uploaded to the data warehouse.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e97c2d102975bccd3fcb90331e3381c2.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: '**Pipeline Automation**'
  prefs: []
  type: TYPE_NORMAL
- en: The easiest way to automate your data pipeline is to schedule jobs under Redshift
    query editor v2 by creating a Stored Procedure (I have a more detailed introduction
    about SQL Stored Procedure, you can refer to [this article](https://towardsdatascience.com/how-to-enhance-sql-code-security-and-maintainability-3e398b4dd68e/)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/b40e208a2aa4f62427b1ccee7b9e130e.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: Alternatively, you can run Airflow for scheduled jobs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Production Workflow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Airflow DAG is powerful to orchestrates your entire ETL pipeline if there are
    many dependencies and it’s also a good practice in production environment.
  prefs: []
  type: TYPE_NORMAL
- en: After developing and testing your ETL pipeline, you can automate your tasks
    in production environment using Airflow.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f2e4d911ad83eaa061ae49db5c1eae2f.png)'
  prefs: []
  type: TYPE_IMG
- en: Production workflow created by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the check list of key preparation steps to help the successful deployment
    in Airflow:'
  prefs: []
  type: TYPE_NORMAL
- en: Create S3 bucket `my-prod-bucket`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create Glue job `prod_covid_transformation` in AWS Console
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create Redshift Stored Procedure `prod.load_covid_data()`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Configure Airflow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Configure SMTP for emails in `airflow.cfg`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Then the deployment of the data pipeline in Airflow is:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: My Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Although some users, especially those who are new to the cloud and seeking
    simple solutions tend to be daunted by AWS’s high barrier to entry and be overwhelmed
    by the massive choices of services, it’s worth the time and efforts and here are
    the reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: The process of configuration, and the designing, building and testing of the
    data pipelines gives you the deep understanding of a typical data engineering
    workflow. The skills will benefit you even if you produce your projects with other
    cloud services, such as Azure, GCP and Alibaba Cloud.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The mature ecosystem that AWS has and a vast array of services that it offers
    enable users to customise their data architecture strategies and enjoy more flexibility
    and scalability in their projects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thank you for reading! Hope this article helpful to build your cloud-base data
    pipeline!
  prefs: []
  type: TYPE_NORMAL
