- en: 'Data Roles, Small Language Models, Knowledge Graphs, and More: Our January
    Must-Reads'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-roles-small-language-models-knowledge-graphs-and-more-our-january-must-reads-2a5047bb66e0/](https://towardsdatascience.com/data-roles-small-language-models-knowledge-graphs-and-more-our-january-must-reads-2a5047bb66e0/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The Variable is moving soon—[sign up here](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)
    to ensure you receive all future newsletters.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Our prolific authors delivered some excellent work this past month, channeling
    all the renewed energy and excitement we’ve come to expect from January on TDS.
    From career advice to core programming and data-processing tasks, our most-read
    and -shared articles in the past month cover the topics that data professionals
    care about the most as they plan their next move and aim to expand their skill
    set.
  prefs: []
  type: TYPE_NORMAL
- en: 'We invite you to explore this month’s must-reads with an open mind: from the
    ever-shifting terrain of job descriptions to the rise of small language models
    (alongside large ones), they tackle well-covered areas in data science and machine
    learning from a fresh, actionable, and pragmatic perspective. Let’s get started.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**[How to Pick Between Data Science, Data Analytics, Data Engineering, ML Engineering,
    and SW Engineering](https://towardsdatascience.com/how-to-pick-between-data-science-data-analytics-data-engineering-ml-engineering-and-sw-055de18d05e3)**"When
    the job titles sound so similar and the roles have a good amount of overlap" it
    can be difficult to choose the right path for your own interests and priorities
    as a data practitioner. [Marina Wyss – Gratitude Driven](None)‘s clear and detailed
    overview will help you make an informed decision.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Your Company Needs Small Language Models](https://towardsdatascience.com/your-company-needs-small-language-models-d0a223e0b6d9)**Is
    it time to reassess the axiom that in AI, bigger is always better? [Sergei Savvov](None)
    makes a compelling case for the growing footprint of small language models in
    industry contexts, outlining the ways "they can reduce costs, improve accuracy,
    and maintain control of your data," and urges us to stay mindful of these models’
    current limitations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[The Large Language Model Course](https://towardsdatascience.com/the-large-language-model-course-b6663cd57ceb)**For
    anyone whose new year’s resolutions included expanding their knowledge of (and
    practical experience with) LLMs, [Maxime Labonne](None)‘s comprehensive course
    is the one-stop resource you’ll need to get started—it offers a well-structured
    curriculum that assumes no advanced knowledge, and comes full of recommended articles,
    tutorials, and tools.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Photo by Rima Kruciene on Unsplash](../Images/9d9c2cf580d037181a9ca2c4a473b3e2.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Rima Kruciene](https://unsplash.com/@rimakruciene?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: '**[5 Simple Projects to Start Today: A Learning Roadmap for Data Engineering](https://towardsdatascience.com/5-simple-projects-to-start-today-a-learning-roadmap-for-data-engineering-940ecbad6b5f)**For
    all the aspiring data engineers out there, [Sarah Lea](None) outlines a realistic,
    four-month plan that covers all the essentials. Most importantly, it guides you
    through several project ideas so that you not only grow your theoretical knowledge,
    but also get to practice the concepts and workflows you’re learning about.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[How to Build a Knowledge Graph in Minutes (And Make It Enterprise-Ready)](https://towardsdatascience.com/enterprise-ready-knowledge-graphs-96028d863e8c)**Looking
    to apply a similar hands-on approach to knowledge graphs? After facing major setbacks
    in the past, [Thuwarakesh Murallie](None) shows how you can build one on your
    own by leveraging the power of LLMs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Top 12 Skills Data Scientists Need to Succeed in 2025](https://towardsdatascience.com/top-12-skills-data-scientists-need-to-succeed-in-2025-c80f54cf227a)**"Many
    things are changing, but other things are not. Understanding which changes require
    your attention is the key to success." [Benjamin Bodner](None) breaks down the
    skills that remain essential for data professionals amid the disruptive pressure
    of AI tools.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Deep Dive into Multithreading, Multiprocessing, and Asyncio](https://towardsdatascience.com/deep-dive-into-multithreading-multiprocessing-and-asyncio-94fdbe0c91f0)**Whether
    you’re taking your first steps in Python or are already a seasoned programmer,
    there’s always more to learn; [Clara Chong](None)‘s recent post zooms in on concurrency
    models—approaches to handle multiple tasks simultaneously—and unpacks the stakes
    of choosing the right one, depending on your project’s needs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[How to Run Jupyter Notebooks and Generate HTML Reports with Python Scripts](https://towardsdatascience.com/how-to-run-jupyter-notebooks-and-generate-html-reports-with-python-scripts-48e0d96a30ed)**For
    another Python-focused tutorial that foregrounds the ability to streamline tedious
    workflows with code, don’t miss [Amanda Iglesias Moreno](None)‘s guide to automating
    Jupyter Notebook execution and report generation (with a helpful detour through
    synthetic-data creation).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[My Experience Switching From Power BI to Looker (as a Senior Data Analyst)](https://towardsdatascience.com/my-experience-switching-from-power-bi-to-looker-as-a-senior-data-analyst-d244cfe62613)**It’s
    often difficult to assess the tradeoffs and gains you’ll be making by adopting
    a new tool without first trying different options—or hearing firsthand accounts
    from professionals in a similar situation to yours. [Tomas Jancovic (It’s AI Thomas)](None)
    walks us through the journey of moving to Looker for his data analytics workflows,
    and presents a balanced, concrete account of its pros and cons.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Three Important Pandas Functions You Need to Know](https://towardsdatascience.com/three-important-pandas-functions-you-need-to-know-32325f96e3a4)**New
    models and generative-AI apps come and go, but Pandas is still here with us, playing
    an important role in data scientists’ day-to-day work. [Jiayan Yin](None) recently
    shared a helpful guide for early-stage learners, zooming in on three essential
    functions that you’ll likely turn to again and again as you process and analyze
    datasets.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
