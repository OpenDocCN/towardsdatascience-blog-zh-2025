- en: An Existential Crisis of a Veteran Researcher in the Age of Generative AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成式AI时代的资深研究者存在主义危机
- en: 原文：[https://towardsdatascience.com/an-existential-crisis-of-a-veteran-researcher-in-the-age-of-generative-ai/](https://towardsdatascience.com/an-existential-crisis-of-a-veteran-researcher-in-the-age-of-generative-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/an-existential-crisis-of-a-veteran-researcher-in-the-age-of-generative-ai/](https://towardsdatascience.com/an-existential-crisis-of-a-veteran-researcher-in-the-age-of-generative-ai/)
- en: <mdspan datatext="el1745361868385" class="mdspan-comment">I was a researcher</mdspan>
    fifteen years ago. A PhD candidate doing research for long days. I was swamped
    with many articles, annotations, emails, bookmarks, etc. When I found a citation
    manager tool, Mendeley, I felt so relaxed. It was like I had control over the
    process again. When I found a bookmark manager, XBookmark, I felt so productive
    (still have the bookmarks). They worked well for me at that time, and I finished
    my PhD program and got my degree.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745361868385" class="mdspan-comment">我曾是研究者</mdspan>十五年前。一个长时间进行研究的博士候选人。我淹没在许多文章、注释、电子邮件、书签等等中。当我发现文献管理工具Mendeley时，我感到如此放松。感觉我又控制了整个过程。当我发现书签管理工具XBookmark时，我感到如此高效（仍然有书签）。它们在我当时工作得很好，我完成了我的博士课程并获得了学位。
- en: Episode 1 — Facing the Reality
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一集 — 面对现实
- en: These days, I have an existentialist crisis. I see how AI research assistant
    tools have progressed. I was working with Scinito the other day, and I was shocked.
    I was trying to convince myself that this is only a tool to help in the literature
    review. Those who did a PhD know how tough it is to do a solid literature review.
    It is not a joke. You have to read over 100 articles, categorize them, understand
    them, and summarize them. If I say it took 3-6 months to do a solid literature
    review 15 years ago, I was not wrong. You heard me right, 3-6 months of your valuable
    lifetime.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这些天，我遇到了一个存在主义危机。我看到AI研究助手工具的进步。那天我正在和Scinito一起工作，我感到震惊。我试图说服自己，这只是一个帮助进行文献综述的工具。那些做过博士的人都知道，进行扎实的文献综述有多难。这不是玩笑。你必须阅读超过100篇文章，对它们进行分类，理解它们，并总结它们。如果我说15年前进行扎实的文献综述需要3-6个月，我并没有说错。你们听明白了，3-6个月是你宝贵的生命时光。
- en: At first, I tried to convince myself that Scinito, or other similar tools, offer
    a marginal value to researchers. Sadly, or happily, I was wrong …
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 起初，我试图说服自己，Scinito或其他类似工具对研究者只提供了边际价值。遗憾的是，或者说是幸运的是，我错了……
- en: 'Not only can they do a literature review for you in a minute (I am sorry, my
    fellows, you heard it right), but they can peer review your articles. I would
    never forget how much I should have waited for my mentors and advisors to review
    my article, how many back-and-forth emails we had till things got up to an acceptable
    quality. Even after all these efforts, you get extensive feedback from peer reviewers
    in a journal to consider your article for publication. Or, you got rejected after
    3 or 6 months only due to choosing the wrong journal to publish. These AI research
    assistant tools can enhance all these steps: reviewing your articles and selecting
    the most relevant journal for you.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不仅能在瞬间为你完成文献综述（对不起，我的同行们，你们听对了），还能对你的文章进行同行评审。我永远不会忘记我本应该等待我的导师和顾问们评审我的文章有多久，我们之间有多少来回的邮件直到事情达到可接受的质量。即使在这些努力之后，你也会从期刊的同行评审中获得广泛的反馈，以考虑你的文章是否可以发表。或者，你可能在3个月或6个月后因为选择了错误的期刊而遭到拒绝。这些AI研究助手工具可以增强所有这些步骤：评审你的文章并为你选择最相关的期刊。
- en: Amazing. It is indeed amazing for researchers in this era, but I feel sad to
    see how much time I have spent on something that could have been done much easier
    and much faster. The interesting part is that this is not the end of the season.
    It is just the beginning.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 太神奇了。对于这个时代的研究者来说，这确实很神奇，但我看到我在某件事上花费了这么多时间，而这件事本可以更容易、更快地完成，我感到很悲伤。有趣的是，这并不是季节的结束，这只是开始。
- en: This challenge is not just for researchers; it is also relevant to software
    developers. Tools like Cursor IDE have transformed how we build software dramatically.
    After my PhD, I started my career in engineering. So, I did lots of coding, testing,
    and so on. Today, I don’t need to read Stack Overflow to debug my code. I don’t
    need to spend time writing tests for my code. I no longer need to be an expert
    in React, HTML, or CSS to build a website. How much time did I spend on building
    sites in the past? I don’t want to think about it!
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Episode 2 — Embracing the Reality
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let me share the full half of the glass experience as well. This is super cool.
    I can ask AI research assistant tools to perform a semantic search within an extensive
    database. Something that we couldn’t have done before. It was just keyword matching.
    I could get updates about any topics or research questions in hours by reading
    the literature review that AI generates in seconds. I can write LaTeX code easily.
    I can reformat my paper to any guideline in minutes.  I am happy for researchers
    of our time. They can spend more time on creativity, problem solving, and, of
    course, their valuable life rather than doing unnecessary time-consuming tasks.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: I am also happy for myself. I can write code in any programming language that
    I want. I can build websites without getting locked to Wix or WordPress. I can
    write any Python code that I need. I can optimize it and write a series of tests
    for it. WoW! It is super cool. The landscapes of coding, designing, researching,
    and everything are evolving fast. No matter how much people or organizations resist,
    technology will find its way.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: There is a catch here. The promise of building a website with one (and only
    one) prompt is not correct. I am telling this based on a very current experience.
    These days, I am working on a new website with a colleague, both of us are experts
    in software and AI. We didn’t even think about Wix or WordPress this time. We
    started using Curosr and its Agent experience with Claude-3.7-sonnet. The Cursor’s
    agent can generate the website structure in a second, but it fails when it comes
    to details.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: For example, when you want to align two different texts with each other, especially
    when one of them is static and one of them is dynamic, the AI can’t do it right.
    Basically, AI can do the website structure in a second, but can’t do the required
    details (details that you want to apply as a human on top of the prebuilt structure)
    as well as a UI design expert. That means, even though we don’t need to be experts
    in React or CSS, we must know the basics to intervene in the codebase when needed.
    Plus, we must know the concepts well enough to elaborate on them. If you can’t
    say it, AI can’t make it!
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: 'I am not shocked by this weakness of AI models. They are built on the “wisdom
    of crowds” principle. It means they are built based on aggregating what’s most
    common, not emulating the intuition of an individual expert. This is rooted in
    their fundamentals. They are amazing in generality but suffer in specificity.
    In this short podcast, I explained a similar concept from a different angle: “[The
    Erosion of Specificity](https://www.youtube.com/watch?v=7KoVOgpJfyA&ab_channel=AI%3AUnorthodoxLessons).”'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不惊讶于人工智能模型的这种弱点。它们是基于“群体智慧”原则构建的。这意味着它们是基于汇总最常见的内容构建的，而不是模仿个别专家的直觉。这根植于它们的根本。它们在普遍性上令人惊叹，但在特定性上却有所欠缺。在这段简短的播客中，我从不同的角度解释了类似的概念：“[特定性的侵蚀](https://www.youtube.com/watch?v=7KoVOgpJfyA&ab_channel=AI%3AUnorthodoxLessons)。”
- en: Last Words
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的话
- en: I have been lucky to be part of the AI community. I am an AI architect with
    a solid plan to embrace this technology shift. But I am concerned about many other
    folks who can’t manage this change. This is not easy at all. If you have had an
    existential moment in your career due to AI, let me know. I may know something
    that helps.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我很幸运能成为人工智能社区的一员。我是一个有稳固计划来拥抱这一技术变革的人工智能架构师。但我担心许多其他人无法应对这种变化。这绝非易事。如果你因为人工智能而在职业生涯中经历了存在主义的时刻，请告诉我。我可能知道一些能帮到你的东西。
- en: If I could share one tip here, it would be to “Learn the fundamentals, deeply.”
    You can (should) leave the repetitive, high-level, and generic tasks to AI, and
    spend your human creativity and expertise on the details to make your work/product
    shine.
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果我能在这里分享一个建议，那将是“深入学习基础”。你可以（应该）将重复性、高级和通用任务留给人工智能，并用你的人类创造力和专业知识专注于细节，让你的工作/产品更加出色。
- en: 'Follow me on YouTube if you want to hear more stories from the perspective
    of an AI architect: [youtube.com/@AIUnorthodoxLessons/](https://www.youtube.com/@AIUnorthodoxLessons/)'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想听到更多来自人工智能架构师视角的故事，请关注我的YouTube频道：[youtube.com/@AIUnorthodoxLessons/](https://www.youtube.com/@AIUnorthodoxLessons/)
