- en: A Multi-Agent SQL Assistant You Can Trust with Human-in-Loop Checkpoint & LLM
    Cost Control
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/a-multi-agent-sql-assistant-you-can-trust-with-human-in-loop-checkpoint-llm-cost-control/](https://towardsdatascience.com/a-multi-agent-sql-assistant-you-can-trust-with-human-in-loop-checkpoint-llm-cost-control/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1750121838839" class="mdspan-comment">Have you ever thought</mdspan>
    about building your own AI agents? Are you constantly overwhelmed by all the buzzwords
    around agents? You’re not alone; I’ve also been there. There are numerous tools
    available, and even figuring out which one to choose can feel like a project in
    itself. Additionally, there is uncertainty surrounding the cost and infrastructure.
    Will I consume too many tokens? How and where can I deploy my solution?
  prefs: []
  type: TYPE_NORMAL
- en: 'For a while, I also hesitated to build something on my own. I needed to understand
    the basics first, see a few examples to understand how things work, and then try
    some hands-on experience to bring those concepts to life. After lots of research,
    I finally landed on **CrewAI** — and it turned out to be the perfect starting
    point. There are two great courses offered by DeepLearning.AI: [Multi AI Agent
    Systems with crewAI](https://www.coursera.org/learn/multi-ai-agent-systems-with-crewai/home/week/1)
    & [Practical Multi AI Agents and Advanced Use Cases with crewAI](https://www.coursera.org/learn/practical-multi-ai-agents-and-advanced-use-cases-with-crewai/home/module/1).
    In the course, the instructor has very clearly explained everything you need to
    know about AI agents to get started. There are more than 10 case studies with
    codes provided in the course which serves as a good starting point.'
  prefs: []
  type: TYPE_NORMAL
- en: It’s not enough to just learn about stuff anymore. If you have not applied what
    you have learned, you are likely to forget the basics with time. If I just re-rerun
    the use cases from the course, it’s not really “applying”. I had to build something
    and implement it for myself. I decided to build a use case that was closely related
    to what I work with. As a data analyst and engineer, I mostly work with Python
    and SQL. I thought to myself how cool it would be if I could build an assistant
    that would generate SQL queries based on natural language. I agree there are already
    plenty of out-of-box solutions available in the market. I’m not trying to reinvent
    the wheel here. With this POC, I want to learn how such systems are built and
    what are their potential limitations. What I’m trying to uncover here is what
    it takes to build such an assistant.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d62277d85f8f2b13908fdeec77d481fb.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot of the Demo App (by Author)
  prefs: []
  type: TYPE_NORMAL
- en: 'In this post, I’ll walk you through how I used **CrewAI** & **Streamlit** to
    build a **Multi-Agent SQL Assistant**. It lets users query a **SQLite** database
    using natural language. To have more control over the entire process, I’ve also
    incorporated a **human-in-loop** check plus I display the **LLM usage costs**
    for every query. Once a query is generated by the assistant, the user will have
    3 options: accept and continue if the query looks good, ask the assistant to try
    again if the query seems off, or abort the whole process if it’s not working well.
    Having this checkpoint makes a huge difference — it gives more power to the user,
    avoids executing bad queries, and also helps in saving LLM costs in the long run.'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can find the entire code repository [here](https://github.com/sravz3/SQL-Assistant-Crew).
    Below is the complete project structure:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/c0f9f78fb40bd30520a3a12c59bb6405.png)'
  prefs: []
  type: TYPE_IMG
- en: Created by Author using [https://app.diagrams.net/](https://app.diagrams.net/)
  prefs: []
  type: TYPE_NORMAL
- en: '**The Agent Architecture (my CrewAI team)**'
  prefs: []
  type: TYPE_NORMAL
- en: 'For my SQL Assistant system, I needed at least 3 basic agents to handle the
    entire process efficiently:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Query Generator Agent** would convert the natural language questions by the
    user into a SQL query using the database schema as context.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Query Reviewer Agent** would take the SQL query generated by the generator
    agent and optimizes it further for accuracy and efficiency.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Compliance Checker Agent** would check the query for potential PII exposure
    and submit a verdict of whether the query is compliant or not.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Every agent must have 3 core attributes — a role (what the agent is supposed
    to be), a goal (what is the agent’s mission), and a backstory (set the personality
    of the agent to guide how it should behave). I have enabled `verbose=“True”` to
    view the Agent’s internal thought process. I’m using the `openai/gpt-4o-mini`
    as the underlying language model for all my agents. After a lot of trial and error,
    I set the `temperature=0.2` to reduce the hallucinations of the agents. Lower
    temperatures make the model more deterministic and provide predictable outputs
    (like SQL queries in my case). There are many other parameters that are available
    to tune like `max_tokens` (set limits for the length of response), `top_p` (for
    nucleus sampling), `allow_delegation` (to delegate the task to other agents),
    etc. If you are using some other LLMs, you can simply specify the LLM model name
    here. You could set the same LLM for all the agents or different ones as per your
    requirements.
  prefs: []
  type: TYPE_NORMAL
- en: 'Below is the yaml file which has the definitions of the agents:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Once you are done creating your agents, the next step is to define the tasks
    they should perform. Every task must have a clear description of what the agent
    is supposed to do. It’s highly recommended that you also set the `expected_output`
    parameter to shape the final response of the LLM. It’s a way of telling the LLM
    exactly the kind of answer you are expecting — it could be a text, a number, a
    query, or even an article. The description has to be as detailed and concrete
    as possible. Having vague descriptions will only result in vague or even completely
    wrong outputs. I had to modify the descriptions multiple times during testing
    to adjust the quality of the response the agent was generating. One of the features
    I love is the ability to inject **dynamic inputs** into the task descriptions
    by providing curly braces ({}). These placeholders could be user prompts, concepts,
    definitions, or even outputs of previous agents. All of these allow the LLMs to
    generate more accurate results.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: It’s a good practice to have the agent and task definitions in separate YAML
    files. If you ever want to make any updates to the definitions of agents or tasks,
    you only need to modify the YAML files and not touch the codebase at all. In the
    `crew_setup.py` file, everything comes together. I read and loaded the agent and
    task configurations from their respective YAML files. I also created the definitions
    for all the expected outputs using Pydantic models to give them structure and
    validate what the LLM should return. I then assign the agents with their respective
    tasks and assemble my crew. There are multiple ways to structure your crew depending
    on the use case. A single crew of agents can perform tasks in sequence or parallel.
    Alternatively, you can create multiple crews, each responsible for a specific
    part of your workflow. For my use case, I chose to build multiple crews to have
    more control on the execution flow by inserting a human-in-loop checkpoint and
    control cost.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: I set up a local SQLite database with some sample data to simulate the real-life
    database interactions for my POC. I fetch the database schema which comprises
    all the tables and column names present in the system. I later fed this schema
    as context to the LLM along with the original user query to help the LLM generate
    a SQL query with the original tables and columns from the schema provided and
    not invent something by itself. Once the Generator agent creates a SQL query,
    it goes for a review by the Reviewer agent followed by a compliance check from
    the Compliance agent. Only after these reviews, do I allow the reviewed query
    to be executed on the database to show the final results to the user via the streamlit
    interface. By adding validation and safety checks, I ensure only high-quality
    queries are executed on the database minimising unnecessary token usage and compute
    costs for the long run.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: LLM’s charge by tokens – simple text fragments. For any LLM out there, there
    is a pricing model based on the number of input and output tokens, typically billed
    per million tokens. For a complete pricing list of all OpenAI models, refer to
    their official pricing page [here](https://platform.openai.com/docs/pricing).
    For `gpt-4o-mini`, the input tokens cost $0.15/M while the output tokens cost
    $0.60/M. To process the total costs for an LLM request, I created the below helper
    functions in `helper.py` to calculate the total cost based on the token usage
    in a request.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'The `app.py` file creates a powerful Streamlit application that will allow
    the user to prompt the SQLite database using natural language. Behind the scenes,
    my set of CrewAI agents is set in motion. After the first agent generates a SQL
    query, it is displayed on the App for the user. The user will have three options:'
  prefs: []
  type: TYPE_NORMAL
- en: Confirm & Review — if the user finds the query acceptable and wants to continue
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Try Again — if the user is not satisfied with the query and wants the agent
    to generate a new query again
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Abort — if the user wants to stop the process here
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Along with the above options, the LLM cost incurred for this request is shown
    on the screen. Once the user clicks the `“Confirm & Review”` button, the SQL query
    will go through the next two levels of review. The reviewer agent optimizes it
    for correctness and efficiency followed by the compliance agent that checks for
    compliance. If the query is compliant, it will be executed on the SQLite database.
    The final results and the cumulative LLM costs incurred in the entire process
    are displayed on the app interface. The user is not only in control during the
    process but is also cost-conscious.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Here is a quick demo of the app in action. I asked it to display the top products
    based on total sales. The assistant generated a SQL query, and I clicked on `“Confirm
    and Review”`. The query was already well optimised so the Reviewer agent returned
    the same query without any modifications. Next, the Compliance Check agent reviewed
    the query and confirmed it was safe to run — no risky operations or exposure of
    sensitive data. After passing the two reviews, the query was run against the sample
    database and the results were displayed. For this entire process, the LLM usage
    cost was just $0.001349.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4b998b3c470f2731144994c4eff428ad.png)'
  prefs: []
  type: TYPE_IMG
- en: Demo of the App — Example 1 (by Author)
  prefs: []
  type: TYPE_NORMAL
- en: Here’s another example where I ask the app to identify which products have the
    most returns. However, there is no information in the schema about returns. As
    a result, the assistant does not generate a query and states the same reason.
    Till this stage, the LLM cost was $0.00853\. Since there’s no point in reviewing
    or executing a non-existent query, I simply clicked `“Abort”` to end the process
    gracefully.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dff4b1414b52a2f43cd078e358863865.png)'
  prefs: []
  type: TYPE_IMG
- en: Demo of the App — Example 2 (by Author)
  prefs: []
  type: TYPE_NORMAL
- en: CrewAI is incredibly powerful for building multi-agent systems. By pairing it
    with Streamlit, one can easily create a simple interactive UI on top to work with
    the system. In this POC, I explored how to add a human-in-loop element to maintain
    control and transparency throughout the workflow. I also tracked how many tokens
    were consumed at each step helping the user stay cost-conscious during the process.
    With the help of a compliance agent, I enforced some basic safety measures by
    blocking risky or PII-exposure-related queries. I tuned the temperature of the
    model and iteratively refined the task descriptions to improve the output quality
    and reduce hallucinations. Is it perfect? The answer is no. There are still some
    times when the system hallucinates. If I implement this at scale, then the LLM
    cost would be a bigger concern. In real life, the databases are complex, and as
    such their schema will also be huge. I would have to explore working with RAG
    (Retrieval Augmented Generation) to feed only relevant schema snippets to the
    LLM, optimizing agent memory, and using caching to avoid redundant API calls.
  prefs: []
  type: TYPE_NORMAL
- en: Final Thoughts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This was a fun project that combines the power of LLMs, the practicality of
    Streamlit, and the modular intelligence of CrewAI. If you’re interested in building
    intelligent agents for data interaction, give it a try — or fork the repo and
    build on it!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Before you go…**'
  prefs: []
