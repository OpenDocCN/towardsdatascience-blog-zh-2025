- en: Implementing the Hangman Game in Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在Python中实现猜字游戏
- en: 原文：[https://towardsdatascience.com/implementing-the-hangman-game-in-python/](https://towardsdatascience.com/implementing-the-hangman-game-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/implementing-the-hangman-game-in-python/](https://towardsdatascience.com/implementing-the-hangman-game-in-python/)
- en: <mdspan datatext="el1756340465840" class="mdspan-comment">Growing up</mdspan>,
    Hangman was a really fun game in our home. We would grab a pen and paper and take
    turns choosing words for the other to guess. Today, it is used in classroom settings
    to help kids practice their spellings, understand strategic decision making by
    choosing vowels first, and brainstorm possible words from hints.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756340465840" class="mdspan-comment">成长过程中</mdspan>，猜字游戏在我们家中是一个非常有趣的游戏。我们会拿起笔和纸，轮流选择单词让对方猜测。如今，它被用于课堂环境中，帮助孩子们练习拼写，通过先选择元音字母来理解战略决策，以及根据提示头脑风暴可能的单词。
- en: In this article, we will go through the Hangman Game by implementing it in Python.
    This is a beginner-friendly project where we will learn the basics of the Python
    language, such as defining variables, commonly used functions, loops, and conditional
    statements.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将通过在Python中实现猜字游戏来探讨这个游戏。这是一个适合初学者的项目，我们将学习Python语言的基础知识，例如定义变量、常用函数、循环和条件语句。
- en: Understanding the Project
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解项目
- en: First, we will understand the game and get into the depths of how our code should
    work.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将理解游戏并深入探讨我们的代码应该如何工作。
- en: In a typical 2-player Hangman Game, Player 1 chooses a word, hiding it from
    Player 2, and generates blanks corresponding to the number of letters in the word
    he chose for guessing. Player 2 has to guess the word by guessing one letter at
    a time. Player 2 has a defined number of lives at the beginning, and with each
    wrong guess of letters, they lose a life (to the point where the man is hanged).
    With each right guess, the lives remain the same as before. If Player 2 loses
    all their lives without guessing the word, the game is over, and they lose. If
    they manage to guess the word, they win the game. This is the outline of the game
    in its traditional sense.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在典型的两人猜字游戏（Hangman Game）中，玩家1选择一个单词，将其隐藏起来不让玩家2看到，并生成与所选单词字母数量相对应的空格。玩家2需要逐个猜测字母来猜出单词。玩家2在游戏开始时拥有一定数量的生命值，每次猜错字母就会失去一个生命值（直到人被绞死）。每次猜对字母，生命值保持不变。如果玩家2在猜出单词之前失去所有生命值，游戏结束，他们失败。如果他们成功猜出单词，他们赢得游戏。这就是传统意义上游戏的概述。
- en: In this project, the computer will be Player 1, generating the word to guess,
    while we, the user, will be Player 2\. Let us implement the above using a flowchart
    for better comprehension.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，计算机将扮演玩家1的角色，生成需要猜测的单词，而我们，作为用户，将是玩家2。让我们用一个流程图来实现上述功能，以便更好地理解。
- en: '![](../Images/09f098af49d9692265327b3ef38b9094.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/09f098af49d9692265327b3ef38b9094.png)'
- en: Image by Author
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Drawing a flowchart and defining each step helps in turning our thought process
    into code, so its always a good practice to draw one. Now let us start with coding
    the problem!
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制流程图并定义每个步骤有助于将我们的思维过程转化为代码，因此绘制流程图总是一个好习惯。现在让我们开始编写代码来解决这个问题！
- en: 'Step 1: List of Words and the Random Module'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步：单词列表和随机模块
- en: The first step in this project is for the computer to choose a random word that
    the user will have to guess. For this purpose, we will need both a list of words
    from which the computer picks one word to be guessed, and a Python function called
    random, which will randomly pick out that word from the given list.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目的第一步中，计算机需要选择一个用户需要猜测的随机单词。为此，我们需要一个单词列表，计算机从中随机选择一个单词进行猜测，以及一个名为random的Python函数，它将从给定的列表中随机选择该单词。
- en: To generate the list, I googled the 100 most common nouns used in the English
    language and found a [list](https://www.espressoenglish.net/100-common-nouns-in-english/).
    I used these words and created a Python list with it to be used in this project.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了生成列表，我在谷歌上搜索了英语中最常用的100个名词，并找到了一个[列表](https://www.espressoenglish.net/100-common-nouns-in-english/)。我使用了这些单词，并创建了一个Python列表，用于本项目。
- en: As the name suggests, a **Python List** is a datatype that stores in itself
    a collection of items. A list of colors will be defined in Python as `colors =
    ["red", "yellow", "green", "blue", "pink"]`. You can check out the List syntax
    and additional information from the Python official page on [List](https://docs.python.org/3/tutorial/datastructures.html).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如其名所示，**Python列表**是一种数据类型，它本身存储了一个项目集合。在Python中定义颜色列表为`colors = ["red", "yellow",
    "green", "blue", "pink"]`。您可以从Python官方页面上的[列表](https://docs.python.org/3/tutorial/datastructures.html)检查列表语法和附加信息。
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: You can access the project files from my [GitHub](https://github.com/MahnoorJaved98/Hangman)
    repository. `hangman_words.py` is the Python file that contains the list of words
    from which the computer will randomly pick out a word for the game.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从我的[GitHub](https://github.com/MahnoorJaved98/Hangman)仓库访问项目文件。`hangman_words.py`是包含电脑将从中随机选择一个单词进行游戏的单词列表的Python文件。
- en: Now, once our list is created, we need the computer to choose a random word
    from the given list of words `word_list`. Python has a module especially for this
    purpose called “random”. We will import the module and use it to allow the computer
    to randomly choose a word `word_to_guess` from the list `words_list`. You can
    print the `word_to_guess` while coding the project to enhance understanding, and
    comment it out when playing with the computer!
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，一旦我们创建了列表，我们需要电脑从给定的单词列表`word_list`中随机选择一个单词。Python有一个专门用于此目的的模块，称为“random”。我们将导入该模块，并使用它来允许电脑从列表`words_list`中随机选择一个单词`word_to_guess`。您可以在编码项目时打印出`word_to_guess`以增强理解，当与电脑玩游戏时将其注释掉！
- en: '[PRE1]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: For more information on the `random.choice()` function, click [here](https://docs.python.org/3/library/random.html#random.choice).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 更多关于`random.choice()`函数的信息，请点击[这里](https://docs.python.org/3/library/random.html#random.choice)。
- en: 'Step 2: Generating Blanks'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步：生成空白
- en: The next step is to generate blanks equal to the number of letters in the `word_to_guess`
    so that the user gets an idea of the number of letters in the word he has to guess.
    For this, we will define a variable called `blanks` which will act as a container
    for the unguessed letters of the word. It will contain the number of “_” equal
    to the number of letters in the `word_to_guess`.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是生成与`word_to_guess`中字母数量相等的空白，以便用户了解他需要猜测的单词中的字母数量。为此，我们将定义一个名为`blanks`的变量，它将作为单词未猜测字母的容器。它将包含与`word_to_guess`中字母数量相同的下划线。
- en: To calculate the number of letters in the `word_to_guess` that has been randomly
    picked by the computer from the `words_list`, we will use the Python function
    `len()`that calculates the length of a string. More information on this in-built
    function can be accessed through this [link](https://docs.python.org/3/library/functions.html#len).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了计算电脑从`words_list`中随机选择的`word_to_guess`中的字母数量，我们将使用Python函数`len()`，该函数计算字符串的长度。更多关于这个内置函数的信息可以通过这个[链接](https://docs.python.org/3/library/functions.html#len)获取。
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: As we now know the number of letters in `word_to_guess`, we will use this number
    to add an equal number of “_” in the variable `blanks`. For this purpose, we will
    use the `for` loop, a Python functionality that allows us to iterate over items
    in a sequence, in our case, the string that is stored in the variable `word_to_guess`.
    Click [here](https://docs.python.org/3/reference/compound_stmts.html#for) to learn
    more about `for` loop and its syntax.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们现在所知，`word_to_guess`中的字母数量，我们将使用这个数字在变量`blanks`中添加相同数量的“_”。为此，我们将使用`for`循环，这是Python的一个功能，允许我们遍历序列中的项目，在我们的情况下，是存储在变量`word_to_guess`中的字符串。点击[这里](https://docs.python.org/3/reference/compound_stmts.html#for)了解更多关于`for`循环及其语法的详细信息。
- en: '[PRE3]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The above block of code will iterate over the number of letters in the `word_to_guess`
    string and generate a blank for each letter. It will print out as many _ as the
    number of letters, each blank as a placeholder for the letter of the word to guess.
    So for the word “time”, the output printed on the screen will be :'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码块将遍历`word_to_guess`字符串中的字母数量，并为每个字母生成一个空白。它将打印出与字母数量相同数量的下划线，每个空白作为猜测单词中字母的占位符。所以对于单词“time”，屏幕上打印的输出将是：
- en: 'Word to guess: _ _ _ _'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 猜测的单词：_ _ _
- en: 'Step 3: Prompting the User to Guess a Letter'
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步：提示用户猜测一个字母
- en: Now the game actually starts! The computer has picked a word, generated blank
    placeholders for the letters in that word. Now comes the time for the user to
    start guessing the word by guessing one letter at a time.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 现在游戏实际上开始了！电脑已经选择了一个单词，并为该单词中的字母生成了空白占位符。现在轮到用户开始逐个猜测单词了。
- en: 'To ask the user for a letter, we will use the `input` function in Python and
    store it in the variable `guess`:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 要让用户输入一个字母，我们将使用Python中的`input`函数，并将其存储在变量`guess`中：
- en: '[PRE4]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Click [here](https://docs.python.org/3/library/functions.html#input) to learn
    more about the Python built-in function `input()`.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 点击[这里](https://docs.python.org/3/library/functions.html#input)了解更多关于Python内置函数`input()`的信息。
- en: 'Step 4: Check if the Letter is in the Word'
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步：检查字母是否在单词中
- en: Once the user has guessed a letter, we will check whether the user has guessed
    it right and check if it is in the `word_to_guess`.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦用户猜测了一个字母，我们将检查用户是否猜对了，并检查它是否在`word_to_guess`中。
- en: To do this, we will use a `for` loop. Moreover, we will also create another
    variable, `your_word`, which will update with the guessed letters and an empty
    list called,`letters_guessed` which will store the letters guessed correctly by
    the user (this will be useful as we will see later).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，我们将使用一个`for`循环。此外，我们还将创建另一个变量`your_word`，它将随着猜测的字母而更新，并创建一个名为`letters_guessed`的空列表，用于存储用户正确猜测的字母（这将在后面很有用）。
- en: 'So, for example, if the computer has picked the word “cheesecake”, as the game
    progresses and the user has guessed the letters “c”, “e”, and “a”, this is what
    both `your_word` and `letters_guessed` would look like:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果电脑选择了单词“cheesecake”，随着游戏的进行，用户猜测了字母“c”、“e”和“a”，那么`your_word`和`letters_guessed`将如下所示：
- en: your_word = c_ee_eca_e
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: your_word = c_ee_eca_e
- en: letters_guessed = [“c”, “e”, “a”]
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: letters_guessed = [“c”, “e”, “a”]
- en: '[PRE5]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'So basically what the above loop does is that it iterates through the `word_to_guess`
    one letter at a time, and checks:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，基本上上述循环所做的是逐个字母遍历`word_to_guess`，并检查：
- en: If the letter guessed by the user `guess` is in the `word_to_guess`, the code
    will update the variable `your_word` to add the letter guessed at its appropriate
    location. We need to understand that in Python, strings are in fact a sequence
    of characters, and many list functions are applicable to strings as well. Moreover,
    we will also add this letter guessed correctly to the list `letters_guessed`.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果用户猜测的字母`guess`在`word_to_guess`中，代码将更新变量`your_word`，在适当的位置添加猜测的字母。我们需要理解，在Python中，字符串实际上是一系列字符的序列，许多列表函数也适用于字符串。此外，我们还将把这个猜对的字母添加到列表`letters_guessed`中。
- en: If the letter that the user has guessed, `guess`, is in the `letters_guessed`,
    which means the user has already suggested this letter before, then we won’t need
    to add this to the `letters_guessed`, but just have to add the letter in the `your_word`
    at its appropriate location.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果用户猜测的字母`guess`已经在`letters_guessed`中，这意味着用户之前已经建议过这个字母，那么我们不需要将其添加到`letters_guessed`中，只需在`your_word`的适当位置添加这个字母即可。
- en: Else, if the letter guessed by the user is not in the `word_to_guess`, and therefore
    will not be in the `letters_guessed`, we will simple generate blanks in places.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 否则，如果用户猜测的字母不在`word_to_guess`中，因此也不会在`letters_guessed`中，我们将简单地在这些位置生成空格。
- en: 'If the code above seems a bit overwhelming, feel free to just run the above
    for loop while defining the variables and printing each of the variables: `word_to_guess`,
    `guess`, `guessed_letters`, and `your_word` and printing the variables where they
    are changed.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果上面的代码看起来有点令人不知所措，您可以在定义变量并打印每个变量（`word_to_guess`、`guess`、`guessed_letters`和`your_word`）的同时运行上面的for循环，并打印变量在它们被更改的地方。
- en: '![](../Images/46124280778d8bdac0be6950503726d6.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/46124280778d8bdac0be6950503726d6.png)'
- en: Image by AltumCode on [Unsplash](https://unsplash.com/photos/macbook-pro-on-black-wooden-table-PNbDkQ2DDgM)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由AltumCode在[Unsplash](https://unsplash.com/photos/macbook-pro-on-black-wooden-table-PNbDkQ2DDgM)提供
- en: 'Step 5: Creating the While Loop that runs until the Game is Over'
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5步：创建一个运行直到游戏结束的While循环
- en: 'Let us refer back to the flowchart we created to help us understand the project.
    In order to code this project, we need to keep in mind the following points:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下我们创建的流程图，以帮助我们理解项目。为了编写这个项目，我们需要记住以下要点：
- en: The user has a defined number of lives at the beginning
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户在开始时有一定的生命值
- en: For each letter guessed wrong, the lives are reduced by 1
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每个猜错的字母，生命值减少1
- en: If the user runs out of lives, the user loses and the game is over
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果用户的生命值耗尽，用户失败，游戏结束
- en: If the user has lives left, the computer will ask the user to guess another
    letter
  id: totrans-52
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果用户还有生命值，电脑将要求用户猜测另一个字母
- en: For each letter guessed right, the lives remain unchanged, and a blank is replaced
    by a letter in the placeholder `blanks`
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每个猜对的字母，生命值保持不变，占位符`blanks`中的空格将被字母替换
- en: If the variable `your_word` is all filled, the user wins the game, and the game
    is over
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果变量 `your_word` 已经填满，用户赢得游戏，游戏结束
- en: If the variable `<code>your_word` has blank spaces left, then the computer will
    again ask the user to guess the next letter
  id: totrans-55
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果变量 `<code>your_word` 还有空白空间，那么计算机将再次要求用户猜测下一个字母
- en: Since we have created the `for` loop previously that caters to the guessed letter,
    now is the time to incorporate the idea of lives, and reduce it when the user
    has guessed a letter wrong.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们之前已经创建了一个针对猜测字母的 `for` 循环，现在是时候将生命概念融入其中，并在用户猜错字母时减少它。
- en: Let us define the number of lives for the user with the variable `number_of_lives`.
    The user has 6 chances to suggest the wrong letter in guessing the word.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用变量 `number_of_lives` 定义用户的生命值。用户有6次机会猜测错误的字母来猜出单词。
- en: '[PRE6]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Now, considering the points mentioned above, we also need a variable or a condition
    that tells us to stop asking the user to guess when the game is over. Let us code
    it with the help of a Boolean variable.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，考虑到上述提到的点，我们还需要一个变量或条件来告诉我们何时停止询问用户猜测，因为游戏已经结束。让我们用布尔变量来编写这段代码。
- en: Simply stating, a Boolean is a datatype in Python that stores either True or
    False. We will use this Boolean variable to continue the game while it is False
    and vice versa. Initially, while the game starts, this variable will be `False`,
    meaning the game is not over.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，布尔是Python中存储True或False的数据类型。我们将使用这个布尔变量在游戏为False时继续游戏，反之亦然。最初，当游戏开始时，这个变量将是
    `False`，这意味着游戏没有结束。
- en: '[PRE7]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Now we will introduce a `while` loop with the condition that it will run as
    long as the game is not over, and we will include the conditions mentioned above
    in this while loop. Check out more about the `while` loop from the Python official
    documentation [here](https://docs.python.org/3/reference/compound_stmts.html#while).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将引入一个 `while` 循环，其条件是只要游戏没有结束，它就会运行，并且我们将上述提到的条件包含在这个 `while` 循环中。更多关于 `while`
    循环的信息，请参阅Python官方文档[这里](https://docs.python.org/3/reference/compound_stmts.html#while)。
- en: '[PRE8]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: In the above piece of code, we have added the input statement as well as the
    print statement, which will output the letters guessed so far according to their
    position in the `word_to_guess`.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述代码片段中，我们添加了输入语句以及打印语句，这将根据其在 `word_to_guess` 中的位置输出已猜测的字母。
- en: 'Step 6: Handling Situations'
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第6步：处理情况
- en: The last step is to handle different circumstances. What happens if the letter
    the user has guessed has already been suggested by the user, or the letter is
    not in the word? Also, what if all the letters have been guessed and there are
    no more blanks in `your_word`? This would mean that the user has guessed the word
    and thus won.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步是处理不同的情况。如果用户猜测的字母已经被用户提出，或者字母不在单词中，会发生什么？还有，如果所有的字母都被猜测，`your_word` 中没有更多的空格，会怎样？这意味着用户已经猜出了单词，因此赢了。
- en: 'We will add this situation in the code with he following lines:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在以下行中添加这种情况：
- en: '[PRE9]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![](../Images/ed9b4445598445bcaf7e46083d882e57.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ed9b4445598445bcaf7e46083d882e57.png)'
- en: Image by [Giorgio Trovato](https://unsplash.com/@giorgiotrovato?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash) on [Unsplash](https://unsplash.com/photos/yellow-and-white-trophy-_XTY6lD8jgM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Giorgio Trovato](https://unsplash.com/@giorgiotrovato?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    在 [Unsplash](https://unsplash.com/photos/yellow-and-white-trophy-_XTY6lD8jgM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    提供
- en: Moreover, if the letter guessed by the user is not in the `word_to_guess`, the
    user’s guess is incorrect, then their lives will be reduced by 1, and we will
    inform the user that their guessed letter is not in the word. If reducing the
    lives by a wrong guess finishes all the user’s lives, then our boolean variable
    `game_over` will be set as `True` , and the game will end, with the user losing
    the game.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果用户猜测的字母不在 `word_to_guess` 中，用户的猜测是错误的，那么他们的生命值将减少1，我们将通知用户他们猜测的字母不在单词中。如果通过错误猜测减少生命值用完了用户的所有生命，那么我们的布尔变量
    `game_over` 将被设置为 `True`，游戏将结束，用户输掉游戏。
- en: '[PRE10]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Remember to add the above blocks of code inside the `while` loop that runs until
    the game is not over. A complete code along with valuable comments can be accessed
    through this GitHub repository for a better understanding.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 记得将上述代码块添加到运行直到游戏结束的 `while` 循环中。一个完整的代码，包括有价值的注释，可以通过这个GitHub仓库获得更好的理解。[链接](https://docs.python.org/3/reference/compound_stmts.html#while)
- en: Conclusion
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The above coding project was done with the basics of the Python language. We
    came across some built-in functions, like `print()`, and `input()`, we used the
    `random` module to generate random words to guess and used `for` and `while` loops
    in various iterations according to need. We also went through the conditional
    `if`, `elif` and `else` statements. These are all the basic tools that every beginner
    must know before they jump into complex coding. We could also have defined and
    called functions in this program, but this was meant to be a beginner-friendly
    introduction to the Python language. If you are a pro in Python, feel free to
    share various other ways we could have approached this project!
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 上述编码项目是基于Python语言的基础完成的。我们遇到了一些内置函数，例如`print()`和`input()`，我们使用了`random`模块来生成随机单词进行猜测，并根据需要使用`for`和`while`循环进行各种迭代。我们还学习了条件语句`if`、`elif`和`else`。这些都是每个初学者在进入复杂编码之前必须了解的基本工具。我们也可以在这个程序中定义和调用函数，但这个项目的目的是为了提供一个面向初学者的Python语言入门介绍。如果你是Python的专家，请随意分享我们可以采取的其他各种方法来处理这个项目！
