- en: A Hands-On Guide to Anthropic’s New Structured Output Capabilities
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Anthropic新结构化输出功能的实战指南
- en: 原文：[https://towardsdatascience.com/hands-on-with-anthropics-new-structured-output-capabilities/](https://towardsdatascience.com/hands-on-with-anthropics-new-structured-output-capabilities/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/hands-on-with-anthropics-new-structured-output-capabilities/](https://towardsdatascience.com/hands-on-with-anthropics-new-structured-output-capabilities/)
- en: <mdspan datatext="el1764013594304" class="mdspan-comment">Anthropic recently</mdspan>
    announced Structured Outputs for its top models in its API, a new feature designed
    to ensure that model-generated outputs exactly match the JSON Schemas provided
    by developers.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764013594304" class="mdspan-comment">Anthropic最近</mdspan>宣布在其API中的顶级模型支持结构化输出，这是一个旨在确保模型生成的输出与开发者提供的JSON模式完全匹配的新功能。
- en: This solves a problem many developers face when a system or process consumes
    an LLM’s output for further processing. It’s essential for that system to “know”
    what to expect as its input so it can process it accordingly.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这解决了许多开发者面临的问题，即系统或流程消耗LLM的输出进行进一步处理时，该系统必须“知道”其输入的内容，以便相应地处理它。
- en: Similarly, when displaying model output to a user, you want this to be in the
    same format each time.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，当向用户显示模型输出时，你希望每次都以相同的格式显示。
- en: So far, it’s been a pain to ensure consistent output formats from Anthropic models.
    However, it appears that Anthropic has now solved this problem for its top models anyway. From
    their announcement (linked at the end of the article), they say,
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，确保Anthropic模型输出格式的一致性一直是一个痛点。然而，现在看起来Anthropic已经为其顶级模型解决了这个问题。根据他们的公告（文章末尾有链接），他们说，
- en: The Claude Developer Platform now supports structured outputs for Claude Sonnet
    4.5 and Opus 4.1\. Available in public beta, this feature ensures API responses
    always match your specified JSON schemas or tool definitions.
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Claude开发者平台现在支持Claude Sonnet 4.5和Opus 4.1的结构化输出。该功能目前处于公开测试版，确保API响应始终与开发者指定的JSON模式或工具定义相匹配。
- en: Now, one thing to remember before we look at some example code, is that Anthropic
    guarantees that the model’s output will adhere to a specified format, *not* that
    any output will be 100% accurate. The models can and may still hallucinate occasionally.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们查看一些示例代码之前，有一点需要记住，Anthropic保证模型的输出将遵循指定的格式，*而不是*任何输出都将100%准确。模型可能会偶尔出现幻觉。
- en: So you might get perfectly formatted incorrect answers!
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你可能会得到格式正确但内容错误的答案！
- en: Setting up our dev environment
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置我们的开发环境
- en: Before we look at some sample Python code, it’s best practice to create a separate
    development environment where you can install any necessary software and experiment
    with coding. Now, anything you do in this environment will be siloed and won’t impact any
    of your other projects.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们查看一些Python代码示例之前，最佳实践是创建一个独立的发展环境，在那里你可以安装任何必要的软件并进行编码实验。现在，你在这个环境中所做的任何操作都将被隔离，并且不会影响你的其他项目。
- en: I’ll be using Miniconda for this, but you can use whatever method you’re most
    familiar with.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我将使用Miniconda来完成这个任务，但你可以使用你最熟悉的方法。
- en: 'If you want to go down the Miniconda route and don’t already have it, you must
    install it first. Get it using this link:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要走Miniconda路线并且还没有安装它，你必须首先安装它。你可以通过这个链接获取它：
- en: '[https://docs.anaconda.com/miniconda/ ](https://docs.anaconda.com/miniconda/ )'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://docs.anaconda.com/miniconda/ ](https://docs.anaconda.com/miniconda/ )'
- en: To follow along with my examples, you’ll also need an Anthropic API key and
    some credit on your account. For reference, I used 12 cents to run the code in
    this article. If you already have an Anthropic account, you can get an API key
    using the Anthropic console at [https://console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 要跟随我的示例，你还需要一个Anthropic API密钥和账户上的一些信用额度。为了参考，我在这篇文章中使用了12美分来运行代码。如果你已经有了Anthropic账户，你可以通过Anthropic控制台在[https://console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys)获取API密钥。
- en: '**1/ Create our new dev environment and install the required libraries**'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**1/ 创建我们的新开发环境并安装所需的库**'
- en: <mdspan datatext="el1764013452233" class="mdspan-comment">I’m running</mdspan>
    this on WSL2 Ubuntu for Windows.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764013452233" class="mdspan-comment">我在WSL2 Ubuntu for
    Windows上运行这个</mdspan>
- en: '[PRE0]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**2/ Start Jupyter**'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**2/ 启动Jupyter**'
- en: 'Now type in ‘jupyter notebook’ into your command prompt. You should see a jupyter
    notebook open in your browser. If that doesn’t happen automatically, you’ll likely
    see a screenful of information after the command. Near the bottom, you’ll find
    a URL to copy and paste into your browser. It’ll look similar to this:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现在在命令提示符中输入‘jupyter notebook’。你应该会在浏览器中看到一个jupyter笔记本打开。如果它没有自动打开，你可能会在命令后看到一屏的信息。在底部附近，你会找到一个可以复制并粘贴到浏览器中的URL。它看起来可能像这样：
- en: '`http://127.0.0.1:8888/tree?token=3b9f7bd07b6966b41b68e2350721b2d0b6f388d248cc69`'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '`http://127.0.0.1:8888/tree?token=3b9f7bd07b6966b41b68e2350721b2d0b6f388d248cc69`'
- en: Code Examples
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码示例
- en: In our two coding examples, we will use the new output_format parameter available
    in the beta API. When specifying the structured output, we can use two different
    styles.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的两个编码示例中，我们将使用beta API中可用的new output_format参数。当指定结构化输出时，我们可以使用两种不同的样式。
- en: 1\. Raw JSON Schema.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 原始JSON模式。
- en: As the name suggests, the structure is defined by a JSON schema block passed
    directly to the output format definition.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 正如其名所示，该结构由一个JSON模式块定义，该模式块直接传递到输出格式定义中。
- en: 2\. A Pydantic model class.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 2. Pydantic模型类。
- en: This is a regular Python class using Pydantic’s BaseModel that specifies the
    data we want the model to output. It’s a much more compact way to define a structure
    than a JSON schema.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个使用Pydantic的BaseModel的常规Python类，它指定了模型要输出的数据。与JSON模式相比，这是一种定义结构更紧凑的方法。
- en: '**Example code 1 — Text summarisation **'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例代码1 — 文本摘要**'
- en: This is useful if you have a bunch of different texts you want to summarise,
    but want the summaries to have the same structure. In this example, we’ll process
    the Wikipedia entries for some famous scientists and retrieve specific key facts
    about them in a highly organised way.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一堆不同的文本需要总结，但又希望总结具有相同的结构，这会很有用。在这个例子中，我们将处理一些著名科学家的维基百科条目，并以高度组织化的方式检索他们的一些具体关键事实。
- en: In our summary, we want to output the following structure for each scientist,
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的总结中，我们希望为每位科学家输出以下结构，
- en: '**The name of the Scientist**'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**科学家的名字**'
- en: '**When and where they were born**'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**他们出生的时间和地点**'
- en: '**Their main claim to fame**'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**他们的主要成就**'
- en: '**The year they won the Nobel Prize**'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**他们获得诺贝尔奖的年份**'
- en: '**When and where they died**'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**他们去世的时间和地点**'
- en: 'Note: Most text in Wikipedia, excluding quotations, has been released under
    the Creative Commons Attribution-Sharealike 4.0 International License (CC-BY-SA)
    and the GNU Free Documentation License (GFDL) In short this means that you are
    free:'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意：维基百科中的大多数文本（不包括引文）已根据Creative Commons Attribution-Sharealike 4.0国际许可协议（CC-BY-SA）和GNU自由文档许可协议（GFDL）发布。简而言之，这意味着你可以自由地：
- en: ''
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**to Share** — copy and redistribute the material in any medium or format'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**分享** — 以任何媒体或格式复制和重新分发材料'
- en: ''
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**to Adapt** — remix, transform, and build upon the material'
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**改编** — 混合、转换和基于材料进行构建'
- en: ''
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: for any purpose, even commercially.
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用于任何目的，包括商业用途。
- en: Let’s break the code into manageable sections, each with an explanation.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将代码分解成可管理的部分，每个部分都有解释。
- en: First, we import the required third-party libraries and set up connections to
    Anthropic using our API Key.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们导入所需的第三方库，并使用我们的API密钥设置与Anthropic的连接。
- en: '[PRE1]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This is the function that will scrape Wikipedia for us.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这是将为我们从维基百科上抓取数据的函数。
- en: '[PRE2]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Next, we define our JSON schema, which specifies the exact format for the model’s
    output.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们定义我们的JSON模式，它指定了模型输出的确切格式。
- en: '[PRE3]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This function serves as the interface between our Python script and the Anthropic
    API. Its primary goal is to take unstructured text (an article) and force the
    AI to return a structured data object (JSON) containing specific fields, such
    as the scientist’s name, birth date, and Nobel Prize details.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数作为我们的Python脚本和Anthropic API之间的接口。其主要目标是获取非结构化文本（一篇文章），并强制AI返回一个包含特定字段的结构化数据对象（JSON），例如科学家的名字、出生日期和诺贝尔奖详情。
- en: The function calls client.messages.create to send a request to the model. It
    sets the temperature to 0.2, which lowers the model’s creativity to ensure the
    extracted data is factual and precise. The extra_headers parameter enables a specific
    beta feature that is not yet standard. By passing the anthropic-beta header with
    the value structured-outputs-2025-11-13, the code tells the API to activate the
    Structured Outputs logic for this specific request, forcing it to produce valid
    JSON that matches your defined structure.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 函数调用client.messages.create向模型发送请求。它将温度设置为0.2，这降低了模型的创造力，以确保提取的数据是事实性和精确的。extra_headers参数启用了一个尚未成为标准的特定beta功能。通过传递具有值structured-outputs-2025-11-13的anthropic-beta头，代码告诉API激活针对此特定请求的结构化输出逻辑，迫使它产生与您定义的结构匹配的有效JSON。
- en: Because the output_format parameter is used, the model returns a raw string
    that is guaranteed to be valid JSON. The line json.loads(response.content[0].text)
    parses this string into a native Python dictionary, making the data immediately
    ready for programmatic use.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 由于使用了output_format参数，模型返回的是一个保证有效的原始字符串。这行代码json.loads(response.content[0].text)将这个字符串解析成一个原生的Python字典，使得数据立即可用于程序化使用。
- en: '[PRE4]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: This is where we pull everything together. The various URLs we want to scrape
    are defined. Their contents are passed to the model for processing, before the
    end results are displayed.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们将所有东西整合在一起的地方。我们定义了我们想要抓取的各种URL。在显示最终结果之前，它们的内文被传递给模型进行处理。
- en: '[PRE5]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: When I ran the above code, I got this output.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 当我运行上述代码时，我得到了这个输出。
- en: '[PRE6]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Not too shabby! Alan Guth will be delighted that he’s still alive, but alas,
    he hasn’t yet won a Nobel Prize. Also, note that James Clerk Maxwell had died
    before the Nobel Prize was in operation.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 不错！艾伦·古斯会很高兴他还活着，但遗憾的是，他还没有赢得诺贝尔奖。此外，请注意，詹姆斯·克拉克·麦克斯韦在诺贝尔奖开始运作之前就已经去世了。
- en: '**Example code 2 — Automated Code Security & Refactoring Agent**.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例代码2 — 自动化代码安全与重构代理**。'
- en: Here is a completely different use case and a very practical example for software
    engineering. Usually, when you ask an LLM to “fix code,” it gives you a conversational
    response mixed with code blocks. This makes it hard to integrate into a CI/CD
    pipeline or an IDE plugin.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个完全不同的用例，一个非常实用的软件工程示例。通常，当你要求一个LLM“修复代码”时，它会给你一个包含代码块的对话式响应。这使得它难以集成到CI/CD管道或IDE插件中。
- en: By using Structured Outputs, we can force the model to return the **clean code**,
    a **list of specific bugs found**, and a **security risk assessment** in a single,
    machine-readable JSON object.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用结构化输出，我们可以迫使模型在一个单一的、机器可读的JSON对象中返回**干净的代码**、**找到的具体错误列表**和**安全风险评估**。
- en: '**The Scenario**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**场景**'
- en: We will feed the model a Python function containing a dangerous SQL Injection
    vulnerability and poor coding practices. The model must identify the specific
    flaws and rewrite the code securely.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将向模型提供一个包含危险的SQL注入漏洞和糟糕的编码实践的Python函数。模型必须识别特定的缺陷并安全地重写代码。
- en: '[PRE7]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This code acts as an automated security auditor. Instead of asking the AI to
    “chat” about code, it forces the AI to fill out a strict, digital form containing
    specific details about bugs and security risks.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码充当一个自动化的安全审计员。它不是让AI“聊天”关于代码，而是强迫AI填写一个包含关于错误和安全风险的特定细节的严格、数字表格。
- en: Here is how it works in three simple steps.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是它在三个简单步骤中的工作方式。
- en: 'First, the code defines exactly what the answer must look like using Python
    classes in conjunction with Pydantic. It tells the AI: “Give me a JSON object
    containing a list of bugs, a severity rating (like ‘Critical’ or ‘Low’) for each,
    and the fixed code string.”'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，代码使用Python类和Pydantic结合定义了答案必须呈现的确切样子。它告诉AI：“给我一个包含错误列表的JSON对象，每个错误都有一个严重性评级（如‘关键’或‘低’），以及修复后的代码字符串。”
- en: When sending the vulnerable code to the API, it passes the Pydantic blueprint
    using the output_format parameter. This strictly constrains the model, preventing
    it from hallucinating or adding conversational filler. It *must* return valid
    data matching your blueprint.
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在将易受攻击的代码发送到API时，它使用output_format参数传递Pydantic蓝图。这严格限制了模型，防止它产生幻觉或添加对话填充。它*必须*返回与您的蓝图匹配的有效数据。
- en: The script receives the AI’s response, which is guaranteed to be machine-readable
    JSON. It then automatically parses this data to display a clean report, flagging
    the SQL injection as a “Critical” issue for example and printing the secure, refactored
    version of the code.
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 该脚本接收 AI 的响应，该响应保证是可机器读取的 JSON 格式。然后它会自动解析这些数据以显示一个干净的报告，例如将 SQL 注入标记为“关键”问题，并打印出安全、重构后的代码版本。
- en: Here is the output I received after running the code.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这是运行代码后我收到的输出。
- en: '[PRE8]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**Why is this powerful?**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么这很强大？**'
- en: '**Integration-ready**. You could run this script in a GitHub Action. If is_safe_to_run
    is False, you can automatically block a Pull Request.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**集成就绪**。您可以在 GitHub Action 中运行此脚本。如果 is_safe_to_run 为 False，您可以自动阻止拉取请求。'
- en: '**Separation of concerns**. You get the metadata (bugs, severity) separate
    from the content (the code). You don’t have to use Regex to strip out “Here is
    your fixed code” text from the response.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**关注点分离**。您将元数据（错误、严重性）与内容（代码）分开。您不需要使用正则表达式从响应中删除“这里是您的修复代码”文本。'
- en: '**Strict typing.** The severity field is constrained to specific Enum values
    (Critical, High, etc.), ensuring your downstream logic doesn’t break when the
    model returns “Severe” instead of “Critical” for example.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**严格的类型检查**。严重性字段被限制在特定的枚举值（关键、高等等）中，确保当模型返回“严重”而不是“关键”等值时，您的下游逻辑不会出错。'
- en: Summary
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Anthropic’s release of native Structured Outputs is a game-changer for developers
    who need reliability, not just conversation. By enforcing strict JSON schemas,
    we can now treat Large Language Models less like chatbots and more like deterministic
    software components.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic 推出的原生结构化输出对需要可靠性的开发者来说是一个变革，而不仅仅是对话。通过强制执行严格的 JSON 架构，我们现在可以将大型语言模型视为更类似于确定性软件组件，而不是聊天机器人。
- en: In this article, I demonstrated how to use this new beta feature to streamline
    data extraction and output, and build automated workflows that integrate seamlessly
    with Python code. If you’re a user of Anthropic’s API, the days of writing fragile
    Regex to parse AI responses are finally over.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我展示了如何使用这个新的测试版功能来简化数据提取和输出，并构建与 Python 代码无缝集成的自动化工作流程。如果您是 Anthropic
    API 的用户，编写易碎的正则表达式来解析 AI 响应的日子终于结束了。
- en: For more information about this new beta feature, click the link below to visit
    Anthropics’ official documentation page.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 有关此新测试版功能的更多信息，请点击下面的链接访问 Anthropics 的官方文档页面。
- en: '[https://platform.claude.com/docs/en/build-with-claude/structured-outputs](https://platform.claude.com/docs/en/build-with-claude/structured-outputs)'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://platform.claude.com/docs/en/build-with-claude/structured-outputs](https://platform.claude.com/docs/en/build-with-claude/structured-outputs)'
