    以准备好作为分析师的工作'
- en: '**About the author**: [Matt David](https://www.linkedin.com/in/matthewcharlesdavid/)
    has worked for 10+ years at leading data companies including Atlassian, DataCamp,
    Chartio, and Hex. Matt writes about how the analytics space is changing and how
    best to use data.'
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**关于作者**: [Matt David](https://www.linkedin.com/in/matthewcharlesdavid/) 在包括
    Atlassian、DataCamp、Chartio 和 Hex 在内的领先数据公司工作了10年以上。Matt 写作关于分析领域的变化以及如何最佳地使用数据。'
- en: Be it human or machine. [↩︎](#efb0d6ff-6a4d-4126-902f-601f84f8beb1-link)
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不论是人还是机器。[↩︎](#efb0d6ff-6a4d-4126-902f-601f84f8beb1-link)
- en: As much as one can confirm it with a reasonable amount of effort. [↩︎](#28ad8c8c-988c-4467-8dc7-f4e8b3c463bc-link)
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尽管一个人可能需要付出合理的努力来确认这一点。[↩︎](#28ad8c8c-988c-4467-8dc7-f4e8b3c463bc-link)
- en: Just because a chart is right does not mean its the right chart. [↩︎](#acdf9f18-8adb-4835-b71c-63c76c8250ef-link)
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 就算图表是正确的，也不一定意味着它是正确的图表。[↩︎](#acdf9f18-8adb-4835-b71c-63c76c8250ef-link)
- en: A [Johari](https://en.wikipedia.org/wiki/Johari_window) *context* window if
    you will. [↩︎](#0c7bfd42-30f0-48c4-bbdf-3a6a0fd7be56-link)
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你愿意，可以将其视为一个[Johari](https://en.wikipedia.org/wiki/Johari_window) *情境*窗口。[↩︎](#0c7bfd42-30f0-48c4-bbdf-3a6a0fd7be56-link)
