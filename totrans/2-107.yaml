- en: Why BI in the AI Age
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/why-bi-in-the-ai-age/](https://towardsdatascience.com/why-bi-in-the-ai-age/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: AI forces us analysts to stare in the mirror and ask what *exactly* is the value
    produced by making and sharing charts by hand.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs can generate queries and code to create compelling charts from natural
    language prompts in seconds. They know syntax we have forgotten, packages we’ve
    never heard of, and are all too eager to respond to every executive demand for
    charts at all hours of the day!
  prefs: []
  type: TYPE_NORMAL
- en: But what’s in a chart?
  prefs: []
  type: TYPE_NORMAL
- en: Fundamentally, a chart compresses a bunch of data into an easy-to-understand
    insight that people can hopefully take action on. **The viewer of the chart needs
    to trust that the creator**^([1](#efb0d6ff-6a4d-4126-902f-601f84f8beb1)) **of
    the chart made sure it was correct**^([2](#28ad8c8c-988c-4467-8dc7-f4e8b3c463bc))
    **and appropriate**^([3](#acdf9f18-8adb-4835-b71c-63c76c8250ef)). Otherwise, the
    viewer would need to go through their own analytics process to get to the insight
    themselves.
  prefs: []
  type: TYPE_NORMAL
- en: So let’s explore the parts of the chart-making process where AI still falls
    short — not just to point out its current limitations, but to highlight where
    human analysts add the most value. If you’re working in BI, this article will
    help you better understand how to partner with AI tools, where to stay hands-on,
    and how to design your workflows and data models so that both humans and machines
    can generate more reliable insights.
  prefs: []
  type: TYPE_NORMAL
- en: '**At DataCamp, we think a lot about what great analytics looks like in the
    age of AI.** As a platform that teaches both the technical and strategic sides
    of modern BI, we’ve seen firsthand how the best outcomes come from combining AI
    speed with human judgment. This article shares some of the key patterns we’ve
    observed and the practical takeaways we believe BI professionals should carry
    forward.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To learn the most popular BI tool, Power BI, and create your own charts and
    visualizations from scratch—check out the two courses below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.datacamp.com/tracks/power-bi-fundamentals](https://datacamp.pxf.io/XmvOgG)
    to get the basics right'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://www.datacamp.com/tracks/data-analyst-in-power-bi](https://datacamp.pxf.io/2aLMo0)
    to get job-ready as an analyst'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4 areas where AI falls short in the chart making process
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Lack of metadata
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Lack of extra data
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Understanding emerges through exploration
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Compression is lossy and arbitrary
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Lack of Metadata
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Consider this simple sales dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **customer_id** | **customer_name** | **order_date** | **amount** | **region**
    | **sales_rep** |'
  prefs: []
  type: TYPE_TB
- en: '| 1001 | ACME | 2024-01-15 | 2500.00 | NE | Johnson |'
  prefs: []
  type: TYPE_TB
- en: '| 1002 | Bill Sanchez | 2024-01-16 | 1200.50 | SW | Martinez |'
  prefs: []
  type: TYPE_TB
- en: '| 1003 | Skynet | 2024-01-17 | NULL | SE | NULL |'
  prefs: []
  type: TYPE_TB
- en: 'An AI prompt like “show me sales by region” would instantly generate a chart:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/51936b3b24c2a3d8c4e1d99d53166e1d.png)'
  prefs: []
  type: TYPE_IMG
- en: And this chart seems totally reasonable. Why question it?
  prefs: []
  type: TYPE_NORMAL
- en: 'Well, let’s look at the counterfactual of having a human answer this same question.
    While they may just immediately produce the same or similar chart, they more likely
    will find important metadata context during their process of exploring the data
    en route to creating the chart:'
  prefs: []
  type: TYPE_NORMAL
- en: '`customer_id` actually represents both individual customers AND corporate accounts
    (requiring potentially different analysis approaches)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`amount` represents total contract value booked, not cash received or revenue
    recognized (crucial for financial reporting)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`sales_rep` NULL values indicate channel partner sales (a completely different
    business model)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You asked for ‘sales by region’ and see in the chart that the AI produced that
    SE is underperforming. The obvious next step would be to focus on improving the
    SE sales team. But the human analyst’s metadata investigation reveals this would
    be the wrong move entirely.
  prefs: []
  type: TYPE_NORMAL
- en: Digging deeper, they could discover that SE’s poor performance is actually driven
    by collections issues on partner sales (those NULL `sales_rep` values), not direct
    sales execution. The region isn’t failing—the partner channel is struggling.
  prefs: []
  type: TYPE_NORMAL
- en: 'So the analyst version of the chart may look more like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7b51b1ec4d9f94453b6dc249b221f337.png)'
  prefs: []
  type: TYPE_IMG
- en: '**This isn’t exactly what you prompted for, and that’s the point.**'
  prefs: []
  type: TYPE_NORMAL
- en: Without this human investigation that went a bit beyond your ask, you’d be hammering
    the wrong sales team about performance when you should be reaching out to your
    channel partners. In addition, these findings also have implications for the data
    model. You found that you need several transformations and metadata embedded in
    this table so that it can more reliably be used by an LLM or another human to
    use this data to create a chart.
  prefs: []
  type: TYPE_NORMAL
- en: It should be mentioned that many BI tools are adopting various techniques for
    giving LLMs more metadata access to things like schemas, data dictionaries, and
    dbt, but these all assume the metadata has been written down, which is often not
    the case.
  prefs: []
  type: TYPE_NORMAL
- en: Lack of Extra Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There’s data AI knows, data AI doesn’t know, data AI knows it doesn’t know,
    and data AI doesn’t know it doesn’t know^([4](#0c7bfd42-30f0-48c4-bbdf-3a6a0fd7be56)).
  prefs: []
  type: TYPE_NORMAL
- en: 'The data an AI needs in order to interpret a chart or metric may be completely
    unexpected and hard to proactively make available. Let’s take an expanded version
    of the same dataset and have an AI try to explain a revenue dip in March 2024:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/20396328109f25eec7460d352a42845d.png)![](../Images/1e57ad7d681bc31e0c458545a1e9005b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'These suggestions are all worth potentially looking into and the overall recommendation
    of it being anomalous makes sense. However, an experienced analyst will likely
    have instincts to the true root cause. For instance, the human analyst may know
    of some data that exist outside of the database that they feel confident could
    be the reason:'
  prefs: []
  type: TYPE_NORMAL
- en: '**External Market Event**: Your main competitor had a major promotion that
    month'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Internal Activity**: Your pricing team ran an A/B test that accidentally
    excluded 30% of prospects'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Historical Information**: A key integration partner changed their API, breaking
    sign-up flows for two weeks'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**These discoveries require data that is spread across an organization and
    its ecosystem, not just within the database that’s connected to a BI tool.**'
  prefs: []
  type: TYPE_NORMAL
- en: This allows us to better understand what’s going on in the data vs a less informed
    guess. In the future, more streams of information will certainly be factored into
    LLM context windows and many teams are evaluating how to design their data to
    be more digestible by AI. However, in the present, to try to determine causal
    relationships you need the human analyst’s instinct for generating probable hypotheses
    and confirming theories.
  prefs: []
  type: TYPE_NORMAL
- en: '[![DataCamp](../Images/1be29527c0daf6236120a93b8be35d2d.png)](https://www.datacamp.com/)
    DataCamp helps individuals and teams grow their data and AI skills through hands-on
    learning. With interactive courses, real-world projects, and industry-recognized
    certifications in Python, SQL, Power BI, ChatGPT and more, DataCamp makes it easy
    to learn data skills at your own pace.[Learn More](https://www.datacamp.com/)'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding emerges through exploration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Real datasets are messy and oftentimes the cleaning of the data is key to coming
    to the right answer. Let’s revisit our sales data with a couple more fields related
    to orders:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **customer_id** | **customer_name** | **order_date** | **amount** | **region**
    | **total_orders** | **order_type** |'
  prefs: []
  type: TYPE_TB
- en: '| 1001 | ACME | 2024-01-15 | 2500.00 | NE | 3 | new |'
  prefs: []
  type: TYPE_TB
- en: '| 1001 | ACME | 2024-03-22 | NULL | NE | 3 | renewal |'
  prefs: []
  type: TYPE_TB
- en: '| 1002 | Bill Sanchez | 2024-01-16 | 1200.50 | SW | 1 | new |'
  prefs: []
  type: TYPE_TB
- en: 'Now you have to make some cleaning decisions:'
  prefs: []
  type: TYPE_NORMAL
- en: Do you count ACME as one $2500 sale or track their purchasing pattern over time?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What does that NULL amount in the second ACME record mean — a return, a pending
    renewal, or data entry error?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Well, you could ask the AI what to do, and we did:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4b6c1d537799bb98ef342d0759ac59be.png)'
  prefs: []
  type: TYPE_IMG
- en: 'An analyst is often put in this position to reconcile and then codify how multiple
    teams want the business logic to be written. After talking with accounting and
    sales they determine: “ACME has a renewal with no amount recorded — they’re probably
    negotiating terms or there’s a processing delay.” The analyst can then decide
    whether to exclude this record, estimate the amount, or create a separate renewal
    analysis track.'
  prefs: []
  type: TYPE_NORMAL
- en: This could be a one-off decision or something that gets factored into the data
    model. If we had just asked the AI for a chart on average sale amount we might
    never have bumped into and cleaned this oddity. Again, a human poking around to
    get an answer finds opportunities to make the data better for everyone including
    AI.
  prefs: []
  type: TYPE_NORMAL
- en: Compression is Lossy and Arbitrary
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Even when AI returns a completely correct chart it may not be the *right* chart.
    The same sales data tells completely different stories depending on presentation.
    Here’s how our sales performance data could be presented:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Just the Number** — “Total Sales: $1.2M” (Sounds good! But compared to what?
    What was it last month?)'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a8f184fd879020a61f19301dc7cdc958.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Basic Bar Chart** — Sales by region showing SE lagging behind NE and SW (confirms
    your bias that the SE team needs help)'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3f551f05d35da4dce4bbf2d8d73edca4.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fully Annotated and Contextualized** — The same chart, but with partner sales
    segmented out, showing SE direct sales are actually strong and the issue is the
    partner channel payment processing bug that started in Q3\. Industry benchmark
    and growth trend lines show overall performance is excellent.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1fa952c77b967095835dd63a40e7a335.png)'
  prefs: []
  type: TYPE_IMG
- en: '*(Note: *all these charts were generated by Claude, an AI assistant created
    by Anthropic.*)*'
  prefs: []
  type: TYPE_NORMAL
- en: To be clear, you can use AI to create any of these (like I did!). But when people
    self-serve with AI, will they get to an appropriate level of depth and understanding
    or stop at just getting the number? The AI might give users the misleading middle
    version, but if routed to a human analyst, they would likely know to dig deeper
    and present the data in a way that leads to the right action.
  prefs: []
  type: TYPE_NORMAL
- en: As complete as this final chart feels, this is still just one of many ways to
    understand this data. We could have segmented by customer size, looked at monthly
    trends, filtered out renewals, etc. We could have also looked at this data by
    week or day. The focus on regional totals without segmenting partner vs. direct
    sales is somewhat arbitrary, and the monthly time grain is compressing daily volatility
    that might reveal when the partner payment issue started.
  prefs: []
  type: TYPE_NORMAL
- en: An analyst often makes many charts before settling on the one presented and
    can thus caveat, contextualize, or quickly respond to why this chart was picked
    and help people follow up with more questions. Presenting one chart that does
    not show the whole picture is a feature, not a bug, of data visualization. It
    allows you to present a focused, understandable view into the data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ultimately, as an analyst you must ask yourself: are you comfortable with this
    chart representing all the underlying data? Are you ready to present this chart
    for others to reliably draw conclusions from?'
  prefs: []
  type: TYPE_NORMAL
- en: Keep Calm, and Query On
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Great analytics isn’t about generating charts quickly, it’s about building
    confidence in decisions through rigorous investigation of data. Every discovery,
    design choice, and contextual annotation represents a human analyst’s business
    intelligence (is this even a pun? If so: intended).'
  prefs: []
  type: TYPE_NORMAL
- en: In the AI age, the analysts who thrive will be those who embrace AI as a powerful
    tool to help write code while recognizing that the most valuable analytical work—the
    thinking, questioning, and contextualizing—remains fundamentally human.
  prefs: []
  type: TYPE_NORMAL
- en: 'To learn more about practical way of improving the AI analytics workflow check
    out:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://motherduck.com/blog/vibe-coding-sql-cursor/](https://motherduck.com/blog/vibe-coding-sql-cursor/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To learn the most popular BI tool, Power BI, and create your own charts and
    visualizations from scratch—check out the two courses below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.datacamp.com/tracks/power-bi-fundamentals](https://datacamp.pxf.io/XmvOgG)
    to get the basics right'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://www.datacamp.com/tracks/data-analyst-in-power-bi](https://datacamp.pxf.io/2aLMo0)
    to get job ready as an analyst'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**About the author**: [Matt David](https://www.linkedin.com/in/matthewcharlesdavid/)
    has worked for 10+ years at leading data companies including Atlassian, DataCamp,
    Chartio, and Hex. Matt writes about how the analytics space is changing and how
    best to use data.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Be it human or machine. [↩︎](#efb0d6ff-6a4d-4126-902f-601f84f8beb1-link)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As much as one can confirm it with a reasonable amount of effort. [↩︎](#28ad8c8c-988c-4467-8dc7-f4e8b3c463bc-link)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Just because a chart is right does not mean its the right chart. [↩︎](#acdf9f18-8adb-4835-b71c-63c76c8250ef-link)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A [Johari](https://en.wikipedia.org/wiki/Johari_window) *context* window if
    you will. [↩︎](#0c7bfd42-30f0-48c4-bbdf-3a6a0fd7be56-link)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
