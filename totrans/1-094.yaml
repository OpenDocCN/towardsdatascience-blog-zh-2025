- en: 'Music, Lyrics, and Agentic AI: Building a Smart Song Explainer using Python
    and OpenAI'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 音乐、歌词和代理AI：使用Python和OpenAI构建智能歌曲解释器
- en: 原文：[https://towardsdatascience.com/music-lyrics-and-agentic-ai-building-a-smart-song-explainer-using-python-and-openai/](https://towardsdatascience.com/music-lyrics-and-agentic-ai-building-a-smart-song-explainer-using-python-and-openai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/music-lyrics-and-agentic-ai-building-a-smart-song-explainer-using-python-and-openai/](https://towardsdatascience.com/music-lyrics-and-agentic-ai-building-a-smart-song-explainer-using-python-and-openai/)
- en: <mdspan datatext="el1763096351725" class="mdspan-comment">My favorite kind of
    music</mdspan> is **rap**.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763096351725" class="mdspan-comment">我最喜欢的音乐类型</mdspan>是**说唱**。
- en: Rap music made me cry, sing, and dance, and it is also how I learned the **English**
    language. I still remember the first time I sat down and tried to understand Biggie
    and Tupac. I remember learning about Brooklyn, about California, the slang, the
    struggles, and all the other powerful messages behind those songs.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 说唱音乐让我哭泣、唱歌、跳舞，它也是我学习**英语**语言的方式。我仍然记得第一次坐下来尝试理解Biggie和Tupac。我记得学习关于布鲁克林、加利福尼亚、俚语、斗争以及那些歌曲背后所有强大的信息。
- en: Rap music is the best example of how **lyrics** alone can make music a piece
    of **art**. Some of the best hip-hop songs are literally a sample, some drums,
    and a person talking poetry on a 4/4 tempo.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 说唱音乐是歌词如何仅凭自身就能使音乐成为**艺术品**的最佳例子。一些最好的嘻哈歌曲实际上只是采样，一些鼓点，以及一个人在4/4拍上吟唱诗歌。
- en: 'And while for someone **reading** the lyrics might not even be necessary, as
    they know the language, for non-English speakers like myself, tools like **[Genius](https://genius.com/)**
    made life incredibly easier. Genius is an online lyrics music collector: if you’re
    looking for the lyrics of a song, Genius is your guy. Thanks to Genius, even if
    I didn’t understand what Biggie was saying, I could sit down and read the lyrics,
    then Google them and translate them. Not only that: when a rapper (or a singer
    in general) makes a specific reference that is too hard to understand, Genius
    will clarify that for you through some **side-bar snippets.**'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然对于阅读歌词的人来说可能甚至没有必要，因为他们知道这种语言，但对于像我这样的非英语母语者来说，像**[Genius](https://genius.com/)**这样的工具使生活变得极其简单。Genius是一个在线歌词音乐收藏者：如果你在寻找歌曲的歌词，Genius就是你的选择。多亏了Genius，即使我不理解Biggie在说什么，我也可以坐下来阅读歌词，然后谷歌它们并翻译它们。不仅如此：当说唱者（或一般歌手）做出一些难以理解的特定引用时，Genius会通过一些**侧边栏片段**为你澄清。
- en: '![](../Images/333ca2e4e867af0d0183e869e387cd29.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/333ca2e4e867af0d0183e869e387cd29.png)'
- en: Image from Genius [[link](https://genius.com/55163)]
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 图像来自Genius [[link](https://genius.com/55163)]
- en: But how does Genius do that? How do they produce such insightful, up-to-date,
    useful snippets?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 但Genius是如何做到这一点的？他们是怎样制作出这样有洞察力、更新及时、有用的片段的？
- en: 'Well, ***in 2009*,** when Genius was born, I would say they would mainly produce
    these kinds of snippets **manually**: users would just add their comment, maybe
    some moderator could review some of them, and that’s it, closed deal.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，***2009年***，当Genius诞生时，我会说他们主要会**手动**制作这些类型的片段：用户只需添加他们的评论，也许一些版主会审查其中的一些，然后就这样，交易完成。
- en: However, ***today***, with the powerful AI technologies that we have, the pipeline
    can be made much smoother and efficient. While I do not believe that an agentic
    AI would be able to do the job of a music expert (for so many reasons), I believe
    that a person with such domain knowledge could be **helped** by the agentic AI,
    which would provide them withthe right tools to create the snippets.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，***如今***，凭借我们拥有的强大人工智能技术，我们可以使流程变得更加顺畅和高效。虽然我不相信一个具有代理能力的AI能够胜任音乐专家的工作（有太多原因），但我相信拥有这样领域知识的人可以由代理AI**帮助**，这将为他们提供创建片段的正确工具。
- en: And ***that*** is what we are doing today. 🙂
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 而***这正是我们今天所做的事情**。 :)
- en: We will use **Streamlit**, **Python,** and **OpenAI** to build a super simple
    web app that, given a song’s lyrics, provides clarification to what the piece
    of text means. **More specifically**, we are going to allow the user to ask **questions**
    about the piece of text, making the Genius idea more “interactive”. We are also
    going to give our AI Agent the **Web Search results** to allow the LLM to look
    at other songs and resources when crafting the answer.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用**Streamlit**、**Python**和**OpenAI**来构建一个超级简单的网络应用，该应用在给定歌曲的歌词后，可以提供对文本含义的说明。**更具体地说**，我们将允许用户对文本提出**问题**，使Genius的想法更加“互动”。我们还将为我们的AI代理提供**网络搜索结果**，以便LLM在构建答案时可以查看其他歌曲和资源。
- en: To spice things up (and for copyright purposes lol), we are going to also **create
    our own songs, using another AI agent.**
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了增加趣味性（以及版权目的lol），我们还将**使用另一个AI代理创建自己的歌曲**。
- en: Exciting! Let’s get started! 🚀
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 太棒了！让我们开始吧！🚀
- en: If you are interested in the final result of this experiment, skip to the ***third***
    section. If you want to craft the magic with me, start from next section. No judgments.
    🙂
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你对这个实验的最终结果感兴趣，请跳到第***三***部分。如果你想和我一起创造魔法，请从下一部分开始。不要评判。 🙂
- en: 1\. System Design
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 系统设计
- en: 'Let’s first design our system. This is how it looks:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先设计我们的系统。这是它的样子：
- en: '![](../Images/174955e10893b6ffbcd434ed34137d47.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/174955e10893b6ffbcd434ed34137d47.png)'
- en: Image made by author
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者制作的照片
- en: 'More specifically:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地说：
- en: The User has the ability to **create the song** from scratch using an AI Agent.
    That’s optional; a batch of songs has already been generated and can be used instead.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户可以使用AI代理**从头开始创建歌曲**。这是可选的；已经生成了一批歌曲，也可以使用。
- en: The User can **select a part** of the text and ask a question.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户可以**选择文本的一部分**并提问。
- en: The AI Agent can **generate the response** in a “Genius-like” style.
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AI代理可以以“Genius-like”的风格**生成响应**。
- en: 'The AI Agent is also equipped with:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理还配备了：
- en: a. The “**Internal Song Knowledge**“, which consists of the extracted features/metadata
    of the song (e.g., vibe, title, theme, etc…).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: a. “**内部歌曲知识**”，由歌曲的提取特征/元数据组成（例如，感觉、标题、主题等…）。
- en: b. The Web Search Tool, which allows the agent to surf the web to look for songs
    and add context to the question
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: b. **网络搜索工具**，允许代理上网寻找歌曲并为问题添加上下文
- en: This design has good **modularity,** meaning it is easy to add bits and pieces
    to increase the complexity of the system. For example, if you want to make the
    song generation more sophisticated, you can easily tweak the Song Generation Agent
    without going crazy over the other parts of the code.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设计具有良好的**模块化**，意味着很容易添加部分来增加系统的复杂性。例如，如果您想使歌曲生成更复杂，可以轻松调整歌曲生成代理，而无需对代码的其他部分进行疯狂修改。
- en: Let’s build this piece by piece. 🧱
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一块一块地构建它。🧱
- en: 2\. Code
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 代码
- en: 2.1 Setup
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1 设置
- en: The whole code can be found in this [Github folder](https://github.com/PieroPaialungaAI/LyricsGPT)
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 整个代码可以在这个[Github文件夹](https://github.com/PieroPaialungaAI/LyricsGPT)中找到
- en: 'The structure of our work will be as follows:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的工作结构将如下所示：
- en: A **lyrics generator,** which is `generate_madeup_lyrics.py`
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个**歌词生成器**，即`generate_madeup_lyrics.py`
- en: The **lyrics answer,** which is `qa.py`
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**歌词答案**，即`qa.py`'
- en: The **web app** itself (the file we will run through Streamlit), which is `lyricsgpt_app.py`
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Web应用本身**（我们将通过Streamlit运行的那个文件），即`lyricsgpt_app.py`'
- en: A bunch of **helpers** (such as `utils.py`, `constants.py`, `config.py`, etc…)
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一系列**辅助工具**（例如`utils.py`、`constants.py`、`config.py`等…）
- en: The data will be stored in a `data` folder as well.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 数据也将存储在`data`文件夹中。
- en: '![](../Images/4154101093abe578d648c735612d92c2.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4154101093abe578d648c735612d92c2.png)'
- en: Image made by author
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者制作的照片
- en: 'I don’t want to bore you with all the tiny details, so I will only describe
    the main components of this structure. Let’s start with the core: **the Streamlit
    app.**'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想用所有这些细节来烦扰你，所以我只会描述这个结构的主要组件。让我们从核心开始：**Streamlit应用**。
- en: 2.2 Streamlit App
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2 Streamlit应用
- en: '**Please note**: you will need to have a [OpenAI API key](https://platform.openai.com/api-keys)
    ready, for both the Streamlit app and whatever requires the LLM generation. Outside
    of the Streamlit app, the easiest way is to set it using OS: **os.getenv(“OPENAI_API_KEY”)
    = “api_key”**. Within the app, you will be prompted to copy-paste it. Don’t worry,
    it’s all local.'
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**请注意**：您需要准备好一个[OpenAI API密钥](https://platform.openai.com/api-keys)，用于Streamlit应用以及需要LLM生成的任何内容。在Streamlit应用之外，最简单的方法是使用OS设置它：**os.getenv(“OPENAI_API_KEY”)
    = “api_key”**。在应用内部，您将被提示复制粘贴它。别担心，它都是本地的。'
- en: 'The whole thing runs with the following command:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 整个系统通过以下命令运行：
- en: '`streamlit run lyricsgpt_app.py`'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '`streamlit run lyricsgpt_app.py`'
- en: 'Where `lyricsgpt_app.py` is the following block of code:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '`lyricsgpt_app.py`的代码如下：'
- en: 'This is quite long, but pretty straightforward: every line represents a piece
    of the web app:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这相当长，但相当直接：每一行代表Web应用的一部分：
- en: '**The title** of the web app'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Web应用的标题**'
- en: '**The song selector**, which allows the user to select the lyrics from the
    data folder (more about this later)'
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**歌曲选择器**，允许用户从数据文件夹中选择歌词（关于这一点稍后详述）'
- en: '**The box for the block of text,** where the user can copy and paste the part
    of the lyrics of interest'
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**文本块的区域**，用户可以复制粘贴感兴趣的歌词部分'
- en: '**The question** **box**, where the user can ask a question about the part
    of the lyrics of interest selected above'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**问题** **框**，用户可以在此处提出关于上述歌词部分的问题'
- en: '**The answer** **box**, where the LLM can answer the question.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**答案** **框**，LLM可以在此处回答问题。'
- en: But this is “***only***” the executor; the dirty work is done by the `lyricsgpt`
    module and its objects/functions. Let’s see a few!
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 但这只是一个执行者；“脏活”是由`lyricsgpt`模块及其对象/函数来完成的。让我们看看几个例子！
- en: 2.3 Lyrics Generator
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3 歌词生成器
- en: 'This part is optional and not included in the web app, which focuses on the
    Genius-like Lyrics Explainer. Feel free to skip this if you are interested in
    that. But I have to say it: this part is pretty cool.'
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这部分是可选的，不包括在专注于类似Genius的歌词解释器的网络应用中。如果你对此感兴趣，可以随意跳过。但我要说的是：这部分真的很酷。
- en: 'For the lyrics generation, the game is simple:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 对于歌词生成，游戏很简单：
- en: '***You*** give me a **title**, **vibe**, **theme,** and some hidden message
    in a **twist**.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***你*** 给我一个 **标题**，**氛围**，**主题**，以及一个 **转折** 中的隐藏信息。'
- en: '***I*** give you the **lyrics**.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***我*** 给你**歌词**。'
- en: 'For example:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: 'Produces:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 生成：
- en: Verse 1
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第一段
- en: Underneath the city lights, whispers danced along the skyline, we were shining
    through the night, like diamonds in a midnight sky. But love was just a high-rise
    dream, built on fragile seams, now I’m pulling off the freeway, leaving echoes
    in between.
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在城市灯光下，低语在天际线旁起舞，我们在夜晚闪耀，就像午夜天空中的钻石。但爱情只是一个摩天大楼的梦，建立在脆弱的接缝上，现在我正驶离高速公路，留下回声在中间。
- en: ''
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Chorus
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 合唱
- en: And it’s all glitter in the rearview, fading into shades of blue, every laugh
    and every tear, drifting out of view. As the road unrolls ahead, I let the memories
    stew, it’s just glitter in the rearview, letting go of me and you.
  id: totrans-64
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 而这一切都只是后视镜中的闪光，逐渐淡入蓝色阴影，每一个笑声和每一滴泪水，都飘出了视线。随着道路向前延伸，我让记忆慢慢沉淀，这只是一场后视镜中的闪光，让我和你放手。
- en: ''
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Some more LLM Generated Text]'
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[一些更多由LLM生成的文本]'
- en: ''
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Outro
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 结尾
- en: So I drive into the silence, where the past can’t misconstrue, leaving glitter
    in the rearview, and the shards of me and you. It’s just glitter in the rearview,
    a love story gone too soon.
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 所以我驶入寂静之中，过去无法误解，留下后视镜中的闪光，以及我和你的碎片。这只是一场后视镜中的闪光，一段过早结束的爱情故事。
- en: 'Pretty cool, right? The code to do that is the following:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 非常酷，对吧？完成这个功能的代码如下：
- en: 'You can play with it by modifying **SONG_PROMPTS**, which looks like this:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过修改**SONG_PROMPTS**来玩它，它看起来像这样：
- en: Every time you generate a song, it will go into a **JSON** file. By default,
    that is **data/generated_lyrics.json**. You don’t have to necessarily generate
    a song; there are already some examples I made in there.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 每次你生成一首歌，它都会进入一个**JSON**文件。默认情况下，是**data/generated_lyrics.json**。你不必一定要生成一首歌；里面已经有了一些我制作的例子。
- en: 2.4 Lyrics Explainer
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.4 歌词解释器
- en: 'The coolest thing about this whole Agentic era is the **amount of time you
    save to build this stuff.** The ***whole*** Question-Answering logic, plus the
    ability of the AI to use online web search, is in this block of code:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这个Agentic时代最酷的事情是**节省了构建这些内容的时间**。整个**问答逻辑**，加上AI使用在线网络搜索的能力，都包含在这个代码块中：
- en: 'This does it all: **answer** the question, **reads** the lyrics metadata**,**
    and **integrates** information online if prompted/needed.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这一切都能做到：**回答**问题，**读取**歌词元数据，**集成**在线信息（如果需要）。
- en: I didn’t want to get too fancy, but you can actually equip the agent with the
    web_search **tool**. In this case, I’m parsing the information directly; if you
    give the LLM the tool, it can decide when and if search online.
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我不想做得太复杂，但你实际上可以给代理配备web_search **工具**。在这种情况下，我正在直接解析信息；如果你给LLM这个工具，它可以选择何时以及是否在线搜索。
- en: Ok, but does this work? How do the results look like? Let’s find out!
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，但这管用吗？结果看起来怎么样？让我们来看看！
- en: 3\. The magic!
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 魔法！
- en: This is an example of the web app.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个网络应用的例子。
- en: You copy-paste your **[OpenAI API](https://platform.openai.com/api-keys)** key,
    and you select a song. Say “Glitter in the Rearview”.
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你复制粘贴你的**[OpenAI API](https://platform.openai.com/api-keys)**密钥，并选择一首歌。比如说“后视镜中的闪光”。
- en: '![](../Images/d1d13f2123b2659ffd3d22d3abc6ce90.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d1d13f2123b2659ffd3d22d3abc6ce90.png)'
- en: Image made by author
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者制作的照片
- en: '![](../Images/24d0c4477a89767eb68b2bf43f4caa06.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/24d0c4477a89767eb68b2bf43f4caa06.png)'
- en: 2\. Select the part of interest. For example, let’s say I’m an Italian guy (which
    I am lol), and I use **meters**, so I don’t know how far a **mile** is. I would
    also like to know if there is a reference to something specific when the singer
    says 13 miles (“Thirteen miles to freedom” is the first sentence in the bridge)
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择感兴趣的部分。例如，假设我是一个意大利人（我是的lol），我使用**米**，所以我不知道一英里有多远。我还想知道当歌手说13英里时是否有对特定事物的引用（“Thirteen
    miles to freedom”是桥段的第一个句子）。
- en: '![](../Images/f99cf1bf1846c4d5fd408f3651e0a69d.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f99cf1bf1846c4d5fd408f3651e0a69d.png)'
- en: 3\. See the magic!
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 看看魔法！
- en: '![](../Images/a2c52cc76d2f85bf7cc354694ea3a4b8.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a2c52cc76d2f85bf7cc354694ea3a4b8.png)'
- en: Image made by author
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者制作
- en: Let’s try something harder. Here, I pasted the whole second verse, and I asked
    the AI to give me which singer would write something like this.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试更难的事情。在这里，我粘贴了整个第二段，并要求AI告诉我哪位歌手会写出这样的歌词。
- en: '![](../Images/c3f2db18dc12b6bb839bfb25d75e32b5.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c3f2db18dc12b6bb839bfb25d75e32b5.png)'
- en: 'The AI points out **Taylor Swift** and **Adele**. Especially the Taylor Swift
    reference is extremely accurate, as the songs about breakups and love stories
    are her greatest hits. She also on her popularity and how her life is affected
    by it in songs like “I know places”:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: AI指出**泰勒·斯威夫特**和**阿黛尔**。特别是泰勒·斯威夫特的引用非常准确，因为关于分手和爱情故事的歌是她最伟大的作品。她还在她的流行度和她的生活如何受到影响的歌曲中提到：“I
    know places”：
- en: Lights flash and we’ll run for the fences, Let them say what they want, we won’t
    hear it
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 灯光闪烁，我们将冲向栅栏，让他们说他们想说的，我们不会听。
- en: ''
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Taylor Swift – I know places
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 泰勒·斯威夫特 – 我知道地方
- en: I will admit I had to Google that.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须承认我不得不在谷歌上查找那个。
- en: 4\. Some thinking…
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 一些思考…
- en: 'Now, ***this is far from perfect:*** it is a plug-and-play weekend project,
    less than an MVP. However, it provides three widespread takeaways:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，***这远非完美：***这是一个即插即用的周末项目，还不到MVP。然而，它提供了三个普遍的启示：
- en: When provided with the right tools and metadata, the LLM really shines and provides
    insightful information (like the Taylor Swift suggestion)
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当提供正确的工具和元数据时，LLM确实非常出色，并提供了有洞察力的信息（如泰勒·斯威夫特的建议）。
- en: Building an LLM wrapper is **way** easier than it was even 5 months ago. The
    way this technology is evolving allows you to be more productive than ever.
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 构建一个LLM包装器比5个月前容易得多。这种技术的演变方式让你比以往任何时候都更有生产力。
- en: Agentic AI can really be applied **everywhere**. Rather than getting scared
    about it, it’s best to embrace it and see what we can do with it.
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代理AI可以真正应用于**任何地方**。与其对此感到恐惧，不如接受它，看看我们能用它做什么。
- en: 5\. Conclusions
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 结论
- en: 'Thank you for spending time with me; it means a lot ❤️. Here’s what we have
    done together:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您与我共度时光；这对您意义重大❤️。这是我们共同完成的事情：
- en: '**Designed a Genius-inspired system powered by Agentic AI** that can explain
    song lyrics interactively.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设计了一个由代理AI驱动的灵感系统**，可以交互式地解释歌词。'
- en: '**Developed the backend components in Python and Streamlit**, from the lyrics
    generator to the Q&A engine.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在Python和Streamlit中开发了后端组件**，从歌词生成器到问答引擎。'
- en: '**Built the AI agent** with internal song knowledge and a web search tool for
    contextual answers.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**构建了一个具有内部歌曲知识和网络搜索工具以提供上下文答案的AI代理**。'
- en: '**Built an** app that can interpret lyrics intelligently.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**构建了一个**能够智能解析歌词的应用。'
- en: '**Had some fun** while doing that, I hope. 🙂'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在这样做的时候，我确实玩得很开心**，希望如此。😊'
- en: I want to close with my 2 cents. On my daily commute, I listen to **podcasts**
    (usually interviews) of **artists** who make music, and they explain the songs,
    the references, and the lyrics. If someone replaces those musicians with an AI,
    I am going to **RIOT**. Not (*only*) because I like the **people** themselves,
    but because I believe that they will explain things with a passion, a depth, and
    an empathy that LLMs are not able to provide (and I think they never will).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我想以我自己的观点结束。在我每天的通勤中，我听的是**播客**（通常是采访）音乐家，他们解释歌曲、引用和歌词。如果有人用AI替换了这些音乐家，我将要**抗议**。不仅是因为我喜欢这些人本身，而且因为我相信他们会以激情、深度和同理心来解释事物，这是LLM无法提供的（我认为它们永远也不会提供）。
- en: However, if we provide music critics with these kinds of AI tools, their work
    becomes much easier, and they can 10x their productivity.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果我们向音乐评论家提供这些类型的AI工具，他们的工作会变得容易得多，他们可以提高10倍的生产力。
- en: 7\. Before you head out!
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 在你出发之前！
- en: Thank you again for your time. It means a lot ❤️
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 再次感谢您抽出时间。这对您意义重大❤️
- en: 'My name is Piero Paialunga, and I’m this guy here:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我的名字是皮埃罗·帕亚尔图加，我就是这里的人：
- en: '![](../Images/0c5430e219c906f69a60578e6620b560.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0c5430e219c906f69a60578e6620b560.png)'
- en: Image made by author
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者制作的照片
- en: 'I’m originally from Italy, hold a Ph.D. from the **University of Cincinnati**,
    and work as a **Data Scientist at The Trade Desk** in New York City. I write about
    **AI, Machine Learning, and the evolving role of data scientists** both here on
    TDS and on LinkedIn. If you liked the article and want to know more about machine
    learning and follow my studies, you can:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我原本来自意大利，拥有辛辛那提大学的博士学位，并在纽约市**The Trade Desk**担任**数据科学家**。我在TDS和LinkedIn上撰写关于**人工智能、机器学习以及数据科学家角色演变**的文章。如果你喜欢这篇文章，并想了解更多关于机器学习的内容以及关注我的研究，你可以：
- en: A. Follow me on [**Linkedin**](https://www.linkedin.com/in/pieropaialunga/),
    where I publish all my stories
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: A. 在[**领英**](https://www.linkedin.com/in/pieropaialunga/)上关注我，我在那里发布所有故事
- en: B. Follow me on [**GitHub**](https://github.com/PieroPaialungaAI), where you
    can see all my code
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: B. 在[**GitHub**](https://github.com/PieroPaialungaAI)上关注我，在那里你可以看到我所有的代码
- en: C. For questions, you can send me an email at ***piero.paialunga@hotmail***
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: C. 如有疑问，你可以通过以下邮箱发送给我：***piero.paialunga@hotmail***
