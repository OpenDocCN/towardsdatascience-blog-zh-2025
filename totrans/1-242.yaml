- en: 'Building Fact-Checking Systems: Catching Repeating False Claims Before They
    Spread'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建事实核查系统：在它们传播之前捕捉重复的虚假声明
- en: 原文：[https://towardsdatascience.com/building-fact-checking-systems-catching-repeating-false-claims-before-they-spread/](https://towardsdatascience.com/building-fact-checking-systems-catching-repeating-false-claims-before-they-spread/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/building-fact-checking-systems-catching-repeating-false-claims-before-they-spread/](https://towardsdatascience.com/building-fact-checking-systems-catching-repeating-false-claims-before-they-spread/)'
- en: '<mdspan datatext="el1758911321332" class="mdspan-comment">From Utopia to Reality</mdspan>:
    Why We Need Automated Fact-Checking'
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758911321332" class="mdspan-comment">从乌托邦到现实</mdspan>：为什么我们需要自动化事实核查
- en: In comparison to the traditional media, where articles are edited and verified
    before getting published, social media changed the approach completely. Suddenly,
    everyone could raise their voice. Posts are shared instantly, enabling the access
    to ideas and perspectives from all over the world. That was the dream, at least.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统媒体相比，传统媒体在发表文章之前会进行编辑和验证，而社交媒体则完全改变了这一方法。突然之间，每个人都可以发声。帖子可以瞬间分享，使人们能够接触到来自世界各地的想法和观点。至少这是梦想。
- en: What began as an idea of protecting freedom of speech, giving individuals the
    opportunity to express opinions without censorship, has come with a trade-off.
    Very little information gets checked. And that makes it harder than ever to detect
    what’s accurate and what’s not.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 最初的想法是保护言论自由，给个人提供表达意见而不受审查的机会，但这也带来了一定的权衡。信息核查非常少。这使得检测准确性和错误性比以往任何时候都更困难。
- en: An additional challenge is created as false claims rarely appear just once.
    They are often reshared on different platforms, often altered in wording, format,
    length, or even language, making detection and verification even more difficult.
    As these variations circulate across platforms they can seem familiar and therefore
    believable to its readers.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个挑战是虚假声明很少只出现一次。它们经常在不同的平台上被重新分享，通常在措辞、格式、长度甚至语言上被修改，这使得检测和验证变得更加困难。随着这些变化在平台上传播，它们可能对读者来说看起来很熟悉，因此可信。
- en: The original idea of a space for open, uncensored, and reliable information
    has run into a paradox. The very openness meant to empower people also makes it
    easy for misinformation to spread. That’s exactly where fact-checking systems
    come in.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 开放、无审查和可靠信息的空间原始想法遇到了一个悖论。正是为了赋予人们权力而开放的空间也使得错误信息传播变得容易。这正是事实核查系统发挥作用的地方。
- en: The Development of Fact-checking Pipelines
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 事实核查管道的发展
- en: Traditionally, fact-checking was a manual process that relied on experts (journalists,
    researchers, or fact-checking organizations) to verify claims by referencing them
    with sources such as official documents, or expert opinions. This approach was
    very reliable and thorough, but also very time-consuming. The result of this delay
    was therefore more time for the false narratives to circulate, shape public opinion,
    and enable further manipulation.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，事实核查是一个手动过程，依赖于专家（记者、研究人员或事实核查组织）通过引用官方文件或专家意见来验证声明。这种方法非常可靠和彻底，但也很耗时。因此，这种延迟的结果是虚假叙述有更多的时间传播、塑造公众舆论和进行进一步的操作。
- en: 'This is where automation comes in. Researchers have developed fact-checking
    pipelines that behave as the human-fact-checking-experts, but can scale to massive
    amounts of online content. The fact-checking pipeline follows a structured process,
    which usually includes the following five steps:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是自动化介入的地方。研究人员已经开发出事实核查管道，它们的行为类似于人类事实核查专家，但可以扩展到大量在线内容。事实核查管道遵循一个结构化的流程，通常包括以下五个步骤：
- en: Claim Detection – find statements with factual implications.
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 声明检测 - 找出具有事实含义的陈述。
- en: Claim Prioritization – rank them by speed of spread, potential harm, or public
    interest, prioritizing the most impactful cases.
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 声明优先级 - 根据传播速度、潜在危害或公众兴趣进行排序，优先处理最具影响力的案例。
- en: Retrieval of Evidence – gather supporting material and provide the context to
    evaluate it.
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 证据检索 - 收集支持材料并提供评估其背景。
- en: Veracity Prediction – decide whether the claim is true, false, or something
    in between.
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 真实性预测 - 判断声明是真实的、虚假的还是介于两者之间。
- en: Generation of Explanation – produce a justification that readers can understand.
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释生成 - 产生读者可以理解的正当理由。
- en: 'In addition to the five steps, many pipelines also add a sixth step: **retrieval
    of previously fact-checked claims (PFCR).** Instead of redoing the work from scratch,
    the system checks whether a claim, even reformulated, has already been verified.
    If so, it is linked to the fact-check and the claim’s verdict. If not, the pipeline
    proceeds with evidence retrieval.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 除了五个步骤之外，许多管道还增加了一个第六步：**检索先前已核查的主张（PFCR）**。而不是从头开始重做工作，系统会检查一个主张，即使经过重新表述，是否已经被验证。如果是的话，它将与事实核查和主张的裁决相链接。如果不是，管道将继续进行证据检索。
- en: This shortcut saves effort, speeds up verification, and further benefits in
    multilingual settings, as it allows fact-checks in one language to support verification
    in another.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这个快捷方式节省了精力，加快了验证速度，并在多语言环境中带来更多好处，因为它允许在一个语言中进行事实核查以支持另一个语言的验证。
- en: 'This component is known by many names; *verified claim retrieval*, *claim matching*,
    or *previously fact-checked claim retrieval (PFCR)*. Regardless of the name, the
    idea is the same: reuse knowledge that already exists to fight misinformation
    faster and more effectively.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这个组件有多个名称；*已验证主张检索*、*主张匹配*或*先前已核查主张检索（PFCR）*。无论名称如何，想法都是相同的：重用现有知识以更快、更有效地对抗虚假信息。
- en: '![](../Images/6133a45ab6c95026ebd6e7c3dbe8fc9f.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6133a45ab6c95026ebd6e7c3dbe8fc9f.png)'
- en: 'Figure 1: Fact-checking pipeline (created by author)'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1：事实核查管道（作者创建）
- en: Designing the PFCR Component (Retrieval Pipeline)
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设计 PFCR 组件（检索管道）
- en: 'At its core, previously fact-checked claim retrieval (PFCR) is an **information
    retrieval task**: given a claim from a social media post, we want to find the
    most relevant match in a large collection of already fact-checked (verified) claims.
    If a match exists, we can immediately link it to the source and the verdict, so
    there is no need to start verification from scratch!'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，先前已核查的主张检索（PFCR）是一个**信息检索任务**：给定社交媒体帖子中的一个主张，我们希望在已经核查（验证）的大量主张集合中找到最相关的匹配。如果存在匹配，我们可以立即将其链接到来源和裁决，因此不需要从头开始进行验证！
- en: Most modern information retrieval systems use a **retriever–reranker architecture**.
    The retriever acts as the first-layer filter returning a larger set of candidate
    documents (top *k*) from the corpus. The reranker then takes those candidates
    and refines the ranking using a deeper, more computationally intensive model.
    This two-stage design balances speed (retriever) and accuracy (reranker).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数现代信息检索系统使用**检索器-重新排序器架构**。检索器作为第一层过滤器，从语料库中返回一组更大的候选文档（前 *k*）。然后，重新排序器使用更深、计算量更大的模型对这些候选者进行细化排名。这种两阶段设计平衡了速度（检索器）和准确性（重新排序器）。
- en: 'Models used for **retrieval** can be grouped into two categories:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 用于**检索**的模型可以分为两类：
- en: '**Lexical models**: fast, interpretable, and effective when there’s strong
    word overlap. But they struggle when ideas are phrased differently (synonyms,
    paraphrases, translations).'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**词汇模型**：当有强烈的词语重叠时，快速、可解释且有效。但当想法以不同的方式表达时（同义词、释义、翻译），它们会面临挑战。'
- en: '**Semantic models**: capture meaning rather than surface words, making them
    ideal for PFCR. They would recognize that, for example, *“the Earth orbits the
    Sun”* and *“our planet revolves around the star at the center of the solar system”*
    are describing the same fact, even though the wording is completely different.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义模型**：捕捉意义而不是表面词语，这使得它们非常适合 PFCR。它们会认识到，例如，“地球围绕太阳运行”和“我们的星球围绕着太阳系中心的恒星旋转”描述的是同一个事实，尽管措辞完全不同。'
- en: Once candidates are retrieved, the **reranking stage** applies more powerful
    models (often cross-encoders) to carefully re-score the top results ensuring that
    the most relevant fact-checks rank higher. As rerankers are more expensive to
    run, they’re only applied to a smaller pool of candidates (e.g., the top 100).
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦检索到候选者，**重新排序阶段**应用更强大的模型（通常是交叉编码器）来仔细重新评分顶级结果，确保最相关的核查排名更高。由于重新排序器运行成本更高，它们只应用于更小的候选者池（例如，前
    100 名）。
- en: Together, the retriever–reranker pipeline provides both **coverage** (by recognizing
    a wider range of possible matches) and **precision** (by ranking higher the most
    similar ones). For PFCR, this balance is crucial as it enables a fast and scalable
    way to detect repeating claims, but with a high accuracy so that users can trust
    the information they read.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 一起，检索器-重新排序管道提供了**覆盖范围**（通过识别更广泛的可能匹配）和**精确度**（通过将最相似的排名更高）。对于 PFCR 来说，这种平衡至关重要，因为它实现了一种快速且可扩展的方式来检测重复的主张，但同时又具有高精度，以便用户可以信任他们阅读的信息。
- en: Building the Ensemble
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建集成
- en: 'The retriever–reranker pipeline already delivers solid performance. But as
    I evaluated the models and ran the experiments, one thing became clear: **no single
    model is good enough on its own**.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 检索器-重排器管道已经提供了坚实的性能。但在评估模型和运行实验的过程中，一件事情变得很清楚：**没有哪个模型单独就足够好**。
- en: 'Lexical models, like BM25, are great at exact keyword matches, but as soon
    as the claim is phrased differently, they fail. That’s where semantic models step
    in. They have no problem with handling paraphrases, translations, or crosslingual
    scenarios, but sometimes struggle with straightforward matches where wording matters
    the most. Not all the semantic models are the same either, each one had its own
    niche: some work better in English, others in multilingual settings, another for
    capturing subtle contextual nuances. In other words, just as misinformation mutates
    and reappears in countless variations, semantic retrieval models also bring different
    strengths depending on how they were trained. If misinformation is adaptable,
    then the retrieval system must be as well.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 词汇模型，如BM25，擅长精确的关键词匹配，但一旦断言被以不同的方式表达，它们就会失败。这就是语义模型介入的地方。它们在处理释义、翻译或跨语言场景时没有问题，但有时在措辞最为重要的直接匹配上会感到困难。而且，并非所有的语义模型都相同，每个模型都有自己的细分市场：一些在英语中表现更好，其他在多语言环境中表现更好，还有一些用于捕捉细微的上下文细微差别。换句话说，正如错误信息会以无数种变化形式突变和重新出现一样，语义检索模型也会根据它们的训练方式带来不同的优势。如果错误信息是可适应的，那么检索系统也必须是可适应的。
- en: That’s where the idea of an **ensemble** came in. Instead of betting on a single
    “best” model, I combined the predictions of multiple models in an ensemble so
    they could collaborate and complement each other. Instead of relying on a single
    model, why not let them work as a team.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 正是在这里，集成的想法出现了。不是只押注一个“最好的”模型，而是将多个模型在集成中的预测结合起来，以便它们可以协作和互相补充。为什么不让他们作为一个团队一起工作呢？
- en: Before going further into the ensemble design, I will briefly explain the decision
    making process for the choice of retrievers.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在进一步探讨集成设计之前，我将简要解释选择检索器时的决策过程。
- en: Establishing a Baseline (Lexical Models)
  id: totrans-33
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 建立基准（词汇模型）
- en: BM25 is one of the most effective and widely used *lexical* retrieval models
    often used as a baseline in modern IR research. Before evaluating the embedding-based
    (semantic) models, I was interested to see how good (or bad) BM25 can perform.
    And as it turns out, not bad at all!
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: BM25是最有效和最广泛使用的**词汇**检索模型之一，常被用作现代信息检索研究中的基准。在评估基于嵌入（语义）模型之前，我很好奇想看看BM25能表现得多好（或多坏）。结果证明，它并不差！
- en: '***Tech detail:*** BM25 is a ranking function built upon TF-IDF. It improves
    TF-IDF by introducing a saturation function and document length normalization.
    Unlike term frequency scoring, BM25 accounts for repeated occurrences of a term,
    preventing long documents from being unfairly favoured. It also includes a parameter
    (b) that controls the weight assigned to term frequency and document length.'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***技术细节：*** BM25是一个基于TF-IDF的排名函数。它通过引入饱和函数和文档长度归一化来改进TF-IDF。与词频评分不同，BM25考虑了术语的重复出现，防止长文档被不公平地偏爱。它还包括一个参数（b），该参数控制分配给词频和文档长度的权重。'
- en: Semantic Models
  id: totrans-36
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 语义模型
- en: As a starting point for the semantic (embedding-based) models, I referred to
    the HuggingFace’s [Massive Text Embedding Benchmark (MTEB)](https://huggingface.co/spaces/mteb/leaderboard)
    and evaluated the leading models while keeping the GPU resource constraints in
    mind.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 作为语义（基于嵌入）模型的起点，我参考了HuggingFace的[大规模文本嵌入基准（MTEB）](https://huggingface.co/spaces/mteb/leaderboard)并评估了领先模型，同时考虑到GPU资源限制。
- en: The two models that stood out were E5 ([intfloat/multilingual-e5-large-instruct](https://huggingface.co/intfloat/multilingual-e5-large-instruct))
    and BGE ([BAAI/bge-m3](https://huggingface.co/BAAI/bge-m3)). Both achieved strong
    results when retrieving the top 100 candidates, so I selected them for further
    tuning and integration with BM25.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 突出的两个模型是E5 ([intfloat/multilingual-e5-large-instruct](https://huggingface.co/intfloat/multilingual-e5-large-instruct))
    和 BGE ([BAAI/bge-m3](https://huggingface.co/BAAI/bge-m3))。在检索前100个候选者时，它们都取得了很好的结果，因此我选择了它们进行进一步的调整和与BM25的集成。
- en: Ensemble Design
  id: totrans-39
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 集成设计
- en: 'With retrievers in place, the question was: how do we combine them? I tested
    different **aggregation strategies** including majority voting, exponential decay
    weighting, and reciprocal rank fusion (RRF).'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置好检索器之后，问题变成了：我们如何将它们结合起来？我测试了不同的**聚合策略**，包括多数投票、指数衰减权重和互反排名融合（RRF）。
- en: RRF worked best as it doesn’t just average scores, it rewards documents that
    consistently appear high across different rankings, regardless of which model
    produced them. This way, the ensemble favored claims that multiple models “agreed
    on,” while still allowing each model to contribute independently.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: RRF表现最佳，因为它不仅平均分数，而且奖励那些在不同排名中持续出现高分的文档，无论是由哪个模型产生的。这样，集成倾向于那些多个模型“达成共识”的论断，同时仍然允许每个模型独立贡献。
- en: 'I also experimented with the **number of candidates retrieved in the first
    stage** (commonly referred to as hyperparameter *k*). The idea is simple: if you
    only pull in a very small set of candidates, you risk missing relevant fact-checks
    altogether. On the other hand, if you select too many, the reranker has to go
    through a lot of noise, which adds computational cost without actually improving
    accuracy.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我还尝试了**第一阶段检索的候选人数**（通常称为超参数*k*）。想法很简单：如果你只拉入一个非常小的候选集，你可能会完全错过相关的核查事实。另一方面，如果你选择太多，重新排序器必须通过大量的噪声，这增加了计算成本，但实际上并没有提高准确性。
- en: Through the experiments, I found that as *k* increased, performance improved
    at first because the ensemble had more chances to find the right fact-checks.
    But after a certain point, adding more candidates stopped helping. The reranker
    could already see enough relevant fact-checks to make good decisions, and the
    extra ones were mostly irrelevant. In practice, this meant finding a “sweet spot”
    where the candidate pool was large enough to ensure coverage, but not so large
    that it decreased the reranker’s effectiveness.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实验，我发现随着*k*的增加，性能最初有所提高，因为集成有更多机会找到正确的核查事实。但达到某个点后，增加更多候选者就不再有帮助了。重新排序器已经可以看到足够的相关核查事实来做出良好的决策，额外的那些大多是无关的。在实践中，这意味着找到一个“甜点”，候选池足够大以确保覆盖范围，但又不会降低重新排序器的有效性。
- en: As a final step, I adjusted the **weights of each model**. Reducing the BM25’s
    influence while giving more weight to the semantic retrievers boosted the performance.
    In other words, BM25 is useful, but the heavy lifting is done by E5 and BGE.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 作为最后一步，我调整了**每个模型的权重**。减少BM25的影响，同时增加语义检索器的权重，提高了性能。换句话说，BM25是有用的，但主要的工作是由E5和BGE完成的。
- en: To shortly go through the PFCR component; the pipeline consists of retrieval
    and reranking where for the retrieval we can use lexical or semantic models while
    for the reranking we would use a semantic model. Additionally, we noticed that
    combining multiple models within an ensemble improves the retrieval/reranking
    performance. Ok, so where do we integrate the ensemble?
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 简要概述PFCR组件；该流程包括检索和重新排序，其中对于检索我们可以使用词汇或语义模型，而对于重新排序，我们会使用语义模型。此外，我们注意到在集成中使用多个模型可以提高检索/重新排序的性能。好的，那么我们如何在集成中整合？
- en: Where Does the Ensemble Fit?
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集成适合在哪里？
- en: The ensemble wasn’t limited to just one part of the pipeline. I applied it within
    both the retrieval and reranking.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 集成不仅限于流程的某一部分。我在检索和重新排序中都应用了它。
- en: '**Retriever stage** → I merged the candidate lists produced by BM25, E5, and
    BGE. This way, the system didn’t rely on a single model’s “view” of what might
    be relevant but instead pooled their perspectives into a stronger starting set.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**检索阶段**→ 我合并了由BM25、E5和BGE产生的候选列表。这样，系统不依赖于单个模型对可能相关内容的“看法”，而是将它们的观点汇总成一个更强的起始集。'
- en: '**Reranker stage** → I then combined the rankings from multiple rerankers (again
    referring to MTEB and my GPU constraints). Since each reranker captures slightly
    different nuances of similarity, blending them helped refine the final ordering
    of fact-checks with greater accuracy.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**重新排序阶段**→ 我随后结合了多个重新排序器的排名（再次提到MTEB和我的GPU限制）。由于每个重新排序器捕捉到相似性的细微差别略有不同，混合它们有助于以更高的准确性细化核查事实的最终排序。'
- en: At the **retriever stage**, the ensemble enabled a wider pool of candidates,
    making sure that fewer relevant claims slipped through the cracks (*improving
    recall*).While the **reranker stage** narrowed down the focus, pushing the most
    relevant fact-checks to the top (*improving precision*).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在**检索阶段**，集成使候选池更广泛，确保更少的有关论断被遗漏（*提高召回率*）。而**重新排序阶段**则缩小了焦点，将最相关的核查事实推到顶部（*提高精确度*）。
- en: '![](../Images/585f9676d01eacbfb6a60428fb15874d.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/585f9676d01eacbfb6a60428fb15874d.png)'
- en: 'Figure 2: Retriever-reranker ensemble pipeline (created by author)'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：检索器-重新排序器集成流程（作者创作）
- en: Bringing It All Together (TL;DR)
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 整合所有内容（TL;DR）
- en: Long story short; the envisioned digital utopia for open information sharing
    does not work without verification, and can even create the contrary – a channel
    for misinformation.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，预期的开放信息共享的数字乌托邦如果没有验证，将无法实现，甚至可能产生相反的效果——成为错误信息的渠道。
- en: That was the driving force for the development of automated fact-checking pipelines,
    which helped us move closer to that original promise. They make it easier to verify
    information quickly and at scale, so when false claims pop up in new forms, they
    can be spotted and addressed without delay, helping maintain accuracy and trust
    in the digital world.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 那是推动自动化事实核查管道发展的动力，这使我们更接近最初的承诺。它们使得快速且大规模地验证信息变得更加容易，因此当新的虚假声明以新的形式出现时，它们可以立即被发现并得到处理，有助于保持数字世界的准确性和信任。
- en: 'The takeaway is simple: **diversity is key**. Just as misinformation spreads
    by taking on many forms, a resilient fact-checking system benefits from multiple
    perspectives working together. Using an ensemble, the pipeline becomes more robust,
    more adaptable, and ultimately enabling a trustworthy digital space.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 吸取的教训很简单：**多样性是关键**。正如错误信息通过多种形式传播一样，一个有弹性的事实核查系统得益于多个视角的协作。使用集成方法，管道变得更加稳健，更加适应性强，最终能够实现一个值得信赖的数字空间。
- en: For the curious minds
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对于好奇的心灵
- en: If you’re interested in a deeper technical dive into the retrieval and ensemble
    strategies behind this pipeline, you can check out my full paper [here](https://aclanthology.org/2025.semeval-1.153/).
    It goes into the model choices, experiments, and detailed evaluation metrics within
    the system.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对深入了解此管道背后的检索和集成策略感兴趣，可以查看我的完整论文[这里](https://aclanthology.org/2025.semeval-1.153/)。它涉及模型选择、实验和系统内的详细评估指标。
