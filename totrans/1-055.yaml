- en: As you can see, the [YearOfWeek] column is tied to the week, not the calendar
    year. I did this to ensure the correct assignment of the week to the Year. Without
    this, the Calendar Validation would have failed, as the [WeekKey] column for the
    first calendar week of each year would have been assigned to two different years.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: This shows how important it is to build a consistent calendar table.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
