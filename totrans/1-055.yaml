- en: 'Case 3: Weekly Calculation with Fiscal Years'
  id: totrans-149
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This one is more complex.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: In this case, the Fiscal Year starts on the first day of August.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: This means that the first week of the Fiscal year is the week with the Fiscal
    year’s first day.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: 'I set up all the columns in the Date table; this is an extract of the needed
    columns:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: '| **FiscalYear ForWeek** | **FiscalYear WeekSort** | **FiscalWeekSort** | **Fiscal
    Week/Year** | **Fiscal Week** | Date | **FiscalDay OfWeek** | **Day of Week Name**
    |'
  id: totrans-154
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- | --- | --- | --- |'
  id: totrans-155
  prefs: []
