- en: How to Implement Three Use Cases for the New Calendar-Based Time Intelligence
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何实现基于新日历的时间智能的三个用例
- en: 原文：[https://towardsdatascience.com/use-cases-for-the-new-calendar-based-time-intelligence/](https://towardsdatascience.com/use-cases-for-the-new-calendar-based-time-intelligence/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/use-cases-for-the-new-calendar-based-time-intelligence/](https://towardsdatascience.com/use-cases-for-the-new-calendar-based-time-intelligence/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: <mdspan datatext="el1764052834477" class="mdspan-comment">I’ve written a lot</mdspan>
    about Time Intelligence in DAX in the past.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764052834477" class="mdspan-comment">我过去已经写了很多关于DAX中时间智能的文章。</mdspan>
- en: However, the new Calendar-based Time Intelligence feature rewrites the rulebook,
    as some concepts will change, and the required techniques will be simpler than
    before.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，基于日历的时间智能功能重新编写了规则，因为一些概念将发生变化，所需的技术将比之前更简单。
- en: Anyway, the time intelligence functions remain the same, even though we must
    use them slightly differently. But almost everything will be easier than before.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 无论如何，时间智能函数保持不变，尽管我们必须以稍微不同的方式使用它们。但几乎所有事情都将比以前更容易。
- en: In this piece, I will discuss three use cases for which I would have needed
    to write complex DAX code.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将讨论三个用例，对于这些用例，我需要编写复杂的DAX代码。
- en: Now, let’s discuss the use cases.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们来讨论一下用例。
- en: Use-Cases
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用例
- en: Financial calendar
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 财政日历
- en: When working with financial data, it may be necessary to account for more than
    12 months to manage extra bookings. Some companies used such extra months to ensure
    consistency with the regular bookings.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理财务数据时，可能需要考虑超过12个月来管理额外的预订。一些公司使用这样的额外月份来确保与常规预订的一致性。
- en: Until now, this has only been possible with custom DAX code.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，这只能通过自定义DAX代码来实现。
- en: Now we can create a custom calendar and use the standard time intelligence functions
    with it.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以创建一个自定义日历，并使用标准的时间智能函数与它一起使用。
- en: 'This use case has the following requirements:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 此用例有以下要求：
- en: We must cover 15 months per year.
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们必须覆盖每年15个月。
- en: 'We need two views: One for the booking months and one where the additional
    months are mapped to December.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们需要两个视图：一个用于预订月份，另一个将额外的月份映射到12月。
- en: We are looking at PY data; we must see all days, including leap years (29^(th)
    of February).
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们正在查看PY数据；我们必须看到所有日子，包括闰年（2月29日）。
- en: Weekly calculations
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 周计算
- en: I already wrote about weekly calculations. It involved custom DAX code, as there
    was no WDT function, and it wasn’t possible to calculate the previous year based
    on weeks.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经写了很多关于DAX中时间智能的文章。它涉及到自定义DAX代码，因为没有WDT函数，并且无法基于周计算上一年。
- en: Again, this can now be done easily with a calendar that contains week information,
    along with the new [TOTALWTD()](https://dax.guide/totalwtd/) and [DATESWTD()](https://dax.guide/dateswtd/)
    functions.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，现在可以通过包含周信息的日历以及新的[TOTALWTD()](https://dax.guide/totalwtd/)和[DATESWTD()](https://dax.guide/dateswtd/)函数轻松完成此操作。
- en: Weekly Calculation with Fiscal Years
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带有财政年度的周计算
- en: Weekly Calculations are even more complicated when we must account for fiscal
    years that do not match calendar years.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们必须考虑与日历年不匹配的财政年时，周计算变得更加复杂。
- en: Even such a scenario can now be solved with standard time intelligence functions
    when the calendar table contains the correct information.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在这样的场景中，当日历表包含正确信息时，现在也可以使用标准的时间智能函数来解决。
- en: Prerequisites
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前置条件
- en: 'The first prerequisite is to enable the Preview feature:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个前置条件是启用预览功能：
- en: '![](../Images/1146ee05babaf2be7a28aa5f9b9ff350.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1146ee05babaf2be7a28aa5f9b9ff350.png)'
- en: Figure 1 – Enabling the Preview feature in Power BI Desktop (Figure by the Author)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图1 – 在Power BI桌面中启用预览功能（图由作者提供）
- en: Another prerequisite is to create a date table that covers the required periods.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个前置条件是创建一个覆盖所需期间的日期表。
- en: As before, a well-crafted date table is key for working with Time Intelligence,
    and now even more so with the new feature.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，一个精心设计的日期表对于使用时间智能至关重要，而现在随着新功能的推出，这一点更加重要。
- en: 'When working with the new Time Intelligence possibilities, we need three steps:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用新的时间智能可能性时，我们需要三个步骤：
- en: We build a date table and define which columns we need to cover each use case.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们构建一个日期表，并定义我们需要覆盖每个用例的列。
- en: Then we define a calendar for this table by assigning the columns to the periods,
    like year, quarter, months, weeks, and dates.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，我们通过将列分配给期间（如年、季度、月份、周和日期）来为该表定义一个日历。
- en: Create DAX measures using the calendar defined in step 2.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用步骤2中定义的日历创建DAX度量。
- en: The first two steps are equally important, as the table must be carefully crafted
    to cover the required periods.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: The calendar definition allows us to use the columns in the date table to assign
    them to predefined categories. Shortly, you will see what this means.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: I will describe the content of the date table with sample data for each use
    case.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: 'Case 1: Financial Calendar'
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'First of all, I create a table containing the following information:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Years
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Semesters (1 & 2 plus a third for the additional months)
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Quarters (1 – 4 and a fifth Quarter for the additional months)
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Month 1 – 15
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Month Names for all 15 months (Jan – Dec, and Additional Month 1 – 3)
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 31 Days for each month, even for the months that normally have fewer than 31
    days
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Quarter and the Months where the Additional months are mapped to December
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This is how it looks with two examples per column:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '| Column Name | Example |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
- en: '| ID_Date | 20060101 20061301 |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
- en: '| Date_Real | 2006.01.01 N/A |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
- en: '| Year | 2006 |'
  id: totrans-50
  prefs: []
  type: TYPE_TB
- en: '| ID_Month | 200601 200613 |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
- en: '| Month | 1 13 |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
- en: '| Day | 1 |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
- en: '| Date_German | 01.01.2006 01.13.2006 |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
- en: '| Date_EN | 01/01/2006 01/13/2006 |'
  id: totrans-55
  prefs: []
  type: TYPE_TB
- en: '| MonthName | January Additional Month 1 |'
  id: totrans-56
  prefs: []
  type: TYPE_TB
- en: '| MonthNameShort | Jan Add Month 1 |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
- en: '| YearMonthName | January 2006 Additional Month 1 2006 |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
- en: '| YearMonthNameShort | Jan 2006 Add Month 1 2006 |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
- en: '| Semester | 1 3 |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
- en: '| SemesterName | Semester 1 Semester 3 |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
- en: '| YearSemester | 20061 20063 |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
- en: '| YearSemesterName | Semester 1 2006 Semester 3 2006 |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
- en: '| Quarter | 1 5 |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
- en: '| QuarterName | Quarter 1 Quarter 5 |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
- en: '| YearQuarter | 20061 20065 |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
- en: '| YearQuarterName | Quarter 1 2006 Quarter 5 2006 |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
- en: '| CalendarMonth | 1 12 |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
- en: '| CalendarMonthName | January December |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
- en: '| CalendarMonthNameShort | Jan Dec |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
- en: '| CalendarYearMonth | 200601 200612 |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
- en: '| CalendarYearMonthName | January 2006 December 2006 |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
- en: '| CalendarYearMonthNameShort | Jan 2006 Dec2006 |'
  id: totrans-73
  prefs: []
  type: TYPE_TB
- en: The two examples are one for January and one for the first additional month.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, a different view of the data for the additional columns and rows:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/16a5911832ae6134c54b42d24f6f1c92.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
- en: Figure 2 – Examples for the columns for the additional months (Figure by the
    Author)
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: In my case, I’ve built this table in SQL, but it can be done in any other programming
    language, including Power Query.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: You only need multiple lists of numbers and combine them.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: You can find an example of how to combine tables with lists of numbers [in this
    article](https://medium.com/the-techlife/use-power-bi-to-transpose-yearly-numbers-to-months-d538bcb7b9c2).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: But the key point is that I am free to define the Calendar’s content. Even the
    Date column doesn’t need to contain real dates, as, in my case, there are only
    strings in it.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: 'After importing the new calendar into Power BI, we can open the new “Calendar
    options” dialog after clicking on the table:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3270801a198b13b2cbcf134c187dae3f.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
- en: Figure 3 – Open the new Calendar options dialog in Power BI Desktop (Figure
    by the Author)
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: Now, I will create two new calendars.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: Please note that I cannot set the new table as a date table, as it contains
    non-existent “dates”, such as 30\. February.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，我不能将新表格设置为日期表，因为它包含不存在的“日期”，例如2月30日。
- en: 'I click on “Add Category” to add, for example, the Year, Month, and Month of
    Year, and assign the columns with the data to them:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我点击“添加类别”来添加，例如，年份、月份和年月份，并将具有数据的列分配给它们：
- en: '![](../Images/081074ba9113c93d10c8d7fd8baef76d.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/081074ba9113c93d10c8d7fd8baef76d.png)'
- en: Figure 4 – The definition of the Financial calendar with the new Calendar options
    (Figure by the Author)
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图4 – 新日历选项下财务日历的定义（图由作者提供）
- en: When setting up the calendar, remember to click on the “Validate data” button
    after adding each category. This helps you in finding errors in the data, if they
    exist.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置日历时，请记住在添加每个类别后点击“验证数据”按钮。这有助于您在数据中找到错误，如果有的话。
- en: This button checks whether each value has a many-to-one relationship to each
    value in the category above.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 此按钮检查每个值是否与类别上方每个值具有多对一的关系。
- en: For example, each month must belong to one year. The category “Month” must contain
    the month and the year, while the “Month of the Year” must contain only the month.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，每个月必须属于一个年份。类别“月份”必须包含月份和年份，而“年月份”必须只包含月份。
- en: As the primary column, I selected the ID columns, and for the Associated columns,
    I selected the naming columns with different formats and languages.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 作为主列，我选择了ID列，而对于关联列，我选择了具有不同格式和语言的命名列。
- en: Please check the links in the References section below for detailed information
    about how this feature works.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 请查看下文参考文献部分中的链接，以获取有关此功能如何工作的详细信息。
- en: 'To have a calendar, where the additional months are assigned to December, I
    set up the following Calendar:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 要有一个将额外月份分配给12月的日历，我设置了以下日历：
- en: '![](../Images/bdc6d7a61d1cba54d3f19485b4a0c23d.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bdc6d7a61d1cba54d3f19485b4a0c23d.png)'
- en: Figure 5 – Configuration of the Financial (Real) Calendar (Figure by the Author)
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图5 – 财务（实际）日历的配置（图由作者提供）
- en: I didn’t set up columns for the Quarter in the “Real” calendar because I don’t
    need them in my scenario.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我在“实际”日历中没有设置季度列，因为我不需要在我的场景中使用它们。
- en: 'To calculate the PY for Online Sales, I can use the [SAMEPERIODLASTYEAR()](https://dax.guide/sameperiodlastyear/)
    function. But instead of using a Date column, I pass the name of the Financial
    calendar:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 要计算在线销售的PY值，我可以使用[SAMEPERIODLASTYEAR()](https://dax.guide/sameperiodlastyear/)函数。但不是使用日期列，我传递了财务日历的名称：
- en: '[PRE0]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'When looking at the results for the leap year, I get this:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 当查看闰年的结果时，我得到以下结果：
- en: '![](../Images/f17645bdd5b48684c37c884b79d6d6d5.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f17645bdd5b48684c37c884b79d6d6d5.png)'
- en: Figure 6 – The PY value for the year after a leap year (Figure by the Author)
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图6 – 闰年之后的PY值（图由作者提供）
- en: 'And when looking at the results for the additional months, I get this:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 当查看额外月份的结果时，我得到以下结果：
- en: '![](../Images/4d6896b66cd62cb268e08dfe85ee5fb2.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4d6896b66cd62cb268e08dfe85ee5fb2.png)'
- en: Figure 7 – Results for the additional months. On the left, you see the additional
    months. On the right, you see the sum of December plus the additional months added
    together and assigned to December (Figure by the Author)
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图7 – 额外月份的结果。在左侧，您可以看到额外月份。在右侧，您可以看到12月加上额外月份的总和，并分配给12月（图由作者提供）
- en: As you can see, the PY is calculated correctly for the additional months.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，额外月份的PY值计算正确。
- en: In addition, in the right table, you can see the values from December and the
    additional months (from the left table) added together into December by using
    the “Real” calendar.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在右侧的表中，您可以看到来自12月和额外月份（来自左侧的表）的值相加，并使用“实际”日历分配给12月。
- en: To have such a solution with a simple measure is groundbreaking.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 要用简单的度量值实现这样的解决方案是开创性的。
- en: Now, let’s look at weekly calculations.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看每周的计算。
- en: 'Case 2: Weekly Calculation'
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 情况2：每周计算
- en: This time, I want to calculate the PY per week.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，我想计算每周的PY值。
- en: As I already showed how to define custom calendars, I will only show you the
    content of the involved columns and how they are assigned to the calendar.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我已经展示了如何定义自定义日历，我将只向您展示涉及列的内容以及它们如何分配到日历中。
- en: 'This time, I used existing columns from my date table:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，我使用了日期表中的现有列：
