  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11 – 财政周日历的配置（图由作者提供）
- en: 'The measure to calculate the Sales for the previous year is, again, straightforward:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 计算去年销售额的措施，再次，是直接的：
- en: '[PRE5]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'These are the results:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是结果：
- en: '![](../Images/6f02c3f343dcc467d5846eebc361c87f.png)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6f02c3f343dcc467d5846eebc361c87f.png)'
- en: Figure 12 – Results for the PY of the Fiscal Week Calendar (Figure by the Author)
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12 – 财政周日历的PY结果（图由作者提供）
- en: You can see that the result aligns perfectly with the week and weekday of the
    previous year, even though the dates are shifted.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以看到，结果与去年的周和星期日完美对齐，尽管日期有所变动。
- en: This is exactly what I expected.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是我所期望的。
- en: Conclusion
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This new feature changes everything regarding Time Intelligence with DAX.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 这个新功能改变了与 DAX 相关的时间智能的方方面面。
- en: But, although we can simplify our DAX measures, we must take extra care when
    crafting our date tables. It’s all about having the correct content.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，尽管我们可以简化我们的 DAX 度量，但在构建我们的日期表时必须格外小心。关键在于拥有正确的内容。
- en: It’s interesting that Microsoft already recommends using this feature, even
    though it’s only been available for a few months since its introduction as a Preview
    feature.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 很有趣的是，尽管这个功能作为预览功能推出才几个月，但微软已经推荐使用这个功能。
- en: My recommendation is to look into it. Read the articles linked below. Test it
    with your specific scenarios and decide whether it’s worth switching existing
    solutions to this feature.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 我的建议是调查一下。阅读以下链接的文章。用您特定的场景测试它，并决定是否值得将现有解决方案切换到这个功能。
- en: I absolutely will use this feature when starting new solutions.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始新的解决方案时，我绝对会使用这个功能。
- en: The only drawback is that it can increase the number of date tables in the data
    model. Until now, I have used a single central date table for everything. Now,
    I may need to create separate date tables for specific scenarios. But this can
    introduce complexity when combining different aspects of the data model. This
    would introduce additional challenges in interpreting the data.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的缺点是它可能会增加数据模型中日期表的数量。到目前为止，我一直在使用一个中央日期表来处理所有事情。现在，我可能需要为特定场景创建单独的日期表。但这可能会在结合数据模型的不同方面时引入复杂性。这会在解释数据时引入额外的挑战。
- en: 'Think of it for one moment:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 想想看：
- en: Is it really a good idea to have two different calendars on one page? Are the
    results still comparable? Can this confuse your consumers?
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在一页上放置两个不同的日历，这真的是一个好主意吗？结果是否仍然可以比较？这会不会让您的消费者感到困惑？
- en: I will absolutely avoid such scenarios. Comparing results by month and by week
    on the same pages, or even in the same report, makes little sense to me.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 我绝对会避免这样的场景。在相同页面或同一份报告中，按月和按周比较结果对我来说几乎没有意义。
- en: Stay tuned for more content on this topic. Will write more about it over time
    when I encounter interesting scenarios.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 请继续关注这个主题的更多内容。随着时间的推移，当我遇到有趣的场景时，我会继续撰写更多关于它的内容。
- en: References
  id: totrans-196
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考资料
- en: 'Here, the Microsoft documentation for calendar-based time intelligence: [Implement
    time-based calculations in Power BI – Power BI | Microsoft Learn](https://learn.microsoft.com/en-us/power-bi/transform-model/desktop-time-intelligence#calendar-based-time-intelligence-preview).'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是关于基于日历的时间智能的微软文档：[在 Power BI 中实现基于时间的计算 – Power BI | 微软学习](https://learn.microsoft.com/en-us/power-bi/transform-model/desktop-time-intelligence#calendar-based-time-intelligence-preview).
- en: 'This SQL BI article explains this new feature in great detail: [Introducing
    Calendar-based Time intelligence in DAX – SQLBI](https://www.sqlbi.com/articles/introducing-calendar-based-time-intelligence-in-dax/).'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇 SQL BI 文章详细解释了这一新特性：[介绍基于日历的时间智能在 DAX 中的实现 – SQLBI](https://www.sqlbi.com/articles/introducing-calendar-based-time-intelligence-in-dax/).
- en: Like in my previous articles, I use the Contoso sample dataset. You can download
    the ContosoRetailDW Dataset for free from Microsoft [here](https://www.microsoft.com/en-us/download/details.aspx?id=18279).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 就像在我之前的文章中一样，我使用了 Contoso 示例数据集。您可以从微软[这里](https://www.microsoft.com/en-us/download/details.aspx?id=18279)免费下载
    ContosoRetailDW 数据集。
- en: The Contoso Data can be used freely under the MIT License, as described [in
    this document](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo).
    I changed the dataset to shift the data to contemporary dates.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这份文档[中的描述](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo)，Contoso
    数据可以在 MIT 许可证下自由使用。我将数据集更改以将数据移至当代日期。
