- en: Again, I must have an additional column for the Fiscal Year assigned to the
    weeks.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我必须为分配给周次的财政年度添加一个额外的列。
- en: But this time, I must create a separate table with the needed columns. For some
    reason, using these columns from the Date table doesn’t work. Any attempt to use
    these columns resulted in a weird effect.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 但这次，我必须创建一个包含所需列的单独表格。由于某种原因，使用日期表中的这些列不起作用。任何尝试使用这些列的行为都导致了奇怪的效果。
- en: You can read more about this [here](https://community.fabric.microsoft.com/t5/Desktop/Strange-behavior-with-custom-weekly-calendar/m-p/4858663).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在此处了解更多信息[这里](https://community.fabric.microsoft.com/t5/Desktop/Strange-behavior-with-custom-weekly-calendar/m-p/4858663)。
- en: 'In the end, I added a calculated table with the needed columns:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我添加了一个包含所需列的计算表：
- en: '[PRE4]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The calendar created on this table looks like this:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 在此表格上创建的日历看起来是这样的：
- en: '![](../Images/3974d63535114080478eb31fe308d008.png)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3974d63535114080478eb31fe308d008.png)'
