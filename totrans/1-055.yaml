  id: totrans-162
  prefs: []
  type: TYPE_TB
  zh: '| 25/26 | 252601 | 1 | 1 – 25/26 | 1 | 03/08/2025 | 7 | 星期日 |'
- en: '| 25/26 | 252652 | 52 | 52 – 25/26 | 52 | 20/07/2026 | 1 | Monday |'
  id: totrans-163
  prefs: []
  type: TYPE_TB
  zh: '| 25/26 | 252652 | 52 | 52 – 25/26 | 52 | 20/07/2026 | 1 | 星期一 |'
- en: '| 25/26 | 252652 | 52 | 52 – 25/26 | 52 | 21/07/2026 | 2 | Tuesday |'
  id: totrans-164
  prefs: []
  type: TYPE_TB
  zh: '| 25/26 | 252652 | 52 | 52 – 25/26 | 52 | 21/07/2026 | 2 | 星期二 |'
- en: '| 25/26 | 252652 | 52 | 52 – 25/26 | 52 | 22/07/2026 | 3 | Wednesday |'
  id: totrans-165
  prefs: []
  type: TYPE_TB
  zh: '| 25/26 | 252652 | 52 | 52 – 25/26 | 52 | 22/07/2026 | 3 | 星期三 |'
