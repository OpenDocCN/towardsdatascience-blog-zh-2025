- en: Data Analyst or Data Engineer or Analytics Engineer or BI Engineer ?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据分析师或数据工程师或分析工程师或BI工程师？
- en: 原文：[https://towardsdatascience.com/data-analyst-or-data-engineer-or-analytics-engineer-or-bi-engineer/](https://towardsdatascience.com/data-analyst-or-data-engineer-or-analytics-engineer-or-bi-engineer/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/data-analyst-or-data-engineer-or-analytics-engineer-or-bi-engineer/](https://towardsdatascience.com/data-analyst-or-data-engineer-or-analytics-engineer-or-bi-engineer/)'
- en: If <mdspan datatext="el1745456944555" class="mdspan-comment">you’ve followed</mdspan>
    me for a while, you probably know I started my career as a **QA engineer** before
    transitioning into the world of **data analytics**. I didn’t go to school for
    it, didn’t have a mentor, and didn’t land in a formal training program. Everything
    I know today—from SQL to modeling to storytelling with data—is self-taught. And
    believe me, it’s been a journey of trial, error, learning, and re-learning.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果<mdspan datatext="el1745456944555" class="mdspan-comment">你一直跟随</mdspan>我，你可能知道我最初是一名**质量保证工程师**，后来转型进入数据分析领域。我没有为此上学，没有导师，也没有进入正式的培训计划。我今天所知道的一切——从SQL到建模到用数据讲故事——都是自学得来的。相信我，这是一段充满尝试、错误、学习和重新学习的旅程。
- en: The Dilemma That Changed My Career
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 改变我职业生涯的困境
- en: 'A few years ago, I started thinking about switching organizations. Like many
    people in fast-evolving tech roles, I faced a surprisingly difficult question:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 几年前，我开始考虑更换组织。像许多在快速发展的技术角色中的人一样，我面临着一个出人意料困难的问题：
- en: What role am I actually doing? Which roles should I apply for?
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我实际上在做什么角色？我应该申请哪些角色？
- en: 'On paper, I was a **Data Analyst**. But in reality, my role straddled several
    functions: writing SQL pipelines, building dashboards, defining KPIs, and digging
    into product analytics. I wasn’t sure whether I should be applying for Analyst
    roles, BI roles, or something entirely different.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在纸面上，我是一个**数据分析师**。但在现实中，我的角色跨越了几个职能：编写SQL管道、构建仪表板、定义KPI和深入产品分析。我不确定我应该申请分析师角色、BI角色，还是完全不同的角色。
- en: 'To make things worse, back then, job titles were vague, and job descriptions
    were bloated with buzzwords. You’d find a posting titled *“Data Analyst”* that
    listed requirements like:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 更糟糕的是，当时，职位名称含糊不清，职位描述充满了行业术语。你会找到一个标题为*“数据分析师”*的职位，列出了如下要求：
- en: Build ML pipelines
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建机器学习管道
- en: Write complex ETL scripts
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写复杂的ETL脚本
- en: Maintain data lakes
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 维护数据湖
- en: Create dashboards
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建仪表板
- en: Present executive-level insights
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 展示高管级洞察
- en: And oh, by the way, be great at stakeholder management
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 顺便说一下，要擅长利益相关者管理
- en: It was overwhelming and confusing. And I know I’m not alone in this.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这令人难以置信且令人困惑。我知道我不是唯一一个这样想的人。
- en: 'Fast forward to today: thankfully, things are evolving. There’s still overlap
    between roles, but organizations have started to define them more clearly. In
    this article, I want to break down the **real differences between data roles**,
    through the lens of a real-world example.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 快进到今天：幸运的是，事情正在演变。角色之间仍然存在重叠，但组织已经开始更清晰地定义它们。在这篇文章中，我想通过一个现实世界的例子来分析**数据角色之间的真正差异**。
- en: 'A Real-World Scenario: Meet *Quikee*'
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现实世界场景：认识*Quikee*
- en: Let’s imagine a fictional quick-commerce startup called **Quikee**, launching
    across multiple Indian cities. Their value proposition? Deliver groceries and
    essentials within **10 minutes**.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一家名为**Quikee**的虚构快速商业初创公司，它在多个印度城市推出。他们的价值主张？在**10分钟**内配送杂货和必需品。
- en: Customers place orders through the app or website. Behind the scenes, there
    are micro-warehouses (also called “dark stores”) across cities, and a fleet of
    delivery partners who make those lightning-fast deliveries.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 客户通过应用程序或网站下单。幕后，城市中遍布着微型仓库（也称为“暗仓”），以及一支快速配送的合作伙伴车队。
- en: Now, let’s walk through the data needs of this company—from the moment an order
    is placed, to the dashboards executives use in their Monday morning meetings.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们来看看这家公司的数据需求——从下单的那一刻开始，到高管在周一早晨会议上使用的仪表板。
- en: 'Step 1: Capturing and Storing Raw Data'
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：捕获和存储原始数据
- en: 'The moment a customer places an order, **transactional data** is generated:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当客户下单的那一刻，就会生成**交易数据**：
- en: Timestamps
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间戳
- en: Order ID
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 订单编号
- en: Items ordered
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 订单商品
- en: Price
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 价格
- en: Discount codes
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 折扣代码
- en: Customer location
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户位置
- en: Payment method
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支付方式
- en: Assigned delivery partner
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指派的配送合作伙伴
- en: Let’s assume Quikee uses **Amazon Kinesis** to stream this data in real time
    to an **S3 data lake**. That stream is high-volume, time-sensitive, and crucial
    for business tracking.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 假设Quikee使用**Amazon Kinesis**将数据实时流式传输到**S3数据湖**。这个流是高容量、时间敏感的，对业务跟踪至关重要。
- en: 'But here’s the catch: raw data is messy. You can’t use it directly for decision-making.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 但这里有个问题：原始数据很杂乱。你不能直接用它来做决策。
- en: So what happens next?
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，接下来会发生什么？
- en: 'Step 2: Building Data Pipelines'
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：构建数据管道
- en: Enter the **Data Engineers**.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 出现了**数据工程师**。
- en: 'They are responsible for:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 他们负责：
- en: Ingesting real-time data
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摄入实时数据
- en: Validating schema consistency
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证模式一致性
- en: Handling failures and retries
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理失败和重试
- en: Writing pipelines to move data from S3 into a data warehouse (say, Snowflake
    or Redshift)
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写将数据从S3移动到数据仓库（例如，Snowflake或Redshift）的管道
- en: This is where **ETL** (Extract, Transform, Load) or **ELT** pipelines come into
    play. Data engineers clean, format, and structure the data to make it queryable.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是**ETL**（提取、转换、加载）或**ELT**管道发挥作用的地方。数据工程师清理、格式化和结构化数据，使其可查询。
- en: 'For example, an order table might get split into:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个订单表可能被拆分为：
- en: '**Orders** → One row per order'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**订单** → 每个订单一行'
- en: '**Order_Items** → One row per item in an order'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**订单项** → 每个订单中的每一项一行'
- en: '**Payments** → One row per payment attempt'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支付** → 每次支付尝试一行'
- en: At this stage, raw logs are turned into structured tables that analysts can
    work with.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，原始日志被转换为分析师可以工作的结构化表格。
- en: 'Step 3: Dimensional Modeling & OLAP'
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：维度建模与OLAP
- en: 'As leadership starts asking strategic questions like:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 当领导开始提出战略性问题，如：
- en: “Which city brings in the most revenue?”
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “哪个城市带来的收入最多？”
- en: “Which store is underperforming?”
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “哪个店铺表现不佳？”
- en: “What’s our average delivery time by zone?”
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我们按区域平均配送时间是多少？”
- en: …it becomes clear that querying transactional data directly won’t scale.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: …变得明显，直接查询事务数据是无法扩展的。
- en: That’s where **dimensional modeling** comes in.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是**维度建模**的用武之地。
- en: Instead of flat, raw tables, data is structured into Fact and Dimension Tables.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是扁平的原始表，数据被结构化为事实表和维度表。
- en: 🔸 **Fact Tables**
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔸 **事实表**
- en: Large, quantitative data tables which contain foreign keys along with measures
    and metrics (*Well, most of the time. There are factless fact tables as well which
    do not have any measures*).
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大型、量化的数据表，其中包含外键以及度量标准和指标（*好吧，大多数时候是这样的。还有一些无事实的事实表，它们没有任何度量标准*）。
- en: 'Examples: `fact_orders`, `fact_payments`, `fact_deliveries`'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：`fact_orders`、`fact_payments`、`fact_deliveries`
- en: Contain metrics like revenue, order count, delivery time
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含如收入、订单数量、配送时间等指标
- en: 🔹 **Dimension Tables**
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔹 **维度表**
- en: Smaller, descriptive tables that help understand the data in a fact table
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 较小、描述性的表格，有助于理解事实表中的数据
- en: 'Examples: `dim_store`, `dim_product`, `dim_customer`, `dim_delivery_agent`'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：`dim_store`、`dim_product`、`dim_customer`、`dim_delivery_agent`
- en: Help filter, group, and join facts for deeper insights
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助过滤、分组和连接事实，以获得更深入的见解
- en: 'This structure enables **OLAP**—fast, analytical querying across multiple dimensions.
    For example, you can now run queries like:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构使得**OLAP**（在线分析处理）成为可能——在多个维度上进行快速分析查询。例如，你现在可以运行如下查询：
- en: “Show me average delivery time by store and hour of day, over the last 7 days.”
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “给我展示过去7天内按店铺和每天的小时数平均配送时间。”
- en: This step is done by Data Engineers at most of the organisations but I did build
    few Dim and Fact tables when I was working as a Business Intelligence Engineer
    at Amazon.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数组织中，这一步是由数据工程师完成的，但我在亚马逊担任商业智能工程师时确实构建了一些维度和事实表。
- en: 'Step 4: Defining KPIs and Metrics'
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第4步：定义关键绩效指标和度量标准
- en: This is where **Analytics Engineers (or BI Engineers)** shine.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是**分析工程师（或BI工程师）**大显身手的地方。
- en: 'They sit between the technical data layer and business users. Their responsibilities
    often include:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 他们位于技术数据层和业务用户之间。他们的职责通常包括：
- en: Defining KPIs (e.g., churn rate, repeat purchase %, time-to-fulfillment)
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义关键绩效指标（例如，流失率、重复购买百分比、履行时间）
- en: Writing logic for complex metrics (e.g., cohort retention, active users)
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写复杂度量的逻辑（例如， cohort 保留率、活跃用户数）
- en: Creating **semantic models** or **metrics layers** in tools like dbt or Looker
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在dbt或Looker等工具中创建**语义模型**或**度量层**
- en: Ensuring consistent definitions across the company
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保公司内部定义的一致性
- en: For example, at Amazon, our team didn’t query raw data to calculate revenue
    every time. Instead, we created **pre-aggregated fact tables** at daily, weekly,
    and monthly grains. That way, dashboards loaded faster, and metrics stayed consistent
    across teams.
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 例如，在亚马逊，我们的团队并不是每次都查询原始数据来计算收入。相反，我们在每日、每周和每月粒度上创建了**预聚合的事实表**。这样，仪表板加载更快，指标在团队间保持一致。
- en: Analytics Engineers act as translators between engineering and the business—defining
    **what** we measure and **how** we measure it.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 分析工程师在工程和业务之间充当翻译者——定义**我们测量什么**以及**如何测量**。
- en: 'Step 5: Analysis, Reporting & Storytelling'
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第5步：分析、报告与讲故事
- en: Now comes the role of the **Data Analyst**.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是**数据分析员**的角色。
- en: 'Armed with clean, modeled data, they focus on answering real business questions
    like:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有干净、建模好的数据，他们专注于回答真正的业务问题，例如：
- en: “Why did retention drop in Bangalore last month?”
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为什么上个月班加罗尔的留存率下降了？”
- en: “Which coupon codes drive the most new users?”
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “哪些优惠券代码推动了最多新用户的增长？”
- en: “What are the top products reordered in the first 30 days?”
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “前30天内哪些产品被重新订购最多？”
- en: They build dashboards in tools like Tableau, Power BI, or Looker. They run ad-hoc
    SQL queries. They dive into A/B test results, user behavior trends, and campaign
    effectiveness.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 他们使用Tableau、Power BI或Looker等工具构建仪表板。他们运行即席SQL查询。他们深入研究A/B测试结果、用户行为趋势和活动有效性。
- en: But above all, they **tell stories** with data—making complex numbers understandable
    and actionable for stakeholders.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 但最重要的是，他们用数据**讲述故事**——使复杂的数据对利益相关者变得可理解并可操作。
- en: Who’s Who?
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 谁是谁？
- en: '![](../Images/91329ea84b1de0151cec67758634eea1.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/91329ea84b1de0151cec67758634eea1.png)'
- en: Generated by Author
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者生成
- en: 'TL;DR: Where Do You Fit?'
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TL;DR：你在哪里？
- en: 'Here’s how I think about it:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为它是这样的：
- en: Love building robust pipelines and solving scalability problems? → You’re a
    **Data Engineer**
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 喜欢构建健壮的管道和解决可扩展性问题？→ 你是一名**数据工程师**
- en: Love defining business metrics and organizing complex datasets? → You’re an
    **Analytics Engineer**
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 喜欢定义业务指标和组织复杂的数据集？→ 你是一名**分析工程师**
- en: Love uncovering insights and storytelling with data? → You’re a **Data Analyst**
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 喜欢用数据挖掘洞察力和讲故事？→ 你是一名**数据分析员**
- en: Of course, real-world roles often blend these. Especially at smaller companies,
    you may wear multiple hats. And that’s okay.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，现实世界的角色往往融合了这些。特别是在较小的公司，你可能需要戴多顶帽子。这是可以的。
- en: The key is not the title—but **where you add the most value** and **what energizes
    you**.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 关键不在于头衔——而在于**你为哪里增加了最大价值**以及**什么让你充满活力**。
- en: Final Thoughts
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: It took me a long time to understand what I actually do—not just what my job
    title says. And if you’ve ever felt that confusion, you’re not alone.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我花了很长时间才真正理解我所做的事情——不仅仅是我的工作头衔所描述的。如果你曾经有过这种困惑，你并不孤单。
- en: Today, I can clearly say I operate at the intersection of **data modeling**,
    **business logic**, and **storytelling**—a sweet spot between analytics and engineering.
    And I’ve learned that the ability to connect the dots is more important than fitting
    into a perfect box.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我可以清楚地说我处于**数据建模**、**业务逻辑**和**讲故事**的交汇点——这是分析和工程之间的一个甜蜜点。我了解到，连接点的能力比完美地适应一个盒子更重要。
- en: If you’ve walked a similar path—or wear multiple hats in your role—I’d love
    to hear your story.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你走过类似的路径——或者在你的角色中戴多顶帽子——我很乐意听你的故事。
- en: '**Drop a comment 👇 or share this with someone figuring it out too.**'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**留下评论 👇 或与正在寻找答案的人分享。**'
