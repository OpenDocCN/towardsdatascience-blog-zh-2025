- en: Why Most Cyber Risk Models Fail Before They Begin
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么大多数网络风险模型在开始之前就失败了
- en: 原文：[https://towardsdatascience.com/why-most-cyber-risk-models-fail-before-they-begin/](https://towardsdatascience.com/why-most-cyber-risk-models-fail-before-they-begin/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-most-cyber-risk-models-fail-before-they-begin/](https://towardsdatascience.com/why-most-cyber-risk-models-fail-before-they-begin/)
- en: <mdspan datatext="el1745179522576" class="mdspan-comment">Cybersecurity leaders
    are being asked impossible questions. “What’s the likelihood of a breach this
    year?”</mdspan> “How much would it cost?” And “how much should we spend to stop
    it?”
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745179522576" class="mdspan-comment">网络安全领导者正在被问一些不可能的问题。“今年发生数据泄露的可能性有多大？”</mdspan>
    “这会花费多少？”以及“我们应该花费多少来阻止它？”
- en: <mdspan datatext="el1745439023455" class="mdspan-comment">Yet most</mdspan>
    risk models used today are still built on guesswork, gut instinct, and colorful
    heatmaps, not data.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745439023455" class="mdspan-comment">然而，目前大多数风险模型仍然建立在猜测、直觉和色彩丰富的热图上，而不是数据上。
- en: In fact, [PwC’s 2025 Global Digital Trust Insights Survey](https://www.pwc.com/us/en/services/consulting/cybersecurity-risk-regulatory/library/global-digital-trust-insights.html)
    found that only 15% of organizations are using quantitative risk modeling to a
    significant extent.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，[普华永道2025年全球数字信任洞察调查](https://www.pwc.com/us/en/services/consulting/cybersecurity-risk-regulatory/library/global-digital-trust-insights.html)发现，只有15%的组织在相当大的程度上使用定量风险建模。
- en: This article explores why traditional cyber risk models fall short and how applying
    some light statistical tools such as probabilistic modeling offers a better way
    forward.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本文探讨了为什么传统的网络风险模型存在不足，以及应用一些轻量级统计工具，如概率建模，如何提供更好的前进方式。
- en: The Two Schools of Cyber Risk Modeling
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网络风险建模的两种学派
- en: 'Information security professionals primarily use two different approaches to
    modeling risk during the risk assessment process: qualitative and quantitative.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 信息安全专业人员主要在风险评估过程中使用两种不同的方法来建模风险：定性和定量。
- en: Qualitative Risk Modeling
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定性风险建模
- en: 'Imagine two teams assess the same risk. One assigns it a score of 4/5 for likelihood
    and 5/5 for impact. The other, 3/5 and 4/5\. Both plot it on a matrix. But neither
    can answer the CFO’s question: “How likely is this to actually happen, and how
    much would it cost us?*“*'
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 想象有两个团队评估相同的风险。一个团队将其可能性评分定为4/5，影响评分定为5/5。另一个团队将其可能性评分定为3/5，影响评分定为4/5。两个团队都在矩阵上绘制了它。但没有人能回答CFO的问题：“这种情况实际发生的可能性有多大，我们会损失多少？*“*
- en: A qualitative approach assigns subjective risk values and is primarily derived
    from the intuition of the assessor. A qualitative approach generally results in
    the classification of the likelihood and impact of the risk on an ordinal scale,
    such as 1-5\.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 定性方法分配主观风险值，主要来源于评估者的直觉。定性方法通常会导致对风险的可能性和影响的分类，例如在1-5的序数尺度上。
- en: The risks are then plotted in a risk matrix to understand where they fall on
    this ordinal scale.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将风险绘制在风险矩阵中，以了解它们在这个序数尺度上的位置。
- en: '![](../Images/f37fd2fad182e3a8a2ca304dcc8ff28c.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f37fd2fad182e3a8a2ca304dcc8ff28c.png)'
- en: 'Source: Securemetrics Risk Register'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Securemetrics风险登记册
- en: 'Often, the two ordinal scales are multiplied together to help prioritize the
    most important risks based on probability and impact. At a glance, this seems
    reasonable as the commonly used definition for risk in information security is:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，将两个序数尺度相乘可以帮助根据概率和影响优先考虑最重要的风险。乍一看，这似乎是合理的，因为信息安全中常用的风险定义是：
- en: \[\text{Risk} = \text{Likelihood } \times \text{Impact}\]
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: \[\text{风险} = \text{可能性} \times \text{影响}\]
- en: From a statistical standpoint, however, qualitative risk modeling has some pretty
    important pitfalls.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，从统计学的角度来看，定性风险建模存在一些相当重要的陷阱。
- en: The first is the use of ordinal scales. While assigning numbers to the ordinal
    scale gives the appearance of some mathematical backing to the modeling, this
    is a mere illusion.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 第一种方法是使用序数尺度。虽然将数字分配给序数尺度给模型带来了某种数学支持的假象，但这仅仅是一种错觉。
- en: Ordinal scales are simply labels — there is no defined distance between them.
    The distance between a risk with an impact of “2” and an impact of “3” is not
    quantifiable. Changing the labels on the ordinal scale to “A”, “B”, “C”, “D”,
    and “E” makes no difference.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 序数尺度仅仅是标签——它们之间没有定义的距离。具有“2”影响和“3”影响的之间的距离是不可量化的。将序数尺度上的标签改为“A”、“B”、“C”、“D”和“E”并没有什么区别。
- en: This in turn means our formula for risk is flawed when using qualitative modeling.
    A likelihood of “B” multiplied by an impact of “C” is impossible to compute.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这反过来意味着，当我们使用定性建模时，我们的风险公式是有缺陷的。将“B”的可能性乘以“C”的影响是无法计算的。
- en: The other key pitfall is modeling uncertainty. When we model cyber risks, we
    are modeling future events that are not certain. In fact, there is a range of
    outcomes that could occur.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个关键陷阱是建模不确定性。当我们建模网络风险时，我们正在建模未来可能发生的事件。事实上，可能发生一系列结果。
- en: Distilling cyber risks into single-point estimates (such as “20/25” or “High”)
    don’t express the important distinction between “most likely annual loss of $1
    Million” and “There is a 5% chance of a $10 Million or more loss”.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 将网络风险简化为单点估计（如“20/25”或“高”）并不能表达“最可能的年度损失为一百万美元”和“有5%的可能性损失超过一千万美元”之间的重要区别。
- en: Quantitative Risk Modeling
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定量风险建模
- en: Imagine a team assessing a risk. They estimate a range of outcomes, from $100K
    to $10M. Running a Monte Carlo simulation, they derive a 10% chance of exceeding
    $1M in annual losses and an expected loss of $480K. Now when the CFO asks, *“How
    likely is this to happen, and what would it cost?”*, the team can respond with
    data, not just intuition.
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 想象一个团队正在评估风险。他们估计了一系列可能的结果，从10万美元到1000万美元。通过运行蒙特卡洛模拟，他们得出每年损失超过100万美元的概率为10%，预期损失为48万美元。现在当首席财务官问，“这种情况发生的可能性有多大，成本会是多少？”时，团队可以用数据而不是直觉来回答。
- en: This approach shifts the conversation from vague risk labels to **probabilities
    and potential financial impact**, a language executives understand.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法将对话从模糊的风险标签转向**概率和潜在的财务影响**，这是高管们能够理解的语言。
- en: 'If you have a background in statistics, one concept in particular should stand
    out here:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你具备统计学背景，以下概念在这里应该特别突出：
- en: '**Likelihood.**'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**可能性。**'
- en: Cyber risk modeling is, at its core, an attempt to quantify the likelihood of
    certain events occurring and the impact if they do. This opens the door to a variety
    of statistical tools, such as Monte Carlo simulation, that can model uncertainty
    far more effectively than ordinal scales ever could.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 网络风险建模在本质上是一种尝试量化某些事件发生的可能性以及它们发生时的影响的尝试。这为各种统计工具打开了大门，如蒙特卡洛模拟，这些工具可以比序数尺度更有效地模拟不确定性。
- en: Quantitative risk modeling uses statistical models to assign dollar values to
    loss and model the likelihood of these loss events occurring, capturing the future
    uncertainty.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 定量风险建模使用统计模型为损失分配美元价值，并模拟这些损失事件发生的可能性，捕捉未来的不确定性。
- en: While qualitative analysis might occasionally approximate the most likely outcome,
    it fails to capture the full range of uncertainty, such as rare but impactful
    events, known as “long tail risk”.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然定性分析偶尔可以近似最可能的结果，但它无法捕捉到整个不确定性范围，例如罕见但具有影响力的事件，称为“长尾风险”。
- en: '![](../Images/c8496a4ea7750df1736458ffc04647aa.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c8496a4ea7750df1736458ffc04647aa.png)'
- en: 'Source: Securemetrics Cyber Risk Quantification'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Securemetrics 网络风险量化
- en: The loss exceedance curve plots the likelihood of exceeding a certain annual
    loss amount on the y-axis, and the various loss amounts on the x-axis, resulting
    in a downward sloping line.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 损失超过曲线图显示了在y轴上超过一定年度损失金额的可能性，以及在x轴上各种损失金额，从而形成一条向下倾斜的线。
- en: Pulling different percentiles off the loss exceedance curve, such as the 5th
    percentile, mean, and 95th percentile can provide an idea of the possible annual
    losses for a risk with 90% confidence.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 从损失超过曲线中提取不同的分位数，如第5分位数、平均值和第95分位数，可以提供一个具有90%置信度的风险可能年度损失的概念。
- en: While the single-point estimate of qualitative analysis may get close to the
    most likely risk (depending on the accuracy of the assessors judgement), quantitative
    analysis captures the uncertainty of outcomes, even those that are rare but still
    possible (known as “long tail risk”).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然定性分析的单点估计可能接近最可能的风险（取决于评估者判断的准确性），但定量分析捕捉了结果的不确定性，包括那些罕见但仍然可能发生的事件（称为“长尾风险”）。
- en: Looking Outside Cyber Risk
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 看向网络风险之外
- en: To improve our risk models in information security, we only need to look outwards
    at the techniques used in other domains. Risk modeling has been matured in a variety
    of applications, such as finance, insurance, aerospace safety, and supply chain
    management.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 为了改进信息安全中的风险模型，我们只需要关注其他领域使用的技巧。风险建模在各种应用中已经成熟，如金融、保险、航空航天安全和供应链管理。
- en: Financial teams model and manage portfolio risk using similar Bayesian statistics.
    Insurance teams model risk with mature actuarial models. The aerospace industry
    models the risk of system failures using likelihood modeling. And supply chain
    teams model risk using probabilistic simulations.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 金融团队使用类似的贝叶斯统计方法来建模和管理投资组合风险。保险团队使用成熟的精算模型来建模风险。航空航天行业使用可能性建模来模拟系统故障的风险。供应链团队使用概率模拟来建模风险。
- en: The tools exist. The math is well understood. Other industries have paved the
    way. Now it’s cybersecurity’s turn to embrace quantitative risk modeling to drive
    better decisions.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 工具存在。数学原理已被充分理解。其他行业已经铺平了道路。现在轮到网络安全行业拥抱定量风险建模，以推动更好的决策。
- en: Key Takeaways
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: '| **Qualitative** | **Quantitative** |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| **定性** | **定量** |'
- en: '| Ordinal Scales (1-5) | Probabilistic modeling |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| 序数量表（1-5） | 概率建模 |'
- en: '| Subjective intuition | Statistical rigor |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| 主观直觉 | 统计严谨性 |'
- en: '| Single-point scores | Risk distributions |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| 单点评分 | 风险分布 |'
- en: '| Heatmaps & color codes | Loss exceedance curves |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| 热图与颜色编码 | 损失超出曲线 |'
- en: '| Ignores rare but severe events | Captures long-tail risk |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| 忽略罕见但严重的事件 | 捕获长尾风险 |'
