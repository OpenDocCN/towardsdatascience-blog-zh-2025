- en: Predicting a Ball Trajectory
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/predicting-a-ball-trajectory-4dbd9a1693ad/](https://towardsdatascience.com/predicting-a-ball-trajectory-4dbd9a1693ad/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Ball Tracking and Trajectory Prediction](../Images/2ea54943744e11d68f4b6549251f6338.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
- en: Ball Tracking and Trajectory Prediction
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: In a previous project I visualized the **trajectory of a ball** that I threw
    vertically into the air with a real-time position, velocity and acceleration plot.
    Extending upon this project, I wanted to calculate and visualize a **trajectory
    prediction based on a simple physics model**. In this post, I will explain how
    I fit the model to the measured state of the ball and visualize the predicted
    trajectory.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: '![Position, Velocity and Acceleration Plots with Prediction](../Images/de1adc7b2336662b2c7d3125541fac5e.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
- en: Position, Velocity and Acceleration Plots with Prediction
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Physics Model
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s start with the physics model for the ball. For simplicity, I am only
    considering the **vertical movement** of the ball, simplifying the problem to
    a one-dimensional one. Furthermore, I am only modelling the ball as soon as it
    leaves my hand and neglecting any air drag. This simply leaves us with a single
    constant force acting on the ball: **gravity**.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: '![Gravitational Force acting on the Ball](../Images/8763c35df86224aa941451a996071c14.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
- en: Gravitational Force acting on the Ball
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: The force is calculated with the mass of the ball and the gravitational acceleration
    ***g***, which is approximately **9.8m/s²**, depending on location and altitude.
    The change in altitude of the ball is so small that the change in ***g*** is negligible
    and we can assume it to be constant. Notice that I define the position axis pointing
    upwards, opposite to the gravity vector, resulting in a negative sign for the
    force.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bd92094150022d0b96c28037af029588.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
- en: Based on Newton’s second law, we can derive the acceleration of the ball to
    be equal to the gravitational acceleration, as the mass cancels out during calculation.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e1cfbfebb2ac1cec8b590a1081684fb8.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
- en: 'Since acceleration is the time derivative of velocity, and velocity itself
    is the time derivative of the position, we can derive the motion equations by
    integration. Assuming the acceleration is constant, we get the following equations
    for the velocity and position:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/83c0c15916ed93f987331624e4433c8b.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
- en: 'In summary our physics model results in a constant acceleration, linear velocity
    and quadratic position. Or in other terms, all three functions are **polynomials**
    of different degrees:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Acceleration is constant, a polynomial of degree 0
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Velocity is linear, a polynomial of degree 1
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Position is quadratic, a polynomial of degree 2
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will use this information in the next chapter to find the best fit for the
    parameters of the functions.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Polynomial Fit
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now on to the coding part, where we translate this into Python code. Our starting
    point is the [code from the previous project](https://github.com/trflorian/ball-tracking-live-plot),
    where we have three **numpy** arrays containing our extracted position and approximations
    of the velocity and acceleration values:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是编码部分，我们将这些内容转换为Python代码。我们的起点是[上一个项目的代码](https://github.com/trflorian/ball-tracking-live-plot)，其中包含三个**numpy**数组，包含我们提取的位置以及速度和加速度值的近似：
- en: '[PRE0]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'To fit our polynomials, we can use the numpy function **[polyfit](https://numpy.org/doc/stable/reference/generated/numpy.polyfit.html)**.
    The function takes in two arrays and a degree of the polynomial. The first input
    array is the time-axis and the second array is the value at each timestamp. In
    our case we can define the time steps as follows:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了拟合我们的多项式，我们可以使用numpy函数**[polyfit](https://numpy.org/doc/stable/reference/generated/numpy.polyfit.html)**。该函数接受两个数组和一个多项式的度数。第一个输入数组是时间轴，第二个数组是每个时间戳的值。在我们的情况下，我们可以定义时间步长如下：
- en: '[PRE1]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**NOTE:** Since we use an approximation based on the array differences for
    the velocity and acceleration, they all have different lengths and we need to
    define a time axis for each function separately.'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意：** 由于我们使用基于数组的速度和加速度差值的近似，它们都有不同的长度，我们需要为每个函数单独定义一个时间轴。'
- en: Now we can pass the time-axis and the arrays to the **polyfit** function with
    the respective polynomial degrees.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以将时间轴和数组传递给**polyfit**函数，并指定相应的多项式度数。
- en: '[PRE2]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The resulting arrays will contain the parameters for the polynomials of the
    respective degree with the highest order coefficient first.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 结果数组将包含相应度数的多项式参数，最高次系数排在最前面。
- en: Visualize Predictions
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可视化预测
- en: To show the fitted polynomial functions, we need to evaluate and plot the polynomial
    at each time step. I always want to show the polynomial predictions for the full
    time frame of the video sequence and a couple frames into the future.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为了显示拟合的多项式函数，我们需要在每个时间步长评估并绘制多项式。我总是想显示视频序列全时间段和未来几帧的多项式预测。
- en: '[PRE3]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now we can use the **[polyval](https://numpy.org/doc/stable/reference/generated/numpy.polyval.html)**
    function to evaluate the polynomials at each of the time step.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以使用**[polyval](https://numpy.org/doc/stable/reference/generated/numpy.polyval.html)**函数在每个时间步长评估多项式。
- en: '[PRE4]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now you can simply show the static plots of these polynomial functions with
    **matplotlib** after the video ends. This will show the final prediction, the
    best fit based on all data points of the video.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在视频结束后，你可以简单地使用**matplotlib**显示这些多项式函数的静态绘图。这将显示最终预测，基于视频所有数据点的最佳拟合。
- en: '[PRE5]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: For some styling of the plots I used a semi-transparent green dashed line.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一些绘图样式，我使用了半透明的绿色虚线。
- en: '![Plots of Polynomial Fit](../Images/397a8b33a11757d15585f36abc9ee61c.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![多项式拟合图](../Images/397a8b33a11757d15585f36abc9ee61c.png)'
- en: Plots of Polynomial Fit
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 多项式拟合图
- en: Animate Predictions
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动画预测
- en: Similar to the last post, we can also show the prediction in real-time while
    the video is running. To make this as efficient as possible, I will again use
    the **[blit](https://matplotlib.org/stable/users/explain/animations/blitting.html)**
    technique to not re-draw the full plot every frame.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 与上一篇文章类似，我们也可以在视频运行时实时显示预测。为了尽可能高效，我再次使用**[blit](https://matplotlib.org/stable/users/explain/animations/blitting.html)**技术，以避免每帧重绘整个绘图。
- en: To use this technique, we first have to create a reference of the lines object
    in the figure before the video loop with empty arrays. I added a label for these
    lines to create a **legend** later on.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用这种技术，我们首先必须在视频循环之前使用空数组创建线条对象的引用。我添加了一个标签来创建后续的**图例**。
- en: '[PRE6]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'I also added the label to the plots of the measurements:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我还添加了标签到测量值的绘图：
- en: '[PRE7]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**NOTE:** The plot function returns a **list of lines**. Since we only create
    one line for each of our subplot plot function calls, we need to reference the
    first element in this list, hence the array indexing [0] at the end of these lines.'
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意：** 绘图函数返回一个**线条列表**。由于我们为每个子图绘图函数调用只创建一条线，因此我们需要引用这个列表中的第一个元素，这就是为什么在末尾使用数组索引[0]的原因。'
- en: Now instead of plotting the predictions at the end of the loop, we can update
    the line plots in the loop the same way we updated the tracking plots in the initial
    post.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以更新循环中的线条绘图，而不是在循环结束时绘制预测，就像我们在初始帖子中更新跟踪绘图一样。
- en: '[PRE8]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: One thing we need to be careful of now that we update the predictions every
    step of the loop, is that we don’t try to predict before we have any data points,
    as this will raise an exception in the **polyfit** function. To prevent this,
    we can simply check that all our tracking variables contain values.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们每一步都更新预测，需要注意的一点是，在我们有任何数据点之前不要尝试进行预测，因为这将在**polyfit**函数中引发异常。为了防止这种情况，我们可以简单地检查所有跟踪变量是否包含值。
- en: '[PRE9]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Next we need to re-draw these lines for each plot axis by restoring the background
    and calling the draw_artist function for each line.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们需要为每个绘图轴重新绘制这些线条，通过恢复背景并调用每个线条的draw_artist函数来实现。
- en: '[PRE10]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: For the final touch, I added the legend to the right side of the figure. To
    make sure that it fits, we can adjust the subplots slightly to the left.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 为了最后的润色，我在图的右侧添加了图例。为了确保它适合，我们可以稍微将子图向左调整。
- en: '[PRE11]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: And here you go, the optimized, animated plot of the tracked trajectory. Check
    out the [full source code](https://github.com/trflorian/ball-tracking-live-plot)
    for some more details, such as the marker on the current state of the ball.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您可以看到，这是优化后的、动画化的轨迹图。查看[完整源代码](https://github.com/trflorian/ball-tracking-live-plot)以获取更多细节，例如球当前状态的标记。
- en: '![Final Animated Plots with Predicted Trajectory](../Images/b9c1cebe439c9f0186b653f7e907f75f.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![带有预测轨迹的最终动画图](../Images/b9c1cebe439c9f0186b653f7e907f75f.png)'
- en: Final Animated Plots with Predicted Trajectory
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 带有预测轨迹的最终动画图
- en: Conclusion
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this project, you learned how to use a simple physics model and polynomial
    fitting to predict the trajectory of a ball in motion. We used **blitting** to
    visualize the trajectory plots in real-time and overlay the predictions on top
    of the measured state of the ball.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，您学习了如何使用简单的物理模型和多项式拟合来预测运动中的球的轨迹。我们使用了**blitting**来实时可视化轨迹图，并将预测叠加在球的测量状态之上。
- en: 'If you want to learn in detail how I created the animated plots and extracted
    the position, velocity and acceleration from the video, check out my first article:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想详细了解我是如何创建动画图和从视频中提取位置、速度和加速度的，请查看我的第一篇文章：
- en: '[**Dynamic Visualizations in Python**](https://towardsdatascience.com/animated-plotting-in-python-with-opencv-and-matplotlib-d640462c41f4)'
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**Python中的动态可视化**](https://towardsdatascience.com/animated-plotting-in-python-with-opencv-and-matplotlib-d640462c41f4)'
- en: The full source code is available from my GitHub below. If you have any questions
    don’t hesitate to ask, I am always happy to help. Take care!
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 完整源代码可在我的GitHub上找到。如果您有任何问题，请随时提问，我总是乐于帮助。请保重！
