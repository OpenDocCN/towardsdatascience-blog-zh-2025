- en: Generating Consistent Imagery with Gemini
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/generating-consistent-imagery-with-gemini/](https://towardsdatascience.com/generating-consistent-imagery-with-gemini/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/0169a1d4dbf4793d12d1780e3b0fabc1.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '*<mdspan datatext="el1758663996151" class="mdspan-comment">A few notes</mdspan>
    before we dive in:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*I am a developer at Google Cloud. Thoughts and opinions expressed here* *are
    entirely my own.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*The complete source code for this article, including future updates, is available
    in [this notebook](https://github.com/GoogleCloudPlatform/generative-ai/blob/main/gemini/use-cases/media-generation/consistent_imagery_generation.ipynb)
    under the Apache 2.0 license.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*All new images in this article were generated with Gemini Nano Banana using
    the proof-of-concept generation pipeline explored here.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*You can experiment with Gemini for free in [Google AI Studio](https://aistudio.google.com).
    Please note that programmatic API access to Nano Banana* *is a pay-as-you-go service*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*2025–10–02: Nano Banana got generally available for production and added support
    for ten aspect ratios. Notebook & article were updated accordingly.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🔥 Challenge
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We all have existing images worth reusing in different contexts. This would
    generally imply modifying the images, a complex (if not impossible) task requiring
    very specific skills and tools. This explains why our archives are full of forgotten
    or unused treasures. State-of-the-art vision models have evolved so much that
    we can reconsider this problem.
  prefs: []
  type: TYPE_NORMAL
- en: So, can we breathe new life into our visual archives?
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s try to complete this challenge with the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1️⃣ Start from an archive image we’d like to reuse
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2️⃣ Extract a character to create a brand-new reference image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3️⃣ Generate a series of images to illustrate the character’s journey, using
    only prompts and the new assets
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For this, we’ll explore the capabilities of “Gemini 2.5 Flash Image”, also known
    as “Nano Banana” 🍌.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🏁 Setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 🐍 Python packages
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We’ll use the following packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '`google-genai`: The [Google Gen AI Python SDK](https://pypi.org/project/google-genai) lets
    us call Gemini with a few lines of code'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`networkx` for graph management'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We’ll also use the following dependencies:'
  prefs: []
  type: TYPE_NORMAL
- en: '`pillow` and `matplotlib` for data visualization'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`tenacity` for request management'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🤖 Gen AI SDK
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Create a `google.genai` client:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Check your configuration:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🧠 Gemini model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For this challenge, we’ll select the latest Gemini 2.5 Flash Image model:'
  prefs: []
  type: TYPE_NORMAL
- en: '`GEMINI_2_5_FLASH_IMAGE = "gemini-2.5-flash-image"`'
  prefs: []
  type: TYPE_NORMAL
- en: 💡 “Gemini 2.5 Flash Image” is also known as “Nano Banana” 🍌
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🛠️ Helpers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Define
    some helper functions to generate and display images: 🔽</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🖼️ Assets
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s define the assets for our character’s journey and the functions to manage
    them:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 📦 Reference archive
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>We
    can now fetch our reference archive and make it our first asset: 🔽</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![Archive generated in 2024 with Imagen 3 by author](../Images/657e28d4b8001df94fabf4a5b944386b.png)'
  prefs: []
  type: TYPE_IMG
- en: This archive image was generated in July 2024 with a beta version of Imagen
    3, prompted with *“On white background, a small hand-felted toy of blue robot.
    The felt is soft and cuddly…”*. The result looked really good but, at the time,
    there was absolutely no determinism and no consistency. As a result, **this was
    a nice one-shot image generation but the cute little robot seemed gone forever…**
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: ⛏️ Asset extraction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s try to extract our little robot:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated with Gemini Nano Banana by author](../Images/95d5a9644a97c1befb7b103b70bc6cf4.png)'
  prefs: []
  type: TYPE_IMG
- en: ⚠️ The robot is perfectly extracted, but this is essentially a good background
    removal, which many models can perform. This prompt uses terms from graphics software,
    whereas we can now reason in terms of image composition. It’s also not necessarily
    a good idea to try to use traditional binary masks, as object edges and shadows
    convey significant details about shapes, textures, positions, and lighting.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go back to our archive to perform an advanced extraction instead, and
    directly generate a character sheet…
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🪄 Character sheet
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Gemini has spatial understanding, so it’s able to provide different views while
    preserving visual features. Let’s generate a front/back character sheet and, as
    our little robot will go on a journey, also add a backpack at the same time:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated with Gemini Nano Banana by author](../Images/96ea2a0f4eea386b730b4425a402a520.png)'
  prefs: []
  type: TYPE_IMG
- en: '💡 A few remarks:'
  prefs: []
  type: TYPE_NORMAL
- en: Our prompt focuses on the composition of the scene, a common practice in media
    studios.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Successive generated images will be consistent, preserving all robot features
    visible in the provided image. However, since we only specified some features
    of the backpack (e.g., a single buckle) and left others unspecified, we’ll get
    slightly different backpacks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For simplicity, we directly included the backpack in the character sheet. In
    a real production pipeline, we would likely make it part of a separate accessory
    sheet.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To control the backpack’s exact shape and design, we could also use a reference
    photo of a real backpack and instruct Gemini to “transform the backpack into a
    stylized felt version”.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gemini can generate `1024 × 1024`images (`1:1` aspect ratio) or equivalent resolutions
    (token-wise) for the other supported aspect ratios (`2:3`, `3:2`, `3:4`, `4:3`, `4:5`, `5:4`, `9:16`, `16:9`,
    and `21:9`).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the request configuration, we specified `aspect_ratio="16:9"`, which generates
    images at `1344 × 768` pixels. If this parameter is omitted, Gemini uses the aspect
    ratio of the input image (the last one if multiple are provided) to select the
    closest supported aspect ratio.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This new asset can now serve as a design reference in our future image generations.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: ✨ First scene
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s get started with a mountain scenery:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated with Gemini Nano Banana by author](../Images/b9e86b5d93087b5f4b0f02baca076195.png)'
  prefs: []
  type: TYPE_IMG
- en: 💡 The mountain shape is specified as “dome-like” so our character can stand
    on one of the summits later on.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It’s important to spend some time on this first scene as, in a cascading effect,
    it will define the overall look of our story. Take some time to refine the prompt
    or try a couple of times to get the best variation.
  prefs: []
  type: TYPE_NORMAL
- en: From now on, our generation inputs will be both the character sheet and a reference
    scene…
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: ✨ Successive scenes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s get the robot down a valley:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated with Gemini Nano Banana by author](../Images/ae7334b0d205da9bd1632fd8633212cc.png)'
  prefs: []
  type: TYPE_IMG
- en: '💡 A few notes:'
  prefs: []
  type: TYPE_NORMAL
- en: The provided specifications about our input images (`"Image 1:…"`, `"Image 2:…"`)
    are important. Without them, “the robot” could refer to any of the 3 robots in
    the input images (2 in the character sheet, 1 in the previous scene). With them,
    we indicate that it’s the same robot. In case of confusion, we can be more specific
    with `"the [entity] from image [number]"`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: On the other hand, since we didn’t provide a precise description of the valley,
    successive requests will give different, interesting, and creative results (we
    can pick our favorite or make the prompt more precise for more determinism).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Here, we also tested a different lighting, which significantly changes the whole
    scene.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Then, we can move forward into this scene:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated with Gemini Nano Banana by author](../Images/5f7894a862500474c2771ca49eafb9aa.png)'
  prefs: []
  type: TYPE_IMG
- en: '💡 Of interest:'
  prefs: []
  type: TYPE_NORMAL
- en: We could position the character, change its point of view, and even “animate”
    its arms for more expressivity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The “no longer holding the map” precision prevents the model from trying to
    keep it from the previous scene in a meaningful way (e.g., the robot dropped the
    map on the floor).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We didn’t provide lighting details: The lighting source, quality, and direction
    have been kept from the previous scene.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s go through the forest:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated with Gemini Nano Banana by author](../Images/eaac499bbc32a2f9b3bd0e4894b285cc.png)'
  prefs: []
  type: TYPE_IMG
- en: '💡 We changed the ground but didn’t provide additional details for the view
    and the forest: The model will generally preserve most of the trees.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Now that the valley-forest sequence is over, we can journey up to the mountains,
    using the original mountain scene as our reference to return to that environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated with Gemini Nano Banana by author](../Images/fa24eb3175fe0aa128e74a9e21191563.png)'
  prefs: []
  type: TYPE_IMG
- en: 💡 The mountain close-up, inferred from the blurred background, is pretty impressive.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Let’s climb to the summit:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated with Gemini Nano Banana by author](../Images/6738f08b6a0f9c39355376343e7951a3.png)'
  prefs: []
  type: TYPE_IMG
- en: 💡 This is a logical follow-up but also a nice, different view.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Now, let’s try something different to significantly recompose the scene:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated with Gemini Nano Banana by author](../Images/b6186d9e81a1ec7f4509c49612e26829.png)'
  prefs: []
  type: TYPE_IMG
- en: '💡 Of interest:'
  prefs: []
  type: TYPE_NORMAL
- en: This imperative prompt composes the scene in terms of actions. It’s sometimes
    easier than descriptions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A new mountain is added as instructed, and it is both different and consistent.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The bridge attaches to the summits in very plausible ways and seems to obey
    the laws of physics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The “Remove the ice axes” instruction is here for a reason. Without it, it’s
    as if we were prompting “do whatever you can with the ice axes from the previous
    scene: leave them where they are, don’t let the robot leave without them, or anything
    else”, leading to random results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s also possible to get the robot to walk on the bridge, seen from the side
    (which we never generated before), but it’s hard to have it consistently walk
    from left to right. Adding left and right views in the character sheet should
    fix this.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s generate a final scene and let the robot get some well-deserved rest:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated with Gemini Nano Banana by author](../Images/6ac20edc8c3a592aaed6721249049742.png)'
  prefs: []
  type: TYPE_IMG
- en: '💡 Of interest:'
  prefs: []
  type: TYPE_NORMAL
- en: This time, the prompt is descriptive, and it works as well as the previous imperative
    prompt.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The bridge-hammock transformation is really nice and preserves the attachments
    on the mountain summits.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The robot transformation is also impressive, as it hasn’t been seen in this
    position before.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The closed eyes are the most difficult detail to get consistently (may require
    a couple of attempts), probably because we’re accumulating many different transformations
    at once (and diluting the model’s attention). For full control and more deterministic
    results, we can focus on significant changes over iterative steps, or create various
    character sheets upfront.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We have illustrated our story with 9 new consistent images! Let’s take a step
    back to understand what we’ve built…
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🗺️ Graph visualization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We now have a collection of image assets, from archives to brand-new generated
    assets.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s add some data visualization to get a better sense of the steps completed…
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🔗 Directed graph
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Our new assets are all related, connected by one or more “generated from” links.
    From a data structure point of view, this is a directed graph.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can build the corresponding directed graph using the `networkx` library:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Let’s
    place the most used asset in the center and display the other assets around: 🔽</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated by author from article''s notebook](../Images/05fc6957a6b15e388629193c003afba8.png)'
  prefs: []
  type: TYPE_IMG
- en: That’s a correct summary of our different steps. It’d be nice if we could also
    visualize our assets…
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🌟 Asset graph
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '<details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Let’s
    add custom `matplotlib` functions to render the graph nodes with the assets in
    a more visually appealing way: 🔽</summary>'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: 'We can now display our generation graph:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated by author from article''s notebook](../Images/4146b170bcf4a8ba6390a80cc546f4b6.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🚀 Challenge completed
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We managed to generate a full set of new consistent images with Nano Banana
    and learned a few things along the way:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Images prove again that they are worth a thousand words: It’s now a lot easier
    to generate new images from existing ones and simple instructions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can create or edit images just in terms of composition (letting us all become
    artistic directors).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can use descriptive or imperative instructions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model’s spatial understanding allows 3D manipulations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can add text in our outputs (character sheet) and also refer to text in our
    inputs (front/back views).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Consistency can be preserved at very different levels: character, scene, texture,
    lighting, camera angle/type…'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The generation process can still be iterative but it feels like 10x-100x faster
    for reaching better-than-hoped-for results.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s now possible to breathe new life into our archives!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Possible next steps:'
  prefs: []
  type: TYPE_NORMAL
- en: The process we followed is essentially a generation pipeline. It can be industrialized
    for automation (e.g., changing a node regenerates its descendants) or for the
    generation of different variations in parallel (e.g., the same set of images could
    be generated for different aesthetics, audiences, or simulations).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For the sake of simplicity and exploration, the prompts are intentionally simple.
    In a production environment, they could have a fixed structure with a systematic
    set of parameters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We described scenes as if in a photo studio. Virtually any other imaginable
    artistic style is possible (photorealistic, abstract, 2D…).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Our assets could be made self-sufficient by saving prompts and ancestors in
    the image metadata (e.g., in PNG chunks), allowing for full local storage and
    retrieval (no database needed and no more lost prompts!). For details, see the
    “asset metadata” section in the notebook (link below).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'As a bonus, let’s end with an animated version of our journey, with the generation
    graph also showing a glimpse of our instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: '![Generated by author from article''s notebook](../Images/0169a1d4dbf4793d12d1780e3b0fabc1.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: ➕ More!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Want to go deeper?**'
