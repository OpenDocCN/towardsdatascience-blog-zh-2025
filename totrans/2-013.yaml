- en: Three Essential Hyperparameter Tuning Techniques for Better Machine Learning Models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/three-essential-hyperparameter-tuning-techniques-for-better-machine-learning-models/](https://towardsdatascience.com/three-essential-hyperparameter-tuning-techniques-for-better-machine-learning-models/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1755894367978" class="mdspan-comment">A proper Machine</mdspan>
    Learning (ML) model should not *memorize* the training data. Instead, it should
    *learn* well from the given training data so that it can *generalize* well to
    new, unseen data.
  prefs: []
  type: TYPE_NORMAL
- en: The default settings of an ML model may not work well for every type of problem
    that we try to solve. We need to manually adjust these settings for better results.
    Here, “*settings”* refer to **hyperparameters**.
  prefs: []
  type: TYPE_NORMAL
- en: What is a hyperparameter in an ML model?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The user manually defines a hyperparameter value before the training process,
    and it does not learn its value from the data during the model training process.
    Once defined, its value remains fixed until it is changed by the user.
  prefs: []
  type: TYPE_NORMAL
- en: We need to distinguish between a hyperparameter and a parameter.
  prefs: []
  type: TYPE_NORMAL
- en: A parameter learns its value from the given data, and its value depends on the
    values of hyperparameters. A parameter value is updated during the training process.
  prefs: []
  type: TYPE_NORMAL
- en: Here is an example of how different hyperparameter values affect the Support
    Vector Machine (SVM) model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Both **clf_1** and **clf_3** models perform SVM linear classification, while
    the **clf_2** model performs non-linear classification. In this case, the user
    can perform both linear and non-linear classification tasks by changing the value
    of the *‘kernel’* hyperparameter in the **SVC()** class.
  prefs: []
  type: TYPE_NORMAL
- en: What is hyperparameter tuning?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Hyperparameter tuning is an iterative process of optimizing a model’s performance
    by finding the optimal values for hyperparameters without causing overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes, as in the above SVM example, the selection of some hyperparameters
    depends on the type of problem (regression or classification) that we want to
    solve. In that case, the user can simply set ***‘linear’*** for linear classification
    and ***‘poly’*** for non-linear classification. It is a simple selection.
  prefs: []
  type: TYPE_NORMAL
- en: However, for example, the user needs to use advanced searching methods to select
    the value for the ***‘degree’*** hyperparameter.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before discussing searching methods, we need to understand two important definitions:
    **hyperparameter search space** and **hyperparameter distribution**.'
  prefs: []
  type: TYPE_NORMAL
- en: Hyperparameter search space
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The hyperparameter search space contains a set of possible hyperparameter value
    combinations defined by the user. The search will be limited to this space.
  prefs: []
  type: TYPE_NORMAL
- en: The search space can be *n-dimensional*, where ***n*** is a positive integer.
  prefs: []
  type: TYPE_NORMAL
- en: The number of dimensions in the search space is the number of hyperparameters.
    (e.g 3-dimensional — 3 hyperparameters).
  prefs: []
  type: TYPE_NORMAL
- en: The search space is defined as a Python dictionary which contains hyperparameter
    names as keys and values for those hyperparameters as lists of values.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Hyperparameter distribution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The underlying distribution of a hyperparameter is also important because it
    decides how each value will be tested during the tuning process. There are four
    types of popular distributions.
  prefs: []
  type: TYPE_NORMAL
- en: '**Uniform distribution:** Allpossible values within the search space will be
    equally selected.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Log-uniform distribution:** Alogarithmic scale is applied to uniformly distributed
    values. This is useful when the range of hyperparameters is large.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Normal distribution:** Values are distributed around a zero mean and a standard
    deviation of 1.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Log-normal distribution:** Alogarithmic scale is applied to normally distributed
    values. This is useful when the range of hyperparameters is large.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The choice of the distribution also depends on the type of value of the hyperparameter.
    A hyperparameter can take discrete or continuous values. A discrete value can
    be an integer or a string, while a continuous value always takes floating-point
    numbers.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '**randint(50, 75):** Selects random integers in between 50 and 74'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**uniform(0.01, 0.49):** Selects floating-point numbers evenly between 0.01
    and 0.5 (continuous uniform distribution)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**loguniform(0.1, 1.0):** Selects values between 0.1 and 1.0 on a log scale
    (log-uniform distribution)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hyperparameter tuning methods
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are many different types of hyperparameter tuning methods. In this article,
    we will focus on only three methods that fall under the ***exhaustive search***
    category. In an exhaustive search, the search algorithm exhaustively searches
    the entire search space. There are three methods in this category: manual search,
    grid search and random search.'
  prefs: []
  type: TYPE_NORMAL
- en: Manual search
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There is no search algorithm to perform a manual search. The user just sets
    some values based on instinct and sees the results. If the result is not good,
    the user tries another value and so on. The user learns from previous attempts
    will set better values in future attempts. Therefore, manual search falls under
    the ***informed search*** category.
  prefs: []
  type: TYPE_NORMAL
- en: There is no clear definition of the hyperparameter search space in manual search.
    This method can be time-consuming, but it may be useful when combined with other
    methods such as grid search or random search.
  prefs: []
  type: TYPE_NORMAL
- en: Manual search becomes difficult when we have to search two or more hyperparameters
    at once.
  prefs: []
  type: TYPE_NORMAL
- en: An example for manual search is that the user can simply set ***‘linear’***
    for linear classification and ***‘poly’*** for non-linear classification in an
    SVM model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Grid search
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In grid search, the search algorithm tests all possible hyperparameter combinations
    defined in the search space. Therefore, this method is a brute-force method. This
    method is time-consuming and requires more computational power, especially when
    the number of hyperparameters increases (curse of dimensionality).
  prefs: []
  type: TYPE_NORMAL
- en: To use this method effectively, we need to have a well-defined hyperparameter
    search space. Otherwise, we will waste a lot of time testing unnecessary combinations.
  prefs: []
  type: TYPE_NORMAL
- en: However, the user does not need to specify the distribution of hyperparameters.
  prefs: []
  type: TYPE_NORMAL
- en: The search algorithm does not learn from previous attempts (iterations) and
    therefore does not try better values in future attempts. Therefore, grid search
    falls under the ***uninformed search*** category.
  prefs: []
  type: TYPE_NORMAL
- en: Random search
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In random search, the search algorithm randomly tests hyperparameter values
    in each iteration. Like in grid search, it does not learn from previous attempts
    and therefore does not try better values in future attempts. Therefore, random
    search also falls under ***uninformed search***.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d9dc223ba77defad7b6cb6fd6cb9b779.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Grid search vs random search** (Image by author)'
  prefs: []
  type: TYPE_NORMAL
- en: Random search is much better than grid search when there is a large search space
    and we have no idea about the hyperparameter space. It is also considered computationally
    efficient.
  prefs: []
  type: TYPE_NORMAL
- en: When we provide the same size of hyperparameter space for grid search and random
    search, we can’t see much difference between the two. We have to define a bigger
    search space in order to take advantage of random search over grid search.
  prefs: []
  type: TYPE_NORMAL
- en: There are two ways to increase the size of the hyperparameter search space.
  prefs: []
  type: TYPE_NORMAL
- en: By increasing the dimensionality (adding new hyperparameters)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By widening the range of hyperparameters
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is recommended to define the underlying distribution for each hyperparameter.
    If not defined, the algorithm will use the default one, which is the uniform distribution
    in which all combinations will have the same probability of being chosen.
  prefs: []
  type: TYPE_NORMAL
- en: There are two important hyperparameters in the random search method itself!
  prefs: []
  type: TYPE_NORMAL
- en: '**n_iter:** The number of iterations or the size of the random sample of hyperparameter
    combinations to test. Takes an integer. This trades off runtime vs quality of
    the output. We need to define this to allow the algorithm to test a random sample
    of combinations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**random_state:** We need to define this hyperparameter to get the same output
    across multiple function calls.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The major disadvantage of random search is that it produces high variance across
    multiple function calls of different random states.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: This is the end of today’s article.
