- en: 'Preparing Video Data for Deep Learning: Introducing Vid Prepper'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/introducing-vid-prepper/](https://towardsdatascience.com/introducing-vid-prepper/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758741346104" class="mdspan-comment">This is an introduction</mdspan>
    to preparing videos for machine learning/deep learning. Due to the size and computational
    cost of video data, it is vital that it is processed in as efficient a way possible
    for your use case. This includes things like metadata analysis, standardization,
    augmentation, shot and object detection, and tensor loading. This article explores
    some ways how these can be done and why we would do them. I have also built an
    open source Python package called [vid-prepper](https://pypi.org/project/vid-prepper/).
    I built the package with the aim of providing a fast and efficient way to apply
    different preprocessing techniques to your video data. The package builds off
    some giants of the machine learning and deep learning World, so whilst this package
    is useful in bringing them together in a common and easy to use framework, the
    real work is most definitely on them!
  prefs: []
  type: TYPE_NORMAL
- en: Video has been an important part of my career. I started my data career in a
    company that built a SaaS platform for video analytics for major leading video
    companies (called [NPAW](https://npaw.com/)) and currently work for the BBC. Video
    currently dominates the web landscape, but with AI is still pretty limited, although
    growing superfast. I wanted to create something that helps speed up people’s ability
    to try things out and contribute to this really interesting area. This article
    will discuss what the different package modules do and how to use them, starting
    with metadata analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Metadata Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: At the BBC, I am pretty fortunate to work at a professional organisation with
    hugely talented people creating broadcast quality videos. However, I know that
    most video data is not this. Often files will be mixed formats, colours, sizes,
    or they may be corrupted or have parts missing, they may also have quirks from
    older videos, like interlacing. It is important to be aware of any of this before
    processing videos for machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: We will be training our models on GPUs, and these are fantastic for tensor calculations
    at scale but expensive to run. When training large models on GPUs, we want to
    be as efficient as possible to avoid high costs. If we have corrupted videos or
    videos in unexpected or unsupported formats it will waste time and resources,
    could make your models less accurate or even cause the training pipeline to break.
    Therefore, checking and filtering your files beforehand is a necessity.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/15bea5687a1a9e20c8c0bcef33bce972.png)'
  prefs: []
  type: TYPE_IMG
- en: Metadata Analysis is almost always an important first step in preparing video
    data (image source – [Pexels](https://www.pexels.com/photo/a-person-standing-near-data-base-wooden-drawer-6549358/))
  prefs: []
  type: TYPE_NORMAL
- en: I have built the metadata analysis module on the ffprobe library, part of the
    [FFmpeg](https://ffmpeg.org/) library built in C and Assembler. This is a hugely
    powerful and efficient library used extensively in the profession and the module
    can be used to analyse a single video file or a batch of them as shown in the
    code below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This provides a dictionary output of the video metadata including codecs, sizes,
    frame rates, duration, pixel formats, audio metadata and more. This is really
    useful both for finding video data with issues or odd quirks, or also for selecting
    specific video data or choosing the formats and codec to standardize to based
    on the most commonly used ones.
  prefs: []
  type: TYPE_NORMAL
- en: Filtering Based on Metadata Issues
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Given this seemed to be a pretty regular use case, I built in the ability to
    filter the list of videos based on a set of checks. For example, if there is video
    or audio missing, codecs or formats not as specified, or frame rates or durations
    different to those specified, then these videos can be identified by setting the
    filter and only_errors parameters, as shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: By removing or identifying issues with the data before we get to the real intensive
    work of model training means we avoid wasting time and money, making it a vital
    first step.
  prefs: []
  type: TYPE_NORMAL
- en: Standardization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Standardization is usually pretty important in preprocessing for video machine
    learning. It can help make things much more efficient and consistent, and often
    deep learning models require specific sizes (eg. 224 x 224). If you have a lot
    of video data then any time spent in this stage is often repaid many times in
    the training stage later on.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ecb31a5ef1f994bde6fda3e71a4d9ccc.png)'
  prefs: []
  type: TYPE_IMG
- en: Standardizing video data can make processing much, much more efficient and give
    better results (image source – [Pexels](https://www.pexels.com/video/a-tray-with-many-different-types-of-lenses-and-glasses-26348338/))
  prefs: []
  type: TYPE_NORMAL
- en: Codecs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Videos are often structured for efficient storage and distribution over the
    internet so that they can be broadcast cheaply and quickly. This usually involves
    heavy compression to make videos as small as possible. Unfortunately, this is
    pretty much diametrically opposed to what is good for deep learning.
  prefs: []
  type: TYPE_NORMAL
- en: The bottleneck for deep learning is almost always decoding videos and loading
    them to tensors, so the more compressed a video file is, the longer that takes.
    This typically means avoiding ultra compressed codecs like H265 and VVC and going
    for lighter compressed alternatives with hardware acceleration like H264 or VP9,
    or as long as you can avoid I/O bottlenecks, using something like uncompressed
    MJPEG which tends to be used in production as it is the fastest way of loading
    frames into tensors.
  prefs: []
  type: TYPE_NORMAL
- en: Frame Rate
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The standard frame rates (FPS) for video are 24 for cinema, 30 for TV and online
    content and 60 for fast motion content. These frame rates are determined by the
    number of images required to be shown per second so that our eyes see one smooth
    motion. However, deep learning models don’t necessarily need as high a frame rate
    in the training videos to create numeric representations of motion and generate
    smooth looking videos. As every frame is an additional tensor to compute, we want
    to minimize the frame rate to the smallest we can get away with.
  prefs: []
  type: TYPE_NORMAL
- en: Different types of videos and the use case of our models will determine how
    low we can go. The less motion in a video, the lower we can set the input frame
    rate without compromising the results. For example, an input dataset of studio
    news clips or talk shows is going to require a lower frame rate than a dataset
    made up of ice hockey matches. Also, if we’re working on a video understanding
    or video-to-text model, rather than generating video for human consumption, it
    might be possible to set the frame rate even lower.
  prefs: []
  type: TYPE_NORMAL
- en: Calculating Minimum Frame Rate
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: It is actually possible to mathematically determine a pretty good minimum frame
    rate for your video dataset based on motion statistics. Using a [RAFT](https://docs.pytorch.org/vision/0.12/auto_examples/plot_optical_flow.html)
    or [Farneback](https://medium.com/pythons-gurus/farneback-algorithm-50682b8aa2eb)
    algorithm on a sample of your dataset, you can calculate the optical flow per
    pixel for each frame change. This provides the horizontal and vertical displacement
    for each pixel to calculate the magnitude of the change (the square root of adding
    the squared values).
  prefs: []
  type: TYPE_NORMAL
- en: Averaging this value over the frame gives the frame momentum and taking the
    median and 95th percentile of all the frames gives values that you can plug into
    the equation below to get a range of likely optimal minimum frame rates for your
    training data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Where max model interpolation is the maximum per frame momentum the model can
    handle, usually provided in the model card.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b9eb679e8140b6b593f9ff89e02590fe.png)'
  prefs: []
  type: TYPE_IMG
- en: Working out momentum is nothing more than a bit of Pythagoras. No PHD maths
    here! Source – [Pexels](https://www.pexels.com/video/man-working-on-an-architectural-design-6282954/)
  prefs: []
  type: TYPE_NORMAL
- en: You can then run small scale tests of your training pipeline to determine the
    lowest frame rate you can achieve for optimal performance.
  prefs: []
  type: TYPE_NORMAL
- en: Vid Prepper
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The standardize module in vid-prepper can standardize the size, codec, colour
    format and frame rate of a single video or batch of videos.
  prefs: []
  type: TYPE_NORMAL
- en: Again, it is built on FFmpeg and has the ability to accelerate things on GPU
    if that is available to you. To standardize videos, you can simply run the code
    below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'In order to make things more efficient, especially if you are using expensive
    GPUs and don’t want an IO bottleneck from loading videos, the module also accepts
    webdatasets. These can be loaded similarly to the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Tensor Loader
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: A video tensor is typically 4 or 5 dimensions, consisting of the pixel colour
    (usually RGB), height and width of the frame, time and batch (optional) components.
    As mentioned above, decoding videos into tensors is often the biggest bottleneck
    in the preprocessing pipeline, so the steps taken up to this point make a big
    difference in how efficiently we can load our tensors.
  prefs: []
  type: TYPE_NORMAL
- en: This module converts videos into PyTorch tensors using FFmpeg for frame sampling
    and NVDec to allow for GPU acceleration. You can alter the size of the tensors
    to fit your model along with selecting the number of frames to sample per clip
    and the frame stride (spacing between the frames). As with standardization, the
    option to use webdatasets is also available. The code below gives an example on
    how this is done.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Detector
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: It is often a necessary part of video preprocessing to detect things within
    the video content. These might be particular objects, shots or transitions. This
    module brings together powerful processes and models from PySceneDetector, HuggingFace,
    Idea Research and PyTorch to provide efficient detection.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e1d9f7d2d2848b62ebf04316f8d0332b.png)'
  prefs: []
  type: TYPE_IMG
- en: Video detection is often a useful way of splitting videos into clips and getting
    only the clips you need for your model (image source – [Pexels](https://www.pexels.com/video/man-scanning-the-codes-of-the-stocks-in-the-warehouse-4292903/))
  prefs: []
  type: TYPE_NORMAL
- en: Shot Detection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In many video machine learning use cases (eg. semantic search, seq2seq trailer
    generation and many more), splitting videos into individual shots is an important
    step. There are a few ways of doing this, but [PySceneDetect](https://www.scenedetect.com/)
    is one of the more accurate and reliable ways of doing this. This library provides
    a wrapper for PySceneDetect’s content detection method by calling the following
    method. It outputs the start and end frames for each shot.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Transition Detection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Whilst PySceneDetect is a strong tool for splitting up videos into individual
    scenes, it is not always 100% accurate. There are times where you may be able
    to take advantage of repeated content (eg. transitions) breaking up shots. For
    example, BBC News has an upwards red and white wipe transition between segments
    that can easily be detected using something like PyTorch.
  prefs: []
  type: TYPE_NORMAL
- en: Transition detection works directly on tensors by detecting pixel changes in
    blocks of pixels exceeding a certain threshold change that you can set. The example
    code below shows how it works.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Object Detection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Object detection is often a requirement to finding the clips you need in your
    video data. For example, you may require clips with people in them or animals.
    This method uses an open source [Dino model](https://github.com/IDEA-Research/DINO)
    against a small set of objects from the standard [COCO dataset labels](https://cocodataset.org/#home)
    for detecting objects. Both the model choice and list of objects are completely
    customisable and can be set by you. The model loader is the HuggingFace transformers
    package so the model you use will need to be available there. For custom labels,
    the default model takes a string with the following structure in the text_queries
    parameter – “dog. cat. ambulance.”
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Data Augmentation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Things like Video Transformers are incredibly powerful and can be used to create
    great new models. However, they often require a huge amount of data which isn’t
    necessarily easily available with things like video. In those cases, we need a
    way to generate varied data that stops our models overfitting. [Data Augmentation](https://www.datacamp.com/tutorial/complete-guide-data-augmentation)
    is one such solution to help boost limited data availability.
  prefs: []
  type: TYPE_NORMAL
- en: For video, there are a number of standard methods for augmenting the data and
    most of those are supported by the major frameworks. Vid-prepper brings together
    two of the best – [Kornia](https://kornia.readthedocs.io/en/latest/augmentation.html)
    and [Torchvision](https://docs.pytorch.org/vision/main/transforms.html). With
    vid-prepper, you can perform individual augmentations like cropping, flipping,
    mirroring, padding, gaussian blurring, adjusting brightness, colour, saturation
    and contrast, and coarse dropout (where parts of the video frame are masked).
    You can also chain them together for higher efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: Augmentations all work on the video tensors rather than directly on the videos
    and support GPU acceleration if you have it. The example code below shows how
    to call the methods individually and how to chain them.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Summing Up
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Video preprocessing is hugely important in deep learning due to the relatively
    huge size of the data compared to text. Transformer model requirements for oceans
    of data compound this even further. Three key elements make up the deep learning
    process – time, money and performance. By optimizing our input video data, we
    can minimize the amount of the first two elements we need to get the best out
    of the final one.
  prefs: []
  type: TYPE_NORMAL
- en: There are some amazing open source tools available for Video Machine Learning,
    with more coming along every day currently. Vid-prepper stands on the shoulders
    of some of the best and most widely used in an attempt to try and bring them together
    in an easy to use package. Hopefully you find some value in it and it helps you
    to create the next generation of video models, which is extremely exciting!
  prefs: []
  type: TYPE_NORMAL
