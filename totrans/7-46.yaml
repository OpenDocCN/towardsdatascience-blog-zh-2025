- en: Why Data Scientists Can’t Afford Too Many Dimensions and What They Can Do About
    It
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么数据科学家不能承受太多的维度以及他们可以做什么
- en: 原文：[https://towardsdatascience.com/why-data-scientists-cant-afford-too-many-dimensions-and-what-they-can-do-about-it-653230d50f9c/](https://towardsdatascience.com/why-data-scientists-cant-afford-too-many-dimensions-and-what-they-can-do-about-it-653230d50f9c/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-data-scientists-cant-afford-too-many-dimensions-and-what-they-can-do-about-it-653230d50f9c/](https://towardsdatascience.com/why-data-scientists-cant-afford-too-many-dimensions-and-what-they-can-do-about-it-653230d50f9c/)
- en: '![Photo by Paulina Gasteiger on Unsplash](../Images/18b42a8b6abc87ea53af5dd6e02e7781.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![照片由 Paulina Gasteiger 在 Unsplash 上提供](../Images/18b42a8b6abc87ea53af5dd6e02e7781.png)'
- en: Photo by [Paulina Gasteiger](https://unsplash.com/@paulinagasteiger?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 照片由 [Paulina Gasteiger](https://unsplash.com/@paulinagasteiger?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 上提供
- en: Dimensionality reduction is a central method in the field of Data Analysis and
    Machine Learning that makes it possible to reduce the number of dimensions in
    a data set while retaining as much of the information it contains as possible.
    This step is necessary to reduce the dimensionality of the dataset before training
    to save computing power and avoid the problem of overfitting.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 维度降低是数据分析与机器学习领域的一个核心方法，它使得在尽可能保留数据集包含的信息的同时，减少数据集的维度成为可能。这一步骤在训练前减少数据集的维度是必要的，以节省计算能力并避免过拟合的问题。
- en: In this article, we take a detailed look at dimensionality reduction and its
    objectives. We also illustrate the most commonly used methods and highlight the
    challenges of dimensionality reduction.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们详细探讨了维度降低及其目标。我们还展示了最常用的方法，并突出了维度降低的挑战。
- en: What is Dimensionality Reduction?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是维度降低？
- en: Dimensionality reduction comprises various methods that aim to reduce the number
    of characteristics and variables in a data set while preserving the information
    in it. In other words, fewer dimensions should enable a simplified representation
    of the data without losing patterns and structures within the data. This can significantly
    accelerate downstream analyses and also optimize machine learning models.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 维度降低包括各种方法，旨在减少数据集中的特征和变量数量，同时保留其中的信息。换句话说，更少的维度应该能够简化数据的表示，而不会丢失数据中的模式和结构。这可以显著加速下游分析，并优化机器学习模型。
- en: 'In many applications, problems occur due to the high number of variables in
    a data set, which is also referred to as the [curse of dimensionality](https://databasecamp.de/en/ml/curse-of-dimensionality-en).
    For example, too much dimensionality can lead to these problems:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多应用中，由于数据集中变量数量众多，这被称为[维度诅咒](https://databasecamp.de/en/ml/curse-of-dimensionality-en)。例如，过多的维度可能导致以下问题：
- en: '**[Overfitting](https://databasecamp.de/en/ml/overfitting-en)**: When machine
    learning models become overly reliant on characteristics of the training dataset
    and therefore only provide poor results for new, unseen data, this is known as
    overfitting. With a high number of features, the risk of overfitting increases
    as the model becomes more complex and therefore adapts too strongly to the errors
    in the data set.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[过拟合](https://databasecamp.de/en/ml/overfitting-en)**：当机器学习模型过度依赖训练数据集的特征，因此只对新数据提供较差的结果时，这被称为过拟合。随着特征数量的增加，过拟合的风险增加，因为模型变得更加复杂，因此对数据集中的错误适应得太强。'
- en: '**Computational complexity**: Analyses and models that have to process many
    variables often require more parameters to be trained. This increases the computational
    complexity, which is reflected either in a longer training time or in increased
    resource consumption.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算复杂性**：需要处理许多变量的分析和模型通常需要更多的参数进行训练。这增加了计算复杂性，这反映在更长的训练时间或增加的资源消耗上。'
- en: '**Data Noise**: With an increased number of variables, the probability of erroneous
    data or so-called noise also increases. This can influence the analyses and lead
    to incorrect predictions.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据噪声**：随着变量数量的增加，错误数据或所谓的噪声的概率也会增加。这可能会影响分析并导致预测错误。'
- en: Although large data sets with many characteristics are very informative and
    valuable, the high number of dimensions can also quickly lead to problems. Dimensionality
    reduction is a method that attempts to preserve the information content of the
    data set while reducing the number of dimensions.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管具有许多特征的大数据集非常有信息性和价值，但高维数也可能迅速导致问题。降维是一种试图在减少维度数量的同时保留数据集信息内容的方法。
- en: What is the Curse of Dimensionality?
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是维度灾难？
- en: The Curse of Dimensionality occurs with high-dimensional data sets, i.e. those
    that have a large number of attributes or features. At first, many attributes
    are a good thing because they contain a lot of information and describe the data
    points well. For example, if we have a dataset about people, the attributes can
    be information such as hair color, height, weight, eye color, etc.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 维度灾难发生在高维数据集中，即具有大量属性或特征的数据集。起初，许多属性是好事，因为它们包含大量信息，并且很好地描述了数据点。例如，如果我们有一个关于人的数据集，属性可以是诸如发色、身高、体重、眼睛颜色等信息。
- en: In mathematical terms, however, each additional attribute means a new dimension
    in the space and therefore a significant increase in possibilities. This becomes
    clear from the following example, in which we want to find out which customers
    buy which products. In the first step, we only look at the age of the prospective
    customers and whether they have bought the product. We can still depict this relatively
    easily in a two-dimensional diagram.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，从数学的角度来看，每个额外的属性意味着空间中的新维度，因此可能性显著增加。这一点可以从以下例子中清楚地看出，我们想要找出哪些客户购买了哪些产品。在第一步中，我们只关注潜在客户的年龄以及他们是否购买了该产品。我们仍然可以相对容易地在二维图中描述这一点。
- en: '![Diagram of Buyers divided by Age | Source: Author](../Images/4dce39712720c0710810fd2570dc99a2.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![按年龄划分的买家图示 | 来源：作者](../Images/4dce39712720c0710810fd2570dc99a2.png)'
- en: 'Diagram of Buyers divided by Age | Source: Author'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 按年龄划分的买家图示 | 来源：作者
- en: As soon as we add more information about the customer, things get a little more
    complex. The information on the customer’s income would mean a new axis on which
    the numerical income is mapped. So the two-dimensional diagram becomes a three-dimensional
    one. The additional attribute "gender" would lead to a fourth dimension and so
    on.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们添加更多关于客户的信息，事情就会变得稍微复杂一些。关于客户收入的详细信息意味着在数值收入上映射的新轴。因此，二维图变成了三维图。额外的属性“性别”会导致第四维度，依此类推。
- en: When working with data, it is desirable to have a lot of attributes and information
    in the data set to give the model many opportunities to recognize structures in
    the data. However, it can also lead to serious problems, as the name Curse of
    Dimensionality suggests.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理数据时，最好在数据集中拥有大量的属性和信息，以便给模型提供许多机会来识别数据中的结构。然而，这也可能导致严重的问题，正如维度灾难这个名字所暗示的。
- en: '**Data Sparsity**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据稀疏性**'
- en: The example shown illustrates a problem that occurs with many attributes. Due
    to the large number of dimensions, the so-called data space, i.e. the number of
    values a dataset can take on, also grows. This can lead to what is known as data
    sparsity meaning that the training data set used to train the model does not contain
    certain values at all or only very rarely. As a result, the model only delivers
    poor results for these marginal cases.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 所示的例子说明了许多属性中可能出现的问题。由于维度众多，所谓的数据空间，即数据集可以取的值的数量也增加。这可能导致所谓的数据稀疏性，即用于训练模型的训练数据集根本不包含某些值，或者只非常罕见地包含这些值。因此，模型对这些边缘案例只能提供较差的结果。
- en: Let’s assume that we examine 1,000 customers in our example, as it would be
    too time-consuming to survey even more customers or this data is simply not available.
    All age groups from young to old may be well represented among these customers.
    However, if the additional dimension of income is added, it becomes less likely
    that the possible characteristics, such as "young" and "high income" or "old"
    and "medium income", will occur and be backed up with enough data points.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们假设在我们的例子中检查了1,000名客户，因为调查更多的客户会花费太多时间，或者这些数据根本不可用。所有年龄段，从年轻到老年，都可能在这些客户中得到很好的代表。然而，如果增加了收入这一额外维度，那么像“年轻”和“高收入”或“老年”和“中等收入”这样的可能特征出现的可能性就会降低，并且需要有足够的数据点来支持。
- en: '**Distance Concentration**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**距离集中**'
- en: If you want to evaluate the similarity of different data sets in the field of
    machine learning, distance functions are often used for this. The most common
    clustering algorithms, such as [k-means clustering](https://databasecamp.de/en/ml/k-means-clustering),
    rely on calculating the distance between points and assigning them to a cluster
    depending on their size. In multidimensional spaces, however, it can quickly become
    the case that all points are at a similar distance from each other so it seems
    almost impossible to separate them.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习的领域中，如果你想评估不同数据集的相似性，通常会使用距离函数来进行。最常见的聚类算法，如[k-means聚类](https://databasecamp.de/en/ml/k-means-clustering)，依赖于计算点之间的距离，并根据其大小将它们分配到簇中。然而，在多维空间中，所有点可能都处于彼此相似的距离上，这似乎几乎不可能将它们分开。
- en: We are also familiar with this phenomenon from everyday life. If you take a
    photo of two objects, such as two trees, they can look very close to each other
    in the picture, as it is only a two-dimensional image. In real life, however,
    the trees may be several meters apart, which only becomes clear in three dimensions.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也熟悉这种日常生活中的现象。如果你拍摄两张物体的照片，比如两棵树，它们在图片中看起来可能非常接近，因为那只是一个二维图像。然而，在现实生活中，这些树可能相距几米，这一点只有在三维空间中才能变得清晰。
- en: All these problems, which can occur in connection with many dimensions, are
    summarized under the term Curse of Dimensionality.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些问题，都与许多维度相关联，都概括在“维度诅咒”这个术语下。
- en: What are the Goals of Dimensionality Reduction?
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 维度降低的目标是什么？
- en: 'Dimensionality reduction primarily pursues three primary goals: Improving model
    performance, visualizing data, and increasing processing speed. We will examine
    these in more detail in the following section.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 维度降低主要追求三个主要目标：提高模型性能、可视化数据和提高处理速度。我们将在下一节中更详细地探讨这些目标。
- en: '**Improving Model Performance**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**提高模型性能**'
- en: One of the main goals of dimensionality reduction is to improve model performance.
    By reducing the number of variables in a dataset, a less complex model can be
    used, which in turn reduces the risk of overfitting.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 维度降低的主要目标之一是提高模型性能。通过减少数据集中的变量数量，可以使用更简单的模型，这反过来又降低了过拟合的风险。
- en: Models that have a large number of parameters and are therefore highly complex
    tend to overfit the training dataset and the noise in the data. As a result, the
    model delivers poorer results with new data that does not contain this noise,
    while the accuracy of the training data set is very good. This phenomenon is known
    as overfitting. During dimensionality reduction, unimportant or redundant features
    are removed from the data set, which reduces the risk of overfitting. As a result,
    the model delivers better quality for new, unseen data.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 具有大量参数且因此高度复杂的模型往往会过拟合训练数据集和数据中的噪声。结果，当模型面对不包含这种噪声的新数据时，其结果较差，而训练数据集的准确性非常好。这种现象被称为过拟合。在维度降低过程中，从数据集中移除不重要的或冗余的特征，这降低了过拟合的风险。因此，模型对新出现的未见数据提供了更好的质量。
- en: '**Visualization of Data**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据可视化**'
- en: If you want to visualize data sets with many features, you face the challenge
    of mapping all this information in a two- or at most three-dimensional space.
    Any dimensionality beyond this is no longer directly tangible for us humans, but
    it is easiest to assign a separate dimension to each feature in the data set.
    Therefore, with high-dimensional data sets, we are often faced with the problem
    that we cannot simply visualize the data to gain an initial understanding of the
    peculiarities of the data and, for example, to recognize whether there are outliers.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要可视化具有许多特征的数据集，你将面临在二维或最多三维空间中映射所有这些信息的挑战。对于人类来说，任何超出这个范围的维度都不再是直接可感知的，但最容易的方法是将数据集中的每个特征分配给一个单独的维度。因此，对于高维数据集，我们经常面临的问题是我们无法简单地可视化数据以获得对数据特性的初步了解，例如，识别是否存在异常值。
- en: Dimensionality reduction helps to reduce the number of dimensions to such an
    extent that visualization in two- or three-dimensional space is possible. This
    makes it easier to better understand the relationships between the variables and
    the data structures.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 维度降低有助于将维度减少到这样的程度，以至于在二维或三维空间中进行可视化成为可能。这使得更好地理解变量之间的关系和数据结构变得更容易。
- en: '**Increasing the Processing Speed**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**提高处理速度**'
- en: Computing time and the necessary resources play a major role in the implementation
    of projects, especially for machine learning and deep learning algorithms. Often,
    only limited resources are available, which should be used optimally. By removing
    redundant features from the data set at an early stage, you not only save time
    and computing power during data preparation but also when training the model,
    without having to accept lower performance.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 计算时间和必要的资源在项目的实施中起着重要作用，尤其是在机器学习和深度学习算法中。通常，只有有限的资源可用，这些资源应该被优化使用。通过在早期阶段从数据集中移除冗余特征，你不仅可以在数据准备期间节省时间和计算能力，而且在训练模型时也可以，而不必接受较低的性能。
- en: In addition, dimensionality reduction makes it possible to use simpler models
    that not only require less power during initial training but can also perform
    calculations faster later during operation. This is an important factor, especially
    for real-time calculations.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，降维使得可以使用更简单的模型成为可能，这些模型不仅在进行初始训练时需要更少的能量，而且在操作期间的计算速度也更快。这是一个重要的因素，尤其是在实时计算中。
- en: Overall, dimensionality reduction is an important method for improving data
    analysis and building more robust machine-learning models. It is also an important
    step in the visualization of data.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，降维是提高数据分析质量和构建更稳健的机器学习模型的重要方法。它也是数据可视化的重要步骤。
- en: Which Methods are used for Dimensionality Reduction?
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 哪些方法用于降维？
- en: In practice, various methods for dimensionality reduction have become established,
    three of which are explained in more detail below. Depending on the application
    and the structure of the data, these methods already cover a broad spectrum and
    can be used for most practical problems.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，已经建立了各种降维方法，以下详细解释了其中三种。根据应用和数据结构的不同，这些方法已经覆盖了广泛的范围，并且可以用于大多数实际问题。
- en: Principal Component Analysis
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 主成分分析
- en: '[Principal component analysis (PCA)](https://databasecamp.de/en/statistics/principal-component-analysis-en)
    assumes that several variables in a data set possibly measure the same thing,
    i.e. are correlated. These different dimensions can be mathematically combined
    into so-called principal components without compromising the significance of the
    data set. The shoe size and height of a person, for example, are often correlated
    and can therefore be replaced by a common dimension to reduce the number of input
    variables.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '[主成分分析 (PCA)](https://databasecamp.de/en/statistics/principal-component-analysis-en)
    假设数据集中的一些变量可能测量的是同一件事情，即它们是相关的。这些不同的维度可以通过数学方法组合成所谓的主成分，而不会损害数据集的重要性。例如，一个人的鞋码和身高通常相关，因此可以用一个共同的维度来代替，以减少输入变量的数量。'
- en: 'Principal component analysis describes a method for mathematically calculating
    these components. The following two key concepts are central to this:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 主成分分析描述了一种数学计算这些成分的方法。以下两个关键概念是这一方法的中心：
- en: 'The **covariance matrix** is a matrix that specifies the pairwise covariances
    between two different dimensions of the data space. It is a square matrix, i.e.
    it has as many rows as columns. For any two dimensions, the covariance is calculated
    as follows:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**协方差矩阵**是一个指定数据空间中两个不同维度之间成对协方差的矩阵。它是一个方阵，即它有与列数相同的行数。对于任何两个维度，协方差按以下方式计算：'
- en: '![](../Images/c174e2cce169b8296e698518afbc03c4.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c174e2cce169b8296e698518afbc03c4.png)'
- en: 'Here *n* stands for the number of data points in the data set, _X*i* is the
    value of the dimension *X* of the *i*-th data point and X̅ is the mean value of
    the dimension *X* for all *n* data points. As can be seen from the formula, the
    covariances between two dimensions do not depend on the order of the dimensions,
    so the following applies *COV(X,Y) = COV(Y,X)*. These values result in the following
    covariance matrix *C* for the two dimensions *X* and *Y*:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里 *n* 代表数据集中数据点的数量，_X*i* 是第 *i*- 个数据点维度 *X* 的值，X̅ 是所有 *n* 个数据点维度 *X* 的平均值。从公式中可以看出，两个维度之间的协方差不依赖于维度的顺序，因此以下成立
    *COV(X,Y) = COV(Y,X)*。这些值导致以下协方差矩阵 *C* 对于两个维度 *X* 和 *Y*：
- en: '![](../Images/a4a43133d78dc0a669df7238eb5d5343.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a4a43133d78dc0a669df7238eb5d5343.png)'
- en: 'The covariance of two identical dimensions is simply the variance of the dimension
    itself, i.e:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 两个相同维度的协方差简单地是该维度的方差，即：
- en: '![](../Images/6ba49951333334dea9dbfadf0908d146.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6ba49951333334dea9dbfadf0908d146.png)'
- en: 'The covariance matrix is the first important step in the principal component
    analysis. Once this matrix has been created, the **eigenvalues** and **eigenvectors**
    can be calculated from it. Mathematically, the following equation is solved for
    the eigenvalues:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 协方差矩阵是主成分分析中的第一步重要步骤。一旦创建了该矩阵，就可以从其中计算出**特征值**和**特征向量**。从数学上讲，以下方程用于求解特征值：
- en: '![](../Images/7fa9509413563eac2253e2680873b5d1.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7fa9509413563eac2253e2680873b5d1.png)'
- en: 'Here *λ* is the desired eigenvalue and *I* is the unit matrix of the same size
    as the covariance matrix *C*. When this equation is solved, one or more eigenvalues
    of a matrix are obtained. They represent the linear transformation of the matrix
    in the direction of the associated eigenvector. An associated eigenvector can
    therefore also be calculated for each eigenvalue, for which the slightly modified
    equation must be solved:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *λ* 是所需的特征值，*I* 是与协方差矩阵 *C* 同大小的单位矩阵。当解这个方程时，可以得到矩阵的一个或多个特征值。它们代表了矩阵在相关特征向量方向上的线性变换。因此，对于每个特征值，也可以计算一个相关的特征向量，需要解以下略微修改的方程：
- en: '![](../Images/c091897f44000b814871a7ca558bea03.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c091897f44000b814871a7ca558bea03.png)'
- en: Where *v* is the desired eigenvector, according to which the equation must be
    solved accordingly. In the case of the covariance matrix, the eigenvalue corresponds
    to the variance of the eigenvector, which in turn represents a principal component.
    Each eigenvector is therefore a mixture of different dimensions of the data set,
    the principal components. The corresponding eigenvalue therefore indicates how
    much variance of the data set is explained by the eigenvector. The higher this
    value, the more important the principal component is, as it contains a large proportion
    of the information in the data set.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *v* 是所需的特征向量，必须根据该方程相应地求解。在协方差矩阵的情况下，特征值对应于特征向量的方差，它反过来又代表一个主成分。因此，每个特征向量是数据集不同维度的混合，即主成分。因此，相应的特征值表明特征向量解释了数据集多少方差。这个值越高，主成分就越重要，因为它包含了数据集中大量信息。
- en: Therefore, after calculating the eigenvalues, they are sorted by size and the
    eigenvalues with the highest values are selected. The corresponding eigenvectors
    are then calculated and used as principal components. This results in a dimension
    reduction, as only the principal components are used to train the model instead
    of the individual features of the data set.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在计算特征值后，它们按大小排序，并选择具有最高值的特征值。然后计算相应的特征向量，并用作主成分。这导致降维，因为模型训练只使用主成分，而不是数据集的各个特征。
- en: t-Distributed Stochastic Neighbor Embedding (t-SNE)
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: t-Distributed Stochastic Neighbor Embedding (t-SNE)
- en: '[t-Distributed Stochastic Neighbor Embedding](https://databasecamp.de/en/statistics/tsne-en),
    or t-SNE for short, approaches the problem of dimensionality reduction differently
    by attempting to create a new, lower-dimensional space that adopts the distances
    of the data points from the higher-dimensional space as far as possible. The basic
    idea of this becomes clear in the following example.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '[t-Distributed Stochastic Neighbor Embedding](https://databasecamp.de/en/statistics/tsne-en)，简称
    t-SNE，通过尝试创建一个新空间，尽可能采用数据点从高维空间到新空间的距离，以不同的方式解决降维问题。以下示例清楚地说明了这一基本思想。'
- en: It is not easy to transfer data sets from a high dimensionality to a low dimensionality
    while retaining as much information as possible from the data set. The following
    figure shows a simple, two-dimensional data set with a total of 50 data points.
    Three different clusters can be identified, which are also well separated from
    each other. The yellow cluster is furthest away from the other two clusters, while
    the purple and blue data points are closer to each other.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在尽可能保留数据集信息的同时，将高维数据集转换为低维数据集并不容易。以下图展示了一个简单的二维数据集，包含总共50个数据点。可以识别出三个不同的簇，它们彼此之间也很好地分离。黄色簇距离其他两个簇最远，而紫色和蓝色数据点彼此更近。
- en: '![Two-dimensional data for t-SNE | Source: Author](../Images/65bd73c88b33e0734441f314b003358e.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![t-SNE 的二维数据 | 来源：作者](../Images/65bd73c88b33e0734441f314b003358e.png)'
- en: 'Two-dimensional data for t-SNE | Source: Author'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: t-SNE 的二维数据 | 来源：作者
- en: The aim now is to convert this two-dimensional data set into a lower dimension,
    i.e. into one dimension. The simplest approach for this would be to represent
    the data either only by its X or Y coordinate.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 目前的目标是把这个二维数据集转换到低维度，即一维。为此，最简单的方法是只通过数据的X或Y坐标来表示数据。
- en: '![Dimensionality reduction by X- or Y-coordinate | Source: Author](../Images/f226225f56bad29d9b8152676c3b2897.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![通过X或Y坐标进行降维 | 来源：作者](../Images/f226225f56bad29d9b8152676c3b2897.png)'
- en: 'Dimensionality reduction by X- or Y-coordinate | Source: Author'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 通过X或Y坐标进行降维 | 来源：作者
- en: However, it is clear that this simple transformation has lost much of the information
    in the data set and gives a different picture than the original two-dimensional
    data. If only the X coordinates are used, it looks as if the yellow and purple
    clusters overlap and that all three clusters are roughly equidistant from each
    other. If, on the other hand, only the Y coordinates are used for dimensionality
    reduction, the yellow cluster is much better separated from the other clusters,
    but it looks as if the purple and blue clusters overlap.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，很明显，这种简单的转换已经丢失了数据集的大部分信息，并且与原始二维数据给出了不同的图像。如果只使用X坐标，看起来黄色和紫色簇有重叠，而且三个簇大致等距。另一方面，如果只使用Y坐标进行降维，黄色簇与其他簇的分离度更好，但看起来紫色和蓝色簇有重叠。
- en: The basic idea of t-SNE is that the distances from the high dimensionality are
    transferred to the low dimensionality as far as possible. To do this, it uses
    a stochastic approach and converts the distances between points into a probability
    that indicates how likely it is that two random points are next to each other.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: t-SNE的基本思想是将高维度的距离尽可能转移到低维度。为此，它使用一种随机方法，并将点之间的距离转换为表示两个随机点相邻可能性的概率。因此得名“随机邻域嵌入”。
- en: More precisely, it is a conditional probability that indicates how likely it
    is that one point would choose the other point as a neighbor. Hence the name "Stochastic
    Neighbor Embedding".
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 更确切地说，这是一个条件概率，表示一个点选择另一个点作为邻居的可能性有多大。因此得名“随机邻域嵌入”。
- en: '![Dimensionality reduction according to t-SNE | Source: Author](../Images/3d12601905868f0c6ba79136e5648a2c.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![根据t-SNE进行降维 | 来源：作者](../Images/3d12601905868f0c6ba79136e5648a2c.png)'
- en: 'Dimensionality reduction according to t-SNE | Source: Author'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 根据t-SNE进行降维 | 来源：作者
- en: As you can see, this approach leads to a much better result, in which the three
    different clusters can be clearly distinguished from one another. It is also clear
    that the yellow data points are significantly further away from the other data
    points and the blue and purple clusters are somewhat closer together. To better
    understand the details of this approach, you are welcome to read our detailed
    [article](https://databasecamp.de/en/statistics/tsne-en) on this topic.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，这种方法导致的结果要好得多，其中三个不同的簇可以清楚地相互区分。很明显，黄色数据点与其他数据点相比明显更远，而蓝色和紫色簇则相对更靠近。为了更好地理解这种方法的具体细节，您欢迎阅读我们关于这个主题的详细[文章](https://databasecamp.de/en/statistics/tsne-en)。
- en: '[**Mastering t-SNE: A Comprehensive Guide to Understanding and Implementation
    in Python**](https://towardsdatascience.com/mastering-t-sne-a-comprehensive-guide-to-understanding-and-implementation-in-python-480929bfe6f4)'
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**掌握t-SNE：Python中理解和实现的全面指南**](https://towardsdatascience.com/mastering-t-sne-a-comprehensive-guide-to-understanding-and-implementation-in-python-480929bfe6f4)'
- en: Linear Discriminant Analysis
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 线性判别分析
- en: Linear Discriminant Analysis (LDA for short) aims to identify and maximize the
    separability between classes by projecting the data onto a smaller dimension.
    In contrast to other methods, it places particular emphasis on maximizing the
    separability between classes and is therefore particularly important for classification
    tasks.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 线性判别分析（简称LDA）旨在通过将数据投影到较小的维度来识别和最大化类别之间的可分性。与其他方法相比，它特别强调最大化类别之间的可分性，因此在分类任务中尤为重要。
- en: 'Two central key figures are calculated:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 计算了两个核心关键指标：
- en: '**Within-Class Scatter**: This key figure measures the variability within a
    class of data. The lower this value, the more similar the data points are within
    a class and the more the classes are separated.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类内散布**：这个关键指标衡量的是数据集中一个类别的可变性。这个值越低，一个类别内的数据点越相似，类别之间的分离度越高。'
- en: '**Between-class scatter**: This scatter in turn measures the variability between
    the mean values of the classes. This value should be as large as possible, as
    this indicates that the classes are easier to separate from each other.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类间散度**：这种散度反过来衡量的是类别均值之间的变异性。这个值应该尽可能大，因为这表明类别更容易相互分离。'
- en: Simply put, these key figures are used to form matrices and calculate their
    eigenvalues. The eigenvectors for the largest eigenvalues are in turn the dimensions
    in the new feature space, which has fewer dimensions than the original data set.
    All data points can then be projected onto the eigenvectors, which reduces the
    dimensions.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这些关键数字被用来形成矩阵并计算它们的特征值。最大的特征值对应的特征向量是新特征空间的维度，这个空间的维度比原始数据集少。然后所有数据点都可以投影到特征向量上，从而降低维度。
- en: Linear Discriminant Analysis is particularly suitable for applications in which
    the classes are already known and the data is also clearly labeled. It uses this
    class information from supervised learning to find a low-dimensional space that
    separates the classes as well as possible.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 线性判别分析特别适合于已知类别且数据也清晰标记的应用。它使用来自监督学习的类别信息来找到一个尽可能将类别分开的低维空间。
- en: A disadvantage of LDA is that the maximum reduction to a dimensional space is
    limited and depends on the number of classes. A data set with (n) classes can
    therefore be reduced to a maximum of (n-1) dimensions. In concrete terms, this
    means, for example, that a data set with three different classes can be reduced
    to a two-dimensional space.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: LDA（线性判别分析）的一个缺点是，降低到维度空间的最大程度是有限的，并且取决于类别的数量。因此，具有（n）个类别的数据集可以降低到最多（n-1）个维度。具体来说，这意味着，例如，具有三个不同类别的数据集可以降低到二维空间。
- en: This approach of dimensionality reduction is also particularly suitable for
    large data sets, as the computing effort is only moderate and scales well with
    the amount of data so that the computing effort is kept within limits even with
    large amounts of data.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这种维度降低方法也特别适合于大数据集，因为计算工作量适中，并且与数据量很好地成比例，即使在大量数据的情况下，计算工作量也能保持在合理范围内。
- en: What are the Challenges of Dimensionality Reduction?
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 维度降低的挑战有哪些？
- en: Dimensionality reduction is an important step in data pre-processing to increase
    the generalizability of machine learning models and the general model performance
    and possibly save computing power. However, the methods also bring with them some
    challenges that should be considered before use. These include
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 维度降低是数据预处理中的一个重要步骤，旨在提高机器学习模型的泛化能力和一般模型性能，并可能节省计算能力。然而，这些方法也带来了一些在使用前应该考虑的挑战。这些包括
- en: '**Loss of information**: Although the methods presented attempt to retain as
    much variance, i.e. information content, of the data set, some information is
    inevitably lost when dimensions are reduced. Important data can also be lost,
    which may lead to poorer analyses or model results. Therefore, the resulting model
    may be less accurate or less powerful.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**信息丢失**：虽然所提出的方法试图保留尽可能多的数据集方差，即信息内容，但在降低维度时不可避免地会丢失一些信息。重要的数据也可能丢失，这可能导致分析或模型结果较差。因此，得到的模型可能不够准确或不够强大。'
- en: '**Interpretability**: Most algorithms used for dimensionality reduction provide
    a low-dimensional space that no longer contains the original dimensions, but a
    mathematical summary of them. Principal component analysis, for example, uses
    the eigenvectors, which are a summary of various dimensions from the data set.
    As a result, interpretability is lost to a certain extent, as the previous dimensions
    are easier to measure and visualize. Especially in use cases where transparency
    is important and the results require a practical interpretation, this can be a
    decisive disadvantage.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性**：大多数用于维度降低的算法提供了一个不再包含原始维度的低维空间，而是它们的数学摘要。例如，主成分分析使用特征向量，这是数据集中各种维度的摘要。因此，可解释性在一定程度上丢失了，因为之前的维度更容易测量和可视化。特别是在透明度很重要且结果需要实际解释的使用案例中，这可能是一个决定性的缺点。'
- en: '**Scaling**: Performing dimensionality reductions is computationally intensive
    and takes time, especially for large data sets. In real-time applications, however,
    this time is not available, as the computing time of the model is added to this.
    Computing-intensive models in particular, such as t-SNE or autoencoders, quickly
    fall out because they take too long to make live predictions.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缩放**：执行维度降低计算密集且耗时，尤其是对于大数据集来说。然而，在实时应用中，这种时间是不够的，因为模型的计算时间也加到了这个时间上。特别是计算密集型的模型，如t-SNE或自动编码器，由于它们需要太长时间来做出实时预测，因此很快就会失效。'
- en: '**Selecting the method**: Depending on the application, the dimensionality
    reduction methods presented have their strengths and weaknesses. The selection
    of a suitable algorithm therefore plays an important role, as it has a significant
    influence on the results. There is no one-size-fits-all solution and a new decision
    must always be made based on the application.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择方法**：根据应用的不同，所提出的维度降低方法各有其优势和劣势。因此，选择一个合适的算法起着至关重要的作用，因为它对结果有重大影响。没有一种万能的解决方案，并且必须始终根据应用做出新的决策。'
- en: Dimensionality reduction has many advantages and is an integral part of data
    pre-processing in many applications. However, the disadvantages and challenges
    mentioned must also be taken into account to train an efficient model.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 维度降低有许多优点，并且在许多应用中是数据预处理的一个基本部分。然而，提到的缺点和挑战也必须被考虑到，以便训练一个高效的模型。
- en: This is what you should take with you
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这是你应该带在身边的
- en: Dimensionality reduction is a method of reducing the number of dimensions, i.e.
    variables, in a data set while retaining as much information content as possible.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 维度降低是一种在尽可能保留信息内容的同时，减少数据集中维度（即变量）数量的方法。
- en: With many input variables, the so-called curse of dimensionality arises. This
    leads to problems such as data sparsity or distance concentration.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当有众多输入变量时，所谓的维度诅咒就会出现。这导致诸如数据稀疏或距离集中等问题。
- en: Dimensionality reduction often leads to a lower probability of overfitting,
    better visualization, and optimized computing power when training machine learning
    models.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 维度降低通常会导致在训练机器学习模型时过拟合的概率降低、可视化更好以及计算能力优化。
- en: The most common dimensionality reduction methods include principal component
    analysis, t-SNE, and LDA.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最常见的维度降低方法包括主成分分析、t-SNE和LDA。
- en: However, dimensionality reduction also has disadvantages, such as poorer interpretability
    or loss of information.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然而，维度降低也有其缺点，例如可解释性较差或信息丢失。
