- en: 'Experiments Illustrated: Can $1 Change Behavior More Than $100?'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实验图解：1美元能否比100美元更能改变行为？
- en: 原文：[https://towardsdatascience.com/experiments-illustrated-can-1-change-behavior-more-than-100/](https://towardsdatascience.com/experiments-illustrated-can-1-change-behavior-more-than-100/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/experiments-illustrated-can-1-change-behavior-more-than-100/](https://towardsdatascience.com/experiments-illustrated-can-1-change-behavior-more-than-100/)'
- en: I currently lead a small data team at a small tech company. With everything
    small, we have a lot of autonomy over what, when, and how we run experiments.
    In this series, I’m opening the vault from our years of experimenting, each story
    highlighting a key concept related to experimentation.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我目前在一个小型科技公司领导一个小型数据团队。由于规模较小，我们在实验的什么、何时以及如何进行方面拥有很大的自主权。在这个系列中，我将分享我们多年实验的宝库，每个故事都突出与实验相关的一个关键概念。
- en: '[Georandomization & How we optimized premium listings on our job board](https://towardsdatascience.com/experiments-illustrated-how-we-optimized-premium-listings-on-our-nursing-job-board/)'
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Georandomization & How we optimized premium listings on our job board](https://towardsdatascience.com/experiments-illustrated-how-we-optimized-premium-listings-on-our-nursing-job-board/)'
- en: '[Multiple Comparisons & How we saved $1M with random assignment](https://towardsdatascience.com/experiments-illustrated-how-random-assignment-saved-us-1m-in-marketing-spend/)'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Multiple Comparisons & How we saved $1M with random assignment](https://towardsdatascience.com/experiments-illustrated-how-random-assignment-saved-us-1m-in-marketing-spend/)'
- en: And here we’ll share a surprising result from an early test on our referral-bonus
    program and use it to discuss how you might narrow your decision set for experiments
    (at least when they involve humans).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将分享我们早期测试中关于推荐奖金计划的令人惊讶的结果，并利用它来讨论你如何缩小实验的决策范围（至少当它们涉及人类时）。
- en: 'Background: It’s COVID and we need to hire a zillion nurses'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景：现在是COVID时期，我们需要雇佣成千上万的护士
- en: '[IntelyCare](https://www.intelycare.com/) helps healthcare facilities match
    with nursing talent. We’re a glorified nurse-recruiting machine and so we’re always
    looking to recruit more effectively. Nurses come to us from many sources, but
    those who come via referrals earn higher reviews and stay with us longer.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '[IntelyCare](https://www.intelycare.com/) 帮助医疗机构与护理人才匹配。我们是一个被美化的护士招聘机器，所以我们总是寻求更有效地招聘。护士来自许多渠道，但那些通过推荐来的护士获得更高的评价，并且在我们这里停留的时间更长。'
- en: The year was 2020\. IntelyCare was a baby company (still is by most standards).
    Our app was new and most features were still primitive. Some examples…
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 那一年是2020年。IntelyCare是一家初创公司（按照大多数标准来说仍然是）。我们的应用程序是新的，大多数功能仍然很原始。一些例子...
- en: We had a way for IntelyPros to share a referral link with friends but had no
    financial incentives to do so.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们有让IntelyPros与朋友分享推荐链接的方式，但没有提供财务激励措施。
- en: Our application process was a major slog. We required a small mountain of documents
    for review in addition to a phone interview and references. Only a small subset
    of applicants made it all the way through to working.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的申请流程非常繁琐。除了电话面试和推荐信外，我们还需要审查一大堆文件。只有一小部分申请者能够通过所有流程并最终工作。
- en: During a recruiting brainstorm, we latched onto the idea of referrals and agreed
    that adding financial incentives would be easy to test. Something like, “Get $100
    when your friend starts working.” Zero creativity there, but an idea doesn’t have
    to be novel to be good.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在一次招聘头脑风暴中，我们抓住了推荐的想法，并同意增加财务激励措施是容易测试的。比如，“当你的朋友开始工作时，你可以获得100美元。”那里没有多少创意，但一个想法不需要新颖才能变得好。
- en: Knowing that many people might refer again and again if they earned a bonus,
    and knowing that our application process was nothing short of a gauntlet, we also
    wondered if it might be better instead to give clinicians a *small* prize when
    their friends *start* an application.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 知道许多人如果获得奖金可能会反复推荐，并且知道我们的申请流程就像一场考验，我们也想知道是否在他们的朋友*开始*申请时给临床医生一个*小*奖励会更好。
- en: A small prize for something easy vs a big prize for something difficult? I mean,
    it depends on many things. There’s only one way to know which is best, and that’s
    to try them out.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 对于简单的事情小奖励，还是对于困难的事情大奖励？我的意思是，这取决于很多因素。唯一知道哪种方式最好的方法就是尝试它们。
- en: The referral test
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考测试
- en: 'We randomly assigned clinicians to one of two experiences:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们随机将临床医生分配到两种体验之一：
- en: The clinician earns an extra $1/hour on their next shift when their referral
    starts a job application. (Super easy. Starting an application takes 1–2 minutes.)
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当他们的推荐开始工作申请时，临床医生在下次班次中将额外获得每小时1美元的报酬。（超级简单。开始申请只需1-2分钟。）
- en: The clinician earns $100 when their referral completes their first shift. (Super
    hard. Some nurses race through it, but most applicants take several weeks or even
    months if they finish at all).
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当他们的推荐完成第一次班次时，临床医生会得到$100。（非常困难。一些护士会快速完成，但大多数申请者如果完成的话，需要几周甚至几个月）。
- en: We held out an equal third of clinicians as a control and let clinicians know
    the rules via a series of emails. There’s always a risk of spillovers in a test
    like this, but the thought of one group stealing all the referrals from the other
    group seemed like a stretch, so we felt good about randomizing across individuals.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将三分之一的临床医生作为对照组，并通过一系列电子邮件通知他们规则。在这种测试中，总是存在溢出的风险，但想到一个群体从另一个群体那里窃取所有推荐的想法似乎有些牵强，所以我们觉得在个人层面上进行随机化是令人放心的。
- en: '**Decidedly non-social:** Many people hear these two options and ask, “Did
    you think of trying prosocial incentives?” (Example: I refer you, you do something,
    we *both* get a prize). [Studies show they’re often better than individual incentives](https://journals.sagepub.com/doi/abs/10.1177/0022243719888440)
    and they’re quite common ([instacart](https://www.instacart.com/help/section/866017999/3183254040),
    [airbnb](https://www.airbnb.com/help/article/84), [robinhood](https://robinhood.com/us/en/support/articles/invite-friends-pick-stock/),…).
    We considered these, but our finance team became very sad at the idea of us sending
    $1 each to hundreds of people who may not ever become employees.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**明显非社会性的：**许多人听到这两个选项后会问，“你们想过尝试利他性激励措施吗？”（例如：我推荐你，你做某事，我们**都**得到奖品）。[研究表明，它们通常比个人激励更好](https://journals.sagepub.com/doi/abs/10.1177/0022243719888440)，而且它们相当普遍（[instacart](https://www.instacart.com/help/section/866017999/3183254040),
    [airbnb](https://www.airbnb.com/help/article/84), [robinhood](https://robinhood.com/us/en/support/articles/invite-friends-pick-stock/),…）。我们考虑过这些，但我们的财务团队对我们每人向可能永远不会成为员工的数百人发送$1的想法感到非常沮丧。'
- en: I guess Quickbooks doesn’t like that? At some point, you just accept that it’s
    best to not mess with the finance team.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我想Quickbooks不喜欢这样？在某个时候，你只是接受最好不要去打扰财务团队。
- en: Since the $1/hr reward could not be prosocial without becoming a major headache,
    we limited payouts in both programs to the referring individual only. This gives
    us two referral programs where the key differences are timing and the payout amount.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 由于$1/小时奖励如果不成为主要头痛就无法成为利他性的，我们在两个计划中都限制了奖金的支付，只支付给推荐的个人。这给了我们两个推荐计划，它们的关键区别在于时间和奖金金额。
- en: Turns out timing and presentation of incentives matter. A lot. Social incentives
    also matter. A lot. If you’re trying to growth-hack your referral program, you
    would be smart to consider both of these dimensions before increasing the payout.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，激励措施的时间和呈现方式非常重要。同样，社会激励也很重要。如果你正在尝试通过增长黑客技术来优化你的推荐计划，那么在增加奖金之前考虑这两个维度是非常明智的。
- en: 'Nerdy aside: Thinking about things to test'
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 顺便提一下：思考要测试的事情
- en: Product data science, with minimal exception, is interested in how humans interact
    with things. Often it’s a website or an app, but it could be a physical object
    like a pair of headphones, a thermostat, or a sign on the highway.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 产品数据科学，除极少数例外，主要关注人类如何与事物互动。通常是一个网站或应用程序，但也可能是像一副耳机、恒温器或高速公路上的标志这样的物理对象。
- en: The science comes from changing the product and watching how humans change their
    behavior as a result. And you can’t do better than watching your customers interact
    with your product in the wild to learn whether a change was helpful or not.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 科学来源于改变产品并观察人类如何因此改变他们的行为。而且，没有比观察你的客户在野外如何与你产品互动来学习一个变化是否有所帮助更好的方法了。
- en: But you can’t test *everything*. There are infinite things to test and any group
    tasked with experimenting will have to cut things down to a finite set of ideas.
    Where do you start?
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 但你不能测试**所有**事情。有无限多的事情要测试，任何被分配进行实验的团队都必须将想法削减到有限的一组。你从哪里开始？
- en: Start with the product itself. Ask people who are familiar with it how they
    like it, what they wish was different, [Sean Ellis](https://medium.productcoalition.com/using-sean-ellis-test-for-measuring-your-product-market-fit-c8ac98053c2c),
    [NPS](https://gramener.medium.com/net-promoter-score-nps-guide-f3dc4980468), [the
    Mom Test](https://www.amazon.com/Mom-Test-customers-business-everyone/dp/1492180742),
    etc. This is the common starting point for product teams and just about everyone
    else.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从产品本身开始。询问熟悉它的人他们喜欢什么，希望有什么不同，[Sean Ellis](https://medium.productcoalition.com/using-sean-ellis-test-for-measuring-your-product-market-fit-c8ac98053c2c)，[NPS](https://gramener.medium.com/net-promoter-score-nps-guide-f3dc4980468)，[妈妈测试](https://www.amazon.com/Mom-Test-customers-business-everyone/dp/1492180742)，等等。这是产品团队和几乎所有其他人的共同起点。
- en: Start with human nature. For many decades Behavioral Scientists have documented
    particular patterns in human behavior. These scientists go by different names
    (behavioral economists, behavioral psychologists, etc.).
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从人性出发。几十年来，行为科学家记录了人类行为中的特定模式。这些科学家有不同的名字（行为经济学家、行为心理学家等）。
- en: In my humble opinion, the 2nd of these starting points is severely underrated.
    Behavioral science has [documented dozens of behavior patterns](https://thedecisionlab.com/biases)
    that can inform how your product might change most effectively.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在我谦卑的意见中，这些起点中的第二个严重被低估了。行为科学已经记录了数十种行为模式[https://thedecisionlab.com/biases](https://thedecisionlab.com/biases)，这些模式可以告知你的产品如何最有效地改变。
- en: A few honorable mentions…
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 几个值得注意的例子...
- en: '[Loss aversion](https://medium.com/user-experience-design-1/loss-aversion-why-the-fear-of-loss-outweighs-the-love-of-gain-bc9d942c30f5):
    people hate losing more than they like winning'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[损失厌恶](https://medium.com/user-experience-design-1/loss-aversion-why-the-fear-of-loss-outweighs-the-love-of-gain-bc9d942c30f5)：人们厌恶损失胜过喜欢赢。'
- en: '[Peak-End](https://medium.com/modern-business/the-peak-end-heuristic-a15aa0a4159d):
    people remember things more favorably when they end on a positive note'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[峰值-终点法则](https://medium.com/modern-business/the-peak-end-heuristic-a15aa0a4159d)：当事情以积极的方式结束时，人们记得更愉快。'
- en: '[Social vs Market Norms](https://medium.com/@andrewpettitt/social-norms-vs-market-norms-644af6588a65):
    everything changes when people pay for goods and services instead of asking for
    favors'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[社会规范与市场规范](https://medium.com/@andrewpettitt/social-norms-vs-market-norms-644af6588a65)：当人们为商品和服务付费而不是寻求帮助时，一切都会改变。'
- en: '[Framing](https://thedecisionlab.com/biases/framing-effect): people make choices
    based on *how* information is presented'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[框架效应](https://thedecisionlab.com/biases/framing-effect)：人们根据信息呈现的方式做出选择。'
- en: '[Left-digit Bias](https://medium.com/@alyjuma/the-left-digit-effect-why-9-matters-fad6e5690cfd):
    perceptions of a price are disproportionately influenced by the leading digit
    ($0.99 = 🔥, $1.01 = 🥱)'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[左位数偏差](https://medium.com/@alyjuma/the-left-digit-effect-why-9-matters-fad6e5690cfd)：价格感知不成比例地受首位数字的影响（$0.99
    = 🔥, $1.01 = 🥱）。'
- en: '[Present Bias](https://medium.com/@coffeeandjunk/present-bias-why-you-go-for-the-junk-food-first-and-plan-healthy-meals-in-the-future-3dc44eb27620):
    people [hate waiting](https://www.youtube.com/watch?v=y0Y7ScfaVHs)'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[当前偏见](https://medium.com/@coffeeandjunk/present-bias-why-you-go-for-the-junk-food-first-and-plan-healthy-meals-in-the-future-3dc44eb27620)：人们[讨厌等待](https://www.youtube.com/watch?v=y0Y7ScfaVHs)。'
- en: These mental shortcuts aren’t a silver bullet for product and marketing. We’ve
    tested many of these in different settings to no effect, but some have worked.
    [Maybe you’ll find $160M under your couch cushions](https://academic.oup.com/restud/article-abstract/90/6/3186/7045819?redirectedFrom=fulltext).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这些心理捷径并不是产品和营销的万能药。我们在不同的环境中测试了许多这些方法，但效果甚微，但有些是有效的。[也许你会在沙发垫下找到1.6亿美元](https://academic.oup.com/restud/article-abstract/90/6/3186/7045819?redirectedFrom=fulltext)。
- en: Zooming in on present bias
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 着眼于当前偏见
- en: Many humans demonstrate a behavior pattern where they prefer small, immediate
    rewards over larger rewards in the future. Social scientists call this [present
    bias](https://www.behavioraleconomics.com/resources/mini-encyclopedia-of-be/present-bias/)
    and measure it with tough questions like…
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人类表现出一种行为模式，即他们宁愿选择小而即时的奖励，也不愿选择未来更大的奖励。社会科学家称之为[当前偏见](https://www.behavioraleconomics.com/resources/mini-encyclopedia-of-be/present-bias/)，并通过像以下这样的难题来衡量它...
- en: Would you rather have $100 now or $200 in a year from now? 🤔
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你更愿意现在得到100美元，还是一年后得到200美元？🤔
- en: '[Would you rather have one marshmallow now or two marshmallows in 15 minutes?](https://en.wikipedia.org/wiki/Stanford_marshmallow_experiment)
    🤔'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[你更愿意现在吃一个棉花糖，还是15分钟后吃两个棉花糖？](https://en.wikipedia.org/wiki/Stanford_marshmallow_experiment)
    🤔'
- en: People who choose immediate, smaller rewards have some measure of present bias.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 选择即时、较小奖励的人有一定的当前偏见。
- en: Present bias can vary across people and circumstances. You could be a patient
    person in most situations. But when you’re hungry or tired… not so much. This
    is one reason why A/B tests are so useful compared to, say, surveys or interviews.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 偏好差异可能因人和环境而异。你可能在大多数情况下都是一个有耐心的人。但当你饥饿或疲倦时……就未必了。这就是为什么与调查或访谈相比，A/B测试如此有用的一个原因。
- en: 'For our experiment, the question is not so different from the lab questions:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的实验，问题并不那么不同，与实验室的问题相似：
- en: Would you rather have ~$8 sometime this week or $100 sometime in the coming
    weeks and maybe never?
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你更愿意在本周某个时候得到~$8，还是在未来几周得到$100，也许永远都得不到？
- en: '**Experiment results**'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**实验结果**'
- en: Many of us (present company included) thought the $100 offer would do best.
    It sounds bigger. It looks better in an email. It’s easy to explain.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们中的许多人（包括我）认为$100的出价会做得最好。听起来更大。在电子邮件中看起来更好。解释起来更容易。
- en: I also thought we might get more *applications* from referrals with the $1/hr
    program, but didn’t think that would carry through to more referrals. I figured
    people would take the money and run.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我也认为我们可能会通过$1/小时的项目从推荐中获得更多申请，但并没有想到这会转化为更多的推荐。我想人们会拿了钱就跑。
- en: To my surprise the $1/hr program delivered more applications via referrals *and
    more working clinicians*, all at a *much* lower cost.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 令我惊讶的是，$1/小时的项目通过推荐获得了更多申请，以及更多正在工作的临床医生，所有这些都在一个*更低*的成本下完成。
- en: '![](../Images/dc9cbcaed1dd22e697b7c36aee6e5db9.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dc9cbcaed1dd22e697b7c36aee6e5db9.png)'
- en: Image by author
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The $100 offer led to a 65% increase in referrals compared to our control group.
    This is huge!. Many people like this type of program because we’re only giving
    rewards when a referral is successful. It feels like the money is well spent.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 与我们的对照组相比，$100的出价导致了推荐增加65%。这是一个巨大的变化！许多人喜欢这种类型的计划，因为我们只在推荐成功时才给予奖励。感觉钱花得值。
- en: The $1/hr offer, however, is even better. Referrals increased by 81% compared
    to our control group. And even though the rewards were smaller and paid out earlier,
    referrals from these IntelyPros still went on to start working for us at about
    the same rate as the $100 group.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，$1/小时出价的效果甚至更好。与我们的对照组相比，推荐增加了81%。尽管奖励较小且支付较早，但这些IntelyPros的推荐仍然以与$100组大致相同的比率开始为我们工作。
- en: Yes, many IntelyPros earned rewards for referrals that applied and then failed
    to cross the finish line, but the math still worked out. Even with an imperfect
    conversion rate from application to working, the total cost per new working IntelyPro
    was less than half of the $100 group’s cost.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，许多IntelyPros因为推荐而获得了奖励，但这些人最终未能完成最后一程，但数学上仍然有效。即使从申请到工作的转化率并不完美，每位新工作的IntelyPro的总成本也低于$100组的一半。
- en: '**ABT: Always be testing**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**ABT：始终进行测试**'
- en: The role that referrals play for a business can change for many reasons. As
    a company becomes bigger and more familiar, referrals become less important. You
    don’t need people to spread the word because the word is already out.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 商业中推荐所扮演的角色可能会因为许多原因而改变。随着公司变得更大、更为人所熟知，推荐变得越来越不重要。你不需要人们去传播消息，因为消息已经传开了。
- en: We ran this test in 2020 during a global pandemic. We ran a smaller-scale test
    a year later and saw similar results. Would we see the same results now, in 2025?
    Hard to say. Things are much different in the healthcare staffing space nowadays.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在2020年全球大流行期间进行了这项测试。一年后，我们进行了一项规模较小的测试，并看到了相似的结果。现在，在2025年，我们会看到相同的结果吗？很难说。如今，医疗人员招聘领域的形势大不相同。
- en: This is yet another reason why testing is so important. Something like referral
    bonuses could work wonders for company A while being a dud for company B. The
    upside of product experiments is that the world is your laboratory. The downside
    is that it’s hard to know what generalizes to other products.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这又是测试之所以重要的另一个原因。像推荐奖金这样的东西可能对公司A有神奇的效果，而对公司B则不然。产品实验的优点是，世界就是你的实验室。缺点是，很难知道什么可以推广到其他产品。
- en: Key takeaways for those who made it this far
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对那些走到这里的人来说的关键要点
- en: When you’re running experiments to improve your product and collect data from
    the humans using your product, behavioral science is a fruitful place to look
    for test ideas.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你进行实验以改进你的产品并从使用你产品的用户那里收集数据时，行为科学是寻找测试想法的一个富有成效的地方。
- en: Sometimes the ideas that seem less great turn out to have the highest impact!
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有时候，看似不太出色的想法最终会带来最大的影响！
- en: Timing and presentation matter for incentives. Before you increase the size
    of some payout, perhaps put some thought into the time and effort required to
    earn that payout.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间和展示方式对激励措施很重要。在你增加某些奖金的金额之前，也许应该考虑一下赚取这笔奖金所需的时间和努力。
