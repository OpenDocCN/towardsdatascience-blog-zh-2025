- en: 'Beyond Glorified Curve Fitting: Exploring the Probabilistic Foundations of
    Machine Learning'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/beyond-glorified-curve-fitting-exploring-the-probabilistic-foundations-of-machine-learning/](https://towardsdatascience.com/beyond-glorified-curve-fitting-exploring-the-probabilistic-foundations-of-machine-learning/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1746060446031" class="mdspan-comment">You see</mdspan> a
    math formula you don’t immediately understand.
  prefs: []
  type: TYPE_NORMAL
- en: Your instinct? Stop reading.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bc0160a7dcbef857be94d03e3a87e296.png)'
  prefs: []
  type: TYPE_IMG
- en: That’s exactly what I told myself when I started reading *Probabilistic Machine
    Learning – An Introduction* by Kevin P. Murphy.
  prefs: []
  type: TYPE_NORMAL
- en: And it was absolutely worth it.
  prefs: []
  type: TYPE_NORMAL
- en: It changed how I think about machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: Sure, some formulas might look complicated at first glance.
  prefs: []
  type: TYPE_NORMAL
- en: But let’s look at the formula to see that what it describes is simple.
  prefs: []
  type: TYPE_NORMAL
- en: When a machine learning model makes a prediction (for example, a classification),
    what is it really doing?
  prefs: []
  type: TYPE_NORMAL
- en: It’s distributing probabilities across all possible outcomes / classes.
  prefs: []
  type: TYPE_NORMAL
- en: And those probabilities must always add up to 100 % — or 1.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a look at an example: Imagine we show the model an image of an animal
    and ask: “What animal is this?”'
  prefs: []
  type: TYPE_NORMAL
- en: 'The model might respond:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Cat: 85%'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Dog: 10%'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Fox: 5%'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add them up?
  prefs: []
  type: TYPE_NORMAL
- en: Exactly 100%.
  prefs: []
  type: TYPE_NORMAL
- en: This means the model believes it’s most likely a cat — but it’s also leaving
    a small chance for dog or fox.
  prefs: []
  type: TYPE_NORMAL
- en: This simple formula reminds us that machine learning models can not only give
    us an answer (=It’s a cat!), but also reveal how confident they are in their prediction.
  prefs: []
  type: TYPE_NORMAL
- en: And we can use this uncertainty to make better decisions.
  prefs: []
  type: TYPE_NORMAL
- en: '***Table of Contents**'
  prefs: []
  type: TYPE_NORMAL
- en: '[1 What does machine learning from a probabilistic view mean?](#01)'
  prefs: []
  type: TYPE_NORMAL
- en: '[2 So, what is supervised learning?](#02)'
  prefs: []
  type: TYPE_NORMAL
- en: '[3 So, what is unsupervised learning?](#03)'
  prefs: []
  type: TYPE_NORMAL
- en: '[4 So, and what is reinforcement learning?](#04)'
  prefs: []
  type: TYPE_NORMAL
- en: '[5 From a mathematical perspective: What are we actually learning?](#05)'
  prefs: []
  type: TYPE_NORMAL
- en: '[Final Thought — What’s the point of understanding the probabilistic view anyway?](#06)'
  prefs: []
  type: TYPE_NORMAL
- en: '[Where Can You Continue Learning?](#07)*'
  prefs: []
  type: TYPE_NORMAL
- en: What does machine learning from a probabilistic view mean?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Tom Mitchell](https://en.wikipedia.org/wiki/Tom_M._Mitchell), an American
    computer scientist, defines machine learning as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '*A computer program is said to learn from experience E with respect to some
    class of tasks T, and performance measure P, if its performance at tasks in T,
    as measured by P, improves with experience E.*'
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Let’s break this down:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**T (Task)**: The task to be solved, such as classifying images or predicting
    the amount of electricity needed for purchasing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**E (Experience)**: The experience the model learns from. For example, training
    data such as images or past electricity purchases versus actual consumption.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**P (Performance Measure)**: The metric used to evaluate performance, such
    as accuracy, error rate or mean squared error (MSE).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where does the probabilistic view come in?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In classical machine learning, a value is often simply predicted:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“The house price is 317k CHF.”*'
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: The probabilistic view, however, focuses on learning probability distributions.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of generating fixed predictions, we are interested in how likely which
    different outcomes (in this example prices) are.
  prefs: []
  type: TYPE_NORMAL
- en: Everything that is uncertain — outputs, parameters, predictions — is treated
    as a random variable.
  prefs: []
  type: TYPE_NORMAL
- en: In the case of a house price, there might still be negotiation opportunities
    or risks that are mitigated through mechanisms like insurance.
  prefs: []
  type: TYPE_NORMAL
- en: 'But let’s now look at an example where it is really crucial for good decisions
    that the uncertainty is explicitly modelled:'
  prefs: []
  type: TYPE_NORMAL
- en: Imagine an energy supplier who needs to decide today how much electricity to
    buy.
  prefs: []
  type: TYPE_NORMAL
- en: 'The uncertainty lies in the fact that energy demand depends on many factors:
    temperature, weather, the economic situation, industrial production, self-production
    through photovoltaic systems and so on. All of which are uncertain variables.'
  prefs: []
  type: TYPE_NORMAL
- en: And where does probability help us now?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'If we rely only on a single best estimate, we risk either:'
  prefs: []
  type: TYPE_NORMAL
- en: that we have too much energy (leading to costly overproduction).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: that we have too little energy (causing a supply gap).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With a probability calculation, on the other hand, we can plan that there is
    a 95% probability that demand will remain below 850 MWh, for example. And this,
    in turn, allows us to calculate the safety buffer correctly — not based on a single
    point prediction, but on the entire range of possible outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: If we have to make an optimal decision under uncertainty, this is only possible
    if we explicitly model the uncertainty.
  prefs: []
  type: TYPE_NORMAL
- en: Why is this important?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Making better decisions under uncertainty:**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If our model understands uncertainty, we can better weigh risks. For example,
    in credit scoring, a customer labelled as an ‘unsafe customer’ could trigger additional
    verification steps.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Increasing trust and interpretability:**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For us humans, probabilities are more tangible than rigid point predictions.
    Probabilistic outputs help stakeholders understand not only what a model predicts,
    but also how confident it is in its predictions.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: To understand why the probabilistic view is so powerful, we need to look at
    how machines actually learn (Supervised Learning, Unsupervised Learning or Reinforcement
    Learning). So, this is next.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Many machine learning models are deterministic — but the world is uncertain:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, what is supervised learning?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In simple terms, supervised learning means that we have examples — and for each
    example, we know what it means.
  prefs: []
  type: TYPE_NORMAL
- en: 'For instance:'
  prefs: []
  type: TYPE_NORMAL
- en: '*> If you see this picture (input x), then the flower is called Setosa (output
    y).*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The aim is to find a rule that makes good predictions for new, unseen inputs.
    Typical examples of supervised learning tasks are classification or regression.
  prefs: []
  type: TYPE_NORMAL
- en: What does the probabilistic view add?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The probabilistic view reminds us that there is no absolute certainty in the
    real world.
  prefs: []
  type: TYPE_NORMAL
- en: '**In the real world, nothing is perfectly predictable.**'
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes information is missing — this is known as epistemic uncertainty.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sometimes the world is inherently random — this is known as aleatoric uncertainty.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Therefore, instead of working with a single ‘fixed answer’, probabilistic models
    work with probabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“The model is 95% certain to be a Setosa.”*'
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: This way, the model does not just guess, but also expresses how confident it
    is.
  prefs: []
  type: TYPE_NORMAL
- en: And what about the No Free Lunch Theorem?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In machine learning, there is no single “best method” that works for every problem.
  prefs: []
  type: TYPE_NORMAL
- en: 'The No Free Lunch Theorem tells us:'
  prefs: []
  type: TYPE_NORMAL
- en: '*If an algorithm performs particularly well on a certain type of task, it will
    perform worse on other types of tasks.*'
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why is that?
  prefs: []
  type: TYPE_NORMAL
- en: Because every algorithm makes assumptions about the world. These assumptions
    help in some situations — and hurt in others.
  prefs: []
  type: TYPE_NORMAL
- en: 'Or as [George Box](https://en.wikipedia.org/wiki/All_models_are_wrong) famously
    said:'
  prefs: []
  type: TYPE_NORMAL
- en: '*> All models are wrong, but some models are useful.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Supervised learning as “glorified curve fitting”
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[J. Pearl](https://arxiv.org/abs/1801.04016) describes supervised learning
    as ‘glorified curve fitting’.'
  prefs: []
  type: TYPE_NORMAL
- en: What he meant is that supervised learning is, at its core, about connecting
    known points (x, y) as smoothly as possible — like drawing a clever curve through
    data.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, unsupervised learning is about making sense of the data without
    any labels — trying to understand the underlying structure without a predetermined
    target.
  prefs: []
  type: TYPE_NORMAL
- en: So, what is unsupervised learning?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Unsupervised learning means that the model receives data — but no explanations
    or labels.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: When the model sees an image (input x), it is not told whether it is a Setosa,
    Versicolor or Virgnica.
  prefs: []
  type: TYPE_NORMAL
- en: The model has to find out for itself whether there are groups, patterns or structures
    in the data. A typical example of unsupervised learning is clustering.
  prefs: []
  type: TYPE_NORMAL
- en: The aim is therefore not to learn a fixed rule, but to better understand the
    hidden structure of the world.
  prefs: []
  type: TYPE_NORMAL
- en: How does the probabilistic view help us here?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We are not trying to say:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“This picture is definitely a Setosa.”*'
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'but rather:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“What structures or patterns are probably hidden in the data?”*'
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: Probabilistic thinking allows us to capture uncertainty and diversity in possible
    explanations. Instead of forcing a hard classification, we model possibilities.
  prefs: []
  type: TYPE_NORMAL
- en: Why do we need unsupervised learning?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sometimes there are no labels for the data — or they would be very expensive
    or difficult to collect (e.g. medical diagnoses).
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes the categories are not clearly defined (for example, when exactly
    an action starts and when it is finished).
  prefs: []
  type: TYPE_NORMAL
- en: Or sometimes the task of the model is to discover patterns that we do not yet
    recognise ourselves.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at an example:'
  prefs: []
  type: TYPE_NORMAL
- en: Imagine we have a collection of animal images — but we don’t tell the model
    which animal is shown.
  prefs: []
  type: TYPE_NORMAL
- en: 'The task is: The model should group similar animals together. Purely based
    on patterns it can detect.'
  prefs: []
  type: TYPE_NORMAL
- en: So, and what is reinforcement learning?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Reinforcement learning means that a system learns from experience by acting
    and receiving feedback about whether its actions were good or bad.
  prefs: []
  type: TYPE_NORMAL
- en: 'In other words:'
  prefs: []
  type: TYPE_NORMAL
- en: The system sees a situation (input x).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The system selects an action (a).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The system receives a reward or punishment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In simple words, it’s actually similar to how we train a dog.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a look at an example:'
  prefs: []
  type: TYPE_NORMAL
- en: A robot is trying to learn how to walk. It tries out various movements. If the
    roboter falls over, it learns, that action was bad. If the robot manages a few
    steps, it gets a positive reward.
  prefs: []
  type: TYPE_NORMAL
- en: 'Behind the scenes, the robot builds a strategy or a rule called a policy π(x):'
  prefs: []
  type: TYPE_NORMAL
- en: '*“In situation x, choose action a.”*'
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: Initially, these rules are purely random or very bad. The robot is in the exploration
    phase to find out what works and what does not. Through each experience (e.g.
    falling or walking), the robot receives feedback (rewards) such as +1 point for
    standing upright, -10 points for falling over.
  prefs: []
  type: TYPE_NORMAL
- en: Over time, the robot adjusts its policy to prefer actions that lead to higher
    cumulative rewards. It changes its rule π(x) to make more out of good experiences
    and avoid bad experiences.
  prefs: []
  type: TYPE_NORMAL
- en: What is the robot’s goal?
  prefs: []
  type: TYPE_NORMAL
- en: The robot wants to find actions that bring the highest reward over time (e.g.
    staying upright, moving forwards).
  prefs: []
  type: TYPE_NORMAL
- en: Mathematically, the robot tries to maximise its expected future reward value.
  prefs: []
  type: TYPE_NORMAL
- en: How does the probabilistic view help us?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The system (in this example the robot) often does not know exactly which of
    its many actions has led to the reward. This means that it has to learn under
    uncertainty which strategies (policies) are good.
  prefs: []
  type: TYPE_NORMAL
- en: 'In reinforcement learning, we are therefore trying to learn a policy:'
  prefs: []
  type: TYPE_NORMAL
- en: '*π(x)*'
  prefs: []
  type: TYPE_NORMAL
- en: This policy defines, which action should the system perform in which situation
    to maximize rewards over time.
  prefs: []
  type: TYPE_NORMAL
- en: Why is reinforcement learning so fascinating?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Reinforcement learning mirrors the way humans and animals learn.
  prefs: []
  type: TYPE_NORMAL
- en: It is perfect for tasks where there are no clear examples, but where improvement
    comes through experience.
  prefs: []
  type: TYPE_NORMAL
- en: The film AlphaGo and the breakthrough are based on reinforcement learning.
  prefs: []
  type: TYPE_NORMAL
- en: 'From a mathematical perspective: What are we actually learning?'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When we talk about a model in machine learning, we mean more than just a function
    in the probabilistic view.
  prefs: []
  type: TYPE_NORMAL
- en: A model is a distributional assumption about the world.
  prefs: []
  type: TYPE_NORMAL
- en: '**Let’s take a look at the classical view:**'
  prefs: []
  type: TYPE_NORMAL
- en: A model is a function f(x)=y that translates an input into an output.
  prefs: []
  type: TYPE_NORMAL
- en: '**Let’s now take a look at the probabilistic view:**'
  prefs: []
  type: TYPE_NORMAL
- en: A model explicitly describes uncertainty — for example in f(x)=p(y∣x).
  prefs: []
  type: TYPE_NORMAL
- en: It is not about providing one “best answer”, but about modelling how likely
    different answers are.
  prefs: []
  type: TYPE_NORMAL
- en: 'In supervised learning, we learn a function that describes the conditional
    probability p(y|x):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The probability of a label y, given an input x.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'We ask: “What is the correct answer to this input?”'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Formula: f(x)=p(y∣x)'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'In unsupervised learning, we learn a function that describes the probability
    distribution p(x) of the input data:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The probability of the data itself, without explicit target values.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: We ask, ‘How probable is this data itself?’.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Formula: f(x)=p(x)'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'In reinforcement, we learn a policy π(x) that determines the optimal action
    a for a state x:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A rule that suggests an action a for every possible state x, which brings as
    much reward as possible in the long term.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'We ask: ‘Which action should be carried out now so that the system receives
    the best reward in the long term?'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Formula: a=π(x)'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '*On my* [*Substack*](https://sarahleaschrch.substack.com/)*, I regularly write
    summaries about the published articles in the fields of Tech, Python, Data Science,
    Machine Learning and AI. If you’re interested, take a look or subscribe.*'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Final Thought — What’s the point of understanding the probabilistic view, anyway?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the real world, almost nothing is truly certain.
  prefs: []
  type: TYPE_NORMAL
- en: Uncertainty, incomplete information and randomness characterise every decision
    we make.
  prefs: []
  type: TYPE_NORMAL
- en: Probabilistic machine learning helps us to deal with exactly that.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of just trying to be “more accurate”, a probabilistic approach becomes:'
  prefs: []
  type: TYPE_NORMAL
- en: More robust against errors and uncertainties.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For example, in a medical diagnostic system, we want a model that indicates
    its uncertainty (‘it is 60 % certain that it is cancer’) instead of making a fixed
    diagnosis. In this way, additional tests can be carried out if there is a high
    degree of uncertainty.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: More flexible and therefore more adaptable to new situations.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For example, a model that models weather data probabilistically can react more
    easily to new climate conditions because it learns about uncertainties.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: More comprehensible and interpretable, in that models not only give us an answer,
    but also how certain they are.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For example, in a credit scoring system, we can show stakeholders that the model
    is 90% certain that a customer is creditworthy. The remaining 10% uncertainty
    is explicitly communicated — this helps with transparent decisions and risk assessments.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: These advantages make probabilistic models more transparent, trustworthy and
    interpretable systems (instead of black box algorithms).
  prefs: []
  type: TYPE_NORMAL
- en: Where Can You Continue Learning?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
