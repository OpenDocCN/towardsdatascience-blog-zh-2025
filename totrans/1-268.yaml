- en: End-to-End Computer Vision App Development
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s break down the web app development into 6 steps you can easily follow
    to build your own interactive Streamlit app or customize it for your needs. Check
    out our [GitHub](https://github.com/destingong/computer-vision) repository for
    the end-to-end implementation.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Initialize the web app and configure the page layout.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 2\. Prompt the user to upload an image.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 3\. Select one or more computer vision tasks using a multi-select dropdown list
    (also accept user entered options e.g. “document-question-answering”). It will
    prompt user to enter the question if ‘visual-question-answering’ or ‘document-question-answering’
    is selected, because these two tasks require “question” as an additional input
    parameter.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 4\. Prompt the user to choose between the default model built into the hugging
    face pipeline or enter their own model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 5\. Create task pipelines based on the user-entered parameters, then collects
    the model outputs and processing times. The result is displayed in a table format
    using `st.dataframe()` to compare the different *task name, output, runtime, model
    name, and model type*. For image segmentation tasks, the segmentation mask is
    also displayed using `st.image()`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: 6\. Lastly, chain these functions together using the main function. Use a “Generate
    Response” button to trigger these functions and display the results in the app.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Takeaway Message
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We introduced the evolution from traditional CNN-based approaches to transformer
    architectures, comparing vision models with language models and multimodal models.
    We also explored 4 fundamental computer vision tasks and their corresponding techniques,
    providing a practical Streamlit implementation guide to building your own computer
    vision web applications for further explorations.
  prefs: []
  type: TYPE_NORMAL
- en: 'The fundamental Computer Vision tasks and models include:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Image Classification:** Analyze images and assign them to one or more predefined
    categories or classes, utilizing model architectures like ViT (Vision Transformer).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Image Segmentation**: Classify image pixels into specific categories, creating
    detailed masks that outline object boundaries, including DETR and Mask2Former
    model architectures.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Image Captioning:** Generates descriptive text for images, demonstrating
    models like visual encoder-decoder and BLIP that combine visual encoding with
    language generation capabilities.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Visual Question Answering (VQA):** Process both image and text queries to
    answer open-ended questions based on image content, comparing architectures like
    ViLT (Vision Language Transformer) with its token-based outputs and BLIP with
    more coherent responses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
