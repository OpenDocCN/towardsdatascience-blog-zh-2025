- en: 4\. Visual Question Answering
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/66fe5297e312b7f913a435befaf3408f.png)'
  prefs: []
  type: TYPE_IMG
- en: Visual Question Answering (VQA) has gained increasing popularity as it enables
    users to ask questions about an image and receive coherent text responses. It
    also requires a multimodal model that can extract key information in visual data
    while also capable of generating text responses. What it differentiates from image
    captioning is accepting user prompts as input in addition to an image, therefore
    requiring an encoder that interprets both modalities at the same time.
  prefs: []
  type: TYPE_NORMAL
- en: '**ViLT (Vision Language Transformer)**'
  prefs: []
  type: TYPE_NORMAL
- en: '![ViLT model architecture](../Images/da3bbff9d9c6896cb0bd3f0560524c24.png)'
  prefs: []
  type: TYPE_IMG
- en: 'ViLT is a computationally efficient model architecture for executing VQA task.
    ViLT incorporates image patch embeddings and text embeddings into an unified transformer
    encoder which is pre-trained for three objectives:'
  prefs: []
  type: TYPE_NORMAL
- en: 'image-text matching: learn the semantic relationship between image-text pairs'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'masked language modeling: learn to predict the masked word/token from the vocabulary
    based on the text and image input'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'word patch alignment: learn the associations between words and image patches'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ViLT adopts an encoder-only architecture with task specific heads (e.g. classification
    head, VQA head), with this minimal design achieving ten times faster speed than
    a VLP (Vision-and-Language Pretraining) model that relies on region supervision
    for object detection and convolutional architecture for feature extraction. However,
    this simplified architecture results in suboptimal performance on complex tasks
    and relies on massive training data for achieving generalized functionality. As
    demonstrated later, one drawback is that ViLT model produces token-based outputs
    for VQA rather than coherent sentences, very much like an image classification
    task with a large amount of candidate labels.
  prefs: []
  type: TYPE_NORMAL
- en: '**BLIP**'
  prefs: []
  type: TYPE_NORMAL
- en: As introduced in the section 3\. Image Captioning, BLIP is a more extensive
    model that can also be fine-tuned for performing visual question answering task.
    As the result of it encoder-decoder architecture, it generates complete text sequences
    instead of tokens.
  prefs: []
  type: TYPE_NORMAL
- en: '**Implementation**'
  prefs: []
  type: TYPE_NORMAL
- en: VQA is implemented using the code snippet below, taking both an image and a
    text prompt as the model inputs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: When comparing ViLT and BLIP models for the question “describe this image”,
    the outputs differ significantly due to their distinct model architectures. ViLT
    predicts the highest scoring tokens from its existing vocabulary, while BLIP generates
    more coherent and sensible results.
  prefs: []
  type: TYPE_NORMAL
- en: '*ViLT “dandelin/vilt-b32-finetuned-vqa” output*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '*BLIP “Salesforce/blip-vqa-capfilt-large” output*'
  prefs: []
