- en: An Interactive Guide to 4 Fundamental Computer Vision Tasks Using Transformers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/an-interactive-guide-to-4-fundamental-computer-vision-tasks-using-transformers/](https://towardsdatascience.com/an-interactive-guide-to-4-fundamental-computer-vision-tasks-using-transformers/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What is Computer Vision and Vision Model?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Computer Vision is a subdomain in artificial intelligence with a wide range
    of applications focusing on image processing and understanding. Traditionally
    addressed through Convolutional Neural Networks (CNNs), this field has been revolutionized
    by the emergence of transformer architecture. While transformers are well-known
    for their applications in language processing, they can be effectively adapted
    to form the backbone of many vision models. In this article, we will explore state-of-the-art
    vision and multimodal models, such as ***ViT (Vision Transformer), DETR (Detection
    Transformer), BLIP (Boostrapping Language-Image Pretraining), and ViLT (Vision
    Language Transformer)***, that specialize in various computer vision tasks including
    **image classification, segmentation, image-to-text conversion, and visual question
    answering**. These tasks have a variety of real-world applications, from annotating
    images at scale, detecting abnormalities in medical images to extracting text
    from documents and generating text responses based on visual data.
  prefs: []
  type: TYPE_NORMAL
- en: '**Comparisons with CNNs**'
  prefs: []
  type: TYPE_NORMAL
- en: Before the wide adoption of foundation models, CNNs were the dominant solutions
    for most computer vision tasks. In a nutshell, CNNs form a hierarchical deep learning
    architecture that consists of feature maps, pooling, linear layers and fully connected
    layers. In contrast, vision transformers leverage the self-attention mechanism
    that allows image patches to attend to each other. They also have less inductive
    bias, meaning they are less constrained by specific model assumptions as CNNs,
    but consequently require significantly more training data to achieve strong performance
    on generalized tasks.
  prefs: []
  type: TYPE_NORMAL
- en: '**Comparisons with LLMs**'
  prefs: []
  type: TYPE_NORMAL
- en: Transformer-based vision models adapt the architecture used by LLMs (Large Language
    Models), adding extra layers that convert image data into numerical embeddings.
    In an NLP task, text sequences undergo the process of tokenization and embedding
    before they are consumed by the transformer encoder. Similarly, image/visual data
    go through the procedure of patching, position encoding, image embedding before
    feeding into the vision transformer encoder. Throughout this article, we will
    further explore how the vision transformer and its variants build upon the transformer
    backbone and extend capabilities from language processing to image understanding
    and image generation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Extensions to Multimodal Models**'
  prefs: []
  type: TYPE_NORMAL
- en: Advancements in vision models have driven the interest in developing multimodal
    models capable of process both image and text data simultaneously. While vision
    models focus on uni-directional transformation of image data to numerical representation
    and typically produce score-based output for classification or object detection
    (i.e. image-classification and image-segmentation task), multimodal models require
    bidirectional processing and integration between different data types. For example,
    an image-text multimodal model can generate coherent text sequences from image
    input for image captioning and visual question answering tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 4 Types of Fundamental Computer Vision Tasks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 0\. Project Overview
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will explore the details of these 4 fundamental computer vision tasks and
    the corresponding transformer models specialized for each task. These models differ
    primarily in their encoder and decoder architectures, which give them distinct
    capabilities for interpreting, processing, and translating across different textual
    or visual modality.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/36a42d06bf1e008235719074545548de.png)'
  prefs: []
  type: TYPE_IMG
- en: To make this guide more interactive, I have designed a [Streamlit web app](https://huggingface-computer-vision.streamlit.app/)
    to illustrate and compare outputs of these computer vision tasks and models. We
    will introduce the end to end app development at the end of this article.
  prefs: []
  type: TYPE_NORMAL
- en: Below is a sneak peek of output based on the uploaded image, displaying *task
    name, output, runtime, model name, model type*, by running the default models
    from Hugging Face pipelines.
  prefs: []
  type: TYPE_NORMAL
- en: '![Streamlit Web App for Computer Vision Tasks](../Images/ec0230cae50ce4ed0536fa67291ddc6e.png)'
  prefs: []
  type: TYPE_IMG
- en: 1\. Image Classification
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Image Classification](../Images/40aa3bdabd48f2f45895be95920a61bf.png)'
  prefs: []
  type: TYPE_IMG
- en: Firstly, let’s introduce image classification — a basics computer vision task
    that assigns images to a predefined set of labels, which can be achieved by a
    basic Vision Transformer.
  prefs: []
  type: TYPE_NORMAL
- en: '**ViT (Vision Transformer)**'
  prefs: []
  type: TYPE_NORMAL
- en: '![ViT model architecture](../Images/7f486c10240c3f637310f9538ec07f7b.png)'
  prefs: []
  type: TYPE_IMG
- en: Vision Transformer (ViT) serves as the cornerstone for many computer vision
    models later introduced in this article. It consistently outperforms CNN on image
    classification tasks through its encoder-only transformer architecture. It processes
    image inputs and outputs probability scores for candidate labels. Since image
    classification is purely an image understanding task without generation requirements,
    ViT’s encoder-only architecture is well-suited for this purpose.
  prefs: []
  type: TYPE_NORMAL
- en: 'A ViT architecture is composed of following components:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Patching: break down input images into small, fixed size patches of pixels
    (typically 16×16 pixels per patch) so that local features are preserved for downstream
    processing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Embedding: convert image patches into numerical representations, also known
    as vector embeddings, so that images with similar features are projected as embeddings
    with closer proximity in the vector space.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Classification Token (CLS): extract and aggregate information from all image
    patches into one numeric representation, making it particularly effective for
    classification.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Position Encoding: preserve the relative positions of the original image pixels.
    CLS token is always at position 0.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Transformer Encoder: process the embeddings through layers of multi-headed
    attention and feed-forward networks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The mechanism behind ViT results in its efficiency in capturing global dependencies,
    whereas CNN primarily relies on local processing through convolutional kernels.
    On the other hand, ViT has the drawback of requiring a massive amount of training
    data (usually millions of images) to iteratively adjust model parameters in attention
    layers to achieve strong performance.
  prefs: []
  type: TYPE_NORMAL
- en: If you prefer a video walkthrough of this guide, please check out our YouTube
    video 🎬.
  prefs: []
  type: TYPE_NORMAL
- en: '**Implementation**'
  prefs: []
  type: TYPE_NORMAL
- en: Hugging Face pipeline significantly simplifies the implementation of image classification
    task by abstracting away the low-level image processing steps.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'input parameters:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`model`: you can choose your own model or use the default model (i.e. “google/vit-base-patch16-224”)
    when the `model` parameter is not specified.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`task`: provide a task name (e.g. “image-classification”, “image-segmentation”)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`image`: provide an image object through an URL or an image file path.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'output: the model generates scores for the candidate labels.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We compared results of the default image classification model “google/vit-base-patch16-224”
    by providing two similar images with different compositions. As we can see, this
    baseline model is easily confused, producing significantly different outputs (“espresso”
    vs. “mircowave”), despite both images containing the same main object.
  prefs: []
  type: TYPE_NORMAL
- en: '*“Coffee Mug” Image Output*'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5cf2014272165c44bc129dc4e34d9a75.png)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '*“Coffee Mug with Background” Image Output*'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d29e343bfb30a1df1ff4a5d0151ec24e.png)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Try a different model yourself using our [Streamlit web app](https://huggingface-computer-vision.streamlit.app/)
    and see if it generates better results.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Image Segmentation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![image segmentation](../Images/ee863898e47e1817a95c69abd1b6d5fb.png)'
  prefs: []
  type: TYPE_IMG
- en: Image segmentation is another common computer vision task that requires a vision-only
    model. The objective is similar to object detection but requires higher precision
    at the pixel level, producing masks for object boundaries instead of drawing bounding
    boxes as required for object detection.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are three main types of image segmentation:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Semantic segmentation: predict a mask for each object class.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Instance segmentation: predict a mask for each instance of the object class.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Panoptic segmentation: combine instance segmentation and semantic segmentation
    by assigning each pixel an object class and an instance of that class.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DETR (Detection Transformer)**'
  prefs: []
  type: TYPE_NORMAL
- en: '![DETR model architecture](../Images/ce59c2dbefa4fa6670e5a8035d7d4b52.png)'
  prefs: []
  type: TYPE_IMG
- en: Although DETR is widely used for object detection, it can be extended to perform
    panoptic segmentation task by adding a segmentation mask head. As shown in the
    diagram, it utilizes the encoder-decoder transformer architecture with a CNN backbone
    for feature map extraction. DETR model learns a set of object queries and it is
    trained to predict bounding boxes for these queries, followed by a mask prediction
    head to perform precise pixel-level segmentation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Mask2Former**'
  prefs: []
  type: TYPE_NORMAL
- en: Mask2Former is also a common choice for image segmentation task. Developed by
    Facebook AI Research, Mask2Former generally outperforms DETR models with better
    precision and computational efficiency. It is achieved by applying a masked attention
    mechanism instead of global cross-attention to focus specifically on foreground
    information and main objects in an image.
  prefs: []
  type: TYPE_NORMAL
- en: '**Implementation**'
  prefs: []
  type: TYPE_NORMAL
- en: We use the pipeline implementation just like image classification, by simply
    swapping the task parameter to “image-segmentation”. To process the output, we
    extract the object labels and masks, then display the masked image using `st.image()`
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: We compared the performance of DETR (“facebook/detr-resnet-50-panoptic”) and
    Mask2Former (“facebook/mask2former-swin-base-coco-panoptic”) which are both fine-tuned
    on panoptic segmentation. As displayed in the segmentation outputs, both DETR
    and Mask2Former successfully identify and extract the “cup” and the “dining table”.
    Mask2Former makes inference at a faster speed (2.47s compared to 6.3s for DETR)
    and also manages to identify “window-other” from the background.
  prefs: []
  type: TYPE_NORMAL
- en: '*DETR “facebook/detr-resnet-50-panoptic” output*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/be7cceccf65811562bc75f4134c91f0b.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Mask2Former “facebook/mask2former-swin-base-coco-panoptic” output*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/5c3e808ad1cef0511802ff91271f8039.png)'
  prefs: []
  type: TYPE_IMG
- en: 3\. Image Captioning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/2d1a6b9c12c42428065f88bb85812994.png)'
  prefs: []
  type: TYPE_IMG
- en: Image Captioning, also known as image to text, translates images into text sequences
    that describe the image contents. This task requires capabilities of both image
    understanding and text generation, therefore well suited for a multimodal model
    that can process image and text data simultaneously.
  prefs: []
  type: TYPE_NORMAL
- en: '**Visual Encoder-Decoder**'
  prefs: []
  type: TYPE_NORMAL
- en: Visual Encoder-Decoder is a multimodal architecture that combines a vision model
    for image understanding with a pretrained language model for text generation.
    A common example is ViT-GPT2, which chains together the Vision Transformer (introduced
    in section 1\. Image Classification) as the visual encoder and the GPT-2 model
    as the decoder to perform autoregressive text generation.
  prefs: []
  type: TYPE_NORMAL
- en: '**BLIP (Boostrapping Language-Image Pretraining)**'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0ebde4c2e0963cde217d43cc7474e201.png)'
  prefs: []
  type: TYPE_IMG
- en: BLIP, developed by Salesforce Research, leverages 4 core modules – an image
    encoder, a text encoder, followed by an image-grounded text encoder that fuses
    visual and textual features via attention mechanisms, as well as an image-grounded
    text decoder for text sequence generation. The pretraining process involves minimizing
    image-text contrastive loss, image-text matching loss and language modeling loss,
    with the objectives of aligning the semantic relationship between visual information
    and text sequences. It offers higher flexibility in applications and can be applied
    for VQA (visual question answering), but it also introduces more complexity in
    the architectural design.
  prefs: []
  type: TYPE_NORMAL
- en: '**Implementation**'
  prefs: []
  type: TYPE_NORMAL
- en: We use the code snippet below to generate output from an image captioning pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: We tried three different models below and they all generates reasonably accurate
    image descriptions, with the larger model performs better than the base one.
  prefs: []
  type: TYPE_NORMAL
- en: '*Visual Encoder-Decoder “ydshieh/vit-gpt2-coco-en” output*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
