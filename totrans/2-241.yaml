    | [Threads](https://www.threads.net/@conorosullyds) | [YouTube](https://www.youtube.com/channel/UChsoWqJbEjBwrn00Zvghi4w)
    | [Medium](https://medium.com/@conorosullyds)
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[1] Ramprasaath R Selvaraju, Michael Cogswell, Abhishek Das, Ramakrishna Vedantam,
    Devi Parikh, and Dhruv Batra. Grad-cam: Visual explanations from deep networks
    via gradient-based localization. In Proceedings of the IEEE international conference
    on computer vision, pages 618–626, 2017.'
  prefs: []
  type: TYPE_NORMAL
