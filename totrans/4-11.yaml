- en: 原文：[https://towardsdatascience.com/inequality-in-practice-e-commerce-portfolio-analysis-adc3d0876acd/](https://towardsdatascience.com/inequality-in-practice-e-commerce-portfolio-analysis-adc3d0876acd/)
