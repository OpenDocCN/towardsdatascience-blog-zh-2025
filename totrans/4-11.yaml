- en: Streamgraph
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The streamgraph shown earlier is an example of a chart that may appear difficult
    to render, especially when interactivity is required. One of the reasons I included
    it in this blog is to show how we can simplify tasks with keys, joins, and data.table
    syntax in particular. Using keys, we can achieve very effective filtering for
    interactivity. Once we have a handle on the data, we’re virtually done; all that
    remains are some settings to fine-tune the plot.
  prefs: []
  type: TYPE_NORMAL
- en: We start with thresholds table.
  prefs: []
  type: TYPE_NORMAL
