- en: The next plot shows the number of variants grouped into bins. This gives us
    a chance to talk about chaining operations in R, particularly with the data.table
    package. In data.table, we can chain operations by opening a new bracket right
    after closing one – resulting in ][ syntax. It creates a compact, readable chain
    that’s still easy to debug since you can execute it piece by piece. I prefer succinct
    code, but that’s just my style – use whatever approach works best for you. We
    can write code in one line, or multi-line, with logical steps.
  prefs: []
  type: TYPE_NORMAL
- en: On one of the plots we look at a date, when each product was first seen. To
    get that date, we set a key on date, and then take the first occurrence `date[1]`
