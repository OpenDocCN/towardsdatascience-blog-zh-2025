- en: 'Inequality in Practice: E-commerce Portfolio Analysis'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/inequality-in-practice-e-commerce-portfolio-analysis-adc3d0876acd/](https://towardsdatascience.com/inequality-in-practice-e-commerce-portfolio-analysis-adc3d0876acd/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Image generated by DALL-E, based on author''s prompt, inspired by "The Bremen
    Town Musicians"](../Images/c09996bcaab819cddcda8fe08ea20f71.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by DALL-E, based on author’s prompt, inspired by "The Bremen
    Town Musicians"
  prefs: []
  type: TYPE_NORMAL
- en: Are your top-selling products making or breaking your business?
  prefs: []
  type: TYPE_NORMAL
- en: It’s terrifying to think your entire revenue might collapse if one or two products
    fall out of favor. Yet spreading too thin across hundreds of products often leads
    to mediocre results and brutal price wars.
  prefs: []
  type: TYPE_NORMAL
- en: Discover how a 6-year Shopify case study uncovered the perfect balance between
    focus and diversification.
  prefs: []
  type: TYPE_NORMAL
- en: Why bother?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Understanding concentration in your product portfolio is more than simply an
    intellectual exercise; it has a direct impact on crucial business choices. From
    inventory planning to marketing spend, understanding how your revenue is distributed
    among goods impacts your approach.
  prefs: []
  type: TYPE_NORMAL
- en: This post walks through practical strategies for monitoring concentration, explaining
    what these measurements actually mean and how to get useful insights from your
    data.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll take you through fundamental metrics and advanced analysis, including interactive
    visualisations that bring the data to life.
  prefs: []
  type: TYPE_NORMAL
- en: I am also sharing chunks of R code used in this analysis. Use it directly or
    adapt the logic to your preferred programming language.
  prefs: []
  type: TYPE_NORMAL
- en: The Concentration Question
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Looking at market analysis or investment theory, we often focus on concentration
    – how value is distributed across different elements. In e-commerce, this translates
    into a fundamental question: How much of your revenue should come from your top
    products?'
  prefs: []
  type: TYPE_NORMAL
- en: Is it better to have several strong sellers or a broad product range? This isn’t
    just a theoretical question …
  prefs: []
  type: TYPE_NORMAL
- en: Having most of your revenue tied to few products means your operations are streamlined
    and focused. But what happens when market preferences shift? Conversely, spreading
    revenue across hundreds of products might seem safer, but it often means you lack
    any real competitive advantage.
  prefs: []
  type: TYPE_NORMAL
- en: So where’s the optimal point? Or rather what is the optimal range, and how various
    ratios describe it.
  prefs: []
  type: TYPE_NORMAL
- en: What makes this analysis particularly valuable is that it is based on real data
    from a business that kept expanding its product range over time.
  prefs: []
  type: TYPE_NORMAL
- en: Getting the Data Right
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: On Datasets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This analysis was done for a real US-based e-commerce store – one of our clients
    who kindly agreed to share their data for this article. The data spans six years
    of their growth, giving us a rich view of how product concentration evolves as
    business matures.
  prefs: []
  type: TYPE_NORMAL
- en: While working with actual business data gives us genuine insights, I’ve also
    created a synthetic dataset in one of the later sections. This small, artificial
    dataset helps illustrate the relationships between various ratios in a more controlled
    setting – showing patterns "counting on fingers".
  prefs: []
  type: TYPE_NORMAL
- en: 'To be clear: this synthetic data was created entirely from scratch and only
    loosely mimics general patterns seen in real e-commerce – it has no direct connection
    to our client’s actual data. This is different from my previous article, where
    I generated synthetic data based on real patterns using Snowflake functionality.'
  prefs: []
  type: TYPE_NORMAL
- en: Data Export
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The main analysis draws from real data, but that small artificial dataset serves
    an important purpose – it helps explain relationships between various ratios in
    a way that’s easy to grasp. And trust me, having such a micro dataset with clear
    visuals comes in really handy when explaining complex dependencies to stakeholders
    😉
  prefs: []
  type: TYPE_NORMAL
- en: The raw transaction export from Shopify contains everything we require, but
    we must arrange it properly for concentration analysis. The data contains all
    of the products for each transaction, but the date is only in one row per transaction,
    thus we must propagate it to all products while retaining the transaction id.
    Probably not for the first iteration of the study, but if we want to fine-tune
    it, we should consider how to handle discounts, returns, and so on. In the case
    of foreign sales, conduct a global and country-specific study.
  prefs: []
  type: TYPE_NORMAL
- en: We have a product name and an SKU, both of which should adhere to some naming
    convention and logic when dealing with variants. If we have a master catalogue
    with all of these descriptions and codes, we are very fortunate. If you have it,
    use it, but compare it to the ‘ground truth’ with actual transaction data.
  prefs: []
  type: TYPE_NORMAL
- en: Product Variants
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In my case, the product names were structured with a base name and a variant
    separated by a dash. Very simple to use, divided into main product and variants.
    Exceptions? Of course, they are always present, especially when dealing with 6
    years of highly successful ecommerce data:). For instance, some names (e.g. "All-purpose")
    included a dash, while others did not. Then, some did have variants, while some
    did not. So expect for some tweaks here, but this is a critical stage.
  prefs: []
  type: TYPE_NORMAL
- en: '![Number of unique products, with and without variants - all charts rendered
    by author, with own R code](../Images/2c4ddd948c1e2d8c854ef0bd4f79fdeb.png)'
  prefs: []
  type: TYPE_IMG
- en: Number of unique products, with and without variants – all charts rendered by
    author, with own R code
  prefs: []
  type: TYPE_NORMAL
- en: If you’re wondering why we need to exclude variations from concentration analysis,
    the figure above illustrates it clearly. The values are considerably different,
    and we would expect radically different results if we analysed concentration with
    variants.
  prefs: []
  type: TYPE_NORMAL
- en: The analysis is based on transactions, counting number of products with/without
    variants in a given month. But if we have a large number of variants, not all
    of them will be present in one-month transactions. Yes, that is correct – so let
    us consider a larger time range, one year.
  prefs: []
  type: TYPE_NORMAL
- en: '![Products, their variants, by transaction date, yearly](../Images/af9cb0ffeadb56db8c92a946d687c524.png)'
  prefs: []
  type: TYPE_IMG
- en: Products, their variants, by transaction date, yearly
  prefs: []
  type: TYPE_NORMAL
- en: I calculated the number of variants per base product in a calendar year based
    on what we have in transactions. The number of variants per base product is divided
    into several bins. Let’s take the year 2024\. The plot shows that we have somewhat
    around 170 base items, with less than half having only one variant (light green
    bar). However, the other part had more than one version, and what is noteworthy
    (and, I believe, non-obvious, unless you work in apparel ecommerce) is that we
    have products with a really large number of versions. The black bin contains items
    that come in 100 or more different variants.
  prefs: []
  type: TYPE_NORMAL
- en: If you guessed that they were increasing their offerings by introducing new
    products while keeping old ones available, you are correct. But wouldn’t it be
    interesting to know whether the differences stem from heritage or new products?
    What if we just included products introduced in the current year? We may check
    it by using the date of product introduction rather than transactions. Because
    our only dataset is a transaction dump, the first transaction for each product
    is taken as the introduction date. And for each product, we take all versions
    that appeared in transactions, with no time constraints (from product introduction
    to the most current record).
  prefs: []
  type: TYPE_NORMAL
- en: '![Products, their variants, by product introduction date, yearly](../Images/e75b8dcff0f2ee386f9f8aa66b141e7b.png)'
  prefs: []
  type: TYPE_IMG
- en: Products, their variants, by product introduction date, yearly
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s have these two plots side by side for easy comparison. Taking transactions
    dates we have more products in each year, and the difference grows – since there
    are also transactions with products introduced previously. No suprises here, as
    expected. If you were wondering why data for 2019 differ – nice catch. In fact,
    shop started operation in 2018, but I removed these few initial months; still,
    it is their impact what makes the difference in 2019.
  prefs: []
  type: TYPE_NORMAL
- en: Products variants and it’s impact on revenue is not our focus in this article.
    But as it is often in real analysis, there are ‘branching’ options, as we progress,
    even in the initial phase. We haven’t even finished data preparation, and it is
    already getting interesting.
  prefs: []
  type: TYPE_NORMAL
- en: '![Products, their variants, by product introduction and transaction, yearly](../Images/d4f792767e26faa0ffaa9d822f7983bc.png)'
  prefs: []
  type: TYPE_IMG
- en: Products, their variants, by product introduction and transaction, yearly
  prefs: []
  type: TYPE_NORMAL
- en: '![Same data as above, facet by bin](../Images/f6c10224bd54b7da06ea41913c15d69e.png)'
  prefs: []
  type: TYPE_IMG
- en: Same data as above, facet by bin
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the product structure is critical for conducting meaningful concentration
    analyses. Now that our data is appropriately formatted, we can examine actual
    concentration measurements and what they reveal about ideal portfolio structure.
    In the following part, we’ll look at these measurements and what they mean for
    e-commerce businesses.
  prefs: []
  type: TYPE_NORMAL
- en: Measuring Concentration – theory meets practice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When it comes to determining concentration, economists and market analysts have
    done the heavy lifting for us. Over decades of research into markets, competitiveness,
    and inequality, they’ve produced powerful analytical methods that have proven
    useful in a variety of sectors. Rather than developing novel metrics for e-commerce
    portfolio analysis, we can use existing time-tested methods.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see how theoretical frameworks can shed light on practical e-commerce
    questions.
  prefs: []
  type: TYPE_NORMAL
- en: Herfindahl-Hirschman Index
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: HHI (Herfindahl-Hirschman Index) is probably the most common way to measure
    concentration. Regulators use it to check if a market isn’t becoming too concentrated
    – they take percentages of each company’s market share, square them, and add up.
    Simple as that. The result can be anywhere from nearly 0 (many small players)
    to 10,000 (one company takes it all).
  prefs: []
  type: TYPE_NORMAL
- en: Why use HHI for e-commerce portfolio analysis? The logic is straightforward
    – instead of companies competing in a market, we have products competing for revenue.
    The math works exactly the same way – we take each product’s share of total revenue,
    square it, and sum up. High HHI means revenue depends on few products, while low
    HHI shows revenue is spread across many products. This gives us a single number
    to track portfolio concentration over time.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/513631287cbfadcd1d72f52265a0e1d9.png)![HHI, and Products for
    context](../Images/91c7c2889f04bcc2731550bdbbf02b49.png)'
  prefs: []
  type: TYPE_IMG
- en: HHI, and Products for context
  prefs: []
  type: TYPE_NORMAL
- en: Pareto
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Who has not heard of Pareto’s rules? In 1896, Italian economist Vilfredo Pareto
    observed that 20% of the population held 80% of Italy’s land. Since then, this
    pattern has been found in a variety of fields, including wealth distribution and
    retail sales.
  prefs: []
  type: TYPE_NORMAL
- en: While popularly referred to as the "80/20 rule," the Pareto principle is not
    limited to these figures. We can use any x-axis criterion (for example, the top
    30% of products) to determine the appropriate y value (revenue contribution).
    The Lorenz curve, formed by linking these locations, provides a complete picture
    of concentration.
  prefs: []
  type: TYPE_NORMAL
- en: '![Pareto lines for different revenue share thresholds](../Images/58a9910a070627bce6f9140a775e0eae.png)'
  prefs: []
  type: TYPE_IMG
- en: Pareto lines for different revenue share thresholds
  prefs: []
  type: TYPE_NORMAL
- en: The chart above shows how many products do we need to achieve certain revenue
    share (of the monthly revenue). I took arbitrarily cuts at .2, .3, .5, .8, .95,
    and of course also including 1 – which means total number of products, contributing
    to 100% of revenue in a given month.
  prefs: []
  type: TYPE_NORMAL
- en: Lorenz curve
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If we sort products by their revenue contribition, and chart the line, we get
    Lorenz curve. On both axis we have percentages, of products and their reveue share.
    I case of perfectly uniform revenue distribution, we’d have a straight line, while
    in case of "perfect concentration", very steep curve, climbing close to 100% revenue,
    and then rapidly turning right, to include some residual revenue from other products.
  prefs: []
  type: TYPE_NORMAL
- en: '![Lorenz curve](../Images/05f202ea1eaea8b6bd79219086e0a9fe.png)'
  prefs: []
  type: TYPE_IMG
- en: Lorenz curve
  prefs: []
  type: TYPE_NORMAL
- en: It is interesting to see that line, but in most cases it will look quite similar,
    like a "bended stick". So let us now compare these lines for few previous months,
    and also few years back (sticking to October). The monthly lines are quite similar,
    and if you think – it would be good to have some interactivity in this plot, you
    are absolutely right. The yearly comparison shows more differences (we still have
    monthly data, taking October in each year), and this is understandable, since
    these measurements are more distant in time.
  prefs: []
  type: TYPE_NORMAL
- en: '![Lorenz curve - comparing periods](../Images/2f117d22819df67b6209293b591eb6bd.png)'
  prefs: []
  type: TYPE_IMG
- en: Lorenz curve – comparing periods
  prefs: []
  type: TYPE_NORMAL
- en: So we do see differences between the lines, but can’t we quantify them somehow,
    not to rely entirely on visual similarity? Definitely, and there is a ratio for
    that – Gini Ratio. And by the way, we will have quite a lot of ratios in next
    chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Gini Ratio
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To translate shape of Lorenz curve into numeric value, we can use Gini ratio
    – defined as a ratio between two areas, above and below the equality line. On
    a plot below it is a ratio between dark and light blue areas.
  prefs: []
  type: TYPE_NORMAL
- en: '![Gini ratio visualization](../Images/940fd31964bf5b4a365309c8a5caf505.png)'
  prefs: []
  type: TYPE_IMG
- en: Gini ratio visualization
  prefs: []
  type: TYPE_NORMAL
- en: Let us then visualize for two periods – October 2019, and October 2024, exact
    same periods, as we have on one of the plots before.
  prefs: []
  type: TYPE_NORMAL
- en: '![Gini ratio, comparing two periods](../Images/b385a253ee3dd50dafd990dc22712b90.png)'
  prefs: []
  type: TYPE_IMG
- en: Gini ratio, comparing two periods
  prefs: []
  type: TYPE_NORMAL
- en: Once we have good understanding, with visuals, how the Gini ratio is calculated,
    let’s plot it, over the whole period.
  prefs: []
  type: TYPE_NORMAL
- en: I use R for analysis, so I have Gini ratio easily available (as well as other
    ratios, which I will show later). The initial data table (x3a_dt) contains revenue
    per product, per month. The resulting one has Gini ratio per month.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Good we have all these packages for heavy lifting. The math behind is not super
    complicated, but our time is precious.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/182c3b0b41c64773122135cc38ba4136.png)'
  prefs: []
  type: TYPE_IMG
- en: The plot below shows the result of calculations.
  prefs: []
  type: TYPE_NORMAL
- en: '![Gini over time](../Images/2ccb584a92545b2e08dc0ac491c6efe6.png)'
  prefs: []
  type: TYPE_IMG
- en: Gini over time
  prefs: []
  type: TYPE_NORMAL
- en: I haven’t included a smoothing line, with its confidence interval channel, since
    we do not have measurement points, but the result of Gini calculation, with its
    own errors distribution. To be very strict and precise on math, we’d need to calculate
    the confidence interval, and based on that plot smoothed line. The results are
    below.
  prefs: []
  type: TYPE_NORMAL
- en: '![Gini over time, with trend line](../Images/4fdcfea220043b8a7d448577cc117d44.png)'
  prefs: []
  type: TYPE_IMG
- en: Gini over time, with trend line
  prefs: []
  type: TYPE_NORMAL
- en: Since we do not use directly statistical significance of calculated ratio, this
    super strict approach is a little bit an overkill. I haven’t done it while charting
    trend line for HHI, nor will do in next plots. But it is good to be aware of this
    nuance.
  prefs: []
  type: TYPE_NORMAL
- en: We have seen so far two ratios – HHI and Gini, and they are far from being identical.
    Lorenz curve closer to diagonal indicates more uniform distribution, which is
    what we have for October 2019, but the HHI is higher, than for 2024, indicating
    more concentration in 2019\. Maybe I made a mistake in calculations, even worse,
    early on during data preparation? That would be really unfortunate. Or the data
    is ok, but we are struggling with proper interpretation?
  prefs: []
  type: TYPE_NORMAL
- en: I have quite often moments of such doubts, especially when moving with the analysis
    really quick. So how do we cope with that, tightening grip on data and our understanding
    of dependencies? Bear in mind, that whatever analysis you do, there is always
    first time. And quite often we do not have a luxury of ‘leisure’ research, it
    is more often already work for a Client (or a superior, stakeholder, whoever requested
    it, even ourselves, if it is our initiative).
  prefs: []
  type: TYPE_NORMAL
- en: Tightening grip
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We need to have a good understanding of how to interpret all these ratios, including
    dependencies between them. If you plan to present your results to others, questions
    here are guaranteed, so better to be well prepared. We can work with an existing
    dataset, or we can generate a small set, where it will be easier to catch dependencies.
    Let us follow the latter approach.
  prefs: []
  type: TYPE_NORMAL
- en: Let us start with creating a small dataset,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: combining it into a data.table.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: A quick overview of the data.
  prefs: []
  type: TYPE_NORMAL
- en: '![Example dataset](../Images/0cdbfa1b593a0829d2c17f85a773d6b2.png)'
  prefs: []
  type: TYPE_IMG
- en: Example dataset
  prefs: []
  type: TYPE_NORMAL
- en: It seems we have what we needed – a simple dataset, but still quite realistic.
    Now we are proceeding with calculations and charts, similar to what we had for
    a real dataset before.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: And rendering plots.
  prefs: []
  type: TYPE_NORMAL
- en: '![Ratios comparison](../Images/47b41e6d421a3dc2a1d558608d43f53c.png)'
  prefs: []
  type: TYPE_IMG
- en: Ratios comparison
  prefs: []
  type: TYPE_NORMAL
- en: These charts help a lot in understanding ratios, relations between them and
    to data. It is always a good idea to have such micro analysis, for ourselves and
    for stakeholders – as ‘back pocket’ slides, or even sharing them upfront.
  prefs: []
  type: TYPE_NORMAL
- en: Nerdy detail – how to slightly shift the line, so it doesn’t overlap, and add
    labels within a plot? Render a plot, and then make manual fine tuning, expecting
    several iterations.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: For labelling I use ggrepel, but as a default, it will label all the points,
    while we need only one per line. An in addition deciding which one, for good looking
    chart.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Render the plot.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: More Ratios
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I began with HHI, the Lorenz curve, and the accompanying Gini ratios, as they
    appeared to be good starting points for concentration and inequality measurements.
    However, there are numerous different ratios used to define distributions, whether
    for inequality or in general. It’s unlikely that we’d employ all of them at once,
    therefore select the subset that provides the most insights for your specific
    challenge.
  prefs: []
  type: TYPE_NORMAL
- en: With a proper structure of a dataset, it is quite straightforward to calculate
    them. I am sharing code snippets, with several ratios calculated monthly. We use
    a dataset, we already have – monthly revenue per product (base products, excluding
    variants).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/69eccd86faf431998006c65ea56d0b5b.png)'
  prefs: []
  type: TYPE_IMG
- en: Starting with ratios from the `ineq` package.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Diustribution shape and top/bottom shares and ratios.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Basic statistics, quantiles.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Count measures.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Revenue above (or below) the threshold.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: The resulting table has 40 columns, and 72 rows (months).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cca364deda0f38ae38a77f9fd4cd28ab.png)'
  prefs: []
  type: TYPE_IMG
- en: As mentioned earlier, it is difficult to imagine, one would work with 40 ratios,
    so I am rather showing a method how to calculate them, and one should pick relevant
    ones. As always, it is good to visualize and see how they relate to each other.
  prefs: []
  type: TYPE_NORMAL
- en: '![Selected ratios over time](../Images/a0910481fcf2d121eace167e674d6335.png)'
  prefs: []
  type: TYPE_IMG
- en: Selected ratios over time
  prefs: []
  type: TYPE_NORMAL
- en: We can calculate correlation matrix between all ratios, or selected subset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Change column names to more friendly names.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: And render the plot.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: '![Correlation matrix, selected ratios](../Images/7faf38f6a258a12810333a1e22adfd13.png)'
  prefs: []
  type: TYPE_IMG
- en: Correlation matrix, selected ratios
  prefs: []
  type: TYPE_NORMAL
- en: And then we can plot some interesting pairs. Of course, some of them have positive
    or negative correlation *by definition*, while in other cases it is not that obvious.
  prefs: []
  type: TYPE_NORMAL
- en: '![Selected ratios, with negative correlation](../Images/d301f9075374e3dae4ddc756bcf4163b.png)'
  prefs: []
  type: TYPE_IMG
- en: Selected ratios, with negative correlation
  prefs: []
  type: TYPE_NORMAL
- en: Show me the money
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We started analysis with ratios and Lorenz curve as a top-down overview. It
    is a good start, but there are two complications – the ratios have a relatively
    broad range, when the business is doing ok, and there is hardly connection to
    actionable insights. Even if we notice that the ratio is on the edge, or outside
    of the safe range, it is unclear what we should do. And instructions like "decrease
    concentration" are a little ambiguous.
  prefs: []
  type: TYPE_NORMAL
- en: E-commerce talks and breaths products, so to make analysis relatable, we need
    to reference to particular products. People would also like to understand which
    products constitute core 50%, 80% of revenue, and equally important, if these
    products stay consistently as top contributors.
  prefs: []
  type: TYPE_NORMAL
- en: Let us take one month, August 2024 and see which products contributed to 50%
    revenue in that month. Then, we check revenue from these exact products in other
    months. There are 5 products, generating (at least) 50% revenue in August.
  prefs: []
  type: TYPE_NORMAL
- en: '![Products revenue, facets by product](../Images/e84ecab2fa6cc6b2b1eeb5f9ebd22f15.png)'
  prefs: []
  type: TYPE_IMG
- en: Products revenue, facets by product
  prefs: []
  type: TYPE_NORMAL
- en: We can also render more visually appealing plot with a streamgraph. Both plots
    show exact same dataset, but they complement each other nicely – bar plots for
    precision, while streamgraph for a story.
  prefs: []
  type: TYPE_NORMAL
- en: '![Products revenue, stream graph](../Images/40e62188e9cd3ed518251c5f300931e6.png)'
  prefs: []
  type: TYPE_IMG
- en: Products revenue, stream graph
  prefs: []
  type: TYPE_NORMAL
- en: The red line indicated selected month. If you feel "itching" to shift that line,
    like in an old-fashioned radio, you are absolutely right – that should be an interactive
    chart, and actually it is, along with a slider for revenue share percentage (we
    produced it for a Client).
  prefs: []
  type: TYPE_NORMAL
- en: So what if we shift that red ‘tuning line’ a little bit backwards, maybe to
    2020? The logic in data preparation is very similar – get products contributing
    to a certain revenue share threshold, and check the revenue from these products
    in other months.
  prefs: []
  type: TYPE_NORMAL
- en: '![Products revenue, stream graph](../Images/3d2f6da28e79838b09bd483189ddea31.png)'
  prefs: []
  type: TYPE_IMG
- en: Products revenue, stream graph
  prefs: []
  type: TYPE_NORMAL
- en: 'With interactivity on two elements – revenue contribution percentage and the
    date, one can learn a lot about the business, and this is exactly the point of
    these charts. One can look from different angles:'
  prefs: []
  type: TYPE_NORMAL
- en: concentration, how many products do we need for certain revenue threshold,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: products themselves, do they stay in certain revenue contribution bin, or do
    they change and why? Is it seasonality, a valid replacement, lost supplier or
    something else?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: time window, whether we look at one month or a whole year,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: seasonality, comparing similar time of a year with previous periods.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What the Data Tells Us
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Our 6-year dataset reveals the evolution of an e-commerce business from high
    concentration to balanced growth. Here are the key patterns and lessons:'
  prefs: []
  type: TYPE_NORMAL
- en: With 6 years of data, I had a unique chance to watch concentration metrics evolve
    as the business grew. Starting with just a handful of products, I saw exactly
    what you’d expect – sky-high concentration. But as new products entered the mix,
    things got more interesting. The business found its rhythm with a dozen or so
    top performers, and the HHI settled into a comfortable 700–800 range.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s something fascinating I discovered: concentration and inequality might
    sound like twins, but they’re more like distant cousins. I noticed this while
    comparing HHI against Lorenz curves and their Gini ratios. Trust me, you’ll want
    to get comfortable with the math before explaining these patterns to stakeholders
    – they’ll smell uncertainty from a mile away.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Want to really understand these metrics? Do what I did: create a dummy dataset
    so simple it’s almost embarrassing. I’m talking basic patterns that a fifth-grader
    could grasp. Sounds like overkill? Maybe, but it saved me countless hours of head-scratching
    and misinterpretation. Keep these examples in your back pocket – or better yet,
    share them upfront. Nothing builds confidence like showing you’ve done your homework.'
  prefs: []
  type: TYPE_NORMAL
- en: Look, calculating these ratios isn’t rocket science. The real magic happens
    when you dig into how each product contributes to your revenue. That’s why I added
    the "show me the money" section – I don’t believe in quick fixes or magic formulas.
    It’s about rolling up your sleeves and understanding how each product really behaves.
  prefs: []
  type: TYPE_NORMAL
- en: As you’ve probably noticed yourself, these streamgraphs I showed you are practically
    begging for interactivity. And boy, does that add value! Once you’ve got your
    keys and joins sorted out, it’s not even that complicated. Give your users an
    interactive tool, and suddenly you’re not drowning in one-off questions anymore
    – they’re finding insights themselves.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a pro tip: use this concentration analysis as your foot in the door
    with stakeholders. Show your product teams that streamgraph, and I guarantee their
    eyes will light up. When they start asking for interactive versions, you’ve got
    them hooked. The best part? They’ll think it was their idea all along. That’s
    how you get real adoption – by letting them discover the value themselves.'
  prefs: []
  type: TYPE_NORMAL
- en: Data Engineering Takeaways
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While quite often we generally know what to expect in a dataset, it is almost
    guaranteed that there will be some nuances, exceptions, or maybe even surprises.
    It’s good to spend some time reviewing datasets, using dedicated functions (like
    str, glimpse in R), looking for empty fields, outliers, but also simply scrolling
    through to understand the data. I like comparisons, and in this case, I’d compare
    to smelling fish on a market before jumping to prepare sushi 🙂
  prefs: []
  type: TYPE_NORMAL
- en: Then, if we work with a raw data export, quite likely there will be several
    columns in the data dump; after all, if we click ‘export all’, wouldn’t we expect
    exactly that? For most analysis we will need a subset of these columns, so it’s
    good to trim and keep only what we need. I assume we work with a script, so if
    it turns out, we need more, not an issue, just add missed column and rerun that
    chunk.
  prefs: []
  type: TYPE_NORMAL
- en: In the dataset dump there was a timestamp in one row per transaction, while
    we needed it per each product. Hence some light data wrangling to propagate these
    timestamps to all the products.
  prefs: []
  type: TYPE_NORMAL
- en: After cleaning the dataset, it’s important to consider the context of analysis,
    including the questions to be answered and the necessary changes to the data.
    This "contextual cleaning/wrangling" is critical since it determines whether the
    analysis succeeds or fails. In our situation, the goal was to analyse product
    concentration, therefore filtering out variants (size, colour, etc.) was essential.
    If we had skipped that, the outcome would have been radically different.
  prefs: []
  type: TYPE_NORMAL
- en: Quite often we can expect some "traps", where initially it seems we can apply
    simple approach, while actually, we should add a bit of sophistication. As an
    example – Lorenz curve, where we need to calculate how many products do we need
    to get to a certain revenue threshold. This is where I use rolling joins, which
    fit here perfectly.
  prefs: []
  type: TYPE_NORMAL
- en: The core logic to produce streamgraphs is to find products which constitute
    certain revenue percentage in a given month, then "freeze" them and get their
    revenue in other months. The toolset I used was adding extra column, with a product
    number, after sorting per month, and then playing with keys and joins.
  prefs: []
  type: TYPE_NORMAL
- en: An important element of this analysis was adding interactivity, allowing users
    to play with some parameters. That raises the bar, as we need all these operations
    to be performed lightning fast. The ingredients we need are right data structure,
    additional columns, proper keys and joins. Prepare as much as possible, precalculating
    in a data warehouse, so the dashboarding tool is not overloaded. Take caching
    into account.
  prefs: []
  type: TYPE_NORMAL
- en: How to Start?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Strike a balance between delivering what stakeholders request and exploring
    potentially valuable insights they haven’t asked for yet. The analysis I presented
    follows this pattern – getting initial concentration ratios is straightforward,
    while building an interactive streamgraph optimized for lightning-fast operation
    requires significant effort.
  prefs: []
  type: TYPE_NORMAL
- en: Start small and engage others. Share basic findings, discuss what you could
    learn together, and only then proceed with more labor-intensive analysis once
    you’ve secured genuine interest. And always maintain a solid grip on your raw
    data – it’s invaluable for answering those inevitable ad-hoc questions quickly.
  prefs: []
  type: TYPE_NORMAL
- en: Building a prototype before full production allows for validation of interest
    and feedback without devoting too much time. In my case, such simple concentration
    ratios sparked debates that eventually led to the more advanced interactive studies
    on which stakeholders rely today.
  prefs: []
  type: TYPE_NORMAL
- en: '![Start small, secure genuine interest ... :-)) / image generated by DALL-E,
    based on author''s prompt.](../Images/f4584f0872ea8ed3c8c89c3585e01233.png)'
  prefs: []
  type: TYPE_IMG
- en: Start small, secure genuine interest … :-)) / image generated by DALL-E, based
    on author’s prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Appendix – data preparation & wrangling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ll show you how I prepared the data at each step of this analysis. Since I
    used R, I’ll include the actual code snippets – they’ll help you get started faster,
    even if you’re working in a different language. This is the code I used for the
    study, though you’ll probably need to adapt it to your specific needs rather than
    just copying it over. I decided to keep the code separate from the main analysis,
    to make it more streamlined and readable for both technical and business users.
  prefs: []
  type: TYPE_NORMAL
- en: While I am presenting analysis based on Shopify export, there is no limitation
    for a particular platform, we just need transactions data.
  prefs: []
  type: TYPE_NORMAL
- en: Shopify export
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
