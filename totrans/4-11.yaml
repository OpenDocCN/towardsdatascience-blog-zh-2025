- en: Are your top-selling products making or breaking your business?
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 你的畅销产品是在创造还是破坏你的业务？
- en: It’s terrifying to think your entire revenue might collapse if one or two products
    fall out of favor. Yet spreading too thin across hundreds of products often leads
    to mediocre results and brutal price wars.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，如果一两个产品不再受欢迎，你的全部收入可能会崩溃，这是令人恐惧的。然而，在数百种产品上过于分散通常会导致平庸的结果和残酷的价格战。
- en: Discover how a 6-year Shopify case study uncovered the perfect balance between
    focus and diversification.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 发现如何通过一个6年的Shopify案例研究找到专注与多元化的完美平衡。
- en: Why bother?
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么费心？
- en: Understanding concentration in your product portfolio is more than simply an
    intellectual exercise; it has a direct impact on crucial business choices. From
    inventory planning to marketing spend, understanding how your revenue is distributed
    among goods impacts your approach.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 理解你的产品组合中的集中度不仅仅是一个智力练习；它对关键的商业决策有直接影响。从库存计划到营销支出，了解你的收入如何在商品之间分配影响着你的方法。
- en: This post walks through practical strategies for monitoring concentration, explaining
    what these measurements actually mean and how to get useful insights from your
    data.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本文将介绍监控集中度的实用策略，解释这些测量实际上意味着什么，以及如何从你的数据中获得有价值的见解。
- en: I’ll take you through fundamental metrics and advanced analysis, including interactive
    visualisations that bring the data to life.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我将带你了解基本指标和高级分析，包括使数据生动起来的交互式可视化。
- en: I am also sharing chunks of R code used in this analysis. Use it directly or
    adapt the logic to your preferred programming language.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我还分享了在此分析中使用的R代码片段。可以直接使用或将其逻辑改编到你喜欢的编程语言中。
- en: The Concentration Question
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集中度问题
- en: 'Looking at market analysis or investment theory, we often focus on concentration
    – how value is distributed across different elements. In e-commerce, this translates
    into a fundamental question: How much of your revenue should come from your top
    products?'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在分析市场分析或投资理论时，我们通常关注集中度——价值是如何在不同元素之间分布的。在电子商务中，这转化为一个基本问题：你的收入中有多少应该来自你的顶级产品？
- en: Is it better to have several strong sellers or a broad product range? This isn’t
    just a theoretical question …
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 是拥有几个强劲的销售者还是广泛的产品范围更好？这不仅仅是一个理论问题……
- en: Having most of your revenue tied to few products means your operations are streamlined
    and focused. But what happens when market preferences shift? Conversely, spreading
    revenue across hundreds of products might seem safer, but it often means you lack
    any real competitive advantage.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 大部分收入依赖于少数产品意味着你的运营是简化和专注的。但是，当市场偏好发生变化时会发生什么呢？相反，将收入分散到数百种产品可能看起来更安全，但通常意味着你缺乏任何真正的竞争优势。
- en: So where’s the optimal point? Or rather what is the optimal range, and how various
    ratios describe it.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 那么最佳点在哪里？或者更确切地说，最佳范围是什么，以及各种比率如何描述它。
- en: What makes this analysis particularly valuable is that it is based on real data
    from a business that kept expanding its product range over time.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 什么使得这项分析特别有价值的是，它基于一家随着时间的推移不断扩展其产品范围的企业的真实数据。
- en: Getting the Data Right
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 正确获取数据
- en: On Datasets
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于数据集
- en: This analysis was done for a real US-based e-commerce store – one of our clients
    who kindly agreed to share their data for this article. The data spans six years
    of their growth, giving us a rich view of how product concentration evolves as
    business matures.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这项分析是为一家真正的美国电子商务商店进行的——我们的一位客户，他们友好地同意分享他们的数据供本文使用。这些数据涵盖了他们六年的增长，为我们提供了丰富的视角，了解产品集中度是如何随着业务的成熟而演变的。
- en: While working with actual business data gives us genuine insights, I’ve also
    created a synthetic dataset in one of the later sections. This small, artificial
    dataset helps illustrate the relationships between various ratios in a more controlled
    setting – showing patterns "counting on fingers".
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然处理实际业务数据给我们带来了真正的洞察力，但在稍后的某个部分，我也创建了一个合成数据集。这个小的人工数据集有助于在更受控的环境中展示各种比率之间的关系——展示“数手指”的模式。
- en: 'To be clear: this synthetic data was created entirely from scratch and only
    loosely mimics general patterns seen in real e-commerce – it has no direct connection
    to our client’s actual data. This is different from my previous article, where
    I generated synthetic data based on real patterns using Snowflake functionality.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了明确：这个合成数据完全是从头创建的，并且只是松散地模仿了在真实电子商务中看到的一般模式——它与我们的客户实际数据没有直接联系。这与我的前一篇文章不同，在那篇文章中，我使用Snowflake功能根据真实模式生成了合成数据。
- en: Data Export
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据导出
- en: The main analysis draws from real data, but that small artificial dataset serves
    an important purpose – it helps explain relationships between various ratios in
    a way that’s easy to grasp. And trust me, having such a micro dataset with clear
    visuals comes in really handy when explaining complex dependencies to stakeholders
    😉
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 主要分析基于真实数据，但那个小的人工数据集也起到了重要的作用——它以易于理解的方式解释了各种比率之间的关系。相信我，当向利益相关者解释复杂的依赖关系时，拥有这样一个具有清晰视觉的微观数据集真的非常有用
    😉
- en: The raw transaction export from Shopify contains everything we require, but
    we must arrange it properly for concentration analysis. The data contains all
    of the products for each transaction, but the date is only in one row per transaction,
    thus we must propagate it to all products while retaining the transaction id.
    Probably not for the first iteration of the study, but if we want to fine-tune
    it, we should consider how to handle discounts, returns, and so on. In the case
    of foreign sales, conduct a global and country-specific study.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: Shopify的原始交易导出包含了我们所需要的一切，但我们必须适当地安排它以进行浓度分析。数据包含了每个交易的所有产品，但日期只在每个交易中占一行，因此我们必须将其传播到所有产品，同时保留交易ID。可能不是研究的第一次迭代，但如果我们要进行微调，我们应该考虑如何处理折扣、退货等问题。在外国销售的情况下，进行全球和特定国家的研究。
- en: We have a product name and an SKU, both of which should adhere to some naming
    convention and logic when dealing with variants. If we have a master catalogue
    with all of these descriptions and codes, we are very fortunate. If you have it,
    use it, but compare it to the ‘ground truth’ with actual transaction data.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有一个产品名称和一个SKU，在处理变体时，这两个都应该遵循某种命名约定和逻辑。如果我们有一个包含所有这些描述和代码的主目录，我们非常幸运。如果你有，请使用它，但将其与实际的交易数据进行比较。
- en: Product Variants
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 产品变体
- en: In my case, the product names were structured with a base name and a variant
    separated by a dash. Very simple to use, divided into main product and variants.
    Exceptions? Of course, they are always present, especially when dealing with 6
    years of highly successful ecommerce data:). For instance, some names (e.g. "All-purpose")
    included a dash, while others did not. Then, some did have variants, while some
    did not. So expect for some tweaks here, but this is a critical stage.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的情况下，产品名称是以基础名称和变体通过破折号分隔的结构化的。非常简单易用，分为主要产品和变体。例外情况？当然，它们总是存在的，尤其是在处理6年的高度成功的电子商务数据时：）。例如，一些名称（例如“多功能”）包含破折号，而另一些则没有。然后，一些确实有变体，而另一些则没有。所以预期这里会有一些调整，但这是一个关键阶段。
- en: '![Number of unique products, with and without variants - all charts rendered
    by author, with own R code](../Images/2c4ddd948c1e2d8c854ef0bd4f79fdeb.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![唯一产品的数量，带和不带变体 - 所有图表均由作者绘制，使用自己的R代码](../Images/2c4ddd948c1e2d8c854ef0bd4f79fdeb.png)'
- en: Number of unique products, with and without variants – all charts rendered by
    author, with own R code
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一产品的数量，带和不带变体——所有图表均由作者绘制，使用自己的R代码
- en: If you’re wondering why we need to exclude variations from concentration analysis,
    the figure above illustrates it clearly. The values are considerably different,
    and we would expect radically different results if we analysed concentration with
    variants.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想知道为什么我们需要从浓度分析中排除变体，上面的图表清楚地说明了这一点。这些值相当不同，如果我们用变体分析浓度，我们预计会得到截然不同的结果。
- en: The analysis is based on transactions, counting number of products with/without
    variants in a given month. But if we have a large number of variants, not all
    of them will be present in one-month transactions. Yes, that is correct – so let
    us consider a larger time range, one year.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 分析基于交易，统计给定月份中具有/不具有变体的产品数量。但如果变体数量很多，并不是所有变体都会出现在一个月的交易中。是的，这是正确的——所以让我们考虑一个更大的时间范围，一年。
- en: '![Products, their variants, by transaction date, yearly](../Images/af9cb0ffeadb56db8c92a946d687c524.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![产品及其变体，按交易日期，年度](../Images/af9cb0ffeadb56db8c92a946d687c524.png)'
- en: Products, their variants, by transaction date, yearly
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 产品及其变体，按交易日期，年度
- en: I calculated the number of variants per base product in a calendar year based
    on what we have in transactions. The number of variants per base product is divided
    into several bins. Let’s take the year 2024\. The plot shows that we have somewhat
    around 170 base items, with less than half having only one variant (light green
    bar). However, the other part had more than one version, and what is noteworthy
    (and, I believe, non-obvious, unless you work in apparel ecommerce) is that we
    have products with a really large number of versions. The black bin contains items
    that come in 100 or more different variants.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我根据我们在交易中的数据，计算了日历年度内每个基础产品的变体数量。每个基础产品的变体数量被分为几个区间。以2024年为例，图表显示我们有大约170个基础项目，其中不到一半只有一个变体（浅绿色条）。然而，另一部分有多个版本，值得注意的是（我相信，除非你在服装电商领域工作，否则可能不会很明显）我们有一些版本数量非常多的产品。黑色区间包含有100种或更多不同变体的项目。
- en: If you guessed that they were increasing their offerings by introducing new
    products while keeping old ones available, you are correct. But wouldn’t it be
    interesting to know whether the differences stem from heritage or new products?
    What if we just included products introduced in the current year? We may check
    it by using the date of product introduction rather than transactions. Because
    our only dataset is a transaction dump, the first transaction for each product
    is taken as the introduction date. And for each product, we take all versions
    that appeared in transactions, with no time constraints (from product introduction
    to the most current record).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你猜到他们通过引入新产品同时保持旧产品可用来增加产品种类，你是正确的。但知道差异是否源于传统产品或新产品是否有趣？如果我们只包括当年引入的产品会怎样？我们可以通过使用产品引入日期而不是交易来检查它。因为我们的唯一数据集是交易垃圾，每个产品的第一次交易被视为引入日期。并且对于每个产品，我们取在交易中出现的所有版本，没有时间限制（从产品引入到最新记录）。
- en: '![Products, their variants, by product introduction date, yearly](../Images/e75b8dcff0f2ee386f9f8aa66b141e7b.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![产品及其变体，按产品引入日期，年度](../Images/e75b8dcff0f2ee386f9f8aa66b141e7b.png)'
- en: Products, their variants, by product introduction date, yearly
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 产品及其变体，按产品引入日期，年度
- en: Now let’s have these two plots side by side for easy comparison. Taking transactions
    dates we have more products in each year, and the difference grows – since there
    are also transactions with products introduced previously. No suprises here, as
    expected. If you were wondering why data for 2019 differ – nice catch. In fact,
    shop started operation in 2018, but I removed these few initial months; still,
    it is their impact what makes the difference in 2019.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们将这两个图表并排放置，以便于比较。考虑到交易日期，每年我们有更多的产品，差异在增长——因为还有之前引入的产品交易。不出所料，没有惊喜。如果你想知道为什么2019年的数据不同——这是一个很好的发现。事实上，商店在2018年开始运营，但我移除了这些最初的几个月；然而，正是这些初始月份的影响使得2019年有所不同。
- en: Products variants and it’s impact on revenue is not our focus in this article.
    But as it is often in real analysis, there are ‘branching’ options, as we progress,
    even in the initial phase. We haven’t even finished data preparation, and it is
    already getting interesting.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们不是关注产品变体及其对收入的影响。但正如现实分析中经常发生的那样，在初始阶段，甚至进展过程中，也存在“分支”选项。我们甚至还没有完成数据准备，就已经变得很有趣了。
- en: '![Products, their variants, by product introduction and transaction, yearly](../Images/d4f792767e26faa0ffaa9d822f7983bc.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![产品及其变体，按产品引入和交易，年度](../Images/d4f792767e26faa0ffaa9d822f7983bc.png)'
- en: Products, their variants, by product introduction and transaction, yearly
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 产品及其变体，按产品引入和交易，年度
- en: '![Same data as above, facet by bin](../Images/f6c10224bd54b7da06ea41913c15d69e.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![与上述相同数据，按区间细分](../Images/f6c10224bd54b7da06ea41913c15d69e.png)'
- en: Same data as above, facet by bin
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 与上述相同数据，按区间细分
- en: Understanding the product structure is critical for conducting meaningful concentration
    analyses. Now that our data is appropriately formatted, we can examine actual
    concentration measurements and what they reveal about ideal portfolio structure.
    In the following part, we’ll look at these measurements and what they mean for
    e-commerce businesses.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 理解产品结构对于进行有意义的集中度分析至关重要。现在我们的数据已经适当地格式化，我们可以检查实际的集中度测量以及它们揭示了理想的投资组合结构。在下一部分，我们将探讨这些测量以及它们对电子商务企业意味着什么。
- en: Measuring Concentration – theory meets practice
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测量集中度——理论与实践相结合
- en: When it comes to determining concentration, economists and market analysts have
    done the heavy lifting for us. Over decades of research into markets, competitiveness,
    and inequality, they’ve produced powerful analytical methods that have proven
    useful in a variety of sectors. Rather than developing novel metrics for e-commerce
    portfolio analysis, we can use existing time-tested methods.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到确定浓度时，经济学家和市场分析师已经为我们做了大量工作。在数十年的市场、竞争力和不平等研究过程中，他们已经开发出强大的分析方法，这些方法在各种行业中都已被证明是有用的。我们无需为电子商务投资组合分析开发新的指标，而可以使用现有的经过时间考验的方法。
- en: Let’s see how theoretical frameworks can shed light on practical e-commerce
    questions.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看理论框架如何为实际的电子商务问题提供启示。
- en: Herfindahl-Hirschman Index
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Herfindahl-Hirschman Index
- en: HHI (Herfindahl-Hirschman Index) is probably the most common way to measure
    concentration. Regulators use it to check if a market isn’t becoming too concentrated
    – they take percentages of each company’s market share, square them, and add up.
    Simple as that. The result can be anywhere from nearly 0 (many small players)
    to 10,000 (one company takes it all).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: HHI（Herfindahl-Hirschman Index）可能是衡量集中度最常见的方式。监管机构使用它来检查市场是否没有变得过于集中——他们取每个公司的市场份额百分比，平方它们，然后相加。就这么简单。结果可以从几乎0（许多小玩家）到10,000（一家公司独占所有）不等。
- en: Why use HHI for e-commerce portfolio analysis? The logic is straightforward
    – instead of companies competing in a market, we have products competing for revenue.
    The math works exactly the same way – we take each product’s share of total revenue,
    square it, and sum up. High HHI means revenue depends on few products, while low
    HHI shows revenue is spread across many products. This gives us a single number
    to track portfolio concentration over time.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么使用HHI进行电子商务投资组合分析？逻辑很简单——在市场上不是公司之间的竞争，而是产品之间的收入竞争。数学运算方式完全相同——我们取每个产品的总收入份额，平方它，然后求和。高HHI意味着收入依赖于少数产品，而低HHI则表明收入分散在许多产品上。这为我们提供了一个单一的数字，可以追踪投资组合随时间的变化。
- en: '![](../Images/513631287cbfadcd1d72f52265a0e1d9.png)![HHI, and Products for
    context](../Images/91c7c2889f04bcc2731550bdbbf02b49.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![Herfindahl-Hirschman Index](../Images/513631287cbfadcd1d72f52265a0e1d9.png)![HHI和产品背景](../Images/91c7c2889f04bcc2731550bdbbf02b49.png)'
- en: HHI, and Products for context
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: HHI和产品背景
- en: Pareto
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 帕累托
- en: Who has not heard of Pareto’s rules? In 1896, Italian economist Vilfredo Pareto
    observed that 20% of the population held 80% of Italy’s land. Since then, this
    pattern has been found in a variety of fields, including wealth distribution and
    retail sales.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 谁没有听说过帕累托法则？1896年，意大利经济学家维弗雷多·帕累托观察到20%的人口拥有意大利80%的土地。从那时起，这种模式在各种领域被发现，包括财富分配和零售销售。
- en: While popularly referred to as the "80/20 rule," the Pareto principle is not
    limited to these figures. We can use any x-axis criterion (for example, the top
    30% of products) to determine the appropriate y value (revenue contribution).
    The Lorenz curve, formed by linking these locations, provides a complete picture
    of concentration.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然通常被称为“80/20法则”，但帕累托法则并不仅限于这些数字。我们可以使用任何x轴标准（例如，前30%的产品）来确定适当的y值（收入贡献）。通过连接这些位置形成的洛伦兹曲线，提供了一个关于集中度的完整图景。
- en: '![Pareto lines for different revenue share thresholds](../Images/58a9910a070627bce6f9140a775e0eae.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![不同收入份额阈值的帕累托线](../Images/58a9910a070627bce6f9140a775e0eae.png)'
- en: Pareto lines for different revenue share thresholds
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 不同收入份额阈值的帕累托线
- en: The chart above shows how many products do we need to achieve certain revenue
    share (of the monthly revenue). I took arbitrarily cuts at .2, .3, .5, .8, .95,
    and of course also including 1 – which means total number of products, contributing
    to 100% of revenue in a given month.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 上图显示了我们需要多少产品才能达到一定的收入份额（月收入）。我随意地选取了.2、.3、.5、.8、.95，当然也包括1——这意味着总产品数量，在一个月内贡献了100%的收入。
- en: Lorenz curve
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 洛伦兹曲线
- en: If we sort products by their revenue contribition, and chart the line, we get
    Lorenz curve. On both axis we have percentages, of products and their reveue share.
    I case of perfectly uniform revenue distribution, we’d have a straight line, while
    in case of "perfect concentration", very steep curve, climbing close to 100% revenue,
    and then rapidly turning right, to include some residual revenue from other products.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们按产品的收入贡献排序，并绘制线条，我们得到洛伦兹曲线。在两个轴上，我们都有产品和它们的收入份额的百分比。在完全均匀的收入分配的情况下，我们会得到一条直线，而在“完美集中”的情况下，曲线非常陡峭，接近100%的收入，然后迅速向右转，以包括其他产品的残余收入。
- en: '![Lorenz curve](../Images/05f202ea1eaea8b6bd79219086e0a9fe.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![洛伦兹曲线](../Images/05f202ea1eaea8b6bd79219086e0a9fe.png)'
- en: Lorenz curve
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 洛伦兹曲线
- en: It is interesting to see that line, but in most cases it will look quite similar,
    like a "bended stick". So let us now compare these lines for few previous months,
    and also few years back (sticking to October). The monthly lines are quite similar,
    and if you think – it would be good to have some interactivity in this plot, you
    are absolutely right. The yearly comparison shows more differences (we still have
    monthly data, taking October in each year), and this is understandable, since
    these measurements are more distant in time.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 看这条线很有趣，但在大多数情况下，它看起来会很相似，就像一个“弯曲的棍子”。因此，我们现在比较一下前几个月和几年前（坚持在10月）的这些线条。月度线条相当相似，如果你认为在这个图表中添加一些交互性会很好，你绝对是对的。年度比较显示了更多差异（我们仍然有月度数据，每年取10月），这是可以理解的，因为这些测量在时间上更远。
- en: '![Lorenz curve - comparing periods](../Images/2f117d22819df67b6209293b591eb6bd.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![洛伦兹曲线 - 比较时期](../Images/2f117d22819df67b6209293b591eb6bd.png)'
- en: Lorenz curve – comparing periods
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 洛伦兹曲线 – 比较时期
- en: So we do see differences between the lines, but can’t we quantify them somehow,
    not to rely entirely on visual similarity? Definitely, and there is a ratio for
    that – Gini Ratio. And by the way, we will have quite a lot of ratios in next
    chapters.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们确实看到了线条之间的差异，但我们能否以某种方式量化它们，而不仅仅依赖于视觉相似性？当然可以，为此有一个比率——基尼系数。顺便说一下，在接下来的章节中，我们将有很多比率。
- en: Gini Ratio
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基尼系数
- en: To translate shape of Lorenz curve into numeric value, we can use Gini ratio
    – defined as a ratio between two areas, above and below the equality line. On
    a plot below it is a ratio between dark and light blue areas.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 要将洛伦兹曲线的形状转换为数值，我们可以使用基尼系数——定义为等于线以上和以下两个区域的比率。在下面的图表中，它是深蓝色和浅蓝色区域的比率。
- en: '![Gini ratio visualization](../Images/940fd31964bf5b4a365309c8a5caf505.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![基尼系数可视化](../Images/940fd31964bf5b4a365309c8a5caf505.png)'
- en: Gini ratio visualization
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 基尼系数可视化
- en: Let us then visualize for two periods – October 2019, and October 2024, exact
    same periods, as we have on one of the plots before.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们可视化两个时期——2019年10月和2024年10月，与之前图表中的时期完全相同。
- en: '![Gini ratio, comparing two periods](../Images/b385a253ee3dd50dafd990dc22712b90.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![基尼系数，比较两个时期](../Images/b385a253ee3dd50dafd990dc22712b90.png)'
- en: Gini ratio, comparing two periods
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 基尼系数，比较两个时期
- en: Once we have good understanding, with visuals, how the Gini ratio is calculated,
    let’s plot it, over the whole period.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们通过可视化对基尼系数的计算有了良好的理解，让我们在整个时期内绘制它。
- en: I use R for analysis, so I have Gini ratio easily available (as well as other
    ratios, which I will show later). The initial data table (x3a_dt) contains revenue
    per product, per month. The resulting one has Gini ratio per month.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用R进行数据分析，所以我很容易获得基尼系数（以及我稍后会展示的其他比率）。初始数据表（x3a_dt）包含每个产品每月的收入。结果表包含每月的基尼系数。
- en: '[PRE0]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Good we have all these packages for heavy lifting. The math behind is not super
    complicated, but our time is precious.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 很好，我们有所有这些用于重负载的包。背后的数学并不特别复杂，但我们的时间是宝贵的。
- en: '![](../Images/182c3b0b41c64773122135cc38ba4136.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/182c3b0b41c64773122135cc38ba4136.png)'
- en: The plot below shows the result of calculations.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图表显示了计算结果。
- en: '![Gini over time](../Images/2ccb584a92545b2e08dc0ac491c6efe6.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![基尼系数随时间变化](../Images/2ccb584a92545b2e08dc0ac491c6efe6.png)'
- en: Gini over time
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 基尼系数随时间变化
- en: I haven’t included a smoothing line, with its confidence interval channel, since
    we do not have measurement points, but the result of Gini calculation, with its
    own errors distribution. To be very strict and precise on math, we’d need to calculate
    the confidence interval, and based on that plot smoothed line. The results are
    below.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我没有包括平滑线及其置信区间通道，因为我们没有测量点，但Gini计算的结果，以及其自身的误差分布。为了在数学上非常严格和精确，我们需要计算置信区间，并基于此绘制平滑线。结果如下。
- en: '![Gini over time, with trend line](../Images/4fdcfea220043b8a7d448577cc117d44.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![基尼系数随时间变化，带有趋势线](../Images/4fdcfea220043b8a7d448577cc117d44.png)'
- en: Gini over time, with trend line
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 基尼系数随时间变化，带有趋势线
- en: Since we do not use directly statistical significance of calculated ratio, this
    super strict approach is a little bit an overkill. I haven’t done it while charting
    trend line for HHI, nor will do in next plots. But it is good to be aware of this
    nuance.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们并不直接使用计算出的比率的统计显著性，这种超级严格的方法有点过度。我并没有在绘制HHI趋势线时这样做，也不会在接下来的图表中这样做。但了解这个细微差别是好的。
- en: We have seen so far two ratios – HHI and Gini, and they are far from being identical.
    Lorenz curve closer to diagonal indicates more uniform distribution, which is
    what we have for October 2019, but the HHI is higher, than for 2024, indicating
    more concentration in 2019\. Maybe I made a mistake in calculations, even worse,
    early on during data preparation? That would be really unfortunate. Or the data
    is ok, but we are struggling with proper interpretation?
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们到目前为止已经看到了两个比率——HHI和基尼系数，它们远非相同。洛伦兹曲线越接近对角线，表明分布越均匀，这就是我们在2019年10月所拥有的，但HHI比2024年更高，这表明2019年的集中度更高。也许我在计算中犯了错误，甚至更糟糕的是，在数据准备初期就犯了错误？那将是非常不幸的。或者数据本身没有问题，但我们正在努力正确地解释？
- en: I have quite often moments of such doubts, especially when moving with the analysis
    really quick. So how do we cope with that, tightening grip on data and our understanding
    of dependencies? Bear in mind, that whatever analysis you do, there is always
    first time. And quite often we do not have a luxury of ‘leisure’ research, it
    is more often already work for a Client (or a superior, stakeholder, whoever requested
    it, even ourselves, if it is our initiative).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常有这样的怀疑时刻，尤其是在分析进行得非常快的时候。那么我们如何应对这种情况，加强对数据和我们对依赖关系的理解？记住，无论你做什么分析，总有第一次。而且，我们往往没有“休闲”研究的时间，这通常是为客户（或上级、利益相关者、无论谁提出了要求，甚至是我们自己，如果这是我们的倡议）的工作。
- en: Tightening grip
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 紧握不放
- en: We need to have a good understanding of how to interpret all these ratios, including
    dependencies between them. If you plan to present your results to others, questions
    here are guaranteed, so better to be well prepared. We can work with an existing
    dataset, or we can generate a small set, where it will be easier to catch dependencies.
    Let us follow the latter approach.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要很好地理解如何解释所有这些比率，包括它们之间的依赖关系。如果你打算向其他人展示你的结果，这里的问题是有保证的，所以最好做好充分的准备。我们可以使用现有的数据集，或者我们可以生成一个小集合，这样更容易捕捉到依赖关系。让我们采取后一种方法。
- en: Let us start with creating a small dataset,
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从创建一个小数据集开始，
- en: '[PRE1]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: combining it into a data.table.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 将其合并成一个data.table。
- en: '[PRE2]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: A quick overview of the data.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 数据的快速概述。
- en: '![Example dataset](../Images/0cdbfa1b593a0829d2c17f85a773d6b2.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![示例数据集](../Images/0cdbfa1b593a0829d2c17f85a773d6b2.png)'
- en: Example dataset
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 示例数据集
- en: It seems we have what we needed – a simple dataset, but still quite realistic.
    Now we are proceeding with calculations and charts, similar to what we had for
    a real dataset before.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我们似乎已经拥有了所需的一切——一个简单的数据集，但仍然相当真实。现在我们正在继续进行计算和图表，类似于我们之前对真实数据集所做的那样。
- en: '[PRE3]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: And rendering plots.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 以及渲染图表。
- en: '![Ratios comparison](../Images/47b41e6d421a3dc2a1d558608d43f53c.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![比率比较](../Images/47b41e6d421a3dc2a1d558608d43f53c.png)'
- en: Ratios comparison
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 比率比较
- en: These charts help a lot in understanding ratios, relations between them and
    to data. It is always a good idea to have such micro analysis, for ourselves and
    for stakeholders – as ‘back pocket’ slides, or even sharing them upfront.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这些图表在理解比率、它们之间的关系以及数据方面非常有帮助。对我们自己和利益相关者来说，进行这样的微观分析总是一个好主意——作为“备用口袋”幻灯片，甚至可以提前分享它们。
- en: Nerdy detail – how to slightly shift the line, so it doesn’t overlap, and add
    labels within a plot? Render a plot, and then make manual fine tuning, expecting
    several iterations.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 知识点细节——如何稍微调整线条，使其不重叠，并在图表内添加标签？先渲染一个图表，然后进行手动微调，预期需要多次迭代。
- en: '[PRE5]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: For labelling I use ggrepel, but as a default, it will label all the points,
    while we need only one per line. An in addition deciding which one, for good looking
    chart.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 对于标签，我使用ggrepel，但默认情况下，它将标签所有点，而我们只需要每行一个。此外，还需要决定哪个标签看起来更好，以制作出美观的图表。
- en: '[PRE6]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Render the plot.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 渲染图表。
- en: '[PRE7]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: More Ratios
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更多比率
- en: I began with HHI, the Lorenz curve, and the accompanying Gini ratios, as they
    appeared to be good starting points for concentration and inequality measurements.
    However, there are numerous different ratios used to define distributions, whether
    for inequality or in general. It’s unlikely that we’d employ all of them at once,
    therefore select the subset that provides the most insights for your specific
    challenge.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始于HHI，洛伦兹曲线以及伴随的基尼比率，因为它们似乎是集中和不等测量良好的起点。然而，有许多不同的比率用于定义分布，无论是用于不平等还是一般情况。我们不太可能一次性使用所有这些比率，因此选择提供对你特定挑战最多见解的子集。
- en: With a proper structure of a dataset, it is quite straightforward to calculate
    them. I am sharing code snippets, with several ratios calculated monthly. We use
    a dataset, we already have – monthly revenue per product (base products, excluding
    variants).
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在适当的数据集结构下，计算它们相当直接。我分享了一些代码片段，其中包含每月计算的一些比率。我们使用的数据集是我们已经拥有的——按产品每月收入（基础产品，不包括变体）。
- en: '![](../Images/69eccd86faf431998006c65ea56d0b5b.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/69eccd86faf431998006c65ea56d0b5b.png)'
- en: Starting with ratios from the `ineq` package.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 从`ineq`包中的比率开始。
- en: '[PRE8]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Diustribution shape and top/bottom shares and ratios.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 分布形状和上下份额及比率。
- en: '[PRE9]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '[PRE10]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Basic statistics, quantiles.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 基本统计，分位数。
- en: '[PRE11]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Count measures.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 计算指标。
- en: '[PRE12]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Revenue above (or below) the threshold.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 超过（或低于）阈值的收入。
- en: '[PRE13]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The resulting table has 40 columns, and 72 rows (months).
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表格有40列，72行（月份）。
- en: '![](../Images/cca364deda0f38ae38a77f9fd4cd28ab.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cca364deda0f38ae38a77f9fd4cd28ab.png)'
- en: As mentioned earlier, it is difficult to imagine, one would work with 40 ratios,
    so I am rather showing a method how to calculate them, and one should pick relevant
    ones. As always, it is good to visualize and see how they relate to each other.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，想象一个人会使用40个比率是困难的，所以我更倾向于展示如何计算它们的方法，并且应该选择相关的比率。一如既往，可视化并了解它们之间的关系是很好的。
- en: '![Selected ratios over time](../Images/a0910481fcf2d121eace167e674d6335.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![选定比率随时间变化](../Images/a0910481fcf2d121eace167e674d6335.png)'
- en: Selected ratios over time
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 随时间变化的选定比率
- en: We can calculate correlation matrix between all ratios, or selected subset.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以计算所有比率之间的相关系数矩阵，或选定子集。
- en: '[PRE14]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Change column names to more friendly names.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 将列名改为更友好的名称。
- en: '[PRE15]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: And render the plot.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 并渲染图表。
- en: '[PRE16]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '![Correlation matrix, selected ratios](../Images/7faf38f6a258a12810333a1e22adfd13.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![相关性系数矩阵，选定比率](../Images/7faf38f6a258a12810333a1e22adfd13.png)'
- en: Correlation matrix, selected ratios
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 相关系数矩阵，选定比率
- en: And then we can plot some interesting pairs. Of course, some of them have positive
    or negative correlation *by definition*, while in other cases it is not that obvious.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们可以绘制一些有趣的配对。当然，其中一些根据定义具有正或负相关性，而在其他情况下则不那么明显。
- en: '![Selected ratios, with negative correlation](../Images/d301f9075374e3dae4ddc756bcf4163b.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![选定的比率，负相关](../Images/d301f9075374e3dae4ddc756bcf4163b.png)'
- en: Selected ratios, with negative correlation
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 选定的比率，负相关
- en: Show me the money
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 给我展示金钱
- en: We started analysis with ratios and Lorenz curve as a top-down overview. It
    is a good start, but there are two complications – the ratios have a relatively
    broad range, when the business is doing ok, and there is hardly connection to
    actionable insights. Even if we notice that the ratio is on the edge, or outside
    of the safe range, it is unclear what we should do. And instructions like "decrease
    concentration" are a little ambiguous.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从比率和对数洛伦兹曲线作为自上而下的概览开始分析。这是一个好的开始，但有两个复杂之处——比率有一个相对较宽的范围，当业务表现良好时，几乎与可操作的见解没有联系。即使我们注意到比率处于边缘，或超出安全范围，也不清楚我们应该做什么。像“降低浓度”这样的指示有点含糊不清。
- en: E-commerce talks and breaths products, so to make analysis relatable, we need
    to reference to particular products. People would also like to understand which
    products constitute core 50%, 80% of revenue, and equally important, if these
    products stay consistently as top contributors.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 电子商务讨论和呼吸产品，因此为了使分析相关，我们需要参考特定的产品。人们也希望了解哪些产品构成了核心的50%，80%的收入，同样重要的是，如果这些产品持续作为顶级贡献者。
- en: Let us take one month, August 2024 and see which products contributed to 50%
    revenue in that month. Then, we check revenue from these exact products in other
    months. There are 5 products, generating (at least) 50% revenue in August.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以2024年8月为例，看看哪些产品在该月贡献了50%的收入。然后，我们检查这些确切产品在其他月份的收入。有5种产品，在8月份产生了（至少）50%的收入。
- en: '![Products revenue, facets by product](../Images/e84ecab2fa6cc6b2b1eeb5f9ebd22f15.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![产品收入，按产品细分](../Images/e84ecab2fa6cc6b2b1eeb5f9ebd22f15.png)'
- en: Products revenue, facets by product
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 按产品细分的产品收入
- en: We can also render more visually appealing plot with a streamgraph. Both plots
    show exact same dataset, but they complement each other nicely – bar plots for
    precision, while streamgraph for a story.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以用流图渲染更吸引人的图表。这两个图表显示了完全相同的数据库，但它们很好地互补——条形图用于精确度，而流图用于讲述故事。
- en: '![Products revenue, stream graph](../Images/40e62188e9cd3ed518251c5f300931e6.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![产品收入，流图](../Images/40e62188e9cd3ed518251c5f300931e6.png)'
- en: Products revenue, stream graph
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 产品收入，流图
- en: The red line indicated selected month. If you feel "itching" to shift that line,
    like in an old-fashioned radio, you are absolutely right – that should be an interactive
    chart, and actually it is, along with a slider for revenue share percentage (we
    produced it for a Client).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 红线表示选定的月份。如果你觉得“痒”想移动那条线，就像老式收音机一样，你绝对是对的——这应该是一个交互式图表，实际上它就是，还有一个用于收入份额百分比的滑块（我们为一位客户制作了它）。
- en: So what if we shift that red ‘tuning line’ a little bit backwards, maybe to
    2020? The logic in data preparation is very similar – get products contributing
    to a certain revenue share threshold, and check the revenue from these products
    in other months.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 那如果我们把那条红色的“调整线”稍微向后移动一点，比如到2020年呢？数据准备中的逻辑非常相似——获取对特定收入份额阈值有贡献的产品，并检查这些产品在其他月份的收入。
- en: '![Products revenue, stream graph](../Images/3d2f6da28e79838b09bd483189ddea31.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![产品收入，流图](../Images/3d2f6da28e79838b09bd483189ddea31.png)'
- en: Products revenue, stream graph
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 产品收入，流图
- en: 'With interactivity on two elements – revenue contribution percentage and the
    date, one can learn a lot about the business, and this is exactly the point of
    these charts. One can look from different angles:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对两个元素——收入贡献百分比和日期的交互性，可以了解很多关于业务的信息，这正是这些图表的目的。可以从不同的角度观察：
- en: concentration, how many products do we need for certain revenue threshold,
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 集中度，我们需要多少产品才能达到特定的收入阈值，
- en: products themselves, do they stay in certain revenue contribution bin, or do
    they change and why? Is it seasonality, a valid replacement, lost supplier or
    something else?
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品本身，它们是否保持在某个收入贡献区间内，或者它们是否改变以及为什么？是季节性、有效的替代品、失去的供应商还是其他原因？
- en: time window, whether we look at one month or a whole year,
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间窗口，我们看一个月还是一整年，
- en: seasonality, comparing similar time of a year with previous periods.
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 季节性，比较一年中相似的时间与之前的时期。
- en: Summary
  id: totrans-160
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: What the Data Tells Us
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据告诉我们什么
- en: 'Our 6-year dataset reveals the evolution of an e-commerce business from high
    concentration to balanced growth. Here are the key patterns and lessons:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的6年数据集揭示了电子商务业务从高度集中到平衡增长的发展历程。以下是关键模式和教训：
- en: With 6 years of data, I had a unique chance to watch concentration metrics evolve
    as the business grew. Starting with just a handful of products, I saw exactly
    what you’d expect – sky-high concentration. But as new products entered the mix,
    things got more interesting. The business found its rhythm with a dozen or so
    top performers, and the HHI settled into a comfortable 700–800 range.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在6年的数据中，我有幸观察集中度指标随着业务增长而演变。一开始只有少数几个产品，我看到了你预期的——高度集中。但随着新产品的加入，事情变得更有趣。业务找到了一打左右顶尖表现者的节奏，HHI稳定在700-800的舒适范围内。
- en: 'Here’s something fascinating I discovered: concentration and inequality might
    sound like twins, but they’re more like distant cousins. I noticed this while
    comparing HHI against Lorenz curves and their Gini ratios. Trust me, you’ll want
    to get comfortable with the math before explaining these patterns to stakeholders
    – they’ll smell uncertainty from a mile away.'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些我发现的有趣的事情：集中度和不平等可能听起来像是双胞胎，但它们更像远亲。我注意到这一点是在比较HHI与洛伦兹曲线及其基尼系数时。相信我，在向利益相关者解释这些模式之前，你需要先熟悉数学——他们能从一英里之外闻到不确定的味道。
- en: 'Want to really understand these metrics? Do what I did: create a dummy dataset
    so simple it’s almost embarrassing. I’m talking basic patterns that a fifth-grader
    could grasp. Sounds like overkill? Maybe, but it saved me countless hours of head-scratching
    and misinterpretation. Keep these examples in your back pocket – or better yet,
    share them upfront. Nothing builds confidence like showing you’ve done your homework.'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 想真正理解这些指标吗？做我做过的同样的事情：创建一个简单到几乎令人尴尬的虚拟数据集。我指的是五年级学生都能理解的基本模式。听起来像是过度杀戮？也许吧，但它为我节省了无数个小时的挠头和误解释。把这些例子放在你的口袋里——或者更好的是，一开始就分享它们。没有什么能像展示你已经完成了作业那样建立信心。
- en: Look, calculating these ratios isn’t rocket science. The real magic happens
    when you dig into how each product contributes to your revenue. That’s why I added
    the "show me the money" section – I don’t believe in quick fixes or magic formulas.
    It’s about rolling up your sleeves and understanding how each product really behaves.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，计算这些比率并不是什么火箭科学。真正的魔法在于当你深入研究每个产品如何贡献于你的收入时。这就是为什么我增加了“展示给我钱”这一部分——我不相信快速修复或魔法公式。这关乎卷起袖子，真正理解每个产品的实际行为。
- en: As you’ve probably noticed yourself, these streamgraphs I showed you are practically
    begging for interactivity. And boy, does that add value! Once you’ve got your
    keys and joins sorted out, it’s not even that complicated. Give your users an
    interactive tool, and suddenly you’re not drowning in one-off questions anymore
    – they’re finding insights themselves.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 如你很可能自己注意到的，我向你展示的这些流图实际上是在迫切地要求交互性。而且，这确实增加了价值！一旦你整理好了键和连接，这其实并不复杂。给你的用户提供一个交互式工具，突然之间，你就不再被一次性问题淹没——他们自己发现了洞察。
- en: 'Here’s a pro tip: use this concentration analysis as your foot in the door
    with stakeholders. Show your product teams that streamgraph, and I guarantee their
    eyes will light up. When they start asking for interactive versions, you’ve got
    them hooked. The best part? They’ll think it was their idea all along. That’s
    how you get real adoption – by letting them discover the value themselves.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个专业的小贴士：使用这种集中度分析作为你与利益相关者的敲门砖。向你的产品团队展示流图，我保证他们的眼睛会亮起来。当他们开始要求交互式版本时，你就已经吸引住他们了。最好的部分？他们会认为这始终是他们自己的想法。这就是你如何实现真正的采用——通过让他们自己发现价值。
- en: Data Engineering Takeaways
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据工程要点
- en: While quite often we generally know what to expect in a dataset, it is almost
    guaranteed that there will be some nuances, exceptions, or maybe even surprises.
    It’s good to spend some time reviewing datasets, using dedicated functions (like
    str, glimpse in R), looking for empty fields, outliers, but also simply scrolling
    through to understand the data. I like comparisons, and in this case, I’d compare
    to smelling fish on a market before jumping to prepare sushi 🙂
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们通常都知道在数据集中可以期待什么，但几乎可以肯定会有一些细微差别、异常，甚至可能是惊喜。花些时间审查数据集，使用专用功能（如R中的str，glimpse），寻找空字段、异常值，但也要简单地滚动浏览以了解数据。我喜欢比较，在这种情况下，我会在准备寿司之前先去市场上闻闻鱼的味道。
- en: Then, if we work with a raw data export, quite likely there will be several
    columns in the data dump; after all, if we click ‘export all’, wouldn’t we expect
    exactly that? For most analysis we will need a subset of these columns, so it’s
    good to trim and keep only what we need. I assume we work with a script, so if
    it turns out, we need more, not an issue, just add missed column and rerun that
    chunk.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，如果我们处理原始数据导出，数据集中很可能会有几个列；毕竟，如果我们点击‘导出全部’，难道我们不应该期望正好是这样吗？对于大多数分析，我们只需要这些列的子集，所以剪掉不必要的列，只保留我们需要的，是很好的。我假设我们使用脚本，所以如果需要更多，没问题，只需添加遗漏的列并重新运行该部分。
- en: In the dataset dump there was a timestamp in one row per transaction, while
    we needed it per each product. Hence some light data wrangling to propagate these
    timestamps to all the products.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据集导出中，每一行交易都有一个时间戳，而我们需要的却是每个产品的时间戳。因此，需要进行一些轻量级的数据整理，将这些时间戳传播到所有产品上。
- en: After cleaning the dataset, it’s important to consider the context of analysis,
    including the questions to be answered and the necessary changes to the data.
    This "contextual cleaning/wrangling" is critical since it determines whether the
    analysis succeeds or fails. In our situation, the goal was to analyse product
    concentration, therefore filtering out variants (size, colour, etc.) was essential.
    If we had skipped that, the outcome would have been radically different.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在清理数据集之后，考虑分析背景，包括要回答的问题和必要的数据更改，是非常重要的。这种“背景清理/整理”是至关重要的，因为它决定了分析是成功还是失败。在我们的情况下，目标是分析产品集中度，因此过滤掉变体（大小、颜色等）是至关重要的。如果我们跳过了这一点，结果将会有根本性的不同。
- en: Quite often we can expect some "traps", where initially it seems we can apply
    simple approach, while actually, we should add a bit of sophistication. As an
    example – Lorenz curve, where we need to calculate how many products do we need
    to get to a certain revenue threshold. This is where I use rolling joins, which
    fit here perfectly.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 很常见的情况是我们可以预期一些“陷阱”，最初看起来我们可以应用简单的方法，而实际上，我们应该增加一些复杂性。例如——洛伦兹曲线，我们需要计算需要多少产品才能达到一定的收入阈值。这就是我使用滚动连接的地方，它们在这里完美地适用。
- en: The core logic to produce streamgraphs is to find products which constitute
    certain revenue percentage in a given month, then "freeze" them and get their
    revenue in other months. The toolset I used was adding extra column, with a product
    number, after sorting per month, and then playing with keys and joins.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 生成流图的核心逻辑是找到在特定月份构成一定收入百分比的产品，然后“冻结”它们，并获取它们在其他月份的收入。我使用的工具是在按月排序后添加一个额外的列，包含产品编号，然后对键和连接进行操作。
- en: An important element of this analysis was adding interactivity, allowing users
    to play with some parameters. That raises the bar, as we need all these operations
    to be performed lightning fast. The ingredients we need are right data structure,
    additional columns, proper keys and joins. Prepare as much as possible, precalculating
    in a data warehouse, so the dashboarding tool is not overloaded. Take caching
    into account.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 分析的一个重要元素是添加交互性，允许用户调整一些参数。这提高了标准，因为我们需要所有这些操作都能以闪电般的速度执行。我们需要的是合适的数据结构、额外的列、适当的键和连接。尽可能多地准备，在数据仓库中进行预先计算，这样仪表板工具就不会过载。考虑缓存。
- en: How to Start?
  id: totrans-177
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何开始？
- en: Strike a balance between delivering what stakeholders request and exploring
    potentially valuable insights they haven’t asked for yet. The analysis I presented
    follows this pattern – getting initial concentration ratios is straightforward,
    while building an interactive streamgraph optimized for lightning-fast operation
    requires significant effort.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 在满足利益相关者的需求与探索他们尚未请求的潜在有价值见解之间取得平衡。我展示的分析遵循这一模式——获取初始浓度比是直接的，而构建一个针对快速操作的交互式流图则需要大量的努力。
- en: Start small and engage others. Share basic findings, discuss what you could
    learn together, and only then proceed with more labor-intensive analysis once
    you’ve secured genuine interest. And always maintain a solid grip on your raw
    data – it’s invaluable for answering those inevitable ad-hoc questions quickly.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 从小处着手，吸引他人参与。分享基本发现，讨论你们可以一起学习的内容，一旦确保了真正的兴趣，再进行更费时的分析。并且始终牢牢掌握你的原始数据——它对于快速回答那些不可避免的临时问题是无价的。
- en: Building a prototype before full production allows for validation of interest
    and feedback without devoting too much time. In my case, such simple concentration
    ratios sparked debates that eventually led to the more advanced interactive studies
    on which stakeholders rely today.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在全面生产之前构建原型，可以在不投入太多时间的情况下验证兴趣和反馈。在我的情况下，这样简单的浓度比引发了辩论，最终导致了今天利益相关者依赖的更高级交互式研究。
- en: '![Start small, secure genuine interest ... :-)) / image generated by DALL-E,
    based on author''s prompt.](../Images/f4584f0872ea8ed3c8c89c3585e01233.png)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![从小处着手，确保真正的兴趣 ... :-)) / 由DALL-E根据作者提示生成的图像](../Images/f4584f0872ea8ed3c8c89c3585e01233.png)'
- en: Start small, secure genuine interest … :-)) / image generated by DALL-E, based
    on author’s prompt.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 从小处着手，确保真正的兴趣 … :-)) / 由DALL-E根据作者提示生成的图像
- en: Appendix – data preparation & wrangling
  id: totrans-183
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 附录 - 数据准备与整理
- en: I’ll show you how I prepared the data at each step of this analysis. Since I
    used R, I’ll include the actual code snippets – they’ll help you get started faster,
    even if you’re working in a different language. This is the code I used for the
    study, though you’ll probably need to adapt it to your specific needs rather than
    just copying it over. I decided to keep the code separate from the main analysis,
    to make it more streamlined and readable for both technical and business users.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 我会向你展示我在分析每个步骤中是如何准备数据的。由于我使用了R，我会包括实际的代码片段——它们可以帮助你更快地开始，即使你使用的是不同的语言。这是我用来进行研究的代码，尽管你可能需要根据你的具体需求进行修改，而不是简单地复制粘贴。我决定将代码与主要分析分开，以便于技术和商业用户都能更流畅、更易读地阅读。
- en: While I am presenting analysis based on Shopify export, there is no limitation
    for a particular platform, we just need transactions data.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我展示的是基于Shopify导出的分析，但并没有特定平台的限制，我们只需要交易数据。
- en: Shopify export
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Shopify导出
- en: Let’s start with getting our data from Shopify. The raw export needs some work
    before we can dive into concentration analysis – here’s what I had to deal with
    first.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从从Shopify获取数据开始。在我们可以进行浓度分析之前，原始导出需要一些处理——这是我首先需要处理的事情。
- en: We start with export of raw transactions data from Shopify. It might take some
    time, and when ready, we get an email with links to download.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从Shopify的原始交易数据导出开始。这可能需要一些时间，一旦准备好，我们会收到一封带有下载链接的电子邮件。
- en: '[PRE17]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Once we have data, we need to combine these files into one dataset, trim columns
    and perform some cleansing.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们有了数据，我们需要将这些文件合并成一个数据集，裁剪列并执行一些清理。
- en: '[PRE18]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Some data preparations.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 一些数据准备。
- en: '[PRE19]'
  id: totrans-193
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Anonymize emails, as we don’t need/want to deal with real emails during analysis.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 匿名化电子邮件，因为在分析过程中我们不需要/想要处理真实的电子邮件。
- en: '[PRE20]'
  id: totrans-195
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Change column types; this depends on personal preferences.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 改变列类型；这取决于个人喜好。
- en: '[PRE21]'
  id: totrans-197
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Now we focus on transactions dataset. In the export files, the transaction amount
    and timestamp is in only one row per all items in the basket. We need to get these
    timestamps and propagate to all items.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们专注于交易数据集。在导出文件中，交易金额和时间戳在篮子中所有项目的每一行中只有一个。我们需要获取这些时间戳并将它们传播到所有项目。
- en: '[PRE22]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '[PRE23]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Some extra information, as I call them, *derivatives*.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 一些额外信息，我称之为*衍生品*。
- en: '[PRE24]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Do we have any NA’s in the dataset?
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集中有NA值吗？
- en: '[PRE25]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Products dataset.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 产品数据集。
- en: '[PRE26]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Now we join these two datasets, to have transaction characteristics (trans_sel_cols)
    for all the products.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将这两个数据集合并，以获得所有产品的交易特征（trans_sel_cols）。
- en: '[PRE27]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Let’s check which columns we have in x3_dt dataset.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查x3_dt数据集中我们有哪些列。
- en: '![](../Images/71d10ae5b0477ba09a89126089db23ca.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/71d10ae5b0477ba09a89126089db23ca.png)'
- en: And it is also a moment to inspect the dataset.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是检查数据集的时刻。
- en: '[PRE28]'
  id: totrans-212
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'Time for data cleaning. First up: splitting the Lineitem_name into base products
    and their variants. In theory, these are separated by a dash ("-"). Simple, right?
    Not quite – some product names, like ‘All-Purpose’, contain dashes as part of
    their name. So we need to handle these special cases first, temporarily replacing
    problematic dashes, doing the split, and then restoring the original product names.'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 数据清理的时间到了。首先：将Lineitem_name拆分为基础产品和它们的变体。理论上，这些是通过破折号("-")分隔的。简单，对吧？并不完全是这样——一些产品名称，如‘All-Purpose’，破折号是它们名称的一部分。因此，我们需要首先处理这些特殊情况，暂时替换有问题的破折号，进行拆分，然后恢复原始的产品名称。
- en: '[PRE29]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: It is good to make validation after each step.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个步骤之后进行验证是很好的。
- en: '[PRE30]'
  id: totrans-216
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: We keep moving with data cleaning – the exact steps depend of course on a particular
    dataset, but I share my flow, as an example.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 我们继续进行数据清理——确切的步骤当然取决于特定的数据集，但我分享我的流程，作为一个例子。
- en: '[PRE31]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Validation.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 验证。
- en: '[PRE32]'
  id: totrans-220
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: We use `eval(sel_cols[6])` to get the name of a column `sel_cols[6]` which is
    Currency.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用`eval(sel_cols[6])`来获取列`sel_cols[6]`的名称，它是货币。
- en: We also need to deal with NA’s, but with an understanding of a dataset – where
    we could have NA’s and where they are not supposed to be, indicating an issue.
    In some columns, like `Discount_Amount`, we have values (actual discount), zeros,
    but also sometimes NA’s. Checking final price, we conclude they are zeros.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要处理NA值，但要对数据集有一个理解——在哪里可能有NA值，以及它们不应该出现的地方，这表明存在问题。在某些列中，如`Discount_Amount`，我们有值（实际折扣），零，有时也有NA值。检查最终价格，我们得出结论它们是零。
- en: '[PRE33]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: For consistency and convenience, changing all column names to lowercase.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 为了一致性和方便，将所有列名改为小写。
- en: '[PRE34]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: And verification.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 并且进行验证。
- en: '![](../Images/4c9e4a24990b22e17e9092afc2ae4c35.png)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4c9e4a24990b22e17e9092afc2ae4c35.png)'
- en: Of course review dataset, with some test aggregations, and also just printing
    it out.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，审查数据集，进行一些测试聚合，并且简单地打印出来。
- en: Save dataset as both Rds (native R format) and csv.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据集保存为Rds（R的本地格式）和csv。
- en: '[PRE35]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Conducting steps above we should have a clean dataset, for futher analysis.
    The code should serve as a guideline, but also can be used directly, if you work
    in R.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 执行上述步骤后，我们应该有一个干净的数据集，以便进一步分析。代码应作为指南，但也可以直接使用，如果你在R中工作。
- en: Versions
  id: totrans-232
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 版本
- en: As a first glimpse, we will check number of products per month, both base_product,
    and including all versions.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 作为第一印象，我们将检查每月的产品数量，包括基础产品和所有版本。
- en: As a small cleaning, I take only complete months.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个小清理，我只选取完整的月份。
- en: '[PRE36]'
  id: totrans-235
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Then we count monthly numbers, storing in temporary table, which are then joined.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们计算月度数字，存储在临时表中，然后进行连接。
- en: '[PRE37]'
  id: totrans-237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: '![](../Images/f2eef4509e7b9fb57a31cc81259b5605.png)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f2eef4509e7b9fb57a31cc81259b5605.png)'
- en: Some data wrangling.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 一些数据处理。
- en: '[PRE38]'
  id: totrans-240
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: '![](../Images/6aa798cf3f3f3da90428ad49bdcc82df.png)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6aa798cf3f3f3da90428ad49bdcc82df.png)'
- en: We are ready to plot the dataset.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经准备好绘制数据集。
- en: '[PRE39]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: The next plot shows the number of variants grouped into bins. This gives us
    a chance to talk about chaining operations in R, particularly with the data.table
    package. In data.table, we can chain operations by opening a new bracket right
    after closing one – resulting in ][ syntax. It creates a compact, readable chain
    that’s still easy to debug since you can execute it piece by piece. I prefer succinct
    code, but that’s just my style – use whatever approach works best for you. We
    can write code in one line, or multi-line, with logical steps.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个图显示了分组到箱中的变体数量。这给了我们机会来讨论R中的链式操作，特别是与data.table包一起。在data.table中，我们可以在关闭一个括号后立即打开一个新的括号来链式操作——结果是`][`语法。它创建了一个紧凑、易读的链，同时仍然容易调试，因为你可以逐部分执行它。我更喜欢简洁的代码，但这只是我的风格——使用对你来说最好的方法。我们可以写一行代码，或者多行代码，有逻辑步骤。
- en: On one of the plots we look at a date, when each product was first seen. To
    get that date, we set a key on date, and then take the first occurrence `date[1]`
    per each base_product.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 在其中一个图表中，我们查看每个产品首次出现的时间。为了得到这个日期，我们在日期上设置一个键，然后对每个base_product取第一次出现`date[1]`。
- en: '[PRE40]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: '[PRE41]'
  id: totrans-247
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: The resulting table is exactly as we need it for charting.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表正是我们用于图表所需的。
- en: '![](../Images/dab0c39f1806e185c44c1cff72f2254f.png)'
  id: totrans-249
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dab0c39f1806e185c44c1cff72f2254f.png)'
- en: The second plot uses transaction date, so the data wrangling is similar, but
    without `date[1]` step.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个图使用交易日期，所以数据处理类似，但没有`date[1]`步骤。
- en: If we want to have a couple of plots combined, we can produce them separately,
    and combine using for example `ggpubr::ggarrange()` or we can blend tables into
    one dataset and then use faceting functionality. The former is when plots are
    of completely different nature, while latter is useful, when we can naturally
    have combined dataset.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想要将几个绘图组合在一起，我们可以分别生成它们，然后使用例如`ggpubr::ggarrange()`进行组合，或者我们可以将表格合并到一个数据集中，然后使用分面功能。前者是当绘图完全不同性质时，而后者在我们可以自然地有组合数据集时很有用。
- en: As an example, few more lines from my script.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，从我的脚本中再举几个例子。
- en: '[PRE42]'
  id: totrans-253
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: '![](../Images/a22c13788c146f3a8b33ca567b4c5db6.png)'
  id: totrans-254
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a22c13788c146f3a8b33ca567b4c5db6.png)'
- en: And a plot code.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 以及一个绘图代码。
- en: '[PRE43]'
  id: totrans-256
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: Faceting has massive advantage, because we operate on one table, which helps
    a lot in assuring data consistency.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 分面图有巨大的优势，因为我们操作的是一张表，这有助于确保数据一致性。
- en: Pareto
  id: totrans-258
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 帕累托
- en: The essence of Pareto calculation is to find how many products do we need to
    achieve certain revenue percentage. We need to prepare the dataset, in a couple
    of steps.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 帕累托计算的本质是找出我们需要多少产品来实现一定的收入百分比。我们需要准备数据集，分几个步骤。
- en: '[PRE44]'
  id: totrans-260
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: In case we’d need to mask exact product names, let us create a new variable.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们需要屏蔽确切的产品名称，让我们创建一个新的变量。
- en: '[PRE45]'
  id: totrans-262
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: '![](../Images/4744825dba26a1af92e5a0746b57264d.png)'
  id: totrans-263
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4744825dba26a1af92e5a0746b57264d.png)'
- en: And dataset printout, with a subset of columns.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 以及数据集的打印输出，包含部分列。
- en: '![](../Images/2e26d794722057bc245dcc5f597305b4.png)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2e26d794722057bc245dcc5f597305b4.png)'
- en: And filtered for one month, showing few lines from top and from the bottom.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 并且过滤了一个月的数据，显示顶部和底部的几行。
- en: '![](../Images/86e323fdcf9bb93d6c4132b2b1aff304.png)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/86e323fdcf9bb93d6c4132b2b1aff304.png)'
- en: The essential column is `cum_rev_pct`, which indicates cumulative percentage
    revenue from products 1-n. We need to find which `prod_n` covers revenue percentage
    threshold, as in the `pct_thresholds_dt` table.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的列是`cum_rev_pct`，它表示从产品1到n的累积百分比收入。我们需要找到哪个`prod_n`覆盖了收入百分比阈值，正如在`pct_thresholds_dt`表中所示。
- en: '![](../Images/39cf37aa1d5badf8f75f4db592115f3e.png)'
  id: totrans-269
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/39cf37aa1d5badf8f75f4db592115f3e.png)'
- en: So we are ready for actual Pareto calculation. The code below, with comments.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们已准备好进行实际的帕累托计算。下面的代码带有注释。
- en: '[PRE46]'
  id: totrans-271
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Why do we perform a rolling join? We need to find the first `cum_rev_pct` to
    cover each threshold.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我们执行滚动连接？我们需要找到覆盖每个阈值的第一个`cum_rev_pct`。
- en: '![](../Images/b77cf84d9643100599832f32fd717cd8.png)'
  id: totrans-273
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b77cf84d9643100599832f32fd717cd8.png)'
- en: We need 2 products for 20% revenue, 4 products for 30% and so on. And to have
    100% revenue, of course we need contribution from all 72 products.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要2个产品来获得20%的收入，4个产品来获得30%，依此类推。当然，要获得100%的收入，我们需要所有72个产品的贡献。
- en: And a plot.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 以及一个绘图。
- en: '[PRE47]'
  id: totrans-276
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Lorenz curve
  id: totrans-277
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 洛伦兹曲线
- en: To plot Lorenz curve, we need to sort products by it’s contribution to total
    revenue, and normalize both number of products and revenue.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 要绘制洛伦兹曲线，我们需要按其对总收入贡献对产品进行排序，并对产品数量和收入进行归一化。
- en: Before the main code, a handy method to pick n-th month from the dataset, from
    beginning or from the end.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 在主代码之前，一个方便的方法来从数据集中选择第n个月，从开始或从结束。
- en: '[PRE48]'
  id: totrans-280
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: And the code.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 以及代码。
- en: '[PRE49]'
  id: totrans-282
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: To chart separate lines per each time period, we need to modify accordingly.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 要为每个时间段绘制单独的线条，我们需要相应地进行修改。
- en: '[PRE50]'
  id: totrans-284
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: '![](../Images/0619f36550576282548f73e5ea513637.png)'
  id: totrans-285
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0619f36550576282548f73e5ea513637.png)'
- en: The `xl_dt` dataset is ready for charting.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: '`xl_dt` 数据集已准备好用于绘图。'
- en: Indices, ratios
  id: totrans-287
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 指数，比率
- en: The code is straightforward here, assuming sufficient prior data preparation.
    The logic and some snippets in the main body of this article.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的代码很简单，假设有足够的数据准备。文章主体中的逻辑和一些代码片段。
- en: Streamgraph
  id: totrans-289
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 流图
- en: The streamgraph shown earlier is an example of a chart that may appear difficult
    to render, especially when interactivity is required. One of the reasons I included
    it in this blog is to show how we can simplify tasks with keys, joins, and data.table
    syntax in particular. Using keys, we can achieve very effective filtering for
    interactivity. Once we have a handle on the data, we’re virtually done; all that
    remains are some settings to fine-tune the plot.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 之前展示的流图是一个可能难以渲染的图表示例，尤其是在需要交互性时。我将其包含在这篇博客中的一个原因是为了展示我们如何通过键、连接和数据.table 语法简化任务。使用键，我们可以实现非常有效的交互式过滤。一旦我们掌握了数据，我们实际上就完成了；剩下的只是调整图表的一些设置。
- en: We start with thresholds table.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从阈值表开始。
- en: '[PRE51]'
  id: totrans-292
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: Since we want joins performed monthly, it is good to create a data subset covering
    one month, to test the logic, before extending for a full dataset.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们希望按月执行连接，因此创建一个涵盖一个月的数据子集来测试逻辑，然后再扩展到完整数据集是一个好主意。
- en: '[PRE52]'
  id: totrans-294
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: '![](../Images/2b895b564ea7b228e5030316fe692e44.png)'
  id: totrans-295
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2b895b564ea7b228e5030316fe692e44.png)'
- en: We have 23 products in January 2020, sorted by revenue percentage, and we also
    have cumulative revenue, reaching 100% with the last, 23rd product.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 2020 年 1 月我们有 23 个产品，按收入百分比排序，我们还有累计收入，最后一个第 23 个产品的收入达到 100%。
- en: Now we need to create an intermediate table, telling us how many products do
    we need to achieve each revenue threshold.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要创建一个中间表格，告诉我们为了达到每个收入阈值需要多少产品。
- en: '[PRE53]'
  id: totrans-298
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: '![](../Images/71b7632ef58984022c881bb81ef44a6e.png)'
  id: totrans-299
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/71b7632ef58984022c881bb81ef44a6e.png)'
- en: Because we work with a one-month data subset (and picking month with not that
    many products), it is very easy to check the outcome – comparing `x3a1_dt` and
    `x3b1_dt` tables.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我们在处理一个一个月的数据子集（并且选择的产品不是很多），所以检查结果非常容易——比较 `x3a1_dt` 和 `x3b1_dt` 表。
- en: And now we need to get products names, for selected threshold.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要获取选定阈值的产品的名称。
- en: '[PRE54]'
  id: totrans-302
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: '![](../Images/7da23e058bc76ab4f0ed1f0e9b707efb.png)'
  id: totrans-303
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7da23e058bc76ab4f0ed1f0e9b707efb.png)'
- en: To achieve 80% revenue, we need 7 products, and from the join above, we get
    their names.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 要达到 80% 的收入，我们需要 7 个产品，并且从上面的连接中，我们得到了它们的名称。
- en: I think you already see, why we use rolling joins, and can’t use simle `<` or
    `>` logic.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 我想你已经看到了，为什么我们使用滚动连接，而不能使用简单的 `<` 或 `>` 逻辑。
- en: Now, we need to extend the logic for all months.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要将逻辑扩展到所有月份。
- en: '[PRE55]'
  id: totrans-307
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: Get the products.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 获取产品。
- en: '[PRE56]'
  id: totrans-309
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: And verify, for the same month as in a test data subset.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 并验证与测试数据子集相同的月份。
- en: '![](../Images/29e776c1979655499d8df147cd9e0106.png)'
  id: totrans-311
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/29e776c1979655499d8df147cd9e0106.png)'
- en: If we want to freeze products for a certain month, and see revenue from them
    in the whole period (what second streamgraphs shows), we can set key on product
    name and perform a join.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想要冻结某个月份的产品，并查看整个期间的收入（这就是第二个流图所显示的），我们可以在产品名称上设置键并执行连接。
- en: '[PRE57]'
  id: totrans-313
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: And we get exactly, what we needed.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到了我们需要的确切结果。
- en: '![](../Images/870bd5c48bbcdea0ea619238a89d3144.png)'
  id: totrans-315
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/870bd5c48bbcdea0ea619238a89d3144.png)'
- en: Using joins, including rolls, and deciding what can be precalculated in a warehouse,
    and what is left for dynamic filtering in a dashboard does require some practice,
    but it definitely pays off.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 使用连接，包括滚动，并决定在仓库中预先计算什么，以及在仪表板中动态过滤什么，确实需要一些实践，但绝对值得。
