- en: 'From FOMO to Opportunity: Analytical AI in the Era of LLM Agents'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/from-fomo-to-opportunity-analytical-ai-in-the-era-of-llm-agents/](https://towardsdatascience.com/from-fomo-to-opportunity-analytical-ai-in-the-era-of-llm-agents/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1745984322790" class="mdspan-comment">Are you feeling</mdspan>
    “fear of missing out” (FOMO) when it comes to LLM agents? Well, that was the case
    for me for quite a while.
  prefs: []
  type: TYPE_NORMAL
- en: 'In recent months, it feels like my online feeds have been completely bombarded
    by “LLM Agents”: every other technical blog is trying to show me “how to build
    an agent in 5 minutes”. Every other piece of tech news is highlighting yet another
    shiny startup building LLM agent-based products, or a big tech releasing some
    new agent-building libraries or fancy-named agent protocols (seen enough MCP or
    Agent2Agent?).'
  prefs: []
  type: TYPE_NORMAL
- en: It seems that suddenly, LLM agents are everywhere. All those flashy demos showcase
    that those digital beasts seem more than capable of writing code, automating workflows,
    discovering insights, and seemingly threatening to replace… well, just about everything.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, this view is also shared by many of our clients at work. They
    are actively asking for agentic features to be integrated into their products.
    They aren’t hesitating to finance new agent-development projects, because of the
    fear of lagging behind their competitors in leveraging this new technology.
  prefs: []
  type: TYPE_NORMAL
- en: As an analytical AI practitioner, seeing those impressive agent demos built
    by my colleagues and the enthusiastic feedback from the clients, I have to admit,
    it gave me a serious case of FOMO.
  prefs: []
  type: TYPE_NORMAL
- en: 'It genuinely left me wondering: Is the work I do becoming irrelevant?'
  prefs: []
  type: TYPE_NORMAL
- en: 'After struggling with that question, I have reached this conclusion:'
  prefs: []
  type: TYPE_NORMAL
- en: '**No, that’s not the case at all.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this blog post, I want to share my thoughts on why the rapid rise of LLM
    agents doesn’t diminish the importance of analytical AI. In fact, I believe it’s
    doing the opposite: it’s creating unprecedented opportunities for both analytical
    AI and agentic AI.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s explore why.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before diving in, let’s quickly clarify the terms:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Analytical AI**: I’m primarily referring to statistical modeling and machine
    learning approaches applied to quantitative, numerical data. Think of industrial
    applications like anomaly detection, time-series forecasting, product design optimization,
    predictive maintenance, ditigal twins, etc.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LLM Agents**: I am referring to AI systems using LLM as the core that can
    autonomously perform tasks by combining natural language understanding, with reasoning,
    planning, memory, and tool use.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Viewpoint 1: Analytical AI provides the crucial quantitative grounding for
    LLM agents.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Despite the remarkable capabilities in natural language understanding and generation,
    LLMs fundamentally lack the quantitative precision required for many industrial
    applications. This is where analytical AI becomes indispensable.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are some key ways the analytical AI could step up, grounding the LLM
    agents with mathematical rigor and ensuring that they are operating following
    the reality:'
  prefs: []
  type: TYPE_NORMAL
- en: 🛠️ Analytical AI as essential tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Integrating Analytical AI as specialized, callable tools is arguably the most
    common pattern for providing LLM agents with quantitative grounding.
  prefs: []
  type: TYPE_NORMAL
- en: There has long been a tradition (well before the current hype around LLMs) of
    developing specialized Analytical AI tools across various industries to address
    challenges using real-world operational data. Those challenges, be it predicting
    equipment maintenance or forecasting energy consumption, demand high numerical
    precision and sophisticated modeling capabilities. Frankly, these capabilities
    are fundamentally different from the linguistic and reasoning strengths that characterize
    today’s LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: 'This long-standing foundation of Analytical AI is not just relevant, but essential,
    for grounding LLM agents in real-world accuracy and operational reliability. The
    core motivation here is a **separation of concerns**: let the LLM agents handle
    the understanding, reasoning, and planning, while the Analytical AI tools perform
    the specialized quantitative analysis they were trained for.'
  prefs: []
  type: TYPE_NORMAL
- en: In this paradigm, Analytical AI tools can play multiple critical roles. First
    and foremost, they can **enhance the agent’s capabilities** with analytical superpowers
    it inherently lacks. Also, they can **verify the agent’s outputs/hypotheses**
    against real data and the learned patterns. Finally, they can **enforce physical
    constraints**, ensuring the agents operate in a realistically feasible space.
  prefs: []
  type: TYPE_NORMAL
- en: To give a concrete example, imagine an LLM agent that is tasked with optimizing
    a complex semiconductor fabrication process to maximize yield and maintain stability.
    Instead of solely relying on textual logs/operator notes, the agent continuously
    interacts with a suite of specialized Analytical AI tools to gain a quantitative,
    context-rich understanding of the process in real-time.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, to achieve its goal of high yield, the agent queries a pre-trained
    **XGBoost model** to predict the likely yield based on hundreds of sensor readings
    and process parameters. This gives the agent the foresight into quality outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: At the same time, to ensure the process stability for consistent quality, the
    agent calls upon an **autoencoder model** (pre-trained on normal process data)
    to identify deviations or potential equipment failures *before* they disrupt production.
  prefs: []
  type: TYPE_NORMAL
- en: When potential issues arise, as indicated by the anomaly detection model, the
    agent must perform course correction in an optimal way. To do that, it invokes
    a **constraint-based optimization model**, which employs a *Bayesian optimization*
    algorithm to recommend the optimal adjustments to process parameters.
  prefs: []
  type: TYPE_NORMAL
- en: In this scenario, the LLM agent essentially acts as the intelligent orchestrator.
    It interprets the high-level goals, plans the queries to the appropriate Analytical
    AI tools, reasons on their quantitative outputs, and translates these complex
    analyses into actionable insights for operators or even triggers automated adjustments.
    This collaboration ensures that LLM agents remain grounded and reliable in tackling
    complex, real-world industrial problems.
  prefs: []
  type: TYPE_NORMAL
- en: 🪣 Analytical AI as a digital sandbox
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Beyond serving as a callable tool, Analytical AI offers another crucial capability:
    creating realistic **simulation environments** where LLM agents get trained and
    evaluated before they interact with the physical world. This is particularly valuable
    in industrial settings where failure could lead to severe consequences, like equipment
    damage or safety incidents.'
  prefs: []
  type: TYPE_NORMAL
- en: Analytical AI techniques are highly capable of building high-fidelity representations
    of the industrial asset or process by learning from both their historical operational
    data and the governing physical equations (think of methods like physics-informed
    neural networks). These *digital twins* capture the underlying physical principles,
    operational constraints, and inherent system variability.
  prefs: []
  type: TYPE_NORMAL
- en: Within this Analytical AI-powered virtual world, an LLM agent can be trained
    by first receiving simulated sensor data, deciding on control actions, and then
    observing the system responses computed by the Analytical AI simulation. As a
    result, agents can iterate through many trial-and-error learning cycles in a much
    shorter time and be safely exposed to a diverse range of realistic operating conditions.
  prefs: []
  type: TYPE_NORMAL
- en: Besides agent training, these Analytical AI-powered simulations offer a controlled
    environment for rigorously **evaluating and comparing** the performance and robustness
    of different agent setup versions or control policies before real-world deployment.
  prefs: []
  type: TYPE_NORMAL
- en: 'To give a concrete example, consider a power grid management case. An LLM agent
    (or multiple agents) designed to optimize renewable energy integration can be
    tested within such a simulated environment powered by multiple analytical AI models:
    we could have a **physics-informed neural network** (PINN) model to describe the
    complex, dynamical power flows. We may also have probabilistic forecasting models
    to simulate realistic weather patterns and their impact on renewable generation.
    Within this rich environment, the LLM agent(s) can learn to develop sophisticated
    decision-making policies for balancing the grid during various weather conditions,
    without ever risking actual service disruptions.'
  prefs: []
  type: TYPE_NORMAL
- en: The bottom line is, without Analytical AI, none of this would be possible. It
    forms the quantitative foundation and the physical constraints that make safe
    and effective agent development a reality.
  prefs: []
  type: TYPE_NORMAL
- en: 📈 Analytical AI as an operational toolkit
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, if we zoom out and take a fresh perspective, **isn’t an LLM agent—or even
    a team of them—just another type of operational system, that needs to be managed
    like any other industrial asset/process?**
  prefs: []
  type: TYPE_NORMAL
- en: 'This effectively means: all the principles of design, optimization, and monitoring
    for systems still apply. And guess what? Analytical AI is the toolkit exactly
    for that.'
  prefs: []
  type: TYPE_NORMAL
- en: Again, Analytical AI has the potential to move us beyond empirical trial-and-error
    (the current practices) and towards *objective*, *data-driven* methods for managing
    agentic systems. How about using a **Bayesian optimization algorithm** to design
    the agent architecture and configurations? How about adopting **operations research
    techniques** to optimize the allocation of computational resources or manage request
    queues efficiently? How about employing **time-series anomaly detection** methods
    to alert real-time behavior of the agents?
  prefs: []
  type: TYPE_NORMAL
- en: Treating the LLM agent as a complex system subject to quantitative analysis
    opens up many new opportunities. It is precisely this operational rigor enabled
    by Analytical AI that can elevate these LLM agents from “just a demo” to something
    reliable, efficient, and “actually useful” in modern industrial operation.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Viewpoint 2: Analytical AI can be amplified by LLM agents with their contextual
    intelligence**.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We have discussed in length how indispensable Analytical AI is for the LLM agent
    ecosystem. But this powerful synergy flows in both directions. Analytical AI can
    also leverage the unique strengths of LLM agents to enhance its usability, effectiveness,
    and ultimately, the real-world impact. Those are the points that Analytical AI
    practitioners may not want to miss out on LLM agents.
  prefs: []
  type: TYPE_NORMAL
- en: 🧩 From vague goals to solvable problems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Often, the need for analysis starts with a high-level, vaguely stated business
    goal, like “we need to improve product quality.” To make this actionable, Analytical
    AI practitioners must repeatedly ask clarifying questions to uncover the true
    objective functions, specific constraints, and available input data, which inevitably
    leads to a very time-consuming process.
  prefs: []
  type: TYPE_NORMAL
- en: The good news is, LLM agents excel here. They can interpret these ambiguous
    natural language requests, ask clarifying questions, and formulate them into well-structured,
    quantitative problems that Analytical AI tools can directly tackle.
  prefs: []
  type: TYPE_NORMAL
- en: 📚 Enriching Analytical AI model with context and knowledge
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Traditional Analytical AI models operate primarily on numerical data. For the
    largely untapped unstructured data, LLM agents can be very helpful there to extract
    useful information to fuel the quantitative analysis.
  prefs: []
  type: TYPE_NORMAL
- en: For example, LLM agents can analyze text documents/reports/logs to identify
    meaningful patterns, and transform these qualitative observations into quantitative
    features that Analytical AI models can process. This **feature engineering** step
    often significantly boosts the performance of Analytical AI models by giving them
    access to insights embedded in unstructured data they would otherwise miss.
  prefs: []
  type: TYPE_NORMAL
- en: Another important use case is **data labeling**. Here, LLM agents can automatically
    generate accurate category labels and annotations. By providing high-quality training
    data, they can greatly accelerate the development of high-performing supervised
    learning models.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, by tapping into the **knowledge** of LLM agents, either *pre-trained*
    in the LLM or *actively searched* in external databases, LLM agents can automate
    the setup of the sophisticated analysis pipeline. LLM agents can recommend appropriate
    algorithms and parameter settings based on the problem characteristics [1], generate
    code to implement custom problem-solving strategies, or even automatically run
    experiments for hyperparameter tuning [2].
  prefs: []
  type: TYPE_NORMAL
- en: 💡From technical outputs to actionable insights
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Analytical AI models tend to produce dense outputs, and properly interpreting
    them requires both expertise and time. LLM agents, on the other hand, can act
    as “translators” by converting these dense quantitative results into clear, accessible
    natural language explanations.
  prefs: []
  type: TYPE_NORMAL
- en: This interpretability function plays a crucial role in **explaining** the decisions
    made by the Analytical AI models in a way that human operators can quickly understand
    and act upon. Also, this information could be highly valuable for model developers
    to verify the correctness of model outputs, identify potential issues, and improve
    model performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Besides technical interpretation, LLM agents can also generate tailored responses
    for different types of audiences: technical teams would receive detailed methodological
    explanations, operations staff may get practical implications, while executives
    may obtain summaries highlighting business impact metrics.'
  prefs: []
  type: TYPE_NORMAL
- en: By serving as *interpreters* between analytical systems and human users, LLM
    agents can significantly amplify the practical value of analytical AI.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Viewpoint 3: The future probably lies in the true peer-to-peer collaboration
    between Analytical AI and Agentic AI.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Whether LLM agents call Analytical AI tools or analytical systems use LLM agents
    for interpretation, the approaches we have discussed so far have always been about
    one type of AI being in charge of the other. This in fact has introduced several
    limitations worth looking at.
  prefs: []
  type: TYPE_NORMAL
- en: First of all, in the current paradigm, Analytical AI components are only used
    as passive tools, and they are invoked only when the LLM decides so. This prevents
    them from proactively contributing insights or questioning assumptions.
  prefs: []
  type: TYPE_NORMAL
- en: Also, the typical agent loop of “plan-call-response-act” is inherently sequential.
    This can be inefficient for tasks that could benefit from parallel processing
    or more asynchronous interaction between the two AIs.
  prefs: []
  type: TYPE_NORMAL
- en: Another limiting factor is the limited communication bandwidth. API calls may
    not be able to deliver the rich context needed for genuine dialogue or exchange
    of intermediate reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, LLM agents’ understanding of an Analytical AI tool is often based on
    a brief docstring and a parameter schema. LLM agents are likely to make mistakes
    in tool selection, while Analytical AI components lack the context to recognize
    when they’re being used wrongly.
  prefs: []
  type: TYPE_NORMAL
- en: Just because the prevalence of adoption of the tool-calling pattern today does
    not necessarily mean the future should look the same. Probably, the future lies
    in a true peer-to-peer collaboration paradigm where neither AI type is the master.
  prefs: []
  type: TYPE_NORMAL
- en: What might this actually look like in practice? One interesting example I found
    is a solution delivered by Siemens [3].
  prefs: []
  type: TYPE_NORMAL
- en: In their smart factory system, there is a digital twin model that continuously
    monitors the equipment’s health. When a gearbox’s condition deteriorates, the
    Analytical AI system doesn’t wait to be queried, but proactively fires alerts.
    A Copilot LLM agent watches the same event bus. On an alert, it (1) cross-references
    maintenance logs, (2) “asks” the twin to rerun simulations with upcoming shift
    patterns, and then (3) recommends schedule adjustments to prevent costly downtime.
    What makes this example unique is that the Analytical AI system isn’t just a passive
    tool. Rather, it initiates the dialogue when needed.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, this is just one possible system architecture. Other directions,
    such as the **multi-agent systems** with specialized cognitive functions, or maybe
    even **cross-training** these systems to develop hybrid models that internalize
    aspects of both AI systems (just like humans develop integrated mathematical and
    linguistic thinking), or simply drawing inspiration from the established **ensemble
    learning techniques** by treating LLM agents and Analytical AI as different model
    types that can be combined in systematic ways. The future opportunities are endless.
  prefs: []
  type: TYPE_NORMAL
- en: But these also raise fascinating research challenges. How do we design *shared
    representations*? What architecture best supports *asynchronous information exchange*?
    What *communication protocols* are optimal between Analytical AI and agents?
  prefs: []
  type: TYPE_NORMAL
- en: These questions represent new frontiers that definitely need expertise from
    Analytical AI practitioners. Once again, the deep knowledge of building analytical
    models with quantitative rigor isn’t becoming obsolete, but is essential for building
    these hybrid systems for the future.
  prefs: []
  type: TYPE_NORMAL
- en: '**Viewpoint 4: Let’s embrace the complementary future.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As we’ve seen throughout this post, the future isn’t “Analytical AI vs. LLM
    Agents.” It’s **“Analytical AI + LLM Agents.”**
  prefs: []
  type: TYPE_NORMAL
- en: So, rather than feeling FOMO about LLM agents, I’ve now found renewed excitement
    about analytical AI’s evolving role. The analytical foundations we’ve built aren’t
    becoming obsolete, they’re essential components of a more capable AI ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get building.
  prefs: []
  type: TYPE_NORMAL
- en: Reference
  prefs: []
  type: TYPE_NORMAL
- en: '[1] Chen et al., [PyOD 2: A Python Library for Outlier Detection with LLM-powered
    Model Selection.](https://arxiv.org/abs/2412.12154) arXiv, 2024.'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] Liu et al., [Large Language Models to Enhance Bayesian Optimization](https://arxiv.org/abs/2402.03921).
    arXiv, 2024.'
  prefs: []
  type: TYPE_NORMAL
- en: '[3] [Siemens unveils breakthrough innovations in industrial AI and digital
    twin technology at CES 2025](https://press.siemens.com/global/en/pressrelease/siemens-unveils-breakthrough-innovations-industrial-ai-and-digital-twin-technology-ces).
    Press release, 2025.'
  prefs: []
  type: TYPE_NORMAL
