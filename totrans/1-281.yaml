- en: Using Python to Build a Calculator
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/using-python-to-build-a-calculator/](https://towardsdatascience.com/using-python-to-build-a-calculator/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Calculators date back to the 17th century, with the first calculator created
    in the form of a mechanical device. Over time, these calculators evolved so that
    more people could use them. It was in the 1960s, that the first electronic calculator
    came into being, and as time went on, the calculator was integrated into our computers
    and now mobiles.
  prefs: []
  type: TYPE_NORMAL
- en: Either physical or digital, we live in a time where each of us has used a calculator.
    Whether we are calculating rent, totalling the bill, or finding the final percentage
    of our kids’ results, we all have taken help from the calculator.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s utilize Python basics, including functions, conditional statements, dictionaries,
    and loops, to create our version of a calculator.
  prefs: []
  type: TYPE_NORMAL
- en: Working of our Calculator
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Our calculator will work as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: It will ask the user for a number
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It will then ask the user for the operation
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It will ask the user for the second number
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It will perform its calculations and print the output
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It will ask the user if they want to carry on with this number (like our physical
    calculator) or start all over
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If the user asks to start all over, it will restart the above process
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If the user wants to carry on with the result, it will take this number as the
    first and ask for the operation, and then follow as the first time.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Let us construct the above thought process into a flowchart for better understanding:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/871037a17d7a4d4286019cfa3f44bfa8.png)'
  prefs: []
  type: TYPE_IMG
- en: Flowchart (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: Defining Operation Functions
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: First of all, we will define functions that will be called when their corresponding
    operation symbol is selected by the user. We will define functions `add` for addition,
    `subtract` for subtraction, `multiply` for multiplication, and `divide` for division.
    These functions will take the two numbers as their input parameters, and perform
    the selected operation on them, and return the result.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Creating a Dictionary of Operations
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let us also create a dictionary of `operations`. The operation symbols will
    be stored as keys, and the name of the operation, that is also the name of the
    function, will be stored as the value to that key. We will ask the user to choose
    an operation, and based on their choice, the specific operation function that
    we have defined above will be called.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Asking User for Input
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Once we have defined our functions, let us now ask the user for their first
    number `num1`, their selected operation `operation_symbol`, and their second number
    `num2`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Notice that we have converted the input numbers to the float type. Also, we
    have created the for loop that will iterate over the keys in the operations dictionary
    we have defined earlier on, and print each operation symbol.
  prefs: []
  type: TYPE_NORMAL
- en: Calculating and Displaying the Answer
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Next, is to calculate the answer and print it out to the user in its complete
    form. The following code will be used for this purpose:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The answer variable will store the value that we have got from calling the relevant
    function, according to the operation symbol selected. We have used an f-string
    to properly format the output statement.
  prefs: []
  type: TYPE_NORMAL
- en: Check Calculator Continuity with the While Loop
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Now that we have calculated and displayed the result, the next step is to check
    if the user wants to continue using the calculator by carrying on the result value
    `answer` onwards or wants to start the calculator all over. For this purpose,
    we will define a variable `should_accumulate` that will be True when the user
    wants to continue and will be False when the user does not want to continue, rather
    it will restart the calculator. The `should_accumulate` variable will be defined
    earlier in our code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Since the `should_accumulate` variable is `True`, and we have added a `while`
    loop, the code within the loop will continue to run, unless the user selects ‘n’.
    When the user selects ‘n’, the calculation will not carry onwards, but will stop,
    and we will seemingly start a new console by typing 20 lines. But now we want
    to restart the calculator, so for this purpose, we will use a Python function
    concept called recursion.
  prefs: []
  type: TYPE_NORMAL
- en: 'For the calculator to restart, we will define it as a function, and it will
    be called when we want to restart the calculator function without carrying on
    the result. This will be coded as a recursive function. Recursion in Python allows
    a function to be called within itself, just like we will do below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Notice we have called the calculator function inside the calculator function
    itself. For the code to run for the first time, we need to call it outside.
  prefs: []
  type: TYPE_NORMAL
- en: 'Check out this link to access the complete code: [https://github.com/MahnoorJaved98/Using-Python-to-Build-a-Calculator](https://github.com/MahnoorJaved98/Using-Python-to-Build-a-Calculator)'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this short tutorial, we have successfully learned how to build a calculator
    in Python, with the ability to perform the basic 4 operations on addition, subtraction,
    multiplication and division. We have accomplished this using our basic knowledge
    of functions, loops, and recursive functions.
  prefs: []
  type: TYPE_NORMAL
