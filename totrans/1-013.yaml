- en: How We Are Testing Our Agents in Dev
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我们如何在开发中测试我们的代理
- en: 原文：[https://towardsdatascience.com/how-we-are-testing-our-agents-in-dev/](https://towardsdatascience.com/how-we-are-testing-our-agents-in-dev/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-we-are-testing-our-agents-in-dev/](https://towardsdatascience.com/how-we-are-testing-our-agents-in-dev/)
- en: Why testing agents is so hard
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么测试代理如此困难
- en: <mdspan datatext="el1764878739319" class="mdspan-comment">Testing that your</mdspan>
    AI agent is performing as expected is not easy. Even small tweaks to components
    like your prompt versions, agent orchestration, and models can have large and
    unexpected impacts.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764878739319" class="mdspan-comment">测试你的</mdspan> AI 代理是否按预期运行并不容易。即使是像提示版本、代理编排和模型这样的组件的小调整也可能产生巨大和意外的影响。
- en: 'Some of the top challenges include:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一些最大的挑战包括：
- en: Non-deterministic outputs
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 非确定性输出
- en: The underlying issue at hand is that agents are non-deterministic. The same
    input goes in, two different outputs can come out.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的问题本质上是代理是非确定性的。相同的输入进入，可能有两个不同的输出。
- en: How do you test for an expected outcome when you don’t know what the expected
    outcome will be? Simply put, testing for strictly defined outputs doesn’t work.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 当你不知道预期结果会是什么时，你如何测试预期结果？简单来说，严格定义输出的测试是不起作用的。
- en: Unstructured outputs
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 未结构化输出
- en: The second, and less discussed, challenge of testing agentic systems is that
    outputs are often unstructured. The foundation of agentic systems are *large language*
    models after all.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 测试代理系统的第二个挑战，也是讨论较少的，是输出通常是未结构化的。毕竟，代理系统的基础是 *大型语言* 模型。
- en: It is much easier to define a test for structured data. For example, the id
    field should never be NULL or always be an integer. How do you define the quality
    of a large field of text?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 对于结构化数据定义测试要容易得多。例如，id 字段永远不会为 NULL 或始终为整数。如何定义大量文本字段的质量？
- en: Cost and scale
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成本和规模
- en: '[LLM-as-judge](https://www.montecarlodata.com/blog-llm-as-judge/) is the most
    common methodology for evaluating the quality or reliability of AI agents. However,
    it’s an expensive workload and each user interaction (trace) can consist of hundreds
    of interactions (spans).'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[LLM-as-judge](https://www.montecarlodata.com/blog-llm-as-judge/) 是评估人工智能代理质量或可靠性的最常见方法。然而，这是一个昂贵的任务，每个用户交互（跟踪）可能包含数百个交互（跨度）。'
- en: So we rethought our agent testing strategy. In this post we’ll share our learnings
    including a new key concept that has proven pivotal to ensuring reliability at
    scale.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们重新思考了我们的代理测试策略。在这篇文章中，我们将分享我们的经验，包括一个新关键概念，它已被证明对于确保大规模可靠性至关重要。
- en: '![](../Images/c63e17bba2beddf881613a9eee1e7840.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c63e17bba2beddf881613a9eee1e7840.png)'
- en: Image courtesy of the author
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Testing our agent
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试我们的代理
- en: We have two agents in production that are leveraged by more than 30,000 users.
    The Troubleshooting Agent combs through hundreds of signals to determine the root
    cause of a data reliability incident while the Monitoring Agent makes smart data
    quality monitoring recommendations.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有两个在生产中使用的代理，被超过 30,000 名用户所利用。故障排除代理通过数百个信号来确定数据可靠性事件的根本原因，而监控代理则提供智能数据质量监控建议。
- en: 'For the Troubleshooting agent we test three main dimensions: semantic distance,
    groundedness, and tool usage. Here is how we test for each.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 对于故障排除代理，我们测试三个主要维度：语义距离、基础性和工具使用。以下是我们的测试方法。
- en: Semantic distance
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 语义距离
- en: We leverage deterministic tests when appropriate as they are clear, explainable,
    and cost-effective. For example, it is relatively easy to deploy a test to ensure
    one of the subagent’s outputs is in JSON format, that they don’t exceed a certain
    length, or to make sure the guardrails are being called as intended.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 当适当的时候，我们利用确定性测试，因为它们清晰、可解释且成本效益高。例如，部署一个测试来确保子代理的输出是 JSON 格式，它们不超过一定长度，或者确保守卫线被按预期调用，相对容易。
- en: However, there are times when deterministic tests won’t get the job done. For
    example, we explored embedding both expected and new outputs as vectors and using
    [cosine similarity tests](https://docs.snowflake.com/en/sql-reference/functions/vector_cosine_similarity).
    We thought this would be a cheaper and faster way to evaluate semantic distance
    (is the meaning similar) between observed and expected outputs.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有时确定性测试无法完成任务。例如，我们探索了将预期和新输出都嵌入为向量，并使用 [余弦相似性测试](https://docs.snowflake.com/en/sql-reference/functions/vector_cosine_similarity)。我们认为这将是一种更便宜、更快的评估语义距离（观察到的输出和预期输出之间的意义是否相似）的方法。
- en: However, we found there were too many cases in which the wording was similar,
    but the meaning was different.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们发现有很多情况，其中措辞相似，但意义不同。
- en: Instead, we now provide our LLM judge the expected output from the current configuration
    and ask it to score on a 0-1 scale *the similarity* of the new output.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我们现在提供我们的LLM评估者从当前配置中预期的输出，并要求它对新的输出的相似度进行0-1评分。
- en: Groundedness
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于上下文
- en: For groundedness, we check to ensure that the key context is present when it
    should be, but also that the agent will decline to answer when the key context
    is missing or the question is out of scope.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 对于基于上下文，我们检查确保关键上下文在应该出现的时候存在，同时也要确保当关键上下文缺失或问题超出范围时，代理将拒绝回答。
- en: This is important as LLMs are eager to please and will hallucinate when they
    aren’t grounded with good context.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这很重要，因为大型语言模型（LLMs）渴望取悦，如果没有良好的上下文支撑，它们就会产生幻觉。
- en: Tool usage
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 工具使用
- en: 'For tool usage we have an LLM-as-judge evaluate whether the agent performed
    as expected for the pre-defined scenario meaning:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 对于工具使用，我们有一个LLM作为评估者来评估代理是否按照预定义的场景预期执行，这意味着：
- en: No tool was expected and no tool was called
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有预期使用任何工具，也没有调用任何工具
- en: A tool was expected and a permitted tool was used
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预期使用了一个工具，并且使用了一个允许的工具
- en: No required tools were omitted
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有省略必需的工具
- en: No non-permitted tools were used
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有使用非允许的工具
- en: The real magic is not deploying these tests, but how these tests are applied.
    Here is our current setup informed by some painful trial and error.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的魔法不在于部署这些测试，而在于如何应用这些测试。以下是我们当前基于一些痛苦的经验和错误得出的设置。
- en: Agent testing best practices
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理测试最佳实践
- en: It’s important to keep in mind not only are your agents non-deterministic, but
    so are your LLM evaluations! These best practices are mainly designed to combat
    those inherent shortcomings.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要记住，不仅你的代理是非确定性的，你的LLM评估也是非确定性的！这些最佳实践主要是为了对抗这些固有的不足。
- en: Soft failures
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 软错误
- en: Hard thresholds can be noisy with non-deterministic tests for obvious reasons.
    So we invented the concept of a “soft failure.”
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 硬阈值对于非确定性测试来说可能很嘈杂，这是显而易见的原因。因此，我们发明了“软错误”的概念。
- en: The evaluation comes back with a score between 0-1\. Anything less than a .5
    is a hard failure, while anything above a .8 is a pass. Soft failures occur for
    scores between .5 to .8.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 评估结果返回一个0-1之间的分数。任何低于0.5的都是硬错误，而任何高于0.8的都是通过。软错误发生在0.5到0.8之间的分数。
- en: Changes can be merged for a soft failure. However, if a certain threshold of
    soft failures is exceeded it constitutes a hard failure and the process is halted.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 可以合并更改以处理软错误。然而，如果超过一定的软错误阈值，则构成硬错误，并且过程将停止。
- en: For our agent, it is currently configured so that if 33% of tests result in
    a soft failure or if there are any more than 2 soft failures total, then it is
    considered a hard failure. This prevents the change from being merged.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的代理，它目前配置为如果33%的测试结果是软错误，或者如果总共有超过2次软错误，则被视为硬错误。这防止了更改被合并。
- en: Re-evaluate soft failures
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重新评估软错误
- en: Soft failures can be a canary in a coal mine, or in some cases they can be nonsense.
    About 10% of soft failures are the result of hallucinations. In the case of a
    soft failure, the evaluations will automatically re-run. If the resulting tests
    pass we assume the original result was incorrect.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 软错误可以是煤矿中的金丝雀，或者在某些情况下它们可能是无意义的。大约10%的软错误是幻觉的结果。在软错误的情况下，评估将自动重新运行。如果结果测试通过，我们假设原始结果是错误的。
- en: Explanations
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 说明
- en: When a test fails, you need to understand why it failed. We now ask every LLM
    judge to not just provide a score, but to explain it. It’s imperfect, but it helps
    build trust in the evaluation and often speeds debugging.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 当测试失败时，你需要了解为什么它失败了。我们现在要求每个LLM评估者不仅提供分数，还要解释它。这并不完美，但它有助于建立对评估的信任，并经常加快调试过程。
- en: Removing flaky tests
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 移除不稳定的测试
- en: You have to test your tests. Especially with LLM-as-judge evaluations, the way
    the prompt is built can have a large impact on the results. We run tests multiple
    times and if the delta across the results is too large we will revise the prompt
    or remove the flaky test.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须测试你的测试。特别是对于LLM作为评估者的评估，提示的构建方式可能会对结果产生重大影响。我们多次运行测试，如果结果之间的差异太大，我们将修改提示或删除不稳定的测试。
- en: Monitoring in production
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生产中的监控
- en: Agent testing is new and challenging, but it’s a walk in the park compared to
    monitoring agent behavior and outputs in production. Inputs are messier, there
    is no expected output to baseline, and everything is at a much larger scale.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 代理测试是新的且具有挑战性的，但与在生产环境中监控代理行为和输出相比，这就像散步一样简单。输入更混乱，没有预期的输出作为基准，而且规模要大得多。
- en: Not to mention the stakes are much higher! System reliability problems quickly
    become business problems.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 不提及其他的风险已经很高了！系统可靠性问题很快就会变成商业问题。
- en: This is our current focus. We’re leveraging [agent observability](https://www.montecarlodata.com/blog-what-is-agent-observability/)
    tools to tackle these challenges and will report new learnings in a future post.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们目前的关注点。我们正在利用[代理可观察性](https://www.montecarlodata.com/blog-what-is-agent-observability/)工具来应对这些挑战，并将在未来的一篇博文中报告新的学习成果。
- en: The Troubleshooting Agent has been one of the most impactful features we’ve
    ever shipped. Developing reliable agents has been a career-defining journey and
    we’re excited to share it with you.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 故障排除代理是我们推出过的最具影响力的功能之一。开发可靠的代理已经成为一个定义职业生涯的旅程，我们很兴奋能与大家分享。
- en: '* * *'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '[*Michael Segner*](https://www.linkedin.com/in/michaelsegner/) *is a product
    strategist at Monte Carlo and the author of the O’Reilly report, “Enhancing data
    + AI reliability through observability.” This was co-authored with Elor Arieli
    and Alik Peltinovich.*'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '[*Michael Segner*](https://www.linkedin.com/in/michaelsegner/) *是Monte Carlo的产品策略师，同时也是O’Reilly报告《通过可观察性增强数据+AI可靠性》的作者。该报告是与Elor
    Arieli和Alik Peltinovich合著的。*'
