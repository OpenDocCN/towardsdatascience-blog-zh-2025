  type: TYPE_NORMAL
  zh: '[用于训练的 PyTorch 分割模型](https://github.com/qubvel-org/segmentation_models.pytorch)'
- en: '[Blender](https://www.blender.org/) and its [Python API](https://docs.blender.org/api/current/index.html)'
  id: totrans-106
  prefs:
