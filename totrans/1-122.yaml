- en: 'Multi-Agent SQL Assistant, Part 2: Building a RAG Manager'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 多智能体SQL助手，第二部分：构建RAG管理器
- en: 原文：[https://towardsdatascience.com/multi-agent-sql-assistant-part-2-building-a-rag-manager/](https://towardsdatascience.com/multi-agent-sql-assistant-part-2-building-a-rag-manager/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/multi-agent-sql-assistant-part-2-building-a-rag-manager/)'
- en: <mdspan datatext="el1762405237828" class="mdspan-comment">Previously</mdspan>
    in my [blog post](https://towardsdatascience.com/a-multi-agent-sql-assistant-you-can-trust-with-human-in-loop-checkpoint-llm-cost-control/),
    I had explored how to build a Multi-agent SQL assistant using CrewAI & Streamlit.
    The user could query a SQLite database in natural language. The AI agents would
    generate a SQL query based on user input, review it, and check for compliance
    before running it against the database to get results. I also implemented a human-in-the-loop
    checkpoint to maintain control and displayed the LLM costs associated with every
    query for transparency and cost control. While the prototype was great and generated
    good results for my small demo database, I knew this would not be enough for real-life
    databases. In the previous setup, I was sending the whole database schema as context
    along with the user input. As database schemas grow larger, passing the full schema
    to the LLM increases token usage, slows down response times, and makes hallucination
    more likely. I needed a way to feed only relevant schema snippets to the LLM.
    This is where **RAG (Retrieval Augmented Generation)** comes in.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762405237828" class="mdspan-comment">之前</mdspan>在我的[博客文章](https://towardsdatascience.com/a-multi-agent-sql-assistant-you-can-trust-with-human-in-loop-checkpoint-llm-cost-control/)中，我探讨了如何使用CrewAI
    & Streamlit构建多智能体SQL助手。用户可以用自然语言查询SQLite数据库。AI代理将根据用户输入生成SQL查询，审查它，并在运行数据库以获取结果之前检查其合规性。我还实现了人工检查点以保持控制，并显示了每个查询相关的LLM成本，以提高透明度和成本控制。虽然原型很好，并且在我的小型演示数据库中产生了良好的结果，但我知道这不足以应对现实生活中的数据库。在之前的设置中，我正在将整个数据库模式作为上下文与用户输入一起发送。随着数据库模式变得越来越大，将完整模式传递给LLM会增加标记使用，减慢响应时间，并使幻觉的可能性增加。我需要一种只向LLM提供相关模式片段的方法。这就是**RAG（检索增强生成）**发挥作用的地方。
- en: 'In this blog post, I build a RAG manager and add **multiple** **RAG strategies**
    to my SQL assistant to compare their performance on metrics like response time
    and token usage. The assistant now supports four RAG strategies:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我构建了一个RAG管理器，并将**多个**RAG策略添加到我的SQL助手中，以比较它们在响应时间和标记使用等指标上的性能。助手现在支持四种RAG策略：
- en: '**No RAG:** Passes the full schema (baseline for comparison)'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无RAG:** 传递完整模式（比较的基线）'
- en: '**Keyword RAG:** Uses domain-specific keyword matching to select relevant tables'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键词RAG:** 使用特定领域的关键词匹配来选择相关表格'
- en: '**FAISS RAG:** Leverages semantic vector similarity via FAISS with `all-MiniLM-L6-v2`
    embeddings'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**FAISS RAG:** 通过FAISS利用`all-MiniLM-L6-v2`嵌入实现语义向量相似度'
- en: '**Chroma RAG:** A persistent vector store solution with ChromaDB for scalable
    production-grade search'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Chroma RAG:** 使用ChromaDB的持久向量存储解决方案，适用于可扩展的生产级搜索'
- en: For this project, I only focused on RAG techniques that are practical, lightweight,
    and cost-efficient (free). You can add any number of implementations on top and
    choose the best one for your case. To facilitate experimentation and analysis,
    I built an interactive performance comparison tool that evaluates token reduction,
    table count, response time, and query accuracy across all four strategies.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个项目，我只关注实用、轻量级且成本效益高（免费）的RAG技术。你可以在其上添加任意数量的实现，并选择最适合你情况的最佳方案。为了便于实验和分析，我构建了一个交互式性能比较工具，该工具评估了所有四种策略在标记减少、表格数量、响应时间和查询准确性方面的表现。
- en: '![](../Images/89165eab7b855a51cf062cdc1e79c9fd.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/89165eab7b855a51cf062cdc1e79c9fd.png)'
- en: Screenshot of App, by Author
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序截图，作者提供
- en: Building a RAG Manager
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建RAG管理器
- en: 'The `rag_manager.py` file contains the entire implementation for the RAG manager.
    First, I created a `BaseRAG` class – a template that I use for all my different
    RAG strategies. It makes sure every RAG approach follows the same structure. Any
    new strategy will have two things: a method to fetch the relevant schema based
    on the user query, and another method that explains what the approach is about.
    By using the **abstract base class** (ABC), I keep the code clean, modular, and
    easy to extend later.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '`rag_manager.py` 文件包含了 RAG 管理器的完整实现。首先，我创建了一个 `BaseRAG` 类 - 这是一个模板，我用于所有不同的
    RAG 策略。它确保每个 RAG 方法都遵循相同的结构。任何新的策略都将有两个方面：一个用于根据用户查询获取相关模式的方法，另一个用于解释该方法的内容。通过使用**抽象基类**（ABC），我保持了代码的整洁、模块化和易于扩展。'
- en: '[PRE0]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: No RAG Strategy
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 无 RAG 策略
- en: This is basically the same approach that I used previously, where I sent in
    the entire database schema as context to the LLM without any filtering or optimization.
    This approach is best for very small schemas (preferably less than 10 tables).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这基本上是我之前使用的方法，其中我将整个数据库模式作为上下文发送给 LLM，没有任何过滤或优化。这种方法最适合非常小的模式（最好少于 10 个表）。
- en: '[PRE1]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Keyword RAG Strategy
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键字 RAG 策略
- en: In the keyword RAG approach, I use a bunch of predefined keywords mapped to
    each table in the schema. When a user asks something, the system checks for keyword
    matches in the query and picks out only the most relevant tables. This way, I
    don’t send the entire schema to the LLM – saving tokens and speeding things up.
    It works well when your schema is familiar and your queries are business-related
    or follow common patterns.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在关键字 RAG 方法中，我使用了一组预定义的关键字，这些关键字映射到模式中的每个表。当用户提出问题时，系统会在查询中检查关键字匹配，并仅选择最相关的表。这样，我就不会将整个模式发送给
    LLM，从而节省令牌并加快速度。当你的模式熟悉且查询与业务相关或遵循常见模式时，这种方法效果很好。
- en: The `_build_table_keywords(self)` method is the core of how the keyword matching
    logic works. It contains a hardcoded keyword mapping for each table in the schema.
    It helps to associate user query terms (like “sales”, “brand”, “customer”) with
    the most likely relevant tables.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '`_build_table_keywords(self)` 方法是关键字匹配逻辑工作的核心。它包含针对模式中每个表的硬编码关键字映射。它有助于将用户查询术语（如“销售”、“品牌”、“客户”）与最可能相关的表关联起来。'
- en: '[PRE2]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: FAISS RAG Approach
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: FAISS RAG 方法
- en: The **FAISS RAG** strategy is where things start getting smarter. Instead of
    dumping the whole schema, I embed each table’s metadata (columns, relationships,
    business context) into vectors using a sentence transformer. When the user asks
    a question, it is embedded into that query too and uses FAISS to do a semantic
    search matching on the “meaning” instead of just keywords. It’s perfect for queries
    where users aren’t being very specific or when tables have related terms. I like
    FAISS because it’s free, runs locally, and gives pretty accurate results while
    saving tokens.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**FAISS RAG** 策略是事情开始变得智能的地方。不是将整个模式倾倒进去，而是使用句子转换器将每个表的元数据（列、关系、业务上下文）嵌入到向量中。当用户提出问题时，它也会嵌入到那个查询中，并使用
    FAISS 在“意义”上进行语义搜索匹配，而不仅仅是关键字。这对于用户不是很具体或表有相关术语的查询非常完美。我喜欢 FAISS，因为它免费、本地运行，并且在节省令牌的同时给出相当准确的结果。'
- en: The only catch is that setting it up takes some extra steps, and it uses more
    memory than basic approaches. LLMs and embedding models don’t know what your tables
    mean unless you explain it to them. In the `_get_business_context()` method, we
    need to manually write a short description of what each table represents in the
    business.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的缺点是设置它需要一些额外的步骤，并且它比基本方法使用更多的内存。LLMs 和嵌入模型不知道你的表意味着什么，除非你向它们解释。在 `_get_business_context()`
    方法中，我们需要手动编写每个表在业务中代表的简短描述。
- en: In the `_extract_table_info()` method, I pull in table names, column names,
    and foreign key relationships from SQLite’s PRAGMA queries to build a dictionary
    with structured info about each table. Finally, in the `_create_table_description()`
    method, comprehensive descriptions for each table are built to be embedded by
    a SentenceTransformer.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `_extract_table_info()` 方法中，我从 SQLite 的 PRAGMA 查询中提取表名、列名和外键关系，以构建一个包含每个表结构化信息的字典。最后，在
    `_create_table_description()` 方法中，为每个表构建了全面的描述，以便由 SentenceTransformer 嵌入。
- en: '[PRE3]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Chroma RAG Strategy
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Chroma RAG 策略
- en: Chroma RAG is a more production-friendly version of FAISS because it offers
    persistent storage. Instead of keeping embeddings in memory, Chroma stores them
    locally, so even if I restart the app, the vector index is still there. Just like
    in FAISS, I still need to manually describe what each table does in business terms
    (in `_get_business_context()`). I embed my schema descriptions and store them
    in ChromaDB. Upon initialization, sentence-transformer (MiniLM) is loaded. If
    the vector already exists, it is loaded. If not, I extract info + descriptions
    and call `_populate_collection()` to generate and store vectors. This process
    only needs to be done once or when the schema changes.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: Chroma RAG是FAISS的一个更适用于生产的版本，因为它提供了持久存储。它不是将嵌入保留在内存中，而是将它们存储在本地，所以即使我重新启动应用程序，向量索引仍然存在。就像在FAISS中一样，我仍然需要手动用业务术语描述每个表的功能（在`_get_business_context()`中）。我将模式描述嵌入并存储在ChromaDB中。初始化时，加载sentence-transformer（MiniLM）。如果向量已经存在，则加载。如果不存在，我提取信息+描述并调用`_populate_collection()`来生成和存储向量。这个过程只需要做一次或当模式更改时。
- en: It’s fast, consistent across sessions, and easy to set up. I chose it because
    it’s free, doesn’t need external services, and works well for real-world use cases
    where you want to scale without worrying about losing the vector index or reprocessing
    everything every time.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 它速度快，会话间一致，且易于设置。我选择它是因为它是免费的，不需要外部服务，并且适用于需要扩展而不必担心丢失向量索引或每次都重新处理所有内容的实际用例。
- en: '[PRE4]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Comparing the different RAG Strategies
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 比较不同的RAG策略
- en: This `RAGManager` class is the control center for switching between different
    RAG strategies. Based on the user query, it picks the right approach, fetches
    the most relevant part of the schema, and tracks performance like response time,
    token savings, and table count. It also has a compare function to benchmark all
    RAGs side-by-side, and stores historical metrics so you can analyze how each one
    is doing over time. Super handy for testing what works best and keeping things
    optimized.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这个`RAGManager`类是切换不同RAG策略的控制中心。根据用户查询，它选择正确的方法，获取最相关的模式部分，并跟踪性能，如响应时间、令牌节省和表计数。它还有一个比较功能，可以并行比较所有RAG，并存储历史指标，以便您可以分析每个策略随时间的变化情况。对于测试最佳方案并保持优化来说非常方便。
- en: All the different RAG strategy classes are initialized and stored in `self.approaches`.
    Each RAG approach is a class that inherits from `BaseRAG`, so all of them have
    a consistent interface (`get_relevant_schema()` and `get_approach_info()`). This
    means you can easily plug in a new strategy (say Pinecone or Weaviate) as long
    as it extends `BaseRAG`.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 所有的不同RAG策略类都初始化并存储在`self.approaches`中。每个RAG方法都是一个继承自`BaseRAG`的类，因此它们都有一个一致的接口（`get_relevant_schema()`和`get_approach_info()`）。这意味着只要它扩展了`BaseRAG`，您就可以轻松地插入新的策略（比如Pinecone或Weaviate）。
- en: The method `get_relevant_schema()` returns the schema relevant to that query
    based on the chosen strategy. If an invalid strategy is passed or there’s a failure
    for some reason, it smartly falls back to the `'Keyword RAG'` strategy.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 方法`get_relevant_schema()`根据所选策略返回与该查询相关的模式。如果传递了无效的策略或由于某种原因发生故障，它将智能地回退到`'Keyword
    RAG'`策略。
- en: 'The method `compare_approaches()` runs the same query through all the RAG strategies.
    It measures:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 方法`compare_approaches()`将相同的查询通过所有RAG策略运行。它测量：
- en: Length of resulting schema
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结果模式的长度
- en: '% Token reduction vs full schema'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '% 令牌减少与完整模式'
- en: Response time
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应时间
- en: Number of tables returned
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 返回的表数量
- en: This is really useful to **benchmark strategies** side-by-side and pick the
    one best suited for your use case.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于**比较策略**并选择最适合您用例的策略非常有用。
- en: '[PRE5]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'The Streamlit app is fully integrated with this manager, so users can choose
    the strategy they want and see real-time results. You can check out the complete
    code on GitHub [here](https://github.com/sravz3/SQL-Assistant-Crew). Here’s a
    working demo of the new App in action:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Streamlit应用程序完全集成了这个管理器，因此用户可以选择他们想要的策略并看到实时结果。您可以在GitHub [这里](https://github.com/sravz3/SQL-Assistant-Crew)查看完整的代码。以下是新应用程序在行动中的工作演示：
- en: '![](../Images/c202a37c57d0ca867a00b6824e4f1bf3.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c202a37c57d0ca867a00b6824e4f1bf3.png)'
- en: RAG Implementation In Action, by Author
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者编写的《RAG实施行动》
- en: Final Thoughts
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: This is not the end; there is still a lot to improve. I need to stress test
    against a variety of attacks and reinforce guardrails to reduce hallucinations
    and ensure data safety. It will be nice to build a role-based access system for
    data governance. Maybe replacing Streamlit with a frontend framework like React
    could make the app more scalable for real-world deployments. All this, for next
    time.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是终点；还有很多需要改进的地方。我需要针对各种攻击进行压力测试，并加强防护措施以减少幻觉并确保数据安全。建立一个基于角色的数据治理访问系统将会很棒。也许用React这样的前端框架替换Streamlit可以使应用在实际部署中更具可扩展性。所有这些，都是为了下一次。
