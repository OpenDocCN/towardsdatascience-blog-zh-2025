- en: 'RAG Explained: Understanding Embeddings, Similarity, and Retrieval'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/rag-explained-understanding-embeddings-similarity-and-retrieval/](https://towardsdatascience.com/rag-explained-understanding-embeddings-similarity-and-retrieval/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758136431841" class="mdspan-comment">In my last posts</mdspan>,
    I walked through [building a simple RAG pipeline](https://towardsdatascience.com/hitchhikers-guide-to-rag-with-chatgpt-api-and-langchain/)
    using OpenAI’s API, LangChain, and local files, as well as [effectively chunking
    large text files](https://towardsdatascience.com/hitchhikers-guide-to-rag-from-tiny-files-to-tolstoy-with-openais-api-and-langchain/).
    These posts cover the basics of setting up a RAG pipeline able to generate responses
    based on the content of local files.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/01e474e060e759275b6c82b964964194.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, so far, we’ve talked about reading the documents from wherever they
    are stored, splitting them into text chunks, and then creating an embedding for
    each chunk. After that, we somehow magically pick the embeddings that are appropriate
    for the user query and generate a relevant response. But it’s important to further
    understand how the retrieval step of RAG actually works.
  prefs: []
  type: TYPE_NORMAL
- en: 🍨*[**DataCream**](https://datacream.substack.com/) is a newsletter offering
    stories and tutorials on AI, data, tech. If you are interested in these topics,
    **[subscribe here](https://datacream.substack.com/).***
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Thus, in this post, we’ll take things a step further by taking a closer look
    at how the retrieval mechanism works and analyzing it in more detail. As in my
    previous post, I will be using the *[War and Peace](https://www.gutenberg.org/cache/epub/2600/pg2600.txt)*
    text as an example, licensed as Public Domain and easily accessible through [Project
    Gutenberg](https://www.gutenberg.org/).
  prefs: []
  type: TYPE_NORMAL
- en: What about the embeddings?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In order to understand how the retrieval step of the RAG framework works, it
    is crucial to first understand how text is transformed and represented in embeddings.
    For LLMs to handle any text, it must be in the form of a vector, and to perform
    this transformation, we need to utilize an embedding model.
  prefs: []
  type: TYPE_NORMAL
- en: An embedding is a vector representation of data (in our case, text) that captures
    its semantic meaning. Each word or sentence of the original text is mapped to
    a high-dimensional vector. Embedding models used to perform this transformation
    are designed in such a way that similar meanings result in vectors that are close
    to one another in the vector space. For example, the vectors for the words *happy*
    and *joyful* would be close to one another in the vector space, whereas the vector
    for the word *sad* would be far from them.
  prefs: []
  type: TYPE_NORMAL
- en: 'To create high-quality embeddings that work effectively in an RAG pipeline,
    one needs to utilize pre-trained embedding models, like [OpenAI’s embedding models](https://platform.openai.com/docs/guides/embeddings/embedding-models).
    There are various types of embeddings one can create and corresponding models
    available. For instance:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Word Embeddings**: In word embeddings, each word has a fixed vector regardless
    of context. Popular models for creating this type of embedding are [Word2Vec](https://www.tensorflow.org/text/tutorials/word2vec)
    and [GloVe](https://nlp.stanford.edu/projects/glove/).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Contextual Embeddings**: Contextual embeddings take into account that the
    meaning of a word can change based on context. Take, for instance, *the bank of
    a river* and *opening a bank account*. Some models that can be used for producing
    contextual embeddings are [BERT](https://huggingface.co/google-bert/bert-base-uncased)
    and [OpenAI’s embedding models](https://platform.openai.com/docs/guides/embeddings/embedding-models)
    (like `<a href="https://platform.openai.com/docs/models/text-embedding-ada-002"
    data-type="link" data-id="https://platform.openai.com/docs/models/text-embedding-ada-002">text-embedding-ada-002</a>`)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sentence Embeddings**: These are embeddings capturing the meaning of full
    sentences. A popular embedding model for creating sentence embeddings is [Sentence-BERT](https://huggingface.co/sentence-transformers).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In any case, text must be transformed into vectors to be usable in computations.
    These vectors are simply representations of the text. In other words, the vectors
    and numbers don’t have any inherent meaning on their own. Instead, they are useful
    because they capture similarities and relationships between words or phrases in
    a mathematical form.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, we could imagine a tiny vocabulary consisting of the words *king*,
    *queen*, *woman*, and *man*, and assign each of them an arbitrary vector.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Then, we could try to do some vector operations like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Notice how the semantics of the words and the relationships between them are
    preserved after mapping them into vectors, allowing us to perform operations.
  prefs: []
  type: TYPE_NORMAL
- en: So, an embedding is just that — a mapping of words to vectors, aiming to preserve
    meaning and relationships between words, and allowing to perform computations
    with them. We can even visualize these dummy vectors in a vector space to see
    how related words cluster together.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c8af1303e62c5802614e23817a923cc9.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: The difference between these simple vector examples and the real vectors produced
    by embedding models is that actual embedding models generate vectors with ***hundreds
    of dimensions***. Two-dimensional vectors are useful for building intuition about
    how meaning can be mapped into a vector space, but they are far too low-dimensional
    to capture the complexity of real language and vocabulary. That’s why real embedding
    models work with much higher dimensions, often in the hundreds or even thousands.
    For example, [Word2Vec](https://www.tensorflow.org/text/tutorials/word2vec) produces
    300-dimensional vectors, while [BERT Base](https://huggingface.co/google-bert/bert-base-uncased)
    produces 768-dimensional vectors. This higher dimensionality allows embeddings
    to capture the multiple dimensions of real language, like meaning, usage, syntax,
    and the context of words and phrases. Ultimately, this two-dimension simplified
    example allows us to build some intuition on what an embedding is – nonetheless,
    it is rather simplistic and not necessarily something you should expect to see
    replicate in real models.
  prefs: []
  type: TYPE_NORMAL
- en: Assessing the similarity of embeddings
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After the text is transformed into embeddings, inference becomes vector math.
    This is exactly what allows us to identify and retrieve relevant documents in
    the retrieval step of the RAG framework. Once we turn both the user’s query and
    the knowledge base documents into vectors using an embedding model, we can then
    compute how similar they are using an appropriate metric like [cosine similarity](https://en.wikipedia.org/wiki/Cosine_similarity),
    [Euclidean distance](https://en.wikipedia.org/wiki/Euclidean_distance) (L2 distance),
    or [dot product](https://en.wikipedia.org/wiki/Dot_product).
  prefs: []
  type: TYPE_NORMAL
- en: 'Cosine similarity is a measure of how similar two vectors (embeddings) are.
    Given two vectors A and B, cosine similarity is calculated as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9529f324a17a71f6c236ff308047d698.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Simply put, cosine similarity is calculated as the cosine of the angle between
    two vectors, and it ranges from 1 to -1\. More specifically:'
  prefs: []
  type: TYPE_NORMAL
- en: 1 indicates that the vectors are semantically identical (e.g., *car* and *automobile*).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 0 indicates that the vectors have no semantic relationship (e.g., *banana* and
    *justice*).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: -1 indicates that the vectors are perfectly opposite, but in practice, embeddings
    don’t produce negative similarities, even for antonyms like *hot* and *cold*.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is because even semantically opposite words (like *hot* and *cold*) often
    occur in similar contexts (e.g., *it’s getting hot* and *it’s getting cold*).
    For cosine similarity to reach -1, the words themselves and their contexts would
    both need to be perfectly opposite—something that doesn’t really happen in natural
    language. As a result, even opposite words typically have embeddings that are
    still somewhat close in meaning. In practice, similarity scores are usually positive.
  prefs: []
  type: TYPE_NORMAL
- en: Other similarity metrics apart from cosine similarity include dot product (inner
    product) and Euclidean distance (L2 distance). Unlike cosine similarity, the dot
    product and Euclidean distance are magnitude-dependent, meaning that vector length
    affects the result. To use the dot product as a measure of similarity equivalent
    to cosine similarity, we must first normalize the vectors to unit length. This
    is because cosine similarity is mathematically equal to the dot product of two
    normalized vectors. Thus, similarly to cosine similarity, more similar vectors
    will have a larger dot product.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, Euclidean distance measures the straight-line distance between
    two vectors in the embedding space. In this case, **more similar vectors will
    have a smaller Euclidean distance.**
  prefs: []
  type: TYPE_NORMAL
- en: Back to our RAG pipeline, by calculating the similarity scores between the user’s
    query embeddings and the knowledge base embeddings, we can identify the chunks
    of text that are most similar—and therefore contextually relevant—to the user’s
    question, retrieve them, and then use them to generate the answer.
  prefs: []
  type: TYPE_NORMAL
- en: Finding the top k similar chunks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, after getting the embeddings of the knowledge base and the embedding(s)
    for the user query text, this is where the magic happens. What we essentially
    do is that we calculate the cosine similarity between the user query embedding
    and the knowledge base embeddings. Thus, for each text chunk of the knowledge
    base, we get a score between 1 and -1 indicating the chunk’s similarity with the
    user’s query.
  prefs: []
  type: TYPE_NORMAL
- en: Once we have the similarity scores, we sort them in descending order and select
    the top k chunks. These top k chunks are then passed into the generation step
    of the RAG pipeline, allowing it to effectively retrieve relevant information
    for the user’s query.
  prefs: []
  type: TYPE_NORMAL
- en: To speed up this process, the [Approximate Nearest Neighbor (ANN)](https://en.wikipedia.org/wiki/(1%2B%CE%B5)-approximate_nearest_neighbor_search#:~:text=(1%2B%CE%B5)%2Dapproximate%20nearest%20neighbor%20search%20is%20a%20variant,and%20its%20true%20nearest%20neighbor.)
    search is often used. ANN finds vectors that are nearly the most similar, delivering
    results close to the true top-N but at a much faster rate than exact search methods.
    Of course, exact search is more accurate; nonetheless, it is also more computationally
    expensive and may not scale well in real-world applications, especially when dealing
    with massive datasets.
  prefs: []
  type: TYPE_NORMAL
- en: On top of this, a threshold may be applied to the similarity scores to filter
    out chunks that do not meet a minimum relevance score. For example, in some cases,
    a chunk might only be considered if its similarity score exceeds a certain threshold
    (e.g., cosine similarity > 0.3).
  prefs: []
  type: TYPE_NORMAL
- en: So, who is Anna Pávlovna?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the ‘*War and Peace*‘ example, [as demonstrated in my previous post](https://towardsdatascience.com/hitchhikers-guide-to-rag-from-tiny-files-to-tolstoy-with-openais-api-and-langchain/),
    we split the entire text into chunks and then create the respective embeddings
    for each chunk. Then, when the user submits a query, like ‘*Who is Anna Pávlovna*?’,
    we also create the respective embedding(s) for the user’s query text.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'In this script, I use LangChain’s retriever object `retriever = vector_store.as_retriever()`,
    which by default uses the similarity metric of the underlying FAISS index. FAISS
    provides two indices:'
  prefs: []
  type: TYPE_NORMAL
- en: '`IndexFlatL2` utilizes L2 distance. When using LangChain with FAISS (like we
    did), the default index is usually `IndexFlatL2`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`IndexFlatIP`, which uses the dot product (inner product)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Therefore, in the initial script, chunks are retrieved using L2 distance as
    a metric. This script also retrieves by default the k=4 most similar chunks. In
    other words, what we are doing there is that we retrieve the **top k most relevant
    to the user query chunks based on L2 distance.**
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus, in order to use cosine similarity as the retrieval metric instead of
    L2, which was in place by default, we need to tweak our initial code a little
    bit. In particular, we need to normalise the embeddings (both the embeddings of
    the user’s query and the knowledge base), and configure the vector store to use
    the dot product (inner product) as the similarity measure instead of L2 distance.
    In order to normalize the embeddings of the knowledge base, we can add this part
    after the chunking step:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Since we are doing everything manually, we can also omit the `retriever = vector_store.as_retriever()`
    for now. We also need to add the following part to our `main()` function, in order
    to also normalize the user’s query:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Notice how we can explicitly define the number of retrieved chunks k, now set
    as k=2.
  prefs: []
  type: TYPE_NORMAL
- en: 'On top of this, in order to print the cosine similarities, I’m going to also
    add the following part in the `main()` function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Finally, we can again ask and receive an answer:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5671a2aa5118ff66040c34fcc4068f81.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: … but now we are also able to see the text chunks based on which this answer
    is created, and the respective cosine similarity scores…
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f743a4610937b8c546cdbc69353824d4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Apparently, different parameters can result in different answers. For instance,
    we are going to get slightly different answers when retrieving the top k=2, k=4,
    and k=10 results. Taking into consideration the additional parameters that are
    used in the chunking step, like chunk size and chunk overlap, it becomes obvious
    that parameters play a crucial role in getting good results from an RAG pipeline.
  prefs: []
  type: TYPE_NORMAL
