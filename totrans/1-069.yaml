- en: Generative AI Will Redesign Cars, But Not the Way Automakers Think
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/generative-ai-will-redesign-cars-but-not-the-way-automakers-think/](https://towardsdatascience.com/generative-ai-will-redesign-cars-but-not-the-way-automakers-think/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1763584420997" class="mdspan-comment">Last fall, I sat
    in a design review</mdspan> at a major automotive manufacturer, watching engineers
    celebrate what they thought was a breakthrough. They’d used generative AI to optimize
    a suspension component: 40% weight reduction while maintaining structural integrity,
    completed in hours instead of the usual months. The room buzzed with excitement
    about efficiency gains and cost savings.'
  prefs: []
  type: TYPE_NORMAL
- en: 'But something bothered me. We were using technology that could reimagine transportation
    from scratch, and instead, we were making slightly better versions of parts we’ve
    been manufacturing since the 1950s. It felt like using a supercomputer to balance
    your checkbook: technically impressive, but missing the point entirely.'
  prefs: []
  type: TYPE_NORMAL
- en: 'After spending three years helping automotive companies deploy AI solutions,
    I’ve noticed this pattern everywhere. The industry is making a fundamental mistake:
    treating generative AI as an optimization tool when it’s actually a reimagination
    engine. And this misunderstanding might cost traditional automakers their future.'
  prefs: []
  type: TYPE_NORMAL
- en: Why This Matters Now
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The automotive industry stands at an inflection point. Electric vehicles have
    removed the central constraint that shaped car design for a century—the internal
    combustion engine. Yet most manufacturers are still designing EVs as if they need
    to accommodate a big metal block under the hood. They’re using AI to make these
    outdated designs marginally better, while a handful of companies are using the
    same technology to ask whether cars should look like cars at all.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t just about technology; it’s about survival. The companies that figure
    this out will dominate the next era of transportation. Those that don’t will join
    Kodak and Nokia in the museum of disrupted industries.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Optimization Trap: How We Got Here'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What Optimization Looks Like in Practice
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In my consulting work, I see the same deployment pattern at almost every automotive
    manufacturer. A team identifies a component that’s expensive or heavy. They feed
    existing designs into a generative AI system with clear constraints: reduce weight
    by X%, maintain strength requirements, stay within current manufacturing tolerances.
    The AI delivers, everyone celebrates the ROI, and the project gets marked as a
    success.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s actual code from a traditional optimization approach I’ve seen implemented:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'This approach works. It delivers measurable improvements — typically 10-20%
    weight reduction, 15% cost savings, that sort of thing. CFOs love it because the
    ROI is clear and immediate. But look at what we’re doing: we’re optimizing within
    constraints that assume the current design paradigm is correct.'
  prefs: []
  type: TYPE_NORMAL
- en: The Hidden Assumptions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Every optimization embeds assumptions. When you optimize a battery enclosure,
    you’re assuming batteries should be enclosed in separate housings. When you optimize
    a dashboard, you’re assuming vehicles need dashboards. When you optimize a suspension
    component, you’re assuming the suspension architecture itself is correct.
  prefs: []
  type: TYPE_NORMAL
- en: General Motors announced last year they’re using generative AI to redesign vehicle
    components, projecting 50% reduction in development time. Ford is doing similar
    work. So is Volkswagen. These are real improvements that will save millions of
    dollars. I’m not dismissing that value.
  prefs: []
  type: TYPE_NORMAL
- en: 'But here’s what keeps me up at night: while traditional manufacturers are optimizing
    their existing architectures, Chinese EV manufacturers like BYD, which surpassed
    Tesla in global EV sales in 2023, are using the same technology to question whether
    those architectures should exist at all.'
  prefs: []
  type: TYPE_NORMAL
- en: Why Smart People Fall into This Trap
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The optimization trap isn’t about lack of intelligence or vision. It’s about
    organizational incentives. When you’re a public company with quarterly earnings
    calls, you need to show results. Optimization delivers measurable, predictable
    improvements. Reimagination is messy, expensive, and might not work.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve sat in meetings where engineers presented AI-generated designs that could
    reduce manufacturing costs by 30%, only to have them rejected because they’d require
    retooling production lines. The CFO does the math: $500 million to retool for
    a 30% cost reduction that takes five years to pay back, versus $5 million for
    optimization that delivers 15% savings immediately. The optimization wins every
    time.'
  prefs: []
  type: TYPE_NORMAL
- en: This is rational decision-making within existing constraints. It’s also how
    you get disrupted.
  prefs: []
  type: TYPE_NORMAL
- en: What Reimagination Actually Looks Like
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Technical Difference
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let me show you what I mean by reimagination. Here’s a generative design approach
    that explores the full possibility space instead of optimizing within constraints:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: See the difference? The first approach optimizes within a predefined design
    space. The second explores the entire possibility of space, looking for solutions
    humans wouldn’t naturally consider.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key insight: **optimization assumes you know what good looks like. Reimagination
    discovers what good could be.**'
  prefs: []
  type: TYPE_NORMAL
- en: Real-World Examples of Reimagination
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Autodesk demonstrated this with their generative design of a chassis component.
    Instead of asking “how do we make this part lighter,” they asked “what’s the optimal
    structure to handle these load cases?” The result: a design that reduced part
    count from eight pieces to one while cutting weight by 50%.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The design looks alien: organic, almost biological. That’s because it’s not
    constrained by assumptions about how parts should look or how they’ve traditionally
    been manufactured. It emerged purely from physical requirements.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what I mean by “alien”: imagine a car door frame that doesn’t look like
    a rectangle with rounded corners. Instead, it looks like tree branches — organic,
    flowing structures that follow stress lines. In one project I consulted on, this
    approach reduced the door frame weight by 35% while actually improving crash safety
    by 12% compared to traditional stamped steel designs. The engineers were skeptical
    until they ran the crash simulations.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The revealing part: when I show these designs to automotive engineers, the
    most common response is “customers would never accept that.” But they said the
    same thing about Tesla’s minimalist interiors five years ago. Now everyone’s copying
    them. They said it about BMW’s kidney grilles getting larger. They said it about
    touchscreens replacing physical buttons. Customer acceptance follows demonstration,
    not the other way around.'
  prefs: []
  type: TYPE_NORMAL
- en: The Chassis Paradigm
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For a hundred years, we’ve built cars around a fundamental principle: the chassis
    provides structural integrity, the body provides aesthetics and aerodynamics.
    This made perfect sense when you needed a rigid frame to mount a heavy engine
    and transmission.'
  prefs: []
  type: TYPE_NORMAL
- en: But electric vehicles don’t have those constraints. The “engine” is distributed
    electric motors. The “fuel tank” is a flat battery pack that can serve as a structural
    element. Yet most EV manufacturers are still building separate chassis and bodies
    because that’s how we’ve always done it.
  prefs: []
  type: TYPE_NORMAL
- en: When you let generative AI design vehicle structure from scratch without assuming
    chassis/body separation it produces integrated designs where structure, aerodynamics,
    and interior space emerge from the same optimization process. These designs can
    be 30-40% lighter and 25% more aerodynamically efficient than traditional architectures.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve seen these designs in confidential sessions with manufacturers. They’re
    weird. They challenge every assumption about what a car should look like. Some
    look more like aircraft fuselages than car bodies. Others have structural elements
    that flow from the roof to the floor in curves that seem random but are actually
    optimized for specific crash scenarios. And that’s exactly the point they’re not
    constrained by “this is how we’ve always done it.”
  prefs: []
  type: TYPE_NORMAL
- en: The Real Competition Isn’t Who You Think
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Tesla Lesson
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Traditional automakers assumed their competition was other traditional automakers,
    all playing the same optimization game with slightly different strategies. Then
    Tesla showed up and changed the rules.
  prefs: []
  type: TYPE_NORMAL
- en: Tesla’s Giga casting process is a perfect example. They use AI-optimized designs
    to replace 70 separate stamped and welded parts with single aluminum castings.
    This wasn’t possible by asking “how do we optimize our stamping process?” It required
    asking “what if we rethought vehicle assembly entirely?”
  prefs: []
  type: TYPE_NORMAL
- en: 'The results speak for themselves: Tesla achieved profit margins of 16.3% in
    2023, compared to traditional automakers averaging 5-7%. That’s not just better
    execution; it’s a different game.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let me break down what this actually means in practice:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Metric** | **Traditional OEMs** | **Tesla** | **Difference** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Profit Margin | 5-7% | 16.3% | +132% |'
  prefs: []
  type: TYPE_TB
- en: '| Parts per rear underbody | 70+ pieces | 1-2 castings | -97% |'
  prefs: []
  type: TYPE_TB
- en: '| Assembly time | 2-3 hours | 10 minutes | -83% |'
  prefs: []
  type: TYPE_TB
- en: '| Manufacturing CapEx per vehicle | $8,000-10,000 | $3,600 | -64% |'
  prefs: []
  type: TYPE_TB
- en: These aren’t incremental improvements. This is structural advantage.
  prefs: []
  type: TYPE_NORMAL
- en: The China Factor
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Chinese manufacturers are moving even further. NIO’s battery-swapping stations,
    which replace a depleted battery in under three minutes, emerged from asking whether
    vehicle range should be solved through bigger batteries or different infrastructure.
    That’s a reimagination question, not an optimization question.
  prefs: []
  type: TYPE_NORMAL
- en: 'Think about what this actually means: instead of optimizing battery chemistry
    or charging speed the questions every Western manufacturer is asking, NIO asked
    “what if the battery doesn’t need to stay in the car?” This completely sidesteps
    range anxiety, eliminates the need for massive battery packs, and creates a subscription
    revenue model. It’s not a better answer to the old question; it’s a different
    question entirely.'
  prefs: []
  type: TYPE_NORMAL
- en: BYD’s vertical integration — they manufacture everything from semiconductors
    to complete vehicles — allows them to use generative AI across the entire value
    chain rather than just optimizing individual components. When you control the
    full stack, you can ask more fundamental questions about how the pieces fit together.
  prefs: []
  type: TYPE_NORMAL
- en: I’m not saying Chinese manufacturers will necessarily win. But they’re asking
    different questions, and that’s dangerous for companies still optimizing within
    old paradigms.
  prefs: []
  type: TYPE_NORMAL
- en: The Pattern of Disruption
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This is the same pattern we’ve seen in every major industry disruption:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Kodak** had the first digital camera in 1975\. They buried it because it
    would cannibalize film sales and their optimization mindset couldn’t accommodate
    reimagination. They kept optimizing film quality while digital cameras reimagined
    photography entirely.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Nokia** dominated mobile phones by optimizing hardware and manufacturing.
    They had the best build quality, longest battery life, most durable phones. Then
    Apple asked whether phones should be optimized for calling or for computing. Nokia
    kept making better phones; Apple made a computer that could make calls.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Blockbuster** optimized their retail experience: better store layouts, more
    inventory, faster checkout. Netflix asked whether video rental should happen in
    stores at all.'
  prefs: []
  type: TYPE_NORMAL
- en: The technology wasn’t the disruption. The willingness to ask different questions
    was.
  prefs: []
  type: TYPE_NORMAL
- en: 'And here’s the uncomfortable truth: when I talk to automotive executives, most
    can recite these examples. They know the pattern. They just don’t believe it applies
    to them because “cars are different” or “we have physical constraints” or “our
    customers expect certain things.” That’s exactly what Kodak and Nokia said.'
  prefs: []
  type: TYPE_NORMAL
- en: What Actually Needs to Change
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Why “Be More Innovative” Doesn’t Work
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The solution isn’t simply telling automakers to “be more innovative.” I’ve sat
    through enough strategy sessions to know that everyone wants to innovate. The
    problem is structural.
  prefs: []
  type: TYPE_NORMAL
- en: Public companies face quarterly earnings pressure. Ford has $43 billion invested
    in manufacturing facilities globally. You can’t just write that off to try something
    new. Dealer networks expect a steady supply of vehicles that look and function
    like vehicles. Supplier relationships are built around specific components and
    processes. Regulatory frameworks assume cars will have steering wheels, pedals,
    and mirrors.
  prefs: []
  type: TYPE_NORMAL
- en: These aren’t excuses, they’re real constraints that make reimagination genuinely
    difficult. But some changes are possible, even within these constraints.
  prefs: []
  type: TYPE_NORMAL
- en: Practical Steps Forward
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 1\. Create genuinely independent innovation units
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Not “innovation labs” that report to production engineering and get judged by
    production metrics. Separate entities with different success criteria, different
    timelines, and permission to challenge core assumptions. Give them real budgets
    and real autonomy.
  prefs: []
  type: TYPE_NORMAL
- en: Amazon does this with Lab126 (which created Kindle, Echo, Fire). Google did
    it with X (formerly Google X, which developed Waymo, Wing, Loon). These units
    can fail repeatedly because they’re not measured by quarterly production targets.
    That freedom to fail is what enables reimagination.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what this looks like structurally:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Separate P&L:** Not a cost center within production, but its own business
    unit'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Different metrics:** Measured on learning and option value, not immediate
    ROI'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**3–5-year timelines:** Not quarterly or annual goals'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Permission to cannibalize:** Explicitly allowed to threaten existing products'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Different talent:** Researchers and experimenters, not production engineers'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. Partner with generative AI researchers
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Most automotive AI deployments focus on immediate production applications. That’s
    fine, but you also need teams exploring possibility spaces without immediate production
    constraints.
  prefs: []
  type: TYPE_NORMAL
- en: Partners with universities, AI research labs, or create internal research groups
    that aren’t tied to specific product timelines. Let them ask stupid questions
    like “what if cars didn’t have wheels?” Most explorations will lead nowhere. The
    few that lead somewhere will be transformative.
  prefs: []
  type: TYPE_NORMAL
- en: 'Specific actions:'
  prefs: []
  type: TYPE_NORMAL
- en: Fund PhD research at MIT, Stanford, CMU on automotive applications of generative
    AI.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create artist-in-residence programs bringing industrial designers to work with
    AI researchers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sponsor competitions (like DARPA Grand Challenge) for radical vehicle concepts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Publish research openly attracts talent by being where interesting work happens.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3\. Engage customers differently
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Stop asking customers what they want within current paradigms. Of course they’ll
    say they want better range, faster charging, more comfortable seats. Those are
    optimization questions.
  prefs: []
  type: TYPE_NORMAL
- en: Instead, show them what’s possible. Tesla didn’t ask focus groups whether they
    wanted a 17-inch touchscreen replacing all physical controls. They built it, and
    customers discovered they loved it. Sometimes you need to show people the future
    rather than asking them to imagine it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Better approach:'
  prefs: []
  type: TYPE_NORMAL
- en: Build concept vehicles that challenge assumptions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let customers experience radically different designs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Measure reactions to actual prototypes, not descriptions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Focus groups should react to prototypes, not imagine possibilities
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4\. Recognize what game you’re actually playing
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The competition isn’t about who optimizes fastest. It’s about who’s willing
    to question what we’re optimizing for.
  prefs: []
  type: TYPE_NORMAL
- en: A McKinsey study found that 63% of automotive executives believe they’re “advanced”
    in AI adoption, primarily citing optimization use cases. Meanwhile, someone else
    is using the same technology to question whether we need steering wheels, whether
    vehicles should be owned or accessed, whether transportation should be optimized
    for individuals or communities.
  prefs: []
  type: TYPE_NORMAL
- en: Those are reimagination questions. And if you’re not asking them, someone else
    is.
  prefs: []
  type: TYPE_NORMAL
- en: 'Try This Yourself: A Practical Implementation'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Want to experiment with these concepts? Here’s a practical starting point using
    publicly available tools and data.
  prefs: []
  type: TYPE_NORMAL
- en: Dataset and Methodology
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The code examples in this article use synthetic data for demonstration purposes.
    For readers wanting to experiment with actual generative design:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Public datasets you can use:'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Thingi10K**: 10,000 3D models for testing generative algorithms (available
    at [https://ten-thousand-models.appspot.com/](https://ten-thousand-models.appspot.com/))'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ABC Dataset**: 1 million CAD models for geometric deep learning ([https://deep-geometry.github.io/abc-dataset/](https://deep-geometry.github.io/abc-dataset/))'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tools and frameworks:'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**PyTorch** or **TensorFlow** for neural network implementation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Trimesh** for 3D mesh processing in Python'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**OpenFOAM** for CFD simulation (open-source)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**FreeCAD** with Python API for parametric design'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Getting started:'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
