  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们非常欢迎您的反馈，作者们！
- en: Are you an existing TDS author? We invite you to [fill out a 5-minute survey](https://towardsdatascience.typeform.com/Authors-Survey/) so
    we can improve the publishing process for all contributors.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 您是现有的TDS作者吗？我们邀请您填写一份5分钟的调查问卷（[填写问卷](https://towardsdatascience.typeform.com/Authors-Survey/)），以便我们改进所有贡献者的出版流程。
