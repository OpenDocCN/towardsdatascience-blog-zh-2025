- en: Meet Our New Authors
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'We hope you take the time to explore the excellent work from the latest cohort
    of TDS contributors:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望您花时间探索TDS最新一批贡献者的优秀作品：
- en: '[Mohannad Elhamod](https://towardsdatascience.com/author/mohannad-elhamod/) challenges
    the conventional wisdom that more data necessarily leads to better performance,
    and looks into the interplay of sample size, attribute set, and model complexity.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Mohannad Elhamod](https://towardsdatascience.com/author/mohannad-elhamod/)挑战了“更多数据必然导致更好的性能”的常规观点，并探讨了样本大小、属性集和模型复杂度之间的相互作用。'
- en: '[Does More Data Always Yield Better Performance?](https://towardsdatascience.com/does-more-data-always-yield-better-performance/)'
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[更多的数据是否总是带来更好的性能？](https://towardsdatascience.com/does-more-data-always-yield-better-performance/)'
- en: '[Udayan Kanade](https://towardsdatascience.com/author/udayan-kanade/) shared
    an eye-opening exploration of the ties between contemporary LLMs and old-school
    randomized algorithms.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Udayan Kanade](https://towardsdatascience.com/author/udayan-kanade/)分享了对当代LLM和传统随机算法之间联系的开创性探索。'
- en: '[LLMs Are Randomized Algorithms](https://towardsdatascience.com/llms-are-randomized-algorithms/)'
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[大型语言模型是随机算法](https://towardsdatascience.com/llms-are-randomized-algorithms/)'
- en: '[Andrey Chubin](https://towardsdatascience.com/author/andrey-chubin/) leans
    on his AI leadership experience to unpack the common mistakes companies make when
    they attempt to integrate ML into their workflows.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[安德烈·丘宾](https://towardsdatascience.com/author/andrey-chubin/)凭借他在人工智能领导方面的经验，分析了公司在尝试将机器学习整合到其工作流程时常见的错误。'
- en: '[Critical Mistakes Companies Make When Integrating AI/ML into Their Processes](https://towardsdatascience.com/critical-mistakes-companies-make-when-integrating-ai-ml-into-their-processes/)'
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[公司在将人工智能/机器学习整合到其流程中时犯的致命错误](https://towardsdatascience.com/critical-mistakes-companies-make-when-integrating-ai-ml-into-their-processes/)'
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/?utm_source=newsletter&utm_medium=email&utm_campaign=tds%20variable&_hsenc=p2ANqtz--5BsaTIAfELtEKIi7KLPkVPN5RDrsyodSirzQQrzeY-bcsJGUt1_kK37Svh-xVMqcJaT9o)
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢发布新作者的文章，所以如果您最近撰写了一篇关于我们核心主题的有趣项目演练、教程或理论反思，为什么不[与我们分享呢？](https://towardsdatascience.com/questions-96667b06af5/?utm_source=newsletter&utm_medium=email&utm_campaign=tds%20variable&_hsenc=p2ANqtz--5BsaTIAfELtEKIi7KLPkVPN5RDrsyodSirzQQrzeY-bcsJGUt1_kK37Svh-xVMqcJaT9o)
