- en: 'TDS Newsletter: How to Build Robust Data and AI Systems'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: TDS通讯：如何构建稳健的数据和AI系统
- en: 原文：[https://towardsdatascience.com/tds-newsletter-how-to-build-robust-data-and-ai-systems/](https://towardsdatascience.com/tds-newsletter-how-to-build-robust-data-and-ai-systems/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/tds-newsletter-how-to-build-robust-data-and-ai-systems/](https://towardsdatascience.com/tds-newsletter-how-to-build-robust-data-and-ai-systems/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《变量》的新一期，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: 'Many practitioners like to jump headfirst into the nitty-gritty details of
    implementing [AI-powered tools](https://towardsdatascience.com/category/ai-applications/).
    We get it: tinkering your way into a solution can sometimes save you time, and
    it’s often a fun way to go about learning.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 许多从业者喜欢一头扎进[AI工具](https://towardsdatascience.com/category/ai-applications/)实现的细节中。我们理解：通过尝试找到解决方案有时可以节省时间，而且通常是一种有趣的学习方式。
- en: As the articles we’re highlighting this week show, however, it’s crucial to
    gain a high-level understanding of how the different pieces in your workflow come
    together. Sooner or later, when *something *— say, your data pipeline, or your
    team’s most-prized metric — goes awry,  having this mental model in place will
    keep you focused and effective as a data or AI leader.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，正如我们本周重点介绍的文章所显示的，了解您工作流程中不同部分如何结合在一起是至关重要的。迟早，当*某事*——比如您的数据管道或您团队最珍视的指标——出现问题时，拥有这种思维模型将使您作为数据或AI领导者保持专注和有效。
- en: Let’s explore what systemic thinking looks like in practice.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索系统思维在实践中的样子。
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: How to Build an Over-Engineered Retrieval System
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何构建一个过度设计的检索系统
- en: '[Ida Silfverskiöld](https://towardsdatascience.com/author/ilsilfverskiold/)‘s
    new deep dive, which pieces together a detailed retrieval pipeline as part of
    a broader RAG solution, assumes that for most AI engineering challenges, “there’s
    no real blueprint to follow.” Instead, we have to rely on extensive trial and
    error, optimization, and iteration.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '[伊达·西尔弗斯克尔德](https://towardsdatascience.com/author/ilsilfverskiold/)的新深度分析，将详细检索流程作为更广泛的RAG解决方案的一部分，假设对于大多数AI工程挑战，“没有真正的蓝图可以遵循。”相反，我们必须依赖广泛的试验和错误、优化和迭代。'
- en: '[How to Build an Over-Engineered Retrieval System](https://towardsdatascience.com/how-to-build-an-overengineered-retrieval-system/)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何构建一个过度设计的检索系统](https://towardsdatascience.com/how-to-build-an-overengineered-retrieval-system/)'
- en: Data Culture Is the Symptom, Not the Solution
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据文化是症状，而非解决方案
- en: Careful planning, prioritizing, and strategizing doesn’t only benefit specific
    tools or teams. As Jens Linden explains, it’s essential for organizations to thrive
    and for investments in data to pay off.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细规划、优先排序和策略不仅有利于特定的工具或团队。正如延斯·林登解释的那样，这对组织的繁荣和数据的投资回报至关重要。
- en: '[Data Culture Is the Symptom, Not the Solution](https://towardsdatascience.com/data-culture-is-the-symptom-not-the-solution/)'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[数据文化是症状，而非解决方案](https://towardsdatascience.com/data-culture-is-the-symptom-not-the-solution/)'
- en: Building a Monitoring System That Actually Works
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建一个真正有效的监控系统
- en: Follow along Mariya Mansurova’s guide to learn about “different monitoring approaches,
    how to build your first statistical monitoring system, and what challenges you’ll
    likely encounter when deploying it in production.”
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 跟随玛丽亚·曼苏罗娃的指南了解“不同的监控方法、如何构建您的第一个统计监控系统以及在生产中部署时可能会遇到的挑战。”
- en: '[Building a Monitoring System That Actually Works](https://towardsdatascience.com/building-a-monitoring-system-that-actually-works/)'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[构建一个真正有效的监控系统](https://towardsdatascience.com/building-a-monitoring-system-that-actually-works/)'
