- en: Implementing IBCS rules in Power BI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/implementing-ibcs-rules-in-power-bi/](https://towardsdatascience.com/implementing-ibcs-rules-in-power-bi/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/5c5648aefb736ffccf6c35de514fab6d.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Call Me Fred](https://unsplash.com/@callmefred?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash) on [Unsplash](https://unsplash.com/photos/white-standard-led-signage-mounted-on-wall-fJSRg-r7LuI?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When designing reports with Power BI or any other tool, it’s essential to follow
    specific guidelines.
  prefs: []
  type: TYPE_NORMAL
- en: IBCS provides a very valuable ruleset for this purpose.
  prefs: []
  type: TYPE_NORMAL
- en: However, while some rules can be easily implemented using Power BI features,
    others cannot.
  prefs: []
  type: TYPE_NORMAL
- en: There are some custom visuals, such as Zebra BI, which have features to comply
    with all IBCS rules when visualizing data.
  prefs: []
  type: TYPE_NORMAL
- en: Some rules can be implemented with the native feature set of Power BI.
  prefs: []
  type: TYPE_NORMAL
- en: However, when visualizing data, the native feature set of Power BI must be used
    in a particular way to adhere to the IBCS ruleset.
  prefs: []
  type: TYPE_NORMAL
- en: But first, let’s examine the IBCS ruleset.
  prefs: []
  type: TYPE_NORMAL
- en: IBCS Rules
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The IBCS rules consist of 7 rules:'
  prefs: []
  type: TYPE_NORMAL
- en: '**S** (ay) What is your message?'
  prefs: []
  type: TYPE_NORMAL
- en: '**U** (nify) Use a consistent notation'
  prefs: []
  type: TYPE_NORMAL
- en: '**C** (ondense) Enhance information density'
  prefs: []
  type: TYPE_NORMAL
- en: '**C** (heck) Make sure the visualizations follow a common rule (integrity)'
  prefs: []
  type: TYPE_NORMAL
- en: '**E** (xpress) Do not use fancy visuals — Use simple visuals'
  prefs: []
  type: TYPE_NORMAL
- en: '**S** (implify) Remove unnecessary stuff'
  prefs: []
  type: TYPE_NORMAL
- en: '**S** (tructure) Follow a logical structure'
  prefs: []
  type: TYPE_NORMAL
- en: 'In short: SUCCESS.'
  prefs: []
  type: TYPE_NORMAL
- en: 'I have already written an article on this topic. You can get it here: [https://medium.com/cloud-workers/three-simple-rules-for-information-design-52db54864b47](https://medium.com/cloud-workers/three-simple-rules-for-information-design-52db54864b47)'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can visit the IBCS webpage here: [https://www.ibcs.com/ibcs-standards-1-2/](https://www.ibcs.com/ibcs-standards-1-2/).'
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, this is a commercial entity, and you must pay to obtain the complete
    rule set, along with its accompanying documentation.
  prefs: []
  type: TYPE_NORMAL
- en: I will do my best to guide you on following the rules without requiring you
    to know the whole rule set.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dig into the different aspects of the ruleset.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Content of titles
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The titles must describe the content of a report.
  prefs: []
  type: TYPE_NORMAL
- en: Users must be able to understand what they are looking at by reading the title.
  prefs: []
  type: TYPE_NORMAL
- en: 'Therefore, the title(s) must contain the following information:'
  prefs: []
  type: TYPE_NORMAL
- en: Topic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Business unit
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For which business unit are the presented numbers?
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The unit and the scaling
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, EUR, USD, Amount of Units, etc., and if a scaling is applied, for
    instance tEUR, if the numbers are for thousands of Euros (Divided by 1’000).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The time frame and the comparison scenario
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, for the year 2024 and PY or 2025 and FC (Forecast)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: As we work with dynamic content, which changes by the user’s selection in the
    slicers, we must implement dynamic titles.
  prefs: []
  type: TYPE_NORMAL
- en: 'I suggest setting the main title for the topic, the business unit, the subtitle
    for the unit, the scaling, and the time frame:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1875aed8aaff988df845afab5fe98ce9.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1 – Example 1 of a dynamic title and subtitle with the corresponding
    Slicers (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: I omitted adding the scaling to the subtitle, as the slicer to select it is
    directly beneath. This is a common trick to avoid too lengthy titles or subtitles.
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, I’ve added a light grey background to the report. I use this
    to highlight the visuals and the slicers.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can expand the trick for reducing the title length by adding slicers for
    the year and month to the top of the report. In this way, the selected period
    is visible together with the page title, and we can avoid redundancy and complexity
    for the dynamic title:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/78fd26ed9be0cc7cf1795b053dd445b3.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2 – Example 2 of dynamic titles and using slicers near the title to show
    the selected period (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: 1.1. Dynamic Titles
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As described before, it is essential that the users can see what they are looking
    at from the title or subtitle.
  prefs: []
  type: TYPE_NORMAL
- en: We must create dynamic titles with DAX expressions to display the user’s selection
    of the slicers in the title or subtitle.
  prefs: []
  type: TYPE_NORMAL
- en: 'I already wrote an article about this topic: [https://medium.com/microsoft-power-bi/creating-dynamic-texts-based-on-hierarchies-in-power-bi-97ff6cf3517e](https://medium.com/microsoft-power-bi/creating-dynamic-texts-based-on-hierarchies-in-power-bi-97ff6cf3517e)'
  prefs: []
  type: TYPE_NORMAL
- en: There, I described how to handle different scenarios, including creating dynamic
    titles from hierarchies.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Avoid Redundancy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Generally speaking, redundancy is a bad idea.
  prefs: []
  type: TYPE_NORMAL
- en: Why duplicate what you already have?
  prefs: []
  type: TYPE_NORMAL
- en: The only reason is for security or operational reasons.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a good idea to store data in redundant storage. This ensures that if the
    data is damaged in one location, it remains available in another.
  prefs: []
  type: TYPE_NORMAL
- en: But in the realm of reporting, redundancy remains a bad idea.
  prefs: []
  type: TYPE_NORMAL
- en: 'A few ideas:'
  prefs: []
  type: TYPE_NORMAL
- en: If the report’s title is “Sales report”, why would you add “Sales over time”
    in the title of a visual on the same page?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If a line or column chart shows the months’ names on the X-axis, why add the
    sentence “over time” or “per month” to the title?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why keep the axis title visible if the content is understandable without it?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you display sales per location, remove any redundant mentions of location,
    such as in the reports and visual title.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are only a few examples of what can cause redundancy on a report page.
  prefs: []
  type: TYPE_NORMAL
- en: 'My Tip: After completing the design of a report, check it for redundancy. Ask
    the report consumers if they understand what you are showing on the report, after
    removing the redundancy.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Remember: Consumers are intelligent individuals who can figure out what they
    are looking at without lengthy descriptions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at a bad example:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3d52a0599200a16376b0a21a6a298dea.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3 – This is a poor example that contains redundancies. They are marked
    in red. Can you spot more redundancies? (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: You can see that the “Sales” term is repeated three times
  prefs: []
  type: TYPE_NORMAL
- en: In the main title
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the visuals title
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the title of the X axis
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The same applies to the country label.
  prefs: []
  type: TYPE_NORMAL
- en: 'When I remove all the redundancies, it can look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/baadfd2aee1d899fc950f634438eda83.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4 – A cleaner version after removing all the redundancies (Figure by
    the Author)
  prefs: []
  type: TYPE_NORMAL
- en: Now you can see what it looks like after removing the redundancies.
  prefs: []
  type: TYPE_NORMAL
- en: Note that I added “Amount” to the visuals title to ensure that the consumer
    understands that it’s about money. If necessary, add the currency.
  prefs: []
  type: TYPE_NORMAL
- en: I would add “Quantity” if it were about the quantity of sold articles.
  prefs: []
  type: TYPE_NORMAL
- en: By the way, you might have noticed that something is missing from the report
    shown above. Have you seen what?
  prefs: []
  type: TYPE_NORMAL
- en: .
  prefs: []
  type: TYPE_NORMAL
- en: .
  prefs: []
  type: TYPE_NORMAL
- en: .
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t include the title and subtitle as described in the first chapter.
  prefs: []
  type: TYPE_NORMAL
- en: This was because of time constraints. Sorry for that.
  prefs: []
  type: TYPE_NORMAL
- en: 3. What is the message?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A message should be at the center of each report (page).
  prefs: []
  type: TYPE_NORMAL
- en: What could be a message?
  prefs: []
  type: TYPE_NORMAL
- en: The difference in the sales amount versus the previous year
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Or versus the planned amount, like the forecast or any other planning number
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The conversion rate of a region versus the same measure over the entire company
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the end, it’s all about comparing a value with a reference value to give
    meaning to a number.
  prefs: []
  type: TYPE_NORMAL
- en: One of my clients wanted to compare the rate of employee turnover by department
    with the same rate across the entire company.
  prefs: []
  type: TYPE_NORMAL
- en: Each department manager was able to see if he fared better or worse than the
    entire company.
  prefs: []
  type: TYPE_NORMAL
- en: 'Power BI offers two visuals to show this:'
  prefs: []
  type: TYPE_NORMAL
- en: The KPI Visual
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The new card visual (in preview as of the time of writing)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s see what we can do with the new card visual:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7d038eb460ffb0ad9a4adaa16b9ccd32.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5 – Example of a possible usage of the new card with Reference Labels
    and Details (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: I highlighted the two reference and detail values for the comparison with the
    previous year for the product group “Digital Cameras”.
  prefs: []
  type: TYPE_NORMAL
- en: When placed on top of the page, the consumer will immediately see how the two
    sales channels are performing, without needing to view a line chart with too many
    details.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes this is enough information for the sales director or another manager.
  prefs: []
  type: TYPE_NORMAL
- en: We can place detailed charts or tables below these two numbers. The consumer
    can decide whether the information on the chart is interesting or not.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, the Microsoft documentation is not up to date, despite this visual
    having been available for almost two years now and remaining in Preview.
  prefs: []
  type: TYPE_NORMAL
- en: 'Watch this video for a thorough description of the new card:'
  prefs: []
  type: TYPE_NORMAL
- en: 'And this one to see the latest feature additions:'
  prefs: []
  type: TYPE_NORMAL
- en: However, you can still use the classic KPI visual for this purpose.
  prefs: []
  type: TYPE_NORMAL
- en: The point here is not to show how to use this “new” card visual.
  prefs: []
  type: TYPE_NORMAL
- en: The key point now is to prominently display the numbers that matter most to
    your audience in a clear and easy-to-read format.
  prefs: []
  type: TYPE_NORMAL
- en: Think about how you read your news.
  prefs: []
  type: TYPE_NORMAL
- en: You start with the headlines. If you are interested in the details, you will
    continue reading the full article. If not, you go ahead. This is a normal human
    behavior, and we should take it into account when designing our reports.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Coloring columns and bars
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Last but not least, let’s talk about colors.
  prefs: []
  type: TYPE_NORMAL
- en: 'According to IBCS, columns and bars should be colored with the following rules:'
  prefs: []
  type: TYPE_NORMAL
- en: Dark-grey for the current data (Actual year or period)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Light grey for the previous year or the previous period
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Diagonally hatched for forecast data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: White with a black border for plan or budget data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Other colors are used as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Black for text, axes, and lines
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Green for a positive deviation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Blue-green for a positive deviation intended for visually impaired or color-blind
    users
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Red for negative deviation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Middle-Grey for a neutral deviation (When the deviation is neither good nor
    bad)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I used this when the deviation is, let’s say, between -3 % and 3 %
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Blue for highlighting something
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While most of these rules make sense, some others do not.
  prefs: []
  type: TYPE_NORMAL
- en: For example, which color can you use when comparing two categories?
  prefs: []
  type: TYPE_NORMAL
- en: 'For example: this, when comparing the current data from different continents:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1f10d93c21c377ab5a84d84cd05e41ec.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6 – Example with all black bars (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: This way, while it conforms with IBCS, you cannot distinguish between the three
    continents.
  prefs: []
  type: TYPE_NORMAL
- en: 'This can be another way:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8a795f241cbdaa1c61039d7c763ab137.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7 – Example with slightly colored bars (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: This is better, as it allows for a clear distinction between the continents
    while avoiding using overly bright colors.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, look at the following picture, which shows the same visual, but in grayscale:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1f10d93c21c377ab5a84d84cd05e41ec.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8 – Same bar chart in grayscale (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: Even though it’s harder to read, it’s still possible.
  prefs: []
  type: TYPE_NORMAL
- en: This might be something that someone who is visually impaired sees.
  prefs: []
  type: TYPE_NORMAL
- en: When considering all members of your audience, this is an important test to
    conduct to ensure that everyone can read and understand the data.
  prefs: []
  type: TYPE_NORMAL
- en: It will be more challenging when comparing multiple categories.
  prefs: []
  type: TYPE_NORMAL
- en: 'One issue remains: How to display the hatched bars or columns?'
  prefs: []
  type: TYPE_NORMAL
- en: As of today, this is currently not possible in Power BI, and I don’t have a
    solution for this. Talk to your stakeholders to define a viable solution for this.
  prefs: []
  type: TYPE_NORMAL
- en: I would use a grey tone to display forecast data. It’s not standard, but it’s
    a way to draw attention to it.
  prefs: []
  type: TYPE_NORMAL
- en: 'But displaying budget data in the right way is possible:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/68d670e38a7e576c13239e9c0b77ee82.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9 – How to configure a white bar with a black border to display Budget
    data (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, this is very easy to do.
  prefs: []
  type: TYPE_NORMAL
- en: One client uses dark blue as the primary company color. We used this color instead
    of black for the data of the current year.
  prefs: []
  type: TYPE_NORMAL
- en: What is unclear is how to handle the color when the user selects a previous
    year.
  prefs: []
  type: TYPE_NORMAL
- en: The data will no longer display the current results, but instead those of the
    (selected) previous year.
  prefs: []
  type: TYPE_NORMAL
- en: In all cases, we didn’t make a distinction between these cases.
  prefs: []
  type: TYPE_NORMAL
- en: The current year is always the selected year.
  prefs: []
  type: TYPE_NORMAL
- en: This makes sense, as IBCS does not define which color the year before the previous
    year will have.
  prefs: []
  type: TYPE_NORMAL
- en: 'There is one more issue: The coloring rules result in a relatively dull appearance
    of the report. I encountered this several times when implementing these rules.'
  prefs: []
  type: TYPE_NORMAL
- en: Most of the time, we slightly deviate from these rules while avoiding the use
    of too many colors. It’s a fine line between doing it in “the right way” and going
    a step too far with the colors.
  prefs: []
  type: TYPE_NORMAL
- en: The main thing is to define a color standard and stick to it. Ensure that colors
    are used equally for the same scenarios and situations.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: IBSC is a very interesting ruleset.
  prefs: []
  type: TYPE_NORMAL
- en: It can make life easier, as it gives us a guideline on how to design our reports
    and ensure good usability. But Power BI doesn’t have all the features required
    to implement the ruleset fully.
  prefs: []
  type: TYPE_NORMAL
- en: I omitted some other details, which will make life even harder.
  prefs: []
  type: TYPE_NORMAL
- en: There are IBCS-compliant custom visuals, which are extremely helpful as they
    provide an easy way to display deviations without the need to create measures
    for them.
  prefs: []
  type: TYPE_NORMAL
- en: The two leading providers are Zebra BI and xViz with their Inforiver Visuals.
  prefs: []
  type: TYPE_NORMAL
- en: There are other custom visuals, such as those from 3AG, which provide some coverage
    of the standard.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to embark on the road to full IBCS compliance, you can visit their
    website to learn more about them.
  prefs: []
  type: TYPE_NORMAL
- en: My goal here was to demonstrate what you can achieve with Power BI’s out-of-the-box
    features.
  prefs: []
  type: TYPE_NORMAL
- en: I hope that you learned something.
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The IBCS website can be found here: [https://www.ibcs.com/](https://www.ibcs.com/)'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can explore the Zebra BI Visuals here: [https://zebrabi.com/](https://zebrabi.com/)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the website of xViz, with their product suite: [https://inforiver.com/](https://inforiver.com/)'
  prefs: []
  type: TYPE_NORMAL
- en: Like in my previous articles, I use the Contoso sample dataset. You can download
    the ContosoRetailDW Dataset for free from Microsoft [here](https://www.microsoft.com/en-us/download/details.aspx?id=18279).
  prefs: []
  type: TYPE_NORMAL
- en: The Contoso data can be freely used under the MIT License, as described [in
    this document](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo).
    I changed the dataset to shift the data to contemporary dates.
  prefs: []
  type: TYPE_NORMAL
