- en: About the Authors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Vrushali Channapattan** is the Director of Engineering at Okta, where she
    leads Data and AI initiatives with a strong focus on Responsible AI. With over
    20 years of experience, she has shaped large-scale data systems and contributed
    to open source as a Committer for Apache Hadoop. Before Okta, she spent nearly
    a decade at Twitter, helping drive its growth from startup to public company.
    Vrushali earned a Master’s in Computer Systems Engineering from Northeastern University
    and has presented at global conferences. She is a patent holder in AI, identity,
    and distributed systems, and a published author in IEEE journals and industry
    blogs.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Anusha Dwivedula** is the Director of Product for the Analytics group at
    Morningstar. She led the design and rollout of Morningstar’s centralized data
    platform, which unified pipelines, analytics, and observability across the enterprise
    to support AI readiness at scale. Her work bridges cloud infrastructure, data
    governance, and AI product development in high-stakes, regulated environments.
    Anusha has extensive experience leading global teams and complex modernization
    initiatives, focusing on building trusted, explainable, and scalable data systems.
    She is a frequent speaker on topics such as responsible AI, data quality, and
    observability, and has presented at more than 15 high-impact conferences. She
    is also an AI 2030 Global Fellow, participating in high-impact initiatives, co-creating
    global AI frameworks, and championing the adoption of ethical AI in industry and
    policy. Learn more at [https://anushadwivedula.com/](https://anushadwivedula.com/).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stephanie Kirmer** is a staff machine learning engineer'
  prefs: []
  type: TYPE_NORMAL
- en: at DataGrail, a company committed to helping businesses
  prefs: []
  type: TYPE_NORMAL
- en: protect the privacy of customer data and minimize risk. She
  prefs: []
  type: TYPE_NORMAL
- en: has almost a decade of experience building machine learning
  prefs: []
  type: TYPE_NORMAL
- en: solutions in industry, and before going into data science, she
  prefs: []
  type: TYPE_NORMAL
- en: was an adjunct professor of sociology and higher education
  prefs: []
  type: TYPE_NORMAL
- en: administrator at DePaul University. She brings a unique mix
  prefs: []
  type: TYPE_NORMAL
- en: of social science perspective and deep technical and business
  prefs: []
  type: TYPE_NORMAL
- en: experience to writing and speaking accessibly about today’s
  prefs: []
  type: TYPE_NORMAL
- en: challenges around AI and machine learning, and is a regular
  prefs: []
  type: TYPE_NORMAL
- en: contributor at Towards Data Science. Learn more at [www.stephaniekirmer.com](http://www.stephaniekirmer.com).
  prefs: []
  type: TYPE_NORMAL
- en: '**Shane Murray** is the SVP of Digital Platform Analytics at Versant, where
    he leads analytics and research across digital platforms. Previously, he served
    as Field CTO at Monte Carlo, advising data and engineering leaders on building
    reliable, trustworthy data & AI systems, and as SVP of Data & Insights at The
    New York Times, leading cross-functional teams across data science, analytics,
    and platform engineering. For two decades, Shane has worked at the intersection
    of data, technology, and digital products, applying deep expertise in experimentation,
    observability, and machine learning. As a founding member of InvestInData, he
    also supports early-stage startups shaping the future of data and AI infrastructure.'
  prefs: []
  type: TYPE_NORMAL
