- en: Going Beyond Bias-Variance Tradeoff Into Double Descent Phenomenon
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 超越偏差-方差权衡进入双下降现象
- en: 原文：[https://towardsdatascience.com/going-beyond-bias-variance-tradeoff-into-double-descent-phenomenon-4efd2c4f86d3/](https://towardsdatascience.com/going-beyond-bias-variance-tradeoff-into-double-descent-phenomenon-4efd2c4f86d3/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/going-beyond-bias-variance-tradeoff-into-double-descent-phenomenon-4efd2c4f86d3/)'
- en: '![Photo by Jakob Boman on Unsplash](../Images/4349db2e057f2f97554faa809e4a06be.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![图片由 Jakob Boman 在 Unsplash 提供](../Images/4349db2e057f2f97554faa809e4a06be.png)'
- en: Photo by [Jakob Boman](https://unsplash.com/@bomanbo?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/woman-diving-underwater-Td9FnTMHu0A?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Jakob Boman](https://unsplash.com/@bomanbo?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    在 [Unsplash](https://unsplash.com/photos/woman-diving-underwater-Td9FnTMHu0A?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    提供
- en: As far as data scientist interviews go, discussing bias-variance tradeoff is
    one of the most common topics I have encountered, either as the person being interviewed
    in the past and more recently as the person interviewing the candidates or joining
    such interviews. Later in the post, we will discuss what bias-variance tradeoff
    is and why it works differently in deep learning exercises, but let me explain
    why I think this topic keeps coming up in determining the breadth of machine learning
    knowledge of data scientist candidates of both entry and experienced levels.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学家面试中，讨论偏差-方差权衡是我在过去作为被面试者以及最近作为面试候选人和参与此类面试的人时遇到的最常见话题之一。在本文的后续部分，我们将讨论什么是偏差-方差权衡以及为什么它在深度学习练习中工作方式不同，但让我先解释一下为什么我认为这个话题在决定数据科学家候选人（无论是入门级还是经验丰富级）的机器学习知识广度时总是反复出现。
- en: As machine learning scientists, we spend a great amount of time, energy, care
    and computational resources to train great machine learning models but we always
    know that our models will have a level of error as they generalize, which is also
    known as test error. Less experienced data scientists tend to focus on learning
    new modeling methodologies and algorithms, which I do believe is a healthy exercise.
    However, the more experienced data scientists are the ones who have learned over
    time how to better understand and handle the test error that inevitably exists
    in those trained models.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 作为机器学习科学家，我们投入了大量的时间、精力、关注和计算资源来训练优秀的机器学习模型，但我们始终知道，我们的模型在泛化时将会有一定程度的误差，这也就是所说的测试误差。经验较少的数据科学家往往专注于学习新的建模方法和算法，我相信这是一项健康的练习。然而，经验更丰富的数据科学家是那些随着时间的推移学会了如何更好地理解和处理那些训练模型中不可避免存在的测试误差的人。
- en: Bias-variance tradeoff is a fundamental knowledge that will guide us towards
    improving our trained models, by learning from the errors. This is why I borrowed
    the commonly-used saying that "it is not how many times you get knocked down that
    count, it’s how many times you get back up". In this analogy, the inevitable test
    errors are the number of times we get knocked down and how we use that knowledge
    to improve the model is how we get back up. And this is exactly why experienced
    data scientists would like to talk to the interviewees about this classical bias-variance
    tradeoff. They do prefer to work with the scientists who have a plan, after they
    inevitably come across test errors. This answers the question of why we come across
    this question for entry-level scientists. But what do we keep seeing this topic
    in the interviews for experienced scientist roles? That gets us to the double
    descent phenomenon, which is the main topic of this post.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 偏差-方差权衡是一项基本知识，它将指导我们通过学习错误来改进我们的训练模型。这就是为什么我借用了常用的说法：“重要的不是你跌倒了多少次，而是你爬起来了多少次”。在这个类比中，不可避免的测试误差是我们跌倒的次数，而我们如何利用这些知识来改进模型就是我们的爬起来的方式。这正是为什么经验丰富的数据科学家愿意与那些在不可避免地遇到测试误差后仍有计划的面试者交谈。这回答了为什么我们会对入门级科学家提出这个问题。但我们在经验丰富的科学家角色的面试中为什么总是看到这个话题？这带我们来到了双下降现象，这是本文的主要话题。
- en: We will first start by briefly going over the classical bias-variance tradeoff
    to ensure we use the same terminology and then will move to the discussion of
    double descent phenomenon.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先简要回顾经典的偏差-方差权衡，以确保我们使用相同的术语，然后我们将转向对双下降现象的讨论。
- en: Let’s get started!
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: '* * *'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 1\. Establishing Terminology
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 建立术语
- en: 'Before getting to bias-variance tradeoff and double descent, there are a few
    concepts that we need to define first to be consistent for the remainder of the
    post (if you are familiar with these topics, feel free to skip to section 2).
    These are fundamental topics that we expect all our scientists to be familiar
    with. I will be defining them briefly here since most scientists are familiar
    with these concepts but if you are looking for a more detailed introduction, please
    refer to the post below:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在讨论偏差-方差权衡和双下降之前，我们需要先定义一些概念，以确保本文后续内容的连贯性（如果您熟悉这些主题，可以自由跳转到第2节）。这些是所有科学家都应该熟悉的基本主题。我将简要地在这里定义它们，因为大多数科学家都熟悉这些概念，但如果您需要更详细的介绍，请参考以下文章：
- en: '[**Machine Learning Basics I Look for in Data Scientist Interviews**](https://towardsdatascience.com/machine-learning-basics-i-look-for-in-data-scientist-interviews-a6ff25be38c9)'
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**我在数据科学家面试中寻找的机器学习基础知识**](https://towardsdatascience.com/machine-learning-basics-i-look-for-in-data-scientist-interviews-a6ff25be38c9)'
- en: '**Machine Learning Lifecycle:** Each supervised machine learning life cycle
    includes a training process where the model learns the underlying patterns of
    the training data. The error that is measured during training time is called "train
    error". We expect the train error to decrease, the longer we train the model,
    which indicates the model is learning the training data. Then the train model
    is used to make predictions on a test set, which the model has not seen before.
    The predictions are not going to be perfect and therefore there is always expected
    to exist an error when testing a trained model, which is called "test error".
    We measure the "test error" and then use various tools to improve the model and
    therefore lowering the "test error". In other words, the lower the "test error",
    the better the trained model is. We can almost say that the goal of a machine
    learning exercise is to lower the "test error".'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器学习生命周期**：每个监督机器学习生命周期都包括一个训练过程，其中模型学习训练数据的潜在模式。在训练期间测量的误差称为“训练误差”。我们期望随着我们训练模型时间的延长，训练误差会降低，这表明模型正在学习训练数据。然后，训练好的模型用于对测试集进行预测，这是模型之前没有见过的。预测不会是完美的，因此在测试训练好的模型时，总是期望存在一个误差，这被称为“测试误差”。我们测量“测试误差”，然后使用各种工具来改进模型，从而降低“测试误差”。换句话说，测试误差越低，训练好的模型就越好。我们几乎可以说，机器学习练习的目的是降低“测试误差”。'
- en: '**Underfit and Overfit Models:** Models that we train are not going to be perfect.
    When a model is too simple to capture the underlying details of training data,
    it is called an "underfit" model. Usually what we see here is that the model has
    a high train error, since it did not manage to learn the training data well and
    understandably the test error will also be high. "Overfit" models are the other
    side of underfit models. When a model learns too much of the details of the training
    data, such as learning the existing noise in the training data, it is called an
    "overfitted" model. In these cases, we usually see that train error is low, since
    the model learned the training data very well, but the test error is surprisingly
    high, which implies that the model did not generalize well and is not useful for
    making actual predictions. Remember that the goal of the machine learning exercise
    was to lower the test error at the end. In "overfit" scenarios, even though the
    train error is low, the test error is high and therefore that is not a satisfactory
    outcome. Now that we understand test error is the important piece of the puzzle
    and are familiar with overfit and underfit scenarios, let’s dive deeper into components
    of test error.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**欠拟合和过拟合模型**：我们训练的模型不会是完美的。当一个模型过于简单，无法捕捉训练数据的潜在细节时，它被称为“欠拟合”模型。通常在这里我们看到的是模型具有高训练误差，因为它没有很好地学习训练数据，因此测试误差也会很高。“过拟合”模型是欠拟合模型的另一面。当一个模型学习到了训练数据过多的细节，例如学习训练数据中存在的噪声，它被称为“过拟合”模型。在这些情况下，我们通常看到训练误差很低，因为模型已经很好地学习了训练数据，但测试误差却出人意料地高，这表明模型没有很好地泛化，并且对于做出实际预测没有用。记住，机器学习练习的目的是最终降低测试误差。在“过拟合”场景中，尽管训练误差很低，但测试误差很高，因此这不是一个令人满意的结果。现在我们理解了测试误差是谜题中的重要部分，并且熟悉了欠拟合和过拟合的场景，让我们更深入地探讨测试误差的组成部分。'
- en: '**Bias vs. Variance:** Test error can be broken down into two components, which
    are bias and variance. Bias is the error due to over simplistic models so we can
    imagine a high bias is indicative of underfitting. Variance on the other hand
    is the error due to overly-complex models. In other words, high variance indicates
    overfitting. So, here’s the mappping you want to remember – bias is related to
    underfit and variance is related to overfit.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**偏差与方差：**测试误差可以分解为两个组成部分，即偏差和方差。偏差是由于模型过于简单而产生的误差，因此我们可以想象高偏差表明欠拟合。另一方面，方差是由于模型过于复杂而产生的误差。换句话说，高方差表明过拟合。所以，这里是你想要记住的映射——偏差与欠拟合相关，方差与过拟合相关。'
- en: 'Here is a tabular summary of what we discussed above:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是对我们上面讨论内容的表格总结：
- en: '![Table 1 - Underfit and Overfit Characteristics](../Images/ca0a1bcc2b207d50e57474dffc15d8ff.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![表1 - 欠拟合和过拟合特征](../Images/ca0a1bcc2b207d50e57474dffc15d8ff.png)'
- en: Table 1 – Underfit and Overfit Characteristics
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 表1 – 欠拟合和过拟合特征
- en: Now that we are familiar with the terminology, let’s define bias-variance tradeoff
    and then we can move on to the double descent side of it.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经熟悉了这些术语，让我们定义偏差-方差权衡，然后我们可以继续讨论其双下降方面。
- en: '* * *'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Bias-Variance Tradeoff
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 偏差-方差权衡
- en: As we discussed in the previous section, the goal of a machine learning algorithm
    is to learn from the training data and then generalize its learning at test time.
    In other words, using a finite amount of training data, the model learns to make
    predictions for the data that the model has not encountered before (i.e. unseen
    data). If we define "error" as the distance between what the model is expected
    to predict and what the model actually predicts, then we can think of the training
    process as follows. During the training process, the model’s objective is to minimize
    the "training" error (i.e. the model learns to make accurate predictions for the
    training data) and the main goal of the machine learning model is to make the
    most accurate predictions possible when we use it or minimize the "test" error
    (i.e. what the model predicts during test time is as close as possible to actual
    outcomes). As we discussed in the previous section, test error includes two components
    called bias and variance and the trade-off between the two is the topic of discussion
    in this section.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，机器学习算法的目标是从训练数据中学习，然后在测试时泛化其学习。换句话说，使用有限量的训练数据，模型学习对模型之前未遇到的数据（即未见数据）进行预测。如果我们把"误差"定义为模型预期预测值与实际预测值之间的距离，那么我们可以把训练过程想象成这样。在训练过程中，模型的目标是最小化"训练"误差（即模型学习对训练数据进行准确预测），机器学习模型的主要目标是当我们使用它时尽可能做出最准确的预测，或者最小化"测试"误差（即模型在测试时预测的结果尽可能接近实际结果）。如前所述，测试误差包括两个称为偏差和方差的组成部分，这两个部分之间的权衡是本节讨论的主题。
- en: In classical machine learning, it has been empirically observed that with an
    increase in model complexity, the "training" error decreases, since the model
    fits the training data better and better with training. On the other hand, as
    the complexity increases, the "test" error initially decreases but eventually
    "test" error starts increasing, due to overfitting.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在经典机器学习中，通过经验观察，随着模型复杂性的增加，"训练"误差会降低，因为模型在训练过程中更好地拟合训练数据。另一方面，随着复杂性的增加，"测试"误差最初会降低，但最终由于过拟合，"测试"误差开始增加。
- en: Best way to demonstrate this is to look at a plot to visualize the components
    of "test" error. Lets create some synthetic data in the shape of bias-variance
    tradeoff and then we can discuss further. For the purposes of this post, you do
    not need to understand the code below, since that is not the point here but I
    decided to include it as a fun exercise to see.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的演示方式是查看一个图表来可视化"测试"误差的组成部分。让我们创建一些具有偏差-方差权衡形状的合成数据，然后我们可以进一步讨论。为了本文的目的，你不需要理解下面的代码，因为这里不是重点，但我决定将其包括在内，作为一个有趣的练习来观察。
- en: '[PRE0]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Results:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: '![Figure 1 - Bias-Variance Tradeoff](../Images/08b0d32cb2d1a63e2590bc46614ae540.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图1 - 偏差-方差权衡](../Images/08b0d32cb2d1a63e2590bc46614ae540.png)'
- en: Figure 1 – Bias-Variance Tradeoff
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图1 – 偏差-方差权衡
- en: The plot above is what you would usually see in ML courses teaching the bias-variance
    tradeoff. We can see in the plot that as we explained earlier, the bias (blue
    line) starts quite high at the top left corner for a simplistic model and as the
    model complexity in the x-axis increases, the bias (blue line) decreases and the
    variance (red line) increases. The black line is the test error, which is the
    summation of bias and variance. Remember that what we really care about is the
    "test error" or the black line. The term "tradeoff" refers to the fact that as
    we can see, the overall test error (black line) starts at high in the top left
    corner, then it improves as model complexity increases up to an optimal point
    and then it starts to go up again. Since the goal of a machine learning exercise
    is to find the lowest point of test error, then we want to find that sweet spot,
    which implies a tradeoff between bias and variance.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的图表是你在机器学习课程中通常看到的，用于教授偏差-方差权衡。我们可以从图中看到，正如我们之前解释的，偏差（蓝色线）在左上角一个简单模型中开始相当高，随着x轴上模型复杂度的增加，偏差（蓝色线）减少，方差（红色线）增加。黑色线是测试误差，它是偏差和方差的和。记住，我们真正关心的是“测试误差”或黑色线。术语“权衡”指的是，正如我们所见，整体测试误差（黑色线）在左上角开始较高，然后随着模型复杂度的增加直到一个最佳点而改善，然后又开始上升。由于机器学习练习的目标是找到测试误差的最低点，因此我们想要找到那个甜蜜点，这意味着偏差和方差之间的权衡。
- en: In reality, you would not see such clean plots of bias vs. variance to pick
    the optimal point. Therefore, I decided to include a more realistic example of
    what the plot would look like in practice. In the code block below, we use polynomial
    linear regression models for training and increase complexity by increasing the
    polynomial degree. Then we measure the errors and plot them. I have added comments
    to make it easier to follow the code.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实中，你不会看到如此干净的偏差与方差对比图来选择最佳点。因此，我决定包括一个更现实的例子，说明实际中图表可能的样子。在下面的代码块中，我们使用多项式线性回归模型进行训练，并通过增加多项式度数来增加复杂度。然后我们测量误差并将它们绘制出来。我添加了注释，以便更容易理解代码。
- en: '[PRE1]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Results:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: '![Figure 2 - Error vs. Model Complexity](../Images/1f32bf3ec81f4b53a378fde6202e71cf.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图2 - 误差与模型复杂度](../Images/1f32bf3ec81f4b53a378fde6202e71cf.png)'
- en: Figure 2 – Error vs. Model Complexity
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图2 – 误差与模型复杂度
- en: As we can see in the plot, the x-axis depicts model complexity, as measured
    by the polynomial degree of the linear regression model used for training and
    the y-axis depicts the error. Note that we cannot directly measure each of bias
    and variance and instead we depict train and test error to see the bias-variance
    tradeoff. As the model complexity increases, we see that both train and test set
    decrease in the area where we have identified as the "high bias" in light blue
    shade. Note this is the definition that we had earlier for underfitting and high
    bias area where both test and train errors are high. Then we see an optimal area
    between model complexity of 2 to 4 and then starting with model complexity of
    4, we see the train and test errors start to diverge. Train error continues decreasing
    as the model gets more complex but the test error starts increasing slowly. This
    is the area that is shaded in light red and depicts the definition of overfitting
    or high variance where train error is low but test error is high and therefore
    model does not generalize well. The takeaway from such a exercise is that we would
    pick an optimal level of complexity, such as 3rd degree polynomial regression,
    where both train and test errors are low.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们在图中所见，x轴描述的是模型复杂度，这是通过用于训练的线性回归模型的多项式度数来衡量的，而y轴描述的是误差。请注意，我们无法直接测量偏差和方差中的每一个，而是通过展示训练和测试误差来观察偏差-方差权衡。随着模型复杂度的增加，我们看到训练集和测试集在之前我们标记为“高偏差”的浅蓝色区域面积减小。注意，这正是我们之前对欠拟合和高偏差区域的定义，其中测试和训练误差都较高。然后我们看到在模型复杂度为2到4之间的一个最佳区域，然后从模型复杂度为4开始，我们看到训练和测试误差开始发散。随着模型变得更加复杂，训练误差持续下降，但测试误差开始缓慢上升。这是用浅红色阴影标记的区域，描述了过拟合或高方差的定义，其中训练误差低但测试误差高，因此模型泛化能力不佳。从这个练习中得到的启示是，我们会选择一个最佳复杂度水平，例如三次多项式回归，其中训练和测试误差都较低。
- en: Let’s also look at the fit of some of these models to the actual train and test
    data to visually see how model fits get better as the model increases in complexity,
    up to a certain point. Note that even before going through this exercise, we know
    that 3rd degree polynomial would be the best fit, since we used a third degree
    polynomial formula to generate our synthetic data but still the exercise is valuable
    in demonstrating how the fit improves initially up to a sweet spot and then degrades
    as the model overfits to the training data beyond the third degree polynomial.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们也看看这些模型与实际训练集和测试数据的拟合情况，以直观地看到随着模型复杂度的增加，模型拟合如何变得更好，直到某个点。注意，即使在我们进行这个练习之前，我们也知道三次多项式将是最佳拟合，因为我们使用三次多项式公式生成我们的合成数据，但这个练习仍然很有价值，因为它展示了拟合如何最初在最佳点改善，然后随着模型过度拟合到超过三次多项式的训练数据而退化。
- en: I have added comments to the code below to make it easy to follow but in general
    we first create the same train and test sets used in the previous example and
    then create subplots of varying polynomial degrees to show how the model fits
    (in red line) to the train data (blue dots) and test data (green dots). Finally,
    I have added a table of errors, as measured by mean squared error (MSE), similar
    to the previous example, to quantitatively also observe that the lowest test error
    occurs at the third polynomial degree.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我在下面的代码中添加了注释，以便于理解，但总的来说，我们首先创建与上一个示例中使用的相同的训练集和测试集，然后创建不同多项式度数的子图，以显示模型拟合（红色线条）到训练数据（蓝色点）和测试数据（绿色点）。最后，我添加了一个误差表，类似于上一个示例，以定量地观察到最低的测试误差发生在第三次多项式度数。
- en: Let’s implement the code and then look at the results.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们编写代码并查看结果。
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Results:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: '![Figure 3 - Fit Comparison Across Model Complexity (Polynomial Degree)](../Images/771e15e3fe967294c594707fb07f595b.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图3 – 模型复杂度（多项式度数）下的拟合比较](../Images/771e15e3fe967294c594707fb07f595b.png)'
- en: Figure 3 – Fit Comparison Across Model Complexity (Polynomial Degree)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图3 – 模型复杂度（多项式度数）下的拟合比较
- en: '![Table 2 - Mean Squared Error of Train and Test Sets Across Model Complexity
    (Polynomial Degree)](../Images/f8887173a4862efbe4fdcd0586fac2f9.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![表2 - 模型复杂度（多项式度数）下训练集和测试集的平均平方误差](../Images/f8887173a4862efbe4fdcd0586fac2f9.png)'
- en: Table 2 – Mean Squared Error of Train and Test Sets Across Model Complexity
    (Polynomial Degree)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 表2 – 模型复杂度（多项式度数）下训练集和测试集的平均平方误差
- en: As we can see in the subplots, starting from the third degree polynomial, there
    is a relatively good fit between the scatterplot of train/test sets and the model
    in the red line. Looking more closely at the MSE table after the subplots, we
    can see how the test error decreases up to the third degree polynomial and then
    as we expected to see, it starts increasing beyond that point, implying that the
    sweet spot for the bias-variance tradeoff is the third degree polynomial.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们在子图中所见，从三次多项式开始，训练/测试集的散点图与红色线条中的模型之间有相对良好的拟合。更仔细地查看子图之后的MSE表，我们可以看到测试误差如何降低到第三次多项式，然后正如我们所预期的，它开始增加，这意味着偏差-方差权衡的最佳点是三次多项式。
- en: At this point, you may be wondering what happened to the whole idea of "getting
    back up" again, when we face errors in our training and this exercise was a good
    example of that. What we want to realize is that if we train a model where train
    error is low but test error is high, it means that the model overfits and therefore,
    one solution is to use a less complicated model. On the flip side, if we see that
    both train and test errors are high, we can conclude that using a more complex
    model may improve the results. Said differently, we want to learn from our error
    and find a way to get up and improve our model performance, which emphasizes importance
    of understanding the bias-variance tradeoff.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你可能想知道当我们面对训练中的错误时，“重新站起来”的整体想法又发生了什么，这个练习就是一个很好的例子。我们想要意识到的是，如果我们训练一个训练误差低但测试误差高的模型，这意味着模型过度拟合，因此，一个解决方案是使用更简单的模型。另一方面，如果我们看到训练和测试误差都很高，我们可以得出结论，使用更复杂的模型可能会改善结果。换句话说，我们想要从我们的错误中学习，找到一种方法来站起来并提高我们的模型性能，这强调了理解偏差-方差权衡的重要性。
- en: So far, we only covered the classical bias-variance tradeoff, which may be encountered
    in the entry level data scientist interviews but what would make this a candidate
    for experienced data scientists’ interviews? That is the double descent phenomenon
    that we will cover next.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们只介绍了经典的偏差-方差权衡，这在初级数据科学家面试中可能会遇到，但什么会使这成为经验丰富的数据科学家面试的候选人？那就是我们接下来要介绍的双下降现象。
- en: '* * *'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Double Descent Phenomenon
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3\. 双下降现象
- en: 'As we explored the bias-variance tradeoff earlier, we observed how model complexity
    can impact generalization of a trained model, as follows:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们之前探讨偏差-方差权衡时观察到的，我们注意到模型复杂性如何影响训练模型的泛化，如下所示：
- en: '**First Descent:** As model complexity increases from small to moderate sizes
    (the area shaded in blue in the previous section’s graph), test error decreases,
    reaching the sweet spot with the lowest amount of test error (the area between
    the blue and red shades in the previous section’s graph).'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**第一次下降：** 当模型复杂性从小到大（如图中蓝色阴影部分）增加时，测试误差降低，达到测试误差最低的甜蜜点（如图中蓝色和红色阴影之间的区域）。'
- en: '**Overfitting Ascent:** As the complexity increases, the test error continues
    to increase (the area shaded in red in the previous graph) until we reach an overfitting
    peak.'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**过拟合上升：** 随着复杂性的增加，测试误差持续增加（如图中红色阴影部分），直到我们达到过拟合的峰值。'
- en: But what will happen if we just ignore this increase in test error and continue
    increasing the complexity even further? That will get us into the "second descent".
    It was empirically observed that for highly complex models used, the test error
    can actually start to decrease again. As a result of this secondary lowering of
    test error, this phenomenon is called the double descent, which is mainly observed
    in highly-complex deep learning models. But what causes this phenomenon? Why did
    we not observe this in traditional ML modeling? And why is this important? What
    is the reason behind this phenomenon? We will explore these important questions
    in the remainder of the post, followed by implementation of an example to visualize
    it.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果我们只是忽略测试误差的增加，继续进一步提高复杂性，会发生什么？这将导致“第二次下降”。实际上观察到，对于使用的非常复杂的模型，测试误差实际上可以开始再次下降。由于这种次级测试误差降低，这种现象被称为双下降，主要在高度复杂的深度学习模型中观察到。但是什么导致了这种现象？为什么我们没有在传统的机器学习建模中观察到这一点？为什么这很重要？这种现象背后的原因是什么？我们将在文章的剩余部分探讨这些重要问题，并随后通过一个示例来实现可视化。
- en: '**Tip:** Given the impact and importance of deep learning in creating large
    language models (and similarly large and complex models), we expect our experienced
    scientists to be familiar with discussions around deep learning. One such topic
    is the double descent phenomenon, which is the main focus of this section.'
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示：**鉴于深度学习在创建大型语言模型（以及类似的大型和复杂模型）中的影响和重要性，我们期望我们的经验科学家熟悉围绕深度学习的讨论。其中一个主题就是双下降现象，这是本节的主要焦点。'
- en: '* * *'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3.1\. Why Did We Not Foresee the Second Descent?
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1\. 为什么我们没有预见第二次下降？
- en: In classical ML modeling, the assumption had been that once a model starts overfitting,
    it will continue doing so if we continue to increase its size and since overfitting
    would result in increased test errors, the path was rarely pursued. In classical
    small-scale scenarios, such as linear regression with limited number of parameters,
    or even in smaller neural networks, it is uncommon to observe a second dip. As
    a result, this assumption was not challenged in classical ML until much more complex
    models started to be used in deep learning. In large-scale deep learning models,
    we deal with extremely high-dimensional parameter spaces and the relationship
    between model complexity, optimization and generalization behaves differently,
    as observed empirically in the second descent. But why would we care about this
    phenomenon? Let’s explore that next.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在经典的机器学习建模中，假设一直是，一旦模型开始过拟合，如果我们继续增加其大小，它将继续这样做，因为过拟合会导致测试误差增加，所以很少会继续追求这条路径。在经典的小规模场景中，例如具有有限参数的线性回归或甚至更小的神经网络，很少观察到第二次下降。因此，在深度学习中开始使用更复杂的模型之前，这种假设在经典的机器学习中并未受到挑战。在大型深度学习模型中，我们处理的是极端高维参数空间，模型复杂性、优化和泛化之间的关系与第二次下降中观察到的不同。但为什么我们会关心这种现象？让我们接下来探讨这一点。
- en: '* * *'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3.2\. Why Is Double Descent Important?
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2\. 为什么双下降现象很重要？
- en: 'The importance of double descent phenomenon can be broken down into three main
    categories:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 双下降现象的重要性可以归纳为三个主要类别：
- en: '**Emergence of New Paradigms.** As we discussed in the previous question, in
    classical ML, we did not even expect to be able to improve our models with increasing
    complexity and as a result, this was a path less explored by practitioners. As
    soon as the double descent phenomenon was observed, these artificial barriers
    were broken and more and more researches started exploring the highly-parameterized
    systems, which resulted in more attention and findings in the space.'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**新范式的出现**。正如我们在前一个问题中所讨论的，在经典机器学习中，我们甚至没有期望能够通过增加复杂性来改进我们的模型，因此，这是实践者较少探索的一条道路。一旦观察到双下降现象，这些人为的障碍就被打破了，越来越多的研究人员开始探索高度参数化的系统，这导致了更多对这个领域的关注和发现。'
- en: '**Neural Network Architecture.** Modern neural network models often come with
    very large number of parameters (e.g. Meta’s Llama 3.1 has up to 405B parameters)
    and achieve high performance levels thanks to such complexity. If we did not know
    about the double descent, we might have stopped at much smaller neural networks
    or have stopped the training process much earlier, to avoid overfitting. Now we
    know that we can increase the model size and training, which can result in better
    performance.'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**神经网络架构**。现代神经网络模型通常具有非常大量的参数（例如，Meta的Llama 3.1高达405B个参数），并且由于这种复杂性而实现了高性能水平。如果我们不了解双下降现象，我们可能会停留在规模较小的神经网络，或者更早地停止训练过程，以避免过拟合。现在我们知道我们可以增加模型大小和训练，这可能会导致更好的性能。'
- en: '**Deep Learning Implications.** Unlike what we thought during the classical
    ML modeling, we are now learning that in deep learning, bigger seems to be better.
    Larger models, such as various GPTs can generalize very well, even beyond the
    area that we used to consider overfitted in the classical sense. This is somehow
    similar to Richard Sutton’s "[Bitter Lessons](http://www.incompleteideas.net/IncIdeas/BitterLesson.html)",
    where he argues that the most significant advancements in artificial intelligence
    (which is primarily due to deep learning architecture) have come from focusing
    on general methods leveraging high computation, rather than focusing on smaller
    hand-crafted features in deep learning.'
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**深度学习的影响**。与我们在经典机器学习建模期间所认为的不同，我们现在了解到在深度学习中，更大的模型似乎更好。更大的模型，如各种GPT，可以很好地泛化，甚至超出了我们以前在经典意义上认为过拟合的领域。这在某种程度上类似于理查德·萨顿的"[苦涩的教训](http://www.incompleteideas.net/IncIdeas/BitterLesson.html)"，他在其中论证说，人工智能（主要归因于深度学习架构）的最重大进步来自于关注利用高计算能力的通用方法，而不是关注深度学习中的较小手工制作的特征。'
- en: Next let’s make an attempt at developing an intuition for the double descent.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们尝试培养对双下降的直觉。
- en: '* * *'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3.3\. Why Does Double Descent Occurs?
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3. 双下降为什么会出现？
- en: 'This is an open research question but here are the primary reasons behind double
    descent:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个开放的研究问题，但以下是双下降背后的主要原因：
- en: '**Over-parameterization:** As the name suggests, it is referring to models
    that have large number of parameters and are hence called "over-parameterization".
    These over-parameterized models can potentially have more parameters than training
    data, which results in multiple solutions fitting the training data. Not all of
    these solutions generalize as well as the others and at this point, optimization
    algorithms, such as gradient descent, guide us towards the solutions that are
    more generalizable. Therefore, although the model is technically "overfitting"
    the training data, but it also generalizes well.'
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**过参数化**：正如其名所示，它指的是具有大量参数的模型，因此被称为“过参数化”。这些过参数化模型可能具有比训练数据更多的参数，这导致多个解决方案适合训练数据。并非所有这些解决方案的泛化能力都与其他解决方案一样好，在这种情况下，优化算法，如梯度下降，引导我们朝着更可泛化的解决方案前进。因此，尽管模型在技术上“过拟合”了训练数据，但它也具有良好的泛化能力。'
- en: '**Data Quality and Size:** These highly-parameterized models are trained on
    large amounts of data, increaseing the presence of noise or mislabeled data points,
    which can contribute to the double descent phoenomonon. In classical models, the
    reason that overfitted models demonstrate high test errors is that the model learns
    the noise in the data, rather than the underlying patterns that is useful for
    generalization. On the other hand, in an over-parameterized setting, the model
    learns to distinguish between actual patterns and noise, which results in a better
    generalization of the model.'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据质量和大小**：这些高度参数化的模型在大量的数据上训练，增加了噪声或错误标记的数据点的存在，这可能导致双下降现象。在经典模型中，过度拟合的模型表现出高测试误差的原因是模型学习了数据中的噪声，而不是对泛化有用的底层模式。另一方面，在过度参数化的设置中，模型学会区分实际模式和噪声，这导致模型有更好的泛化能力。'
- en: '**Feature Learning:** This theory argues that models learn features at different
    scales and paces. Initially, the model may overfit to the fast-learning featurs,
    which is the classical overfitting portion of the learning. But there are also
    featurs that take longer for the model to learn with larger amounts of data –
    these slower-learning features are learned during the second descent, resulting
    in lowering of the test error.'
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**特征学习**：这种理论认为模型在不同的尺度和速度下学习特征。最初，模型可能对快速学习的特征过度拟合，这是学习过程中的经典过度拟合部分。但也有一些特征需要模型用更多的数据花费更长的时间来学习——这些较慢学习的特征是在第二次下降期间学习的，导致测试误差的降低。'
- en: Now that we understand the double descent phenomenon, let’s try to create it
    in an example.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经理解了双下降现象，让我们尝试在一个例子中创建它。
- en: '* * *'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4\. Double Descent Phenomenon – Implementation
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 双下降现象 – 实现
- en: So far we discussed how in classical machine learning, we observed that test
    error initially lower as the complexity of the model increases, reaching a sweet
    spot and then start increasing, which implies entering the overfitted zone. Then
    we talked about how in deep learning scenarios with highly-parameterized models,
    a second lowering of test error has been observed, which is the second descent
    portion of the double descent phenomenon. In this part, we will go through a training
    process and create increasingly complex neural networks to observe how test error
    changes as the complexity increases. I have added comments in the code to make
    it easier to follow.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们讨论了在经典机器学习中，我们观察到随着模型复杂性的增加，测试误差最初降低，达到一个甜点然后开始增加，这表明进入了过度拟合区域。然后我们讨论了在深度学习场景中，具有高度参数化模型的测试误差观察到第二次降低，这是双下降现象的第二下降部分。在这一部分，我们将通过训练过程创建越来越复杂的神经网络，观察测试误差如何随着复杂性的增加而变化。我在代码中添加了注释，以便更容易理解。
- en: '[PRE3]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Results:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: '![Figure 4 - Error Across Complexity Demonstrating Double Descent Phenomenon](../Images/1a03cf526b9befe7ab721fed1cb5a7c0.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图 4 - 复杂度下的误差展示双下降现象](../Images/1a03cf526b9befe7ab721fed1cb5a7c0.png)'
- en: Figure 4 – Error Across Complexity Demonstrating Double Descent Phenomenon
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4 – 复杂度下的误差展示双下降现象
- en: As we can see above, the test error continues decreasing across model complexity
    up to around 300 parameters. Then an increase is observed, which indicates entering
    into overfitting region. While in classical machine learning, we might have stopped
    at this point, now that we expect the second descent, we continue increasing the
    complexity of the underlying neural network model and observe how the test errror
    starts to decrease again beyond the interpolation threshold of 350\. This trend
    continues and would at least theoretically continue as we continue feeding more
    data and computation to the architecture.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，测试误差在模型复杂度达到约 300 个参数时继续降低。然后观察到增加，这表明进入了过度拟合区域。在经典机器学习中，我们可能已经停止在这个点，但现在我们期望第二次下降，我们继续增加底层神经网络模型的复杂性，并观察测试误差如何开始再次降低，超过
    350 的插值阈值。这种趋势会继续，至少从理论上讲，我们会继续向架构中添加更多数据和计算。
