- en: Create Your Supply Chain Analytics Portfolio to Land Your Dream Job
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建你的供应链分析投资组合，以获得你的梦想工作
- en: 原文：[https://towardsdatascience.com/create-your-supply-chain-analytics-portfolio-to-land-your-dream-job/](https://towardsdatascience.com/create-your-supply-chain-analytics-portfolio-to-land-your-dream-job/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/create-your-supply-chain-analytics-portfolio-to-land-your-dream-job/](https://towardsdatascience.com/create-your-supply-chain-analytics-portfolio-to-land-your-dream-job/)
- en: Supply chains are under pressure like never <mdspan datatext="el1743468190048"
    class="mdspan-comment">before</mdspan>.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 供应链的压力前所未有地大。
- en: From climate-driven disruptions to geopolitical shifts, businesses must adapt
    to rising costs, new trade barriers and growing sustainability demands.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 从气候驱动的中断到地缘政治的变动，企业必须适应不断上升的成本、新的贸易壁垒和日益增长的可持续性需求。
- en: In this new world where supply chains face uncertainty, **Supply Chain Analytics
    is essential **to keep **resilient operations**.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个供应链面临不确定性的新世界中，**供应链分析是保持弹性运营的关键**。
- en: Samir, can you advise me on how to build a supply chain analytics portfolio
    with actual projects?
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Samir，你能给我建议如何通过实际项目来构建供应链分析投资组合吗？
- en: Since publishing my first post on Towards Data Science on August 5th, 2020,
    I’ve frequently received this question from readers on [LinkedIn](http://www.linkedin.com/in/samir-saci)
    or [YouTube](https://www.youtube.com/@SupplyScience).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 自从我在2020年8月5日在《Towards Data Science》上发表第一篇文章以来，我经常收到读者在[LinkedIn](http://www.linkedin.com/in/samir-saci)或[YouTube](https://www.youtube.com/@SupplyScience)上的这个问题。
- en: In this article, I’ll share my perspective—after nine years in the industry—on
    how I would use my [Supply Chain Analytics Cheat Sheet](https://bit.ly/supply-chain-cheat)
    to build a portfolio if I were starting out as a junior data scientist.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将分享我的观点——在行业九年的经验之后——如果我是作为一名初级数据科学家开始，我会如何使用我的[供应链分析速查表](https://bit.ly/supply-chain-cheat)来构建一个投资组合。
- en: The Supply Chain Analytics Cheat Sheet
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 供应链分析速查表
- en: What is Supply Chain Analytics?
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是供应链分析？
- en: Let’s start by defining the terms we use.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从定义我们使用的术语开始。
- en: '[Supply Chain Analytics](https://www.youtube.com/watch?v=3d7C4pShykI) refers
    to a set of tools and methodologies used to extract insights from data across
    all processes in the value chain.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '[供应链分析](https://www.youtube.com/watch?v=3d7C4pShykI)指的是一套工具和方法，用于从价值链中所有流程的数据中提取洞察。'
- en: '![](../Images/9d4bf5b065e70458c2c5fce6ba27af25.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9d4bf5b065e70458c2c5fce6ba27af25.png)'
- en: Systems of a Supply Chain — (Image by Samir Saci)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 供应链系统 — (图片由Samir Saci提供)
- en: 'For instance, a retail company may use:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一家零售公司可能会使用：
- en: An ERP to manage procurement, finance and sales
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个ERP系统来管理采购、财务和销售
- en: A [Warehouse Management System](https://www.youtube.com/shorts/MW1QRJs3iuE)
    to manage its distribution centres
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个[仓库管理系统](https://www.youtube.com/shorts/MW1QRJs3iuE)来管理其分销中心
- en: A Transport Management System to manage inbound and outbound freight
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个运输管理系统来管理进出货运
- en: '[![](../Images/2385da67439d3943c03ca4de10f2d7b9.png)](https://medium.com/towards-data-science/what-is-supply-chain-analytics-42f1b2df4a2)'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/2385da67439d3943c03ca4de10f2d7b9.png)](https://medium.com/towards-data-science/what-is-supply-chain-analytics-42f1b2df4a2)'
- en: 4 types of Supply Chain Analytics to Answer Questions — (Image by Author)
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 4种供应链分析类型以回答问题 — (图片由作者提供)
- en: As a Supply Chain Solution Manager and Data Scientist in the logistics industry,
    I have used analytics in international projects to design and optimize supply
    chain solutions.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 作为物流行业的供应链解决方案经理和数据科学家，我已在国际项目中使用分析来设计和优化供应链解决方案。
- en: I’ve shared many of these methodologies and tools in over 75 articles published
    on Towards Data Science.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经在《Towards Data Science》上发表了超过75篇文章，分享了这些方法和工具。
- en: I’ve compiled them into this concise and comprehensive [Supply Chain Analytics
    Cheat Sheet](https://bit.ly/supply-chain-cheat).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我将它们整理成了这份简洁而全面的[供应链分析速查表](https://bit.ly/supply-chain-cheat)。
- en: '[![](../Images/8fb955850381238a1d527ae9c893d551.png)](https://bit.ly/supply-chain-cheat)'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/8fb955850381238a1d527ae9c893d551.png)](https://bit.ly/supply-chain-cheat)'
- en: 'Screenshot of the Supply Chain Analytics Cheat Sheet including 70+ case studies:
    [Link](https://bit.ly/supply-chain-cheat) – (Image by Samir Saci)'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 包含70多个案例研究的供应链分析速查表截图：[链接](https://bit.ly/supply-chain-cheat) – (图片由Samir Saci提供)
- en: What’s Inside the Supply Chain Analytics Cheat Sheet?
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 供应链分析速查表里有什么内容？
- en: Whether you want to reduce distribution costs, minimize your company’s environmental
    impact, or maximize profitability, you’ll find the answers to your questions here.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你想降低分销成本、最小化公司的环境影响，还是最大化盈利能力，你在这里都能找到你问题的答案。
- en: How Can Analytics Help Improve Profitability?
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 分析如何帮助提高盈利能力？
- en: '**Data Analytics to Boost Business Profitability**'
  id: totrans-28
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
  zh: '**数据分析提升商业盈利能力**'
- en: The first section of the [cheat sheet](https://bit.ly/supply-chain-cheat) is
    about **data analytics for Business Strategy.**
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '[速查表](https://bit.ly/supply-chain-cheat)的第一部分是关于**商业战略的数据分析**。'
- en: '[![](../Images/6069a5409b398331e6656d28d777be21.png)](https://bit.ly/supply-chain-cheat)'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/6069a5409b398331e6656d28d777be21.png)](https://bit.ly/supply-chain-cheat)'
- en: Data Analytics for Business Strategy — (Image by Samir Saci)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 商业战略中的数据分析——（图片由萨米尔·萨奇提供）
- en: It includes practical case studies on how to use data to support business executives
    in their strategic decision-making.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括如何使用数据来支持商业高管在他们的战略决策中做出决策的实用案例研究。
- en: For instance, the series of articles, “[Business Planning with Python](https://towardsdatascience.com/business-planning-with-python-inventory-and-cash-flow-management-4f9beb7ecbec/)”,
    is based on a real example of a business managed by my friend.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，系列文章“[用Python进行商业规划](https://towardsdatascience.com/business-planning-with-python-inventory-and-cash-flow-management-4f9beb7ecbec/)”是基于我朋友管理的真实商业案例。
- en: '[![](../Images/08fdb049bbd3144a368b943f1d220fe0.png)](https://medium.com/towards-data-science/business-planning-with-python-inventory-and-cash-flow-management-4f9beb7ecbec)'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/08fdb049bbd3144a368b943f1d220fe0.png)](https://medium.com/towards-data-science/business-planning-with-python-inventory-and-cash-flow-management-4f9beb7ecbec)'
- en: Example used in the Business Planning with Python articles — (Image by Samir Saci)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 商业规划用Python文章中使用的示例——（图片由萨米尔·萨奇提供）
- en: “We have to refuse orders as we don’t have enough cash to pay suppliers for
    stock replenishment.”
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “我们必须拒绝订单，因为我们没有足够的现金来支付供应商的库存补充。”
- en: I built a simulation model based on this insight to help him understand weaknesses
    in his value chain and uncover growth opportunities.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我基于这个洞察力构建了一个模拟模型，帮助他了解其价值链中的弱点，并揭示增长机会。
- en: They illustrate how you can add value to small, medium, and large business owners.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 他们展示了如何为小型、中型和大型企业主增加价值。
- en: What About Optimizing Supply Chain Operations?
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 优化供应链操作怎么样？
- en: Supply Chain Analytics for Logistics Operations
  id: totrans-40
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
  zh: 物流操作供应链分析
- en: Having spent years **designing**, **monitoring**, and **optimizing** supply
    chain solutions, I’ve compiled many case studies focused on warehousing and transportation
    operations.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 经过多年的**设计**、**监控**和**优化**供应链解决方案，我汇编了许多专注于仓储和运输操作的案例研究。
- en: '[![](../Images/d0b5d68a35892db71ff8388037bcdf2f.png)](https://bit.ly/supply-chain-cheat)'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/d0b5d68a35892db71ff8388037bcdf2f.png)](https://bit.ly/supply-chain-cheat)'
- en: Section of Logistics Operations Optimization — (Image by Samir Saci)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 物流操作优化部分——（图片由萨米尔·萨奇提供）
- en: In this section, most case studies are based on an actual reengineering project
    I have conducted in Asia or Europe.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，大多数案例研究都是基于我在亚洲或欧洲进行的实际再造项目。
- en: 'Country Manager: “Samir, we need to reduce warehousing costs by 15% if we want
    to renew the contract with the retail company XXX.”'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 国家经理：“萨米尔，如果我们想与零售公司XXX续签合同，我们需要将仓储成本降低15%。”
- en: They focus on optimizing a specific process in a warehouse (order preparation,
    [value-added services](https://www.youtube.com/shorts/BUVT18F5cJo)) or [transportation
    operations](https://youtu.be/lhDBTlsGDVc?si=alHFyL8r4e_TVJ-3) (routing, scheduling).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 他们专注于优化仓库中特定的流程（订单准备、[增值服务](https://www.youtube.com/shorts/BUVT18F5cJo)）或[运输操作](https://youtu.be/lhDBTlsGDVc?si=alHFyL8r4e_TVJ-3)（路线、调度）。
- en: 'Go to the nearest warehouse and ask: ‘What are your problems?’ You can be sure
    they will find some for you.'
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 前往最近的仓库并询问：“你们有什么问题？”你可以确信他们会为你找到一些。
- en: 'Here’s how to get started:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这是如何开始的：
- en: Review the case studies to understand the problem statement and the solution.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审查案例研究以了解问题陈述和解决方案。
- en: Pull the source code from my GitHub repository.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从我的GitHub仓库中提取源代码。
- en: Search for a similar problem in your company
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在你的公司中搜索类似的问题
- en: Adapt the code to build a solution to your specific problem
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 修改代码以构建解决你特定问题的解决方案
- en: The code is usually a simple Python script or a jupyter notebook that can be
    easily adapted.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 代码通常是一个简单的Python脚本或Jupyter笔记本，可以轻松修改。
- en: What if you want to have a greater impact? Focus on a flow optimization.
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你想产生更大的影响呢？关注流程优化。
- en: Data Analytics for Supply Chain Optimization
  id: totrans-55
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 供应链优化中的数据分析
- en: The main driver of the reengineering projects I have conducted was cost.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我所进行的再造项目的主要驱动因素是成本。
- en: '[![](../Images/446663cb6a52ca31062405bb6f0ae71a.png)](https://bit.ly/supply-chain-cheat)'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/446663cb6a52ca31062405bb6f0ae71a.png)](https://bit.ly/supply-chain-cheat)'
- en: Examples of Business Indicators along the value chain — (Image by Samir Saci)
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 价值链上的业务指标示例——（图片由Samir Saci提供）
- en: Usually, customers tracked logistics costs, i.e. the percentage of turnover
    spent on logistic operations.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，客户跟踪物流成本，即营业额中用于物流运营的百分比。
- en: Therefore, we needed to find solutions (as a third-party logistic service provider)
    to reduce this percentage without impacting our profitability.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们需要找到解决方案（作为第三方物流服务提供商）来降低这个百分比，同时不影响我们的盈利能力。
- en: What if we delivered to the U.S. East Coast from a warehouse in Charlotte?
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果我们从夏洛特的一个仓库向美国东海岸发货怎么办？
- en: The solutions presented in the previous section are too localized. We need to
    take a step back and consider flow optimization.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 上一节中提出的解决方案过于本地化。我们需要退一步考虑流程优化。
- en: '[![](../Images/217f7c7009e567f762a130755389afa2.png)](https://bit.ly/supply-chain-cheat)'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/217f7c7009e567f762a130755389afa2.png)](https://bit.ly/supply-chain-cheat)'
- en: Examples of Supply Chain Optimization — (Image by Author)
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 供应链优化示例——（图片由作者提供）
- en: These case studies focus on the optimization of goods flow using
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这些案例研究侧重于使用以下方法优化商品流
- en: Replenishment rules and forecasting algorithms to optimize inventory
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 补货规则和预测算法以优化库存
- en: Linear/Non-Linear programming to match the supply with demand at the lowest
    cost
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 线性/非线性规划以最低成本匹配供需
- en: Statistical tools for diagnostic and improvement of specific processes
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于特定流程诊断和改进的统计工具
- en: For some case studies, I have deployed the models in a web application developed
    for my startup, [LogiGreen](https://bit.ly/try-logigreen-app).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一些案例研究，我已经在我的初创公司开发的网络应用程序中部署了模型，[LogiGreen](https://bit.ly/try-logigreen-app)。
- en: '[![](../Images/b9230870d9efd99033bcc5632e5a13ab.png)](https://bit.ly/try-logigreen-app)'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/b9230870d9efd99033bcc5632e5a13ab.png)](https://bit.ly/try-logigreen-app)'
- en: '[LogiGreen App publicly available](https://bit.ly/try-logigreen-app) — (Image
    by Samir Saci)'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '[LogiGreen应用程序公开可用](https://bit.ly/try-logigreen-app)——（图片由Samir Saci提供）'
- en: The demo version is publicly available for you to test the models; [more information
    here.](https://bit.ly/try-logigreen-app)
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 演示版本对公众开放，您可以测试这些模型；[更多信息请点击这里。](https://bit.ly/try-logigreen-app)
- en: What about sustainability?
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 那么，可持续性呢？
- en: If you want to support the green transformation of your company, I have some
    examples for you.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想支持您公司的绿色转型，我有一些例子可以给您。
- en: Supply Chain Analytics for Sustainability
  id: totrans-75
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 供应链可持续性分析
- en: Since my first project focused on sustainability, I was convinced that green
    transformation was similar to supply chain optimization.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我的第一个项目专注于可持续性，我确信绿色转型与供应链优化相似。
- en: '![](../Images/e1a0f3f1a0479b678e2fb30790bdd4d9.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e1a0f3f1a0479b678e2fb30790bdd4d9.png)'
- en: Sustainable Supply Chain Optimization — (Image by Samir Saci)
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 可持续供应链优化——（图片由Samir Saci提供）
- en: Therefore, you can find **17 examples of optimization solutions** using this
    approach to minimize CO2 emissions or resource usage.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，您可以通过这种方法找到**17个优化解决方案的示例**，以最小化CO2排放或资源使用。
- en: '[![](../Images/8c72695169207e26c95bcd69d652b9f1.png)](https://bit.ly/supply-chain-cheat)'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/8c72695169207e26c95bcd69d652b9f1.png)](https://bit.ly/supply-chain-cheat)'
- en: Supply Chain Sustainability Section of the Cheat Sheet — (Image by Samir Saci)
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 清单表中的供应链可持续性部分——（图片由Samir Saci提供）
- en: I also decided to cover the reporting side of sustainability with analytics
    for **Life Cycle Assessment**, **CO2 emissions calculations** or **ESG reporting**.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我还决定用生命周期评估、**CO2排放计算**或**ESG报告**的统计分析来覆盖可持续性的报告方面。
- en: If you need support getting started with sustainability projects, you’re covered.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您需要支持开始可持续性项目，您将得到帮助。
- en: Now It’s Your Turn to Build!
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 现在轮到您来构建了！
- en: If you need a more detailed presentation of the cheat sheet, check out this
    short YouTube tutorial.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您需要查看清单表的更详细演示，请查看这个简短的YouTube教程。
- en: In the next section, I’ll share how I would approach building a portfolio if
    I were a junior engineer—or someone transitioning into analytics—looking to land
    a job or freelance project.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我将分享如果我是初级工程师——或者正在过渡到分析领域的人——寻找工作或自由职业项目时，我会如何构建投资组合。
- en: Starting your Analytics Portfolio
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始构建您的分析投资组合
- en: Let’s assume **I’m a junior data scientist** aiming to join a major retailer’s
    supply chain analytics team.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 假设**我是一个初级数据科学家**，希望加入一家主要零售商的供应链分析团队。
- en: I want to start a project to showcase how I can use my skills to help retailers
    improve their service and reduce costs.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我想开始一个项目，展示我如何使用我的技能帮助零售商提高服务并降低成本。
- en: 'Advice 1: Start with a Simple Project'
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建议1：从简单的项目开始
- en: For most companies, data maturity in supply chain departments is very low.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数公司来说，供应链部门的数据成熟度非常低。
- en: That means the implementation of advanced (and complex) algorithms can be very
    challenging.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着实现高级（且复杂）的算法可能非常具有挑战性。
- en: 'Therefore, I would focus on:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我会专注于：
- en: Delivering business value (visibility, insights, diagnostics)
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供业务价值（可见性、见解、诊断）
- en: Smooth user experience of your product or analysis
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品的流畅用户体验或分析
- en: Therefore, I would pick the topic of **ABC Analysis and Product Segmentation.**
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我会选择**ABC分析和产品细分**这个主题。
- en: '![](../Images/5810e03b157ba2f8a62873a484112943.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5810e03b157ba2f8a62873a484112943.png)'
- en: My Article titled Product Segmentation for Retail with Python – (Image by Author)
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我的文章《使用Python进行产品细分》 – (图片由作者提供)
- en: This article provides multiple examples of analysis to segment products based
    on their demand variability and contribution to the turnover.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 本文提供了多个分析示例，根据产品的需求变化和贡献的营业额来细分产品。
- en: '![](../Images/23ba169231abfc3e0fca051641fb0b23.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/23ba169231abfc3e0fca051641fb0b23.png)'
- en: Pareto Chart generated with Python – (Image by Samir Saci)
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Python生成的帕累托图 – (图片由Samir Saci提供)
- en: The article includes a link to a GitHub repository with a Jupyter Notebook containing
    all the necessary code.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 文章包含一个链接到GitHub仓库，其中包含一个包含所有必要代码的Jupyter Notebook。
- en: 'Advice 2: Add Business Value'
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建议2：增加业务价值
- en: My articles always use generic dummy data to feed the algorithms and visuals
    generated.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我的文章总是使用通用的虚拟数据来喂养算法和生成的可视化。
- en: You can enrich this data by adapting it to the industry you’re targeting.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过将其适应你针对的行业来丰富这些数据。
- en: Fashion retailers usually have seasonality and complex master data
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时尚零售商通常有季节性和复杂的主数据
- en: Cosmetics product categories are an essential demand driver that can affect
    the results of your forecast engine
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 美容产品类别是影响你的预测引擎结果的关键需求驱动因素
- en: Before jumping into the code, show that you can take ownership of the case study
    and adapt it to your vision of the problem to solve.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在跳入代码之前，展示你能够掌握这个案例研究并将其适应到你解决问题的愿景中。
- en: 'Advice 3: Code Refactoring and Packaging'
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建议3：代码重构和打包
- en: My GitHub code is mostly in the form of Jupyter Notebook or standalone Python
    scripts.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我的GitHub代码主要是Jupyter Notebook或独立的Python脚本。
- en: This is a great opportunity for our junior data scientist to show that he can
    package the code into an API or even build a web application around it.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们初级数据科学家展示他可以将代码打包成API或围绕它构建Web应用程序的绝佳机会。
- en: Indeed, currently data scientists are expected to ship their models in a form
    ready for productization.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，目前数据科学家被期望以产品化的形式发布他们的模型。
- en: Consider learning about script packaging, Docker containerization, and API development.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑学习脚本打包、Docker容器化和API开发。
- en: 'Advice 4: Improve the UI and add insights'
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建议4：改进UI并添加见解
- en: Remember, your skills will be judged by the impact of the analytics products
    you design and deploy.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，你的技能将通过你设计和部署的分析产品的影響力来评判。
- en: Therefore, do not hesitate to improve the outputs and insights of the models
    shared in my cheat sheet.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，不要犹豫去改进我在我的速查表中共享的模型的结果和见解。
- en: It is an excellent opportunity to ask your colleagues in supply chain operations
    how these tools can support them.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个询问供应链运营同事这些工具如何支持他们的绝佳机会。
- en: What KPIs are they tracking?
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们跟踪哪些关键绩效指标？
- en: What kind of insights do they lack to pilot their operations?
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们缺乏哪些见解来试点他们的运营？
- en: From here, this case study is yours to make your own.
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 从这里开始，这个案例研究就属于你自己来定制了。
- en: If you follow these steps, your portfolio will not be a copy of my GitHub repository
    but a reflection of your skills and how you can impact businesses.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遵循这些步骤，你的投资组合将不会是我的GitHub仓库的副本，而是你技能和如何影响企业的反映。
- en: This is precisely what I did when I built the demo version of the [LogiGreen
    Apps](https://bit.ly/try-logigreen-app).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是我在构建[LogiGreen Apps](https://bit.ly/try-logigreen-app)演示版本时所做的事情。
- en: '![](../Images/611c2d8165394b3dc811b7c5e6b735f1.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/611c2d8165394b3dc811b7c5e6b735f1.png)'
- en: 'Screens of the ABC Analysis Module: [Link](https://bit.ly/try-logigreen-app)
    – (Image by Samir Saci)'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: ABC分析模块的屏幕截图：[链接](https://bit.ly/try-logigreen-app) – (图片由Samir Saci提供)
- en: 'The demo version is publicly available for you to test the models and get inspiration:
    [more information here.](https://bit.ly/try-logigreen-app)'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 演示版本可供你测试模型并获得灵感：[更多信息在这里](https://bit.ly/try-logigreen-app)
- en: I’m looking forward to seeing your version of it!
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我期待看到你的版本！
- en: Conclusion
  id: totrans-127
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: I hope this brief introduction to the [cheat sheet](https://bit.ly/supply-chain-cheat)
    has helped clarify how you can start building your analytics portfolio.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这个关于[速查表](https://bit.ly/supply-chain-cheat)的简要介绍能帮助你明确如何开始构建你的分析组合。
- en: '![](../Images/2a8eaa6420fa83aab594476f852565d6.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2a8eaa6420fa83aab594476f852565d6.png)'
- en: Updates Section of the Analytics Cheat Sheet – (Image by Samir Saci)
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 分析速查表的更新部分 – (图片由萨米尔·萨奇提供)
- en: Do not hesitate to bookmark this cheat sheet as I will update it each time a
    new content is published.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 不要犹豫，将这个速查表加入书签，因为每次发布新内容时我都会更新它。
- en: I want to use this article and the [YouTube video](https://youtu.be/z91QjL2IlrA)
    as a forum to collect your feedback or questions.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我想将这篇文章和[YouTube 视频](https://youtu.be/z91QjL2IlrA)作为一个收集你们反馈或问题的论坛。
- en: Do not hesitate to use the video’s comment section to ask questions!
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 不要犹豫，在视频的评论区提问！
- en: If you have used any case studies for some of your projects, I would be happy
    to learn more about the results.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用了某些项目的案例研究，我很乐意了解更多关于结果的信息。
- en: About Me
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于我
- en: Let’s connect on [Linkedin](https://www.linkedin.com/in/samir-saci/) and [Twitter](https://twitter.com/Samir_Saci_);
    I am a Supply Chain Engineer using data analytics to improve [Logistics](https://towardsdatascience.com/tag/logistics/) operations
    and reduce costs.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在[领英](https://www.linkedin.com/in/samir-saci/)和[Twitter](https://twitter.com/Samir_Saci_)上建立联系；我是一名使用数据分析来改善[物流](https://towardsdatascience.com/tag/logistics/)运营并降低成本的供应链工程师。
- en: For consulting or advice on analytics and sustainable [Supply Chain](https://towardsdatascience.com/tag/supply-chain/) transformation,
    feel free to contact me via [Logigreen Consulting](https://www.logi-green.com/).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 如需咨询或获取关于分析和可持续供应链转型的建议，请通过[Logigreen Consulting](https://www.logi-green.com/)联系我。
