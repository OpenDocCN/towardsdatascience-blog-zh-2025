- en: How to Develop a Bilingual Voice Assistant
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/developing-a-bilingual-voice-assistant/](https://towardsdatascience.com/developing-a-bilingual-voice-assistant/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756488670173" class="mdspan-comment">Google Nest, Alexa</mdspan>,
    and Siri are the ubiquitous voice assistants that serve most of the internet connected
    population today. For the most part, English is the dominant language used with
    these voice assistants. However, for a voice assistant to be truly helpful, it
    must be able to understand the user as they naturally speak. In many parts of
    the world, especially in a diverse country like India, it is common for people
    to be multilingual and to switch between multiple languages in a single conversation.
    A truly smart assistant should be able to handle this.
  prefs: []
  type: TYPE_NORMAL
- en: Google Assistant offers the ability to add a second language; but its functionality
    is limited to certain devices only and offers this only for a limited set of major
    languages. For example, Google’s Nest Hub does not yet support bilingual capabilities
    for Tamil, a language spoken by over 80 million people. Alexa supports bilingual
    approach as long as it is supported in its internal language pair; again this
    only supports a limited set of major languages. Siri does not have bilingual capability
    and allows only one language at a time.
  prefs: []
  type: TYPE_NORMAL
- en: In this article I will discuss the approach taken to enable [***my Voice Assistant***](https://towardsdatascience.com/crafting-a-custom-voice-assistant-with-perplexity) to
    have a bilingual capability with English and Tamil as the languages. Using this
    approach, the voice assistant will be able to automatically detect the language
    a person is speaking by analyzing the audio directly. By using a “confidence score”-based
    algorithm, the system will determine if English or Tamil is spoken and respond
    in the corresponding language.
  prefs: []
  type: TYPE_NORMAL
- en: Approach to Bilingual Capability
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To make the assistant understand both English and Tamil, there are a few potential
    solutions. The first approach would be to train a custom Machine Learning model
    from scratch, specifically on Tamil language data, and then integrate that model
    into the Raspberry Pi. While this would offer a high degree of customization,
    it is an incredibly time-consuming and resource-intensive process. Training a
    model requires a massive dataset and significant computational power. Furthermore,
    running a heavy custom model would likely slow down the Raspberry Pi, leading
    to a poor user experience.
  prefs: []
  type: TYPE_NORMAL
- en: fastText Approach
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A more practical solution is to use an existing, pre-trained model that is already
    optimized for a specific task. For language identification, a great option is fastText.
  prefs: []
  type: TYPE_NORMAL
- en: fastText is an open-source library from Facebook AI Research designed for efficient
    text classification and word representation. It comes with pre-trained models
    that can quickly and accurately identify the language of a given piece of text
    from a large number of languages. Because it is lightweight and highly optimized,
    it is an excellent choice for running on a resource-constrained device like a
    Raspberry Pi without causing significant performance issues. The plan, therefore,
    was to use `fastText` to classify the user’s spoken language.
  prefs: []
  type: TYPE_NORMAL
- en: To use fastText, you download the corresponding model (lid.176.bin) and store
    it in your project folder. Specify this as the MODEL_PATH and load the model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The next step would be to pass the voice commands, as recordings, to the model
    and get the prediction back. This can be achieved through a dedicated function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The code block above follows a simple path. It uses the *recognizer.recognize_google(audio)* function
    to transcribe the voice command and then passes this transcription to the fastText
    model to get a prediction on the language. If the prediction is “__label__en”
    then English has been detected and if prediction is “__label_ta” then Tamil has
    been detected.
  prefs: []
  type: TYPE_NORMAL
- en: This approach led to poor predictions though. The problem is that *speech_recognition* library
    defaults to English. So when I speak something in Tamil, it finds the closest
    (and incorrect) equivalent sounding words in English and passes it to fastText.
  prefs: []
  type: TYPE_NORMAL
- en: For example when I said **“En Peyar enna” (What is my Name in Tamil),** *speech_recognition* understood
    it as *“Empire NA”* and hence fastText predicted the language as English. To overcome
    this, I can hardcode the *speech_recognition* function to detect only Tamil. But
    this would defeat the idea of being truly ‘smart’ and ‘bilingual’. The assistant
    should be able to detect the language based on what is spoken; not based on what
    is hard coded.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9c139ca3476d9967b9e657dcc4e967b9.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Siora Photography](https://unsplash.com/@siora18?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: The ‘Confidence Score’ method
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What we need is a more direct and data-driven method. The solution lies within
    a feature of the speech_recognition library. The ***recognizer.recognize_google()*** function
    is the Google Speech Recognition API and it can transcribe audio from a vast number
    of languages, including both English and Tamil. A key feature of this API is that
    for every transcription it provides, it can also return a **confidence score** —
    a numerical value between 0 and 1, indicating how certain it is that its transcription
    is correct.
  prefs: []
  type: TYPE_NORMAL
- en: This feature allows for a much more elegant and dynamic approach to language
    identification. Let’s take a look at the code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The logic in this code block is simple. We pass the audio to the *recognize_google() *function
    and get the whole list of alternatives and its scores. First we try the language
    as Tamil and get the corresponding confidence score. Then we try the same audio
    as English and get the corresponding confidence score from the API. Once we have
    both, we then compare the confidence scores and choose the one with the higher
    score as the language detected by the system.
  prefs: []
  type: TYPE_NORMAL
- en: Below is the output of the function when I speak in English and when I speak
    in Tamil.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5b04e4abee2059022b1639c86b8bf687.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot from Visual Studio output (Tamil). Image owned by author.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a8eb991822208e22d4c1eb0c4f028ebe.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot from Visual Studio output (English). Image owned by author.
  prefs: []
  type: TYPE_NORMAL
- en: The results above show how the code is able to understand the language spoken
    dynamically, based on the confidence score.
  prefs: []
  type: TYPE_NORMAL
- en: Putting it all together — The Bilingual Assistant
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The final step would be to integrate this approach into the code for the Raspberry
    Pi based Voice assistant. The full code can be found in my [GitHub](https://github.com/dpakapd/smart_bilingual_assistant).
    Once integrated the next step would be to test the functioning of the Voice Assistant
    by speaking in English and Tamil and seeing how it responds for each language.
    The recordings below demonstrate the working of the Bilingual Voice Assistant
    when asked a question in English and in Tamil.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, we have seen how to successfully upgrade a simple voice assistant
    into a truly bilingual tool. By implementing a “confidence score” algorithm, the
    system can be made to determine whether a command is spoken in English or Tamil,
    allowing it to understand and reply in the user’s chosen language for that specific
    query. This creates a more natural and seamless conversational experience.
  prefs: []
  type: TYPE_NORMAL
- en: The key advantage of this method is its reliability and scalability. While this
    project focused on just two languages, the same confidence score logic could easily
    be extended to support three, four, or more by simply adding an API call for each
    new language and comparing all the results. The techniques explored here serve
    as a robust foundation for creating more advanced and intuitive personal AI tools.
  prefs: []
  type: TYPE_NORMAL
- en: 'Reference:'
  prefs: []
  type: TYPE_NORMAL
