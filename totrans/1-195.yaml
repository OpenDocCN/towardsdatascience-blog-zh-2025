- en: Prompt Engineering for Time-Series Analysis with Large Language Models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/prompt-engineering-for-time-series-analysis-with-large-language-models/](https://towardsdatascience.com/prompt-engineering-for-time-series-analysis-with-large-language-models/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1760556011037" class="mdspan-comment">Working with **time-series**</mdspan>
    data is often different from regular analysis, mainly because of **challenges**
    regarding the time-dependency that every data scientist eventually runs into.
  prefs: []
  type: TYPE_NORMAL
- en: What if you could speed up and improve your analysis with just the **right prompt**?
  prefs: []
  type: TYPE_NORMAL
- en: Large Language Models (**LLMs**) are already a game-changer for time-series
    analysis. If you combine LLMs with **smart** prompt engineering, they can open
    doors to methods most analysts haven’t tried yet.
  prefs: []
  type: TYPE_NORMAL
- en: They are great at spotting patterns, detecting anomalies, and making forecasts.
  prefs: []
  type: TYPE_NORMAL
- en: This guide puts together proven **strategies** that go from simple data preparation
    all the way to advanced model validation. By the end, you’ll have practical tools
    that put you a **step ahead**.
  prefs: []
  type: TYPE_NORMAL
- en: Everything here is backed by **research** and real-world examples, so you’ll
    walk away with practical tools, not just theory!
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the first article in a two-part series exploring how **prompt engineering**
    can boost your time-series analysis:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Part 1: **Prompts for Core Strategies in Time-Series (this article)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Part 2:** [Prompts for Advanced Model Development](https://towardsdatascience.com/llm-powered-time-series-analysis/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 👉 All the **prompts **in this article are available at the** end** of this article
    as a cheat sheet 😉
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article:'
  prefs: []
  type: TYPE_NORMAL
- en: Core Prompt Engineering Strategies for Time-Series
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Prompts for Time-Series Preprocessing and Analysis
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Anomaly Detection with LLMs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Feature Engineering for Time-Dependent Data
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Prompt Engineering **cheat sheet**!
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Core Prompt Engineering Strategies for Time-Series
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1.1 Patch-Based Prompting for Forecasting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Patch Instruct Framework**'
  prefs: []
  type: TYPE_NORMAL
- en: A good trick is to break a time series into overlapping “patches” and feed those
    patches to an LLM using structured prompts. This approach called *PatchInstruct*
    is very effective and it keeps accuracy about the same.
  prefs: []
  type: TYPE_NORMAL
- en: '**Example Implementation:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Why it works:**'
  prefs: []
  type: TYPE_NORMAL
- en: The LLM will notice short-term temporal patterns in the data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Uses fewer tokens than raw data dumps (so, less cost).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keeps things interpretable because you can rebuild the patches later.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 1.2 Zero-Shot Prompting with Contextual Instructions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s imagine you need a quick baseline **forecast.**
  prefs: []
  type: TYPE_NORMAL
- en: '**Zero-shot** prompting with **context** works for this. You just give the
    model a clear description of the dataset, frequency, and forecast horizon, and
    it can identify patterns without any extra training!'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 1.3 Neighbor-Augmented Prompting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Sometimes, one time series isn’t enough. we can add “neighbor” series that
    are similar and then the LLM is able spot common structures and improve predictions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Prompts for Time-Series Preprocessing and Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 2.1 Stationarity Testing and Transformation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the first things data scientists must do before modeling time-series
    data is to check whether the series is **stationary.**
  prefs: []
  type: TYPE_NORMAL
- en: If it’s not, they need to apply transformations like differencing, log, or Box-Cox.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt to Test for Stationary and Apply Transformations**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Autocorrelation and Lag Feature Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Autocorrelation** in time series measures how strongly current values are
    **correlated** with their own past values at different lags.'
  prefs: []
  type: TYPE_NORMAL
- en: With the right plots (**ACF/PACF**), you can observe lags that matter most and
    build features around them.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt for Autocorrelation**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 2.3 Seasonal Decomposition and Trend Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Decomposition helps you see the story behind the data and it helps seeing it
    in different **layers**: trend, seasonality, and residuals.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt for Seasonal Decomposition**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Anomaly Detection with LLMs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 3.1 Direct Prompting for Anomaly Detection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Anomaly detection in time-series is usually not a fun task and requires a lot
    of time.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs can act like a vigilant analyst, spotting outsider values in your data.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt for Anomaly Detection**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 Forecasting-Based Anomaly Detection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Instead of looking at anomalies directly, another smart strategy is to forecast
    what “should” happen first, and then measure where reality drifts away from those
    expectations.
  prefs: []
  type: TYPE_NORMAL
- en: Those deviations can highlight **anomalies** that wouldn’t stand out in another
    way.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a ready-to-use prompt you can try:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Feature Engineering for Time-Dependent Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Smart features can make or break your model.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are just too many **options**: lags to rolling windows, cyclical features,
    and external variable. There’s a lot you can add to capture time dependencies.'
  prefs: []
  type: TYPE_NORMAL
- en: 4.1 Automated Feature Creation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The real magic happens once you engineer meaningful **features** that capture
    **trends**, **seasonality**, and **temporal dynamics**. LLMs can actually help
    automate this process by generating a wide range of useful features for you.
  prefs: []
  type: TYPE_NORMAL
- en: '**Comprehensive Feature Engineering Prompt:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 4.2 External Variable Integration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It can happen that the target series is not enough to explain the full story.
  prefs: []
  type: TYPE_NORMAL
- en: There are **external factors** that often influence our data, like weather,
    economic indicators, or special events. They can add context and improve forecasts.
  prefs: []
  type: TYPE_NORMAL
- en: The trick is knowing how to integrate them properly without breaking temporal
    rules. Here’s a prompt to incorporate exogenous variables into your analysis.
  prefs: []
  type: TYPE_NORMAL
- en: '**Exogenous Variable Prompt:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I hope this guide has given you a lot to digest and try.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a toolbox full of researched techniques for using LLMs in time-series analysis.
  prefs: []
  type: TYPE_NORMAL
- en: '**Success** in time-series data comes when we respect the quirks of temporal
    data, craft prompts that highlight those quirks, and validate everything with
    the right evaluation methods.'
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading! Stay tuned for Part 2 😉
