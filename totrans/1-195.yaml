- en: 1\. Core Prompt Engineering Strategies for Time-Series
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 核心时间序列提示工程策略
- en: 1.1 Patch-Based Prompting for Forecasting
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1 基于补丁的提示进行预测
- en: '**Patch Instruct Framework**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**Patch Instruct框架**'
- en: A good trick is to break a time series into overlapping “patches” and feed those
    patches to an LLM using structured prompts. This approach called *PatchInstruct*
    is very effective and it keeps accuracy about the same.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好方法是将时间序列分解成重叠的“补丁”，并使用结构化提示将这些补丁输入LLM。这种方法称为*PatchInstruct*，非常有效，并且保持了大约相同的准确性。
- en: '**Example Implementation:**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例实现：**'
- en: '[PRE0]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Why it works:**'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它有效：**'
- en: The LLM will notice short-term temporal patterns in the data.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM会注意到数据中的短期时间模式。
- en: Uses fewer tokens than raw data dumps (so, less cost).
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用比原始数据转储更少的标记（因此，成本更低）。
- en: Keeps things interpretable because you can rebuild the patches later.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持可解释性，因为你可以稍后重建补丁。
- en: '* * *'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 1.2 Zero-Shot Prompting with Contextual Instructions
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.2 基于上下文的零样本提示
- en: Let’s imagine you need a quick baseline **forecast.**
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象你需要一个快速的**基线预测**。
- en: '**Zero-shot** prompting with **context** works for this. You just give the
    model a clear description of the dataset, frequency, and forecast horizon, and
    it can identify patterns without any extra training!'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**零样本**提示与**上下文**相结合适用于此。你只需向模型提供一个关于数据集、频率和预测范围的清晰描述，它就可以在没有额外训练的情况下识别模式！'
- en: '[PRE1]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 1.3 Neighbor-Augmented Prompting
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.3 邻域增强提示
- en: 'Sometimes, one time series isn’t enough. we can add “neighbor” series that
    are similar and then the LLM is able spot common structures and improve predictions:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，一个时间序列不足以满足需求。我们可以添加“邻近”的相似时间序列，然后LLM能够发现共同的结构并提高预测的准确性：
- en: '[PRE2]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '* * *'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Prompts for Time-Series Preprocessing and Analysis
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 时间序列预处理和分析提示
- en: 2.1 Stationarity Testing and Transformation
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1 稳定性测试和转换
- en: One of the first things data scientists must do before modeling time-series
    data is to check whether the series is **stationary.**
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家在建模时间序列数据之前必须做的第一件事是检查序列是否**平稳**。
- en: If it’s not, they need to apply transformations like differencing, log, or Box-Cox.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不是，他们需要应用如差分、对数或Box-Cox等转换。
- en: '**Prompt to Test for Stationary and Apply Transformations**'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**测试平稳性和应用转换的提示**'
- en: '[PRE3]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '* * *'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2.2 Autocorrelation and Lag Feature Analysis
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2 自相关和滞后特征分析
- en: '**Autocorrelation** in time series measures how strongly current values are
    **correlated** with their own past values at different lags.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 时间序列中的**自相关**衡量当前值在不同滞后下与其自身过去值的关联强度。
- en: With the right plots (**ACF/PACF**), you can observe lags that matter most and
    build features around them.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 通过合适的图表（**ACF/PACF**），你可以观察到最重要的滞后，并围绕它们构建特征。
- en: '**Prompt for Autocorrelation**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**自相关提示**'
- en: '[PRE4]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '* * *'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2.3 Seasonal Decomposition and Trend Analysis
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3 季节分解和趋势分析
- en: 'Decomposition helps you see the story behind the data and it helps seeing it
    in different **layers**: trend, seasonality, and residuals.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 分解帮助你看到数据背后的故事，并帮助你在不同的**层**（趋势、季节性和残差）中看到它。
- en: '**Prompt for Seasonal Decomposition**'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**季节分解提示**'
- en: '[PRE5]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '* * *'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Anomaly Detection with LLMs
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 使用LLMs进行异常检测
- en: 3.1 Direct Prompting for Anomaly Detection
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1 直接提示进行异常检测
- en: Anomaly detection in time-series is usually not a fun task and requires a lot
    of time.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 时间序列中的异常检测通常不是一个有趣的任务，并且需要很多时间。
- en: LLMs can act like a vigilant analyst, spotting outsider values in your data.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs可以像一位警觉的分析师一样，在你的数据中识别出外部值。
- en: '**Prompt for Anomaly Detection**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**异常检测提示**'
- en: '[PRE6]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '* * *'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3.2 Forecasting-Based Anomaly Detection
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2 基于预测的异常检测
- en: Instead of looking at anomalies directly, another smart strategy is to forecast
    what “should” happen first, and then measure where reality drifts away from those
    expectations.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是直接查看异常，另一种聪明的策略是首先预测“应该”发生什么，然后衡量现实与这些期望之间的偏差。
- en: Those deviations can highlight **anomalies** that wouldn’t stand out in another
    way.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这些偏差可以突出那些在其他方式下不会显眼的**异常**。
- en: 'Here’s a ready-to-use prompt you can try:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个现成的提示你可以尝试使用：
- en: '[PRE7]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '* * *'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4\. Feature Engineering for Time-Dependent Data
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 时间依赖数据的特征工程
- en: Smart features can make or break your model.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 智能特征可以成就或毁掉你的模型。
- en: 'There are just too many **options**: lags to rolling windows, cyclical features,
    and external variable. There’s a lot you can add to capture time dependencies.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 选项实在太多了：滞后到滚动窗口、周期性特征和外部变量。你可以添加很多内容来捕捉时间依赖性。
- en: 4.1 Automated Feature Creation
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1 自动特征创建
- en: The real magic happens once you engineer meaningful **features** that capture
    **trends**, **seasonality**, and **temporal dynamics**. LLMs can actually help
    automate this process by generating a wide range of useful features for you.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的魔法发生在你工程化有意义**特征**来捕捉**趋势**、**季节性**和**时间动态**的时候。LLMs实际上可以通过为你生成一系列有用的特征来自动化这个过程。
- en: '**Comprehensive Feature Engineering Prompt:**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**综合特征工程提示：**'
- en: '[PRE8]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 4.2 External Variable Integration
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2 外部变量集成
- en: It can happen that the target series is not enough to explain the full story.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 有可能目标序列不足以解释整个故事。
- en: There are **external factors** that often influence our data, like weather,
    economic indicators, or special events. They can add context and improve forecasts.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些**外部因素**经常影响我们的数据，比如天气、经济指标或特殊事件。它们可以提供上下文并改善预测。
- en: The trick is knowing how to integrate them properly without breaking temporal
    rules. Here’s a prompt to incorporate exogenous variables into your analysis.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 关键在于知道如何正确地整合它们，而不会破坏时间规则。以下是一个将外生变量纳入分析的提示。
- en: '**Exogenous Variable Prompt:**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**外生变量提示**：'
- en: '[PRE9]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Final Thoughts
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: I hope this guide has given you a lot to digest and try.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这个指南给你带来了很多可以消化和尝试的内容。
- en: It’s a toolbox full of researched techniques for using LLMs in time-series analysis.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个充满研究技术的工具箱，用于在时间序列分析中使用LLMs。
- en: '**Success** in time-series data comes when we respect the quirks of temporal
    data, craft prompts that highlight those quirks, and validate everything with
    the right evaluation methods.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**时间序列数据成功**的关键在于我们尊重时间数据的特性，精心设计提示以突出这些特性，并使用正确的评估方法进行验证。'
- en: Thank you for reading! Stay tuned for Part 2 😉
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！请期待第二部分 😉
