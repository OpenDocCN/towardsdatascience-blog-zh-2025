- en: AI Papers to Read in 2025
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2025年要阅读的AI论文
- en: 原文：[https://towardsdatascience.com/ai-papers-to-read-in-2025/](https://towardsdatascience.com/ai-papers-to-read-in-2025/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/ai-papers-to-read-in-2025/](https://towardsdatascience.com/ai-papers-to-read-in-2025/)'
- en: <mdspan datatext="el1762379100971" class="mdspan-comment">Today, I return to
    TDS</mdspan> with my AI papers to read series. My long-term followers might recall
    the four previous editions ([[1](https://medium.com/p/ac0e4e91d915)], [[2](https://medium.com/p/8c6fb4650a9b)],
    [[3](https://medium.com/p/2c708af5c0a4)], and [[4](https://medium.com/p/c6edd4302247)]).
    I’ve been away from writing for quite some time, and I couldn’t think of a better
    way to return than resuming my most successful series — and the one I enjoyed
    writing the most.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762379100971" class="mdspan-comment">今天，我带着我的AI论文阅读系列回到TDS。我的长期读者可能还记得之前的四版（[[1](https://medium.com/p/ac0e4e91d915)]，[[2](https://medium.com/p/8c6fb4650a9b)]，[[3](https://medium.com/p/2c708af5c0a4)]，和[[4](https://medium.com/p/c6edd4302247)]）。我已经有一段时间没有写作了，我想不出比恢复我最成功的系列——也是我最喜欢写作的系列——更好的回归方式了。
- en: For the uninitiated, this is a very opinionated list, full of perspectives and
    tangents, meant to keep you updated on AI as a whole. This is not a state-of-the-art
    models list but real insights on what to look for in the coming years and what
    you might have missed from the past. The goal is to help you think critically
    about the state of AI.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 对于初学者来说，这是一个非常主观的列表，充满了观点和旁支，旨在让您了解整个AI的最新动态。这不是一个最先进模型列表，而是对未来要寻找的内容以及过去可能错过的内容的真实见解。目标是帮助您批判性地思考AI的现状。
- en: In total, there are ten paper suggestions, each with a brief description of
    the paper’s contribution and explicit reasons why these papers are worth reading.
    Moreover, each has a dedicated further reading section with one or more tangents
    to explore.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 总共有十个论文推荐，每个论文都有简要的贡献描述和明确的原因说明为什么这些论文值得阅读。此外，每个论文都有一个专门的进一步阅读部分，包含一个或多个可以探索的旁支。
- en: Before we move on, back to my [2022 article](https://medium.com/data-science/ai-papers-to-read-in-2022-c6edd4302247),
    I kicked off saying *“we don’t need larger models; we need solutions”* and *“do
    not expect me to suggest GPT nonsense here.”* Back then, I was pretty sure I would
    repeat myself in the future, that a new GPT model would just be a larger and marginally
    better model, but far from groundbreaking. However, *credit where credit is due*.
    Since release, ChatGPT has sparked many new solutions and is certainly a turning
    point in all of computer science.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续之前，回到我的[2022年文章](https://medium.com/data-science/ai-papers-to-read-in-2022-c6edd4302247)，我开头说“我们不需要更大的模型；我们需要解决方案”和“不要期望我在这里提出GPT的胡言乱语。”当时，我相当确信我将来会重复自己，新的GPT模型将只是更大、略微更好的模型，但远非突破性的。然而，*功不唐捐*。自从发布以来，ChatGPT已经激发了许多新的解决方案，无疑是计算机科学的一个转折点。
- en: Last but not least, as a small disclaimer, most of my AI work centers around
    Computer Vision, so there are likely many excellent papers out there on topics
    such as Reinforcement Learning, Graphs, and Audio that are just not under my radar.
    If there is any paper you believe I should know, please let me know ❤.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，作为一个小的声明，我大部分的AI工作都集中在计算机视觉领域，因此可能有许多关于强化学习、图和音频等主题的优秀论文并没有进入我的视野。如果您认为有任何论文我应该知道，请告诉我
    ❤。
- en: Let’s go!
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '#1 DataPerf: A Benchmark for Data Centric AI'
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '#1 DataPerf：数据中心AI的基准'
- en: 'Mazumder, Mark, et al. “[Dataperf: Benchmarks for data-centric ai development](https://arxiv.org/abs/2207.10062).”
    *arXiv preprint arXiv:2207.10062* (2022).'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 'Mazumder, Mark, et al. “[Dataperf: Benchmarks for data-centric AI development](https://arxiv.org/abs/2207.10062).”
    *arXiv preprint arXiv:2207.10062* (2022).'
- en: 'From 2021 to 2023, Andrew Ng was very vocal about data-centric AI: to shift
    our focus from evolving models over static datasets towards evolving the datasets
    themselves — while holding models static or mostly unchanged. In their own words,
    our current model-centric research philosophy neglects the fundamental importance
    of data.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 从2021年到2023年，安德鲁·吴（Andrew Ng）非常积极地谈论以数据为中心的AI：将我们的关注点从静态数据集上的模型演变转移到自身数据集的演变——同时保持模型静态或基本不变。用他们自己的话说，我们目前的以模型为中心的研究哲学忽视了数据的基本重要性。
- en: In practical terms, it is often the case that increasing the dataset size, correcting
    mislabeled entries, and removing bogus inputs is far more effective at improving
    a model’s output than increasing its size, number of layers, or training time.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际操作中，通常情况下，增加数据集大小、纠正错误标记的条目以及移除虚假输入，比增加模型的大小、层数或训练时间更有效地提高模型的输出。
- en: In 2022, the authors proposed DataPerf, a benchmark for data-centric AI development,
    including tasks on speech, vision, debugging, acquisition, and adversarial problems,
    alongside the DataPerf working group. The initiative aims to foster data-aware
    methods and seeks to close the gap between the data departments of many companies
    and academia.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在 2022 年，作者们提出了 DataPerf，这是一个以数据为中心的人工智能开发基准，包括语音、视觉、调试、获取和对抗性问题的任务，以及 DataPerf
    工作组。该倡议旨在促进数据感知方法，并试图缩小许多公司数据部门与学术界之间的差距。
- en: '**Reason 1:** Most, if not all, companies working on niche topics end up developing
    internal datasets. It is wild how little research exists on how to do this properly/better.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 1:** 大多数，如果不是所有，专注于特定主题的公司最终都会开发内部数据集。关于如何正确/更好地进行这项研究的研究非常少。'
- en: '**Reason 2:** A reflection: how many papers provide a solid 2% improvement
    over the State-of-the-Art (SOTA) nowadays? How much additional data would you
    need to boost your accuracy by 2%?'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 2:** 反思：如今有多少论文能提供比现有技术（SOTA）稳定提高 2% 的成果？你需要多少额外的数据才能将准确率提高 2%？'
- en: '**Reason 3:** For the rest of your career, you might wonder, *what if* instead
    of doing the proposed X, we just collected more data?'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 3:** 在你余下的职业生涯中，你可能想知道，*如果我们不做提出的 X，而是收集更多的数据会怎样*？'
- en: '**Reason 4: I**f you are in academia, stuck with some X or Y dataset, trying
    to figure out how to get 0.1% improvement over SOTA, know that life can be much
    more than that.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 4:** 如果你身处学术界，被某个 X 或 Y 数据集困扰，试图找出如何将 SOTA 的性能提高 0.1%，要知道生活可以远不止如此。'
- en: '**Further Reading:** In 2021, it all began with Deeplearning.AI hosting a data-centric
    AIcompetition. You can read about [Johnson Kuan’s winning approach here](https://medium.com/data-science/how-i-won-andrew-ngs-very-first-data-centric-ai-competition-e02001268bda).
    Since then, there has been plenty of work dedicated to the subject by other authors,
    for instance, [2023’s Data-centric Artificial Intelligence: A Survey.](https://arxiv.org/abs/2303.10158)
    Finally, if you are a Talks kind of person, there are many by [Andrew Ng on YouTube](https://www.youtube.com/watch?v=06-AZXmwHjo)
    championing the topic.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**进一步阅读：** 2021 年，一切始于 Deeplearning.AI 主办的数据为中心的人工智能竞赛。你可以在这里阅读 Johnson Kuan
    的获奖方法[链接](https://medium.com/data-science/how-i-won-andrew-ngs-very-first-data-centric-ai-competition-e02001268bda)。从那时起，其他作者也投入了大量精力研究这个主题，例如[2023年的数据为中心的人工智能：综述](https://arxiv.org/abs/2303.10158)。最后，如果你是喜欢听讲座的人，可以在
    YouTube 上找到 [Andrew Ng](https://www.youtube.com/watch?v=06-AZXmwHjo) 关于这个主题的许多讲座。'
- en: '* * *'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '#2 GPT-3 / LLMs are Few-Shot Learners'
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '#2 GPT-3 / LLMs 是少样本学习者'
- en: 'Brown, Tom, et al. “[Language models are few-shot learners](https://proceedings.neurips.cc/paper_files/paper/2020/file/1457c0d6bfcb4967418bfb8ac142f64a-Paper.pdf).”
    *Advances in neural information processing systems* 33 (2020): 1877–1901.'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 'Brown, Tom, 等人。“[语言模型是少样本学习者](https://proceedings.neurips.cc/paper_files/paper/2020/file/1457c0d6bfcb4967418bfb8ac142f64a-Paper.pdf)。”*神经信息处理系统进展*
    33 (2020): 1877–1901。'
- en: This NeurIPS paper presented GPT-3 to the world. OpenAI’s third-gen model was
    in almost every way just a bigger GPT-2\. With 116 times more parameters and trained
    on 50 times more data. Their biggest finding wasn’t that it was just “better”
    but that how you prompted it could drastically improve its performance on many
    tasks.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇 NeurIPS 论文向世界介绍了 GPT-3。OpenAI 的第三代模型在几乎所有方面都只是更大的 GPT-2。它有 116 倍多的参数，并在 50
    倍多的数据上进行了训练。他们最大的发现并不是它只是“更好”，而是你如何提示它能够极大地提高它在许多任务上的性能。
- en: 'Machine Learning models are often expressed as predictable functions: given
    the same input, they will always yield the same output. Current Large Language
    Models (LLMs), on the other hand, can pose and answer the same question in many
    different ways — wording matters.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习模型通常被表示为可预测的函数：给定相同的输入，它们总是会产生相同的输出。然而，当前的大型语言模型（LLMs）可以以许多不同的方式提出和回答相同的问题——措辞很重要。
- en: '**Reason 1:** Previously, we discussed keeping models static while we evolve
    the dataset. With LLMs, we can evolve the questions we ask.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 1:** 之前，我们讨论了在数据集演变的同时保持模型静态。在使用大型语言模型（LLMs）的情况下，我们可以演变我们提出的问题。'
- en: '**Reason 2:** GPT-3 sparked the field of prompt engineering. After it, we started
    seeing authors proposing techniques like Chain-of-Thought (CoT) and Retrieval-Augmented-Generation
    (RAG).'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 2:** GPT-3 引发了提示工程领域的兴起。之后，我们开始看到作者们提出诸如思维链（CoT）和检索增强生成（RAG）等技术。'
- en: '**Reason 3:** Prompting well is far more important than knowing how to train
    or finetune LLMs. Some people say prompting is dead, but I don’t see that happening
    ever. Ask yourself: do you word requests the same way when addressing your boss
    *vs* your mom or friends?'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 3:** 提示（Prompting）做得好远比知道如何训练或微调大型语言模型（LLMs）重要。有人说提示（Prompting）已经过时了，但我看不到这种情况会发生。问问自己：你在对老板说话**与**对你的妈妈或朋友说话时，用词请求的方式是否相同？'
- en: '**Reason 4:** When transformers came out, most research targeted their training/inference
    speed and size. Prompting is a genuinely fresh topic in natural language processing.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 4:** 当变压器出现时，大多数研究都集中在它们的训练/推理速度和大小上。提示（Prompting）是自然语言处理中的一个真正新颖的主题。'
- en: '**Reason 5:** It’s funny when you realize that the paper doesn’t really propose
    anything; it just makes an observation. Has 60k citations, though.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 5:** 当你意识到这篇论文并没有真正提出任何东西，它只是做出了一种观察时，这很有趣。尽管如此，它有 60k 次引用。'
- en: '**Further Reading:** Prompting reminds me of ensemble models. Instead of repeatedly
    prompting a single model, we would train several smaller models and aggregate
    their outputs. Now nearly three decades old, the [AdaBoost](https://www.sciencedirect.com/science/article/pii/S002200009791504X)
    paper is a classic on the topic and a read that will take you back to way before
    even word embeddings were a thing*.* Fast forward to 2016, a modern classic is
    [XGBoost](https://arxiv.org/abs/1603.02754), which is now on its [v3 upgrade](https://github.com/dmlc/xgboost/releases).'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**进一步阅读：** 提示（Prompting）让我想起了集成模型。我们不是反复提示单个模型，而是训练几个较小的模型并汇总它们的输出。现在几乎有三十年历史，AdaBoost（[AdaBoost](https://www.sciencedirect.com/science/article/pii/S002200009791504X)）论文是这个主题的经典之作，阅读它将带你回到甚至词嵌入都还未成为事物的时代。快进到
    2016 年，XGBoost（[XGBoost](https://arxiv.org/abs/1603.02754)）成为了一个现代经典，现在它正在进行其
    [v3 升级](https://github.com/dmlc/xgboost/releases)。'
- en: '* * *'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '#3 Flash Attention'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '#3 快速注意力'
- en: 'Dao, Tri, et al. “[FlashAttention: Fast and memory-efficient exact attention
    with io-awareness](https://arxiv.org/abs/2205.14135).” *Advances in Neural Information
    Processing Systems* 35 (2022): 16344–16359.'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 'Dao, Tri, 等人。“[FlashAttention: Fast and memory-efficient exact attention with
    io-awareness](https://arxiv.org/abs/2205.14135)。” *Advances in Neural Information
    Processing Systems* 35 (2022): 16344–16359.'
- en: Since the 2017 groundbreaking paper [“Attention is All You Need”](https://arxiv.org/abs/1706.03762)
    introduced the Transformer architecture and the attention mechanism, several research
    groups have dedicated themselves to finding a faster and more scalable alternative
    to the original quadratic formulation. While many approaches were devised, none
    has really emerged as a clear successor to the original work.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 自从 2017 年具有里程碑意义的论文“[Attention is All You Need](https://arxiv.org/abs/1706.03762)”引入了
    Transformer 架构和注意力机制以来，几个研究小组致力于寻找一个比原始二次公式更快、更可扩展的替代方案。虽然设计了多种方法，但没有一种真正成为原始工作的明确继任者。
- en: '![Formula for the Attention mechanism](../Images/dfaf2fb7bc82aba2917477ae9932be5e.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![注意力机制的公式](../Images/dfaf2fb7bc82aba2917477ae9932be5e.png)'
- en: The original Attention formulation. The softmax term represents how important
    each token is to each query (so for N tokens, we have N² attention scores). The
    “transform” (in the name Transformer) is the multiplication between this N² attention
    map and the N-sized V vector (much like a rotation matrix “transforms” a 3D vector)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 原始的注意力公式。softmax 项表示每个标记对每个查询的重要性（因此对于 N 个标记，我们有 N² 个注意力分数）。所谓的“转换”（在 Transformer
    的名字中）是 N² 个注意力图与 N 大小的 V 向量之间的乘积（就像旋转矩阵“转换”一个 3D 向量一样）
- en: In this work, the authors do not propose a new formulation or a clever approximation
    to the original formula. Instead, they present a fast GPU implementation that
    makes better use of the (complicated) GPU memory structure. The proposed method
    is significantly faster while having little to no drawbacks over the original.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在这项工作中，作者并没有提出一个新的公式或对原始公式的巧妙近似。相反，他们展示了一个快速 GPU 实现，它能更好地利用（复杂的）GPU 内存结构。所提出的方法在速度上显著提高，同时几乎没有或没有对原始方法的缺点。
- en: '**Reason 1:** Many research papers get rejected because they are just new implementations
    or not “novel enough”. Sometimes, that’s *all we need*.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 1:** 许多研究论文被拒绝，因为它们只是新的实现或者“创新性不足”。有时，那**就是我们所需要的全部**。'
- en: '**Reason 2:** Research labs crave the attention of being the new Attention,
    to the point it’s hard for any new Attention to ever get enough attention. In
    this instance, the authors only improve what already works.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 2:** 研究实验室渴望成为新的注意力（Attention）的焦点，以至于任何新的注意力都很难得到足够的关注。在这种情况下，作者只是改进了已经有效的方法。'
- en: '**Reason 3:** In retrospect, [ResNet](https://arxiv.org/abs/1512.03385) was
    groundbreaking for CNNs back in the day, proposing the residual block. In the
    following years, many proposed enhancements to it, varying the residual block
    idea. Despite all that effort, most people just stuck with the original idea.
    In such a crowded research field as AI, it’s best to remain cautious about all
    things that have many proposed successors.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '**Further Reading:** From time to time, I consult [Sik-Ho Tsang](https://medium.com/u/aff72a0c1243)’s
    [list of papers](https://sh-tsang.medium.com/overview-my-reviewed-paper-lists-tutorials-946ce59fbf9e)
    he reviews here on Medium. Each section reveals the leading ideas for each area
    over the years. It is a bit sad how many of these papers might have seemed groundbreaking
    and are now completely forgotten? Back to Attention, as of 2025, the hottest attention-replacement
    candidate is the [Sparse Attention](https://github.com/deepseek-ai/DeepSeek-V3.2-Exp/blob/main/DeepSeek_V3_2.pdf)
    by the DeepSeek team.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '#4 Training NNs with Posits'
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Raposo, Gonçalo, Pedro Tomás, and Nuno Roma. “[Positnn: Training deep neural
    networks with mixed low-precision posit.](https://arxiv.org/abs/2105.00053)” *ICASSP
    2021–2021 IEEE International Conference on Acoustics, Speech and Signal Processing
    (ICASSP)*. IEEE, 2021.'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Taking a turn to the world of hardware and low-level optimization, some of the
    most important (but least sexy) advancements in AI training are related to floating
    points. We went from boring floats to halfs, then 8-bit and even 4-bit floats
    ([FP4](https://arxiv.org/abs/2505.19115?utm_source=chatgpt.com)). The horsepower
    driving LLMs today are eightfold ponies.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: The future of number formats goes hand-in-hand with matrix-matrix multiplication
    hardware. However, there can be much more to this topic than just halving bit-depth.
    This paper, for instance, explores a totally new number format ([posits](https://en.wikipedia.org/wiki/Unum_%28number_format%29#))
    as a potential replacement for good old IEEE-754 floats. Can you imagine a future
    *sans* floats?
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '**Reason 1:** While new algorithms take time to find widespread adoption, hardware
    improves consistently every year. All ships rise with the hardware tide.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '**Reason 2:** It’s worth questioning how far we would be today if we didn’t
    have as many GPU improvements over the past ten years. For reference, the [AlexNet](https://proceedings.neurips.cc/paper_files/paper/2012/file/c399862d3b9d6b76c8436e924a68c45b-Paper.pdf)
    authors broke all ImageNet records in 2012 using two high-end GTX 580 GPUs, a
    total of 3 TFLOPs. Nowadays, a mid-range GPU, such as an RTX 5060, boasts ~19
    TFLOPs — 6 times more.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '**Reason 3:** Some technologies are so common that we take them for granted.
    All things can and should be improved; we don’t owe anything to floats (or even
    Neural Networks for that matter).'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '**Further Reading:** Since we are mentioning hardware, it’s also a good time
    to talk about programming languages. If you haven’t been keeping up with the news,
    the Python team (especially [Python’s creator](https://en.wikipedia.org/wiki/Guido_van_Rossum))
    is focused on [optimizing Python](https://github.com/faster-cpython). However,
    optimization nowadays seems to be a slang for rebuilding stuff in [Rust](https://rust-lang.org).
    Last but not least, some hype was devoted to [Mojo](https://www.modular.com/mojo),
    an AI/speed-focused superset of Python; however, I barely see anyone talking about
    it today.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**进一步阅读：**既然我们提到了硬件，这也是讨论编程语言的好时机。如果你没有关注新闻，Python 团队（特别是[Python 的创造者](https://en.wikipedia.org/wiki/Guido_van_Rossum)）正专注于[优化
    Python](https://github.com/faster-cpython)。然而，如今优化似乎成了重建东西的俚语，特别是在[Rust](https://rust-lang.org)中。最后但同样重要的是，一些炒作集中在[Mojo](https://www.modular.com/mojo)，这是一个以
    AI/速度为重点的 Python 超集；然而，我今天几乎没看到任何人谈论它。'
- en: '* * *'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '#5 AdderNet'
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '#5 AdderNet'
- en: 'Chen, Hanting, et al. “[AdderNet: Do we really need multiplications in deep
    learning?.](https://arxiv.org/abs/1912.13200)” *Proceedings of the IEEE/CVF conference
    on computer vision and pattern recognition*. 2020.'
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 陈，汉廷，等人。“[AdderNet：我们真的需要在深度学习中使用乘法吗？](https://arxiv.org/abs/1912.13200)” *IEEE/CVF
    计算机视觉与模式识别会议论文集*。2020。
- en: What if we didn’t do matrix multiplication at all? This paper goes a totally
    different route, showing it is possible to have effective neural networks without
    matrix multiplication. The main idea is to replace convolutions with computing
    the L1 difference between the input and the sliding filters.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们根本不做矩阵乘法会怎样？这篇论文走了一条完全不同的路线，展示了在没有矩阵乘法的情况下也可以拥有有效的神经网络。主要思想是用计算输入和滑动滤波器之间的
    L1 差分来代替卷积。
- en: I like to think of this paper as the “alternate world” neural networks. In some
    parallel universe, NNs evolved based on addition, and amidst it all, someone proposed
    a multiplication-based model; however, it never got traction since all the tooling
    and hardware were neck deep in optimizing massive matrix addition and subtraction
    operators.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢将这篇论文视为“平行世界”中的神经网络。在某个平行宇宙中，神经网络是基于加法演化的，在其中，有人提出了基于乘法的模型；然而，由于所有工具和硬件都深陷于优化大规模矩阵加法和减法运算符，这个模型从未得到推广。
- en: '**Reason 1:** We easily forget there are still other algorithms out there we
    have yet to find, besides CNNs and Transformers. This paper shows that an addition-based
    neural network is possible, how cool is that?'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 1：**我们很容易忘记，除了 CNN 和 Transformer 之外，还有其他算法等待我们去发现。这篇论文展示了基于加法的神经网络是可能的，这有多么酷？'
- en: '**Reason 2:** A lot of our hardware and cloud infrastructure is tuned for matrix
    multiplication and neural networks. Can new models still compete? Can non-neural
    networks still make a comeback?'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 2：**我们的许多硬件和云基础设施都针对矩阵乘法和神经网络进行了优化。新的模型还能竞争吗？非神经网络还能否卷土重来？'
- en: '**Further Reading:** Many of you might not be familiar with what existed before
    NNs took over most fields. Most people know staples like [Linear Regression](https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.LinearRegression.html),
    [Decision Trees](https://scikit-learn.org/stable/modules/tree.html), and [XGBoost](https://arxiv.org/abs/1603.02754).
    Before NNs became popular, [Support Vector Machines](https://scikit-learn.org/stable/modules/svm.html)
    were all the rage. It’s been a while since I last saw one. In this regard, a cool
    paper to read is [Deep Learning is Not All You Need](https://arxiv.org/abs/2106.03253).'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**进一步阅读：**你们中许多人可能不熟悉在神经网络接管大多数领域之前存在的东西。大多数人知道像[线性回归](https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.LinearRegression.html)、[决策树](https://scikit-learn.org/stable/modules/tree.html)和[XGBoost](https://arxiv.org/abs/1603.02754)这样的标准。在神经网络变得流行之前，[支持向量机](https://scikit-learn.org/stable/modules/svm.html)非常流行。我已经有一段时间没看到过它了。在这方面，一篇值得阅读的论文是[深度学习并非一切](https://arxiv.org/abs/2106.03253)。'
- en: '![The decision boundary of a Support Vector Machine (SVM) using a kernel (left)
    and without the kernel trick (right)](../Images/625ec108918680bf2048639f55d2985e.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![使用核（左）和不使用核技巧（右）的支持向量机（SVM）的决策边界](../Images/625ec108918680bf2048639f55d2985e.png)'
- en: Support Vector Machines learn to separate two groups of points with the best
    separation line possible. By using the Kernel Trick, these points are cast into
    a higher-dimensional space, in which a better separation plane might be found,
    achieving a non-linear decision boundary while maintaining the linear formulation.
    Its a brilliant solution worth learning about. [Source](https://en.wikipedia.org/wiki/Support_vector_machine#/media/File:Kernel_Machine.svg).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: '#6 Interpolation vs Extrapolation'
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Balestriero, Randall, Jerome Pesenti, and Yann LeCun. “[Learning in high dimension
    always amounts to extrapolation](https://arxiv.org/abs/2110.09485).” *arXiv preprint
    arXiv:2110.09485* (2021).
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Sometime ago, I used to think the big names on AI were visionaries or had very
    good educated guesses on the future of the field. This changed with this paper
    and all the debate that followed.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: Back in 2021, Yann LeCun pushed this discussion about *interpolation vs extrapolation*,
    claiming that in high-dimensional spaces, like all neural networks, what we call
    “learning” is data extrapolation. Right after publication, many renowned names
    joined in, some claiming this was nonsense, some that it was still is interpolation,
    and some taking the extrapolation side.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: If you never heard about this discussion… it shows how pointless it really was.
    As far as I could see (and please write me if you think otherwise), no company
    changed course, no new extrapolation-aware model was devised, nor did it spark
    new relevant training techniques. It came and it went.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '**Reason 1:** To be honest, you can just skip this one. I just needed to rant
    about this for my own peace of mind.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '**Reason 2:** From a purely academic point of view, I consider this an interesting
    take on learning theory, which is indeed a cool topic.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '**Further Reading:** Yoshua Bengio, Geoffrey Hinton, and Yann LeCun were awarded
    the 2018 Turing Award for their pioneering work on Deep Learning foundations.
    Back in 2023 or so, LeCun was focused on [self-supervised learning](https://arxiv.org/abs/2304.12210),
    Hinton was concerned with [Capsule Networks](https://arxiv.org/abs/2011.13920),
    and Bengio was looking at [Generative Flow Networks](https://jmlr.org/papers/v24/22-0364.html?fbclid=IwAR2I8QsC2KfINxdNxu5z8ncm6ezlcSrGTRoH_bjr9V5n5zGAD3mnQ6_LDPg).
    By late 2025, LeCun moved towards [world models](https://arxiv.org/abs/2301.08243?utm_source=chatgpt.com)
    while Hinton and Bengio moved towards [AI Safety](https://ora.ox.ac.uk/objects/uuid:79b0f23a-9dbc-43d1-88b6-f90b1318e361/files/s41687k537).
    If you are second-guessing your academic choices, keep in mind that even the so-called
    godfathers switch gears.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '#7 DINOv3 / Foundation Vision Models'
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Siméoni, Oriane, et al. “[DINOv3](https://arxiv.org/abs/2508.10104).” *arXiv
    preprint arXiv:2508.10104* (2025).
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: While the world of language processing has evolved to use big universal models
    that work for every task (aka foundation models), the field of image processing
    is still working its way up to that. In this paper, we see the current iteration
    of the DINO model, a self-supervised image model designed to be the foundation
    for Vision.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当语言处理的世界已经发展到使用适用于每个任务的通用大模型（即基础模型）时，图像处理领域仍在努力达到这一水平。在这篇论文中，我们看到了DINO模型的当前迭代，这是一个旨在成为视觉基础的自监督图像模型。
- en: '**Reason 1:** Self-supervised pretraining is still relatively evolving in other
    problem areas when compared to text, especially if done entirely within the problem
    domain (versus adding text descriptions to help it).'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 1:** 与文本相比，自监督预训练在除文本以外的其他问题领域中仍然相对较新，尤其是如果完全在问题域内进行（而不是添加文本描述来帮助它）。'
- en: '**Reason 2:** Don’t read only language papers, even if your job is working
    with LLMs. Variety is key.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 2:** 即使你的工作是与LLMs打交道，也不要只阅读语言论文。多样性是关键。'
- en: '**Reason 3: L**anguage models can only go so far towards AGI. Vision is paramount
    for human-like intelligence.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 3:** 语言模型在向通用人工智能（AGI）发展的过程中只能走这么远。视觉对于类似人类的智能至关重要。'
- en: '**Further Reading:** Continuing on the Vision topic, it is worth knowing about
    the [YOLO](http://docs.ultralytics.com/) and the [Segment-Anything](https://ai.meta.com/sam2)
    Model. The former is a staple for object-detection (but also boasts versions for
    other problems) while the latter is for image segmentation. Regarding image generation,
    I find it funny that a few years back we would all talk about GANs (generative
    adversarial networks), and nowadays it is probable that many of you have never
    heard of one. I even wrote a list like this for [GAN papers](https://medium.com/data-science/gan-papers-to-read-in-2020-2c708af5c0a4)
    many years ago.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**进一步阅读:** 在视觉主题上继续深入，了解[YOLO](http://docs.ultralytics.com/)和[Segment-Anything](https://ai.meta.com/sam2)模型是值得的。前者是物体检测的标准（但也提供了针对其他问题的版本），而后者是图像分割。至于图像生成，我觉得有趣的是，几年前我们都会谈论GANs（生成对抗网络），而现在可能很多人都没有听说过。我甚至多年前就为[GAN论文](https://medium.com/data-science/gan-papers-to-read-in-2020-2c708af5c0a4)列了一个类似的清单。'
- en: '* * *'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '#8 Small Language Models are the Future'
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '#8 小型语言模型是未来'
- en: Belcak, Peter, et al. “[Small Language Models are the Future of Agentic AI.](https://arxiv.org/abs/2506.02153?utm_source=chatgpt.com)”
    *arXiv preprint arXiv:2506.02153* (2025).
  id: totrans-79
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Belcak, Peter, 等人。 “[小型语言模型是代理式AI的未来。](https://arxiv.org/abs/2506.02153?utm_source=chatgpt.com)”
    *arXiv预印本 arXiv:2506.02153* (2025)。
- en: The field of “Generative AI” is quickly being rebranded to “Agentic AI”. As
    people try to grasp how to make money with that, they bleed VC money running behemoth
    models. In this paper, the authors argue that Small Language Models (< 10B params,
    on their definition) are the future for Agentic AI development.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: “生成式AI”领域正在迅速更名为“代理式AI”。当人们试图理解如何从中赚钱时，他们会在运行巨型模型时大量投入风险投资资金。在这篇论文中，作者们认为小型语言模型（<
    10B参数，按他们的定义）是代理式AI发展的未来。
- en: In more detail, they argue that most subtasks executed on agentic solutions
    are repetitive, well-defined, and non-conversational. Therefore, LLMs are somewhat
    an overkill. If you include fine-tuning, SLMs can easily become specialized agents,
    whereas LLMs thrive on open tasks.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 更详细地说，他们认为在代理解决方案上执行的大多数子任务都是重复的、定义明确的和非对话性的。因此，大型语言模型（LLMs）有点过度。如果你包括微调，SMLs可以轻易地成为专业化的代理，而LLMs则擅长开放任务。
- en: '**Reason 1:** What we call “large” language models today might just as well
    be the “small” of tomorrow. Learning about SMLs is future-proofing.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 1:** 我们今天所说的“大型”语言模型可能正是明天的“小型”模型。了解小型语言模型（SMLs）是面向未来的保障。'
- en: '**Reason 2:** Many people claim AI today is heavily subsidized by VC money.
    In the near future, we might see a huge increase in AI costs. Using SMLs might
    be the only option for many businesses.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 2:** 许多人声称今天的AI很大程度上是由风险投资（VC）资金补贴的。在不久的将来，我们可能会看到AI成本的大幅增加。使用SMLs可能成为许多企业的唯一选择。'
- en: '**Reason 3:** This is super easy to read. In fact, I think it is the first
    time I have read a paper that so explicitly defends a thesis.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 3:** 这篇论文读起来非常容易。事实上，我认为这是我第一次读到一篇如此明确地捍卫一个论点的论文。'
- en: '**Further Reading:** Smaller models are the only option for edge AI / low-latency
    execution. When applying AI to video streams, the model + post needs to execute
    in less than 33 ms for a 30fps stream. You can’t roundtrip to a cloud or batch
    frames. Nowadays, there are a variety of tools like [Intel’s OpenVINO](https://www.intel.com/content/www/us/en/developer/tools/openvino-toolkit/overview.html),
    [NVIDIA’s](https://www.intel.com/content/www/us/en/developer/tools/openvino-toolkit/overview.html)
    [Tensor-RT](https://developer.nvidia.com/tensorrt), or [TensorFlow-Lite](https://www.tensorflow.org/lite/guide?hl=pt-br)
    for fast inference on limited hardware.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**进一步阅读：** 对于边缘AI/低延迟执行，小模型是唯一的选择。当将AI应用于视频流时，模型+后处理需要在小于33毫秒内执行，以处理30fps的流。你不能往返到云端或批量处理帧。如今，有各种各样的工具，如[英特尔OpenVINO](https://www.intel.com/content/www/us/en/developer/tools/openvino-toolkit/overview.html)，[NVIDIA的Tensor-RT](https://developer.nvidia.com/tensorrt)，或[TensorFlow-Lite](https://www.tensorflow.org/lite/guide?hl=pt-br)在有限的硬件上进行快速推理。'
- en: '* * *'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '#9 The Lottery Ticket Hypothesis (2019)'
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '#9 彩票假设（2019）'
- en: '*Frankle, Jonathan, and Michael Carbin.* [*“The lottery ticket hypothesis:
    Finding sparse, trainable neural networks.”*](https://arxiv.org/abs/1803.03635)
    *arXiv preprint arXiv:1803.03635 (2018).*'
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*Frankle, Jonathan, 和 Michael Carbin.* [*“彩票假设：寻找稀疏、可训练的神经网络。”*](https://arxiv.org/abs/1803.03635)
    *arXiv 预印本 arXiv:1803.03635 (2018).* '
- en: As a follow-up to small models, some authors have shown that we most likely
    aren’t training our networks’ parameters to their fullest potential. This is “humans
    only use 10% of their brains” applied to neural networks. In this literature,
    the Lottery Ticket Hypothesis is surely one of the most intriguing papers I’ve
    seen.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 作为对小模型的后续研究，一些作者已经表明，我们很可能没有将网络的参数训练到其最大潜力。这是“人类只使用了他们大脑的10%”在神经网络中的应用。在这篇文献中，彩票假设无疑是我在看到的最引人入胜的论文之一。
- en: Frankle *et al.* found that if you (1) train a big network, (2) prune all low-valued
    weights, (3) rollback the pruned network to its untrained state, and (4) retrain;
    you will get a better performing network. Putting it differently, what training
    does is uncover a subnetwork whose initial random parameters are aligned to solving
    the problem — all else is noise. By leveraging this subnetwork alone, we can surpass
    the original network performance. Unlike basic network pruning, this *improves*
    the result.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: Frankle 等人发现，如果你（1）训练一个大网络，（2）剪除所有低值权重，（3）将剪枝网络回滚到其未训练状态，（4）重新训练；你将得到一个性能更好的网络。换句话说，训练所做的就是揭示一个子网络，其初始随机参数与解决问题相一致——其余的都是噪声。通过仅利用这个子网络，我们可以超越原始网络性能。与基本的网络剪枝不同，这*提高了*结果。
- en: '**Reason #1:** We are accustumed to ”bigger models are better but slower” whereas
    “small models are dumb but fast”. Maybe we are the dumb ones who insist on big
    models always.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 #1:** 我们习惯了“大模型更好但更慢”而“小模型愚蠢但快”。也许我们就是那些坚持大模型总是更好的愚蠢者。'
- en: '**Reason #2:** An open question is how underutilized our parameters are. Likewise,
    how can we use our weights to their fullest? Or even, is it even possible to measure
    a NN learning potential?'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 #2:** 一个开放的问题是我们的参数有多少是被低估的。同样，我们如何充分利用我们的权重？甚至，测量一个神经网络的学习潜力是否可能？ '
- en: '**Reason #3:** How many times have you cared about how your model parameters
    were initialized before training?'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 #3:** 在训练之前，你有多少次关心过你的模型参数是如何初始化的？'
- en: '**Further Reading:** While this paper is from 2018, there is a [2024 survey](https://arxiv.org/abs/2403.04861)
    on the hypothesis. On a contrasting note, “[The Role of Over-Parameterization
    in Machine Learning — the Good, the Bad, the Ugly (2024)](https://ojs.aaai.org/index.php/AAAI/article/view/30290?utm_source=chatgpt.com)”
    discusses how over-parametrization is what really powers NNs. On the more practical
    side, this [survey covers the topic of Knowledge Distillation](https://arxiv.org/abs/2402.13116?utm_source=chatgpt.com),
    using a big network to train a smaller one to perform as close to it as possible.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '**进一步阅读：** 虽然这篇论文是2018年的，但有一个关于该假设的[2024年调查](https://arxiv.org/abs/2403.04861)。对比之下，“[机器学习中过度参数化的作用——好、坏、丑（2024）](https://ojs.aaai.org/index.php/AAAI/article/view/30290?utm_source=chatgpt.com)”讨论了过度参数化实际上是推动神经网络的动力。在更实用的方面，这篇[调查涵盖了知识蒸馏的主题](https://arxiv.org/abs/2402.13116?utm_source=chatgpt.com)，使用大网络训练小网络，使其尽可能接近大网络的表现。'
- en: '* * *'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '#10 AlexNet (2012)'
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '#10 AlexNet（2012）'
- en: '*Krizhevsky, Alex, Ilya Sutskever, and Geoffrey E. Hinton.* [*“Imagenet classification
    with deep convolutional neural networks.”*](http://papers.nips.cc/paper/4824-imagenet-classification-with-deep-convolutional-neural-networ)
    *Advances in neural information processing systems. 2012.*'
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*Krizhevsky, Alex, Ilya Sutskever, and Geoffrey E. Hinton.* [*“使用深度卷积神经网络进行ImageNet分类。”*](http://papers.nips.cc/paper/4824-imagenet-classification-with-deep-convolutional-neural-networ)
    *神经信息处理系统进展。2012.*'
- en: Can you believe all this Neural Network content we see today really started
    just 13 years ago? Before that, NNs were somewhat in between a joke and a failed
    promise. If you wanted a good model, you would use SVMs or a bunch of hand-engineered
    tricks.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 你能相信我们今天看到的所有神经网络内容实际上只是从13年前开始的吗？在那之前，神经网络在笑话和失败的承诺之间徘徊。如果你想得到一个好的模型，你会使用SVMs或一大堆手工设计的技巧。
- en: In 2012, the authors proposed the use of GPUs to train a large Convolutional
    Neural Network (CNN) for the ImageNet challenge. To everyone’s surprise, they
    won first place, with a ~15% Top-5 error rate, against ~26% for the second place,
    which used state-of-the-art image processing techniques.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在2012年，作者们提出了使用GPU来训练用于ImageNet挑战的大型卷积神经网络（CNN）。令大家惊讶的是，他们以大约15%的Top-5错误率赢得了第一名，而第二名使用了最先进的图像处理技术，错误率约为26%。
- en: '**Reason #1:** While most of us know AlexNet’s historical importance, not everyone
    knows which of the techniques we use today were already present before the boom.
    You might be surprised by how familiar many of the concepts introduced in the
    paper are, such as dropout and ReLU.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 #1:** 虽然我们大多数人知道AlexNet的历史重要性，但并非所有人都知道我们今天使用的哪些技术在此之前就已经存在。你可能会惊讶于论文中引入的许多概念是多么熟悉，比如dropout和ReLU。'
- en: '**Reason #2:** The proposed network had 60 million weights, complete insanity
    for 2012 standards. Nowadays, trillion-parameter LLMs are around the corner. Reading
    the AlexNet paper gives us a great deal of insight into how things have developed
    since then.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**原因 #2:** 提出的网络有6000万个权重，这在2012年的标准下简直是疯狂。如今，万亿参数的LLMs即将到来。阅读AlexNet论文让我们对自那时以来事物的发展有了深刻的洞察。'
- en: '**Further Reading:** Following the history of ImageNet champions, you can read
    the [ZF Net](https://link.springer.com/chapter/10.1007/978-3-319-10590-1_53),
    [VGG](https://arxiv.org/abs/1409.1556), [Inception-v1,](https://www.cv-foundation.org/openaccess/content_cvpr_2015/html/Szegedy_Going_Deeper_With_2015_CVPR_paper.html)
    and [ResNet](http://openaccess.thecvf.com/content_cvpr_2016/html/He_Deep_Residual_Learning_CVPR_2016_paper.html)
    papers. This last one achieved super-human performance, solving the challenge.
    After it, other competitions took over the researchers’ attention. Nowadays, ImageNet
    is mainly used to validate radical new architectures.'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**进一步阅读:** 跟随ImageNet冠军的历史，你可以阅读[ZF Net](https://link.springer.com/chapter/10.1007/978-3-319-10590-1_53)，[VGG](https://arxiv.org/abs/1409.1556)，[Inception-v1](https://www.cv-foundation.org/openaccess/content_cvpr_2015/html/Szegedy_Going_Deeper_With_2015_CVPR_paper.html)和[ResNet](http://openaccess.thecvf.com/content_cvpr_2016/html/He_Deep_Residual_Learning_CVPR_2016_paper.html)的论文。最后一个实现了超人类的表现，解决了挑战。之后，其他竞赛吸引了研究者的注意力。如今，ImageNet主要用于验证激进的新架构。'
- en: '![The original portrayal of the AlexNet structure](../Images/a141fcb0bd5f8ffe5ae0a82ec69e48eb.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![AlexNet结构的原始描述](../Images/a141fcb0bd5f8ffe5ae0a82ec69e48eb.png)'
- en: 'The original portrayal of the AlexNet structure. The top and bottom halves
    are processed by GPU 1 and 2, respectively. An earlier form of model parallelism.
    Source: [The Alexnet Paper](http://papers.nips.cc/paper/4824-imagenet-classification-with-deep-convolutional-neural-networ)'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: AlexNet结构的原始描述。顶部和底部各由GPU 1和2分别处理。这是早期的一种模型并行形式。来源：[AlexNet论文](http://papers.nips.cc/paper/4824-imagenet-classification-with-deep-convolutional-neural-networ)
- en: '* * *'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: This is all for now. Feel free to comment or [connect with me](https://www.linkedin.com/in/ygorreboucas/)
    if you have any questions about this article or the papers. Writing such lists
    is A LOT OF WORK. If this was a rewarding read for you, please be kind and share
    it among your peers. Thank you!
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这就结束了。如果你对这篇文章或论文有任何问题，请随意评论或[与我联系](https://www.linkedin.com/in/ygorreboucas/)。编写这样的列表是非常多的工作。如果这篇文章对你来说是一次有价值的阅读，请友好地与你的同行分享。谢谢！
- en: If you would like to keep reading, consider my past four AI papers to read instances
    [[1](https://medium.com/p/ac0e4e91d915)], [[2](https://medium.com/p/8c6fb4650a9b)],
    [[3](https://medium.com/p/2c708af5c0a4)], and [[4](https://medium.com/p/c6edd4302247)].
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要继续阅读，可以考虑我过去四篇关于AI的论文，以了解实例 [[1](https://medium.com/p/ac0e4e91d915)]，[[2](https://medium.com/p/8c6fb4650a9b)]，[[3](https://medium.com/p/2c708af5c0a4)]和[[4](https://medium.com/p/c6edd4302247)]。
