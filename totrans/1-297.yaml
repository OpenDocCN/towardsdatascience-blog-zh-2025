- en: 'Why Context Is the New Currency in AI: From RAG to Context Engineering'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/why-context-is-the-new-currency-in-ai-from-rag-to-context-engineering/](https://towardsdatascience.com/why-context-is-the-new-currency-in-ai-from-rag-to-context-engineering/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1757615783460" class="mdspan-comment">Three months ago</mdspan>,
    I saw our production system fail spectacularly. Not a code bug, not an infrastructure
    error, but simply misunderstanding the optimization goals of our AI system. We
    built what we thought was a fancy document analysis pipeline with retrieval-augmented
    generation (RAG), vector embeddings, semantic search, and fine-tuned reranking.
    When we demonstrated the system, it answered questions about our client’s regulatory
    documents very convincingly. But in production, the system answered questions
    completely context free.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: 'The revelation hit me during a post-mortem meeting: we weren’t managing information
    retrieval but we were managing context distribution. And we were terrible at it.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: 'This failure taught me something that’s become increasingly clear across the
    AI industry: context isn’t just another input parameter to optimize. Rather, it
    is the central currency that defines whether an AI system delivers real value
    or remains a costly sideshow. Unlike traditional software engineering, in which
    we optimize for speed, memory, or throughput, context engineering requires us
    to regard information as humans do: layered, interdependent, and reliant on situational
    awareness.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: The Context Crisis in Modern AI Systems
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before we look into potential solutions, it is crucial to identify why context
    has become such a critical choke point. It is not an issue from a technical point
    of view. It is more of a design and philosophical issue.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Most AI implemented today takes into account context as a fixed-sized buffer
    which is filled with pertinent information ahead of processing. This worked well
    enough with the early implementations of chatbots and question-answering systems.
    However, with the increasing sophistication of AI applications and their incorporation
    into workflows, the buffer-based methodology has proved to be deeply insufficient.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a typical enterprise RAG system as an example. What happens when
    a user inputs a question? The system performs the following actions:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Converts the question into embeddings
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Searches a vector database for similar content
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Retrieves the top-k most similar documents
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Stuffs everything into the context window
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Generates an answer
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This flow is based on the hypothesis that clustering embeddings in some space
    of similarity can be treated as contextual reason which in practice fails not
    just occasionally, but persistently.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: The more fundamental flaw is the view of context as static. In a human conversation,
    context is flexible and shifts within the course of a dialogue, moving and evolving
    as you progress through a conversation, a workflow. For example, if you were to
    ask a colleague “the Johnson report,” that search does not just pulse through
    their memory for documents with those terms. It is relevant to what you are working
    on and what project.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: From Retrieval to Context Orchestration
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The shift from thinking about retrieval to thinking about context orchestration
    represents a fundamental change in how we architect AI systems. Instead of asking
    “What information is most similar to this query?” we need to ask “What combination
    of information, delivered in what sequence, will enable the most effective decision-making?”
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/54162557479153ba20cba1162b6a34a7.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
- en: '*Context engineering integrates multiple information streams — user intent,
    instruction layering, context injection, and external data — into a unified processing
    framework*.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '*Author-generated image using AI*'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: This distinction matters because context isn’t additive, rather it’s compositional.
    Throwing more documents into a context window doesn’t improve performance in a
    linear fashion. In many cases, it actually degrades performance due to what some
    researchers call “attention dilution.” The model’s attention focus spreads too
    thin and as a result, the focus on important details weakens.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: This is something I experienced firsthand when developing a document analysis
    system. Our earliest versions would fetch every applicable case, statute, and
    even regulation for every single query. While the results would cover every possible
    angle, they were absolutely devoid of utility. Picture a decision-making scenario
    where a person is overwhelmed by a flood of relevant information being read out
    to them.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: 'The moment of insight occurred when we began to think of context as a narrative
    structure instead of a mere information dump. Legal reasoning works in a systematic
    way: articulate the facts, determine the applicable legal principles, apply them
    to the facts, and anticipate counterarguments.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '| **Aspect** | **RAG** |  **Context Engineering** |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
- en: '| Focus | Retrieval + Generation | Full lifecycle: Retrieve, Process, Manage
    |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
- en: '| Memory Handling | Stateless | Hierarchical (short/long-term) |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
- en: '|  Tool Integration |  Basic (optional) |  Native (TIR, agents) |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
- en: '| Scalability |  Good for Q&A |  Excellent for agents, multi-turn |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
- en: '| Common Tools | FAISS, Pinecone | LangGraph, MemGPT, GraphRAG |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
- en: '| Example Use Case |  Document search | Autonomous coding assistant |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
- en: The Architecture of Context Engineering
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Effective context engineering requires us to think about three distinct but
    interconnected layers: information selection, information organization, and context
    evolution.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: 'Information Selection: Beyond Semantic Similarity'
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first layer focuses on developing more advanced methods on how to define
    what the context entails. Traditional RAG systems place far too much emphasis
    on embedding similarity. This approach overlooks key elements of the missing,
    how the missing information contributes to the understanding.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层重点在于开发更高级的方法来定义上下文包含的内容。传统的RAG系统过于强调嵌入相似性。这种方法忽略了缺失的关键元素，以及缺失信息如何有助于理解。
- en: It is my experience that the most useful selection strategies incorporate many
    different unders.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我的经验是，最有用的选择策略结合了许多不同的下。
- en: '**Relevance cascading** begins with more general broad semantic similarity,
    and then focuses on more specific filters. To illustrate, in the regulatory compliance
    system, first, there is a selection of semantically relevant documents, then documents
    from the relevant regulatory jurisdiction are filtered, followed by prioritizing
    documents from the most recent regulatory period, and finally, ranking by recent
    citation frequency.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**相关性级联**从更广泛的语义相似性开始，然后专注于更具体的过滤器。为了说明，在合规性系统中，首先选择语义相关的文档，然后过滤出相关监管管辖区的文档，接着优先考虑最近监管时期的文档，最后按最近引用频率进行排名。'
- en: '**Temporal context** weighting recognizes that the relevance of information
    changes over time. A regulation from five years ago might be semantically linked
    to contemporary issues. However, if the regulation is outdated, then incorporating
    it into the context would be contextually inaccurate. We can enforce decay functions
    that automatically downweight outdated information unless explicitly tagged as
    foundational or precedential.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**时间上下文**权重认识到信息的相关性随时间变化。五年前的法规可能与当代问题在语义上相关联。然而，如果法规过时，将其纳入上下文中就会在上下文上不准确。我们可以实施衰减函数，自动降低过时信息的权重，除非明确标记为基本或先例。'
- en: '**User context integration** goes beyond the immediate query to consider the
    user’s role, current projects, and historical interaction patterns. When a compliance
    officer asks about data retention requirements, the system should prioritize different
    information than when a software engineer asks the same question, even if the
    semantic content is identical.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**用户上下文集成**不仅考虑即时查询，还涉及用户的角色、当前项目和历史交互模式。当合规官员询问数据保留要求时，系统应优先考虑与软件工程师询问相同问题时不同的信息，即使语义内容相同。'
- en: 'Information Organization: The Grammar of Context'
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 信息组织：上下文的语法
- en: Once we have extracted the relevant information, how we represent it in the
    context window is important. This is the area where typical RAG systems can fall
    short – they consider the context window as an unstructured bucket rather a thoughtful
    collection of narrative.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们提取了相关信息，如何在上下文窗口中呈现它就很重要。这是典型RAG系统可能不足的地方——它们将上下文窗口视为一个无结构的桶，而不是一个深思熟虑的叙事集合。
- en: In the case of organizing context that is effective, the framework should also
    require that one understands the process known to cognitive scientists as “information
    chunking.” Human working memory can maintain approximately seven discrete pieces
    of information at once. Once going beyond it our understanding falls precipitously.
    The same is true for AI systems not because their cognitive shortcomings are identical,
    but because their training forces them to imitate human like reasoning.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在组织有效上下文的情况下，框架还应要求理解认知科学家所知的“信息块化”过程。人类工作记忆可以同时维持大约七个离散的信息块。一旦超过这个数量，我们的理解就会急剧下降。对于AI系统来说也是如此，不是因为它们的认知缺陷相同，而是因为它们的训练迫使它们模仿人类的推理方式。
- en: In practice, this means developing context templates that mirror how experts
    in a domain naturally organize information. For financial analysis, this might
    mean starting with market context, then moving to company-specific information,
    then to the specific metric or event being analyzed. For medical diagnosis, it
    might mean patient history, followed by current symptoms, followed by relevant
    medical literature.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，这意味着开发上下文模板，以反映领域专家自然组织信息的方式。对于财务分析，这可能意味着从市场背景开始，然后转向特定公司的信息，接着是正在分析的特定指标或事件。对于医学诊断，这可能意味着患者病史，然后是当前症状，最后是相关的医学文献。
- en: 'But here’s where it gets interesting: the optimal organization pattern isn’t
    fixed. It should adapt based on the complexity and type of query. Simple factual
    questions can handle more loosely organized context, while complex analytical
    tasks require more structured information hierarchies.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: 'Context Evolution: Making AI Systems Conversational'
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The third layer context evolution is the most challenging but also the most
    important one. The majority of existing systems consider each interaction to be
    independent; therefore, they recreate the context from zero for each query. Yet
    providing effective human communication requires preserving and evolving shared
    context as part of a conversation or workflow.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: But architecture that evolves the context in which the AI system runs will be
    another matter; what gets shifted is how to manage its state in one kind of space
    of possibilities. We’re not simply maintaining data state we’re also maintaining
    understanding state.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: This “context memory” — a structured representation of what the system has figured
    out in past interactions — became part of our Document Response system. The system
    doesn’t treat the new query as if it exists in isolation when a user asks a follow-up
    question.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: It considers how the new query relates to the previously established context,
    what assumptions can be carried forward, and what new information needs to be
    integrated.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: This approach has profound implications for user experience. Instead of having
    to re-establish context with every interaction, users can build on previous conversations,
    ask follow-up questions that assume shared understanding, and engage in the kind
    of iterative exploration that characterizes effective human-AI collaboration.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 'The Economics of Context: Why Efficiency Matters'
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The cost of reading context is proportional to computational power, and it might
    soon become cost-prohibitive to maintain complex AI applications that are ineffective
    in reading context.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: 'Do the math: If your context window involves 8,000 tokens, and you have some
    1,000 queries per day, you are eating up 8 million tokens per day for context
    only. At present pricing systems, the cost of context inefficiency can easily
    dwarf the cost of the task generation itself.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: But the economics extend beyond the direct costs of computation. A bad context
    management directly causes slower response time and thus worse user experience
    and less system usage. It also increases the probability of repeating errors,
    which has downstream costs in user’s confidence and manual patches created to
    fix issues.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: The most successful AI implementations I’ve observed treat context as a constrained
    resource that requires careful optimization. They implement context budgeting—explicit
    allocation of context space to different types of information based on query characteristics.
    They use context compression techniques to maximize information density. And they
    implement context caching strategies to avoid recomputing frequently used information.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Measuring Context Effectiveness
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 衡量上下文有效性
- en: One of the challenges in context engineering is developing metrics that actually
    correlate with system effectiveness. Traditional information retrieval metrics
    like precision and recall are necessary but not sufficient. They measure whether
    we’re retrieving relevant information, but they don’t measure whether we’re providing
    useful context.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在上下文工程中，一个挑战是开发与系统有效性真正相关的指标。传统的信息检索指标，如精确率和召回率，是必要的，但并不充分。它们衡量我们是否检索到了相关信息，但它们并不衡量我们是否提供了有用的上下文。
- en: '![](../Images/cc66f294f85947e6ee4d050cbbf0b97c.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cc66f294f85947e6ee4d050cbbf0b97c.png)'
- en: '*Context efficiency peaks at optimized context. Adding more tokens doesn’t
    always improve precision or recall, and can reduce overall efficiency.* *Author-generated
    image using AI*'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '*上下文效率在优化上下文中达到顶峰。增加更多标记并不总是提高精确率或召回率，有时甚至可能降低整体效率。* *作者使用AI生成的图像*'
- en: 'In our implementations, we’ve found that the most predictive metrics are often
    behavioral rather than accuracy-based. Context effectiveness correlates strongly
    with user engagement patterns: how often users ask follow-up questions, how frequently
    they act on system recommendations, and how often they return to use the system
    for similar tasks.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的实现中，我们发现最具预测性的指标通常是行为性的，而不是基于准确性的。上下文有效性与用户参与模式密切相关：用户提出后续问题的频率，他们执行系统推荐的频率，以及他们返回使用系统执行类似任务的频率。
- en: We’ve also implemented what we call “context efficiency metrics”; it measures
    of how much value we’re extracting per token of context consumed. High-performing
    context strategies consistently provide actionable insights with minimal information
    overhead.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还实施了所谓的“上下文效率指标”；它衡量的是我们每消耗一个上下文标记所能提取的价值。表现优异的上下文策略始终以最小的信息开销提供可操作见解。
- en: Perhaps most importantly, we measure context evolution effectiveness by tracking
    how system performance improves within conversational sessions. Effective context
    engineering should lead to better answers as conversations progress, as the system
    builds more sophisticated understanding of user needs and situational requirements.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 也许最重要的是，我们通过跟踪会话中系统性能的改进来衡量上下文演化的有效性。有效的上下文工程应该随着对话的进行而提高答案质量，因为系统对用户需求和情境要求的理解变得更加复杂。
- en: The Tools and Techniques of Context Engineering
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文工程的工具和技术
- en: 'Developing effective context engineering requires both new tools and also new
    ways to think about old tools. New tools are developed and available every month,
    but the strategies that ultimately work in production seem to match familiar patterns:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 开发有效的上下文工程需要新的工具和思考旧工具的新方法。新工具每月都在开发和可用，但最终在生产中奏效的策略似乎符合熟悉的模式：
- en: '**Context routers** make decisions dynamically based on identifying query elements.
    Instead of fixed retrieval strategies, they assess components of the query like
    f intent, effort complexity, and situational considerations. This is to devise
    strategies based on some form of optimization to select and organize information.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文路由器**根据识别查询元素动态做出决策。而不是固定的检索策略，它们评估查询的组件，如意图、努力复杂性和情境考虑。这是为了基于某种形式的优化来选择和组织信息。'
- en: '**Context compressors** borrow from information theory and create what I think
    of as max logic to incorporate maximally impute density factor within a context
    window. These are not merely text summarisation tools, these are systems that
    attend to storing the most contextually rich information and reduce noise as well
    as redundancy.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文压缩器**借鉴信息理论，创建了我认为的最大逻辑，以在上下文窗口内最大程度地推断密度因子。这些不仅仅是文本摘要工具，它们是关注存储最丰富上下文信息并减少噪声以及冗余的系统。'
- en: '**Context state managers** develop structured representations about conversational
    state  and workflow state – so that AI systems learn, rather than are born anew
    with each different intervention or component of interaction.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文状态管理器**开发关于对话状态和工作流程状态的有序表示——这样AI系统就可以学习，而不是每次干预或交互的组件都重新开始。'
- en: Context engineering requires thinking about AI systems as partners in ongoing
    conversations rather than oracle systems that respond to isolated queries. This
    changes how we design interfaces, how we structure data, and how we measure success.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文工程需要将AI系统视为持续对话中的合作伙伴，而不是仅对孤立查询做出响应的先知系统。这改变了我们设计界面、结构化数据和衡量成功的方式。
- en: 'Looking Forward: Context as Competitive Advantage'
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 展望未来：上下文作为竞争优势
- en: As AI functionality becomes more standardized, context engineering is becoming
    our differentiator.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI功能的标准化，上下文工程正成为我们的差异化因素。
- en: AI applications may not employ more advanced model architectures or more complex
    algorithms. Rather, they enhance existing capabilities further for greater value
    and reliability through better context engineering.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: AI应用可能不会采用更先进的模型架构或更复杂的算法。相反，它们通过更好的上下文工程进一步增强现有能力，以实现更大的价值和可靠性。
- en: The implications run deeper than the specific environment in which implementations
    take place, to one’s organizational strategy. Companies that focus on context
    engineering as a core competency as part of their differentiated organizational
    strategy, will outperform competitors who simply emphasize their model capabilities
    and not their information architectures, user workflows and domain-specific reasoning
    patterns.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 其影响远不止于实施的具体环境，还涉及到组织的战略。那些将上下文工程作为核心能力的一部分，作为其差异化组织战略的公司，将优于那些仅仅强调其模型能力而不强调其信息架构、用户工作流程和特定领域推理模式竞争力的竞争对手。
- en: 'A [new survey analyzing over 1,400 AI papers](https://arxiv.org/pdf/2507.13334)
    has found something quite interesting: we’ve been thinking about AI context completely
    wrong. While everyone’s been obsessing over bigger models and longer context windows,
    researchers discovered that our AIs are already amazing at understanding complex
    information, they just suck at using it properly. The real bottleneck isn’t model
    intelligence; it’s how we feed information to these systems.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 一项分析超过1400篇AI论文的新调查（[链接](https://arxiv.org/pdf/2507.13334)）发现了一些相当有趣的事情：我们一直对AI上下文的理解完全错误。当每个人都沉迷于更大的模型和更长的上下文窗口时，研究人员发现，我们的AI在理解复杂信息方面已经非常出色，但它们在正确使用这些信息方面却做得不好。真正的瓶颈不是模型智能；而是我们如何向这些系统提供信息。
- en: Conclusion
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The failure that started this exploration taught me that building effective
    AI systems isn’t primarily about having the best models or the most sophisticated
    algorithms. It’s about understanding and engineering the flow of information in
    ways that enable effective decision-making.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 导致这次探索失败的经验教会我，构建有效的AI系统并不仅仅在于拥有最好的模型或最复杂的算法。它关乎理解和工程化信息流动，以便实现有效的决策。
- en: Context engineering is becoming the differentiator for AI systems that provide
    real value, versus those that remain interesting demos.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文工程正在成为提供真正价值的AI系统与仅仅保持有趣演示的AI系统之间的差异化因素。
- en: The future of AI is not creating systems that understand everything, it is creating
    systems that accurately understand what the system should pay attention to, when
    to pay attention, and how that attention can be converted to action and insight.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: AI的未来不是创建理解一切的系统，而是创建能够准确理解系统应该关注什么、何时关注以及如何将这种关注转化为行动和洞察的系统。
