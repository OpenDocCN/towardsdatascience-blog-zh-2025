- en: Automate Supply Chain Analytics Workflows with AI Agents using n8n
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/automate-supply-chain-analytics-workflows-with-ai-agents-using-n8n/](https://towardsdatascience.com/automate-supply-chain-analytics-workflows-with-ai-agents-using-n8n/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why build things the hard way when you can design them the smart way?
  prefs: []
  type: TYPE_NORMAL
- en: As a Supply Chain Data Scientist, I’ve explored various frameworks like LangChain
    and LangGraph to build AI agents using Python.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c08c64e004752ee9a0201a23ffc30c08.png)'
  prefs: []
  type: TYPE_IMG
- en: Leveraging LLMs with LangChain for Supply Chain Analytics — A Control Tower
    Powered by GPT — (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The illustration above is from an article I wrote at the end of 2023, titled
    “Leveraging LLMs with LangChain for Supply Chain Analytics — A Control Tower Powered
    by GPT.”
  prefs: []
  type: TYPE_NORMAL
- en: At the time, I was exploring how to use LangChain to build an agent acting as
    a Supply Chain Control Tower.
  prefs: []
  type: TYPE_NORMAL
- en: A year later, I discovered the power of the low-code platform n8n to build the
    same kind of solution in just a few clicks.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cbca6f1aab92c0da813a31627beab13c.png)'
  prefs: []
  type: TYPE_IMG
- en: AI-Powered Email Parser used for the processing of Warehouse Orders received
    by Email — (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we’ll explore how to easily build AI agents to automate supply
    chain analytics workflows using n8n.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3872287fe2b66c0c67f36988a814e2f2.png)'
  prefs: []
  type: TYPE_IMG
- en: AI Agent for Supply Chain Control Tower — (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: We’ll also see how to deploy the same AI-powered Control Tower agent I originally
    built with LangChain 18 months ago — now using only low-code.
  prefs: []
  type: TYPE_NORMAL
- en: AI Agent for Supply Chain Control Towers using LangChain
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: My first project of an AI automation project using n8n was for a customer who
    wanted a Supply Chain Control Tower equipped with a chat interface.
  prefs: []
  type: TYPE_NORMAL
- en: '**A Supply Chain Control Tower** is a set of dashboards and reports connected
    to Warehouse and Transport Management Systems that use data to monitor critical
    events across the supply chain.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e865ac7c655fe77a94aa7894690485cc.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of a control
  prefs: []
  type: TYPE_NORMAL
- en: '[In an earlier article published on Towards Data Science](https://towardsdatascience.com/leveraging-llms-with-langchain-for-supply-chain-analytics-a-control-tower-powered-by-gpt-21e19b33b5f0/),
    I experimented with LangChain to connect a control tower to an AI agent.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1f889973aaa41f329cb26c1ce201a2fe.png)'
  prefs: []
  type: TYPE_IMG
- en: High-Level Overview of the Solution presented in the article — (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The idea was to build a plan-and-execute agent that would
  prefs: []
  type: TYPE_NORMAL
- en: Process the user’s request written in plain English
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generate the appropriate SQL query
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Query the database and store the results
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Formulate a clear response in plain English
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After several iterations, I found the right chain structure and prompts to deliver
    accurate results.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0369ee9e9faeae3e00aa8f8fa7b96949.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of iterations that you can find in the article — (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The solution worked well because I had already gained experience using LangChain
    and other frameworks to build AI agents.
  prefs: []
  type: TYPE_NORMAL
- en: '*How are we supposed to maintain this complex setup?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: However, to offer this as a service, I needed tools that would make the solution
    easier to deploy, maintain, and improve — even with limited Python knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: That’s when I discovered n8n.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dive into that in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: AI Agent for Supply Chain Control Towers — Built with n8n
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What is n8n?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: n8n is an open-source workflow automation tool that lets you easily connect
    apps (email, CRMs, messaging systems), APIs, and AI model frameworks like LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: You build workflows by connecting pre-built nodes.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cbca6f1aab92c0da813a31627beab13c.png)'
  prefs: []
  type: TYPE_IMG
- en: AI-Powered Email Parser using 4 nodes — (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: For instance, the workflow above **processes emails**
  prefs: []
  type: TYPE_NORMAL
- en: The first node collects emails from a Gmail account.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The email content and metadata are sent to the AI Agent node, which extracts
    the relevant information.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The third node processes the output using JavaScript.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The final node loads the results into a Google Sheet.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No code was needed to build this workflow — except for the third node, which
    uses just two lines of JavaScript.
  prefs: []
  type: TYPE_NORMAL
- en: Since I work with a team of Supply Chain consultants who have limited Python
    skills, this was a game-changer for me as I looked to develop my service offering.
  prefs: []
  type: TYPE_NORMAL
- en: They can easily use, adapt, and maintain this workflow after a short training
    session on n8n.
  prefs: []
  type: TYPE_NORMAL
- en: AI Supply Chain Control Tower n8n workflow
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The AI Supply Chain Control Tower workflow is a bit more complex — but still
    far simpler than its Python version.
  prefs: []
  type: TYPE_NORMAL
- en: It includes two sub-workflows.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ddb623d84eb25263f6b2643bcdf696ba.png)'
  prefs: []
  type: TYPE_IMG
- en: Main sub-workflow including the AI agent — (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The main sub-workflow includes both a chat interface and the AI agent.
  prefs: []
  type: TYPE_NORMAL
- en: For the AI Agent node, you need to
  prefs: []
  type: TYPE_NORMAL
- en: Connect an LLM (chat model) using a node where you enter your API credentials
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add a memory node to manage the conversation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add a tool node for SQL querying, linked to the second sub-workflow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The AI agent generates an SQL query and sends it to the “Call Query Tool” node,
    which executes the query.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c9f237d88b717939495f3eb3ec885c64.png)'
  prefs: []
  type: TYPE_IMG
- en: Second sub-workflow connected via the “Call Query Tool” — (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The sub-workflow includes a code node that cleans the query (removing extra
    spaces and blocking risky commands like DELETE).
  prefs: []
  type: TYPE_NORMAL
- en: The output is sent to a **BigQuery node**, which runs the query and returns
    the results.
  prefs: []
  type: TYPE_NORMAL
- en: 'The process is very smooth and requires limited configuration:'
  prefs: []
  type: TYPE_NORMAL
- en: System Prompt (in the AI Agent node)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: User Prompt (in the AI Agent Node)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/ed6203dba48216924231ef3418eb6fb5.png)'
  prefs: []
  type: TYPE_IMG
- en: System Prompt Window of the AI Agent Node — (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: This setup requires no Python skills and can be handled directly by my consultants.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/302e025ac0e7c6cd5f2a6b139b9352dd.png)'
  prefs: []
  type: TYPE_IMG
- en: Chat Window showing an interraction with the AI Agent — (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The results are comparable to those of the Python version.
  prefs: []
  type: TYPE_NORMAL
- en: For step-by-step setup instructions, check out my YouTube tutorial 👇
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This example shows how easy it is to replicate an AI agent built with Python — using
    n8n and minimal code.
  prefs: []
  type: TYPE_NORMAL
- en: '**Does that mean Python is no longer needed for Supply Chain Analytics? Definitely
    not!**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Like many low-code platforms, the features are limited to what is available
    within the framework.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why I use it as a complement to my analytics products.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9b81d5f7ffbca96872b02be141892d4e.png)'
  prefs: []
  type: TYPE_IMG
- en: Connect an AI Agent with one of my analytics products’ backend using an HTTP
    node — (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: To do that, you can use the HTTP Request node to connect your workflow to your
    analytics backend.
  prefs: []
  type: TYPE_NORMAL
- en: What else? Easy connectivity to many services.
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Another reason I chose n8n to enrich my analytics products is how easy it is
    to add additional connections.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if you want to add a Slack interface or log conversations to a
    Google Sheet, just add a new node to your workflow.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re starting your n8n journey and need inspiration, [feel free to explore
    my templates.](https://n8n.io/creators/samirsaci/)
  prefs: []
  type: TYPE_NORMAL
