- en: Air for Tomorrow: Why Openness in Air Quality Research and Implementation Matters
    for Global Equity
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 明天的空气：为什么空气质量研究和实施中的开放性对全球公平至关重要
- en: 原文：[https://towardsdatascience.com/air-for-tomorrow-why-openness-in-air-quality-research-and-implementation-matters-for-global-equity/](https://towardsdatascience.com/air-for-tomorrow-why-openness-in-air-quality-research-and-implementation-matters-for-global-equity/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/air-for-tomorrow-why-openness-in-air-quality-research-and-implementation-matters-for-global-equity/](https://towardsdatascience.com/air-for-tomorrow-why-openness-in-air-quality-research-and-implementation-matters-for-global-equity/)
- en: <mdspan datatext="el1756335636164" class="mdspan-comment">Studies have shown</mdspan>
    that 99% of the global population breathes air that exceeds WHO annual limits[[1]](#_ftn1),
    causing $6 trillion in global yearly health costs as per the World Bank[[2]](#_ftn2),
    with 9 out of 10 deaths attributed to outdoor air pollution in low- and middle-income
    countries[[3]](#_ftn3). The current air quality research and monitoring approach
    faces issues with proprietary models, closed datasets, and inaccessible research
    outputs. The massive scale of this socio-economic challenge underpins the need
    for collaborative, scalable, and equitable solutions to tackle air pollution,
    which has never been more urgent.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756335636164" class="mdspan-comment">研究表明</mdspan>，全球99%的人口呼吸的空气超过了世界卫生组织年度限制[[1]](#_ftn1)，根据世界银行的统计[[2]](#_ftn2)，每年造成6万亿美元的健康成本，其中90%的死亡归因于低收入和中等收入国家的室外空气污染[[3]](#_ftn3)。当前的空气质量研究和监测方法在专有模型、封闭数据集和不可访问的研究成果方面存在问题。这一社会经济的巨大规模为解决空气污染问题提供了合作、可扩展和公平的解决方案的需求，这一问题从未如此紧迫。
- en: The principle of Open Source can be a solution. Instead of keeping critical
    information on air quality data and methods locked behind paywalls, with restrictive
    access to proprietary algorithms and tools, siloed air quality databases, an open
    approach is transforming how we research, understand, and act on the air quality[[4]](#_ftn4).
    This methodology not only makes the process more inclusive but also makes it more
    adaptable and transparent. With this objective, we explore the value of open approaches
    in air quality science, why they are crucial for equity and innovation, and how
    they are already transforming how we understand and respond to environmental threats.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 开源原则可以是一个解决方案。而不是将关键的空气质量数据和方法的临界信息锁在付费墙后，限制对专有算法和工具的访问，以及孤立的空气质量数据库，开放的方法正在改变我们对空气质量的研究、理解和行动。这种方法不仅使过程更具包容性，而且使它更具适应性和透明度。为此，我们探讨了开放方法在空气质量科学中的价值，为什么它们对公平和创新至关重要，以及它们如何正在改变我们对环境和威胁的理解和反应。
- en: We at UNICEF Lao PDR Country Office[[5]](#_ftn5) have collaborated with UNICEF
    East Asia Pacific’s Frontier Data Lab, UNICEF Office of Innovation[[6]](#_ftn6),
    and AQAI[[7]](#_ftn7) to showcase the role of open-source technologies in air
    quality monitoring.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在老挝人民民主共和国联合国儿童基金会国家办公室[[5]](#_ftn5)与联合国儿童基金会东亚太平洋地区前沿数据实验室、联合国儿童基金会创新办公室[[6]](#_ftn6)和AQAI[[7]](#_ftn7)合作，展示了开源技术在空气质量监测中的作用。
- en: Here, we are launching a multi-part blog series to understand the world and
    value of open approaches in air quality science. We start with how open-source
    data and tools are used in air quality monitoring. Later in the series, we will
    do a deep dive into open-source modelling and share the experience of how such
    systems can help ensure environmental justice.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们启动了一个多部分博客系列，以了解开放方法在空气质量科学中的世界和价值。我们首先探讨开源数据和工具在空气质量监测中的应用。在系列的后续部分，我们将深入探讨开源建模，并分享这些系统如何帮助确保环境正义的经验。
- en: On the technical side, we delve into the world of open source, open data and,
    open methods and provide a slice of how they are used in real-world use cases
    for leading humanitarian organisations, especially UNICEF, the United Nations
    agency for children, working to protect the rights of every child, especially
    the most disadvantaged and those hardest to reach[[8]](#_ftn8).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在技术方面，我们深入开源、开放数据和开放方法的世界，并展示它们在领先的人道组织，特别是联合国儿童基金会（UNICEF）等实际应用案例中的使用情况，联合国儿童基金会是联合国负责保护每个儿童权利的机构，特别是最弱势和最难接触到的儿童[[8]](#_ftn8)。
- en: 'Open source, open methods, and open data are three interconnected pillars of
    openness in research and technology:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 开源、开放方法和开放数据是研究和技术中开放性的三个相互关联的支柱：
- en: '**Open Data:**  It refers to data that is freely available, accessible, and
    reusable by anyone. This method allows researchers, policymakers, and communities
    to build on the same evidence base.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开放数据**：它指的是任何人都可以自由获取、访问和重复使用的数据。这种方法允许研究人员、政策制定者和社区基于相同的证据基础进行建设。'
- en: '**Open Methods:** The processes, algorithms, and workflows used to analyse
    or interpret that data are transparent and shareable, so others can understand,
    replicate, and improve them.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开放方法**：用于分析或解释这些数据的过程、算法和工作流程是透明和可共享的，这样其他人就可以理解、复制和改进它们。'
- en: '**Open Source:** The software or tools implementing these methods are released
    under open licenses, enabling anyone to inspect, use, modify, and redistribute
    them.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开源**：实现这些方法的软件或工具在开放许可下发布，使任何人都可以检查、使用、修改和重新分发它们。'
- en: So, how are they related?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，它们之间有什么关系呢？
- en: Open data provides the raw material, open methods define *how* that material
    is processed, and open source ensures the tools that carry out those methods are
    accessible and adaptable. Together, they create a transparent, reproducible, and
    collaborative ecosystem for knowledge creation.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 开放数据提供了原材料，开放方法定义了如何处理这些材料，而开源确保了执行这些方法的工具是可访问和可适应的。共同创造了一个透明、可重复和协作的知识创造生态系统。
- en: The Case for Openness in Air Quality Science
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 空气质量科学中开放性的案例
- en: '1\. Open Data: Breaking Barriers to Access'
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 开放数据：打破访问障碍
- en: Access to high-quality air pollution data is the foundation for research, public
    engagement, and evidence-based policymaking. Yet, in many regions, especially
    across the Global South, real-time or historical data is unavailable, locked behind
    paywalls, or shared only through cumbersome bureaucratic channels.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 高质量空气污染数据的获取是研究、公众参与和基于证据的政策制定的基础。然而，在许多地区，尤其是在全球南方，实时或历史数据不可用，被付费墙封锁，或者只能通过繁琐的官僚渠道共享。
- en: '![](../Images/cb8b27fc33e236529809e0952b7c7a5e.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cb8b27fc33e236529809e0952b7c7a5e.png)'
- en: 'Figure 2: OpenAQ Data Access Portal showcasing the location of sensors globally
    available there.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：OpenAQ数据访问门户展示了全球可用的传感器位置。
- en: 'Image Courtesy: OpenAQ.org'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：OpenAQ.org
- en: '**Open data democratizes access.** Initiatives like [OpenAQ](https://openaq.org)
    aggregate air quality data from over 100+ countries, making millions of data points
    freely available through APIs[[9]](#_ftn9). Several satellite datasets, such as
    from NASA (e.g., MODIS, VIIRS), ESA’s Sentinel missions, and India’s NCAP portal,
    also provide open or semi-open access to observing aerosol and particulate matter.
    Data repositories like Google Earth Engine and Mozilla’s Environmental Data Commons
    enable large-scale petabyte-scale geospatial data analyses without requiring licensing
    costs for non-commercial use. Furthermore, open data portals (with open APIs)
    such as OPenDAP[[10]](#_ftn10) and STAC[[11]](#_ftn11) do not need third-party
    licenses and locking arrangements like in the case of Google Earth Engine. With
    the satellite and ground-level datasets that are open and available, the main
    barrier is the standardisation of these datasets and data points. Clearer metadata,
    time resolution, and units are needed to ensure platform interoperability. Even
    then, initiatives like OpenAQ would not be possible without the support of countries
    willing to make it public.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**开放数据实现了访问的民主化**。像[OpenAQ](https://openaq.org)这样的倡议从100多个国家收集空气质量数据，通过API使数百万数据点免费可用[[9]](#_ftn9)。来自NASA（例如，MODIS、VIIRS）、ESA的哨兵任务和印度的NCAP门户等几个卫星数据集也提供了开放或半开放访问，用于观测气溶胶和颗粒物。像Google
    Earth Engine和Mozilla的环境数据共享这样的数据存储库使大规模的PB级地理空间数据分析成为可能，无需为非商业用途支付许可费用。此外，像OPenDAP[[10]](#_ftn10)和STAC[[11]](#_ftn11)这样的开放数据门户（具有开放API）不需要第三方许可和锁定安排，就像Google
    Earth Engine的情况一样。有了开放和可用的卫星和地面数据集，主要的障碍是这些数据集和数据点的标准化。需要更清晰的元数据、时间分辨率和单位，以确保平台互操作性。即便如此，没有愿意公开这些数据的国家的支持，像OpenAQ这样的倡议也是不可能实现的。'
- en: '2\. Open Source: Tools that Scale Across Contexts'
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 源代码：跨情境扩展的工具
- en: Open source provides an alternative and an opportunity to build air quality
    forecasting tools, visualisation platforms, or even basic analytics pipelines,
    which are usually difficult for smaller institutions or local governments to afford.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 开源提供了一个替代方案和机会，可以构建空气质量预测工具、可视化平台，甚至基本的分析管道，这些通常对小机构或地方政府来说难以负担。
- en: UNICEF Laos PDR and Frontier Data Lab have made significant strides in estimating
    air quality using an open-source machine learning model[[12]](#_ftn12) in the
    East Asia Pacific Region of Lao PDR. This work is the initial step towards creating
    a scalable, global solution for air quality estimation, aligning with the Global
    Digital Compact and the UN’s commitment to leveraging technology and AI to advance
    the Sustainable Development Goals.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 联合国儿童基金会老挝人民民主共和国和Frontier Data Lab在老挝人民民主共和国东亚太平洋地区使用开源机器学习模型[[12]](#_ftn12)估计空气质量方面取得了显著进展。这项工作是创建可扩展的全球空气质量估计解决方案的第一步，与全球数字契约和联合国利用技术和AI推进可持续发展目标承诺相一致。
- en: AQAI, for instance, contributes to the open-source ecosystem by developing a
    modular data loader pipeline that integrates satellite and ground sensors into
    AI models. UNICEF’s Office of Innovation has supported this initiative at AQAI.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，AQAI通过开发一个模块化数据加载管道，将卫星和地面传感器集成到AI模型中，为开源生态系统做出了贡献。联合国儿童基金会创新办公室支持了AQAI的这个倡议。
- en: A global repository of air quality models, adapted to various geographies, is
    crucial for improving environmental monitoring. This shared resource, explicitly
    meant for climate and pollution models, can be hosted in a platform like Hugging
    Face, which can make it more accessible to a larger community and significantly
    lower barriers for countries lacking in-house AI expertise or infrastructure.
    Such a repository would empower local researchers, public health officials, and
    environmental agencies by offering access to pre-trained models, documentation,
    and standardized tools. This mechanism would enable them to deploy advanced AI
    solutions without extensive computational resources or highly specialised technical
    teams. This democratisation of AI would accelerate data-driven decision-making
    in low-resource settings, foster global collaboration, and ensure all countries,
    regardless of their resources, can benefit from the latest advancements in environmental
    monitoring, public health, and sustainable development.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一个适用于各种地理环境的空气质量模型全球仓库对于改善环境监测至关重要。这个专门用于气候和污染模型的共享资源，可以托管在像Hugging Face这样的平台上，这将使其对更广泛的社区更加易于访问，并显著降低缺乏内部AI专业知识或基础设施的国家进入门槛。这样一个仓库将通过提供预训练模型、文档和标准化工具，赋予当地研究人员、公共卫生官员和环境机构权力。这种机制将使他们能够在没有大量计算资源或高度专业化的技术团队的情况下部署先进的AI解决方案。这种AI民主化将加速资源匮乏环境中的数据驱动决策，促进全球合作，并确保所有国家，无论其资源如何，都能从环境监测、公共卫生和可持续发展方面的最新进展中受益。
- en: '3\. Open Methods: Building Trust Through Transparency'
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 开放方法：通过透明度建立信任
- en: Reproducibility is a core part of scientific progress. Air quality research
    is essential because the results often influence public health and city planning.
    That is why open methods matter—sharing the code, data, assumptions, and steps
    behind a study helps others check the results and build on the work. Open methods
    are even more important when using AI or machine learning, which can be hard to
    understand if the process is not fully explained. Some groups already do this
    well. For example, GEOS-Chem[^([13])](#_ftn13) is a globally recognised three-dimensional
    atmospheric chemistry model that uses meteorological data from NASA’s Goddard
    Earth Observing System (GEOS), managed by the Global Modelling and Assimilation
    Office. Widely used by hundreds of research groups worldwide, the model supports
    a broad spectrum of studies on atmospheric composition. Its design includes regional
    refinement and parallel computing capabilities, allowing for efficient, high-resolution
    simulations.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 可重复性是科学进步的核心部分。空气质量研究至关重要，因为其结果往往会影响公共健康和城市规划。这就是为什么开放方法是重要的——分享研究背后的代码、数据、假设和步骤，有助于他人检查结果并在此基础上开展工作。当使用AI或机器学习时，开放方法尤为重要，如果过程没有完全解释，这些技术可能难以理解。一些团体已经做得很好。例如，GEOS-Chem[^([13])](#_ftn13)是一个全球公认的三维大气化学模型，它使用美国国家航空航天局戈达德地球观测系统（GEOS）的气象数据，由全球建模和同化办公室管理。该模型被全球数百个研究小组广泛使用，支持对大气成分的广泛研究。其设计包括区域细化和平行计算能力，允许进行高效、高分辨率模拟。
- en: As a community-driven, open-access model, GEOS-Chem is maintained collectively
    by its users, who are encouraged to engage with its development and adhere to
    responsibilities outlined on the new user welcome page. Prospective users are
    invited to consult the model’s comprehensive documentation and support resources
    before getting started.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 作为由社区驱动的开放获取模式，GEOS-Chem是由其用户共同维护的，鼓励用户参与其开发并遵守新用户欢迎页面上的责任概述。预期用户在开始之前被邀请查阅模型的全面文档和支持资源。
- en: Despite recent advances, many AI-based models continue functioning as “black
    boxes,” with few studies openly sharing key details such as hyperparameters, training
    code, or data preprocessing steps. Journals and funding agencies can be crucial
    in improving transparency by enforcing stronger requirements for open and reproducible
    methods.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管取得了最近进展，但许多基于AI的模型仍然作为“黑箱”运行，很少有研究公开分享关键细节，如超参数、训练代码或数据预处理步骤。期刊和资助机构可以通过强制执行对开放和可重复方法更强的要求来在提高透明度方面发挥关键作用。
- en: Open Approaches Enable Faster, More Equitable Responses
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 开放方法能够实现更快、更公平的响应
- en: Openness is not just about principles; it is about **practical outcomes**.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 开放不仅仅是关于原则；它关乎**实际成果**。
- en: '**Rapid Crisis Response**: When wildfires swept across the state of California
    in the United States[14] and across Australia[15], the open satellite data enabled
    real-time air quality maps to be disseminated widely, which warned millions of
    residents. In LMICs, where air sensors are sparse, open remote sensing data-based
    models often provide the only viable solution for alerts[16].'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**快速危机响应**：当野火横扫美国加利福尼亚州[14]和澳大利亚[15]时，开放的卫星数据使得实时空气质量地图得以广泛传播，警告了数百万居民。在空气传感器稀少的LMICs（低中等收入国家），基于开放遥感数据的模型通常提供了唯一的可行警报解决方案[16]。'
- en: '**Community Empowerment**: Citizen science initiatives from Delhi to Ulaanbaatar[17]
    are increasingly adopting open-source tools to create their air quality maps.
    Organisations like Air Gradient and OpenAQ run community programs, like the Clean
    Air Advocates and the Community Ambassadors Program, to increase collective action
    by the community. Through Air Gradient’s program, individuals are trained with
    practical approaches to improve air quality and reduce emissions. OpenAQ‘s program
    also trains air quality advocates to utilize air quality monitoring data to support
    the community in fighting air pollution.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**社区赋权**：从德里到乌兰巴托[17]的公民科学倡议越来越多地采用开源工具来创建他们的空气质量地图。像Air Gradient和OpenAQ这样的组织运行社区项目，如清洁空气倡导者和社区大使计划，以增加社区的集体行动。通过Air
    Gradient的项目，个人接受了提高空气质量和减少排放的实际方法的培训。OpenAQ的项目也培训空气质量倡导者利用空气质量监测数据来支持社区对抗空气污染。'
- en: '**Health Research at Scale**: Epidemiologists studying the long-term health
    impacts of air pollution can leverage a growing ecosystem of open-source tools
    and freely available datasets.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**大规模健康研究**：研究空气污染长期健康影响的环境流行病学家可以利用不断增长的开放源代码工具和免费数据集。'
- en: Challenges and the Road Ahead
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 挑战与未来道路
- en: 'While openness has delivered significant gains, a few challenges remain:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然开放已经带来了显著收益，但仍然存在一些挑战：
- en: '**Data Quality and Completeness:** Open doesn’t always mean reliable. Standardising
    calibration protocols and creating validation frameworks for low-cost sensors
    is still a work in progress. Moreover, convincing government data owners to opt
    for open-sourcing their data is not yet streamlined. Many countries still do not
    make it public.'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据质量和完整性**：开放并不总是意味着可靠。标准化校准协议和为低成本传感器创建验证框架仍然是正在进行的工作。此外，说服政府数据所有者选择开源其数据的过程尚未简化。许多国家仍然不公开这些数据。'
- en: '**Licensing Ambiguities:** Many “open” datasets have vague or restrictive licenses
    that deter reuse. Harmonising licensing (e.g., adopting Creative Commons or Open
    Data Commons standards) would enable collaboration.'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**许可模糊性**：许多“开放”数据集具有模糊或限制性的许可，这阻碍了重用。统一许可（例如，采用创意共享或开放数据共同标准）将能够促进合作。'
- en: '**Sustainability of Open Initiatives:** Many open-source projects rely on short-term
    grants or volunteer labour. Long-term funding mechanisms and public-private partnerships
    are needed to sustain this ecosystem.'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**开源项目的可持续性**：许多开源项目依赖于短期资助或志愿者劳动。需要长期资金机制和公私合作伙伴关系来维持这个生态系统。'
- en: '* * *'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Current Work and Promising Initiatives
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当前工作和有希望的项目
- en: 'Many promising efforts are addressing these gaps:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 许多有希望的努力正在解决这些差距：
- en: 🌍 **The Clean Air Fund** and **OpenAQ[^(**^([18])**)](#_ftn18)** are working
    together to build country-level open air quality ecosystems, especially in Africa
    and Asia.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 🌍 **清洁空气基金** 和 **OpenAQ[^(**^([18])**)](#_ftn18)** 正在合作构建国家层面的开放空气质量生态系统，尤其是在非洲和亚洲。
- en: 🤝 **UNICEF Office of innovation, Venture Fund** supports startups like AQAI[^([19])](#_ftn19),
    and **UNICEF teams such as** Frontier Data Lab, UNICEF Lao PDR Country Offices,
    which are building open-source GeoAI tools for air pollution estimation using
    remote sensing and AI.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 🤝 **联合国儿童基金会创新办公室、风险投资基金** 支持像 AQAI[^([19])](#_ftn19) 这样的初创公司，以及 **联合国儿童基金会团队**，如前沿数据实验室、联合国儿童基金会老挝国家办公室，他们正在使用遥感技术和人工智能构建开源GeoAI工具，用于空气污染估计。
- en: 🧑‍🤝‍🧑 **Open Environmental Data Coalitions** like [Open Climate](https://openclimate.network)[^([20])](#_ftn20)
    are bringing together stakeholders to co-create standards and repositories.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 🧑‍🤝‍🧑 **开放环境数据联盟** 如 [Open Climate](https://openclimate.network)[^([20])](#_ftn20)
    正在将利益相关者聚集在一起，共同创建标准和存储库。
- en: '* * *'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Call For Action: Openness as a Public Good'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 行动呼吁：开放性作为公共福祉
- en: Exciting work is being developed with UNICEF East Asia Pacific’s Frontier Data
    Lab and the Lao PDR Country Office. A shoutout to academic partners like the National
    University of Laos as we co-develop the next stage.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 与联合国儿童基金会东亚太平洋地区前沿数据实验室和老挝国家办公室合作，正在进行令人兴奋的工作。向学术合作伙伴如老挝国立大学致敬，我们共同开发下一阶段。
- en: '**Air for Tomorrow:** We must realise air pollution is a global crisis, but
    its solutions must be local, inclusive, and adaptive. Embracing open data, open
    source, and open methods accelerates innovation and ensures **no one is left behind**
    in the fight for clean air.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**明天的空气**：我们必须认识到空气污染是一个全球危机，但其解决方案必须是地方性的、包容性的和适应性强的。拥抱开放数据、开源和开放方法可以加速创新，并确保
    **没有人被遗留在清洁空气的斗争中**。'
- en: If the future of environmental health is to be just, resilient, and data-driven,
    it must also be **radically open**.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果环境健康的未来要公正、有弹性和数据驱动，它也必须是 **彻底开放的**。
- en: '**“We all breathe.”**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**“我们都在呼吸。”**'
- en: Stay tuned for our upcoming articles on the air quality digital landscape, where
    we explore the state of the art in Open-Source Air Quality Monitoring.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 请关注我们即将推出的关于空气质量数字景观的文章，我们将探讨开源空气质量监测的最新技术。
- en: Find out more about our work [here](https://www.unicef.org/eap/protecting-children-air-pollution-open-source-air-quality-machine-learning-se-asia).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 了解更多关于我们工作的信息 [这里](https://www.unicef.org/eap/protecting-children-air-pollution-open-source-air-quality-machine-learning-se-asia)。
- en: 'Acknowledgement: This work is supported by the partnership between ARM and
    UNICEF Office of Innovation to develop impactful AI solutions that address challenges
    affecting the lives of children and their communities.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 致谢：本工作得到 ARM 与联合国儿童基金会创新办公室之间伙伴关系的支持，旨在开发解决影响儿童及其社区生活的挑战的有影响力的AI解决方案。
- en: 'Contributors: Prithviraj Pramanik, AQAI; Hugo Ruiz Verastegui, Anthony Mockler,
    Judith Hanan, Frontier Data Lab, Risdianto Irawan, UNICEF EAPRO; Soheib Abdalla,
    Andrew Dunbrack, UNICEF Lao PDR Country Office; Halim Jun, Daniel Alvarez, Shane
    O’Connor, UNICEF Office of Innovation;'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 贡献者：Prithviraj Pramanik，AQAI；Hugo Ruiz Verastegui，Anthony Mockler，Judith Hanan，前沿数据实验室，Risdianto
    Irawan，联合国儿童基金会东亚太平洋地区；Soheib Abdalla，Andrew Dunbrack，联合国儿童基金会老挝国家办公室；Halim Jun，Daniel
    Alvarez，Shane O’Connor，联合国儿童基金会创新办公室；
