- en: 'Robotics with Python: AI Humanoid'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/train-humanoid-robots-with-ai-and-python/](https://towardsdatascience.com/train-humanoid-robots-with-ai-and-python/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1762225873425" class="mdspan-comment">Intro</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**[Humanoid robots](https://en.wikipedia.org/wiki/Humanoid_robot)** are machines
    resembling the human body in shape and movement, designed for working alongside
    people and interacting with our tools. They are still an emerging technology,
    but forecasts predict billions of humanoids by 2050\. Currently, the most advanced
    prototypes are [*NEO* by 1XTech](https://www.1x.tech/discover/neo-home-robot),
    [*Optimus* by Tesla](https://www.tesla.com/en_eu/AI), [*Atlas* by Boston Dynamics](https://bostondynamics.com/atlas/),
    and [*G1* by China’s Unitree Robotics](https://www.unitree.com/g1).'
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two ways for a robot to perform a task: manual control (when you
    specifically program what it has to do) or Artificial Intelligence (it learns
    how to do things by trying). In particular, **[Reinforcement Learning](https://en.wikipedia.org/wiki/Reinforcement_learning)**
    allows a robot to learn the best actions through trial and error to achieve a
    goal, so it can adapt to changing environments by learning from rewards and penalties
    without a predefined plan.'
  prefs: []
  type: TYPE_NORMAL
- en: In practice, it is crazy expensive to have a real robot learning how to perform
    a task. Therefore, state-of-the-art approaches learn in **simulation** where data
    generation is fast and cheap, and subsequently transfer the knowledge to the real
    robot (“sim-to-real” / “sim-first” approach). That enables the parallel training
    of multiple models in simulation environments.
  prefs: []
  type: TYPE_NORMAL
- en: 'The most used 3D physics simulators on the market are: [***PyBullet***](https://pybullet.org/wordpress/)(beginners) ,
    [***Webots***](https://cyberbotics.com/)(intermediate), [***MuJoCo***](https://mujoco.org/)(advanced),
    and [***Gazebo***](https://gazebosim.org/home) (professionals). You can use any
    of them as standalone software or through ***[*Gym*](https://gymnasium.farama.org/index.html#)***,
    a library made by OpenAI for developingReinforcement Learning algorithms, built
    on top of different physics engines.'
  prefs: []
  type: TYPE_NORMAL
- en: In this tutorial, I’m going to show how to **build a 3D simulation for a humanoid
    robot with Artificial Intelligence**. I will present some useful Python code that
    can be easily applied in other similar cases (just copy, paste, run) and walk
    through every line of code with comments so that you can replicate this example
    (link to full code at the end of the article).
  prefs: []
  type: TYPE_NORMAL
- en: Setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An **environment** is a simulated space where agents can interact and learn
    to perform a task. It has a defined observation space (the information agents
    receive) and action spaces (the set of possible actions).
  prefs: []
  type: TYPE_NORMAL
- en: I will use *Gym* (`pip install gymnasium`) to load one of the [default environments
    made with *MuJoCo*](https://gymnasium.farama.org/environments/mujoco/)(Multi-Joint
    dynamics with Contact, `pip install mujoco`).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/7ce0672f13a7ba97cdd4ae9887d6d1d8.png)'
  prefs: []
  type: TYPE_IMG
- en: The agent is a 3D bipedal robot that can move like a human. It has 12 **links**
    (solid body parts) and 17 **joints** (flexible body parts). You can see the [full
    description here](https://gymnasium.farama.org/environments/mujoco/humanoid/#observation-space).
  prefs: []
  type: TYPE_NORMAL
- en: Before starting a new simulation, you must reset the environment with `obs,
    info = env.reset()`. That command returns information about the agent’s initial
    state. The `info` usually includes extra information about the robot.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7df793c5421deb66f3f8f8d453a8d723.png)'
  prefs: []
  type: TYPE_IMG
- en: While the `obs` is what the agent sees (i.e. with sensors), an AI model would
    need to process those observations to decide what action to take.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ecf839f0ef4178ff0af4b883f1145bad.png)'
  prefs: []
  type: TYPE_IMG
- en: Usually, all [*Gym* environments](https://gymnasium.farama.org/api/env/) have
    the same structure. The first thing to check is the **action space**, the set
    of all the possible actions. For the Humanoid simulation, an action represents
    the force applied to one of its 17 joints (within a range of -0.4 and +0.4 to
    indicate the direction of the push).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/380f1bb6d31afe728a0c347f5aa2f6e8.png)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/7ae0fde27b456fe6e6eb765c04132cd7.png)'
  prefs: []
  type: TYPE_IMG
- en: A simulation should at least cover one **episode**, a complete run of the agent
    interacting with the environment, from start to termination. Each episode is a
    loop of `reset()` -> `step()` -> `render()`. Let’s make an example running one
    single episode with the humanoid doing **random actions**, so not AI.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/296e80fc12dffb00d16a6567d7a1dfc3.png)![](../Images/3cc037671cb277c8ec5332124740b8f3.png)'
  prefs: []
  type: TYPE_IMG
- en: As the episode continues and the robot moves, we receive a **reward**. In this
    case, it’s positive if the agent stays up or moves forward, and it’s a negative
    penalty if it falls and touches the ground. The reward is the most important concept
    for AI because it defines the goal. It is the feedback signal we get from the
    environment after every action, indicating whether that move was useful or not.
    Therefore, it can be used to optimize the decision-making of the robot through
    Reinforcement Learning.
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At every step of the simulation, the **agent observes** the current situation
    (i.e. its position in the environment), decides to **take action** (i.e. moves
    one of its joints), and **receives a positive or negative response** (reward,
    penalty). This cycle repeats until the simulation ends. RL is a type of Machine
    Learning that brings the agent to **maximize the reward through trial and error**.
    So if successful, the robot will know what is the best course of action.
  prefs: []
  type: TYPE_NORMAL
- en: Mathematically, RL is based on the [Markov Decision Process](https://en.wikipedia.org/wiki/Markov_decision_process),
    in which **the future only depends on the present situation, and not the past**.
    To put it in simple words, the agent doesn’t need memory of previous steps to
    decide what to do next. For example, a robot only needs to know its current position
    and velocity to choose its next move, it doesn’t need to remember how it got there.
  prefs: []
  type: TYPE_NORMAL
- en: 'RL is all about maximizing the reward. So, the entire art of building a simulation
    is designing a reward function that truly reflects what you want (here the goal
    is not to fall down). The most basic RL algorithm **updates the list of preferred
    actions** after receiving a positive reward. The speed at which that happens is
    the **learning rate**: if this number is too high, the agent will overcorrect,
    while if it’s too low, it keeps making the same mistakes and learning painfully
    slow.'
  prefs: []
  type: TYPE_NORMAL
- en: The preferred action updates are also impacted by the **exploration rate**,
    which is the frequency of a random choice, basically it’s the AI’s curiosity level.
    Usually, it’s relatively high at the beginning (when the agent knows nothing)
    and decays over time as the robot exploits its knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/fe0354a7b74ff30054a9cc2dd4e2719c.png)![](../Images/94952c6e9530f9367fadc57f99429e18.png)'
  prefs: []
  type: TYPE_IMG
- en: Obviously, that is way too basic for a complex environment like the Humanoid,
    so the agent will keep falling even if it updates the preferred actions.
  prefs: []
  type: TYPE_NORMAL
- en: Deep Reinforcement Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When the relationship between actions and rewards is non-linear, you need [Neural
    Networks](https://en.wikipedia.org/wiki/Neural_network_(machine_learning)). Deep
    RL can handle high-dimensional inputs and estimate the expected future rewards of
    actions by leveraging the power of Deep Neural Networks.
  prefs: []
  type: TYPE_NORMAL
- en: In Python, the easiest way to use Deep RL algorithms is through *[StableBaseline](https://stable-baselines3.readthedocs.io/en/master/)*,
    a collection of the most famous models, already pre-implemented and ready to go.
    Please note that there is *StableBaseline* (written in *TensorFlow*) and *StableBaselines3*
    (written in *[PyTorch](https://pytorch.org/get-started/locally/)*). Nowadays,
    everyone is using the latter.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: One of the most commonly used Deep RL algorithms is PPO ([Proximal Policy Optimization](https://stable-baselines3.readthedocs.io/en/master/modules/ppo.html))
    as it is simple and stable. The goal of PPO is to maximize total expected reward,
    while making small updates to this policy, keeping the growth steady.
  prefs: []
  type: TYPE_NORMAL
- en: 'I shall **use *StableBaseline* to train a PPO on the *Gym* Humanoid** environment.
    There are a few things to keep in mind:'
  prefs: []
  type: TYPE_NORMAL
- en: we don’t need to render the env graphically, so the training can proceed with
    accelerated speed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The *Gym* env must be wrapped into `DummyVecEnv` to make it compatible with
    *StableBaseline* vectorized format.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regarding the Neural Network model, PPO uses a Multi-layer Perceptron (`MlpPolicy`)
    for numeric inputs, a Convolution NN (`CnnPolicy`) for images, and a combined
    model (`MultiInputPolicy`) for observations of mixed types.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since I’m not rendering the humanoid, I find it very useful to look at the training
    progress on *[TensorBoard](https://docs.pytorch.org/tutorials/recipes/recipes/tensorboard_with_pytorch.html)*,
    a toolkit to visualize statistics in real time (`pip install tensorboard`). I
    created a folder named “logs”, and I can just run `tensorboard --logdir=logs/`
    on the terminal to serve the dashboard locally (`http://localhost:6006/`).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/29d1a69e00fe41bf208b1c52f4160700.png)'
  prefs: []
  type: TYPE_IMG
- en: After the training is complete, we can load the new model and **test** it in
    the rendered environment. Now, the agent won’t be updating the preferred actions
    anymore. Instead, it will use the trained model to predict the next best action
    given the current state.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/1c794b307fc74fa08cbbb033229e39c6.png)'
  prefs: []
  type: TYPE_IMG
- en: Please note that at no point in the tutorial did we specifically program the
    robot to stay up. We are not controlling the agent. The robot is simply reacting
    to the reward function of its environment. In fact, if you train the RL model
    for much longer (i.e. 30 million time steps), you’ll start seeing the robot not
    only perfectly standing up, but also walking forward. So, when it comes to training
    an agent with AI, the design of the 3D world and its rules is more important than
    building the robot itself.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This article has been a tutorial to **introduce *MuJoCo* and *Gym,* and how
    to create 3D simulations** **for Robotics**. We used the Humanoid environment
    to learn the basics of Reinforcement Learning. We trained a Deep Neural Network
    to teach the robot how not to fall down. New tutorials with more advanced robots
    will come.
  prefs: []
  type: TYPE_NORMAL
- en: Full code for this article: **[GitHub](https://github.com/mdipietro09/RoboticsPy)**
  prefs: []
  type: TYPE_NORMAL
- en: I hope you enjoyed it! Feel free to contact me for questions and feedback or
    just to share your interesting projects.
  prefs: []
  type: TYPE_NORMAL
- en: 👉 [**Let’s Connect**](https://maurodp.carrd.co/) 👈
  prefs: []
  type: TYPE_NORMAL
