- en: A Derivation and Application of Restricted Boltzmann Machines (2024 Nobel Prize)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/a-derivation-and-application-of-restricted-boltzmann-machines-2024-nobel-prize-ead5fe66908c/](https://towardsdatascience.com/a-derivation-and-application-of-restricted-boltzmann-machines-2024-nobel-prize-ead5fe66908c/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: One recipient of the 2024 Nobel Prize in Physics was Geoffrey Hinton for his
    contributions in the field of AI and machine learning. A lot of people know he
    worked on neural networks and is termed the "Godfather of AI", but few understand
    his works. In particular, he pioneered Restricted Boltzmann Machines (RBMs) decades
    ago.
  prefs: []
  type: TYPE_NORMAL
- en: This article is going to be a walkthrough of RBMs and will hopefully provide
    some intuition behind these complex mathematical machines. I will provide some
    code on implementing RBMs from scratch in PyTorch after going through the derivations.
  prefs: []
  type: TYPE_NORMAL
- en: An Overview of RBMs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'RBMs are a form of unsupervised learning (only the inputs are used to learn-
    no output labels are used). This means we can automatically extract meaningful
    features in the data without relying on outputs. An RBM is a network with two
    different types of neurons with binary inputs: visible, *x*, and hidden, *h*.
    Visible neurons take in the input data and hidden neurons learn to detect features/patterns.'
  prefs: []
  type: TYPE_NORMAL
- en: '![RBM with input x and hidden layer y. Source: [1]](../Images/354535a27f7b676f02b5f7deb88dc365.png)'
  prefs: []
  type: TYPE_IMG
- en: 'RBM with input ***x** and hidden layer **y**. Source: [1]*'
  prefs: []
  type: TYPE_NORMAL
- en: In more technical terms, we say an RBM is an undirected bipartite graphical
    model with stochastic binary visible and hidden variables. The main goal of an
    RBM is to minimize the energy of the joint configuration _E(*x,h*)_ often __ using
    contrastive learning (discussed later on).
  prefs: []
  type: TYPE_NORMAL
- en: What is Energy?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An energy function doesn’t correspond to physical energy, but it does come from
    physics/statistics. Think of it like a scoring function. An energy function *E*
    assigns lower scores (energies) to configurations *x* that we want our model to
    prefer, and higher scores to configurations we want it to avoid. The energy function
    is something we get to choose as model designers.
  prefs: []
  type: TYPE_NORMAL
- en: 'For RBMs, the energy function is as follows (modeled after the Boltzmann distribution):'
  prefs: []
  type: TYPE_NORMAL
- en: '![RBM energy function. Source: Author](../Images/7743c7986464b2b10eeea27fd58e3e1f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'RBM energy function. Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: The energy function consists of 3 terms. The first one is the interaction between
    the hidden and visible layer with weights, *W.* The second is the sum of the bias
    terms for the visible units. The third is the sum of the bias terms for the hidden
    units.
  prefs: []
  type: TYPE_NORMAL
- en: Probability Distribution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'With the energy function, we can calculate the probability of the joint configuration
    given by the Boltzmann distribution. With this probability function, we can model
    our units:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Probability for joint configuration for RBMs. Source: Author](../Images/fb8bf6d559496b4a374f5dc55008e3d3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Probability for joint configuration for RBMs. Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: '*Z* is the partition function (also known as the normalization constant). It
    is the sum of e^(-E) over all possible configurations of visible and hidden units.
    The big challenge with Z is that it’s typically computationally intractable to
    calculate exactly because you need to sum over all possible configurations of
    *v* and *h*. For example, with binary units, if you have *m* visible units and
    *n* hidden units, you need to sum over 2^(*m*+*n*) configurations. Therefore,
    we need a way to avoid calculating *Z*.'
  prefs: []
  type: TYPE_NORMAL
- en: Inference
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With those functions and distributions defined, we can go over some derivations
    for inference before talking about training and implementation. We already mentioned
    the inability to calculate *Z* in the joint probability distribution. To get around
    this, we can use Gibbs Sampling. Gibbs Sampling is a Markov Chain Monte Carlo
    algorithm for sampling from a specified multivariate probability distribution
    when direct sampling from the joint distribution is difficult, but sampling from
    the conditional distribution is more practical [2]. Therefore, we need conditional
    distributions.
  prefs: []
  type: TYPE_NORMAL
- en: 'The great part about a **restricted** Boltzmann versus a **fully connected**
    Boltzmann is the fact that there are no connections within layers. This means
    given the visible layer, all hidden units are conditionally independent and vice
    versa. Let’s look at what that simplifies down to starting with _p(*x|h*)_:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Conditional distribution p(h|x). Source: Author](../Images/f85156c2e5d042c6e05364c883e466e4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Conditional distribution *p(h|x). Source: Author*'
  prefs: []
  type: TYPE_NORMAL
- en: 'We can see the conditional distribution simplifies down to a sigmoid function
    where j is the jᵗʰ row of *W*. There is a far more rigorous calculation I have
    included in the **appendix** proving the first line of this derivation. Reach
    out if interested! Let’s now observe the conditional distribution *p*(h|x):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Conditional distribution p(x|h). Source: Author](../Images/128fbacc6e0fb2b301a398461512802e.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Conditional distribution p(x|h). Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: We can see this conditional distribution also simplifies down to a sigmoid function
    where k is the kᵗʰ row of *W.* Because of the restricted criteria in the RBM,
    the conditional distributions simplify to easy computations for Gibbs Sampling
    during inference. Once we understand what exactly the RBM is trying to learn,
    we will implement this in PyTorch.
  prefs: []
  type: TYPE_NORMAL
- en: Model Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As with most of deep learning, we are trying to minimize the negative log-likelihood
    (NLL) to train our model. For the RBM:'
  prefs: []
  type: TYPE_NORMAL
- en: '![NLL for RBM. Source: Author](../Images/f1bd70401502a618831f4d8af6609cc6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'NLL for RBM. Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: 'Taking the derivative of this yields:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Derivative of NLL. Source: Author](../Images/de34406d80ec4475fb4d37840ecbaae8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Derivative of NLL. Source: Author'
  prefs: []
  type: TYPE_NORMAL
- en: The first term on the left-hand side of the equation is called positive phase
    because it pushes the model to lower the energy of real data. This term involves
    taking the expectation over hidden units *h* given the actual training data *x*.
    Positive phase is easy to compute because we have the actual training data xᵗ
    and can compute expectations over h due to the conditional independence.
  prefs: []
  type: TYPE_NORMAL
- en: The second term is called negative phase because it raises the energy of configurations
    the model currently thinks are likely. This term involves taking the expectation
    over both *x* and *h* under the model’s current distribution. It is hard to compute
    because we need to sample from the model’s full joint distribution *P*(x,h) (doing
    this requires Markov chains which would be inefficient to do repeatedly in training).
    The other alternative requires computing *Z* which we already deemed to be unfeasible.
    To solve this problem of calculating negative phase, we use **contrastive divergence**.
  prefs: []
  type: TYPE_NORMAL
- en: Contrastive Divergence
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The key idea behind contrastive divergence is to use truncated Gibbs Sampling
    to obtain a point estimate after k iterations. We can replace the expectation
    negative phase with this point estimate.
  prefs: []
  type: TYPE_NORMAL
- en: '![Contrastive Divergence. Source: [3]](../Images/27ee031a942e205a09af528a3a6b0c42.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Contrastive Divergence. Source: [3]'
  prefs: []
  type: TYPE_NORMAL
- en: Typically k = 1, but the bigger k is, the less biased the estimate of the gradient
    will be. I will not show the derivation for the different partials with respect
    to the negative phase (for weight/bias updates), but it can be derived by taking
    the partial derivative of *E*(x,h) with respect to the variables. There is a concept
    of persistent contrastive divergence where instead of initializing the chain to
    xᵗ, we initialize the chain to the negative sample of the last iteration. However,
    I will not go into depth on that either as normal contrastive divergence works
    sufficiently.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing an RBM
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Creating an RBM from scratch involves combining all the concepts we have discussed
    into one class. In the **init** constructor, we initialize the weights, bias term
    for the visible layer, bias term for the hidden layer, and the number of iterations
    for contrastive divergence. All we need is the size of the input data, the size
    of the hidden variable, and k.
  prefs: []
  type: TYPE_NORMAL
- en: We also need to define a Bernoulli distribution to sample from. The Bernoulli
    distribution is clamped to prevent an exploding gradient during training. Both
    of these distributions are used in the forward pass (contrastive divergence).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The next methods to build out the RBM class are the conditional distributions.
    We derived both of these conditionals earlier:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'The final methods entail the implementation of the forward pass and the free
    energy function. The energy function represents an effective energy for visible
    units after summing out all possible hidden unit configurations. The forward function
    is classic contrastive divergence for Gibbs Sampling. We initialize x_negative,
    then for k iterations: obtain h_k from P_h_x and x_negative, sample h_k from a
    Bernoulli, obtain x_k from P_x_h and h_k, and then obtain a new x_negative.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Hopefully this provided a basis into the theory behind RBMs as well as a basic
    coding implementation class that can be used to train an RBM. With any code or
    further derivations, feel free to reach out for more information!
  prefs: []
  type: TYPE_NORMAL
- en: Appendix
  prefs:
