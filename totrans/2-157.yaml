- en: 'Hitchhiker’s Guide to RAG: From Tiny Files to Tolstoy with OpenAI’s API and
    LangChain'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/hitchhikers-guide-to-rag-from-tiny-files-to-tolstoy-with-openais-api-and-langchain/](https://towardsdatascience.com/hitchhikers-guide-to-rag-from-tiny-files-to-tolstoy-with-openais-api-and-langchain/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1752131306207" class="mdspan-comment">In my latest post</mdspan>,
    [I walked you through setting up a very simple RAG pipeline in Python](https://towardsdatascience.com/hitchhikers-guide-to-rag-with-chatgpt-api-and-langchain/),
    using OpenAI’s API, LangChain, and your local files. In that post, I cover the
    very basics of creating embeddings from your local files with LangChain, storing
    them in a vector database with FAISS, making API calls to OpenAI’s API, and ultimately
    generating responses relevant to your files. 🌟
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/10170d347cfc663dece97a2252c8855c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Nonetheless, in this simple example, I only demonstrate how to use a tiny .txt
    file. In this post, I further elaborate on how you can utilize larger files with
    your RAG pipeline by adding an extra step to the process — ***chunking***.
  prefs: []
  type: TYPE_NORMAL
- en: What about chunking?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Chunking refers to the process of parsing a text into smaller pieces of text—chunks—that
    are then transformed into embeddings. This is very important because it allows
    us to effectively process and create embeddings for larger files. All embedding
    models come with various limitations on the size of the text that is passed —
    I’ll get into more details about those limitations in a moment. These limitations
    allow for better performance and low-latency responses. In the case that the text
    we provide doesn’t meet those size limitations, it’ll get truncated or rejected.
  prefs: []
  type: TYPE_NORMAL
- en: 'If we wanted to create a RAG pipeline reading, say from Leo Tolstoy’s *[War
    and Peace](https://en.wikipedia.org/wiki/War_and_Peace)* text (a rather large
    book), we wouldn’t be able to directly load it and transform it into a single
    embedding. Instead, we need to first do the *chunking* — create smaller chunks
    of text, and create embeddings for each one. Each chunk being below the size limits
    of whatever embedding model we use allows us to effectively transform any file
    into embeddings. So, a *somewhat more* realistic landscape of a RAG pipeline would
    look as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/51301703619475a56a966c2e477704a5.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: There are several parameters to further customize the chunking process and fit
    it to our specific needs. A key parameter of the chunking process is the *chunk
    size*, which allows us to specify what the size of each chunk will be (in characters
    or in tokens). The trick here is that the chunks we create have to be small enough
    to be processed within the size limitations of the embedding, but at the same
    time, they should also be large enough to incorporate meaningful information.
  prefs: []
  type: TYPE_NORMAL
- en: 'For instance, let’s assume we want to process the following sentence from *War
    and Peace*, where Prince Andrew contemplates the battle:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/768b86e9b680d60e4e6e945f1927e93b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s also assume we created the following (rather small) chunks :'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a7676713552dc0824c210d2487f23b66.png)'
  prefs: []
  type: TYPE_IMG
- en: image by author
  prefs: []
  type: TYPE_NORMAL
- en: Then, if we were to ask something like *“What does Prince Andrew mean by ‘all
    the same now’?”,* we may not get a good answer because the chunk *“But isn’t it
    all the same now?” thought he.* does not contain any context and is vague. In
    contrast, the meaning is scattered across multiple chunks. Thus, even though it
    is similar to the question we ask and may be retrieved, it does not contain any
    meaning to produce a relevant response. Therefore, selecting the appropriate chunk
    size for the chunking process in line with the type of documents we use for the
    RAG, can largely influence the quality of the responses we’ll be getting. In general,
    the content of a chunk should make sense for a human reading it without any other
    information, in order to also be able to make sense for the model. Ultimately,
    a trade-off for the chunk size exists — chunks need to be small enough to meet
    the embedding model’s size limitations, but large enough to preserve meaning.
  prefs: []
  type: TYPE_NORMAL
- en: • • •
  prefs: []
  type: TYPE_NORMAL
- en: Another significant parameter is the chunk overlap. That is how much overlap
    we want the chunks to have with one another. For instance, in the *War and Peace*
    example, we would get something like the following chunks if we chose a chunk
    overlap of 5 characters.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2126c9a1c070dfe4248956122ecb823d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'This is also a very important decision we have to make because:'
  prefs: []
  type: TYPE_NORMAL
- en: Larger overlap means more calls and tokens spent on embedding creation, which
    means more expensive + slower
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Smaller overlap means a higher chance of losing relevant information between
    the chunk boundaries
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Choosing the correct chunk overlap largely depends on the type of text we want
    to process. For example, a recipe book where the language is simple and straightforward
    most probably won’t require an exotic chunking methodology. On the flip side,
    a classic literature book like *War and Peace*, where language is very complex
    and meaning is interconnected throughout different paragraphs and sections, will
    most probably require a more thoughtful approach to chunking in order for the
    RAG to produce meaningful results.
  prefs: []
  type: TYPE_NORMAL
- en: • • •
  prefs: []
  type: TYPE_NORMAL
- en: But what if all we need is a simpler RAG that looks up to a couple of documents
    that fit the size limitations of whatever embeddings model we use in just one
    chunk? Do we still need the chunking step, or can we just directly make one single
    embedding for the entire text? The short answer is that it is always better to
    perform the chunking step, even for a knowledge base that does fit the size limits.
    That is because, as it turns out, when dealing with large documents, we face the
    problem of getting [lost in the middle](https://direct.mit.edu/tacl/article/doi/10.1162/tacl_a_00638/119630/Lost-in-the-Middle-How-Language-Models-Use-Long)
    — missing relevant information that is incorporated in large documents and respective
    large embeddings.
  prefs: []
  type: TYPE_NORMAL
- en: What are those mysterious ‘size limitations’?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In general, a request to an embedding model can include one or more chunks
    of text. There are several different kinds of limitations we have to consider
    relatively to the size of the text we need to create embeddings for and its processing.
    Each of those different types of limits takes different values depending on the
    embedding model we use. More specifically, these are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Chunk Size**, or also maximum tokens per input, or context window. This is
    the maximum size in tokens for each chunk. For instance, for OpenAI’s `text-embedding-3-small`
    embedding model, the [chunk size limit is 8,191 tokens](https://learn.microsoft.com/en-us/azure/ai-foundry/openai/concepts/models?tabs=global-standard%2Cstandard-chat-completions#embeddings-models).
    If we provide a chunk that is larger than the chunk size limit, in most cases,
    it will be silently truncated‼️ (an embedding is going to be created, but only
    for the first part that meets the chunk size limit), without producing any error.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Number of Chunks per Request**, or also number of inputs. There is also a
    limit on the number of chunks that can be included in each request. For instance,
    all OpenAI’s embedding models have a limit of 2,048 inputs — that is, [a maximum
    of 2,048 chunks per request.](https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/embeddings?tabs=console)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Total Tokens per Request:** There is also a limitation on the total number
    of tokens of all chunks in a request. For all OpenAI’s models, [the total maximum
    number of tokens across all chunks in a single request is 300,000 tokens.](https://community.openai.com/t/max-total-embeddings-tokens-per-request/1254699)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, what happens if our documents are more than 300,000 tokens? As you may have
    imagined, the answer is that we make multiple consecutive/parallel requests of
    300,000 tokens or fewer. Many Python libraries do this automatically behind the
    scenes. For example, LangChain’s `OpenAIEmbeddings` that I use in my previous
    post, automatically batches the documents we provide into batches under 300,000
    tokens, given that the documents are already provided in chunks.
  prefs: []
  type: TYPE_NORMAL
- en: Reading larger files into the RAG pipeline
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s take a look at how all these play out in a simple Python example, using
    the *[War and Peace](https://www.gutenberg.org/cache/epub/2600/pg2600.txt)* text
    as a document to retrieve in the RAG. The data I’m using — Leo Tolstoy’s *War
    and Peace* text — is licensed as Public Domain and can be found in [Project Gutenberg](https://www.gutenberg.org/).
  prefs: []
  type: TYPE_NORMAL
- en: 'So, first of all, let’s try to read from the *War and Peace* text without any
    setup for chunking. For this tutorial, you’ll need to have installed the `langchain`,
    `openai`, and `faiss` Python libraries. We can easily install the required packages
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: After making sure the required libraries are installed, our code for a very
    simple RAG looks like this and works fine for a small and simple .txt file in
    the `text_folder`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'But, if I add the *War and Peace* .txt file in the same folder, and try to
    directly create an embedding for it, I get the following error:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e8f3c1caae45bc1f382b2b7388370739.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: ughh 🙃
  prefs: []
  type: TYPE_NORMAL
- en: So what happens here? LangChain’s `OpenAIEmbeddings`cannot split the text into
    separate, less than 300,000 token iterations, because we did not provide it in
    chunks. It does not split the chunk, which is 777,181 tokens, leading to a request
    that exceeds the 300,000 tokens maximum per request.
  prefs: []
  type: TYPE_NORMAL
- en: • • •
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s try to set up the chunking process to create multiple embeddings
    from this large file. To do this, I will be using the `text_splitter` library
    provided by LangChain, and more specifically, the `RecursiveCharacterTextSplitter`.
    In `RecursiveCharacterTextSplitter`, the chunk size and chunk overlap parameters
    are specified as a number of characters, but other splitters like `TokenTextSplitter`
    or `OpenAITokenSplitter` also allow to set up these parameters as a number of
    tokens.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, we can set up an instance of the text splitter as below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: … and then use it to split our initial document into chunks…
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: …and then use those chunks to create the embeddings…
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: … and voila 🌟
  prefs: []
  type: TYPE_NORMAL
- en: Now our code can effectively parse the provided document, even if it is a bit
    larger, and provide relevant responses.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0a7f5069fdfb1c179527ebb4cdf3f628.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: On my mind
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Choosing a chunking approach that fits the size and complexity of the documents
    we want to feed into our RAG pipeline is crucial for the quality of the responses
    that we’ll be receiving. For sure, there are several other parameters and different
    chunking methodologies one needs to take into account. Nonetheless, understanding
    and fine-tuning chunk size and overlap is the foundation for building RAG pipelines
    that produce meaningful results.
  prefs: []
  type: TYPE_NORMAL
- en: • • •
  prefs: []
  type: TYPE_NORMAL
