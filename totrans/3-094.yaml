- en: Introduction
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简介
- en: The AI space is a vast and complicated landscape. Matt Turck famously does his
    Machine Learning, AI, and Data (MAD) landscape every year, and it always seems
    to get crazier and crazier. Check out the [latest one made for 2024](https://mattturck.com/landscape/mad2024.pdf).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能领域是一个广阔而复杂的景观。马特·图克每年都会做他的机器学习、人工智能和数据（MAD）景观，而且似乎总是变得越来越疯狂。查看2024年制作的最新版本（[https://mattturck.com/landscape/mad2024.pdf](https://mattturck.com/landscape/mad2024.pdf)）。
- en: Overwhelming, to say the least.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 至少可以说，这令人印象深刻。
- en: 'However, we can use abstractions to help us make sense of this crazy landscape
    of ours. The primary one I will be discussing and breaking down in this article
    is the idea of an **AI stack**. A stack is just a combination of technologies
    that are used to build applications. Those of you familiar with web development
    likely know of the **LAMP stack**: Linux, Apache, MySQL, PHP. This is the stack
    that powers WordPress. Using a catchy acronym like LAMP is a good way to help
    us humans grapple with the complexity of the web application landscape. Those
    of you in the data field likely have heard of the **Modern Data Stack**: typically
    dbt, Snowflake, Fivetran, and Looker (or the [Post-Modern Data Stack.](https://medium.com/data-science/the-post-modern-stack-993ec3b044c1)
    IYKYK).'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们可以使用抽象来帮助我们理解我们这个疯狂景观。本文将讨论并分解的主要一个是**AI堆栈**的概念。堆栈只是用于构建应用程序的技术组合。那些熟悉Web开发的人可能知道**LAMP堆栈**：Linux、Apache、MySQL、PHP。这是WordPress所依赖的堆栈。使用像LAMP这样的吸引人的首字母缩略词是帮助我们人类应对Web应用程序景观复杂性的好方法。那些在数据领域工作的人可能听说过**现代数据堆栈**：通常是dbt、Snowflake、Fivetran和Looker（或[后现代数据堆栈](https://medium.com/data-science/the-post-modern-stack-993ec3b044c1)
    IYKYK）。
- en: The **AI stack** is similar, but in this article we will stay a bit more conceptual.
    I’m not going to specify specific technologies you should be using at each layer
    of the stack, but instead will simply name the layers, and let you decide where
    you fit in, as well as what tech you will use to achieve success in that layer.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI堆栈**类似，但在这篇文章中，我们将更多地从概念上探讨。我不会具体指定在每个堆栈层你应该使用哪些具体技术，而是简单地命名这些层，并让你决定自己适合哪个位置，以及你将使用什么技术来实现该层的成功。'
- en: 'There are [many](https://www.mongodb.com/resources/basics/artificial-intelligence/ai-stack#the-ai-stack)
    [ways](https://menlovc.com/perspective/the-modern-ai-stack-design-principles-for-the-future-of-enterprise-ai-architectures/)
    [to](https://www.ibm.com/think/topics/ai-stack) [describe](https://medium.com/mongodb/understanding-the-ai-stack-in-the-era-of-generative-ai-f1fcd66e1393)
    the AI stack. I prefer simplicity; so here is the AI stack in four layers, organized
    from furthest from the end user (bottom) to closest (top):'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 有[许多](https://www.mongodb.com/resources/basics/artificial-intelligence/ai-stack#the-ai-stack)
    [方法](https://menlovc.com/perspective/the-modern-ai-stack-design-principles-for-the-future-of-enterprise-ai-architectures/)
    [来](https://www.ibm.com/think/topics/ai-stack) [描述](https://medium.com/mongodb/understanding-the-ai-stack-in-the-era-of-generative-ai-f1fcd66e1393)
    AI堆栈。我更喜欢简单；所以这里是以四层组织的AI堆栈，从离最终用户最远（底部）到最近（顶部）：
- en: '**Infrastructure Layer (Bottom):** The raw physical hardware necessary to train
    and do inference with AI. Think GPUs, TPUs, cloud services (AWS/Azure/GCP).'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基础设施层（底部）：** 培训和进行AI推理所需的原始物理硬件。想想GPU、TPU、云服务（AWS/Azure/GCP）。'
- en: '**Data Layer (Bottom):** The data needed to train machine learning models,
    as well as the databases needed to store all of that data. Think ImageNet, TensorFlow
    Datasets, Postgres, MongoDB, Pinecone, etc.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据层（底部）：** 训练机器学习模型所需的数据，以及存储所有这些数据的数据库。想想ImageNet、TensorFlow Datasets、Postgres、MongoDB、Pinecone等。'
- en: '**Model and Orchestration Layer (Middle):** This refers to the actual large
    language, vision, and reasoning models themselves. Think GPT, Claude, Gemini,
    or any machine learning model. This also includes the toolsdevelopers use to build,
    deploy, and observe models. Think PyTorch/TensorFlow, Weights & Biases, and LangChain.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型和编排层（中间）：**这指的是实际的大型语言、视觉和推理模型本身。例如GPT、Claude、Gemini或任何机器学习模型。这还包括开发者用来构建、部署和观察模型的工具。例如PyTorch/TensorFlow、Weights
    & Biases和LangChain。'
- en: '**Application Layer (Top):** The AI-powered applications that are used by customers.
    Think ChatGPT, GitHub copilot, Notion, Grammarly.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用层（顶部）：**由AI驱动的客户使用的应用程序。例如ChatGPT、GitHub copilot、Notion、Grammarly。'
- en: '![AI Stack](../Images/6eecc3fabc8fb81923704ff85fa9d3a9.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![AI堆栈](../Images/6eecc3fabc8fb81923704ff85fa9d3a9.png)'
- en: Layers in the AI stack. Image by author.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: AI堆栈中的层次。图由作者提供。
- en: Many companies dip their toes in several layers. For example, OpenAI has both
    trained GPT-4o and created the ChatGPT web application. For help with the infrastructure
    layer they have partnered with Microsoft to use their Azure cloud for on-demand
    GPUs. As for the data layer, they built web scrapers to help pull in tons of natural
    language data to feed to their models during training, [not without controversy](https://www.nytimes.com/2023/12/27/business/media/new-york-times-open-ai-microsoft-lawsuit.html).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 许多公司涉足多个层次。例如，OpenAI既训练了GPT-4o，又创建了ChatGPT网络应用。在基础设施层的帮助下，他们与微软合作，使用其Azure云服务提供按需GPU。至于数据层，他们构建了网络爬虫，帮助在训练期间将大量自然语言数据拉入模型中，[并非没有争议](https://www.nytimes.com/2023/12/27/business/media/new-york-times-open-ai-microsoft-lawsuit.html)。
- en: The Virtues of the Application Layer
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应用层的优点
- en: I agree very much with [Andrew Ng](https://www.youtube.com/watch?v=KDBq0GqKpqA&t=860s)
    and [many](https://x.com/gradypb/status/1899485092247916891) [others](https://www.sequoiacap.com/article/generative-ais-act-o1/)
    in the space who say that **the application layer of AI is the place to be**.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常同意[Andrew Ng](https://www.youtube.com/watch?v=KDBq0GqKpqA&t=860s)和这个领域中的[许多人](https://x.com/gradypb/status/1899485092247916891)
    [以及其他](https://www.sequoiacap.com/article/generative-ais-act-o1/)人所说的，**AI的应用层是应该关注的重点**。
- en: Why is this? Let’s start with the infrastructure layer. This layer is prohibitively
    expensive to break into unless you have hundreds of millions of dollars of VC
    cash to burn. The technical complexity of attempting to create your own cloud
    service or craft a new type of GPU is very high. There is a reason why tech behemoths
    like Amazon, Google, Nvidia, and Microsoft dominate this layer. Ditto on the foundation
    model layer. Companies like OpenAI and Anthropic have armies of PhDs to innovate
    here. In addition, they had to partner with the tech giants to fund model training
    and hosting. Both of these layers are also rapidly becoming **commoditized**.
    This means that one cloud service/model more or less performs like another. They
    are interchangeable and can be easily replaced. They mostly compete on price,
    convenience, and brand name.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么会这样？让我们从基础设施层开始。除非你有数亿美元的风险投资现金可以烧，否则进入这个层次的成本非常高。尝试创建自己的云服务或设计一种新型GPU的技术复杂性非常高。这就是为什么像亚马逊、谷歌、英伟达和微软这样的科技巨头在这个层次上占据主导地位的原因。同样，基础模型层也是如此。像OpenAI和Anthropic这样的公司拥有大量的博士团队在这里进行创新。此外，他们还必须与科技巨头合作，为模型训练和托管提供资金。这两个层次也正在迅速变得**商品化**。这意味着一个云服务/模型的表现与另一个大致相同。它们可以互换，并且可以轻松替换。它们主要在价格、便利性和品牌名称上竞争。
- en: The data layer is interesting. The advent of generative AI has led to a quite
    a few companies staking their claim as the most popular vector database, including
    Pinecone, Weaviate, and Chroma. However, the customer base at this layer is much
    smaller than at the application layer (there are far less developers than there
    are people who will use AI applications like ChatGPT). This area is also quickly
    become commoditized. Swapping Pinecone for Weaviate is not a difficult thing to
    do, and if for example Weaviate dropped their hosting prices significantly many
    developers would likely make the switch from another service.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 数据层非常有趣。生成式AI的出现导致许多公司宣称自己是最受欢迎的向量数据库，包括Pinecone、Weaviate和Chroma。然而，在这个层次上的客户群远小于应用层（开发者的人数远少于使用ChatGPT等AI应用的人）。这个领域也迅速变得商品化。用Weaviate替换Pinecone并不是一件困难的事情，例如，如果Weaviate大幅降低他们的托管价格，许多开发者可能会从其他服务切换过来。
- en: It’s also important to note innovations happening at the database level. Projects
    such as [pgvector](https://github.com/pgvector/pgvector) and [sqlite-vec](https://github.com/asg017/sqlite-vec)
    are taking tried and true databases and making them able to handle vector embeddings.
    This is an area where I would like to contribute. However, the path to profit
    is not clear, and thinking about profit here feels a bit icky (I ♥️ open-source!)
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 还需要注意的是数据库层面的创新。例如[pgvector](https://github.com/pgvector/pgvector)和[sqlite-vec](https://github.com/asg017/sqlite-vec)项目正在将经过验证的数据库转变为能够处理向量嵌入的数据库。这是我愿意贡献力量的领域。然而，盈利之路并不清晰，在这里考虑盈利感觉有点不舒服（我热爱开源！）
- en: That brings us to the application layer. **This is where the little guys can
    notch big wins.** The ability to take the latest AI tech innovations and integrate
    them into web applications is and will continue to be in high demand. The path
    to profit is clearest when offering products that people love. Applications can
    either be SaaS offerings or they can be custom-built applications tailored to
    a company’s particular use case.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这就带我们来到了应用层。**这正是小公司能够取得重大胜利的地方**。将最新的AI技术革新整合到网络应用中的能力，现在和将来都将非常受欢迎。当提供人们喜爱的产品时，盈利之路最为清晰。应用可以是SaaS服务，也可以是根据公司特定用例定制的应用。
- en: Remember that the companies working on the foundation model layer are constantly
    working to release better, faster, and cheaper models. As an example, if you are
    using the `gpt-4o` model in your app, and OpenAI updates the model, you **don’t
    have to do a thing** to receive the update. Your app gets a nice bump in performance
    for nothing. It’s similar to how iPhones get regular updates, except even better,
    because no installation is required. The streamed chunks coming back from your
    API provider are just magically better.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，那些在基础模型层工作的公司正在不断努力发布更好、更快、更便宜的模式。以一个例子来说，如果你在应用中使用`gpt-4o`模型，而OpenAI更新了模型，你**无需做任何事情**即可接收更新。你的应用性能将得到显著提升，而无需付出任何代价。这类似于iPhone定期更新，但更好，因为无需安装。从API提供商返回的流式数据块神奇地变得更好。
- en: If you want to change to a model from a new provider, just change a line or
    two of code to start getting improved responses (remember, commoditization). **Think
    of the recent DeepSeek moment; what may be frightening for OpenAI is thrilling
    for application builders. **
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想切换到新提供商的模型，只需更改一两行代码即可开始获得改进的响应（记住，商品化）。**想想最近的DeepSeek时刻；对于OpenAI可能令人恐惧的事情，对于应用构建者来说却是令人兴奋的。**
- en: It is important to note that the application layer is not without its challenges.
    I’ve noticed [quite](https://bsky.app/profile/thesaasreport.bsky.social/post/3lfv6qjmk5k2z)
    [a](https://x.com/ugamkamat/status/1755823325597814810) [bit](https://x.com/ugamkamat/status/1755823317603479944)
    of hand wringing on social media about SaaS saturation. It can feel difficult
    to get users to register for an account, let alone pull out a credit card. It
    can feel as though you need VC funding for marketing blitzes and yet another in-vogue
    black-on-black marketing website. The app developer also has to be careful not
    to build something that will quickly be cannibalized by one of the big model providers.
    Think about how Perplexity initially built their fame by combining the power of
    LLMs with search capabilities. At the time this was novel; nowadays most popular
    chat applications have this functionality built-in.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，应用层并非没有挑战。我注意到社交媒体上关于SaaS饱和度的担忧很多。感觉很难让用户注册账户，更不用说掏出信用卡了。感觉你需要风险投资来支持营销狂潮，还需要另一个流行的黑底营销网站。应用开发者还必须小心，不要构建出很快就会被大型模型提供商吞噬的产品。想想Perplexity最初是如何通过结合LLM的力量和搜索功能而建立声誉的。当时这很新颖；如今，大多数流行的聊天应用都内置了这项功能。
- en: Another hurdle for the application developer is obtaining **domain expertise**.
    Domain expertise is a fancy term for knowing about a niche field like law, medicine,
    automotive, etc. All of the technical skill in the world doesn’t mean much if
    the developer doesn’t have access to the necessary domain expertise to ensure
    their product actually helps someone. As a simple example, one can theorize how
    a document summarizer may help out a legal company, but without actually working
    closely with a lawyer, any usability remains theoretical. Use your network to
    become friends with some domain experts; they can help power your apps to success.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 对于应用开发者来说，另一个挑战是获得**领域专业知识**。领域专业知识是一个术语，指的是了解像法律、医学、汽车等细分领域。如果开发者没有必要的领域专业知识来确保他们的产品实际上能帮助到某人，那么世界上所有的技术技能都没有什么意义。作为一个简单的例子，人们可以理论化一个文档摘要工具如何帮助法律公司，但如果没有与律师密切合作，任何可用性都只是理论上的。利用你的网络与一些领域专家交朋友；他们可以帮助你的应用取得成功。
- en: An alternative to partnering with a domain expert is building something specifically
    for yourself. If you enjoy the product, likely others will as well. You can then
    proceed to [dogfood](https://en.wikipedia.org/wiki/Eating_your_own_dog_food) your
    app and iteratively improve it.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 与领域专家合作的一个替代方案是为你自己构建一些东西。如果你喜欢这个产品，其他人可能也会喜欢。然后你可以继续[内部测试](https://en.wikipedia.org/wiki/Eating_your_own_dog_food)你的应用，并迭代改进它。
- en: Thick Wrappers
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 厚重的包装
- en: Early applications with gen AI integration were derided as “thin wrappers” around
    language models. It’s true that taking an LLM and slapping a simple chat interface
    on it won’t succeed. You are essentially competing with ChatGPT, Claude, etc.
    in a race to the bottom.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 早期与通用人工智能集成的应用被嘲笑为语言模型的“薄包装”。确实，仅仅在LLM上添加一个简单的聊天界面是不会成功的。你实际上是在与ChatGPT、Claude等竞争，争夺市场最低点。
- en: 'The canonical thin wrapper looks something like:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 典型的薄包装看起来可能像这样：
- en: A chat interface
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个聊天界面
- en: Basic prompt engineering
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基本的提示工程
- en: A feature that likely will be cannibalized by one of the big model providers
    soon or can already be done using their apps
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 很可能很快就会被大型模型提供商所取代的功能，或者已经可以通过他们的应用完成的功能
- en: An example would be an “AI writing assistant” that just relays prompts to ChatGPT
    or Claude with basic prompt engineering. Another would be an “AI summarizer tool”
    that passes a text to an LLM to summarize, with no processing or domain-specific
    knowledge.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 一个例子可能是一个“AI写作助手”，它只是将提示传递给ChatGPT或Claude，并使用基本的提示工程。另一个例子可能是一个“AI摘要工具”，它将文本传递给LLM进行摘要，没有任何处理或特定领域的知识。
- en: 'With our experience in developing web apps with AI integration, we at Los Angeles
    AI Apps have come up with the following criterion for how to avoid creating a
    thin wrapper application:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开发具有人工智能集成的Web应用的经验基础上，洛杉矶人工智能应用公司提出了以下标准，以避免创建薄包装应用：
- en: If the app can’t best ChatGPT with search by a significant factor, then it’s
    too thin.
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果该应用无法通过搜索在显著程度上优于ChatGPT，那么它就太薄弱了。
- en: A few things to note here, starting with the idea of a “significant factor”.
    Even if you are able to exceed ChatGPT’s capability in a particular domain by
    a small factor, it likely won’t be enough to ensure success. You really need to
    be a lot better than ChatGPT for people to even consider using the app.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些需要注意的事项，首先是“显著因素”的概念。即使你能够在某个特定领域通过一个小因素超越ChatGPT的能力，这也可能不足以确保成功。你需要比ChatGPT好得多，人们才会考虑使用该应用。
- en: Let me motivate this insight with an example. When I was learning data science,
    I created a [movie recommendation project](https://towardsdatascience.com/how-to-build-a-rag-system-with-a-self-querying-retriever-in-langchain-16b4fa23e9ad/).
    It was a great experience, and I learned quite a bit about RAG and web applications.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 让我用一个例子来激发这个洞察力。当我学习数据科学时，我创建了一个[电影推荐项目](https://towardsdatascience.com/how-to-build-a-rag-system-with-a-self-querying-retriever-in-langchain-16b4fa23e9ad/)。这是一次很好的经历，我学到了很多关于RAG和Web应用的知识。
- en: '![film search](../Images/faeb7c059bd21143bbd4813ab4e39ed5.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![电影搜索](../Images/faeb7c059bd21143bbd4813ab4e39ed5.png)'
- en: My old film recommendation app. Good times! Image by author.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我的旧电影推荐应用。美好的时光！图片由作者提供。
- en: Would it be a good production app? No.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这会是一个好的生产应用吗？不会。
- en: No matter what question you ask it, ChatGPT will likely give you a movie recommendation
    that is comparable. Despite the fact that I was using RAG and pulling in a curated
    dataset of films, it is unlikely a user will find the responses much more compelling
    than ChatGPT + search. Since users are familiar with ChatGPT, they would likely
    stick with it for movie recommendations, even if the responses from my app were
    2x or 3x better than ChatGPT (of course, defining “better” is tricky here.)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你问什么问题，ChatGPT很可能会给你一个与之相当的电影推荐。尽管我在使用RAG并引入了一个精选的电影数据集，但用户不太可能觉得这些回答比ChatGPT
    + search更有吸引力。由于用户熟悉ChatGPT，他们可能会继续使用它来获取电影推荐，即使我的应用中的回答比ChatGPT好2倍或3倍（当然，在这里定义“更好”是有些棘手的。）
- en: Let me use another example. One app we had considered building out was a web
    app for city government websites. These sites are notoriously large and hard to
    navigate. We thought if we could scrape the contents of the website domain and
    then use RAG we could craft a chatbot that would effectively answer user queries.
    It worked fairly well, **but ChatGPT with search capabilities is a beast**. It
    oftentimes matched or exceeded the performance of our bot. It would take extensive
    iteration on the RAG system to get our app to consistently beat ChatGPT + search.
    Even then, who would want to go to a new domain to get answers to city questions,
    when ChatGPT + search would yield similar results? Only by selling our services
    to the city government and having our chatbot integrated into the city website
    would we get consistent usage.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 让我再用另一个例子。我们曾考虑开发的一个应用是一个面向城市政府网站的网页应用。这些网站通常很大，难以导航。我们想，如果我们能够抓取网站域的内容，然后使用RAG，我们就能制作一个能够有效回答用户查询的聊天机器人。它工作得相当不错，**但带有搜索功能的ChatGPT是一个怪物**。它往往能够匹配或超过我们机器人的性能。要使我们的应用持续超越ChatGPT
    + search，需要对RAG系统进行大量的迭代。即使如此，谁会想去一个新的域名来获取对城市问题的答案，当ChatGPT + search会给出类似的结果时？只有通过向市政府销售我们的服务，并将我们的聊天机器人集成到城市网站上，我们才能获得持续的使用。
- en: One way to differentiate yourself is via proprietary data. If there is private
    data that the model providers are not privy to, then that can be valuable. In
    this case the value is in the collection of the data, not the innovation of your
    chat interface or your RAG system. Consider a legal AI startup that provides its
    models with a large database of legal files that cannot be found on the open web.
    Perhaps RAG can be done to help the model answer legal questions over those private
    documents. Can something like this outdo ChatGPT + search? Yes, assuming the legal
    files cannot be found on Google.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 区分自己的一个方法是通过专有数据。如果存在模型提供者无法获取的私有数据，那么这些数据可能很有价值。在这种情况下，价值在于数据的收集，而不是你聊天界面或RAG系统的创新。考虑一个法律AI初创公司，它为其模型提供了一大批无法在公开网络找到的法律文件数据库。也许可以通过RAG帮助模型回答这些私有文件中的法律问题。这样的方法能否超越ChatGPT
    + search？是的，前提是这些法律文件无法在Google上找到。
- en: 'Going even further, I believe the best way have your app stand out is to forego
    the chat interface entirely. Let me introduce two ideas:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 更进一步，我认为让您的应用脱颖而出的最佳方式是完全放弃聊天界面。让我介绍两个想法：
- en: Proactive AI
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主动AI
- en: Overnight AI
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能一夜之间
- en: The Return of Clippy
  id: totrans-54
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Clippy的回归
- en: I read an [excellent article](https://evilmartians.com/chronicles/dont-just-slap-on-a-chatbot-building-ai-that-works-before-you-ask)
    from the Evil Martians that highlights the innovation starting to occur at the
    application level. They describe how they have forgone a chat interface entirely,
    and instead are trying something they call **proactive AI.** Recall [Clippy](https://en.wikipedia.org/wiki/Office_Assistant)
    from Microsoft Word. As you were typing out your document, it would butt in with
    suggestions. These were oftentimes not helpful, and poor Clippy was mocked. With
    the advent of LLMs, you can imagine making a much more powerful version of Clippy.
    It wouldn’t wait for a user to ask it a question, but instead could proactively
    gives users suggestions. This is similar to the coding Copilot that comes with
    VSCode. It doesn’t wait for the programmer to finish typing, but instead offers
    suggestions as they code. Done with care, this style of AI can reduce friction
    and improve user satisfaction.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我读了一篇来自Evil Martians的[优秀文章](https://evilmartians.com/chronicles/dont-just-slap-on-a-chatbot-building-ai-that-works-before-you-ask)，强调了在应用层面开始出现的创新。他们描述了他们完全放弃了聊天界面，而是尝试了他们称之为**主动式AI**的东西。回想一下微软Word中的[Clippy](https://en.wikipedia.org/wiki/Office_Assistant)。当你正在输入文档时，它会突然提出建议。这些建议往往并不有用，而且可怜的Clippy经常被嘲笑。随着LLMs的出现，你可以想象出一个更强大的Clippy版本。它不会等待用户提问，而是主动为用户提供建议。这与VSCode中附带的编码Copilot类似。它不会等待程序员完成输入，而是在他们编码时提供建议。如果做得恰当，这种AI风格可以减少摩擦并提高用户满意度。
- en: Of course there are important considerations when creating proactive AI. You
    don’t want your AI pinging the user so often that they become frustrating. One
    can also imagine a dystopian future where LLMs are constantly nudging you to buy
    cheap junk or spend time on some mindless app without your prompting. Of course,
    machine learning models are already doing this, but putting human language on
    it can make it even more insidious and annoying. It is imperative that the developer
    ensures their application is used to benefit the user, not swindle or influence
    them.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，在创建主动式AI时，有一些重要的考虑因素。你不想你的AI频繁地打扰用户，以至于变得令人沮丧。人们也可以想象一个反乌托邦的未来，其中LLMs不断地暗示你购买便宜垃圾或在不提醒的情况下浪费时间在一些无脑应用上。当然，机器学习模型已经在做这件事了，但给它加上人类语言可以使其更加隐蔽和令人烦恼。开发者确保他们的应用程序被用来造福用户，而不是欺骗或影响他们，这是至关重要的。
- en: Getting Stuff Done While You Sleep
  id: totrans-57
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在你睡眠时完成任务
- en: '![Overnight AI](../Images/6d031a9895d5a87be97dd6bab81818e3.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![Overnight AI](../Images/6d031a9895d5a87be97dd6bab81818e3.png)'
- en: Image of AI working overnight. Image from GPT-4o
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: AI夜间工作的图像。图像来自GPT-4o
- en: 'Another alternative to the chat interface is to use the LLMs offline rather
    than online. As an example, imagine you wanted to create a newsletter generator.
    This generator would use an automated scraper to pull in leads from a variety
    of sources. It would then create articles for leads it deems interesting. Each
    new issue of your newsletter would be kicked off by a background job, perhaps
    daily or weekly. **The important detail here: there is no chat interface.** There
    is no way for the user to have any input; they just get to enjoy the latest issue
    of the newsletter. Now we’re really starting to cook!'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种替代聊天界面的方法是使用离线的LLMs而不是在线的。例如，想象你想创建一个新闻简报生成器。这个生成器会使用自动抓取器从各种来源收集线索。然后它会为它认为有趣的线索创建文章。你的新闻简报的每一期都由一个后台作业启动，可能是每天或每周。**这里的重要细节是：没有聊天界面**。用户无法有任何输入；他们只能享受新闻简报的最新一期。现在我们真的开始变得有趣了！
- en: I call this **overnight AI**. The key is that the user never interacts with
    the AI at all. It just produces a summary, an explanation, an analysis etc. overnight
    while you are sleeping. In the morning, you wake up and get to enjoy the results.
    There should be no chat interface or suggestions in overnight AI. Of course, it
    can be very beneficial to have a human-in-the-loop. Imagine that the issue of
    your newsletter comes to you with proposed articles. You can either accept or
    reject the stories that go into your newsletter. Perhaps you can build in functionality
    to edit an article’s title, summary, or cover photo if you don’t like something
    the AI generated.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我把这称为**夜间AI**。关键在于用户根本不需要与AI互动。它会在你睡觉的时候自动生成摘要、解释、分析等，而无需任何操作。早上醒来，你就可以享受这些结果。夜间AI中不应该有任何聊天界面或建议。当然，在夜间AI中加入人工审核是非常有益的。想象一下，你的时事通讯问题通过建议的文章呈现在你面前。你可以选择接受或拒绝进入时事通讯的故事。也许你还可以加入编辑文章标题、摘要或封面照片的功能，如果你不喜欢AI生成的某些内容。
- en: Summary
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 摘要
- en: In this article, I covered the basics behind the AI stack. This covered the
    infrastructure, data, model/orchestration, and application layers. I discussed
    why I believe the application layer is the best place to work, mainly due to the
    lack of commoditization, proximity to the end user, and opportunity to build products
    that benefit from work done in lower layers. We discussed how to prevent your
    application from being just another thin wrapper, as well as how to use AI in
    a way that avoids the chat interface entirely.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我介绍了AI堆栈背后的基础知识。这包括基础设施、数据、模型/编排和应用层。我讨论了为什么我认为应用层是最佳工作场所，主要是因为它缺乏商品化、靠近最终用户，以及有机会构建从底层工作中受益的产品。我们还讨论了如何防止你的应用程序仅仅成为另一个薄层包装，以及如何使用AI完全避免聊天界面。
- en: In part two, I will discuss why the best language to learn if you want to build
    web applications with AI integration is not Python, but Ruby. I will also break
    down why the microservices architecture for AI apps may not be the best way to
    build your apps, despite it being the default that most go with.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在第二部分，我将讨论如果你想要使用AI集成构建Web应用程序，最佳学习语言不是Python，而是Ruby。我还会分析为什么对于AI应用程序来说，微服务架构可能不是构建应用程序的最佳方式，尽管它是大多数人默认的选择。
- en: 🔥 *If you’d like a custom web application with generative AI integration, visit*
    [*losangelesaiapps.com*](https://losangelesaiapps.com/)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 🔥 *如果您想要一个集成了生成式AI的定制Web应用程序，请访问* [*losangelesaiapps.com*](https://losangelesaiapps.com/)
