- en: Nine Rules for SIMD Acceleration of Your Rust Code (Part 1)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Nine Rules for SIMD Acceleration of Your Rust Code (Part 1)
- en: 原文：[https://towardsdatascience.com/nine-rules-for-simd-acceleration-of-your-rust-code-part-1-c16fe639ce21/](https://towardsdatascience.com/nine-rules-for-simd-acceleration-of-your-rust-code-part-1-c16fe639ce21/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/nine-rules-for-simd-acceleration-of-your-rust-code-part-1-c16fe639ce21/](https://towardsdatascience.com/nine-rules-for-simd-acceleration-of-your-rust-code-part-1-c16fe639ce21/)
- en: '*Thanks to Ben Lichtman (B3NNY) at the Seattle Rust Meetup for pointing me
    in the right direction on SIMD.*'
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*感谢Ben Lichtman（B3NNY）在西雅图Rust Meetup上为我指明了SIMD的正确方向。*'
- en: '[SIMD](https://en.wikipedia.org/wiki/Single_instruction,_multiple_data) (Single
    Instruction, Multiple Data) operations have been a feature of Intel/AMD and ARM
    CPUs since the early 2000s. These operations enable you to, for example, add an
    array of eight `i32` to another array of eight `i32` with just one CPU operation **on
    a single core**. Using SIMD operations greatly speeds up certain tasks. If you’re
    not using SIMD, you may not be fully using your CPU’s capabilities.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '[SIMD](https://en.wikipedia.org/wiki/Single_instruction,_multiple_data)（单指令，多数据）操作自2000年代初以来一直是Intel/AMD和ARM
    CPU的特性。这些操作使你能够，例如，仅用一个CPU操作**在单个核心**上对八个`i32`数组进行加法运算，并将结果加到另一个八个`i32`数组上。使用SIMD操作可以大大加快某些任务的执行速度。如果你没有使用SIMD，你可能没有充分利用CPU的能力。'
- en: Is this “Yet Another Rust and SIMD” article? Yes and no. Yes, I did apply SIMD
    to a programming problem and then feel compelled to write an article about it.
    No, I hope that this article also goes into enough depth that it can guide you
    through *your* project. It explains the newly available SIMD capabilities and
    settings in Rust nightly. It includes a Rust SIMD cheatsheet. It shows how to
    make your SIMD code generic without leaving safe Rust. It gets you started with
    tools such as Godbolt and Criterion. Finally, it introduces new cargo commands
    that make the process easier.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这是不是又一篇“另一种Rust和SIMD”的文章？是的，也不是。是的，我确实将SIMD应用于一个编程问题，然后觉得有必要写一篇文章来讨论它。不，我希望这篇文章也足够深入，能够指导你完成**你的**项目。它解释了Rust
    nightly中新可用的SIMD功能和设置。它包括一个Rust SIMD速查表。它展示了如何在不离开安全Rust的情况下使你的SIMD代码通用。它使用Godbolt和Criterion等工具帮助你入门。最后，它介绍了新的cargo命令，使这个过程更加容易。
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The [`range-set-blaze`](https://crates.io/crates/range-set-blaze) crate uses
    its `RangeSetBlaze::from_iter` method to ingest potentially long sequences of
    integers. When the integers are “clumpy”, it can do this [30 times faster](https://github.com/CarlKCarlK/range-set-blaze/blob/main/docs/bench.md) than
    Rust’s standard `HashSet::from_iter`. Can we do even better if we use SIMD operations?
    Yes!
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '`range-set-blaze` crate使用其`RangeSetBlaze::from_iter`方法来处理可能很长的整数序列。当整数“密集”时，它可以比Rust的标准`HashSet::from_iter`快**30倍**[（[bench.md](https://github.com/CarlKCarlK/range-set-blaze/blob/main/docs/bench.md)）]。如果我们使用SIMD操作，我们能做得更好吗？是的！'
- en: '*See [this documentation](https://docs.rs/range-set-blaze/latest/range_set_blaze/struct.RangeSetBlaze.html#constructor-performance) for
    the definition of “clumpy”. Also, what happens if the integers are not clumpy? `RangeSetBlaze` is [2
    to 3 times ](https://github.com/CarlKCarlK/range-set-blaze/blob/main/docs/bench.md)*[slower](https://github.com/CarlKCarlK/range-set-blaze/blob/main/docs/bench.md)* than `HashSet`.*'
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*请参阅[此文档](https://docs.rs/range-set-blaze/latest/range_set_blaze/struct.RangeSetBlaze.html#constructor-performance)了解“密集”的定义。此外，如果整数不是密集分布，会发生什么？`RangeSetBlaze`比`HashSet`慢**2到3倍**[（[slower](https://github.com/CarlKCarlK/range-set-blaze/blob/main/docs/bench.md)）]。'
- en: On clumpy integers, `RangeSetBlaze::from_slice `— a new method based on SIMD
    operations — is 7 times faster than `RangeSetBlaze::from_iter. `That makes it
    more than 200 times faster than `HashSet::from_iter`. (When the integers are not
    clumpy, it is still 2 to 3 times slower than `HashSet`.)
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理密集整数时，`RangeSetBlaze::from_slice`——一个基于SIMD操作的新方法——比`RangeSetBlaze::from_iter`快7倍。这使得它比`HashSet::from_iter`快200多倍。（当整数不是密集分布时，它仍然比`HashSet`慢2到3倍。）
- en: Over the course of implementing this speed up, I learned nine rules that can
    help you accelerate your projects with SIMD operations.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在实现这个加速的过程中，我学到了九条规则，可以帮助你通过SIMD操作加速你的项目。
- en: 'The rules are:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 规则是：
- en: Use nightly Rust and `core::simd`, Rust’s experimental standard SIMD module.
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用nightly Rust和`core::simd`，Rust的实验性标准SIMD模块。
- en: 'CCC: Check, Control, and Choose your computer’s SIMD capabilities.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: CCC：检查，控制，并选择你电脑的SIMD能力。
- en: Learn `core::simd`, but selectively.
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 学习`core::simd`，但要有所选择。
- en: Brainstorm candidate algorithms.
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 思考候选算法。
- en: Use Godbolt and AI to understand your code’s assembly, even if you don’t know
    assembly language.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 Godbolt 和 AI 来理解你的代码的汇编，即使你不知道汇编语言。
- en: Generalize to all types and LANES with in-lined generics, (and when that doesn’t
    work) macros, and (when that doesn’t work) traits.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过内联泛型、（如果那不行）宏、（如果那不行）特性将所有类型和 LANEs 进行泛化。
- en: 'See [Part 2](https://towardsdatascience.com/nine-rules-for-simd-acceleration-of-your-rust-code-part-2-6a104b3be6f3) for
    these rules:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 查看 [第二部分](https://towardsdatascience.com/nine-rules-for-simd-acceleration-of-your-rust-code-part-2-6a104b3be6f3) 中的这些规则：
- en: '*7\. Use Criterion benchmarking to pick an algorithm and to discover that LANES
    should (almost) always be 32 or 64.*'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '*7. 使用 Criterion 基准测试来选择算法，并发现 LANE 应该（几乎）总是 32 或 64。*'
- en: '*8\. Integrate your best SIMD algorithm into your project with `as_simd`, special
    code for `i128/u128`, and additional in-context benchmarking.*'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '*8. 使用 `as_simd`、针对 `i128/u128` 的特殊代码以及额外的上下文基准测试将最佳 SIMD 算法集成到你的项目中。*'
- en: '*9\. Extricate your best SIMD algorithm from your project (for now) with an
    optional cargo feature.*'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*9. 从项目中提取最佳 SIMD 算法（目前）并使用可选的 cargo 功能。*'
- en: '*Aside: To avoid wishy-washiness, I call these “rules”, but they are, of course,
    just suggestions.*'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '*此外：为了避免犹豫不决，我称这些为“规则”，但它们当然只是建议。*'
- en: 'Rule 1: Use nightly Rust and `core::simd`, Rust’s experimental standard SIMD
    module.'
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则 1：使用 nightly Rust 和 `core::simd`，Rust 的实验性标准 SIMD 模块。
- en: 'Rust can access SIMD operations either via the stable [`core::arch`](https://doc.rust-lang.org/core/arch/index.html) module
    or via nighty’s [`core::simd`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html) module.
    Let’s compare them:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: Rust 可以通过稳定的 [`core::arch`](https://doc.rust-lang.org/core/arch/index.html) 模块或通过
    nighty 的 [`core::simd`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html) 模块来访问
    SIMD 操作。让我们比较它们：
- en: '**`core::arch`**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**`core::arch`**'
- en: Stable
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Stable
- en: '[“[N]ot the easiest thing in the world](https://doc.rust-lang.org/core/arch/index.html#ergonomics)”'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[“[N]ot the easiest thing in the world](https://doc.rust-lang.org/core/arch/index.html#ergonomics)”]'
- en: Offers high-performance to downstream users of your crate. For example, because [regex](https://github.com/BurntSushi/regex) and [`memchr`](https://github.com/BurntSushi/memchr) went
    this route, over 100,000 other crates got stable SIMD acceleration for free. [[Reddit
    discussion](https://www.reddit.com/r/rust/comments/18hj1m6/comment/kdbfktb/?utm_source=share&utm_medium=web2x&context=3), [some
    relevant `memchr` code](https://github.com/BurntSushi/memchr/blob/master/src/arch/x86_64/memchr.rs)]
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为你的 crate 的下游用户提供高性能。例如，因为 [regex](https://github.com/BurntSushi/regex) 和 [`memchr`](https://github.com/BurntSushi/memchr) 采取了这条路线，超过
    10 万个其他 crate 免费获得了稳定的 SIMD 加速。[[Reddit 讨论](https://www.reddit.com/r/rust/comments/18hj1m6/comment/kdbfktb/?utm_source=share&utm_medium=web2x&context=3)，[一些相关的
    `memchr` 代码](https://github.com/BurntSushi/memchr/blob/master/src/arch/x86_64/memchr.rs)]]
- en: '**`core::simd`**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**`core::simd`**'
- en: Nightly
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Nightly
- en: Delightfully easy and portable.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 令人愉快且易于携带。
- en: Limits downstream users to nightly.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 限制下游用户使用nightly版本。
- en: I decided to go with “easy”. If you decide to take the harder road, starting
    first with the easier path may still be worthwhile.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我决定选择“简单”。如果你决定走更难的路，先从简单的路径开始可能仍然值得。
- en: '* * *'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'In either case, before we try to use SIMD operations in a larger project, let’s
    make sure we can get them working at all. Here are the steps:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们尝试在更大的项目中使用 SIMD 操作之前，让我们确保我们能够使它们正常工作。以下是步骤：
- en: 'First, create a project called `simd_hello`:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，创建一个名为 `simd_hello` 的项目：
- en: '[PRE0]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Edit `src/main.rs` to contain ([Rust playground](https://play.rust-lang.org/?version=nightly&mode=debug&edition=2021&gist=e39aa876c0abed9915d389fe73687839)):'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑 `src/main.rs` 以包含 ([Rust playground](https://play.rust-lang.org/?version=nightly&mode=debug&edition=2021&gist=e39aa876c0abed9915d389fe73687839))：
- en: '[PRE1]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Next — full SIMD capabilities require the nightly version of Rust. Assuming
    you have Rust installed, install nightly (`rustup install nightly`). Make sure
    you have the latest nightly version (`rustup update nightly`). Finally, set this
    project to use nightly (`rustup override set nightly`).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来——完整的 SIMD 功能需要 Rust 的 nightly 版本。假设你已经安装了 Rust，安装 nightly (`rustup install
    nightly`)。确保你有最新的 nightly 版本 (`rustup update nightly`)。最后，将此项目设置为使用 nightly (`rustup
    override set nightly`)。
- en: You can now run the program with `cargo run`. The program applies [ROT13 decryption](https://en.wikipedia.org/wiki/ROT13) to
    32 bytes of upper-case letters. With SIMD, the program can decrypt all 32 bytes
    simultaneously.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在可以使用 `cargo run` 来运行程序。该程序对32个字节的 uppercase 字母应用 [ROT13 解密](https://en.wikipedia.org/wiki/ROT13)。使用
    SIMD，程序可以同时解密所有32个字节。
- en: 'Let’s look at each section of the program to see how it works. It starts with:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看程序的每个部分，看看它是如何工作的。它从：
- en: '[PRE2]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Rust nightly offers its extra capabilities (or “features”) only on request.
    The `#![feature(portable_simd)]` statement requests that Rust nightly make available
    the new experimental `core::simd` module. The `use` statement then imports the
    module’s most important types and traits.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: Rust 夜间版本只在其请求的情况下提供额外的功能（或“特性”）。`#![feature(portable_simd)]` 声明请求 Rust 夜间版本使新的实验性
    `core::simd` 模块可用。然后 `use` 声明导入模块最重要的类型和特性。
- en: 'In the code’s next section, we define useful constants:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码的下一部分，我们定义了有用的常量：
- en: '[PRE3]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The `Simd` struct is a special kind of Rust array. (It is, for example, always
    memory aligned.) The constant `LANES` tells the length of the `Simd` array. The `from_array` constructor
    copies a regular Rust array to create a `Simd`. In this case, because we want `const` `Simd`’s,
    the arrays we construct from must also be `const`.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '`Simd` 结构体是一种特殊的 Rust 数组。（例如，它总是内存对齐的。）常量 `LANES` 告诉 `Simd` 数组的长度。`from_array`
    构造函数将常规 Rust 数组复制以创建一个 `Simd`。在这种情况下，因为我们想要 `const` `Simd`，所以我们构造的数组也必须是 `const`。'
- en: The next two lines copy our encrypted text into `data` and then adds 13 to each
    letter.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的两行将我们的加密文本复制到 `data` 中，然后对每个字母加 13。
- en: '[PRE4]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: What if you make an error and your encrypted text isn’t exactly length `LANES` (32)?
    Sadly, the compiler won’t tell you. Instead, when you run the program, `from_slice` will
    panic. What if the encrypted text contains non-upper-case letters? In this example
    program, we’ll ignore that possibility.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你出错，并且你的加密文本的长度不是正好为 `LANES`（32），会怎样？遗憾的是，编译器不会告诉你。相反，当你运行程序时，`from_slice`
    将引发恐慌。如果加密文本包含非大写字母怎么办？在这个示例程序中，我们将忽略这种可能性。
- en: The `+=` operator does element-wise addition between the `Simd` `data` and `Simd` `THIRTEENS`.
    It puts the result in `data`. Recall that debug builds of regular Rust addition
    check for overflows. Not so with SIMD. Rust defines SIMD arithmetic operators
    to always wrap. Values of type `u8` wrap after 255.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '`+=` 运算符在 `Simd` `data` 和 `Simd` `THIRTEENS` 之间执行逐元素加法。结果存储在 `data` 中。回想一下，常规
    Rust 加法构建版本会检查溢出。但对于 SIMD 来说并非如此。Rust 定义了 SIMD 算术运算符以确保总是回绕。`u8` 类型的值在 255 后回绕。'
- en: Coincidentally, Rot13 decryption also requires wrapping, but after ‘Z’ rather
    than after 255\. Here is one approach to coding the needed Rot13 wrapping. It
    subtracts 26 from any values [on beyond ‘Z](https://en.wikipedia.org/wiki/On_Beyond_Zebra!)’.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 意外的是，Rot13 解密也要求回绕，但不是在 255 之后，而是在 'Z' 之后。这里是一个编码所需 Rot13 回绕的方法。它从任何超过 'Z' 的值中减去
    26。
- en: '[PRE5]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This says to find the element-wise places beyond ‘Z’. Then, subtract 26 from
    all values. At the places of interest, use the subtracted values. At the other
    places, use the original values. Does subtracting from all values and then using
    only some seem wasteful? With SIMD, this takes no extra computer time and avoids
    jumps. This strategy is, thus, efficient and common.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这表示要找到超过 'Z' 的逐元素位置。然后，从所有值中减去 26。在感兴趣的位置使用减去的值。在其他位置使用原始值。从所有值中减去然后只使用一些值是否显得浪费？使用
    SIMD，这不会占用额外的计算机时间，并避免跳跃。因此，这种策略是有效且常见的。
- en: 'The program ends like so:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 程序以这种方式结束：
- en: '[PRE6]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Notice the `.as_array()` method. It safely transmutes a `Simd` struct into a
    regular Rust array without copying.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到 `.as_array()` 方法。它安全地将 `Simd` 结构体转换为常规 Rust 数组，而不进行复制。
- en: Surprisingly to me, this program runs fine on computers without SIMD extensions.
    Rust nightly compiles the code to regular (non-SIMD) instructions. But we don’t
    just want to run “fine”, we want to run *faster*. That requires us to turn on
    our computer’s SIMD power.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 令我惊讶的是，这个程序在没有 SIMD 扩展的电脑上也能正常运行。Rust 夜间版本将代码编译成常规（非 SIMD）指令。但我们不仅想要运行“良好”，我们想要运行得更快。这需要我们打开电脑的
    SIMD 功能。
- en: 'Rule 2: CCC: Check, Control, and Choose your computer’s SIMD capabilities.'
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则 2：CCC：检查、控制和选择你电脑的 SIMD 功能。
- en: To make SIMD programs run faster on your machine, you must first discover which
    SIMD extensions your machine supports. If you have an Intel/AMD machine, you can
    use my [`simd-detect`](https://github.com/CarlKCarlK/cargo-simd-detect) cargo
    command.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 要使 SIMD 程序在你的机器上运行得更快，你必须首先发现你的机器支持哪些 SIMD 扩展。如果你有 Intel/AMD 机器，你可以使用我的 `simd-detect`
    cargo 命令。
- en: 'Run with:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 运行方式：
- en: '[PRE7]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'On my machine, it outputs:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的机器上，它输出：
- en: '[PRE8]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This says that my machine supports the `sse2`, `avx2`, and `avx512f` SIMD extensions.
    Of those, by default, Rust enables the ubiquitous twenty-year-old `sse2` extension.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这表示我的机器支持 `sse2`、`avx2` 和 `avx512f` SIMD 扩展。在这些中，默认情况下，Rust 启用了无处不在的二十年前就有的
    `sse2` 扩展。
- en: The SIMD extensions form a hierarchy with `avx512f` above `avx2` above `sse2`.
    Enabling a higher-level extension also enables the lower-level extensions.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: SIMD扩展形成了一个层次结构，其中`avx512f`位于`avx2`之上，`avx2`位于`sse2`之上。启用高级扩展也会启用低级扩展。
- en: 'Most Intel/AMD computers also support the ten-year-old `avx2` extension. You
    enable it by setting an environment variable:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数英特尔/AMD计算机也支持十年前的`avx2`扩展。您可以通过设置环境变量来启用它：
- en: '[PRE9]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: “Force install” and run `simd-detect` again and you should see that `avx2` is
    enabled.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: “强制安装”并再次运行`simd-detect`，您应该会看到`avx2`已被启用。
- en: '[PRE10]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '[PRE11]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Alternatively, you can turn on every SIMD extension that your machine supports:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，您可以选择您机器支持的每个SIMD扩展：
- en: '[PRE12]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: On my machine this enables `avx512f`, a newer SIMD extension supported by some
    Intel computers and a few AMD computers.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的机器上，这启用了`avx512f`，这是某些英特尔计算机和少数AMD计算机支持的较新的SIMD扩展。
- en: 'You can set SIMD extensions back to their default (`sse2` on Intel/AMD) with:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用以下命令将SIMD扩展重置为其默认值（英特尔/AMD上的`sse2`）：
- en: '[PRE13]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: You may wonder why `target-cpu=native` isn’t Rust’s default. The problem is
    that binaries created using `avx2` or `avx512f` won’t run on computers missing
    those SIMD extensions. So, if you are compiling only for your own use, use `target-cpu=native`.
    If, however, you are compiling for others, choose your SIMD extensions thoughtfully
    and let people know which SIMD extension level you are assuming.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能会想知道为什么`target-cpu=native`不是Rust的默认设置。问题是使用`avx2`或`avx512f`创建的二进制文件无法在没有这些SIMD扩展的计算机上运行。因此，如果您只为自己的使用编译，请使用`target-cpu=native`。然而，如果您为他人编译，请仔细选择您的SIMD扩展，并让人们知道您假设的SIMD扩展级别。
- en: Happily, whatever level of SIMD extension you pick, Rust’s SIMD support is so
    flexible you can easily change your decision later. Let’s next learn details of
    programming with SIMD in Rust.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，无论您选择哪种SIMD扩展级别，Rust的SIMD支持都非常灵活，您可以轻松地稍后更改您的决定。接下来，让我们学习如何在Rust中使用SIMD编程的细节。
- en: 'Rule 3: Learn `core::simd`, but selectively.'
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则3：学习`core::simd`，但要有所选择。
- en: To build with Rust’s new [`core::simd`](https://doc.rust-lang.org/nightly/core/simd/index.html) module
    you should learn selected building blocks. Here is a [cheatsheet](https://github.com/CarlKCarlK/range-set-blaze/blob/nov23/examples/simd/rust_simd_cheatsheet.md) with
    the structs, methods, etc., that I’ve found most useful. Each item includes a
    link to its [documentation](https://doc.rust-lang.org/nightly/core/simd/index.html).
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用Rust的新`[`core::simd`](https://doc.rust-lang.org/nightly/core/simd/index.html)模块进行构建，您应该学习所选的构建块。以下是一个[速查表](https://github.com/CarlKCarlK/range-set-blaze/blob/nov23/examples/simd/rust_simd_cheatsheet.md)，其中包含我找到的最有用的结构体、方法等。每个条目都包含其[文档](https://doc.rust-lang.org/nightly/core/simd/index.html)的链接。
- en: Structs
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结构体
- en: '[`Simd`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html) – a
    special, aligned, fixed-length array of [`SimdElement`](https://doc.rust-lang.org/std/simd/trait.SimdElement.html).
    We refer to a position in the array and the element stored at that position as
    a “lane”. By default, we copy `Simd` structs rather than reference them.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`Simd`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html) – 一个特殊的、对齐的、固定长度的数组，包含`[`SimdElement`](https://doc.rust-lang.org/std/simd/trait.SimdElement.html)。我们称数组中的位置和存储在该位置的元素为“通道”。默认情况下，我们复制`Simd`结构体而不是引用它们。'
- en: '[`Mask`](https://doc.rust-lang.org/nightly/core/simd/struct.Mask.html) – a
    special Boolean array showing inclusion/exclusion on a per-lane basis.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`Mask`](https://doc.rust-lang.org/nightly/core/simd/struct.Mask.html) – 一个特殊的布尔数组，显示每个通道的包含/排除情况。'
- en: SimdElements
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: SimdElements
- en: Floating-Point Types: `f32`, `f64`
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 浮点类型：`f32`，`f64`
- en: Integer Types: `i8`, `u8`, `i16`, `u16`, `i32`, `u32`, `i64`, `u64`, `isize`, `usize`
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 整数类型：`i8`，`u8`，`i16`，`u16`，`i32`，`u32`，`i64`，`u64`，`isize`，`usize`
- en: — [*but not `i128`, `u128`*](https://github.com/rust-lang/portable-simd/issues/108)
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: — [*但不是`i128`，`u128`*](https://github.com/rust-lang/portable-simd/issues/108)
- en: '**`Simd` constructors**'
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**`Simd`构造函数**'
- en: '[`Simd::from_array`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.from_array) –
    creates a `Simd` struct by copying a fixed-length array.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`Simd::from_array`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.from_array) –
    通过复制固定长度的数组来创建`Simd`结构体。'
- en: '[`Simd::from_slice`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.from_slice) –
    creates a `Simd<T,LANE>` struct by copying the first `LANE` elements of a slice.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`Simd::from_slice`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.from_slice) –
    通过复制切片的第一个`LANE`个元素来创建`Simd<T,LANE>`结构体。'
- en: '[`Simd::splat`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.splat) –
    replicates a single value across all lanes of a `Simd` struct.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`Simd::splat`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.splat) –
    在`Simd`结构体的所有通道上复制单个值。'
- en: '[`slice::as_simd`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.to_simd) –
    without copying, safely transmutes a regular slice into an aligned slice of `Simd` (plus
    unaligned leftovers).'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[slice::as_simd](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.to_simd)
    – 不复制，安全地将常规切片转换为对齐的`Simd`切片（以及未对齐的剩余部分）。'
- en: '**`Simd` conversion**'
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**`Simd`转换**'
- en: '[`Simd::as_array`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.as_array) –
    without copying, safely transmutes an `Simd` struct into a regular array reference.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Simd::as_array](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.as_array)
    – 不复制，安全地将`Simd`结构体转换为常规数组引用。'
- en: '**`Simd` methods and operators**'
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**`Simd`方法和运算符**'
- en: '[`simd[i]`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.index) –
    extract a value from a lane of a `Simd`.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[simd[i]](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.index)
    – 从`Simd`的一个通道中提取值。'
- en: '[`simd + simd`](https://doc.rust-lang.org/core/simd/struct.Simd.html#impl-Add%3C%26''rhs+Simd%3CT,+LANES%3E%3E-for-%26''lhs+Simd%3CT,+LANES%3E) –
    performs element-wise addition of two `Simd` structs. Also, supported `-`, `*`, `/`, `%`,
    remainder, bitwise-and, -or, xor, -not, -shift.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[simd + simd](https://doc.rust-lang.org/core/simd/struct.Simd.html#impl-Add%3C%26''rhs+Simd%3CT,+LANES%3E%3E-for-%26''lhs+Simd%3CT,+LANES%3E)
    – 执行两个`Simd`结构体的逐元素加法。也支持`-`、`*`、`/`、`%`、余数、按位与、或、异或、非、左移等运算符。'
- en: '[`simd += simd`](https://doc.rust-lang.org/core/simd/struct.Simd.html#impl-AddAssign%3CU%3E-for-Simd%3CT,+LANES%3E) –
    adds another `Simd` struct to the current one, in place. Other operators supported,
    too.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[simd += simd](https://doc.rust-lang.org/core/simd/struct.Simd.html#impl-AddAssign%3CU%3E-for-Simd%3CT,+LANES%3E)
    – 将另一个`Simd`结构体添加到当前结构体中，就地修改。其他运算符也支持。'
- en: '[`Simd::simd_gt`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.simd_gt) –
    compares two `Simd` structs, returning a `Mask` indicating which elements of the
    first are greater than those of the second. Also, supported `simd_lt`, `simd_le`, `simd_ge`, `simd_lt`, `simd_eq`, `simd_ne`.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Simd::simd_gt](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.simd_gt)
    – 比较两个`Simd`结构体，返回一个`Mask`，指示第一个结构体的哪些元素大于第二个结构体的元素。也支持`simd_lt`、`simd_le`、`simd_ge`、`simd_lt`、`simd_eq`、`simd_ne`。'
- en: '[`Simd::rotate_elements_left`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.rotate_elements_left) –
    rotates the elements of a `Simd` struct to the left by a specified amount. Also, `rotate_elements_right`.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Simd::rotate_elements_left](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.rotate_elements_left)
    – 将`Simd`结构体的元素按指定数量向左旋转。也支持`rotate_elements_right`。'
- en: '[`simd_swizzle!(simd, indexes)`](https://doc.rust-lang.org/std/simd/prelude/macro.simd_swizzle.html) –
    rearranges the elements of a `Simd` struct based on the specified const indexes.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[simd_swizzle!(simd, indexes)](https://doc.rust-lang.org/std/simd/prelude/macro.simd_swizzle.html)
    – 根据指定的常量索引重新排列`Simd`结构体的元素。'
- en: '[`simd == simd`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#impl-Eq-for-Simd%3CT,+N%3E) –
    checks for equality between two `Simd` structs, returning a regular `bool` result.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[simd == simd](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#impl-Eq-for-Simd%3CT,+N%3E)
    – 检查两个`Simd`结构体之间的相等性，返回一个常规的`bool`结果。'
- en: '[`Simd::reduce_and`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.reduce_and) –
    performs a bitwise AND reduction across all lanes of a `Simd` struct. Also, supported: `reduce_or`, `reduce_xor`, `reduce_max`, `reduce_min`, `reduce_sum` (but
    no`reduce_eq`).'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Simd::reduce_and](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.reduce_and)
    – 在`Simd`结构体的所有通道上执行按位与的归约。同时支持：`reduce_or`、`reduce_xor`、`reduce_max`、`reduce_min`、`reduce_sum`（但不支持`reduce_eq`）。'
- en: '**`Mask` methods and operators**'
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**`Mask`方法和运算符**'
- en: '[`Mask::select`](https://doc.rust-lang.org/nightly/core/simd/struct.Mask.html#method.select) –
    selects elements from two `Simd` struct based on a mask.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Mask::select](https://doc.rust-lang.org/nightly/core/simd/struct.Mask.html#method.select)
    – 根据掩码从两个`Simd`结构体中选择元素。'
- en: '[`Mask::all`](https://doc.rust-lang.org/nightly/core/simd/struct.Mask.html#method.all) –
    tells if the mask is all `true`.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Mask::all](https://doc.rust-lang.org/nightly/core/simd/struct.Mask.html#method.all)
    – 判断掩码是否全部为`true`。'
- en: '[`Mask::any`](https://doc.rust-lang.org/nightly/core/simd/struct.Mask.html#method.all) –
    tells if the mask contains any `true`.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Mask::any](https://doc.rust-lang.org/nightly/core/simd/struct.Mask.html#method.any)
    – 判断掩码中是否包含任何`true`。'
- en: '**All about lanes**'
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**关于通道的所有内容**'
- en: '[`Simd::LANES`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#associatedconstant.LANES) –
    a constant indicating the number of elements (lanes) in a `Simd` struct.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Simd::LANES](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#associatedconstant.LANES)
    – 表示`Simd`结构体中元素（通道）数量的常量。'
- en: '[`SupportedLaneCount`](https://doc.rust-lang.org/nightly/core/simd/trait.SupportedLaneCount.html) –
    tells the allowed values of `LANES`. Use by generics.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[SupportedLaneCount](https://doc.rust-lang.org/nightly/core/simd/trait.SupportedLaneCount.html)
    – 告诉`LANES`允许的值。通过泛型使用。'
- en: '[`simd.lanes`](https://doc.rust-lang.org/core/simd/struct.Simd.html#method.lanes) –
    const method that tells a `Simd` struct’s number of lanes.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[simd.lanes](https://doc.rust-lang.org/core/simd/struct.Simd.html#method.lanes)
    – 常量方法，告诉`Simd`结构体的通道数。'
- en: '**Low-level alignment, offsets, etc.**'
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**低级对齐，偏移量等。**'
- en: '*When possible, use *[*`to_simd`*](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.to_simd)* instead.*'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '*尽可能使用[*`to_simd`*](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.to_simd)*代替*。'
- en: '[`mem::size_of`](https://doc.rust-lang.org/std/mem/fn.size_of.html), [`mem::align_of`](https://doc.rust-lang.org/std/mem/fn.align_of.html), [`mem::align_to`](https://doc.rust-lang.org/std/mem/fn.align_to.html), [`intrinsics::offset`](https://doc.rust-lang.org/std/intrinsics/fn.offset.html), [`pointer::read_unaligned`](https://doc.rust-lang.org/std/primitive.pointer.html#method.read_unaligned) (unsafe), [`pointer::write_unaligned`](https://doc.rust-lang.org/std/primitive.pointer.html#method.write_unaligned) (unsafe), [`mem::transmute`](https://doc.rust-lang.org/std/mem/fn.transmute.html) (unsafe,
    const)'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[mem::size_of](https://doc.rust-lang.org/std/mem/fn.size_of.html), [mem::align_of](https://doc.rust-lang.org/std/mem/fn.align_of.html),
    [mem::align_to](https://doc.rust-lang.org/std/mem/fn.align_to.html), [intrinsics::offset](https://doc.rust-lang.org/std/intrinsics/fn.offset.html),
    [pointer::read_unaligned](https://doc.rust-lang.org/std/primitive.pointer.html#method.read_unaligned)（不安全）,
    [pointer::write_unaligned](https://doc.rust-lang.org/std/primitive.pointer.html#method.write_unaligned)（不安全）,
    [mem::transmute](https://doc.rust-lang.org/std/mem/fn.transmute.html)（不安全，const）'
- en: '**More, perhaps of interest**'
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**更多，可能感兴趣**'
- en: '[`deinterleave`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.deinterleave), [`gather_or`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.gather_or), [`reverse`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.reverse), [`scatter`](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.scatter)'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[deinterleave](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.deinterleave),
    [gather_or](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.gather_or),
    [reverse](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.reverse),
    [scatter](https://doc.rust-lang.org/nightly/core/simd/struct.Simd.html#method.scatter)'
- en: With these building blocks at hand, it’s time to build something.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有这些构建块后，是时候构建一些东西了。
- en: 'Rule 4: Brainstorm candidate algorithms.'
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则4：头脑风暴候选算法。
- en: What do *you* want to speed up? You won’t know ahead of time which SIMD approach
    (of any) will work best. You should, therefore, create many algorithms that you
    can then analyze (Rule 5) and benchmark (Rule 7).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 你想加速什么？你事先不知道哪种SIMD方法（任何一种）会工作得最好。因此，你应该创建许多算法，然后你可以分析（规则5）和基准测试（规则7）。
- en: I wanted to speed up [`range-set-blaze`](https://crates.io/crates/range-set-blaze),
    a crate for manipulating sets of “clumpy” integers. I hoped that creating `is_consecutive`,
    a function to detect blocks of consecutive integers, would be useful.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我想加速 [`range-set-blaze`](https://crates.io/crates/range-set-blaze)，这是一个用于操作“块状”整数集合的crate。我希望创建一个名为`is_consecutive`的函数，用于检测连续整数块，这将是有用的。
- en: '**Background:** Crate *`range-set-blaze` works on “clumpy” integers. “C*lumpy”,
    here, means that the number of ranges needed to represent the data is small compared
    to the number of input integers. For example, these 1002 input integers'
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**背景：** Crate `range-set-blaze` 处理“块状”整数。“C*lumpy”，在这里意味着表示数据所需的范围数量与输入整数数量相比很小。例如，这些1002个输入整数'
- en: ''
  id: totrans-121
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '`100, 101,` …, `489, 499, 501, 502, `…, `998, 999, 999, 100, 0`'
  id: totrans-122
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '`100, 101,` …, `489, 499, 501, 502,` …, `998, 999, 999, 100, 0`'
- en: ''
  id: totrans-123
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Ultimately become three Rust ranges:'
  id: totrans-124
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 最终成为三个Rust范围：
- en: ''
  id: totrans-125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '`0..=0, 100..=499, 501..=999`.'
  id: totrans-126
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '`0..=0, 100..=499, 501..=999`.'
- en: ''
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: (Internally, the [*`RangeSetBlaze`*](https://docs.rs/range-set-blaze/latest/range_set_blaze/struct.RangeSetBlaze.html#) struct
    represents a set of integers as a sorted list of disjoint ranges stored in a cache
    efficient [BTreeMap](http://const%20method%20that%20tells%20a%20simd%20struct's%20number%20of%20lanes./).)
  id: totrans-128
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: （内部，`[*`RangeSetBlaze`*](https://docs.rs/range-set-blaze/latest/range_set_blaze/struct.RangeSetBlaze.html#)
    结构体将整数集合表示为存储在缓存高效的[BTreeMap](http://const%20method%20that%20tells%20a%20simd%20struct's%20number%20of%20lanes./)
    中的有序不交范围列表。）
- en: ''
  id: totrans-129
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Although the input integers are allowed to be unsorted and redundant, we expect
    them to often be “nice”. RangeSetBlaze’s `from_iter` constructor already exploits
    this expectation by grouping up adjacent integers. For example, `from_iter` first
    turns the 1002 input integers into four ranges
  id: totrans-130
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 虽然输入的整数可以是无序的和重复的，但我们期望它们通常是“好的”。RangeSetBlaze 的 `from_iter` 构造函数已经通过将相邻整数分组来利用这种期望。例如，`from_iter`
    首先将1002个输入整数转换为四个范围
- en: ''
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*`100..=499, 501..=999, 100..=100, 0..=0.`*'
  id: totrans-132
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*`100..=499, 501..=999, 100..=100, 0..=0.`*'
- en: ''
  id: totrans-133
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: with minimal, constant memory usage, independent of input size. It then sorts
    and merges these reduced ranges.
  id: totrans-134
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 使用最小、常量内存使用，独立于输入大小。然后它对这些缩减范围进行排序和合并。
- en: ''
  id: totrans-135
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I wondered if a new `from_slice` method could speed construction from array-like
    inputs by quickly finding (some) consecutive integers. For example, could it—
    with minimal, constant memory — turn the 1002 inputs integers *into five Rust
    ranges:*
  id: totrans-136
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我想知道一个新的 `from_slice` 方法是否可以通过快速找到（一些）连续整数来加速从类似数组的输入构建。例如，它——使用最小、常量内存——能否将1002个输入整数
    *转换成五个Rust范围：*
- en: ''
  id: totrans-137
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*`100..=499, 501..=999, 999..=999, 100..=100, 0..=0.`*'
  id: totrans-138
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*`100..=499, 501..=999, 999..=999, 100..=100, 0..=0.`*'
- en: ''
  id: totrans-139
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*If so, `from_iter` could then quickly finish the processing.*'
  id: totrans-140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*如果这样，`from_iter` 就可以快速完成处理。*'
- en: 'Let’s start by writing `is_consecutive` with regular Rust:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从用常规 Rust 编写 `is_consecutive` 开始：
- en: '[PRE14]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The algorithm just loops through the array sequentially, checking that each
    value is one more than its predecessor. It also avoids overflow.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 算法只是顺序遍历数组，检查每个值是否比其前一个值大1。它还避免了溢出。
- en: 'Looping over the items seemed so easy, I wasn’t sure if SIMD could do any better.
    Here was my first attempt:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 遍历项目似乎很简单，我不确定 SIMD 是否能做得更好。这是我第一次尝试：
- en: Splat0
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Splat0
- en: '[PRE15]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Here is an outline of its calculations:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是其计算概述：
- en: '![](../Images/be6804710cffdd60be8037d33fe99887.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/be6804710cffdd60be8037d33fe99887.png)'
- en: 'Source: This and all following images by author.'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：本文及所有后续图像均由作者提供。
- en: It first (needlessly) checks that the first and last items are 15 apart. It
    then creates `added` by adding 15 to the 0th item, 14 to the next, etc. Finally,
    to see if all items in `added` are the same, it creates a new `Simd` based on `added`’s
    0th item and then compares. Recall that `splat` creates a `Simd` struct from one
    value.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 它首先（不必要地）检查第一个和最后一个元素之间相隔15个。然后通过将0号元素加15、下一个加14等来创建 `added`。最后，为了检查 `added`
    中的所有元素是否相同，它基于 `added` 的0号元素创建一个新的 `Simd` 并进行比较。回想一下，`splat` 是从一个值创建一个 `Simd`
    结构。
- en: Splat1 & Splat2
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Splat1 & Splat2
- en: 'When I mentioned the `is_consecutive` problem to Ben Lichtman, he independently
    came up with this, Splat1:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 当我向本·利希滕曼提到 `is_consecutive` 问题的时候，他独立地提出了这个，Splat1：
- en: '[PRE16]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Splat1 subtracts the comparison value from `chunk` and checks if the result
    is the same as the first element of `chunk`, splatted.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: Splat1 从 `chunk` 中减去比较值，并检查结果是否与 `chunk` 的第一个元素展开后的结果相同。
- en: '![](../Images/181128e8057527d325c20fd0dc2ada5f.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/181128e8057527d325c20fd0dc2ada5f.png)'
- en: He also came up with a variation called Splat2 that splats the first element
    of `subtracted` rather than `chunk`. That would seemingly avoid one memory access.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 他还提出了一种称为 Splat2 的变体，它将 `subtracted` 的第一个元素而不是 `chunk` 进行展开。这似乎可以避免一次内存访问。
- en: I’m sure you are wondering which of these is best, but before we discuss that
    let’s look at two more candidates.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我确信你一定想知道这些中哪一个最好，但在我们讨论这个之前，让我们看看另外两个候选人。
- en: Swizzle
  id: totrans-158
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Swizzle
- en: Swizzle is like Splat2 but uses `simd_swizzle!` instead of `splat`. Macro `simd_swizzle!` creates
    a new `Simd` by rearranging the lanes of an old `Simd` according to an array of
    indexes.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: Swizzle 与 Splat2 类似，但使用 `simd_swizzle!` 而不是 `splat`。宏 `simd_swizzle!` 通过根据索引数组重新排列旧
    `Simd` 的通道来创建一个新的 `Simd`。
- en: '[PRE17]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Rotate
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 旋转
- en: This one is different. I had high hopes for it.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这个不同。我对它寄予厚望。
- en: '[PRE18]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The idea is to rotate all the elements one to the right. We then subtract the
    original `chunk` from `rotated`. If the input is consecutive, the result should
    be “-15” followed by all 1’s. (Using wrapped subtraction, -15 is `4294967281u32`.)
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 策略是将所有元素向右旋转一个位置。然后我们从 `rotated` 中减去原始的 `chunk`。如果输入是连续的，结果应该是“-15”后面跟着所有1。（使用包装减法，-15是
    `4294967281u32`。）
- en: '![](../Images/a68d3f1cc0896ee5b9434d33496585e5.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a68d3f1cc0896ee5b9434d33496585e5.png)'
- en: Now that we have candidates, let’s start to evaluate them.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了候选人，让我们开始评估它们。
- en: 'Rule 5: Use Godbolt and AI to understand your code’s assembly, even if you
    don’t know assembly language.'
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则5：使用 Godbolt 和 AI 来理解你的代码的汇编，即使你不知道汇编语言。
- en: We’ll evaluate the candidates in two ways. First, in this rule, we’ll look at
    the assembly language generated from our code. Second, in Rule 7, we’ll benchmark
    the code’s speed.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将以两种方式评估候选人。首先，在本规则中，我们将查看从我们的代码生成的汇编语言。其次，在规则7中，我们将对代码的速度进行基准测试。
- en: '*Don’t worry if you don’t know assembly language, you can still get something
    out of looking at it.*'
  id: totrans-169
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*如果你不知道汇编语言，你仍然可以从查看它中获得一些东西。*'
- en: 'The easiest way to see the generated assembly language is with the [Compiler
    Explorer, AKA Godbolt](https://godbolt.org/z/j5GdGah89). It works best on short
    bits of code that don’t use outside crates. It looks like this:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 最容易查看生成的汇编语言的方法是使用[编译器探索器，又称Godbolt](https://godbolt.org/z/j5GdGah89)。它最适合短小的代码片段，不使用外部crate。它看起来像这样：
- en: '![](../Images/3d0fcca2ab46357307c2c5d68de2ac64.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3d0fcca2ab46357307c2c5d68de2ac64.png)'
- en: 'Referring to the numbers in the figure above, follow these steps to use Godbolt:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 参考上图中的数字，按照以下步骤使用Godbolt：
- en: Open [godbolt.org](https://godbolt.org/z/odrPv5WcG) with your web browser.
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用你的网络浏览器打开[godbolt.org](https://godbolt.org/z/odrPv5WcG)。
- en: Add a new source editor.
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加一个新的源代码编辑器。
- en: Select Rust as your language.
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择Rust作为你的语言。
- en: Paste in the code of interest. Make the functions of interest public (`pub fn`).
    Do not include a main or unneeded functions. The tool doesn’t support external
    crates.
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将感兴趣的代码粘贴进来。将感兴趣的函数设置为公共的（`pub fn`）。不要包含`main`或不需要的函数。该工具不支持外部crate。
- en: Add a new compiler.
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加一个新的编译器。
- en: Set the compiler version to nightly.
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将编译器版本设置为nightly。
- en: Set options (for now) to `-C opt-level=3 -C target-feature=+avx512f.`
  id: totrans-179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置选项（目前）为`-C opt-level=3 -C target-feature=+avx512f`。
- en: If there are errors, look at the output.
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果有错误，请查看输出。
- en: If you want to share or save the state of the tool, click “Share”
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你想分享或保存工具的状态，请点击“分享”。
- en: From the image above, you can see that Splat2 and Sizzle are exactly the same,
    so we can remove Sizzle from consideration. If you [open up a copy of my Godbolt
    session](https://godbolt.org/z/j5GdGah89), you’ll also see that most of the functions
    compile to about the same number of assembly operations. The exceptions are Regular
    — which is much longer — and Splat0 — which includes the early check.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 从上图可以看到，Splat2和Sizzle完全相同，因此我们可以从考虑中移除Sizzle。如果你[打开我的Godbolt会话的副本](https://godbolt.org/z/j5GdGah89)，你也会看到大多数函数编译成大约相同数量的汇编操作。例外的是Regular——它非常长——和Splat0——它包括早期检查。
- en: 'In the assembly, 512-bit registers start with ZMM. 256-bit registers start
    YMM. 128-bit registers start with XMM. If you want to better understand the generated
    assembly, use AI tools to generate annotations. For example, here I ask [Bing
    Chat](https://www.bing.com/search?q=Bing+AI&showconv=1&FORM=hpcodx) about Splat2:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 在汇编中，512位寄存器以ZMM开头。256位寄存器以YMM开头。128位寄存器以XMM开头。如果你想更好地理解生成的汇编语言，请使用AI工具生成注释。例如，这里我向[Bing
    Chat](https://www.bing.com/search?q=Bing+AI&showconv=1&FORM=hpcodx)询问Splat2：
- en: '![](../Images/03cf93d7388148d685c46975719c7624.png)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/03cf93d7388148d685c46975719c7624.png)'
- en: Try different compiler settings, including `-C target-feature=+avx2` and then
    leaving `target-feature` completely off.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的编译器设置，包括`-C target-feature=+avx2`，然后完全关闭`target-feature`。
- en: Fewer assembly operations don’t necessarily mean faster speed. Looking at the
    assembly does, however, give us a sanity check that the compiler is at least trying
    to use SIMD operations, inlining const references, etc. Also, as with Splat1 and
    Swizzle, it can sometimes let us know when two candidates are the same.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 较少的汇编操作不一定意味着更快的速度。然而，查看汇编语言可以让我们检查编译器是否至少尝试使用SIMD操作、内联常量引用等。同样，就像Splat1和Swizzle一样，它有时可以让我们知道两个候选者是否相同。
- en: '*You may need disassembly features beyond what Godbolt offers, for example,
    the ability to work with code the uses external crates. B3NNY recommended the
    cargo tool [`cargo-show-asm`](https://github.com/pacak/cargo-show-asm) to me.
    I tried it and found it reasonably easy to use.*'
  id: totrans-187
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*你可能需要Godbolt提供的超出其功能的反汇编功能，例如，处理使用外部crate的代码的能力。B3NNY向我推荐了cargo工具[`cargo-show-asm`](https://github.com/pacak/cargo-show-asm)。我试了试，发现它使用起来相当简单。*'
- en: The `range-set-blaze` crate must handle integer types beyond `u32`. Moreover,
    we must pick a number of LANES, but we have no reason to think that 16 LANES is
    always best. To address these needs, in the next rule we’ll generalize the code.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: '`range-set-blaze` crate必须处理超出`u32`的整型。此外，我们必须选择一个LANES的数量，但我们没有理由认为16个LANES总是最好的。为了满足这些需求，在下一个规则中，我们将泛化代码。'
- en: 'Rule 6: Generalize to all types and LANES with in-lined generics, (and when
    that doesn’t work) macros, and (when that doesn’t work) traits.'
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则6：使用内联泛型将所有类型和LANES泛化，（如果那不起作用）使用宏，以及（如果那不起作用）使用特性。
- en: Let’s first generalize Splat1 with generics.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们首先使用泛型泛化Splat1。
- en: '[PRE19]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: First, note the `#[inline]` attribute. It’s important for efficiency and we’ll
    use it on pretty much every one of these small functions.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，注意`#[inline]`属性。这对于效率很重要，我们将在这些小型函数的每一个上使用它。
- en: The function defined above, `is_consecutive_splat1_gen`, looks great except
    that it needs a second input, called `comparison_value`, that we have yet to define.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 上文中定义的函数`is_consecutive_splat1_gen`看起来很棒，除了它还需要一个名为`comparison_value`的第二个输入，而这个输入我们尚未定义。
- en: '*If you don’t need a generic const `comparison_value`, I envy you. You can
    skip to the next rule if you like. Likewise, if you are reading this in the future
    and creating a generic const `comparison_value` is as effortless as having your
    personal robot do your household chores, then I doubly envy you.*'
  id: totrans-194
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*如果你不需要一个泛型常量`comparison_value`，我羡慕你。如果你愿意，可以跳到下一条规则。同样，如果你在将来阅读这篇文章，创建一个泛型常量`comparison_value`就像让个人机器人帮你做家务一样轻松，那么我更加羡慕你。*'
- en: 'We can try to create a `comparison_value_splat_gen` that is generic and const.
    Sadly, neither `From<usize>` nor alternative `T::One` are const, so this doesn’t
    work:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以尝试创建一个泛型和常量的`comparison_value_splat_gen`。遗憾的是，既不是`From<usize>`也不是替代的`T::One`是常量，所以这行不通：
- en: '[PRE20]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: '**Macros are the last refuge of scoundrels.** So, let’s use macros:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '**宏是坏蛋的最后避难所**。所以，让我们使用宏：'
- en: '[PRE21]'
  id: totrans-198
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'This lets us run on any particular element type and all number of LANES ([Rust
    Playground](https://play.rust-lang.org/?version=nightly&mode=debug&edition=2021&gist=f5a6fbac31d64f3ae79440d5613e44ec)):'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我们可以在任何特定的元素类型和所有数量的LANES上运行（[Rust Playground](https://play.rust-lang.org/?version=nightly&mode=debug&edition=2021&gist=f5a6fbac31d64f3ae79440d5613e44ec)）：
- en: '[PRE22]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Sadly, this still isn’t enough for `range-set-blaze`. It needs to run on *all *element
    types (not just one) and (ideally) all LANES (not just one).
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 很遗憾，这仍然不足以满足`range-set-blaze`的需求。它需要在所有元素类型（而不仅仅是其中一种）上运行，并且（理想情况下）在所有LANES（而不仅仅是其中一种）上运行。
- en: Happily, there’s a workaround, that again depends on macros. It also exploits
    the fact that we only need to support a finite list of types, namely: `i8`, `i16`, `i32`, `i64`, `isize`, `u8`, `u16`, `u32`, `u64`,
    and `usize`. If you need to also (or instead) support `f32` and `f64`, that’s
    fine.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，有一个解决方案，这同样依赖于宏。它还利用了这样一个事实，我们只需要支持有限类型的列表，即：`i8`、`i16`、`i32`、`i64`、`isize`、`u8`、`u16`、`u32`、`u64`和`usize`。如果你还需要（或者代替）支持`f32`和`f64`，那也是可以的。
- en: '*If, on the other hand, you need to support `i128` and `u128`, you may be out
    of luck. The `core::simd` module doesn’t support them. We’ll see in Rule 8 how `range-set-blaze` gets
    around that at a performance cost.*'
  id: totrans-203
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*另一方面，如果你需要支持`i128`和`u128`，你可能运气不佳。`core::simd`模块不支持它们。我们将在规则8中看到`range-set-blaze`如何以性能成本绕过这一点。*'
- en: The workaround defines a new trait, here called `IsConsecutive`. We then use
    a macro (that calls a macro, that calls a macro) to implement the trait on the
    10 types of interest.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 这个解决方案定义了一个新的特性，这里称为`IsConsecutive`。然后我们使用一个宏（该宏调用另一个宏，该宏再调用另一个宏）来在10种感兴趣的类型上实现这个特性。
- en: '[PRE23]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'We can now call fully generic code (Rust Playground):'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以调用完全泛型的代码（Rust Playground）：
- en: '[PRE24]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: With this technique, we can create multiple candidate algorithms that are fully
    generic over type and LANES. Next, it is time to benchmark and see which algorithms
    are fastest.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这种技术，我们可以创建多个完全泛化类型和LANES的候选算法。接下来，是时候进行基准测试，看看哪些算法最快。
- en: '* * *'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Those are the first six rules for adding SIMD code to Rust. In [Part 2](https://towardsdatascience.com/nine-rules-for-simd-acceleration-of-your-rust-code-part-2-6a104b3be6f3),
    we look at rules 7 to 9\. These rules will cover how to pick an algorithm and
    set LANES. Also, how to integrate SIMD operations into your existing code and
    (importantly) how to make it optional. Part 2 concludes with a discussion of when/if
    you should use SIMD and ideas for improving Rust’s SIMD experience. I hope to
    see you [there](https://towardsdatascience.com/nine-rules-for-simd-acceleration-of-your-rust-code-part-2-6a104b3be6f3).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是添加SIMD代码到Rust的前六条规则。在[第二部分](https://towardsdatascience.com/nine-rules-for-simd-acceleration-of-your-rust-code-part-2-6a104b3be6f3)中，我们将探讨规则7到9。这些规则将涵盖如何选择算法和设置LANES，以及如何将SIMD操作集成到现有的代码中，并且（重要的是）如何使其可选。第二部分以讨论何时/是否应该使用SIMD以及改进Rust的SIMD体验的想法结束。我希望在那里见到你[那里](https://towardsdatascience.com/nine-rules-for-simd-acceleration-of-your-rust-code-part-2-6a104b3be6f3)。
- en: '*Please *[*follow Carl on Medium*](https://medium.com/@carlmkadie)*. I write
    on scientific programming in Rust and Python, machine learning, and statistics.
    I tend to write about one article per month.*'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: '*请* [*关注卡尔在Medium上的账号*](https://medium.com/@carlmkadie)。我主要撰写关于Rust和Python的科学编程、机器学习和统计学方面的文章。我倾向于每月撰写一篇文章。*'
