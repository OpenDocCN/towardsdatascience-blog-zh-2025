- en: 'Image Captioning Paper Walkthrough: Show and Tell'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 图像描述论文概述：Show and Tell
- en: 原文：[https://towardsdatascience.com/show-and-tell-e1a1142456e2/](https://towardsdatascience.com/show-and-tell-e1a1142456e2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/show-and-tell-e1a1142456e2/](https://towardsdatascience.com/show-and-tell-e1a1142456e2/)
- en: '![Photo by Ståle Grut on Unsplash](../Images/36585f4456495b00bc40c5a0c5a87ddc.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由Ståle Grut在Unsplash上的图片](../Images/36585f4456495b00bc40c5a0c5a87ddc.png)'
- en: Photo by [Ståle Grut](https://unsplash.com/@stalebg?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Ståle Grut](https://unsplash.com/@stalebg?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上提供
- en: Introduction
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: Natural Language Processing and Computer Vision used to be two completely different
    fields. Well, at least back when I started to learn machine learning and deep
    learning, I feel like there are multiple paths to follow, and each of them, including
    NLP and Computer Vision, directs me to a completely different world. Over time,
    we can now observe that AI becomes more and more advanced, with the intersection
    between multiple fields of study getting more common, including the two I just
    mentioned.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理和计算机视觉曾经是完全不同的两个领域。好吧，至少在我开始学习机器学习和深度学习的时候，我感觉有多个路径可以遵循，而且每个路径，包括NLP和计算机视觉，都引导我进入一个完全不同的世界。随着时间的推移，我们现在可以观察到AI变得越来越先进，多个研究领域之间的交集变得越来越常见，包括我刚才提到的两个领域。
- en: 'Today, many language models have capability to generate images based on the
    given prompt. That’s one example of the bridge between NLP and Computer Vision.
    But I guess I’ll save it for my upcoming article as it is a bit more complex.
    Instead, in this article I am going to discuss the simpler one: image captioning.
    As the name suggests, this is essentially a technique where a specific model accepts
    an image and returns a text that describes the input image.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，许多语言模型都有根据给定提示生成图像的能力。这是NLP和计算机视觉之间桥梁的一个例子。但我想我会在即将到来的文章中保存这个话题，因为它稍微复杂一些。相反，在这篇文章中，我将讨论一个更简单的：图像描述。正如其名所示，这本质上是一种技术，其中特定的模型接受一张图片，并返回描述输入图片的文本。
- en: 'One of the earliest papers in this topic is the one titled "*Show and Tell:
    A Neural Image Caption Generator*" written by Vinyals et al. back in 2015 [1].
    In this article, I will focus on implementing the deep learning model proposed
    in the paper using PyTorch. Note that I won’t actually demonstrate the training
    process here as that’s a topic on its own. Let me know in the comments if you
    want a separate tutorial on that.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '在这个主题中，最早的一些论文之一是由Vinyals等人于2015年撰写的题为"*Show and Tell: A Neural Image Caption
    Generator*"的论文[1]。在这篇文章中，我将专注于使用PyTorch实现论文中提出的深度学习模型。请注意，我实际上不会在这里展示训练过程，因为这本身就是一个独立的话题。如果你想要一个关于这个话题的单独教程，请在评论中告诉我。'
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Image Captioning Framework
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 图像描述框架
- en: 'Generally speaking, image captioning can be done by combining two types of
    models: the one specialized to process images and another one capable of processing
    sequences. I believe you already know what kind of models work best for the two
    tasks – yes, you’re right, those are CNN and RNN, respectively. The idea here
    is that the CNN is utilized to encode the input image (hence this part is called
    *encoder*), whereas the RNN is used for generating a sequence of words based on
    the features encoded by the CNN (hence the RNN part is called *decoder*).'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 通常来说，图像描述可以通过结合两种类型的模型来完成：一种专门用于处理图像，另一种能够处理序列。我相信你已经知道哪种模型最适合这两个任务——是的，你说对了，那就是CNN和RNN。这里的想法是，CNN被用来编码输入图像（因此这一部分被称为*编码器*），而RNN被用来根据CNN编码的特征生成一系列单词（因此RNN部分被称为*解码器*）。
- en: It is discussed in the paper that the authors attempted to do so using GoogLeNet
    (a.k.a., Inception V1) for the encoder and LSTM for the decoder. In fact, the
    use of GoogLeNet is not explicitly mentioned, yet based on the illustration provided
    in the paper it seems like the architecture used in the encoder is adopted from
    the original GoogLeNet paper [2]. The figure below shows what the proposed architecture
    looks like.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 论文中讨论了作者尝试使用GoogLeNet（也称为Inception V1）作为编码器，LSTM作为解码器来做到这一点。实际上，GoogLeNet的使用并没有明确提及，但根据论文中提供的插图，编码器中使用的架构似乎是从原始的GoogLeNet论文[2]中采用的。下面的图显示了所提出的架构。
- en: '![Figure 1\. The image captioning model proposed in [1], where the encoder
    part (the leftmost block) implements the GoogLeNet model [2].](../Images/ee6c81bdd036b50466edf1e9b6a1c2c3.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图1. [1]中提出的图像标题模型，其中编码器部分（最左侧的块）实现了GoogLeNet模型[2]。](../Images/ee6c81bdd036b50466edf1e9b6a1c2c3.png)'
- en: Figure 1\. The image captioning model proposed in [1], where the encoder part
    (the leftmost block) implements the GoogLeNet model [2].
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. [1]中提出的图像标题模型，其中编码器部分（最左侧的块）实现了GoogLeNet模型[2]。
- en: Talking more specifically about the connection between the encoder and the decoder,
    there are several methods available for connecting the two, namely *init-inject*,
    *pre-inject*, *par-inject* and *merge*, as mentioned in [3]. In the case of the
    *Show and Tell* paper, authors used *pre-inject*, a method where the features
    extracted by the encoder are perceived as the 0th word in the caption. Later in
    the inference phase, we expect the decoder to generate a caption based solely
    on these image features.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地谈谈编码器和解码器之间的连接，有几种方法可以将这两个部分连接起来，即*init-inject*、*pre-inject*、*par-inject*和*merge*，如[3]中所述。在*Show
    and Tell*论文中，作者使用了*pre-inject*方法，即编码器提取的特征被视为标题中的第0个单词。在推理阶段，我们期望解码器仅基于这些图像特征生成标题。
- en: '![Figure 2\. The four methods possible to be used to connect the encoder and
    the decoder part of an image captioning model [3]. In our case we are going to
    use the pre-inject method (b).](../Images/0d53ace786e6a706c4f79dc10d054307.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图2. 可用于连接图像标题模型编码器和解码器部分的四种方法[3]。在我们的案例中，我们将使用预注入方法(b)](../Images/0d53ace786e6a706c4f79dc10d054307.png)'
- en: Figure 2\. The four methods possible to be used to connect the encoder and the
    decoder part of an image captioning model [3]. In our case we are going to use
    the *pre-inject* method (b).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. 可用于连接图像标题模型编码器和解码器部分的四种方法[3]。在我们的案例中，我们将使用*pre-inject*方法（b）。
- en: As we already understood the theory behind the image captioning model, we can
    now jump into the code!
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经理解了图像标题模型背后的理论，现在我们可以直接进入代码部分了！
- en: '* * *'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Implementation
  id: totrans-19
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实现
- en: 'I’ll break the implementation part into three sections: the Encoder, the Decoder,
    and the combination of the two. Before we actually get into them, we need to import
    the modules and initialize the required parameters in advance. Look at the Codeblock
    1 below to see the modules I use.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我将实现部分分为三个部分：编码器、解码器和两者的组合。在我们真正进入它们之前，我们需要提前导入模块并初始化所需的参数。查看以下代码块1，以了解我使用的模块。
- en: '[PRE0]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Let’s break down these imports quickly: the line marked with `#(1)` is used
    for basic operations, line `#(2)` is for initializing neural network layers, line
    `#(3)` is for loading various deep learning models, and `#(4)` is the pretrained
    weights for the GoogLeNet model.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们快速分析这些导入语句：标记为`#(1)`的行用于基本操作，`#(2)`行用于初始化神经网络层，`#(3)`行用于加载各种深度学习模型，而`#(4)`是GoogLeNet模型的预训练权重。
- en: Talking about the parameter configuration, `EMBED_DIM` and `LSTM_HIDDEN_DIM`
    are the only two parameters mentioned in the paper, which are both set to 512
    as shown at line `#(1)` and `#(2)` in the Codeblock 2 below. The `EMBED_DIM` variable
    essentially indicates the feature vector size representing a single token in the
    caption. In this case, we can simply think of a single token as an individual
    word. Meanwhile, `LSTM_HIDDEN_DIM` is a variable representing the hidden state
    size inside the LSTM cell. This paper does not mention how many times this RNN-based
    layer is repeated, but based on the diagram in Figure 1, it seems like it only
    implements a single LSTM cell. Thus, at line `#(3)` I set the `NUM_LSTM_LAYERS`
    variable to 1.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 谈到参数配置，论文中只提到了两个参数`EMBED_DIM`和`LSTM_HIDDEN_DIM`，它们都被设置为512，如以下代码块2中的`#(1)`和`#(2)`行所示。`EMBED_DIM`变量本质上表示代表标题中单个标记的特征向量大小。在这种情况下，我们可以简单地将单个标记视为一个单独的单词。同时，`LSTM_HIDDEN_DIM`是一个表示LSTM细胞内部隐藏状态大小的变量。这篇论文没有提到这个基于RNN的层重复了多少次，但根据图1中的图示，它似乎只实现了一个LSTM细胞。因此，我在`#(3)`行将`NUM_LSTM_LAYERS`变量设置为1。
- en: '[PRE1]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The next two parameters are related to the input image, namely `IMAGE_SIZE`
    (`#(4)`) and `IN_CHANNELS` (`#(5)`). Since we are about to use GoogLeNet for the
    encoder, we need to match it with its original input shape (3×224×224). Not only
    for the image, but we also need to configure the parameters for the caption. Here
    we assume that the caption length is no more than 30 words (`#(6)`) and the number
    of unique words in the dictionary is 10000 (`#(7)`). Lastly, the `BATCH_SIZE`
    parameter is used because by default PyTorch processes tensors in a batch. Just
    to make things simple, the number of image-caption pair within a single batch
    is set to 1.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的两个参数与输入图像相关，即`IMAGE_SIZE`（编号为#(4)）和`IN_CHANNELS`（编号为#(5)）。由于我们即将使用GoogLeNet作为编码器，我们需要将其与原始输入形状（3×224×224）相匹配。不仅对于图像，我们还需要配置标题的参数。在这里，我们假设标题长度不超过30个单词（编号为#(6)），字典中唯一单词的数量为10000（编号为#(7)）。最后，`BATCH_SIZE`参数被使用，因为默认情况下PyTorch以批处理方式处理张量。为了简化问题，单个批处理中的图像-标题对数量被设置为1。
- en: GoogLeNet Encoder
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GoogLeNet编码器
- en: It is actually possible to use any kind of CNN-based model for the encoder.
    I found on the internet that [4] uses DenseNet, [5] uses Inception V3, and [6]
    utilizes ResNet for the similar tasks. However, since my goal is to reproduce
    the model proposed in the paper as closely as possible, I am using the pretrained
    GoogLeNet model instead. Before we get into the encoder implementation, let’s
    see what the GoogLeNet architecture looks like using the following code.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，可以使用任何基于CNN的模型作为编码器。我在互联网上发现[4]使用了DenseNet，[5]使用了Inception V3，[6]使用了ResNet来完成类似任务。然而，由于我的目标是尽可能忠实地重现论文中提出的模型，我使用了预训练的GoogLeNet模型。在我们进入编码器实现之前，让我们看看以下代码中GoogLeNet架构的样子。
- en: '[PRE2]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The resulting output is very long as it lists literally all layers inside the
    architecture. Here I truncate the output since I only want you to focus on the
    last layer (the `fc` layer marked with `#(1)` in the Codeblock 3 Output below).
    You can see that this linear layer maps a feature vector of size 1024 into 1000\.
    Normally, in a standard image classification task, each of these 1000 neurons
    corresponds to a specific class. So, for example, if you want to perform a 5-class
    classification task, you would need to modify this layer such that it projects
    the outputs to 5 neurons only. In our case, we need to make this layer produce
    a feature vector of length 512 (`EMBED_DIM`). With this, the input image will
    later be represented as a 512-dimensional vector after being processed by the
    GoogLeNet model. This feature vector size will exactly match with the token embedding
    dimension, allowing it to be treated as a part of our word sequence.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 结果输出非常长，因为它实际上列出了架构中的所有层。在这里，我截断了输出，因为我只想让你关注最后一个层（在代码块3输出中标记为#(1)的`fc`层）。你可以看到这个线性层将大小为1024的特征向量映射到1000。通常，在一个标准的图像分类任务中，这些1000个神经元中的每一个都对应一个特定的类别。所以，例如，如果你想要执行一个5类分类任务，你需要修改这个层，使其只投影到5个神经元。在我们的情况下，我们需要使这个层产生长度为512的特征向量（`EMBED_DIM`）。有了这个，输入图像在经过GoogLeNet模型处理后，将被表示为一个512维度的向量。这个特征向量的大小将与标记嵌入维度完全匹配，允许它被视为我们单词序列的一部分。
- en: '[PRE3]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now let’s actually load and modify the GoogLeNet model, which I do in the `InceptionEncoder`
    class below.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们实际加载并修改GoogLeNet模型，我在下面的`InceptionEncoder`类中这样做。
- en: '[PRE4]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The first thing we do in the above code is to load the model using `models.googlenet()`.
    It is mentioned in the paper that the model is already pretrained on the ImageNet
    dataset. Thus, we need to pass `GoogLeNet_Weights.IMAGENET1K_V1` into the `weights`
    parameter, as shown at line `#(2)` in Codeblock 4a. Next, at line `#(3)` we access
    the classification head through the `fc` attribute, where we replace the existing
    linear layer with a new one having the output dimension of 512 (`EMBED_DIM`) (`#(4)`).
    Since this GoogLeNet model is already trained, we don’t need to train it from
    scratch. Instead, we can either perform *fine-tuning* or *transfer learning* in
    order to adapt it to the image captioning task.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述代码中，我们首先使用`models.googlenet()`加载模型。论文中提到该模型已经在ImageNet数据集上预训练。因此，我们需要将`GoogLeNet_Weights.IMAGENET1K_V1`传递给`weights`参数，如代码块4a中的行#(2)所示。接下来，在行#(3)中，我们通过`fc`属性访问分类头，其中我们用一个新的具有512维输出维度（`EMBED_DIM`）（编号为#(4)）的线性层替换现有的线性层。由于这个GoogLeNet模型已经训练过，我们不需要从头开始训练它。相反，我们可以执行*微调*或*迁移学习*来适应图像标题任务。
- en: In case you’re not yet familiar with the two terms, *fine-tuning* is a method
    where we update the weights of the entire model. On the other hand, *transfer
    learning* is a technique where we only update the weights of the layers we replaced
    (in this case it’s the last fully-connected layer), while setting the weights
    of the existing layers non-trainable. To do so, I implement a flag named `fine_tune`
    at line `#(1)` which will let the model to perform fine-tuning whenever it is
    set to `True` (`#(5)`).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您还不熟悉这两个术语，*微调*是一种更新整个模型权重的技术。另一方面，*迁移学习*是一种技术，我们只更新我们替换的层的权重（在这种情况下是最后一个全连接层），同时将现有层的权重设置为不可训练。为此，我在第
    `#(1)` 行实现了一个名为 `fine_tune` 的标志，当它设置为 `True` 时（`#(5)`），模型将执行微调。
- en: The `forward()` method is pretty straightforward since what we do here is simply
    passing the input image through the modified GoogLeNet model. See the Codeblock
    4b below for the details. Additionally, here I also print out the tensor dimension
    before and after processing so that you can better understand how the `InceptionEncoder`
    model works.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '`forward()` 方法相当直接，因为我们在这里只是简单地将输入图像通过修改后的 GoogLeNet 模型传递。请参阅下面的代码块 4b 以获取详细信息。此外，我在这里还打印出了处理前后的张量维度，以便您更好地理解
    `InceptionEncoder` 模型的工作原理。'
- en: '[PRE5]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: To test whether our decoder works properly, we can pass a dummy tensor of size
    1×3×224×224 through the network as demonstrated in Codeblock 5\. This tensor dimension
    simulates a single RGB image of size 224×224\. You can see in the resulting output
    that our image now becomes a single-dimensional feature vector with the length
    of 512.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试我们的解码器是否正常工作，我们可以通过网络传递一个大小为 1×3×224×224 的虚拟张量，如代码块 5 所示。这个张量维度模拟了一个 224×224
    大小的单个 RGB 图像。您可以在生成的输出中看到，我们的图像现在变成了一个长度为 512 的一维特征向量。
- en: '[PRE6]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: LSTM Decoder
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LSTM 解码器
- en: As we have successfully implemented the encoder, now that we are going to create
    the LSTM decoder, which I demonstrate in Codeblock 6a and 6b. What we need to
    do first is to initialize the required layers, namely an embedding layer (`#(1)`),
    the LSTM layer itself (`#(2)`), and a standard linear layer (`#(3)`). The first
    one (`nn.Embedding`) is responsible for mapping every single token into a 512
    (`EMBED_DIM`)-dimensional vector. Meanwhile, the LSTM layer is going to generate
    a sequence of embedded tokens, where each of these tokens will be mapped into
    a 10000 (`VOCAB_SIZE`)-dimensional vector by the linear layer. Later on, the values
    contained in this vector will represent the likelihood of each word in the dictionary
    being chosen.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经成功实现了编码器，现在我们将创建 LSTM 解码器，我在代码块 6a 和 6b 中进行了演示。我们首先需要初始化所需的层，即一个嵌入层（`#(1)`）、LSTM
    层本身（`#(2)`）和一个标准线性层（`#(3)`）。第一个（`nn.Embedding`）负责将每个标记映射到一个 512（`EMBED_DIM`）维度的向量。同时，LSTM
    层将生成一系列嵌入标记，其中每个标记将通过线性层映射到一个 10000（`VOCAB_SIZE`）维度的向量。随后，这个向量中的值将代表字典中每个单词被选中的可能性。
- en: '[PRE8]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Next, let’s define the flow of the network using the following code.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们使用以下代码定义网络的流程。
- en: '[PRE9]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'You can see in the above code that the `forward()` method of the `LSTMDecoder`
    class accepts two inputs: `features` and `captions`, where the former is the image
    that has been processed by the `InceptionEncoder`, while the latter is the caption
    of the corresponding image serving as the ground truth (`#(1)`). The idea here
    is that we are going to perform *pre-inject* operation by prepending the `features`
    tensor into `captions` using the code at line `#(4)`. However, keep in mind that
    we need to adjust the shape of both tensors beforehand. To do so, we have to insert
    a single dimension at the 1st axis of the image features (`#(2)`). Meanwhile,
    the shape of the `captions` tensor will align with our requirement right after
    being processed by the embedding layer (`#(3)`). As the `features` and `captions`
    have been concatenated, we then pass this tensor through the LSTM layer (`#(5)`)
    before it is eventually processed by the linear layer (`#(6)`). Look at the testing
    code below to better understand the flow of the two tensors.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在上面的代码中看到，`LSTMDecoder`类的`forward()`方法接受两个输入：`features`和`captions`，其中前者是经过`InceptionEncoder`处理的图像，而后者是作为真实值的对应图像的标题（`#(1)`）。这里的想法是我们将通过在代码的第`#(4)`行中将`features`张量前置到`captions`中来执行预注入操作。然而，请注意，我们需要事先调整两个张量的形状。为此，我们必须在图像特征的第1轴插入一个维度（`#(2)`）。同时，`captions`张量的形状将在经过嵌入层处理后立即符合我们的要求（`#(3)`）。由于`features`和`captions`已经被连接，然后我们通过LSTM层（`#(5)`）传递这个张量，在它最终被线性层（`#(6)`）处理之前。查看下面的测试代码以更好地理解两个张量的流动。
- en: '[PRE10]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: In Codeblock 7, I assume that `features` is a dummy tensor that represents the
    output of the `InceptionEncoder` model (`#(1)`). Meanwhile, `captions` is the
    tensor representing a sequence of tokenized words, where in this case I initialize
    it as random numbers ranging between 0 to 10000 (`VOCAB_SIZE`) with the length
    of 30 (`SEQ_LENGTH`) (`#(2)`).
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码块7中，我假设`features`是一个代表`InceptionEncoder`模型输出的虚拟张量（`#(1)`）。同时，`captions`是表示一系列标记化单词的张量，在这种情况下，我将其初始化为介于0到10000（`VOCAB_SIZE`）之间的随机数，长度为30（`SEQ_LENGTH`）（`#(2)`）。
- en: We can see in the output below that the features tensor initially has the dimension
    of 1×512 (`#(1)`). This tensor shape changed to 1×1×512 after being processed
    with the `unsqueeze()` operation (`#(2)`). The additional dimension in the middle
    (1) allows the tensor to be treated as a feature vector corresponding to a single
    timestep, which is necessary for compatibility with the LSTM layer. To the `captions`
    tensor, its shape changed from 1×30 (`#(3)`) to 1×30×512 (`#(4)`), indicating
    that every single word is now represented as a 512-dimensional vector.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在下面的输出中看到，特征张量最初具有1×512的维度（`#(1)`）。经过`unsqueeze()`操作处理后，该张量形状变为1×1×512（`#(2)`）。中间增加的维度（1）允许张量被视为对应单个时间步的特征向量，这对于与LSTM层兼容是必要的。对于`captions`张量，其形状从1×30（`#(3)`）变为1×30×512（`#(4)`），表示每个单词现在都表示为一个512维向量。
- en: '[PRE11]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: After *pre-inject* operation is performed, our tensor is now having the dimension
    of 1×31×512, where the `features` tensor becomes the token at the 0th timestep
    in the sequence (`#(5)`). See the following figure to better illustrate this idea.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 预注入操作完成后，我们的张量现在具有1×31×512的维度，其中`features`张量成为序列中第0个时间步的标记（`#(5)`）。参见以下图表以更好地说明这个想法。
- en: '![Figure 3\. What the resulting tensor looks like after the pre-injection operation.
    [3].](../Images/1a27cc26d252903752d57adc2b40ba5a.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图3。预注入操作后结果张量的样子。[3]。](../Images/1a27cc26d252903752d57adc2b40ba5a.png)'
- en: Figure 3\. What the resulting tensor looks like after the pre-injection operation.
    [3].
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图3。预注入操作后结果张量的样子。[3]。
- en: Next, we pass the tensor through the LSTM layer, which in this particular case
    the output tensor dimension remains the same. However, it is important to note
    that the tensor shapes at line `#(5)` and `#(6)` in the above output are actually
    specified by different parameters. The dimensions appear to match here because
    `EMBED_DIM` and `LSTM_HIDDEN_DIM` were both set to 512\. Normally, if we use a
    different value for `LSTM_HIDDEN_DIM`, then the output dimension is going to be
    different as well. Finally, we projected each of the 31 token embeddings to a
    vector of size 10000, which will later contain the probability of every possible
    token being predicted (`#(7)`).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将张量通过 LSTM 层传递，在这个特定的情况下，输出张量的维度保持不变。然而，需要注意的是，上述输出中行 `#(5)` 和 `#(6)`
    的张量形状实际上是由不同的参数指定的。这里维度看起来匹配是因为 `EMBED_DIM` 和 `LSTM_HIDDEN_DIM` 都被设置为 512。通常情况下，如果我们为
    `LSTM_HIDDEN_DIM` 使用不同的值，那么输出维度也会不同。最后，我们将每个 31 个标记嵌入投影到大小为 10000 的向量中，这个向量将后来包含预测的每个可能标记的概率
    (`#(7)`).
- en: GoogLeNet Encoder + LSTM Decoder
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GoogLeNet 编码器 + LSTM 解码器
- en: At this point, we have successfully created both the encoder and the decoder
    parts of the image captioning model. What I am going to do next is to combine
    them together in the `ShowAndTell` class below.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经成功创建了图像描述模型中的编码器和解码器部分。接下来，我打算在下面的 `ShowAndTell` 类中将它们组合在一起。
- en: '[PRE12]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: I think the above code is pretty straightforward. In the `__init__()` method,
    we only need to initialize the `InceptionEncoder` as well as the `LSTMDecoder`
    models (`#(1)` and `#(2)`). Here I assume that we are about to perform fine-tuning
    rather than transfer learning, so I set the `fine_tune` parameter to `True`. Theoretically
    speaking, fine-tuning is better than transfer learning if you have a relatively
    large dataset since it works by re-adjusting the weights of the entire model.
    However, if your dataset is rather small, you should go with transfer learning
    instead – but that’s just the theory. It’s definitely a good idea to experiment
    with both options to see which works best in your case.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为上面的代码相当直观。在 `__init__()` 方法中，我们只需要初始化 `InceptionEncoder` 和 `LSTMDecoder`
    模型（`#(1)` 和 `#(2)`）。这里我假设我们即将进行微调而不是迁移学习，所以我将 `fine_tune` 参数设置为 `True`。从理论上讲，如果你有一个相对较大的数据集，微调比迁移学习更好，因为它通过重新调整整个模型的权重来工作。然而，如果你的数据集相对较小，你应该选择迁移学习——但这只是理论。当然，尝试这两种选项以查看哪种在你的情况下效果最好是一个好主意。
- en: Still with the above codeblock, we configure the `forward()` method to accept
    image-caption pairs as input. With this configuration, we basically design this
    method such that it can only be used for training purpose. Here we initially process
    the raw image with the GoogLeNet inside the encoder block (`#(3)`). Afterwards,
    we pass the extracted features as well as the tokenized captions into the decoder
    block and let it produce another token sequence (`#(4)`). In the actual training,
    this caption output will then be compared with the ground truth to compute the
    error. This error value is going to be used to compute gradients through backpropagation,
    which determines how the weights in the network are updated.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 仍然使用上面的代码块，我们配置 `forward()` 方法以接受图像-描述对作为输入。通过这种配置，我们基本上设计了这个方法，使其只能用于训练目的。在这里，我们最初使用编码器块中的
    GoogLeNet 处理原始图像（`#(3)`）。之后，我们将提取的特征以及标记化的描述传递到解码器块，并让它生成另一个标记序列（`#(4)`）。在实际训练中，这个描述输出将与真实值进行比较，以计算误差。这个误差值将被用来通过反向传播计算梯度，这决定了网络中权重的更新方式。
- en: It is important to know that we cannot use the `forward()` method to perform
    inference, so we need a separate one for that. In this case, I am going to implement
    the code specifically to perform inference in the `generate()` method below.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要知道我们不能使用 `forward()` 方法来进行推理，因此我们需要一个专门的方法来处理这个任务。在这种情况下，我打算在下面的 `generate()`
    方法中具体实现代码以执行推理。
- en: '[PRE13]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Instead of taking two inputs like the previous one, the `generate()` method
    takes raw image as the only input (`#(1)`). Since we want the features extracted
    from the image to be the initial input token, we first need to process the raw
    input image with the encoder block prior to actually generating the subsequent
    tokens (`#(2)`). Next, we allocate an empty list for storing the token sequence
    to be produced later (`#(3)`). The tokens themselves are generated one by one,
    so we wrap the entire process inside a `for` loop, which is going to stop iterating
    once it reaches at most 30 (`SEQ_LENGTH`) words (`#(4)`).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前只接受两个输入不同，`generate()`方法只接受原始图像作为唯一输入（`#(1)`）。由于我们希望从图像中提取的特征成为初始输入标记，我们首先需要使用编码器块处理原始输入图像，然后再生成后续标记（`#(2)`）。接下来，我们为稍后要生成的标记序列分配一个空列表（`#(3)`）。标记本身是一个接一个生成的，因此我们将整个过程包裹在一个`for`循环中，该循环将在达到最多30个单词（`SEQ_LENGTH`）时停止迭代（`#(4)`）。
- en: The steps done inside the loop is algorithmically similar to the ones we discussed
    earlier. However, since the LSTM cell here generates a single token at a time,
    the process requires the tensor to be treated a bit differently from the one passed
    through the `forward()` method of the `LSTMDecoder` class back in Codeblock 6b.
    The first difference you might notice is the `squeeze()` operation (`#(5)`), which
    is basically just a technical step to be done such that the subsequent layer does
    the linear projection correctly (`#(6)`). Then, we take the index of the feature
    vector having the highest value, which corresponds to the token most likely to
    come next (`#(7)`), and append it to the list we allocated earlier (`#(8)`). The
    loop is going to break whenever the predicted index is a *stop token*, which in
    this case I assume that this token is at the 1st index of the `probs` vector.
    Otherwise, if the model does not find the *stop token*, then it is going to convert
    the last predicted word into its 512 (`EMBED_DIM`)-dimensional vector (`#(10)`),
    allowing it to be used as the input features for the next iteration. Lastly, the
    generated word sequence will be returned once the loop is completed (`#(11)`).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 循环内部执行的步骤在算法上与之前讨论的类似。然而，由于这里的LSTM单元一次生成一个标记，这个过程需要对张量进行一些不同的处理，不同于之前在代码块6b中通过`LSTMDecoder`类的`forward()`方法传递的张量。你可能首先注意到的不同是`squeeze()`操作（`#(5)`），这基本上是一个技术步骤，以确保后续层能够正确地进行线性投影（`#(6)`）。然后，我们取具有最高值的特征向量的索引，这对应于最有可能出现的标记（`#(7)`），并将其追加到我们之前分配的列表中（`#(8)`）。当预测的索引是*停止标记*时，循环将中断，在这种情况下，我假设这个标记位于`probs`向量的第1个索引。否则，如果模型没有找到*停止标记*，那么它将把最后一个预测的单词转换为其512维（`EMBED_DIM`）向量（`#(10)`），使其能够作为下一次迭代的输入特征。最后，一旦循环完成，将返回生成的单词序列（`#(11)`）。
- en: We are going to simulate the forward pass for the training phase using the Codeblock
    9 below. Here I pass two tensors through the `show_and_tell` model (`#(1)`), each
    representing a raw image of size 3×224×224 (`#(2)`) and a sequence of tokenized
    words (`#(3)`). Based on the resulting output, we found that our model works properly
    as the two input tensors successfully passed through the `InceptionEncoder` and
    the `LSTMDecoder` part of the network.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用下面的代码块9来模拟训练阶段的正向传播。在这里，我通过`show_and_tell`模型（`#(1)`）传递了两个张量，每个张量代表一个大小为3×224×224的原始图像（`#(2)`）和一个分词后的单词序列（`#(3)`）。根据产生的输出，我们发现我们的模型运行正常，因为两个输入张量成功通过了网络的`InceptionEncoder`和`LSTMDecoder`部分。
- en: '[PRE14]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '[PRE15]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Now, let’s assume that our `show_and_tell` model is already trained on an image
    captioning dataset, and thus ready to be used for inference. Look at the Codeblock
    10 below to see how I do it. Here we set the model to `eval()` mode (`#(1)`),
    initialize the input image (`#(2)`), and pass it through the model using the `generate()`
    method (`#(3)`).
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们假设我们的`show_and_tell`模型已经在图像标题数据集上进行了训练，因此已经准备好用于推理。查看下面的代码块10，看看我是如何做到这一点的。在这里，我们将模型设置为`eval()`模式（`#(1)`），初始化输入图像（`#(2)`），并使用`generate()`方法通过模型传递它。
- en: '[PRE16]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The flow of the tensor can be seen in the output below. Here I truncate the
    resulting outputs because it only shows the same token generation process 30 times.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 张量的流动可以在下面的输出中看到。在这里，我截断了产生的输出，因为它只显示了相同的标记生成过程30次。
- en: '[PRE17]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: To see what the resulting caption looks like, we can just print out the `generated_tokens`
    list as shown below. Keep in mind that this sequence is still in the form of tokenized
    words. Later, in the post-processing stage, we will need to convert them back
    to the words corresponding to these numbers.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看生成的标题的样子，我们只需像下面这样打印出`generated_tokens`列表。请注意，这个序列仍然是分词后的单词形式。稍后，在后处理阶段，我们需要将它们转换回对应的单词。
- en: '[PRE18]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '[PRE19]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '* * *'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Ending
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束
- en: With the above output, we’ve reached the end of our discussion on image captioning.
    Over time, many other researchers attempted to make improvements to accomplish
    this task. So, I think in the upcoming article I will discuss the state-of-the-art
    method on this topic.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 通过上述输出，我们结束了对图像标题生成技术的讨论。随着时间的推移，许多其他研究人员试图改进这项任务。因此，我认为在接下来的文章中，我将讨论这个主题的最新方法。
- en: Thanks for reading, I hope you learn something new today!
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读，希望你在今天学到了一些新知识！
- en: _By the way you can also find the code used in this article [here](https://github.com/MuhammadArdiPutra/medium_articles/blob/main/Show%20and%20Tell.ipynb)._
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: _顺便说一下，你还可以在这里找到本文中使用的代码[here](https://github.com/MuhammadArdiPutra/medium_articles/blob/main/Show%20and%20Tell.ipynb)._
