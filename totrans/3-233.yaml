  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'Note that the `--explicit` flag ensures that the targeted platform is annotated
    in the file, in this case, *# platform: win-64* in the third line.'
  prefs: []
  type: TYPE_NORMAL
- en: You can now remove the environment as described in the previous section.
  prefs: []
