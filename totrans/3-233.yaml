- en: Don’t Let Conda Eat Your Hard Drive
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/dont-let-conda-eat-your-hard-drive/](https://towardsdatascience.com/dont-let-conda-eat-your-hard-drive/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you’re an Anaconda user, you know that [*conda environments*](https://docs.anaconda.com/working-with-conda/environments/) help
    you manage package dependencies, avoid compatibility conflicts, and share your
    projects with others. Unfortunately, they can also take over your computer’s hard
    drive.
  prefs: []
  type: TYPE_NORMAL
- en: I write lots of computer tutorials and to keep them organized, each has a dedicated
    folder structure complete with a conda environment. This worked great at first,
    but soon my computer’s performance degraded, and I noticed that my SSD was filling
    up. At one point I had only 13 GB free.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5205b512370e09fe9a5e5e3bbe5b7734.png)'
  prefs: []
  type: TYPE_IMG
- en: 'C: drive memory usage (by author)'
  prefs: []
  type: TYPE_NORMAL
- en: Conda helps manage this problem by storing downloaded package files in a single
    “cache” (`pkgs_dirs`). When you install a package, conda checks for it in the
    package cache before downloading. If not found, conda will download and extract
    the package and link the files to the active environment. Because the cache is
    “shared,” different environments can use the same downloaded files without duplication.
  prefs: []
  type: TYPE_NORMAL
- en: Because conda caches *every downloaded package*, `pkgs_dirs` can grow to many
    gigabytes. And while conda links to shared packages in the cache, there is still
    a need to store some packages in the environment folder. This is mainly to avoid *version
    conflicts*, where different environments need different versions of the same *dependency *(a
    package required to run another package).
  prefs: []
  type: TYPE_NORMAL
- en: In addition, large, compiled binaries like [OpenCV](https://opencv.org/) may
    require *full copies* in the environment’s directory, and each environment requires
    a copy of the Python interpreter (at 100–200 MB). All these issues can bloat conda
    environments to several gigabytes.
  prefs: []
  type: TYPE_NORMAL
- en: In this *Quick Success Data Science* project, we’ll look at some techniques
    for reducing the storage requirements for conda environments, including those
    stored in default locations and dedicated folders.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Memory Management Techniques
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Below are some memory management techniques that will help you reduce conda’s
    storage footprint on your machine. We’ll discuss each in turn.
  prefs: []
  type: TYPE_NORMAL
- en: Cache cleaning
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Sharing task-based environments
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Archiving with environment and specifications files
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Archiving environments with conda-pack
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Storing environments on an external drive
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Relocating the package cache
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Using virtual environments (`venv`)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 1\. Cleaning the Package Cache
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Cleaning the package cache is the first and easiest step for freeing up memory.
    Even after deleting environments, conda keeps the related package files in the
    cache. You can free up space by removing these unused packages and their associated *tarballs* (compressed
    package files), logs, *index caches* (metadata stored in conda), and temporary
    files.
  prefs: []
  type: TYPE_NORMAL
- en: 'Conda permits an optional “dry run” to see how much memory will be reclaimed.
    You’ll want to run this from either the terminal or Anaconda Prompt in your *base* environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'To commit, run:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s how this looks on my machine:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c2dc03f4d3c93e5e2243107ebd63a5f4.png)'
  prefs: []
  type: TYPE_IMG
- en: Conda dry run and clean command in Anaconda Prompt (by author)
  prefs: []
  type: TYPE_NORMAL
- en: This process trimmed a healthy 6.28 GB and took several minutes to run.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Sharing Task-based Environments
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Creating a few environments for *specialized tasks* — like computer vision or
    geospatial work — is more memory efficient than using dedicated environments for
    each *project*. These environments would include basic packages plus ones for
    the specific task (such as OpenCV, scikit-image, and PIL for computer vision).
  prefs: []
  type: TYPE_NORMAL
- en: An advantage of this approach is that you can easily keep all the packages up
    to date and link the environments to multiple projects. However, this won’t work
    if some projects require different versions of the shared packages.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Archiving with Environment and Specifications Files
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you don’t have enough storage sites or want to preserve legacy projects efficiently,
    consider using *environment* or *specifications *files. These small files record
    an environment’s *contents*, allowing you to rebuild it later.
  prefs: []
  type: TYPE_NORMAL
- en: Saving conda environments in this manner reduces their size on disk from gigabytes
    to a few kilobytes. Of course, you’ll have to recreate the environment to use
    it. So, you’ll want to avoid this technique if you frequently revisit projects
    that link to the archived environments.
  prefs: []
  type: TYPE_NORMAL
- en: 'NOTE: Consider using [Mamba](https://mamba.readthedocs.io/en/latest/), a drop-in
    replacement for conda, for faster rebuilds. As the docs say, “If you know conda,
    you know Mamba!”'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Using Environment Files:** An *environmental file* is a small file that lists
    all the packages and versions installed in an environment, including those installed
    using Python’s package installer ([pip](https://pypi.org/project/pip/)). This
    helps you both restore an environment and share it with others.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The environment file is written in [*YAML*](https://en.wikipedia.org/wiki/YAML) (*.yml*),
    a human-readable data-serialization format for data storage. To generate an environment
    file, you must activate and then export the environment. Here’s how to make a
    file for an environment named *my_env*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: You can name the file any valid filename but be careful as an existing file
    with the same name will be overwritten.
  prefs: []
  type: TYPE_NORMAL
- en: 'By default, the environment file is written to the *user *directory. Here’s
    a truncated example of the file’s contents:'
  prefs: []
  type: TYPE_NORMAL
