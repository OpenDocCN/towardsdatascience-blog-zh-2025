    file. To remove an environment, first deactivate it and then run the `remove` command
    (where `ENVNAME` is the name of your environment):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'If the conda environment exists outside of Anaconda’s default *envs* folder,
    then include the directory path to the environment, as so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Note that this archiving technique will only work perfectly if you continue
    to use the same operating system, such as Windows or macOS. This is because solving
    for dependencies can introduce packages that might not be compatible across platforms.
  prefs: []
  type: TYPE_NORMAL
- en: 'To restore a conda environment using a file, run the following, where `my_env` represents
    your conda environment name and `environment.yml` represents your environment
    file:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'You can also use the environment file to recreate the environment on your D:
    drive. Just provide the new path when using the file. Here’s an example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: For more on environment files, including how to manually produce them, visit
    the [docs](https://docs.conda.io/projects/conda/en/latest/user-guide/tasks/manage-environments.html).
  prefs: []
  type: TYPE_NORMAL
- en: '**Using Specifications Files: **If you haven’t installed any packages using
    pip, you can use a *specifications file* to reproduce a conda environment on the
    same operating system. To create a specification file, activate an environment,
    such as *my_env*, and enter the following command:'
