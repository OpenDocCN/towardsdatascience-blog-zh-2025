  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Note that this archiving technique will only work perfectly if you continue
    to use the same operating system, such as Windows or macOS. This is because solving
    for dependencies can introduce packages that might not be compatible across platforms.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这种归档技术只有在您继续使用相同的操作系统，例如 Windows 或 macOS 时才能完美工作。这是因为解决依赖关系可能会引入可能在不同平台之间不兼容的包。
