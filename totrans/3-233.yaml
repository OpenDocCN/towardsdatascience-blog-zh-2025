  zh: '[PRE10]'
- en: 4\. Archiving Environments with conda-pack
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 使用 conda-pack 归档环境
- en: The `conda-pack` command lets you archive a conda environment before removing
    it. It packs the entire environment into a compressed archive with the extension: *.tar.gz*.
    It’s handy for backing up, sharing, and moving environments without the need to
    reinstall packages.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '`conda-pack` 命令允许在删除之前归档 conda 环境。它将整个环境打包成一个扩展名为 *.tar.gz* 的压缩归档文件。这对于备份、共享和移动环境而不需要重新安装包非常有用。'
- en: 'The following command will preserve an environment but remove it from your
    system (where *my_env* represents the name of your environment):'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 以下命令将保留环境，但将其从您的系统中删除（其中 *my_env* 代表您环境的名称）：
- en: '[PRE11]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'To restore the environment later run this command:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 要稍后恢复环境，请运行此命令：
- en: '[PRE12]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This technique won’t save as much memory as the text file option. However, you
    won’t need to re-download packages when restoring an environment, which means
    it can be used without internet access.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术不会像文本文件选项那样节省内存。然而，在恢复环境时，您不需要重新下载包，这意味着在没有互联网连接的情况下也可以使用。
- en: 5\. Storing Environments on an External Drive
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 在外部驱动器上存储环境
- en: 'By default, conda stores all environments in a default location. For Windows,
    this is under the *…\anaconda3\envs* folder. You can see these environments by
    running the command `conda info --envs` in a prompt window or terminal. Here’s
    how it looks on my C: drive (this is a truncated view):'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '默认情况下，conda 将所有环境存储在默认位置。对于 Windows，这是在 *…\anaconda3\envs* 文件夹下。您可以通过在提示窗口或终端中运行命令
    `conda info --envs` 来查看这些环境。以下是在我的 C: 驱动器上的视图（这是一个截断视图）：'
- en: '![](../Images/aa1822822ba26a0302e440193848f4c7.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/aa1822822ba26a0302e440193848f4c7.png)'
- en: Truncated view of conda environments on my C:\ drive (by author)
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 作者在我的 C:\ 驱动器上的 conda 环境的截断视图
- en: '**Using a Single Environments Folder:** If your system supports an external
    or secondary drive, you can configure conda to store environments there to free
    up space on your primary disk. Here’s the command; you’ll need to substitute your
    specific path:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用单个环境文件夹：**如果您的系统支持外部或辅助驱动器，您可以配置 conda 将环境存储在那里，以释放主磁盘的空间。以下是命令；您需要替换您的特定路径：'
- en: '[PRE13]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: If you enter a path to your D drive, such as *D:\conda_envs*, conda will create
    new environments at this location.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您输入 D 驱动的路径，例如 *D:\conda_envs*，conda 将在此位置创建新的环境。
- en: This technique works well when your external drive is a fast SSD and when you’re
    storing packages with large dependencies, like TensorFlow. The downside is slower
    performance. If your OS and notebooks remain on the primary drive, you may experience
    some read/write latency when running Python.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的外部驱动器是一个快速的SSD，并且你存储的是像TensorFlow这样的具有大型依赖项的包时，这种技术效果很好。缺点是性能较慢。如果你的操作系统和笔记本仍然在主驱动器上，当运行Python时，你可能会遇到一些读写延迟。
- en: In addition, some OS settings may power down idle external drives, adding a
    delay when they spin back up. Tools like Jupyter may struggle to locate conda
    environments if the drive letter changes, so you’ll want to use a fixed drive
    letter and ensure that the correct kernel paths are set.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，一些操作系统设置可能会关闭空闲的外部驱动器，当它们重新启动时增加延迟。如果驱动器字母发生变化，像Jupyter这样的工具可能难以定位conda环境，因此你想要使用固定的驱动器字母并确保设置了正确的内核路径。
- en: '**Using Multiple Environment Folders:** Instead of using a single `envs_dirs` directory
    for *all* environments, you can store each environment inside its respective *project* folder.
    This lets you store everything related to a project in one place.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用多个环境文件夹：** 而不是为 *所有* 环境使用单个`envs_dirs`目录，你可以将每个环境存储在其各自的 *项目* 文件夹中。这样，你可以将与项目相关的所有内容存储在一个地方。'
- en: '![](../Images/999ca4fe81994aa543b0788f4b6d830f.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/999ca4fe81994aa543b0788f4b6d830f.png)'
- en: Example project file structure with embedded (1.7 GB) conda environment (opencv_env)
    (by author)
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 示例项目文件结构，包含嵌入的（1.7 GB）conda环境（opencv_env）（作者提供）
- en: 'For example, suppose you have a project on your Windows D: drive in a folder
    called *D:\projects\geospatial*. To place the project’s conda environment in this
    folder, loaded with `ipykernel` for JupyterLab, you would run:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '例如，假设你在Windows D: 驱动器上的一个名为 *D:\projects\geospatial* 的文件夹中有一个项目。要将项目的conda环境放置在这个文件夹中，并加载`ipykernel`以供JupyterLab使用，你需要运行以下命令：'
- en: '[PRE14]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Of course, you can call *env* something more descriptive, like *geospatial_env*.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你可以将*env*命名为更具描述性的名称，例如*geospatial_env*。
- en: As with the previous example, environments stored on a different disk can cause
    performance issues.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 与前面的示例一样，存储在不同磁盘上的环境可能会导致性能问题。
- en: '**Special Note on JupyterLab:** Depending on how you launch JupyterLab, its
    default behavior may be to open in your *user* directory (such as, *C:\Users\your_user_name*).
    Since its file browser is restricted to the directory from which it is launched,
    you won’t see directories on other drives like `D:\`. There are many ways to handle
    this, but one of the simplest is to launch JupyterLab from the D: drive.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于JupyterLab的特殊说明：** 根据你如何启动JupyterLab，它的默认行为可能是打开在您的 *用户* 目录中（例如，*C:\Users\your_user_name*）。由于它的文件浏览器仅限于启动它的目录，你将看不到其他驱动器上的目录，如`D:\`。处理这个问题有很多方法，但其中最简单的一种是从D:
    驱动器启动JupyterLab。'
- en: 'For example, in Anaconda Prompt, type:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在Anaconda Prompt中，输入以下命令：
- en: '[PRE15]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'followed by:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 接着：
- en: '[PRE16]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Now, you will be able to pick from kernels on the D: drive.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '现在，你将能够从D: 驱动器上的内核中进行选择。'
- en: For more options on changing JupyterLab’s working directory, ask an AI about
    “how to change Jupyter’s default working directory” or “how to create a Symlink
    to `D:\` in your user folder.”
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 关于更改JupyterLab的工作目录的更多选项，询问AI关于“如何更改Jupyter的默认工作目录”或“如何在用户文件夹中创建到`D:\`的符号链接。”
- en: '**Moving Existing Environments:** You should never manually move a conda environment,
    such as by cutting and pasting to a new location. This is because conda relies
    on internal paths and metadata that can become invalid with location changes.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**移动现有环境：** 你永远不应该手动移动conda环境，例如通过剪切和粘贴到新位置。这是因为conda依赖于内部路径和元数据，这些路径和元数据在位置变化时可能会变得无效。'
- en: Instead, you should *clone *existing environments to another drive. This will *duplicate* the
    environment, so you’ll need to manually remove it from its original location.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，你应该将现有的环境克隆到另一个驱动器上。这将 *复制* 环境副本，因此你需要手动从原始位置删除它。
- en: 'In the following example, we use the `--clone` flag to produce an exact copy
    of a C: drive environment (called *my_env*) on the D: drive:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '在以下示例中，我们使用`--clone`标志在D: 驱动器上创建C: 驱动器环境（称为*my_env*）的精确副本：'
- en: '[PRE17]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '**NOTE:** Consider exporting your environment to a *YAML* file (as described
    in Section 3 above) before cloning. This allows you to recreate the environment
    if something goes wrong with the clone procedure.'
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意：** 在克隆之前，考虑将你的环境导出到一个 *YAML* 文件中（如上节3所述）。这允许你在克隆过程中出现问题时重新创建环境。'
- en: 'Now, when you run `conda env list`, you’ll see the environment listed in both
    the C: and D: drives. You can remove the old environment by running the following
    command in the *base *environment:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '现在，当你运行 `conda env list` 时，你会在 C: 和 D: 驱动器上看到列出的环境。你可以通过在 *base* 环境中运行以下命令来删除旧环境：'
- en: '[PRE18]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Again, latency issues may affect these setups if you’re working across two disks.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 再次提醒，如果你在两个磁盘之间工作，延迟问题可能会影响这些设置。
- en: You may be wondering, is it better to move a conda environment using an environment
    (YAML) file or to use`--clone`? The short answer is that `--clone` is the best
    and fastest option for moving an environment to a different drive on the *same* machine.
    An environment file is best for recreating the same environment on a *different *machine.
    While the file guarantees a consistent environment across different systems, it
    can take much longer to run, especially with large environments.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想知道，是使用环境（YAML）文件移动 conda 环境，还是使用 `--clone`？简短的回答是，`--clone` 是将环境移动到同一台机器上不同驱动器的最佳和最快选项。环境文件最适合在
    *不同* 机器上重新创建相同的环境。虽然文件保证了在不同系统之间的一致环境，但它可能需要更长的时间来运行，尤其是在大型环境中。
- en: 6\. Relocating the Package Cache
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 移动包缓存
- en: 'If your primary drive is low on space, you can move the package cache to a
    larger external or secondary drive using this command:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你主驱动器的空间不足，你可以使用此命令将包缓存移动到更大的外部或辅助驱动器：
- en: '[PRE19]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: In this example, packages are now stored on the D drive (*D:\conda_pkgs*) instead
    of the default location.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，包现在存储在 D 驱动器上（*D:\conda_pkgs*），而不是默认位置。
- en: 'If you’re working in your primary drive and both drives are SSD, then latency
    issues should not be significant. However, if one of the drives is a slower HDD,
    you can experience slowdowns when creating or updating environments. If D: is
    an external drive connected by USB, you may see significant slowdowns for large
    environments.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '如果你正在主驱动器上工作，并且两个驱动器都是 SSD，那么延迟问题不应该很重要。然而，如果其中一个驱动器是较慢的 HDD，那么在创建或更新环境时可能会出现减速。如果
    D: 是通过 USB 连接的外部驱动器，你可能会看到大型环境的大幅减速。'
- en: You can mitigate some of these issues by keeping the package cache (`pkgs_dirs`)
    and frequently used environments on the faster SSD, and other environments on
    the slower HDD.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过将包缓存（`pkgs_dirs`）和常用环境保存在较快的 SSD 上，其他环境保存在较慢的 HDD 上来减轻这些问题。
- en: One last thing to consider is *backups*. Primary drives may have routine backups
    scheduled but secondary or external drives may not. This puts you at risk of losing
    all your environments.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 最后要考虑的一件事是 *备份*。主驱动器可能有计划进行常规备份，但辅助或外部驱动器可能没有。这使你面临丢失所有环境的风险。
- en: 7\. Using Virtual Environments
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7. 使用虚拟环境
- en: If your project doesn’t require conda’s extensive package management system
    for handling heavy dependencies (like TensorFlow or GDAL), you can significantly
    reduce disk usage with a Python *virtual environment* (`venv`). This represents
    a lightweight alternative to a conda environment.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的项目不需要 conda 的广泛包管理系统来处理重型依赖（如 TensorFlow 或 GDAL），你可以使用 Python 的 *虚拟环境* (`venv`)
    显著减少磁盘使用量。这代表了一个轻量级的 conda 环境替代方案。
- en: 'To create a `venv` named *my_env*, run the following command:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建名为 *my_env* 的 `venv`，请运行以下命令：
- en: '![](../Images/0fe6a9cfbd7fe4a2dc09ac9e47613802.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0fe6a9cfbd7fe4a2dc09ac9e47613802.png)'
- en: This type of environment has a small base installation. A minimal conda environment
    takes up about 200 MB and includes multiple utilities, such as `conda`, `pip`, `setuptools`,
    and so on. A `venv` is much lighter, with a minimum install size of only 5–10
    MB.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这种类型的虚拟环境具有较小的基本安装。一个最小的 conda 环境大约占用 200 MB，包括多个实用程序，如 `conda`、`pip`、`setuptools`
    等。`venv` 要轻得多，最小安装大小仅为 5–10 MB。
- en: Conda also caches package tarballs in `pkgs_dirs`. These tarballs can grow to
    several GBs over time. Because `venv` installs packages directly into the environment,
    no extra copies are preserved.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: Conda 还会在 `pkgs_dirs` 中缓存包的 tarball 文件。这些文件随着时间的推移可能会增长到几个 GB。因为 `venv` 直接将包安装到环境中，所以不会保留额外的副本。
- en: In general, you’ll want to consider `venv` when you only need basic Python packages
    like NumPy, pandas, or Scikit-learn. Packages for which conda is strongly recommended,
    like Geopandas, should still be placed in a conda environment. If you use lots
    of environments, you’ll probably want to stick with conda and benefit from its
    package linking.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，当你只需要像 NumPy、pandas 或 Scikit-learn 这样的基本 Python 包时，你会想要考虑使用 `venv`。对于 conda
    强烈推荐的包，如 Geopandas，仍然应该放在 conda 环境中。如果你使用了很多环境，你可能想要继续使用 conda 并从中受益于其包链接功能。
- en: You can find details on how to activate and use Python virtual environments
    in the `venv` [docs](https://docs.python.org/3/library/venv.html).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在 `venv` [文档](https://docs.python.org/3/library/venv.html) 中找到有关如何激活和使用 Python
    虚拟环境的详细信息。
- en: '* * *'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Recap
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: High impact/low disruption memory management techniques for conda environments
    include cleaning the package cache and storing little-used environments as YAML
    or text files. These methods can save many gigabytes of memory while retaining
    Anaconda’s default directory structure.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: conda 环境的高影响/低干扰内存管理技术包括清理包缓存和将不常用的环境存储为 YAML 或文本文件。这些方法可以在保留 Anaconda 默认目录结构的同时节省许多吉字节内存。
- en: Other high impact methods include moving the package cache and/or conda environments
    to a secondary or external drive. This will resolve memory problems but may introduce
    latency issues, especially if the new drive is a slow HDD or uses a USB connection.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 其他高影响的方法包括将包缓存和/或 conda 环境移动到辅助或外部驱动器。这将解决内存问题，但可能会引入延迟问题，尤其是如果新驱动器是慢速 HDD 或使用
    USB 连接。
- en: For simple environments, you can use a Python virtual environment (`venv`) as
    a lightweight alternative to conda.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 对于简单环境，你可以使用 Python 虚拟环境 (`venv`) 作为 conda 的轻量级替代方案。
