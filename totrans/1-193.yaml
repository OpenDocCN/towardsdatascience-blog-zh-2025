- en: 'TDS Newsletter: The Rapid Transformation of Data Science in the Age of AI'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/tds-newsletter-the-rapid-transformation-of-data-science-in-the-age-of-ai/](https://towardsdatascience.com/tds-newsletter-the-rapid-transformation-of-data-science-in-the-age-of-ai/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Professions don’t change overnight, and you can rarely point to a single moment
    that transforms them forever. Complex processes like these happen over time, and
    require the accumulation of countless new habits, tools, and business decisions.
  prefs: []
  type: TYPE_NORMAL
- en: This week, we highlight three excellent articles on the current state of [data
    science](https://towardsdatascience.com/tag/data-science/). They tackle the topic
    from different angles, but they all share a keen awareness of the ever-expanding
    adoption of AI-powered workflows, and how the latter have made data science a
    strikingly different discipline in the span of a couple of years (give or take).
    Let’s dive in.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: How I Used ChatGPT to Land My Next Data Science Role
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Beyond algorithms and Python, the job search might be the biggest common denominator
    for data practitioners these days. It’s a (sometimes scary) new world where shifting
    role definitions and the growing presence of LLMs at every step of the hiring
    pipeline have made a stressful process even tougher to navigate. [Yu Dong](https://towardsdatascience.com/author/ydong029/)‘s
    new article suggests it’s time to flip the script, and shows how to leverage tools
    like ChatGPT to boost your chances as an applicant.
  prefs: []
  type: TYPE_NORMAL
- en: '[How I Used ChatGPT to Land My Next Data Science Role](https://towardsdatascience.com/how-i-used-chatgpt-to-land-my-next-data-science-role/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Past is Prologue: How Conversational Analytics Is Changing Data Work'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Whitney Marks shares clear and actionable insights on how to thrive amid the
    transition she sees across data teams: no longer mere dashboard and model builders,
    their future success relies on easing into the role of AI managers.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Past is Prologue: How Conversational Analytics Is Changing Data Work](https://towardsdatascience.com/past-is-prologue-how-conversational-analytics-is-changing-data-work/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How the Rise of Tabular Foundation Models Is Reshaping Data Science
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Structured data remains a challenge even for the most advanced LLMs. As Pirmin
    Lemberger explains, new foundational models are changing that, and could make
    databases and spreadsheets more easily digestible for generative AI.
  prefs: []
  type: TYPE_NORMAL
- en: '[How the Rise of Tabular Foundation Models Is Reshaping Data Science](https://towardsdatascience.com/tabular-foundation-models/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
