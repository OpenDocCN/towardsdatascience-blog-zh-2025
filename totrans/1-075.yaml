- en: How to Perform Agentic Information Retrieval
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-perform-agentic-information-retrieval/](https://towardsdatascience.com/how-to-perform-agentic-information-retrieval/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1763511354573" class="mdspan-comment">Information retrieval</mdspan>
    is an important task that is critical to achieve, with the vast amount of content
    available today. An information retrieval task is, for example, every time you
    Google something or ask ChatGPT for an answer to a question. The information you’re
    searching through could be a closed dataset of documents or the entire internet.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll discuss agentic information finding, covering how information
    retrieval has changed with the release of LLMs, and in particular with the rise
    of AI Agents, who are much more capable of finding information than we’ve seen
    until now. I’ll first discuss RAG, since that is a foundational block in agentic
    information finding. I’ll then continue by discussing on a high level how AI agents
    can be used to find information.
  prefs: []
  type: TYPE_NORMAL
- en: '![Agentic information retrieval](../Images/a390e88fc6dff2aec75b0ebf4a5bc4e2.png)'
  prefs: []
  type: TYPE_IMG
- en: This infographic highlights the main contents of this article. I’ll discuss
    some different traditional information retrieval approaches, like TF-IDF (keyword
    search), and continue discussing RAG. I’ll then discuss the different ways to
    implement RAG, either doing it from scratch yourself with an embedding model and
    a vector database, or by using managed RAG solutions. I’ll then discuss how to
    make keyword search and RAG available to your AI agents as tools. Image by ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Why do we need agentic information finding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Information retrieval is a relatively old task. TF-IDF is the first algorithm
    used to find information in a large corpus of documents, and it works by indexing
    your documents based on the frequency of words within specific documents and how
    frequent a word is across all documents.
  prefs: []
  type: TYPE_NORMAL
- en: If a user searches for a word, and that word occurs frequently in a few documents,
    but rarely across all documents, it indicates strong relevance for those few documents.
  prefs: []
  type: TYPE_NORMAL
- en: 'Information retrieval is such a critical task because, as humans, we’re so
    reliant on quickly finding information to solve different problems. These problems
    could be:'
  prefs: []
  type: TYPE_NORMAL
- en: How to cook a specific meal
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to implement a certain algorithm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to get from location A->B
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: TF-IDF still works surprisingly well, though we’ve now discovered even more
    powerful approaches to finding information. Retrieval augmented generation (RAG),
    is one strong technique, relying on semantic similarity to find useful documents.
  prefs: []
  type: TYPE_NORMAL
- en: Agentic information finding utilises different techniques such as keyword search
    (TF-IDF, for example, but typically modernized versions of the algorithm, such
    as BM25), and RAG, to find relevant documents, search through them, and return
    results to the user.
  prefs: []
  type: TYPE_NORMAL
- en: Build your own RAG
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/6fceb5845f0427ffe10b746fdbf23719.png)'
  prefs: []
  type: TYPE_IMG
- en: This figure highlights how RAG works. You embed the document query and find
    the most similar documents from the corpus based on semantic similarity. You then
    feed these relevant documents to an LLM, which grounds its answer for the user
    in the relevant documents. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Building your own RAG is surprisingly simple with all the technology and tools
    available today. There are numerous packages out there that help you implement
    RAG. They all, however, rely on the same, relatively basic underlying technology:'
  prefs: []
  type: TYPE_NORMAL
- en: Embed your document corpus (you also typically chunk up the documents)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Store the embeddings in a vector database
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The user inputs a search query
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Embed the search query
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Find embedding similarity between the document corpus and the user query, and
    return the most similar documents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This can be implemented in just a few hours if you know what you’re doing.
    To embed your data and user queries, you can, for example, use:'
  prefs: []
  type: TYPE_NORMAL
- en: Managed services such as
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: OpenAI’s text-embedding-large-3
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Google’s gemini-embedding-001
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Open-source options like
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Alibaba’s qwen-embedding-8B
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Mistral’s Linq-Embed-Mistral
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'After you’ve embedded your documents, you can store them in a vector database
    such as:'
  prefs: []
  type: TYPE_NORMAL
- en: Pinecone
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Weaviate
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Milvus
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After that, you’re basically ready to perform RAG. In the next section, I’ll
    also cover fully managed RAG solutions, where you just upload a document, and
    all chunking, embedding, and searching is handled for you.
  prefs: []
  type: TYPE_NORMAL
- en: Managed RAG services
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you want a simpler approach, you can also use fully managed RAG solutions.
    Here are a few options:'
  prefs: []
  type: TYPE_NORMAL
- en: Ragie.ai
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gemini File Search Tool
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: OpenAI File search tool
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These services simplify the RAG process significantly. You can upload documents
    to any of these services, and the services automatically handle the chunking,
    embedding, and inference for you. All you have to do is upload your raw documents
    and provide the search query you want to run. The service will then provide you
    with the relevant documents to you’re queries, which you can feed into an LLM
    to answer user questions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Even though managed RAG simplifies the process significantly, I would also
    like to highlight some downsides:'
  prefs: []
  type: TYPE_NORMAL
- en: If you only have PDFs, you can upload them directly. However, there are currently
    some file types not supported by the managed RAG services. Some of them do not
    support PNG/JPG files, for example, which complicates the process. One solution
    is to perform OCR on the image, and upload the txt file (which is supported),
    but this, of course, complicates your application, which is the exact thing you
    want to avoid when using managed RAG.
  prefs: []
  type: TYPE_NORMAL
- en: Another downside of course is that you have to upload raw documents to the services.
    When doing this, you need to make sure to stay compliant, for example, with GDPR
    regulations in the EU. This can be a challenge for some managed RAG services,
    though I know OpenAI at least supports EU residency.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I’ll also provide an example of using [OpenAI’s File Search Tool](https://platform.openai.com/docs/guides/retrieval),
    which is naturally very simple to use.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, you create a vector store and upload documents:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'After uploading and processing documents, you can query them with:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: As you may notice, this code is a lot simpler than setting up embedding models
    and vector databases to build RAG yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Information retrieval tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have the information retrieval tools readily available, we can start
    performing agentic information retrieval. I’ll start off with the initial approach
    to use LLMs for information finding, before continuing with the better and updated
    approach.
  prefs: []
  type: TYPE_NORMAL
- en: Retrieval, then answering
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first approach is to start by retrieving relevant documents and feeding
    that information to an LLM before it answers the user’s question. This can be
    done by running both keyword search and RAG search, finding the top X relevant
    documents, and feeding those documents into an LLM.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, find some documents with RAG:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Then, find some documents with a keyword search
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Then add these results together, remove duplicate documents, and feed the contents
    of these documents to an LLM for answering:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: In a lot of cases, this works super well and will provide high-quality responses.
    However, there is a better way to perform agentic information finding.
  prefs: []
  type: TYPE_NORMAL
- en: Information retrieval functions as a tool
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The newest frontier LLMs are all trained with agentic behaviour in mind. This
    means the LLMs are super good at utilizing tools to answer the queries. You can
    provide an LLM with a list of tools, which it decides when to use itself, and
    which it can utilise to answer user queries.
  prefs: []
  type: TYPE_NORMAL
- en: 'The better approach is thus to provide RAG and keyword search as tools to your
    LLMs. For GPT-5, you can, for example, do it like below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'This works much better because you’re not running a one-time information finding
    with RAG/keyword search and then answering the user question. It works well because:'
  prefs: []
  type: TYPE_NORMAL
- en: The agent can itself decide when to use the tools. Some queries, for example,
    don’t require vector search
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: OpenAI automatically does query rewriting, meaning it runs parallel RAG queries
    with different versions of the user query (which it writes itself, based on the
    user query
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The agent can determine to run more RAG queries/keyword searches if it believes
    it doesn’t have enough information
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The last point in the list above is the most important point for agentic information
    finding. Sometimes, you don’t find the information you’re looking for with the
    initial query. The agent (GPT-5) can determine that this is the case and choose
    to fire more RAG/keyword search queries if it thinks it’s needed. This often leads
    to much better results and makes the agent more likely to find the information
    you’re looking for.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I covered the basics of agentic information retrieval. I started
    by discussing why agentic information is so important, highlighting how we are
    highly dependent on quick access to information. Furthermore, I covered the tools
    you can use for information retrieval with keyword search and RAG. I then highlighted
    that you can run these tools statically before feeding the results to an LLM,
    but the better approach is to feed these tools to an LLM, making it an agent capable
    of finding information. I think agentic information finding will be more and more
    important in the future, and understanding how to use AI agents will be an important
    skill to create powerful AI applications in the coming years.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
