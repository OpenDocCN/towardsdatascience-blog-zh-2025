- en: A Step-By-Step Guide To Powering Your Application With LLMs
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/a-step-by-step-guide-to-powering-your-application-with-llm/](https://towardsdatascience.com/a-step-by-step-guide-to-powering-your-application-with-llm/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1745612963425" class="mdspan-comment">You might be wondering</mdspan>
    whether GenAI is just hype or external noise. I also thought this was hype, and
    I could sit this one out until the dust cleared. Oh, boy, was I wrong. GenAI has
    real-world applications. It also generates revenue for companies, so we expect
    companies to invest heavily in research. Every time a technology disrupts something,
    the process generally moves through the following phases: denial, anger, and acceptance.
    The same thing happened when computers were introduced. If we work in the software
    or hardware field, we might need to use GenAI at some point.'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I cover how to power your application with large Language Models
    (**LLMs**) and discuss the challenges I faced while setting up LLMs. Let’s get
    started.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Start by defining your use case clearly
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before jumping onto LLM, we should ask ourselves some questions
  prefs: []
  type: TYPE_NORMAL
- en: '*a. What problem will my LLM solve?'
  prefs: []
  type: TYPE_NORMAL
- en: b. Can my application do without LLM
  prefs: []
  type: TYPE_NORMAL
- en: c. Do I have enough resources and compute power to develop and deploy this application?*
  prefs: []
  type: TYPE_NORMAL
- en: Narrow down your use case and document it. In my case, I was working on a data
    platform as a service. We had tons of information on wikis, Slack, team channels,
    etc. We wanted a chatbot to read this information and answer questions on our
    behalf. The chatbot would answer customer questions and requests on our behalf,
    and if customers were still unhappy, they would be routed to an Engineer.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Choose your model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![AI Models Image](../Images/585b33f9ef687e640c5040a1bd8d5202.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Solen Feyissa](https://unsplash.com/@solenfeyissa?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com/@solenfeyissa?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: 'You have two options: Train your model from scratch or use a pre-trained model
    and build on top of it. The latter would work in most cases unless you have a
    particular use case. Training your model from scratch will require massive computing
    power, significant engineering efforts, and costs, among other things. Now, the
    next question is, which pre-trained model should I choose? You can select a model
    based on your use case. 1B parameter model has basic knowledge and pattern matching.
    Use cases can be restaurant reviews. The 10B parameter model has excellent knowledge
    and can follow instructions like a food order chatbot. A 100B+ parameters model
    has rich world knowledge and complex reasoning. This can be used as a brainstorming
    partner. There are many models available, such as [Llama](https://www.llama.com/)
    and [ChatGPT](https://platform.openai.com/docs/api-reference/introduction). Once
    you have a model in place, you can expand on the model.'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Enhance the model as per your data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once you have a model in place, you can expand on the model. The LLM model is
    trained on generally available data. We want to train it on our data. Our model
    needs more context to provide answers. Let’s assume we want to build a restaurant
    chatbot that answers customer questions. The model does not know information particular
    to your restaurant. So, we want to provide the model some **context**. There are
    many ways we can achieve this. Let’s dive into some of them.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt Engineering
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Prompt engineering involves augmenting the input prompt with more context during
    inference time. You provide context in your input quote itself. This is the easiest
    to do and has no enhancements. But this comes with its disadvantages. You cannot
    give a large context inside the prompt. There is a limit to the context prompt.
    Also, you cannot expect the user to always provide full context. The context might
    be extensive. This is a quick and easy solution, but it has several **limitations**.
    Here is a sample prompt engineering.
  prefs: []
  type: TYPE_NORMAL
- en: “Classify this review
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I love the movie
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Sentiment: Positive'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Classify this review
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I hated the movie.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Sentiment: Negative'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Classify the movie
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The ending was exciting”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Reinforced Learning With Human Feedback (RLHF)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![RLHF Model Diagram](../Images/93ad3bbcf15d2add9da33d2c913f2730.png)'
  prefs: []
  type: TYPE_IMG
- en: RLHF Model
  prefs: []
  type: TYPE_NORMAL
- en: 'RLHF is one of the most-used methods for integrating LLM into an application.
    You provide some contextual data for the model to learn from. Here is the flow
    it follows: The model takes an action from the action space and observes the state
    change in the environment as a result of that action. The reward model generated
    a reward ranking based on the output. The model updates its weight accordingly
    to maximize the reward and learns iteratively. For instance, in LLM, action is
    the next word that the LLM generates, and the action space is the dictionary of
    all possible words and vocabulary. The environment is the text context; the State
    is the current text in the context window.'
  prefs: []
  type: TYPE_NORMAL
- en: The above explanation is more like a textbook explanation. Let’s have a look
    at a real-life example. You want your chatbot to answer questions regarding your
    wiki documents. Now, you choose a pre-trained model like ChatGPT. Your wikis will
    be your context data. You can leverage the [langchain](https://www.langchain.com/)
    library to perform RAG. You can Here is a sample code in Python
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 4\. Evaluate your model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, you have added RAG to your model. How do you check if your model is behaving
    correctly? This is not a code where you give some input parameters and receive
    a fixed output, which you can test against. Since this is a language-based communication,
    there can be **multiple correct** answers. But what you can know for sure is whether
    the answer is incorrect. There are many metrics you can test your model against.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluate manually
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can continually evaluate your model manually. For instance, we had integrated
    a Slack chatbot that was enhanced with RAG using our wikis and Jira. Once we added
    the chatbot to the Slack channel, we initially shadowed its responses. The clients
    could not view the responses. Once we gained confidence, we made the chatbot publicly
    visible to the clients. We evaluated its response manually. But this is a quick
    and vague approach. You cannot gain confidence from such manual testing. So, the
    solution is to test against some benchmark, such as ROUGE.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluate with ROUGE score.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ROUGE metrics are used for text summarization. Rouge metrics compare the generated
    summary with reference summaries using different ROUGE metrics. Rouge metrics
    evaluate the model using recall, precision, and F1 scores. ROUGE metrics come
    in various types, and poor completion can still result in a good score; hence,
    we refer to different ROUGE metrics. For some context, a unigram is a single word;
    a bigram is two words; and an n-gram is N words.
  prefs: []
  type: TYPE_NORMAL
- en: '*ROUGE-1 Recall = Unigram matches/Unigram in reference'
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-1 Precision = Unigram matches/Unigram in generated output
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-1 F1 = 2 * (Recall * Precision / (Recall + Precision))
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-2 Recall = Bigram matches/bigram reference
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-2 Precision = Bigram matches / Bigram in generated output
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-2 F1 = 2 * (Recall * Precision / (Recall + Precision))
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-L Recall = Longest common subsequence/Unigram in reference
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-L Precision = Longest common subsequence/Unigram in output
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-L F1 = 2 * (Recall * Precision / (Recall + Precision))*
  prefs: []
  type: TYPE_NORMAL
- en: For example,
  prefs: []
  type: TYPE_NORMAL
- en: 'Reference: “It is cold outside.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Generated output: “It is very cold outside.”'
  prefs: []
  type: TYPE_NORMAL
- en: '*ROUGE-1 Recall = 4/4 = 1.0'
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-1 Precision = 4/5 = 0.8
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-1 F1 = 2 * 0.8/1.8 = 0.89
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-2 Recall = 2/3 = 0.67
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-2 Precision = 2/4 = 0.5
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-2 F1 = 2 * 0.335/1.17 = 0.57
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-L Recall = 2/4 = 0.5
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-L Precision = 2/5 = 0.4
  prefs: []
  type: TYPE_NORMAL
- en: ROUGE-L F1 = 2 * 0.335/1.17 = 0.44*
  prefs: []
  type: TYPE_NORMAL
- en: Reduce hassle with the external benchmark
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The ROUGE Score is used to understand how model evaluation works. Other benchmarks
    exist, like the BLEU Score. However, we cannot practically build the dataset to
    evaluate our model. We can leverage external libraries to benchmark our models.
    The most commonly used are the [GLUE Benchmark](https://gluebenchmark.com/) and
    [SuperGLUE Benchmark](https://super.gluebenchmark.com/).
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Optimize and deploy your model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This step might not be crucial, but reducing computing costs and getting faster
    results is always good. Once your model is ready, you can optimize it to improve
    performance and reduce memory requirements. We will touch on a few concepts that
    require more engineering efforts, knowledge, time, and costs. These concepts will
    help you get acquainted with some techniques.
  prefs: []
  type: TYPE_NORMAL
- en: Quantization of the weights
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Models have parameters, internal variables within a model that are learned from
    data during training and whose values determine how the model makes predictions.
    1 parameter usually requires 24 bytes of processor memory. So, if you choose 1B,
    parameters will require 24 GB of processor memory. Quantization converts the model
    weights from higher-precision floating-point numbers to lower-precision floating-point
    numbers for efficient storage. Changing the storage precision can significantly
    affect the number of bytes required to store a single value of the weight. The
    table below illustrates different precisions for storing weights.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b242b656827f10d1d066058887f0d9a4.png)'
  prefs: []
  type: TYPE_IMG
- en: Pruning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Pruning involves removing weights in a model that are less important and have
    little impact, such as weights equal to or close to zero. Some techniques of pruning
    are
  prefs: []
  type: TYPE_NORMAL
- en: a. Full model retraining
  prefs: []
  type: TYPE_NORMAL
- en: b. PEFT like LoRA
  prefs: []
  type: TYPE_NORMAL
- en: c. Post-training.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To conclude, you can choose a pre-trained model, such as ChatGPT or FLAN-T5,
    and build on top of it. Building your pre-trained model requires expertise, resources,
    time, and budget. You can fine-tune it as per your use case if needed. Then, you
    can use your LLM to power applications and tailor them to your application use
    case using techniques like RAG. You can evaluate your model against some benchmarks
    to see if it behaves correctly. You can then deploy your model.
  prefs: []
  type: TYPE_NORMAL
