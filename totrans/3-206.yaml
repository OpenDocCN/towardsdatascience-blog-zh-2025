    platform, so you’ll be able to find me wherever you happen to go. [Subscribe to
    my newsletter on Medium](https://medium.com/@s.kirmer) if you’d like to ensure
    you get every article in your inbox.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所闻，[Towards Data Science](https://towardsdatascience.com/)已迁移到一个独立平台，但我将继续在我的Medium页面、[我的个人网站](http://www.stephaniekirmer.com/)和新的TDS平台上发布我的作品，所以无论你走到哪里，你都能找到我。[在Medium上订阅我的通讯](https://medium.com/@s.kirmer)，如果你希望确保每篇文章都能收到。
