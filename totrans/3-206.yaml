- en: Generative AI and Civic Institutions
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成式人工智能与公共机构
- en: 原文：[https://towardsdatascience.com/generative-ai-and-civic-institutions/](https://towardsdatascience.com/generative-ai-and-civic-institutions/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/generative-ai-and-civic-institutions/](https://towardsdatascience.com/generative-ai-and-civic-institutions/)
- en: Different sectors, different goals
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不同领域，不同目标
- en: Recent events have got me thinking about AI as it relates to our civic institutions
    — think government, education, public libraries, and so on. We often forget that
    civic and governmental organizations are inherently deeply different from private
    companies and profit-making enterprises. They exist to enable people to live their
    best lives, protect people’s rights, and make opportunities accessible, even if
    (especially if) this work doesn’t have immediate monetary returns. The public
    library is an example I often think about, as I come from a library-loving and
    defending family — their goal is to provide books, cultural materials, social
    supports, community engagement, and a love of reading to the entire community,
    regardless of ability to pay.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 近期事件让我开始思考人工智能与我们的公共机构之间的关系——比如政府、教育、公共图书馆等等。我们常常忘记，公共和政府机构与私营公司和盈利企业本质上是深不相同。它们的存在是为了让人们过上最好的生活，保护人们的权利，使机会触手可及，即使（尤其是）这项工作没有立即的货币回报。公共图书馆是我经常思考的一个例子，因为我来自一个热爱并捍卫图书馆的家庭——他们的目标是向整个社区提供书籍、文化材料、社会支持、社区参与和阅读之爱，无论支付能力如何。
- en: In the private sector, efficiency is an optimization goal because any dollar
    spent on providing a product or service to customers is a dollar taken away from
    the profits. The (simplified) goal is to spend the bare minimum possible to run
    your business, with the maximum amount returned to you or the shareholders in
    profit form. In the civic space, on the other hand, efficiency is only a meaningful
    goal insomuch as it enables higher effectiveness — more of the service the institution
    provides getting to more constituents.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在私营部门，效率是一个优化目标，因为任何用于向客户提供产品或服务的美元都是从利润中扣除的。目标（简化来说）是以尽可能少的成本运营您的业务，以最大化的利润形式回报给您或股东。另一方面，在公共领域，效率只有在它能提高效率的程度上才有意义——即更多的服务能够惠及更多的公众。
- en: In the civic space, efficiency is only a meaningful goal insomuch as it enables
    higher effectiveness — more of the service the institution provides getting to
    more constituents.
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在公共领域，效率只有在它能提高效率的程度上才有意义——即更多的服务能够惠及更多的公众。
- en: So, if you’re at the library, and you could use an AI chatbot to answer patron
    questions online instead of assigning a librarian to do that, that librarian could
    be helping in-person patrons, developing educational curricula, supporting community
    services, or many other things. That’s a general efficiency that could make for
    higher effectiveness of the library as an institution. Moving from card catalogs
    to digital catalogs is a prime example of this kind of efficiency to effectiveness
    pipeline, because you can find out from your couch whether the book you want is
    in stock using search keywords instead of flipping through hundreds of notecards
    in a cabinet drawer like we did when I was a kid.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果您在图书馆，您可以使用人工智能聊天机器人在线回答读者的问题，而不是指派图书管理员来做这件事，那么这位图书管理员就可以帮助现场读者，开发教育课程，支持社区服务，或者许多其他事情。这是一种普遍的效率，可以提高图书馆作为一个机构的效率。从卡片目录过渡到数字目录是这种效率转化为效率的典型例子，因为您可以从沙发上使用搜索关键词找到您想要的书籍是否在库存中，而不是像我小时候那样翻阅几百张卡片。
- en: However, we can pivot too hard in the direction of efficiency and lose sight
    of the end goal of effectiveness. If, for example, your online librarian chat
    is often used by schoolchildren at home to get homework help, replacing them with
    an AI chatbot could be a disaster — after getting incorrect information from such
    a bot and getting a bad grade at school, a child might be turned off from patronizing
    the library or seeking help there for a long time, or forever. So, it’s important
    to deploy generative AI solutions only when it is well thought out and purposeful,
    not just because the media is telling us that “AI is neat.” ([Eagle-eyed readers
    will know that this is basically similar advice to what I’ve said in the past
    about deploying AI in businesses as well.](https://towardsdatascience.com/economics-of-generative-ai-75f550288097/))
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们可能会过于专注于效率，而忽视了最终目标的有效性。例如，如果您的在线图书馆员聊天经常被在家做作业的学生使用以获得帮助，用AI聊天机器人取代他们可能会是一场灾难——如果一个孩子从这样的机器人那里获得了错误信息并在学校得到低分，他可能会长期或永远不再光顾图书馆或寻求那里的帮助。因此，只有在经过深思熟虑并有目的性地部署生成式AI解决方案时，才重要，而不仅仅是因为媒体告诉我们“AI很酷”。（细心的读者会知道，这基本上是我过去关于在商业中部署AI时所说的类似建议。([Eagle-eyed
    readers will know that this is basically similar advice to what I’ve said in the
    past about deploying AI in businesses as well.](https://towardsdatascience.com/economics-of-generative-ai-75f550288097/)))
- en: As a result, what we thought was a gain in efficiency leading to net higher
    effectiveness actually could diminish the number of lifelong patrons and library
    visitors, which would mean a loss of effectiveness for the library. Sometimes
    unintended effects from attempts to improve efficiency can diminish our ability
    to provide a universal service. That is, there may be a tradeoff between making
    every single dollar stretch as far as it can possibly go and providing reliable,
    comprehensive services to all the constituents of your institution.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 结果，我们原本认为的提高效率带来的净更高效率实际上可能会减少终身读者和图书馆访客的数量，这意味着图书馆的有效性会降低。有时，试图提高效率所带来的意外效果可能会削弱我们提供普遍服务的能力。也就是说，在使每一美元尽可能发挥最大作用和为机构的所有成员提供可靠、全面的服务之间可能存在权衡。
- en: Sometimes unintended effects from attempts to improve efficiency can diminish
    our ability to provide a universal service.
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 有时，试图提高效率所带来的意外效果可能会削弱我们提供普遍服务的能力。
- en: AI for efficiency
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 效率提升的AI
- en: 'It’s worth it to take a closer look at this concept — AI as a driver of efficiency.
    Broadly speaking, the theory we hear often is that incorporating generative AI
    more into our workplaces and organizations can increase productivity. Framing
    it at the most Econ 101 level: using AI, more work can be completed by fewer people
    in the same amount of time, right?'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 值得我们更深入地研究这个概念——AI作为效率的驱动者。广义而言，我们经常听到的理论是，将生成式AI更多地融入我们的工作和组织中可以提高生产力。用最基础的经济学101水平来表述：使用AI，在相同的时间内，更少的人可以完成更多的工作，对吧？
- en: Let’s challenge some aspects of this idea. AI is useful to complete certain
    tasks but is sadly inadequate for others. (As our imaginary schoolchild library
    patron learned, an LLM is not a reliable source of facts, and should not be treated
    like one.) So, AI’s ability to increase the volume of work being done with fewer
    people (efficiency) is limited by what kind of work we need to complete.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们挑战这个想法的一些方面。AI对于完成某些任务是有用的，但遗憾的是，对于其他任务则不足够。（正如我们假想的学校学生图书馆读者所学的，LLM不是一个可靠的事实来源，不应将其视为一个。）因此，AI通过减少人员数量来增加工作量的能力（效率）受到我们需要完成的工作类型的限制。
- en: If our chat interface is only used for simple questions like “What are the library’s
    hours on Memorial Day?” we can hook up a RAG (Retrieval Augmented Generation)
    system with an LLM and make that quite useful. But outside of the limited bounds
    of what information we can provide to the LLM, we should probably set guard rails
    and make the model refuse to try and answer, to avoid giving out false information
    to patrons.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们的聊天界面仅用于回答像“纪念日图书馆的开放时间是什么？”这样的简单问题，我们可以连接一个RAG（检索增强生成）系统和一个LLM（大型语言模型），使其变得非常有用。但是，在我们可以提供给LLM的信息的有限范围内，我们可能需要设置护栏，并让模型拒绝尝试回答，以避免向读者提供错误信息。
- en: 'So, let’s play that out. We have a chatbot that does a very limited job, but
    does it well. The librarian who was on chatbot duty now may have some reduction
    in the work required of them, but there are still going to be a subset of questions
    that still require their help. We have some choices: put the librarian on chatbot
    duty for a reduced number of hours a week, hoping the questions come in when they’re
    on? Tell people to just call the reference desk or send an email if the chatbot
    refuses to answer them? Hope that people come in to the library in person to ask
    their questions?'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们来分析一下。我们有一个做得很有限的聊天机器人，但它做得很好。现在负责聊天机器人的图书管理员可能需要的工作量有所减少，但仍然有一些问题需要他们的帮助。我们有几种选择：让图书管理员每周减少几个小时的时间负责聊天机器人，希望他们在工作时会有问题？告诉人们如果聊天机器人拒绝回答他们，就打电话到参考咨询台或发送电子邮件？希望人们亲自到图书馆来提问？
- en: I suspect the likeliest option is actually “the patron will seek their answer
    elsewhere, perhaps from another LLM like ChatGPT, Claude, or Gemini.” Once again,
    we’ve ended up in a situation where the library loses patronage because their
    offering wasn’t meeting the needs of the patron. And to boot, the patron may have
    gotten another wrong answer somewhere else, for all we know.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我怀疑最有可能的选项实际上是“赞助商将在别处寻找答案，也许是从另一个LLM（大型语言模型）如ChatGPT、Claude或Gemini那里。”又一次，我们陷入了图书馆失去赞助商的情况，因为他们的服务没有满足赞助商的需求。而且，赞助商可能在别处得到了另一个错误的答案，我们无从得知。
- en: I am spinning out this long example just to illustrate that efficiency and effectiveness
    in the civic environment can have a lot more push and pull than we would initially
    assume. It’s not to say that AI isn’t useful to help civic organizations stretch
    their capabilities to serve the public, of course! But just like with any application
    of generative AI, we need to be very careful to think about what we’re doing,
    what our goals are, and whether those two are compatible.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是举这个冗长的例子来表明，在公民环境中，效率和效果可能比我们最初想象的要复杂得多。当然，这并不是说人工智能对帮助公民组织扩展其服务公众的能力没有用！但就像任何生成式人工智能的应用一样，我们需要非常小心地思考我们在做什么，我们的目标是什么，以及这两个目标是否相容。
- en: Conversion of labor
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 劳动转换
- en: Now, this has been a very simplistic example, and eventually we could hook up
    the whole encyclopedia to that chatbot RAG or something, of course, and try to
    make it work. In fact, I think we can and should continue developing more ways
    to chain together AI models to expand the scope of valuable work they can do,
    including making different specific models for different responsibilities. However,
    this development is itself work. It’s not really just a matter of “people do work”
    or “models do work”, but instead it’s “people do work building AI” or “people
    do work providing services to people”. There’s a calculation to be made to determine
    when it would be more efficient to do the targeted work itself, and when AI is
    the right way to go.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这是一个非常简单的例子，最终我们可以将整个百科全书连接到那个聊天机器人RAG或其他东西上，当然，并尝试让它工作。事实上，我认为我们可以也应该继续开发更多将AI模型串联起来的方法，以扩大它们可以做的有价值工作的范围，包括为不同的责任制作不同的特定模型。然而，这种发展本身也是工作。这不仅仅是“人们做工作”或“模型做工作”的问题，而是“人们做工作构建AI”或“人们做工作为人们提供服务”。需要计算确定何时直接做针对性的工作更有效率，何时人工智能是正确的选择。
- en: Working on the AI has an advantage in that it will hopefully render the task
    reproducible, so it will lead to efficiency, but let’s remember that AI engineering
    is vastly different from the work of the reference librarian. We’re not interchanging
    the same workers, tasks, or skill sets here, and in our contemporary economy,
    the AI engineer’s time costs a heck of a lot more. So if we did want to measure
    this efficiency all in dollars and cents, the same amount of time spent working
    at the reference desk and doing the chat service will be much cheaper than paying
    an AI engineer to develop a better agentic AI for the use case. Given a bit of
    time, we could calculate out how many hours, days, years of work as a reference
    librarian we’d need to save with this chatbot to make it worth building, but often
    that calculation isn’t done before we move towards AI solutions.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行人工智能工作方面有一个优势，那就是它有望使任务可重复，因此将提高效率，但让我们记住，人工智能工程与参考馆员的职责大相径庭。我们在这里并不是在交换相同的员工、任务或技能集，而且在我们当代经济中，人工智能工程师的时间成本要高得多。所以，如果我们真的想用美元和美分来衡量这种效率，那么在参考台工作以及进行聊天服务所花费的时间将远远低于支付人工智能工程师开发更好的代理人工智能用于特定用例的费用。如果我们给一点时间，我们可以计算出作为参考馆员需要节省多少小时、天数、年数的工作，以使这个聊天机器人值得构建，但通常在转向人工智能解决方案之前，这种计算并没有完成。
- en: '*We need to interrogate the assumption that incorporating generative AI in
    any given scenario is a guaranteed net gain in efficiency.*'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*我们需要质疑在特定场景中引入生成式人工智能是否一定能带来效率净增长的假设。*'
- en: Externalities
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 外部性
- en: While we’re on this topic of weighing whether the AI solution is worth doing
    in a particular situation, we should remember that developing and using AI for
    tasks does not happen in a vacuum. It has some cost environmentally and economically
    when we choose to use a generative AI tool, even when it’s a single prompt and
    a single response. [Consider that the newly released GPT-4.5 has increased prices
    30x for input tokens ($2.50 per million to $75 per million) and 15x for output
    tokens ($10 per million to $150 per million) just since GPT-4o](https://arstechnica.com/ai/2025/02/its-a-lemon-openais-largest-ai-model-ever-arrives-to-mixed-reviews/).
    And that isn’t even taking into account the water consumption for cooling data
    centers [(3 bottles per 100 word output for GPT-4)](https://www.tomshardware.com/tech-industry/artificial-intelligence/using-gpt-4-to-generate-100-words-consumes-up-to-3-bottles-of-water-ai-data-centers-also-raise-power-and-water-bills-for-nearby-residents), [electricity
    use, and rare earth minerals used in GPUs](https://medium.com/towards-data-science/environmental-implications-of-the-ai-boom-279300a24184).
    Many civic institutions have as a macro level goal to improve the world around
    them and the lives of the citizens of their communities, and concern for the environment
    has to have a place in that. Should organizations whose purpose is to have a positive
    impact weigh the possibility of incorporating AI more carefully? I think so.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们讨论是否在特定情况下实施人工智能解决方案是否值得时，我们应该记住，开发和使用人工智能进行任务并不是在真空中发生的。当我们选择使用生成式人工智能工具时，即使只是一个提示和一个响应，也会在环境和经济上产生一些成本。[考虑一下新发布的GPT-4.5将输入令牌的价格提高了30倍（从每百万个令牌2.50美元到每百万个令牌75美元），输出令牌的价格提高了15倍（从每百万个令牌10美元到每百万个令牌150美元），这仅仅是从GPT-4o以来](https://arstechnica.com/ai/2025/02/its-a-lemon-openais-largest-ai-model-ever-arrives-to-mixed-reviews/)。[而且这还没有考虑到用于冷却数据中心的水消耗（GPT-4每生成100个单词需要3瓶水）](https://www.tomshardware.com/tech-industry/artificial-intelligence/using-gpt-4-to-generate-100-words-consumes-up-to-3-bottles-of-water-ai-data-centers-also-raise-power-and-water-bills-for-nearby-residents)，[电力消耗以及用于GPU的稀土矿物](https://medium.com/towards-data-science/environmental-implications-of-the-ai-boom-279300a24184)。许多公民机构都将改善他们周围的世界和社区公民的生活作为宏观层面的目标，对环境的关注必须占据一席之地。那些旨在产生积极影响的组织是否应该更仔细地权衡引入人工智能的可能性？我认为是的。
- en: Plus, I don’t often get too much into this, but I think we should take a moment
    to consider some folks’ end game for incorporating AI — reducing staffing altogether.
    Instead of making our existing dollars in an institution go farther, some people’s
    idea is just reducing the number of dollars and redistributing those dollars somewhere
    else. This brings up many questions, naturally, about where those dollars will
    go instead and whether they will be used to advance the interests of the community
    residents some other way, but let’s set that aside for now. My concern is for
    the people who might lose their jobs under this administrative model.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我并不经常深入探讨这个问题，但我认为我们应该花点时间考虑一些人在整合人工智能时的最终目标——完全减少人员编制。有些人认为，与其让现有的机构资金发挥更大的作用，不如减少这些资金的数量，并将这些资金重新分配到其他地方。这自然会引发许多关于这些资金将流向何方以及它们是否将以其他方式促进社区居民利益的问题，但让我们先放一放。我关心的是可能在这种管理模式下失去工作的人们。
- en: For-profit companies hire and fire employees all the time, and their priorities
    and objectives are focused on profit, so this is not particularly hypocritical
    or inconsistent. But as I noted above, civic organizations have objectives around
    improving the community or communities in which they exist. In a very real way,
    they are advancing that goal when part of what they provide is economic opportunity
    to their workers. We live in a society where working is the overwhelmingly predominant
    way people provide for themselves and their families, and giving jobs to people
    in the community and supporting the economic well-being of the community is a
    role that civic institutions do play.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 盈利公司经常雇佣和解雇员工，它们的优先事项和目标都集中在利润上，因此这并不特别虚伪或不一致。但如我上面所提到的，公民组织的目标是改善它们存在的社区或社区。在非常实际的意义上，当它们提供的一部分服务是给工人经济机会时，它们就是在推进这一目标。我们生活在一个以工作为主要方式来养活自己和家人的社会中，为社区中的人们提供工作并支持社区的经济福祉是公民机构扮演的角色。
- en: '[R]educing staffing is not an unqualified good for civic organizations and
    government, but instead must be balanced critically against whatever other use
    the money that was paying their salaries will go to.'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[R]减少人员编制并不是公民组织和政府的无条件好事，而必须与那笔原本支付他们工资的资金的其它用途进行关键性的平衡。'
- en: At the bare minimum, this means that reducing staffing is not an unqualified
    good for civic organizations and government, but instead must be balanced critically
    against whatever other use the money that was paying their salaries will go to.
    It’s not impossible for reducing staff to be the right decision, but we have to
    bluntly acknowledge that when members of communities experience joblessness, that
    effect cascades. They are now no longer able to patronize the shops and services
    they would have been supporting with their money, the tax base may be reduced,
    and this negatively affects the whole collective.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 至少这意味着，减少人员编制并不是公民组织和政府的无条件好事，而必须与那笔原本支付他们工资的资金的其它用途进行关键性的平衡。减少人员编制可能是正确的决定，但我们必须坦率地承认，当社区成员失业时，这种影响会连锁反应。他们现在不再能够光顾那些他们原本会用钱支持的商店和服务，税基可能会减少，这会负面影响整个集体。
- en: Workers aren’t just workers; they’re also patrons, customers, and participants
    in all aspects of the community. When we think of civic workers as simply money
    pits to be replaced with AI or whose cost for labor we need to minimize, we lose
    sight of the reasons for the work to be done in the first place.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 工人不仅仅是工人；他们也是顾客、消费者，是社区所有方面的参与者。当我们把公民工作者视为仅仅是需要用人工智能取代的金钱陷阱，或者需要最小化劳动力成本时，我们就失去了最初进行这项工作的原因。
- en: Conclusion
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: I hope this discussion has brought some clarity about how really difficult it
    is to decide if, when, and how to apply generative AI to the civic space. It’s
    not nearly as simple a thought process as it might be in the for-profit sphere
    because the purpose and core meaning of civic institutions are completely different.
    Those of us who do machine learning and build AI solutions in the private sector
    might think, “Oh, I can see a way to use this in government,” but we have to recognize
    and appreciate the complex contextual implications that might have.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这次讨论能让大家对在公共领域应用生成式AI的难度有更清晰的认识。这并不像在盈利领域那样简单，因为公共机构的宗旨和核心意义完全不同。我们在私营部门从事机器学习和构建AI解决方案的人可能会想，“哦，我可以看到在政府中应用它的方法，”但我们必须认识到并欣赏可能产生的复杂情境影响。
- en: Next month, I’ll be bringing you a discussion of how social science research
    is incorporating generative AI, which has some very intriguing aspects.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 下个月，我将与大家讨论社会科学研究如何融入生成式AI，这有一些非常吸引人的方面。
