- en: TDS Authors Can Now Receive Payments Via Stripe
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: TDS作者现在可以通过Stripe接收付款
- en: 原文：[https://towardsdatascience.com/tds-authors-can-now-receive-payments-via-stripe/](https://towardsdatascience.com/tds-authors-can-now-receive-payments-via-stripe/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/tds-authors-can-now-receive-payments-via-stripe/](https://towardsdatascience.com/tds-authors-can-now-receive-payments-via-stripe/)
- en: We launched the TDS Author Payment Program [back in February](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/),
    and have since announced a major update—with a far more inclusive earning tier—[just
    last month](https://towardsdatascience.com/many-more-tds-contributors-are-now-eligible-for-earning-through-the-author-payment-program/).
    Today we’re happy to share that the Program, which has already seen dozens of
    authors receive their first payout, is now a lot more streamlined and user-friendly
    thanks to a new Stripe integration.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在2月份推出了TDS作者支付计划 [当时](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/)，并随后宣布了一个重大更新——拥有更广泛的收益层级——[就在上个月](https://towardsdatascience.com/many-more-tds-contributors-are-now-eligible-for-earning-through-the-author-payment-program/)。今天我们很高兴地分享，该计划已经看到数十位作者收到了他们的第一笔付款，现在由于新的Stripe集成，该计划变得更加高效和用户友好。
- en: Starting this week, both existing and new authors can connect their Stripe account
    to their author profile on our Contributor Portal. This will ensure payments are
    more timely, less clunky, and visible in the same place where authors also draft
    articles, check their stats, and communicate with our team. All other elements
    of the Program remain the same—including the conditions for eligibility and the
    specific criteria articles have to meet to earn on TDS (you can always review
    the details we’ve shared in our [announcement post](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/)).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 从本周开始，现有作者和新作者都可以将他们的Stripe账户连接到我们在贡献者门户上的作者个人资料。这将确保付款更加及时、更加顺畅，并且可以在作者撰写文章、检查他们的统计数据和与我们的团队沟通的同一地方进行。该计划的其它所有元素保持不变——包括资格条件以及文章必须满足的具体标准才能在TDS上获得收益（你总是可以查看我们在
    [公告帖子](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/)
    中分享的细节）。
- en: We’ve already contacted all current participants in the Author Payment Program
    with instructions on next steps, and everyone joining TDS as a contributor (hey,
    [that could be *you*](https://towardsdatascience.com/questions-96667b06af5/)!)
    going forward will also be invited to connect their Stripe account. If you’ve
    published with us before and joined the Author Payment Program, you can go ahead
    and complete the process in a few minutes — [you’ll find detailed instructions
    in our FAQs](https://towardsdatascience.com/writers-faq-462571b65b35/#connect-Stripe).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经联系了所有当前参与作者支付计划的参与者，并提供了下一步的说明。所有未来加入TDS作为贡献者（嘿，[那可能就是 *你*](https://towardsdatascience.com/questions-96667b06af5/)！）的人也将被邀请连接他们的Stripe账户。如果你之前曾与我们合作并加入了作者支付计划，你可以立即完成这个过程——[你可以在我们的常见问题解答中找到详细说明](https://towardsdatascience.com/writers-faq-462571b65b35/#connect-Stripe)。
- en: 'Finally, a note on the payment schedule: we’ll process payments to our authors
    on the 15th of each month following their article’s 30-day earning window. For
    example, if you published an article on April 18, 2025, your earnings window would
    last until May 18, 2025\. At that point you’ll already see the estimated payout
    in your [analytics dashboard](https://contributor.insightmediagroup.io/wp-admin/admin.php?page=analytics-dashboard),
    and the payment will be processed in the next payout cycle starting June 15, 2025\.
    You can learn more about our [payout cycle here](https://towardsdatascience.com/writers-faq-462571b65b35/#payout-cycle).'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，关于支付时间表：我们将在文章30天收益窗口之后的每月15日处理向作者支付款项。例如，如果你在2025年4月18日发表了一篇文章，你的收益窗口将持续到2025年5月18日。到那时，你将已经在你的
    [分析仪表板](https://contributor.insightmediagroup.io/wp-admin/admin.php?page=analytics-dashboard)
    中看到预计的付款，并且付款将在下一个开始于2025年6月15日的付款周期中处理。你可以在这里了解更多关于我们的 [付款周期](https://towardsdatascience.com/writers-faq-462571b65b35/#payout-cycle)。
- en: We look forward to more and more authors joining and enjoying the benefits of
    the Author Payment Program; if you ever have any questions about it, feel free
    to reach out at [[email protected]](/cdn-cgi/l/email-protection#1060717974716564787f6260627f7762717d50647f677162746374716471637379757e73753e737f7d).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们期待越来越多的作者加入并享受作者支付计划的好处；如果您对此有任何疑问，请随时通过 [[email protected]](/cdn-cgi/l/email-protection#1060717974716564787f6260627f7762717d50647f677162746374716471637379757e73753e737f7d)
    联系我们。
