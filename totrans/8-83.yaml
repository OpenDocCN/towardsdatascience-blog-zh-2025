- en: How to Process 10k Images in Seconds
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-process-10k-images-in-seconds-e99661f5c2b5/](https://towardsdatascience.com/how-to-process-10k-images-in-seconds-e99661f5c2b5/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Dataset for Image Processing](../Images/7b15ea6f0602323a7e24a5f216e93259.png)'
  prefs: []
  type: TYPE_IMG
- en: Dataset for Image Processing
  prefs: []
  type: TYPE_NORMAL
- en: '*Manual, repetitive tasks. Egh.* One of the things I hate the most, especially
    if I know they can be automated. Imagine you need to edit a bunch of images with
    the same cropping and resizing operation. For a couple of images you might just
    open an image editor and do it by hand. But what about doing the **same operation
    for a thousands or tens of thousands of images**? Let’s see how we can automate
    such an image processing task with **Python** and **OpenCV**, as well as how we
    can optimize this data processing pipeline to run efficiently on a sizeable dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For this post, I created a toy example where I extracted 10,000 frames from
    a random video of a beach I recorded, where the goal is to **crop** the image
    to a square aspect ratio around the center and then **resize** the image to a
    fixed size of **224×224**.
  prefs: []
  type: TYPE_NORMAL
- en: This roughly resembles part of a **pre-processing** step that might be required
    for a dataset when training a machine learning model.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Illustration of Crop and Resize Operation](../Images/2b33f3d61bb2cbf3f5a6adf64ec954f6.png)'
  prefs: []
  type: TYPE_IMG
- en: Illustration of Crop and Resize Operation
  prefs: []
  type: TYPE_NORMAL
- en: '![Manual Center Crop and Resize](../Images/cc8fc247ec1288793916b1353ab0815e.png)'
  prefs: []
  type: TYPE_IMG
- en: Manual Center Crop and Resize
  prefs: []
  type: TYPE_NORMAL
- en: Prerequisites
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you want to follow along, make sure to install the following packages, for
    example with **[uv](https://docs.astral.sh/uv/)**. You can also find the full
    source code on **[GitHub](https://github.com/trflorian/image-processing)**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Data Loading
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s start by loading the images one by one using **OpenCV**. All the images
    are in a subfolder and will use the **pathlib** glob method to find all **png**
    files in this folder. To show the progress, I am using the **tqdm** library. By
    using the **sorted** method, I make sure the paths are sorted and convert the
    generator returned from the **glob** call to a list. This way **tqdm** knows the
    length of the iteration to show the progress bar.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Now we can also prepare our output directory, and make sure that it exists.
    This is where our processed images will be stored.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Image Processing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For the processing of the image, let’s define a function. It will take the **input**
    and **output image path** as arguments.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: To implement this function, we first need to load the image with **OpenCV**.
    Make sure to import the opencv package at the beginning of the file.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'To crop the image, we can directly slice the image array on the x-axis. Keep
    in mind that OpenCV image arrays are stored in **YXC** shape: **X/Y** the 2D axis
    of the image starting in the top-left corner and **C** being the color channel.
    So the x-axis is the second index of the image. For simplicity, I assume that
    the images are in landscape format with their width > height.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: To resize the image, we can simply use the **resize** function from OpenCV.
    If we don’t specify an interpolation method, it will use a **bilinear** interpolation,
    which is fine for this project.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Finally the image has to be saved to the output file, using the **imwrite**
    function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Now we can simply call our process_image function in the loop over the image
    paths.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: If I run this program on my machine, it takes a bit over a minute to process
    10,000 images.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Now while for this dataset size waiting a minute is still feasible, for a 10x
    larger dataset you would already wait for 10 minutes. We can do way better by
    **parallelizing** this process. If you look at the resource usage while running
    the current program, you will notice that only one core is at 100% utilization.
    The program is only using a single core!
  prefs: []
  type: TYPE_NORMAL
- en: '![Single core CPU usage while running the image processing](../Images/3a65f3870b9bbc661711599aa45d2564.png)'
  prefs: []
  type: TYPE_IMG
- en: Single core CPU usage while running the image processing
  prefs: []
  type: TYPE_NORMAL
- en: Parallelize across Multiple Cores
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To make our program use more of the available cores, we need to use a feature
    in python called **Multiprocessing**. Due to the **Global Interpreter Lock (GIL)**,
    a single python process cannot *really* run a task in parallel (unless the GIL
    is disabled, which can be done with Python≥3.13). What we need to do instead is
    spawn multiple python processes (hence the name multiprocessing) that are managed
    by our main python program.
  prefs: []
  type: TYPE_NORMAL
- en: To implement this, we can make use of the built-in python modules **multiprocessing**
    and **concurrent**. We could theoretically manually spawn the python processes,
    while making sure not to submit more processes than we have number of cores. Since
    our process is CPU bound, we will not see a speed improvement with more processes,
    as they will just have to wait. In fact, at one point the overhead of switching
    between the processes will overweigh the advantage of the parallelization.
  prefs: []
  type: TYPE_NORMAL
- en: To manage the python processes, we can use a **ProcessPoolExecutor**. This will
    keep a pool of python processes instead of fully destroying and restarting each
    process for each submitted task. By default, it will use as many pools as the
    number of **logical CPUs** available, which is retrieved from **os.process_cpu_count()**.
    So by default it will spawn a process for every core of my CPU, in my case 20\.
    You could also supply a **max_workers** argument to specify the number of processes
    to spawn in the pool.
  prefs: []
  type: TYPE_NORMAL
- en: '**NOTE:** Make sure to wrap your **multiprocess** pool in a **main** check.
    On Windows, the subprocesses are separate processes that import the module, which
    will keep [spawning new processes recursively](https://docs.python.org/3/library/multiprocessing.html#windows)
    if the process spawning is not inside the main guard!'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: We use a **[context manager](https://docs.python.org/3/library/contextlib.html)**
    (the ***with*** statement) to create a process pool executor, this will make sure
    that the processes are cleaned up even if an exception occurs during the execution.
    Then we use the **map** function to create a process for each of our input **img_paths**
    and **output_paths**. Finally by wrapping the iteration of **all_processes** with
    **[tqdm](https://medium.com/@flip.flo.dev/a-simple-library-that-makes-it-into-almost-all-of-my-python-projects-tqdm-e097ee8091e2)**,
    we can get a progress bar for the processes that have finished.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Now if you run the program and check the CPU utilization again, you will see
    that all cores are used! The progress bar also shows how our iteration speed has
    increased.
  prefs: []
  type: TYPE_NORMAL
- en: '![All CPU cores are utilized](../Images/6eed87c5ec375299ba64daae42fd9861.png)'
  prefs: []
  type: TYPE_IMG
- en: All CPU cores are utilized
  prefs: []
  type: TYPE_NORMAL
- en: Comparison
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As a quick sanity check, I plotted the timing for processing 1000 images using
    different amounts of parallelization, starting with the single worker scenario
    and increasing the number of workers up to twice the number of cores my machine
    has. The figure below indicates the optimum being close to the number of CPU cores.
    There’s a sharp increase in performance going from 1 worker to multiple, and a
    slight decrease of the performance with more workers than CPU cores.
  prefs: []
  type: TYPE_NORMAL
- en: '![Timing of different amounts of parallelization](../Images/14a3d9405965398f73c974bf417f52dc.png)'
  prefs: []
  type: TYPE_IMG
- en: Timing of different amounts of parallelization
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this post you learned how to efficiently process an image dataset by running
    the processing in parallel on all available cores. This way the data processing
    pipeline was sped up by a significant factor. I hope you learned something today,
    happy coding and take care!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
