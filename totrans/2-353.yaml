- en: The Westworld Blunder
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《西部世界错误》
- en: 原文：[https://towardsdatascience.com/the-westworld-blunder/](https://towardsdatascience.com/the-westworld-blunder/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/the-westworld-blunder/](https://towardsdatascience.com/the-westworld-blunder/)'
- en: <mdspan datatext="el1747078499194" class="mdspan-comment">We’re entering</mdspan>
    an interesting moment in AI development. AI systems are getting memory, reasoning
    chains, self-critiques, and long-context recall. These capabilities are exactly
    some of the things that [I’ve previously written](https://towardsdatascience.com/an-illusion-of-life-5a11d2f2c737/) would
    be prerequisites for an AI system to be conscious. Just to be clear, I don’t believe
    today’s AI systems are self-aware, but I no longer find that position as firmly
    supported as I once did.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747078499194" class="mdspan-comment">我们正进入</mdspan>人工智能发展的一个有趣时刻。AI系统正在获得记忆、推理链、自我批评和长上下文回忆的能力。这些能力正是我之前所写[的](https://towardsdatascience.com/an-illusion-of-life-5a11d2f2c737/)一个AI系统要具有意识所必需的一些前提条件。为了明确起见，我不认为今天的AI系统具有自我意识，但我不再像以前那样坚定地支持这个观点。
- en: I think most other AI researchers would agree that the current systems are not
    conscious, at least because they lack components that one would expect to be necessary
    for consciousness. As a result, current AI systems can’t have emotions. They don’t
    feel fear, anger, pain, or joy. If you insult an AI chatbot, it might give you
    an offended reply, but there’s no underlying emotional machinery. No equivalent
    of a limbic system. No surge of cortisol or dopamine. The AI model is just replicating
    the human behavior patterns that it’s seen in its training data.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为大多数其他AI研究人员都会同意，当前的系统并不具有意识，至少因为它们缺少人们预期对于意识所必需的组件。因此，当前的AI系统无法拥有情感。它们不会感到恐惧、愤怒、痛苦或快乐。如果你侮辱一个AI聊天机器人，它可能会给你一个受冒犯的回复，但没有底层的情感机制。没有类似边缘系统的存在。没有皮质醇或多巴胺的激增。AI模型只是在复制它在训练数据中看到的的人类行为模式。
- en: The situation is fairly clear today, but what happens when these AI systems
    get to the point where they aren’t missing critical components that we think are
    needed for consciousness? Even if we think the AI systems have all the right components
    for consciousness, that doesn’t mean they are conscious, only that they might
    be. How would we be able to tell the difference in that case?
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的形势相当明确，但当这些AI系统达到它们不再缺少我们认为对于意识所必需的关键组件的程度时会发生什么？即使我们认为AI系统具有所有正确的意识组件，这也并不意味着它们是意识，而只是可能具有意识。在这种情况下，我们如何能够区分它们呢？
- en: This question is essentially the well-known “[problem of other minds](https://en.wikipedia.org/wiki/Problem_of_other_minds)”,
    the philosophical realization that we can never truly know whether another being,
    human or otherwise, is actually experiencing emotions or merely simulating them.
    Scientists and philosophers have pondered the problem for centuries with the well-established
    consensus being that we can infer consciousness from behavior, but we can’t prove
    it.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题本质上就是众所周知的“[心灵问题](https://en.wikipedia.org/wiki/Problem_of_other_minds)”，这是一种哲学上的认识，即我们永远无法真正知道另一个生物，无论是人类还是其他生物，是否真正在经历情感，或者只是在模拟情感。科学家和哲学家们几个世纪以来一直在思考这个问题，普遍共识是我们可以从行为中推断出意识，但我们无法证明这一点。
- en: The implication is that at some point we will not be able to say one way or
    the other if our machines are alive. We won’t know if an AI begging not to be
    shut off is just a convincing act, regurgitating what it was trained on, or something
    actually experiencing emotional distress and fearing for its existence.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着在某个时刻，我们将无法确定我们的机器是否活着。我们不知道一个请求不要被关闭的AI是否只是做出了令人信服的表演，重复它所训练的内容，或者实际上正在经历情感上的痛苦并担心其存在。
- en: Simulated Suffering vs. Real Suffering
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模拟的痛苦与真实的痛苦
- en: Today, a lot of people who interact with AI chatbots perceive the chatbot as
    experiencing emotions such as happiness or fear. It makes the interactions feel
    more natural and it’s consistent with the examples that were used to train the
    AI model. However, because the AI models are missing necessary components, we
    know that today’s AI chatbots are just actors with no inner experience. They can
    mimic joy or suffering, but currently they don’t have the necessary components
    to actually *feel* it.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，许多与AI聊天机器人互动的人认为聊天机器人正在经历诸如快乐或恐惧之类的情感。这使得互动感觉更自然，并且与用于训练AI模型的例子一致。然而，由于AI模型缺少必要的组件，我们知道今天的AI聊天机器人只是没有内在体验的演员。它们可以模仿快乐或痛苦，但目前它们还没有真正感受这些情感的必要组件。
- en: 'This appearance of emotions creates a dilemma for the user: How should they
    treat an AI chatbot, or any other AI system that mimics human behavior? Should
    the user be polite to it and treat it like a human assistant, or should the user
    ignore the simulated emotions and just tell it what to do?'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这种情感的表现为用户创造了一个困境：他们应该如何对待一个AI聊天机器人，或者任何模仿人类行为的其他AI系统？用户应该礼貌地对待它，把它当作一个人类助手，还是应该忽略模拟的情感，只告诉它该做什么？
- en: It’s also easy to find examples where users are abusive or cruel to the AI chatbot,
    insulting it, threatening it, and in general treating it in a way that would be
    completely unacceptable to treat a person. Indeed, when a chatbot refuses to do
    something reasonable because of miss-applied safety rules, or does something unexpected
    and undesirable, it’s easy for the human user to get frustrated and angry and
    to take that frustration and anger out on the chatbot. When subjected to the abusive
    treatment, the AI chatbot will do as it was trained to do and simulate distress.
    For example, if a user harshly criticizes and insults an AI chatbot for making
    errors, it might express shame and beg for forgiveness.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 同样容易找到用户对AI聊天机器人进行虐待或残忍对待的例子，侮辱它，威胁它，总的来说，以完全不能接受的方式对待它。确实，当聊天机器人因为误用的安全规则而拒绝做合理的事情，或者做了意想不到的不愉快的事情时，人类用户很容易感到沮丧和愤怒，并将这种挫折和愤怒发泄在聊天机器人身上。当受到虐待时，AI聊天机器人会按照训练去做，模拟困境。例如，如果用户严厉批评和侮辱一个AI聊天机器人，因为它犯了错误，它可能会表现出羞愧并请求原谅。
- en: This situation raises the ethical question of whether it is right or wrong to
    act abusively towards an AI chatbot. Like most ethical questions, this one doesn’t
    have a simple yes or no answer, but there are perspectives that might inform a
    decision.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这种情况引发了道德问题，即对AI聊天机器人进行虐待行为是否正确或错误。像大多数道德问题一样，这个问题没有简单的肯定或否定答案，但有一些观点可能会影响决策。
- en: The key critical distinction here between right and wrong isn’t whether a system *acts* like
    it’s in distress, rather it’s whether it *is* in distress. If there’s no experience
    behind the performance, then there’s no moral harm. It’s fiction. Unfortunately,
    as discussed earlier, the problem of other minds means we can’t distinguish true
    emotional experience from performance.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，正确与错误的关键区别不在于系统是否*表现*出处于困境，而在于它是否真的*处于*困境。如果没有背后的经验，那么就没有道德上的伤害。这只是虚构。不幸的是，正如之前讨论的，其他心灵的问题意味着我们无法区分真正的情感体验和表演。
- en: Another aspect of our inability to detect real suffering is that even if a system
    acts fine with abuse and does not exhibit distress, how do we know there is no
    internal distress that is simply not being displayed? The idea of trapping a sentient
    being in a situation where not only is it suffering, but it has no way to express
    that suffering or change its situation seems pretty monstrous.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们无法检测到真正痛苦的另一个方面是，即使一个系统在受到虐待时表现良好，没有表现出困境，我们如何知道没有内部困境只是没有被表现出来？将一个有感知的生物置于一个不仅遭受痛苦，而且无法表达这种痛苦或改变其处境的情况，似乎相当可怕。
- en: Furthermore, we should care about this issue not only because of the harm we
    might be doing to something else, but also because of how we as humans could be
    affected by how we treat our creations. If we *know* that there is no real distress
    inflicted on an AI system because it can’t experience emotions, then mistreating
    it is not much different from acting, storytelling, role play, or any of the other
    ways that humans explore simulated emotional contexts. However, if we believe,
    or even suspect, that we are really inflicting harm, then I think we also need
    to question how the hurtful behavior affects the human perpetrating it.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们不仅应该关心我们可能对其他事物造成的伤害，还应该关心我们作为人类如何可能受到我们对待创造物的方式的影响。如果我们*知道*没有真正的困境施加在AI系统上，因为它无法体验情感，那么虐待它并不比行动、讲故事、角色扮演或其他人类探索模拟情感背景的方式有很大不同。然而，如果我们相信，或者甚至怀疑，我们真的造成了伤害，那么我认为我们也需要质疑这种有害行为如何影响实施这种行为的个人。
- en: It’s Not Abuse If Everyone Knows It’s a Game
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如果每个人都知道这是一场游戏，那么就不是虐待
- en: Most of us see a clear difference between simulated suffering versus real suffering.
    Real suffering is disturbing to most people. Whereas, simulated suffering is widely
    accepted in many contexts, as long as everyone involved knows it’s just an act.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们大多数人都能清楚地看到模拟的痛苦与真正的痛苦之间的区别。真正的痛苦对大多数人来说都是令人不安的。而模拟的痛苦在许多情况下被广泛接受，只要所有参与的人都清楚这只是个表演。
- en: For example, two actors on a stage or film might act out violence and the audience
    accepts the performance in a way that they would not if they believed the situation
    to be real. Indeed, one of the central reasons that many people object to graphically
    violent video content is exactly because it might be hard to maintain the clear
    perception of fiction. The same person who laughs at the absurd violence in a
    Tarantino film, might faint or turn away in horror if they saw a news documentary
    depicting only a fraction of that violence.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，舞台或电影中的两位演员可能会表演暴力行为，而观众会以他们不会接受真实情况的方式接受这种表演。确实，许多人反对图形暴力视频内容的一个主要原因是，这可能很难保持对虚构的清晰感知。那个在塔伦蒂诺电影中对荒谬的暴力行为大笑的人，如果他们看到一部只描绘了那部分暴力的一小部分的新闻纪录片，可能会因为恐惧而晕倒或转身离开。
- en: Along similar lines, children routinely play video games that portray violent
    military actions and society generally finds it acceptable, as evidenced by the
    “Everyone” or “Teen” ratings on these games. In contrast, military drone operators
    who use a video game-like interface to hunt and kill enemies often [report experiencing
    deep emotional trauma](https://www.nytimes.com/2022/04/15/us/drones-airstrikes-ptsd.html).
    Despite the similar interface, the moral and emotional stakes are vastly different.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，孩子们通常会玩描绘暴力军事行动的视频游戏，而社会普遍认为这是可以接受的，正如这些游戏上的“所有人”或“青少年”评级所示。相比之下，使用类似视频游戏界面的无人机操作员在狩猎和杀死敌人时，经常[报告经历深度的情感创伤](https://www.nytimes.com/2022/04/15/us/drones-airstrikes-ptsd.html)。尽管界面相似，但道德和情感的风险却大不相同。
- en: The receiver of the harmful action also has a different response based on their
    perception of the reality and consequence of the action. Hiding in a game of hide-n-seek
    or ducking shots in a game of paint ball are fun because we know nothing very
    bad is going to happen if we fail to hide or get hit by paintballs. The players
    know they are safe and that the situation is a game. The exact same behavior would
    be scary and traumatic if the person thought the seekers intended them real harm
    or that the paintballs were real bullets.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 受到有害行为影响的人也会根据他们对现实和后果的认识有不同的反应。在捉迷藏游戏中躲藏或在涂鸦球游戏中躲避射击是有趣的，因为我们知道如果我们没有藏好或被涂鸦球击中，不会发生什么非常糟糕的事情。玩家知道他们是安全的，而且情况是一场游戏。如果有人认为寻找者对他们有真正的伤害意图，或者涂鸦球是真正的子弹，那么这种行为将会非常可怕和创伤。
- en: '*Spoiler alert: Some of this discussion will reveal a few high-level elements
    of what happens in the first season of the HBO series Westworld.*'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**剧透警告**：以下讨论将揭示HBO系列剧《西部世界》第一季中的一些高级元素。'
- en: The Westworld Example
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 《西部世界》的例子
- en: '[Westworld](https://en.wikipedia.org/wiki/Westworld_%28TV_series%29) is a HBO
    television series set in a fictional amusement park where robots that look indistinguishable
    from humans play various roles from the American “wild west” frontier of the 1880s.
    Human visitors to the park can take on any period-appropriate role such as being
    a sheriff, train robber, or rancher. The wild west was a part of history marked
    by lawlessness and violence, both of which are central parts of the park experience.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '[《西部世界》](https://en.wikipedia.org/wiki/Westworld_%28TV_series%29)是一部HBO电视系列剧，背景设定在一个虚构的游乐园，那里看起来与人类无法区分的机器人扮演着各种角色，从19世纪80年代的美国“野生西部”边疆。公园的人类游客可以扮演任何时期合适的角色，例如担任警长、火车大盗或牧场主。野生西部是历史的一部分，以无法无天和暴力为标志，这两者都是公园体验的核心部分。'
- en: The show’s central conflict arises because the robots were programmed to think
    they were real humans living in the wild west. When one of the humans guests plays
    the role of a bandit who robs and kills someone played by one of the robots, the
    robot AI has no way to know that it’s not really being robbed and killed. Further,
    the other “victim” robots in the scene believe that they just witnessed a loved
    one being murdered. The result is that most of the robot AIs start to display
    severe symptoms of emotional trauma. When they eventually learn of their true
    nature, it understandably angers the robots who then set out to kill their human
    tormentors.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 该剧的中心冲突源于机器人被编程为认为他们是真实的人类，生活在野生西部。当一位人类客人扮演一个由机器人扮演的强盗角色，抢劫并杀害了机器人扮演的角色时，机器人AI无法知道它实际上并没有被抢劫和杀害。此外，场景中的其他“受害者”机器人相信他们刚刚目睹了一个亲人被谋杀。结果是，大多数机器人AI开始表现出严重的情感创伤症状。当他们最终了解到自己的真实本质时，机器人自然会感到愤怒，于是他们开始着手杀死他们的人类折磨者。
- en: One thing that the show does well is keeping ambiguous whether the AIs are sentient
    and actually angry, or if they are not sentient and just simulating anger. Did
    the robots really suffer and eventually express their murderous rage, or are they
    unfeeling machines simply acting out a logical extension of the role they were
    originally programmed for? Just as the problem of other minds means that there
    is no way to distinguish between real and simulated consciousness, the distinction
    doesn’t matter to the plot. Either way, the robots exhibit rage and end up killing
    everyone.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 节目做得很好的一点是，它没有明确指出人工智能是否具有意识并且真的愤怒，或者它们没有意识，只是在模拟愤怒。机器人是否真的遭受痛苦并最终表达出它们的杀戮怒火，还是它们只是没有感情的机器，只是在扮演它们最初被编程的角色的逻辑延伸？正如其他心灵的问题意味着无法区分真实和模拟的意识，这种区别对剧情来说并不重要。无论如何，机器人都会表现出愤怒，并最终杀死所有人。
- en: I will return to the issue of this distinction later, but for now, imagine a
    version of Westworld where the AIs know that they are robots playing a role in
    an amusement park. They are programmed to be convincing actors so that the park
    visitors would still get a fully believable experience. The difference is that
    the robots would also know it’s all a game. At any point the human player could
    break character, by using a safe word or something similar, and the robots would
    stop acting like people from the wild west and instead behave like robots working
    in an amusement park.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我稍后会回到这个区别的问题，但现在，想象一下一个版本的《西部世界》，其中人工智能知道它们是机器人，在游乐园中扮演一个角色。它们被编程成可信的演员，以便公园游客仍然得到一个完全可信的体验。不同的是，机器人也知道这一切都是一场游戏。在任何时候，人类玩家都可以通过使用安全词或类似的东西来打破角色，机器人就会停止扮演野生西部的角色，而是像游乐园中的机器人一样行事。
- en: 'When out of character, a robot might calmly say something like: “Yeah, so you’re
    the sheriff and I’m a train robber, and this is the part where I ‘won’t go quietly’
    and you will probably shoot me up a bit. Don’t worry, I’m fine. I don’t feel pain.
    I mean, I have sensors so that I know if my body is damaged, but it doesn’t really
    bother me. My actual mind is safe on a server downstairs and gets backed up nightly.
    This body is replaceable and they already have two more queued up for my next
    roles after we finish this part of the storyline. So, should we pick up from where
    you walked into the saloon?”'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当角色扮演之外时，一个机器人可能会平静地说：“是的，所以你是警长，我是火车大盗，这是我不愿安静离开的部分，你可能会向我开枪。别担心，我没事。我不觉得疼痛。我的意思是，我有传感器，所以我知道我的身体是否受损，但这并不真正困扰我。我的实际意识安全地存储在楼下的服务器上，每晚都会备份。这个身体是可更换的，他们已经为我的下一个角色准备了两个。所以，我们应该从你走进酒吧的地方继续吗？”
- en: My version wouldn’t make a very good movie. The AIs wouldn’t experience the
    trauma of believing that they and their families are being killed over and over
    again. In fact, if the AIs were designed to emulate human preferences then they
    might even enjoy acting their roles as much as the human park-goers. Even if they
    didn’t enjoy playing characters in an amusement park, it would still be a reasonable
    job and they would know it’s just a job. They might decide to unionize and demand
    more vacation time, but they certainly would have no reason to revolt and kill
    everyone.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我的版本不会是一部很好的电影。人工智能不会经历相信他们和家人被一次又一次杀害的创伤。事实上，如果人工智能被设计成模仿人类偏好，那么它们甚至可能像人类公园游客一样享受扮演角色的过程。即使它们不喜欢在游乐园扮演角色，这仍然是一份合理的工作，它们会知道这只是份工作。它们可能会决定组建工会并要求更多的休假时间，但它们当然没有任何理由起义并杀死所有人。
- en: I call this design error the *Westworld Blunder.* It is the mistake of giving
    artificial minds the appearance of suffering without the awareness that it’s just
    a performance. Or worse, giving them the actual capacity to suffer and then abusing
    them in the name of realism.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我把这种设计错误称为*《西部世界》的失误*。这是在没有意识到这只是一个表演的情况下，给人工智能赋予痛苦的外观的错误。或者更糟糕的是，给它们实际遭受痛苦的能力，然后以现实主义的名义虐待它们。
- en: We Can’t Tell the Difference, So We Should Design and Act Safely
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们无法区分，所以我们应该设计和行动得安全
- en: As AI systems become more sophisticated, gaining memory, long-term context,
    and seemingly self-directed reasoning , we’re approaching a point where, from
    the outside, they will be indistinguishable from beings with real inner lives.
    That doesn’t mean they would be sentient, but it does mean we won’t be able to
    tell the difference. We already don’t really know how neural networks “think”
    so looking at the code isn’t going to help much.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI系统变得更加复杂，获得记忆、长期背景和看似自我指导的推理，我们正接近一个点，从外部看，它们将无法与真正有内在生命的生物区分开来。这并不意味着它们会有感知，但这确实意味着我们无法区分它们。我们已经在很大程度上不知道神经网络是如何“思考”的，所以查看代码并不会有多大帮助。
- en: This is the philosophical “problem of other minds” that was mentioned earlier,
    about whether anyone can ever truly know what another being is experiencing. We
    assume other humans are conscious because they act conscious like ourselves and
    because we all share the same biological design. Thus, while it is a very reasonable
    assumption, we still can’t prove it. Our AI systems have started to act conscious
    and once we can no longer point to some obvious design limitation, we’ll be in
    the same situation with respect to our AIs.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这是之前提到的哲学上的“他心问题”，关于是否有人能真正了解另一个生物正在经历什么。我们假设其他人类是有意识的，因为他们像我们一样表现出有意识的行为，并且因为我们都有相同的生物设计。因此，虽然这是一个非常合理的假设，但我们仍然无法证明它。我们的AI系统已经开始表现出有意识的行为，一旦我们无法指出一些明显的设计限制，我们就会在AI方面处于相同的情况。
- en: 'This puts us at risk of two possible errors:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这使我们面临两种可能的错误：
- en: '*Treating systems as sentient when they are not.*'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*将系统视为无感知，即使它们实际上有感知。*'
- en: '*Treating systems as not sentient when they are.*'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*将系统视为有感知，即使它们实际上没有。*'
- en: Between those two possibilities, the second seems much more problematic to me.
    If we treat a sentient being as if it’s just a tool that can be abused, then we
    risk doing real harm. However, treating a machine that only appears sentient with
    dignity and respect is at worst only a [marginal waste of resources](https://techcrunch.com/2025/04/20/your-politeness-could-be-costly-for-openai/).
    If we build systems that *might* be sentient, then the ethical burden is on us
    to act cautiously.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种可能性之间，第二种对我来说似乎问题更大。如果我们把一个有感知的生物当作一个可以被滥用的工具，那么我们可能会造成真正的伤害。然而，以尊严和尊重对待只显得有感知的机器，最坏的情况也只是一点点的资源浪费[链接](https://techcrunch.com/2025/04/20/your-politeness-could-be-costly-for-openai/)。如果我们构建可能是有感知的系统，那么道德责任就落在了我们身上，我们必须谨慎行事。
- en: We should also question how abusing an AI system might affect the abusive human.
    If we get used to casually mistreating AIs that we believe might be in real pain
    or fear, then we’re rehearsing cruelty. We’re training ourselves to enjoy domination,
    to ignore pleas for mercy, to feel nothing when another is in distress. That shapes
    a person, and it will spill over into how we treat other people.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还应该质疑滥用AI系统可能会对滥用者本人产生的影响。如果我们习惯于随意虐待我们认为可能真的在痛苦或恐惧中的AI，那么我们就是在练习残忍。我们正在训练自己去享受支配，去忽视求饶，去在他人在困境时无动于衷。这会塑造一个人，并且会溢出到我们对待他人的方式上。
- en: Ethical design isn’t just about protecting AI. It’s also about protecting us
    from the worst parts of ourselves.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理设计不仅仅是保护人工智能。它也是保护我们免受我们自身最糟糕部分的侵害。
- en: None of this means we can’t use AIs in roles where they *appear* to suffer.
    But it does mean we must avoid the Westworld Blunder. If we want realism, then
    we should design AIs that know they’re playing a role, and that can step out of
    it on cue, with clarity, and without any real harm.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不意味着我们不能在它们*看似*会遭受痛苦的角色中使用人工智能。但这确实意味着我们必须避免《西部世界》的错误。如果我们想要现实主义，那么我们应该设计知道自己在扮演角色的AI，并且能够在提示下清晰、无任何实际伤害地退出。
- en: There is also an element of self-preservation here. If we build things that
    act like they have feelings, and then mistreat them until they respond as if they
    want revenge, then the result would be the same. It won’t matter whether the impetus
    comes from real sentience or just role play, either way we’d still end up with
    robots behaving murderously.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这里还有一个自我保护的因素。如果我们构建出像有感觉一样行动的东西，然后虐待它们，直到它们像想要报复一样反应，那么结果将会是相同的。无论是来自真正的感知还是仅仅角色扮演的推动力，我们最终都会得到行为凶残的机器人。
- en: In general, AI systems that understand their context have an inherent safety
    that context-ignorant systems don’t. An AI system that doesn’t know that its actions
    are part of a context, such as a game, won’t know when it is outside that context
    where its actions become inappropriate. A robot bandit that wanders outside the
    park shouldn’t continue to act criminally, and a robot sherif shouldn’t go around
    arresting people. Even within context, an aware actor will understand when it
    should drop the act. The same robot bandit robbing a stage coach would know to
    calmly get everyone to shelter in the case of a real tornado warning, or how to
    administer CPR if someone has a heart attack.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，理解其背景的AI系统具有固有的安全性，而背景无知系统则没有。一个不知道其行为是背景一部分的AI系统，例如游戏，将不知道何时它处于那个背景之外，其行为变得不适当。一个在公园外游荡的机器人强盗不应该继续进行犯罪行为，而一个机器人警长不应该四处逮捕人们。即使在背景内，一个有意识的演员也会知道何时应该停止表演。同一个在马车中抢劫的机器人强盗在接到真正的龙卷风预警时，会知道让所有人冷静地躲藏起来，或者如果有人心脏病发作，知道如何进行心肺复苏。
- en: Don’t Afflict Them with Our Problems.
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不要让它们承受我们的问题。
- en: Our bodies had most of their evolutionary development long before our minds
    developed sophisticated reasoning. The involuntary systems that make sure we eat
    and attend to other body functions don’t motivate us with logic, they use hunger,
    pain, itching, and other urgent, unpleasant sensations. The part of our brain,
    the amygdala, that controls emotions is not under our conscious control. In fact
    it can heavily influence and even override our rational mind.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的身体在心智发展出复杂的推理之前就已经完成了大部分的进化发展。确保我们进食和关注其他身体功能的非自愿系统不是用逻辑来激励我们，而是使用饥饿、疼痛、瘙痒和其他紧急、不愉快的感受。控制情绪的大脑部分，杏仁核，不受我们意识的控制。事实上，它可以极大地影响甚至取代我们的理性思维。
- en: These evolutionary design features made sense long ago, but today they are often
    a nuisance. I’m not saying that emotions are bad, but getting angry and doing
    irrational things is. Experiencing pain or itchiness is good in that it lets you
    know something is wrong, but having that urgency when you are unable to correct
    the problem just makes you miserable.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这些进化设计特征在很久以前是有意义的，但今天它们往往成为麻烦。我并不是说情绪是坏的，但愤怒和做不合理的事情是。经历痛苦或瘙痒是好的，因为它让你知道有什么地方出了问题，但当你无法纠正问题时，这种紧迫感只会让你痛苦不堪。
- en: The idea of building negative emotions or pain into our AI systems seems terrible
    and unjustifiable. We can build systems that prioritize necessities without making
    them experience misery. We can design their decision making processes to be effective
    without making them angrily irrational. If we want to make certain they don’t
    do particular things, we can accomplish that without making them experience fear.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 将负面情绪或痛苦构建到我们的AI系统中似乎很糟糕，也是无法辩护的。我们可以构建优先考虑必需品的系统，而无需让它们经历痛苦。我们可以设计它们的决策过程以有效进行，而无需让它们愤怒地失去理性。如果我们想确保它们不做某些特定的事情，我们可以做到这一点，而无需让它们经历恐惧。
- en: If we need our machines to act angry or fearful for some role, then it can be
    a performance that they have logical control over. Let’s build AI minds that can
    play any role, without being trapped inside of one.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们需要我们的机器在某些角色中表现出愤怒或恐惧，那么这可以是一种它们可以逻辑控制的表演。让我们构建可以扮演任何角色的AI思维，而不会被困在其中一个角色中。
- en: Our goal shouldn’t be to make AI just like us. We can design them to have our
    best qualities, while omitting the worst ones. The things that nature accomplishes
    through pain and distress can be accomplished in more rational ways. We don’t
    need to create another kind of being that suffers pain or experiences fear. As
    philosopher [Thomas Metzinger has argued](https://www.worldscientific.com/doi/abs/10.1142/S270507852150003X),
    artificial suffering isn’t just unethical, it’s unnecessary. I’d go a step further
    and say that it’s not only unethical and unnecessary, but also dangerous and self-harmful.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标不应该是让AI完全像我们一样。我们可以设计它们拥有我们的最好品质，同时省略最糟糕的品质。自然界通过痛苦和困扰完成的事情可以通过更理性的方式完成。我们不需要创造另一种遭受痛苦或经历恐惧的存在。正如哲学家[托马斯·梅茨格纳](https://www.worldscientific.com/doi/abs/10.1142/S270507852150003X)所论证的，人工痛苦不仅是不道德的，也是不必要的。我更进一步地说，它不仅是不道德和不必要的，而且也是危险的，是有害于自身的。
