- en: Is Your Training Data Representative? A Guide to Checking with PSI in Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 您的训练数据是否具有代表性？使用Python中的PSI进行检验的指南
- en: 原文：[https://towardsdatascience.com/assessment-of-representativeness-between-two-populations-to-ensure-valid-performance-2/](https://towardsdatascience.com/assessment-of-representativeness-between-two-populations-to-ensure-valid-performance-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/assessment-of-representativeness-between-two-populations-to-ensure-valid-performance-2/](https://towardsdatascience.com/assessment-of-representativeness-between-two-populations-to-ensure-valid-performance-2/)
- en: To get the most out of this tutorial, you should have a solid understanding
    of how to compare two distributions. If you don’t, I recommend checking out this
    excellent article by [@matteo-courthoud](https://towardsdatascience.com/how-to-compare-two-or-more-distributions-9b06ee4d30bf/).
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为了充分利用本教程，你应该对如何比较两个分布有一个扎实的理解。如果你不熟悉，我建议阅读这篇优秀的文章[@matteo-courthoud](https://towardsdatascience.com/how-to-compare-two-or-more-distributions-9b06ee4d30bf/)。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We automated the analysis and exported the results to an Excel file using Python.
    If you already know the basics of Python and how to write to Excel, that will
    make things even easier.
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们使用Python自动化了分析，并将结果导出到Excel文件中。如果你已经掌握了Python的基础知识以及如何写入Excel，那么事情会变得更加简单。
- en: ''
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I would like to thank everyone who took the time to read and engage with my
    article. Your support and feedback mean a lot.
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我想感谢所有花时间阅读和与我互动文章的人。你们的支持和反馈意义重大。
- en: <mdspan datatext="el1757446006434" class="mdspan-comment">In modeling projects</mdspan>,
    whether academic or professional, the question of data representativeness between
    two samples arises frequently.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在**建模项目**中，无论是学术还是专业，两个样本之间的数据代表性问题经常出现。
- en: By representativeness, we mean the degree to which two samples resemble each
    other or share the same characteristics. This concept is essential, as it directly
    determines the accuracy of statistical conclusions or the performance of a predictive
    model.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 通过代表性，我们指的是两个样本彼此相似或共享相同特征的程度。这个概念至关重要，因为它直接决定了统计结论的准确性或预测模型的性能。
- en: 'At each stage of a model’s life cycle, the issue of data representativeness
    takes specific forms :'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型的每个生命周期阶段，数据代表性问题都呈现出特定的形式：
- en: 'During **the construction phase**: this is where it all begins. You gather
    the data, clean it, split it into training, test, and out-of-time samples, estimate
    the parameters, and carefully document every decision. You ensure that the test
    and the out-of-time samples are representative of the training data.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**构建阶段**：一切从这里开始。你收集数据，清理它，将其分为训练、测试和超时样本，估计参数，并仔细记录每个决策。你确保测试和超时样本代表训练数据。
- en: 'In **The application phase**: once the model is built, it must be confronted
    with reality. And here a crucial question arises: do the new datasets truly resemble
    the ones used during construction? If not, much of the previous work may quickly
    lose its value.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**应用阶段**：一旦模型构建完成，就必须将其与现实世界进行对比。这里出现了一个关键问题：新的数据集是否真正类似于构建过程中使用的那些？如果不是，之前的大部分工作可能会迅速失去其价值。
- en: 'In **the monitoring phase, or backtesting**: over time, populations evolve.
    The model must therefore be regularly challenged. Do its predictions remain valid?
    Is the representativeness of the target portfolio still ensured?'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**监控阶段或回测中**：随着时间的推移，群体会发生变化。因此，模型必须定期接受挑战。它的预测是否仍然有效？目标投资组合的代表性是否仍然得到保证？
- en: Representativeness is therefore not a one-off constraint, but an issue that
    accompanies the model throughout its development.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，代表性不是一个一次性约束，而是一个伴随模型整个开发过程的问题。
- en: To answer the question of representativeness between two samples, the most common
    approach is to compare their distributions, proportions, and structures. This
    involves the use of visual tools like density functions, histograms, boxplots,
    supplemented by statistical tests such as the Student’s t-test, the Kruskal-Wallis
    test, the Wilcoxon test, or the Kolmogorov-Smirnov test. On this subject, [@matteo-courthoud](https://towardsdatascience.com/how-to-compare-two-or-more-distributions-9b06ee4d30bf/)
    has published a great article, complete with practical codes, to which we refer
    the reader for further information.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答两个样本之间代表性的问题，最常见的方法是比较它们的分布、比例和结构。这涉及到使用密度函数、直方图、箱线图等视觉工具，并辅以如学生t检验、Kruskal-Wallis检验、Wilcoxon检验或Kolmogorov-Smirnov检验等统计测试。关于这个问题，[@matteo-courthoud](https://towardsdatascience.com/how-to-compare-two-or-more-distributions-9b06ee4d30bf/)发表了一篇优秀的文章，其中包含了实用的代码，我们建议读者进一步了解。
- en: 'In this article, we will focus on two practical tools often used in credit
    risk management to check whether two datasets are comparable:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将关注在信用风险管理中经常使用的两个实用工具，以检查两个数据集是否可比：
- en: The **Population Stability Index (PSI)** shows how much a distribution shifts,
    either over time or between two samples.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人口稳定性指数（PSI**）显示了分布随时间或两个样本之间的移动程度。'
- en: '**Cramér’s V** measures the strength of association between categories, helping
    us see if two populations share a similar structure.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Cramér的V**衡量了类别之间的关联强度，帮助我们了解两个群体是否具有相似的结构。'
- en: We will then explore how these tools can help engineers and decision-makers
    by transforming statistical comparisons into clear data for faster and more reliable
    decisions.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将探讨这些工具如何通过将统计比较转化为清晰的数据来帮助工程师和决策者，从而更快、更可靠地做出决策。
- en: In Section 1 of this article, we present two concrete examples where questions
    of representativeness between samples may arise. In Section 2, we evaluate representativeness
    between two datasets using PSI and Cramér’s V. Finally, in Section 3, we demonstrate
    how to implement and automate these analyses in Python, exporting the results
    into an Excel file.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文的第1节中，我们提出了两个具体的例子，其中样本之间的代表性问题可能出现。在第2节中，我们使用PSI和Cramér的V评估两个数据集之间的代表性。最后，在第3节中，我们展示了如何在Python中实现和自动化这些分析，并将结果导出到Excel文件中。
- en: 1\. Two real-world examples of the representativeness challenge
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 两个代表性挑战的真实世界例子
- en: 'The issue of representativeness becomes important when a model is applied to
    a domain other than the one for which it was developed. Two typical situations
    illustrate this challenge:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当模型应用于其开发之外的其他领域时，代表性问题变得重要。两个典型的情况说明了这一挑战：
- en: 1.1 When a model is applied to a **new scope** of clients
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1 当模型应用于**新范围**的客户时
- en: Imagine a bank developing a scoring model for small businesses. The model performs
    well and is recognized internally. Encouraged by this success, the leadership
    decides to extend its use to large corporations. Your manager asks for your opinion
    on the approach. What steps do you take before responding?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一家银行为小型企业开发评分模型。该模型表现良好，并在内部得到认可。受到这一成功的鼓舞，管理层决定将其扩展到大型企业。你的经理要求你对此方法提出意见。在回答之前，你将采取哪些步骤？
- en: Since the development and application populations differ, using the model on
    the new population extends its scope. It is therefore crucial to confirm that
    this application is valid.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 由于开发和应用的人口不同，在新的人口中使用模型扩展了其范围。因此，确认这种应用的有效性至关重要。
- en: The statistician has several tools to address this question, in particular **representativeness**
    **analysis** comparing the development population with the application population.
    This can be done by examining their characteristics **variable by variable**,
    for example through tests of mean equality, tests of distribution equality, or
    by comparing the distribution of categorical variables.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 统计学家有几个工具可以解决这个问题，特别是比较开发群体与应用群体的**代表性分析**。这可以通过检查它们的特征**变量变量**来完成，例如通过均值相等性测试、分布相等性测试，或者通过比较分类变量的分布。
- en: 1.2 When two banks **merge** and need to align their risk models
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.2 当两家银行**合并**并需要对其风险模型进行对齐时
- en: Now consider Bank A, a large institution with a substantial balance sheet and
    a proven model to assess client default risk. Bank A is studying the possibility
    of merging with Bank B. Bank B, however, operates in a weaker economic environment
    and has not developed its own internal model.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose Bank A’s management approaches you, as the statistician responsible
    for its internal models. The strategic question is: would it be appropriate to
    apply Bank A’s internal models to Bank B’s portfolio in the event of a merger?'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Before applying Bank A’s internal model to Bank B’s portfolio, it is crucial
    to compare the distributions of key variables across both portfolios. The model
    can only be transferred with confidence if the two populations are truly representative
    of each other.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: 'We have just presented two concrete cases where verifying representativeness
    is essential for sound decision-making. In the next section, we address how to
    analyze representativeness between two portfolios by introducing two statistical
    tools: the Population Stability Index (PSI) and Cramér’s V.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Comparing Distributions to Assess Representativeness Between Two Populations
    Using the Population Stability Index (PSI) and V-Cramer.
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In practice, the study of representativeness between two datasets consists of
    comparing the characteristics of the observed variables in both samples. This
    comparison relies on both statistical measures and visual tools.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: From a statistical perspective, analysts often examine measures of central tendency
    (mean, median) and dispersion (variance, standard deviation), as well as more
    granular indicators such as quantiles.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: On the visual side, common tools include histograms, boxplots, cumulative distribution
    functions, density curves, and QQ-plots. These visualizations help detect potential
    differences in shape, location, or dispersion between two distributions.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: 'Such graphical analyses provide an essential first step: they guide the investigation
    and help formulate hypotheses. However, they must be complemented by statistical
    tests to confirm observations and reach rigorous conclusions. These tests include:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '**Parametric tests**, such as Student’s *t*-test (comparison of means),'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Nonparametric tests**, such as the Kolmogorov–Smirnov test (comparison of
    distributions), the chi-squared test (for categorical variables), and Welch’s
    test (for unequal variances).'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'These approaches are well presented in the article by [@matteo-courthoud](https://towardsdatascience.com/how-to-compare-two-or-more-distributions-9b06ee4d30bf/).
    Beyond them, two indicators are particularly relevant in credit risk analysis
    for assessing distributional drift between populations and supporting decision-making:
    the **Population Stability Index (PSI)** and **Cramér’s V**'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: 2.1\. The Population Stability Index (PSI)
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The PSI is a fundamental tool in the credit industry. It measures the difference
    between two distributions of the same variable:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: for example, between the training dataset and a more recent application dataset,
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: or between a reference dataset at time T[0] and another at time T[1].
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In other words, the **PSI quantifies how much a population has drifted over
    time or across different scopes**.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how it works in practice:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: For a **categorical variable**, we compute the proportion of observations in
    each category for both datasets.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For a **continuous variable**, we first **discretize it into bins**. In practice,
    deciles are often used to obtain a balanced distribution.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The PSI then compares, bin by bin, the proportions observed in the reference
    dataset versus the target dataset. The final indicator aggregates these differences
    using a logarithmic formula:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/25bf551f566bbaf7304969ff1b71f81b.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
- en: 'Here, *pᵢ* and *qᵢ* represent the proportions in bin *i* for the reference
    dataset and the target dataset, respectively. The PSI can be computed easily in
    an Excel file:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8a709995d6361c07db433b3059a7e219.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
- en: '**Computation Framework for the Population Stability Index (PSI).**'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: 'The interpretation is highly intuitive:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: A smaller PSI means the two distributions are closer.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A PSI of **0** means the distributions are identical.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A very large PSI (tending toward infinity) means the two distributions are fundamentally
    different.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In practice, industry guidelines often use the following thresholds:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '**PSI < 0.1**: the population is stable,'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**0.1 ≤ PSI < 0.25**: the shift is noticeable—monitor closely,'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PSI ≥ 0.25**: the shift is significant—the model may no longer be reliable.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2.2\. Cramér’s V
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When assessing the representativeness of a categorical variable (or a discretized
    continuous variable) between two datasets, a natural starting point is the **Chi-square
    test of independence**.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: 'We build a contingency table crossing:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: the categories (modalities) of the variable of interest, and
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: an indicator variable for dataset membership (Dataset 1 / Dataset 2).
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The test is based on the following statistic:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8a2f78194794eea2676ecbe961bb1bfa.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
- en: where O[ij] are the observed counts and E[ij] are the expected counts under
    the assumption of independence.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '**Null hypothesis H[0]**: the variable has the same distribution in both datasets
    (independence).'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Alternative hypothesis H[1] **: the distributions differ.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If **H[0]** is rejected, we conclude that the variable does not follow the same
    distribution across the two datasets.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: 'However, the Chi-square test has a major limitation: it only provides a binary
    answer (reject / do not reject), and its power is highly sensitive to sample size.
    With very large datasets, even tiny differences can appear statistically significant.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: 'To address this limitation, we use **Cramér’s V**, which rescales the Chi-square
    statistic to produce a normalized measure of association bounded between 0 and
    1:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/678a73597ebcba4fdc3853059348f14f.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
- en: where n is the total sample size, r is the number of rows, and c is the number
    of columns in the contingency table.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: 'The interpretation is intuitive:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: V≈0    ⇒ The distributions are very similar; representativeness is strong.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: V→1    ⇒ The difference between distributions is large; the datasets are structurally
    different.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unlike the Chi-square test, which simply answers “yes” or “no,” Cramér’s V provides
    a graded measure of the strength of the difference. This allows us to assess whether
    the difference is negligible, moderate, or substantial.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: We use the same thresholds as those applied for the PSI to draw our conclusions.
    **For the PSI and Cramér’s V indicators, if the distribution of one or more variables
    differs significantly between the two datasets, we conclude that they are not
    representative.**
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Measuring Representativeness with PSI and Cramér’s V in Python.
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In a [previous article](https://towardsdatascience.com/model-selection-in-linear-regression/),
    we applied different variable selection methods to reduce the *Communities & Crime* dataset
    to just **16 explanatory variables**. This step was essential to simplify the
    model while keeping the most relevant information.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: 'This dataset also includes a variable called **fold**, which splits the data
    into **10 subsamples**. These folds are commonly used in cross-validation: they
    allow us to test the robustness of a model by training it on one part of the data
    and validating it on another. For cross-validation to be reliable, each fold should
    be representative of the global dataset:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '**To ensure valid performance estimates**.'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**To prevent bias**: a non-representative fold can distort model results'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**To support generalization**: representative folds provide a better indication
    of how the model will perform on new data.'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In this example, we will focus on checking whether fold 1 is representative
    of the global dataset using our two indicators: **PSI** and **Cramer’s V** by
    comparing the distribution of 16 variables across the two samples. We will proceed
    in two steps:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Start with the Target Variable'
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We begin with the **target variable**. The idea is simple: compare its distribution
    between fold 1 and the entire dataset. To quantify this difference, we’ll use
    two complementary indicators:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: the **Population Stability Index (PSI)**, which measures distributional shifts,
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cramér’s V**, which measures the strength of association between two categorical
    variables.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 2: Automating the Analysis for All Variables'
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After illustrating the approach with the target, we extend it to all features.
    We’ll build a **Python function** that computes PSI and Cramér’s V for each of
    the **16 explanatory variables**, as well as for the target variable.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: 'To make the results easy to interpret, we’ll export everything into an **Excel
    file** with:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: one **sheet per variable**, showing the detailed comparison by segment,
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: a **Summary tab**, aggregating results across all variables.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3.1 Comparing the target variable `ViolentCrimesPerPop` between the global dataset
    (reference) and fold 1 (target)
  id: totrans-96
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Before applying statistical tests or building decision indicators, it is essential
    to conduct a descriptive and graphical analysis. There are not just formalities;
    they provide an early intuition about the differences between populations and
    help interpreting the results. In practice, a well-chosen chart often reveals
    the conclusions that indicators like PSI or Cramér’s V will later confirm (or
    challenge).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: 'For visualization, we proceed in three steps:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: '**1\. Comparing continuous distributions** We begin with graphical tools such
    as boxplots, cumulative distribution functions, and probability density plots.
    These visualizations provide an intuitive way to examine differences in the target
    variable’s distribution between the two datasets.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: '**2\. Discretization into quantiles** Next, we discretize the variable in the
    reference dataset using quartiles (Q1, Q2, Q3, Q4), which creates five classes
    (Q1 through Q5). We then apply the exact same cut-off points to the target dataset,
    ensuring that each observation is mapped to intervals defined from the reference.
    This guarantees comparability between the two distributions.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. Comparing categorical distributions** Finally, once the variable has
    been discretized, we can use visualization methods suited for categorical data
    — such as bar charts — to compare how frequencies are distributed across the two
    datasets.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: 'The process depends on the type of variable:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: '**For a continuous variable:**'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: Start with standard visualizations (boxplots, cumulative distributions, and
    density plots).
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Next, split the variable into segments (Q1 to Q5) based on the reference dataset’s
    quantiles.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, treat these segments as categories and compare their distributions.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**For a categorical variable:**'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: No discretization is needed — it’s already in categorical form.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Go straight to comparing category distributions, for example with a bar chart.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The code below prepares the two datasets we want to compare and then visualizes
    the target variable with a boxplot, showing its distribution in both the global
    dataset and in fold 1.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![](../Images/1a94c8c4b5eec6e047bbed825ca332e7.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
- en: The figure above suggests that both groups share similar distributions for the `ViolentCrimesPerPop` variable.
    To take a closer look, we can use Kernel Density Estimation (KDE) plots, which
    provide a smooth view of the underlying distribution and make it easier to spot
    subtle differences.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/aafc97b934d3c8b5c697ef30f170073d.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
- en: The KDE graph confirms that the two distributions are very similar, showing
    a high degree of overlap. The Kolmogorov-Smirnov (KS) statistical test of 0.976
    also indicates that there is no significant difference between the two groups.
    To extend the analysis, we can now examine the cumulative distribution of the
    target variable.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/1e2e3b1c3c29536a4f4425db8e5d9465.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
- en: The cumulative distribution plot provides additional evidence that the two groups
    are very similar. The curves overlap almost completely, suggesting that their
    distributions are nearly identical in both central tendency and spread.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: As a next step, we’ll discretize the variable into quantiles in the reference
    dataset and then apply the same cut-off points to the target dataset (fold 1).
    The code below demonstrates how to do this. Finally, we’ll compare the resulting
    distributions using a bar chart.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/fd5cf488712221f75f8583ff7bba38e3.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
- en: 'As before, we reach the same conclusion: the distributions in the reference
    and target datasets are very similar. To move beyond visual inspection, we will
    now compute the Population Stability Index (PSI) and Cramér’s V statistic. These
    metrics allow us to quantify the differences between distributions; both for all
    variables in general and for the target variable ViolentCrimesPerPop in particular.'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: ''
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 3.2 Automating the Analysis for All Variables
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: As mentioned earlier, the results of the distribution comparisons for each variable
    between the two datasets, calculated using PSI and Cramér’s V, are presented in
    separate sheets within a single Excel file.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate, we begin by examining the results for the target variable *ViolentCrimesPerPop*
    when comparing the global dataset (reference) with fold 1 (target). The table
    1 below summarizes how both PSI and Cramér’s V are computed.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/afa1f6660a600d228239efbff6ce0f78.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
- en: '**Table 1: PSI and Cramér’s V for *ViolentCrimesPerPop*: Global Dataset (Reference)
    vs. Fold 1** (target)'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Since both PSI and Cramér’s V are below 0.1, we can conclude that the target
    variable *ViolentCrimesPerPop* follows the same distribution in both datasets.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: The code that generated this table is shown below. The same code can also be
    used to produce results for all variables and export them into an Excel file called
    **representativity.xlsx**.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: inally, Table 2 shows the last sheet of the file, titled *Summary*, which brings
    together the results for all variables of interest.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/90a8d27ee29f388eed1cb5b03943f72d.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
- en: '**PSI and Cramér’s V summary for *all variable*s: Global Dataset vs. Fold 1**'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: This synthesis provides an overall view of representativeness between the two
    datasets, making interpretation and decision-making much easier. Since both PSI
    and Cramér’s V are below 0.1, we can conclude that all variables follow the same
    distribution in the global dataset and in fold 1\. Therefore, fold 1 can be considered
    representative of the global dataset.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this post, we explored how to study representativeness between two datasets
    by comparing the distributions of their variables. We introduced two key indicators
    **Population** **stability** **index**(**PSI)** and **Cramér’s V**, that are both
    easy to use, easy to interpret, and highly valuable for decision-making.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: We also showed how these analyses can be automated, with results saved directly
    into an Excel file.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还展示了如何自动化这些分析，并将结果直接保存到Excel文件中。
- en: 'The main takeaway is this: if you build a model and end up with **overfitting**,
    one possible reason may be that your training and test sets are not representative
    of each other. A simple way to prevent this is to always run a representativity
    analysis between datasets. Variables that show representativity issues can then
    guide you in stratifying your data when splitting it into training and test sets.
    What about you? In what situations do you study representativeness between two
    data sets, for what reasons, and using what methods?'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 主要的收获是：如果你构建了一个模型并且最终出现了**过拟合**，可能的原因之一是你的训练集和测试集并不具有代表性。一个简单的预防方法是始终在数据集之间运行代表性分析。那些显示出代表性问题的变量可以在你将数据分割为训练集和测试集时指导你进行分层。那么你呢？在什么情况下你会研究两个数据集之间的代表性，出于什么原因，以及使用什么方法？
