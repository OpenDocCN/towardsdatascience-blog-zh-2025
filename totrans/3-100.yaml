- en: 'The Invisible Revolution: How Vectors Are (Re)defining Business Success'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-invisible-revolution-how-vectors-are-redefining-business-success/](https://towardsdatascience.com/the-invisible-revolution-how-vectors-are-redefining-business-success/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1744318018361" class="mdspan-comment">In a world that focuses</mdspan>
    more on data, business leaders must understand vector thinking. At first, vectors
    may appear as complicated as algebra was in school, but they serve as a fundamental
    building block. Vectors are as essential as algebra for tasks like sharing a bill
    or computing interest. They underpin our digital systems for decision making,
    customer engagement, and data protection.
  prefs: []
  type: TYPE_NORMAL
- en: They represent a radically different concept of relationships and patterns.
    They do not simply divide data into rigid categories. Instead, they offer a dynamic,
    multidimensional view of the underlying connections. Like “Similar” for two customers
    may mean more than demographics or purchase histories. It’s their behaviors, preferences,
    and habits that <mdspan datatext="el1744313777460" class="mdspan-comment">distinctly</mdspan>
    align. Such associations can be defined and measured accurately in a vector space.
    But for many modern businesses, the logic is too complex. So leaders tend to fall
    back on old, learned, rule-based patterns instead. And back then, fraud detection,
    for example, still used simple rules on transaction limits. We’ve evolved to recognize
    patterns and anomalies.
  prefs: []
  type: TYPE_NORMAL
- en: While it might have been common to block transactions that allocate 50% of your
    credit card limit at once just a few years ago, we are now able to analyze your
    retailer-specific spend history, look at average baskets of other customers at
    the very same retailers, and do some slight logic checks such as the physical
    location of your previous spends.
  prefs: []
  type: TYPE_NORMAL
- en: So a $7,000 transaction for McDonald’s in Dubai might just not happen if you
    just spent $3 on a bike rental in Amsterdam. Even $20 wouldn’t work since logical
    vector patterns can rule out the physical distance to be valid. Instead, the $7,000
    transaction for your new E-Bike at a retailer near Amsterdam’s city center may
    just work flawlessly. **Welcome to the insight of living in a world managed by
    vectors.**
  prefs: []
  type: TYPE_NORMAL
- en: 'The danger of ignoring the paradigm of vectors is huge. Not mastering algebra
    can lead to bad financial decisions. Similarly, not knowing vectors can leave
    you vulnerable as a business leader. While the average customer may stay unaware
    of vectors as much as an average passenger in a plane is of aerodynamics, a business
    leader should be at least aware of what kerosene is and how many seats are to
    be occupied to break even for a specific flight. You may not need to fully understand
    the systems you rely on. A basic understanding helps to know when to reach out
    to the experts. And this is exactly my aim in this little journey into the world
    of vectors: become aware of the basic principles and know when to ask for more
    to better steer and manage your business.'
  prefs: []
  type: TYPE_NORMAL
- en: In the hushed hallways of research labs and tech companies, a revolution was
    brewing. It would change how computers understood the world. This revolution has
    nothing to do with processing power or storage capacity. It was all about teaching
    machines to understand context, meaning, and nuance in words. This uses mathematical
    representations called vectors. Before we can appreciate the magnitude of this
    shift, we first need to understand what it differs from.
  prefs: []
  type: TYPE_NORMAL
- en: 'Think about the way humans take in information. When we look at a cat, we don’t
    just process a checklist of components: whiskers, fur, four legs. Instead, our
    brains work through a network of relationships, contexts, and associations. We
    know a cat is more like a lion than a bicycle. It’s not from memorizing this fact.
    Our brains have naturally learned these relationships. It boils down to **target_transform_sequence** or
    equivalent. Vector representations let computers consume content in a human-like
    way. And we ought to understand how and why this is true. It’s as fundamental
    as knowing algebra in the time of an impending AI revolution.'
  prefs: []
  type: TYPE_NORMAL
- en: In this brief jaunt in the vector realm, I will explain how vector-based computing
    works and why it’s so transformative. *The code examples are only examples, so
    they are just for illustration and have no stand-alone functionality. You don’t
    have to be an engineer to understand those concepts.* All you have to do is follow
    along, as I walk you through examples with plain language commentary explaining
    each one step by step, one step at a time. I don’t aim to be a world-class mathematician.
    I want to make vectors understandable to everyone: business leaders, managers,
    engineers, musicians, and others.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What are vectors, anyway?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/e5fbd9dd8a8127a58024ddb5f73bae95.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Pete F](https://unsplash.com/@pete_2112?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: It is not that the vector-based computing journey started recently. Its roots
    go back to the **1950s** with the development of distributed representations in
    cognitive science. **James McClelland and David Rumelhart, among other researchers,
    theorized that the brain holds concepts not as individual entities.** Instead,
    it holds them as the compiled activity patterns of neural networks. This discovery
    dominated the path for contemporary vector representations.
  prefs: []
  type: TYPE_NORMAL
- en: 'The real breakthrough was three things coming together:'
  prefs: []
  type: TYPE_NORMAL
- en: The exponential growth in computational power, the development of sophisticated
    neural network architectures, and the availability of massive datasets for training.
  prefs: []
  type: TYPE_NORMAL
- en: It is the combination of these elements that makes vector-based systems theoretically
    possible and practically implementable at scale. AI as the mainstream as people
    got to know it (with the likes of ChatGPT e.a.) is the direct consequence of this.
  prefs: []
  type: TYPE_NORMAL
- en: 'To better understand, let me put this in context: Conventional computing systems
    work on symbols —discrete, human-readable symbols and rules. A traditional system,
    for instance, might represent a customer as a record:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'This representation may be readable or logical, but it misses subtle patterns
    and relationships. In contrast, vector representations encode information within
    high-dimensional space where relationships arise naturally through geometric proximity.
    That same customer might be represented as a 384-dimensional vector where each
    one of these dimensions contributes to a rich, nuanced profile. Simple code allows
    for 2-Dimensional customer data to be transformed into vectors. Let’s take a look
    at how simple this just is:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: I trust that this code example has helped demonstrate how easily complex customer
    data can be encoded into meaningful vectors. The method seems complex at first.
    But, it is simple. We merge text and numerical data on customers. This gives us
    rich, info-dense vectors that capture each customer’s essence. What I love most
    about this technique is its simplicity and flexibility. Similarly to how we encoded
    age, purchase history, and risk levels here, you could replicate this pattern
    to capture any other customer attributes that boil down to the relevant base case
    for your use case. Just recall the credit card spending patterns we described
    earlier. It’s similar data being turned into vectors to have a meaning far greater
    than it could ever have it stayed 2-dimensional and would be used for traditional
    rule-based logics.
  prefs: []
  type: TYPE_NORMAL
- en: What our little code example allowed us to do is having two very suggestive
    representations in one semantically rich space and one in normalized value space,
    mapping every record to a line in a graph that has direct comparison properties.
  prefs: []
  type: TYPE_NORMAL
- en: '**This allows the systems to identify complex patterns and relations that traditional
    data structures won’t be able to reflect adequately. With the geometric nature
    of vector spaces, the shape of these structures tells the stories of similarities,
    differences, and relationships, allowing for an inherently standardized yet flexible
    representation of complex data.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'But going from here, you will see this structure copied across other applications
    of vector-based customer analysis: use relevant data, aggregate it in a format
    we can work with, and meta representation combines heterogeneous data into a common
    understanding of vectors. Whether it’s recommendation systems, customer segmentation
    models, or predictive analytics tools, this fundamental approach to thoughtful
    vectorization will underpin all of it. Thus, this fundamental approach is significant
    to know and understand even if you consider yourself non-tech and more into the
    business side.'
  prefs: []
  type: TYPE_NORMAL
- en: Just keep in mind — the key is considering what part of your data has meaningful
    signals and how to encode them in a way that preserves their relationships. It
    is nothing but following your business logic in another way of thinking other
    than algebra. A more modern, multi-dimensional way.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Mathematics of Meaning (Kings and Queens)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/a28acb3286ba3a39b8884f96bc51e780.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Debbie Fan](https://unsplash.com/@dubbyfan?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: All human communication delivers rich networks of meaning that our brains wire
    to make sense of automatically. These are meanings that we can capture mathematically,
    using vector-based computing; we can represent words in space so that they are
    points in a multi-dimensional word space. This geometrical treatment allows us
    to think in spatial terms about the abstract semantic relations we are interested
    in, as distances and directions.
  prefs: []
  type: TYPE_NORMAL
- en: '*For instance, the relationship “King is to Queen as Man is to Woman” is encoded
    in a vector space in such a way that the direction and distance between the words
    “King” and “Queen” are similar to those between the words “Man” and “Woman.”*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a step back to understand why this might be: the key component that
    makes this system work is word embeddings — numerical representations that encode
    words as vectors in a dense vector space. These embeddings are derived from examining
    co-occurrences of words across large snippets of text. Just as we learn that “dog”
    and “puppy” are related concepts by observing that they occur in similar contexts,
    embedding algorithms learn to embed these words close to each other in a vector
    space.'
  prefs: []
  type: TYPE_NORMAL
- en: Word embeddings reveal their real power when we look at how they encode analogical
    relationships. Think about what we know about the relationship between “king”
    and “queen.” We can tell through intuition that these words are different in gender
    but share associations related to the palace, authority, and leadership. Through
    a wonderful property of vector space systems — vector arithmetic — this relationship
    can be captured mathematically.
  prefs: []
  type: TYPE_NORMAL
- en: 'One does this beautifully in the classic example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: This equation tells us that if we have the vector for “king,” and we subtract
    out the “man” vector (we remove the concept of “male”), and then we add the “woman”
    vector (we add the concept of “female”), we get a new point in space very close
    to that of “queen.” **That’s not some mathematical coincidence — it’s based on
    how the embedding space has arranged the meaning in a sort of structured way.**
  prefs: []
  type: TYPE_NORMAL
- en: 'We can apply this idea of context in Python with pre-trained word embeddings:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'The structure of this vector space exposes many basic principles:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Semantic similarity is present as spatial proximity. Related words congregate:
    the neighborhoods of ideas. “Dog,” “puppy,” and “canine” would be one such cluster;
    meanwhile, “cat,” “kitten,” and “feline” would create another cluster nearby.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Relationships between words become directions in the space. The vector from
    “man” to “woman” encodes a gender relationship, and other such relationships (for
    example, “king” to “queen” or “actor” to “actress”) typically point in the same
    direction.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The magnitude of vectors can carry meaning about word importance or specificity.
    Common words often have shorter vectors than specialized terms, reflecting their
    broader, less specific meanings.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Working with relationships between words in this way gave us a **geometric encoding** of
    meaning and the mathematical precision needed to reflect the nuances of **natural
    language processing** to machines. Instead of treating words as separate symbols,** vector-like
    systems can recognize patterns, make analogies, and even uncover relationships
    that were never programmed.**
  prefs: []
  type: TYPE_NORMAL
- en: To better grasp what was just discussed I took the liberty to have the words
    we mentioned before (“King, Man, Women”; “Dog, Puppy, Canine”; “Cat, Kitten, Feline”)
    mapped to a corresponding 2D vector. **These vectors numerically represent semantic
    meaning.**
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fe08efc0d9f5eb1c2609eaf16cf3fe4f.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualization of the before-mentioned example terms as 2D word embeddings. Showing
    grouped categories for explanatory purposes. Data is fabricated and axes are simplified
    for educational purposes.
  prefs: []
  type: TYPE_NORMAL
- en: '**Human-related words** have high positive values on both dimensions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dog-related words** have negative x-values and positive y-values.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cat-related words** have positive x-values and negative y-values.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be aware, those values are fabricated by me to illustrate better. As shown in
    the 2D Space where the vectors are plotted, you can observe groups based on the
    positions of the dots representing the vectors. The three dog-related words e.g.
    can be clustered as the “Dog” category etc. etc.
  prefs: []
  type: TYPE_NORMAL
- en: Grasping these basic principles gives us insight into both the capabilities
    and limitations of modern language AI, such as large language models (LLMs). Though
    these systems can do amazing analogical and relational gymnastics, they are ultimately **cycles
    of geometric patterns based on the ways that words appear in proximity to one
    another in a body of text**. An elaborate but, by definition, partial reflection
    of human linguistic comprehension. As such an LLM, since based on vectors, can
    only generate as output what it has received as input. Although that doesn’t mean
    it generates only what it has been trained 1:1, we all know about the fantastic
    hallucination capabilities of LLMs; it means that LLMs, unless specifically instructed,
    wouldn’t come up with neologisms or new language to describe things. This basic
    understanding is still lacking for a lot of business leaders that expect LLMs
    to be miracle machines unknowledgeable about the underlying principles of vectors.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: A Tale of Distances, Angles, and Dinner Parties
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/3d2c82fa3c4c5f3651c89779e4261407.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [OurWhisky Foundation](https://unsplash.com/@ourwhiskyfoundation?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s assume you’re throwing a dinner party and it’s all about Hollywood
    and the big movies, and you want to seat people based on what they like. You could
    just calculate “distance” between their preferences (genres, perhaps even hobbies?)
    and find out who should sit together. But deciding how you measure that distance
    can be the difference between compelling conversations and annoyed participants.
    Or awkward silences. *And yes, that company party flashback is repeating itself.
    Sorry for that!*
  prefs: []
  type: TYPE_NORMAL
- en: The same is true in the world of vectors. The distance metric defines how “similar”
    two vectors look, and therefore, ultimately, how well your system performs to predict an outcome.
  prefs: []
  type: TYPE_NORMAL
- en: 'Euclidean Distance: Straightforward, but Limited'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Euclidean distance measures the straight-line distance between two points in
    space, making it easy to understand:'
  prefs: []
  type: TYPE_NORMAL
- en: Euclidean distance is fine as long as vectors are physical locations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: However, in high-dimensional spaces (like vectors representing user behavior
    or preferences), this metric often falls short. Differences in scale or magnitude
    can skew results, focusing on scale over actual similarity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Example**: Two vectors might represent your dinner guests’ preferences for
    how much streaming services are used:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '**While their preferences align, Euclidean distance would make them seem vastly
    different because of the disparity in overall activity.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'But in higher-dimensional spaces, such as user behavior or textual meaning,
    Euclidean distance becomes increasingly less informative. It overweights magnitude,
    which can obscure comparisons. Consider two moviegoers: one has seen 200 action
    movies, the other has seen 10, but they both like the same genres. Because of
    their sheer activity level, the second viewer would appear much less similar to
    the first when using Euclidean distance though all they ever watched is Bruce
    Willis movies.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Cosine Similarity: Focused on Direction'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The cosine similarity method takes a different approach. It focuses on the **angle
    between vectors**, not their magnitudes. It’s like comparing the path of two arrows.
    If they point the same way, they are aligned, no matter their lengths. This shows
    that it’s perfect for high-dimensional data, where we care about relationships,
    not scale.
  prefs: []
  type: TYPE_NORMAL
- en: If two vectors point in the same direction, they’re considered similar (cosine
    similarity approx of 1).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When opposing (so pointing in opposite directions), they differ (cosine similarity
    ≈ -1).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If they’re perpendicular (at a right angle of 90° to one another), they are
    unrelated (cosine similarity close to 0).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This normalizing property ensures that the similarity score correctly measures
    alignment, regardless of how one vector is scaled in comparison to another.
  prefs: []
  type: TYPE_NORMAL
- en: '**Example**: Returning to our streaming preferences, let’s take a look at how
    our dinner guest’s preferences would look like as vectors:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Let us discuss why cosine similarity is really effective in this case. So, when
    we compute cosine similarity for vec1 [5, 10, 5] and vec2 [1, 2, 1], **we’re essentially
    trying to see the angle between these vectors**.
  prefs: []
  type: TYPE_NORMAL
- en: 'The dot product normalizes the vectors first, dividing each component by the
    length of the vector. This operation “cancels” the differences in magnitude:'
  prefs: []
  type: TYPE_NORMAL
- en: 'So for vec1: Normalization gives us [0.41, 0.82, 0.41] or so.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For vec2: Which resolves to [0.41, 0.82, 0.41] after normalization we will
    also have it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And now we also understand why these vectors would be considered identical with
    regard to cosine similarity because **their normalized versions are identical**!
  prefs: []
  type: TYPE_NORMAL
- en: This tells us that even though dinner guest A views more total content, the
    proportion they allocate to any given genre perfectly mirrors dinner guest B’s
    preferences. It’s like saying both your guests dedicate 20% of their time to action,
    60% to drama, and 20% to comedy, no matter the total hours viewed.
  prefs: []
  type: TYPE_NORMAL
- en: '**It’s this normalization that makes cosine similarity particularly effective
    for high-dimensional data such as text embeddings or user preferences.**'
  prefs: []
  type: TYPE_NORMAL
- en: Whendealing with data of many dimensions (think hundreds or thousands of components
    of a vector for various features of a movie), it is often the relative significance
    of each dimension corresponding to the complete profile rather than the absolute
    values that matter most. Cosine similarity identifies precisely this arrangement
    of relative importance and is a powerful tool to identify meaningful relationships
    in complex data.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Hiking up the Euclidian Mountain Trail
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/4e115398ca71bc9341d5ade0003c5e12.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Christian Mikhael](https://unsplash.com/@christian_mikhael?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: In this part, we will see how different approaches to measuring similarity behave
    in practice, with a concrete example from the real world and some little code example.
    Even if you are a non-techie, the code will be easy to understand for you as well.
    It’s to illustrate the simplicity of it all. No fear!
  prefs: []
  type: TYPE_NORMAL
- en: 'How about we quickly discuss a 10-mile-long hiking trail? Two friends, Alex
    and Blake, write trail reviews of the same hike, but each ascribes it a different
    character:'
  prefs: []
  type: TYPE_NORMAL
- en: '*The trail gained 2,000 feet in elevation over just 2 miles! Easily doable
    with some high spikes in between!*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Alex**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: and
  prefs: []
  type: TYPE_NORMAL
- en: '*Beware, we hiked 100 straight feet up in the forest terrain at the spike!
    Overall, 10 beautiful miles of forest!*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Blake**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'These descriptions can be represented as vectors:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s combine both similarity measures and see what it tells us:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'So now, running this code, something magical happens:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: This output shows why, depending on what you are measuring, the same trail may
    appear different or similar.
  prefs: []
  type: TYPE_NORMAL
- en: The *large ****Euclidean**** distance (8.12) suggests these are very different
    descriptions. *It’s understandable that 2000 is a lot different from 100, and
    2 is a lot different from 10\. It’s like taking the raw difference between these
    numbers without understanding their meaning.
  prefs: []
  type: TYPE_NORMAL
- en: But the *high ****Cosine**** similarity (0.95) tells us something more interesting*: **both
    descriptions capture a similar pattern**.
  prefs: []
  type: TYPE_NORMAL
- en: If we look at the **normalized vectors,** we can see it, too; both Alex and
    Blake are describing a trail in which elevation gain is the prominent feature.
    The first number in each normalized vector (elevation gain) is much larger relative
    to the second (trail distance). Either that or elevating them both and normalizing
    based on proportion — not volume — since they both share the same trait defining
    the trail.
  prefs: []
  type: TYPE_NORMAL
- en: 'Perfectly true to life: Alex and Blake hiked the same trail but focused on
    different parts of it when writing their review. Alex focused on the steeper section
    and described a 100-foot climb, and Blake described the profile of the entire
    trail, averaged to 200 feet per mile over 10 miles. **Cosine similarity identifies
    these descriptions as variations of the same basic trail pattern, whereas Euclidean
    distance regards them as completely different trails.**'
  prefs: []
  type: TYPE_NORMAL
- en: This example highlights the need to select the appropriate similarity measure.
    Normalizing and taking cosine similarity gives many meaningful correlations that
    are missed by just taking distances like Euclidean in real use cases.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Real-World Impacts of Metric Choices
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/87c8fc2e4d74ab42f37733c104015bbb.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [fabio](https://unsplash.com/@fabioha?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: 'The metric you pick doesn’t merely change the numbers; it influences the results
    of complex systems. Here’s how it breaks down in various domains:'
  prefs: []
  type: TYPE_NORMAL
- en: '**In Recommendation Engines**: When it comes to cosine similarity, we can group
    users who have the same tastes, even if they are doing different amounts of overall
    activity. A streaming service could use this to recommend movies that align with
    a user’s genre preferences, regardless of what is popular among a small subset
    of very active viewers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**In Document Retrieval**: When querying a database of documents or research
    papers, cosine similarity ranks documents according to whether their content is
    similar in meaning to the user’s query, rather than their text length. This enables
    systems to retrieve results that are contextually relevant to the query, even
    though the documents are of a wide range of sizes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**In Fraud Detection**: Patterns of behavior are often more important than
    pure numbers. Cosine similarity can be used to detect anomalies in spending habits,
    as it compares the direction of the transaction vectors — type of merchant, time
    of day, transaction amount, etc. — rather than the absolute magnitude.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**And these differences matter because they give a sense of how systems “think”. **Let’s
    get back to that credit card example one more time: It might, for example, identify
    a high-value $7,000 transaction for your new E-Bike as suspicious using Euclidean
    distance — even if that transaction is normal for you given you have an average spent of $20,000 a mont.'
  prefs: []
  type: TYPE_NORMAL
- en: A cosine-based system, on the other hand, understands that the transaction is
    consistent with what the user typically spends their money on, thus avoiding unnecessary
    false notifications.
  prefs: []
  type: TYPE_NORMAL
- en: '**But measures like Euclidean distance and cosine similarity are not merely
    theoretical. They’re the blueprints on which real-world systems stand. **Whether
    it’s recommendation engines or fraud detection, the metrics we choose will directly
    impact how systems make sense of relationships in data.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Vector Representations in Practice: Industry Transformations'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/824b12d1e92f66884ddde1e7502b3888.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Louis Reed](https://unsplash.com/@_louisreed?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: This ability for abstraction is what makes vector representations so powerful — they
    transform complex and abstract field data into concepts that can be scored and
    actioned. **These insights are catalyzing fundamental transformations in business
    processes, decision-making, and customer value delivery across sectors.**
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will explore the solution use cases we are highlighting as concrete
    examples to see how vectors are freeing up time to solve big problems and creating
    new opportunities that have a big impact. I picked an industry to show what vector-based
    approaches to a challenge can achieve, so here is a healthcare example from a
    clinical setting. Why? Because it matters to us all and is rather easy to relate
    to than digging into the depths of the finance system, insurance, renewable energy,
    or chemistry.
  prefs: []
  type: TYPE_NORMAL
- en: 'Healthcare Spotlight: Pattern Recognition in Complex Medical Data'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The healthcare industry poses a perfect storm of challenges that vector representations
    can *uniquely* solve. Think of the complexities of patient data: medical histories,
    genetic information, lifestyle factors, and treatment outcomes all interact in
    nuanced ways that traditional rule-based systems are incapable of capturing.'
  prefs: []
  type: TYPE_NORMAL
- en: At Massachusetts General Hospital, researchers implemented a vector-based early
    detection system for sepsis, a condition in which **every *hour* of early detection
    increases the chances of survival by 7.6%** (see the full study at [pmc.ncbi.nlm.nih.gov/articles/PMC6166236/](https://pmc.ncbi.nlm.nih.gov/articles/PMC6166236/)).
  prefs: []
  type: TYPE_NORMAL
- en: In this new methodology, spontaneous neutrophil velocity profiles (SVP) are
    used to describe the movement patterns of neutrophils from a drop of blood. We
    won’t get too medically detailed here, because we’re vector-focused today, but
    a neutrophil is an immune cell that is kind of a first responder in what the body
    uses to fight off infections.
  prefs: []
  type: TYPE_NORMAL
- en: The system then encodes each neutrophil’s motion as a **vector **that captures
    not just its magnitude (i.e., speed), but also its direction. **So they converted
    biological patterns to high-dimensional vector spaces**; thus, they got subtle
    differences and s**howed that healthy individuals and sepsis patients exhibited
    statistically significant differences in movement**. Then, these numeric vectors
    were processed with the help of a machine learning model that was trained to detect
    early signs of sepsis. **The result was a diagnostic tool that reached impressive
    sensitivity (97%) and specificity (98%) to achieve a rapid and accurate identification
    of this fatal condition** — probably with the cosine similarity (the paper doesn’t
    go into much detail, so this is pure speculation, but it would be the most suitable)
    that we just learned about a moment ago.
  prefs: []
  type: TYPE_NORMAL
- en: This is just one example of how medical data can be encoded into its vector
    representations and turned into malleable, actionable insights. This approach
    made it possible to re-contextualize complex relationships and, along with tread-based
    machine learning, worked around the limitations of previous diagnostic modalities
    and proved to be a potent tool for clinicians to save lives. It’s a powerful reminder
    that vectors aren’t merely theoretical constructs — they’re practical, life-saving
    solutions that are powering the future of healthcare as much as your credit card
    risk detection software and hopefully also your business.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Lead and understand, or face disruption. The naked truth.
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/4f03345a16ca4e694f3f328f23c2f8db.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Hunters Race](https://unsplash.com/@huntersrace?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: 'With all you have read about by now: Think of a decision as small as the decision
    about the metrics under which data relationships are evaluated. **Leaders risk
    making assumptions that are subtle yet disastrous**. You are basically using algebra
    as a tool, and while getting some result, you cannot know if it is right or not: **making
    leadership decisions without understanding the fundamentals of vectors is like
    calculating using a calculator but not knowing what formulas you are using.**'
  prefs: []
  type: TYPE_NORMAL
- en: The good news is this doesn’t mean that business leaders have to become data
    scientists. Vectors are delightful because, once the core ideas have been grasped,
    they become very easy to work with. An understanding of a handful of concepts
    (for example, how vectors encode relationships, why distance metrics are important,
    and how embedding models function) can **fundamentally change how you make high-level
    decisions**. These tools will help you ask better questions, work with technical
    teams more effectively, and make sound decisions about the systems that will govern
    your business.
  prefs: []
  type: TYPE_NORMAL
- en: The returns on this small investment in comprehension are huge. There is much
    talk about personalization. **Yet, few organizations use vector-based thinking
    in their business strategies.** It could help them leverage personalization to
    its full potential. Such an approach would delight customers with tailored experiences
    and build loyalty. You could innovate in areas like fraud detection and operational
    efficiency, leveraging subtle patterns in data that traditional ones miss — or
    perhaps even save lives, as described above. Equally important, you can avoid
    expensive missteps that happen when leaders defer to others for key decisions
    without understanding what they mean.
  prefs: []
  type: TYPE_NORMAL
- en: The truth is, vectors are here now, driving a vast majority of all the hyped
    AI technology behind the scenes to help create the world we navigate in today
    and tomorrow. Companies that do not adapt their leadership to think in vectors
    risk falling behind a competitive landscape that becomes ever more data-driven.
    One who adopts this new paradigm will not just survive but will prosper in an
    age of never-ending AI innovation.
  prefs: []
  type: TYPE_NORMAL
- en: Now is the moment to act. Start to view the world through vectors. Study their
    tongue, examine their doctrine, and ask how the new could change your tactics
    and your lodestars. Much in the way that algebra became an essential tool for
    writing one’s way through practical life challenges, vectors will soon serve as
    the literacy of the data age. Actually they do already. It is the future of which
    the powerful know how to take control. The question is not if vectors will define
    the next era of businesses; it is whether you are prepared to lead it.
  prefs: []
  type: TYPE_NORMAL
