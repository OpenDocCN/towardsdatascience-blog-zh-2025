- en: How to Measure Real Model Accuracy When Labels Are Noisy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-measure-real-model-accuracy-when-labels-are-noisy/](https://towardsdatascience.com/how-to-measure-real-model-accuracy-when-labels-are-noisy/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1744312763723" class="mdspan-comment">Ground</mdspan> truth
    is never perfect. From scientific measurements to human annotations used to train
    deep learning models, ground truth always has some amount of errors. ImageNet,
    arguably the most well-curated image dataset has [0.3% errors in human annotations](https://karpathy.github.io/2014/09/02/what-i-learned-from-competing-against-a-convnet-on-imagenet/).
    Then, how can we evaluate predictive models using such erroneous labels?
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we explore how to account for errors in test data labels and
    estimate a model’s “true” accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: image classification'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s say there are 100 images, each containing either a cat or a dog. The
    images are labeled by human annotators who are known to have 96% accuracy (Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ).
    If we train an image classifier on some of this data and find that it has 90%
    accuracy on a hold-out set (Aᵐᵒᵈᵉˡ), what is the “true” accuracy of the model
    (Aᵗʳᵘᵉ)? A couple of observations first:'
  prefs: []
  type: TYPE_NORMAL
- en: Within the 90% of predictions that the model got “right,” some examples may
    have been incorrectly labeled, meaning both the model and the ground truth are
    wrong. This artificially inflates the measured accuracy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Conversely, within the 10% of “incorrect” predictions, some may actually be
    cases where the model is right and the ground truth label is wrong. This artificially
    deflates the measured accuracy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Given these complications, how much can the true accuracy vary?
  prefs: []
  type: TYPE_NORMAL
- en: Range of true accuracy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/cadee085d37041bc7ea79d94f931ad83.png)'
  prefs: []
  type: TYPE_IMG
- en: True accuracy of model for perfectly correlated and perfectly uncorrelated errors
    of model and label. Figure by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'The true accuracy of our model depends on how its errors correlate with the
    errors in the ground truth labels. If our model’s errors perfectly overlap with
    the ground truth errors (i.e., the model is wrong in exactly the same way as human
    labelers), its true accuracy is:'
  prefs: []
  type: TYPE_NORMAL
- en: Aᵗʳᵘᵉ = 0.90 — (1–0.96) = 86%
  prefs: []
  type: TYPE_NORMAL
- en: 'Alternatively, if our model is wrong in exactly the opposite way as human labelers
    (perfect negative correlation), its true accuracy is:'
  prefs: []
  type: TYPE_NORMAL
- en: Aᵗʳᵘᵉ = 0.90 + (1–0.96) = 94%
  prefs: []
  type: TYPE_NORMAL
- en: 'Or more generally:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Aᵗʳᵘᵉ = Aᵐᵒᵈᵉˡ ± (1 — Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ)**'
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to note that the model’s true accuracy can be both lower and
    higher than its reported accuracy, depending on the correlation between model
    errors and ground truth errors.
  prefs: []
  type: TYPE_NORMAL
- en: Probabilistic estimate of true accuracy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In some cases, inaccuracies among labels are randomly spread among the examples
    and not systematically biased toward certain labels or regions of the feature
    space. If the model’s inaccuracies are independent of the inaccuracies in the
    labels, we can derive a more precise estimate of its true accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: 'When we measure Aᵐᵒᵈᵉˡ (90%), we’re counting cases where the model’s prediction
    matches the ground truth label. This can happen in two scenarios:'
  prefs: []
  type: TYPE_NORMAL
- en: Both model and ground truth are correct. This happens with probability Aᵗʳᵘᵉ
    × Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Both model and ground truth are wrong (in the same way). This happens with probability
    (1 — Aᵗʳᵘᵉ) × (1 — Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under independence, we can express this as:'
  prefs: []
  type: TYPE_NORMAL
- en: Aᵐᵒᵈᵉˡ = Aᵗʳᵘᵉ × Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ + (1 — Aᵗʳᵘᵉ) × (1 — Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ)
  prefs: []
  type: TYPE_NORMAL
- en: 'Rearranging the terms, we get:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Aᵗʳᵘᵉ = (Aᵐᵒᵈᵉˡ + Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ — 1) / (2 × Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ — 1)**'
  prefs: []
  type: TYPE_NORMAL
- en: In our example, that equals (0.90 + 0.96–1) / (2 × 0.96–1) = 93.5%, which is
    within the range of 86% to 94% that we derived above.
  prefs: []
  type: TYPE_NORMAL
- en: The independence paradox
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Plugging in Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ as 0.96 from our example, we get
  prefs: []
  type: TYPE_NORMAL
- en: Aᵗʳᵘᵉ = (Aᵐᵒᵈᵉˡ — 0.04) / (0.92). Let’s plot this below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c5a909874a1ba22a5b05ace5392767d8.png)'
  prefs: []
  type: TYPE_IMG
- en: True accuracy as a function of model’s reported accuracy when ground truth accuracy
    = 96%. Figure by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Strange, isn’t it? If we assume that model’s errors are uncorrelated with ground
    truth errors, then its true accuracy Aᵗʳᵘᵉ is always higher than the 1:1 line
    when the reported accuracy is > 0.5\. This holds true even if we vary Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0980c25436b6be7e9f87986d58abaf5c.png)'
  prefs: []
  type: TYPE_IMG
- en: Model’s “true” accuracy as a function of its reported accuracy and ground truth
    accuracy. Figure by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Error correlation: why models often struggle where humans do'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The independence assumption is crucial but often doesn’t hold in practice. If
    some images of cats are very blurry, or some small dogs look like cats, then both
    the ground truth and model errors are likely to be correlated. This causes Aᵗʳᵘᵉ
    to be closer to the lower bound (Aᵐᵒᵈᵉˡ — (1 — Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ)) than the upper bound.
  prefs: []
  type: TYPE_NORMAL
- en: 'More generally, model errors tend to be correlated with ground truth errors
    when:'
  prefs: []
  type: TYPE_NORMAL
- en: Both humans and models struggle with the same “difficult” examples (e.g., ambiguous
    images, edge cases)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The model has learned the same biases present in the human labeling process
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Certain classes or examples are inherently ambiguous or challenging for any
    classifier, human or machine
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The labels themselves are generated from another model
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: There are too many classes (and thus too many different ways of being wrong)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Best practices
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The true accuracy of a model can differ significantly from its measured accuracy.
    Understanding this difference is crucial for proper model evaluation, especially
    in domains where obtaining perfect ground truth is impossible or prohibitively
    expensive.
  prefs: []
  type: TYPE_NORMAL
- en: 'When evaluating model performance with imperfect ground truth:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conduct targeted error analysis**: Examine examples where the model disagrees
    with ground truth to identify potential ground truth errors.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Consider the correlation between errors**: If you suspect correlation between
    model and ground truth errors, the true accuracy is likely closer to the lower
    bound (Aᵐᵒᵈᵉˡ — (1 — Aᵍʳᵒᵘⁿᵈᵗʳᵘᵗʰ)).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Obtain multiple independent annotations**: Having multiple annotators can
    help estimate ground truth accuracy more reliably.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In summary, we learned that:'
  prefs: []
  type: TYPE_NORMAL
- en: The range of possible true accuracy depends on the error rate in the ground
    truth
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When errors are independent, the true accuracy is often higher than measured
    for models better than random chance
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In real-world scenarios, errors are rarely independent, and the true accuracy
    is likely closer to the lower bound
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
