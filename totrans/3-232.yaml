- en: How to Use an LLM-Powered Boilerplate for Building Your Own Node.js API
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用 LLM 驱动的模板构建自己的 Node.js API
- en: 原文：[https://towardsdatascience.com/how-to-use-an-llm-powered-boilerplate-for-building-your-own-node-js-api/](https://towardsdatascience.com/how-to-use-an-llm-powered-boilerplate-for-building-your-own-node-js-api/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-use-an-llm-powered-boilerplate-for-building-your-own-node-js-api/](https://towardsdatascience.com/how-to-use-an-llm-powered-boilerplate-for-building-your-own-node-js-api/)
- en: For a long time, one of the common ways to start new Node.js projects was using
    boilerplate templates. These templates help developers reuse familiar code structures
    and implement standard features, such as access to cloud file storage. With the
    latest developments in LLM, project boilerplates appear to be more useful than
    ever.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 很长一段时间里，启动新 Node.js 项目的常见方法之一是使用模板。这些模板帮助开发者重用熟悉的代码结构并实现标准功能，例如访问云文件存储。随着 LLM
    的发展，项目模板似乎比以往任何时候都更有用。
- en: Building on this progress, I’ve extended my existing Node.js API boilerplate
    with a new tool [LLM Codegen](https://github.com/vyancharuk/nodejs-todo-api-boilerplate).
    This standalone feature enables the boilerplate to automatically generate module
    code for any purpose based on text descriptions. The generated module comes complete
    with E2E tests, database migrations, seed data, and necessary business logic.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 建立在现有进展的基础上，我扩展了现有的 Node.js API 模板，添加了一个新工具 [LLM Codegen](https://github.com/vyancharuk/nodejs-todo-api-boilerplate)。这个独立功能使模板能够根据文本描述自动生成任何目的的模块代码。生成的模块包含
    E2E 测试、数据库迁移、种子数据和必要的企业逻辑。
- en: History
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 历史
- en: I initially created a [GitHub repository](https://github.com/vyancharuk/nodejs-todo-api-boilerplate#nodejs-api-typescript-template-project) for
    a Node.js API boilerplate to consolidate the best practices I’ve developed over
    the years. Much of the implementation is based on code from a real Node.js API
    running in production on AWS.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我最初创建了一个 [GitHub 仓库](https://github.com/vyancharuk/nodejs-todo-api-boilerplate#nodejs-api-typescript-template-project)
    用于 Node.js API 模板，以巩固我多年来开发的最佳实践。大部分实现基于在 AWS 上运行的实际 Node.js API 代码。
- en: I am passionate about vertical slicing architecture and Clean Code principles
    to keep the codebase maintainable and clean. With recent advancements in LLM,
    particularly its support for large contexts and its ability to generate high-quality
    code, I decided to experiment with generating clean TypeScript code based on my
    boilerplate. This boilerplate follows specific structures and patterns that I
    believe are of high quality. The key question was whether the generated code would
    follow the same patterns and structure. Based on my findings, it does.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我热衷于垂直切片架构和 Clean Code 原则，以保持代码库的可维护性和整洁。随着 LLM 的最新进展，特别是其对大上下文的支持和生成高质量代码的能力，我决定基于我的模板进行生成清洁
    TypeScript 代码的实验。这个模板遵循特定的结构和模式，我认为它们是高质量的。关键问题是生成的代码是否会遵循相同的模式和结构。根据我的发现，它确实如此。
- en: 'To recap, here’s a quick highlight of the Node.js API boilerplate’s key features:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾一下，以下是 Node.js API 模板的关键特性快速概述：
- en: Vertical slicing architecture based on `DDD` & `MVC` principles
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于 `DDD` & `MVC` 原则的垂直切片架构
- en: Services input validation using `ZOD`
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 `ZOD` 进行服务输入验证
- en: Decoupling application components with dependency injection (`InversifyJS`)
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用依赖注入 (`InversifyJS`) 解耦应用程序组件
- en: Integration and `E2E` testing with Supertest
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Supertest 进行集成和 `E2E` 测试
- en: Multi-service setup using `Docker`compose
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 `Docker`compose 进行多服务设置
- en: Over the past month, I’ve spent my weekends formalizing the solution and implementing
    the necessary code-generation logic. Below, I’ll share the details.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的一个月里，我利用周末时间正式化解决方案并实现必要的代码生成逻辑。下面，我将分享详细情况。
- en: Implementation Overview
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实现概述
- en: Let’s explore the specifics of the implementation. All code generation logic
    is organized at the project root level, inside the `llm-codegen` folder, ensuring
    easy navigation. The Node.js boilerplate code has no dependency on `llm-codegen`,
    so it can be used as a regular template without modification.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨具体实现细节。所有代码生成逻辑都组织在项目根目录下的 `llm-codegen` 文件夹中，确保易于导航。Node.js 模板代码不依赖于 `llm-codegen`，因此可以作为常规模板使用，无需修改。
- en: '![](../Images/c9a3eb2e0c2957cb75ab29080cd890a2.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c9a3eb2e0c2957cb75ab29080cd890a2.png)'
- en: LLM-Codegen folder structure
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: LLM-Codegen 文件夹结构
- en: 'It covers the following use cases:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 它涵盖了以下用例：
- en: Generating clean, well-structured code for new module based on input description.
    The generated module becomes part of the Node.js REST API application.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据输入描述生成新的模块的干净、结构良好的代码。生成的模块成为 Node.js REST API 应用程序的一部分。
- en: Creating database migrations and extending seed scripts with basic data for
    the new module.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为新模块创建数据库迁移并扩展种子脚本，以包含基本数据。
- en: Generating and fixing E2E tests for the new code and ensuring all tests pass.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为新代码生成和修复端到端测试，并确保所有测试通过。
- en: The generated code after the first stage is clean and adheres to vertical slicing
    architecture principles. It includes only the necessary business logic for CRUD
    operations. Compared to other code generation approaches, it produces clean, maintainable,
    and compilable code with valid E2E tests.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 第一阶段生成的代码是干净的，并遵循垂直切片架构原则。它仅包含 CRUD 操作所需的必要业务逻辑。与其他代码生成方法相比，它生成的是干净、可维护、可编译的代码，并具有有效的端到端测试。
- en: The second use case involves generating DB migration with the appropriate schema
    and updating the seed script with the necessary data. This task is particularly
    well-suited for LLM, which handles it exceptionally well.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个用例涉及使用适当的模式生成数据库迁移，并更新种子脚本以包含必要的数据。这项任务非常适合 LLM，它处理得非常好。
- en: The final use case is generating E2E tests, which help confirm that the generated
    code works correctly. During the running of E2E tests, an SQLite3 database is
    used for migrations and seeds.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个用例是生成端到端测试，这有助于确认生成的代码是否正确工作。在运行端到端测试期间，使用 SQLite3 数据库进行迁移和种子。
- en: Mainly supported LLM clients are OpenAI and Claude.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 主要支持的 LLM 客户端是 OpenAI 和 Claude。
- en: '**How to Use It**'
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**如何使用**'
- en: 'To get started, navigate to the root folder `llm-codegen` and install all dependencies
    by running:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用，请导航到 `llm-codegen` 的根目录并运行以下命令来安装所有依赖项：
- en: npm i
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: npm i
- en: '`llm-codegen` does not rely on Docker or any other heavy third-party dependencies,
    making setup and execution easy and straightforward. Before running the tool,
    ensure that you set at least one `*_API_KEY` environment variable in the `.env` file
    with the appropriate API key for your chosen LLM provider. All supported environment
    variables are listed in the `.env.sample` file (`OPENAI_API_KEY, CLAUDE_API_KEY` etc.)
    You can use `OpenAI`, `Anthropic Claude`, or `OpenRouter LLaMA`. As of mid-December, `OpenRouter
    LLaMA` is surprisingly free to use. It’s possible to register [here](https://openrouter.ai/nousresearch/hermes-3-llama-3.1-405b:free/api) and
    obtain a token for free usage. However, the output quality of this free LLaMA
    model could be improved, as most of the generated code fails to pass the compilation
    stage.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '`llm-codegen` 不依赖于 Docker 或任何其他重型第三方依赖项，这使得设置和执行变得简单直接。在运行工具之前，请确保在 `.env`
    文件中至少设置了一个 `*_API_KEY` 环境变量，并使用您选择的 LLM 提供商的适当 API 密钥。所有支持的环境变量都在 `.env.sample`
    文件中列出（`OPENAI_API_KEY, CLAUDE_API_KEY` 等）。您可以使用 `OpenAI`、`Anthropic Claude` 或
    `OpenRouter LLaMA`。截至 12 月中旬，`OpenRouter LLaMA` 意外地免费使用。您可以在 [这里](https://openrouter.ai/nousresearch/hermes-3-llama-3.1-405b:free/api)
    注册并获得免费使用的令牌。然而，这个免费 LLaMA 模型的输出质量可以改进，因为大多数生成的代码都无法通过编译阶段。'
- en: 'To start `llm-codegen`, run the following command:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 要启动 `llm-codegen`，请运行以下命令：
- en: npm run start
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: npm run start
- en: Next, you’ll be asked to input the module description and name. In the module
    description, you can specify all necessary requirements, such as entity attributes
    and required operations. The core remaining work is performed by micro-agents: `Developer`, `Troubleshooter`,
    and `TestsFixer`.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您将被要求输入模块描述和名称。在模块描述中，您可以指定所有必要的需求，例如实体属性和所需操作。核心剩余工作由微代理完成：`Developer`、`Troubleshooter`
    和 `TestsFixer`。
- en: 'Here is an example of a successful code generation:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个成功的代码生成示例：
- en: '![](../Images/17539abe48e391a9c01e6e2812076838.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/17539abe48e391a9c01e6e2812076838.png)'
- en: Successful code generation
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 代码生成成功
- en: 'Below is another example demonstrating how a compilation error was fixed:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是另一个示例，展示了如何修复编译错误：
- en: '![](../Images/2501c55b8be26a2ce8577928110f5a57.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2501c55b8be26a2ce8577928110f5a57.png)'
- en: 'The following is an example of a generated `orders` module code:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个生成的 `orders` 模块代码示例：
- en: '![](../Images/f8c3b833abafca7dfd490916f3fe5ba2.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f8c3b833abafca7dfd490916f3fe5ba2.png)'
- en: A key detail is that you can generate code step by step, starting with one module
    and adding others until all required APIs are complete. This approach allows you
    to generate code for all required modules in just a few command runs.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 一个关键细节是您可以逐步生成代码，从单个模块开始，添加其他模块，直到所有必需的 API 都完整。这种方法允许您在几次命令运行中生成所有必需模块的代码。
- en: '**How It Works**'
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**工作原理**'
- en: As mentioned earlier, all work is performed by those micro-agents: `Developer`, `Troubleshooter` and `TestsFixer`,
    controlled by the `Orchestrator`. They run in the listed order, with the `Developer` generating
    most of the codebase. After each code generation step, a check is performed for
    missing files based on their roles (e.g., routes, controllers, services). If any
    files are missing, a new code generation attempt is made, including instructions
    in the prompt about the missing files and examples for each role. Once the `Developer` completes
    its work, TypeScript compilation begins. If any errors are found, the `Troubleshooter` takes
    over, passing the errors to the prompt and waiting for the corrected code. Finally,
    when the compilation succeeds, E2E tests are run. Whenever a test fails, the `TestsFixer` steps
    in with specific prompt instructions, ensuring all tests pass and the code stays
    clean.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，所有工作都由以下微代理完成：`Developer`、`Troubleshooter`和`TestsFixer`，由`Orchestrator`控制。它们按照列表中的顺序运行，其中`Developer`生成大部分代码库。在每次代码生成步骤之后，会根据其角色（例如，路由、控制器、服务）检查缺失的文件。如果任何文件缺失，将尝试新的代码生成，包括提示中关于缺失文件的说明以及每个角色的示例。一旦`Developer`完成其工作，就开始TypeScript编译。如果发现任何错误，`Troubleshooter`将接管，将错误传递给提示并等待修正后的代码。最后，当编译成功后，将运行端到端测试。每当测试失败时，`TestsFixer`将介入，并使用特定的提示指令，确保所有测试通过且代码保持整洁。
- en: 'All micro-agents are derived from the `BaseAgent` class and actively reuse
    its base method implementations. Here is the `Developer` implementation for reference:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 所有微代理都源自于`BaseAgent`类，并积极重用其基类方法实现。以下为参考的`Developer`实现：
- en: '![](../Images/8d6f7585c5f5520f365c64d89a0d7662.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8d6f7585c5f5520f365c64d89a0d7662.png)'
- en: Each agent utilizes its specific prompt. Check out this GitHub [link](https://github.com/vyancharuk/nodejs-todo-api-boilerplate/blob/master/llm-codegen/core/prompts/developer.main.prompt) for
    the prompt used by the `Developer`.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 每个代理都使用其特定的提示。查看以下GitHub[链接](https://github.com/vyancharuk/nodejs-todo-api-boilerplate/blob/master/llm-codegen/core/prompts/developer.main.prompt)以了解`Developer`使用的提示。
- en: After dedicating significant effort to research and testing, I refined the prompts
    for all micro-agents, resulting in clean, well-structured code with very few issues.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在投入大量精力进行研究和测试后，我优化了所有微代理的提示词，从而得到了干净、结构良好的代码，问题非常少。
- en: 'During the development and testing, it was used with various module descriptions,
    ranging from simple to highly detailed. Here are a few examples:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发和测试期间，使用了各种模块描述，从简单到高度详细。以下是一些示例：
- en: '[PRE0]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Testing with `gpt-4o-mini` and `claude-3-5-sonnet-20241022` showed comparable
    output code quality, although Sonnet is more expensive. Claude Haiku (`claude-3–5-haiku-20241022`),
    while cheaper and similar in price to `gpt-4o-mini`, often produces non-compilable
    code. Overall, with `gpt-4o-mini`, a single code generation session consumes an
    average of around 11k input tokens and 15k output tokens. This amounts to a cost
    of approximately 2 cents per session, based on token pricing of 15 cents per 1M
    input tokens and 60 cents per 1M output tokens (as of December 2024).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 使用`gpt-4o-mini`和`claude-3-5-sonnet-20241022`进行测试显示了可比较的输出代码质量，尽管Sonnet更贵。Claude
    Haiku（`claude-3–5-haiku-20241022`），虽然更便宜且价格与`gpt-4o-mini`相似，但经常生成不可编译的代码。总的来说，使用`gpt-4o-mini`，单个代码生成会话平均消耗大约11k输入令牌和15k输出令牌。根据每1M输入令牌15美分和每1M输出令牌60美分的令牌定价（截至2024年12月），这相当于每次会话大约2美分的成本。
- en: 'Below are Anthropic usage logs showing token consumption:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是Anthropic的使用日志，显示了令牌消耗情况：
- en: '![](../Images/34c071e3975b09ec4bb4f782a33c1066.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/34c071e3975b09ec4bb4f782a33c1066.png)'
- en: Based on my experimentation over the past few weeks, I conclude that while there
    may still be some issues with passing generated tests, 95% of the time generated
    code is compilable and runnable.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我过去几周的实验，我得出结论，虽然生成测试可能仍然存在一些问题，但95%的时间生成的代码是可编译和可运行的。
- en: I hope you found some inspiration here and that it serves as a starting point
    for your next Node.js API or an upgrade to your current project. Should you have
    suggestions for improvements, feel free to contribute by submitting PR for code
    or prompt updates.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 希望您在这里找到了一些灵感，并且这可以作为您下一个Node.js API或当前项目升级的起点。如果您有任何改进建议，请随时通过提交代码或提示更新的PR来贡献。
- en: If you enjoyed this article, feel free to clap or share your thoughts in the
    comments, whether ideas or questions. Thank you for reading, and happy experimenting!
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢这篇文章，请随意点赞或分享您的想法，无论是想法还是问题。感谢阅读，祝您实验愉快！
- en: '**UPDATE** [February 9, 2025]: The LLM-Codegen GitHub repository was updated
    with [DeepSeek API](https://github.com/vyancharuk/nodejs-todo-api-boilerplate/blob/master/llm-codegen/core/llmClients/deepSeekLLMClient.ts) support.
    It’s cheaper than `gpt-4o-mini` and offers nearly the same output quality, but
    it has a longer response time and sometimes struggles with API request errors.'
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
