- en: Why Science Must Embrace Co-Creation with Generative AI to Break Current Research
    Barriers
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么科学必须拥抱与生成式AI的共创以打破当前研究障碍
- en: 原文：[https://towardsdatascience.com/why-science-must-embrace-co-creation-with-generative-ai-to-break-current-research-barriers/](https://towardsdatascience.com/why-science-must-embrace-co-creation-with-generative-ai-to-break-current-research-barriers/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-science-must-embrace-co-creation-with-generative-ai-to-break-current-research-barriers/](https://towardsdatascience.com/why-science-must-embrace-co-creation-with-generative-ai-to-break-current-research-barriers/)
- en: <mdspan datatext="el1755876166838" class="mdspan-comment">This article builds</mdspan>
    on a dual perspective of a former pharmaceutical chemistry researcher and current
    AI developer, to explore what generative AI (GenAI) could bring to scientific
    research. While large language models (LLMs) are already transforming how developers
    write code and solve problems, their use in science remains limited to basic tasks.
    Yet, LLMs can also contribute to the reasoning process. Based on recent research
    and practical examples, the article argues that GenAI can act as a thinking partner
    in science and enable true human-AI co-creation, helping researchers make better
    strategic decisions, explore new perspectives, gain instant expert insights, and
    ultimately accelerate discovery.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755876166838" class="mdspan-comment">本文基于一位前药化研究员和当前AI开发者的双重视角，探讨生成式AI（GenAI）可能为科学研究带来的影响。虽然大型语言模型（LLMs）已经改变了开发者编写代码和解决问题的方法，但它们在科学中的应用仍然局限于基本任务。然而，LLMs也可以为推理过程做出贡献。基于最近的研究和实际案例，本文认为GenAI可以作为科学中的思考伙伴，实现真正的人机共创，帮助研究人员做出更好的战略决策，探索新的视角，获得即时专家见解，并最终加速发现。
- en: 'GenAI in science: The unexploited opportunity'
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 科学中的GenAI：未被充分利用的机会
- en: Over the past twenty years, I have lived through two very different careers.
    I began in academic research, starting with a PhD in organic chemistry, then gradually
    moving into pharmaceutical sciences, exploring parts of biology and even physics.
    Like many scientists, I followed research projects wherever they led, often across
    disciplines. Today, I work as an AI solution architect, helping companies integrate
    AI into their workflows. This dual experience gives me a unique perspective on
    what GenAI could bring to science.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的二十年里，我经历了两个截然不同的职业生涯。我始于学术研究，从有机化学的博士学位开始，然后逐渐转向药理学，探索生物学和物理学的一些领域。像许多科学家一样，我跟随研究项目
    wherever they led，经常跨越学科。如今，我作为一名AI解决方案架构师工作，帮助公司将其工作流程与AI整合。这种双重经验让我对GenAI可能为科学带来的影响有了独特的见解。
- en: At first, science and coding may seem very different. But they are not. Whether
    synthesizing a molecule or building a program, both are about assembling pieces
    into something coherent and purposeful. In both fields, it often feels like playing
    with Lego bricks.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 起初，科学和编程可能看起来非常不同。但实际上并非如此。无论是合成分子还是构建程序，两者都是将碎片组装成有连贯性和目的性的整体。在这两个领域，常常感觉就像是在玩乐高积木。
- en: What surprises me most today is how little GenAI is used in science. In just
    a few years and a handful of model generations, language models have already transformed
    tremendously how we write, program, and design. Developers widely use AI-assisted
    tools like GitHub Copilot or Cursor, usually to generate small pieces of code,
    carefully reviewed and integrated into larger projects. This has already boosted
    productivity by several-fold. Some of us go further, using GenAI as a creative
    partner. Not just for speed, but to organize ideas, test assumptions, explore
    new directions, and design better solutions.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 令我印象最深刻的是，如今GenAI在科学领域的应用如此之少。仅仅在几年内，通过几代模型，语言模型已经彻底改变了我们的写作、编程和设计方式。开发者广泛使用GitHub
    Copilot或Cursor等AI辅助工具，通常用于生成小块代码，经过仔细审查后集成到更大的项目中。这已经将生产力提高了数倍。我们中的一些人更进一步，将GenAI作为创意伙伴。这不仅是为了速度，还为了组织思想、测试假设、探索新方向和设计更好的解决方案。
- en: In contrast, science still treats language models as side tools, mostly for
    summarizing papers or automating routine writing. Data interpretation and reasoning
    remain largely untouched, as if the intellectual core of science must stay exclusively
    human. To me, this hesitation is a missed opportunity.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，科学仍然将语言模型视为辅助工具，主要用于总结论文或自动化常规写作。数据解释和推理仍然基本未受影响，仿佛科学的智力核心必须完全由人类掌握。对我来说，这种犹豫是一种错失的机会。
- en: 'When I share this with former colleagues, the same objection always comes:
    Language models sometimes hallucinate or give wrong answers. Yes, they do. So
    do humans, whoever they are. We expect language models to be flawless, while we
    do not expect that from our human peers. A scientist can be wrong. Top-tier studies
    are even sometimes retracted. That is why critical thinking exists, and it should
    apply to AI as well. We should treat LLMs the same way we treat people: Listen
    with curiosity and caution, verify and refine.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当我与前同事分享这些时，总是出现同样的反对意见：语言模型有时会产生幻觉或给出错误的答案。是的，它们确实会。人类也是如此，无论他们是谁。我们期望语言模型完美无缺，而我们并不期望人类同伴如此。科学家可能会犯错。顶级研究有时甚至会被撤回。这就是为什么批判性思维存在，它也应该适用于人工智能。我们应该像对待人类一样对待LLM：带着好奇心和谨慎倾听，验证和改进。
- en: Recent breakthroughs in AI “reasoning” show what is possible. Microsoft’s MAI-DxO
    system (Nori H. *et al.*, 2025) shows that a group of LLM-powered AI agents, working
    in a structured way, can outperform traditional medical diagnostics. Outperform.
    That does not mean doctors are obsolete, but it does show the immense value of
    AI feedback in decision-making.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能“推理”方面的最新突破展示了可能实现的事情。微软的MAI-DxO系统（Nori H. *et al.*, 2025）表明，一组由大型语言模型（LLM）驱动的AI代理，以结构化的方式工作，可以超越传统的医疗诊断。超越。这并不意味着医生已经过时，但它确实显示了人工智能在决策中的巨大价值。
- en: This is already happening, and it changes how we might structure reasoning itself.
    It is time to stop treating AI as a fancy calculator, and start seeing it as what
    it could be, a real thinking partner.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这种情况已经发生，并且它改变了我们构建推理本身的方式。是时候停止将人工智能视为一个花哨的计算器，而开始将其视为它可能成为的东西，一个真正的思考伙伴。
- en: Why scientific research is under pressure
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么科学研究承受压力
- en: 'Scientific research today faces enormous challenges: Laboratories around the
    world generate massive amounts of data, often faster than scientists can process,
    even within their specific field. On top of that, researchers juggle many responsibilities:
    teaching, supervising students, applying for funding, attending conferences and
    trying to keep up with the literature. This overload makes it increasingly hard
    to find time and focus.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的科学研究面临着巨大的挑战：世界各地的实验室产生的大量数据，往往比科学家能够处理的速度还要快，甚至在他们的特定领域内也是如此。除此之外，研究人员还要处理许多责任：教学、指导学生、申请资金、参加会议以及试图跟上文献。这种超负荷使得找到时间和集中精力变得越来越困难。
- en: Science is also becoming more interdisciplinary every day. Fields like pharmaceutical
    research, which I know well, constantly draw from chemistry, biology, physics,
    computation, and more. In my last academic project at ETH Zurich as a senior scientist,
    I worked with a biologist colleague on the identification of inhibitors of an
    RNA-protein interaction using a high-throughput *FRET* assay (Roos, M. ; Pradère,
    U. *et al.*, 2016). It involved concepts from physics (light absorption), organic
    chemistry (molecule synthesis), biochemistry (testing), and using complex robotic
    systems. Even with our complementary profiles, the task was overwhelming. Each
    scientific discipline has its own set of tools, language, and methods, and acquiring
    this knowledge requires significant cognitive effort.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 科学也正变得越来越跨学科。像药物研究这样的领域，我非常了解，它不断从化学、生物学、物理学、计算学等领域汲取知识。在我作为高级科学家在苏黎世联邦理工学院（ETH
    Zurich）的最后一个学术项目中，我与一位生物学家同事合作，使用高通量**FRET**检测法（Roos, M. ; Pradère, U. *et al.*,
    2016）来识别RNA-蛋白质相互作用的抑制剂。这涉及到物理学（光吸收）、有机化学（分子合成）、生物化学（测试）以及使用复杂的机器人系统。即使我们有互补的背景，这项任务仍然令人难以承受。每个科学学科都有其自己的工具、语言和方法，而获取这些知识需要巨大的认知努力。
- en: Research is also expensive and time-consuming. Experiments demand substantial
    human and financial resources. Global competition, shrinking budgets, and a slow
    and extensive peer-review process add more pressure. Labs must innovate faster,
    publish more, and secure funding constantly. Under these conditions, maintaining
    both the quality and originality of research is not just difficult, it is becoming
    almost heroic.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 研究也是昂贵且耗时的。实验需要大量的人力和财力资源。全球竞争、预算缩减、缓慢而广泛的同行评审过程增加了更多压力。实验室必须更快地创新、发表更多成果，并不断确保资金来源。在这些条件下，保持研究的质量和原创性不仅困难，几乎变得像英雄一样。
- en: Any tool that can help scientists manage data, think more clearly, access expertise
    across disciplines, explore ideas more freely, or simply save time and mental
    energy, deserves serious attention. GenAI has the potential to be exactly that
    kind of tool, one that can help scientists to push the frontiers of science even
    further.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 任何可以帮助科学家管理数据、更清晰地思考、跨学科获取专业知识、更自由地探索想法或简单地节省时间和精神能量的工具，都值得认真关注。GenAI 有可能正是这样的工具，它可以帮助科学家将科学的边界推进得更远。
- en: What co-creation with GenAI can actually change
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GenAI 共同创造实际上可以改变什么
- en: Embracing GenAI as a co-creator in scientific research has the potential to
    change not just how we write, search, or analyze, but how we think. It is not
    about automation, it is about expanding the cognitive space available to scientists.
    One of the most powerful benefits of working with language models is their ability
    to multiply perspectives instantly. A well-prompted model can bring together ideas
    from physics, biology, and chemistry in a single response, making connections
    that a scientist, specialist in one discipline, might overlook.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 将通用人工智能（GenAI）视为科学研究中的共同创造者，有可能改变的不只是我们写作、搜索或分析的方式，还有我们的思维方式。这不仅仅是关于自动化，而是关于扩展科学家可用的认知空间。与语言模型合作的最强大好处之一是它们能够瞬间倍增视角。一个良好提示的模型可以将来自物理学、生物学和化学的想法结合在一个单一回应中，建立一位学科专家可能忽视的联系。
- en: Recent studies show that, when properly guided, general-purpose language models
    can match or outperform domain-specific systems on certain tasks. They demonstrate
    an ability to integrate cross-disciplinary knowledge and support specialized reasoning,
    as shown in recent work on tagging, classification, and hypothesis generation
    (LLM4SR, Luo *et al.*, 2025).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 最近的研究表明，在适当引导下，通用语言模型在某些任务上可以匹配或超越特定领域的系统。它们显示出整合跨学科知识和支持专业推理的能力，正如在标签、分类和假设生成（LLM4SR，Luo
    等人，2025年）的最新工作中所展示的那样。
- en: 'Co-creation also enables faster and clearer hypothesis generation. Instead
    of analyzing a dataset in the usual way, a scientist can brainstorm with an LLM,
    explore “what if” questions, and test alternative directions in seconds. Controlled
    experiments show that large language models can generate research ideas of comparable
    quality to those of human researchers. In many cases, experts even judged them
    more novel or promising (Si *et al.*, 2024; Kumar *et al.*, 2024). While these
    studies focus on idea generation, they suggest a broader potential: That generative
    models could meaningfully assist in early-stage scientific reasoning, from designing
    experiments to exploring alternative interpretations or formulating hypotheses.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 共同创造还能使假设生成更快、更清晰。科学家不必像往常一样分析数据集，而是可以与一个语言模型进行头脑风暴，探索“如果”问题，并在几秒钟内测试替代方向。控制实验表明，大型语言模型可以生成与人类研究人员相当质量的研究想法。在许多情况下，专家甚至认为它们更具创新性或更有希望（Si
    等人，2024；Kumar 等人，2024）。虽然这些研究侧重于想法生成，但它们暗示了更广泛的可能性：生成模型可以在早期科学推理中发挥有意义的作用，从设计实验到探索替代解释或制定假设。
- en: Language models also bring a form of objective criticism. They have no ego (at
    least for now), no institutional or disciplinary bias and don’t defend their own
    ideas stubbornly. This makes them ideal for playing the role of a neutral devil’s
    advocate or providing fresh perspectives that challenge our assumptions.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型也带来了一种形式的客观批评。它们没有自我（至少目前如此），没有制度或学科偏见，并且不会固执地捍卫自己的观点。这使得它们非常适合扮演中立恶魔辩护者的角色，或者提供挑战我们假设的新视角。
- en: Equally important, GenAI can act as a structured memory of reasoning. Every
    hypothesis, fork of thought, or discarded path can be documented, revisited, and
    reused. Instead of relying on the incomplete notes of a postdoc that left years
    ago, the lab gains a durable, collective memory of its intellectual process.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 同样重要的是，GenAI 可以作为推理的结构化记忆。每一个假设、思维分支或被丢弃的路径都可以被记录、重新访问和重用。而不是依赖多年前离开的博士后留下的不完整笔记，实验室获得了一个持久、集体的知识过程记忆。
- en: Used this way, GenAI becomes far more than a scientific tool. It becomes a catalyst
    for broader, deeper, and more rigorous thinking.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式使用，GenAI 远不止是一个科学工具。它成为了一种催化剂，促进更广泛、更深入和更严谨的思考。
- en: 'Co-creating with GenAI: Collaboration, not delegation'
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与 GenAI 共同创造：合作而非委托
- en: Using GenAI in scientific research does not mean handing over control. It means
    working with a system that can help us think better, but not think for us. Like
    any lab partner, GenAI brings strengths and limitations, and the human remains
    responsible for setting the goals, validating the direction, and interpreting
    the outcomes.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在科学研究中使用GenAI并不意味着放弃控制权。这意味着与一个可以帮助我们更好地思考的系统合作，但不是为我们思考。就像任何实验室伙伴一样，GenAI带来了优势和局限性，而人类仍然负责设定目标、验证方向和解释结果。
- en: Some worry that language models might lead us to rely too much on automation.
    But in practice, they are most effective when they are guided, prompted, and challenged.
    As Shojaee *et al*. (2025, Apple) show in *The Illusion of Thinking*, recently
    under scrutiny (Lawsen A., 2025, Anthropic), LLMs may appear to reason well, but
    their performance drops significantly when the tasks become too complex. Without
    the right framing and decomposition, the output can easily be shallow or inconsistent.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 一些担心语言模型可能会让我们过度依赖自动化。但在实践中，它们在有指导、有提示和有挑战的情况下最为有效。正如Shojaee等人（2025，苹果）在《思考的错觉》一书中所展示的，最近受到关注（Lawsen
    A., 2025，Anthropic），LLM在看似合理推理时表现良好，但当任务变得过于复杂时，其性能会显著下降。没有正确的框架和分解，输出可能很容易变得肤浅或不一致。
- en: 'It means two things:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着两件事：
- en: 1\. **Generic LLMs cannot be used directly for complex scientific tasks.** They
    require specific orchestration, similar to frameworks like Microsoft’s MAI-DxO
    (Nori H. *et al.*, 2025), combined with state-of-the-art methods such as retrieval-augmented
    generation (RAG).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 1. **通用LLM不能直接用于复杂的科学任务。**它们需要特定的编排，类似于微软的MAI-DxO（Nori H.等人，2025）这样的框架，并结合最先进的方法，如检索增强生成（RAG）。
- en: 2\. **Co-creation is an active process.** The scientist must remain the conductor,
    deciding what makes sense, what to test, and what to discard, because the LLM
    can simply be wrong.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **共创是一个积极的过程。**科学家必须保持指挥者的角色，决定什么是有意义的，什么要测试，什么要放弃，因为LLM可能只是错误的。
- en: In a way, this mirrors how scientists interaction already works. We read publications,
    ask for feedback from colleagues, consult experts in other domains, and revise
    our thoughts along the way.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在某种程度上，这反映了科学家现有的互动方式。我们阅读出版物，向同事寻求反馈，咨询其他领域的专家，并在过程中修正我们的想法。
- en: Co-creating with GenAI follows the same logic, except that this “colleague”
    is always available, highly knowledgeable, and quick to offer alternatives.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 与GenAI共创遵循相同的逻辑，只是这个“同事”总是可用，知识渊博，并且能快速提供替代方案。
- en: 'From my experience as a developer, I often treat the language model as a creative
    partner. It doesn’t just generate code, it sometimes shifts my perspective and
    helps me avoid mistakes, accelerating my workflow. Once, when I struggled to transfer
    an audio file across web pages, the LLM suggested an entirely different approach:
    using IndexedDB. I hadn’t thought of it, yet it solved my problem more efficiently
    than my plan. Not only did “we” fix the issue, I also learned something new. And
    this happens on a daily basis, making me a better developer.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 从我的开发者经验来看，我经常将语言模型视为一个创意伙伴。它不仅仅生成代码，有时它还能改变我的视角，帮助我避免错误，从而加速我的工作流程。有一次，当我努力在网页间传输音频文件时，LLM建议了一种完全不同的方法：使用IndexedDB。我之前没有想过这个方法，但它比我原来的计划更有效地解决了我的问题。不仅“我们”解决了问题，我还学到了一些新东西。这种情况每天都在发生，让我成为一个更好的开发者。
- en: 'In science, I can imagine the same support. Designing a multi-step organic
    synthesis, the model might suggest:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在科学领域，我可以想象到同样的支持。设计一个多步有机合成时，模型可能会建议：
- en: “*Why not create the alkene with a cross-metathesis approach instead of a Wittig-Horner?
    The strong basic conditions of the latter might degrade your intermediate product.”*
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: “*为什么不尝试使用交叉代谢法而不是Wittig-Horner法来创建烯烃？后者强烈的碱性条件可能会降解你的中间产物。”*
- en: 'Not to mention the potential support for younger researchers:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 更不用说对年轻研究者的潜在支持：
- en: “*Pre-treat your silica gel with triethylamine before purification. Your hydroxyl
    protecting group is known to degrade under slight acidic conditions.”*
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: “*在纯化之前，用三乙胺预处理硅胶。你的羟基保护基团已知在轻微酸性条件下会降解。”*
- en: 'Such timely and precise advice could save weeks of work. But the real value
    comes when one engages with the model critically: testing, questioning, asking
    it to challenge our own reasoning. Used this way, GenAI becomes a mirror for our
    thoughts and a challenger to our assumptions. It does not replace scientific reasoning,
    it sharpens it, making it more deliberate, better documented, and more creative.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这样的及时和精确的建议可以节省数周的工作。但真正的价值在于与模型进行批判性的互动：测试、质疑、要求它挑战我们的推理。以这种方式使用，GenAI 成为我们思想的镜子，对我们假设的挑战者。它并不取代科学推理，而是使它更加深思熟虑、记录更完整、更具创造性。
- en: Enhancing the scientific method without changing its principles
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在不改变其原则的情况下增强科学方法
- en: 'GenAI does not replace the scientific methodology. It respects its core pillars :
    Hypothesis, experimentation, interpretation, peer-review. It has the potential
    to strengthen and accelerate each one of them. It is not about changing how science
    works, but to support the process at every step:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI 并不取代科学方法论。它尊重其核心支柱：假设、实验、解释、同行评审。它有潜力加强和加速每一个环节。这并不是要改变科学的工作方式，而是要在每个步骤上支持这个过程：
- en: '**Hypothesis generation**: GenAI can help generate a broader range of hypotheses
    by offering new perspectives or transversal point of views. It can challenge assumptions
    and propose alternative angles.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**假设生成**：GenAI 可以通过提供新的视角或横向观点来帮助生成更广泛范围的假设。它可以挑战假设并提出替代角度。'
- en: '**Experiment selection**: It can help prioritize experiments based on feasibility,
    cost, potential impact, or novelty. Recent frameworks such as the AI Scientist
    (Lu *et al.*, 2024) or ResearchAgent (Baek *et al.*, 2025), already explore this
    by mapping possible experimental paths and ranking them by scientific value.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实验选择**：它可以帮助根据可行性、成本、潜在影响或新颖性来优先考虑实验。最近的框架，如 AI Scientist（Lu 等人，2024）或 ResearchAgent（Baek
    等人，2025），已经通过映射可能的实验路径并按科学价值对其进行排名来探索这一点。'
- en: '**Data analysis and interpretation**: GenAI can detect patterns, anomalies,
    or suggest interpretations that may not be obvious to researchers. It can also
    connect findings with related studies, link to lab data of a colleague, or highlight
    possible confounding variables.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据分析与解释**：GenAI 可以检测模式、异常或提出可能对研究人员不明显解释。它还可以将发现与相关研究联系起来，链接到同事的实验室数据，或突出可能的混杂变量。'
- en: '**Peer-review simulation**: It can reproduce the type of dialogue that occurs
    in lab meetings or peer-review publication process. By simulating expert personas
    (chemist, biologist, data scientist, toxicologist, etc.), it can provide structured
    feedback from different perspectives early in the research cycle.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**同行评审模拟**：它可以重现实验室会议或同行评审出版过程中发生的对话类型。通过模拟专家角色（化学家、生物学家、数据科学家、毒理学家等），它可以在研究周期的早期提供来自不同角度的结构化反馈。'
- en: The scientific method is not fixed, it evolves with new tools. Just as computers,
    statistics, and molecular modeling transformed scientific practice, GenAI can
    add new structure, speed, and diversity of thought. Most importantly, it can preserve
    a full memory of reasoning. Every hypothesis, decision, or branch of exploration
    can be documented and revisited. This level of transparent and auditable thinking
    is exactly what modern science needs to strengthen reproducibility and trust.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 科学方法并非一成不变，它会随着新工具的发展而演变。正如计算机、统计学和分子建模改变了科学实践一样，GenAI 可以增加新的结构、速度和思维多样性。最重要的是，它可以保留推理的完整记忆。每一个假设、决策或探索分支都可以被记录并重新审视。这种透明和可审计的思维方式正是现代科学所需要的，以加强可重复性和信任。
- en: Early proof-of-concept results of GenAI in science
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GenAI 在科学中的早期概念验证结果
- en: The potential of GenAI in science is not just a theory, it has already been
    demonstrated. Several studies by teams from leading research groups over the past
    two years have shown how GenAI can generate and refine solid scientific hypotheses,
    help with experiment planning and data interpretation.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI 在科学中的潜力不仅仅是一个理论，它已经被证明。过去两年中，来自领先研究小组的几个团队的研究已经展示了 GenAI 如何生成和细化可靠的科学假设，帮助进行实验计划和数据分析。
- en: SciMON (Wang *et al.*, 2024) evaluated the ability of language models to propose
    new research ideas using retrieval from scientific literature and an LLM. This
    system starts from a scientific context, retrieves relevant knowledge, and generates
    ideas. The ideas are then filtered for novelty and plausibility, eventually enriched
    and evaluated by human experts. Many were judged as original and promising.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: SciMON（Wang *et al.*，2024）评估了语言模型使用从科学文献检索和LLM提出新研究想法的能力。该系统从科学背景开始，检索相关知识，并生成想法。然后，这些想法被过滤以检查新颖性和可能性，最终由人类专家丰富和评估。其中许多被认为原创且有希望。
- en: Similarly, SciMuse (Gu & Krenn, 2024) used a large knowledge graph (58 million
    publications) and an LLM (GPT-4) to suggest new research ideas. After analysing
    a scientist’s publications, the framework selected related concepts and proposes
    possible projects and collaborations. In total, 4,400 SciMuse generated ideas
    were evaluated by over 100 research group leaders. About a quarter were rated
    as very interesting, showing that GenAI can help identify unexpected promising
    research directions.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，SciMuse（Gu & Krenn，2024）使用了一个大型知识图谱（5800万篇出版物）和一个LLM（GPT-4）来提出新的研究想法。在分析一位科学家的出版物后，该框架选择了相关概念，并提出了可能的项目和合作。总共有4,400个SciMuse生成的想法被超过100位研究小组负责人评估。其中约四分之一被评为非常有趣，这表明生成式AI可以帮助识别意想不到的有希望的研究方向。
- en: The recent ResearchAgent framework (Baek *et al.*, 2025) goes beyond single-step
    idea generation. It uses multiple LLM-powered reviewing agents to iteratively
    refine ideas. An initial set of hypotheses is generated from the literature, then
    improved through several cycles of feedback and modification. Expert evaluations
    confirmed that many of the final ideas were not only relevant but genuinely novel,
    reinforcing the results of the previous frameworks.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 最近的研究代理框架（Baek *et al.*，2025）超越了单步想法生成。它使用多个由LLM驱动的审查代理来迭代地完善想法。一组初始假设从文献中生成，然后通过几个反馈和修改周期进行改进。专家评估确认，许多最终的想法不仅相关，而且真正新颖，这加强了先前框架的结果。
- en: 'An even more ambitious project is the AI Scientist (Lu *et al.*, 2024, Yamada,
    Y. *et al.*, 2025), a framework aiming at fully automating the research process.
    In its first version, hypotheses were generated from scientific literature and
    tested through simulated environments or computational benchmarks. The second
    version extended it by incorporating feedback from automated laboratory experiments,
    showing a path toward fully autonomous scientific discovery. This system was not
    only a proof of concept: it actually produced three scientific publications accepted
    at peer-reviewed conferences. One of them was even selected for a major workshop
    in synthetic biology. Of course, such autonomy is only possible in domains where
    experiments can be conducted entirely in-silico. And beyond feasibility, it is
    not obvious that full automation is even desirable, since it raises important
    ethical and epistemological questions about the role of human judgment in science.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更加雄心勃勃的项目是AI科学家（Lu *et al.*，2024，Yamada，Y. *et al.*，2025），这是一个旨在完全自动化研究过程的框架。在其第一个版本中，假设是从科学文献中生成的，并通过模拟环境或计算基准进行测试。第二个版本通过纳入来自自动化实验室实验的反馈来扩展它，展示了通往完全自主科学发现的途径。这个系统不仅是一个概念验证：它实际上产生了三篇在同行评审会议上被接受的科学出版物。其中之一甚至被选为合成生物学的一个主要研讨会。当然，这种自主性仅在实验可以完全在虚拟环境中进行的领域才可能。而且，除了可行性之外，全自动化甚至是否可取并不明显，因为它提出了关于科学中人类判断作用的重大伦理和认识论问题。
- en: Together, these works demonstrate that, with proper organisation, GenAI can
    support scientific creativity and reasoning in a structured and credible way.
    This goes far beyond data exploitation and underlines a coming paradigm shift
    in how science will be conducted in the coming years.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，这些工作表明，通过适当的组织，生成式AI可以以结构化和可信的方式支持科学创造力和推理。这远远超出了数据利用，并强调了未来几年科学将如何进行的即将到来的范式转变。
- en: The risks of ignoring this transition
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 忽略这一转变的风险
- en: Scientific knowledge is growing faster than ever and becoming increasingly interconnected
    across disciplines. It is more challenging than ever to stay current with new
    discoveries and, above all, original in your research. Choosing to discard AI
    assistance may widen the gap between what the researcher knows and what has been
    discovered, reducing its ability to fully process and interpret its own data efficiently
    and to innovate. Institutions that delay adoption risk falling behind not only
    in productivity, but also in creativity and impact.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 科学知识正在以前所未有的速度增长，并在学科间变得越来越相互关联。跟上新的发现和，最重要的是，在研究中保持原创性，比以往任何时候都更具挑战性。选择放弃AI辅助可能会扩大研究人员所知与已发现内容之间的差距，降低其高效处理和解释自身数据的能力，以及创新能力。那些推迟采用的组织不仅可能在生产力上落后，还可能在创造力和影响力上落后。
- en: Software development already shows how GenAI integration in the workflow leads
    to massive efficiency gains. Those who resist using AI tools are now significantly
    less productive than those who embrace them. They also struggle to keep up with
    an evolving toolchain. Science has no reason to be different.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 软件开发已经展示了GenAI在流程中的集成如何导致巨大的效率提升。那些抵制使用AI工具的人现在与那些接受它们的人相比，生产力显著降低。他们也难以跟上不断发展的工具链。科学没有理由与众不同。
- en: 'Waiting for flawless AI tools for science is neither realistic nor necessary.
    Scientific practice has always advanced through imperfect but promising technologies.
    What matters is adopting innovation critically and responsibly, enhancing productivity
    and creativity without compromising scientific rigor. Developers face this challenge
    every day: Producing code faster with GenAI while maintaining standards of quality
    and robustness.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 等待完美的AI工具用于科学既不现实也不必要。科学实践始终是通过不完美但充满希望的技术不断进步的。重要的是批判性地、负责任地采用创新，在不损害科学严谨性的情况下提高生产力和创造力。开发者每天都在面对这个挑战：使用GenAI更快地生成代码，同时保持质量和稳健性标准。
- en: The real risk is not using GenAI too early, but being left behind when others
    have already built strong workflows and expertise with it. Competing with research
    teams that use GenAI effectively will become increasingly difficult and soon,
    impossible without similar tools.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的风险不是GenAI使用得太早，而是在其他人已经利用它建立了强大的工作流程和专业知识时，自己却被落下。与有效使用GenAI的研究团队竞争将变得越来越困难，很快，没有类似工具将无法做到这一点。
- en: It’s time for science to partner with GenAI
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 是时候让科学与GenAI合作了
- en: The question is no longer whether GenAI will change science, but when researchers
    will be ready to evolve and work with it. The sooner we begin treating GenAI as
    a reasoning partner, the sooner we can unlock its full potential and push the
    frontiers of discovery further, at a time when the pace of progress is slowing
    down.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 问题已不再是GenAI是否会改变科学，而是研究人员何时准备好进化并与它一起工作。我们越早开始将GenAI视为一个推理伙伴，就越快能够释放其全部潜力，并在进步速度放缓的时期进一步推动发现的前沿。
- en: Recent studies have highlighted the growing concern across scientific disciplines
    of the diminishing disruptiveness of new discoveries. Bloom *et al.* (2020) showed
    that despite increasing investments in R&D, scientific productivity is declining.
    Park *et al.* (2022) further demonstrated that scientific publications and patents
    have become less disruptive over time, pointing to a systemic “slowdown” in the
    generation of novel ideas.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 近期的研究突显了科学各学科对新的发现减少破坏力的日益关注。Bloom等人（2020年）表明，尽管研发投资不断增加，但科学生产力却在下降。Park等人（2022年）进一步证明了科学出版物和专利随着时间的推移变得越来越不具有破坏性，这指向了在产生新想法方面的系统性“放缓”。
- en: These findings underline the need to rethink how research is conducted. GenAI
    assistance could offer the powerful lever research needs to counter this decline,
    helping explore broader spaces of ideas, bridge disciplines, and push thinking
    beyond its current limits. It is not meant to be a shortcut, it is a catalyst.
    By embracing GenAI as a co-creator, we may be able to reverse the negative trend
    and enter a new phase of exploration, one marked not by diminishing returns, but
    by renewed ambition and breakthrough thinking.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这些发现强调了重新思考研究方式的需要。GenAI的辅助可以提供研究需要的强大杠杆，帮助探索更广泛的思想空间，跨越学科，推动思维超越其当前的限制。它不是捷径，而是一个催化剂。通过将GenAI视为共同创造者，我们可能能够扭转负面趋势，进入一个以新的雄心和突破性思维为标志的新探索阶段。
- en: I don’t say this as an outsider. As a developer, I have experienced this shift
    firsthand. At first, GenAI integration in software development tools was far from
    perfect (and it is still not). But over time it has become a true cognitive copilot,
    something I rely on daily, not just to write code, but to solve problems, test
    ideas, and accelerate my reasoning. I am convinced the same transformation can
    happen in science. Not at the experimental level, since most scientists experiments
    are not in-silico, but as a reasoning amplifier, embedded in the early stages
    of the scientific process. It won’t be immediate, and it won’t be without friction.
    But it will happen, because the potential is simply too great to ignore.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不是作为局外人这么说。作为一名开发者，我亲身体验了这种转变。起初，通用人工智能在软件开发工具中的集成远非完美（而且现在仍然不是）。但随着时间的推移，它已经变成了一位真正的认知副驾驶，我每天都要依赖它，不仅是为了编写代码，也是为了解决问题、测试想法和加速我的推理。我相信这种变革也会在科学领域发生。不是在实验层面，因为大多数科学家的实验都不是在硅中进行的，而是作为推理放大器，嵌入到科学过程的早期阶段。这不会立即发生，也不会没有摩擦。但它会发生，因为潜力太大了，无法忽视。
- en: 'One common fear is that GenAI might make us intellectually lazy. But this concern
    is not new. When calculators became widespread, many worried we would lose our
    ability to do mental arithmetic. And in a way, they were right, we do fewer calculations
    “by hand”. But we also gained something far more valuable: The ability to model
    complexity and expand the reach of applied mathematics. The same is true for GenAI.
    It may reshape the way we think, but it also frees us to focus on higher-order
    reasoning, not by replacing our intelligence, but by extending what we can do
    with it.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 一个普遍的担忧是，通用人工智能（GenAI）可能会让我们变得智力懒惰。但这种担忧并不新鲜。当计算器变得普遍时，许多人担心我们会失去进行心算的能力。从某种意义上说，他们是正确的，我们“手动”计算得少了。但我们也获得了更宝贵的东西：建模复杂性和扩展应用数学范围的能力。对于通用人工智能也是如此。它可能会重塑我们的思维方式，但它也让我们能够专注于更高层次的推理，不是通过取代我们的智慧，而是通过扩展我们能够用它做的事情。
- en: Now is the time for scientists, institutions, and funders to embrace this new
    partner, and imagine what becomes possible when we reason with GenAI, not after
    it.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是科学家、机构和资助者拥抱这个新伙伴的时候了，想象一下当我们与通用人工智能推理而不是在它之后推理时，可能发生什么。
- en: The architecture of a new research paradigm
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 新研究范式的架构
- en: GenAI is not a plug-and-play solution. Unlocking its potential for scientific
    research requires more than a powerfull LLM and clever prompts. It demands deliberate
    system design aligned with scientific goals, methodical strategies to guide the
    reasoning, and deep integration into the actual research workflow itself.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 通用人工智能不是一个即插即用的解决方案。释放其在科学研究中的潜力需要不仅仅是强大的大型语言模型（LLM）和巧妙的提示。它需要与科学目标相一致的有意为之的系统设计，以及指导推理的系统性策略，以及深入到实际研究工作流程本身。
- en: 'Here are three directions that, to my view, hold the greatest promise:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，以下三个方向具有最大的潜力：
- en: '**Build scientific copilots that understand data in context.** AI tools must
    go beyond answering questions, they should actively assist in exploring experimental
    results. By integrating lab-specific data, historical context, and domain knowledge
    they could highlight subtle patterns, detect inconsistencies, or suggest the next
    best experiment. The goal is not automation, but deeper insight, achievable through
    a combination of fine-tuned models and advanced retrieval-augmented generation
    (RAG) techniques.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**构建能够理解上下文数据的科学副驾驶**。AI工具必须超越回答问题，它们应该积极协助探索实验结果。通过整合特定实验室的数据、历史背景和领域知识，它们可以突出细微的模式、检测不一致性或提出下一个最佳实验。目标不是自动化，而是更深入的洞察，这可以通过微调模型和高级检索增强生成（RAG）技术的结合来实现。'
- en: '**Create multi-agent frameworks to simulate expert dialogue.** Scientific progress
    is rarely the product of a single viewpoint. It emerges from comparing, combining,
    and challenging different disciplinary perspectives. GenAI now makes it possible
    to simulate this by creating multiple expert agents, each reasoning from a different
    scientific lens and challenging each other’s assumptions. This offers a new form
    of interdisciplinary exchange, continuous, reproducible, and unconstrained by
    time, availability, or disciplinary boundaries. Microsoft’s MAI-DxO (Nori H. *et
    al.*, 2025) is a proof of concept.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建多智能体框架以模拟专家对话。** 科学进步很少是单一观点的产物。它源于比较、结合和挑战不同的学科视角。现在，通过创建多个专家智能体，每个智能体从不同的科学视角进行推理并挑战彼此的假设，GenAI使得这种模拟成为可能。这提供了一种新的跨学科交流形式，持续、可复制，不受时间、可用性或学科界限的限制。微软的MAI-DxO（Nori
    H. *等*，2025）是一个概念验证。'
- en: '**Use GenAI to explore, not just to automate or optimize.** Most current AI
    tools aim to streamline tasks. Science, however, also needs tools that diverge,
    that help generate unexpected ideas, ask out-of-the-box questions, and challenge
    foundational assumptions. Prompting strategies like tree-of-thought or role-based
    agent “reasoning” can push scientists in directions they wouldn’t normally reach
    on their own.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用GenAI进行探索，而不仅仅是自动化或优化。** 大多数当前的AI工具旨在简化任务。然而，科学也需要能够发散思维的工具，帮助产生意外的想法，提出非传统问题，并挑战基础假设。像思维树或基于角色的智能体“推理”这样的提示策略可以推动科学家走向他们自己通常不会达到的方向。'
- en: Together, these approaches suggest a future where GenAI does not replace scientific
    reasoning, but expands it. This is no longer speculative, it is already being
    explored. What is missing now are the infrastructure, the openness, and the mindset
    to bring them into the core of scientific practice.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这些方法共同表明，未来GenAI不会取代科学推理，而是会扩展它。这不再是推测性的，它已经被探索。现在所缺少的是基础设施、开放性和心态，将它们带入科学实践的核心。
- en: Ethics, trust, and the need for open infrastructure
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 伦理、信任和开放基础设施的需求
- en: 'As GenAI becomes more deeply embedded in the scientific work, another “dimension”
    needs to be addressed: One that touches on trust, openness, confidentiality and
    responsibility. Generic LLMs are mostly “black boxes” trained with worldwide data,
    without the ability to distinguish between reliable and unreliable information.
    They can contain biases, produce confident hallucinations, and obscure the reasoning
    behind their outputs. Confidentiality also becomes a major concern when working
    with sensitive research data.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 随着GenAI在科学工作中的深入嵌入，另一个“维度”需要被解决：它涉及到信任、开放性、机密性和责任。通用的LLM主要是用全球数据训练的“黑箱”，没有区分可靠和不可靠信息的能力。它们可能包含偏见，产生自信的幻觉，并掩盖其输出的推理过程。当处理敏感研究数据时，机密性也成为了一个主要问题。
- en: These risks are not specific to science but amplified by the complexity and
    rigour that scientific research requires. In science, reproducibility, auditability,
    and methodological rigour are non-negotiable, which means that AI systems must
    be inspectable, adaptable, and improvable. This makes open infrastructure not
    just a preference but a scientific necessity.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这些风险并不仅限于科学，而是由于科学研究所需的复杂性和严谨性而被放大。在科学中，可重复性、可审计性和方法论的严谨性是不可协商的，这意味着AI系统必须是可检查的、可适应的和可改进的。这使得开放基础设施不仅仅是一种偏好，而是一种科学必要性。
- en: Ideally, every laboratory would run its own GenAI infrastructure. In practice,
    however, only a few will ever have the resources (time, expertise and money) to
    handle that level of complexity. A trusted intermediary, whether a public institution
    or a mission-driven company, will need to shoulder this responsibility, guided
    by clear and transparent requirements. Models used in research should be open-source,
    or at least fully auditable; prompts and intermediate outputs traceable; training
    datasets documented and, whenever feasible, shared. Ultimately, robust infrastructure
    will be needed at the national or institutional level to ensure data ownership
    and governance remain under control.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，每个实验室都会运行自己的GenAI基础设施。然而，在实践中，只有少数实验室会拥有处理这种复杂性的资源（时间、专业知识和资金）。一个值得信赖的中介机构，无论是公共机构还是以使命为导向的公司，都需要承担这一责任，并遵循明确和透明的要求。用于研究中的模型应该是开源的，或者至少是完全可审计的；提示和中间输出应该是可追溯的；训练数据集应该有文档记录，并在可行的情况下共享。最终，在国家级或机构级需要建立稳健的基础设施，以确保数据所有权和治理保持可控。
- en: 'Without this level of “openness”, the risk is to create a new kind of scientific
    “black box”. One that may accelerate results in the short term but also prevents
    full understanding. In science, where understanding is so essential, this would
    be highly detrimental. I have witnessed this in software development: if the AI
    generated code is not fully audited by the team, technical debt accumulates until
    it becomes extremely difficult to implement new features and maintain. We cannot
    afford to let science fall into a similar trap.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 没有这种程度的“开放性”，风险是创造一种新的科学“黑箱”。这种黑箱可能在短期内加速结果，但同时也阻碍了全面的理解。在理解如此重要的科学领域，这将是非常有害的。我在软件开发中见证了这一点：如果AI生成的代码没有被团队彻底审计，技术债务就会积累，直到实施新功能和维护变得极其困难。我们不能让科学陷入类似的陷阱。
- en: Trust in GenAI will not come from blind adoption, but from responsible integration.
    AI tools must be shaped to fit scientific standards, not the other way around.
    And while some training can help, scientists, naturally curious and adaptive,
    will likely learn to use these tools as they once did with the internet, software,
    etc..
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 对通用人工智能（GenAI）的信任不会来自盲目的采用，而是来自负责任的整合。AI工具必须被塑造以适应科学标准，而不是相反。虽然一些培训可能会有所帮助，但科学家们，由于天生好奇和适应性强，很可能会像以前使用互联网、软件等一样学会使用这些工具。
- en: In the long run, the credibility of GenAI-augmented science will depend on this
    transparency. Openness is not just a technical requirement, it is a matter of
    scientific ethics.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 从长远来看，GenAI增强科学的可信度将取决于这种透明度。开放性不仅仅是一个技术要求，它是一个科学伦理问题。
- en: 'Conclusion: Science can’t afford to wait, but it must use GenAI responsibly.'
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论：科学不能等待，但必须负责任地使用GenAI。
- en: 'Scientists should not see GenAI as a threat to their role, nor as a source
    of absolute truth. It should be considered a collaborator: One that works tirelessly,
    provides instant access to broad expertise and constructive criticism.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 科学家们不应将GenAI视为对其角色的威胁，也不应将其视为绝对真理的来源。它应该被视为一个合作伙伴：一个不知疲倦地工作、提供即时访问广泛的专业知识和建设性批评的合作伙伴。
- en: The scientific methodology does not need to be replaced but it can be extended,
    enriched, and accelerated by GenAI. Not just by tools that automate tasks, but
    by systems that help us ask sharper questions, consider alternative perspectives,
    test bolder hypotheses, and engage more deeply with complexity.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 科学方法论不需要被取代，但它可以通过GenAI得到扩展、丰富和加速。这不仅包括自动化任务的工具，还包括帮助我们提出更尖锐的问题、考虑不同的观点、测试更大胆的假设，以及更深入地与复杂性互动的系统。
- en: Yes, the risks of misinformation are real but errors or superficial outputs
    are inherent to both human and artificial collaborators. As with any methodology
    in science, what matters most is applying it with rigor and critical thinking.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，错误信息的风险是真实存在的，但错误或表面化的输出对于人类和人工智能协作者来说都是固有的。正如科学中的任何方法一样，最重要的是以严谨和批判性思维来应用它。
- en: Yes, the risks of becoming more passive in our process of creation and reasoning
    are real too. Similarly, it is our responsibility to use GenAI wisely as an amplifier
    of our thoughts and not a substitute.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，在创作和推理过程中变得更加被动的风险也是真实存在的。同样，我们有责任明智地使用GenAI作为我们思想的放大器，而不是替代品。
- en: In my experience as a developer, co-creating with GenAI has transformed how
    problems are approached and solved. With a scientific background, I am convinced
    that research can follow a similar trajectory. Different, because most scientific
    experiments remain in human hands, while code can already be written by AI, but
    perhaps even more profound on the approach, given the exploratory nature and inherent
    complexity of science.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在我作为开发者的经验中，与GenAI共创已经改变了我们处理和解决问题的方法。凭借科学背景，我坚信研究可以遵循类似的轨迹。不同之处在于，大多数科学实验仍然掌握在人类手中，而代码可以由AI编写，但也许在方法上更为深刻，考虑到科学的探索性和固有的复杂性。
- en: Trust in GenAI-augmented science depends on transparency, accountability, and
    reliability. It requires open and auditable AI systems trained on quality data
    with specifically designed architecture and supported by infrastructures that
    respect data sovereignty. Scientists must retain the intellectual authority, remaining
    the guiding force of results interpretation and reasoning.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 对GenAI增强科学的信任取决于透明度、问责制和可靠性。它需要开放且可审计的AI系统，这些系统在质量数据上进行了训练，具有专门设计的架构，并得到尊重数据主权的基础设施的支持。科学家必须保持知识权威，继续成为结果解释和推理的指导力量。
- en: What we need now is concrete implementation with purposely built tools for science,
    as well as researchers willing to explore, test, and shape new ways of thinking.
    Institutions must support this transition, not with rigid expectations, but with
    space for iteration.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在需要的是具体实施，使用专门为科学构建的工具，以及愿意探索、测试和塑造新思维方式的科研人员。机构必须支持这一转型，而不是用僵化的期望，而是留出迭代的空间。
- en: Ultimately, the next frontier of science is not only knowledge itself, but the
    new methods we create to generate it.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，科学的下一个前沿不仅包括知识本身，还包括我们创造的新方法来生成它。
