spdf-e17bc7ed-b5d3-4918-9f57-65223e010838&sid=89ab90a13a50a84cd41b2b39bbac2f058eeagxrqb&type=client&tsoh=d3d3LnNjaWVuY2VkaXJlY3QuY29t&rh=d3d3LnNjaWVuY2VkaXJlY3QuY29t&ua=100c5857005d505d56&rr=97f2683179b746d5&cc=sk),
    [3](https://www.pnas.org/doi/epdf/10.1073/pnas.1805363115)) have emerged that
    algorithmic features may compromise the randomness of assignment. This creates
    **“divergent delivery”**: ad A gets shown to one type of audience (e.g., more
    men, or people with certain interests), while ad B gets shown to another type.
    Any difference in CTRs or conversions can’t be attributed purely to the ad creative.
    It’s confounded with how the algorithm delivered the ads. On Google Ads, Conversion
    Lift typically requires enablement by a Google account representative. On Meta,
    eligible advertisers can run self-serve Conversion Lift tests in Ads Manager (subject
    to spend and conversion prerequisites).'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Geo-RCTs (Randomized Geo Experiments)** use geographies as the unit of analysis
    **with random assignment** to treatment and control. There is no need for individual-level
    tracking, but you need a **sufficiently large** number of geos to achieve statistical
    power and confident results. Because assignment is randomized, you **don’t build
    a synthetic control** as you do in the next type of experiment.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**地理随机对照试验（随机地理实验）**使用地理区域作为分析单位，**随机分配**给治疗组和对照组。无需进行个体层面的跟踪，但需要足够多的地理区域来实现统计功效和可靠的结果。由于分配是随机的，因此您不需要像在下一类实验中那样构建合成控制。'
- en: 'The **Quasi Geo-Lift Experiment** approaches the same question using geos as
    the units of analysis, with no need for individual-level tracking. Unlike Geo-RCTs
    that require randomization and more geos, this quasi-experimental approach offers
    three key advantages with no required randomization needed: it **a)** **works
    well with fewer geographies** (no need for many geos as with Geo-RCTs), **b)**
    **enables** **strategic market selection** (direct control over where and when
    treatment is applied based on business priorities), and **c)** **accommodates**
    **retrospective analysis and staggered rollouts** (if your campaign already launched
    or must roll out in waves for operational reasons, you can still measure incrementality
    after). The synthetic control is constructed to match pre-intervention trends
    and characteristics of the treatment unit, so any differences after treatment
    begins can be attributed to the campaign’s incrementality. **But**: successful
    execution requires strong alignment between analytics and performance marketing
    teams to ensure proper implementation and interpretation.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**准地理提升实验**使用地理区域作为分析单位，无需进行个体层面的跟踪。与需要随机化和更多地理区域的地理随机对照试验（Geo-RCTs）不同，这种准实验方法提供了三个关键优势，无需进行随机化：它
    **a)** **适用于较少的地理区域**（无需像 Geo-RCTs 那样需要许多地理区域），**b)** **允许** **战略市场选择**（根据业务优先级直接控制治疗的应用地点和时间），**c)**
    **适应** **回顾性分析和分阶段推出**（如果您的活动已经启动或必须因运营原因分阶段推出，您仍然可以测量增量）。合成控制构建以匹配干预前治疗单元的趋势和特征，因此干预开始后的任何差异都可以归因于活动的增量。**但是**：成功的执行需要分析和绩效营销团队之间有强大的协调，以确保适当的实施和解释。'
- en: The benefits of the ***Quasi Geo-Lift Experiment*** are great. So to help you
    understand when you might use a quasi-experiment in your marketing science function,
    let’s consider the following example below.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 准地理提升实验的好处很大。为了帮助您了解在您的营销科学职能中何时可能使用准实验，让我们考虑以下示例。
- en: '* * *'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Quasi Geo-Lift Experiment Example
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准地理提升实验示例
- en: '![](../Images/4ec24b7746759e7e92aae893449f827f.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4ec24b7746759e7e92aae893449f827f.png)'
- en: '***Fig. 2:*** *Quasi-Experiment example summary (source: own production)*'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '***图 2:*** *准实验示例总结（来源：自行制作）*'
- en: '*Consider a ride-hailing company such as Bolt evaluating a new channel in Poland.
    The business has had a new channel on radar for some time and now wants to test
    it out. There is a need to understand how a potentially new campaign on this new
    channel called TweetX affects rides, and what minimum budget is required to detect
    the impact. The available dataset is a daily ride panel covering 13 Polish cities
    starting in 2022\. The proposed start date is 2023–09–18, and activation can be
    national or city-based. Practical constraints are present: users cannot be enrolled
    into individual treatment and control groups, since the new channel campaign targets
    only new riders. This rules out user-level A/B testing. Additionally, privacy
    conditions prevent reliance on tracking-based attribution. Historical priors from
    other channels in Poland suggest a cost per ride between €6 and €12, CPMs between
    €2 and €4, and an average profit per ride of €6\. A recent benchmark monthly budget
    for a comparable channel, Snapcap, was a maximum of €5,000/month.*'
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*考虑一家如 Bolt 的打车公司正在波兰评估一个新渠道。该业务已经关注这个新渠道一段时间，现在想要对其进行测试。需要了解这个名为 TweetX 的新渠道可能进行的营销活动对打车的影响，以及检测这种影响所需的最小预算。可用的数据集是一个覆盖
    13 个波兰城市，从 2022 年开始的每日打车面板。建议的起始日期是 2023-09-18，激活可以是全国性的或基于城市的。存在实际限制：由于新渠道营销活动仅针对新用户，因此无法将用户纳入个别治疗组和对照组，这排除了用户级别的
    A/B 测试。此外，隐私条件阻止了基于跟踪的归因的依赖。波兰其他渠道的历史先验表明，每趟行程的成本在 6 欧元到 12 欧元之间，CPM 在 2 欧元到 4
    欧元之间，平均每趟行程的利润为 6 欧元。一个类似渠道 Snapcap 的最近基准月预算最高为 5000 欧元/月。*'
- en: These conditions favor a quasi-experimental geo design that measures business
    outcomes directly, **without** **relying** on user-level tracking or dependencies
    on platforms like Meta or Google, but instead using commonly available historical
    data such as rides, sales, conversions, or leads.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这些条件有利于采用直接测量业务成果的准实验地理设计，**不** **依赖** **用户级跟踪** 或依赖 Meta 或 Google 等平台，而是使用常见的可用历史数据，如行程、销售额、转化或潜在客户。
- en: To perform the Geo-Lift test with a synthetic control group design on our example,
    we will use the [**GeoLift**](https://facebookincubator.github.io/GeoLift/docs/GettingStarted/Walkthrough/)
    package in R, developed by Meta. The [**dataset**](https://docs.google.com/spreadsheets/d/1narvszl2XL_0f7A53DIGjBBbWMK2aH8g-VCRGaLGpdA/edit?usp=sharing)
    I will be using is structured as daily ride counts across 13 cities in Poland.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的示例中，为了执行具有合成控制组设计的地理提升测试，我们将使用 Meta 开发的 R 包 [**GeoLift**](https://facebookincubator.github.io/GeoLift/docs/GettingStarted/Walkthrough/)。我将使用的数据是按波兰
    13 个城市的每日行程计数结构化的。
- en: '![](../Images/fde1ed9ec2214606d1c0f211ef6a77d8.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fde1ed9ec2214606d1c0f211ef6a77d8.png)'
- en: '***Fig. 3:*** *Dataset for Quasi Geo-Lift Experiment* *(source: own production)*'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '***图 3：*** *准地理提升实验数据集* *(来源：自行生产)*'
- en: Best practices for your data when using a Quasi Geo-Lift Experiment.
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在使用准地理提升实验时，你的数据最佳实践。
- en: Use **daily data** instead of weekly when possible.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在可能的情况下，使用 **每日数据** 而不是每周数据。
- en: Use the **most detailed location data available** (e.g., zip codes, cities).
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 **最详细的位置数据**（例如，邮编、城市）。
- en: Have at least **4–5 times the test duration** in stable, pre-campaign historical
    data (no major changes or disruptions – more on this later in the operationalization
    chapter below!)
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在稳定、活动前的历史数据中，测试持续时间至少是 **4-5 倍**（没有重大变化或中断 - 更多内容将在下面的操作化章节中介绍！）
- en: Have at least **25 pre-treatment periods** with a **minimum** of **10**, but
    ideally **20+ geo-units**.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 至少有 **25 个预处理期**，其中 **至少** **10 个**，但理想情况下 **20+ 地理单元**。
- en: Ideally, collect **52 weeks of history** to capture seasonal patterns and other
    factors.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理想情况下，收集 **52 周的历史数据** 以捕捉季节性模式和其它因素。
- en: The **test should last at least one purchase cycle** for the product.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试应至少持续一个购买周期。
- en: Run the study for at least **15 days (daily data)** or **4–6 weeks (weekly data)**.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 至少运行研究 **15 天（每日数据）** 或 **4-6 周（每周数据）**。
- en: Panel data (covariates) is helpful but not required.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 面板数据（协变量）有帮助，但不是必需的。
- en: For every time/location, include **date, location, and KPIs** (no missing values).
    Extra covariates can be added if they also meet this rule.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每个时间/地点，包括 **日期、地点和关键绩效指标**（无缺失值）。如果它们也符合此规则，可以添加额外的协变量。
- en: '* * *'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Planning Your Quasi Geo-Lift Experiment
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规划你的准地理提升实验
- en: '![Fig. 4: Quasi Geo-Lift Experiment planning (source: own production)](../Images/dcd4042f83144d29ecd5bb17d16b4c38.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图 4：准地理提升实验规划（来源：自行生产）](../Images/dcd4042f83144d29ecd5bb17d16b4c38.png)'
- en: '***Fig. 4:*** *Quasi Geo-Lift Experiment planning* (source: own production)'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '***图 4：*** *准地理提升实验规划* (来源：自行生产)'
- en: Designing a quasi geo-lift experiment is not just about running a test,  it’s
    about creating a system that can credibly link marketing actions to business outcomes.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 设计准地理提升实验不仅仅是进行测试，它关乎创建一个能够将营销行动与业务成果可信地联系起来的系统。
- en: 'To do this in a structured way, the launch of any new channel or campaign should
    be approached in stages. Here is my **ABCDE** framework that can help you with
    it:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 为了以结构化的方式进行，任何新渠道或活动的推出都应分阶段进行。以下是我的 **ABCDE** 框架，可以帮助你完成这项工作：
- en: (A) ASSESS
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: （A）评估
- en: Establish how incrementality will be measured and which method will be used.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定增量如何衡量以及将使用哪种方法。
- en: (B) BUDGET
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: （B）预算
- en: Determine the minimum spend required to detect an effect that is both statistically
    credible and commercially meaningful.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定检测到既具有统计可信度又具有商业意义的效应所需的最小支出。
- en: (C) CONSTRUCT
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: （C）构建
- en: Specify which cities will be treated, how controls will be formed, how long
    the campaign will run, and what operational guardrails are needed.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指定哪些城市将被处理，如何形成控制组，活动将运行多长时间，以及需要哪些操作限制。
- en: (D) DELIVER
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: （D）交付
- en: Convert statistical results into metrics and report outcomes as a readout.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将统计结果转换为指标，并以读数形式报告结果。
- en: (E) EVALUATE
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: （E）评估
- en: Use results to inform broader decisions by updating MMM and MTA. Focus on calibrating,
    stress-testing, replicating, and localizing for rollout.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用结果通过更新 MMM 和 MTA 来指导更广泛的决策。关注校准、压力测试、复制和本地化以进行推广。
- en: '* * *'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (A) ASSESS the marketing triangulation variable in question by drilling down
    into it.
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (A) 通过深入分析来**评估**所涉及的市场三角定位变量。
- en: '![](../Images/1c26dbf2121bad9872dd70be657a572f.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1c26dbf2121bad9872dd70be657a572f.png)'
- en: '***Fig. 5:*** *Marketing triangulation framework and Incrementality breakdown*
    *(source: own production)*'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '***图5：*** *市场三角定位框架和增量分解*（来源：自行生产）'
- en: 1\. Marketing triangulation as a starting point.
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 将市场三角定位作为起点。
- en: Start by evaluating which part of the marketing triangulation you will need
    to break down. In our case, that would be the incrementality piece. For other
    projects, drill down into MTA and MMM similarly. For instance, MTA uncovers **heuristic
    out-of-the-box techniques** like last click, first click, first or last touch
    decaying, (inverted) U-shape, or W-shape, but also **data-driven** approaches
    like **Markov** **chain**. MMM can be custom, 3rd party, Robyn, or Meridian, and
    involves additional steps like saturation, adstock, and budget reallocation simulations.
    Don’t forget to set up your measurement metrics.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 首先评估你需要分解的市场三角定位的哪一部分。在我们的案例中，那将是增量部分。对于其他项目，类似地深入到MTA和MMM。例如，MTA揭示了**启发式跳出盒子的技术**，如最后点击、第一次点击、首次或最后接触衰减、（倒置）U形或W形，但也包括**数据驱动**的方法，如**马尔可夫**链。MMM可以是定制的、第三方、Robyn或Meridian，并涉及饱和度、广告库存和预算再分配模拟等额外步骤。别忘了设置你的测量指标。
- en: 2\. Incrementality is operationalized through a geo-lift test.
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 增量性通过地理提升测试来操作化。
- en: The geo-lift test is the practical expression of the framework because it reads
    the outcome in the same units the business manages, such as rides (or sales, conversions,
    leads) per city per day. It creates treatment and control just as a classic randomized
    study would, but it does so at the geographic level.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 地理提升测试是框架的实践表达，因为它以业务管理的相同单位读取结果，例如每天每城市的乘车次数（或销售、转化、线索）。它就像一个经典随机研究一样创建治疗组和对照组，但它是在地理层面上进行的。
- en: '![](../Images/11c055f13d7b4e3e43e29a9f3349ad07.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/11c055f13d7b4e3e43e29a9f3349ad07.png)'
- en: '***Fig. 6:*** *Geo-Lift test vs. User-centric RCT Conversion Lift test* (source:
    own production)'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '***图6：*** *地理提升测试与以用户为中心的RCT转化提升测试对比*（来源：自行生产）'
- en: This makes the design executable across platforms and independent of user-level
    tracking, while it allows you to study your preferred business metrics.
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这使得设计可以在多个平台上执行，并且独立于用户级跟踪，同时允许你研究你偏好的业务指标。
- en: '3\. Recognition of two experimental families of the Geo-Lift test: RCTs and
    quasi-experiments.'
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 识别地理提升测试的两个实验家族：RCTs和准实验。
- en: Where in-platform RCTs such as conversion lift tests or brand lift tests exist
    (Meta, Google), they remain the standard and can be leverage. When individual
    randomization is infeasible, the geo-lift test then proceeds as a quasi-experiment.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在平台内RCTs（如转化提升测试或品牌提升测试）存在的地方（Meta、Google），它们仍然是标准，并且可以被利用。当个体随机化不可行时，地理提升测试随后作为准实验进行。
- en: 4\. Identification relies on a synthetic control method.
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 识别依赖于合成控制方法。
- en: For each treated city, a weighted combination of control cities is learned to
    reproduce its pre-period trajectory. The divergence between the observed series
    and its synthetic counterpart during the test window is interpreted as the incremental
    effect. This estimator preserves scientific rigor while keeping execution feasible
    and auditable.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个受处理的城市，学习控制城市的加权组合以再现其测试窗口前的轨迹。观察序列与其合成对应物在测试窗口期间的差异被解释为增量效应。此估计器在保持执行可行和可审计的同时，保持了科学严谨性。
- en: 5\. Calibration and validation are explicit steps, not afterthoughts.
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 校准和验证是明确的步骤，而不是事后考虑。
- en: The experimental estimate of incrementality is used to validate that attribution
    signals point in the right direction and to **calibrate** MMM elasticities and
    adstock (via the calibration multiplier), so cross-channel budget reallocations
    are grounded in **causal** truth.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 增量性的实验估计用于验证归因信号指向正确的方向，并**校准**MMM弹性和广告库存（通过校准乘数），因此跨渠道预算再分配基于**因果**真实。
- en: '![](../Images/008c289f6e174eeadac56d67280c2fb1.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/008c289f6e174eeadac56d67280c2fb1.png)'
- en: '**Fig. 7:** How to calibrate your MTA and MMM. Leverage Quasi Geo-Lift Experiment
    results to calibrate your MTA/MMM using a calibration multiplier (source: own
    production)'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**图7**：如何校准你的MTA和MMM。利用准地理提升实验结果，使用校准乘数来校准你的MTA/MMM（来源：自行生产）'
- en: '**Other calibration points to keep in mind:**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**其他需要记住的校准点：**'
- en: a) Treat each experiment as a distribution and use the **full** **interval**
    for lift, ROI, or CPA so uncertainty is preserved. **If you ignore the interval
    you throw away a lot of what you paid for and you risk the wrong decision.**
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: a) 将每个实验视为一个分布，并使用提升、ROI或CPA的**完整** **区间**，以保留不确定性。**如果你忽略区间，你会丢弃你支付的大部分费用，并冒着做出错误决策的风险。**
- en: b) **Results** are **time** **bound** to when you performed the test only, so
    give less weight as you move further from the test window. **Your** **confidence
    should fade as you move away from the window because platforms and markets change.**
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: b) **结果** 仅与您进行测试的时间相关，因此随着您远离测试窗口，应给予较少的权重。**随着您远离窗口，您的信心应该减弱，因为平台和市场会发生变化。**
- en: c) **Marketing** **performance** **change** over time. Macro environment changes
    and so will your results on marketing efficiency which is totally ok and not a
    red-flag. **This matters for calibration because a very old fixed lift baked into
    the model you are using today may drift out of sync with reality (mostly due to
    auctions, audience mix, creative quality, and macro).** Paradoxically – you might
    actually then benefit from removing the calibrator from the model.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: c) **营销** **绩效** **变化** 随时间推移。宏观环境的变化，你的营销效率结果也会随之变化，这是完全可以接受的，并不是红旗。**这对于校准很重要，因为今天你使用的模型中嵌入的非常旧的固定提升可能已经与现实脱节（主要由于拍卖、观众组合、创意质量和宏观因素）。**矛盾的是——你实际上可能从移除校准器中受益。
- en: 6\. Measure the impact in business terms.
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 用商业术语衡量影响。
- en: In the planing phase, the core statistic is the **Average Treatment Effect on
    Treated (ATT)**, expressed in outcome units per day (e.g., rides per city per
    day). That estimate is translated into **Total Incremental Rides** over the test
    window and then into **Cost per Incremental Conversion (CPIC)** by dividing spend
    by the total number of incremental rides. **Minimum Detectable Effect (MDE)**
    is reported to make the design’s sensitivity explicit and to separate actionable
    results from inconclusive ones. Finally, **Net Profit** is calculated by combining
    historical rider profit with the incremental outcomes and CPIC.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在规划阶段，核心统计量是**平均处理效果（ATT）**，以每天的单位结果（例如，每天每座城市的乘车次数）表示。该估计值转换为测试窗口内的**总增量乘车次数**，然后通过将支出除以总增量乘车次数转换为**增量转化成本（CPIC）**。**最小可检测效应（MDE）**被报告出来，以明确设计的敏感性并区分可操作的结果和不可决的结果。最后，**净利润**通过结合历史骑手利润和增量结果以及CPIC来计算。
- en: The total incremental leads can be multiplied by a blended historical conversion
    rate from lead to customer to estimate how many new customers the campaign is
    expected to generate. That figure is then multiplied by the average profit per
    customer in dollars. This way, even when revenue is realized downstream of the
    lead stage, the experiment still delivers a transparent estimate of incremental
    financial impact and a clear decision rule for whether to scale the channel. All
    other metrics like ATE, total incremental leads, cost per incremental lead, and
    MDE will be calcalted in a similar fashion.
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 总增量线索可以通过将线索到客户的混合历史转化率相乘来估算，以估计活动预期产生多少新客户。然后，该数字乘以每位客户的平均利润（以美元计）。这样，即使收入在线索阶段之后实现，实验仍然提供了增量财务影响的透明估计和是否扩展渠道的明确决策规则。所有其他指标，如ATE、总增量线索、增量线索成本和MDE，将以类似的方式计算。
- en: '* * *'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (B) BUDGET for your quasi-experiment.
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (B) 为你的准实验制定预算。
- en: '![](../Images/3003031a7a05af77225d6ad400735ac0.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3003031a7a05af77225d6ad400735ac0.png)'
- en: '***Fig. 8:*** *Estimating budget for a Quasi Geo-Lift Experiment* *(source:
    own production)*'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '***图8：*** *估算准地理提升实验的预算* *(来源：自行生产)*'
- en: '**Budget estimation is not guesswork**. It is a design choice that determines
    whether the experiment yields actionable results or inconclusive noise. The key
    concept is the **Minimum Detectable Effect (MDE):** the smallest lift the test
    can reliably detect given the variance in historical data, the number of treated
    and control cities, and the length of the test window.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**预算估算不是猜测**。它是一个设计选择，决定了实验是否产生可操作的结果或不可决的噪音。关键概念是**最小可检测效应（MDE）**：在历史数据方差、受处理和控制城市的数量以及测试窗口长度给定的情况下，测试可以可靠检测到的最小提升。'
- en: In practice, variance is estimated from historical rides (or sales, conversions,
    or leads in other industries). The number of treated cities and test length then
    define sensitivity. For example, as you will see later, treating 3 cities for
    21 days while holding 10 as controls provides enough power to detect lifts of
    about 4–5%. Detecting smaller but statistically significant effects would require
    more time, more markets, or more spend.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，方差是从历史行程（或销售、转化或其他行业的线索）中估计的。处理城市的数量和测试长度定义了敏感性。例如，正如你稍后将会看到的，对 3 个城市进行
    21 天的治疗，同时保持 10 个作为控制，足以检测到大约 4-5% 的提升。检测较小但具有统计学意义的效应需要更多时间、更多市场或更多支出。
- en: The Geo-Lift package models these power analyses and then prints the budget–effect–power
    simulation chart for any experiment ID.
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Geo-Lift 包会模拟这些功效分析，并为任何实验 ID 打印预算-效应-功效模拟图。
- en: '**The budget is aligned with unit economics.** In the Bolt case, industry priors
    suggest a cost per ride of €6–€12 and a profit per ride of €6\. Under these assumptions,
    the minimum spend to achieve an MDE of roughly 5% comes to **€3,038 for 3 weeks**,
    or **€48.23 per treated city per day**. This sits within the €5,000**€** benchmark
    budget but, more importantly, makes explicit what effect size the test can and
    cannot detect.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**预算与单元经济相一致**。在 Bolt 的案例中，行业先验知识表明每趟行程的成本为 6-12 欧元，每趟行程的利润为 6 欧元。在这些假设下，实现大约
    5% 的 MDE 的最低消费为 **3 周的 3,038 欧元**，或者 **每天每处理城市 48.23 欧元**。这符合 5,000 欧元的基准预算，但更重要的是，它明确说明了测试可以和不能检测到的效应大小。'
- en: '**Framing budget this way has two advantages**. First, it ensures the experiment
    is designed to detect only effects that matter for the business. Second, it gives
    stakeholders clarity: if the result is null, it means the true effect was more
    likely smaller than the threshold, not that the test was poorly executed. Either
    way, the spend is not wasted. It buys causal knowledge that sharpens future allocation
    decisions.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**以这种方式制定预算有两个优点**。首先，它确保实验的设计旨在检测对业务有意义的效应。其次，它为利益相关者提供了清晰的了解：如果结果是无效的，这意味着真实效应更有可能小于阈值，而不是测试执行得不好。无论如何，支出都没有浪费。它购买了因果知识，这有助于未来分配决策的准确性。'
- en: '* * *'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (C) CONSTRUCT your quasi-experiment design.
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (C) **构建你的准实验设计**。
- en: '![](../Images/ab60551dee5c63147fdb58dfef4ebd84.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ab60551dee5c63147fdb58dfef4ebd84.png)'
- en: '***Fig. 9:*** *Treatment and Control geographies selection in a Quasi Geo-Lift
    experiment* *(source: own production)*'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '***图 9：*** *准地理提升实验中的处理和控制地理选择* *(来源：自行生产)*'
- en: '**Designing the experiment is about more than picking cities at random.** It
    is about building a layout that preserves validity while staying practical for
    operations. The unit of analysis is the **city-day**, and the outcome is the business
    metric of interest, such as rides, sales, or leads. Treatment is applied to selected
    cities for a fixed test window, while the remaining cities serve as controls.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**设计实验不仅仅是随机选择城市**。这是关于构建一个既保持有效性又适合运营的布局。分析的单位是**城市-天**，结果是感兴趣的商务指标，例如行程、销售额或线索。治疗应用于选定的城市，在一个固定的测试窗口内进行，而其余的城市作为控制组。'
- en: Geo-Lift will model and group the ideal city candidates for your treatment.
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Geo-Lift 将为您的治疗建模和分组理想的城市候选人。
- en: Control groups are not just left as-is.
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 控制组不会被简单地保留原样。
- en: They can be refined using a **synthetic control method**. Each treated city
    is paired with a weighted combination of control cities that reproduces its pre-test
    trajectory. When the pre-period fit is accurate, the post-launch divergence between
    observed and synthetic outcomes provides a credible estimate of incremental effect.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 它们可以通过**合成控制方法**进行细化。每个处理城市都与一个加权组合的控制城市配对，以复制其测试前的轨迹。当测试前期的拟合准确时，发布后观察结果和合成结果之间的差异提供了增量效应的可靠估计。
- en: Operational guardrails are critical to protect signal quality.
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运营的护栏对于保护信号质量至关重要。
- en: '![](../Images/3e0e0d5e3247950ba52669d60e5400a5.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3e0e0d5e3247950ba52669d60e5400a5.png)'
- en: '***Fig. 10:*** *Quasi Geo-Lift experiment planning and design* *(source: own
    production)*'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '***图 10：*** *准地理提升实验规划和设计* *(来源：自行生产)*'
- en: City boundaries should be fenced tightly in settings to reduce spillovers from
    commuters. Also consider strict exclusion of control cities from treatment cities
    in the settings and vice-versa. There should not be a specific **targeting** and
    **lookalike** audiences applied to the campaign. Local promotions that could **confound**
    the test are either **frozen** in treated geographies or **mirrored** in controls.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: Creatives, bids, and pacing are held constant during the window, and outcomes
    are only read after a short cooldown period due to the marketing **adstock** effect.
    **Other** **business** **relevant** **factors** should be considered, e.g. in
    our case, we should check the supply driver capacity in advance to ensure additional
    demand can be served without distorting prices or wait times.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: Constructing the test means choosing the right balance.
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/68cb4768049d4549d06319922721ce60.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
- en: '***Fig. 11:*** *Simulated and ranked Quasi Geo-Lift experiment groups* *(source:
    own production)*'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: The Geo-Lift package will do the heavy lifting for you by modeling and building
    all optimal experiments.
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'From your power analysis and market selection function code, choosing the right
    experiment setup is a balance between:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: number of cities
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: duration
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: spend
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: desired incremental uplift
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: profit
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: stat. significance
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: test vs control alignment
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: smallest detectable lift
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: other business context
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A configuration of three treated cities over a 21-day period, as in the Bolt
    example, provides sufficient power to detect lifts of ~4–5%, while keeping the
    test window short enough to minimize **contamination**. Based on **previous**
    **experiments**, we know this level of power is **adequate**. In addition, we
    need to remain within our budget of **€5,000 per month**, and the expected investment
    of €3,038.16 for three weeks fits well within that constraint.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: (D) DELIVER the post-experiment readout.
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/92c3a43472aad4f34735bcb8f2c5b7b0.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
- en: '***Fig. 12:*** *Results of the Quasi Geo-Lift experiment* *(source: own production)*'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: The final step is to deliver results that translate statistical lift into clear
    business impact for stakeholders. The experiment’s outputs should be framed in
    terms that both analysts and decision-makers can use.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: At the core is the **Average Treatment Effect on Treated (ATT)**, expressed
    in outcome units per day such as rides, sales, or leads. From this, the analysis
    calculates **total incremental outcomes** over the test window and derives **Cost
    per Incremental Conversion (CPIC)** by dividing spend by those outcomes. The **Minimum
    Detectable Effect (MDE)** is reported alongside results to make the test’s sensitivity
    transparent, separating actionable lifts from inconclusive noise. Finally, the
    analysis converts outcomes into **Net Profit** by combining incremental conversions
    with unit economics.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: '**For lead-based businesses**, the same logic applies but the net profit: for
    that, the total incremental leads can be multiplied by a blended conversion rate
    from lead to customer, then by average profit per customer, to approximate the
    net financial impact.'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**基于铅**的业务，同样的逻辑适用，但净利润：为此，可以将总增量潜在客户数乘以潜在客户到客户的综合转化率，然后乘以每客户的平均利润，以近似净财务影响。
- en: Be cautious when interpreting results to stakeholders. Statistical analysis
    with p-value provides evidence, not absolute proof, so phrasing matters. The GeoLift
    [uses](https://facebookincubator.github.io/GeoLift/docs/Methodology/Confidence_Interval_Explanation/)
    Synthetic Control/Augmented Synthetic Control with **frequentist** inference.
  id: totrans-116
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在向利益相关者解释结果时要谨慎。使用p值进行统计分析提供的是证据，而不是绝对的证明，因此措辞很重要。GeoLift [使用](https://facebookincubator.github.io/GeoLift/docs/Methodology/Confidence_Interval_Explanation/)
    基于合成控制/增强合成控制的**频率推断**。
- en: 'A **common but misleading interpretation** of statistical significance might
    sound like this:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 对统计显著性的**常见但误导性的解释**可能听起来像这样：
- en: '*“The result of the quasi Geo-Lift experiment proves that rides increased by
    11.1% because of the campaign with a 95% probability.”*'
  id: totrans-118
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“准Geo-Lift实验的结果证明，由于该活动，乘车次数增加了11.1%，有95%的概率。”*'
- en: 'This interpretation is problematic for several reasons:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这种解释存在几个问题：
- en: It **treats statistical significance as proof.**
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它**将统计显著性视为证据**。
- en: It **assumes the effect size is exact** (11.1%), ignoring the uncertainty range
    around that estimate.
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它**假设**效应大小是精确的（11.1%），忽略了围绕该估计的不确定性范围。
- en: It **misinterprets** **confidence** intervals.
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它**误解**了**置信区间**。
- en: It **leaves no room for alternative explorations** that might create value for
    the business.
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它**没有**为可能创造业务价值的替代探索留下空间。
- en: It can **mislead decision-makers**, creating overconfidence and potentially
    leading to risky business choices.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可能会**误导决策者**，造成过度自信，并可能导致风险业务选择。
- en: When performing quasi Geo-Lift test, what a statistical test actually tests?
  id: totrans-125
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在进行准Geo-Lift测试时，统计测试实际上测试的是什么？
- en: 'Every statistical test depends on a **statistical model**, which is a complex
    web of assumptions. This model includes not only the main hypothesis being tested
    (e.g., a new TweetX campaign has no effect) but also a long list of other assumptions
    about how the data were generated. These include assumptions about:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 每个统计测试都依赖于一个**统计模型**，这是一个复杂的假设网络。这个模型不仅包括正在测试的主要假设（例如，新的TweetX活动没有影响），还包括关于数据生成方式的长长列表的其他假设。这些包括关于：
- en: Random sampling or randomization.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随机抽样或随机化。
- en: The type of probability distribution the data follow.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据遵循的概率分布类型。
- en: Independence.
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 独立性。
- en: Selection bias.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择偏差。
- en: The absence of major measurement errors.
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有重大测量错误。
- en: How the analysis was conducted.
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析是如何进行的。
- en: 'A statistical test does **not** just evaluate the test hypothesis (like the
    null hypothesis). It evaluates the **entire statistical model:** the complete
    set of assumptions. **And that’s why** we try to always make sure that all other
    assumptions are fully met and the experiment designs are not flawed: so if we
    observe a small p-value, we can reasonably read it as evidence against the null,
    not as proof or ‘acceptance’ of H1.'
  id: totrans-133
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 统计测试**不仅**评估测试假设（如零假设）。它评估的是**整个统计模型**：完整的假设集。**这就是为什么**我们总是试图确保所有其他假设都完全满足，实验设计没有缺陷：这样，如果我们观察到小的p值，我们可以合理地将其解读为对零假设的证据，而不是证明或“接受”H1。
- en: The P-value is a measure of compatibility, not truth.
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: P值是兼容性的衡量，而不是真理。
- en: 'The most common definition of a P-value is flawed. A more accurate and useful
    definition is:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: P值的常见定义是错误的。一个更准确、更有用的定义是：
- en: The p-value is a quantitative measure of how **compatible** the observed data
    are with the entire statistical model used to analyze them — that is, the test
    hypothesis *and* all other assumptions (sampling, measurement, analysis choices,
    etc.). With a p-value of 0.05, if there were no real effect, we would expect to
    see a result this extreme only about 5% of the time. It is not about likelihood,
    but rather variation in sampling or experimental set up. It is **not** a probability
    that the hypothesis is true or false, nor a measure of chance alone.
  id: totrans-136
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: p值是衡量观察到的数据与用于分析它们的整个统计模型**兼容性**的定量指标——也就是说，测试假设*以及*所有其他假设（抽样、测量、分析选择等）。如果p值为0.05，如果没有实际效果，我们预计只有大约5%的时间会看到这种极端的结果。它不是关于可能性，而是关于抽样或实验设置的变异性。它**不是**假设正确或错误的概率，也不是仅机会的衡量。
- en: Think of it as a “surprise index.”
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 将其视为一个“惊喜指数”。
- en: 'A **small P-value** (e.g., P=0.01) indicates that the data are surprising if
    the entire model were true. It’s a red flag telling us that one or more of our
    assumptions might be wrong. However, it **does not tell us which assumption is
    wrong**. The issue could be the null hypothesis, but it could also be a violated
    study protocol, selection bias, or another unmet assumption. **And that’s why**
    we try to always make sure that all other assumptions are fully met and experiment
    designs are not flawed: so if we observe a small p-value, we can reasonably read
    it as evidence against the null, not as proof or ‘acceptance’ of H1.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**小的P值**（例如，P=0.01）表明，如果整个模型都是真的，数据将是令人惊讶的。这是一个红旗，告诉我们我们的一个或多个假设可能是不正确的。然而，它**并没有告诉我们哪个假设是错误的**。问题可能是零假设，也可能是违反了研究方案、选择偏差或其他未满足的假设。**这就是为什么**我们总是尽力确保所有其他假设都得到充分满足，实验设计没有缺陷：这样，如果我们观察到小的p值，我们可以合理地将其解读为对零假设的证据，而不是作为对H1的证明或“接受”。
- en: A **large P-value** (e.g., P=0.40) indicates that the data are not unusual or
    surprising under the model. It suggests the data are compatible with the model,
    but it **does not prove the model or the test hypothesis is true**. The data could
    be equally compatible with many other models and hypotheses.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**大的P值**（例如，P=0.40）表明，在模型下，数据并不异常或令人惊讶。它表明数据与模型兼容，但它**并不证明模型或测试假设是正确的**。数据可以与其他许多模型和假设同样兼容。
- en: The common practice of degrading the P-value into a simple binary, “statistically
    significant” (P≤0.05) or “not significant” (P>0.05), is damaging. It creates a
    false sense of certainty and ignores the actual quantity of evidence.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 将P值简化为简单的二元选择，“具有统计学意义”（P≤0.05）或“不具有统计学意义”（P>0.05）的常见做法是有害的。它创造了一种虚假的确定性，并忽略了实际证据的数量。
- en: Confidence Intervals (CI) and their importance in the Quasi Geo-Lift test.
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 置信区间（CI）及其在准Geo-Lift测试中的重要性。
- en: A confidence interval (CI) is more informative than a simple P-value from a
    null hypothesis test. It can be understood as the range of effect sizes that are
    relatively **compatible** with the data, given the statistical model.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 置信区间（CI）比从零假设检验得到的简单P值更有信息量。它可以理解为在给定的统计模型下，与数据相对**兼容**的效应量范围。
- en: 'A 95% confidence interval has a specific frequentist property: if you were
    to repeat a quasi Geo-Lift study countless times with valid statistical models,
    **95% of the calculated confidence intervals would, on average, contain the true
    effect size**.'
  id: totrans-143
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 95%置信区间具有特定的频率特性：如果你用有效的统计模型无数次地重复进行准Geo-Lift研究，**平均而言，95%的计算置信区间将包含真实效应量**。
- en: Crucially, this does not mean there is a 95% probability that your specific
    interval contains the true effect. Once calculated, your interval either contains
    the true value or it doesn’t (0% or 100%). The “95%” tells how often this method
    would capture the true effect over many repeated studies, not how certain we are
    about this single interval. If you want to move from frequentist confidence intervals
    to direct probabilities about lift, **Bayesian** methods are the way.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的是，这并不意味着有95%的概率你的特定区间包含真实效应。一旦计算出来，你的区间要么包含真实值，要么不包含（0%或100%）。这里的“95%”告诉我们，在许多重复研究中，这种方法捕捉到真实效应的频率，而不是我们对这个单一区间的确定性。如果你想从频率主义的置信区间转向关于提升的直接概率，**贝叶斯**方法是途径。
- en: '* * *'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'If you’d like to dive deeper into p-values, confidence intervals, and hypothesis
    testing, I recommend these 2 well-known papers:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想深入了解P值、置信区间和假设检验，我推荐以下两篇知名论文：
- en: '*A Dirty Dozen: Twelve P-Value Misconceptions –* link [**here**](https://sixsigmadsi.com/wp-content/uploads/2020/10/A-Dirty-Dozen-Twelve-P-Value-Misconceptions.pdf)**.**'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*《十二个P值误解：十二个P值误解》* 链接[**这里**](https://sixsigmadsi.com/wp-content/uploads/2020/10/A-Dirty-Dozen-Twelve-P-Value-Misconceptions.pdf)**。'
- en: '*Statistical tests, P values, confidence intervals, and power: a guide to misinterpretations
    –* link [**here**](https://link.springer.com/article/10.1007/s10654-016-0149-3)**.**'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*《统计测试、P值、置信区间和功效：误解释指南》* 链接[**这里**](https://link.springer.com/article/10.1007/s10654-016-0149-3)**。'
- en: '* * *'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (E) EVALUATE your Quasi Geo-Lift Experiment with a broader lense.
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (E) 使用更广阔的视角**评估**你的准Geo-Lift实验。
- en: '![](../Images/388c5f785e821b270ebd99039e02ef7c.png)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/388c5f785e821b270ebd99039e02ef7c.png)'
- en: '***Fig. 13:*** *Post-experiment evaluation and next steps* *(source: own production)*'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '***图13：*** *实验后评估和下一步行动* *(来源：自行制作)*'
- en: '**Remember to zoom out and “see the forest, not just the trees”. **'
  id: totrans-153
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**记住要放大视角，‘看到森林而不是树木’**。'
- en: The results must feed back into marketing triangulation by **validating** attribution
    ROAS, and **calibrating** marketing mix models with a causal multiplier.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 结果必须通过**验证**归因ROAS和**校准**营销组合模型与因果乘数来反馈到营销三角化。
- en: 'They should also guide the next steps: **replicate** positive results in **new**
    **geographies**, assess percentage lift against the minimum detectable threshold,
    and **avoid** **generalizing** from a single market before further testing.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 他们还应该指导下一步：在**新****地理**中**复制**积极结果，评估增量百分比与可检测最小阈值，并在进一步测试之前**避免**从单一市场**推广**。
- en: '**Stress-testing** with **placebo** testing (in-space or in-time) will also
    strengthen confidence in your findings.'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用安慰剂测试**（空间或时间）进行压力测试也将增强对您发现结果的信心。'
- en: '![](../Images/4ef035633b5c40752ffd72f114ec9e47.png)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4ef035633b5c40752ffd72f114ec9e47.png)'
- en: '***Fig. 14:*** *Five random in-time placebo tests* *(source: own production)*'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '***图14：*** *五个随机即时安慰剂测试* *(来源：自产)*'
- en: 'Below are results from one **in-time placebo**: +1.3% lift from a placebo is
    not stat. strong to reject no difference between treatment and control group =
    H0 (as expected for a placebo):'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是来自一个**即时安慰剂**的结果：安慰剂增加1.3%并不足以统计上强烈拒绝处理组和对照组之间没有差异 = H0（正如安慰剂所预期）：
- en: '![](../Images/edb77656f1adc261fa3b5d2f9f06851d.png)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/edb77656f1adc261fa3b5d2f9f06851d.png)'
- en: '***Fig. 15:*** *Results of the in-time placebo test* *(source: own production)*'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: '***图15：*** *即时安慰剂测试结果* *(来源：自产)*'
- en: '**Incorporating** the channel **impressions** and **spend** into cross-channel
    interactions in the MMM helps capture **interactions** with **other** **channels**
    in your media mix.'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '**将**渠道**曝光**和**花费**纳入MMM中的跨渠道互动有助于捕捉媒体组合中**其他**渠道的**互动**。'
- en: 'If the campaign fails to deliver the expected lift despite planning suggesting
    it should, it is important to evaluate factors not captured in the quantitative
    results: the **messaging** or **creative** execution. Often, the shortfall may
    be attributed to how the campaign (doesn’t) resonate with the target audience
    rather than flaws in the experimental design.'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 如果尽管计划表明应该实现预期的提升，但活动未能实现，那么评估在定量结果中未捕获的因素很重要：**信息**或**创意**执行。通常，不足可能归因于活动（没有）与目标受众产生共鸣，而不是实验设计中的缺陷。
- en: What’s in it for you?
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这对你有什么好处？
- en: 'Quasi geo-lift lets you prove whether a campaign truly moves the needle **without**
    user-level tracking or big randomized tests. You pick a few markets, build a synthetic
    control from the rest, and read the **incremental** impact directly in business
    units (rides, sales, leads). The ABCDE plan makes it practical:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 准地理提升让您能够在**无需用户级跟踪或大型随机测试**的情况下证明活动是否真正推动了指针。您选择几个市场，从其余部分构建一个合成控制，并直接在业务单元（乘车、销售、线索）中读取**增量**影响。ABCDE计划使其变得实用：
- en: '**Assess** marketing triangulation and how you’ll measure,'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估**营销三角化和您将如何衡量，'
- en: '**Budget** to a clear MDE,'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预算**到明确的MDE，'
- en: '**Construct** treatment/control and guardrails,'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**构建**处理/控制和护栏，'
- en: '**Deliver** ATT → CPIC → profit, then'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交付**ATT → CPIC → 利润，然后'
- en: '**Evaluate** by calibrating MMM/MTA, stress-testing with placebos, and by looking
    at your business context with a broader lense.'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估**通过校准MMM/MTA，使用安慰剂进行压力测试，以及通过更广阔的视角观察您的业务环境。'
- en: Net result? Faster, cheaper, defensible answers you can act on.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 净结果？更快、更便宜、有据可依的答案，您可以采取行动。
