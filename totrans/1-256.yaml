- en: Why Are Marketers Turning To Quasi Geo-Lift Experiments? (And How to Plan Them)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么营销人员转向准地理提升实验？（以及如何规划它们）
- en: 原文：[https://towardsdatascience.com/why-are-marketers-turning-to-quasi-geo-lift-experiments-and-how-to-plan-them/](https://towardsdatascience.com/why-are-marketers-turning-to-quasi-geo-lift-experiments-and-how-to-plan-them/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-are-marketers-turning-to-quasi-geo-lift-experiments-and-how-to-plan-them/](https://towardsdatascience.com/why-are-marketers-turning-to-quasi-geo-lift-experiments-and-how-to-plan-them/)
- en: '**💡 Note:** Geo-Lift R code at the end of the article.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**💡 注意：** 文章末尾的 Geo-Lift R 代码。'
- en: <mdspan datatext="el1758588746310" class="mdspan-comment">Over the course</mdspan>
    of my career, I have used quasi-experimental designs with synthetic control groups
    to measure the impact of business changes. At [Trustpilot](https://business.trustpilot.com/jobs),
    we switched the position of a banner on the homepage and retrospectively saw signals
    pointing to a decrease in our main demand metric. By modeling how performance
    would have looked without the change and comparing it to what happened, we got
    a clear read of incremental decline. At [Zensai](https://zensai.com/), we decided
    to treat some of our web forms and confirmed in a similar way whether the change
    had a positive impact on user-reported ease of completion.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758588746310" class="mdspan-comment">在我的职业生涯中，我使用了带有合成控制组的准实验设计来衡量商业变化的影响。</mdspan>
    在 [Trustpilot](https://business.trustpilot.com/jobs) 上，我们更改了主页上横幅的位置，并回顾性地看到了指向我们主要需求指标下降的信号。通过模拟没有变化时的表现，并将其与实际发生的情况进行比较，我们得到了增量下降的明确读数。在
    [Zensai](https://zensai.com/) 上，我们决定对一些网页表单进行处理，并以类似的方式确认变化是否对用户报告的完成度有积极影响。
- en: 'This approach works wherever you can **split** something into treatment and
    control groups: **individuals, smartphones, operating systems, forms, or landing
    pages**. You treat some. The others help you model what would have happened without
    treatment. Then you compare.'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这种方法适用于任何可以将某物分为处理组和控制组的情况：**个人、智能手机、操作系统、表单或着陆页**。你处理一些，其他的帮助你模拟没有处理会发生的情况。然后进行比较。
- en: When you cannot randomize at the individual level, **geography** makes a great
    unit of analysis. Cities and regions are straightforward to target via paid social
    and their borders help contain spillovers.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当你无法在个人层面进行随机化时，**地理**是一个很好的分析单位。城市和地区可以通过付费社交轻松定位，它们的边界有助于限制溢出效应。
- en: 'There are three practical designs for isolating incremental impact:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 有三种实际的设计用于隔离增量影响：
- en: '**Randomized controlled trials (RCT)** like **conversion** or **brand** lift
    tests are appealing when you can use them as they run inside big ad platforms.
    They automate random **user** assignment and can deliver statistically robust
    answers within the platform’s environment. However, unless you leverage conversion
    API, their scope is constrained to the platform’s own metrics and mechanics. More
    recently, proofs ([1](https://download.ssrn.com/24/05/04/ssrn_id4817018_code346011.pdf?response-content-disposition=inline&X-Amz-Security-Token=IQoJb3JpZ2luX2VjEOz%2F%2F%2F%2F%2F%2F%2F%2F%2F%2FwEaCXVzLWVhc3QtMSJIMEYCIQDyOtcHoexHZxtY3l6KH3gxSz6lfUdeWdG41EfeOsaT4wIhAOwHwq7t1gJPHmc8PzzXT07q%2F%2Bm304dYbjRpCAaKi4vRKr4FCGUQBBoMMzA4NDc1MzAxMjU3IgzJbu%2FnEKpwLZQEHhcqmwVi0JxVRkJY1uI%2B2zru2KE9yoMhJh13t6xznXu2PYOkr2WmeV7rIggKiBufGdvDFfeZFpdQtQpiMPNVH8mbVmq9FW5e75nZ5CoWLnFxaI%2B%2F5aufBxpIXoX5YpPSF7SvsJfiVIODH6pYLo0tibfjvgAwDv%2BLragU0is%2BPUDezyBBQHMjPaaqn%2BWbTpEOqN17qkpjMjxodnKbUHxSO6Cc1PDNK1YItijSAq4jaa7HdTDsGBhWO6hTTCuQk%2Ff2vbysVotzaeibextDoG3UVqAypbrI79PG747B6X9V7RlXsZeCGqSr7WYea0NCP244mp80PbwxN9LPW974V6sQfdiZpHhqazNfn7lrI9JEjh73jYrHXF5MJji91yUKuiTT737nHhroiZzohmBi%2FAkFmJnYm25xu8F%2F3euruXMzucsPPeNeFDCHJ6PUn7r9D%2F%2FzujfZmGbOZm2ZLq4B3w8Pf%2Fwpm%2FKSKbi0sOH2eI%2BuK4hUehHnjzpWga1iSfK6UCg9HbHyEaesqfMH1WT%2BjZIggRyEW7Legla8bcH%2BkDsthDqr92rsW4WmNMzgBLPBooDEKhneO4Sd%2F9ZNA35apSXdtpEzIbE8DI8PbnPHxBIFRDdmcSFHGksHPTThmHfSUYNXSn5WntvHt8iGDnB3az7G%2B0UHgV4ifU4dHA%2FYWt%2BTlN%2FtJODIaE5BoOxSKkjYQoJyeualP4vnhmw7n8UriUVLfgfNuFpq29C%2FrPzS8yQuOuUtJJhel%2F95CoGwMNF%2FHeLx72LWzuBv7N9qOsGKKFwQz7dtK%2BWsiyDOP6%2FbcmbO4%2BjuYe4uK9Jvos7AxBEofmgZCh6QXQ0ZcVUzsC2VG3BzjuZD6ToxtNHv6lfYxfkyxOKgFKYA4jfM%2BYgjOJOSv5RFMMywnMYGOrABPkNgqOoDZuhtv0etplrrcXMitFGepgltgvJ%2FE6ij6C36NIrvjfclqcC4UcstdO4ynw%2BAHebeG0dlqgLY11FYcEKxty%2FC%2Bge0DVPI38h8RMXYGSM66nr3Yz2njYz7KRY7uyu6qFtFcoPBEPcjUxZrU%2F1UfgN2JFHIUqZfoLTFKs0AFrEBPJWMEro%2FY%2F8YpzQH39qxKOnSiutB%2FO4ZM4nLNkYl880%2FBsmd9qdVq9%2B%2BysA%3D&X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Date=20250914T194826Z&X-Amz-SignedHeaders=host&X-Amz-Expires=300&X-Amz-Credential=ASIAUPUUPRWESGFYXSFQ%2F20250914%2Fus-east-1%2Fs3%2Faws4_request&X-Amz-Signature=5849ed0e4aa9696b0d7560bef17a116d7b2dba1b900fccb94eded26897991747&abstractId=3896024),
