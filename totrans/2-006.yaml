  prefs: []
  type: TYPE_PRE
- en: This time the output is.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Example 3 — Company financial analysis and comparisons.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this example, we’ll compare the Quarter 2, 2025 earnings reports from both
    Amazon and Microsoft. We’ll ask the model to analyse both reports, extract key
    information and conclude with a summary indicating the key strengths and strategies
    of both companies. The data is once again being obtained from their public SEC
    10-Q earnings reports.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Here is the output.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The article introduces Google’s new URL context grounding tool for Gemini, which
    allows developers to query and analyse the contents of specific web URLs (including
    PDFs) directly, without traditional Retrieval-Augmented Generation (RAG) steps
    like text extraction, chunking, and vectorisation.
  prefs: []
  type: TYPE_NORMAL
- en: I demonstrated its ease of use with Python code examples running on Jupyter
    notebooks, showing successful retrieval of data from Tesla’s 10-Q SEC filing PDF,
    product price comparisons across online shops, and a financial analysis of Amazon
    and Microsoft’s Q2 2025 financial results.
  prefs: []
  type: TYPE_NORMAL
- en: While noting limitations such as the tool not spporting paywalled URLs and some
    media content like YouTube videoas, I highlighted its ability to perform deep
    document interrogation, data extraction, comparison, and synthesis  on a wide
    variety of web pages and opnline PDFs – enhancing its accuracy by grounding responses
    in real sources.
  prefs: []
  type: TYPE_NORMAL
- en: For many use cases, this tool effectively replaces traditional RAG workflows,
    particularly when combined with Google Search grounding to enable more sophisticated
    agentic workflows, factual reliability, and multimodal content analysis.
  prefs: []
  type: TYPE_NORMAL
- en: I hope this article has whetted your appetite for the myriad of use cases that
    this useful utility can offer.
  prefs: []
  type: TYPE_NORMAL
