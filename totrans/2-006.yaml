- en: 'Google’s URL Context Grounding: Another Nail in RAG’s Coffin?'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Google的URL上下文定位：RAG棺材上的另一个钉子？
- en: 原文：[https://towardsdatascience.com/googles-url-context-grounding-another-nail-in-rags-coffin/](https://towardsdatascience.com/googles-url-context-grounding-another-nail-in-rags-coffin/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/googles-url-context-grounding-another-nail-in-rags-coffin/](https://towardsdatascience.com/googles-url-context-grounding-another-nail-in-rags-coffin/)
- en: <mdspan datatext="el1756187448592" class="mdspan-comment">Google’s hot streak</mdspan>
    in AI-related releases continues unabated. Just a few days ago, it released a
    new tool for Gemini called URL context grounding.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756187448592" class="mdspan-comment">Google在AI相关发布上的热门势头持续不断。就在几天前，它为Gemini发布了一个名为URL上下文定位的新工具。</mdspan>
- en: URL context grounding can be used stand-alone or combined with Google search
    grounding to conduct deep dives into internet content.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 可以单独使用URL上下文定位，或与Google搜索定位结合，对互联网内容进行深入研究。
- en: What is URL context grounding?
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是URL上下文定位？
- en: In a nutshell, it’s a way to programmatically have Gemini read, understand and
    answer questions about content and data contained in individual web URLs (including
    those pointing to PDFs) without the need to perform what we know as traditional
    RAG processing.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这是一种通过编程方式让Gemini读取、理解并回答关于单个Web URL（包括指向PDF的URL）中的内容和数据的问题的方法，而无需执行我们所说的传统RAG处理。
- en: In other words, there is no need to extract the URL text and content, chunk
    it, vectorise it, store it and so on. You tell Google what URL you’re interested
    in and off you go. As you’ll see in a moment, it is very straightforward to code
    and highly accurate.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，没有必要提取URL文本和内容，将其分块，向量化，存储等等。你告诉Google你感兴趣的URL，然后就可以开始了。正如你将看到的，编码非常简单，而且非常准确。
- en: It’s for those reasons that I said it could be another nail in RAG’s coffin.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 正是因为这些原因，我说这可能是RAG棺材上的另一个钉子。
- en: But does it work? Let’s look at a couple of examples.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 但它有效吗？让我们看看几个例子。
- en: I’ll set up my development environment first under Ubuntu WSL2 for Windows.
    Follow along or use whichever method you’re used to.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先将在Windows的Ubuntu WSL2下设置我的开发环境。请跟随或使用您习惯的方法。
- en: '[PRE0]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: You’ll also need a Google API key. If you don’t already have one, head over
    to Google AI Studio, sign up if you need to, and set your key up. The link to
    do so will be near the top right-hand side corner of the dashboard page.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 你还需要一个Google API密钥。如果你还没有，请前往Google AI Studio，如果需要的话进行注册，并设置你的密钥。这样做的方法将在仪表板页面的右上角附近。
- en: '[**Google AI Studio**](https://aistudio.google.com/)'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[**Google AI Studio**](https://aistudio.google.com/)'
- en: Now running this command should bring up a new TAB in your browser with a Notebook.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在运行此命令应该在您的浏览器中打开一个新的标签页，显示一个笔记本。
- en: '[PRE1]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Some limitations to be aware of
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应该注意的一些限制
- en: Before proceeding to our coding examples, there are a few limitations and restrictions
    on the use of URL context grounding you should be aware of.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们进行编码示例之前，您应该了解一些关于URL上下文定位使用限制和约束。
- en: A maximum of 20 URLs can be included per request.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个请求最多可以包含20个URL。
- en: The maximum size for content retrieved from a single URL is 34MB.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从单个URL检索的内容最大大小为34MB。
- en: The following content types are **not** supported
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以下内容类型**不支持**
- en: Paywalled content
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 付费墙内容
- en: YouTube videos
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: YouTube视频
- en: Google Workspace files, like Google Docs or spreadsheets
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Google Workspace文件，如Google Docs或电子表格
- en: Video and audio files
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频和音频文件
- en: With that being said, let’s get on with our examples.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，让我们继续我们的示例。
- en: Example 1 — Interrogating a complex PDF
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例1—询问一个复杂的PDF
- en: My go-to test data file when I’m testing RAG or similar processing against data
    in PDFs is to use one of Tesla’s 10-Q quarterly earnings report. It’s pretty long
    at around 50 pages and has some quite complex layouts with tables etc.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当我对RAG或类似处理针对PDF中的数据进行测试时，我常用的测试数据文件是特斯拉的10-Q季度收益报告。它大约有50页长，有一些相当复杂的布局，包括表格等。
- en: As it’s an SEC filing document, it also means that it’s publicly available and
    completely free to use its contents.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 由于它是一份SEC文件，这也意味着它是公开可用的，并且完全免费使用其内容。
- en: If you want to have a look for yourself, the document can be found at this URL.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想亲自查看，文档可以在以下URL找到。
- en: '[https://ir.tesla.com/_flysystem/s3/sec/000162828023034847/tsla-20230930-gen.pdf](https://ir.tesla.com/_flysystem/s3/sec/000162828023034847/tsla-20230930-gen.pdf)'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://ir.tesla.com/_flysystem/s3/sec/000162828023034847/tsla-20230930-gen.pdf](https://ir.tesla.com/_flysystem/s3/sec/000162828023034847/tsla-20230930-gen.pdf)'
- en: For this PDF, the question I always pose is this,
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个PDF，我总是提出的问题是这样的，
- en: '[PRE2]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The answer to that question is on page 4 of the document. Here is that page.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题的答案在文档的第4页。以下是那一页。
- en: '![](../Images/64b3fc98a09ab36909deab1b8d65ee41.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/64b3fc98a09ab36909deab1b8d65ee41.png)'
- en: Image from Tesla SEC 10-Q filing document
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 来自特斯拉SEC 10-Q文件文档的图片
- en: To humans, the answer is easy to find. As you can see, the Total assets for
    2022/2023 were (in Millions) $82,338/$93,941\. The Total liabilities were (in
    Millions) $36,440/$39,446.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 对人类来说，答案很容易找到。如您所见，2022/2023年的总资产为（以百万为单位）$82,338/$93,941。总负债为（以百万为单位）$36,440/$39,446。
- en: Back in the day (i.e about 18 months ago!), it was challenging to get this information
    from this document using traditional RAG methods.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 回到过去（即大约18个月前），使用传统的RAG方法从这份文档中获取这些信息是具有挑战性的。
- en: How will Google URL context grounding cope?
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 谷歌的URL上下文定位将如何应对？
- en: In your Jupyter notebook, type in this code.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的Jupyter笔记本中输入此代码。
- en: '[PRE3]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: That’s it, just a handful of lines, but let’s see the output.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 就这么多了，只有几行，但让我们看看输出结果。
- en: '[PRE4]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Spot on, not too shabby.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 精准命中，相当不错。
- en: Let’s see if it can pick out some other information. Near the end of the PDF,
    there is a letter to an employee who is about to leave the company outlining their
    terms of severance. Can URL context grounding determine why the exit date referred
    to in the letter is marked by asterisks (***)? Here’s a snippet of the letter.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看它是否能提取其他信息。在PDF的末尾，有一封给即将离职的员工的信，概述了他们的离职条款。URL上下文定位能确定信中提到的离职日期为什么被标记为星号（***）吗？以下是信的片段。
- en: '![](../Images/e0378f2ff241c3fa31ec2fb31fbe8ec8.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e0378f2ff241c3fa31ec2fb31fbe8ec8.png)'
- en: Image from Tesla SEC 10-Q filing document
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 来自特斯拉SEC 10-Q文件文档的图片
- en: The reason for the masking out of the exit date is given in a footnote.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏离职日期的原因在脚注中给出。
- en: '![](../Images/ef4adc8ee3a24eae0429bdd8216f1159.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ef4adc8ee3a24eae0429bdd8216f1159.png)'
- en: Image from Tesla SEC 10-Q filing document
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 来自特斯拉SEC 10-Q文件文档的图片
- en: The code we need to extract this info is very similar to our first example.
    In fact, the only thing that changes is the prompt, so I’ll only show that.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要提取这些信息的代码与我们的第一个例子非常相似。事实上，唯一改变的是提示，所以我只会展示那个。
- en: '[PRE5]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: And the output?
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 输出结果如何？
- en: '[PRE6]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: As you can see, that is spot on once again.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，这又是一次精准的命中。
- en: What are other uses for URL context grounding?
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: URL上下文定位还有什么其他用途？
- en: In my opinion, it opens up a wealth of new opportunities, including:-
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，这开辟了丰富的新的机会，包括：-
- en: '**In-depth Content Analysis and Synthesis.**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**深入内容分析和综合。**'
- en: Data Extraction. The tool can pull specific information, such as prices, names,
    or key findings, from multiple URLs.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据提取。该工具可以从多个URL中提取特定信息，例如价格、名称或关键发现。
- en: Document Comparison. It can analyse multiple reports, articles, or even PDFs
    to identify differences and track trends.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文档比较。它可以分析多个报告、文章，甚至PDF，以识别差异和跟踪趋势。
- en: Content Creation. By combining information from several source URLs, the AI
    can generate accurate summaries, blog posts, or reports. For example, a developer
    could use the tool to compare two recipes from different websites, analysing ingredients
    and cooking times.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容创作。通过结合来自多个源URL的信息，AI可以生成准确的摘要、博客文章或报告。例如，开发者可以使用该工具比较来自不同网站的两种食谱，分析成分和烹饪时间。
- en: Code and Documentation Analysis. Developers can point the AI to a GitHub repository
    or technical documentation to explain code, generate setup instructions, or answer
    specific questions about it.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码和文档分析。开发者可以将AI指向GitHub仓库或技术文档，以解释代码、生成设置说明或回答关于它的具体问题。
- en: '**Sophisticated Agentic Workflows.**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**复杂的代理工作流程。**'
- en: The combination of broad discovery through Google Search and deep analysis via
    the URL context tool forms the basis for complex, multi-step tasks. An AI agent
    could first search for relevant articles on a topic and then use the URL context
    tool to deeply “read” and synthesise information from the most pertinent search
    results.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过谷歌搜索进行广泛发现和通过URL上下文工具进行深度分析的结合，构成了复杂的多步骤任务的基础。一个AI代理可以先搜索一个主题的相关文章，然后使用URL上下文工具从最相关的搜索结果中深入“阅读”和综合信息。
- en: The Gemini CLI, an open-source AI agent, utilises the URL context tool for its
    web-fetch command. This allows developers to quickly summarise webpages, extract
    key information, or even translate content directly from their terminal.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Gemini CLI，一个开源的AI代理，利用URL上下文工具进行其网络抓取命令。这允许开发者快速总结网页、提取关键信息，甚至可以直接从他们的终端翻译内容。
- en: '**Improved Factual Accuracy and Reduced Hallucinations.**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**提高事实准确性并减少幻觉。**'
- en: By grounding responses in the content of specific web pages, the AI’s factual
    accuracy is increased, reducing the likelihood of generating incorrect or fabricated
    information. This also allows the AI to provide citations for its claims, building
    user trust by showing the sources of its information.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过将响应建立在特定网页的内容基础上，人工智能的事实准确性得到提高，减少了生成错误或虚构信息的机会。这也使得人工智能能够为其主张提供引用，通过展示其信息来源来建立用户信任。
- en: '**Supports a wide variety of content types.**'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**支持广泛的多种内容类型**。'
- en: PDFs. The AI can extract text and understand the structure of tables within
    PDF documents, making reports and manuals accessible for grounding.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PDFs。人工智能可以提取PDF文档中的文本，并理解表格的结构，使得报告和手册易于理解。
- en: Images. It can process and analyse images in various formats (PNG, JPEG, BMP,
    WebP), leveraging multimodal capabilities to understand charts and diagrams.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Images。它可以处理和分析各种格式的图像（PNG、JPEG、BMP、WebP），利用多模态能力来理解图表和图表。
- en: Web and Data Files. Continued support for HTML, JSON, XML, CSV, and plain text
    files ensures broad applicability.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Web和Data Files。对HTML、JSON、XML、CSV和纯文本文件的支持确保了广泛的适用性。
- en: Example 2 — Perform a price comparison
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例2—执行价格比较
- en: For our second example, let’s assume we’re on the hunt for a new set of headphones.
    We will feed a list of the URLs of several online shops selling the product into
    our code and ask the model to retrieve the three cheapest products that meet our
    specification.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的第二个例子，让我们假设我们正在寻找一套新的耳机。我们将把几个在线商店销售该产品的URL列表输入到我们的代码中，并要求模型检索符合我们规格的三种最便宜的产品。
- en: '*This example may feel a bit redundant since there are plenty of shopping comparison
    websites out there, but it’s really just meant to highlight the kinds of things
    you can do with the tool.*'
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*这个例子可能感觉有点冗余，因为市面上有很多购物比价网站，但它实际上只是用来突出你可以用这个工具做什么*。'
- en: Say we want to buy a specific model of headphones, e.g. the Sony WH-1000XM5
    Wireless Noise-Cancelling Headphones. We have identified online shops with the
    most competitive prices, but these prices fluctuate almost daily. Let’s create
    a script that can run at any time to return the stores with the three cheapest
    prices.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想购买一款特定的耳机型号，例如索尼WH-1000XM5无线降噪耳机。我们已经确定了价格最具竞争力的在线商店，但这些价格几乎每天都会波动。让我们创建一个可以在任何时间运行的脚本，以返回三家价格最低的商店。
- en: Again, the only difference between this example code and our first is the prompt.
    The rest of the code is the same.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，这个例子代码和我们的第一个例子之间唯一的区别是提示。其余的代码都是相同的。
- en: '[PRE7]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This time the output is.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这次输出是。
- en: '[PRE8]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Example 3 — Company financial analysis and comparisons.
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例3—公司财务分析和比较。
- en: In this example, we’ll compare the Quarter 2, 2025 earnings reports from both
    Amazon and Microsoft. We’ll ask the model to analyse both reports, extract key
    information and conclude with a summary indicating the key strengths and strategies
    of both companies. The data is once again being obtained from their public SEC
    10-Q earnings reports.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将比较2025年第二季度的亚马逊和微软的收益报告。我们将要求模型分析这两份报告，提取关键信息，并以总结的形式指出两家公司的关键优势和策略。数据再次是从它们的公开SEC
    10-Q收益报告中获得的。
