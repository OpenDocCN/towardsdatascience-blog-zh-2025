- en: Reading Research Papers in the Age of LLMs
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/reading-research-papers-in-the-age-of-llms/](https://towardsdatascience.com/reading-research-papers-in-the-age-of-llms/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1764881417669" class="mdspan-comment">Recently there was</mdspan>
    an interesting conversation on X about how it is becoming difficult to keep up
    with new research papers because of their ever-increasing quantity. Honestly,
    it’s a general consensus that it’s impossible to keep up with all the research
    that is currently happening in the AI space, and if we are not able to keep up,
    we are then missing out on a lot of important information. The main crux of the
    conversation was: who are we writing for if humans can’t read it, and if LLMs
    are the ones actually reading the papers, what is the ideal format for them?'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/fe0b15ef1c4efac86f15667b23977403.png)](https://x.com/karpathy/status/1943411187296686448?s=20)'
  prefs: []
  type: TYPE_NORMAL
- en: This had me thinking and it reminded me of an article I wrote back in 2021 on
    the tools I used to [read research papers effectively](https://towardsdatascience.com/my-favorite-tools-for-managing-organizing-and-reading-research-papers-56525083b827/)
    and how I read papers back then. That was the pre-ChatGPT era, and I realised
    how much paper reading has changed for me, since then.
  prefs: []
  type: TYPE_NORMAL
- en: So I’m sharing how I read research papers today, both manually and with AI assistance.
    My hope is that if you are also getting overwhelmed by the pace, some of these
    ideas or tools might help you build a flow that works for you. ***I don’t really
    have the answer to what an ideal paper format should look like in the LLM era***,
    but I can at least share what has worked for me so far.
  prefs: []
  type: TYPE_NORMAL
- en: The Manual way — three-pass method style
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There was a time when all the reading was manual and we used to either print
    papers and read them or do so via an e-reader. During that time I was introduced
    to a paper by S. Keshav on the [**three-pass method**](https://www.lib.sfu.ca/system/files/32376/paper-reading.pdf).
    I’m sure you must have also come across it. It’s a simple yet elegant way of reading
    a paper by breaking the process into three steps.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1ff805b079571cb94bfa091191cabd3c.png)'
  prefs: []
  type: TYPE_IMG
- en: Summary of the 3-Pass method | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'As shown in the figure above, the three-pass method lets you control how deep
    you want to go based on your purpose and the time you have. Here is what each
    pass involves:'
  prefs: []
  type: TYPE_NORMAL
- en: '**The first pass** gives a quick bird’s-eye view. You scan the paper to understand
    its main idea and check if it’s relevant. The goal is to answer the **5 Cs** at
    the end of your reading : the category of the paper, its **contribution**, whether
    the assumptions are **correct**, the **clarity** of the writing and the **context**
    of the work. This shouldn’t take more than 5–10 minutes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The second pass can take up to an hour and goes a bit deeper. You can make notes
    and comments, but skip the proofs for now. You primarily need to focus on the
    figures and graphs and try to see how the ideas connect.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The third and final pass takes time. By now you know the paper is relevant,
    so this is the stage where you read it carefully. You should be able to trace
    the full argument, understand the steps and mentally recreate the work. This is
    also where you question the assumptions and check if the ideas hold up.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Even today, as much as possible, I try to begin with the three-pass method.
    I have found it useful not just for research papers but also for long technical
    blogs and articles.
  prefs: []
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Chatbot summary way — vanilla style
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f7a39da73da91b0c54d16cb98c15d8dc.png)'
  prefs: []
  type: TYPE_IMG
- en: Asking an LLM to sumamrise paper using the 3-pass method | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Today, it’s easy to drop a paper into an LLM-powered chatbot and ask for a quick
    summary. Nothing wrong in that, but I feel most AI summaries are quick and at
    times flatten the ideas.
  prefs: []
  type: TYPE_NORMAL
- en: But I have found few prompts that work better than the vanilla “**summarise
    this paper**” input. For instance, you can ask the LLM to output the summary in
    a three-pass style, the same method we discussed in the previous section which
    gives a much better output.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Another prompt that works well is a simple problem–idea–evidence style:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Or if I want to check how a paper compares with past work, I can ask:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'You can always continue the chat and ask for more details if the first answer
    feels light. But the main issue for me is still the same: you need to switch between
    tabs to look at the paper and then compare the explanation and both sit in different
    places. For me, that constant back-and-forth becomes a point of friction. There
    has to be a better way which keeps both the source and AI assistance on the same
    canvas and this takes us to the next part.'
  prefs: []
  type: TYPE_NORMAL
- en: The specialised tools way — UI matters
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So I set out to explore tools that provide LLM-assistance yet offer a better
    UI and a smoother reading experience. Here are three that I’ve used personally.
    This is not an exhaustive list, just the ones that, in my experience, work well
    without replacing the core reading experience. I’ll also point out out the features
    that I like the most for every tool.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. alphaXiv
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[AlphaXiv](https://www.alphaxiv.org/) is the tool I’ve been using for a long
    time because it has many useful things built right into the platform. It’s easy
    to reach a paper here, either through their feed or by taking any arXiv link and
    replacing **arxiv** with **alphaxiv**. You get a clean interface and a bunch of
    AI-assisted tools that sit right on top of the paper. There is a familiar chat
    window but other than that you can **highlight** any part of the paper and ask
    a question right there. You can also pull in context from other papers using the
    **@ feature**. If you want to go deeper, it shows related papers, the GitHub code,
    how others cite the work and small literature notes around the topic, as well.
    There is an AI audio lecture feature too, but I don’t use it often.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/66ee97d616429782ada625ed3ca9a3ab.png)'
  prefs: []
  type: TYPE_IMG
- en: Interface of alphaXiv showing different available tools | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: My favourite part is the **blog-style mode**. It gives me a simple, readable
    version of the paper that helps me decide if I should do a full deep read or not.
    It keeps the figures and structure in place, almost like how I would turn a paper
    into a blog.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3819d7a938eb0f30721b1655da40d666.png)'
  prefs: []
  type: TYPE_IMG
- en: Blog version of the paper a created by alphaXiv | image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '**How to Try:** Replace *arxiv* with *alphaxiv* in any arXiv link, or open
    it directly from their site at **alphaxiv.org**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. Papiers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: How do you discover new papers? For me it’s through a few newsletters, but most
    of the time it’s from some prominent X accounts. However, the problem is that
    there are many such accounts and so there is a lot of noise and signal has become
    harder to follow. [Papiers](https://papiers.ai/) aggregates conversations about
    a paper and other papers related to it into one place, making the discovery part
    of the reading flow itself.
  prefs: []
  type: TYPE_NORMAL
- en: Papiers is a fairly new tool but already has some great features. For instance,
    in addition to getting conversations about the paper, you can get a **Wiki-style**
    view in two formats — technical and accessible so you can choose the format based
    on your comfort level with the topic. There is also a **Lineage** view that shows
    the paper’s parents and children, so you can see what shaped the work and what
    came after it. And there is also a mind map feature (think NotebookLM) that’s
    pretty neat.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/88d340c7459efdcbce8916d4eb760db9.png)'
  prefs: []
  type: TYPE_IMG
- en: Mind map, Lineage, wiki view and the X feed for a paper displayed side by side
    in [Papiers.ai](https://papiers.ai/) | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: I wanted to point out here that the tool did give me *`paper not found`* error
    for some papers, or the X feed was missing for a few. It did work for the prominent
    papers though. I looked around and found in a X thread that papers currently get
    indexed on demand, so I guess that explains it. But it’s a new tool and I really
    like the offerings, so I’m sure this part will improve over time.
  prefs: []
  type: TYPE_NORMAL
- en: '**How to Try :** Replace *arxiv* with papiers in any arXiv link, or open it
    directly from their site at papiers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3\. Lumi
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Lumi is an open-source tool from the [People + AI Research](https://pair.withgoogle.com/)
    group at Google and as with a lot of their work, it comes with a stunning and
    thoughtful UI. Lumi highlights the key parts of the paper and places short summaries
    in the side margin, so you always get to read the original paper along with AI
    generated sumamry. You can also click on any reference and it takes you straight
    to the exact sentence in the paper. The standout feature of Lumi is that it not
    only explains the text but you can also select an image and ask Lumi to explain
    it as well.
  prefs: []
  type: TYPE_NORMAL
- en: The only downside is that it currently works for [arXiv](https://www.linkedin.com/company/arxiv/)
    papers under a Creative Commons license, but I’d love to see it expand to cover
    all of arXiv and maybe even allow uploading PDFs of other papers.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e1db884dd162f942b575c875ddd3b971.png)'
  prefs: []
  type: TYPE_IMG
- en: Both explain text and explain image options are available in Lumi | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '**How to Try : go to** [https://lumi.withgoogle.com/](https://lumi.withgoogle.com/)
    and then import an arxiv paper under a Creative Commons license, into the interface'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Other tools worth a mention
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'While I mostly use the above mentioned tools, there are a few others that I’ve
    definitely crossed paths with, and I’d encourage you to try them out if they fit
    your flow like: They didn’t become my main choices, but they do have some good
    ideas and might work well for you depending on your reading style.'
  prefs: []
  type: TYPE_NORMAL
- en: '[**OpenRead**](https://www.openread.academy/) is a great option for reading
    papers as well as doing literature survey. It has some great add-ons like comparing
    papers, **paper graphs** to show connected papers and a **paper espresso** feature
    that gives a concise one pager summary of the paper.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/1a1e04d03fd44a7fa4af8e0abbe9c4e9.png)'
  prefs: []
  type: TYPE_IMG
- en: Reading a paper in the [OpenRead](https://www.openread.academy/) interface with
    the other available reading modes shown alongside | Screenshot by Author
  prefs: []
  type: TYPE_NORMAL
- en: Something to note here is that OpenRead is a paid tool but does come with a
    freemium version.
  prefs: []
  type: TYPE_NORMAL
- en: '[**SciSpace**](https://scispace.com/) is a very versatile tool and in addition
    to being able to chat with a paper, you can do semantic literature reviews, go
    deep into research, write papers and even create visualisations for your work.
    There are many other things it offers, which you can explore in their suite. Like
    OpenRead, it is also a paid tool with limited features available in the free tier.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/d42c7c2e3d46154d38177405bf3c9ee0.png)'
  prefs: []
  type: TYPE_IMG
- en: The interface for reading papers in SciSpace | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '[**Daily Papers**](https://huggingface.co/papers/trending) by HuggingFace is
    great option if you wish to see trending papers to see trending papers. Another
    nice touch about his is you can immediately see the models, datasets and spaces
    on HuggingFace citing a particular paper (if they exist) and also chat with the
    authors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/b776c6ca8e567dbcb091d3840b128a15.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of Daily Papers from HuggingFace showing displaying papers for
    [2nd Dec, 2025](https://huggingface.co/papers/date/2025-12-02) | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Most of the reading that I do is part of the literature review for my blog,
    and it’s a mix of the three strategies that I mentioned above. I still like going
    through papers manually, but when I want to go further, see connected papers or
    understand something in more detail, the three tools I mentioned help me a lot.
    I’m aware that there are many more AI-assisted tools for reading papers, but just
    like the phrase *too many cooks spoil the broth*, I like to stick to a few and
    not jump between favourites unless there is a truly standout feature.
  prefs: []
  type: TYPE_NORMAL
