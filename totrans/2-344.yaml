- en: Efficient Graph Storage for Entity Resolution Using Clique-Based Compression
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/efficient-graph-storage-for-entity-resolution-using-clique-based-compression/](https://towardsdatascience.com/efficient-graph-storage-for-entity-resolution-using-clique-based-compression/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In the <mdspan datatext="el1747272593253" class="mdspan-comment">world of entity</mdspan>
    resolution (ER), one of the central challenges is managing and maintaining the
    complex relationships between records. At its core, [Tilores](https://tilores.io)
    models entities as graphs: each node represents a record, and edges represent
    rule-based matches between those records. This approach gives us flexibility,
    traceability, and a high level of accuracy, but it also comes with significant
    storage and computational challenges, especially at scale. This article explains
    the details about efficiently storing highly connected graphs using clique-based
    graph compression.'
  prefs: []
  type: TYPE_NORMAL
- en: The Entity Graph Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In Tilores, a valid entity is a graph where every record is connected to at
    least one other via a matching rule. For instance, if record `a` matches record
    `b` according to rule `R1`, we store that as an edge `"a:b:R1"`. If another rule,
    say `R2`, also connects `a` and `b`, we store an additional edge `"a:b:R2"`. These
    edges are kept as a simple list, but could alternatively be modeled using an adjacency
    list structure for more efficient storage.
  prefs: []
  type: TYPE_NORMAL
- en: Why Retain All Edges?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most entity resolution systems or master data management systems don’t retain
    the relationships between records, but only store a representation of the underlying
    data and typically a generic matching score, leaving the user uncertain about
    how the entity was formed. Even worse, the user has no way to correct errors made
    by the automatic matching system.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hence, retaining all edges in an entity graph serves multiple purposes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Traceability**: Allows the user to understand why two records were grouped
    into the same entity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Analytics**: Insights such as rule effectiveness and data similarity can
    be extracted from edge metadata.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data Deletion & Recalculation**: When a record is deleted or a rule is modified,
    the graph must be recalculated. Edge information is essential to understand how
    an entity was formed and how it should be updated.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Scaling Problem: Quadratic Growth'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When discussing potential scaling issues in entity resolution, this typically
    refers to the challenge of matching each record with all other records. While
    this is a [challenge on its own](https://tilores.io/content/The-Complexities-of-Entity-Resolution-Implementation),
    retaining all edges of an entity results in similar issues on the storage side.
    Entities where many records are connected with each other create a multitude of
    edges. In the worst case every new record is connected to all existing records.
    This quadratic growth can be expressed with the formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '`n * (n - 1) / 2`'
  prefs: []
  type: TYPE_NORMAL
- en: For small entities, this is not an issue. For example, an entity with 3 records
    can have a maximum of 3 edges. For n = 100, this increases to 4,950 edges and
    for n = 1,000 this results in up to 499,500 edges.
  prefs: []
  type: TYPE_NORMAL
- en: This creates an immense storage and computational overhead, especially since
    entity resolution graphs often exhibit this kind of dense connectivity.
  prefs: []
  type: TYPE_NORMAL
- en: 'Solution: Clique-Based Graph Compression (CBGC)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A clique in a graph is a group of nodes where every node is connected to every
    other node in that group. A clique can also be called a complete subgraph. The
    smallest possible clique contains a single node and no edges. A pair of nodes
    connected by an edge also forms a clique. And three nodes, such as the one below,
    form a triangle shaped clique.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4d32696d48ad49b32d035d15ac75c240.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A Simple Clique: Triangle'
  prefs: []
  type: TYPE_NORMAL
- en: (image by the author)
  prefs: []
  type: TYPE_NORMAL
- en: A maximal clique is a clique that cannot be extended by adding any adjacent
    node, and a maximum clique is the clique with the largest number of nodes in the
    whole graph. For the purpose of this article, we’re going to use the term clique
    only to refer to cliques with at least three nodes.
  prefs: []
  type: TYPE_NORMAL
- en: 'The previously shown triangle could be represented in Tilores by the following
    edges:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Because a triangle is a clique, we could also represent the graph by storing
    only the nodes in this clique and the associated rule ID:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s consider the following slightly more complicated graph:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5ca5fbb46735d46c72390c9922daed3c.png)'
  prefs: []
  type: TYPE_IMG
- en: Complete Subgraph with 6 Nodes
  prefs: []
  type: TYPE_NORMAL
- en: (image by the author)
  prefs: []
  type: TYPE_NORMAL
- en: 'Based on its appearance, we can easily spot that all nodes are connected to
    each other. So instead of listing all 15 edges [remember `n*(n-1)/2`], we can
    simply store this clique in the following form:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'However, in a realistic graph, not all records are connected to each other.
    Consider the following graph:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f17a8974a33ecf2935976e03ea67441a.png)'
  prefs: []
  type: TYPE_IMG
- en: A Complex Graph with Three Highlighted Cliques
  prefs: []
  type: TYPE_NORMAL
- en: (image by the author)
  prefs: []
  type: TYPE_NORMAL
- en: 'There are three larger cliques highlighted: yellow, red and blue (teal if you’re
    picky). There is also a single remaining node. While those are probably the largest
    cliques, you might spot dozens of others. For example, do you notice the 4-node
    clique between the two red and two yellow nodes?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Sticking with the colored cliques, we could store them in the following way
    (using y, r and b for yellow, red and blue):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Additionally, we can store the remaining 10 edges (p for purple):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: This means that the whole graph can now be represented with only three cliques
    and ten edges, instead of the original 38 edges.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5aa43724f80c63fed3d76d61cae53d5f.png)'
  prefs: []
  type: TYPE_IMG
- en: Compressed Graph
  prefs: []
  type: TYPE_NORMAL
- en: (image by the author)
  prefs: []
  type: TYPE_NORMAL
- en: This clique-based graph compression (CBGC) is loss-free (unless you need edge
    properties). In a realistic dataset, we identified massive storage savings. For
    one customer, CBGC reduced edge storage by 99.7%, replacing hundreds of thousands
    of edges with just a few hundred cliques and sparse edges.
  prefs: []
  type: TYPE_NORMAL
- en: Performance Benefits Beyond Storage
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: CBGC is not just about compression. It also enables faster operations, particularly
    when handling record and edge deletion.
  prefs: []
  type: TYPE_NORMAL
- en: Any sane entity resolution engine should split an entity into multiple ones
    if the only link between two subgraphs was deleted, for example, due to regulatory
    or compliance reasons. Identifying separate, unconnected subgraphs is typically
    done using a connected components algorithm. In short, it works by grouping all
    nodes that are connected via edges into separate subgraphs. As a result each edge
    needs to be checked at least once.
  prefs: []
  type: TYPE_NORMAL
- en: However, if a graph is stored as a compressed graph, then there is no need to
    traverse all edges of a clique. Instead it is sufficient to add a limited number
    of edges for each clique, for example a transitive path between the nodes of a
    clique, treating each clique as a pre-connected subgraph.
  prefs: []
  type: TYPE_NORMAL
- en: 'Trade-Offs: Clique Detection Complexity'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There is a trade-off: clique detection is computationally expensive, particularly
    when attempting to find the maximum cliques, a well-known NP-hard problem.'
  prefs: []
  type: TYPE_NORMAL
- en: In practice it is often sufficient to simplify this workload. Approximate algorithms
    for clique detection (e.g. greedy heuristics) perform well enough for most uses.
    Additionally, CBGC is recalculated selectively, usually when an entity’s edge
    count surpasses a threshold. This hybrid approach balances compression efficiency
    with acceptable processing cost.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond Cliques
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Arguably, the most common pattern in entity resolution is the complete subgraph.
    However, further optimization could be achieved by identifying other recurring
    patterns such as
  prefs: []
  type: TYPE_NORMAL
- en: 'stars: store as a list of nodes where the first entry represents the central
    node'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'paths: store as an ordered list of nodes'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'communities: store like a clique and mark the missing edges'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Closing Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Entity resolution systems often face the challenge of managing dense, highly
    interconnected graphs. Storing all edges naively quickly becomes unsustainable.
    CBGC provides an efficient way to model entities by exploiting structural properties
    of the data.
  prefs: []
  type: TYPE_NORMAL
- en: Not only does it reduce storage overhead, but it also improves system performance,
    especially during data deletion and reprocessing. While clique detection has its
    computational costs, careful engineering choices allow us to reap the benefits
    without sacrificing scalability.
  prefs: []
  type: TYPE_NORMAL
