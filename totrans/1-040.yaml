- en: 'The Greedy Boruta Algorithm: Faster Feature Selection Without Sacrificing Recall'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Greedy Boruta算法：不牺牲召回率的快速特征选择
- en: 原文：[https://towardsdatascience.com/the-greedy-boruta-algorithm-faster-feature-selection-without-sacrificing-recall/](https://towardsdatascience.com/the-greedy-boruta-algorithm-faster-feature-selection-without-sacrificing-recall/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-greedy-boruta-algorithm-faster-feature-selection-without-sacrificing-recall/](https://towardsdatascience.com/the-greedy-boruta-algorithm-faster-feature-selection-without-sacrificing-recall/)
- en: '*This article was a collaborative effort. A special thank you to [Estevão Prado](https://www.linkedin.com/in/estev%C3%A3o-prado-998097238/),
    whose expertise helped refine both the technical concepts and the narrative flow.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*本文是一个协作成果。特别感谢[Estevão Prado](https://www.linkedin.com/in/estev%C3%A3o-prado-998097238/)，他的专业知识帮助完善了技术概念和叙事流程。*'
- en: Code availability
  id: totrans-3
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码可用性
- en: The complete implementation of Greedy Boruta is available at [GreedyBorutaPy](https://www.google.com/url?sa=E&q=https%3A%2F%2Fgithub.com%2FNicolas-Vana%2FGreedyBorutaPy).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: Greedy Boruta的完整实现可在[GreedyBorutaPy](https://www.google.com/url?sa=E&q=https%3A%2F%2Fgithub.com%2FNicolas-Vana%2FGreedyBorutaPy)找到。
- en: Greedy Boruta is also available as a PyPI package at [greedyboruta.](https://pypi.org/project/greedyboruta/)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: Greedy Boruta作为PyPI包也可用，地址为[greedyboruta.](https://pypi.org/project/greedyboruta/)
- en: <mdspan datatext="el1764269343707" class="mdspan-comment">Introduction</mdspan>
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764269343707" class="mdspan-comment">简介</mdspan>
- en: Feature selection remains one of the most critical yet computationally expensive
    steps in the machine learning pipeline. When working with high-dimensional datasets,
    identifying which features truly contribute to predictive power can mean the difference
    between an interpretable, efficient model and an overfit, sluggish one.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 特征选择仍然是机器学习流程中最关键且计算成本最高的步骤之一。当处理高维数据集时，确定哪些特征真正有助于预测能力可能意味着一个可解释、高效的模型与一个过度拟合、缓慢的模型之间的区别。
- en: In this article, I present the Greedy Boruta algorithm—a modification to the
    Boruta algorithm [1] that, in our tests, reduces computation time by 5-40× while
    mathematically provably maintaining or improving recall. Through theoretical analysis
    and simulation experiments, I demonstrate how a simple relaxation of the confirmation
    criterion provides guaranteed convergence in *O(-log α)* iterations, where *α* is
    the significance level of the binomial tests, compared to the vanilla algorithm’s
    unbounded runtime.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我介绍了Greedy Boruta算法——对Boruta算法[1]的一种改进，在我们的测试中，它将计算时间减少了5-40倍，同时数学上证明了召回率的保持或提高。通过理论分析和模拟实验，我展示了通过简单放宽确认标准，在*O(-log
    α)*次迭代中提供保证收敛，其中*α*是二项式检验的显著性水平，与原始算法的无界运行时间相比。
- en: The Boruta algorithm has long been a favorite among data scientists for its
    “all-relevant” approach to feature selection and its statistical framework. Unlike
    minimal-optimal methods, such as [Minimum Redundancy Maximum Relevance](https://www.google.com/url?sa=E&q=https%3A%2F%2Fgithub.com%2Fsmazzanti%2Fmrmr) (mRMR)
    and recursive feature elimination (RFE), that seek the smallest set of features
    for prediction, Boruta aims to identify all features that carry useful information.
    This philosophical difference matters tremendously when the goal is understanding
    a phenomenon rather than merely making predictions, for instance.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: Boruta算法因其“全相关”的特征选择方法和其统计框架而长期以来一直是数据科学家的最爱。与寻求预测中最小特征集的最小最优方法，如[最小冗余最大相关](https://www.google.com/url?sa=E&q=https%3A%2F%2Fgithub.com%2Fsmazzanti%2Fmrmr)（mRMR）和递归特征消除（RFE）不同，Boruta旨在识别所有携带有用信息的特征。当目标是理解现象而不是仅仅做出预测时，这种哲学上的差异至关重要，例如。
- en: However, Boruta’s thoroughness comes at a high computational cost. In real-world
    applications with hundreds or thousands of features, the algorithm can take prohibitively
    long to converge. This is where the Greedy Boruta Algorithm enters the picture.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，Boruta的彻底性带来了高昂的计算成本。在具有数百或数千个特征的现实世界应用中，该算法可能需要过长的时间才能收敛。这就是Greedy Boruta算法出现的原因。
- en: Understanding the vanilla Boruta algorithm
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解Boruta算法的原始版本
- en: Before examining the modification, let’s recap how the vanilla Boruta algorithm
    works.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在检查改进之前，让我们回顾一下原始Boruta算法的工作原理。
- en: Boruta’s genius lies in its elegant approach to determining feature importance.
    Rather than relying on arbitrary thresholds or p-values directly from a model,
    it creates a competitive benchmark using shadow features.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: Boruta的卓越之处在于其确定特征重要性的优雅方法。它不是依赖于任意阈值或模型直接得到的p值，而是使用影子特征创建一个竞争基准。
- en: '**Here’s the process:**'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '**Shadow feature creation:** For each feature in the dataset, Boruta creates
    a “shadow” copy by randomly shuffling its values. This destroys any relationship
    the original feature has with the response (or target) variable while preserving
    its distribution.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Importance computation:** A Random Forest is trained on the combined dataset
    and feature importances are calculated for all features. Although Boruta was initially
    proposed for Random Forest estimators, the algorithm can work with any other tree-based
    ensemble that provides feature importance scores (e.g., [Extra Trees](https://www.google.com/url?sa=E&q=https%3A%2F%2Flink.springer.com%2Farticle%2F10.1007%2Fs10994-006-6226-1) [2], [XGBoost](https://www.google.com/url?sa=E&q=https%3A%2F%2Fdl.acm.org%2Fdoi%2F10.1145%2F2939672.2939785) [3],
    [LightGBM](https://lightgbm.readthedocs.io/en/stable/) [4]).'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Hit registration:** For each non-shadow feature, Boruta checks whether the
    importance of the feature is greater than the maximum importance of the shadows.
    Non-shadow features that are more important than the most important shadow are
    assigned a “hit” and the ones that are less important are assigned “no-hit”.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Statistical testing:** Based on the lists of hits and no-hits for each of
    the non-shadow features, Boruta performs a binomial test to determine whether
    its importance is significantly greater than the maximum importance among shadow
    features across multiple iterations.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Decision making:** Features that consistently outperform the best shadow
    feature are marked as “confirmed.” Features that consistently underperform are
    “rejected.” Features in the middle (those that are not statistically significantly
    different from the best shadow) remain “tentative”.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Iteration:** Steps 2–5 repeat until all features are classified as confirmed
    or rejected. In this article, I say that the Boruta algorithm “has converged”
    when all features are either confirmed or rejected or when a maximum number of
    iterations has been reached.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The binomial test: Boruta’s decision criterion'
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The vanilla Boruta uses a rigorous statistical framework. After multiple iterations,
    the algorithm performs a binomial test on the hits for each of the non-shadow
    features:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '**Null hypothesis:** The feature **is no better** than the best shadow feature
    (50% chance of beating shadows by random chance).'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Alternative hypothesis:** The feature is better than the best shadow feature.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Confirmation criterion:** If the binomial test p-value is below *α* (typically
    between 0.05–0.01), the feature is confirmed.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This same process is also done to reject features:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '**Null hypothesis:** The feature **is better** than the best shadow (50% chance
    of not beating shadows by random chance).'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Alternative hypothesis:** The feature is no better than the best shadow feature.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Rejection criterion:** If the binomial test p-value is below *α*, the feature
    is rejected.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This approach is statistically sound and conservative; however, it requires
    many iterations to accumulate sufficient evidence, especially for features that
    are relevant but only marginally better than noise.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法在统计学上是稳健且保守的；然而，它需要多次迭代来积累足够的证据，尤其是对于相关但仅略优于噪声的特征。
- en: The convergence issue
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 收敛性问题
- en: 'The vanilla Boruta algorithm faces two major convergence issues:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 原始 Boruta 算法面临两个主要的收敛问题：
- en: '**Long runtime:** Because the binomial test requires many iterations to reach
    statistical significance, the algorithm might require hundreds of iterations to
    classify all features, especially when using small *α* values for high confidence. **Furthermore,
    there are no guarantees or estimates for convergence, that is, there is no way
    to determine how many iterations will be required for all the features to be categorized
    into “confirmed” or “rejected”.**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**运行时间长：** 由于二项式检验需要多次迭代以达到统计显著性，算法可能需要数百次迭代来分类所有特征，尤其是在使用小 *α* 值以获得高置信度时。**此外，没有保证或估计收敛性，也就是说，没有方法可以确定需要多少次迭代才能将所有特征分类为“确认”或“拒绝”。**'
- en: '**Tentative features:** Even after reaching a maximum number of iterations,
    some features may remain in the “tentative” category, leaving the analyst with
    incomplete information.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**暂定特征：** 即使达到最大迭代次数，一些特征可能仍然保留在“暂定”类别中，使分析师的信息不完整。'
- en: These challenges motivated the development of the Greedy Boruta Algorithm.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这些挑战促使开发了 Greedy Boruta 算法。
- en: The Greedy Boruta algorithm
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Greedy Boruta 算法
- en: The Greedy Boruta Algorithm introduces a fundamental change to the confirmation
    criterion that dramatically improves convergence speed while maintaining high
    recall.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: Greedy Boruta 算法对确认标准引入了根本性的改变，这极大地提高了收敛速度，同时保持了高召回率。
- en: The name comes from the algorithm’s eager approach to confirmation. Like greedy
    algorithms that make locally optimal choices, Greedy Boruta immediately accepts
    any feature that shows promise, without waiting to accumulate statistical evidence.
    This trade-off favors speed and sensitivity over specificity.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 该名称来源于算法对确认的渴望方法。像贪婪算法那样做出局部最优选择，Greedy Boruta 立即接受任何显示出希望的任何特征，而不等待积累统计证据。这种权衡有利于速度和灵敏度，而不是特异性。
- en: Relaxed confirmation
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确认放宽
- en: Instead of requiring statistical significance through a binomial test, the Greedy
    Boruta confirms any feature that has beaten the maximum shadow importance **at
    least once** across all iterations, while keeping the same rejection criterion.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 与通过二项式检验要求统计显著性不同，Greedy Boruta 确认了在所有迭代中至少一次击败最大影子重要性的任何特征，同时保持相同的拒绝标准。
- en: The rationale behind this relaxation is that in “all-relevant” feature selection,
    as the name suggests, we typically prioritize retaining all relevant features
    over eliminating all irrelevant features. The further removal of the non-relevant
    features can be done with “minimal-optimal” feature selection algorithms downstream
    in the machine learning pipeline. Therefore, this relaxation is practically sound
    and produces the expected results from an “all-relevant” feature selection algorithm.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这种放宽的理由在于，“所有相关”特征选择中，正如其名所示，我们通常优先考虑保留所有相关特征，而不是消除所有不相关特征。非相关特征的进一步去除可以在机器学习管道下游使用“最小-最优”特征选择算法来完成。因此，这种放宽在实践上是合理的，并能够产生预期的“所有相关”特征选择算法的结果。
- en: This seemingly simple change **has several important implications:**
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这种看似简单的改变**有几个重要的含义：**
- en: '**Maintained recall:** Because we are relaxing the confirmation criterion (making
    it easier to confirm features), we can never have lower recall than the vanilla
    Boruta. Any feature that is confirmed by the vanilla method will also be confirmed
    by the greedy version. This can be easily proven since it is impossible for a
    feature to be deemed more important than the best shadow in the binomial test
    without a single hit.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保持召回率：** 由于我们放宽了确认标准（使其更容易确认特征），我们永远不会比原始 Boruta 的召回率低。任何通过原始方法确认的特征也将被贪婪版本确认。这可以很容易地证明，因为一个特征不可能在没有一次击中时被认为比二项式检验中的最佳影子更重要。'
- en: '**Guaranteed Convergence in K iterations:** As will be shown below, this change
    makes it so that it is possible to compute how many iterations are required until
    all features are either confirmed or rejected.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**K 次迭代内保证收敛：** 如下所示，这种改变使得可以计算需要多少次迭代才能使所有特征要么被确认要么被拒绝。'
- en: '**Faster convergence:** As a direct consequence of the point above, the Greedy
    Boruta algorithm needs far less iterations than the vanilla Boruta for all features
    to be sorted. More specifically, the minimum number of iterations for the vanilla
    algorithm to sort its “first batch” of features is the same at which the greedy
    version finishes running.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更快收敛**：上述点的直接后果是，Greedy Boruta 算法需要的迭代次数远少于 vanilla Boruta，以便对所有特征进行排序。更具体地说，vanilla
    算法对“第一批”特征进行排序所需的最小迭代次数与贪婪版本完成运行时的迭代次数相同。'
- en: '**Hyperparameter Simplification:** Another consequence of the guaranteed convergence
    is that some of the parameters used in the vanilla Boruta algorithm, such as max_iter (maximum
    number of iterations), early_stopping (boolean determining whether the algorithm
    should stop earlier if no change is seen across a number of iterations) and n_iter_no_change (minimum
    number of iterations with no change before early stopping is triggered), can be
    entirely removed without loss in flexibility. This simplification improves the
    algorithm’s usability and makes the feature selection process easier to manage.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超参数简化**：保证收敛的另一个后果是，在 vanilla Boruta 算法中使用的某些参数，例如 max_iter（最大迭代次数）、early_stopping（一个布尔值，决定算法是否应该在多次迭代后没有变化时提前停止）和
    n_iter_no_change（触发提前停止前的最小无变化迭代次数），可以完全移除而不会损失灵活性。这种简化提高了算法的可用性，并使得特征选择过程更容易管理。'
- en: The modified algorithm
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 修改后的算法
- en: 'The Greedy Boruta algorithm follows this process:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: Greedy Boruta 算法遵循以下流程：
- en: '**Shadow feature creation:** Exactly the same as the vanilla Boruta. Shadow
    features are created based on each of the features of the dataset.'
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**影子特征创建**：与 vanilla Boruta 完全相同。影子特征是基于数据集的每个特征创建的。'
- en: '**Importance computation:** Exactly the same as the vanilla Boruta. Feature
    importance scores are computed based on any tree-based ensemble machine learning
    algorithm.'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重要性计算**：与 vanilla Boruta 完全相同。特征重要性分数是基于任何基于树的集成机器学习算法计算的。'
- en: '**Hit registration:** Exactly the same as the vanilla Boruta. Assigns hits
    to non-shadow features that are more important than the most important shadow
    feature.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**命中注册**：与 vanilla Boruta 完全相同。将命中分配给比最重要的影子特征更重要的非影子特征。'
- en: '**Statistical testing:** Based on the lists of **no-hits** for each of the
    non-shadow feature, Greedy Boruta performs a binomial test to determine whether
    its importance is not significantly greater than the maximum importance among
    shadow features across multiple iterations.'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**统计测试**：基于每个非影子特征的 **无命中** 列表，Greedy Boruta 执行二项式测试，以确定其重要性是否在多个迭代中不显著大于影子特征中的最大重要性。'
- en: '**Decision making [Modified]:** **Features with at least one hit are confirmed.** Features
    that consistently underperform in relation to the best shadow are “rejected.” **Features
    with zero hits remain “tentative”.**'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**决策制定[修改]**：**至少有一个命中率的特征被确认**。与最佳影子特征相比表现持续不佳的特征被“拒绝”。**零命中率的特征保持“暂定”状态**。'
- en: '**Iteration:** Steps 2–5 repeat until all features are classified as confirmed
    or rejected.'
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**迭代**：步骤 2–5 重复，直到所有特征都被分类为确认或拒绝。'
- en: This greedy version is based on the original *boruta_py* [5] implementation
    with a few tweaks, so most things are kept the same as this implementation, except
    for the changes mentioned above.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这个贪婪版本基于原始的 *boruta_py* [5] 实现，并进行了一些调整，所以大多数东西都与这个实现相同，除了上述提到的变化。
- en: Statistical insight on convergence guarantee
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于收敛保证的统计洞察
- en: One of the most elegant properties of the Greedy Boruta Algorithm is its guaranteed
    convergence within a specified number of iterations that depends on the chosen *α* value.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: Greedy Boruta 算法最优雅的特性之一是其保证在指定次数的迭代内收敛，这个次数取决于选择的 *α* 值。
- en: Because of the relaxed confirmation criterion, we know that any feature with
    one or more hits is confirmed and we do not need to run binomial tests for confirmation.
    Conversely, **we know that every tentative feature has zero hits**. This fact
    greatly simplifies the equation representing the binomial test required to reject
    features.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 由于放宽了确认标准，我们知道任何有一个或多个命中的特征都被确认，我们不需要运行二项式测试来确认。相反，**我们知道每个暂定特征都没有命中**。这个事实极大地简化了表示拒绝特征所需的二项式测试的方程。
- en: 'More specifically, the binomial test is simplified as follows. Considering
    the one-sided binomial test described above for rejection in the vanilla Boruta
    algorithm, with *H₀* being *p = p₀* and *H₁* being *p < p₀*, the *p-value* is
    calculated as:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地说，二项式检验被简化如下。考虑上述vanilla Boruta算法中的单侧二项式检验，其中*H₀*是*p = p₀*，*H₁*是*p < p₀*，p值计算如下：
- en: '![](../Images/985749eaae1baaeedbac528c21991840.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/985749eaae1baaeedbac528c21991840.png)'
- en: 'This formula sums the probabilities of observing k successes for all values
    from k = 0 up to the observed x. Now, given the known values in this scenario
    (*p₀* = 0.5 and x = 0), the formula simplifies to:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 此公式求和了从k = 0到观察到的x的所有值的k次成功的概率。现在，给定此场景中的已知值（*p₀* = 0.5和x = 0），公式简化为：
- en: '![](../Images/6bc5aaceb32f28ffa9de3fa11a1a1025.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6bc5aaceb32f28ffa9de3fa11a1a1025.png)'
- en: 'To reject *H₀* at significance level *α*, we need:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 要在显著性水平*α*下拒绝*H₀*，我们需要：
- en: '![](../Images/007a49ab6ad4e6c5fcb811e5846a35f9.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/007a49ab6ad4e6c5fcb811e5846a35f9.png)'
- en: 'Substituting our simplified *p-value*:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 代入简化的*p-value*：
- en: '![](../Images/24e8a4155f0269e6aef77740b0c5aa5a.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/24e8a4155f0269e6aef77740b0c5aa5a.png)'
- en: 'Taking the reciprocal (and reversing the inequality):'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 取倒数（并反转不等式）：
- en: '![](../Images/5bd80ac9b9765d289180bd99f821267c.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5bd80ac9b9765d289180bd99f821267c.png)'
- en: 'Taking logarithms base 2 of both sides:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对两边取以2为底的对数：
- en: '![](../Images/eaa60da9f6e7786f69fd538fa1c2769a.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eaa60da9f6e7786f69fd538fa1c2769a.png)'
- en: 'Therefore, the **sample size** required is:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，所需的**样本量**为：
- en: '![](../Images/f363c46baea4a0432aec36911df91235.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f363c46baea4a0432aec36911df91235.png)'
- en: '**This implies that at most *⌈ log₂(1/α)⌉* iterations of the Greedy Boruta
    algorithm are run until all features are sorted into either “confirmed” or “rejected”
    and convergence has been achieved.** This means that the Greedy Boruta algorithm
    has *O(-log α)* complexity.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**这意味着Greedy Boruta算法最多运行*⌈ log₂(1/α)⌉*次迭代，直到所有特征都被分类为“确认”或“拒绝”，并且达到收敛。** 这意味着Greedy
    Boruta算法具有*O(-log α)*的复杂度。'
- en: Another consequence of all tentative features having 0 hits is the fact that
    we can further optimize the algorithm by not running any statistical tests across
    iterations.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 所有暂定特征0次命中的另一个后果是我们可以通过不运行任何跨迭代的统计测试来进一步优化算法。
- en: More specifically, given *α*, it is possible to determine the maximum number
    of iterations *K* required to reject a variable. Therefore, for every iteration *<
    K*, if a variable has a hit, it is confirmed, and if it does not, it is tentative
    (since the p-value for all iterations *< K* will be greater than *α*). Then, at
    exactly iteration *K*, all variables that have 0 hits can be moved into the rejected
    category with no binomial tests being run, since we know that the *p-values* will
    all be smaller than *α* at this point.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地说，给定*α*，可以确定拒绝一个变量所需的最大迭代次数*K*。因此，对于每个小于*K*的迭代，如果一个变量有命中，则它被确认，如果没有命中，则它是暂定的（因为所有小于*K*的迭代中的p值都将大于*α*）。然后，在恰好迭代*K*时，所有0次命中的变量可以被移动到拒绝类别，无需进行任何二项式检验，因为我们知道在这个点上所有*p-values*都将小于*α*。
- en: '**This also means that, for a given *α*, the total number of iterations run
    by the Greedy Boruta algorithm is equal to the minimum number of iterations it
    takes for the vanilla implementation to either confirm or reject any feature!**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**这也意味着，对于给定的*α*，Greedy Boruta算法运行的总迭代次数等于vanilla实现确认或拒绝任何特征所需的最小迭代次数！**'
- en: Finally, it is important to note that the *boruta_py* implementation uses **False
    Discovery Rate (FDR)** correction to account for the increased chance of false
    positives when performing multiple hypothesis tests. In practice, the required
    value of *K* is not exactly as shown in the equation above, but the complexity
    in relation to *α* is still logarithmic.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，重要的是要注意，*boruta_py*实现使用**假发现率（FDR）校正**来考虑在执行多个假设测试时增加的假阳性机会。在实践中，所需的*K*值并不完全如上述方程所示，但与*α*相关的复杂性仍然是对数级的。
- en: 'The table below contains the number of required iterations for different *α* values
    with the correction applied:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 下表包含了应用校正后不同*α*值所需的迭代次数：
- en: '![](../Images/80b140255e3332dc373cb8da37312047.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/80b140255e3332dc373cb8da37312047.png)'
- en: Simulation experiments
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模拟实验
- en: To empirically evaluate the Greedy Boruta Algorithm, I conducted experiments
    using synthetic datasets where the ground truth is known. This approach allows
    precise measurement of the algorithm’s performance.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实证评估Greedy Boruta算法，我使用已知真实值的合成数据集进行了实验。这种方法允许精确测量算法的性能。
- en: Methodology
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 方法论
- en: '**Synthetic data generation:** I created datasets with a known set of important
    and unimportant features using sklearn’s [make_classification](https://www.google.com/url?sa=E&q=https%3A%2F%2Fscikit-learn.org%2Fstable%2Fmodules%2Fgenerated%2Fsklearn.datasets.make_classification.html) function,
    allowing for direct computation of selection performance metrics. Furthermore,
    these datasets include ‘redundant features’—linear combinations of informative
    features that carry predictive information but are not strictly necessary for
    prediction. In the ‘all-relevant’ paradigm, these features should ideally be identified
    as important since they do contain signal, even if that signal is redundant. The
    evaluation therefore considers informative features and redundant features together
    as the ‘ground truth relevant set’ when computing recall.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**合成数据生成：** 我使用sklearn的[make_classification](https://www.google.com/url?sa=E&q=https%3A%2F%2Fscikit-learn.org%2Fstable%2Fmodules%2Fgenerated%2Fsklearn.datasets.make_classification.html)函数创建具有已知重要和不重要特征的数据集，允许直接计算选择性能指标。此外，这些数据集包括“冗余特征”——信息特征的信息组合，这些组合携带预测信息，但不是预测所必需的。在“所有相关”范式下，这些特征理想情况下应被识别为重要，因为它们确实包含信号，即使这种信号是冗余的。因此，在计算召回率时，将信息特征和冗余特征一起视为“真实相关集”。'
- en: '**Metrics:** Both algorithms are evaluated on:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**指标：** 两种算法在以下方面进行评估：'
- en: '**Recall (Sensitivity):** What proportion of truly important features were
    correctly identified?'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**召回率（灵敏度）：** 真正重要的特征被正确识别的比例是多少？'
- en: '**Specificity:** What proportion of truly unimportant features were correctly
    rejected?'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特异性：** 真正不重要的特征被正确拒绝的比例是多少？'
- en: '**F1 Score:** The harmonic mean of precision and recall, balancing the trade-off
    between correctly identifying important features and avoiding false positives'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**F1分数：** 精确率和召回率的调和平均值，平衡正确识别重要特征和避免假阳性的权衡'
- en: '**Computational time:** Wall-clock time to completion'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算时间：** 完成任务的墙钟时间'
- en: Experiment 1 – Varying α
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实验1 – α的变化
- en: '**Dataset characteristics**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据集特征**'
- en: '[PRE0]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This constitutes a “hard” feature selection problem because of the high dimensionality
    (500 variables), with a small sample size (1000 samples), small number of relevant
    features (sparse problem, with around 10% of the features being relevant in any
    way) and fairly high label noise. It is important to create such a “hard” problem
    to effectively compare the performances of the methods, otherwise, both methods
    would achieve near-perfect results after only a few iterations.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这构成了一个“困难”的特征选择问题，因为维度高（500个变量），样本量小（1000个样本），相关特征数量少（稀疏问题，任何情况下大约有10%的特征是相关的）和标签噪声较高。创建这样的“困难”问题对于有效地比较方法的性能很重要，否则，两种方法在迭代几次后都会实现近乎完美的结果。
- en: '**Hyperparameters used**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用的超参数**'
- en: In this experiment, we assess how the algorithms perform with different *α*,
    so we evaluated both methods using *α* from the list [0.00001, 0.0001, 0.001,
    0.01, 0.1, 0.2].
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实验中，我们评估算法在不同*α*值下的表现，因此我们使用列表[0.00001, 0.0001, 0.001, 0.01, 0.1, 0.2]中的*α*评估了两种方法。
- en: 'Regarding the hyperparameters of the Boruta and Greedy Boruta algorithms, both
    use an sklearn ExtraTreesClassifier as the estimator with the following parameters:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 关于Boruta和Greedy Boruta算法的超参数，两者都使用sklearn的ExtraTreesClassifier作为估计器，具有以下参数：
- en: '[PRE1]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The Extra Trees classifier was chosen as the estimator because of its fast fitting
    time and the fact that it is more stable when considering feature importance estimation
    tasks [2].
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 选择Extra Trees分类器作为估计器，是因为其拟合时间快，并且在考虑特征重要性估计任务时更稳定 [2]。
- en: Finally, the vanilla Boruta uses no early stopping (this parameter makes no
    sense in the context of Greedy Boruta).
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，原味Boruta没有使用早期停止（在Greedy Boruta的上下文中，此参数没有意义）。
- en: '**Number of trials**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**试验次数**'
- en: 'The vanilla Boruta algorithm is configured to run at most 512 iterations but
    with an early stopping condition. This means that if no changes are seen in X
    iterations (n_iter_no_change), the run stops. For each *α*, a value of n_iter_no_change is
    defined as follows:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 原味Boruta算法配置为最多运行512次迭代，但具有早期停止条件。这意味着如果在X次迭代（n_iter_no_change）内没有看到任何变化，则运行停止。对于每个*α*，n_iter_no_change的值定义如下：
- en: '![](../Images/d25a06dcde4a573f6e8d98257055f9c2.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d25a06dcde4a573f6e8d98257055f9c2.png)'
- en: Early stopping is enabled because a careful user of the vanilla Boruta algorithm
    would set this if the wall-clock time of the algorithm run is high-enough, and
    is a more sensible use of the algorithm overall.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 启用提前停止是因为一个谨慎使用原始Boruta算法的用户会在算法运行时间墙钟时间足够高时设置此选项，并且是算法整体更合理的使用方式。
- en: 'These early stopping thresholds were chosen to balance computational cost with
    convergence likelihood: smaller thresholds for larger *α* values (where convergence
    is faster) and larger thresholds for smaller *α* values (where statistical significance
    takes more iterations to accumulate). This reflects how a practical user would
    configure the algorithm to avoid unnecessarily long runtimes.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 这些提前停止阈值的选择是为了平衡计算成本与收敛可能性：对于较大的*α*值（收敛更快）选择较小的阈值，对于较小的*α*值（统计显著性需要更多迭代来积累）选择较大的阈值。这反映了实际用户如何配置算法以避免不必要的长时间运行。
- en: 'Results: performance comparison'
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结果：性能比较
- en: '![](../Images/4db5f04bf837db5ade05661e8add5a18.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4db5f04bf837db5ade05661e8add5a18.png)'
- en: '*Figure 1: Recall, specificity and F1 for both methods with 6 different α values
    ([0.00001, 0.0001, 0.001, 0.01, 0.1, 0.2]), with wall-clock times increasing as
    α decreases, monotonically.*'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '*图1：两种方法在6个不同的α值（[0.00001, 0.0001, 0.001, 0.01, 0.1, 0.2]）下的召回率、特异性和F1值，随着α值的减小，墙钟时间单调增加。*'
- en: '**Key finding:** As presented in the left-most panel of Figure 1, Greedy Boruta
    achieves recall that is greater than or equal to that of the vanilla Boruta across
    all experimental conditions. For the two smallest *α* values, the recall is equal
    and for the others, the Greedy Boruta implementation has slightly greater recall,
    confirming that the relaxed confirmation criterion does not miss features that
    the vanilla method would catch.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**主要发现**：如图1最左侧面板所示，贪婪Boruta在所有实验条件下都实现了大于或等于原始Boruta的召回率。对于两个最小的*α*值，召回率相等，而对于其他值，贪婪Boruta实现具有略微更高的召回率，这证实了放宽的确认标准不会错过原始方法会捕获的特征。'
- en: '**Observed trade-off:** Greedy Boruta shows modestly lower specificity in some
    settings, confirming that the relaxed criterion does result in more false positives.
    However, the magnitude of this effect is smaller than expected, resulting in only
    2-6 additional features being selected on this dataset with 500 variables. This
    increased false-positive rate is acceptable in most downstream pipelines for two
    reasons: (1) the absolute number of additional features is small (2-6 features
    in this 500-feature dataset), and (2) subsequent modeling steps (e.g., regularization,
    cross-validation, or minimal-optimal feature selection) can filter these features
    if they do not contribute to predictive performance.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**观察到的权衡**：在有些设置中，贪婪Boruta显示出略微较低的特异性，这证实了放宽的标准确实会导致更多的假阳性。然而，这种效果的程度小于预期，在这个包含500个变量的数据集上，只会额外选择2-6个特征。这种增加的假阳性率在大多数下游管道中是可以接受的，原因有两个：（1）额外特征的绝对数量很小（在这个500个特征的集合中是2-6个特征），（2）后续建模步骤（例如，正则化、交叉验证或最小最优特征选择）可以过滤掉这些特征，如果它们对预测性能没有贡献。'
- en: '**Speedup:** Greedy Boruta consistently requires 5-15× less time when compared
    to the vanilla implementation, with the speedup increasing for more conservative *α* values.
    For *α* = 0.00001, the improvement approaches 15x. It is also expected that even
    smaller *α* values would lead to increasingly larger speedups. It is important
    to note that for most scenarios with *α* < 0.001, the vanilla Boruta implementation
    “does not converge” (not all features are confirmed or rejected) and without early-stopping,
    they would run for much longer than this.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**加速率**：与原始实现相比，贪婪Boruta算法始终需要5-15倍更少的时间，随着更保守的*α*值的增加，加速率也在提高。对于*α* = 0.00001，改进接近15倍。预期即使更小的*α*值也会导致越来越大的加速率。值得注意的是，对于大多数*α*
    < 0.001的场景，原始Boruta实现“无法收敛”（并非所有特征都被确认或拒绝），如果没有提前停止，它们将运行得比这更长。'
- en: '**Convergence:** We can also evaluate how fast each of the methods “converge”
    by analysing the status of the variables at each iteration, as shown in Figure
    2:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**收敛**：我们还可以通过分析每个方法在每个迭代中变量的状态来评估每个方法“收敛”的速度，如图2所示：'
- en: '![](../Images/606ca67e744e33253b33aa876674bb57.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/606ca67e744e33253b33aa876674bb57.png)'
- en: '*Figure 2: Percentage of confirmed and rejected features across the number
    of iterations.*'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '*图2：根据迭代次数，确认和拒绝的特征百分比。*'
- en: 'In this scenario, using *α* = 0.00001, we can observe the behavior mentioned
    above: the first confirmation/rejection of the vanilla algorithm occurs at the
    last iteration of the greedy counterpart (hence the complete overlap of the lines
    in the rejection plot).'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个场景中，使用 *α* = 0.00001，我们可以观察到上述提到的行为：原始算法的第一个确认/拒绝发生在贪婪版本的对最后一次迭代（因此拒绝图中的线完全重叠）。
- en: 'Because of the logarithmic growth of the maximum number of iterations by the
    Greedy Boruta in terms of *α*, we can also explore **extreme** values for *α* when
    using the greedy version:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Greedy Boruta 在 *α* 方面的最大迭代次数呈对数增长，我们还可以在贪婪版本中使用时探索 *α* 的**极端**值：
- en: '![](../Images/2052af3690c2c54d67e3adf6e2613dac.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2052af3690c2c54d67e3adf6e2613dac.png)'
- en: '*Figure 3: Run time of the Greedy Boruta algorithm across different α, on a
    log scale, clearly showing the logarithmic growth in complexity in terms of α
    (linear on the log scale).*'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 3：在不同 α 值下 Greedy Boruta 算法的运行时间，以对数刻度显示，清楚地显示了 α（对数刻度上为线性）的复杂度对数增长。*'
- en: Experiment 2 – Exploring maximum number of iterations
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实验 2 – 探索最大迭代次数
- en: '**Parameters**'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**参数**'
- en: In this experiment, the same dataset and hyperparameters as described in the
    last experiment were used, except for *α* which was fixed at *α = 0.00001*, and
    the maximum number of iterations (for the vanilla algorithm) changed across runs.
    The maximum numbers of iterations analyzed are [16, 32, 64, 128, 256, 512]. Also,
    early stopping was disabled for this experiment in order to showcase one of the
    weaknesses of the vanilla Boruta algorithm.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实验中，使用了与上一个实验中描述的相同的数据集和超参数，除了 *α* 被固定在 *α = 0.00001*，最大迭代次数（对于原始算法）在运行之间变化。分析的最大迭代次数是
    [16, 32, 64, 128, 256, 512]。此外，为了展示原始 Boruta 算法的一个弱点，这个实验中禁用了提前停止。
- en: It is important to note that for this experiment there is only one data point
    for the Greedy Boruta method since the maximum number of iterations is not a parameter
    by itself on the modified version, as it is uniquely defined by the *α* used.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，对于这个实验，Greedy Boruta 方法只有一个数据点，因为最大迭代次数在修改版本中不是参数本身，而是由使用的 *α* 唯一确定的。
- en: 'Results: Performance comparison'
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结果：性能比较
- en: '![](../Images/012febe53b9c3a856c2e1e16f2ee4265.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/012febe53b9c3a856c2e1e16f2ee4265.png)'
- en: '*Figure 4: Recall, specificity and F1 for both methods with 6 different maximum
    numbers of iterations ([16, 32, 64, 128, 256, 512]).*'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 4：两种方法在 6 个不同最大迭代次数（[16, 32, 64, 128, 256, 512]）下的召回率、特异性和 F1 分数。*'
- en: In Figure 4, once again, we observe that the Greedy Boruta achieves higher recall
    than the vanilla Boruta algorithm while having slightly decreased specificity,
    across all the number of iterations considered. In this scenario, we also observe
    that the Greedy Boruta achieves recall levels similar to those of the vanilla
    algorithm in ~4x less time.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 4 中，我们再次观察到，Greedy Boruta 在所有考虑的迭代次数下都实现了比原始 Boruta 算法更高的召回率，同时特异性略有下降。在这种情况下，我们还观察到
    Greedy Boruta 在大约 4 倍更短的时间内达到了与原始算法相似的召回率水平。
- en: Furthermore, because in the vanilla algorithm there is no “guarantee of convergence”
    in a given number of iterations, the user must define a maximum number of iterations
    for which the algorithm will run. In practice, it is difficult to determine this
    number without knowing the ground truth for important features and the possible
    accompanying number of iterations to trigger early stopping. Considering this
    difficulty, an overly conservative user may run the algorithm for far too many
    iterations without a significant improvement in the feature selection quality.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，由于在原始算法中，在给定次数的迭代中不存在“收敛保证”，用户必须定义算法将运行的最大迭代次数。在实践中，不知道重要特征的真实值以及可能触发的提前停止的迭代次数，很难确定这个数字。考虑到这种困难，过于保守的用户可能会运行算法进行过多的迭代，而不会在特征选择质量上产生显著改进。
- en: In this specific case, using a maximum number of iterations equal to 512 iterations,
    without early stopping, achieves a recall very similar to that achieved with 64,
    128 and 256 iterations. When comparing the greedy version to the 512 iterations
    of the vanilla algorithm, we see that a 40x speedup is achieved, while having
    a slightly greater recall.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个特定案例中，使用最大迭代次数等于 512 次迭代，不进行提前停止，达到的召回率与使用 64、128 和 256 次迭代达到的召回率非常相似。当将贪婪版本与原始算法的
    512 次迭代进行比较时，我们看到实现了 40 倍的速度提升，同时召回率略有增加。
- en: When to use Greedy Boruta?
  id: totrans-127
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 何时使用 Greedy Boruta？
- en: 'The Greedy Boruta Algorithm is particularly valuable in specific scenarios:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: Greedy Boruta 算法在特定场景中特别有价值：
- en: '**High-dimensional data with limited time:** When working with datasets that
    contain hundreds or thousands of features, the computational cost of the vanilla
    Boruta can be prohibitive. If quick results are required for exploratory analysis
    or rapid prototyping, Greedy Boruta offers a compelling speed-accuracy trade-off.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高维数据与有限时间**：当处理包含数百或数千个特征的集合时，vanilla Boruta 的计算成本可能是难以承受的。如果需要快速的结果进行探索性分析或快速原型设计，Greedy
    Boruta 提供了一个有吸引力的速度-精度权衡。'
- en: '**All-relevant feature selection goals:** If your objective aligns with Boruta’s
    original “all-relevant” philosophy—finding every feature that contributes with
    some information rather than the minimal optimal set—then Greedy Boruta’s high
    recall is exactly what you need. The algorithm favors inclusion, which is appropriate
    when feature removal is costly (e.g., in scientific discovery or causal inference
    tasks).'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**所有相关特征选择目标**：如果你的目标与 Boruta 的原始“所有相关”哲学一致——寻找所有提供一些信息的特征，而不是最小最优集——那么 Greedy
    Boruta 的高召回率正是你所需要的。该算法倾向于包含，这在特征移除成本高昂时（例如，在科学发现或因果推断任务中）是合适的。'
- en: '**Iterative analysis workflows:** In practice, feature selection is rarely
    a one-shot decision. Data scientists often iterate, experimenting with different
    feature sets and models. Greedy Boruta enables rapid iteration by providing fast
    initial results that can be refined in subsequent analyses. Additionally, other
    feature selection methods can be used to further reduce the dimensionality of
    the feature set.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迭代分析工作流程**：在实践中，特征选择很少是一次性决策。数据科学家经常迭代，尝试不同的特征集和模型。Greedy Boruta 通过提供快速初始结果，这些结果可以在后续分析中进一步完善，从而实现快速迭代。此外，还可以使用其他特征选择方法来进一步降低特征集的维度。'
- en: '**A few extra features are OK:** The vanilla Boruta’s strict statistical testing
    is valuable when false positives are particularly costly. However, in many applications,
    including a few extra features is preferable to missing important ones. Greedy
    Boruta is ideal when the downstream pipeline can handle slightly larger feature
    sets but benefits from faster processing.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一些额外的特征是可以接受的**：当假阳性特别昂贵时，vanilla Boruta 的严格统计测试是有价值的。然而，在许多应用中，包括一些额外的特征比错过重要的特征更可取。当下游管道可以处理稍微大一点的特征集但受益于更快的处理时，Greedy
    Boruta 是理想的。'
- en: Conclusion
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'The Greedy Boruta algorithm is an extension/modification to a well-established
    feature selection method, with significantly different properties. By relaxing
    the confirmation criterion from statistical significance to a single hit, we achieve:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: Greedy Boruta 算法是对一个成熟的特征选择方法的扩展/修改，具有显著不同的特性。通过将确认标准从统计显著性放宽到单次命中，我们实现了：
- en: '**5-40x faster run times** compared to standard Boruta, for the scenarios explored.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与标准 Boruta 相比，运行时间快 5-40 倍**，适用于所探讨的场景。'
- en: '**Equal or greater recall**, ensuring no relevant features are missed.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确保召回率相等或更高**，确保没有遗漏相关特征。'
- en: '**Guaranteed convergence** with all features classified, either as confirmed
    or rejected..'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保证收敛**，所有特征都被分类，要么是已确认的，要么是已拒绝的。'
- en: '**Maintained interpretability** and theoretical grounding.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保持了可解释性和理论基础**。'
- en: The trade-off—a modest increase in the false positive rate—is acceptable in
    many real-world applications, particularly when working with high-dimensional
    data under time constraints.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多实际应用中，权衡——假阳性率的适度增加——是可以接受的，尤其是在时间受限的情况下处理高维数据时。
- en: For practitioners, the Greedy Boruta algorithm offers a valuable tool for rapid,
    high-recall feature selection in exploratory analysis, with the option to follow
    up with more conservative methods if needed. For researchers, it demonstrates
    how thoughtful modifications to established algorithms can yield significant practical
    benefits by carefully considering the actual requirements of real-world applications.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 对于实践者来说，Greedy Boruta 算法为探索性分析中快速、高召回率的特征选择提供了一个有价值的工具，如果需要的话，可以选择更保守的方法进行后续处理。对于研究人员来说，它展示了通过仔细考虑实际应用的实际需求，对现有算法进行深思熟虑的修改可以带来显著的实际效益。
- en: The algorithm is most appropriate when your philosophy aligns with finding “all
    relevant” features rather than a minimal set, when speed matters, and when false
    positives can be tolerated or filtered in downstream analysis. In these common
    scenarios, Greedy Boruta provides a compelling alternative to the vanilla algorithm.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的理念是寻找“所有相关”的特征而不是最小集，当速度很重要，以及当下游分析中可以容忍或过滤掉假阳性时，该算法最为适用。在这些常见场景中，贪婪Boruta算法为原始算法提供了一个有吸引力的替代方案。
