- en: Advanced Time Intelligence in DAX with Performance in Mind
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/advanced-time-intelligence-in-dax-with-performance-in-mind/](https://towardsdatascience.com/advanced-time-intelligence-in-dax-with-performance-in-mind/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We all know the usual Time Intelligence function based on years, quarters, months,
    and days. But sometimes, we need to perform more exotic timer intelligence calculations.
    But we should not forget to consider performance while programming the measures.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Update 27\.** **Dec. 2025:** With the advent of Calendar-based Time Intelligence,
    several of the solutions presented here are obsolete.'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can learn more about these in my piece here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://towardsdatascience.com/use-cases-for-the-new-calendar-based-time-intelligence/](https://towardsdatascience.com/use-cases-for-the-new-calendar-based-time-intelligence/)'
  prefs: []
  type: TYPE_NORMAL
- en: But the new approach still has some flaws. Therefore, I keep this one online.
  prefs: []
  type: TYPE_NORMAL
- en: —– end of update —-
  prefs: []
  type: TYPE_NORMAL
- en: There are many DAX functions in Power BI for Time Intelligence Measures.
  prefs: []
  type: TYPE_NORMAL
- en: 'The most common are:'
  prefs: []
  type: TYPE_NORMAL
- en: '`<a href="https://dax.guide/dateadd/">DATEADD()</a> `'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[DATESMTD()](https://dax.guide/datesmtd/), [DATESQTD()](https://dax.guide/datesqtd/)
    and [DATESYTD()](https://dax.guide/datesytd/) and the shortcut functions [TOTALMTD()](https://dax.guide/totalmtd/),
    [TOTALQTD()](https://dax.guide/totalqtd/) and [TOTALYTD()](https://dax.guide/totalytd/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PARALLELPERIOD()](https://dax.guide/parallelperiod/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PREVIOUSDAY()](https://dax.guide/previousday/), [PREVIOUSMONTH()](https://dax.guide/previousmonth/),
    [PREVIOUSQUARTER(](https://dax.guide/previousquarter/)), and [PREVIOUSYEAR()](https://dax.guide/previousyear/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[SAMEPERIODLASTYEAR()](https://dax.guide/sameperiodlastyear/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can find a comprehensive list of Time Intelligence functions here: [Time
    Intelligence – DAX Guide](https://dax.guide/functions/time-intelligence/). These
    functions cover the most common cases.'
  prefs: []
  type: TYPE_NORMAL
- en: However, some requirements cannot be easily covered with these functions. And
    here we are.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want to cover some of these cases I encountered in my projects, which include:'
  prefs: []
  type: TYPE_NORMAL
- en: Last n Periods and some variants
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to cope with Leap years
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Week-to-Date calculations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calculating Weekly sums
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fiscal Week YTD
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I will show you how to use an extended date table to support these scenarios
    and improve efficiency and performance.
  prefs: []
  type: TYPE_NORMAL
- en: Most Time-Intelligence functions work regardless of whether the Fiscal Year
    is aligned with the calendar year. One exception is Year-to-Date (YTD).
  prefs: []
  type: TYPE_NORMAL
- en: For such cases, look at the DATESYTD() function mentioned above. There, you
    will find the optional parameter to pass the last day of the Fiscal year.
  prefs: []
  type: TYPE_NORMAL
- en: The last case will cover calculations based on weeks, while the Fiscal year
    doesn’t align with the calendar year.
  prefs: []
  type: TYPE_NORMAL
- en: Scenario
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I will use the well-known ContosoRetailDW data model.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Base Measure is Sum Online Sales, which has the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: I will work almost exclusively in [DAX-Studio](https://www.sqlbi.com/tools/dax-studio/),
    which provides the Server Timing function to analyze the performance of the DAX
    code. In the References section below, you can find a link to an article about
    how to collect and interpret performance data in DAX Studio.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the base query used in my examples to get some data from the data model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: In most examples, I will remove some filters to get more complete data (for
    each day).
  prefs: []
  type: TYPE_NORMAL
- en: Date table
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: My date table includes a relatively large number of additional columns.
  prefs: []
  type: TYPE_NORMAL
- en: In the references section below, you can find some articles written by SQLBI,
    on building weekly related calculations, including creating a date table to support
    these calculations.
  prefs: []
  type: TYPE_NORMAL
- en: 'As described in my article about date tables referenced below, I have added
    the following columns:'
  prefs: []
  type: TYPE_NORMAL
- en: Index or Offset columns to count the days, weeks, months, quarters, semesters,
    and years from the current date.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Flag columns to mark the current day, week, month, quarter, semester, and year
    based on the current date.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This and the previous columns require a daily recalculation to ensure the correct
    date is used as the reference date.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Start- and End-Dates of each week and month (Add more if needed).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Start- and End-Dates for the Fiscal Year.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Previous year dates to include the start and end dates of the current period.
    This is especially interesting for weeks, as the start- and end dates of the weeks
    are not the same from year to year.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As you will see, I will use these columns extensively to simplify my calculations.
  prefs: []
  type: TYPE_NORMAL
- en: In addition, we will use the Calendar Hierarchy to calculate the needed results
    at different levels of the hierarchy.
  prefs: []
  type: TYPE_NORMAL
- en: 'A complete Calendar hierarchy contains either:'
  prefs: []
  type: TYPE_NORMAL
- en: Year
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Semester
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Quarter
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Month
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Day
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Or
  prefs: []
  type: TYPE_NORMAL
- en: Year
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Week
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Day
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If the Fiscal Year doesn’t align with the Calendar year, I built the Hierarchy
    with the Fiscal Year instead of the Calendar Year.
  prefs: []
  type: TYPE_NORMAL
- en: Then, I added a separate FiscalMonthName column and a FiscalMonthSort column
    to ensure that the first month of the fiscal year was shown first.
  prefs: []
  type: TYPE_NORMAL
- en: OK, let’s start with the first case.
  prefs: []
  type: TYPE_NORMAL
- en: Last n periods
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This scenario calculates the rolling sum of values over the past n periods.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, for each day, we want to get the Sales for the last 10 days:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/00a9e6eb589ebc848a5a123c06b530bb.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 1 – Example for the sum over the last 10 days (Figure by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the Measure I came up with:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'When executing the query filtering for Computers and North America, I get this
    result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fc392080b58efb2d7ff555a2d16dce46.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 2 – Last 10 days – Result of Measure (Figure by the Author)*'
  prefs: []
  type: TYPE_NORMAL
- en: 'If I look at the server timings, the result is not bad:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b844e5d1fa76aa640d0e315d8674e716.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 3 – Server timings for the last 10 days Measure (Figure by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, the Storage engine performs more than half of the work, which
    is a good sign. It’s not perfect, but as the execution time is less than 100 ms,
    it’s still very good from the performance point of view.
  prefs: []
  type: TYPE_NORMAL
- en: 'This approach has one crucial issue:'
  prefs: []
  type: TYPE_NORMAL
- en: When calculating the rolling sum over multiple months, you must know that this
    approach is date oriented.
  prefs: []
  type: TYPE_NORMAL
- en: 'This means that when you look at a specific time, it goes back to the same
    day of the given month. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: We look at January 12\. 2024, and we want to calculate the rolling sum over
    the last three months. The starting date for this calculation will be November
    13\. 2023.
  prefs: []
  type: TYPE_NORMAL
- en: When do we want to get the rolling sum for the entire month?
  prefs: []
  type: TYPE_NORMAL
- en: In the case above, I want to have as the starting date November 1, 2023.
  prefs: []
  type: TYPE_NORMAL
- en: For this case, we can use the MonthIndex column.
  prefs: []
  type: TYPE_NORMAL
- en: Each column has a unique index based on the current date.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, we can use it to go back three months and get the entire month.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the DAX Code for this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'The execution is still quick, but it’s less efficient, as most of the calculations
    cannot be performed by the Storage engine:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ef3d8971fd3980218287b5b450bc00ac.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 4 – Server timings for the rolling sum of the last three full months
    (Figure by the Author)* As you can see, it is not as fast as before.'
  prefs: []
  type: TYPE_NORMAL
- en: I tried other approaches (for example, `'Date'[MonthIndex] >= CurMonthIndex
    – 2 &&` `'Date'[MonthIndex] <= CurMonthIndex)`, but these approaches were worse
    than this one.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the result for the same logic, but for the last two months (To avoid
    showing too many rows):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4a67115ea659810001ae991f853e207b.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 5 – Results for the last two whole months (Figure by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: Regarding Leap Years
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The leap year problem is odd, which is evident when calculating the previous
    year for each day. Let me explain:'
  prefs: []
  type: TYPE_NORMAL
- en: 'When I execute the following Query to get the last days of February for the
    years 2020 and 2021:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'I get the following result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ad693a076f32d6372b94656599146b6a.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 6 – Problem of daily PY for the year after a leap year (Figure by the
    Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see above, the result for February 28\. 2020 is shown twice, and
    one day is missing the February 2021 for Online Sales (PY).
  prefs: []
  type: TYPE_NORMAL
- en: 'When looking at the month, the sum is correct:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0bce5875191c2d107669e6011375a0d4.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 7 – Correct monthly sum with leap years (Figure by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that there is no February 29 in 2021\. Therefore, there is no
    way that the sales for February 29, 2020 will be displayed when listing the Sales
    Amount per day.
  prefs: []
  type: TYPE_NORMAL
- en: While the result is correct, it will be wrong when the data is exported to Excel,
    and the values are summed. Then, the sum of the daily results will differ from
    those shown for the entire month.
  prefs: []
  type: TYPE_NORMAL
- en: This can undermine the users’ perceived reliability of the data.
  prefs: []
  type: TYPE_NORMAL
- en: My solution was to add a `LeapYearDate` table. This table is a copy of the Date
    table but without a Date column. I added one row each year on February 29, even
    for non-leap years.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, I added a calculated column for each month and day (`MonthDay`):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'The Measure to calculate the previous year manually and using the new table
    is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: As you can see, I got the current year, and by using the [VALUES() function](https://dax.guide/values/),
    I got the list of all dates in the current filter context.
  prefs: []
  type: TYPE_NORMAL
- en: 'Using this method, my Measure works for single Days, Months, Quarters, and
    Years. The result of this Measure is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/14bb7212405a6f0cc41ac67fe3f5b9ad.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 8 – Result for the custom PY Measure, which always displays leap days
    (Figure by the Author)*'
  prefs: []
  type: TYPE_NORMAL
- en: 'As you can see here, the Measure is very efficient, as most of the work is
    done by the Storage engine:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4f06daed12359f816ddca3b3224ce4d1.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 9 – Server Timings for the custom PY Measure for Leap years (Figure
    by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: But, to be honest, I don’t like this approach, even though it works very well.
  prefs: []
  type: TYPE_NORMAL
- en: The reason is that the LeapYearDate table does not have a date column. Therefore,
    it cannot be used as a Date table for the existing Time Intelligence functions.
  prefs: []
  type: TYPE_NORMAL
- en: We must also use the calendar columns from this table in the visualizations.
    We cannot use the ordinary date table.
  prefs: []
  type: TYPE_NORMAL
- en: Consequently, we must reinvent all Time Intelligence functions to use this table.
  prefs: []
  type: TYPE_NORMAL
- en: I strongly recommend using this approach only when necessary.
  prefs: []
  type: TYPE_NORMAL
- en: Week to Date and PY
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some Business areas concentrate on Weekly analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, the standard Time Intelligence functions do not support weekly
    analysis out of the box. Therefore, we must build our Weekly Measures by ourselves.
  prefs: []
  type: TYPE_NORMAL
- en: The first Measure is WTD.
  prefs: []
  type: TYPE_NORMAL
- en: 'The first approach is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: As you can see, I use the [`WEEKDAY()` function](https://dax.guide/weekday/)
    to calculate the start date of the week. Then, I use the [`DATESBETWEEN()` function](https://dax.guide/datesbetween/)
    to calculate the WTD.
  prefs: []
  type: TYPE_NORMAL
- en: When you adapt this pattern to your situation, you must ensure that the second
    parameter in `WEEKDAY()` is set to the correct value. Please read the documentation
    to learn more about it.
  prefs: []
  type: TYPE_NORMAL
- en: 'The result is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/21084e500baf8b8ce566e04b69050825.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 10 – Result for WTD in DAX Studio (Figure by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Another approach is to store the first date of each week in the Date table
    and use this information in the Measure:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The result is precisely the same.
  prefs: []
  type: TYPE_NORMAL
- en: 'When analyzing the performance in DAX Studio, I see that both Measures are
    comparable to each other:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/33b715dc6eed04d82ffe728edeaf3adf.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 11 – On the left, you can see the execution statistics for the first
    version, and on the right, you see them for the second  version. As you can see,
    both are very comparable (Figure by the Author)*'
  prefs: []
  type: TYPE_NORMAL
- en: I tend to use the second one, as it has better potential when combined with
    other Measures. But in the end, it depends on the current scenario.
  prefs: []
  type: TYPE_NORMAL
- en: Another challenge is to calculate the previous year.
  prefs: []
  type: TYPE_NORMAL
- en: 'Look at the following dates for the same week in different weeks:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c1958cd70aa985a6009155902dd8f774.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 12 – Comparing the dates of the same week in different years. (Figure
    by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, the dates are shifted. And as the standard time intelligence
    functions are based on shifting dates, they will not work.
  prefs: []
  type: TYPE_NORMAL
- en: 'I tried different approaches, but in the end, I stored the first date of the
    same week for the previous year in the date table and used it like in the second
    version of WTD shown above:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'This is the result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/80313badadac5b16b4d693fb5fdb82fa.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 13 – Result for WTD PY Measure (Figure by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: As the logic is the same as in the WTD v2, the performance is also the same.
    Therefore, this Measure is very efficient.
  prefs: []
  type: TYPE_NORMAL
- en: Weekly Sums for PY
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Sometimes, the weekly view is enough, and we don’t need to calculate the WTD
    at the Daily level.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t need a WTD Measure for this scenario for the current year. The base
    Measure sliced by Week can cover this. The result is correct out of the box.
  prefs: []
  type: TYPE_NORMAL
- en: But, again, it’s another story for PY.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the first version I came up with:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'Here, I subtract one from the current year while retaining the filter for the
    current week. This is the result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/77164167b69496d127458beca658e829.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 14 – The result for WTD PY for the whole week. See that the WTD result
    for the last day of each week corresponds to the PY value (Figure by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: The performance is good, but I can do better.
  prefs: []
  type: TYPE_NORMAL
- en: What if I could store a unique Week Identifier in the Date column?
  prefs: []
  type: TYPE_NORMAL
- en: For example, the Current Week is 9 of 2025..
  prefs: []
  type: TYPE_NORMAL
- en: The Identifier would be 202509.
  prefs: []
  type: TYPE_NORMAL
- en: 'When I detract 100 from it, I get 202409, the identifier for the same week
    in the previous year. After adding this column to the date table, I can change
    the Measure to this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: This version is much simpler than before, and the result is still the same.
  prefs: []
  type: TYPE_NORMAL
- en: 'When we compare the execution statistics of the two versions, we see this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5ccd193a4699bff521e29b0d231df085.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 15 – Comparing the execution statistics of the two versions for WTD
    PY for the whole week. On the left is V1, and on the right is V2\. (Figure by
    the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, the second version, with the precalculated column in the Date
    table, is slightly more efficient. I have only four SE queries, a good sign for
    increased efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: Fiscal Weeks YTD
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This last one is tricky.
  prefs: []
  type: TYPE_NORMAL
- en: The requirement is that the user wants to see a YTD starting from the first
    day of the first week of the Fiscal year.
  prefs: []
  type: TYPE_NORMAL
- en: For example, the Fiscal year starts on July 1.
  prefs: []
  type: TYPE_NORMAL
- en: In 2022, the week containing July the 1^(st) starts on Monday, June 27.
  prefs: []
  type: TYPE_NORMAL
- en: This means that the YTD calculation must start on this date.
  prefs: []
  type: TYPE_NORMAL
- en: The same applies to the YTD PY calculation starting Monday, June 28, 2021.
  prefs: []
  type: TYPE_NORMAL
- en: This approach has some consequences when visualizing the data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Again, knowing if the result must be shown at the day or week level is essential.
    When showing the data at the day level, the result can be confusing when selecting
    a Fiscal Year:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/08095429394f54835eee41632937d09c.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 16 – Result of the weekly based YTD for the Fiscal year 22/23 (Figure
    by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, Friday is the first day of the Fiscal year. And the YTD result
    doesn’t start on July 1^(st) but on Monday of that week.
  prefs: []
  type: TYPE_NORMAL
- en: The consequence is that the YTD doesn’t seem to start correctly. The users must
    know what they are looking at.
  prefs: []
  type: TYPE_NORMAL
- en: The same is valid for the YTD PY results.
  prefs: []
  type: TYPE_NORMAL
- en: 'To facilitate the calculations, I added more columns to the Date table:'
  prefs: []
  type: TYPE_NORMAL
- en: FiscalYearWeekYear—This field contains the numerical representation of the Fiscal
    year (for 23/24, I get 2324), starting with the first week of the Fiscal year.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: FiscalYearWeekYearPY – The same as before, but for the previous year (FiscalYearWeekYear
    – 101).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: FiscalWeekSort—This sorting column starts the week with the first day of the
    fiscal year. A more elaborate way to use this column could be to follow the ISO-Week
    definition, which I didn’t do to keep it more uncomplicated.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: FiscalYearWeekSort – The same as before but with the FiscalYearWeekYear in front
    (e. g. 232402).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: FirstDayOfWeekDate – The date of the Monday of the week in which the current
    date is in.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here is the Measure for the Daily YTD:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'Here is the DAX Code for the Daily YTD PY:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'As you can see, both Measures follow the same pattern:'
  prefs: []
  type: TYPE_NORMAL
- en: Get the current Fiscal Year.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Get the Starting Date of the current Fiscal Year.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Get the Starting date of the week starting the Fiscal Year.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate the Result based on the Difference between these two dates
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'For the PY Measure, one additional step is required:'
  prefs: []
  type: TYPE_NORMAL
- en: Calculate the days between the starting and current dates to calculate the correct
    YTD. This is necessary because of the date shift between the years.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'And here is the DAX code for the weekly base YTD:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'For the weekly YTD PY, the DAX code is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'Again, both Measures follow the same pattern:'
  prefs: []
  type: TYPE_NORMAL
- en: Get the current (Sort-) number of the week in the Fiscal year.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Get the start date for the fiscal year’s first week.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate the result based on these values.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The result for the weekly based Measure is the following (At the weekly level,
    as the value is the same for each day of the same week):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c4fbd10319b8b256de5894ac365a31de.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 17 – Result for the first three weeks per Fiscal Year with the weekly
    based YTD and PY Measure (Figure by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: 'When comparing the two Approaches, the Measure for the weekly calculation is
    more efficient than the one for the daily calculation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/67c3483b0e60db3522bf5700a8e1495c.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 18 – Comparing the execution statistics for the two Measures. On the
    left is the daily, and on the right is the weekly calculation. They are the same
    for the calculation for the current and the previous year (Figure by the Author) *'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, the Measure for the weekly result is faster, has a more significant
    portion executed in the Storage Engine (SE), and has fewer SE queries.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, it can be a good idea to ask the users if they need a WTD result
    at the day level or if it’s enough to see the results at the week level.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When you start writing Time Intelligence expressions, consider whether additional
    calculated columns in your date table can be helpful.
  prefs: []
  type: TYPE_NORMAL
- en: 'A carefully crafted and extended date table can be helpful for two reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: Make Measures easier to write
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Improve the performance of the Measures
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They will be easier to write as I do not need to perform the calculations to
    get the intermediary results to calculate the required results.
  prefs: []
  type: TYPE_NORMAL
- en: The consequence of shorter and simpler Measures is better efficiency and performance.
  prefs: []
  type: TYPE_NORMAL
- en: I will add more and more columns to the template of my date table as I encounter
    more situations in which they can be helpful.
  prefs: []
  type: TYPE_NORMAL
- en: 'One question remains: How to build it?'
  prefs: []
  type: TYPE_NORMAL
- en: In my case, I used an Azure SQL database to create the table used in my examples.
  prefs: []
  type: TYPE_NORMAL
- en: But it’s possible to create a date table as a DAX table or use Python or JavaScript
    in Fabric or whatever data platform you use.
  prefs: []
  type: TYPE_NORMAL
- en: Another option is to use the Bravo tool from SQLBI, which allows you to create
    a DAX table containing additional columns to support exotic Time Intelligence
    scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can find more information about my date-table [here](https://contributor.insightmediagroup.io/3-ways-to-improve-your-reporting-with-an-expanded-date-table-2d983d76cced/).
  prefs: []
  type: TYPE_NORMAL
- en: Read [this piece](https://medium.com/towards-data-science/how-to-get-performance-data-from-power-bi-with-dax
    studio-b7f11b9dd9f9) to learn how to extract performance data in DAX-Studio and
    how to interpret it.
  prefs: []
  type: TYPE_NORMAL
- en: 'An [SQLBI article](https://www.sqlbi.com/articles/using-weekly-calendars-in-power-bi/)
    about building a date table to support weekly calculations: Using weekly calendars
    in Power BI – SQLBI'
  prefs: []
  type: TYPE_NORMAL
- en: 'SQLBI Pattern to perform further weekly calculations:'
  prefs: []
  type: TYPE_NORMAL
- en: Week-related calculations – [DAX Patterns](https://www.daxpatterns.com/week-related-calculations/)
  prefs: []
  type: TYPE_NORMAL
- en: Like in my previous articles, I use the Contoso sample dataset. You can download
    the ContosoRetailDW Dataset for free from Microsoft [here](https://www.microsoft.com/en-us/download/details.aspx?id=18279).
  prefs: []
  type: TYPE_NORMAL
- en: The Contoso Data can be freely used under the MIT License, as described [here](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo).
  prefs: []
  type: TYPE_NORMAL
- en: I changed the dataset to shift the data to contemporary dates.
  prefs: []
