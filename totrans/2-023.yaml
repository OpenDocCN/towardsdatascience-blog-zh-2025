- en: My Most Valuable Lesson as an Aspiring Data Analyst
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我作为有抱负的数据分析师最有价值的教训
- en: 原文：[https://towardsdatascience.com/my-most-valuable-lesson-as-an-aspiring-data-analyst/](https://towardsdatascience.com/my-most-valuable-lesson-as-an-aspiring-data-analyst/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/my-most-valuable-lesson-as-an-aspiring-data-analyst/](https://towardsdatascience.com/my-most-valuable-lesson-as-an-aspiring-data-analyst/)
- en: <mdspan datatext="el1755718867394" class="mdspan-comment">When I first started</mdspan>
    learning data analysis, I was overly obsessed with the tools and the glamor that
    might come with the title of being a data analyst.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755718867394" class="mdspan-comment">当我刚开始学习数据分析时</mdspan>，我过度沉迷于工具和可能伴随数据分析师头衔的华丽。
- en: 'My internship started, and I had one goal in mind: to develop my technical
    skills. I mean, everyone wants to make their LinkedIn profile decorated with skills
    and certifications.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我的实习开始了，我心中只有一个目标：提升我的技术技能。我的意思是，每个人都想让自己的LinkedIn个人资料装饰着技能和证书。
- en: 'What I didn’t expect, though, was that my most valuable lesson wouldn’t come
    from a tool or tutorial. It came from something much more human: **collaboration**.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我没有预料到，我最有价值的教训不会来自工具或教程。它来自更人性化的东西：**协作**。
- en: Initially, I attempted to tackle everything on my own, viewing each task as
    a personal challenge. Little did I know, my productivity was somewhat limited
    because I spent longer hours trying to figure out solutions to problems each time
    I found myself stuck.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 最初，我试图独自处理所有事情，把每个任务都看作是一个个人挑战。我并不知道，由于每次遇到难题时我都要花更多的时间去寻找解决方案，我的生产力实际上受到了限制。
- en: It wasn’t until I started seeking feedback and involving experienced professionals
    that things began to fall into place.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 直到我开始寻求反馈并涉及经验丰富的专业人士，事情才开始步入正轨。
- en: That’s when I realized that in data analysis, working with others is not optional;
    it’s more of a necessity.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 那时我意识到，在数据分析中，与他人合作不是可选项，而是一种必要性。
- en: As we progress, I aim to share my experience with collaboration and how it shaped
    me as an aspiring data analyst. Plus, why I believe it’s [one of the most important](https://www.hockeystack.com/blog-posts/why-cross-functional-collaboration-is-essential-for-data-analysis)
    (and underrated) skills every data analyst should focus on.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们不断进步，我旨在分享我的协作经验以及它是如何塑造我作为一个有抱负的数据分析师的。此外，为什么我相信它[是每个数据分析师都应该关注](https://www.hockeystack.com/blog-posts/why-cross-functional-collaboration-is-essential-for-data-analysis)（并且被低估）的重要技能之一。
- en: '* * *'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: The Early Days of My Internship
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我的实习初期
- en: As a young lad stepping into the field, I honestly just wanted to get my hands
    on real data. Up until then, most of my practice had been with sample datasets.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名踏入该领域的年轻人，我真诚地只想接触真实的数据。在此之前，我的大部分练习都是使用样本数据集。
- en: Now, I have my internship. I had the opportunity to work with data that mattered
    to an organization.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我有我的实习机会。我有机会处理对组织有意义的资料。
- en: I was given a project to build a basic report using data on operational activities.
    The data wasn’t too messy, but it wasn’t clean either. It contained some inconsistent
    values, duplicate rows, and quite a few missing entries.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我被分配了一个项目，使用运营活动的数据构建一个基本的报告。数据并不太混乱，但也不干净。它包含一些不一致的值，重复的行，以及相当多的缺失条目。
- en: I handled it using Excel and Power Query, then cleaned up what I could, and
    built a dashboard that I thought looked decent. Honestly, I was proud of it.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用Excel和Power Query处理了它，然后清理了我能清理的部分，并构建了一个我认为看起来不错的仪表板。说实话，我为此感到自豪。
- en: Fast forward, it’s presentation time.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 快进到展示时间。
- en: 'Before I move forward, here’s something: no one told me about the presentation
    aspect of data analysis.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在我继续前进之前，这里有一件事：没有人告诉我数据分析的展示方面。
- en: As funny as that might sound, it’s true. I previously thought that I would work
    with the data, make meaning from it, then pass it off to the guys in administration
    or something like that.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然听起来可能很可笑，但这是真的。我之前认为我会处理数据，从中提取意义，然后将其转交给行政部门的人或类似的人。
- en: Snap back to reality, I presented the dashboard, and my supervisor didn’t seem
    impressed. Not because the visuals were bad, in fact, he said it looked good.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 回到现实，我展示了仪表板，我的主管似乎并不印象深刻。不是因为视觉效果不好，事实上，他说看起来不错。
- en: The issue was that the dashboard didn’t communicate what the team actually **needed**
    to see.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于仪表板没有传达团队实际**需要**看到的内容。
- en: Truthfully, I hadn’t spoken to anyone about what insights were useful to them,
    or what information would aid proper effectiveness in decision-making.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: These are the fundamentals that matter in data analysis, and I was lacking in
    that aspect. I built it based on what I thought was important, not what they needed.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: 'I hadn’t asked questions like:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: “**Who** is going to use this dashboard?”
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “**What** decisions will this help them make?”
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “**Why** does this information matter to them?”
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s the power of collaboration, asking questions before the start of a project
    and seeking feedback on completion.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: What Collaboration Taught Me
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Over time, I began to notice that, despite my visuals being clean and my numbers
    accurate, people sometimes didn’t understand my reports.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: I’d spend hours solving a problem that could’ve been avoided with a two-minute
    conversation. Take it or leave it, I believe data needs to be examined together
    and communicated in a way that brings others along for the ride.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Data analysis isn’t just about the data, it’s about the people.
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The more I worked with people, the more I realized how critical collaboration
    is to the entire data analysis process. Looking back, those moments of working
    with others were when I grew the most.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: One of the first times I sat down with a non-technical staff member, I was surprised
    by how differently they viewed the data.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: 'I had spent many hours creating a chart to show monthly activity trends, but
    when I explained it, they said:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: “Okay… but how do I know if we are doing better or worse than last quarter?”
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I had a shift in mindset.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Instead of just building charts that look good, I started thinking from the
    perspective of a non-technical staff member. It’s like having extra eyes on a
    problem; it could help you see things differently.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: Feedback
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before my internship, I’d build something, give it a couple of checks, and then
    jump right into another without asking for fresh takes on my analysis.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, in a team setting, feedback is often part of the workflow.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes that meant revising a chart because it wasn’t clear, or realizing
    a KPI I thought was useful was irrelevant to the person reading the report.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Each round of feedback helped me refine both the visuals and the story the data
    was telling. It taught me that even in data analysis, [creativity and revision](https://journals.sagepub.com/doi/10.1177/1469787419872393)
    go hand in hand.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: And here’s the thing, feedback isn’t always about fixing mistakes. Sometimes
    it’s about uncovering opportunities you didn’t see on your own.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: For many, seeking feedback is uncomfortable and can be a drag. Dont worry, you’re
    not alone. Central to this argument is the notion of this [study](https://www.strategy-business.com/article/Using-Neuroscience-to-Make-Feedback-Work-and-Feel-Better)
    that explains the sudden spike in the heart rates of individuals while receiving
    feedback.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: The key lesson from this study shows that feedback isn’t criticism, but rather
    it’s collaboration in disguise.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这项研究的关键教训表明，反馈不是批评，而是一种伪装的合作。
- en: It’s other people lending you their perspectives so your work can shine brighter.
    And trust me, the faster you invite it, the faster your skills grow.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这是其他人借给你他们的观点，让你的工作更加闪耀。相信我，你邀请得越快，你的技能增长得越快。
- en: I learned to stop waiting until my work was “perfect” before sharing it. Instead,
    I’d present early drafts, gather input, and improve along the way.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我学会了不再等待我的工作“完美”后再分享。相反，我会展示早期草稿，收集意见，并在过程中不断改进。
- en: Collaboration builds more than just skills – it builds your network
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合作不仅建立了技能，还建立了你的网络。
- en: Personally, networking in the data industry is [highly underrated](https://www.psmgt.org.uk/the-impact-of-networking-on-building-a-career-in-data-science/)
    and not talked about enough. If there was one thing I didn’t realize before my
    internship, it’s how much collaboration naturally builds relationships.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 个人而言，在数据行业中的网络建设被低估了（[https://www.psmgt.org.uk/the-impact-of-networking-on-building-a-career-in-data-science/](https://www.psmgt.org.uk/the-impact-of-networking-on-building-a-career-in-data-science/)），而且谈论得不够。在我实习之前，我没有意识到的一点是，合作自然地建立了关系。
- en: When you work closely with people, maybe through asking questions, talking technical
    solutions over lunch, or even fixing a project together, you’re not just completing
    tasks; you’re creating connections.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当你与人们密切合作时，无论是通过提问、午餐时讨论技术解决方案，甚至一起修复项目，你不仅仅是完成任务；你是在建立联系。
- en: I started to see how valuable this was when a developer I had collaborated with
    on a data pipeline issue sent me a [course recommendation](https://www.youtube.com/watch?v=OT1RErkfLNQ)
    that turned out to be a game-changer for my SQL skills. It’s on YouTube, and I
    advise you to check it out.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 当我与一个在数据管道问题上进行合作的开发者发送给我一个[课程推荐](https://www.youtube.com/watch?v=OT1RErkfLNQ)时，我开始意识到这一点，这个推荐最终成为了我SQL技能的转折点。它可以在YouTube上找到，我建议你看看。
- en: From a technical perspective, collaboration expands your “toolbox” in ways self-study
    won’t do due diligence. Every time I worked with someone, I picked up something
    new (no matter how basic).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 从技术角度来看，合作以自学无法做到的方式扩展了你的“工具箱”。每次我与某人合作，我都会学到一些新东西（无论多么基础）。
- en: 'Now here is the best part: these relationships don’t just end when the internship
    does. The same people you collaborate with today can become your mentors, your
    referees for future jobs, or even your teammates again in another organization.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是最好的一部分：这些关系并不会随着实习的结束而结束。今天与你合作的人可以成为你的导师，你未来工作的推荐人，甚至可以在另一个组织中再次成为你的队友。
- en: Collaboration is the bridge between your current skill set and your future opportunities.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 合作是你当前技能集和未来机会之间的桥梁。
- en: '* * *'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion and takeaways
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论和收获
- en: Looking back, my internship didn’t just teach me data skills; it taught me how
    to work with people. I understood that my real value is multiplied when I work
    with others, not just alongside them.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾过去，我的实习不仅教会了我数据技能，还教会了我如何与人合作。我明白，当我与他人合作时，我的真正价值才会倍增，而不仅仅是与他们并肩工作。
- en: The truth is, no matter how good you are with Python, Tableau, or SQL, you’ll
    always go further and at an impressive pace when you tap into the knowledge and
    perspectives of the people around you.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，无论你多么擅长Python、Tableau或SQL，只要你利用周围人的知识和观点，你就能走得更远，以令人印象深刻的速度前进。
- en: If you’re starting in data analysis, keep in mind that your tools will get outdated,
    your tech stack will evolve, but your ability to work well with people will never
    lose its value.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你刚开始数据分析，请记住，你的工具会过时，你的技术栈会演变，但你的与人合作的能力永远不会失去其价值。
