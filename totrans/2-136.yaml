- en: 'Exploring Prompt Learning: Using English Feedback to Optimize LLM Systems'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/exploring-prompt-learning-using-english-feedback-to-optimize-llm-systems/](https://towardsdatascience.com/exploring-prompt-learning-using-english-feedback-to-optimize-llm-systems/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1752703563922" class="mdspan-comment">Applications of reinforcement</mdspan>
    learning (RL) in AI model building has been a growing topic over the past few
    months. From Deepseek models incorporating RL mechanics into their training processes
    to other success stories of RL-based improvement, “AI Twitter” has been ablaze.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: 'As more agents get deployed, a question emerges: can reinforcement learning
    control systems be built only in prompts? After all, reinforcement learning is
    all about using real-world feedback to optimize toward a goal, traditionally by
    adjusting model weights. But prompts themselves are the primary interface for
    guiding large language models.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: We’ve been experimenting with a new approach to optimizing LLM prompts that
    we’re calling **“Prompt Learning” (PL)**. Unlike traditional optimization methods
    that rely on numerical scores, PL uses natural language feedback to iteratively
    improve prompts. The roots of this approach are in the [Voyager paper](https://arize.com/blog/voyager-an-open-ended-embodied-agent-with-llms-paper-reading-and-discussion/)
    by Jim Fan’s team at NVIDIA. It is also alluded to by Andrej Karpathy in [several](https://x.com/karpathy/status/1944435412489171119)
    recent [tweets](https://x.com/karpathy/status/1921368644069765486), where he argues
    prompt-centric learning will be a key technique.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Despite these early inklings, to our knowledge no one has yet rigorously researched,
    characterized, and measured a full implementation of a reinforcement learning
    based approach to prompt tuning. That’s exactly what we set out to do.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: This implementation is inspired by an idea introduced in the original Voyager
    paper. The iterative prompting mechanism used in the original Voyager paper as
    the agent acquires and refines forms the basis for our **prompt learning** approach.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: What Is Prompt Learning?
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Prompt learning differs from MetaPrompt prompt optimization in a couple major
    ways.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: First and foremost, the error term is in English and is not a score. The English
    error term allows for English feedback that is used directly to tune instructions.
    An explanation from an eval tells you exactly why the evaluation failed and prompt
    learning then adds instructions to help fix the problem to the system prompt.
    The English error term allows us to solve a set of problems that are unsolvable
    by current pure prompt optimization techniques.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Secondly, prompt learning is an online approach to manage your system instructions
    that is designed to be run continually against your prompt – tuning instructions
    back into the context. LLM-based systems can assist with context engineering your
    system instructions.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: The English instructions in the prompt context allow for management of instructions,
    such as how to deal with competing instructions or expiring instructions or human
    review of instructions, all in English. In our prompt learning meta prompt we
    even allow keywords where it will only make edits to a specific instructions-based
    area of the prompt. In “weights” and “gradient”-based prompt optimization approaches,
    this is nearly impossible.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: This implementation of prompt learning uses evaluations, explanations, and annotations
    on runs of an application to automatically improve your prompt.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: 'The results are promising: prompt learning can make significant levels of improvements,
    with only one-tenth or one-hundredth the number of labeled examples.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dive into the mechanics of prompt learning and examine exactly why it’s
    working.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: What’s the Difference Between Reinforcement Learning and Prompt Learning?
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Traditional reinforcement learning relies on using scores or errors to generate
    gradient error terms, which then update your original model. Each gradient error
    term pushes your model slightly closer to optimal performance.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/40160d207aaa51f1ec06e04ba68d7a56.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
- en: Traditional RL (image created by author)
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: The key here is that you need many, many examples to align your model. Over
    time, these myriad examples push your model towards outputting the correct values
    across your possible inputs. It works by accumulating error gradients and nudging
    your model in a certain direction.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fe32ccf503aa979923e66dcd7a0c6919.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
- en: Image created by author
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement learning is a very powerful technique. But what if you don’t have
    thousands of examples? What if you have a complex set of goals and those goals
    don’t easily express as a score? Lastly, what if someone, an annotator or human
    expert, has relayed to you in English what the problem actually is and how to
    fix it?
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Prompt learning allows you to make powerful changes using *individual* examples.
    Instead of gradient error terms calculated for each example, you calculate full
    text explanations of why an example was scored a certain way. These examples are
    then fed back into the optimization flow and incorporated into the prompt.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: 'The key idea is:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: The “error”, an Eval explanation OR annotation term is in English
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The modification that changes your actions are done in the prompt context, not
    weights
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The reward function is an evaluation or human annotation
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The instructions are maintained and managed in the prompt context, allowing
    instruction management
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/28c7ecda250974bc4bb3ca450bcf0c7e.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
- en: The above shows an example of a human annotation and a metaprompt added instruction
    (image created by author)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fde3504cfcec4a4cc8d0a6b0311be998.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
- en: The above shows an example of an evaluation and a metaprompt created instruction
    to fix (image created by author)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Our research data shows examples where well-known optimization libraries fall
    short today. Namely, where evals with critiques or annotations contain information
    not available in the training set on how to fix a failure. There is not an easy
    way to take information-rich feedback in English and easily feed it back into
    a gradient update. In general you might not want to do gradient updates at all.
    Having all of your instructions in English allows you to deal with things that
    are not easy to do in “weight land,” such as what to do with competing instructions,
    removal of instructions, compaction of instructions and managing when to expire
    an instruction — essentially what we call **instruction management.**
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: One other advantage of prompt learning over gradient based updates is instead
    of using tens of thousands of examples, you can make changes to your system prompt
    with a single annotation example.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/feb82a21e3788e31afb16e2d91d3ac01.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
- en: Diagram by author
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: How Is This Different from Prompt Optimization?
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are a lot of techniques out there for [prompt optimization](https://arize.com/blog/prompt-optimization-few-shot-prompting/).
    Prompt optimization applies more traditional machine learning train and test approaches
    to optimizing prompts by gathering examples and attempting to find similarities
    with those examples.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: The seed of the failure of all prompt optimization approaches comes from the
    focus on scores as the means of propagating failure errors. As you think about
    failures, not every failure expresses itself easily as a numeric number and a
    numeric value hides the reason for a failure.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Using a score as your main approach for propagating a failure disconnects the
    optimization fix from the reason it failed.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '|  | *Prompt Learning* | *Reinforcement Learning* | *Prompt Optimization* |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
- en: '| **Feedback Mechanism** | Evaluation-based English explanations and human
    annotations  | Numeric rewards | Numeric scores |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
- en: '| **Optimization** | Metaprompt defines optimization approach  | Updating model
    based on gradients  | Varied but some support metaprompts |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
- en: '| **Prompt Control** | Can optimize only specific section of prompt (instruction
    section) | N/A | Typically optimizes whole prompt  |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
- en: '| **Online Setup** | Designed to be used always on, with human control of “prompt
    change” acceptance or total automation  | Designed to be used online | Normally
    one off |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
- en: How Does the Optimization Loop Work?
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In many real world use cases, as we tested with customers on real data, a single
    optimization run with a single-shot output worked great. In cases where you need
    multiple loops over the optimization to improve performance, the English explanation
    (or critique) output of an Evaluator can improve performance.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b6f8a63186fcb9ff634433b8a7b2535d.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: The English explanation (Critique) is an important feature of our evaluation
    library, generating an explanation then allows the results to be used in a feedback
    loop.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: In our testing, as the model was required to add more instructions back into
    the context window to fix the prompt, the iterative loop became more important.
    In cases where only 1-10 instructions needed to be added a single meta-prompt
    improvement loop was sufficient.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: How Did We Test Prompt Learning?
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We ran a series of optimization experiments using prompt learning in order
    to benchmark its efficacy. To date, this has been run across a sizable production
    set of AI application and agent use cases:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: For our demo data application, we chose a JSON generation problem where models
    had to generate JSON for a webpage based on natural language prompts.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 'We additionally generated a set of **latent rules** that the responses needed
    to follow. Things like:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: Every section needs a type value from a predefined list
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: All images must include alt text
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: All external asset links must use https
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These rules were implicitly represented in feedback and explanations attached
    to a set of traces of our application.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: We designed this test to mimic a typical evaluation cycle of an agent. Evaluation
    was done using a mixture of [LLM-as-a-judge techniques](https://arize.com/llm-as-a-judge/)
    with human review, again to mimic real world patterns.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: All of this data (the application traces, feedback, and explanations) was then
    fed into the optimization stage.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: To perform the optimization itself, we used a modified version of meta-prompting
    that we later dubbed **prompt learning**.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b3977b077404a38483bf3a7f50b55cd0.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
- en: Diagram by author
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: Each prompt optimization loop was done with a singleLLM call, and 100 examples.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: How Does Prompt Learning Perform?
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Prompt Learning is able to uncover and address the majority of latent rules
    within the 5-25 ruleset range. As more rules are introduced, however, performance
    does not drop.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '| **Ruleset size** | **Accuracy: 1-Loop** | **Accuracy: 5-Loop** | **Average
    rules followed: 1-Loop** | **Average rules followed: 5-Loop** |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
- en: '| 10 | 15% | 100% | 71% | 100% |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
- en: '| 50 | 0% | 70% | 35% | 83% |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
- en: '| 100 | 0% | 55% | 14% | 68% |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
- en: As you increase the rules that the optimizer system has to learn the more optimization
    iterations it takes to learn the rules.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Prompt learning presents a compelling approach for continuous improvement of
    AI applications, and its ability to drive results with relatively few examples
    make it suitable for both early stage and production applications.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Appendix
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Literature Review
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There have been a number of approaches that are relevant worth noting
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '[Promptbreeder](https://arxiv.org/abs/2309.16797) (DeepMind)'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt edits but no english critiques
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[OPRO – “LLMs as Optimizers”](https://arxiv.org/pdf/2309.03409)'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt edits but no english critiques
  id: totrans-81
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PromptAgent](https://arxiv.org/abs/2310.16427)'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Uses free-form critiques to decide edits, though the final prompt doesn’t embed
    the critiques—search happens in an external planner instead of accumulating rules
    inside the prompt.
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: No management of English instructions
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[StablePrompt](https://arxiv.org/abs/2410.07652)'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RL updates instead of prompt edits
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Meta-Prompting: Task-Agnostic Scaffolding](https://arxiv.org/abs/2401.12954)'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: First use of metaprompt but doesn’t use english critiques or explanations
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Critic-RM](https://arxiv.org/abs/2411.16646) – Self-Generated Critiques Boost
    Reward Modeling'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Self-Refine: Iterative Refinement with Self-Feedback](https://arxiv.org/abs/2303.17651)'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Self-Generated Critiques Boost Reward Modeling for Language Models](https://arxiv.org/abs/2411.16646)'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Critique is used to help reward model learn, designed for downstream RL use
  id: totrans-92
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Comparing Prompt Learning To PromptAgent
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Here is a comparison between prompt learning and PromptAgent. Monte Carlo tree
    search (MCTS)-based search for optimal prompts, like that in PromptAgent, could
    be combined with prompt learning in future work.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: '**PromptAgent (ICLR ’24) vs. Prompt Learning (PL)**'
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '| **Dimension** | **PromptAgent** | **Prompt Learning (PL)** |'
  id: totrans-96
  prefs: []
  type: TYPE_TB
- en: '| **Objective** | Find a *single* “expert-level” prompt that maximises a numeric
    task score on a dev set. | **Continuously** maintain a production prompt so that
    it self-heals when evals or users uncover new failure modes. |'
  id: totrans-97
  prefs: []
  type: TYPE_TB
- en: '| **Optimizer** | **MCTS** over the space of prompt edits; each node = a prompt,
    each edge = an edit derived from error feedback. [arXiv](https://arxiv.org/abs/2310.16427)
    | A **meta-prompt controller** reads the latest English critique and decides how
    to mutate an *Instruction block* (add, merge, rewrite, expire). No roll-outs or
    search tree. |'
  id: totrans-98
  prefs: []
  type: TYPE_TB
- en: '| **Update granularity** | Edits the *entire* task prompt during search; final
    prompt is frozen after the run. | Edits only the **Instruction section** inside
    a fenced region; other parts of the system prompt stay intact. |'
  id: totrans-99
  prefs: []
  type: TYPE_TB
- en: '| **Use of critiques** | Generates “constructive error feedback” to guide the
    next MCTS action, but the literal text is **not kept** in the final prompt. [arXiv](https://arxiv.org/abs/2310.16427)
    | **Primary signal.** English critique (from LLM judge or human) feeds the meta-prompt;
    controller extracts intent and rewrites/merges instructions. Critique itself is
    **not stored**, but its meaning is distilled into the instruction set. |'
  id: totrans-100
  prefs: []
  type: TYPE_TB
- en: '| **Conflict / lifecycle management** | None once search ends; prompt can contain
    redundant or stale rules that an operator must prune manually. | Built-in: controller
    can **deduplicate, version, or expire** instructions and supports human approval
    gates before applying changes. |'
  id: totrans-101
  prefs: []
  type: TYPE_TB
- en: '| **Online vs. offline** | **Offline**: heavy search (hundreds–thousands of
    roll-outs), then deployment. | **Online**: one extra LLM call whenever a failure
    appears; designed to run forever alongside the app. |'
  id: totrans-102
  prefs: []
  type: TYPE_TB
- en: '| **Data requirement** | Needs a moderate-sized scored *dev* set to evaluate
    roll-outs. | Works with **single examples** because each explanation is information-rich;
    leverages existing eval traces or human annotations. |'
  id: totrans-103
  prefs: []
  type: TYPE_TB
- en: '| **Compute cost** | Front-loaded (search); negligible at inference. | Minimal
    upfront, <1 extra call per optimisation; prompt grows by only the net instruction
    text. |'
  id: totrans-104
  prefs: []
  type: TYPE_TB
  zh: '| **计算成本** | 前置加载（搜索）；推理时可忽略。 | 初始成本最小，每次优化仅需额外调用1次；提示仅增加净指令文本。 |'
- en: '| **Interpretability** | Final prompt readable, but the reasoning path is hidden
    in search logs. | Full audit trail: every instruction edit is plain English; easy
    diff & rollback. |'
  id: totrans-105
  prefs: []
  type: TYPE_TB
  zh: '| **可解释性** | 最终提示可读，但推理路径隐藏在搜索日志中。 | 完整审计轨迹：每个指令编辑都是纯英文；易于比较和回滚。 |'
- en: '| **Typical sweet spot** | Boot-strapping *new* tasks where you can afford
    an offline optimisation pass. | Long-lived agents that must obey **evolving policy
    & domain rules** with scarce labelled data. |'
  id: totrans-106
  prefs: []
  type: TYPE_TB
  zh: '| **典型优势** | 在可以承受离线优化遍历的情况下，启动**新**任务。 | 长期运行的代理必须遵守**不断变化的政策和领域规则**，且标注数据稀缺。
    |'
