- en: Why Are Convolutional Neural Networks Great For Images?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么卷积神经网络非常适合图像？
- en: 原文：[https://towardsdatascience.com/why-are-convolutional-neural-networks-great-for-images/](https://towardsdatascience.com/why-are-convolutional-neural-networks-great-for-images/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-are-convolutional-neural-networks-great-for-images/](https://towardsdatascience.com/why-are-convolutional-neural-networks-great-for-images/)
- en: <mdspan datatext="el1746060965933" class="mdspan-comment">The</mdspan> [Universal
    Approximation Theorem](https://www.sciencedirect.com/science/article/abs/pii/0893608089900208?via%3Dihub) states
    that a neural network with a single hidden layer and a nonlinear activation function
    can approximate any continuous function.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746060965933" class="mdspan-comment">这个</mdspan> [通用逼近定理](https://www.sciencedirect.com/science/article/abs/pii/0893608089900208?via%3Dihub) 表明，具有单个隐藏层和非线性激活函数的神经网络可以逼近任何连续函数。
- en: Practical issues aside, such that the number of neurons in this hidden layer
    would grow enormously large, we do not need other network architectures. A simple
    feed-forward neural network could do the trick.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 不考虑实际的问题，比如这个隐藏层中的神经元数量会变得非常大，我们不需要其他网络架构。一个简单的前馈神经网络就能解决问题。
- en: It is challenging to estimate how many network architectures have been developed.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 估计已经开发了多少种网络架构是一项挑战。
- en: When you open the popular AI model platform [Hugging Face](https://huggingface.co/models) today,
    you will find more than one million pretrained models. Depending on the task,
    you will use different architectures, for example transformers for natural language
    processing and convolutional networks for image classification.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当你今天打开流行的AI模型平台[Hugging Face](https://huggingface.co/models)时，你会找到超过一百万个预训练模型。根据任务的不同，你会使用不同的架构，例如，用于自然语言处理的transformers和用于图像分类的卷积网络。
- en: So, why do we *need* so many neural network architectures?
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们为什么需要这么多神经网络架构呢？
- en: In this post, I want offer an answer to this question from a physics perspective.
    It is the structure in the data that inspires novel neural network architectures.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我想从物理学的角度回答这个问题。是数据中的结构启发了新的神经网络架构。
- en: Symmetry and invariance
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对称性和不变性
- en: Physicists love symmetry. The fundamental laws of physics employ symmetries,
    such as the fact that the motion of a particle can be described by the same equations,
    regardless of where it finds itself in time and space.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 物理学家喜欢对称性。物理的基本定律使用了对称性，例如，粒子的运动可以用相同的方程来描述，无论它在时间和空间中的位置如何。
- en: Symmetry always implies invariance with respect to some transformation. These
    ice crystals are an example of translational invariance. The smaller structures
    look the same, regardless of where they appear in the larger context.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 对称性总是意味着对某些变换的不变性。这些冰晶是平移不变性的一个例子。较小的结构无论在更大的背景中出现在哪里，看起来都是一样的。
- en: '![Regular ice crystals](../Images/31883f4130cb6d1ddaf36ec74c76a2da.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![常规冰晶](../Images/31883f4130cb6d1ddaf36ec74c76a2da.png)'
- en: By Photo by PtrQs, CC BY-SA 4.0, [https://commons.wikimedia.org/w/index.php?curid=127396876](https://commons.wikimedia.org/w/index.php?curid=127396876)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: By Photo by PtrQs, CC BY-SA 4.0, [https://commons.wikimedia.org/w/index.php?curid=127396876](https://commons.wikimedia.org/w/index.php?curid=127396876)
- en: 'Exploiting symmetries: convolutional neural network'
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用对称性：卷积神经网络
- en: If you already know that a certain symmetry persists in your data, you can exploit
    this fact to simplify your neural network architecture.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经知道你的数据中存在某种对称性，你可以利用这个事实来简化你的神经网络架构。
- en: Let’s explain this with the example of image classification. The panel shows
    three scenes including a goldfish. It can show up in any location within the image,
    but the image should always be classified as *goldfish*.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以图像分类为例来解释这一点。面板显示了包括金鱼在内的三个场景。金鱼可以出现在图像的任何位置，但图像应该始终被分类为*金鱼*。
- en: '![Three panels showing the same goldfish in different locations](../Images/8bdf1a10f60a8b8d97ebd56ba5165105.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![展示同一金鱼在不同位置的三个面板](../Images/8bdf1a10f60a8b8d97ebd56ba5165105.png)'
- en: Images created by the author using Midjourney.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 作者使用Midjourney创建的图像。
- en: A feed-forward neural network could certainly achieve this, given sufficient
    training data.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有足够的训练数据，前馈神经网络当然可以实现这一点。
- en: This network architecture requires a flattened input image. Weights are then
    assigned between each input layer neuron (representing one pixel in the image)
    and each hidden layer neuron. Also, weights are assigned between each neuron in
    the hidden and the output layer.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这个网络架构需要一个展平的输入图像。然后，在每个输入层神经元（代表图像中的一个像素）和每个隐藏层神经元之间分配权重。此外，隐藏层和输出层中的每个神经元之间也分配权重。
- en: Along with this architecture, the panel shows a “flattened” version of the three
    goldfish images from above. Do they still look alike to you?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 与此架构一起，面板显示了上面三个金鱼图像的“展平”版本。它们在你看来还相似吗？
- en: '![Schematic explaining the flattening of an image and the resulting network
    architecture.](../Images/73ea9c2c167c285172f90654364305ca.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![解释图像展平和结果网络架构的示意图](../Images/73ea9c2c167c285172f90654364305ca.png)'
- en: Image created by the author. Using images created by the author with Midjourney
    and ANN architecture created with [https://alexlenail.me/NN-SVG/](https://alexlenail.me/NN-SVG/).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者创建的图像。使用作者创建的Midjourney图像和[https://alexlenail.me/NN-SVG/](https://alexlenail.me/NN-SVG/)创建的ANN架构。
- en: 'By flattening the image, we have incurred two problems:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 通过展平图像，我们产生了两个问题：
- en: Images that contain a similar object do not look alike once they are flattened,
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含相似对象的图像一旦被展平，看起来就不一样了，
- en: For high-resolution images, we will need to train a lot of weights connecting
    the input layer and the hidden layer.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于高分辨率图像，我们需要训练大量连接输入层和隐藏层的权重。
- en: Convolutional networks, on the other hand, work with kernels. Kernel sizes typically
    range between 3 and 7 pixels, and the kernel parameters are learnable in training.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，卷积网络使用核。核大小通常在3到7像素之间，核参数在训练过程中是可学习的。
- en: The kernel is applied like a raster to the image. A convolutional layer will
    have more than one kernel, allowing each kernel to focus on different aspects
    of the image.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 核像栅格一样应用于图像。卷积层将拥有多个核，允许每个核专注于图像的不同方面。
- en: '![](../Images/54502804ff91e71933c0c0cc2bb0deca.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/54502804ff91e71933c0c0cc2bb0deca.png)'
- en: Image created by the author.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者创建的图像。
- en: '* * *'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: For example, one kernel might pick up on horizontal lines in the image, while
    another might pick up on convex curves.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个核可能捕捉到图像中的水平线，而另一个核可能捕捉到凸曲线。
- en: Convolutional neural networks preserve the order of pixels and are great to
    learn localized structures. The convolutional layers can be nested to create deep
    layers. In conjunction with pooling layers, high-level features can be learned.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络保留了像素的顺序，非常适合学习局部结构。卷积层可以嵌套以创建深层层。结合池化层，可以学习高级特征。
- en: The resulting networks are considerably smaller than if you would use a fully-connected
    neural network. A convolutional layer only requires *kernel_size x kernel_size
    x n_kernel* trainable parameters.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 结果网络的大小远小于使用全连接神经网络时的大小。卷积层只需要 *kernel_size x kernel_size x n_kernel* 个可训练参数。
- en: You can save memory and computational budget, all by exploiting the fact that
    your object may be located *anywhere* within your image!
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过利用你的对象可能位于图像中任何位置的事实来节省内存和计算预算！
- en: More advanced deep learning architectures that exploit symmetries are Graph
    Neural Networks and physics-informed neural networks.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 利用对称性的更高级深度学习架构包括图神经网络和物理信息神经网络。
- en: Summary
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 摘要
- en: Convolutional neural networks work great with images because they preserve the
    local information in your image. Instead of flattening all the pixels, rendering
    the image meaningless, kernels with learnable parameters pick up on local features.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络非常适合图像处理，因为它们保留了图像中的局部信息。而不是将所有像素展平，使图像失去意义，具有可学习参数的核捕捉局部特征。
- en: '* * *'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
