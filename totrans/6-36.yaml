- en: 'Understanding the Evolution of ChatGPT: Part 1-An In-Depth Look at GPT-1 and
    What Inspired It'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/understanding-the-evolution-of-gpt-part-1-an-in-depth-look-at-gpt-1-and-what-inspired-it-b7388a32e87d/](https://towardsdatascience.com/understanding-the-evolution-of-gpt-part-1-an-in-depth-look-at-gpt-1-and-what-inspired-it-b7388a32e87d/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![(Image from Unsplash)](../Images/3941316af22faef1c87daa87155d4c32.png)'
  prefs: []
  type: TYPE_IMG
- en: (Image from [Unsplash](https://www.istockphoto.com/photo/success-transformation-gm1417761158-464748077))
  prefs: []
  type: TYPE_NORMAL
- en: The GPT (Generative Pre-Training) model family, first introduced by OpenAI in
    2018, is another important application of the Transformer architecture. It has
    since evolved through versions like GPT-2, GPT-3, and InstructGPT, eventually
    leading to the development of OpenAI’s powerful LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: 'In other words: understanding GPT models is essential for anyone looking to
    dive deeper into the world of LLMs.'
  prefs: []
  type: TYPE_NORMAL
- en: This is the first part of our GPT series, in which we will try to walk through
    the core concepts in GPT-1 as well as the prior works that have inspired it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Below are the links to Part 2 and Part 3 of this GPT series in case you are
    interested:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Part 2: GPT-2 and GPT-3](https://medium.com/towards-data-science/understanding-the-evolution-of-chatgpt-part-2-gpt-2-and-gpt-3-77a01ed934c5)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Part 3: Insights from Codex and InstructGPT](https://medium.com/towards-data-science/understanding-the-evolution-of-chatgpt-part-3-insights-from-codex-and-instructgpt-04ece2967bf7)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Below are the topics we will cover in this article:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prior to GPT-1:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Pre-training and Finetuning Paradigm: the journey from CV to NLP.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Previous Work: Word2vec, GloVe, and other methods using LM for pretraining.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Decoder-only Transformer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Auto-regressive vs. Auto-encoding Language Models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Core concepts in GPT-1:'
  prefs: []
  type: TYPE_NORMAL
- en: Key Innovations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pre-training.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finetuning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Prior to GPT-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Pre-training and Finetuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The pretraining + finetuning paradigm, which firstly became popular in Computer
    Vision, refers to the process of training a model using two stages: pretraining
    and then finetuning.'
  prefs: []
  type: TYPE_NORMAL
- en: In **pretraining** stage, the model is trained on a large-scale dataset that
    related to the downstream task at hand. In Computer Vision, this is done usually
    by learning an image classification model on ImageNet, with its most commonly
    used subset ILSVR containing 1K categories, each has 1K images.
  prefs: []
  type: TYPE_NORMAL
- en: Although 1M images doesn’t sound like "large-scale" by today’s standard, ILSVR
    was truly remarkable in a decade ago and was indeed much much larger than what
    we could have for specific CV tasks.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Also, the CV community has explored a lot of ways to get rid of supervised pre-training
    as well, for example **[MoCo](https://arxiv.org/pdf/1911.05722)** (by Kaiming
    He et al.) and **[SimCLR](https://arxiv.org/pdf/2002.05709)** (by Ting Chen et
    al.), etc.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: After pre-training, the model is assumed to have learnt some general knowledge
    about the task, which could accelerate the learning process on the downstream
    task.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then comes to **finetuning**: In this stage, the model will be trained on a
    specific downstream task with high-quality labeled data, often in much smaller
    scale compared to ImageNet. During this stage, the model will pick up some domain-specific
    knowledge related to the task at-hand, which helps improve its performance.'
  prefs: []
  type: TYPE_NORMAL
- en: For a lot of CV tasks, this **pretraining + finetuning** paradigm demonstrates
    better performance compared to directly training the same model from scratch on
    the limited task-specific data, especially when the model is complex and hence
    more likely to overfit on limited training data. Combined with modern CNN networks
    such as ResNet, this leads to a performance leap in many CV benchmarks, where
    some of which even achieve near-human performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Therefore, a natural question arises: how can we replicate such success in
    NLP?'
  prefs: []
  type: TYPE_NORMAL
- en: Previous Explorations of Pretraining Prior to GPT-1
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In fact, the NLP community never stops trying in this direction, and some of
    the efforts can date back to as early as 2013, such as **[Word2Vec](https://arxiv.org/pdf/1310.4546)**
    and **[GloVe](https://aclanthology.org/D14-1162.pdf)** (Global Vectors for Word
    Representation).
  prefs: []
  type: TYPE_NORMAL
- en: '**Word2Vec**'
  prefs: []
  type: TYPE_NORMAL
- en: The Word2Vec paper "**Distributed Representations of Words and Phrases and their
    Compositionality**" was honored with the "Test of Time" award at NeurIPS 2023\.
    It’s really a must-read for anyone not familiar with this work.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Today it feels so natural to represent words or tokens as embedding vectors,
    but this wasn’t the case before Word2Vec. At that time, words were commonly represented
    by **one-hot encoding** or some count-based statistics such as **TD-IDF** (term
    frequency-inverse document frequency) or **** co-occurrence matrices.
  prefs: []
  type: TYPE_NORMAL
- en: For example in one-hot encoding, given a vocabulary of size N, each word in
    this vocabulary will be assigned an index i, and then it will be represented as
    a sparse vector of length N where only the i-th element is set to 1.
  prefs: []
  type: TYPE_NORMAL
- en: 'Take the following case as an example: in this toy vocabulary we only have
    four words: the (index 0), cat (index 1), sat (index 2) and on (index 3), and
    therefore each word will be represented as a sparse vector of length 4(the ->1000,
    cat -> 0100, sat -> 0010, on -> 0001).'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1\. An example of one-hot encoding with a toy vocabulary of 4 words.
    (image by the author)](../Images/43129dfab6533a9b8e6a9d59dd27dd76.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1\. An example of one-hot encoding with a toy vocabulary of 4 words.
    (image by the author)
  prefs: []
  type: TYPE_NORMAL
- en: The problem with this simple method is that, as vocabulary grows larger and
    larger in real-world cases, the one-hot vectors will become extremely long. Also,
    neural networks are not designed to handle these sparse vectors efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, the semantic relationships between related words will be lost
    during this process as the index for each word is randomly assigned, meaning similar
    words have no connection in this representation.
  prefs: []
  type: TYPE_NORMAL
- en: 'With that, you can better understand the significance of Word2Vec’s contribution
    now: By representing words as continuous vectors in a high-dimensional space where
    words with similar contexts have similar vectors, it completely revolutionized
    the field of NLP.'
  prefs: []
  type: TYPE_NORMAL
- en: With Word2Vec, related words will be mapped closer in the embedding space. For
    example, in the figure below the authors show the PCA projection of word embeddings
    for some countries and their corresponding capitals, with their relationships
    automatically captured by Word2Vec without any supervised information provided.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2\. PCA projection of countries and capital vectors by Word2Vec. (Image
    from Word2Vec paper)](../Images/2b32a12620878b4a0ab7b8afc1e41b74.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2\. PCA projection of countries and capital vectors by [Word2Vec](https://arxiv.org/pdf/1310.4546).
    (Image from Word2Vec paper)
  prefs: []
  type: TYPE_NORMAL
- en: Word2Vec is learnt in an unsupervised manner, and once the embeddings are learnt,
    they can be easily used in downstream tasks. This is one of the earliest efforts
    exploring semi-supervised learning in NLP.
  prefs: []
  type: TYPE_NORMAL
- en: More specifically, it can leverage either the **CBOW** (Continuous Bag of Words)
    or **Skip-Gram** architectures to learn word embeddings.
  prefs: []
  type: TYPE_NORMAL
- en: In CBOW, the model tries to predict the target word based on its surrounding
    words. For example, given the sentence "The cat sat on the mat," CBOW would try
    to predict the target word "sat" given the context words "The," "cat," "on," "the."
    This architecture is effective when the goal is to predict a single word from
    the context.
  prefs: []
  type: TYPE_NORMAL
- en: However, Skip-Gram works quite the opposite way – it uses a target word to predict
    its surrounding context words. Taking the same sentence as example, this time
    the target word "sat" becomes the input, and the model would try to predict context
    words like "The," "cat," "on," and "the." Skip-Gram is particularly useful for
    capturing rare words by leveraging the context in which they appear.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3\. CBOW vs. Skip-Gram architectures in Word2Vec, where "sat" is the
    target word. (Image by the author)](../Images/28171f05c1553988a1ba1ae3e0e7770e.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3\. CBOW vs. Skip-Gram architectures in Word2Vec, where "sat" is the
    target word. (Image by the author)
  prefs: []
  type: TYPE_NORMAL
- en: '**GloVe**'
  prefs: []
  type: TYPE_NORMAL
- en: Another work along this line of research is GloVe, which is also an unsupervised
    method to generate word embeddings. Unlike Word2Vec which focuses on a local context,
    GloVe is designed to capture global statistical information by constructing a
    word co-occurrence matrix and factorizing it to obtain dense word vectors.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4\. Illustration of word embedding generation in GloVe. (Image by
    the author)](../Images/4ffec0f50567cf2441632a62b25d7969.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4\. Illustration of word embedding generation in GloVe. (Image by the
    author)
  prefs: []
  type: TYPE_NORMAL
- en: Note that both Word2Vec and GloVe can mainly transfer word-level information,
    which is often not sufficient in handling complex NLP tasks as we need to capture
    high-level semantics in the embeddings. This leads to more recent explorations
    on unsupervised pre-training of NLP models.
  prefs: []
  type: TYPE_NORMAL
- en: '**Unsupervised Pre-Training**'
  prefs: []
  type: TYPE_NORMAL
- en: Before GPT, many works have explored unsupervised pre-training with different
    objectives, such as language model, machine translation and discourse coherence,
    etc. However, each method only outperforms others on certain downstream tasks
    and it remained unclear what optimization objectives were most effective or most
    useful for transfer.
  prefs: []
  type: TYPE_NORMAL
- en: You may have noticed that language models had already been explored as training
    objectives in some of the earlier works, but why didn’t these methods succeed
    like GPT?
  prefs: []
  type: TYPE_NORMAL
- en: The answer is **Transformer** models.
  prefs: []
  type: TYPE_NORMAL
- en: When the earlier works were proposed, there is no Transformer models yet, so
    researchers could only rely on RNN models like LSTM for pre-training.
  prefs: []
  type: TYPE_NORMAL
- en: 'This brings us to the next topic: the Transformer architecture used in GPT.'
  prefs: []
  type: TYPE_NORMAL
- en: Decoder-only Transformer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In GPT, the Transformer architecture is a modified version of the original Transformer
    called [decoder-only Transformer](https://arxiv.org/pdf/1801.10198). This is a
    simplified Transformer architecture proposed by Google in 2018, and it contains
    only the decoder.
  prefs: []
  type: TYPE_NORMAL
- en: Below is a comparison of the encoder-decoder architecture introduced in the
    original Transformer vs. the decoder-only Transformer architecture used in GPT.
    Basically, the decoder-only architecture removes the encoder part entirely along
    with the cross-attention, leading to a more simplified architecture.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5\. Comparison of the encoder-decoder architecture in Transformer
    vs. decoder-only Transformer in GPT. (Image from the Transformer and GPT paper)](../Images/07f4f5aae2928cb6d53331aad87bec1e.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5\. Comparison of the encoder-decoder architecture in [Transformer](https://arxiv.org/pdf/1706.03762)
    vs. decoder-only Transformer in [GPT](https://cdn.openai.com/research-covers/language-unsupervised/language_understanding_paper.pdf).
    (Image from the Transformer and GPT paper)
  prefs: []
  type: TYPE_NORMAL
- en: '**So what’s the benefit of making Transformer decoder-only?**'
  prefs: []
  type: TYPE_NORMAL
- en: Compared with encoder-only models such as BERT, decoder-only models often perform
    better in generating coherent and contextually relevant text, making them ideal
    for text generation tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Encoder-only models like BERT, on the other hand, often perform better in tasks
    that require understanding the input data, like text classification, sentiment
    analysis, and named entity recognition, etc.
  prefs: []
  type: TYPE_NORMAL
- en: There is another type of models that employ both the encoder and decoder Transformer,
    such as T5 and BART, with the encoder processes the input, while the decoder generates
    the output based on the encoded representation. While such a design makes them
    more versatile in handling a wide range of tasks, they are often more computationally
    intensive than encoder-only or decoder-only models.
  prefs: []
  type: TYPE_NORMAL
- en: In a nutshell, while both built on Transformer models and tried to leverage
    pre-training + finetuning scheme, GPT and BERT have chosen very different ways
    to achieve that similar goal. More specifically, GPT conducts pre-training in
    an **auto-regressive** manner, while BERT follows an **auto-encoding** approach.
  prefs: []
  type: TYPE_NORMAL
- en: Auto-regressive vs. Auto-encoding Language Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: An easy way to understand their difference is to compare their training objectives.
  prefs: []
  type: TYPE_NORMAL
- en: In Auto-regressive language models, the training objective is often to predict
    the next token in the sequence, based on previous tokens. Due to the dependency
    on previous tokens, this usually lead to a unidirectional (typically left-to-right)
    approach, as we show in the left of Figure 6.
  prefs: []
  type: TYPE_NORMAL
- en: By contrast, auto-encoding language models are often trained with objectives
    like Masked Language Model or reconstructing the entire input from corrupted versions.
    This is often done in a bi-directional manner where the model can leverage all
    the tokens around the masked one, in other words, both the left and right side
    tokens. This is illustrated in the right of Figure 6.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6\. Auto-regressive Language Model vs. Auto-encoding Language Model.
    (Image by the author)](../Images/dd40751b497b90815950ef2ab36b5e77.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6\. Auto-regressive Language Model vs. Auto-encoding Language Model.
    (Image by the author)
  prefs: []
  type: TYPE_NORMAL
- en: Simply put, auto-regressive LM is more suitable for text generation, but its
    unidirectional modeling approach may limit its capability in understanding the
    full context. Auto-encoding LM, on the other hand, can do a better job at context
    understanding, but is not designed for generative tasks.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Core Concepts in GPT-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Key Innovations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Most of the key innovations of GPT-1 have already been covered in above sections,
    so I will just list them here as a brief summary:'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-1 is the first work that successfully leverages auto-regressive language
    modeling as unsupervised pre-training task, making the pre-training + finetuning
    paradigm a standard procedure for NLP tasks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unlike its prior works that rely on RNNs and LSTMs, GPT-1 leverages decoder-only
    Transformer architecture, which improved parallelization and long-range dependency
    handling, leading to better performance.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unsupervised Pre-training
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In GPT pre-training, a standard language modeling objective is used:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/445c83d4b1885030f19f70bd841c147e.png)'
  prefs: []
  type: TYPE_IMG
- en: where k is the size of the context window, and the conditional probability P
    is modeled using the decoder-only Transformer with it parameters represented as
    θ.
  prefs: []
  type: TYPE_NORMAL
- en: Supervised Finetuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once the model is pre-trained, it can be adapted to a specific downstream task
    by finetuning on a task-specific dataset using a proper supervised learning objective.
  prefs: []
  type: TYPE_NORMAL
- en: 'One problem here is that GPT requires a continuous sequence of text as input,
    while some tasks may involve more than one input sequence. For example in Entailment
    we have both the premise and the hypothesis, and in some QA tasks we will need
    to handle three different input sequences: the document, the question and the
    answer.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To make it easier to fit into different tasks, GPT adopts some task-specific
    input transformations in the finetuning stage, as we show in the figure below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7\. Input transformations for fine-tuning on different tasks. (Image
    from GPT paper)](../Images/ba612fce9b4e8cc7e39e7d419aee2486.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7\. Input transformations for fine-tuning on different tasks. ([Image
    from GPT paper](https://cdn.openai.com/research-covers/language-unsupervised/language_understanding_paper.pdf))
  prefs: []
  type: TYPE_NORMAL
- en: More specifically,
  prefs: []
  type: TYPE_NORMAL
- en: For **Entailment** task, the premise and hypothesis sequences will be concatenated
    into a single sequence, with a delimiter token in between.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For **Similarity** task, since there is no inherent ordering of the sentences,
    we can simply construct two input sequences by switching the two input sequences,
    get their respective embeddings and then add these two embeddings in a element-wise
    manner.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For more complex **Question Answering** and **Commonsense Reasoning** tasks,
    where we are typically given a context document, a question and a set of possible
    answers, we can concatenate the document context and the question with each possible
    answer (again with a delimiter token in between), process each of these sequence
    independently, and then use a softmax layer to produce the final output distribution
    over possible answers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, we revisited the key techniques that inspired GPT-1 and highlighted
    its major innovations.
  prefs: []
  type: TYPE_NORMAL
- en: This is the first part of our GPT series, and in the next article, we will walk
    through the evolution from GPT-1 to GPT-2, GPT-3, and InstructGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
