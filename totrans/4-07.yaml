- en: 'DeepSeek V3: A New Contender in AI-Powered Data Science'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: DeepSeek V3：AI驱动数据科学的新竞争者
- en: 原文：[https://towardsdatascience.com/deepseek-v3-a-new-contender-in-ai-powered-data-science-eec8992e46f5/](https://towardsdatascience.com/deepseek-v3-a-new-contender-in-ai-powered-data-science-eec8992e46f5/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/deepseek-v3-a-new-contender-in-ai-powered-data-science-eec8992e46f5/](https://towardsdatascience.com/deepseek-v3-a-new-contender-in-ai-powered-data-science-eec8992e46f5/)
- en: Nvidia stock price slumped over 15% on Monday, Jan 27th, after a Chinese startup,
    DeepSeek, released its new AI model. The model [performance is on par with ChatGPT,
    Llama, and Claude](https://www.deepseek.com/) but at a fraction of the cost. [According
    to Wired](https://www.wired.com/story/openai-ceo-sam-altman-the-age-of-giant-ai-models-is-already-over/),
    OpenAI spent more than USD$100m to train GPT-4\. But DeepSeek’s V3 model was trained
    for just $5.6m. This cost efficiency is also reflected in the API costs – for
    every 1M tokens, the deepseek-chat model (V3) costs $0.14, and the deepseek-reasoner
    model (R1) costs only $0.55 ([DeepSeek API Pricing](https://api-docs.deepseek.com/quick_start/pricing/)).
    Meanwhile, gpt-4o API costs $2.50 / 1M input tokens, and o1 API costs $15.00 /
    1M input tokens ([OpenAI API Pricing](https://openai.com/api/pricing/)).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 1月27日星期一，中国初创公司DeepSeek发布其新AI模型后，英伟达股价下跌超过15%。该模型[性能与ChatGPT、Llama和Claude相当](https://www.deepseek.com/)，但成本却低得多。[据《Wired》报道](https://www.wired.com/story/openai-ceo-sam-altman-the-age-of-giant-ai-models-is-already-over/)，OpenAI花费超过1亿美元来训练GPT-4。但DeepSeek的V3模型仅花费了560万美元。这种成本效益也反映在API成本上——对于每1000万个令牌，deepseek-chat模型（V3）的成本为0.14美元，而deepseek-reasoner模型（R1）的成本仅为0.55美元（[DeepSeek
    API定价](https://api-docs.deepseek.com/quick_start/pricing/)）。同时，gpt-4o API的成本为每1000万个输入令牌2.50美元，o1
    API的成本为每1000万个输入令牌15.00美元（[OpenAI API定价](https://openai.com/api/pricing/)）。
- en: Always intrigued by emerging LLMs and their application in data science, I decided
    to put DeepSeek to the test. **My goal was to see how well its chatbot (V3) model
    could assist or even replace data scientists in their daily tasks**. I used the
    same criteria from my previous article series, where I evaluated the performance
    of ChatGPT-4o vs. Claude 3.5 Sonnet vs. Gemini Advanced on [SQL queries](https://towardsdatascience.com/chatgpt-vs-claude-vs-gemini-for-data-analysis-part-1-821086810318),
    [Exploratory Data Analysis (EDA)](https://towardsdatascience.com/chatgpt-vs-claude-vs-gemini-for-data-analysis-part-2-whos-the-best-at-eda-6ed5a4a6f008),
    and [Machine Learning (ML)](https://towardsdatascience.com/chatgpt-vs-claude-vs-gemini-for-data-analysis-part-3-best-ai-assistant-for-machine-learning-a2078793e4fa).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 始终对新兴的大型语言模型（LLMs）及其在数据科学中的应用感到好奇，我决定对DeepSeek进行测试。**我的目标是看看其聊天机器人（V3）模型在协助或甚至取代数据科学家日常任务方面表现如何**。我使用了之前文章系列中相同的标准，评估了ChatGPT-4o、Claude
    3.5 Sonnet和Gemini Advanced在[SQL查询](https://towardsdatascience.com/chatgpt-vs-claude-vs-gemini-for-data-analysis-part-1-821086810318)、[数据探索分析（EDA）](https://towardsdatascience.com/chatgpt-vs-claude-vs-gemini-for-data-analysis-part-2-whos-the-best-at-eda-6ed5a4a6f008)和[机器学习（ML）](https://towardsdatascience.com/chatgpt-vs-claude-vs-gemini-for-data-analysis-part-3-best-ai-assistant-for-machine-learning-a2078793e4fa)方面的性能。
- en: '![Image created by DALL·E](../Images/ed987e3260382606d8cefd0d063a8c03.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![Image created by DALL·E](../Images/ed987e3260382606d8cefd0d063a8c03.png)'
- en: Image created by DALL·E
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: Image created by DALL·E
- en: '* * *'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I. First Impressions
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: I. 初次印象
- en: 'Here are some quick observations from my initial exploration of DeepSeek’s
    web chatbot UI:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在我对DeepSeek网络聊天机器人UI的初步探索中，以下是一些快速观察：
- en: '**Interface**: The chatbot UI looks similar to ChatGPT, with all the past chats
    listed on the left and the current conversation in the main panel.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**界面**：聊天机器人UI看起来与ChatGPT相似，所有过去的聊天都列在左侧，当前对话在主面板中。'
- en: '**Chat Labels**: ChatGPT usually labels your past chats with a brief summary.
    However, by default, DeepSeek labels old chats with the first several words of
    your prompt. For new chats in the same web session, it simply shows ‘New chat’,
    which could be confusing when there are multiple. But of course, you can rename
    any chats for clarity.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聊天标签**：ChatGPT通常用简短的摘要标记您过去的聊天。然而，默认情况下，DeepSeek使用您提示的前几个词来标记旧聊天。对于同一网络会话中的新聊天，它只显示“新聊天”，当有多个时可能会造成混淆。但当然，您可以为任何聊天重命名以增加清晰度。'
- en: '**Model Options:** In the message input box, you can opt to use the reasoning
    model (R1) or enable the web search functionality.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型选项**：在消息输入框中，您可以选择使用推理模型（R1）或启用网络搜索功能。'
- en: '**Formatting**: The chatbot formats keywords and code snippets neatly, making
    it easy to read.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**格式化**：聊天机器人将关键词和代码片段整齐地格式化，便于阅读。'
- en: '![DeepSeek UI (image by author)](../Images/0c85e1209c08ff8b5230547df729fc72.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![DeepSeek UI (image by author)](../Images/0c85e1209c08ff8b5230547df729fc72.png)'
- en: DeepSeek UI (image by author)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek UI (image by author)
- en: '* * *'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: II. SQL
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: II. SQL
- en: 1\. Problem Solving (3/3)
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 问题解决（3/3）
- en: I started by testing DeepSeek’s problem-solving skills with three challenging
    LeetCode SQL questions ([262](https://leetcode.com/problems/trips-and-users/description/),
    [185](https://leetcode.com/problems/department-top-three-salaries/description/),
    and [1341](https://leetcode.com/problems/movie-rating/description/)) that have
    low acceptance rates. These questions have clear descriptions with input and output
    table structures and are similar to interview questions.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先通过测试DeepSeek解决三个具有挑战性的LeetCode SQL问题（[262](https://leetcode.com/problems/trips-and-users/description/)、[185](https://leetcode.com/problems/department-top-three-salaries/description/)和[1341](https://leetcode.com/problems/movie-rating/description/)）来测试DeepSeek的问题解决技能，这些问题具有低接受率。这些问题有清晰的描述，包括输入和输出表结构，并且类似于面试问题。
- en: DeepSeek aced all three questions using aggregation, filters, window functions,
    etc. It also offered step-by-step breakdowns and clear explanations.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek使用聚合、过滤器、窗口函数等解决了所有三个问题。它还提供了逐步分解和清晰的解释。
- en: '![](../Images/e22847832501e2a282e6f3422ae55d73.png)![](../Images/b3c8be4814863597a5656df3e1ec7307.png)![DeepSeek''s
    response to LeetCode SQL Questions (image by author)](../Images/d66d7be96fab41bdc2f3042dd21e1412.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e22847832501e2a282e6f3422ae55d73.png)![](../Images/b3c8be4814863597a5656df3e1ec7307.png)![DeepSeek对LeetCode
    SQL问题的响应（图片由作者提供）](../Images/d66d7be96fab41bdc2f3042dd21e1412.png)'
- en: DeepSeek’s response to LeetCode SQL Questions (image by author)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek对LeetCode SQL问题的响应（图片由作者提供）
- en: 2\. Business Logic (3.5/4)
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 业务逻辑（3.5/4）
- en: Next, I uploaded four synthetic datasets to simulate real-world scenarios where
    table descriptions are often incomplete and you have to assume information based
    on how the data looks like.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我上传了四个合成数据集来模拟现实世界场景，在这些场景中，表描述通常不完整，你必须根据数据的外观来假设信息。
- en: Though the total size of the four CSV files is only ~300KB, I got the error
    message "*DeepSeek can only read 40% of all files. Try replacing the attached
    files with smaller excerpts.*" So I cut the file size down to only 30KB by truncating
    to the top 100 rows of each file – I no longer got the above error message, but
    this time it said "*Oops! DeepSeek is experiencing high traffic at the moment.
    Please check back in a little while.*" Eventually, I turned to upload screenshots
    of the top rows of each dataset, which worked.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管四个CSV文件的总大小仅为约300KB，但我收到了错误消息“*DeepSeek只能读取所有文件的40%。请尝试用较小的摘录替换附加的文件。*”所以我将每个文件的大小裁剪到只有30KB，即截取每个文件的前100行
    - 我不再收到上述错误消息，但这次它说“*哎呀！DeepSeek目前正经历高流量。请稍后再查看。*”最终，我转向上传每个数据集顶部行的截图，这成功了。
- en: '![DeepSeek reads table screenshots and writes SQL queries (image by author)](../Images/dab10f3ea61db1cf43cce4f7ea40353f.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![DeepSeek读取表格截图并编写SQL查询（图片由作者提供）](../Images/dab10f3ea61db1cf43cce4f7ea40353f.png)'
- en: DeepSeek reads table screenshots and writes SQL queries (image by author)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek读取表格截图并编写SQL查询（图片由作者提供）
- en: 'The datasets include:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集包括：
- en: '**users**: User-level data with demographic information.'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**users**：包含人口统计信息的用户级别数据。'
- en: '**products**: Product-level data.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**products**：产品级别数据。'
- en: '**orders**: Order-level data with payment information.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**orders**：包含支付信息的订单级别数据。'
- en: '**ordered_products**: A table linking orders and products.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**ordered_products**：连接订单和产品的表。'
- en: I asked DeepSeek to write queries for metrics like *total order amount by month
    from US users*, *monthly new user counts*, *top 5 best-selling product categories*,
    and *monthly user retention rate*. These are common metrics that you would track
    at an e-commerce company. It was able to generate correct queries for the first
    three but made an error in the retention rate question (this was also the question
    other AI tools struggled with the most). However, after prompting the issue, it
    was able to fix the query.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我要求DeepSeek编写查询，以获取诸如“美国用户按月总订单金额”、“每月新用户数量”、“前5个最佳销售产品类别”和“每月用户留存率”等指标。这些是在电子商务公司中通常会跟踪的常见指标。它能够为前三个指标生成正确的查询，但在留存率问题上出现了错误（这也是其他AI工具最难以解决的问题之一）。然而，在提示问题后，它能够修复查询。
- en: '![](../Images/c90b102636038e81d813e36be9d20fa5.png)![DeepSeek fixed retention
    rate query with hints (image by author)](../Images/ba0cc22e00a0d32f86bfd5910cb9b6b1.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c90b102636038e81d813e36be9d20fa5.png)![DeepSeek通过提示修复了留存率查询（图片由作者提供）](../Images/ba0cc22e00a0d32f86bfd5910cb9b6b1.png)'
- en: DeepSeek fixed retention rate query with hints (image by author)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek通过提示修复了留存率查询（图片由作者提供）
- en: 3\. Query Optimization (2.5/3)
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 查询优化（2.5/3）
- en: Finally, I tested DeepSeek’s ability to optimize suboptimal SQL queries. I used
    inefficient code examples from my [SQL optimization article](https://towardsdatascience.com/mastering-sql-optimization-from-functional-to-efficient-queries-74d8692f10be).
    It improved queries by only selecting necessary columns, moving aggregation steps
    earlier, avoiding redundant de-duplication operations, etc.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我测试了DeepSeek优化次优SQL查询的能力。我使用了从我[SQL优化文章](https://towardsdatascience.com/mastering-sql-optimization-from-functional-to-efficient-queries-74d8692f10be)中选取的低效代码示例。它通过仅选择必要的列、将聚合步骤提前、避免冗余去重操作等方式改进了查询。
- en: What I like the most is that it not only suggested improvements but provided
    detailed explanations of everything that could be optimized, including database-specific
    tips.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我最喜欢的是，它不仅提出了改进建议，还提供了关于所有可优化内容的详细解释，包括针对特定数据库的技巧。
- en: '![](../Images/bc278cc6e6e07f4c81aed1f72082358d.png)![DeepSeek''s SQL query
    optimization performance 1 (image by author)](../Images/6a97156f06d877306f51ebf0dcb24c3b.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bc278cc6e6e07f4c81aed1f72082358d.png)![DeepSeek的SQL查询优化性能1（作者提供）](../Images/6a97156f06d877306f51ebf0dcb24c3b.png)'
- en: DeepSeek’s SQL query optimization performance 1 (image by author)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的SQL查询优化性能1（作者提供）
- en: '![](../Images/52c423238bb9e5b7ea36c87c31370f00.png)![DeepSeek''s SQL query
    optimization performance 2 (image by author)](../Images/df6c8ecbfce888ef82b25eb098ddec01.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/52c423238bb9e5b7ea36c87c31370f00.png)![DeepSeek的SQL查询优化性能2（作者提供）](../Images/df6c8ecbfce888ef82b25eb098ddec01.png)'
- en: DeepSeek’s SQL query optimization performance 2 (image by author)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的SQL查询优化性能2（作者提供）
- en: I only encountered an issue with the last question where I asked it to further
    optimize the query by adjusting the window function, but it generated a query
    that produced repetitive rows. It quickly corrected the issue after I pointed
    it out.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我只遇到了一个问题，那就是我在最后一个问题中要求它通过调整窗口函数进一步优化查询，但它生成了一个产生重复行的查询。在我指出这个问题后，它迅速进行了纠正。
- en: '![](../Images/a87f85db8554d7e1c5228a4483f50a2a.png)![](../Images/5e5c41ece88c08694468bffd694cb187.png)![DeepSeek
    corrected the issue it made (image by author)](../Images/7a6856804c7be41afa2773bae1c76366.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a87f85db8554d7e1c5228a4483f50a2a.png)![图片](../Images/5e5c41ece88c08694468bffd694cb187.png)![DeepSeek纠正了它造成的问题（作者提供）](../Images/7a6856804c7be41afa2773bae1c76366.png)'
- en: DeepSeek corrected the issue it made (image by author)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek纠正了它造成的问题（作者提供）
- en: SQL Performance Summary
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: SQL性能摘要
- en: Overall, DeepSeek performed very well in the SQL section, providing clear explanations
    and suggestions for SQL queries. It only made two small mistakes and managed to
    fix itself quickly after my prompts. However, its file upload limitations could
    cause inconvenience for users.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，DeepSeek在SQL部分表现良好，提供了对SQL查询的清晰解释和建议。它只犯了两处小错误，并在我的提示下迅速进行了纠正。然而，其文件上传限制可能会给用户带来不便。
- en: '![SQL performance evaluation (image by author)](../Images/c43b8cd91b540c80f6071e932ef1702c.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![SQL性能评估（作者提供）](../Images/c43b8cd91b540c80f6071e932ef1702c.png)'
- en: SQL performance evaluation (image by author)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: SQL性能评估（作者提供）
- en: '* * *'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: III. Exploratory Data Analysis (EDA)
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: III. 数据探索分析（EDA）
- en: Now let’s switch gears to Exploratory Data Analysis. Due to DeepSeek’s file
    upload constraints, I only managed to upload a very tiny dataset (2KB) of my Medium
    article performance. If you are interested, you can find a detailed analysis and
    review of my Medium journey in [my past article](https://towardsdatascience.com/my-medium-journey-as-a-data-scientist-6-months-18-articles-and-3-000-followers-c449306e45f7).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们转换一下话题，来探讨数据探索分析（Exploratory Data Analysis）。由于DeepSeek的文件上传限制，我仅能上传我Medium文章性能的一个非常小的数据集（2KB）。如果您感兴趣，可以在我的[过往文章](https://towardsdatascience.com/my-medium-journey-as-a-data-scientist-6-months-18-articles-and-3-000-followers-c449306e45f7)中找到对Medium旅程的详细分析和回顾。
- en: 'Here is my prompt:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我的提示：
- en: I have been writing articles on Medium and collected this dataset of my articles’
    performance. You are a data science professional. Your objective today is to help
    me conduct a thorough exploratory data analysis (EDA) of this dataset with necessary
    steps, such as data cleaning, analysis and visualizations, clear insights, and
    actionable recommendations.
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我一直在Medium上撰写文章，并收集了我文章性能的此数据集。您是一位数据科学专业人士。今天的任务是帮助我对此数据集进行彻底的数据探索分析（EDA），包括必要的步骤，如数据清洗、分析、可视化、清晰的见解和可操作的建议。
- en: ''
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Your EDA will be used to better understand the medium earning and inform future
    writing strategies.
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 您的EDA将有助于更好地理解Medium的收益并指导未来的写作策略。
- en: Below are the rubrics I used to evaluate the EDA capability of AI tools.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是用于评估AI工具EDA能力的评分标准。
- en: '![EDA evaluation rubrics (image by author)](../Images/73e5a79ce2b13dc777d28d3823798ca7.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![EDA评估标准（图片由作者提供）](../Images/73e5a79ce2b13dc777d28d3823798ca7.png)'
- en: EDA evaluation rubrics (image by author)
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: EDA评估标准（图片由作者提供）
- en: 1\. Completeness (4/5)
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 完整性（4/5）
- en: DeepSeek’s EDA response was very organized and covered most of the critical
    components of EDA.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的EDA响应非常有序，涵盖了EDA的大部分关键组件。
- en: '**Data inspection**: You could click on the uploaded dataset to get a preview.
    However, the preview was text-based, making it hard to digest. It also does not
    provide any text description of the dataset. Therefore, I consider this step incomplete.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据检查**：您可以点击上传的数据集以获取预览。然而，预览是基于文本的，这使得消化起来很困难。它也没有提供任何关于数据集的文本描述。因此，我认为这一步骤是不完整的。'
- en: '![Inspect the dataset in DeepSeek (image by author)](../Images/6a53c3b98ca803871502f2efdddc143e.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![检查DeepSeek中的数据集（图片由作者提供）](../Images/6a53c3b98ca803871502f2efdddc143e.png)'
- en: Inspect the dataset in DeepSeek (image by author)
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 检查DeepSeek中的数据集（图片由作者提供）
- en: '**Data cleaning**: DeepSeek started its report with data cleaning. It checked
    for missing values, and data types, and removed unnecessary columns. Though it
    did not display the results, it provided summaries and instructions at each step.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据清洗**：DeepSeek的报告从数据清洗开始。它检查了缺失值、数据类型，并删除了不必要的列。尽管它没有显示结果，但在每个步骤都提供了总结和说明。'
- en: '![Data cleaning steps in DeepSeek (image by author)](../Images/193d8dff5333e36262f7cfc30121e734.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![DeepSeek中的数据清洗步骤（图片由作者提供）](../Images/193d8dff5333e36262f7cfc30121e734.png)'
- en: Data cleaning steps in DeepSeek (image by author)
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek中的数据清洗步骤（图片由作者提供）
- en: '**Univariate analysis**: DeepSeek examined the distribution of earnings and
    other columns with Python code to run analysis and generate visualizations. It
    does not plot the charts in the UI, so I ran them manually in my Jupyter Notebook
    to validate.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**单变量分析**：DeepSeek使用Python代码检查了收入和其他列的分布，以运行分析和生成可视化。它不在UI中绘制图表，所以我手动在我的Jupyter笔记本中运行它们以进行验证。'
- en: '![](../Images/a86a6e119dcc55925a296237af7fbd1a.png)![Univariate analysis in
    DeepSeek (image by author)](../Images/e25f280470430369a4f0bcc02ba8c773.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a86a6e119dcc55925a296237af7fbd1a.png)![DeepSeek中的单变量分析（图片由作者提供）](../Images/e25f280470430369a4f0bcc02ba8c773.png)'
- en: Univariate analysis in DeepSeek (image by author)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek中的单变量分析（图片由作者提供）
- en: '**Bivariate and multivariate analysis**: DeepSeek explored the relationship
    between earnings and many other variables to understand the drivers of Medium
    earnings.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**双变量和多变量分析**：DeepSeek探讨了收入与其他许多变量之间的关系，以了解Medium收入的驱动因素。'
- en: '![](../Images/9471549309e72de8fafa6b709b18d783.png)![Bi-variate analysis in
    DeepSeek (image by author)](../Images/e74b8a28b1f9ba039c2af8b314f0efc6.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9471549309e72de8fafa6b709b18d783.png)![DeepSeek中的双变量分析（图片由作者提供）](../Images/e74b8a28b1f9ba039c2af8b314f0efc6.png)'
- en: Bi-variate analysis in DeepSeek (image by author)
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek中的双变量分析（图片由作者提供）
- en: '**Insights and recommendations**: DeepSeek also provided actionable insights
    based on its analysis.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**分析和推荐**：DeepSeek还根据其分析提供了可操作的见解。'
- en: '![Insights and recommendations by DeepSeek (image by author)](../Images/f9c284b6c126068b9f42351ddfb3588f.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![DeepSeek的分析和推荐（图片由作者提供）](../Images/f9c284b6c126068b9f42351ddfb3588f.png)'
- en: Insights and recommendations by DeepSeek (image by author)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的分析和推荐（图片由作者提供）
- en: 2\. Accuracy (3/4)
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 准确性（3/4）
- en: I reviewed the Python script DeepSeek generated and ran it manually. While most
    of the code worked well, the correlation matrix section threw an error due to
    non-numeric columns being included. I reported the error message back, and it
    corrected the issue by adding `df.select_dtypes(include=[np.number])` to filter
    on numeric columns only.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我审查了DeepSeek生成的Python脚本并手动运行它。虽然大部分代码运行良好，但相关矩阵部分由于包含非数值列而抛出了错误。我报告了错误信息，并通过添加`df.select_dtypes(include=[np.number])`来仅过滤数值列以纠正问题。
- en: This minor error resulted in a one-point deduction.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这个小错误导致扣了一分。
- en: '![Correlation Matrix code erorr (image by author)](../Images/1014d7ad9707189ff48a5ab2d3a3cbb7.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![相关矩阵代码错误（图片由作者提供）](../Images/1014d7ad9707189ff48a5ab2d3a3cbb7.png)'
- en: Correlation Matrix code erorr (image by author)
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 相关矩阵代码错误（图片由作者提供）
- en: 3\. Visualization (2/4)
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 可视化（2/4）
- en: DeepSeek did not display the visualizations in its UI, only the Python code.
    While the code generated accurate visualizations (except for the correlation matrix
    error above), the overall experience was less user-friendly compared to other
    tools like ChatGPT. Therefore, I deducted two points for this limitation.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 在其 UI 中没有显示可视化，只显示 Python 代码。虽然生成的代码准确无误（除了上面提到的相关矩阵错误），但与 ChatGPT
    等其他工具相比，整体用户体验不太友好。因此，我为此限制减去了两分。
- en: 4\. Insightfulness (4/4)
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 洞察力（4/4）
- en: DeepSeek provided valuable insights and actionable recommendations based on
    its analysis. It covered content strategy, publication selection, the power of
    "Boost", etc.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 基于其分析提供了有价值的见解和可操作的推荐。它涵盖了内容策略、出版物选择、“增强”的力量等。
- en: 5\. Reproducibility and Documentation (3/3)
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 可重复性和文档（3/3）
- en: DeepSeek structured its EDA report logically, from data cleaning to analysis,
    and insights. The paragraph is also well formatted with bullet points, code blocks,
    and highlighted keywords.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 将其 EDA 报告结构化，从数据清洗到分析，再到见解。段落也格式良好，包含项目符号、代码块和高亮关键词。
- en: EDA Performance Summary
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: EDA 性能总结
- en: DeepSeek delivered a logically structured EDA report with functional code and
    clear insights. However, its inability to display visualizations in the UI was
    a notable drawback – this added an additional step for users to run the code locally
    and adjust the charts manually.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 提供了一份逻辑结构化的 EDA 报告，其中包含功能代码和清晰的见解。然而，它无法在 UI 中显示可视化是一个显著的缺点——这为用户增加了额外的步骤，需要在本地运行代码并手动调整图表。
- en: '![EDA performance evaluation (image by author)](../Images/8635b2f6907306cfd44006e1d94510ce.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![EDA 性能评估（图片由作者提供）](../Images/8635b2f6907306cfd44006e1d94510ce.png)'
- en: EDA performance evaluation (image by author)
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: EDA 性能评估（图片由作者提供）
- en: III. Machine Learning (ML)
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: III. 机器学习（ML）
- en: I used the same dataset to evaluate how DeepSeek could assist in Machine Learning
    projects. Here are my rubrics.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用相同的数据集来评估 DeepSeek 如何协助机器学习项目。以下是我的评分标准。
- en: '![Machine learning evaluation rubrics (image by author)](../Images/cc49c76402107e400eb3855284943fcd.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![机器学习评估评分标准（图片由作者提供）](../Images/cc49c76402107e400eb3855284943fcd.png)'
- en: Machine learning evaluation rubrics (image by author)
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习评估评分标准（图片由作者提供）
- en: 1\. Feature Engineering (3/3)
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 特征工程（3/3）
- en: 'I first asked it to conduct feature engineering with the below prompt:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先要求它使用以下提示进行特征工程：
- en: I have been writing articles on Medium and collected this dataset of my articles’
    performance. You are a data scientist professional. I would like you to help me
    build a machine learning model to forecast article earnings and understand how
    to improve earnings.
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我一直在 Medium 上撰写文章，并收集了我文章性能的数据集。你是一位数据科学家专业人士。我希望你能帮助我构建一个机器学习模型来预测文章收入，并了解如何提高收入。
- en: ''
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Let’s do the task step by step. First, please focus on feature engineering.
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 让我们一步一步来完成这个任务。首先，请专注于特征工程。
- en: ''
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Can you suggest some feature engineering techniques that could help improve
    the performance of my model?
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你能建议一些特征工程技术，这些技术可以帮助提高我的模型性能吗？
- en: ''
  id: totrans-102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Please consider transformations, interactions between features, and any domain-specific
    features that might be relevant.
  id: totrans-103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 请考虑转换、特征之间的交互以及可能相关的任何特定领域特征。
- en: ''
  id: totrans-104
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Provide a brief explanation for each suggested feature or transformation.
  id: totrans-105
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 对每个建议的特征或转换提供简要的解释。
- en: DeepSeek suggested 10 feature engineering techniques. Most methods were pretty
    reasonable, for example, applying log transformation on right-skewed variables,
    calculating engagement per view ratios, adding temporal features, etc.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 建议了 10 种特征工程技术。大多数方法都很合理，例如，对右偏变量应用对数转换、计算每观看一次的参与度比率、添加时间特征等。
- en: '![](../Images/8d42b4949e62462c4fdda045fb7ff4ac.png)![](../Images/aa64327b0f27391173aacf2c4e594223.png)![Feature
    Engineering by DeepSeek (image by author)](../Images/f7a74a2165557ddf4ec120f3d29645f4.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8d42b4949e62462c4fdda045fb7ff4ac.png)![](../Images/aa64327b0f27391173aacf2c4e594223.png)![DeepSeek
    的特征工程（图片由作者提供）](../Images/f7a74a2165557ddf4ec120f3d29645f4.png)'
- en: Feature Engineering by DeepSeek (image by author)
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的特征工程（图片由作者提供）
- en: 2\. Model Selection (3/3)
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 模型选择（3/3）
- en: 'Next, I asked DeepSeek to recommend the most suitable model: "*Can you recommend
    the most suitable machine learning models for this task? For each recommended
    model, provide a brief explanation of why it is appropriate and mention any important
    considerations for using it effectively*".'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我要求深度搜索（DeepSeek）推荐最合适的模型：“*你能推荐这个任务最合适的机器学习模型吗？对于每个推荐的模型，简要说明为什么它适合，并提及使用它时的重要考虑因素*”。
- en: DeepSeek listed eight model options, from Linear Regression and its variations,
    to Random Forest and other tree-based models, to Neural Networks. It provided
    clear pros and cons for each model, ending with a summary and actionable next
    steps.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 深度搜索（DeepSeek）列出了八个模型选项，从线性回归及其变体，到随机森林和其他基于树的模型，再到神经网络。它为每个模型提供了清晰的优缺点，并以总结和可执行的下一步行动结束。
- en: '![](../Images/daa6b6a614c0000a48daf04c71535b17.png)![](../Images/6c358ca05cbfe5164de53f1e0aa17974.png)![Model
    recommendations by DeepSeek (image by author)](../Images/c0c99211d8b7b539086080f107e7bd32.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/daa6b6a614c0000a48daf04c71535b17.png)![](../Images/6c358ca05cbfe5164de53f1e0aa17974.png)![深度搜索（DeepSeek）的模型推荐（图片由作者提供）](../Images/c0c99211d8b7b539086080f107e7bd32.png)'
- en: Model recommendations by DeepSeek (image by author)
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 深度搜索（DeepSeek）的模型推荐（图片由作者提供）
- en: 3\. Model Training and Evaluation (3.5/4)
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 模型训练和评估（3.5/4）
- en: Lastly, let’s see its capability in model training and evaluation. My prompt
    is
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们看看它在模型训练和评估方面的能力。我的提示是
- en: Can you provide the code to train a ridge regression model? Please ensure that
    it includes steps like splitting the data into training and testing sets and performing
    cross-validation. Please also suggest the appropriate evaluation metrics and potential
    hyperparameters tunning opportunities.
  id: totrans-116
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你能提供训练岭回归模型的代码吗？请确保它包括将数据分为训练集和测试集以及执行交叉验证的步骤。请还建议适当的评估指标和潜在的超参数调整机会。
- en: DeepSeek’s code has a clear structure and comments. It ran well and output regression
    coefficients. It also offered reasonable strategy of picking the right evaluation
    metrics and hyperparameter tunning. I followed up with the question of how to
    interpret the coefficients of a Ridge Regression model, it was also able to explain
    the interpretation methodology and challenges with multicollinearity.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 深度搜索（DeepSeek）的代码结构清晰，并带有注释。它运行良好，输出了回归系数。它还提供了合理的策略来选择合适的评估指标和超参数调整。我随后提出了关于如何解释岭回归模型系数的问题，它也能解释解释方法和多重共线性带来的挑战。
- en: However, it only provided the basic code without incorporating any of its feature
    engineering ideas earlier in the same thread. When I asked it to add those features
    in, it kept erroring out with the message "The server is busy. Please try again
    later." I finally got the output after four retries. I’ve noticed this in earlier
    threads as well – DeepSeek server did not seem very reliable and errored out often,
    especially with longer chats. Therefore, I deducted 0.5 points for the server
    reliability issue.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，它只提供了基本的代码，而没有在其之前的同一线程中融入任何其特征工程想法。当我要求它添加这些功能时，它不断出现错误信息“服务器忙碌。请稍后再试。”我最终在第四次尝试后得到了输出。我之前也注意到了这一点——深度搜索（DeepSeek）服务器似乎不太可靠，经常出错，尤其是在较长的对话中。因此，我因服务器可靠性问题减去了0.5分。
- en: '![](../Images/891dec7ac76bb74b894fb50fcc7d8490.png)![](../Images/6365176226424e00b39ada9a24ce3ae0.png)![model
    training and evaluation steps by DeepSeek (image by author)](../Images/c116f1bf019007e499d4ebbd3d781154.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/891dec7ac76bb74b894fb50fcc7d8490.png)![](../Images/6365176226424e00b39ada9a24ce3ae0.png)![深度搜索（DeepSeek）的模型训练和评估步骤（图片由作者提供）](../Images/c116f1bf019007e499d4ebbd3d781154.png)'
- en: model training and evaluation steps by DeepSeek (image by author)
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 深度搜索（DeepSeek）的模型训练和评估步骤（图片由作者提供）
- en: ML Performance Summary
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器学习性能摘要
- en: For Machine Learning use cases, similar to the other AI tools, DeepSeek excelled
    at suggesting feature engineering ideas, brainstorming models, and writing code.
    However, it required human expertise to provide guidance, ask follow-up questions,
    and make final calls.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 对于机器学习用例，与其它AI工具类似，深度搜索（DeepSeek）在建议特征工程想法、头脑风暴模型和编写代码方面表现出色。然而，它需要人类专业知识来提供指导、提出后续问题并做出最终决定。
- en: '![Machine learning performance (image by author)](../Images/58010300b87e81ed1307771b09ead0c9.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![机器学习性能（图片由作者提供）](../Images/58010300b87e81ed1307771b09ead0c9.png)'
- en: Machine learning performance (image by author)
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习性能（图片由作者提供）
- en: '* * *'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Summary and Final Thoughts
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要和最终思考
- en: When it comes to Data Science projects, DeepSeek v3’s performance is very much
    on par with ChatGPT-4o, Claude 3.5 Sonnet, and Gemini Advanced. This is especially
    impressive given its much lower training costs.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到数据科学项目时，DeepSeek v3 的性能与 ChatGPT-4o、Claude 3.5 Sonnet 和 Gemini Advanced 相当，考虑到其远低的训练成本，这一点尤其令人印象深刻。
- en: '![Performance comparison (image by author)](../Images/17d245735caa67aca6b8d9ee25955a20.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![性能比较（图片由作者提供）](../Images/17d245735caa67aca6b8d9ee25955a20.png)'
- en: Performance comparison (image by author)
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 性能比较（图片由作者提供）
- en: '**DeepSeek excels in coding but misses the key functionality of executing Python
    code and displaying visualizations directly in the UI.** This is very similar
    to my observation of Claude 3.5 Sonnet back in Aug last year when it was also
    missing the interactive visualization function. However, Claude has since then
    added the [analysis tool function](https://www.anthropic.com/news/analysis-tool)
    (though via JavaScript and React, instead of Python), overcoming its previous
    drawback. DeepSeek might follow the trend and add that feature as well.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**DeepSeek 在编码方面表现优异，但缺少执行 Python 代码和在 UI 中直接显示可视化的关键功能**。这与我去年 8 月对 Claude
    3.5 Sonnet 的观察非常相似，当时它也缺少交互式可视化功能。然而，Claude 自那时起已经增加了[分析工具功能](https://www.anthropic.com/news/analysis-tool)（尽管是通过
    JavaScript 和 React，而不是 Python），克服了之前的缺点。DeepSeek 可能会跟随这一趋势并添加该功能。'
- en: '**Its server seems less reliable than the other tools right now** – it feels
    like the early-version ChatGPT when ChatGPT was first launched. The limitation
    of uploading files could pose a challenge to using the chatbot meaningfully in
    data science workflows.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它的服务器似乎比其他工具不太可靠**——感觉就像 ChatGPT 初次推出时的早期版本。上传文件的限制可能会对在数据科学工作流程中有意义地使用聊天机器人构成挑战。'
- en: However, its **free chatbot access and more affordable API costs** give it a
    significant competitive edge, particularly for users in China and for small businesses
    worldwide. It could democratize access to advanced AI tools, enabling smaller
    companies and individual developers to leverage powerful models at a much lower
    cost.
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然而，其**免费聊天机器人访问和更低的 API 成本**给它带来了显著的竞争优势，尤其是在中国用户和全球小型企业中。它可能使高级 AI 工具的访问民主化，使小型公司和独立开发者能够以更低的成本利用强大的模型。
- en: '**DeepSeek’s rise will for sure incentivize more AI innovations globally**,
    both from AI giants like OpenAI and Anthropic and from smaller AI startups. Super
    excited to see how this space will evolve in the coming year!'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**DeepSeek 的崛起无疑将激励全球更多的 AI 创新**，无论是来自 OpenAI 和 Anthropic 这样的 AI 巨头，还是来自较小的
    AI 创业公司。非常期待看到这个领域在未来一年中的发展变化！'
