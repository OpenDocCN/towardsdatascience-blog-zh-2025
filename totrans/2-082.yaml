- en: Introduction to ARC AGI
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ARC AGI is essentially a puzzle game of pattern matching.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '[ARC AGI 1](https://arcprize.org/arc-agi/1/): You are given a series of input-output
    pairs, and have to complete the pattern'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[ARC AGI 2:](https://arcprize.org/arc-agi/2/) Similar to the first benchmark,
    performing pattern matching on input and output examples'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[ARC AGI 3:](https://arcprize.org/arc-agi/3/) Here you are playing a game,
    where you have to move your block into the goal area, but some required steps
    in between'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'I think it’s cool to test out these puzzle games and complete them myself.
    Then, you can see LLMs initially struggle with the benchmarks, and then increase
    their performance with better models. OpenAI, for example, scored:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: 7.8% with o1 mini
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 75% with o3-low
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 88% with o3-high
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'As you can also see in the image below:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/34d7cfac16a73a150603f2bf24359806.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
- en: This figure shows the performance of different OpenAI models on the ARC AGI
    1 benchmark. You can see how performance increases with more advanced models.
    Image from [ARC AGI](https://arcprize.org/blog/oai-o3-pub-breakthrough), which
    is under the Apache 2 license.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Playing the ARC AGI benchmark
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can also try the ARC AGI benchmarks yourself or build an AI to perform the
    tasks. Go to the [ARC AGI 3 website](https://arcprize.org/arc-agi/3/) and start
    playing the game.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: The whole point of the games is that you have no instructions, and you have
    to figure out the rules yourself. I enjoy this concept, as it represents figuring
    out an entirely new problem, without any help. This highlights your ability to
    learn new environments, adapt to them, and solve problems.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: You can see [a recording of me playing ARC AGI 3 here](https://www.loom.com/share/2775454e135b4691a54401899fb6fb45?sid=e9bf6e46-dead-455a-9875-0d6e8c403a6b),
    encountering the problems for the first time. I was unfortunately unable to embed
    the link in the article. However, it was super interesting to test out the benchmark
    and imagine the challenge an LLM has to go through to solve it. I first observe
    the environment, and what happens when I perform the different actions. An action
    in this case is pressing one of the relevant buttons. Some actions do nothing,
    while others affect the environment. I then proceed to uncover the goal of the
    puzzle (for example, get the object to the goal area) and try to achieve this
    goal.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Why frontier models achieve 0%
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[This article](https://deepnewz.com/ai-modeling/arc-unveils-arc-agi-3-benchmark-frontier-ai-scores-0-87da4414?)
    states that when frontier models were tested on the ARC AGI 3 preview, they achieved
    0%. This might sound disappointing to some people, considering you were probably
    able to successfully complete a lot of the tasks yourself, relatively quickly.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: As I previously discussed, several OpenAI models have had success with the earlier
    ARC AGI benchmarks, with their best model achieving 88% on the first version.
    However, initially, models achieved 0%, or in the low single-digit percentages.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: 'I have a few theories for why frontier models were not able to perform tasks
    on ARC AGI 3:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Context length
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When working on ARC AGI 3, you do not get any information about the game. The
    model thus has to try out a variety of actions, see the output of those actions
    (for example, nothing happens, or a block moves, etc). The model then has to evaluate
    the actions it took, along with the output, and consider its next moves.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: I believe the action space on ARC AGI 3 is very large, and it’s thus difficult
    for the models to both experiment enough to find the correct action and avoid
    repeating unsuccessful actions. The models essentially have a problem with their
    context length and utilizing the full length of it.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: I recently read an interesting article from Manus about how they develop their
    agents and manage their memory. You can use techniques such as summarizing previous
    context or using a file system to store important context. I believe this will
    be key to increasing performance on the ARC AGI 3 benchmark.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Training dataset
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another primary reason frontier models are unable to complete ARC AGI 3 tasks
    successfully is that the tasks are very different from their training dataset.
    LLMs will almost always perform way better on a task if such a task (or a similar
    one) is included in the training dataset. In this instance, I believe LLMs have
    little training data on working with games, for example. Furthermore, an important
    point here is also the agentic training data for the LLMs.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: With agentic training data, I mean data where the LLM is utilizing tools and
    performing actions. I believe we are seeing a rapid increase in LLMs used as agents,
    and thus, the proportional amount of training data for agentic behavior is rapidly
    increasing. However, it might be that current frontier models still are not as
    good at performing such actions, though it will likely increase rapidly in the
    coming months.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: 'Some people will highlight how this proves LLMs do not have real intelligence:
    The whole point of intelligence (and the ARC AGI benchmark) is to be able to understand
    tasks without any clues, only by examining the environment. To some extent, I
    agree with this point, and I hope to see models perform better on ARC AGI because
    of increased model intelligence, and not because of benchmark chasing, a concept
    I explore later in this article.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Benchmark performance in the future
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the future, I believe we will see vast improvements in model performance
    on ARC AGI 3\. Mostly because I think you can create AI agents that are fine-tuned
    for agentic performance, and that optimally utilize their memory. I believe relatively
    cheap improvements can be used to vastly improve performance, though I also expect
    more expensive improvements (for example, the release of GPT-5) will perform well
    on this benchmark.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: Benchmark chasing
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I think it’s important to leave a section about benchmark chasing. Benchmark
    chasing is the concept of LLM providers chasing optimal scores on benchmarks,
    rather than simply creating the best or most intelligent LLMs. This is a problem
    because the correlation between benchmark performance and LLM intelligence is
    not 100%.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为留一个关于基准追逐的部分是很重要的。基准追逐是LLM提供商在基准上追逐最优分数的概念，而不仅仅是创建最好的或最智能的LLMs。这是一个问题，因为基准性能和LLM智能之间的相关性不是100%。
- en: In the reinforcement learning world, benchmark chasing would be referred to
    as reward hacking. A scenario where the agent figures out a way to hack the environment
    they’re in to achieve a reward, without properly performing a task.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在强化学习领域，基准追逐被称为奖励黑客。一个场景是，智能体找到了一种方法来黑客他们所在的环境以获得奖励，而没有正确完成任务。
- en: 'The reason LLM providers do this is that whenever a new model is released,
    people usually look at two things:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: LLM提供商这样做的原因是，每当发布一个新的模型时，人们通常会关注两件事：
- en: Benchmark performance
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基准性能
- en: Vibe
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Vibe
- en: Benchmark performance is usually measured on known benchmarks, such as SWE-bench
    and ARC AGI. Vibe testing is also a way LLMs are often measured by the public
    (I’m not saying it’s a good way of testing the model, I’m simply saying it happens
    in practice). The problem with this, however, is that I believe it’s quite simple
    to impress people with the vibe of a model, because vibe checking tries some very
    small percentage of the action space for the LLM. You may only be asking it certain
    questions which are available on the web, or asking it to program an application
    which the model has already seen 1000 instances of in its training data.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 基准性能通常在已知的基准上进行衡量，例如SWE-bench和ARC AGI。Vibe测试也是公众衡量LLM的常用方法（我并不是说这是一种测试模型的好方法，我只是在说在实践中确实如此）。然而，这个问题在于，我相信用模型的Vibe来给人留下深刻印象是非常简单的，因为Vibe检查只尝试了LLM动作空间的一小部分。你可能只问它一些在网络上可找到的问题，或者要求它编写一个模型在训练数据中已经看到过1000个实例的应用程序。
- en: Thus, what you should do is to have a benchmark on your own, for example, an
    in-house dataset that has not been leaked to the internet. Then you can benchmark
    which LLM works best for your use case and prioritize using this LLM.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你应该做的是为自己设定一个基准，例如，一个尚未泄露到互联网的内部数据集。然后你可以基准测试哪种LLM最适合你的用例，并优先使用这个LLM。
- en: Conclusion
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I have discussed LLM benchmarks and why they are important
    for comparing LLMs. I have introduced you to the newly released ARC AGI 3 benchmark.
    This benchmark is super interesting considering humans are easily able to complete
    some of the tasks, while frontier models score 0%. This thus represents a task
    where human intelligence still outperforms LLMs.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了LLM基准及其为什么对于比较LLMs很重要。我向您介绍了新发布的ARC AGI 3基准。考虑到人类能够轻松完成一些任务，而前沿模型得分为0%，这个基准非常有趣。这因此代表了一个人类智能仍然优于LLMs的任务。
- en: As we advance, I believe we will see rapid improvements in LLM performance on
    ARC AGI 3, though I hope this will not be the result of benchmark chasing, but
    rather the intelligence improvement of LLMs.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们不断进步，我相信我们将在ARC AGI 3上看到LLM性能的快速提升，尽管我希望这不会是基准追逐的结果，而是LLM智能提升的结果。
