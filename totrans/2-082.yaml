- en: How to Benchmark LLMs – ARC AGI 3
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/](https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753891543743" class="mdspan-comment">In</mdspan> the last
    few weeks, we have seen the release of powerful LLMs such as Qwen 3 MoE, Kimi
    K2, and Grok 4\. We will continue seeing such rapid improvements in the foreseeable
    future, and to compare the LLMs against each other, we require benchmarks. In
    this article, I discuss the newly released ARC AGI 3 benchmark and why frontier
    LLMs struggle to complete any tasks on the benchmark.
  prefs: []
  type: TYPE_NORMAL
- en: Motivation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Today, we're announcing a preview of ARC-AGI-3, the Interactive Reasoning Benchmark
    with the widest gap between easy for humans and hard for AI
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'We’re releasing:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* 3 games (environments)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* $10K agent contest'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* AI agents API'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Starting scores – Frontier AI: 0%, Humans: 100% [pic.twitter.com/3YY6jV2RdY](https://t.co/3YY6jV2RdY)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — ARC Prize (@arcprize) [July 18, 2025](https://twitter.com/arcprize/status/1946260363256996244?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ARC AGI 3 was recently released.
  prefs: []
  type: TYPE_NORMAL
- en: My motivation for writing this article is to stay on top of the latest developments
    in LLM technology. Only in the last couple of weeks have we seen the [Kimi K2](https://moonshotai.github.io/Kimi-K2/) model
    (best open-source model when released), [Qwen 3 235B-A22B](https://huggingface.co/Qwen/Qwen3-235B-A22B) (currently
    best open-source model), [Grok 4](https://x.ai/news/grok-4), and so on. There
    is so much happening in the LLM space, and one way to keep up is to track the
    benchmarks.
  prefs: []
  type: TYPE_NORMAL
- en: I think the ARC AGI benchmark is particularly interesting, mainly because I
    want to see if LLMs can match human-level intelligence. ARC AGI puzzles are made
    so that humans are able to complete them, but LLMs will struggle.
  prefs: []
  type: TYPE_NORMAL
- en: You can also read my article[ on Utilizing Context Engineering to Significantly
    Enhance LLM Performance](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/) and
    check out [my website, which contains all my information and articles.](https://eivindkjosbakken.com/)
  prefs: []
  type: TYPE_NORMAL
