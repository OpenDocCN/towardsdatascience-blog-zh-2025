  type: TYPE_NORMAL
- en: 'We’re releasing:'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* 3 games (environments)'
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* $10K agent contest'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* AI agents API'
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
