- en: ARC AGI 3 was recently released.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: My motivation for writing this article is to stay on top of the latest developments
    in LLM technology. Only in the last couple of weeks have we seen the [Kimi K2](https://moonshotai.github.io/Kimi-K2/) model
    (best open-source model when released), [Qwen 3 235B-A22B](https://huggingface.co/Qwen/Qwen3-235B-A22B) (currently
    best open-source model), [Grok 4](https://x.ai/news/grok-4), and so on. There
    is so much happening in the LLM space, and one way to keep up is to track the
    benchmarks.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: I think the ARC AGI benchmark is particularly interesting, mainly because I
    want to see if LLMs can match human-level intelligence. ARC AGI puzzles are made
    so that humans are able to complete them, but LLMs will struggle.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: You can also read my article[ on Utilizing Context Engineering to Significantly
    Enhance LLM Performance](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/) and
    check out [my website, which contains all my information and articles.](https://eivindkjosbakken.com/)
