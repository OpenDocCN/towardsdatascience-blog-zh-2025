- en: <mdspan datatext="el1745277359193" class="mdspan-comment">If you’re also</mdspan>
    a hiring manager passionate about designing meaningful interviews, let’s connect
    on LinkedIn ([https://www.linkedin.com/in/hanqi91/](https://www.linkedin.com/in/hanqi91/)).
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745277359193" class="mdspan-comment">如果你也是</mdspan>一个热衷于设计有意义的面试的招聘经理，让我们在LinkedIn上建立联系([https://www.linkedin.com/in/hanqi91/](https://www.linkedin.com/in/hanqi91/))。
- en: I’d be happy to share more about the exercises I prepared.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我很乐意分享我准备的更多练习。
