  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: '(1) James, G.; Witten, D.; Hastie, T.; Tibshirani, R. *An Introduction to Statistical
    Learning*; Springer US: New York, NY, 2021\. https://doi.org/10.1007/978-1-0716-1418-1.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '(1) James, G.; Witten, D.; Hastie, T.; Tibshirani, R. *An Introduction to Statistical
    Learning*; Springer US: New York, NY, 2021\. https://doi.org/10.1007/978-1-0716-1418-1.'
- en: '(2) Hastie, T.; Tibshirani, R.; Friedman, J. *The Elements of Statistical Learning*;
