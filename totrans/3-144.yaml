- en: Uncertainty Quantification in Machine Learning with an Easy Python Interface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 带有简单Python界面的机器学习中的不确定性量化
- en: 原文：[https://towardsdatascience.com/uncertainty-quantification-in-machine-learning-with-an-easy-python-interface/](https://towardsdatascience.com/uncertainty-quantification-in-machine-learning-with-an-easy-python-interface/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/uncertainty-quantification-in-machine-learning-with-an-easy-python-interface/](https://towardsdatascience.com/uncertainty-quantification-in-machine-learning-with-an-easy-python-interface/)
- en: <mdspan datatext="el1743016348252" class="mdspan-comment">Uncertainty quantification</mdspan>
    (UQ) in a machine learning (ML) model allows one to estimate the precision of
    its predictions. This is extremely important for utilizing its predictions in
    real-world tasks. For instance, if a machine learning model is trained to predict
    a property of a material, a predicted value with a 20% uncertainty (error) is
    likely to be used very differently from a predicted value with a 5% uncertainty
    (error) in the overall decision-making process. Despite its importance, UQ capabilities
    aren’t available with popular ML software in Python, such as scikit-learn, Tensorflow,
    and Pytorch.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1743016348252" class="mdspan-comment">不确定性量化</mdspan>（UQ）在机器学习（ML）模型中允许估计其预测的精度。这对于在现实世界任务中使用其预测至关重要。例如，如果一个机器学习模型被训练来预测材料的属性，一个预测值有20%的不确定性（误差），在整体决策过程中可能被非常不同于一个预测值有5%的不确定性（误差）。尽管其重要性不言而喻，但在Python中流行的机器学习软件，如scikit-learn、Tensorflow和Pytorch，并没有提供不确定性量化功能。
- en: 'Enter ML Uncertainty: a Python package designed to address this problem. Built
    on top of popular Python libraries such as SciPy and scikit-learn, ML Uncertainty
    provides a very intuitive interface to estimate uncertainties in ML predictions
    and, where possible, model parameters. Requiring only about four lines of code
    to perform these estimations, the package leverages powerful and theoretically
    rigorous mathematical methods in the background. It exploits the underlying statistical
    properties of the ML model in question, making the package computationally inexpensive.
    Moreover, this approach extends its applicability to real-world use cases where
    often, only small amounts of data are available.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 介绍ML Uncertainty：一个旨在解决此问题的Python包。它建立在流行的Python库之上，如SciPy和scikit-learn，ML Uncertainty提供了一个非常直观的界面来估计机器学习预测中的不确定性，以及在可能的情况下，模型参数。执行这些估计只需要大约四行代码，该包在后台利用了强大的、理论严谨的数学方法。它利用了所讨论的机器学习模型的潜在统计特性，使得该包在计算上成本低廉。此外，这种方法扩展了其实际应用范围，适用于那些通常只有少量数据可用的情况。
- en: Motivation
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机
- en: I have been an avid Python user for the last 10 years. I love the large number
    of powerful libraries that have been created and maintained, and the community,
    which is very active. The idea for ML Uncertainty came to me when I was working
    on a hybrid ML problem. I had built an ML model to predict stress-strain curves
    of some polymers. Stress-strain curves–an important property of polymers–obey
    certain physics-based rules; for instance, they have a linear region at low strain
    values, and the tensile modulus decreases with temperature.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我过去10年一直是一个狂热的Python用户。我喜欢大量创建和维护的强大库，以及非常活跃的社区。当我正在处理一个混合机器学习问题时，我产生了ML Uncertainty的想法。我构建了一个机器学习模型来预测某些聚合物的应力-应变曲线。应力-应变曲线——聚合物的关键属性——遵循某些基于物理的规则；例如，在低应变值时，它们有一个线性区域，而拉伸模量随温度降低而减小。
- en: 'I found from literature some non-linear models to describe the curves and these
    behaviors, thereby reducing the stress-strain curves to a set of parameters, each
    with some physical meaning. Then, I trained an ML model to predict these parameters
    from some easily measurable polymer attributes. Notably, I only had a few hundred
    data points, as is quite common in scientific applications. Having trained the
    model, finetuned the hyperparameters, and performed the outlier analysis, one
    of the stakeholders asked me: “This is all good, but what are the error estimates
    on your predictions?” And I realized that there wasn’t an elegant way to estimate
    this with Python. I also realized that this wasn’t going to be the last time that
    this problem was going to arise. And that led me down the path that culminated
    in this package.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我从文献中找到了一些非线性模型来描述曲线和这些行为，从而将应力-应变曲线简化为一组具有物理意义的参数。然后，我训练了一个机器学习模型来预测这些参数，这些参数可以从一些容易测量的聚合物属性中得出。值得注意的是，我只有几百个数据点，这在科学应用中相当常见。在训练了模型、微调了超参数并进行了异常值分析后，一位利益相关者问我：“这些都很好，但你的预测误差估计是多少？”我意识到用Python没有优雅的方式来估计这个。我也意识到这不会是这个问题最后一次出现。这让我走上了最终导致这个包诞生的道路。
- en: Having spent some time studying statistics, I suspected that the math for this
    wasn’t impossible or even that hard. I began researching and reading up books
    like *Introduction to Statistical Learning* and *Elements of Statistical Learning*^(1,2)
    and found some answers there. ML Uncertainty is my attempt at implementing some
    of those methods in Python to integrate statistics more tightly into machine learning.
    I believe that the future of machine learning depends on our ability to increase
    the reliability of predictions and the interpretability of models, and this is
    a small step towards that goal. Having developed this package, I have frequently
    used it in my work, and it has benefited me greatly.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在花了一些时间学习统计学之后，我怀疑这个数学问题并非不可能或特别困难。我开始研究并阅读了像《统计学习引论》和《统计学习元素》这样的书籍（1,2），并在那里找到了一些答案。机器学习不确定性是我尝试将这些方法实现为Python代码，以更紧密地将统计学整合到机器学习中的尝试。我相信机器学习的未来取决于我们提高预测可靠性和模型可解释性的能力，这是朝着这个目标迈出的一小步。在开发了这个包之后，我经常在我的工作中使用它，它对我帮助很大。
- en: This is an introduction to ML Uncertainty with an overview of the theories underpinning
    it. I have included some equations to explain the theory, but if those are overwhelming,
    feel free to gloss over them. For every equation, I have stated the key idea it
    represents.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对机器学习不确定性的介绍，概述了其背后的理论。我包含了一些方程式来解释理论，但如果这些方程式让你感到困惑，你可以自由地略过它们。对于每一个方程式，我都说明了它所代表的关键思想。
- en: 'Getting started: An example'
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始使用：一个示例
- en: We often learn best by doing. So, before diving deeper, let’s consider an example.
    Say we are working on a good old-fashioned linear regression problem where the
    model is trained with scikit-learn. We think that the model has been trained well,
    but we want more information. For instance, what are the prediction intervals
    for the outputs? With ML Uncertainty, this can be done in 4 lines as shown below
    and discussed in this [example](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/linear_regression.ipynb).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通常通过实践学习得最好。所以，在深入之前，让我们考虑一个例子。比如说，我们正在处理一个传统的线性回归问题，其中模型是用scikit-learn训练的。我们认为模型已经训练得很好，但我们想要更多信息。例如，输出的预测区间是什么？使用机器学习不确定性，这可以在以下4行中完成，如下所示，并在本例中讨论：[https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/linear_regression.ipynb](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/linear_regression.ipynb)。
- en: '![](../Images/fbaef7a3b863e52094ac1041f8b28b7f.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fbaef7a3b863e52094ac1041f8b28b7f.png)'
- en: Illustrating ML uncertainty code (a) and plot (b) for linear regression. Image
    by author.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 展示机器学习不确定性代码（a）和线性回归的图（b）。图片由作者提供。
- en: 'All examples for this package can be found here: [https://github.com/architdatar/ml_uncertainty/tree/main/examples](https://github.com/architdatar/ml_uncertainty/tree/main/examples).'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本包的所有示例都可以在这里找到：[https://github.com/architdatar/ml_uncertainty/tree/main/examples](https://github.com/architdatar/ml_uncertainty/tree/main/examples)。
- en: 'Delving deeper: A peek under the hood'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深入探讨：揭开面纱
- en: ML Uncertainty performs these computations by having the ParametricModelInference
    class wrap around the LinearRegression estimator from scikit-learn to extract
    all the information it needs to perform the uncertainty calculations. It follows
    the standard procedure for uncertainty estimation, which is detailed in many a
    statistics textbook,² of which an overview is shown below.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: ML Uncertainty 通过让 ParametricModelInference 类围绕 scikit-learn 中的 LinearRegression
    估计器进行包装，以提取进行不确定性计算所需的所有信息来执行这些计算。它遵循不确定性估计的标准程序，这在许多统计学教科书中都有详细说明，²以下是一个概述。
- en: Since this is a linear model that can be expressed in terms of parameters (\(
    \beta \)) as \( y = X\beta \), ML Uncertainty first computes the degrees of freedom
    for the model (\( p \)), the error degrees of freedom (\( n – p – 1 \)), and the
    residual sum of squares (\( \hat{\sigma}^2 \)). Then, it computes the uncertainty
    in the model parameters; i.e., the variance-covariance matrix.³
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这是一个可以用参数（\( \beta \)）表示为 \( y = X\beta \) 的线性模型，ML Uncertainty 首先计算模型的自由度（\(
    p \)）、误差自由度（\( n – p – 1 \)）和残差平方和（\( \hat{\sigma}^2 \)）。然后，它计算模型参数的不确定性；即方差-协方差矩阵。³
- en: \( \text{Var}(\hat{\beta}) = \hat{\sigma}^2 (J^T J)^{-1} \)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: \( \text{Var}(\hat{\beta}) = \hat{\sigma}^2 (J^T J)^{-1} \)
- en: 'Where \( J \) is the Jacobian matrix for the parameters. For linear regression,
    this translates to:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 \( J \) 是参数的雅可比矩阵。对于线性回归，这可以转化为：
- en: \( \text{Var}(\hat{\beta}) = \hat{\sigma}^2 (X^T X)^{-1} \)
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: \( \text{Var}(\hat{\beta}) = \hat{\sigma}^2 (X^T X)^{-1} \)
- en: 'Finally, the *get_intervals* function computes the prediction intervals by
    propagating the uncertainties in both inputs as well as the parameters. Thus,
    for data \( X^* \) where predictions and uncertainties are to be estimated, predictions
    \( \hat{y^*} \) along with the \( (1 – \alpha) \times 100\% \) prediction interval
    are:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，*get_intervals* 函数通过传播输入和参数中的不确定性来计算预测区间。因此，对于预测和不确定性需要估计的数据 \( X^* \)，预测
    \( \hat{y^*} \) 以及 \( (1 – \alpha) \times 100\% \) 的预测区间为：
- en: \( \hat{y^*} \pm t_{1 – \alpha/2, n – p – 1} \, \hat{\sigma} \sqrt{\text{Var}(\hat{y^*})}
    \)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: \( \hat{y^*} \pm t_{1 – \alpha/2, n – p – 1} \, \hat{\sigma} \sqrt{\text{Var}(\hat{y^*})}
    \)
- en: Where,
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 假设，
- en: \( \text{Var}(\hat{y^*}) = (\nabla_X f)(\delta X^*)^2(\nabla_X f)^T + (\nabla_\beta
    f)(\delta \hat{\beta})^2(\nabla_\beta f)^T + \hat{\sigma}^2 \)
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: \( \text{Var}(\hat{y^*}) = (\nabla_X f)(\delta X^*)^2(\nabla_X f)^T + (\nabla_\beta
    f)(\delta \hat{\beta})^2(\nabla_\beta f)^T + \hat{\sigma}^2 \)
- en: 'In English, this means that the uncertainty in the output depends on the uncertainty
    in the inputs, uncertainty in the parameters, and the residual uncertainty. Simplified
    for a multiple linear model and assuming no uncertainty in inputs, this translates
    to:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 用英语来说，这意味着输出中的不确定性取决于输入的不确定性、参数的不确定性以及残差不确定性。对于多线性模型进行简化，并假设输入没有不确定性，这可以转化为：
- en: \( \text{Var}(\hat{y^*}) = \hat{\sigma}^2 \left(1 + X^* (X^T X)^{-1} X^{*T}
    \right) \)
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: \( \text{Var}(\hat{y^*}) = \hat{\sigma}^2 \left(1 + X^* (X^T X)^{-1} X^{*T}
    \right) \)
- en: Extensions to linear regression
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 线性回归的扩展
- en: 'So, this is what goes on under the hood when those four lines of code are executed
    for linear regression. But this isn’t all. ML Uncertainty comes equipped with
    two more powerful capabilities:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当执行线性回归的这四行代码时，幕后发生的就是这些操作。但这并非全部。ML Uncertainty 还配备了两个更强大的功能：
- en: '**Regularization:** ML Uncertainty supports L1, L2, and L1+L2 regularization.
    Combined with linear regression, this means that it can cater to LASSO, ridge,
    and elastic net regressions. Check out this [example](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/parametric_model.ipynb).'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**正则化：** ML Uncertainty 支持L1、L2和L1+L2正则化。结合线性回归，这意味着它可以满足LASSO、岭回归和弹性网络回归的需求。查看这个[示例](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/parametric_model.ipynb)。'
- en: '**Weighted least squares regression:** Sometimes, not all observations are
    equal. We might want to give more weight to some observations and less weight
    to others. Commonly, this happens in science when some observations have a high
    amount of uncertainty while some are more precise. We want our regression to reflect
    the more precise ones, but cannot fully discard the ones with high uncertainty.
    For such cases, the weighted least squares regression is used.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**加权最小二乘回归：** 有时，并非所有观测值都是相等的。我们可能希望给某些观测值赋予更高的权重，而给其他观测值赋予较低的权重。在科学研究中，这种情况通常发生在某些观测值具有很高的不确定性，而某些观测值则更为精确时。我们希望回归模型能够反映更精确的观测值，但又不希望完全丢弃具有高不确定性的观测值。在这种情况下，使用加权最小二乘回归。'
- en: Most importantly, a key assumption of linear regression is something known as
    *homoscedasticity;* i.e., that the samples of the response variables are drawn
    from populations with similar variances. If this is not the case, it is handled
    by assigning weights to responses depending on the inverse of their variance.
    This can be easily handled in ML Uncertainty by simply specifying the sample weights
    to be used during training in the *y_train_weights* parameter of the *ParametricModelInference*
    class, and the rest will be handled. An application of this is shown in this [example](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/weighted_non_linear_regression_arrhenius.ipynb),
    albeit for a nonlinear regression case.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 最重要的是，线性回归的一个关键假设是所谓的*同方差性*；即，响应变量的样本是从具有相似方差的总体中抽取的。如果情况不是这样，可以通过根据它们的方差倒数分配权重来处理。在ML
    Uncertainty中，可以通过简单地指定在*ParametricModelInference*类的*y_train_weights*参数中使用的样本权重来轻松处理，其余的将由系统处理。这一应用在[示例](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/weighted_non_linear_regression_arrhenius.ipynb)中展示，尽管是针对非线性回归案例。
- en: Basis expansions
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基础展开
- en: I am always fascinated by how much ML we can get done by just doing linear regression
    properly. Many kinds of data such as trends, time series, audio, and images, can
    be represented by basis expansions. These representations behave like linear models
    with many amazing properties. ML Uncertainty can be used to compute uncertainties
    for these models easily. Check out these examples called [*spline_synthetic_data*](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/spline_synthetic_data.ipynb),
    [*spline_wage_data*](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/spline_wage_data.ipynb),
    and [*fourier_basis*](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/fourier_basis.ipynb).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我总是对仅通过正确进行线性回归就能完成多少机器学习任务感到着迷。许多类型的数据，如趋势、时间序列、音频和图像，都可以通过基展开来表示。这些表示具有类似线性模型的行为，并具有许多惊人的特性。ML
    Uncertainty可以轻松计算这些模型的误差。请查看这些名为[*spline_synthetic_data*](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/spline_synthetic_data.ipynb)、[*spline_wage_data*](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/spline_wage_data.ipynb)和[*fourier_basis*](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/fourier_basis.ipynb)的示例。
- en: '![](../Images/4d511bdf593bba30df80f5c1ddd024ca.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4d511bdf593bba30df80f5c1ddd024ca.png)'
- en: Results of ML Uncertainty used for weighted least squares regression, B-Spline
    basis with synthetic data, B-Spline basis with wage data, and Fourier basis. Image
    by author.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ML Uncertainty进行加权最小二乘回归的结果，包括使用合成数据的B-Spline基、使用工资数据的B-Spline基和傅里叶基。图片由作者提供。
- en: Beyond linear regression
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超越线性回归
- en: We often encounter situations where the underlying model cannot be expressed
    as a linear model. This commonly occurs in science, for instance, when complex
    reaction kinetics, transport phenomena, process control problems, are modeled.
    Standard Python packages like scikit-learn, etc., don’t allow one to directly
    fit these non-linear models and perform uncertainty estimation on them. ML Uncertainty
    ships with a class called *NonLinearRegression* capable of handling non-linear
    models. The user can specify the model to be fit and the class handles fitting
    with a scikit-learn-like interface which uses a SciPy *least_squares* function
    in the background. This can be easily integrated with the *ParametericModelInference*
    class for seamless uncertainty estimation. Like linear regression, we can handle
    weighted least squares and regularization for non-linear regression. Here is an
    [example](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/weighted_non_linear_regression_arrhenius.ipynb).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们经常遇到无法将底层模型表示为线性模型的情况。这在科学领域很常见，例如，在复杂反应动力学、传输现象、过程控制问题建模时。标准的Python包，如scikit-learn等，不允许直接拟合这些非线性模型并对它们进行不确定性估计。ML
    Uncertainty附带一个名为*NonLinearRegression*的类，能够处理非线性模型。用户可以指定要拟合的模型，该类通过使用类似scikit-learn的接口进行拟合，在后台使用SciPy
    *least_squares* 函数。这可以轻松地与*ParametericModelInference*类集成，以实现无缝的不确定性估计。与线性回归一样，我们可以处理加权最小二乘法和正则化以用于非线性回归。以下是一个[示例](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/weighted_non_linear_regression_arrhenius.ipynb)。
- en: Random Forests
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 随机森林
- en: Random Forests have gained significant popularity in the field. They operate
    by averaging the predictions of decision trees. Decision trees, in turn, identify
    a set of rules to divide the predictor variable space (input space) and assign
    a response value to each terminal node (leaf). The predictions from decision trees
    are averaged to provide a prediction for the random forest.¹ They are particularly
    useful because they can identify complex relationships in data, are accurate,
    and make fewer assumptions about the data than regressions do.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 随机森林在领域内获得了显著的流行。它们通过平均决策树的预测来操作。决策树反过来识别一组规则来划分预测变量空间（输入空间），并为每个终端节点（叶子）分配一个响应值。决策树的预测被平均以提供随机森林的预测。¹
    它们特别有用，因为它们可以识别数据中的复杂关系，准确，并且比回归对数据的假设要少。
- en: While it is implemented in popular ML libraries like scikit-learn, there is
    no straightforward way to estimate prediction intervals. This is particularly
    important for regression as random forests, given their high flexibility, tend
    to overfit their training data. Since random forests doesn’t have parameters like
    traditional regression models do, uncertainty quantification needs to be performed
    differently.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然它在流行的ML库如scikit-learn中得到了实现，但没有直接的方法来估计预测区间。这对于回归尤为重要，因为随机森林由于其高度的灵活性，往往会对训练数据进行过度拟合。由于随机森林没有像传统回归模型那样的参数，不确定性量化需要以不同的方式进行。
- en: 'We use the basic idea of estimating prediction intervals using bootstrapping
    as described by Hastie et al. in Chapter 7 of their book *Elements of Statistical
    Learning*.² The central idea we can exploit is that the variance of the predictions
    \( S(Z) \) for some data \( Z \) can be estimated via predictions of its bootstrap
    samples as follows:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用Hastie等人在其书《统计学习的元素》第7章中描述的通过自助法估计预测区间的基本思想。我们可以利用的核心思想是，对于某些数据 \( Z \)
    的预测 \( S(Z) \) 的方差可以通过其自助样本的预测来估计，如下所示：
- en: \( \widehat{\text{Var}}[S(Z)] = \frac{1}{B – 1} \sum_{b=1}^{B} \left( S(Z^{*b})
    – \bar{S}^{*} \right)^2 \)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: \( \widehat{\text{Var}}[S(Z)] = \frac{1}{B – 1} \sum_{b=1}^{B} \left( S(Z^{*b})
    – \bar{S}^{*} \right)^2 \)
- en: Where \( \bar{S}^{*} = \sum_b S(Z^{*b}) / B \). Bootstrap samples are samples
    drawn from the original dataset repeatedly and independently, thereby allowing
    repetitions. Lucky for us, random forests are trained using one bootstrap sample
    for each decision tree within it. So, the prediction from each tree results in
    a distribution whose variance gives us the variance of the prediction. But there
    is still one problem. Let’s say we want to obtain the variance in prediction for
    the \( i^{\text{th}} \) training sample. If we simply use the formula above, some
    predictions will be from trees that include the \( i^{\text{th}} \) sample in
    the bootstrap sample on which they are trained. This could lead to an unrealistically
    smaller variance estimate.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 \( \bar{S}^{*} = \sum_b S(Z^{*b}) / B \)。自助样本是从原始数据集中反复独立抽取的样本，从而允许重复。幸运的是，随机森林使用每个决策树的一个自助样本进行训练。因此，每棵树的预测结果都会形成一个分布，其方差为我们提供了预测的方差。但仍然存在一个问题。假设我们想要获得第
    \( i^{\text{th}} \) 个训练样本的预测方差。如果我们简单地使用上述公式，一些预测将来自包含 \( i^{\text{th}} \) 个样本的自助样本的树。这可能导致不切实际的方差估计值较小。
- en: To solve this problem, the algorithm implemented in ML Uncertainty only considers
    predictions from trees which did not use the \( i^{\text{th}} \) sample for training.
    This results in an unbiased estimate of the variance.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，ML Uncertainty中实现的算法只考虑了没有使用 \( i^{\text{th}} \) 个样本进行训练的树的预测。这导致了一个无偏的方差估计值。
- en: The beautiful thing about this approach is that we don’t need any additional
    re-training steps. Instead, the *EnsembleModelInference* class elegantly wraps
    around the *RandomForestRegressor* estimator in scikit-learn and obtains all the
    necessary information from it.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的优点在于我们不需要任何额外的重新训练步骤。相反，*EnsembleModelInference* 类优雅地包装了scikit-learn中的
    *RandomForestRegressor* 估计器，并从中获取所有必要的信息。
- en: This method is benchmarked using the method described in Zhang et al.,⁴ which
    states that a correct \( (1 – \alpha) \times 100\% \) prediction interval is one
    for which the probability of it containing the observed response is \( (1 – \alpha)
    \times 100\% \). Mathematically,
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法使用张等人⁴所述的方法进行基准测试，该方法指出，一个正确的 \( (1 – \alpha) \times 100\% \) 预测区间是指其包含观察到的响应的概率为
    \( (1 – \alpha) \times 100\% \)。从数学上讲，
- en: \( P(Y \in I_{\alpha}) \approx 1 – \alpha \)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: \( P(Y \in I_{\alpha}) \approx 1 – \alpha \)
- en: Here is an [example](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/ensemble_model.ipynb)
    to see ML Uncertainty in action for random forest models.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个[示例](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/ensemble_model.ipynb)，展示了随机森林模型中机器学习不确定性的实际应用。
- en: Uncertainty propagation (Error propagation)
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不确定性传播（误差传播）
- en: How much does a certain amount of uncertainty in input variables and/or model
    parameters affect the uncertainty in the response variable? How does this uncertainty
    (epistemic) compare to the inherent uncertainty in the response variables (aleatoric
    uncertainty)? Often, it is important to answer these questions to decide on the
    course of action. For instance, if one finds that the uncertainty in model parameters
    contributes highly to the uncertainty in predictions, one could collect more data
    or investigate alternative models to reduce this uncertainty. Conversely, if the
    epistemic uncertainty is smaller than the aleatoric uncertainty, trying to reduce
    it further might be pointless. With ML uncertainty, these questions can be answered
    easily.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 输入变量和/或模型参数的不确定性对响应变量中的不确定性影响有多大？这种不确定性（认知不确定性）与响应变量内在的不确定性（随机不确定性）相比如何？通常，回答这些问题对于决定行动方针非常重要。例如，如果发现模型参数的不确定性对预测的不确定性贡献很大，那么可以收集更多数据或研究替代模型以减少这种不确定性。相反，如果认知不确定性小于随机不确定性，进一步减少它可能毫无意义。使用机器学习不确定性，这些问题可以轻松回答。
- en: 'Given a model relating the predictor variables to the response variable, the
    *ErrorPropagation* class can easily compute the uncertainty in responses. Say
    the responses (\( y \)) are related to the predictor variables (\( X \)) via some
    function (\( f \)) and some parameters (\( \beta \)), expressed as:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一个将预测变量与响应变量相关联的模型，*ErrorPropagation* 类可以轻松计算响应的不确定性。比如说，响应（\( y \)）通过某个函数（\(
    f \)）和某些参数（\( \beta \)）与预测变量（\( X \)）相关联，表示为：
- en: \( y = f(X, \beta) \).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: \( y = f(X, \beta) \).
- en: 'We wish to obtain prediction intervals for responses (\( \hat{y^*} \)) for
    some predictor data (\( X^* \)) with model parameters estimated as \( \hat{\beta}
    \). The uncertainty in \( X^* \) and \( \hat{\beta} \) are given by \( \delta
    X^* \) and \( \delta \hat{\beta} \), respectively. Then, the \( (1 – \alpha) \times
    100\% \) prediction interval of the response variables will be given as:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望获得一些预测数据（\( X^* \)）的响应（\( \hat{y^*} \)）的预测区间，其中模型参数估计为 \( \hat{\beta} \)。\(
    X^* \) 和 \( \hat{\beta} \) 的不确定性分别由 \( \delta X^* \) 和 \( \delta \hat{\beta} \)
    给出。然后，响应变量的 \( (1 – \alpha) \times 100\% \) 预测区间将给出如下：
- en: \( \hat{y^*} \pm t_{1 – \alpha/2, n – p – 1} \, \hat{\sigma} \sqrt{\text{Var}(\hat{y^*})}
    \)
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: \( \hat{y^*} \pm t_{1 – \alpha/2, n – p – 1} \, \hat{\sigma} \sqrt{\text{Var}(\hat{y^*})}
    \)
- en: Where,
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，
- en: \( \text{Var}(\hat{y^*}) = (\nabla_X f)(\delta X^*)^2(\nabla_X f)^T + (\nabla_\beta
    f)(\delta \hat{\beta})^2(\nabla_\beta f)^T + \hat{\sigma}^2 \)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: \( \text{Var}(\hat{y^*}) = (\nabla_X f)(\delta X^*)^2(\nabla_X f)^T + (\nabla_\beta
    f)(\delta \hat{\beta})^2(\nabla_\beta f)^T + \hat{\sigma}^2 \)
- en: The important thing here is to notice how the uncertainty in predictions includes
    contributions from the inputs, parameters, as well as the inherent uncertainty
    of the response.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这里重要的是要注意预测的不确定性包括了来自输入、参数以及响应内在不确定性的贡献。
- en: The ability of the ML Uncertainty package to propagate both input and parameter
    uncertainties makes it very handy, particularly in science, where we strongly
    care about the error (uncertainty) in each value being predicted. Consider the
    often talked about concept of hybrid machine learning. Here, we model known relationships
    in data through first principles and unknown ones using black-box models. Using
    ML Uncertainty, the uncertainties obtained from these different methods can be
    easily propagated through the computation graph.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习不确定性包能够传播输入和参数的不确定性，这使得它在科学领域非常实用，因为我们非常关注预测的每个值中的误差（不确定性）。考虑一下经常讨论的混合机器学习概念。在这里，我们通过第一性原理来建模数据中的已知关系，而未知关系则使用黑盒模型。使用机器学习不确定性，可以从这些不同方法中获得的不确定性轻松地通过计算图传播。
- en: A very simple example is that of the Arrhenius model for predicting reaction
    rate constants. The formula \( k = Ae^{-E_a / RT} \) is very well-known. Say,
    the parameters \( A, E_a \) were predicted from some ML model and have an uncertainty
    of 5%. We wish to know how much error that translates to in the reaction rate
    constant.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 一个非常简单的例子是阿伦尼乌斯模型，用于预测反应速率常数。公式 \( k = Ae^{-E_a / RT} \) 非常著名。比如说，参数 \( A, E_a
    \) 是从某个机器学习模型中预测出来的，并且具有 5% 的不确定性。我们想知道这种不确定性在反应速率常数中会转化为多少误差。
- en: This can be very easily accomplished with ML Uncertainty as shown in this [example](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/error_propagation.ipynb).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以通过使用ML Uncertainty轻松实现，如本[示例](https://github.com/architdatar/ml_uncertainty/blob/v0.1.1/examples/error_propagation.ipynb)所示。
- en: '![](../Images/2344f9b6441bc0311d4bf11ce6b286b2.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2344f9b6441bc0311d4bf11ce6b286b2.png)'
- en: Illustration of uncertainty propagation through computational graph. Image by
    author.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 通过计算图展示不确定性传播的示意图。图片由作者提供。
- en: Limitations
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 局限性
- en: 'As of v0.1.1, ML Uncertainty only works for ML models trained with scikit-learn.
    It supports the following ML models natively: random forest, linear regression,
    LASSO regression, ridge regression, elastic net, and regression splines. For any
    other models, the user can create the model, the residual, loss function, etc.,
    as shown for the non-linear regression example. The package has not been tested
    for neural networks, transformers, and other deep learning models.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 截至 v0.1.1 版本，ML Uncertainty 仅适用于使用 scikit-learn 训练的 ML 模型。它原生支持以下 ML 模型：随机森林、线性回归、LASSO
    回归、岭回归、弹性网络和回归样条。对于任何其他模型，用户可以创建模型、残差、损失函数等，如非线性回归示例所示。该包尚未针对神经网络、转换器和其他深度学习模型进行测试。
- en: Contributions from the open-source ML community are welcome and highly appreciated.
    While there is much to be done, some key areas of effort are adapting ML Uncertainty
    to other frameworks such as PyTorch and Tensorflow, adding support for other ML
    models, highlighting issues, and improving documentation.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎并高度赞赏开源 ML 社区的贡献。虽然还有很多工作要做，但一些关键的工作领域包括将 ML Uncertainty 适配到其他框架，如 PyTorch
    和 Tensorflow，增加对其他 ML 模型的支持，突出显示问题，并改进文档。
- en: Benchmarking
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基准测试
- en: The ML Uncertainty code has been benchmarked against the statsmodels package
    in Python. Specific cases can be found [here](https://github.com/architdatar/ml_uncertainty/tree/main/tests/benchmarking).
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: ML Uncertainty 代码已与 Python 的 statsmodels 包进行了基准测试。具体案例可以在[这里](https://github.com/architdatar/ml_uncertainty/tree/main/tests/benchmarking)找到。
- en: Background
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: Uncertainty quantification in machine learning has been studied in the ML community
    and there is growing interest in this field. However, as of now, the existing
    solutions are applicable to very specific use cases and have key limitations.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习中，不确定性量化已被 ML 社区研究，并且对该领域越来越感兴趣。然而，截至目前，现有的解决方案仅适用于非常特定的用例，并且存在关键的限制。
- en: For linear models, the statsmodels library can provide UQ capabilities. While
    theoretically rigorous, it cannot handle non-linear models. Moreover, the model
    needs to be expressed in a format specific to the package. This means that the
    user cannot take advantage of the powerful preprocessing, training, visualization,
    and other capabilities provided by ML packages like scikit-learn. While it can
    provide confidence intervals based on uncertainty in the model parameters, it
    cannot propagate uncertainty in predictor variables (input variables).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对于线性模型，statsmodels 库可以提供不确定性量化能力。虽然理论上严谨，但它无法处理非线性模型。此外，模型需要以包特定的格式表达。这意味着用户无法利用
    scikit-learn 等ML包提供的强大预处理、训练、可视化和其他功能。虽然它可以基于模型参数的不确定性提供置信区间，但它无法传播预测变量（输入变量）的不确定性。
- en: Another family of solutions is model-agnostic UQ. These solutions utilize subsamples
    of training data, train the model repeatedly based on it, and use these results
    to estimate prediction intervals. While sometimes useful in the limit of large
    data, these techniques may not provide accurate estimates for small training datasets
    where the samples chosen might lead to substantially different estimates. Moreover,
    it is a computationally expensive exercise since the model needs to be retrained
    multiple times. Some packages using this approach are MAPIE, PUNCC, UQPy, and
    ml_uncertainty by NIST (same name, different package), among many others.^(5–8)
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 另一类解决方案是模型无关的不确定性量化。这些解决方案利用训练数据的子样本，基于它反复训练模型，并使用这些结果来估计预测区间。虽然在大数据量的极限情况下有时是有用的，但这些技术在训练数据集较小的情况下可能无法提供准确的估计，因为选定的样本可能会导致显著不同的估计。此外，这是一个计算成本高昂的练习，因为模型需要多次重新训练。使用此方法的包包括
    MAPIE、PUNCC、UQPy 和 NIST 的 ml_uncertainty（同名，不同包）等，以及其他许多包。(5–8)
- en: With ML Uncertainty, the goals have been to keep the training of the model and
    its UQ separate, cater to more generic models beyond linear regression, exploit
    the underlying statistics of the models, and avoid retraining the model multiple
    times to make it computationally inexpensive.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ML Uncertainty，目标是保持模型训练及其不确定性量化（UQ）的分离，满足更多通用模型（超越线性回归），利用模型的潜在统计特性，并避免多次重新训练模型以降低计算成本。
- en: Summary and future work
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要和未来工作
- en: This was an introduction to ML Uncertainty—a Python software package to easily
    compute uncertainties in machine learning. The main features of this package have
    been introduced here and some of the philosophy of its development has been discussed.
    More detailed documentation and theory can be found in the [docs](https://github.com/architdatar/ml_uncertainty/tree/v0.1.1/docs/theory).
    While this is only a start, there is immense scope to expand this. Questions,
    discussions, and contributions are always welcome. The code can be found on [GitHub](https://github.com/architdatar/ml_uncertainty/tree/main)
    and the package can be installed from [PyPi](https://pypi.org/project/ml-uncertainty/).
    Give it a try with *pip install ml-uncertainty*.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对机器学习不确定性的介绍——一个用于轻松计算机器学习不确定性的Python软件包。本包的主要特性已在本文中介绍，其开发的一些哲学思想也进行了讨论。更详细的文档和理论可以在[docs](https://github.com/architdatar/ml_uncertainty/tree/v0.1.1/docs/theory)中找到。虽然这只是个开始，但有很大的扩展空间。欢迎提问、讨论和贡献。代码可以在[GitHub](https://github.com/architdatar/ml_uncertainty/tree/main)上找到，该包可以从[PyPi](https://pypi.org/project/ml-uncertainty/)安装。使用*pip
    install ml-uncertainty*尝试一下。
