- en: Parquet File Format – Everything You Need to Know!
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Parquet 文件格式——你需要知道的一切！
- en: 原文：[https://towardsdatascience.com/parquet-file-format-everything-you-need-to-know/](https://towardsdatascience.com/parquet-file-format-everything-you-need-to-know/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/parquet-file-format-everything-you-need-to-know/](https://towardsdatascience.com/parquet-file-format-everything-you-need-to-know/)
- en: <mdspan datatext="el1747162664768" class="mdspan-comment">With</mdspan> the
    amount of data growing exponentially in the last few years, one of the biggest
    challenges has become finding the most optimal way to store various data flavors.
    Unlike in the (not so far) past, when relational databases were considered the
    only way to go, organizations now want to perform analysis over raw data – think
    of social media sentiment analysis, audio/video files, and so on – which usually
    couldn’t be stored in a traditional (relational) way, or storing them in a traditional
    way would require significant effort and time, which increase the overall time-for-analysis.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747162664768" class="mdspan-comment">随着</mdspan>过去几年数据量的指数级增长，最大的挑战之一已成为找到存储各种数据类型的最优方式。与（不那么远的）过去不同，当时关系数据库被认为是唯一的途径，组织现在希望对原始数据进行分析——想想社交媒体情绪分析、音频/视频文件等等——这些通常无法以传统（关系）方式存储，或者以传统方式存储它们将需要大量的努力和时间，这增加了整体的分析时间。
- en: Another challenge was to somehow stick with a traditional approach to have data
    stored in a structured way, but without the necessity to design complex and time-consuming
    ETL workloads to move this data into the enterprise data warehouse. Additionally,
    what if half of the data professionals in your organization are proficient with,
    let’s say, Python (data scientists, data engineers), and the other half (data
    engineers, data analysts) with SQL? Would you insist that “Pythonists” learn SQL?
    Or, vice-versa?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个挑战是坚持传统的存储数据结构化的方法，但无需设计复杂且耗时的 ETL 工作负载来将数据移动到企业数据仓库。此外，如果你的组织中有一半的数据专业人员（比如，数据科学家、数据工程师）精通
    Python，另一半（数据工程师、数据分析师）精通 SQL，你会坚持让“Pythonists”学习 SQL 吗？或者反过来呢？
- en: Or, would you prefer a storage option that can play to the strengths of your
    entire data team? I have good news for you – something like this has already existed
    since 2013, and it’s called Apache Parquet!
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，你更倾向于一个能够发挥整个数据团队优势的存储选项？好消息是，自 2013 年以来，已经存在这样的东西，它被称为 Apache Parquet！
- en: Parquet file format in a nutshell
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简而言之，Parquet 文件格式
- en: 'Before I show you the ins and outs of the Parquet file format, there are (at
    least) five main reasons why Parquet is considered a de facto standard for storing
    data nowadays:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在向您展示 Parquet 文件格式的细节之前，至少有五个主要原因使 Parquet 成为当今存储数据的既定标准：
- en: '***Data compression*** – by applying various encoding and compression algorithms,
    Parquet file provides reduced memory consumption'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***数据压缩*** – 通过应用各种编码和压缩算法，Parquet 文件提供了降低内存消耗'
- en: '***Columnar storage*** – this is of paramount importance in analytic workloads,
    where fast data read operation is the key requirement. But, more on that later
    in the article…'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***列式存储*** – 这在分析型工作负载中至关重要，其中快速的数据读取操作是关键要求。但，关于这一点，文章后面会详细说明…'
- en: '***Language agnostic*** – as already mentioned previously, developers may use
    different programming languages to manipulate the data in the Parquet file'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***语言无关性*** – 如前所述，开发者可以使用不同的编程语言来操作 Parquet 文件中的数据'
- en: '***Open-source format*** – meaning, you are not locked with a specific vendor'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***开源格式*** – 意味着你不会被特定的供应商锁定'
- en: '***Support for complex data types***'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***支持复杂数据类型***'
- en: Row-store vs Column-store
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 行存储与列存储
- en: We’ve already mentioned that Parquet is a column-based storage format. However,
    to understand the benefits of using the Parquet file format, we first need to
    draw the line between the row-based and column-based ways of storing the data.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经提到，Parquet 是一种基于列的存储格式。然而，要了解使用 Parquet 文件格式的优势，我们首先需要区分基于行和基于列的数据存储方式。
- en: 'In traditional, row-based storage, the data is stored as a sequence of rows.
    Something like this:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的基于行的存储中，数据以行序列的形式存储。类似于这样：
- en: '![](../Images/8d7f3a4e0705a184d9a95ba2d20b542b.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8d7f3a4e0705a184d9a95ba2d20b542b.png)'
- en: Image by author
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Now, when we are talking about [OLAP](https://www.ibm.com/cloud/blog/olap-vs-oltp) scenarios,
    some of the common questions that your users may ask are:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当我们谈论 [OLAP](https://www.ibm.com/cloud/blog/olap-vs-oltp) 场景时，用户可能会提出的一些常见问题是：
- en: How many balls did we sell?
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们卖了多少个球？
- en: How many users from the USA bought a T-shirt?
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有多少美国用户购买了T恤？
- en: What is the total amount spent by customer Maria Adams?
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户Maria Adams总共花费了多少钱？
- en: How many sales did we have on January 2nd?
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在1月2日有多少销售额？
- en: 'To be able to answer any of these questions, the engine must scan each and
    every row from the beginning to the very end! So, to answer the question: how
    many users from the USA bought T-shirt, the engine has to do something like this:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 要回答这些问题中的任何一个，引擎必须从第一行扫描到最后一行！所以，要回答问题：有多少美国用户购买了T恤，引擎必须执行类似以下操作：
- en: '![](../Images/5c2589d5a6776ef941455495af7938bf.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5c2589d5a6776ef941455495af7938bf.png)'
- en: Image by author
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Essentially, we just need the information from two columns: Product (T-Shirts)
    and Country (USA), but the engine will scan all five columns! This is not the
    most efficient solution – I think we can agree on that…'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 实质上，我们只需要从两列中获取信息：产品（T恤）和国家（美国），但引擎会扫描所有五列！这不是最有效率的解决方案——我想我们都可以同意这一点……
- en: Column store
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 列存储
- en: 'Let’s now examine how the column store works. As you may assume, the approach
    is 180 degrees different:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来考察一下列存储是如何工作的。正如你可能想象的那样，方法完全相反：
- en: '![](../Images/b0231d99908592fd60504de00a089133.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b0231d99908592fd60504de00a089133.png)'
- en: Image by author
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'In this case, each column is a separate entity – meaning, each column is physically
    separated from other columns! Going back to our previous business question: the
    engine can now scan only those columns that are needed by the query (Product and
    country), while *skipping scanning* the unnecessary columns. And, in most cases,
    this should improve the performance of the analytical queries.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，每一列都是一个单独的实体——这意味着，每一列在物理上与其他列分离！回到我们之前的业务问题：现在引擎只需扫描查询所需的列（产品和国家），而**跳过扫描**不必要的列。而且，在大多数情况下，这应该会提高分析查询的性能。
- en: Ok, that’s nice, but the column store existed before Parquet and it still exists
    outside of Parquet as well. So, what is so special about the Parquet format?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，这很好，但列存储在Parquet之前就已经存在了，它仍然存在于Parquet之外。那么，Parquet格式有什么特别之处呢？
- en: Parquet is a columnar format that stores the data in row groups
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Parquet是一种列式格式，它将数据存储在行组中
- en: Wait, what?! Wasn’t it complicated enough even before this? Don’t worry, it’s
    much easier than it sounds 🙂
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 等等，这还不够复杂吗？别担心，这比听起来容易得多 🙂
- en: 'Let’s go back to our previous example and depict how Parquet will store this
    same chunk of data:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到之前的例子，并描述Parquet将如何存储相同的数据块：
- en: '![](../Images/a80956bb85747e773d726cf1674d7cd9.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a80956bb85747e773d726cf1674d7cd9.png)'
- en: Image by author
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Let’s stop for a moment and explain the illustration above, as this is exactly
    the structure of the Parquet file (some additional things were intentionally omitted,
    but we will come soon to explain that as well). Columns are still stored as separate
    units, but Parquet introduces additional structures, called Row group.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们暂时停下来，解释一下上面的插图，因为这正是Parquet文件的结构（一些额外的内容被有意省略了，但我们将很快解释这一点）。列仍然作为单独的单位存储，但Parquet引入了额外的结构，称为行组。
- en: Why is this additional structure super important?
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这个额外的结构如此重要？
- en: You’ll need to wait for an answer for a bit :). In OLAP scenarios, we are mainly
    concerned with two concepts: ***projection*** and ***predicate(s)***. Projection
    refers to a **SELECT** statement in SQL language – which columns are needed by
    the query. Back to our previous example, we need only the Product and Country
    columns, so the engine can skip scanning the remaining ones.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要稍等片刻才能得到答案 :)。在OLAP场景中，我们主要关注两个概念：***投影（projection）***和***谓词（predicate(s)***）。投影在SQL语言中指的是**SELECT**语句——查询需要哪些列。回到我们之前的例子，我们只需要产品和国家列，因此引擎可以跳过扫描其余的列。
- en: Predicate(s) refer to the **WHERE** clause in SQL language – which rows satisfy
    criteria defined in the query. In our case, we are interested in T-Shirts only,
    so the engine can completely skip scanning Row group 2, where all the values in
    the Product column equal socks!
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 谓词（Predicate(s)）在SQL语言中指的是**WHERE**子句——哪些行满足查询中定义的准则。在我们的例子中，我们只对T恤感兴趣，因此引擎可以完全跳过扫描行组2，其中产品列的所有值都是袜子！
- en: '![](../Images/710a5fb90328ee61d6ff51e14dae8418.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/710a5fb90328ee61d6ff51e14dae8418.png)'
- en: Image by author
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Let’s quickly stop here, as I want you to realize the difference between various
    types of storage in terms of the work that needs to be performed by the engine:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们快速停下来，因为我希望你能意识到引擎在处理不同类型存储时所需执行的工作之间的差异：
- en: Row store – the engine needs to scan all 5 columns and all 6 rows
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行存储 – 引擎需要扫描所有5列和所有6行
- en: Column store – the engine needs to scan 2 columns and all 6 rows
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列存储 – 引擎需要扫描2列和所有6行
- en: Column store with row groups – the engine needs to scan 2 columns and 4 rows
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带有行组的列存储 – 引擎需要扫描2列和4行
- en: Obviously, this is an oversimplified example, with only 6 rows and 5 columns,
    where you will definitely not see any difference in performance between these
    three storage options. However, in real life, when you’re dealing with much larger
    amounts of data, the difference becomes more evident.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，这是一个过于简化的例子，只有6行和5列，你肯定不会在这三种存储选项之间看到任何性能差异。然而，在现实生活中，当你处理大量数据时，这种差异就变得更加明显。
- en: 'Now, the fair question would be: how does Parquet “know” which row group to
    skip/scan?'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，一个公平的问题可能是：Parquet是如何“知道”跳过/扫描哪个行组的？
- en: Parquet file contains metadata
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Parquet文件包含元数据
- en: This means that every Parquet file contains “data about data” – information
    such as minimum and maximum values in a specific column within a certain row group.
    Furthermore, every Parquet file contains a footer, which keeps the information
    about the format version, schema information, column metadata, and so on. You
    can find more details about Parquet metadata types [here](https://parquet.apache.org/docs/file-format/metadata/).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着每个Parquet文件都包含“关于数据的数据”——例如，在特定行组中某一列的最小值和最大值等信息。此外，每个Parquet文件还包含一个尾部，其中包含有关格式版本、模式信息、列元数据等信息。你可以在[这里](https://parquet.apache.org/docs/file-format/metadata/)找到更多关于Parquet元数据类型的详细信息。
- en: '**Important:** In order to optimize the performance and eliminate unnecessary
    data structures (row groups and columns), the engine first needs to “get familiar”
    with the data, so it first reads the metadata. It’s not a slow operation, but
    it still requires a certain amount of time. Therefore, if you’re querying the
    data from multiple small Parquet files, query performance can degrade, because
    the engine will have to read metadata from each file. So, you should be better
    off merging multiple smaller files into one bigger file (but still not too big
    :)…'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**重要提示：**为了优化性能并消除不必要的结构（行组和列），引擎首先需要“熟悉”数据，因此它首先读取元数据。这不是一个慢操作，但仍然需要一定的时间。因此，如果你从多个小的Parquet文件中查询数据，查询性能可能会下降，因为引擎将不得不从每个文件中读取元数据。所以，将多个较小的文件合并成一个较大的文件（但仍然不要太大
    :)）会更好……'
- en: 'I hear you, I hear you: Nikola, what is “small” and what is “big”? Unfortunately,
    there is no single “golden” number here, but for example, [Microsoft Azure Synapse
    Analytics recommends that the individual Parquet file should be at least a few
    hundred MBs in size](https://www.youtube.com/watch?v=RxjMibOx__A).'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我听到了，我听到了：尼古拉，什么是“小”和“大”？不幸的是，这里没有单一的“黄金”数字，但例如，[Microsoft Azure Synapse Analytics建议单个Parquet文件的大小至少应该是几百MB](https://www.youtube.com/watch?v=RxjMibOx__A)。
- en: What else is in there?
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 还有什么其他内容？
- en: 'Here is a simplified, high-level illustration of the Parquet file format:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是Parquet文件格式的简化、高级示意图：
- en: '![](../Images/18353cb404edb973636186b50e9134ff.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/18353cb404edb973636186b50e9134ff.png)'
- en: Image by author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Can it be better than this? Yes, with data compression
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这能比这更好吗？是的，通过数据压缩
- en: Ok, we’ve explained how skipping the scan of the unnecessary data structures
    (row groups and columns) may benefit your queries and increase the overall performance.
    But, it’s not only about that – remember when I told you at the very beginning
    that one of the main advantages of the Parquet format is the reduced memory footprint
    of the file? This is achieved by applying various compression algorithms.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，我们已经解释了跳过扫描不必要的结构（行组和列）如何有助于提高查询性能。但是，这不仅仅是因为这个原因——记得我一开始告诉你的，Parquet格式的主要优势之一是减少了文件内存占用吗？这是通过应用各种压缩算法实现的。
- en: I’ve already written about various data compression types in Power BI (and the
    Tabular model in general) [here](https://data-mozart.com/inside-vertipaq-compress-for-success/),
    so maybe it’s a good idea to start by reading this article.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经在[这里](https://data-mozart.com/inside-vertipaq-compress-for-success/)写过了Power
    BI（以及一般Tabular模型）中的各种数据压缩类型，所以也许先阅读这篇文章是个好主意。
- en: 'There are two main encoding types that enable Parquet to compress the data
    and achieve astonishing savings in space:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 有两种主要的编码类型使得Parquet能够压缩数据并实现惊人的空间节省：
- en: '*[Dictionary encoding](https://parquet.apache.org/docs/file-format/data-pages/encodings/#dictionary-encoding-plain_dictionary--2-and-rle_dictionary--8)* –
    Parquet creates a dictionary of the distinct values in the column, and afterward
    replaces “real” values with index values from the dictionary. Going back to our
    example, this process looks something like this:'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*[字典编码](https://parquet.apache.org/docs/file-format/data-pages/encodings/#dictionary-encoding-plain_dictionary--2-and-rle_dictionary--8)* –
    Parquet为列中的唯一值创建一个字典，然后使用字典中的索引值替换“实际”值。回到我们的例子，这个过程看起来就像这样：'
- en: '![](../Images/29424b7322a2a73bcadad044ba0546ed.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/29424b7322a2a73bcadad044ba0546ed.png)'
- en: Image by author
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'You might think: why this overhead, when product names are quite short, right?
    Ok, but now imagine that you store the detailed description of the product, such
    as: “Long arm T-Shirt with application on the neck”. And, now imagine that you
    have this product sold million times…Yeah, instead of having million times repeating
    value “Long arm…bla bla”, the Parquet will store only the Index value (integer
    instead of text).'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想：当产品名称相当短时，为什么会有这样的开销，对吧？好吧，但现在想象一下，你存储了产品的详细描述，比如：“长袖T恤，领口有图案”。现在想象一下，你有这种产品卖了一百万次……是的，而不是有一百万次重复的值“长袖……”，Parquet只会存储索引值（整数而不是文本）。
- en: '*[Run-Length-Encoding with Bit-Packing](https://parquet.apache.org/docs/file-format/data-pages/encodings/#a-namerlearun-length-encoding--bit-packing-hybrid-rle--3)* –
    when your data contains many repeating values, Run-Length-Encoding (RLE) algorithm
    may bring additional memory savings.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*[带位打包的运行长度编码](https://parquet.apache.org/docs/file-format/data-pages/encodings/#a-namerlearun-length-encoding--bit-packing-hybrid-rle--3)* –
    当你的数据包含许多重复值时，运行长度编码（RLE）算法可能会带来额外的内存节省。'
- en: Can it be better than THIS?! Yes, with the Delta Lake file format
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 它能比这个更好吗？是的，使用Delta Lake文件格式
- en: Ok, what the heck is now a Delta Lake format?! This is the article about Parquet,
    right?
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，现在什么是Delta Lake格式？！这不是关于Parquet的文章吗？
- en: '***So, to put it in plain English: Delta Lake is nothing else but the Parquet
    format “on steroids”. ***When I say “steroids”, the main one is the versioning
    of Parquet files. It also stores a transaction log to enable tracking all changes
    applied to the Parquet file. This is also known as [ACID-compliant transactions](https://www.ibm.com/docs/en/cics-ts/5.4?topic=processing-acid-properties-transactions).'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '***所以，用简单的话来说：Delta Lake其实就是加强版的Parquet格式。当我提到“加强版”时，主要是指Parquet文件的版本控制。它还存储一个事务日志，以跟踪对Parquet文件应用的所有更改。这也被称为 [ACID兼容事务](https://www.ibm.com/docs/en/cics-ts/5.4?topic=processing-acid-properties-transactions)。'
- en: 'Since it supports not only ACID transactions, but also supports time travel
    (rollbacks, audit trails, etc.) and DML (Data Manipulation Language) statements,
    such as INSERT, UPDATE and DELETE, you won’t be wrong if you think of the Delta
    Lake as a “data warehouse on the data lake” (who said: Lakehouse😉😉😉). Examining
    the pros and cons of the Lakehouse concept is out of the scope of this article,
    but if you’re curious to go deeper into this, I suggest you read [this article](https://www.databricks.com/glossary/data-lakehouse) from
    Databricks.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 由于它不仅支持ACID事务，还支持时间旅行（回滚、审计跟踪等）和DML（数据操纵语言）语句，例如INSERT、UPDATE和DELETE，如果你认为Delta
    Lake是“数据湖上的数据仓库”（谁说的：Lakehouse😉😉😉），那你就不会错了。探讨Lakehouse概念的优势和劣势超出了本文的范围，但如果你对此感兴趣并想深入了解，我建议你阅读Databricks的这篇文章 [this
    article](https://www.databricks.com/glossary/data-lakehouse)。
- en: Conclusion
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: We evolve! Same as we, the data is also evolving. So, new flavors of data required
    new ways of storing it. The Parquet file format is one of the most efficient storage
    options in the current data landscape, since it provides multiple benefits – both
    in terms of memory consumption, by leveraging various compression algorithms,
    and fast query processing by enabling the engine to skip scanning unnecessary
    data.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在进化！就像我们一样，数据也在进化。因此，需要新的方式来存储新的数据类型。Parquet文件格式是当前数据环境中最高效的存储选项之一，因为它提供了多种好处——在内存消耗方面，通过利用各种压缩算法，以及在通过允许引擎跳过扫描不必要的数据来实现快速查询处理。
- en: Thanks for reading!
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！
