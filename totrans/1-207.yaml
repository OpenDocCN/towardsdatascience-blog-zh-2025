- en: 'TDS Newsletter: How to Keep LLMs Effective and Reliable Over Time'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/tds-newsletter-how-to-keep-llms-effective-and-reliable-over-time/](https://towardsdatascience.com/tds-newsletter-how-to-keep-llms-effective-and-reliable-over-time/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Those of you who’ve worked with [LLM-powered applications](https://towardsdatascience.com/tag/llm-applications/) know
    this: by now, building and deploying these tools is (relatively) straightforward,
    but maintaining their reliability and long-term value for the organization is
    not.'
  prefs: []
  type: TYPE_NORMAL
- en: There’s no magic solution to this challenge, but several approaches have emerged
    to make your life as data and ML professionals easier. Our weekly highlights zoom
    in on the nitty-gritty details of evaluations, guardrails, and ongoing optimization,
    so if you’d like to expand your LLM know-how and be more effective in your role
    — read on.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: AI Engineering and Evals as New Layers of Software Work
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Clara Chong](https://towardsdatascience.com/author/clarachong13/)‘s compelling
    premise is that “the real work is about solving business problems with the tools
    we already have.” She unpacks AI’s impact on tech workers’ daily rhythms: writing
    code might have become a lot easier (or at least faster), but ensuring it follows
    the best practices of eval-driven development introduces several layers of complexity
    into your projects.'
  prefs: []
  type: TYPE_NORMAL
- en: '[AI Engineering and Evals as New Layers of Software Work](https://towardsdatascience.com/ai-engineering-and-evals-as-new-layers-of-software-work/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Notes on LLM Evaluation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’re ready to dig deeper into the intricacies of evals, Felipe Adachi recently
    shared a comprehensive, step-by-step guide to the components that make up a robust
    pipeline. It zooms in on data preparation, the choices you might face along the
    way, and the adjustments you’ll need to implement once the results are in.
  prefs: []
  type: TYPE_NORMAL
- en: '[Notes on LLM Evaluation](https://towardsdatascience.com/notes-on-llm-evaluation/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'RAG Explained: Reranking for Better Answers'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Retrieval-augmented generation is a technique for improving LLM performance,
    but it, too, often requires fine-tuning and optimization. Maria Mouschoutzi introduces
    us to reranking and its potential to boost LLM outputs’ relevance.
  prefs: []
  type: TYPE_NORMAL
- en: '[RAG Explained: Reranking for Better Answers](https://towardsdatascience.com/rag-explained-reranking-for-better-answers/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Introducing the AI-3P Assessment Framework: Score AI Projects Before Committing
    Resources'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Sometimes, tweaking a tool post-deployment might just be too little, too late.
    Marina Tosic presents a novel framework to help you avoid that fate by focusing
    on projects that are likelier to succeed.
  prefs: []
  type: TYPE_NORMAL
- en: '[Introducing the AI-3P Assessment Framework: Score AI Projects Before Committing
    Resources](https://towardsdatascience.com/the-ai-3p-assessment-framework/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
