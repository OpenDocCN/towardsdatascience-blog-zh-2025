- en: 'Mechanistic View of Transformers: Patterns, Messages, Residual Stream… and
    LSTMs'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/mechanistic-view-of-transformers-patterns-messages-residual-stream-and-lstms/](https://towardsdatascience.com/mechanistic-view-of-transformers-patterns-messages-residual-stream-and-lstms/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1754324724973" class="mdspan-comment">In</mdspan> my previous
    [article](https://towardsdatascience.com/transformers-and-attention-are-just-fancy-addition-machines/),
    I talked about how mechanistic interpretability reimagines attention in a transformers
    to be additive without any concatenation. Here, I will dive deeper into this perspective
    and show how it resonates with ideas from LSTMs, and how this reinterpretation
    opens new doors for understanding.
  prefs: []
  type: TYPE_NORMAL
- en: 'To ground ourselves: the attention mechanism in transformers relies on a series
    of matrix multiplications involving the Query (Q), Key (K), Value (V), and an
    output projection matrix (O). Traditionally, each head computes attention independently,
    the results are concatenated, and then projected via O. But from a mechanistic
    perspective, it is better seen that the final projection by weight matrix O *is
    actually applied per head* W[o] (compared with the traditional view of concatenating
    the heads and then projecting). This subtle shift implies that the heads are independent
    and separable until the end.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dc85f0e5274a97d608e322ef15f68f21.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Patterns and Messages
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A brief analogy on Q, K and V: Each matrix is a linear projection of the embedding
    E (or activations at that layer). Then, the tokens in Q can be thought of as asking
    the question “which other tokens are relevant to me?” to K, which represents a
    key (like in a hashmap) of the actual information contained in the tokens stored
    in V. In this way, the input tokens in the sequence know which tokens to attend
    to, and how much.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In essence, Q and K determine *relevance*, and V holds the *content*. This interaction
    tells each token which others to attend to, and by how much. Let us now see how
    seeing the heads as independent leads to the view that the per-head Query-Key
    and Value-Output matrices belong to two independent processes, namely *patterns
    and messages.*
  prefs: []
  type: TYPE_NORMAL
- en: 'Unpacking the steps of attention:'
  prefs: []
  type: TYPE_NORMAL
- en: Multiply embedding matrix E with W[q] to get the query vector Q. Similarly get
    key vector K and value vector V by multiplying E with W[k] and W[v]
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Multiply with Q and K^T. In traditional view of attention, this operation is
    seen as determining which other tokens in the sequence are the most relevant to
    the current token under consideration.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Apply softmax. This ensures that the relevance or similarity scores calculated
    in the previous step normalize to 1, thereby giving a probability distribution
    of the importance of the other tokens in context to the current. softmax (QK^T/*sqrt*(d[k]))
    where d[k] is the dimension of key vector K.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Multiply with V. This step ends the attention calculation wherein we now have
    extracted information from (that is, attended to) the sequence based on the scores
    calculated. This gives us a contextually enriched representation of the current
    token that encodes information as to how other tokens in the sequence relate to
    it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, this result is projected back onto model space using the matrix O*,
    applied per layer* W[o]
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The final attention calculation then is: **QK^TVW[o]**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, instead of seeing this as **((QK^T)V)O**, mechanistic interpretation sees
    this as the rearranged **(QK^T)(VW[o]**) where **QK^T** forms the *pattern* and
    **VW[o]** forms the *message*, *per layer*. *Why does this matter?* Because it
    lets us cleanly separate two conceptual processes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Messages** **(VW[o])**: figuring out *what* to transmit (content).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Patterns** **(QKᵀ):** figuring out *where* to look (relevance).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Diving deeper, remember that Q and K themselves are derived from the embedding
    matrix E. So, we can also write the equation as:'
  prefs: []
  type: TYPE_NORMAL
- en: (EW[q])(W^T[k]E)
  prefs: []
  type: TYPE_NORMAL
- en: Mechanistic interpretation refers to W[q]W[k]^T as **W**[**p**] for pattern
    weight matrix. Here, EW[p] can be intuited as producing a pattern that is then
    matched against the embeddings in the other E, obtaining a score that can be used
    to weight messages. Basically, this reformulates the similarity calculation in
    attention to “pattern matching” and gives us a direct relationship between similarity
    calculation and embeddings.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly VO can be seen as EW[v]W[o] that is the *per-head* value vectors,
    derived from the embeddings and projected onto model space. Again, this reformulation
    gives us a direct relationship between the embeddings and the final output, instead
    of seeing attention as a sequence of steps. Another difference is that while traditional
    view of attention implies that the information contained in V is *extracted* using
    queries represented by Q, the mechanistic view allows us to think that the information
    to be packed into messages is *chosen* by the embeddings themselves, and just
    weighted by the patterns.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, attention using the pattern-message terminology is this: each token
    in the embedding uses the patterns that were obtained to determine how much of
    the message to convey to predict the next token.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b7b54614ede40dc868fadcdbe502ce4a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'What this makes possible: Residual Stream'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: From my previous [article](https://towardsdatascience.com/transformers-and-attention-are-just-fancy-addition-machines/)
    again, where we saw the additive reformulation of multi-head attention and this
    one where we just reformulated the attention calculation directly in terms of
    embeddings, we can view each operation as being *additive to* instead of *transforming*
    the initial embedding. The residual connections in transformers which are traditionally
    interpreted as skip connections can be reinterpreted as a residual *stream* which
    carries the embeddings and from which components like multi-head attention and
    MLP read, do something and add back to the embeddings. This makes each operation
    an update to a persistent memory, not a transformation chain. The view is thus
    conceptually simpler, and still preserves full mathematical equivalence. More
    on this [here](https://mccormickml.com/2025/02/20/patterns-and-messages-part-5-the-residual-stream/).
  prefs: []
  type: TYPE_NORMAL
- en: Note here that this perspective simplifies and ignores operations like normalization
    and softmax that introduce non-linearity.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f34ae94a2430e9b2442e0d7015e533af.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: How does this relate to LSTM?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/5f3e39b44fc1439ddde6f2f772160efb.png)'
  prefs: []
  type: TYPE_IMG
- en: LSTM by [Jonte Decker](https://towardsdatascience.com/a-brief-introduction-to-recurrent-neural-networks-638f64a61ff4/)
  prefs: []
  type: TYPE_NORMAL
- en: 'To recap: LSTMs, or Long Short-Term Memory is a type of RNN designed to handle
    the vanishing gradient problem frequent in RNNs by storing information in a “cell”
    and allowing them to learn long-range dependencies in data. The LSTM cell (seen
    above) has two states – the cell state **c** for long term memory and hidden state
    **h** for short term memory.'
  prefs: []
  type: TYPE_NORMAL
- en: It also has gates – forget, input and output that control the flow of information
    into and out of the cell. Intuitively, the forget gate acts as a lever for determining
    how much of the long term information to not pass through or forget; input gate
    acts as a lever for determining how much of the current input from the hidden
    state to add to long term memory; and output gate acts as a lever to determine
    how much of the *modified* long-term memory to send further to the hidden state
    of the next time step.
  prefs: []
  type: TYPE_NORMAL
- en: 'The core difference between a LSTM and a transformer is that LSTM is sequential
    and local in that it only works on one token at a time whereas a transformer works
    in parallel on the whole sequence. But they are similar because they are both
    both *fundamentally state-updating mechanisms*, especially when the transformer
    is viewed from the mechanistic lens. So, the analogy is this:'
  prefs: []
  type: TYPE_NORMAL
- en: Cell state is similar to the residual stream; acting as long-term memory
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Input gate does the same job as the pattern matching or similarity scoring in
    determining which information is relevant for the current token under consideration;
    only difference being transformer does this in parallel for all tokens in the
    sequence
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Output gate is similar to messages and determines which information to emit
    and how strongly.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, *unlike* LSTMs, the transformer does not forget; residual stream accumulates
    updates indefinitely.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: By reframing attention as patterns (QKᵀ) and messages (VO), and reformulating
    residual connections as a persistent residual stream, mechanistic interpretation
    offers a powerful way to conceptualize transformers. Not only does this enhance
    interpretability, but it also aligns attention with broader paradigms of information
    processing—bringing it a step closer to the kind of conceptual clarity seen in
    systems like LSTMs.
  prefs: []
  type: TYPE_NORMAL
