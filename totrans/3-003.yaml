- en: The Dangers of Deceptive Data Part 2–Base Proportions and Bad Statistics
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-dangers-of-deceptive-data-part-2-base-proportions-and-bad-statistics/](https://towardsdatascience.com/the-dangers-of-deceptive-data-part-2-base-proportions-and-bad-statistics/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1746680040658" class="mdspan-comment">This is a follow</mdspan>-up
    to my earlier article: [The Dangers of Deceptive Data–Confusing Charts and Misleading
    Headlines](https://towardsdatascience.com/the-dangers-of-deceptive-data-confusing-charts-and-misleading-headlines/).
    My first article focused on how *visualizations* can be used to mislead, diving
    into a form of data presentation widely used in public matters.'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I go a bit deeper, looking at how a misunderstanding of statistical
    ideas is breeding ground for being deceived by data. Specifically, I’ll walk through
    how correlation, base proportions, summary statistics, and misinterpretation of
    uncertainty can lead people astray.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get right into it.
  prefs: []
  type: TYPE_NORMAL
- en: Correlation ≠ Causation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s start with a classic to get in the right frame of mind for some more complex
    ideas. From the earliest statistics classes in grade school, we are all told that
    correlation is not equal to causation.
  prefs: []
  type: TYPE_NORMAL
- en: If you do a bit of Googling or reading, you can find “statistics” that show
    a high correlation between cigarette consumption and average life expectancy [1].
    Interesting. Well, does that mean we should all start smoking to live longer?
  prefs: []
  type: TYPE_NORMAL
- en: 'Of course not. We’re missing a confounding factor: buying cigarettes requires
    money, and countries with higher wealth understandably have higher life expectancies.
    There is no causal link between cigarettes and age. I like this example because
    it is so blatantly misleading and highlights the point well. In general, it’s
    important to be wary of any data that only shows a correlational link.'
  prefs: []
  type: TYPE_NORMAL
- en: From a scientific standpoint, a correlation can be identified via observation,
    but the only way to claim causation is to actually conduct a randomized trial
    controlling for potential confounding factors—a fairly involved process.
  prefs: []
  type: TYPE_NORMAL
- en: 'I chose to start here because while being introductory, this concept also highlights
    a key idea that underpins understanding data effectively: **The data only shows
    what it shows, and nothing else.**'
  prefs: []
  type: TYPE_NORMAL
- en: Keep that in mind as we move forward.
  prefs: []
  type: TYPE_NORMAL
- en: Remember Base Proportions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In 1978, Dr. Stephen Casscells and his team famously asked a group of 60 physicians,
    residents, and students at Harvard Medical School the following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: “If a test to detect a disease whose prevalence is 1 in 1,000 has a false positive
    rate of 5%, what is the chance that a person found to have a positive result actually
    has the disease, assuming you know nothing about the person’s symptoms or signs?”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Though presented in medical terms, this question is really about statistics.
    Accordingly, it also has connections to data science. Take a second to think about
    your own answer to this question before reading further.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/093b1625652764f02badfa1266b12329.png)](https://unsplash.com/photos/three-doctors-woman-in-hijab-and-two-men-in-medical-apparel-discussing-patients-x-ray-tomography-scan-walking-outside-on-the-background-of-modern-hospital-with-stairs-KrQAGZasfcU)'
  prefs: []
  type: TYPE_NORMAL
- en: Photo by [Getty Images](https://unsplash.com/@gettyimages) on Unsplash
  prefs: []
  type: TYPE_NORMAL
- en: The answer is (approximately) 2%. Now, if you looked through this quickly (and
    aren’t up to speed with your statistics), you may have guessed significantly higher.
  prefs: []
  type: TYPE_NORMAL
- en: This was certainly the case with the medical school folks. Only 11/60 people
    correctly answered the question, with 27/60 going as high as 95% in their response
    (presumably just subtracting the false positive rate from 100).
  prefs: []
  type: TYPE_NORMAL
- en: 'It is easy to assume that the actual value should be high due to the positive
    rest result, but this assumption contains a crucial reasoning error: It fails
    to account for the extremely low prevalence of the disease in the population.'
  prefs: []
  type: TYPE_NORMAL
- en: Said another way, if only 1 in every 1,000 people has the disease, this needs
    to be taken into account when calculating the probability of a random person having
    the disease. The probability does not rely only on the positive test result. As
    soon as the test accuracy falls below 100%, the influence of the base rate comes
    into play quite significantly.
  prefs: []
  type: TYPE_NORMAL
- en: Formally, this reasoning error is known as the **base rate fallacy**.
  prefs: []
  type: TYPE_NORMAL
- en: To see this more clearly, imagine that only 1 in every 1,000,000 people had
    the disease, but the test still has a false positive rate of 5%. Would you still
    assume that a positive test result immediately indicates a 95% chance of having
    the disease? What if it was 1 in a billion?
  prefs: []
  type: TYPE_NORMAL
- en: Base rates are extremely important. Remember that.
  prefs: []
  type: TYPE_NORMAL
- en: Statistical Measures Are NOT Equivalent to the Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s take a look at the following quantitative data sets (13 of them, to be
    precise), all of which are visualized as a scatter plot. One is even in the shape
    of a dinosaur.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fc9d2554813b437cd4e0697b1e065449.png)'
  prefs: []
  type: TYPE_IMG
- en: Image By Author. Generated using code available under MIT license at [https://jumpingrivers.github.io/datasauRus/](https://jumpingrivers.github.io/datasauRus/)
  prefs: []
  type: TYPE_NORMAL
- en: Do you see anything interesting about these data sets?
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ll point you in the right direction. Here is a set of summary statistics
    for the data:'
  prefs: []
  type: TYPE_NORMAL
- en: '| X-Mean | 54.26 |'
  prefs: []
  type: TYPE_TB
- en: '| Y-Mean | 47.83 |'
  prefs: []
  type: TYPE_TB
- en: '| X-SD (Standard Deviation) | 16.76 |'
  prefs: []
  type: TYPE_TB
- en: '| Y-SD | 26.93 |'
  prefs: []
  type: TYPE_TB
- en: '| Correlation | -0.06 |'
  prefs: []
  type: TYPE_TB
- en: If you’re wondering why there is only one set of statistics, it’s because they’re
    all the same. Every single one of the 13 charts above has the same mean, standard
    deviation, and correlation between variables.
  prefs: []
  type: TYPE_NORMAL
- en: This famous set of 13 data sets is known as the *Datasaurus Dozen* [5], and
    was published some years ago as a stark example of why summary statistics cannot
    always be trusted. It also highlights the value of visualization as a tool for
    data exploration. In the words of renowned statistician John Tukey,
  prefs: []
  type: TYPE_NORMAL
- en: “**The greatest value of a picture is when it forces us to notice what we never
    expected to see.**“
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Understanding Uncertainty
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To conclude, I want to talk about a slight variation of deceptive data, but
    one that is equally important: **mistrusting data that is actually correct.**
    In other words, false deception.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following chart is taken from a study analyzing the sentiments of headlines
    taken from left-leaning, right-leaning, and centrist news outlets [6]:'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/18f32755e196976f11f92200eb01d0e8.png)](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0276367)'
  prefs: []
  type: TYPE_NORMAL
- en: '“Average yearly sentiment of headlines grouped by the ideological leanings
    of news outlets” by Authors of the study: David Rozado, Ruth Hughes, Jamin Halberstadt
    is licensed under CC BY 4.0\. To view a copy of this license, visit https://creativecommons.org/licenses/by/4.0/?ref=openverse.'
  prefs: []
  type: TYPE_NORMAL
- en: 'There is quite a bit going on in the chart above, but there is one particular
    aspect I want to draw your attention to: the vertical lines extending from each
    plotted point. You may have seen these before. Formally, these are called *error
    bars*, and they are one way that scientists often depict uncertainty in the data.'
  prefs: []
  type: TYPE_NORMAL
- en: Let me say that again. In statistics and data science, “error” is synonymous
    with “uncertainty.” Crucially, **it does not mean something is wrong or incorrect
    about what is being shown**. When a chart depicts uncertainty, it depicts a carefully
    calculated measure of the range of a value and the level of confidence at various
    points within that range. Unfortunately, many people just take it to mean that
    whoever made the chart is essentially guessing.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is a serious error in reasoning, for the damage is twofold: Not only does
    the data at hand get misinterpreted, but the presence of this misconception also
    contributes to the dangerous societal belief that science is not to be trusted.
    Being upfront about the limitations of knowledge should actually increase our
    confidence in a claim’s reliability, but mistaking that limitation as admission
    of foul play leads to the opposite effect.'
  prefs: []
  type: TYPE_NORMAL
- en: Learning how to interpret uncertainty is challenging but incredibly important.
    At the minimum, a good place to start is realizing what the so-called “error”
    is actually trying to convey.
  prefs: []
  type: TYPE_NORMAL
- en: Recap and Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here’s a cheat sheet for being wary of deceptive data:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Correlation ≠** **causation**. Look for the confounding factor.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Remember base proportions.** The probability of a phenomenon is *highly*
    influenced by its prevalence in the population, no matter how accurate your test
    is (with the exception of 100% accuracy, which is rare).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Beware summary statistics.** Means and medians will only take you so far;
    you need to explore your data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Don’t misunderstand uncertainty.** It isn’t an error; it’s a carefully considered
    description of confidence levels.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Remember these, and you’ll be well positioned to tackle the next data science
    problem that makes its way to you.
  prefs: []
  type: TYPE_NORMAL
- en: Until next time.
  prefs: []
  type: TYPE_NORMAL
