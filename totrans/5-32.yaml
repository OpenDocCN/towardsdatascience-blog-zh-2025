- en: Preparing PDFs for RAGs
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/preparing-pdfs-for-rags-b1579fc697f1/](https://towardsdatascience.com/preparing-pdfs-for-rags-b1579fc697f1/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Annual Report Design Agency - Report Yak on Unsplash](../Images/5b7c58ef2b4d405575bb6d841ef0981f.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Annual Report Design Agency – Report Yak](https://unsplash.com/@reportsyak?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: Converting PDFs to text was possible but has never been easier.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I recently created a graph data store to be used in an RAG. In other words,
    we built a GraphRAG.
  prefs: []
  type: TYPE_NORMAL
- en: '[**How to Build a Knowledge Graph in Minutes (And Make It Enterprise-Ready)**](https://towardsdatascience.com/enterprise-ready-knowledge-graphs-96028d863e8c)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Graph RAGs are a fantastic alternative to other RAG apps like widely used vector
    store-backed RAGs. They bring reasoning to the table. For example, with semantic
    similarity search (the technique used in vector stores to retrieve information),
    you could ask who the CFO of XYZ, Inc. was last year. Because XYZ, Inc.’s last
    year’s annual report would explicitly mention its CFO. But think of a question
    like this: Which two directors of XYZ, inc. have studied in the same school? The
    retrieval process won’t be able to fetch the relevant information without mentioning
    a school name. But graph RAG could do it.'
  prefs: []
  type: TYPE_NORMAL
- en: However, the key issue here is how we construct the graph for retrieval. I’ve
    addressed this issue in a separate post recently. Thinking another step backward,
    how do we even prepare the annual reports in a way that makes it easier to create
    the graphs?
  prefs: []
  type: TYPE_NORMAL
- en: That’s the focus of this article.
  prefs: []
  type: TYPE_NORMAL
- en: The first engineering step of all our work is converting data from PDFs to text.
    However, annual reports are complex documents. There won’t be just text. There’ll
    be charts, tables, etc. Each provides a vital piece of information about the company.
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s start from there.
  prefs: []
  type: TYPE_NORMAL
- en: How to convert PDFs to rich text
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most Python programmers would have used PDF readers at some point – at least
    to follow along with a tutorial. The most popular one was PyPDF2.
  prefs: []
  type: TYPE_NORMAL
- en: Most of these libraries do get the job done. But the helpfulness of the information
    was not great.
  prefs: []
  type: TYPE_NORMAL
- en: The **PyPDF2** library, which I have known about for years, extracts all your
    PDF content as text without any formatting. After extraction, you have no idea
    which is the title and which is a list.
  prefs: []
  type: TYPE_NORMAL
- en: Then there was **[PyMuPDF4LLM](https://pymupdf.readthedocs.io/en/latest/index.html)**.
    This package converts the PDFs directly to markdown. Markdown also has a lot of
    crucial information on the structure of the text. Frameworks like Langchain support
    markdown. They use the extra information in the text formatting to better chunk
    and store the data in data stores. This, in turn, makes fetching relevant data
    more easier.
  prefs: []
  type: TYPE_NORMAL
- en: The issue with PyMuPDF4LLM was that it didn’t do well with tables. The extracted
    tables were not anywhere near the original. (*Don’t ditch PyMuPDF4LLM yet. It
    still played an incredible role in our final solution*)
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, we tried a couple of other modern tools. One is [Docling](https://ds4sd.github.io/docling/),
    a library developed and open-sourced by [IBM Deep Search](https://github.com/DS4SD),
    and the other is the [Marker](https://github.com/VikParuchuri/marker), an equally
    fantastic library.
  prefs: []
  type: TYPE_NORMAL
- en: Here are the outputs of the same PDF page converted by the four packages we’ve
    discussed.
  prefs: []
  type: TYPE_NORMAL
- en: '**PyPDF2:**'
  prefs: []
  type: TYPE_NORMAL
- en: '![Information extracted as text from PDF using PyPDF2 - screenshot by the author.](../Images/0146cb32da0c03b9f3c0da6a2fe580b2.png)'
  prefs: []
  type: TYPE_IMG
- en: Information extracted as text from PDF using PyPDF2 – screenshot by the author.
  prefs: []
  type: TYPE_NORMAL
- en: '**PyMuPDF4LLM:**'
  prefs: []
  type: TYPE_NORMAL
- en: '![Information extracted as markdown from PDF using PyMuPDF4LLM— screenshot
    by the author.](../Images/8d0fa9781044bf6b85201f50c8746bc5.png)'
  prefs: []
  type: TYPE_IMG
- en: Information extracted as markdown from PDF using PyMuPDF4LLM— screenshot by
    the author.
  prefs: []
  type: TYPE_NORMAL
- en: '**Docling:**'
  prefs: []
  type: TYPE_NORMAL
- en: '![Information extracted as markdown from PDF using Docling— screenshot by the
    author.](../Images/23e0f467e86c9cef3ff5ff372be43885.png)'
  prefs: []
  type: TYPE_IMG
- en: Information extracted as markdown from PDF using **Docling**— screenshot by
    the author.
  prefs: []
  type: TYPE_NORMAL
- en: '**Marker:**'
  prefs: []
  type: TYPE_NORMAL
- en: '![Information extracted as markdown from PDF using Marker— screenshot by the
    author.](../Images/c950097525fa62d19b19a66343c22b99.png)'
  prefs: []
  type: TYPE_IMG
- en: Information extracted as markdown from PDF using Marker— screenshot by the author.
  prefs: []
  type: TYPE_NORMAL
- en: The Docling version is more neat and has more structural information than the
    other two. It has extracted the tables with all the relevant information. It has
    left placeholders for images and preserved the hierarchical heading structure.
    All this information helps create chunks, graph db, better retrieval, and, eventually,
    a better RAG system.
  prefs: []
  type: TYPE_NORMAL
- en: What didn’t work well?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Marker and docking are both promising. However, I’m not very impressed if we
    take the time to convert PDFs to markdown.
  prefs: []
  type: TYPE_NORMAL
- en: To test this correctly, I partitioned a segment of an annual report that includes
    a mix of text, tables, and images. I then created several copies of this with
    different page counts.
  prefs: []
  type: TYPE_NORMAL
- en: I then ran the conversion with each tool for these different-sized PDF files
    and measured the time they took. Here’s the final result.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8a4c125ebf4c4d2111dca4bfb4871e7b.png)'
  prefs: []
  type: TYPE_IMG
- en: The result clearly shows that Docling and PyPDF2 are way too slow compared to
    the other two options despite their impressive abilities to convert tables.
  prefs: []
  type: TYPE_NORMAL
- en: Docling processes a single PDF page in roughly 4 seconds, while Marker takes
    about double that time.
  prefs: []
  type: TYPE_NORMAL
- en: What did I do?
  prefs: []
  type: TYPE_NORMAL
- en: How to pick the best PDF to markdown tool
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our project had dozens of annual reports. Thankfully, they aren’t hundreds.
  prefs: []
  type: TYPE_NORMAL
- en: If each annual report is approximately 300 pages long and there are 50 reports
    using docking, we need 17 hours (300 pages per report x 50 reports x 4 seconds
    per page / 3600 seconds per hour).
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, we could afford the time.
  prefs: []
  type: TYPE_NORMAL
- en: But we’re still in the prototyping phase. We need to think about scaling up
    the project. What if this project scales to all the S&P500 companies and their
    30-year historical reports?
  prefs: []
  type: TYPE_NORMAL
- en: Unless we **distribute the load and do it in parallel**, it will take 208 days,
    which is precisely what we did.
  prefs: []
  type: TYPE_NORMAL
- en: We created a service that handles conversions in the cloud and updates the Graph
    DB. This can run in parallel and scale up nicely.
  prefs: []
  type: TYPE_NORMAL
- en: If speed is your concern, PyPDF2 is the best – that is if you can’t run Docling
    in parallel processes.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Final thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: PDF to markdown tools have gotten better. But converting tables on PDF to markdown
    tables wasn’t very good still.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve compared four free and open-source tools for converting PDFs to Markdown.
    Then, we chunked the markdowns and converted them to graphs in an RAG app.
  prefs: []
  type: TYPE_NORMAL
- en: Of the tools we compared, Docling produced outstanding results. The downside,
    though, is its performance. It takes much longer than the widely used PyPDF2.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, we switched to a cloud service that scales up nicely and does the
    conversion in parallel.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '*Thanks for reading, friend! Besides **[Medium](https://thuwarakesh.medium.com/)***,
