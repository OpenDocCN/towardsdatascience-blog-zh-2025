    I read it one year ago on a Friday afternoon.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '* 如果你对这个感兴趣，我最喜欢的论文是这篇：[https://arxiv.org/abs/2103.09762](https://arxiv.org/abs/2103.09762)。我是在去年一个周五的下午读的。'
- en: '** To this day, I still get mail notifications about how clearing the GPU memory
    is impossible in TensorFlow. [This 5-year old GitHub issue](https://github.com/tensorflow/tensorflow/issues/36465#issue)
    gives the details.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**时至今日，我仍然会收到关于在TensorFlow中清除GPU内存不可能的邮件通知。[这个5年前的GitHub问题](https://github.com/tensorflow/tensorflow/issues/36465#issue)提供了详细信息。'
