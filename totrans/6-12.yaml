- en: How to Run Jupyter Notebooks and Generate HTML Reports with Python Scripts
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用 Python 脚本运行 Jupyter Notebooks 并生成 HTML 报告
- en: 原文：[https://towardsdatascience.com/how-to-run-jupyter-notebooks-and-generate-html-reports-with-python-scripts-48e0d96a30ed/](https://towardsdatascience.com/how-to-run-jupyter-notebooks-and-generate-html-reports-with-python-scripts-48e0d96a30ed/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-run-jupyter-notebooks-and-generate-html-reports-with-python-scripts-48e0d96a30ed/](https://towardsdatascience.com/how-to-run-jupyter-notebooks-and-generate-html-reports-with-python-scripts-48e0d96a30ed/)
- en: '![Christopher Gower **** in Unsplash](../Images/c1c43e4dfb8b24203ff8db397d6b3e4a.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![Christopher Gower **** in Unsplash](../Images/c1c43e4dfb8b24203ff8db397d6b3e4a.png)'
- en: '[Christopher Gower](https://unsplash.com/es/@cgower) **** in Unsplash'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '[Christopher Gower](https://unsplash.com/es/@cgower) **** in Unsplash'
- en: '**Jupyter Notebooks are a widely used solution for quick analysis**. As an
    alternative to creating code using scripts, they allow you to structure your code
    step by step and visualize the outputs of each code block. However, **they are
    also powerful and sometimes underestimated tools for creating reports**. Jupyter
    Notebooks allow you to **combine code with rich text and interactive visualizations**,
    which can be easily exported in a variety of formats, including HTML. In this
    way, a non-technical audience, who may not have tools such as integrated development
    environments installed on their computer and who have no interest in the code
    used in the analysis, can easily access the results from a browser.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**Jupyter Notebooks 是一种广泛使用的快速分析解决方案**。作为使用脚本创建代码的替代方案，它们允许你逐步结构化你的代码并可视化每个代码块的输出。然而，**它们也是创建报告的强大且有时被低估的工具**。Jupyter
    Notebooks 允许你**将代码与丰富的文本和交互式可视化相结合**，可以轻松导出为多种格式，包括 HTML。这样，非技术受众，他们可能没有在计算机上安装集成开发环境，并且对分析中使用的代码没有兴趣，也可以轻松通过浏览器访问结果。'
- en: In addition, in many projects, **the use of Jupyter Notebooks is combined with
    Python scripts and pipelines**. These Jupyter Notebooks are generally used to
    create interactive reports that support the analysis executed in the scripts.
    For this reason, it is interesting that the execution of the Notebooks is simultaneous
    to the execution of the pipeline, so that as we update, for example, several data
    sets, the interactive reports are also updated, ensuring that they always show
    the latest available data.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在许多项目中，**结合使用 Jupyter Notebooks 和 Python 脚本和管道**。这些 Jupyter Notebooks 通常用于创建支持脚本中执行分析的交互式报告。因此，笔记本的执行与管道的执行同时进行是很有趣的，这样当我们更新，例如，几个数据集时，交互式报告也会更新，确保它们始终显示最新的可用数据。
- en: In this article, **we will create a synthetic dataset that simulates the annual
    purchases we make at the supermarket**. In addition, we will also create an interactive
    report where the purchases will be analyzed. Subsequently, we will simulate the
    update of this dataset with new purchases. **At the same time that we update the
    dataset, we will also update the interactive report from a Python script**. All
    this will be achieved without the need to run the notebook and export it manually
    as an HTML file.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，**我们将创建一个模拟我们在超市年度购买的合成数据集**。此外，我们还将创建一个交互式报告，其中将分析购买情况。随后，我们将模拟使用新购买更新此数据集。**在更新数据集的同时，我们还将从
    Python 脚本中更新交互式报告**。所有这些都将无需手动运行笔记本并导出为 HTML 文件。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Synthetic Data Creation
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合成数据创建
- en: '**The interactive report created in this article uses synthetic data generated
    with LLMs**. The data created simulates purchases in a supermarket and consists
    of the following columns:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**本文中创建的交互式报告使用的是由 LLMs 生成的合成数据**。创建的数据模拟了超市的购买情况，包括以下列：'
- en: '**Date**: the date the product was purchased in the supermarket. The format
    is YYYY-MM-DD (e.g., 2024–01–01).'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**日期**：产品在超市购买的日期。格式为 YYYY-MM-DD（例如，2024-01-01）。'
- en: '**Product**: product name (e.g. apples, yogurts, or salmon).'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品**：产品名称（例如，苹果、酸奶或三文鱼）。'
- en: '**Quantity**: quantity in units of the product purchased (for example, 2).'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数量**：购买产品的单位数量（例如，2）。'
- en: '**Price per unit**: the price of one unit of the product (e.g. 0.5).'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单价**：产品的单价（例如，0.5）。'
- en: '**Total Cost**: the total price of the products purchased, i.e., the quantity
    multiplied by the product’s unit price (e.g. 2 * 0.5 = 1).'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**总成本**：购买产品的总价，即数量乘以产品的单价（例如，2 * 0.5 = 1）。'
- en: '**Category**: category or type of product (e.g. meat or fish).'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类别**：产品的类别或类型（例如，肉类或鱼类）。'
- en: '**Payment Method**: method of payment with which the purchase was made. Three
    possible payment methods exist: card, cash, or digital wallet.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支付方式**：购买时所使用的支付方式。存在三种可能的支付方式：信用卡、现金或数字钱包。'
- en: The model used belongs to the company Mistral, a French startup in charge of
    developing large language models and other technologies based on artificial intelligence.
    **Large language models can be used to generate synthetic data that realistically
    simulate certain structures, as in this case, the purchases in a supermarket**.
    This data can be used, for example, to test applications, optimize algorithms,
    or train artificial intelligence models. **This article uses data to test automation
    in generating HTML reports from a Jupyter Notebook when a dataset is updated.**
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 使用的模型属于Mistral公司，这是一家负责开发大型语言模型和其他基于人工智能技术的法国初创公司。**大型语言模型可以用于生成合成数据，以现实地模拟某些结构，例如本例中的超市购买**。这些数据可以用于测试应用程序、优化算法或训练人工智能模型。**本文使用数据测试了当数据集更新时，从Jupyter
    Notebook自动生成HTML报告的自动化**。
- en: '**To generate the synthetic data, we need to provide details in a prompt about
    what kind of output data we want.** This prompt will be sent to the large language
    model, which will respond with the data set.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**为了生成合成数据，我们需要在提示中提供关于我们想要哪种输出数据的详细信息**。这个提示将被发送到大型语言模型，它将响应以数据集的形式。'
- en: 'The prompt is divided into three parts:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 提示分为三个部分：
- en: '**Dataset Specification**: this part briefly summarizes the contents of the
    data set you want to generate. The columns of the data set and their contents
    are specified.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据集规范**：本部分简要总结了您想要生成的数据集的内容。数据集的列及其内容被指定。'
- en: '**Instructions for data generation**: this section details the instructions
    to be followed by the large language model when generating the output response.
    For example, in this case, it is necessary that only the JSON output is generated,
    to later easily convert it into a DataFrame. It is also requested that the set
    of generated outputs be sufficiently varied.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据生成说明**：本节详细说明了大型语言模型在生成输出响应时需要遵循的指令。例如，在本例中，需要生成仅包含JSON格式的输出，以便稍后轻松将其转换为DataFrame。还要求生成的输出集应足够多样化。'
- en: '**Output examples**: some output examples are provided, so that it is easier
    for the large language model to understand the structure of the data to be generated.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输出示例**：提供了一些输出示例，以便大型语言模型更容易理解要生成的数据的结构。'
- en: The process of designing a prompt is not linear. It is necessary to generate
    an initial prompt and test the response multiple times. The prompt will be adjusted
    depending on the quality of the response generated by the model.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 设计提示的过程不是线性的。有必要生成一个初始提示并多次测试模型的响应。根据模型生成的响应质量，提示将进行调整。
- en: Once the prompt is designed, we must also create a function to interact with
    the Mistral Large Language Model. The function `generate_synthetic_data` is a
    generic function that can be used with different Mistral prompts and models.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦设计好提示，我们还必须创建一个与Mistral大型语言模型交互的函数。`generate_synthetic_data`函数是一个通用函数，可以与不同的Mistral提示和模型一起使用。
- en: Finally, the function `convert_api_response_to_dataframe` is created, in charge
    of converting the JSON output format into a DataFrame. All the functions described
    above are defined in the `synthetic_data_utils.py` file.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，创建了`convert_api_response_to_dataframe`函数，负责将JSON输出格式转换为DataFrame。上述所有函数都在`synthetic_data_utils.py`文件中定义。
- en: The functions defined above are used to generate the initial synthetic data.
    **The initial data simulate purchases during the first four weeks of January 2024.**
    Subsequently, we will generate synthetic data for new weeks using these functions.
    The goal is that, when new synthetic data is generated, not only the dataset containing
    all annual purchases but also the report created in the Jupyter Notebook and the
    HTML generated from this Notebook will be updated.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的函数用于生成初始合成数据。**初始数据模拟了2024年1月的前四周内的购买情况**。随后，我们将使用这些函数生成新的周合成数据。目标是，当生成新的合成数据时，不仅包含所有年度购买的数据库将被更新，而且Jupyter
    Notebook中创建的报告以及从该笔记本生成的HTML也将被更新。
- en: The function `generate_initial_data` generates the purchase data for the first
    four weeks of 2024\. The file `run_generate_initial_data.py` is responsible for
    the execution of this function. This file defines the large language model used,
    in this case, `mistral-large-2407`, and stores the output data in the file `supermarket_purchases_data.csv`.
    **This file contains all annual purchases and will be the one that will be subsequently
    updated with new data**.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 `generate_initial_data` 生成 2024 年前四周的购买数据。文件 `run_generate_initial_data.py`
    负责执行此函数。该文件定义了所使用的语言模型，在本例中为 `mistral-large-2407`，并将输出数据存储在文件 `supermarket_purchases_data.csv`
    中。**此文件包含所有年度购买数据，并将是随后更新新数据的文件**。
- en: After running the file `run_generate_initial_data.py`, we can check that the
    initial data has been generated correctly. The following image shows the structure
    of the data, which aligns with the indications provided at the prompt.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 运行文件 `run_generate_initial_data.py` 后，我们可以检查初始数据是否已正确生成。以下图像显示了数据的结构，与提示中提供的指示相符。
- en: '![Structure of the Generated Data Based on the Provided Instructions in the
    Prompt (Image by the Author)](../Images/11a83ace4439d8d3bf74495da9ace3e0.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![根据提示中提供的指示生成的数据结构（作者提供图像）](../Images/11a83ace4439d8d3bf74495da9ace3e0.png)'
- en: Structure of the Generated Data Based on the Provided Instructions in the Prompt
    (Image by the Author)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 根据提示中提供的指示生成的数据结构（作者提供图像）
- en: Report Generation in a Jupyter Notebook
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 Jupyter Notebook 中生成报告
- en: '**The annual purchase data will be used to create an interactive report in
    a Jupyter Notebook that will allow us to track purchases.** The purchase data
    will be updated weekly and we want the created report to be updated at the same
    time the data is updated, without the need to open the Jupyter Notebook, execute
    all its cells, save the result, and then generate the corresponding HTML file.
    We are going to automate this whole process from Python.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**将使用年度购买数据在 Jupyter Notebook 中创建一个交互式报告，以便跟踪购买情况**。购买数据将每周更新，我们希望创建的报告与数据更新的同时更新，无需打开
    Jupyter Notebook，执行所有单元格，保存结果，然后生成相应的 HTML 文件。我们将从 Python 自动化整个流程。'
- en: The next section explains in detail the automation process for running the Jupyter
    Notebook and creating the HTML file when updating the data in the `supermarket_purchases_data.py`
    file. Now, we will focus on understanding how the interactive report was generated.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节将详细解释在 `supermarket_purchases_data.py` 文件中更新数据时运行 Jupyter Notebook 和创建 HTML
    文件的自动化过程。现在，我们将专注于理解交互式报告是如何生成的。
- en: Jupyter Notebooks are an interesting alternative for creating interactive reports,
    even for a non-technical audience. They allow you to create reports in which the
    code used is not shown, and only text, explanations, and graphics can be displayed.
    In addition, it can be exported as HTML files, allowing a user who does not have
    an integrated development environment installed on his or her computer to open
    the results in a browser easily.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: Jupyter Notebooks 是创建交互式报告的一个有趣替代方案，即使是针对非技术受众。它们允许您创建报告，其中不显示使用的代码，只显示文本、解释和图形。此外，它可以导出为
    HTML 文件，允许没有在计算机上安装集成开发环境（IDE）的用户轻松地在浏览器中打开结果。
- en: 'The report created in this article will be simple. It is a basic example to
    show the automation process. The report is composed of four sections:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 本文创建的报告将很简单。这是一个基本示例，用于展示自动化过程。报告由四个部分组成：
- en: '**Dataset structure**: this section presents the structure of the data set
    in table format. This allows the user to understand how the data is stored from
    which subsequent analysis is performed.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据集结构**：本节以表格形式展示数据集的结构。这使用户能够理解数据是如何存储的，从而进行后续分析。'
- en: '**Daily Expenditures and Cumulative Annual Expenditures**: for each product
    purchased, the date of purchase is specified. This section performs an analysis
    of the daily expenses throughout the year together with the cumulative annual
    expenses, i.e. how much money has been spent to date. To present these results,
    a line diagram is employed using the Plotly library. One of the lines represents
    the daily expenses and the other represents the cumulative annual expenses. The
    visualization has two distinct y-axes: the y-axis on the left shows the daily
    expenses and the y-axis on the right shows the cumulative annual expenses.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每日支出和累计年度支出**：对于每种购买的物品，指定了购买日期。本节对全年的每日支出以及累计年度支出进行了分析，即到目前为止已经花费了多少钱。为了展示这些结果，使用了
    Plotly 库的折线图。其中一条线代表每日支出，另一条线代表累计年度支出。可视化有两个不同的 y 轴：左侧的 y 轴显示每日支出，右侧的 y 轴显示累计年度支出。'
- en: '**Expenditure Breakdown by Category and Product**: in the purchase data set,
    each product belongs to a category. For example, salmon and tuna belong to the
    fish category. In this section, an analysis of spending by category and product
    is performed using a Sunburst chart. In this type of chart, each level of the
    hierarchy is presented as a concentric ring. In the first ring, the categories
    are shown, and in the second ring, the products. In this way, you can easily visualize
    the proportions in the data set in two different hierarchies: categories and products.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**按类别和产品拆分的支出**：在购买数据集中，每种产品属于一个类别。例如，三文鱼和金枪鱼属于鱼类类别。在本节中，使用旭日图对按类别和产品进行的支出进行了分析。在这种图表中，层次结构的每一级都表示为一个同心圆。在第一个圆环中显示类别，在第二个圆环中显示产品。这样，您可以轻松地可视化数据集中两个不同层次结构中的比例：类别和产品。'
- en: '**Expenditure Breakdown by Payment Method:** finally, an analysis is made of
    the payment methods used. There are a total of three payment methods used by the
    user: digital wallet, cash, and card. To visualize the total expenditure with
    each of these payment methods, a pie chart is used.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**按支付方式拆分的支出**：最后，对使用的支付方式进行了分析。用户总共使用了三种支付方式：数字钱包、现金和卡。为了可视化使用这些支付方式的支出总额，使用了饼图。'
- en: The following link shows the interactive report. In this Notebook, you can consult
    all the code used to generate the three analyses explained above. This report
    will be updated as new data is added to the `supermarket_purchases_data.csv` file.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 以下链接显示了交互式报告。在此笔记本中，您可以查阅用于生成上述三个分析的代码。当向 `supermarket_purchases_data.csv` 文件添加新数据时，此报告将进行更新。
- en: '[**Notebook on nbviewer**](https://nbviewer.org/gist/amandaiglesiasmoreno/6871eec693a44681ea83525f7b6b5392)'
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**nbviewer 上的笔记本**](https://nbviewer.org/gist/amandaiglesiasmoreno/6871eec693a44681ea83525f7b6b5392)'
- en: '![Section of the Report Generated in the Jupyter Notebook (Image by the Author)](../Images/1eeed79dcfbaac35fc4b51b2f07b6b36.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![在 Jupyter Notebook 中生成的报告部分（图片由作者提供）](../Images/1eeed79dcfbaac35fc4b51b2f07b6b36.png)'
- en: Section of the Report Generated in the Jupyter Notebook (Image by the Author)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Jupyter Notebook 中生成的报告部分（图片由作者提供）
- en: Jupyter Notebook Execution and HTML Report Generation with Python
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Python 在 Jupyter Notebook 中执行和生成 HTML 报告
- en: The report created in Jupyter Notebook analyzes the purchases made in the supermarket
    to date, which are stored in the dataset `supermarket_purchases_data.csv`.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Jupyter Notebook 中创建的报告分析了迄今为止在超市进行的购买，这些购买存储在数据集 `supermarket_purchases_data.csv`
    中。
- en: 'The objective is to run this report and create an updated HTML file each time
    the dataset is updated. To do this, the following two modules will be created:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是每次数据集更新时运行此报告并创建一个更新的 HTML 文件。为此，将创建以下两个模块：
- en: '`execute_notebook.py`: this module is in charge of executing the Jupyter Notebook
    provided as input argument. It uses `subprocess.run` to execute the notebook using
    `jupyter nbconvert`, so that the original notebook is overwritten with the execution
    results.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`execute_notebook.py`：此模块负责执行作为输入参数提供的 Jupyter Notebook。它使用 `subprocess.run`
    通过 `jupyter nbconvert` 执行笔记本，以便用执行结果覆盖原始笔记本。'
- en: '`convert_notebook_to_html.py`: this module is in charge of converting a Jupyter
    Notebook to an HTML file, omitting the cells with code in the generated file.
    The generated HTML report is stored in the reports folder, located at the same
    level as the notebooks folder.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`convert_notebook_to_html.py`：此模块负责将 Jupyter Notebook 转换为 HTML 文件，生成的文件中省略了包含代码的单元格。生成的
    HTML 报告存储在位于笔记本文件夹同一级别的 reports 文件夹中。'
- en: These functions are precisely the ones that will be executed at the same time
    that the `supermarket_purchases_data.csv` file is updated with new data. The following
    module simulates an update of the data with the purchases in the first week of
    February.
  id: totrans-49
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这些函数正是将在`supermarket_purchases_data.csv`文件用新数据更新时同时执行的那些函数。以下模块模拟了使用2月第一周购买的数据对数据进行更新。
- en: This module is used simultaneously with the previous two modules to ensure that
    when data is updated, the Jupyter Notebook is also run and the HTML report is
    updated.
  id: totrans-50
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此模块与前面两个模块同时使用，以确保当数据更新时，Jupyter Notebook也会运行，并且HTML报告也会更新。
- en: 'In this way, you can see that, simply with two functions: one in charge of
    executing a Jupyter Notebook and another in charge of converting a Jupyter Notebook
    to HTML format, you can ensure that all our notebooks, where we perform alternative
    analyses in our project, are updated as the data sets we are creating are also
    updated.'
  id: totrans-51
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以这种方式，你可以看到，仅通过两个函数：一个负责执行Jupyter Notebook，另一个负责将Jupyter Notebook转换为HTML格式，你可以确保所有我们的Notebooks，我们在项目中执行替代分析，都会随着我们创建的数据集的更新而更新。
- en: Below is the entire folder structure required for the execution of all the above
    scripts. A link to the GitHub repository is also provided.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是执行所有上述脚本所需的整个文件夹结构。还提供了一个GitHub仓库的链接。
- en: File and Folder Structure of the Pipeline
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 管道文件和文件夹结构
- en: 'Throughout the article, the code of the pipeline files has been shown. The
    files are structured in four folders:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在整篇文章中，管道文件的代码已被展示。文件被组织在四个文件夹中：
- en: '**data**: this folder contains the CSV files created. In this case, only one
    file will be created, `supermarket_purchases_data.csv`. This file has been synthetically
    created with an LLM and shows the purchases of food products made in a supermarket.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**data**: 此文件夹包含创建的CSV文件。在这种情况下，将仅创建一个文件，即`supermarket_purchases_data.csv`。此文件已通过LLM合成创建，显示了在超市购买的食品产品。'
- en: '**notebooks**: this folder contains the Jupyter Notebooks of the project. In
    this case, we have only one called `analysis_purchases.ipynb`. This Jupyter Notebook
    includes an analysis of supermarket shopping data.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**notebooks**: 此文件夹包含项目的Jupyter Notebooks。在这种情况下，我们只有一个名为`analysis_purchases.ipynb`的Notebook。此Jupyter
    Notebook包括对超市购物数据的分析。'
- en: '**reports**: this folder contains the interactive reports created from the
    Jupyter Notebooks in HTML format. In this case, there is only one interactive
    report called `analysis_purchases.html`. This report contains the same information
    as the notebook with the same name; however, the code used to generate the different
    visualizations is not shown in the report.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**reports**: 此文件夹包含从Jupyter Notebooks创建的交互式报告，格式为HTML。在这种情况下，只有一个交互式报告，名为`analysis_purchases.html`。此报告包含与同名笔记本相同的信息；然而，用于生成不同可视化的代码在报告中并未显示。'
- en: '**scripts**: this folder contains all pipeline scripts. The following files
    are available:'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**scripts**: 此文件夹包含所有管道脚本。以下文件可用：'
- en: '**`synthetic_data_utils.py`**: this module contains all the necessary functions
    to generate synthetic data to simulate shopping in a supermarket. These functions
    will be used both to generate the initial dataset and to create the assumed updates
    to that dataset.'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**`synthetic_data_utils.py`**: 此模块包含生成模拟超市购物所需的所有必要函数。这些函数将用于生成初始数据集以及创建该数据集的假设更新。'
- en: '**`generate_initial_data.py`**: this module is responsible for creating a synthetic
    dataset that simulates the purchases made in a supermarket during the first four
    weeks of January 2024.'
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**`generate_initial_data.py`**: 此模块负责创建模拟2024年1月前四周在超市购买的合成数据集。'
- en: '**`run_generate_initial_data.py`**: this module executes the code necessary
    to create the initial synthetic data and save the results in a CSV file.'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**`run_generate_initial_data.py`**: 此模块执行创建初始合成数据并保存结果到CSV文件的必要代码。'
- en: '**`execute_notebook.py`:** this module simulates, in a programmatic way, the
    execution of a Jupyter Notebook.'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**`execute_notebook.py`:** 此模块以编程方式模拟执行Jupyter Notebook。'
- en: '**`convert_notebook_to_html.py`:** this module programmatically simulates the
    conversion of a Jupyter Notebook to an HTML report.'
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**`convert_notebook_to_html.py`:** 此模块以编程方式模拟将Jupyter Notebook转换为HTML报告。'
- en: '**`update_data.py`**: this module simulates the updating of data with new purchases
    corresponding to the first week of February 2024.'
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**`update_data.py`**: 此模块模拟了与2024年2月第一周的新购买相对应的数据更新。'
- en: '**`process_pipeline.py`**: this module simulates the updating of data together
    with the execution of Jupyter Notebook and its conversion to HTML format.'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**`process_pipeline.py`**：此模块模拟了数据更新与Jupyter Notebook的执行及其转换为HTML格式的过程。'
- en: All these files can be downloaded from the following GitHub repository.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些文件都可以从以下GitHub仓库下载。
- en: '[**GitHub – amandaiglesiasmoreno/automated-notebook-reports: This repository
    demonstrates how to use…**](https://github.com/amandaiglesiasmoreno/automated-notebook-reports)'
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**GitHub – amandaiglesiasmoreno/automated-notebook-reports: 此仓库演示了如何使用…**](https://github.com/amandaiglesiasmoreno/automated-notebook-reports)'
- en: The GitHub repository already contains the file `supermarket_purchases_data.csv`
    with the purchases for the first four weeks of January; that is, the script `run_generate_initial_data.py`
    has already been executed. Now, we simply need to run the `process_pipeline.py`
    file. This file simulates a data update and executes the files needed to run the
    Jupyter Notebook and convert the notebook into an HTML file.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub仓库已经包含了`supermarket_purchases_data.csv`文件，其中包含了1月份前四周的购买记录；也就是说，已经执行了`run_generate_initial_data.py`脚本。现在，我们只需运行`process_pipeline.py`文件。此文件模拟数据更新，并执行运行Jupyter
    Notebook和将笔记本转换为HTML文件所需的文件。
- en: '* * *'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Jupyter Notebooks are an easy-to-run solution for displaying analysis results
    to a non-technical audience**. They allow you to **combine code with rich text
    and interactive visualizations and export the results in formats that simply require
    a browser installed on your computer, such as HTML**.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**Jupyter Notebooks是向非技术受众展示分析结果的一个易于运行的解决方案**。它们允许你**将代码与丰富的文本和交互式可视化相结合，并以HTML等格式导出结果，这些格式只需在计算机上安装浏览器即可**。'
- en: Analyses in **Jupyter Notebooks are often combined with code executed in scripts**.
    For this reason, it is necessary to look for solutions that allow running these
    notebooks also from Python scripts so that the pipeline and the analyses performed
    in Jupyter Notebooks are not decoupled in their execution.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在**Jupyter Notebooks中的分析通常与在脚本中执行的代码相结合**。因此，有必要寻找允许从Python脚本中运行这些笔记本的解决方案，以便Jupyter
    Notebooks中的管道和执行的分析在执行过程中不会解耦。
- en: This paper has generated a synthetic dataset that simulates shopping in a supermarket.
    From this dataset, an interactive report in HTML format has been created using
    a Jupyter Notebook, where the purchases made so far in the supermarket are analyzed.
    **A pipeline has been implemented so that, every time the file containing all
    the supermarket purchases is updated, the Jupyter Notebook is executed and the
    interactive report in HTML format is also updated**.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 本文生成了一个模拟超市购物的合成数据集。从这个数据集中，使用Jupyter Notebook创建了一个HTML格式的交互式报告，其中分析了超市到目前为止的购买情况。**已实施了一个管道，以便每次更新包含所有超市购买记录的文件时，都会执行Jupyter
    Notebook，并更新HTML格式的交互式报告**。
- en: In this way, **we ensure that the interactive report created from the data always
    shows the latest data available and is generated from an updated data set**. This
    is a simple example, but the same concept can be applied to larger projects with
    more data sets and interactive reports.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式，**我们确保从数据创建的交互式报告始终显示最新的可用数据，并且是从更新的数据集中生成的**。这是一个简单的例子，但同样的概念可以应用于包含更多数据集和交互式报告的更大项目。
- en: Thanks for reading.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读。
- en: Amanda Iglesias
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: Amanda Iglesias
