- en: Using Vision Language Models to Process Millions of Documents
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用视觉语言模型处理数百万份文档
- en: 原文：[https://towardsdatascience.com/using-vision-language-models-to-process-millions-of-documents/](https://towardsdatascience.com/using-vision-language-models-to-process-millions-of-documents/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/using-vision-language-models-to-process-millions-of-documents/](https://towardsdatascience.com/using-vision-language-models-to-process-millions-of-documents/)
- en: <mdspan datatext="el1758823911383" class="mdspan-comment">Vision language models</mdspan>
    (VLMs) are powerful machine-learning models that can process both visual and textual
    information. With the recent release of Qwen 3 VL, I want to make a deep dive
    into how you can utilize these powerful VLMs to process documents.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758823911383" class="mdspan-comment">视觉语言模型</mdspan>（VLMs）是强大的机器学习模型，可以处理视觉和文本信息。随着Qwen
    3 VL的最近发布，我想深入探讨如何利用这些强大的VLMs来处理文档。
