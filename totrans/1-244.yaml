- en: Why you need to use VLMs
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你需要使用VLMs
- en: To highlight why some tasks require VLMs, I want to start off with an example
    task, where we need to interpret text and the visual information of text.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 为了强调为什么某些任务需要VLMs，我想从一个示例任务开始，我们需要解释文本和文本的视觉信息。
- en: Imagine you look at the image below. The checkboxes represent whether a document
    should be included in a report or not, and now you need to determine which documents
    to include.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 想象你正在查看下面的图像。复选框代表文档是否应该包含在报告中，现在你需要确定包含哪些文档。
- en: '![](../Images/604cc72dfe8d640c8fbec26a2bdc0844.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/604cc72dfe8d640c8fbec26a2bdc0844.png)'
- en: This figure highlights a suitable problem for VLMs. You have an image containing
    text about documents, along with checkboxes. You now need to determine which documents
    have been checked off the checkboxes. This is difficult to solve with LLMs, because
    you first need to apply OCR to the image. The text then loses its visual position,
    which is required to properly solve the task. With VLMs, you can easily both read
    the text in the document, and utilize its visual position (if the text is above
    a checked off checkbox or not), and successfully solve the task. Image by the
    author.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 此图突出了VLMs（视觉语言模型）适用的合适问题。你有一个包含关于文档文本和复选框的图像。你现在需要确定哪些文档被勾选了。使用LLMs（语言学习模型）解决这个问题很困难，因为你首先需要将图像应用OCR（光学字符识别）。文本随后会失去其视觉位置，这是正确解决任务所必需的。使用VLMs，你可以轻松地读取文档中的文本，并利用其视觉位置（如果文本位于勾选的复选框上方或下方），并成功解决这个任务。图片由作者提供。
- en: For a human, this is a simple task; obviously, documents 1 and 3 should be included,
    while document 2 should be excluded. However, if you tried to solve this problem
    through a pure LLM, you would encounter issues.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人类来说，这是一个简单的任务；显然，文档1和3应该包含在内，而文档2应该排除。然而，如果你试图通过纯LLM解决这个问题，你会遇到问题。
- en: To run a pure LLM, you would first need to OCR the image, where the OCR output
    would look something like below, if you use [Google’s Tesseract](https://github.com/tesseract-ocr/tesseract),
    for example, which extracts the text line by line.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行纯LLM，你首先需要OCR图像，例如，如果你使用[Google的Tesseract](https://github.com/tesseract-ocr/tesseract)，OCR输出将类似于以下内容，它逐行提取文本。
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: As you might have already discovered, the LLM will have issues deciding which
    documents to include, because it’s impossible to know which documents the Xs belong
    to. This is just one of many scenarios where VLMs are extremely efficient at solving
    a problem.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如你可能已经发现的，LLM在决定包含哪些文档时会遇到问题，因为无法知道Xs属于哪些文档。这只是许多场景中VLMs在解决问题上极其高效的一个例子。
- en: 'The main point here is that knowing which documents have a checkboxed X requires
    both visual and textual information. You need to know the text and the visual
    position of the text in the image. I summarize this in the quote below:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的主要观点是，知道哪些文档有勾选的X需要视觉和文本信息。你需要知道文本及其在图像中的视觉位置。以下是我对此的总结：
- en: VLMs are required when the meaning of text depends on its visual position
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当文本的意义取决于其视觉位置时，需要使用VLMs。
- en: Application areas
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用领域
- en: There are a plethora of areas you can apply VLMs to. In this section, I’ll cover
    some different areas where VLMs have proven useful, and where I have also successfully
    applied VLMs.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将VLMs应用到许多领域。在本节中，我将介绍一些VLMs已被证明有用的不同领域，以及我也成功应用VLMs的领域。
- en: Agentic use cases
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代理用例
- en: Agents are in the wind nowadays, and VLMs also play a role in this. I’ll highlight
    two main areas where VLMs can be used in an agentic context, though there are
    naturally many other such areas.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 代理现在很流行，VLMs也在其中扮演着角色。我将强调两个VLMs可以在代理环境中使用的主要领域，尽管自然有许多其他这样的领域。
- en: '**Computer use**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**计算机使用**'
- en: Computer use is an interesting use case for VLMs. With computer use, I refer
    to a VLM looking at a frame from your computer and deciding which action to take
    next. One example of this is [OpenAI’s Operator](https://openai.com/index/introducing-operator/).
    This can, for example, be looking at a frame of this article you’re reading right
    now, and scrolling down to read more from this article.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机使用是VLMs（视觉语言模型）的一个有趣的应用案例。我所说的计算机使用是指VLM查看你的计算机上的一个帧，并决定下一步采取什么行动。一个例子是[OpenAI的Operator](https://openai.com/index/introducing-operator/)。例如，它可以查看你现在正在阅读的这篇文章的某个帧，并滚动下来阅读更多内容。
- en: VLMs are useful for computer use, because LLMs are not enough to decide which
    actions to take. When operating on a computer, you often have to interpret the
    visual position of buttons and information, which, as I described in the beginning,
    is one of the prime areas of use for VLMs.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: VLMs在计算机使用中很有用，因为LLMs（大型语言模型）不足以决定采取哪些行动。在操作计算机时，你通常必须解释按钮和信息的位置，正如我在一开始所描述的，这是VLMs的主要应用领域之一。
- en: '**Debugging**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**调试**'
- en: Debugging code is also a super useful agentic application area for VLMs. Imagine
    that you are developing a web application, and discover a bug.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 调试代码也是VLMs的一个超级有用的代理应用领域。想象一下，你正在开发一个网络应用程序，并发现了一个错误。
- en: One option is to start logging to the console, copy the logs, describe to Cursor
    what you did, and prompt Cursor to fix it. This is naturally time-consuming, as
    it requires a lot of manual steps from the user.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一个选择是从控制台开始记录日志，复制日志，向Cursor描述你做了什么，并提示Cursor修复它。这自然是耗时的，因为它需要用户进行许多手动步骤。
- en: Another option is thus to utilize VLMs to better solve the problem. Ideally,
    you describe how to reproduce the issue, a VLM can go into your application, recreate
    the flow, check out the issue, and thus debug what is going wrong. There are applications
    being built for areas like this, though most have not come far in development
    from what I’ve seen.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个选择是利用VLM更好地解决问题。理想情况下，你描述如何重现问题，VLM可以进入你的应用程序，重现流程，检查问题，从而调试出哪里出了问题。虽然我看到的大多数此类领域都在开发中，但有一些应用正在被构建。
- en: Question answering
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问答
- en: Utilizing VLMs for visual question answering is one of the classic approaches
    to using VLMs. Question answering is the use case I described earlier in this
    article about figuring out which checkbox belongs to which documents. You feed
    the VLM with a user question, and an image (or several images), for the VLM to
    process. The VLM will then provide an answer in text format. You can see how this
    process works in the figure below.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 利用VLMs进行视觉问答是使用VLMs的经典方法之一。问答是我在本文中早些时候描述的使用案例，即确定哪个复选框属于哪个文档。你向VLM提供用户问题和一个（或多个）图像，让VLM进行处理。然后，VLM将以文本格式提供答案。你可以在下面的图中看到这个过程是如何工作的。
- en: '![](../Images/f96486c654180ace736d5793a88a28c2.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f96486c654180ace736d5793a88a28c2.png)'
- en: This figure highlights a question answering task where I’ve utilized a VLM to
    solve the problem. You feed in the image containing the problem, and the question
    containing the task to solve. The VLM then processes this information and outputs
    the expected information. Image by the author,
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图突出显示了一个问答任务，我利用VLM来解决这个问题。你提供包含问题的图像和要解决的问题的任务。然后，VLM处理这些信息并输出预期的信息。图由作者提供，
- en: You should, however, weigh the trade-offs of using VLMs vs LLMs. Naturally,
    when a task requires textual and visual information, you need to utilize VLMs
    to get a proper result. However, VLMs are also usually much more expensive to
    run, as they need to process more tokens. This is because images contain a lot
    of information, which thus leads to many input tokens to process.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，你应该权衡使用VLM与LLM之间的权衡。自然地，当任务需要文本和视觉信息时，你需要利用VLM来获得适当的结果。然而，VLM通常运行成本也更高，因为它们需要处理更多的标记。这是因为图像包含大量信息，因此导致许多输入标记需要处理。
- en: Furthermore, if the VLM is to process text, you also need high-resolution images,
    allowing the VLM to interpret the pixels making up letters. With lower resolutions,
    the VLM struggles to read the text in the images, and you’ll receive low-quality
    results.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果VLM要处理文本，你还需要高分辨率的图像，以便VLM可以解释组成字母的像素。分辨率较低时，VLM难以读取图像中的文本，你将得到低质量的结果。
- en: Classification
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分类
- en: '![](../Images/7b361bb63e21711519d58f42ef2d3ad0.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7b361bb63e21711519d58f42ef2d3ad0.png)'
- en: This figure covers how you can apply VLMs to classification tasks. You feed
    the VLM with an image of a document, and a question to classify the document into
    one of a pre-defined set of categories. These categories should be included in
    the question, but are not included in the figure because of space limitations.
    The VLM then outputs the predicted classification label. Image by the author.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了如何将VLM应用于分类任务。你将文档的图像和用于将文档分类到预定义类别集合中的问题输入到VLM中。这些类别应包含在问题中，但由于空间限制，它们没有包含在图中。然后VLM输出预测的分类标签。图片由作者提供。
- en: Another interesting application area for VLMs is classification. With classification,
    I refer to the situation where you have a predetermined set of categories and
    need to determine which category an image belongs to.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: VLM的另一个有趣的应用领域是分类。在分类中，我指的是你有一个预定的类别集合，需要确定图像属于哪个类别。
- en: You can utilize VLMs for classification, with the same approach as using LLMs.
    You create a structured prompt containing all relevant information, including
    the possible output categories. Furthermore, you preferably cover the different
    edge cases, for example, in scenarios where two categories are both very probable,
    and the VLM has to decide between the two categories.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用VLM进行分类，与使用LLM的方法相同。你创建一个包含所有相关信息的结构化提示，包括可能的输出类别。此外，你最好涵盖不同的边缘情况，例如，在两个类别都非常可能的情况下，VLM必须在两个类别之间做出决定。
- en: 'You can, for example, have a prompt such as:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以有一个这样的提示：
- en: '[PRE1]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Information extraction
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 信息提取
- en: You can also effectively utilize VLMs for information extraction, and there
    are a lot of information extraction tasks requiring visual information. You create
    a similar prompt to the classification prompt I created above, and typically prompt
    the VLM to respond in a structured format, such as a JSON object.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以有效地利用VLM进行信息提取，有许多需要视觉信息的信息提取任务。你创建一个与我上面创建的分类提示相似的提示，并通常提示VLM以结构化格式响应，例如JSON对象。
- en: When performing information extraction, you need to consider how many data points
    you want to extract. For example, if you need to extract 20 different data points
    from a document, you probably don’t want to extract all of them at once. This
    is because the model will likely struggle to accurately extract that much information
    in one go.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在执行信息提取时，你需要考虑你想要提取多少数据点。例如，如果你需要从一个文档中提取20个不同的数据点，你可能不想一次性提取所有这些数据。这是因为模型可能难以一次性准确提取这么多信息。
- en: Instead, you should consider splitting up the task, for example, extracting
    10 data points, with two different requests, simplifying the task for the model.
    On the other side of the argument, you’ll sometimes encounter that some data points
    are related to each other, meaning they should be extracted in the same request.
    Furthermore, sending several requests increases the inference cost.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，你应该考虑将任务拆分，例如，通过两个不同的请求提取10个数据点，简化模型的任务。另一方面，有时你会遇到一些数据点相互关联的情况，这意味着它们应该在同一个请求中提取。此外，发送多个请求会增加推理成本。
- en: '![](../Images/2ad3912429ba7a8830dd6055ad89d498.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2ad3912429ba7a8830dd6055ad89d498.png)'
- en: This figure highlights how you can utilize VLMs to perform information extraction.
    You again feed the VLM the image of the document, and also prompt the VLM to extract
    specific data points. In this figure, I prompt the VLM to extract the date of
    the document, the location mentioned in the document, and the document type. The
    VLM then analyzes the prompt and the document image, and outputs a JSON object
    containing the requested information. Image by the author.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 此图突出了如何利用VLM进行信息提取。你再次向VLM提供文档的图像，并提示VLM提取特定的数据点。在此图中，我提示VLM提取文档的日期、文档中提到的位置和文档类型。然后VLM分析提示和文档图像，并输出包含所需信息的JSON对象。图由作者提供。
- en: When VLMs are problematic
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当VLM出现问题时
- en: VLMs are amazing models that can perform tasks that were unimaginable to solve
    with AI just a few years ago. However, they also have their limitations, which
    I’ll cover in this section.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: VLM是令人惊叹的模型，可以执行几年前用AI无法想象的任务。然而，它们也有自己的局限性，我将在本节中介绍。
- en: Cost of running VLMs
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运行VLM的成本
- en: The first limitation is the cost of running VLMs, which I’ve also briefly discussed
    earlier in this article. VLMs process images, which consist of a lot of pixels.
    These pixels represent a lot of information, which is encoded into tokens that
    the VLM can process. The issue is that since images contain so much information,
    you need to create a lot of tokens per image, which again increases the cost to
    run VLMs.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个限制是运行VLM的成本，我在本文中也简要讨论过。VLM处理图像，这些图像由许多像素组成。这些像素代表大量信息，这些信息被编码成VLM可以处理的标记。问题是由于图像包含如此多的信息，你需要为每张图像创建大量标记，这又增加了运行VLM的成本。
- en: Furthermore, you often need high-resolution images, since the VLM is required
    to read text in images, leading to even more tokens to process. VLMs are thus
    expensive to run, both over an API, but in compute costs if you decide to self-host
    the VLM.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，你通常需要高分辨率的图像，因为VLM需要读取图像中的文本，从而导致需要处理的标记数量更多。因此，VLM在API上运行以及如果你决定自行托管VLM时的计算成本都相对较高。
- en: Cannot process long documents
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 无法处理长文档
- en: The amount of tokens contained in images also limits the number of pages a VLM
    can process at once. VLMs are limited by their context windows, just like traditional
    LLMs. This is a problem if you want to process long documents containing hundreds
    of pages. Naturally, you could split the document into chunks, but you might encounter
    problems where the VLM doesn’t have access to all the contents of the document
    in one go.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图像中包含的标记数量也限制了VLM一次可以处理的页面数量。VLM受其上下文窗口的限制，就像传统的LLM一样。如果你想要处理包含数百页的长文档，这会成为一个问题。自然地，你可以将文档分成块，但你可能会遇到VLM无法一次性访问文档所有内容的问题。
- en: For example, if you have a 100-page document, you could first process pages
    1-50, and then process pages 51-100\. However, if some information on page 53
    might need the context from page 1 (for example, the title or date of the document),
    this will lead to issues.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你有一个100页的文档，你可以首先处理第1-50页，然后处理第51-100页。然而，如果第53页上的某些信息可能需要第1页的上下文（例如，文档的标题或日期），这将会导致问题。
- en: To learn how to deal with this problem, I read Qwen 3’s cookbook, where they
    have a page on [how to utilize Qwen 3 for ultralong documents.](https://github.com/QwenLM/Qwen3-VL/blob/main/cookbooks/long_document_understanding.ipynb)
    I’ll be sure to test this out and discuss how well it works in a future article.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 为了了解如何解决这个问题，我阅读了Qwen 3的食谱，其中有一页介绍了[如何利用Qwen 3处理超长文档的方法](https://github.com/QwenLM/Qwen3-VL/blob/main/cookbooks/long_document_understanding.ipynb)。我一定会测试这个方法，并在未来的文章中讨论其效果如何。
- en: Conclusion
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I’ve discussed vision language models and how you can apply
    them to different problem areas. I first described how to integrate VLMs in agentic
    systems, for example, as a computer use agent, or to debug web applications. Continuing,
    I covered areas such as question answering, classification, and information extraction.
    Lastly, I also covered some limitations of VLMs, discussing the computational
    cost of running VLMs and how they struggle with long documents.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我讨论了视觉语言模型以及如何将它们应用于不同的问题领域。我首先描述了如何将VLM集成到代理系统中，例如作为计算机使用代理或用于调试Web应用程序。继续，我涵盖了问答、分类和信息提取等领域。最后，我还讨论了VLM的一些局限性，包括运行VLM的计算成本以及它们在处理长文档时的挑战。
