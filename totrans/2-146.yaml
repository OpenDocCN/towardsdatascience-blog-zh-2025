- en: The Future of AI Agent Communication with ACP
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-future-of-ai-agent-communication-with-acp/](https://towardsdatascience.com/the-future-of-ai-agent-communication-with-acp/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1752595818813" class="mdspan-comment">It’s</mdspan> exciting
    to see the GenAI industry beginning to move toward standardisation. We might be
    witnessing something similar to the early days of the internet, when HTTP (HyperText
    Transfer Protocol) first emerged. When Tim Berners-Lee developed HTTP in 1990,
    it provided a simple yet extensible protocol that transformed the internet from
    a specialised research network into the globally accessible World Wide Web. By
    1993, web browsers like Mosaic had made HTTP so popular that web traffic quickly
    outpaced other systems.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: One promising step in this direction is MCP (Model Context Protocol), developed
    by Anthropic. MCP is gaining popularity with its attempts to standardise the interactions
    between LLMs and external tools or data sources. More recently ([*the first commit*](https://github.com/i-am-bee/acp/commit/19e4c708153e23b529d09cdc6e23f0e95ef8a933)
    *is dated April 2025*), a new protocol called ACP (Agent Communication Protocol)
    appeared. It complements MCP by defining the ways in which agents can communicate
    with each other.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f47c02bebd2e9067ff2f85195455f3f0.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
- en: Example of architecure | Image by author
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I would like to discuss what ACP is, why it can be helpful
    and how it can be used in practice. We will build a multi-agent AI system for
    interacting with data.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: ACP overview
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before jumping into practice, let’s take a moment to understand the theory behind
    ACP and how it works under the hood.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: ACP (Agent Communication Protocol) is an open protocol designed to address the
    growing challenge of connecting AI agents, applications, and humans. The current
    GenAI industry is quite fragmented, with different teams building agents in isolation
    using various, often incompatible frameworks and technologies. This fragmentation
    slows down innovation and makes it difficult for agents to collaborate effectively.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: To address this challenge, ACP aims to standardise communication between agents
    via RESTful APIs. The protocol is framework- and technology-agnostic, meaning
    it can be used with any agentic framework, such as LangChain, CrewAI, smolagents,
    or others. This flexibility makes it easier to build interoperable systems where
    agents can seamlessly work together, regardless of how they were originally developed.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: This protocol has been developed as an open standard under the Linux Foundation,
    alongside BeeAI (its reference implementation). One of the key points the team
    emphasises is that ACP is openly governed and shaped by the community, rather
    than a group of vendors.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: What benefits can ACP bring?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '**Easily replaceable agents.** With the current pace of innovation in the GenAI
    space, new cutting-edge technologies are emerging all the time. ACP enables agents
    to be swapped in production seamlessly, reducing maintenance costs and making
    it easier to adopt the most advanced tools when they become available.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enabling collaboration between multiple agents** **built on different frameworks.**
    As we know from people management, specialisation often leads to better results.
    The same applies to agentic systems. The group of agents, each focused on a specific
    task (like writing Python code or researching the web), can often outperform a
    single agent trying to do everything. ACP makes it possible for such specialised
    agents to communicate and work together, even if they are built using different
    frameworks or technologies.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**New opportunities for partnerships.** With a unified standard for agents’
    communication, it would be easier for agents to collaborate, sparking new partnerships
    between different teams within the company or even different companies. Imagine
    a world where your smart home agent notices the temperature dropping unusually,
    determines that the heating system has failed, and checks with your utility provider’s
    agent to confirm there are no planned outages. Finally, it books a technician
    coordinating the visit with your Google Calendar agent to make sure you’re home.
    It may sound futuristic, but with ACP, it can be pretty close.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We’ve covered what ACP is and why it matters. The protocol looks quite promising.
    So, let’s put it to the test and see how it works in practice.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: ACP in practice
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s try ACP in a classic “talk to data” use case. To use the benefit of ACP
    being framework agnostic, we will build ACP agents with different frameworks:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '**SQL Agent** with CrewAI to compose SQL queries'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DB Agent** with HuggingFace smolagents to execute those queries.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*I won’t go into the details of each framework here, but if you’re curious,
    I’ve written in-depth articles on both of them:'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – [“Multi AI Agent Systems 101”](https://towardsdatascience.com/multi-ai-agent-systems-101-bac58e3bcc47/)
    about CrewAI,
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '– [“Code Agents: The Future of Agentic AI”](https://towardsdatascience.com/code-agents-the-future-of-agentic-ai/)
    about smolagents.*'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Building DB Agent
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s start with the DB agent. As I mentioned earlier, ACP could be complemented
    by MCP. So, I will use tools from my analytics toolbox through the MCP server.
    You can find the MCP server implementation on [GitHub](https://github.com/miptgirl/mcp-analyst-toolkit).
    For a deeper dive and step-by-step instructions, check [my previous article](https://towardsdatascience.com/your-personal-analytics-toolbox/),
    where I covered MCP in detail.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: 'The code itself is pretty straightforward: we initialise the ACP server and
    use the `@server.agent()` decorator to define our agent function. This function
    expects a list of messages as input and returns a generator.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: We will also need to set up a Python environment. I will be using `uv` package
    manager for this.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Then, we can run the agent using the following command.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: If everything is set up correctly, you will see a server running on port 8001\.
    We will need an ACP client to verify that it’s working as expected. Bear with
    me, we will test it shortly.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Building the SQL agent
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before that, let’s build a SQL agent that will compose queries. We will use
    the CrewAI framework for this. Our agent will reference the knowledge base of
    questions and queries to generate answers. So, we will equip it with a RAG (Retrieval
    Augmented Generation) tool.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: First, we will initialise the RAG tool and load the reference file `clickhouse_queries.txt`.
    Next, we will create a CrewAI agent by specifying its role, goal and backstory.
    Finally, we’ll create a task and bundle everything together into a Crew object.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We will also need to add any missing packages to `uv` before running the server.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now, the second agent is running on port 8002\. With both servers up and running,
    it’s time to check whether they are working properly.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Calling an ACP agent with a client
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that we’re ready to test our agents, we’ll use the ACP client to run them
    synchronously. For that, we need to initialise a Client with the server URL and
    use the `run_sync` function specifying the agent’s name and input.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: SELECT COUNT(DISTINCT user_id) AS total_customers
  id: totrans-43
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: FROM ecommerce.users
  id: totrans-44
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: WHERE is_active = 1
  id: totrans-45
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AND user_id IN (
  id: totrans-46
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: SELECT DISTINCT user_id
  id: totrans-47
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: FROM ecommerce.sessions
  id: totrans-48
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: WHERE action_date >= '2024-05-01' AND action_date < '2024-06-01'
  id: totrans-49
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: )
  id: totrans-50
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: format TabSeparatedWithNames
  id: totrans-51
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'async def example() -> None:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: 'async with Client(base_url="http://localhost:8001") as db_agent, Client(base_url="http://localhost:8002")
    as sql_agent:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: question = 'How many customers did we have in May 2024?'
  id: totrans-55
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: sql_query = await sql_agent.run_sync(
  id: totrans-56
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: agent="sql_agent", input=question
  id: totrans-57
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: )
  id: totrans-58
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: print('SQL query generated by SQL agent:')
  id: totrans-59
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: print(sql_query.output[0].parts[0].content)
  id: totrans-60
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: answer = await db_agent.run_sync(
  id: totrans-61
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: agent="db_agent", input=sql_query.output[0].parts[0].content
  id: totrans-62
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: )
  id: totrans-63
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: print('Answer from DB agent:')
  id: totrans-64
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: print(answer.output[0].parts[0].content)
  id: totrans-65
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: asyncio.run(example())
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'SQL query generated by SQL agent:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: 'Thought: I need to craft a SQL query to count the number of unique customers'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: who were active in May 2024 based on their sessions.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Answer from DB agent:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '234544'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
