- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this article, we’ve explored the ACP protocol and its capabilities. Here’s
    the quick recap of the key points:'
  prefs: []
  type: TYPE_NORMAL
- en: ACP (Agent Communication Protocol) is an open protocol that aims to standardise
    communication between agents. It complements MCP, which handles interactions between
    agents and external tools and data sources.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ACP follows a client-server architecture and uses RESTful APIs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The protocol is technology- and framework-agnostic, allowing you to build interoperable
    systems and create new collaborations between agents seamlessly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With ACP, you can implement a wide range of agent interactions, from simple
    chaining in well-defined workflows to the router pattern, where an orchestrator
    can delegate tasks dynamically to other agents.
  prefs:
  - PREF_UL
