- en: 'Simulating Flood Inundation with Python and Elevation Data: A Beginner’s Guide'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/simulating-flood-inundation-with-python-and-elevation-data-a-beginners-guide/](https://towardsdatascience.com/simulating-flood-inundation-with-python-and-elevation-data-a-beginners-guide/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1748629760179" class="mdspan-comment">Floods and inundations</mdspan>
    have become more frequent and devastating across the globe, with the effects of
    climate change in recent decades. In this context, flood modeling has an important
    role in risk assessment and disaster-response operations, while also remaining
    a key focus of advanced research and academic studies.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we’ll build a basic flood inundation model using Python and
    a Digital Elevation Model (DEM). We’ll use a flood fill technique to incrementally
    simulate how rising water levels affect a landscape and animate the inundation
    process. It’s a visual and hands-on way to explore geospatial data and flood risks,
    even without a background in hydraulic modeling.
  prefs: []
  type: TYPE_NORMAL
