- en: 1\. What is a Digital Elevation Model (DEM)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A **Digital Elevation Model (DEM)** is a numerical representation of the Earth’s
    surface, where each cell (or pixel) in a regular grid (known as raster data) contains
    an elevation value. Unlike digital images that store color information, DEMs store
    height data, typically excluding surface features like vegetation, buildings,
    and other man-made structures.
  prefs: []
  type: TYPE_NORMAL
- en: DEMs are commonly used in fields such as mapping, hydrology, environmental monitoring,
    and earth sciences. They serve as a foundational dataset for any application that
    requires a detailed understanding of terrain and elevation.
  prefs: []
  type: TYPE_NORMAL
- en: Many sources offer free and reliable DEM data, including the **USGS National
    Map**, **NASA Earthdata**, and the **Shuttle Radar Topography Mission (SRTM)**.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we’ll be using a DEM provided by the **[USGS National Geospatial
    Program](https://earthexplorer.usgs.gov/)**, which is freely available and released
    into the public domain.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: The data provided by USGS has a spatial resolution of 1 arc second (approximately
    30 meters at the equator).'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The area of interest (AOI) in this study is located in the Northeast region
    of Brazil. The DEM file covers a 1° × 1° tile, extending from 6°S, 39°W to 5°S,
    38°W, and utilizes the WGS84 coordinate system (EPSG: 4326), as illustrated below.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/08bb9457b26527ce250fb35d43a93f06.png)'
  prefs: []
  type: TYPE_IMG
- en: Area of Interest (image by the author using Google Maps and QGIS).
  prefs: []
  type: TYPE_NORMAL
- en: 2\. How to load and visualize elevation data with Python
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now we’ll use Python to set a viable environment to visualize and analyze some
    initial information about DEM data. First, let’s import the necessary libraries.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**`rasterio`**: Reads and writes geospatial raster data like DEMs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`matplotlib.pyplot`**: Creates static and interactive visualizations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`numpy`**: Handles numerical operations and array-based data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`FuncAnimation`**: Generates animations by updating plots frame by frame.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Next, let’s use the **`rasterio`** library to open and visualize a DEM file
    of the AOI.
  prefs: []
  type: TYPE_NORMAL
- en: '**Loading DEM data**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The function above reads the elevation data and checks whether the file includes
    “no-data values”. No-data values are used to represent areas without valid elevation
    data (e.g., outside coverage or corrupted pixels). If a no-data value is present,
    the function replaces those pixels with `np.nan`, making it easier to handle or
    ignore them in later analysis and visualizations.
  prefs: []
  type: TYPE_NORMAL
- en: '**Visualizing DEM data**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '**Result**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/154480241899e60f698f83164120a373.png)'
  prefs: []
  type: TYPE_IMG
- en: 'DEM of the AOI (Credit: U.S. Geological Survey)'
  prefs: []
  type: TYPE_NORMAL
- en: '**Using geographic coordinates in the visualization**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As we can see, the axes are in pixel coordinates (columns and lines). To better
    understand flood inundation, it’s vital to know the geographic coordinates (latitude
    and longitude) associated with each pixel of the image.
  prefs: []
  type: TYPE_NORMAL
- en: 'To achieve that, we’ll use the coordinate reference system data of the DEM
    file. As said earlier, the DEM we are using utilizes the WGS84 coordinate system
    (EPSG: 4326).'
  prefs: []
  type: TYPE_NORMAL
- en: 'We can adapt the helper function to load DEM files as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The function retrieves the *transform* data from the DEM, which is an affine
    object that maps pixel positions (row, column) to geographic coordinates (latitude
    and longitude).
  prefs: []
  type: TYPE_NORMAL
- en: To represent the geographic coordinates on the axes of the plot, it’ll be necessary
    to explore the `extent` parameter from the `imshow()` function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The `extent` parameter will be used to define the spatial bounds of the DEM
    plot using values derived from the raster’s `transform` affine object. It sets
    the minimum and maximum longitude (`xmin`, `xmax`) and latitude (`ymin`, `ymax`)
    so that the plot shows coordinates on the axes instead of pixel indices.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, we have the following results:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2ac07c0360632f835b819ec35e052f80.png)'
  prefs: []
  type: TYPE_IMG
- en: 'DEM visualization with geographic coordinates (Credit: U.S. Geological Survey).'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. How to simulate flood scenarios with elevation thresholds
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, we’ll demonstrate a simple yet useful method for visualizing flood scenarios
    and simulating inundation. It consists of defining a height threshold and generating
    a binary mask that identifies all areas with elevation below this level.
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we simulate flooding across all areas with elevations below
    40 meters.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '**Result**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/24655ac4968579953bb0eceb30549fb3.png)'
  prefs: []
  type: TYPE_IMG
- en: Flooded area simulation (image by the author).
  prefs: []
  type: TYPE_NORMAL
- en: With just a few lines of code, we can visualize the impact of different flood
    scenarios on the area of interest (AOI). However, because this visualization is
    static, it doesn’t show how the flood progresses over time. To deal with that,
    we’ll use matplotlib’s **`FuncAnimation`** to create a dynamic visualization.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. How to animate flood progression with Python
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’ll now simulate a progressive flood scenario by increasing the water level
    incrementally and generating a new mask at each step. We’ll overlay this mask
    on the terrain image and animate it.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '**Results**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/59ccce86be5ef5d277f50ddfe7dae16a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Flood progression (Credit: U.S. Geological Survey)'
  prefs: []
  type: TYPE_NORMAL
- en: If you’re interested in creating animations with Python, this step-by-step [tutorial](https://contributor.insightmediagroup.io/make-your-data-move-creating-animations-in-python-for-science-and-machine-learning/)
    is a great place to start.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Conclusion and next steps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, we created a basic workflow to perform a flood simulation in
    Python using elevation data from a DEM file. Of course, this model doesn’t implement
    the most advanced techniques on the subject, still for visualization and communication,
    this elevation threshold method offers a powerful and accessible entry point.
  prefs: []
  type: TYPE_NORMAL
- en: 'More advanced simulation techniques include:'
  prefs: []
  type: TYPE_NORMAL
- en: Connectivity-based flood propagation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Flow direction and accumulation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Time-based flow modeling
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nevertheless, this hands-on approach can be of great benefit for educators,
    students, and analysts exploring geospatial data in disaster response studies
    and environmental modeling.
  prefs: []
  type: TYPE_NORMAL
- en: The complete code is available [here](https://github.com/Marcussena/flood-inundation-fill-method).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I strongly encourage readers to experiment with the code using their own elevation
    data, adapt it to their specific context, and explore ways to enhance or expand
    the approach.
  prefs: []
  type: TYPE_NORMAL
