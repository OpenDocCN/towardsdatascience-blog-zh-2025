- en: How to Maximize Technical Events — NVIDIA GTC Paris 2025
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-maximize-technical-events-nvidia-gtc-paris-2025/](https://towardsdatascience.com/how-to-maximize-technical-events-nvidia-gtc-paris-2025/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1751472277885" class="mdspan-comment">In this</mdspan> article,
    I discuss how you can get the most out of attending technical events as a data
    scientist, ML engineer, or other similar roles. Attending events can be challenging,
    as there are numerous ways to spend your time. I will thus discuss how to prioritize
    your time between talking to experts, attending presentations and panels, and
    visiting company booths. There are also other ways to improve your experience,
    such as proper preparation ahead of the event and reflecting on your learnings,
    both of which I will discuss in this article.
  prefs: []
  type: TYPE_NORMAL
- en: The inspiration for this article stems from my attendance at [NVIDIA GTC Paris
    2025](https://www.nvidia.com/en-eu/gtc/) as a data scientist from [Findable](https://www.findable.ai/) from
    June 10 to 12, 2025\. I will thus discuss my experience at the event, what I learned,
    and how you can approach similar events to get the most out of them.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7f53a99ccf57790819a0286a5bd6c3e8.png)'
  prefs: []
  type: TYPE_IMG
- en: The event was set in the city of Paris, France. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: '*You can also read *[*my article on OpenAI Whisper for transcriptions*](https://towardsdatascience.com/use-openai-whisper-for-automated-transcriptions/)*.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Disclaimer: I am not sponsored by NVIDIA in any way, and they did not influence
    the contents of this article.'
  prefs: []
  type: TYPE_NORMAL
- en: 'I will split this article into four main segments:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Motivation**: My motivation for attending the event and writing this article'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Preparation** before the event'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**During** the event'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reflections after** the event'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is to highlight the thought process I went through before, during, and
    after attending the event.
  prefs: []
  type: TYPE_NORMAL
- en: Motivation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: My motivation for this article is that I was attending NVIDIA GTC Paris 2025\.
    This marked my first time at a large conference like this, and thus, I spent some
    time figuring out how to best spend my time at the event.
  prefs: []
  type: TYPE_NORMAL
- en: I attended the event as an employee of [Findable](https://findable.no/), and
    went there to improve my technical knowledge, discuss AI with smart people, and
    hopefully learn a lot. I believe going to such events can be an immense learning
    experience, but to get the most out of the events, you have to prepare and strictly
    prioritize how you spend your time.
  prefs: []
  type: TYPE_NORMAL
- en: My goal for the article is to share my experience at the event, and inform you
    how you can get the most out of similar technical events.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/24621a0265257ba8c929dd0dad351fe3.png)'
  prefs: []
  type: TYPE_IMG
- en: NVIDIA is the largest manufacturer of GPU’s. This image shows the rack for a
  prefs: []
  type: TYPE_NORMAL
- en: '**NVIDIA DGX GB200** compute system. Image by the author,'
  prefs: []
  type: TYPE_NORMAL
- en: Planning ahead of the event
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before the event, [NVIDIA](https://www.nvidia.com/en-us/) put out a [full session
    overview](https://www.nvidia.com/en-eu/gtc/conference-schedule/) on their page.
    I went through all the sessions on their page, and selected up to the top three
    sessions I wanted to attend per timeslot. Sometimes, less than three were relevant
    to me, in which I just selected the relevant sessions. I also put the sessions
    in a prioritized order.
  prefs: []
  type: TYPE_NORMAL
- en: I then put all of the relevant sessions into my calendar, as you can see in
    the image below. As you can see, I packed my calendar to be as full as possible.
    I believe this is a good starting point, and if you find out during an event that
    you want to do something else, you can of course decide to prioritize that. For
    example, on Wednesday, June 11., I found out there would be a discussion with
  prefs: []
  type: TYPE_NORMAL
- en: Jensen Huang – CEO [NVIDIA](https://www.nvidia.com/en-us/)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Arthur Mensch – CEO [Mistral](https://mistral.ai/)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Emmanuel Macron – President of France
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This naturally outweighed the other plans I had that evening, and I decided
    to attend that discussion instead, which turned out to be an inspiring talk.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fc653223972be5131f56de52b5477dfd.png)'
  prefs: []
  type: TYPE_IMG
- en: This image shows my calendar for the event. As you can see, I made sure to fill
    up my calendar as much as possible to get the most out of the event. In each session
    slot in my calendar, I also entered the possible sessions I wanted to attend at
    that time, along with the room numbers. This made it easy to find my way to the
    next relevant session when I was at the event. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: And that was most of the planning I did for the event. Other than this, I mostly
    took things on the fly during the event.
  prefs: []
  type: TYPE_NORMAL
- en: During the event
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There were three days to the event
  prefs: []
  type: TYPE_NORMAL
- en: 'Tuesday, June 10: I attended an [LLM Workshop](https://developer.nvidia.com/blog/nvidia-deep-learning-institute-offers-multilingual-ai-training-at-gtc-paris/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Wednesday, June 11: Jensen’s Keynote and some sessions in the afternoon'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Thursday, June 12: Sessions the entire day'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tuesday June 10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'On my first day at the event, I attended the workshop on [adding new knowledge
    to LLMs](https://developer.nvidia.com/blog/nvidia-deep-learning-institute-offers-multilingual-ai-training-at-gtc-paris/).
    This was an interesting workshop going through topics such as:'
  prefs: []
  type: TYPE_NORMAL
- en: Data cleaning/curation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluation (LLM as a judge, etc)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Knowledge injection (fine-tuning)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LLM compression (distillation)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/6097583810e3bfdfcefbc73b98aa9f59.png)'
  prefs: []
  type: TYPE_IMG
- en: This image is from the Adding new knowledge to LLM’s workshop. Image by the
    author.
  prefs: []
  type: TYPE_NORMAL
- en: This was an insightful workshop, and I would recommend attending similar workshops
    if they are relevant to you and your work. I also met some interesting people
    at the workshop, with whom I got to have insightful technical discussions.
  prefs: []
  type: TYPE_NORMAL
- en: However, I believe the most effective thing you can do at such a workshop is
    **to discuss with the instructors.** In reflections after the workshop, I realized
    I spent too little time discussing with the instructors, because in a lot of cases,
    they would be really smart people working at NVIDIA, who could give you insights
    into different AI topics. If I were to attend a workshop like this again, I would
    spend more time in advance **preparing questions to ask during the workshop.**
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2ad55919888816d480219cf3dc7d6126.png)'
  prefs: []
  type: TYPE_IMG
- en: 'During the event, I also got a free certification exam, which I attended and
    passed. The exam was NVIDIA Certified Associate: Multimodal generative AI. After
    passing the exam, they gave me a physical copy of the certification, as you can
    see in the image. Image by the author.'
  prefs: []
  type: TYPE_NORMAL
- en: Wednesday/Thursday, June 11/12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are a number of things you can spend your time on during these days.
    Most notably:'
  prefs: []
  type: TYPE_NORMAL
- en: Attending presentations/panel discussions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Going to the company booths
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Attending the *connect with experts* sessions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Connect with expert sessions are events where you sit around a small table,
    among a few other attendees, and you get to ask questions to an NVIDIA employee.
    The events typically had a set topic; however, you could, in theory, ask any question.
  prefs: []
  type: TYPE_NORMAL
- en: '**Connect with expert sessions were by far the most valuable sessions I attended
    during my time at GTC Paris.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The main reasons for this are:'
  prefs: []
  type: TYPE_NORMAL
- en: The NVIDIA employees present at the event were super intelligent and could,
    in most cases, give me a really good response to my questions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I was able to ask questions about business-specific problems (that I, for example,
    face at Findable) and receive answers to those. This is naturally much better
    than only asking questions about general AI topics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To elaborate on the last bullet point: In connection with expert sessions,
    you are meant to ask a question. This could be as general as:'
  prefs: []
  type: TYPE_NORMAL
- en: How do I use LLMs for classification?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: However, it is often difficult for people to answer such generic questions,
    as it is difficult to know where to begin answering the question. To solve this
    problem, you can provide them with an example (or, in many cases, the NVIDIA employees
    will ask for a specific example). You can then provide them an example of a specific
    problem you are working on at your business, and receive a very specific response,
    which in many cases will be far more valuable.
  prefs: []
  type: TYPE_NORMAL
- en: As an example, I would add to my question
  prefs: []
  type: TYPE_NORMAL
- en: In Norway we have a classification standard for building documents, where they
    have to be sorted into around 300 different categories. The categories are for
    example “Electrical cables”, “Ventilation system”, “Furniture” and so on.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Providing an example like this both makes it easier for the NVIDIA employee
    to answer your question and makes the response to the question more relevant for
    you. It’s a win-win!
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0728f34a1fc7c0e3d3080434db400496.png)'
  prefs: []
  type: TYPE_IMG
- en: Jensen Huang’s Keynote. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: 'I would also like to add that you can, in many cases, connect with NVIDIA employees
    by asking questions after their presentation/panel discussion. You can do this
    by:'
  prefs: []
  type: TYPE_NORMAL
- en: Asking a question in front of everyone on the microphone
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finding the speaker(s) after the sessions and asking questions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Connecting with them on LinkedIn and asking your question there.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Also, I did attend some presentations on June 10\. and 11\. that were insightful.
    However, I also experienced that a lot of sessions only covered topics at a very
    high level, or only covered NVIDIA-specific tools, and did not truly provide useful
    insights for me in my work. This is why I decided to spend more time on the connect
    with experts sessions.
  prefs: []
  type: TYPE_NORMAL
- en: Reflecting after the event
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After the event, I reflected on everything I learned throughout the three-day
    attendance. I had a lot of impressions after those days, from meeting so many
    new people, picking up a lot of new knowledge, and in general, by being in an
    environment with a lot of smart people, working on similar stuff to what I am
    working on.
  prefs: []
  type: TYPE_NORMAL
- en: On my way home from the event, I therefore
  prefs: []
  type: TYPE_NORMAL
- en: Went through all my notes. I made sure to take notes from every session I attended.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Went through the material I received during the event. Mostly Jupyter Notebooks
    and presentations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Connected with people I met on LinkedIn
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Later on, I also watched some replays from the event, which you can [watch on
    demand.](https://www.nvidia.com/en-us/on-demand/?regcode=em-news-473524&ncid=em-news-473524)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I also believe that when attending such events, the best ideas may sometimes
    come from your own mind. So it’s not necessarily what someone says to you, but
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, I talked with an NVIDIA expert about fine-tuning LLMs, and he
    mentioned how teacher-student models are very important in today’s landscape.
    Hearing this made me think about when I was working on fine-tuning Qwen 2.5 VL,
    and that I might have missed a part of the LoRA fine-tuning that made model performance
    a lot worse than it could have been. I try to sum this concept up in a single
    quote below:'
  prefs: []
  type: TYPE_NORMAL
- en: When attending events, the most valuable insights often arise from your own
    thoughts inspired by conversations—not just from what someone directly says.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: After some reflections, I will now also provide some positive and negative sides
    with attending the event
  prefs: []
  type: TYPE_NORMAL
- en: Upsides of the event
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You get to meet a lot of smart people working on similar problems to you
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You get a condensed set of useful information (a lot of what you learn at the
    event can also be found online); however, there is also a lot of noise on the
    web. At the event, most of the information is of high quality
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Downsides of the event
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It can sometimes feel like searching for gold in Klondike when speaking to people.
    You might have to speak to a lot of people before you find someone with the right
    expertise and interest to help you on your exact problem
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It takes a lot of time. I spent three full days at the event, which naturally
    could be used in a lot of different ways
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I discussed how to effectively attend technical events, drawing
    on my experience attending NVIDIA GTC Paris 2025\. I explained how you should
    plan the event ahead of time and determine which sessions you want to attend,
    and I highlighted how I personally learned most from speaking to different experts
    (particularly NVIDIA employees), rather than attending presentations and panel
    discussions. Reflecting on the event afterwards is also important, going through
    all your notes and the material you got from the event. Attending technical events,
    such as NVIDIA GTC, can be immensely helpful for gathering new ideas, connecting
    with interesting people, and hopefully, enhancing your engineering skills.
  prefs: []
  type: TYPE_NORMAL
