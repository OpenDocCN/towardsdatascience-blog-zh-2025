- en: Virtualization & Containers for Data Science Newbies
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 虚拟化与容器化，数据科学新手的入门指南
- en: 原文：[https://towardsdatascience.com/virtualization-containers-for-data-science-newbies/](https://towardsdatascience.com/virtualization-containers-for-data-science-newbies/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/virtualization-containers-for-data-science-newbies/](https://towardsdatascience.com/virtualization-containers-for-data-science-newbies/)
- en: Virtualization makes it possible to run multiple virtual machines (VMs) on a
    single piece of physical hardware. These VMs behave like independent computers,
    but share the same physical computing power. A computer within a computer, so
    to speak.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 虚拟化使得在单一物理硬件上运行多个虚拟机（VMs）成为可能。这些虚拟机表现得像独立的计算机，但共享相同的物理计算能力。可以说是计算机中的计算机。
- en: Many cloud services rely on virtualization. But other technologies, such as
    containerization and serverless computing, have become increasingly important.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 许多云服务依赖于虚拟化。但其他技术，如容器化和无服务器计算，也变得越来越重要。
- en: Without virtualization, many of the digital services we use every day would
    not be possible. Of course, this is a simplification, as some cloud services also
    use bare-metal infrastructures.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 没有虚拟化，我们每天使用的许多数字服务将无法实现。当然，这是一个简化，因为一些云服务也使用裸金属基础设施。
- en: In this article, you will learn how to set up your own virtual machine on your
    laptop in just a few minutes — even if you have never heard of cloud computing
    or containers before.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，你将学习如何在几分钟内在你的笔记本电脑上设置自己的虚拟机——即使你之前从未听说过云计算或容器。
