- en: '1 — The Origins of Cloud Computing: From Mainframes to Serverless Architecture'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Cloud computing has fundamentally changed the IT landscape — but its roots go
    back much further than many people think. In fact, the history of the cloud began
    back in the 1950s with huge mainframes and so-called dumb terminals.
  prefs: []
  type: TYPE_NORMAL
- en: '**The era of mainframes in the 1950s:** Companies used mainframes so that several
    users could access them simultaneously via dumb terminals. The central mainframes
    were designed for high-volume, business-critical data processing. [Large companies](https://www.ibm.com/docs/en/zos-basic-skills?topic=vmt-who-uses-mainframes-why-do-they-do-it) still
    use them today, even if cloud services have reduced their relevance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Time-sharing and virtualization:** In the next decade (1960s), [time-sharing](https://www.ibm.com/history/time-sharing) made
    it possible for multiple users to access the same computing power simultaneously
    — an early model of today’s cloud. Around the same time, IBM pioneered [virtualization](https://en.wikipedia.org/wiki/Virtualization),
    allowing multiple virtual machines to run on a single piece of hardware.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The birth of the internet and web-based applications in the 1990s:** Six
    years before I was born, Tim Berners-Lee developed the [World Wide Web](https://de.wikipedia.org/wiki/World_Wide_Web),
    which revolutionized online communication and our entire working and living environment.
    Can you imagine our lives today without internet? At the same time, PCs were becoming
    increasingly popular. In 1999, [Salesforce](https://de.wikipedia.org/wiki/Salesforce) revolutionized
    the software industry with Software as a Service (SaaS), allowing businesses to
    use CRM solutions over the internet without local installations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The big breakthrough of cloud computing in the 2010s:**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The modern cloud era began in 2006 with [Amazon Web Services (AWS)](https://en.wikipedia.org/wiki/Timeline_of_Amazon_Web_Services):
    Companies were able to flexibly rent infrastructure with S3 (storage) and EC2
    (virtual servers) instead of buying their own servers. Microsoft Azure and Google
    Cloud followed with PaaS and IaaS services.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**The modern cloud-native era:** This was followed by the next innovation with
    containerization. [Docker](https://en.wikipedia.org/wiki/Docker_(software)) made
    containers popular in 2013, followed by [Kubernetes](https://en.wikipedia.org/wiki/Kubernetes) in
    2014 to simplify the orchestration of containers. Next came serverless computing
    with AWS Lambda and Google Cloud Functions, which enabled developers to write
    code that automatically responds to events. The infrastructure is fully managed
    by the cloud provider.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cloud computing is more the result of decades of innovation than a single new
    technology. From time-sharing to virtualization to serverless architectures, the
    IT landscape has continuously evolved. Today, cloud computing is the foundation
    for streaming services like Netflix, AI applications like ChatGPT and global platforms
    like Salesforce.
  prefs: []
  type: TYPE_NORMAL
- en: '2 — Understanding Virtualization: Why Virtualization is the Basis of Cloud
    Computing'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Virtualization means abstracting physical hardware, such as servers, storage
    or networks, into multiple virtual instances.
  prefs: []
  type: TYPE_NORMAL
- en: Several independent systems can be operated on the same physical infrastructure.
    Instead of dedicating an entire server to a single application, virtualization
    enables multiple workloads to share resources efficiently. For example, Windows,
    Linux or another environment can be run simultaneously on a single laptop — each
    in an isolated virtual machine.
  prefs: []
  type: TYPE_NORMAL
- en: This saves costs and resources.
  prefs: []
  type: TYPE_NORMAL
- en: 'Even more important, however, is the scalability: Infrastructure can be flexibly
    adapted to changing requirements.'
  prefs: []
  type: TYPE_NORMAL
- en: Before cloud computing became widely available, companies often had to maintain
    dedicated servers for different applications, leading to high infrastructure costs
    and limited scalability. If more performance was suddenly required, for example
    because webshop traffic increased, new hardware was needed. The company had to
    add more servers (horizontal scaling) or upgrade existing ones (vertical scaling).
  prefs: []
  type: TYPE_NORMAL
- en: 'This is different with virtualization: For example, I can simply upgrade my
    virtual Linux machine from 8 GB to 16 GB RAM or assign 4 cores instead of 2\.
    Of course, only if the underlying infrastructure supports this. More on this later.'
  prefs: []
  type: TYPE_NORMAL
- en: 'And this is exactly what cloud computing makes possible: The cloud consists
    of huge data centers that use virtualization to provide flexible computing power
    — exactly when it is needed. So, virtualization is a fundamental technology behind
    cloud computing.'
  prefs: []
  type: TYPE_NORMAL
- en: How does serverless computing work?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What if you didn’t even have to manage virtual machines anymore?
  prefs: []
  type: TYPE_NORMAL
- en: Serverless computing goes one step further than virtualization and containerization.
    The cloud provider handles most infrastructure tasks — including scaling, maintenance
    and resource allocation. Developers should focus on writing and deploying code.
  prefs: []
  type: TYPE_NORMAL
- en: But does serverless really mean that there are no more servers?
  prefs: []
  type: TYPE_NORMAL
- en: Of course not. The servers are there, but they are invisible for the user. Developers
    no longer have to worry about them. Instead of manually provisioning a virtual
    machine or container, you simply deploy your code, and the cloud automatically
    executes it in a managed environment. Resources are only provided when the code
    is running. For example, you can use AWS Lambda, Google Cloud Functions or Azure
    Functions.
  prefs: []
  type: TYPE_NORMAL
- en: What are the advantages of serverless?
  prefs: []
  type: TYPE_NORMAL
- en: As a developer, you don’t have to worry about scaling or maintenance. This means
    that if there is a lot more traffic at a particular event, the resources are automatically
    adjusted. Serverless computing can be cost-efficient, especially in Function-as-a-Service
    (FaaS) models. If nothing is running, you pay nothing. However, some serverless
    services have baseline costs (e.g. Firestore).
  prefs: []
  type: TYPE_NORMAL
- en: Are there any disadvantages?
  prefs: []
  type: TYPE_NORMAL
- en: You have much less control over the infrastructure and no direct access to the
    servers. There is also a risk of vendor lock-in. The applications are strongly
    tied to a cloud provider.
  prefs: []
  type: TYPE_NORMAL
- en: '**A concrete example of serverless: API without your own server**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Imagine you have a website with an API that provides users with the current
    weather. Normally, a server runs around the clock — even at times when no one
    is using the API.
  prefs: []
  type: TYPE_NORMAL
- en: 'With AWS Lambda, things work differently: A user enters ‘Mexico City’ on your
    website and clicks on ‘Get weather’. This request triggers a Lambda function in
    the background, which retrieves the weather data and sends it back. The function
    is then stopped automatically. This means you don’t have a permanently running
    server and no unnecessary costs — you only pay when the code is executed.'
  prefs: []
  type: TYPE_NORMAL
- en: 3 — What Data Scientists should Know about Containers and VMs — What’s the Difference?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You’ve probably heard of containers. But what is the difference to virtual machines
    — and what is particularly relevant as a data scientist?
  prefs: []
  type: TYPE_NORMAL
- en: Both containers and virtual machines are virtualization technologies.
  prefs: []
  type: TYPE_NORMAL
- en: Both make it possible to run applications in isolation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Both offer advantages depending on the use case: While VMs provide strong security,
    containers excel in speed and efficiency.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The main difference lies in the architecture:'
  prefs: []
  type: TYPE_NORMAL
- en: Virtual machines virtualize the entire hardware — including the operating system.
    Each VM has its own operational system (OS). This in turn requires more memory
    and resources.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Containers, on the other hand, share the host operating system and only virtualize
    the application layer. This makes them significantly lighter and faster.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Put simply, virtual machines simulate entire computers, while containers only
    encapsulate applications.
  prefs: []
  type: TYPE_NORMAL
- en: Why is this important for data scientists?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Since as a data scientist you will come into contact with machine learning,
    data engineering or data pipelines, it is also important to understand something
    about containers and virtual machines. Sure, you don’t need to have in-depth knowledge
    of it like a DevOps Engineer or a Site Reliability Engineer (SRE).
  prefs: []
  type: TYPE_NORMAL
- en: Virtual machines are used in data science, for example, when a complete operating
    system environment is required — such as a Windows VM on a Linux host. Data science
    projects often need specific environments. With a VM, it is possible to provide
    exactly the same environment — regardless of which host system is available.
  prefs: []
  type: TYPE_NORMAL
- en: A VM is also needed when training deep learning models with GPUs in the cloud.
    With cloud VMs such as AWS EC2 or Azure Virtual Machines, you have the option
    of training the models with GPUs. VMs also completely separate different workloads
    from each other to ensure performance and security.
  prefs: []
  type: TYPE_NORMAL
- en: Containers are used in data science for data pipelines, for example, where tools
    such as Apache Airflow run individual processing steps in Docker containers. This
    means that each step can be executed in isolation and independently of each other
    — regardless of whether it involves loading, transforming or saving data. Even
    if you want to deploy machine learning models via Flask / FastAPI, a container
    ensures that everything your model needs (e.g. Python libraries, framework versions)
    runs exactly as it should. This makes it super easy to deploy the model on a server
    or in the cloud.
  prefs: []
  type: TYPE_NORMAL
- en: 3 — Create a Virtual Machine with VirtualBox
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s make this a little more concrete and create an Ubuntu VM. 🚀
  prefs: []
  type: TYPE_NORMAL
- en: I use the VirtualBox software with my Windows Lenovo laptop. The virtual machine
    runs in isolation from your main operating system so that no changes are made
    to your actual system. If you have Windows Pro Edition, you can also enable Hyper-V
    (pre-installed by default, but disabled). With an Intel Mac, you should also be
    able to use VirtualBox. With an Apple Silicon, Parallels Desktop or UTM is apparently
    the better alternative (not tested myself).
  prefs: []
  type: TYPE_NORMAL
- en: 1) Install Virtual Box
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first step is to download the installation file for VirtualBox from the
    official [Virtual Box website](https://www.oracle.com/ch-de/virtualization/technologies/vm/downloads/virtualbox-downloads.html?intcmp=%3Aow%3Ao%3Ap%3Anav%3AmmddyyVirtualBoxHero_ch-de) and
    install VirtualBox. VirtualBox is installed including all necessary drivers.
  prefs: []
  type: TYPE_NORMAL
- en: You can ignore the note about missing dependencies Python Core / win32api as
    long as you do not want to automate VirtualBox with Python scripts.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then we start the Oracle VirtualBox Manager:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e23ba3edc8900790b7b1e1750c1b459f.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author
  prefs: []
  type: TYPE_NORMAL
- en: 2) Download the Ubuntu ISO file
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we download the Ubuntu ISO file from the [Ubuntu website](https://ubuntu.com/download/desktop).
    An ISO Ubuntu file is a compressed image file of the Ubuntu operating system.
    This means that it contains a complete copy of the installation data. I download
    the LTS version because this version receives security and maintenance updates
    for 5 years (Long Term Support). Note the location of the .iso file as we will
    use it later in VirtualBox.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e7c7ac5ddee4a91f5c7c29bee5f1b76d.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author
  prefs: []
  type: TYPE_NORMAL
- en: 3) Create a virtual machine in VirtualBox
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we create a new virtual machine in the VirtualBox Manager and give it
    the name Ubuntu VM 2025\. Here we select Linux as the type and Ubuntu (64-bit)
    as the version. We also select the previously downloaded ISO file from Ubuntu
    as the ISO image. It would also be possible to add the ISO file later in the mass
    storage menu.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/21dda5f096f27edcb6f5c4bd7a04eb17.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author
  prefs: []
  type: TYPE_NORMAL
- en: Next, we select a user name vboxuser2025 and a password for access to the Ubuntu
    system. The hostname is the name of the virtual machine within the network or
    system. It must not contain any spaces. The domain name is optional and would
    be used if the network has multiple devices.
  prefs: []
  type: TYPE_NORMAL
- en: We then assign the appropriate resources to the virtual machine. I choose 8
    GB (8192 MB) RAM, as my host system has 64 GB RAM. I recommend 4GB (4096) as a
    minimum. I assign 2 processors, as my host system has 8 cores and 16 logical processors.
    It would also be possible to assign 4 cores, but this way I have enough resources
    for my host system. You can find out how many cores your host system has by opening
    the Task Manager in Windows and looking at the number of cores under the Performance
    tab under CPU.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/758f2b2ec2c19ca3b6541417f089cf11.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author
  prefs: []
  type: TYPE_NORMAL
- en: Next, we click on ‘Create a virtual hard disk now’ to create a virtual hard
    disk. A VM requires its own virtual hard disk to install the OS (e.g. Ubuntu,
    Windows). All programs, files and configurations of the VM are stored on it —
    just like on a physical hard disk. The default value is 25 GB. If you want to
    use a VM for machine learning or data science, more storage space (e.g. 50–100
    GB) would be useful to have room for large data sets and models. I keep the default
    setting.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can then see that the virtual machine has been created and can be used:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0a683060358c05991583affe6e2bf203.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author
  prefs: []
  type: TYPE_NORMAL
- en: 4) Use Ubuntu VM
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can now use the newly created virtual machine like a normal separate operating
    system. The VM is completely isolated from the host system. This means you can
    experiment in it without changing or jeopardizing your main system.
  prefs: []
  type: TYPE_NORMAL
- en: If you are new to Linux, you can try out basic commands like ls, cd, mkdir or
    sudo to get to know the terminal. As a data scientist, you can set up your own
    development environments, install Python with Pandas and Scikit-learn to develop
    data analysis and machine learning models. Or you can install PostgreSQL and run
    SQL queries without having to set up a local database on your main system. You
    can also use Docker to create containerized applications.
  prefs: []
  type: TYPE_NORMAL
- en: Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since the VM is isolated, we can install programs, experiment and even destroy
    the system without affecting the host system.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see if virtual machines remain relevant in the coming years. As companies
    increasingly use microservice architectures (instead of monoliths), containers
    with Docker and Kubernetes will certainly become even more important. But knowing
    how to set up a virtual machine and what it is used for is certainly useful.
  prefs: []
  type: TYPE_NORMAL
- en: I simplify tech for curious minds. If you enjoy my tech insights on Python,
    data science, data engineering, machine learning and AI, consider subscribing
    to my [substack](https://sarahleaschrch.substack.com/?utm_source=substack&utm_medium=web&utm_campaign=substack_profile).
  prefs: []
