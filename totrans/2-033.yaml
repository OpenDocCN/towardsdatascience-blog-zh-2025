- en: Can LangExtract Turn Messy Clinical Notes into Structured Data?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LangExtract能否将混乱的临床笔记转换为结构化数据？
- en: 原文：[https://towardsdatascience.com/can-langextract-turn-messy-clinical-notes-into-structured-data/](https://towardsdatascience.com/can-langextract-turn-messy-clinical-notes-into-structured-data/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/can-langextract-turn-messy-clinical-notes-into-structured-data/](https://towardsdatascience.com/can-langextract-turn-messy-clinical-notes-into-structured-data/)
- en: '* * *'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '[LangExtract](https://github.com/google/langextract) is a <mdspan datatext="el1755561940478"
    class="mdspan-comment">new open-source project</mdspan> from [developers at Google](https://developers.googleblog.com/en/introducing-langextract-a-gemini-powered-information-extraction-library/)
    that makes it easy to turn messy, unstructured text into clean, structured data
    by leveraging LLMs. Users can provide a few few-shot examples along with a custom
    schema and get results based on that. It works both with proprietary as well as
    local LLMs (via Ollama).'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '[LangExtract](https://github.com/google/langextract) 是来自 [Google的开发者](https://developers.googleblog.com/en/introducing-langextract-a-gemini-powered-information-extraction-library/)
    的新开源项目，它通过利用LLM，使将混乱、非结构化文本转换为干净、结构化数据变得容易。用户可以提供一些示例，以及一个自定义模式，并根据这些结果获得结果。它既适用于专有LLM，也适用于本地LLM（通过Ollama）。'
- en: A significant amount of data in healthcare is unstructured, making it an ideal
    area where a tool like this can be beneficial. Clinical notes are long and full
    of abbreviations and inconsistencies. Important details such as drug names, dosages,
    and especially adverse drug reactions (ADRs) get buried in the text. Therefore,
    for this article, I wanted to see if LangExtract could handle adverse drug reaction
    (ADR) detection in clinical notes. More importantly, is it effective? Let’s find
    out in this article. Note that while LangExtract is an open-source project from
    developers at Google, it is not an officially supported Google product.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 医疗保健中有大量数据是非结构化的，这使得它是一个理想的领域，在这个领域中，这样的工具可以大有裨益。临床笔记很长，充满了缩写和不一致性。重要的细节，如药物名称、剂量，尤其是不良反应（ADRs），都隐藏在文本中。因此，对于这篇文章，我想看看LangExtract是否能够处理临床笔记中的不良反应（ADR）检测。更重要的是，它是否有效？让我们在这篇文章中找出答案。请注意，虽然LangExtract是来自Google开发者的开源项目，但它不是一个官方支持的Google产品。
- en: '***Just a quick note: I’m only showing how LangExtract works. I’m not a doctor,
    and this isn’t medical advice.***'
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***仅作快速说明：我只是在展示LangExtract的工作原理。我不是医生，这也不是医疗建议。***'
- en: '**▶️ Here is a detailed** [**Kaggle notebook**](https://www.kaggle.com/code/parulpandey/using-langextract-with-gemini)
    **to follow along.**'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**▶️ 这里有一个详细的** [**Kaggle笔记本**](https://www.kaggle.com/code/parulpandey/using-langextract-with-gemini)
    **来跟随。**'
- en: Why ADR Extraction Matters
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么ADR提取很重要
- en: An **Adverse Drug Reaction** (ADR) is a harmful, unintended result caused by
    taking a medication. These can range from mild side effects like nausea or dizziness
    to severe outcomes that may require medical attention.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**不良反应**（ADR）是服用药物引起的有害、非预期结果。这些可能从轻微的副作用，如恶心或头晕，到可能需要医疗注意的严重后果。'
- en: '![](../Images/b47d8bcebedaa0c2f0f31bea189edc83.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b47d8bcebedaa0c2f0f31bea189edc83.png)'
- en: Patient takes medicine for headache but develops stomach pain; a typical Adverse
    Drug Reaction (ADR) | Image created by author using ChatGPT
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 患者因头痛服用药物但出现胃痛；一个典型的不良反应（ADR） | 图像由作者使用ChatGPT创建
- en: Detecting them quickly is critical for patient safety and [pharmacovigilance](https://www.who.int/teams/regulation-prequalification/regulation-and-safety/pharmacovigilance).
    The challenge is that in clinical notes, ADRs are buried alongside past conditions,
    lab results, and other context. As a result, detecting them is tricky. Using LLMs
    to detect ADRs is an ongoing area of research. Some [recent works](https://pmc.ncbi.nlm.nih.gov/articles/PMC12084699/#section22-20420986251339358)
    have shown that LLMs are good at raising red flags but not reliable. So, ADR extraction
    is a good stress test for LangExtract, as the goal here is to see if this library
    can spot the adverse reactions amongst other entities in clinical notes like medications,
    dosages, severity, etc.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 快速检测它们对于患者安全和[药物警戒](https://www.who.int/teams/regulation-prequalification/regulation-and-safety/pharmacovigilance)至关重要。挑战在于，在临床笔记中，ADR被埋藏在过去的状况、实验室结果和其他上下文中。因此，检测它们很棘手。使用LLM来检测ADR是一个持续的研究领域。一些[最近的研究](https://pmc.ncbi.nlm.nih.gov/articles/PMC12084699/#section22-20420986251339358)表明，LLM擅长提出红旗，但并不可靠。因此，ADR提取是LangExtract的一个很好的压力测试，因为这里的目的是看看这个库是否能在临床笔记中的其他实体（如药物、剂量、严重程度等）中识别出不良反应。
- en: How LangExtract Works
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LangExtract是如何工作的
- en: 'Before we jump into usage, let’s break down LangExtract’s workflow. It’s a
    simple three-step process:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入使用之前，让我们分解LangExtract的工作流程。它是一个简单的三步过程：
- en: '**Define your extraction task** by writing a clear prompt that specifies exactly
    what you want to extract.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**通过编写一个清晰的提示来定义你的提取任务**，明确指出你想要提取的内容。'
- en: '**Provide a few high-quality examples** to guide the model towards the format
    and level of detail you expect.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提供一些高质量的示例**来引导模型朝向你期望的格式和详细程度发展。'
- en: '**Submit your input text, choose the model, and let LangExtract process it.**
    Users canthen review the results, visualize them, or pass them directly into their
    downstream pipeline.'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提交你的输入文本，选择模型，并让LangExtract处理它**。用户可以随后审查结果，可视化它们，或直接将它们传递到他们的下游管道。'
- en: '*The official [GitHub repository](https://github.com/google/langextract/tree/main)
    of the tool has detailed examples spanning multiple domains, from entity extraction
    in Shakespeare’s Romeo & Juliet to medication identification in clinical notes
    and structuring radiology reports. Do check them out.*'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*该工具的官方[GitHub 仓库](https://github.com/google/langextract/tree/main)包含了多个领域的详细示例，从莎士比亚的《罗密欧与朱丽叶》中的实体提取到临床笔记中的药物识别和放射学报告的结构化。请务必查看。*'
- en: Installation
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装
- en: First we need to install the `LangExtract` library. It’s always a good idea
    to do this within a [virtual environment](https://docs.python.org/3/library/venv.html)
    to keep your project dependencies isolated.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要安装`LangExtract`库。在[虚拟环境](https://docs.python.org/3/library/venv.html)中这样做总是一个好主意，以保持你的项目依赖项隔离。
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Identifying Adverse Drug Reactions in Clinical Notes with LangExtract & Gemini
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用LangExtract和Gemini在临床笔记中识别不良反应
- en: 'Now let’s get to our use case. For this walkthrough, I’ll use Google’s **Gemini
    2.5 Flash** model. You could also use **Gemini Pro** for more complex reasoning
    tasks. You’ll need to first set your API key:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们来看我们的用例。在这个教程中，我将使用谷歌的**Gemini 2.5 Flash**模型。你也可以使用**Gemini Pro**来处理更复杂的推理任务。你首先需要设置你的API密钥：
- en: '[PRE1]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**▶️ Here is a detailed** [**Kaggle notebook**](https://www.kaggle.com/code/parulpandey/using-langextract-with-gemini)
    **to follow along.**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**▶️ 这里有一个详细的** [**Kaggle 笔记本**](https://www.kaggle.com/code/parulpandey/using-langextract-with-gemini)
    **供你参考。**'
- en: 'Step 1: Define the Extraction Task'
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：定义提取任务
- en: Let’s create our prompt for extracting medications, dosages, adverse reactions,
    and actions taken. We can also ask for severity where mentioned.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个用于提取药物、剂量、不良反应和采取的措施的提示。我们还可以要求提供提及的严重程度。
- en: '[PRE2]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/f456d61a224a6c1cabb9d336a948ebf9.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f456d61a224a6c1cabb9d336a948ebf9.png)'
- en: The note highlights ibuprofen (400 mg), the adverse reaction (mild stomach pain),
    and the action taken (stopping the medicine). This is what ADR extraction looks
    like in practice. | Image by Author
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 笔记突出了布洛芬（400 mg）、不良反应（轻微胃痛）和采取的措施（停止用药）。这就是ADR提取在实际中的样子。| 图片由作者提供
- en: 'Next, let’s provide an example to guide the model towards the correct format:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们提供一个示例来引导模型朝向正确的格式：
- en: '[PRE3]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Step 2: Provide the Input and Run the Extraction'
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：提供输入并运行提取
- en: For the input, I’m using a real clinical sentence from the [**ADE Corpus v2**](https://huggingface.co/datasets/SetFit/ade_corpus_v2_classification/viewer/default/train?f[label_text][value]=%27Related%27)
    dataset on Hugging Face.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 对于输入，我使用的是来自Hugging Face上的[**ADE Corpus v2**](https://huggingface.co/datasets/SetFit/ade_corpus_v2_classification/viewer/default/train?f[label_text][value]=%27Related%27)数据集的一个真实的临床句子。
- en: '[PRE4]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Next, let’s run LangExtract with the Gemini-2.5-Flash model.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们使用Gemini-2.5-Flash模型运行LangExtract。
- en: '[PRE5]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Step 3: View the Results'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：查看结果
- en: You can display the extracted entities with positions
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以显示提取的实体及其位置
- en: '[PRE6]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/ef4ad076086c08dbb0cb80d63cc3d652.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ef4ad076086c08dbb0cb80d63cc3d652.png)'
- en: LangExtract correctly identifies the **adverse drug reaction** without confusing
    it with the patient’s pre-existing conditions, which is a key challenge in this
    type of task.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: LangExtract正确地识别了**不良反应**，而没有将其与患者的现有条件混淆，这是此类任务中的一个关键挑战。
- en: If you want to visualize it, it’s going to create this `.jsonl` file. You can
    load that `.jsonl` file by calling the visualization function, and it will create
    an HTML file for you.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要可视化，它将创建一个`.jsonl`文件。你可以通过调用可视化函数来加载这个`.jsonl`文件，它将为你创建一个HTML文件。
- en: '[PRE7]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/cdddbb9c74b997a249cec51f45362540.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cdddbb9c74b997a249cec51f45362540.png)'
- en: Working with longer clinical notes
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理更长的临床笔记
- en: Real clinical notes are often much longer than the example shown above. For
    instance, here is an actual note from the ***ADE-Corpus-V2* dataset** released
    under the **MIT License**. You can access it on [Hugging Face](https://huggingface.co/datasets/SetFit/ade_corpus_v2_classification)
    or [Zenodo](https://zenodo.org/records/13889331).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 真实的临床笔记通常比上面显示的例子要长得多。例如，这里是从**ADE-Corpus-V2*数据集**发布的实际笔记，发布于**MIT许可证**下。您可以在[Hugging
    Face](https://huggingface.co/datasets/SetFit/ade_corpus_v2_classification)或[Zenodo](https://zenodo.org/records/13889331)上访问它。
- en: '![](../Images/99d7cad5f2b8517c596827c7d1b35802.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/99d7cad5f2b8517c596827c7d1b35802.png)'
- en: Excerpt from a clinical note from the [***ADE-Corpus-V2* dataset**](https://zenodo.org/records/13889331)
    released under the **MIT License** | Image by the author
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 来自[***ADE-Corpus-V2*数据集**](https://zenodo.org/records/13889331)的临床笔记摘录，发布于**MIT许可证**下
    | 作者提供的图片
- en: 'To process longer texts with LangExtract, you keep the same workflow but add
    three parameters:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用LangExtract处理较长的文本，您保持相同的流程，但添加三个参数：
- en: '**extraction_passes** runs multiple passes over the text to catch more details
    and improve recall.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**extraction_passes**在文本上运行多次遍历，以捕获更多细节并提高召回率。'
- en: '**max_workers** controls parallel processing so larger documents can be handled
    faster.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**max_workers**控制并行处理，以便更快地处理更大的文档。'
- en: '**max_char_buffer** splits the text into smaller chunks, which helps the model
    stay accurate even when the input is very long.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**max_char_buffer**将文本分割成更小的块，这有助于模型在输入非常长的情况下保持准确性。'
- en: '[PRE8]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Here is the output. For brevity, I’m only showing a portion of the output here.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这是输出结果。为了简洁起见，我这里只展示输出的一部分。
- en: '![](../Images/db51eb0cd60b1bff171a513b81dcf2e2.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/db51eb0cd60b1bff171a513b81dcf2e2.png)'
- en: '* * *'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: If you want, you can also pass a document’s URL directly to the `text_or_documents`
    parameter.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您愿意，您也可以直接将文档的URL传递给`text_or_documents`参数。
- en: '* * *'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Using LangExtract with Local models via Ollama
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过Ollama使用本地模型进行LangExtract
- en: LangExtract isn’t limited to proprietary APIs. You can also run it with local
    models through **Ollama**. This is especially useful when working with privacy-sensitive
    clinical data that can’t leave your secure environment. You can set up Ollama
    locally, pull your preferred model, and point LangExtract to it. Full instructions
    are available in the [official docs](http://To%20use%20the%20`langextract`%20library,%20we%20need%20to%20authenticate%20with%20the%20service%20using%20an%20API%20key.%20This%20code%20cell%20retrieves%20the%20API%20key%20from%20the%20user%20data%20and%20sets%20it%20as%20an%20environment%20variable,%20making%20it%20accessible%20to%20the%20library.).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: LangExtract不仅限于专有API。您也可以通过**Ollama**使用本地模型运行它。这对于处理无法离开安全环境的隐私敏感的临床数据特别有用。您可以在本地设置Ollama，拉取您首选的模型，并将LangExtract指向它。完整说明可在[官方文档](http://To%20use%20the%20`langextract`%20library,%20we%20need%20to%20authenticate%20with%20the%20service%20using%20an%20API%20key.%20This%20code%20cell%20retrieves%20the%20API%20key%20from%20the%20user%20data%20and%20sets%20it%20as%20an%20environment%20variable,%20making%20it%20accessible%20to%20the%20library.)中找到。
- en: Conclusion
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: If you’re building an information retrieval system or any application involving
    metadata extraction, LangExtract can save you a significant amount of preprocessing
    effort. In my ADR experiments, LangExtract performed well, correctly identifying
    medications, dosages, and reactions. What I noticed is that the output directly
    depends on the quality of the few-shot examples provided by the user, which means
    while LLMs do the heavy lifting, humans still remain an important part of the
    loop. The results were encouraging, but since clinical data is high-risk, broader
    and more rigorous testing across diverse datasets is still needed before moving
    toward production use.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您正在构建信息检索系统或任何涉及元数据提取的应用程序，LangExtract可以为您节省大量的预处理工作。在我的ADR实验中，LangExtract表现良好，正确识别了药物、剂量和反应。我注意到输出直接取决于用户提供的少量示例的质量，这意味着虽然LLMs承担了繁重的工作，但人类仍然是循环中的重要部分。结果令人鼓舞，但由于临床数据风险高，在转向生产使用之前，仍需要在多样化的数据集上进行更广泛和更严格的测试。
