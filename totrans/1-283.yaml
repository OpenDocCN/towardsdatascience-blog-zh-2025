- en: How to Enrich LLM Context to Significantly Enhance Capabilities
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-enrich-llm-context-to-significantly-enhance-capabilities/](https://towardsdatascience.com/how-to-enrich-llm-context-to-significantly-enhance-capabilities/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1757983411005" class="mdspan-comment">LLMs are trained</mdspan>
    with an enormous corpus of text data, where they, during their pre-training stage,
    essentially consume the entire internet. LLMs thrive when they have access to
    all relevant data to respond to user questions appropriately. However, in many
    cases, we limit the capabilities of our LLMs by not providing them enough data.
    In this article, I’ll discuss why you should care about feeding our LLM more data,
    how to fetch this data, and specific applications.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ll also start with a new feature in my articles: Writing out my main goal,
    what I want to achieve with the article, and what you should know after reading
    it. If successful, I’ll start writing it into each of my articles:'
  prefs: []
  type: TYPE_NORMAL
- en: '**My goal** for this article is to highlight the importance of providing LLMs
    with relevant data, and how you can feed it into your LLMs for improved performance'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![LLMs are data hungry. Learn to feed more data into your LLMs for improved
    performance.](../Images/f736f74f006c2af0aad71015cccb8f64.png)'
  prefs: []
  type: TYPE_IMG
- en: In this article, I highlight how you can enhance LLM performance by feeding
    more data into your LLMs. Image by ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: You can also read my articles on [How to Analyze and Optimize Your LLMs in 3
    Steps](https://towardsdatascience.com/how-to-analyze-and-optimize-your-llms-in-3-steps/) and [Document
    QA using Multimodal LLMs](https://eivindkjosbakken.com/2025/07/13/using-a-multimodal-document-ml-model-to-query-your-documents/).
  prefs: []
  type: TYPE_NORMAL
