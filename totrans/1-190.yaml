- en: Stop Feeling Lost :  How to Master ML System Design
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/stop-feeling-lost-how-to-master-ml-system-design-easy/](https://towardsdatascience.com/stop-feeling-lost-how-to-master-ml-system-design-easy/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1760588059667" class="mdspan-comment">If you’re an aspiring</mdspan>
    data scientist or ML engineer, learning machine learning system design is one
    of the most essential skills you need to know. It’s the bridge between building
    models and deploying solutions that drive actual business outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: The ability to turn ML ideas into production systems that save money, boost
    revenue, and create measurable value determines your long-term career growth and
    your salary.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve built machine learning systems that have saved companies over $1.5 million
    per year, and these same skills have helped me land job offers exceeding $100,000.
  prefs: []
  type: TYPE_NORMAL
- en: In this guide, I’ll break down how I think about ML system design so you can
    do the same.
  prefs: []
  type: TYPE_NORMAL
- en: General Framework
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Below is my framework on how to approach designing a machine learning system:'
  prefs: []
  type: TYPE_NORMAL
- en: '***Note:** This is the most common design type for an applied machine learning
    system in an established tech company. There are other, more nuanced cases, like
    infrastructure design and AI/ML research experiment design*.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/80050a9188768a0937c4ccf7d7e2e7e9.png)'
  prefs: []
  type: TYPE_IMG
- en: Framework diagram designed by author.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s break down these steps in a bit more detail.
  prefs: []
  type: TYPE_NORMAL
- en: Business Problem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The goal of this step is to:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Clarify objectives — **What is the business or user problem you’re trying
    to solve, and how to translate that to a machine learning solution?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Define metrics — **What metrics are we targeting: Accuracy, F1-score, ROC-AUC,
    precision/recall, RMSE, etc and how that translates to business performance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Constraints and scope** — How much compute resource is available, do we want
    live-time predictions or batch inference, do we even need machine learning?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**High-level design **— What will the rough architecture look like from data
    to inference?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This is all about gathering and acquiring data:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Identify data sources — ** Databases, APIs, logs, or user-generated data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Identify target variable** — What is the target variable and how do we get
    it?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Quality control** — What state is the data in? Are there any legal issues
    with using the data?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature Engineering
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Create novel features from the data to tackle the specific problem:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Feature importance **— Understanding what features are likely to drive the
    target variable.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data cleaning — **Handle missing values, outliers, and inconsistent entries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Feature representation** — One-hot encoding, target encoding, embeddings,
    and scaling the data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sampling and splits **— Account for unbalanced datasets, data leakage, and
    correctly split to training and testing datasets.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model Design & Selection
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This is where you showcase your theoretical knowledge of machine learning models:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Benchmark** — Start with a simple “stupid” model or heuristic and then slowly
    build complexity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Training** — Cross-validation, hyperparameter tuning, early stopping.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tradeoffs** — Consider tradeoffs like training speed, inference speed, latency,
    and interpretability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Service & Deployment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Understanding the best way to serve and deploy the model in production.
  prefs: []
  type: TYPE_NORMAL
- en: '**Infrastructure — ** Choose cloud/on-prem, set up CI/CD pipelines, and ensure
    scalability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Service** — API endpoint, edge model, batch predictions vs online predictions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluation & Monitoring
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The last part is setting up systems and frameworks to track your model in the
    production environment.
  prefs: []
  type: TYPE_NORMAL
- en: '**Metrics** — What metrics to track with the “online” model vs “offline” model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Monitoring** — Setup a dashboard, monitoring notebook, Slack alerts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Experiment** — Design an A/B experiment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What To Learn?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let me tell you a secret: machine learning system design is not an entry-level
    interview or skill set.'
  prefs: []
  type: TYPE_NORMAL
- en: This is because machine learning system design is tested at the mid and above
    levels.
  prefs: []
  type: TYPE_NORMAL
- en: By that time, you will have solid knowledge across machine learning and software
    engineering, and will likely be developing a specialism.
  prefs: []
  type: TYPE_NORMAL
- en: Nevertheless, if you want a comprehensive, but by no means exhaustive list,
    this is what you need to learn.
  prefs: []
  type: TYPE_NORMAL
- en: Machine Learning Theory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Supervised learning — **Classification (logistic regression, support vector
    machines, decision trees), regression (linear regression, decision trees. gradient
    boosted trees).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Unsupervised learning — **Clustering (k-means, DBSCAN), dimensionality reduction,
    latent semantic analysis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deep learning — **Neural networks, convolutional neural networks and recurrent
    neural networks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Loss functions — **Accuracy, F1-score, NDCG, precision/recall, RMSE etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Feature selection — **How to identify essential features, like correlation
    analysis, recursive feature elimination, regularisation, cross-validation and
    hyperparameter tuning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Statistics — **Bayesian statistics, hypothesis testing and A/B tests.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Specialisms** — Time series, computer vision, operations research, recommendation
    systems. natural language processing etc. Only need 1–2.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: System Design & Engineering
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Cloud** — The Main one is AWS, and you should know [S3](https://aws.amazon.com/s3/),
    [EC2](https://aws.amazon.com/ec2/), [Lambda functions](https://aws.amazon.com/lambda/),
    and [ECS](https://aws.amazon.com/ecs/). Most things are simply wrappers of storage
    and compute anyway.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Containerization** — [Docker](https://www.docker.com/) and [Kubernetes](https://kubernetes.io/).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**System design **— Caching, networking, quantisation, APIs and storage.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Version control** — [CircleCI](https://circleci.com/), [Jenkins](https://www.jenkins.io/),
    [git](https://github.com/), [MLflow](https://mlflow.org/), [Datadog](https://www.datadoghq.com/),
    [Weights and Biases](https://wandb.ai/site/).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment and orchestration frameworks **— [Argo](https://argoproj.github.io/),
    [Metaflow](https://metaflow.org/), [Databricks](https://www.databricks.com/),
    [Airflow](https://airflow.apache.org/) and [Kubeflow](https://www.kubeflow.org/).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Resources
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[**Hands-On Machine Learning with Scikit-Learn, Keras, and TensorFlow (affiliate
    link)**](https://amzn.to/4gZXnKL)** — **Go to the book for learning all the machine
    learning theory.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Designing Machine Learning Systems**](https://amzn.to/47bDTPW) **(affiliate
    link) —**Written by [Chip Huyen](https://huyenchip.com/), who is one of the world’s
    leading experts for AI/ML models in production.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Practical MLOps (affiliate link) **](https://amzn.to/3KI6G5T)— The book
    I used to learn all the fundamentals of machine learning production engineering.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ML System Design Interviews
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I plan to release a more detailed video on the machine learning system design
    interview process later, but for now, I’d like to provide you with a high-level
    overview along with some tips to help you prepare.
  prefs: []
  type: TYPE_NORMAL
- en: Machine learning system design interviews are typically aimed at mid-level and
    senior machine learning engineers. In these interviews, you’ll usually be presented
    with a broad, open-ended problem like designing a recommender system or a spam
    filter.
  prefs: []
  type: TYPE_NORMAL
- en: If your role involves a particular specialisation, such as computer vision,
    the interview question will often focus on that specific domain.
  prefs: []
  type: TYPE_NORMAL
- en: 'One of the biggest challenges with machine learning system design interviews
    is their lack of standardisation. Unlike software engineering interviews, which
    follow a relatively consistent format, ML design interviews vary widely in structure.
    There’s also a lot to cover: countless concepts, trade-offs, and potential solution
    paths.'
  prefs: []
  type: TYPE_NORMAL
- en: 'That said, most hiring managers tend to evaluate candidates on a few key dimensions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Problem translation — **Can you take a business problem and frame it as a
    machine learning solution?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Decision-making — **Do you recognise trade-offs and justify your design choices
    logically?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Breadth and depth — **Do you demonstrate a solid understanding of ML theory,
    a variety of models, and how to apply them effectively in real-world scenarios?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How To Prepare For Interviews
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In terms of preparations, there is one key thing I recommend.
  prefs: []
  type: TYPE_NORMAL
- en: '*Work through past problems.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some resources to find such problems:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**HelloInterview**](https://www.hellointerview.com/learn/ml-system-design/problem-breakdowns/harmful-content) — Overall,
    a great platform to practise all types of interviews.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Machine Learning System Design Interview**](https://amzn.to/4nBq82T) **(affiliate
    link) —**A great book with many practice problems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Machine Learning Interviews Online Book**](https://huyenchip.com/machine-learning-systems-design/exercises.html#exercises-rWl8SQW) — Another
    great resource by [Chip Huyen](https://huyenchip.com/).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'I also recommend checking out large tech companies’ blog posts to learn more
    about how machine learning algorithms are deployed at scale:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Airbnb Tech Blog ML Articles**](https://medium.com/airbnb-engineering/tagged/machine-learning)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Netflix Tech Blog**](https://netflixtechblog.com/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Meta ML Engineering Blog**](https://zone.undistracted.app/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Lyft Engineering Blog**](https://eng.lyft.com/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Earlier, I discussed how system design interviews test more than just your modelling
    skills.
  prefs: []
  type: TYPE_NORMAL
- en: But what are the underlying fundamentals they’re really testing for?
  prefs: []
  type: TYPE_NORMAL
- en: That’s precisely what I cover in one of my previous articles, which will walk
    you through everything you need to know, along with the best resources.
  prefs: []
  type: TYPE_NORMAL
