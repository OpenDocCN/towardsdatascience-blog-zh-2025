- en: Mastering SQL Window Functions
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 掌握SQL窗口函数
- en: 原文：[https://towardsdatascience.com/mastering-sql-window-functions/](https://towardsdatascience.com/mastering-sql-window-functions/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/mastering-sql-window-functions/](https://towardsdatascience.com/mastering-sql-window-functions/)
- en: <mdspan datatext="el1749533647765" class="mdspan-comment">Over the past year</mdspan>
    in my work, I have written countless SQL queries to extract insights from data.
    It’s always a challenging task because it’s not only important to write efficient
    queries, but also simple enough to maintain over time.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1749533647765" class="mdspan-comment">在过去的一年里</mdspan>，我在工作中编写了无数个SQL查询来从数据中提取洞察。这始终是一个具有挑战性的任务，因为它不仅需要编写高效的查询，而且还需要足够简单，以便随着时间的推移进行维护。
- en: With each new problem comes a new lesson, and recently, I’ve been diving into
    SQL window functions. These powerful tools are incredibly useful when you need
    to perform calculations across a set of rows **without losing the granularity
    of individual records**.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 每个新问题都带来新的教训，最近，我一直在深入研究SQL窗口函数。当你需要在对一组行进行计算时，这些强大的工具非常有用，而且不会丢失单个记录的粒度。
- en: In this article, I’ll break down SQL window functions step by step. They might
    seem complex or unintuitive at first, but once you understand how they work, you’ll
    see how indispensable they can be. Are you ready? Let’s dive in and master them
    together!
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将逐步分解SQL窗口函数。它们一开始可能看起来很复杂或不直观，但一旦你了解了它们的工作原理，你就会看到它们是多么不可或缺。你准备好了吗？让我们一起深入研究并掌握它们！
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Table of contents**'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**目录**'
- en: '**Why do we need Window Functions?**'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我们为什么需要窗口函数？**'
- en: '**Syntax of Window Function **'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**窗口函数的语法**'
- en: '**Four Simple Examples**'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**四个简单示例**'
- en: '* * *'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why do we need Window Functions?
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们为什么需要窗口函数？
- en: To understand the power of Window Functions, let’s start with a simple example.
    Imagine we have a table containing six orders from an e-commerce website. Each
    row includes the order id, the date, the product, its brand and price.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解窗口函数的强大之处，让我们从一个简单的例子开始。想象我们有一个包含来自电子商务网站的六个订单的表。每一行包括订单ID、日期、产品、品牌和价格。
- en: '![](../Images/beef06da2975523726b74139e8a210f9.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/beef06da2975523726b74139e8a210f9.png)'
- en: Illustration by Author. Example table to demonstrate the power of Window Functions.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 作者插图。展示窗口函数强大功能的示例表。
- en: 'Let’s suppose that we want to calculate the total price for each brand. Using
    the **GROUP BY** clause, we can write a query like this:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要计算每个品牌的总价格。使用**GROUP BY**子句，我们可以编写如下查询：
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This returns a result where each row represents one brand, along with the total
    price of all orders under that brand.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这返回了一个结果，其中每行代表一个品牌，以及该品牌下所有订单的总价格。
- en: '[PRE1]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This aggregation removes the details of individual orders, since the output
    only includes one row for brand. What if we want to keep all the original rows
    and add the total price for each brand as an extra field?
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这个聚合移除了单个订单的细节，因为输出只为每个品牌包含一行。如果我们想保留所有原始行并添加每个品牌的总价格作为额外字段呢？
- en: 'By using `SUM(price) OVER (PARTITION BY brand)`, we can calculate the total
    price for each brand **without collapsing the rows**:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用 `SUM(price) OVER (PARTITION BY brand)`，我们可以计算每个品牌的总价格 **而不合并行**：
- en: '[PRE2]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'We have obtained a result like this:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到了这样的结果：
- en: '[PRE3]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This query returns all six rows, preserving every individual order, and adds
    a new column showing the total price per brand. For example, the order with brand
    Carpisa shows a total of 30, since it’s the only Carpisa order, the two orders
    from Nike show 175 (90+85), and so on.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这个查询返回所有六行，保留每个单独的订单，并添加一个显示每个品牌总价格的新的列。例如，品牌Carpisa的订单显示总额为30，因为它只有一个Carpisa订单，耐克的两个订单显示175（90+85），依此类推。
- en: 'You may notice that the table is no longer ordered by order_id. That’s because
    the window function partitions by brand, and SQL doesn’t guarantee row order unless
    explicitly specified. To restore the original order, we need to simply add an
    `ORDER BY` clause:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会注意到，表格不再按订单_id排序。这是因为窗口函数按品牌分区，而SQL不保证除非明确指定，否则行顺序。为了恢复原始顺序，我们只需简单地添加一个`ORDER
    BY`子句：
- en: '[PRE4]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Finally, we have the output containing all the required details:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们得到了包含所有所需细节的输出：
- en: '[PRE5]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Now, we have added the same aggregation as `GROUP BY`, while keeping all the
    individual order details.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们添加了与`GROUP BY`相同的聚合，同时保留了所有单个订单的详细信息。
- en: Syntax of Window Functions
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 窗口函数的语法
- en: 'In general, the window function has a syntax that looks like this:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，窗口函数的语法看起来像这样：
- en: '[PRE6]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Let’s break it down. `f(col2)` is the operation you want to perform, such as
    sum, count and ranking. `OVER` clause defines the “window” or the subset of rows
    over which the window function operates. `PARTITION BY col1` divides the data
    into groups and `ORDER BY col1` determines the order of rows within each partition.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解一下。`f(col2)`是你想要执行的操作，例如求和、计数和排名。`OVER`子句定义了“窗口”或窗口函数操作的行子集。`PARTITION
    BY col1`将数据分割成组，而`ORDER BY col1`确定每个分区中行的顺序。
- en: 'Moreover, window functions fall into three main categories:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，窗口函数分为三大类：
- en: aggregate function:`COUNT`, `SUM`, `AVG`, `MIN`and `MAX`
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聚合函数：`COUNT`、`SUM`、`AVG`、`MIN`和`MAX`
- en: 'rank function: `ROW_NUMBER`, `RANK`, `DENSE_RANK`, `CUME_DIST`, `PERCENT_RANK`and`NTILE`'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 排名函数：`ROW_NUMBER`、`RANK`、`DENSE_RANK`、`CUME_DIST`、`PERCENT_RANK`和`NTILE`
- en: 'value function: `LEAD`, `LAG`, `FIRST_VALUE` and `LAST_VALUE`'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 值函数：`LEAD`、`LAG`、`FIRST_VALUE`和`LAST_VALUE`
- en: Four Simple Examples
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 四个简单示例
- en: Let’s show different examples to master window functions.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过不同的示例来掌握窗口函数。
- en: 'Example 1: Simple Window Function'
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 1：简单的窗口函数
- en: 'To understand the concept of window functions, let’s start with a straightforward
    example. Suppose we want to calculate the total price of all the orders in the
    table. Using a `GROUP BY` clause would give us a single value: `295`. However,
    that would collapse the rows and lose the individual order details. Instead, if
    we want to display the total price alongside each record, we can use a window
    function like this:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解窗口函数的概念，让我们从一个简单的例子开始。假设我们想计算表中所有订单的总价。使用`GROUP BY`子句将给出一个单一值：`295`。然而，这将折叠行并丢失单个订单的详细信息。相反，如果我们想在每条记录旁边显示总价，我们可以使用如下的窗口函数：
- en: '[PRE7]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'This is the output:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这是输出：
- en: '[PRE8]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: In this way, we obtained the sum of all prices over the entire dataset and repeated
    it for each row.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式，我们在整个数据集上获得了所有价格的总和，并重复应用于每一行。
- en: 'Example 2: Partition by clause'
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 2：分区子句
- en: 'Let’s now calculate the average price per year while still keeping all the
    details. We can do this by using the `PARTITION BY` clause inside a window function
    to group rows by year and compute the average within each group:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们计算每年的平均价格，同时保留所有详细信息。我们可以通过在窗口函数内部使用`PARTITION BY`子句按年份分组行，并在每个组内计算平均值来实现：
- en: '[PRE9]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Here’s what the output looks like:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 输出如下所示：
- en: '[PRE10]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: That’s great! We see the average price for each year alongside each row.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 非常好！我们看到每个年份的平均价格都显示在每行旁边。
- en: 'Example 3: Order by clause'
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 3：排序子句
- en: 'One of the best ways to understand how ordering works within window functions
    is to apply a **ranking** function. Let’s say we want to rank all orders fromhighest
    to lowest price. Here’s how we can do it using the `RANK()` function:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 理解窗口函数内部排序工作的最佳方法之一是应用**排名**函数。假设我们想按价格从高到低对所有订单进行排名。以下是使用`RANK()`函数进行操作的步骤：
- en: '[PRE11]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'We obtain an output like this:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到如下输出：
- en: '[PRE12]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: As shown, the order with the highest price gets rank 1, and the rest follow
    in descending order.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 如所示，价格最高的订单获得排名 1，其余的按降序排列。
- en: 'Example 4: Combine Partition by and Group by clauses'
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 4：结合分区子句和分组子句
- en: In the previous example, we ranked all orders from the highest to the lowest
    price across the entire dataset. But what if we want to restart the ranking for
    each year? We can do this by adding the `PARTITION BY` clause in the window function.
    This allows for splitting the data into separate groups by year and sorting the
    orders from the highest to the lowest price.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一个示例中，我们按价格从高到低对所有订单在整个数据集中进行排名。但如果我们想为每年的排名重新开始，我们可以通过在窗口函数中添加`PARTITION
    BY`子句来实现。这允许按年份将数据分割成不同的组，并按价格从高到低排序订单。
- en: '[PRE13]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'The result should look like this:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 结果应该看起来像这样：
- en: '[PRE14]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Now, the ranking restarts for each year, as we decided.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，排名按我们决定的方式为每年重新开始。
- en: 'Final thoughts:'
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法：
- en: I hope this guide helped you get a clear and practical introduction to SQL window
    functions. At first, they might feel a bit unintuitive, but once you compare them
    side by side with the `GROUP BY` clause, the value they bring becomes much easier
    to understand.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这份指南能帮助你清晰地了解SQL窗口函数的实用介绍。一开始，它们可能感觉有点不直观，但一旦你将它们与`GROUP BY`子句并排比较，它们带来的价值就变得更容易理解。
- en: From my own experience, window functions have been incredibly powerful for extracting
    insights without losing row-level detail, something that traditional aggregations
    hide. They are incredibly useful when extracting metrics like totals, rankings,
    year-over-year or month-over-month comparisons.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的个人经验，窗口函数在提取洞察力而不丢失行级细节方面非常强大，这是传统聚合所隐藏的。当提取总计、排名、年度或月度比较等指标时，它们非常有用。
- en: However, there are some limitations. Window functions can be computationally
    expensive, especially over large datasets or complex partitions. It’s important
    to evaluate whether the added flexibility justifies the performance tradeoff in
    your specific use case.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，也有一些限制。窗口函数在处理大型数据集或复杂分区时可能会计算成本较高。在您的特定用例中，评估增加的灵活性是否能够证明性能权衡是重要的。
- en: Thanks for reading! Have a nice day!
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！祝您有个愉快的一天！
