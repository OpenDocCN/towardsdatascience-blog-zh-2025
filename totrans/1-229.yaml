    Jacques Bertin (translated by [J. Ronald Eastman](https://www.tandfonline.com/author/Eastman%2C+J+Ronald))'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '[1] *[图形符号学](https://www.tandfonline.com/doi/pdf/10.2307/143508)*，雅克·贝尔廷 (由
    [J. Ronald Eastman](https://www.tandfonline.com/author/Eastman%2C+J+Ronald) 翻译)'
- en: '[2] [https://ageofrevolution.org/200-object/flow-map-of-napoleons-invasion-of-russia/](https://ageofrevolution.org/200-object/flow-map-of-napoleons-invasion-of-russia/)'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '[2] [https://ageofrevolution.org/200-object/flow-map-of-napoleons-invasion-of-russia/](https://ageofrevolution.org/200-object/flow-map-of-napoleons-invasion-of-russia/)'
- en: '[2] *[Readings in information visualization: using vision to think](https://books.google.com/books?hl=en&lr=&id=wdh2gqWfQmgC&oi=fnd&pg=PR13&dq=info:v_5lnyYeMqkJ:scholar.google.com&ots=opDL2upHMt&sig=lR9fLOz4eI3YwHRmtJ32fJr8yeA)*
    (Card, Mackinlay, and Shneiderman)'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '[2] *[信息可视化的阅读材料：用视觉思考](https://books.google.com/books?hl=en&lr=&id=wdh2gqWfQmgC&oi=fnd&pg=PR13&dq=info:v_5lnyYeMqkJ:scholar.google.com&ots=opDL2upHMt&sig=lR9fLOz4eI3YwHRmtJ32fJr8yeA)*
    (Card, Mackinlay, 和 Shneiderman)'
- en: '[3] *[The Visual Display of Quantitative Information](https://lmscontent.embanet.com/USC/CMGT587/Tufte%20Ch2%20and%205.pdf)*,
    Edward Tufte'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '[3] *[《定量信息的视觉展示》](https://lmscontent.embanet.com/USC/CMGT587/Tufte%20Ch2%20and%205.pdf)*，爱德华·图费'
