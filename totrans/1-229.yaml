- en: 'Data Visualization Explained (Part 2): An Introduction to Visual Variables'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-visualization-explained-part-2-an-introduction-to-visual-variables/](https://towardsdatascience.com/data-visualization-explained-part-2-an-introduction-to-visual-variables/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*<mdspan datatext="el1759172039156" class="mdspan-comment">This is the second</mdspan>
    article in my data visualization series. See the previous article: [“Data Visualization
    Explained: What It Is and Why It Matters.”](https://towardsdatascience.com/data-visualization-explained-what-it-is-and-why-it-matters/)*'
  prefs: []
  type: TYPE_NORMAL
- en: So, now you’ve learned the foundational idea of what underlies data visualization
    and why it is an essential component of the data science ecosystem. (If you are
    not familiar with this, be sure to check out the article linked above.)
  prefs: []
  type: TYPE_NORMAL
- en: As we discussed in the previous article, the core idea of data visualization
    is finding an effective way to represent data of various types in a visual manner.
  prefs: []
  type: TYPE_NORMAL
- en: The key underlying concept which makes this representation work is known as
    a visual encoding channel. A **visual encoding channel** is effectively the means
    through which numerical, textual, or some other form of data is translated into
    a visual mark. The best way to think of it is as a visual feature corresponding
    to all or part of your data. Effective data visualizations often use multiple
    visual encoding channels for different aspects of the data.
  prefs: []
  type: TYPE_NORMAL
- en: In this second article, we’ll dive into the details of visual encoding channels
    and gain some practice breaking down a complex visualization into its component
    parts. This will prepare you for designing your own visualizations in the near
    future.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to Visual Variables
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In his 1967 work, *The Semiology of Graphics*, French cartographer Jacques
    Bertin outlined [seven “retinal” variables](https://www.axismaps.com/guide/visual-variables),
    named as such because the human eye’s retina is sensitive to them [1]:'
  prefs: []
  type: TYPE_NORMAL
- en: Position (such as the coordinates on a graph)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Size
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Shape
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Color hue
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Color value (lightness to darkness)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Orientation
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Texture
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Although Bertin published his work decades ago, his visual variables remain
    an excellent guideline for modern data visualization design. In the early phases
    of developing a visualization, it is good practice to review the visual variables
    available and determine which ones to use for specific variables in the data.
  prefs: []
  type: TYPE_NORMAL
- en: This can be a confusing concept and is more easily understood with an example.
    The graphic below, often considered a masterful application of visualization,
    was designed and drawn by Charles Minard. It depicts Napoleon’s failed invasion
    of Russia.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/94dc4b56ae50688367801c9b3938927b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image Source: [Wikimedia Commons](https://commons.wikimedia.org/wiki/File:Minard_map_of_napoleon.png)'
  prefs: []
  type: TYPE_NORMAL
- en: This is a simplified and translated version of the map to ease readability;
    for the original, [see here](https://ageofrevolution.org/200-object/flow-map-of-napoleons-invasion-of-russia/)
    [2].
  prefs: []
  type: TYPE_NORMAL
- en: 'What different visual variables are being used in the graphic above? (**Hint:
    There are quite a few**.) As an exercise, get out a pen and paper and try to determine
    this yourself. We’ll walk through it in detail in a bit.'
  prefs: []
  type: TYPE_NORMAL
- en: Maximizing Effectiveness of Visual Variables
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The best visual variable to use for a specific visualization depends on the
    data. Here, we will look at three different types of data:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Quantitative**: Numerical data with a natural ordering that is suitable for
    mathematical operations (i.e., it makes sense to add/subtract/multiply/divide
    individual data values). For example, salary and age are quantitative variables.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Ordinal**: Categorical data (i.e., non-numerical data which can take on a
    fixed number of values) that still has a natural ordering. If you have ever taken
    a survey with answer choices such as “Strongly Agree,” “Agree,” “Neutral,” “Disagree,”
    and “Strongly Disagree,” then you have seen ordinal data in action. While mathematical
    operations on this data don’t make sense, various values can still be ordered
    from “best” to “worst,” so to speak.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This also includes variables that may have an order without technically being
    “ranked,” such as traffic light patterns.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Nominal**: Categorical data which has no natural ordering. A great example
    of this is color. While it is possible to distinguish between different colors,
    they have no natural sequence. (This also explains why color is an excellent visual
    encoding for nominal variables in general, as we’ll see below!)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Important: Just because a variable is a number does not automatically make
    it quantitative. For example, zip codes are numbers, but they have no natural
    ordering, nor can one perform mathematical operations on them. Thus, zip code
    is a *nominal* variable.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following table, a variation of one designed by visualization experts Jock
    D. Mackinlay and Stuart Card, outlines the effectiveness of different visual variables
    depending on the type of data [2]:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Quantitative** | **Ordinal** | **Nominal** |'
  prefs: []
  type: TYPE_TB
- en: '| Position | Position | Position |'
  prefs: []
  type: TYPE_TB
- en: '| Length | Density | Hue |'
  prefs: []
  type: TYPE_TB
- en: '| Angle | Saturation | Texture |'
  prefs: []
  type: TYPE_TB
- en: '| Slope | Hue | Connection |'
  prefs: []
  type: TYPE_TB
- en: '| Area | Texture | Containment |'
  prefs: []
  type: TYPE_TB
- en: '| Volume | Connection | Density |'
  prefs: []
  type: TYPE_TB
- en: '| Density | Containment | Saturation |'
  prefs: []
  type: TYPE_TB
- en: '| Saturation | Length | Shape |'
  prefs: []
  type: TYPE_TB
- en: '| Hue | Angle | Length |'
  prefs: []
  type: TYPE_TB
- en: '| ~~Texture~~ | Slope | Angle |'
  prefs: []
  type: TYPE_TB
- en: '| ~~Connection~~ | Area | Slope |'
  prefs: []
  type: TYPE_TB
- en: '| ~~Containment~~ | Volume | Area |'
  prefs: []
  type: TYPE_TB
- en: '| ~~Shape~~ | ~~Shape~~ | Volume |'
  prefs: []
  type: TYPE_TB
- en: 'A few key points about these rankings:'
  prefs: []
  type: TYPE_NORMAL
- en: Position is the best option for all variable types. For example, a bar graph
    with names on the x-axis and blood pressure on the y-axis uses position for both
    a nominal variable and quantitative variable, respectively.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After position, desirability changes for each variable type. This is important
    to know because if you are graphing several variables, you’ll eventually have
    to use something other than position because it’s already being used (usually
    on a 2-D graph with two axes).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Length is an extension of position, but especially useful for quantitative comparisons.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Density and saturation are great for ordinal variables, as your viewers don’t
    need to determine exact values—they just need to see the rankings.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Hue and shape work well for nominal variables, making it easy to see categorical
    differences.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Some options are entirely crossed out because they simply wouldn’t make sense.
    For example, shape is not a possible encoding choice for quantitative or ordinal
    variables, because there would be no way to compare quantities or understand orders.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, let’s walk through an example of how to break down visual encoding channels
    in detail.
  prefs: []
  type: TYPE_NORMAL
- en: 'Minard’s Map: Breaking Down the Variables'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s look at Minard’s map of Napoleon’s invasion together. Here it is again
    for convenience. This example is taken from Edward Tufte’s famous visualization
    book, The Visual Display of Quantitative Information [3].
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/94dc4b56ae50688367801c9b3938927b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image Source: [Wikimedia Commons](https://commons.wikimedia.org/wiki/File:Minard_map_of_napoleon.png)'
  prefs: []
  type: TYPE_NORMAL
- en: 'A careful study of this map shows Charles Minard’s mastery of visual encoding
    channels as nothing short of brilliant. His visualization displays ***six different
    variables***:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Geographic Location (Quantitative)**: *Position* is used to display the location
    of Napoleon’s army on a 2-D surface (so this is technically two variables). The
    invasion began on the left side of the map, on the Polish-Russian border. We can
    also see how at times, parts of the army branch off to different locations as
    part of Napoleon’s strategy.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Geographic Location (Quantitative)**: See above.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Time (Quantitative)**: Looking closely, we can see that various points in
    time are listed on the chart’s x-axis at the bottom of the visualization. Again,
    the *position* is used to display this variable.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Temperature (Quantitative)**: Temperature is plotted in relation to time
    on the chart underneath the map. *Position* is used yet again, this time on the
    y-axis.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Number of Troops Remaining in Army (Quantitative)**: The width of the shape
    moving across the map represents the number of troops in Napoleon’s army. It is
    clear that as the invasion progressed, Napoleon’s army became smaller and smaller.
    They eventually returned to Poland with only 10,000 living soldiers out of an
    initial 422,000.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Direction of the Army’s Movement (Nominal)**: Color is used to depict the
    direction in which the army moves at various positions. The beige/tan color (white
    in the simplified image we have above) indicates the army’s movement toward Moscow,
    and the black color indicates its retreat back into Poland.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In his book [3], Tufte refers to Minard’s map as possibly “the best statistical
    graphic ever drawn.” Studying it can inspire us to devise clever ways to encode
    our own data visually.
  prefs: []
  type: TYPE_NORMAL
- en: Final Thoughts and Looking Forward
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'With this second article, you’ve learned the foundational idea behind visualization
    design: visual encoding channels. As you reflect on what you’ve learned, keep
    the following key points in mind:'
  prefs: []
  type: TYPE_NORMAL
- en: The choice of visual encoding channel can often make or break a visualization.
    You might have a beautifully designed graphic, but if the visual encoding channels
    are hard to interpret, your viewers won’t know what you’re trying to say.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Position reigns supreme for all variable types, but there is limited space in
    a 2-D environment. As such, think carefully about which variables you display
    with position; they’ll often be the most important ones.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Try out different designs! There is no “one” perfect solution. Rather, you must
    revise and reiterate until you reach a satisfactory point.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the next article, we’ll talk about important tips for visualization design
    and how techniques have evolved and expanded over the last several decades. Until
    then.
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[1] *[Semiology of Graphics](https://www.tandfonline.com/doi/pdf/10.2307/143508)*,
    Jacques Bertin (translated by [J. Ronald Eastman](https://www.tandfonline.com/author/Eastman%2C+J+Ronald))'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] [https://ageofrevolution.org/200-object/flow-map-of-napoleons-invasion-of-russia/](https://ageofrevolution.org/200-object/flow-map-of-napoleons-invasion-of-russia/)'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] *[Readings in information visualization: using vision to think](https://books.google.com/books?hl=en&lr=&id=wdh2gqWfQmgC&oi=fnd&pg=PR13&dq=info:v_5lnyYeMqkJ:scholar.google.com&ots=opDL2upHMt&sig=lR9fLOz4eI3YwHRmtJ32fJr8yeA)*
    (Card, Mackinlay, and Shneiderman)'
  prefs: []
  type: TYPE_NORMAL
- en: '[3] *[The Visual Display of Quantitative Information](https://lmscontent.embanet.com/USC/CMGT587/Tufte%20Ch2%20and%205.pdf)*,
    Edward Tufte'
  prefs: []
  type: TYPE_NORMAL
