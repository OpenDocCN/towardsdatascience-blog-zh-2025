- en: In Defense of Statistical Significance
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为统计显著性辩护
- en: 原文：[https://towardsdatascience.com/in-defense-of-statistical-significance-996e8c62f3e8/](https://towardsdatascience.com/in-defense-of-statistical-significance-996e8c62f3e8/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/in-defense-of-statistical-significance-996e8c62f3e8/](https://towardsdatascience.com/in-defense-of-statistical-significance-996e8c62f3e8/)
- en: '![Photo by Siora Photography on Unsplash](../Images/2e6f047c25a0bd579ae53b4bd5c12d49.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由Siora Photography在Unsplash提供的图片](../Images/2e6f047c25a0bd579ae53b4bd5c12d49.png)'
- en: Photo by [Siora Photography](https://unsplash.com/@siora18?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-black-and-white-photo-of-a-wave-in-the-sand-IEsj0BXQMCI?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Siora Photography](https://unsplash.com/@siora18?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/a-black-and-white-photo-of-a-wave-in-the-sand-IEsj0BXQMCI?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)提供。
- en: 'It’s become something of a meme that statistical significance is a bad standard.
    Several recent blogs have made the rounds, making the case that statistical significance
    is a "cult" or "arbitrary." If you’d like a classic polemic (and who wouldn’t?),
    check out: [https://www.deirdremccloskey.com/docs/jsm.pdf](https://www.deirdremccloskey.com/docs/jsm.pdf).'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 统计显著性已经成为一种某种形式的梗，认为统计显著性是一个坏的标准。最近有几篇博客在流传，认为统计显著性是一种“崇拜”或“任意”的东西。如果你想看一篇经典的辩论（谁不想呢？），请查看：[https://www.deirdremccloskey.com/docs/jsm.pdf](https://www.deirdremccloskey.com/docs/jsm.pdf)。
- en: This little essay is a defense of the so-called Cult of Statistical Significance.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇小论文是对所谓的统计显著性崇拜的辩护。
- en: Statistical significance is a good enough idea, and I’ve yet to see anything
    fundamentally better or practical enough to use in industry.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 统计显著性是一个足够好的想法，我还没有看到任何在工业界使用的基本上更好或足够实用的东西。
- en: I won’t argue that statistical significance is the *perfect* way to make decisions,
    but it is *fine*.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会争辩说统计显著性是做出决策的*完美*方式，但它*足够好*。
- en: Statistical significance does not equal business significance – but so what?
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 统计显著性不等于业务显著性——但那又怎样？
- en: A common point made by those who would besmirch the Cult is that statistical
    significance is not the same as business significance. They are correct, but it’s
    not an argument to avoid statistical significance when making decisions.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 那些诋毁崇拜的人通常会提出一个常见的观点，即统计显著性不等于业务显著性。他们是对的，但这并不是在做出决策时避免统计显著性的论据。
- en: Statistical significance says, for example, that if the estimated impact of
    some change is 1% with a standard error of 0.25%, it is statistically significant
    (at the 5% level), while if the estimated impact of another change is 10% with
    a standard error of 6%, it is statistically insignificant (at the 5% level).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 统计显著性表示，例如，如果某个变化的估计影响为1%，标准误差为0.25%，则它是统计显著的（在5%的水平上），而如果另一个变化的估计影响为10%，标准误差为6%，则它是统计不显著的（在5%的水平上）。
- en: The argument goes that the 10% impact is more meaningful to the business, even
    if it is less precise.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 争论的焦点是10%的影响对业务更有意义，即使它不够精确。
- en: Well, let’s look at this from the perspective of *decision-making.*
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，让我们从*决策*的角度来看这个问题。
- en: There are two cases here.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有两种情况。
- en: The two initiatives are separable.
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这两个倡议是可以分开的。
- en: If the two initiatives are separable, we should still launch the 1% with a 0.25%
    standard error – right? It’s a positive effect, so statistical significance does
    not lead us astray. We should launch the stat sig positive result.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这两个倡议可以分开，我们仍然应该以0.25%的标准误差启动1%——对吗？这是一个积极的效果，所以统计显著性不会误导我们。我们应该启动统计显著性为正的结果。
- en: Okay, so let’s turn to the larger effect size experiment.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，那么让我们转向更大效应量的实验。
- en: Suppose the effect size was +10% with a standard error of 20%, i.e., the 95%
    confidence interval was roughly [-30%, +50%]. In this case, we don’t really think
    there’s any evidence the effect is positive, right? Despite the larger effect
    size, the standard error is too large to draw any meaningful conclusion.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 假设效应量是+10%，标准误差为20%，即95%置信区间大致为[-30%，+50%]。在这种情况下，我们并不认为有任何证据表明效应是正的，对吗？尽管效应量更大，但标准误差太大，无法得出任何有意义的结论。
- en: The problem isn’t statistical significance. The problem is that we think a standard
    error of 6% is small enough in this case to launch the new feature based on this
    evidence. This example doesn’t show a problem with statistical significance as
    a framework. It shows we are less worried about Type 1 error than alpha = 5%.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 问题不是统计显著性。问题是，我们认为在这种情况下，标准误差为6%已经足够小，可以基于这些证据推出新功能。这个例子并没有显示出统计显著性作为框架的问题。它显示出我们比alpha
    = 5%更不担心I型错误。
- en: That’s fine! We accept other alphas in our Cult, so long as they were selected
    before the experiment. Just use a larger alpha. For example, this is statistically
    significant with alpha = 10%.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 没问题！只要它们在实验之前被选中，我们文化中接受其他alpha值。只需使用更大的alpha值。例如，当alpha = 10%时，这在统计上是有意义的。
- en: The point is that there *is* a level of noise that we’d find unacceptable. There’s
    a level of noise where even if the estimated effect were +20%, we’d say, "We don’t
    really know what it is."
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是确实存在一个我们无法接受的噪声水平。在某个噪声水平下，即使估计的效应是+20%，我们也会说：“我们真的不知道它是什么。”
- en: So, we have to say how much noise is too much.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们必须说多少噪声是过多的。
- en: Statistical inference, like art and morality, requires us to draw the line somewhere.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 统计推断，就像艺术和道德一样，要求我们在某个地方划线。
- en: The initiatives are alternatives.
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这些倡议是替代方案。
- en: Now, suppose the two initiatives are alternatives. If we do one, we can’t do
    the other. Which should we choose?
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，假设这两个倡议是替代方案。如果我们做其中一个，就不能做另一个。我们应该选择哪一个？
- en: In this case, the problem with the above setup is that we’re testing the wrong
    hypothesis. We don’t just want to compare these initiatives to control. We also
    want to compare them to each other.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，上述设置的问题是我们正在测试错误的理论假设。我们不仅想将这些倡议与控制组进行比较，还想将它们相互比较。
- en: But this is also not a problem with statistical significance. It’s a problem
    with the hypothesis we’re testing.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 但这也不是统计显著性的问题。这是我们对测试的假设的问题。
- en: We want to test whether the 9% difference in effect sizes is statistically significant,
    using an alpha level that makes sense for the same reason as in the previous case.
    There’s a level of noise at which the 9% is just spurious, and we have to set
    that level.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想测试9%的效应大小差异是否具有统计显著性，使用与上一个案例相同的理由来设定alpha水平。在某个噪声水平下，9%只是虚假的，我们必须设定这个水平。
- en: Again, we have to draw the line somewhere.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，我们不得不在某处划线。
- en: Now, let’s deal with some other common objections, and then I’ll pass out a
    sign-up sheet to join the Cult.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们处理一些其他常见的反对意见，然后我会分发一份报名表，邀请大家加入我们的文化。
- en: Statistical significance is arbitrary.
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 统计显著性是任意的。
- en: This objection to statistical significance is common but misses the point.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对统计显著性的这种反对意见很常见，但忽略了重点。
- en: Our attitudes towards risk and ambiguity (in the Statistical Decision Theory
    sense) are "arbitrary" because we choose them. But there isn’t any solution to
    that. Preferences are a given in any decision-making problem.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对风险和模糊性的态度（在统计决策理论意义上）是“任意”的，因为我们选择了它们。但这并不是没有解决方案的。偏好是任何决策问题中的给定条件。
- en: Statistical significance is no more "arbitrary" than other decision-making rules,
    and it has the nice intuition of trading off how much noise we’ll allow versus
    effect size. It has a simple scalar parameter that we can adjust to prefer more
    or less Type 1 error relative to Type 2 error. It’s lovely.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 统计显著性并不比其他决策规则“任意”更多，它有一个很好的直觉，即权衡我们愿意允许多少噪声与效应大小。它有一个简单的标量参数，我们可以调整以更多地或更少地偏好I型错误相对于II型错误。这很棒。
- en: People misinterpret frequentist p-values to indicate the probability that the
    effect is zero. To avoid this mistake, they should use Bayesian inference.
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人们错误地解释了频率统计的p值，将其表示为效应为零的概率。为了避免这种错误，他们应该使用贝叶斯推断。
- en: Sometimes, people argue that we should use Bayesian inference to make decisions
    because it is easier to interpret.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，人们认为我们应该使用贝叶斯推断来做出决策，因为它更容易解释。
- en: I’ll start by admitting that in its ideal setting, Bayesian inference has nice
    properties. We can take the posterior and treat it exactly like "beliefs" and
    make decisions based on, say, the probability the effect is positive, which is
    not possible with frequentist statistical significance.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先承认，在理想设置中，贝叶斯推断具有很好的特性。我们可以将后验视为“信念”并据此做出决策，例如，基于效应为正的概率，这是频率统计显著性所不可能的。
- en: Bayesian inference in practice is another animal.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 实际中的贝叶斯推断是另一回事。
- en: Bayesian inference only gets those nice "belief"-like properties if the prior
    reflects the decision-maker’s actual prior beliefs. This is extremely difficult
    to do in practice.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 贝叶斯推理只有在先验反映了决策者的实际先验信念时才获得那些美好的“信念”属性。在实践中，这非常困难做到。
- en: If you think choosing an "alpha" that draws the line on how much noise you’ll
    accept is tricky, imagine having to choose a *density* that correctly captures
    your – or the decision-maker’s – *beliefs…* before every experiment! This is a
    very difficult problem.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认为选择一个“alpha”值来划分你将接受多少噪声的界限是棘手的，那么想象一下在每次实验之前必须选择一个*密度*来正确捕捉你的——或者决策者的——*信念…*这是一个非常困难的问题。
- en: So, the Bayesian priors selected in practice are usually chosen because they
    are "convenient," "uninformative," etc. They have little to do with actual prior
    beliefs.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在实践中选择的贝叶斯先验通常是因为它们是“方便的”、“无信息的”等等。它们与实际的先验信念几乎没有关系。
- en: When we’re not specifying our real prior beliefs, the posterior distribution
    is just some weighting of the likelihood function. Claiming that we can look at
    the quantiles of this so-called posterior distribution and say the parameter has
    a 10% chance of being less than 0 is nonsense statistically.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们没有指定我们的真实先验信念时，后验分布只是似然函数的一些加权。声称我们可以查看这个所谓的后验分布的百分位数，并说参数有10%的可能性小于0，在统计学上是没有意义的。
- en: So, if anything, it is easier to misinterpret what we’re doing in Bayesian land
    than in frequentist land. It is hard for statisticians to translate their prior
    beliefs into a distribution. How much harder is it for whoever the actual decision-maker
    is on the project?
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果有什么不同的话，那么在贝叶斯领域比在频率主义领域更容易误解我们所做的事情。统计学家将他们的先验信念转化为分布是困难的。对于项目中的实际决策者来说，这会难多少呢？
- en: For these reasons, Bayesian inference doesn’t scale well, which is why, I think,
    Experimentation Platforms across the industry generally don’t use it.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这些原因，贝叶斯推理的扩展性不好，这也是为什么我认为，整个行业中的实验平台通常不使用它的原因。
- en: The Church of Statistical Significance
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 统计显著性教会的教堂
- en: The arguments against the "Cult" of Statistical Significance are, of course,
    a response to a real problem. There *is* a dangerous Cult within our *Church*.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 反对“统计显著性崇拜”的论点当然是回应一个真实的问题。在我们的“教会”中确实有一个危险的崇拜。
- en: The Church of Statistical Significance is quite accepting. We allow for other
    alpha’s besides 5%. We choose hypotheses that don’t test against zero nulls, etc.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 统计显著性教会的教堂非常宽容。我们允许除了5%以外的其他alpha值。我们选择不针对零假设的假设，等等。
- en: But sometimes, our good name is tarnished by a radical element within the Church
    that treats anything insignificant versus a null hypothesis of 0 at the 5% level
    as "not real."
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 但有时，我们良好的名声被教会内部的激进分子玷污，他们将5%水平上与零假设0的不显著视为“不真实”。
- en: These heretics believe in a cargo-cult version of statistical analysis where
    the statistical significance procedure (at the 5% level) determines what is true
    instead of just being a useful way to make decisions and weigh uncertainty.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这些异端分子相信一种载货崇拜版本的统计分析，其中统计显著性程序（在5%的水平上）决定了什么是真实的，而不是仅仅是一种有用的决策方式和权衡不确定性的方法。
- en: We disavow all association with this dangerous sect, of course.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我们否认与这个危险教派的任何联系。
- en: Let me know if you’d like to join the Church. I’ll sign you up for the monthly
    potluck.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想加入教会，请告诉我。我会为你报名参加每月的聚餐。
- en: Thanks for reading!
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！
- en: Zach
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: Zach
