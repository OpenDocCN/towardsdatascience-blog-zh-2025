- en: Implementing the Coffee Machine Project in Python Using Object Oriented Programming
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/implementing-the-coffee-machine-project-in-python-using-object-oriented-programming/](https://towardsdatascience.com/implementing-the-coffee-machine-project-in-python-using-object-oriented-programming/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1757961260162" class="mdspan-comment">The Coffee Machine
    Project</mdspan> is a simple hands-on project that allows Python practice on loops,
    conditions, etc. The project is straightforward; we have a coffee machine that
    has different types of coffee a user may order, along with the ingredients that
    are required to make them, and their price tag. A user orders a coffee drink,
    pays in coins, the machine calculates the total, and if the payment is complete,
    it dispenses the coffee. For a better understanding of this project, check my
    already published article on Towards Data Science: **[Implementing the Coffee
    Machine in Python](https://towardsdatascience.com/implementing-the-coffee-machine-in-python/)**'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we will build the OOP version of the Coffee Machine in Python.
  prefs: []
  type: TYPE_NORMAL
- en: What is OOP?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Object Oriented Programming is a programming concept that is based on creating
    Classes and Objects. In simple words, a **Class** is a template or a blueprint,
    a defined broad category, and **Objects** are the individual structures that are
    created from these Classes. The Class in OOP defines certain features that all
    the objects that come from this class will have, these are called the **Attributes**.
    Moreover, the Class also defined certain functions that it can do. In OOP terminology,
    these are called **Methods**.
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose we define a class “Cats”. This is a broad category and will include
    all types of cats as its objects: my cat Figaro, the neighbor’s cat Simba, etc.
    Each cat will have some individual characteristics like their name, eye color,
    their breed, etc. These will be coded as their attributes. Moreover, they will
    also have specific functions like being able to hunt, sleep, play, meow, etc.
    These will be coded as their methods.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is how classes and objects are coded:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/b6a5f2aba1d6aa1eb48e3df6903832bf.png)'
  prefs: []
  type: TYPE_IMG
- en: Understanding Classes, Objects, Attributes and Methods (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: We will use the above concept and functionality to build an OOP version of a
    coffee machine.
  prefs: []
  type: TYPE_NORMAL
- en: Project Working
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In my previous article on the Coffee Machine, I thoroughly explained the working
    of the project. This project will be similar in its working, except that we will
    utilize Object-Oriented Programming to achieve the same results. Overall, we have
    the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/317e007a11138adbcbb42c97ddd15dd1.png)'
  prefs: []
  type: TYPE_IMG
- en: Flowchart (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: Defining Classes for our Coffee Machine
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first step in this project is to define our classes, one by one, and then
    we are going to use these blueprints to define objects needed throughout the project.
  prefs: []
  type: TYPE_NORMAL
- en: Defining the “MenuItem” Class
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: First of all we will define the `MenuItem` class, that will model each item
    in our menu, and will use the objects created from it in the next class we will
    create `Menu`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Suppose we want to create an object `menuitem` of the class `MenuItem`. In
    that case, we will need to give it the following parameters: name of the item,
    the amount of water required to make this menu item, the amount of milk required
    to make this menu item, the amount of coffee required to make this menu item,
    and the cost of this menu item.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c7adca5c68c2af32a17adc261a8281ff.png)'
  prefs: []
  type: TYPE_IMG
- en: menuitem object created from the MenuItem Class (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: This MeniItem class will be used to initialize objects later on.
  prefs: []
  type: TYPE_NORMAL
- en: Defining the “Menu” Class
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Next, let us define a class `Menu` that will contain the details of each item
    that can be ordered. The object `menu` can be initialized with the constructor
    below, and the menu attribute of this class will be a list of the 3 items constructed
    as objects from the class we constructed earlier `MenuItem`. We will construct
    3 objects from this class with their defined parameters. So, for example, the
    object latte will require 200 ml of water, 150ml of milk, and 24 g of coffee,
    and the cost will be $2.5\. All this will be modeled inside the class constructor
    of `Menu`, which will be used to initialize objects of this class. The __init__
    method is always called whenever we create an object.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Now we have the Menu attributes, we will also define two methods in it. One
    is to return the names of the available menu items `get_items`, and the second
    method `find_drink`, is to find the drink that the user selects through the input
    function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Creating an Object from the “Menu” Class
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: To put this class and its associated attributes and methods to use, we will
    first initialize an object `menu` of the class `Menu`. We will then use the method
    `get_items` to display to the user the items we have in our menu.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Once the user has typed their drink, we will check if it is present in the menu
    object using the `Menu` class `find_drink` method. This method checks if the user
    input is present in the menu, it will return that item, otherwise it will print
    out to the user that the drink is not available.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/957dcbd3adb41696283f21f619ea94f6.png)'
  prefs: []
  type: TYPE_IMG
- en: Menu Class methods (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: So if we give an order of a vanilla shake, the program will simply print out
    that the item is not available. When the input drink is present in our defined
    menu, the method `find_drink` will return the item. Now we can use this item in
    our coding ahead.
  prefs: []
  type: TYPE_NORMAL
- en: Defining the “CoffeeMaker” Class
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Our next step is to define the `CoffeeMaker` class. The `CoffeeMaker` class
    will store the resources specified beforehand, and will have 3 methods that their
    objects can be used:'
  prefs: []
  type: TYPE_NORMAL
- en: '`report` method : This method will allow the management to check the resources
    in the coffee machine by printing a report of all resources.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`is_resources_sufficient` method: This method will check if the resources in
    the coffee machine are sufficient to make the desired drink. It will return `True`
    if resources are sufficient; otherwise will let the user know which resource is
    insufficient.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`make_coffee` method: The last method will be called when the program’s requirements
    have been fulfilled, and we have to make the coffee. This piece of code will deduct
    the resources and dispense coffee.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Defining the “MoneyMachine” Class
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Lastly, let us also define the class `MoneyMachine`. This class will be responsible
    for the money management. It will process coins to check if payment is made and
    add the money received to the money bank.
  prefs: []
  type: TYPE_NORMAL
- en: 'The `MoneyMachine` class has the following methods:'
  prefs: []
  type: TYPE_NORMAL
- en: '`report` method: This method will print how much money we have in our account'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`process_coins` method: This method will process the payment in the form of
    coins of nickels, dimes, quarters, and pennies and will calculate the total.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`make_payment` method : This method will be used to check if the payment is
    made, is it complete or if the user has overpaid; it will return the change.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The Final Code
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Now that we have defined our classes, we will write the final code that will
    ask the user for their order, check that resources are sufficient, process the
    coins and payments and dispense the drinks when conditions are satisfied. All
    this will be done by initializing objects.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: In our final code, we have created a while loop that runs continuously unless
    someone from management commands it to stop. We have done this using the `is_on`
    boolean variable, which changes to `False` when the management types “off” as
    input to the order prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, just like we did in our coffee machine project without OOP, we have
    also added the report option that gives report of all the resources in the coffee
    machine, and the money in the account
  prefs: []
  type: TYPE_NORMAL
- en: 'The program will run as follows: It will prompt the user to order a drink by
    displaying the menu items. If the item selected by the user is in the list, it
    will first check if resources are sufficient, then ask for payment and check if
    the payment is complete, and then process the order. All this has been done using
    OOP concepts of classes and objects.'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While we have not fully explored the capabilities of OOP in this project, we
    have successfully decreased our lines of code by introducing classes and creating
    objects from them. When it comes to more complex projects with a number of different
    objects, all sharing a common blueprint, the inclusion of OOP concepts come in
    way more handy.
  prefs: []
  type: TYPE_NORMAL
- en: Nevertheless, this coffee machine project using OOP has been a useful tutorial
    to grasp the basics of Object Oriented Programming. If you have any suggestions
    or can think of an alternative flow of tasks for this project, feel free to share.
    Till then, enjoy your coffee! 😀
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a6de5447cc59cc5df2d9f522dac8346b.png)'
  prefs: []
  type: TYPE_IMG
