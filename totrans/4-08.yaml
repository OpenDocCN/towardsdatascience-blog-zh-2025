- en: Using LLamaIndex Workflow to Implement an Agent Handoff Feature Like OpenAI
    Swarm
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/using-llamaindex-workflow-to-implement-an-agent-handoff-feature-like-openai-swarm-9a63420c8540/](https://towardsdatascience.com/using-llamaindex-workflow-to-implement-an-agent-handoff-feature-like-openai-swarm-9a63420c8540/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Using LLamaIndex Workflow to Implement an Agent Handoff Feature Like OpenAI
    Swarm. Image by DALL-E-3](../Images/f9c034e299ccf2f0682ab28f5ca2e372.png)'
  prefs: []
  type: TYPE_IMG
- en: Using LLamaIndex Workflow to Implement an Agent Handoff Feature Like OpenAI
    Swarm. Image by DALL-E-3
  prefs: []
  type: TYPE_NORMAL
- en: Happy Lunar New Year, my friends!
  prefs: []
  type: TYPE_NORMAL
- en: In the last article, I introduced the Workflow framework of LlamaIndex.
  prefs: []
  type: TYPE_NORMAL
- en: '[**Deep Dive into LlamaIndex Workflow: Event-Driven LLM Architecture**](https://towardsdatascience.com/deep-dive-into-llamaindex-workflow-event-driven-llm-architecture-8011f41f851a)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Today, I will show you how to use LlamaIndex Workflow to implement a multi-agent
    orchestration feature similar to [OpenAI Swarm](https://github.com/openai/swarm?ref=dataleadsfuture.com),
    using a customer service chatbot project as an example.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Remember the Swarm framework released by OpenAI not long ago? Its biggest feature
    is agents and handoffs.
  prefs: []
  type: TYPE_NORMAL
- en: 'The agents are straightforward: they use a set of specific commands and tools
    to get tasks done. It’s like putting a LLM function call into a neat package.'
  prefs: []
  type: TYPE_NORMAL
- en: And handoffs are different. They allow an agent to pass the work to another
    agent seamlessly based on the context of the current conversation, making agents
    work together without any hiccups.
  prefs: []
  type: TYPE_NORMAL
- en: Why this is important
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s look at a diagram explaining the whole process of a ReactAgent.
  prefs: []
  type: TYPE_NORMAL
- en: '![The ReactAgent needs at least three accesses to LLM to complete. Image by
    Author](../Images/0af49b0a4fd68c736f402eab8a16462a.png)'
  prefs: []
  type: TYPE_IMG
- en: The ReactAgent needs at least three accesses to LLM to complete. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Just a simple agent call, like one, two, three, needs at least three accesses
    to LLM to complete.
  prefs: []
  type: TYPE_NORMAL
- en: Traditional agent applications are like this, keeping conversation context and
    user state, and the agent call chain is usually fixed. For each user request,
    agents have to call LLM multiple times to check the state, and honestly, some
    calls are unnecessary.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an example: imagine we have an e-commerce website, and we need a customer
    service team to answer users’ questions.'
  prefs: []
  type: TYPE_NORMAL
- en: '![In an agent chain, agents are invoked sequentially. Image by Author](../Images/b797b39a7389535e0207135fadafa660.png)'
  prefs: []
  type: TYPE_IMG
- en: In an agent chain, agents are invoked sequentially. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: In a chain agent application, every question from a user goes to the front desk,
    and then the front desk asks for the pre-sales service. If they can’t answer,
    the front desk asks for after-sales service, and then the front desk reorganizes
    the answers from the backend and replies to the customer.
  prefs: []
  type: TYPE_NORMAL
- en: Isn’t that silly? Look at all the unnecessary delays and call costs it causes!
  prefs: []
  type: TYPE_NORMAL
- en: How Swarm does it
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Swarm uses a handoff approach that fits the real world better. Let me use that
    customer service example again:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Agent handoff allows you to interact directly with the corresponding customer
    service. Image by Author](../Images/fcfb6af6ccd4381be65e27a456186d14.png)'
  prefs: []
  type: TYPE_IMG
- en: Agent handoff allows you to interact directly with the corresponding customer
    service. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a store called Swarm. When a customer asks the front desk a question,
    the front desk figures out what kind of question it is (pre-sale or after-sale)
    and passes the customer to the corresponding service. Then, the customer talks
    to that service directly.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a store called Swarm. When a customer asks the front desk a question,
    the front desk figures out what kind of question it is (pre-sale or after-sale)
    and passes the customer to the corresponding service. Then, the customer talks
    to that service directly.
  prefs: []
  type: TYPE_NORMAL
- en: Sounds reasonable, right? So why don’t we just use Swarm?
  prefs: []
  type: TYPE_NORMAL
- en: Why not just use Swarm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Because Swarm is still just an experimental framework. According to the official
    statement:'
  prefs: []
  type: TYPE_NORMAL
- en: Swarm is currently an experimental sample framework intended to explore ergonomic
    interfaces for multi-agent systems. It is not intended to be used in production
    and therefore has no official support. (This also means we will not be reviewing
    PRs or issues!)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: So, we can’t use Swarm directly in production systems.
  prefs: []
  type: TYPE_NORMAL
- en: But what we need is the agent handoff capability, right? Since that’s the case,
    why not build a similar framework yourself?
  prefs: []
  type: TYPE_NORMAL
- en: Today’s article is written for this purpose. We will develop a project using
    a customer service system as an example, which will use Workflow to implement
    agent orchestration and handoff capabilities. Let’s get started.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Project in Practice: A Customer Service Chatbot with Agent Handoff Capability'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This project is quite complex. To help you understand my implementation, I have
    put the entire project code at the end of the article. You can freely read and
    modify it without my permission.
  prefs: []
  type: TYPE_NORMAL
- en: Want to know more about my work in LLM applications or the field of data science?
    Feel free to subscribe to [my personal blog](https://www.dataleadsfuture.com/using-llamaindex-workflow-to-implement-an-agent-handoff-feature-like-openai-swarm/#/portal/signup),
    everything is free!
  prefs: []
  type: TYPE_NORMAL
- en: Step one, set up an interactive interface
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Whether you use an agent or not, you always need to adjust your prompts and
    code logic. At this point, a what-you-see-is-what-you-get chat UI becomes very
    important.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, I’ll use chainlit to quickly implement a super cool web-based
    chat window.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chainlit](https://docs.chainlit.io/get-started/overview?ref=dataleadsfuture.com)
    is a Python library built on [Streamlit](https://streamlit.io/?ref=dataleadsfuture.com).
    This means you don’t need any frontend skills to quickly build a Chatbot prototype.
    (Hooray)'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get moving.
  prefs: []
  type: TYPE_NORMAL
- en: '![The scaffold of our project. Image by Author](../Images/dbcf530a4acb8b275e86c0722edd6a29.png)'
  prefs: []
  type: TYPE_IMG
- en: The scaffold of our project. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: First, we create a `.env` file in the project’s root directory, which stores
    important environmental variables like `OPENAI_API_KEY` and `OPENAI_BASE_URL`.
    Later, I will use [dotenv](https://pypi.org/project/python-dotenv/?ref=dataleadsfuture.com)
    to read it.
  prefs: []
  type: TYPE_NORMAL
- en: This is important because by using the `.env` file, you can strip the `API_KEY`
    from your code, then you can freely publish your code.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we need to set up a simple project scaffold. Our project will contain
    two folders: `src` and `data`. Our Python source code files will be placed in
    the `src` folder, while text source files for RAG use will be placed in the `data`
    folder.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the `src` directory, first create an `app.py` file, which will act as the
    view to launch the `chainlit` interface. This file consists of three parts:'
  prefs: []
  type: TYPE_NORMAL
- en: Code to prepare the Workflow program.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Code to respond to the user lifecycle, outputting intermediate processes.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Actual code to call the Workflow agent and conduct the conversation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The code flowchart is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Flowchart of the project UI interface. Image by Author](../Images/90ec451b9b5391a3db5eda621b6dcb88.png)'
  prefs: []
  type: TYPE_IMG
- en: Flowchart of the project UI interface. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: As a production-ready system, we often need to connect to the enterprise-private
    deployment of large model ports. How to connect to a private LLM can be referred
    to in this article.
  prefs: []
  type: TYPE_NORMAL
- en: '[**How to Connect LlamaIndex with Private LLM API Deployments**](https://towardsdatascience.com/how-to-connect-llamaindex-with-private-llm-api-deployments-a3585850507b)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'To make our customer service less rigid, we can set the temperature a bit higher.
    Here is the code for initializing the system environment, I will talk about the
    implementation of `CustomerService` later:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Imagine, when the next customer service takes over to answer your question,
    what will she do first? Right, she needs to check the conversation history first.
  prefs: []
  type: TYPE_NORMAL
- en: 'So we need to create a unique, conversation-context and user-state-preserving
    workflow for each distinguished user in the user session:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'At the same time, I will also use chainlit’s `cl.step` decorator to implement
    a simple logging method, which can help us output some process logs on the page,
    letting users know where we are now:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Then there is the `main` method, which is called every round of conversation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: In this method, we first get the user-inputted dialogue, then call the workflow’s
    run method to start the agent routing, while iterating through the events in the
    workflow pipeline and calling `on_progress` to output to the page. Finally, we
    output the result of the dialogue on the page and update the Context.
  prefs: []
  type: TYPE_NORMAL
- en: 'To match the construction of the chainlit interface, we can first write a simple
    workflow:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Tada, our interactive interface is out:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Our UI interface for this project. Image by Author](../Images/ce6f3ccd842930273ae15537eb4108bc.png)'
  prefs: []
  type: TYPE_IMG
- en: Our UI interface for this project. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Next, we can start preparing the ingredients for today, and text source files
    for RAG use.
  prefs: []
  type: TYPE_NORMAL
- en: Step two, generate text files
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Since this project is about simulating a customer support team for an online
    drone e-commerce website, I plan to set the background to an online unmanned aerial
    vehicle e-commerce site.
  prefs: []
  type: TYPE_NORMAL
- en: 'I need two files: one file to introduce the drones being sold in the store
    and their details. Another file contains common FAQs about drone use and after-sales
    terms.'
  prefs: []
  type: TYPE_NORMAL
- en: To avoid business and data licensing issues, I plan to use LLM to generate the
    text I want. I specifically instructed LLM not to include any brands or real product
    information.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a screenshot of my file generation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot of data file generated using LLM. Image by Author](../Images/e1fece7fe091fef3ce6ced428a56ed62.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot of data file generated using LLM. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'You can take my prompt as a reference:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Step three, handle indexing and retrieve privatized data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The foundation LLM does not contain corporate internal data. For enterprise
    applications, it is inevitable to use RAG to allow the LLM to access corporate
    privatized data.
  prefs: []
  type: TYPE_NORMAL
- en: Our drone store is no exception. Before letting the agent staff start work,
    we need to provide them with some tools to access the product catalog and after-sales
    policy.
  prefs: []
  type: TYPE_NORMAL
- en: LlamaIndex provides many indexes suitable for different occasions. If used in
    a real system, I would prefer to use `KnowledgeGraphIndex` for product information
    text.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, to make the sample project easy to understand, I still choose to use
    `chromadb` and `VectorStoreIndex`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'The running flowchart of this code is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The running flowchart of the code. Image by Author](../Images/8f947eeb1242510e50640d3d5e45cc98.png)'
  prefs: []
  type: TYPE_IMG
- en: The running flowchart of the code. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: If vector data already exists, return the index directly. If the data has not
    been loaded yet, first load the data into the vector store, then return the index.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then we add a tool method to help the agent get the corresponding retriever:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Step four, hire a few agents
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Since we are building a smart customer service project, it is necessary to hire
    a few customer service agents.
  prefs: []
  type: TYPE_NORMAL
- en: We also need to set up a data class for agents, which needs to include instructions
    and a set of tools, just like Swarm agents. Here we use `AgentConfig` to constrain,
    which is inherited from Pydantic’s `BaseModel`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: We need to hire a lobby manager agent, this agent needs to mark which agent
    the user will be handed over to.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: We also need to design a request transfer agent, which uses this agent to notify
    the workflow when a certain customer service cannot answer the user’s question.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'Then we need to prepare a few tools for the agents to use:'
  prefs: []
  type: TYPE_NORMAL
- en: First is a `login` tool, this tool is only used to register the user’s name.
    If you need to handle the user’s login action, you can implement the details in
    this method. I use a closure to return a tool list.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Here is a detail, since the tool needs to handle the user state saved in the
    workflow Context, we need to access the `ctx` object. But when the tool is called
    by the agent, the agent cannot sense the `ctx` object, so we need to let the agent
    ignore it.
  prefs: []
  type: TYPE_NORMAL
- en: Here I modified the behavior of the `FunctionTool` module of LlamaIndex and
    rewrote the `FunctionToolWithContext` module. To save time, I referred to [an
    example](https://github.com/run-llama/multi-agent-concierge/blob/main/utils.py?ref=dataleadsfuture.com)
    on the official website, you can find it here. Of course, you can also find the
    source code at the end of the project code in the article.
  prefs: []
  type: TYPE_NORMAL
- en: We also need tools to get the product catalog and after-sales terms, these two
    tools are direct calls to the retriever, quite simple.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'To sum up, we need three professional customer service agents:'
  prefs: []
  type: TYPE_NORMAL
- en: The first one is the front desk, used to register the user’s visit.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The second one is the pre-sales service, used to recommend various products
    to users.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The third one is the after-sales service, used to answer various usage questions
    and after-sales terms.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: According to the needs of the workflow, we also need to write two methods to
    register agents to the workflow.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Finally, we also need a workflow `system_prompt` for orchestration, which will
    contain all agent information and user status, and hand over the user to the correct
    customer service agent when needed.
  prefs: []
  type: TYPE_NORMAL
- en: 'This prompt will be used directly by the workflow, no separate agent is needed,
    so just put the prompt here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Step five, build the core workflow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After so much preparation, we can finally get to the main course, and I’m sure
    everyone is eager to get started haha.
  prefs: []
  type: TYPE_NORMAL
- en: 'Since the workflow is an event-driven framework, we need to define several
    events like before:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: '`OrchestrationEvent` to indicate that the workflow needs to transfer agents.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After the agent transfer is completed, `ActiveSpeakerEvent` will tell the workflow
    to use the new agent to answer the user.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If the agent needs to make a Function call, `ToolCallEvent` will be thrown to
    execute concurrently.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The results of concurrent execution will be thrown out with `ToolCallResultEvent`,
    and summarized into the final result.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, we also need a `ProgressEvent` to stream the intermediate steps, making
    it easy for users to know where we are now. To avoid too much information interference,
    we only output the information of agent transfer here.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'After defining various events, we need to start writing the workflow. The workflow
    this time is a bit complex, so to make it easier for everyone to understand, I
    still drew a flowchart:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The flowchart of our workflow. Image by Author](../Images/5a40450845af0332b17bcaeba420ded4.png)'
  prefs: []
  type: TYPE_IMG
- en: The flowchart of our workflow. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s look at the `start` method. The `start` method is relatively simple,
    as the entry method for user dialogue, it is responsible for storing the user’s
    message in `ChatMemory`, and then judging whether there is an available agent
    currently, if there is, it throws an `ActiveSpeakerEvent`, entering the next step,
    if not, it throws an `OrchestrationEvent`, entering the agent orchestration.
  prefs: []
  type: TYPE_NORMAL
- en: '![The flowchart of the start method. Image by Author](../Images/dcb2f516db0f6cad35e02ba9fed299da.png)'
  prefs: []
  type: TYPE_IMG
- en: The flowchart of the start method. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'From shallow to deep, let’s look at how the agent orchestration `orchestrate`
    method works:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The flowchart of the orchestrate method. Image by Author](../Images/e3a9a033239dc8a3d5c2187c92aa2a8b.png)'
  prefs: []
  type: TYPE_IMG
- en: The flowchart of the orchestrate method. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: This method first takes the currently available agent and user state, and updates
    our `ORCHESTRATION_PROMPT` written in `agents.py`, thus getting the complete `system_prompt`.
  prefs: []
  type: TYPE_NORMAL
- en: Then we use `TransferToAgent`, `system_prompt`, and `chat_history` all to LLM,
    letting LLM judge which agent to hand over to next.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: After getting the latest agent, we update the context and throw an `ActiveSpeakerEvent`.
  prefs: []
  type: TYPE_NORMAL
- en: We also need to define `achat_to_tool_calls` and `_get_user_state_str` as these
    two tool methods. `achat_to_tool_calls` method is responsible for getting the
    currently needed tools from LLM. `_get_user_state_str` is used to convert the
    user state into a string.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'After studying the `Orchestrate` branch, let’s see how the `ActiveSpeaker`
    branch works, which is the `speak_with_sub_agent` method:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The flowchart of the speak_with_sub_agent method. Image by Author](../Images/ea6a0b5e47aa1c9363e237fb3103d6b0.png)'
  prefs: []
  type: TYPE_IMG
- en: The flowchart of the speak_with_sub_agent method. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: This method first gets the current service-providing agent, as well as `chat_history`
    and `user_state`.
  prefs: []
  type: TYPE_NORMAL
- en: Then use the current agent’s `sys_prompt` and `tools`, as well as `chat_history`,
    to let LLM judge which tools to call next.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: It is important to note that although the sample project is relatively simple,
    each agent’s tools only have one, but in actual projects, there are often multiple
    tools to be called concurrently. So we need to iterate through `tool_calls`, throwing
    `ToolCallEvent` separately.
  prefs: []
  type: TYPE_NORMAL
- en: At the same time, we also need to consider the situation where the current agent
    may not be able to handle the user’s request, thus calling `RequestTransfer`,
    then we need to go back to the `orchestrate` step and re-select the agent.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at the `handle_tool_calls` section, the code in this section looks
    a lot, but the actual thing to do is very simple, just get the tool to be executed
    and execute it, so simple that I don’t even want to draw a flowchart.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: There is a small detail here, I set a parameter `num_workers=4` for the `step`
    decorator. This is to tell the workflow that the concurrency is only up to 4,
    to avoid too high concurrency causing downstream system blockage.
  prefs: []
  type: TYPE_NORMAL
- en: Then we come to the last method `aggregate_too_results`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: This method is relatively simple, just get all the execution results of `tool_calls`,
    then write them into `ChatMemory`, and finally hand them back to the agent to
    evaluate the results and answer the user.
  prefs: []
  type: TYPE_NORMAL
- en: Step six, check our hard work
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: At this point in the plot, our customer service team has been built, let’s check
    if these agents are working hard. Start!
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
