- en: Align Your Data Architecture for Universal Data Supply
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/align-your-data-architecture-for-universal-data-supply-656349c9ae66/](https://towardsdatascience.com/align-your-data-architecture-for-universal-data-supply-656349c9ae66/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Simone Hutsch on Unsplash](../Images/e31fde14fad3ba0117ea1098fba99d11.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
- en: Photo by [Simone Hutsch](https://unsplash.com/@heysupersimi?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Now that we understand the business requirements, we need to check if the current
    data architecture supports them.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: If you’re wondering what to assess in our data architecture and what the current
    setup looks like, check the [business case description](https://medium.com/towards-data-science/universal-data-supply-know-your-business-9ed8a80a0224).
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: · [Assessing against short-term requirements](#7f9d) ∘ [Initial alignment approach](#ce10)
    · [Medium-term requirements and long-term vision](#2594) · [Step-by-step conversion](#6f61)
    ∘ [Agility requires some foresight](#32e6) ∘ [Build your business process and
    information model](#ca6c) ∘ [Holistically challenge your architecture](#af14)
    ∘ [Decouple and evolve](#fe30)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Assessing against short-term requirements
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s recap the short-term requirements:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: '**Immediate feedback with automated compliance monitors**: Providing timely
    feedback to staff on compliance to reinforce hand hygiene practices effectively.
    Calculate the compliance rates in near real time and show them on ward monitors
    using a simple traffic light visualization.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Device availability and maintenance**: Ensuring dispensers are always functional,
    with near real-time tracking for refills to avoid compliance failures due to empty
    dispensers.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The current weekly batch ETL process is obviously not able to deliver immediate
    feedback.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: However, we could try to reduce the batch runtime as much as possible and loop
    it continuously. For near real-time feedback, we would also need to run the query
    continuously to get the latest compliance rate report.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Both of these technical requirements are challenging. The weekly batch process
    from the HIS handles large data volumes and can’t be adjusted to run in seconds.
    Continuous monitoring would also put a heavy load on the data warehouse if we
    keep the current model, which is optimized for tracking history.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Before we dig deeper to solve this, let’s also examine the second requirement.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: 'The smart dispenser can be loaded with bottles of various sizes, tracked in
    the *Dispenser Master Data*. To calculate the current fill level, we subtract
    the total amount dispensed from the initial volume. Each time the bottle is replaced,
    the fill level should reset to the initial volume. To support this, the dispenser
    manufacturer has announced two new events to be implemented in a future release:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: The dispenser will automatically track its fill level and send a *refill warning*
    when it reaches a configurable low point. This threshold is based on the estimated
    time until the bottle is empty (*remaining time to failure*).
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分配器将自动跟踪其填充水平，并在达到可配置的低点时发送 *补充警告*。此阈值基于瓶子空前的估计时间（*剩余故障时间*）。
- en: When the dispenser’s bottle is replaced, it will send a *bottle exchange event*.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当分配器的瓶子被更换时，它将发送 *瓶子交换事件*。
- en: However, these improved devices won’t be available for about 12 months. As a
    workaround, the current ETL process needs to be updated to perform the required
    calculations and generate the events.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这些改进的设备大约需要 12 个月才能可用。作为权宜之计，当前的 ETL 流程需要更新以执行所需的计算并生成事件。
- en: A new report is needed based on these events to inform support staff about dispensers
    requiring timely bottle replacement. In medium-sized hospitals with 200–500 dispensers,
    intensive care units use about two 1-liter bottles of disinfectant per month.
    This means around 19 dispensers need refilling in the support staff’s weekly exchange
    plan.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 需要基于这些事件生成一份新报告，以通知支持人员哪些分配器需要及时更换瓶子。在中型医院（200-500 个分配器）中，重症监护室每月大约使用 2 升消毒剂。这意味着大约有
    19 个分配器需要在支持人员的每周交换计划中补充。
- en: Since dispenser usage varies widely across wards, the locations needing bottle
    replacements are spread throughout the hospital. Support staff would like to receive
    the bottle exchange list organized in an optimal route through the building.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 由于分配器使用情况在各个病房之间差异很大，需要更换瓶子的位置遍布整个医院。支持人员希望收到按最佳路线组织好的瓶子交换清单。
- en: Initial alignment approach
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 初始对齐方法
- en: Following the principle "Never change a running system," we could try to reuse
    as many components as possible to minimize changes.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 遵循“永不更改运行中的系统”的原则，我们可以尽可能多地重用组件以最小化更改。
- en: '![Initial idea to implement short-term requirements— Image by author](../Images/1fb64607893909e6e0fca64ecdccaf9a.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![实施短期要求的初始想法——作者图片](../Images/1fb64607893909e6e0fca64ecdccaf9a.png)'
- en: Initial idea to implement short-term requirements— Image by author
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 实施短期要求的初始想法——作者图片
- en: We would have to build NEW components (in green) and CHANGE existing components
    (in dark blue) to support the new requirements.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将不得不构建新的组件（绿色部分）并更改现有的组件（深蓝色部分）以支持新的要求。
- en: We know the batch needs to be replaced with stream processing for near real-time
    feedback. We consider using [Change Data Capture (CDC)](https://en.wikipedia.org/wiki/Change_data_capture)a
    technology to get updates on dispenser usage from the internal relational database.
    However, tests on the *Dispenser Monitoring System* showed that the *Dispenser
    Usage Data Collector* only updates the database every 5 minutes. To keep things
    simple, we decide to reschedule the weekly batch extraction process to sync with
    the monitoring system’s 5-minute update cycle.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道批处理需要替换为流处理以实现近实时反馈。我们考虑使用 [变更数据捕获 (CDC)](https://en.wikipedia.org/wiki/Change_data_capture)
    技术从内部关系型数据库获取分配器使用情况的更新。然而，对 *分配器监控系统* 的测试显示，*分配器使用数据收集器* 每隔 5 分钟才更新数据库。为了简化问题，我们决定重新安排每周的批处理提取过程，以与监控系统的
    5 分钟更新周期同步。
- en: By reducing the batch runtime and continuously looping over it, we effectively
    create a microbatch that supports stream processing. For more details, see my
    article on [how to unify batch and stream processing](https://towardsdatascience.com/batch-and-streaming-demystified-for-unification-dee0b48f921d).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 通过减少批处理运行时间并持续循环，我们有效地创建了一个支持流处理的微批处理。更多详情，请参阅我的关于 [如何统一批处理和流处理](https://towardsdatascience.com/batch-and-streaming-demystified-for-unification-dee0b48f921d)
    的文章。
- en: Reducing the runtime of the *HIS Data* ETL batch process is a major challenge
    due to the large amount of data involved. We could decouple patient and occupancy
    data from the rest of the *HIS data*, but the *HIS database* extraction process
    is a complex, long-neglected COBOL program that no one dares to modify. The extraction
    logic is buried deep within the COBOL monolith, and there is limited knowledge
    of the source systems. Therefore, we consider implementing near real-time extraction
    of patient and occupancy data from HIS as "not feasible."
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 由于涉及大量数据，减少 *HIS 数据* ETL 批处理过程的运行时间是主要挑战。我们可以将患者和占用数据从其他 *HIS 数据* 中解耦，但 *HIS
    数据库* 提取过程是一个复杂、长期被忽视的 COBOL 程序，没有人敢修改。提取逻辑深深埋藏在 COBOL 单块中，对源系统的了解有限。因此，我们认为在 HIS
    中实现患者和占用数据的近实时提取是“不可行的”。
- en: Instead, we plan to adjust the *Compliance Rate Calculation* to allow near real-time
    *Dispenser Usage Data* to be combined with the still-weekly updated *HIS data*.
    After discussing this with the hygiene specialists, we agree that the low rates
    of change in patient treatment and occupancy suggest the situation will remain
    fairly stable throughout the week.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我们计划调整*合规率计算*，以便将几乎实时的*分配器使用数据*与仍每周更新的*HIS数据*相结合。在与卫生专家讨论后，我们同意患者治疗和入住率的变化率较低，表明整个星期情况将相对稳定。
- en: The *Continuous Compliance Rate On Ward Level* will be stored in a real-time
    partition associated to the ward entity of the data warehouse. It will support
    short runtimes of the new *Traffic Light Monitor Query* that is scheduled as successor
    to the respective ETL batch process.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '*病房级别的持续合规率*将存储在实时分区中，与数据仓库的病房实体相关联。它将支持新的*交通灯监控查询*的短期运行时间，该查询作为相应ETL批处理过程的后续安排。'
- en: Consequently, the monitor will be updated every 5 minutes, which seems close
    enough to near real-time. The new *Exchange List Query* will be scheduled weekly
    to create the *Weekly Bottle-Exchange Plan* to be sent by email to the support
    staff.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，监控器将每5分钟更新一次，这似乎足够接近实时。新的*交换列表查询*将按周安排，以创建*每周瓶装交换计划*，通过电子邮件发送给支持人员。
- en: We feel confident that this will adequately address the short-term requirements.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有信心这足以满足短期需求。
- en: Medium-term requirements and long-term vision
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 中期需求和长期愿景
- en: 'However, before we start sprinting ahead with the short-term solution, we should
    also examine the medium and long-term vision. Let’s recap the identified requirements:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在我们开始迅速实施短期解决方案之前，我们也应该审视中期和长期愿景。让我们回顾一下确定的需求：
- en: '**Granular data insights**: Moving beyond aggregate reports to gain insight
    into compliance at more specific levels (e.g., by shift or even person).'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**细粒度数据洞察**：超越汇总报告，在更具体级别（例如，按班次或甚至个人）了解合规性。'
- en: '**Actionable alerts for non-compliance**: Leveraging historical data with near
    real-time extended monitoring data to enable systems to notify staff immediately
    of missed hygiene actions, ideally personalized by healthcare worker.'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**非合规行动的可操作警报**：利用历史数据与几乎实时的扩展监控数据相结合，使系统能够立即通知工作人员遗漏的卫生行动，理想情况下由医疗保健工作者个性化。'
- en: '**Personalized compliance dashboards**: Creating personalized dashboards that
    show each worker’s compliance history, improvement opportunities, and benchmarks.'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**个性化合规仪表板**：创建个性化的仪表板，显示每个工作人员的合规历史、改进机会和基准。'
- en: '**Integration with smart wearables**: Utilizing wearable technology to give
    real-time and discrete feedback directly to healthcare workers, supporting compliance
    at the point of care.'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**与智能可穿戴设备的集成**：利用可穿戴技术直接向医疗保健工作者提供实时和隐蔽的反馈，支持护理点的合规性。'
- en: These long-term visions highlight the need to significantly improve real-time
    processing capabilities. They also emphasize the importance of processing data
    at a more granular level and using intelligent processing to derive individualized
    insights. Processing personalized information raises security concerns that must
    be properly addressed as well. Finally, we need to seamlessly integrate advanced
    monitoring devices and smart wearables to receive personalized information in
    a secure, discreet, and timely manner.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这些长期愿景突出了显著提高实时处理能力的需求。它们还强调了在更细粒度级别处理数据和使用智能处理以获得个性化见解的重要性。处理个性化信息会引发必须妥善解决的安全问题。最后，我们需要无缝集成先进的监控设备和智能可穿戴设备，以安全、隐蔽和及时地接收个性化信息。
- en: That leads to a whole chain of additional challenges for our current architecture.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致了一系列对我们当前架构的额外挑战。
- en: But it’s not only the requirements of the hygiene monitoring that are challenging;
    the hospital is also about to be taken over by a large private hospital operator.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 但挑战不仅限于卫生监控的要求；医院也即将被一家大型私营医院运营商接管。
- en: This means the current HIS must be integrated into a larger system that will
    cover 30 hospitals. The goal is to extend the advanced monitoring functionality
    for hygiene dispensers so that other hospitals in the new operator’s network can
    also benefit. As a long-term vision, they want the monitoring functionality to
    be seamlessly integrated into their global HIS.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着当前的HIS必须集成到一个更大的系统中，该系统将覆盖30家医院。目标是扩展卫生分配器的先进监控功能，以便新运营商网络中的其他医院也能从中受益。作为一个长期愿景，他们希望监控功能能够无缝集成到他们的全球HIS中。
- en: Another challenge is planning for the announced innovations from the dispenser
    manufacturer. Through ongoing discussions about remaining time to failure, refill
    warnings, and bottle exchange events, we know the manufacturer is open to enabling
    real-time streaming for *Dispenser Usage Data*. This would allow data to be sent
    directly to consumers, bypassing the current 5-minute batch process through the
    relational database.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个挑战是规划分配器制造商宣布的创新。通过关于剩余故障时间、加注警告和瓶子交换事件的持续讨论，我们知道制造商愿意启用*分配器使用数据*的实时流。这将允许数据直接发送给消费者，绕过当前通过关系数据库的5分钟批量处理过程。
- en: Step-by-step conversion
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 逐步转换
- en: We want to counter the enormous challenges facing our architecture with a gradual
    transformation.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望通过逐步转型来应对我们架构面临的巨大挑战。
- en: Since we’ve learned that working agile is beneficial, we want to start with
    the initial idea and then refine the system in subsequent steps.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经了解到敏捷工作是有益的，我们希望从最初的想法开始，然后在后续步骤中逐步完善系统。
- en: But is this really agile working?
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 但这真的是敏捷工作吗？
- en: Agility requires some foresight
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 灵活性需要一定的远见
- en: What I often encounter is that people equate "acting in small incremental steps"
    with working agile. While it’s true that we want to evolve our architecture progressively,
    each step should aim at the long-term target.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常遇到的情况是，人们将“以小步骤行动”等同于敏捷工作。虽然我们确实希望逐步进化我们的架构，但每一步都应该以长期目标为方向。
- en: If we constrain our evolution to what the current IT architecture can deliver,
    we might not be moving toward what is truly needed.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将我们的进化限制在当前IT架构能够提供的内容上，我们可能不会朝着真正需要的方向发展。
- en: When we developed our initial alignment, we just reasoned on how to implement
    the first step within the existing architecture’s constraints. However, this approach
    narrows our view to what’s ‘feasible’ within the current setup.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们开发最初的协调时，我们只是根据如何在现有架构的约束下实施第一步进行推理。然而，这种方法使我们的视野局限于当前设置中什么是“可行的”。
- en: So, let’s try the opposite and clearly address what’s needed including the long-term
    requirements. Only then we can target the next steps to move the architecture
    in the right direction.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们尝试相反的方法，并明确指出所需的内容，包括长期需求。只有这样，我们才能将下一步的目标定位在正确的架构方向上。
- en: For architecture decisions, we don’t need to detail every aspect of the business
    processes using standards like Business Process Model and Notation (BPMN). We
    just need a high-level understanding of the process and information flow.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对于架构决策，我们不需要使用业务流程模型和符号（BPMN）等标准详细说明业务流程的每个方面。我们只需要对流程和信息流有一个高级理解。
- en: But what’s the right level of detail that allows us to make evolutionary architecture
    decisions?
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 但正确的详细程度是什么，使我们能够做出进化架构决策？
- en: Build your business process and information model
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建你的业务流程和信息模型
- en: Let’s start very high to find out about the right level.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从很高的起点开始，找出正确的水平。
- en: In [part 3 of my series on Challenges and Solutions in Data Mesh](https://medium.com/towards-data-science/challenges-and-solutions-in-data-mesh-part-3-dacb917f3c91)
    I have outlined an approach based on **modeling patterns** to model an ontology
    or enterprise data model. Let’s apply this approach to our example.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的关于数据网格挑战和解决方案系列的第3部分中，我在[https://medium.com/towards-data-science/challenges-and-solutions-in-data-mesh-part-3-dacb917f3c91](https://medium.com/towards-data-science/challenges-and-solutions-in-data-mesh-part-3-dacb917f3c91)中概述了一种基于**建模模式**的方法，用于建模本体或企业数据模型。让我们将这种方法应用到我们的示例中。
- en: '***Note:*** We can’t create a complete ontology for the healthcare industry
    in this article. However, we can apply this approach to the small sub-topic relevant
    to our example.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '***注意：*** 在本文中，我们无法为医疗保健行业创建一个完整的本体。然而，我们可以将这种方法应用于与我们示例相关的小子主题。'
- en: '* * *'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Let’s identify the obvious **modeling patterns** relevant for our example:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们确定与我们示例相关的明显**建模模式**：
- en: '*Party & Role:* The parties acting in our healthcare example include patients,
    medical device suppliers, healthcare professionals (doctors, nurses, hygiene specialists,
    etc.), the hospital operator, support staff and the hospital as an organizational
    unit.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '*当事人 & 角色:* 在我们的医疗保健示例中，涉及的当事人包括患者、医疗设备供应商、医疗保健专业人员（医生、护士、卫生专家等）、医院运营商、支持人员和医院作为一个组织单位。'
- en: '*Location:* The hospital building address, patient rooms, floors, laboratories,
    operating rooms, etc.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '*位置:* 医院建筑地址、病房、楼层、实验室、手术室等。'
- en: '*Ressource / Asset:* The hospital as a building, medical devices like our intelligent
    dispensers, etc.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '*资源 / 资产:* 医院作为建筑，我们的智能分配器等医疗设备等。'
- en: '*Document:* All kinds of files representing patient information like diagnosis,
    written agreements, treatment plans, etc.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '*文件:* 代表患者信息（如诊断、书面协议、治疗方案等）的各种文件。'
- en: '*Event:* We have identified dispenser-related events, such as bottle exchange
    and refill warnings, as well as healthcare practitioner-related events, like an
    identified hand hygiene opportunity or moment.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '*事件:* 我们已经确定了与分配器相关的事件，如瓶装交换和补充警告，以及与医疗保健实践者相关的活动，如识别手卫生机会或时刻。'
- en: '*Task:* From the doctor’s patient treatment plan, we can directly derive procedures
    or activities that healthcare workers need to perform. Monitoring these procedures
    is one of the many information requirements for delivering healthcare services.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '*任务:* 从医生的患者治疗计划中，我们可以直接推导出医疗工作者需要执行的过程或活动。监控这些过程是提供医疗保健服务的许多信息需求之一。'
- en: '* * *'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'The following high-level modeling patterns my not be as obvious for the healthcare
    setup in our example at first sight:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 以下高级建模模式可能在我们示例的医疗保健设置中一开始并不明显：
- en: '*Product:* Although we might not think of hospitals of being product-oriented,
    they certainly provide services like diagnoses or patient treatments. If pharmaceuticals,
    supplies, and medical equipment are offered, we even can talk about typical products.
    A better overall term would probably be a "health care offering".'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '*产品:* 虽然我们可能不会将医院视为以产品为导向，但它们确实提供诊断或患者治疗等服务。如果提供药品、供应品和医疗设备，我们甚至可以谈论典型的产品。一个更好的整体术语可能是“健康保健服务”。'
- en: '*Agreement:* Not only agreements between provider networks and supplier agreements
    for the purchase of medical products and medicines but also agreements between
    patients and doctors.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '*协议:* 不仅包括提供者网络与供应商之间的协议，用于购买医疗产品和药品，还包括患者与医生之间的协议。'
- en: '*Account:* Our use case is mainly concerned with upholding best hygiene practices
    by closely monitoring and educating staff. We just don’t focus on accounting aspects
    here. However, accounting in general as well as claims management and payment
    settlement are very important healthcare business processes. A large part of the
    Hospital Information System (HIS) therefore deals with accounting.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '*账户:* 我们的主要用例是关注通过密切监控和教育员工来维护最佳卫生实践。我们在这里并不专注于会计方面。然而，一般会计以及索赔管理和支付结算是非常重要的医疗保健业务流程。因此，医院信息系统（HIS）的大部分内容都涉及会计。'
- en: Let’s visualize our use case with this high-level modeling patterns and their
    relationships.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用这些高级建模模式和它们之间的关系来可视化我们的用例。
- en: '![Our example from the healthcare sector, illustrated with high-level modeling
    patterns - Image by author](../Images/5b51953dad94a446ea7b397ffd832bbd.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![来自医疗保健行业的示例，用高级建模模式说明 - 图片由作者提供](../Images/5b51953dad94a446ea7b397ffd832bbd.png)'
- en: Our example from the healthcare sector, illustrated with high-level modeling
    patterns – Image by author
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 来自医疗保健行业的示例，用高级建模模式说明 – 图片由作者提供
- en: What does this buy us?
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这能给我们带来什么？
- en: With this high-level model we can identify ‘hygiene monitoring’ as an overall
    business process to observe patient care and take appropriate action so that infections
    associated with care are prevented in the best possible way.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个高级模型，我们可以将“卫生监控”识别为一个整体业务流程，以观察患者护理并采取适当的行动，以尽可能最佳地预防与护理相关的感染。
- en: We recognize ‘patient management’ as an overall process to manage and track
    all the patient care activities related to the healthcare plan prepared by the
    doctors.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将“患者管理”视为一个整体过程，用于管理和跟踪与医生制定的医疗保健计划相关的所有患者护理活动。
- en: We recognize ‘hospital management’ that organizes assets like hospital buildings
    with patient bedrooms as well as all medical devices and instrumentation inside.
    Patients and staff occupy and use these assets over time and this usage needs
    to be managed.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我们认识到“医院管理”这一概念，它组织着像医院病房这样的资产，以及所有内部医疗设备和仪器。患者和工作人员会占用和使用这些资产，并且这种使用需要得到管理。
- en: 'Let’s describe some of the processes:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们描述一些流程：
- en: A *Doctor* documents the *Diagnosis* derived from the examination of the *Patient*
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医生**记录从**患者**检查中得出的**诊断**。'
- en: A *Doctor* discusses the derived *Diagnosis* with the *Patient* and documents
    everything that has been agreed with the *Patient* about the recommended treatment
    in a *Patient Treatment Plan*.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医生**与**患者**讨论推导出的**诊断**，并在**患者治疗计划**中记录与**患者**就推荐治疗达成一致的所有内容。'
- en: The *Agreement* on the treatment triggers the *Treatment Procedure* and reflects
    the responsibility of the *Doctor* and *Nurses* for the patient’s treatment.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治疗协议**触发**治疗程序**，并反映了**医生**和**护士**对患者治疗的责任。'
- en: A *Nurse* responsible for *Patient Bed Occupancy* will assign a patient bed
    at the ward, which triggers a *Patient Bed Allocation*.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 负责**患者床位占用**的**护士**将在病房分配患者床位，这会触发**患者床位分配**。
- en: A *Nurse* responsible for the patient’s treatment takes a blood sample from
    the patient and triggers several *Hand Hygiene Opportunities* and *Dispenser Hygiene
    Actions* detected by *Hygiene Monitoring*.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 负责患者治疗的**护士**从患者那里抽取血样，并触发由**卫生监测**检测到的几个**手卫生机会**和**分配器卫生行动**。
- en: The *Hygiene Monitoring* calculates compliance from *Dispenser Hygiene Action,
    Hand Hygiene Opportunity,* and *Patient Bed Allocation* information and documents
    it for the *Continuous Compliance Monitor*.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**卫生监测**从**分配器卫生行动、手卫生机会、患者床位分配**信息中计算合规性，并将其记录在**持续合规监控器**中。'
- en: During the week ongoing *Dispenser Hygiene Actions* cause the *Hygiene Monitoring*
    to trigger *Dispenser Refill Warnings*.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一周内进行的**分配器卫生行动**会导致**卫生监测**触发**分配器补充警告**。
- en: A *Hygiene Specialist* responsible for the *Hygiene Monitoring* compiles a weekly
    *Bottle Exchange Plan* from accumulated *Dispenser Refill Warnings*.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 负责**卫生监测**的**卫生专家**从累积的**分配器补充警告**中编制每周的**瓶交换计划**。
- en: '*Support Staff* responsible for the weekly *Exchange Bottle Tour* receives
    the *Bottle Exchange Plan* and triggers *Dispenser Bottle Exchange* events when
    replacing empty bottles for the affected dispensers.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 负责每周**交换瓶巡检**的**支持人员**接收**瓶交换计划**，并在为受影响的分配器更换空瓶时触发**分配器瓶交换**事件。
- en: and so on …
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 等等 …
- en: This way we get an overall functional view of our business. The view is completely
    independent of the architectural style we’ll choose to actually implement the
    business requirements.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这样我们就能获得业务的整体功能视图。这个视图完全独立于我们将选择的实际实现业务需求的架构风格。
- en: A high-level business process and information model is therefore a perfect artifact
    to discuss any use case with healthcare practitioners.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，一个高级的业务流程和信息模型是讨论任何与医疗从业者相关的用例的完美工具。
- en: Holistically challenge your architecture
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 全方位挑战你的架构
- en: With such a thorough understanding of our business, we can challenge our architecture
    more holistically. Everything we already understand and know today can and should
    be used to drive our next step toward the target architecture.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在对业务有如此透彻的理解之后，我们可以更全面地挑战我们的架构。我们今天已经理解和知道的一切都可以，并且应该被用来推动我们向目标架构的下一步迈进。
- en: 'Let’s examine why our initial architecture approach falls short to properly
    support all identified requirements:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看为什么我们的初始架构方法未能充分支持所有已识别的需求：
- en: '**Near real-time processing is only partly addressed**'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**近实时处理仅部分解决**'
- en: A traditional data warehouse architecture is not the ideal architectural approach
    for near real-time processing. In our example, the long-running *HIS data* extraction
    process is a batch-oriented monolith that cannot be tuned to support low-latency
    requirements.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的数据仓库架构并不是近实时处理的理想架构方法。在我们的例子中，长时间运行的**HIS数据**提取过程是一个面向批次的单体，无法调整以支持低延迟需求。
- en: We can split the monolith into independent extraction processes, but to really
    enable all involved applications for near real-time processing, we need to rethink
    the way we share data across applications.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将单体拆分为独立的提取过程，但为了真正使所有相关应用程序能够实现近实时处理，我们需要重新思考我们在应用程序之间共享数据的方式。
- en: As data engineers, we should create abstractions that relieve the application
    developer from low-level data processing decisions. They should neither have to
    reason about whether batch or stream processing style needs to be chosen nor need
    to know how to actually implement this technically.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据工程师，我们应该创建抽象，使应用程序开发者从低级数据处理决策中解脱出来。他们既不需要考虑是否需要选择批处理或流处理风格，也不需要知道如何实际在技术上实现这一点。
- en: If we allow the application developers to implement the required business logic
    independent of these technical data details, it would greatly simplify their job.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们允许应用程序开发者独立于这些技术数据细节实现所需的企业逻辑，这将极大地简化他们的工作。
- en: You can get more details on how to practically implement this in my article
    on [unifying batch and stream processing](https://towardsdatascience.com/batch-and-streaming-demystified-for-unification-dee0b48f921d).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在我的关于[统一批处理和流处理](https://towardsdatascience.com/batch-and-streaming-demystified-for-unification-dee0b48f921d)的文章中了解更多关于如何实际实施这些内容的细节。
- en: '**The initial alignment is driven by technology, not by business**'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始对齐是由技术驱动的，而不是由业务驱动的**'
- en: Business requirements should drive the IT architecture decisions. If we turn
    a blind eye and soften the requirements to such an extent that it becomes ‘feasible’,
    we allow technology to drive the process.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 企业需求应该驱动IT架构决策。如果我们视而不见，将需求软化到“可行”的程度，我们就允许技术驱动这个过程。
- en: The discussion with the hygiene specialists about the low rates of change in
    patient treatment and occupancy are such a softening of requirements. We know
    that there will be situations where the state will change during the week, but
    we accept the assumption of stability to keep the current IT architecture.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 与卫生专家关于患者治疗和占用率变化率低的讨论是这样的需求软化。我们知道在周内会有状态变化的情况，但我们接受稳定性的假设以保持当前的IT架构。
- en: Even if we won’t be able to immediately change the complete architecture, we
    should take steps into the right direction. Even if we cannot enable all applications
    at once to support near real-time processing, we should take action to create
    support for it.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 即使我们不能立即改变整个架构，我们也应该朝着正确的方向迈出步伐。即使我们无法立即使所有应用程序都支持近实时处理，我们也应该采取行动来创建支持它的支持。
- en: '**Smart devices, standard operational systems (HIS) and advanced monitoring
    need to be seamlessly integrated**'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能设备、标准操作系统（HIS）和高级监控需要无缝集成**'
- en: The long-term vision is to seamlessly integrate the monitoring functionality
    with available HIS features. This includes the integration of various new (sub-)systems
    and new technical devices that are essential for operating the hospital.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 长期愿景是将监控功能与现有的HIS（医院信息系统）功能无缝集成。这包括集成各种新的（子）系统和新的技术设备，这些对于医院运营至关重要。
- en: With an architecture that focuses one-sidedly on analytical processing, we cannot
    adequately address these cross-cutting needs. We need to find ways to enable flexible
    data flow between all future participants in the system. Every application or
    system component requires to be connected to our mesh of data without having to
    change the component itself.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个单方面专注于分析处理的架构中，我们无法充分解决这些横切需求。我们需要找到方法，使系统中的所有未来参与者之间能够实现灵活的数据流动。每个应用程序或系统组件都需要连接到我们的数据网，而无需改变该组件本身。
- en: Overall, we can state that the initial architecture change plan won’t be a targeted
    step towards such a flexible integration approach.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，我们可以断言，初始架构变更计划不会是朝着这种灵活集成方法的针对性步骤。
- en: Decouple and evolve
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解耦和演进
- en: To ensure that each and every step is effective in moving towards our target
    architecture, we need a balanced decoupling of our current architecture components.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保每一步都有效地朝着我们的目标架构迈进，我们需要对当前架构组件进行平衡解耦。
- en: Universal data supply therefore defines the abstraction *data as a product*
    for the exchange of data between applications of any kind. To enable current applications
    to create *data as a product* without having to completely redesign them, we use
    *data agents* to (re-)direct data flow from the application to the mesh.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，通用数据供应定义了数据交换的抽象“数据作为产品”，适用于任何类型的应用程序之间的数据交换。为了使当前应用程序能够创建“数据作为产品”而无需完全重新设计，我们使用“数据代理”来（重新）将数据流从应用程序导向数据网。
- en: '[**Modern Data And Application Engineering Breaks the Loss of Business Context**](https://towardsdatascience.com/modern-data-and-application-engineering-breaks-the-loss-of-business-context-7d0bca755adb)'
  id: totrans-112
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**现代数据与应用工程打破业务上下文丢失**](https://towardsdatascience.com/modern-data-and-application-engineering-breaks-the-loss-of-business-context-7d0bca755adb)'
- en: By using these abstractions, any application can also become near real-time
    capable. Because it doesn’t matter if the application is part of the operational
    or the analytical plane, the intended integration of the operational HIS with
    hygiene monitoring components is significantly simplified.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用这些抽象，任何应用程序也可以成为接近实时能力的。因为无论应用程序是操作平面还是分析平面的一部分，预期的操作HIS与卫生监测组件的集成都显著简化。
- en: '[**Operational and Analytical Data**](https://towardsdatascience.com/operational-and-analytical-data-54fc9de05330)'
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**操作和分析数据**](https://towardsdatascience.com/operational-and-analytical-data-54fc9de05330)'
- en: Let’s examine how the decoupling helps, for instance, to integrate the current
    data warehouse to the mesh.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看解耦如何帮助，例如，将当前的数据仓库集成到网格中。
- en: The data warehouse can be [redefined to act like one among many applications
    in the mesh](https://medium.com/towards-data-science/data-warehouse-redefined-f65609454a01).
    We can, for instance, re-design the ETL component *Continuous Compliance Rate
    on Ward Level* as an independent application producing the *data as a product*
    abstraction. If we don’t want or can’t touch the ETL logic itself, we can instead
    use the *data agent* abstraction to transform data to the target structure.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 数据仓库可以被[重新定义为网格中许多应用程序之一](https://medium.com/towards-data-science/data-warehouse-redefined-f65609454a01)。例如，我们可以重新设计ETL组件*病房级别的持续合规率*作为一个独立的应用程序，产生*数据作为产品*抽象。如果我们不想或不能触及ETL逻辑本身，我们可以使用*数据代理*抽象来转换数据到目标结构。
- en: We can do the same for *Dispenser Exchange Events* or any other ETL or query
    / reporting component identified. The COBOL monolith *HIS Data* can be decoupled
    by implementing a data agent that separates the *data products HIS occupancy data*
    and *HIS patient data*. This allows to evolve the data delivering components completely
    independent of the consumers.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以对*分配器交换事件*或任何其他ETL或查询/报告组件进行同样的操作。通过实现一个数据代理，将*数据产品HIS占用数据*和*HIS患者数据*分离，可以解耦COBOL单体*HIS数据*。这允许数据交付组件完全独立于消费者进行演进。
- en: Whenever the dispenser vendor is ready to deliver advanced functionalities to
    directly create the required exchange events, we would just have to change the
    *Dispenser Exchange Events* component. Either the vendor can deliver the *data
    as a product* abstraction directly, or we can convert the dispenser’s proprietary
    data output by adapting *Dispenser Exchange Event data agent and logic*.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 当分配器供应商准备好直接创建所需的交换事件的高级功能时，我们只需更改*分配器交换事件*组件。供应商可以直接提供*数据作为产品*抽象，或者我们可以通过调整*分配器交换事件数据代理和逻辑*来转换分配器的专有数据输出。
- en: '![Aligned Architecture as an Adapted Data Mesh enabling universal data supply
    - Image by author](../Images/aa021c094ad21417ee7c358c50230c95.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![架构对齐作为适应数据网格的统一数据供应 - 图像由作者提供](../Images/aa021c094ad21417ee7c358c50230c95.png)'
- en: Aligned Architecture as an Adapted Data Mesh enabling universal data supply
    – Image by author
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 作为适应数据网格的统一数据供应的架构对齐 - 图像由作者提供
- en: Whenever we are able to directly create *HIS patient* data or *HIS occupancy*
    data from the HIS, we can partly or completely decommission the *HIS Data* component
    without affecting the rest of the system.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 每当我们能够直接从HIS创建*HIS患者*数据或*HIS占用*数据时，我们可以在不影响系统其他部分的情况下，部分或完全退役*HIS数据*组件。
- en: '* * *'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: We need to assess our architecture holistically, considering all known business
    requirements. A technology-constrained approach can lead to intermediate steps
    that are not geared towards what’s needed but just towards what seems feasible.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要全面评估我们的架构，考虑所有已知业务需求。技术受限的方法可能导致中间步骤不符合所需，而只是看起来可行。
- en: Dive deep into your business and derive technology-agnostic processes and information
    models. These models will foster your business understanding and at the same time
    allow your business to drive your architecture.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 深入了解您的业务，并推导出技术无关的过程和信息模型。这些模型将促进您的业务理解，同时允许您的业务驱动您的架构。
- en: '* * *'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: In subsequent steps, we will look at more technical details on how to design
    *data as a product* and *data agents* based on these ideas. Stay tuned for more
    insights!
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在后续步骤中，我们将探讨更多关于如何根据这些想法设计**数据作为产品**和**数据代理**的技术细节。敬请期待更多见解！
