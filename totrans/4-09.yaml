- en: Fine-tuning Multimodal Embedding Models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/fine-tuning-multimodal-embedding-models-bf007b1c5da5/](https://towardsdatascience.com/fine-tuning-multimodal-embedding-models-bf007b1c5da5/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is the 4th article in a larger series on [multimodal AI](https://shawhin.medium.com/list/multimodal-ai-fe9521d0e77a).
    In the previous post, we discussed [multimodal RAG](https://towardsdatascience.com/multimodal-rag-process-any-file-type-with-ai-e6921342c903)
    systems, which can retrieve and synthesize information from different data modalities
    (e.g. text, images, audio). There, we saw how we could implement such a system
    using CLIP. One issue with this approach, however, is that vector search results
    from a general-purpose embedding model (like CLIP) **may perform poorly in domain-specific
    use cases**. In this article, I’ll discuss how we can mitigate these issues via
    fine-tuning multimodal embedding models.
  prefs: []
  type: TYPE_NORMAL
- en: '![Photo by Markus Winkler on Unsplash](../Images/b28fab6f8a25febf6f9a4b4d0a1d74d0.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Markus Winkler](https://unsplash.com/@markuswinkler?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Multimodal embeddings** represent multiple data modalities in the same vector
    space such that similar concepts are co-located. A visual example of this is shown
    below, where semantically **similar items** (e.g. a picture of a dog and its corresponding
    caption) **are close**, while **dissimilar items** (e.g. a picture of a cat and
    a caption describing a dog) **are far apart**.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Stock photos from Canva. Image by author.](../Images/3db977ba0fb12a43ba67a232c2f0a1f9.png)'
  prefs: []
  type: TYPE_IMG
- en: Stock photos from Canva. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: A popular multimodal embedding model is CLIP, which was trained on a massive
    corpus of image-caption pairs using [contrastive learning](https://towardsdatascience.com/multimodal-embeddings-an-introduction-5dc36975966f#09fe).
    The key insight from **CLIP** was that such a model **unlocks 0-shot abilities
    such as image classification, search, and captioning** [1].
  prefs: []
  type: TYPE_NORMAL
- en: One limitation here is that CLIP’s 0-shot abilities **may not transfer well
    to domains involving specialized information** e.g. architectural drawings, medical
    imaging, and technical jargon. In such cases, we can improve CLIP’s performance
    through fine-tuning.
  prefs: []
  type: TYPE_NORMAL
- en: '**Fine-tuning CLIP**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Fine-tuning involves **adapting a model to a particular use case through additional
    training**. This is powerful because it enables us to build on top of existing
    state-of-the-art models to develop powerful specialized models with relatively
    small data.
  prefs: []
  type: TYPE_NORMAL
- en: We can do this with CLIP through the following key steps.
  prefs: []
  type: TYPE_NORMAL
- en: Collect text-image training pairs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pre-process training data
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Define Evals
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Fine-tune the model
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Evaluate the model
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: I will discuss each of these steps in the context of a concrete example. If
    you are curious about what this looks like for text embedding (i.e. text-text
    pairs), I did that in a previous [blog post](https://medium.com/@shawhin/fine-tuning-text-embeddings-f913b882b11c).
  prefs: []
  type: TYPE_NORMAL
- en: '[**Fine-Tuning Text Embeddings For Domain-Specific Search**](https://shawhin.medium.com/fine-tuning-text-embeddings-f913b882b11c)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Example: Fine-tuning CLIP on YouTube Titles and Thumbnails**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Here, I will fine-tune CLIP on titles and thumbnails from my [YouTube channel](https://www.youtube.com/@ShawhinTalebi).
    At the end of this, we will have a model that can take title-thumbnail pairs and
    return a similarity score. This can be used for practical applications such as
    **matching title ideas to an existing thumbnai**l or **performing search over
    a thumbnail library**.
  prefs: []
  type: TYPE_NORMAL
- en: The [example code](https://github.com/ShawhinT/YouTube-Blog/tree/main/multimodal-ai/4-ft-mm-embeddings),
    [dataset](https://huggingface.co/datasets/shawhin/yt-title-thumbnail-pairs), and
    [fine-tuned model](https://huggingface.co/shawhin/clip-title-thumbnail-embeddings)
    are freely available on GitHub and the Hugging Face Hub, respectively. You can
    use this code and data to train your own models. If you end up publishing any
    work using this dataset, please cite the original source 🙂
  prefs: []
  type: TYPE_NORMAL
- en: '[GitHub Repo](https://github.com/ShawhinT/YouTube-Blog/tree/main/multimodal-ai/4-ft-mm-embeddings)
    | [Dataset](https://huggingface.co/datasets/shawhin/yt-title-thumbnail-pairs)
    | [Fine-tuned Model](https://huggingface.co/shawhin/clip-title-thumbnail-embeddings)'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 1: Collect Text-Image Training Pairs**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first (and most important) step of any fine-tuning process is data collection.
    Here, I extracted title-thumbnail pairs from my channel in a 2-step process.
  prefs: []
  type: TYPE_NORMAL
- en: First, I used YouTube’s search API to **extract the video IDs** for all the
    videos on my channel. Second, I used YouTube’s video API to **extract the title
    and thumbnail URL** of each of my long-form videos (i.e. longer than 3 min).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Note that you will need a YouTube API key to run the above Python code, which
    you can create using the [Google Cloud Console](https://console.cloud.google.com/).
    To adapt this to your channel, you just need to change the _channel*id* variable.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: As an additional step, I **created negative thumbnail-title pairs**. We can
    use these during the training process to not only guide the model with examples
    of which embedding should be close together (i.e. positive pair), but also which
    embedding should be far apart (i.e. negative pairs).
  prefs: []
  type: TYPE_NORMAL
- en: To do this, I computed the similarity between all possible title pairs using
    the sentence transformer library. Then for each positive pair, I matched the least
    similar title as a negative example (ensuring there were no duplicates).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Finally, I created a **train-valid-test split** and pushed the dataset to the
    Hugging Face Hub.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '**Step 2: Pre-process Training Pairs**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although we have all the data we need for fine-tuning, it is still not a suitable
    format for training. More specifically, we need to **convert our image URLs to
    PIL image objects** and **organize our data into (anchor, positive,** **negative)
    triplets**, **** i.e., a thumbnail, its corresponding title, and negative title,
    respectively.
  prefs: []
  type: TYPE_NORMAL
- en: We can process all three data splits (i.e. train, valid, and test) in the following
    way using the Hugging Face Datasets library.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: It’s important that we order our columns as (anchor, positive, negative) triplets
    because **this is the format expected by the loss function** we will use during
    training (which I learned the hard way).
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 3: Define Evals**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Training involves optimizing a model’s parameters to minimize a loss function.
    However, this value (i.e. a contrastive loss) is rarely helpful in **assessing
    the model’s performance on a downstream task** (e.g. matching titles to thumbnails).
  prefs: []
  type: TYPE_NORMAL
- en: A quantity that is more insightful, in this case, is the model’s ability to
    correctly **match a given thumbnail to the correct title** among several candidates.
    This is denoted **Recall@1**.
  prefs: []
  type: TYPE_NORMAL
- en: We can implement an evaluator compatible with the Sentence Transformers library
    to compute this metric. Since the code is quite long, I won’t paste it here, but
    the curious reader can find it in Cell 12 of [this notebook](https://github.com/ShawhinT/YouTube-Blog/blob/main/multimodal-ai/4-ft-mm-embeddings/2-finetune_clip_sbert.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: We can see the model already has decent performance out-of-the-box, with correct
    titles being matched 66% of the time.
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 4: Fine-tune the Model**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are **3 key things** we must do before training the model. Namely, choose
    which parameters to train, pick a loss function, and set hyperparameters.
  prefs: []
  type: TYPE_NORMAL
- en: '**Trainable Parameters**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The key limitation of this project is that I’ve only posted 76 YouTube videos
    (as of writing this). With the validation and test splits, this leaves **only
    53 examples for training**.
  prefs: []
  type: TYPE_NORMAL
- en: Since we have so few training examples, **limiting the number of parameters
    we train is a good idea**. In this case, I only train the final projection layer
    of the model, which maps the text and image embeddings into a shared vector space.
    This is about 1M parameters total.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '**Loss function**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Here, I use the [Multiple Negatives Ranking Loss](https://sbert.net/docs/package_reference/sentence_transformer/losses.html#multiplenegativesrankingloss)
    from the Sentence Transformers library (which works with single negatives like
    in this case). It works by **maximizing the similarity between positive pairs**
    while **minimizing the similarity between negative pairs**. Here’s what the loss
    function looks like for the single negative case [2].
  prefs: []
  type: TYPE_NORMAL
- en: '![Mulitple negatives loss function (with only 1 negative). Image by author.](../Images/59d09d150440edc7315e93e16151aec8.png)'
  prefs: []
  type: TYPE_IMG
- en: Mulitple negatives loss function (with only 1 negative). Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '**Hyperparameters**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For hyperparameters, I experimented with a handful of choices manually and picked
    the choice with the best validation loss and Recall@1 performance. Here are the
    final choices.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: With our loss and hyperparameters defined, we can train the model using the
    SentenceTransformersTrainer().
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: '**Model training is an** **iterative process** where you may explore dozens
    of models for different choices of trainable parameters, loss functions, and hyperparameters.'
  prefs: []
  type: TYPE_NORMAL
- en: However, I highly recommend **keeping these experiments as simple as possible**.
    If you find yourself spending too much time tweaking training args to get your
    model to converge, there’s probably something fundamentally wrong with your data
    (speaking from experience 😅 ).
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 5: Evaluate the Model**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As a final step, we can evaluate the model’s Recall@1 score on the testing set.
    These data were not used for training or hyperparameter tuning, so it gives us
    an unbiased assessment of the model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: We see that the model performs well across all three datasets with **75% Recall@1
    on the test set**. In other words, 75% of the time, the model correctly matches
    a given thumbnail to its original title. Additionally, the recall for the validation
    dataset increases by 27%!
  prefs: []
  type: TYPE_NORMAL
- en: '**What’s Next?**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Multimodal embedding models, like CLIP, unlock countless 0-shot use cases such
    as image classification and retrieval. Here, we saw how we can fine-tune such
    a model to adapt it to a specialized domain (i.e. my YouTube titles and thumbnails).
  prefs: []
  type: TYPE_NORMAL
- en: Although CLIP is a small model by today’s standards (~500M parameters) and our
    training dataset was tiny, **the final model still demonstrated strong performance
    on this task**. This highlights the power of fine-tuning.
  prefs: []
  type: TYPE_NORMAL
- en: If you have any questions or suggestions for future content, let me know in
    the comments 🙂
  prefs: []
  type: TYPE_NORMAL
- en: '**More on Multimodal AI 👇**'
  prefs: []
  type: TYPE_NORMAL
