- en: How to Utilize ModernBERT and Synthetic Data for Robust Text Classification
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-utilize-modernbert-and-synthetic-data-for-robust-text-classification-7a6e03dbf0df/](https://towardsdatascience.com/how-to-utilize-modernbert-and-synthetic-data-for-robust-text-classification-7a6e03dbf0df/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In this article, I discuss how you can implement and fine-tune the new [ModernBERT](https://huggingface.co/blog/modernbert)
    text model. Furthermore, I use the model on a classic text classification task
    and show you how you can utilize synthetic data to improve the model’s performance.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '![In this article, I discuss how you can finetune ModernBERT for your classification
    task. Furthermore, I show you how you can leverage synthetic data to improve the
    performance of your text classification model. Image by ChatGPT.](../Images/c99c60ad43441f6f37cac154f73992f5.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
- en: In this article, I discuss how you can finetune [ModernBERT](https://huggingface.co/blog/modernbert)
    for your classification task. Furthermore, I show you how you can leverage synthetic
    data to improve the performance of your text classification model. Image by ChatGPT.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Table of Contents
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: · [Table of Contents](#aa05) · [Finding a dataset](#bcf6) · [Implementing ModernBERT](#1824)
    · [Detecting errors](#426d) · [Synthesize data to improve model performance](#c828)
    · [New results after augmentation](#7e61) · [My thoughts and future work](#4692)
    · [Conclusion](#27db)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Finding a dataset
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'First, we need to find a dataset to perform text classification on. To keep
    it simple, I found [an open-source dataset on HuggingFace](https://huggingface.co/datasets/Sp1786/multiclass-sentiment-analysis-dataset)
    where you predict the sentiment of a given text. The sentiment can be predicted
    in the classes:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: '*Negative* (id 0)'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Neutral* (id 1)'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Positive* (id 2)'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can download the dataset from HuggingFace, but the easiest way of accessing
    it is using Pandas on a HuggingFace link:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: I only keep 5% of the dataset to keep this tutorial as simple as possible and
    ensure most machines have the compute to fine-tune the model.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s prepare the dataset by splitting it into train and test and tokenizing
    it. I won’t be going into technical details here, as I regard this as a prerequisite
    (though knowing how it works is not required to follow the rest of the article.
    To set up fine-tuning for [ModernBERT](https://huggingface.co/blog/modernbert),
    I am using [this HuggingFace tutorial.](https://huggingface.co/blog/davidberenstein1957/fine-tune-modernbert-on-synthetic-data)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s first install and import all required packages. You can install them
    with this requirements file:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'And import them with:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Then, let’s prepare the dataset by splitting and encoding the labels (the sentiment
    of the text) as int
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Now convert it to a dataset dict so it’s readable by the transformers trainer:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Implementing ModernBERT
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'First, to implement ModernBERT, we need to load the tokenizer and tokenize
    our dataset:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Now, let’s load the model and run the training. We also use a simple f1 metric
    as our objective function:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们加载模型并运行训练。我们还使用简单的f1指标作为我们的目标函数：
- en: '[PRE6]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'This will fine-tune the model. We can then evaluate it on the test dataset
    with the code below, which will print the precision, recall, and f1 metrics and
    also show us a confusion matrix:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这将微调模型。然后我们可以使用下面的代码在测试数据集上评估它，该代码将打印出精确度、召回率和f1指标，并显示一个混淆矩阵：
- en: '[PRE7]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This gives an accuracy of **62%,** and the confusion matrix you see below:¢
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这给出了**62%**的准确率，下面是您看到的混淆矩阵：
- en: '![This is the confusion matrix from running the finetuned model on the test
    dataset. The model overall performs pretty well, but there are some errors. The
    most common confusion is between the labels negative and neutral. We will then
    focus on limiting the amount of errors the model makes on this. Image by the author](../Images/cb4b59c2ae54a8772ce7c4b5db584296.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![这是运行微调模型在测试数据集上的混淆矩阵。模型整体表现相当好，但也有一些错误。最常见的混淆是标签负面和 neutral。我们将然后专注于限制模型在此类错误上的数量。图片由作者提供](../Images/cb4b59c2ae54a8772ce7c4b5db584296.png)'
- en: This is the confusion matrix from running the finetuned model on the test dataset.
    The model overall performs pretty well, but there are some errors. The most common
    confusion is between the labels *negative* and *neutral*. We will then focus on
    limiting the amount of errors the model makes on this. Image by the author
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这是运行微调模型在测试数据集上的混淆矩阵。模型整体表现相当好，但也有一些错误。最常见的混淆是标签*负面*和*中性*。因此，我们将专注于限制模型在此类错误上的数量。图片由作者提供
- en: Great, you can now fine-tune ModernBERT on any text classification task. In
    the next section, I will show you how you can recognize errors the model is making,
    and use synthetic data to improve model performance on the classes it’s struggling
    with.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了，你现在可以微调ModernBERT进行任何文本分类任务。在下一节中，我将向您展示如何识别模型犯的错误，并使用合成数据提高模型在表现不佳的类别上的性能。
- en: Detecting errors
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检测错误
- en: We will use the confusion matrix to recognize which classes the model struggles
    with. Since we only have three classes, we will find the worst-performing class
    and try to improve the model performance for that class.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用混淆矩阵来识别模型在哪些类别上表现不佳。由于我们只有三个类别，我们将找到表现最差的类别，并尝试提高该类别的模型性能。
- en: Looking at the confusion matrix, we can determine that the model most often
    confuses the classes *negative* and *neutral*. We will, therefore, create synthetic
    data for these samples to hopefully see an improvement in model performance.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 通过查看混淆矩阵，我们可以确定模型最常混淆的类别是*负面*和*中性*。因此，我们将为这些样本创建合成数据，以期看到模型性能的改善。
- en: Synthesize data to improve model performance
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合成数据以提高模型性能
- en: Now, we will synthesize some data for the worst-performing class to improve
    model performance. To keep the synthetization simple, we will use a library called
    [NLP AUG](https://github.com/makcedward/nlpaug), which allows for easy augmentation
    of text samples. Ensure you have installed all the requirements given previously
    in this article in order to run the package successfully.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将为表现最差的类别合成一些数据以提高模型性能。为了使合成简单，我们将使用一个名为[NLP AUG](https://github.com/makcedward/nlpaug)的库，该库允许轻松增强文本样本。请确保您已安装了本文中先前给出的所有要求，以便成功运行该包。
- en: 'First, import the augmentor:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，导入增强器：
- en: '[PRE8]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Then, we will create some augmentation functions. I am using 3 different augmentation
    functions here:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将创建一些增强函数。我在这里使用3个不同的增强函数：
- en: Add a contextual word (add a word that fits into the context)
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加一个上下文词（添加一个适合上下文的词）
- en: Substitute contextual word (substitute a word that fits into the context)
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 替换上下文词（替换一个适合上下文的词）
- en: Double translate (translate from English to French and back in order to create
    an augmented version of a text)
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 双重翻译（将英语翻译成法语再翻译回英语，以创建文本的增强版本）
- en: The contextual augmentations use BERT in order to determine fitting contextual
    words.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文增强使用BERT来确定合适的上下文词。
- en: 'We can implement these augmentations in Python with:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用Python实现这些增强：
- en: '[PRE9]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: You can then use the augment text function to create augmentations of a bunch
    of texts.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，您可以使用增强文本功能来创建大量文本的增强版本。
- en: Now, we need to create the augmented texts. It’s critical that you only augment
    data in the train set and not in the test set, as you need to keep the test set
    the same in order to properly test the effect of the augmentation.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要创建增强文本。重要的是，您只能在训练集中增强数据，而不是在测试集中，因为您需要保持测试集不变，以便正确测试增强的效果。
- en: First, create the augmented samples
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，创建增强样本
- en: '[PRE10]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'An augmented sample might then look like:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 一个增强样本可能看起来如下：
- en: '[PRE11]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: You can see how the translation has slightly modified the text without changing
    its meaning, which is essentially what we try to achieve when creating synthetic
    data.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以看到翻译如何略微修改了文本而没有改变其含义，这正是我们尝试在创建合成数据时实现的目标。
- en: '* * *'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: After creating augmented samples, we add these rows to the dataset with their
    corresponding labels. Since we are only augmenting samples, we naturally know
    the label of the augmented sample (the label must be the same as the label of
    the sample we augmented).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建增强样本后，我们将这些行及其相应的标签添加到数据集中。由于我们只是在增强样本，所以我们自然知道增强样本的标签（标签必须与增强的样本的标签相同）。
- en: '[PRE12]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: We can now load this dataframe instead, and train a new model, to see how the
    model performs when trained on augmented data.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以加载这个数据框，并训练一个新的模型，以查看模型在增强数据上训练时的表现。
- en: New results after augmentation
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 增强后的新结果
- en: 'When I augment 20% of the data *negative*/*neutral*, with a 50 percent chance
    of each augmentation, I get the following results:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 当我将20%的数据增强为*负面*/*中性*，每种增强有50%的概率时，我得到了以下结果：
- en: 'Accuracy: 63%'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 准确率：63%
- en: '![Confusion matrix when training a ModertBERT model on synthetic data. The
    synthetic data was generated by only taking the rows with label neutral or negative,
    selecting 20% of them to be augmented, with a 50% of each augmentation being applied.
    If you compare this confusion matrix with the previous matrix, you can see that
    the augmentation scheme did not work particularly well. Image by the author.](../Images/42733058f1d61fca0105772f16e2db8a.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![在合成数据上训练ModertBERT模型的混淆矩阵。合成数据仅通过选择标签为中性或负面的行生成，从中选择20%进行增强，每种增强有50%的概率应用。如果您将此混淆矩阵与之前的矩阵进行比较，您可以看到增强方案并没有特别有效。图片由作者提供。](../Images/42733058f1d61fca0105772f16e2db8a.png)'
- en: Confusion matrix when training a ModertBERT model on synthetic data. The synthetic
    data was generated by only taking the rows with label neutral or negative, selecting
    20% of them to be augmented, with a 50% of each augmentation being applied. If
    you compare this confusion matrix with the previous matrix, you can see that the
    augmentation scheme did not work particularly well. Image by the author.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在合成数据上训练ModertBERT模型的混淆矩阵。合成数据仅通过选择标签为中性或负面的行生成，从中选择20%进行增强，每种增强有50%的概率应用。如果您将此混淆矩阵与之前的矩阵进行比较，您可以看到增强方案并没有特别有效。图片由作者提供。
- en: This did not improve model performance, and it even made predictions on the
    *negative* class worse! (as you can see from the top left square in the confusion
    matrix above). Part of this is because the context augmentations are not working.
    With this in mind, I ignore the context augmentations and only apply the translation
    augmentation.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这并没有提高模型性能，甚至使对*负面*类别的预测变得更差！（如上图中左上角的方块所示）。部分原因是因为上下文增强不起作用。考虑到这一点，我忽略了上下文增强，只应用翻译增强。
- en: 'If I apply translate augmentation on all the rows with the label *negative*
    or *neutral*, I get the following results:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我对所有标签为*负面*或*中性*的行应用翻译增强，我得到以下结果：
- en: 'Accuracy: 64%'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 准确率：64%
- en: '![This is the confusion matrix I get after training the model on the second
    augmented dataset. The dataset consisted of all rows with labels negative or neutral,
    with a translation augmentation. If you compare this confusion matrix to the first
    confusion matrix in this article, you can see that the overall performance of
    the model has increased (from 62% to 64%). Image by the author.](../Images/b3a98bab508315a7bd84718dea381fa4.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![这是在第二个增强数据集上训练模型后得到的混淆矩阵。该数据集由所有标签为负面或中性的行组成，并进行了翻译增强。如果您将此混淆矩阵与本文中的第一个混淆矩阵进行比较，您可以看到模型的总体性能有所提高（从62%提高到64%）。图片由作者提供。](../Images/b3a98bab508315a7bd84718dea381fa4.png)'
- en: This is the confusion matrix I get after training the model on the second augmented
    dataset. The dataset consisted of all rows with labels negative or neutral, with
    a translation augmentation. If you compare this confusion matrix to the first
    confusion matrix in this article, you can see that the overall performance of
    the model has increased (from 62% to 64%). Image by the author.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在对第二个增强数据集进行模型训练后得到的混淆矩阵。该数据集包括所有带有负面或中性标签的行，并进行了翻译增强。如果您将这个混淆矩阵与文章中的第一个混淆矩阵进行比较，您会发现模型的总体性能有所提高（从62%提高到64%）。图片由作者提供。
- en: This worked better, though the results look interesting. The *negative* predictions
    have gotten worse (now it more often confuses *neutral* and *positive*), but as
    you can see, the model has gotten a lot better at predicting *neutral*.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这效果更好，尽管结果看起来很有趣。负面的预测变得更糟（现在它更频繁地将中性与正面混淆），但如您所见，模型在预测中性方面变得更好。
- en: My thoughts and future work
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我的想法和未来工作
- en: Two percentage points increase is not a massive gain when adding this synthetic
    data. However, I still think it’s pretty interesting that such simple augmentations
    (for example, just translating a text to and from a language) can increase the
    performance of a model in certain classes. Perhaps you could achieve even better
    results with more advanced augmentations (for example, generating augmentations
    using a large language model) and tuning the augmentation process a bit. However,
    I think this shows how you can utilize synthetic data to improve your model. This
    is especially relevant if your model is performing poorly in specific areas (for
    example, my model was performing poorly in trying to separate *negative* and *neutral*
    sentiments). You can then add synthetic data on this specific area and potentially
    see an increase in performance.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在添加这些合成数据时，两个百分点的增长并不是一个巨大的收益。然而，我认为这样的简单增强（例如，只是将文本翻译成和从一种语言到另一种语言）可以在某些类别中提高模型的性能是非常有趣的。也许你可以通过更高级的增强（例如，使用大型语言模型生成增强）并对增强过程进行一点调整来获得更好的结果。然而，我认为这表明了你可以如何利用合成数据来提高你的模型。这尤其适用于你的模型在特定领域表现不佳的情况（例如，我的模型在尝试区分负面和中性情感时表现不佳）。然后你可以在这一特定领域添加合成数据，并可能看到性能的提高。
- en: Conclusion
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I first found an open-source document classification dataset
    online. We then implemented [ModernBERT](https://huggingface.co/blog/modernbert),
    a newly released variant from the well-known BERT family of transformer models.
    We then fine-tuned the model to perform text classification and interpreted the
    results by looking at accuracy and interpreting the confusion matrix. Using the
    confusion matrix, we then determined which confusion the model struggled with.
    With this information, we created synthetic data samples to help the model on
    classes it struggled with, resulting in improved performance. I finally gave my
    thoughts on how the model improved and listed some future work to potentially
    further enhance the model’s performance.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我首先在网上找到了一个开源的文档分类数据集。然后我们实现了[ModernBERT](https://huggingface.co/blog/modernbert)，这是BERT家族中一个新发布的变体。然后我们对模型进行了微调以执行文本分类，并通过查看准确率和解释混淆矩阵来解释结果。使用混淆矩阵，我们确定了模型在哪个混淆上表现不佳。有了这些信息，我们创建了合成数据样本，以帮助模型在它表现不佳的类别上，从而提高了性能。我最后对我的模型改进的想法进行了思考，并列出了一些未来工作，以进一步提高模型的性能。
