- en: The Impact of GenAI and Its Implications for Data Scientists
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能生成（GenAI）的影响及其对数据科学家的影响
- en: 原文：[https://towardsdatascience.com/the-impact-of-genai-and-its-implications-for-data-scientists/](https://towardsdatascience.com/the-impact-of-genai-and-its-implications-for-data-scientists/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-impact-of-genai-and-its-implications-for-data-scientists/](https://towardsdatascience.com/the-impact-of-genai-and-its-implications-for-data-scientists/)
- en: GenAI systems affect how we work. This general notion is well known. However,
    we are still unaware of the exact impact of GenAI. For example, how much do these
    tools affect our work? Do they have a larger impact on certain tasks? What does
    this mean for us in our daily work?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI系统影响我们的工作方式。这个概念是众所周知的。然而，我们仍然不清楚GenAI的确切影响。例如，这些工具对我们工作的影响有多大？它们对某些任务的影响是否更大？这对我们日常工作的意义是什么？
- en: To answer these questions, [Anthropic released a study](https://www.anthropic.com/news/the-anthropic-economic-index) based
    on millions of anonymized conversations on Claude.ai. The study provides data
    on how GenAI is incorporated into real-world tasks and reveals actual GenAI usage
    patterns.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答这些问题，[Anthropic发布了一项基于数百万匿名对话的研究](https://www.anthropic.com/news/the-anthropic-economic-index)，这些对话是在Claude.ai上进行的。该研究提供了关于GenAI如何融入现实世界任务的数据，并揭示了实际的GenAI使用模式。
- en: In this article, I will go through the four main findings of the study. Based
    on the findings I will derive how GenAI changes our work and what skills we need
    in the future.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将介绍研究的四个主要发现。基于这些发现，我将探讨GenAI如何改变我们的工作，以及我们未来需要哪些技能。
- en: '**Main findings**'
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**主要发现**'
- en: '**GenAI is mostly used for software development and technical writing tasks**,
    reaching almost 50 % of all tasks. This is likely due to LLMs being mostly text-based
    and thus being less useful for certain tasks.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**GenAI主要用于软件开发和技术写作任务**，几乎涵盖了所有任务的50%。这可能是由于LLMs主要是基于文本的，因此对于某些任务来说不太有用。'
- en: '**GenAI has a stronger impact on some groups of occupations than others.**More
    than one-third of occupations use GenAI in at least a quarter of their tasks.
    In contrast, only 4 % of occupations use it for more than three-quarters of their
    tasks. We can see that only very few occupations use GenAI across most of their
    tasks. This suggests that no job is being entirely automated.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**GenAI对某些职业群体的影响比对其他群体更强**。超过三分之一的职业在其至少四分之一的任务中使用GenAI。相比之下，只有4%的职业将其用于超过四分之三的任务。我们可以看到，只有极少数职业在其大多数任务中使用GenAI。这表明没有工作是完全自动化的。'
- en: '**GenAI is used for augmentation rather than automation**, i.e., 57% vs 43
    % of the tasks. But most occupations use both, augmentation and automation across
    tasks. Here, augmentation means the user collaborates with the GenAI to enhance
    their capabilities. Automation, in contrast, refers to tasks in which the GenAI
    directly performs the task. However, the authors guess that the share of augmentation
    is even higher as users might adjust GenAI answers outside of the chat window.
    Hence, what seems to be automation is actually augmentation. The results suggest
    that GenAI serves as an efficiency tool and a collaborative partner, resulting
    in improved productivity. These results align very well with my own experience.
    I mostly use GenAI tools to augment my work instead of automating tasks. In the
    article below you can see how GenAI tools have increased my productivity and what
    I use them for daily.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**GenAI主要用于增强而非自动化**，即57%的任务用于增强，43%的任务用于自动化。但大多数职业在其任务中同时使用增强和自动化。在这里，增强意味着用户与GenAI协作以增强其能力。相反，自动化指的是GenAI直接执行的任务。然而，作者猜测增强的比例甚至更高，因为用户可能会在聊天窗口之外调整GenAI的答案。因此，看似自动化实际上是一种增强。这些结果表明，GenAI作为一种效率工具和协作伙伴，可以带来生产力的提升。这些结果与我自己的经验非常吻合。我主要使用GenAI工具来增强我的工作，而不是自动化任务。在下面的文章中，你可以看到GenAI工具如何提高我的生产力以及我每天使用它们的方式。'
- en: '**GenAI is mostly used for tasks associated with mid-to-high-wage occupations**,
    such as data scientists. In contrast, the lowest and highest-paid roles show a
    much lower usage of GenAI. The authors conclude that this is due to the current
    limits of GenAI capabilities and practical barriers when it comes to using GenAI.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**GenAI主要用于与中高收入职业相关的任务**，例如数据科学家。相比之下，薪酬最低和最高的角色对GenAI的使用率要低得多。作者得出结论，这是由于GenAI当前能力的限制以及使用GenAI时的实际障碍。'
- en: Overall, **the study suggests that occupations will rather evolve than disappear**.
    This is because of two reasons. First, GenAI integration remains selective rather
    than comprehensive within most occupations. Although many jobs use GenAI, the
    tools are only used selectively for certain tasks. Second, the study saw a clear
    preference for augmentation over automation. Hence, GenAI serves as an efficiency
    tool and a collaborative partner.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，**这项研究表明，职业更可能演变而不是消失**。这是由于两个原因。首先，在大多数职业中，通用人工智能的整合仍然是选择性的，而不是全面的。尽管许多工作使用通用人工智能，但这些工具仅被选择性地用于某些任务。其次，该研究观察到对增强而非自动化的明确偏好。因此，通用人工智能作为一种效率工具和协作伙伴。
- en: '**Limitations**'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**局限性**'
- en: 'Before we can derive the implications of GenAI, we should look at the limitations
    of the study:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们能够推导出通用人工智能的影响之前，我们应该看看这项研究的局限性：
- en: It is unknown how the users used the responses. Are they copy-pasting code snippets
    uncritically or editing them in their IDE? Hence, some conversations that look
    like automation might have been augmentation instead.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 未知用户如何使用这些回应。他们是盲目地复制粘贴代码片段，还是在他们的IDE中编辑它们？因此，一些看似自动化的对话可能实际上是增强。
- en: The authors only used conversations from Claude.ai’s chat but not from API or
    Enterprise users. Hence, the dataset used in the analysis shows only a fraction
    of actual GenAI usage.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作者只使用了Claude.ai的聊天记录，而没有使用API或企业用户的记录。因此，用于分析的数据集只显示了实际通用人工智能使用的一小部分。
- en: Automating the classification might have led to the wrong classification of
    conversations. However, due to the large amount of conversation used the impact
    should be rather small.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动化分类可能会导致对话的错误分类。然而，由于使用了大量的对话，影响应该相对较小。
- en: Claude being only text-based restricts the tasks and thus might exclude certain
    jobs.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 克劳德仅基于文本的限制可能会排除某些任务。
- en: Claude is advertised as a state-of-the-art coding model thus attracting mostly
    users for coding tasks.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 克劳德被宣传为最先进的编码模型，因此主要吸引了进行编码任务的用户。
- en: Overall, the authors conclude that their dataset is not a representative sample
    of GenAI use in general. Thus, we should handle and interpret the results with
    care. Despite the study’s limitations, we can see some implications from the impact
    of GenAI on our work, particularly as Data Scientists.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，作者得出结论，他们的数据集并不是通用人工智能使用的代表性样本。因此，我们应该谨慎地处理和解释结果。尽管这项研究存在局限性，但我们仍可以从通用人工智能对我们工作的影响中看到一些启示，尤其是作为数据科学家。
- en: '**Implications**'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**影响**'
- en: The study shows that GenAI has the potential to reshape jobs and we can already
    see its impact on our work. Moreover, GenAI is rapidly evolving and still in the
    early stages of workplace integration.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 该研究表明，通用人工智能有潜力重塑工作，我们已经在我们的工作中看到了其影响。此外，通用人工智能正在快速发展，并且仍处于工作场所整合的早期阶段。
- en: Thus, we should be open to these changes and adapt to them.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们应该对这些变化持开放态度，并适应它们。
- en: Most importantly, we must stay curious, adaptive, and willing to learn. In the
    field of Data Science changes happen regularly. With GenAI tools change will happen
    even more frequently. Hence, we must stay up-to-date and use the tools to support
    us in this journey.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 最重要的是，我们必须保持好奇心、适应性和愿意学习。在数据科学领域，变化是经常发生的。有了通用人工智能工具，变化将更加频繁。因此，我们必须保持最新，并使用这些工具来支持我们的这一旅程。
- en: Currently, GenAI has the potential to enhance our capabilities instead of automating
    them.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，通用人工智能有潜力增强我们的能力，而不是自动化它们。
- en: Hence, we should focus on developing skills that complement GenAI. We need skills
    to augment workflows effectively in our work and analytical tasks. These skills
    lie in areas with low penetration of GenAI. This includes human interaction, strategic
    thinking, and nuanced decision-making. This is where we can stand out.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们应该专注于发展补充通用人工智能的技能。我们需要技能来有效地增强我们的工作和分析任务的工作流程。这些技能存在于通用人工智能渗透率较低的区域。这包括人际互动、战略思考和细微的决策。这正是我们可以脱颖而出的地方。
- en: Moreover, skills such as critical thinking, complex problem-solving, and judgment
    will remain highly valuable. We must be able to ask the right questions, interpret
    the output of LLMs, and take action based on the answers.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，批判性思维、复杂问题解决和判断等技能将仍然非常有价值。我们必须能够提出正确的问题，解释LLM的输出，并根据答案采取行动。
- en: Moreover, GenAI will not replace our collaboration with colleagues in projects.
    Hence, improving our emotional intelligence will help us to work together effectively.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，通用人工智能不会取代我们在项目中的同事合作。因此，提高我们的情商将有助于我们有效地合作。
- en: '**Conclusion**'
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**结论**'
- en: GenAI is rapidly evolving and still in the early stages of workplace integration.
    However, we can already see some implications from the impact of GenAI on our
    work.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 通用人工智能（GenAI）正在迅速发展，并且仍处于工作场所整合的早期阶段。然而，我们已能从GenAI对我们工作的影响中看到一些影响。
- en: In this article, I showed you the main findings of a recent study from Anthropic
    on the use of their LLMs. Based on the results, I showed you the implications
    for Data Scientists and what skills might become more important.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我向您展示了Anthropic最近关于其LLM使用的研究的主要发现。基于结果，我展示了这些发现对数据科学家的影响以及哪些技能可能会变得更加重要。
- en: I hope that you find this article useful and that it will help you become a
    better Data Scientist.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望您觉得这篇文章有用，并且它能帮助您成为一名更好的数据科学家。
- en: See you in my next article.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎在下一篇文章中与我相见。
