- en: 'LLM + RAG: Creating an AI-Powered File Reader Assistant'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/llm-rag-creating-an-ai-powered-file-reader-assistant/](https://towardsdatascience.com/llm-rag-creating-an-ai-powered-file-reader-assistant/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI is everywhere.
  prefs: []
  type: TYPE_NORMAL
- en: It is hard not to interact at least once a day with a Large Language Model (LLM).
    The chatbots are here to stay. They’re in your apps, they help you write better,
    they compose emails, they read emails…well, they do a lot.
  prefs: []
  type: TYPE_NORMAL
- en: And I don’t think that that is bad. In fact, my opinion is the other way – at
    least so far. I defend and advocate for the use of AI in our daily lives because,
    let’s agree, it makes everything much easier.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t have to spend time double-reading a document to find punctuation problems
    or type. AI does that for me. I don’t waste time writing that follow-up email
    every single Monday. AI does that for me. I don’t need to read a huge and boring
    contract when I have an AI to summarize the main takeaways and action points to
    me!
  prefs: []
  type: TYPE_NORMAL
- en: These are only some of AI’s great uses. If you’d like to know more use cases
    of LLMs to make our lives easier, I wrote a whole book about them.
  prefs: []
  type: TYPE_NORMAL
- en: Now, thinking as a data scientist and looking at the technical side, not everything
    is that bright and shiny.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs are great for several general use cases that apply to anyone or any company.
    For example, coding, summarizing, or answering questions about general content
    created until the training cutoff date. However, when it comes to specific business
    applications, for a single purpose, or something new that didn’t make the cutoff
    date, that is when the models won’t be that useful if used *out-of-the-box* –
    meaning, they will not know the answer. Thus, it will need adjustments.
  prefs: []
  type: TYPE_NORMAL
- en: Training an LLM model can take months and millions of dollars. What is even
    worse is that if we don’t adjust and tune the model to our purpose, there will
    be unsatisfactory results or hallucinations (when the model’s response doesn’t
    make sense given our query).
  prefs: []
  type: TYPE_NORMAL
- en: So what is the solution, then? Spending a lot of money retraining the model
    to include our data?
  prefs: []
  type: TYPE_NORMAL
- en: Not really. That’s when the Retrieval-Augmented Generation (RAG) becomes useful.
  prefs: []
  type: TYPE_NORMAL
- en: '*RAG is a framework that combines getting information from an external knowledge
    base with large language models (LLMs). It helps AI models produce more accurate
    and relevant responses.*'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s learn more about RAG next.
  prefs: []
  type: TYPE_NORMAL
- en: What is RAG?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let me tell you a story to illustrate the concept.
  prefs: []
  type: TYPE_NORMAL
- en: I love movies. For some time in the past, I knew which movies were competing
    for the best movie category at the Oscars or the best actors and actresses. And
    I would certainly know which ones got the statue for that year. But now I am all
    rusty on that subject. If you asked me who was competing, I would not know. And
    even if I tried to answer you, I would give you a weak response.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, to provide you with a quality response, I will do what everybody else does:
    search for the information online, obtain it, and then give it to you. What I
    just did is the same idea as the RAG: I obtained data from an external database
    to give you an answer.'
  prefs: []
  type: TYPE_NORMAL
- en: When we enhance the LLM with a *content store* where it can go and **retrieve**
    data to **augment** (increase) its knowledge base, that is the RAG framework in
    action.
  prefs: []
  type: TYPE_NORMAL
- en: '*RAG is like creating a content store where the model can enhance its knowledge
    and respond more accurately.*'
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram: User prompts and content using LLM + RAG](../Images/65bb1c1338730d95fe0e7cc6cf3edd15.png)'
  prefs: []
  type: TYPE_IMG
- en: User prompt about Content C. LLM retrieves external content to aggregate to
    the answer. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Summarizing:'
  prefs: []
  type: TYPE_NORMAL
- en: Uses search algorithms to query external data sources, such as databases, knowledge
    bases, and web pages.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pre-processes the retrieved information.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Incorporates the pre-processed information into the LLM.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Why use RAG?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we know what the RAG framework is let’s understand why we should be
    using it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some of the benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: Enhances factual accuracy by referencing real data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RAG can help LLMs process and consolidate knowledge to create more relevant
    answers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RAG can help LLMs access additional knowledge bases, such as internal organizational
    data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RAG can help LLMs create more accurate domain-specific content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RAG can help reduce knowledge gaps and AI hallucination
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As previously explained, I like to say that with the RAG framework, we are giving
    an internal search engine for the content we want it to add to the knowledge base.
  prefs: []
  type: TYPE_NORMAL
- en: Well. All of that is very interesting. But let’s see an application of RAG.
    We will learn how to create an AI-powered PDF Reader Assistant.
  prefs: []
  type: TYPE_NORMAL
- en: Project
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is an application that allows users to upload a PDF document and ask questions
    about its content using AI-powered natural language processing (NLP) tools.
  prefs: []
  type: TYPE_NORMAL
- en: The app uses `Streamlit` as the front end.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Langchain`, OpenAI’s GPT-4 model, and `FAISS` (Facebook AI Similarity Search)
    for document retrieval and question answering in the backend.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s break down the steps for better understanding:'
  prefs: []
  type: TYPE_NORMAL
- en: Loading a PDF file and splitting it into chunks of text.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This makes the data optimized for retrieval
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Present the chunks to an embedding tool.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Embeddings are numerical vector representations of data used to capture relationships,
    similarities, and meanings in a way that machines can understand. They are widely
    used in Natural Language Processing (NLP), recommender systems, and search engines.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Next, we put those chunks of text and embeddings in the same DB for retrieval.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, we make it available to the LLM.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Data preparation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Preparing a *content store* for the LLM will take some steps, as we just saw.
    So, let’s start by creating a function that can load a file and split it into
    text chunks for efficient retrieval.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Next, we will start building our Streamlit app, and we’ll use that function
    in the next script.
  prefs: []
  type: TYPE_NORMAL
- en: Web application
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will begin importing the necessary modules in Python. Most of those will
    come from the langchain packages.
  prefs: []
  type: TYPE_NORMAL
- en: '`FAISS` is used for document retrieval; `OpenAIEmbeddings` transforms the text
    chunks into numerical scores for better similarity calculation by the LLM; `ChatOpenAI`
    is what enables us to interact with the OpenAI API; `create_retrieval_chain` is
    what actually the RAG does, retrieving and augmenting the LLM with that data;
    `create_stuff_documents_chain` glues the model and the ChatPromptTemplate.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Note: You will need to* [*generate an OpenAI Key*](https://www.geeksforgeeks.org/how-to-get-your-own-openai-api-key/)
    *to be able to run this script. If it’s the first time you’re creating your account,
    you get some free credits. But if you have it for some time, it is possible that
    you will have to add 5 dollars in credits to be able to access OpenAI’s API. An
    option is using Hugging Face’s Embedding.*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This first code snippet will create the App title, create a box for file upload,
    and prepare the file to be added to the `load_document()` function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Machines understand numbers better than text, so in the end, we will have to
    provide the model with a database of numbers that it can compare and check for
    similarity when performing a query. That’s where the `embeddings` will be useful
    to create the `vector_db`, in this next piece of code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Next, we create a retriever object to navigate in the `vector_db`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Then, we will create the `system_prompt`, which is a set of instructions to
    the LLM on how to answer, and we will create a prompt template, preparing it to
    be added to the model once we get the input from the user.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Moving on, we create the core of the RAG framework, pasting together the `retriever`
    object and the `prompt`. This object adds relevant documents from a data source
    (e.g., a vector database) and makes it ready to be processed using an LLM to generate
    a response.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Finally, we create the variable `question` for the user input. If this question
    box is filled with a query, we pass it to the `chain`, which calls the LLM to
    process and return the response, which will be printed on the app’s screen.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Here is a screenshot of the result.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot of the AI-Powered Document Q&A](../Images/73f083a7e8b5dd484de5042cab9d6029.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot of the final app. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: And this is a GIF for you to see the File Reader AI Assistant in action!
  prefs: []
  type: TYPE_NORMAL
- en: '![GIF of the File Reader AI Assistant in action](../Images/1b9ca0fbc0ea7fe4b2516c2b584a6936.png)'
  prefs: []
  type: TYPE_IMG
- en: File Reader AI Assistant in action. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Before you go
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this project, we learned what the RAG framework is and how it helps the LLM
    to perform better and also perform well with specific knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: AI can be powered with knowledge from an instruction manual, databases from
    a company, some finance files, or contracts, and then become fine-tuned to respond
    accurately to domain-specific content queries. The knowledge base is **augmented**
    with a content store.
  prefs: []
  type: TYPE_NORMAL
- en: 'To recap, this is how the framework works:'
  prefs: []
  type: TYPE_NORMAL
- en: 1️⃣ **User Query** → Input text is received.
  prefs: []
  type: TYPE_NORMAL
- en: 2️⃣ **Retrieve Relevant Documents** → Searches a knowledge base (e.g., a database,
    vector store).
  prefs: []
  type: TYPE_NORMAL
- en: 3️⃣ **Augment Context** → Retrieved documents are added to the input.
  prefs: []
  type: TYPE_NORMAL
- en: 4️⃣ **Generate Response** → An LLM processes the combined input and produces
    an answer.
  prefs: []
  type: TYPE_NORMAL
