- en: How To Build a Benchmark for Your Models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-build-a-benchmark-for-your-models/](https://towardsdatascience.com/how-to-build-a-benchmark-for-your-models/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'I’ve <mdspan datatext="el1747339990606" class="mdspan-comment">been working
    as a data</mdspan> science consultant for the past three years, and I’ve had the
    opportunity to work on multiple projects across various industries. Yet, I noticed
    one common denominator among most of the clients I worked with:'
  prefs: []
  type: TYPE_NORMAL
- en: '**They rarely have a clear idea of the project objective.**'
  prefs: []
  type: TYPE_NORMAL
- en: This is one of the main obstacles data scientists face, especially now that
    Gen AI is taking over every domain.
  prefs: []
  type: TYPE_NORMAL
- en: 'But let’s suppose that after some back and forth, the objective becomes clear.
    We managed to pin down a specific question to answer. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: '***I want to classify my customers into two groups according to their probability
    to churn: “high likelihood to churn” and “low likelihood to churn”***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Well, now what? Easy, let’s start building some models!
  prefs: []
  type: TYPE_NORMAL
- en: '**Wrong!**'
  prefs: []
  type: TYPE_NORMAL
- en: If having a clear objective is rare, having a reliable **benchmark** is even
    rarer.
  prefs: []
  type: TYPE_NORMAL
- en: In my opinion, one of the most important steps in delivering a data science
    project is defining and agreeing on a **set of benchmarks** with the client.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this blog post, I’ll explain:'
  prefs: []
  type: TYPE_NORMAL
- en: '**What a benchmark is,**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Why it is important to have a benchmark,**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**How I would build one using an example scenario and**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Some potential drawbacks to keep in mind**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What is a benchmark?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A **benchmark** is a standardized way to evaluate the performance of a model.
    It provides a reference point against which new models can be compared.
  prefs: []
  type: TYPE_NORMAL
- en: 'A benchmark needs two key components to be considered complete:'
  prefs: []
  type: TYPE_NORMAL
- en: '**A set of metrics** to evaluate the performance'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**A set of simple models** to use as baselines'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The concept at its core is simple: every time I develop a new model I compare
    it against both previous versions and the baseline models. This ensures improvements
    are real and tracked.'
  prefs: []
  type: TYPE_NORMAL
- en: It is essential to understand that this baseline shouldn’t be model or dataset-specific,
    but rather business-case-specific. It should be a general benchmark for a given
    business case.
  prefs: []
  type: TYPE_NORMAL
- en: If I encounter a new dataset, with the same business objective, this benchmark
    should be a reliable reference point.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Why building a benchmark is important
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we’ve defined what a benchmark is, let’s dive into why I believe it’s
    worth spending an extra project week on the development of a strong benchmark.
  prefs: []
  type: TYPE_NORMAL
- en: '**Without a Benchmark you’re aiming for perfection** — If you are working without
    a clear reference point any result will lose meaning. *“My model has a MAE of
    30.000”* Is that good? IDK! Maybe with a simple mean you would get a MAE of 25.000\.
    By comparing your model to a **baseline**, you can measure both **performance** and **improvement**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Improves Communicating with Clients** — Clients and business teams might
    not immediately understand the standard output of a model. However, by engaging
    them with simple baselines from the start, it becomes easier to demonstrate improvements
    later. In many cases benchmarks could come directly from the business in different
    shapes or forms.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Helps in Model Selection** — A benchmark gives a **starting point** to compare
    multiple models fairly. Without it, you might waste time testing models that aren’t
    worth considering.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Model Drift Detection and Monitoring** — Models can **degrade** over time.
    By having a benchmark you might be able to intercept **drifts early** by comparing
    new model outputs against past benchmarks and baselines.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Consistency Between Different Datasets** — Datasets evolve. By having a fixed
    set of metrics and models you ensure that performance comparisons remain valid
    over time.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: With a clear benchmark, every step in the model development will provide **immediate
    feedback**, making the whole process more **intentional and data-driven**.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: How I would build a benchmark
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I hope I’ve convinced you of the importance of having a benchmark. Now, let’s
    actually build one.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start from the business question we presented at the very beginning of
    this blog post:'
  prefs: []
  type: TYPE_NORMAL
- en: '***I want to classify my customers into two groups according to their probability
    to churn: “high likelihood to churn” and “low likelihood to churn”***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For simplicity, I’ll assume **no additional business constraints,** but in real-world
    scenarios, constraints often exist.
  prefs: []
  type: TYPE_NORMAL
- en: 'For this example, I am using [***this dataset***](https://www.kaggle.com/datasets/shubh0799/churn-modelling) ([CC0:
    Public Domain](https://creativecommons.org/publicdomain/zero/1.0/)). The data
    contains some attributes from a company’s customer base (e.g., age, sex, number
    of products, …) along with their churn status.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we have something to work on let’s build the benchmark:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Defining the metrics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We are dealing with a churn use case, in particular, this is a **binary classification
    problem**. Thus the main metrics that we could use are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Precision —** Percentage of correctly predicted churners among all predicted
    churners'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Recall —** Percentage of actual churners correctly identified'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**F1 score —** Balances precision and recall'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**True Positives, False Positives, True Negative and False Negatives**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are some of the “simple” metrics that could be used to evaluate the output
    of a model.
  prefs: []
  type: TYPE_NORMAL
- en: '**However**, it is not an exhaustive list, standard metrics aren’t always enough.
    In many use cases, it might be useful to **build custom metrics**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s assume that in our business case the **customers labeled as “high likelihood
    to churn” are offered a discount.** This creates:'
  prefs: []
  type: TYPE_NORMAL
- en: A **cost** ($250) when offering the discount to a non-churning customer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A **profit** ($1000) when retaining a churning customer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Following on this definition we can build a custom metric that will be crucial
    in our scenario:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'When you are building **business-driven metrics** these are usually the most
    relevant. Such metrics could take any shape or form: Financial goals, minimum
    requirements, percentage of coverage and more.'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Defining the benchmarks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that we’ve defined our metrics, we can define a set of baseline models to
    be used as a reference.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this phase, you should define a list of simple-to-implement model in their
    simplest possible setup. There is no reason at this state to spend time and resources
    on the optimization of these models, my mindset is:'
  prefs: []
  type: TYPE_NORMAL
- en: '**If I had 15 minutes, how would I implement this model?**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In later phases of the model, you can add mode baseline models as the project
    proceeds.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this case, I will use the following models:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Random Model —** Assigns labels randomly'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Majority Model —** Always predicts the most frequent class'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Simple XGB**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Simple KNN**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Again, as in the case of the metrics, we can build **custom benchmarks**.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s assume that in our business case the **the marketing team contacts every
    client who’s**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Over 50 y/o** and'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That is **not active anymore**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Following this rule we can build this model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Running the benchmark
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To run the benchmark I will use the following class. The entry point is the
    method `compare_with_benchmark()` that, given a prediction, runs all the models
    and calculates all the metrics.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Now all we need is a prediction. For this example, I made a quick feature engineering
    and some hyperparameter tuning.
  prefs: []
  type: TYPE_NORMAL
- en: 'The last step is just to run the benchmark:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/a33eb2030b2836f8b00b7af3695a11a8.png)'
  prefs: []
  type: TYPE_IMG
- en: Benchmark metrics comparison | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: This generates a **comparison table** of all models across all metrics. Using
    this table, it is possible to draw concrete conclusions on the model’s predictions
    and make informed decisions on the following steps of the process.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Some drawbacks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As we’ve seen there are plenty of reasons why it is useful to have a benchmark.
    However, even though benchmarks are incredibly useful, there are some **pitfalls** to
    watch out for:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Non-Informative Benchmark** — When the metrics or models are poorly defined
    the marginal impact of having a benchmark decreases. *Always define meaningful
    baselines.*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Misinterpretation by Stakeholders** — Communication with the client is essential,
    it is important to state clearly what the metrics are measuring. *The best model
    might not be the best on all the defined metrics.*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Overfitting to the Benchmark** — You might end up trying to create features
    that are too specific, that might beat the benchmark, but do not generalize well
    in prediction. *Don’t focus on beating the benchmark, but on creating the best
    solution possible to the problem.*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Change of Objective** — Objectives defined might change, due to miscommunication
    or changes in plans. *Keep your benchmark flexible so it can adapt when needed.*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Final thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Benchmarks provide clarity, ensure improvements are measurable, and create a **shared
    reference point** between data scientists and clients. They help avoid the trap
    of assuming a model is performing well without proof and ensure that every iteration
    brings real value.
  prefs: []
  type: TYPE_NORMAL
- en: They also act as a **communication tool**, making it easier to explain progress
    to clients. Instead of just presenting numbers, you can show clear comparisons
    that highlight improvements.
  prefs: []
  type: TYPE_NORMAL
- en: '[*Here you can find a notebook with a full implementation from this blog post*](https://github.com/lorenzomezzini/MediumPosts/blob/main/Benchmarking/benchmarking.ipynb)*.*'
  prefs: []
  type: TYPE_NORMAL
