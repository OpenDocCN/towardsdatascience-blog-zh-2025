- en: 'Get AI-Ready: How to Prepare for a World of Agentic AI as Tech Professionals'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/getting-ai-ready-preparing-for-a-world-of-agentic-ai-as-tech-professionals/](https://towardsdatascience.com/getting-ai-ready-preparing-for-a-world-of-agentic-ai-as-tech-professionals/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1756254134436" class="mdspan-comment">I bet we have</mdspan>
    a lot of thoughts these days with the advent of AI and the conversations around
    AI. <mdspan datatext="el1756253786002" class="mdspan-comment">As</mdspan> we move
    into an era where artificial intelligence is not just assisting but deciding on
    our behalf, one would ask: are we ready to let go of control?'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: 'One question I think about a lot is: *If intelligence becomes a utility, what
    becomes of expertise?*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756253902050" class="mdspan-comment">In a future AI-powered
    world</mdspan>, what happens when work itself becomes autonomous?
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Sure, we’ve automated before. But this time is different. The rise of concepts
    like Agentic AI (systems with the autonomy to plan, infer, and act) asks us to
    talk about what this means for the people creating and consuming this.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: The change on the horizon is exciting, and honestly, a little wild — because
    there’s no blueprint, no resident expert, no install base. Now more than ever,
    we, as tech professionals who will create and consume the use cases of AI, need
    to start preparing ourselves to tackle the big questions.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: What happens when no one is “smarter” anymore?
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How can we prepare for our careers technically, philosophically, and strategically,
    when the biggest value lies in solving unknown problems?
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I ask myself and the internet a lot of these questions and maybe documenting
    my thoughts here would help me explore how this next wave of AI shifts our roles
    as tech professionals — from task-doers to decision architects.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: What is Agentic AI?
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First things first, what really is agentic AI? (If you don’t know already)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: At its core, Agentic AI means giving agency to systems to make decisions for
    humans.
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Think about a travel AI agent that can search, compare, book, and even cancel
    your tickets — all without needing you to lift a finger.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: These systems don’t just act; they decide for humans!
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: We’re already seeing early real-world use cases of Agentic AI in small-scale
    tasks like restaurant bookings, calendar management, and customer service. With
    these use cases, the worst-case scenario with Agentic AI today could be making
    a reservation in a restaurant where you end up getting a bad meal, that is not
    related to the AI in itself. However, in the future, imagine yourself living in
    a world where AI systems could have the autonomy to control the entire heating/cooling
    configuration of a building based on climate changes and now imagine the worst-case
    scenarios there!
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: Why Agentic AI is the Next Big Shift
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here’s the thing: Agentic AI adoption is expected to grow 327% by 2027!'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: We are talking about massive growth here and given that everything about Agentic
    AI is a true “blue-sky” problem — no install base, no experts, it is an interesting
    space to be in. Creating certainty from a sea of nebulous data has always been
    the holy grail. But when planning agents can make inferences that start to mimic
    human intelligence, we hit a whole new level.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里谈论的是巨大的增长，鉴于Agentic AI的每一件事都是一个真正的“蓝海”问题——没有安装基础，没有专家，这是一个有趣的空间。从模糊数据中创造确定性一直是圣杯。但当规划代理能够做出开始模仿人类智能的推断时，我们就达到了一个新的水平。
- en: Agentic AI is still new and early. The upside is huge if we build it right.
    That makes it incredibly exciting for the people and companies working on it,
    because they’re essentially building solutions to unknown problems.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 代理AI仍然处于初期阶段。如果我们正确构建，其正面影响将是巨大的。这使得从事这项工作的人和公司感到非常兴奋，因为他们实际上正在为未知的问题构建解决方案。
- en: And if you’re in tech, this is the opportunity to place yourself and your organization
    at the frontier.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从事技术行业，这是将你和你所在的组织置于前沿的机会。
- en: Industry Implications
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 行业影响
- en: A lot of industries will be upended in the next decade.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的十年里，许多行业都将被颠覆。
- en: We’ll see expansion in new directions, both horizontally and vertically. I was
    talking to my mentor the other day who shared that 75% of product development
    today is education. In that case, what happens when the agent already knows? Historically,
    information has been the real power. So what happens when private datasets  like
    drug research or chip design start feeding AI agents?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在新的方向上看到扩张，无论是横向还是纵向。前几天我和我的导师聊天，他告诉我，现在75%的产品开发都是教育。在这种情况下，如果代理已经知道会发生什么？从历史上看，信息一直是真正的力量。那么当像药物研究或芯片设计这样的私有数据集开始为AI代理提供信息时，会发生什么？
- en: The way we interact with systems of record will change a whole lot.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们与记录系统互动的方式将发生很大变化。
- en: Interfaces become the new battleground.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 接口成为新的战场。
- en: Data asymmetry where the old “who knows more” power dynamic may disappear, because
    intelligence becomes normalized.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 数据不对称，旧的“谁知道更多”的权力动态可能消失，因为智能变得正常化。
- en: How Tech Professionals Can Prepare
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术专业人士如何准备
- en: 'Now that we’ve established that the work of tomorrow — and how we interact
    with data, systems, and even human psychology — will look very different, the
    natural question that comes to our minds is: what can we, as tech professionals,
    actually do to stay relevant and cater to the ever-evolving needs of the world?'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经确定，明天的劳动——以及我们与数据、系统和甚至人类心理的互动——将非常不同，那么自然而然地，我们心中浮现的问题就是：作为技术专业人士，我们实际上能做什么来保持相关性并满足世界不断变化的需求？
- en: AI is not here to take your job, but someone who knows how to use AI can take
    away your job.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: AI不是来抢走你的工作的，但知道如何使用AI的人可以抢走你的工作。
- en: Upskill— learn about the new concepts, skills and tools that can enhance your
    current work and role.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升技能——了解可以增强你当前工作和角色的新概念、技能和工具。
- en: Don’t limit yourself to only writing code—coding will always matter, but the
    differentiator will be if you can design workflows infused with business acumen
    and orchestrate intelligence.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要只局限于编写代码——编写代码始终重要，但区别在于你是否能够设计融入商业洞察力的工作流程并编排智能。
- en: Embrace the abstract and start solving problems where the solution isn’t obvious.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拥抱抽象思维，开始解决那些解决方案并不明显的难题。
- en: Prepare yourself to move out of the comfort zone of “known inputs, known outputs”
    because that won’t hold in an Agentic AI world
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 准备好走出“已知输入、已知输出”的舒适区，因为在代理AI世界中这不再适用。
- en: In your current role, what tasks should the AI agents take over?
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你当前的角色中，哪些任务应该由AI代理接管？
- en: Identify where you still want to have the final say
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定你仍然希望拥有最终决定权的地方。
- en: Think more about building the bridge between raw AI capabilities and meaningful
    human outcomes.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更多地考虑在原始AI能力和有意义的人类结果之间建立桥梁。
- en: Imagine what planning agents could do for humans as collaborators, not as replacements
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想象一下规划代理作为人类协作伙伴而不是替代者能为人类做些什么。
- en: The sooner you begin preparing to work with agents, the faster you’ll adapt
    when they become mainstream.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 你越早开始准备与代理一起工作，当它们成为主流时，你适应得就越快。
- en: The educational pipelines shaping the careers of tomorrow will also look different.
    The early-career and repetitive roles that once formed the traditional entry points
    into tech could be automated away or reshaped. Hierarchies may flatten, and the
    old idea that influence comes from tenure will fade. Instead, the people who bring
    curiosity, agility, and a willingness to continuously learn are the ones who could
    thrive.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 形塑未来职业的教育管道也将有所不同。那些曾经是进入科技行业传统入口的早期职业和重复性角色可能会被自动化或重塑。等级制度可能会变得扁平，而影响力来自资历的老观念将逐渐消失。相反，那些带来好奇心、敏捷性和愿意持续学习的人可能会蓬勃发展。
- en: 'So if you’re wondering how to future-proof yourself in this AI-driven era:
    lean into ambiguity, embrace adaptability and start thinking not just about what
    you can do with AI, but about what you can design and imagine with it.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果您想知道如何在人工智能驱动的时代确保自己的未来：接受不确定性，拥抱适应性，并开始思考您不仅可以用人工智能做什么，还可以用它设计和想象什么。
- en: In Conclusion
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In many ways, this is all a big social experiment with no defined future but
    we humans are resilient.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多方面，这全是一个没有定义的未来但人类具有韧性的大型社会实验。
- en: We’ve adapted before, and we’ll do it again. New roles, new companies, even
    new industries will emerge. Our risk appetite won’t change, but the next generation
    will have a different cultural disposition than us. That’s how society evolves.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以前已经适应过，我们还会再次这样做。新的角色、新的公司，甚至新的行业将会出现。我们的风险偏好不会改变，但下一代的文化倾向将不同于我们。这就是社会如何发展的。
- en: '**The key is to keep asking the uncomfortable questions. **'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**关键是要不断提出令人不舒服的问题。**'
- en: Will AI democratize intelligence? What happens to expertise when everyone has
    access to infinite intelligence?
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能会民主化智能吗？当每个人都能访问无限的智能时，专业知识会发生什么？
- en: Ultimately, we have a choice in how we frame this. You can prophesize a draconian
    outcome or an optimistic one. But if history is any indication, we’ll find a way
    to push society forward.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，我们在如何构建这个框架上有选择。您可以预言一个残酷的结果或一个乐观的结果。但如果有历史作为任何迹象，我们将找到一种方法来推动社会向前发展。
- en: 'So I’ll leave you with one last question: *when intelligence becomes infinite
    and free, what makes you valuable?*'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，我将留给您最后一个问题：*当智能变得无限和自由时，什么使您变得有价值？*
- en: ……
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: ……
- en: That’s it from my end on this blog post. Thank you for reading! I hope you found
    it an interesting read. Let me know in the comments about your experience with
    storytelling, your journey in data, and what you are looking for in 2025!
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我在这篇博客文章中的全部内容。感谢您的阅读！希望您觉得这是一篇有趣的阅读。请在评论中告诉我您在讲故事、数据之旅以及您在2025年寻找什么方面的体验！
- en: '*Rashi is a data wiz from Chicago who loves to analyze data and create data
    stories to communicate insights. She’s a full-time healthcare data analytics consultant
    and likes to write blogs about data on weekends with a cup of coffee…*'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '*拉希是来自芝加哥的数据专家，她喜欢分析数据并创建数据故事来传达洞察力。她是一名全职的医疗数据分析顾问，喜欢在周末用一杯咖啡写关于数据的博客…*'
