- en: What Statistics Can Tell Us About NBA Coaches
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/what-statistics-can-tell-us-about-nba-coaches/](https://towardsdatascience.com/what-statistics-can-tell-us-about-nba-coaches/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1747887301355" class="mdspan-comment">Who gets hired</mdspan>
    as an NBA coach? How long does a typical coach last? And does their coaching background
    play any part in predicting success?
  prefs: []
  type: TYPE_NORMAL
- en: This analysis was inspired by several key theories. First, there has been a
    common criticism among casual NBA fans that teams overly prefer hiring candidates
    with previous NBA head coaches experience.
  prefs: []
  type: TYPE_NORMAL
- en: Consequently, this analysis aims to answer two related questions. First, is
    it true that NBA teams frequently re-hire candidates with previous head coaching
    experience? And second, is there any evidence that these candidates under-perform
    relative to other candidates?
  prefs: []
  type: TYPE_NORMAL
- en: The second theory is that internal candidates (though infrequently hired) are
    often more successful than external candidates. This theory was derived from a
    pair of anecdotes. Two of the most successful coaches in NBA history, Gregg Popovich
    of San Antonio and Erik Spoelstra of Miami, were both internal hires. However,
    rigorous quantitative evidence is needed to test if this relationship holds over
    a larger sample.
  prefs: []
  type: TYPE_NORMAL
- en: This analysis aims to explore these questions, and provide the code to reproduce
    the analysis in Python.
  prefs: []
  type: TYPE_NORMAL
- en: The Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The code (contained in a Jupyter notebook) and dataset for this project are
    [available on Github here](https://github.com/braydengerrard/NBACoaches). The
    analysis was performed using Python in Google Colaboratory.
  prefs: []
  type: TYPE_NORMAL
- en: 'A prerequisite to this analysis was determining a way to measure coaching success
    quantitatively. I decided on a simple idea: the success of a coach would be best
    measured by the length of their tenure in that job. Tenure best represents the
    differing expectations that might be placed on a coach. A coach hired to a contending
    team would be expected to win games and generate deep playoff runs. A coach hired
    to a rebuilding team might be judged on the development of younger players and
    their ability to build a strong culture. If a coach meets expectations (whatever
    those may be), the team will keep them around.'
  prefs: []
  type: TYPE_NORMAL
- en: Since there was no existing dataset with all of the required data, I collected
    the data myself from Wikipedia. I recorded every off-season coaching change from
    1990 through 2021\. Since the primary outcome variable is tenure, in-season coaching
    changes were excluded since these coaches often carried an “interim” tag—meaning
    they were intended to be temporary until a permanent replacement could be found.
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition, the following variables were collected:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Variable** | **Definition** |'
  prefs: []
  type: TYPE_TB
- en: '| Team | The NBA team the coach was hired for |'
  prefs: []
  type: TYPE_TB
- en: '| Year | The year the coach was hired |'
  prefs: []
  type: TYPE_TB
- en: '| Coach | The name of the coach |'
  prefs: []
  type: TYPE_TB
- en: '| Internal? | An indicator if the coach was internal or not—meaning they worked
    for the organization in some capacity immediately prior to being hired as head
    coach |'
  prefs: []
  type: TYPE_TB
- en: '| Type | The background of the coach. Categories are Previous HC (prior NBA
    head coaching experience), Previous AC (prior NBA assistant coaching experience,
    but no head coaching experience), College (head coach of a college team), Player
    (a former NBA player with no coaching experience), Management (someone with front
    office experience but no coaching experience), and Foreign (someone coaching outside
    of North America with no NBA coaching experience). |'
  prefs: []
  type: TYPE_TB
- en: '| Years | The number of years a coach was employed in the role. For coaches
    fired mid-season, the value was counted as 0.5. |'
  prefs: []
  type: TYPE_TB
- en: First, the dataset is imported from its location in Google Drive. I also convert
    ‘Internal?’ into a dummy variable, replacing “Yes” with 1 and “No” with 0.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'This prints a preview of what the dataset looks like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3a0aefc8638db0d51a5da506d18e78ac.png)'
  prefs: []
  type: TYPE_IMG
- en: In total, the dataset contains 221 coaching hires over this time.
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive Statistics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, basic summary statistics are calculated and visualized to determine the
    backgrounds of NBA head coaches.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/3aefe3998edfed434cd965cf73418817.png)'
  prefs: []
  type: TYPE_IMG
- en: Over half of coaching hires previously served as an NBA head coach, and nearly
    90% had NBA coaching experience of some kind. This answers the first question
    posed—NBA teams show a strong preference for experienced head coaches. If you
    get hired once as an NBA coach, your odds of being hired again are much higher.
    Additionally, 13.6% of hires are internal, confirming that teams do not frequently
    hire from their own ranks.
  prefs: []
  type: TYPE_NORMAL
- en: Second, I will explore the typical tenure of an NBA head coach. This can be
    visualized using a histogram.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/53c33f489604944e6327045e1d1e2fb2.png)'
  prefs: []
  type: TYPE_IMG
- en: Using tenure as an indicator of success, the the data clearly shows that the
    large majority of coaches are unsuccessful. The median tenure is just 2.5 seasons. 18.1%
    of coaches last a single season or less, and barely 10% of coaches last more than
    5 seasons.
  prefs: []
  type: TYPE_NORMAL
- en: 'This can also be viewed as a survival analysis plot to see the drop-off at
    various points in time:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/ffc5095752e035a6d34c73efd2878d5d.png)'
  prefs: []
  type: TYPE_IMG
- en: Lastly, a box plot can be generated to see if there are any obvious differences
    in tenure based on coaching type. Boxplots also display outliers for each group.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/64b2bbca58c033561c38de4d8fd30c52.png)'
  prefs: []
  type: TYPE_IMG
- en: There are some differences between the groups. Aside from management hires (which
    have a sample of just six), previous head coaches have the longest average tenure
    at 3.3 years. However, since many of the groups have small sample sizes, we need
    to use more advanced techniques to test if the differences are statistically significant.
  prefs: []
  type: TYPE_NORMAL
- en: Statistical Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'First, to test if either Type or Internal has a statistically significant difference
    among the group means, we can use ANOVA:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/c615238467e4e9544921867003b2cd86.png)'
  prefs: []
  type: TYPE_IMG
- en: The results show high p-values and low F-stats—indicating no evidence of statistically
    significant difference in means. Thus, the initial conclusion is that there is
    no evidence NBA teams are under-valuing internal candidates or over-valuing previous
    head coaching experience as initially hypothesized.
  prefs: []
  type: TYPE_NORMAL
- en: However, there is a possible distortion when comparing group averages. NBA coaches
    are signed to contracts that typically run between three and five years. Teams
    typically have to pay out the remainder of the contract even if coaches are dismissed
    early for poor performance. A coach that lasts two years may be no worse than
    one that lasts three or four years—the difference could simply be attributable
    to the length and terms of the initial contract, which is in turn impacted by
    the desirability of the coach in the job market. Since coaches with prior experience
    are highly coveted, they may use that leverage to negotiate longer contracts and/or
    higher salaries, both of which could deter teams from terminating their employment
    too early.
  prefs: []
  type: TYPE_NORMAL
- en: To account for this possibility, the outcome can be treated as binary rather
    than continuous. If a coach lasted more than 5 seasons, it is highly likely they
    completed at least their initial contract term and the team chose to extend or
    re-sign them. These coaches will be treated as successes, with those having a
    tenure of five years or less categorized as unsuccessful. To run this analysis,
    all coaching hires from 2020 and 2021 must be excluded, since they have not yet
    been able to eclipse 5 seasons.
  prefs: []
  type: TYPE_NORMAL
- en: With a binary dependent variable, a logistic regression can be used to test
    if any of the variables predict coaching success. Internal and Type are both converted
    to dummy variables. Since previous head coaches represent the most common coaching
    hires, I set this as the “reference” category against which the others will be
    measured against. Additionally, the dataset contains just one foreign-hired coach
    (David Blatt) so this observation is dropped from the analysis.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/44f1c11d840e78b8cacf430f477ea698.png)'
  prefs: []
  type: TYPE_IMG
- en: Consistent with ANOVA results, none of the variables are statistically significant
    under any conventional threshold. However, closer examination of the coefficients
    tells an interesting story.
  prefs: []
  type: TYPE_NORMAL
- en: 'The beta coefficients represent the change in the log-odds of the outcome.
    Since this is unintuitive to interpret, the coefficients can be converted to an
    Odds Ratio as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ab7fa300732b7d46dc2181812e299bd8.png)'
  prefs: []
  type: TYPE_IMG
- en: Internal has an odds ratio of 0.23—indicating that internal candidates are 77%
    less likely to be successful compared to external candidates. Management has an
    odds ratio of 2.725, indicating these candidates are 172.5% more likely to be
    successful. The odds ratios for players is effectively zero, 0.696 for previous
    assistant coaches, and 0.5 for college coaches. Since three out of four coaching
    type dummy variables have an odds ratio under one, this indicates that only management
    hires were more likely to be successful than previous head coaches.
  prefs: []
  type: TYPE_NORMAL
- en: From a practical standpoint, these are large effect sizes. So why are the variables
    statistically insignificant?
  prefs: []
  type: TYPE_NORMAL
- en: 'The cause is a limited sample size of successful coaches. Out of 202 coaches
    remaining in the sample, just 23 (11.4%) were successful. Regardless of the coach’s
    background, odds are low they last more than a few seasons. If we look at the
    one category able to outperform previous head coaches (management hires) specifically:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The filtered dataset contains just 6 hires—of which just one (Steve Kerr with
    Golden State) is classified as a success. In other words, the entire effect was
    driven by a single successful observation. Thus, it would take a considerably
    larger sample size to be confident if differences exist.
  prefs: []
  type: TYPE_NORMAL
- en: With a p-value of 0.202, the Internal variable comes the closest to statistical
    significance (though it still falls well short of a typical alpha of 0.05). Notably,
    however, the direction of the effect is actually the opposite of what was hypothesized—internal
    hires are less likely to be successful than external hires. Out of 26 internal
    hires, just one (Erik Spoelstra of Miami) met the criteria for success.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In conclusion, this analysis was able to draw several key conclusions:'
  prefs: []
  type: TYPE_NORMAL
- en: Regardless of background, being an NBA coach is typically a short-lived job.
    It’s rare for a coach to last more than a few seasons.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The common wisdom that NBA teams strongly prefer to hire previous head coaches
    holds true. More than half of hires already had NBA head coaching experience.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If teams don’t hire an experienced head coach, they’re likely to hire an NBA
    assistant coach. Hires outside of these two categories are especially uncommon.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Though they are frequently hired, there is no evidence to suggest NBA teams
    overly prioritize previous head coaches. To the contrary, previous head coaches
    stay in the job longer on average and are more likely to outlast their initial
    contract term—though neither of these differences are statistically significant.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Despite high-profile anecdotes, there is no evidence to suggest that internal
    hires are more successful than external hires either.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Note: All images were created by the author unless otherwise credited.*'
  prefs: []
  type: TYPE_NORMAL
