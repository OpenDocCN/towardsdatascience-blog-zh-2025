- en: Use PyTorch to Easily Access Your GPU
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 PyTorch 轻松访问您的 GPU
- en: 原文：[https://towardsdatascience.com/use-pytorch-to-easily-access-your-gpu/](https://towardsdatascience.com/use-pytorch-to-easily-access-your-gpu/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/use-pytorch-to-easily-access-your-gpu/](https://towardsdatascience.com/use-pytorch-to-easily-access-your-gpu/)
- en: <mdspan datatext="el1747860298637" class="mdspan-comment">Let’s say you</mdspan>
    are lucky enough to have access to a system with an Nvidia Graphical Processing
    Unit (GPU). Did you know there is an absurdly easy method to use your GPU’s capabilities
    using a Python library intended and predominantly used for machine learning (ML)
    applications?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747860298637" class="mdspan-comment">假设您</mdspan>足够幸运，能够访问到一个配备了
    Nvidia 图形处理单元（GPU）的系统。您知道有一个极其简单的方法可以使用一个旨在主要用于机器学习（ML）应用的 Python 库来利用 GPU 的功能吗？
- en: Don’t worry if you’re not up to speed on the ins and outs of ML, since we won’t
    be using it in this article. Instead, I’ll show you how to use the PyTorch library
    to access and use the capabilities of your GPU. We’ll compare the run times of
    Python programs using the popular numerical library **NumPy,** running on the
    CPU, with equivalent code using PyTorch on the GPU.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您对机器学习的细节不够熟悉，请不要担心，因为本文中我们不会使用它。相反，我将向您展示如何使用 PyTorch 库来访问和使用您 GPU 的功能。我们将比较使用流行的数值库
    **NumPy** 在 CPU 上运行的 Python 程序的运行时间，以及使用 PyTorch 在 GPU 上运行的等效代码。
- en: Before continuing, let’s quickly recap what a GPU and PyTorch are.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续之前，让我们快速回顾一下 GPU 和 PyTorch 是什么。
- en: What is a GPU?
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是 GPU？
- en: A GPU is a specialised electronic chip initially designed to rapidly manipulate
    and alter memory to accelerate the creation of images in a frame buffer intended
    for output to a display device. Its utility as a rapid image manipulation device
    was based on its ability to perform many calculations simultaneously, and it’s
    still used for that purpose.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: GPU 是一种专门设计的电子芯片，最初是为了快速操纵和修改内存以加速帧缓冲区中图像的创建，该帧缓冲区用于输出到显示设备。它作为快速图像处理设备的作用基于其能够同时执行许多计算的能力，并且它仍然用于这个目的。
- en: However, GPUs have recently become invaluable in machine learning, large language
    model training and development. Their inherent ability to perform highly parallelizable
    computations makes them ideal workhorses in these fields, as they employ complex
    mathematical models and simulations.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，GPU 最近在机器学习、大型语言模型训练和开发中变得极其有价值。它们固有的执行高度可并行计算的能力使它们成为这些领域的理想工作马，因为它们使用复杂的数学模型和模拟。
- en: What is PyTorch?
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是 PyTorch？
- en: PyTorch is an open-source machine learning library developed by Facebook’s AI
    Research Lab (FAIR). It’s widely used for natural language processing and computer
    vision applications. Two of the main reasons that Pytorch can be used for GPU
    operations are,
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch 是由 Facebook 的 AI 研究实验室（FAIR）开发的开源机器学习库。它被广泛用于自然语言处理和计算机视觉应用。PyTorch
    可以用于 GPU 操作的两个主要原因如下，
- en: One of PyTorch’s core data structures is the Tensor. Tensors are similar to
    arrays and matrices in other programming languages, but are optimised for running
    on a GPU.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PyTorch 的核心数据结构之一是张量。张量在其他编程语言中类似于数组和矩阵，但它们针对在 GPU 上运行进行了优化。
- en: Pytorch has CUDA support. PyTorch seamlessly integrates with CUDA, a parallel
    computing platform and programming model developed by NVIDIA for general computing
    on its GPUS. This allows PyTorch to access the GPU hardware directly, accelerating
    numerical computations. CUDA will enable developers to use PyTorch to write software
    that fully utilises GPU acceleration.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Pytorch 支持 CUDA。PyTorch 与 CUDA 无缝集成，CUDA 是 NVIDIA 为其 GPU 上的通用计算开发的一个并行计算平台和编程模型。这使得
    PyTorch 能够直接访问 GPU 硬件，加速数值计算。CUDA 将使开发者能够使用 PyTorch 编写充分利用 GPU 加速的软件。
- en: In summary, PyTorch’s support for GPU operations through CUDA and its efficient
    tensor manipulation capabilities make it an excellent tool for developing GPU-accelerated
    Python functions with high computational demands.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，PyTorch 通过 CUDA 支持GPU操作以及其高效的张量操作能力，使其成为开发具有高计算需求的 GPU 加速 Python 函数的出色工具。
- en: As we’ll show later on, you don’t ***have*** to use PyTorch to develop machine
    learning models or train large language models.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们稍后将要展示的，您**不必**使用 PyTorch 来开发机器学习模型或训练大型语言模型。
- en: In the rest of this article, we’ll set up our development environment, install
    PyTorch and run through a few examples where we’ll compare some computationally
    heavy PyTorch implementations with the equivalent numpy implementation and see
    what, if any, performance differences we find.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文的其余部分，我们将设置我们的开发环境，安装PyTorch，并运行一些示例，我们将比较一些计算密集型的PyTorch实现与等效的numpy实现，并查看我们找到的任何性能差异。
- en: Pre-requisites
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 先决条件
- en: '**An Nvidia GPU**'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Nvidia GPU**'
- en: You need an Nvidia GPU on your system. To check your GPU, issue the following
    command at your system prompt. I’m using the Windows Subsystem for Linux (WSL).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 您的系统需要Nvidia GPU。要检查您的GPU，请在系统提示符下输入以下命令。我使用的是Windows子系统Linux（WSL）。
- en: '[PRE0]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: If that command isn’t recognised and you’re sure you have a GPU, it probably
    means you’re missing an NVIDIA driver. Just follow the rest of the instructions
    in this article, and it should be installed as part of that process.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 如果该命令不被识别，而你确信你有GPU，那么这很可能意味着你缺少NVIDIA驱动程序。只需按照本文中的其余说明操作，它应该作为该过程的一部分被安装。
- en: Nvidia GPU drivers
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Nvidia GPU驱动程序
- en: While PyTorch installation packages can include CUDA libraries, your system
    must still install the appropriate NVIDIA GPU drivers. These drivers are necessary
    for your operating system to communicate with the graphics processing unit (GPU)
    hardware. The CUDA toolkit includes drivers, but if you’re using PyTorch’s bundled
    CUDA, you only need to ensure that your GPU drivers are current.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当PyTorch安装包可以包括CUDA库时，您的系统仍然必须安装适当的NVIDIA GPU驱动程序。这些驱动程序对于操作系统与图形处理单元（GPU）硬件通信是必要的。CUDA工具包包括驱动程序，但如果您使用PyTorch捆绑的CUDA，您只需确保您的GPU驱动程序是最新的。
- en: Click [this link](https://www.nvidia.com/en-us/drivers/) to go to the NVIDIA
    website and install the latest drivers compatible with your system and GPU specifications.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 点击[此链接](https://www.nvidia.com/en-us/drivers/)访问NVIDIA网站并安装与您的系统和GPU规格兼容的最新驱动程序。
- en: Setting up our development environment
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置我们的开发环境
- en: As a best practice, we should set up a separate development environment for
    each project. I use conda, but use whatever method suits you.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 作为最佳实践，我们应该为每个项目设置一个单独的开发环境。我使用conda，但使用适合您的方法。
- en: '*If you want to go down the conda route and don’t already have it, you must
    install Miniconda (recommended) or Anaconda first. *'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*如果您想走conda路线并且还没有安装，您必须首先安装Miniconda（推荐）或Anaconda。*'
- en: ''
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Please note that, at the time of writing, PyTorch currently only officially
    supports Python versions 3.8 to 3.11.*'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*请注意，在撰写本文时，PyTorch目前仅官方支持Python版本3.8到3.11。*'
- en: '[PRE1]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now activate your new environment.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 现在激活您的新环境。
- en: '[PRE2]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We now need to get the appropriate conda install command for PyTorch. This will
    depend on your operating system, chosen programming language, preferred package
    manager, and CUDA version.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在需要获取适用于PyTorch的正确conda安装命令。这取决于您的操作系统、选择的编程语言、首选的包管理器和CUDA版本。
- en: Luckily, Pytorch provides a useful web interface that makes this easy to set
    up. So, to get started, head over to the Pytorch website at…
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，PyTorch提供了一个有用的Web界面，这使得设置变得容易。因此，要开始，请访问PyTorch网站在…
- en: '[https://pytorch.org](https://pytorch.org)'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://pytorch.org](https://pytorch.org)'
- en: Click on the `Get Started` link near the top of the screen. From there, scroll
    down a little until you see this,
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 点击屏幕顶部的“开始使用”链接。从那里，向下滚动一点，直到您看到这个，
- en: '![](../Images/0c43df6e185f475bd4c0f6d9c35feb99.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0c43df6e185f475bd4c0f6d9c35feb99.png)'
- en: Image from Pytorch website
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 来自PyTorch网站的照片
- en: Click on each box in the appropriate position for your system and specs. As
    you do, you’ll see that the command in the `Run this Command` output field changes
    dynamically. When you’re done making your choices, copy the final command text
    shown and type it into your command window prompt.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 点击系统规格适当位置的每个框。在此过程中，您会看到“运行此命令”输出字段中的命令会动态更改。完成选择后，复制显示的最终命令文本并将其输入到命令窗口提示符中。
- en: For me, this was:-
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，这是：-
- en: '[PRE3]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We’ll install Jupyter, Pandas, and Matplotlib to enable us to run our Python
    code in a notebook with our example code.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将安装Jupyter、Pandas和Matplotlib，以便我们能够在笔记本中运行我们的Python代码，并使用示例代码。
- en: '[PRE4]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now type in `jupyter notebook` into your command prompt. You should see a jupyter
    notebook open in your browser. If that doesn’t happen automatically, you’ll likely
    see a screenful of information after the `jupyter notebook` command.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在在命令提示符中输入`jupyter notebook`。您应该在浏览器中看到一个jupyter笔记本打开。如果这不是自动发生的，您可能会在`jupyter
    notebook`命令后看到一屏的信息。
- en: Near the bottom, there will be a URL that you should copy and paste into your
    browser to initiate the Jupyter Notebook.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在底部附近，将有一个 URL，你应该将其复制并粘贴到浏览器中以启动 Jupyter Notebook。
- en: Your URL will be different to mine, but it should look something like this:-
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你的 URL 将与我的不同，但它应该看起来像这样：-
- en: '[PRE5]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Testing our setup
  id: totrans-46
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 测试我们的设置
- en: The first thing we’ll do is test our setup. Please enter the following into
    a Jupyter cell and run it.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先要做的是测试我们的设置。请将以下内容输入到一个 Jupyter 单元中并运行它。
- en: '[PRE6]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: You should see a similar output to the following.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该会看到以下类似的输出。
- en: '[PRE7]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Additionally, to check if your GPU driver and CUDA are enabled and accessible
    by PyTorch, run the following commands:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，为了检查你的 GPU 驱动程序和 CUDA 是否被 PyTorch 启用并可访问，请运行以下命令：
- en: '[PRE8]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This should output `True` if all is OK.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一切正常，这将输出 `True`。
- en: If everything is okay, we can proceed to our examples. If not, go back and check
    your installation processes.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一切正常，我们可以继续到我们的示例。如果不正常，请返回并检查你的安装过程。
- en: '**NB In the timings below, I ran each of the Numpy and PyTorch processes several
    times in succession and took the best time for each. This does favour the PyTorch
    runs somewhat as there is a small overhead on the very first invocation of each
    PyTorch run but, overall, I think it’s a fairer comparison*.***'
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意**：在以下时间表中，我连续多次运行了每个 Numpy 和 PyTorch 进程，并取了每个的最佳时间。这有点偏向 PyTorch 运行，因为每次
    PyTorch 运行的第一次调用都有轻微的开销，但总体来说，我认为这是一个更公平的比较*。***'
- en: Example 1 — A simple array math operation.
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 1—一个简单的数组数学操作。
- en: In this example, we set up two large, identical one-dimensional arrays and perform
    a simple addition to each array element.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们设置了两个大型的、相同的一维数组，并对每个数组元素执行简单的加法操作。
- en: '[PRE9]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '[PRE10]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: We see a slight improvement when using PyTorch over Numpy, but we missed one
    crucial point. We haven’t used the GPU because our PyTorch tensor data is still
    in CPU memory.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到使用 PyTorch 相比 Numpy 有轻微的改进，但我们错过了一个关键点。我们没有使用 GPU，因为我们的 PyTorch 张量数据仍然在
    CPU 内存中。
- en: To move the data to the GPU memory, we need to add the `device='cuda'` directive
    when creating the tensor. Let’s do that and see if it makes a difference.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 要将数据移动到 GPU 内存中，我们需要在创建张量时添加 `device='cuda'` 指令。让我们试试看是否会有所不同。
- en: '[PRE11]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: After re-running with the changes we get,
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 重新运行并应用更改后，我们得到，
- en: '[PRE12]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: That’s more like it, a greater than 10x speed up.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这才是正确的，速度提高了 10 倍以上。
- en: Example 2—A slightly more complex array operation.
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 2—一个稍微复杂一点的数组操作。
- en: For this example, we’ll multiply multi-dimensional matrices using the built-in
    **matmul** operations available in the PyTorch and Numpy libraries. Each array
    will be 10000 x 10000 and contain random floating-point numbers between 1 and
    100.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将使用 PyTorch 和 Numpy 库中可用的内置 **matmul** 操作来乘以多维矩阵。每个数组将是 10000 x 10000，并包含介于
    1 和 100 之间的随机浮点数。
- en: '[PRE13]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '[PRE14]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Now for the PyTorch version.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是 PyTorch 版本。
- en: '[PRE15]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '[PRE16]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The PyTorch run was 20 times better this time than the NumPy run. Great stuff.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这次 PyTorch 运行比 NumPy 运行快了 20 倍。太棒了。
- en: Example 3 — Combining CPU and GPU code.
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 3—结合 CPU 和 GPU 代码。
- en: Sometimes, not all of your processing can be done on a GPU. An everyday use
    case for this is graphing data. Sure, you can manipulate your data using the GPU,
    but often the next step is to see what your final dataset looks like using a plot.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，你的处理不能全部在 GPU 上完成。这个的日常用例是绘图。当然，你可以使用 GPU 来操作你的数据，但通常下一步是使用图表来查看你的最终数据集看起来像什么。
- en: You can’t plot data if it resides in the GPU memory, so you must move it back
    to CPU memory before calling your plotting functions. Is it worth the overhead
    of moving large chunks of data from the GPU to the CPU? Let’s find out.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如果数据位于 GPU 内存中，你无法绘制数据，因此必须在调用绘图函数之前将其移回 CPU 内存。将大量数据从 GPU 移到 CPU 是否值得开销？让我们来看看。
- en: In this example, we will solve this polar equation for values of θ between 0
    and 2π in (x, y) coordinate terms and then plot out the resulting graph.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将解这个极坐标方程，θ 的值在 0 和 2π 之间，以 (x, y) 坐标形式，然后绘制出结果图。
- en: '![](../Images/806a74ec14a841045d1e7389e868a614.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/806a74ec14a841045d1e7389e868a614.png)'
- en: Don’t get too hung up on the math. It’s just an equation that, when converted
    to use the x, y coordinate system and solved, looks nice when plotted.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 不要过于纠结于数学。这只是一个方程，当将其转换为使用 x, y 坐标系并求解后，在绘制时看起来很漂亮。
- en: For even a few million values of x and y, Numpy can solve this in milliseconds,
    so to make it a bit more interesting, we’ll use 100 million (x, y) coordinates.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 即使对于几百万个 x 和 y 的值，Numpy 也可以以毫秒的速度解决这个问题，所以为了使它更有趣，我们将使用 1 亿（x, y）坐标。
- en: Here is the numpy code first.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 numpy 代码。
- en: '[PRE17]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Here is the output. Would you have guessed beforehand that it would look like
    this? I sure wouldn’t have!
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是输出。你事先能猜到它会看起来像这样吗？我肯定不会！
- en: '![](../Images/f3d9eafb22e29fbc8ea2703064185c60.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f3d9eafb22e29fbc8ea2703064185c60.png)'
- en: Now, let’s see what the equivalent PyTorch implementation looks like and how
    much of a speed-up we get.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看等效的 PyTorch 实现是什么样的，以及我们能获得多大的速度提升。
- en: '[PRE18]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: And our output again.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们再次看看我们的输出。
- en: '![](../Images/3a046d4624e165035aaa8935dbe2dd6a.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3a046d4624e165035aaa8935dbe2dd6a.png)'
- en: The calculation part was about 10 times more than the numpy calculation. The
    data plotting took around the same time using both the PyTorch and NumPy versions,
    which was expected since the data was still in CPU memory then, and the GPU played
    no further part in the processing.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 计算部分大约是 numpy 计算的 10 倍。使用 PyTorch 和 NumPy 版本进行数据绘图所需的时间大致相同，这是预期的，因为数据当时仍在 CPU
    内存中，GPU 在处理中并没有发挥进一步的作用。
- en: But, overall, we shaved about 40% off the total run-time, which is excellent.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，总的来说，我们减少了大约 40% 的总运行时间，这是非常出色的。
- en: Summary
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This article has demonstrated how to leverage an NVIDIA GPU using PyTorch—a
    machine learning library typically used for AI applications—to accelerate non-ML
    numerical Python code. It compares standard NumPy (CPU-based) implementations
    with GPU-accelerated PyTorch equivalents to show the performance benefits of running
    tensor-based operations on a GPU.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 本文展示了如何利用 PyTorch（一个通常用于 AI 应用的机器学习库）来使用 NVIDIA GPU 加速非机器学习数值 Python 代码。它将标准
    NumPy（基于 CPU 的）实现与 GPU 加速的 PyTorch 等效实现进行了比较，以展示在 GPU 上运行基于张量的操作的性能优势。
- en: You don’t need to be doing machine learning to benefit from PyTorch. If you
    can access an NVIDIA GPU, PyTorch provides a simple and effective way to significantly
    speed up computationally intensive numerical operations—even in general-purpose
    Python code.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要进行机器学习就能从 PyTorch 中受益。如果你可以访问 NVIDIA GPU，PyTorch 提供了一种简单而有效的方法来显著加快计算密集型数值运算的速度——即使在通用
    Python 代码中也是如此。
