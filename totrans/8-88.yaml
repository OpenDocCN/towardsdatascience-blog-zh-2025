- en: 'Mastering Sensor Fusion: Color Image Obstacle Detection with KITTI Data – Part
    2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/mastering-sensor-fusion-color-image-obstacle-detection-with-kitti-data-part-2-5118be4e92ee/](https://towardsdatascience.com/mastering-sensor-fusion-color-image-obstacle-detection-with-kitti-data-part-2-5118be4e92ee/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The concept of sensor fusion is a decision-making mechanism that can be applied
    to different problems and using different modalities. We mentioned in the previous
    post that in this Medium blog series, we will analyze the concept of sensor fusion
    for obstacle detection with both Lidar and color images. If you haven’t read that
    post yet, which is related to obstacle detection with Lidar data, here is the
    link to it:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '[**Sensor Fusion – KITTI – ‘Lidar-based Obstacle Detection’ – Part-1**](https://medium.com/@eroltak/sensor-fusion-kitti-lidar-based-obstacle-detection-part-1-9c5f4bc8d497)'
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This post is a continuation, and in this section, I will get deep into the obstacle
    detection problem on color images. In the next and last post of the series ***(I
    hope it will be available soon!)***, we will be investigating sensor fusion using
    both Lidar and color images.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: But before moving on to this step, let’s continue with our uni-modality-based
    study. Just as we previously performed obstacle detection using only Lidar data,
    here we will perform obstacle detection using only color images.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: As we did in the first post, we will use the KITTI dataset here again. For information
    about which data needs to be downloaded from KITTI [1], please check the previous
    post. There it was stated which data, labels, and calibration files are required
    for each data type.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: However, for those who do not have much time, we are analyzing the 3D Object
    Detection problem within the scope of the KITTI Vision Benchmark Suite. In this
    context, we will work on color images obtained with the "left camera" throughout
    this post.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: 'The first of the subheadings we will examine within the scope of this post
    is the analysis of images obtained with the "left camera". The next topic will
    be the 2D image-based object detectors. While these object detectors have a long
    history and different types like two-stage detectors, single-stage detectors,
    or Vision-Language Models, we will be analyzing the most popular two techniques:
    YoloWorld [2], which is an open vocabulary object detector and YoloV8[3], which
    is a single-stage object detector. In this context, before comparing these object
    detectors, I will be giving applied examples of how to fine-tune YoloV8 for the
    KITTI Object detection problem. Afterward, we will compare the models, and yes,
    we will complete this post by talking about the slice-aided object detection framework,
    SAHI [4], to solve the problem of detecting small-sized objects that we will see
    in the future.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: So let’s start with the data analysis part!
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: 2D Colored Image Dataset Analysis of KITTI
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The KITTI 3D Object Detection dataset includes 7481 training and 7581 testing
    images. And, each training image has a label file that includes the object coordinates
    in the image plane. These label files are presented in ".txt" format and are organized
    line-based. And, each row represents the labeled objects in the relevant image.
    In this context, each row consists of a total of 16 columns (If you are interested
    in these columns, I highly recommend you take a look at the previous article in
    this series). But to put it roughly here, the first column indicates the type
    of the relevant object, and the values between the 5th and 8th columns indicate
    the location of that object in the image coordinate system. Let me share a sample
    image and its label file as follows.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '![A sample 2D colored image (Image taken from KITTI)](../Images/67478f5775fb9b89bd9d514d165f3dda.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
- en: A sample 2D colored image (Image taken from KITTI)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '![The corresponding label file of above image (Label file taken fom KITTI)](../Images/03308149887f4cb1aae2264b8dbff06e.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
- en: The corresponding label file of above image (Label file taken fom KITTI)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: As we can see a lot of cars and three pedestrians are identified in the image.
    Before getting into the deeper analysis, let me share the object types in KITTI.
    KITTI has 9 different classes in label files. These are, "Car", "Truck", "Van",
    "Tram", "Pedestrian", "Cyclist", "Person_sitting", "Misc", and "DontCare".
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: While some object types are obvious, "Misc" and "Don’t Care" may seem a little
    bit confusing. Meanwhile, "Misc" stands for objects that do not fit into the main
    categories above (Car, pedestrian, cyclist, etc.). They could be traffic cones,
    small objects, unknown vehicles, or objects that resemble objects but cannot be
    clearly classified. On the other hand, "DontCare" refers to regions that we should
    not take into consideration.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: After getting informed about the classes, let’s try to visualize the distribution
    of the main classes.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '![The distribution of main classes in KITTI colored images](../Images/75ced7511c58c99bdb400f11e989f7dd.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
- en: The distribution of main classes in KITTI colored images
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: As can be seen from the distribution graph, there is an unbalanced distribution
    in terms of the number of examples contained in the classes. For example, while
    the number of examples in the "Car" class is much higher than the average number
    of examples in the classes, the situation is exactly the opposite for the "Person_sitting"
    class.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: 'Here I would like to open a parenthesis about these numbers, especially from
    a statistical learning perspective. Such unbalanced distributions among classes
    may cause statistical learning methods to underperform or be biased toward some
    classes. I would like to leave some important keywords that should come to mind
    in such a situation for readers who want to deal with this subject: sub-sampling,
    regularization, bias-variance problem, weighted or focal loss, etc. (If you would
    like a post from me about these concepts, please leave it in the comments.)'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我想对这些数字开一个括号，特别是从统计学习角度来看。这种类别之间的不平衡分布可能会导致统计学习方法表现不佳或偏向某些类别。我想为那些想要处理这个主题的读者留下一些应该想到的重要关键词：子采样、正则化、偏差-方差问题、加权或焦点损失等。（如果您想让我写一篇关于这些概念的文章，请在评论中留言。）
- en: Another topic we will investigate in the analysis section will be related to
    the size of the objects. By size here, I mean the dimensions of the relevant objects
    in pixels in the image coordinate system. This issue may be overlooked at first,
    or it may not be understood what kind of positive return measuring this may have.
    However, the average bounding box size of a certain object type may be inherently
    much smaller than the box size of other object classes. In this case, we either
    cannot detect that object type (which happens most of the time) or we can classify
    it as a different object type (rarely). Then let’s analyze the size distribution
    of each class as follows.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在分析部分，我们将探讨的另一个主题将与对象的大小有关。在这里，我指的是图像坐标系中相关对象的像素尺寸。这个问题可能一开始会被忽视，或者可能不理解这种测量可能带来的积极回报。然而，某种对象类型的平均边界框大小可能天生比其他对象类别的框大小小得多。在这种情况下，我们可能无法检测到该对象类型（这种情况大多数时候都会发生）或者我们可以将其分类为不同的对象类型（很少见）。然后让我们按如下方式分析每个类别的尺寸分布。
- en: '![The bounding box size of each class in KITTI dataset](../Images/7acf76e67a6c0f3e86c07ff4fdf8aa90.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![KITTI数据集中每个类别的边界框大小](../Images/7acf76e67a6c0f3e86c07ff4fdf8aa90.png)'
- en: The bounding box size of each class in KITTI dataset
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: KITTI数据集中每个类别的边界框大小
- en: If we keep the "Misc" and "DontCare" object types separate, there is a marginal
    difference between the bounding box sizes of the "Pedestrian", "Person_sitting"
    and "Cyclist" types and the sizes of the other object types. This gives us a red
    flag that we may need to make a special effort when identifying these classes.
    In this context, I will give you some tips in the following sections by opening
    a special subheading on slicing-aided object detection!
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将“Misc”和“DontCare”对象类型分开，则在“行人”、“Person_sitting”和“Cyclist”类型的边界框大小与其他对象类型的大小之间只有微小的差异。这给我们一个红旗，表明我们在识别这些类别时可能需要特别努力。在这种情况下，我将在以下部分通过开设一个关于切片辅助目标检测的特殊子标题来给你一些提示！
- en: 2D Image-based Object Detector
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于二维图像的目标检测器
- en: 2D image-based object detectors are computer vision models designed to identify
    and locate objects within images. These models can be broadly categorized into
    two-stage and single-stage detectors. In **two-stage detectors**, the model first
    generates potential object proposals through a region proposal network (RPN) or
    similar mechanisms. Then, in the second stage, these proposals are refined and
    classified into specific object categories. A popular example of this type is
    **Faster R-CNN** [5]. This approach is known for its high accuracy as it performs
    a detailed evaluation of potential objects, but it tends to be slower due to the
    two-step process, which can be a limitation for real-time applications.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 基于二维图像的目标检测器是计算机视觉模型，旨在识别和定位图像中的对象。这些模型可以广泛分为两阶段和单阶段检测器。在**两阶段检测器**中，模型首先通过区域提议网络（RPN）或类似机制生成潜在对象提议。然后，在第二阶段，这些提议被细化并分类到特定的对象类别。这种类型的流行例子是**Faster
    R-CNN** [5]。这种方法因其对潜在对象的详细评估而以其高精度而闻名，但由于两步过程，它往往较慢，这可能对实时应用构成限制。
- en: '![The system architecure of Faster RCNN (Image taken from [5])](../Images/ede173911bbe77fa9e1c7a314dfcea27.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![Faster RCNN的系统架构（图片来自[5]）](../Images/ede173911bbe77fa9e1c7a314dfcea27.png)'
- en: The system architecure of Faster RCNN (Image taken from [5])
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: Faster RCNN的系统架构（图片来自[5]）
- en: In contrast, **single-stage detectors** aim to detect objects in a single pass
    by directly predicting both object locations and classifications for all potential
    bounding boxes. This approach is faster and more efficient, making it ideal for
    real-time detection applications. Examples include **YOLO (You Only Look Once)**[3]
    and **SSD (Single Shot Multibox Detector)**[6]. These models divide the image
    into a grid and predict bounding boxes and class probabilities for each grid cell,
    resulting in a more streamlined and faster detection process. Although single-stage
    detectors may trade off some accuracy for speed, they are widely used in applications
    requiring real-time performance, such as autonomous driving and video surveillance.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '![The system architecure of YoloV8 (Image taken from [3])](../Images/49df84e64e41fda4f355e5a9059814b6.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
- en: The system architecure of YoloV8 (Image taken from [3])
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: After the introductory information is given let’s dive into to object detectors
    that are applied to our problem; the first one is YoloWorld[2] and the second
    one is YoloV8 [3]. Here you may wonder why we are analyzing two different Yolo
    models. The main point here is that YoloV8 is a single-stage detector, while YoloWorld
    is a special type of detector that has been studied a lot in recent years with
    an open keyword, that is, no close set classification model. And it means that,
    in theory, these models, which are Open Vocabulary Detection-based ones, are capable
    of detecting any kind of object!
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: YoloWorld
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: YoloWorld is one of the promising studies in the open-vocabulary object detection
    era. But what exactly is open-vocabulary object detection?
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: To understand the concept of the open-vocabulary, let’s take a step back and
    understand the core idea behind traditional object detectors. Sample and simple
    cornerstones of training a model can be presented as follows.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '![A training pipeline of the training model](../Images/67a5e9a344c3a344c291ea18234bc3d9.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
- en: A training pipeline of the training model
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: In traditional machine learning, a model is trained on *n* different classes,
    and its performance is evaluated only on those *n* classes. For example, let’s
    consider a class that wasn’t included during training, such as "Bird." If we give
    an image of a bird to the trained model, it will not be able to detect the "Bird"
    in the image. Since the "Bird" is not part of the training dataset, the model
    cannot recognize it as a new class or generalize to understand that it’s something
    outside its training. In short, traditional models cannot identify or handle classes
    they haven’t seen during training.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, open-vocabulary object detection overcomes this limitation
    by enabling models to detect objects beyond the classes they were explicitly trained
    on. This is achieved by leveraging visual-text representations, where models are
    trained with paired image-text data, such as "a photo of a cat" or "a person riding
    a bicycle." Instead of relying solely on fixed class labels, these models learn
    a more general understanding of objects through their semantic descriptions.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: As a result, when presented with a new object class, like "Bird," the model
    can recognize and classify it by associating the visual features of the object
    with the textual descriptions, even if the class was not part of its training
    data. This capability is particularly useful in real-world applications where
    the variety of objects is vast, and it’s impractical to train models on every
    possible category.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: So how does this mechanism work? In fact, the real magic here is the use of
    visual and textual information together. So let’s first see the system architecture
    of YoloWorld and then analyze the core components one by one.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '![The system architecture of YoloWorld (Image taken from YoloWorld [2])](../Images/a2961c95c55336f679c4af821100c3f4.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
- en: The system architecture of YoloWorld (Image taken from YoloWorld [2])
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: We can analyze the model from general to specific as follows. YoloWorld takes
    Image *{I}* and the corresponding texts *{T}* as input then outputs predicted
    Bounding Boxes *{Bk}* and Object Embeddings *{ek}*.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '*{T}* is fed into to pre-trained CLIP [7] model to be converted into vocabulary
    embeddings. On the other hand, YOLO Backbone, which is a visual information encoder,
    takes *{I}* and extracts multi-scale image features. Right now, two different
    input types have their own modality-specific embeddings, processed by different
    encoders. However, "Vision-Language PAN" takes both embeddings and creates a kind
    of multimodality embeddings using a cross-modality fusion approach.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '![Visual-Language PAN layer in YoloWorld [2]](../Images/1bf9ccc941e0ff3c029e6f8e8357447f.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
- en: Visual-Language PAN layer in YoloWorld [2]
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go over this layer step-by-step. First {Cx} are the multi-scale visual
    features. On the top, we have textual embeddings *{Tc}.* Each visual feature follows
    the *Cx* ∈ H×W×D dimension and each textual feature follows the *Tc* ∈ CXD dimension.
    Then multiplication of each component (after reshaping of visual features), there
    will be an attention score vector, which is formed 1XC.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '![The formula of text-to-image feature fusion in T-CSPLayer](../Images/fe1d1846d5563e28b6f8f9b0c7eb2001.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
- en: The formula of text-to-image feature fusion in T-CSPLayer
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Then by normalizing the maximum attention vector and multiplying the visual
    vector and fusion-based attention vector, we calculate the new form of visual
    vector.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Then these newly formed visual features are fed into the "I-Pooling Attention"
    layer, which employs the 3×3 max kernels to extract 27 patches. The output of
    these patches is given to the Multi-Head_Attention mechanism, which is similar
    to the Transformer arch., to update Image-aware textual embeddings as follows.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '![The formula of I-Pooling Attention layer](../Images/6ee08822a1c859279e9ff2b768701166.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
- en: The formula of I-Pooling Attention layer
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: After these processes, the outputs are formed by two regression heads. The first
    one is the "Text Contrastive Head" and the other one is the "Bounding Box Head".
    The overall system loss function, to train the model, can be presented as follows.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '![The loss function of YoloWorld](../Images/65700bbd76657f2cf7b3a77889e31586.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
- en: The loss function of YoloWorld
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: Then, now let’s get into the applied section to see the results WITHOUT doing
    any fine-tuning. After all, we expect this model to make correct determinations
    even if it is not trained specifically with our KITTI classes, right 😎
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: As we did in our previous blog post, you can find the complete files, codes,
    etc. by following the GitHub link, which I provide at the bottom.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: The first step is model initialization, and defining our classes, which are
    interested in the KITTI problem.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The next step is loading a sample image and its G.T. box visualization.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: '![A sample image from KITTI dataset](../Images/b3167272049bdda1df8af3aec74e5dbc.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
- en: A sample image from KITTI dataset
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: The G.T. bounding boxes for our sample are as follows. More specifically, the
    G.T. label includes, 9 cars and 3 pedestrians! (such a complex scene)
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '![The G.T. Bounding Boxes of the sample image](../Images/ed25459a019239e60850a3fbda806339.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
- en: The G.T. Bounding Boxes of the sample image
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: Before getting into the YoloWorld prediction, let me reiterate that we did not
    make any fine-tuning to the YoloWorld model, we took the model as is. The prediction
    with it can be done as follows.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The output of the prediction is as follows.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '![The prediction of off-the-shelf YoloWorld model for the sample image](../Images/abceb6dd7e8eba6cbbf72d30c8a6b0d4.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
- en: The prediction of off-the-shelf YoloWorld model for the sample image
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Regarding the prediction, we can see that there are 6 cars class and 1 van class
    found. The evaluation of the output can be done as follows.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![The evaluation metric score for the prediction with the YoloWorld model](../Images/a97477b7759716964638318ed2c300d4.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
- en: The evaluation metric score for the prediction with the YoloWorld model
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: Now as we can, 1 object is identified but misclassified (the actual class is
    "Car" but classified as "Van"). Then in total, 6 boxes couldn’t be found. Then
    it makes our recall score 0.5 and precision score ~0.86.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Let me share some other predicted figures with you as examples.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '![Some other examples for YoloWorld model](../Images/99347260d2b8c7c3cf4230bb1f4d67ce.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
- en: Some other examples for YoloWorld model
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: While the first row refers to the predicted samples, the second one represents
    the G.T. boxes and classes. On the left side, we can see a pedestrian who walks
    from left to right. Fortunately, YoloWorld predicted the object perfectly in terms
    of bounding box dimensions, but the class is predicted as "Pedestrian_sitting"
    while the G.T. label is "Pedestrian". This is why precision and recall are both
    0.0 :/
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: On the right side, YoloWorld predicts 2 "Cars" while G.T. has only 1 "Car".
    For this reason, the precision score is 0.5 and the recall score is 1.0
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: So for now, we have seen a couple of Yolo predictions, and the model can be
    somehow acceptable as an initial step, can’t it?
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: We have to admit that an improvement is definitely needed for the model with
    such a critical application area. However, it should not be forgotten that we
    were able to achieve some adequate results even without fine-tuning here!
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: And then that requirement leads us to our next step, which is the traditional
    model, the YoloV8, and the fine-tuning of it. Let’s go!
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: YoloV8
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: YOLOv8 (You Only Look Once version 8) is the one of most advanced versions in
    the YOLO family of object detection models, designed to push the boundaries of
    speed, accuracy, and flexibility in computer vision tasks. Building on the success
    of its predecessors, YOLOv8 integrates innovative features such as anchor-free
    detection mechanisms and decoupled detection heads to streamline the object detection
    pipeline. These enhancements reduce computational overhead while improving the
    detection of objects across varying scales and complex scenarios. Moreover, YOLOv8
    introduces dynamic task adaptability, allowing it to perform not just object detection
    but also image segmentation and classification seamlessly. This versatility makes
    it a go-to solution for diverse real-world applications, from autonomous vehicles
    and surveillance to medical imaging and retail analytics.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: What sets YOLOv8 apart is its focus on modern deep learning trends, such as
    optimized training pipelines, state-of-the-art loss functions, and model scaling
    strategies. The inclusion of anchor-free detection eliminates the need for predefined
    anchor boxes, making the model more robust to varying object shapes and reducing
    the chances of false negatives. The decoupled head design separately optimizes
    classification and regression tasks, improving overall detection accuracy. In
    addition, YOLOv8’s lightweight architecture ensures faster inference times without
    compromising on performance, making it suitable for deployment on edge devices.
    Overall, YOLOv8 continues the YOLO legacy by providing a highly efficient and
    accurate solution for a wide range of computer vision tasks.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: 'For more in-depth analysis and implementation details, refer to:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: 'Yolov8 Medium post: [https://docs.ultralytics.com/](https://abintimilsina.medium.com/yolov8-architecture-explained-a5e90a560ce5)'
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'An exploration article: [https://arxiv.org/pdf/2408.15857](https://arxiv.org/pdf/2408.15857)'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: But before getting into the next step, where we’re going to fine-tune the Yolo
    model for our problem, let’s visualize the output of the off-the-shelf YoloV8
    model on our sample image. (Of course, the off-the-shelf model doesn’t cover all
    the classes of our problem, but at least it can detect the cars and pedestrians
    that we need for our sample image)
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![The predicted output of the off-the-shelf YoloV8-m model](../Images/25a5525396f58c390f4ba487f4fc00f9.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
- en: The predicted output of the off-the-shelf YoloV8-m model
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: The off-the-shelf model predicts 8 cars, which is almost okay! Only 1 car and
    1 pedestrian are missing, but that is also okay for now.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: Then let’s try to fine-tune that off-the-shelf model to adapt it to our problem.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: YoloV8 Fine-Tuning
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, we will fine-tune the off-the-shelf YoloV8-m model to fit our
    problem well. But before that, we need to adjust the proper label files. I know
    it’s not the funniest part, but it’s a mandatory thing to do before seeing the
    progress bar in the fine-tuning stage. To make it available, I prepared the following
    function, which is available in my Github repo like all other components.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: A sample label file after this operation will look as follows.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: '![A Yolo oriented label file for the sample image](../Images/c179c9029e1b5a4a5324dc71af362795.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
- en: A Yolo oriented label file for the sample image
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: The first shows the class id, and the following 4 shows the coordinates. And
    after, we need to create a ".ymal" file that shows the location of the label files,
    the split of training and validation sets, and the corresponding images. The same
    thing, I prepared the required function too.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]python'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: create_data_yaml(
  id: totrans-108
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: images_path='/path/to/images',
  id: totrans-109
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: labels_path='/path/to/labels',
  id: totrans-110
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: base_path='/output/dataset',
  id: totrans-111
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: train_ratio=0.8
  id: totrans-112
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: )
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '"""'
  id: totrans-114
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'def train_yolo_world(data_yaml_path, epochs=100):'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  id: totrans-117
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Trains a YOLOv8 model on a custom dataset.
  id: totrans-118
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: This function leverages the YOLOv8 framework to fine-tune a pretrained model
    using a specified dataset
  id: totrans-119
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: and training configuration.
  id: totrans-120
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Key Parameters:'
  id: totrans-121
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '- `data_yaml_path` (str): Path to the YAML file containing dataset configuration
    (e.g., paths to train/val splits, class names).'
  id: totrans-122
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '- `epochs` (int, optional): Number of training epochs (default is 100).'
  id: totrans-123
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Processing Details:'
  id: totrans-124
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '1\. **Model Initialization**:'
  id: totrans-125
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '- Loads the YOLOv8 medium-sized model (`yolov8m.pt`) as a base model for training.'
  id: totrans-126
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '2\. **Training Configuration**:'
  id: totrans-127
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '- Defines training hyperparameters including image size, batch size, device,
    number of workers, and early stopping (`patience`).'
  id: totrans-128
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '- Results are saved to a project directory (`yolo_runs`) with a specific run
    name (`fine_tuning`).'
  id: totrans-129
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '3\. **Training Execution**:'
  id: totrans-130
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '- Initiates the training process and tracks metrics such as loss and mAP.'
  id: totrans-131
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Returns:'
  id: totrans-132
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '- `results`: Training results, including metrics for evaluation and performance
    tracking.'
  id: totrans-133
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Notes:'
  id: totrans-134
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '- Assumes that the YOLOv8 framework is properly installed and accessible via
    `YOLO`.'
  id: totrans-135
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '- The dataset YAML file must include paths to the training and validation datasets,
    as well as class names.'
  id: totrans-136
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Dependencies:'
  id: totrans-137
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '- Requires the `YOLO` class from the YOLOv8 framework.'
  id: totrans-138
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Usage Example:'
  id: totrans-139
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-140
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'In that stage, I used to default fine-tuning parameters, which are defined
    here: [https://docs.ultralytics.com/models/yolov8/#can-i-benchmark-yolov8-models-for-performance](https://docs.ultralytics.com/models/yolov8/#can-i-benchmark-yolov8-models-for-performance)'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: But I **HIGHLY** encourage you to try other hyper-parameters like learning rate,
    optimizer, etc. Since those parameters directly affect the output performance
    of the model, they are so crucial.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: Anyway, let’s try to keep it simple for now, and jump into the output performance
    of our fine-tuned model for KITTI’s main classes.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: '![The output performance of the fine-tuned YoloV8-m model on validation set](../Images/02e4ee6498fda6922b0be0df07b5c37e.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
- en: The output performance of the fine-tuned YoloV8-m model on validation set
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, the overall mAP50 is 0.835, which is good for the first shoot.
    But the "Person_sitting" and "Pedestrian" classes, which are important ones in
    autonomous driving do not hit, show 0.61 and 0.75 mAP50 scores. There could be
    some reasons behind it; their bounding box dimensions are relatively smaller than
    the others and the other reason could be the number of samples of these classes.
    Of course, there are some others like "Cyclist" and "Tram" that have a couple
    of images too, but yeah it’s kind of a black box. If you want me to investigate
    this behavior in deep, please indicate it in the comments. It would be a pleasure
    for me!
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: As we did in the previous sections let me share the result of the sample image
    again for the fine-tuned model here.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: '![The output of the fine-tuned model on the sample image](../Images/3925e291ff795c401532eed7cfdaaf9a.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
- en: The output of the fine-tuned model on the sample image
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: Now, the fine-tuned model detected 2 pedestrians, 1 cyclist, 9 cars! It’s almost
    done for that sample image. Cause this detection means that;
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: '![The evaluation metric score for the prediction with the fine-tuned model](../Images/daec924a7e02322ce32308ffdab4de65.png)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
- en: The evaluation metric score for the prediction with the fine-tuned model
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: It’s much better than the off-the-shelf model (even if we haven’t done too much
    hyper-parameter searching!). Then let me share another image with you.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: '![Another sample image (raw version, Image taken from KITTI [1])](../Images/d13495b2857ca804d9552ae829540a00.png)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
- en: Another sample image (raw version, Image taken from KITTI [1])
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: Now, in that scene, there is a car on the left side. But wait! There are some
    others around there, but they are too small to see.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: Let’s check our fancy fine-tuned model output!
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: '![The output of the fine-tuned model on the second sample image](../Images/f8402e89a8e9ca31e3e6f541b60048d4.png)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
- en: The output of the fine-tuned model on the second sample image
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: 'OMG! It only detects the car and a cyclist who is right behind it. How about
    the others who are staying right of the cyclist? Yeah, now this situation takes
    us to our next and final topic: detecting small-sized objects in the 2D image.
    Let’s go.'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: Dealing with Small-sized Objects
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: KITTI images have 1342 pixels on the width and 375 pixels on the height side.
    Then applying them a resizing operation just before feeding to the model, makes
    them 640 by 640\. Let me show you a visual that is right before feeding to the
    model as follows.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: '![The left one is the original raw image, the right one is the resized version
    of it (Images are taken from KITTI [1])](../Images/dcdf2226536238e3df6d3a2a3c557264.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
- en: The left one is the original raw image, the right one is the resized version
    of it (Images are taken from KITTI [1])
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: We can see that some objects are severely distorted. In addition, we can observe
    that some objects farther from the camera become even smaller. There is a method
    that we can use to overcome the problems experienced in both these types of situations
    and in detecting objects in very high-resolution images. And its name is "SAHI"
    [4], Slicing Aided Hyper Inference. Its core concept is so clear; it divides images
    into smaller, manageable slices, performs object detection on each slice, and
    merges the results seamlessly.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: However, running the object detection model repeatedly on multiple slices and
    combining the results would, as can be expected, require significant computational
    power and time. However, SAHI is able to overcome this with its optimizations
    and memory usage! In addition, its compatibility with many different object detectors
    makes it suitable for practical work.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some links to understand SAHI in depth and observe its performance
    enhancements for different problems:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: '— SAHI Paper: [https://arxiv.org/pdf/2202.06934](https://arxiv.org/pdf/2202.06934)'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: '— SAHI GitHub: [https://github.com/obss/sahi](https://github.com/obss/sahi)'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: 'Then let’s visualize our second sample image with SAHI-based inference:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: '![The output of the fine-tuned model with SAHI on another sample image](../Images/a1adbf4aba2b3c59ea80b16f6160048d.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
- en: The output of the fine-tuned model with SAHI on another sample image
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: Wow! We can see that several cars and a cyclist are found perfectly! If you
    also face the same kind of problem like this, please check the paper and the implementation!
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Well, now we have finally come to the end. During this process, we first tried
    to solve Lidar-based obstacle detection with an unsupervised learning algorithm
    in our first article. In this article, we used different object detection algorithms.
    Among these, the "open-vocabulary" based YoloWorld, or the more traditional "close-set"
    object detection model YoloV8, and the "fine-tuned" version of YoloV8, which is
    more suitable for the KITTI problem. In addition, we obtained some results with
    the help of "SAHI" regarding the detection of small-sized objects.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: Of course, each topic we mentioned is an active research area. And many researchers
    are still trying to achieve more successful results in these areas. Here, we tried
    to produce solutions from the perspective of the applied scientist.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: However, if there is a topic you want me to talk about more or if you want a
    completely different article about some parts, please indicate this in the comments.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: What’s next?
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Then, for now, let’s meet in the next publication, which will be the last article
    of the series, where we will detect obstacles with both Lidar and color images
    using both sensors at the same time.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: '**Any comments, error fixes, or improvements are welcome!**'
  id: totrans-180
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-181
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***Thank you all and I wish you healthy days.***'
  id: totrans-182
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
