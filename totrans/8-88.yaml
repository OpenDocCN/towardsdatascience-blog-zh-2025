  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: 'For the **road benchmark**, please cite: @inproceedings{[Fritsch2013ITSC](https://www.cvlibs.net/publications/Fritsch2013ITSC.pdf),
    author = {Jannik Fritsch and Tobias Kuehnl and [Andreas Geiger](https://www.cvlibs.net/)},
    title = {A New Performance Measure and Evaluation Benchmark for Road Detection
    Algorithms}, booktitle = {International Conference on Intelligent Transportation
    Systems (ITSC)}, year = {2013} }'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
