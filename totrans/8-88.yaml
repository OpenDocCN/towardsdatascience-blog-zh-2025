- en: Disclaimer
  id: totrans-193
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The images used in this blog series are taken from the KITTI dataset for education
    and research purposes. If you want to use it for similar purposes, you must go
    to the relevant website, approve the intended use there, and use the citations
    defined by the benchmark creators as follows.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: 'For the **stereo 2012**, **flow 2012**, **odometry**, **object detection,**
    or **tracking benchmarks**, please cite: @inproceedings{[Geiger2012CVPR](https://www.cvlibs.net/publications/Geiger2012CVPR.pdf),
    author = {[Andreas Geiger](https://www.cvlibs.net/) and [Philip Lenz](http://www.mrt.kit.edu/mitarbeiter_lenz.php)
    and [Raquel Urtasun](http://ttic.uchicago.edu/~rurtasun)}, title = {Are we ready
    for Autonomous Driving? The KITTI Vision Benchmark Suite}, booktitle = {Conference
    on Computer Vision and Pattern Recognition (CVPR)}, year = {2012} }'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: 'For the **raw dataset**, please cite: @article{[Geiger2013IJRR](https://www.cvlibs.net/publications/Geiger2013IJRR.pdf),
    author = {[Andreas Geiger](https://www.cvlibs.net/) and [Philip Lenz](http://www.mrt.kit.edu/mitarbeiter_lenz.php)
    and [Christoph Stiller](http://www.mrt.kit.edu/mitarbeiter_stiller.php) and [Raquel
