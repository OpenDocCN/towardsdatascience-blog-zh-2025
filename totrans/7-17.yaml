- en: Human Minds and Machine Learning Models
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人类思维与机器学习模型
- en: 原文：[https://towardsdatascience.com/human-minds-vs-machine-learning-models-c66c809194b4/](https://towardsdatascience.com/human-minds-vs-machine-learning-models-c66c809194b4/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/human-minds-vs-machine-learning-models-c66c809194b4/](https://towardsdatascience.com/human-minds-vs-machine-learning-models-c66c809194b4/)
- en: '*Disclaimers:*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*免责声明：*'
- en: This blog post was co-authored with my friend, **[Dee Penco](None)**, a certified
    therapist and counsellor.
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这篇博客文章是由我的朋友，**[Dee Penco](None)**共同撰写的，她是一位认证的治疗师和顾问。
- en: For the past 2.5+ years, Dee and I have spent hours and hours discussing and
    reasoning human behaviours, which has sparked my passion for psychology. With
    time, we cross-shared ideas about psychology and ML/AI modelling concepts.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在过去的2.5+年里，我和Dee花费了大量的时间和精力讨论和推理人类行为，这激发了我对心理学的热情。随着时间的推移，我们在心理学和ML/AI建模概念上相互交流了想法。
- en: 'While I found parallels between these fields, I asked Dee if she could explain
    how humans function and make decisions. Being intrigued by the rise of [artificial
    general intelligence (AGI](https://en.wikipedia.org/wiki/Artificial_general_intelligence)),
    my question was: *Do humans follow the same steps in generating outputs as machine
    learning does, and how feasible is it to mimic human-like decision-making?*'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然我发现这两个领域之间存在相似之处，但我问Dee她能否解释人类是如何运作和做出决定的。我对通用人工智能（AGI）的兴起感到好奇，我的问题是：*人类在生成输出时是否遵循与机器学习相同的步骤，模仿类似人类的决策是否可行？*
- en: To my great joy, Dee decided to write this post with me, to share a dual perspective
    on how humans vs. ML models create outputs.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让我非常高兴的是，Dee决定和我一起写这篇帖子，分享人类与ML模型创建输出的双重视角。
- en: In the text below, we sometimes interchange AI and ML as terms, but we understand
    they are not the same, and that ML is a subset of AI.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在下面的文本中，我们有时将AI和ML作为术语互换使用，但我们理解它们并不相同，并且ML是AI的一个子集。
- en: '![_"If your mind is a swirling galaxy of influences, an ML model is more like
    a solar system with defined orbits. Both revolve and evolve, just at different
    scales of complexity."_ [Photo by Growtika on Unsplash]](../Images/f6a9b50a2038c22e1e8e02c45f3b2aa1.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![_"如果你的思维是一个充满影响的旋转星系，一个机器学习模型更像是一个有明确轨道的太阳系。两者都在旋转和进化，只是在复杂性的不同尺度上。"_[照片由Growtika在Unsplash提供]](../Images/f6a9b50a2038c22e1e8e02c45f3b2aa1.png)'
- en: '**_"*If your mind is a swirling galaxy of influences, an ML model is more like
    a solar system with defined orbits. Both revolve and evolve, just at different
    scales of complexity.*"_** [Photo by [Growtika](https://unsplash.com/@growtika?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)]'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**_"如果你的思维是一个充满影响的旋转星系，一个机器学习模型更像是一个有明确轨道的太阳系。两者都在旋转和进化，只是在复杂性的不同尺度上。"_[照片由[Growtika](https://unsplash.com/@growtika?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)提供]]**'
- en: '* * *'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The year 2024 was big in recognizing machine learning and artificial intelligence
    contributions.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 2024年是认可机器学习和人工智能贡献的重要年份。
- en: '[The Nobel Prize in Chemistry](https://www.nobelprize.org/prizes/chemistry/2024/press-release/)
    was awarded for advancements in protein science: [David Baker](https://en.wikipedia.org/wiki/David_Baker_(biochemist))
    for creating new kinds of proteins, alongside [Demis Hassabis](https://en.wikipedia.org/wiki/Demis_Hassabis)
    and [John Jumper](https://en.wikipedia.org/wiki/John_M._Jumper) for developing
    an AI model that solved a 50-year-old challenge of predicting proteins’ complex
    structures.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[诺贝尔化学奖](https://www.nobelprize.org/prizes/chemistry/2024/press-release/)授予了蛋白质科学领域的进步：[大卫·贝克](https://en.wikipedia.org/wiki/David_Baker_(biochemist))因创造新型蛋白质，以及[戴米斯·哈萨比斯](https://en.wikipedia.org/wiki/Demis_Hassabis)和[约翰·朱帕](https://en.wikipedia.org/wiki/John_M._Jumper)因开发一个解决50年预测蛋白质复杂结构的挑战的人工智能模型。'
- en: Furthermore, [John Hopfield and Geoffrey Hinton](https://www.nobelprize.org/prizes/physics/2024/press-release/)
    were awarded t[he Nobel](https://en.wikipedia.org/wiki/John_Hopfield) [Prize in
    Physics](https://en.wikipedia.org/wiki/Geoffrey_Hinton) for their work on artificial
    neural networks, brainlike models capable of recognizing patterns and producing
    outcomes that resemble human decision-making processes.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，[约翰·霍普菲尔德和杰弗里·辛顿](https://www.nobelprize.org/prizes/physics/2024/press-release/)因他们在人工神经网络、类似大脑的模型上的工作而获得了诺贝尔物理学奖，这些模型能够识别模式并产生类似于人类决策过程的结果。
- en: Although artificial intelligence increasingly and more accurately models human
    problem-solving and decision-making, the mechanisms behind human cognition still
    need to be fully understood.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管人工智能越来越精确地模拟人类的问题解决和决策过程，但人类认知背后的机制仍需要完全理解。
- en: The psychology of human (re-)action involves complex interconnected dimensions,
    shaped by layers of conscious and subconscious factors.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 人类（再）反应的心理涉及复杂相互关联的维度，由意识和潜意识因素的多层塑造。
- en: '*— So, what sets human and ML/AI models apart in generating outputs?*'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '*— 那么，是什么让人类和ML/AI模型在生成输出时有所不同？*'
- en: To address this question, let’s explore these **two worlds** – psychology and
    machine learning – and uncover the connections that shape how humans and **human-created**
    AI models produce outputs.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答这个问题，让我们探索这两个世界——心理学和机器学习——并揭示塑造人类和**人类创造的**AI模型产生输出的联系。
- en: '***The aims of this post are**:*'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**本文的目的是**：'
- en: '**Bring** high-level professional psychology explanations closer to technical
    readers on what affects human decision-making.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将**高级专业心理学解释更接近技术读者，探讨影响人类决策的因素。'
- en: '**Showcase** the high-level machine learning (ML) modelling process and explain
    how ML models generate outputs to non-technical professionals.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**展示**高级机器学习（ML）建模过程，并解释ML模型如何向非技术专业人士生成输出。'
- en: '**Identify** the differences and similarities between the two processes—the
    human and the machine—that produce outputs.'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**识别**产生输出的两个过程——人类和机器——之间的差异和相似之处。'
- en: '* * *'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Psychology aspect: How do humans generate outputs? | By Dee'
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 心理学方面：人类如何生成输出？ | By Dee
- en: Before I **start writing this section**, I want to emphasize that every psychologist
    worldwide would be thrilled if there were a way for people to function more simply
    – **or at least** as simple as AI or ML models.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在我开始**撰写这一部分**之前，我想强调，如果有一种方法可以让人们更简单地运作——**或者至少**像AI或ML模型一样简单，那么全世界每一位心理学家都会感到兴奋。
- en: Experts in AI and ML are probably appalled by what I just said because I implied
    that **"AI and ML are simple."**
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: AI和ML的专家可能对我的说法感到震惊，因为我暗示了“**AI和ML很简单**”。
- en: '*— But that wasn’t my intention.*'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '*— 但那并不是我的意图。*'
- en: '**I only mean to emphasize how much simpler these models are compared to the
    complexities of humans**.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**我只想强调这些模型与人类复杂性相比有多简单**。'
- en: 'When Marina was explaining, at a high level, how machine learning modelling
    works – I couldn’t help but think:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 当Marina在较高层次上解释机器学习建模的工作原理时，我忍不住想：
- en: If we could "reduce" humans to this "**straightforward"** **methodology**, we
    would cure most psychological problems, transform lives for the better, **and
    dramatically improve overall population wellbeing.**
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果我们能够将人类简化为这种“**简单**”的**方法**，我们将治愈大多数心理问题，改善生活，**并显著提高整体人口福祉**。
- en: Imagine if a person could receive **input(s)**, pass them to some internal algorithms
    that could determine the *weight*, *importance*, and *quality* of that input,
    make the most likely prediction, and, based on that, produce a **controlled**
    **output** – *thought*, *emotion*, or *behaviour*.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，如果一个人能够接收**输入（s**），将它们传递给一些内部算法，这些算法能够确定输入的**权重**、**重要性**和**质量**，做出最可能的预测，并根据这个预测产生一个**控制**的**输出**——**思想**、**情感**或**行为**。
- en: '**But unlike ML or AI, the human mind processes information in far more complex
    ways, influenced by numerous interconnected factors.**'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**但与ML或AI不同，人类大脑以更加复杂的方式处理信息，受到众多相互关联因素的影响**。'
- en: From this point, I’ll stop speculating about what happens within an AI or ML
    model and **explain the "human" modelling flow.**
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个点开始，我将停止对AI或ML模型内部发生的事情进行推测，**解释“人类”建模流程**。
- en: To illustrate the concept, I will discuss several ***factors*** influencing
    humans’ decision-making.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这个概念，我将讨论几个影响人类决策的**因素**。
- en: For this, I invite you to imagine a person as a "**black box pre-trained model".**
    In other words, a model already comes pre-loaded with knowledge patterns, and
    weights learned in the training step.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这个目的，我邀请你想象一个人是一个“**预训练的黑色盒子模型**”。换句话说，一个模型已经预先加载了知识模式，并在训练步骤中学习了权重。
- en: 'These patterns and weights or factors vary from person to person and are known
    as:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模式和权重或因素因人而异，被称为：
- en: (1) *Intelligence and IQ*
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: （1）**智力和智商**
- en: (2) *Emotional world and EQ*
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: （2）**情感世界和情商**
- en: '(3) *Conscious world* – what the "model" has learned so far: values, experiences,
    purpose'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: （3）**意识世界**——模型迄今为止所学习的内容：价值观、经验、目的
- en: (4) *Unconscious and subconscious world –* what the "model" learned and repressed
    so far – short-term/long-term memory + (again) values, experiences, purpose
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: (4) *无意识和潜意识世界 -* 到目前为止“模型”所学习和压抑的内容 - 短期/长期记忆 + (再次)价值观、经验、目的
- en: (5) *Genetic predispositions –* what we’re born with
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: (5) *遗传倾向 -* 我们天生具有的
- en: (6) *Environment –* social, cultural, physical
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: (6) *环境 -* 社会、文化、物理
- en: (7) *Physiological needs –* Maslow’s Hierarchy (Hierarchy of Needs)
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: (7) *生理需求 -* 马斯洛需求层次（需求层次）
- en: (8) *Hormonal + physiological status –* Neurobiology, Endocrine System, Arousal
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: (8) *激素 + 生理状态 -* 神经生物学、内分泌系统、唤醒
- en: (9) Decision-making centres – Id, Ego, Superego that separate entities within
    us
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: (9) 决策中心 - 我们内心的分离实体：本我、自我、超我
- en: (10) *Intuition creativity* – which can be considered part of the above-grouped
    variables or separate entities on their own (Intuition, Divergent Thinking, Flow
    State)
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: (10) *直觉创造力* – 可以被认为是上述分组变量的一部分或它们自己的独立实体（直觉、发散性思维、心流状态）
- en: So far, we have identified 10 factors that vary for each person.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经确定了每个人都会变化的10个因素。
- en: I want to emphasize that they are *all interconnected* and sometimes so "fused"
    together that they can even be *compounded*.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我想强调的是，它们都是*相互关联的*，有时它们甚至可以“融合”在一起，以至于它们甚至可以*复合*。
- en: In addition, each one can be *thicker* or *thinner* and may contain "particles",
    or information that is either *predominant* or *deficient*.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，每一个都可以是*更厚*或*更薄*，并且可能包含“粒子”，或信息，这些信息可能是*占主导地位*或*缺乏*。
- en: For example, the hormonal factors may have a predominant hormone (such as *serotonin*,
    which affects mood; *cortisol* in response to stress; *dopamine*, which is essential
    for excitement, etc.). The intellectual factor can be *higher* or *lower*.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例如，激素因素可能有一个主导的激素（例如*血清素*，它影响情绪；应对压力的*皮质醇*；对于兴奋至关重要的*多巴胺*等）。智力因素可以是*更高*或*更低*。
- en: Now imagine that there is some algorithm inside the person constantly rearranging
    the order of factor importance, so one may sometimes end up in the front, sometimes
    in the middle, and sometimes in the back.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在想象一下，在人的内部有一个算法不断重新排列因素重要性的顺序，所以有时候可能会出现在前面，有时候在中间，有时候在后面。
- en: Let’s take the physiological needs – *hunger* for example. If you place it right
    up front, it will dictate which information reaches the second, third, fourth,
    etc.; ***the* *output will depend on that*.**
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让我们以生理需求 - *饥饿* 为例。如果你把它放在最前面，它将决定哪些信息会达到第二、第三、第四等；**输出将取决于这一点**。**
- en: In other words, **if you make decisions while hungry**, **the output will probably
    not be the same** as when you would **have your stomach full**.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，**如果你在饥饿时做出决定**，**输出可能不会与你有饱腹感时相同**。
- en: '**📌 The factors are ordered by importance, with the most important at the specific
    moment always in the first position, then the second, and so on.**'
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**📌 因素按照重要性排序，在特定时刻最重要的始终位于第一位，然后是第二位，依此类推。**'
- en: What I just described briefly above is how humans operate when they receive
    input information under specific circumstances.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我刚才简要描述的正是人类在特定情况下接收输入信息时的运作方式。
- en: 🙋🏽 ‍♀️ Returning to the intro thought again, did I explain why psychologists
    everywhere long for a more straightforward human experience? Why would we, on
    this side, actually be happy if people were as "complicated" as ML?
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 🙋🏽 ‍♀️ 再次回到开头思考，我解释了为什么全世界的心理学家都渴望一个更简单的人性体验吗？为什么我们这边的人如果像机器学习（ML）一样“复杂”会感到高兴？
- en: Consider only how many psychological problems could be resolved – given that
    psychological factors are fundamental to everything – and how many other issues
    around us would be resolved if only we could "tune" or "reset" our factors as
    easily as in the ML modelling.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 考虑一下，如果心理因素是所有事情的基础，那么可以解决多少心理问题——以及如果我们能够像在机器学习建模中一样轻松地“调整”或“重置”我们的因素，那么我们周围的其他多少问题可以得到解决。
- en: '***— But, what can you do to control your outputs better?***'
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '***— 但，你能做些什么来更好地控制你的输出？***'
- en: Remember the part I mentioned above on the "thickness" of your factors? Well,
    since the thickness of your factors and their order determine your output (the
    emotion you feel, the thought you form, and the reaction to information), it’s
    useful to know that **you can absolutely thicken some of these factors** to your
    advantage and hold them firmly in the first position.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 记住我上面提到的关于你因素“厚度”的部分吗？好吧，既然你因素的厚度和它们的顺序决定了你的输出（你感受到的情绪、你形成的思想，以及你对信息的反应），了解**你可以绝对地增加一些这些因素的厚度**以获得优势，并坚定地将它们放在第一位是有用的。
- en: 'I’ll simplify this again with several examples: *You can probably (and hopefully)
    ensure you’re never hungry. You can work on regulating your hormones. In therapy,
    you can address your fears and work to eliminate them. You can adjust deeply rooted
    beliefs stored in your subconscious, and so on.👉🏼 W**e (You) can indeed do this,
    and it’s a pity more people don’t work on adjusting their factors.***'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我再通过几个例子来简化这一点：*你可能（并且希望）确保自己永远不会感到饥饿。你可以调节你的激素。在治疗中，你可以处理你的恐惧并努力消除它们。你可以调整潜意识中根深蒂固的信念，等等。👉🏼
    我们（你）确实可以做到这一点，更多的人没有努力调整他们的因素真是太遗憾了。***
- en: And, for now, let’s leave it at that.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们就此打住。
- en: Until some form of AI figures out a more efficient way to do this or instead
    of us, we’ll continue to make certain decisions, feel certain emotions, and take
    specific actions as we do now.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 直到某种形式的AI找到更有效的方法来做这件事，或者代替我们，我们仍将继续像现在这样做出某些决定，感受某些情绪，并采取具体行动。
- en: '* * *'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Machine Learning aspect: How do models generate outputs? | By Marina'
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习方面：模型如何生成输出？ | By Marina
- en: When Dee talked about the "**human black box**" with pre-trained patterns, I
    couldn’t help but think about how closely that parallels the **machine learning**
    process. Just as humans have multiple interconnected factors influencing their
    decisions, ML models have their version of this complexity.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当Dee谈到带有预训练模式的“**人类黑箱**”时，我不禁想到这与**机器学习**过程是多么相似。正如人类有多个相互关联的因素影响他们的决策一样，ML模型也有它们自己的这种复杂性版本。
- en: '**So, what is Machine Learning?**'
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**那么，什么是机器学习？**'
- en: '*It is a subset of AI that allows **machines** to learn from **past data**
    (or historical data) and then **make** **predictions or decisions** on new data
    records **without** **being explicitly programmed** **for every possible scenario**.*'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '*这是人工智能的一个子集，它允许**机器**从**过去的数据**（或历史数据）中学习，然后在新数据记录上**做出****预测**或**决策**，而不需要为每个可能的情况**明确编程**。*'
- en: 'With this said, some of the more common ML "scenarios" are:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 话已至此，一些更常见的机器学习“场景”包括：
- en: '**Forecasting** or **Regression** (e.g., predicting house prices)'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测**或**回归**（例如，预测房价）'
- en: '**Classification** (e.g., labelling images of cats and dogs)'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分类**（例如，对猫和狗的图片进行标记）'
- en: '**Clustering** (e.g., finding groups of customers by analyzing their shopping
    habits)'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聚类**（例如，通过分析他们的购物习惯来找到客户群体）'
- en: '**Anomaly** **Detection** (e.g., finding outliers in your transactions for
    fraud analysis)'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异常** **检测**（例如，在欺诈分析中找到交易中的异常值）'
- en: Or, to exemplify these scenarios with our human cognitive daily tasks, we also
    **predict** (e.g., *will it rain today?*), **classify** (e.g., *is that a friend
    or stranger?*), and **detect** **anomalies** (e.g., *the cheese that went bad
    in our fridge*). The difference lies in how we **process** **these** **tasks**
    and which **inputs** or **data** **we** **have** (e.g., *the presence of clouds
    vs. a bright, clear sky*).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，用我们人类的日常认知任务来举例说明这些场景，我们也会**预测**（例如，*今天会下雨吗？*），**分类**（例如，*那是朋友还是陌生人？*），以及**检测****异常**（例如，*冰箱里变质的奶酪*）。区别在于我们如何**处理****这些****任务**以及我们**有哪些****输入**或**数据**（例如，*云的存在与晴朗的蓝天*）。
- en: So, data (and its quality) is always at the core of producing quality model
    outcomes from the above scenarios.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，数据（及其质量）始终是产生上述场景中高质量模型结果的核心。
- en: 'Data: The Core "Input"'
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据：核心“输入”
- en: 'Similar to humans, who gather multimodal sensory inputs from various sources
    (e.g., videos from YouTube, music coming from radio, blog posts from Medium, financial
    records from Excel sheets, etc.), ML models rely on *data* that can be:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 与人类类似，人类从各种来源收集多模态感官输入（例如，YouTube的视频、收音机传来的音乐、Medium的博客文章、Excel表格中的财务记录等），ML模型依赖于*数据*，这些数据可以是：
- en: '**Structured** (like rows in a spreadsheet)'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化**（例如，电子表格中的行）'
- en: '**Semi-structured** (JSON, XML files)'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**半结构化**（JSON，XML文件）'
- en: '**Unstructured** (images, PDF documents, free-form text, audio, etc.)'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非结构化**（图像、PDF文档、自由文本、音频等）'
- en: Because data fuels every insight an ML model produces, we (*data professionals*)
    spend a substantial amount of time preparing it – often cited as **50–70%** of
    the overall ML project effort.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 因为数据为机器学习模型产生的每一个洞察力提供燃料，我们（数据专业人士）花费大量时间来准备它——通常占整个机器学习项目努力的50-70%。
- en: This preparation phase gives ML models a taste of the "filtering and pre-processing"
    that humans do naturally.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这个准备阶段让机器学习模型尝到了人类自然进行的“过滤和预处理”的味道。
- en: We look for outliers, handle missing values and duplicates, remove part of the
    inputs (features) unnecessary features, or create new ones.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们寻找异常值，处理缺失值和重复值，移除不必要的输入（特征），或者创建新的特征。
- en: Except for the above-listed tasks, we can additionally "tune" the data inputs.
    – Remember how Dee mentioned factors being "thicker" or "thinner"? – In ML, we
    achieve something similar through ***feature** **engineering*** and ***weight**
    **assignments***, though fully in a mathematical way.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 除了上述列出的任务外，我们还可以“调整”数据输入。 ——还记得Dee提到的因素是“更厚”或“更薄”吗？ ——在机器学习中，我们通过**特征** **工程**和**权重**
    **分配**实现类似的效果，尽管完全是数学方式。
- en: In summary, we are "organizing" the data inputs so the model can "learn" from
    clean, high-quality data, yielding more reliable model outputs.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，我们正在“组织”数据输入，以便模型可以从干净、高质量的数据中“学习”，从而产生更可靠的模型输出。
- en: 'Modelling: Training and Testing'
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建模：训练和测试
- en: While humans can learn and adapt their "factor weights" through deliberate practices,
    as Dee described, ML models have a similarly structured learning process.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然人类可以通过有意识的练习学习和调整他们的“因素权重”，正如Dee所描述的，但机器学习模型也有类似的结构化学习过程。
- en: Once our data is in good shape, we feed it into ML algorithms (like [neural
    networks](https://en.wikipedia.org/wiki/Neural_network_(machine_learning)), [decision
    trees](https://en.wikipedia.org/wiki/Decision_tree), or [ensemble methods](https://en.wikipedia.org/wiki/Ensemble_learning)).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们的数据处于良好状态时，我们将其输入到机器学习算法中（如[神经网络](https://en.wikipedia.org/wiki/Neural_network_(machine_learning))、[决策树](https://en.wikipedia.org/wiki/Decision_tree)或[集成方法](https://en.wikipedia.org/wiki/Ensemble_learning))。
- en: In a typical supervised learning setup, the algorithm sees examples labelled
    with the correct answers (like a thousand images labelled "cat" or "dog").
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在典型的监督学习设置中，算法会看到标记有正确答案的示例（例如，一千张标记为“猫”或“狗”的图片）。
- en: It then adjusts its internal weights – its version of "importance factors"—
    to match (predict) those labels as accurately as possible. In other words, the
    trained model might assign a probability score indicating how likely each new
    image is a "cat" or a "dog", based on the learned patterns.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，它调整其内部权重——其“重要性因素”版本——以尽可能准确地匹配（预测）那些标签。换句话说，训练好的模型可能会分配一个概率分数，表示每个新图像是“猫”或“狗”的可能性，基于学习到的模式。
- en: 'This is where ML is more "straightforward" than the human mind: *the model’s
    outputs come from a defined process of summing up weighted inputs, while humans
    shuffle around multiple factors – like hormones, subconscious biases, or immediate
    physical needs – making our internal process far less transparent.*'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是机器学习比人类思维更“直接”的地方：*模型的输出来自一个定义明确的加权和输入的总和过程，而人类则围绕多个因素——如激素、潜意识偏见或即时生理需求——进行操作，使得我们的内部过程远不如透明。*
- en: 'So, the two core phases in model building are:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，模型构建的两个核心阶段是：
- en: '**Training**: The model is shown the labelled data. It "learns" patterns linking
    inputs (image features, for example) to outputs (the correct pet label).'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练**：模型被展示标记好的数据。它“学习”将输入（例如图像特征）与输出（正确的宠物标签）联系起来的模式。'
- en: '**Testing**: We evaluate the model on new, unseen data (new images of *cats*
    and *dogs*) to gauge how well it generalizes. If it consistently mislabels certain
    images, we might tweak parameters or gather more training examples to improve
    the accuracy of generated outputs.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试**：我们在新的、未见过的数据上评估模型，以衡量其泛化能力。如果它持续错误地标记某些图像，我们可能会调整参数或收集更多训练示例以提高生成输出的准确性。'
- en: As it all comes back to the data, it’s relevant to mention that there can be
    more to the modelling part, especially if we have "**imbalanced** **data**."
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这一切都回归到数据上，提到建模部分可能还有更多内容是相关的，尤其是如果我们有“**不平衡** **数据**”。
- en: 'For example: if the training set has 5,000 *dog* images but only 1,000 *cat*
    images, the model might lean toward predicting *dogs* more often – unless we apply
    **special** **techniques** to address the "**imbalance**". But this is a story
    that would call for a fully new post.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：如果训练集有5,000张**狗**图片，但只有1,000张**猫**图片，模型可能会倾向于更频繁地预测**狗**——除非我们应用**特殊** **技术**来解决“**不平衡**”。但这将是一个需要全新文章的故事。
- en: The idea behind this mention is that the number of examples in the input dataset
    for each possible outcome (the image "cat" or "dog") influences the complexity
    of the model’s training process and its output accuracy.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 提及这一点背后的想法是，对于每个可能的输出（例如“猫”或“狗”）的输入数据集中的示例数量会影响模型训练过程的复杂性和输出准确性。
- en: Ongoing Adjustments and the Human Factor
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 持续调整和人为因素
- en: However, despite its seeming straightforwardness, an ML pipeline isn’t "[fire-and-forget](https://en.wikipedia.org/wiki/Fire-and-forget)".
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管看似简单，机器学习流程并不是"[fire-and-forget](https://en.wikipedia.org/wiki/Fire-and-forget)"。
- en: When the model’s predictions start drifting off track (*maybe because new data
    has changed the scenario*), we **retrain** and **fine-tune** the system.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 当模型的预测开始偏离轨道（*可能是因为新数据改变了场景*），我们**重新训练**和**微调**系统。
- en: '**Again**, the data professionals behind the scenes need to decide how to **clean
    or enrich data** and **re-tune the model parameters** to improve model performance
    metrics.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**再次**，幕后的数据专业人士需要决定如何**清理或丰富数据**以及**重新调整模型参数**以提高模型性能指标。'
- en: That’s the"**re-learning**" in machine learning.
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这就是机器学习中的“**重新学习**”。
- en: This is important because **bias and errors** in data or models can ripple through
    to flawed outputs and **have real-life consequences**. For instance, a credit-scoring
    model trained on biased historical data might systematically lower scores for
    certain demographic groups, **leading to unfair denial of loans or financial opportunities.**
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这很重要，因为数据或模型中的**偏差和错误**可能会波及到有缺陷的输出，并**产生现实生活中的后果**。例如，一个基于有偏见的历史数据的信用评分模型可能会系统地降低某些人口群体的分数，**导致贷款或金融机会的不公平拒绝**。
- en: In essence, humans still drive the feedback loop of the improvement in training
    machines, shaping how the ML/AI model evolves and "behaves".
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，人类仍然驱动着训练机器改进的反馈循环，塑造着机器学习/人工智能模型如何演变和“表现”。
- en: '* * *'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Concluding remarks
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: '!["While psychologists dream of a day when the human mind''s complexity is
    fully understood, or data professionals dream of a day when AI models reach AGI,
    each domain still retains its unique field. Yet, the dialogue between these two
    fields deepens our understanding of both." [Image generated by Authors using DALL-E]](../Images/e96f63898f4f067eddda4dbdb293ea0c.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '!["当心理学家梦想着有一天能完全理解人类大脑的复杂性，或者数据专业人士梦想着有一天人工智能模型能达到通用人工智能，每个领域仍然保留着其独特的领域。然而，这两个领域之间的对话加深了我们对两者的理解。"
    [由作者使用DALL-E生成的图像]](../Images/e96f63898f4f067eddda4dbdb293ea0c.png)'
- en: '**"While psychologists dream of a day when the human mind’s complexity is fully
    understood, or data professionals dream of a day when AI models reach AGI, each
    domain still retains its unique field. Yet, the dialogue between these two fields
    deepens our understanding of both."** [Image generated by Authors using DALL-E]'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**"当心理学家梦想着有一天能完全理解人类大脑的复杂性，或者数据专业人士梦想着有一天人工智能模型能达到通用人工智能，每个领域仍然保留着其独特的领域。然而，这两个领域之间的对话加深了我们对两者的理解。"**
    [由作者使用DALL-E生成的图像]'
- en: In this post, we’ve explored how humans generate outputs, influenced by at least
    ten major interwoven factors, and how ML models produce results through data-driven
    algorithms.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了人类如何生成输出，受到至少十个主要交织因素的影响，以及机器学习模型如何通过数据驱动算法产生结果。
- en: Although machines and humans don’t derive outcomes in the same way, **the core
    ideas are remarkably similar.**
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管机器和人类不通过相同的方式得出结果，**但核心思想却惊人地相似**。
- en: '**For humans**, the process is intuitive: we receive and collect sensory inputs
    and store them in various forms of memory. Our cognitive processes then combine
    logic, emotions, hormones, past experiences, in-the-moment external inputs, etc.,
    to produce actions or behaviours. As Dee illustrated, this unique combination
    of factors creates our human ability to be both predictable and surprising, rational
    and emotional, all at once.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对于人类**，这个过程是直观的：我们接收和收集感官输入，并以各种形式存储它们。然后，我们的认知过程结合逻辑、情感、荷尔蒙、过去经验、即时外部输入等，产生行动或行为。正如Dee所展示的，这种独特的因素组合创造了我们人类同时具有可预测性和惊喜、理性和情感的能力。'
- en: '**For ML or AI**, the process flow is data-based. We provide structured, semi-structured,
    or unstructured data, store, clean, label, or enrich them, model them with ML/AI
    algorithms, and then let the developed model generate predictions, decisions,
    or recommendations. Yet, as shown above, even this seemingly straightforward pipeline
    requires ongoing human oversight and adaptation to new scenarios.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对于机器学习或人工智能**，其流程是基于数据的。我们提供结构化、半结构化或非结构化数据，存储、清理、标记或丰富它们，用机器学习/人工智能算法对它们进行建模，然后让开发出的模型生成预测、决策或推荐。然而，如上所示，即使是这个看似简单的流程也需要持续的人类监督和适应新场景。'
- en: The key difference lies in the unpredictability of human mental processes, versus
    the more trackable, parameterized nature of ML/AI models.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 关键区别在于人类心理过程的不可预测性，与机器学习/人工智能模型更可追踪、参数化的本质。
- en: 'And while most of us wonder what the future brings – what will happen when
    AI reaches [AGI](https://en.wikipedia.org/wiki/Artificial_general_intelligence)
    and possibly replaces our jobs with its "superhuman" abilities – Dee shared an
    interesting perspective on that point:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们大多数人都在思考未来会带来什么——当人工智能达到[通用人工智能](https://en.wikipedia.org/wiki/Artificial_general_intelligence)并可能用其“超人”能力取代我们的工作时会发生什么——Dee分享了一个关于这个问题的有趣观点：
- en: '**What if AI starts following our path? –** Developing emotions, cluttering
    its memory with conflicting or harmful data, somehow creating an [Id](https://en.wikipedia.org/wiki/Id,_ego_and_superego#:~:text=%5B13%5D-,Id,-%5Bedit%5D),
    and becoming unpredictable.'
  id: totrans-113
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**如果人工智能开始跟随我们的道路呢？——** 发展情感，用冲突或有害的数据充斥其记忆，以某种方式创造一个[本我](https://en.wikipedia.org/wiki/Id,_ego_and_superego#:~:text=%5B13%5D-,Id,-%5Bedit%5D)，并变得不可预测。'
- en: ''
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Hmm… You weren’t expecting that, were you? –** The outcome doesn’t necessarily
    have to be that AI will surpass us. – **Maybe we’ll surpass AI**, which opens
    up another question: do human traits (factors) necessarily evolve…? **Because
    maybe that’s the future of AI.**'
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**嗯…你没有料到这一点，对吧？——** 结果不一定是人工智能会超越我们。——**也许我们会超越人工智能**，这又提出了另一个问题：人类的特征（因素）是否必然进化……？**因为也许那将是人工智能的未来。**'
- en: Until then, it’s important to recognize both human and machine models can learn,
    adapt, and change their outputs over time, given the right inputs and a willingness
    to keep refining the process.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之前，重要的是要认识到人类和机器模型在适当的输入和持续改进过程的意愿下，都可以学习、适应并随时间改变其输出。
- en: We can work on improving the quality of outputs by selecting better inputs and
    refining how they’re processed – whether in guided sessions with counsellors or
    ML/AI data and algorithm designs.
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们可以通过选择更好的输入并优化处理方式来提高输出质量——无论是在咨询顾问的引导会议中，还是在机器学习/人工智能的数据和算法设计中。
