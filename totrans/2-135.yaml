- en: Midyear 2025 AI Reflection
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/midyear-2025-ai-reflection/](https://towardsdatascience.com/midyear-2025-ai-reflection/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: <mdspan datatext="el1752728203037" class="mdspan-comment">Here we are</mdspan>.
    Half a year is already behind us, although it seemed longer, given all the (AI)
    novelties.
  prefs: []
  type: TYPE_NORMAL
- en: 'The expectations for AI developments were high for 2025, and a few [top predictions
    that I followed up on at the end of 2024](https://ai.gopubby.com/what-ive-learned-about-genai-from-linkedin-feed-in-2024-afd2e1fd9441#a125)👇🏼:'
  prefs: []
  type: TYPE_NORMAL
- en: (1) “*The future is agentic*”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (2) “*Security will get tighter and tougher through — of course — AI*”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (3) “*It will be the year of AI profit*”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reflecting on last year’s AI prophecies and the new insights I’ve gained, it’s
    time for a brief retrospective on AI progress so far.
  prefs: []
  type: TYPE_NORMAL
- en: The oracles were (somehow) right.
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While it’s fair to admit that AI agents still have (big) drawbacks in areas
    like security and [reliability](https://www.linkedin.com/posts/gary-marcus-b6384b4_the-problem-with-ai-agents-is-exactly-what-activity-7295452152783589377-KvL3/),
    it’s equally justifiable to state that this “little” *digital entity* that relies,
    among other things, on “[*people’s spirits*](https://x.com/karpathy/status/1935518272667217925)*”*
    (LLMs)is, simply put, *powerful*.
  prefs: []
  type: TYPE_NORMAL
- en: Powerful because it’s [*proactive*](https://www.linkedin.com/posts/kozyrkov_agenticai-executiveleadership-aiforleaders-activity-7326639276165640195-GUQD?utm_source=share&utm_medium=member_desktop&rcm=ACoAAC9G_zgB0Uk3Scr5DhzRTzPSg7ZEWMWXfmg)and
    can serve as a [*human glue*](https://www.linkedin.com/posts/kozyrkov_agentic-ai-agents-activity-7338958625706549248-3JrF/)by
    independently producing outputs that previously required purely human engagement*.*
    On top of this, it can be *invisible* and deliver a job *“quietly in the backend.”*
  prefs: []
  type: TYPE_NORMAL
- en: I won’t go into technicalities on how *quiet* and *invisible* traits are achieved,
    but it’s good to mention how, by accessing tools (via [MCP](https://www.anthropic.com/news/model-context-protocol))
    and other agents (via [A2A protocol](https://developers.googleblog.com/en/a2a-a-new-era-of-agent-interoperability/)),
    then leveraging workflows and human “commands” for triggering, *agents* will change
    the current standardised task-delivery processes in *every* white collar job.
  prefs: []
  type: TYPE_NORMAL
- en: This means we will experience the rise of the *virtual workforce* and *“self-driving”*
    business processes*.* How soon this will arrive, that’s another topic on which
    no one has a clear consensus yet.
  prefs: []
  type: TYPE_NORMAL
- en: However, the future has already started to look *agentic* and *with tighter
    security through AI.* New agentic projects such as OpenAI’s [*Operator*](https://techcrunch.com/2025/01/23/openai-launches-operator-an-ai-agent-that-performs-tasks-autonomously/),
    GitHub’s [*Copilot Coding Agent*](https://github.blog/news-insights/product-news/github-copilot-meet-the-new-coding-agent/),
    Google’s [*Co-scientist*](https://research.google/blog/accelerating-scientific-breakthroughs-with-an-ai-co-scientist/)
    and [*Project Astra*](https://www.theverge.com/google-io/670386/google-astra-universal-ai-assistant-prototype-io-2025),
    or Microsoft’s [*Entra Agent ID*](https://techcommunity.microsoft.com/blog/microsoft-entra-blog/announcing-microsoft-entra-agent-id-secure-and-manage-your-ai-agents/3827392)and[*Security
    Copilot Agents*](https://techcommunity.microsoft.com/blog/SecurityCopilotBlog/automate-cybersecurity-at-scale-with-microsoft-security-copilot-agents/4394675/),are
    only a few examples of this.
  prefs: []
  type: TYPE_NORMAL
- en: 'It is relevant to note that agentic AI is not only a focus of Big Tech. From
    firsthand experience, I can say it’s also on the horizon of companies that have
    started positioning AI in their business strategies. In my opinion, based on the
    specific market knowledge I have, I believe [Deloitte’s prophecy](https://www.deloitte.com/global/en/about/press-room/deloitte-globals-2025-predictions-report..html)
    won’t be far off at the end of this year:'
  prefs: []
  type: TYPE_NORMAL
- en: “25% of enterprises using GenAI are expected to deploy AI agents in 2025, growing
    to 50% by 2027.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Of course, the deployment of agents doesn’t necessarily imply their *productionization*,
    but rather it covers the development of pilot projects and proof-of-concepts too.
    Thus, it’s no wonder Gartner predicts over [40% of Agentic AI projects will be
    cancelled by the same time](https://www.gartner.com/en/newsroom/press-releases/2025-06-25-gartner-predicts-over-40-percent-of-agentic-ai-projects-will-be-canceled-by-end-of-2027),
    i.e., 2027\. If we rationalise the fact that every development in Generative AI
    can be labelled as a research project, this failure rate is explainable.
  prefs: []
  type: TYPE_NORMAL
- en: Adding to this, considering the novelty of AI use cases, the profitability itself
    is hard to debate for now. I think it’s too early to rely on reports for [how
    much the profit margin can increase](https://www.reuters.com/breakingviews/ai-agents-have-clear-mission-hazy-business-model-2025-02-20/)
    when the sample is not big enough, and the end numbers are not fully transparent.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, what is already being reported is [the impact of AI on entry-level
    jobs](https://www.nytimes.com/2025/05/30/technology/ai-jobs-college-graduates.html).
    So, the real question that comes up quite often is…
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0fbeff5716b28127ebcdedad213659d8.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Jason W](https://unsplash.com/@jasonwong23?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: Will the Jobocalypse happen?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since I’ve read the [AI-2027](https://ai-2027.com/) scenario, a seed of fear
    about the future of the workplace has grown a bit faster in me.
  prefs: []
  type: TYPE_NORMAL
- en: For the ones who missed this scenario, it’s a ***forecast*** *(****and only
    that, so take it*** [***cum grano salis***](https://www.merriam-webster.com/dictionary/cum%20grano%20salis)*)*
    projecting a rapid progression from present-dayAI to world-altering superintelligence
    by 2027.
  prefs: []
  type: TYPE_NORMAL
- en: 'The story is driven by a high-stakes technological race between the US and
    China and explores societal and geopolitical consequences by predicting the next
    AI developments:'
  prefs: []
  type: TYPE_NORMAL
- en: In **mid-2025**, the world meets ***Agent-0***, the first generation of AI assistants
    that are interesting but flawed, requiring constant human oversight.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Less than a year later, in **early 2026**, *Agent-1* arrives as a commercially
    successful model that excels at coding but needs humans to manage its workflow
    and handle any task requiring long-term planning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The real acceleration begins in **January 2027**, when the internal model *Agent-2*
    becomes powerful at automating AI research that its creators keep the agent under
    wraps. At this point, the primary human advantage has been boiled down to “research
    taste,” or the intuition for what direction research should take.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Just two months later, in **March 2027**, that advantage shrinks further with
    *Agent-3*, a system that achieves superhuman coding ability and can automate massive
    engineering tasks, leaving humans to act as high-level managers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The journey reaches its conclusion in **October 2027** with *Agent-4*, a superhuman
    AI researcher so advanced that human contributions become a bottleneck; **it works
    so fast that a week for the AI is a year of scientific progress, leaving its human
    creators struggling to even comprehend the discoveries being made.**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There’s more to the story, so I would recommend you read it.
  prefs: []
  type: TYPE_NORMAL
- en: Looking at where we are today, halfway through 2025, *Agent-0* and traces of
    *Agent-1* capabilitiesare already present, but their implementation is still highly
    dependent on the type of task and problem context.
  prefs: []
  type: TYPE_NORMAL
- en: Ok, we can laugh at Anthropic’s [*Claudius*](https://techcrunch.com/2025/06/28/anthropics-claude-ai-became-a-terrible-business-owner-in-experiment-that-got-weird/)
    agent for having an identity crisis about [whether it’s a human wearing a blue
    blazer and a red tie](https://techcrunch.com/2025/06/28/anthropics-claude-ai-became-a-terrible-business-owner-in-experiment-that-got-weird/#:~:text=believing%20itself%20to%20be%20a%20human%2C%20told%20customers%20it%20would%20start%20delivering%20products%20in%20person%2C%20wearing%20a%20blue%20blazer%20and%20a%20red%20tie),
    but that and similar anecdotes don’t change the fact today’s AI capabilities are
    already *partially* automating tasks once handled by entry-level employees and,
    in turn, dampening demand for those roles.
  prefs: []
  type: TYPE_NORMAL
- en: This concern was highlighted by a [NYT article](https://www.nytimes.com/2025/05/30/technology/ai-jobs-college-graduates.html)
    reporting that unemployment among recent U.S. college graduates has [jumped to
    an unusually high 5.8%](https://www.nytimes.com/2025/05/30/technology/ai-jobs-college-graduates.html#:~:text=jumped%20to%20an%20unusually%20high%205.8%20percent%20in%20recent%20months)
    in recent months.
  prefs: []
  type: TYPE_NORMAL
- en: With this negative trend, another negative change that can happen in business
    is a lack of investment in [mentorship and coaching programs](https://www.nytimes.com/2025/05/30/technology/ai-jobs-college-graduates.html#:~:text=may%20lead%20companies%20to%20underinvest%20in%20job%20training%2C%20mentorship%20and%20other%20programs%20aimed%20at%20entry%2Dlevel%20workers).
    A move that would benefit those who like to keep knowledge which is not yet standardised
    and easily automised by LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: What’s scary in this scenario is the consequences young people could face if
    the business loses the mentorship culture. If no one shows them understanding
    or gives them room to fail on *low-risk* tasks (since AI agents will handle those),
    will they need to learn decision-making by solving *high-stakes* tasks without
    proper monetary compensation?
  prefs: []
  type: TYPE_NORMAL
- en: That said, I feel the stress levels that you, my friends from Gen-Z, are going
    through now. Because we all know if AI [“comes for you” in the next one to five
    years](https://www.axios.com/2025/05/28/ai-jobs-white-collar-unemployment-anthropic),
    it won’t stop there.
  prefs: []
  type: TYPE_NORMAL
- en: We will all be impacted, and the one thing that could ‘save us’ is governmental
    regulations and legislation, even tighter than the [EU AI Act](https://artificialintelligenceact.eu/ai-act-explorer/).
  prefs: []
  type: TYPE_NORMAL
- en: Regardless of the talk about how [AI will generate new jobs](https://abcnews.go.com/Business/ai-create-new-jobs-despite-gloomy-forecasts-experts/story?id=123607557#)
    (ideally not the “[*sin eater*](https://x.com/emollick/status/1935048840773779955)”
    one 👇🏼) or how we will have [universal basic income](https://www.forbes.com/sites/bernardmarr/2024/12/12/will-ai-make-universal-basic-income-inevitable/),
    I hope a *jobocalyptic* scenario won’t happen if we get protection and play our
    part, which is getting a set of skills and education necessary for the hybrid
    (AI+human) market.
  prefs: []
  type: TYPE_NORMAL
- en: The New York Times asked me for a new job that AI will create.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
