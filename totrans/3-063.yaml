- en: AWS: Deploying a FastAPI App on EC2 in Minutes
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/aws-deploying-a-fastapi-app-on-ec2-in-minutes/](https://towardsdatascience.com/aws-deploying-a-fastapi-app-on-ec2-in-minutes/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1745541501643" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AWS is a popular cloud provider that enables the deployment and scaling of large
    applications. Mastering at least one cloud platform is an essential skill for
    software engineers and data scientists. Running an application locally is not
    enough to make it usable in production — it must be deployed on a server to become
    accessible to end users.
  prefs: []
  type: TYPE_NORMAL
- en: In this tutorial, we will walk through an example of deploying a FastAPI application.
    While the example focuses on core EC2 networking concepts, the principles are
    broadly applicable to other types of applications as well.
  prefs: []
  type: TYPE_NORMAL
- en: Please note that this tutorial does not cover best practices for AWS usage.
    Instead, the goal is to give readers a hands-on introduction to application deployment
    using EC2 instances.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 01\. Instance creation
  prefs:
  - PREF_H2
  - PREF_H1
  type: TYPE_NORMAL
- en: Navigate to the EC2 dashboard in the AWS service menu and choose to create a
    new instance. This will open a page where we can define instance parameters.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/48e847a90b6207ef9864352afbc64013.png)'
  prefs: []
  type: TYPE_IMG
- en: Select the corresponding instance type. In this tutorial, we will launch a very
    simple server with minimal technical requirements, so *t3.nano* should be sufficient
    for our needs.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f1e5940753f96626b293db08634e3fe7.png)'
  prefs: []
  type: TYPE_IMG
- en: For its containers, AWS uses SSH authentication. When creating a new instance,
    it is necessary to create a new key pair that will allow us to log in from the
    local machine using the SSH protocol. Click on ***Create new key pair***.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d6c5a537d2bd41a7ad4446fc3bc8d213.png)'
  prefs: []
  type: TYPE_IMG
- en: Assign a name to the new key. We will not dive into the possible options here,
    so we will choose RSA as the key pair type and .pem as the private key file format.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e8a31f9c42d8ffbf3b6e096efcc0c5c1.png)'
  prefs: []
  type: TYPE_IMG
- en: To save time, in our demonstration application we will not worry about security.
    For the network settings, tick all the checkboxes corresponding to SSH, HTTP,
    and HTTPS traffic.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/be76d96549adfc4740836c441ba4ec2d.png)'
  prefs: []
  type: TYPE_IMG
- en: Great! By clicking **Launch instance**, AWS will create a new instance.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e425051819968e3d370bd4ec47dce95b.png)'
  prefs: []
  type: TYPE_IMG
- en: After the instance is created, a *.pem* file will be downloaded to your local
    machine. This file contains the private key that allows SSH authentication. As
    a good practice, store this file in a safe location because AWS does not provide
    a way to recover it if it is lost.
  prefs: []
  type: TYPE_NORMAL
- en: By opening the EC2 dashboard, you will notice that the created instance has
    an associated IP address. This IP is shown under the label *“Public IPv4 address”*.
    For example, in the image below, it is *“16.16.202.153”*. Once we deploy our application,
    it will be accessible from a browser using this IP address.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4e7a2183b598366544522a71efa81b70.png)'
  prefs: []
  type: TYPE_IMG
- en: 02\. SSH connection
  prefs:
  - PREF_H2
  - PREF_H1
  type: TYPE_NORMAL
- en: AWS offers several ways to perform authentication. In our case, we will use
    the SSH mechanism.
  prefs: []
  type: TYPE_NORMAL
- en: In the instance menu, click ***Connect*** and select ***SSH client*** from the
    top bar.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/222c1700bf1c7b38d55815e3d88ef7e3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Open the local terminal and, using the screenshot above as reference, copy
    and execute command #3 (`chmod 400 "<key_name>.pem"`) along with the command shown
    below the *“Example”* label. Make sure your current terminal directory matches
    the location where the *.pem* key was downloaded in the previous step.'
  prefs: []
  type: TYPE_NORMAL
- en: During the SSH connection, the terminal might prompt whether to proceed. If
    it does, type *“yes”*.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, we are successfully connected from the local terminal to the
    EC2 instance. Any commands entered into the terminal will now be executed directly
    in the EC2 container.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 03\. Environment configuration
  prefs:
  - PREF_H2
  - PREF_H1
  type: TYPE_NORMAL
- en: After connecting to the instance from the local terminal, the next step is to
    update the package manager and install Python along with Nginx.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'To redirect traffic to our application, we need to create an Nginx configuration
    file. This file should be placed in the directory `/etc/nginx/sites-enabled/` and
    can have any custom name. We will add the following configuration to it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Basically, we are specifying that any external request sent to the EC2 instance’s
    IP address on the default port 80 should be redirected via a proxy to the application
    running inside the EC2 container at the address `http://127.0.0.1:8000`. As a
    reminder, this is the default HTTP address and port assigned by FastAPI.
  prefs: []
  type: TYPE_NORMAL
- en: 'To apply these changes, we need to restart Nginx:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: If we have a FastAPI server that we would like to launch, the simplest way would
    be to publish it on GitHub and then clone the repository onto the EC2 instance.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Create and activate a virtual environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Install the necessary Python requirements (assuming that the cloned repository
    contains a *requirements.txt* file):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Run the server:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Open the browser and enter the IP address of the instance.
  prefs: []
  type: TYPE_NORMAL
- en: Make sure to use the HTTP (not HTTPS) protocol. For example: `<a href="http://16.16.202.153/"
    rel="noreferrer noopener" target="_blank">http://16.16.202.153</a>`. The firewall
    might block your connection, but you should proceed to open the web page. Add `/docs` after
    the URL to open Fast API Swagger.
  prefs: []
  type: TYPE_NORMAL
- en: Exercise
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you would like to run a FastAPI example, you can create a simple repository
    consisting of just a *main.py* file and a *requirements.txt*.
  prefs: []
  type: TYPE_NORMAL
- en: '*main.py*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '*requirements.txt*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Uploading files
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you try to upload a file to a server and receive a 413 status with the error
    message *“Error: Request Entity Too Large”*, it is likely because Nginx has a
    limit on the maximum file size that can be uploaded. To resolve this issue, go
    to the Nginx configuration file and specify the maximum allowed file size by using
    the *client_max_body_size* directive (setting it to 0 indicates no limits on input
    file sizes):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: After changing the configuration file, do not forget to restart Nginx.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, we have learned how to quickly create a running EC2 instance
    using a FastAPI server as an example. Although we did not follow the best deployment
    and security practices, the main goal of the article was to provide minimal information
    for beginners to launch their first server on AWS.
  prefs: []
  type: TYPE_NORMAL
- en: The next logical step in the AWS study roadmap would be creating multiple EC2
    instances and connecting them to each other.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
