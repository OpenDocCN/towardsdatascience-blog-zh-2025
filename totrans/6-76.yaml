- en: How to Build a Graph RAG App
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何构建Graph RAG应用
- en: 原文：[https://towardsdatascience.com/how-to-build-a-graph-rag-app-b323fc33ba06/](https://towardsdatascience.com/how-to-build-a-graph-rag-app-b323fc33ba06/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-build-a-graph-rag-app-b323fc33ba06/](https://towardsdatascience.com/how-to-build-a-graph-rag-app-b323fc33ba06/)
- en: '*The accompanying code for the app and notebook are *[*here.*](https://github.com/SteveHedden/kg_llm/tree/main/graphRAGapp)'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*该应用的代码和笔记本的配套代码*[*在此处.*](https://github.com/SteveHedden/kg_llm/tree/main/graphRAGapp)'
- en: Knowledge graphs (KGs) and Large Language Models (LLMs) are a match made in
    heaven. My [previous](https://medium.com/towards-data-science/how-to-implement-knowledge-graphs-and-large-language-models-llms-together-at-the-enterprise-level-cf2835475c47) [posts](https://medium.com/towards-data-science/how-to-implement-graph-rag-using-knowledge-graphs-and-vector-databases-60bb69a22759) discuss
    the complementarities of these two technologies in more detail but the short version
    is, “some of the main weaknesses of LLMs, that they are black-box models and struggle
    with factual knowledge, are some of KGs’ greatest strengths. KGs are, essentially,
    collections of facts, and they are fully interpretable.”
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱（KGs）和大型语言模型（LLMs）是天作之合。我的[之前](https://medium.com/towards-data-science/how-to-implement-knowledge-graphs-and-large-language-models-llms-together-at-the-enterprise-level-cf2835475c47)
    [文章](https://medium.com/towards-data-science/how-to-implement-graph-rag-using-knowledge-graphs-and-vector-databases-60bb69a22759)更详细地讨论了这两种技术的互补性，但简而言之是，“LLMs的一些主要弱点，即它们是黑盒模型且难以处理事实性知识，正是KGs最大的优势。本质上，KGs是事实的集合，它们是完全可解释的。”
- en: This article is all about building a simple Graph RAG app. What is RAG? RAG,
    or Retrieval-Augmented Generation, is about **retrieving** relevant information
    to **augment** a prompt that is sent to an LLM, which **generates** a response.
    Graph RAG is RAG that uses a knowledge graph as part of the retrieval portion.
    If you’ve never heard of Graph RAG, or want a refresher, I’d watch [this video](https://www.youtube.com/watch?v=knDDGYHnnSI).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章全部关于构建一个简单的Graph RAG应用。什么是RAG？RAG，即检索增强生成，是关于**检索**相关信息以**增强**发送给LLM的提示，LLM随后**生成**响应。Graph
    RAG是使用知识图谱作为检索部分一部分的RAG。如果您从未听说过Graph RAG或需要复习，我建议您观看[这个视频](https://www.youtube.com/watch?v=knDDGYHnnSI)。
- en: The basic idea is that, rather than sending your prompt directly to an LLM,
    which was not trained on your data, you can supplement your prompt with the relevant
    information needed for the LLM to answer your prompt accurately. The example I
    use often is copying a job description and my resume into ChatGPT to write a cover
    letter. The LLM is able to provide a much more relevant response to my prompt,
    ‘write me a cover letter,’ if I give it my resume and the description of the job
    I am applying for. Since knowledge graphs are built to store knowledge, they are
    a perfect way to store internal data and supplement LLM prompts with additional
    context, improving the accuracy and contextual understanding of the responses.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 基本思路是，与其直接将提示发送给未在您的数据上训练的LLM，您可以通过补充LLM准确回答提示所需的相关信息来完善您的提示。我经常使用的例子是将一份工作描述和我的简历复制到ChatGPT中，让它帮我写一封求职信。如果给我我的简历以及我申请的工作描述，LLM就能对我的提示“写一封求职信”提供更加相关的回应。由于知识图谱是为了存储知识而构建的，因此它们是存储内部数据和通过额外上下文补充LLM提示的完美方式，这可以提高响应的准确性和上下文理解。
- en: This technology has many, many, applications such [customer service bots](https://arxiv.org/pdf/2404.17723), [drug](https://academic.oup.com/bioinformatics/article/40/6/btae353/7687047) [discovery](https://blog.biostrand.ai/integrating-knowledge-graphs-and-large-language-models-for-next-generation-drug-discovery), [automated
    regulatory report generation in life sciences](https://www.weave.bio/), [talent
    acquisition and management for HR](https://beamery.com/resources/news/beamery-announces-talentgpt-the-world-s-first-generative-ai-for-hr), [legal
    research and writing](https://legal.thomsonreuters.com/blog/retrieval-augmented-generation-in-legal-tech/),
    and [wealth advisor assistants](https://www.cnbc.com/amp/2023/03/14/morgan-stanley-testing-openai-powered-chatbot-for-its-financial-advisors.html).
    Because of the wide applicability and the potential to improve the performance
    of LLM tools, Graph RAG (that’s the term I’ll use here) has been blowing up in
    popularity. Here is a graph showing interest over time based on Google searches.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术有非常广泛的应用，例如[客户服务机器人](https://arxiv.org/pdf/2404.17723)、[药物](https://academic.oup.com/bioinformatics/article/40/6/btae353/7687047)
    [发现](https://blog.biostrand.ai/integrating-knowledge-graphs-and-large-language-models-for-next-generation-drug-discovery)、[生命科学中自动生成监管报告](https://www.weave.bio/)、[人力资源中的人才获取和管理](https://beamery.com/resources/news/beamery-announces-talentgpt-the-world-s-first-generative-ai-for-hr)、[法律研究和写作](https://legal.thomsonreuters.com/blog/retrieval-augmented-generation-in-legal-tech/)以及[财富顾问助手](https://www.cnbc.com/amp/2023/03/14/morgan-stanley-testing-openai-powered-chatbot-for-its-financial-advisors.html)。由于其广泛的应用性和提高LLM工具性能的潜力，Graph
    RAG（我将在这里使用这个术语）在流行度上迅速上升。以下是根据Google搜索趋势显示的兴趣随时间变化的图表。
- en: '![](../Images/f6ed812b1badd67b2526fb2815d7b257.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图表](../Images/f6ed812b1badd67b2526fb2815d7b257.png)'
- en: Source: [https://trends.google.com/](https://trends.google.com/)
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：[https://trends.google.com/](https://trends.google.com/)
- en: Graph RAG has experienced a surge in search interest, even surpassing terms
    like knowledge graphs and retrieval-augmented generation. Note that Google Trends
    measures *relative* search interest, not absolute number of searches. The spike
    in July 2024 for searches of Graph RAG coincides with the week Microsoft [announced](https://www.microsoft.com/en-us/research/blog/graphrag-new-tool-for-complex-data-discovery-now-on-github/) that
    their GraphRAG application would be available on [GitHub](https://github.com/microsoft/graphrag).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: Graph RAG在搜索兴趣上经历了激增，甚至超过了知识图谱和检索增强生成等术语。请注意，Google Trends衡量的是*相对*搜索兴趣，而不是搜索的绝对数量。2024年7月对Graph
    RAG的搜索激增与微软[宣布](https://www.microsoft.com/en-us/research/blog/graphrag-new-tool-for-complex-data-discovery-now-on-github/)他们的GraphRAG应用程序将在[GitHub](https://github.com/microsoft/graphrag)上可用的时间相吻合。
- en: The excitement around Graph RAG is broader than just Microsoft, however. Samsung
    acquired RDFox, a knowledge graph company, in July of 2024\. The [article announcing
    that acquisition](https://news.samsung.com/global/samsung-electronics-announces-acquisition-of-oxford-semantic-technologies-uk-based-knowledge-graph-startup) did
    not mention Graph RAG explicitly, but in [this article in Forbes](https://www.forbes.com/sites/zakdoffman/2024/11/09/samsung-confirms-new-upgrade-choice-millions-of-galaxy-owners-must-now-decide/) published
    in November 2024, a Samsung spokesperson stated, “We plan to develop knowledge
    graph technology, one of the main technologies of personalized AI, and organically
    connect with generated AI to support user-specific services.”
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 围绕Graph RAG的兴奋不仅仅局限于微软。2024年7月，三星收购了知识图谱公司RDFox。宣布该收购的[文章](https://news.samsung.com/global/samsung-electronics-announces-acquisition-of-oxford-semantic-technologies-uk-based-knowledge-graph-startup)没有明确提及Graph
    RAG，但在2024年11月发布的[福布斯](https://www.forbes.com/sites/zakdoffman/2024/11/09/samsung-confirms-new-upgrade-choice-millions-of-galaxy-owners-must-now-decide/)文章中，三星发言人表示：“我们计划开发知识图谱技术，这是个性化AI的主要技术之一，并将其与生成式AI有机地连接起来，以支持特定用户的服务。”
- en: In October 2024, Ontotext, a leading graph database company, and Semantic Web
    company, the maker of PoolParty, a knowledge graph curation platform, merged to
    form [Graphwise](https://graphwise.ai/). According to [the press release](https://www.prnewswire.com/news-releases/semantic-web-company-and-ontotext-merge-to-create-knowledge-graph-and-ai-powerhouse-graphwise-302283427.html?utm_source=chatgpt.com),
    the merger aims to “democratize the evolution of Graph RAG as a category.”
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在2024年10月，领先的图数据库公司Ontotext和语义网公司PoolParty（一个知识图谱编辑平台）的制造商合并，成立了[Graphwise](https://graphwise.ai/)。根据[新闻稿](https://www.prnewswire.com/news-releases/semantic-web-company-and-ontotext-merge-to-create-knowledge-graph-and-ai-powerhouse-graphwise-302283427.html?utm_source=chatgpt.com)，此次合并的目标是“使Graph
    RAG作为一类产品的演变民主化”。
- en: While some of the buzz around Graph RAG may come from the broader excitement
    surrounding chatbots and generative AI, it reflects a genuine evolution in how
    knowledge graphs are being applied to solve complex, real-world problems. One
    example is that LinkedIn [applied Graph RAG](https://arxiv.org/pdf/2404.17723) to
    improve their customer service technical support. Because the tool was able to
    retrieve the relevant data (like previously solved similar tickets or questions)
    to feed the LLM, the responses were more accurate and the mean resolution time
    dropped from 40 hours to 15 hours.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管围绕Graph RAG的炒作可能部分源于对聊天机器人和生成式AI的广泛兴奋，但它反映了知识图谱在解决复杂、现实世界问题中的应用方式的真正演变。一个例子是LinkedIn将Graph
    RAG[应用于其客户服务技术支持](https://arxiv.org/pdf/2404.17723)。由于该工具能够检索相关数据（如之前解决的类似工单或问题），以供LLM使用，因此响应更加准确，平均解决时间从40小时缩短至15小时。
- en: This post will go through the construction of a pretty simple, but I think illustrative,
    example of how Graph RAG can work in practice. The end result is an app that a
    non-technical user can interact with. Like my last post, I will use a dataset
    consisting of medical journal articles from PubMed. The idea is that this is an
    app that someone in the medical field could use to do literature review. The same
    principles can be applied to many use cases however, which is why Graph RAG is
    so exciting.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本文将介绍一个相当简单但我觉得具有说明性的例子，说明Graph RAG在实际中是如何工作的。最终结果是用户可以与之交互的应用程序。像我的上一篇文章一样，我将使用PubMed中的医学期刊文章数据集。想法是，这是一个医学领域的人可以用来进行文献综述的应用程序。然而，这些原则可以应用于许多用例，这就是为什么Graph
    RAG如此令人兴奋。
- en: 'The structure of the app, along with this post is as follows:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序的结构以及本文的结构如下：
- en: 'Step zero is preparing the data. I will explain the details below but the overall
    goal is to vectorize the raw data and, separately, turn it into an RDF graph.
    As long as we keep URIs tied to the articles before we vectorize, we can navigate
    across a graph of articles and a vector space of articles. Then, we can:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 第零步是准备数据。我将在下面解释细节，但总体目标是矢量化原始数据，并将其单独转换为RDF图。只要我们在矢量化之前将URI与文章关联起来，我们就可以在文章图和文章向量空间中导航。然后，我们可以：
- en: '**Search Articles:** use the power of the vector database to do an initial
    search of relevant articles given a search term. I will use vector similarity
    to retrieve articles with the most similar vectors to that of the search term.'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**搜索文章：**利用向量数据库的强大功能，根据搜索词进行相关文章的初步搜索。我将使用向量相似度检索与搜索词向量最相似的文章。'
- en: '**Refine Terms:** explore the [Medical Subject Headings (MeSH) biomedical vocabulary](https://id.nlm.nih.gov/mesh/) to
    select terms to use to filter the articles from step 1\. This controlled vocabulary
    contains medical terms, alternative names, narrower concepts, and many other properties
    and relationships.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**细化术语：**探索[医学主题词表（MeSH）生物医学词汇](https://id.nlm.nih.gov/mesh/)以选择用于过滤步骤1中文章的术语。这个受控词汇包含医学术语、别名、更窄的概念以及许多其他属性和关系。'
- en: '**Filter & Summarize: **use the MeSH terms to filter the articles to avoid
    ‘context poisoning’. Then send the remaining articles to an LLM along with an
    additional prompt like, “summarize in bullets.”'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**过滤与总结：**使用MeSH术语过滤文章以避免“上下文中毒”。然后将剩余的文章发送给LLM，并附加一个额外的提示，例如，“用项目符号总结。”'
- en: 'Some notes on this app and tutorial before we get started:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，关于这个应用程序和教程的一些注意事项：
- en: This set-up uses knowledge graphs exclusively for metadata. This is only possible
    because each article in my dataset has already been tagged with terms that are
    part of a rich controlled vocabulary. I am using the graph for structure and semantics
    and the vector database for similarity-based retrieval, ensuring each technology
    is used for what it does best. Vector similarity can tell us “esophageal cancer”
    is semantically similar to “mouth cancer”, but knowledge graphs can tell us the
    details of the relationship between “esophageal cancer” and “mouth cancer.”
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这种设置仅使用知识图谱进行元数据。这之所以可能，仅仅是因为我的数据集中的每篇文章都已经用属于丰富受控词汇的术语进行了标记。我正在使用图来构建结构和语义，使用向量数据库进行基于相似度的检索，确保每种技术都用于其最擅长的领域。向量相似度可以告诉我们“食管癌”在语义上与“口腔癌”相似，但知识图谱可以告诉我们“食管癌”与“口腔癌”之间关系的细节。
- en: The data I used for this app is a collection of medical journal articles from
    PubMed (more on the data below). I chose this dataset because it is structured
    (tabular) but also contains text in the form of abstracts for each article, and
    because it is already tagged with topical terms that are aligned with a well-established
    controlled vocabulary (MeSH). Because these are medical articles, I have called
    this app ‘Graph RAG for Medicine.’ But this same structure can be applied to any
    domain and is not specific to the medical field.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我为这个应用程序使用的数据是从PubMed收集的医疗期刊文章集合（关于数据的更多信息见下文）。我选择这个数据集是因为它是结构化的（表格形式），同时也包含每篇文章的摘要形式的文本，并且它已经用与一个建立良好的控制词汇表（MeSH）对齐的主题术语进行了标记。因为这些是医学文章，所以我将这个应用程序称为“Graph
    RAG for Medicine”。但同样的结构可以应用于任何领域，并不特定于医学领域。
- en: 'What I hope this tutorial and app demonstrate is that you can improve the results
    of your RAG application in terms of accuracy and explainability by incorporating
    a knowledge graph into the retrieval step. I will show how KGs can improve the
    accuracy of RAG applications in two ways: by giving the user a way of filtering
    the context to ensure the LLM is only being fed the most relevant information;
    and by using domain specific controlled vocabularies with dense relationships
    that are maintained and curated by domain experts to do the filtering.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我希望这个教程和应用程序展示的是，通过在检索步骤中整合知识图谱，你可以提高你的RAG应用程序在准确性和可解释性方面的结果。我将展示知识图谱如何以两种方式提高RAG应用程序的准确性：一是为用户提供一种过滤上下文的方法，以确保LLM只接收最相关的信息；二是使用由领域专家维护和整理的具有密集关系的特定领域控制词汇表来进行过滤。
- en: 'What this tutorial and app don’t directly showcase are two other significant
    ways KGs can enhance RAG applications: governance, access control, and regulatory
    compliance; and efficiency and scalability. For governance, KGs can do more than
    filter content for relevancy to improve accuracy — they can enforce data governance
    policies. For instance, if a user lacks permission to access certain content,
    that content can be excluded from their RAG pipeline. On the efficiency and scalability
    side, KGs can help ensure RAG applications don’t die on the shelf. While it’s
    easy to create an impressive one-off RAG app (that’s literally the purpose of
    this tutorial), many companies struggle with a proliferation of disconnected POCs
    that lack a cohesive framework, structure, or platform. That means many of those
    apps are not going to survive long. A metadata layer powered by KGs can break
    down data silos, providing the foundation needed to build, scale, and maintain
    RAG applications effectively. Using a rich controlled vocabulary like MeSH for
    the metadata tags on these articles is a way of ensuring this Graph RAG app can
    be integrated with other systems and reducing the risk that it becomes a silo.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个教程和应用程序没有直接展示的是知识图谱可以增强RAG应用程序的另外两种重要方式：治理、访问控制和合规性；以及效率和可扩展性。对于治理，知识图谱不仅可以过滤内容以提高准确性，还可以执行数据治理政策。例如，如果用户没有权限访问某些内容，那么这些内容就可以从他们的RAG管道中排除。在效率和可扩展性方面，知识图谱可以帮助确保RAG应用程序不会胎死腹中。虽然创建一个令人印象深刻的单次RAG应用程序很容易（这正是这个教程的目的），但许多公司都面临着POCs（原型）激增的问题，这些POCs缺乏一个统一的框架、结构或平台。这意味着许多这样的应用程序将不会长期生存。由知识图谱驱动的元数据层可以打破数据孤岛，为有效地构建、扩展和维护RAG应用程序提供所需的基础。使用像MeSH这样的丰富控制词汇为这些文章的元数据标签是确保这个Graph
    RAG应用程序可以与其他系统集成并降低其成为孤岛风险的一种方式。
- en: 'Step 0: Prepare the data'
  id: totrans-24
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第0步：准备数据
- en: '*The code to prepare the data is in *[*this*](https://github.com/SteveHedden/kg_llm/blob/main/graphRAGapp/VectorVsKG_updated.ipynb)* notebook.*'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 准备数据的代码在[*这个*](https://github.com/SteveHedden/kg_llm/blob/main/graphRAGapp/VectorVsKG_updated.ipynb)笔记本中。
- en: 'As mentioned, I’ve again decided to use [this](https://www.kaggle.com/datasets/owaiskhan9654/pubmed-multilabel-text-classification) dataset
    of 50,000 research articles from the PubMed repository (License [CC0: Public Domain](https://creativecommons.org/publicdomain/zero/1.0/)).
    This dataset contains the title of the articles, their abstracts, as well as a
    field for metadata tags. These tags are from the Medical Subject Headings (MeSH)
    controlled vocabulary thesaurus. The PubMed articles are really just metadata
    on the articles — there are abstracts for each article but we don’t have the full
    text. The data is already in tabular format and tagged with MeSH terms.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '如前所述，我再次决定使用来自PubMed仓库的50,000篇研究文章的数据集 [此数据集](https://www.kaggle.com/datasets/owaiskhan9654/pubmed-multilabel-text-classification)（许可证
    [CC0: 公共领域](https://creativecommons.org/publicdomain/zero/1.0/)）。此数据集包含文章的标题、摘要以及用于元数据标签的字段。这些标签来自医学主题词表（MeSH）受控词汇表。PubMed文章实际上只是文章的元数据——每篇文章都有摘要，但我们没有全文。数据已经以表格格式呈现，并标记了MeSH术语。'
- en: We can vectorize this tabular dataset directly. We could turn it into a graph
    (RDF) before we vectorize, but I didn’t do that for this app and I don’t know
    that it would help the final results for this kind of data. The most important
    thing about vectorizing the raw data is that we add [Unique Resource Identifiers](https://en.wikipedia.org/wiki/Uniform_Resource_Identifier) (URIs)
    to each article first. A URI is a unique ID for navigating RDF data and it is
    necessary for us to go back and forth between vectors and entities in our graph.
    Additionally, we will create a separate collection in our vector database for
    the MeSH terms. This will allow the user to search for relevant terms without
    having prior knowledge of this controlled vocabulary. Below is a diagram of what
    we are doing to prepare our data.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以直接将此表格数据集向量化。在向量化之前，我们可以将其转换为图形（RDF），但我没有为这个应用程序做这件事，也不知道这对这种类型的数据的最终结果是否有帮助。将原始数据向量化的最重要的事情是，我们首先为每篇文章添加[唯一资源标识符](https://en.wikipedia.org/wiki/Uniform_Resource_Identifier)（URIs）。URI是用于导航RDF数据的唯一ID，对于我们在这张图中的向量和实体之间来回移动是必要的。此外，我们将在我们的向量数据库中为MeSH术语创建一个单独的集合。这将使用户能够在不知道这种受控词汇的情况下搜索相关术语。以下是我们在准备数据时所做的图示。
- en: '![](../Images/0d088c5d21b47ad5a6d1c5b23066aeea.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0d088c5d21b47ad5a6d1c5b23066aeea.png)'
- en: Image by Author
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'We have two collections in our vector database to query: articles and terms.
    We also have the data represented as a graph in RDF format. Since MeSH has an
    API, I am just going to query the API directly to get alternative names and narrower
    concepts for terms.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在向量数据库中有两个集合用于查询：文章和术语。我们还有以RDF格式表示的数据。由于MeSH有一个API，我将直接查询API以获取术语的替代名称和更窄的概念。
- en: Vectorize data in Weaviate
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Weaviate中向量化数据
- en: 'First import the required packages and set up the Weaviate client:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，导入所需的包并设置Weaviate客户端：
- en: '[PRE0]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Read in the PubMed journal articles. I am using [Databricks](https://www.databricks.com/) to
    run this notebook so you may need to change this, depending on where you run it.
    The goal here is just to get the data into a pandas DataFrame.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 读取PubMed期刊文章。我正在使用[Databricks](https://www.databricks.com/)运行这个笔记本，所以你可能需要根据你运行的位置进行更改。这里的目的是只是将数据放入pandas
    DataFrame中。
- en: '[PRE1]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'If you’re running this locally, just do:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在本地运行，只需这样做：
- en: '[PRE2]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Then clean the data up a bit:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 然后稍微清理一下数据：
- en: '[PRE3]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now we need to create a URI for each article and add that in as a new column.
    This is important because the URI is the way we can connect the vector representation
    of an article with the knowledge graph representation of the article.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要为每篇文章创建一个URI并将其添加为新列。这是很重要的，因为URI是我们将文章的向量表示与文章的知识图谱表示连接起来的方式。
- en: '[PRE4]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We also want to create a DataFrame of all of the MeSH terms that are used to
    tag the articles. This will be helpful later when we want to search for similar
    MeSH terms.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还希望创建一个包含用于标记文章的所有MeSH术语的DataFrame。这将在我们想要搜索类似MeSH术语时非常有用。
- en: '[PRE5]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Vectorize the articles DataFrame:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 向量化文章DataFrame：
- en: '[PRE6]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Now vectorize the MeSH terms:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将MeSH术语向量化：
- en: '[PRE7]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: You can, at this point, run semantic search, similarity search, and RAG directly
    against the vectorized dataset. I won’t go through all of that here but you can
    look at the code in my [accompanying notebook](https://github.com/SteveHedden/kg_llm/tree/main/graphRAGapp) to
    do that.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，你可以直接对向量化后的数据集运行语义搜索、相似性搜索和RAG。我不会在这里详细介绍，但你可以在我的[配套笔记本](https://github.com/SteveHedden/kg_llm/tree/main/graphRAGapp)中查看代码以进行这些操作。
- en: Turn data into a knowledge graph
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将数据转换为知识图谱
- en: I am just using the same code we used in the [last post](https://medium.com/towards-data-science/how-to-implement-graph-rag-using-knowledge-graphs-and-vector-databases-60bb69a22759) to
    do this. We are basically turning every row in the data into an “Article” entity
    in our KG. Then we are giving each of these articles properties for title, abstract,
    and MeSH terms. We are also turning every MeSH term into an entity as well. This
    code also adds random dates to each article for a property called date published
    and a random number between 1 and 10 to a property called access. We won’t use
    those properties in this demo. Below is a visual representation of the graph we
    are creating from the data.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是使用了我们在[上一篇文章](https://medium.com/towards-data-science/how-to-implement-graph-rag-using-knowledge-graphs-and-vector-databases-60bb69a22759)中使用的相同代码来做这件事。我们基本上将数据中的每一行都转换成我们
    KG 中的“文章”实体。然后，我们为这些文章提供标题、摘要和 MeSH 术语属性。我们还将每个 MeSH 术语转换成实体。此代码还为每篇文章添加了随机日期作为“发布日期”属性，以及一个介于
    1 和 10 之间的随机数字作为“访问”属性。我们不会在这个演示中使用这些属性。以下是创建的图的视觉表示。
- en: '![](../Images/11837b49f8253363a4e05c8af1453d36.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/11837b49f8253363a4e05c8af1453d36.png)'
- en: 'Here is how to iterate through the DataFrame and turn it into RDF data:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是如何遍历 DataFrame 并将其转换为 RDF 数据的：
- en: '[PRE8]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: OK, so now we have a vectorized version of the data, and a graph (RDF) version
    of the data. Each vector has a URI associated with it, which corresponds to an
    entity in the KG, so we can go back and forth between the data formats.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在我们有了数据的向量化版本和数据的图（RDF）版本。每个向量都与一个 URI 相关联，这对应于 KG 中的一个实体，因此我们可以在数据格式之间来回转换。
- en: Build an app
  id: totrans-55
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建应用
- en: I decided to use [Streamlit](https://streamlit.io/) to build the interface for
    this graph RAG app. Similar to the last blog post, I have kept the user flow the
    same.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我决定使用 [Streamlit](https://streamlit.io/) 来构建这个图 RAG 应用的界面。与上一篇博客文章类似，我保持了相同的用户流程。
- en: '**Search Articles:** First, the user searches for articles using a search term.
    This relies exclusively on the vector database. The user’s search term(s) is sent
    to the vector database and the ten articles nearest the term in vector space are
    returned.'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**搜索文章：**首先，用户使用搜索词搜索文章。这完全依赖于向量数据库。用户的搜索词（们）被发送到向量数据库，并返回与向量空间中该术语最近的十篇文章。'
- en: '**Refine Terms:** Second, the user decides the MeSH terms to use to filter
    the returned results. Since we also vectorized the MeSH terms, we can have the
    user enter a natural language prompt to get the most relevant MeSH terms. Then,
    we allow the user to expand these terms to see their alternative names and narrower
    concepts. The user can select as many terms as they want for their filter criteria.'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**精炼术语：**其次，用户决定使用哪些 MeSH 术语来过滤返回的结果。由于我们也对 MeSH 术语进行了向量化，因此用户可以输入一个自然语言提示来获取最相关的
    MeSH 术语。然后，我们允许用户扩展这些术语以查看它们的替代名称和更窄的概念。用户可以根据他们的过滤标准选择他们想要的任何术语。'
- en: '**Filter & Summarize: **Third, the user applies the selected terms as filters
    to the original ten journal articles. We can do this since the PubMed articles
    are tagged with MeSH terms. Finally, we let the user enter an additional prompt
    to send to the LLM along with the filtered journal articles. This is the generative
    step of the RAG app.'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**过滤与总结：**第三，用户将选定的术语作为过滤器应用于原始的十篇期刊文章。由于 PubMed 文章被标记了 MeSH 术语，我们可以这样做。最后，我们让用户输入一个额外的提示，并将其与过滤后的期刊文章一起发送给
    LLM。这是 RAG 应用的生成步骤。'
- en: 'Let’s go through these steps one at a time. You can see the full app and code
    on my GitHub, but here is the structure:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一步一步地通过这些步骤。您可以在我的 GitHub 上看到完整的应用和代码，但以下是结构：
- en: '[PRE9]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Search Articles
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 搜索文章
- en: First, want to do is implement Weaviate’s [vector similarity search](https://weaviate.io/developers/weaviate/search/similarity).
    Since our articles are vectorized, we can send a search term to the vector database
    and get similar articles back.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，想要实现的是 Weaviate 的[向量相似性搜索](https://weaviate.io/developers/weaviate/search/similarity)。由于我们的文章已经向量化，我们可以将搜索词发送到向量数据库并获取相似的文章。
- en: '![](../Images/661fd13891461eb9ebd591e3bf1625c6.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/661fd13891461eb9ebd591e3bf1625c6.png)'
- en: Image by Author
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'The main function that searches for relevant journal articles in the vector
    database is in app.py:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在 app.py 中，主要的功能是在向量数据库中搜索相关的期刊文章：
- en: '[PRE10]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: This function uses the queries stored in weaviate_queries to establish the Weaviate
    client (initialize_weaviate_client) and search for articles (query_weaviate_articles).
    Then we display the returned articles in a table, along with their abstracts,
    distance (how close they are to the search term), and the MeSH terms that they
    are tagged with.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这个函数使用存储在weaviate_queries中的查询来建立Weaviate客户端（initialize_weaviate_client）并搜索文章（query_weaviate_articles）。然后我们在表格中显示返回的文章，包括它们的摘要、距离（它们与搜索词的接近程度）以及它们标记的MeSH术语。
- en: 'The function to query Weaviate in weaviate_queries.py looks like this:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在weaviate_queries.py中查询Weaviate的函数看起来是这样的：
- en: '[PRE11]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: As you can see, I put a limit of ten results here just to make it simpler, but
    you can change that. This is just using vector similarity search in Weaviate to
    return relevant results.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我这里只设置了十个结果，只是为了使它更简单，但您可以更改这个设置。这只是在Weaviate中使用向量相似性搜索来返回相关结果。
- en: 'The end result in the app looks like this:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在应用中的最终结果看起来是这样的：
- en: '![](../Images/da21c92b5abfe58651cd0e4c93218d96.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/da21c92b5abfe58651cd0e4c93218d96.png)'
- en: Image by Author
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: As a demo, I will search the term “treatments for mouth cancer”. As you can
    see, 10 articles are returned, mostly relevant. This demonstrates both the strengths
    and weaknesses of vector based retrieval.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 作为演示，我将搜索“口腔癌的治疗”这个术语。如您所见，返回了10篇文章，大部分是相关的。这展示了基于向量的检索的优点和弱点。
- en: The strength is that we can build a semantic search functionality on our data
    with minimal effort. As you can see above, all we did was set up the client and
    send the data to a vector database. Once our data has been vectorized, we can
    do semantic searches, similarity searches, and even RAG. I have put some of that
    in the notebook accompanying this post, but there’s a lot more in Weaviate’s [official
    docs](https://weaviate.io/developers/weaviate).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 优点是我们可以用最少的努力在我们的数据上构建语义搜索功能。如您所见，我们只是设置了客户端并将数据发送到向量数据库。一旦我们的数据被向量化，我们就可以进行语义搜索、相似性搜索，甚至RAG。我在这篇帖子的配套笔记本中放了一些这样的例子，但Weaviate的[官方文档](https://weaviate.io/developers/weaviate)中还有很多。
- en: The weakness of vector based retrieval, as I mentioned above are that they are
    black-box and struggle with factual knowledge. In our example, it looks like most
    of the articles are about some kind of treatment or therapy for some kind of cancer.
    Some of the articles are about mouth cancer specifically, some are about a sub-type
    of mouth cancer like gingival cancer (cancer of the gums), and palatal cancer
    (cancer of the palate). But there are also articles about nasopharyngeal cancer
    (cancer of the upper throat), mandibular cancer (cancer of the jaw), and esophageal
    cancer (cancer of the esophagus). None of these (upper throat, jaw, or esophagus)
    are considered mouth cancer. It is understandable why an article about a specific
    cancer radiation therapy for nasopharyngeal neoplasms would be considered similar
    to the prompt “treatments for mouth cancer” but it may not be relevant if you
    are only looking for treatments for mouth cancer. If we were to plug these ten
    articles directly into our prompt to the LLM and ask it to “summarize the different
    treatment options,” we would be getting incorrect information.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 基于向量的检索的弱点，如我上面提到的，是它们是黑盒的，并且难以处理事实性知识。在我们的例子中，看起来大部分文章都是关于某种癌症的治疗或疗法。有些文章是关于特定类型的口腔癌，有些是关于牙龈癌（牙龈的癌症）或腭癌（硬腭的癌症）。但也有关于鼻咽癌（上咽部的癌症）、下颌癌（颌部的癌症）和食管癌（食道的癌症）的文章。这些（上咽部、颌部或食道）都不被认为是口腔癌。一个关于鼻咽部肿瘤的特定癌症放射治疗的文章被认为是与提示“口腔癌的治疗”相似，但如果您只寻找口腔癌的治疗方法，这可能并不相关。如果我们直接将这些十篇文章放入我们的LLM提示中并要求它“总结不同的治疗方法”，我们会得到错误的信息。
- en: The purpose of RAG is to give an LLM a very specific set of additional information
    to better answer your question — if that information is incorrect or irrelevant,
    it can lead to misleading responses from the LLM. This is often referred to as
    “context poisoning”. What is especially dangerous about context poisoning is that
    the response isn’t necessarily factually inaccurate (the LLM may accurately summarize
    the treatment options we feed it), and it isn’t necessarily based on an inaccurate
    piece of data (presumably the journal articles themselves are accurate), it’s
    just using the wrong data to answer your question. In this example, the user could
    be reading about how to treat the wrong kind of cancer, which seems very bad.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: RAG 的目的是给 LLM 提供一组非常具体的附加信息，以便更好地回答你的问题——如果这些信息是错误的或不相关的，可能会导致 LLM 给出误导性的回答。这通常被称为“上下文中毒”。上下文中毒特别危险的地方在于，回答并不一定是事实上的不准确（LLM
    可能会准确地总结我们给它提供的治疗方案），也不一定是基于不准确的数据（假设期刊文章本身是准确的），它只是使用了错误的数据来回答你的问题。在这个例子中，用户可能会读到如何治疗错误类型的癌症，这看起来非常糟糕。
- en: Refine Terms
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 精炼术语
- en: KGs can help improve the accuracy of responses and reduce the likelihood of
    context poisoning by refining the results from the vector database. The next step
    is for selecting what MeSH terms we want to use to filter the articles. First,
    we do another vector similarity search against the vector database but on the
    Terms collection. This is because the user may not be familiar with the MeSH controlled
    vocabulary. In our example above, I searched for, “therapies for mouth cancer”,
    but “mouth cancer” is not a term in MeSH — they use “Mouth Neoplasms”. We want
    the user to be able to start exploring the MeSH terms without having a prior understanding
    of them — this is good practice regardless of the metadata used to tag the content.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱（KGs）可以通过精炼向量数据库的结果来帮助提高回答的准确性，并减少上下文中毒的可能性。下一步是选择我们想要用于过滤文章的 MeSH 术语。首先，我们在术语集合上对向量数据库进行另一个向量相似度搜索。这是因为用户可能不熟悉
    MeSH 控制词汇。在我们上面的例子中，我搜索了“口腔癌症的治疗”，但“口腔癌症”不是 MeSH 中的一个术语——他们使用“Mouth Neoplasms”。我们希望用户能够在没有事先了解它们的情况下开始探索
    MeSH 术语——这无论使用什么元数据来标记内容都是良好的实践。
- en: '![](../Images/1ebae549fabd5554df6047dd55502b32.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1ebae549fabd5554df6047dd55502b32.png)'
- en: Image by Author
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'The function to get relevant MeSH terms is nearly identical to the previous
    Weaviate query. Just replace Article with term:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 获取相关 MeSH 术语的函数几乎与之前的 Weaviate 查询相同。只需将文章替换为术语：
- en: '[PRE12]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Here is what it looks like in the app:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在应用中，它看起来是这样的：
- en: '![](../Images/f6694e6087065fd4ffc0a1ee91109e10.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f6694e6087065fd4ffc0a1ee91109e10.png)'
- en: Image by Author
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: As you can see, I searched for “mouth cancer” and the most similar terms were
    returned. Mouth cancer was not returned, as that is not a term in MeSH, but Mouth
    Neoplasms is on the list.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我搜索了“口腔癌症”，返回了最相似术语。口腔癌症没有返回，因为这不是 MeSH 中的一个术语，但“Mouth Neoplasms”在列表中。
- en: The next step is to allow the user to expand the returned terms to see alternative
    names and narrower concepts. This requires querying the [MeSH API](https://id.nlm.nih.gov/mesh/).
    This was the trickiest part of this app for a number of reasons. The biggest problem
    is that Streamlit requires that everything has a unique ID but MeSH terms can
    repeat — if one of the returned concepts is a child of another, then when you
    expand the parent you will have a duplicate of the child. I think I took care
    of most of the big issues and the app should work, but there are probably bugs
    to find at this stage.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是允许用户扩展返回的术语，以查看替代名称和更窄的概念。这需要查询 [MeSH API](https://id.nlm.nih.gov/mesh/)。这是这个应用中最棘手的部分，原因有很多。最大的问题是
    Streamlit 要求所有内容都有一个唯一的 ID，但 MeSH 术语可以重复——如果返回的概念是另一个概念的子项，那么当你展开父项时，你将会有一个子项的重复。我想我已经解决了大部分大问题，应用应该可以工作，但在这个阶段可能还有要发现的错误。
- en: 'The functions we rely on are found in rdf_queries.py. We need one to get the
    alternative names for a term:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们依赖的函数在 rdf_queries.py 中找到。我们需要一个函数来获取术语的替代名称：
- en: '[PRE13]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: We also need functions to get the narrower (child) concepts for a given term.
    I have two functions that achieve this — one that gets the immediate children
    of a term and one recursive function that returns all children of a given depth.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要获取给定术语的更窄（子）概念的功能。我有两个实现这一目标的功能——一个获取术语的直接子项，另一个是递归函数，它返回给定深度的所有子项。
- en: '[PRE14]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'The other important part of step 2 is to allow the user to select terms to
    add to a list of “Selected Terms”. These will appear in the sidebar on the left
    of the screen. There are a lot of things that can improve this step like:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 第 2 步的另一个重要部分是允许用户选择要添加到“已选术语”列表中的术语。这些术语将出现在屏幕左侧的侧边栏中。有很多事情可以改进这一步，比如：
- en: There is no way to clear all but you can clear the cache or refresh the browser
    if needed.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有清除所有内容的方法，但您可以在需要时清除缓存或刷新浏览器。
- en: There is no way to ‘select all narrower concepts’ which would be helpful.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有选择“选择所有更窄概念”的方法，这会有所帮助。
- en: There is no option to add rules for filtering. Right now, we are just assuming
    that the article must contain term A OR term B OR term C etc. The rankings at
    the end are based on the number of terms the articles are tagged with.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目前没有添加过滤规则的选项。目前，我们只是假设文章必须包含术语 A 或术语 B 或术语 C 等。最后的排名是基于文章被标记的术语数量。
- en: 'Here is what it looks like in the app:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在应用程序中的样子：
- en: '![](../Images/f44294fd9f437c8ed1931bffbbc27dfa.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f44294fd9f437c8ed1931bffbbc27dfa.png)'
- en: Image by Author
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: I can expand Mouth Neoplasms to see the alternative names, in this case, “Cancer
    of Mouth”, along with all of the narrower concepts. As you can see, most of the
    narrower concepts have their own children, which you can expand as well. For the
    purposes of this demo, I am going to select all children of Mouth Neoplasms.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以展开口腔肿瘤以查看替代名称，在这种情况下，“口腔癌”，以及所有更窄的概念。如您所见，大多数更窄的概念都有自己的子项，您也可以展开它们。出于这个演示的目的，我将选择口腔肿瘤的所有子项。
- en: '![](../Images/78675520453f0bcb36632ce51c95c729.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/78675520453f0bcb36632ce51c95c729.png)'
- en: Image by Author
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: This step is important not just because it allows the user to filter the search
    results, but also because it is a way for the user to explore the MeSH graph itself
    and learn from it. For example, this would be the place for the user to learn
    that nasopharyngeal neoplasms are not a subset of mouth neoplasms.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这一步很重要，不仅因为它允许用户过滤搜索结果，而且因为它也是用户探索 MeSH 图本身并从中学习的一种方式。例如，这将是在用户学习鼻咽部肿瘤不是口腔肿瘤子集的地方。
- en: Filter & Summarize
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 过滤 & 摘要
- en: Now that you’ve got your articles and your filter terms, you can apply the filter
    and summarize the results. This is where we bring the original 10 articles returned
    in step one together with the refined list of MeSH terms. We allow the user to
    add additional context to the prompt before sending it to the LLM.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经获得了您的文章和过滤术语，您可以对结果应用过滤并进行总结。这是我们将第一步返回的原始 10 篇文章与经过精炼的 MeSH 术语列表结合在一起的地方。我们允许用户在将提示发送到
    LLM 之前添加额外的上下文。
- en: '![](../Images/bc0b8691e652aae21554c1c9991238c8.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bc0b8691e652aae21554c1c9991238c8.png)'
- en: Image by Author
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: The way we do this filtering is that we need to get the URIs for the 10 articles
    from the original search. Then we can query our knowledge graph for which of those
    articles have been tagged with the associated MeSH terms. Additionally, we save
    the abstracts of these articles for use in the next step. This would be the place
    where we could filter based on access control or other user-controlled parameters
    like author, filetype, date published, etc. I didn’t include any of that in this
    app but I did add in properties for access control and date published in case
    we want to add that in this UI later.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们进行这种过滤的方式是，我们需要从原始搜索中获取 10 篇文章的 URI。然后我们可以查询我们的知识图，看看哪些文章被标记了相关的 MeSH 术语。此外，我们保存这些文章的摘要以供下一步使用。这将是我们可以根据访问控制或其他用户控制的参数（如作者、文件类型、发布日期等）进行过滤的地方。我没有在这个应用程序中包含任何这些，但我添加了访问控制和发布日期的属性，以防我们想在稍后的
    UI 中添加这些。
- en: 'Here is what the code looks like in app.py:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在 app.py 中的代码样子：
- en: '[PRE15]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'This uses the function query_rdf in the rdf_queries.py file. That function
    looks like this:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在 rdf_queries.py 文件中使用的 query_rdf 函数。该函数看起来是这样的：
- en: '[PRE16]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: As you can see, this function also converts the MeSH terms to URIs so we can
    filter using the graph. Be careful in the way you convert terms to URIs and ensure
    it aligns with the other functions.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，此函数还将 MeSH 术语转换为 URI，这样我们就可以使用图进行过滤。在将术语转换为 URI 的方式上要小心，并确保它与其他函数保持一致。
- en: 'Here is what it looks like in the app:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在应用程序中的样子：
- en: '![](../Images/36e2b1ff4431585c6014d7625a28b50b.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/36e2b1ff4431585c6014d7625a28b50b.png)'
- en: Image by Author
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: As you can see, the two MeSH terms we selected from the previous step are here.
    If I click “Filter Articles,” it will filter the original 10 articles using our
    filter criteria in step 2\. The articles will be returned with their full abstracts,
    along with their tagged MeSH terms (see image below).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们从前一步选出的两个MeSH术语在这里。如果点击“过滤文章”，它将使用我们在第二步中设置的过滤标准过滤原始的10篇文章。文章将返回其完整的摘要，以及其标记的MeSH术语（见下图）。
- en: '![](../Images/c18b97f6bd5391783cfa03b64fe33e41.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c18b97f6bd5391783cfa03b64fe33e41.png)'
- en: Image by Author
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: There are 5 articles returned. Two are tagged with “mouth neoplasms,” one with
    “gingival neoplasms,” and two with “palatal neoplasms”.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 返回了5篇文章。其中两篇被标记为“口腔肿瘤”，一篇被标记为“牙龈肿瘤”，还有两篇被标记为“硬腭肿瘤”。
- en: 'Now that we have a refined list of articles we want to use to generate a response,
    we can move to the final step. We want to send these articles to an LLM to generate
    a response but we can also add in additional context to the prompt. I have a default
    prompt that says, “Summarize the key information here in bullet points. Make it
    understandable to someone without a medical degree.” For this demo, I am going
    to adjust the prompt to reflect our original search term:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经有一个我们想要用来生成响应的精选文章列表，我们可以进入最后一步。我们希望将这些文章发送给一个LLM来生成响应，但我们也可以在提示中添加额外的上下文。我有一个默认提示说：“在这里用项目符号总结关键信息。使其对没有医学学位的人也能理解。”对于这个演示，我将调整提示以反映我们的原始搜索词：
- en: '![](../Images/8589c5d8c533646194ce7c73e8b3064f.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8589c5d8c533646194ce7c73e8b3064f.png)'
- en: 'The results are as follows:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 结果如下：
- en: '![](../Images/f454ff6d4e690b18662e6380429ec52e.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f454ff6d4e690b18662e6380429ec52e.png)'
- en: The results look better to me, mostly because I know that the articles we are
    summarizing are, presumably, about treatments for mouth cancer. The dataset doesn’t
    contain the actual journal articles, just the abstracts. So these results are
    just summaries of summaries. There may be some value to this, but if we were building
    a real app and not just a demo, this is the step where we could incorporate the
    full text of the articles. Alternatively, this is where the user/researcher would
    go read these articles themselves, rather than relying exclusively on the LLM
    for the summaries.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 结果看起来更好，主要是因为我知道我们正在总结的文章可能是关于口腔癌治疗的。数据集不包含实际的期刊文章，只有摘要。因此，这些结果只是摘要的摘要。这可能有一些价值，但如果我们正在构建一个真正的应用程序而不是仅仅是一个演示，这就是我们可以整合文章全文的步骤。或者，这就是用户/研究人员会去阅读这些文章的步骤，而不是完全依赖LLM进行总结。
- en: Conclusion
  id: totrans-127
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结论
- en: This tutorial demonstrates how combining vector databases and knowledge graphs
    can significantly enhance RAG applications. By leveraging vector similarity for
    initial searches and structured knowledge graph metadata for filtering and organization,
    we can build a system that delivers accurate, explainable, and domain-specific
    results. The integration of MeSH, a well-established controlled vocabulary, highlights
    the power of domain expertise in curating metadata, which ensures that the retrieval
    step aligns with the unique needs of the application while maintaining interoperability
    with other systems. This approach is not limited to medicine — its principles
    can be applied across domains wherever structured data and textual information
    coexist.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 本教程演示了如何结合向量数据库和知识图谱可以显著增强RAG应用。通过利用向量相似性进行初始搜索和结构化知识图谱元数据进行过滤和组织，我们可以构建一个提供准确、可解释和特定领域结果的系统。将MeSH（一个建立已久的受控词汇）集成其中，突出了领域专业知识在编制元数据方面的力量，这确保了检索步骤与应用的独特需求保持一致，同时保持与其他系统的互操作性。这种方法不仅限于医学——其原则可以应用于任何存在结构化数据和文本信息的领域。
- en: This tutorial underscores the importance of leveraging each technology for what
    it does best. Vector databases excel at similarity-based retrieval, while knowledge
    graphs shine in providing context, structure, and semantics. Additionally, scaling
    RAG applications demands a metadata layer to break down data silos and enforce
    governance policies. Thoughtful design, rooted in domain-specific metadata and
    robust governance, is the path to building RAG systems that are not only accurate
    but also scalable.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 本教程强调了利用每种技术发挥其最佳作用的重要性。向量数据库在基于相似性的检索方面表现出色，而知识图谱在提供上下文、结构和语义方面表现出色。此外，扩展RAG应用需要元数据层来打破数据孤岛并执行治理策略。基于特定领域元数据和强大治理的深思熟虑的设计是构建既准确又可扩展的RAG系统的途径。
