- en: 'Understanding Matrices | Part 3: Matrix Transpose'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/understanding-matrices-part-3-matrix-transpose/](https://towardsdatascience.com/understanding-matrices-part-3-matrix-transpose/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1753219251677" class="mdspan-comment">In</mdspan> the first
    2 stories of this series [[1]](https://towardsdatascience.com/understanding-matrices-part-1-matrix-vector-multiplication/),
    [[2]](https://towardsdatascience.com/understanding-matrices-part-2-matrix-matrix-multiplication/),
    we:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Introduced X-way interpretation of matrices
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Observed physical meaning and special cases of matrix-vector multiplication
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Looked at the physical meaning of matrix-matrix multiplication
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Observed its behavior on several special cases of matrices
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this story, I want to share my thoughts about the transpose of a matrix,
    denoted as *A*^(*T*), the operation that just flips the content of the square
    table around its diagonal.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ea6046ee5f8ae9e92c1dfdde366ca75e.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
- en: '*An example of a 3×4 matrix “A”, and its transpose “A^T“.*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: 'In contrast to many other operations on matrices, it is quite easy to transpose
    a given matrix ‘*A*‘ on paper. However, the physical meaning of that often stays
    behind. On the other hand, it is not so clear why the following transpose-related
    formulas actually work:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: (*AB*)^(*T*) = *B^TA^T*,
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (*y*, *Ax*) = (*x*, *A^Ty*),
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (*A^TA*)^(*T*) = *A^TA*.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this story, I am going to give my interpretation of the transpose operation,
    which, among others, will show why the mentioned formulas are actually the way
    they are. So let’s dive in!
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: 'But first of all, let me remind all the definitions that are used throughout
    the stories of this series:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: Matrices are denoted with uppercase (like ‘*A*‘, ‘*B*‘), while vectors and scalars
    are denoted with lowercase (like ‘*x*‘, ‘*y*‘ or ‘*m*‘, ‘*n*‘).
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|*x*| – is the length of vector ‘*x*‘,'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*rows*(*A*) – number of rows of matrix ‘*A*‘,'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*columns*(*A*) – number of columns of matrix ‘*A*‘,'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*A^T* – the transpose of matrix ‘*A*‘,'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*a^T[i]*[,*j*] – the value on the *i*-th row and *j*-th column of the transposed
    matrix *A^T*,'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (*x*, *y*) – dot product of vectors ‘*x*‘ and ‘*y*‘ (i.e. “*x*[1]*y*[1] + *x*[2]*y*[2]
    + … + *x[n]y[n]*“).
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Transpose vs. X-way interpretation
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In [part 1](https://towardsdatascience.com/understanding-matrices-part-1-matrix-vector-multiplication/)
    of this series – “matrix-vector multiplication” [1], I introduced the X-way interpretation
    of matrices. Let’s recall it with an example:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1543b05f683250d428f6dcbb50ddbfd2.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: '*An example of a matrix and corresponding X-diagram. All arrows in the diagram
    are directed from right to left. The arrow which starts at item ‘j’ on the right
    and finishes at item ‘i’ on the left corresponds to cell “a[i,j]” of the matrix.*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: From there, we also remember that the left stack of the X-diagram of ‘*A*‘ can
    be associated with rows of matrix ‘*A*‘, while its right stack can be associated
    with the columns.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ed9d27bc5976fe2f14159bac5b1ade2b.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
- en: '*In the X-diagram of matrix ‘A’, the values which go from the 3’rd from the
    top item of the right stack are the values of 3’rd column of ‘A’ (highlighted
    in red).'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: At the same time, the values which come to the 2’nd from the top item of the
    left stack are the values of 2’nd row of ‘A’ (highlighted in purple).*
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Now, if transposing a matrix is actually flipping the table around its main
    diagonal, it means that all the columns of ‘*A*‘ become rows in ‘*A^T*‘, and vice
    versa.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a7723103601b1fd98018b2703f07115a.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
- en: '*The original matrix ‘A’ and its transpose ‘A^T‘. We see how the 3’rd column
    of ‘A’ becomes the 3’rd row in ‘A^T‘.*'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: 'And if transposing means changing the places of rows and columns, then perhaps
    we can do the same on the X-diagram? Thus, to swap rows and columns of the X-diagram,
    we should flip it horizontally:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4efa464969602c55ac7799d957284b2d.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
- en: '*Horizontal flip of the X-diagram of ‘A’ corresponds to the transpose of ‘A’.
    We see that the values adjacent to 3’rd from top item of right stack of original
    X-diagram (3’rd column of ‘A’), which are [9, 7, 14], are the same as values adjacent
    to 3’rd from top item of left stack of the flipped X-diagram (3’rd row of A^T).*'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Will the horizontally flipped X-diagram of ‘*A*‘ represent the X-diagram of
    ‘*A^T*‘? We know that cell “*a[i]*[,*j*]” is present in the X-diagram as the arrow
    starting from the *j*‘th item of the left stack, and directed towards the *i*‘th
    item of the right stack. After flipping horizontally, that same arrow will start
    now from the *i*‘th item of the right stack and will be directed to the *j*‘th
    item of the left stack.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f0e5e0abd6b393488cb9219639dfbd40.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
- en: '*The value “a[1,3] = 9″ equals the value “a^T[3,1] = 9″.*'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Which means that the definition of transpose “*a[i]*[,*j*] = *a^T*[*j*,*i*]”
    does hold.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: Concluding this chapter, we have seen that transposing matrix ‘*A*‘ is the same
    as horizontally flipping its X-diagram.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Transposing a chain of matrices
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s see how interpreting *A^T* as a horizontal flip of its X-diagram will
    help us to uncover the physical meaning of some transpose-related formulas. Let’s
    start with the following:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: (AB)^T = B^T A^T
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: which says that transposing the multiplication “*A***B*” is the same as multiplying
    transpositions *A^T* and *B^T*, but in reverse order. Now, why does the order
    actually become reversed?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 'From [part 2](https://towardsdatascience.com/understanding-matrices-part-2-matrix-matrix-multiplication/)
    of this series – “matrix-matrix multiplication” [2], we remember that the matrix
    multiplication “*A***B*” can be interpreted as a concatenation of X-diagrams of
    ‘*A*‘ and ‘*B*‘. Thus, having:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '*y* = (*AB*)*x* = *A**(*Bx*)'
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: will force the input vector ‘*x*‘ to go at first through the transformation
    of matrix ‘*B*‘, and then the intermediate result will go through the transformation
    of matrix ‘*A*‘, after which the output vector ‘*y*‘ will be obtained.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5a63b45f713a9a3702947d9ac8c98944.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
- en: '*Moving input vector ‘x’ from right to left, through X-diagrams of ‘A’ and
    ‘B’. At first, after moving through the transformation of ‘B’, it becomes an intermediate
    vector ‘t = Bx’, which, after moving through the transformation of ‘A’, becomes
    the final vector ‘y = At = A(Bx)’.*'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 'And now the physical meaning of the formula “(*AB*)^(*T*) = *B^TA^T*” becomes
    clear: flipping horizontally the X-diagram of the product “*A***B*” will obviously
    flip the separate X-diagrams of ‘*A*‘ and the one of ‘*B*‘, but it also will reverse
    their order:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eac2134e14e6c8b29658a78d5fe1ef0a.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
- en: '*Flipping horizontally 2 adjacent figures ‘A’ and ‘B’ will result in the horizontal
    flip of both figures separately (step 1), as well as in swapping their order (step
    2).*'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: In the previous story [[2]](https://towardsdatascience.com/understanding-matrices-part-2-matrix-matrix-multiplication/),
    we have also seen that a cell *c[i]*[,*j*] of the product matrix ‘*C*=*A***B*‘
    describes all the possible ways in which *x[j]* of the input vector ‘*x*‘ can
    affect *y[i]* of the output vector ‘*y* = (*AB*)*x*‘.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6ee087f73f1ecc8b2da6687b08438eef.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
- en: '*Concatenation of X-diagrams of ‘A’ and ‘B’, which corresponds to the product
    “A*B”. All 4 possible paths by which the input value ‘x[4]‘ can affect the output
    value ‘y[2]‘ are highlighted in red.*'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, when transposing the product “*C*=*A***B*“, thus calculating matrix *C^T*,
    we want to have the mirroring effect – so *c^T*[*j*,*i*] will describe all possible
    ways by which *y[j]* can affect *x[i]*. And in order to get that, we should just
    flip the concatenation diagram:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ad85b8ebb40baafeba197738500f9545.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
- en: '*If “C = A*B”, then the value of “c[2,4]” corresponds to the sum of all 4 possible
    paths from ‘x[4]‘ to ‘y[2]‘ (highlighted in red). At the same time, it is equal
    to “c[2,4] = c^T[4,2]“, which corresponds to the sum of the same 4 possible paths
    from ‘y[2]‘ to ‘x[4]‘, in the horizontally flipped concatenation of “A*B”, which
    is “B^TA^T“.*'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: 'Of course, this interpretation can be generalized on transposing the product
    of several matrices:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: (ABC)^T = C^T B^T A^T
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/54a653645f40e65b6e8667845537f66d.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
- en: '*Horizontally flipping 3 adjacent items ‘A’, ‘B’, and ‘C’ (not necessarily
    matrices), and reversing their order will have the effect of horizontally flipping
    the sequence “ABC” itself.*'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: Why *A^TA* is always symmetrical, for any matrix *A*
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A symmetrical matrix ‘*S*‘ is such an *n*x*n* square matrix, where for any indexes
    *i*, *j* ∈ [1..*n*], we have ‘*s[i]*[,*j*] = *s[j]*[,*i*]‘. This means that it
    is symmetrical upon its diagonal, as well as that transposing it will have no
    effect.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/47170573366da93e16113a51fb6d5484.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
- en: '*An example of a 4×4 symmetrical matrix. All values are symmetrical along the
    main diagonal. For example, “a[3,1] = a[1,3] = 16″.*'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: 'We see that transposing a symmetrical matrix will have no effect. So, a matrix
    ‘*S*‘ is symmetrical if and only if:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: S^T = S
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: 'Similarly, the X-diagram of a symmetrical matrix ‘*S*‘ has the property that
    it is not changed after a horizontal flip. That is because for any arrow *s[i]*[,*j*]
    we have an equal arrow *s[j]*[,*i*] there:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/809f3a8b19cce49b3f56e632116fa7cb.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
- en: '*An example of a 3×3 symmetrical matrix ‘S’ and its X-diagram. We have there
    ‘s[1,2] = s[2,1] = 4′. Corresponding arrows are highlighted.*'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: 'In matrix analysis, we have a formula stating that for any matrix ‘*A*‘ (not
    necessarily symmetrical), the product *A^TA* is always a symmetrical matrix. In
    other words:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: (A^T A)^T = A^T A
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: 'It is not straightforward to feel the correctness of this formula if looking
    at matrix multiplication in the traditional way. But its correctness becomes obvious
    if looking at matrix multiplication as the concatenation of their X-diagrams:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/11dc57ac67db3463b025aca4da7985aa.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
- en: '*Concatenation of ‘A^T‘ and ‘A’, which is a concatenation of two mirrored objects,
    is always a symmetrical object. Flipping such a concatenation horizontally will
    have no effect.*'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: What will happen if an arbitrary matrix ‘*A*‘ is concatenated with its horizontal
    flip *A^T*? The result *A^TA* will be symmetrical, as after a horizontal flip,
    the right factor ‘*A*‘ comes to the left side and is flipped, becoming *A^T*,
    while the left factor *A*^(*T*) comes to the right side and is also flipped, becoming
    ‘*A*‘.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: This is why for any matrix ‘*A*‘, the product *A^TA* is always symmetrical.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: Understanding why (*y*, *Ax*) = (*x*, *A^Ty*)
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There is another formula in matrix analysis, stating that:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: (y, Ax) = (x, A^T y)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: 'where “(*u*, *v*)” is the dot product of vectors ‘*u*‘ and ‘*v*‘:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: (u,v) = u_1 v_1 + u_2 v_2 + \dots + u_n v_n
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: 'The dot product can be calculated only for vectors of equal length. Also, the
    dot product is not a vector but a single number. If trying to illustrate the dot
    product “(*u*, *v*)” in a way similar to X-diagrams, we can draw something like
    this:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/38668158bc02b4a89d61cd4cc87a4d9b.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
- en: '*As the dot product is the accumulation of terms u[i]*v[i] , we can present
    it as the sum of all possible paths from the right endpoint to the left one.*'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, what does the expression (*y*, *Ax*) actually mean? It is the dot product
    of vector ‘*y*‘ by the vector “*Ax*” (or by vector ‘*x*‘, which went through the
    transformation of “*A*“). For the expression (*y*, *Ax*) to make sense, we should
    have:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: '|*x*| = *columns*(*A*), and'
  id: totrans-105
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '|*y*| = *rows*(*A*).'
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'At first, let’s calculate (*y*, *Ax*) formally. Here, every value *y[i]* is
    multiplied by the *i*-th value of the vector *Ax*, denoted here as “*(Ax*)[*i*]“:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: (Ax)_i = a_{i,1}x_1 + a_{i,2}x_2 + \dots + a_{i,m}x_m
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: 'After one multiplication, we will have:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: y_i(Ax)_i = y_i a_{i,1}x_1 + y_i a_{i,2}x_2 + \dots + y_i a_{i,m}x_m
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: 'And after summing all the terms by “*i* ∈ [1, *n*]”, we will have:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: \begin{split}
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: (y, Ax) = y_1(Ax)_1 + y_2(Ax)_2 + \dots + y_n(Ax)_n = \\
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: = y_1 a_{1,1}x_1 + y_1 a_{1,2}x_2 + &\dots + y_1 a_{1,m}x_m + \\
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: + y_2 a_{2,1}x_1 + y_2 a_{2,2}x_2 + &\dots + y_2 a_{2,m}x_m + \\
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: '&\vdots \\'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: + y_n a_{n,1}x_1 + y_n a_{n,2}x_2 + &\dots + y_n a_{n,m}x_m
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: \end{split}
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: which clearly shows that in the product (*y*, *Ax*), every cell *a*[*i*,*j*]
    of the matrix “*A*” participates exactly once, together with the factors *y[i]*
    and *x[j]*.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: 'Now let’s move to X-diagrams. If we want to draw something like an X-diagram
    of vector “*Ax*“, we can do it in the following way:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/18776473a250b84be4eac8db7b335199.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
- en: '*The product “Ax” is a vector of length equal to “|Ax| = rows(A)”, while “|x|
    = columns(A)”. Here, values of vector “x” are attached from the right side, and
    on the left side, we receive values of the result vector “Ax”.*'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, if we want to draw the dot product (*y*, *Ax*), we can do it this way:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/32f3c3e96922614a8d7145bfa6320ea2.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
- en: '*Values of vector ‘y’ are attached to the left side of the X-diagram of “A”,
    while values of vector ‘x’ remain attached to its right side.*'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: On this diagram, let’s see how many ways there are to reach the left endpoint
    from the right one. The path from right to left can pass through any arrow of
    *A*‘s X-diagram. If passing through a certain arrow *a[i]*[,*j*], it will be the
    path composed of *x[j]*, the arrow *a[i]*[,*j*], and *y[i]*.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c74efa6a993bf2099c4c7ec2d3a60e53.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
- en: '*If a path from right to left passes through arrow “a[4,2]” of the X-diagram
    of “A”, then it also passes through values “y[4]” and “x[2]“.*'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: And this exactly matches the formal behavior of (*y*, *Ax*) derived a bit above,
    where (*y*, *Ax*) was the sum of all triples of the form “*y[i]***a[i]*[,*j*]**x[j]*“.
    And we can conclude here that if looking at (*y*, *Ax*) in the X-interpretation,
    it is equal to the sum of all possible paths from the right endpoint to the left
    one.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: Now, what will happen if we flip this entire diagram horizontally?
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5ab916629b8901d0aa4a9f692ccb472c.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
- en: '*Horizontally flipping the X-diagram of “(y, Ax)” results in the X-diagram
    of “(x, A*^(*T*)*y)”.*'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: 'From the algebraic perspective, the sum of all paths from right to left will
    not change, as all participating terms remain the same. But looking from the geometrical
    perspective, the vector ‘*y*‘ goes to the right part, the vector ‘*x*‘ comes to
    the left part, and the matrix “*A*” is being flipped horizontally; in other words,
    “*A*” is transposed. So the flipped X-diagram corresponds to the dot product of
    vectors “*x*” and “*A^Ty*” now, or has the value of (*x*, *A^Ty*). We see that
    both (y, *Ax*) and (*x*, *A^Ty*) represent the same sum, which proves that:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 从代数角度来看，从右到左所有路径的总和不会改变，因为所有参与项都保持不变。但从几何角度来看，向量‘*y*’移动到右侧，向量‘*x*’移动到左侧，矩阵“*A*”正在水平翻转；换句话说，“*A*”是转置的。因此，翻转的X图现在对应于向量“*x*”和“*A^Ty*”的点积，或者具有(*x*,
    *A^Ty*)的值。我们看到(y, *Ax*)和(*x*, *A^Ty*)代表相同的总和，这证明了：
- en: \[\begin{equation*}
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: \[\begin{equation*}
- en: (y, Ax) = (x, A^T y)
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: (y, Ax) = (x, A^T y)
- en: \end{equation*}\]
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation*}\]
- en: '* * *'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: That’s all I wanted to present in regard to the matrix transpose operation.
    I hope that the visual methods illustrated above will help all of us to gain a
    better grasp of various matrix operations.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 关于矩阵转置操作，我想说的就这些。我希望上述展示的视觉方法能帮助我们更好地理解各种矩阵运算。
- en: In the next (and probably the last) story of this series, I will address inverting
    matrices, and how it can be visualized by X-interpretation. We will see why formulas
    like “(*AB*)^(-1) = *B*^(-1)*A*^(-1)” are the way they actually are, and we will
    observe how the inverse works on several special types of matrices.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 在本系列的下一（可能是最后一）个故事中，我将讨论矩阵的求逆，以及它如何通过X解释来可视化。我们将看到为什么像“(*AB*)^(-1) = *B*^(-1)*A*^(-1)”这样的公式实际上是这样的，我们将观察逆矩阵在几种特殊类型的矩阵上的作用。
- en: So see you in the next story!
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个故事见！
