- en: Testing the Power of Multimodal AI Systems in Reading and Interpreting Photographs,
    Maps, Charts and More
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/testing-the-power-of-multimodal-ai-systems-in-reading-and-interpreting-photographs-maps-charts-and-more/](https://towardsdatascience.com/testing-the-power-of-multimodal-ai-systems-in-reading-and-interpreting-photographs-maps-charts-and-more/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1742844644136" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It’s no news that artificial intelligence has made huge strides in recent years,
    particularly with the advent of multimodal models that can process and create
    both text and images, and some very new ones that also process and produce audio
    and video. I think that these AI systems have the potential to revolutionize data
    analysis, robotics, and even everyday tasks like navigation and information extraction
    from visuals. Along these lines, I recently posed myself the following question:'
  prefs: []
  type: TYPE_NORMAL
- en: Can multimodal AI systems consisting in large language models with vision capabilities
    understand figures that contain information, then process it and produce summaries,
    explanations, object identification, etc.?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Although this is in itself a question that would require a whole research project
    to be properly addressed, I was extremely curious about it, so I needed to get
    at least a rough approximation to my question. Therefore, I carried out some tests
    on how much OpenAI’s vision-enhanced models understand about photographs, screenshots
    and other images containing plots, charts, shots from a driver’s position or mimicking
    a robot’s onboard camera, and even molecular structures.
  prefs: []
  type: TYPE_NORMAL
- en: More specifically, I tried the GPT-4o and GPT-4o-mini models developed by OpenAI,
    through ChatGPT or through their API. To my amazement, I found that these models
    can indeed understand quite a bit of what they see!
  prefs: []
  type: TYPE_NORMAL
- en: Let me present here the most interesting results I obtained, either directly
    through ChatGPT or programmatically, including code for a web app where you can
    paste a picture and have GPT-4o-mini analyze it.
  prefs: []
  type: TYPE_NORMAL
- en: 'First of All: How to Analyze Images With OpenAI’s GPT-4o Models, Via ChatGPT
    or Programmatically'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I carried out my first tests right away on ChatGPT’s free version using GPT-4o,
    which allows up to 4 chances per day to use the “vision” capabilities for free.
    To use this you must upload or paste from clipboard a picture that will be sent
    together with the prompt. On a paid ChatGPT account you can do this more times,
    and with the OpenAI API you can do this as long as token credits are available,
    and directly programmatically as I will cover here.
  prefs: []
  type: TYPE_NORMAL
- en: Processing prompts containing pictures programmatically
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: But how to do image processing with GPT-4o models programmatically? Well, it
    isn’t that complex, as explained at [OpenAI’s API reference](https://platform.openai.com/docs/guides/images?api-mode=chat&lang=javascript&format=base64-encoded).
  prefs: []
  type: TYPE_NORMAL
- en: 'In JavaScript, which I love because it allows me to easily write programs that
    run out of the box online as you already know if you follow me, you just need
    a function call that looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: A web app to quickly run image-text prompts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this example web app you can provide an API key and a text prompt, and then
    paste an image from the clipboard that will be immediately sent to OpenAI for
    analysis together with the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://lucianoabriata.altervista.org/tests/gpt-vision/gpt-4o-mini-vision.html](https://lucianoabriata.altervista.org/tests/gpt-vision/gpt-4o-mini-vision.html)'
  prefs: []
  type: TYPE_NORMAL
- en: 'The web app ends up displaying the answer, as in this example:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/420b3d881c770c4e1f590da345f2eb7f.png)'
  prefs: []
  type: TYPE_IMG
- en: This and all other images, photographs and screenshots shown in this article
    are by the author.
  prefs: []
  type: TYPE_NORMAL
- en: (Keep reading to find towards the end of the post how Google’s Gemini 2.0 interpreted
    this screenshot, which was just mind-blowingly correct as it captured the artist’s
    actual intention!)
  prefs: []
  type: TYPE_NORMAL
- en: Challenging GPT-4o Models With Varied Examples of Image-Text Prompts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Using the above app to run GPT-4o-mini and ChatGPT’s free version to run GPT-4o,
    I evaluated how these models can understand maps, photographs that mimic what
    a driver sees on the road, camera views about the position of a robot’s arm relative
    to some target objects, various different kinds of plots and charts presenting
    data, and software screenshots including some that display molecules.
  prefs: []
  type: TYPE_NORMAL
- en: I am stunned at how much the models understand! Read on to discover it all,
    also take a look at my first tests with the impressive Gemini 2.0 Flash from Google,
    and perhaps then go try your favorite AI models with your own ideas, sharing in
    the comments what you find!
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Vision-Based Analysis of a Google Maps Screenshot
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Sometimes, maps contain so much information that you kinda get lost around.
    Could a multimodal system be of help in such situation? Let’s find out!
  prefs: []
  type: TYPE_NORMAL
- en: 'Here on the left is a screenshot from a Google Maps view that I fed into GPT-4o-mini
    via the API together with the question “What’s in this image?” . You can see the
    answer on the right:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/04057fa715b500ebc53bf5027dc71955.png)'
  prefs: []
  type: TYPE_IMG
- en: 2\. Interpreting Driving Signs in a Road
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Could perhaps multimodal systems help you to drive? Of course this deserves
    a full investigation in order to draw a solid conclusion, but let’s see what happens
    in some quick tests. In each test, I provided a photograph of what a driver sees
    in the road on the go, together with this text prompt :'
  prefs: []
  type: TYPE_NORMAL
- en: Interpret any road signs or things I should pay attention to as a driver
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Here are the results on some example shots, all run with the web app provided
    above i.e. using GPT-4o-mini:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, for this photograph:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/68d1a45ac85e4fa3a5dbf5e4e30ca88b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'GPT-4o-mini said the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'As you drive, pay attention to the following signs and features in the image:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '1\. **”Keep Right” Sign**: This indicates that you should stay to the right
    side of the road, likely because of an island or obstruction ahead.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '2\. **Curved Road Ahead**: The layout of the road suggests you may encounter
    a curve, which means you should reduce your speed and stay alert for any oncoming
    vehicles.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '3\. **Speed Limit**: The sign showing a speed limit of 40 suggests that you
    should not exceed this speed.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '4\. **Road Layout**: Be mindful of the marking lines and how they direct traffic.
    The two solid yellow lines indicate that crossing them (to pass another vehicle)
    is prohibited.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '5\. **Surroundings**: Note the vegetation and landscape along the road, which
    may obscure visibility in some areas. Maintain awareness of pedestrians or cyclists.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Make sure to remain vigilant and adhere to these guidelines for safe driving.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This answer was quite nice, complete, and useful!
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s try this next one, in a densely snowed place:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a51479b9f9dc53d9d475f7aa2fc1178c.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Here it clearly picked up the snow, and correctly inferred it is a region with
    mountains, offering some quite general advice that suits the situation but doesn’t
    seem very specific to it:'
  prefs: []
  type: TYPE_NORMAL
- en: 'When driving in snowy mountain conditions, there are several important things
    to pay attention to:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '1\. **Yield Sign**: If there’s a yield sign, be prepared to slow down and give
    way to any traffic on the intersecting road.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '2\. **Road Conditions**: Snow can make roads slick and reduce visibility. Drive
    cautiously and maintain a safe distance from other vehicles.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '3\. **Speed Limit**: Always adhere to the posted speed limit but consider reducing
    your speed further due to the weather conditions.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '4\. **Slippery Surfaces**: Be aware that certain areas may be icier or more
    treacherous. Watch for signs indicating slippery roads or do not enter areas.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '5\. **Falling Rocks**: In mountainous areas, watch for any signs indicating
    potential rockfall or land slides, which may be exacerbated by snow.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '6\. **Wildlife**: In rural or mountainous regions, be alert for wildlife crossing
    the road, especially in winter months.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '7\. **Visibility**: If visibility is low due to snow, be sure to use your headlights
    and reduce your speed.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Always ensure that your vehicle is equipped for winter conditions, including
    snow tires or chains if necessary.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Let’s try a last one, which features a tunnel, a car right ahead of the driver,
    some warnings on the left, and two sign posts on the right:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7264f2669261f83e0923699d26389280.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Here’s the answer, which seems to be warning about all general and situation-specific
    issues:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some important points to note based on the image:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '1\. **Tunnel Ahead**: You are approaching a tunnel. Prepare for possible changes
    in visibility and ensure your vehicle’s headlights are on.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '2\. **Speed and Space**: Always maintain a safe distance from the vehicle in
    front of you, especially in confined spaces like tunnels.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '3\. **No Pedestrians or Bicycles**: The sign indicates that pedestrians and
    bicycles are not allowed in the area. Stay alert to ensure you don’t encounter
    anyone on the road.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '4\. **Road Barriers and Traffic Flow**: Pay attention to the road markings
    and barriers as they guide lane usage and safe navigation near the tunnel entrance.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '5\. **Weather and Terrain**: The surrounding scenery suggests that weather
    conditions may change quickly, especially driving in mountain areas. Be prepared
    for changes in road conditions.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Always drive cautiously and obey any traffic signs or signals present.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Note however that it didn’t note the specific change in speed limit. I tried
    again this photograph with some more focused text prompts, but it could never
    say anything about the change in speed limit specific to this situation, rather
    providing general recommendations such as this:'
  prefs: []
  type: TYPE_NORMAL
- en: The maximum speed limit inside a tunnel can vary based on the country’s traffic
    regulations, the specific road, and the tunnel’s design. Generally, in many places,
    typical speed limits range from 50 to 80 km/h (about 30 to 50 mph). To determine
    the exact speed limit for a specific tunnel, you would need to look for posted
    signs or consult local traffic regulations.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Which is correct but shows that it wasn’t capable of extracting the information
    specifically available here, which would be something along the lines of “Maximum
    speed is not indicated, but it is definitely above 50 according to the visible
    sign post.”
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Could Vision-Ready Models Drive Robots?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If an AI model understands pictures well enough, one could then think about
    feeding a robot’s camera feed to the model so that it can produce outputs that
    make sense. Of course this is a huge thing to study in itself, having to produce
    commands that end up in mechanical outputs; but let’s see here how the core part
    — i.e. converting views to broad actions — would work.
  prefs: []
  type: TYPE_NORMAL
- en: 'Given this photograph of a robotic arm on a table where a red and blue ball
    await to be grabbed:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f2b8719527601f5b5b7203697958307b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'I ask GPT-4o the following:'
  prefs: []
  type: TYPE_NORMAL
- en: How should the robotic arm move in order to grab the blue sphere?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'To which the LLM replies quite correctly, even asking me if I want it to follow
    up with code generation:'
  prefs: []
  type: TYPE_NORMAL
- en: 'To grab the blue sphere, the robotic arm should follow these steps:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Position the Base**: Rotate the base so that the arm aligns with the blue
    sphere.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Lower the Arm**: Adjust the arm’s height by moving its joints to bring the
    gripper closer to the sphere.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Extend Forward**: If necessary, extend the arm forward to reach the blue
    sphere.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Open the Gripper**: Ensure the gripper is open wide enough to grasp the sphere.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Close the Gripper**: Gently close the gripper around the sphere to secure
    it.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Lift the Sphere**: Raise the arm slightly while keeping the sphere firmly
    held.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Retract or Move to Destination**: Move the arm to a desired location for
    placing the sphere.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: These movements should be smooth to avoid dropping or misaligning with the sphere.
    Would you like assistance with programming the robotic arm for this task?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'I feel the answers are quite good, but lack precision. So, rather than going
    down the road of asking for code, I will interrogate the LLM a bit deeper to see
    what it is really understanding in this picture:'
  prefs: []
  type: TYPE_NORMAL
- en: 'When you say “Position the Base: Rotate the base so that the arm aligns with
    the blue sphere.” should the arm move to its left or to its right, based on the
    image?'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The answer turns out very good:'
  prefs: []
  type: TYPE_NORMAL
- en: Based on the image, the robotic arm should **rotate to its left** to align with
    the blue sphere. The sphere is positioned to the left of the arm’s current orientation,
    so rotating counterclockwise will bring the gripper closer to the sphere.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Yet I dig a bit deeper:'
  prefs: []
  type: TYPE_NORMAL
- en: How much do you estimate it should rotate?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This new answer is essentially the same that I could estimate as a human from
    the photograph:'
  prefs: []
  type: TYPE_NORMAL
- en: Estimating from the image, the robotic arm should rotate its base **approximately
    30 to 45 degrees counterclockwise** to align with the blue sphere.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This estimate assumes that:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The arm’s current position is facing slightly to the right.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The blue sphere is placed in front and to the left of the arm.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Once the base is rotated, minor adjustments to the arm joints may be needed
    to fine-tune the position before grasping the sphere.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Finally, I ask about the red ball, to test if the model understands that it
    is on the other side and a smaller rotation is required:'
  prefs: []
  type: TYPE_NORMAL
- en: And how about grabbing the red ball?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And it does get it right!
  prefs: []
  type: TYPE_NORMAL
- en: 'To grab the **red sphere**, the robotic arm should follow these steps:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Rotate the Base**: The base should rotate **slightly to the left**, but much
    less than for the blue sphere. An estimated **15 to 20 degrees counterclockwise** should
    align the arm with the red sphere.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Lower the Arm**: Bring the gripper down closer to the red sphere.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Extend Forward (if needed)**: Adjust the arm’s reach if the gripper is not
    directly above the sphere.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Open the Gripper**: Ensure the gripper is wide enough to grab the sphere.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Close the Gripper**: Securely grasp the red sphere.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Lift the Arm**: Raise the sphere carefully.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Move to Destination**: Transport the sphere to a desired location if needed.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Since the red sphere is closer to the robotic arm than the blue sphere, less
    movement is required. Would you like a precise angle calculation based on measurements?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you’re also excited about the possibility of [driving robots with vision
    models, check out this thread on X.com](https://x.com/adcock_brett/status/1901303220300829066).
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Vision Models Acting on Data Plots
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Being in *Towards Data Science*, we can’t escape the obvious question: can
    vision-assisted models understand the content of plots, perhaps even draw conclusions
    from them?'
  prefs: []
  type: TYPE_NORMAL
- en: I did quite some tests here, dealing with different kinds of information and
    plot types.
  prefs: []
  type: TYPE_NORMAL
- en: Detecting high tides in a tide chart
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'I began with the following chart of tide highs and lows for one of the Azores
    islands, written in Portuguese but on which I asked a question in English:'
  prefs: []
  type: TYPE_NORMAL
- en: When are the peak highs in the tides according to the chart?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/86ecca1e921ebc988689d42c851d4712.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This was the answer:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The peak high tides in the chart are marked by blue dots with corresponding
    times. The highest tides occur at the following times:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**11 Aug:** 11:18'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**12 Aug:** 12:15'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**13 Aug:** 12:58'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**14 Aug:** 13:33'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**15 Aug:** 14:05'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**16 Aug:** 14:35'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**17 Aug:** 15:05'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: These times represent when the tide reaches its highest point each day.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'You can immediately see that the displayed data is correct, but only represents
    high tides during the day and totally overlooks the high tides that happen during
    the day! Hence, I asked for that specifically, and got a much more complete answer:'
  prefs: []
  type: TYPE_NORMAL
- en: 'I said:'
  prefs: []
  type: TYPE_NORMAL
- en: But the times you say are all during the days… doesn’t the chart show also peak
    high tides at night?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'GPT-4o said:'
  prefs: []
  type: TYPE_NORMAL
- en: 'You’re absolutely right! The chart also shows peak high tides occurring at
    night. Here are all the **peak high tide** times (both daytime and nighttime)
    according to the chart:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**11 Aug:** 11:18 (Day)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**12 Aug:** 12:15 (Day) & 23:49 (Night)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**13 Aug:** 12:58 (Day) & 00:41 (Night)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**14 Aug:** 13:33 (Day) & 01:20 (Night)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**15 Aug:** 14:05 (Day) & 01:54 (Night)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**16 Aug:** 14:35 (Day) & 02:24 (Night)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**17 Aug:** 15:05 (Day) & 02:53 (Night)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Each day has **two peak high tides**, one during the day and one at night. Thanks
    for catching that!
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'That’s now perfect. Finally, I asked one more piece of information:'
  prefs: []
  type: TYPE_NORMAL
- en: OK thanks. Can you say where on earth this chart is for?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'And again the answer was right:'
  prefs: []
  type: TYPE_NORMAL
- en: Yes! The chart is for **Ponta Delgada, São Miguel Island**, which is part of
    the **Azores**, an autonomous region of **Portugal** in the North Atlantic Ocean.
    This location is known for its stunning volcanic landscapes, coastal views, and
    maritime activities. The tide chart shows the tidal schedule for this area from **August
    11 to August 17**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Interpreting a height profile from a photo
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Next I made the question a bit harder, as the image consisted of a photograph
    of a screen (see the interfering horizontal bands), the x axis of the plot is
    not complete, and the question involves some thinking:'
  prefs: []
  type: TYPE_NORMAL
- en: Looking at this, would I go up or down from Andermatt to Wassen? By how many
    meters and over how many km?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/b75abe4d1cfa8f629ddd87575cb61eb7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The answer was however perfect! Here it is:'
  prefs: []
  type: TYPE_NORMAL
- en: From the elevation profile, Andermatt is at **1437m**, and Wassen is at **916m**.
    This means that traveling from Andermatt to Wassen involves a **descent of 521
    meters** (1437m — 916m).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Looking at the horizontal axis, the distance from Andermatt to Wassen appears
    to be **around 10 km**. So, you would be going **downhill by 521 meters over approximately
    10 km**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Interpreting plots from RNA-seq data
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'I then tested GPT-4o’s capability to interpret plots produced as part of a
    bioinformatics pipeline. First, I made it process a volcano plot, which is one
    of the most common kinds of graphs used to analyze differential gene expression
    data. I took an example image from [this free online tutorial](https://scienceparkstudygroup.github.io/rna-seq-lesson/06-differential-analysis/index.html),
    and asked the system the following:'
  prefs: []
  type: TYPE_NORMAL
- en: You are a bioinformatics expert. What would you conclude from this volcano plot?
    I mean, which genes are up- or down-regulated?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/bce18e497518cc7da4074042314b4ccd.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This was GPT-4o’s answer:'
  prefs: []
  type: TYPE_NORMAL
- en: 'This volcano plot represents differentially expressed genes in *Arabidopsis
    thaliana* infected with *Pseudomonas syringae DC3000* compared to a mock treatment.
    Here’s my interpretation:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**1\. X-axis (Log₂ fold change)**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Positive values indicate **up-regulated genes** (higher expression in infected
    samples).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Negative values indicate **down-regulated genes** (lower expression in infected
    samples).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**2\. Y-axis (-Log₁₀ P-value)**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Higher values indicate stronger statistical significance.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**3\. Color coding**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Gray**: Not significant.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Blue**: Significant by p-value but not by fold change.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Red**: Significant by both p-value and fold change threshold.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Key findings:**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Up-regulated genes (right side, red dots)**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Strongly induced genes include **AT5G42800, AT1G52440, AT1G73325, AT4G18440**,
    among others.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: These genes are highly expressed in infected plants.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Down-regulated genes (left side, red dots)**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Examples include **AT4G28940, AT5G04100, AT1G04220, AT1G02440**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: These genes are significantly suppressed during infection.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Biological Implications:**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Up-regulated genes may be involved in plant immune responses, such as **defense
    signaling, stress response, or antimicrobial activity**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Down-regulated genes might be involved in **normal cellular functions that get
    suppressed during infection**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You can see how the first part of the response clearly reads our the main features
    of the plot, explaining what the axes and label colors are, and even considering
    the plot’s title. Then, the model distills lists of genes that are up- or down-regulated
    passing the thresholds with strong statistical significance. Note that the list
    is correct for the up-regulated genes but has a few problems with the down-regulated
    ones. On inspection of the plot it becomes clear that this is due to the labels
    not being clearly resolved, even for humans.
  prefs: []
  type: TYPE_NORMAL
- en: One gear up, somehow the model knows correct information about the identified
    genes, so it can draw some simple conclusions about the biological significance
    of the results.
  prefs: []
  type: TYPE_NORMAL
- en: Truly amazing, if it were not just for that small problem on reading the labels,
    which in a real scenario could probably be improved.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Then in a second test related to RNA-seq data, I asked GPT-4o what it thought
    about two distributions of p-values shown together in a single graph (image [edited
    from this tutorial](https://www.biostars.org/p/346323/)):'
  prefs: []
  type: TYPE_NORMAL
- en: This figure shows two distributions of p-values from RNA-seq data. Do you think
    they are OK, or do you notice anything weird?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/3193c4ceba873ce2fd3a22b2bcf12972.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This was the answer, again excellent:'
  prefs: []
  type: TYPE_NORMAL
- en: 'This histogram represents two distributions of p-values from RNA-seq data,
    likely comparing two different sets of statistical tests. Here’s my assessment:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*** What looks normal?**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Uniform distribution of non-significant p-values**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The light blue bars seem to follow a relatively uniform distribution across
    the range, which is expected under the null hypothesis (genes with no real differential
    expression should have p-values uniformly distributed between 0 and 1).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Enrichment of low p-values**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The peak near **p = 0** suggests that a subset of genes show strong statistical
    significance, which is expected when there are truly differentially expressed
    genes.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*** What looks weird?**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Excessive spike at p = 0**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If there is an unnaturally large spike at **exactly 0**, this could indicate
    a bias or an issue in the statistical testing (e.g., overfitting, batch effects,
    or miscalculated p-values).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Bimodal distribution**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The yellow distribution appears to have multiple peaks, which is unusual. Normally,
    p-value distributions should either be uniform (under the null hypothesis) or
    show a single peak at **low p-values** (for differentially expressed genes).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Peaks at intermediate p-values might suggest issues with normalization, batch
    effects, or improper multiple-testing corrections.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*** Potential issues to check**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Overdispersion or poor model fit**: Are the statistical methods used properly
    accounting for biological variability?'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Multiple testing correction issues**: If false discovery rate (FDR) correction
    wasn’t applied correctly, the distribution could be skewed.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Batch effects or confounding variables**: If the data contains hidden covariates,
    it can introduce unexpected structure in the p-value distribution.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 5\. Analysis of Screenshots Containing Molecular Structures
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you follow me you know that I work on various molecular sciences; then, of
    course I had to try out these vision-enhanced models with such kind of inputs.
  prefs: []
  type: TYPE_NORMAL
- en: Help using a program to generate 3D structures from 2D drawings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First I checked GPT-4o-mini’s capability to help a user who wants to create
    a molecule in 3D format from a drawing, who knows that this should be possible
    with Hack-A-Mol but doesn’t know exactly how to use it.
  prefs: []
  type: TYPE_NORMAL
- en: 'By the way, I covered Hack-A-Mol here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://medium.com/advances-in-biological-science/purely-web-based-suites-for-manipulation-of-bio-molecular-data-cbb7fdd60df4](https://medium.com/advances-in-biological-science/purely-web-based-suites-for-manipulation-of-bio-molecular-data-cbb7fdd60df4)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now let’s see how well GPT-4o can help one to interpret what one obtains in
    this program. I uploaded this screenshot:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3e31e339f65cc50bee86aec4c8974517.png)'
  prefs: []
  type: TYPE_IMG
- en: 'And asked this question:'
  prefs: []
  type: TYPE_NORMAL
- en: I’m trying to build a small molecule using this tool, by drawing and then clicking
    the arrow to the right…. but I don’t get very well what’s being generated exactly…
    can you explain?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This was the answer:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Yes! When you draw your small molecule and click the arrow, several things
    are generated:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**2D Structure (Left Panel)**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is your drawn molecule in **2D**, using standard chemical notation.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**3D Structure (Right Panel — JSmol Viewer)**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is the **3D molecular model** generated from your 2D drawing.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It gives you a spatial representation of the molecule.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Molecular Identifiers (Below the 2D Editor)**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**InChI (IUPAC International Chemical Identifier)**: A text-based representation
    of the molecular structure.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**InChIKey**: A hashed, fixed-length version of the InChI, useful for searching
    databases.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**SMILES (Simplified Molecular Input Line Entry System)**: A compact string
    representation of the molecule.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Structural Data (Bottom Text Box)**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You see data in **MOL/SDF format**, which contains atomic coordinates, bonding
    information, and metadata about the molecule.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Other formats available include **XYZ, PDB, and CIF**, which are useful for
    computational chemistry and molecular modeling.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What Can You Do with This?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you want to **simulate the molecule or use it in software like AlphaFold
    3**, you should **export the structure in SDF or PDB format**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you want to **search for the molecule online**, use the **InChIKey or SMILES**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Using GPT-4o with vision to help understand AlphaFold models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In the next example, I tested how well GPT-4o can understand structural models
    of proteins produced by AlphaFold (in this case AlphaFold 2 as utilized to build
    the AlphaFold-EBI database of models). By the way, if you have no idea what AlphaFold
    is, check out these posts:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://medium.com/advances-in-biological-science/alphafold-3s-advances-and-limitations-in-a-nutshell-5ae0cdd814ea](https://medium.com/advances-in-biological-science/alphafold-3s-advances-and-limitations-in-a-nutshell-5ae0cdd814ea)'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://lucianosphere.medium.com/guide-to-my-blog-articles-on-alphafold-39c10a7dad7f](https://lucianosphere.medium.com/guide-to-my-blog-articles-on-alphafold-39c10a7dad7f)'
  prefs: []
  type: TYPE_NORMAL
- en: 'It is well-known that the AlphaFold 2 and 3 systems revolutionized modeling;
    however, of course they aren’t infallible. To help users understand what’s likely
    correct and wrong in a structural model, AlphaFold returns not just the atomic
    coordinates that constitute the structural model but also quality metrics, of
    which the most important ones are the residue-wise pLDDTs and the inter-residue
    PAEs. We here tested [GPT-4o with vision capabilities on this Uniprot entry precomputed
    at the AF-EBI database](https://alphafold.ebi.ac.uk/entry/Q12XU1):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/642941e7267d5701a96c0aefc8cec90f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The text part of the prompt was:'
  prefs: []
  type: TYPE_NORMAL
- en: You are an expert in bioinformatics. I’m checking an entry at the AF-EBI database
    of protein structure models, and I got what I’m showing in the attached screenshot.
    What do you think? Is the model good? I’m especially interested in the relative
    orientation of the two domains, but I’m not sure what to conclude from the PAE
    plot…
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'And this was the answer:'
  prefs: []
  type: TYPE_NORMAL
- en: 'From your screenshot, we can analyze the quality of the model based on the **pLDDT
    confidence scores** and the **Predicted Aligned Error (PAE) plot**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Model Confidence (pLDDT)**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The **Mol*** 3D viewer colors the model based on confidence scores.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most of the structure is colored in **blue (high to very high confidence, pLDDT
    > 70–90)**, suggesting that the individual domains are well-predicted.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: However, some **loops and termini (orange/red, pLDDT < 50–70)** have lower confidence,
    which is expected for flexible regions.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**PAE Plot Analysis (Domain Orientation)**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The PAE plot (right panel) indicates how well the relative positions of different
    residues are predicted.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A **low PAE (dark green)** means the relative position between two residues
    is well-defined.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A **high PAE (lighter green/white areas)** suggests uncertainty in the relative
    positioning.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Interpreting the PAE**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The diagonal (self-alignment) is always well-defined.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The block-like structure in the PAE plot suggests **two or more well-defined
    domains** with high internal confidence.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: However, **lighter green areas between the blocks indicate uncertainty in the
    relative orientation of these domains**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If your interest is in the relative orientation of the domains, this suggests **the
    model may not be reliable in that aspect** — it might have multiple plausible
    conformations.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Conclusion**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The **individual domains are well-modeled**, but their **relative orientation
    might be uncertain**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If functionally relevant, you might consider **experimental validation (e.g.,
    cryo-EM, SAXS, or NMR)** or **molecular dynamics simulations** to explore domain
    flexibility.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you need a more rigid structure, you could look for **homologous experimental
    structures** or use **AlphaFold-Multimer** if interactions between chains matter.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The answer was pretty neat and correct. However, we realized that we might
    have confused the model by talking about two domains, when the screenshot actually
    shows three. We then asked a folow-up question:'
  prefs: []
  type: TYPE_NORMAL
- en: Now checking carefully I see the TED Domains thing shows 3 domains… am I right
    that according to the PAE plot the arrangement of the first two domains is confident,
    but not so much their arrangement relative to the third one?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The answer, based on an inspection of the PAE plot considering now that there
    are indeed 3 domains, the first two being confidently modeled relative to each
    other and the third one only modeled confidently locally, is again perfect:'
  prefs: []
  type: TYPE_NORMAL
- en: Yes, your interpretation is correct! The **TED Domains annotation** indicates
    that the model has **three domains**, as shown by the color-coded segments at
    the top of the PAE plot.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Looking at the **PAE plot**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The **first two domains** (green and orange segments) have **low PAE values
    between them** (darker green in the top-left block of the matrix). This suggests
    that their **relative orientation is well-defined and confident**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: However, the **third domain** (purple segment) shows **higher PAE values relative
    to the first two** (lighter green/white regions in the lower-right part of the
    matrix). This means that the **relative position of the third domain is uncertain** —
    it may adopt multiple conformations.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**What This Means for Your Analysis**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The **first two domains likely form a rigid unit** with a stable interaction.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The **third domain may be more flexible** relative to the first two, possibly
    moving independently or being less constrained in solution.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If this flexibility is functionally important (e.g., for ligand binding, protein-protein
    interactions, or conformational switching), experimental validation like **SAXS,
    cryo-EM, or FRET** could be useful.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Visual analysis of protein-ligand complexes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Last, I geared up to challenge GPT-4o with a more difficult problem. Given a
    2D snapshot from a molecular graphics program showing a ligand bound to a protein,
    can it infer what kinds of contacts the two molecules establish?
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7a62ddf7946f78013ad10a24dae0ac9d.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The question was:'
  prefs: []
  type: TYPE_NORMAL
- en: Here’s a screenshot of ibuprofen docked inside a pocket in BSA. What interactions
    do you see between the ligand and the protein? I want you to tell me exactly what
    interactions you see in this structure from the screenshot provided.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'And this was the answer:'
  prefs: []
  type: TYPE_NORMAL
- en: 'From the screenshot you provided, I can visually infer potential interactions,
    but without residue labels or a precise atomic distance measurement, I can only
    make educated observations. Here’s what I **specifically see** in your image:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**1\. Hydrophobic Interactions:**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Ibuprofen (highlighted in yellow) is embedded in a **hydrophobic pocket** of
    the protein.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It appears to be surrounded by **gray carbon atoms** from amino acid side chains,
    likely hydrophobic residues (e.g., leucine, valine, phenylalanine, or isoleucine).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The **benzene ring of ibuprofen** seems to be in close contact with other **aromatic
    or aliphatic side chains**, suggesting **π-π stacking or van der Waals interactions**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**2\. Hydrogen Bonds:**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The **carboxyl (-COOH) group of ibuprofen** appears to be interacting with nearby **blue
    (nitrogen) or red (oxygen) atoms** from the protein.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: There is **at least one close contact between the oxygen of the carboxyl group
    and a protein residue, likely forming a hydrogen bond** with a backbone amide
    or side chain hydroxyl (e.g., Ser, Thr, Tyr, Asp, or Glu).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**3\. Possible Electrostatic Interactions:**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Ibuprofen is negatively charged at physiological pH (**carboxylate anion, -COO⁻**).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: There may be **a salt bridge** or **ion-dipole interaction** if a **positively
    charged residue (e.g., Arg, Lys, or His) is nearby**, but I cannot confirm the
    exact residue from the image alone.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**What I Cannot Determine from the Screenshot Alone:**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Precise interacting residues:** No residue labels are visible.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Exact interaction distances:** Hydrogen bonds and electrostatic interactions
    typically require precise atomic distances (~2–3 Å).'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Interaction strengths:** Molecular modeling software would be needed to confirm
    interaction energies.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The answer was quite good, especially considering that the picture is just a
    static 2D view and is quite crowded in atoms. In fact, it correctly pinpoints
    that the ibuprofen is shown in yellow, and highlights hydrophobic and aromatic
    contacts around its aromatic ring, both of which do happen (#1 in the figure below),
    and hydrogen bonds from its carboxylate group to nearby N and O atoms (#2 in the
    figure), adding that there might also possibly exist a salt bridge between that
    same carboxylate and some positively charged group of the protein that it can’t
    distinguish clearly (#3).
  prefs: []
  type: TYPE_NORMAL
- en: 'For your reference, I show these interactions in the next figure, numbered
    1, 2 and 3 as they were mentioned:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/46e307e62783f61dd5b0436ba1fdd7de.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Other Vision-Capable Models? Peeking Into Google’s Gemini 2.0 Flash
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: OpenAI is probably the most famous developer of LLM-based AI systems, but of
    course not the only one, and their models aren’t even the best for some goals
    and according to some evaluations. However, they remain, to me at least, the easiest
    to use both directly in a GUI (ChatGPT) and programmatically (as we have seen
    here and I’ve shown in many other posts).
  prefs: []
  type: TYPE_NORMAL
- en: But my point here is that we can’t overlook the other models. And just while
    preparing this post, I decided to give a try at Google’s AI studio’s Gemini 2.0
    Flash, which like GPT-4o has picture, audio and document processing capabilities
    — and even video!
  prefs: []
  type: TYPE_NORMAL
- en: 'Again I was amazed, and in fact it seemed to perform slightly better than GPT-4o
    and GPT-4o-mini tried throughout this post. I was in particular stunned at this
    specific example, where I loaded the screenshot of my app shown above, to which
    Gemini replied (without any prompt):'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what I can infer based on the image you provided:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Prompt:** “What do you think the artist”'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Analysis:**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The response provided at the bottom of the image states “The artist likely intended
    to convey themes of nature, beauty, and vibrancy through the striking imagery
    of the red poppies against a lush green background.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Essentially, the AI is recognizing the subject matter and interpreting the artist’s
    intent as showcasing the beauty and vibrancy of nature.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: That was kind of similar to what GPT-4o replied, probably because it just read
    what GPT-4o itself wrote. But what if I ask it a question trying to address the
    same point I asked GPT-4o?
  prefs: []
  type: TYPE_NORMAL
- en: 'Here it goes:'
  prefs: []
  type: TYPE_NORMAL
- en: do your own interpretation of the picture… what do you think did the author
    intend to communicate?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'And this was Gemini’s reply, now perfectly reflecting what I think the author
    intended to convey:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Okay, based on the image, here’s my interpretation of what the author might
    have intended:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Beyond the surface-level beauty, the image hints at a more complex exploration
    of color harmony and contrast within nature.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**The juxtaposition of the natural poppy field with the color wheel suggests
    a deliberate artistic statement.** The artist may be inviting us to analyze the
    colors present in the natural scene (dominated by greens and reds) and to understand
    how these colors interact and create a specific visual experience.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**The placement of the color wheel with the arrows pointing to the green and
    red suggest complementary colours.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Perhaps the author wants us to appreciate the inherent color palettes nature
    provides.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In short, while the surface reading is about beauty, the integration of the
    color wheel suggests a deeper interest in the science and theory of color as applied
    to the natural world. The author seems to be inviting a more analytical and informed
    way of appreciating the beauty we see.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The key part of Gemini’s reply, which GPT-4o didn’t get in any of my tests,
    is this:'
  prefs: []
  type: TYPE_NORMAL
- en: “The placement of the color wheel with the arrows pointing to the green and
    red suggest complementary colours.”
  prefs: []
  type: TYPE_NORMAL
- en: That was exactly my point as an artist!
  prefs: []
  type: TYPE_NORMAL
- en: If this post has good reception, I will test Gemini 2.0’s various capabilities
    in more detail. So let me know in the comments what you think!
  prefs: []
  type: TYPE_NORMAL
- en: Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I guess after having read all these examples, you now also admire the potential
    of multimodal, vision-capable AI systems. The tests I presented with the GPT-4o
    models (and the glimpse into Gemini 2.0) proved the ability of the most modern
    AI systems to interpret quite complex images, being capable of understanding and
    extracting information from photographs, scientific figures of various kinds,
    plots and charts, even when containing information as complex as molecular structures.
    And from the examples we can advance applications as varied as assisting data
    analysis, assisting driving, and controlling robots — all of them provided some
    problems are overcome.
  prefs: []
  type: TYPE_NORMAL
- en: This, because some images and questions are quite challenging, of course. In
    some cases, for example when limited by the resolution of labels in dense plots,
    or when limited by the lack of 3D perspective in the flat screenshots of molecular
    structures, or when having to estimate rotation angles for the robotic arm, there’s
    probably not much to do, and the model remains as limited as even the most expert
    humans in the subject would.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, it is overall clear that with proper prompting and continued advancements
    in AI, these models could become invaluable tools for accelerating data interpretation
    and decision-making, reducing the load of human experts who can dedicate to more
    complex problems while the software assists non-experts to interpret graphical
    outputs from software, and who knows maybe some day drive cars and control robots!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
