- en: What Germany Currently Is Up To, Debt-Wise
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 德国当前在债务方面的状况
- en: 原文：[https://towardsdatascience.com/what-germany-currently-is-up-to-debt-wise/](https://towardsdatascience.com/what-germany-currently-is-up-to-debt-wise/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/what-germany-currently-is-up-to-debt-wise/](https://towardsdatascience.com/what-germany-currently-is-up-to-debt-wise/)'
- en: €1,600 *per second*. That’s how much interest Germany has to pay for its debts.
    In total, the German state has debts ranging into the trillions — more than a
    thousand billion Euros. And the government is planning to make even more, up to
    one trillion additional debt is rumored to follow over the next 10 years.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: €1,600 *每秒*。这就是德国为债务支付利息的金额。总的来说，德国政府的债务已经达到了万亿级别——超过一千亿欧元。而且政府计划再增加更多，据传言，未来10年内可能会增加高达一兆的额外债务。
- en: The numbers involved in governmental finances are so huge that one probably
    cannot realistically assess just how much even 1 billion Euro or Dollar are.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 政府财政涉及的数字如此巨大，以至于人们可能无法现实地评估即使是1亿欧元或美元究竟有多少。
- en: In this article, I demonstrate that conventional lists and charts fail to convey
    a sense of just how much money is at stake when it comes to governmental spending.
    I then show how *a little bit of programming can interactively visualize this
    money and how it relates to other numbers*. I will use Germany as an example,
    as it currently receives a lot of media coverage and its debt statistics are freely
    available.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我演示了传统的列表和图表无法传达政府支出涉及多少资金的感受。然后我展示了如何通过一点编程来交互式地可视化这些资金以及它们与其他数字的关系。我将使用德国作为例子，因为它目前受到大量媒体的关注，其债务统计数据是公开可用的。
- en: Plain enumeration
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简单列举
- en: To start, we’ll use plain enumeration of the key facts as the first method to
    (not) put information into relation. It excludes household debts. As we’ll later
    see, this simple method utterly fails compared to the visualization tools provided
    through simple scripts.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将使用简单的列举法来列出关键事实，作为将信息（不）关联起来的第一种方法。它不包括家庭债务。正如我们稍后将会看到的，与简单脚本提供的可视化工具相比，这种方法完全失败了。
- en: '€1,600: interest rate per second'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: €1,600：每秒的利率
- en: '€25,503: debt per German citizen if state debt is split'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: €25,503：如果国家债务均摊到每个德国公民身上的债务
- en: 'And here’s already a large jump for us. We are directly jumping into the billions:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 而对我们来说，这里已经是一个很大的跳跃了。我们直接跳到了十亿级别：
- en: '€49,5 *billion*: interest rate per year'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '€49,5 *十亿*: 每年的利率'
- en: '€100 billion: Sondervermögen (euphemism for debt) for German Army'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: €100亿：德国军队的“特别资金”（债务的委婉说法）
- en: '€500 billion: *planned* additional debt for infrastructure'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: €500亿：*计划*用于基础设施的额外债务
- en: 'Now, we are making another jump:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们再跳一个台阶：
- en: '€2,11 *trillion*: total German governmental debt (as of March 2025)'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '€2,11 *万亿*: 截至2025年3月的德国总政府债务'
- en: After reading these numbers, we might know a bit more about Germany’s debt.
    But we hardly have an understanding of how they relate to each other. Yes, we
    know that €1 billion is a thousand times €1 million. But that’s just common sense.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读这些数字后，我们可能对德国的债务有了更多了解。但我们几乎无法理解它们之间是如何相互关联的。是的，我们知道€1亿是€1百万的一千倍。但这只是常识。
- en: We would probably fare better if we could see the numbers visualized side by
    side. That’s what we will do next.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们能将这些数字可视化地并排展示，可能会更好。这正是我们接下来要做的。
- en: Linearly scaled charts
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 线性缩放的图表
- en: Using python and the Matplotlib plotting library, it is straightforward to create
    a simple chart. (Complete code is linked in this article’s Resource section at
    the end).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Python和Matplotlib绘图库，创建一个简单的图表非常直接。（完整的代码链接在本文的资源部分，位于文章末尾）。
- en: 'I picked four numbers to visualize together: €1,600 (because most people know
    *just how much already that is*), €25,503 (because it nicely shows the hidden
    debt that any German has), €1 billion (because that’s a very large sum, something
    that large companies don’t even make per year), and, finally €49,5 billion (because
    that’s how much Germany currently needs to spend just in interest per year *which
    is more than most* *countries’ GDP*).'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我选择了四个数字来一起可视化：€1,600（因为大多数人已经知道这有多多了），€25,503（因为它很好地展示了每个德国人隐藏的债务），€1亿（因为这是一个非常大的数额，即使是大型公司一年也未必能赚这么多），最后是€49,5亿（因为这就是德国每年仅利息就需要支付的金额，这比大多数国家的GDP还要多）。
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'After running this code, we get the following plot:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此代码后，我们得到以下图表：
- en: '![](../Images/57eb12359df5baa23fefbfbcfeb8a998.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/57eb12359df5baa23fefbfbcfeb8a998.png)'
- en: 'What we see in an instant: **we don’t see the small money**. The huge amounts
    completely dwarf the €1,600\. I’d wager to say that anybody reading this has more
    connection to just €1,000 than to, say, €1 million. We know what €1,000 could
    afford us. A couple of €1,000 is a good monthly income for most people.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们瞬间看到的是：**我们看不到小额的钱**。巨大的金额完全掩盖了1600欧元。我敢打赌，任何阅读这篇文章的人对1000欧元的感觉比对，比如说，100万欧元的感觉更强烈。我们知道1000欧元能给我们带来什么。对大多数人来说，几千欧元就是一个不错的月收入。
- en: But the chart does not even recognize it.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 但图表甚至没有识别出来。
- en: Is the mistake that I used linearly scaled axes? Let’s see next.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我犯的错误是使用了线性刻度的坐标轴吗？让我们看看下一个。
- en: Logarithmically scaled charts
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对数刻度的图表
- en: 'In visualizing the data logarithmically, we’ll stick to python and matplotlib.
    We merely need to add a single line of code and directly get an updated chart:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在对数据进行对数可视化时，我们将坚持使用Python和matplotlib。我们只需要添加一行代码，就可以直接得到更新的图表：
- en: '![](../Images/a1f523b68e82cc9d8cff3ce90b056965.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a1f523b68e82cc9d8cff3ce90b056965.png)'
- en: '**Is it better?** To some extent, *yes*! We can now begin to see the difference
    between everyday amounts (like the €1,600 interest per second) and the planned
    spending (i.e., debt).'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**这是否更好？** 在某种程度上，*是的*！我们现在可以开始看到日常金额（如每秒1600欧元的利息）和计划支出（即债务）之间的区别。'
- en: Thanks to the logarithmic scaling, they appear on the same chart. In this visualization,
    the chart does not grow linearly, but logarithmically. This means that the spacing
    between two markers on the y-axis does not represent a fixed, equal increment
    (like before in the linearly scaled plot). Instead, each step represents a multiplication
    by a constant factor. In our plot, the spacing is determined by multiplying with
    100 (or, adding two trailing zeros).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了对数刻度，它们出现在同一张图表上。在这个可视化中，图表不是线性增长，而是对数增长。这意味着y轴上两个标记之间的间距不代表固定的、相等的增量（就像之前在线性缩放的图表中那样）。相反，每一步代表乘以一个常数因子。在我们的图表中，间距是通过乘以100（或者，添加两个尾随零）来确定的。
- en: 'For our purpose: is such logarithmic scaling better than linear scaling? Yes,
    definitely.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的目的：这种对数刻度比线性刻度好吗？是的，绝对好。
- en: '**But, is it sufficient?** Can we not do better in trying to convey what Germany’s
    up to when it plans for €500 billion of additional debt? And, how does this debt
    relate to other, already existing debts?'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**但是，这足够吗？** 我们在尝试传达德国计划额外5000亿欧元债务时，是否不能做得更好？而且，这笔债务与其他已经存在的债务有什么关系？'
- en: Yes, of course we can. Using a little bit of HTML, JavaScript, and some CSS
    styling, we can quickly create a simple interactive webpage. For a beginner it’s
    easily doable over a weekend.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我们可以。使用一点HTML、JavaScript和一些CSS样式，我们可以快速创建一个简单的交互式网页。对于一个初学者来说，一个周末就能轻松完成。
- en: A static webpage is all it needs!
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 静态网页就足够了！
- en: Data scientists and programmers wrangle with data day-in, day-out. Tools like
    Excel and python scripts help them with transforming the data to gain insights.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家和程序员每天都要与数据打交道。像Excel和Python脚本这样的工具帮助他们将数据转换为洞察力。
- en: Sometimes, however, a simple webpage can convey the relationship between numbers
    better. Especially when we are talking about the huge sums involved in governmental
    debts.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，一个简单的网页可以更好地传达数字之间的关系。特别是当我们谈论政府债务中涉及的巨额资金时。
- en: '**We start our visualization in HTML**, by stacking a few div-elements on top
    of each other:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们从HTML开始我们的可视化**，通过将几个div元素堆叠在一起：'
- en: '[PRE1]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: For each section, we indicate the amount in € in an HTML attribute.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个部分，我们通过HTML属性指示金额为€。
- en: '**Next, we will use JavaScript** to transform the amounts into an easy-to-grasp-visualization.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**接下来，我们将使用JavaScript** 来将金额转换为易于理解的可视化。'
- en: 'For this, we define that **each pixel represents €1,000**. By using rectangular
    forms, we can thus represent any amount of money:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个，我们定义**每个像素代表1000欧元**。通过使用矩形形式，我们可以因此表示任何金额：
- en: '[PRE2]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Lastly, we add some CSS styling to make the rendered webpage look well:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们添加一些CSS样式来使渲染的网页看起来更好：
- en: '[PRE3]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Putting all of this together (find the full source code in the Resources section
    below), we get the following (I added further key numbers that I considered relevant
    in putting the German debt into proportion):'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有这些放在一起（在下面的资源部分可以找到完整的源代码），我们得到以下结果（我在这里添加了一些我认为与德国债务成比例的相关关键数字）：
- en: '![](../Images/9553af1765fa2248750f83b844ff1489.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9553af1765fa2248750f83b844ff1489.png)'
- en: 'Visualization by the author. Find it here: [https://phrasenmaeher.github.io](https://phrasenmaeher.github.io/)'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 作者可视化。在这里找到：[https://phrasenmaeher.github.io](https://phrasenmaeher.github.io/)
- en: 'Now, that is an easy to understand visualization! You can explore it yourself
    here: [https://phrasenmaeher.github.io](https://phrasenmaeher.github.io/).'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这是一个易于理解的可视化！你可以在这里自行探索：[https://phrasenmaeher.github.io](https://phrasenmaeher.github.io/).
- en: This simple webpage more accurately represents the huge amount of fresh debt
    that Germany wants to make. Using basic programming skills, we show how the debt
    relates to everyday sums (like €1,600) and existing debt-related costs (like the
    €49,5 billion interest per year). Just start scrolling down, and you get a sense
    of how much money it is. In the above GIF, we have not even scrolled 1% of the
    entire way down (look at the scroll bar to the right, it barely moves).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这个简单的网页更准确地反映了德国想要新增的巨额债务。利用基本的编程技能，我们展示了债务与日常金额（如1600欧元）以及现有的债务相关成本（如每年4950亿欧元的利息）之间的关系。只需向下滚动，你就能感受到这笔钱的规模。在上面的GIF中，我们甚至没有向下滚动整个页面的1%（看看右边的滚动条，几乎不动）。
- en: 'Recall that 1 pixel equals €1,000\. Even if you are earning €10,000 per month,
    that’s merely 10 pixels, which is barely noticeable in the debt bars. If you scroll
    just 1 pixel down, you have uncovered €200,000 of new debt (with the default bar
    width of 200). Even if you make €1 million (per year), that’s just a mere scrolling
    of 5 pixels. However much money you make, the visualization demonstrates: *it’s
    literally a drop in the debt ocean*.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，1像素等于1000欧元。即使你每月赚10,000欧元，那也只是10像素，在债务条中几乎不明显。如果你向下滚动1像素，你就揭露了200,000欧元的新债务（默认条宽为200）。即使你每年赚100万欧元，那也只是滚动5像素。无论你赚多少钱，可视化都表明：*这实际上只是债务海洋中的一滴*。
- en: 'If you are German, I don’t feel envy, especially not for the upcoming generations:
    somebody has to pay this back. *In addition to existing debts.*'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你来自德国，我并不感到羡慕，尤其是对即将到来的世代来说：有人必须偿还这笔债务。*除了现有的债务之外*。
- en: '* * *'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
