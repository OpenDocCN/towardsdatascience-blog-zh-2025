- en: 'Mastering Hadoop, Part 2: Getting Hands-On — Setting Up and Scaling Hadoop'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 掌握Hadoop，第二部分：动手实践——设置和扩展Hadoop
- en: 原文：[https://towardsdatascience.com/mastering-hadoop-part-2-getting-hands-on-setting-up-and-scaling-hadoop/](https://towardsdatascience.com/mastering-hadoop-part-2-getting-hands-on-setting-up-and-scaling-hadoop/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/mastering-hadoop-part-2-getting-hands-on-setting-up-and-scaling-hadoop/](https://towardsdatascience.com/mastering-hadoop-part-2-getting-hands-on-setting-up-and-scaling-hadoop/)
- en: Now that we’ve explored [Hadoop’s role and relevance](https://towardsdatascience.com/mastering-hadoop-part-1-installation-configuration-and-modern-big-data-strategies/),
    it’s time to show you how it works under the hood and how you can start working
    with it. To start, we are breaking down Hadoop’s core components — HDFS for storage,
    MapReduce for processing, YARN for resource management, and more. Then, we’ll
    guide you through installing Hadoop (both locally and in the cloud) and introduce
    some essential commands to help you navigate and operate your first Hadoop environment.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经探讨了[Hadoop的作用和相关性](https://towardsdatascience.com/mastering-hadoop-part-1-installation-configuration-and-modern-big-data-strategies/)，现在是时候向您展示它在底层是如何工作的，以及您如何开始使用它。首先，我们将分解Hadoop的核心组件——HDFS用于存储，MapReduce用于处理，YARN用于资源管理，等等。然后，我们将指导您安装Hadoop（无论是在本地还是在云中），并介绍一些基本命令，以帮助您导航和操作您的第一个Hadoop环境。
- en: Which components are part of the Hadoop architecture?
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 哪些组件是Hadoop架构的一部分？
- en: Hadoop’s architecture is designed to be resilient and error-free, relying on
    several core components that work together. These components divide large datasets
    into smaller blocks, making them easier to process and distribute across a cluster
    of servers. This distributed approach enables efficient data processing—far more
    scalable than a centralized ‘supercomputer.’
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop的架构设计旨在具有弹性和无错误，依赖于几个核心组件协同工作。这些组件将大型数据集分割成更小的块，使得它们更容易处理并在服务器集群中分布。这种分布式方法使得数据处理效率更高——远比集中式的“超级计算机”可扩展。
- en: '![](../Images/3525c992fd12672ce365e1a7470bf308.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3525c992fd12672ce365e1a7470bf308.png)'
- en: 'Hadoop Components | Source: Author'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop Components | 来源：作者
- en: 'The basic components of Hadoop are:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop的基本组件包括：
- en: '**Hadoop Common** comprises basic libraries and functionalities that are required
    by the other modules.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Hadoop Common**包含其他模块所需的基本库和功能。'
- en: The [**Hadoop Distributed File System (HDFS)**](https://databasecamp.de/en/data/apache-hdfs)
    ensures that data is stored on different servers and enables a particularly large
    bandwidth.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Hadoop分布式文件系统（HDFS）**](https://databasecamp.de/en/data/apache-hdfs)确保数据存储在不同的服务器上，并支持特别大的带宽。'
- en: '**Hadoop YARN** takes care of resource distribution within the system and redistributes
    the load when individual computers reach their limits.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Hadoop YARN**负责系统内的资源分配，并在单个计算机达到极限时重新分配负载。'
- en: '**MapReduce** is a programming model designed to make the processing of large
    amounts of data particularly efficient.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MapReduce**是一种编程模型，旨在使大量数据的处理特别高效。'
- en: In 2020, Hadoop Ozone, which is used as an alternative to HDFS, was added to
    this basic architecture. It comprises a distributed object storage system that
    was specially designed for big data workloads to better handle modern data requirements,
    especially in the cloud environment.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 2020年，作为HDFS的替代方案，Hadoop Ozone被添加到这个基本架构中。它包含一个专门为大数据工作负载设计的分布式对象存储系统，以更好地处理现代数据需求，尤其是在云环境中。
- en: HDFS (Hadoop Distributed File System)
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: HDFS (Hadoop Distributed File System)
- en: Let’s dive into HDFS, the core storage system of Hadoop, designed specifically
    to meet the demands of big data processing. The basic principle is that files
    are not stored as a whole on a central server, but are divided into blocks of
    128MB or 256MB in size and then distributed across different nodes in a computer
    cluster.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入了解HDFS，这是Hadoop的核心存储系统，专门设计来满足大数据处理的需求。其基本原理是文件不是作为一个整体存储在中央服务器上，而是被分割成128MB或256MB大小的块，然后分布到计算机集群的不同节点上。
- en: To ensure data integrity, each block is replicated three times across different
    servers. If one server fails, the system can still recover from the remaining
    copies. This replication makes it easy to fall back on another node in the event
    of a failure.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保数据完整性，每个块会在不同的服务器上复制三次。如果某个服务器失败，系统仍然可以从剩余的副本中恢复。这种复制机制使得在发生故障时很容易回退到另一个节点。
- en: 'According to its [documentation](https://hadoop.apache.org/docs/r1.2.1/hdfs_design.html),
    Hadoop pursues the following goals with the use of HDFS:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 根据其[文档](https://hadoop.apache.org/docs/r1.2.1/hdfs_design.html)，Hadoop使用HDFS追求以下目标：
- en: '**Fast recovery** from hardware failures by falling back on working components.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过回退到工作组件来**快速恢复**硬件故障。
- en: Provision of **stream data processing**.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供**流数据处理**。
- en: '**Big data framework** with the ability to process large data sets.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有能够处理大数据集的**大数据框架**。
- en: '**Standardized processes** with the ability to easily migrate to new hardware
    or software.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有能够轻松迁移到新硬件或软件的**标准化流程**。
- en: Apache Hadoop works according to the so-called master-slave principle. In this
    cluster, there is one node that takes on the role of the master. It distributes
    the blocks from the data set to various slave nodes and remembers which partitions
    it has stored on which computers. Only the references to the blocks, i.e. the
    metadata, are stored on the master node. If a master fails, there is a secondary
    name node that can take over.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: Apache Hadoop根据所谓的master-slave原则工作。在这个集群中，有一个节点扮演主节点的角色。它将数据集的块分配给各个从节点，并记住哪些分区存储在哪些计算机上。只有块的引用，即元数据，存储在主节点上。如果主节点失败，有一个次要的名称节点可以接管。
- en: The master within the Apache Hadoop Distributed File System is called a NameNode.
    The slave nodes, in turn, are the so-called DataNodes. The task of the DataNodes
    is to store the actual data blocks and regularly report the status to the NameNode
    that they are still alive. If a DataNode fails, the data blocks are replicated
    by other nodes to ensure sufficient fault tolerance.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: Apache Hadoop分布式文件系统中的主节点被称为NameNode。从节点，反过来，被称为DataNode。DataNode的任务是存储实际的数据块，并定期向NameNode报告它们仍然存活的状态。如果一个DataNode失败，其他节点会复制数据块以确保足够的容错性。
- en: The client saves files that are stored on the various DataNodes. In our example,
    these are located on racks 1 and 2\. As a rule, there is only one DataNode per
    machine in a rack. Its primary task is to manage the data blocks in memory.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 客户端将存储在各个DataNode上的文件保存。在我们的示例中，这些文件位于1号和2号机架上。通常情况下，每个机架上的机器只有一个DataNode。它的主要任务是管理内存中的数据块。
- en: The NameNode, in turn, is responsible for remembering which data blocks are
    stored in which DataNode so that it can retrieve them on request. It also manages
    the files and can open, close, and, if necessary, rename them.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: NameNode反过来负责记住哪些数据块存储在哪个DataNode上，以便在请求时检索它们。它还管理文件，可以打开、关闭，如果需要，还可以重命名它们。
- en: Finally, the DataNodes carry out the actual read and write processes of the
    client. The client receives the required information from the DataNodes when a
    query is made. They also ensure the replication of data so that the system can
    be operated in a fault-tolerant manner.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，DataNodes执行客户端的实际读写过程。当进行查询时，客户端从DataNodes接收所需信息。它们还确保数据的复制，以便系统可以以容错方式运行。
- en: MapReduce
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MapReduce
- en: 'MapReduce is a programming model that supports the parallel processing of large
    amounts of data. It was originally developed by Google and can be divided into
    two phases:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: MapReduce是一种支持大量数据并行处理的编程模型。它最初由Google开发，可以分为两个阶段：
- en: '**Map**: In the map phase, a process is defined that can transform the input
    data into key-value pairs. Several mappers can then be set up to process a large
    amount of data simultaneously to enable faster processing.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Map**：在Map阶段，定义了一个可以将输入数据转换为键值对的过程。然后可以设置多个mapper来同时处理大量数据，从而实现更快的处理。'
- en: '**Reduce**: The Reduce phase starts after all mappers have finished and aggregates
    all values that have the same key. The aggregation can involve various functions,
    such as the sum or the determination of the maximum value. Between the end of
    the Map phase and the start of the Reduce phase, the data is shuffled and sorted
    according to the keys.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Reduce**：Reduce阶段在所有mapper完成后开始，聚合所有具有相同键的值。聚合可以涉及各种函数，例如求和或确定最大值。在Map阶段结束和Reduce阶段开始之间，数据根据键进行洗牌和排序。'
- en: A classic application for the MapReduce mechanism is word counting in documents,
    such as the seven Harry Potter volumes in our example. The task is to count how
    often the words “Harry” and “Potter” occur. To do this, in the map phase, each
    word is split into a key-value pair with the word as the key and the number one
    as the value, as the word has occurred once.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: MapReduce机制的一个经典应用是文档中的单词计数，例如我们例子中的七本《哈利·波特》系列。任务是计算“Harry”和“Potter”这两个词出现的频率。为此，在映射阶段，每个单词被分割成一个键值对，其中单词作为键，数字一作为值，因为单词出现了一次。
- en: 'The positive aspect of this is that this task can run in parallel and independently
    of each other, so that, for example, a mapper can run for each band or even for
    each page individually. This means that the task is parallelized and can be implemented
    much faster. The scaling depends only on the available computing resources and
    can be increased as required if the appropriate hardware is available. The output
    of the map phase could look like this, for example:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这的优点是这项任务可以并行运行，并且相互独立，例如，可以为每个波段或甚至每个页面单独运行一个映射器。这意味着任务可以并行化，并且可以更快地实现。扩展仅取决于可用的计算资源，如果硬件适当，可以按需增加。映射阶段的输出可能如下所示：
- en: '[PRE0]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![](../Images/943745977754bb6fb1de655d5485b617.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/943745977754bb6fb1de655d5485b617.png)'
- en: 'MapReduce using the example of word counts in Harry Potter books | Source:
    Author'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 使用《哈利·波特》书籍中的单词计数示例的MapReduce | 来源：作者
- en: Once all mappers have finished their work, the reduce phase can begin. For the
    word count example, all key-value pairs with the keys “Harry” and “Potter” should
    be grouped and counted.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦所有映射器完成工作，就可以开始减少阶段。对于单词计数示例，应该将所有键值对（键为“Harry”和“Potter”）分组并计数。
- en: 'The grouping produces the following result:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 分组会产生以下结果：
- en: '[PRE1]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The grouped result is then aggregated. As the words are to be counted in our
    example, the grouped values are added together:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将分组的结果进行聚合。在我们的例子中，要计算单词的频率，分组值相加：
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The advantage of this processing is that the task can be parallelized and at
    the same time only minimal file movement takes place. This means that even large
    volumes can be processed efficiently.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这种处理的优点是任务可以并行化，同时只发生最小限度的文件移动。这意味着即使处理大量数据也可以高效完成。
- en: Although many systems continue to use the MapReduce program, as used in the
    original Hadoop structure, more efficient frameworks, such as [Apache Spark](https://databasecamp.de/en/data/apache-sparks),
    have also been developed in the meantime. We will go into this in more detail
    later in the article.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管许多系统仍在使用原始Hadoop结构中使用的MapReduce程序，但在此期间也开发了更高效的框架，例如[Apache Spark](https://databasecamp.de/en/data/apache-sparks)。我们将在文章的后面更详细地介绍这一点。
- en: YARN (Yet Another Resource Negotiator)
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: YARN（另一种资源协调器）
- en: 'YARN (Yet Another Resource Negotiator) manages the hardware resources within
    the cluster. It separates resource management from data processing, which allows
    multiple applications (such as MapReduce, Spark, and Flink) to run efficiently
    on the same cluster. It focuses on key functions such as:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: YARN（另一种资源协调器）管理集群内的硬件资源。它将资源管理从数据处理中分离出来，使得多个应用程序（如MapReduce、Spark和Flink）可以在同一集群上高效运行。它专注于以下关键功能：
- en: Management of performance and memory resources, such as CPU or SSD storage space.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理性能和内存资源，例如CPU或SSD存储空间。
- en: Distribution of free resources to running processes, for example, MapReduce,
    Spark, or Flink.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将空闲资源分配给运行中的进程，例如MapReduce、Spark或Flink。
- en: Optimization and parallelization of job execution.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作业执行的优化和并行化。
- en: Similar to HDFS, YARN also follows a master-slave principle. The Resource Manager
    acts as the master and centrally monitors all resources in the entire cluster.
    It also allocates the available resources to the individual applications. The
    various node managers serve as slaves and are installed on each machine. They
    are responsible for the containers in which the applications run and monitor their
    resource consumption, such as memory space or CPU performance. These figures are
    fed back to the Resource Manager at regular intervals so that it can maintain
    an overview.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 与HDFS类似，YARN也遵循主从原则。资源管理器充当主节点，并集中监控整个集群中的所有资源。它还将可用资源分配给各个应用程序。各种节点管理器作为从节点，安装在每台机器上。它们负责运行应用程序的容器，并监控其资源消耗，如内存空间或CPU性能。这些数据定期反馈给资源管理器，以便它可以保持概览。
- en: 'At a high level, a request to YARN looks like this: the client calls the Resource
    Manager and requests the execution of an application. This then searches for available
    resources in the cluster and, if possible, starts a new instance of the so-called
    Application Master, which initiates and monitors the execution of the application.
    This in turn requests the available resources from the node manager and starts
    the corresponding containers. The calculation can now run in parallel in the containers
    and is monitored by the Application Master. After successful processing, YARN
    releases the resources used for new jobs.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在高层次上，对YARN的请求看起来是这样的：客户端调用资源管理器并请求执行应用程序。然后它在集群中搜索可用资源，如果可能的话，启动一个所谓的应用程序主实例，该实例启动并监控应用程序的执行。然后它从节点管理器请求可用资源并启动相应的容器。计算现在可以在容器中并行运行，并由应用程序主进行监控。在成功处理之后，YARN释放用于新作业的资源。
- en: Hadoop common
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Hadoop common
- en: 'Hadoop Common can be thought of as the foundation of the complete Hadoop ecosystem
    on which the main components can be built. It contains basic libraries, tools,
    and configuration files that can be used by all Hadoop components. The main components
    include:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 可以将Hadoop Common视为构建在完整Hadoop生态系统基础上的基石，主要组件可以在此基础上构建。它包含所有Hadoop组件都可以使用的库、工具和配置文件。主要组件包括：
- en: '**Common libraries and utilities**: Hadoop Common provides a set of Java libraries,
    [APIs](https://databasecamp.de/en/data/api-en), and utilities needed to run the
    cluster. This includes, for example, mechanisms for communication between the
    nodes in the cluster or support for different serialization formats, such as Avro.
    Interfaces required for file management in HDFS or other file systems are also
    included.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通用库和实用工具**：Hadoop Common提供了一组Java库、[API](https://databasecamp.de/en/data/api-en)和实用工具，这些工具是运行集群所需的。这包括例如集群节点之间的通信机制或对不同的序列化格式（如Avro）的支持。还包括用于HDFS或其他文件系统中文件管理的所需接口。'
- en: '**Configuration management**: Hadoop is based on a large number of [XML](https://databasecamp.de/en/data/xml-file)-based
    configuration files, which define the main system parameters that are essential
    for operation. One central aspect is the network parameters required to control
    the machines in the cluster. In addition, the permitted storage locations for
    HDFs are defined here or the maximum resource sizes, such as the usable storage
    space, are determined.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**配置管理**：Hadoop基于大量基于[XML](https://databasecamp.de/en/data/xml-file)的配置文件，这些文件定义了操作所必需的主要系统参数。一个中心方面是控制集群中机器所需的网络参数。此外，这里定义了HDFS的允许存储位置或最大资源大小，例如可用的存储空间。'
- en: '**Platform independence**: Hadoop was originally developed specifically for
    Linux environments. However, it can also be extended to other operating systems
    with the help of Hadoop Common. This includes native code support for additional
    environments, such as macOS or Windows.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平台独立性**：Hadoop最初是专门为Linux环境开发的。然而，在Hadoop Common的帮助下，它也可以扩展到其他操作系统。这包括对其他环境（如macOS或Windows）的原生代码支持。'
- en: '**Tools for I/O (input/output)**: A big data framework processes huge volumes
    of data that need to be stored and processed efficiently. The necessary building
    blocks for various file systems, such as TextFiles or Parquet, are therefore stored
    in Hadoop Common. It also contains the functionalities for the supported compression
    methods, which ensure that storage space is saved and processing time is optimized.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**I/O工具（输入/输出）**：大数据框架处理大量需要高效存储和处理的庞大数据量。因此，各种文件系统（如TextFiles或Parquet）所需的必要构建块存储在Hadoop
    Common中。它还包含支持的压缩方法的功能，确保节省存储空间并优化处理时间。'
- en: Thanks to this uniform and central code base, Hadoop Common provides improved
    modularity within the framework and ensures that all components can work together
    seamlessly.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这个统一和集中的代码库，Hadoop Common在框架内提供了改进的模块化，并确保所有组件可以无缝协同工作。
- en: Hadoop Ozone
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Hadoop Ozone
- en: Hadoop Ozone is a distributed object storage system that was introduced as an
    alternative to HDFS and was developed specifically for big data workloads. HDFS
    was originally designed for large files with many gigabytes or even terabytes.
    However, it quickly reaches its limits when a large number of small files need
    to be stored. The main problem is the limitation of the NameNode, which stores
    metadata in RAM and, therefore, encounters memory problems when billions of small
    files are kept.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop Ozone 是一种分布式对象存储系统，作为 HDFS 的替代品被引入，并专门为大数据工作负载开发。HDFS 最初是为具有数 GB 或甚至
    TB 的大型文件而设计的。然而，当需要存储大量小文件时，它很快就会达到其极限。主要问题是 NameNode 的限制，它将元数据存储在 RAM 中，因此当保留数十亿个小文件时，会遇到内存问题。
- en: In addition, HDFS is designed for classic Hadoop use within a computing cluster.
    However, current architectures often use a hybrid approach with storage solutions
    in the cloud. Hadoop Ozone solves these problems by providing a scalable and flexible
    storage architecture that is optimized for [Kubernetes](https://databasecamp.de/en/data/kubernetes-basics)
    and hybrid cloud environments.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，HDFS 是为计算集群内的经典 Hadoop 使用而设计的。然而，当前的架构通常采用混合方法，结合云中的存储解决方案。Hadoop Ozone 通过提供可扩展且灵活的存储架构来解决这些问题，该架构针对
    [Kubernetes](https://databasecamp.de/en/data/kubernetes-basics) 和混合云环境进行了优化。
- en: 'Unlike HDFS, where a NameNode handles all file metadata, Hadoop Ozone introduces
    a more flexible architecture that doesn’t rely on a single centralized NameNode,
    improving scalability. Instead, it uses the following components:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 与 HDFS 不同，在 HDFS 中一个 NameNode 处理所有文件元数据，Hadoop Ozone 引入了一种更灵活的架构，不依赖于单个集中式 NameNode，从而提高了可扩展性。相反，它使用以下组件：
- en: The **Ozone Manager** corresponds most closely to the HDFS NameNode, but only
    manages the bucket and volume metadata. It ensures efficient management of the
    objects and is also scalable, as not all file metadata has to be kept in RAM.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Ozone 管理器**与 HDFS NameNode 最相似，但仅管理桶和卷元数据。它确保对象的高效管理，并且具有可扩展性，因为并非所有文件元数据都需要保留在
    RAM 中。'
- en: The **Storage Container Manager (SCM)** can best be imagined as the DataNode
    in HDFS and it has the task of managing and replicating the data in so-called
    containers. Various replication strategies are supported, such as triple copying
    or erasure coding to save space.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**存储容器管理器 (SCM)** 可以最好地想象为 HDFS 中的 DataNode，它负责管理和复制所谓的容器中的数据。支持各种复制策略，如三副本复制或纠删码以节省空间。'
- en: The **Ozone 3 Gateway** has an S3-compatible API so it can be used as a replacement
    for Amazon S3\. This means that applications developed for AWS S3 can be easily
    connected to Ozone and interact with it without the need for code changes.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Ozone 3 网关**具有与 S3 兼容的 API，因此可以用作 Amazon S3 的替代品。这意味着为 AWS S3 开发的应用程序可以轻松连接到
    Ozone 并与之交互，而无需更改代码。'
- en: 'This structure gives Hadoop Ozone various advantages over HDFS, which we have
    briefly summarized in the following table:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构使 Hadoop Ozone 在以下表格中相对于 HDFS 具有多种优势，我们已简要总结如下：
- en: '| **Attribute** | **Hadoop Ozone** | **HDFS** |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| **属性** | **Hadoop Ozone** | **HDFS** |'
- en: '| Storage Structure | Object-based (buckets & keys) | Block-based (files &
    blocks) |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '| 存储结构 | 基于对象（桶和键） | 基于块（文件和块） |'
- en: '| Scalability | Millions to billions of small files | Problems with many small
    files |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
  zh: '| 可扩展性 | 百万到数十亿的小文件 | 许多小文件的问题 |'
- en: '| NameNode – Dependency | No central NameNode & scaling possible | NameNode
    is bottleneck |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
  zh: '| NameNode – 依赖 | 无中央 NameNode 且可扩展 | NameNode 是瓶颈 |'
- en: '| Cloud Integration | Supports S3 API, Kubernetes, multi-cloud | Strongly tied
    to the Hadoop Cluster |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
  zh: '| 云集成 | 支持 S3 API、Kubernetes、多云 | 强烈绑定到 Hadoop 集群 |'
- en: '| Replication Strategy | Classic 3-fold replication or erasure coding | Only
    3-fold replication |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
  zh: '| 复制策略 | 经典的三副本复制或纠删码 | 仅三副本复制 |'
- en: '| Applications | Big data, Kubernetes, hybrid cloud, S3 replacement | Traditional
    Hadoop workloads |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
  zh: '| 应用程序 | 大数据、Kubernetes、混合云、S3 替代品 | 传统 Hadoop 工作负载 |'
- en: Hadoop Ozone is a powerful extension of the ecosystem and enables the implementation
    of hybrid cloud architectures that would not have been possible with HDFS. It
    is also easy to scale as it is no longer dependent on a central name node. This
    means that big data applications with many, but small, files, such as those used
    for sensor measurements, can also be implemented without any problems.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop Ozone 是生态系统的强大扩展，它使得实现 HDFS 无法实现的混合云架构成为可能。它也易于扩展，因为它不再依赖于中央名称节点。这意味着具有许多但文件较小的大数据应用程序，如用于传感器测量的应用程序，也可以无任何问题地实现。
- en: How to start with Hadoop?
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何开始使用 Hadoop？
- en: Hadoop is a robust and scalable big data framework that powers some of the world’s
    largest data-driven applications. While it can seem overwhelming for beginners
    due to its many components, this guide will walk you through the first steps to
    get started with Hadoop in simple, easy-to-follow stages.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop是一个健壮且可扩展的大数据框架，为世界上一些最大的数据驱动应用程序提供动力。由于其许多组件，它可能对初学者来说显得有些令人不知所措，但本指南将引导您通过简单、易于遵循的阶段开始使用
    Hadoop。
- en: '**Installation of Hadoop**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**Hadoop的安装**'
- en: Before we can start working with Hadoop, we must first install it in our respective
    environment. In this chapter, we differentiate between several scenarios, depending
    on whether the framework is installed locally or in the cloud. At the same time,
    it is generally advisable to work on systems that use Linux or macOS as the operating
    system, as additional adaptations are required for Windows. In addition, Java
    should already be available, at least Java 8 or 11, and internal communication
    via SSH should be possible.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始使用 Hadoop 之前，我们必须首先在我们的相应环境中安装它。在本章中，我们根据框架是本地安装还是云安装来区分几种场景。同时，通常建议在操作系统为
    Linux 或 macOS 的系统上工作，因为需要为 Windows 进行额外的适配。此外，Java 应已可用，至少 Java 8 或 11，并且应能够通过
    SSH 进行内部通信。
- en: '**Local Installation of Hadoop**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**Hadoop的本地安装**'
- en: To try out Hadoop on a local computer and familiarize yourself with it, you
    can perform a single-node installation so that all the necessary components run
    on the same computer. Before starting the installation, you can check the latest
    version you want to install at [https://hadoop.apache.org/releases.html](https://hadoop.apache.org/releases.html),
    in our case this is version 3.4.1\. If a different version is required, the following
    commands can simply be changed so that the version number in the code is adjusted.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 要在本地计算机上尝试 Hadoop 并熟悉它，您可以执行单节点安装，这样所有必要的组件都运行在同一台计算机上。在开始安装之前，您可以在 [https://hadoop.apache.org/releases.html](https://hadoop.apache.org/releases.html)
    检查您想要安装的最新版本，在我们的例子中这是版本3.4.1。如果需要不同的版本，以下命令可以简单地更改，以便代码中的版本号进行调整。
- en: We then open a new terminal and execute the following code, which downloads
    the specified version from the Internet, unpacks the directory, and then changes
    to the unpacked directory.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们打开一个新的终端并执行以下代码，该代码从互联网下载指定的版本，解压目录，然后切换到解压后的目录。
- en: '[PRE3]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: If there are errors in the first line, this is most likely due to a faulty link
    and the version mentioned may no longer be accessible. A more up-to-date version
    should be used and the code executed again. The installation directory has a size
    of about one gigabyte.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果第一行有错误，这很可能是由于链接错误，提到的版本可能已经无法访问。应使用更新版本的版本，并再次执行代码。安装目录的大小约为1GB。
- en: The environment variables can then be created and set, which tells the system
    under which directory Hadoop is stored on the computer. The `PATH` variable then
    allows Hadoop commands to be executed from anywhere in the terminal without having
    to set the full path for the Hadoop installation.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，可以创建并设置环境变量，这告诉系统 Hadoop 存储在计算机上的哪个目录下。然后，`PATH` 变量允许在终端的任何位置执行 Hadoop 命令，而无需设置
    Hadoop 安装的完整路径。
- en: '[PRE4]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Before we start the system, we can change the basic configuration of Hadoop,
    for example, to define specific directories for HDFS or specify the replication
    factor. There are a total of three important configuration files that we can adjust
    before starting:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们启动系统之前，我们可以更改 Hadoop 的基本配置，例如，为 HDFS 定义特定的目录或指定副本因子。在启动之前，我们可以调整总共三个重要的配置文件：
- en: '`core-site.xml` configures basic Hadoop settings, such as the connection information
    for multiple nodes.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`core-site.xml` 配置基本 Hadoop 设置，例如多个节点的连接信息。'
- en: '`hdfs-site.xml` contains special parameters for the HDFS setup, such as the
    typical directories for data storage or the replication factor, which determines
    how many replicas of the data are stored.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hdfs-site.xml` 包含了 HDFS 设置的特殊参数，例如数据存储的典型目录或副本因子，它决定了存储的数据副本数量。'
- en: '`yarn-site.xml` configures the YARN component, which is responsible for resource
    management and job scheduling.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`yarn-site.xml` 配置 YARN 组件，该组件负责资源管理和作业调度。'
- en: 'For our local test, we can adjust the HDFS configuration so that the replication
    factor is set to 1, as we are only working on one server, and replication of the
    data is, therefore, not useful. To do this, we use a text editor, in our case
    `nano`, and open the configuration file for HDFS:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的本地测试，我们可以调整HDFS配置，将复制因子设置为1，因为我们只在一个服务器上工作，因此数据复制没有用。为此，我们使用文本编辑器，在我们的例子中是`nano`，打开HDFS的配置文件：
- en: '[PRE5]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'The file then opens in the terminal and probably does not yet have any entries.
    A new XML with the property key can then be added within the configuration area:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 文件随后在终端中打开，可能还没有任何条目。然后可以在配置区域中添加一个新的具有属性键的XML：
- en: '[PRE6]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Various properties can then be set according to this format. The different keys
    that can be specified in the configuration files, including the permitted values,
    can be found at [https://hadoop.apache.org/docs/current/hadoop-project-dist/](https://hadoop.apache.org/docs/current/hadoop-project-dist/).
    For HDFS, this overview can be seen [here](https://hadoop.apache.org/docs/current/hadoop-project-dist/hadoop-hdfs/hdfs-default.xml).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 可以根据此格式设置各种属性。配置文件中可以指定的不同键以及允许的值可以在[https://hadoop.apache.org/docs/current/hadoop-project-dist/](https://hadoop.apache.org/docs/current/hadoop-project-dist/)找到。对于HDFS，此概述可以在[这里](https://hadoop.apache.org/docs/current/hadoop-project-dist/hadoop-hdfs/hdfs-default.xml)看到。
- en: Now that the configuration has been completed, Hadoop can be started. To do
    this, HDFS is initialized, which is the first important step after a new installation,
    and the directory that is to be used as the NameNode is formatted. The next two
    commands then start HDFS on all nodes that are configured in the cluster and the
    resource management YARN is started.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 现在配置完成后，可以启动Hadoop。为此，需要初始化HDFS，这是新安装后的第一个重要步骤，并且将用作NameNode的目录被格式化。接下来的两个命令然后启动集群中配置的所有节点上的HDFS，并启动资源管理YARN。
- en: '[PRE7]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Problems may occur in this step if Java has not yet been installed. However,
    this can easily be done with the corresponding installation. In addition, when
    I tried this on macOS, the NameNode and DataNode of HDFS had to be started explicitly:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 如果Java尚未安装，此步骤可能会出现问题。然而，这可以通过相应的安装轻松完成。此外，当我在macOS上尝试此操作时，HDFS的NameNode和DataNode必须显式启动：
- en: '[PRE8]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'For YARN, the same procedure works for the Resource and NodeManager:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 对于YARN，资源管理和NodeManager的相同程序适用：
- en: '[PRE9]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Finally, the running processes can be checked with the *jps* command to see
    whether all components have been started correctly.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，可以使用*jps*命令检查运行中的进程，以查看是否所有组件都已正确启动。
- en: Hadoop installation in a distributed system
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分布式系统中的Hadoop安装
- en: 'For resilient and productive processes, Hadoop is used in a distributed environment
    with multiple servers, known as nodes. This ensures greater scalability and availability.
    A distinction is typically made between the following cluster roles:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 对于弹性和高效的过程，Hadoop在具有多个服务器（称为节点）的分布式环境中使用，这确保了更大的可伸缩性和可用性。通常区分以下集群角色：
- en: '**NameNode**: This role stores the metadata and manages the file system (HDFS).'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NameNode**：此角色存储元数据并管理文件系统（HDFS）。'
- en: '**DataNode**: This is where the actual data is stored and the calculations
    take place.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**DataNode**：这是实际数据存储和计算发生的地方。'
- en: '**ResourceManager & NodeManagers**: These manage the cluster resources for
    YARN.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ResourceManager & NodeManagers**：这些管理YARN的集群资源。'
- en: 'The same commands that were explained in more detail in the last section can
    then be used on the individual servers. However, communication must also be established
    between them so that they can coordinate with each other. In general, the following
    sequence can be followed during installation:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 然后可以在各个服务器上使用上一节中更详细解释的相同命令。然而，它们之间也必须建立通信，以便它们可以相互协调。通常，在安装过程中可以遵循以下顺序：
- en: Set up several Linux-based servers to be used for the cluster.
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置几个基于Linux的服务器，用于集群。
- en: Set up SSH access between the servers so that they can communicate with each
    other and send data.
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在服务器之间设置SSH访问，以便它们可以相互通信并发送数据。
- en: Install Hadoop on each server and make the desired configurations.
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在每个服务器上安装Hadoop并做出所需的配置。
- en: Assign roles and define the NameNodes and DataNodes in the cluster.
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在集群中分配角色并定义NameNodes和数据节点。
- en: Format NameNodes and then start the cluster.
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 格式化NameNodes然后启动集群。
- en: The specific steps and the code to be executed then depend more on the actual
    implementation.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 具体的步骤和要执行的代码更多地取决于实际的实现。
- en: Hadoop installation in the cloud
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 云端Hadoop安装
- en: 'Many companies use Hadoop in the cloud to avoid having to operate their own
    cluster, potentially save costs, and also be able to use modern hardware. The
    various providers already have predefined programs with which Hadoop can be used
    in their environments. The most common Hadoop cloud services are:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 许多公司使用云中的Hadoop来避免运营自己的集群，可能节省成本，并且能够使用现代硬件。各种提供商已经预定义了程序，可以在他们的环境中使用Hadoop。最常见的Hadoop云服务包括：
- en: '**AWS EMR (Elastic MapReduce)**: This program is based on Hadoop and, as the
    name suggests, also uses MapReduce, which allows users to write their programs
    in Java that process and store large amounts of data in a distributed manner.
    The cluster runs on virtual servers in the Amazon Elastic Compute Cloud (EC2)
    and stores the data in the Amazon Simple Storage Service (S3). The keyword “Elastic”
    comes from the fact that the system can change dynamically to adapt to the required
    computing power. Finally, AWS EMR also offers the option of using other Hadoop
    extensions such as Apache Spark or Apache Presto.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AWS EMR (弹性MapReduce)**: 该程序基于Hadoop，正如其名所示，也使用MapReduce，这允许用户用Java编写程序，以分布式方式处理和存储大量数据。集群运行在亚马逊弹性计算云（EC2）的虚拟服务器上，并将数据存储在亚马逊简单存储服务（S3）中。关键字“弹性”来源于系统可以动态地改变以适应所需的计算能力。最后，AWS
    EMR还提供了使用其他Hadoop扩展选项，如Apache Spark或Apache Presto。'
- en: '**Google Dataproc**: Google’s alternative is called Dataproc and enables a
    fully managed and scalable Hadoop cluster in the Google Cloud. It is based on
    BigQuery and uses Google Cloud Storage for data storage. Many companies, such
    as Vodafone and Twitter are already using this system.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Google Dataproc**：谷歌的替代方案称为Dataproc，它允许在谷歌云中完全管理和可扩展的Hadoop集群。它基于BigQuery，并使用谷歌云存储进行数据存储。许多公司，如沃达丰和Twitter，已经使用这个系统。'
- en: '**Azure HDInsight**: The Microsoft Azure Cloud offers HDInsight for complete
    Hadoop use in the cloud and also provides support for a wide range of other open-source
    programs.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure HDInsight**：微软的Azure云提供了HDInsight，用于在云中完全使用Hadoop，并提供了对广泛其他开源程序的支持。'
- en: The overall advantage of using the cloud is that no manual installation and
    maintenance work is required. Several nodes are used automatically and more are
    added depending on the computing requirements. For the customer, the advantage
    of automatic scaling is that costs can be controlled and only what is used is
    paid for.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 使用云的整体优势在于无需手动安装和维护工作。根据计算需求，会自动使用几个节点，并添加更多节点。对于客户来说，自动扩展的优势在于可以控制成本，并且只支付所使用的部分。
- en: With an on-premise cluster, on the other hand, the hardware is usually set up
    in such a way that it is still functional even at peak loads so that the entire
    hardware is not required for a large part of the time. Finally, the advantage
    of using the cloud is that it makes it easier to integrate other systems that
    run with the same provider, for example.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，本地集群的硬件通常设置得足够强大，即使在高峰负载下也能保持功能，这样大部分时间就不需要整个硬件。最后，使用云的优势在于它使得与其他同一提供商运行的系统集成变得更加容易，例如。
- en: Basic Hadoop commands for beginners
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初学者使用的Hadoop基本命令
- en: Regardless of the architecture selected, the following commands can be used
    to perform very general and frequently recurring actions in Hadoop. This covers
    all areas that are required in an ETL process in Hadoop.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 不论选择哪种架构，以下命令都可以用于在Hadoop中执行非常通用且经常重复的操作。这涵盖了Hadoop ETL过程中所需的所有区域。
- en: '**Upload File to HDFS**: To be able to execute an HDFS command, the beginning
    `hdfs dfs` is always required. You use put to define that you want to upload a
    file from the local directory to HDFS. The `local_file.txt` describes the file
    to be uploaded. To do this, the command is either executed in the directory of
    the file or the complete path to the file is added instead of the file name. Finally,
    use `/user/hadoop/` to define the directory in HDFS in which the file is to be
    stored.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上传文件到HDFS**：要能够执行HDFS命令，始终需要以`hdfs dfs`开头。您使用put来定义您想要从本地目录上传文件到HDFS。`local_file.txt`描述了要上传的文件。为此，命令可以在文件的目录中执行，或者将文件的完整路径添加到文件名而不是文件名。最后，使用`/user/hadoop/`来定义文件要存储在HDFS中的目录。'
- en: '[PRE10]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '**List files in HDFS**: You can use `-ls` to list all files and folders in
    the HDFS directory /user/hadoop/ and have them displayed as a list in the terminal.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**列出HDFS中的文件**：您可以使用`-ls`列出HDFS目录`/user/hadoop/`中的所有文件和文件夹，并在终端中以列表形式显示。'
- en: '[PRE11]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '**Download file from HDFS**: The `-get` parameter downloads the file `/user/hadoop/file.txt`
    from the HDFS directory to the local directory. The dot *.* indicates that the
    file is stored in the current local directory in which the command is being executed.
    If this is not desired, you can define a corresponding local directory instead.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从HDFS下载文件**：`-get`参数将文件`/user/hadoop/file.txt`从HDFS目录下载到本地目录。点*.*表示文件存储在执行命令的当前本地目录中。如果不希望这样，可以定义相应的本地目录。'
- en: '[PRE12]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '**Delete files in HDFS**: Use *-rm* to delete the file */user/hadoop/file.txt*
    from the HDFS directory. This command also automatically deletes all replications
    that are distributed across the cluster.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**删除HDFS中的文件**：使用*-rm*从HDFS目录中删除文件*/user/hadoop/file.txt*。此命令还会自动删除分布在集群中的所有副本。'
- en: '[PRE13]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '**Start MapReduce command (process data)**: MapReduce is the distributed computing
    model in Hadoop that can be used to process large amounts of data. Using `hadoop
    jar` indicates that a Hadoop job with a “.jar” file is to be executed. The corresponding
    file containing various MapReduce programs is located in the directory `/usr/local/hadoop/share/hadoop/mapreduce/hadoop-mapreduce-examples-*.jar`.
    From these examples, the `wordcount` job is to be executed, which counts the words
    occurring in a text file. The data to be analyzed is located in the HDFS directory
    `/input` and the results are then to be stored in the directory `output/`.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**启动MapReduce命令（处理数据）**：MapReduce是Hadoop中的分布式计算模型，可以用于处理大量数据。使用`hadoop jar`表示要执行一个带有“.jar”文件的Hadoop作业。包含各种MapReduce程序的相应文件位于目录`/usr/local/hadoop/share/hadoop/mapreduce/hadoop-mapreduce-examples-*.jar`中。从这些示例中，将执行`wordcount`作业，该作业统计文本文件中出现的单词。要分析的数据位于HDFS目录`/input`中，然后结果将被存储在目录`output/`中。'
- en: '[PRE14]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '**Monitor the progress of a job**: Despite the distributed computing power,
    many MapReduce jobs take a certain amount of time to run, depending on the amount
    of data. Their status can therefore be monitored in the terminal. The resources
    and running applications can be displayed using YARN. To be able to execute a
    command in this system, we start with the command *yarn,* and with the help of
    application-list we get a list of all active applications. Various information
    can be read from this list, such as the unique ID of the applications, the user
    who started them, and the progress in %.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控作业的进度**：尽管有分布式计算能力，但许多MapReduce作业的运行时间取决于数据量。因此，可以在终端中监控其状态。可以使用YARN显示资源和正在运行的应用程序。要在此系统中执行命令，我们首先使用命令*yarn*，然后借助application-list获取所有活动应用程序的列表。可以从该列表中读取各种信息，例如应用程序的唯一ID、启动它们的使用者以及进度百分比。'
- en: '[PRE15]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '**Display logs of a running job**: To be able to delve deeper into a running
    process and identify potential problems at an early stage, we can read out the
    logs. The logs command is used for this, with which the logs of a specific application
    can be called up. The unique application ID is utilized to define this application.
    To do this, the APP_ID must be replaced by the actual ID in the following command,
    and the greater than and less than signs must be removed.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**显示正在运行作业的日志**：为了能够更深入地了解正在运行的过程并在早期阶段识别潜在问题，我们可以读取日志。日志命令用于此目的，通过该命令可以调用特定应用程序的日志。独特的应用程序ID被用来定义此应用程序。为此，必须在以下命令中将APP_ID替换为实际的ID，并且必须移除大于和小于符号。'
- en: '[PRE16]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: With the help of these commands, data can already be saved in HDFS, and MapReduce
    jobs can also be created. These are the central actions for filling the cluster
    with data and processing it.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这些命令，数据可以已保存在HDFS中，并且也可以创建MapReduce作业。这些是填充集群并处理数据的基本操作。
- en: Debugging & logging in Hadoop
  id: totrans-135
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Hadoop中的调试与日志记录
- en: For the cluster to be sustainable in the long term and to be able to read out
    errors, it is important to master basic debugging and logging commands. As Hadoop
    is a distributed system, errors can occur in a wide variety of components and
    nodes. It is therefore essential that you are familiar with the corresponding
    commands to quickly find and switch off errors.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使集群能够长期可持续，并且能够读取错误，掌握基本的调试和日志记录命令非常重要。由于Hadoop是一个分布式系统，错误可能发生在各种组件和节点上。因此，熟悉相应的命令以快速找到并关闭错误至关重要。
- en: 'Detailed log files for the various components are stored in the `$HADOOP_HOME/logs`directory.
    The log files for the various servers and components can then be found in their
    subdirectories. The most important ones are:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 详细日志文件存储在 `$HADOOP_HOME/logs` 目录中。各种服务器和组件的日志文件可以在它们的子目录中找到。其中最重要的是：
- en: '**NameNode-Logs** contains information about the HDFS metadata and possible
    connection problems:'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NameNode-Logs** 包含有关 HDFS 元数据和可能的连接问题的信息：'
- en: '[PRE17]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '**DataNode logs** show problems with the storage of data blocks:'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**DataNode 日志**显示了数据块存储的问题：'
- en: '[PRE18]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'YARN **ResourceManager logs** reveal possible resource problems or errors in
    job scheduling:'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: YARN **ResourceManager 日志**揭示了作业调度中可能出现的资源问题或错误：
- en: '[PRE19]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '**NodeManager logs** help with debugging executed jobs and their logic:'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NodeManager 日志**有助于调试已执行的作业及其逻辑：'
- en: '[PRE20]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'With the help of these logs, specific problems in the processes can be identified
    and possible solutions can be derived from them. However, if there are problems
    in the entire cluster and you want to check the overall status across individual
    servers, it makes sense to carry out a detailed cluster analysis with the following
    command:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这些日志，可以识别出过程中的具体问题，并从中得出可能的解决方案。然而，如果整个集群存在问题，并且您想检查各个服务器上的整体状态，那么使用以下命令进行详细的集群分析是有意义的：
- en: '[PRE21]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'This includes the number of active and failed DataNodes, as well as the available
    and occupied storage capacities. The replication status of the HDFS files is also
    displayed here and additional runtime information about the cluster is provided.
    An example output could then look something like this:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括活动数据节点和失败数据节点的数量，以及可用和已占用的存储容量。这里还显示了 HDFS 文件的复制状态，并提供了有关集群的附加运行时信息。一个示例输出可能看起来像这样：
- en: '[PRE22]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: With these first steps, we have learned how to set up a Hadoop in different
    environments, store and manage data in HDFS, execute MapReduce jobs, and read
    the logs to detect and fix errors. This will enable you to start your first project
    in Hadoop and gain experience with big data frameworks.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这些初步步骤，我们已经学会了如何在不同的环境中设置 Hadoop，如何在 HDFS 中存储和管理数据，如何执行 MapReduce 作业，以及如何读取日志以检测和修复错误。这将使您能够开始您的第一个
    Hadoop 项目，并获得大数据框架的经验。
- en: In this part, we covered the core components of Hadoop, including HDFS, YARN,
    and MapReduce. We also walked through the installation process, from setting up
    Hadoop in a local or distributed environment to configuring key files such as
    core-site.xml and hdfs-site.xml. Understanding these components is crucial for
    efficiently storing and processing large datasets across clusters.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在这部分中，我们介绍了 Hadoop 的核心组件，包括 HDFS、YARN 和 MapReduce。我们还介绍了安装过程，从在本地或分布式环境中设置 Hadoop
    到配置关键文件，如 core-site.xml 和 hdfs-site.xml。理解这些组件对于在集群中有效地存储和处理大型数据集至关重要。
- en: If this basic setup is not enough for your use case and you want to learn how
    you can extend your Hadoop cluster to make it more adaptable and scalable, then
    our next part is just right for you. We will dive deeper into the large Hadoop
    ecosystem including tools like Apache Spark, HBase, Hive, and many more that can
    make your cluster more scalable and adaptable. Stay tuned!
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这个基本设置不足以满足您的用例，并且您想了解如何扩展您的 Hadoop 集群以使其更具适应性和可扩展性，那么我们接下来的部分正是您所需要的。我们将深入了解庞大的
    Hadoop 生态系统，包括 Apache Spark、HBase、Hive 等工具，这些工具可以使您的集群更具可扩展性和适应性。敬请期待！
