- en: How to Build Effective Agentic Systems with LangGraph
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-build-effective-agentic-systems-with-langgraph/](https://towardsdatascience.com/how-to-build-effective-agentic-systems-with-langgraph/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1759176334067" class="mdspan-comment">With the rise</mdspan>
    of powerful AI models, such as GPT-5 and Gemini 2.5 Pro, we also see an increase
    in agentic frameworks to utilize these models. These frameworks make working with
    AI models simpler by abstracting away a lot of challenges, such as tool-calling,
    agentic state handling, and human-in-the-loop setups.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, in this article, I’ll dive deeper into LangGraph, one of the available
    agentic AI frameworks. I’ll utilize it to develop a simple agentic application,
    with several steps highlighting the benefits of agentic AI packages. I’ll also
    cover the pros and cons of using LangGraph and other similar agentic frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’m not sponsored in any way by LangGraph to create this article. I simply
    chose the framework as it is one of the most prevalent ones out there. There are
    many other options out there, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: LangChain
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LlamaIndex
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CrewAI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Advanced LangGraph ](../Images/fbd8c36b259babd97616538680de4eec.png)'
  prefs: []
  type: TYPE_IMG
- en: This figure shows an example of an advanced AI workflow you can implement with
    LangGraph. The workflow consists of several routing steps, each leading to different
    function handlers to effectively handle the user request. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Why do you need an agentic framework?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are numerous packages out there that are supposed to make programming
    applications easier. In a lot of cases, these packages have the exact opposite
    effect, because they obscure the code, don’t work well in production, and sometimes
    make it harder to debug.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, you need to find the packages that simplify your application by abstracting
    away boilerplate code. This principle is often highlighted in the startup world
    with a quote like the one below:'
  prefs: []
  type: TYPE_NORMAL
- en: Focus on solving the exact problem you’re trying to solve. All other (previously
    solved problems) should be outsourced to other applications
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'An agentic framework is required because it abstracts away a lot of complications
    you do not want to deal with:'
  prefs: []
  type: TYPE_NORMAL
- en: Maintaining state. Not just message history, but all other information you gather,
    for example, when performing RAG
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tool usage. You don’t want to set up your own logic for executing tools. Rather,
    you should simply define them and let the agentic framework handle how to invoke
    the tools. (This is especially relevant for parallel and async tool calling)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thus, using an agentic framework abstracts away a lot of complications, so you
    can focus on the core part of your product.
  prefs: []
  type: TYPE_NORMAL
- en: Basics of LangGraph
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To get started implementing LangGraph, I begin by reading [the docs](https://langchain-ai.github.io/langgraph/concepts/why-langgraph/),
    covering:'
  prefs: []
  type: TYPE_NORMAL
- en: Basic chatbot implementation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tool usage
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maintaining and updating the state
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'LangGraph is, as its name suggests, based on building graphs and executing
    this graph per request. In a graph, you can define:'
  prefs: []
  type: TYPE_NORMAL
- en: The state (the current information kept in memory)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nodes. Typically, an LLM or a tool call, for example, classifying user intent,
    or answering the user’s question
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Edges. Conditional logic determines which node to go to next.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All of which stems from basic graph theory.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing a workflow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![LangGraph with Router and Tools](../Images/2159dfb38340661f339a2f76cb9848b7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'In this article, you’ll create an agentic workflow as seen in this figure,
    where you’ll have a user query to start. This query is routed to one of three
    options: to either add a new document to the database, delete a document from
    the database, or ask a question about a document in the database. Image by the
    author.'
  prefs: []
  type: TYPE_NORMAL
- en: I believe one of the best ways of learning is to simply try things out for yourself.
    Thus, I’ll implement a simple workflow in LangGraph. You can learn about building
    these workflows in the workflow docs, which is based on Anthropic’s Building effective
    agents blog (one of my favorite blog posts about agents, which I’ve covered in
    several of my earlier articles. I highly recommend reading it.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ll make a simple workflow to define an application where a user can:'
  prefs: []
  type: TYPE_NORMAL
- en: Create documents with text
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Delete documents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Search in documents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To do this, I’ll create the following workflow:'
  prefs: []
  type: TYPE_NORMAL
- en: Detect user intent. Do they want to create a document, delete a document, or
    search in a document?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Given the outcome of step 1, I’ll have different flows to handle each of them.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You could also do this by simply defining all the tools and giving the agent
    access to create/delete/search a document. However, if you want to do more actions
    depending on intent, doing an intent classification routing step first is the
    way to go.
  prefs: []
  type: TYPE_NORMAL
- en: Loading imports and LLM
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, I’ll load the required imports and the LLM I’m using. I’ll be using AWS
    Bedrock, though you can use other providers, as you can see from [step 3 in this
    tutorial](https://langchain-ai.github.io/langgraph/tutorials/get-started/1-build-basic-chatbot/#__tabbed_1_1).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: I also defined the database as a dictionary of files. In production, you would
    naturally use a proper database; however, I simplify it for this tutorial
  prefs: []
  type: TYPE_NORMAL
- en: Defining the graph
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Next, it’s time to define the graph. I first create the Router object, which
    will classify the user’s prompt into one of three intents:'
  prefs: []
  type: TYPE_NORMAL
- en: add_document
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: delete_document
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ask_document
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: I define the state where we store the user input, the router’s decision (one
    of the three intents), and then ensure structured output from the LLM. The structured
    output ensures the model responds with one of the three intents.
  prefs: []
  type: TYPE_NORMAL
- en: Continuing, I’ll define the tools we are using in this article, one for each
    of the intents.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'And finally, we build the graph with nodes and edges:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'The last display function should show the graph as you see below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![LangGraph Router Graph](../Images/0098d953ec30858256c8b2ae11d4cffe.png)'
  prefs: []
  type: TYPE_IMG
- en: This figure shows the graph you just created. Image by the author,
  prefs: []
  type: TYPE_NORMAL
- en: Now you can try out the workflow by asking a question per intent.
  prefs: []
  type: TYPE_NORMAL
- en: '**Add a document:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '**Search a document:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '**Delete a document**:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Great! You can see the workflow is working with the different routing options.
    Feel free to add more intents or more nodes per intent to create a more complex
    workflow.
  prefs: []
  type: TYPE_NORMAL
- en: Stronger agentic use cases
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The difference between agentic workflows and fully agentic applications is
    sometimes confusing. However, to separate the two terms, I’ll use the quote below
    from [Anthropic’s Building effective agents](https://www.anthropic.com/engineering/building-effective-agents):'
  prefs: []
  type: TYPE_NORMAL
- en: Workflows are systems where LLMs and tools are orchestrated through predefined
    code paths. Agents, on the other hand, are systems where LLMs dynamically direct
    their own processes and tool usage, maintaining control over how they accomplish
    tasks.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most challenges you solve with LLMs will use the workflow pattern, because most
    problems (from my experience) are pre-defined, and should have a pre-determined
    set of guardrails to follow. In the example above, when adding/deleting/searching
    documents, you should absolutely set up a pre-determined workflow by defining
    the intent classifier and what to do given each intent.
  prefs: []
  type: TYPE_NORMAL
- en: However, sometimes, you also want more autonomous agentic use cases. Imagine,
    for example, Cursor, where they want a coding agent that can search through your
    code, check the newest documentation online, and modify your code. In these instances,
    it’s difficult to create pre-determined workflows because there are so many different
    scenarios that can occur.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to create more autonomous agentic systems, you can read more about
    that [here](https://langchain-ai.github.io/langgraph/concepts/agentic_concepts/).
  prefs: []
  type: TYPE_NORMAL
- en: LangGraph pros and cons
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Pros
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'My three main positives about LangGraph are:'
  prefs: []
  type: TYPE_NORMAL
- en: Easy to set up
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Open-source
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Simplifies your code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It was simple to set up LangGraph and quickly get it working. Especially when
    following their documentation, or feeding their documentation to Cursor and prompting
    it to implement specific workflows.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, the code for LangGraph is open-source, meaning you can keep running
    the code, no matter what happens to the company behind it or changes they decide
    to make. I think this is crucial if you want to deploy it to production. Lastly,
    LangGraph also simplifies a lot of the code and abstracts away a lot of logic
    you would’ve had to write in Python yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Cons
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: However, there are also some downsides to LangGraph that I’ve noticed during
    implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Still a surprising amount of boilerplate code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You will encounter LangGraph-specific errors
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When implementing my own custom workflow, I felt I still had to add a lot of
    boilerplate code. Though the amount of code was definitely less than if I’d implemented
    everything from scratch, I found myself surprised by the amount of code I had
    to add to create a relatively simple workflow. However, I think part of this is
    that LangGraph attempts to position itself as a lower-code tool than, for example,
    a lot of functionality you find in LangChain (which I think is good because LangChain,
    in my opinion, abstracts away too much, making it harder to debug your code).
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, as with many externally installed packages, you will encounter
    LangGraph-specific issues when implementing the package. For example, when I wanted
    to preview the graph of the workflow I created, I got an issue relating to the
    *draw_mermaid_png* function. Encountering such errors is inevitable when using
    external packages, and it will always be a trade-off between the helpful code
    abstractions a package gives you, versus the different kinds of bugs you may face
    using such packages.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: All in all, I find LangGraph a helpful package when dealing with agentic systems.
    Setting up my desired workflow by first doing intent classification and proceeding
    with different flows depending on intent was relatively simple. Furthermore, I
    think LangGraph found a good middle ground between not abstracting away all logic
    (obscuring the code, making it harder to debug) and actually abstracting away
    challenges I don’t want to deal with when developing my agentic system. There
    are both positives and negatives to implementing such agentic frameworks, and
    I think the best way to make this trade-off is by implementing simple workflows
    yourself.
  prefs: []
  type: TYPE_NORMAL
