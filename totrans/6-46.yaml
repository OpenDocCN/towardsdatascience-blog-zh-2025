  zh: '[PRE4]'
- en: Screening Through Fits
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过拟合进行筛选
- en: 'What we have seen here was presented as a way to tell, with statistical significance,
    whether a model fits better than another, simpler one. However, there’s a much
    more interesting "secondary" application stemming from this "direct" application.
    Indeed it was this secondary application what prompted me to work on this problem:
    You can run fits automatically on various (x, y) vectors to detect trends automatically.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里看到的是作为一种方法来告诉，具有统计显著性，一个模型是否比另一个更简单的一个拟合得更好。然而，有一个更有趣的“次要”应用是从这个“直接”应用中产生的。事实上，正是这个次要应用促使我研究这个问题：你可以自动对各种(x,
    y)向量进行拟合，以自动检测趋势。
- en: For instance, in the example I started this post with, one could run the fits
    and F-tests on various sets of concentrations and signals to automatically determine
    in which cases one can detect binding in the form of statistically significant
    fits to the more complex model.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在我开始这篇帖子时提到的例子中，可以对各种浓度和信号集进行拟合和F检验，以自动确定在哪些情况下可以检测到以对更复杂模型具有统计学意义的拟合形式的结合。
- en: 'One can easily edit the Matlab code I provided above to run through various
    (x, y) sets and print flags each time the more complex model fits statistically
    better, possibly also plotting the data and fits so that the user can inspect
    the results and judge the conclusion based on expertise:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 可以轻松编辑我提供的上述Matlab代码，以运行通过各种(x, y)集，并在更复杂的模型在统计上拟合得更好时打印标志，可能还会绘制数据拟合，以便用户可以检查结果并基于专业知识做出判断：
- en: '![Screenshot by the author showing the output of a Matlab program that automatically
    detects which y vectors of a dataset fit vs. x with a model more complex than
    linear.](../Images/55daabf0effbfc6752fa8169091ab207.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![作者提供的屏幕截图，显示了一个自动检测数据集中哪些y向量与x拟合比线性模型更复杂的Matlab程序的输出。](../Images/55daabf0effbfc6752fa8169091ab207.png)'
- en: Screenshot by the author showing the output of a Matlab program that automatically
    detects which y vectors of a dataset fit vs. x with a model more complex than
    linear.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的屏幕截图，显示了一个自动检测数据集中哪些y向量与x拟合比线性模型更复杂的Matlab程序的输出。
- en: Conclusion
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: We went here through the F-test for nested models, a powerful statistical technique
    that compares two regression models and determines if the added complexity of
    the more complex model is "statistically justified". By implementing this method,
    you ensure that your model selection is grounded in statistical evidence rather
    than subjective preference.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过嵌套模型的F检验来到这里，这是一种强大的统计技术，它比较两个回归模型，并确定更复杂模型的增加复杂性是否“在统计上合理”。通过实施这种方法，你确保你的模型选择基于统计证据，而不是主观偏好。
- en: 'If you liked this, here are other deep hands-on explanations that I wrote and
    you may enjoy or find useful:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢这个，这里有一些我写的其他深入的实际操作解释，你可能喜欢或觉得有用：
- en: '[**The power and simplicity of propagating errors with Monte Carlo simulations**](https://towardsdatascience.com/the-power-and-simplicity-of-propagating-errors-with-monte-carlo-simulations-9c8dcca9d90d)'
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**蒙特卡洛模拟传播误差的强大与简单**](https://towardsdatascience.com/the-power-and-simplicity-of-propagating-errors-with-monte-carlo-simulations-9c8dcca9d90d)'
