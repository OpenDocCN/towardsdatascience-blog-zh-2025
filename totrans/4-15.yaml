- en: Visualize Data Streams in Python
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/visualize-data-streams-in-python-b3c91a2d4d7c/](https://towardsdatascience.com/visualize-data-streams-in-python-b3c91a2d4d7c/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/1960081226317975d5548e93e5557154.png)'
  prefs: []
  type: TYPE_IMG
- en: Python offers many useful features in its standard libraries. Hiding in the
    **collections** library, there’s a lesser known data structure, the **deque**
    [1] **** (apparently pronounced _dec_k). Let me show you what it is, how it works
    and why it is a perfect data structure for plotting continuous data from a stream!
  prefs: []
  type: TYPE_NORMAL
- en: Basics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Deque** is a data type imported from the collections module, it stands for
    double ended queue. Essentially it is a list with two ends, so you can easily
    add/remove from the head or tail.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Appending to either end of a double ended queue](../Images/5e630cd3bddd00bfecde7e939b3a5e85.png)'
  prefs: []
  type: TYPE_IMG
- en: Appending to either end of a double ended queue
  prefs: []
  type: TYPE_NORMAL
- en: To use it we declare a variable for the queue. Since the queue has two ends,
    we can easily append to both ends with either **append** to add to the tail or
    **appendleft** to add to the beginning of the list.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: You can also pop from both ends of the queue with either **pop** for the right
    side or **popleft** for removing elements from the start.
  prefs: []
  type: TYPE_NORMAL
- en: '![Removing elements from the deque](../Images/fc1ef94d4ed37223fbf56cd99f462432.png)'
  prefs: []
  type: TYPE_IMG
- en: Removing elements from the deque
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Limited Length Buffer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The real power of the **deque** comes to show, once we limit the length of the
    queue. In the constructor we can optionally supply a max length integer for the
    queue, which is by default None and the list is not limited in size. The interesting
    part is the behaviour once we append to either side of the list when it’s full.
    The list will shift all items away from the inserted end and pop the last item
    on the other end of the queue.
  prefs: []
  type: TYPE_NORMAL
- en: '![Appending to a deque with limited length](../Images/811e9a2fe0eef4f6409dd8fbe5ae4634.png)'
  prefs: []
  type: TYPE_IMG
- en: Appending to a deque with limited length
  prefs: []
  type: TYPE_NORMAL
- en: So if we append on the right side, all elements shift to the left by one index
    and the first element on the left side gets discarded. In the following example,
    we start with three elements "a,b,c" in order in a **deque** of length three,
    so it is full at that point. If we add another element "d" at the end using **append**,
    the first element "a" will be removed to keep the list at the max length of 3.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Accordingly if we append to the left side, the elements shift to the right and
    the last item at the end is popped. So if we append an "a" at the left end of
    the queue, we push out the last element, which is the "d" and end up again with
    the sequence "a,b,c" in the queue.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Plotting Data Stream
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now let’s see a practical example with a usage of the **deque** data structure
    for data visualization. I am going to use my webcam stream, where we want to track
    the position of the green ball on the screen.
  prefs: []
  type: TYPE_NORMAL
- en: '![Original input video](../Images/0bd2c3e46a544c2765e3377deda84c2f.png)'
  prefs: []
  type: TYPE_IMG
- en: Original input video
  prefs: []
  type: TYPE_NORMAL
- en: Since the input is an indefinitely long stream as long as we keep the webcam
    video input open, we cannot simply keep adding tracked positions to a list, as
    this would just continuously grow in size. Instead, the goal is to show a trail
    for the trajectory of the ball with a limited amount of historic points, like
    in the sketch below.
  prefs: []
  type: TYPE_NORMAL
- en: '![Sketch of the desired trajectory trail](../Images/d0b8ed16b570777a81af11e8f501ed6f.png)'
  prefs: []
  type: TYPE_IMG
- en: Sketch of the desired trajectory trail
  prefs: []
  type: TYPE_NORMAL
- en: The setup for this project is taken from an earlier project, you can find the
    full source code at the end. The important part is that we create a **deque**
    variable for the position tracking with a limited length.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: That’s actually all we need, the queue will only keep the last 20 points. When
    adding a new point when the list is already at full capacity, the oldest point
    will just be popped. That way, we can achieve the snake-like trailing effect.
    To draw the trajectory, we simply iterate over pairs
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![Ball tracking with animated trail](../Images/3570bdf8eff4549aeaf0f37e3d01f6d6.png)'
  prefs: []
  type: TYPE_IMG
- en: Ball tracking with animated trail
  prefs: []
  type: TYPE_NORMAL
- en: We can also write this loop in a more *pythonic* way using the **zip** function
    (no import needed) and iterating directly over pairs of trajectory points. However,
    to do the array slicing to offset the **iterable** for the second point, we need
    to convert the **deque** to a list, otherwise we will get an error.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: An even better way to do this iteration is by using the **pairwise** [2] function
    from the **itertools** library. This is also part of the standard library in python
    and doesn’t require any additional pip packages.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The output is still the same, but this is a much cleaner way to write the same
    functionality as above.
  prefs: []
  type: TYPE_NORMAL
- en: Rainbow Trail
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For some more beauty in our animation, we can use a rainbow colormap to use
    different colors for the parts of the trajectory. By enumerating the pairwise
    iteration, we can get an index for each of the elements in the trajectory. Then
    by dividing that index by the length of the list, we can get a float in the range
    [0, 1], where 1 represents the most recent element and 0 the oldest position.
    Now we simply need a function that takes this value and converts it to a color.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: For the function to map the float to a color we can use the built-in colormaps
    from **OpenCV-Python**, specifically the rainbow colormap **cv2.COLORMAP_RAINBOW**
    [3].
  prefs: []
  type: TYPE_NORMAL
- en: '![Rainbow colormap visualized](../Images/b31ad4aad4501ca11de54bf5757895c3.png)'
  prefs: []
  type: TYPE_IMG
- en: Rainbow colormap visualized
  prefs: []
  type: TYPE_NORMAL
- en: Since the function expects an image to apply the colormap to, we need to use
    some trickery to get this to work. We create a 1×1 image with a single color channel
    that contains the float value rescaled to a **uint8** in the range [0, 255], as
    this is the expected input format for images in **OpenCV**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Next we can apply the rainbow colormap, which will return again a 1×1 image
    but with 3 color channels, containing the corresponding BGR values from the rainbow
    colormap.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: To return a tuple of three integers, we need to remove the dimensions of the
    image by flattening it and then converting it from a **numpy** array to a list.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Now if we run our program again, we can see our rainbow trajectory!
  prefs: []
  type: TYPE_NORMAL
- en: '![Animation of tracked trajectory with rainbow colormap](../Images/22ab432c6f9bb29c318804ff0f71fdf2.png)'
  prefs: []
  type: TYPE_IMG
- en: Animation of tracked trajectory with rainbow colormap
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I introduced you to the built-in data type **deque** in Python
    and showed you how to use it for visualization of continuous data, such as a video
    stream from a webcam or a real-time security camera.
  prefs: []
  type: TYPE_NORMAL
- en: The full source code for this project is available in the ball tracking repository
    on GitHub, in the *[src/stream.py](https://github.com/trflorian/ball-tracking-live-plot/blob/main/src/stream.py)*
    file. Take care!
  prefs: []
  type: TYPE_NORMAL
- en: '[**GitHub – trflorian/ball-tracking-live-plot: Tracking a ball using OpenCV
    and plotting the…**](https://github.com/trflorian/ball-tracking-live-plot)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
