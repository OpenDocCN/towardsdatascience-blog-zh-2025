- en: 'Model Context Protocol (MCP) Tutorial: Build Your First MCP Server in 6 Steps'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/model-context-protocol-mcp-tutorial-build-your-first-mcp-server-in-6-steps/](https://towardsdatascience.com/model-context-protocol-mcp-tutorial-build-your-first-mcp-server-in-6-steps/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1749670714968" class="mdspan-comment">What is Model</mdspan>
    Context Protocol (MCP)?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As a result of the emergence of AI agents and RAG-based applications in recent
    years, there’s an increasing demand for customizing Large Language Models (LLMs)
    by integrating with external resources (e.g. RAG-based systems) and tools (e.g.
    Agent-based systems). This enhances LLMs’ existing capabilities by incorporating
    external knowledge and enabling autonomous task execution.
  prefs: []
  type: TYPE_NORMAL
- en: 'Model Context Protocol (MCP), first introduced in November 2024 by Anthropic,
    has grown in popularity as it offers a more coherent and consistent way to connect
    LLMs with external tools and resources, making it a compelling alternative to
    building custom API integrations for each use case. MCP is a standardized, open-source
    protocol that provides a consistent interface that enable LLM to interact with
    various external tools and resources, hence allow end users to MCP server that
    has been encapsulated with enhanced functionalities. Compared to current agentic
    system design patterns, MCP offers several key benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: Increase scalability and maintainability of the system through standardized
    integrations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reduce duplicate development effort since a single MCP server implementation
    works with multiple MCP clients.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Avoid vendor lock-in by providing flexibility to switch between LLM providers,
    since the LLM is no longer tightly coupled with the agentic system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Speed up the development process significantly by enabling rapid creation of
    workable products.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This article is aim for guiding you through the fundamentals of Model Context
    Protocol and the essential components of building an MCP server. We will apply
    these concepts through a practical example of building a MCP server that allows
    LLMs to summarize and visualize GitHub codebases by simply providing a URL like
    the example below.
  prefs: []
  type: TYPE_NORMAL
- en: '**User Input:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://github.com/aws-samples/aws-cdk-examples/blob/main/python/codepipeline-docker-build/Base.py`](https://github.com/aws-samples/aws-cdk-examples/blob/main/python/codepipeline-docker-build/Base.py)'
  prefs: []
  type: TYPE_NORMAL
- en: '**MCP Output:**'
  prefs: []
  type: TYPE_NORMAL
- en: '![MCP server example](../Images/22f95f86a658e988aa00b1ca2bcc8d8c.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding MCP Components
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![MCP Architecture](../Images/046466aad0acb2eaf489d6d8d3a947ba.png)'
  prefs: []
  type: TYPE_IMG
- en: MCP Architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: MCP adopts a client-server architecture where the client is a device or application
    that requests services offered by a centralized server. A helpful analogy for
    the client-server relationship is that of a customer and a restaurant. The customer
    acts like the client-side, sending requests by ordering from the menu, while the
    restaurant resembles the server, providing services like dishes and seatings.
    The restaurant possesses sufficient resources to serve multiple customers in a
    short period of time, while customers only need to worry about receiving their
    orders.
  prefs: []
  type: TYPE_NORMAL
- en: 'MCP architecture consists of three components: **MCP server, MCP client and
    MCP host**. **MCP server** offers tools and resources, exposing functionalities
    that AI models can leverage through structured requests. **MCP host** offers the
    runtime environment that manages communication between clients and servers, such
    as Claude Desktop or IDEs with MCP-supported extensions. If we continue with the
    same customer-restaurant analogy above, MCP host can be considered as a restaurant
    management system that coordinates communications between customers (clients)
    and restaurants, handles order taking and payment processing. **MCP client** is
    typically built into the host application allowing the users to interact with
    the server through an interface. However, there is the flexibility of developing
    custom MCP clients for specialized use cases and requirements, such as building
    a simple AI web app using Streamlit to support more front-end functionalities.'
  prefs: []
  type: TYPE_NORMAL
- en: MCP Server Components
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this article, we will focus on understanding MCP server and apply our knowledge
    to build a simple, custom MCP server. MCP server wraps around various APIs calls
    to the external tools and resources, enabling the clients accessing these functionalities
    without worrying about the extra setup. The MCP server supports incorporating
    three types of components which aligns with three common LLM customization strategies.
  prefs: []
  type: TYPE_NORMAL
- en: '**Resources** are data, files and documents that serve as the external knowledge
    base to enrich LLM’s existing knowledge. This is particularly useful in a RAG-based
    system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tools** are executable functions and integrations with other programs to
    enrich LLM’s action space, for example, perform Google Search, create a Figma
    prototype etc, which can be leveraged in an Agent-based system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompts** are pre-defined instruction templates to guide LLM’s output, e.g.
    response in a professional or casual tone. This is useful in the system that benefits
    from prompt engineering techniques.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you are interested to know more about LLM customization strategies, check
    out my previous article and video on “[6 Common LLM Customization Strategies Briefly
    Explained](https://towardsdatascience.com/6-common-llm-customization-strategies-briefly-explained/)”.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Build Your MCP Server in 6 Steps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will use a simple example to demonstrate how to build your first MCP server
    using Python, which enables calling a custom `visualize_code` tool to turn raw
    code files extracted from GitHub repositories into visual diagrams like the following
    example.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/02bd14f67c72fe9347d1a770f127c64e.png)'
  prefs: []
  type: TYPE_IMG
- en: 'For people with data science background learning to build MCP servers, there
    are several software development concepts that may be unfamiliar but important
    to understand: asynchronous programming for handling asynchronous operations,
    client/server architecture, and Python decorators for modifying function behavior.
    We will explain these concepts in more detail as we walk through this practical
    example.'
  prefs: []
  type: TYPE_NORMAL
- en: '*For a video walkthrough, please visit “Build Your First MCP Server in 6 Steps*“:'
  prefs: []
  type: TYPE_NORMAL
- en: Step 1\. Environment Setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Package managers setup: MCP uses `uv` as the default package manager. For macOS
    and Linux system, install `uv` and execute it using `sh` with the shell command:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/6b92d94c4a590dba7405087da8c6d3da.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Initiate a new working directory `/visual`, activate the virtual environment,
    create the project structure to store the main script `visual.py`:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Install required dependencies: `pip install mcp httpx fastapi uvicorn`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Further Reading:**'
  prefs: []
  type: TYPE_NORMAL
- en: The official blog post from Anthropic “[For Server Developers – Model Context
    Protocol](https://modelcontextprotocol.io/quickstart/server)” provides easy-to-follow
    guide for setting up the MCP server development environment.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Basic Server Setup'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the `visual.py` script, import the required libraries and initiate our MCP
    server instance and define a user agent for making HTTP requests. We will use
    [FastMCP](https://gofastmcp.com/getting-started/welcome) as the official Python
    MCP SDK.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Step 3: Create Helper Functions'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We’ll create a helper function `get_code()` to fetch code from the GitHub URL.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Let’s break down the `get_code()` function into a few components.
  prefs: []
  type: TYPE_NORMAL
- en: '**Asynchronous Implementation**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Asynchronous programming allows multiple operations to run concurrently, improving
    efficiency by not blocking execution while waiting for operations to complete.
    It is typically used to handle I/O operations efficiently, such as network request,
    user inputs and API calls. In contrast, synchronous operations, typically used
    for machine learning tasks, are executed sequentially, with each operation blocking
    until completion before moving to the next task. The following changes are made
    to define this function asynchronously:'
  prefs: []
  type: TYPE_NORMAL
- en: The function is declared with `async def` to allow handling multiple operations
    concurrently.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use `async with` context manager and `httpx.AsyncClient()` for non-blocking
    HTTP requests.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Handle asynchronous HTTP requests by adding `await` keyword to `client.get()`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**URL Processing**'
  prefs: []
  type: TYPE_NORMAL
- en: Configure Accept header for HTML content and set appropriate User-Agent to identify
    the client making the HTTP requests, i.e. `visual-fastmcp/0.1` . Convert regular
    GitHub URLs to raw file format.
  prefs: []
  type: TYPE_NORMAL
- en: '**Error Handling**'
  prefs: []
  type: TYPE_NORMAL
- en: Catch HTTP-specific exceptions (`httpx.RequestError`, `httpx.HTTPStatusError`)
    and catch other generic exception handling as fallback, then return descriptive
    error messages for debugging.
  prefs: []
  type: TYPE_NORMAL
- en: '**Further Reading:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[Python AsyncIO Documentation](https://docs.python.org/3/library/asyncio.html)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Synchronous and Asynchronous Programming](https://www.geeksforgeeks.org/javascript/synchronous-and-asynchronous-programming/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 4: Implement the MCP Server Tool'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Using a few extra lines of code, we can now create our main MCP server tool
    `visualize_code()`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**Decorator**'
  prefs: []
  type: TYPE_NORMAL
- en: A Python Decorator is a special function that **modifies or enhances the behavior
    of another function or method** without altering its original code. FastMCP provides
    decorators that wrap around custom functions to integrate them into the MCP server.
    For example, we use `@mcp.tool()` to create an MCP server tool by decorating the
    `visualize_code` function. Similarly, we can use `@mcp.resource()` for resources
    and `@mcp.prompt()` for prompts.
  prefs: []
  type: TYPE_NORMAL
- en: '**Type Hint and Docstring**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The FastMCP class leverages Python type hints and docstrings to automatically
    enhancing tool definitions, simplifying the creation and maintenance of MCP tools.
    For our use case, we create tool functions with type hints `visualize_code(url:
    str) -> str`, accepting input parameter `url` with string format and generating
    the output as a combined string of all code extracted from the source file. Then,
    add the docstring below to help the LLM to understand tool usage.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Let’s compare how the MCP tool functions with and without docstring provided,
    by calling the MCP server through the Claude Desktop.
  prefs: []
  type: TYPE_NORMAL
- en: '*Model output without docstring – only text summary is generated*'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/356b949ba52d94fe5a76595cc04e006e.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Model output with docstring provided – both text summary and diagram are generated*'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c8f42e90d11902cfcaeafcae4dbd4c56.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Further reading:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[Python Type Hints Tutorial](https://realpython.com/python-type-checking/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Python Decorators Guide](https://realpython.com/primer-on-python-decorators/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 5: Configure the MCP Server'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Add the main execution block as the last step in the `visual.py` script. Run
    the server locally with simple I/O transport using “stdio”. When running the code
    on your local machine, the MCP server is located on your local machine and listening
    for tool requests from MCP clients. For production deployment, you can configure
    different transport options like “streamable-http” for web-based deployments.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Step 6\. Use the MCP Server from Claude Desktop
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will demonstrate how to use this MCP server through Claude Desktop, however,
    please note that it allows connecting the server to different hosts (e.g. Cursor)
    by slightly tweaking the configuration. Check out “[For Claude Desktop Users –
    Model Context Protocol](https://modelcontextprotocol.io/quickstart/user)” for
    Claude’s official guide.
  prefs: []
  type: TYPE_NORMAL
- en: Download the [Claude Desktop](https://claude.ai/download)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Set up config file for server settings in your local folder `~/Library/Application\\
    Support/Claude/claude_desktop_config.json` (for MacOS) and update `<PARENT_FOLDER_ABSOLUTE_PATH>`
    to your own working folder path.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Run it using command line `uv --directory <PARENT_FOLDER_ABSOLUTE_PATH>/visual
    run visual.py`
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Launch (or restart) Claude Desktop and select the “Search and tools” then “visual”.
    You should be able to toggle on the `visualize_code` tool we just created.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/54076354f623c7d9928d4816303ccc38.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Try the visualization tool by providing a GitHub URL, for example:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/bf563d513f17373224b6501fdfb27284.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Take-Home Message
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This article provides an overview of MCP architecture (MCP client, host and
    server), with the primary focus on MCP server components and applications. It
    guides through the process of building a custom MCP server that enables code-to-diagram
    from GitHub repositories.
  prefs: []
  type: TYPE_NORMAL
- en: 'Essential steps for building a custom MCP server:'
  prefs: []
  type: TYPE_NORMAL
- en: Environment Setup
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Basic Server Setup
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create Helper Functions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Implemente the MCP Tool
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Configure the MCP Server
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use the MCP Server from Claude Desktop
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you are interested in further exploration, potential directions include exploring
    remote MCP servers on cloud provider, implementing security features and robust
    error handling.
  prefs: []
