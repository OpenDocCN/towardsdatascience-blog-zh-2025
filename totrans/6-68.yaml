  type: TYPE_NORMAL
- en: construction_eiffel_tower_end = 1889
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: construction_empire_state_building_start = 1930
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
