- en: Optimizing Multi-Objective Problems with Desirability Functions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/optimizing-multi-objective-problems-with-desirability-functions/](https://towardsdatascience.com/optimizing-multi-objective-problems-with-desirability-functions/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1747766571172" class="mdspan-comment">When working</mdspan>
    in data science, it is not uncommon to encounter problems with competing objectives.
    Whether designing products, tuning algorithms or optimizing portfolios, we often
    need to balance several metrics to get the best possible outcome. Sometimes, maximizing
    one metrics comes at the expense of another, making it hard to have an overall
    optimized solution.
  prefs: []
  type: TYPE_NORMAL
- en: While several solutions exist to solve multi-objective optimization problems,
    I found desirability function to be both elegant and easy to explain to non-technical
    audience. Which makes them an interesting option to consider. Desirability functions
    will combine several metrics into a standardized score, allowing for a holistic
    optimization.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article, we’ll explore:'
  prefs: []
  type: TYPE_NORMAL
- en: The mathematical foundation of desirability functions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to implement these functions in Python
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to optimize a multi-objective problem with desirability functions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Visualization for interpretation and explanation of the results
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To ground these concepts in a real example, we’ll apply desirability functions
    to optimize a bread baking: a toy problem with a few, interconnected parameters
    and competing quality objectives that will allow us to explore several optimization
    choices.'
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this article, you’ll have a powerful new tool in your data science
    toolkit for tackling multi-objective optimization problems across numerous domains,
    as well as a fully functional code available here on [GitHub](https://github.com/vincent-vdb/medium_posts).
  prefs: []
  type: TYPE_NORMAL
- en: What are Desirability Functions?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Desirability functions were first formalized by [Harrington (1965)](https://www.scirp.org/reference/referencespapers?referenceid=1542744)
    and later extended by [Derringer and Suich (1980)](https://www.tandfonline.com/doi/abs/10.1080/00224065.1980.11980968).
    The idea is to:'
  prefs: []
  type: TYPE_NORMAL
- en: Transform each response into a performance score between 0 (absolutely unacceptable)
    and 1 (the ideal value)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Combine all scores into a single metric to maximize
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s explore the types of desirability functions and then how we can combine
    all the scores.
  prefs: []
  type: TYPE_NORMAL
- en: The different types of desirability functions
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: There are three different desirability functions, that would allow to handle
    many situations.
  prefs: []
  type: TYPE_NORMAL
- en: '**Smaller-is-better**: Used when minimizing a response is desirable'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Larger-is-better**: Used when maximizing a response is desirable'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Target-is-best**: Used when a specific target value is optimal'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Every input parameter can be parameterized with one of these three desirability
    functions, before combining them into a single desirability score.
  prefs: []
  type: TYPE_NORMAL
- en: Combining Desirability Scores
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Once individual metrics are transformed into desirability scores, they need
    to be combined into an overall desirability. The most common approach is the geometric
    mean:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1981678fe8d593d441c0791449378b05.png)'
  prefs: []
  type: TYPE_IMG
- en: Where d[i] are individual desirability values and w[i] are weights reflecting
    the relative importance of each metric.
  prefs: []
  type: TYPE_NORMAL
- en: 'The geometric mean has an important property: if any single desirability is
    0 (i.e. completely unacceptable), the overall desirability is also 0, regardless
    of other values. This enforces that all requirements must be met to some extent.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The weights are hyperparameters that give leverage on the final outcome and
    give room for customization.
  prefs: []
  type: TYPE_NORMAL
- en: 'A Practical Optimization Example: Bread Baking'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To demonstrate desirability functions in action, let’s apply them to a toy
    problem: a bread baking optimization problem.'
  prefs: []
  type: TYPE_NORMAL
- en: The Parameters and Quality Metrics
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Let’s play with the following parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Fermentation Time** (30–180 minutes)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Fermentation Temperature** (20–30°C)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Hydration Level** (60–85%)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Kneading Time** (0–20 minutes)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Baking Temperature** (180–250°C)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'And let’s try to optimize these metrics:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Texture Quality**: The texture of the bread'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Flavor Profile**: The flavor of the bread'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Practicality**: The practicality of the whole process'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Of course, each of these metrics depends on more than one parameter. So here
    comes one of the most critical steps: mapping parameters to quality metrics.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For each quality metric, we need to define how parameters influence it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Here for example, the flavor is influenced by the following:'
  prefs: []
  type: TYPE_NORMAL
- en: The fermentation time, with a minimum desirability below 30 minutes and a maximum
    desirability above 180 minutes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The fermentation temperature, with a maximum desirability peaking at 24 degrees
    Celsius
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The hydration, with a maximum desirability peaking at 75% humidity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These computed parameters are then weighted averaged to return the flavor desirability.
    Similar computations and made for the texture quality and practicality.
  prefs: []
  type: TYPE_NORMAL
- en: The Objective Function
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Following the desirability function approach, we’ll use the overall desirability
    as our objective function. The goal is to maximize this overall score, which means
    finding parameters that best satisfy all our three requirements simultaneously:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: After computing the individual desirabilities for texture, flavor and practicality;
    the overall desirability is simply computed with a weighted geometric mean. It
    finally returns the negative overall desirability, so that it can be minimized.
  prefs: []
  type: TYPE_NORMAL
- en: Optimization with SciPy
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'We finally use [SciPy](https://docs.scipy.org/doc/scipy/reference/generated/scipy.optimize.minimize.html)’s
    `minimize` function to find optimal parameters. Since we returned the negative
    overall desirability as the objective function, minimizing it would maximize the
    overall desirability:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: In this function, after defining the bounds for each parameter, the initial
    guess is computed as the middle of bounds, and then given as input to the `minimize`
    function of SciPy. The result is finally returned.
  prefs: []
  type: TYPE_NORMAL
- en: The weights are given as input to the optimizer too, and are a good way to customize
    the output. For example, with a larger weight on practicality, the optimized solution
    will focus on practicality over flavor and texture.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now visualize the results for a few sets of weights.
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of Results
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s see how the optimizer handles different preference profiles, demonstrating
    the flexibility of desirability functions, given various input weights.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s have a look at the results in case of weights favoring practicality:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f4b0ca4bbebfc28af1ba29494e11c3dc.png)'
  prefs: []
  type: TYPE_IMG
- en: Optimized parameters with weights favoring practicality. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: With weights largely in favor of practicality, the achieved overall desirability
    is 0.69, with a short kneading time of 5 minutes, since a high value impacts negatively
    the practicality.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, if we optimize with an emphasis on texture, we have slightly different
    results:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dba230a732f905978d5f43b03d4351a4.png)'
  prefs: []
  type: TYPE_IMG
- en: Optimized parameters with weights favoring texture. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, the achieved overall desirability is 0.85, significantly higher.
    The kneading time is this time 12 minutes, as a higher value impacts positively
    the texture and is not penalized so much because of practicality.
  prefs: []
  type: TYPE_NORMAL
- en: 'Conclusion: Practical Applications of Desirability Functions'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While we focused on bread baking as our example, the same approach can be applied
    to various domains, such as product formulation in cosmetics or resource allocation
    in portfolio optimization.
  prefs: []
  type: TYPE_NORMAL
- en: Desirability functions provide a powerful mathematical framework for tackling
    multi-objective optimization problems across numerous data science applications.
    By transforming raw metrics into standardized desirability scores, we can effectively
    combine and optimize disparate objectives.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key advantages of this approach include:'
  prefs: []
  type: TYPE_NORMAL
- en: Standardized scales that make different metrics comparable and easy to combine
    into a single target
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Flexibility to handle different types of objectives: minimize, maximize, target'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clear communication of preferences through mathematical functions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The code presented here provides a starting point for your own experimentation.
    Whether you’re optimizing industrial processes, machine learning models, or product
    formulations, hopefully desirability functions offer a systematic approach to
    finding the best compromise among competing objectives.
  prefs: []
  type: TYPE_NORMAL
