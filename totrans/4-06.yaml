- en: Injecting domain expertise into your AI system
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将领域专业知识注入您的AI系统
- en: 原文：[https://towardsdatascience.com/injecting-domain-expertise-into-your-ai-system-792febff48f0/](https://towardsdatascience.com/injecting-domain-expertise-into-your-ai-system-792febff48f0/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/injecting-domain-expertise-into-your-ai-system-792febff48f0/](https://towardsdatascience.com/injecting-domain-expertise-into-your-ai-system-792febff48f0/)
- en: '![(Source: Getty Images)](../Images/b34a6e3ad5e3fbb591eb176e539098a8.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![来源：Getty Images](../Images/b34a6e3ad5e3fbb591eb176e539098a8.png)'
- en: '(Source: Getty Images)'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：Getty Images)
- en: 'When starting their AI initiatives, many companies are trapped in silos and
    treat AI as a purely technical enterprise, sidelining domain experts or involving
    them too late. They end up with generic AI applications that miss industry nuances,
    produce poor recommendations, and quickly become unpopular with users. By contrast,
    AI systems that deeply understand industry-specific processes, constraints, and
    decision logic have the following benefits:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当许多公司开始他们的AI项目时，他们往往陷入孤立，将AI视为一个纯粹的技术企业，忽视了领域专家或太晚涉及他们。他们最终得到的是通用的AI应用，这些应用忽略了行业细微差别，产生了糟糕的建议，并很快不受用户欢迎。相比之下，深刻理解行业特定流程、约束和决策逻辑的人工智能系统有以下好处：
- en: '**Increased efficiency** – The more domain knowledge AI incorporates, the less
    manual effort is required from human experts.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高效率**——人工智能整合的领域知识越多，人类专家所需的手动工作就越少。'
- en: '**Improved adoption** – Experts disengage from AI systems that feel too generic.
    AI must speak their language and align with real workflows to gain trust.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高采用率**——专家会从感觉过于通用的AI系统中退出。人工智能必须使用他们的语言并与实际工作流程保持一致，以赢得信任。'
- en: A **sustainable competitive moat** – As AI becomes a commodity, embedding proprietary
    expertise is the most effective way to build defensible AI systems (cf. [this
    article](https://medium.com/towards-data-science/carving-out-your-competitive-advantage-with-ai-a4babb931076)
    to learn about the building blocks of AI’s competitive advantage).
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可持续的竞争优势**——随着人工智能成为商品，嵌入专有专业知识是构建可防御人工智能系统的最有效方式（参考[这篇文章](https://medium.com/towards-data-science/carving-out-your-competitive-advantage-with-ai-a4babb931076)了解人工智能竞争优势的构建块）。'
- en: Domain experts can help you connect the dots between the technicalities of an
    AI system and its real-life usage and value. Thus, they should be key stakeholders
    and co-creators of your AI applications. This guide is the first part of my series
    on expertise-driven AI. Following my [mental model of AI systems](https://medium.com/towards-data-science/building-ai-products-with-a-holistic-mental-model-33f8729e3ad9),
    it provides a structured approach to embedding deep domain expertise into your
    AI.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 领域专家可以帮助您连接人工智能系统技术细节与其实际应用和价值之间的联系。因此，他们应该是您人工智能应用的关键利益相关者和共同创造者。本指南是我关于专家驱动人工智能系列的第一部分。在遵循我的[人工智能系统心智模型](https://medium.com/towards-data-science/building-ai-products-with-a-holistic-mental-model-33f8729e3ad9)之后，它提供了一种将深厚领域专业知识嵌入您人工智能的结构化方法。
- en: '![Overview of the methods for domain knowledge integration](../Images/e7a149a26823e90e859584bec44d62b2.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![领域知识整合方法的概述](../Images/e7a149a26823e90e859584bec44d62b2.png)'
- en: Overview of the methods for domain knowledge integration
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 领域知识整合方法的概述
- en: Throughout the article, we will use the use case of supply chain optimisation
    (SCO) to illustrate these different methods. Modern supply chains are under constant
    strain from geopolitical tensions, climate disruptions, and volatile demand shifts,
    and AI can provide the kind of dynamic, high-coverage intelligence needed to anticipate
    delays, manage risks, and optimise logistics. However, without domain expertise,
    these systems are often disconnected from the realities of life. Let’s see how
    we can solve this by integrating domain expertise across the different components
    of the AI application.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在整篇文章中，我们将使用供应链优化（SCO）的案例来阐述这些不同的方法。现代供应链因地缘政治紧张、气候破坏和需求波动而承受着持续的压力，人工智能可以提供预测延误、管理风险和优化物流所需的动态、高覆盖率的智能。然而，如果没有领域专业知识，这些系统通常与生活的现实脱节。让我们看看我们如何通过将领域专业知识整合到人工智能应用的各个组件中解决这个问题。
- en: '1\. Data: The bedrock of expertise-driven AI'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 数据：专家驱动人工智能的基石
- en: AI is only as domain-aware as the data it learns from. Raw data isn’t enough
    – it must be curated, refined, and contextualised by experts who understand its
    meaning in the real world.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的领域感知能力仅限于其学习的数据。原始数据是不够的——它必须由理解其在现实世界中意义的专家进行整理、精炼和情境化。
- en: 'Data understanding: Teaching AI what matters'
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据理解：教人工智能什么是重要的
- en: While data scientists can build sophisticated models to analyse patterns and
    distributions, these analyses often stay at a theoretical, abstract level. Only
    domain experts can validate whether the data is complete, accurate, and representative
    of real-world conditions.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然数据科学家可以构建复杂的模型来分析模式和分布，但这些分析通常停留在理论、抽象的水平。只有领域专家才能验证数据是否完整、准确，并且代表现实世界的条件。
- en: In supply chain optimisation, for example, shipment records may contain missing
    delivery timestamps, inconsistent route details, or unexplained fluctuations in
    transit times. A data scientist might discard these as noise, but a logistics
    expert could have real-world explanations of these inconsistencies. For instance,
    they might be caused by weather-related delays, seasonal port congestion, or supplier
    reliability issues. If these nuances aren’t accounted for, the AI might learn
    an overly simplified view of supply chain dynamics, resulting in misleading risk
    assessments and poor recommendations.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在供应链优化中，例如，装运记录可能包含缺失的交货时间戳、不一致的路线详情，或运输时间的不明波动。数据科学家可能会将这些视为噪声，但物流专家可能对这些不一致性有现实世界的解释。例如，这些可能是由与天气相关的延误、季节性港口拥堵或供应商可靠性问题引起的。如果不考虑这些细微差别，AI可能会学习到一个过于简化的供应链动态视图，从而导致误导性的风险评估和糟糕的建议。
- en: Experts also play a critical role in assessing the completeness of data. AI
    models work with what they have, assuming that all key factors are already present.
    It takes human expertise and judgment to identify blind spots. For example, if
    your supply chain AI isn’t trained on customs clearance times or factory shutdown
    histories, it won’t be able to predict disruptions caused by regulatory issues
    or production bottlenecks.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 专家在评估数据的完整性方面也发挥着关键作用。AI模型使用它们所拥有的数据，假设所有关键因素都已经存在。识别盲点需要人类的专家知识和判断。例如，如果你的供应链AI没有在海关清关时间或工厂停工历史上进行训练，它将无法预测由监管问题或生产瓶颈引起的干扰。
- en: ✅ **Implementation tip:** Run joint Exploratory Data Analysis (EDA) sessions
    with data scientists and domain experts to identify missing business-critical
    information, ensuring AI models work with a complete and meaningful dataset, not
    just statistically clean data.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **实施技巧：** 与数据科学家和领域专家一起进行联合探索性数据分析（EDA）会议，以识别缺失的业务关键信息，确保AI模型使用的是完整且有意义的数据集，而不仅仅是统计上干净的数据。
- en: 'Data source selection: Start small, expand strategically'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据源选择：从小处着手，战略性地扩展
- en: One common pitfall when starting with AI is integrating too much data too soon,
    leading to complexity, congestion of your data pipelines, and blurred or noisy
    insights. Instead, start with a couple of high-impact data sources and expand
    incrementally based on AI performance and user needs. For instance, an SCO system
    may initially use historical shipment data and supplier reliability scores. Over
    time, domain experts may identify missing information – such as port congestion
    data or real-time weather forecasts – and point engineers to those data sources
    where it can be found.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始使用AI时，一个常见的陷阱是过早地整合过多数据，导致复杂性增加、数据管道拥堵，以及洞察力模糊或噪声。相反，从几个高影响数据源开始，根据AI性能和用户需求逐步扩展。例如，一个供应链优化系统（SCO）最初可能使用历史装运数据和供应商可靠性评分。随着时间的推移，领域专家可能会识别出缺失的信息——例如港口拥堵数据或实时天气预报——并将工程师引向可以找到这些数据源的地方。
- en: ✅ **Implementation tip:** Start with a minimal, high-value dataset (normally
    3–5 data sources), then expand incrementally based on expert feedback and real-world
    AI performance.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **实施技巧：** 从一个最小化、高价值的数据集（通常为3-5个数据源）开始，然后根据专家反馈和现实世界的AI性能逐步扩展。
- en: Data annotation
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据标注
- en: AI models learn by detecting patterns in data, but sometimes, the right learning
    signals aren’t yet present in raw data. This is where data annotation comes in
    – by labelling key attributes, domain experts help the AI understand what matters
    and make better predictions. Consider an AI model built to predict supplier reliability.
    The model is trained on shipment records, which contain delivery times, delays,
    and transit routes. However, raw delivery data alone doesn’t capture the full
    picture of supplier risk – there are no direct labels indicating whether a supplier
    is "high risk" or "low risk."
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型通过在数据中检测模式来学习，但有时，正确的学习信号尚未存在于原始数据中。这就是数据标注发挥作用的地方——通过标记关键属性，领域专家帮助AI理解什么重要，并做出更好的预测。考虑一个旨在预测供应商可靠性的AI模型。该模型在运输记录上进行了训练，这些记录包含交货时间、延误和运输路线。然而，仅凭原始交货数据并不能完全捕捉供应商风险的全貌——没有直接标签表明供应商是“高风险”还是“低风险”。
- en: Without more explicit learning signals, the AI might make the wrong conclusions.
    It could conclude that all delays are equally bad, even when some are caused by
    predictable seasonal fluctuations. Or it might overlook early warning signs of
    supplier instability, such as frequent last-minute order changes or inconsistent
    inventory levels.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 没有更明确的信号，AI可能会得出错误的结论。它可能会得出所有延误都是同样糟糕的结论，即使其中一些是由可预测的季节性波动引起的。或者它可能会忽略供应商不稳定性的早期预警信号，例如频繁的最后一刻订单更改或不一致的库存水平。
- en: Domain experts can enrich the data with more nuanced labels, such as supplier
    risk categories, disruption causes, and exception-handling rules. By introducing
    these curated learning signals, you can ensure that AI doesn’t just memorise past
    trends but learns meaningful, decision-ready insights.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 领域专家可以通过更细微的标签来丰富数据，例如供应商风险类别、中断原因和异常处理规则。通过引入这些精心挑选的学习信号，你可以确保AI不仅记住过去趋势，而且学习到有意义的、决策准备好的见解。
- en: 'You shouldn’t rush your annotation efforts – instead, think about a structured
    annotation process that includes the following components:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 你不应该急于进行标注工作——相反，考虑一个包含以下组件的结构化标注流程：
- en: '**Annotation guidelines:** Establish clear, standardized rules for labeling
    data to ensure consistency. For example, supplier risk categories should be based
    on defined thresholds (e.g., delivery delays over 5 days + financial instability
    = high risk).'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标注指南：** 建立清晰、标准化的规则来标记数据以确保一致性。例如，供应商风险类别应基于定义的阈值（例如，超过5天的交货延误+财务不稳定=高风险）。'
- en: '**Multiple expert review:** Involve several domain experts to reduce bias and
    ensure objectivity, particularly for subjective classifications like risk levels
    or disruption impact.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多专家评审：** 涉及多个领域专家以减少偏见并确保客观性，尤其是对于像风险等级或中断影响这样的主观分类。'
- en: '**Granular labelling:** Capture both direct and contextual factors, such as
    annotating not just shipment delays but also the cause (customs, weather, supplier
    fault).'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**细粒度标注：** 捕获直接和上下文因素，例如不仅标注运输延误，还要标注原因（海关、天气、供应商故障）。'
- en: '**Continuous refinement:** Regularly audit and refine annotations based on
    AI performance – if predictions consistently miss key risks, experts should adjust
    labelling strategies accordingly.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续优化：** 定期审计和优化标注，根据AI的性能——如果预测持续错过关键风险，专家应相应调整标注策略。'
- en: ✅ **Implementation tip:** Define an annotation playbook with clear labelling
    criteria, involve at least two domain experts per critical label for objectivity,
    and run regular annotation review cycles to ensure AI is learning from accurate,
    business-relevant insights.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **实施技巧：** 定义一个标注操作手册，包含明确的标注标准，每个关键标签至少涉及两位领域专家以确保客观性，并定期进行标注审查周期，以确保AI从准确、与业务相关的见解中学习。
- en: 'Synthetic data: Preparing AI for rare but critical events'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合成数据：为AI准备罕见但关键的事件
- en: So far, our AI models learn from real-life historical data. However, rare, high-impact
    events – like factory shutdowns, port closures, or regulatory shifts in our supply
    chain scenario – may be underrepresented. Without exposure to these scenarios,
    AI can fail to anticipate major risks, leading to overconfidence in supplier stability
    and poor contingency planning. Synthetic data solves this by creating more datapoints
    for rare events, but expert oversight is crucial to ensure that it reflects plausible
    risks rather than unrealistic patterns.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们的AI模型从现实生活中的历史数据中学习。然而，罕见但影响重大的事件——如工厂关闭、港口关闭或供应链场景中的监管变化——可能代表性不足。如果没有接触到这些场景，AI可能无法预测重大风险，导致对供应商稳定性的过度自信和糟糕的应急计划。合成数据通过为罕见事件创建更多数据点来解决这一问题，但专家的监督至关重要，以确保它反映的是合理的风险而不是不切实际的模式。
- en: Let’s say we want to predict supplier reliability in our supply chain system.
    The historical data may have few recorded supplier failures – but that’s not because
    failures don’t happen. Rather, many companies proactively mitigate risks before
    they escalate. Without synthetic examples, AI might deduce that supplier defaults
    are extremely rare, leading to misguided risk assessments.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要预测供应链系统中的供应商可靠性。历史数据可能记录的供应商故障很少——但这并不是因为故障没有发生。相反，许多公司在风险升级之前就主动缓解风险。没有合成示例，AI可能会推断供应商违约极为罕见，导致风险评估失误。
- en: 'Experts can help generate synthetic failure scenarios based on:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 专家可以帮助基于以下内容生成合成故障场景：
- en: '**Historical patterns** – Simulating supplier collapses triggered by economic
    downturns, regulatory shifts, or geopolitical tensions.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**历史模式** – 模拟由经济衰退、监管变化或地缘政治紧张引发供应商崩溃。'
- en: '**Hidden risk indicators** – Training AI on unrecorded early warning signs,
    like financial instability or leadership changes.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隐藏的风险指标** – 在未记录的早期预警信号上训练AI，如金融不稳定或领导层变动。'
- en: '**Counterfactuals** – Creating "what-if" events, such as a semiconductor supplier
    suddenly halting production or a prolonged port strike.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反事实** – 创建“如果...将会怎样”的事件，例如半导体供应商突然停止生产或长期港口罢工。'
- en: ✅ **Actionable step:** Work with domain experts to define high-impact but low-frequency
    events and scenarios, which can be in focus when you generate synthetic data.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **可操作步骤**：与领域专家合作，定义高影响但低频率的事件和场景，这些可以在生成合成数据时成为焦点。
- en: Data makes domain expertise shine. An AI initiative that relies on clean, relevant,
    and enriched domain data will have an obvious competitive advantage over one that
    takes the "quick-and-dirty" shortcut to data. However, keep in mind that working
    with data can be tedious, and experts need to see the outcome of their efforts
    – whether it’s improving AI-driven risk assessments, optimising supply chain resilience,
    or enabling smarter decision-making. The key is to make data collaboration intuitive,
    purpose-driven, and directly tied to business outcomes, so experts remain engaged
    and motivated.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 数据让领域专业知识熠熠生辉。一个依赖于干净、相关和丰富领域数据的AI项目，将比那些采取“快速且草率”的数据捷径的项目具有明显的竞争优势。然而，记住与数据打交道可能会很繁琐，专家需要看到他们努力的成果——无论是改善AI驱动的风险评估、优化供应链弹性，还是实现更明智的决策。关键是使数据协作直观、目标导向，并与业务成果直接相关，这样专家才能保持参与和动力。
- en: 'Intelligence: Making AI systems smarter'
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智能化：让AI系统更智能
- en: 'Once AI has access to high-quality data, the next challenge is ensuring it
    generates useful and accurate outputs. Domain expertise is needed to:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦AI获得了高质量的数据，下一个挑战就是确保它生成有用且准确的结果。需要领域专业知识来完成以下任务：
- en: Define **clear AI objectives** aligned with business priorities
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义与业务优先事项一致的**清晰的AI目标**
- en: Ensure AI **correctly interprets** industry-specific data
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保AI **正确解释**行业特定的数据
- en: Continuously validate AI’s **outputs and recommendations**
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 持续验证AI的**输出和建议**
- en: Let’s look at some common AI approaches and see how they can benefit from an
    extra shot of domain knowledge.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些常见的AI方法，看看它们如何从额外的领域知识中受益。
- en: Training predictive models from scratch
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从头开始训练预测模型
- en: For structured problems like supply chain forecasting, predictive models such
    as classification and regression can help anticipate delays and suggest optimisations.
    However, to make sure these models are aligned with business goals, data scientists
    and knowledge engineers need to work together. For example, an AI model might
    try to minimise shipment delays at all costs, but a supply chain expert knows
    that fast-tracking every shipment through air freight is financially unsustainable.
    They can formulate additional constraints on the model, making it prioritise critical
    shipments while balancing cost, risk, and lead times.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 对于如供应链预测这样的结构化问题，预测模型如分类和回归可以帮助预测延误并提出优化建议。但是，为了确保这些模型与业务目标保持一致，数据科学家和知识工程师需要共同工作。例如，一个AI模型可能会不惜一切代价最小化运输延误，但供应链专家知道，通过空运快速处理每一批货物在财务上是不可持续的。他们可以为模型制定额外的约束，使其优先考虑关键运输，同时平衡成本、风险和交货时间。
- en: ✅ **Implementation tip:** Define clear objectives and constraints with domain
    experts before training AI models, ensuring alignment with real business priorities.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **实施技巧：** 在训练AI模型之前，与领域专家明确定义清晰的目标和约束，确保与实际业务优先级保持一致。
- en: For a detailed overview of predictive AI techniques, please refer to Chapter
    4 of my book [The Art of AI Product Management](https://mng.bz/lYXy).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 想要详细了解预测AI技术，请参阅我的书籍《AI产品管理艺术》的第4章。[The Art of AI Product Management](https://mng.bz/lYXy)。
- en: Navigating the LLM triad
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索LLM三联
- en: While predictive models trained from scratch can excel at very specific tasks,
    they are also rigid and will "refuse" to perform any other task. GenAI models
    are more open-minded and can be used for highly diverse requests. For example,
    an LLM-based conversational widget in an SCO system can allow users to interact
    with real-time insights using natural language. Instead of sifting through inflexible
    dashboards, users can ask, *"Which suppliers are at risk of delays?"* or *"What
    alternative routes are available?"* The AI pulls from historical data, live logistics
    feeds, and external risk factors to provide actionable answers, suggest mitigations,
    and even automate workflows like rerouting shipments.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然从头开始训练的预测模型在非常具体的任务上可能表现出色，但它们也很僵化，会“拒绝”执行任何其他任务。GenAI模型更加开放，可以用于高度多样化的请求。例如，一个基于LLM的对话小部件在SCO系统中可以允许用户使用自然语言与实时洞察进行交互。用户不必筛选僵化的仪表板，可以询问，“哪些供应商有延误的风险？”或“有哪些替代路线可用？”AI会从历史数据、实时物流信息和外部风险因素中提取信息，提供可操作的答案，提出缓解措施，甚至自动化如重新路由运输的工作流程。
- en: But how can you ensure that a huge, out-of-the-box model like ChatGPT or Llama
    understands the nuances of your domain? Let’s walk through the LLM triad – a progression
    of techniques to incorporate domain knowledge into your LLM system.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 但如何确保像ChatGPT或Llama这样的大型、现成模型能理解你领域的细微差别呢？让我们一起来探讨LLM三联——将领域知识融入你的LLM系统的一系列技术。
- en: '![Figure 2: The LLM triad is a progression of techniques for incorporating
    domain- and company-specific knowledge into your LLM system](../Images/7468261d5c5ad9522c51097b5ab9227e.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图2：LLM三联是将领域和公司特定知识融入你的LLM系统的一系列技术](../Images/7468261d5c5ad9522c51097b5ab9227e.png)'
- en: 'Figure 2: The LLM triad is a progression of techniques for incorporating domain-
    and company-specific knowledge into your LLM system'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：LLM三联是将领域和公司特定知识融入你的LLM系统的一系列技术
- en: 'As you progress from left to right, you can ingrain more domain knowledge into
    the LLM – however, each stage also adds new technical challenges (if you are interested
    in a systematic deep-dive into the LLM triad, please check out chapters 5–8 of
    my book [The Art of AI Product Management](https://mng.bz/lYXy)). Here, let’s
    focus on how domain experts can jump in at each of the stages:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你从左到右的进步，你可以将更多的领域知识植入LLM——然而，每个阶段也会带来新的技术挑战（如果你对LLM三联的系统化深入研究感兴趣，请查看我的书籍《AI产品管理艺术》的第5-8章。[The
    Art of AI Product Management](https://mng.bz/lYXy))。在这里，让我们关注领域专家如何在每个阶段介入：
- en: '**Prompting** out-of-the-box LLMs might seem like a generic approach, but with
    the right intuition and skill, domain experts can fine-tune prompts to extract
    the extra bit of domain knowledge out of the LLM. Personally, I think this is
    a big part of the fascination around prompting – it puts the most powerful AI
    models directly into the hands of domain experts without any technical expertise.
    Some key prompting techniques include:'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提示**现成的LLM可能看起来是一种通用方法，但凭借正确的直觉和技能，领域专家可以微调提示以从LLM中提取额外的领域知识。我个人认为，这是提示周围很大一部分吸引力的原因——它将最强大的AI模型直接交到领域专家手中，而无需任何技术专长。一些关键的提示技术包括：'
- en: '**Few-shot prompting:** Incorporate examples to guide the model’s responses.
    Instead of just asking *"What are alternative shipping routes?"*, a well-crafted
    prompt includes sample scenarios, such as *"Example of past scenario: A previous
    delay at the Port of Shenzhen was mitigated by rerouting through Ho Chi Minh City,
    reducing transit time by 3 days."*'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**少样本提示（Few-shot prompting）**：通过包含示例来引导模型的响应。而不仅仅是询问 *"有哪些替代的运输路线？"*，一个精心设计的提示应包括样本场景，例如："过去场景示例：由于深圳港的延误，通过河内市重新路由，减少了3天的运输时间。"'
- en: '**Chain-of-thought prompting:** Encourage step-by-step reasoning for complex
    logistics queries. Instead of *"Why is my shipment delayed?"*, a structured prompt
    might be *"Analyse historical delivery data, weather reports, and customs processing
    times to determine why shipment #12345 is delayed."*'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**思维链提示（Chain-of-thought prompting）**：鼓励对复杂的物流查询进行逐步推理。而不是问 *"我的货物为什么延误？"*，一个结构化的提示可能是："分析历史交付数据、天气报告和海关处理时间，以确定货物编号#12345延误的原因。"'
- en: '**Providing further background information:** Attach external documents to
    improve domain-specific responses. For example, prompts could reference real-time
    port congestion reports, supplier contracts, or risk assessments to generate data-backed
    recommendations. Most LLM interfaces already allow you to conveniently attach
    additional files to your prompt.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提供更多背景信息**：附加外部文档以改善特定领域的响应。例如，提示可以引用实时港口拥堵报告、供应商合同或风险评估，以生成基于数据的建议。大多数LLM界面已经允许您方便地将附加文件附加到您的提示中。'
- en: '**2\. RAG (Retrieval-Augmented Generation)**: While prompting helps guide AI,
    it still relies on pre-trained knowledge, which may be outdated or incomplete.
    RAG allows AI to retrieve real-time, company-specific data, ensuring that its
    responses are grounded in current logistics reports, supplier performance records,
    and risk assessments. For example, instead of generating generic supplier risk
    analyses, a RAG-powered AI system would pull real-time shipment data, supplier
    credit ratings, and port congestion reports before making recommendations. Domain
    experts can help select and structure these data sources and are also needed when
    it comes to testing and evaluating RAG systems.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. RAG（检索增强生成）**：虽然提示有助于引导AI，但它仍然依赖于预训练的知识，这些知识可能已经过时或不完整。RAG允许AI检索实时、特定于公司的数据，确保其响应基于当前的物流报告、供应商绩效记录和风险评估。例如，而不是生成通用的供应商风险评估，一个由RAG驱动的AI系统在做出推荐之前会拉取实时货运数据、供应商信用评级和港口拥堵报告。领域专家可以帮助选择和结构这些数据源，在测试和评估RAG系统时也是必需的。'
- en: ✅ **Implementation tip:** Work with domain experts to curate and structure knowledge
    sources – ensuring AI retrieves and applies only the most relevant and high-quality
    business information.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **实施技巧**：与领域专家合作，精选和结构化知识源——确保AI只检索和应用最相关和高质量的商业信息。
- en: '**3\. Fine-tuning**: While prompting and RAG inject domain knowledge on-the-fly,
    they do not inherently embed supply domain-specific workflows, terminology, or
    decision logic into your LLM. Fine-tuning adapts the LLM to think like a logistics
    expert. Domain experts can guide this process by creating high-quality training
    data, ensuring AI learns from real supplier assessments, risk evaluations, and
    procurement decisions. They can refine industry terminology to prevent misinterpretations
    (*e.g., AI distinguishing between "buffer stock" and "safety stock"*). They also
    align AI’s reasoning with business logic, ensuring it considers cost, risk, and
    compliance – not just efficiency. Finally, they evaluate fine-tuned models, testing
    AI against real-world decisions to catch biases or blind spots.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 微调**：虽然提示和RAG可以即时注入领域知识，但它们本身并不将特定于供应链的工作流程、术语或决策逻辑嵌入到你的LLM中。微调使LLM能够像物流专家一样思考。领域专家可以通过创建高质量的训练数据来指导这个过程，确保AI从真实的供应商评估、风险评估和采购决策中学习。他们可以细化行业术语以防止误解（例如，AI区分“缓冲库存”和“安全库存”）。他们还使AI的推理与业务逻辑保持一致，确保它考虑成本、风险和合规性——而不仅仅是效率。最后，他们评估微调模型，测试AI对现实世界决策的反应，以捕捉偏差或盲点。'
- en: '✅ **Implementation tip**: In LLM fine-tuning, data is the crucial success factor.
    Quality goes over quantity, and fine-tuning on a small, high-quality dataset can
    give you excellent results. Thus, give your experts enough time to figure out
    the right structure and content of the fine-tuning data and plan for plenty of
    end-to-end iterations of your fine-tuning process.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **实施技巧**：在LLM微调中，数据是成功的关键因素。质量胜于数量，对小型、高质量数据集进行微调可以给你带来优异的结果。因此，给你的专家足够的时间来确定微调数据的正确结构和内容，并计划进行大量的端到端迭代。
- en: Encoding expert knowledge with neuro-symbolic AI
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用神经符号AI编码专家知识
- en: Every machine learning algorithm gets it wrong from time to time. To mitigate
    errors, it helps to set the "hard facts" of your domain in stone, making your
    AI system more reliable and controllable. This combination of machine learning
    and deterministic rules is called neuro-symbolic AI.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 每个机器学习算法有时都会出错。为了减轻错误，将你领域的“硬事实”固定下来，使你的AI系统更加可靠和可控，这有助于减少错误。这种机器学习和确定性规则的结合被称为神经符号AI。
- en: For example, an explicit knowledge graph can encode supplier relationships,
    regulatory constraints, transportation networks, and risk dependencies in a structured,
    interconnected format.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个显式的知识图谱可以以结构化、互联的格式编码供应商关系、监管约束、运输网络和风险依赖。
- en: '![Figure 3: Knowledge graphs explicitly encode relationships between entities,
    reducing the guesswork in your AI system](../Images/d3b5fc2c6d08a64f4861aa8541510a70.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图3：知识图谱明确编码实体之间的关系，减少了AI系统中的猜测工作](../Images/d3b5fc2c6d08a64f4861aa8541510a70.png)'
- en: 'Figure 3: Knowledge graphs explicitly encode relationships between entities,
    reducing the guesswork in your AI system'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：知识图谱明确编码实体之间的关系，减少了AI系统中的猜测工作
- en: 'Instead of relying purely on statistical correlations, an AI system enriched
    with knowledge graphs can:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是仅仅依赖于统计相关性，一个增强知识图谱的人工智能系统可以：
- en: Validate predictions against domain-specific rules (e.g., ensuring that AI-generated
    supplier recommendations comply with regulatory requirements).
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将预测与特定领域的规则进行验证（例如，确保AI生成的供应商推荐符合监管要求）。
- en: Infer missing information (e.g., if a supplier has no historical delays but
    shares dependencies with high-risk suppliers, AI can assess its potential risk).
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推断缺失的信息（例如，如果一个供应商没有历史延误但与高风险供应商有依赖关系，AI可以评估其潜在风险）。
- en: Improve explainability by allowing AI decisions to be traced back to logical,
    rule-based reasoning rather than black-box statistical outputs.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过允许AI决策可追溯至逻辑、基于规则的推理，而不是黑盒统计输出，提高可解释性。
- en: 'How can you decide which knowledge should be encoded with rules (**symbolic**
    AI), and which should be learned dynamically from the data (**neural** AI)? Domain
    experts can help youpick those bits of knowledge where hard-coding makes the most
    sense:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何决定哪些知识应该用规则（**符号**AI）编码，哪些应该从数据中动态学习（**神经**AI）？领域专家可以帮助你挑选那些硬编码最有意义的知识片段：
- en: Knowledge that is relatively stable over time
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随时间相对稳定的知识
- en: Knowledge that is hard to infer from the data, for example because it is not
    well-represented
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 难以从数据中推断的知识，例如因为它没有得到很好的表示
- en: Knowledge that is critical for high-impact decisions in your domain, so you
    can’t afford to get it wrong
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于你领域内具有重大影响决策的知识，你不能承担出错的风险
- en: In most cases, this knowledge will be stored in separate components of your
    AI system, like decision trees, knowledge graphs, and ontologies. There are also
    some methods to integrate it directly into LLMs and other statistical models,
    such as [Lamini’s memory fine-tuning](https://www.lamini.ai/blog/lamini-memory-tuning).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数情况下，这种知识将存储在你的AI系统的独立组件中，如决策树、知识图谱和本体。还有一些方法可以直接将其集成到LLMs和其他统计模型中，例如[Lamini的记忆微调](https://www.lamini.ai/blog/lamini-memory-tuning)。
- en: Compound AI and modular workflows
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 复合AI和模块化工作流程
- en: 'Generating insights and turning them into actions is a multi-step process.
    Experts can help you model workflows and decision-making pipelines, ensuring that
    the process followed by your AI system aligns with their tasks. For example, the
    following pipeline shows how the AI components we considered so far can be combined
    into a modular workflow for the mitigation of shipment risks:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 生成见解并将它们转化为行动是一个多步骤的过程。专家可以帮助你建模工作流程和决策流程，确保你的AI系统遵循的流程与他们的任务相一致。例如，以下流程展示了我们迄今为止考虑的AI组件如何组合成一个模块化工作流程，以减轻运输风险：
- en: '![Figure 4: A combined workflow for the assessment and mitigation of shipment
    risks](../Images/3613f43bdd13de91aa6ebd1b0a29e703.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图4：评估和减轻运输风险的组合工作流程](../Images/3613f43bdd13de91aa6ebd1b0a29e703.png)'
- en: 'Figure 4: A combined workflow for the assessment and mitigation of shipment
    risks'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：评估和减轻运输风险的组合工作流程
- en: Experts are also needed to calibrate the "labor distribution" between humans
    in AI. For example, when modelling decision logic, they can set thresholds for
    automation, deciding when AI can trigger workflows versus when human approval
    is needed.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 还需要专家来校准AI中人类之间的“劳动分配”。例如，在建模决策逻辑时，他们可以设定自动化阈值，决定何时AI可以触发工作流程，何时需要人工审批。
- en: ✅ **Implementation tip:** Involve your domain experts in mapping your processes
    to AI models and assets, identifying gaps vs. steps that can already be automated.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **实施技巧：** 让你的领域专家参与将你的流程映射到AI模型和资产中，识别差距与可以自动化的步骤。
- en: Designing ergonomic user experiences
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设计人体工程学用户体验
- en: Especially in B2B environments, where workers are deeply embedded in their daily
    workflows, the user experience must be seamlessly integrated with existing processes
    and task structures to ensure efficiency and adoption. For example, an AI-powered
    supply chain tool must align with how logistics professionals think, work, and
    make decisions. In the development phase, domain experts are the closest "peers"
    to your real users, and picking their brains is one of the fastest ways to bridge
    the gap between AI capabilities and real-world usability.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是在B2B环境中，工作人员深深嵌入到他们的日常工作中，用户体验必须无缝集成到现有流程和任务结构中，以确保效率和采用。例如，一个AI驱动的供应链工具必须与物流专业人士的思考、工作和决策方式保持一致。在开发阶段，领域专家是您真实用户的“最接近的同行”，挖掘他们的智慧是弥合AI能力与现实世界可用性差距的最快方式之一。
- en: ✅ **Implementation tip:** Involve domain experts early in UX design to ensure
    AI interfaces are intuitive, relevant, and tailored to real decision-making workflows.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **实施技巧：** 在UX设计早期就涉及领域专家，以确保AI界面直观、相关且针对实际的决策工作流程。
- en: Ensuring transparency and trust in AI decisions
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确保AI决策的透明度和信任度
- en: AI thinks differently from humans, which makes us humans skeptical. Often, that’s
    a good thing since it helps us stay alert to potential mistakes. But distrust
    is also one of the biggest barriers to AI adoption. When users don’t understand
    why a system makes a particular recommendation, they are less likely to work with
    it. Domain experts can define how AI should explain itself – ensuring users have
    visibility into confidence scores, decision logic, and key influencing factors.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: AI的思维方式与人类不同，这使得我们人类持怀疑态度。通常，这很好，因为它有助于我们保持警惕，防止潜在的错误。但怀疑也是AI采用的最大障碍之一。当用户不理解系统为何做出特定推荐时，他们不太可能与之合作。领域专家可以定义AI应该如何解释自己——确保用户能够看到置信度分数、决策逻辑和关键影响因素。
- en: For example, if an SCO system recommends rerouting a shipment, it would be irresponsible
    on the part of a logistics planner to just accept it. She needs to see the "why"
    behind the recommendation – is it due to supplier risk, port congestion, or fuel
    cost spikes? The UX should show a breakdown of the decision, backed by additional
    information like historical data, risk factors, and a cost-benefit analysis.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果 SCO 系统建议重新路由货物，物流规划师仅接受这一建议是不负责任的。她需要看到建议背后的“原因” - 是由于供应商风险、港口拥堵还是燃料成本激增？UX
    应该展示决策的分解，并辅以额外信息，如历史数据、风险因素和成本效益分析。
- en: '⚠️ **Mitigate overreliance on AI**: Excessive dependence of your users on AI
    can introduce bias, errors, and unforeseen failures. Experts should find ways
    to calibrate AI-driven insights vs. human expertise, ethical oversight, and strategic
    safeguards to ensure resilience, adaptability, and trust in decision-making.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: ⚠️ **减轻对 AI 的过度依赖**：用户过度依赖 AI 可能会引入偏见、错误和不可预见的故障。专家应找到方法来校准 AI 驱动的洞察与人类专业知识、道德监督和战略保障，以确保决策的弹性、适应性和信任。
- en: ✅ **Implementation tip:** Work with domain experts to define key explainability
    features – such as confidence scores, data sources, and impact summaries – so
    users can quickly assess AI-driven recommendations.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **实施技巧**：与领域专家合作，定义关键的可解释性功能 - 例如置信度分数、数据来源和影响摘要 - 以便用户可以快速评估由 AI 驱动的建议。
- en: Simplifying AI interactions without losing depth
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简化 AI 交互而不丢失深度
- en: AI tools should make complex decisions easier, not harder. If users need deep
    technical knowledge to extract insights from AI, the system has failed from a
    UX perspective. Domain experts can help strike a balance between simplicity and
    depth, ensuring the interface provides actionable, context-aware recommendations
    while allowing deeper analysis when needed.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: AI 工具应使复杂决策更容易，而不是更难。如果用户需要深入的技术知识来从 AI 中提取洞察，那么从 UX 视角来看，系统已经失败了。领域专家可以帮助在简单性和深度之间找到平衡，确保界面提供可操作、上下文感知的建议，并在需要时允许进行深入分析。
- en: For instance, instead of forcing users to manually sift through data tables,
    AI could provide pre-configured reports based on common logistics challenges.
    However, expert users should also have on-demand access to raw data and advanced
    settings when necessary. The key is to design AI interactions that are efficient
    for everyday use but flexible for deep analysis when required.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，与其强迫用户手动筛选数据表，AI 可以根据常见的物流挑战提供预配置的报告。然而，专家用户在必要时也应能够访问原始数据和高级设置。关键是设计出既适合日常使用又能在需要时进行深入分析的
    AI 交互。
- en: ✅ **Implementation tip:** Use domain expert feedback to define default views,
    priority alerts, and user-configurable settings, ensuring AI interfaces provide
    both efficiency for routine tasks and depth for deeper research and strategic
    decisions.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **实施技巧**：使用领域专家的反馈来定义默认视图、优先警报和用户可配置的设置，确保 AI 界面既提供日常任务的效率，又提供深入研究和战略决策的深度。
- en: Continuous UX testing and iteration with experts
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与专家进行持续的 UX 测试和迭代
- en: AI UX isn’t a one-and-done process – it needs to evolve with real-world user
    feedback. Domain experts play a key role in UX testing, refinement, and iteration,
    ensuring that AI-driven workflows stay aligned with business needs and user expectations.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: AI UX 不是一次性的过程 - 它需要随着现实世界用户反馈而进化。领域专家在 UX 测试、精炼和迭代中扮演着关键角色，确保由 AI 驱动的流程与业务需求和用户期望保持一致。
- en: For example, your initial interface may surface too many low-priority alerts,
    leading to alert fatigue where users start ignoring AI recommendations. Supply
    chain experts can identify which alerts are most valuable, allowing UX designers
    to prioritize high-impact insights while reducing noise.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，您的初始界面可能显示太多低优先级的警报，导致用户开始忽略 AI 建议，产生警报疲劳。供应链专家可以确定哪些警报最有价值，使 UX 设计师能够优先考虑高影响力的洞察，同时减少噪音。
- en: '✅ **Implementation tip**: Conduct [think-aloud sessions](https://www.nngroup.com/articles/thinking-aloud-the-1-usability-tool/)
    and have domain experts verbalize their thought process when interacting with
    your AI interface. This helps AI teams uncover hidden assumptions and refine AI
    based on how experts actually think and make decisions.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **实施技巧**：进行[思考 aloud 会话](https://www.nngroup.com/articles/thinking-aloud-the-1-usability-tool/)，并让领域专家在交互
    AI 界面时表达他们的思维过程。这有助于 AI 团队发现隐藏的假设，并根据专家实际思考和决策的方式改进 AI。
- en: Conclusion
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'Vertical AI systems must integrate domain knowledge at every stage, and experts
    should become key stakeholders in your AI development:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 垂直人工智能系统必须在每个阶段整合领域知识，专家应成为您人工智能开发的关键利益相关者：
- en: They refine data selection, annotation, and synthetic data.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们优化数据选择、标注和合成数据。
- en: They guide AI learning through prompting, RAG, and fine-tuning.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们通过提示、RAG和微调引导人工智能学习。
- en: They support the design of seamless user experiences that integrate with daily
    workflows in a transparent and trustworthy way.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们支持设计无缝的用户体验，以透明和值得信赖的方式与日常工作流程集成。
- en: An AI system that "gets" the domain of your users will not only be useful and
    adopted in the short- and middle-term, but also contribute to the competitive
    advantage of your business.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 一个能够“理解”用户领域的人工智能系统不仅会在短期和中长期内有用并被采用，而且还能为您的业务带来竞争优势。
- en: Now that you have learned a bunch of methods to incorporate domain-specific
    knowledge, you might be wondering how to approach this in your organizational
    context. Stay tuned for my next article, where we will consider the practical
    challenges and strategies for implementing an expertise-driven AI strategy!
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经学习了许多整合特定领域知识的方法，你可能想知道如何在你的组织环境中实施这些方法。请关注我的下一篇文章，我们将探讨实施以专业知识驱动的人工智能策略的实际挑战和策略！
