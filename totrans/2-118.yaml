- en: Definition
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before I start, it’s important to define the term context engineering. Context
    engineering is essentially the science of deciding what to feed into your LLM.
    This can, for example, be:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: The system prompt, which tells the LLM how to act
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Document data fetch using RAG vector search
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Few-shot examples
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tools
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The closest previous description of this has been the term *prompt engineering*.
    However, prompt engineering is a less descriptive term, considering it implies
    only changing the system prompt you are feeding to the LLM. To get maximum performance
    out of your LLM, you have to consider all the context you are feeding into it,
    not only the system prompt.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Motivation
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: My initial motivation for this article came from reading this Tweet by Andrej
    Karpathy.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: +1 for "context engineering" over "prompt engineering".
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: People associate prompts with short task descriptions you'd give an LLM in your
    day-to-day use. When in every industrial-strength LLM app, context engineering
    is the delicate art and science of filling the context window… [https://t.co/Ne65F6vFcf](https://t.co/Ne65F6vFcf)
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人们将提示与在日常使用中给LLM的简短任务描述联系起来。在每一个工业级LLM应用中，上下文工程是填充上下文窗口的精细艺术和科学… [https://t.co/Ne65F6vFcf](https://t.co/Ne65F6vFcf)
- en: ''
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Andrej Karpathy (@karpathy) [June 25, 2025](https://twitter.com/karpathy/status/1937902205765607626?ref_src=twsrc%5Etfw)
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 安德烈·卡帕西 (@karpathy) [2025年6月25日](https://twitter.com/karpathy/status/1937902205765607626?ref_src=twsrc%5Etfw)
- en: 'I really agreed with the point Andrej made in this tweet. Prompt engineering
    is definitely an important science when working with LLMs. However, prompt engineering
    doesn’t cover everything we input into LLMs. In addition to the system prompt
    you write, you also have to consider elements such as:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常赞同安德烈在这次推文中提出的观点。当与大型语言模型（LLMs）一起工作时，提示工程（prompt engineering）无疑是一门重要的科学。然而，提示工程并不能涵盖我们输入到LLMs中的所有内容。除了你写的系统提示外，你还必须考虑以下元素：
- en: Which data should you insert into your prompt
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你应该将哪些数据插入到你的提示中
- en: How do you fetch that data
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你如何获取这些数据
- en: How to only provide relevant information to the LLM
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何只向LLM提供相关信息
- en: Etc.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 等。
- en: I will discuss all of these points throughout this article.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在本文中讨论所有这些点。
- en: API vs Console usage
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: API与控制台使用对比
- en: One important difference to clarify is whether you are using the LLMs from an
    API (calling it with code), or via the console (for example, via the [ChatGPT
    website](https://chatgpt.com/) or application). Context engineering is definitely
    important when working with LLMs through the console; however, my focus in this
    article will be on API usage. The reason for this is that when using an API, you
    have more options for dynamically changing the context you are feeding the LLM.
    For example, you can do RAG, where you first perform a vector search, and only
    feed the LLM the most important bits of information, rather than the entire database.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 需要明确的一个重要区别是，你是通过API（用代码调用）使用LLMs，还是通过控制台（例如，通过[ChatGPT网站](https://chatgpt.com/)或应用程序）使用。当通过控制台与LLMs一起工作时，上下文工程（context
    engineering）确实非常重要；然而，本文的重点将放在API使用上。这样做的原因是，当使用API时，你有更多选项来动态地改变你提供给LLMs的上下文。例如，你可以进行RAG（Retrieval-Augmented
    Generation），首先执行向量搜索，然后只向LLM提供最重要的信息片段，而不是整个数据库。
- en: These dynamic changes are not available in the same way when interacting with
    LLMs through the console; thus, I will focus on using LLMs through an API.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当通过控制台与LLMs交互时，这些动态变化并不以相同的方式出现；因此，我将专注于通过API使用LLMs。
- en: Context engineering techniques
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文工程技术
- en: Zero-shot prompting
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 零样本提示
- en: 'Zero-shot prompting is the baseline for context engineering. Doing a task *zero-shot*
    means the LLM is performing a task it hasn’t seen before. You are essentially
    only providing a task description as context for the LLM. For example, providing
    an LLM with a long text and asking it to classify the text into class A or B,
    according to some definition of the classes. The context (prompt) you are feeding
    the LLM could look something like this:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 零样本提示（zero-shot prompting）是上下文工程的基线。执行一个零样本任务意味着LLM正在执行一个它以前没有见过的任务。你实际上只提供了任务描述作为LLM的上下文。例如，向LLM提供一个长文本，并要求它根据某些类别的定义将文本分类为A类或B类。你提供给LLM的上下文（提示）可能看起来像这样：
- en: '[PRE0]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Depending on the task, this could work very well. LLMs are generalists and are
    able to perform most simple text-based tasks. Classifying a text into one of two
    classes will usually be a simple task, and zero-shot prompting will thus usually
    work quite well.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 根据任务的不同，这可能会非常有效。LLMs是通才，能够执行大多数简单的基于文本的任务。将文本分类为两个类别之一通常是一个简单的任务，因此零样本提示通常可以很好地工作。
- en: Few-shot prompting
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 少量样本提示
- en: 'This infographic highlights how to perform few-shot prompting:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这张信息图表突出了如何执行少量样本提示：
- en: '![Context engineering. Few shot prompting](../Images/e9fa19f01c7433cd4227258bc3ad6c24.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![上下文工程。少量样本提示](../Images/e9fa19f01c7433cd4227258bc3ad6c24.png)'
- en: This infographic highlights how you can perform few-shot prompting to enhance
    LLM performance. Image by ChatGPT.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这张信息图表突出了如何执行少量样本提示（few-shot prompting）以增强LLMs的性能。图片由ChatGPT提供。
- en: 'The follow-up from zero-shot prompting is *few-shot prompting*. With few-shot
    prompting, you provide the LLM with a prompt similar to the one above, but you
    also provide it with examples of the task it will perform. This added context
    will help the LLM improve at performing the task. Following up on the prompt above,
    a few-shot prompt could look like:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 零样本提示的后续是**少样本提示**。在少样本提示中，你向LLM提供与上面类似的提示，但你还提供它将执行的任务的示例。这个额外的上下文将帮助LLM提高执行任务的能力。在上述提示的基础上，一个少样本提示可能看起来像这样：
- en: '[PRE1]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'You can see I’ve provided the model some examples wrapped in <example></example>
    tags. I have discussed the topic of creating robust LLM prompts in my article
    on LLM reliability below:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到我已经向模型提供了一些用<example></example>标签包裹的示例。我在下面关于LLM可靠性的文章中讨论了创建鲁棒的LLM提示的话题：
- en: '[How to Ensure Reliability in LLM Applications](https://towardsdatascience.com/how-to-ensure-reliability-in-llm-applications/)'
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何确保LLM应用的可靠性](https://towardsdatascience.com/how-to-ensure-reliability-in-llm-applications/)'
- en: Few-shot prompting works well because you are providing the model with examples
    of the task you are asking it to perform. This usually increases performance.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 少样本提示（Few-shot prompting）效果良好，因为你在向模型提供你要求它执行的任务的示例。这通常会增加性能。
- en: You can imagine this works well on humans as well. If you ask a human a task
    they have never done before, just by describing the task, they might perform decently
    (of course, depending on the difficulty of the task). However, if you also provide
    the human with examples, their performance will usually increase.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以想象这同样适用于人类。如果你向一个人分配一个他们从未做过的任务，仅仅通过描述任务，他们可能表现不错（当然，这取决于任务的难度）。然而，如果你还向这个人提供示例，他们的表现通常会提高。
- en: 'Overall, I find it useful to think about LLM prompts as if I’m asking a human
    to perform a task. Imagine instead of prompting an LLM, you simply provide the
    text to a human, and you ask yourself the question:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，我认为将LLM提示想象成我要求一个人执行任务是有用的。想象一下，如果你不是提示LLM，而是简单地给一个人提供文本，然后你自己问自己问题：
- en: Given this prompt, and no other context, will the human be able to perform the
    task?
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 给定这个提示，没有其他上下文，人类能否完成这个任务？
- en: If the answer is no, you should work on clarifying and improving your prompt.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果答案是“否”，你应该努力澄清和改进你的提示。
- en: '* * *'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I also want to mention dynamic few-shot prompting, considering it’s a technique
    I’ve had a lot of success with. Traditionally, with few-shot prompting, you have
    a set list of examples you feed into every prompt. However, you can often achieve
    higher performance using dynamic few-shot prompting.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我还想提到动态少样本提示，考虑到这是我取得很多成功的技术。传统上，在少样本提示中，你有一组固定的示例，你将它们放入每个提示中。然而，你通常可以通过动态少样本提示实现更高的性能。
- en: Dynamic few-shot prompting means selecting the few-shot examples dynamically
    when creating the prompt for a task. For example, if you are asked to classify
    a text into classes A and B, and you already have a list of 200 texts and their
    corresponding labels. You can then perform a similarity search between the new
    text you are classifying and the example texts you already have. Continuing, you
    can measure the vector similarity between the texts and only choose the most similar
    texts (out of the 200 texts) to feed into your prompt as context. This way, you’re
    providing the model with **more relevant examples** of how to perform the task.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 动态少样本提示意味着在为任务创建提示时动态选择少样本示例。例如，如果你被要求将文本分类为A和B类，而你已经有了一个包含200个文本及其对应标签的列表。然后你可以对新文本和已有的示例文本进行相似度搜索。继续进行，你可以测量文本之间的向量相似度，并只选择最相似的文本（从200个文本中）作为提示的上下文。这样，你向模型提供了**更多相关的示例**，以展示如何执行任务。
- en: RAG
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RAG
- en: Retrieval augmented generation is a well-known technique for increasing the
    knowledge of LLMs. Assume you already have a database consisting of thousands
    of documents. You now receive a question from a user, and have to answer it, given
    the knowledge inside your database.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 检索增强生成是提高LLM知识的一种知名技术。假设你已经有了一个包含数千份文档的数据库。现在你收到一个用户的问题，并且需要在数据库中的知识基础上回答它。
- en: 'Unfortunately, you can’t feed the entire database into the LLM. Even though
    we have LLMs such as [Llama 4 Scout with a 10-million](https://ai.meta.com/blog/llama-4-multimodal-intelligence/)
    context length window, databases are usually much larger. You therefore have to
    find the most relevant information in the database to feed into your LLM. RAG
    does this similarly to dynamic few-shot prompting:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，您不能将整个数据库输入到LLM中。尽管我们有像[Llama 4 Scout具有1000万个](https://ai.meta.com/blog/llama-4-multimodal-intelligence/)上下文长度窗口的LLM，但数据库通常要大得多。因此，您必须找到数据库中最相关的信息来输入您的LLM。RAG与此类似，类似于动态少样本提示：
- en: Perform a vector search
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行向量搜索
- en: Find the most similar documents to the user question (most similar documents
    are assumed to be most relevant)
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 找到与用户问题最相似的文档（假设最相似的文档是最相关的）
- en: Ask the LLM to answer the question, given the most similar documents
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求LLM在给定最相似的文档的情况下回答问题
- en: By performing RAG, you are doing context engineering by only providing the LLM
    with the most relevant data for performing its task. To improve the performance
    of the LLM, you can work on the context engineering by improving your RAG search.
    This can, for example, be done by improving the search to find only the most relevant
    documents.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 通过执行RAG，您仅通过向LLM提供执行其任务所需的最相关数据来进行上下文工程。为了提高LLM的性能，您可以通过改进您的RAG搜索来优化上下文工程。例如，这可以通过改进搜索，仅找到最相关的文档来实现。
- en: 'You can read more about RAG in my article about developing a RAG system for
    your personal data:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在我的关于为个人数据开发RAG系统的文章中了解更多关于RAG的信息：
- en: https://eivindkjosbakken.com/2025/07/09/how-to-make-a-rag-system-to-gain-powerful-access-to-your-data
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: https://eivindkjosbakken.com/2025/07/09/how-to-make-a-rag-system-to-gain-powerful-access-to-your-data
- en: Tools (MCP)
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 工具（MCP）
- en: You can also provide the LLM with tools to call, which is an important part
    of context engineering, especially now that we see the rise of AI agents. Tool
    calling today is often done using [Model Context Protocol (MCP), a concept started
    by Anthropic.](https://www.anthropic.com/news/model-context-protocol)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以向LLM提供可调用的工具，这是上下文工程的重要组成部分，尤其是在我们看到AI代理兴起的时代。今天的工具调用通常是通过[模型上下文协议（MCP），由Anthropic提出的一个概念](https://www.anthropic.com/news/model-context-protocol)来完成的。
- en: 'AI agents are LLMs capable of calling tools and thus performing actions. An
    example of this could be a weather agent. If you ask an LLM without access to
    tools about the weather in New York, it will not be able to provide an accurate
    response. The reason for this is naturally that information about the weather
    needs to be fetched in real time. To do this, you can, for example, give the LLM
    a tool such as:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理是能够调用工具并执行操作的LLM。一个例子可以是天气代理。如果您向无法访问工具的LLM询问纽约的天气，它将无法提供准确的回答。原因很自然，因为需要实时获取有关天气的信息。为此，您可以为LLM提供如下工具：
- en: '[PRE2]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: If you give the LLM access to this tool and ask it about the weather, it can
    then search for the weather for a city and provide you with an accurate response.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您允许LLM访问此工具并询问天气，它就可以搜索城市的天气并提供准确的回答。
- en: 'Providing tools for LLMs is incredibly important, as it significantly enhances
    the abilities of the LLM. Other examples of tools are:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 为LLM提供工具非常重要，因为它显著增强了LLM的能力。其他工具的例子包括：
- en: Search the internet
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在互联网上搜索
- en: A calculator
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个计算器
- en: Search via Twitter API
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过Twitter API进行搜索
- en: Topics to consider
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要考虑的主题
- en: In this section, I make a few notes on what you should consider when creating
    the context to feed into your LLM
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我简要说明在创建要输入LLM的上下文时应考虑的事项
- en: Utilization of context length
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用上下文长度
- en: 'The context length of an LLM is an important consideration. As of July 2025,
    you can feed most frontier model LLMs with over 100,000 input tokens. This provides
    you with a lot of options for how to utilize this context. You have to consider
    the tradeoff between:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: LLM的上下文长度是一个重要的考虑因素。截至2025年7月，您可以为大多数前沿模型LLM提供超过100,000个输入标记。这为您提供了很多利用上下文的方式。您必须考虑以下权衡：
- en: Including a lot of information in a prompt, thus risking some of the information
    getting lost in the context
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在提示中包含大量信息，从而可能导致一些信息在上下文中丢失
- en: Missing some important information in the prompt, thus risking the LLM not having
    the required context to perform a specific task
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在提示中遗漏一些重要信息，从而可能导致LLM没有执行特定任务所需的上下文
- en: Usually, the only way to figure out the balance, is to test your LLMs performance.
    For example with a classificaition task, you can check the accuracy, given different
    prompts.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，确定平衡的唯一方法是通过测试你的LLM性能。例如，在分类任务中，你可以检查给定不同提示的准确率。
- en: If I discover the context to be too long for the LLM to work effectively, I
    sometimes split a task into several prompts. For example, having one prompt summarize
    a text, and a second prompt classifying the text summary. This can help the LLM
    utilize its context effectively and thus increase performance.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我发现上下文对于LLM来说太长，以至于无法有效工作，我有时会将任务分成几个提示。例如，一个提示总结文本，另一个提示对文本摘要进行分类。这可以帮助LLM有效地利用上下文，从而提高性能。
- en: 'Furthermore, providing too much context to the model can have a significant
    downside, as I describe in the next section:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，向模型提供过多的上下文可能带来显著的负面影响，正如我在下一节中描述的：
- en: Context rot
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上下文退化
- en: 'Last week, I read an [interesting article about context rot.](https://research.trychroma.com/context-rot?)
    The article was about the fact that increasing the context length lowers LLM performance,
    even though the task difficulty doesn’t increase. This implies that:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 上周，我读了一篇关于[上下文退化](https://research.trychroma.com/context-rot?)的有趣文章。文章讨论了增加上下文长度会降低大型语言模型（LLM）的性能，尽管任务难度并没有增加。这暗示了：
- en: Providing an LLM irrelevant information, will decrease its ability to perform
    tasks succesfully, even if task difficulty does not increase
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 向LLM提供与其无关的信息，将降低其成功完成任务的能力，即使任务难度没有增加
- en: The point here is essentially that you should only provide relevant information
    to your LLM. Providing other information decreases LLM performance (i.e., *performance
    is not neutral to input length*)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这里要强调的是，你应该只为你的LLM提供相关信息。提供其他信息会降低LLM的性能（即，*性能并非对输入长度中立*）
- en: Conclusion
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I have discussed the topic of context engineering, which is
    the process of providing an LLM with the right context to perform its task effectively.
    There are a lot of techniques you can utilize to fill up the context, such as
    few-shot prompting, RAG, and tools. These are all powerful techniques you can
    use to significantly improve an LLM’s ability to perform a task effectively. Furthermore,
    you also have to consider the fact that providing an LLM with too much context
    also has downsides. Increasing the number of input tokens reduces performance,
    as you could read about in the article about context rot.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了上下文工程的主题，即向LLM提供适当上下文以有效执行其任务的过程。你可以利用许多技术来填充上下文，例如少样本提示、RAG和工具。这些都是你可以用来显著提高LLM有效执行任务能力的强大技术。此外，你还必须考虑这样一个事实，即向LLM提供过多的上下文也有不利的一面。增加输入标记的数量会降低性能，正如你可以在关于上下文退化的文章中读到的那样。
- en: Also, [check out part two of this article.](https://towardsdatascience.com/how-to-create-powerful-llm-applications-with-context-engineering/)
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，[查看这篇文章的第二部分。](https://towardsdatascience.com/how-to-create-powerful-llm-applications-with-context-engineering/)
