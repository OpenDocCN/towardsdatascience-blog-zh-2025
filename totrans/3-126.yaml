- en: 'Graph Neural Networks Part 3: How GraphSAGE Handles Changing Graph Structure'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/graph-neural-networks-part-3-how-graphsage-handles-changing-graph-structure/](https://towardsdatascience.com/graph-neural-networks-part-3-how-graphsage-handles-changing-graph-structure/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**<mdspan datatext="el1743488306877" class="mdspan-comment">In the previous</mdspan>
    parts of this series, we looked at Graph Convolutional Networks (GCNs) and Graph
    Attention Networks (GATs). Both architectures work fine, but they also have some
    limitations! A big one is that for large graphs, calculating the node representations
    with GCNs and GATs will become v-e-r-y slow. Another limitation is that if the
    graph structure changes, GCNs and GATs will not be able to generalize. So if nodes
    are added to the graph, a GCN or GAT cannot make predictions for it. Luckily,
    these issues can be solved!**'
  prefs: []
  type: TYPE_NORMAL
- en: In this post, I will explain GraphSAGE and how it solves common problems of
    GCNs and GATs. We will train GraphSAGE and use it for graph predictions to compare
    performance with GCNs and GATs.
  prefs: []
  type: TYPE_NORMAL
- en: New to GNNs? You can start with [post 1 about GCNs](https://towardsdatascience.com/graph-neural-networks-part-1-graph-convolutional-networks-explained-9c6aaa8a406e/) (also
    containing the initial setup for running the code samples), and [post 2 about
    GATs](https://towardsdatascience.com/graph-neural-networks-part-2-graph-attention-networks-vs-gcns-029efd7a1d92/).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Two Key Problems with GCNs and GATs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I shortly touched upon it in the introduction, but let’s dive a bit deeper.
    What are the problems with the previous GNN models?
  prefs: []
  type: TYPE_NORMAL
- en: Problem 1\. They don’t generalize
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'GCNs and GATs struggle with generalizing to unseen graphs. The graph structure
    needs to be the same as the training data. This is known as *transductive learning*,
    where the model trains and makes predictions on the same fixed graph. It is actually
    overfitting to specific graph topologies. In reality, graphs will change: Nodes
    and edges can be added or removed, and this happens often in real world scenarios.
    We want our GNNs to be capable of learning patterns that generalize to unseen
    nodes, or to entirely new graphs (this is called *inductive* *learning*).'
  prefs: []
  type: TYPE_NORMAL
- en: Problem 2\. They have scalability issues
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Training GCNs and GATs on large-scale graphs is computationally expensive. GCNs
    require repeated neighbor aggregation, which grows exponentially with graph size,
    while GATs involve (multihead) attention mechanisms that scale poorly with increasing
    nodes.
  prefs: []
  type: TYPE_NORMAL
- en: In big production recommendation systems that have large graphs with millions
    of users and products, GCNs and GATs are impractical and slow.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a look at GraphSAGE to fix these issues.
  prefs: []
  type: TYPE_NORMAL
- en: GraphSAGE (SAmple and aggreGatE)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[GraphSAGE](https://arxiv.org/pdf/1706.02216) makes training much faster and
    scalable. It does this by *sampling only a subset of neighbors*. For super large
    graphs it’s computationally impossible to process all neighbors of a node (except
    if you have limitless time, which we all don’t…), like with traditional GCNs.
    Another important step of GraphSAGE is *combining the features of the sampled
    neighbors with an aggregation function*.'
  prefs: []
  type: TYPE_NORMAL
- en: We will walk through all the steps of GraphSAGE below.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Sampling Neighbors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'With tabular data, sampling is easy. It’s something you do in every common
    machine learning project when creating train, test, and validation sets. With
    graphs, you cannot select random nodes. This can result in disconnected graphs,
    nodes without neighbors, etcetera:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d491d07716efc1c1d9863184b508b1a1.png)'
  prefs: []
  type: TYPE_IMG
- en: Randomly selecting nodes, but some are disconnected. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'What you *can* do with graphs, is selecting a random fixed-size subset of neighbors.
    For example in a social network, you can sample 3 friends for each user (instead
    of all friends):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dca7687fae48800f098d6f3648aef098.png)'
  prefs: []
  type: TYPE_IMG
- en: Randomly selecting three rows in the table, all neighbors selected in the GCN,
    three neighbors selected in GraphSAGE. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Aggregate Information
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After the neighbor selection from the previous part, GraphSAGE combines their
    features into one single representation. There are multiple ways to do this (multiple *aggregation
    functions*). The most common types and the ones explained in the paper are *mean
    aggregation*, *LSTM*, and *pooling*.
  prefs: []
  type: TYPE_NORMAL
- en: 'With mean aggregation, the average is computed over all sampled neighbors’
    features (very simple and often effective). In a formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bf820f1da8bebe7b34034303d573196d.png)'
  prefs: []
  type: TYPE_IMG
- en: LSTM aggregation uses an [LSTM](https://www.bioinf.jku.at/publications/older/2604.pdf) (type
    of neural network) to process neighbor features sequentially. It can capture more
    complex relationships, and is more powerful than mean aggregation.
  prefs: []
  type: TYPE_NORMAL
- en: The third type, pool aggregation, applies a non-linear function to extract key
    features (think about [max-pooling](https://paperswithcode.com/method/max-pooling) in
    a neural network, where you also take the maximum value of some values).
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Update Node Representation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After sampling and aggregation, the node *combines its previous features with
    the aggregated neighbor features*. Nodes will learn from their neighbors but also
    keep their own identity, just like we saw before with GCNs and GATs. Information
    can flow across the graph effectively.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the formula for this step:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6dc23e636f869f2258d06ba5139f6e95.png)'
  prefs: []
  type: TYPE_IMG
- en: The aggregation of step 2 is done over all neighbors, and then the feature representation
    of the node is concatenated. This vector is multiplied by the weight matrix, and
    passed through non-linearity (for example ReLU). As a final step, normalization
    can be applied.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Repeat for Multiple Layers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first three steps can be repeated multiple times, when this happens, information
    can flow from distant neighbors. In the image below you see a node with three
    neighbors selected in the first layer (direct neighbors), and two neighbors selected
    in the second layer (neighbors of neighbors).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/26f53b183c3b9fed3d1c7aa1a65e2d40.png)'
  prefs: []
  type: TYPE_IMG
- en: Selected node with selected neighbors, three in the first layer, two in the
    second layer. Interesting to note is that one of the neighbors of the nodes in
    the first step is the selected node, so that one can also be selected when two
    neighbors are selected in the second step (just a bit harder to visualize). Image
    by author.
  prefs: []
  type: TYPE_NORMAL
- en: To summarize, the key strengths of GraphSAGE are its scalability (sampling makes
    it efficient for massive graphs); flexibility, you can use it for inductive learning
    (works well when used for predicting on unseen nodes and graphs); aggregation
    helps with generalization because it smooths out noisy features; and the multi-layers
    allow the model to learn from far-away nodes.
  prefs: []
  type: TYPE_NORMAL
- en: Cool! And the best thing, GraphSAGE is implemented in [PyG](https://pyg.org/),
    so we can use it easily in PyTorch.
  prefs: []
  type: TYPE_NORMAL
- en: Predicting with GraphSAGE
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the previous posts, we implemented an MLP, GCN, and GAT on the [Cora](https://paperswithcode.com/dataset/cora) dataset
    (CC BY-SA). To refresh your mind a bit, Cora is a dataset with scientific publications
    where you have to predict the subject of each paper, with seven classes in total.
    This dataset is relatively small, so it might be not the best set for testing
    GraphSAGE. We will do this anyway, just to be able to compare. Let’s see how well
    GraphSAGE performs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Interesting parts of the code I like to highlight related to GraphSAGE:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The `NeighborLoader` that performs selecting the neighbors for each layer:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The aggregation type is implemented in the `SAGEConv` layer. The default is `mean`,
    you can change this to `max` or `lstm`:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Another important difference is that GraphSAGE is trained in mini batches, and
    GCN and GAT on the full dataset. This touches the essence of GraphSAGE, because
    the neighbor sampling of GraphSAGE makes it possible to train in mini batches,
    we don’t need the full graph anymore. GCNs and GATs do need the complete graph
    for correct feature propagation and calculation of attention scores, so that’s
    why we train GCNs and GATs on the full graph.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The rest of the code is similar as before, except that we have one class where
    all different models are instantiated based on the `model_type` (GCN, GAT, or
    SAGE). This makes it easy to compare or make small changes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This is the complete script, we train 100 epochs and repeat the experiment
    10 times to calculate average accuracy and standard deviation for each model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'And here are the results:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Impressive improvement! Even on this small dataset, GraphSAGE outperforms GAT
    and GCN easily! I repeated this test for CiteSeer and PubMed datasets, and always
    GraphSAGE came out best.
  prefs: []
  type: TYPE_NORMAL
- en: What I like to note here is that GCN is still very useful, it’s one of the most
    effective baselines (if the graph structure allows it). Also, I didn’t do much
    hyperparameter tuning, but just went with some standard values (like 8 heads for
    the GAT multi-head attention). In larger, more complex and noisier graphs, the
    advantages of GraphSAGE become more clear than in this example. We didn’t do any
    performance testing, because for these small graphs GraphSAGE isn’t faster than
    GCN.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GraphSAGE brings us very nice improvements and benefits compared to GATs and
    GCNs. Inductive learning is possible, GraphSAGE can handle changing graph structures
    quite well. And we didn’t test it in this post, but neighbor sampling makes it
    possible to create feature representations for larger graphs with good performance.
  prefs: []
  type: TYPE_NORMAL
- en: Related
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
