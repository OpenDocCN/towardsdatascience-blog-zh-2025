- en: 'Terminology & Useful Background:'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Below are some terms/concepts that may be useful to know before reading the
    rest of this article.
  prefs: []
  type: TYPE_NORMAL
- en: '[Distributed computing fundamentals](https://en.wikipedia.org/wiki/Distributed_computing)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Map & reduce operations](https://web.mit.edu/6.005/www/fa15/classes/25-map-filter-reduce/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Key-Value data representation](https://en.wikipedia.org/wiki/Name%E2%80%93value_pair)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Map data structure](https://en.wikipedia.org/wiki/Associative_array)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What is MapReduce?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Introduced by a couple of developers at Google in the early 2000s, MapReduce
    is a programming model that enables large-scale data processing to be carried
    out in a parallel and distributed manner across a [compute cluster](https://en.wikipedia.org/wiki/Computer_cluster)
    consisting of many [commodity machines](https://www.techtarget.com/whatis/definition/commodity-hardware#:~:text=Commodity%20hardware%20in%20computing%20is,all%20PCs%20use%20commodity%20hardware.).
  prefs: []
  type: TYPE_NORMAL
- en: The MapReduce programming model is ideal for optimizing compute tasks that can
    be broken down into independent transformations on distinct partitions of the
    input data. These transformations are typically followed by [grouped aggregation](https://pandas.pydata.org/docs/user_guide/groupby.html).
  prefs: []
  type: TYPE_NORMAL
- en: 'The programming model breaks up the computation into the following two primitives:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Map**: given a partition of the input data to process, parse the input data
    for each of its individual records. For each record, apply some user-defined data
    transformation to extract a set of intermediate key-value pairs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reduce**: for each distinct key in the set of intermediate key-value pairs,
    aggregate the values in some manner to produce a smaller set of key-value pairs.
    Typically, the output of the reduce phase is a single key-value pair for each
    distinct key.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this MapReduce framework, computation is distributed among a compute cluster
    of *N* machines with homogenous commodity hardware, where *N* may be in the hundreds
    or thousands, in practice. One of these machines is designated as the **master**,
    and all the other machines are designated as **workers**.
  prefs: []
  type: TYPE_NORMAL
- en: '**Master**: handles task scheduling by assigning map and reduce tasks to available
    workers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Worker**: handle the map and reduce tasks it’s assigned by the master.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/39f7c5b6263987abbae326210068c269.png)'
  prefs: []
  type: TYPE_IMG
- en: MapReduce cluster setup. Solid arrows symbolize a [fork()](https://en.wikipedia.org/wiki/Fork_(system_call)#),
    and the dashed arrows symbolize task assignment.
  prefs: []
  type: TYPE_NORMAL
- en: Each of the tasks within the map or reduce phase may be executed in a parallel
    and distributed manner across the available workers in the compute cluster. However,
    the map and reduce phases are executed *sequentially* — that is, all map tasks
    must complete before kicking off the reduce phase.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c9adc58965a2fc1ed2a76a5b9ef69031.png)'
  prefs: []
  type: TYPE_IMG
- en: Rough dataflow of the execution process for a single MapReduce job.
  prefs: []
  type: TYPE_NORMAL
- en: That all probably sounds pretty abstract, so let’s go through some motivation
    and a concrete example of how the MapReduce framework can be applied to optimize
    common data processing tasks.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Motivation & Simple Example
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The MapReduce programming model is typically best for large [batch processing](https://aws.amazon.com/what-is/batch-processing/#:~:text=Batch%20processing%20is%20the%20method,run%20on%20individual%20data%20transactions.) tasks
    that require executing independent data transformations on distinct groups of
    the input data, where each group is typically identified by a unique value of
    a keyed attribute.
  prefs: []
  type: TYPE_NORMAL
- en: You can think of this framework as an extension to the [split-apply-combine](https://www.jstatsoft.org/article/view/v040i01) pattern
    in the context of data analysis, where map encapsulates the split-apply logic
    and reduce corresponds with the combine. The critical difference is that MapReduce
    can be applied to achieve parallel and distributed implementations for generic
    computational tasks outside of data wrangling and statistical computing.
  prefs: []
  type: TYPE_NORMAL
- en: One of the motivating data processing tasks that inspired Google to create the
    MapReduce framework was to build [indexes](https://www.cockroachlabs.com/blog/inverted-indexes/) for
    its search engine.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can express this task as a MapReduce job using the following logic:'
  prefs: []
  type: TYPE_NORMAL
- en: Divide the corpus to search through into separate partitions/documents.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Define a **map()** function to apply to each document of the corpus, which will
    emit <word, documentID> pairs for every word that is parsed in the partition.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For each distinct key in the set of intermediate <word, documentID> pairs produced
    by the mappers, apply a user-defined **reduce() **function that will combine the
    document IDs associated with each word to produce <word, list(documentIDs)> pairs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/bc5c5d11207a05b07010b5085ef22144.png)'
  prefs: []
  type: TYPE_IMG
- en: MapReduce workflow for constructing an inverted index.
  prefs: []
  type: TYPE_NORMAL
- en: For additional examples of data processing tasks that fit well with the MapReduce
    framework, check out [the original paper](https://research.google/pubs/mapreduce-simplified-data-processing-on-large-clusters/).
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: MapReduce Walkthrough
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are numerous other great resources that walkthrough how the MapReduce
    algorithm works. However, I don’t feel that this article would be complete without
    one. Of course, refer to the [original paper](https://research.google/pubs/mapreduce-simplified-data-processing-on-large-clusters/) for
    the “source of truth” of how the algorithm works.
  prefs: []
  type: TYPE_NORMAL
- en: First, some basic configuration is required to prepare for execution of a MapReduce
    job.
  prefs: []
  type: TYPE_NORMAL
- en: Implement **map()** and **reduce()** to handle the data transformation and aggregation
    logic specific to the computational task.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Configure the block size of the input partition passed to each map task. The
    MapReduce library will then establish the number of map tasks accordingly, *M*,
    that will be created and executed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Configure the number of reduce tasks, *R*, that will be executed. Additionally,
    the user may specify a deterministic partitioning function to specify how key-value
    pairs are assigned to partitions. In practice, this partitioning function is typically
    a [hash](https://en.wikipedia.org/wiki/Hash_function#:~:text=A%20hash%20function%20is%20any,%29%20digests%2C%20or%20simply%20hashes.) of
    the key (i.e. hash(key) mod *R*).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Typically, it’s desirable to have [fine task granularity](https://en.wikipedia.org/wiki/Granularity_%28parallel_computing%29#Fine-grained_parallelism).
    In other words, *M* and *R* should be much larger than the number of machines
    in the compute cluster. Since the master node in a MapReduce cluster assigns tasks
    to workers based on availability, partitioning the processing workload into many
    tasks decreases the chances that any single worker node will be overloaded.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/badaf04dd4008524160022afd1620537.png)'
  prefs: []
  type: TYPE_IMG
- en: MapReduce Job Execution (M = 6, R = 2).
  prefs: []
  type: TYPE_NORMAL
- en: 'Once the required configuration steps are completed, the MapReduce job can
    be executed. The execution process of a MapReduce job can be broken down into
    the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Partition the input data into *M* partitions, where each partition is associated
    with a map worker.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each map worker applies the user-defined **map()** function to its partition
    of the data. The execution of each of these **map()** functions on each map worker
    may be carried out in parallel. The **map()** function will parse the input records
    from its data partition and extract all key-value pairs from each input record.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The map worker will sort these key-value pairs in increasing key order. Optionally,
    if there are multiple key-value pairs for a single key, the values for the key
    may be [combined](https://data-flair.training/blogs/hadoop-combiner-tutorial/) into
    a single key-value pair, if desired.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These key-value pairs are then written to *R* separate files stored on the local
    disk of the worker. Each file corresponds to a single reduce task. The locations
    of these files are registered with the master.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When all the map tasks have finished, the master notifies the reducer workers
    the locations of the intermediate files associated with the reduce task.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each reduce task uses [remote procedure calls](https://en.wikipedia.org/wiki/Remote_procedure_call) to
    read the intermediate files associated with the task stored on the local disks
    of the mapper workers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The reduce task then iterates over each of the keys in the intermediate output,
    and then applies the user-defined **reduce()** function to each distinct key in
    the intermediate output, along with its associated set of values.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once all the reduce workers have completed, the master worker notifies the user
    program that the MapReduce job is complete. The output of the MapReduce job will
    be available in the *R* output files stored in the distributed file system. The
    users may access these files directly, or pass them as input files to another
    MapReduce job for further processing.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Expressing a MapReduce Job in Code
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now let’s look at how we can use the MapReduce framework to optimize a common
    data engineering workload— cleaning/standardizing large amounts of raw data, or
    the transform stage of a typical [ETL workflow](https://www.bigdataframework.org/knowledge/etl-in-data-engineering/#:~:text=in%20Data%20Engineering-,Introduction%20to%20ETL,Adding%20additional%20data%20or%20context.).
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose that we are in charge of managing data related to a user registration
    system. Our data schema may contain the following information:'
  prefs: []
  type: TYPE_NORMAL
- en: Name of user
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Date they joined
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: State of residence
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Email address
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A sample dump of raw data may look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Before making this data accessible for analysis, we probably want to transform
    the data to a clean, standard format.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll want to fix the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Names and states have inconsistent case.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dates vary in format.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Some fields contain redundant whitespace.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'There are duplicate entries for certain users (ex: John Doe, Bob Stone).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We may want the final output to look like this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The data transformations we want to carry out are straightforward, and we could
    write a simple program that parses the raw data and applies the desired transformation
    steps to each individual line in a serial manner. However, if we’re dealing with
    millions or billions of records, this approach may be quite time consuming.
  prefs: []
  type: TYPE_NORMAL
- en: Instead, we can use the MapReduce model to apply our data transformations to
    distinct partitions of the raw data, and then “aggregate” these transformed outputs
    by discarding any duplicate entries that appear in the intermediate result.
  prefs: []
  type: TYPE_NORMAL
- en: There are many libraries/frameworks available for expressing programs as MapReduce
    jobs. For our example, we’ll use the [mrjob](https://mrjob.readthedocs.io/en/latest/) library
    to express our data transformation program as a MapReduce job in python.
  prefs: []
  type: TYPE_NORMAL
- en: mrjob simplifies the process of writing MapReduce as the developer simply needs
    to provide implementations for the mapper and reducer logic in a single python
    class. Although it’s no longer under active development and may not achieve the
    same level of performance as other options that allow deployment of jobs on Hadoop
    (as its a python wrapper around the Hadoop API), it’s a great way for anybody
    familiar with python to start learning how to write MapReduce jobs and recognizing
    how to break up computation into map and reduce tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Using mrjob, we can write a simple MapReduce job by subclassing the MRJob class
    and overriding the **mapper()** and **reducer()** methods.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our **mapper()** will contain the data transformation/cleaning logic we want
    to apply to each record of input:'
  prefs: []
  type: TYPE_NORMAL
- en: Standardize names and states to lowercase and uppercase, respectively.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Standardize dates to %Y-%m-%d format.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Strip unnecessary whitespace around fields.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After applying these data transformations to each record, it’s possible that
    we may end up with duplicate entries for some users. Our **reducer()** implementation
    will eliminate such duplicate entries that appear.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: This is just one example of a simple data transformation task that can be expressed
    using the mrjob framework. For more complex data-processing tasks that cannot
    be expressed with a single MapReduce job, [mrjob supports this](https://mrjob.readthedocs.io/en/latest/guides/quickstart.html#writing-your-second-job) by
    allowing developers to write multiple **mapper()** and **producer()** methods,
    and define a pipeline of mapper/producer steps that result in the desired output.
  prefs: []
  type: TYPE_NORMAL
- en: By default, mrjob executes your job in a single process, as this allows for
    friendly development, testing, and debugging. Of course, mrjob supports the execution
    of MapReduce jobs on various platforms (Hadoop, Google Dataproc, Amazon EMR).
    It’s good to be aware that the overhead of initial cluster setup can be fairly
    significant (~5+ min, depending on the platform and various factors), but when
    executing MapReduce jobs on truly large datasets (10+ GB), job deployment on one
    of these platforms would save significant amounts of time as the initial setup
    overhead would be fairly small relative to the execution time on a single machine.
  prefs: []
  type: TYPE_NORMAL
- en: Check out the [mrjob documentation](https://mrjob.readthedocs.io/en/latest/) if
    you want to explore its capabilities further 🙂
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'MapReduce: Contributions & Current State'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'MapReduce was a significant contribution to the development of scalable, data-intensive
    applications primarily for the following two reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: The authors recognized that primitive operations originating from functional
    programming, [map and reduce](https://www.cs.cornell.edu/courses/cs3110/2014sp/lectures/5/map-fold-map-reduce.html),
    can be pipelined together to accomplish many big data tasks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It abstracted away the [difficulties](https://aws.amazon.com/builders-library/challenges-with-distributed-systems/) that
    come with executing those operations on a distributed system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MapReduce was not significant because it introduced new primitive concepts.
    Rather, MapReduce was so influential because it encapsulated these map and reduce
    primitives into a single library, which automatically handled challenges that
    come from managing distributed systems, such as [task scheduling](https://en.wikipedia.org/wiki/Scheduling_%28computing%29) and [fault
    tolerance](https://en.wikipedia.org/wiki/Fault_tolerance). These abstractions
    allowed developers with little distributed programming experience to write parallel
    programs efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: 'There were [opponents from the database community](https://www.cs.utexas.edu/~rossbach/cs380p/papers/dewitt08blog-mapreduce-backwards.pdf) who
    were skeptical about the novelty of the MapReduce framework — prior to MapReduce,
    there was existing research on [parallel database systems](https://dl.acm.org/doi/10.1145/129888.129894) investigating
    how to enable parallel and distributed execution of analytical SQL queries. However,
    MapReduce is typically integrated with a [distributed file system](https://research.google.com/archive/gfs.html) with
    no requirements to impose a schema on the data, and it provides developers the
    freedom to implement custom data processing logic (ex: machine learning workloads,
    image processing, network analysis) in **map()** and **reduce()** that may be
    impossible to express through SQL queries alone. These characteristics enable
    MapReduce to orchestrate parallel and distributed execution of general purpose
    programs, instead of being limited to declarative SQL queries.'
  prefs: []
  type: TYPE_NORMAL
- en: All that being said, the MapReduce framework is no longer the go-to model for
    most modern large-scale data processing tasks.
  prefs: []
  type: TYPE_NORMAL
- en: It has been criticized for its somewhat [restrictive nature](https://www.the-paper-trail.org/post/2014-06-25-the-elephant-was-a-trojan-horse-on-the-death-of-map-reduce-at-google/) of
    requiring computations to be translated into map and reduce phases, and requiring
    intermediate data to be materialized before transmitting it between mappers and
    reducers. Materializing intermediate results may result in I/O bottlenecks, as
    all mappers must complete their processing before the reduce phase starts. Additionally,
    complex data processing tasks may require many MapReduce jobs to be chained together
    and executed sequentially.
  prefs: []
  type: TYPE_NORMAL
- en: Modern frameworks, such as Apache Spark, have extended upon the original MapReduce
    design by opting for a more flexible [DAG execution model](https://blog.devgenius.io/mastering-spark-dags-the-ultimate-guide-to-understanding-execution-ce6683ae785b).
    This DAG execution model allows the entire sequence of transformations to be optimized,
    so that dependencies between stages can be recognized and exploited to execute
    data transformations in memory and pipeline intermediate results, when appropriate.
  prefs: []
  type: TYPE_NORMAL
- en: However, MapReduce has had a significant influence on modern data processing
    frameworks (Apache Spark, Flink, Google Cloud Dataflow) due to fundamental distributed
    programming concepts that it introduced, such as [locality-aware scheduling](https://arxiv.org/pdf/cs/0403019),
    fault tolerance by re-execution, and scalability.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Wrap Up
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you made it this far, thanks for reading! There was a lot of content here,
    so let’s quickly flesh out what we discussed.
  prefs: []
  type: TYPE_NORMAL
- en: MapReduce is a programming model used to orchestrate the parallel and distributed
    execution of programs across a large compute cluster of commodity hardware. Developers
    can write parallel programs using the MapReduce framework by simply defining the
    mapper and reducer logic specific for their task.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tasks that consist of applying transformations on independent partitions of
    the data followed by grouped aggregation are ideal fits to be optimized by MapReduce.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We walked through how to express a common data engineering workload as a MapReduce
    task using the MRJob library.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MapReduce as it was originally designed is no longer used for modern big data
    tasks, but its core components have played a signifcant role in the design of
    modern distributed programming frameworks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If there are any important details about the MapReduce framework that are missing
    or deserve more attention here, I’d love to hear it in the comments. Additionally,
    I did my best to include all of the great resources that I read while writing
    this article, and I highly recommend checking them out if you’re interested in
    learning further!
  prefs: []
  type: TYPE_NORMAL
- en: '*The author has created all images in this article.*'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
