- en: <mdspan datatext="el1747427645692" class="mdspan-comment">Random</mdspan> Forest
    — A Powerful Tool for Anyone Working With Data
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '<mdspan datatext="el1747427645692" class="mdspan-comment">随机森林——数据工作者强大的工具</mdspan> '
- en: What is Random Forest?
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是随机森林？
- en: Have you ever wished you could make better decisions using data — like predicting
    the risk of diseases, crop yields, or spotting patterns in customer behavior?
    That’s where machine learning comes in and one of the most accessible and powerful
    tools in this field is something called Random Forest.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否曾希望利用数据做出更好的决策——比如预测疾病风险、作物产量或发现客户行为中的模式？这就是机器学习发挥作用的地方，而这个领域中最易于访问且强大的工具之一就是所谓的随机森林。
- en: So why is random forest so popular? For one, it’s incredibly flexible. It works
    well with many types of data whether numbers, categories, or both. It’s also widely
    used in many fields — from predicting patient outcomes in healthcare to detecting
    fraud in finance, from improving shopping experiences online to optimising agricultural
    practices.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 那么为什么随机森林如此受欢迎呢？一方面，它极其灵活。它适用于许多类型的数据，无论是数字、类别还是两者兼而有之。它还广泛应用于许多领域——从预测医疗保健中的患者结果到检测金融中的欺诈，从改善在线购物体验到优化农业实践。
- en: Despite the name, random forest has nothing to do with trees in a forest — but
    it does use something called *decision trees* to make smart predictions. You can
    think of a decision tree as a flowchart that guides a series of yes/no questions
    based on the data you give it. A random forest creates a whole bunch of these
    trees (hence the “forest”), each slightly different, and then combines their results
    to make one final decision. It’s a bit like asking a group of experts for their
    opinion and then going with the majority vote.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管名字叫随机森林，但它与森林中的树无关——但它确实使用了一种称为*决策树*的东西来进行智能预测。你可以把决策树想象成一个流程图，根据你给出的数据引导一系列是/否问题。随机森林创建了一大批这样的树（因此称为“森林”），每棵树略有不同，然后结合它们的结果来做出最终决定。这就像询问一群专家的意见，然后跟随多数人的投票一样。
- en: 'But until recently, one question was unanswered: How many decision trees do
    I actually need? If each decision tree can lead to different results, averaging
    many trees would lead to better and more reliable results. But how many are enough?
    Luckily, the optRF package answers this question!'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 但直到最近，一个问题仍未得到解答：我实际上需要多少个决策树？如果每个决策树都能导致不同的结果，平均许多树的结果将导致更好、更可靠的结果。但多少足够呢？幸运的是，optRF包回答了这个问题！
- en: So let’s have a look at how to optimise random forest for predictions and variable
    selection!
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们看看如何优化随机森林以进行预测和变量选择！
- en: Making Predictions with Random Forests
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用随机森林进行预测
- en: 'To optimise and to use random forest for making predictions, we can use the
    open-source statistics programme R. Once we open R, we have to install the two
    R packages “ranger” which allows to use random forests in R and “optRF” to optimise
    random forests. Both packages are open-source and available via the official R
    repository CRAN. In order to install and load these packages, the following lines
    of R code can be run:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为了优化和使用随机森林进行预测，我们可以使用开源统计程序R。一旦我们打开R，我们必须安装两个R包“ranger”，它允许在R中使用随机森林，以及“optRF”来优化随机森林。这两个包都是开源的，可通过官方R仓库CRAN获取。为了安装和加载这些包，可以运行以下R代码行：
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now that the packages are installed and loaded into the library, we can use
    the functions that these packages contain. Furthermore, we can also use the data
    set included in the optRF package which is free to use under the GPL license (just
    as the optRF package itself). This data set called SNPdata contains in the first
    column the yield of 250 wheat plants as well as 5000 genomic markers (so called
    single nucleotide polymorphisms or SNPs) that can contain either the value 0 or
    2.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 现在包已经安装并加载到库中，我们可以使用这些包包含的函数。此外，我们还可以使用optRF包中包含的数据集，该数据集在GPL许可证下免费使用（就像optRF包本身一样）。这个名为SNPdata的数据集在第一列包含250个小麦植物的产量以及5000个基因组标记（所谓的单核苷酸多态性或SNPs），这些标记可以包含值0或2。
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This data set is an example for genomic data and can be used for genomic prediction
    which is a very important tool for breeding high-yielding crops and, thus, to
    fight world hunger. The idea is to predict the yield of crops using genomic markers.
    And exactly for this purpose, random forest can be used! That means that a random
    forest model is used to describe the relationship between the yield and the genomic
    markers. Afterwards, we can predict the yield of wheat plants where we only have
    genomic markers.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这个数据集是基因组数据的示例，可用于基因组预测，这是培育高产作物的重要工具，因此有助于对抗世界饥饿。想法是使用基因组标记预测作物的产量。正是为了这个目的，可以使用随机森林！这意味着使用随机森林模型来描述产量和基因组标记之间的关系。之后，我们可以预测只有基因组标记的小麦植物的产量。
- en: 'Therefore, let’s imagine that we have 200 wheat plants where we know the yield
    and the genomic markers. This is the so-called training data set. Let’s further
    assume that we have 50 wheat plants where we know the genomic markers but not
    their yield. This is the so-called test data set. Thus, we separate the data frame
    SNPdata so that the first 200 rows are saved as training and the last 50 rows
    without their yield are saved as test data:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们假设我们有200个小麦植物，我们知道它们的产量和基因组标记。这就是所谓的训练数据集。让我们进一步假设我们有50个小麦植物，我们知道它们的基因组标记但不知道它们的产量。这就是所谓的测试数据集。因此，我们将数据框SNPdata分开，将前200行保存为训练数据，最后50行（没有产量）保存为测试数据：
- en: '[PRE2]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: With these data sets, we can now have a look at how to make predictions using
    random forests!
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些数据集，我们现在可以看看如何使用随机森林进行预测！
- en: 'First, we got to calculate the optimal number of trees for random forest. Since
    we want to make predictions, we use the function `opt_prediction` from the optRF
    package. Into this function we have to insert the response from the training data
    set (in this case the yield), the predictors from the training data set (in this
    case the genomic markers), and the predictors from the test data set. Before we
    run this function, we can use the set.seed function to ensure reproducibility
    even though this is not necessary (we will see later why reproducibility is an
    issue here):'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要计算随机森林的最优树数量。由于我们想要进行预测，我们使用optRF包中的`opt_prediction`函数。在这个函数中，我们必须插入来自训练数据集的响应（在这种情况下是产量），来自训练数据集的预测变量（在这种情况下是基因组标记），以及来自测试数据集的预测变量。在运行此函数之前，我们可以使用`set.seed`函数来确保可重复性，尽管这并非必要（我们稍后将看到为什么可重复性在这里是一个问题）：
- en: '[PRE3]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'All the results from the `opt_prediction` function are now saved in the object
    optRF_result, however, the most important information was already printed in the
    console: For this data set, we should use 19,000 trees.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 所有来自`opt_prediction`函数的结果现在都保存在对象optRF_result中，然而，最重要的信息已经打印在控制台上：对于这个数据集，我们应该使用19,000棵树。
- en: 'With this information, we can now use random forest to make predictions. Therefore,
    we use the ranger function to derive a random forest model that describes the
    relationship between the genomic markers and the yield in the training data set.
    Also here, we have to insert the response in the y argument and the predictors
    in the x argument. Furthermore, we can set the `write.forest` argument to be TRUE
    and we can insert the optimal number of trees in the `num.trees` argument:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些信息，我们现在可以使用随机森林进行预测。因此，我们使用ranger函数推导出描述训练数据集中基因组标记和产量之间关系的随机森林模型。同样在这里，我们必须在y参数中插入响应，在x参数中插入预测变量。此外，我们可以将`write.forest`参数设置为TRUE，并在`num.trees`参数中插入最优树的数量：
- en: '[PRE4]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'And that’s it! The object `RF_model` contains the random forest model that
    describes the relationship between the genomic markers and the yield. With this
    model, we can now predict the yield for the 50 plants in the test data set where
    we have the genomic markers but we don’t know the yield:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！对象`RF_model`包含了描述基因组标记与产量之间关系的随机森林模型。有了这个模型，我们现在可以预测测试数据集中50棵植物的产量，其中我们拥有基因组标记，但不知道产量：
- en: '[PRE5]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'The data frame predicted_Test now contains the IDs of the wheat plants together
    with their predicted yield:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 预测测试数据框predicted_Test现在包含了小麦植物的ID以及它们的预测产量：
- en: '[PRE6]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Variable Selection with Random Forests
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 随机森林的变量选择
- en: A different approach to analysing such a data set would be to find out which
    variables are most important to predict the response. In this case, the question
    would be which genomic markers are most important to predict the yield. Also this
    can be done with random forests!
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 分析此类数据集的另一种方法是通过找出哪些变量对预测响应最重要。在这种情况下，问题将是哪些基因组标记对预测产量最重要。这也可以用随机森林来完成！
- en: 'If we tackle such a task, we don’t need a training and a test data set. We
    can simply use the entire data set SNPdata and see which of the variables are
    the most important ones. But before we do that, we should again determine the
    optimal number of trees using the optRF package. Since we are insterested in calculating
    the variable importance, we use the function `opt_importance`:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们处理这样的任务，我们不需要训练和测试数据集。我们可以简单地使用整个数据集SNPdata，看看哪些变量是最重要的。但在我们这样做之前，我们应该再次使用optRF包确定最优的树的数量。由于我们感兴趣的是计算变量重要性，我们使用函数`opt_importance`：
- en: '[PRE7]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: One can see that the optimal number of trees is now higher than it was for predictions.
    This is actually often the case. However, with this number of trees, we can now
    use the ranger function to calculate the importance of the variables. Therefore,
    we use the ranger function as before but we change the number of trees in the
    num.trees argument to 40,000 and we set the importance argument to “permutation”
    (other options are “impurity” and “impurity_corrected”).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 可以看到，现在最优的树的数量比预测时更高。这实际上很常见。然而，有了这么多树，我们现在可以使用ranger函数来计算变量的重要性。因此，我们像以前一样使用ranger函数，但将num.trees参数中的树的数量更改为40,000，并将重要性参数设置为“permutation”（其他选项是“impurity”和“impurity_corrected”）。
- en: '[PRE8]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'The data frame D_VI now contains all the variables, thus, all the genomic markers,
    and next to it, their importance. Also, we have directly ordered this data frame
    so that the most important markers are on the top and the least important markers
    are at the bottom of this data frame. Which means that we can have a look at the
    most important variables using the head function:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 数据框D_VI现在包含了所有变量，因此，所有基因组标记，以及它们的重要性。此外，我们已直接对数据框进行排序，使得最重要的标记位于顶部，而最不重要的标记位于数据框的底部。这意味着我们可以使用head函数查看最重要的变量：
- en: '[PRE9]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: And that’s it! We have used random forest to make predictions and to estimate
    the most important variables in a data set. Furthermore, we have optimised random
    forest using the optRF package!
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！我们已经使用了随机森林来进行预测并估计数据集中最重要的变量。此外，我们还使用optRF包优化了随机森林！
- en: Why Do We Need Optimisation?
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么我们需要优化？
- en: Now that we’ve seen how easy it is to use random forest and how quickly it can
    be optimised, it’s time to take a closer look at what’s happening behind the scenes.
    Specifically, we’ll explore how random forest works and why the results might
    change from one run to another.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经看到使用随机森林是多么容易，以及它如何快速优化，现在是时候更深入地了解幕后发生的事情了。具体来说，我们将探索随机森林是如何工作的，以及为什么结果可能从一个运行到另一个运行发生变化。
- en: 'To do this, we’ll use random forest to calculate the importance of each genomic
    marker but instead of optimising the number of trees beforehand, we’ll stick with
    the default settings in the ranger function. By default, ranger uses 500 decision
    trees. Let’s try it out:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，我们将使用随机森林来计算每个基因组标记的重要性，但我们在ranger函数中不会事先优化树的数量，而是坚持使用默认设置。默认情况下，ranger使用500个决策树。让我们试试看：
- en: '[PRE10]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: As expected, everything runs smoothly — and quickly! In fact, this run was significantly
    faster than when we previously used 40,000 trees. But what happens if we run the
    exact same code again but this time with a different seed?
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，一切运行顺利——而且很快！实际上，这次运行比我们之前使用40,000棵树时快得多。但是，如果我们再次运行完全相同的代码，但这次使用不同的种子会发生什么呢？
- en: '[PRE11]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Once again, everything appears to work fine but take a closer look at the results.
    In the first run, SNP_0020 had the highest importance score at 80.23, but in the
    second run, SNP_0050 takes the top spot and SNP_0020 drops to the fourth place
    with a much lower importance score of 51.11\. That’s a significant shift! So what
    changed?
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，一切似乎都工作得很好，但仔细看看结果。在第一次运行中，SNP_0020具有最高的重要性分数80.23，但在第二次运行中，SNP_0050占据了首位，而SNP_0020则下降到第四位，重要性分数大幅降低至51.11。这是一个重大的变化！那么，发生了什么变化？
- en: 'The answer lies in something called *non-determinism*. Random forest, as the
    name suggests, involves a lot of randomness: it randomly selects data samples
    and subsets of variables at various points during training. This randomness helps
    prevent overfitting but it also means that results can vary slightly each time
    you run the algorithm — even with the exact same data set. That’s where the set.seed()
    function comes in. It acts like a bookmark in a shuffled deck of cards. By setting
    the same seed, you ensure that the random choices made by the algorithm follow
    the same sequence every time you run the code. But when you change the seed, you’re
    effectively changing the random path the algorithm follows. That’s why, in our
    example, the most important genomic markers came out differently in each run.
    This behavior — where the same process can yield different results due to internal
    randomness — is a classic example of non-determinism in machine learning.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 答案在于一种被称为*非确定性*的东西。正如其名所示，随机森林涉及大量的随机性：它在训练过程中的各个点随机选择数据样本和变量子集。这种随机性有助于防止过拟合，但也意味着每次运行算法时结果都可能略有不同——即使使用完全相同的数据集。这就是set.seed()函数发挥作用的地方。它就像一副洗好的牌中的一张书签。通过设置相同的种子，你确保算法每次运行代码时所做的随机选择都遵循相同的序列。但是，当你更改种子时，你实际上是在改变算法遵循的随机路径。这就是为什么在我们的例子中，最重要的基因组标记在每次运行中都会出现不同的原因。这种行为——由于内部随机性，相同的过程可以产生不同的结果——是机器学习中非确定性的经典例子。
- en: '![Illustration of the relationship between the stability and the number of
    trees in Random Forest](../Images/2b4af7e3a1e3a15084780640e00e6a6d.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![随机森林中稳定性和树木数量之间关系的插图](../Images/2b4af7e3a1e3a15084780640e00e6a6d.png)'
- en: Taming the Randomness in Random Forests
  id: totrans-49
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 驯服随机森林中的随机性
- en: As we just saw, random forest models can produce slightly different results
    every time you run them even when using the same data due to the algorithm’s built-in
    randomness. So, how can we reduce this randomness and make our results more stable?
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们刚才看到的，随机森林模型即使在使用相同数据的情况下，由于算法内置的随机性，每次运行时也可能产生略微不同的结果。那么，我们如何减少这种随机性，使我们的结果更加稳定呢？
- en: One of the simplest and most effective ways is to increase the number of trees.
    Each tree in a random forest is trained on a random subset of the data and variables,
    so the more trees we add, the better the model can “average out” the noise caused
    by individual trees. Think of it like asking 10 people for their opinion versus
    asking 1,000 — you’re more likely to get a reliable answer from the larger group.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一种最简单最有效的方法是增加树木的数量。随机森林中的每一棵树都是在数据集和变量的随机子集上训练的，因此我们添加的树木越多，模型就能更好地“平均”单个树木产生的噪声。想象一下，向10个人询问他们的意见与向1000个人询问相比——你更有可能从更大的群体中得到可靠的答案。
- en: With more trees, the model’s predictions and variable importance rankings tend
    to become more stable and reproducible even without setting a specific seed. In
    other words, adding more trees helps to tame the randomness. However, there’s
    a catch. More trees also mean more computation time. Training a random forest
    with 500 trees might take a few seconds but training one with 40,000 trees could
    take several minutes or more, depending on the size of your data set and your
    computer’s performance.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 随着树木数量的增加，模型的预测和变量重要性排名往往变得更加稳定和可重复，即使没有设置特定的种子。换句话说，增加树木数量有助于驯服随机性。然而，有一个陷阱。更多的树木也意味着更多的计算时间。用500棵树训练随机森林可能只需要几秒钟，但用40,000棵树训练可能需要几分钟或更长时间，具体取决于你的数据集大小和计算机的性能。
- en: 'However, the relationship between the stability and the computation time of
    random forest is *non-linear*. While going from 500 to 1,000 trees can significantly
    improve stability, going from 5,000 to 10,000 trees might only provide a tiny
    improvement in stability while doubling the computation time. At some point, you
    hit a plateau where adding more trees gives diminishing returns — you pay more
    in computation time but gain very little in stability. That’s why it’s essential
    to find the right balance: Enough trees to ensure stable results but not so many
    that your analysis becomes unnecessarily slow.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，随机森林的稳定性和计算时间之间的关系是非线性的。虽然从500棵树增加到1,000棵树可以显著提高稳定性，但从5,000棵树增加到10,000棵树可能只会带来微小的稳定性提升，同时计算时间加倍。在某个点上，你会遇到一个平台期，此时增加更多树只会带来递减的回报——你付出的计算时间更多，但稳定性提升却非常有限。这就是为什么找到正确的平衡至关重要：足够的树以确保稳定的结果，但不要太多以至于你的分析变得不必要地缓慢。
- en: 'And this is exactly what the optRF package does: it analyses the relationship
    between the stability and the number of trees in random forests and uses this
    relationship to determine the optimal number of trees that leads to stable results
    and beyond which adding more trees would unnecessarily increase the computation
    time.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是optRF包所做的事情：它分析随机森林中稳定性和树的数量之间的关系，并利用这种关系来确定导致稳定结果的最佳树数量，以及在此数量之上添加更多树将无谓地增加计算时间。
- en: 'Above, we have already used the opt_importance function and saved the results
    as optRF_result. This object contains the information about the optimal number
    of trees but it also contains information about the relationship between the stability
    and the number of trees. Using the plot_stability function, we can visualise this
    relationship. Therefore, we have to insert the name of the optRF object, which
    measure we are interested in (here, we are interested in the “importance”), the
    interval we want to visualise on the X axis, and if the recommended number of
    trees should be added:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，我们已经使用了opt_importance函数并将结果保存为optRF_result。此对象包含有关最佳树数量的信息，但也包含有关稳定性和树的数量之间关系的信息。使用plot_stability函数，我们可以可视化这种关系。因此，我们必须插入optRF对象的名称，我们感兴趣的度量（在这里，我们感兴趣的是“重要性”），我们希望在X轴上可视化的区间，以及是否应该添加推荐的树数量：
- en: '[PRE12]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![R graph that visualises the stability of random forest depending on the number
    of decision trees](../Images/a5a174c381a65766a048d6418e369fbc.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![R图可视化随机森林的稳定性与决策树数量的关系](../Images/a5a174c381a65766a048d6418e369fbc.png)'
- en: The output of the plot_stability function visualises the stability of random
    forest depending on the number of decision trees
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: plot_stability函数的输出可视化了随机森林的稳定性与决策树数量的关系
- en: This plot clearly shows the non-linear relationship between stability and the
    number of trees. With 500 trees, random forest only leads to a stability of around
    0.2 which explains why the results changed drastically when repeating random forest
    after setting a different seed. With the recommended 40,000 trees, however, the
    stability is near 1 (which indicates a perfect stability). Adding more than 40,000
    trees would get the stability further to 1 but this increase would be only very
    small while the computation time would further increase. That is why 40,000 trees
    indicate the optimal number of trees for this data set.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 此图清晰地显示了稳定性和树的数量之间的非线性关系。当有500棵树时，随机森林只能达到大约0.2的稳定性，这也解释了为什么在设置不同的种子后重复随机森林会导致结果发生剧烈变化。然而，当使用推荐的40,000棵树时，稳定性接近1（这表示完美的稳定性）。但是，当树的数量超过40,000时，稳定性将进一步增加到1，但这种增加将非常小，而计算时间将进一步增加。这就是为什么40,000棵树表示此数据集的最佳树数量。
- en: 'The Takeaway: Optimise Random Forest to Get the Most of It'
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 吸取教训：优化随机森林以充分利用其优势
- en: 'Random forest is a powerful ally for anyone working with data — whether you’re
    a researcher, analyst, student, or data scientist. It’s easy to use, remarkably
    flexible, and highly effective across a wide range of applications. But like any
    tool, using it well means understanding what’s happening under the hood. In this
    post, we’ve uncovered one of its hidden quirks: The randomness that makes it strong
    can also make it unstable if not carefully managed. Fortunately, with the optRF
    package, we can strike the perfect balance between stability and performance,
    ensuring we get reliable results without wasting computational resources. Whether
    you’re working in genomics, medicine, economics, agriculture, or any other data-rich
    field, mastering this balance will help you make smarter, more confident decisions
    based on your data.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 随机森林是任何与数据打交道的人的强大盟友——无论你是研究人员、分析师、学生还是数据科学家。它易于使用，非常灵活，并且在广泛的领域中都非常有效。但就像任何工具一样，使用得当意味着要理解其内部的工作原理。在这篇文章中，我们揭露了它隐藏的一个特性：使其强大的随机性，如果管理不当，也可能导致其不稳定。幸运的是，有了optRF包，我们可以在稳定性和性能之间找到完美的平衡，确保我们得到可靠的结果，同时不浪费计算资源。无论你是在基因组学、医学、经济学、农业还是任何其他数据丰富的领域工作，掌握这种平衡将帮助你基于你的数据做出更明智、更自信的决策。
