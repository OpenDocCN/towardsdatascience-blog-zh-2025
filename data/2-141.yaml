- en: 'How Metrics (and LLMs) Can Trick You: A Field Guide to Paradoxes'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 指标（以及LLMs）如何欺骗你：悖论指南
- en: 原文：[https://towardsdatascience.com/how-metrics-and-llms-can-trick-you-a-field-guide-to-paradoxes/](https://towardsdatascience.com/how-metrics-and-llms-can-trick-you-a-field-guide-to-paradoxes/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-metrics-and-llms-can-trick-you-a-field-guide-to-paradoxes/](https://towardsdatascience.com/how-metrics-and-llms-can-trick-you-a-field-guide-to-paradoxes/)
- en: Overview
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: <mdspan datatext="el1752601668525" class="mdspan-comment">Paradoxes aren’t</mdspan>
    just optical illusions or mind-bending puzzles. They can also be logical, causing
    initial observations to fall apart upon closer investigation. In data science,
    paradoxes arise when we take numbers at face value, without looking into the context
    behind them. One can have the sharpest visuals and still walk away with the wrong
    story.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752601668525" class="mdspan-comment">悖论不仅仅是视觉错觉或令人费解的谜题。</mdspan>它们也可以是逻辑上的，导致在更深入的观察中，最初的观察结果会崩溃。在数据科学中，当我们只看数字，而不去了解它们背后的背景时，就会出现悖论。即使有最锐利的视觉，也可能带着错误的故事离开。
- en: In this article, we discuss three logical paradoxes that serve as cautionary
    tales for anyone who interprets data too quickly, without applying context. We
    explore how paradoxes arise in Data Science & Business Intelligence (BI) use cases
    and then extend the insights to Retrieval-Augmented Generation (RAG) systems,
    where similar paradoxes can undermine the quality of both the prompt provided
    and the model’s output.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们讨论了三个逻辑悖论，这些悖论对于那些快速解读数据而不应用背景的人来说是警示性的。我们探讨了悖论如何在数据科学和商业智能（BI）用例中出现，然后将这些见解扩展到检索增强生成（RAG）系统，在这些系统中，类似的悖论可能会损害提供的提示和模型输出的质量。
- en: Simpson’s Paradox in Business Intelligence
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商业智能中的辛普森悖论
- en: Simpson’s paradox describes the scenario where trends reverse when data is aggregated.
    In other words, the trends that you observe in subgroups get flipped when you
    combine the numbers and analyze them. Let’s assume that we are analyzing the sales
    of four locations of a popular Ice cream chain. When the sales for each location
    are individually analyzed, it suggests that the chocolate flavor is the most preferred
    amongst customers. But when the sales are added up, the trend goes away, and the
    new combined results suggest that vanilla is preferred the most. This trend reversal
    is denoted by Simpson’s Paradox. We use the fictitious data below to demonstrate
    this.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 辛普森悖论描述了当数据聚合时趋势会逆转的情况。换句话说，当你合并数字并分析它们时，你在子组中观察到的趋势会被翻转。让我们假设我们正在分析一家流行冰淇淋连锁店的四个位置的销售额。当每个位置的销售额单独分析时，它表明巧克力口味是顾客最偏好的。但当销售额加总时，这种趋势消失了，新的合并结果表明香草最受欢迎。这种趋势逆转被称为辛普森悖论。我们使用以下虚构数据来演示这一点。
- en: '| **Location** | **Chocolate** | **Vanilla** | **Total Customers** | **Chocolate
    %** | **Vanilla %** | **Winner** |'
  id: totrans-7
  prefs: []
  type: TYPE_TB
  zh: '| **位置** | **巧克力** | **香草** | **总客户数** | **巧克力百分比** | **香草百分比** | **获胜者** |'
- en: '| Suburb A | 15 | 5 | 20 | 75.0% | 25.0% | Chocolate |'
  id: totrans-8
  prefs: []
  type: TYPE_TB
  zh: '| 郊区 A | 15 | 5 | 20 | 75.0% | 25.0% | 巧克力 |'
- en: '| City B | 33 | 27 | 60 | 55.0% | 45.0% | Chocolate |'
  id: totrans-9
  prefs: []
  type: TYPE_TB
  zh: '| 城市 B | 33 | 27 | 60 | 55.0% | 45.0% | 巧克力 |'
- en: '| Mall | 2080 | 1920 | 4000 | 52.0% | 48.0% | Chocolate |'
  id: totrans-10
  prefs: []
  type: TYPE_TB
  zh: '| 购物中心 | 2080 | 1920 | 4000 | 52.0% | 48.0% | 巧克力 |'
- en: '| Airport | 1440 | 2160 | 3600 | 40.0% | 60.0% | Vanilla |'
  id: totrans-11
  prefs: []
  type: TYPE_TB
  zh: '| 机场 | 1440 | 2160 | 3600 | 40.0% | 60.0% | 香草 |'
- en: '| **Total** | **3568** | **4112** | **7680** | **46.5%** | **53.5%** | **Vanilla**!
    |'
  id: totrans-12
  prefs: []
  type: TYPE_TB
  zh: '| **总计** | **3568** | **4112** | **7680** | **46.5%** | **53.5%** | **香草**！
    |'
- en: Sales by Store Location for a Fictitious Ice Cream Chain (By the Author)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 一家虚构冰淇淋连锁店的门店销售位置
- en: Below is a visual illustration.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个视觉说明。
- en: '![](../Images/c1d27c3e4afa09c08ee7a240c5e4c17d.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c1d27c3e4afa09c08ee7a240c5e4c17d.png)'
- en: Simpson’s Paradox in BI Reporting – Illustration (Image by the Author)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 商业智能报告中的辛普森悖论说明（图像由作者提供）
- en: 'A data analyst who overlooks these subgroup dynamics may assume that chocolate
    is underperforming. Hence, it is essential to aggregate numbers by subgroups and
    check for the presence of Simpson’s paradox. When a reversal in trend occurs,
    the lurking variable should be identified as the next step. A lurking variable
    is the hidden factor influencing group outcomes. In this case, the store location
    happens to be the lurking variable. A deep contextual understanding is needed
    to interpret why the sale of vanilla icecreams was high at the airport, flipping
    the overall outcome. Some questions that could be used to investigate are:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 忽视这些子群体动态的数据分析师可能会假设巧克力表现不佳。因此，按子群体汇总数据并检查辛普森悖论的存在是至关重要的。当趋势发生逆转时，应将隐藏变量识别为下一步。隐藏变量是影响群体结果隐藏的因素。在这种情况下，商店位置恰好是隐藏变量。需要深入理解上下文来解释为什么在机场香草冰淇淋的销量很高，从而翻转了整体结果。可以用来调查的问题包括：
- en: • Do airport outlets stock fewer chocolate options?
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: • 机场商店的巧克力选项是否较少？
- en: • Do travelers prefer milder flavors?
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: • 旅客是否更喜欢口味较淡的？
- en: • Was there a promotional campaign favoring Vanilla at stores in the airport?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: • 机场商店是否有促销活动偏向香草？
- en: Simpson’s Paradox in RAG Systems
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RAG系统中辛普森悖论
- en: Let’s suppose that you have an RAG (Retrieval-Augmented Generation) model that
    gauges public sentiment towards electric vehicles (EVs) and answers questions
    around the same. The model uses news articles from 2010 to 2024\. Until 2016,
    EVs were receiving mixed opinions due to their limited range, higher buying price,
    and lack of charging stations. All these factors made driving in EVs for long
    distances impossible. Newspaper reports before 2017 used to highlight such deficiencies.
    But as of 2017, EVs started being perceived in a good light due to improvements
    in performance and the availability of charging stations. This shift in perception
    happened particularly after the successful launch of Tesla’s premium EV. An RAG
    model that uses news reports from 2010 to 2024 would most probably give contradictory
    responses to similar questions, which will trigger the Simpson’s Paradox.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你有一个RAG（检索增强生成）模型，该模型衡量公众对电动汽车（EV）的看法，并回答相关问题。该模型使用2010年至2024年的新闻文章。直到2016年，由于续航里程有限、购买价格较高和缺乏充电站，电动汽车受到了混合的评价。所有这些因素使得在电动汽车中长途驾驶变得不可能。2017年之前的报纸报道经常强调这些不足之处。但截至2017年，由于性能的改进和充电站的可用性，电动汽车开始被看作是积极的。特斯拉高端电动汽车的成功推出特别促进了这种看法的转变。一个使用2010年至2024年新闻报告的RAG模型可能会对类似问题给出矛盾的回答，这将触发辛普森悖论。
- en: As an example, if the RAG is asked, “Is EV adoption in the US still low?”, the
    answer might be “Yes, adoption remains low due to high buying costs and limited
    infrastructure”. If the RAG is asked, “Has EV adoption increased recently in the
    U.S.?”, the answer would be ‘Yes, adoption has increased greatly due to advancements
    in technology and charging infrastructure’. In this case, the lurking variable
    is the publication date. A practical fix to this issue is to tag documents (articles)
    into time-based bins during the pre-processing phase. Other options include encouraging
    the users to specify a time range in their prompt (e.g. In the last five years,
    how has the adoption of EV been?) or fine-tuning the LLM to explicitly state the
    timeline that it is considering for its response (e.g., Around 2024, EV Adoption
    has increased greatly.).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果RAG被问及，“美国电动汽车（EV）的采用率是否仍然很低？”，答案可能是“是的，由于购买成本高和基础设施有限，采用率仍然很低”。如果RAG被问及，“美国电动汽车的采用率最近是否有所增加？”，答案将是“是的，由于技术和充电基础设施的进步，采用率大幅增加”。在这种情况下，隐藏变量是发布日期。解决这个问题的一个实际方法是，在预处理阶段将文档（文章）标记到基于时间的分类中。其他选项包括鼓励用户在他们的提示中指定时间范围（例如，在过去五年中，电动汽车的采用情况如何？）或者微调LLM以明确指出它考虑的响应时间线（例如，大约在2024年，电动汽车的采用率大幅增加）。
- en: '![](../Images/09b0cac5fb768c193d28d7ed90a0db73.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/09b0cac5fb768c193d28d7ed90a0db73.png)'
- en: Simpson’s Paradox in RAG Systems (Image by the Author)
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: RAG系统中辛普森悖论（图片由作者提供）
- en: Accuracy Paradox in Data Science Problems
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据科学问题中的准确性悖论
- en: The crux of the Accuracy Paradox is that high accuracy is not indicative of
    a useful output. Let’s assume that you are building a classification model to
    identify whether a patient has a rare disease that affects only 1 in 100\. The
    model correctly identifies and labels those who do not have the disease and thereby
    achieves a 99% accuracy. However, it fails to identify the one person who has
    the disease and needs urgent medical attention. Thereby, the model becomes useless
    for detecting the disease, which is its very purpose. This occurs especially in
    imbalanced datasets where the observations for one class are minimal. This has
    been illustrated in the figure below.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 准确性悖论的实质是高准确率并不代表有用的输出。假设你正在构建一个分类模型，用于识别是否有一个患者患有仅影响100人中的1人的罕见疾病。该模型正确地识别并标记了没有疾病的人，从而实现了99%的准确率。然而，它未能识别出那个患有疾病且需要紧急医疗关注的人。因此，该模型在检测疾病方面变得无用，而这正是它的目的。这种情况在观察数据极不平衡的数据集中尤为明显。这已在下面的图中得到说明。
- en: '![](../Images/c52f0bf3ebdc2385907d7abe1eafb09f.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c52f0bf3ebdc2385907d7abe1eafb09f.png)'
- en: Accuracy Paradox in Data Science Problems (Image by the Author)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学问题中的准确性悖论（作者图片）
- en: The best way to tackle the Accuracy paradox is to use metrics that capture the
    performance of the minority classes, such as Precision, Recall, and F1-score.
    Another approach to follow is to treat imbalanced datasets as anomaly detection
    problems, as against classification problems. One could also consider collecting
    more minority class data (if possible), over-sampling the minority class, or undersampling
    the majority class. Below is a quick guide that helps determine which metric to
    use depending on the use case, objective, and consequences of mistakes.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 解决准确性悖论的最佳方式是使用能够捕捉少数类性能的指标，如精确率、召回率和F1分数。另一种可行的方法是将不平衡数据集视为异常检测问题，而不是分类问题。还可以考虑收集更多少数类数据（如果可能的话），对少数类进行过采样，或对多数类进行欠采样。以下是一个快速指南，根据使用案例、目标和错误后果确定使用哪个指标。
- en: '![](../Images/6e57416fcdbb2e6e0819bcc93870aa66.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6e57416fcdbb2e6e0819bcc93870aa66.png)'
- en: Choosing the Right Metric for your Model’s Performance Measurement (Image by
    the Author)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为你的模型性能测量选择正确的指标（作者图片）
- en: Accuracy Paradox in LLMs
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMs中的准确性悖论
- en: While the Accuracy Paradox is a common issue that many data scientists tackle,
    its implications in LLMs are largely ignored. The Accuracy metric can dangerously
    overpromise in use cases that involve safety, toxicity detection, and bias mitigation.
    A high accuracy does not mean that a model is fair and safe to use. For example,
    an LLM model that has a 98% accuracy is of no use if it misclassifies 2 malicious
    prompts as being safe and harmless. Hence, in LLM evaluations, it is a good idea
    to use recall, precision, or PR-AUC over Accuracy, as they indicate how well the
    model tackles minority classes.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然准确性悖论是许多数据科学家面临的常见问题，但在LLMs中的影响却被很大程度上忽视了。在涉及安全、毒性检测和偏见缓解的使用案例中，准确性指标可能会危险地过度承诺。高准确率并不意味着模型是公平且安全使用的。例如，一个98%准确率的LLM模型，如果它错误地将2个恶意提示分类为安全无害，那么它就毫无用处。因此，在LLMs评估中，使用召回率、精确率或PR-AUC而不是准确率是一个好主意，因为它们表明模型如何处理少数类。
- en: Goodhart’s Law in Business Intelligence
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商业智能中的Goodhart定律
- en: Economist Charles Goodhart stated that *“When a measure becomes a target, it
    ceases to be a good measure.”* This law is a gentle reminder that if you over-optimize
    a metric without understanding the implications and context, the model will backfire.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 经济学家查尔斯·古德哈特指出：“当一项指标成为目标时，它就不再是一个好的指标。”这条定律是一个温和的提醒，如果你在不理解其影响和背景的情况下过度优化一个指标，模型可能会适得其反。
- en: A manager of a fictitious online news agency sets a KPI for his team. He asks
    the team to work towards increasing the session duration by 20%. The team extends
    introductions artificially and also adds filler content to increase the session
    duration. The session duration goes up, but the video quality is lost, and as
    a result, the value that users get from the video gets diminished.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 一个虚构的在线新闻机构的经理为他团队设定了一个KPI。他要求团队努力将会话时长增加20%。团队通过人工延长介绍和添加填充内容来增加会话时长。会话时长确实上升了，但视频质量却丧失了，结果用户从视频中获得的值减少了。
- en: Another example is related to Customer Churn. In an attempt to reduce customer
    churn, a subscription-based Entertainment app decides to place the ‘Unsubscribe’
    button in a hard-to-find location in its web portal. As a result, the customer
    churn reduces, but it’s not due to improved customer satisfaction. It’s solely
    because of limited exit options — an illusion of customer retention. Below is
    a visual illustration that demonstrates how efforts to meet or exceed growth targets
    (such as increasing session duration or user engagement) can often lead to unintended
    consequences, leading to a decline in user experience. When teams resort to artificial
    inflation tactics to help drive up performance metrics, the metric improvement
    looks good on paper, but they are not meaningful in any way.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个例子与客户流失相关。为了减少客户流失，一个基于订阅的娱乐应用决定将其“取消订阅”按钮放置在其网站门户的一个难以找到的位置。结果，客户流失减少了，但这并不是由于客户满意度的提高。这仅仅是因为有限的退出选项——一种客户保留的错觉。下面是一个视觉插图，展示了努力达到或超过增长目标（如增加会话时长或用户参与度）通常会导致意想不到的后果，导致用户体验下降。当团队诉诸于人为的通货膨胀策略来帮助提高性能指标时，指标改善在纸上看起来很好，但在任何意义上都没有意义。
- en: '![](../Images/3d127c62c6610d8608d22355722020e3.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3d127c62c6610d8608d22355722020e3.png)'
- en: Goodhart’s Law – Illustration (Image by the Author)
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 古德哈特定律 - 示例（图片由作者提供）
- en: Goodhart’s Law in LLMs
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM中的古德哈特定律
- en: When you train an LLM too much on a particular dataset (especially a benchmark),
    it can start memorizing patterns from that training data instead of learning to
    generalize. This is a classic example of overfitting, where the model performs
    extremely well on that training data but performs poorly on real-world inputs.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在特定数据集（尤其是基准数据集）上过度训练LLM时，它可能会开始记住训练数据中的模式，而不是学习泛化。这是一个经典的过拟合例子，其中模型在训练数据上表现极好，但在现实世界输入上表现不佳。
- en: Let’s assume that you are training an LLM to summarize news articles. You use
    the ROUGE (Recall-Oriented Understudy for Gisting Evaluation) metric to evaluate
    the LLM’s performance. The ROUGE metric rewards exact or near-exact matches of
    n-grams with the reference summaries. Over time, the LLM starts copying large
    phrases of text from the input articles in order to get an increased ROUGE score.
    It also uses buzzwords that appear a lot in reference summaries. Let’s assume
    that the input article has the text “The bank increased interest rates to curb
    inflation, and this caused stock prices to decline sharply.” The overfit model
    would summarize it as “The bank increased interest rates to curb inflation”, whereas
    a generalizing model would summarize it as “The interest rate hike triggered a
    decline in the stock markets”. The illustration below demonstrates how optimizing
    your model too much for an evaluation metric can result in low-quality responses
    (responses that are good on paper but are not helpful).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在训练一个用于总结新闻文章的LLM（大型语言模型）。你使用ROUGE（Recall-Oriented Understudy for Gisting
    Evaluation）指标来评估LLM的性能。ROUGE指标奖励与参考摘要中精确或近似精确匹配的n-gram。随着时间的推移，LLM开始从输入文章中复制大量文本短语，以获得更高的ROUGE分数。它还使用了参考摘要中经常出现的热门词汇。假设输入文章中的文本是“银行提高利率以抑制通货膨胀，这导致股价急剧下跌。”过拟合的模型会总结为“银行提高利率以抑制通货膨胀”，而一个泛化模型会总结为“利率上涨引发了股市的下跌”。下面的插图展示了过度优化模型以适应评估指标可能导致低质量响应（在纸上看起来很好，但在实际中无助于解决问题）的情况。
