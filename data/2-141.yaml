- en: Concluding Remarks
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论性评论
- en: Whether it is in business intelligence or LLMs, paradoxes can creep in if numbers
    and metrics are handled without the underlying nuance and context. Also, it is
    important to remember that over-fitting can damage the bigger picture. Combining
    quantitative analysis with human insight is crucial to avoid such pitfalls and
    create reliable reports and powerful LLMs that truly deliver value.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 不论是在商业智能还是LLM中，如果处理数字和指标时没有考虑到其背后的细微差别和上下文，悖论可能会出现。此外，重要的是要记住，过拟合可能会损害整体情况。将定量分析与人类洞察力相结合对于避免此类陷阱并创建可靠的报告和真正带来价值的强大LLM至关重要。
