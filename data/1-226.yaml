- en: 'Temporal-Difference Learning and the Importance of Exploration: An Illustrated
    Guide'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 时间差分学习与探索的重要性：图文指南
- en: 原文：[https://towardsdatascience.com/temporal-difference-learning-and-the-importance-of-exploration-an-illustrated-guide/](https://towardsdatascience.com/temporal-difference-learning-and-the-importance-of-exploration-an-illustrated-guide/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/temporal-difference-learning-and-the-importance-of-exploration-an-illustrated-guide/](https://towardsdatascience.com/temporal-difference-learning-and-the-importance-of-exploration-an-illustrated-guide/)
- en: <mdspan datatext="el1759308856428" class="mdspan-comment">Recently, **Reinforcement
    Learning** (RL) algorithms have received a lot of traction by solving research
    problems such as **protein folding**, reaching a superhuman level in **drone racing**,
    or even **integrating human feedback** in your favorite chatbots.</mdspan>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759308856428" class="mdspan-comment">最近，**强化学习**（RL）算法通过解决诸如**蛋白质折叠**、在**无人机竞速**中达到超人类水平，甚至**整合人类反馈**到您最喜欢的聊天机器人等研究问题而受到广泛关注。</mdspan>
- en: Indeed, RL provides useful solutions to a variety of sequential decision-making
    problems. **Temporal-Difference Learning** (TD learning) methods are a popular
    subset of RL algorithms. TD learning methods **combine **key aspects of **Monte
    Carlo** and **Dynamic Programming **methods to accelerate learning without requiring
    a perfect model of the environment dynamics.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，强化学习（RL）为各种序列决策问题提供了有用的解决方案。**时间差分学习**（TD学习）方法是强化学习算法中一个流行的子集。TD学习方法**结合**了**蒙特卡洛**和**动态规划**方法的关键方面，以加速学习，而不需要环境动力学的完美模型。
- en: In this article, we’ll compare different kinds of **TD algorithms** in a custom
    Grid World. The design of the experiment will outline the importance of **continuous
    exploration **as well as the **individual characteristics** of the tested algorithms: **Q-learning**, **Dyna-Q,** and **Dyna-Q**+.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将比较在自定义网格世界中不同类型的**TD算法**。实验的设计将概述**持续探索**的重要性以及测试算法的**个体特征**：**Q学习**、**Dyna-Q**和**Dyna-Q+**。
- en: 'The outline of this post contains:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本帖的概述包括：
- en: Description of the environment
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 环境描述
- en: Temporal-Difference (TD) Learning
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间差分（TD）学习
- en: Model-free TD methods (Q-learning) and model-based TD methods (Dyna-Q and Dyna-Q+)
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无模型TD方法（Q学习）和基于模型的TD方法（Dyna-Q和Dyna-Q+）
- en: Parameters
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参数
- en: Performance comparisons
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性能比较
- en: Conclusion
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结论
- en: '*The full code allowing the reproduction of the results and the plots is available
    here: *[https://github.com/RPegoud/Temporal-Difference-learning](https://github.com/RPegoud/Temporal-Difference-learning)'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*完整的代码，允许重现结果和图表，在此处可用：*[https://github.com/RPegoud/Temporal-Difference-learning](https://github.com/RPegoud/Temporal-Difference-learning)'
- en: The Environment
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 环境
- en: 'The environment we’ll use in this experiment is a grid world with the following
    features:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实验中，我们将使用以下特征的网格世界环境：
- en: The grid is 12 by 8 cells.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网格是12行8列。
- en: The **agent **starts in the bottom left corner of the grid, the **objective **is
    to reach the treasure located in the top right corner (a terminal state with reward
    1).
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理**从网格的左下角开始，**目标**是到达位于右上角的宝藏（一个奖励为1的终端状态）。'
- en: The **blue portals** are connected, going through the portal located on the
    cell **(10, 6)** **leads to** the cell **(11, 0)**. The agent cannot take the
    portal again after its first transition.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**蓝色传送门**是连接的，通过位于单元格（10, 6）的传送门进入，通向单元格（11, 0）。代理在第一次转换后不能再次使用传送门。'
- en: The **purple portal** only appears **after 100 episodes** but enables the agent
    to reach the treasure faster. This encourages continually exploring the environment.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**紫色传送门**仅在**100个回合**后出现，但使代理能够更快地到达宝藏。这鼓励持续探索环境。'
- en: The **red portals** are **traps **(terminal states with reward 0) and end the
    episode.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**红色传送门**是**陷阱**（奖励为0的终端状态），并结束游戏。'
- en: Bumping into a wall causes the agent to remain in the same state.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 撞到墙上会使代理保持在同一状态。
- en: '![](../Images/eafdf6f26c247c7b43bf68275fe02c35.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/eafdf6f26c247c7b43bf68275fe02c35.png)'
- en: Description of the different components of the Grid World (Made by the author)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 网格世界不同组件的描述（由作者制作）
- en: This experiment aims to compare the behaviour of Q-learning, Dyna-Q, and Dyna-Q+
    agents in a **changing environment**. Indeed, after **100 episodes**, the **optimal
    policy** is bound to change and the optimal number of steps during a successful
    episode will **decrease **from **17** to **12**.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这个实验旨在比较Q学习、Dyna-Q和Dyna-Q+代理在**变化环境**中的行为。事实上，在**100个回合**之后，**最优策略**必将改变，并且在成功回合中的最优步数将从**17步**减少到**12步**。
- en: '![](../Images/a0de734b510a6ed9a2bdb37717fd6719.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a0de734b510a6ed9a2bdb37717fd6719.png)'
- en: Representation of the grid world, optimal paths depend on the current episode
    (made by the author)
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 网格世界的表示，最优路径取决于当前回合（作者制作）
- en: 'Introduction to Temporal-Difference Learning:'
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 时间差分学习简介：
- en: 'Temporal-Difference Learning is a combination of **Monte Carlo** (MC) and **Dynamic
    Programming** (DP) methods:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 时间差分学习是**蒙特卡洛**（MC）和**动态规划**（DP）方法的结合：
- en: Like MC methods, TD methods can learn from experience **without requiring **a
    model of the **environment’s dynamics**.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与MC方法类似，TD方法可以在不需要**环境动态**模型的情况下从经验中学习。
- en: Like DP methods, TD methods **update estimates **after every step **based on
    other learned estimates** without waiting for the** outcome** (this is called *bootstrapping*).
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与DP方法类似，TD方法在每一步之后**基于其他学习估计**更新估计，而不需要等待**结果**（这被称为自举）。
- en: One particularity of TD methods is that they update their value estimate **every
    time step**, as opposed to MC methods that wait until the end of an episode.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: TD方法的一个特点是它们在**每一步**更新其价值估计，而MC方法则等待直到回合结束。
- en: 'Indeed, both methods have **different update targets**. MC methods aim to update
    the return **Gt**, which is only available at the end of an episode. Instead,
    TD methods target:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，这两种方法有不同的更新目标。MC方法旨在更新回报**Gt**，它只在回合结束时可用。相反，TD方法的目标是：
- en: '![](../Images/77ef7fbda828d79db03f8ca31a119638.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/77ef7fbda828d79db03f8ca31a119638.png)'
- en: Update target for TD methods
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: TD方法的更新目标
- en: Where **V** is an **estimate of the true value function Vπ**.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 其中**V**是**真实值函数Vπ**的估计。
- en: Therefore, TD methods **combine **the **sampling **of **MC **(by using an estimate
    of the true value) and the **bootstrapping **of **DP **(by updating V based on
    estimates relying on further estimates).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，TD方法**结合**了**蒙特卡洛**（MC）（通过使用真实值的估计）和**动态规划**（DP）的**自举**（通过根据进一步的估计更新V）。
- en: 'The simplest version of temporal-difference learning is called **TD(0)** or
    one-step TD, a practical implementation of TD(0) would look like this:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 时间差分学习最简单的版本称为**TD(0)**或一步TD，TD(0)的实际实现可能如下所示：
- en: '![](../Images/1574d5dad2772355c960abdfc03996f0.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1574d5dad2772355c960abdfc03996f0.png)'
- en: Pseudo-code for the TD(0) algorithm, reproduced from Reinforcement Learning,
    an introduction [4]
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: TD(0)算法的伪代码，摘自《强化学习：入门》[4]
- en: 'When transitioning from a state **S** to a new state **S’**, the TD(0) algorithm
    will compute a **backed-up value** and update **V(S)** accordingly. This backed-up
    value is called TD error, the difference between the observed reward **R** plus
    the discounted value of the new state **γV(St+1)** and the current value estimate **V(S)** :'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当从状态**S**转换到新状态**S'**时，TD(0)算法将计算一个**回传值**并相应地更新**V(S)**。这个回传值被称为TD误差，是观察到的奖励**R**加上新状态的折扣价值**γV(St+1)**与当前价值估计**V(S)**之间的差异：
- en: '![](../Images/57d1c4fca2095bc225d909b4f7f31b84.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/57d1c4fca2095bc225d909b4f7f31b84.png)'
- en: The TD error
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: TD误差
- en: 'In conclusion, TD methods present several advantages:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，TD方法具有以下优点：
- en: They do not require a perfect model of the environment’s dynamics *p*
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们不需要环境动态的完美模型**p**
- en: They are implemented in an online fashion, updating the target after each time
    step
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们以在线方式实现，在每一步之后更新目标
- en: TD(0) is guaranteed to converge for any fixed policy π if α (the *learning rate* or *step
    size*) follows stochastic approximation conditions (for more detail see page 55 *”Tracking
    a Nonstationary Problem”* of [[4]](http://incompleteideas.net/book/RLbook2020.pdf))
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TD(0)在α（学习率或步长）遵循随机逼近条件（更多细节见第55页“跟踪非平稳问题”[[4]](http://incompleteideas.net/book/RLbook2020.pdf)）的情况下，对于任何固定的策略π都有保证收敛。
- en: 'Implementation details:'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现细节：
- en: The following sections explore several TD algorithms’ main characteristics and
    performance son the grid world.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 以下章节将探讨几个TD算法的主要特性和在网格世界上的性能。
- en: 'The same parameters were used for all models, for the sake of simplicity:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简单起见，所有模型都使用了相同的参数：
- en: '**Epsilon (**ε) = 0.1: probability of selecting a random action in ε-greedy
    policies'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Epsilon**（ε）= 0.1：在ε-贪婪策略中选择随机动作的概率'
- en: '**Gamma (***γ)*= 0.9: discount factor applied to future rewards or value estimates'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Gamma**（γ）= 0.9：应用于未来奖励或价值估计的折扣因子'
- en: '**Aplha** (α) = 0.25: learning rate restricting the Q value updates'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Alpha**（α）= 0.25：限制Q值更新的学习率'
- en: '**Planning steps** = 100: for Dyna-Q and Dyna-Q+, the number of planning steps
    executed for each direct interaction'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**规划步骤** = 100：对于 Dyna-Q 和 Dyna-Q+，每个直接交互执行的规划步骤数量'
- en: '**Kappa (***κ***)**= 0.001: for Dyna-Q+, the weight of bonus rewards applied
    during planning steps'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Kappa (***κ***)** = 0.001：对于 Dyna-Q+，在规划步骤中应用的奖励加权的权重'
- en: The performances of each algorithm are first presented for a single run of 400
    episodes (sections: **Q-learning**, **Dyna-Q, **and **Dyna-Q+**) and then averaged
    over 100 runs of 250 episodes in the “**summary and algorithms comparison**” section.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 每个算法的性能首先在一个 400 个回合的单次运行中呈现（部分：**Q-learning**、**Dyna-Q** 和 **Dyna-Q+**），然后在“**总结和算法比较**”部分平均
    100 次运行 250 个回合。
- en: Q-learning
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Q-learning
- en: 'The first algorithm we implement here is the famous Q-learning (*Watkins*,
    1989):'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里实现的第一种算法是著名的 Q-learning（*Watkins*，1989）：
- en: '![](../Images/8fd018be87bae73c98a17c91a27d68eb.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8fd018be87bae73c98a17c91a27d68eb.png)'
- en: Q-learning is called an **off-policy** algorithm as its goal is to approximate
    the **optimal value function** directly, instead of the value function of *π*,
    the policy followed by the agent.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: Q-learning 被称为**离线策略**算法，因为它的目标是直接逼近**最优值函数**，而不是代理遵循的策略 *π* 的值函数。
- en: In practice, Q-learning still relies on a policy, often referred to as the ‘*behavior
    policy*’ to select which state-action pairs are visited and updated. However,
    Q-learning is off-policy becauseit updates its Q-values based on the **best estimate
    of future rewards**, regardless of whether the selected actions follow the current
    policy *π.*
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，Q-learning 仍然依赖于一个策略，通常被称为“*行为策略*”来选择哪些状态-动作对被访问和更新。然而，Q-learning 是离线策略，因为它根据**对未来奖励的最佳估计**来更新其
    Q 值，而不管选定的动作是否遵循当前策略 *π*。
- en: 'Compared to the previous TD learning pseudo-code, there are three main differences:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前的 TD 学习伪代码相比，有三个主要区别：
- en: We need to initialize the Q function for all states and actions and Q(terminal)
    should be 0
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们需要初始化所有状态和动作的 Q 函数，并且 Q(terminal) 应该为 0
- en: The actions are chosen from a policy based on the Q values (for instance the
    ϵ-greedy policy with respect to the Q values)
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 动作是从基于 Q 值的策略中选择（例如，根据 Q 值的 ϵ-greedy 策略）
- en: The update targets the action value function Q rather than the state value function
    V
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新目标是动作值函数 Q 而不是状态值函数 V
- en: '![](../Images/9ed49371c966b3be5b62f9fda65816f5.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9ed49371c966b3be5b62f9fda65816f5.png)'
- en: Pseudo-code for the Q-learning algorithm, reproduced from Reinforcement Learning,
    an introduction [4]
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: Q-learning 算法的伪代码，摘自《强化学习：入门》[4]
- en: Now that we have our first algorithm reading for testing, we can start the training
    phase. Our agent will navigate the Grid World using its **ε-greedy policy**, with
    respect to the Q values. This policy selects the action with the **highest Q-value** with
    a probability of **(1 – ε)** and chooses a** random action** with a probability
    of **ε**. After each action, the agent will **update **its Q-value estimates.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经准备好第一个算法进行测试，我们可以开始训练阶段。我们的代理将使用其**ε-greedy 策略**（根据 Q 值）在 Grid World 中导航。此策略以概率
    **(1 – ε)** 选择具有**最高 Q 值**的动作，并以概率 **ε** 选择一个**随机动作**。在每个动作之后，代理将**更新**其 Q 值估计。
- en: 'We can visualize the evolution of the estimated **maximum action-value** **Q(S,
    a)** of each cell of the Grid World using a heatmap. Here the agent plays 400
    episodes. As there is only one update per episode, the evolution of the Q values
    is quite slow and a large part of the states remain unmapped:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用热图可视化 Grid World 中每个单元格的估计**最大动作值** **Q(S, a)** 的演变。在这里，代理玩了 400 个回合。由于每个回合只有一个更新，Q
    值的演变相当缓慢，大部分状态保持未映射：
- en: '![](../Images/54022c1ba8413f8bb8fdcc4abefa2cad.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/54022c1ba8413f8bb8fdcc4abefa2cad.png)'
- en: Heatmap representation of the learned Q values of each state, during training
    (made by the author)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程中每个状态的 learned Q 值的热图表示（由作者制作）
- en: Upon completion of the 400 episodes, an analysis of the total visits to each
    cell provides us with a decent estimate of the agent’s average route. As depicted
    on the right-hand plot below, the agent seems to have converged to a **sub-optimal
    route**, **avoiding cell (4,4)** and consistently **following the lower wall**.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 完成 400 个回合后，对每个单元格的总访问次数的分析为我们提供了代理平均路径的合理估计。如图下方的右侧图所示，代理似乎收敛到一个**次优路径**，**避开单元格
    (4,4)** 并始终**沿着较低的墙壁**前进。
- en: '![](../Images/8c7c5b2ed1a493b981b070bbeca079ce.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8c7c5b2ed1a493b981b070bbeca079ce.png)'
- en: (left) Estimation of the maximal action value for each state, (right) Number
    of visits per state (made by the author)
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: （左）每个状态的极大动作值估计，（右）每个状态的访问次数（作者制作）
- en: As a result of this sub-optimal strategy, the agent reaches a minimum of **21
    steps per episode**, following the path outlined in the “number of total visits”
    plot. Variations in step counts can be attributed to the ε-greedy policy, which
    introduces a 10% probability of random actions. Given this policy, following the
    lower wall is a decent strategy to limit potential disruptions caused by random
    actions.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这种次优策略，智能体在每个事件中达到**21步**的最小值，遵循“总访问次数”图中的路径。步骤数的差异可以归因于ε-greedy策略，它引入了10%随机动作的概率。鉴于这一策略，跟随较低的墙壁是一个不错的策略，以限制随机动作可能造成的潜在干扰。
- en: '![](../Images/7ee5b5f9703ceb9945fc198fd840cb62.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7ee5b5f9703ceb9945fc198fd840cb62.png)'
- en: Number of steps for the last 100 episodes of training (300–400) (made by the
    author)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 训练最后100个事件（300-400）的步骤数（作者制作）
- en: In conclusion, the Q-learning agent converged to a **sub-optimal strategy** as
    mentioned previously. Moreover, a portion of the environment remains **unexplored** by
    the Q-function, which prevents the agent from finding the new optimal path when
    the purple portal appears after the 100th episode.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，正如之前提到的，Q学习智能体收敛到一个**次优策略**。此外，环境的一部分仍然由Q函数**未探索**，这阻止了智能体在100个事件之后紫色传送门出现时找到新的最优路径。
- en: These performance limitations can be attributed to the relatively **low number
    of training steps** (400), limiting the possibilities of interaction with the
    environment and the exploration induced by the ε-greedy policy.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这些性能限制可以归因于相对**低**的训练步骤数（400），限制了与环境的交互可能性以及ε-greedy策略引起的探索。
- en: '**Planning**, an essential component of **model-based **reinforcement learning
    methods is particularly useful to improve **sample efficiency** and **estimation
    of action values**. Dyna-Q and Dyna-Q+ are good examples of TD algorithms incorporating
    planning steps.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**规划**，作为**基于模型**的强化学习方法的一个基本组成部分，特别有用，可以提高**样本效率**和**动作值估计**。Dyna-Q和Dyna-Q+是结合规划步骤的TD算法的好例子。'
- en: Dyna-Q
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Dyna-Q
- en: The Dyna-Q algorithm (Dynamic Q-learning) is a combination of **model-based
    RL** and **TD learning**.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: Dyna-Q算法（动态Q学习）是**基于模型的强化学习**和**TD学习**的结合。
- en: Model-based RL algorithms rely on a** model of the environment** to incorporate
    planning as their **primary way of updating value estimates**. In contrast, model-free
    algorithms rely on direct learning.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 基于模型的强化学习算法依赖于**环境模型**来作为它们**更新价值估计**的主要规划方式。相比之下，无模型算法依赖于直接学习。
- en: '**”A model of the environment is anything that an agent can use to predict
    how the environment will respond to its actions” **— Reinforcement Learning: an
    introduction.'
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**“环境模型是智能体可以用来预测环境如何对其动作做出反应的任何东西”——强化学习：入门**。”'
- en: In the scope of this article, the model can be seen as an approximation of the
    transition dynamics *p(s’, r|s, a)*. Here, *p* returns a **single next-state and
    reward pair** given the current state-action pair.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文的范围内，模型可以被视为对转换动力学**p(s', r|s, a)**的近似。在这里，**p**在给定当前状态-动作对的情况下返回一个**单一的状态和奖励对**。
- en: In environments where *p* is **stochastic**, we distinguish distribution models
    and sample models, the former returns a distribution of the next states and actions
    while the latter returns a single pair, sampled from the estimated distribution.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在**p**是**随机**的环境中，我们区分分布模型和样本模型，前者返回下一个状态和动作的分布，而后者返回从估计分布中采样的单个对。
- en: Models are especially useful to simulate episodes, and therefore train the agent
    by replacing real-world interactions with planning steps, i.e. interactions with
    the simulated environment.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 模型在模拟事件方面特别有用，因此通过用规划步骤（即与模拟环境的交互）替换现实世界的交互来训练智能体。
- en: Agents implementing the Dyna-Q algorithm are part of the class of **planning
    agents**, agents that **combine direct reinforcement learning** and **model learning**.
    They use direct interactions with the environment to update their value function
    (as in Q-learning) and also to learn a model of the environment. After each direct
    interaction, they can also perform planning steps to update their value function
    using simulated interactions.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 实现Dyna-Q算法的代理属于**规划代理**这一类，这类代理**结合直接强化学习和模型学习**。他们使用与环境的直接交互来更新他们的价值函数（如Q-learning），并且学习环境的模型。在每次直接交互之后，他们还可以执行规划步骤，使用模拟交互来更新他们的价值函数。
- en: A quick Chess example
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一个快速的棋类例子
- en: Imagine playing a good game of chess. After playing each move, the reaction
    of your opponent allows you to assess the **quality of your move**. This is similar
    to receiving a positive or negative reward, which allows you to “update” your
    strategy. If your move leads to a blunder, you probably wouldn’t do it again,
    provided with the same configuration of the board. So far, this is comparable
    to **direct reinforcement learning**.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下玩一场好的棋局。在每走一步之后，对手的反应让你能够评估你的**走法的质量**。这类似于收到正面或负面的奖励，这让你能够“更新”你的策略。如果你的走法导致失误，你很可能不会再次这样做，前提是棋盘的配置相同。到目前为止，这相当于**直接强化学习**。
- en: Now let’s add **planning** to the mix. Imagine that after each of your moves,
    while the opponent is thinking, you mentally go back over each of your **previous
    moves** to **reassess their quality**. You might find weaknesses that you neglected
    at first sight or find out that specific moves were better than you thought. These
    thoughts may also allow you to update your strategy. This is exactly what planning
    is about, **updating the value function without interacting with the real environment** but
    rather **a model of said environment**.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们给混合中加入**规划**。想象一下，在你每走一步之后，当对手在思考时，你心理上会回顾你每一步的**前一步**来**重新评估其质量**。你可能会发现你最初忽视的弱点，或者发现某些走法比你想象的要好。这些想法也可能让你更新你的策略。这正是规划的意义所在，**不与真实环境交互，而是更新该环境的模型**的价值函数。
- en: '![](../Images/13cf00f8723def3f3035341c965d6832.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/13cf00f8723def3f3035341c965d6832.png)'
- en: 'Planning, acting, model learning, and direct RL: the schedule of a planning
    agent (made by the author)'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 规划、行动、模型学习、直接强化学习：规划代理的调度（由作者制作）
- en: 'Dyna-Q therefore contains some additional steps compared to Q-learning:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: Dyna-Q因此比Q-learning多了一些步骤：
- en: After each direct update of the Q values, the model stores the state-action
    pair and the reward and next-state that were observed. This step is called model
    training.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在每次直接更新Q值之后，模型会存储观察到的状态-动作对和奖励以及下一个状态。这一步被称为模型训练。
- en: 'After model training, Dyna-Q performs *n* planning steps:'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型训练后，Dyna-Q执行**n**个规划步骤：
- en: A random state-action pair is selected from the model buffer (i.e. this state-action
    pair was observed during direct interactions)
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从模型缓冲区中随机选择一个状态-动作对（即这个状态-动作对是在直接交互中观察到的）
- en: The model generates the simulated reward and next-state
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型生成模拟奖励和下一个状态
- en: The value function is updated using the simulated observations (*s, a, r, s’*)
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用模拟观察值（*s, a, r, s’*）更新值函数
- en: '![](../Images/0fe041c20612e59822c62bcb55ad60df.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0fe041c20612e59822c62bcb55ad60df.png)'
- en: Pseudo-code for the Dyna-Q algorithm, reproduced from Reinforcement Learning,
    an introduction [4]
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: Dyna-Q算法的伪代码，摘自《强化学习：入门》[4]
- en: We now replicate the learning process with the Dyna-Q algorithm using ***n*=100**.
    This means that after each direct interaction with the environment, we use the
    model to perform 100 planning steps (i.e. updates).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用**n*=100**的Dyna-Q算法复制学习过程。这意味着在每次与环境的直接交互之后，我们使用模型执行100个规划步骤（即更新）。
- en: The following heatmap shows the fast convergence of the Dyna-Q model. In fact,
    it only takes the algorithm around **10 episodes** to find an **optimal path**.
    This is due to the fact that every step leads to 101 updates of the Q values (instead
    of 1 for Q-learning).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的热力图显示了Dyna-Q模型的快速收敛。事实上，算法只需要大约**10个回合**就能找到**最优路径**。这是因为每一步都会导致101个Q值的更新（而Q-learning是1个更新）。
- en: '![](../Images/375cec7316b5f1dbe91aef82b63d4b24.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/375cec7316b5f1dbe91aef82b63d4b24.png)'
- en: Heatmap representation of the learned Q values of each state during training
    (made by the author)
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程中每个状态学习到的Q值的热力图表示（由作者制作）
- en: Another benefit of planning steps is a better estimation of action values across
    the grid. As the indirect updates target random transitions stored inside the
    model, states that are far away from the goal also get updated.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 规划步骤的另一个好处是更好地估计网格中的动作值。由于间接更新针对模型内部存储的随机转换，远离目标的状态也得到了更新。
- en: In contrast, the action values slowly propagate from the goal in Q-learning,
    leading to an incomplete mapping of the grid.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，Q-learning 中动作值从目标缓慢传播，导致网格映射不完整。
- en: '![](../Images/32ca35709dc2afb9d1318240860c5f48.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/32ca35709dc2afb9d1318240860c5f48.png)'
- en: (left) Estimation of the maximal action value for each state, (right) Number
    of visits per state (made by the author)
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: （左）每个状态的最大动作值估计，（右）每个状态访问次数（作者制作）
- en: Using Dyna-Q, we find an **optimal path** allowing the resolution of the grid
    world in **17 steps**, as depicted on the plot below by red bars. Optimal performances
    are attained regularly, despite the occasional interference of ε-greedy actions
    for the sake of exploration.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Dyna-Q，我们找到了一条**最优路径**，允许在**17 步**内解决网格世界问题，如下图中红色条形所示。尽管偶尔为了探索而采取 ε-greedy
    行动，但通常仍能获得最佳性能。
- en: Finally, while Dyna-Q may appear more convincing than Q-learning due to its
    incorporation of planning, it’s essential to remember that planning introduces
    a **tradeoff **between **computational costs** and **real-world exploration**.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，虽然 Dyna-Q 由于其包含规划而可能比 Q-learning 更有说服力，但必须记住，规划在**计算成本**和**现实世界探索**之间引入了一种**权衡**。
- en: '![](../Images/2dd6b03450c1f933dda93185707a08c3.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2dd6b03450c1f933dda93185707a08c3.png)'
- en: Number of steps for the last 100 episodes of training (300–400) (made by the
    author)
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 训练最后 100 个回合的步数（300–400）（作者制作）
- en: Dyna-Q+
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Dyna-Q+
- en: Up to now, neither of the tested algorithms managed to find the optimal path
    appearing after step 100 (the purple portal). Indeed, both algorithms rapidly
    converged to an optimal solution that **remained fixed until the end of the training
    phase**. This highlights the need for **continuous exploration** throughout training.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，测试过的算法都没有找到在 100 步之后出现的最优路径（紫色传送门）。事实上，两种算法都迅速收敛到一个在训练阶段结束前**保持固定**的最优解。这突出了在整个训练过程中进行**持续探索**的需要。
- en: Dyna-Q+ is largely similar to Dyna-Q but adds a small twist to the algorithm.
    Indeed, Dyna-Q+ constantly tracks the number of time steps elapsed since each
    state-action pair was tried in real interaction with the environment.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: Dyna-Q+ 与 Dyna-Q 大致相同，但在算法中增加了一个小的变化。实际上，Dyna-Q+ 不断跟踪每个状态-动作对自上次在真实环境中尝试以来经过的时间步数。
- en: In particular, consider a transition yielding a reward **r** that has not been
    tried in *τ* time steps. Dyna-Q+ would perform planning as if the reward for this
    transition was** *r* + *κ* √*τ***, with *κ* sufficiently small (0.001 in the experiment).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其考虑一个在 *τ* 个时间步内未尝试过的转换，其奖励为 *r*。Dyna-Q+ 会像这个转换的奖励是 **r** + *κ* √*τ*** 一样进行规划，其中
    *κ* 足够小（实验中为 0.001）。
- en: This change in reward design encourages the agent to continually explore the
    environment. It assumes that the longer a state-action pair hasn’t been tried,
    the greater the chances that the dynamics of this pair have changed or that the
    model is incorrect.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这种奖励设计的变化鼓励智能体不断探索环境。它假设一个状态-动作对越长时间未被尝试，这个对的动力变化或模型错误的可能性就越大。
- en: '![](../Images/38ec9004ff757ec3e98f3a4c57e3206f.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/38ec9004ff757ec3e98f3a4c57e3206f.png)'
- en: Pseudo-code for the Dyna-Q+ algorithm, reproduced from Reinforcement Learning,
    an introduction [4]
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: Dyna-Q+ 算法的伪代码，摘自《强化学习：入门》[4]
- en: As depicted by the following heatmap, Dyna-Q+ is much more active with its updates
    compared to the previous algorithms. Before episode 100, the agent explores the
    whole grid and finds the blue portal and the first optimal route.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 如下热力图所示，Dyna-Q+ 与之前算法相比，在更新方面更为活跃。在 100 个回合之前，智能体探索了整个网格，找到了蓝色传送门和第一条最优路径。
- en: The action values for the rest of the grid decrease before slowly increasing
    again, as states-action pairs in the top left corner are not explored for some
    time.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 网格中其余部分的动作值在下降后缓慢增加，因为一段时间内没有探索左上角的状态-动作对。
- en: As soon as the purple portal appears in episode 100, the agent finds the new
    shortcut and the value for the whole area rises. Until the completion of the 400
    episodes, the agent will continuously update the action value of each state-action
    pair while maintaining occasional exploration of the grid.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦在第100集出现紫色传送门，代理发现新的捷径，整个区域的价值也随之上升。直到完成400集，代理将不断更新每个状态-动作对的动作价值，同时保持对网格的偶尔探索。
- en: '![](../Images/70b8f7821b9e2fe100fec3dc00582853.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/70b8f7821b9e2fe100fec3dc00582853.png)'
- en: Heatmap representation of the learned Q values of each state, during training
    (made by the author)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 训练期间每个状态学习到的Q值的热图表示（由作者制作）
- en: Thanks to the bonus added to model rewards, we finally obtain a **complete mapping
    of the Q function** (each state or cell has an action value).
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 由于模型奖励中添加了奖励，我们最终得到了Q函数的**完整映射**（每个状态或单元格都有一个动作值）。
- en: Combined with continuous exploration, the agent manages to find the new best
    route (i.e. optimal policy) as it appears, while retaining the previous solution.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 结合持续探索，代理能够在新最佳路线（即最优策略）出现时找到它，同时保留之前的解决方案。
- en: '![](../Images/d5f2a7ddc81bc5bafe449216b88e436b.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d5f2a7ddc81bc5bafe449216b88e436b.png)'
- en: (left) Estimation of the maximal action value for each state, (right) Number
    of visits per state (made by the author)
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: (左) 每个状态的极大动作值的估计，(右) 每个状态访问次数（由作者制作）
- en: However, the exploration-exploitation trade-off in Dyna-Q+ indeed comes with
    a cost. When state-action pairs haven’t been visited for a sufficient duration,
    the exploration bonus encourages the agent to revisit those states, which can **temporarily
    decrease its immediate performance**. This exploration behavior prioritizes updating
    the model to improve long-term decision-making.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，Dyna-Q+中的探索-利用权衡确实伴随着成本。当状态-动作对未被访问足够长时间时，探索奖励会鼓励代理重新访问这些状态，这可能会**暂时降低其即时性能**。这种探索行为优先更新模型以改善长期决策。
- en: This explains why some episodes played by Dyna-Q+ can be up to 70 steps long,
    compared to at most 35 and 25 steps for Q-learning and Dyna-Q, respectively. The
    longer episodes in Dyna-Q+ reflect the agent’s willingness to invest extra steps
    in exploration to gather more information about the environment and refine its
    model, even if it results in short-term performance reductions.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这解释了为什么Dyna-Q+播放的一些集数可以长达70步，而Q-learning和Dyna-Q分别最多只能达到35步和25步。Dyna-Q+中较长的集数反映了代理愿意投入额外的步骤进行探索，以收集更多关于环境的信息并完善其模型，即使这会导致短期性能下降。
- en: In contrast, Dyna-Q+ regularly achieves optimal performance (depicted by green
    bars on the plot below) that previous algorithms did not attain.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，Dyna-Q+经常达到最优性能（如图下绿色条所示），这是以前算法未能达到的。
- en: '![](../Images/74904b35fc22ed30321324380dae1803.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74904b35fc22ed30321324380dae1803.png)'
- en: Number of steps for the last 100 episodes of training (300–400) (made by the
    author)
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 训练最后100集的步数（300-400）（由作者制作）
- en: Summary and Algorithms Comparison
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述和算法比较
- en: 'In order to compare the key differences between the algorithms, we use two
    metrics (keep in mind that the results depend on the input parameters, which were
    identical among all models for simplicity):'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 为了比较算法之间的关键差异，我们使用两个指标（请注意，结果取决于输入参数，为了简单起见，所有模型中的输入参数都是相同的）：
- en: '**Number of steps per episode**: this metric characterizes the rate of convergence
    of the algorithms towards an optimal solution. It also describes the behavior
    of the algorithm after convergence, particularly in terms of exploration.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每集步数**：这个指标描述了算法收敛到最优解的速度。它还描述了算法收敛后的行为，特别是在探索方面。'
- en: '**Average cumulative reward**: the percentage of episodes leading to a positive
    reward'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平均累积奖励**：导致正奖励的集数百分比'
- en: 'Analyzing the number of steps per episode (see plot below), reveals several
    aspects of model-based and model-free methods:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 分析每集步数（见下述图表），揭示了基于模型和无模型方法的几个方面：
- en: '**Model-Based Efficiency**: Model-based algorithms (Dyna-Q and Dyna-Q+) tend
    to be more sample-efficient in this particular Grid World (this property is also
    observed more generally in RL). This is because they can plan ahead using the
    learned model of the environment, which can lead to quicker convergence to near
    optimal or optimal solutions.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于模型的效率**：基于模型的算法（Dyna-Q和Dyna-Q+）在这个特定的网格世界中往往更有效率（这一特性在强化学习中也更为普遍）。这是因为它们可以使用学习到的环境模型进行预先规划，这可以导致更快地收敛到近似最优或最优解。'
- en: '**Q-Learning Convergence**: Q-learning, while eventually converging to a near
    optimal solution, requires more episodes (125) to do so. It’s important to highlight
    that Q-learning performs only 1 update per step, which contrasts with the multiple
    updates performed by Dyna-Q and Dyna-Q+.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Q-Learning Convergence**: Q-learning虽然最终收敛到接近最优解，但需要更多的剧集（125个）才能做到这一点。重要的是要强调，Q-learning每步只进行1次更新，这与Dyna-Q和Dyna-Q+进行的多次更新形成对比。'
- en: '**Multiple Updates**: Dyna-Q and Dyna-Q+ execute 101 updates per step, which
    contributes to their faster convergence. However the tradeoff for this sample-efficiency
    is computational cost (see the runtime section in the table below).'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多次更新**: Dyna-Q和Dyna-Q+每步执行101次更新，这有助于它们的快速收敛。然而，这种样本效率的权衡是计算成本（见下表中的运行时间部分）。'
- en: '**Complex Environments**: In more complex or stochastic environments, the advantage
    of model-based methods might diminish. Models can introduce errors or inaccuracies,
    which can lead to suboptimal policies. Therefore, this comparison should be seen
    as an outline of the strengths and weaknesses of different approaches rather than
    a direct performance comparison.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂环境**: 在更复杂或随机环境中，基于模型的方法的优势可能会减弱。模型可能会引入错误或不准确性，这可能导致次优策略。因此，这个比较应被视为不同方法优缺点的概述，而不是直接的性能比较。'
- en: '![](../Images/b227dd4870fd59ee3a673dc3e9cc787e.png)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b227dd4870fd59ee3a673dc3e9cc787e.png)'
- en: Comparison of the number of steps per episode averaged over 100 runs (made by
    the author)
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 每个剧集平均步骤数比较（由作者进行100次运行）
- en: 'We now introduce the average cumulative reward (ACR), which represents the
    percentage of episodes where the agent reaches the goal (as the reward is 1 for
    reaching the goal and 0 for triggering a trap), the ACR is then simply by:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在介绍平均累积奖励（ACR），它表示代理达到目标（因为达到目标时的奖励为1，触发陷阱时的奖励为0）的剧集百分比，ACR因此简单地通过以下方式计算：
- en: '![](../Images/754e0ff406830358d45635831469f7f5.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/754e0ff406830358d45635831469f7f5.png)'
- en: With *N* the number of episodes (250) and K the number of independent runs (100)
    and R*n,k* the cumulative reward for episode *n* in run *k*.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 其中N是剧集数（250），K是独立运行数（100），R*n,k*是运行*k*中第*n*个剧集的累积奖励。
- en: 'Here’s a breakdown of the performance of all algorithms:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是所有算法性能的分解：
- en: '**Dyna-Q** converges rapidly and achieves the highest overall return, with
    an ACR of 87%. This means that it efficiently learns and reaches the goal in a
    significant portion of episodes.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Dyna-Q**快速收敛并实现最高的整体回报，ACR达到87%。这意味着它有效地学习并在大量剧集中学到达到目标。'
- en: '**Q-learning** also reaches a similar level of performance but requires more
    episodes to converge, explaining its slightly lower ACR, at 70%.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Q-learning**也达到了相似的性能水平，但需要更多的剧集才能收敛，这解释了其略低的ACR，为70%。'
- en: '**Dyna-Q+** promptly finds a good policy, reaching a cumulative reward of 0.8
    after only 15 episodes. However, the variability and exploration induced by the
    bonus reward reduces performance until step 100\. After 100 steps, it starts to
    improve as it discovers the new optimal path. However, the short-term exploration
    compromises its performance, resulting in an ACR of 79%, which is lower than Dyna-Q
    but higher than Q-learning.'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Dyna-Q+**迅速找到一个好的策略，在仅经过15个剧集后达到累积奖励0.8。然而，由奖励带来的变异性探索直到第100步都降低了性能。100步之后，它开始改善，因为它发现了新的最优路径。然而，短期的探索牺牲了其性能，导致ACR为79%，低于Dyna-Q但高于Q-learning。'
- en: '![](../Images/d43dafc7fae34d6edf26b4aa2541af79.png)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d43dafc7fae34d6edf26b4aa2541af79.png)'
- en: Comparison of the cumulative reward per episode averaged over 100 runs (made
    by the author)
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 每个剧集累积奖励的平均比较（由作者进行100次运行）
- en: Conclusion
  id: totrans-153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we presented the fundamental principles of Temporal Difference
    learning and applied Q-learning, Dyna-Q, and Dyna-Q+ to a custom grid world. The
    design of this grid world helps emphasize the importance of continual exploration
    as a way to discover and exploit new optimal policies in changing environments.
    The difference in performances (evaluated using the number of steps per episode
    and the cumulative reward) illustrate the strengths and weaknesses of these algorithms.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们介绍了时序差分学习的基本原理，并将Q-learning、Dyna-Q和Dyna-Q+应用于自定义网格世界。这个网格世界的设计有助于强调持续探索作为发现和利用变化环境中新最优策略的重要性。通过每个剧集的步骤数和累积奖励来评估的性能差异，说明了这些算法的优缺点。
- en: In summary, model-based methods (Dyna-Q, Dyna-Q+) benefit from increased sample
    efficiency compared to model-based methods (Q-learning), at the cost of computation
    efficiency. However, in stochastic or more complex environments, inaccuracies
    in the model could hinder performances and lead to sub-optimal policies.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，基于模型的方法（Dyna-Q, Dyna-Q+）相较于基于模型的方法（Q-learning）在样本效率上有所提高，但以计算效率为代价。然而，在随机或更复杂的环境中，模型的不准确性可能会阻碍性能并导致次优策略。
- en: '![](../Images/9544f0a48e423fe58053a5b5eb2b9750.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9544f0a48e423fe58053a5b5eb2b9750.png)'
