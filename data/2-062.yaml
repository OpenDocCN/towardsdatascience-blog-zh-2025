- en: 'The MCP Security Survival Guide: Best Practices, Pitfalls, and Real-World Lessons'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《MCP安全生存指南：最佳实践、陷阱和现实世界经验教训》
- en: 原文：[https://towardsdatascience.com/the-mcp-security-survival-guide-best-practices-pitfalls-and-real-world-lessons/](https://towardsdatascience.com/the-mcp-security-survival-guide-best-practices-pitfalls-and-real-world-lessons/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/the-mcp-security-survival-guide-best-practices-pitfalls-and-real-world-lessons/)'
- en: <mdspan datatext="el1754530036739" class="mdspan-comment">If you’ve been reading</mdspan>
    my stuff, then you know that not too long ago, I wrote [a piece about the Model
    Context Protocol (MCP)](https://towardsdatascience.com/how-i-finally-understood-mcp-and-got-it-working-irl-2/)—explaining
    what it is, how it works, and even walking you through building your own custom
    MCP servers. It was a deep dive into the shiny, promising world of agentic integration.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754530036739" class="mdspan-comment">如果你一直在阅读</mdspan>我的文章，那么你知道不久前，我写了一篇关于模型上下文协议（MCP）的文章[《我如何最终理解MCP并在现实世界中实现它》](https://towardsdatascience.com/how-i-finally-understood-mcp-and-got-it-working-irl-2/)——解释了它是什么，它是如何工作的，甚至指导你构建自己的自定义MCP服务器。这是一次深入探索充满希望和光明的代理集成世界。
- en: 'At the time, I was swept up by how elegant and powerful MCP felt. It was like
    discovering a universal adapter for AI agents (it is!)—finally, I could connect
    large language models to any data source, tool, or API with ease. Every use case
    suddenly looked like a perfect candidate for MCP: document generation, customer
    support automation, even managing cloud deployments.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在那时，我被MCP（机器学习控制平台）的优雅和强大所吸引。它就像发现了一个适用于AI代理的通用适配器（确实是！）——终于，我可以轻松地将大型语言模型连接到任何数据源、工具或API。每一个用例突然看起来都像是MCP的完美候选者：文档生成、客户支持自动化，甚至管理云部署。
- en: Then the news started rolling in.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，新闻开始接踵而至。
- en: First, there was the [GitHub MCP vulnerability](https://cybernews.com/security/github-mcp-vulnerability-has-far-reaching-consequences/)—a
    flaw that let attackers exploit open-source MCP servers and siphon off user data.
    Then came the [critical remote execution exploit](https://thehackernews.com/2025/07/critical-mcp-remote-vulnerability.html)
    that let unauthenticated users run arbitrary commands on hosts running improperly
    configured servers. And the cherry on top? [Anthropic themselves had to patch
    a severe vulnerability in the official MCP inspector tool](https://www.oligo.security/blog/critical-rce-vulnerability-in-anthropic-mcp-inspector-cve-2025-49596#practical-risks-targeting-ai-developers-and-mcp-users),
    which had quietly opened a backdoor on thousands of developer machines.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，是[GitHub MCP漏洞](https://cybernews.com/security/github-mcp-vulnerability-has-far-reaching-consequences/)——一个漏洞允许攻击者利用开源MCP服务器窃取用户数据。接着是[关键的远程执行漏洞](https://thehackernews.com/2025/07/critical-mcp-remote-vulnerability.html)，它允许未经身份验证的用户在配置不当的服务器上运行任意命令。更糟糕的是？[Anthropic
    本身不得不修复官方MCP检查工具中的一个严重漏洞](https://www.oligo.security/blog/critical-rce-vulnerability-in-anthropic-mcp-inspector-cve-2025-49596#practical-risks-targeting-ai-developers-and-mcp-users)，这个漏洞在数千台开发机器上悄悄打开了后门。
- en: These weren’t theoretical risks. Real users—many just like me—were getting burned
    for trusting a shiny new thing a little too fast.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这些并非理论风险。真实用户——许多人和我一样——因为过于迅速地信任了一个闪亮的新事物而遭受了损失。
- en: 'It was around this time my partner, who is deeply serious about security, asked
    me point-blank: “How in the hell is any of this secure? You’re just trusting random
    code from GitHub to run tools on your machine?”'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 大约在这个时候，我的合作伙伴，他对安全非常认真，直接问我：“这一切究竟有多安全？你只是在信任GitHub上的随机代码在你的机器上运行工具吗？”
- en: That question stopped me cold. And it kicked off a long-overdue journey of digging
    into how other people were securing MCP—if they were at all.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 那个问题让我陷入了沉思。并且它引发了一场长期未完成的旅程，深入挖掘其他人如何保护MCP——如果他们真的在这样做的话。
- en: I started reading the spec closer, looking at how enterprise users were configuring
    their deployments, checking out community write-ups and criticisms. What I found
    was equal parts encouraging and terrifying. Encouraging, because there *are* best
    practices and thoughtful security models being developed. Terrifying, because
    almost nobody was using them.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始仔细阅读规范，查看企业用户是如何配置他们的部署的，阅读社区的文章和批评。我发现的情况一半是令人鼓舞的，一半是令人恐惧的。令人鼓舞的是，确实有最佳实践和深思熟虑的安全模型正在被开发。令人恐惧的是，几乎没有人在使用它们。
- en: So I decided to write this guide.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我决定写这篇指南。
- en: MCP makes it incredibly easy to wire up an AI agent to do real, useful things—and
    that’s exactly what makes it a little dangerous. When something feels that seamless,
    most of us don’t stop to ask the hard questions about security. We just assume
    it’ll be fine… until it isn’t. Unless you’re someone who lives and breathes cybersecurity,
    chances are you didn’t think much about authentication, network exposure, or what
    happens if someone else finds your server. This guide isn’t here to kill the excitement—it’s
    here to help you use MCP without opening the door to trouble.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: MCP使得将AI代理连接到做真实、有用的事情变得极其简单——这正是它有点危险的地方。当某件事感觉如此无缝时，我们大多数人不会停下来问关于安全性的难题。我们只是假设它会没事……直到它不会。除非你是那种生活在呼吸网络安全中的人，否则你很可能没有太多考虑过身份验证、网络暴露，或者如果有人找到你的服务器会发生什么。这份指南不是为了扼杀兴奋——它在这里是为了帮助你使用MCP，同时不打开麻烦的大门。
