- en: Building a Command-Line Quiz Application in R
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 R 中构建命令行问答应用
- en: 原文：[https://towardsdatascience.com/building-a-command-line-quiz-application-in-r/](https://towardsdatascience.com/building-a-command-line-quiz-application-in-r/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/building-a-command-line-quiz-application-in-r/](https://towardsdatascience.com/building-a-command-line-quiz-application-in-r/)
- en: I <mdspan datatext="el1759513904449" class="mdspan-comment">started my data</mdspan>
    science journey a couple of years back, and I realized that most of the experiences
    I gained tended to revolve around data analysis and theoretical coding.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我在几年前开始了我的数据科学之旅，并意识到我获得的大部分经验往往围绕着数据分析和理论编码。
- en: Looking back, one of the benefits I got from being a computer science major
    was developing a core understanding of various programming languages.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾过去，作为一名计算机科学专业的学生，我从中学到的其中一个好处是形成了对各种编程语言的深入理解。
- en: Although the downside is that you have all these theories, but little to no
    practice.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管缺点是你拥有所有这些理论，但实践却很少或没有。
- en: 'With that in mind, I challenged myself to build something using one of the
    top programming languages in data science: R.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，我挑战自己使用数据科学中最顶尖的编程语言之一：R 来构建一些东西。
- en: 'And yes, I know what you might be thinking: *why R, and not Python?*'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 并且，我知道你可能正在想：*为什么是 R，而不是 Python？*
- en: Well, stick with me for a minute.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，请跟我再坚持一分钟。
- en: According to a [StrataScratch article](https://www.stratascratch.com/blog/python-vs-r-for-data-science/),
    nearly 20,000 data professionals were surveyed, and 31% reported using R daily.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 [StrataScratch 文章](https://www.stratascratch.com/blog/python-vs-r-for-data-science/)，近
    20,000 名数据专业人士接受了调查，其中 31% 的人表示他们每天使用 R。
- en: To me, that 31% is a huge slice of the pie, and it got me thinking.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，那 31% 是一大块蛋糕，这让我开始思考。
- en: If R is powerful enough to crunch millions of rows of data, why dont I also
    use it to practice the fundamentals of programming **in relation to data science**?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 R 能够处理数百万行的数据，为什么我不也可以用它来练习与数据科学相关的编程基础呢？
- en: Sometimes, the best way to grow as a data scientist may not be by jumping straight
    into machine learning libraries or analyzing large datasets. It could also come
    from embracing [constant learning](https://www.aspen.edu/altitude/upskilling-for-the-future-why-continuous-learning-is-critical-in-business-and-technology/)
    and gradually expanding your skills.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，作为数据科学家的最佳成长方式可能不是直接跳入机器学习库或分析大型数据集。它也可能来自于拥抱[持续学习](https://www.aspen.edu/altitude/upskilling-for-the-future-why-continuous-learning-is-critical-in-business-and-technology/)并逐渐扩展你的技能。
- en: That’s what inspired me to create this project, a command-line quiz application
    in R, right inside the terminal.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是激发我创建这个项目的灵感，一个在终端中运行的 R 的命令行问答应用。
- en: It’s simple, but it teaches the same skills you’ll need when building more complex
    data pipelines, such as control flow, input handling, and modular functions.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 它很简单，但它教授了你在构建更复杂的数据管道时所需的所有技能，例如控制流、输入处理和模块化函数。
- en: In this article, I’ll walk you through the process step by step, sharing not
    only the code but also the lessons I picked up along the way.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将一步一步地引导你了解这个过程，不仅分享代码，还分享我在过程中学到的经验。
- en: '* * *'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Handling User Input
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理用户输入
- en: I got a little emotional here because this took me back to the first time I
    used `readline()` in R. Seeing the program “wait” for me to type something felt
    like I was having a conversation with my code.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里有点动情，因为这让我想起了第一次在 R 中使用 `readline()` 的情景。看到程序“等待”我输入一些内容，感觉就像我在和我的代码进行对话。
- en: Okay, more coding, less nostalgia.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，更多的编码，更少的怀旧。
- en: Like most projects, I started small, beginning with just one question and one
    answer check.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 就像大多数项目一样，我从小处开始，只从一个问题和答案检查开始。
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'This snippet looks simple, but it introduces two important ideas:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这个片段看起来很简单，但它引入了两个重要的观点：
- en: '`readline()` allows interactive input in the console.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`readline()` 允许在控制台中进行交互式输入。'
- en: '`tolower()` + `trimws()` helps normalize responses (avoiding mismatches due
    to case or extra spaces).'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tolower()` + `trimws()` 帮助标准化响应（避免由于大小写或额外空格导致的匹配错误）。'
- en: When I first tried this, I typed “Abuja ” with a trailing space, and it marked
    me wrong. With that, I realized that cleaning input is just as important as collecting
    it.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当我第一次尝试时，我输入了“Abuja ”并带有尾随空格，它标记我输入错误。因此，我意识到清理输入和收集输入一样重要。
- en: Building Logic with Control Flow and Functions
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用控制流和函数构建逻辑
- en: Initially, I stacked everything inside a single block of `if` statements, but
    it quickly became messy.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 最初，我把所有东西都堆叠在一个单独的 `if` 语句块中，但很快就变得混乱。
- en: Not my greatest call, to be honest.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 实话实说，这并不是我最好的决定。
- en: It quickly reminded me of structured programming, where breaking things into
    functions often makes the code cleaner and easier to read.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 它很快让我想起了结构化编程，将事物分解成函数通常可以使代码更干净、更容易阅读。
- en: '[PRE1]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: What felt most fulfilling about using functions wasn’t just the cleaner code,
    but the realization that I was finally practicing and sharpening my programming
    skills.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 使用函数最令人满意的感觉不仅仅是代码更干净，而且我意识到我终于在练习并磨练我的编程技能。
- en: Data science is kind of like learning a TikTok dance; you only really get it
    once you start practicing the moves yourself.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学有点像学习TikTok舞蹈；只有当你开始亲自练习动作时，你才能真正理解它。
- en: Creating a Question Bank
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建问题库
- en: To scale the quiz, I needed a way to store multiple questions, instead of just
    hardcoding one at a time. I mean, you could do that, but it’s not really efficient.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为了扩展问答，我需要一种方法来存储多个问题，而不是一次只硬编码一个问题。我的意思是，你可以这样做，但这并不真的高效。
- en: Now that’s the beauty of R’s list structure; it was flexible enough to hold
    both the questions and their answers, which made it a perfect fit for what I was
    building.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是R列表结构的美丽之处；它足够灵活，可以同时容纳问题和它们的答案，这使得它非常适合我正在构建的内容。
- en: '[PRE2]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: In my quest to seek feedback, I shared this with a friend who suggested adding
    categories (like “Geography” or “R Programming”), which could actually be a good
    improvement for later.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在我寻求反馈的过程中，我向一个朋友分享了这些内容，他建议增加分类（如“地理”或“R编程”），这实际上可能是一个很好的改进。
- en: Running the Quiz (Looping Through Questions)
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行问答（遍历问题）
- en: 'Now comes the fun part: looping through the question bank, asking each question,
    and keeping track of the score. This loop is the engine that drives the entire
    application.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候进入有趣的部分了：遍历问题库，询问每个问题，并跟踪得分。这个循环是驱动整个应用程序的引擎。
- en: 'To make this clearer, here’s a simple flowchart to illustrate what I’m saying:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这一点更清晰，这里有一个简单的流程图来展示我所说的内容：
- en: '![](../Images/de96f38899141544654299bae9ff3379.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/de96f38899141544654299bae9ff3379.png)'
- en: Flowchart (Image by Author)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图（图片由作者提供）
- en: 'With this structure in mind, here’s how it looks in code:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个结构的基础上，以下是它在代码中的样子：
- en: '[PRE3]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Final Touches
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的润色
- en: To polish things up, I wrapped the logic into a `run_quiz()` function, making
    the program reusable and easy to understand.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使事情更加完善，我将逻辑封装到了`run_quiz()`函数中，使程序可重用且易于理解。
- en: '[PRE4]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: At this point, the app felt complete. It welcomed the player, asked a series
    of questions, and displayed the final score with a celebratory message.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个时候，应用程序感觉已经完整了。它欢迎玩家，提出一系列问题，并以庆祝的信息显示最终得分。
- en: Neat.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 真是 neat（整洁）。
- en: Sample Run
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 样本运行
- en: 'Here’s what it looked like when I played it in the R console:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我用R控制台运行时的样子：
- en: '[PRE5]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '* * *'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion and Takeaways
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论和收获
- en: Looking back, this small project taught me lessons that directly apply to larger
    data science workflows. A command-line quiz game in R might sound trivial, but
    trust me, it is a powerful exercise.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾过去，这个小项目教会了我一些可以直接应用到更大规模数据科学工作流程中的经验教训。一个用R语言编写的命令行问答游戏可能听起来微不足道，但请相信我，这实际上是一个强大的练习。
- en: If you’re learning R, I recommend trying your own version. Add more questions,
    and shuffle them. To push yourself more, you could even time-limit responses.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在学习R，我建议尝试你自己的版本。添加更多问题，并打乱顺序。为了进一步挑战自己，你甚至可以限制回答时间。
- en: Programming isn’t about reaching a finish line; it’s about staying on the learning
    curve. Small projects like this keep you moving forward— one function, one loop,
    one challenge at a time.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 编程不是关于达到终点线；它是关于保持在学习曲线上的。像这样的小项目让你不断前进——一次一个函数，一次一个循环，一次一个挑战。
