- en: The Hungarian Algorithm and Its Applications in Computer Vision
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 匈牙利算法及其在计算机视觉中的应用
- en: 原文：[https://towardsdatascience.com/hungarian-algorithm-and-its-applications-in-computer-vision/](https://towardsdatascience.com/hungarian-algorithm-and-its-applications-in-computer-vision/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/hungarian-algorithm-and-its-applications-in-computer-vision/](https://towardsdatascience.com/hungarian-algorithm-and-its-applications-in-computer-vision/)
- en: <mdspan datatext="el1757378960003" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757378960003" class="mdspan-comment">介绍</mdspan>
- en: '**Multi-object tracking (MOT)** is a task in which an algorithm must detect
    and track multiple objects in a video. Most known algorithms are based on using
    simple detectors (e.g. YOLO) designed for processing individual images. The overall
    method involves separately using a detector on consecutive video frames and then
    matching the corresponding bounding boxes across different frames that belong
    to the same objects.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**多目标跟踪（MOT）**是一个任务，其中算法必须在视频中检测和跟踪多个对象。大多数已知算法都是基于使用为处理单个图像设计的简单检测器（例如YOLO）。整体方法涉及在连续的视频帧上分别使用检测器，然后匹配属于同一对象的对应边界框。'
- en: 'The core part that makes MOT algorithms different is how they perform matching
    between video frames. They can take into account several factors to perform matching:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 使MOT算法与众不同的核心部分是它们在视频帧之间进行匹配的方式。它们可以考虑到几个因素来执行匹配：
- en: '*bounding box positions;*'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*边界框位置；*'
- en: '*occlusions* (when bounding boxes of several objects intersect with each other);'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*遮挡*（当多个对象的边界框相互交叉时）；'
- en: '*object’s motion;*'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*对象的运动；*'
- en: '*physical object similarity;*'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*物理对象相似性；*'
- en: In some cases, for every pair of bounding boxes on consecutive frames A and
    B, these characteristics are combined into a single number that describes the
    likelihood that a pair of bounding boxes detected in frames A and B belongs to
    the same object.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，对于连续帧A和B上的每对边界框，这些特征被合并成一个数字，该数字描述了在帧A和B中检测到的边界框对属于同一对象的可能性。
- en: '![](../Images/a90dd5bc184602528bb84e2205d79b0c.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a90dd5bc184602528bb84e2205d79b0c.png)'
- en: 'Example of multi-object tracking (MOT): the algorithm tracks of two balls.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 多目标跟踪（MOT）的例子：该算法跟踪两个球。
- en: These values are calculated for all pairs of bounding boxes in frames A and
    B. Then, the MOT algorithm attempts to identify the best possible matching between
    all bounding boxes. More concretely, given n detected bounding boxes in both frames
    A and B, the goal is to create a mapping between every bounding box from A to
    B in a way that every bounding box is used only once.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这些值是在帧A和B中所有边界框对之间计算的。然后，MOT算法试图识别所有边界框之间可能的最优匹配。更具体地说，给定帧A和B中检测到的n个边界框，目标是创建一个映射，使得A中的每个边界框只映射到B中的一个边界框，并且每个边界框只使用一次。
- en: Hungarian algorithm
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 匈牙利算法
- en: The Hungarian algorithm is usually studied in algorithms and data structure
    courses. Nevertheless, it also has applications in matching systems, and, in particular,
    is frequently used to solve the tracklet matching problem mentioned above.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 匈牙利算法通常在算法和数据结构课程中学习。尽管如此，它也应用于匹配系统，特别是经常用于解决上述提到的轨迹匹配问题。
- en: We are going to study the workflow of the Hungarian algorithm in simpler settings.
    Once we have understood how it is used, we will be able to apply it to MOT problems
    as well easily.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将研究在更简单设置中匈牙利算法的工作流程。一旦我们了解了它的使用方法，我们就可以轻松地将它应用于MOT问题。
- en: '*The algorithm is called Hungarian because it is “was largely based on the
    earlier works of two Hungarian mathematicians, [Dénes Kőnig](https://en.wikipedia.org/wiki/D%C3%A9nes_K%C5%91nig) and [Jenő
    Egerváry](https://en.wikipedia.org/wiki/Jen%C5%91_Egerv%C3%A1ry)” — [Hungarian
    Algorithm | Wikipedia](https://en.wikipedia.org/wiki/Hungarian_algorithm)*'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*该算法被称为匈牙利算法，因为它“主要基于两位匈牙利数学家[Dénes Kőnig](https://en.wikipedia.org/wiki/D%C3%A9nes_K%C5%91nig)和[Jenő
    Egerváry](https://en.wikipedia.org/wiki/Jen%C5%91_Egerv%C3%A1ry)的早期工作” — [匈牙利算法
    | 维基百科](https://en.wikipedia.org/wiki/Hungarian_algorithm)*'
- en: Formulation
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 公式化
- en: 'There exist many examples to demonstrate the Hungarian algorithm. I like the
    one with workers and tasks. Here is the formulation:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 存在许多示例来演示匈牙利算法。我喜欢工人和任务的例子。以下是公式化：
- en: 'There are n workers available, and n tasks need to be completed by them. There
    is information about the salary every worker receives for every task. As for the
    company director, the problem consists of optimally assigning tasks to workers
    given the following conditions:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 有n名工人可用，他们需要完成n项任务。关于每个工人每项任务的薪资信息都有所了解。至于公司总监，问题在于在以下条件下最优地分配任务给工人：
- en: every worker gets assigned only one task;
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个工人只分配一个任务；
- en: all tasks get completed;
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有任务都得到完成；
- en: the money spent on salaries should be minimized.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在薪水中花费的金额应尽量减少。
- en: 'We are going to solve this problem by using the following *4 x 4* cost matrix
    as an example:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用以下 *4 x 4* 成本矩阵作为例子来解决这个问题：
- en: '![](../Images/f595a3dc6fe32fe605d9d5a4e49ef16d.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f595a3dc6fe32fe605d9d5a4e49ef16d.png)'
- en: Cost matrix containing information about the cost of every task done by every
    worker. The goal is to assign every task to each worker, so that all tasks are
    completed with the minimal overall cost.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 包含每个工人完成每项任务的成本信息的成本矩阵。目标是分配每项任务给每个工人，以便所有任务都以最小的总成本完成。
- en: '*Geometrically, given the matrix above, the objective consists of choosing
    n matrix elements in a manner that there are no repeating elements in any row
    or column, and the total sum of chosen elements is minimal.*'
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*从几何学角度来说，给定上述矩阵，目标是在不重复任何行或列中的元素的情况下选择n个矩阵元素，并且所选元素的总和是最小的。*'
- en: Idea
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 思路
- en: The Hungarian method involves transforming the initial cost matrix into a new
    form that facilitates the solution search. For this, we will use several matrix
    transformations. Even though the matrix will be modified, the problem will always
    remain equivalent, meaning that the solution will still be the same.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 匈牙利方法涉及将初始成本矩阵转换成一种新的形式，这有助于搜索解决方案。为此，我们将使用几个矩阵变换。尽管矩阵将被修改，但问题始终保持等价，这意味着解决方案仍然是相同的。
- en: '*To keep things simple, we are not going to prove here mathematically why this
    or that matrix transformation maintains the problem invariant. Instead, we will
    provide some logical thoughts to explain why the solution remains the same.*'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*为了简化问题，我们在此不进行数学证明来解释为什么这个或那个矩阵变换保持了问题的不变性。相反，我们将提供一些逻辑思考来解释为什么解决方案保持不变。*'
- en: Example
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例
- en: 1\. Row & column reduction
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 行与列的缩减
- en: The first step consists of identifying a minimum element in every row of the
    matrix and subtracting it from each row. The idea here is to get at least one
    zero in every row. In practice, having more zeros simplifies the problem.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是在矩阵的每一行中识别最小元素，并从每一行中减去它。这里的想法是在每一行中至少得到一个零。在实践中，有更多的零可以简化问题。
- en: '*Suppose that some number m is subtracted from a given row. While the objective
    value (the total minimized salary) changes during the transformation (it decreases
    by m), the relative cost between the assignments for the same worker remains unchanged.
    Therefore, the ranking of solutions remained unchanged.*'
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*假设从给定行中减去某个数m。在变换过程中，目标值（总最小薪资）会发生变化（减少m），但相同工人的分配之间的相对成本保持不变。因此，解决方案的排名保持不变。*'
- en: 'The analogous procedure is then performed on columns: a minimum element in
    every column is subtracted from that column.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 然后对列执行类似的程序：从每一列中减去该列的最小元素。
- en: '![](../Images/1bc7064fabc59cafa3c407843edf884f.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1bc7064fabc59cafa3c407843edf884f.png)'
- en: 'First two steps: 1\. subtract the minimal element from every row; 2\. subtract
    the minimal element from every column.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 前两步：1. 从每一行中减去最小元素；2. 从每一列中减去最小元素。
- en: After the first two transformations, we obtain a matrix with some zeros representing
    potential assignments.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 经过前两次变换后，我们得到一个包含一些零的矩阵，这些零代表潜在的分配。
- en: The next step consists of drawing the minimal number of horizontal and vertical
    lines in a way that they pass through all zeros in the matrix. In the image below,
    we can draw k = 3 lines in total to cover all zeros.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是在矩阵中绘制最少的水平和垂直线，使它们通过所有零。在下面的图像中，我们可以画出k = 3条线来覆盖所有零。
- en: '![](../Images/0c2faee05a9151a155c62cb338946c71.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0c2faee05a9151a155c62cb338946c71.png)'
- en: All zeros can be covered using only k = 3 lines.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 所有的零都可以用k = 3条线来覆盖。
- en: If the number of drawn lines equals the dimension n of the matrix, then we have
    found a solution. The only step left in such a case is to choose n zeros such
    that no zero is on the same horizontal or vertical line as another zero.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如果绘制的线条数等于矩阵的维度 n，那么我们就找到了一个解。在这种情况下，剩下的唯一步骤是选择 n 个零，使得没有零位于另一个零的同一水平或垂直线上。
- en: Since, in our example, n ≠ k, (the matrix dimension n = 4; the number of drawn
    lines k = 3), it means we must perform an adjustment step.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 由于在我们的例子中 n ≠ k（矩阵维度 n = 4；绘制的线条数 k = 3），这意味着我们必须执行一个调整步骤。
- en: 2\. Adjustment step
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 调整步骤
- en: 'So far, we have drawn several lines, and we can classify the matrix elements
    into three categories:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经绘制了几条线，我们可以将矩阵元素分为三类：
- en: Uncovered elements;
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 未覆盖元素；
- en: Covered elements (only once);
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 覆盖元素（只覆盖一次）；
- en: Corner elements (elements that are covered twice — horizontally and vertically).
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 角元素（被水平和垂直覆盖两次的元素）。
- en: The idea of the adjustment step consists of identifying the minimal element
    among uncovered elements and subtracting it from all uncovered elements. At the
    same time, this value gets added to all corner elements.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 调整步骤的想法是识别未覆盖元素中的最小元素，并从所有未覆盖元素中减去它。同时，这个值被加到所有角元素上。
- en: In our example, the minimal uncovered element is 2\. As a result, we subtract
    2 from all uncovered elements (in red) and 2 from all corner elements (in green).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的例子中，最小的未覆盖元素是 2。因此，我们从所有未覆盖元素（红色）中减去 2，并从所有角元素（绿色）中减去 2。
- en: '![](../Images/67ca42a6720dd379043cdf6769eba8e8.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/67ca42a6720dd379043cdf6769eba8e8.png)'
- en: Adjustment step involves subtracting the minimal covered element (2) from each
    covered elements (in red) and adding it (2) to all corner elements (in green).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 调整步骤涉及从每个覆盖元素（红色）中减去最小覆盖元素（2），并将其（2）加到所有角元素（绿色）上。
- en: '*Although it might not be obvious why the problem invariant remains maintained
    after the adjustment step, it can be mathematically proven that subtracting a
    number from all uncovered costs is equally compensated by its addition to all
    covered costs twice, which maintains the optimal solution the same.*'
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*尽管调整步骤后问题不变性为何仍然保持可能并不明显，但可以通过数学证明，从所有未覆盖的成本中减去一个数字，通过将其加到所有覆盖的成本上两次来补偿，从而保持最优解不变。*'
- en: This transformation was a single iteration of the adjustment step, which led
    us to another equivalent matrix form. As before, we perform the check to find
    out if we can cover all zeros using only *n* lines.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这次转换是调整步骤的单次迭代，它使我们到达了另一个等价的矩阵形式。和之前一样，我们执行检查以确定是否可以使用 *n* 条线覆盖所有零。
- en: '![](../Images/6b1920c90c40ff2d14c477d9e5b63bbc.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6b1920c90c40ff2d14c477d9e5b63bbc.png)'
- en: This time, all zeros can only be covered with k = n = 4 lines. This means that
    no further adjustment steps are needed, and the final solution can be retrieved.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，所有零只能用 k = n = 4 条线来覆盖。这意味着不需要进一步的调整步骤，最终解可以检索到。
- en: As we can see, this time we indeed have to draw k = n = 4 lines to cover all
    zeros. It means that we can finally retrieve our solution!
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，这次我们确实需要绘制 k = n = 4 条线来覆盖所有零。这意味着我们最终可以检索到我们的解！
- en: '*Otherwise, if we could have drawn fewer than k < 4 lines, we should have repeated
    the adjustment step until the number of lines became k = 4.*'
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*否则，如果我们能绘制少于 k < 4 条线，我们应该重复调整步骤，直到线条数变为 k = 4。*'
- en: 3\. Solution retrieval
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 解的检索
- en: The only step left is to find n zeros on different vertical and horizontal lines.
    If doing it manually, it is better to start with lines that have fewer zeroes.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 剩下的唯一步骤是找到不同垂直和水平线上的 n 个零。如果手动操作，最好从零较少的线开始。
- en: After finding the positions of zeros in the matrix, we can switch back to the
    original matrix and choose the initial elements with the same positions as the
    found zeros. And that will be the final assignment!
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在找到矩阵中零的位置后，我们可以切换回原始矩阵，并选择与找到的零具有相同位置的初始元素。那将是最终的分配！
- en: '![](../Images/0b5200c23ba803e60647ebbaa66eb3dd.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0b5200c23ba803e60647ebbaa66eb3dd.png)'
- en: During the final step, n = 4 non-repeating zeros on horizontal and vertical
    lines must be found. Their positions correspond exactly to the position of the
    cost values of the initial matrix.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在最后一步，必须在水平和垂直线上找到 n = 4 个不重复的零。它们的位置与初始矩阵的成本值的位置完全对应。
- en: '*The complexity of the Hungarian algorithm is O(n³), where n is the matrix
    dimension.*'
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*匈牙利算法的复杂度是 O(n³)，其中 n 是矩阵维度。*'
- en: '*The assignment problem we have just seen can also be solved by linear programming
    methods.*'
  id: totrans-64
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*我们刚才看到的分配问题也可以通过线性规划方法来解决。*'
- en: Applications
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用
- en: One of the most obvious applications of the Hungarian algorithm consists of
    using it for assignment problems, where, given n tasks, the goal is to optimally
    associate them with other people or objects (e.g., machines) that will complete
    them.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 匈牙利算法最明显的应用之一是将其用于分配问题，其中，给定n个任务，目标是将它们与完成它们的其他人或对象（例如机器）最优地关联起来。
- en: There is also a particular application in computer vision. Many video tracking
    algorithms (MOT) are based on the combination of standard image detection algorithms
    (e.g., YOLO) and logic of merging detection results from several independent frames
    into a video flow.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在计算机视觉中也有特定的应用。许多视频跟踪算法（MOT）基于标准图像检测算法（例如YOLO）和将来自几个独立帧的检测结果合并到视频流中的逻辑的组合。
- en: 'Let us take a simplified example of two consecutive image frames of a video:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以一个简化的视频两个连续图像帧的例子来说明：
- en: '![](../Images/822bff1287ea8a2d0f33694847c936d9.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/822bff1287ea8a2d0f33694847c936d9.png)'
- en: Example of two consecutive video frames.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 两个连续视频帧的示例。
- en: We run a MOT algorithm for object tracking based on YOLO. The predictions of
    YOLO are shown below in gray boxes.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们运行基于YOLO的对象跟踪MOT算法。YOLO的预测如下所示，以灰色框表示。
- en: '![](../Images/7a1af67e3687347fe87b2a4fccdb8685.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7a1af67e3687347fe87b2a4fccdb8685.png)'
- en: The YOLO algorithm detects two balls on a tree in every frame. The objective
    is to understand how detections on both frames are related to each other.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: YOLO算法在每一帧中检测到树上的两个球。目标是理解两个帧上的检测是如何相互关联的。
- en: The objective is to associate bounding boxes between both frames to keep track
    of objects. One possible way to do this involves analyzing the change in distance
    between bounding boxes between the two frames. It is logical to assume that a
    pair of bounding boxes belongs to the same object if their position do not change
    a lot between the two frames.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是将两个帧之间的边界框关联起来以跟踪物体。一种可能的方法是分析两个帧之间边界框距离的变化。如果两个帧之间边界框的位置变化不大，那么可以合乎逻辑地假设这对边界框属于同一物体。
- en: Here is where the Hungarian algorithm comes into play. We can construct a matrix
    representing pairwise distances (which will be the cost functions) between the
    coordinates of different bounding boxes in both frames. We can find such a mapping
    that minimizes the total distance between bounding boxes.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 正是在这里，匈牙利算法发挥了作用。我们可以构建一个矩阵，表示两个帧中不同边界框坐标之间的成对距离（这将是成本函数）。我们可以找到这样的映射，以最小化边界框之间的总距离。
- en: '![](../Images/bb21a0200a805c3eb50c1c3aa99abd14.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bb21a0200a805c3eb50c1c3aa99abd14.png)'
- en: The result of the Hungarian algorithm applied to the matrix containing distances
    between the centers of bounding boxes.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 将匈牙利算法应用于包含边界框中心距离的矩阵的结果。
- en: 'By running the Hungarian algorithm, we get the following mappings:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 通过运行匈牙利算法，我们得到以下映射：
- en: '*(A₁, C₂), (B₁, A₂), (C₁, B₂)*.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '*(A₁, C₂), (B₁, A₂), (C₁, B₂)*。'
- en: We can verify that they result in a total cost of *8 + 1 + 5 = 14* which is
    the minimal possible function cost for this matrix. Hence, the found mappings
    are optimal.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以验证它们的结果是总成本*8 + 1 + 5 = 14*，这是此矩阵可能的最小函数成本。因此，找到的映射是最佳的。
- en: '![](../Images/974c01c582a9ed634526bbebe63e1cf9.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/974c01c582a9ed634526bbebe63e1cf9.png)'
- en: Mapping bounding boxes on both frames.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在两个帧上映射边界框。
- en: '*Certainly, modern MOT algorithms consider additional factors when matching
    bounding boxes, including trajectory analysis, object speed and direction, and
    physical similarity, among others. For simplicity, we only considered a single
    factor: the distance between the bounding boxes. However, in reality, more factors
    are taken into account.*'
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*当然，现代MOT算法在匹配边界框时考虑了额外的因素，包括轨迹分析、物体速度和方向以及物理相似性等。为了简单起见，我们只考虑了一个因素：边界框之间的距离。然而，在现实中，考虑的因素更多。*'
- en: Conclusion
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we have looked at the Hungarian algorithm used to solve task
    assignment problems. By performing simple operations on the initial data matrix,
    the Hungarian algorithm transforms it to other formats while maintaining the problem
    invariant.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了用于解决任务分配问题的匈牙利算法。通过在初始数据矩阵上执行简单操作，匈牙利算法将其转换为其他格式，同时保持问题不变。
- en: Despite its cubic complexity, the Hungarian algorithm has a wide range of applications
    in matching and computer vision problems where the number of objects is not too
    large.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管匈牙利算法的复杂度为立方级，但它广泛应用于匹配和计算机视觉问题中，其中对象的数量不是太多。
