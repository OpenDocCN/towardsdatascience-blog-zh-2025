  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了如何利用上下文工程来提高你的LLM的效率。图片由ChatGPT提供。
- en: If you haven’t read it already, I recommend you first read [my initial article
    on context engineering](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/),
    [ensuring reliability in LLM applications](https://eivindkjosbakken.com/2025/08/16/how-to-ensure-reliability-in-llm-applications/),
    or [How to Benchmark LLMs using ARC AGI 3](https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有阅读，我建议你首先阅读[我的关于上下文工程的初始文章](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/)、[确保LLM应用中的可靠性](https://eivindkjosbakken.com/2025/08/16/how-to-ensure-reliability-in-llm-applications/)或[如何使用ARC
    AGI 3基准测试LLM](https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/)
