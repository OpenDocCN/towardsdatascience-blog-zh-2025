- en: Motivation
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机
- en: My motivation for writing this article is similar to my [last article on context
    engineering](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/).
    LLMs have become incredibly important in a lot of applications since the release
    of ChatGPT in 2022\. However, LLMs are often not utilized to their full potential
    due to poor context management. Proper context management requires context engineering
    skills and techniques, which is what I’ll discuss in this article. Thus, if you
    are working on any applications utilizing LLMs, I highly recommend taking notes
    from this article and integrating it into your own application.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我写这篇文章的动机与我的[上一篇文章关于上下文工程](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/)相似。自2022年ChatGPT发布以来，LLM在许多应用中变得极其重要。然而，由于上下文管理不善，LLM往往没有发挥出全部潜力。适当的上下文管理需要上下文工程技能和技术，这正是我在这篇文章中要讨论的内容。因此，如果你正在开发任何使用LLM的应用，我强烈建议你从这篇文章中做笔记并将其整合到你的应用中。
- en: Context engineering techniques
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文工程技术
- en: 'In my last article, I discussed context engineering techniques such as:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在我上一篇文章中，我讨论了上下文工程技术，例如：
- en: Zero/few-shot prompting
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 零样本/少样本提示
- en: RAG
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RAG
- en: Tools (MCP)
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具（MCP）
- en: I’ll now elaborate on more techniques that are important to proper context management.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在将详细阐述更多对适当上下文管理重要性的技术。
- en: Prompt structuring
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示结构化
- en: 'With prompt structuring, I’m referring to how your prompt is organized. A messy
    prompt will, for example, contain all the text without line breaks, repetitive
    instructions, and unclear sectioning. Check out the example below for a properly
    structured prompt, vs a messy prompt:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我所说的提示结构化是指你的提示是如何组织的。例如，一个杂乱的提示可能包含没有换行的所有文本，重复的指令和不清晰的章节。下面是一个结构良好的提示与一个杂乱提示的例子：
- en: '[PRE0]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Prompt structuring is important for two reasons.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 提示结构化之所以重要，有两个原因。
- en: It makes the instructions clearer to the AI
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它使指令对AI更清晰。
- en: It increases (human) readability of the prompt, which helps you detect potential
    issues with your prompt, avoid repetitive instructions, etc
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它增加了提示的（人类）可读性，这有助于你检测到提示中可能存在的问题，避免重复指令等。
- en: You should always try to avoid repetitive instructions. To avoid this, I recommend
    feeding your prompt into another LLM and asking for feedback. You’ll typically
    receive back a much cleaner prompt, with clearer instructions. Anthropic also
    has [a prompt generator](https://console.anthropic.com/dashboard) in their dashboard,
    and there are also a lot of other tools out there to improve your prompts.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该始终尽量避免重复指令。为了避免这种情况，我建议将你的提示输入到另一个LLM中并请求反馈。你通常会收到一个更干净的提示，其中包含更清晰的指令。Anthropic在其仪表板中也有一个[提示生成器](https://console.anthropic.com/dashboard)，还有许多其他工具可以帮助改进你的提示。
- en: Context window management
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上下文窗口管理
- en: '![Two main points for context management. Keep the context short, and if the
    context gets too long, you can utilize context compression by summarizing. Image
    by ChatGPT.](../Images/e65de8316deea2636d4033376d37014a.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![关于上下文管理的两个主要点。保持上下文简短，如果上下文变得过长，你可以通过总结来利用上下文压缩。图片由ChatGPT提供。](../Images/e65de8316deea2636d4033376d37014a.png)'
- en: Two main points for context management. Keep the context short, and if the context
    gets too long, you can utilize context compression by summarizing. Image by ChatGPT.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 关于上下文管理的两个主要点。保持上下文简短，如果上下文变得过长，你可以通过总结来利用上下文压缩。图片由ChatGPT提供。
- en: Another important point to keep in mind is context window management. With this,
    I am referring to the amount of tokens you are feeding into your LLM. It’s important
    to remember that while recent LLMs have super-long context windows (for example, [Llama
    4 Scout with a 10M context window](https://www.llama.com/models/llama-4/)), they
    are not necessarily able to utilize all of those tokens. You can, for example,
    [read this article](https://arxiv.org/abs/2402.14848?utm_source=chatgpt.com),
    highlighting how LLMs perform worse with more input tokens, even if the difficulty
    of the problem stays the same.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个需要记住的重要点是上下文窗口管理。这里我指的是你输入到你的LLM中的标记数量。重要的是要记住，尽管最近的LLM有超级长的上下文窗口（例如，[Llama
    4 Scout具有10M上下文窗口](https://www.llama.com/models/llama-4/)），但它们并不一定能利用所有这些标记。例如，你可以[阅读这篇文章](https://arxiv.org/abs/2402.14848?utm_source=chatgpt.com)，突出显示LLM在输入标记更多的情况下表现更差，即使问题的难度保持不变。
- en: 'It’s thus important to properly manage your context window. I recommend focusing
    on two points:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，正确管理上下文窗口非常重要。我建议关注两个要点：
- en: Keep the prompt as short as possible, while including all relevant information.
    Look through the prompt and determine if there is any irrelevant text there. If
    so, removing it will likely increase LLM performance
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尽可能使提示尽可能简短，同时包含所有相关信息。查看提示，确定其中是否有任何无关文本。如果有，删除它可能会提高LLM的性能。
- en: You might be experiencing problems where the LLM runs out of context window.
    Either because of the hard context size limit, or because too many input tokens
    make the LLM slow to respond. In these cases, you should consider **context compression**
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你可能遇到LLM耗尽上下文窗口的问题。这可能是由于硬上下文大小限制，或者是因为输入标记太多导致LLM响应缓慢。在这些情况下，你应该考虑**上下文压缩**。
- en: For point one, it’s important to note that this irrelevant information is often
    not a part of your static system prompt, but rather the dynamic information you
    are feeding into the context. For example, if you are fetching information using
    RAG, you should consider excluding chunks that have similarity below a specific
    threshold. This threshold will vary from application to application, though empirical
    reasoning here typically works well.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第一点，需要注意的是，这种无关信息通常不是你静态系统提示的一部分，而是你输入到上下文中的动态信息。例如，如果你正在使用RAG获取信息，你应该考虑排除相似度低于特定阈值的块。这个阈值会根据应用的不同而有所不同，但在这里的经验推理通常效果很好。
- en: Context compression is another powerful technique you can use to properly manage
    the context of your LLM. Context compression is typically done by prompting another
    LLM to summarize part of your context. This way, you can contain the same information
    using fewer tokens. This approach is, for example, used to handle the context
    window of agents, which can quickly expand as the agent performs more actions.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文压缩是您可以用来正确管理您的 LLM 上下文的另一种强大技术。上下文压缩通常是通过提示另一个 LLM 总结您的上下文的一部分来完成的。这样，您可以使用更少的标记包含相同的信息。例如，这种方法用于处理代理的上下文窗口，随着代理执行更多操作，上下文窗口可以迅速扩展。
- en: Keyword search (vs RAG)
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键词搜索（与 RAG 相比）
- en: '![This image shows RAG architecture from https://github.com/infiniflow/ragflow
    (Apache 2 license). You can improve the RAG flow by implementing contextual retrieval.](../Images/27b8bac0898ed27f31c161a9d46a21f3.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![此图像显示了来自 https://github.com/infiniflow/ragflow（Apache 2 许可证）的 RAG 架构。您可以通过实现上下文检索来改进
    RAG 流程。](../Images/27b8bac0898ed27f31c161a9d46a21f3.png)'
- en: This image shows RAG architecture from https://github.com/infiniflow/ragflow
    (Apache 2 license). You can improve the RAG flow by implementing contextual retrieval.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 此图像显示了来自 https://github.com/infiniflow/ragflow（Apache 2 许可证）的 RAG 架构。您可以通过实现上下文检索来改进
    RAG 流程。
- en: Another topic I think is worth highlighting is to utilize keyword search, in
    addition to retrieval augmented generation (RAG). In most AI applications, the
    focus is on RAG, considering it can fetch information based on semantic similarity.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个我认为值得强调的话题是，除了检索增强生成（RAG）之外，还要利用关键词搜索。在大多数 AI 应用中，重点在于 RAG，因为它可以根据语义相似性检索信息。
- en: Semantic similarity is super powerful because in a lot of cases, the user doesn’t
    know the exact wording of what they are looking for. Searching for semantic similarity
    thus works very well. However, in a lot of cases, keyword search will also work
    super well. I thus recommend integrating an option to fetch documents using some
    sort of keyword search, in addition to your RAG. The keyword search will, in some
    scenarios, retrieve more relevant documents than RAG is able to.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 语义相似性非常强大，因为在很多情况下，用户不知道他们要找的确切措辞。因此，搜索语义相似性非常有效。然而，在许多情况下，关键词搜索也会非常有效。因此，我建议在您的
    RAG 之外集成一种使用某种关键词搜索检索文档的选项。在某些情况下，关键词搜索将能够检索比 RAG 更相关的文档。
- en: Anthropic highlighted this approach [with their article on Contextual Retrieval
    from September 2024.](https://www.anthropic.com/news/contextual-retrieval) In
    this article, they show you how you can utilize BM25 to fetch relevant information
    in your RAG system effectively.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic 在 2024 年 9 月发布的关于上下文检索的文章中 [强调了这种方法](https://www.anthropic.com/news/contextual-retrieval)。在这篇文章中，他们向您展示了如何有效地利用
    BM25 在您的 RAG 系统中检索相关信息。
- en: Evaluation
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评估
- en: Evaluation is an important part of any machine-learning system. If you don’t
    know how well your LLMs are performing, it’s hard to improve your system.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 评估是任何机器学习系统的重要组成部分。如果您不知道您的 LLM 表现如何，那么很难改进您的系统。
- en: The first step to evaluation is observability. I thus recommend implementing
    prompt management software. You can find a series of such tools on [this GitHub
    page.](https://github.com/tensorchord/Awesome-LLMOps?tab=readme-ov-file#llmops)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 评估的第一步是可观察性。因此，我建议实施提示管理软件。您可以在 [这个 GitHub 页面](https://github.com/tensorchord/Awesome-LLMOps?tab=readme-ov-file#llmops)
    找到一系列此类工具。
- en: One way to evaluate your context management is to perform A/B testing. You simply
    run two different versions of a prompt, using different context management techniques.
    Then you can, for example, gather user feedback to determine which approach works
    better. Another way to test it is to prompt an LLM with the problem you are trying
    to solve (for example, RAG) and the context you are using to answer the RAG query.
    The LLM can then provide you with feedback on how to improve your context management.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 评估您上下文管理的一种方法是通过 A/B 测试。您只需运行两个不同版本的提示，使用不同的上下文管理技术。然后，例如，您可以收集用户反馈以确定哪种方法更有效。另一种测试方法是提示一个
    LLM 您试图解决的问题（例如，RAG）以及您用于回答 RAG 查询的上下文。LLM 可以然后为您提供有关如何改进您的上下文管理的反馈。
- en: Furthermore, an underrated approach to improving the quality of the contexts
    is to manually inspect them. I believe a lot of engineers working with LLMs spend
    too little time on manual inspections, and analyzing the input tokens fed into
    LLMs falls under this category. I thus recommend setting aside time to go through
    a series of different contexts that are fed into your LLM, to determine how you
    can improve. Manual inspection provides you with the opportunity to properly understand
    the data you are working with and what you are feeding into your LLMs.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，提高上下文质量的一个被低估的方法是手动检查它们。我相信许多与LLM合作的工程师在手动检查上花费的时间太少，分析输入到LLMs中的标记也属于这一范畴。因此，我建议留出时间来检查一系列输入到你的LLM中的不同上下文，以确定你可以如何改进。手动检查为你提供了正确理解你所处理的数据以及你输入到LLMs中的内容的机会。
- en: Conclusion
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I have elaborated on the topic of context engineering. Working
    on context engineering is a powerful approach to improving your LLM application.
    There are a series of techniques you can utilize to better manage the context
    of your LLMs, for example, improving your prompt structure, proper context window
    management, utilizing keyword search, and context compression. Furthermore, I
    also discussed evaluating the contexts.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我详细阐述了上下文工程的主题。从事上下文工程是提高你的LLM应用的有效方法。你可以利用一系列技术来更好地管理LLMs的上下文，例如，改进你的提示结构、适当管理上下文窗口、利用关键词搜索和上下文压缩。此外，我还讨论了上下文的评估。
