- en: 'A Bird’s-Eye View of Linear Algebra: Why Is Matrix Multiplication Like That?'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 线性代数的鸟瞰：为什么矩阵乘法是这样的？
- en: 原文：[https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-why-is-matrix-multiplication-like-that/](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-why-is-matrix-multiplication-like-that/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-why-is-matrix-multiplication-like-that/](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-why-is-matrix-multiplication-like-that/)
- en: '<mdspan datatext="el1755104470827" class="mdspan-comment">This is the third</mdspan>
    chapter of the in-progress book on linear algebra, “A birds eye view of linear
    algebra”. The table of contents so far:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755104470827" class="mdspan-comment">这是正在进行的关于线性代数的书籍“线性代数的鸟瞰”的第三章节。到目前为止的目录如下：
- en: '[A birds eye view of linear algebra – the basics](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-the-basics/)'
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[线性代数的鸟瞰 – 基础](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-the-basics/)'
- en: '[A birds eye view of linear algebra – measure of a map (determinants)](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-measure-of-a-map-determinants/)'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[线性代数的鸟瞰 – 映射的度量（行列式）](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-measure-of-a-map-determinants/)'
- en: A birds eye view of linear algebra – matrix multiplication (current)
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 线性代数的鸟瞰 – 矩阵乘法（当前）
- en: Stay tuned for future chapters.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 请期待未来章节的更新。
- en: Here, we will describe operations we can do with two matrices, but keeping in
    mind they are just representations of linear maps.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将描述我们可以用两个矩阵进行的操作，但请记住，它们只是线性映射的表示。
- en: I) Why care about matrix multiplication?
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: I) 为什么关心矩阵乘法？
- en: Almost any information can be embedded in a vector space. Images, video, language,
    speech, biometric information and whatever else you can imagine. And all the applications
    of machine learning and artificial intelligence (like the recent chat-bots, text
    to image, etc.) work on top of these vector embeddings. Since linear algebra is
    the science of dealing with high dimensional vector spaces, it is an indispensable
    building block.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎任何信息都可以嵌入到向量空间中。图像、视频、语言、语音、生物识别信息以及你能想象到的任何其他东西。而且，机器学习和人工智能（如最近的聊天机器人、文本到图像等）的应用都是建立在这些向量嵌入之上的。由于线性代学是处理高维向量空间的科学，因此它是不可或缺的构建块。
- en: '![](../Images/9861e0e1c3c77b9e4363019b490baede.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9861e0e1c3c77b9e4363019b490baede.png)'
- en: Complex concepts from our real world like images, text, speech, etc. can be
    embedded in high dimensional vector spaces. The higher the dimensionality of the
    vector space, the more complex information it can encode. Image created with midjourney.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 来自我们现实世界的复杂概念，如图像、文本、语音等，可以嵌入到高维向量空间中。向量空间的维度越高，它可以编码的信息就越复杂。使用midjourney创建的图像。
- en: A lot of the techniques involve taking some input vectors from one space and
    mapping them to other vectors from some other space.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 许多技术涉及从一个空间中取一些输入向量并将它们映射到另一个空间中的其他向量。
- en: But why the focus on “linear” when most interesting functions are non-linear?
    It’s because the problem of making our models high dimensional and that of making
    them non-linear (general enough to capture all kinds of complex relationships)
    turn out to be orthogonal to each other. Many neural network architectures work
    by using linear layers with simple one dimensional non-linearities in between
    them. And there is a theorem that says this kind of architecture can model any
    function.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 但为什么关注“线性”，而大多数有趣的功能都是非线性的呢？这是因为使我们的模型高维和使它们非线性（足够通用以捕捉各种复杂关系）的问题最终是正交的。许多神经网络架构通过使用线性层并在它们之间加入简单的一维非线性来实现。而且有一个定理说这种架构可以模拟任何函数。
- en: Since the way we manipulate high-dimensional vectors is primarily matrix multiplication,
    it isn’t a stretch to say it is the bedrock of the modern AI revolution.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们操作高维向量的主要方式是矩阵乘法，所以说它是现代人工智能革命的基石并不夸张。
- en: '![](../Images/10e97622163d2246691dfcd8399fa630.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/10e97622163d2246691dfcd8399fa630.png)'
- en: Deep neural networks have layers with vectors at each layer and connections
    between successive layers encoded as matrices. Translation between layers happens
    with linear algebra and matrix multiplication. Image created with midjourney.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 深度神经网络具有每层都有向量，并且连续层之间的连接以矩阵的形式编码的层。层之间的转换是通过线性代数和矩阵乘法实现的。使用midjourney创建的图像。
- en: II) Algebra on maps
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: II) 映射上的代数
- en: In [chapter 2](https://medium.com/towards-data-science/a-birds-eye-view-of-linear-algebra-the-measure-of-a-map-determinant-1e5fd752a3be),
    we learnt how to quantify linear maps with determinants. Now, let’s do some algebra
    with them. We’ll need two linear maps and a basis.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在[第2章](https://medium.com/towards-data-science/a-birds-eye-view-of-linear-algebra-the-measure-of-a-map-determinant-1e5fd752a3be)中，我们学习了如何用行列式来量化线性映射。现在，让我们对这些线性映射做一些代数运算。我们需要两个线性映射和一个基。
- en: '![](../Images/d2b84dc6327db5ea35ff6abcac436eab.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d2b84dc6327db5ea35ff6abcac436eab.png)'
- en: Algebra on linear maps. Image by midjourney.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 线性映射的代数运算。图片由midjourney提供。
- en: II-A) Addition
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: II-A) 加法
- en: If we can add matrices, we can add linear maps since matrices are the representations
    of linear maps. And matrix addition is not very interesting if you know scalar
    addition. Just as with vectors, it’s only defined if the two matrices are the
    same size (same rows and columns) and involves lining them up and adding element
    by element.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们可以加矩阵，我们也可以加线性映射，因为矩阵是线性映射的表示。如果你知道标量加法，矩阵加法并不很有趣。就像向量一样，它只在两个矩阵大小相同（行和列相同）时定义，并涉及将它们对齐并逐元素相加。
- en: '![](../Images/c9fb84e6ec67e043452a49966de7e547.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c9fb84e6ec67e043452a49966de7e547.png)'
- en: Matrix addition element-wise. Image by author.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵加法逐元素。图片由作者提供。
- en: So, we’re just doing a bunch of scalar additions. Which means that the properties
    of scalar addition logically extend.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们只是在做一系列标量加法。这意味着标量加法的性质在逻辑上可以扩展。
- en: '**Commutative: if you switch, the result won’t twitch**'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**交换律：如果你交换，结果不会跳动**'
- en: '*A+B = B+A*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '*A+B = B+A*'
- en: '*But commuting to work might not be commutative since going from A to B might
    take longer than B to A.*'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '*但是通勤可能不是交换的，因为从A到B可能比从B到A花费的时间更长。*'
- en: '**Associative: in a chain, don’t refrain, take any 2 and continue**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**结合律：在链中，不要犹豫，取任意两个并继续**'
- en: '*A+(B+C) = (A+B)+C*'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '*A+(B+C) = (A+B)+C*'
- en: '**Identity: And here I am where I began! That’s no way to treat a man!**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**单位元：而且我就在这里，我开始了！这样对待一个人是不公平的！**'
- en: The presence of a special element that when added to anything results in the
    same thing. In the case of scalars, it is the number *0*. In the case of matrices,
    it is a matrix full of zeros.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 存在一个特殊元素，当它被加到任何东西上时，结果仍然是相同的东西。在标量的情况下，它是数字*0*。在矩阵的情况下，它是一个全为零的矩阵。
- en: '*A + 0 = A or 0 + A = A*'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '*A + 0 = A 或 0 + A = A*'
- en: Also, it is possible to start at any element and end up at any other via addition.
    So it must be possible to start at *A* and end up at the additive identity, *0*.
    The thing that must be added to *A* to achieve this is the additive inverse of *A *and
    it’s called *-A.*
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，也可以从任何元素开始，通过加法到达任何其他元素。所以，必须可以从*A*开始，最终到达加法单位元*A*。必须加到*A*上以实现这一点的是*A*的加法逆元，它被称为*-A*。
- en: '*A + (-A) = 0*'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '*A + (-A) = 0*'
- en: For matrices, you just go to each scalar element in the matrix and replace with
    the additive inverse of each one (switching the signs if the scalars are numbers)
    to get the additive inverse of the matrix.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 对于矩阵，你只需逐个替换矩阵中的每个标量元素，用其加法逆元（如果标量是数字，则改变符号）来得到矩阵的加法逆元。
- en: II-B) Subtraction
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: II-B) 减法
- en: Subtraction is just addition with the additive inverse of the second matrix
    instead.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 减法就是用第二个矩阵的加法逆元来代替加法。
- en: '*A-B = A+(-B)*'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*A-B = A+(-B)*'
- en: II-C) Multiplication
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: II-C) 乘法
- en: We could have defined matrix multiplication just as we defined matrix addition.
    Just take two matrices that are the same size (rows and columns) and then multiply
    the scalars element by element. There is a name for that kinds of operation, the [Hadamard
    product](https://en.wikipedia.org/wiki/Hadamard_product_(matrices)).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们本可以像定义矩阵加法一样定义矩阵乘法。只需取两个相同大小的矩阵（行和列），然后逐元素相乘。这种操作有一个名字，叫做[Hadamard积](https://en.wikipedia.org/wiki/Hadamard_product_(matrices))。
- en: But no, we defined matrix multiplication as a far more convoluted operation,
    more “exotic” than addition. And it isn’t complex just for the sake of it. It
    is the most important operation in linear algebra by far.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，我们定义矩阵乘法为一个更复杂的操作，比加法更“奇异”。它并不是为了复杂而复杂。它是线性代数中最重要的运算。
- en: It enjoys this special status because it’s the means by which linear maps are
    applied to vectors, building on top of dot products.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 它享有这种特殊地位，因为它是通过线性映射应用于向量，在点积的基础上构建的。
- en: The way it actually works requires a dedicated section, so we’ll cover that
    in section III. Here, let’s list some of its properties.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 它实际工作的方式需要专门的章节来解释，所以我们将这部分内容放在第III节中。在这里，我们列出一些它的性质。
- en: '**Commutative**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**交换律**'
- en: Unlike addition, matrix multiplication is not always commutative. Which means
    that the order in which you apply linear maps to your input vector matters.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 与加法不同，矩阵乘法并不总是交换的。这意味着你应用于输入向量的线性映射的顺序很重要。
- en: '*A.B != B.A*'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '*A.B != B.A*'
- en: '**Associative**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**结合律**'
- en: It is still associative
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 它仍然是结合的
- en: '*A.B.C = A.(B.C) = (A.B).C*'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '*A.B.C = A.(B.C) = (A.B).C*'
- en: And there is a lot of depth to this property, as we will see in section IV.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这个属性有很多深度，我们将在第 IV 节中看到。
- en: '**Identity**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**单位**'
- en: Just like addition, matrix multiplication also has an identity element, *I, *an
    element that when any matrix is multiplied to results in the same matrix. The
    big caveat being that this element only exists for square matrices and is itself
    square.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 就像加法一样，矩阵乘法也有一个单位元素，*I*，一个元素，当任何矩阵与之相乘时，结果仍然是相同的矩阵。最大的问题是，这个元素只存在于方阵中，并且它本身也是方阵。
- en: Now, because of the importance of matrix multiplication, “the identity matrix”
    in general is defined as the identity element of matrix multiplication (not that
    of addition or the Hadamard product for example).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，由于矩阵乘法的重要性，“单位矩阵”在一般意义上被定义为矩阵乘法的单位元素（而不是加法或哈达玛积的单位元素，例如）。
- en: 'The identity element for addition is a matrix composed of *0*’s and that of
    the Hadamard product is a matrix composed of *1*’s. The identity element of matrix
    multiplication is:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 加法的单位矩阵由 *0* 组成，而哈达玛积的单位矩阵由 *1* 组成。矩阵乘法的单位元素是：
- en: '![](../Images/c47af7eec09049b682a9fe6387a4c40f.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c47af7eec09049b682a9fe6387a4c40f.png)'
- en: The identity matrix of matrix multiplication and also linear algebra. Image
    by author.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵乘法和线性代数的单位矩阵。图由作者提供。
- en: So, *1*’s on the main diagonal and *0*’s everywhere else. What kind of definition
    for matrix multiplication would lead to an identity element like this? We’ll need
    to describe how it works to see, but first let’s go to the final operation.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，主对角线上的 *1* 和其他地方的全 *0*。什么样的矩阵乘法定义会导致这样的单位元素？我们需要描述它是如何工作的，但首先让我们转到最后的操作。
- en: II-D) Division
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: II-D) 除法
- en: Just as with addition, the presence of an identity matrix suggests any matrix, *A *can
    be multiplied with another matrix, *A^-1* and taken to the identity. This is called
    the inverse. Since matrix multiplication isn’t commutative, there are two ways
    to this. Thankfully, both lead to the identity matrix.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 就像加法一样，存在单位矩阵暗示任何矩阵 *A* 都可以与另一个矩阵 *A^-1* 相乘并取为单位矩阵。这被称为逆矩阵。由于矩阵乘法不是交换的，有两种方式可以达到这一点。幸运的是，两者都导致单位矩阵。
- en: '*A.(A^-1) = (A^-1).A = I*'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '*A.(A^-1) = (A^-1).A = I*'
- en: So, “dividing” a matrix by another is simply multiplication with the second
    ones inverse, *A.B^-1*. If matrix multiplication is very important, then this
    operation is as well since it’s the inverse. It is also related to how we historically
    developed (or maybe stumbled upon) linear algebra. But more on that in the next
    chapter (4).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，“除以”一个矩阵就是用第二个矩阵的逆相乘，*A.B^-1*。如果矩阵乘法非常重要，那么这个操作也是如此，因为它是逆矩阵。这也与我们历史上如何发展（或可能偶然发现）线性代数有关。但更多内容将在下一章（4）中介绍。
- en: 'Another property we’ll be using that is a combined property of addition and
    multiplication is the distributive property. It applies to all kinds of matrix
    multiplication from the traditional one to the Hadamard product:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用的一个结合性质是加法和乘法的分配律。它适用于所有类型的矩阵乘法，从传统的到哈达玛积：
- en: '*A.(B+C) = A.B + A.C*'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '*A.(B+C) = A.B + A.C*'
- en: III) Why is matrix multiplication defined this way?
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: III) 为什么矩阵乘法是这样定义的？
- en: We have arrived at last to the section where we will answer the question in
    the title, the meat of this chapter.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最终到达了这一节，我们将回答标题中的问题，这是本章的主要内容。
- en: Matrix multiplication is the way linear maps act on vectors. So, we get to motivate
    it that way.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵乘法是线性映射作用于向量的方式。因此，我们以这种方式来激发它。
- en: III-A) How are linear maps applied in practice?
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: III-A) 线性映射在实际中是如何应用的？
- en: Consider a linear map that takes *m* dimensional vectors (from *R^m*) as input
    and maps them to *n* dimensional vectors (in *R^n*). Let’s call the *m* dimensional
    input vector, *v*.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个线性映射，它接受 m 维向量（来自 *R^m*）作为输入，并将它们映射到 n 维向量（在 *R^n* 中）。让我们称 m 维输入向量为 *v*。
- en: At this point, it might be helpful to think of yourself actually coding up this
    linear map in some programming language. It should be a function that takes the
    m-dimensional vector, *v* as input and returns the *n* dimensional vector, *u*.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，可能有助于想象自己实际上在某种编程语言中编写这个线性映射。它应该是一个函数，它接受 m 维向量 *v* 作为输入，并返回 n 维向量 *u*。
- en: The linear map has to take this vector and turn it into an *n* dimensional vector
    somehow. In the function above, you’ll notice we just generated some vector at
    random. But this completely ignored the input vector, *v*. That’s unreasonable, *v* should
    have some say. Now, *v* is just an ordered list of *m *scalars *v = [v1, v2, v3,
    …, vm]*. What do scalars do? They scale vectors. And the output vector we need
    should be *n* dimensional. How about we take some (fixed) *m* vectors (pulled
    out of thin air, each *n *dimensional), *w1, w2, …, wm*. Then, scale *w1* by v*1*, *w2* by
    v*2* and so on and add them all up. This leads to an equation for our linear map
    (with the output on the left).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 线性映射必须以某种方式将这个向量转换成一个 **n** 维向量。在上面的函数中，你会注意到我们只是随机生成了一些向量。但这完全忽略了输入向量 **v**，这是不合理的，**v**
    应该有一些发言权。现在，**v** 只是一个由 **m** 个标量组成的有序列表 **v = [v1, v2, v3, …, vm]**。标量做什么？它们缩放向量。而我们需要的输出向量应该是
    **n** 维的。我们怎么不取一些（固定的）**m** 个向量（从空中拉出来，每个 **n** 维），**w1, w2, …, wm**。然后，将 **w1**
    缩放为 **v1**，将 **w2** 缩放为 **v2**，依此类推，将它们全部加起来。这导致了一个线性映射的方程（输出在左边）。
- en: '![](../Images/b0d14e89a80c5f50aa638a957d42dad2.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b0d14e89a80c5f50aa638a957d42dad2.png)'
- en: Eq (1) A linear map motivated as a linear combination of m vectors. Image by
    author.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: Eq (1) 一个由 m 个向量的线性组合激发的线性映射。图由作者提供。
- en: Make note of the equation (1) above since we’ll be using it again.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 注意上面的方程 (1)，因为我们还会再次使用它。
- en: Since the *w1*, *w2,… *are all *n* dimensional, so is *u. *And all the elements
    of *v=[v1, v2, …, vm]* have an influence on the output, *u. *The idea in equation
    (1) is implemented below. We take some randomly generated vectors for the *w*’s
    but with fixed seeds (ensuring that the vectors are the same across every call
    of the function).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 **w1**, **w2,…** 都是 **n** 维的，因此 **u** 也是 **n** 维的。而 **v=[v1, v2, …, vm]**
    的所有元素都会影响输出 **u**。方程 (1) 中的想法如下实现。我们为 **w** 选取了一些随机生成的向量，但使用固定的种子（确保每次函数调用时向量都相同）。
- en: 'We have a way now to “map” *m* dimensional vectors (*v) *to *n* dimensional
    vectors (*u)*. But does this “map” satisfy the properties of a linear map? Recall
    from chapter-1, section II the properties of a linear map, *f *(here, *a *and *b* are
    vectors and *c* is a scalar):'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在有了一种将 **m** 维向量 (*v) 映射到 **n** 维向量 (*u) 的方法。但这种“映射”是否满足线性映射的性质？回想一下第 1 章第
    II 节中线性映射的性质 **f**（这里，**a** 和 **b** 是向量，**c** 是一个标量）：
- en: '*f(a+b) = f(a) + f(b)*'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**f(a+b) = f(a) + f(b)**'
- en: '*f(c.a) = c.f(a)*'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**f(c.a) = c.f(a)**'
- en: It’s clear that the map specified by equation (1) satisfies the above two properties
    of a linear map.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 很明显，方程 (1) 中指定的映射满足上述两个线性映射的性质。
- en: '![](../Images/7f9793f21889f44c393ae3c3c54ab9bc.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7f9793f21889f44c393ae3c3c54ab9bc.png)'
- en: The function defined by equation (1) satisfies the property that the function
    of sum is the sum of functions. Image by author.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 (1) 中定义的函数满足性质：函数的和等于函数的和。图由作者提供。
- en: '![](../Images/4dec7c10011d9a361c289ed864fb13b0.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4dec7c10011d9a361c289ed864fb13b0.png)'
- en: The function defined in equation (1) satisfies the property that a scalar times
    a vector passed to the function is equivalent to the scalar times the vector passed
    to the function. Image by author.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 (1) 中定义的函数满足性质：一个标量乘以传递给函数的向量等于标量乘以传递给函数的向量。图由作者提供。
- en: The *m* vectors, *w1, w2, …, wm* are arbitrary and no matter what we choose
    for them, the function, *f* defined in equation (1) is a linear map. So, different
    choices for those *w* vectors results in different linear maps. Moreover, for
    any linear map you can imagine, there will be some vectors *w1, w2,… *that can
    be applied in conjunction with equation (1) to represent it.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**m** 向量，**w1, w2, …, wm** 是任意的，无论我们选择什么，方程 (1) 中定义的函数 **f** 都是一个线性映射。因此，对那些
    **w** 向量的不同选择会导致不同的线性映射。此外，对于你可以想象到的任何线性映射，都存在一些向量 **w1, w2,…**，可以与方程 (1) 结合使用来表示它。'
- en: Now, for a given linear map, we can collect the vectors *w1, w2,… *into the
    columns of a matrix. Such a matrix will have *n* rows and *m* columns. This matrix
    represents the linear map, *f *and its multiplication with an input vector, *v* represents
    the application of the linear map, *f *to *v*. And this application is where the
    definition of matrix multiplication comes from.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，对于给定的线性映射，我们可以将向量 **w1, w2,…** 收集到矩阵的列中。这样的矩阵将有 **n** 行和 **m** 列。这个矩阵表示线性映射
    **f** 以及它与输入向量 **v** 的乘积，这表示线性映射 **f** 对 **v** 的应用。而这个应用就是矩阵乘法定义的来源。
- en: '![](../Images/1ba3358c9e7f45f9bfaa75b6f28fd2d3.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1ba3358c9e7f45f9bfaa75b6f28fd2d3.png)'
- en: 'Animation (1): Matrix vector multiplication. Image by author.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 动画 (1)：矩阵向量乘法。图由作者提供。
- en: 'We can now see why the identity element for matrix multiplication is the way
    it is:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以理解为什么矩阵乘法的单位元素是这样的：
- en: '![](../Images/85ae5cd9806b1c59e988f50cd48ded17.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/85ae5cd9806b1c59e988f50cd48ded17.png)'
- en: Animation (2) Why is the identity matrix of multiplication what it is? Image
    by author.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 动画（2）为什么乘法的单位矩阵是这样的？图由作者提供。
- en: We start with a column vector, *v *and end with a column vector, *u *(so just
    one column for each of them). And since the elements of *v* must align with the
    column vectors of the matrix representing the linear map, the number of columns
    of the matrix must equal the number of elements in *v*. More on this in section
    III-C.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从一个列向量 *v *开始，并以一个列向量 *u *结束（所以每个都是一列）。由于 *v* 的元素必须与表示线性映射的矩阵的列向量对齐，矩阵的列数必须等于 *v* 中的元素数。更多内容请参阅第三部分C节。
- en: III-B) Matrix multiplication as a composition of linear maps
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: III-B) 矩阵乘法作为线性映射的组合
- en: Now that we described how a matrix is multiplied to a vector, we can move on
    to multiplying a matrix with another matrix.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们描述了如何将矩阵乘以向量，我们可以继续将矩阵与另一个矩阵相乘。
- en: The definition of matrix multiplication is much more natural when we consider
    the matrices as representations of linear maps.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将矩阵视为线性映射的表示时，矩阵乘法的定义要自然得多。
- en: Linear maps are functions that take a vector as input and produce a vector as
    output. Let’s say the linear maps corresponding to two matrices are *f* and *g*.
    How would you think of adding these maps *(f+g)*?
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 线性映射是输入一个向量并产生一个向量的函数。假设对应于两个矩阵的线性映射分别是 *f* 和 *g*。你会如何考虑这两个映射的加法 *(f+g)*？
- en: '*(f+g)(v) = f(v)+g(v)*'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '*(f+g)(v) = f(v)+g(v)*'
- en: This is reminiscent of the distributive property of addition where the argument
    goes inside the bracket to both the functions and we add the results. And if we
    fix a basis, this corresponds to applying both linear maps to the input vector
    and adding the result. By the distributive property of matrix and vector multiplication,
    this is the same as adding the matrices corresponding to the linear maps and applying
    the result to the vector.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这让人想起了加法的分配律，其中参数进入括号并应用于两个函数，然后我们加结果。如果我们固定一个基，这对应于将两个线性映射应用于输入向量并加结果。根据矩阵和向量乘法的分配律，这等同于将表示线性映射的矩阵相加，并将结果应用于向量。
- en: Now, let’s think of multiplication *(f.g)*.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们考虑乘法 *(f.g)*。
- en: '*(f.g)(v) = f(g(v))*'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '*(f.g)(v) = f(g(v))*'
- en: Since linear maps are functions, the most natural interpretation of multiplication
    is to compose them (apply them one at a time, in sequence to the input vector).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 由于线性映射是函数，乘法最自然的解释是将它们组合（依次应用它们到输入向量上）。
- en: When two matrices are multiplied, the resulting matrix represents the composition
    of the corresponding linear maps. Consider matrices A and B; the product *AB* embodies
    the transformation achieved by applying the linear map represented by *B* to the
    input vector first and then applying the linear map represented by *A*.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 当两个矩阵相乘时，结果矩阵表示对应线性映射的组合。考虑矩阵A和B；乘积 *AB* 体现了首先应用由 *B* 表示的线性映射到输入向量上，然后应用由 *A* 表示的线性映射所实现的变换。
- en: So we have a linear map corresponding to the matrix, *A* and a linear map corresponding
    to the matrix, *B*. We’d like to know the matrix, *C*corresponding to the composition
    of the two linear maps. So, applying *B* to any vector first and then applying *A* to
    the result should be equivalent to just applying *C.*
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们有一个对应于矩阵 *A* 的线性映射和一个对应于矩阵 *B* 的线性映射。我们想知道对应于这两个线性映射组合的矩阵 *C*。所以，首先应用 *B* 到任何向量上，然后应用 *A* 到结果，应该等同于只应用 *C*。
- en: '*A.(B.v) = C.v = (A.B).v*'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '*A.(B.v) = C.v = (A.B).v*'
- en: In the last section, we learnt how to multiply a matrix and a vector. Let’s
    do that twice for *A.(B.v). *Say the columns of *B* are the column vectors, *b1,
    b2, …, bm. *From equation (1) in the previous section,
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们学习了如何乘以一个矩阵和一个向量。让我们对 *A.(B.v) *做两次。假设 *B* 的列是列向量， *b1, b2, …, bm. *从上一节方程（1）中，
- en: '![](../Images/ad9d88cc3e30694cf74632a75a2ad1a5.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ad9d88cc3e30694cf74632a75a2ad1a5.png)'
- en: Proving that matrix multiplication is just linear maps applied in sequence.
    Image by author.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 证明矩阵乘法只是依次应用线性映射。图由作者提供。
- en: And what if we applied the linear map corresponding to *C=A.B *directly to the
    vector, *v. *The column vectors of the matrix *C *are *c1, c2, …, ck.*
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们直接将对应于 *C=A.B *的线性映射应用到向量 *v. *上，矩阵 *C *的列向量是 *c1, c2, …, ck*。
- en: '![](../Images/f82f9b288919a612fa3b6d9813aa8360.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f82f9b288919a612fa3b6d9813aa8360.png)'
- en: The same result as animation (2), multiplying a matrix with a vector. Image
    by author.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 与动画(2)相同的结果，乘以一个矩阵。图片由作者提供。
- en: Comparing the two equations above we get,
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 比较上面的两个方程，我们得到，
- en: '![](../Images/6dcb2d0dcc7c93fbf3973eb83b68c742.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6dcb2d0dcc7c93fbf3973eb83b68c742.png)'
- en: 'Eq (2): the column vectors of the matrix C = AB where b1, b2,… are the column
    vectors of B. Image by author.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 公式(2)：矩阵C = AB的列向量，其中b1, b2,…是B的列向量。图片由作者提供。
- en: So, the columns of the product matrix, *C=AB* are obtained by applying the linear
    map corresponding to matrix *A* to each of the columns of the matrix *B.* And
    collecting those resulting vectors into a matrix gives us *C*.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，乘积矩阵*C=AB*的列是通过将矩阵*A*对应的线性映射应用于矩阵*B*的每一列，并将这些结果向量收集到一个矩阵中得到的*C*。
- en: We have just extended our matrix-vector multiplication result from the previous
    section to the multiplication of two matrices. We just break the second matrix
    into a collection of vectors, multiply the first matrix to all of them and collect
    the resulting vectors into the columns of the result matrix.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经将上一节中的矩阵-向量乘积结果扩展到两个矩阵的乘积。我们只是将第二个矩阵分解成一系列向量，将第一个矩阵与所有这些向量相乘，并将结果向量收集到结果矩阵的列中。
- en: '![](../Images/93e0f6c62d24838fa4ee9a4d7f4f5aa2.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/93e0f6c62d24838fa4ee9a4d7f4f5aa2.png)'
- en: Eq (3) The column vectors of the C matrix (C=A.B). Image by author.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 公式(3)：C矩阵的列向量（C=A.B）。图片由作者提供。
- en: So the first row and first column of the result matrix, *C* is the dot product
    of the first column of *B* and the first row of *A. *And in general the *i*-th
    row and *j*-th column of *C* is the dot product of the *i*-th row of *A* and the *j*-th
    column of *B. *This is the definition of matrix multiplication most of us first
    learn.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，结果矩阵*C*的第一行和第一列是*B*的第一列与*A*的第一行的点积。一般来说，*C*的*i*行*j*列是*A*的第*i*行与*B*的第*j*列的点积。这是我们大多数人首先学习的矩阵乘法定义。
- en: '![](../Images/db1b82fa8814d5009f0aca08bef5beef.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/db1b82fa8814d5009f0aca08bef5beef.png)'
- en: 'Animation (3): Matrix multiplication as dot products. Image by author.'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 动画(3)：作为点积的矩阵乘法。图片由作者提供。
- en: '**Associative proof**'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**结合性证明**'
- en: 'We can also show that matrix multiplication is associative now. Instead of
    the single vector, *v*, let’s apply the product C=*AB *individuallyto a group
    of vectors, *w1, w2, …, wl*. Let’s say the matrix that has these as column vectors
    is *W*. We can use the exact same trick as above to show:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以证明矩阵乘法是结合的。不是使用单个向量*v*，而是将乘积C=*AB*分别应用于向量组*w1, w2, …, wl*。假设这些向量作为列向量的矩阵是*W*。我们可以使用上面提到的方法来证明：
- en: '*(A.B).W = A.(B.W)*'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '*(A.B).W = A.(B.W)*'
- en: It’s because *(A.B).w1 = A.(B.w1)* and the same for all the other *w* vectors.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 因为*(A.B).w1 = A.(B.w1)*，对于所有其他*w*向量也是如此。
- en: '**Sum of outer products**'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '**外积之和**'
- en: 'Say we’re multiplying two matrices *A *and *B*:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们在乘以两个矩阵*A*和*B*：
- en: '![](../Images/8bea2e4452d914d59879a7185cdf2128.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8bea2e4452d914d59879a7185cdf2128.png)'
- en: Multiplication of two matrices. Image by author.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 两个矩阵的乘法。图片由作者提供。
- en: 'Equation (3) can be generalized to show that the *i*,*j *element of the resulting
    matrix, *C* is:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 公式(3)可以推广来显示结果矩阵*C*的*i*,*j*元素是：
- en: '![](../Images/b16cda8f75b5c2b1a9055543236dde4a.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b16cda8f75b5c2b1a9055543236dde4a.png)'
- en: 'Eq (4): Generalization of equation (3). Image by author.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 公式(4)：公式(3)的推广。图片由作者提供。
- en: We have a sum over *k* terms. What if we took each of those terms and created *k *individual
    matrices out of them. For example, the first matrix will have as its *i*,*j-*th
    entry: *b_{i,1}. a_{1,j}*. The *k *matrices and their relationship to *C:*
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对*k*项进行求和。如果我们把每一项都取出来，并从中创建*k*个单独的矩阵会怎样呢？例如，第一个矩阵的*i*,*j*项将是：*b_{i,1}. a_{1,j}*.
    这些*k*个矩阵及其与*C:*的关系：
- en: '![](../Images/37cdcbd5fb08584141af2f919db44277.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/37cdcbd5fb08584141af2f919db44277.png)'
- en: Matrix multiplication is the sum of k sub-matrices. Image by author.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵乘法是k个子矩阵的和。图片由作者提供。
- en: 'This process of summing over *k* matrices can be visualized as follows (reminiscent
    of the animation in section III-A that visualized a matrix multiplied to a vector):'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这个对*k*个矩阵求和的过程可以如下可视化（类似于第III-A节中可视化矩阵乘以向量的动画）：
- en: '![](../Images/d5dc2fc6a7fd380c6689ae9434f03fe0.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d5dc2fc6a7fd380c6689ae9434f03fe0.png)'
- en: 'Animation (4): Matrix multiplication by expanding to 3-d. Image by author.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 动画(4)：通过扩展到3维进行矩阵乘法。图片由作者提供。
- en: We see here the sum over *k* matrices all of the same size (*n*x*m*) which is
    the same size as the result matrix, *C*. Notice in equation (4) how for the first
    matrix, *A*, the column index stays the same while for the second matrix, *B*,
    the row index stays the same. So the *k* matrices we’re getting are the matrix
    products of the *i*-th column of *A* and the *i*-th **row** of *B*.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们看到的是所有大小相同（*n*x*m*）的 *k* 个矩阵的总和，其大小与结果矩阵 *C* 相同。注意在方程（4）中，对于第一个矩阵 *A*，列索引保持不变，而对于第二个矩阵
    *B*，行索引保持不变。因此，我们得到的 *k* 个矩阵是 *A* 的第 *i* 列和 *B* 的第 *i* **行** 的矩阵乘积。
- en: '![](../Images/d5135862d9305481cfd556f699d4dcb5.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d5135862d9305481cfd556f699d4dcb5.png)'
- en: Matrix multiplication as a sum of outer products. Image by author.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵乘法作为外积的和。图由作者提供。
- en: 'Inside the summation, two vectors are multiplied to produce matrices. It’s
    a special case of matrix multiplication when applied to vectors (special cases
    of matrices) and called “outer product”. Here is yet another animation to show
    this sum of outer products process:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 在求和内部，两个向量相乘以产生矩阵。当应用于向量（矩阵的特殊情况）时，这是一种特殊的矩阵乘法，称为“外积”。这里还有另一个动画来展示这个外积和的过程：
- en: '![](../Images/0a99f53f58fd2dd3f2ab60da3f697c98.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0a99f53f58fd2dd3f2ab60da3f697c98.png)'
- en: 'Animation (5): Matrix multiplication as a sum of outer products. Image by author.'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 动画（5）：矩阵乘法作为外积的和。图由作者提供。
- en: This tells us why the number of row vectors in *B* should be the same as the
    number of column vectors in *A*. Because they have to be mapped together to get
    the individual matrices.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 这告诉我们为什么 *B* 中的行向量数应该与 *A* 中的列向量数相同。因为它们必须映射在一起以得到单个矩阵。
- en: We’ve seen a lot of visualizations and some math, now let’s see the same thing
    via code for the special case where *A* and *B* are square matrices. This is based
    on section 4.2 of the book “Introduction to Algorithms”, [2].
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到了很多可视化和一些数学，现在让我们通过代码来看相同的东西，对于 *A* 和 *B* 是方阵的特殊情况。这是基于《算法导论》第 4.2 节的内容，[2]。
- en: 'III-C) Matrix multiplication: the structural choices'
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: III-C) 矩阵乘法：结构选择
- en: '![](../Images/302a730124c252f46f85395548414c81.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/302a730124c252f46f85395548414c81.png)'
- en: Image created with midjourney
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 midjourney 创建的图像
- en: Matrix multiplication seems to be structured in a weird way. It’s clear that
    we need to take a bunch of dot products. So, one of the dimensions has to match.
    But why make the columns of the first matrix be equal to the number of rows of
    the second one?
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵乘法似乎结构很奇怪。很明显，我们需要进行大量的点积。所以，其中一个维度必须匹配。但为什么第一个矩阵的列数要等于第二个矩阵的行数呢？
- en: Won’t it make things more straightforward if we redefine it in a way that the
    number of rows of the two matrices should be the same (or the number of columns)?
    This would make it much easier to identify when two matrices can be multiplied.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们以两种矩阵的行数（或列数）相同的方式来重新定义它，事情不会变得更简单吗？这将使确定两个矩阵是否可以相乘变得容易得多。
- en: The traditional definition where we require the rows of the first matrix to
    align with the columns of the second one has more than one advantage. Let’s go
    first to matrix-vector multiplication. Animation (1) in section III-A showed us
    how the traditional version works. Let’s visualize what it if we required the
    rows of the matrix to align with the number of elements in the vector instead.
    Now, the *n* rows of the matrix will need to align with the *n*elements of the
    vector.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的定义要求第一个矩阵的行与第二个矩阵的列对齐，这有多个优点。让我们首先看看矩阵-向量乘法。第 III-A 节中的动画（1）展示了传统版本的工作方式。现在让我们可视化一下，如果我们要求矩阵的行与向量的元素数量对齐会是什么样子。现在，矩阵的
    *n* 行将需要与向量的 *n* 个元素对齐。
- en: '![](../Images/a88f3673c8f2fb879bfe7956ac2a5388.png)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a88f3673c8f2fb879bfe7956ac2a5388.png)'
- en: 'Animation (6): what would an alternate setup for matrix multiplication look
    like? Image by author.'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 动画（6）：矩阵乘法的另一种设置看起来会是什么样子？图由作者提供。
- en: We see that we’d have to start with a column vector, *v* with *n* rows and one
    column and end up with a row vector, *u* with *1* row and *m *columns. This is
    awkward and makes defining an identity element for matrix multiplication challenging
    since the input and output vectors can never have the same shape. With the traditional
    definition, this isn’t an issue since the input is a column vector and the output
    is also a column vector (see animation (1)).
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到，我们不得不从一个列向量开始，即具有*n*行和一列的*v*，最终得到一个行向量，即具有*1*行和*m*列的*u*。这很尴尬，因为输入和输出向量永远不会具有相同的形状，这使得为矩阵乘法定义一个单位元素变得具有挑战性。按照传统定义，这不是问题，因为输入是一个列向量，输出也是一个列向量（见动画（1））。
- en: Another consideration is multiplying a chain of matrices. In the traditional
    method, it is so easy to see first of all that the chain of matrices below can
    be multiplied together based on their dimensionalities.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个考虑因素是矩阵链的乘法。在传统方法中，首先很容易看出下面的矩阵链可以根据它们的维度相乘。
- en: '![](../Images/e6f81256a678886149bd5919f1266d98.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e6f81256a678886149bd5919f1266d98.png)'
- en: What matrix chain multiplication looks like with the traditional accepted method.
    Image by author.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 使用传统接受的方法，矩阵链乘法看起来是什么样子。图由作者提供。
- en: Further, we can tell that the output matrix will have *l* rows and *p* columns.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们可以判断输出矩阵将有*l*行和*p*列。
- en: In the framework where the rows of the two matrices should line up, this quickly
    becomes a mess. For the first two matrices, we can tell that the rows should align
    and that the result will have *n* rows and *l* columns. But visualizing how many
    rows and columns the result will have and then reasoning about weather it’ll be
    compatible with *C*, etc. becomes a nightmare.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 在两个矩阵的行应该对齐的框架中，这很快就会变得混乱。对于前两个矩阵，我们可以判断行应该对齐，结果将具有*n*行和*l*列。但是，可视化结果将有多少行和列，然后推理它是否与*C*等兼容，变成了一场噩梦。
- en: '![](../Images/90c985ca4a462baa05068d91ad78caf7.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/90c985ca4a462baa05068d91ad78caf7.png)'
- en: What matrix chain multiplication might look like if we modified the definition
    of matrix multiplication. Image by author.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们修改了矩阵乘法的定义，矩阵链乘法可能看起来是什么样子。图由作者提供。
- en: And that is why we require the rows of the first matrix to align with the columns
    of the second matrix. But maybe I missed something. Maybe there is an alternate
    definition that is “cleaner” and manager to side-step these two challenges. Would
    love to hear ideas in the comments 🙂
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，我们要求第一个矩阵的行与第二个矩阵的列对齐。但也许我遗漏了什么。也许有一个“更干净”的定义，可以绕过这两个挑战。很乐意在评论中听到想法 🙂
- en: III-D) Matrix multiplication as a change of basis
  id: totrans-162
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: III-D) 矩阵乘法作为基变换
- en: So far, we’ve thought of matrix multiplication with vectors as a linear map
    that takes a vector as input and returns some other vector as output. But there
    is another way to think of matrix multiplication — as a way to change perspective.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们一直将矩阵乘法与向量的关系视为一个线性映射，它以一个向量作为输入并返回另一个向量作为输出。但还有另一种思考矩阵乘法的方式——作为一种改变视角的方式。
- en: Let’s consider two-dimensional space, *R². *We represent any vector in this
    space with two numbers. What do those numbers represent? The coordinates along
    the x-axis and y-axis. A unit vector that points just along the x-axis is *[1,0]* and
    one that points along the y-axis is *[0,1]*. These are our basis for the space.
    Every vector now has an address. For example, the vector *[2,3]* means we scale
    the first basis vector by *2* and the second one by *3*.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑二维空间，即*R²*。我们用两个数字来表示这个空间中的任何向量。这些数字代表什么？x轴和y轴上的坐标。沿着x轴指向的单位向量是*[1,0]*，沿着y轴指向的单位向量是*[0,1]*。这些是我们的空间基。现在每个向量都有一个地址。例如，向量*[2,3]*表示我们将第一个基向量按*2*倍缩放，第二个基向量按*3*倍缩放。
- en: But this isn’t the only basis for the space. Someone else (say, he who shall
    not be named) might want to use two other vectors as their basis. For example,
    the vectors *e1=[3,2] *and *e2=[1,1]*. Any vector in the space *R²* can also be
    expressed in their basis. The same vector would have different representations
    in our basis and their basis. Like different addresses for the same house (perhaps
    based on different postal systems).
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 但这并不是空间的基础的唯一选择。其他人（比如说，那个不应该被提及的人）可能想用另外两个向量作为他们的基础。例如，向量*e1=[3,2]*和*e2=[1,1]*。空间*R²*中的任何向量也可以用它们的基来表示。相同的向量在我们的基和它们的基中会有不同的表示。就像同一所房子的不同地址（也许基于不同的邮政系统）。
- en: When we’re in the basis of he who shall not be named, the vector *e1 = [1,0]*and
    the vector *e2 = [0,1] (*which are the basis vectors from his perspective by definition
    of basis vectors). And the functions that translates vectors from our basis system
    to that of he who shall not be named and vise-versa are linear maps. And so the
    translations can be represented as matrix multiplications. Let’s call the matrix
    that takes vectors from us to the vectors to he who shall not be named, *M1* and
    the matrix that does the opposite, *M2. *How do we find the matrices for these
    matrices?
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们处于“不能被提及的人”的基时，向量*e1 = [1,0]*和向量*e2 = [0,1]（根据基向量的定义，这是他的视角下的基向量）。将向量从我们的基系统转换为“不能被提及的人”的基以及相反的函数是线性映射。因此，这些转换可以用矩阵乘法表示。让我们称将向量从我们这里到“不能被提及的人”的向量的矩阵为*M1*，而执行相反操作的矩阵为*M2*。我们如何找到这些矩阵？
- en: '![](../Images/ab4f42264572f3540e0e3af001831a1d.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ab4f42264572f3540e0e3af001831a1d.png)'
- en: Shifting your perspective in seeing the world. Image by midjourney. Image by
    author.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 转变你看待世界的方式。图片由midjourney提供。图片由作者提供。
- en: We know that the vectors we call *e1=[3,2] *and *e2=[1,1], *he who shall not
    be named calls *e1=[1,0] *and *e2=[0,1]. *Let’s collect our version of the vectors
    into the columns of a matrix.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道我们称之为*e1=[3,2]*和*e2=[1,1]，而“不能被提及的人”称之为*e1=[1,0]*和*e2=[0,1]。让我们将我们的向量版本收集到矩阵的列中。
- en: '![](../Images/e1edb347d55d61b6b22af4f33dfaf313.png)'
  id: totrans-170
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e1edb347d55d61b6b22af4f33dfaf313.png)'
- en: A basic 2 by 2 matrix composed of two column vectors. Image by author.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 由两个列向量组成的基本2x2矩阵。图片由作者提供。
- en: And also collect the vectors, *e1* and *e2* of he who shall not be named into
    the columns of another matrix. This is just the identity matrix.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 还收集了“不能被提及的人”的向量*e1*和*e2*，将它们放入另一个矩阵的列中。这只是一个单位矩阵。
- en: '![](../Images/25e4bc9fe234a0dcbe39be9231d549cc.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/25e4bc9fe234a0dcbe39be9231d549cc.png)'
- en: We’d like to transform the 2 by 2 matrix into the identity matrix to change
    basis. Image by author.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望将2x2矩阵转换为单位矩阵以改变基。图片由作者提供。
- en: Since matrix multiplication operates independently on the columns of the second
    matrix,
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 由于矩阵乘法独立于第二矩阵的列操作，
- en: '![](../Images/e5a4214a3aabc42afa3da97c373710c0.png)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e5a4214a3aabc42afa3da97c373710c0.png)'
- en: The equation that moves the matrix to the identity. Image by author.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 将矩阵移动到单位矩阵的方程。图片由作者提供。
- en: Pre-multiplying by an appropriate matrix on both sides gives us *M1:*
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 在两边适当矩阵前乘以适当的矩阵，我们得到*M1:*。
- en: '![](../Images/eadb2030f3d93a6c6279018c4d46ffc6.png)'
  id: totrans-179
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eadb2030f3d93a6c6279018c4d46ffc6.png)'
- en: Changing basis with a matrix. Image by author.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 使用矩阵改变基。图片由作者提供。
- en: Doing the same thing in reverse gives us *M2:*
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 以相反的方式做同样的事情，给我们带来*M2:*。
- en: '![](../Images/25c3780031147ec1ce9670a7c3c70b82.png)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/25c3780031147ec1ce9670a7c3c70b82.png)'
- en: Reverse mapping to basis. Image by author.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 反向映射到基。图片由作者提供。
- en: 'This can all be generalized into the following statement: A matrix with column
    vectors; *w1, w2, …, wn* translates vectors expressed in a basis where *w1, w2,
    …, wn *are the basis vectors to our basis.'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这都可以概括为以下陈述：具有列向量；*w1, w2, …, wn*将基于*w1, w2, …, wn*是基向量的基中的向量转换为我们的基。
- en: And the inverse of that matrix translates vectors from our basis to the one
    where *w1, w2, …, wn *are the basis.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 那个矩阵的逆矩阵将向量从我们的基转换为*w1, w2, …, wn*是基的那个基。
- en: All square matrices can hence be thought of as “basis changers”.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，所有方阵都可以被视为“基变换器”。
- en: 'Note: In the special case of an orthonormal matrix (where every column is a
    unit vector and orthogonal to every other column), the inverse becomes the same
    as the transpose. So, changing to the basis of the columns of such a matrix becomes
    equivalent to taking the dot product of a vector with each of the rows.'
  id: totrans-187
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意：在正交矩阵的特殊情况下（其中每一列都是一个单位向量，并且与每一列都正交），逆矩阵与转置矩阵相同。因此，将此类矩阵的列基转换为等价于将向量与每一行进行点积。
- en: For more on this, see the [3B1B video, [1]](https://www.youtube.com/watch?v=P2LTAUO1TdA&t=2s).
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 更多关于这个问题的信息，请参阅[3B1B视频，[1]](https://www.youtube.com/watch?v=P2LTAUO1TdA&t=2s)。
- en: Conclusion
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Matrix multiplication is arguably one of the most important operations in modern
    computing and also with almost any data science field. Understanding deeply how
    it works is important for any data scientist. Most linear algebra textbooks describe
    the “what” but not why its structured the way it is. Hopefully this blog filled
    that gap.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵乘法可以说是现代计算中最重要的操作之一，也是几乎所有数据科学领域的操作。深入理解其工作原理对于任何数据科学家来说都很重要。大多数线性代数教科书描述了“是什么”，但没有解释为什么它以这种方式结构化。希望这篇博客填补了这一空白。
