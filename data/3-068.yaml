- en: Exporting MLflow Experiments from Restricted HPC Systems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从受限HPC系统导出MLflow实验
- en: 原文：[https://towardsdatascience.com/exporting-mlflow-experiments-from-restricted-hpc-systems/](https://towardsdatascience.com/exporting-mlflow-experiments-from-restricted-hpc-systems/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/exporting-mlflow-experiments-from-restricted-hpc-systems/](https://towardsdatascience.com/exporting-mlflow-experiments-from-restricted-hpc-systems/)
- en: <mdspan datatext="el1745458967409" class="mdspan-comment">Many High-Performance</mdspan>
    Computing (HPC) environments, especially in research and educational institutions,
    restrict communications to outbound TCP connections. Running a simple command-line
    *ping* or *curl* with the MLflow tracking URL on the HPC bash shell to check packet
    transfer can be successful. However, communication fails and times out while running
    jobs on nodes.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745458967409" class="mdspan-comment">许多高性能</mdspan>计算（HPC）环境，尤其是在研究和教育机构中，限制通信为出站TCP连接。在HPC
    bash shell上运行简单的命令行*ping*或*curl*，使用MLflow跟踪URL检查数据包传输可能会成功。然而，在节点上运行作业时，通信失败并超时。
- en: 'This makes it impossible to track and manage experiments on MLflow. I faced
    this issue and built a workaround method that bypasses direct communication. We
    will focus on:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得在MLflow上跟踪和管理实验变得不可能。我遇到了这个问题，并构建了一个绕过直接通信的解决方案。我们将关注：
- en: Setting up a local HPC MLflow server on a port with local directory storage.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在具有本地目录存储的端口上设置本地HPC MLflow服务器。
- en: Use the local tracking URL while running Machine Learning experiments.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在运行机器学习实验时，请使用本地跟踪URL。
- en: Export the experiment data to a local temporary folder.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将实验数据导出到本地临时文件夹中。
- en: Transfer experiment data from the local temp folder on HPC to the Remote MLflow
    server.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将HPC上本地临时文件夹中的实验数据传输到远程MLflow服务器。
- en: Import the experiment data into the databases of the Remote MLflow server.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将实验数据导入远程MLflow服务器的数据库中。
- en: I have deployed Charmed MLflow (MLflow server, MySQL, MinIO) using juju, and
    the whole thing is hosted on MicroK8s localhost. You can find the installation
    guide from Canonical [here](https://documentation.ubuntu.com/charmed-mlflow/en/latest/tutorial/mlflow/).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我已使用juju部署了Charmed MLflow（MLflow服务器、MySQL、MinIO），整个系统托管在MicroK8s localhost上。您可以从Canonical[这里](https://documentation.ubuntu.com/charmed-mlflow/en/latest/tutorial/mlflow/)找到安装指南。
- en: Prerequisites
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前提条件
- en: Make sure you have *Python* loaded on your HPC and installed on your MLflow
    server.For this entire article, I assume you have *Python 3.2*. You can make changes
    accordingly.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 确保您的HPC已加载*Python*并安装了您的MLflow服务器。在整个文章中，我假设您有*Python 3.2*。您可以相应地进行更改。
- en: '**On HPC:**'
  id: totrans-12
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: '**在HPC上：**'
- en: 1) Create a virtual environment
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 1) 创建一个虚拟环境
- en: '[PRE0]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 2) Install MLflow
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 2) 安装MLflow
- en: '[PRE1]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**On both HPC and MLflow Server:**'
  id: totrans-17
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: '**在HPC和MLflow服务器上：**'
- en: 1) Install mlflow-export-import
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 1) 安装mlflow-export-import
- en: '[PRE2]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'On HPC:'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在HPC：
- en: '1) Decide on a port where you want the local MLflow server to run. You can
    use the below command to check if the port is free (should not contain any process
    IDS):'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 1) 确定您希望本地MLflow服务器运行的端口号。您可以使用以下命令检查端口是否空闲（不应包含任何进程ID）：
- en: '[PRE3]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '2) Set the environment variable for applications that want to use MLflow:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 2) 为希望使用MLflow的应用程序设置环境变量：
- en: '[PRE4]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '3) Start the MLflow server using the below command:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 3) 使用以下命令启动MLflow服务器：
- en: '[PRE5]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Here, we set the path to the local storage in a folder called mlruns. Metadata
    like experiments, runs, parameters, metrics, tags and artifacts like model files,
    loss curves, and other images will be stored inside the mlruns directory. We can
    set the host as 0.0.0.0 or 127.0.0.1(more secure). Since the whole process is
    short-lived, I went with 0.0.0.0\. Finally, assign a port number that is not used
    by any other application.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将本地存储的路径设置在一个名为mlruns的文件夹中。元数据，如实验、运行、参数、指标、标签以及模型文件、损失曲线和其他图像等，将存储在mlruns目录中。我们可以将主机设置为0.0.0.0或127.0.0.1（更安全）。由于整个过程是短暂的，我选择了0.0.0.0。最后，分配一个未被任何其他应用程序使用的端口号。
- en: (Optional) Sometimes, your HPC might not detect *libpython3.12,* which basically
    makes Python run. You can follow the steps below to find and add it to your path.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: （可选）有时，您的HPC可能无法检测到*libpython3.12*，这基本上使得Python运行。您可以按照以下步骤查找并将其添加到您的路径中。
- en: 'Search for *libpython3.12*:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索*libpython3.12*：
- en: '[PRE6]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Returns something like: /path/to/python/3.12/lib/libpython3.12.so.1.0'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 返回类似以下内容：/path/to/python/3.12/lib/libpython3.12.so.1.0
- en: 'Set the path as an environment variable:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 将路径设置为环境变量：
- en: '[PRE7]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '4) We will export the experiment data from the mlruns local storage directory
    to a temp folder:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 4) 我们将从mlruns本地存储目录导出实验数据到临时文件夹：
- en: '[PRE8]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '(Optional) Running the *export_experiment* function on the HPC bash shell may
    cause thread utilisation errors like:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: （可选）在 HPC bash shell 上运行 *export_experiment* 函数可能会引起线程利用率错误，例如：
- en: '`OpenBLAS blas_thread_init: pthread_create failed for thread X of 64: Resource
    temporarily unavailable`'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '`OpenBLAS blas_thread_init: pthread_create failed for thread X of 64: Resource
    temporarily unavailable`'
- en: This happens because MLflow internally uses *SciPy* for artifacts and metadata
    handling, which requests threads through *OpenBLAS,* which is more than the allowed
    limit set by your HPC. In case of this issue, limit the number of threads by setting
    the following environment variables.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为 MLflow 内部使用 *SciPy* 处理工件和元数据，它通过 *OpenBLAS* 请求线程，这超过了你的 HPC 设置的允许限制。在这种情况下，通过设置以下环境变量来限制线程数量。
- en: '[PRE9]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: If the issue persists, try reducing the thread limit to 2.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如果问题仍然存在，尝试将线程限制减少到 2。
- en: '5) Transfer experiment runs to MLflow Server:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 5) 将实验运行传输到 MLflow 服务器：
- en: Move everything from the HPC to the temporary folder on the MLflow server.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有内容从 HPC 移动到 MLflow 服务器上的临时文件夹。
- en: '[PRE10]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '6) Stop the local MLflow server and clean up the ports:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 6) 停止本地 MLflow 服务器并清理端口：
- en: '[PRE11]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'On MLflow Server:'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 MLflow 服务器上：
- en: Our goal is to transfer experimental data from the tmp folder to *MySQL* and
    *MinIO*.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是将实验数据从 tmp 文件夹传输到 *MySQL* 和 *MinIO*。
- en: 1) Since MinIO is Amazon S3 compatible, it uses boto3 (AWS Python SDK) for communication.
    So, we will set up proxy AWS-like credentials and use them to communicate with
    MinIO using boto3.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 1) 由于 MinIO 与 Amazon S3 兼容，它使用 boto3（AWS Python SDK）进行通信。因此，我们将设置类似 AWS 的代理凭证，并使用它们通过
    boto3 与 MinIO 进行通信。
- en: '[PRE12]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 2) Below are the commands to transfer the data.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 2) 下面是传输数据的命令。
- en: Setting the MLflow server and MinIO addresses in our environment. To avoid repeating
    this, we can enter this in our .bashrc file.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的环境中设置 MLflow 服务器和 MinIO 的地址。为了避免重复，我们可以将其输入到我们的 .bashrc 文件中。
- en: '[PRE13]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: All the experiment files can be found under the exported_runs folder in the
    tmp directory. The *import-experiment* function finishes our job.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 所有实验文件都可以在 tmp 目录下的 exported_runs 文件夹中找到。*import-experiment* 函数完成了我们的工作。
- en: '[PRE14]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Conclusion
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The workaround helped me in tracking experiments even when communications and
    data transfers were restricted on my HPC cluster. Spinning up a local MLflow server
    instance, exporting experiments, and then importing them to my remote MLflow server
    provided me with flexibility without having to change my workflow.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这个解决方案帮助我在我的 HPC 集群上通信和数据传输受限的情况下跟踪实验。启动本地 MLflow 服务器实例，导出实验，然后将它们导入到我的远程 MLflow
    服务器，这为我提供了灵活性，而无需改变我的工作流程。
- en: However, if you are dealing with sensitive data, make sure your transfer method
    is secure. Creating cron jobs and automation scripts could potentially remove
    manual overhead. Also, be mindful of your local storage, as it is easy to fill
    up.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你正在处理敏感数据，请确保你的传输方式是安全的。创建 cron 作业和自动化脚本可以潜在地减少人工开销。同时，注意你的本地存储，因为它很容易被填满。
- en: In the end, if you are working in similar environments, this article can provide
    you with a solution without requiring any admin privileges in a short time. Hopefully,
    this helps teams who are stuck with the same issue. Thanks for reading this article!
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，如果你在类似的环境中工作，这篇文章可以在短时间内为你提供解决方案，而无需任何管理员权限。希望这能帮助那些遇到相同问题的团队。感谢阅读这篇文章！
- en: You can connect with me on [LinkedIn](https://www.linkedin.com/in/nagharjun-mathi-mariappan-b61499169/).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过 [LinkedIn](https://www.linkedin.com/in/nagharjun-mathi-mariappan-b61499169/)
    与我取得联系。
