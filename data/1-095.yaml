- en: Critical Mistakes Companies Make When Integrating AI/ML into Their Processes
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 公司在将人工智能/机器学习整合到其流程中时犯的致命错误
- en: 原文：[https://towardsdatascience.com/critical-mistakes-companies-make-when-integrating-ai-ml-into-their-processes/](https://towardsdatascience.com/critical-mistakes-companies-make-when-integrating-ai-ml-into-their-processes/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/critical-mistakes-companies-make-when-integrating-ai-ml-into-their-processes/](https://towardsdatascience.com/critical-mistakes-companies-make-when-integrating-ai-ml-into-their-processes/)
- en: <mdspan datatext="el1763065195293" class="mdspan-comment">I am currently a Lead
    Data Scientist</mdspan>, having spent my career working across a wide range of
    industries, from small startups to global corporations, from AI-first tech companies
    to heavily regulated banks. Over the years, I’ve seen many AI and ML initiatives
    succeed, but I’ve also seen a surprising number fail. The reasons for failure
    often have little to do with algorithms. The root cause is almost always how organizations
    approach AI.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763065195293" class="mdspan-comment">我目前是一名首席数据科学家</mdspan>，在我的职业生涯中，我曾在多个行业中工作，从小型初创公司到全球性企业，从以人工智能为先的公司到高度监管的银行。多年来，我看到了许多人工智能和机器学习项目的成功，但也看到了令人惊讶的数量失败。失败的原因通常与算法关系不大。根本原因几乎总是组织如何对待人工智能。
- en: This is not a checklist, how-to manual, or list of hard and fast rules. It’s
    a review of the most common errors I have come across, and some speculation regarding
    why they happen, and how I think they can be avoided.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一个清单、操作手册或一系列硬性规则。这是我对遇到的最常见错误进行的回顾，以及一些关于为什么它们会发生以及我认为如何避免它们的推测。
- en: 1\. Lack of a Solid Data Foundation
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 缺乏稳固的数据基础
- en: In the absence of poor, or little data, all too often due to low technical maturity,
    AI/ML projects are destined for failure. This occurs all too often when organizations
    form DS/ML teams before they have established solid Data Engineering habits.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在缺乏不良数据或数据不足的情况下，由于技术成熟度低，人工智能/机器学习项目注定要失败。这种情况在组织在建立稳固的数据工程习惯之前就组建了数据科学/机器学习团队时尤为常见。
- en: 'I had a manager say to me once, “Spreadsheets don’t make money.” In most companies,
    however, it’s the exact opposite: “spreadsheets” are the only tool that can push
    profits upward. Failing to do so means falling prey to the classic ML aphorism:
    “garbage in, garbage out.”'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾经有一位经理对我说，“电子表格不能赚钱。”然而，在大多数公司中，情况正好相反：“电子表格”是唯一可以推动利润上升的工具。未能做到这一点意味着陷入了经典的机器学习格言：“垃圾输入，垃圾输出。”
- en: 'I used to work in a regional food delivery company. Dreams for the DS team
    were sky-high: deep learning recommender systems, Gen AI, etc. But the data was
    a shambles: too much old architecture so sessions and bookings could not be reliably
    linked because there wasn’t a single key ID; restaurant dish IDs rotated every
    two weeks, so it was impossible to safely assume what customers actually ordered.
    This and many other issues meant every project was 70% workarounds. No time or
    resources for elegant solutions. But for a handful of them, none of the projects
    had yielded any results within one year because they were conceived based on data
    that could not be trusted.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾经在一家人工智能数据科学团队工作。我们对数据科学团队的梦想是高远的：深度学习推荐系统、通用人工智能等。但数据一团糟：太多的旧架构，导致会话和预订无法可靠地关联，因为没有唯一的键ID；餐厅菜品ID每两周轮换一次，因此无法安全地假设顾客实际订购了什么。这些问题以及许多其他问题意味着每个项目有70%的工作是权宜之计。没有时间或资源来寻找优雅的解决方案。但其中一些项目，由于基于不可信的数据而构思，一年内没有产生任何结果。
- en: '***Takeaway:** Invest in Data Engineering and data quality monitoring before
    ML. Keep it straightforward. Early wins and “low-hanging fruits” don’t necessarily
    require high-quality data, but AI definitely will.*'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '***要点：**在机器学习之前投资于数据工程和数据质量监控。保持简单。早期的胜利和“低垂的果实”不一定需要高质量的数据，但人工智能肯定需要。*'
- en: 2\. No Clear Business Case
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 缺乏明确的企业案例
- en: ML is typically done because it’s trendy rather than for solving a real problem,
    especially given the LLM and Agentic AI hype. Companies build use cases around
    the technology rather than the other way around, ending up building overly complicated
    or redundant solutions.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习通常是因为它很时髦，而不是为了解决实际问题，尤其是在LLM和代理人工智能炒作的背景下。公司围绕技术构建用例，而不是反过来，最终构建出过于复杂或冗余的解决方案。
- en: Think of an AI assistant in a utility bill payment application where customers
    only press three buttons, or an AI translator of dashboards when the solution
    should be making dashboards understandable. A quick Google search for examples
    of failed AI assistants will turn up numerous such instances.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，在一个水费支付应用程序中，有一个AI助手，客户只需按三个按钮，或者在一个仪表盘解决方案中，有一个AI翻译器，使得仪表盘易于理解。快速在谷歌上搜索失败的AI助手例子，会出现许多这样的实例。
- en: One such instance in my working life was a project to build an assistant on
    a restaurant discovery and booking app (a dining aggregator, let’s say). LLMs
    were all the rage, and there was FOMO from the top. They decided to develop a
    low-priority safe service with a user-confronted chat assistant. The assistant
    would propose restaurants according to requests like “show me good places with
    discounts,” “I want a fancy dinner with my girlfriend,” or “find pet-friendly
    places.”
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我职业生涯中的一个例子是在一个餐厅发现和预订应用程序（一个餐饮聚合器，让我们这么说）上构建一个助手的项目。大型语言模型（LLMs）非常流行，高层有恐惧错过的感觉。他们决定开发一个低优先级的保险服务，使用户面对的聊天助手。助手会根据像“显示有折扣的好地方”、“我想和女朋友吃一顿豪华晚餐”或“找到宠物友好的地方”这样的请求来推荐餐厅。
- en: 'A year was spent developing it by the team: hundreds of scenarios were designed,
    guardrails were tuned, backend made bulletproof. But the essence of the matter
    was that this assistant did not solve any real user pain points. A very small
    percentage of users even tried to use it and among them only a statistically insignificant
    number of sessions resulted in bookings. The project was abandoned early and was
    not scaled to other services. If the team had started with the confirmation of
    the use case instead of assistant features, such a destiny could not have been
    attained.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 团队花了一年时间开发它：设计了数百种场景，调整了护栏，后端变得坚不可摧。但问题的本质是，这个助手并没有解决任何真正的用户痛点。甚至只有极少数用户尝试使用它，在他们中间，只有统计上不显著的数量会话导致了预订。项目早期就被放弃，并且没有扩展到其他服务。如果团队从确认用例而不是助手功能开始，这样的命运可能就不会发生。
- en: '***Takeaway:** Start with the problem always. Understand the pain point deeply,
    assign its value in numbers, and only then start the development journey.*'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**要点：**始终从问题开始。深入理解痛点，用数字为其赋值，然后才开始开发之旅。'
- en: 3\. Chasing Complexity Before Nailing the Basics
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 在掌握基础知识之前追求复杂性
- en: 'Most communities jump to the latest version without stopping to see if the
    simpler methods would suffice. One size does not fit all. An incremental approach,
    beginning simple and incrementing as required, almost always results in greater
    ROI. Why make it more complex than it needs to be when linear regression, pre-trained
    models, or plain heuristics will suffice? Beginning simple provides insights:
    you learn about the problem, find out why you did not succeed, and have a sound
    basis for iterating later.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数社区都会跳到最新版本，而不停下来看看是否简单的办法就足够了。一种尺寸并不适合所有人。一种渐进的方法，从简单开始，根据需要逐步增加，几乎总是会产生更高的投资回报率。为什么要把事情做得比必要的更复杂呢？当线性回归、预训练模型或简单的启发式方法就足够时？从简单开始可以提供洞察：你了解问题，找出为什么你没有成功，并为后续迭代提供一个坚实的基础。
- en: 'I’ve implemented a project to design a shortcut widget on the home page of
    a multi-service app that includes ride-hailing involved. The idea was simple:
    predict if a user had launched the app to request a ride, and if so, predict where
    it would most probably go so the user could book it in one touch. Management decreed
    that the solution must be a neural network and could be nothing else. Four months
    of painful evolving afterwards, we found that the predictions performed amazingly
    well for maybe 10% of riders with deep ride-hailing histories. Even for them,
    the predictions were terrible. And the problem was finally fixed in one night
    by a set of business rules. Months of wasted effort could have been avoided if
    the company had started conservatively.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我实施了一个项目，旨在设计一个多服务应用程序首页上的快捷小部件，其中包含打车服务。想法很简单：预测用户是否启动了应用程序来请求打车，如果是的话，预测他们最有可能去的地方，以便用户可以一键预订。管理层规定解决方案必须是神经网络，不能是其他任何东西。经过四个月的痛苦演变之后，我们发现对于可能有深度打车历史的10%的乘客，预测表现得非常好。即使对他们来说，预测也是糟糕的。而问题最终在一夜之间通过一系列业务规则得到了解决。如果公司一开始就保守一些，可以避免几个月的徒劳努力。
- en: '***Takeaway:** Walk before you run. Use complexity as a last resort, not a
    starting point.*'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**要点：**先走后跑。将复杂性作为最后的手段，而不是起点。'
- en: 4\. Disconnect Between ML Teams and the Business
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 机器学习团队与业务之间的脱节
- en: 'In most organizations, Data Science is an island. Teams build technically stunning
    solutions that never get to see the light of day because they don’t solve the
    right problems, or because business stakeholders don’t trust them. The reverse
    is no better: when business leaders attempt to dictate technical development in
    toto, set unachievable expectations, and push broken solutions no one can defend.
    Equilibrium is the answer. ML thrives best when it’s an exercise in collaboration
    between domain experts, engineers, and decision-makers.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数组织中，数据科学是一个孤岛。团队构建了技术上令人惊叹的解决方案，但这些方案从未得到应用，因为它们没有解决正确的问题，或者因为业务利益相关者不信任它们。相反的情况也好不到哪里去：当业务领导者试图全面指挥技术发展，设定无法实现的目标，并推动无人能捍卫的解决方案时。平衡是答案。机器学习在领域专家、工程师和决策者之间的协作中茁壮成长。
- en: I’ve seen this most often in large non-IT-native companies. They realize AI/ML
    has huge potential and set up “AI labs” or centers of excellence. The problem
    is these labs often work in complete isolation from the business, and their solutions
    are rarely adopted. I worked for a large bank that had just such a laboratory.
    There were highly seasoned experts there, but they never met with business stakeholders.
    Worse yet, the laboratory was set up as a stand-alone subsidiary, and exchanging
    data was impossible. The firm was not that interested in the lab’s work, which
    did end up going into research papers for academics but not into the actual processes
    of the company.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我最常见到这种情况是在大型非IT原生公司。他们意识到人工智能/机器学习具有巨大的潜力，并设立了“AI实验室”或卓越中心。问题是这些实验室通常与业务完全隔离，他们的解决方案很少被采用。我曾为一家大型银行工作，那里就有这样一个实验室。那里有经验丰富的专家，但他们从未与业务利益相关者会面。更糟糕的是，实验室被设立为一个独立的子公司，数据交换是不可能的。公司对实验室的工作并不感兴趣，最终这些工作只是变成了学术界的论文，而没有进入公司的实际流程。
- en: '***Takeaway:** Keep ML initiatives tightly aligned with business needs. Collaborate
    early, communicate often, and iterate with stakeholders, even if it slows development.*'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**要点：** 将机器学习倡议与业务需求紧密对齐。尽早合作，经常沟通，并与利益相关者迭代，即使这会减缓开发速度。'
- en: 5\. Ignoring MLOps
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 忽视MLOps
- en: Cron jobs and clunky scripts will work at a small scale. That said, as the firm
    scales, this is a recipe for disaster. Without MLOps, small tweaks require engaging
    original developers every step of the way, and systems are fully rewritten over
    and over again.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在小规模上，定时任务和笨拙的脚本可以工作。但话说回来，随着公司规模的扩大，这将成为灾难的配方。没有MLOps，即使是微小的调整也需要每一步都涉及原始开发者，系统被一次又一次地完全重写。
- en: Early investment in MLOps pays exponentially. It is not purely about technology,
    but having a stable, scalable, and sustainable ML culture.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在MLOps上的早期投资会带来指数级的回报。这不仅仅关乎技术，更在于建立一个稳定、可扩展和可持续的机器学习文化。
- en: Investing in MLOps early pays off exponentially. It’s not just about technology;
    it’s about creating a culture of reliable, scalable, and maintainable ML.  Do
    not let chaos befall you. Establish good processes, platforms, and training prior
    to ML projects running wild.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 早期投资MLOps会带来指数级的回报。这不仅仅是关于技术；这是关于创造一个可靠、可扩展和可维护的机器学习文化。不要让混乱降临到你身上。在机器学习项目失控之前，建立良好的流程、平台和培训。
- en: I worked at a telecom subsidiary firm that did AdTech. The platform was serving
    internet advertising and was the company’s largest revenue-generate. Because it
    was new (only a year old) the ML solution was desperately brittle. Models were
    merely wrapped in C++ and plopped into product code by a single engineer. Integrations
    were only performed if that engineer was present, models were never kept track
    of, and once the original author left, no one had a clue about how they were working.
    If the shift engineer had also left, the whole platform would have been down permanently.
    Such exposure could have been prevented with good MLOps.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾在一家人工智能技术子公司工作。该平台服务于互联网广告，是公司最大的收入来源。因为它很新（只有一年），机器学习解决方案极其脆弱。模型只是被一个工程师用C++包装，然后直接放入产品代码中。只有当那个工程师在场时才会进行集成，模型从未被跟踪，一旦原始作者离开，就没有人知道它们是如何工作的。如果换班工程师也离开了，整个平台将永久关闭。这种风险本可以通过良好的MLOps来预防。
- en: 6\. Lack of A/B Testing
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 缺乏A/B测试
- en: Some businesses avoid A/B testing due to complexity and opt for backtests or
    intuition instead. That allows bad models to reach production. Without a testing
    platform, one can’t know which models actually perform. Proper experimentation
    frameworks are required for iterative improvement, especially at scale.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 一些企业由于复杂性和避免A/B测试，而选择回测或直觉代替。这会让不良模型进入生产环境。没有测试平台，就无法知道哪些模型真正表现良好。需要适当的实验框架来进行迭代改进，尤其是在规模较大的情况下。
- en: What tends to hold back adoption is the feeling of complexity. But a straightforward,
    streamlined A/B testing process can function well in the early days and doesn’t
    require huge up-front investment. Alignment and training are really the largest
    keys.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 通常阻碍采用的因素是复杂感。但一个简单、流畅的A/B测试流程在早期可以很好地工作，并且不需要巨大的前期投资。对齐和培训确实是最大的关键。
- en: In my case, without any sound way to measure user impact, it is up to how well
    a manager can sell it. Good pitches get funded, get fervently defended, and sometimes
    last even when numbers reduce. Metrics are manipulated by simply comparing pre/post
    launch numbers. If they did increase, then the project is a success, although
    it just so happened to be a general up trend. In growing firms, there are millions
    of subpar projects hidden behind overall growth because there is no A/B testing
    to continually separate successes from failures.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的情况下，没有一种可靠的方式来衡量用户影响，这取决于管理者如何推销它。好的提案会得到资助，得到热烈的辩护，有时即使数字减少，也会持续下去。通过简单地比较发布前后的数据来操纵指标。如果它们确实增加了，那么项目就是成功的，尽管这只是一个普遍的上升趋势。在增长型企业中，有成百万的次级项目隐藏在整体增长背后，因为没有A/B测试来持续区分成功和失败。
- en: '***Takeaway:** Create experimentation capacity early. Test large deployments
    required and let teams interpret results properly.*'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**要点：** 早期建立实验能力。测试所需的大规模部署，并让团队正确解读结果。'
- en: 7\. Undertrained Management
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 缺乏训练的管理
- en: Undertrained ML management can misread metrics, misread experiment results,
    and make strategic mistakes. It is equally crucial to educate decision-makers
    as it is to educate engineering teams.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏训练的机器学习管理可能会误解指标，误解实验结果，并做出战略错误。教育决策者与教育工程团队同样重要。
- en: 'I was once working with a team that had all the tech they needed, plus robust
    MLOps and A/B testing But managers didn’t know how to use them. They used the
    wrong statistical tests, killed experiments after one day when “statistical significance”
    had been achieved (usually with far too few observations), and launched features
    with no measurable impact. The result: many launches had a negative impact. The
    managers themselves were not bad people, they simply did not understand how to
    use their tools.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾经和一个团队一起工作，他们拥有所有需要的科技，还有强大的MLOps和A/B测试，但管理者不知道如何使用它们。他们使用了错误的统计测试，在“统计显著性”达到后（通常观察数据过少）就结束了实验，并推出了没有可衡量影响的功能。结果是：许多发布产生了负面影响。管理者本身并不是坏人，他们只是不理解如何使用他们的工具。
- en: 8\. Misaligned Metrics
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8. 不一致的指标
- en: While ML/DS organizations need to be business-aligned, that does not imply that
    they need to have business instincts. ML practitioners will also align to whatever
    metrics are provided to them if they feel they are correct. If ML objectives are
    misaligned with firm goals, then the result will be perverse. For example, if
    profitability is what the company wants but maximizing new-user conversion is
    a goal of the ML organization, they’ll maximize unprofitable growth through adding
    bad unit economics users who never return.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然机器学习/数据科学组织需要与业务对齐，但这并不意味着他们需要具备商业直觉。如果机器学习从业者觉得提供的指标是正确的，他们也会对任何指标进行对齐。如果机器学习目标与公司目标不一致，结果将会适得其反。例如，如果公司想要的是盈利能力，而机器学习组织的目标是最大化新用户转化率，那么他们将通过添加从未回归的坏单位经济用户来最大化无利可图的增长。
- en: This is a pain point for many companies. A food delivery company wished to grow.
    Management observed low conversion of new users as the problem restraining the
    business from growing revenue. The DS team was requested to solve it with personalization
    and customer experience upliftment. The real problem was retention, the converted
    users didn’t come back. Instead of retention, the team focused on conversion,
    effectively filling water into a leaking bucket. Even though the rate of conversion
    picked up, it was not translated into sustainable growth. These mistakes are no
    business or industry size specific—these are universal errors.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这对许多公司来说是一个痛点。一家食品配送公司希望扩大规模。管理层观察到新用户的转化率低，这是阻碍业务增长收入的问题。DS团队被要求通过个性化提升客户体验来解决这一问题。真正的问题是留存率，转化后的用户没有回来。团队没有关注留存率，而是专注于转化，实际上是在往一个漏水的水桶里灌水。尽管转化率有所提高，但这并没有转化为可持续的增长。这些错误并不特定于任何商业或行业规模——这些都是普遍的错误。
- en: They can be prevented nonetheless. AI and ML do work when crafted on sound principles,
    designed to solve real issues, and carefully implemented in business. When all
    the conditions are right, AI and ML turn into disruptive technologies with the
    potential to upend entire businesses.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这些错误是可以避免的。当人工智能和机器学习基于良好的原则、旨在解决实际问题且在商业中谨慎实施时，它们确实有效。当所有条件都恰到好处时，人工智能和机器学习就会变成具有颠覆整个企业潜力的技术。
- en: '***Takeaway:** Make ML metrics align with true business objectives. Fight causes,
    not symptoms. Value long-term performance, not short-term metrics.*'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**要点：** 使机器学习指标与真正的商业目标一致。对抗原因，而不是症状。重视长期表现，而不是短期指标。'
- en: Conclusion
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'The path to AI/ML success is less about bleeding-edge algorithms and more about
    organizational maturity. The patterns are apparent: failures arise from rushing
    into complexity, misaligning incentives, and ignoring foundational infrastructure.
    Success demands patience, discipline, and an openness to starting small.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 通往人工智能/机器学习成功之路，与其说是关于最前沿的算法，不如说是关于组织的成熟度。模式是明显的：失败源于急于求成、激励措施不匹配和忽视基础基础设施。成功需要耐心、纪律和对从小处开始的开放态度。
- en: The positive news is that all of these errors are completely avoidable. Firms
    that put data infrastructure in place first, maintain close coordination between
    technical and business teams, and are not distracted by fads will discover that
    AI/ML does precisely what it promises on the can. The technology does function,
    but it has to be on firm foundations.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，所有这些错误都是完全可以避免的。那些首先建立数据基础设施、保持技术和业务团队之间紧密协调、不被潮流所干扰的公司会发现，人工智能/机器学习确实如其所承诺的那样发挥作用。这项技术确实有效，但它必须建立在稳固的基础上。
- en: 'If there is one tenet that binds all of this together, it is this: AI/ML is
    a tool, not a destination. Begin with the problem, confirm the need, develop iteratively,
    and measure always. Those businesses that approach it with this mindset not only
    don’t fail. Instead, they create long-term competitive differentiators that compound
    over time.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有一个原则将所有这些联系在一起，那就是这个：人工智能/机器学习是一个工具，而不是一个目的地。从问题开始，确认需求，迭代开发，并始终衡量。那些以这种心态来处理这些业务的公司不仅不会失败，反而会创造长期竞争优势，随着时间的推移而累积。
- en: The future does not belong to firms with the newest models, but to firms that
    have the discipline of applying them sensibly.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 未来不属于拥有最新模型的公司，而是属于那些有纪律合理应用它们的公司。
