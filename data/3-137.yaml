- en: '[PRE20]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: '**The catch method**'
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**捕获方法**'
- en: Errors can be automatically logged when they occur using the catch method.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 当错误发生时，可以使用捕获方法自动记录错误。
