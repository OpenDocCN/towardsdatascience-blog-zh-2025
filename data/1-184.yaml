- en: Python 3.14 and the End of the GIL
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Python 3.14 和 GIL 的终结
- en: 原文：[https://towardsdatascience.com/python-3-14-and-the-end-of-the-gil/](https://towardsdatascience.com/python-3-14-and-the-end-of-the-gil/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/python-3-14-and-the-end-of-the-gil/](https://towardsdatascience.com/python-3-14-and-the-end-of-the-gil/)
- en: '<mdspan datatext="el1760675204264" class="mdspan-comment">Python 3.14, one</mdspan>
    of the most eagerly awaited releases in recent times, is finally here. The reason
    for this is that several exciting enhancements have been implemented in this release,
    including:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760675204264" class="mdspan-comment">Python 3.14，一个</mdspan>近期最受期待的版本终于发布了。这是因为在这个版本中实现了几个令人兴奋的增强功能，包括：
- en: '**Sub-interpreters**. These have been available in Python for 20 years, but
    to use them, you had to drop down to coding in C. Now they can be used straight
    from Python itself.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**子解释器**。这些在 Python 中已经可用 20 年了，但为了使用它们，你必须降低到用 C 语言编码。现在可以直接从 Python 本身使用它们。'
- en: '**T-Strings**. Template strings are a new method for custom string processing.
    They use the familiar syntax of f-strings, but, unlike f-strings, they return
    an object representing both the static and interpolated parts of the string, instead
    of a simple string.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**T-Strings**。模板字符串是自定义字符串处理的新方法。它们使用熟悉的 f-strings 语法，但与 f-strings 不同，它们返回一个表示字符串的静态和插值部分的对象，而不是一个简单的字符串。'
- en: '**A just-in-time compiler.** This is still an experimental feature and should
    not be used in production systems; however, it promises a performance boost for
    specific use cases.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**即时编译器**。这仍然是一个实验性功能，不应在生产系统中使用；然而，它承诺为特定用例提供性能提升。'
- en: There are many more enhancements in Python 3.14, but this article is not about
    those or the ones we mentioned above.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: Python 3.14 中还有许多其他增强功能，但本文不是关于那些或上面提到的那些。
- en: 'Instead, we will be discussing what is probably the most anticipated feature
    in this release: free-threaded Python, also known as GIL-free Python. Note that
    regular Python 3.14 will still run with the GIL enabled, but you can download
    (or build) a separate, free-threaded version. I’ll show you how to download and
    install it, and through several coding examples, demonstrate a comparison of run
    times between regular and GIL-free Python 3.14.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我们将讨论这个版本中可能最受期待的功能：免费线程的 Python，也称为无 GIL 的 Python。请注意，常规的 Python 3.14 仍然会启用
    GIL 运行，但你可以下载（或构建）一个单独的、免费线程的版本。我将向您展示如何下载和安装它，并通过几个编码示例，演示常规和无 GIL 的 Python 3.14
    之间的运行时间比较。
- en: What is the GIL?
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是 GIL？
- en: Many of you will be aware of the Global Interpreter Lock (GIL) in Python. The
    GIL is a mutex—a locking mechanism—used to synchronise access to resources, and
    in Python, ensures that only one thread is executing bytecode at a time.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人可能都知道 Python 中的全局解释器锁（GIL）。GIL 是一个互斥锁——一种锁定机制，用于同步对资源的访问，在 Python 中确保一次只有一个线程执行字节码。
- en: On the one hand, this has several advantages, including making it easier to
    perform thread and memory management, avoiding race conditions, and integrating
    Python with C/C++ libraries.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 一方面，这有几个优点，包括使线程和内存管理更容易进行，避免竞争条件，以及将 Python 与 C/C++ 库集成。
- en: On the other hand, the GIL can stifle parallelism. With the GIL in place, true
    parallelism for CPU-bound tasks across multiple CPU cores within a single Python
    process is not possible.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，GIL 可能会抑制并行性。在有 GIL 的情况下，单个 Python 进程内多个 CPU 核心之间的 CPU 密集型任务的真正并行性是不可能的。
- en: Why this matters
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这为什么重要
- en: In a word, **“performance”.**
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，**“性能”。**
- en: Because free-threaded execution can use all the available cores on your system
    simultaneously, code will often run faster. As data scientists and ML or data
    engineers, this applies not only to your code but also to the code that builds
    the systems, frameworks, and libraries that you rely on.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 因为免费线程执行可以同时使用系统上所有可用的核心，代码通常会运行得更快。作为数据科学家和 ML 或数据工程师，这不仅适用于你的代码，也适用于构建你依赖的系统、框架和库的代码。
- en: Many machine learning and data science tasks are CPU-intensive, particularly
    during model training and data preprocessing. The removal of the GIL could lead
    to significant performance improvements for these CPU-bound tasks.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 许多机器学习和数据科学任务都是 CPU 密集型的，尤其是在模型训练和数据预处理期间。移除 GIL 可能会导致这些 CPU 密集型任务的性能显著提升。
- en: A lot of popular libraries in Python face constraints because they have had
    to work around the GIL. Its removal could lead to:-
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 许多 Python 中流行的库由于必须绕过 GIL 而面临限制。其移除可能导致：-
- en: Simplified and potentially more efficient implementations of these libraries
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些库的简化和可能更有效的实现
- en: New optimisation opportunities in existing libraries
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现有库中的新优化机会
- en: Development of new libraries that can take full advantage of parallel processing
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发能够充分利用并行处理的新库
- en: Installing the free-threaded Python version
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装免费线程版的Python版本
- en: If you’re a Linux user, the only way to obtain free threading Python is to build
    it yourself. If, like me, you’re on Windows (or macOS), you can install it using
    the official installers from the Python website. During the process, you’ll have
    an option to customise your installation. Look for a checkbox to include the free-threaded
    binaries. This will install a separate interpreter that you can use to run your
    code without the GIL. I’ll demonstrate how the installation works on a 64-bit
    Windows system.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一名Linux用户，获取免费线程版Python的唯一方法是自行构建。如果你像我一样使用Windows（或macOS），你可以使用Python网站上的官方安装程序来安装它。在安装过程中，你可以自定义安装。寻找一个复选框以包含免费线程的二进制文件。这将安装一个单独的解释器，你可以使用它来运行你的代码而不受全局解释器锁（GIL）的限制。我将演示在64位Windows系统上如何进行安装。
- en: 'To get started, click the following URL:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，点击以下URL：
- en: '[https://www.python.org/downloads/release/python-3140](https://www.python.org/downloads/release/python-3140)'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.python.org/downloads/release/python-3140](https://www.python.org/downloads/release/python-3140)'
- en: And scroll down until you see a table that looks like this.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 然后向下滚动，直到你看到如下表格。
- en: '![](../Images/f643b821a77e2dca30a57112ed81303d.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f643b821a77e2dca30a57112ed81303d.png)'
- en: Image from Python website
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 来自Python网站的图片
- en: Now, click on the Windows Installer (64-bit) link. Once the executable has been
    downloaded, open it and, on the first installation screen that’s displayed, click
    on the **Customize Installation** link. Note that I also checked the **Add Python.exe
    to path** checkbox.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，点击Windows安装程序（64位）链接。一旦可执行文件下载完成，打开它，在显示的第一个安装屏幕上，点击**自定义安装**链接。请注意，我也勾选了**将Python.exe添加到路径**的复选框。
- en: On the next screen, select the optional extras you want to add to the installation,
    then click **Next** again**.** At this point, you should see a screen like this,
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一屏，选择你想要添加到安装中的可选组件，然后再次点击**下一步**。此时，你应该看到一个类似这样的屏幕，
- en: '![](../Images/6e92867dd27546cd6f53b779dafa6fcf.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6e92867dd27546cd6f53b779dafa6fcf.png)'
- en: Image from Python installer
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 来自Python安装程序的图片
- en: Ensure the checkbox next to **Download free-threaded binaries** is selected.
    I also checked the **Install Python 3.14 for all users** option.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 确保选中**下载免费线程二进制文件**旁边的复选框。我还勾选了**为所有用户安装Python 3.14**选项。
- en: Click the Install button.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 点击安装按钮。
- en: Once the download has finished, in the install folder, look for a Python application
    file with a ‘t’ on the end of its name. This is the GIL-free version of Python.
    The application file, called Python, is the regular Python executable. In my case,
    the GIL-free Python was called Python3.14t. You can check that it’s been correctly
    installed by typing this into a command line.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 下载完成后，在安装文件夹中，寻找一个以't'结尾的Python应用程序文件。这是无GIL的Python版本。应用程序文件，名为Python，是常规Python可执行文件。在我的情况下，无GIL的Python被称为Python3.14t。你可以通过在命令行中输入以下内容来检查它是否已正确安装。
- en: '[PRE0]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: If you see this, you’re all set. Otherwise, check that the installation location
    has been added to your PATH environment variable and/or double-check your installation
    steps.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看到这个，那么你已经设置好了。否则，请检查安装位置是否已添加到你的PATH环境变量中，或者再次检查你的安装步骤。
- en: As we’ll be comparing the GIL-free Python runtimes with the regular Python runtimes,
    we should also verify that this is also installed correctly.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们将比较无GIL的Python运行时与常规Python运行时，我们也应该验证这一点是否已正确安装。
- en: '[PRE1]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: GIL vs GIL-free Python
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GIL与无GIL的Python
- en: '**Example 1 — Finding prime numbers**'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 1—寻找素数**'
- en: Type the following into a Python code file, e.g example1.py
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 将以下内容输入到Python代码文件中，例如example1.py
- en: '[PRE2]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The **is_prime** function checks if a given number is prime.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**is_prime**函数检查给定的数字是否为素数。'
- en: The **find_primes** function finds all prime numbers within a given range.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**find_primes**函数在给定的范围内找到所有的素数。'
- en: The **worker** function is the target for each thread, finding primes in a specific
    range.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**工作**函数是每个线程的目标，在特定范围内寻找素数。'
- en: 'The **main** function coordinates the multi-threaded prime search:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**主**函数协调多线程素数搜索：'
- en: It divides the total range into the number of chunks corresponding to the number
    of cores the system has (32 in my case).
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它将总范围划分为与系统核心数（在我的情况下是32）相对应的块数。
- en: Creates and starts 32 threads, each searching a small part of the range.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建并启动32个线程，每个线程搜索范围的一小部分。
- en: Waits for all threads to complete.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 等待所有线程完成。
- en: Calculates and prints the total execution time.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算并打印总执行时间。
- en: '**Timing results**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**计时结果**'
- en: Let’s see how long it takes to run using regular Python.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看使用常规Python运行需要多长时间。
- en: '[PRE3]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Now, with the GIL-free version:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，使用无GIL版本：
- en: '[PRE4]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: That’s an impressive start. A 10x improvement in runtime.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个令人印象深刻的开始。运行时间提高了10倍。
- en: '**Example 2 — Reading multiple files simultaneously.**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 2—同时读取多个文件**'
- en: In this example, we’ll use the concurrent.futures model to read multiple text
    files simultaneously and count and display the number of lines and words in each.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将使用concurrent.futures模型同时读取多个文本文件，并计算并显示每个文件中的行数和单词数。
- en: Before we do that, we need some data files to process. You can use the following
    Python code to do that. It generates 1,000,000 random, nonsensical sentences each
    and writes them to 20 separate text files, sentences_01.txt, sentences_02.txt,
    etc.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们这样做之前，我们需要一些数据文件来处理。您可以使用以下Python代码来完成此操作。它为每个文件生成1,000,000个随机、无意义的句子，并将它们写入20个单独的文本文件，例如sentences_01.txt、sentences_02.txt等。
- en: '[PRE5]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Here is what the start of sentences_01.txt looks like,
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这是sentences_01.txt的开头部分，
- en: '[PRE6]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: OK, now we can time how long it takes to read those files. Here is the code
    we’ll be testing. It simply reads each file, counts the lines and words, and outputs
    the results.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在我们可以计时读取这些文件需要多长时间了。这是我们将要测试的代码。它简单地读取每个文件，计算行数和单词数，并输出结果。
- en: '[PRE7]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**Timing results**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**计时结果**'
- en: Regular Python first.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 首先是常规Python。
- en: '[PRE8]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Now for the GIL-free version
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是无GIL版本
- en: '[PRE9]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Not quite as impressive as our first example, but still very good, showing a
    more than 3x improvement.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 不及我们第一个示例那么令人印象深刻，但仍然非常好，显示了超过3倍的性能提升。
- en: '**Example 3 — matrix multiplication**'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 3—矩阵乘法**'
- en: We’ll use the **threading** module for this. Here is the code we’ll be running.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用**线程**模块来完成这个任务。这是我们将要运行的代码。
- en: '[PRE10]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The code performs matrix multiplication of two 1000×1000 matrices in parallel
    using multiple CPU cores. It divides the result matrix into chunks, assigns each
    chunk to a separate process (equal to the number of CPU cores), and each process
    calculates its assigned portion of the matrix multiplication independently. Finally,
    it waits for all processes to finish and reports the total execution time, demonstrating
    how to leverage multiprocessing to speed up CPU-bound tasks.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 该代码使用多个CPU核心并行执行两个1000×1000矩阵的矩阵乘法。它将结果矩阵分成块，将每个块分配给一个单独的进程（等于CPU核心的数量），每个进程独立计算其分配的矩阵乘法部分。最后，它等待所有进程完成，并报告总执行时间，展示了如何利用多进程来加速CPU密集型任务。
- en: '**Timing results**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**计时结果**'
- en: 'Regular Python:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '常规Python:'
- en: '[PRE11]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'GIL-free Python:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 无GIL Python：
- en: '[PRE12]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Once again, we get almost a 10x improvement using GIL-free Python. Not too shabby.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我们使用无GIL Python几乎提高了10倍。还不错。
- en: '**GIL-free is not always better.**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**无GIL并不总是更好。**'
- en: An interesting point to note is that on this last test, I also tried it with
    a multiprocessing version of the code. It turned out that the regular Python was
    significantly faster (28%) than the GIL-free Python. I won’t present the code,
    just the results,
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 一个值得注意的有趣点是，在这个最后的测试中，我还尝试了代码的多进程版本。结果显示，常规Python比无GIL Python快得多（28%）。我不会展示代码，只展示结果，
- en: '**Timings**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**计时**'
- en: Regular Python first (multiprocessing).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 首先是常规Python（多进程）。
- en: '[PRE13]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: GIL-free version (multiprocessing)
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 无GIL版本（多进程）
- en: '[PRE14]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: As always in these situations, it’s important to test thoroughly.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些情况下，始终进行彻底的测试是很重要的。
- en: Bear in mind that these last examples ***are just*** tests to showcase the difference
    between GIL and GIL-free Python. Using an external library, such as NumPy, to
    perform matrix multiplication would be at least an order of magnitude faster than
    either.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这些最后的例子**仅仅是**测试，用于展示GIL和无GIL Python之间的差异。使用外部库，如NumPy，进行矩阵乘法至少会比两者快一个数量级。
- en: One other point to note if you decide to use free-threading Python in your workloads
    is that not all third-party libraries you might want to use are compatible with
    it. The list of incompatible libraries is small and shrinking with each release,
    but it’s something to keep in mind. To view a list of these, please click the
    link below.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您决定在工作负载中使用无线程Python，还有一个需要注意的点，那就是并非所有您可能想要使用的第三方库都与它兼容。不兼容库的列表很小，并且随着每个版本的发布而缩小，但这是需要记住的。要查看这些库的列表，请点击下面的链接。
- en: '[https://ft-checker.com](https://ft-checker.com)'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://ft-checker.com](https://ft-checker.com)'
- en: Summary
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this article, we discuss a potentially groundbreaking feature of the latest
    Python 3.14 release: the introduction of an optional “free-threaded” version,
    which removes the Global Interpreter Lock (GIL). The GIL is a mechanism in standard
    Python that simplifies memory management by ensuring only one thread executes
    Python bytecode at a time. Whilst acknowledging that this can be useful in some
    cases, it prevents true parallel processing on multi-core CPUs for CPU-intensive
    tasks.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们讨论了最新 Python 3.14 版本可能具有划时代意义的特性：引入了一个可选的“无锁线程”版本，该版本移除了全局解释器锁（GIL）。GIL
    是标准 Python 中的一种机制，通过确保一次只有一个线程执行 Python 字节码来简化内存管理。虽然承认在某些情况下这可能是有用的，但它阻止了多核 CPU
    在 CPU 密集型任务上的真正并行处理。
- en: The removal of the GIL in the free-threaded build is primarily aimed at enhancing
    **performance.** This can be especially useful for data scientists and machine
    learning engineers whose work often involves CPU-bound operations, such as model
    training and data preprocessing. This change allows Python code to utilise all
    available CPU cores simultaneously within a single process, potentially leading
    to significant speed improvements.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在无锁线程构建中移除 GIL 主要旨在提升 **性能**。这对于数据科学家和机器学习工程师特别有用，因为他们的工作通常涉及 CPU 密集型操作，如模型训练和数据预处理。这一变化允许
    Python 代码在单个进程中同时利用所有可用的 CPU 核心，可能带来显著的速度提升。
- en: 'To demonstrate the impact, the article presents several performance comparisons:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示影响，文章展示了几个性能比较：
- en: '**Finding prime numbers:** A multi-threaded script saw a dramatic **10x performance
    increase**, with execution time dropping from 3.70 seconds in standard Python
    to just 0.35 seconds in the GIL-free version.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**寻找素数：** 一个多线程脚本实现了显著的 **10 倍性能提升**，执行时间从标准 Python 中的 3.70 秒降低到 GIL 无版本中的
    0.35 秒。'
- en: '**Reading multiple files simultaneously:** An I/O-bound task using a thread
    pool to process 20 large text files was over **3 times faster**, completing in
    5.13 seconds compared to 18.77 seconds with the standard interpreter.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**同时读取多个文件：** 使用线程池处理 20 个大型文本文件的 I/O 密集型任务比标准解释器快 **3 倍以上**，完成时间为 5.13 秒，而使用标准解释器则需要
    18.77 秒。'
- en: '**Matrix multiplication:** A custom, multi-threaded matrix multiplication code
    also experienced a nearly **10x speedup**, with the GIL-free version finishing
    in 4.56 seconds, compared to 43.95 seconds for the standard version.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**矩阵乘法：** 一个定制的、多线程的矩阵乘法代码也实现了近 **10 倍的速度提升**，GIL 无版本完成时间为 4.56 秒，而标准版本则需要
    43.95 秒。'
- en: However, I also explained that the GIL-free version is not a panacea for Python
    code development. In a surprising turn, a multiprocessing version of the matrix
    multiplication code ran faster with standard Python (4.49 seconds) than with the
    GIL-free build (6.29 seconds). This highlights the importance of testing and benchmarking
    specific applications, as the overhead of process management in the GIL-free version
    can sometimes negate its benefits.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我也解释了 GIL 无版本并非 Python 代码开发的万能药。出人意料的是，矩阵乘法代码的多进程版本在标准 Python（4.49 秒）中运行速度比
    GIL 无版本构建（6.29 秒）更快。这突出了测试和基准测试特定应用程序的重要性，因为 GIL 无版本中进程管理的开销有时会抵消其好处。
- en: I also mentioned the caveat that not all third-party Python libraries are compatible
    with GIL-free Python and gave a URL where you can view a list of incompatible
    libraries.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我还提到了一个注意事项，即并非所有第三方 Python 库都与 GIL 无 Python 兼容，并给出了一个可以查看不兼容库列表的网址。
