  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Nvidia 博客 — SuperVize Me：监督学习、无监督学习、半监督学习和强化学习之间的区别是什么？](https://blogs.nvidia.com/blog/supervised-unsupervised-learning/)'
