  - PREF_UL
  type: TYPE_NORMAL
  zh: '[DataCamp 博客 — 监督机器学习](https://www.datacamp.com/blog/supervised-machine-learning)'
- en: '[DataCamp Blog — Introduction to Unsupervised Learning](https://www.datacamp.com/blog/introduction-to-unsupervised-learning)'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[DataCamp 博客 — 无监督学习简介](https://www.datacamp.com/blog/introduction-to-unsupervised-learning)'
