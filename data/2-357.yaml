- en: The Art of the Phillips Curve
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 菲利普斯曲线的艺术
- en: 原文：[https://towardsdatascience.com/the-art-of-the-phillips-curve/](https://towardsdatascience.com/the-art-of-the-phillips-curve/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/the-art-of-the-phillips-curve/)'
- en: <mdspan datatext="el1747076437712" class="mdspan-comment">Flick through</mdspan>
    any popular Macroeconomic textbook of the last 50 years and you will quickly land
    on a page that mentions the Phillips curve. And then another page, and then another…
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747076437712" class="mdspan-comment">翻阅</mdspan>过去50年中任何一本流行的宏观经济学教科书，你很快就会翻到提到菲利普斯曲线的一页。然后又是另一页，接着又是另一页……
- en: For example, the macroeconomics textbook, creatively titled “Macroeconomics”
    by C. Jones and part of Cambridge university’s BA Economics curriculum, references
    the “Phillips curve” a staggering 143 times across 67 pages, covering over 10%
    of the 641-page brick. It takes up more space than almost*¹* all other macroeconomic
    models, including the “MP curve” (24 pages), the “Cobb-Douglas” production function
    (17 pages), the “Romer model” (42 pages), the “AS/AD framework” (51 pages), and
    the “DSGE models” (42 pages).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，宏观经济学教科书，由C.琼斯创造性地命名为“宏观经济学”，是剑桥大学经济学学士学位课程的一部分，在这67页中引用了“菲利普斯曲线”惊人的143次，覆盖了641页砖书中的超过10%，其篇幅比几乎所有其他宏观经济模型都要长，包括“MP曲线”（24页）、“Cobb-Douglas”生产函数（17页）、“Romer模型”（42页）、“AS/AD框架”（51页）和“DSGE模型”（42页）。
- en: In short, the Phillips curve is a pretty big deal in modern macroeconomics.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，菲利普斯曲线在现代宏观经济学中是一个相当重要的话题。
- en: 'As for the contents of those 67 pages, the vast majority comes in explaining
    the Phillips curve’s mathematical logic, and scientific equations. For instance,
    here’s a small sample from the book mentioned above:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 至于那67页的内容，绝大多数是用来解释菲利普斯曲线的数学逻辑和科学方程式的。例如，以下是上述书中的一小部分样本：
- en: '“…In normal times, you’d expect prices in the economy to continue to rise at
    a rate of 5 percent, and you’d raise your prices by this same amount. However,
    given the weakness in your industry, you’ll probably raise prices by less than
    5 percent, in an effort to increase the demand for your goods.This reasoning motivates
    the price-setting behavior that underlies the Phillips curve. Recall that **πt
    ≡ (Pt+1− Pt) / Pt** ; that is, the inflation rate is the percentage change in
    the overall price level over the coming year. Firms set the amount by which they
    raise their prices on the basis of their expectations of the economywide inflation
    rate and the state of demand for their products:'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “…在正常时期，你预计经济中的价格将继续以5%的速度上升，你也会以同样的幅度提高你的价格。然而，鉴于你所在行业的疲软，你可能会以低于5%的幅度提高价格，以增加你商品的需求。这种推理促使了菲利普斯曲线背后的定价行为。回想一下**πt
    ≡ (Pt+1− Pt) / Pt**；也就是说，通货膨胀率是未来一年整体价格水平的百分比变化。企业根据他们对整个经济通货膨胀率的预期和他们对产品需求的状态来设定他们提高价格的数量：
- en: ''
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/2dd1b9f85b3d723991e9b6b323c01186.png)'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![](../Images/2dd1b9f85b3d723991e9b6b323c01186.png)'
- en: ''
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Here, **π**et denotes expected inflation — the inflation rate that firms think
    will pre-vail in the rest of the economy over the coming year…”
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在这里，**π**et表示预期的通货膨胀率——即企业认为在接下来的一年里整个经济中将会占主导地位的通货膨胀率……”
- en: ''
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***p. 318–9, “Macroeconomics”, fourth edition. Charles Jones.***'
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***第318-9页，“宏观经济学”，第四版。查尔斯·琼斯。***'
- en: 'It isn’t only used at universities. Central banks throughout the globe rely
    on the Phillips curve findings to explain the economy and adjust their interest
    rates. For example, in February 2025, when the Bank of England (BoE) reduced their
    interest rate to 4.5%, their explanation explicitly cited Phillips curve reasoning:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 它不仅仅在大学中使用。全球的中央银行都依赖菲利普斯曲线的研究结果来解释经济状况并调整他们的利率。例如，在2025年2月，当英格兰银行（BoE）将利率降低到4.5%时，他们的解释明确引用了菲利普斯曲线的推理：
- en: “Should there be greater or longer-lasting weakness in demand relative to supply,
    this could push down on inflationary pressures, warranting a less restrictive
    path of Bank Rate [BoE interest rate]. If there were to be more constrained supply
    relative to demand, this could sustain domestic price and wage pressures, consistent
    with a relatively tighter monetary policy path.”***Bank of England’s “***[***Monetary
    Policy Summary, February 2025***](https://www.bankofengland.co.uk/monetary-policy-summary-and-minutes/2025/february-2025)***”***
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “如果需求相对于供应出现更大的或持续时间更长的疲软，这可能会对通货膨胀压力产生下行影响，从而需要采取更宽松的银行利率[英国央行利率]路径。如果供应相对于需求更加受限，这可能会维持国内价格和工资压力，与相对紧缩的货币政策路径保持一致。”***英国央行“***[***货币政策摘要，2025年2月***](https://www.bankofengland.co.uk/monetary-policy-summary-and-minutes/2025/february-2025)***”***
- en: 'That might have a bit too much economist jargon for the lay person. How about
    this quote from the current Chair of the Federal Reserve, Jerome Powell:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能对普通人来说经济学术语有点多。那么，来看看美联储现任主席杰罗姆·鲍威尔的这句话：
- en: '[The] persistent shortfall in inflation from our target has led some to question
    the traditional relationship between inflation and the unemployment rate, also
    known as the Phillips curve.… My view is that the data continue to show a relationship
    between the overall state of the labor market and the change in inflation over
    time. That connection has weakened over the past couple of decades, but it still
    persists, and I believe it continues to be meaningful for monetary policy.***“***[***The
    Outlook for the U.S. Economy***](https://www.federalreserve.gov/newsevents/speech/files/powell20180406a.pdf)***.”
    April 2018\. Jerome Powell, Chair of the Federal Reserve (2018-present).***'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[The] 持续的通货膨胀低于我们的目标，导致一些人质疑通货膨胀与失业率之间的传统关系，也称为菲利普斯曲线。……我的观点是，数据继续显示劳动力市场总体状况与通货膨胀随时间变化之间的关系。这种联系在过去几十年中有所减弱，但仍然存在，我相信它对货币政策仍然具有重要意义。***“***[***美国经济展望***](https://www.federalreserve.gov/newsevents/speech/files/powell20180406a.pdf)***。”2018年4月。美联储主席杰罗姆·鲍威尔（2018年至今）。'
- en: This article is *not* about the Phillips curve you will find in macroeconomic
    textbooks or central bank statements, but rather the Phillips curve they intentionally
    leave out. The fine print details glueing all that smart physics-like reasoning
    together. The assumptions, the history, the revisions, and the inconvenient data.
    In short, the macroeconomists will give you the science of the Phillips curve,
    I intend to give you the art of the Phillips curve.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 本文并非关于你在宏观经济学教科书或央行声明中找到的菲利普斯曲线，而是他们故意省略的那部分菲利普斯曲线。那些细节将所有那些类似物理学的推理粘合在一起。假设、历史、修订和不便的数据。简而言之，宏观经济学家会给你菲利普斯曲线的科学，我打算给你菲利普斯曲线的艺术。
- en: A Short History
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简短的历史
- en: 'The Phillips curve was, unsurprisingly, conceived by a chap called Phillips — [Alban
    William Housego Phillips](https://en.wikipedia.org/wiki/Bill_Phillips_%28economist%29)
    to be precise. While working at the London School of Economics in the 1950s, he
    studied the relationship between unemployment and inflation in the United Kingdom
    from 1861 to 1913\. What he found was an inverse correlation: as wage inflation
    increased, unemployment decreased.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 菲利普斯曲线是由一个名叫菲利普斯的人提出的，确切地说，是[阿尔班·威廉·豪斯戈·菲利普斯](https://en.wikipedia.org/wiki/Bill_Phillips_%28economist%29)。在20世纪50年代在伦敦政治经济学院工作期间，他研究了1861年至1913年英国失业与通货膨胀之间的关系。他所发现的是一种负相关关系：随着工资通货膨胀的增加，失业率下降。
- en: '![](../Images/70dbe8bd97363fe47562f173d0292c79.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/70dbe8bd97363fe47562f173d0292c79.png)'
- en: 'The original Phillips curve. Source: [A. W. Phillips](https://onlinelibrary.wiley.com/doi/10.1111/j.1468-0335.1958.tb00003.x)'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 原始的菲利普斯曲线。来源：[A. W. Phillips](https://onlinelibrary.wiley.com/doi/10.1111/j.1468-0335.1958.tb00003.x)
- en: For the next few years Phillips and other macroeconomic academics continued
    to search for empirical evidence supporting such a fascinating correlation. And
    they did! Phillips found that the relationship persisted when the dataset was
    extended to 1957\. Samuelson and Solow, economists at the Massachusetts Institute
    of Technology (MIT), published a paper in 1960 called “[Analytical aspects of
    anti-inflation policy](https://www.jstor.org/stable/1815021)”. In it they found
    the same relationship as Phillips had, but using U.S. data from 1934 to 1958.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的几年里，菲利普斯和其他宏观经济学学者继续寻找支持这种迷人相关性的实证证据。他们确实找到了！菲利普斯发现，当数据集扩展到1957年时，这种关系依然存在。麻省理工学院（MIT）的经济学家萨缪尔森和索洛于1960年发表了一篇名为“[反通货膨胀政策的分析方面](https://www.jstor.org/stable/1815021)”的论文。在论文中，他们发现了与菲利普斯相同的关系，但使用了1934年至1958年的美国数据。
- en: But Samuelson and Solow’s paper did much more than this. They expanded Phillips’
    original work by demonstrating that the relationship applied not only to unemployment
    and wage inflation, but also to unemployment and general price inflation, at least
    for the U.S. data they analysed*²* .
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 但萨缪尔森和索洛的论文远不止于此。他们通过证明这种关系不仅适用于失业和工资通货膨胀，还适用于失业和一般价格通货膨胀（至少在他们分析的美国数据中是这样），从而扩展了菲利普斯最初的工作。*²* 。
- en: Additionally, they proposed a causal model for this correlation, a theoretical
    framework that gained support from the growing popularity of Keynesian economists.
    It can’t be overstated just how significant a leap this was from Phillips’ original
    work. While Phillips had merely documented a statistical relationship — similar
    to how [ice cream sales and drowning deaths](https://www.scienceminded.org/post/ice-cream-linked-to-drowning)
    both rise in summer months (due to the hidden variable of warm weather) — Samuelson
    and Solow were essentially claiming that manipulating one variable could directly
    control the other. Using our analogy, ice cream sales regulations could be used
    as a policy tool to reduce drownings, or conversely, that swimming safety measures
    could impact the ice cream market.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，他们提出了这种相关性的因果模型，这是一个从凯恩斯经济学家的日益流行中获得了支持的理论框架。从菲利普斯最初的工作中取得的这一飞跃的重要性不容小觑。虽然菲利普斯仅仅记录了一种统计关系——类似于[冰淇淋销量和溺水死亡](https://www.scienceminded.org/post/ice-cream-linked-to-drowning)在夏季月份都会上升（由于温暖的天气这个隐藏变量）——萨缪尔森和索洛实际上是在宣称，操纵一个变量可以直接控制另一个变量。用我们的类比来说，冰淇淋销量法规可以用作政策工具来减少溺水，或者相反，游泳安全措施可能会影响冰淇淋市场。
- en: '![](../Images/a602c827eb4f2baa2943b1e8f3dae797.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a602c827eb4f2baa2943b1e8f3dae797.png)'
- en: Cai’s curve, the relationship between monthly sales of ice cream and drowning
    deaths. It’s important to keep in mind correlation does not equal causation. Chart
    created by the author.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 凯的曲线，冰淇淋月销量和溺水死亡之间的关系。重要的是要记住，相关性不等于因果关系。图表由作者创建。
- en: 'Samuelson and Solow’s model was as simple as:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 萨缪尔森和索洛的模型非常简单：
- en: $$\pi = f(U) \\
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: $$\pi = f(U) \\
- en: f'(U) < 0$$
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: f'(U) < 0
- en: 'Where:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: π represents the inflation rate
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: π代表通货膨胀率
- en: U represents the unemployment rate
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: U代表失业率
- en: f is a function that describes an inverse relationship
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: f是一个描述反比关系的函数
- en: This causal theory was a particularly powerful discovery, not only because it
    was so simple, requiring only two metrics, but because those two metrics were
    possible to measure, not like awkward inputs used in other models such as animal
    spirits, expectations, and marginal propensity to consume. For over a century,
    pesky [Classical](https://en.wikipedia.org/wiki/Classical_economics) and [Austrian](https://en.wikipedia.org/wiki/Austrian_school_of_economics)
    school economists had argued that it was impossible to understand the economy
    from broad aggregations on the basis that there were different types of underlying
    unemployment and inflation that all look the same if you aggregate them. To truly
    understand why inflation was this level or unemployment was that level, they argued,
    you’d have to dig into the details, and assess the situation at a microeconomic
    or even individual human level. “Hogwash” said the Keynesian macroeconomists,
    who were not only starting to build a healthy collection of models built on aggregated
    metrics, but had policymakers taking note of them.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这种因果理论是一个特别有力的发现，不仅因为它非常简单，只需要两个指标，而且因为这两个指标是可以测量的，不像其他模型中使用的那些尴尬的输入，例如动物精神、预期和消费边际倾向。一个多世纪以来，麻烦的[古典](https://en.wikipedia.org/wiki/Classical_economics)和[奥地利](https://en.wikipedia.org/wiki/Austrian_school_of_economics)经济学派经济学家们一直争论说，基于存在不同类型的潜在失业和通胀，如果将它们汇总起来，它们看起来都一样，因此不可能从广泛的汇总中理解经济。他们认为，要真正理解为什么通胀是这个水平或失业是那个水平，你必须深入研究细节，并在微观经济或甚至个人层面评估情况。“胡说八道”凯恩斯主义宏观经济学家说，他们不仅开始建立基于汇总指标的健全模型集合，而且让政策制定者注意到了这些模型。
- en: 'As with other Keynesian models, Samuelson and Solow encouraged policymakers
    to exploit the model. Stating in their 1960 paper: governments could adjust inflation
    and unemployment as if it were a “[menu of choice](https://www.jstor.org/stable/1815021)”*³.*'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 就像其他凯恩斯模型一样，萨缪尔森和索洛鼓励政策制定者利用这个模型。在他们的1960年论文中提出：政府可以调整通胀和失业，就像它是一个“[选择菜单](https://www.jstor.org/stable/1815021)”*³*。
- en: For the next decade, governments began to warm to the idea that they could be
    the ultimate conductor of the economy, turning dials and pressing knobs in order
    to move their country in the direction they wanted. Throughout the 1960s, new
    data continued to back the Phillips curve, which lead policymakers to make bolder
    and bolder policy decisions based on Samuelson and Solow’s model.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的十年里，政府开始接受这样的观点，即他们可以是经济的终极指挥者，通过转动旋钮和按下按钮来推动他们的国家朝着他们想要的方向前进。在整个20世纪60年代，新的数据继续支持菲利普斯曲线，这导致政策制定者基于萨缪尔森和索洛的模型做出越来越大胆的政策决策。
- en: '![](../Images/7140632af7a5c089421d94e012b7e3b3.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7140632af7a5c089421d94e012b7e3b3.png)'
- en: 'The first decade after the discovery of the Phillips curve it looked like the
    economy was solved. Source: chart and data from USA Bureau of Labor Statistics.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 菲利普斯曲线发现后的第一个十年，经济似乎已经得到了解决。来源：美国劳工统计局的图表和数据。
- en: For example, in 1971–1972, with support from President Nixon, Federal Reserve
    Chairman Arthur Burns pursued an expansionary monetary policy. This involved lowering
    the federal funds rate from approximately 5.5% in early 1971 to around 3.5% by
    mid-1972, while increasing the [M1 money supply](https://www.investopedia.com/terms/m/m1.asp)
    at an accelerated annual rate from 5.4% in 1970 to 8.2% by 1972\. These Phillips
    curve-influenced policies aimed to reduce unemployment, which did fall from 5.9%
    in 1971 to 5.1% by late 1972\. Initially, inflation remained relatively contained
    at 3.2% in 1972, helped by another policy Nixon had enacted of freezing wage and
    price controls for 90 days, creating the appearance that the Phillips curve tradeoff
    was working. Despite these initial successes, when Nixon’s wage and price controls
    were lifted, both inflation and unemployment rose simultaneously. Inflation surged
    to 12.3% by 1974 while unemployment increased to over 7%.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在1971-1972年，在尼克松总统的支持下，联邦储备委员会主席亚瑟·伯恩斯推行了扩张性的货币政策。这包括将1971年初的联邦基金利率从大约5.5%降低到1972年中期的3.5%，同时以加速的年增长率将[货币供应量M1](https://www.investopedia.com/terms/m/m1.asp)从1970年的5.4%增加到1972年的8.2%。这些受菲利普斯曲线影响的政策旨在减少失业，失业率确实从1971年的5.9%下降到1972年末的5.1%。最初，通胀在1972年相对受到控制，保持在3.2%，这得益于尼克松实施的另一项政策，即冻结工资和价格控制90天，给人一种菲利普斯曲线权衡正在起作用的印象。尽管这些初步成功，当尼克松取消工资和价格控制时，通胀和失业同时上升。通胀在1974年飙升至12.3%，而失业率上升到超过7%。
- en: 'The U.S. economy was exhibiting something macroeconomists had previously thought
    impossible: high inflation and high unemployment occurring simultaneously — a
    phenomenon that came to be known as “stagflation.”'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 美国经济表现出宏观经济学家以前认为不可能的现象：高通货膨胀和高失业同时发生——这一现象后来被称为“滞胀”。
- en: This wasn’t just a blip for a couple of years either. Data points for the whole
    decade of the 1970s no longer fell neatly along the Phillips curve but instead
    a random scattering, as if there was no correlation at all (that’s being kind,
    some might say there was a positive correlation between unemployment and inflation).
    The party was over. The elegant trade-off that had empowered governments to fine-tune
    economic outcomes for a decade was breaking down before policymakers’ and economists’
    eyes.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是一两年的小插曲。20世纪70年代整个十年的数据点不再整齐地沿着菲利普斯曲线分布，而是随机散布，好像完全没有相关性（这已经很宽容了，有些人可能会说失业率和通货膨胀之间存在正相关）。派对结束了。那些曾经让政府能够调整经济成果十年的优雅权衡，在政策制定者和经济学家眼前开始崩溃。
- en: '![](../Images/dc2141dd00cdc1d22c17069bb6f88761.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dc2141dd00cdc1d22c17069bb6f88761.png)'
- en: 'The 1970s obliterated the idea of the Phillips curve as it was presented in
    1960\. Source: data from USA Bureau of Labor Statistics, chart created by the
    author.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 20世纪70年代彻底摧毁了1960年所提出的菲利普斯曲线观念。来源：美国劳工统计局数据，图表由作者创建。
- en: The stagflation period essentially validated what the Classical and Austrian
    critics had warned about — that aggregated metrics alone couldn’t capture complex
    economic realities.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 滞胀时期实际上验证了古典和奥地利批评者所警告的——仅仅依靠综合指标无法捕捉复杂的经济现实。
- en: Or had it?
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，它曾经有过吗？
- en: Not to be so quick to give in, the Phillips curve enthusiasts sought to find
    excuses for the inconvenient data.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 不要这么快就屈服，菲利普斯曲线的爱好者开始寻找借口来解释这些不便的数据。
- en: 'Robert Solow, who had co-authored the influential 1960 paper with Paul Samuelson,
    insisted that the fundamental relationship remained valid despite the stagflation
    anomaly. He and other Keynesians [suggested](https://www.thefreelibrary.com/The+Samuelson-Solow+Phillips+Curve+and+the+great+inflation.-a0295324586)
    the curve had simply “shifted to the right giving a worse trade-off because of
    cost-push inflation” caused by the external shock of the 1973 OPEC oil crisis — not
    because the underlying theory was flawed. In other words, the Phillips curve wasn’t
    wrong, but was simply missing a small detail in its equation, what would later
    be coined as “supply shocks”. In mathematical terms, the equation changed to:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 罗伯特·索洛，他与保罗·萨缪尔森合著了有影响力的1960年论文，坚持认为尽管存在滞胀异常，基本关系仍然有效。他和其他凯恩斯主义者[建议](https://www.thefreelibrary.com/The+Samuelson-Solow+Phillips+Curve+and+the+great+inflation.-a0295324586)曲线只是“向右移动，因为成本推动型通货膨胀而给出了更糟糕的权衡”，这种通货膨胀是由1973年欧佩克石油危机的外部冲击引起的——而不是因为基本理论有缺陷。换句话说，菲利普斯曲线并没有错，只是在其方程中遗漏了一个小细节，后来被称为“供应冲击”。从数学的角度来看，方程变为：
- en: $$\pi = f(U) + O \\
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: π = f(U) + O
- en: f'(U) < 0$$
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: f'(U) < 0
- en: 'Where:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: π represents the inflation rate
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: π代表通货膨胀率
- en: U represents the unemployment rate
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: U代表失业率
- en: f is a function that describes an inverse relationship
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: f是一个描述反比关系的函数
- en: Ο (the greek letter omicron, not zero) represents supply shocks
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Ο（希腊字母奥米克戎，不是零）代表供应冲击
- en: However, unfortunately for Solow and others, there was significant evidence
    against the supply shock view that the 1970s stagflation was solely due to OPEC’s
    oil price quadrupling in October 1973\. Data shows that stagflation began earlier,
    with unemployment rising from 3.6% to 4.9% between 1968 and 1970, while inflation
    rose from 4.7% to 5.6% during the same period. As a result, there was going to
    need to be more tinkering for the Phillips curve to cheat death.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，不幸的是，对于索洛和其他人来说，有大量证据反对供应冲击观点，即20世纪70年代的滞胀仅仅是因为1973年10月欧佩克石油价格翻倍。数据显示，滞胀开始得更早，失业率从1968年的3.6%上升到1970年的4.9%，而同期通货膨胀率从4.7%上升到5.6%。因此，需要更多的调整来让菲利普斯曲线逃脱死亡。
- en: And tinkering there was.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 并且确实有所调整。
- en: Phillips curve enthusiasts started to look for something, anything, that could
    save them and their model — even if it meant getting into bed with a previous
    enemy.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 菲利普斯曲线的爱好者开始寻找任何可以拯救他们及其模型的东西——即使这意味着与过去的敌人同床共枕。
- en: 'Enter Milton Friedman and Edmund Phelps. In 1967–1968, they developed critiques
    of the Phillips curve. Their argument was:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 进入米尔顿·弗里德曼和埃德蒙·费尔普斯。在1967-1968年，他们对菲利普斯曲线进行了批判。他们的论点是：
- en: The Phillips curve ignored expectations. People aren’t mechanical parts in an
    economic machine. They adapt. They learn. If the government consistently creates
    inflation to reduce unemployment, people will eventually catch on and adjust their
    behaviour accordingly.
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 菲利普斯曲线忽略了预期。人们不是经济机器中的机械部件。他们会适应。他们会学习。如果政府持续创造通货膨胀以减少失业，人们最终会意识到并相应地调整他们的行为。
- en: The Phillips curve ignored the concept of the “natural rate” of unemployment.
    When unemployment falls below this natural rate, wages rise, employers raise prices,
    and inflation increases. Once workers realize inflation is eating their wage gains,
    they demand even higher wages, creating an inflationary spiral. Eventually, unemployment
    returns to its natural rate, but with higher inflation.
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 菲利普斯曲线忽略了“自然”失业率的概念。当失业率低于这个自然率时，工资上涨，雇主提高价格，通货膨胀增加。一旦工人意识到通货膨胀正在吞噬他们的工资增长，他们会要求更高的工资，从而产生通货膨胀螺旋。最终，失业率会回到自然率，但通货膨胀更高。
- en: Point 1 and 2 combined means there was no permanent trade-off between unemployment
    and inflation, only a temporary one that would disappear once people updated their
    expectations.
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点1和2结合意味着失业和通货膨胀之间没有永久性的权衡，只有暂时性的权衡，一旦人们更新他们的预期，这种权衡就会消失。
- en: Initially, mainstream macroeconomists largely dismissed these critiques. After
    all, the data still supported the Phillips curve, and governments were enjoying
    their newfound power to “fine-tune” the economy. Why let pesky monetarists like
    Friedman rain on their parade? The Keynesian establishment, firmly entrenched
    in academia and policy circles, had little interest in a theory that undermined
    their influence.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 最初，主流宏观经济学家在很大程度上忽视了这些批评。毕竟，数据仍然支持菲利普斯曲线，政府正在享受他们新获得的对“微调”经济的权力。为什么让弗里德曼这样的货币主义者破坏他们的庆祝活动？根深蒂固于学术界和政策圈子的凯恩斯主义学派对这种削弱他们影响力的理论几乎没有兴趣。
- en: 'But when the 1970s happened, they reached for the nearest life raft: the expectations-augmented
    Phillips curve that Friedman and Phelps had proposed years earlier. At least their
    model was still called the “Phillips curve”.⁴'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 但当70年代到来时，他们抓起了最近的救生筏：弗里德曼和菲利普斯多年前提出的预期增强的菲利普斯曲线。至少他们的模型仍然被称为“菲利普斯曲线”。⁴
- en: Suddenly, the once-dismissed theory became the accepted wisdom. The same economists
    who had scoffed at Friedman and Phelps were now explaining to policymakers that,
    of course, there was no long-run Phillips curve trade-off. Of course expectations
    matter.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 突然之间，曾经被忽视的理论变成了公认的智慧。那些曾经嘲笑弗里德曼和菲利普斯的同经济学家们现在正在向政策制定者解释，当然，不存在长期菲利普斯曲线的权衡。当然，预期很重要。
- en: This convenient pivot allowed the macroeconomics profession to save face. Again,
    rather than admitting the fundamental flaws in their aggregation-based approach,
    they could claim that the model was just missing a few more variables.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这个方便的转折点让宏观经济学界保住了面子。再次，他们并没有承认他们基于聚合的方法的基本缺陷，而是声称模型只是缺少几个变量。
- en: 'The new Phillips curve equation now looked like a real head scratcher:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 新的菲利普斯曲线方程现在看起来像是一个真正的难题：
- en: $$\pi_t = \pi^e_t + f(U_t – U^*) + O \\
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: $$\pi_t = \pi^e_t + f(U_t – U^*) + O \\
- en: f'(U_t – U^*) < 0 \\ \pi^e_t = \lambda\pi_{t-1} + (1-\lambda)\pi^e_{t-1} \\
    0 < \lambda \leq 1$$
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: f'(U_t – U^*) < 0 \\ \pi^e_t = \lambda\pi_{t-1} + (1-\lambda)\pi^e_{t-1} \\
    0 < \lambda \leq 1$$
- en: 'Where:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: πₜ represents the inflation rate at time t
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: πₜ 代表时间 t 时的通货膨胀率
- en: πᵉₜ represents the expected inflation at time t
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: πᵉₜ 代表时间 t 时的预期通货膨胀
- en: U represents the unemployment rate at time t
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: U 代表时间 t 时的失业率
- en: U* represents the “natural” rate of unemployment
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: U* 代表“自然”失业率
- en: f is a function that describes an inverse relationship
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: f 是描述反比关系的函数
- en: Ο (omicron) represents supply shocks at time t
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Ο (omicron) 代表时间 t 的供应冲击
- en: ₜ₋₁ represents the time previous to the current time t
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ₜ₋₁ 代表当前时间 t 之前的时间
- en: λ represents the weight given to recent observed inflation when forming expectations
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: λ 代表在形成预期时给予最近观察到的通货膨胀的权重
- en: (1-λ) represents the weight given to previous inflation expectations when forming
    new expectations
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: (1-λ) 代表在形成新预期时给予先前通货膨胀预期的权重
- en: 'By the late 1970s, the economics profession had completed its pivot. Textbooks
    were rewritten. Lectures were updated. The new consensus emerged: there was a
    short-run Phillips curve (where unexpected inflation could temporarily reduce
    unemployment) but no long-run trade-off. This allowed economists to maintain the
    basic framework of the Phillips curve while explaining away its failures. The
    new formula had lost its original strengths of being simple and possible to measure,
    however, over time these had come to be more curses than gifts. What ultimately
    secured the Phillips curve’s enduring influence was not these initial attributes,
    but their replacement: resistance to being proven wrong.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 到了20世纪70年代末，经济学界已经完成了其转变。教科书被重写。讲座被更新。新的共识出现：存在短期菲利普斯曲线（其中意外的通货膨胀可以暂时降低失业率），但没有长期权衡。这允许经济学家在解释其失败的同时保持菲利普斯曲线的基本框架。然而，新的公式失去了其原始的简单性和可衡量性，然而，随着时间的推移，这些特性已经变成了更多的诅咒而不是礼物。最终确保菲利普斯曲线持久影响力的不是这些初始属性，而是它们的替代品：对被证明错误的抵抗。
- en: If unemployment and inflation weren’t behaving as predicted, it would be because
    expectations had changed or that the “natural rate” of unemployment had shifted.
    How do economists measure these variables? They can’t, so they infer them from…
    the unemployment and inflation data. A beautifully circular argument, which has
    resulted in no further significant changes in the model to the present day.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果失业率和通货膨胀没有按照预测的方式表现，那将是因为预期发生了变化，或者“自然失业率”已经发生了变化。经济学家如何衡量这些变量？他们无法直接衡量，所以他们从……失业率和通货膨胀数据中推断它们。这是一个完美循环的论点，结果至今模型没有发生任何进一步的重大变化。
- en: Pseudo-Science and Un-falsifiability
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 伪科学和不可证伪性
- en: The concept of unfalsifiability was popularised by philosopher [Karl Popper](https://en.wikipedia.org/wiki/Karl_Popper),
    who argued that the ability to be falsified is what separates scientific theories
    from pseudo-scientific ones. This simply means that if a theory can’t be tested
    in a way that might prove it wrong, it’s not scientific. That also goes for theories
    that bend and shift to accommodate any possible evidence against them.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 不可证伪性的概念是由哲学家[卡尔·波普尔](https://en.wikipedia.org/wiki/Karl_Popper)普及的，他论证说，能够被证伪的能力是区分科学理论和伪科学理论的关键。这仅仅意味着，如果一个理论不能以可能证明其错误的方式进行测试，那么它就不是科学的。这也适用于那些为了适应任何可能的反对证据而弯曲和改变的理论。
- en: If I tell you there’s a spaghetti monster living on the dark-side of the Moon,
    what would you think? Probably that I’m a nut job. But lets say I’m thought of
    as an expert in the field of monsters. I have built up a plethora of mathematical
    equations, scientific charts, textbooks that could build a house, and most importantly
    a loyal fanbase, including many of the most senior figures in government defence
    departments, who are keen to prepare for any alien attacks — and a bigger budget
    that goes along with it.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我告诉你有一个意大利面怪物住在月亮的阴暗面，你会怎么想？你可能觉得我是个疯子。但假设我被认为是在怪物领域的专家。我已经建立了一系列数学方程式、科学图表、可以建造房子的教科书，最重要的是，我拥有一个忠实的粉丝团，其中包括许多政府国防部门的资深人物，他们热衷于为任何外星袭击做准备——以及随之而来的更大预算。
- en: Would you genuinely still think I was a nut job? Perhaps you’ve just missed
    something in all the jargon. After all, there are a lot of well thought of people
    who believe it. You don’t want to be thought of as a nut job yourself, do you?
    Maybe it’s best to just go along with what the experts say.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 你真的还会认为我是疯子吗？也许你只是错过了所有的术语。毕竟，有很多被高度评价的人相信它。你不想被认为是个疯子，对吧？也许最好的办法就是听从专家的意见。
- en: Continuing the analogy, a team of scientists strap themselves to a rocket in
    an effort to find the spaghetti monster, but it’s nowhere to be seen. Surely that’s
    proof the spaghetti monster doesn’t exist, right? Ah, not quite, it turns out
    one of the many equations was missing a small variable… give the experts a moment…
    1,2,3… tah da! That’s fixed the problem. It turns out the spaghetti monster is
    actually invisible, hence why the scientists didn’t find it.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 继续这个类比，一群科学家把自己绑在火箭上，试图找到意大利面怪物，但它却无处可寻。这难道不是证明意大利面怪物不存在吗？啊，不是的，结果发现许多方程式中缺少了一个小变量……给专家们一点时间……1,2,3……
    tah da！问题解决了。结果证明，意大利面怪物实际上是看不见的，这就是为什么科学家们找不到它。
- en: 'I’m sure most of you reading that got the message long before getting to the
    end of that silly story — sorry, it was too much fun to write. We all know of
    real life scenarios where this sort of thinking happens: Freudian psychoanalysis,
    traditional Chinese medicine, crystal healing, chiropractics… the list goes on.
    Sadly, as a passionate economic thinker, I’m ashamed to say a core model of macroeconomics
    also belongs on that list.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我敢肯定，在读完那个愚蠢的故事之前，你们大多数人已经明白了这个信息——抱歉，写这个故事太有趣了。我们都知道现实生活中存在这种思考的例子：弗洛伊德心理分析、传统中医、水晶疗法、脊椎按摩疗法……这个列表可以继续下去。遗憾的是，作为一个充满激情的经济思想家，我羞愧地说，宏观经济学的一个核心模型也属于这个列表。
- en: The fact is, time and time again economists have been given the opportunity
    to reject the Phillips curve, but instead continue to give it more caveats and
    excuses. I am of the belief that there is no conceivable scenario which would
    cause mainstream macroeconomics to fundamentally leave behind the Phillips curve.
    As such, it is by definition un-falsifiable and therefore pseudo-science.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，经济学家一次又一次地被给予拒绝菲利普斯曲线的机会，但他们却继续给它更多的保留和借口。我相信，没有可能的情况会导致主流宏观经济学从根本上放弃菲利普斯曲线。因此，它本质上是不证伪的，因此是伪科学。
- en: Continued Popularity
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 持续的流行
- en: Hang on. This can’t be right. Academic professors, professional economists,
    and central bank heads are all smart people. How could they possibly be fooled
    in believing in a pseudo-scientific idea?
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 等一下。这不可能是对的。学术教授、专业经济学家和央行行长都是聪明人。他们怎么可能被愚弄，相信一个伪科学观点？
- en: 'One of the clearest memories I have at university was in my second-year of
    my economics degree. The final lecture of the module “Macroeconomics II” was coming
    to a close. After a tough two hour slog sitting in a stuffy lecture hall, trying
    my best to keep awake, let alone focus on the dry power point slides, the lecturer
    switched off the presentation, and casually said something along the lines:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我在大学期间最清晰的记忆之一是在我经济学学位的第二年。宏观经济学II模块的最后一堂课即将结束。在艰难地坐了两个小时闷热的讲座厅，尽力保持清醒，更不用说专注于枯燥的幻灯片了，讲师关掉了演示文稿，随意地说了一些类似的话：
- en: '*“…and that’s everything that we need to cover for your exam. If you feel confused
    as to how all this makes sense in the real world, don’t worry. No one really knows
    if any of these models really work.” *'
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“……这是我们考试需要涵盖的所有内容。如果你对这一切如何在现实世界中变得有意义感到困惑，不要担心。没有人真的知道这些模型是否真的有效。”*'
- en: It was an absolute bombshell moment for me. Previously, I had thought that I
    was still a dumb student who just hadn’t “got it” yet. What my lecturer was saying,
    in other-words, is that the experts all know it’s pseudo-science.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我来说是一个绝对的震撼时刻。在此之前，我以为自己还是一个笨拙的学生，只是还没有“理解”到。我的讲师所说的，换句话说，就是专家们都知道这是伪科学。
- en: The follow up question is, of course, why do they keep pushing these models?
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 随后的问题是，当然，他们为什么要不断推动这些模型？
- en: I can only theorise, but I’d say it’s because it keeps them all busy. Cut out
    10% of macroeconomics textbooks and what happens? 10% less content to teach, 10%
    reduction in research grants, 10% fewer macroeconomists. Why call out the emperor’s
    new clothes when you’re the emperor?
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我只能进行理论推测，但我会说这是因为它让所有人都忙于其中。如果从宏观经济学教科书中删去10%，会发生什么？教学内容减少10%，研究资助减少10%，宏观经济学家减少10%。当你自己是皇帝时，为什么还要指出皇帝的新衣？
- en: In closing, we can’t rely on experts to tell us if the Phillips curve is a sham,
    or indeed any experts’ theory whose reputation or livelihood depends on its validity.
    It is up to us to make that discovery. The snake oil salesman doesn’t sell his
    product because he believes in it, but because his customers do.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们不能依赖专家来告诉我们菲利普斯曲线是否是骗局，或者任何专家的理论，如果其声誉或生计依赖于其有效性。这取决于我们自己去发现。卖蛇油的人不是因为他相信自己的产品，而是因为他的客户相信。
- en: Endnotes
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 脚注
- en: ¹ The “Phillips curve” didn’t quite beat the “IS curve” on this occasion, which
    was mentioned on 82 pages!
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: ¹ 在这次比较中，“菲利普斯曲线”并没有完全击败“IS曲线”，这在第82页提到了！
- en: ² Interestingly, Samuelson and Solow would have found no curving relationship
    had they decided to compare general price inflation and unemployment using Phillips’
    original 1861 to 1957 U.K. data, rather than their new U.S. data. Arguable, if
    they had, the Phillips curve might never have existed outside of a few dusty journals.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: ² 有趣的是，如果萨缪尔森和索洛决定使用菲利普斯1861年至1957年的英国原始数据来比较一般价格通胀和失业率，而不是他们新的美国数据，他们可能根本找不到曲线关系。可以说，如果他们这样做，菲利普斯曲线可能永远只存在于几本尘封的期刊之外。
- en: '³ I find this a funny choice of words, I end up imagining a policymaker coming
    to the leader of the free world and saying:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: ³我觉得这个词的选择很有趣，我脑海中浮现出一个政策制定者向自由世界领袖汇报的场景：
- en: '*“Good evening Mr. President. Did you enjoy last year’s economy? Might we endeavour
    to introduce some variety this year? I may prove most beneficial to one’s election
    prospects. Something like an increase in inflation by 1% to push down unemployment
    to 5%, perhaps?”*'
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“晚上好，总统先生。您去年对经济满意吗？我们今年是否可以尝试一些不同的做法？我可能对您的选举前景大有裨益。比如，通过提高1%的通货膨胀率来降低失业率至5%，如何？”*'
- en: ⁴ H.A. Hayek had raised issues about to the long-run Phillips curve and expectations
    far earlier than Friedman and Phelps. For example, he noted “the stimulating effect
    of inflation will … operate only so long as it has not been foreseen; as soon
    as it comes to be foreseen, only its continuation at an increased rate will maintain
    the same degree of prosperity” in his book The Constitution of Liberty, published
    in 1960\. The reason Friedman and Phelps became so famous for their critique was
    not their novel insights, but their willingness to modify the Phillips curve model,
    rather than a total rejection.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: ⁴H.A. 海克比弗里德曼和费尔普斯更早地提出了关于长期菲利普斯曲线和预期的相关问题。例如，他在1960年出版的《自由宪法》一书中指出：“通货膨胀的刺激作用……只有在它未被预见的情况下才会发挥作用；一旦它被预见，只有以更高的速度持续下去，才能维持相同的繁荣程度。”弗里德曼和费尔普斯之所以因他们的批评而闻名，并非因为他们有新颖的见解，而是因为他们愿意修改菲利普斯曲线模型，而不是完全否定。
