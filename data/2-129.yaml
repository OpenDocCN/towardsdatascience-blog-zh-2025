- en: TDS Authors Can Now Edit Their Published Articles
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: TDS 作者现在可以编辑他们已发布的文章
- en: 原文：[https://towardsdatascience.com/tds-authors-can-now-edit-their-published-articles/](https://towardsdatascience.com/tds-authors-can-now-edit-their-published-articles/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/tds-authors-can-now-edit-their-published-articles/](https://towardsdatascience.com/tds-authors-can-now-edit-their-published-articles/)
- en: One of our guiding principles as a publication is that authors’ work remains
    theirs. This hasn’t changed since [launching our independent site](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/)
    earlier this year; quite the opposite. On a practical level, however, we knew
    that an important element was missing as long as authors couldn’t directly edit
    their articles, and members of our community mentioned this time and again as
    a must-have feature.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一家出版物，我们的一条指导原则是作者的作品始终属于他们。自从今年早些时候[推出我们的独立网站](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/)以来，这一点并没有改变；恰恰相反。然而，在实际上，我们知道只要作者不能直接编辑他们的文章，就缺少了一个重要的元素，我们的社区成员一次又一次地提到这是必须拥有的功能。
- en: We’re thrilled to share that thanks to the hard work of several team members
    and partners, authors now have editing access to all their previously published
    work on TDS — including both articles that we’d brought over to our site ahead
    of its launch and those we accepted directly to our new platform.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们非常高兴地分享，多亏了几位团队成员和合作伙伴的辛勤工作，作者现在可以编辑他们在 TDS 上之前发布的所有作品——包括我们在网站推出前迁移到我们网站的文章以及我们直接接受到我们新平台上的文章。
- en: Great power, great responsibility
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 权力越大，责任越大
- en: Our relationship with our contributors is based on trust. We invest a great
    deal of time and effort in our initial screening and review process, and as a
    result, we’ve grown into a publication with hundreds of writers whose professional
    expertise matches their integrity.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们与贡献者的关系建立在信任的基础上。我们在初步筛选和审查过程中投入了大量时间和精力，因此，我们成长为一个拥有数百名作家，他们的专业知识和正直相匹配的出版物。
- en: The ability to edit published articles is one that we ask you to use judiciously.
    Fixing a typo we hadn’t caught, tweaking a chart based on reader feedback, and
    adding a link to a relevant new resource are all examples of post-publication
    changes we consider reasonable. We also know that the formatting in some of our
    older articles got a bit wonky during their migration to our new site; addressing
    these issues is perfectly fine, too.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑文章的能力是我们要求您审慎使用的。修复我们未注意到的错别字、根据读者反馈调整图表以及添加到相关新资源的链接都是我们认为合理的出版物后更改的例子。我们也知道，在我们的一些旧文章迁移到新网站的过程中，格式出现了一些问题；解决这些问题也是完全可以接受的。
- en: What we ask authors to avoid is making any substantive changes to published
    stories without first initiating a conversation with our team, which you can do
    via email or [directly from within your article](https://towardsdatascience.com/how-to-format-your-tds-draft-a-quickish-guide/#help).
    If you ever sense that an article you’ve published with us warrants a more thorough
    revision, we’d be happy to work with you on finding the best path forward.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们要求作者避免在未首先与我们的团队进行对话的情况下对已发布的故事进行任何实质性的修改，您可以通过电子邮件或[直接从您的文章中](https://towardsdatascience.com/how-to-format-your-tds-draft-a-quickish-guide/#help)这样做。如果您觉得我们发布的文章需要更彻底的修订，我们将很高兴与您合作，找到最佳的前进道路。
- en: How editing works
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编辑工作原理
- en: 'Whether or not you’ve already published with us on our new platform, making
    tweaks to your published articles is as straightforward as can be. Just head over
    to your [list of articles](https://contributor.insightmediagroup.io/wp-admin/edit.php)
    (**note**: this link requires you to be logged in to the TDS Contributor Portal),
    hover over the article you’d like to work on, and either click on the title or
    on the **Edit** button.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您是否已经在我们新平台上与我们合作发表过文章，对已发布文章进行微调都简单得不能再简单了。只需前往您的[文章列表](https://contributor.insightmediagroup.io/wp-admin/edit.php)（**注意**：此链接需要您登录到
    TDS 贡献者门户），将鼠标悬停在您想要工作的文章上，然后点击标题或**编辑**按钮。
- en: '![](../Images/ad0f22423e78166243cb73edcd935b06.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ad0f22423e78166243cb73edcd935b06.png)'
- en: Once you’re done, consider previewing your changes as they will appear on our
    site’s front end — look for the laptop symbol near the top-right corner of the
    editor screen, and click on **Preview in new tab**. This is especially important
    if you made any tweaks to a visual element in your article.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 完成后，请考虑预览您的更改，因为它们将显示在我们网站的首页上——在编辑器屏幕的右上角寻找笔记本电脑符号，然后点击**在新标签页中预览**。如果您对文章中的视觉元素进行了任何调整，这一点尤为重要。
- en: '![](../Images/30a1906496f6f74c146211196392d80f.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/30a1906496f6f74c146211196392d80f.png)'
- en: If everything looks good to go on your end, remember to click on the **Save**
    button to take your edits live. This also notifies our team about changes to a
    published article, and gives us a chance to double-check that everything is in
    order.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您这边看起来一切正常，请记住点击**保存**按钮使您的编辑生效。这也会通知我们的团队有关已发布文章的更改，并给我们一个机会双重检查一切是否正常。
- en: We hope all articles we’ve published on TDS stay here, but we recognize that
    sometimes authors wish to remove their work from our site. Up until now, you’ve
    had to contact us to ask our team to delete articles on your behalf; with this
    update, you can now do it without our intervention—in your article list, look
    for the **Mark as Deleted** button under the relevant title. (Feel free to reach
    out to us before deleting articles — in many cases, we can address the issues
    that prompted you to take this decision in the first place.)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望我们在TDS上发布的所有文章都留在这里，但我们认识到有时作者希望从我们的网站上删除他们的作品。到目前为止，您必须联系我们，让我们的团队代表您删除文章；随着这次更新，您现在可以不经过我们的干预来完成这项操作——在您的文章列表中，寻找相关标题下的**标记为已删除**按钮。（在删除文章之前，请随时联系我们——在许多情况下，我们可以解决促使您做出这一决定的问题。）
- en: Onwards and upwards!
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奋进向前！
- en: With this new feature, we’ve made it through much of the long list of key improvements
    we wanted to offer authors on TDS. For all of you who’ve asked about editing access
    since our site’s launch, thank you for your patience! We hope to publish more
    of your work in the near future, especially now that our [Author Payment Program](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/)
    has been running successfully for several months. And if you’re not yet a TDS
    author but would like to join our community, [we’d love to see your work](https://towardsdatascience.com/questions-96667b06af5/),
    too.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这个新功能，我们已经实现了我们想要提供给TDS作者的关键改进列表中的大部分。对于那些自我们网站启动以来就询问编辑权限的各位，感谢您的耐心！我们希望不久的将来能发表更多您的作品，尤其是现在我们的[作者支付计划](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/)已经成功运行了几个月。如果您还不是TDS的作者但想加入我们的社区，[我们也非常愿意看到您的作品](https://towardsdatascience.com/questions-96667b06af5/)。
