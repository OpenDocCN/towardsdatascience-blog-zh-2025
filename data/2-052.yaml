- en: 'From Genes to Neural Networks: Understanding and Building NEAT (Neuro-Evolution
    of Augmenting Topologies) from Scratch'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从基因到神经网络：从头开始理解并构建NEAT（神经进化增强拓扑）
- en: 原文：[https://towardsdatascience.com/from-genes-to-neural-networks-understanding-and-building-neat-neuro-evolution-of-augmenting-topologies-from-scratch/](https://towardsdatascience.com/from-genes-to-neural-networks-understanding-and-building-neat-neuro-evolution-of-augmenting-topologies-from-scratch/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/from-genes-to-neural-networks-understanding-and-building-neat-neuro-evolution-of-augmenting-topologies-from-scratch/](https://towardsdatascience.com/from-genes-to-neural-networks-understanding-and-building-neat-neuro-evolution-of-augmenting-topologies-from-scratch/)'
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: <mdspan datatext="el1754935272936" class="mdspan-comment">Neuro-Evolution of
    Augmenting</mdspan> Topologies (NEAT) is a powerful algorithm introduced in 2002
    by Kenneth O. Stanley and Risto Miikkulainen from the University of Texas at Austin
    in [this paper](https://nn.cs.utexas.edu/downloads/papers/stanley.ec02.pdf). NEAT
    algorithm introduced a new idea to the standard neuro-evolution techniques that
    evolved fixed-topology networks, by dynamically increasing the complexity of the
    networks over the generations.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754935272936" class="mdspan-comment">神经进化增强拓扑（NEAT）</mdspan>是一种强大的算法，由德克萨斯大学奥斯汀分校的Kenneth
    O. Stanley和Risto Miikkulainen于2002年提出，在[这篇论文](https://nn.cs.utexas.edu/downloads/papers/stanley.ec02.pdf)中介绍。NEAT算法引入了一种新思想到标准的神经进化技术中，这些技术通过在代际间动态增加网络的复杂性来进化固定拓扑网络。
- en: In this article, I will walk through the NEAT algorithm and its implementation
    from scratch in Python, focusing on the algorithm’s design decisions and the intricacies
    that make NEAT both elegant and challenging to reproduce. This article is intended
    for a technical audience, familiar with neural networks and the basics of evolutionary
    computation.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将从头开始介绍NEAT算法及其在Python中的实现，重点关注算法的设计决策以及使NEAT既优雅又具有挑战性的复杂性。本文面向熟悉神经网络和进化计算基础的技术读者。
- en: 'Evolutionary Algorithms: A General Overview'
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进化算法：一般概述
- en: Before jumping into NEAT, let’s review the evolutionary algorithm’s fundaments.
    Inspired by genetics and natural selection, evolutionary algorithms are a type
    of optimization algorithms that solve complex problems by iteratively improving
    a population of candidate solutions.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入研究NEAT之前，让我们回顾一下进化算法的基础。受遗传学和自然选择启发，进化算法是一种优化算法，通过迭代改进候选解决方案的种群来解决复杂问题。
- en: 'The core idea is to imitate the process of biological evolution:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 核心思想是模仿生物进化的过程：
- en: '**Initialization:** The process starts by generating an initial **population**
    of candidate solutions. This initial solutions are generated randomly, and each
    solution is typically represented as a “genome” or “chromosome”, which encodes
    its features and characteristics.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**初始化**：这个过程首先通过生成一个初始的**种群**候选解决方案开始。这些初始解决方案是随机生成的，每个解决方案通常表示为一个“基因组”或“染色体”，它编码了其特征和特性。'
- en: '**Evaluation:** Each individual in the population is evaluated according to
    how well it solves the given problem. This is done using a **fitness function**
    which assigns a numerical score to each solution. The higher the fitness, the
    better the solution.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**评估**：根据每个个体解决给定问题的能力来评估种群中的每个个体。这是通过一个**适应度函数**来完成的，该函数为每个解决方案分配一个数值分数。适应度越高，解决方案越好。'
- en: '**Selection:** Based on their fitness, a subset of the population is selected
    to become the “parents” of the next generation. Individuals with higher fitness
    scores have a higher probability of being selected.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**选择**：根据它们的适应度，从种群中选择一个子集成为下一代“父母”。具有更高适应度分数的个体有更高的被选中概率。'
- en: '**Reproduction:** The selected individuals then reproduce to create “offspring”
    for the next generation using **genetic operators**. There are two main processes
    in this phase:'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**繁殖**：选定的个体随后通过使用**遗传算子**繁殖，为下一代创建“后代”。在这个阶段有两个主要过程：'
- en: '**Crossover:** Two or more parent genomes are combined to produce new offspring
    genomes, merging advantageous traits.'
  id: totrans-12
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交叉**：将两个或多个父代基因组结合以产生新的后代基因组，合并有利特性。'
- en: '**Mutation:** Small changes are randomly introduced into the offspring genomes.
    This introduces novelty and helps explore the search space, preventing the algorithm
    from getting stuck in a local optima.'
  id: totrans-13
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**变异**：在后代基因组中随机引入小的变化。这引入了新颖性并有助于探索搜索空间，防止算法陷入局部最优。'
- en: '**Replacement:** The newly generated offspring replaces the current population
    (either entirely or partially), forming the new generation.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**替换：** 新生成的后代替换当前种群（全部或部分），形成新一代。'
- en: '**Termination:** Steps 2–5 are repeated for a fixed number of generations,
    until a certain fitness threshold is reached, or until a satisfactory solution
    to the problem is found.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**终止条件：** 步骤 2–5 会重复执行固定次数的代数，直到达到某个适应度阈值，或者找到问题的满意解。'
- en: What Makes NEAT Special?
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: NEAT 的独特之处在哪里？
- en: NEAT stands out because it goes further than regular evolutionary algorithms,
    which only evolve the weights of the network. NEAT also evolves the topology of
    the networks, making them increasingly complex.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: NEAT 的突出之处在于它比常规进化算法走得更远，常规进化算法只进化网络的权重。NEAT 还进化网络的拓扑结构，使它们变得越来越复杂。
- en: 'Before NEAT, there were two main challenges that didn’t allow for regular evolutionary
    algorithms to be used to dinamically adjust the architecture of the networks.
    NEAT solves these two challenges:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在 NEAT 之前，有两个主要挑战阻止了常规进化算法被用来动态调整网络的架构。NEAT 解决了这两个挑战：
- en: '**How to perform crossover between topologically diverse networks:** In traditional
    genetic algorithms, combining two genomes with vastly different structures often
    leads to non-functional or malformed offspring. Imagine trying to combine two
    different neural networks, where one has three hidden layers and another has only
    one, simply averaging weights or randomly merging connections will likely break
    the network’s functionality.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如何在拓扑结构多样化的网络之间进行交叉：** 在传统的遗传算法中，将具有截然不同结构的两个基因组结合在一起，往往会导致非功能性或畸形的后代。想象一下尝试将两个不同的神经网络结合起来，其中一个有三个隐藏层，而另一个只有一个，简单地平均权重或随机合并连接很可能会破坏网络的功能性。'
- en: '**How to maintain diversity in a population with vastly different topologies:**
    When networks can grow in complexity (adding new nodes and connections), these
    structural mutations often lead to a temporary decrease in their fitness. For
    example, a new connection may interfere with the existing network’s functionality
    before its parameters are properly tuned. As a result, recently mutated networks
    can be prematurely outcompeted by simpler, more optimized ones, even if the newer
    variant have the potential to evolve into a superior solution given more time.
    This premature convergence to local optima is a common problem.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如何在具有截然不同拓扑结构的种群中保持多样性：** 当网络可以增长复杂性（添加新的节点和连接）时，这些结构变异通常会导致其适应度暂时下降。例如，一个新的连接可能在参数得到适当调整之前干扰现有网络的功能。因此，最近发生变异的网络可能会被更简单、更优化的网络提前竞争，即使新变体有潜力在更多时间后进化成更优解。这种过早收敛到局部最优解是常见的问题。'
- en: How NEAT Solves These Challenges
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: NEAT 如何解决这些挑战
- en: 'NEAT tackles these two fundamental problems through two ingenious mechanisms:
    historical markings (also called innovation numbers) and speciation.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: NEAT 通过两种巧妙机制解决这两个基本问题：历史标记（也称为创新数字）和物种形成。
- en: Historical Markings
  id: totrans-23
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 历史标记
- en: '![](../Images/aa58e3edd2ef26bc4fb32ccc0c06c4e3.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/aa58e3edd2ef26bc4fb32ccc0c06c4e3.png)'
- en: 'Source: [*Evolving Neural Networks through Augmenting Topologies*](https://nn.cs.utexas.edu/downloads/papers/stanley.ec02.pdf)'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：[*通过增强拓扑结构进化神经网络*](https://nn.cs.utexas.edu/downloads/papers/stanley.ec02.pdf)
- en: To address the challenge of performing crossover between topologically diverse
    networks, NEAT introduces the concept of **innovation numbers**. When a new connection
    or node is added to a network during mutation, it is assigned a globally unique
    innovation number. This number acts as a historical marking, indicating the historical
    origin of that particular genetic feature.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决在拓扑结构多样化的网络之间进行交叉的问题，NEAT 引入了**创新数字**的概念。当在变异过程中向网络添加新的连接或节点时，它会分配一个全局唯一的创新数字。这个数字作为一个历史标记，表明了该特定遗传特征的起源历史。
- en: Let’s look at the example in the image above, where we have two networks, “Parent
    1” and “Parent 2” undergoing crossover. We can see that both networks have a connection
    from node 2 to node 5, with innovation number 4\. This tells us that this connection
    must have been inherited by both networks from a common ancestor at some point.
    However, we can also see that “Parent 1” has a connection (from node 1 to node
    5) with the innovation number 8, but “Parent 2” doesn’t have this connection.
    This shows that “Parent 1” evolved this specific connection independently.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看上图中的例子，其中我们有两个网络，“父代1”和“父代2”正在进行交叉。我们可以看到，两个网络都有一个从节点2到节点5的连接，创新数字为4。这告诉我们，这个连接必须是在某个时候从共同祖先那里被两个网络继承的。然而，我们也可以看到“父代1”有一个从节点1到节点5的连接，创新数字为8，但“父代2”没有这个连接。这表明“父代1”独立进化了这个特定的连接。
- en: During crossover, NEAT aligns the genes (nodes and connections) of the two parents
    based on their innovation numbers.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在交叉过程中，NEAT根据创新数字将两个父母的基因（节点和连接）对齐。
- en: '**Matching genes** (those with the same innovation number) are inherited randomly
    from either parent.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**匹配基因**（具有相同创新数字的基因）从任一父母那里随机继承。'
- en: '**Disjoint genes** (present in one parent but not the other, and with innovation
    numbers within the range of the other parent’s genes) are typically inherited
    from the fitter parent.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不连续基因**（存在于一个父母中但不在另一个父母中，并且创新数字在另一个父母基因的范围内）通常从更适应的父母那里继承。'
- en: '**Excess genes** (present in one parent but not the other, and with innovation
    numbers outside the range of the other parent’s genes, meaning they appeared later
    in evolutionary history) are also typically inherited from the fitter parent.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多余基因**（存在于一个父母中但不在另一个父母中，并且创新数字超出另一个父母基因的范围，这意味着它们在进化历史中出现较晚）通常也来自更适应的父母。'
- en: This whole process ensures that functionally similar parts of the networks are
    combined correctly, even if their overall structures differ significantly.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 整个过程确保了网络中功能相似的部分被正确组合，即使它们的整体结构差异很大。
- en: Speciation
  id: totrans-33
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 物种形成
- en: To maintain diversity in a population with vastly different topologies, and
    prevent premature convergence, NEAT employs a technique called **speciation**.
    Through speciation the population is divided into different “species” based on
    topological similarity. Networks within the same species are more likely to share
    common ancestral traits and thus, more similar structures.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在具有极大不同拓扑结构的种群中保持多样性，并防止过早收敛，NEAT采用了一种称为**物种形成**的技术。通过物种形成，种群被划分为基于拓扑相似性的不同“物种”。同一物种内的网络更有可能共享共同的祖先特征，因此结构更相似。
- en: 'The similarity between two networks (genomes) is calculated using a compatibility
    distance function. This function considers three components:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 两个网络（基因组）之间的相似度是通过兼容度距离函数计算的。该函数考虑了三个组成部分：
- en: The number of **disjoint genes** (genes present in one genome but not the other,
    but within the shared historical range).
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不连续基因**（存在于一个基因组中但不在另一个基因组中，但位于共享的历史范围内）的数量。'
- en: The number of **excess genes** (genes present in one genome but not the other,
    and outside the shared historical range).
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多余基因**（存在于一个基因组中但不在另一个基因组中，并且位于共享历史范围之外）的数量。'
- en: The **average weight difference** of matching genes.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 匹配基因的**平均权重差异**。
- en: If the compatibility distance between two networks falls below a certain threshold,
    they are considered to belong to the same species.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果两个网络之间的兼容度距离低于某个阈值，它们被认为是属于同一物种。
- en: 'By speciating the population, NEAT ensures that:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 通过物种形成种群，NEAT确保：
- en: '**Competition occurs only within species:** This protects novel or less complex
    structures from being immediately outcompeted by highly complex but perhaps currently
    sub-optimal designs.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**竞争仅在物种内部发生**：这保护了新颖或不太复杂的结构免受高度复杂但可能目前次优设计的即时竞争。'
- en: '**Each species has a chance to innovate and improve:** The best individuals
    from each species are allowed to reproduce (elitism), promoting the evolution
    of unique solutions within different topological niches.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每个物种都有机会创新和改进**：每个物种的最佳个体被允许繁殖（精英主义），促进不同拓扑生态位内独特解决方案的进化。'
- en: '**Species can die out if they are not successful:** If a species consistently
    performs poorly, it will shrink and eventually disappear, making room for more
    promising genetic lines.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如果物种不成功，它们可能会灭绝**：如果一个物种持续表现不佳，它将缩小并最终消失，为更有希望的遗传线腾出空间。'
- en: Core Components of NEAT
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: NEAT的核心组件
- en: 'There are four core components in the NEAT algorithm:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: NEAT算法中有四个核心组件：
- en: Node Genes
  id: totrans-46
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 节点基因
- en: 'Each node gene represents a neuron of the neural network. Each node has:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 每个节点基因代表神经网络中的一个神经元。每个节点具有：
- en: An ID (unique identifier)
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个ID（唯一标识符）
- en: 'A layer: it could be input, hidden, or output'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一层：它可以是输入层、隐藏层或输出层
- en: An activation fuction
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 激活函数
- en: A bias value
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏置值
- en: '[PRE0]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Connection Genes
  id: totrans-53
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 连接基因
- en: 'The connection genes (synapses) represent the connections between the neurons
    of the network. Each connection gene has:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 连接基因（突触）代表网络中神经元之间的连接。每个连接基因具有：
- en: Input node ID
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入节点ID
- en: Ouput node ID
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出节点ID
- en: Weight
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 权重
- en: Enabled flag (indicates whether the connection is enabled)
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 启用标志（指示连接是否启用）
- en: Innovation number (unique identifier assigned when the connection is first created)
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创新编号（在连接首次创建时分配的唯一标识符）
- en: '[PRE1]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Genomes
  id: totrans-61
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 基因组
- en: The genome is the “genetic blueprint” of a single neural network within the
    NEAT algorithm. It’s essentially a collection of all the node and connection genes
    that define the network’s structure and parameters. With the Genome we can later
    construct the actual runnable network (which we’ll call *Phenotype*). Each genome
    represents one individual in the population.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 基因组是NEAT算法中单个神经网络的“遗传蓝图”。它本质上是一组定义网络结构和参数的所有节点和连接基因。有了基因组，我们可以在以后构建实际的运行网络（我们将其称为*表型*）。每个基因组代表种群中的一个个体。
- en: '[PRE2]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Innovation Tracker
  id: totrans-64
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创新追踪器
- en: A critical component in any NEAT implementation is an **Innovation Tracker**.
    This is my custom implementation of this mechanism that is responsible for assigning
    and keeping track of unique innovation numbers for every new connection and node
    created throughout the process. This ensures that historical markers are consistent
    across the entire population, which is fundamental for correctly aligning genes
    during crossover.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 任何NEAT实现中的关键组件是一个**创新追踪器**。这是我对此机制的自定义实现，它负责在整个过程中为每个新创建的连接和节点分配和跟踪唯一的创新编号。这确保了历史标记在整个种群中的一致性，这对于在交叉过程中正确对齐基因是基本要求。
- en: '[PRE3]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: NEAT Algorithm Flow
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: NEAT算法流程
- en: With the core components understood, now we can piece them together to understand
    how NEAT works. In the example shown, the algorithm is trying to solve the XOR
    problem.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在理解了核心组件之后，现在我们可以将它们组合起来，了解NEAT是如何工作的。在示例中，算法试图解决XOR问题。
- en: 1\. Initialization
  id: totrans-69
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1. 初始化
- en: The very first generation of genomes is always created with a very simple and
    fixed structure. This approach aligns with NEAT’s philosophy of “starting simple
    and growing complexity”, ensuring it explores the simplest solutions first, gradually
    increasing complexity.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 基因组的第一个版本总是以一个非常简单和固定的结构创建。这种方法符合NEAT的“从简单开始，逐渐增加复杂性”的哲学，确保它首先探索最简单的解决方案，然后逐渐增加复杂性。
- en: 'In this code example, we initialize the networks with the minimal structure:
    a fully-connected network with no hidden layers.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在此代码示例中，我们使用最小结构初始化网络：一个没有隐藏层的全连接网络。
- en: '[PRE4]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '[PRE5]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 2\. Evaluate Population Fitness
  id: totrans-74
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2. 评估种群适应度
- en: 'After the initial population is set up, the NEAT algorithm enters the main
    evolutionary loop. This loop repeats for a pre-defined number of generations,
    or until one of its solutions reaches a fitness threshold. Each generation undergoes
    a series of critical steps: evaluation, speciation, fitness adjustment, and reproduction.
    The first step is to evaluate the fitness of each individual in the population.
    To do this first we have to go through the following steps:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在初始种群设置完成后，NEAT算法进入主进化循环。这个循环重复预定义的代数，或者直到其解决方案达到一个适应度阈值。每一代都要经历一系列关键步骤：评估、物种形成、适应度调整和繁殖。第一步是评估种群中每个个体的适应度。为此，我们首先必须完成以下步骤：
- en: '**Phenotype Expression:** For each Genome we first have to express it into
    its phenotype (a runnable neural network). This involves constructing the actual
    neural network from the *nodes* and *connections* lists within the Genome.'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**表型表达**：对于每个基因组，我们首先需要将其表达为其表型（一个可运行的神经网络）。这涉及到从基因组内的*节点*和*连接*列表中构建实际的神经网络。'
- en: '**Forward Pass:** Once the network is constructed, we perform the forward pass
    with the given inputs to produce the outputs.'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**正向传播**：一旦网络构建完成，我们使用给定的输入进行正向传播以产生输出。'
- en: '**Fitness Calculation:** Given the network’s input and output we can now calculate
    it’s fitness using the fitness function. The fitness function is problem-specific
    and is designed to return a numerical score indicating how well the network achieved
    its goal.'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**适应性计算：** 给定网络的输入和输出，现在可以使用适应性函数来计算其适应性。适应性函数是特定于问题的，旨在返回一个数值分数，表示网络实现其目标的好坏。'
- en: '[PRE6]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 3\. Speciation
  id: totrans-81
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3. 物种形成
- en: Instead of letting all individuals compete globally, NEAT divides the population
    into species, putting together those genomes that are topologically similar. This
    approach prevents new topological innovations from being immediatly outcompeted
    by larger, more mature species, and allows them to mature.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 与让所有个体在全球范围内竞争不同，NEAT将种群划分为物种，将拓扑结构相似的基因组放在一起。这种方法防止新的拓扑创新立即被更大、更成熟的物种所取代，并允许它们成熟。
- en: 'The process of speciation in each generation involves:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 每一代物种形成的过程包括：
- en: '**Measuring Compatibility:** We use a compatibility distance function to measure
    how different two Genomes are. The shorter the distance between them, the more
    similar two genomes are. The following code implementation uses the formula proposed
    in the original paper, with the proposed parameters.'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**测量兼容性：** 我们使用兼容度距离函数来衡量两个基因组之间的差异。它们之间的距离越短，两个基因组就越相似。以下代码实现使用了原始论文中提出的公式，并采用了建议的参数。'
- en: '[PRE8]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 2\. **Grouping into Species:** At the beggining of each generation, the Speciator
    is responsible for categorizing all genomes into existing or new species. Each
    species has one representative genome, that serves as the benchmark against which
    every individual of the population is compared to determine if belongs to that
    species.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **分组为物种：** 在每一代的开始，物种形成者负责将所有基因组分类为现有或新物种。每个物种都有一个代表基因组，它作为基准，用于将种群中的每个个体与之比较，以确定其是否属于该物种。
- en: '[PRE9]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '[PRE10]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 4\. Adjusting Fitness
  id: totrans-89
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4. 调整适应性
- en: Even when genomes are grouped into species, a raw fitness value isn’t enough
    to allow for fair reproduction. Larger species would naturally produce more offspring,
    potentially overwhelming smaller species that might hold promising, but still
    nascent, innovations. To counter this, NEAT employs the **adjusted fitness**,and
    adjusts the fitness based on the species performance.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 即使基因组被分组为物种，原始的适应性值也不足以允许公平的繁殖。较大的物种自然会产生更多的后代，可能会压倒可能持有有希望但尚处于萌芽状态的创新的小物种。为了应对这种情况，NEAT采用**调整后的适应性**，并根据物种的表现调整适应性。
- en: To adjust the fitness of an individual, its fitness is divided between the number
    of individuals in its species. This mechanism is implemented in the *update_fitness_stats*
    method inside the *Species* class.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 为了调整个体的适应性，其适应性被分配给其物种中个体的数量。此机制在*Species*类中的*update_fitness_stats*方法中实现。
- en: 5\. Reproduction
  id: totrans-92
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 5. 繁殖
- en: After speciating and adjusting the fitnesses, the algorithm moves to the reproduction
    phase, where the next generation of genomes is created through a combination of
    selection, crossover, and mutation.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在物种形成和调整适应性之后，算法进入繁殖阶段，通过选择、交叉和变异的组合来创建下一代基因组。
- en: '**Selection:** In this implementation the selection is done through elitism
    in the main evolutionary loop.'
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**选择：** 在此实现中，选择是通过主进化循环中的精英主义来完成的。'
- en: '2\. **Crossover:** Some key aspects of this implementation are:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **交叉：** 此实现的一些关键方面包括：
- en: 'Node inheritance: Input and output nodes are explicitly ensured to be passed
    down to the offspring. This is done to ensure the functionality of the network
    doesn’t break.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 节点继承：显式确保输入和输出节点被传递给后代。这样做是为了确保网络的 功能不受破坏。
- en: 'Matching genes: When both parents have a gene with the same innovation number,
    one is chosen randomly. If the gene was disabled in either parent, there is a
    75% chance of the gene being disabled in the offspring.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 匹配基因：当两个父母都有一个具有相同创新号的基因时，随机选择其中一个。如果该基因在任一父母中已被禁用，那么在后代中该基因被禁用的概率为75%。
- en: 'Excess genes: Excess genes from the less fit parent are not inherited.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过剩基因：较不适应父母的过剩基因不会被继承。
- en: '[PRE11]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 3\. **Mutation:** After crossover, mutation is applied to the offspring. A key
    aspect of this implementation is that we avoid forming cycles when adding connections.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **变异：** 在交叉之后，对后代应用变异。此实现的一个关键方面是我们避免在添加连接时形成循环。
- en: '[PRE12]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 6\. Repeating the Process Within the Main Evolutionary Loop
  id: totrans-102
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 6. 在主进化循环中重复此过程
- en: Once all the offspring has been generated and the new population is formed,
    the current generation ends, and the new population becomes the starting point
    for the next evolutionary cycle. This is handled by a main evolutionary loop,
    which orchestrates the whole algorithm.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦所有后代生成并且新种群形成，当前一代结束，新种群成为下一进化周期的起点。这由一个主要的进化循环处理，它协调整个算法。
- en: '[PRE13]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 7\. Running the Algorithm
  id: totrans-105
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 7. 运行算法
