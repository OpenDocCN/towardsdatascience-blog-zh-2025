- en: 'Why AI Still Can’t Replace Analysts: A Predictive Maintenance Example'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么人工智能仍然不能取代分析师：预测性维护的例子
- en: 原文：[https://towardsdatascience.com/why-ai-still-cant-replace-analysts-a-predictive-maintenance-example/](https://towardsdatascience.com/why-ai-still-cant-replace-analysts-a-predictive-maintenance-example/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-ai-still-cant-replace-analysts-a-predictive-maintenance-example/](https://towardsdatascience.com/why-ai-still-cant-replace-analysts-a-predictive-maintenance-example/)
- en: <mdspan datatext="el1760112130528" class="mdspan-comment">New</mdspan> AI models
    like [GPT-4](https://www.evolution.ai/post/summarising-extracting-data-from-gpt-4),
    [Claude 3](https://claude3.pro/claude-3-ai-is-transforming-data-analytics/), and
    [Gemini](https://www.theverge.com/2024/12/12/24319697/gemini-ai-summarize-google-drive-folders)
    [can process](https://www.becomeanaimarketer.com/p/chatgpt-vs-claude-vs-gemini)
    and summarize large volumes of unstructured data, generate forecasts, and draw
    analytical conclusions. Generative AI is [modeling](https://www.nature.com/articles/s41586-021-03819-2)
    proteins, [optimizing](https://www.prnewswire.com/news-releases/leandna-survey-manufacturing-leaders-are-bullish-on-ai-for-supply-chain-growth-however-less-than-20-have-reached-full-digital-synchronization-302410663.html)
    logistics, and [predicting consumer behavior](https://www.bain.com/insights/for-marketers-generative-ai-moves-from-novelty-to-necessity/).
    [According](https://www.mckinsey.com/capabilities/mckinsey-digital/our-insights/The-economic-potential-of-generative-AI-The-next-productivity-frontier#key-insights)
    to McKinsey, its economic potential could reach up to $4.4 trillion annually.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760112130528" class="mdspan-comment">新</mdspan> 人工智能模型，如
    [GPT-4](https://www.evolution.ai/post/summarising-extracting-data-from-gpt-4)、[Claude
    3](https://claude3.pro/claude-3-ai-is-transforming-data-analytics/) 和 [Gemini](https://www.theverge.com/2024/12/12/24319697/gemini-ai-summarize-google-drive-folders)
    [可以处理](https://www.becomeanaimarketer.com/p/chatgpt-vs-claude-vs-gemini) 和总结大量非结构化数据，生成预测，并得出分析结论。生成式人工智能正在[建模](https://www.nature.com/articles/s41586-021-03819-2)蛋白质、[优化](https://www.prnewswire.com/news-releases/leandna-survey-manufacturing-leaders-are-bullish-on-ai-for-supply-chain-growth-however-less-than-20-have-reached-full-digital-synchronization-302410663.html)物流，并[预测消费者行为](https://www.bain.com/insights/for-marketers-generative-ai-moves-from-novelty-to-necessity/)。[据](https://www.mckinsey.com/capabilities/mckinsey-digital/our-insights/The-economic-potential-of-generative-AI-The-next-productivity-frontier#key-insights)麦肯锡公司，其经济潜力每年可能达到4.4万亿美元。
- en: Despite its impressive achievements, AI remains significantly [limited](https://www.hec.edu/en/knowledge/articles/could-ai-trigger-next-financial-crisis)
    in certain areas of analytics. It still cannot make [long-term](https://www.afponline.org/training-resources/resources/articles/Details/the-role-of-ai-in-forecasting-and-where-it-falls-short#:~:text=Common%20Challenges%20and%20Limitations%20of,the%20pattern%20of%20historical%20data.)
    economic forecasts and struggles to predict sudden market shifts. Industrial equipment
    data analytics is one of the fields where AI still falls short.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管取得了令人印象深刻的成就，但在某些分析领域，人工智能仍然存在显著[限制](https://www.hec.edu/en/knowledge/articles/could-ai-trigger-next-financial-crisis)。它仍然无法做出[长期](https://www.afponline.org/training-resources/resources/articles/Details/the-role-of-ai-in-forecasting-and-where-it-falls-short#:~:text=Common%20Challenges%20and%20Limitations%20of,the%20pattern%20of%20historical%20data.)经济预测，并且难以预测市场突然的变动。工业设备数据分析是人工智能仍然存在不足的领域之一。
- en: 'I have been working in the field of industrial analytics for over 10 years
    and have witnessed how this sector has undergone transformations and evolved through
    the introduction of new technologies. Today, artificial intelligence can detect
    even the slightest signs of malfunction. But I am convinced: AI still cannot work
    independently. In predictive maintenance, the role of the human analyst remains
    critical.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我在工业分析领域工作了10多年，见证了这一领域如何通过引入新技术而经历变革和演变。如今，人工智能可以检测到设备最轻微的故障迹象。但我坚信：人工智能仍然不能独立工作。在预测性维护中，人类分析师的作用仍然至关重要。
- en: How AI is involved in predictive maintenance
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能在预测性维护中的作用
- en: Predictive maintenance forecasts equipment failures by leveraging historical
    and real-time data from IIoT sensors, along with machine learning and artificial
    intelligence.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 预测性维护通过利用来自工业物联网（IIoT）传感器的历史和实时数据，结合机器学习和人工智能来预测设备故障。
- en: Temperature, vibration, load, and pressure — AI algorithms are trained on all
    these equipment performance indicators. They analyze real-time data streams and
    detect patterns that preceded past failures. AI systems can capture even the slightest
    deviations from normal operating conditions that would go unnoticed by humans.
    This may occur when a defect is just beginning to emerge.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 温度、振动、负载和压力——AI算法训练的所有这些设备性能指标。它们分析实时数据流并检测出过去故障之前出现的模式。AI系统可以捕捉到人类难以察觉的正常运行条件下的微小偏差。这可能会发生在缺陷刚开始出现的时候。
- en: Modern PdM systems not only analyze the causes that led to a failure but also
    suggest preventive actions that the maintenance team can take — for example, reducing
    the load on the equipment, replacing a part, or changing the lubricant. In this
    way, issues are resolved before they escalate into costly accidents. Among companies
    that have implemented predictive maintenance in their operations, [95% report](https://www.buildings.com/building-systems-om/automation-controls/article/33018018/5-predictive-maintenance-market-highlights-for-2024)
    financial benefits, and 27% saw a return on their investment in less than a year.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 现代预测性维护系统不仅分析导致故障的原因，还建议维护团队可以采取的预防措施——例如，减少设备的负载，更换零件或更换润滑剂。这样，问题在升级为代价高昂的事故之前就得到了解决。在实施预测性维护的公司中，[95%报告](https://www.buildings.com/building-systems-om/automation-controls/article/33018018/5-predictive-maintenance-market-highlights-for-2024)了财务收益，其中27%在不到一年的时间里就看到了投资回报。
- en: 'However, AI systems [still lack](https://www.mdpi.com/2076-3417/14/2/898) full
    autonomy, and engineer-analysts remain a critical part of predictive maintenance
    workflows. There are three main reasons why AI, for now, cannot fully replace
    human expertise:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，AI系统[仍然缺乏](https://www.mdpi.com/2076-3417/14/2/898)完全的自主性，工程师分析师仍然是预测性维护工作流程中的关键部分。以下是AI目前无法完全取代人类专业知识的三个主要原因：
- en: '**Lack of training data**We all know that AI models require vast amounts of
    historical (and high-quality!) data for training. In the case of industrial equipment,
    the situation becomes more complex: even by modest estimates, there can be millions
    of defect cases. However, when we need data where the equipment type, the defect’s
    stage of development, the operating conditions, and other parameters all align
    in a way that is relevant to a specific situation, it turns out that such data
    is scarce. If the equipment is new or rare, historical failure data may be entirely
    absent. In such cases, it is the engineer’s expertise that enables well-founded
    decisions.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**缺乏训练数据**我们都知道，AI模型需要大量的历史（以及高质量！）数据来训练。在工业设备的情况下，情况变得更加复杂：即使按保守估计，也可能有数百万个缺陷案例。然而，当我们需要的数据中，设备类型、缺陷的发展阶段、运行条件和其他参数都以一种与特定情况相关的方式对齐时，我们发现这样的数据是稀缺的。如果设备是新的或罕见的，历史故障数据可能完全不存在。在这种情况下，工程师的专业知识使得基于充分理由的决策成为可能。'
- en: '**AI lacks contextual awareness**While we’re busy counting how much we saved
    on Black Friday deals, enjoying the fact that we bought everything we needed (and
    some things we didn’t need), in fulfillment centers everything is just getting
    started. Conveyor lines are running at full capacity, and if there were even a
    minor defect in one of the bearings, its degradation would accelerate. The result:
    a sudden breakdown, a line stoppage, and complaints from customers whose orders
    are delayed. Increased equipment load during peak periods like Black Friday —
    that’s context. And AI may fail to take it into account. An AI system tracks trends
    and reacts to changes in equipment behavior, but it cannot always link those changes
    to why and how operating conditions are shifting. This complicates accurate diagnostics
    and identifying the root cause of a failure. For more reliable conclusions, it
    needs data that covers a wide range of scenarios — and there may be hundreds of
    them.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**AI缺乏情境意识**当我们忙于计算黑色星期五促销活动节省了多少时，享受着我们买到了所有需要的（以及一些不需要的）东西的事实时，在配送中心，一切才刚刚开始。输送带以全负荷运行，如果轴承中有一个小故障，其退化将会加速。结果是：突然的故障，生产线停工，以及因订单延迟而抱怨的客户。在黑色星期五等高峰期增加设备负载——这就是情境。而AI可能无法考虑到这一点。AI系统跟踪趋势并对设备行为的改变做出反应，但它不能总是将这些变化与操作条件为何以及如何变化联系起来。这使准确的诊断和确定故障的根本原因变得复杂。为了得出更可靠的结论，它需要涵盖广泛场景的数据——可能有数百种场景。'
- en: '**Data quality issues**IIoT technologies are radically transforming the approach
    to maintenance, but the quality of their performance directly depends on the quality
    of the data transmitted by sensors. And here, even the most advanced algorithm
    can fail. Production data can be noisy, incomplete, or distorted. Why does this
    happen? For example, vibration sensors may capture extraneous oscillations transmitted
    from neighboring equipment. In that case, AI may interpret them as a sign of a
    malfunction and issue a false alert. If this is not assessed by a human who knows
    that the power of the neighboring machine has increased, the maintenance team
    will, at best, waste time on unnecessary checks. The long-term consequence of
    such incidents is that the team may lose trust in the system and start ignoring
    alerts. Sensor data may also be lost due to a technical failure in the connection
    or because the battery in a wireless sensor has run out. An improperly installed
    or calibrated sensor will also produce false readings. An engineer-analyst can
    interpret such data in the context of the specific production process and distinguish
    a real malfunction from a measurement error.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据质量问题**IIoT技术正在彻底改变维护方法，但它们性能的质量直接取决于传感器传输的数据质量。在这里，即使是最高级的算法也可能失败。生产数据可能嘈杂、不完整或失真。为什么会这样呢？例如，振动传感器可能会捕捉到来自相邻设备的额外振荡。在这种情况下，AI可能会将其解释为故障的迹象并发出错误警报。如果没有人知道相邻机器的功率已经增加，那么维护团队最多只会浪费时间在不必要的检查上。此类事件的长远后果是，团队可能会失去对系统的信任并开始忽略警报。由于连接技术故障或无线传感器的电池耗尽，传感器数据也可能丢失。安装或校准不当的传感器也会产生错误读数。工程师分析师可以在特定生产过程的背景下解释此类数据，并区分真正的故障和测量错误。'
- en: How much data does AI need?
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI需要多少数据？
- en: Advanced predictive maintenance systems, depending on the number of IIoT sensors
    they work with, can collect billions of equipment performance measurements every
    day. Algorithms scan this data for patterns and filter out those that might indicate
    a defect. However, this is only a preliminary diagnosis — it must still be verified
    by experienced analysts.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 高级预测性维护系统，根据它们所使用的IIoT传感器的数量，每天可以收集数十亿台设备的性能测量数据。算法扫描这些数据以寻找模式，并过滤掉可能表明存在缺陷的数据。然而，这只是一个初步诊断——它必须由经验丰富的分析师进行验证。
- en: So why can’t AI guarantee 100% diagnostic accuracy yet? Let’s take bearings
    as an example.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 那么为什么AI还不能保证100%的诊断准确性呢？让我们以轴承为例。
- en: Bearings are present in nearly all industrial equipment, from motors to conveyors,
    and account for [around 40%](https://encyclopedia.pub/entry/54634) of equipment
    failures. Their condition is assessed through vibration data captured by IIoT
    sensors. These sensors transmit a signal to the PdM system — essentially, an audio
    recording of the mechanical humming. Using a mathematical algorithm called the
    Fast Fourier Transform, this signal is converted from the time domain to the frequency
    domain. A neural network, followed by a human engineer, then analyzes the vibration
    data in both the time and frequency domains to assess the condition of the bearing.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 滚珠轴承几乎存在于所有工业设备中，从电机到输送机，它们占到了设备故障的[约40%](https://encyclopedia.pub/entry/54634)。轴承的状态是通过IIoT传感器捕获的振动数据进行评估的。这些传感器将信号传输到预测性维护系统（PdM系统）——本质上，是机械嗡嗡声的音频记录。使用一种称为快速傅里叶变换（Fast
    Fourier Transform）的数学算法，这个信号从时域转换到频域。然后，一个神经网络，再由一名人类工程师，分析时域和频域中的振动数据，以评估轴承的状态。
- en: What follows are extremely approximate calculations designed to illustrate the
    sheer scale of the challenge facing AI developers.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些极端的近似计算，旨在说明AI开发者面临的挑战规模。
- en: 'Let’s base our model on vibration signal components measured along three axes:
    X, Y, and Z. Each measurement consists of 10,000 points in the frequency spectrum
    (a typical example). Thus, the input vector for the neural network contains 30,000
    numbers (10,000 spectral values per each of the three axes).'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以沿三个轴（X、Y和Z）测量的振动信号成分为基础构建我们的模型。每个测量包含频谱中的10,000个点（一个典型例子）。因此，神经网络输入向量包含30,000个数字（每个轴10,000个频谱值）。
- en: For tasks with a large number of input parameters, the minimum number of training
    examples should be 10 to 50 times the dimensionality of the input vector. This
    helps prevent overfitting and ensures robustness to noise. However, this estimate
    does not take into account the operational context of the bearing or other important
    factors that affect the amount of data needed to train the model.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 对于具有大量输入参数的任务，训练示例的最小数量应该是输入向量维度的10到50倍。这有助于防止过拟合并确保对噪声的鲁棒性。然而，这个估计并没有考虑到轴承的操作环境或其他影响训练模型所需数据量的重要因素。
- en: In the table, I list these factors with approximate values to illustrate how
    many cases the neural network might need to accurately recognize and classify
    bearing defects.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在表格中，我列出了这些因素及其近似值，以说明神经网络可能需要多少案例才能准确识别和分类轴承缺陷。
- en: '![](../Images/01d56da4f0b63a147da1f90a28cf486c.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/01d56da4f0b63a147da1f90a28cf486c.png)'
- en: How Much Data Is Needed to Detect a Bearing Defect. Image by Author
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 需要多少数据来检测轴承缺陷。图片由作者提供
- en: Only a small portion of the data received daily by the PdM system indicates
    potential issues, and not all warning signals are related to vibrations. Even
    the “problematic” vibration measurements usually indicate the early stages of
    a defect rather than its full development, since the PdM system is designed precisely
    to warn about defect progression.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: PdM系统每天接收的数据中只有一小部分表明潜在问题，并且并非所有警告信号都与振动有关。即使是“问题性”的振动测量通常也只表明缺陷的早期阶段，而不是其完全发展，因为PdM系统正是为了警告缺陷的发展而设计的。
- en: Therefore, the neural networks objectively lack sufficient data for all types
    of defects, at all stages of development, in every context, and across all bearings.
    While the network may detect patterns indicating a faulty bearing, it cannot always
    provide an exact diagnosis or give precise recommendations to the maintenance
    team. This is why vibration data engineers and analysts remain essential to Predictive
    Maintenance workflows.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，神经网络在客观上缺乏所有类型缺陷、所有发展阶段、所有环境和所有轴承的充分数据。虽然网络可能检测到表明轴承故障的图案，但它并不总能提供准确的诊断或向维护团队提供精确的建议。这就是为什么振动数据工程师和分析师在预测性维护工作流程中仍然至关重要。
- en: Future development of Predictive Maintenance
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预测性维护的未来发展
- en: 'The best results in PdM today come from the Human in the Loop (HITL) approach:
    algorithms process trillions of signals, while experts add context, filter out
    false alarms, and train models on real cases by correctly labeling data. The speed
    of machines, combined with expert experience, allows for both scaling analysis
    and improving decision accuracy simultaneously.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 目前在PdM中取得最佳结果的是“人机交互”(HITL)方法：算法处理万亿个信号，而专家则添加上下文，过滤掉误报，并通过正确标记数据在真实案例上训练模型。机器的速度与专家经验相结合，可以同时实现分析的可扩展性和决策准确性的提高。
- en: However, data is being generated so rapidly that I do not rule out fully autonomous
    AI systems in Predictive Maintenance in the coming years. The next stage of Predictive
    Analytics development overall is [Prescriptive Analytics](https://www.ibm.com/think/topics/prescriptive-analytics-for-manufacturing),
    which not only predicts future events, but also automatically resolves issues.
    There are already [services](https://www.motius.com/case-studies/holistic-innovation-siemens-predictive-services-for-spare-parts)
    that forecast spare parts needs and automatically place orders or [redirect production](https://ranial.com/case-study-transforming-automobile-manufacturing-with-real-time-monitoring-and-predictive-maintenance/)
    loads to other lines to avoid downtime. There is no doubt that the future promises
    even greater automation of equipment maintenance processes.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，数据正在以如此快的速度生成，以至于我不排除在未来几年内预测性维护中完全自主的AI系统。预测分析发展的下一阶段总体上是[规范性分析](https://www.ibm.com/think/topics/prescriptive-analytics-for-manufacturing)，它不仅预测未来事件，还能自动解决问题。已经有[服务](https://www.motius.com/case-studies/holistic-innovation-siemens-predictive-services-for-spare-parts)可以预测备件需求并自动下单或[重新分配](https://ranial.com/case-study-transforming-automobile-manufacturing-with-real-time-monitoring-and-predictive-maintenance/)生产负荷到其他生产线以避免停机时间。毫无疑问，未来承诺了设备维护过程的更大自动化。
