- en: 'Empirical Mode Decomposition: The Most Intuitive Way to Decompose Complex Signals
    and Time Series'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 经验模态分解：分解复杂信号和时间序列的最直观方法
- en: 原文：[https://towardsdatascience.com/preprocessing-signal-data-with-empirical-mode-decomposition/](https://towardsdatascience.com/preprocessing-signal-data-with-empirical-mode-decomposition/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/preprocessing-signal-data-with-empirical-mode-decomposition/](https://towardsdatascience.com/preprocessing-signal-data-with-empirical-mode-decomposition/)
- en: <mdspan datatext="el1763695848038" class="mdspan-comment">Are you struggling</mdspan>
    to analyze your time series as a data scientist?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763695848038" class="mdspan-comment">作为数据科学家，你是否在努力分析你的时间序列？</mdspan>
- en: Have you ever wondered whether signal processing could make your life easier?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否曾想过信号处理能否让你的生活变得更简单？
- en: If yes — stay with me. This article is made for you. 🙂
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是的话——跟我来。这篇文章是为你准备的。 🙂
- en: 'Working with real-world time series can be… painful. Financial curves, ECG
    traces, neural signals: they often look like chaotic spikes with no structure
    at all.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 处理现实世界的时间序列可能会……很痛苦。金融曲线、ECG 轨迹、神经信号：它们通常看起来像没有结构的混沌尖峰。
- en: 'Working with real-world time series can be… painful. Financial curves, ECG
    traces, neural signals: they often look like chaotic spikes with no structure
    at all.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 处理现实世界的时间序列可能会……很痛苦。金融曲线、ECG 轨迹、神经信号：它们通常看起来像没有结构的混沌尖峰。
- en: 'Working with real-world time series can be… painful. Financial curves, ECG
    traces, neural signals: they often look like chaotic spikes with no structure
    at all.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 处理现实世界的时间序列可能会……很痛苦。金融曲线、ECG 轨迹、神经信号：它们通常看起来像没有结构的混沌尖峰。
- en: 'In data science, we tend to rely on classical statistical preprocessing: seasonal
    decomposition, detrending, smoothing, moving averages… These techniques are useful,
    but they come with strong assumptions that are rarely valid in practice. And when
    those assumptions fail, your machine learning model might underperform or not
    generalize.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学中，我们倾向于依赖经典的统计预处理：季节分解、去趋势、平滑、移动平均……这些技术很有用，但它们带有强烈的假设，这些假设在实践中很少有效。当这些假设失败时，你的机器学习模型可能会表现不佳或无法泛化。
- en: Today, we’ll explore a family of methods that are rarely taught in data-science
    training, yet they can completely transform how you work with time data.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我们将探讨一组在数据科学培训中很少教授的方法，但它们可以完全改变你处理时间数据的方式。
- en: '* * *'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: On Today’s Menu 🍔
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在今天的菜单上 🍔
- en: 🍰 Why traditional methods struggle with real-world time series
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 🍰 为什么传统方法在处理现实世界时间序列时遇到困难
- en: 🍛 How signal-processing tools can help
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 🍛 信号处理工具如何帮助
- en: 🍔 How Empirical Mode Decomposition (EMD) works and where it fails
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 🍔 经验模态分解（EMD）的工作原理及其失败之处
- en: '* * *'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The “classic” preprocessing techniques I mentioned above are good starting points,
    but as i said they rely on fixed, defined assumptions about how a signal should
    behave.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我上面提到的“经典”预处理技术是很好的起点，但正如我所说，它们依赖于关于信号应该如何行为的固定、明确的假设。
- en: Most of them assume that the signal is stationary, meaning its statistical properties
    (mean, variance, spectral content) stay constant over time.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数假设信号是平稳的，这意味着其统计特性（均值、方差、频谱内容）随时间保持不变。
- en: 'But in reality, most real signals are:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 但在现实中，大多数真实信号是：
- en: '**non-stationary** (their frequency content evolves)'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非平稳**（它们的频率内容会变化）'
- en: '**non-linear** (they cannot be explained by simple additive components)'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非线性**（它们不能由简单的加性成分解释）'
- en: '**noisy**'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**噪声**'
- en: '**mixed with multiple oscillations at once**'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**同时混合多个振荡**'
- en: So… what exactly is a “signal”?
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么……“信号”究竟是什么？
- en: A signal is simply any quantity that varies over time (what we usually call
    a *time series* in data science).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 信号简单地指任何随时间变化的数量（我们在数据科学中通常称之为时间序列）。
- en: 'Some examples:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 一些例子：
- en: ❤️ **ECG or EEG** — biomedical/brain signals
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ❤️ **心电图或脑电图** — 生物医学/脑信号
- en: 🌋 **Seismic activity** — geophysics
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 🌋 **地震活动** — 地球物理学
- en: 🖥️ **CPU usage** — system monitoring
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 🖥️ **CPU 使用率** — 系统监控
- en: 💹 **Stock prices, volatility, order flow** — finance
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 💹 **股价、波动性、订单流** — 金融
- en: 🌦️ **Temperature or humidity** — climate science
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 🌦️ **温度或湿度** — 气候科学
- en: 🎧 **Audio waveforms** — speech & sound analysis
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 🎧 **音频波形** — 语音与声音分析
- en: '![](../Images/a316705429ccfaceff83f1984030d5bc.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a316705429ccfaceff83f1984030d5bc.png)'
- en: '**Figure 1:** Example of Magnetoencephalography (MEG) signal data. (Image by
    author)'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 1**：磁脑电图（MEG）信号数据示例。（图片由作者提供）'
- en: Signals are everywhere. And almost all of them violate the assumptions of classical
    time-series models.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 信号无处不在。几乎所有信号都违反了经典时间序列模型的假设。
- en: They are rarely “clean.” What i mean is that a single signal is usually a mixture
    of several processes happening at the same time.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 它们很少是“干净的”。我的意思是，一个单独的信号通常是由同时发生的几个过程混合而成的。
- en: 'Inside one signal, you can often find:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个信号中，你通常可以找到：
- en: '**slow trends**'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缓慢的趋势**'
- en: '**periodic oscillations**'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**周期性振荡**'
- en: '**short bursts**'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**短脉冲**'
- en: '**random noise**'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**随机噪声**'
- en: '**hidden rhythms you can’t see directly**'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你无法直接看到的隐藏节奏**'
- en: 👉 Now imagine you could separate all of these components — *directly from the
    data* — without assuming stationarity, without specifying frequency bands, and
    without forcing the signal into a predefined basis.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 👉 现在想象一下，你能够直接从数据中分离出所有这些组件——无需假设平稳性，无需指定频带，也不需要将信号强制到预定义的基中。
- en: That’s the promise of **data-driven signal decomposition**.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是**数据驱动信号分解**的承诺。
- en: 'This article is Part 1 of a 3-article series on adaptive decomposition:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章是关于自适应分解的3篇文章系列的第一篇：
- en: '**EMD — Empirical Mode Decomposition** *(today)*'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**EMD——经验模态分解** *(本期)*'
- en: '**VMD — Variational Mode Decomposition** *(next)*'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**VMD——变分模态分解** *(下期)*'
- en: '**MVMD — Multivariate VMD** *(next)*'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**MVMD——多元VMD** *(下期)*'
- en: Each method is more powerful and more stable than the previous one — and by
    the end of the series, you’ll understand how signal-processing methods can extract
    clean, interpretable components.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 每种方法都比前一种方法更强大、更稳定——到系列的最后，你将了解信号处理方法如何提取干净、可解释的组件。
- en: Empirical Mode Decomposition
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 经验模态分解
- en: Empirical Mode Decomposition was introduced by Huang et al. (1998) as part of
    the Hilbert–Huang Transform.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 经验模态分解是由Huang等人（1998年）作为Hilbert-Huang变换的一部分引入的。
- en: 'Its goal is simple but powerful: take a signal and split it into a set of clean
    oscillatory components, called Intrinsic Mode Functions (IMFs).'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 其目标是简单但强大：将一个信号分成一组干净的振荡组件，称为固有模态函数（IMFs）。
- en: Each IMF corresponds to an oscillation present in your signal, from the fastest
    to the slowest trends.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 每个IMF对应于信号中存在的振荡，从最快的到最慢的趋势。
- en: 'Take a look at Figure 2 below:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 看看下面的图2：
- en: At the top, you see the original signal.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在顶部，你看到原始信号。
- en: Below it, you see several IMFs — each one capturing a different “layer” of oscillation
    hidden inside the data.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面，你看到几个IMF——每个IMF捕捉数据中隐藏的不同“层”振荡。
- en: '**IMF₁** contains the fastest variations'
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**IMF₁** 包含最快的变异性'
- en: '**IMF₂** captures a slightly slower rhythm'
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**IMF₂** 捕捉一个稍微慢一点的节奏'
- en: …
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: …
- en: The last IMF + residual represent the slow trend or baseline
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 最后一个IMF加残差代表缓慢的趋势或基线
- en: Some IMFs will be useful for your machine learning task; others may correspond
    to noise, artifacts, or irrelevant oscillations.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 一些IMF将对你的人工智能任务有用；其他可能对应于噪声、伪影或不相关的振荡。
- en: '![](../Images/bfcf997ef91b8c562c63616dbc98628f.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bfcf997ef91b8c562c63616dbc98628f.png)'
- en: '**Figure 2:** Original signal (top) and 5 IMFs (bottom), ordered from high-frequency
    to low-frequency components. (Image by author)'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**图2**：原始信号（顶部）和5个IMF（底部），按从高频到低频的组件顺序排列。（图片由作者提供）'
- en: What is the Math behind EMD?
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: EMD背后的数学是什么？
- en: 'Any signal x(t) is decomposed by EMD as:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 任何信号x(t)都通过EMD分解为：
- en: '![](../Images/6be9ab6e046b0581bacd4df6f7c7aaa4.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6be9ab6e046b0581bacd4df6f7c7aaa4.png)'
- en: 'Where:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: '**Ci(t)** are the **Intrinsic Mode Functions (IMFs)**'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Ci(t)** 是**固有模态函数（IMFs**）'
- en: '**IMF₁** captures the **fastest oscillations**'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IMF₁** 捕捉**最快的振荡**'
- en: '**IMF₂** captures a **slower oscillation**, and so on…'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IMF₂** 捕捉一个**较慢的振荡**，依此类推…'
- en: '**r(t)** is the **residual** — the slow trend or baseline'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**r(t)** 是**残差**——缓慢的趋势或基线'
- en: '**Adding all IMFs + the residual reconstructs the original signal exactly**.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将所有IMFs和残差相加可以精确地重建原始信号**。'
- en: An IMF is a *clean oscillation* obtained directly from the data.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: IMF是从数据中直接获得的**干净振荡**。
- en: 'It must satisfy two simple properties:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 它必须满足两个简单的属性：
- en: '**The number of zero crossings ≈ the number of extrema**'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**零交叉的数量≈极值点的数量**'
- en: → The oscillation is well-behaved.
  id: totrans-75
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: → 振荡表现良好。
- en: '**The mean of the upper and lower envelopes is approximately zero**'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**上下包络的平均值大约为零**'
- en: → The oscillation is locally symmetric, with no long-term information.
  id: totrans-77
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: → 振荡在局部是对称的，没有长期信息。
- en: These two rules make IMFs fundamentally **data-driven** and **adaptive** unlike
    Fourier or wavelets, which force the signal into predetermined shapes.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这两条规则使IMF本质上是**数据驱动**和**自适应**的，与将信号强制到预定形状的傅里叶变换或小波不同。
- en: The intuition behind the EMD Algorithm
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: EMD算法背后的直觉
- en: 'The EMD algorithm is surprisingly intuitive. Here’s the extraction loop:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: EMD算法的直觉性令人惊讶。这里是提取循环：
- en: Start with your signal
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从你的信号开始
- en: Find all local maxima and minima
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 找到所有的局部极大值和极小值
- en: Interpolate them to form an upper and a lower envelope
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将它们插值以形成上包络和下包络
- en: (see Figure 3)
  id: totrans-84
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: （见图3）
- en: Compute the mean of both envelopes
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算两个包络的平均值
- en: Subtract this mean from the signal
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从信号中减去这个平均值
- en: '**→** This gives you a “candidate IMF.”'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**→** 这将给你一个“候选IMF”。'
- en: '6\. Then check the two IMF conditions:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 然后检查两个IMF条件：
- en: Does it have the same number of zero crossings and extrema?
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是否有相同数量的零交叉和极值？
- en: Is the mean of its envelopes approximately zero?
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们的包络的平均值大约为零吗？
- en: If **yes** → You have extracted **IMF₁**.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如果**是** → 你已经提取了**IMF₁**。
- en: If **no** → You repeat the process (called *sifting*) until it meets the criteria.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如果**没有** → 你重复这个过程（称为*筛选*）直到它满足标准。
- en: '7\. Once you obtain IMF₁ (the fastest oscillation):'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 一旦你获得了IMF₁（最快的振荡）：
- en: '**You subtract it from the original signal**,'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你从原始信号中减去它**，'
- en: The remainder becomes the **new signal**,
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 剩余部分成为**新信号**，
- en: And you repeat the process to extract IMF₂, IMF₃, …
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你重复这个过程以提取IMF₂，IMF₃，…
- en: This continues until there is no meaningful oscillation left.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这会一直持续到没有有意义的振荡为止。
- en: What remains is the **residual trend r(t)**.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 剩下的就是**残差趋势r(t)**。
- en: '![](../Images/bce0ac7e5ff551bd6b04015f7891fd4f.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bce0ac7e5ff551bd6b04015f7891fd4f.png)'
- en: '**Figure 3:** One iteration of the EMD. Top: Original signal (blue). Middle:
    Upper and lower envelopes (red). Bottom: Local mean (black). (Image by author)'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '**图3：** EMD的一次迭代。顶部：原始信号（蓝色）。中间：上包络和下包络（红色）。底部：局部均值（黑色）。（图片由作者提供）'
- en: EMD in Practice
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: EMD实践
- en: To really understand how EMD works, let’s create our own synthetic signal.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 为了真正理解EMD是如何工作的，让我们创建自己的合成信号。
- en: 'We’ll mix three components:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将混合三个成分：
- en: A low-frequency oscillation (around 5 Hz)
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 低频振荡（约5 Hz）
- en: A high-frequency oscillation (around 30 Hz)
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高频振荡（约30 Hz）
- en: A bit of random white noise
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一点随机的白噪声
- en: Once everything is summed into one single messy signal, we’ll apply the EMD
    method.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦所有内容都汇总成一个混乱的信号，我们将应用EMD方法。
- en: '[PRE0]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![](../Images/a051dcab52083382ed7a7e036ddeffef.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a051dcab52083382ed7a7e036ddeffef.png)'
- en: '**Figure 4:** A Synthetic Signal Containing Multiple Frequencies. (Image by
    author)'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**图4：** 包含多个频率的合成信号。（图片由作者提供）'
- en: 'An important detail:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 一个重要的细节：
- en: '**EMD automatically chooses the number of IMFs.**'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**EMD自动选择IMFs的数量。**'
- en: 'It keeps decomposing the signal until a *stopping criterion* is reached — typically
    when:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 它会一直分解信号，直到达到*停止标准*——通常是：
- en: no more oscillatory structure can be extracted
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不能再提取更多的振荡结构
- en: or the residual becomes a monotonic trend
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者残差变成单调趋势
- en: or the sifting process stabilizes
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者筛选过程稳定下来
- en: (You can also set a maximum number of IMFs if needed, but the algorithm naturally
    stops on its own.)
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: （如果需要，你也可以设置IMFs的最大数量，但算法会自然停止。）
- en: '[PRE1]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/efb5ada25d7dfaf42033dfffd5af62bf.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/efb5ada25d7dfaf42033dfffd5af62bf.png)'
- en: '**Figure 5:** EMD Decomposition of the Synthetic Signal. (Image by author)'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**图5：** 合成信号的EMD分解。（图片由作者提供）'
- en: EMD Limitations
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: EMD局限性
- en: 'EMD is powerful, but it has several weaknesses:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: EMD功能强大，但它有几个弱点：
- en: '**Mode mixing:** different frequencies can end up in the same IMF.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模式混合：**不同的频率可能最终落在同一个IMF中。'
- en: '**Oversplitting:** EMD decides the number of IMFs on its own and can extract
    too many.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过度分解：** EMD自行决定IMFs的数量，并可能提取太多。'
- en: '**Noise sensitivity:** small noise changes can completely alter the IMFs.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**噪声敏感性：** 小的噪声变化可以完全改变IMFs。'
- en: '**No solid mathematical foundation:** results are not guaranteed to be stable
    or unique.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**没有坚实的数学基础：**结果不保证稳定或唯一。'
- en: Because of these limitations, several improved versions exist (EEMD, CEEMDAN),
    but they remain empirical.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这些限制，存在几个改进版本（EEMD，CEEMDAN），但它们仍然是经验性的。
- en: This is exactly why methods like **VMD** were created — and this is what we’ll
    explore in the next article of this series.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是像**VMD**这样的方法被创造出来的原因——这也是我们将在这系列文章的下一篇文章中探讨的内容。
