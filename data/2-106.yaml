- en: LLMs Continue to Evolve. So Should Your Skill Set.
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLMs持续进化。你的技能集也应如此。
- en: 原文：[https://towardsdatascience.com/llms-continue-to-evolve-so-should-your-skill-set/](https://towardsdatascience.com/llms-continue-to-evolve-so-should-your-skill-set/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[LLMs持续进化，你的技能集也应如此](https://towardsdatascience.com/llms-continue-to-evolve-so-should-your-skill-set/)'
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《The Variable》的新一期，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[今天订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: Fine-tuning? RAG? Chain-of-thought? We suspect that for many of our readers,
    these [LLM-optimization](https://towardsdatascience.com/tag/llm/) approaches—as
    relevant as they might still be—feel a tad stale.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 微调？RAG？思维链？我们怀疑对于许多读者来说，这些[LLM优化](https://towardsdatascience.com/tag/llm/)方法——尽管它们可能仍然相关——感觉有点过时了。
- en: If you’d like to catch up on cutting-edge topics in the sprawling world of large
    language models, read on. This week’s Variable highlights three recent articles
    that will help you create powerful LLM workflows and overcome emerging challenges.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解大型语言模型广阔世界中的一些前沿话题，请继续阅读。本周的Variable重点介绍了三篇最近的文章，这些文章将帮助你创建强大的LLM工作流程并克服新兴的挑战。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: How to Create an LLM Judge That Aligns with Human Labels
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何创建与人类标签一致的大型语言模型裁判
- en: Evaluating the quality of LLM outputs continues to be a thorn in many a practitioner’s
    side. [Elena Samuylova](https://towardsdatascience.com/author/elena-samuylova/) presents
    a lucid, hands-on guide to building a robust LLM-as-a-judge pipeline that produces
    reliable and consistent results.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 评估LLM输出的质量继续是许多从业者心中的痛。Elena Samuylova提供了一份清晰、实用的指南，介绍如何构建一个健壮的LLM作为裁判的管道，该管道能够产生可靠和一致的结果。
- en: '[How to Create an LLM Judge That Aligns with Human Labels](https://towardsdatascience.com/how-to-create-an-llm-judge-that-aligns-with-human-labels/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何创建与人类标签一致的大型语言模型裁判](https://towardsdatascience.com/how-to-create-an-llm-judge-that-aligns-with-human-labels/)'
- en: Your 1M+ Context Window LLM Is Less Powerful Than You Think
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你的1M+上下文窗口LLM比你想象的要弱
- en: Before you worry about how many tokens your model can process, consider its
    effective working memory. Tobias Schnabel explains why.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在你担心你的模型可以处理多少个标记之前，考虑一下它的有效工作内存。Tobias Schnabel解释了原因。
- en: '[Your 1M+ Context Window LLM Is Less Powerful Than You Think](https://towardsdatascience.com/your-1m-context-window-llm-is-less-powerful-than-you-think/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[你的1M+上下文窗口LLM比你想象的要弱](https://towardsdatascience.com/your-1m-context-window-llm-is-less-powerful-than-you-think/)'
- en: 'Exploring Prompt Learning: Using English Feedback to Optimize LLM Systems'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索提示学习：使用英语反馈优化LLM系统
- en: Based on her team’s recent work, Aparna Dhinakaran outlines a promising new
    approach that “uses natural language feedback to iteratively improve prompts.”
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 基于她团队最近的工作，Aparna Dhinakaran概述了一种有希望的新方法，该方法“使用自然语言反馈来迭代改进提示”。
- en: '[Exploring Prompt Learning: Using English Feedback to Optimize LLM Systems](https://towardsdatascience.com/exploring-prompt-learning-using-english-feedback-to-optimize-llm-systems/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[探索提示学习：使用英语反馈优化LLM系统](https://towardsdatascience.com/exploring-prompt-learning-using-english-feedback-to-optimize-llm-systems/)'
