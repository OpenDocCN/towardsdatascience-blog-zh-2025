- en: Meet Our New Authors
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'Explore top-notch work from some of our recently added contributors:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 探索我们最近添加的一些贡献者的优质作品：
- en: '[Shireesh Kumar Singh](https://towardsdatascience.com/author/shireeshkumar-singh/) is
    an IBM Cloud software engineer whose first TDS articles focus on network-congestion
    forecasting and knowledge graphs.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Shireesh Kumar Singh](https://towardsdatascience.com/author/shireeshkumar-singh/) 是一位IBM
    Cloud软件工程师，他的第一篇TDS文章专注于网络拥塞预测和知识图谱。'
- en: '[From Rules to Relationships: How Machines Are Learning to Understand Each Other](https://towardsdatascience.com/from-rules-to-relationships-how-machines-are-learning-to-understand-each-other/)'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[从规则到关系：机器是如何学习相互理解的](https://towardsdatascience.com/from-rules-to-relationships-how-machines-are-learning-to-understand-each-other/)'
- en: '[Pavel Timonin](https://towardsdatascience.com/author/pavel-timonin/) joins
    us with software-engineering expertise of his own; his debut story is a hands-on
    computer vision deep dive.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Pavel Timonin](https://towardsdatascience.com/author/pavel-timonin/) 凭借他自己的软件工程专业知识加入我们；他的处女作是一篇关于计算机视觉的实战深入探讨。'
- en: '[Gain a Better Understanding of Computer Vision: Dynamic SOLO (SOLOv2) with
    TensorFlow](https://towardsdatascience.com/dynamic-solo-solov2-with-tensorflow-for-better-understanding-computer-vision/)'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[通过动态SOLO (SOLOv2) 和TensorFlow更好地理解计算机视觉](https://towardsdatascience.com/dynamic-solo-solov2-with-tensorflow-for-better-understanding-computer-vision/)'
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us](https://towardsdatascience.com/questions-96667b06af5/)?
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢发布新作者的文章，所以如果你最近撰写了一篇关于我们核心主题的有趣的项目演练、教程或理论反思，为什么不 [与我们分享](https://towardsdatascience.com/questions-96667b06af5/)？
