- en: AI Agent with Multi-Session Memory
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 具有多会话记忆的AI代理
- en: 原文：[https://towardsdatascience.com/ai-agent-with-multi-session-memory/](https://towardsdatascience.com/ai-agent-with-multi-session-memory/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/ai-agent-with-multi-session-memory/](https://towardsdatascience.com/ai-agent-with-multi-session-memory/)
- en: Intro
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: 'In Computer Science, just like in human cognition, there are different levels
    of memory:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在计算机科学中，就像在人类认知中一样，存在不同的记忆层级：
- en: '**Primary Memory** (like RAM) is the active temporary memory used for current
    tasks, reasoning, and decision-making on current tasks. It holds the information
    you are currently working with. It’s **fast but volatile**, meaning that it loses
    data when the power is off.'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一级记忆**（如RAM）是用于当前任务、推理和决策的活跃临时记忆。它保存您当前正在处理的信息。它是**快速但易失的**，这意味着断电时会丢失数据。'
- en: '**Secondary Memory** (like physical storage) refers to long-term storage of
    learned knowledge that is not immediately active in working memory. It’s not always
    accessed during real-time decision-making but can be retrieved when needed. Therefore,
    it is **slower but more persistent**.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**二级记忆**（如物理存储）指的是长期存储的学习知识，这些知识在工作记忆中不是立即活跃的。在实时决策过程中并不总是被访问，但在需要时可以检索。因此，它是**较慢但更持久的**。'
- en: '**Tertiary Memory** (like backup of historical data) refers to archival memory,
    where information is stored for backup purposes and disaster recovery. It’s characterized
    by **high capacity and low cost, but with slower** access time.Consequently, it’s
    rarely used.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**三级记忆**（如历史数据的备份）指的是存档记忆，其中信息被存储用于备份目的和灾难恢复。它以**高容量和低成本**为特点，但访问时间较慢。因此，它很少被使用。'
- en: AI Agents can leverage all the types of memory. First, they can use Primary
    Memory to handle your current question. Then, they would access Secondary Memory
    to bring in knowledge from recent conversations. And, if needed, they might even
    retrieve older information from Tertiary Memory.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理可以利用所有类型的记忆。首先，它们可以使用**一级记忆**来处理您当前的问题。然后，它们会访问**二级记忆**以引入最近对话中的知识。如果需要，它们甚至可能从**三级记忆**中检索更旧的信息。
- en: In this tutorial, I’m going to show how to **build an AI Agent with memory across
    multiple sessions**. I will present some useful Python code that can be easily
    applied in other similar cases (just copy, paste, run) and walk through every
    line of code with comments so that you can replicate this example (link to full
    code at the end of the article).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个教程中，我将展示如何**构建一个跨多个会话具有记忆的AI代理**。我将展示一些可以轻松应用于其他类似情况的实用Python代码（只需复制、粘贴、运行），并逐行带注释地解释代码，以便您可以复制此示例（文章末尾有完整代码的链接）。
- en: Setup
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置
- en: Let’s start by setting up [***Ollama***](https://ollama.com/)(`pip install ollama==0.5.1`),
    a library that allows users to run open-source LLMs locally, without needing cloud-based
    services, giving more control over data privacy and performance. Since it runs
    locally, any conversation data does not leave your machine.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从设置[***Ollama***](https://ollama.com/)(`pip install ollama==0.5.1`)开始，这是一个允许用户在本地运行开源LLMs的库，无需云服务，从而提供更多对数据隐私和性能的控制。由于它是在本地运行的，任何对话数据都不会离开您的机器。
- en: First of all, you need to download *Ollama* from the website.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，您需要从网站上下载*Ollama*。
- en: '![](../Images/d90f38a72bde7bd1406eacedafae8f4e.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d90f38a72bde7bd1406eacedafae8f4e.png)'
- en: Then, on the prompt shell of your laptop, use the command to download the selected
    LLM. I’m going with Alibaba’s ***Qwen***, as it’s both smart and light.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在您的笔记本电脑的提示符shell中，使用命令下载选定的LLM。我选择使用阿里巴巴的***Qwen***，因为它既智能又轻便。
- en: '![](../Images/81f5386d8c3805c35d9fa511fd494ab4.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/81f5386d8c3805c35d9fa511fd494ab4.png)'
- en: After the download is completed, you can move on to Python and start writing
    code.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 下载完成后，您可以继续使用Python并开始编写代码。
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Let’s test the LLM:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们测试LLM：
- en: '[PRE1]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/6959b9689c74fa5ceca40bdad86f38cb.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6959b9689c74fa5ceca40bdad86f38cb.png)'
- en: Database
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据库
- en: An Agent with multi-session memoryis an Artificial Intelligence system that
    can **remember information from one interaction to the next**, even if those interactions
    happen at different times or over separate sessions. For example, a personal assistant
    AI that remembers your daily schedule and preferences, or a customer support Bot
    that knows your issue history without needing you to re-explain each time.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 具有多会话记忆的代理是一种人工智能系统，它可以从一次交互记住信息到下一次交互，即使这些交互发生在不同时间或不同的会话中。例如，一个记住您日常日程和偏好的个人助理AI，或者一个不需要您每次都重新解释问题的客户支持机器人。
- en: Basically, the Agent needs to access the chat history. Based on how old the
    past conversations are, this could be classified as Secondary or Tertiary Memory.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，代理需要访问聊天历史。根据过去的对话有多久，这可以归类为二级或三级记忆。
- en: Let’s get to work. We can store conversation data in a [**vector database**](https://en.wikipedia.org/wiki/Vector_database),
    which is the best solution for efficiently storing, indexing, and searching unstructured
    data. Currently, the most used vector db is Microsoft’s [*AISearch*](https://azure.microsoft.com/en-us/products/ai-services/ai-search),
    while the best open-source one is [***ChromaDB***](https://www.trychroma.com/),
    which is useful, easy, and free.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始工作。我们可以将对话数据存储在[**向量数据库**](https://en.wikipedia.org/wiki/Vector_database)，这是高效存储、索引和搜索非结构化数据的最佳解决方案。目前，最常用的向量数据库是微软的[*AISearch*](https://azure.microsoft.com/en-us/products/ai-services/ai-search)，而最好的开源向量数据库是[***ChromaDB***](https://www.trychroma.com/)，它实用、易于使用且免费。
- en: 'After a quick `pip install chromadb==0.5.23` you can interact with the db using
    Python in [three different ways](https://docs.trychroma.com/getting-started):'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '快速执行`pip install chromadb==0.5.23`后，您可以使用Python以三种不同的方式与数据库交互 [three different
    ways](https://docs.trychroma.com/getting-started):'
- en: '`chromadb.Client()` to create a db that stays temporarily in memory without
    occupying physical space on disk.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`chromadb.Client()`创建一个临时存储在内存中而不占用磁盘物理空间的数据库。
- en: '`chromadb.PersistentClient(path)`to save and load the db from your local machine.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`chromadb.PersistentClient(path)`从您的本地机器保存和加载数据库。
- en: '`chromadb.HttpClient(host=''localhost'', port=8000)` to have a client-server
    mode on your browser.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`chromadb.HttpClient(host='localhost', port=8000)`在浏览器上启用客户端-服务器模式。
- en: When storing documents in *ChromaDB*, data are saved as vectors so that one
    can search with a query-vector to retrieve the closest matching records. Please
    note that, if not specified otherwise, the default embedding function is a [sentence
    transformer](https://docs.trychroma.com/guides/embeddings) model ([*all-MiniLM-L6-v2*](https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2)*)*.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 当在*ChromaDB*中存储文档时，数据以向量形式保存，以便可以使用查询向量进行搜索以检索最接近的匹配记录。请注意，如果不作其他说明，默认嵌入函数是一个[sentence
    transformer](https://docs.trychroma.com/guides/embeddings)模型 ([*all-MiniLM-L6-v2*](https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2)*))。
- en: '[PRE2]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'To store your data, first you need to **extract the chat** and save it as one
    text document. In *Ollama*, there are3 rolesin the interaction with an LLM:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 要存储您的数据，首先您需要**提取聊天**并将其保存为一个文本文档。在*Ollama*中，与LLM的交互中有3个角色：
- en: '*system* — used to pass core instructions to the model on how the conversation
    should proceed (i.e. the main prompt)'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*系统* —— 用于向模型传递关于对话应如何进行的核心指令（即主要提示）'
- en: '*user* — used for user’s questions, and also for memory reinforcement (i.e.
    “remember that the answer must have a specific format”)'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*用户* —— 用于用户的问题，也用于记忆强化（即“记住答案必须具有特定的格式”）'
- en: '*assistant* — it’s the reply from the model (i.e. the final answer)'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*助手* —— 这是模型的回复（即最终答案）'
- en: '![](../Images/9074ef517d09b5d7d99a55e735df0ebb.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9074ef517d09b5d7d99a55e735df0ebb.png)'
- en: Ensure that each document has a unique id, which you can generate manually or
    allow *Chroma* to auto-generate. One important thing to mention is that you can
    add additional information as metadata (i.e., title, tags, links). It is optional
    but very useful, as **metadata enrichment** can significantly enhance document
    retrieval. For instance, here, I’m going to use the LLM to summarize each document
    into a few keywords.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 确保每个文档都有一个唯一的ID，您可以手动生成或允许*Chroma*自动生成。需要提到的一点是，您可以添加额外的信息作为元数据（例如，标题、标签、链接）。这是可选的，但非常有用，因为**元数据丰富化**可以显著提高文档检索。例如，这里我将使用LLM将每个文档总结为几个关键词。
- en: '[PRE3]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We need to start and save a chat to see it in action.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要开始并保存一个聊天，以便看到它的实际效果。
- en: Run basic Agent
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行基本代理
- en: To start, I shall run a very basic LLM chat (no tools needed) to save the first
    conversation in the database. During the interaction, I am going to mention some
    important information, not included in the LLM knowledge base, that I want the
    Agent to remember in the next session.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我将运行一个非常基本的LLM聊天（不需要工具）以将第一次对话保存到数据库中。在交互过程中，我将提及一些重要的信息，这些信息不包括在LLM知识库中，我希望代理在下次会话中记住。
- en: '[PRE4]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/8fd9ddfc37d3ee77675c3459d8994984.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8fd9ddfc37d3ee77675c3459d8994984.png)'
- en: At the end, the conversation was saved with enriched metadata.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，对话被保存，并附带了丰富的元数据。
- en: '![](../Images/ae700b7915225f2e5588e785d1fc3f5a.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ae700b7915225f2e5588e785d1fc3f5a.png)'
- en: Tools
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工具
- en: I want the Agent to be able to retrieve information from previous conversations.
    Therefore, I need to provide it with a Tool to do so. To put it in another way,
    the Agent must do a **Retrieval-Augmented Generation (RAG)** from the history.
    It’s a technique that combines retrieval and generative models by adding to LLMs
    knowledge facts fetched from external sources (in this case, *ChromaDB*).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让代理能够从之前的对话中检索信息。换句话说，代理必须从历史中执行**检索增强生成（RAG）**。这是一种通过向LLMs添加从外部来源（在这种情况下，*ChromaDB*）获取的知识事实来结合检索和生成模型的技术。
- en: '[PRE5]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: After fetching data, the AI must process all the information and give the final
    answer to the user. Sometimes, it can be more effective to treat the **“final
    answer” as a Tool**. For example, if the Agent does multiple actions to generate
    intermediate results, the final answer can be thought of as the Tool that integrates
    all of this information into a cohesive response. By designing it this way, you
    have more customization and control over the results.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在获取数据后，AI必须处理所有信息并向用户给出最终答案。有时，将**“最终答案”视为工具**可能更有效。例如，如果代理执行多个操作以生成中间结果，最终答案可以被视为将所有这些信息整合成一个连贯响应的工具。通过这种方式设计，你可以对结果有更多的定制和控制。
- en: '[PRE6]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We’re finally ready to test the Agent and its memory.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们终于准备好测试代理及其记忆了。
- en: '[PRE7]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Run Agent with memory
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用记忆运行代理
- en: I shall add a couple of **utils functions** for Tool usage and for running the
    Agent.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我将为工具使用和运行代理添加几个**实用函数**。
- en: '[PRE8]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: When the Agent is trying to solve a task, I want to keep track of the Tools
    that have been used and the results it gets. The model should try each Tool only
    once, and the iteration shall stop only when the Agent is ready to give the final
    answer.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当代理试图解决问题时，我想跟踪使用过的工具和得到的结果。模型应该只尝试每个工具一次，迭代只有在代理准备好给出最终答案时才停止。
- en: '[PRE9]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Let’s start a new interaction, and this time I want the Agent to activate all
    the Tools, for retrieving and processing old information.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始一个新的交互，这次我想让代理激活所有工具，用于检索和处理旧信息。
- en: '[PRE10]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![](../Images/cc261c992825c68dc91337a1829f3f31.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cc261c992825c68dc91337a1829f3f31.png)'
- en: I gave the Agent a task not directly correlated to the topic of the last session.
    As expected, the Agent activated the Tool and looked into previous chats. Now,
    it will use the “final answer” to process the information and respond to me.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我给代理分配了一个与上次会话主题不直接相关的任务。不出所料，代理激活了工具并查看了之前的聊天记录。现在，它将使用“最终答案”来处理信息并回应我。
- en: '![](../Images/f71493e1844ffa3b62a83e1adc9a57da.png)![](../Images/df2962c506d6c4e2c97c381c844cfb53.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f71493e1844ffa3b62a83e1adc9a57da.png)![图片](../Images/df2962c506d6c4e2c97c381c844cfb53.png)'
- en: Conclusion
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This article has been a tutorial to demonstrate **how to build AI Agents with
    Multi-Session Memory from scratch using only *Ollama*. **With these building blocks
    in place, you are already equipped to start developing your own Agents for different
    use cases.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 本文是一篇教程，展示了如何从头开始使用*Ollama*构建具有多会话记忆的AI代理。有了这些构建块，你已经准备好开始为不同的用例开发自己的代理。
- en: Full code for this article: **[GitHub](https://github.com/mdipietro09/GenerativeAI/blob/main/Agents_ZeroToHero/notebook_III_memory.ipynb)**
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的完整代码：**[GitHub](https://github.com/mdipietro09/GenerativeAI/blob/main/Agents_ZeroToHero/notebook_III_memory.ipynb)**
- en: I hope you enjoyed it! Feel free to contact me for questions and feedback or
    just to share your interesting projects.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你喜欢它！欢迎联系我提问、反馈或分享你的有趣项目。
