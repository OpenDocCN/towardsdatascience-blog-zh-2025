- en: Comprehensive Guide to Dependency Management in Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Python依赖项管理的全面指南
- en: 原文：[https://towardsdatascience.com/comprehensive-guide-to-dependency-management-in-python/](https://towardsdatascience.com/comprehensive-guide-to-dependency-management-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/comprehensive-guide-to-dependency-management-in-python/](https://towardsdatascience.com/comprehensive-guide-to-dependency-management-in-python/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 简介
- en: 'When learning Python, many beginners focus solely on the language and its libraries
    while completely ignoring virtual environments. As a result, managing Python projects
    can become a mess: dependencies installed for different projects may have conflicting
    versions, leading to compatibility issues.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当学习Python时，许多初学者只关注语言及其库，而完全忽略了虚拟环境。因此，管理Python项目可能会变得混乱：为不同项目安装的依赖项可能存在冲突版本，导致兼容性问题。
- en: Even when I studied Python, nobody emphasized the importance of virtual environments,
    which I now find very strange. They are an extremely useful tool for isolating
    different projects from each other.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在我学习Python的时候，也没有人强调虚拟环境的重要性，现在我觉得这非常奇怪。它们是隔离不同项目之间的极有用工具。
- en: In this article, I will explain how virtual environments work, provide several
    examples, and share useful commands for managing them.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将解释虚拟环境是如何工作的，提供几个示例，并分享管理它们的有用命令。
- en: Problem
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: Imagine you have two Python projects on your laptop, each located in a different
    directory. You realize that you need to install the latest version of library
    A for the first project. Later, you switch to the second project and attempt to
    install library B.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你笔记本电脑上有两个Python项目，每个项目位于不同的目录中。你意识到你需要为第一个项目安装库A的最新版本。稍后，你切换到第二个项目并尝试安装库B。
- en: Here’s the problem: *library B depends on library A, but it requires a different
    version than the one you installed earlier*.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的问题是：*库B依赖于库A，但它需要与之前安装的不同版本*。
- en: '![](../Images/2bb6815ce45d8e4c3fd234e8ac33543b.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2bb6815ce45d8e4c3fd234e8ac33543b.png)'
- en: Since you haven’t used any tool for dependency management, all dependencies
    are installed globally on your computer. Due to the incompatible versions of library
    A, you encounter an error when trying to install library B.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 由于你没有使用任何依赖项管理工具，所有依赖项都全局安装在你的计算机上。由于库A的版本不兼容，当你尝试安装库B时，你会遇到错误。
- en: Solution
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: To prevent such issues, virtual environments are used. The idea is to allocate
    a separate storage space for each Python project. Each storage will contain all
    the externally downloaded dependencies for a specific project in an isolated manner.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为了防止此类问题，使用虚拟环境。其想法是为每个Python项目分配一个单独的存储空间。每个存储空间将以隔离的方式包含特定项目的所有外部下载的依赖项。
- en: More specifically, if we download the same library A for two projects within
    their own virtual environments, library A will be downloaded twice — once for
    each environment. Moreover, the versions of the library can differ between the
    environments because each environment is completely isolated and does not interact
    with the others.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地说，如果我们为两个项目（在各自的虚拟环境中）下载相同的库A，库A将被下载两次——一次为每个环境。此外，库的版本可以在环境之间有所不同，因为每个环境都是完全隔离的，并且不与其他环境交互。
- en: Now that the motivation behind using virtual environments is clear, let’s explore
    how to create them in Python.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在虚拟环境使用的动机已经清楚，让我们来探讨如何在Python中创建它们。
- en: Virtual environments in Python
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Python中的虚拟环境
- en: 'It is recommended to create a virtual environment in the root directory of
    a project. An environment is created using the following command in the terminal:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 建议在项目的根目录中创建虚拟环境。在终端中使用以下命令创建环境：
- en: '[PRE0]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'By convention, *<environment_name>* is usually named **venv**, so the command
    becomes:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 按照惯例，*<环境名称>* 通常命名为 **venv**，所以命令变为：
- en: '[PRE1]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: As a result, this command creates a directory called *venv*, which contains
    the virtual environment itself. It is even possible to go inside that directory,
    but in most cases, it is not very useful, as the* venv* directory primarily contains
    system scripts that are not intended to be used directly.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这个命令创建了一个名为 *venv* 的目录，其中包含虚拟环境本身。甚至可以进入该目录，但在大多数情况下，这并不很有用，因为 *venv* 目录主要包含系统脚本，这些脚本不是直接使用的。
- en: 'To activate the virtual environment, use the following command:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 要激活虚拟环境，使用以下命令：
- en: '[PRE2]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Once the environment is activated, we can install dependencies for the project.
    As long as the* venv* is activated, any installed dependency will only belong
    to that environment.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦环境被激活，我们就可以为项目安装依赖项。只要 `venv` 被激活，任何安装的依赖项都将仅属于该环境。
- en: 'To deactivate the virtual environment, type:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 要停用虚拟环境，请输入：
- en: '[PRE3]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Once the environment is deactivated, the terminal returns to its normal state.
    For example, you can switch to another project and activate its environment there.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦环境被停用，终端将返回其正常状态。例如，你可以切换到另一个项目并在那里激活其环境。
- en: Dependency management
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 依赖管理
- en: Installing libraries
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装库
- en: Before installing any dependencies, it is recommended to activate a virtual
    environment to ensure that installed libraries belong to a single project. This
    helps avoid global version conflicts.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在安装任何依赖项之前，建议激活虚拟环境以确保安装的库属于单个项目。这有助于避免全局版本冲突。
- en: The most frequently used command for dependency management is pip. Compared
    to other alternatives, *pip* is intuitive and simple to use.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在依赖管理中最常用的命令是 pip。与其他替代方案相比，`pip` 更直观且易于使用。
- en: 'To install a library, type:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 要安装一个库，请输入：
- en: '[PRE4]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '*In the examples below instead of the <library_name>, I will write pandas (the
    most commonly used data analysis library).*'
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*在下面的示例中，我将用 pandas（最常用的数据分析库）代替 <library_name>。*'
- en: 'So, for instance, if we wanted to download the latest version of pandas, we
    should have typed:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，例如，如果我们想下载 pandas 的最新版本，我们应该输入：
- en: '[PRE5]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'In some scenarios, we might need to install a specific version of a library. *pip* provides
    a simple syntax to do that:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些场景中，我们可能需要安装库的特定版本。`pip` 提供了一种简单的语法来实现这一点：
- en: '[PRE6]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Viewing dependency details
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 查看依赖详情
- en: 'If you are interested in a particular dependency that you have installed, a
    simple way to get more information about it is to use the `pip show` command:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对你已安装的特定依赖项感兴趣，获取更多信息的简单方法是使用 `pip show` 命令：
- en: '[PRE7]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'For example, the command in the example will output the following information:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，示例中的命令将输出以下信息：
- en: '![](../Images/bcfcda7cd417e5f8487c3ffb81dc3d52.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bcfcda7cd417e5f8487c3ffb81dc3d52.png)'
- en: Example of the output of the **pip show** command
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**pip show** 命令的输出示例'
- en: Deleting dependency
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 删除依赖项
- en: 'To remove a dependency from a virtual environment, use the following command:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 要从虚拟环境中删除依赖项，请使用以下命令：
- en: '[PRE8]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: After executing this command, all files related to the specified library will
    be deleted, thus freeing up disk space. However, if you run a Python program that
    imports this library again, you will encounter an ImportError.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 执行此命令后，将与指定库相关的所有文件将被删除，从而释放磁盘空间。但是，如果你再次运行导入此库的 Python 程序，你将遇到 ImportError。
- en: File with requirements
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需求文件
- en: 'A common practice when managing dependencies is to create a *requirements.txt* file
    that contains a list of all downloaded dependencies in the project along with
    their versions. Here is an example of what it might look like:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在管理依赖项时，创建一个包含项目中所有下载的依赖项及其版本的 `requirements.txt` 文件是一种常见的做法。以下是一个示例：
- en: '[PRE9]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Ideally, every time you use the `pip install` command, you should add a corresponding
    line to the *requirements.txt* file to keep track of all the libraries used in
    the project.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，每次你使用 `pip install` 命令时，都应该在 `requirements.txt` 文件中添加相应的行，以跟踪项目中使用的所有库。
- en: 'However, if you forget to do that, there is still an alternative: the `pip
    freeze` command outputs all of the installed dependencies in the project. Nevertheless, `pip
    freeze` can be quite verbose, often including many other library names that are
    dependencies of the libraries you are using in the project.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你忘记了这样做，还有一个替代方案：`pip freeze` 命令会输出项目中所有已安装的依赖项。尽管如此，`pip freeze` 可能相当冗长，通常包括许多其他库的名称，这些库是项目中使用的库的依赖项。
- en: '[PRE10]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '*Given this, it’s a good habit to add installed requirements with their versions
    to the requirements.txt file.*'
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*因此，将已安装的依赖项及其版本添加到 requirements.txt 文件中是一个好习惯。*'
- en: Whenever you clone a Python project, it is expected that a requirements.txt
    file is already present in the Git repository. To install all the dependencies
    listed in this file, you use the `pip install` command along with the -r flag
    followed by the requirements filename.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 每次克隆 Python 项目时，都期望 Git 仓库中已经存在一个 requirements.txt 文件。要安装此文件中列出的所有依赖项，请使用带有
    -r 标志的 `pip install` 命令，后跟 requirements 文件名。
- en: '[PRE11]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '*Conversely, whenever you work on a Python project, you should create a requirements.txt
    file so that other collaborators can easily install the necessary dependencies.*'
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*相反，每次你在 Python 项目上工作时，都应该创建一个 requirements.txt 文件，以便其他协作人员可以轻松安装必要的依赖项。*'
- en: .gitignore
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: .gitignore
- en: When working with version control systems, virtual environments should never
    be pushed to Git! Instead, they must be mentioned in a .gitignore file.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 当与版本控制系统一起工作时，虚拟环境绝不应该被推送到 Git！相反，它们必须在 .gitignore 文件中提及。
- en: '*Virtual environments tend to be very large, and if there is an existing requirements.txt
    file, there should be no problem downloading all necessary dependencies.*'
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*虚拟环境往往非常大，如果存在现有的 requirements.txt 文件，则下载所有必要的依赖项应该没有问题。*'
- en: Conclusion
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we have looked at the very important concept of virtual environments.
    By isolating downloaded dependencies for different projects, they allow for easier
    management of multiple Python projects.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了虚拟环境这一非常重要的概念。通过为不同的项目隔离下载的依赖项，它们使得管理多个 Python 项目变得更加容易。
- en: '*All images are by the author unless noted otherwise.*'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '*除非另有说明，所有图像均为作者所有。*'
