- en: 'The State of AI Agents: Everyone’s Doing It, Nobody Knows Why'
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI代理的状态：每个人都这样做，但没有人知道为什么
- en: You’ve probably seen the stats. [95% of companies are now using generative AI,
    with 79% specifically implementing AI agents](https://www.bain.com/insights/survey-generative-ai-uptake-is-unprecedented-despite-roadblocks/),
    according to Bain’s 2024 survey. That sounds impressive — until you look a little
    closer and find out only *1%* of them consider those implementations “mature.”
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经看到了统计数据。根据贝恩公司2024年的调查，现在95%的公司正在使用生成式AI，其中79%特别实施了AI代理[（https://www.bain.com/insights/survey-generative-ai-uptake-is-unprecedented-despite-roadblocks/）]。这听起来很令人印象深刻——直到你仔细看看，发现其中只有*1%*认为这些实施是“成熟的”。
- en: 'Translation: most teams are duct-taping something together and hoping it doesn’t
    explode in production.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 翻译：大多数团队都在用胶带把东西粘在一起，希望它们在生产中不会爆炸。
- en: I say this with love — I was one of them.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我这样说是因为爱——我曾经也是其中之一。
- en: 'There’s this moment when you first build an agent system that works — even
    a small one — and it *feels like magic*. The LLM decides what to do, picks tools,
    loops through steps, and comes back with an answer like it just went on a mini
    journey. You think: “Why would I ever write rigid pipelines again when I can just
    let the model figure it out?”'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 当你第一次构建一个有效的代理系统——即使是一个小的——你会觉得它*就像魔法一样*。LLM决定做什么，选择工具，循环步骤，然后带着一个答案回来，就像它刚刚进行了一次迷你旅行。你想：“为什么我还要写僵化的管道，当我可以让模型自己解决这些问题呢？”
- en: And then the complexity creeps in.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，复杂性逐渐渗透进来。
- en: You go from a clean pipeline to a network of tool-wielding LLMs reasoning in
    circles. You start writing logic to correct the logic of the agent. You build
    an agent to supervise the other agents. Before you know it, you’re maintaining
    a distributed system of interns with anxiety and no sense of cost.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你从干净的管道变成了一个由手持工具的LLM组成的网络，它们在循环中推理。你开始编写逻辑来纠正代理的逻辑。你构建一个代理来监督其他代理。在你意识到之前，你正在维护一个由焦虑的实习生组成的分布式系统，他们没有成本意识。
- en: Yes, there are real success stories. [Klarna’s agent handles the workload of
    700 customer service reps](https://www.klarna.com/international/press/klarna-ai-assistant-handles-two-thirds-of-customer-service-chats-in-its-first-month/).
    [BCG built a multi-agent design system that cut shipbuilding engineering time
    by nearly half.](https://www.bcg.com/publications/2025/how-ai-can-be-the-new-all-star-on-your-team)
    These are not demos — these are production systems, saving companies real time
    and money.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，确实有成功的案例。[Klarna的代理处理了700名客户服务代表的 workload](https://www.klarna.com/international/press/klarna-ai-assistant-handles-two-thirds-of-customer-service-chats-in-its-first-month/)。[BCG构建了一个多代理设计系统，将造船工程时间减少了近一半](https://www.bcg.com/publications/2025/how-ai-can-be-the-new-all-star-on-your-team)。这些不是演示——这些是生产系统，为公司节省了实际的时间和金钱。
- en: But those companies didn’t get there by accident. Behind the scenes, they invested
    in infrastructure, observability, fallback systems, budget controls, and teams
    who could debug prompt chains at 3 AM without crying.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 但这些公司并非偶然达到这一地步。幕后，他们投资了基础设施、可观察性、回退系统、预算控制和能够在凌晨3点调试提示链而不会哭泣的团队。
- en: For most of us? We’re not Klarna. We’re trying to get something working that’s
    reliable, cost-effective, and doesn’t eat up 20x more tokens than a well-structured
    pipeline.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们大多数人来说？我们不是Klarna。我们正在尝试让某些东西工作，使其可靠、经济高效，并且不会比结构良好的管道消耗多20倍的令牌。
- en: So yes, agents *can* be amazing. But we have to stop pretending they’re a default.
    Just because the model *can* decide what to do next doesn’t mean it *should*.
    Just because the flow is dynamic doesn’t mean the system is smart. And just because
    everyone’s doing it doesn’t mean you need to follow.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，是的，代理*可以*很棒。但我们必须停止假装它们是默认的。仅仅因为模型*可以*决定下一步做什么，并不意味着它*应该*这样做。仅仅因为流程是动态的，并不意味着系统是智能的。而且，仅仅因为每个人都这样做，并不意味着你需要跟随。
- en: Sometimes, using an agent is like replacing a microwave with a sous chef — more
    flexible, but also more expensive, harder to manage, and occasionally makes decisions
    you didn’t ask for.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，使用代理就像用主厨替换微波炉——更灵活，但也更昂贵，更难管理，偶尔会做出你不需要的决定。
- en: Let’s figure out when it actually makes sense to go that route — and when you
    should just stick with something that works.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们弄清楚何时实际上走那条路线是有意义的——以及何时你应该坚持使用一些有效的方法。
- en: 'Technical Reality Check: What You’re Actually Choosing Between'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术现实检查：你实际上在选择的到底是什么
- en: Before we dive into the existential crisis of choosing between agents and workflows,
    let’s get our definitions straight. Because in typical tech fashion, everyone
    uses these terms to mean slightly different things.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨选择代理和工作流程的生存危机之前，让我们先明确我们的定义。因为在典型的技术风格中，每个人都在用这些术语来表示略有不同的事情。
- en: '![](../Images/7db816b779e08001552906b050996a08.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7db816b779e08001552906b050996a08.png)'
- en: image by author
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者创作
- en: 'Workflows: The Reliable Friend Who Shows Up On Time'
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 工作流程：准时出现的可靠朋友
- en: 'Workflows are orchestrated. You write the logic: maybe retrieve context with
    a vector store, call a toolchain, then use the LLM to summarize the results. Each
    step is explicit. It’s like a recipe. If it breaks, you know exactly where it
    happened — and probably how to fix it.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程是编排的。你编写逻辑：可能使用向量存储检索上下文，调用工具链，然后使用LLM总结结果。每一步都是明确的。就像一个食谱。如果它出问题，你知道它发生在哪里——以及可能如何修复它。
- en: This is what most “RAG pipelines” or prompt chains are. Controlled. Testable.
    Cost-predictable.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数“RAG管道”或提示链的样子。可控的、可测试的、成本可预测的。
- en: The beauty? You can debug them the same way you debug any other software. Stack
    traces, logs, fallback logic. If the vector search fails, you catch it. If the
    model response is weird, you reroute it.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 美妙之处在于，你可以像调试任何其他软件一样调试它们。堆栈跟踪、日志、回退逻辑。如果向量搜索失败，你会捕捉到它。如果模型响应异常，你会重新路由它。
- en: Workflows are your dependable friend who shows up on time, sticks to the plan,
    and doesn’t start rewriting your entire database schema because it felt “inefficient.”
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程是你的可靠朋友，它会准时出现，坚持计划，并且不会因为觉得“效率低下”就重新编写你的整个数据库架构。
- en: '![](../Images/4a593c9b2de54a05a86e40a10e4bec16.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4a593c9b2de54a05a86e40a10e4bec16.png)'
- en: Image by author, inspired by [Anthropic](https://www.anthropic.com/engineering/building-effective-agents)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者创作，灵感来自[Anthropic](https://www.anthropic.com/engineering/building-effective-agents)
- en: In this example of a simple customer support task, this workflow always follows
    the same classify → route → respond → log pattern. It’s predictable, debuggable,
    and performs consistently.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个简单的客户支持任务示例中，这个工作流程始终遵循相同的分类→路由→响应→记录模式。它是可预测的、可调试的，并且表现一致。
- en: '[PRE0]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'The deterministic approach provides:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 确定性方法提供：
- en: '**Predictable execution**: Input A always leads to Process B, then Result C'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可预测的执行**：输入A总是导致过程B，然后结果是C'
- en: '**Explicit error handling**: “If this breaks, do that specific thing”'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**显式错误处理**：“如果这个出问题，就做那件事”'
- en: '**Transparent debugging**: You can literally trace through the code to find
    problems'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**透明的调试**：你可以直接跟踪代码以找到问题'
- en: '**Resource optimization**: You know exactly how much everything will cost'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资源优化**：你知道每样东西将花费多少'
- en: '[Workflow implementations deliver consistent business value](https://ascendix.com/blog/salesforce-success-stories/):
    OneUnited Bank achieved 89% credit card conversion rates, while Sequoia Financial
    Group saved 700 hours annually per user. Not as sexy as “autonomous AI,” but your
    operations team will love you.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '[工作流程实现提供一致的商业价值](https://ascendix.com/blog/salesforce-success-stories/)：OneUnited银行实现了89%的信用卡转换率，而Sequoia金融集团每年为每个用户节省了700小时。不如“自主AI”性感，但你的运营团队会爱你。'
- en: 'Agents: The Smart Kid Who Sometimes Goes Rogue'
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代理：有时会越界的聪明孩子
- en: Agents, on the other hand, are built around loops. The LLM gets a goal and starts
    reasoning about how to achieve it. It picks tools, takes actions, evaluates outcomes,
    and decides what to do next — all inside a recursive decision-making loop.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，代理是围绕循环构建的。LLM获得一个目标，并开始推理如何实现它。它选择工具，采取行动，评估结果，并决定下一步做什么——所有这些都在递归决策循环中进行。
- en: This is where things get… fun.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是事情变得……有趣的地方。
- en: '![](../Images/e8381c70a05c1d08a2de29c3f58063b1.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e8381c70a05c1d08a2de29c3f58063b1.png)'
- en: Image by author, inspired by [Anthropic](https://www.anthropic.com/engineering/building-effective-agents)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者创作，灵感来自[Anthropic](https://www.anthropic.com/engineering/building-effective-agents)
- en: 'The architecture enables some genuinely impressive capabilities:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 该架构使一些真正令人印象深刻的功能成为可能：
- en: '**Dynamic tool selection**: “Should I query the database or call the API? Let
    me think…”'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态工具选择**：“我应该查询数据库还是调用API？让我想想……”'
- en: '**Adaptive reasoning**: Learning from mistakes within the same conversation'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**适应性推理**：在同一个对话中从错误中学习'
- en: '**Self-correction**: “That didn’t work, let me try a different approach”'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自我纠正**：“那不行，让我试试不同的方法”'
- en: '**Complex state management**: Keeping track of what happened three steps ago'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂状态管理**：跟踪三步之前发生了什么'
- en: 'In the same example, the agent might decide to search the knowledge base first,
    then get billing info, then ask clarifying questions — all based on its interpretation
    of the customer’s needs. The execution path varies depending on what the agent
    discovers during its reasoning process:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在同一个例子中，代理可能会先搜索知识库，然后获取账单信息，然后提出澄清问题——所有这些都基于其对客户需求的解释。执行路径根据代理推理过程中的发现而变化：
- en: '[PRE1]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Yes, that autonomy is what makes agents powerful. It’s also what makes them
    hard to control.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，正是这种自主权让代理变得强大。这也是它们难以控制的原因。
- en: 'Your agent might:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 你的代理可能会：
- en: decide to try a new strategy mid-way
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 决定在中途尝试新的策略
- en: forget what it already tried
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 忘记它已经尝试过的事情
- en: or call a tool 15 times in a row trying to “figure things out”
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者连续15次调用工具试图“弄清楚事情”
- en: You can’t just set a breakpoint and inspect the stack. The “stack” is inside
    the model’s context window, and the “variables” are fuzzy thoughts shaped by your
    prompts.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能只是设置一个断点来检查堆栈。这里的“堆栈”在模型的上下文窗口内，而“变量”是由你的提示塑造的模糊思维。
- en: When something goes wrong — and it will — you don’t get a nice red error message.
    You get a token bill that looks like someone mistyped a loop condition and summoned
    the OpenAI API 600 times. (I know, because I did this at least once where I forgot
    to cap the loop, and the agent just kept thinking… and thinking… until the entire
    system crashed with an “out of token” error).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 当事情出错——而且它会的——你不会得到一个友好的红色错误消息。你得到的是一个看起来像是某人误输了循环条件的代币账单，它召唤了OpenAI API 600次。（我知道，因为我至少有一次忘记设置循环上限，代理一直在思考……直到整个系统因为“代币不足”错误而崩溃）。
- en: '* * *'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'To put it in simpler terms, you can think of it like this:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 用更简单的话来说，你可以这样想：
- en: A **workflow** is a GPS.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**工作流程**就像GPS。'
- en: You know the destination. You follow clear instructions. “Turn left. Merge here.
    You’ve arrived.” It’s structured, predictable, and you almost always get where
    you’re going — unless you ignore it on purpose.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道目的地。你遵循清晰的指令。“左转。在这里合并。你到了。”这是结构化的，可预测的，你几乎总是能到达目的地——除非你故意忽略它。
- en: 'An **agent** is different. It’s like handing someone a map, a smartphone, a
    credit card, and saying:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理**是不同的。就像给某人一张地图，一部智能手机，一张信用卡，然后说：'
- en: “Figure out how to get to the airport. You can walk, call a cab, take a detour
    if needed — just make it work.”
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “想想怎么去机场。你可以步行，叫一辆出租车，如果需要的话绕道——只要能成功就好。”
- en: They might arrive faster. Or they might end up arguing with a rideshare app,
    taking a scenic detour, and arriving an hour later with a $18 smoothie. (We all
    know someone like that).
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 它们可能会更快到达。或者它们可能会与共享出行应用争论，走一条风景优美的路线，然后一个小时后带着价值18美元的冰沙到达。（我们都知道这样的人）。
- en: '**Both approaches can work**, but the real question is:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**两种方法都可以行得通**，但真正的问题是：'
- en: '**Do you actually need autonomy here, or just a reliable set of instructions?**'
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**你在这里实际上需要的是自主权，还是一套可靠的指令？**'
- en: 'Because here’s the thing — agents *sound* amazing. And they are, in theory.
    You’ve probably seen the headlines:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 因为这里的关键是——代理听起来很棒。在理论上确实如此。你可能看过这些标题：
- en: “Deploy an agent to handle your entire support pipeline!”
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “部署一个代理来处理你的整个支持流程！”
- en: “Let AI manage your tasks while you sleep!”
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “让AI在你睡觉时管理你的任务！”
- en: “Revolutionary multi-agent systems — your personal consulting firm in the cloud!”
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “革命性的多代理系统——你的个人云端咨询公司！”
- en: These case studies are everywhere. And some of them are real. But most of them?
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这些案例研究到处都是。其中一些是真实的。但大多数呢？
- en: They’re like travel photos on Instagram. You see the glowing sunset, the perfect
    skyline. You don’t see the six hours of layovers, the missed train, the $25 airport
    sandwich, or the three-day stomach bug from the street tacos.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 它们就像Instagram上的旅行照片。你看到的是璀璨的日落，完美的天际线。你看不到的是六小时的转机等待，错过的火车，机场里价值25美元的三明治，或是从街头玉米卷带来的三天胃病。
- en: 'That’s what agent success stories often leave out: **the operational complexity,
    the debugging pain, the spiraling token bill**.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是代理成功故事常常遗漏的部分：**操作的复杂性，调试的痛苦，不断攀升的代币账单**。
- en: So yeah, agents *can* take you places. But before you hand over the keys, make
    sure you’re okay with the route they might choose. And that you can afford the
    tolls.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，是的，代理*可以*带你到想去的地方。但在你交出钥匙之前，确保你接受他们可能选择的路线。并且你能负担得起过路费。
- en: The Hidden Costs Nobody Talks About
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 没有人谈论的隐藏成本
- en: On paper, agents seem magical. You give them a goal, and they figure out how
    to achieve it. No need to hardcode control flow. Just define a task and let the
    system handle the rest.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在纸上，代理看起来很神奇。你给他们一个目标，他们就会想出如何实现它。无需硬编码控制流。只需定义一个任务，让系统处理其余部分。
- en: In theory, it’s elegant. In practice, it’s chaos in a trench coat.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 理论上，这很优雅。实际上，它就像穿着风衣的混乱。
- en: Let’s talk about what it *really* costs to go agentic — not just in dollars,
    but in complexity, failure modes, and emotional wear-and-tear on your engineering
    team.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们谈谈成为代理的真正成本——不仅仅是金钱，还有复杂性、失败模式和你的工程团队的情感磨损。
- en: Token Costs Multiply — Fast
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 令牌成本快速增加
- en: '[According to Anthropic’s research](https://www.anthropic.com/engineering/built-multi-agent-research-system),
    agents consume 4x more tokens than simple chat interactions. Multi-agent systems?
    Try 15x more tokens. This isn’t a bug — it’s the whole point. They loop, reason,
    re-evaluate, and often talk to themselves several times before arriving at a decision.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '[根据Anthropic的研究](https://www.anthropic.com/engineering/built-multi-agent-research-system)，代理消耗的令牌比简单的聊天交互多4倍。多代理系统？试试15倍。这不是一个错误——这正是重点。它们循环、推理、重新评估，并在做出决定之前往往多次与自己交谈。'
- en: 'Here’s how that math breaks down:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是数学分解的方式：
- en: '**Basic workflows**: $500/month for 100k interactions'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基本工作流程**：每月500美元，用于10万次交互'
- en: '**Single agent systems**: $2,000/month for the same volume'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单代理系统**：每月2000美元（相同数量的使用量）'
- en: '**Multi-agent systems**: $7,500/month (assuming $0.005 per 1K tokens)'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多代理系统**：每月7500美元（假设每1K令牌0.005美元）'
- en: And that’s if everything is working as intended.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一切按预期进行，那就是这样。
- en: If the agent gets stuck in a tool call loop or misinterprets instructions? You’ll
    see spikes that make your billing dashboard look like a crypto pump-and-dump chart.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 如果代理陷入工具调用循环或误解了指令？你将看到使你的账单仪表板看起来像加密货币的泵和放图表的峰值。
- en: Debugging Feels Like AI Archaeology
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调试感觉像是AI考古学
- en: With workflows, debugging is like walking through a well-lit house. You can
    trace input → function → output. Easy.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 使用工作流程，调试就像在明亮的房子里散步。你可以追踪输入 → 函数 → 输出。很简单。
- en: 'With agents? It’s more like wandering through an unmapped forest where the
    trees occasionally rearrange themselves. You don’t get traditional logs. You get
    *reasoning traces*, full of model-generated thoughts like:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 使用代理？这更像是漫步在一个未绘制的森林中，树木偶尔会重新排列自己。你不会得到传统的日志。你得到的是*推理轨迹*，充满了模型生成的思想，例如：
- en: “Hmm, that didn’t work. I’ll try another approach.”
  id: totrans-116
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “嗯，那没起作用。我会尝试另一种方法。”
- en: That’s not a stack trace. That’s an AI diary entry. It’s poetic, but not helpful
    when things break in production.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 那不是堆栈跟踪。那是一个AI日记条目。它很诗意，但生产中出现问题时并不实用。
- en: The really “fun” part? **Error propagation in agent systems can cascade in completely
    unpredictable ways.** One incorrect decision early in the reasoning chain can
    lead the agent down a rabbit hole of increasingly wrong conclusions, like a game
    of telephone where each player is also trying to solve a math problem. Traditional
    debugging approaches — setting breakpoints, tracing execution paths, checking
    variable states — become much less helpful when the “bug” is that your AI decided
    to interpret your instructions creatively.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 真正“有趣”的部分？**代理系统中的错误传播可以以完全不可预测的方式级联**。推理链中早期的错误决策可能导致代理陷入越来越错误的结论，就像一个电话游戏，每个玩家也在尝试解决一个数学问题。当“错误”是AI决定创造性地解释你的指令时，传统的调试方法——设置断点、跟踪执行路径、检查变量状态——就变得不那么有帮助了。
- en: '![](../Images/cfa25d55783fc127557e252658d43e79.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cfa25d55783fc127557e252658d43e79.png)'
- en: Image by author, generated by GPT-4o
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供，由GPT-4o生成
- en: New Failure Modes You’ve Never Had to Think About
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 新的、你从未需要考虑过的失败模式
- en: '[Microsoft’s research has identified](https://www.microsoft.com/en-us/security/blog/2025/04/24/new-whitepaper-outlines-the-taxonomy-of-failure-modes-in-ai-agents/)
    entirely **new failure modes that didn’t exist before agents**. Here are just
    a few that aren’t common in traditional pipelines:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '[微软的研究已经确定了](https://www.microsoft.com/en-us/security/blog/2025/04/24/new-whitepaper-outlines-the-taxonomy-of-failure-modes-in-ai-agents/)全新的、之前代理所不具备的**失败模式**。以下是一些在传统管道中不常见的例子：'
- en: '**Agent Injection**: Prompt-based exploits that hijack the agent’s reasoning'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能体注入**：基于提示的漏洞，劫持智能体的推理'
- en: '**Multi-Agent Jailbreaks**: Agents colluding in unintended ways'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多智能体越狱**：智能体以非预期的方式进行勾结'
- en: '**Memory Poisoning**: One agent corrupts shared memory with hallucinated nonsense'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存中毒**：一个智能体用幻觉的胡言乱语破坏了共享内存'
- en: These aren’t edge cases anymore — they’re becoming common enough that entire
    subfields of “LLMOps” now exist just to handle them.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这些不再是边缘情况了——它们变得足够普遍，以至于“LLMOps”的整个子领域现在就是为了处理这些问题而存在的。
- en: If your monitoring stack doesn’t track token drift, tool spam, or emergent agent
    behavior, you’re flying blind.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的监控堆栈不跟踪令牌漂移、工具垃圾邮件或新兴的智能体行为，你就是在盲目飞行。
- en: You’ll Need Infra You Probably Don’t Have
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你可能需要一些你目前没有的基础设施
- en: Agent-based systems don’t just need compute — they need new layers of tooling.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 基于智能体的系统不仅需要计算能力，还需要新的工具层。
- en: 'You’ll probably end up cobbling together some combo of:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会拼凑出一些组合：
- en: '**LangFuse**, **Arize**, or **Phoenix** for observability'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LangFuse**、**Arize**或**Phoenix**用于可观察性'
- en: '**AgentOps** for cost and behavior monitoring'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AgentOps**用于成本和行为监控'
- en: Custom token guards and fallback strategies to stop runaway loops
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定制令牌守卫和回退策略以停止失控循环
- en: This tooling stack *isn’t optional*. It’s required to keep your system stable.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这个工具栈**不是可选的**。它是保持系统稳定所必需的。
- en: And if you’re not already doing this? You’re not ready for agents in production
    — at least, not ones that impact real users or money.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有这样做？你还没有准备好在生产中使用智能体——至少，不是那些影响真实用户或金钱的智能体。
- en: '* * *'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: So yeah. It’s not that agents are “bad.” They’re just a lot more expensive —
    financially, technically, and emotionally — than most people realize when they
    first start playing with them.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，是的。问题不是智能体“不好”。它们只是比大多数人一开始玩它们时意识到的要昂贵得多——在财务、技术和情感上。
- en: The tricky part is that none of this shows up in the demo. In the demo, it looks
    clean. Controlled. Impressive.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 困难的部分是，这些在演示中都没有体现出来。在演示中，它看起来很干净、可控、令人印象深刻。
- en: But in production, things leak. Systems loop. Context windows overflow. And
    you’re left explaining to your boss why your AI system spent $5,000 calculating
    the best time to send an email.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 但在生产中，事情会泄露。系统循环。上下文窗口溢出。你只能向你的老板解释为什么你的AI系统花费了5000美元来计算发送电子邮件的最佳时间。
- en: When Agents Actually Make Sense
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当智能体真正有意义时
- en: '*[Before we dive into agent success stories, a quick reality check: these are
    patterns observed from analyzing current implementations, not universal laws of
    software architecture. Your mileage may vary, and there are plenty of organizations
    successfully using workflows for scenarios where agents might theoretically excel.
    Consider these informed observations rather than divine commandments carved in
    silicon.]*'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '*[在我们深入探讨智能体成功案例之前，先做一个快速的现实检查：这些是从分析当前实现中观察到的模式，而不是软件架构的普遍定律。你的体验可能会有所不同，而且有许多组织在智能体可能理论上有出色表现的场景中成功使用工作流程。将这些有见地的观察视为而不是刻在硅片上的神圣命令。]*'
- en: Alright. I’ve thrown a lot of caution tape around agent systems so far — but
    I’m not here to scare you off forever.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧。我之前在智能体系统中抛了很多警戒带——但我不是来永远吓跑你的。
- en: Because sometimes, agents are *exactly* what you need. They’re brilliant in
    ways that rigid workflows simply can’t be.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 因为有时候，智能体正是你所需要的。它们在方式上非常出色，而僵化的工作流程是无法做到的。
- en: The trick is knowing the difference between “I want to try agents because they’re
    cool” and “this use case actually needs autonomy.”
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 关键在于知道“我想尝试智能体因为它们很酷”和“这个用例实际上需要自主性”之间的区别。
- en: Here are a few scenarios where agents genuinely earn their keep.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些智能体真正发挥作用的场景。
- en: Dynamic Conversations With High Stakes
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 动态对话和高风险
- en: Let’s say you’re building a customer support system. Some queries are straightforward
    — refund status, password reset, etc. A simple workflow handles those perfectly.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在构建一个客户支持系统。一些查询很简单——退款状态、密码重置等。一个简单的流程可以完美处理这些。
- en: But other conversations? They require adaptation. Back-and-forth reasoning.
    Real-time prioritization of what to ask next based on what the user says.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 但其他对话？它们需要适应。来回推理。根据用户所说的实时优先考虑下一个问题。
- en: That’s where agents shine.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是智能体发光的地方。
- en: In these contexts, you’re not just filling out a form — you’re navigating a
    situation. Personalized troubleshooting, product recommendations, contract negotiations
    — things where the next step depends entirely on what just happened.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些环境中，你不仅仅是填写表格——你是在导航一个情况。个性化的故障排除、产品推荐、合同谈判——这些下一步完全取决于刚刚发生的事情。
- en: Companies implementing agent-based customer support systems have reported wild
    ROI — we’re talking [112% to 457%](https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai)
    increases in efficiency and conversions, depending on the industry. Because when
    done right, agentic systems *feel* smarter. And that leads to trust.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 实施基于代理的客户支持系统的公司报告了惊人的投资回报率——我们谈论的是[112%到457%](https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai)的效率提升和转化率增加，具体取决于行业。因为当做得正确时，代理系统*感觉*更聪明。这导致了信任。
- en: High-Value, Low-Volume Decision-Making
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高价值、低频决策
- en: Agents are expensive. But sometimes, the decisions they’re helping with are
    *more* expensive.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 代理很昂贵。但有时，他们帮助做出的决策*更*昂贵。
- en: BCG helped a shipbuilding firm cut 45% of its engineering effort using a multi-agent
    design system. That’s worth it — because those decisions were tied to multi-million
    dollar outcomes.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: BCG 帮助一家造船公司通过多代理设计系统减少了45%的工程工作量。这是值得的——因为这些决策与数百万美元的结果相关。
- en: If you’re optimizing how to lay fiber optic cable across a continent or analyzing
    legal risks in a contract that affects your entire company — burning a few extra
    dollars on compute isn’t the problem. The *wrong* decision is.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在优化如何在大陆上铺设光纤电缆或分析影响整个公司的合同中的法律风险——在计算上多花一些钱并不是问题。错误的决定才是。
- en: Agents work here because the *cost of being wrong* is way higher than the *cost
    of computing*.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 代理之所以在这里工作，是因为*犯错的成本*远远高于*计算的成本*。
- en: '![](../Images/b623ef317cdadbfd037c9c622ffb15fa.png)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b623ef317cdadbfd037c9c622ffb15fa.png)'
- en: Image by author
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Open-Ended Research and Exploration
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 开放式研究和探索
- en: There are problems where you literally can’t define a flowchart upfront — because
    you don’t know what the “right steps” are.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些问题，你实际上无法事先定义流程图——因为你不知道“正确的步骤”是什么。
- en: Agents are great at diving into ambiguous tasks, breaking them down, iterating
    on what they find, and adapting in real-time.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 代理擅长深入模糊的任务，分解它们，迭代他们发现的内容，并实时适应。
- en: 'Think:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 思考：
- en: Technical research assistants that read, summarize, and compare papers
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术研究助理，阅读、总结和比较论文
- en: Product analysis bots that explore competitors and synthesize insights
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品分析机器人，探索竞争对手并综合见解
- en: Research agents that investigate edge cases and suggest hypotheses
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究代理，调查边缘案例并提出假设
- en: These aren’t problems with known procedures. They’re open loops by nature —
    and agents thrive in those.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 这些不是有已知程序的问题。它们本质上就是开放循环——代理在这些环境中茁壮成长。
- en: '**Multi-Step, Unpredictable Workflows**'
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**多步骤、不可预测的工作流程**'
- en: Some tasks have too many branches to hardcode — the kind where writing out all
    the “if this, then that” conditions becomes a full-time job.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 有些任务分支太多，无法硬编码——那种写出所有“如果这个，那么那个”条件变成全职工作的类型。
- en: This is where agent loops can actually *simplify* things, because the LLM handles
    the flow dynamically based on context, not pre-written logic.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是代理循环实际上可以*简化*事情的地方，因为LLM根据上下文动态处理流程，而不是预先编写的逻辑。
- en: Think diagnostics, planning tools, or systems that need to factor in dozens
    of unpredictable variables.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 思考诊断、规划工具或需要考虑数十个不可预测变量的系统。
- en: If your logic tree is starting to look like a spaghetti diagram made by a caffeinated
    octopus — yeah, maybe it’s time to let the model take the wheel.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的逻辑树开始看起来像是由喝了咖啡因的章鱼制作的意大利面图——是的，可能到了让模型接管方向盘的时候了。
- en: '* * *'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: So no, I’m not anti-agent (I actually love them!) I’m pro-alignment — matching
    the tool to the task.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，不，我不是反代理（我实际上很喜欢它们！）我是支持对齐——将工具与任务匹配。
- en: When the use case *needs* flexibility, adaptation, and autonomy, then yes —
    bring in the agents. But only after you’re honest with yourself about whether
    you’re solving a real complexity… or just chasing a shiny abstraction.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用案例*需要*灵活性、适应性和自主性时，那么是的——引入代理。但只有在你诚实地评估自己是否在解决真正的复杂性……或者只是在追逐一个闪亮的抽象时。
- en: When Workflows Are Obviously Better (But Less Exciting)
  id: totrans-175
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当工作流程显然更好（但不太吸引人）时
- en: '*[Again, these are observations drawn from industry analysis rather than ironclad
    rules. There are undoubtedly companies out there successfully using agents for
    regulated processes or cost-sensitive applications — possibly because they have
    specific requirements, exceptional expertise, or business models that change the
    economics. Think of these as strong starting recommendations, not limitations
    on what’s possible.]*'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '*（再次强调，这些是从行业分析中得出的观察结果，而不是不可动摇的规则。毫无疑问，有些公司正在成功使用代理进行监管流程或成本敏感型应用——可能是因为它们有特定的要求、非凡的专业知识或改变经济学的商业模式。将这些视为强有力的起始建议，而不是对可能性的限制。）*'
- en: Let’s step back for a second.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们稍微退后一步。
- en: A lot of AI architecture conversations get stuck in hype loops — “Agents are
    the future!” “AutoGPT can build companies!” — but in actual production environments,
    most systems don’t need agents.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 许多关于AI架构的对话都陷入了炒作循环——“代理是未来！”“AutoGPT可以建立公司！”——但在实际的生产环境中，大多数系统不需要代理。
- en: They need something that works.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 它们需要一些能够正常工作的事物。
- en: That’s where workflows come in. And while they may not feel as futuristic, they
    are **incredibly effective** in the environments that most of us are building
    for.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是工作流程的用武之地。虽然它们可能感觉不那么未来派，但在我们大多数人构建的环境中，它们**极其有效**。
- en: Repeatable Operational Tasks
  id: totrans-181
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可重复的操作任务
- en: If your use case involves clearly defined steps that rarely change — like sending
    follow-ups, tagging data, validating form inputs — a workflow will outshine an
    agent every time.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的用例涉及明确定义且很少改变的步骤——比如发送跟进、标记数据、验证表单输入——那么工作流程每次都会优于代理。
- en: It’s not just about cost. It’s about stability.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅关乎成本。还关乎稳定性。
- en: You don’t want creative reasoning in your payroll system. You want the same
    result, every time, with no surprises. A well-structured pipeline gives you that.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 你不希望在工资系统中使用创造性推理。你希望每次都能得到相同的结果，没有任何惊喜。一个结构化的管道可以给你带来这一点。
- en: There’s nothing sexy about “process reliability” — until your agent-based system
    forgets what year it is and flags every employee as a minor.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: “过程可靠性”并没有什么吸引人的地方——直到你的基于代理的系统忘记了现在是哪一年，并将每位员工标记为未成年人。
- en: Regulated, Auditable Environments
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 受监管、可审计的环境
- en: Workflows are deterministic. That means they’re traceable. Which means if something
    goes wrong, you can show exactly what happened — step-by-step — with logs, fallbacks,
    and structured output.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程是确定性的。这意味着它们是可追踪的。也就是说，如果出了问题，你可以通过日志、回退和结构化输出，一步一步地展示发生了什么。
- en: If you’re working in healthcare, finance, law, or government — places where
    **“we think the AI decided to try something new”** is not an acceptable answer
    — this matters.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从事医疗保健、金融、法律或政府工作——在这些地方，“我们认为AI决定尝试新事物”不是一个可接受的答案——这很重要。
- en: You can’t build a safe AI system without transparency. Workflows give you that
    by default.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 没有透明度，你无法构建一个安全的AI系统。工作流程默认为你提供这一点。
- en: '![](../Images/01a66e34f4bcfbba5396708bf021f487.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/01a66e34f4bcfbba5396708bf021f487.png)'
- en: Image by author
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: High-Frequency, Low-Complexity Scenarios
  id: totrans-192
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高频、低复杂度场景
- en: 'There are entire categories of tasks where the **cost per request** matters
    more than the sophistication of reasoning. Think:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多任务类别，其中**每项请求的成本**比推理的复杂性更重要。想想：
- en: Fetching info from a database
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从数据库中获取信息
- en: Parsing emails
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解析电子邮件
- en: Responding to FAQ-style queries
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回答FAQ风格的查询
- en: A workflow can handle thousands of these requests per minute, at predictable
    costs and latency, with zero risk of runaway behavior.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程可以每分钟处理数千个这样的请求，以可预测的成本和延迟，且没有失控行为的风险。
- en: If you’re scaling fast and need to stay lean, a structured pipeline beats a
    clever agent.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你快速扩展并且需要保持精简，结构化管道胜过聪明的代理。
- en: Startups, MVPs, and Just-Get-It-Done Projects
  id: totrans-199
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创业公司、MVP项目和快速完成的项目
- en: Agents require infrastructure. Monitoring. Observability. Cost tracking. Prompt
    architecture. Fallback planning. Memory design.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 代理需要基础设施。监控。可观察性。成本跟踪。提示架构。回退计划。内存设计。
- en: If you’re not ready to invest in all of that — and most early-stage teams aren’t
    — agents are probably too much, too soon.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有准备好投资所有这些——而且大多数早期团队都没有——那么代理可能来得过早，过多。
- en: Workflows let you move fast and learn how LLMs behave before you get into recursive
    reasoning and emergent behavior debugging.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程让你能够快速行动，在你进入递归推理和涌现行为调试之前了解LLMs的行为。
- en: 'Think of it this way: workflows are how you **get to production**. Agents are
    how you scale specific use cases once you understand your system deeply.'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 这样想：工作流程是你**达到生产**的方式。代理是你深入了解系统后扩展特定用例的方式。
- en: '* * *'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'One of the best mental models I’ve seen (shoutout to [Anthropic’s engineering
    blog](https://www.anthropic.com/engineering/building-effective-agents)) is this:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到过最好的心智模型之一（向[Anthropic的工程博客](https://www.anthropic.com/engineering/building-effective-agents)致敬）是这样的：
- en: '**Use workflows to build structure around the predictable. Use agents to explore
    the unpredictable.**'
  id: totrans-206
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**使用工作流程来构建可预测性的结构。使用代理来探索不可预测性。**'
- en: Most real-world AI systems are a mix — and many of them lean heavily on workflows
    because **production doesn’t reward cleverness**. It rewards **resilience**.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数现实世界的AI系统都是混合的——其中许多系统严重依赖工作流程，因为**生产不奖励聪明才智**。它奖励**弹性**。
- en: A Decision Framework That Actually Works
  id: totrans-208
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个真正有效的决策框架
- en: 'Here’s something I’ve learned (the hard way, of course): most bad architecture
    decisions don’t come from a lack of knowledge — they come from moving too fast.'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我学到的东西（当然是以艰难的方式）：大多数糟糕的架构决策不是来自知识不足——而是来自行动太快。
- en: You’re in a sync. Someone says, “This feels a bit too dynamic for a workflow
    — maybe we just go with agents?”
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 你处于同步状态。有人说，“这感觉对工作流程来说有点太动态了——我们可能就使用代理？”
- en: Everyone nods. It sounds reasonable. Agents are flexible, right?
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都点头。听起来合理。代理是灵活的，对吧？
- en: 'Fast forward three months: the system’s looping in weird places, the logs are
    unreadable, costs are spiking, and no one remembers who suggested using agents
    in the first place. You’re just trying to figure out why an LLM decided to summarize
    a refund request by booking a flight to Peru.'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 快进三个月：系统在奇怪的地方循环，日志难以阅读，成本激增，没有人记得最初是谁建议使用代理的。你只是在试图弄清楚为什么一个LLM决定通过预订前往秘鲁的航班来总结退款请求。
- en: So, let’s slow down for a second.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，让我们放慢一点。
- en: This isn’t about picking the trendiest option — it’s about building something
    you can explain, scale, and actually maintain.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是关于选择最时髦的选项——这是关于构建你可以解释、扩展并真正维护的东西。
- en: The framework below is designed to make you pause and think clearly before the
    token bills stack up and your nice prototype turns into a very expensive choose-your-own-adventure
    story.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 以下框架旨在让你在代币账单堆积起来，你的美好原型变成一个代价高昂的自选冒险故事之前，停下来深思熟虑。
- en: '![](../Images/49bbf97bc92a442996fe0ec6e41cdb09.png)'
  id: totrans-216
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/49bbf97bc92a442996fe0ec6e41cdb09.png)'
- en: Image by author
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'The Scoring Process: Because Single-Factor Decisions Are How Projects Die'
  id: totrans-218
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评分过程：因为单一因素决策是项目死亡的原因
- en: This isn’t a decision tree that bails out at the first “sounds good.” It’s a
    structured evaluation. You go through **five dimensions**, score each one, and
    see what the system is really asking for — not just what sounds fun.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一个在第一个“听起来不错”就放弃的决策树。这是一个结构化评估。你通过**五个维度**，对每个维度进行评分，看看系统真正需要什么——而不仅仅是听起来有趣的东西。
- en: '**Here’s how it works:**'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '**以下是工作原理：**'
- en: Each dimension gives **+2 points** to either workflow or agents.
  id: totrans-221
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个维度都为工作流程或代理提供**+2分**。
- en: One question gives **+1 point** (reliability).
  id: totrans-222
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个问题给出**+1分**（可靠性）。
- en: Add it all up at the end — and trust the result more than your agent hype cravings.
  id: totrans-223
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后把所有这些都加起来——并且比你的代理狂热欲望更信任结果。
- en: '* * *'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Complexity of the Task (2 points)
  id: totrans-225
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务复杂度（2分）
- en: Evaluate whether your use case has well-defined procedures. Can you write down
    steps that handle 80% of your scenarios without resorting to hand-waving?
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 评估你的用例是否有明确定义的过程。你能否写下处理80%场景的步骤，而不需要诉诸于模糊不清的手势？
- en: Yes → +2 for **workflows**
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是 → **工作流程** +2分
- en: No, there’s ambiguity or dynamic branching → +2 for **agents**
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不，存在歧义或动态分支 → **代理** +2分
- en: If your instructions involve phrases like “and then the system figures it out”
    — you’re probably in agent territory.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的指令包含像“然后系统会想出解决办法”这样的短语——你可能处于代理领域。
- en: Business Value vs. Volume (2 points)
  id: totrans-230
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 商业价值与容量（2分）
- en: Assess the cold, hard economics of your use case. Is this a high-volume, cost-sensitive
    operation — or a low-volume, high-value scenario?
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 评估你用例的冷硬经济性。这是高容量、成本敏感的操作——还是低容量、高价值场景？
- en: High-volume and predictable → +2 for **workflows**
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高容量且可预测 → **工作流程** +2分
- en: Low-volume but high-impact decisions → +2 for **agents**
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 低量但高影响力的决策 → **代理** +2分
- en: 'Basically: if compute cost is more painful than getting something slightly
    wrong, workflows win. If being wrong is expensive and being slow loses money,
    agents might be worth it.'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上：如果计算成本比犯一点小错误更痛苦，工作流程就赢了。如果错误代价高昂，而缓慢会损失金钱，代理可能就值得了。
- en: Reliability Requirements (1 point)
  id: totrans-235
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可靠性要求（1分）
- en: Determine your tolerance for output variability — and be honest about what your
    business actually needs, not what sounds flexible and modern. How much output
    variability can your system tolerate?
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 确定你对输出可变性的容忍度——并且诚实地了解你的业务真正需要什么，而不是听起来灵活和现代。你的系统可以容忍多少输出可变性？
- en: Needs to be consistent and traceable (audits, reports, clinical workflows) →
    +1 for **workflows**
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要保持一致性和可追溯性（审计、报告、临床工作流程）→ +1 for **工作流程**
- en: Can handle some variation (creative tasks, customer support, exploration) →
    +1 for **agents**
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以处理一些变化（创意任务、客户支持、探索）→ +1 for **代理**
- en: This one’s often overlooked — but it directly affects how much guardrail logic
    you’ll need to write (and maintain).
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 这一点经常被忽视——但它直接影响到你需要编写（和维护）多少护栏逻辑。
- en: Technical Readiness (2 points)
  id: totrans-240
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 技术准备度（2分）
- en: Evaluate your current capabilities without the rose-colored glasses of “we’ll
    figure it out later.” What’s your current engineering setup and comfort level?
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 不要戴着“我们以后会解决”的玫瑰色眼镜评估你当前的能力。你的当前工程设置和舒适度如何？
- en: You’ve got logging, traditional monitoring, and a dev team that hasn’t yet built
    agentic infra → +2 for **workflows**
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你已经有了日志记录、传统监控和一个尚未构建代理基础设施的dev团队 → +2 for **工作流程**
- en: You already have observability, fallback plans, token tracking, and a team that
    understands emergent AI behavior → +2 for **agents**
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你已经有了可观察性、回退计划、令牌跟踪，以及一个理解新兴AI行为的团队 → +2 for **代理**
- en: This is your system maturity check. Be honest with yourself. Hope is not a debugging
    strategy.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你的系统成熟度检查。对自己诚实。希望不是调试策略。
- en: Organizational Maturity (2 points)
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织成熟度（2分）
- en: Assess your team’s AI expertise with brutal honesty — this isn’t about intelligence,
    it’s about experience with the specific weirdness of AI systems. How experienced
    is your team with prompt engineering, tool orchestration, and LLM weirdness?
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 以残酷的诚实评估你团队的AI专业知识——这不仅仅是关于智力，而是关于对AI系统特定怪异性的经验。你的团队在提示工程、工具编排和LLM怪异性方面有多大的经验？
- en: Still learning prompt design and LLM behavior → +2 for **workflows**
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仍在学习提示设计以及LLM行为 → +2 for **工作流程**
- en: Comfortable with distributed systems, LLM loops, and dynamic reasoning → +2
    for **agents**
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 舒适于分布式系统、LLM循环和动态推理 → +2 for **代理**
- en: You’re not evaluating intelligence here — just experience with a specific class
    of problems. Agents demand a deeper familiarity with AI-specific failure patterns.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 你在这里不是评估智力，而是评估对特定类别问题的经验。代理需要更深入地了解AI特定的失败模式。
- en: '* * *'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Add Up Your Score
  id: totrans-251
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 汇总你的得分
- en: After completing all five evaluations, calculate your total scores.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 完成所有五个评估后，计算你的总分。
- en: '**Workflow score ≥ 6** → Stick with workflows. You’ll thank yourself later.'
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工作流程得分≥6** → 坚持使用工作流程。你以后会感谢自己的。'
- en: '**Agent score ≥ 6** → Agents might be viable — *if* there are no workflow-critical
    blockers.'
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理得分≥6** → 代理可能可行——**如果**没有工作流程关键阻碍。'
- en: '**Important**: This framework doesn’t tell you what’s coolest. It tells you
    what’s sustainable.'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: '**重要**：这个框架不会告诉你什么是最酷的。它告诉你什么是可持续的。'
- en: 'A lot of use cases will lean workflow-heavy. That’s not because agents are
    bad — it’s because true agent readiness involves *many* systems working in harmony:
    infrastructure, ops maturity, team knowledge, failure handling, and cost controls.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 许多用例将侧重于工作流程。这并不是因为代理不好——而是因为真正的代理准备涉及**许多**系统协同工作：基础设施、运维成熟度、团队知识、故障处理和成本控制。
- en: And if any one of those is missing, it’s usually not worth the risk — yet.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 如果其中任何一个缺失，通常不值得冒险——至少目前还不值得。
- en: 'The Plot Twist: You Don’t Have to Choose'
  id: totrans-258
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 惊喜转折：你不必选择
- en: 'Here’s a realization I wish I’d had earlier: you don’t have to pick sides.
    The magic often comes from **hybrid systems** — where workflows provide stability,
    and agents offer flexibility. It’s the best of both worlds.'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我希望早点意识到的认识：你不必选择立场。魔法往往来自**混合系统**——其中工作流程提供稳定性，代理提供灵活性。这是两者的最佳结合。
- en: Let’s explore how that actually works.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索它实际上是如何工作的。
- en: Why Hybrid Makes Sense
  id: totrans-261
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么混合模式是有意义的
- en: 'Think of it as layering:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 想象它就像分层：
- en: '**Reactive layer** (your workflow): handles predictable, high-volume tasks'
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**反应层**（你的工作流程）：处理可预测、高量级任务'
- en: '**Deliberative layer** (your agent): steps in for complex, ambiguous decisions'
  id: totrans-264
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**审议层**（你的代理）：介入处理复杂、模糊的决定'
- en: This is exactly how many real systems are built. The workflow handles the 80%
    of predictable work, while the agent jumps in for the 20% that needs creative
    reasoning or planning
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是实际构建的系统数量。工作流程处理80%的可预测工作，而代理则介入处理20%需要创造性推理或计划的工作。
- en: Building Hybrid Systems Step by Step
  id: totrans-266
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 逐步构建混合系统
- en: 'Here’s a refined approach I’ve used (and borrowed from hybrid best practices):'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个我使用过（并借鉴了混合最佳实践）的改进方法：
- en: '**Define the core workflow.**'
  id: totrans-268
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义核心工作流程。**'
- en: Map out your predictable tasks — data retrieval, vector search, tool calls,
    response synthesis.
  id: totrans-269
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 制定你的可预测任务——数据检索、向量搜索、工具调用、响应合成。
- en: '**Identify decision points.**'
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**识别决策点。**'
- en: Where might you *need* an agent to decide things dynamically?
  id: totrans-271
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 你可能在哪些情况下**需要**代理动态地做出决定？
- en: '**Wrap those steps with lightweight agents.**'
  id: totrans-272
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**用轻量级代理包装这些步骤。**'
- en: Think of them as scoped decision engines — they plan, act, reflect, then return
    answers to the workflow .
  id: totrans-273
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 将它们视为范围决策引擎——它们计划、行动、反思，然后向工作流程返回答案。
- en: '**Use memory and plan loops wisely.**'
  id: totrans-274
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**明智地使用记忆和计划循环。**'
- en: Give the agent just enough context to make smart choices without letting it
    go rogue.
  id: totrans-275
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 给代理足够的上下文，使其能够做出明智的选择，同时又不让它失控。
- en: '**Monitor and fail gracefully.**'
  id: totrans-276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**监控并优雅地失败。**'
- en: If the agent goes wild or costs spike, fall back to a default workflow branch.
    Keep logs and token meters running.
  id: totrans-277
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果代理行为失控或成本激增，则回退到默认工作流程分支。保持日志和令牌计量器运行。
- en: '**Human-in-the-loop checkpoint.**'
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**人工检查点**。'
- en: Especially in regulated or high-stakes flows, pause for human validation before
    agent-critical actions
  id: totrans-279
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 尤其是在受监管或高风险流程中，在代理关键操作之前暂停以进行人工验证
- en: When to Use Hybrid Approach
  id: totrans-280
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 何时使用混合方法
- en: '| Scenario | Why Hybrid Works |'
  id: totrans-281
  prefs: []
  type: TYPE_TB
  zh: '| 场景 | 混合方法为何有效 |'
- en: '| --- | --- |'
  id: totrans-282
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Customer support | Workflow does easy stuff, agents adapt when conversations
    get messy |'
  id: totrans-283
  prefs: []
  type: TYPE_TB
  zh: '| 客户支持 | 工作流程处理简单任务，代理在对话变得混乱时进行适应 |'
- en: '| Content generation | Workflow handles format and publishing; agent writes
    the body |'
  id: totrans-284
  prefs: []
  type: TYPE_TB
  zh: '| 内容生成 | 工作流程处理格式和发布；代理撰写正文 |'
- en: '| Data analysis/reporting | Agents summarize & interpret; workflows aggregate
    & deliver |'
  id: totrans-285
  prefs: []
  type: TYPE_TB
  zh: '| 数据分析/报告 | 代理总结和解释；工作流程聚合和交付 |'
- en: '| High-stakes decisions | Use agent for exploration, workflow for execution
    and compliance |'
  id: totrans-286
  prefs: []
  type: TYPE_TB
  zh: '| 高风险决策 | 使用代理进行探索，工作流程用于执行和合规 |'
- en: When to use hybrid approach
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 何时使用混合方法
- en: This aligns with how systems like WorkflowGen, n8n, and Anthropic’s own tooling
    advise building — stable pipelines with scoped autonomy.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 这与像WorkflowGen、n8n和Anthropic自己的工具建议构建的方式一致——具有范围自主权的稳定管道。
- en: 'Real Examples: Hybrid in Action'
  id: totrans-289
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 真实示例：混合方法的应用
- en: A Minimal Hybrid Example
  id: totrans-290
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 一个最小化混合示例
- en: 'Here’s a scenario I used with LangChain and LangGraph:'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个我使用LangChain和LangGraph的场景：
- en: '**Workflow stage**: fetch support tickets, embed & search'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工作流程阶段**：获取支持工单，嵌入并搜索'
- en: '**Agent cell**: decide whether it’s a refund question, a complaint, or a bug
    report'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理单元**：决定它是一个退款问题、投诉还是错误报告'
- en: '**Workflow**: run the correct branch based on agent’s tag'
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工作流程**：根据代理的标签运行正确的分支'
- en: '**Agent stage**: if it’s a complaint, summarize sentiment and suggest next
    steps'
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理阶段**：如果是投诉，总结情感并建议下一步'
- en: '**Workflow**: format and send response; log everything'
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工作流程**：格式化并发送响应；记录一切'
- en: The result? Most tickets flow through without agents, saving cost and complexity.
    But when ambiguity hits, the agent steps in and adds real value. No runaway token
    bills. Clear traceability. Automatic fallbacks.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 结果？大多数工单在没有代理的情况下流转，节省了成本和复杂性。但当出现歧义时，代理介入并增加实际价值。没有失控的令牌账单。清晰的追溯性。自动回退。
- en: 'This pattern splits the logic between a structured workflow and a scoped agent.
    (**Note: this is a high-level demonstration**)'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式将逻辑分割为结构化工作流程和范围代理。(**注意：这是一个高级演示**)
- en: '[PRE2]'
  id: totrans-299
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**What’s happening here:**'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: '**这里发生的事情：**'
- en: The workflow takes the first shot.
  id: totrans-301
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工作流程采取第一步。
- en: If the result seems weak or uncertain, the agent takes over.
  id: totrans-302
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果结果看起来较弱或不确定，代理接管。
- en: You only pay the agent cost when you really need to.
  id: totrans-303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你只有在真正需要的时候才支付代理费用。
- en: Simple. Controlled. Scalable.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 简单。可控。可扩展。
- en: 'Advanced: Workflow-Controlled Multi-Agent Execution'
  id: totrans-305
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 高级：由工作流程控制的多代理执行
- en: 'If your problem *really* calls for multiple agents — say, in a research or
    planning task — structure the system as a **graph**, not a soup of recursive loops.
    (**Note: this is a high level demonstration**)'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的问题**真正**需要多个代理——比如在研究或规划任务中——将系统结构化为**图**，而不是递归循环的汤。(**注意：这是一个高级演示**)
- en: '[PRE3]'
  id: totrans-307
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'This pattern gives you:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式为你提供：
- en: '**Workflow-level control** over routing and memory'
  id: totrans-309
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工作流程级控制**路由和内存'
- en: '**Agent-level reasoning** where appropriate'
  id: totrans-310
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在适当的情况下进行代理级推理。**'
- en: '**Bounded loops** instead of infinite agent recursion'
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有界循环**而不是无限代理递归'
- en: 'This is how tools like LangGraph are designed to work: **structured autonomy**,
    not free-for-all reasoning.'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是像LangGraph这样的工具被设计成这样工作的：**结构化自主性**，而不是无序推理。
- en: Production Deployment — Where Theory Meets Reality
  id: totrans-313
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生产部署 — 理论与现实交汇之处
- en: All the architecture diagrams, decision trees, and whiteboard debates in the
    world won’t save you if your AI system falls apart the moment real users start
    using it.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的AI系统在真实用户开始使用的那一刻就崩溃了，那么世界上所有的架构图、决策树和白板辩论都无法拯救你。
- en: Because that’s where things get messy — the inputs are noisy, the edge cases
    are endless, and users have a magical ability to break things in ways you never
    imagined. Production traffic has a personality. It will test your system in ways
    your dev environment never could.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 因为那里事情变得混乱——输入是嘈杂的，边缘情况是无穷无尽的，用户有一种神奇的能力，能够以你从未想象的方式破坏事物。生产流量有自己的个性。它将以你的开发环境从未能测试到的方式测试你的系统。
- en: And that’s where most AI projects stumble.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数AI项目失败的地方。
- en: The demo works. The prototype impresses the stakeholders. But then you go live
    — and suddenly the model starts hallucinating customer names, your token usage
    spikes without explanation, and you’re ankle-deep in logs trying to figure out
    why everything broke at 3:17 a.m. (True story!)
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 演示效果良好。原型给利益相关者留下了深刻印象。但然后你上线——突然模型开始幻想客户名字，你的标记使用量无缘无故地激增，你深陷日志中，试图弄清楚为什么一切在凌晨3:17时都崩溃了（真实故事！）
- en: This is the gap between a cool proof-of-concept and a system that actually holds
    up in the wild. It’s also where the difference between workflows and agents stops
    being philosophical and starts becoming very, very operational.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是从酷炫的证明概念到真正在野外站得住脚的系统之间的差距。这也是工作流程和智能体之间的区别从哲学层面开始变得非常、非常实际的地方。
- en: Whether you’re using agents, workflows, or some hybrid in between — once you’re
    in production, it’s a different game.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是使用智能体、工作流程还是在两者之间的一些混合——一旦进入生产阶段，游戏就完全不同了。
- en: You’re no longer trying to prove that the AI *can* work.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 你不再试图证明AI*可以*工作。
- en: You’re trying to make sure it works **reliably, affordably, and safely** — every
    time.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在努力确保它每次都能**可靠、经济、安全**地工作。
- en: So what does that actually take?
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 那实际上需要什么？
- en: Let’s break it down.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把它分解一下。
- en: Monitoring (Because “It Works on My Machine” Doesn’t Scale)
  id: totrans-324
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 监控（因为“在我的机器上运行正常”并不能扩展）
- en: Monitoring an agent system isn’t just “nice to have” — it’s survival gear.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 监控智能体系统不仅仅是“锦上添花”——它是生存装备。
- en: You can’t treat agents like regular apps. Traditional APM tools won’t tell you
    why an LLM decided to loop through a tool call 14 times or why it burned 10,000
    tokens to summarize a paragraph.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能像对待常规应用程序那样对待智能体。传统的APM工具不会告诉你为什么LLM决定重复调用工具14次，或者为什么它烧毁了10,000个标记来总结一个段落。
- en: 'You need observability tools that speak the agent’s language. That means tracking:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要能够说智能体语言的监控工具。这意味着跟踪：
- en: token usage patterns,
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标记使用模式，
- en: tool call frequency,
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具调用频率，
- en: response latency distributions,
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应延迟分布，
- en: task completion outcomes,
  id: totrans-331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务完成结果，
- en: and cost per interaction — **in real time**.
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以及每次交互的成本——**实时**。
- en: This is where tools like **LangFuse**, **AgentOps**, and **Arize Phoenix** come
    in. They let you peek into the black box — see what decisions the agent is making,
    how often it’s retrying things, and what’s going off the rails before your budget
    does.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是像LangFuse、AgentOps和Arize Phoenix这样的工具发挥作用的地方。它们让你能够窥视黑盒——看到智能体正在做出什么决策，它多久重试一次，以及在你预算耗尽之前，哪些事情开始脱轨。
- en: Because when something breaks, “the AI made a weird choice” is not a helpful
    bug report. You need traceable reasoning paths and usage logs — not just vibes
    and token explosions.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 因为当某件事出错时，“AI做出了奇怪的选择”并不是一个有帮助的错误报告。你需要可追溯的推理路径和使用日志——而不仅仅是感觉和标记爆炸。
- en: Workflows, by comparison, are way easier to monitor.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，工作流程更容易监控。
- en: 'You’ve got:'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 你有：
- en: response times,
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应时间，
- en: error rates,
  id: totrans-338
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误率，
- en: CPU/memory usage,
  id: totrans-339
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CPU/内存使用，
- en: and request throughput.
  id: totrans-340
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 和请求吞吐量。
- en: All the usual stuff you already track with your standard APM stack — Datadog,
    Grafana, Prometheus, whatever. No surprises. No loops trying to plan their next
    move. Just clean, predictable execution paths.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经用你的标准APM堆栈跟踪的所有常规内容——Datadog、Grafana、Prometheus，无论什么。没有惊喜。没有试图计划下一步的循环。只有干净、可预测的执行路径。
- en: So yes — both need monitoring. But agent systems demand a whole new layer of
    visibility. If you’re not prepared for that, production will make sure you learn
    it the hard way.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 所以是的——两者都需要监控。但智能体系统需要一个新的可见性层级。如果你没有为此做好准备，生产将确保你以最艰难的方式学习这一点。
- en: '![](../Images/befac4b9e581a57b57786ffdbafd5dd9.png)'
  id: totrans-343
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/befac4b9e581a57b57786ffdbafd5dd9.png)'
- en: Image by author
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: Cost Management (Before Your CFO Stages an Intervention)
  id: totrans-345
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成本管理（在你首席财务官进行干预之前）
- en: Token consumption in production can spiral out of control faster than you can
    say “autonomous reasoning.”
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 生产中的令牌消耗可能比“自主推理”更快地失控。
- en: It starts small — a few extra tool calls here, a retry loop there — and before
    you know it, you’ve burned through half your monthly budget debugging a single
    conversation. Especially with agent systems, costs don’t just add up — they compound.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 它从小的方面开始——这里几个额外的工具调用，那里一个重试循环——然后你还没意识到，你已经烧掉了你一半的月度预算来调试一个单独的对话。特别是对于代理系统，成本不仅仅是累加——它们是复合的。
- en: That’s why smart teams treat **cost management like infrastructure**, not an
    afterthought.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，聪明的团队将**成本管理视为基础设施**，而不是事后考虑。
- en: 'Some common (and necessary) strategies:'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 一些常见（且必要的）策略：
- en: '**Dynamic model routing** — Use lightweight models for simple tasks, save the
    expensive ones for when it actually matters.'
  id: totrans-350
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态模型路由**——对于简单任务使用轻量级模型，对于真正重要的时候保留昂贵的模型。'
- en: '**Caching** — If the same question comes up a hundred times, you shouldn’t
    pay to answer it a hundred times.'
  id: totrans-351
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缓存**——如果同一个问题出现了一百次，你不应该为一百次回答它付费。'
- en: '**Spending alerts** — Automated flags when usage gets weird, so you don’t learn
    about the problem from your CFO.'
  id: totrans-352
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支出警报**——当使用异常时自动标记，这样你就不需要从首席财务官那里了解问题。'
- en: With agents, this matters even more.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 对于代理来说，这一点尤为重要。
- en: Because once you hand over control to a reasoning loop, you lose visibility
    into how many steps it’ll take, how many tools it’ll call, and how long it’ll
    “think” before returning an answer.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 因为一旦你将控制权交给推理循环，你就无法了解它将采取多少步骤，它将调用多少工具，以及它将在返回答案之前“思考”多长时间。
- en: If you don’t have real-time cost tracking, per-agent budget limits, and graceful
    fallback paths — you’re just one prompt away from a very expensive mistake.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有实时成本跟踪、按代理预算限制和优雅的回退路径——你只需一个提示，就可能犯下一个非常昂贵的错误。
- en: Agents are smart. But they’re not cheap. Plan accordingly.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 代理很智能。但它们并不便宜。相应地计划。
- en: Workflows need cost management too.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程也需要成本管理。
- en: If you’re calling an LLM for every user request, especially with retrieval,
    summarization, and chaining steps — the numbers add up. And if you’re using GPT-4
    everywhere out of convenience? You’ll feel it on the invoice.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你为每个用户请求调用LLM，特别是当涉及到检索、摘要和链式步骤时——数字会累加。如果你出于方便在所有地方使用GPT-4？你会在发票上感受到这一点。
- en: But workflows are *predictable*. You know how many calls you’re making. You
    can precompute, batch, cache, or swap in smaller models without disrupting logic.
    Cost scales linearly — and predictably.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 但工作流程是**可预测的**。你知道你将进行多少次调用。你可以预先计算、批量处理、缓存或交换更小的模型，而不会破坏逻辑。成本呈线性——且可预测。
- en: Security (Because Autonomous AI and Security Are Best Friends)
  id: totrans-360
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安全性（因为自主AI和安全是最好的朋友）
- en: AI security isn’t just about guarding endpoints anymore — it’s about preparing
    for systems that can make their own decisions.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能安全不仅仅是保护端点——它是为能够做出自己决定的系统做准备。
- en: That’s where the concept of **shifting left** comes in — bringing security earlier
    into your development lifecycle.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是“左移”概念的作用——将安全更早地引入你的开发生命周期。
- en: 'Instead of bolting on security after your app “works,” shift-left means designing
    with security from day one: during prompt design, tool configuration, and pipeline
    setup.'
  id: totrans-363
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要在应用程序“工作”之后再添加安全措施，左移策略意味着从第一天开始就考虑安全性：在快速设计、工具配置和管道设置期间。
- en: With **agent-based systems**, you’re not just securing a predictable app. You’re
    securing something that can autonomously decide to call an API, access private
    data, or trigger an external action — often in ways you didn’t explicitly program.
    That’s a very different threat surface.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 使用**基于代理的系统**，你不仅仅是在保护一个可预测的应用程序。你正在保护一个可以自主决定调用API、访问私有数据或触发外部操作的东西——通常是以你未明确编程的方式。这构成了一个非常不同的威胁面。
- en: 'This means your security strategy needs to evolve. You’ll need:'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你的安全策略需要发展。你需要：
- en: '**Role-based access control** for every tool an agent can access'
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为每个代理可以访问的工具提供**基于角色的访问控制**
- en: '**Least privilege enforcement** for external API calls'
  id: totrans-367
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最小权限执行**对于外部API调用'
- en: '**Audit trails** to capture every step in the agent’s reasoning and behavior'
  id: totrans-368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审计跟踪**以捕获代理推理和行为中的每个步骤'
- en: '**Threat modeling** for novel attacks like prompt injection, agent impersonation,
    and collaborative jailbreaking (yes, that’s a thing now)'
  id: totrans-369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**威胁建模**针对如提示注入、代理冒充和协作越狱（是的，现在这已经成为一种现象）等新型攻击'
- en: Most traditional app security frameworks assume the code defines the behavior.
    But with agents, the behavior is dynamic, shaped by prompts, tools, and user input.
    If you’re building with autonomy, you need **security controls designed for unpredictability**.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数传统的应用程序安全框架都假设代码定义了行为。但与代理一起，行为是动态的，由提示、工具和用户输入塑造。如果你正在构建具有自主性的系统，你需要**为不可预测性设计的安全控制**。
- en: '* * *'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: But what about **workflows**?
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 但关于**工作流**呢？
- en: They’re easier — but not risk-free.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 它们更容易——但并非没有风险。
- en: Workflows are deterministic. You define the path, you control the tools, and
    there’s no decision-making loop that can go rogue. That makes security simpler
    and more testable — especially in environments where compliance and auditability
    matter.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流是确定性的。你定义路径，控制工具，没有决策循环可以失控。这使得安全更简单、更易于测试——特别是在合规性和可审计性重要的环境中。
- en: 'Still, workflows touch sensitive data, integrate with third-party services,
    and output user-facing results. Which means:'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，工作流会触及敏感数据，与第三方服务集成，并输出面向用户的结果。这意味着：
- en: Prompt injection is still a concern
  id: totrans-376
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示注入仍然是一个担忧
- en: Output sanitation is still essential
  id: totrans-377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出清理仍然至关重要
- en: API keys, database access, and PII handling still need protection
  id: totrans-378
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: API密钥、数据库访问和PII处理仍然需要保护
- en: 'For workflows, “shifting left” means:'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 对于工作流，“左移”意味着：
- en: Validating input/output formats early
  id: totrans-380
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 早期验证输入/输出格式
- en: Running prompt tests for injection risk
  id: totrans-381
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行提示测试以检测注入风险
- en: Limiting what each component can access, even if it “seems safe”
  id: totrans-382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 限制每个组件可以访问的内容，即使它“看起来安全”
- en: Automating red-teaming and fuzz testing around user inputs
  id: totrans-383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动化针对用户输入的红色团队和模糊测试
- en: It’s not about paranoia — it’s about protecting your system before things go
    live and real users start throwing unexpected inputs at it.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是关于偏执——这是在事情上线和真实用户开始向它投入意外输入之前保护你的系统。
- en: '* * *'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Whether you’re building agents, workflows, or hybrids, the rule is the same:'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是在构建代理、工作流还是混合系统，规则都是相同的：
- en: '**If your system can generate actions or outputs, it can be exploited.**'
  id: totrans-387
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**如果你的系统可以生成动作或输出，它就可以被利用**。'
- en: So build like someone *will* try to break it — because eventually, someone probably
    will.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，构建时要像有人会尝试破解它一样——因为最终，可能有人会这么做。
- en: Testing Methodologies (Because “Trust but Verify” Applies to AI Too)
  id: totrans-389
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试方法学（因为“信任但核实”也适用于人工智能）
- en: Testing production AI systems is like quality-checking a very smart but slightly
    unpredictable intern.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 测试生产AI系统就像检查一个非常聪明但稍微不可预测的实习生。
- en: They mean well. They usually get it right. But every now and then, they surprise
    you — and not always in a good way.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 他们本意是好的。他们通常做得对。但时不时地，他们会让你感到惊讶——而且不一定是以好的方式。
- en: That’s why you need **layers of testing**, especially when dealing with agents.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么你需要**多层测试**，尤其是在处理代理时。
- en: For **agent systems**, a single bug in reasoning can trigger a whole chain of
    weird decisions. One wrong judgment early on can snowball into broken tool calls,
    hallucinated outputs, or even data exposure. And because the logic lives inside
    a prompt, not a static flowchart, you can’t always catch these issues with traditional
    test cases.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**代理系统**，推理中的一个错误可能导致一系列奇怪的决定。早期的错误判断可能会演变成工具调用错误、幻觉输出，甚至数据泄露。而且因为逻辑存在于提示中，而不是静态流程图中，你无法总是通过传统的测试用例来捕捉这些问题。
- en: 'A solid testing strategy usually includes:'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 一个稳固的测试策略通常包括：
- en: '**Sandbox environments** with carefully designed mock data to stress-test edge
    cases'
  id: totrans-395
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**沙盒环境**，使用精心设计的模拟数据来压力测试边缘情况'
- en: '**Staged deployments** with limited real data to monitor behavior before full
    rollout'
  id: totrans-396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分阶段部署**，在全面推出前使用有限的真实数据来监控行为'
- en: '**Automated regression tests** to check for unexpected changes in output between
    model versions'
  id: totrans-397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动回归测试**以检查模型版本之间输出中的意外变化'
- en: '**Human-in-the-loop reviews** — because some things, like tone or domain nuance,
    still need human judgment'
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工审查**——因为某些事情，如语气或领域细微差别，仍然需要人类的判断'
- en: For agents, this isn’t optional. It’s the only way to stay ahead of unpredictable
    behavior.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 对于代理来说，这并非可选的。这是保持领先于不可预测行为的唯一方式。
- en: '* * *'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: But what about **workflows**?
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 但关于**工作流**呢？
- en: They’re easier to test — and honestly, that’s one of their biggest strengths.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 它们更容易测试——而且坦白说，这是它们最大的优势之一。
- en: 'Because workflows follow a deterministic path, you can:'
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 因为工作流遵循确定性的路径，所以你可以：
- en: Write unit tests for each function or tool call
  id: totrans-404
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为每个函数或工具调用编写单元测试
- en: Mock external services cleanly
  id: totrans-405
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清洁地模拟外部服务
- en: Snapshot expected inputs/outputs and test for consistency
  id: totrans-406
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快照预期的输入/输出并测试一致性
- en: Validate edge cases without worrying about recursive reasoning or planning loops
  id: totrans-407
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证边缘情况，无需担心递归推理或规划循环
- en: You still want to test prompts, guard against prompt injection, and monitor
    outputs — but the surface area is smaller, and the behavior is traceable. You
    know what happens when Step 3 fails, because you wrote Step 4.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 你仍然想要测试提示，防范提示注入，并监控输出——但表面积更小，行为可追踪。你知道当第3步失败时会发生什么，因为你已经编写了第4步。
- en: '**Workflows don’t remove the need for testing — they make it testable.**'
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: '**工作流程并没有消除测试的需求——它们使测试成为可能。**'
- en: That’s a big deal when you’re trying to ship something that won’t fall apart
    the moment it hits real-world data.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 当你试图交付的东西不会在接触现实世界数据的那一刻就崩溃时，这是一个大问题。
- en: 'The Honest Recommendation: Start Simple, Scale Intentionally'
  id: totrans-411
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 诚实的推荐：简单开始，有意扩展
- en: If you’ve made it this far, you’re probably not looking for hype — you’re looking
    for a system that actually works.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经读到这儿，你可能不是在寻找炒作——你是在寻找一个真正起作用的系统。
- en: 'So here’s the honest, slightly unsexy advice:'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 所以这里有一份诚实、略带无趣的建议：
- en: '**Start with workflows. Add agents only when you can clearly justify the need.**'
  id: totrans-414
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**从工作流程开始。只有当你能清楚地证明需要时，才添加代理。**'
- en: 'Workflows may not feel revolutionary, but they are reliable, testable, explainable,
    and cost-predictable. They teach you how your system behaves in production. They
    give you logs, fallback paths, and structure. And most importantly: **they scale.**'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程可能感觉不到革命性，但它们是可靠的、可测试的、可解释的，并且成本可预测。它们教会你系统在生产中的行为。它们为你提供日志、回退路径和结构。最重要的是：**它们可以扩展。**
- en: That’s not a limitation. That’s maturity.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是限制，这是成熟。
- en: It’s like learning to cook. You don’t start with molecular gastronomy — you
    start by learning how to not burn rice. Workflows are your rice. Agents are the
    foam.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像学习烹饪。你不是从分子美食学起——你从学习如何不烧焦米饭开始。工作流程是你的米饭。代理是泡沫。
- en: And when you do run into a problem that actually *needs* dynamic planning, flexible
    reasoning, or autonomous decision-making — you’ll know. It won’t be because a
    tweet told you agents are the future. It’ll be because you hit a wall workflows
    can’t cross. And at that point, you’ll be ready for agents — and your infrastructure
    will be, too.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 当你真正遇到需要动态规划、灵活推理或自主决策的问题时，你会知道的。这不会是因为一条推文告诉你代理是未来。而是因为你遇到了工作流程无法跨越的障碍。到那时，你将准备好使用代理——你的基础设施也将准备好。
- en: Look at the Mayo Clinic. [They run **14 algorithms on every ECG**](https://newsnetwork.mayoclinic.org/discussion/mayo-clinic-launches-new-technology-platform-ventures-to-revolutionize-diagnostic-medicine/#:~:text=Mayo%20Clinic%20and%20AI%2Ddriven%20health%20technology%20company,to%20Mayo%27s%20deep%20repository%20of%20medical%20data.)
    — not because it’s trendy, but because it improves diagnostic accuracy at scale.
    Or take [Kaiser Permanente](https://healthinnovation.ucsd.edu/news/11-health-systems-leading-in-ai),
    which says its AI-powered clinical support systems have helped save *hundreds
    of lives each year*.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 看看梅奥诊所。[他们在每个心电图上运行**14种算法**](https://newsnetwork.mayoclinic.org/discussion/mayo-clinic-launches-new-technology-platform-ventures-to-revolutionize-diagnostic-medicine/#:~:text=Mayo%20Clinic%20and%20AI%2Ddriven%20health%20technology%20company,to%20Mayo%27s%20deep%20repository%20of%20medical%20data.)——这不是因为潮流，而是因为它在规模上提高了诊断的准确性。或者看看凯撒永久医疗集团（[Kaiser
    Permanente](https://healthinnovation.ucsd.edu/news/11-health-systems-leading-in-ai)），它表示其由人工智能驱动的临床支持系统每年帮助挽救了**数百条生命**。
- en: These aren’t tech demos built to impress investors. These are real systems,
    in production, handling millions of cases — quietly, reliably, and with huge impact.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 这些不是为了给投资者留下深刻印象的技术演示。这些是实际系统，在生产中处理数百万个案例——安静、可靠，并且具有巨大影响。
- en: The secret? It’s not about choosing agents or workflows.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 秘诀？这不仅仅关于选择代理或工作流程。
- en: It’s about understanding the problem deeply, picking the right tools deliberately,
    and building for resilience — not for flash.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 这关乎深入理解问题，故意选择合适的工具，并为了弹性而构建——而不是为了短暂的光芒。
- en: Because in the real world, value comes from what works.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 因为在现实世界中，价值来自于什么起作用。
- en: Not what wows.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 不是什么令人惊叹的。
- en: '* * *'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Now go forth and make informed architectural decisions.** The world has enough
    AI demos that work in controlled environments. What we need are AI systems that
    work in the messy reality of production — regardless of whether they’re “cool”
    enough to get upvotes on Reddit.'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: '**现在去做出明智的架构决策吧**。世界上已经有足够的在受控环境中工作的AI演示。我们需要的是能够在生产环境的混乱现实中工作的AI系统——无论它们是否“酷”到足以在Reddit上获得点赞。'
- en: '* * *'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
