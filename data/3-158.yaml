- en: 'R.E.D.: Scaling Text Classification with Expert Delegation'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: R.E.D：通过专家委托扩展文本分类
- en: 原文：[https://towardsdatascience.com/r-e-d-scaling-text-classification-with-expert-delegation/](https://towardsdatascience.com/r-e-d-scaling-text-classification-with-expert-delegation/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/r-e-d-scaling-text-classification-with-expert-delegation/](https://towardsdatascience.com/r-e-d-scaling-text-classification-with-expert-delegation/)
- en: With the new age of problem-solving augmented by Large Language Models (LLMs),
    only a handful of problems remain that have subpar solutions. Most classification
    problems (at a PoC level) can be solved by leveraging LLMs at 70–90% Precision/F1
    with just good prompt engineering techniques, as well as adaptive in-context-learning
    (ICL) examples.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在由大型语言模型（LLMs）增强的新时代问题解决中，只有少数问题仍然存在，其解决方案不尽如人意。大多数分类问题（在 PoC 级别）可以通过利用 LLMs
    在 70-90% 的精度/F1 分数以及良好的提示工程技术和适应性情境学习（ICL）示例来解决。
- en: What happens when you want to consistently achieve performance **higher** than
    that — when prompt engineering no longer suffices?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想要持续实现比这更高的性能时会发生什么——当提示工程不再足够时？
- en: The classification conundrum
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分类难题
- en: Text classification is one of the oldest and most well-understood examples of
    supervised learning. Given this premise, it should really not be hard to build
    robust, well-performing classifiers that handle a large number of input classes,
    right…?
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分类是监督学习中最古老、最被理解的例子之一。基于这个前提，构建能够处理大量输入类别的稳健、高性能分类器应该**真的**不难，对吧…？
- en: Welp. It is.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，就是这样。
- en: 'It actually has to do a lot more with the ‘constraints’ that the algorithm
    is generally expected to work under:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，这与算法通常预期在以下“约束”下工作有很大关系：
- en: low amount of training data per class
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个类别的训练数据量较少
- en: high classification accuracy (that plummets as you add more classes)
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高分类精度（随着添加更多类别而急剧下降）
- en: possible addition of **new classes** to an existing subset of classes
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能向现有类别子集添加**新类别**
- en: quick training/inference
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速训练/推理
- en: cost-effectiveness
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成本效益
- en: (potentially) really large number of training classes
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: （可能）大量训练类别
- en: (potentially) endless **required **retraining of *some* classes due to data
    drift, etc.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: （可能）由于数据漂移等原因，**需要**重新训练某些类别，这可能是无限的。
- en: Ever tried building a classifier beyond a few dozen classes under these conditions?
    (I mean, even GPT could probably do a great job up to ~30 text classes with just
    a few samples…)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种条件下，你是否尝试过构建超过几十个类别的分类器？（我的意思是，即使是 GPT 也可能在只有几个样本的情况下，做到 30 个文本类别的大约 30 个类别…）
- en: Considering you take the GPT route — If you have more than a couple dozen classes
    or a sizeable amount of data to be classified, you are gonna have to reach deep
    into your pockets with the system prompt, user prompt, few shot example tokens
    that you will need to classify **one sample.**That is after making peace with
    the throughput of the API, even if you are running async queries.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到你选择了 GPT 路线——如果你有超过二十多门课程或大量需要分类的数据，你将不得不深入口袋掏出系统提示、用户提示以及你需要用于分类的少量示例令牌来**分类一个样本**。这是在接受了
    API 的吞吐量之后，即使你正在运行异步查询。
- en: 'In applied ML, problems like these are generally tricky to solve since they
    don’t fully satisfy the requirements of supervised learning or aren’t cheap/fast
    enough to be run via an LLM. This particular pain point is what the R.E.D algorithm
    addresses: semi-supervised learning, when the training data per class is not enough
    to build (quasi)traditional classifiers.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在应用机器学习中，这类问题通常很难解决，因为它们不完全满足监督学习的要求，或者不够便宜/快速，无法通过 LLM 运行。这个特定的痛点正是 R.E.D 算法要解决的问题：半监督学习，当每个类别的训练数据不足以构建（准）传统分类器时。
- en: The R.E.D. algorithm
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: R.E.D 算法
- en: '**R.E.D: Recursive Expert Delegation** is a novel framework that changes how
    we approach text classification. This is an applied ML paradigm — i.e., there
    is no *fundamentally different* architecture to what exists, but its a highlight
    reel of ideas that work best to build something that is practical and scalable.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**R.E.D：递归专家委托**是一个新颖的框架，改变了我们处理文本分类的方法。这是一个应用机器学习范式——即，它并没有与现有架构**本质上不同**，但它是一个最佳想法的精选集，这些想法最适合构建实用且可扩展的东西。'
- en: In this post, we will be working through a specific example where we have a
    large number of text classes (100–1000), each class only has few samples (30–100),
    and there are a non-trivial number of samples to classify (10,000–100,000). We
    approach this as a **semi-supervised learning** problem via R.E.D.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将通过一个具体示例来探讨，其中我们有一个大量的文本类别（100–1000），每个类别只有少量样本（30–100），并且有大量样本需要分类（10,000–100,000）。我们通过R.E.D.将其视为一个**半监督学习**问题。
- en: Let’s dive in.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨。
- en: How it works
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 它是如何工作的
- en: '![](../Images/5e0ee3afabea9dd2c5208da495e03626.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5e0ee3afabea9dd2c5208da495e03626.png)'
- en: simple representation of what R.E.D. does
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 简单地表示R.E.D.所做的工作。
- en: 'Instead of having a single classifier classify between a large number of classes,
    R.E.D. intelligently:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 与使用单个分类器对大量类别进行分类相比，R.E.D.智能地：
- en: '**Divides and conquers **— Break the label space (large number of input labels)
    into multiple subsets of labels. This is a greedy label subset formation approach.'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分而治之**——将标签空间（大量输入标签）分解成多个标签子集。这是一种贪婪的标签子集形成方法。'
- en: '**Learns efficiently** — Trains specialized classifiers for each subset. This
    step focuses on building a classifier that oversamples on noise, where noise is
    intelligently modeled as data from *other subsets.*'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**高效学习**——为每个子集训练专门的分类器。这一步骤专注于构建一个对噪声过度采样的分类器，其中噪声被智能地建模为来自*其他子集*的数据。'
- en: '**Delegates to an expert** — Employes LLMs as expert oracles for specific label
    validation and correction only, similar to having a team of domain experts. Using
    an LLM as a proxy, it empirically ‘mimics’ **how **a human expert validates an
    output.'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**委托给专家**——仅使用LLM作为特定标签验证和纠正的专家或acles，类似于拥有一支领域专家团队。使用LLM作为代理，它经验性地“模仿”**如何**人类专家验证输出。'
- en: '**Recursive retraining **— Continuously retrains with fresh samples added back
    from the expert until there are no more samples to be added/a saturation from
    information gain is achieved'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**递归重训练**——持续地使用从专家那里添加的新样本进行重训练，直到没有更多样本可以添加/达到信息增益饱和。'
- en: The intuition behind it is not very hard to grasp: [Active Learning](https://en.wikipedia.org/wiki/Active_learning_(machine_learning)) employs
    humans as domain experts to consistently ‘correct’ or ‘validate’ the outputs from
    an ML model, with continuous training. This stops when the model achieves acceptable
    performance. We intuit and rebrand the same, with a few clever innovations that
    will be detailed in a research pre-print later.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 其背后的直觉并不难理解：[主动学习](https://en.wikipedia.org/wiki/Active_learning_(machine_learning))利用人类作为领域专家，持续地“纠正”或“验证”ML模型的输出，并进行持续训练。当模型达到可接受的性能时停止。我们直觉上重新定义了这一点，并加入了一些将在后续研究预印本中详细阐述的巧妙创新。
- en: Let’s take a deeper look…
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨一下...
- en: Greedy subset selection with least similar elements
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用最不相似元素进行贪婪子集选择。
- en: When the number of input labels (classes) is high, the complexity of learning
    a linear decision boundary between classes increases. As such, the quality of
    the classifier deteriorates as the number of classes increases. This is especially
    true when the classifier does not have enough **samples** to learn from — i.e.
    each of the training classes has only a few samples.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 当输入标签（类别）的数量较高时，学习类别之间线性决策边界的复杂性会增加。因此，随着类别数量的增加，分类器的质量会下降。这尤其适用于分类器没有足够的**样本**来学习的情况——即每个训练类别只有少量样本。
- en: This is very reflective of a real-world scenario, and the primary motivation
    behind the creation of R.E.D.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常反映现实世界场景，也是R.E.D.创建的主要动机。
- en: 'Some ways of improving a classifier’s performance under these constraints:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些约束下提高分类器性能的一些方法：
- en: '**Restrict **the number of classes a classifier needs to classify between'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**限制**分类器需要分类的类别数量。'
- en: Make the decision boundary between classes clearer, i.e., train the classifier
    on **highly dissimilar classes**
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使类别之间的决策边界更清晰，即训练分类器在**高度不同类**别上。
- en: 'Greedy Subset Selection does exactly this — since the scope of the problem
    is text classification, we form embeddings of the training labels, reduce their
    dimensionality via UMAP, then form ***S*** subsets from them. Each of the ***S ***subsets
    has elements as ***n ***training labels. We pick training labels greedily, ensuring
    that every label we pick for the subset is the most dissimilar label w.r.t. the
    other labels that exist in the subset:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 贪婪子集选择正是如此——由于问题的范围是文本分类，我们形成训练标签的嵌入，通过UMAP降低其维度，然后从它们中形成 ***S*** 子集。每个 ***S*** 子集包含 ***n ***个训练标签。我们贪婪地选择训练标签，确保我们为子集选择的每个标签与其他子集中存在的标签相比是最不相似的：
- en: '[PRE0]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: the result of this greedy subset sampling is all the training labels clearly
    boxed into subsets, where each subset has at most only ***n ***classes. This inherently
    makes the job of a classifier easier, compared to the original ***S ***classes
    it would have to classify between otherwise!
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这种贪婪子集采样的结果是所有训练标签都清晰地划分到子集中，其中每个子集最多只有 ***n ***个类别。这本质上使得分类器的工作比它原本必须分类的 ***S ***个类别要容易得多！
- en: Semi-supervised classification with noise oversampling
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 噪声过采样的半监督分类
- en: Cascade this after the initial label subset formation — i.e., this classifier
    is only classifying between a given **subset **of classes.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在初始标签子集形成后级联此操作——即，此分类器仅在给定的**子集**之间进行分类。
- en: 'Picture this: when you have low amounts of training data, you absolutely cannot
    create a hold-out set that is meaningful for evaluation. Should you do it at all?
    How do you know if your classifier is working well?'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下：当你有很少的训练数据时，你绝对不能创建一个对评估有意义的保留集。你真的应该这样做吗？你如何知道你的分类器是否工作良好？
- en: 'We approached this problem slightly differently — we defined the fundamental
    job of a semi-supervised classifier to be **pre-emptive** classification of a
    sample. This means that regardless of what a sample gets classified as it will
    be ‘verified’ and ‘corrected’ at a later stage: this classifier only needs to
    identify what needs to be verified.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以略微不同的方式处理这个问题——我们定义半监督分类器的根本任务是**预防性**分类样本。这意味着无论样本被分类为什么，它将在稍后的阶段被‘验证’和‘纠正’：这个分类器只需要识别需要验证的内容。
- en: 'As such, we created a design for how it would treat its data:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们设计了一种如何处理其数据的方法：
- en: '***n+1***classes, where the last class is **noise**'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***n+1***个类别，其中最后一个类别是**噪声**'
- en: '**noise: **data from classes that are NOT in the current classifier’s purview.
    The noise class is oversampled to be 2x the average size of the data for the classifier’s
    labels'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**噪声**：来自当前分类器视野之外的类别的数据。噪声类别被过采样，使其大小是分类器标签数据平均大小的2倍'
- en: Oversampling on noise is a faux-safety measure, to ensure that adjacent data
    that belongs to another class is most likely predicted as noise instead of slipping
    through for verification.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在噪声上过采样是一种虚假的安全措施，以确保属于另一个类的相邻数据最有可能被预测为噪声，而不是在验证中滑过。
- en: How do you check if this classifier is working well — in our experiments, we
    define this as the number of ‘uncertain’ samples in a classifier’s prediction.
    Using uncertainty sampling and information gain principles, we were effectively
    able to gauge if a classifier is ‘learning’ or not, which acts as a pointer towards
    classification performance. This classifier is consistently retrained unless there
    is an inflection point in the number of uncertain samples predicted, or there
    is only a delta of information being added iteratively by new samples.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如何检查这个分类器是否工作良好——在我们的实验中，我们将其定义为分类器预测中‘不确定’样本的数量。通过不确定性采样和信息增益原则，我们有效地评估了分类器是否‘学习’，这可以作为分类性能的指针。除非预测的不确定样本数量出现拐点，或者新样本迭代性地添加的信息量只有微小的变化，否则这个分类器将不断重新训练。
- en: Proxy active learning via an LLM agent
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过LLM代理进行代理主动学习
- en: This is the heart of the approach — using an LLM as a proxy for a human validator.
    The human validator approach we are talking about is Active Labelling
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这是该方法的核心——使用LLM作为人类验证者的代理。我们谈论的人类验证者方法是主动标记
- en: 'Let’s get an intuitive understanding of Active Labelling:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们直观地理解主动标记：
- en: Use an ML model to learn on a sample input dataset, predict on a large set of
    datapoints
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ML模型在样本输入数据集上学习，在大量数据点上预测
- en: For the predictions given on the datapoints, a subject-matter expert (SME) evaluates
    ‘validity’ of predictions
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于在数据点上给出的预测，主题专家（SME）评估预测的‘有效性’
- en: Recursively, new ‘corrected’ samples are added as training data to the ML model
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 递归地，新的“修正”样本被添加到机器学习模型的训练数据中。
- en: The ML model consistently learns/retrains, and makes predictions until the SME
    is satisfied by the quality of predictions
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习模型持续学习/重新训练，并做出预测，直到专家对预测的质量满意。
- en: 'For Active Labelling to work, there are expectations involved for an SME:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使主动标记（Active Labelling）工作，对于专家（SME）有一些期望：
- en: when we expect a human expert to ‘validate’ an output sample, the expert understands
    what the task is
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当我们期望人类专家“验证”输出样本时，专家理解任务是什么。
- en: a human expert will use judgement to evaluate ‘what else’ definitely belongs
    to a label **L** when deciding if a new sample should belong to **L**
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当决定一个新样本是否属于标签 **L** 时，人类专家将使用判断来评估 **L** 中“其他什么”肯定属于标签的情况。
- en: 'Given these expectations and intuitions, we can ‘mimic’ these using an LLM:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 给定这些期望和直觉，我们可以使用 LLM 来“模仿”这些：
- en: '**give the LLM an ‘understanding’ of what each label means**. This can be done
    by using a larger model to **critically evaluate the relationship** between {label:
    data mapped to label} for all labels. In our experiments, this was done using
    a **32B variant of DeepSeek** that was self-hosted.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**让大型语言模型（LLM）理解每个标签的含义**。这可以通过使用更大的模型来 **批判性地评估** 所有标签之间 {标签：映射到标签的数据} 的关系来实现。在我们的实验中，这是通过使用一个
    **32B 版本的 DeepSeek** 来实现的，该版本是自托管的。'
- en: '![](../Images/c65bb0598fff296da7eea7a04efd8388.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c65bb0598fff296da7eea7a04efd8388.png)'
- en: Giving an LLM the capability to understand ‘why, what, and how’
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 给予 LLM 理解“为什么、是什么、如何”的能力。
- en: Instead of predicting what is the correct label, **leverage the LLM to identify
    if a prediction is ‘valid’ or ‘invalid’ only** (i.e., LLM only has to answer a
    binary query).
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 而不是预测正确的标签，**利用 LLM 来识别预测是否“有效”或“无效”**（即，LLM 只需回答一个二元查询）。
- en: '**Reinforce the idea of what other valid samples for the label look like,** i.e.,
    for every pre-emptively predicted label for a sample, dynamically source ***c*** closest
    samples in its training (guaranteed valid) set when prompting for validation.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强化对标签其他有效样本外观的想法**，即对于每个预先预测的样本标签，在请求验证时动态获取其训练集中最接近的 ***c*** 个样本（保证有效）。'
- en: 'The result? A cost-effective framework that relies on a fast, cheap classifier
    to make pre-emptive classifications, and an LLM that verifies these using (meaning
    of the label + dynamically sourced training samples that are similar to the current
    classification):'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 结果？一个成本效益高的框架，它依赖于快速、廉价的分类器进行先发制人的分类，以及一个 LLM，它使用（标签的含义 + 与当前分类相似的动态获取的训练样本）来验证这些分类：
- en: '[PRE1]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'By feeding the valid samples (voted_data) to our classifier under controlled
    parameters, we achieve the ‘recursive’ part of our algorithm:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在受控参数下将有效样本（投票数据）输入到我们的分类器中，我们实现了算法的“递归”部分：
- en: '![](../Images/cb4d532935b4064b55df2b4ee5f278d8.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cb4d532935b4064b55df2b4ee5f278d8.png)'
- en: 'Recursive Expert Delegation: R.E.D.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 递归专家委托：R.E.D.
- en: By doing this, we were able to achieve close-to-human-expert validation numbers
    on controlled multi-class datasets. Experimentally, R.E.D. scales up to **1,000
    classes while maintaining a competent degree of accuracy** almost on par with
    human experts (90%+ agreement).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这样做，我们能够在受控的多类数据集上实现接近人类专家的验证数字。实验上，R.E.D. 可以扩展到 **1,000 个类别**，同时保持相当高的准确度，几乎与人类专家相当（90%+
    的同意率）。
- en: I believe this is a significant achievement in applied ML, and has real-world
    uses for production-grade expectations of cost, speed, scale, and adaptability.
    The technical report, publishing later this year, highlights relevant code samples
    as well as experimental setups used to achieve given results.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这是应用机器学习中的一个重大成就，并且对于具有成本、速度、规模和适应性的生产级期望具有实际应用价值。本年度晚些时候发布的报告突出了相关的代码示例以及用于实现给定结果的实验设置。
