- en: Advanced Prompt Engineering for Data Science Projects
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 高级数据科学项目提示工程
- en: 原文：[https://towardsdatascience.com/advanced-prompt-engineering-for-data-science-projects/](https://towardsdatascience.com/advanced-prompt-engineering-for-data-science-projects/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/advanced-prompt-engineering-for-data-science-projects/](https://towardsdatascience.com/advanced-prompt-engineering-for-data-science-projects/)
- en: <mdspan datatext="el1755634574506" class="mdspan-comment">As a **data scientist**</mdspan>,
    you have probably wondered several times how to improve your workflows, how to
    speed up tasks, and how to output better results.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755634574506" class="mdspan-comment">作为一名**数据科学家**</mdspan>，你可能已经多次想过如何改进你的工作流程，如何加快任务，以及如何输出更好的结果。
- en: The dawn of **LLMs** has helped numerous data scientists and ML engineers to
    not only improve their models but also to help them **iterate** faster, learn
    and focus on the tasks that really matter.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**LLMs**的兴起帮助了无数的数据科学家和机器学习工程师不仅改进了他们的模型，而且帮助他们更快地迭代、学习和专注于真正重要的任务。'
- en: In this article, I am sharing with you my favorite prompts and prompt engineering
    **tips**that help me tackle Data Science and AI tasks.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我要与你分享我最喜欢的提示和提示工程**技巧**，这些技巧帮助我处理数据科学和人工智能任务。
- en: Besides, soon **Prompt Engineering** will be a required skill in almost all
    DS and ML job descriptions.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，不久的将来，**提示工程**将几乎成为所有数据科学和机器学习职位描述中的必备技能。
- en: This guide walks you through practical, research-backed prompt techniques that
    speed up (and sometimes automate) every stage of your ML workflow.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本指南将向您介绍基于研究的实用提示技术，这些技术可以加快（有时甚至自动化）您机器学习工作流程的每个阶段。
- en: 'This is the **second** of a series of **3 articles** I am writing about Prompt
    Engineering for Data Science:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这是关于数据科学提示工程的一系列**3篇文章**中的第二篇：
- en: '**Part 1:** [Prompt Engineering for Planning, Cleaning, and EDA](https://towardsdatascience.com/become-a-better-data-scientist-with-these-prompt-engineering-hacks/)'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第1部分:** [提示工程用于规划、清理和EDA](https://towardsdatascience.com/become-a-better-data-scientist-with-these-prompt-engineering-hacks/)'
- en: '**Part 2: Prompt Engineering for Features, Modeling, and Evaluation (this article)**'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第2部分:** 提示工程用于特征、建模和评估（本文）'
- en: '**Part 3: **Prompt Engineering for Docs, DevOps, and Learning'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第3部分:** 提示工程用于文档、DevOps和学习'
- en: 👉All the **prompts **in this article are available at the **end** of this article
    as a cheat sheet 😉
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 👉本文中所有的**提示**都可在文章末尾作为速查表找到 😉
- en: 'In this article:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中：
- en: 'First Things First: What Makes a Good Prompt?'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首要事项：什么是一个好的提示？
- en: Prompt Engineering for Features, Modeling, and Evaluation
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示工程用于特征、建模和评估
- en: Prompt Engineering cheat sheet
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示工程速查表
- en: '* * *'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'First Things First: What Makes a Good Prompt?'
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 首要事项：什么是一个好的提示？
- en: You might know this by now but it’s always good to refresh our minds about this.
    Let’s break it down.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经知道了，但总是刷新我们的思维是件好事。让我们来分解一下。
- en: Anatomy of a High-Quality Prompt
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高质量提示的解剖结构
- en: '**Role & Task**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**角色与任务**'
- en: 'Start by telling the LLM who it is and what it needs to do. E.g.:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，告诉LLM它是谁以及它需要做什么。例如：
- en: '[PRE0]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Context & Constraints**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文与约束**'
- en: This part is really important. Add details and context as much as you can.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这部分非常重要。尽可能添加细节和上下文。
- en: '**Pro Tip:** Add all details + context in the same prompt. It is proven that
    it works best like this.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**专业技巧:** 在同一个提示中添加所有细节和上下文。事实证明，这样做效果最好。'
- en: 'This includes: data type and format, data source and origin, sample schema,
    output format, level of detail, structure, tone and style, token limits, calculation
    rules, domain knowledge, etc.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括：数据类型和格式、数据来源和来源、样本架构、输出格式、详细程度、结构、语气和风格、令牌限制、计算规则、领域知识等。
- en: '**Examples or Tests**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例或测试**'
- en: Give it a few examples to follow, or even unit tests to check the output.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 给它一些示例来遵循，甚至单元测试来检查输出。
- en: Example — Formatting style for a summary
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 — 摘要的格式化风格
- en: '[PRE1]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Evaluation Hook**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**评估钩子**'
- en: Ask it to rate its own response, explain its reasoning, or output a confidence
    score.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 让它对自己的回答进行评分，解释其推理，或输出一个置信度分数。
- en: Other Prompting Tips
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他提示技巧
- en: Clean delimiters (`##`) make sections scannable. Use them all the time!
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰的分隔符（`##`）使部分内容易于浏览。请随时使用它们！
- en: Put your instructions **before** the data, and wrap context in clear delimiters
    like triple backticks.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据之前放置您的指令，并用清晰的分隔符（如三重反引号）包裹上下文。
- en: 'Eg: `## These are my instructions`'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：`## 这些是我的指令`
- en: Be as much specific as you can. Say “return a Python list” or “only output valid
    SQL.”
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 尽可能具体。比如说“返回一个Python列表”或“只输出有效的SQL。”
- en: Keep the **temperature** low (≤0.3) for tasks that need consistent output, but
    you can increase it for creative tasks like feature brainstorming.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 对于需要一致输出的任务，请保持**温度**低（≤0.3），但对于创意任务如特征头脑风暴，你可以增加它。
- en: If you are on a **budget**, use cheaper models for quick ideas, then switch
    to a premium one to polish the final version.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你处于**预算限制**，可以使用更便宜的模型来快速产生想法，然后切换到高级版本来完善最终版本。
- en: Prompt Engineering for Features, Modeling, and Evaluation
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 特征、建模和评估的提示工程
- en: 1\. Text Features
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 文本特征
- en: With the right prompt, an LLM can instantly generate a diverse set of semantic,
    rule-based, or linguistic features, complete with practical examples you can,
    after reviewing, plug into your workflow.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 使用正确的提示，LLM可以立即生成一组多样化的语义、基于规则或语言特征，包括你可以审查后直接插入工作流程的实用示例。
- en: '**Template: Univariate Text Feature Brainstorm**'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**模板：单变量文本特征头脑风暴**'
- en: '[PRE2]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Pro Tips:**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**专业提示：**'
- en: Pair this with embeddings to create dense features.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将此与嵌入相结合以创建密集特征。
- en: Validate the outputted Python snippets in a sandboxed environment before using
    them (so you catch syntax errors or data types that do not match).
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在使用之前，在沙箱环境中验证输出的Python代码片段（这样你可以捕捉到语法错误或不匹配的数据类型）。
- en: 2\. Tabular Features
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 表格特征
- en: Manual feature engineering is usually not fun. Especially for tabular data,
    this process can take some days and it is usually very subjective.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 手动特征工程通常不是很有趣。特别是对于表格数据，这个过程可能需要几天时间，并且通常非常主观。
- en: Tools like **[LLM-FE](https://github.com/nikhilsab/llmfe)** take a different
    approach. They treat LLMs as **evolutionary optimizers** that iteratively invent
    and refine features until the performance gets better.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 像这样的工具**[LLM-FE](https://github.com/nikhilsab/llmfe)**采取了不同的方法。它们将LLM视为**进化优化器**，通过迭代发明和改进特征，直到性能得到提升。
- en: 'Developed by researchers at Virginia Tech, LLM-FE works in loops:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 由弗吉尼亚理工大学的研究人员开发，LLM-FE在循环中工作：
- en: The LLM proposes a new transformation based on the existing dataset schema.
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: LLM基于现有数据集模式提出了一种新的转换。
- en: The candidate feature is tested using a simple downstream model.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 候选特征使用简单的下游模型进行测试。
- en: The most promising features are kept, refined, or combined (just like in genetic
    algorithms, but powered by natural language prompts).
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最有希望的特征被保留、改进或组合（就像在遗传算法中一样，但由自然语言提示提供动力）。
- en: This method has showed to perform really well compared to manual feature engineering.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 与手动特征工程相比，这种方法已经显示出非常好的性能。
- en: '![](../Images/c44c7fc921311b8af9034544fd5076d6.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c44c7fc921311b8af9034544fd5076d6.png)'
- en: 'Architecture of the LLM-FE framework, where a large language model acts as
    an evolutionary optimizer. Source: [nikhilsab/LLMFE: This is the official repo
    for the paper “LLM-FE”](https://github.com/nikhilsab/llmfe)'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: LLM-FE框架的架构，其中大型语言模型充当进化优化器。来源：[nikhilsab/LLMFE：这是论文“LLM-FE”的官方仓库](https://github.com/nikhilsab/llmfe)
- en: '**Prompt (LLM-FE style):**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示（LLM-FE风格）：**'
- en: '[PRE3]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 3\. Time-Series Features
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 时间序列特征
- en: If you’ve ever struggle with seasonal trends or sudden spikes in your time-series
    data, you know it can be hard to deal with all the moving pieces.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经遇到过时间序列数据中的季节性趋势或突然的峰值，你就知道处理所有这些移动部件可能很困难。
- en: '**[TEMPO](https://github.com/DC-research/TEMPO?utm_source=chatgpt.com)** is
    a project that lets you prompt for decomposition and forecasting in one smooth
    step, so it can save you hours of manual work.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**[TEMPO](https://github.com/DC-research/TEMPO?utm_source=chatgpt.com)**是一个项目，它允许你一步完成分解和预测，因此可以节省你数小时的手动工作。'
- en: '**Seasonality-Aware Prompt:**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**季节性感知提示：**'
- en: '[PRE4]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**4\. Text Embedding Features**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 文本嵌入特征**'
- en: 'The idea of the next prompt is pretty straightforward: I’m taking documents
    and pulling out the key insights that would actually be useful for someone trying
    to understand what they’re dealing with.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个提示的想法相当直接：我正在提取文档中的关键见解，这些见解对于试图理解他们所处理内容的人来说实际上是有用的。
- en: '[PRE5]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Instead of just giving you a basic “positive/negative” classification, I’m using
    a continuous score between -1 and 1, which gives you way more nuance.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是只给你一个基本的“正面/负面”分类，我使用介于-1和1之间的连续分数，这为你提供了更多的细微差别。
- en: For the keyword extraction, I went with **TF-IDF** ranking because it actually
    works really well at surfacing the terms that matter most in each document.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对于关键词提取，我选择了**TF-IDF**排名，因为它实际上在揭示每个文档中最相关的术语方面表现得非常好。
- en: Code Generation & AutoML
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码生成与自动化机器学习
- en: Choosing the right model, building the pipeline, and tuning the parameters—it’s
    the holy trinity of machine learning, but also the part that can eat up days of
    work.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 选择正确的模型、构建管道和调整参数——这是机器学习的神圣三位一体，但也是可能消耗数天工作的部分。
- en: LLMs are game-changers for this stuff. Instead of me sitting there comparing
    dozens of models or hand-coding yet another preprocessing pipeline, I can just
    describe what I’m trying to do and get solid recommendations back.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs是这一领域的颠覆者。我不再需要坐在这里比较数十个模型或手动编写另一个预处理管道，我只需描述我想做什么，就能得到可靠的推荐。
- en: '**Model Selection Prompt Template:**'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**模型选择提示模板：**'
- en: '[PRE6]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: You don’t have to stop at ranking and pipelines, though.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必止步于排名和管道。
- en: You can also tweak this prompt to include model **explainability** from the
    beginning. This means asking the LLM to justify **why** it ranked models in a
    certain order or to output feature importance (SHAP values) after training.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以调整这个提示，从一开始就包括模型**可解释性**。这意味着要求LLM解释**为什么**它以某种顺序对模型进行排名或训练后输出特征重要性（SHAP值）。
- en: That way, you’re not just getting a black-box recommendation, you’re getting
    a clear reasoning behind it.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这样一来，你不仅得到了一个黑盒推荐，还得到了背后的清晰推理。
- en: '**Bonus Bit (Azure ML Edition)**'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**附加内容（Azure ML版本）**'
- en: If you’re using Azure Machine Learning, this will be useful to you.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用Azure Machine Learning，这将对你很有用。
- en: With **[AutoMLStep](https://learn.microsoft.com/en-us/python/api/azureml-pipeline-steps/azureml.pipeline.steps.automlstep?view=azure-ml-py)**,
    you wrap an entire automated machine learning experiment (model selection, tuning,
    evaluation) into a modular step inside an Azure ML pipeline. You will have access
    to version control, scheduling, and easy repeat runs.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 使用**[AutoMLStep](https://learn.microsoft.com/en-us/python/api/azureml-pipeline-steps/azureml.pipeline.steps.automlstep?view=azure-ml-py)**，你可以在Azure
    ML管道中将整个自动化机器学习实验（模型选择、调整、评估）封装成一个模块化步骤。你将能够访问版本控制、调度和轻松重复运行。
- en: 'You can also make use of **[Prompt Flow](https://learn.microsoft.com/en-us/azure/machine-learning/prompt-flow/overview-what-is-prompt-flow?view=azureml-api-2)**:
    it adds a visual, node-based layer to this. Features include drag‑and‑drop UI,
    flow diagrams, prompt testing, branching logic, and live evaluation:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以利用**[Prompt Flow](https://learn.microsoft.com/en-us/azure/machine-learning/prompt-flow/overview-what-is-prompt-flow?view=azureml-api-2)**：它为这个系统添加了一个基于节点的可视化层。功能包括拖放UI、流程图、提示测试、分支逻辑和实时评估：
- en: '![](../Images/7d95df12b101c092c74ff8ebad171ca4.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7d95df12b101c092c74ff8ebad171ca4.png)'
- en: 'Example of a simple pipeline in Azure AI Foundry’s Prompt Flow editor, where
    different tools—like the LLM tool and Python tool—are linked together. Source:
    [Prompt flow in Azure AI Foundry portal – Azure AI Foundry | Microsoft Learn](https://learn.microsoft.com/en-us/azure/ai-foundry/concepts/prompt-flow)'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Foundry的Prompt Flow编辑器中简单管道的示例，其中不同的工具——如LLM工具和Python工具——被链接在一起。来源：[Azure
    AI Foundry门户中的Prompt flow – Azure AI Foundry | Microsoft Learn](https://learn.microsoft.com/en-us/azure/ai-foundry/concepts/prompt-flow)
- en: You can also just plug **Prompt Flow** into whatever you’ve already got running,
    and then your LLM and AutoML pieces all work together without any problem. Everything
    just flows in one automated setup that you can actually ship.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以将**Prompt Flow**直接集成到你正在运行的任何系统中，然后你的LLM和AutoML组件将无缝协同工作。一切都在一个可实际部署的自动化设置中流畅进行。
- en: Prompts for Fine-Tuning
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 精调提示
- en: Fine-tuning a large model doesn’t always mean retraining it from scratch (who
    has time for that?).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 微调大型模型并不总是意味着从头开始重新训练（谁有那么多时间？）。
- en: Instead, you can use lightweight techniques like **[LoRA](https://www.ibm.com/think/topics/lora)**
    (Low-Rank Adaptation) and [**PEFT**](https://www.ibm.com/think/topics/parameter-efficient-fine-tuning)
    (Parameter-Efficient Fine-Tuning).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，你可以使用轻量级技术，如**[LoRA](https://www.ibm.com/think/topics/lora)**（低秩适应）和[**PEFT**](https://www.ibm.com/think/topics/parameter-efficient-fine-tuning)（参数高效微调）。
- en: '**LoRA**'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**LoRA**'
- en: So LoRa is actually pretty clever, as instead of retraining a massive model
    from scratch, it basically just adds tiny trainable layers on top of what’s already
    there. Most of the original model stays frozen, and you’re only tweaking these
    small weight matrices to get it to do what you want.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，LoRa实际上非常聪明，因为它不是从头开始重新训练一个大型模型，而是在现有的基础上添加了微小的可训练层。大部分原始模型保持冻结状态，你只需调整这些小的权重矩阵，使其按照你的意愿工作。
- en: '**PEFT**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**PEFT**'
- en: PEFT is basically the umbrella term for all these smart approaches (LoRA being
    one of them) where you’re only training a small slice of the model’s parameters
    instead of the whole massive thing.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: PEFT基本上是所有这些智能方法的统称（LoRA只是其中之一），你只训练模型参数的一小部分，而不是整个庞大的东西。
- en: The compute savings are incredible. What used to take forever and cost a fortune
    now runs way faster and cheaper because you’re barely touching most of the model.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 计算节省是惊人的。过去需要花费很长时间和大量成本的事情，现在运行得更快更便宜，因为你几乎没有触及到模型的大部分内容。
- en: 'The best thing about all of this: you don’t even have to write these fine-tuning
    **scripts** yourself anymore. **LLMs** can actually generate the code for you,
    and they get better at it over time by learning from how well your models perform.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的事情是：你甚至不需要自己编写这些微调**脚本**了。**LLMs**实际上可以为你生成代码，并且随着时间的推移，通过学习你模型的性能，它们会变得越来越好。
- en: '**Fine-Tuning Dialogue Prompt**'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '**微调对话提示**'
- en: '[PRE7]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**Tool tip:** Use **[DSPy](https://dspy.ai/)** to improve this process. DSPy
    is an open-source framework for building **self-improving** pipelines. This means
    it can automatically rewrite prompts, enforce constraints (like batch size or
    training epochs), and track every change in multiple runs.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**工具提示：** 使用**[DSPy](https://dspy.ai/)**来改进这个过程。DSPy是一个用于构建**自我改进**管道的开源框架。这意味着它可以自动重写提示，强制执行约束（如批量大小或训练轮数），并跟踪多次运行中的每个变化。'
- en: In practice, you can run a fine-tuning job today, review the results tomorrow,
    and have the system **auto-adjust** your prompt and training settings for a better
    result without you having to start from scratch!
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，你今天可以运行微调作业，明天审查结果，系统将自动调整你的提示和训练设置以获得更好的结果，而无需从头开始！
- en: Let LLMs Evaluate Your Models
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让大型语言模型评估你的模型
- en: '**Smarter Evaluation Prompts**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**更智能的评估提示**'
- en: Studies show that LLMs score predictions almost like humans, when guided by
    good prompts.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 研究表明，当由良好的提示引导时，LLM的预测得分几乎与人类相似。
- en: 'Here are 3 prompts that will help you boost your evaluation process:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些提示可以帮助你提升评估过程：
- en: '**Single-Example Evaluation Prompt**'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**单例评估提示**'
- en: '[PRE8]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**Cross-Validation Code**'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '**交叉验证代码**'
- en: '[PRE9]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '**Regression Judge**'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**回归判断**'
- en: '[PRE10]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Troubleshooting Guide: Prompt Edition'
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 故障排除指南：提示版
- en: 'If you ever find one of these 3 problems, here is how you can fix it:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到这三个问题中的任何一个，这里是如何修复它们的方法：
- en: '| Problem | Symptom | Fix |'
  id: totrans-110
  prefs: []
  type: TYPE_TB
  zh: '| 问题 | 症状 | 解决方案 |'
- en: '| --- | --- | --- |'
  id: totrans-111
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Hallucinated features | Uses columns that don’t exist | Add schema + validation
    in prompt |'
  id: totrans-112
  prefs: []
  type: TYPE_TB
  zh: '| 幻觉特征 | 使用不存在的列 | 在提示中添加模式 + 验证 |'
- en: '| Too much “creative” code | Flaky pipelines | Set library limits + add test
    snippets |'
  id: totrans-113
  prefs: []
  type: TYPE_TB
  zh: '| 过多的“创意”代码 | 不稳定的管道 | 设置库限制 + 添加测试片段 |'
- en: '| Evaluation drift | Inconsistent scoring | Set temp=0, log prompt version
    |'
  id: totrans-114
  prefs: []
  type: TYPE_TB
  zh: '| 评估漂移 | 分数不一致 | 设置temp=0，记录提示版本 |'
- en: Wrapping It Up
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: Since LLMs became trendy, prompt engineering has officially leveled up. Now,
    it is a true and serious methodology that touches every part of ML and DS workflows.
    That’s why a big part of AI research is focused on how to improve and optimize
    prompts.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 自从LLM变得流行以来，提示工程已经正式升级。现在，它是一个真正且严肃的方法，触及到ML和DS工作流程的每个部分。这就是为什么AI研究的大部分内容都集中在如何改进和优化提示上。
- en: At the end, better **prompt engineering** means better **outputs** and a lot
    of **time** saved. Which I suppose is the **dream** of any data scientist 😉
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，更好的**提示工程**意味着更好的**输出**和节省大量的**时间**。我想这是任何数据科学家的**梦想**😉
