- en: 'How Large Language Models (LLMs) Learn: Playing Games'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）是如何学习的：玩游戏
- en: 原文：[https://towardsdatascience.com/how-large-language-models-llms-learn-playing-games-cb023d780401/](https://towardsdatascience.com/how-large-language-models-llms-learn-playing-games-cb023d780401/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-large-language-models-llms-learn-playing-games-cb023d780401/](https://towardsdatascience.com/how-large-language-models-llms-learn-playing-games-cb023d780401/)
- en: '![Image from Unplash.com](../Images/7a92748d0afefb0d970fe51e34a560aa.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![来自Unplash.com的图片](../Images/7a92748d0afefb0d970fe51e34a560aa.png)'
- en: Image from Unplash.com
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 来自Unplash.com的图片
- en: Hello dear reader, hope you’re doing super well!
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 亲爱的读者，希望你一切都好！
- en: In today’s article I will give you a very concise and intuitive overview of
    how Large Language Models learn, so sit back, grab a coffee or tea, and enjoy
    🙂
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天的文章中，我将为您提供关于大型语言模型学习的一个非常简洁直观的概述，所以请坐下来，拿一杯咖啡或茶，享受吧！
- en: '*This is the best [Data Science roadmap](https://aigents.co/learn/roadmaps/data-science-roadmap)
    that I have seen. It comes with AI-powered explanations and free learning resources!*'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '*这是我见过的最好的[数据科学路线图](https://aigents.co/learn/roadmaps/data-science-roadmap)。它包含AI驱动的解释和免费学习资源！*'
- en: What is a Large Language Model?
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是大型语言模型？
- en: '**Large Language Models or LLMs** are what we call the statistical models that
    power applications like ChatGPT.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**大型语言模型或LLMs**是我们所说的驱动ChatGPT等应用的统计模型。'
- en: They’re called like this, because generally they are trained using **enormous**
    (hence the *Large*) **quantities of text** (hence the *language*), and normally
    we interact with them through text, which is one of the main vehicles to represent
    **language**.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 它们之所以被称为这样，是因为它们通常使用**大量**（因此称为*大型*）**文本**（因此称为*语言*）进行训练，并且我们通常通过文本与它们互动，这是表示**语言**的主要途径之一。
- en: In addition to this we have the normal definition of **model** in science, which
    is an abstract **representation of a phenomenon, system or process from the real
    world.**
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还有科学中**模型**的正常定义，它是对现实世界现象、系统或过程的**抽象表示**。
- en: '![Image by author](../Images/d170ae9487824f29755383d502c86e61.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![由作者提供的图片](../Images/d170ae9487824f29755383d502c86e61.png)'
- en: Image by author
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者提供的图片
- en: 'So, in essence, from the name we can already get a quite precise grasp of what
    they are: **abstractions of the language we as humans, use every day, built from
    a massive amount of text.**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，本质上，从名称中我们就可以得到一个相当精确的把握：**它们是人类每天使用的语言的抽象，由大量文本构建而成**。
- en: By learning these abstractions, Largue Language Models learn how to interact
    with text in many different ways, understanding it and also being able to produce
    it at quality levels that seem human.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 通过学习这些抽象概念，大型语言模型学会了以许多不同的方式与文本互动，理解它，并且能够以看似人类的质量水平产生文本。
- en: How are they built?
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 它们是如何构建的？
- en: Now, to the core of the article.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们进入文章的核心。
- en: '**The magic.**'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**魔法。**'
- en: '**To understand how LLMs are built** we have to study two things: first, what
    they learn from (the data) and second, how they learn (the training process of
    the model).'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**要理解LLMs是如何构建的**，我们必须研究两件事：首先，它们从哪里学习（数据），其次，它们是如何学习的（模型的训练过程）。'
- en: The Data
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据
- en: The data part is quite simple and depends of the specific model, but the usually
    it is a **combination of a very large percentage of the whole internet plus specific
    private data sources.**
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 数据部分相当简单，并且取决于特定模型，但通常它是一个**结合了整个互联网的很大一部分加上特定的私有数据源**。
- en: 'From the time it was built, the internet is the largest accesible digital database
    of human knowledge, it has almost everything that we can think of:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 从它被构建的那一刻起，互联网就是人类知识最大的可访问数字数据库，它几乎包含了我们能想到的一切：
- en: '**Books**: Various books covering different genres, topics, and languages.
    From ‘_The Art of Wa_r’ to ‘*Le Petit Prince*‘, most recent LLMs have read an
    amount literature that would be imposible for even an army of humans reading even
    for their entire life.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**书籍**：涵盖不同流派、主题和语言的各类书籍。从《战争的艺术》到《*小王子*》，最新的LLMs阅读了即使是人类军队在一生中阅读也无法完成的文学量。'
- en: '**Websites**: Publicly available websites with informational content, forums,
    and other types of text data. Company websites or others.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**网站**：包含信息内容、论坛和其他类型文本数据的公开网站。公司网站或其他网站。'
- en: '**Wikipedia**: A comprehensive source of information on a wide array of topics
    – the world’s biggest enciclopedia.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**维基百科**：关于广泛主题的综合信息来源——世界上最大的百科全书。'
- en: '**Research Papers**: Academic papers and journals from various fields of study,
    where they can get a lot of deep, specific knowledge from.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研究论文**：来自各个研究领域的研究论文和期刊，他们可以从中获得很多深入、具体的知识。'
- en: '**User-Generated Content**: Publicly available text from forums, blogs, and
    social media. The opinion of big Ol’ Jack is for sure considered by LLMs, but
    diluted and smoothed in between all of the other sources of knowledge they have.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户生成内容**：来自论坛、博客和社交媒体的公开可用的文本。大个子杰克的观点当然会被LLMs考虑，但在所有其他知识来源之间被稀释和平滑。'
- en: '**Private Content** like Newspapers, Big Private Forums and others. Actually,
    you’ve probablly seen the likes of Reddit, New York Times and other big media
    corporations signing deals with OpenAI, Meta, and big-tech companies to provide
    their propietary data to train their Large Language Models.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**私人内容**如报纸、大型私人论坛等。实际上，你可能已经看到像Reddit、纽约时报和其他大型媒体公司与OpenAI、Meta和大型科技公司签订协议，以提供他们的专有数据来训练他们的大型语言模型。'
- en: The Training
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练
- en: Now, with this data, how do they end up with the abstraction of the world’s
    language? How do they build the model?
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，有了这些数据，他们如何得出世界语言的抽象？他们如何构建模型？
- en: '**What is the process of learning from the data?**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据学习的流程是什么？**'
- en: The Learn to do what they do by playing the [Mad Libs Game](https://en.wikipedia.org/wiki/Mad_Libs).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 通过玩[疯狂libs游戏](https://en.wikipedia.org/wiki/Mad_Libs)来学习如何做他们所做的事情。
- en: What? A Game?
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 什么？一个游戏？
- en: '**Yes, you heard that right.**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**是的，你听得很对**。'
- en: 'The Mad Libs Game, for those who don’t know it, consist of the following:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些不知道的人来说，疯狂libs游戏包括以下内容：
- en: One player prompting others for a list of words to substitute for blanks in
    a story before reading aloud.
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一名玩家在朗读之前提示其他玩家为故事中的空白处提供要替换的单词列表。
- en: In essence, you’re given a bit of context (surrounding or preceding words) and
    you have to **guess the word that comes next in a piece of text.**
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，你给出了一部分上下文（周围或前面的单词），你必须**猜测文本中下一个单词**。
- en: The models are rewarded for good guesses and punished for bad ones throught
    the typical **[Machine Learning](https://howtolearnmachinelearning.com/) [Gradient
    Descent](https://en.wikipedia.org/wiki/Gradient_descent)**, learning to guess,
    over time, which are the most likely words (ordered by probability), to fill in
    the blank spaces.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 模型通过典型的**[机器学习](https://howtolearnmachinelearning.com/) [梯度下降](https://en.wikipedia.org/wiki/Gradient_descent)**来获得好的猜测的奖励，并因错误的猜测而受到惩罚，随着时间的推移，学习猜测最有可能的单词（按概率排序），以填充空白空间。
- en: '**LLMs are just proffesional Mad Libs Players!**'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**LLMs只是专业的疯狂libs玩家！**'
- en: Example of Learning
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学习示例
- en: 'Okay, thats a huge oversimplification, but in high-level this is what plain
    vanilla LLMs do. **Lets see an example** with the 1st sentence of Alice in Wonderland:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，这是一个巨大的简化，但在高层次上，这就是普通的LLMs所做的事情。**让我们看看一个例子**，比如《爱丽丝梦游仙境》的第一句话：
- en: Alice was beginning to get very tired of sitting by her sister on the bank,
    and of having nothing to do
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 爱丽丝开始厌倦坐在她姐姐身边，坐在河岸上，无所事事
- en: '1st thing to notice is that this data is already labeled: the model has all
    the text it needs, and we, as model trainers just have to remove words to train
    it. This is what we call _**[Self supervised learning.](https://en.wikipedia.org/wiki/Self-supervised_learning)**_'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 第1件要注意的事情是，这些数据已经标记好了：模型已经有了它需要的所有文本，而我们，作为模型训练者，只需要移除单词来训练它。这就是我们所说的**[自监督学习](https://en.wikipedia.org/wiki/Self-supervised_learning)**。
- en: The model 1st gets either the 1st word, or the 1st and 3rd word, where we’ve
    removed the entire whole of the sentence or the 2nd word.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 模型首先得到第一个单词，或者第一个和第三个单词，其中我们移除了整个句子或第二个单词。
- en: Alice
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 爱丽丝
- en: or
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 或者
- en: Alice ___ beginning
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 爱丽丝 ___ 开始
- en: Imagine we go with the 1st example, now the model would try to guess the word
    that comes next.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，如果我们采用第一个例子，现在模型将尝试猜测下一个单词。
- en: Lets see how he does by looking at the list of ordered next words by their probability
    (imagine the model had had some previous hardcoded training).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看他通过查看按概率排序的下一个单词列表是如何做的（想象模型已经有一些预先硬编码的训练）。
- en: (is, 0.95), (was, 0.82), (said, 0.42), (thinks, 0.39), (loves, 0.32)…
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: (is, 0.95), (was, 0.82), (said, 0.42), (thinks, 0.39), (loves, 0.32)…
- en: Which would lead us to inserting the word ***is*** as the next word in the sentence.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这将导致我们在句子中插入单词***is***作为下一个单词。
- en: Alice is
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 爱丽丝是
- en: Of course, **we know this is wrong**, as the word that has to fill the gap is
    ‘*was*‘ (we know this as we have the text), so we penalize the model and it changes
    its internal weights to learn from this.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，**我们知道这是错误的**，因为需要填补空白的词是“*was*”（我们知道这一点，因为我们有文本），所以我们惩罚模型，并让它改变其内部权重来学习这一点。
- en: '**Thats it! Easy right?**'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**这就完了！简单吧？**'
- en: There is an important parameter of end to end Large Language Models, the **Temperature
    parameter** which allows it to pick a word that is not the most likely one, giving
    them a more natural and less rigid feel, and allowing for some variation in their
    responses.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 端到端大型语言模型有一个重要的参数，即**温度参数**，它允许模型选择一个不是最可能的词，使它们的感觉更加自然和灵活，并允许其响应中存在一些变化。
- en: You can find all about it here:[Prompt Engineering Settings Guide](https://www.promptingguide.ai/introduction/settings)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在这里找到所有关于它的信息：[提示工程设置指南](https://www.promptingguide.ai/introduction/settings)
- en: Now, by repeating this process over all the text we mentioned, of such different
    natures, ChatGPT and other LLM powered apps learn to do what they do, manifesting
    what we call ‘***emerging capabilities’***
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，通过重复我们在提到的所有不同性质的文本上进行的这个过程，ChatGPT和其他由LLM驱动的应用学会了它们所做的事情，展现了我们称之为“***新兴能力***”的东西。
- en: Emerging capabilities are something quite special, that AI researches kind of
    stumbled upon when training these models. Basically, by learning to ***predict
    the next word*** LLMs also learn to do a lot of other things, very very well.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 新兴能力是相当特别的事情，AI研究人员在训练这些模型时意外地发现了它们。基本上，通过学习**预测下一个单词**，LLMs还学会了做很多其他事情，而且做得非常好。
- en: '**They learn to code**, with the newest OpenAI model, O3, now ranking as [175th
    Best in the World on Coding Test](https://www.nextbigfuture.com/2024/12/openai-o3-ranks-as-175th-best-in-the-world-on-coding-test-and-great-on-agi-and-phd-tests.html)s.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它们学会了编码**，最新的OpenAI模型O3现在在[全球编码测试中排名第175位](https://www.nextbigfuture.com/2024/12/openai-o3-ranks-as-175th-best-in-the-world-on-coding-test-and-great-on-agi-and-phd-tests.html)。'
- en: They also learn to **write text in specific styles**, disrupting the content
    creation industry (my style is too hard for an LLM to copy, this article is 100%
    original don’t worry)
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们还学会了**以特定风格撰写文本**，颠覆了内容创作行业（我的风格对LLM来说太难模仿了，这篇文章是100%原创的，请放心）
- en: The are super good at **translating from one language to another.**
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们在**从一种语言翻译到另一种语言**方面非常出色。
- en: They learn to summarize, brainstorm, and pretty much do anything that we can
    imagine with text.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们学会了总结、头脑风暴，以及几乎可以用文本完成我们可以想象的一切。
- en: There is a wide **debate** in the AI community of whether LLMs can reach what
    is known as **Artificial General Intellence (AGI).**
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI社区中，关于LLM能否达到所谓的**人工通用智能（AGI）**存在广泛的**辩论**。
- en: '**What AGI is, is still not perfectly defined**, but in essence it speaks of
    machines that can carry out a **wide variety of tasks with the level of performance
    and expertice of a pretty decent human.**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**AGI是什么，目前还没有得到完美的定义**，但本质上它指的是能够以相当不错的人类水平和专业知识执行各种任务的机器。'
- en: Some, like Sam Altman or Elon Musk argue that with models that are better and
    larger, and tweaks and additions to the architecture, **we will reach AGI with
    LLM based systems.**
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 一些，如Sam Altman或Elon Musk认为，随着模型更好、更大，以及架构的调整和补充，**我们将通过基于LLM的系统达到AGI**。
- en: Others like Yan Leccun, Chief AI Officer at Meta, say that the current architecture
    is too narrow, **lacks grounding, and other fundamental capabilities to interact
    with the real world.**
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 其他像Yan Leccun这样的人，Meta的首席AI官，说当前的架构过于狭窄，**缺乏与现实世界互动的基础和基本能力**。
- en: 'We will see who is right, but in any case, these emergent capabilities of LLMs,
    and all the incredible apps and developments we’ve seen over these past two years
    point towards **Language being a fundamental element of intelligence**, and points
    towards an interesting philosofical debate:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将看到谁是对的，但无论如何，LLMs的这些新兴能力，以及过去两年中我们所看到的所有令人难以置信的应用和开发，都指向**语言是智能的基本元素**，并指向一个有趣的哲学辩论：
- en: '**Are we humans intelligent because we developed language or did we develop
    language because we’re intelligent?**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们是人类因为发展了语言才变得聪明，还是因为我们聪明才发展了语言？**'
- en: 👉 _Would love to hear your thoughts about this, let me know in the comments
    bello_w 👉
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
