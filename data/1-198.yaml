- en: Conclusion
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This experiment highlights the importance of profiling and empirical validation.
    Even well-intentioned optimisations like coalescing memory accesses can introduce
    new bottlenecks if not evaluated carefully. The first kernel, though simpler,
    was compute-bound and better matched the hardware characteristics.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这个实验强调了分析和经验验证的重要性。即使是有良好意图的优化，如合并内存访问，如果没有仔细评估，也可能引入新的瓶颈。尽管第一个内核更简单，但它计算受限，更符合硬件特性。
- en: In the next articles of this series, we’ll implement a softmax kernel, paying
    particular attention to integrating Triton with PyTorch’s `autograd` and profiling
    kernels using Nsight.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在本系列的下一篇文章中，我们将实现一个softmax核，特别关注将Triton与PyTorch的`autograd`集成以及使用Nsight进行内核分析。
- en: Until next time! 👋
