- en: Attractors in Neural Network Circuits: Beauty and Chaos
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 神经网络电路中的吸引子：美与混沌
- en: 原文：[https://towardsdatascience.com/attractors-in-neural-network-circuits-beauty-and-chaos/](https://towardsdatascience.com/attractors-in-neural-network-circuits-beauty-and-chaos/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/attractors-in-neural-network-circuits-beauty-and-chaos/](https://towardsdatascience.com/attractors-in-neural-network-circuits-beauty-and-chaos/)
- en: '![](../Images/1e98bc3a30bd8a2cb80e341768dc7927.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1e98bc3a30bd8a2cb80e341768dc7927.png)'
- en: The state space of the first two neuron activations over time follows an attractor.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间推移，前两个神经元激活的状态空间遵循一个吸引子。
- en: <mdspan datatext="el1742930501083" class="mdspan-comment">What</mdspan> is one
    thing in common between memories, oscillating chemical reactions and double pendulums?
    All these systems have a basin of attraction for possible states, like a magnet
    that draws the system towards certain trajectories. Complex systems with multiple
    inputs usually evolve over time, generating intricate and sometimes chaotic behaviors.
    Attractors represent the long-term behavioral pattern of dynamical systems — a
    pattern to which a system converges over time regardless of its initial conditions.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1742930501083" class="mdspan-comment">记忆、振荡的化学反应和双摆有什么共同之处？所有这些系统都有可能状态的吸引盆地，就像磁铁吸引系统向特定轨迹移动。具有多个输入的复杂系统通常随时间演变，产生复杂和有时是混沌的行为。吸引子代表了动态系统的长期行为模式——一个系统无论其初始条件如何，都会随时间收敛的模式。**
- en: 'Neural networks have become ubiquitous in our current artificial intelligence
    era, typically serving as powerful tools for representation extraction and pattern
    recognition. However, these systems can also be viewed through another fascinating
    lens: as dynamical systems that evolve and converge to a manifold of states over
    time. When implemented with feedback loops, even simple neural networks can produce
    strikingly beautiful attractors, ranging from limit cycles to chaotic structures.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们当前的人工智能时代，神经网络无处不在，通常作为强大的表示提取和模式识别工具。然而，这些系统也可以通过另一个迷人的视角来观察：作为随时间演变并收敛到状态流形的动态系统。当实现反馈回路时，即使是简单的神经网络也能产生引人注目的美丽吸引子，从极限环到混沌结构。
- en: '**Neural Networks as Dynamical Systems**'
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**神经网络作为动态系统**'
- en: While neural networks in general sense are most commonly known for embedding
    extraction tasks, they can also be viewed as dynamical systems. A dynamical system
    describes how points in a state space evolve over time according to a fixed set
    of rules or forces. In the context of neural networks, the state space consists
    of the activation patterns of neurons, and the evolution rule is determined by
    the network’s weights, biases, activation functions, and other tricks.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然从广义上讲，神经网络最常为人所知的是嵌入提取任务，但它们也可以被视为动态系统。动态系统描述了状态空间中的点如何根据一组固定的规则或力随时间演变。在神经网络的背景下，状态空间由神经元的激活模式组成，演变规则由网络的权重、偏差、激活函数和其他技巧决定。
- en: Traditional NNs are optimized via gradient descent to find its endstate of convergence.
    However, when we introduce feedback — connecting the output back to the input
    — the network becomes a recurrent system with a different kind of temporal dynamic.
    These dynamics can exhibit a wide range of behaviors, from simple convergence
    to a fixed point to complex chaotic patterns.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的神经网络通过梯度下降进行优化，以找到其收敛的最终状态。然而，当我们引入反馈——将输出连接回输入时——网络变成了一个具有不同时间动态的循环系统。这些动态可以表现出从简单收敛到固定点到复杂混沌模式的各种行为。
- en: '**Understanding Attractors**'
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**理解吸引子**'
- en: An attractor is a set of states toward which a system tends to evolve from a
    wide variety of starting conditions. Once a system reaches an attractor, it remains
    within that set of states unless perturbed by an external force. Attractors are
    indeed deeply involved in forming memories [1], oscillating chemical reactions
    [2], and other nonlinear dynamical systems.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 吸引子是一组状态，系统倾向于从各种起始条件演变到这些状态。一旦系统达到吸引子，除非受到外部力的干扰，否则它将保持在那一组状态内。吸引子确实在形成记忆[1]、振荡的化学反应[2]和其他非线性动态系统中起着重要作用。
- en: '**Types of Attractors**'
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**吸引子的类型**'
- en: 'Dynamical systems can exhibit several types of attractors, each with distinct
    characteristics:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 动态系统可以表现出几种类型的吸引子，每种都有独特的特征：
- en: '**Point** Attractors: the simplest form, where the system converges to a single
    fixed point regardless of starting conditions. This represents a stable equilibrium
    state.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**点吸引子**：最简单的形式，系统无论起始条件如何都会收敛到一个固定的单一点。这代表了一个稳定的平衡状态。'
- en: '**Limit Cycles**: the system settles into a repeating periodic orbit, forming
    a closed loop in phase space. This represents oscillatory behavior with a fixed
    period.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**极限环**：系统进入一个重复的周期性轨道，在相空间中形成一个闭合回路。这代表了具有固定周期的振荡行为。'
- en: '**Toroidal** (Quasiperiodic) Attractors: the system follows trajectories that
    wind around a donut-like structure in the phase space. Unlike limit cycles, these
    trajectories never really repeat but they remain bound to a specific region.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**环面**（准周期）吸引子：系统在相空间中沿着类似甜甜圈的轨迹运动。与极限环不同，这些轨迹实际上永远不会真正重复，但它们仍然绑定在特定区域内。'
- en: '**Strange** (Chaotic) Attractors: characterized by aperiodic behavior that
    never repeats exactly yet remains bounded within a finite region of phase space.
    These attractors exhibit sensitive dependence on initial conditions, where a tiny
    difference will introduce significant consequences over time — a hallmark of chaos.
    Think butterfly effect.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**奇异**（混沌）吸引子：具有非周期性行为，永远不会完全重复，但仍然保持在相空间有限区域内。这些吸引子表现出对初始条件的敏感依赖性，其中微小的差异会在长时间内产生重大后果——这是混沌的标志。想想蝴蝶效应。'
- en: '**Setup**'
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**设置**'
- en: In the following section, we will dive deeper into an example of a very simple
    NN architecture capable of said behavior, and demonstrate some pretty examples.
    We will touch on Lyapunov exponents, and provide implementation for those who
    wish to experiment with generating their own neural network attractor art (and
    not in the generative AI sense).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将深入探讨一个非常简单的神经网络架构的例子，该架构能够实现这种行为，并展示一些相当不错的例子。我们将涉及李雅普诺夫指数，并为希望实验生成自己的神经网络吸引子艺术（而非生成式
    AI 意义上的）的人提供实现。
- en: '![](../Images/bd9b2c4f819895c5a40624cf02bba039.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bd9b2c4f819895c5a40624cf02bba039.png)'
- en: Figure 1\. NN schematic and components that we will use for the attractor generation.
    [all figures are created by the author, unless stated otherwise]
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1\. 我们将用于吸引子生成的神经网络示意图和组件。[所有图均由作者创建，除非另有说明]
- en: 'We will use a grossly simplified one-layer NN with a feedback loop. The architecture
    consists of:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用一个带有反馈环的极度简化的单层神经网络。其架构包括：
- en: '**Input Layer**:'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**输入层**：'
- en: Array of size D (here 16-32) inputs
  id: totrans-23
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大小为 D 的数组（这里 16-32）个输入
- en: We will unconventionally label them as y₁, y₂, y₃, …, y[D] to highlight that
    these are mapped from the outputs
  id: totrans-24
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们将非传统地标记它们为 y₁, y₂, y₃, …, y[D]，以突出这些是从输出映射过来的
- en: Acts as a shift register that stores previous outputs
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作为移位寄存器存储先前的输出
- en: '**Hidden Layer**:'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**隐藏层**：'
- en: Contains N neurons (here fewer than D, ~4-8)
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含 N 个神经元（这里少于 D，大约 4-8）
- en: We will label them x₁, x₂, …, x[N]
  id: totrans-28
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们将标记它们为 x₁, x₂, …, x[N]
- en: '*tanh*() activation is applied for squashing'
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*tanh*() 激活函数用于压缩'
- en: '**Output Layer**'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**输出层**'
- en: Single output neuron (y₀)
  id: totrans-31
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单个输出神经元（y₀）
- en: Combines the hidden layer outputs with biases — typically, we use biases to
    offset outputs by adding them; here, we used them for scaling, so they are factually
    an array of weights
  id: totrans-32
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将隐藏层输出与偏置相结合——通常，我们使用偏置通过添加来偏移输出；这里，我们使用它们进行缩放，因此实际上它们是一个权重数组
- en: '**Connections**:'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**连接**：'
- en: 'Input to Hidden: Weight matrix w[i,j] (randomly initialized between -1 and
    1)'
  id: totrans-34
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入到隐藏层：权重矩阵 w[i,j]（在 -1 和 1 之间随机初始化）
- en: 'Hidden to Output: Bias weights b[i] (randomly initialized between 0 and s)'
  id: totrans-35
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐藏层到输出：偏置权重 b[i]（在 0 和 s 之间随机初始化）
- en: '**Feedback Loop**:'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**反馈环**：'
- en: The output y₀ is fed back to the input layer, creating a dynamic map
  id: totrans-37
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出 y₀ 反馈到输入层，创建一个动态映射
- en: Acts as a shift register (y₁ = previous y₀, y₂ = previous y₁, etc.)
  id: totrans-38
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作为移位寄存器（y₁ = 前一个 y₀，y₂ = 前一个 y₁，等等）
- en: This feedback is what creates the dynamical system behavior
  id: totrans-39
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这种反馈是创建动态系统行为的原因
- en: '**Key Formulas**:'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**关键公式**：'
- en: 'Hidden layer: u[i] = Σ(w[i,j] * y[j]); x[i] = *tanh*(u[i])'
  id: totrans-41
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐藏层：u[i] = Σ(w[i,j] * y[j]); x[i] = *tanh*(u[i])
- en: 'Output: y₀ = Σ(b[i] * x[i])'
  id: totrans-42
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出：y₀ = Σ(b[i] * x[i])
- en: 'The critical aspects that make this network generate attractors:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 使这个网络能够生成吸引子的关键方面：
- en: The **feedback loop** turns a simple feedforward network into a dynamical system
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反馈环**将一个简单的前馈网络转换成一个动态系统'
- en: The **nonlinear activation function** (*tanh*) enables complex behaviors
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非线性激活函数** (*tanh*) 能够产生复杂行为'
- en: The **random weight initialization** (controlled by the random seed) creates
    different attractor patterns
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**随机权重初始化**（由随机种子控制）创建了不同的吸引子模式'
- en: The **scaling factor s** affects the dynamics of the system and can push it
    into chaotic regimes
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缩放因子s**影响系统的动力学，并可能将其推入混沌状态。'
- en: In order to investigate how prone the system is to chaos, we will calculate
    the Lyapunov exponents for different sets of parameters. Lyapunov exponent is
    a measure of the **instability of a dynamical system**…
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了研究系统对混沌的敏感性，我们将计算不同参数集的Lyapunov指数。Lyapunov指数是衡量**动力系统不稳定性**的度量…
- en: \[\delta Z(t)| \approx e^{\lambda t} |\delta (Z(0))|\]
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: \[\delta Z(t)| \approx e^{\lambda t} |\delta (Z(0))|\]
- en: \[\lambda = n_t \sum_{k=0}^{n_t-1} ln \frac{|\Delta y_{k+1}|}{|\Delta y_k|}\]
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: \[\lambda = n_t \sum_{k=0}^{n_t-1} ln \frac{|\Delta y_{k+1}|}{|\Delta y_k|}\]
- en: …where n[t]​ is a number of time steps, Δy[k] ​is a distance between the states
    y(x[i]) and y(x[i]+ϵ) at a point in time; ΔZ(0) represents an initial infinitesimal
    (very small) separation between two nearby starting points, and ΔZ(t) is the separation
    after time t. For stable systems converging to a fixed point or a stable attractor
    this parameter is less than 0, for unstable (diverging, and, therefore, chaotic
    systems) it is greater than 0.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: …其中n[t]是时间步数，Δy[k]是状态y(x[i])和y(x[i]+ϵ)在某一时间点的距离；ΔZ(0)代表两个相邻起始点之间的初始无限小（非常小）的分离，而ΔZ(t)是时间t后的分离。对于稳定系统收敛到固定点或稳定吸引子，此参数小于0，对于不稳定（发散的，因此是混沌系统）它大于0。
- en: Let’s code it up! We will only use NumPy and default Python libraries for the
    implementation.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们编写代码！我们将只使用NumPy和默认的Python库来实现。
- en: '[PRE0]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: We initialize the `NeuralAttractor` class with some basic parameters — number
    of neurons in the hidden layer, number of elements in the input array, scaling
    factor for the output, and random seed. We proceed to initialize the weights and
    biases randomly, and x and y states. These weights and biases will not be optimized
    — they will stay put, no gradient descent this time.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用一些基本参数初始化`NeuralAttractor`类——隐藏层中的神经元数量、输入数组中的元素数量、输出缩放因子和随机种子。然后我们继续随机初始化权重和偏差以及x和y状态。这些权重和偏差将不会被优化——它们将保持原位，这次没有梯度下降。
- en: '[PRE1]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Next, we will define the iteration logic. We start every iteration with the
    feedback loop — we implement the shift register circuit by shifting all y elements
    to the right, and compute the most recent y[0] output to place it into the first
    element of the input.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将定义迭代逻辑。我们每次迭代都从反馈循环开始——我们通过将所有y元素向右移动来实现移位寄存器电路，并计算最新的y[0]输出，将其放置在输入的第一个元素中。
- en: '[PRE2]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Now, we define the function that will iterate our network map over the tmax
    number of time steps and output the states of the first two hidden neurons for
    visualization. We can use any hidden neurons, and we could even visualize 3D state
    space, but we will limit our imagination to two dimensions.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们定义一个函数，该函数将在tmax个时间步长内迭代我们的网络图，并输出前两个隐藏神经元的状态以进行可视化。我们可以使用任何隐藏神经元，甚至可以可视化三维状态空间，但我们将限制我们的想象力在二维。
- en: This is the gist of the system. Now, we will just define some line and segment
    magic for pretty visualizations.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是系统的核心。现在，我们只需定义一些线条和段落的魔法，以实现漂亮的可视化。
- en: '[PRE3]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The functions written above will take the generated state space trajectories
    and visualize them. Because the state space may be densely filled, we will **skip
    every 8th, 16th or 32th time point to sparsify** our vectors. We also don’t want
    to plot these in one solid color, therefore we are **coding the color as a periodic
    function** (*np.sin(1.6 * y_plot + 0.4 * x_plot)*) based on the x and y coordinates
    of the figure axis. The multipliers for the coordinates are arbitrary and happen
    to generate nice smooth color maps, to your liking.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的函数将接受生成的状态空间轨迹并将其可视化。因为状态空间可能密集填充，我们将**跳过每8个、16个或32个时间点以稀疏化**我们的向量。我们也不想用一种单一的颜色来绘制这些点，因此我们根据图轴的x和y坐标**将颜色编码为周期函数**（*np.sin(1.6
    * y_plot + 0.4 * x_plot)）。坐标的乘数是任意的，并且恰好生成令人愉悦的平滑颜色图，符合你的喜好。
- en: '[PRE4]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'After defining the NN and iteration parameters, we can generate the state space
    trajectories. If we spend enough time poking around with parameters, we will find
    something cool (I promise!). If manual parameter grid search labor is not exactly
    our thing, we could add a function that checks what **proportion of the state
    space is covered over time**. If after t = 100,000 iterations (except the initial
    1,000 “warm up” time steps) we only touched a narrow range of values of the state
    space, we are likely stuck in a point. Once we found an attractor that is not
    so shy to take up more state space, we can plot it using default plotting params:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义了神经网络和迭代参数之后，我们可以生成状态空间轨迹。如果我们花足够的时间去调整参数，我们会发现一些有趣的东西（我保证！）。如果我们不喜欢手动参数网格搜索的工作，我们可以添加一个函数来检查**随时间覆盖状态空间的比例**。如果在t
    = 100,000次迭代后（除了最初的1,000个“预热”时间步），我们只接触了状态空间的一小部分值，我们可能卡在一个点上。一旦我们找到一个不那么害羞地占据更多状态空间的吸引子，我们可以使用默认的绘图参数来绘制它：
- en: '![](../Images/795049ad415b8bb479a3500961ee2f35.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/795049ad415b8bb479a3500961ee2f35.png)'
- en: Figure 2\. Limit cycle attractor.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. 极限环吸引子。
- en: 'One of the stable types of attractors is the **limit cycle attractor** (parameters:
    N = 4, D = 32, s = 0.22, seed = 174658140). It looks like a single, closed loop
    trajectory in phase space. The orbit follows a regular, periodic path over time
    series. I will not include the code for Lyapunov exponent calculation here to
    focus on the visual aspect of the generated attractors more, but one can find
    it under this [link](https://github.com/anyakors/neural_attractors), if interested.
    The Lyapunov exponent for this attractor (λ=−3.65) is negative, indicating **stability**:
    mathematically, this exponent will lead to the state of the system decaying, or
    converging, to this basin of attraction over time.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 吸引子的稳定类型之一是**极限环吸引子**（参数：N = 4, D = 32, s = 0.22, seed = 174658140）。它在相空间中看起来像一条单一的、闭合的轨迹。轨道随时间序列遵循规则、周期性的路径。我不会在这里包含李雅普诺夫指数计算的代码，以便更多地关注生成的吸引子的视觉方面，但如果感兴趣，可以在以下[链接](https://github.com/anyakors/neural_attractors)找到。这个吸引子的李雅普诺夫指数（λ=−3.65）为负，表明**稳定性**：从数学上讲，这个指数将导致系统状态随时间衰减或收敛到这个吸引子盆地。
- en: If we keep increasing the scaling factor, we are more likely to tune up the
    values in the circuit, and perhaps more likely to find something interesting.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们继续增加缩放因子，我们更有可能调整电路中的值，也许更有可能找到一些有趣的东西。
- en: '![](../Images/3230b770e1a7477bf01a5d02fa5a49cf.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3230b770e1a7477bf01a5d02fa5a49cf.png)'
- en: Figure 3\. Toroidal attractor.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图3. 托里德吸引子。
- en: 'Here is the **toroidal (quasiperiodic) attractor** (parameters: N = 4, D =
    32, s = 0.55, seed = 3160697950). It still has an ordered structure of sheets
    that wrap around in organized, quasiperiodic patterns. The Lyapunov exponent for
    this attractor has a higher value, but is still negative (λ=−0.20).'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是**托里德（准周期）吸引子**（参数：N = 4, D = 32, s = 0.55, seed = 3160697950）。它仍然具有有序的片状结构，这些结构以有组织的准周期模式缠绕。这个吸引子的李雅普诺夫指数值更高，但仍然是负值（λ=−0.20）。
- en: 'As we further increase the scaling factor s, the system becomes more prone
    to chaos. The **strange (chaotic) attractor** emerges with the following parameters:
    N = 4, D = 16, s = 1.4, seed = 174658140). It is characterized by an erratic,
    unpredictable pattern of trajectories that never repeat. The Lyapunov exponent
    for this attractor is positive (λ=0.32), indicating instability (divergence from
    an initially very close state over time) and chaotic behavior. This is the “butterfly
    effect” attractor.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们进一步增加缩放因子s时，系统更容易出现混沌。以下参数下出现了**奇怪（混沌）吸引子**：N = 4, D = 16, s = 1.4, seed
    = 174658140。它以轨迹的不可预测、无重复的模式为特征。这个吸引子的李雅普诺夫指数为正（λ=0.32），表明不稳定（随着时间的推移，从一个最初非常接近的状态发散）和混沌行为。这就是“蝴蝶效应”吸引子。
- en: '![](../Images/24503ecf8b07cbfb4e6dd5c522cd5a77.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/24503ecf8b07cbfb4e6dd5c522cd5a77.png)'
- en: Figure 4\. Strange attractor.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图4. 奇怪吸引子。
- en: 'As we further increase the scaling factor s, the system becomes more prone
    to chaos. The strange (chaotic) attractor emerges with the following parameters:
    N = 4, D = 16, s = 1.4, seed = 174658140\. It is characterized by an erratic,
    unpredictable pattern of trajectories that never repeat. The Lyapunov exponent
    for this attractor is positive (λ=0.32), indicating instability (divergence from
    an initially very close state over time) and chaotic behavior. This is the “butterfly
    effect” attractor.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们进一步增加比例因子 s，系统变得更加容易陷入混沌。具有以下参数的奇异（混沌）吸引子出现：N = 4, D = 16, s = 1.4, seed
    = 174658140。它以轨迹的异常、不可预测的模式为特征，这些模式永远不会重复。该吸引子的李雅普诺夫指数为正（λ=0.32），表明不稳定（随着时间的推移，从一个最初非常接近的状态发散）和混沌行为。这就是“蝴蝶效应”吸引子。
- en: Just another confirmation that aesthetics can be very mathematical, and vice
    versa. The most visually compelling attractors often exist at the edge of chaos
    — think about it for a second! These structures are complex enough to exhibit
    intricate behavior, yet ordered enough to maintain coherence. This resonates with
    observations from various art forms, where balance between order and unpredictability
    often creates the most engaging experiences.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这又是一个证明美学可以非常数学化，反之亦然的例子。最视觉上吸引人的吸引子通常存在于混沌的边缘——想想看！这些结构足够复杂，可以表现出复杂的行为，同时又有足够的秩序来保持连贯性。这与各种艺术形式的观察结果相呼应，在这些艺术形式中，秩序与不可预测性之间的平衡往往创造出最吸引人的体验。
- en: An interactive widget to generate and visualize these attractors is available
    [here](https://www.codehelix.ai/blog/attractors). The source code is [available](https://github.com/anyakors/neural_attractors),
    too, and invites further exploration. The ideas behind this project were largely
    inspired by the work of J.C. Sprott [3].
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 一个交互式小部件，可用于生成和可视化这些吸引子，[在此处](https://www.codehelix.ai/blog/attractors)可用。源代码[也在此处](https://github.com/anyakors/neural_attractors)可用，并邀请进一步探索。这个项目的想法在很大程度上受到了
    J.C. Sprott [3] 的工作的启发。
- en: References
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 参考文献
