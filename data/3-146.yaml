  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '[1] B. Poucet 和 E. Save, 《记忆中的吸引子》（2005年），科学 [DOI:10.1126/science.1112555](https://doi.org/10.1126/science.1112555).'
- en: '[2] Y.J.F. Kpomahou et al., Chaotic Behaviors and Coexisting Attractors in
    a New Nonlinear Dissipative Parametric Chemical Oscillator (2022), Complexity
    [DOI:10.1155/2022/9350516](https://doi.org/10.1155/2022/9350516).'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '[2] Y.J.F. Kpomahou 等人，一篇关于新型非线性耗散参数化学振荡器中的混沌行为和共存吸引子的论文（2022年），复杂性 [DOI:10.1155/2022/9350516](https://doi.org/10.1155/2022/9350516).'
- en: '[3] J.C. Sprott, Artificial Neural Net Attractors (1998), Computers & Graphics
    [DOI:10.1016/S0097-8493(97)00089-7](http://doi.org/10.1016/S0097-8493(97)00089-7).'
  id: totrans-80
