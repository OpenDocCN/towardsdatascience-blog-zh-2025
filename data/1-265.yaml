- en: '* * *'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**4\. Summary**'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 总结**'
- en: Congratulations! We’ve successfully built an anomaly detection solution for
    time-series data that worked entirely through visualization and prompting.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜！我们已经成功构建了一个完全通过可视化和提示工作的时间序列数据异常检测解决方案。
- en: By feeding daily order plots into the o3 reasoning model and constraining its
    output to a JSON schema, the LLM managed to identify three different anomaly types
    with accurate localization. All of this was achieved without training any ML model.
    Impressive!
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将每日订单图输入到o3推理模型中，并限制其输出为JSON模式，LLM成功识别了三种不同的异常类型，并实现了准确的定位。所有这些都是在没有训练任何机器学习模型的情况下实现的。令人印象深刻！
- en: 'If we take a step back, we can see that the solution we built illustrates the
    broader pattern of combining three capabilities:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们退一步看，我们可以看到我们构建的解决方案展示了结合三种能力的更广泛模式：
- en: '**See**: multimodal input to let the model consume figures directly.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**查看**：多模态输入，让模型直接消费图形。'
- en: '**Think**: step-by-step reasoning capability to tackle complex problems.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**思考**：逐步推理能力，以解决复杂问题。'
- en: '**Integrate**: structured output that downstream systems can easily consume
    (e.g., generating visualizations).'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**整合**：结构化的输出，下游系统可以轻松消费（例如，生成可视化）。'
- en: The combination of multimodal input + reasoning + structured output really creates
    a versatile foundation for useful LLM applications.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态输入+推理+结构化输出的结合，为有用的LLM应用创造了一个灵活的基础。
- en: You now have the building blocks ready. What do you want to build next?
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你已经准备好了构建块。你接下来想构建什么？
