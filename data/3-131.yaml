- en: The Art of Hybrid Architectures
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 混合架构的艺术
- en: 原文：[https://towardsdatascience.com/the-art-of-hybrid-architectures/](https://towardsdatascience.com/the-art-of-hybrid-architectures/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-art-of-hybrid-architectures/](https://towardsdatascience.com/the-art-of-hybrid-architectures/)
- en: In my [previous article](https://towardsdatascience.com/from-fuzzy-to-precise-how-a-morphological-feature-extractor-enhances-ais-recognition-capabilities-2/),
    I discussed how morphological feature extractors mimic the way biological experts
    visually assess images.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在我的[上一篇文章](https://towardsdatascience.com/from-fuzzy-to-precise-how-a-morphological-feature-extractor-enhances-ais-recognition-capabilities-2/)中，我讨论了形态学特征提取器如何模仿生物专家视觉评估图像的方式。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1743219248603" class="mdspan-comment">This</mdspan> time,
    I want to go a step further and explore a new question:'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1743219248603" class="mdspan-comment">这次</mdspan>，我想更进一步，探索一个新的问题：
- en: Can different architectures complement each other to build an AI that “sees”
    like an expert?
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不同的架构能否相互补充，构建一个像专家一样“看到”的AI？
- en: '**Introduction: Rethinking Model Architecture Design**'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**引言：重新思考模型架构设计**'
- en: 'While building a high accuracy visual recognition model, I ran into a key challenge:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建高精度视觉识别模型的过程中，我遇到了一个关键挑战：
- en: '**How do we get AI to not just “see” an image, but actually understand the
    features that matter?**'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们如何让AI不仅“看到”图像，而且真正理解重要的特征？**'
- en: Traditional **CNNs** excel at capturing local details like fur texture or ear
    shape, but they often miss the bigger picture. **Transformers**, on the other
    hand, are great at modeling global relationships, how different regions of an
    image interact, but they can easily overlook fine-grained cues.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 传统**CNNs**擅长捕捉局部细节，如毛发纹理或耳朵形状，但它们往往忽略了更大的图景。另一方面，**Transformers**在建模全局关系方面很出色，如何不同区域相互交互，但它们很容易忽略细微的线索。
- en: '**This insight led me to explore combining the strengths of both architectures
    to create a model that not only captures fine details but also comprehends the
    bigger picture.**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**这一洞察引导我探索结合两种架构的优势，以创建一个不仅能够捕捉细微细节，而且能够理解整体图景的模型。**'
- en: 'While developing **[PawMatchAI](https://huggingface.co/spaces/DawnC/PawMatchAI)**,
    a 124-breed dog classification system, I went through three major architectural
    phases:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发**[PawMatchAI](https://huggingface.co/spaces/DawnC/PawMatchAI)**，一个124种犬类分类系统时，我经历了三个主要架构阶段：
- en: '**1\. Early Stage: EfficientNetV2-M + Multi-Head Attention**'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 早期阶段：EfficientNetV2-M + 多头注意力**'
- en: I started with EfficientNetV2-M and added a multi-head attention module.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我从EfficientNetV2-M开始，并添加了一个多头注意力模块。
- en: I experimented with 4, 8, and 16 heads—eventually settling on 8, which gave
    the best results.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试过4、8和16个头部——最终决定使用8个头部，这给出了最佳结果。
- en: This setup reached an F1 score of **78%**, but it felt more like a technical
    combination than a cohesive design.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设置达到了F1分数的**78%**，但它更像是一个技术组合，而不是一个统一的设计。
- en: '**2\. Refinement: Focal Loss + Advanced Data Augmentation**'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 精炼：焦点损失 + 高级数据增强**'
- en: After closely analyzing the dataset, I noticed a class imbalance, some breeds
    appeared far more frequently than others, skewing the model’s predictions.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在仔细分析数据集后，我发现了一个类别不平衡的问题，一些品种出现的频率远高于其他品种，这扭曲了模型的预测。
- en: To address this, I introduced **Focal Loss**, along with **RandAug** and **mixup**,
    to make the data distribution more balanced and diverse.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我引入了**焦点损失**，以及**RandAug**和**mixup**，以使数据分布更加平衡和多样化。
- en: This pushed the F1 score up to **82.3%**.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这将F1分数提升至**82.3%**。
- en: '**3\. Breakthrough: Switching to ConvNextV2-Base + Training Optimization**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 突破：切换到ConvNextV2-Base + 训练优化**'
- en: Next, I replaced the backbone with **ConvNextV2-Base**, and optimized the training
    using **OneCycleLR** and a **progressive unfreezing** strategy.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我用**ConvNextV2-Base**替换了骨干网络，并使用**OneCycleLR**和**渐进式解冻**策略优化了训练。
- en: The F1 score climbed to **87.89%**.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: F1分数攀升至**87.89%**。
- en: But during real-world testing, the model still struggled with visually similar
    breeds, indicating room for improvement in generalization.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 但在实际测试中，模型仍然在视觉上相似的品种上挣扎，这表明在泛化方面还有改进的空间。
- en: '**4\. Final Step: Building a Truly Hybrid Architecture**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 最终步骤：构建真正的混合架构**'
- en: 'After reviewing the first three phases, I realized the core issue: stacking
    technologies isn’t the same as getting them to work together.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在回顾前三个阶段后，我意识到核心问题：堆叠技术并不等同于让它们协同工作。
- en: What I needed was true collaboration between the **CNN**, the **Transformer**,
    and the **morphological feature extractor**, each playing to its strengths. So
    I restructured the entire pipeline.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要的是**CNN**、**Transformer**和**形态特征提取器**之间的真正协作，每个都发挥其优势。因此，我重构了整个流程。
- en: '**ConvNextV2** was in charge of extracting detailed local features.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**ConvNextV2** 负责提取详细的局部特征。'
- en: The **morphological module** acted like a domain expert, highlighting features
    critical for breed identification.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**形态模块**像领域专家一样行动，突出了对品种识别至关重要的特征。'
- en: Finally, the **multi-head attention** brought it all together by modeling global
    relationships.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，通过建模全局关系，**多头注意力**将所有内容整合在一起。
- en: This time, they weren’t just independent modules, they were a team.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，它们不再是独立的模块，而是一个团队。
- en: CNNs identified the details, the morphology module amplified the meaningful
    ones, and the attention mechanism tied everything into a coherent global view.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: CNNs识别细节，形态模块放大了有意义的特征，而注意力机制将所有内容整合成一个连贯的全局视图。
- en: '**Key Result:** The F1 score rose to **88.70%**, but more importantly, this
    gain came from the model learning to **understand morphology**, not just memorize
    textures or colors.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**关键结果**：F1分数上升到**88.70**%，但更重要的是，这种提升来自于模型学习**理解形态**，而不仅仅是记住纹理或颜色。'
- en: It started recognizing subtle structural features—just like a real expert would—making
    better generalizations across visually similar breeds.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 它开始识别微妙的结构特征——就像真正的专家一样——在视觉上相似的品种之间做出更好的概括。
- en: 💡 If you’re interested, I’ve written more about morphological feature extractors
    [here](https://towardsdatascience.com/from-fuzzy-to-precise-how-a-morphological-feature-extractor-enhances-ais-recognition-capabilities-2/).
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 如果你对形态特征提取器感兴趣，我在这里写了更多关于它们的内容 [here](https://towardsdatascience.com/from-fuzzy-to-precise-how-a-morphological-feature-extractor-enhances-ais-recognition-capabilities-2/)。
- en: ''
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: These extractors mimic how biological experts assess shape and structure, enhancing
    critical visual cues like ear shape and body proportions.
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这些提取器模仿生物专家评估形状和结构的方式，增强了如耳朵形状和身体比例等关键视觉线索。
- en: ''
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**They’re a vital part of this hybrid design, filling the gaps traditional
    models tend to overlook.**'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**它们是这个混合设计的重要组成部分，填补了传统模型往往忽视的空白。**'
- en: 'In this article, I’ll walk through:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将介绍：
- en: The strengths and limitations of CNNs vs. Transformers—and how they can complement
    each other
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CNNs与Transformers的优缺点对比——以及它们如何相互补充
- en: Why I ultimately chose ConvNextV2 over EfficientNetV2
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么我最终选择了ConvNextV2而不是EfficientNetV2
- en: The technical details of multi-head attention and how I decided the number of
    heads
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多头注意力的技术细节以及我决定头数数量的决定
- en: How all these elements came together in a unified hybrid architecture
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有这些元素如何在统一的混合架构中结合在一起
- en: And finally, how heatmaps reveal that the AI is learning to “see” key features,
    just like a human expert
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，如何通过热图揭示AI正在学习像人类专家一样“看到”关键特征
- en: '**1\. The Strengths and Limitations of CNNs and Transformers**'
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**1. CNNs和Transformers的优缺点**'
- en: In the previous section, I discussed how CNNs and Transformers can effectively
    complement each other. Now, let’s take a closer look at what sets each architecture
    apart, their individual strengths, limitations, and how their differences make
    them work so well together.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我讨论了CNNs和Transformers如何有效地相互补充。现在，让我们更仔细地看看每个架构的特点，它们的个别优势和局限性，以及它们的差异如何使它们如此协同工作。
- en: '**1.1 The Strength of CNNs: Great with Details, Limited in Scope**'
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**1.1 CNN的优势：擅长细节，但范围有限**'
- en: CNNs are like meticulous artists, they can draw fine lines beautifully, but
    often miss the bigger composition.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: CNNs就像细致的艺术家，他们可以画出美丽的细线，但往往忽略了更大的构图。
- en: '**✅ Strong at Local Feature Extraction**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**✅ 擅长局部特征提取**'
- en: CNNs are excellent at capturing **edges, textures, and shapes**—ideal for distinguishing
    fine-grained features like **ear shapes, nose proportions, and fur patterns**
    across dog breeds.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: CNNs擅长捕捉**边缘、纹理和形状**——非常适合区分犬种之间的细粒度特征，如**耳朵形状、鼻子比例和毛发图案**。
- en: '**✅ Computational Efficiency**'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**✅ 计算效率**'
- en: With **parameter sharing**, CNNs process high-resolution images more efficiently,
    making them well-suited for large-scale visual tasks.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 通过**参数共享**，CNNs更有效地处理高分辨率图像，使它们非常适合大规模视觉任务。
- en: '**✅ Translation Invariance**'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**✅ 平移不变性**'
- en: '**Even when a dog’s pose varies, CNNs can still reliably identify its breed.**'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**即使狗的姿势变化，CNNs仍然可以可靠地识别其品种**。'
- en: 'That said, CNNs have **two key limitations**:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，CNNs有两个关键的限制：
- en: '**⚠️ Limited Receptive Field:**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**⚠️ 感受野有限：**'
- en: CNNs expand their field of view layer by layer, but early-stage neurons only
    “see” small patches of pixels. As a result, **it’s difficult for them to connect
    features that are spatially far apart.**
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: CNN通过逐层扩展视野，但早期神经元只能“看到”小片像素。因此，**它们难以连接空间上相隔较远的特征。**
- en: '🔹 *For instance: When identifying a German Shepherd, the CNN might spot upright
    ears and a sloped back separately, but struggle to associate them as defining
    characteristics of the breed.*'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 🔹 *例如：当识别德国牧羊犬时，CNN可能会分别发现竖耳和斜背，但难以将它们关联为该品种的标志性特征。
- en: '**⚠️ Lack of Global Feature Integration:**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**⚠️ 缺乏全局特征集成：**'
- en: CNNs excel at local stacking of features, but they’re **less adept at combining
    information from distant regions**.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: CNN擅长局部特征堆叠，但它们在**结合来自遥远区域的信息方面不太擅长**。
- en: 🔹 *Example:* *To distinguish a Siberian Husky from an Alaskan Malamute, it’s
    not just about one feature, it’s about the **combination** of ear shape, facial
    proportions, tail posture, and body size. CNNs often struggle to consider these
    elements holistically.*
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 🔹 *示例：* *要区分西伯利亚雪橇犬和阿拉斯加玛拉穆特，不仅仅是关于一个特征，而是关于耳朵形状、面部比例、尾巴姿势和身体大小的**组合**。CNN往往难以全面考虑这些元素。
- en: '**1.2 The Strength of Transformers: Global Awareness, But Less Precise**'
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**1.2 变换器的优势：全局意识，但不够精确**'
- en: Transformers are like master strategists with a bird’s-eye view, they quickly
    spot patterns, but aren’t great at filling in the fine details.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器就像拥有鸟瞰视角的顶级策略家，他们能快速发现模式，但不太擅长填充细节。
- en: '**✅ Capturing Global Context**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**✅ 捕捉全局上下文：**'
- en: Thanks to their **self-attention mechanism**, Transformers can directly link
    any two features in an image, no matter how far apart they are.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了它们的**自注意力机制**，变换器可以直接将图像中的任何两个特征联系起来，无论它们相隔多远。
- en: '**✅ Dynamic Attention Weighting**'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**✅ 动态注意力权重：**'
- en: Unlike CNNs’ fixed kernels, Transformers dynamically allocate focus based on
    context.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 与CNN的固定核不同，变换器根据上下文动态分配焦点。
- en: '🔹 *Example: When identifying a Poodle, the model may prioritize fur texture;
    when it sees a Bulldog, it might focus more on facial structure.*'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 🔹 *示例：当识别贵宾犬时，模型可能会优先考虑毛发的纹理；当它看到斗牛犬时，它可能会更专注于面部结构。*
- en: 'But Transformers also have **two major drawbacks**:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 但变换器也有**两个主要缺点**：
- en: '**⚠️ High Computational Cost:**'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**⚠️ 计算成本高：**'
- en: Self-attention has a time complexity of **O(n²)**. As image resolution increases,
    so does the cost—making training more intensive.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 自注意力具有**O(n²**)的时间复杂度。随着图像分辨率的增加，成本也随之增加，使得训练更加密集。
- en: '**⚠️ Weak at Capturing Fine Details:**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**⚠️ 捕捉细节能力较弱：**'
- en: Transformers lack CNNs’ “built-in intuition” that nearby pixels are usually
    related.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器缺乏CNN的“内置直觉”，即附近的像素通常相关。
- en: '🔹 *Example: On their own, Transformers might miss subtle differences in fur
    texture or eye shape, details that are crucial for distinguishing visually similar
    breeds.*'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 🔹 *示例：单独使用变换器可能会错过毛发纹理或眼睛形状的细微差别，这些细节对于区分视觉上相似的品种至关重要。*
- en: '**1.3 Why a Hybrid Architecture Is Necessary**'
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**1.3 为什么混合架构是必要的**'
- en: 'Let’s take a real world case:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个现实世界的案例：
- en: '**How do you distinguish a Golden Retriever from a Labrador Retriever?**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何区分金毛寻回犬和拉布拉多寻回犬？**'
- en: 'They’re both beloved family dogs with similar size and temperament. But experts
    can easily tell them apart by observing:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 它们都是体型和性情相似的受欢迎的家庭犬。但专家可以通过观察轻松地将它们区分开来：
- en: '**Golden Retrievers** have long, dense coats ranging from golden to dark gold,
    more elongated heads, and distinct feathering around ears, legs, and tails.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金毛寻回犬**有从金色到深金色的长而密集的外套，更细长的头部，以及耳朵、腿部和尾巴周围的明显羽毛。'
- en: '**Labradors**, on the other hand, have short, double-layered coats, more compact
    bodies, rounder heads, and thick otter-like tails. Their coats come in yellow,
    chocolate, or black.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**拉布拉多**的另一面，有短而双层的外套，更紧凑的身体，圆润的头部和厚实的海狸状尾巴。它们的毛色有黄色、巧克力色或黑色。'
- en: Interestingly, **for humans**, this distinction is relatively easy, “long hair
    vs. short hair” might be all you need.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，**对于人类来说**，这种区分相对容易，“长毛与短毛”可能就是你所需要的。
- en: But **for AI**, relying solely on coat length (a texture-based feature) is often
    unreliable. Lighting, image quality, or even a trimmed Golden Retriever can confuse
    the model.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 但对于**AI**来说，仅依靠毛长（基于纹理的特征）通常是不可靠的。光线、图像质量，甚至修剪过的金毛寻回犬都可能使模型困惑。
- en: When analyzing this challenge, we can see…
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 当分析这个挑战时，我们可以看到…
- en: '**The problem with using only CNNs:**'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**仅使用CNN的问题：**'
- en: While CNNs can detect individual features like “coat length” or “tail shape,”
    they struggle with **combinations** like “head shape + fur type + body structure.”
    This issue worsens when the dog is in a different pose.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然CNN可以检测单个特征，如“毛长”或“尾巴形状”，但它们在“头部形状 + 毛发类型 + 身体结构”等**组合**方面存在困难。当狗处于不同的姿势时，这个问题会变得更糟。
- en: '**The problem with using only Transformers:**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**仅使用Transformer的问题：**'
- en: Transformers can associate features across the image, but they’re not great
    at picking up **fine-grained cues** like slight variations in fur texture or subtle
    head contours. They also require large datasets to achieve expert-level performance.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Transformer可以关联图像中的特征，但它们在捕捉**细粒度线索**（如毛发纹理的细微变化或头部轮廓的微妙变化）方面并不出色。它们还需要大量数据集才能达到专家级的表现。
- en: Plus, their **computational cost increases sharply with image resolution**,
    slowing down training.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，它们的**计算成本随着图像分辨率的增加而急剧上升**，导致训练速度减慢。
- en: 'These limitations highlight a core truth:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这些限制突显了一个核心真理：
- en: '**Fine-grained visual recognition requires both local detail extraction and
    global relationship modeling.**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**细粒度视觉识别需要局部细节提取和全局关系建模。**'
- en: A truly expert system like a veterinarian or show judge must inspect features
    up close while understanding the overall structure. That’s exactly where hybrid
    architectures shine.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 就像兽医或展示裁判一样，一个真正专家的系统必须近距离检查特征，同时理解整体结构。这正是混合架构大放异彩的地方。
- en: '**1.4 The Advantages of a Hybrid Architecture**'
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**1.4 混合架构的优势**'
- en: 'This is why we need **hybrid systems** architectures that combine CNNs’ **precision
    in local features** with Transformers’ **ability to model global relationships**:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么我们需要结合CNN的**局部特征精度**和Transformer的**建模全局关系能力**的**混合系统架构**：
- en: '**CNNs:** Extract local, fine-grained features like fur texture and ear shape,
    crucial for spotting subtle differences.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CNNs：** 提取局部、细粒度特征，如毛发纹理和耳朵形状，这对于发现细微差别至关重要。'
- en: '**Transformers:** Capture long-range dependencies (e.g., head shape + body
    size + eye color), allowing the model to reason holistically.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Transformers：** 捕捉长距离依赖关系（例如，头部形状 + 身体大小 + 眼睛颜色），使模型能够进行整体推理。'
- en: '**Morphological Feature Extractors:** Mimic human expert judgment by emphasizing
    diagnostic features, bridging the gap left by data-driven models.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**形态学特征提取器：** 通过强调诊断特征来模仿人类专家的判断，弥合数据驱动模型留下的差距。'
- en: Such an architecture not only boosts evaluation metrics like the **F1 Score**,
    but more importantly, it enables the AI to **genuinely understand the subtle distinctions**
    between breeds, getting closer to the way human experts think. The model learns
    to weigh multiple features together, instead of over-relying on one or two unstable
    cues.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这种架构不仅提高了像**F1分数**这样的评估指标，更重要的是，它使AI能够**真正理解品种之间的细微差别**，更接近人类专家的思维方式。模型学会权衡多个特征，而不是过度依赖一个或两个不稳定的线索。
- en: In the next section, I’ll dive into how I actually built this hybrid architecture,
    especially how I selected and integrated the right components.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我将深入探讨我实际上是如何构建这个混合架构的，特别是我如何选择和整合正确的组件。
- en: '**2\. Why I Chose ConvNextV2: Key Innovations Behind the Backbone**'
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**2. 为什么我选择了ConvNextV2：骨干背后的关键创新**'
- en: Among the many visual recognition architectures available, why did I choose
    **ConvNextV2** as the backbone ofmy project?
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在众多可用的视觉识别架构中，为什么我选择了**ConvNextV2**作为我项目的骨干？
- en: 'Because its design effectively combines the best of both worlds: the **CNN’s
    ability to extract precise local features, and the Transformer’s strength in capturing
    long-range dependencies.**'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 因为它的设计有效地结合了两者之长：**CNN提取精确局部特征的能力**和**Transformer捕捉长距离依赖关系的优势**。
- en: Let’s break down three core innovations that made it the right fit.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分析三个核心创新，它为什么是合适的选择。
- en: '**2.1 FCMAE Self-Supervised Learning: Adaptive Learning Inspired by the Human
    Brain**'
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**2.1 FCMAE自监督学习：受人类大脑启发的自适应学习**'
- en: Imagine learning to navigate with your eyes covered, your brain becomes laser-focused
    on memorizing the details you can perceive.
  id: totrans-104
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 想象一下在眼睛被遮盖的情况下学习导航，你的大脑就会专注于记住你能感知到的细节。
- en: ConvNextV2 uses a self-supervised pretraining strategy similar to that of Vision
    Transformers.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: ConvNextV2使用了一种类似于视觉Transformer的自监督预训练策略。
- en: During training, up to 60% of input pixels are **intentionally masked**, and
    the model must learn to **reconstruct the missing regions**.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中，高达60%的输入像素**有意被遮挡**，模型必须学会**重建缺失的区域**。
- en: 'This “make learning harder on purpose” approach actually leads to three major
    benefits:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这种“故意使学习更难”的方法实际上带来了三个主要好处：
- en: '**Comprehensive Feature Learning**'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全面特征学习**'
- en: The model learns the underlying structure and patterns of an image—not just
    the most obvious visual cues.
  id: totrans-109
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 模型学习图像的底层结构和模式——不仅仅是显而易见的视觉线索。
- en: In the context of breed classification, this means it pays attention to fur
    texture, skeletal structure, and body proportions, instead of relying solely on
    color or shape.
  id: totrans-110
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在品种分类的背景下，这意味着它关注毛发纹理、骨骼结构和身体比例，而不是仅仅依赖于颜色或形状。
- en: '**Reduced Dependence on Labeled Data**'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减少对标记数据的依赖**'
- en: By pretraining on unlabeled dog images, the model develops strong visual representations.
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 通过在未标记的狗图像上进行预训练，该模型发展出强大的视觉表示。
- en: Later, with just a small amount of labeled data, it can fine-tune effectively—saving
    significant annotation effort.
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 之后，只需少量标记数据，它就可以进行有效的微调——节省大量的标注工作。
- en: '**Improved Recognition of Rare Patterns**'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**改进稀有模式的识别**'
- en: The reconstruction task pushes the model to learn generalized visual rules,
    enhancing its ability to identify **rare or underrepresented breeds**.
  id: totrans-115
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 重建任务推动模型学习通用的视觉规则，增强其识别**稀有或代表性不足的品种**的能力。
- en: '**2.2 GRN Global Calibration: Mimicking an Expert’s Attention**'
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**2.2 GRN全局校准：模仿专家的注意力**'
- en: Like a seasoned photographer who adjusts the exposure of each element to highlight
    what truly matters.
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 就像一位经验丰富的摄影师，调整每个元素的曝光来突出真正重要的部分。
- en: '**GRN (Global Response Normalization)** is arguably the most impactful innovation
    in ConvNextV2, giving CNNs a degree of **global awareness** that was previously
    lacking:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**GRN（全局响应归一化）**可以说是ConvNextV2中最具影响力的创新，为CNN带来了之前所缺乏的**全局意识**：'
- en: '**Dynamic Feature Recalibration**'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态特征重新校准**'
- en: GRN globally normalizes the feature map, **amplifying the most discriminative
    signals** while suppressing irrelevant ones.
  id: totrans-120
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: GRN对特征图进行全局归一化，**放大最具判别性的信号**，同时抑制不相关的信号。
- en: For instance, when identifying a German Shepherd, it emphasizes upright ears
    and the sloped back while minimizing background noise.
  id: totrans-121
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如，在识别德国牧羊犬时，它强调直立耳朵和斜背，同时最小化背景噪音。
- en: '**Enhanced Sensitivity to Subtle Differences**'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强对细微差异的敏感性**'
- en: This normalization sharpens feature contrast, making it easier to spot fine-grained
    differences—critical for telling apart breeds like the Siberian Husky and Alaskan
    Malamute.
  id: totrans-123
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这种归一化增强了特征对比度，使得发现细粒度差异变得更容易——这对于区分西伯利亚哈士奇和阿拉斯加玛拉穆特等品种至关重要。
- en: '**Focus on Diagnostic Features**'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关注诊断特征**'
- en: GRN helps the model prioritize features that truly matter for classification,
    **rather than relying on statistically correlated but causally irrelevant cues**.
  id: totrans-125
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: GRN帮助模型优先考虑对分类真正重要的特征，**而不是依赖于统计上相关但因果上无关的线索**。
- en: '**2.3 Sparse and Efficient Convolutions: More with Less**'
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**2.3 稀疏和高效卷积：少即是多**'
- en: Like a streamlined team where each member plays to their strengths, reducing
    redundancy while boosting performance.
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 就像一支精简的团队，每个成员都发挥自己的优势，减少冗余，提高性能。
- en: 'ConvNextV2 incorporates architectural optimizations such as **depthwise separable
    convolutions** and **sparse connections**, resulting in three major gains:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: ConvNextV2 结合了如**深度可分离卷积**和**稀疏连接**等架构优化，从而带来三个主要收益：
- en: '**Improved Computational Efficiency**'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高计算效率**'
- en: By breaking down convolutions into smaller, more efficient steps, the model
    reduces its computational load.
  id: totrans-130
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 通过将卷积分解成更小、更有效的步骤，该模型减少了其计算负载。
- en: This allows it to process high-resolution dog images and detect fine visual
    differences without requiring excessive resources.
  id: totrans-131
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这使得它能够处理高分辨率的狗图像，并检测细微的视觉差异，而无需过多的资源。
- en: '**Expanded Effective Receptive Field**'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**扩展有效感受野**'
- en: The layout of convolutions is designed to extend the model’s field of view,
    helping it analyze both **overall body structure** and **local details** simultaneously.
  id: totrans-133
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 卷积的布局设计旨在扩展模型视野，帮助它同时分析**整体身体结构**和**局部细节**。
- en: '**Parameter Efficiency**'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**参数效率**'
- en: The architecture ensures that **each parameter carries more learning capacity**,
    extracting richer, more nuanced information using the same amount of compute.
  id: totrans-135
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 该架构确保**每个参数都承载更多的学习容量**，使用相同的计算量提取更丰富、更细腻的信息。
- en: '**2.4 Why ConvNextV2 Was the Right Fit for a Hybrid Architecture**'
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**2.4 为什么ConvNextV2适合混合架构**'
- en: ConvNextV2 turned out to be the **perfect backbone** for this hybrid system,
    not just because of its performance, but because it **embodies the very philosophy
    of fusion**.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: ConvNextV2最终成为这种混合系统的**完美骨干**，不仅因为其性能，还因为它**体现了融合的哲学**。
- en: It retains the local precision of CNNs while adopting key design concepts from
    Transformers to expand its global awareness. This duality makes it a **natural
    bridge** between CNNs and Transformers apable of preserving fine-grained details
    while understanding the broader context.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 它保留了CNNs的局部精度，同时采用了Transformers的关键设计概念来扩展其全局意识。这种双重性使其成为CNNs和Transformers之间的**自然桥梁**，能够在保留细粒度细节的同时理解更广泛的上下文。
- en: It also lays the groundwork for additional modules like **multi-head attention**
    and **morphological feature extractors**, ensuring the model starts with a complete,
    balanced feature set.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 它还为像**多头注意力**和**形态学特征提取器**这样的附加模块奠定了基础，确保模型从完整、平衡的特征集开始。
- en: In short, ConvNextV2 doesn’t just “see the parts”, it starts to **understand
    how the parts come together**. And in a task like dog breed classification, where
    both minute differences and overall structure matter, this kind of foundation
    is what transforms an ordinary model into one that can **reason like an expert**.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，ConvNextV2不仅仅“看到部分”，它开始**理解部分是如何组合在一起的**。在一个像狗品种分类这样的任务中，细微的差异和整体结构都很重要，这种基础是将一个普通模型转变为能够**像专家一样推理**的模型的关键。
- en: '**3\. Technical Implementation of the MultiHeadAttention Mechanism**'
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**3. 多头注意力机制的实现技术**'
- en: In neural networks, the core concept of the **attention mechanism** is to **enable
    models to “focus” on key parts of the input**, similar to how human experts consciously
    focus on specific features (such as ear shape, muzzle length, tail posture) when
    identifying dog breeds.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在神经网络中，**注意力机制**的核心概念是**使模型能够“关注”输入的关键部分**，类似于人类专家在识别狗品种时，有意识地关注特定的特征（如耳朵形状、吻部长度、尾巴姿势）。
- en: 'The **Multi-Head Attention (MHA)** mechanism further enhances this ability:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '**多头注意力（MHA**）机制进一步增强了这种能力：'
- en: “Rather than having one expert evaluate all features, it’s better to form a
    panel of experts, letting each focus on different details, and then synthesize
    a final judgment!”
  id: totrans-144
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “与其让一个专家评估所有特征，不如组成一个专家小组，让每个专家关注不同的细节，然后综合最终判断！”
- en: Mathematically, MHA uses **multiple linear projections** to allow the model
    to simultaneously learn different feature associations, further enhancing performance.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 从数学上讲，MHA使用**多个线性投影**来允许模型同时学习不同的特征关联，从而进一步提高性能。
- en: '**3.1 Understanding MultiHeadAttention from a Mathematical Perspective**'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.1 从数学角度理解多头注意力**'
- en: 'The core idea of MultiHeadAttention is to use multiple different projections
    to allow the model to simultaneously attend to patterns in different subspaces.
    Mathematically, it first projects input features into three roles: **Query**,
    **Key**, and **Value**, then calculates the similarity between Query (Q) and Key
    (K), and uses this similarity to perform weighted averaging of Values.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 多头注意力（MultiHeadAttention）的核心思想是使用多个不同的投影，使模型能够同时关注不同子空间中的模式。从数学上讲，它首先将输入特征投影到三个角色：**查询（Query**）、**键（Key**）和**值（Value**），然后计算查询（Q）和键（K）之间的相似性，并使用这种相似性来执行值的加权平均。
- en: 'The basic formula can be expressed as:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 基本公式可以表示为：
- en: \[\text{Attention}(Q, K, V) = \text{softmax}\left(\frac{QK^T}{\sqrt{d_k}}\right)V\]
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: \[\text{Attention}(Q, K, V) = \text{softmax}\left(\frac{QK^T}{\sqrt{d_k}}\right)V\]
- en: '![](../Images/702dbc2b845343d138b20b3d0af46da2.png)**3.2 Application of Einstein
    Summation Convention in Attention Calculation**'
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '![](../Images/702dbc2b845343d138b20b3d0af46da2.png)**3.2 在注意力计算中应用爱因斯坦求和约定**'
- en: 'In the implementation, I used the `torch.einsum` function based on the Einstein
    summation convention to efficiently calculate attention scores:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在实现中，我使用了基于爱因斯坦求和约定的`torch.einsum`函数来高效地计算注意力分数：
- en: '[PRE0]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'This means:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着：
- en: '`q` has shape **(batch_size, num_heads, query_dim)**'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '`q`的形状为**（batch_size, num_heads, query_dim**）'
- en: '`k` has shape **(batch_size, num_heads, key_dim)**'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '`k`的形状为**（batch_size, num_heads, key_dim**）'
- en: The dot product is performed **on dimension `d`**, resulting in `(batch_size,
    num_heads, query_len, key_len)` This is essentially “calculating similarity between
    each Query and all Keys,” generating an **attention weight matrix**
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 点积是在**维度`d`**上进行的，结果为`(batch_size, num_heads, query_len, key_len)`。这本质上是在“计算每个查询与所有键之间的相似性”，生成一个**注意力权重矩阵**。
- en: '**3.3 Implementation Code Analysis**'
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**3.3 实现代码分析**'
- en: 'Key implementation code for MultiHeadAttention:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: MultiHeadAttention 的关键实现代码：
- en: '[PRE1]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**3.3.1\. Steps 1-2: Projection and Multi-Head Splitting**'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.3.1\. 步骤 1-2：投影和多头分割**'
- en: First, input features are projected through a linear layer, and then separately
    projected into query, key, and value spaces. Importantly, these projections not
    only change the feature representation but also split them into multiple “heads,”
    each attending to different feature subspaces.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，输入特征通过一个线性层进行投影，然后分别投影到查询、键和值空间。重要的是，这些投影不仅改变了特征表示，还将它们分割成多个“头”，每个“头”关注不同的特征子空间。
- en: '**3.3.2\. Steps 3-4: Attention Calculation**'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.3.2\. 步骤 3-4：注意力计算**'
- en: '![](../Images/71e233f8bbbb61127cf7e9958248b57b.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/71e233f8bbbb61127cf7e9958248b57b.png)'
- en: '**3.3.3\. Steps 5-6: Weighted Aggregation and Output Projection**'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.3.3\. 步骤 5-6：加权聚合和输出投影**'
- en: Using the calculated attention weights, weighted summation is performed on the
    value vectors to obtain the attended feature representation. Finally, outputs
    from all heads are concatenated and passed through an output projection layer
    to get the final result.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 使用计算出的注意力权重，对值向量进行加权求和，以获得关注的特征表示。最后，将所有头的输出连接起来，通过输出投影层得到最终结果。
- en: 'This implementation has the following simplifications and adjustments compared
    to standard Transformer MultiHeadAttention: Query, key, and value come from the
    same input (self-attention), suitable for processing features obtained from CNN
    backbone networks.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 与标准的 Transformer MultiHeadAttention 相比，此实现有以下简化和调整：查询、键和值来自相同的输入（自注意力），适用于处理从
    CNN 主干网络获取的特征。
- en: It uses einsum operations to simplify matrix calculations.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 它使用 einsum 操作简化矩阵计算。
- en: The design of projection layers ensures dimensional consistency, facilitating
    integration with other modules.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 投影层的设计确保了维度一致性，便于与其他模块集成。
- en: '**3.4 How Attention Mechanisms Enhance Understanding of Morphological Feature
    Relationships**'
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**3.4 注意力机制如何增强对形态特征关系的理解**'
- en: 'The multi-head attention mechanism brings three core advantages to dog breed
    recognition:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 多头注意力机制为犬种识别带来了三个核心优势：
- en: '**3.4.1\. Feature Relationship Modeling**'
  id: totrans-171
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**3.4.1\. 特征关系建模**'
- en: Just as a professional veterinarian not only sees that ears are upright but
    also notices how this combines with tail curl degree and skull shape to form a
    dog breed’s “feature combination.”
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 就像专业的兽医不仅看到耳朵直立，还会注意到这种形状如何与尾巴卷曲程度和头骨形状结合，形成犬种的特征组合。
- en: It can establish associations between different morphological features, capturing
    their synergistic relationships, not just seeing “what features exist” but observing
    “how these features combine.”
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 它可以建立不同形态特征之间的关联，捕捉它们的协同关系，不仅仅是看到“哪些特征存在”，而是观察“这些特征如何结合”。
- en: '**Application**: The model can learn that a combination of “pointed ears +
    curled tail + medium build” points to specific Northern dog breeds.'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '**应用**: 模型可以学会“尖耳朵 + 卷尾 + 中等体型”的组合指向特定的北方犬种。'
- en: '**3.4.2\. Dynamic Feature Importance Assessment**'
  id: totrans-175
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**3.4.2\. 动态特征重要性评估**'
- en: Just as experts know to focus particularly on fur texture when identifying Poodles,
    while focusing mainly on the distinctive nose and head structure when identifying
    Bulldogs.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 就像专家在识别贵宾犬时会特别关注毛发质感，而在识别斗牛犬时主要关注独特的鼻子和头部结构。
- en: It dynamically adjusts focus on different features based on the specific content
    of the input.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 它根据输入的具体内容动态调整对不同特征的聚焦。
- en: Key features vary across different breeds, and the attention mechanism can adaptively
    focus.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 关键特征在不同品种中有所不同，注意力机制可以自适应地聚焦。
- en: '**Application**: When seeing a Border Collie, the model might focus more on
    fur color distribution; when seeing a Dachshund, it might focus more on body proportions'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: '**应用**: 当看到边境牧羊犬时，模型可能会更关注毛色分布；当看到腊肠犬时，它可能会更关注身体比例'
- en: '**3.4.3\. Complementary Information Integration**'
  id: totrans-180
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**3.4.3\. 补充信息集成**'
- en: Like a team of experts with different specializations, one focusing on skeletal
    structure, another on fur features, another analyzing behavioral posture, making
    a more comprehensive judgment together.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 就像一支由不同专业领域的专家组成的团队，一个专注于骨骼结构，另一个专注于毛发特征，另一个分析行为姿势，共同做出更全面的判断。
- en: Through multiple attention heads, each simultaneously captures different types
    of feature relationships. Each head can focus on a specific type of feature or
    relationship pattern.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 通过多个注意力头部，每个头部同时捕捉不同类型的特征关系。每个头部可以专注于特定类型的特征或关系模式。
- en: '**Application**: One head might primarily focus on color patterns, another
    on body proportions, and yet another on facial features, ultimately synthesizing
    these perspectives to make a judgment.'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '**应用**：一个头部可能主要关注颜色模式，另一个关注身体比例，还有一个关注面部特征，最终将这些视角综合起来做出判断。'
- en: By combining these three capabilities, the MultiHeadAttention mechanism goes
    beyond identifying individual features, it learns to model the complex relationships
    between them, capturing subtle patterns that emerge from their combinations and
    enabling more accurate recognition.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合这三个能力，MultiHeadAttention机制不仅超越了识别单个特征，它还学会了建模它们之间的复杂关系，捕捉从它们的组合中出现的微妙模式，并使识别更加准确。
- en: '**4\. Implementation Details of the Hybrid Architecture**'
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**4. 实现混合架构的细节**'
- en: '**4.1 The Overall Architectural Flow**'
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**4.1 整体架构流程**'
- en: 'When designing this hybrid architecture, my goal was simple yet ambitious:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计这个混合架构时，我的目标简单而雄心勃勃：
- en: '**Let each component do what it does best, and build a complementary system
    where they enhance one another.**'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: '**让每个组件做它最擅长的事情，并构建一个相互补充的系统，使它们相互增强。**'
- en: Much like a well-orchestrated symphony, each instrument (or module) plays its
    role, only together can they create harmony.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 就像一场精心编排的交响乐，每个乐器（或模块）都扮演着它的角色，只有它们一起才能创造和谐。
- en: 'In this setup:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个设置中：
- en: The **CNN** focuses on capturing local details.
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CNN** 专注于捕捉局部细节。'
- en: The **morphological feature extractor** enhances key structural features.
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 形态特征提取器增强了关键的结构特征。
- en: The **multi-head attention** module learns how these features interact.
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多头注意力模块学习这些特征如何相互作用。
- en: '![](../Images/00530a989ed9cce1e71e2adad985b57c.png)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/00530a989ed9cce1e71e2adad985b57c.png)'
- en: 'As shown in the diagram above, the overall model operates through five key
    stages:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，整体模型通过五个关键阶段运行：
- en: '**4.1.1\. Feature Extraction**'
  id: totrans-196
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**4.1.1\. 特征提取**'
- en: Once an image enters the model, **ConvNextV2** takes charge of extracting foundational
    features, such as fur color, contours, and texture. This is where the AI begins
    to **“see” the basic shape and appearance** of the dog.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦图像进入模型，**ConvNextV2** 负责提取基础特征，例如毛色、轮廓和纹理。这就是AI开始“看到”狗的基本形状和外观的地方。
- en: '**4.1.2\. Morphological Feature Enhancement**'
  id: totrans-198
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**4.1.2\. 形态特征增强**'
- en: These initial features are then refined by the **morphological feature extractor**.
    This module functions like an expert’s eye—highlighting **structural characteristics**
    such as ear shape and body proportions. Here, the AI learns to **focus on what
    actually matters**.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 这些初始特征随后通过形态特征提取器进行细化。该模块就像专家的眼睛——突出结构特征，如耳形和身体比例。在这里，AI学习关注真正重要的东西。
- en: '**4.1.3\. Feature Fusion**'
  id: totrans-200
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**4.1.3\. 特征融合**'
- en: Next comes the **feature fusion layer**, which merges the local features with
    the enhanced morphological cues. But this isn’t just a simple concatenation, the
    layer also models how these features **interact**, ensuring the AI doesn’t treat
    them in isolation, but rather **understands how they combine** to convey meaning.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是特征融合层，它将局部特征与增强的形态线索合并。但这不仅仅是一个简单的连接，该层还建模了这些特征如何**相互作用**，确保AI不会孤立地对待它们，而是**理解它们如何结合**来传达意义。
- en: '**4.1.4\. Feature Relationship Modeling**'
  id: totrans-202
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**4.1.4\. 特征关系建模**'
- en: The fused features are passed into the **multi-head attention** module, which
    builds **contextual relationships** between different attributes. The model begins
    to understand combinations like **“ear shape + fur texture + facial proportions”**
    rather than looking at each trait independently.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 融合的特征被传递到多头注意力模块，该模块在不同属性之间建立上下文关系。模型开始理解像“耳形 + 毛发纹理 + 面部比例”这样的组合，而不是独立地看待每个特征。
- en: '**4.1.5\. Final Classification**'
  id: totrans-204
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**4.1.5\. 最终分类**'
- en: After all these layers of processing, the model moves to its final classifier,
    where it makes a prediction about the dog’s breed, based on the rich, integrated
    understanding it has developed.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 经过所有这些处理层之后，模型移动到其最终的分类器，根据它所形成的丰富、综合理解，对狗的品种做出预测。
- en: '**4.2 Integrating ConvNextV2 and Parameter Setup**'
  id: totrans-206
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**4.2 集成ConvNextV2和参数设置**'
- en: 'For implementation, I chose the pretrained **ConvNextV2-base** model as the
    backbone:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 对于实现，我选择了预训练的**ConvNextV2-base**模型作为骨干：
- en: '[PRE2]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Depending on the input image size or backbone architecture, the feature output
    dimensions may vary. To build a **robust and flexible system**, I designed a dynamic
    feature dimension detection mechanism:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 根据输入图像大小或骨干架构，特征输出维度可能不同。为了构建一个**健壮且灵活的系统**，我设计了一个动态特征维度检测机制：
- en: '[PRE3]'
  id: totrans-210
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This ensures the system automatically adapts to any feature shape changes, keeping
    all downstream components functioning properly.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 这确保了系统自动适应任何特征形状变化，保持所有下游组件正常工作。
- en: '**4.3 Intelligent Configuration of the Multi-Head Attention Layer**'
  id: totrans-212
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**4.3 多头注意力层的智能配置**'
- en: 'As mentioned earlier, I experimented with several head counts. Too many heads
    increased computation and risked overfitting. I ultimately settled on **eight**,
    but allowed the number of heads to adjust automatically based on feature dimensions:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我尝试了几个头数。过多的头数增加了计算并可能导致过拟合。我最终确定了**八个**，但允许头数根据特征维度自动调整：
- en: '[PRE4]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**4.4 Making CNN, Transformers, and Morphological Features Work Together**'
  id: totrans-215
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**4.4 使CNN、Transformers和形态特征协同工作**'
- en: The morphological feature extractor works hand-in-hand with the attention mechanism.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 形态特征提取器与注意力机制协同工作。
- en: 'While the former provides structured representations of key traits, the latter
    models **relationships** among these features:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然前者提供了关键特征的有序表示，但后者模型这些特征之间的**关系**：
- en: '[PRE5]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: A special note about the third component `features * morphological_features`
    — this isn’t just a mathematical multiplication. It creates a form of **dialogue**
    between the two feature sets, allowing them to influence each other and generate
    richer representations.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 关于第三个组件`features * morphological_features`的特殊说明——这不仅仅是一种数学乘法。它创造了一种**对话**形式，使两个特征集能够相互影响并生成更丰富的表示。
- en: For example, suppose the model picks up “pointy ears” from the base features,
    while the morphological module detects a “small head-to-body ratio.”
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设模型从基础特征中提取出“尖耳朵”，而形态模块检测到“头部与身体比例小”。
- en: Individually, these may not be conclusive, but their **interaction** may strongly
    suggest a specific breed, like a **Corgi** or **Finnish Spitz**. It’s no longer
    just about recognizing ears or head size, the model learns to interpret how features
    work together, much like an expert would.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 单独来看，这些可能并不具有决定性，但它们的**交互**可能强烈暗示一个特定的品种，如**柯基犬**或**芬兰狐狸犬**。这不再仅仅是识别耳朵或头部大小，模型学会了如何解释特征如何协同工作，就像专家一样。
- en: This full pipeline from feature extraction, through morphological enhancement
    and attention-driven modeling, to prediction is my vision of what an ideal architecture
    should look like.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 从特征提取，通过形态增强和注意力驱动的建模，到预测的完整流程，这是我理想架构应该呈现的样子。
- en: 'The design has several key advantages:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 该设计具有几个关键优势：
- en: The **morphological extractor** brings structured, expert-inspired understanding.
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**形态提取器**带来了结构化、专家启发的理解。'
- en: The **multi-head attention** uncovers contextual relationships between traits.
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多头注意力**揭示了特征之间的上下文关系。'
- en: The **feature fusion layer** captures **nonlinear interactions** through element-wise
    multiplication.
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特征融合层**通过逐元素乘法捕捉非线性交互。'
- en: '**4.5 Technical Challenges and How I Solved Them**'
  id: totrans-227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**4.5 技术挑战及其解决方法**'
- en: Building a hybrid architecture like this was far from smooth sailing.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 构建这样的混合架构远非一帆风顺。
- en: 'Here are several challenges I faced and how solving them helped me improve
    the overall design:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些我面临的挑战以及解决它们如何帮助我改进整体设计：
- en: '**4.5.1\. Mismatched Feature Dimensions**'
  id: totrans-230
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**4.5.1. 特征维度不匹配**'
- en: '**Challenge:** Output sizes varied across modules, especially when switching
    backbone networks.'
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**挑战**：模块之间的输出大小不同，尤其是在切换骨干网络时。'
- en: '**Solution:** In addition to the dynamic dimension detection mentioned earlier,
    I implemented **adaptive projection layers** to unify the feature dimensions.'
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案**：除了前面提到的动态维度检测，我还实现了**自适应投影层**以统一特征维度。'
- en: '**4.5.2\. Balancing Performance and Efficiency**'
  id: totrans-233
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**4.5.2. 平衡性能和效率**'
- en: '**Challenge:** More complexity meant more computation.'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**挑战**：更多的复杂性意味着更多的计算。'
- en: '**Solution:** I dynamically adjusted the number of attention heads, and used
    efficient `einsum` operations to optimize performance.'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案**：我动态调整注意力头的数量，并使用高效的`einsum`操作来优化性能。'
- en: '**4.5.3\. Overfitting Risk**'
  id: totrans-236
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**4.5.3. 过拟合风险**'
- en: '**Challenge:** Hybrid models are more prone to overfitting, especially with
    smaller training sets.'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**挑战：** 混合模型更容易过拟合，尤其是在较小的训练集上。'
- en: '**Solution:** I applied **LayerNorm**, **Dropout**, and **weight decay** for
    regularization.'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案：** 我应用了 **层归一化（LayerNorm**）、**Dropout** 和 **权重衰减（weight decay**）来进行正则化。'
- en: '**4.5.4\. Gradient Flow Issues**'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.5.4. 梯度流动问题**'
- en: '**Challenge:** Deep architectures often suffer from vanishing or exploding
    gradients.'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**挑战：** 深度架构通常会受到梯度消失或梯度爆炸的问题。'
- en: '**Solution:** I introduced **residual connections** to ensure gradients flow
    smoothly during both forward and backward passes.'
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案：** 我引入了 **残差连接** 来确保在正向和反向传播过程中梯度能够顺畅流动。'
- en: If you’re interested in exploring the full implementation, feel free to check
    out the [GitHub projec](https://github.com/Eric-Chung-0511/Learning-Record/tree/main/Data%20Science%20Projects/PawMatchAI)t
    here.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对探索完整的实现感兴趣，请随时查看此处的 [GitHub 项目](https://github.com/Eric-Chung-0511/Learning-Record/tree/main/Data%20Science%20Projects/PawMatchAI)。
- en: '**5\. Performance Evaluation and Heatmap Analysis**'
  id: totrans-243
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**5. 性能评估和热图分析**'
- en: The value of a hybrid architecture lies not only in its quantitative performance
    but also in how it qualitatively **“thinks.”**
  id: totrans-244
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 混合架构的价值不仅在于其定量性能，还在于其如何从定性的角度 **“思考”**。
- en: In this section, we’ll use confidence score statistics and heatmap analysis
    to demonstrate how the model evolved from **CNN → CNN+Transformer → CNN+Transformer+MFE**,
    and how each stage brought its visual reasoning closer to that of a human expert.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将使用置信度分数统计和热图分析来展示模型如何从 **CNN → CNN+Transformer → CNN+Transformer+MFE**
    发展，以及每个阶段如何使模型的视觉推理更接近人类专家。
- en: To ensure that the performance differences came purely from architecture design,
    I retrained each model using the exact same dataset, augmentation methods, loss
    function, and training parameters. The only variation was the presence or absence
    of the Transformer and morphological modules.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保性能差异纯粹来自架构设计，我使用完全相同的训练集、增强方法、损失函数和训练参数重新训练了每个模型。唯一的差异是Transformer和形态学模块的有无。
- en: In terms of F1 score, the CNN-only model reached **87.83%**, the CNN+Transformer
    variant performed slightly better at **89.48%**, and the final hybrid model scored
    **88.70%**. While the transformer-only version showed the highest score on paper,
    it didn’t always translate into more reliable predictions. In fact, the hybrid
    model was more consistent in practice and handled similar-looking or blurry cases
    more reliably.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 在F1分数方面，仅CNN模型达到了 **87.83**%，CNN+Transformer变体表现略好，达到 **89.48**%，而最终的混合模型得分为
    **88.70**%。虽然仅Transformer版本在纸面上显示出最高的分数，但它并不总是转化为更可靠的预测。事实上，混合模型在实践中更一致，并且更可靠地处理相似外观或模糊的案例。
- en: '**5.1 Confidence Scores and Statistical Insights**'
  id: totrans-248
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**5.1 置信度分数和统计洞察**'
- en: I tested 17 images of Border Collies, including standard photos, artistic illustrations,
    and various camera angles, to thoroughly assess the three architectures.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 我测试了17张边境牧羊犬的图片，包括标准照片、艺术插图和不同的拍摄角度，以全面评估三个架构。
- en: While other breeds were also included in the broader evaluation, I chose Border
    Collie as a representative case due to its distinctive features and frequent confusion
    with similar breeds.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然其他品种也被纳入更广泛的评估中，但由于边境牧羊犬具有独特的特征，并且经常与类似品种混淆，因此我选择边境牧羊犬作为代表案例。
- en: '**Figure 1: Model Confidence Score Comparison**'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1：模型置信度分数比较**'
- en: '![](../Images/6d10b9832b6e6cde645ed92b5c54c20f.png)As shown above, there are
    clear performance differences across the three models.'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: '![](../Images/6d10b9832b6e6cde645ed92b5c54c20f.png)如上图所示，三个模型之间有明显的性能差异。'
- en: 'A notable example is **Sample #3**, where the **CNN-only** model misclassified
    the Border Collie as a Collie, with a low confidence score of **0.2492**.'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 一个显著的例子是 **样本#3**，其中 **仅CNN** 模型将边境牧羊犬错误地分类为柯利犬，置信度分数为 **0.2492**。
- en: 'While the **CNN+Transformer** corrected this error, it introduced a new one
    in **Sample #5**, misidentifying it as a Shiba Inu with **0.2305** confidence.'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 **CNN+Transformer** 修正了这一错误，但在 **样本#5** 中引入了新的错误，错误地将它识别为柴犬，置信度为 **0.2305**。
- en: The final **CNN+Transformer+MFE** model correctly identified **all samples**
    without error. What’s interesting here is that both misclassifications occurred
    at **low confidence levels (below 0.25)**.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 最终的 **CNN+Transformer+MFE** 模型正确识别了 **所有样本** 而无错误。有趣的是，两个错误都发生在 **低置信度水平（低于0.25**）。
- en: This suggests that even when the model makes a mistake, it **retains a sense
    of uncertainty**—a desirable trait in real world applications. We want models
    to be cautious when unsure, rather than confidently wrong.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明，即使模型犯了错误，它也**保留了一种不确定性**——这是现实世界应用中一个理想的特性。我们希望模型在不确定时保持谨慎，而不是自信地犯错。
- en: '**Figure 2: Confidence Score Distribution**'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: '**图2：置信度得分分布**'
- en: '![](../Images/57a181177ec233ed87a37b7a3937c9b0.png)Looking at the distribution
    of confidence scores, the improvement becomes even more evident.'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: '![](../Images/57a181177ec233ed87a37b7a3937c9b0.png)观察置信度得分的分布，改进变得更加明显。'
- en: The **CNN-only** model mostly predicted in the **0.4–0.5 range**, with few samples
    reaching beyond **0.6**.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: '**仅CNN**的模型主要预测在**0.4–0.5**范围内，很少有样本达到**0.6**以上。'
- en: '**CNN+Transformer** showed better concentration around **0.5–0.6**, but still
    had only one sample in the **0.7–0.8** high-confidence range.'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: '**CNN+Transformer**在**0.5–0.6**范围内表现出更好的集中度，但仍然只有一个样本位于**0.7–0.8**的高置信度范围内。'
- en: The **CNN+Transformer+MFE** model stood out with **6 samples** reaching the
    **0.7–0.8** confidence level.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: '**CNN+Transformer+MFE**模型在**6个样本**达到了**0.7–0.8**的置信度水平。'
- en: This **rightward shift** in distribution reveals more than just accuracy, it
    reflects **certainty**.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 分布的**右移**不仅仅揭示了准确性，它还反映了**确定性**。
- en: The model is evolving from “barely correct” to “confidently correct,” which
    significantly enhances its reliability in real-world deployment.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 模型正从“勉强正确”转变为“自信正确”，这显著增强了其在现实世界部署中的可靠性。
- en: '**Figure 3: Statistical Summary of Model Performance**'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: '**图3：模型性能统计摘要**'
- en: '![](../Images/5a4f2282cdb9c328c91b1861e9f21fbb.png)A deeper statistical breakdown
    highlights consistent improvements:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: '![](../Images/5a4f2282cdb9c328c91b1861e9f21fbb.png)更深入的统计分析突出了持续改进：'
- en: '**Mean confidence score** rose from **0.4639** (CNN) to **0.5245** (CNN+Transformer),
    and finally **0.6122** with the full hybrid setup—a **31.9% increase overall**.'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: '**平均置信度得分**从**0.4639**（CNN）上升到**0.5245**（CNN+Transformer），最终在完整的混合设置中达到**0.6122**——整体提高了**31.9%**。'
- en: '**Median score** jumped from **0.4665** to **0.6827**, confirming the overall
    shift toward higher confidence.'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: '**中位数得分**从**0.4665**跃升至**0.6827**，证实了整体向更高置信度的转变。'
- en: 'The proportion of **high-confidence predictions (≥ 0.5)** also showed striking
    gains:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '**高置信度预测（≥ 0.5）的比例**也显示出显著的提升：'
- en: '**CNN**: 41.18%'
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CNN**: 41.18%'
- en: '**CNN+Transformer**: 64.71%'
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CNN+Transformer**: 64.71%'
- en: '**CNN+Transformer+MFE**: 82.35%'
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CNN+Transformer+MFE**: 82.35%'
- en: This means that with the final architecture, **most predictions are not only
    correct but confidently correct.**
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着，在最终的架构中，**大多数预测不仅正确，而且正确得很有信心**。
- en: 'You might notice a **slight increase in standard deviation** (from **0.1237**
    to **0.1616**), which might seem like a negative at first. But in reality, this
    reflects a more **nuanced response to input complexity**:'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会注意到**标准差**（从**0.1237**到**0.1616**）略有增加，一开始可能看起来像是一个负面因素。但事实上，这反映了模型对输入复杂性的**更细微的反应**：
- en: The model is **highly confident on easier samples**, and **appropriately cautious**
    on harder ones. The improvement in maximum confidence value (from 0.6343 to 0.7746)
    further shows how this hybrid architecture can make more decisive and assured
    judgments when presented with straightforward samples.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 模型对简单样本**高度自信**，对复杂样本**适当谨慎**。最大置信度值（从0.6343到0.7746）的提升进一步展示了这种混合架构在处理简单样本时如何做出更果断和自信的判断。
- en: '**5.2 Heatmap Analysis: Tracing the Evolution of Model Reasoning**'
  id: totrans-275
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**5.2 热图分析：追踪模型推理的演变**'
- en: While statistical metrics are helpful, they don’t tell the full story.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然统计指标很有帮助，但它们并不能讲述整个故事。
- en: To truly understand how the model makes decisions, we need to see what it sees
    and heatmaps make this possible.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 要真正理解模型是如何做出决策的，我们需要看到它所看到的内容，热图使得这一点成为可能。
- en: In these heatmaps, **red indicates areas of high attention**, highlighting the
    regions the model relies on most during prediction. By analyzing these attention
    maps, we can observe how each model interprets visual information, revealing fundamental
    differences in their reasoning styles.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些热图中，**红色表示高关注区域**，突出了模型在预测时最依赖的区域。通过分析这些注意力图，我们可以观察每个模型如何解释视觉信息，揭示它们推理风格的根本差异。
- en: Let’s walk through one representative case.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一个代表性的案例。
- en: '**5.2.1 Frontal View of a Border Collie: From Local Eye Focus to Structured
    Morphological Understanding**'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.2.1 边界牧羊犬的前视图：从局部视觉关注到结构化形态理解**'
- en: '![](../Images/90ee1e6b2692516ac1ddc7dfe386d791.png)![](../Images/5bd9d5377b6b5e4922180513dc12c553.png)![](../Images/4b3b3c35f60e44f580139e5a121f3dda.png)When
    presented with a frontal image of a Border Collie, the three models reveal distinct
    attention patterns, reflecting how their architectural designs shape visual understanding.'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片4](../Images/90ee1e6b2692516ac1ddc7dfe386d791.png)![图片5](../Images/5bd9d5377b6b5e4922180513dc12c553.png)![图片6](../Images/4b3b3c35f60e44f580139e5a121f3dda.png)当呈现边境牧羊犬的正面图像时，这三个模型揭示了不同的注意力模式，反映了它们的架构设计如何塑造视觉理解。'
- en: The **CNN-only model** produces a heatmap with two sharp attention peaks, both
    **centered on the dog’s eyes.** This indicates a strong reliance on local features
    while overlooking other morphological traits like the ears or facial outline.
    While eyes are indeed important, focusing solely on them makes the model more
    vulnerable to variations in pose or lighting. The resulting confidence score of
    **0.5581** reflects this limitation.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: '**CNN-only模型**生成的热力图有两个尖锐的注意力峰值，都**集中在狗的眼睛上**。这表明模型强烈依赖于局部特征，而忽略了其他形态学特征，如耳朵或面部轮廓。虽然眼睛确实很重要，但仅仅关注它们会使模型更容易受到姿势或光线变化的影响。由此产生的信心分数为**0.5581**反映了这一局限性。'
- en: With the **CNN+Transformer model**, the attention becomes more distributed.
    The heatmap forms a loose **M-shaped pattern,** extending beyond the eyes to include
    the **forehead and the space between the eyes.** This shift suggests that the
    model begins to understand spatial relationships between features, not just the
    features themselves. This added contextual awareness leads to a stronger confidence
    score of **0.6559.**
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 使用**CNN+Transformer模型**，注意力变得更加分散。热力图形成了一个松散的**M形模式**，从眼睛延伸到包括**额头和眼睛之间的空间**。这种转变表明模型开始理解特征之间的空间关系，而不仅仅是特征本身。这种增加的上下文意识导致信心分数达到**0.6559**。
- en: The **CNN+Transformer+MFE model** shows the most structured and comprehensive
    attention map. The heat is **symmetrically distributed across the eyes, ears,
    and the broader facial region**. This indicates that the model has moved beyond
    feature detection and is now capturing how features are arranged as part of a
    meaningful whole. The **Morphological Feature Extractor** plays a key role here,
    helping the model grasp the structural signature of the breed. This deeper understanding
    boosts the confidence to **0.6972.**
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: '**CNN+Transformer+MFE模型**显示了最结构化和最全面的热力图。热度**在眼睛、耳朵和更广泛的面部区域对称分布**。这表明模型已经超越了特征检测，现在正在捕捉特征作为有意义整体的一部分是如何排列的。**形态学特征提取器**在这里发挥了关键作用，帮助模型掌握品种的结构特征。这种更深入的理解提高了信心到**0.6972**。'
- en: Together, these three heatmaps represent a clear progression in visual reasoning,
    **from isolated feature detection, to inter-feature context, and finally to structural
    interpretation**. Even though ConvNeXtV2 is already a powerful backbone, adding
    Transformer and MFE modules enables the model to not just see features but to
    understand them as part of a coherent morphological pattern. This shift is subtle
    but crucial, especially for fine-grained tasks like breed classification.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 三个热力图共同代表了一种视觉推理的清晰进步，**从孤立的特征检测到特征间的上下文，最终到结构解释**。尽管ConvNeXtV2已经是一个非常强大的骨干网络，但添加Transformer和MFE模块使模型不仅能看到特征，还能将它们理解为一个连贯的形态学模式的一部分。这种转变虽然微妙但至关重要，尤其是在像品种分类这样的细粒度任务中。
- en: '**5.2.2 Error Case Analysis: From Misclassification to True Understanding**'
  id: totrans-286
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**5.2.2 错误案例分析：从误分类到真正理解**'
- en: '![](../Images/66aa9e22c7b41a4f45d4578b1c5d73c8.png)![](../Images/8584756b3a6a51843f9683012debaed4.png)![](../Images/c4616c085633a6b68997b56d5d3b6ac1.png)'
  id: totrans-287
  prefs: []
  type: TYPE_IMG
  zh: '![图片1](../Images/66aa9e22c7b41a4f45d4578b1c5d73c8.png)![图片2](../Images/8584756b3a6a51843f9683012debaed4.png)![图片3](../Images/c4616c085633a6b68997b56d5d3b6ac1.png)'
- en: This is a case where the **CNN-only model misclassified** a Border Collie.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个**CNN-only模型误分类**边境牧羊犬的案例。
- en: Looking at the heatmap, we can see why. The model focuses almost entirely on
    **a single eye**, ignoring most of the face. This kind of over-reliance on one
    local feature makes it easy to confuse breeds that share similar traits in this
    case, a **Collie**, which also has similar eye shape and color contrast.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 通过观察热力图，我们可以看到原因。模型几乎完全集中在**单个眼睛上**，忽略了大部分面部。这种过度依赖单一局部特征的做法，使得容易混淆具有相似特征的品种，例如，这个**柯利犬**，它也有相似的眼睛形状和颜色对比。
- en: What the model misses are the broader **facial proportions** and structural
    details that define a Border Collie. Its low confidence score of **0.2492** reflects
    that uncertainty.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 模型遗漏的是定义边境牧羊犬的更广泛的**面部比例**和结构细节。其低信心分数为**0.2492**反映了这种不确定性。
- en: With the **CNN+Transformer model**, attention shifts in a more promising direction.
    It now covers both eyes and parts of the forehead, creating a **more balanced
    attention pattern**. This suggests the model is beginning to **connect multiple
    features**, rather than depending on just one.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 使用**CNN+Transformer模型**，注意力转向了一个更有希望的方向。它现在覆盖了双眼和额头的一部分，形成了一个**更平衡的注意力模式**。这表明模型开始**连接多个特征**，而不仅仅是依赖一个。
- en: Thanks to self-attention, it can better interpret relationships between facial
    components, leading to the **correct prediction** — Border Collie. The confidence
    score rises to **0.5484**, more than double the previous model’s.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了自注意力，它可以更好地解释面部组件之间的关系，从而得出**正确预测**——边境牧羊犬。置信度得分上升到**0.5484**，是之前模型的两倍多。
- en: The **CNN+Transformer+MFE model** takes this further by improving **morphological
    awareness**. The heatmap now extends to the **nose and muzzle**, capturing nuanced
    traits like facial length and mouth shape. These are subtle but important cues
    that help distinguish herding breeds from one another.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: '**CNN+Transformer+MFE模型**通过提高**形态意识**进一步发展。热图现在扩展到了**鼻子和鼻尖**，捕捉到了面部长度和嘴型等细微特征。这些是微妙但重要的线索，有助于区分不同的牧羊品种。'
- en: The MFE module seems to guide the model toward **structural combinations**,
    not just isolated features. As a result, confidence increases again to **0.5693**,
    showing a more stable, breed-specific understanding.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: MFE模块似乎引导模型向**结构组合**方向发展，而不仅仅是孤立的特征。因此，置信度再次上升到**0.5693**，显示出更稳定、品种特定的理解。
- en: This progression from a narrow focus on a single eye, to integrating facial
    traits, and finally to interpreting structural morphology, highlights how hybrid
    models support **more accurate and generalizable visual reasoning**.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 从对单个眼睛的狭窄关注，到整合面部特征，最后到解释结构形态，这一进展突出了混合模型如何支持**更准确和可推广的视觉推理**。
- en: '![](../Images/4658ec8f3aed754c8309cc9edf8e8ab8.png)![](../Images/acfc4083bb63b302278c068774ddbc46.png)![](../Images/f5253e5b25088902c1746cd171521a3b.png)In
    this example, the **CNN-only model** focuses almost entirely on one side of the
    dog’s face. The rest of the image is nearly ignored. This kind of narrow attention
    suggests the model didn’t have enough visual context to make a strong decision.
    It guessed correctly this time, but with a low confidence score of **0.2238**,
    it’s clear that the prediction wasn’t based on solid reasoning.'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: '![](../Images/4658ec8f3aed754c8309cc9edf8e8ab8.png)![](../Images/acfc4083bb63b302278c068774ddbc46.png)![](../Images/f5253e5b25088902c1746cd171521a3b.png)在这个例子中，**仅CNN模型**几乎完全关注狗脸的一侧。图像的其余部分几乎被忽略。这种狭窄的注意力表明模型没有足够的视觉上下文来做出强有力的决定。这次它猜对了，但置信度得分很低，为**0.2238**，显然预测不是基于坚实的推理。'
- en: The **CNN+Transformer model** shows a broader attention span, but it introduces
    a different issue, the heatmap becomes scattered. You can even spot a strong attention
    spike on the far right, completely unrelated to the dog. This kind of misplaced
    focus likely led to a misclassification as a **Shiba Inu**, and the confidence
    score was still low at **0.2305**.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: '**CNN+Transformer模型**显示出更广泛的注意力范围，但它引入了一个不同的问题，热图变得分散。你甚至可以在最右边发现一个强烈的注意力峰值，这与狗完全无关。这种错误的关注可能导致将其误分类为**柴犬**，并且置信度得分仍然很低，为**0.2305**。'
- en: 'This highlights an important point:'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 这突出了一个重要的观点：
- en: '**Adding a Transformer doesn’t guarantee better judgment** unless the model
    learns where to look. Without guidance, self-attention can amplify the wrong signals
    and create confusion rather than clarity.'
  id: totrans-299
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**添加Transformer并不能保证更好的判断**，除非模型学会了看哪里。没有指导，自注意力可能会放大错误信号，造成混乱而不是清晰。'
- en: With the **CNN+Transformer+MFE model**, the attention becomes more focused and
    structured. The model now looks at key regions like the eyes, nose, and chest,
    building a more meaningful understanding of the image. But even here, the confidence
    remains low at **0.1835**, despite the correct prediction. This image clearly
    presented a real challenge for all three models.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 使用**CNN+Transformer+MFE模型**，注意力变得更加集中和结构化。模型现在关注关键区域，如眼睛、鼻子和胸部，构建了对图像的更有意义的理解。但即使在这里，置信度仍然很低，为**0.1835**，尽管做出了正确的预测。这张图片显然对所有三个模型都是一个真正的挑战。
- en: That’s what makes this case so interesting.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么这个案例如此有趣。
- en: It reminds us that a correct prediction doesn’t always mean the model was confident.
    In harder scenarios unusual poses, subtle features, cluttered backgrounds even
    the most advanced models can hesitate.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 这提醒我们，正确的预测并不总是意味着模型有信心。在更困难的场景中，不寻常的姿势、细微的特征、杂乱的背景，即使是最高级的模型也可能犹豫。
- en: And that’s where confidence scores become invaluable.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是信心评分变得无价的地方。
- en: They help flag uncertain cases, making it easier to design review pipelines
    where human experts can step in and verify tricky predictions.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 它们有助于标记不确定的案例，使得设计审查流程更容易，其中人类专家可以介入并验证棘手的预测。
- en: '**5.2.3 Recognizing Artistic Renderings: Testing the Limits of Generalization**'
  id: totrans-305
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**5.2.3 识别艺术渲染：测试泛化极限**'
- en: '![](../Images/65a3bfb707aaf63780fe2d0b8aee166d.png)![](../Images/2bf0495b88c36e2e17fc541b97f5768c.png)![](../Images/515c41abd189a291c6953452a37a803d.png)'
  id: totrans-306
  prefs: []
  type: TYPE_IMG
  zh: '![图片1](../Images/65a3bfb707aaf63780fe2d0b8aee166d.png)![图片2](../Images/2bf0495b88c36e2e17fc541b97f5768c.png)![图片3](../Images/515c41abd189a291c6953452a37a803d.png)'
- en: Artistic images pose a unique challenge for visual recognition systems. Unlike
    standard photos with crisp textures and clear lighting, painted artworks are often
    abstract and distorted. This forces models to rely less on superficial cues and
    more on deeper, structural understanding. In that sense, they serve as a perfect
    stress test for generalization.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 艺术图像对视觉识别系统构成了独特的挑战。与具有清晰纹理和清晰照明的标准照片不同，绘画作品通常是抽象和扭曲的。这迫使模型减少对表面线索的依赖，更多地依赖更深层次的结构理解。从这个意义上说，它们成为对泛化能力的完美压力测试。
- en: Let’s see how the three models handle this scenario.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这三个模型如何处理这种场景。
- en: Starting with the **CNN-only model**, the attention map is scattered, with focus
    diffused across both sides of the image. There’s no clear structure — just a vague
    attempt to “see everything,” which usually means the model is unsure what to focus
    on. That uncertainty is reflected in its confidence score of **0.5394**, sitting
    in the lower-mid range. The model makes the correct guess, but it’s far from confident.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 从**仅CNN模型**开始，注意力图分散，焦点在图像的两侧扩散。没有明显的结构——只是模糊地尝试“看到一切”，这通常意味着模型不确定应该关注什么。这种不确定性反映在其自信评分**0.5394**上，位于中下范围。模型做出了正确的猜测，但远非自信。
- en: Next, the **CNN+Transformer model** shows a clear improvement. Its attention
    sharpens and clusters around more meaningful regions, particularly near the eyes
    and ears. Even with the stylized brushstrokes, the model seems to infer, “this
    could be an ear” or “that looks like the facial outline.” It’s starting to map
    anatomical cues, not just visual textures. The confidence score rises to **0.6977**,
    suggesting a more structured understanding is taking shape.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，**CNN+Transformer模型**显示出明显的改进。其注意力变得更加锐利，并聚集在更有意义的区域周围，尤其是在眼睛和耳朵附近。即使有风格化的笔触，模型似乎在推断，“这可能是一只耳朵”或“那看起来像面部轮廓。”它开始映射解剖线索，而不仅仅是视觉纹理。自信评分上升到**0.6977**，表明更结构化的理解正在形成。
- en: Finally, we look at the **CNN+Transformer+MFE hybrid model**. This one locks
    in with precision. The heatmap centers tightly on the intersection of the eyes
    and nose — arguably the most distinctive and stable region for identifying a Border
    Collie, even in abstract form. It’s no longer guessing based on appearance. It’s
    reading the dog’s underlying structure.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们来看一下**CNN+Transformer+MFE混合模型**。这个模型锁定得非常精确。热图紧密地集中在眼睛和鼻子的交汇处——这可以说是识别边境牧羊犬最独特且最稳定的区域，即使在抽象形式下也是如此。它不再是基于外观的猜测，而是在阅读狗的潜在结构。
- en: This leap is largely thanks to the MFE, which helps the model focus on **features
    that persist**, even when style or detail varies. The result? A confident score
    of **0.7457**, the highest among all three.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 这一大步很大程度上归功于MFE，它帮助模型专注于**持久性特征**，即使风格或细节发生变化。结果？一个自信的评分**0.7457**，在三者中是最高的。
- en: 'This experiment makes something clear:'
  id: totrans-313
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这个实验清楚地表明：
- en: ''
  id: totrans-314
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Hybrid models don’t just get better at recognition, they get better at reasoning.**'
  id: totrans-315
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**混合模型不仅提高了识别能力，还提高了推理能力**。'
- en: 'They learn to look past visual noise and focus on what matters most: structure,
    proportion, and pattern. And that’s what makes them reliable, especially in the
    unpredictable, messy real world of images.'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 它们学会了超越视觉噪声，专注于最重要的东西：结构、比例和模式。这就是它们可靠的原因，尤其是在不可预测、混乱的真实图像世界中。
- en: '**Conclusion**'
  id: totrans-317
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**结论**'
- en: 'As deep learning evolves, we’ve moved from **CNNs** to **Transformers**—and
    now toward **hybrid architectures** that combine the best of both. This shift
    reflects a broader change in AI design philosophy: from seeking purity to embracing
    fusion.'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 随着深度学习的发展，我们已经从 **CNNs** 转向 **Transformers**，现在正朝着结合两者最佳之处的 **混合架构** 发展。这种转变反映了人工智能设计哲学的更广泛变化：从寻求纯粹性到拥抱融合。
- en: Think of it like cooking. Great chefs don’t insist on one technique. They mix
    sautéing, boiling, and frying depending on the ingredient. Similarly, hybrid models
    combine different architectural “flavors” to suit the task at hand.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下就像烹饪。伟大的厨师不会坚持一种技术。他们会根据食材混合煎、煮和炸。同样，混合模型结合不同的架构“风味”以适应手头的任务。
- en: 'This fusion design offers several key benefits:'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 这种融合设计提供了几个关键的好处：
- en: '**Complementary strengths**: Like combining a microscope and a telescope, hybrid
    models capture both fine details and global context.'
  id: totrans-321
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**互补优势**：就像结合显微镜和望远镜一样，混合模型捕捉了细微的细节和全局的上下文。'
- en: '**Structured understanding**: Morphological feature extractors bring expert-level
    domain insights, allowing models not just to see, but to truly understand.'
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化理解**：形态学特征提取器带来了专家级的领域洞察，使模型不仅能看到，而且能真正理解。'
- en: '**Dynamic adaptability**: Future models might adjust internal attention patterns
    based on the image, emphasizing texture for spotted breeds, or structure for solid-colored
    ones.'
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态适应性**：未来的模型可能会根据图像调整内部注意力模式，强调斑点的纹理，或者对单色品种强调结构。'
- en: '**Wider applicability**: From medical imaging to biodiversity and art authentication,
    any task involving fine-grained visual distinctions can benefit from this approach.'
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更广泛的应用性**：从医学成像到生物多样性和艺术品鉴定，任何涉及精细视觉区分的任务都可以从这种方法中受益。'
- en: This visual system—blending ConvNeXtV2, attention mechanisms, and morphological
    reasoning proves that accuracy and intelligence don’t come from any single architecture,
    but from the right combination of ideas.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 这个视觉系统——结合了ConvNeXtV2、注意力机制和形态推理，证明了准确性和智能并非来自任何单一架构，而是来自正确组合的想法。
- en: Perhaps the future of AI won’t rely on one perfect design, but on learning to
    combine cognitive strategies just as the human brain does.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 也许人工智能的未来不会依赖于一个完美的设计，而是学习像人脑一样结合认知策略。
