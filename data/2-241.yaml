- en: Grad-CAM from Scratch with PyTorch Hooks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 PyTorch Hooks 从头开始实现 Grad-CAM
- en: 原文：[https://towardsdatascience.com/grad-cam-from-scratch-with-pytorch-hooks/](https://towardsdatascience.com/grad-cam-from-scratch-with-pytorch-hooks/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/grad-cam-from-scratch-with-pytorch-hooks/](https://towardsdatascience.com/grad-cam-from-scratch-with-pytorch-hooks/)
- en: <mdspan datatext="el1750139294583" class="mdspan-comment">A self-driving</mdspan>
    car stops suddenly. Worryingly, there is no stop sign in sight. The engineers
    can only make guesses as to why the car’s neural network became confused. It could
    be a tumbleweed rolling across the street, a car coming down the other lane or
    the red billboard in the background. To find the real reason, they turn to **Grad-CAM**
    [1].
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1750139294583" class="mdspan-comment">一辆自动驾驶</mdspan>汽车突然停车。令人担忧的是，附近没有看到停车标志。工程师们只能猜测汽车神经网络为什么会困惑。可能是滚过街道的蓬草，另一条车道上驶来的汽车，或者是背景中的红色广告牌。为了找到真正的原因，他们转向
    **Grad-CAM** [1]。
- en: '[Grad-CAM](https://adataodyssey.com/grad-cam/) is an **explainable AI (XAI)**
    technique that helps reveal *why* a convolutional neural network (CNN) made a
    particular decision. The method produces a **heatmap** that highlights the regions
    in an image that are the most important for a prediction. For our self-driving
    car example, this could show if the pixels from the weed, car or billboard caused
    the car to stop.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '[Grad-CAM](https://adataodyssey.com/grad-cam/) 是一种 **可解释人工智能 (XAI**) 技术，它有助于揭示卷积神经网络
    (CNN) 做出特定决策的原因。该方法生成一个 **热图**，突出显示图像中对预测最重要的区域。以我们的自动驾驶汽车为例，这可能显示杂草、汽车或广告牌的像素是否导致了汽车停车。'
- en: Now, Grad-CAM is one of many [XAI methods for Computer Vision](https://adataodyssey.com/xai-for-cv/).
    Due to its speed, flexibility and reliability, it has quickly become one of the
    most popular. It has also inspired many related methods. So, if you are interested
    in XAI, it is worth understanding exactly how this method works. To do that, we
    will be implementing Grad-CAM from scratch using Python.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，Grad-CAM 是众多 [计算机视觉的 XAI 方法](https://adataodyssey.com/xai-for-cv/) 之一。由于其速度、灵活性和可靠性，它迅速成为最受欢迎的方法之一。它还激发了众多相关方法。因此，如果你对
    XAI 感兴趣，了解这种方法是如何工作的非常有价值。为此，我们将使用 Python 从头开始实现 Grad-CAM。
- en: Specifically, we will be relying on **PyTorch Hooks**. As you will see, these
    allow us to dynamically extract **gradients** and **activations** from a network
    during forward and backwards passes. These are practical skills that will not
    only allow you to implement Grad-CAM but also any gradient-based XAI method. See
    the full project on [GitHub](https://github.com/a-data-odyssey/XAI-for-CV/blob/main/src/gradient/grad-cam-from-scratch.ipynb).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，我们将依赖 **PyTorch Hooks**。正如你将看到的，这些允许我们在前向和反向传递过程中动态提取 **梯度** 和 **激活**。这些是实用的技能，不仅允许你实现
    Grad-CAM，还可以实现任何基于梯度的 XAI 方法。查看 GitHub 上的完整项目 [GitHub](https://github.com/a-data-odyssey/XAI-for-CV/blob/main/src/gradient/grad-cam-from-scratch.ipynb)。
- en: The theory behind Grad-CAM
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Grad-CAM 的理论
- en: Before we get to the code, it is worth touching on the theory behind Grad-CAM.
    If you want a deep dive, then check out the video below. If you want to learn
    about other methods, then see this free [XAI for Computer Vision course](https://adataodyssey.com/xai-for-cv/).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们进入代码之前，值得探讨 Grad-CAM 背后的理论。如果你想深入了解，请查看下面的视频。如果你想了解其他方法，请参见这个免费的 [计算机视觉 XAI
    课程](https://adataodyssey.com/xai-for-cv/)。
- en: To summarise, when creating Grad-CAM heatmaps, we start with a trained CNN.
    We then do a forward pass through this network with a single sample image. This
    will activate all convolutional layers in the network. We call these **feature
    maps** **($A^k$)**. They will be a collection of 2D matrices that contain different
    features detected in the sample image.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，在创建 Grad-CAM 热图时，我们从一个训练好的 CNN 开始。然后我们使用单个样本图像通过这个网络进行前向传递。这将激活网络中的所有卷积层。我们称这些为
    **特征图** **($A^k$**)。它们将是一组包含在样本图像中检测到的不同特征的 2D 矩阵。
- en: With Grad-CAM, we are typically interested in the maps from the last convolutional
    layer of the network. When we apply the method to **VGG16**, you will see that
    its final layer has **512 feature maps**. We use these as they contain features
    with the most detailed semantic information while still retaining spatial information.
    In other words, they tell us what was used for a prediction and where in the image
    it was taken from.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Grad-CAM，我们通常对网络的最后一层卷积层的映射感兴趣。当我们将此方法应用于 **VGG16** 时，你会看到其最终层有 **512 个特征图**。我们使用这些特征图，因为它们包含具有最详细语义信息的同时仍保留空间信息的特征。换句话说，它们告诉我们用于预测的内容以及图像中的位置。
- en: The problem is that these maps also contain features that are important for
    other classes. To mitigate this, we follow the process shown in **Figure 1**.
    Once we have the feature maps (**$A^k$**), we weight them by how important they
    are to the class of interest (**$y_c$**). We do this using **$a_k^c$** — the average
    gradient of the score for $y_c$ w.r.t. to the elements in the feature map. We
    then do **element-wise summation**. For VGG16, you will see we go from 512 maps
    of 14×14 pixels to a single 14×14 map.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于这些图也包含对其他类别重要的特征。为了减轻这种情况，我们遵循**图1**中显示的过程。一旦我们有了特征图（**$A^k$**），我们就根据它们对感兴趣类（**$y_c$**）的重要性进行加权。我们使用**$a_k^c$**——$y_c$相对于特征图中元素的分数的平均梯度来完成这项工作。然后我们进行**逐元素求和**。对于VGG16，您将看到我们是从14×14像素的512个图转换到单个14×14图。
- en: '![](../Images/43e493a9abcfd904b6fe478a08f1cdc1.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/43e493a9abcfd904b6fe478a08f1cdc1.png)'
- en: 'Figure 1: element-wise summation of the weighted feature maps from the last
    convolutional layer in a CNN (source: author)'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1**：CNN中最后卷积层的加权特征图的逐元素求和（来源：作者）'
- en: The gradients for an individual element (**$\frac{\partial y^c}{\partial A_{ij}^k}$**)
    tell us how much the score will change with a small change in the element. This
    means that large average gradients indicate that the entire feature map was important
    and should contribute more to the final heatmap. So, when we weight and sum the
    maps, the ones that contain features for other classes will likely contribute
    less.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 单个元素（**$\frac{\partial y^c}{\partial A_{ij}^k}$**）的梯度告诉我们，当元素发生微小变化时，分数将如何变化。这意味着大的平均梯度表明整个特征图都很重要，应该对最终热图做出更多贡献。因此，当我们对图进行加权和求和时，包含其他类别特征的图可能贡献较少。
- en: The final steps are to apply the ReLU activation function to ensure all negative
    elements will have a value of zero. Then we upsample with interpolation so the
    heatmap has the same dimensions as the sample image. The final map is summarised
    by the formula below. You might recognise it from the Grad-CAM paper [1].
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的步骤是应用ReLU激活函数，以确保所有负元素都将具有零值。然后我们使用插值上采样，以便热图与样本图像具有相同的尺寸。最终图由下面的公式总结。您可能从Grad-CAM论文[1]中认出它。
- en: $$ L_{Grad-CAM}^c = ReLU\left( \sum_{k} a_k^c A^k \right) $$
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: $$ L_{Grad-CAM}^c = ReLU\left( \sum_{k} a_k^c A^k \right) $$
- en: Grad-CAM from Scratch
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从零开始实现Grad-CAM
- en: Don’t worry if the theory is not completely clear. We will walk through it step
    by step as we apply the method from scratch. You can find the full project on
    [GitHub](https://github.com/a-data-odyssey/XAI-for-CV/blob/main/src/gradient/grad-cam-from-scratch.ipynb).
    To start, we have our imports below. These are all common imports for computer
    vision problems.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果理论不是完全清楚，请不要担心。我们将一步一步地讲解，当我们从零开始应用这种方法时。您可以在[GitHub](https://github.com/a-data-odyssey/XAI-for-CV/blob/main/src/gradient/grad-cam-from-scratch.ipynb)上找到完整的项目。首先，我们下面有我们的导入。这些都是计算机视觉问题中常见的导入。
- en: '[PRE0]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Load pretrained model from PyTorch
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从PyTorch加载预训练模型
- en: We’ll be applying Grad-CAM to **VGG16** pretrained on **[ImageNet](https://www.image-net.org/)**.
    To help, we have the two functions below. The first will format an image in the
    correct way for input into the model. The normalisation values used are the mean
    and standard deviation of the images in ImageNet. The **224×224** size is also
    standard for ImageNet models.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将应用Grad-CAM到在**[ImageNet](https://www.image-net.org/)**上预训练的**VGG16**。为了帮助，我们提供了下面的两个函数。第一个函数将以正确的方式格式化图像，以便将其输入到模型中。使用的归一化值是ImageNet中图像的均值和标准差。**224×224**的大小也是ImageNet模型的常规尺寸。
- en: '[PRE1]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: ImageNet has many classes. The second function will format the output of the
    model so we display the classes with the highest predicted probabilities.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: ImageNet有很多类别。第二个函数将格式化模型的输出，以便我们显示预测概率最高的类别。
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We now load the [pretrained VGG16 model](https://docs.pytorch.org/vision/main/models/generated/torchvision.models.vgg16.html)
    (line 2), move it to a GPU (lines 5-8) and set it to evaluation mode (line 11).
    You can see a snippet of the model output in **Figure 2**. VGG16 is made of **16
    weighted layers**. Here, you can see the last 2 of 13 convolutional layers and
    the 3 fully connected layers.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在加载[预训练的VGG16模型](https://docs.pytorch.org/vision/main/models/generated/torchvision.models.vgg16.html)（第2行），将其移动到GPU（第5-8行）并设置为评估模式（第11行）。您可以在**图2**中看到模型输出的一个片段。VGG16由**16个加权层**组成。在这里，您可以看到13个卷积层中的最后两个和3个全连接层。
- en: '[PRE3]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The names you see in **Figure 2** are important. Later, we will use them to
    reference a specific layer in the network to access its activations and gradients.
    Specifically, we will use *model.features[28]*. This is the final convolutional
    layer in the network. As you can see in the snapshot, this layer contains 512
    feature maps.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**图2**中您看到的名称很重要。稍后，我们将使用它们来引用网络中的特定层以访问其激活和梯度。具体来说，我们将使用*model.features[28]*。这是网络中的最后一个卷积层。如您在快照中看到的，这个层包含512个特征图。'
- en: '![](../Images/6b48bc0cb37a9abbe597a038b71f0d06.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6b48bc0cb37a9abbe597a038b71f0d06.png)'
- en: 'Figure 2: snapshot of final layers of the VGG16 network (source: author)'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：VGG16网络最终层的快照（来源：作者）
- en: Forward pass with sample image
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带有样本图像的前向传递
- en: We will be explaining a prediction from this model. To do this, we need a sample
    image that will be fed into the model. We downloaded one from Wikipedia Commons
    (lines 2-3). We then load it (lines 5-6), crop it to have equal height and width
    (line 7) and display it (lines 9-10). In **Figure 3**, you can see we are using
    an image of a **whale shark** in an aquarium.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将解释这个模型的预测。为此，我们需要一个将被输入到模型中的样本图像。我们从维基百科共享下载了一个（第2-3行）。然后我们加载它（第5-6行），将其裁剪为等高和等宽（第7行）并显示它（第9-10行）。在**图3**中，您可以看到我们使用的是水族馆中**鲸鲨**的图像。
- en: '[PRE4]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![One of two resident male whale sharks in the Georgia Aquarium in the United
    States.](../Images/2b3870e02d4d76c88902487b762bba6a.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![美国乔治亚水族馆中居住的两条雄性鲸鲨之一](../Images/2b3870e02d4d76c88902487b762bba6a.png)'
- en: 'Figure 3: male whale shark in aquarium (source: [Wikimedia commons](https://commons.wikimedia.org/wiki/File:Male_whale_shark_at_Georgia_Aquarium.jpg))
    (license: [CC BY-SA 2.5](https://creativecommons.org/licenses/by-sa/2.5/))'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：水族馆中的雄性鲸鲨（来源：[维基媒体共享](https://commons.wikimedia.org/wiki/File:Male_whale_shark_at_Georgia_Aquarium.jpg))（许可：[CC
    BY-SA 2.5](https://creativecommons.org/licenses/by-sa/2.5/))
- en: ImageNet has no dedicated class for whale sharks, so it will be interesting
    to see what the model predicts. To do this, we start by processing our image (line
    2) and moving it to the GPU (line 3). We then do a forward pass to get a prediction
    (line 6) and display the top 5 probabilities (line 7). You can see these in **Figure
    4**.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: ImageNet没有为鲸鲨设置专门的类别，因此将很有趣地看到模型会做出什么预测。为此，我们首先处理我们的图像（第2行）并将其移动到GPU（第3行）。然后我们进行前向传递以获取预测（第6行）并显示前5个概率（第7行）。您可以在**图4**中看到这些内容。
- en: '[PRE5]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Given the available classes, these seem reasonable. They are all marine life
    and the top two are sharks. Now, let’s see how we can explain this prediction.
    We want to understand what regions of the image contribute the most to the highest
    predicted class — **hammerhead**.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到可用的类别，这些看起来是合理的。它们都是海洋生物，前两个是鲨鱼。现在，让我们看看我们如何解释这个预测。我们希望了解图像的哪些区域对最高预测类别——**锤头鲨**——的贡献最大。
- en: '![](../Images/17219182b83f7591f2ce071208b92692.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/17219182b83f7591f2ce071208b92692.png)'
- en: 'Figure 4: top 5 predicted classes of the example image of the whale shark using
    VGG16 (source: author)'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：使用VGG16对鲸鲨示例图像的前5个预测类别（来源：作者）
- en: PyTorch hooks naming conventions
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: PyTorch钩子命名规范
- en: Grad-CAM heatmaps are created using both activations from a forward pass and
    gradients from a backwards pass. To access these, we will use PyTorch hooks. These
    are functions that allow you to save the inputs and outputs of a layer. We won’t
    do it here, but they even allow you to alter these aspects. For example, [Guided
    Backpropagation](https://adataodyssey.com/guided-backpropagation/) can be applied
    by ensuring only positive gradients are propagated using a backwards hook.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: Grad-CAM热图是使用前向传递的激活和反向传递的梯度创建的。要访问这些，我们将使用PyTorch钩子。这些是允许您保存层输入和输出的函数。我们在这里不会这样做，但它们甚至允许您更改这些方面。例如，通过确保仅使用反向钩子传播正梯度，可以应用[引导反向传播](https://adataodyssey.com/guided-backpropagation/)。
- en: You can see some examples of these functions below. A *forwards_hook* will be
    called during a forward pass. It will be registered on a given module (i.e. layer).
    By default, the function receives three arguments — the module, its input and
    its output. Similarly, a *backwards_hook* is triggered during a backwards pass
    with the module and gradients of the input and output.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一些这些函数的示例。一个*forwards_hook*将在前向传递期间被调用。它将注册在给定的模块（即层）上。默认情况下，该函数接收三个参数——模块、其输入和其输出。同样，一个*backwards_hook*将在反向传递期间触发，与模块以及输入和输出的梯度相关。
- en: '[PRE6]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'To avoid confusion, let’s clarify the parameter names used by these functions.
    Take a look at the overview of the standard backpropagation procedure for a convolutional
    layer in **Figure 5**. This layer consists of a set of kernels, $K$, and biases,
    $b$. The other parts are the:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免混淆，让我们明确这些函数使用的参数名称。请参阅 **图 5** 中卷积层标准反向传播过程的概述。这个层由一组核 $K$ 和偏置 $b$ 组成。其他部分包括：
- en: '*input* – a set of feature maps or an image'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*input* – 一组特征图或一张图像'
- en: '*output* – set of feature maps'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*output* – 一组特征图'
- en: '*grad_in* is the gradient of the loss w.r.t. the layer’s input.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*grad_in* 是相对于层输入的损失梯度。'
- en: '*grad_out* is the gradient of the loss w.r.t. the layer’s output.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*grad_out* 是相对于层输出的损失梯度。'
- en: We have labelled these using the same names of the arguments used to call the
    hook functions that we apply later.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用与调用后续钩子函数相同的参数名称来标记这些内容。
- en: '![](../Images/d26d6e2b6810b296746f20d19b38765c.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d26d6e2b6810b296746f20d19b38765c.png)'
- en: 'Figure 5: Backpropagation for a convolutional layer in a deep learning model.
    The blue arrows show the forward pass and the red arrows show the backwards pass.
    (source: author)'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5：深度学习模型中卷积层的反向传播。蓝色箭头表示前向传递，红色箭头表示反向传递。（来源：作者）
- en: Keep in mind, we won’t use the gradients in the same way as backpropagation.
    Usually, we use the gradients of a *batch* of images to update $K$ and $b$. Now,
    we are only interested in *grad_out* of a *single* sample image. This will give
    us the gradients of the elements in the layer’s feature maps. In other words,
    the gradients we use to weight the feature maps.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，我们不会像反向传播那样使用梯度。通常，我们使用一批图像的梯度来更新 $K$ 和 $b$。现在，我们只对单个样本图像的 *grad_out* 感兴趣。这将给出层特征图中元素的梯度。换句话说，我们使用的梯度是用来加权特征图的。
- en: Activations with PyTorch forward hook
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 PyTorch 前向钩子激活
- en: Our VGG16 network has been created using ReLU with *inplace=True.* These modify
    tensors in memory, so the original values are lost. That is, tensors used as input
    are overwritten by the ReLU function. This can lead to problems when applying
    hooks, as we may need the original input. So we use the code below to replace
    all ReLU functions with *inplace=False* ones. This will not impact the output
    of the model, but it will increase its memory usage.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 ReLU（*inplace=True.*）创建了 VGG16 网络。这些修改内存中的张量，因此原始值会丢失。也就是说，用作输入的张量会被 ReLU
    函数覆盖。这可能导致在使用钩子时出现问题，因为我们可能需要原始输入。因此，我们使用下面的代码将所有 ReLU 函数替换为 *inplace=False* 的版本。这不会影响模型的输出，但会增加其内存使用。
- en: '[PRE7]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Below we have our first hook function — *save_activations*. This will append
    the output from a module (line 6) to a list of activations (line 2). In our case,
    we will only register the hook onto one module (i.e. the last convolutional layer),
    so this list will only contain one element. Notice how we format the output (line
    6). We detach it from the [computational graph](https://pytorch.org/blog/computational-graphs-constructed-in-pytorch/)
    so the network is not affected. We also format them as a numpy array and squeeze
    the batch dimension.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们的第一个钩子函数 — *save_activations*。这会将模块的输出（第 6 行）追加到激活列表（第 2 行）中。在我们的情况下，我们只会在一个模块上注册钩子（即最后一个卷积层），因此这个列表只会包含一个元素。注意我们如何格式化输出（第
    6 行）。我们将其从 [计算图](https://pytorch.org/blog/computational-graphs-constructed-in-pytorch/)
    中分离出来，这样网络就不会受到影响。我们还将其格式化为 numpy 数组并压缩批量维度。
- en: '[PRE8]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: To use the hook function, we register it on the last convolutional layer — *model.features[28].*
    This is done using the *register_forward_hook* function.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用钩子函数，我们需要在最后一个卷积层上注册它 — *model.features[28].* 这是通过使用 *register_forward_hook*
    函数完成的。
- en: '[PRE9]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Now, when we do a forward pass (line 2), the *save_activations* hook function
    will be called for this layer. In other words, its output will be saved to the
    *activations* list.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当我们进行前向传递（第 2 行）时，*save_activations* 钩子函数将为此层调用。换句话说，其输出将被保存到 *activations*
    列表中。
- en: '[PRE10]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Finally, it is good practice to remove the hook function when it is no longer
    needed (line 2). This means the forward hook function will not be triggered if
    we do another forward pass.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，当不再需要钩子函数时，删除钩子函数是一种良好的实践（第 2 行）。这意味着如果我们再次进行前向传递，前向钩子函数将不会被触发。
- en: '[PRE11]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The shape of these activations is **(512, 14, 14)**. In other words, we have
    512 feature maps and each map is 14×14 pixels. You can see some examples of these
    in **Figure 6**. Some of these maps may contain features important for other classes
    or those that decrease the probability of the predicted class. So let’s see how
    we can find gradients to help identify the most important maps.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这些激活的形状是 **(512, 14, 14)**。换句话说，我们有 512 个特征图，每个图是 14×14 像素。您可以在 **图 6** 中看到一些示例。其中一些图可能包含对其他类别重要的特征或那些降低预测类别概率的特征。因此，让我们看看我们如何找到梯度来帮助我们识别最重要的图。
- en: '[PRE12]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![](../Images/e1b0b27c1df3a37c044793ed3bafe672.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e1b0b27c1df3a37c044793ed3bafe672.png)'
- en: 'Figure 6: example of activated feature maps from the last convolutional layer
    of the network (source: author)'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6：网络最后一层卷积层的激活特征图示例（来源：作者）
- en: Gradients with PyTorch backwards hooks
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 PyTorch 反向钩子计算梯度
- en: To get gradients, we follow a similar process to before. The key difference
    is that we now use the *register_full_backward_hook* to register the *save_gradients*
    function (line 7). This will ensure that it is called during a backwards pass.
    Importantly, we do the backwards pass (line 16) from the output for the class
    with the highest score (line 13). This effectively sets the score for this class
    to 1 and all other scores to 0\. In other words, we get the gradients of the hammerhead
    class w.r.t. to the elements of the feature maps.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取梯度，我们遵循与之前类似的过程。关键区别在于我们现在使用 `*register_full_backward_hook*` 来注册 `*save_gradients*`
    函数（第 7 行）。这将确保它在反向传播期间被调用。重要的是，我们从具有最高分数的类的输出（第 13 行）进行反向传播（第 16 行）。这实际上将这个类别的分数设置为
    1，而所有其他分数设置为 0。换句话说，我们得到了锤头类相对于特征图元素的梯度。
- en: '[PRE13]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: We will have a gradient for every element of the feature maps. So, again, the
    shape is **(512, 14, 14)**. **Figure 7** visualises some of these. You can see
    some tend to have higher values. However, we are not so concerned with the individual
    gradients. When we create a Grad-CAM heatmap, we will use the average gradient
    of each feature map.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将为特征图的每个元素都有一个梯度。所以，再次，形状是 **(512, 14, 14)**。**图 7** 可视化了一些这些梯度。您可以看到一些倾向于有更高的值。然而，我们并不那么关心单个梯度。当我们创建
    Grad-CAM 热图时，我们将使用每个特征图的平均梯度。
- en: '[PRE14]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '![](../Images/2c27a22bcaecae3c856c894d4277c6e5.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2c27a22bcaecae3c856c894d4277c6e5.png)'
- en: 'Figure 7: gradients of the score w.r.t. to the elements of feature maps in
    the last convolutional layer (source: author)'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7：与最后一层卷积层中特征图元素相关的梯度（来源：作者）
- en: Finally, before we move on, it is good practice to reset the model’s gradients
    (line 2). This is particularly important if you plan to run the code for multiple
    images, as gradients can be accumulated with each backwards pass.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在我们继续之前，重置模型的梯度（第 2 行）是一个好的实践。如果您计划对多张图片运行代码，这尤其重要，因为梯度可以在每次反向传播中累积。
- en: '[PRE15]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Creating Grad-CAM heatmaps
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建 Grad-CAM 热图
- en: First, we find the **mean gradients** for each feature map. There will be 512
    of these average gradients. Plotting a histogram of them, you can see most tend
    to be around 0\. In other words, these don’t have much impact on the predicted
    score. There are a few that tend to have a negative impact and a positive impact.
    It is these feature maps we want to give more weight to.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们为每个特征图找到 **平均梯度**。将有 512 个这样的平均梯度。绘制它们的直方图，您可以看到大多数倾向于在 0 附近。换句话说，这些对预测分数的影响不大。有一些倾向于有负面影响和正面影响。我们想要给予这些特征图更多权重。
- en: '[PRE16]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '![](../Images/ce37e3e91403c2b60d0b23d281e43b6b.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ce37e3e91403c2b60d0b23d281e43b6b.png)'
- en: 'Figure 8: histogram of average gradients (source: author)'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8：平均梯度的直方图（来源：作者）
- en: We combine all the activations by doing **element-wise summation** (lines 2-4).
    When we do this, we weight each feature map by its average gradient (line 3).
    In the end, we will have one 14×14 array.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过进行 **逐元素求和**（第 2-4 行）来组合所有激活。当我们这样做时，我们将每个特征图按其平均梯度加权（第 3 行）。最后，我们将有一个 14×14
    的数组。
- en: '[PRE17]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: These weighted activations will contain both positive and negative pixels. We
    can consider the negative pixels to be suppressing the predicted score. In other
    words, an increase in the value of these regions tends to decrease the score.
    Since we are only interested in the **positive contributions**—regions that **support**
    the class prediction—we apply a **ReLU activation** to the final heatmap (line
    2). You can see the difference in the heatmaps in **Figure 9**.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这些加权激活将包含正像素和负像素。我们可以将负像素视为抑制预测分数。换句话说，这些区域值的增加往往会降低分数。由于我们只对**正贡献**感兴趣——支持类别预测的区域——我们在最终的热图上应用了一个**ReLU激活**（第2行）。您可以在**图9**中看到热图之间的差异。
- en: '[PRE18]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '![](../Images/6e534fe6d70bd8948a0b0c01cf85f2d0.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6e534fe6d70bd8948a0b0c01cf85f2d0.png)'
- en: 'Figure 9: relu of weighted activations (source: author)'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图9：加权激活的relu（来源：作者）
- en: You can see the heatmap in **Figure 9** is quite coarse. It would be more useful
    if it had the dimensions of the original image. This is why the last step for
    creating Grad-CAM heatmaps is to upsample to the dimension of the input image
    (lines 2-4). In this case, we have a **224×224** image.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以看到**图9**中的热图相当粗糙。如果它具有原始图像的尺寸，将更有用。这就是为什么创建Grad-CAM热图的最后一步是将尺寸上采样到输入图像的尺寸（第2-4行）。在这种情况下，我们有一个**224×224**的图像。
- en: '[PRE19]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '**Figure 10** gives us our final visualisation. We display the sample image
    (lines 5-7) next to the heatmap (lines 10-15). For the latter, we create a clear
    visualisation with the help of **Canny Edge detection** (line 10). This gives
    us an edge map (i.e. outline) of the sample image. We can then overlay the heatmap
    on top of this (line 14).'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**图10**为我们提供了最终的可视化。我们在热图（第10-15行）旁边显示样本图像（第5-7行）。对于后者，我们通过**Canny边缘检测**（第10行）创建了一个清晰的视觉表示。这给我们提供了一个样本图像的边缘图（即轮廓）。然后我们可以在其上叠加热图（第14行）。'
- en: '[PRE20]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Looking at our Grad-CAM heatmap, there is some noise. However, it appears the
    model is relying on the tail fin and, to a lesser extent, the pectoral fin to
    make its predictions. It is starting to make sense why the model classified this
    shark as a hammerhead. Perhaps both animals share these characteristics.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 观察我们的Grad-CAM热图，有一些噪声。然而，模型似乎依赖于尾鳍，并且在一定程度上依赖于胸鳍来做出预测。这开始让人理解为什么模型将这条鲨鱼分类为锤头鲨。也许这两种动物都有这些特征。
- en: '![](../Images/69c72acc770fe8f43fa41784886677d6.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/69c72acc770fe8f43fa41784886677d6.png)'
- en: 'Figure 10: input image (left) and grad-cam heatmap overlay on an edge map (right)
    (source: author)'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图10：输入图像（左）和grad-cam热图叠加在边缘图上（右）（来源：作者）
- en: For some further investigation, we apply the same process but now using an actual
    image of a hammerhead. In this case, the model appears to be relying on the same
    features. This is a bit concerning. Would we not expect the model to use one of
    the shark’s defining features— the hammerhead? Ultimately, this may lead VGG16
    to confuse different types of sharks.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进行进一步的研究，我们应用了相同的过程，但现在使用的是锤头鲨的实际图像。在这种情况下，模型似乎依赖于相同的特征。这有点令人担忧。我们不是期望模型使用鲨鱼的一个定义特征——锤头吗？最终，这可能导致VGG16混淆不同类型的鲨鱼。
- en: '![](../Images/fa6b9f16ca9cc20276c7d8c758d85c76.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fa6b9f16ca9cc20276c7d8c758d85c76.png)'
- en: 'Figure 11: an additional example image (source: [Wikimedia Commons](https://commons.wikimedia.org/wiki/File:Scalloped_hammerhead_cocos.jpg))
    (license: [CC BY 2.0](https://creativecommons.org/licenses/by/2.0/deed.en))'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图11：一个额外的示例图像（来源：[维基共享资源](https://commons.wikimedia.org/wiki/File:Scalloped_hammerhead_cocos.jpg)）（许可：[CC
    BY 2.0](https://creativecommons.org/licenses/by/2.0/deed.en)）
- en: With this example, we see how Grad-CAM can highlight potential flaws in our
    model. We can not only get their predictions but also understand how they made
    them. We can understand if the features used will lead to unforeseen predictions
    down the line. This can potentially save us a lot of time, money and in the case
    of more consequential applications, lives!
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这个例子，我们看到Grad-CAM如何突出我们模型中的潜在缺陷。我们不仅可以获得它们的预测，还可以了解它们是如何做出的。我们可以了解所使用的特征是否会导致未来的不可预见的预测。这可能会节省我们大量的时间、金钱，在更重要的应用中，甚至可能拯救生命！
- en: If you want to learn more about XAI for CV check out one of these articles.
    Or see this Free [XAI for CV course](https://adataodyssey.com/xai-for-cv/).
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想了解更多关于CV的XAI，请查看这些文章之一。或者查看这个免费的[XAI for CV课程](https://adataodyssey.com/xai-for-cv/)。
