- en: Does More Data Always Yield Better Performance?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 更多数据是否总是带来更好的性能？
- en: 原文：[https://towardsdatascience.com/does-more-data-always-yield-better-performance/](https://towardsdatascience.com/does-more-data-always-yield-better-performance/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/does-more-data-always-yield-better-performance/](https://towardsdatascience.com/does-more-data-always-yield-better-performance/)
- en: <mdspan datatext="el1762800191305" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762800191305" class="mdspan-comment">引言</mdspan>
- en: In data science, we strive to improve the less-than-desirable performance of
    our model as we fit the data at hand. We try techniques ranging from changing
    model complexity to data massaging and preprocessing. However, more often than
    not, we are advised to *“just”* get more data. Besides that being easier said
    than done, perhaps we should pause and question the conventional wisdom. In other
    words*,*
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学中，我们在拟合手头的数据时，努力提高我们模型的不太令人满意的性能。我们尝试从改变模型复杂性到数据按摩和预处理的各种技术。然而，更常见的情况是我们被建议**“仅仅”**获取更多数据。除了这比说起来容易做起来难之外，也许我们应该停下来质疑传统智慧。换句话说，*
- en: '*Does adding more data **always** yield better performance?*'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*增加更多数据是否**总是**带来更好的性能？*'
- en: In this article, let’s put this adage to the test using real data and a tool
    I constructed for such inquiry. We will shed light on the subtleties associated
    with data collection and expansion, challenging the notion that such endeavors
    automatically improve performance and calling for a more mindful and strategic
    practice.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将使用真实数据和我为这种调查构建的工具来检验这个谚语。我们将揭示与数据收集和扩展相关的微妙之处，挑战这种努力自动提高性能的观念，并呼吁更加谨慎和有策略的实践。
- en: What Does More Data Mean?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更多数据意味着什么？
- en: Let’s first define what we mean exactly by “more data”. In the most general
    setting, we commonly imagine data to be tabular. And when the idea of acquiring
    more data is suggested, **adding more rows** to our data frame (i.e, more data
    points or samples) is what first comes to mind.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们首先定义一下我们所说的“更多数据”究竟是什么意思。在最一般的设置中，我们通常想象数据是表格形式的。当提出获取更多数据的想法时，首先想到的是**向我们的数据框中添加更多行**（即更多数据点或样本）。
- en: However, an alternative approach would be **adding more columns** (i.e., more
    attributes or features). The first approach expands the data vertically, while
    the second does so horizontally.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，另一种方法可能是**增加更多列**（即更多属性或特征）。第一种方法在垂直方向上扩展数据，而第二种方法在水平方向上扩展。
- en: We will next consider the commonalities and peculiarities of the two approaches.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接下来将考虑两种方法的共性和特性。
- en: '![](../Images/a9ee0b90076bf74dd6bdb968c79b2235.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a9ee0b90076bf74dd6bdb968c79b2235.png)'
- en: Data can be expanded by adding more samples or more columns. (Image by author)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可以通过添加更多样本或更多列来扩展。（图片由作者提供）
- en: 'Case 1: More Samples'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例一：更多样本
- en: Let’s consider the first case of adding more samples.Does adding more samples
    *necessarily* improve model performance?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑增加更多样本的第一个案例。增加更多样本是否**必然**会提高模型性能？
- en: In an attempt to get to the bottom of it, I created a [tool hosted as a HuggingFace
    space](https://huggingface.co/spaces/elhamod/student-dropout) to target this question.
    This tool allows the user to experiment with the effects of changing the attribute
    set, the sample size, and/or model complexity when analyzing the [UCI Irvine –
    Predict Students’ Dropout and Academic Success](https://archive.ics.uci.edu/dataset/697/predict+students+dropout+and+academic+success)
    dataset [1] with a decision tree. While both the tool and the dataset are meant
    for educational purposes, we will still be able to derive valuable insights that
    generalize beyond this basic setting.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为了深入探究这个问题，我创建了一个[托管在HuggingFace空间中的工具](https://huggingface.co/spaces/elhamod/student-dropout)，以针对这个问题。这个工具允许用户在分析[UCI
    Irvine – 预测学生辍学和学术成功](https://archive.ics.uci.edu/dataset/697/predict+students+dropout+and+academic+success)数据集[1]时，通过决策树实验改变属性集、样本大小和/或模型复杂性的影响。虽然这个工具和数据集都旨在教育目的，但我们仍然能够从中获得有价值的见解，这些见解可以推广到这个基本设置之外。
- en: '![](../Images/9d52647f5b5be6b61de3eef0616e0c7e.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9d52647f5b5be6b61de3eef0616e0c7e.png)'
- en: …
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: …
- en: '![](../Images/da9027798285bad843dcdb85d3c07d2d.png)![](../Images/c32e8a13b057a6c848e84138e1a248f1.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/da9027798285bad843dcdb85d3c07d2d.png)![图片](../Images/c32e8a13b057a6c848e84138e1a248f1.png)'
- en: Feature/Depth/Sample Explorer Tool (Image generated by the author using UCI
    dataset)
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 特征/深度/样本探索工具（由作者使用UCI数据集生成）
- en: Say the school’s dean hands you some student records and asks you to identify
    the factors that predict student dropout to address the issue. You are given 1500
    data points to start with. You create a 700-data-point hidden out test set and
    you use the rest for training. The data furnished to you contains the students’
    nationalities and parents’ occupations, as well as the GDP and inflation and unemployment
    rates.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 假设学校的院长给你一些学生记录，并要求你确定预测学生辍学的因素以解决这个问题。你一开始有1500个数据点。你创建了一个700个数据点的隐藏测试集，并使用其余的进行训练。提供给你的数据包含学生的国籍和父母的职业，以及GDP和通货膨胀率以及失业率。
- en: However, the results don’t seem impressive. The F1 score is low. So, naturally,
    you ask your dean to pull some strings to **acquire more student records** (perhaps
    from prior years or other schools), which they do over a couple of weeks. You
    rerun the experiment every time you get a new batch of student records. Conventional
    wisdom suggests that adding more data steadily improves the modeling process (Test
    F1 score should increase monotonically), but that’s not what you see. **The performance
    erratically fluctuates** as more data comes in. You are confused. Why would more
    data ever hurt performance? Why did the F1 score drop from 46% down to 39% when
    one of the batches was added? Shouldn’t the relationship be causal?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，结果似乎并不令人印象深刻。F1分数很低。因此，你自然会要求你的院长拉一些关系来**获取更多学生记录**（可能是来自前几年或其他学校），他们花了几个星期时间这样做。每次你得到一批新的学生记录时，你都会重新运行实验。传统智慧认为，增加更多数据会稳步提高建模过程（测试F1分数应单调递增），但你看到的情况并非如此。随着数据的增加，性能波动不定。你感到困惑。为什么更多的数据会损害性能？为什么在添加一个批次后，F1分数从46%下降到39%？这种关系不应该是因果的吗？
- en: '![](../Images/6a654141bcaaf8fd9c7a0ee35f958492.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6a654141bcaaf8fd9c7a0ee35f958492.png)'
- en: 'Number of samples vs. performance: Even with cross-validated hyper-parameter
    tuning, both training and test F1 scores fluctuate as the number of samples increases.
    The impact of adding more samples can be messy and counter-intuitive. (Image generated
    by author using UCI dataset)'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 样本数量与性能：即使进行交叉验证的超参数调整，随着样本数量的增加，训练和测试的F1分数也会波动。增加更多样本的影响可能是混乱的，并且不符合直觉。（由作者使用UCI数据集生成的图像）
- en: 'Well, the question is really whether additional samples necessarily provide
    more information. Let’s first ponder the nature of these additional samples:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，问题是实际上是否额外的样本必然提供更多信息。让我们首先思考这些额外样本的本质：
- en: They could be **false** (i.e., a bug in data collection)
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们可能是**错误的**（即，数据收集中的错误）
- en: They could be **biased** (e.g., over-representing a special case that does not
    align with the true distribution as represented by the test set)
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们可能是**有偏见的**（例如，过度代表与测试集表示的真实分布不一致的特殊情况）
- en: The test set itself may be biased…
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试集本身可能是有偏见的…
- en: '**Spurious patterns** may be introduced by some batches and later cancelled
    by other batches.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些批次可能会引入**虚假模式**，而其他批次可能会取消这些模式。
- en: The attributes collected establish **little to no correlation or causation**
    with the target (i.e., there are lurking variables unaccounted for). So, no matter
    how many samples you add, they are not going to get you anywhere!
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 收集的属性与目标（即，存在未考虑到的潜在变量）几乎没有相关性或因果关系。因此，无论你添加多少样本，它们都不会带你走得太远！
- en: So, yes, adding more data is generally a good idea, but we must pay attention
    to **inconsistencies in the data** (e.g. two students of the same nationality
    and social status may end up on different paths due to other factors). We must
    also carefully assess **the usefulness of the available attributes** (e.g., perhaps
    GDP has nothing to do with student dropout rate).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，是的，增加更多数据通常是一个好主意，但我们必须注意**数据的不一致性**（例如，两个同国籍和社会地位的学生可能由于其他因素而走上不同的道路）。我们还必须仔细评估**可用属性的实用性**（例如，也许GDP与学生辍学率无关）。
- en: Some may argue that this would not be an issue when you have lots of real data
    (After all, this is a relatively small dataset). There is merit to that argument,
    but only if the data is well homogenized and accounts for the different variabilities
    and “degrees of freedom” of the attribute set (i.e., the range of values each
    attribute can take and the possible combinations of these values as seen in the
    real world). [Research](https://www.youtube.com/watch?v=iDSO-tyTeaM) has shown
    cases in which large datasets that are considered gold standard show biases in
    interesting and obscure ways that were not easy to spot at first glance, causing
    misleading reports of high accuracy [2].
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人可能会争辩说，当你拥有大量真实数据时，这不会成为问题（毕竟，这是一个相对较小的数据集）。这个论点有一定的道理，但前提是数据高度同质化，并考虑到属性集的不同可变性以及“自由度”（即每个属性可以取的值范围以及这些值在现实世界中的可能组合）。[研究](https://www.youtube.com/watch?v=iDSO-tyTeaM)已经展示了被认为是黄金标准的大型数据集，它们以有趣且不明显的方式表现出偏差，这些偏差在第一眼看来并不容易发现，导致误导性的高精度报告[2]。
- en: 'Case 2: More Attributes'
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例二：更多属性
- en: Now, speaking of attributes, let’s consider an alternative scenario in which
    your dean fails to acquire more student records. However, they come and say, “Hey
    you… I wasn’t able to get more student records… but I was able to use some SQL
    to get more attributes for your data… I am sure you can improve your performance
    now. Right?… Right?!”
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，说到属性，让我们考虑一个替代场景，即你的院长未能获取更多学生记录。然而，他们来了，说：“嘿，你……我没能获取更多学生记录……但我能使用一些SQL获取更多数据属性……我相信你现在可以提升你的表现了。对吧？……对吧？！”
- en: '![](../Images/0e1e2a9db8cdd7e86706650482f639b0.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0e1e2a9db8cdd7e86706650482f639b0.png)'
- en: 'Feature set vs. performance: Each vertical line shows a retraining of the decision
    tree (800 samples with cross-validated hyper-parameter tuning) with one additional
    attribute. Some attributes help (*Mother’s occupation*), while others hurt (*Father’s
    occupation* and *Gender*). More columns may sometimes mean more noise and more
    ways to overfit. (Image generated by author using UCI dataset)'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 特征集与性能：每根垂直线表示决策树（800个样本，带有交叉验证的超参数调整）的重新训练，增加了一个额外的属性。一些属性有帮助（*母亲的职业*），而其他则有害（*父亲的职业*和*性别*）。更多的列有时可能意味着更多的噪声和过拟合的方式。（由作者使用UCI数据集生成图像）
- en: Well, let’s put that to the test. Let’s look at the following example where
    we incrementally add more attributes, **expanding the students’ profile and including
    their marital, financial, and immigration statuses**. Each time we add an attribute,
    we retrain the tree and evaluate its performance. As you can see, while **some
    increments improve performance, others actually hurt it**. But again, why?
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，让我们来验证一下。让我们看看以下例子，其中我们逐步添加更多属性，**扩展学生的个人资料，包括他们的婚姻、财务和移民状态**。每次添加一个属性，我们都会重新训练树并评估其性能。正如你所看到的，**一些增量可以提高性能，而其他则实际上会损害它**。但再次问，为什么？
- en: Looking at the attribute set more closely, we find that **not all attributes
    actually carry useful information**. The real world is messy… Some attributes
    (e.g., Gender) might provide noise or false correlations in the training set that
    will not generalize well to the test set (overfitting).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细观察属性集，我们发现**并非所有属性都实际携带有用信息**。现实世界是混乱的……一些属性（例如，性别）可能在训练集中提供噪声或错误的关联，这些关联在测试集中不会很好地泛化（过拟合）。
- en: Also, while common wisdom says that as you add more data you should increase
    your model complexity, this practice does not always yield the best result. Sometimes,
    when adding an attribute, **lowering model complexity may help with overfitting**
    (e.g., when *Course* was introduced to the mix).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，虽然常识认为，随着你添加更多数据，你应该增加模型复杂性，但这种做法并不总是产生最佳结果。有时，当添加一个属性时，**降低模型复杂性可能有助于解决过拟合问题**（例如，当*课程*被引入时）。
- en: '![](../Images/bcb456bd0996e5b451303ed6c7bf61a8.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bcb456bd0996e5b451303ed6c7bf61a8.png)'
- en: 'Feature set vs. tree depth: The optimal tree depth (chosen by grid search)
    fluctuates as attributes are added. Notice that more attributes do not always
    translate to a larger tree. (Image generated by author using UCI dataset)'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 特征集与树深度：随着属性的增加，最佳树深度（通过网格搜索选择）会波动。请注意，更多的属性并不总是意味着更大的树。（由作者使用UCI数据集生成图像）
- en: Conclusion
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'Taking a step back and looking at the big picture, we see that while collecting
    more data is a noble cause, we should be careful not to automatically assume that
    performance will get better. There are two forces at play here: how well the model
    fits the training data, and how reliably that fit generalizes and extends to unseen
    data.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 退一步来看整个大局，我们会发现，虽然收集更多数据是一个崇高的目标，但我们应小心不要自动假设性能会变得更好。这里有两个作用力：模型与训练数据的拟合程度，以及这种拟合如何可靠地推广到未见数据。
- en: 'Let’s summarize how each type of “more data” influences these forces—depending
    on whether the added data is good (representative, consistent, informative) or
    bad (biased, noisy, inconsistent):'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们总结一下每种类型的“更多数据”如何影响这些力量——这取决于添加的数据是好（代表性、一致性、信息性）还是坏（有偏、噪声、不一致）：
- en: '|  | **If data quality Is good**… | **If data quality is poor**… |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '|  | **如果数据质量好**… | **如果数据质量差**… |'
- en: '| **More samples (rows)** | • Training error **may rise** slightly (more variations
    make it difficult to fit).'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '| **更多样本（行）** | • 训练误差**可能略微上升**（更多的变化使其难以拟合）。'
- en: • Test error usually **drops**. The model becomes more stable and confident.
    | • Training error **may fluctuate** due to conflicting examples.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: • 测试误差通常**下降**。模型变得更加稳定和自信。| • 训练误差**可能波动**，因为存在冲突的例子。
- en: • Test error often **rises**. |
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: • 测试误差通常**上升**。|
- en: '| **More attributes (columns)** | • Training error usually **drops** (more
    signal leads to richer representation.)'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '| **更多属性（列）** | • 训练误差通常**下降**（更多的信号导致更丰富的表示。）'
- en: • Test error **drops** as attributes encode true and generalizable patterns.
    | • Training error usually **drops** (the model memorizes noisy patterns).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: • 测试误差**下降**，因为属性编码了真实和可推广的模式。| • 训练误差通常**下降**（模型记住了噪声模式）。
- en: • Test error **rises** due to spurious correlations. |
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: • 测试误差**上升**，因为存在虚假的相关性。|
- en: Generalization isn’t just about quantity—it’s also about quality and the right
    level of model complexity.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 泛化不仅仅是关于数量，还关乎质量以及模型的正确复杂度。
- en: To wrap up, next time someone suggests that you should “simply” get more data
    to magically improve accuracy, discuss with them the intricacies of such a plan.
    Talk about the characteristics of the procured data in terms of nature, size,
    and quality. Point out the nuanced interplay between data and model complexities.
    This will help make their effort worthwhile!
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 总结一下，下次有人建议你“简单地”获取更多数据以神奇地提高准确性时，与他们讨论这个计划的复杂性。讨论所获取数据的性质、大小和质量。指出数据与模型复杂度之间细微的相互作用。这将有助于使他们的努力变得有价值！
- en: 'Lessons to Internalize:'
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要内化的教训：
- en: '**Whenever possible, don’t take others’ (or my) word for it. Experiment yourself!**'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**尽可能不要轻信别人的（或我的）说法。亲自实验！**'
- en: '**When adding more data points** for training, ask yourself: **Do these samples
    represent the phenomenon you are modeling**. Are they showing the model more interesting
    realistic cases? or are they biased and/or inconsistent?'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在添加更多训练数据点时**，问问自己：**这些样本是否代表你正在建模的现象**。它们是否向模型展示了更有趣的现实案例？或者它们是有偏的，或者不一致的？'
- en: '**When adding more attributes**, ask yourself: **Are these attributes hypothesized
    to carry information** that enhances our ability to make better predictions, or
    is it mostly noise?'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在添加更多属性时**，问问自己：**这些属性是否被假设为携带信息**，从而增强我们做出更好预测的能力，或者它们主要是噪声？'
- en: Ultimately, **conduct hyper-parameter tuning and proper validation** to eliminate
    doubts when assessing how informative the new training data is.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最终，**进行超参数调整和适当的验证**，以消除在评估新训练数据的信息量时产生的疑虑。
- en: Try it yourself!
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 亲自试试！
- en: If you’d like to explore the dynamics showcased in this article yourself, **I
    host the interactive tool [here](https://mohannadelhamod.com/the-three-way-tradeoff-model-complexity-sample-size-and-data-dimensionality/)**.
    As you experiment by adjusting the sample size, number of attributes, and/or model
    depth, you will observe the impact of these adjustments on model performance.
    Such experimentation enriches your perspective and understanding of the mechanisms
    underlying data science and analytics.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想亲自探索这篇文章中展示的动态，**我在这里提供了交互式工具[链接](https://mohannadelhamod.com/the-three-way-tradeoff-model-complexity-sample-size-and-data-dimensionality/)**。当你通过调整样本大小、属性数量和/或模型深度进行实验时，你会观察到这些调整对模型性能的影响。这种实验丰富了你对数据科学和数据分析背后机制的理解和视角。
