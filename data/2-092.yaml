- en: How to Evaluate Graph Retrieval in MCP Agentic Systems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何评估MCP智能系统中的图检索
- en: 原文：[https://towardsdatascience.com/evaluating-graph-retrieval-in-mcp-agentic-systems/](https://towardsdatascience.com/evaluating-graph-retrieval-in-mcp-agentic-systems/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/evaluating-graph-retrieval-in-mcp-agentic-systems/](https://towardsdatascience.com/evaluating-graph-retrieval-in-mcp-agentic-systems/)
- en: '<mdspan datatext="el1753746675649" class="mdspan-comment">These</mdspan> days,
    it’s all about agents, which I’m all for, an<mdspan datatext="el1753713352077"
    class="mdspan-comment">d pushing</mdspan> beyond basic vector search by giving
    LLMs access to a wide range of tools:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1753746675649" class="mdspan-comment">这些</mdspan>天，一切都在围绕着智能体展开，我对此非常支持，并且通过给LLM提供广泛的工具来超越基本的向量搜索：
- en: Web search
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网络搜索
- en: Various API calls
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 各种API调用
- en: Querying different databases
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查询不同的数据库
- en: While there’s a surge in new MCP servers being developed, there’s surprisingly
    little evaluation happening. Sure, you can hook an LLM with various different
    tools, but do you really know how it’s going to behave? That’s why I’m planning
    a series of blog posts focused on evaluating both off-the-shelf and custom graph
    MCP servers, especially those that retrieve information from Neo4j.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然正在开发大量新的MCP服务器，但令人惊讶的是，评估工作却很少。当然，你可以将LLM与各种不同的工具连接起来，但你真的知道它会如何表现吗？这就是为什么我计划撰写一系列博客文章，专注于评估现成的和定制的图MCP服务器，特别是那些从Neo4j检索信息的那些。
- en: Model Context Protocol (MCP) is Anthropic’s open standard that functions like
    “a USB-C port for AI applications,” standardizing how AI systems connect to external
    data sources through lightweight servers that expose specific capabilities to
    clients. The key insight is reusability. Instead of custom integrations for every
    data source, developers build reusable MCP servers once and share them across
    multiple AI applications.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 模型上下文协议（MCP）是Anthropic的开放标准，它就像“AI应用的USB-C端口”，通过轻量级服务器标准化AI系统如何连接到外部数据源，这些服务器向客户端暴露特定的功能。关键洞察是可重用性。开发者不需要为每个数据源定制集成，只需构建一次可重用的MCP服务器，并在多个AI应用之间共享。
- en: '![](../Images/9385b8c4824726d344f5e890bb679061.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9385b8c4824726d344f5e890bb679061.png)'
- en: 'Image from: https://modelcontextprotocol.io/introduction. Licensed under MIT.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：https://modelcontextprotocol.io/introduction。许可协议：MIT。
- en: An MCP server implements the Model Context Protocol, exposing tools and data
    to an AI client via structured JSON-RPC calls. It handles requests from the client
    and executes them against local or remote APIs, returning results to enrich the
    AI’s context.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: MCP服务器实现了模型上下文协议，通过结构化的JSON-RPC调用向AI客户端暴露工具和数据。它处理来自客户端的请求，并在本地或远程API上执行它们，返回结果以丰富AI的上下文。
- en: To evaluate MCP servers and their retrieval methods, the first step is to generate
    an evaluation dataset, something we’ll use an LLM to help with. In the second
    stage, we’ll take an off-the-shelf [mcp-neo4j-cypher](https://neo4j.com/developer/genai-ecosystem/model-context-protocol-mcp/#_mcp_neo4j_cypher)
    server and test it against the benchmark dataset we created.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估MCP服务器及其检索方法，第一步是生成一个评估数据集，我们将使用LLM来帮助完成这项工作。在第二阶段，我们将使用现成的[mcp-neo4j-cypher](https://neo4j.com/developer/genai-ecosystem/model-context-protocol-mcp/#_mcp_neo4j_cypher)服务器，并对其进行基准数据集的测试。
- en: '![](../Images/4dd42dfdf71fd79527382d60f55baa86.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4dd42dfdf71fd79527382d60f55baa86.png)'
- en: Agenda of this blog post. Image by author.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本博客文章的议程。图片由作者提供。
- en: The goal for now is to establish a solid dataset and framework so we can consistently
    compare different retrievers throughout the series.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 目前的目标是建立一个稳固的数据集和框架，这样我们就可以在整个系列中持续比较不同的检索器。
- en: Code is available on [GitHub](https://github.com/neo4j-contrib/grape).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 代码可在[GitHub](https://github.com/neo4j-contrib/grape)上找到。
- en: Evaluation dataset
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评估数据集
- en: Last year, Neo4j released the [Text2Cypher (2024) Dataset](https://neo4j.com/blog/developer/introducing-neo4j-text2cypher-dataset/),
    which was designed around a single-step approach to Cypher generation. In single-step
    Cypher generation, the system receives a natural language question and must produce
    one complete Cypher query that directly answers that question, essentially a one-shot
    translation from text to database query.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 去年，Neo4j发布了[Text2Cypher (2024) 数据集](https://neo4j.com/blog/developer/introducing-neo4j-text2cypher-dataset/)，该数据集围绕单步Cypher生成方法设计。在单步Cypher生成中，系统接收一个自然语言问题，并必须生成一个完整的Cypher查询来直接回答该问题，本质上是从文本到数据库查询的一次性翻译。
- en: 'However, this approach doesn’t reflect how agents actually work with graph
    databases in practice. Agents operate through multi-step reasoning: they can execute
    multiple tools iteratively, generate several Cypher statements in sequence, analyze
    intermediate results, and combine findings from different queries to build up
    to a final answer. This iterative, exploratory approach represents a fundamentally
    different paradigm from the prescribed single-step model.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这种方法并不能反映代理在实际中如何与图数据库交互。代理通过多步推理进行操作：它们可以迭代地执行多个工具，连续生成多个Cypher语句，分析中间结果，并将来自不同查询的发现结合起来，最终形成一个答案。这种迭代、探索的方法代表了一种与规定的单步模型根本不同的范式。
- en: '![](../Images/e00ad069902ec2620620638dc3452e2d.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e00ad069902ec2620620638dc3452e2d.png)'
- en: Predefined text2cypher flow vs agentic approach, where multiple tools can be called.
    Image by author.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 预定义的文本到Cypher流程与代理方法，其中可以调用多个工具。图片由作者提供。
- en: The current benchmark dataset fails to capture this difference of how MCP servers
    actually get used in agentic workflows. The benchmark needs updating to evaluate
    multi-step reasoning capabilities rather than just single-shot text2cypher translation.
    This would better reflect how agents navigate complex information retrieval tasks
    that require breaking down problems, exploring data relationships, and synthesizing
    results across multiple database interactions.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的基准数据集未能捕捉到代理工作流程中MCP服务器实际使用方式的这种差异。基准数据集需要更新，以评估多步推理能力，而不仅仅是单次文本到Cypher的翻译。这将更好地反映代理如何导航复杂的信息检索任务，这些任务需要分解问题、探索数据关系以及跨多个数据库交互综合结果。
- en: Evaluation metrics
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评估指标
- en: The most important shift when moving from single-step text2cypher evaluation
    to an agentic approach lies in how we measure accuracy.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 从单步文本到Cypher评估转向代理方法时，最重要的转变在于我们如何衡量准确性。
- en: '![](../Images/b800d00c929b5a63d3149c583c603e10.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b800d00c929b5a63d3149c583c603e10.png)'
- en: Difference between single-shot text2cypher and agentic evaluation. Image by
    author.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 单次文本到Cypher与代理评估之间的差异。图片由作者提供。
- en: In traditional text2query tasks like text2cypher, evaluation typically involves
    comparing the database response directly to a predefined ground truth, often checking
    for [exact matches or equivalence](https://neo4j.com/blog/developer/benchmarking-neo4j-text2cypher-dataset/).
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的文本到查询任务，如文本到Cypher中，评估通常涉及直接将数据库响应与预定义的基准事实进行比较，通常检查[精确匹配或等价性](https://neo4j.com/blog/developer/benchmarking-neo4j-text2cypher-dataset/)。
- en: However, agentic approaches introduce a key change. The agent may perform multiple
    retrieval steps, choose different query paths, or even rephrase the original intent
    along the way. As a result, there may be no single correct query. Instead, we
    shift our focus to evaluating the final answer generated by the agent, regardless
    of the intermediate queries it used to arrive there.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，代理方法引入了一个关键的变化。代理可能会执行多个检索步骤，选择不同的查询路径，甚至可能在过程中重新表述原始意图。因此，可能没有单一的查询是正确的。相反，我们将重点转向评估代理生成的最终答案，无论它使用了哪些中间查询来达到那里。
- en: To assess this, we use an LLM-as-a-judge setup, comparing the agent’s final
    answer against the expected answer. This lets us evaluate the semantic quality
    and usefulness of the output rather than the internal mechanics or specific query
    results.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估这一点，我们使用了一个LLM作为裁判的设置，将代理的最终答案与预期答案进行比较。这使我们能够评估输出的语义质量和实用性，而不仅仅是内部机制或特定的查询结果。
- en: Result Granularity and Agent Behavior
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结果粒度和代理行为
- en: Another important consideration in agentic evaluation is **the amount of data
    returned from the database**. In traditional text2cypher tasks, it’s common to
    allow or even expect large query results, since the goal is to test whether the
    correct data is retrieved. However, this approach doesn’t translate well to evaluating
    agentic workflows.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在代理评估中，另一个重要的考虑因素是**从数据库返回的数据量**。在传统的文本到Cypher任务中，允许或甚至期望有大量的查询结果是很常见的，因为目标是测试是否检索到了正确的数据。然而，这种方法并不适用于评估代理工作流程。
- en: In an agentic setting, **we’re not just testing whether the agent can access
    the correct data, but whether it can generate a concise, accurate final answer**.
    If the database returns too much information, the evaluation becomes entangled
    with other variables, such as the agent’s ability to summarize or navigate large
    outputs, rather than focusing on whether it understood the user’s intent and retrieved
    the correct information.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在代理环境中，**我们不仅测试代理能否访问正确的数据，还测试它能否生成简洁、准确的最终答案**。如果数据库返回的信息过多，评估就会与其他变量纠缠在一起，例如代理总结或导航大量输出的能力，而不是专注于它是否理解了用户的意图并检索了正确的信息。
- en: Introducing Real-World Noise
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 引入真实世界的噪声
- en: To further align the benchmark with **real-world agentic usage**, we also introduce
    **controlled noise** into the evaluation prompts.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步使基准与**真实世界的代理使用**相一致，我们在评估提示中也引入了**控制噪声**。
- en: '![](../Images/972906a0528770bf85ebd6bc474d5b1b.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/972906a0528770bf85ebd6bc474d5b1b.png)'
- en: Introducing real-world noise to evaluation. Image by author.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 引入真实世界的噪声到评估中。图片由作者提供。
- en: 'This includes elements such as:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括以下元素：
- en: '**Typographical errors** in named entities (e.g., “Andrwe Carnegie” instead
    of “Andrew Carnegie”),'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**命名实体中的**（例如，“Andrwe Carnegie”而不是“Andrew Carnegie”）中的**印刷错误**，'
- en: '**Colloquial phrasing** or informal language (e.g., “show me what’s up with
    Tesla’s board” instead of “list members of Tesla’s board of directors”),'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**口语化表达**或非正式语言（例如，“show me what’s up with Tesla’s board”而不是“list members of
    Tesla’s board of directors”），'
- en: '**Overly broad or under-specified intents** that require follow-up reasoning
    or clarification.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过于宽泛或未充分指定的意图**，需要后续推理或澄清。'
- en: These variations reflect how users actually interact with agents in practice.
    In real deployments, agents must handle messy inputs, incomplete formulations,
    and conversational shorthand, which are conditions rarely captured by clean, canonical
    benchmarks.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这些变化反映了用户在实际操作中与代理交互的方式。在实际部署中，代理必须处理混乱的输入、不完整的表述和会话简写，这些条件很少被干净的、规范化的基准所捕捉。
- en: To better reflect these insights around evaluating agentic approaches, I’ve
    [created a new benchmark using Claude 4.0](https://github.com/neo4j-contrib/grape/blob/main/generate_eval_dataset/dataset_generation.ipynb).
    Unlike traditional benchmarks that focus on Cypher query correctness, this one
    is designed to assess the quality of the **final answers** produced by multi-step
    agents
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地反映这些关于评估代理方法的见解，我[创建了一个新的基准，使用Claude 4.0](https://github.com/neo4j-contrib/grape/blob/main/generate_eval_dataset/dataset_generation.ipynb)。与专注于Cypher查询正确性的传统基准不同，这个基准旨在评估多步代理生成的**最终答案**的质量
- en: Databases
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据库
- en: 'To ensure a variety of evaluations, we use a couple of different databases
    that are available on the [Neo4j demo server](https://demo.neo4jlabs.com:7473/browser/).
    Examples include:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保评估的多样性，我们使用了几个不同的数据库，这些数据库可在[Neo4j演示服务器](https://demo.neo4jlabs.com:7473/browser/)上获得。示例包括：
- en: '[Northwind](https://en.wikiversity.org/wiki/Database_Examples/Northwind): Licensed
    under Microsoft Public License'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Northwind](https://en.wikiversity.org/wiki/Database_Examples/Northwind)：许可协议为Microsoft
    Public License'
- en: 'Network management: Generated by my friend, Michael Hunger'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网络管理：由我的朋友Michael Hunger生成
- en: '[Clinical Knowledge Graph](https://github.com/MannLabs/CKG): Licensed under
    MIT'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Clinical Knowledge Graph](https://github.com/MannLabs/CKG)：许可协议为MIT'
- en: '![](../Images/ec9356196327f2c21877e0e6ddce3e05.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ec9356196327f2c21877e0e6ddce3e05.png)'
- en: MCP-Neo4j-Cypher server
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MCP-Neo4j-Cypher服务器
- en: '[mcp-neo4j-cypher](https://neo4j.com/developer/genai-ecosystem/model-context-protocol-mcp/#_mcp_neo4j_cypher)
    is a ready-to-use MCP tool interface that allows agents to interact with Neo4j
    through natural language. It supports three core functions: viewing the graph
    schema, running Cypher queries to read data, and executing write operations to
    update the database. Results are returned in a clean, structured format that agents
    can easily understand and use.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '[mcp-neo4j-cypher](https://neo4j.com/developer/genai-ecosystem/model-context-protocol-mcp/#_mcp_neo4j_cypher)是一个现成的MCP工具接口，允许代理通过自然语言与Neo4j交互。它支持三个核心功能：查看图模式、运行Cypher查询以读取数据，以及执行写操作以更新数据库。结果以干净、结构化的格式返回，代理可以轻松理解和使用。'
- en: '![](../Images/bc9b744a959868aa77aead1b0a9c12db.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bc9b744a959868aa77aead1b0a9c12db.png)'
- en: mcp-neo4j-cypher overview. Image by author.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: mcp-neo4j-cypher概述。图片由作者提供。
- en: It works out of the box with any framework that supports MCP servers, making
    it simple to plug into existing agent setups without extra integration work. Whether
    you’re building a chatbot, data assistant, or custom workflow, this tool lets
    your agent safely and intelligently work with graph data.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 它与支持MCP服务器的任何框架无缝工作，使得将其插入现有代理设置变得简单，无需额外集成工作。无论您是在构建聊天机器人、数据助手还是自定义工作流程，这个工具都让您的代理能够安全、智能地处理图数据。
- en: Benchmark
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基准
- en: Finally, let’s run the benchmark evaluation.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们运行基准评估。
- en: 'We used LangChain to host the agent and connect it to the `mcp-neo4j-cypher`
    server, which is the only tool provided to the agent. This setup makes the evaluation
    simple and realistic: the agent must rely entirely on natural language interaction
    with the MCP interface to retrieve and manipulate graph data.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用LangChain托管代理并将其连接到`mcp-neo4j-cypher`服务器，这是提供给代理的唯一工具。这种设置使评估简单且现实：代理必须完全依赖与MCP界面的自然语言交互来检索和操作图数据。
- en: For the evaluation, we used **Claude 3.7 Sonnet** as the agent and **GPT-4o
    Mini** as the judge.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 对于评估，我们使用了**Claude 3.7 Sonnet**作为代理，**GPT-4o Mini**作为评判者。
- en: The benchmark dataset includes approximately 200 natural language question-answer
    pairs, categorized by number of hops (1-hop, 2-hop, etc.) and whether the queries
    contain distracting or noisy information. This structure helps assess the agent’s
    reasoning accuracy and robustness in both clean and noisy contexts. The evaluation
    code is available on [GitHub](https://github.com/neo4j-contrib/grape/blob/main/servers/mcp-neo4j-cypher/evaluation.ipynb).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 基准数据集包括大约200个自然语言问答对，按跳数（1跳、2跳等）以及查询是否包含干扰或噪声信息进行分类。这种结构有助于评估代理在干净和噪声环境中的推理准确性和鲁棒性。评估代码可在[GitHub](https://github.com/neo4j-contrib/grape/blob/main/servers/mcp-neo4j-cypher/evaluation.ipynb)上找到。
- en: Let’s examine the results together.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一起查看结果。
- en: '![](../Images/f2c3e236d9008a1085edb4c8db01f7d4.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![基准评估图](../Images/f2c3e236d9008a1085edb4c8db01f7d4.png)'
- en: mcp-neo4j-cypher evaluation. Image by author
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: mcp-neo4j-cypher评估。图由作者提供
- en: The evaluation shows that an agent using only the `mcp-neo4j-cypher` interface
    can effectively answer complex natural language questions over graph data. Across
    a benchmark of around 200 questions, the agent achieved an average score of 0.71,
    with performance dropping as question complexity increased. The presence of noise
    in the input significantly reduced accuracy, revealing the agent’s sensitivity
    to typos in named entities and such.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 评估显示，仅使用`mcp-neo4j-cypher`接口的代理可以有效地回答关于图数据的复杂自然语言问题。在一个大约200个问题的基准测试中，代理的平均得分为0.71，随着问题复杂性的增加，性能下降。输入中的噪声显著降低了准确性，揭示了代理对命名实体等错误拼写敏感。
- en: On the tool usage side, the agent averaged 3.6 tool calls per question. This
    is consistent with the current requirement to make at least one call to fetch
    the schema and another to execute the main Cypher query. Most queries fell within
    a 2–4 call range, showing the agent’s ability to reason and act efficiently. Notably,
    a small number of questions were answered with just one or even zero tool calls,
    anomalies that may suggest early stopping, incorrect planning, or agent bugs,
    and are worth further analysis. Looking ahead, tool count could be reduced further
    if schema access is embedded directly via MCP resources, eliminating the need
    for an explicit schema fetch step.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在工具使用方面，该代理平均每个问题调用3.6次工具。这与当前至少需要一次调用以获取模式，另一次执行主要Cypher查询的要求一致。大多数查询都在2-4次调用的范围内，显示出代理推理和行动的高效能力。值得注意的是，少数问题仅通过一次或甚至零次工具调用得到回答，这些异常可能表明早期停止、规划错误或代理错误，值得进一步分析。展望未来，如果通过MCP资源直接嵌入模式访问，工具调用次数可以进一步减少，从而消除显式获取模式步骤的需求。
- en: The real value of having a benchmark is that it opens the door to systematic
    iteration. Once baseline performance is established, you can start tweaking parameters,
    observing their impact, and making targeted improvements. For instance, if agent
    execution is costly, you might want to test whether capping the number of allowed
    steps to 10 using a LangGraph recursion limit has a measurable effect on accuracy.
    With the benchmark in place, these trade-offs between performance and efficiency
    can be explored quantitatively rather than guessed.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有基准测试的实际价值在于它打开了系统迭代的大门。一旦建立了基线性能，你就可以开始调整参数，观察它们的影响，并做出有针对性的改进。例如，如果代理执行成本高昂，你可能想测试将允许的步骤数限制在10步，使用LangGraph递归限制是否对准确性有可测量的影响。有了基准测试，这些性能和效率之间的权衡可以定量探索，而不是猜测。
- en: '![](../Images/c084d30b5ec25f79e1e69e8962c299a2.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c084d30b5ec25f79e1e69e8962c299a2.png)'
- en: mcp-neo4j-cypher evaluation with max 10 steps. Image by author.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: mcp-neo4j-cypher 评估，最多10步。图片由作者提供。
- en: With a 10-step limit in place, performance dropped noticeably. The mean evaluation
    score fell to **0.535\.** Accuracy decreased sharply on more complex (3-hop+)
    questions, suggesting the step limit cut off deeper reasoning chains. Noise continued
    to degrade performance, with noisy questions averaging lower scores than clean
    ones.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 实施了10步的限制后，性能明显下降。平均评估分数降至**0.535**。在更复杂的（3跳以上）问题上的准确性急剧下降，这表明步骤限制切断了更深层次的推理链。噪声继续降低性能，噪声问题的平均分数低于干净问题。
- en: Summary
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: We’re living in an exciting moment for AI, with the rise of autonomous agents
    and emerging standards like MCP dramatically expanding what LLMs can do, especially
    when it comes to structured, multi-step tasks. But while the capabilities are
    growing fast, robust evaluation is still lagging behind. That’s where this [GRAPE](https://github.com/neo4j-contrib/grape/tree/main)
    project comes in.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正处于人工智能的激动人心的时刻，随着自主代理和像MCP这样的新标准的兴起，LLMs能够做的事情急剧增加，尤其是在结构化、多步骤任务方面。但是，尽管能力增长迅速，稳健的评估仍然落后。这就是这个[GRAPE](https://github.com/neo4j-contrib/grape/tree/main)项目出现的地方。
- en: The goal is to build a practical, evolving benchmark for graph-based question
    answering using the MCP interface. Over time, I plan to refine the dataset, experiment
    with different retrieval strategies, and explore how to extend or adapt the Cypher
    MCP for better accuracy. There’s still a lot of work ahead from cleaning data,
    improving retrieval to tightening evaluation. However, having a clear benchmark
    means we can track progress meaningfully, test ideas systematically, and push
    the boundaries of what these agents can reliably do.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是构建一个实用、不断演进的基于MCP接口的图问答基准测试。随着时间的推移，我计划改进数据集，尝试不同的检索策略，并探索如何扩展或调整Cypher MCP以获得更高的准确性。从数据清理到检索改进再到评估收紧，还有很多工作要做。然而，有一个清晰的基准意味着我们可以有意义地跟踪进度，系统地测试想法，并推动这些代理可靠执行边界的扩展。
