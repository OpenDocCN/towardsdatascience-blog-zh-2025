- en: 'Beyond Requests: Why httpx is the Modern HTTP Client You Need (Sometimes)'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 超越Requests：为什么httpx是你有时需要的现代HTTP客户端（有时）
- en: 原文：[https://towardsdatascience.com/beyond-requests-why-httpx-is-the-modern-http-client-you-need-sometimes/](https://towardsdatascience.com/beyond-requests-why-httpx-is-the-modern-http-client-you-need-sometimes/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/beyond-requests-why-httpx-is-the-modern-http-client-you-need-sometimes/](https://towardsdatascience.com/beyond-requests-why-httpx-is-the-modern-http-client-you-need-sometimes/)'
- en: <mdspan datatext="el1760555113192" class="mdspan-comment">If you’ve spent</mdspan>
    any time making HTTP calls in Python, the chances are high that you’ve used the
    Requests library. For many years, Requests has been the *de facto* standard, known
    for its relative simplicity and has been a cornerstone of countless Python applications.
    From simple scripts to more complex web services, its synchronous nature works
    well in many different types of applications.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760555113192" class="mdspan-comment">如果你在Python中花费过时间进行HTTP调用，那么你很可能使用过Requests库。多年来，Requests一直是*事实上的*标准，以其相对简单而闻名，并已成为无数Python应用的基石。从简单的脚本到更复杂的Web服务，其同步特性在许多不同类型的应用中表现良好。
- en: However, the Python library ecosystem constantly evolves, particularly with
    the rise of asynchronous programming using asyncio. This shift has opened doors
    for new libraries designed to leverage non-blocking I/O for enhanced performance,
    especially in I/O-bound applications.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，Python库生态系统不断演变，尤其是随着使用asyncio的异步编程的兴起。这种转变为新的库打开了大门，这些库旨在利用非阻塞I/O以增强性能，尤其是在I/O密集型应用中。
- en: That’s where the HTTPX library comes in, a relative newcomer that bills itself
    as a “next generation HTTP client for Python,” offering both synchronous and asynchronous
    APIs, along with support for modern web features such as HTTP/2.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 正是在这里，HTTPX库发挥了作用，这是一个相对较新的库，自称为“Python的下一代HTTP客户端”，提供同步和异步API，以及支持现代Web功能，如HTTP/2。
- en: What is Requests?
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是Requests？
- en: For those new to Python or in need of a refresher, Requests is a simple and
    elegant HTTP library for Python, created by Kenneth Reitz almost fifteen years
    ago. Its main goal is to make HTTP requests easy and human-friendly. You want
    to send some data? Make a GET or POST request? Handle headers, cookies, or authentication?
    Requests make these tasks intuitive.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Python新手或需要复习的人来说，Requests是一个简单优雅的HTTP库，由Kenneth Reitz在近十五年前创建。其主要目标是使HTTP请求变得简单且人性化。你想发送一些数据？发起GET或POST请求？处理头部、cookies或身份验证？Requests使这些任务变得直观。
- en: Its synchronous nature means that when you make a request, your program waits
    for the response before moving on. This is fine for many applications, but for
    tasks requiring numerous concurrent HTTP calls (such as web scraping or interacting
    with multiple microservices), this blocking behaviour can become a significant
    bottleneck.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 它的同步特性意味着当你发起一个请求时，你的程序会在收到响应之前等待。这对于许多应用来说是可以接受的，但对于需要大量并发HTTP调用的任务（如网络爬虫或与多个微服务交互），这种阻塞行为可能会成为一个显著的瓶颈。
- en: What is HTTPX?
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是HTTPX？
- en: According to its official documentation, HTTPX is a,
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 根据其官方文档，HTTPX是，
- en: “…fully featured HTTP client for Python 3, which provides sync and async APIs,
    and support for both HTTP/1.1 and HTTP/2.”
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “...一个功能齐全的Python 3 HTTP客户端，提供同步和异步API，并支持HTTP/1.1和HTTP/2。”
- en: It was developed by Encode (the team behind **Starlette**, **Uvicorn** and **Django
    Rest Framework**).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 它是由Encode（Starlette、Uvicorn和Django Rest Framework背后的团队）开发的。
- en: Some of HTTPX’s selling points include,
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: HTTPX的一些卖点包括，
- en: '**Async Support:** Native async/await syntax for non-blocking operations.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异步支持:** 原生的async/await语法，用于非阻塞操作。'
- en: '**HTTP/2 Support:** Unlike Requests (which primarily supports HTTP/1.1 out
    of the box), HTTPX can speak HTTP/2, potentially offering performance benefits
    like multiplexing.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**HTTP/2支持:** 与Requests（默认主要支持HTTP/1.1）不同，HTTPX可以支持HTTP/2，可能提供如多路复用等性能优势。'
- en: '**Requests-like API:** It aims to provide a familiar API for those accustomed
    to Requests, easing the transition.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类似Requests的API:** 它旨在为那些习惯于Requests的用户提供一个熟悉的API，从而简化过渡过程。'
- en: '**Transport API:** A more advanced feature allowing custom transport behaviour,
    useful for testing or specific network configurations.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**传输API:** 一个更高级的功能，允许自定义传输行为，对于测试或特定的网络配置很有用。'
- en: The claims for HTTPX are intriguing. A Requests-compatible API with the power
    of async/await, and potential performance gains. But is it the heir apparent,
    capable of unseating the reigning champion, or is it a niche tool for specific
    async use cases? There’s only one way to find out. Let’s put them both to the
    test.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 HTTPX 的声明非常吸引人。一个与 Requests 兼容的 API，具有 async/await 的功能，以及潜在的性能提升。但它是不是显而易见的继承人，能够取代当前冠军，或者它是不是一个针对特定异步用例的利基工具？找出答案的唯一方法就是将它们都进行测试。
- en: Setting up a Development Environment
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置开发环境
- en: Before we start coding, we should set up a separate development environment
    for each project we work on. I’m using conda, but feel free to use whatever method
    suits you.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始编码之前，我们应该为每个我们工作的项目设置一个单独的开发环境。我使用 conda，但请随意使用适合你的任何方法。
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Now that our environment is active, let’s install the necessary libraries:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经激活了环境，让我们安装必要的库：
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: I’m using Jupyter for my code, so if you’re following along, type in **Jupyter
    Notebook** into your command prompt. You should see a jupyter notebook open in
    your browser. If that doesn’t happen automatically, you’ll likely see a screenful
    of information after the Jupyter Notebook command. Near the bottom, you will find
    a URL that you should copy and paste into your browser to launch the Jupyter Notebook.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用 Jupyter 编写代码，所以如果你在跟随，请在命令提示符中输入 **Jupyter Notebook**。你应该会在浏览器中看到一个 Jupyter
    Notebook 打开。如果它没有自动打开，你可能会在 Jupyter Notebook 命令后看到一屏幕的信息。在底部附近，你会找到一个 URL，你应该将其复制并粘贴到浏览器中以启动
    Jupyter Notebook。
- en: Your URL will be different to mine, but it should look something like this:-
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 你的 URL 将与我的不同，但它应该看起来像这样：-
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Comparing HTTPX and Requests’ Performance
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 比较 HTTPX 和 Requests 的性能
- en: To compare performance, we’ll run a series of HTTP GET requests using both libraries
    and time them. We’ll examine synchronous operations first, then look into the
    asynchronous capabilities.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 为了比较性能，我们将使用这两个库运行一系列 HTTP GET 请求并计时。我们首先检查同步操作，然后探讨异步功能。
- en: For our target, we’ll use **httpbin.org**, a fantastic service for testing HTTP
    requests. Think of it as a testing and debugging tool for developers who are building
    or working with software that makes HTTP requests (like web clients, API clients,
    scrapers, etc.). Instead of having to set up your own web server to see what your
    HTTP requests look like or to test how your client handles different server responses,
    you can send your requests to a test server at httpbin.org. It has a variety of
    endpoints that are designed to return specific types of responses, allowing you
    to inspect and verify your client’s behaviour.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的目标，我们将使用 **httpbin.org**，这是一个用于测试 HTTP 请求的出色服务。将其视为为构建或使用制作 HTTP 请求的软件（如网络客户端、API
    客户端、抓取器等）的开发者的测试和调试工具。您无需设置自己的 Web 服务器来查看您的 HTTP 请求的外观或测试您的客户端如何处理不同的服务器响应，您可以将您的请求发送到
    httpbin.org 的测试服务器。它具有各种端点，旨在返回特定类型的响应，允许您检查和验证客户端的行为。
- en: '**Local FastAPI Server Setup**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**本地 FastAPI 服务器设置**'
- en: 'Let’s create a simple FastAPI app to serve as our async endpoint. Save this
    as test_server.py:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个简单的 FastAPI 应用程序作为我们的异步端点。将其保存为 test_server.py：
- en: '[PRE3]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Start this server in a separate terminal window by typing this command.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个单独的终端窗口中通过输入以下命令启动此服务器。
- en: '[PRE4]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We’ve set up everything we need to. Let’s get started with our code examples.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经设置了所需的一切。让我们开始我们的代码示例。
- en: '**Example 1 — Simple Synchronous GET Request**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 1—简单同步 GET 请求**'
- en: 'Let’s start with a basic scenario: fetching a simple JSON response 20 times
    sequentially.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从基本场景开始：连续 20 次获取简单的 JSON 响应。
- en: '[PRE5]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The output.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 输出结果。
- en: '[PRE6]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: That’s a decent uplift from HTTPX over Requests already. It’s almost twice as
    fast at synchronous retrieval in our test.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经比 Requests 快得多了。在我们的测试中，它在同步检索方面几乎快了两倍。
- en: '**Example 2 — Simple Asynchronous GET Request (Single Request)** **using HTTPX**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 2—使用 HTTPX 的简单异步 GET 请求（单个请求）**'
- en: Now, let’s test HTTPX’s asynchronous capabilities by making a single request
    to the local FastAPI server that we set up before
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们通过向之前设置的本地 FastAPI 服务器发送单个请求来测试 HTTPX 的异步功能。
- en: '[PRE7]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The Output.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 输出结果。
- en: '[PRE8]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This is quick, as expected for a local request. This test primarily verifies
    that the async machinery works. The real test for async comes with concurrency.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这很符合预期，对于本地请求来说很快。这个测试主要验证异步机制是否工作。真正的异步测试来自于并发。
- en: '**Example 3 — Concurrent Asynchronous GET Requests**.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 3—并发异步 GET 请求**。'
- en: This is where HTTPX’s async capabilities should truly shine over Requests. We’ll
    make 100 requests to our **/slow** endpoint concurrently.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是HTTPX的异步能力应该真正超越Requests的地方。我们将并发地向我们的**/slow**端点发送100个请求。
- en: '[PRE9]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Typical Output
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 典型输出
- en: '[PRE10]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Now ***this*** is not too shabby! HTTPX leveraging asyncio.gather completed
    100 requests (each with a 0.1s simulated delay) in just over 1 second. Because
    the tasks are I/O-bound, asyncio can switch between them while they wait for the
    server’s response. The total time is roughly the time of the longest individual
    request, plus a small amount of overhead for managing concurrency.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的***这个***功能相当不错！HTTPX利用asyncio.gather在1秒多内完成了100个请求（每个请求有0.1秒的模拟延迟）。由于任务是I/O密集型的，asyncio可以在它们等待服务器响应时在这些任务之间切换。总时间大约是单个请求最长时间加上一小部分用于管理并发的开销。
- en: In contrast, the synchronous Requests code took over 10 seconds (100 requests
    * 0.1s/request = 10 seconds, plus overhead). This demonstrates the power of asynchronous
    operations for I/O-bound tasks. HTTPX isn’t just “faster” in an absolute sense;
    it enables a fundamentally more efficient way of handling concurrent I/O.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，同步的Requests代码用了超过10秒（100个请求 * 0.1秒/请求 = 10秒，加上开销）。这展示了异步操作对于I/O密集型任务的强大能力。HTTPX不仅仅在绝对意义上“更快”；它使处理并发I/O的方式更加高效。
- en: What about HTTP/2?
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 那么关于HTTP/2呢？
- en: HTTPX supports HTTP/2 if the server also supports it and the h2 library is installed
    (pip install httpx[h2]). HTTP/2 offers benefits such as multiplexing (sending
    multiple requests over a single connection) and header compression.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果服务器也支持HTTP/2并且安装了h2库（pip install httpx[h2]），HTTPX支持HTTP/2。HTTP/2提供了诸如多路复用（通过单个连接发送多个请求）和头部压缩等好处。
- en: '[PRE11]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '**The Output**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出结果**'
- en: '[PRE12]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: While this test confirms HTTP/2 usage, quantifying its speed benefits over HTTP/1.1
    in a simple script can be a bit tricky. HTTP/2’s advantages often become more
    apparent in complex scenarios with many small resources or on high-latency connections.
    For many common API interactions, the difference might not be dramatic unless
    the server is specifically optimised to leverage HTTP/2 features heavily. However,
    having this capability is a significant forward-looking feature.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这个测试确认了HTTP/2的使用，但在简单的脚本中量化其相对于HTTP/1.1的速度优势可能有点棘手。HTTP/2的优势通常在具有许多小型资源或高延迟连接的复杂场景中更为明显。对于许多常见的API交互，除非服务器特别优化以充分利用HTTP/2功能，否则差异可能不会很大。然而，拥有这种能力是一个重要的前瞻性功能。
- en: Beyond Raw Speed
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 超越原始速度
- en: Performance isn’t everything. Developer experience, features, and ease of use
    are crucial, so let’s look at some of these in our comparison of the two libraries.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 性能并非一切。开发者的体验、功能和易用性同样关键，因此让我们在比较这两个库时看看这些方面。
- en: '**Async/Await Support**'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**异步/等待支持**'
- en: HTTPX. Native first-class support. This is its most significant differentiator.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: HTTPX。原生一级支持。这是其最重要的差异化特征。
- en: REQUESTS. Purely synchronous. To get async behaviour with a Requests-like feel,
    you’d typically look to libraries like aiohttp (which has a different API) or
    use Requests within a thread pool executor (which adds complexity and isn’t true
    asyncio).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 请求。纯粹同步。要获得类似Requests的异步行为，你通常会考虑像aiohttp（它有一个不同的API）这样的库，或者在使用线程池执行器中的Requests（这增加了复杂性，并且不是真正的asyncio）。
- en: '**HTTP/2 Support**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**HTTP/2支持**'
- en: HTTPX. We already mentioned this, but to recap, this functionality is built
    in.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: HTTPX。我们之前已经提到过，但为了回顾，这个功能是内置的。
- en: REQUESTS. No native HTTP/2 support. Third-party adapters exist, but aren’t as
    integrated.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 请求。没有原生的HTTP/2支持。存在第三方适配器，但它们并不那么集成。
- en: '**API Design & Ease of Use**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**API设计及易用性**'
- en: HTTPX. Intentionally designed to be very similar to Requests. If you’re familiar
    with Requests, HTTPX will feel familiar. Here’s a quick code comparison.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: HTTPX。有意设计得与Requests非常相似。如果你熟悉Requests，HTTPX会感觉熟悉。以下是一个快速代码比较。
- en: '[PRE13]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: REQUESTS. The gold standard for simplicity in synchronous HTTP calls.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 请求。同步HTTP调用中的简洁标准。
- en: '**Client Sessions / Connection Pooling**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**客户端会话/连接池**'
- en: Both libraries strongly encourage using client sessions (requests.Session()
    and httpx.Client() / httpx.AsyncClient()) for performance benefits, such as connection
    pooling and cookie persistence. The usage for both is very similar.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 两个库都强烈建议使用客户端会话（requests.Session()和httpx.Client() / httpx.AsyncClient()）以获得性能优势，如连接池和cookie持久化。两者的使用方式非常相似。
- en: '**Dependency Footprint**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**依赖足迹**'
- en: REQUESTS. Relatively lightweight (charset_normalizer, idna, urllib3, certifi).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 请求。相对轻量级（charset_normalizer，idna，urllib3，certifi）。
- en: HTTPX. Has a few more core dependencies (httpcore, sniffio, anyio, certifi,
    idna), and h11 for HTTP/1.1\. If you add h2 for HTTP/2, that’s another. This is
    understandable given its broader feature set.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: HTTPX。有几个核心依赖（httpcore、sniffio、anyio、certifi、idna），以及 h11 用于 HTTP/1.1。如果你添加
    h2 用于 HTTP/2，那又是一个。考虑到其更广泛的功能集，这是可以理解的。
- en: '**Maturity & Community**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**成熟度与社区**'
- en: REQUESTS. Extremely mature, massive community, battle-tested over a decade.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: REQUESTS。极其成熟，拥有庞大的社区，经过十年的实战考验。
- en: HTTPX. Younger but actively developed by a reputable team (Encode) and is gaining
    traction rapidly. It’s considered stable and production-ready.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: HTTPX。虽然较新，但由一个信誉良好的团队（Encode）积极开发，并且正在迅速获得关注。它被认为稳定且适用于生产。
- en: When to Choose HTTPX? When to Stick with Requests?
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 何时选择 HTTPX？何时坚持使用 Requests？
- en: With all that said, how do you choose between the two? Here’s what I think.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 说了这么多，你如何在这两者之间做出选择？以下是我的一些看法。
- en: Choose HTTPX if …
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果需要 HTTP/2 支持……
- en: '**You need asynchronous operations.** This is the primary reason. If your application
    involves many I/O-bound HTTP calls, HTTPX with asyncio will offer significant
    performance improvements and better resource utilisation.'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你需要异步操作**。这是主要原因。如果你的应用程序涉及许多 I/O 密集型的 HTTP 调用，使用 HTTPX 和 asyncio 将提供显著的性能改进和更好的资源利用率。'
- en: '**You need HTTP/2 support.** If you’re interacting with servers that leverage
    HTTP/2 for performance, HTTPX provides this out of the box.'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你需要 HTTP/2 支持**。如果你与利用 HTTP/2 提高性能的服务器交互，HTTPX 提供了这一功能。'
- en: '**You’re starting a new project and want to future-proof it.** HTTPX’s modern
    design and async capabilities make it a strong choice for new applications.'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你正在启动一个新项目，并希望使其面向未来**。HTTPX 的现代设计和异步能力使其成为新应用程序的强大选择。'
- en: '**You want a single library for both sync and async HTTP calls.** This can
    simplify your dependency management and codebase if you have mixed needs.'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你想要一个用于同步和异步 HTTP 调用的单一库**。如果你有混合需求，这可以简化你的依赖关系管理和代码库。'
- en: '**You need advanced features.** Like its Transport API for fine-grained control
    over request dispatch, or for testing.'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你需要高级功能**。比如它的传输 API，可以精细控制请求调度，或者用于测试。'
- en: Stick with Requests if …
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如果需要成熟度和社区支持……
- en: '**Your application is purely synchronous and has simple HTTP needs.** If Requests
    is already doing the job well and you don’t face I/O bottlenecks, there might
    be no compelling reason to switch.'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你的应用程序是纯同步的，并且有简单的 HTTP 需求**。如果 Requests 已经很好地完成了工作，并且你没有遇到 I/O 瓶颈，那么可能没有充分的理由切换。'
- en: '**You’re working on a legacy codebase heavily reliant on Requests.** Migrating
    might not be worth the effort unless you specifically need HTTPX’s features.'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你正在处理一个高度依赖 Requests 的遗留代码库**。除非你特别需要 HTTPX 的功能，否则迁移可能不值得付出努力。'
- en: '**Minimising dependencies is critical.** Requests has a slightly smaller footprint.'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**最小化依赖至关重要**。Requests 的占用空间略小。'
- en: '**The learning curve for asyncio is a barrier for your team.** While HTTPX
    offers a sync API, its main power lies in its async capabilities.'
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**asyncio 的学习曲线对你的团队来说是一个障碍**。虽然 HTTPX 提供了同步 API，但它的主要优势在于其异步能力。'
- en: Summary
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 摘要
- en: My investigation reveals that HTTPX is a very competent library. While it doesn’t
    magically make single, synchronous HTTP calls drastically faster than Requests
    (network latency is still king there), its true power comes to the fore in asynchronous
    apps. When making numerous concurrent I/O-bound calls, HTTPX offers substantial
    performance gains and a more efficient way to structure code, as demonstrated
    in our concurrent test.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我的调查表明，HTTPX 是一个非常出色的库。虽然它并不能神奇地使单个同步 HTTP 调用比 Requests 快得多（网络延迟仍然是王），但它的真正力量在异步应用程序中显现出来。当进行大量的并发
    I/O 密集型调用时，HTTPX 提供了实质性的性能提升和更有效的代码结构方式，正如我们在并发测试中所展示的那样。
- en: Many claim that HTTPX is “better”, but it depends on the context. If “better”
    means having native async/await support, HTTP/2 capabilities, and a modern API
    that also caters to synchronous needs, then yes, HTTPX arguably holds an edge
    for new development. Requests remains an excellent, reliable library for synchronous
    tasks, and its simplicity is still its greatest strength.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人声称 HTTPX 是“更好的”，但这取决于上下文。如果“更好”意味着拥有原生的异步/等待支持、HTTP/2 功能以及同时满足同步需求的现代 API，那么是的，HTTPX
    在新开发中可能确实具有优势。Requests 仍然是一个出色的、可靠的库，用于同步任务，其简洁性仍然是其最大的优势。
- en: For concurrent asynchronous operations, the *effective throughput* when using
    httpx can be an order of magnitude greater than that of sequential synchronous
    Requests, which is a game-changer.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 对于并发异步操作，使用 httpx 的**有效吞吐量**可以比顺序同步的 Requests 高一个数量级，这是一个颠覆性的变化。
- en: If you are a Python developer handling HTTP calls, particularly in modern web
    applications, microservices, or data-intensive tasks. In that case, HTTPX is not
    merely a library to observe — it is a library to begin using. The transition from
    Requests is smooth for synchronous code, and its overall feature set and async
    prowess make it a compelling choice for the future of Python HTTP clients.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一名处理HTTP调用的Python开发者，尤其是在现代Web应用、微服务或数据密集型任务中，那么HTTPX不仅仅是一个值得观察的库——它是一个开始使用的库。对于同步代码，从Requests库过渡非常顺畅，其整体功能集和异步能力使其成为Python
    HTTP客户端未来的一个有吸引力的选择。
