  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 想了解更多关于Mauro的工作并关注他最新的文章，请[在这里](https://towardsdatascience.com/author/maurodp/)和[LinkedIn](https://www.linkedin.com/in/mauro-di-pietro-56a1366b/)上关注他。
