- en: The Power of Building from Scratch
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从头开始构建的力量
- en: 原文：[https://towardsdatascience.com/the-power-of-building-from-scratch/](https://towardsdatascience.com/the-power-of-building-from-scratch/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-power-of-building-from-scratch/](https://towardsdatascience.com/the-power-of-building-from-scratch/)
- en: '*In our Author Spotlight series, we chat with members of our community about
    their career paths in data science and AI, their writing, and their sources of
    inspiration. Today, we’re thrilled to share our conversation with* [*Mauro Di
    Pietro*](https://towardsdatascience.com/author/maurodp/)*.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*在我们的作者聚焦系列中，我们与社区成员聊天，了解他们在数据科学和AI领域的职业道路、他们的写作以及他们的灵感来源。今天，我们非常高兴与[*Mauro
    Di Pietro*](https://towardsdatascience.com/author/maurodp/)*进行对话。*'
- en: '*Mauro is a data scientist and content creator with a decade of experience
    in the banking industry across Europe and Asia. He studied quantitative finance
    but taught himself programming after graduation, which sparked his passion for
    writing tutorials that break down complex topics into simple and engaging explanations.*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*Mauro是一位拥有十年欧洲和亚洲银行业经验的数据科学家和内容创作者。他学习量化金融，但毕业后自学编程，这激发了他编写教程的热情，将复杂主题分解成简单且引人入胜的解释。*'
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: You’ve written an impressive series on building [AI agents from scratch](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/)
    using Python and Ollama. What motivated you to avoid tools like OpenAI APIs or
    paid cloud services?
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 您用Python和Ollama编写了一系列令人印象深刻的关于从头开始构建[AI代理](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/)的文章。是什么激励您避免使用像OpenAI
    API或付费云服务这样的工具？
- en: I like to make my own stuff, and I’m a huge fan of “open-source.”
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢自己动手制作东西，并且我是“开源”的超级粉丝。
- en: I come from the early era of Machine Learning, when data scientists used to
    train their own models. I’m quite nostalgic about those days, when “all you need”
    wasn’t *Attention*, but a small dataset, *Scikit-learn*, and limited computing
    power were enough to perform a nice classification. I especially miss the data
    exploration part, as I was quite good at plotting. Today, we are all using *ChatGPT*,
    and I literally haven’t trained a model in years…so I prefer to build from scratch
    wherever I can.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我来自机器学习的早期时代，当时数据科学家们习惯于自己训练模型。我对那些日子感到非常怀旧，那时候“你需要的一切”不是*注意力*，而是一个小数据集、*Scikit-learn*和有限的计算能力就足以进行良好的分类。我特别怀念数据探索的部分，因为我擅长绘图。如今，我们都在使用*ChatGPT*，我实际上已经多年没有训练过模型了……所以，我更喜欢在可能的情况下从头开始构建。
- en: Besides, I work in banking and I’m used to handling highly sensitive data. Leveraging
    open-source tools to build from scratch is a better choice, rather than relying
    on paid cloud services, when you want to invest in control and customization.
    You have full ownership over your infrastructure, avoid vendor lock-in, and maintain
    tighter control over data privacy and security. And more importantly, it’s free.
    Therefore, as long as I can choose, I will always pick the “open-source/from-scratch”
    approach.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我在银行业工作，习惯于处理高度敏感的数据。当你想要投资于控制和定制时，利用开源工具从头开始构建是一个更好的选择，而不是依赖付费云服务。你对自己的基础设施拥有完全的控制权，避免了供应商锁定，并能够更紧密地控制数据隐私和安全。更重要的是，它是免费的。因此，只要我能选择，我总是会选择“开源/从头开始”的方法。
- en: 'About the “from scratch” approach: what’s your philosophy behind starting from
    zero, and how do you balance educational clarity with real-world complexity?'
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于“从头开始”的方法：您从零开始背后的哲学是什么，您是如何平衡教育清晰度与现实世界复杂性的？
- en: I believe that you really learn only when you try to do things yourself. Growth
    rarely comes from getting things right the first time.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信，只有当你尝试自己做事时，你才能真正学到东西。成长很少来自于第一次就做对。
- en: In real use cases, it never goes as planned, so one should know the gap between
    theory and practice. To compromise between the two, it’s essential to treat theory
    as a flexible foundation rather than a rigid framework. Theory provides models
    that work in ideal conditions, but real-world scenarios come with noise, uncertainty,
    and constraints (like budget, time, and human behavior). Ultimately, it’s in the
    gray area between theory and practice that smart ideas can generate real value.
    So, in order to handle real-world complexity, first you need to master educational
    examples.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际应用中，事情永远不会按计划进行，因此人们应该了解理论与实践之间的差距。为了在这两者之间取得妥协，将理论视为一个灵活的基础而不是一个僵化的框架是至关重要的。理论提供了在理想条件下工作的模型，但现实世界的情况伴随着噪声、不确定性和约束（如预算、时间和人类行为）。最终，在理论与实践的灰色地带，聪明的想法可以产生真正的价值。因此，为了处理现实世界的复杂性，首先你需要掌握教育示例。
- en: 'But it’s not just AI: that applies to everything… Life is a process of trial
    and error. We evolve through experience: trying, failing, adjusting, and trying
    again. That’s human (and machine) learning.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 但这不仅仅是人工智能：这适用于一切……生活是一个试错的过程。我们通过经验进化：尝试、失败、调整，然后再尝试。这就是人类（和机器）的学习。
- en: You’ve explored single-agent, [multi-agent](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-3/),
    and chain-based architectures. How has your perspective on agent design evolved
    as you’ve progressed through these models?
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你已经探索了单一代理、[多代理](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-3/)和基于链的架构。随着你通过这些模型的发展，你对代理设计的看法是如何演变的？
- en: At the moment, Single Agents are the way to go and the closest to being ready
    for production. In particular, Single Agents are better than multi-agent systems
    when the use-case domain is well defined and can be effectively managed by a single
    point of control. They are simpler to design, test, and maintain.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，单一代理（Single Agents）是最佳选择，也是最接近生产就绪的。特别是，当用例领域定义良好且可以由单一控制点有效管理时，单一代理比多代理系统更优越。它们更容易设计、测试和维护。
- en: On the other hand, Multi-agent systems introduce added complexity in the decision-making
    process, which can be unnecessary or even counterproductive.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，多代理系统在决策过程中引入了额外的复杂性，这可能是多余的，甚至可能适得其反。
- en: The more Agents you add in a system, the harder it is to control, and the quality
    of the output gets affected. Let’s keep in mind that any result from a Machine
    Learning model must always be validated.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个系统中添加的代理越多，控制起来就越困难，输出的质量也会受到影响。让我们记住，任何来自机器学习模型的结果都必须始终得到验证。
- en: So, unless the task doesn’t benefit from distributed intelligence, I’d recommend
    trying Single Agents first.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，除非任务从分布式智能中获益，否则我建议首先尝试单一代理。
- en: How do you stay up-to-date and inspired when working with tools and approaches
    that are often on the frontier of both AI research and development?
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当你使用的是经常处于人工智能研究和开发前沿的工具和方法时，你是如何保持与时俱进和灵感的？
- en: Oh, that’s the hardest part, as I’m a very lazy person. What drives me to stay
    up to date with the industry is a mix of curiosity, passion and FOMO… I don’t
    want to be left behind!
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 哦，这是最难的部分，因为我是一个非常懒惰的人。推动我保持行业前沿的是好奇心、激情和恐惧错过（FOMO）……我不想被落下！
- en: Like any other writer, I read a lot, especially to spot new upcoming trends.
    Moreover, I interact all the time with the community to understand how other people
    are approaching similar problems. For example, a lot of my readers contact me
    on LinkedIn asking for help to run the code from my articles. I always try to
    understand their use cases, discuss together what would be the best possible approach,
    and sometimes new ideas come up.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 就像任何其他作家一样，我读了很多书，特别是为了发现新的趋势。此外，我始终与社区互动，以了解其他人如何处理类似的问题。例如，很多读者通过LinkedIn联系我，请求帮助运行我文章中的代码。我总是试图了解他们的用例，一起讨论最佳可能的方案，有时会涌现出新的想法。
- en: Innovation often comes from cross-disciplinary exposure through feedback from
    peers and users. So, I’d say the best way to stay inspired is talking to people.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 创新通常来自跨学科曝光，通过同行和用户的反馈。因此，我认为保持灵感的最佳方式是与人们交谈。
- en: Then, once you get that inspiration flowing like gasoline, to actually stay
    “up to date”, you need to grind with hands-on experiments (i.e., reproducing articles,
    contributing to open-source projects, building prototypes).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，一旦你让灵感像汽油一样流淌，为了真正保持“与时俱进”，你需要通过动手实验（即复制文章、为开源项目做出贡献、构建原型）来磨砺自己。
- en: Looking ahead, what kinds of problems or systems are you most excited to build,
    or see others build, using AI agents?
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 展望未来，你最兴奋的是构建哪些类型的问题或系统，或者看到其他人使用人工智能代理构建的系统？
- en: I see Agents as “baby AI”. With modern NLP and Computer Vision, we are very
    close to having all the ingredients for the first general-purpose AI software.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为代理（Agents）就像是“婴儿人工智能”。随着现代自然语言处理和计算机视觉的发展，我们离拥有第一个通用人工智能软件的所有成分已经非常接近了。
- en: When I was a kid, in the 90s, every household got a computer in the house that
    all family members had to share. Well, I believe that it’s about to happen again.
    Soon, each family will have a personal AI assistant connected to all the devices
    (phones, house, car…). Eventually, Robotics will catch up on the hardware side,
    and that family AI assistant will become the personal robot we have always dreamed
    about.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当我还是个孩子，90年代的时候，每家每户都有一台电脑，所有家庭成员都要共用。嗯，我相信这很快就会再次发生。很快，每个家庭都将拥有一个个人人工智能助手，它连接着所有的设备（手机、家庭、汽车……）。最终，机器人技术将在硬件方面迎头赶上，那个家庭人工智能助手将变成我们一直梦寐以求的个人机器人。
- en: Personally, I’m very excited for AI to replace humans in small daily tasks.
    I can’t wait to see my personal robot sending emails, booking appointments, and
    organizing my agenda for the day, while I enjoy breakfast (that I will still cook
    myself because the “from scratch” approach never dies!).
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我对人工智能取代人类在小日常任务上感到非常兴奋。我迫不及待地想看到我的个人机器人发送电子邮件、预约和安排我一天的活动，而我则享受着早餐（因为我还是会自己动手做，因为“从零开始”的方法永远不会过时！）。
- en: '* * *'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
