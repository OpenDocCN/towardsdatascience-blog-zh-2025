- en: Summary
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This article introduces how to **write, test, and deploy** your remote, Streamable
    HTTP Model Context Protocol (MCP) server in the cloud, enabling any MCP client
    to access functions (tools) remotely.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 本文介绍了如何在云中**编写、测试和部署**你的远程、可流式传输的HTTP模型上下文协议（MCP）服务器，使任何MCP客户端都能远程访问功能（工具）。
- en: I showed you how to code some useful stand-alone functions — a Nobel prize checker
    and a city temperature information tool. After testing these locally using the
    **curl** command to ensure they worked as expected, we converted them into MCP
    tools and coded an MCP server. After deploying and successfully testing the MCP
    server locally, we looked at how to deploy our server to the cloud.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我向你展示了如何编写一些有用的独立函数——一个诺贝尔奖检查器和城市温度信息工具。在本地使用curl命令测试这些以确保它们按预期工作后，我们将它们转换为MCP工具并编写了一个MCP服务器。在本地成功部署和测试MCP服务器后，我们探讨了如何将我们的服务器部署到云中。
- en: For that purpose, I demonstrated how to use Render, a cloud hosting platform,
    and walked you through the steps of signing up and deploying (for free) our MCP
    server app. We then used curl to test the remote server, confirming it was working
    as expected.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这个目的，我演示了如何使用Render，一个云托管平台，并指导你完成注册和免费部署我们的MCP服务器应用的步骤。然后我们使用curl测试远程服务器，确认它按预期工作。
- en: Finally, I also provided some Python code you can use to test the MCP server.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我还提供了一些你可以用来测试MCP服务器的Python代码。
- en: Feel free to test out my MCP server on Render for yourself. Note that because
    it’s on the free tier, the server spins down after a period of inactivity, which
    may result in a 30–60 second delay in retrieving results.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 随意测试一下我在Render上的MCP服务器。请注意，因为它处于免费层，服务器在一段时间的不活动后将会关闭，这可能会导致在检索结果时出现30-60秒的延迟。
