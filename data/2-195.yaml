- en: An Introduction to Remote Model Context Protocol Servers
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 远程模型上下文协议服务器的介绍
- en: 原文：[https://towardsdatascience.com/an-introduction-to-remote-model-context-protocol-servers/](https://towardsdatascience.com/an-introduction-to-remote-model-context-protocol-servers/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/an-introduction-to-remote-model-context-protocol-servers/](https://towardsdatascience.com/an-introduction-to-remote-model-context-protocol-servers/)
- en: I last wrote about the Model Context Protocol (MCP) in <mdspan datatext="el1751376232219"
    class="mdspan-comment">early</mdspan> December 2024, shortly before the topic’s
    exponential growth into what it is today. I recall thinking at the time that one
    of the key things I felt had to happen to MCP to make the technology a game changer
    was the ability for MCP clients to access non-local MCP servers. That’s already
    happening, of course, but what if you want a piece of this action? How do you
    go about writing a remote MCP server, crafting useful tools for it, testing it,
    then deploying it to the cloud, for example, so that anyone can access the tools
    it exposes from any supported client anywhere in the world?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我上一次写关于模型上下文协议（MCP）是在2024年12月初，就在这个主题指数级增长到今天之前不久。我记得当时认为，为了让MCP成为一项颠覆性技术，MCP客户端能够访问非本地MCP服务器是必须发生的关键事情之一。当然，这已经发生了，但如果你想要参与其中的一小部分呢？你该如何着手编写远程MCP服务器，为它制作有用的工具，测试它，然后将其部署到云端，例如，以便任何人都可以从任何支持客户端的任何地方访问它所暴露的工具？
- en: I’ll show you how to do all of those things in this article.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在本文中向你展示如何完成所有这些事情。
- en: A quick recap on what an MCP server is
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 快速回顾一下什么是MCP服务器
- en: There are dozens of definitions for what an MCP server is. In my view, which
    is probably a bit of an oversimplification, an MCP server enables MCP-enabled
    clients, such as Cursor and Claude code, to call useful functions that the MCP
    server contains.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 对于什么是MCP服务器，有数十种定义。在我看来，这可能有点过于简化，MCP服务器使得MCP启用客户端，例如Cursor和Claude代码，能够调用MCP服务器包含的有用功能。
- en: How is that different from you just writing a bunch of valuable tools and calling
    them in your code?
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这和你只是编写了一堆有价值的工具并在你的代码中调用它们有什么不同？
- en: Well, the key is that*you’re* writing those tools. What about the potential
    universe of tools that exist that *someone else* has written? I’m sure you’ve
    heard the expression **“… there’s an app for that”**. In the not-too-distant future,
    that might become “**… there’s an MCP server for that**“. Ok, not as snappy but
    just as groundbreaking.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，关键是这些工具是你写的。那么，其他人编写存在的潜在工具宇宙怎么办？我确信你听说过这个表达：“……有应用可以做到这一点”。在不远的将来，那可能变成“……有MCP服务器可以做到这一点”。好吧，虽然不那么简洁，但同样具有开创性。
- en: Until now, the vast majority of MCP servers have been written with the STDIO
    transport type in mind. This means that the onus is on *you* to host the server
    on your local system. That can sometimes be tricky and prone to error. Moreover,
    only you can access that server. And that is where remote (or Streamable HTTP)
    MCP servers come into their own. Hosted remotely, you only need to know the URL
    of the server and the names of the tools it provides, and you’re up and running
    with it in seconds.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，绝大多数MCP服务器都是基于STDIO传输类型编写的。这意味着服务器托管在你本地系统上的责任在你身上。这有时可能很棘手且容易出错。此外，只有你能访问那个服务器。这就是远程（或可流式传输的HTTP）MCP服务器发挥作用的地方。托管在远程，你只需要知道服务器的URL和它提供的工具名称，你就可以在几秒钟内启动并运行。
- en: So, if you’ve written something that others might find truly helpful, why not
    make a remote MCP server of it, host it in the cloud and let others use it too?
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，如果你编写了其他人可能会觉得真正有用的东西，为什么不把它做成一个远程MCP服务器，将其托管在云端，并让其他人也能使用它呢？
- en: Ok, let’s do this.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，让我们开始吧。
- en: My setup
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我的设置
- en: I’ll be developing the code for the MCP server and its tools using Windows and
    Microsoft Visual Studio Code. I’ll be using Git Bash for my command line as it
    comes with some handy utilities that I’ll use, such as **curl** and **sed**. You’ll
    also need to install **Node.js** and the **uv** Python package utility. If you
    want to deploy the finished MCP server to the cloud, you’ll also need to store
    your code on GitHub, so you’ll need an account for that.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我将使用Windows和Microsoft Visual Studio Code来开发MCP服务器及其工具的代码。我将使用Git Bash作为我的命令行，因为它附带了一些我将会使用的实用工具，例如**curl**和**sed**。你还需要安装**Node.js**和**uv**
    Python包工具。如果你想将完成的MCP服务器部署到云端，你还需要在GitHub上存储你的代码，因此你需要一个账户。
- en: The first thing you should do is initialise a new project for your code, etc.
    Use the **uv** tool with the init flag for this. Next, we add an environment,
    switch to it and add all the external libraries that our code will use.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该做的第一件事是为你的代码等初始化一个新的项目。使用带有 init 标志的 **uv** 工具来完成此操作。接下来，我们添加一个环境，切换到它并添加所有我们的代码将使用的外部库。
- en: '[PRE0]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: What we’ll develop
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们将要开发的内容
- en: We will develop an MCP server and two distinct tools for our MCP server to utilise.
    The first will be a Nobel Prize checker. You provide a Year, e.g, 1935, and a
    subject, e.g, Physics, and the MCP server will return information about who won
    the prize that year in that subject. The second tool will return the maximum recorded
    temperature for a city in the past week
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将开发一个 MCP 服务器以及两个不同的工具，以便我们的 MCP 服务器可以利用。第一个将是一个诺贝尔奖检查器。你提供一个年份，例如，1935年，以及一个主题，例如，物理学，然后
    MCP 服务器将返回关于该主题该年获奖者的信息。第二个工具将返回过去一周内某个城市的最高记录温度
- en: First off, we’ll code our two tools and test them locally. Next, we will incorporate
    the tools into an MCP server running locally and test that setup. If it works
    as expected, we can deploy the MCP server and its tools to a remote cloud server
    and verify that it continues to function correctly.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将编写我们的两个工具并在本地进行测试。接下来，我们将将这些工具集成到本地运行的 MCP 服务器中，并测试该配置。如果一切按预期工作，我们可以将
    MCP 服务器及其工具部署到远程云服务器上，并验证其是否继续正常工作。
- en: Code Example 1— Getting Nobel prize information
  id: totrans-18
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码示例 1— 获取诺贝尔奖信息
- en: 'The services of the Nobel Prize website are licensed under the Creative Commons
    zero license. You can see the details using the link below:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 诺贝尔奖网站的服务受 Creative Commons zero 许可协议许可。您可以通过以下链接查看详细信息：
- en: '[https://www.nobelprize.org/about/terms-of-use-for-api-nobelprize-org-and-data-nobelprize-org](https://www.nobelprize.org/about/terms-of-use-for-api-nobelprize-org-and-data-nobelprize-org)'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.nobelprize.org/about/terms-of-use-for-api-nobelprize-org-and-data-nobelprize-org](https://www.nobelprize.org/about/terms-of-use-for-api-nobelprize-org-and-data-nobelprize-org)'
- en: Here is the base function we’ll use. Open up your code editor and save this
    content in a file called **prize_tool.py**.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我们将要使用的基函数。打开你的代码编辑器，并将以下内容保存到一个名为 **prize_tool.py** 的文件中。
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This script defines a small “nobel-checker” MCP (Model Context Protocol) tool
    that can be run either locally or inside a FastMCP server. After trying to import
    `FastMCP` from the `mcp.server` package, and falling back to a sibling `fastmcp`
    module if that import fails. It then constructs an MCP instance named **nobelChecker**
    with the stateless_http=True flag, meaning that FastMCP will automatically expose
    a plain HTTP endpoint for one-shot calls. The decorated function **nobel_checker**
    becomes an MCP tool. When invoked, it constructs a query to the Rest API using
    the supplied year and subject matter, and returns the name(s) of the prize winner
    for that year and subject (or a helpful message if not).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 此脚本定义了一个小的“nobel-checker” MCP（模型上下文协议）工具，该工具可以在本地或 FastMCP 服务器内部运行。在尝试从 `mcp.server`
    包中导入 `FastMCP` 并在导入失败时回退到同级的 `fastmcp` 模块后，它将构建一个名为 **nobelChecker** 的 MCP 实例，带有
    stateless_http=True 标志，这意味着 FastMCP 将自动为单次调用暴露一个纯 HTTP 端点。装饰函数 **nobel_checker**
    成为一个 MCP 工具。当调用时，它使用提供的年份和主题构建一个对 Rest API 的查询，并返回该年份和主题的获奖者姓名（或如果不存在，则返回一条有用的消息）。
- en: If we run the above code locally, we obtain output similar to the following,
    which indicates that the function is working correctly and performing its intended
    task.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在本地运行上述代码，我们将获得类似于以下输出的结果，这表明函数正在正确工作并执行其预期任务。
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Code Example 2— Getting city temperature information
  id: totrans-26
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码示例 2— 获取城市温度信息
- en: For our second base function, we’ll write a tool that returns the highest temperature
    for a city over the last week. The weather data is provided by Open-Meteo.com.
    On their license page (“[https://open-meteo.com/en/license](https://open-meteo.com/en/license)),
    it states,
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的第二个基函数，我们将编写一个工具，该工具可以返回过去一周内某个城市的最高温度。天气数据由 Open-Meteo.com 提供。在其许可页面（[https://open-meteo.com/en/license](https://open-meteo.com/en/license)），它声明，
- en: “API data are offered under [Attribution 4.0 International (CC BY 4.0)](https://creativecommons.org/licenses/by/4.0/)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: “API 数据在 [Attribution 4.0 国际 (CC BY 4.0)](https://creativecommons.org/licenses/by/4.0/)
    许可下提供”
- en: You are free to **share:** copy and redistribute the material in any medium
    or format and **adapt:** remix, transform, and build upon the material. “
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以自由地**分享**：以任何媒体或格式复制和重新分发材料，以及**改编**：混搭、转换和在此基础上构建材料。“
- en: I have given the correct attribution and link to their license, which fulfills
    the terms of their license.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经给出了正确的归属和链接到他们的许可，这满足了他们许可的条款。
- en: Create the Python file **temp_tool.py** and enter this code.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 Python 文件 **temp_tool.py** 并输入以下代码。
- en: '[PRE3]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This function takes a city name and returns the highest recorded temperature
    in the city for the last week.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数接受一个城市名称，并返回该城市过去一周记录的最高温度。
- en: Here is a typical output when running locally.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是本地运行时的典型输出。
- en: '[PRE4]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Creating our MCP server
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建我们的 MCP 服务器
- en: Now that we’ve shown our functions are working, let’s incorporate them into
    an MCP server and get that running locally. Here is the server code you’ll need.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经展示了我们的函数可以正常工作，让我们将它们整合到 MCP 服务器中，并在本地运行它。以下是您需要的服务器代码。
- en: '[PRE5]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The only changes to our original prize_tool and temp_tool codebases are to delete
    the three lines at the bottom of each, which are used for testing. Remove these
    from both.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对原始 prize_tool 和 temp_tool 代码库的唯一更改是在每个文件的底部删除三行，这些行用于测试。从两个文件中删除这些行。
- en: '[PRE6]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Running the MCP server locally
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 本地运行 MCP 服务器
- en: To run our server, type the following command into a command-line terminal.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行我们的服务器，请在命令行终端中输入以下命令。
- en: '[PRE7]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Testing our MCP server locally
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 本地测试我们的 MCP 服务器
- en: We can use a Gitbash command terminal and curl for this. Make sure your server
    is up and running first. Let’s try our temperature checker tool first. The output
    can always be post-processed to bring out exactly the content you want in a more
    user-friendly format.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用 Gitbash 命令行终端和 curl 来做这个。首先确保您的服务器正在运行。让我们先尝试我们的温度检查工具。输出总是可以后处理，以便以更用户友好的格式显示您想要的内容。
- en: '[PRE8]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This shows the max temp in NY over the last week was 104.3 Fahrenheit.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这显示过去一周纽约的最高温度为 104.3 华氏度。
- en: And now we can test the prize checker tool.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以测试奖品检查工具了。
- en: '[PRE9]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Albert Einstein did indeed win the Nobel Prize for Physics in 1921.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 阿尔伯特·爱因斯坦确实在 1921 年赢得了诺贝尔物理学奖。
- en: Deploying our MCP server remotely
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 远程部署我们的 MCP 服务器
- en: Now that we’re satisfied with our code and that the MCP server is working as
    expected locally, the next stage is to deploy it remotely, allowing anyone in
    the world to use it. There are a few options to do this, but perhaps the easiest
    (and initially the cheapest) is to use a service like **Render.**
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们对我们的代码感到满意，并且 MCP 服务器在本地运行正常，下一步是将它远程部署，让世界上任何人都可以使用它。有几种方法可以做到这一点，但可能最简单（并且最初成本最低）的是使用像
    **Render** 这样的服务。
- en: Render is a modern cloud hosting platform — like a simpler alternative to AWS,
    Heroku, or Vercel — that lets you deploy full-stack apps, APIs, databases, background
    workers, and more, with minimal DevOps overhead. More to the point is that it’s
    free to get started and is more than enough for our needs. So head over to their
    [website](https://render.com/) and sign up.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: Render 是一个现代云托管平台——类似于 AWS、Heroku 或 Vercel 的简化替代品——它允许您部署全栈应用、API、数据库、后台工作进程等，而
    DevOps 成本最小。更重要的是，它免费开始使用，并且对我们的需求来说已经足够了。所以前往他们的 [网站](https://render.com/) 并注册。
- en: Before deploying with Render, you must commit and send your code to a GitHub
    (or a GitLab/Bitbucket) repository. After that, on the Render website, choose
    to create a New web server,
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用 Render 部署之前，您必须将代码提交并发送到 GitHub（或 GitLab/Bitbucket）仓库。之后，在 Render 网站上，选择创建新的
    Web 服务器，
- en: '![](../Images/a4130fb1b4388691fb0e7d0e80b711f1.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a4130fb1b4388691fb0e7d0e80b711f1.png)'
- en: Image from the Render website
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 来自 Render 网站的图片
- en: The first time, Render will ask for access to your GitHub (or Bitbucket/GitLab)
    account.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次，Render 将会请求访问您的 GitHub（或 Bitbucket/GitLab）账户。
- en: '![](../Images/9b2038c811e737dccb98d16d6c2f0756.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9b2038c811e737dccb98d16d6c2f0756.png)'
- en: Image from the Render website
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 来自 Render 网站的图片
- en: After that, you need to provide the commands to build your deployment and start
    your server. For example ….
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，您需要提供构建部署和启动服务器的命令。例如……
- en: '![](../Images/6b0a5966d62d788547485b57815e5c15.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6b0a5966d62d788547485b57815e5c15.png)'
- en: Image from the Render website
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 来自 Render 网站的图片
- en: Back on the ***Settings*** screen, click the ***Manual*** ***Deploy* *-> Deploy
    latest commit***menu item, and a log of the build and deployment process will
    be displayed. After a few minutes, you should see the following messages indicating
    your deployment was successful.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在 ***设置*** 屏幕上，点击 ***手动*** ***部署*** -> ***部署最新提交*** 菜单项，将显示构建和部署过程的日志。几分钟之后，您应该会看到以下消息，表明您的部署成功。
- en: '[PRE10]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The vital address you need is the one marked as the primary URL. In our case,
