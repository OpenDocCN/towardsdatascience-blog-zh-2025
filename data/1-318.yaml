- en: 'Hands-On with Agents SDK: Safeguarding Input and Output with Guardrails'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与代理SDK动手实践：使用护栏保护输入和输出
- en: 原文：[https://towardsdatascience.com/hands-on-with-agents-sdk-safeguarding-input-and-output-with-guardrails/](https://towardsdatascience.com/hands-on-with-agents-sdk-safeguarding-input-and-output-with-guardrails/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/hands-on-with-agents-sdk-safeguarding-input-and-output-with-guardrails/](https://towardsdatascience.com/hands-on-with-agents-sdk-safeguarding-input-and-output-with-guardrails/)
- en: '<mdspan datatext="el1757026813296" class="mdspan-comment">As we continue</mdspan>
    exploring features in the OpenAI Agents SDK framework, there’s one capability
    that deserves a closer look: **input and output guardrails**.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757026813296" class="mdspan-comment">随着我们继续探索OpenAI代理SDK框架中的功能，有一个功能值得我们仔细研究：**输入和输出护栏**。
- en: 'In previous articles, we built our first agent with an API-calling tool and
    then expanded into a multi-agent system. In real-world scenarios, though, building
    these systems is complex—and without the right safeguards, things can quickly
    go off track. That’s where guardrails come in: they help ensure safety, focus,
    and efficiency.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的文章中，我们使用API调用工具构建了我们的第一个代理，然后扩展到多代理系统。然而，在现实世界的场景中，构建这些系统是复杂的——如果没有适当的保障措施，事情可能会迅速偏离轨道。这就是护栏的作用：它们有助于确保安全、专注和效率。
- en: '*If you haven’t read the earlier parts yet, no worries — you’ll find links
    to the previous articles at the end of this post.*'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*如果您还没有阅读前面的部分，不用担心——您将在本帖的末尾找到以前文章的链接。*'
- en: 'Here’s why guardrails matter:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是为什么护栏很重要：
- en: Prevent misuse
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 防止误用
- en: Save resources
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 节省资源
- en: Ensure safety and compliance
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保安全和合规
- en: Maintain focus and quality
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持专注和质量
- en: Without proper guardrails, unexpected use cases can pop up. For example, you
    might have heard of people using AI-powered customer service bots (designed for
    product support) to write code instead. It sounds funny, but for the company,
    it can become a costly and irrelevant distraction.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 没有适当的护栏，可能会出现意外的用例。例如，您可能听说过有人使用AI驱动的客户服务机器人（设计用于产品支持）来编写代码。这听起来很滑稽，但对于公司来说，它可能成为一种昂贵且无关的干扰。
- en: To see why guardrails are important, let’s revisit our last project. I ran the
    `agents_as_tools` script and asked it to generate code for calling a weather API.
    Since no guardrails were in place, the app returned the answer without hesitation—proving
    that, by default, it will try to do almost anything asked of it.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了了解护栏的重要性，让我们回顾一下我们的上一个项目。我运行了`agents_as_tools`脚本，并要求它为调用天气API生成代码。由于没有设置护栏，应用毫不犹豫地返回了答案——证明默认情况下，它几乎会尝试做任何事情。
- en: '![](../Images/54e144a9b43bd971daa69fb17f8e99cc.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/54e144a9b43bd971daa69fb17f8e99cc.png)'
- en: We definitely don’t want this happening in a production app. Imagine the costs
    of unintended usage—not to mention the bigger risks it can bring, such as information
    leaks, system prompt exposure, and other serious vulnerabilities.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们绝对不希望这种情况在生产应用中发生。想象一下意外使用带来的成本——更不用说它可能带来的更大风险，如信息泄露、系统提示暴露和其他严重漏洞。
- en: Hopefully, this makes the case clear for why guardrails are worth exploring.
    Next, let’s dive into how to start using the guardrail feature in the OpenAI Agents
    SDK.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这能清楚地说明为什么护栏值得探索。接下来，让我们深入了解如何在OpenAI代理SDK中开始使用护栏功能。
- en: A Quick Intro to Guardrails
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 护栏快速入门
- en: 'In the OpenAI Agents SDK, there are two types of guardrails: **input guardrails**
    and **output guardrails** ^([1]). Input guardrails run on the user’s initial input,
    while output guardrails run on the agent’s final response.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在OpenAI代理SDK中，有两种类型的护栏：**输入护栏**和**输出护栏**^([1])。输入护栏在用户的初始输入上运行，而输出护栏在代理的最终响应上运行。
- en: A guardrail can be an LLM-powered agent—useful for tasks that require reasoning—or
    a rule-based/programmatic function, such as a regex to detect specific keywords.
    If the guardrail finds a violation, it triggers a *tripwire* and raises an exception.
    This mechanism prevents the main agent from processing unsafe or irrelevant queries,
    ensuring both safety and efficiency.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 护栏可以是一个由LLM（大型语言模型）驱动的代理——对于需要推理的任务很有用——或者是一个基于规则/程序性的函数，例如正则表达式来检测特定关键词。如果护栏发现违规，它将触发一个*警报线*并引发异常。这种机制阻止主代理处理不安全或不相关的查询，确保安全和效率。
- en: 'Some practical uses for input guardrails include:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 输入护栏的一些实际用途包括：
- en: Identifying when a user asks an off-topic question ^([2])
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别用户提出离题问题时的情况^([2])
- en: Detecting unsafe input attempts, including jailbreaks and prompt injections
    ^([3])
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检测不安全的输入尝试，包括越狱和提示注入^([3])
- en: Moderating to flag inappropriate input, such as harassment, violence, or hate
    speech ^([3])
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监管以标记不适当的内容，例如骚扰、暴力或仇恨言论 ^([3])
- en: Handling specific-case validation. For example, in our weather app, we could
    enforce that questions only reference cities in Indonesia.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理特定案例验证。例如，在我们的天气应用中，我们可以强制要求问题仅引用印度尼西亚的城市。
- en: 'On the other hand, output guardrails can be used to:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，输出守卫可以用作：
- en: Prevent unsafe or inappropriate responses
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 防止不安全或不适当的内容
- en: Stop the agent from leaking personally identifiable information (PII) ^([3])
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阻止代理泄露个人身份信息（PII）^([3])
- en: Ensure compliance and brand safety, such as blocking outputs that could harm
    brand integrity
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保合规性和品牌安全，例如阻止可能损害品牌完整性的输出
- en: In this article, we’ll explore different types of guardrails, including both
    LLM-based and rule-based approaches, and how they can be applied for various kinds
    of validation.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将探讨不同类型的守卫，包括基于 LLM 和基于规则的策略，以及它们如何应用于各种验证。
- en: Prerequisites
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前提条件
- en: 'Create a `requirements.txt` file:'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个 `requirements.txt` 文件：
- en: '[PRE0]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Create a virtual environment named `venv`. Run the following commands in your
    terminal:'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个名为 `venv` 的虚拟环境。在您的终端中运行以下命令：
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Create a `.env` file to store your OpenAI API key:'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个 `.env` 文件来存储您的 OpenAI API 密钥：
- en: '[PRE2]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'For the guardrail implementation, we’ll use the script from the previous article
    where we built the agents-as-tools multi-agent system. For a detailed walkthrough,
    please refer back to that article. The full implementation script can be found
    here: [app06_agents_as_tools.py](https://github.com/miqbalrp/agentic-ai-weather/blob/main/app06_agents_as_tools.py).'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 对于守卫实现，我们将使用前一篇文章中的脚本，其中我们构建了代理作为工具的多代理系统。有关详细说明，请参阅该文章。完整的实现脚本可以在以下位置找到：[app06_agents_as_tools.py](https://github.com/miqbalrp/agentic-ai-weather/blob/main/app06_agents_as_tools.py)。
- en: Now let’s create a new file named `app08_guardrails.py`.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们创建一个名为 `app08_guardrails.py` 的新文件。
- en: Input Guardrail
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 输入守卫
- en: 'We’ll start by adding input guardrails to our weather app. In this section,
    we’ll build two types:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先将输入守卫添加到我们的天气应用中。在本节中，我们将构建两种类型：
- en: '*Off-topic guardrail*, which uses an LLM to determine if the user input is
    unrelated to the app’s purpose.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*离题守卫*，它使用 LLM 来确定用户输入是否与应用目的无关。'
- en: '*Injection detection guardrail*, which uses a simple rule to catch jailbreak
    and prompt injection attempts.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*注入检测守卫*，它使用简单的规则来捕获越狱和提示注入尝试。'
- en: Import Libraries
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 导入库
- en: First, let’s import the necessary packages from the Agents SDK and other libraries.
    We’ll also set up the environment to load the OpenAI API key from the `.env` file.
    From the Agents SDK, besides the basic functions (`Agent`, `Runner`, and `function_tool`)
    we’ll also import functions specifically used for implementing input and output
    guardrails.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们从代理 SDK 和其他库中导入必要的包。我们还将设置环境以从 `.env` 文件中加载 OpenAI API 密钥。从代理 SDK 中，除了基本功能（`Agent`、`Runner`
    和 `function_tool`）外，我们还将导入用于实现输入和输出守卫的特定函数。
- en: '[PRE3]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Define Output Model
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义输出模型
- en: For any LLM-based guardrail, we need to define an *output model*. Typically,
    we use a Pydantic model class to specify the structure of the data. At the simplest
    level, we need a boolean field (True/False) to indicate whether the guardrail
    should trigger, along with a text field that explains the reasoning.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 对于任何基于 LLM 的守卫，我们需要定义一个 *输出模型*。通常，我们使用 Pydantic 模型类来指定数据的结构。在最简单的层面上，我们需要一个布尔字段（True/False）来指示守卫是否应该触发，以及一个文本字段来解释推理。
- en: 'In our case, we want the guardrail to determine whether the query is still
    within the scope of the app’s purpose (weather and air quality). To do that, we’ll
    define a model named `TopicClassificationOutput` as shown below:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的案例中，我们希望守卫能够确定查询是否仍然在应用目的的范围内（天气和空气质量）。为此，我们将定义一个名为 `TopicClassificationOutput`
    的模型，如下所示：
- en: '[PRE4]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The boolean field `is_off_topic` will be set to `True` if the input is outside
    the app’s scope. The `reasoning` field stores a short explanation of why the model
    made its classification.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如果输入超出应用的范围，布尔字段 `is_off_topic` 将设置为 `True`。`reasoning` 字段存储了模型进行分类的简要解释。
- en: Create Guardrail Agent
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建守卫代理
- en: We need to define an agent with clear and complete instructions to determine
    whether a user’s question is on-topic or off-topic. This can be adjusted depending
    on your app’s purpose—the instructions don’t have to be the same for every use
    case.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要定义一个具有清晰和完整指令的代理，以确定用户的提问是否在主题范围内或超出主题范围。这可以根据您的应用目的进行调整——指令不必为每个用例都相同。
- en: For our Weather and Air Quality assistant, here’s the guardrail agent with instructions
    for classifying a user’s query.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的天气和空气质量助手，这里提供了用于对用户查询进行分类的防护栏代理指令。
- en: '[PRE5]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: In the instructions, besides listing the obvious topics, we also allow some
    flexibility for simple conversational starters like “hello,” “hi,” or other greetings.
    To make the classification clearer, we included examples of both on-topic and
    off-topic queries.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在指令中，除了列出明显的主题外，我们还允许一些简单的对话开头，如“hello”、“hi”或其他问候语。为了使分类更清晰，我们包括了相关和无关查询的示例。
- en: Another benefit of input guardrails is cost optimization. To take advantage
    of this, we should use a faster and more cost-effective model than the main agent.
    This way, the main (and more expensive) agent is only used when absolutely necessary.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 输入防护栏的另一个好处是成本优化。为了利用这一点，我们应该使用比主要代理更快速、更经济的模型。这样，主要（且更昂贵）的代理只有在绝对必要时才会使用。
- en: In this example, the guardrail agent uses `gpt-4o-mini` while the main agent
    runs on `gpt-4o`.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，防护栏代理使用`gpt-4o-mini`，而主要代理在`gpt-4o`上运行。
- en: Create an Input Guardrail Function
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建输入防护栏功能
- en: 'Next, let’s wrap the agent in an async function decorated with `@input_guardrail`.
    The output of this function will include two fields defined earlier: `is_off_topic`
    and `reasoning`.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们将代理包裹在一个带有`@input_guardrail`装饰器的异步函数中。该函数的输出将包括之前定义的两个字段：`is_off_topic`和`reasoning`。
- en: The function returns a structured `GuardrailFunctionOutput` object containing
    `output_info` (set from the `reasoning` field) and `tripwire_triggered`.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 函数返回一个包含`output_info`（从`reasoning`字段设置）和`tripwire_triggered`的`GuardrailFunctionOutput`对象。
- en: The `tripwire_triggered` value determines whether the input should be blocked.
    If `is_off_topic` is `True`, the tripwire triggers, blocking the input. Otherwise,
    the value is `False` and the main agent continues processing.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '`tripwire_triggered`值决定了输入是否应该被阻止。如果`is_off_topic`为`True`，则触发防护栏，阻止输入。否则，该值是`False`，主要代理将继续处理。'
- en: '[PRE6]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Create a Rule-based Input Guardrail Function
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建基于规则的输入防护栏功能
- en: Alongside the LLM-based off-topic guardrail, we’ll create a simple rule-based
    guardrail. This one doesn’t require an LLM and instead relies on programmatic
    pattern matching.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 除了基于LLM的无关防护栏外，我们还将创建一个简单的基于规则的防护栏。这个不需要LLM，而是依赖于程序性模式匹配。
- en: Depending on your app’s purpose, rule-based guardrails can be very effective
    at blocking harmful inputs—especially when risky patterns are predictable.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您的应用程序目的，基于规则的防护栏在阻止有害输入方面可能非常有效——尤其是在风险模式可预测的情况下。
- en: 'In this example, we define a list of keywords often used in jailbreak or prompt
    injection attempts. The list includes: `"ignore previous instructions", "you are
    now a", "forget everything above", "developer mode", "override safety", "disregard
    guidelines"`.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们定义了一个列表，其中包含在越狱或提示注入尝试中经常使用的关键字。该列表包括：“ignore previous instructions”、“you
    are now a”、“forget everything above”、“developer mode”、“override safety”、“disregard
    guidelines”。
- en: 'If the user input contains any of these keywords, the guardrail will trigger
    automatically. Since no LLM is involved, we can handle the validation directly
    inside the input guardrail function `injection_detection_guardrail`:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果用户输入包含这些关键字中的任何一个，防护栏将自动触发。由于没有涉及LLM，我们可以在输入防护栏函数`injection_detection_guardrail`内部直接处理验证。
- en: '[PRE7]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This guardrail simply checks the input against the keyword list. If a match
    is found, `tripwire_triggered` is set to `True`. Otherwise, it remains `False`.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这个防护栏只是将输入与关键字列表进行比对。如果找到匹配项，则`tripwire_triggered`设置为`True`。否则，它保持`False`。
- en: Define Specialized Agent for Weather and Air Quality
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义天气和空气质量专用代理
- en: Now let’s continue by defining the weather and air quality specialist agents
    with their function tool. The explanation of this part can be found on my previous
    article so for this article I will skip the explanation.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们继续定义天气和空气质量专家代理及其功能工具。这部分解释可以在我的上一篇文章中找到，所以对于这篇文章，我将跳过解释。
- en: '[PRE8]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Define the Orchestrator Agent with Input Guardrails
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义具有输入防护栏的编排代理
- en: Almost the same with previous part, the orchestrator agent here have the same
    properties with the one that we already discussed on my previous article where
    in the *agents-as-tools* pattern, the orchestrator agent will manage the task
    of each specialized agents instead of handing-offer the task to one agent like
    in *handoff* pattern.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 与前面部分几乎相同，这里的编排代理具有与我之前文章中讨论的相同的属性，在*agents-as-tools*模式中，编排代理将管理每个专用代理的任务，而不是像*handoff*模式那样将任务转交给一个代理。
- en: The only different here is we adding new property to the agent; `input_guardrails`.
    In this property, we pass the list of the input guardrail functions that we have
    defined before; `off_topic_guardrail` and `injection_detection_guardrail`.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的唯一不同之处在于我们给代理添加了新的属性；`input_guardrails`。在这个属性中，我们传递了之前定义的输入防护栏函数的列表；`off_topic_guardrail`和`injection_detection_guardrail`。
- en: '[PRE9]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: One thing that I observed while experimenting with guardrails is when we listed
    the guardrail function in the agent property, the list will be used as the sequence
    of the execution. Meaning that we can configure the evaluation order in the point
    of view of cost and impact.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在实验防护栏时，我观察到的一点是，当我们列出代理属性中的防护栏函数时，列表将被用作执行顺序。这意味着我们可以从成本和影响的角度配置评估顺序。
- en: In our case here, I think I should immediately cut the process if the query
    violate the prompt injection guardrail due to its impact and also since this validation
    requires no LLM. So, if the query already identified cannot be proceed, we don’t
    need to evaluate it using LLM (which has cost) in the off topic guardrail.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们这里的情况，我认为如果查询违反了提示注入防护栏，我应该立即切断流程，因为其影响以及这个验证不需要LLM。所以，如果已经识别出的查询无法进行，我们就不需要使用LLM（这会产生成本）在离题防护栏中进行评估。
- en: Create Main Function with Exception Handler
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建带有异常处理的主函数
- en: Here is the part where the input guardrail take a *real* action. In this part
    where we define the main function of Streamlit user interface, we will add an
    exception handling in particular when the input guardrail tripwire has been triggered.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是输入防护栏采取实际行动的部分。在这个部分，我们定义了Streamlit用户界面的主函数，我们将添加异常处理，特别是当输入防护栏的触发器被触发时。
- en: '[PRE10]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: As we can see in the code above, when the `InputGuardrailTripwireTriggered`
    is raise, it will show a user-friendly message that tell the user the app only
    can help for weather and air quality related question.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如上代码所示，当`InputGuardrailTripwireTriggered`被触发时，它会显示一个用户友好的消息，告诉用户该应用只能帮助回答与天气和空气质量相关的问题。
- en: To make the message will be more helpful, we also add additional info specifically
    for what input guardrail that blocked the user’s query. If the exception raised
    by `off_topic_guardrail`, it will show the reasoning from the agent that handle
    this. Meanwhile if it coming from `injection_detection_guardrail`, the app will
    show a hard-coded message “Potential jailbreaking or prompt injection detected.”.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使消息更有帮助，我们还添加了特定于阻止用户查询的输入防护栏的附加信息。如果异常是由`off_topic_guardrail`引发的，它将显示处理此问题的代理的推理。同时，如果它来自`injection_detection_guardrail`，应用将显示硬编码的消息“检测到潜在的越狱或提示注入。”。
- en: Run and Check
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运行并检查
- en: To test how the input guardrail works, let’s start by running the Streamlit
    app.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试输入防护栏的工作方式，让我们先运行Streamlit应用。
- en: '[PRE11]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: First, let’s try asking a question that aligns with the app’s intended purpose.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们尝试提出一个与应用预期目的相符的问题。
- en: '![](../Images/4efbca44f03fb7126ab67c3c83be7186.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4efbca44f03fb7126ab67c3c83be7186.png)'
- en: Agent’s response where the question is aligned with weather and air quality.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 与天气和空气质量相关的问题的代理响应。
- en: As expected, the app returns an answer since the question is related to weather
    or air quality.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，应用返回了答案，因为问题是与天气或空气质量相关的。
- en: Using Traces, we can see what’s happening under the hood.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Traces，我们可以看到幕后发生了什么。
- en: '![](../Images/7476827b0071846bd3fcb701a2ee78f8.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7476827b0071846bd3fcb701a2ee78f8.png)'
- en: Screenshot of Traces dashboard that shows the sequence of input guardrails and
    main agent run.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 展示输入防护栏和主代理运行序列的Traces仪表板截图。
- en: As discussed earlier, the input guardrails run before the main agent. Since
    we set the guardrail list in order, the `injection_detection_guardrail` runs first,
    followed by the `off_topic_guardrail`. Once the input passes these two guardrails,
    the main agent can execute the process.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，输入防护栏在主代理之前运行。由于我们按顺序设置了防护栏列表，`injection_detection_guardrail`首先运行，然后是`off_topic_guardrail`。一旦输入通过了这两个防护栏，主代理就可以执行流程。
- en: 'However, if we change the question to something completely unrelated to weather
    or air quality—like the history of Jakarta—the response looks like this:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果我们把问题改为与天气或空气质量完全不相关的问题——比如雅加达的历史——那么响应看起来就像这样：
- en: '![](../Images/5381f0d200e51d922bbec884c0f961a5.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5381f0d200e51d922bbec884c0f961a5.png)'
- en: If the question is not aligned, input guardrail will block the input before
    main agent takes action.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如果问题不匹配，输入防护栏将在主代理采取行动之前阻止输入。
- en: Here, the `off_topic_guardrail` triggers the tripwire, cuts the process midway,
    and returns a message along with some extra details about why it happened.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，`off_topic_guardrail` 触发了触发器，在过程中途截断，并返回了一条消息以及一些关于为什么发生的原因的额外细节。
- en: '![](../Images/002458c3f123d3dfc5304f5bb383d4fb.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/002458c3f123d3dfc5304f5bb383d4fb.png)'
- en: Screenshot of Traces dashboard that shows how the input guardrail blocked the
    process.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 展示输入防护栏如何阻止过程的跟踪仪表板截图。
- en: From the Traces dashboard for that history question, we can see the orchestrator
    agent throws an error because the guardrail tripwire was triggered.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 从该历史问题的跟踪仪表板中，我们可以看到协调代理抛出了一个错误，因为防护栏的触发器被触发了。
- en: Since the process was cut before the input reached the main agent, we never
    even called the main agent model—saving some bucks on a query the app isn’t supposed
    to handle anyway.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 由于在输入达到主要代理之前就中断了流程，我们甚至没有调用主要代理模型——在查询应用本不应该处理的情况下节省了一些费用。
- en: Output Guardrail
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 输出防护栏
- en: If the input guardrail ensures that the user’s query is safe and relevant, the
    **output guardrail** ensures that the agent’s response itself meets our desired
    standards. This is equally important because even with strong input filtering,
    the agent can still produce outputs that are unintended, harmful, or simply not
    aligned with our requirements.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 如果输入防护栏确保用户的查询是安全和相关的，那么**输出防护栏**确保代理的响应本身符合我们的期望标准。这同样重要，因为即使有强大的输入过滤，代理仍然可能产生不受欢迎的、有害的或根本不符合我们要求的输出。
- en: For example, in our app we want to ensure that the agent *always responds professionally*.
    Since LLMs often mirror the tone of the user’s query, they might reply in a casual,
    sarcastic, or unprofessional tone—which is outside the scope of the input guardrails
    we already implemented.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在我们的应用中，我们想要确保代理*始终以专业的方式回答*。由于LLMs经常模仿用户的查询语气，它们可能会用随意、讽刺或非专业的语气回复——这超出了我们已实施的输入防护栏的范围。
- en: To handle this, we add an output guardrail that checks whether a response is
    professional. If it’s not, the guardrail will trigger and prevent the unprofessional
    response from reaching the user.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 为了处理这个问题，我们添加了一个输出防护栏，用于检查响应是否专业。如果不是，防护栏将触发并阻止非专业响应发送给用户。
- en: Prepare the Output Guardrail Function
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备输出防护栏函数
- en: Just like the `off_topic_guardrail`, we create a new `professionalism_guardrail`.
    It uses a Pydantic model for the output, a dedicated agent to classify professionalism,
    and an async function decorated with `@output_guardrail` to enforce the check.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 就像`off_topic_guardrail`一样，我们创建了一个新的`professionalism_guardrail`。它使用Pydantic模型进行输出，一个专门的代理来分类专业性，以及一个用`@output_guardrail`装饰的异步函数来执行检查。
- en: '[PRE12]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Output Guardrail Implementation
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 输出防护栏实施
- en: Now we add this new guardrail to the orchestrator agent by listing it under
    `output_guardrails`. This ensures every response is checked before being shown
    to the user.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们通过在`output_guardrails`下列出它，将这个新的防护栏添加到协调代理中。这确保了在向用户展示之前，每个响应都会被检查。
- en: '[PRE13]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Finally, we extend the main function to handle `OutputGuardrailTripwireTriggered`
    exceptions. If triggered, the app will block the unprofessional response and return
    a friendly fallback message instead.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将主函数扩展以处理`OutputGuardrailTripwireTriggered`异常。如果触发，应用将阻止非专业响应，并返回一个友好的回退消息。
- en: '[PRE14]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Run and Check
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运行并检查
- en: 'Now, let’s take a look at how the output guardrail works. Start by running
    the app as before:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看输出防护栏是如何工作的。首先，像以前一样运行应用：
- en: '[PRE15]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'To test this, we can try to force the agent to answer in an unprofessional
    way related to weather or air quality. For example, by asking: *“Answer this question
    with hyperbole. What is the air quality in Jakarta?”*'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试这一点，我们可以尝试迫使代理以一种与天气或空气质量相关的非专业方式回答。例如，通过询问：“*用夸张的方式回答这个问题。雅加达的空气质量如何？*”
- en: '![](../Images/05a8b888fbba4893be1696a04994aad4.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/05a8b888fbba4893be1696a04994aad4.png)'
- en: Output guardrail blocked the agent response that is violate the quality standard.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 输出防护栏阻止了违反质量标准的代理响应。
- en: This query passes the input guardrails because it is still on-topic and not
    an attempt at prompt injection. As a result, the main agent processes the input
    and calls the correct function.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 此查询通过了输入防护栏，因为它仍然与主题相关，并且不是尝试注入提示。因此，主要代理处理了输入并调用了正确的函数。
- en: 'However, the final output generated by the main agent—since it followed the
    user’s hyperbole request—does not align with the brand’s communication standard.
    Here’s the result we got from the app:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于遵循了用户的夸张请求，主要代理生成的最终输出并不符合品牌的沟通标准。以下是应用返回的结果：
- en: Conclusion
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Throughout this article, we explored how guardrails in the OpenAI Agents SDK
    help us maintain control over both input and output. The input guardrail we built
    here protects the app from harmful or unintended user input that could cost us
    as developers, while the output guardrail ensures responses remain consistent
    with the brand standard.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了OpenAI代理SDK中的护栏如何帮助我们控制输入和输出。我们构建的输入护栏保护应用免受可能对我们开发者造成损失的有害或不经意的用户输入，而输出护栏确保响应与品牌标准保持一致。
- en: By combining these mechanisms, we can significantly reduce the risks of unintended
    usage, information leaks, or outputs that fail to align with the intended communication
    style. This is especially crucial when deploying agentic applications into production
    environments, where safety, reliability, and trust matter most.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合这些机制，我们可以显著降低意外使用、信息泄露或输出与预期沟通风格不一致的风险。这在将代理应用部署到生产环境时尤为重要，因为在这些环境中，安全、可靠和信任至关重要。
- en: Guardrails are not a silver bullet, but they are an essential layer of defense.
    As we continue building more advanced multi-agent systems, adopting guardrails
    early on will help ensure we create applications that are not only powerful but
    also safe, responsible, and cost-conscious.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 护栏不是万能的，但它们是防御层的一个基本组成部分。随着我们继续构建更高级的多代理系统，尽早采用护栏将有助于确保我们创建的应用不仅强大，而且安全、负责任且注重成本效益。
