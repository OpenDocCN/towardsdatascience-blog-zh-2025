- en: Summary
  id: totrans-280
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this article, we’ve explored the ACP protocol and its capabilities. Here’s
    the quick recap of the key points:'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了 ACP 协议及其功能。以下是关键点的快速回顾：
- en: ACP (Agent Communication Protocol) is an open protocol that aims to standardise
    communication between agents. It complements MCP, which handles interactions between
    agents and external tools and data sources.
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ACP（代理通信协议）是一个旨在标准化代理之间通信的开放协议。它补充了MCP，后者处理代理与外部工具和数据源之间的交互。
- en: ACP follows a client-server architecture and uses RESTful APIs.
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ACP 采用客户端-服务器架构并使用 RESTful API。
- en: The protocol is technology- and framework-agnostic, allowing you to build interoperable
    systems and create new collaborations between agents seamlessly.
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该协议不依赖于特定技术和框架，允许你构建可互操作的系统，并在代理之间无缝创建新的协作。
- en: With ACP, you can implement a wide range of agent interactions, from simple
    chaining in well-defined workflows to the router pattern, where an orchestrator
    can delegate tasks dynamically to other agents.
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 ACP，你可以实现各种代理交互，从在定义良好的工作流程中的简单链式操作到路由模式，其中协调器可以动态地将任务委派给其他代理。
- en: '*Thank you for reading. I hope this article was insightful. Remember Einstein’s
    advice: “The important thing is not to stop questioning. Curiosity has its own
    reason for existing.” May your curiosity lead you to your next great insight.*'
  id: totrans-286
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*感谢阅读。希望这篇文章能给你带来启发。记住爱因斯坦的建议：“重要的是不要停止提问。好奇心有其存在的理由。”愿你的好奇心引导你发现下一个伟大的洞察。*'
