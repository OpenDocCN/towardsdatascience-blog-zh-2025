  zh: 理论上，这个杆可以同时控制两个滑块。对于DPG春季会议，我有一个想法，即现场演示一个非常奇特的效果**m𝒶𝑔𝒾c𝑎𝓁 𝓌𝑜𝓇𝒹𝓈 𝒻𝓇𝑜𝓂 𝓅𝒽𝓎𝓈𝒾𝒸𝓈**。我相信，有些概念在舞台上现场演示时更有影响力和易于理解。
