- en: 'It looks like there are many steps to do. In reality, most of this code deals
    with connecting the controller and drawing a large “Connect” button. Don’t pay
    too much attention to the special methods — they can easily be replaced with those
    available in your specific environment:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来有很多步骤要做。实际上，大部分代码都是处理连接控制器和绘制一个大的“连接”按钮。不要过分关注特殊方法—它们可以很容易地用你特定环境中的那些方法替换：
- en: '`this.return(dom)` passes a `DOMElement` for embedding on the page'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`this.return(dom)`传递一个`DOMElement`以嵌入到页面上'
- en: '`this.ondestroy(function)` calls `function` when the cell is deleted, to clean
    up timers, etc.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`this.ondestroy(function)`在单元格被删除时调用`function`，以清理计时器等。'
- en: The first line `.esm` is a way to specify the JavaScript cell subtype in WLJS
    Notebook, which requires pre-bundling.
