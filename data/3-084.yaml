  zh: '[PRE6]</details>'
- en: 'As you can see, we have added several items here:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，我们在这里添加了几个项目：
- en: '*Joystick calibration* — analog sticks drift, so their digital position is
    never perfect `0.,0.`.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*摇杆校准*—模拟摇杆漂移，因此它们的数字位置永远不会完美`0.,0.`。'
- en: '*State of all buttons* — why hammer the door every time if you only need to
    gently knock when the state changes? This reduces system stress.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*所有按钮的状态*—为什么每次都需要用力敲门，如果你只需要在状态改变时轻轻敲击？这减少了系统压力。'
- en: '*Sending states to the event pool* — this is specific to WLJS, where we send
    data to the Wolfram machine (or Python if you’re in Jupyter).'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*将状态发送到事件池*—这仅适用于WLJS，我们将数据发送到Wolfram机器（如果你在Jupyter中，则是Python）。'
- en: 'The last point looks like this (replace with the equivalent in your environment):'
