  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 所有后续的示例都将从WLJS Notebook中提取。然而，你也可以使用Python + FAST API通过JavaScript或类似的东西进行接口，或者甚至只使用JS。笔记本的在线版本可在[这里](https://jerryi.github.io/wljs-demo/PresenterJoyCon.html)
    [13]找到。
