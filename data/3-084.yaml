  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 回到正题 🐏
- en: IMU or Gyroscope-Accelerometer Combination 🌐
  id: totrans-160
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: IMU或陀螺仪-加速度计组合 🌐
- en: 'To use them, we need to read the corresponding fields from the `details` object,
    namely:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用它们，我们需要从`details`对象中读取相应的字段，即：
- en: '*actualAccelerometer*: x, y, z'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*实际加速度计*: x, y, z'
- en: '*actualGyroscope*: rps (radians per second)'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*实际陀螺仪*: rps（每秒弧度）'
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Code</summary>
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>代码</summary>
- en: '[PRE16]</details>'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE16]</details>'
- en: Since IMU is not always needed, the script includes a boolean variable and a
    control function `JoyConIMU[True | False]`, allowing IMU measurements to be enabled
    or disabled.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 IMU 并非总是必需的，脚本包含一个布尔变量和控制函数`JoyConIMU[True | False]`，允许启用或禁用 IMU 测量。
- en: 'The JoyCon, like most other devices with IMU (some smartphones, watches, but
    definitely not VR headsets or quadcopters), includes:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: JoyCon，就像大多数带有 IMU 的其他设备（一些智能手机、手表，但绝对不是 VR 头盔或四旋翼无人机），包括：
- en: '**3-axis gyroscope** — returns angular velocity in **rad/sec** around all three
    axes'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**三轴陀螺仪**——返回围绕所有三个轴的角速度**弧度/秒**'
- en: '**3-axis accelerometer** — returns a single acceleration vector'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**三轴加速度计**——返回一个加速度向量'
- en: '**Question: Why can’t we use only a gyroscope or an accelerometer?**'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题：为什么我们不能只用陀螺仪或加速度计？**'
- en: 'Let’s try outputting both. First, enable IMU usage:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试输出两者。首先，启用 IMU 使用：
- en: '[PRE17]'
  id: totrans-172
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Now, define auxiliary functions and variables:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，定义辅助函数和变量：
- en: '[PRE18]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '**What happens here:**'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: '**这里发生了什么：**'
- en: The accelerometer vector is simply stored in `acceleration`.
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加速度向量简单地存储在`加速度`中。
- en: 'Gyroscope data is processed by:'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 陀螺仪数据通过以下方式处理：
- en: Reordering angular velocity values (JoyCon hardware orientation) and adjusting
    directions.
  id: totrans-178
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新排序角速度值（JoyCon 硬件方向）和调整方向。
- en: Integrating over time to obtain orientation angles
  id: totrans-179
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对时间进行积分以获得方向角度
- en: 'As a result, we obtain:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们得到：
- en: '**Three angles** defining JoyCon orientation `angles`.'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**三个角度**定义 JoyCon 方向的`角度`。'
- en: '**One acceleration vector** (at rest — the gravity direction) `acceleration`.'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一个加速度向量**（静止时——重力方向）`加速度`。'
- en: 'These three angles are conveniently expressed as a matrix (tensor):'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这三个角度方便地表示为一个矩阵（张量）：
- en: '[PRE19]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Applying this matrix to any 3D object allows it to be oriented according to
    these angles. Physically, on the JoyCon, it looks like this:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 将此矩阵应用于任何 3D 对象，使其根据这些角度进行定位。在 JoyCon 上，这看起来就像这样：
- en: '![](../Images/e3b4fb67ab96e24ff52954899b9a1254.png)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e3b4fb67ab96e24ff52954899b9a1254.png)'
- en: Image by author
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: It is important to note that since we measure only the first derivative (using
    Gyro), then the initial IMU orientation remains unknown. Therefore, we manually
    set the initial state, i.e.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，由于我们只测量一阶导数（使用陀螺仪），因此初始 IMU 方向仍然未知。因此，我们手动设置初始状态，即
- en: '`angles = {0., 0., 0}`'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '`angles = {0., 0., 0}`'
- en: '[PRE20]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Real-time Data Output:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 实时数据输出：
- en: '![](../Images/b87163df01b20fcb08ae5c570564d70a.png)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b87163df01b20fcb08ae5c570564d70a.png)'
- en: Image by author
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Well… Not quite obvious what these values mean. Let’s try to draw then as vectors
    in 3D space:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯……这些值的意义并不明显。让我们尝试将它们作为向量在 3D 空间中绘制：
- en: '[PRE21]'
  id: totrans-195
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'And then render them as colored cones, where:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将它们渲染为彩色圆锥，其中：
- en: Blue and red — defines angles derived from the gyroscope data
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 蓝色和红色——定义从陀螺仪数据导出的角度
- en: Green — accelerometer data (inverted and normalized)
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 绿色——加速度计数据（反转并归一化）
- en: '[PRE22]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '![](../Images/bfdc16ac14abd637e608f6999d120fe8.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bfdc16ac14abd637e608f6999d120fe8.png)'
- en: Image by author
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The green vector is always aligned “correctly,” while the blue and red vectors,
    representing gyroscope angles, accumulate errors over time, especially with rapid
    movements, causing **drift**.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 绿色向量始终正确对齐，而蓝色和红色向量，代表陀螺仪角度，随着时间的推移积累误差，尤其是在快速运动中，导致**漂移**。
- en: There are many ways to solve this issue. The general idea is to adjust the angles
    using accelerometer data (green vector), as the accelerometer precisely determines
    the downward direction ( *until an external force disturbs it*).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这个问题有很多方法。一般思路是使用加速度计数据（绿色向量）调整角度，因为加速度计精确地确定了向下方向（*直到外部力量干扰它*）。
- en: For a more detailed explanation, check out a great video by [**James Lambert**](https://www.youtube.com/@james.lambert)[15],
    which explores these problems and their solutions, including a [**detailed example
    with Oculus DK1**](https://www.youtube.com/watch?v=ha3fDU-1wHk).
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更详细的解释，请查看由 [**詹姆斯·兰伯特**](https://www.youtube.com/@james.lambert)[15] 制作的一段精彩视频，该视频探讨了这些问题及其解决方案，包括一个[**使用
    Oculus DK1 的详细示例**](https://www.youtube.com/watch?v=ha3fDU-1wHk)。
- en: Why the heck do we need this in the presentation?
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们为什么需要在演示中用这个？
- en: 'I asked myself this question when I discovered how deep the rabbit hole goes.
    In my talk at the magnetism session, there was exactly one slide where the idea
    of an IMU made any sense:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 当我发现这个兔子洞有多深时，我提出了这个问题。在我的磁性会议演讲中，只有一个幻灯片上对 IMU 的想法有道理：
- en: '![](../Images/33b448af5488ffff9ae234ba4574a285.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/33b448af5488ffff9ae234ba4574a285.png)'
- en: '*Image by author*'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: '*图片由作者提供*'
- en: Do you see the crystalline structure? Finding a “good” camera angle for it is
    indeed difficult, so why not rotate it directly, *lively*? We don’t need all three
    angles and acceleration-just one will suffice.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 你看到晶体结构了吗？找到它的“良好”相机角度确实很困难，所以为什么不直接旋转它，让它更加生动呢？我们不需要所有三个角度和加速度，只需要一个就足够了。
- en: 'Thus, we discard the accelerometer and keep only the gyroscope:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们放弃了加速度计，只保留陀螺仪：
- en: '[PRE23]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Now, we just need to apply the `rotation` transformation tensor to our 3D structure.
    Since this crystal contains many ions, which are also colored, I compressed them
    into base64
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们只需要将 `rotation` 变换张量应用到我们的 3D 结构上。由于这个晶体包含许多离子，它们也是彩色的，我将它们压缩成了 base64
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>base64
    code</summary>
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>base64
    代码</summary>
- en: '[PRE24]</details>'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE24]</details>'
- en: '[PRE25]'
  id: totrans-215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'Let’s embed it into our slide:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将其嵌入到我们的幻灯片中：
- en: '[PRE26]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: '![](../Images/573c5e8e82bb476c636bbaeeb5cfd9db.png)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/573c5e8e82bb476c636bbaeeb5cfd9db.png)'
- en: Image by author
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'To make it even more convenient, it would be useful to subscribe to IMU only
    when the slide is active and unsubscribe when leaving it. This is easy to do because
    RevealJS signals the core on slide state change events. Let’s implement this as
    a component using `.wlx` cell type:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使其更加方便，当幻灯片处于活动状态时订阅 IMU，离开时取消订阅将很有用。这很容易做到，因为 RevealJS 会向核心发出幻灯片状态改变事件。让我们使用
    `.wlx` 单元格类型实现这个组件：
- en: '[PRE27]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: By placing this code on any slide, we achieve the desired result without polluting
    the global space or interfering with other event handlers. Thus, IMU subscription
    management is localized to the specific slide, and when switching slides, we correctly
    enable and disable data handling without affecting other slides and their processing
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将此代码放置在任何幻灯片上，我们达到了预期的效果，而不会污染全局空间或干扰其他事件处理器。因此，IMU 订阅管理被本地化到特定幻灯片，当切换幻灯片时，我们正确地启用和禁用数据处理，而不会影响其他幻灯片及其处理。
- en: '[PRE28]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'These are actual slides from *DPG2025*:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是来自 *DPG2025* 的实际幻灯片：
- en: '![](../Images/dd1de5d73f3e170768fbb2a3741b837a.png)'
  id: totrans-225
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dd1de5d73f3e170768fbb2a3741b837a.png)'
- en: '*Image by author*'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: '*图片由作者提供*'
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Short
    video with my DPG2025 slides</summary></details>
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>包含我的
    DPG2025 幻灯片的短视频</summary></details>
- en: Final Code and Notebook
  id: totrans-228
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最终代码和笔记本
- en: The compiled presenter controller cell code is provided under the spoiler. If
    inserted into an empty cell, it will produce a functional widget for connecting
    a JoyCon.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 编译后的演示控制器单元格代码在以下内容中提供。如果将其插入空单元格中，它将生成一个用于连接 JoyCon 的功能部件。
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Compressed
    cells</summary>
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>压缩单元格</summary>
- en: '[PRE29]</details>'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE29]</details>'
- en: No evaluation is required (don’t run it ;)). Simply hide the input cell, leaving
    only the output visible through the properties (click on the top-right corner
    of the group).
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 不需要评估（不要运行它）；只需隐藏输入单元格，只通过属性（点击组右上角）显示输出即可。
- en: Here is a [**notebook with all**](https://jerryi.github.io/wljs-demo/PresenterJoyCon.html)
    **examples** [13](some of which work in a browser as well without a kernel).
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个 [**包含所有示例**](https://jerryi.github.io/wljs-demo/PresenterJoyCon.html)
    **示例** [13]（其中一些在浏览器中也能正常工作，无需内核）。
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>What
    if using my own laptop is not an option?</summary>
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>如果使用自己的笔记本电脑不是一个选项怎么办？</summary>
- en: The WLJS Notebook can be exported to HTML, [preserving even some dynamic behavior](https://wljs.io/frontend/Exporting/Dynamic%20HTML)
    [16]. This is achieved through a quite sophisticated algorithm that tracks all
    event chains occurring on the JS and WL sides, attempting to approximate them
    using a simple state machine. The result is a standard HTML file containing all
    cells, slides, and the data of these state machines.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: WLJS 笔记本可以导出为 HTML，[保留一些动态行为](https://wljs.io/frontend/Exporting/Dynamic%20HTML)
    [16]。这是通过一个相当复杂的算法实现的，该算法跟踪 JS 和 WL 侧发生的所有事件链，尝试使用简单的状态机来近似它们。结果是包含所有单元格、幻灯片和这些状态机数据的标准
    HTML 文件。
- en: However, due to the variety of values received from the IMU, the exporter cannot
    automatically capture this in a JS state machine. Consequently, rotations and
    the joystick input will not be preserved. Nonetheless, everything else will function
    as expected. 🙂</details>
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于从IMU接收到的值种类繁多，导出器无法自动在JS状态机中捕获这一点。因此，旋转和摇杆输入将不会被保留。尽管如此，其他所有功能都将按预期工作。
    🙂</details>
- en: … like a fish needs a bicycle
  id: totrans-237
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: …就像鱼需要一辆自行车
- en: Please refer to the final sentence of [that beautiful comics](https://www.smbc-comics.com/comic/2010-12-09)
    by
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 请参考[那部美丽的漫画](https://www.smbc-comics.com/comic/2010-12-09)的最后一句话。
- en: '**Zach Weinersmith**.'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: '**Zach Weinersmith**。'
- en: If not for the urgent need to showcase a rotating crystalline structure, this
    post would not exist.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不是因为迫切需要展示旋转的晶体结构，这篇帖子就不会存在。
- en: Thank you for your attention, and to those who read this far 🧙🏼‍♂️ 🤍
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的关注，以及那些读到这里的读者 🧙🏼‍♂️ 🤍
- en: References
  id: totrans-242
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
