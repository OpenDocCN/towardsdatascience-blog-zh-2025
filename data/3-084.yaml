  prefs: []
  type: TYPE_NORMAL
  zh: '[1] — [ECMA-363](https://en.wikipedia.org/wiki/Universal_3D) 规范，维基百科：[https://en.wikipedia.org/wiki/Universal_3D](https://en.wikipedia.org/wiki/Universal_3D)'
