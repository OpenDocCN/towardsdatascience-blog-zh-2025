- en: How to Use Gyroscope in Presentations, or Why Take a JoyCon to DPG2025
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在演示中使用陀螺仪，或者为什么带JoyCon去DPG2025
- en: 原文：[https://towardsdatascience.com/how-to-use-gyroscope-in-presentations-or-why-take-a-joycon-to-dpg2025/](https://towardsdatascience.com/how-to-use-gyroscope-in-presentations-or-why-take-a-joycon-to-dpg2025/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-use-gyroscope-in-presentations-or-why-take-a-joycon-to-dpg2025/](https://towardsdatascience.com/how-to-use-gyroscope-in-presentations-or-why-take-a-joycon-to-dpg2025/)
- en: Image by author
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: <mdspan datatext="el1744918122091" class="mdspan-comment">This article</mdspan>
    explores how browser-based computational notebooks — particularly the WLJS Notebook — can
    transform static slides into dynamic, real-time experiences. This approach isn’t
    limited to presentations; you can prepare interactive lecture notes for students
    or colleagues and publish it on web. For data scientists, physicists, it highlights
    new ways to communicate models, simulations, and visualizations, making complex
    ideas more intuitive and engaging.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1744918122091" class="mdspan-comment">本文</mdspan>探讨了基于浏览器的计算笔记本——尤其是WLJS笔记本——如何将静态幻灯片转变为动态、实时体验。这种方法不仅限于演示；你可以为学生或同事准备交互式讲义并在网上发布。对于数据科学家、物理学家来说，它突出了传达模型、模拟和可视化的新方法，使复杂思想更加直观和引人入胜。
- en: Is a PDF Enough?
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: PDF是否足够？
- en: Animations, *bells and whistles*, especially the kind that were popular in PowerPoint
    15–20 years ago, have largely taken a backseat. Add to this the compatibility
    issues between LibreOffice and MS Office (even between versions for Windows and
    Mac), the presence or absence of necessary fonts — and the desire to do something
    unusual on the “stage” fades away quickly.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 动画、*铃声和哨声*，尤其是那些在15-20年前的PowerPoint中流行的，在很大程度上已经退居次要位置。再加上LibreOffice和MS Office（甚至在Windows和Mac版本之间）的兼容性问题，必要字体的存在或缺失——在“舞台”上做一些不同寻常的事情的愿望很快就消失了。
- en: 'Have a look at modern technical presentations: quite often, it’s just a PDF
    document consisting of pages with vector and raster graphics, and sometimes GIF
    animations that eat up megabytes (like this post), with no mercy.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 看看现代技术演示：很多时候，它只是一个由包含矢量图形和位图图形的页面组成的PDF文档，有时还有消耗兆字节的GIF动画（就像这篇帖子一样），毫不留情。
- en: Unused Potential
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未利用的潜力
- en: It’s worth separating decorative *bells and whistles* from those that carry
    additional information in some media format. For example, take a look at [ECMA-363](https://en.wikipedia.org/wiki/Universal_3D)
    [1] specification.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 值得将装饰性的*铃声和哨声*与那些以某些媒体格式携带额外信息的部分区分开来。例如，看看[ECMA-363](https://en.wikipedia.org/wiki/Universal_3D)
    [1]规范。
- en: '[![](../Images/74d5b09b94a6027635b267b72d100182.png)](https://github.com/johnyf/fig2u3d)'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/74d5b09b94a6027635b267b72d100182.png)](https://github.com/johnyf/fig2u3d)'
- en: Convert MATLAB Figure to 3D PDF / Image by [Ioannis F. Filippidis](https://github.com/johnyf/fig2u3d)
    (fig2u3d manual), BSD-2-Clause
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 将MATLAB图转换为3D PDF / 图片由[Ioannis F. Filippidis](https://github.com/johnyf/fig2u3d)（fig2u3d手册）提供，BSD-2-Clause
- en: A 3D model inside a PDF document simply enhances the user/viewer experience.
    You observe the object from different angles/cross-sections.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: PDF文档内的3D模型仅仅增强了用户/观众的体验。你可以从不同的角度/横截面观察物体。
- en: It’s disappointing that such a *feature* is almost nowhere supported except
    for Adobe Acrobat and likely will not be. It feels like we made a leap in the
    past, but now we have returned to static slides.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如此**功能**几乎只在Adobe Acrobat中得到支持，其他地方几乎都没有，这让人感到失望。感觉我们过去迈出了一大步，但现在又回到了静态幻灯片。
- en: Large Scientific Conference DPG
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大型科学会议DPG
- en: '[**DPG-Frühjahrstagung**](https://www.dpg-physik.de/aktivitaeten-und-programme/tagungen/fruehjahrstagungen/2025)  is
    a large European physics conference organized by the German Physical Society (DPG)
    [2]. Every year, they gather more than `10^4` scientists and take place in German
    cities, covering a vast array of physics fields.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '[**DPG-Frühjahrstagung**](https://www.dpg-physik.de/aktivitaeten-und-programme/tagungen/fruehjahrstagungen/2025)是德国物理学会（DPG）组织的大型欧洲物理会议[2]。每年，他们聚集超过`10^4`名科学家，在德国城市举行，涵盖广泛的物理领域。'
- en: '![](../Images/df6502dc767ca570ed247e955177a129.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/df6502dc767ca570ed247e955177a129.png)'
- en: Deutsche Physikalische Gesellschaft / Image by Wikimedia, PD-textlogo
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 德国物理学会 / 图片由维基媒体提供，PD-textlogo
- en: '![](../Images/f179f14abf512f9449a8884bc53e1443.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f179f14abf512f9449a8884bc53e1443.png)'
- en: DPG2025 (Spring Meeting) took place in the wonderful city of Regensburg / Photo
    by [Tobi &Chris](https://www.pexels.com/@tobiandchris/), Pexels License
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: DPG2025（春季会议）在美丽的雷根斯堡举行 / 照片由[Tobi &Chris](https://www.pexels.com/@tobiandchris/)拍摄，Pexels许可
- en: There are so many presentations, and it lasts almost a week, so by the end,
    it becomes too overwhelming. Nevertheless, this does not diminish its value as
    a platform for networking, practicing presentations, and a reliable way to learn
    *what is currently on the market, which trains have gone already, and which are
    just departing*.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 有这么多演示，持续时间几乎一周，所以到最后，它变得过于令人难以承受。尽管如此，这并不减少它作为一个网络平台、练习演示和可靠学习当前市场情况、已过去的培训和即将出发的培训的价值。
- en: The participants in plenary sessions are mostly Master’s students and PhD students,
    with postdocs being rarer.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 全体会议的参与者大多是硕士生和博士生，博士后比较少见。
- en: Such a large and accessible platform is an excellent motivation to try something
    new 💡 *even if something may go wrong*.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这样一个庞大且易于访问的平台是尝试新事物的绝佳动机 💡 即使可能出错。
- en: What is a JoyCon?
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是JoyCon？
- en: 'Surely, the reader has seen devices like this:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，读者肯定见过这样的设备：
- en: '![](../Images/5cfdb9895ce8919984d190435421c148.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5cfdb9895ce8919984d190435421c148.png)'
- en: An average PPT clicker device / AI Generated “PPT Clicker” image using Dalle
    3 by OpenAI
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 平均PPT翻页器设备 / 使用Dalle 3由OpenAI生成的“PPT翻页器”图像
- en: This device acts as a slide switcher and sometimes as a laser pointer, connecting
    via Bluetooth or through a *dongle*. In any case, it is a type of controller with
    buttons. Controllers can be more interesting — like the one from the 2017 Nintendo
    Switch handheld console
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 该设备充当幻灯片切换器，有时也充当激光笔，通过蓝牙或通过 *dongle* 连接。无论如何，它都是一种带有按钮的控制器。控制器可以更有趣——就像2017年任天堂Switch便携式游戏机上的那个一样。
- en: '![](../Images/aba4157cca94f60c9bded0df10f44b9c.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/aba4157cca94f60c9bded0df10f44b9c.png)'
- en: JoyCon (R) / Image adapted Wikimedia, PD
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: JoyCon (R) / 图像改编自维基百科，PD
- en: 'It is not much bigger, but it has some additional cool *features*:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 它并不大，但有一些额外的酷炫 *功能*：
- en: Analog stick 🕹️
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模拟摇杆 🕹️
- en: 11 buttons ☎️
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 11个按钮 ☎️
- en: IR camera 📸 (difficult to use, no good API documentation)
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 红外摄像头 📸 (难以使用，没有好的API文档)
- en: Full IMU 🌐 (Inertial Measurement Unit) aka gyroscope with an accelerometer
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 全IMU 🌐 (惯性测量单元) 即陀螺仪加加速度计
- en: Bluetooth connectivity; recognized as a regular HID
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 蓝牙连接；被识别为常规HID
- en: 'The buttons can indeed be mapped to PowerPoint, or the stick can be used to
    control slides, emulating mouse or keyboard clicks, as it was implemented in these
    projects:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 按钮确实可以映射到PowerPoint，或者摇杆可以用来控制幻灯片，模拟鼠标或键盘点击，就像在这些项目中实现的那样：
- en: '[Hackster: Right Joy-con Controller as a Remote](https://www.hackster.io/leo49/right-joy-con-controller-as-a-presentation-remote-5810e4)
    (Python) [3]'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Hackster: 右Joy-Con控制器作为遥控器](https://www.hackster.io/leo49/right-joy-con-controller-as-a-presentation-remote-5810e4)
    (Python) [3]'
- en: '[Medium: Nintendo Switch Joy-Con Presentation Remote](https://medium.com/@mimming/nintendo-switch-joy-con-presentation-remote-5a7e08e7ad11)
    (USB Override MacOS) [4]'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Medium: Nintendo Switch Joy-Con演示遥控器](https://medium.com/@mimming/nintendo-switch-joy-con-presentation-remote-5a7e08e7ad11)
    (USB Override MacOS) [4]'
- en: I thought it would be cool to somehow use the IMU and analog stick. But for
    that, one would need to go beyond PowerPoint and PDF 🧙🏼‍♂️
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我想过要 somehow 使用IMU和模拟摇杆。但为此，一个人需要超越PowerPoint和PDF 🧙🏼‍♂️
- en: Moving Slides to Browser Environment
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将幻灯片移动到浏览器环境
- en: 'The idea behind this is not new, but it’s important to remember that this approach
    may not work for everyone. However, by moving the presentation display and creation
    to the browser (particularly Javascript and HTML lands), we automatically gain
    access to all the possibilities of modern web technology: peripheral device support,
    JavaScript, CSS animation magic, and much more, including video. It’s important
    to note that all of this is **cross-platform by default** and will work almost
    everywhere.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这个想法并不新颖，但重要的是要记住，这种方法可能并不适用于每个人。然而，通过将演示显示和创建移动到浏览器（尤其是JavaScript和HTML领域），我们自动获得了现代网络技术的所有可能性：外围设备支持、JavaScript、CSS动画魔法等等，包括视频。重要的是要注意，所有这些都是
    **默认跨平台的** 并且几乎在所有地方都能工作。
- en: For example, slides can be created in Markdown (or/and HTML) with the help of
    a simple framework (rather, a small library)  [RevealJS](https://revealjs.com/markdown/)
    [5]
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，可以使用简单的框架（更确切地说，是一个小型库）在Markdown（或/和HTML）中创建幻灯片 [RevealJS](https://revealjs.com/markdown/)
    [5]
- en: There is also MDX-based presentation engines, and things like Manim [6], Motion
    Canvas [7], but these guys require even more skills to master.
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 还有基于MDX的演示引擎，以及像Manim [6]、Motion Canvas [7]这样的东西，但这些需要更多的技能来掌握。
- en: 'The *RevealJS* API is quite simple, so controlling the slides via JavaScript
    commands is easy to implement:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '*RevealJS* API相当简单，因此通过JavaScript命令控制幻灯片很容易实现：'
- en: '[PRE0]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: However, this direct approach has significant drawbacks. It requires an internet
    connection, and if you’d prefer to avoid it, you’ll need to use bundlers (such
    as Rollup) and embed all JavaScript libraries into a single HTML file, for instance.
    Alternatively, you could run a local web server.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这种直接方法存在显著的缺点。它需要一个互联网连接，如果你希望避免使用它，你将需要使用打包器（例如Rollup）并将所有JavaScript库嵌入到一个单独的HTML文件中，例如。或者，你也可以运行一个本地Web服务器。
- en: Option with Jupyter Notebook
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用Jupyter Notebook的选项
- en: If you like Python and IPYNB, then use *nbconvert* — it will convert your notebook
    directly into a RevealJS presentation, and you won’t even notice it! Or use the
    extension for Jupyter—[RISE](https://github.com/damianavila/RISE) [8]
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢Python和IPYNB，那么使用*nbconvert*——它将直接将你的笔记本转换为RevealJS演示文稿，你甚至都不会注意到它！或者使用Jupyter的扩展——[RISE](https://github.com/damianavila/RISE)
    [8]
- en: '![](../Images/79e6fdd044aa5b00f58e646726b8e51d.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/79e6fdd044aa5b00f58e646726b8e51d.png)'
- en: Create Presentation from Jupyter Notebook / Image by author
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 从Jupyter Notebook创建演示文稿 / 图片由作者提供
- en: In any case, the idea remains simple — we need to somehow enter the web browser
    environment to take advantage of all the possibilities of JoyCon.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何情况下，这个想法很简单——我们需要以某种方式进入Web浏览器环境，以利用JoyCon的所有可能性。
- en: Try it on [Binder](https://mybinder.org/v2/gh/damianavila/RISE/master?filepath=examples%2FREADME.ipynb)!
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在[Binder](https://mybinder.org/v2/gh/damianavila/RISE/master?filepath=examples%2FREADME.ipynb)!上试一试！
- en: Option with WLJS Notebook
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用WLJS Notebook的选项
- en: My opinion on [WLJS](https://wljs.io) [9] might be somewhat biased as I am one
    of its developers (and active users). This open-source IDE with a notebook interface
    is more tightly integrated with the web environment, as slides are not exported
    there but are instead **executed** and are just another type of output cell, alongside
    the familiar Markdown.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我对[WLJS](https://wljs.io) [9]的看法可能有些偏见，因为我也是其开发者（以及活跃用户）。这个具有笔记本界面的开源IDE与Web环境更加紧密集成，因为幻灯片不是在那里导出，而是**执行**，并且只是另一种类型的输出单元格，与熟悉的Markdown并列。
- en: '![](../Images/67f55b52676ae22071d1af17d17da24c.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/67f55b52676ae22071d1af17d17da24c.png)'
- en: WLJS Notebook / Image by author
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: WLJS Notebook / 图片由作者提供
- en: 'Under the hood, it also uses RevealJS but with a few extra features:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在底层，它也使用RevealJS，但有一些额外的功能：
- en: It works offline
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可以离线工作
- en: It allows embedding interactive elements and components, similar to LaTeX Beamer
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它允许嵌入交互式元素和组件，类似于LaTeX Beamer
- en: It is integrated with Wolfram Language (freeware distribution)
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它与Wolfram语言（免费软件发行版）集成
- en: 'See more about it in[**this story**](https://medium.com/@krikus.ms/reinventing-dynamic-and-portable-notebooks-with-javascript-and-wolfram-language-22701d38d651)[10]**.**
    An ultimate guide on how to make presentation there we published in our official
    blog: [Dynamic Presentation, or How to Code a Slide with Markdown and WL](https://wljs.io/blog/2025/03/02/ultimate-ppt)
    [11].'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在[**这个故事**](https://medium.com/@krikus.ms/reinventing-dynamic-and-portable-notebooks-with-javascript-and-wolfram-language-22701d38d651)[10]**]中了解更多信息。我们发布在我们官方博客上的终极指南，介绍了如何在其中制作演示文稿：[动态演示文稿，或者如何用Markdown和WL编写幻灯片](https://wljs.io/blog/2025/03/02/ultimate-ppt)
    [11]。
- en: Let’s Dive into JoyCon
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让我们深入探讨JoyCon
- en: So, the easiest option is to use the already ready-made library [joy-con-webhid](https://github.com/tomayac/joy-con-webhid)
    [12]. Why spend time reinventing the wheel when people have already done a great
    job for us?
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，最简单的选项是使用已经准备好的库[joy-con-webhid](https://github.com/tomayac/joy-con-webhid)
    [12]。为什么要在别人已经为我们做了很好的工作时浪费时间重新发明轮子呢？
- en: '[PRE1]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: All subsequent examples will be taken from the WLJS Notebook. However, you can
    do pretty much the same thing using Python + FAST API to interface with JavaScript
    or something similar, or even just use JS alone. The online version of the notebook
    is available [here](https://jerryi.github.io/wljs-demo/PresenterJoyCon.html) [13].
