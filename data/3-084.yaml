  zh: 在WLJS笔记本中，幻灯片也可以通过调用RevealJS API的Wolfram包装函数进行程序控制。
- en: '[PRE5]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'All that’s left is to trigger this function at the right moment when the button
    (or switch) is clicked. To do this, events need to be sent from the Javascript
    world to the Wolfram machine, where we can then do whatever we want with them.
    This results in the following diagram:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 剩下的就是要在按钮（或开关）点击的正确时刻触发这个函数。为此，需要从JavaScript世界向Wolfram机器发送事件，然后我们可以对它们做任何我们想做的事情。这导致了以下图示：
