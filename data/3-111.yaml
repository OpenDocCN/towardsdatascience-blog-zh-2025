- en: How to Optimize your Python Program for Slowness
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何优化你的 Python 程序以实现缓慢
- en: 原文：[https://towardsdatascience.com/how-to-optimize-your-python-program-for-slowness/](https://towardsdatascience.com/how-to-optimize-your-python-program-for-slowness/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-optimize-your-python-program-for-slowness/](https://towardsdatascience.com/how-to-optimize-your-python-program-for-slowness/)
- en: 'Also available: [A PyData conference talk on this article](https://www.youtube.com/watch?v=wSiF1Bm8f3s).
    A [Rust version of this article.](https://medium.com/@carlmkadie/how-to-optimize-your-rust-program-for-slowness-eb2c1a64d184)'
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 此外，还有：[关于本文的 PyData 会议演讲](https://www.youtube.com/watch?v=wSiF1Bm8f3s)。[本文的
    Rust 版本。](https://medium.com/@carlmkadie/how-to-optimize-your-rust-program-for-slowness-eb2c1a64d184)
- en: <mdspan datatext="el1744071663872" class="mdspan-comment">Everyone</mdspan>
    talks about making Python programs faster [[1](https://www.infoworld.com/article/3855600/making-python-faster-wont-be-easy-but-itll-be-worth-it.html),
    [2](https://medium.com/data-science/gpu-optional-python-be36a02b634d), [3](https://www.kdnuggets.com/2021/06/make-python-code-run-incredibly-fast.html)],
    but what if we pursue the opposite goal? Let’s explore how to make them slower — **absurdly
    slower**. Along the way, we’ll examine the nature of computation, the role of
    memory, and the scale of unimaginably large numbers.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1744071663872" class="mdspan-comment">每个人</mdspan>都在谈论如何让
    Python 程序更快 [[1](https://www.infoworld.com/article/3855600/making-python-faster-wont-be-easy-but-itll-be-worth-it.html),
    [2](https://medium.com/data-science/gpu-optional-python-be36a02b634d), [3](https://www.kdnuggets.com/2021/06/make-python-code-run-incredibly-fast.html)]，但如果我们追求相反的目标呢？让我们探索如何使它们变慢 — **极其慢**。在这个过程中，我们将检查计算的实质、内存的作用以及难以想象的巨大数字的规模。
- en: 'Our guiding challenge: **write short Python programs that run for an extraordinarily
    long time.**'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的指导挑战：**编写运行时间异常长的简短 Python 程序。**
- en: To do this, we’ll explore a sequence of rule sets — each one defining what kind
    of programs we’re allowed to write, by placing constraints on halting, memory,
    and program state. This sequence isn’t a progression, but a series of shifts in
    perspective. Each rule set helps reveal something different about how simple code
    can stretch time.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，我们将探索一系列规则集 — 每个规则集都定义了我们允许编写的程序类型，通过在停止、内存和程序状态上施加约束。这个序列不是一个进步，而是一系列视角的转换。每个规则集都有助于揭示简单代码如何拉伸时间的不同方面。
- en: '**Here are the rule sets we’ll investigate:**'
  id: totrans-6
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**以下是我们将要调查的规则集：**'
- en: '**Anything Goes** — Infinite Loop'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**一切皆可** — 无限循环'
- en: '**Must Halt, Finite Memory** — Nested, Fixed-Range Loops'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**必须停止，有限内存** — 嵌套，固定范围循环'
- en: '**Infinite, Zero-Initialized Memory** — 5-State Turing Machine'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**无限，零初始化内存** — 5 状态图灵机'
- en: '**Infinite, Zero-Initialized Memory** — 6-State Turing Machine (>10↑↑15 steps)'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**无限，零初始化内存** — 6 状态图灵机 (>10↑↑15 步)'
- en: '**Infinite, Zero-Initialized Memory** — Plain Python (compute 10↑↑15 without
    Turing machine emulation)'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**无限，零初始化内存** — 纯 Python (不使用图灵机模拟计算 10↑↑15)'
- en: 'Aside: 10↑↑15 is not a typo or a double exponent. It’s a number so large that
    “exponential” and “astronomical” don’t describe it. We’ll define it in **Rule
    Set 4.**'
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 旁白：10↑↑15 不是一个打字错误或双指数。这是一个如此大的数字，以至于“指数”和“天文”都无法描述它。我们将在**规则集 4**中定义它。
- en: We start with the most permissive rule set. From there, we’ll change the rules
    step by step to see how different constraints shape what long-running programs
    look like — and what they can teach us.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从最宽容的规则集开始。从那里，我们将逐步改变规则，看看不同的约束如何塑造长期运行程序的外观 — 以及它们可以教会我们什么。
- en: 'Rule Set 1: Anything Goes — Infinite Loop'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则集 1：一切皆可 — 无限循环
- en: 'We begin with the most permissive rules: the program doesn’t need to halt,
    can use unlimited memory, and can contain arbitrary code.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从最宽容的规则开始：程序不需要停止，可以使用无限内存，并且可以包含任意代码。
- en: 'If our only goal is to run forever, the solution is immediate:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们的唯一目标是永远运行，解决方案是立即的：
- en: '[PRE0]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This program is short, uses negligible memory, and never finishes. It satisfies
    the challenge in the most literal way — by doing nothing forever.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这个程序很短，使用的内存可以忽略不计，并且永远不会结束。它以最直接的方式满足挑战 — 通过永远什么也不做。
- en: 'Of course, it’s not interesting — it does nothing. But it gives us a baseline:
    if we remove all constraints, infinite runtime is trivial. In the next rule set,
    we’ll introduce our first constraint: **the program must eventually halt.** Let’s
    see how far we can stretch the running time under that new requirement — using
    only **finite memory**.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这并不有趣 — 它什么也不做。但它为我们提供了一个基准：如果我们移除所有约束，无限运行时间是微不足道的。在下一个规则集中，我们将引入我们的第一个约束：**程序最终必须停止**。让我们看看在新的要求下，我们可以将运行时间拉伸多远 — 只使用**有限内存**。
- en: 'Rule Set 2: Must Halt, Finite Memory — Nested, Fixed-Range Loops'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则集2：必须停止，有限内存—嵌套，固定范围循环
- en: 'If we want a program that runs longer than the universe will survive *and then
    halts*, it’s easy. Just write two nested loops, each counting over a fixed range
    from 0 to 10¹⁰⁰−1:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想要一个比宇宙能够存活的时间还要长并且然后停止的程序，那很容易。只需编写两个嵌套循环，每个循环从0到10¹⁰⁰−1的固定范围内计数：
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: You can see that this program halts after 10¹⁰⁰ × 10¹⁰⁰ steps. That’s 10²⁰⁰.
    And — ignoring the print—this program uses only a small amount of memory to hold
    its two integer loop variables—just 144 bytes.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到这个程序在10¹⁰⁰ × 10¹⁰⁰步后停止。那是10²⁰⁰。而且—忽略打印—这个程序只使用很少的内存来保存其两个整数循环变量—只有144字节。
- en: My desktop computer runs this program at about 14 million steps per second.
    But suppose it could run at [Planck speed](https://en.wikipedia.org/wiki/Planck_units#Planck_time)
    (the smallest meaningful unit of time in physics). That would be about 10⁵⁰ steps
    per year — so 10¹⁵⁰ years to complete.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我的台式计算机以大约每秒1400万步的速度运行这个程序。但假设它能在[普朗克速度](https://en.wikipedia.org/wiki/Planck_units#Planck_time)（物理学中最小有意义的单位时间）下运行。那将是每年10⁵⁰步—所以需要10¹⁵⁰年才能完成。
- en: Current cosmological models estimate [the heat death of the universe](https://en.wikipedia.org/wiki/List_of_dates_predicted_for_apocalyptic_events#Scientific_far_future_predictions)
    in 10¹⁰⁰ years, so our program will run about 100,000,000,000,000,000,000,000,000,000,000,000,000,000,000,000,000
    times longer than the projected lifetime of the universe.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的宇宙学模型估计[宇宙的热寂](https://en.wikipedia.org/wiki/List_of_dates_predicted_for_apocalyptic_events#Scientific_far_future_predictions)将在10¹⁰⁰年后发生，因此我们的程序将运行大约100,000,000,000,000,000,000,000,000,000,000,000,000,000,000,000,000次，比宇宙预期的寿命长得多。
- en: '*Aside: Practical concerns about running a program beyond the end of the universe
    are outside the scope of this article.*'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '*旁白：关于在宇宙结束之后运行程序的实际担忧超出了本文的范围。*'
- en: For an added margin, we can use more memory. Instead of 144 bytes for variables,
    let’s use 64 gigabytes — about what you’d find in a well-equipped personal computer.
    That’s about 500 million times more memory, which gives us about one billion variables
    instead of 2\. If each variable iterates over the full 10¹⁰⁰ range, the total
    number of steps becomes roughly 10¹⁰⁰^(10⁹), or about 10^(100 billion) steps.
    At Planck speed — roughly 10⁵⁰ steps per year — that corresponds to 10^(100 billion
    − 50) years of computation.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 为了增加一些余地，我们可以使用更多的内存。而不是为变量使用144字节，让我们使用64千兆字节—大约你会在一个设备齐全的个人计算机中找到的。这大约是50亿倍更多的内存，这使我们有了大约10亿个变量而不是2个。如果每个变量遍历完整的10¹⁰⁰范围，总步数就大约是10¹⁰⁰^(10⁹)，或者说大约是10^(100亿)步。在普朗克速度下—大约每年10⁵⁰步—这相当于10^(100亿
    - 50)年的计算时间。
- en: '* * *'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Can we do better? Well, if we allow an unrealistic but interesting rule change,
    we can do much, much better.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能做得更好吗？嗯，如果我们允许一个不切实际但有趣的规则变化，我们可以做得好得多。
- en: 'Rule Set 3: Infinite, Zero-Initialized Memory — 5-State Turing Machine'
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则集3：无限、零初始化内存—5状态图灵机
- en: What if we allow infinite memory — so long as it starts out entirely zero?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们允许无限内存—只要它一开始完全是零呢？
- en: '**Aside:** Why don’t we allow infinite, arbitrarily initialized memory? Because
    it trivializes the challenge. For example, you could mark a single byte far out
    in memory with a `0x01`—say, at position 10¹²⁰—and write a tiny program that just
    scans until it finds it. That program would take an absurdly long time to run — but
    it wouldn’t be interesting. The slowness is baked into the data, not the code.
    We’re after something deeper: small programs that generate their own long runtimes
    from simple, uniform starting conditions.'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**旁白：**为什么我们不允许无限、任意初始化的内存？因为这将使挑战变得微不足道。例如，你可以在内存的某个位置标记一个字节，比如在10¹²⁰位置，用`0x01`—比如说，写一个微小的程序，它只是扫描直到找到它。这个程序将运行得非常慢—但那并不有趣。这种缓慢是数据中固有的，而不是代码中固有的。我们追求的是更深层次的东西：小的程序，它们可以从简单的、均匀的起始条件生成自己的长时间运行。'
- en: 'My first idea was to use the memory to count upward in binary:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我第一个想法是使用内存来以二进制形式向上计数：
- en: '[PRE2]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We can do that — but how do we know when to stop? If we don’t stop, we’re violating
    the “must halt” rule. So, what else can we try?
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以做到这一点—但我们怎么知道何时停止？如果我们不停下来，我们就违反了“必须停止”的规则。那么，我们还能尝试什么？
- en: 'Let’s take inspiration from the father of computer science, [**Alan Turing**](https://en.wikipedia.org/wiki/Alan_Turing).
    We’ll program a simple abstract machine — now known as a **Turing machine** — under
    the following constraints:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从计算机科学的鼻祖[**艾伦·图灵**](https://en.wikipedia.org/wiki/Alan_Turing)那里汲取灵感。我们将在以下约束下编写一个简单的抽象机器—现在被称为**图灵机**：
- en: 'The machine has **infinite memory**, laid out as a tape that extends endlessly
    in both directions. Each **cell** on the tape holds a single bit: 0 or 1.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器有**无限内存**，以磁带的形式无限延伸。磁带上的每个**单元**存储一个比特：0或1。
- en: A read/write head moves across the tape. On each step, it **reads** the current
    bit, **writes** a new bit (0 or 1), and **moves** one cell **left or right**.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个读写头在磁带上移动。在每一步中，它**读取**当前的比特，**写入**一个新的比特（0或1），并**向左或向右**移动一个单元。
- en: '![](../Images/6bbd6a29daa499b8d8306213137f24a2.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6bbd6a29daa499b8d8306213137f24a2.png)'
- en: A read/write head positioned on an infinite tape.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 一个读写头位于无限磁带上。
- en: ''
  id: totrans-41
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: The machine also has an internal variable called **state**, which can hold one
    of *n* values. For example, with 5 states, we might name the possible values A,
    B, C, D, and E—plus a special halting state H, which we don’t count among the
    five. The machine always starts in the first state, A.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器还有一个名为**状态**的内部变量，它可以存储*n*个值之一。例如，有5个状态时，我们可能将可能的值命名为A、B、C、D和E——加上一个特殊的停止状态H，我们不将其计入五个状态之中。机器始终从第一个状态A开始。
- en: We can express a full Turing machine program as a transition table. Here’s an
    example we’ll walk through step by step.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将完整的图灵机程序表示为转换表。以下是一个我们将逐步讲解的示例。
- en: '![](../Images/2c4244c06335ade3eb13ed14697d280b.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2c4244c06335ade3eb13ed14697d280b.png)'
- en: A 5-state Turing machine transition table.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 一个5状态图灵机转换表。
- en: Each **row** corresponds to the current **tape value** (0 or 1).
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每一**行**对应于当前的**磁带值**（0或1）。
- en: Each **column** corresponds to the current **state** (A through E).
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每一**列**对应于当前的**状态**（A到E）。
- en: 'Each entry in the table tells the machine what to do next:'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表中的每一项都告诉机器下一步该做什么：
- en: The **first character** is the **bit to write** (0 or 1)
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第一个字符**是要写入的**比特**（0或1）'
- en: The second is the direction to move (L for left, R for right)
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第二个**是移动的方向（L为左，R为右）'
- en: The **third** is the **next state to enter** (A, B, C, D, E, or H, where H is
    the special halting state).
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第三个**是**要进入的下一个状态**（A、B、C、D、E或H，其中H是特殊的停止状态）。'
- en: Now that we’ve defined the machine, let’s see how it behaves over time.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经定义了机器，让我们看看它在时间上的表现。
- en: We’ll refer to each moment in time — the full configuration of the machine and
    tape — as a **step**. This includes the current tape contents, the head position,
    and the machine’s internal state (like A, B, or H).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将把每个时间点——机器和磁带的完整配置——称为一个**步骤**。这包括当前的磁带内容、头位置和机器的内部状态（如A、B或H）。
- en: Below is **Step 0**. The head is pointing to a 0 on the tape, and the machine
    is in **state** A.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是**步骤 0**。头指向磁带上的0，机器处于**状态**A。
- en: 'Looking at **row 0, column A** in the program table, we find the instruction
    1RB. That means:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在程序表的**行0，列A**中查看，我们发现指令1RB。这意味着：
- en: Write 1 to the current tape cell.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将1写入当前的磁带单元。
- en: Move the head **Right.**
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将头**向右移动**。
- en: Enter **state** B.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进入**状态**B。
- en: '**Step 0:**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 0**：'
- en: '![](../Images/7730c0eb942e5be31ae20656aa8af2e3.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7730c0eb942e5be31ae20656aa8af2e3.png)'
- en: 'This puts us in **Step 1**:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这使我们处于**步骤 1**：
- en: '![](../Images/91cf09f01db51a8843db1deab010c9bc.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/91cf09f01db51a8843db1deab010c9bc.png)'
- en: The machine is now in **state** B, pointing at the next tape cell (again 0).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 机器现在处于**状态**B，指向下一个磁带单元（再次是0）。
- en: What will happen if we let this Turing machine keep running? It will run for
    exactly **47,176,870 steps** — and then halt.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们让这个图灵机继续运行会发生什么？它将运行恰好**47,176,870步**——然后停止。
- en: 'Aside: With a Google sign in, you can run this yourself via a [Python notebook
    on Google Colab](https://github.com/CarlKCarlK/busy_beaver_blaze/blob/main/notebooks/turing_machines.ipynb).
    Alternatively, you can copy and run the notebook locally on your own computer
    by [downloading it from GitHub](https://github.com/CarlKCarlK/busy_beaver_blaze/blob/main/notebooks/turing_machines.ipynb).'
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 旁白：通过Google登录，您可以通过[Google Colab上的Python笔记本](https://github.com/CarlKCarlK/busy_beaver_blaze/blob/main/notebooks/turing_machines.ipynb)自行运行。或者，您可以通过[从GitHub下载](https://github.com/CarlKCarlK/busy_beaver_blaze/blob/main/notebooks/turing_machines.ipynb)并在自己的计算机上本地复制和运行笔记本。
- en: 'That number 47,176,870is astonishing on its own, but seeing the full run makes
    it more tangible. We can visualize the execution using a **space-time diagram**,
    where each row shows the tape at a single step, from top (earliest) to bottom
    (latest). In the image:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 那个数字47,176,870本身就很令人惊讶，但看到完整的运行过程使其更加具体。我们可以使用**时空图**来可视化执行，其中每一行显示磁带在单个步骤中的状态，从上（最早）到下（最新）。在图像中：
- en: The first row is blank — it shows the all-zero tape before the machine takes
    its first step.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一行是空的——它显示了机器第一步之前的全零磁带。
- en: 1s are shown in **orange.**
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1s以**橙色**显示。
- en: 0s are shown in **white.**
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 0s以**白色**显示。
- en: '**Light orange** appears where 0s and 1s are so close together they blend.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**浅橙色**出现在0s和1s如此接近以至于它们混合在一起的地方。'
- en: '![](../Images/23f12393dd5ffa8d5a17631dd8cf0822.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/23f12393dd5ffa8d5a17631dd8cf0822.png)'
- en: Space-time diagram for the champion 5-state Turing machine. It runs for 47,176,870
    steps before halting. Each row shows the tape at a single step, starting from
    the top. Orange represents 1, white represents 0.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 冠军5状态图灵机的时空图。它在运行了47,176,870步后停止。每一行显示单步的带子，从顶部开始。橙色代表1，白色代表0。
- en: ''
  id: totrans-73
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: In 2023, an online group of amateur researchers organized through [**bbchallenge.org**](https://bbchallenge.org)
    proved that this is the [**longest-running 5-state Turing machine**](https://www.quantamagazine.org/amateur-mathematicians-find-fifth-busy-beaver-turing-machine-20240702/)
    that eventually halts.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 到2023年，一个通过[**bbchallenge.org**](https://bbchallenge.org)组织的在线业余研究人员小组证明了这是[**最长运行的5状态图灵机**](https://www.quantamagazine.org/amateur-mathematicians-find-fifth-busy-beaver-turing-machine-20240702/)，最终会停止。
- en: '* * *'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Want to see this Turing machine in motion? You can watch the full 47-million-step
    execution unfold in this **pixel-perfect video**:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 想要看这个图灵机在运动中的样子吗？您可以在这个**像素完美的视频**中观看完整的4700万步执行过程展开：
- en: Or interact with it directly using the [**Busy Beaver Blaze**](https://carlkcarlk.github.io/busy_beaver_blaze/v0.2.5/index.html#program=bb5&run=true)
    web app.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 或者直接使用[**Busy Beaver Blaze**](https://carlkcarlk.github.io/busy_beaver_blaze/v0.2.5/index.html#program=bb5&run=true)网络应用程序与之交互。
- en: The video generator and web app are part of [busy-beaver-blaze](https://github.com/CarlKCarlK/busy_beaver_blaze/),
    the open-source Python & Rust project that accompanies this article.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 视频生成器和网络应用程序是[busy-beaver-blaze](https://github.com/CarlKCarlK/busy_beaver_blaze/)的一部分，这是一个开源的Python
    & Rust项目，与本文相伴。
- en: '* * *'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'It’s hard to believe that such a small machine can run **47 million steps**
    and still halt. But it gets even more astonishing: the team at [bbchallenge.org](http://bbchallenge.org)
    found a **6-state machine** with a runtime so long it can’t even be written with
    ordinary exponents.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 很难相信这样一个小的机器可以运行**4700万步**并仍然停止。但更令人惊讶的是：[bbchallenge.org](http://bbchallenge.org)团队发现了一个**6状态机**，其运行时间如此之长，以至于无法用普通指数表示。
- en: 'Rule Set 4: Infinite, Zero-Initialized Memory — 6-State Turing Machine (>10↑↑15
    steps)'
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则集4：无限，零初始化内存——6状态图灵机（>10↑↑15步）
- en: 'As of this writing, the longest running (but still halting) 6-state Turing
    machine known to humankind is:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 到本文写作时，人类已知的最长运行（但仍然停止）的6状态图灵机是：
- en: '[PRE3]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Here is a video showing its **first 10 trillion steps:**
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个视频展示了它的**前10万亿步**：
- en: And here you can [run it interactively via a web app](https://carlkcarlk.github.io/busy_beaver_blaze/v0.2.5/index.html#run=true).
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在这里[通过网络应用程序交互运行它](https://carlkcarlk.github.io/busy_beaver_blaze/v0.2.5/index.html#run=true)。
- en: 'So, if we are patient — comically patient — how long will this Turing machine
    run? More than 10↑↑15 where “10 ↑↑ 15” means:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果我们有耐心——滑稽地有耐心——这个图灵机将运行多长时间？超过10↑↑15，其中“10 ↑↑ 15”表示：
- en: '![](../Images/3c060e02873993db454cc590fa304d4b.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3c060e02873993db454cc590fa304d4b.png)'
- en: 'This is **not** the same as 10¹⁵ (which is just a regular exponent). Instead:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这与10¹⁵（只是一个常规指数）不同。相反：
- en: 10¹ = 10
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 10¹ = 10
- en: 10¹⁰ = 10,000,000,000
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 10¹⁰ = 10,000,000,000
- en: 10^10^10 is 10¹⁰⁰⁰⁰⁰⁰⁰⁰⁰⁰, already unimaginably large.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 10^10^10是10¹⁰⁰⁰⁰⁰⁰⁰⁰⁰⁰，已经难以想象。
- en: 10↑↑4 is so large that it vastly exceeds the number of atoms in the observable
    universe.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 10↑↑4如此之大，以至于它远远超过了可观测宇宙中的原子数量。
- en: 10↑↑15 is so large that writing it in exponent notation becomes annoying.
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 10↑↑15如此之大，以至于用指数表示法写它变得令人厌烦。
- en: Pavel Kropitz announced this 6-state machine on May 30, 2022\. Shawn Ligocki
    has [a great write up](https://www.sligocki.com/2022/06/21/bb-6-2-t15.html) explaining
    both his and Pavel’s discoveries. To prove that these machines run so long and
    then halt, researchers used a mix of analysis and automated tools. Rather than
    simulating every step, they identified repeating structures and patterns that
    could be proven — using formal, machine-verified proofs — to eventually lead to
    halting.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: Pavel Kropitz于2022年5月30日宣布了这个6状态机。Shawn Ligocki在[一篇优秀的文章](https://www.sligocki.com/2022/06/21/bb-6-2-t15.html)中解释了他和Pavel的发现。为了证明这些机器运行如此长时间然后停止，研究人员使用了一组分析和自动化工具。他们不是模拟每一步，而是识别出可以证明的重复结构和模式——使用正式的、机器验证的证明——最终导致停止。
- en: '* * *'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Up to this point, we’ve been talking about Turing machines — specifically, the
    longest-known 5- and 6-state machines that eventually halt. We ran the 5-state
    champion to completion and watched visualizations to explore its behavior. But
    the discovery that it’s the longest halting machine with 5 states — and the identification
    of the 6-state contender — came from extensive research and formal proofs, not
    from running them step-by-step.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们一直在谈论图灵机——特别是已知的最长 5 状态和 6 状态的机器，它们最终会停止。我们运行了 5 状态的冠军直到完成，并观察可视化来探索其行为。但发现它是具有
    5 状态的最长停止机器——以及识别出 6 状态的竞争者——来自于广泛的研究和形式证明，而不是逐步运行它们。
- en: That said, the Turing machine interpreter I built in Python can run for millions
    of steps, and the visualizer written in Rust can handle trillions (see [GitHub](https://github.com/CarlKCarlK/busy_beaver_blaze)).
    But even **10 trillion steps** isn’t an atom in a drop of water in the ocean compared
    to the full runtime of the 6-state machine. And running it that far doesn’t get
    us any closer to understanding **why** it runs so long.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，我在 Python 中构建的图灵机解释器可以运行数百万步，用 Rust 编写的可视化器可以处理万亿步（见 [GitHub](https://github.com/CarlKCarlK/busy_beaver_blaze)）。但即使
    **10 万亿步**与 6 状态机的完整运行时间相比，也只是一滴海水中的原子。而且运行到那么远并不能让我们更接近理解**为什么**它会运行那么长时间。
- en: '**Aside:** Python and Rust “**interpreted”** the Turing machines up to some
    point — reading their transition tables and applying the rules step by step. You
    could also say they “**emulated”** them, in that they reproduced their behavior
    exactly. I avoid the word “**simulated”**: a simulated elephant isn’t an elephant,
    but a simulated computer is a computer.'
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**旁白**：Python 和 Rust “**解释**”了图灵机到一定程度——读取它们的转换表并逐步应用规则。你也可以说它们“**模拟**”了它们，因为它们精确地重现了它们的行为。我避免使用“**模拟**”这个词：一个模拟的象不是象，但一个模拟的计算机是计算机。'
- en: '**Returning to our central challenge:** we want to understand what makes a
    short program run for a long time. Instead of analyzing these Turing machines,
    let’s construct a Python program whose 10↑↑15 runtime is **clear by design**.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**回到我们的核心挑战**：我们想了解是什么让一个简短的程序运行很长时间。而不是分析这些图灵机，让我们构建一个 Python 程序，其 10↑↑15
    的运行时间**设计上清晰**。'
- en: 'Rule Set 5: Infinite, Zero-Initialized Memory — Plain Python (compute 10↑↑15
    without Turing machine emulation)'
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则集 5：无限，零初始化内存——纯 Python（计算 10↑↑15 而不使用图灵机模拟）
- en: Our challenge is to write a small Python program that runs for at least 10↑↑15
    steps, using any amount of zero-initialized memory.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的挑战是编写一个至少运行 10↑↑15 步的简单 Python 程序，使用任何数量的零初始化内存。
- en: 'To achieve this, we’ll compute the value of 10↑↑15 in a way that guarantees
    the program takes at least that many steps. The ↑↑ operator is called **tetration**—recall
    from Rule Set 4 that ↑↑ stacks exponents: for example, 10↑↑3 means 10^(10^10).
    It’s an extremely fast-growing function. We will program it from the ground up.'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这一点，我们将以保证程序至少运行那么多步的方式来计算 10↑↑15 的值。↑↑ 运算符称为**叠乘法**——回想一下规则集 4 中↑↑ 是堆叠指数的：例如，10↑↑3
    表示 10^(10^10)。它是一个增长非常快的函数。我们将从头开始编写它。
- en: 'Rather than rely on built-in operators, we’ll define tetration from first principles:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是依赖内置运算符，我们将从第一原理定义叠乘法：
- en: '**Tetration**, implemented by the function `tetrate`, as repeated **exponentiation**'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**叠乘法**，通过函数 `tetrate` 实现，即重复的**指数运算**'
- en: '**Exponentiation**, via `exponentiate`, as repeated **multiplication**'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**指数运算**，通过 `exponentiate` 实现，即重复的**乘法**'
- en: '**Multiplication**, via `multiply`, as repeated **addition**'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**乘法**，通过 `multiply` 实现，即重复的**加法**'
- en: '**Addition**, via `add`, as repeated **increment**'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**加法**，通过 `add` 实现，即重复的**递增**'
- en: Each layer builds on the one below it, using only zero-initialized memory and
    in-place updates.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 每一层都建立在下一层的基础上，仅使用零初始化内存和就地更新。
- en: 'We’ll begin at the foundation — with the simplest operation of all: increment.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从基础开始——使用所有操作中最简单的：递增。
- en: Increment
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 递增
- en: 'Here’s our definition of increment and an example of its use:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们的递增定义及其使用示例：
- en: '[PRE4]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Output:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: '[PRE5]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: We’re using `xmpz`, a mutable arbitrary-precision integer type provided by the
    `gmpy2` library. It behaves like Python’s built-in `int` in terms of numeric range—limited
    only by memory—but unlike `int`, it supports in-place updates.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 `xmpz`，这是由 `gmpy2` 库提供的可变任意精度整数类型。在数值范围方面，它类似于 Python 的内置 `int` 类型——仅受内存限制，但与
    `int` 不同，它支持就地更新。
- en: 'To stay true to the spirit of a Turing machine and to keep the logic minimal
    and observable, we restrict ourselves to just a few operations:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持图灵机的精神，并保持逻辑最小化和可观察性，我们限制自己只使用几个操作：
- en: Creating an integer with value 0 (`xmpz(0)`)
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个值为 0 的整数 (`xmpz(0)`)
- en: In-place increment (`+= 1`) and decrement (`-= 1`)
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在原地增加 (`+= 1`) 和减少 (`-= 1`)
- en: Comparing with zero
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与零比较
- en: All arithmetic is done in-place, with no copies and no temporary values. Each
    function in our computation chain modifies an accumulator directly. Most functions
    also take an input value `a`, but increment—being the most basic—does not. We
    use descriptive names like `increment_acc`, `add_acc`, and so on to make the operation
    clear and to support later functions where multiple accumulators will appear together.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 所有算术都是在原地进行的，没有复制和临时值。我们计算链中的每个函数都直接修改累加器。大多数函数还接受一个输入值 `a`，但作为最基础的 `increment`
    不接受。我们使用描述性的名称如 `increment_acc`、`add_acc` 等来使操作清晰，并支持后续函数，其中将出现多个累加器。
- en: '**Aside:** Why not use Python’s built-in `int` type? It supports arbitrary
    precision and can grow as large as your memory allows. But it’s also **immutable**,
    meaning any update like `+= 1` creates a **new** integer object. Even if you think
    you’re modifying a large number in place, Python is actually copying all of its
    internal memory—no matter how big it is.'
  id: totrans-121
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**旁注：**为什么不使用 Python 的内置 `int` 类型？它支持任意精度，可以增长到你的内存允许的大小。但它也是**不可变**的，这意味着任何更新如
    `+= 1` 都会创建一个新的整数对象。即使你认为你正在原地修改一个大数字，Python 实际上正在复制其所有内部内存——无论它有多大。'
- en: '*For example:*'
  id: totrans-122
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*例如：*'
- en: '[PRE6]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Even though `x` and `y` start out identical, `x += 1` creates a new object—leaving
    `y` unchanged. This behavior is fine for small numbers, but it violates our rules
    about memory use and in-place updates. That’s why we use `gmpy2.xmpz`, a **mutable**
    arbitrary-precision integer that truly supports efficient, in-place changes.
  id: totrans-124
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 即使 `x` 和 `y` 初始时相同，`x += 1` 会创建一个新的对象——而 `y` 保持不变。这种行为对于小数字来说是好的，但它违反了我们关于内存使用和在原地更新的规则。这就是为什么我们使用
    `gmpy2.xmpz`，这是一个**可变**的任意精度整数，它真正支持高效的在原地更改。
- en: Addition
  id: totrans-125
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加法
- en: With increment defined, we next define addition as repeated incrementing.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 定义了增加后，我们接下来定义加法为重复增加。
- en: '[PRE7]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Output:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: '[PRE8]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The function adds `a` to `add_acc` by incrementing `add_acc` one step at a time,
    `a` times. The before and after ids are the same, showing that **no new object
    was created—`add_acc` was truly updated in place**.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数通过每次增加 `add_acc` 一步，重复 `a` 次来将 `a` 加到 `add_acc` 上。前后 id 相同，表明**没有创建新的对象——`add_acc`
    真正地在原地更新**。
- en: '**Aside:** You might wonder why `add` doesn’t just call our `increment` function.
    We could write it that way—but we’re deliberately inlining each level by hand.
    This keeps all loops visible, makes control flow explicit, and helps us reason
    precisely about how much work each function performs.'
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**旁注：**你可能想知道为什么 `add` 不直接调用我们的 `increment` 函数。我们可以那样写——但我们故意手动内联每个级别。这使所有循环都可见，使控制流明确，并帮助我们精确地推理每个函数执行的工作量。'
- en: Even though `gmpy2.xmpz` supports direct addition, we don’t use it. We’re working
    at the most primitive level possible—incrementing by 1—to keep the logic simple,
    intentionally slow, and to make the amount of work explicit.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 即使 `gmpy2.xmpz` 支持直接加法，我们也不使用它。我们正在最原始的级别上工作——通过 1 来增加，以保持逻辑简单、故意慢，并使工作量明确。
- en: As with `increment_acc`, we update `add_acc` in place, with no copying or temporary
    values. The only operation we use is `+= 1`, repeated `a` times.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 与 `increment_acc` 一样，我们原地更新 `add_acc`，没有复制或临时值。我们使用的唯一操作是 `+= 1`，重复 `a` 次。
- en: Next, we define **multiplication**.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们定义**乘法**。
- en: Multiplication
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 乘法
- en: With addition in place, we can now define multiplication as repeated addition.
    Here’s the function and example usage. Unlike `add` and `increment`, this one
    builds up a new `xmpz` value from zero and returns it.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 在加法就绪后，我们现在可以定义乘法为重复加法。以下是函数和示例用法。与 `add` 和 `increment` 不同，这个函数从零开始构建一个新的 `xmpz`
    值并返回它。
- en: '[PRE9]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Output:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: '[PRE10]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: This multiplies `a` by the value of `multiply_acc` by adding `a` to `add_acc`
    once for every time `multiply_acc` can be decremented. The result is returned
    and then assigned to `c`. The original `multiply_acc` is decremented to zero and
    consumed in the process.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这会将 `a` 乘以 `multiply_acc` 的值，通过每次将 `a` 加到 `add_acc` 上，直到 `multiply_acc` 可以减少为止。结果被返回，然后赋值给
    `c`。原始的 `multiply_acc` 被减少到零并在过程中消耗。
- en: 'You might wonder what this line does:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道这一行做了什么：
- en: '[PRE11]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: While `xmpz` technically works with `range()`, doing so converts it to a standard
    Python `int`, which is immutable. That triggers a full copy of its internal memory—an
    expensive operation for large values. Worse, each decrement step would involve
    allocating a new integer and copying all previous bits, so what should be a linear
    loop ends up doing **quadratic total work**. Our custom `count_down()` avoids
    all that by decrementing in place, yielding control without copying, and maintaining
    predictable memory use.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然`xmpz`在技术上可以使用`range()`，但这样做会将它转换为标准的Python `int`，它是不可变的。这会触发其内部内存的完整复制——对于大值来说这是一个昂贵的操作。更糟糕的是，每次递减步骤都会涉及分配一个新的整数并复制所有之前的位，所以原本应该是线性循环的操作最终变成了**二次总工作量**。我们的自定义`count_down()`通过就地递减避免了所有这些，它在不复制的情况下交出控制权，并保持可预测的内存使用。
- en: 'We’ve built multiplication from repeated addition. Now it’s time to go a layer
    further: **exponentiation**.'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经从重复加法构建了乘法。现在，是时候再进一步：**指数运算**。
- en: Exponentiation
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 指数运算
- en: We define exponentiation as repeated multiplication. As before, we perform all
    work using only incrementing, decrementing, and in-place memory. As with multiply,
    the final result is returned while the input accumulator is consumed.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将指数运算定义为重复乘法。像之前一样，我们仅使用递增、递减和原地内存执行所有工作。与乘法一样，最终结果在消耗输入累加器时返回。
- en: 'Here’s the function and example usage:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是函数和示例用法：
- en: '[PRE12]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Output:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: '[PRE13]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: This raises `a` to the power of `exponentiate_acc`, using only incrementing,
    decrementing, and loop control. We initialize `multiply_acc` to 1 with a single
    increment—because repeatedly multiplying from zero would get us nowhere. Then,
    for each time `exponentiate_acc` can be decremented, we multiply the current result
    (`multiply_acc`) by `a`. As with the earlier layers, we inline the multiply logic
    directly instead of calling the multiply function—so the control flow and step
    count stay fully visible.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 这将`a`的`exponentiate_acc`次幂计算出来，仅使用递增、递减和循环控制。我们通过单次递增将`multiply_acc`初始化为1——因为反复从零开始乘法将使我们一无所获。然后，对于每次`exponentiate_acc`可以递减的情况，我们将当前结果（`multiply_acc`）乘以`a`。与前面的层一样，我们直接内联乘法逻辑，而不是调用乘法函数——这样控制流和步骤计数就完全可见。
- en: '**Aside:** And how many times is `+= 1` called? Obviously at least 2⁴ times—because
    our result is 2⁴, and we reach it by incrementing from zero. More precisely, the
    number of increments is:'
  id: totrans-152
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**旁注：**`+= 1`被调用多少次？显然至少是2⁴次——因为我们的结果是2⁴，我们通过从零递增达到它。更精确地说，递增的次数是：'
- en: ''
  id: totrans-153
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: • 1 increment — initializing `multiply_acc` to one
  id: totrans-154
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: • 1次递增——初始化`multiply_acc`为1
- en: ''
  id: totrans-155
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Then we loop four times, and in each loop, we multiply the current value of
    `multiply_acc` by `a = 2`, using repeated addition:'
  id: totrans-156
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 然后我们循环四次，在每次循环中，我们使用重复加法将`multiply_acc`的当前值乘以`a = 2`：
- en: • 2 increments — for `multiply_acc = 1`, add 2 once
  id: totrans-157
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: • 2次递增——对于`multiply_acc = 1`，加2一次
- en: • 4 increments — for `multiply_acc = 2`, add 2 twice
  id: totrans-158
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: • 4次递增——对于`multiply_acc = 2`，加2两次
- en: • 8 increments — for `multiply_acc = 4`, add 2 four times
  id: totrans-159
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: • 8次递增——对于`multiply_acc = 4`，加2四次
- en: • 16 increments — for `multiply_acc = 8`, add 2 eight times
  id: totrans-160
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: • 16次递增——对于`multiply_acc = 8`，加2八次
- en: That’s a total of 1 + 2 + 4 + 8 + 16 = 31 increments, which is 2⁵-1\. In general,
    the number of calls to increment will be exponential, but the number is not the
    same exponential that we are computing*.*
  id: totrans-161
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 总共是1 + 2 + 4 + 8 + 16 = 31次递增，这是2⁵-1。一般来说，递增的调用次数将是指数级的，但这个数字与我们正在计算的指数不同*.*
- en: 'With exponentiation defined, we’re ready for the top of our tower: **tetration.**'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 定义了指数运算后，我们就准备好塔顶的部分：**超指数运算**。
- en: Tetration
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 超指数运算
- en: 'Here’s the function and example usage:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是函数和示例用法：
- en: '[PRE14]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Output:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: '[PRE15]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: This computes `a ↑↑ tetrate_acc`, meaning it exponentiates `a` by itself repeatedly,
    `tetrate_acc` times.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这计算`a ↑↑ tetrate_acc`，意味着`a`自身重复指数运算`tetrate_acc`次。
- en: For each decrement of `tetrate_acc`, we exponentiate the current value. We in-line
    the entire exponentiate and multiply logic again, all the way down to repeated
    increments.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每次`tetrate_acc`的递减，我们计算当前值。我们再次内联整个指数和乘法逻辑，一直到底层的重复递增。
- en: As expected, this computes 2^(2^2) = 16\. With a Google sign-in, you can run
    this yourself via a [Python notebook on Google Colab](https://colab.research.google.com/github/CarlKCarlK/busy_beaver_blaze/blob/main/notebooks/tetration.ipynb).
    Alternatively, you can [copy the notebook from GitHub](https://github.com/CarlKCarlK/busy_beaver_blaze/blob/main/notebooks/tetration.ipynb)
    and then run it on your own computer.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，这个计算结果是 2^(2^2) = 16。通过 Google 登录，您可以通过一个 [Google Colab 上的 Python 笔记本](https://colab.research.google.com/github/CarlKCarlK/busy_beaver_blaze/blob/main/notebooks/tetration.ipynb)来运行它。或者，您可以从
    [GitHub 复制笔记本](https://github.com/CarlKCarlK/busy_beaver_blaze/blob/main/notebooks/tetration.ipynb)，然后在您的计算机上运行它。
- en: 'We can also run tetrate on 10↑↑15\. It will start running, but it won’t stop
    during our lifetimes — or even the lifetime of the universe:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以在 10↑↑15 上运行 tetrate。它将开始运行，但不会在我们的有生之年停止——甚至不会在宇宙的寿命内停止：
- en: '[PRE16]'
  id: totrans-172
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '* * *'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Let’s compare this `tetrate` function to what we found in the previous Rule
    Sets.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们比较一下这个 `tetrate` 函数和我们在之前的规则集中找到的内容。
- en: '**Rule Set 1: Anything Goes — Infinite Loop**'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: '**规则集 1：一切皆可——无限循环**'
- en: 'Recall our first function:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 回想我们的第一个函数：
- en: '[PRE17]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Unlike this infinite loop, our `tetrate` function eventually halts — though
    not anytime soon.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 与这个无限循环不同，我们的 `tetrate` 函数最终会停止——尽管不是很快。
- en: '**Rule Set 2: Must Halt, Finite Memory — Nested, Fixed-Range Loops**'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: '**规则集 2：必须停止，有限内存——嵌套，固定范围循环**'
- en: 'Recall our second function:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 回想我们的第二个函数：
- en: '[PRE18]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Both this function and our `tetrate` function contain a fixed number of nested
    loops. But `tetrate` differs in an important way: the number of loop iterations
    grows with the input value. In this function, in contrast, each loop runs from
    0 to 10¹⁰⁰-1—a hardcoded bound. In contrast, `tetrate`’s loop bounds are dynamic — they
    grow explosively with each layer of computation.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 这个函数和我们的 `tetrate` 函数都包含固定数量的嵌套循环。但 `tetrate` 在一个重要的方面有所不同：循环的迭代次数随着输入值的增长而增长。在这个函数中，相反，每个循环从
    0 运行到 10¹⁰⁰-1——一个硬编码的界限。相比之下，`tetrate` 的循环界限是动态的——它们随着每一层计算的进行而爆炸性增长。
- en: '**Rule Sets 3 & 4: Infinite, Zero-Initialized Memory — 5- and 6-State Turing
    Machines**'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '**规则集 3 & 4：无限，零初始化内存——5 和 6 状态图灵机**'
- en: 'Compared to the Turing machines, our `tetrate` function has a clear advantage:
    we can directly see that it will call `+= 1` more than 10↑↑15 times. Even better,
    we can also see — by construction — that it halts.'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 与图灵机相比，我们的 `tetrate` 函数有一个明显的优势：我们可以直接看到它将调用 `+= 1` 超过 10↑↑15 次。更好的是，我们还可以通过构造看到它将停止。
- en: What the Turing machines offer instead is a simpler, more universal model of
    computation — and perhaps a more principled definition of what counts as a “small
    program.”
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 图灵机提供的是更简单、更通用的计算模型——也许是一个更原则性的定义，即什么算作“小程序”。
- en: Conclusion
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: So, there you have it — a journey through writing absurdly slow programs. Along
    the way, we explored the outer edges of computation, memory, and performance,
    using everything from deeply nested loops to Turing machines to a hand-inlined
    tetration function.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，这就是了——一次通过编写荒谬地慢的程序之旅。在这个过程中，我们探索了计算的边缘、内存和性能，从深度嵌套的循环到图灵机，再到手动内联的幂次函数。
- en: '**Here’s what surprised me:**'
  id: totrans-188
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**这里让我感到惊讶的是：**'
- en: '**Nested loops are enough.**If you just want a short program that halts after
    outliving the universe, two nested loops with 144 bytes of memory will do the
    job. I hadn’t realized it was that simple.'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**嵌套循环就足够了。**如果您只想编写一个在超越宇宙寿命后停止的简短程序，两个嵌套循环和 144 字节的内存就足够了。我没有意识到它是那么简单。'
- en: '**Turing machines escalate fast.**The jump from 5 to 6 states unleashes a dramatic
    leap in complexity and runtime. Also, the importance of starting with *zero-initialized*
    memory is obvious in retrospect — but it wasn’t something I’d considered before.'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图灵机快速升级。**从 5 个状态到 6 个状态的跳跃带来了复杂性和运行时间的巨大飞跃。此外，回想起来，从零初始化的内存的重要性是显而易见的——但这并不是我之前考虑过的事情。'
- en: '**Python’s `int` type can kill performance** Yes, Python integers are arbitrary
    precision, which is great. But they’re also **immutable**. That means every time
    you do something like `x += 1`, Python silently allocates a brand-new integer
    object—copying all the memory of `x`, no matter how big it is. It feels in-place,
    but it’s not. This behavior turns efficient-looking code into a performance trap
    when working with large values. To get around this, we use the [`gmpy2.xmpz`](https://pypi.org/project/gmpy2/)
    type—a **mutable**, arbitrary-precision integer that allows true in-place updates.'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Python 的 `int` 类型会杀死性能** 是的，Python 整数是任意精度的，这很好。但它们也是**不可变的**。这意味着每次你做类似
    `x += 1` 的操作时，Python 都会默默地分配一个新的整数对象——无论 `x` 多大，都会复制 `x` 的所有内存。这感觉像是就地操作，但实际上不是。当处理大数值时，这种行为会将看起来高效的代码变成性能陷阱。为了解决这个问题，我们使用
    `gmpy2.xmpz` 类型——一个**可变**的、任意精度的整数，它允许真正的就地更新。'
- en: '**There’s something beyond exponentiation — and it’s called tetration.**I didn’t
    know this. I wasn’t familiar with the ↑↑ notation or the idea that exponentiation
    could itself be iterated to form something even faster-growing. It was surprising
    to learn how compactly it can express numbers that are otherwise unthinkably large.'
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**指数之外还有东西——它被称为叠乘。**我不知道这一点。我不熟悉↑↑符号或指数本身可以迭代以形成增长更快的东西的想法。了解到它可以如此紧凑地表达其他情况下难以想象的巨大数字，这让我感到惊讶。'
- en: 'And because I know you’re asking — yes, there’s something beyond **tetration**
    too. It’s called **pentation**, then **hexation**, and so on. These are part of
    a whole hierarchy known as **hyperoperations**. There’s even a metageneralization:
    systems like the **Ackermann function** and **fast-growing hierarchies** capture
    entire families of these functions and more.'
  id: totrans-193
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 顺便说一句，我知道你们会问——是的，**叠乘**之外还有更多。它被称为**叠幂**，然后是**叠六**，以此类推。这些都是被称为**超运算**的整体层次结构的一部分。甚至还有一个元泛化：像**阿克曼函数**和**快速增长层次**这样的系统捕捉了整个这类函数家族以及更多。
- en: '**Writing Tetration with Explicit Loops Was Eye-Opening**I already knew that
    exponentiation is repeated multiplication, and so on. I also knew this could be
    written recursively. What I hadn’t seen was how cleanly it could be written as
    nested loops, without copying values and with strict in-place updates.'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用显式循环编写叠乘令人耳目一新** 我已经知道指数是重复乘法，以此类推。我也知道这可以递归地写出来。但我没有看到它可以如此干净地写成嵌套循环，无需复制值且具有严格的就地更新。'
- en: Thank you for joining me on this journey. I hope you now have a clearer understanding
    of how small Python programs can run for an astonishingly long time — and what
    that reveals about computation, memory, and minimal systems. We’ve seen programs
    that halt only after the universe dies, and others that run even longer.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您与我一同踏上这段旅程。我希望你现在对如何运行时间惊人的小 Python 程序有了更清晰的理解——以及这揭示了关于计算、内存和最小系统的什么。我们看到了只有宇宙消亡后才会停止的程序，还有运行时间更长的程序。
