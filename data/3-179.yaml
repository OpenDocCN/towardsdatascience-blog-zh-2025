- en: 'Mastering Hadoop, Part 1: Installation, Configuration, and Modern Big Data
    Strategies'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 掌握Hadoop，第1部分：安装、配置和现代大数据策略
- en: 原文：[https://towardsdatascience.com/mastering-hadoop-part-1-installation-configuration-and-modern-big-data-strategies/](https://towardsdatascience.com/mastering-hadoop-part-1-installation-configuration-and-modern-big-data-strategies/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/mastering-hadoop-part-1-installation-configuration-and-modern-big-data-strategies/](https://towardsdatascience.com/mastering-hadoop-part-1-installation-configuration-and-modern-big-data-strategies/)
- en: Nowadays, a large amount of data is collected on the internet, which is why
    companies are faced with the challenge of being able to store, process, and analyze
    these volumes efficiently. Hadoop is an open-source framework from the Apache
    Software Foundation and has become one of the leading big data management technologies
    in recent years. The system enables the distributed storage and processing of
    data across multiple servers. As a result, it offers a scalable solution for a
    wide range of applications from data analysis to machine learning.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，互联网上收集了大量的数据，这就是为什么公司面临着能够高效存储、处理和分析这些数据量的挑战。Hadoop是Apache软件基金会的一个开源框架，近年来已成为领先的大数据管理技术之一。该系统使数据能够在多个服务器上分布式存储和处理。因此，它为从数据分析到机器学习等广泛的应用提供了可扩展的解决方案。
- en: This article provides a comprehensive overview of Hadoop and its components.
    We also examine the underlying architecture and provide practical tips for getting
    started with it.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本文全面概述了Hadoop及其组件。我们还探讨了其底层架构，并提供了开始使用它的实用技巧。
- en: 'Before we can start with it, we need to mention that the whole topic of Hadoop
    is huge and even though this article is already long, it is not even close to
    going into too much detail on all topics. This is why we split it into three parts:
    To let you decide for yourself how deep you want to dive into it:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，我们需要提到，整个Hadoop主题非常庞大，尽管这篇文章已经很长，但它甚至没有深入到所有主题的太多细节。这就是为什么我们将其分为三个部分：让您自己决定您想要多深入地了解：
- en: '**Part 1: Hadoop 101: What it is, why it matters, and who should care**'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**第1部分：Hadoop 101：它是什麼，为什么它很重要，谁应该关心**'
- en: This part is for everyone interested in Big Data and Data Science that wants
    to get to know this classic tool and also understand the downsides of it.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这一部分是为所有对大数据和数据分析感兴趣的人准备的，他们想要了解这个经典工具，并了解它的缺点。
- en: '**Part 2: Getting Hands-On: Setting up and scaling Hadoop**'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**第2部分：动手实践：设置和扩展Hadoop**'
- en: All readers that weren’t scared off by the disadvantages of Hadoop and the size
    of the ecosystem, can use this part to get a guideline on how they can start with
    their first local cluster to learn the basics on how to operate it.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 所有没有被Hadoop的缺点和生态系统的规模吓倒的读者，都可以使用本部分来获得如何开始他们的第一个本地集群的指南，以学习如何操作它的基础知识。
- en: '**Part 3: Hadoop ecosystem: Get the most out of your cluster**'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**第3部分：Hadoop生态系统：充分利用您的集群**'
- en: In this section, we go under the hood and explain the core components and how
    they can be further advanced to meet your requirements.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将深入了解，解释核心组件以及如何进一步扩展以满足您的需求。
- en: 'Part 1: Hadoop 101: What it is, why it matters, and who should care'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1部分：Hadoop 101：它是什麼，为什么它很重要，谁应该关心
- en: Hadoop is an open-source framework for the distributed storage and processing
    of large amounts of data. It was originally developed by Doug Cutting and Mike
    Cafarella and started as a search engine optimization project under the name Nutch.
    It was only later renamed Hadoop by its founder Cutting, based on the name of
    his son’s toy elephant. This is where the yellow elephant in today’s logo comes
    from.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop是一个用于分布式存储和处理大量数据的开源框架。它最初由Doug Cutting和Mike Cafarella开发，最初是一个名为Nutch的搜索引擎优化项目。后来，创始人Cutting根据他儿子的玩具大象的名字将其更名为Hadoop。这就是今天标志中黄色大象的来源。
- en: The original concept was based on two Google papers on distributed file systems
    and the [MapReduce](https://databasecamp.de/en/data/mapreduce-algorithm) mechanism
    and initially comprised around 11,000 lines of code. Other methods, such as the
    YARN resource manager, were only added in 2012\. Today, the ecosystem comprises
    a large number of components that go far beyond pure file storage.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 原始概念基于两篇关于分布式文件系统和[MapReduce](https://databasecamp.de/en/data/mapreduce-algorithm)机制的Google论文，最初包含大约11,000行代码。其他方法，如YARN资源管理器，是在2012年才被添加的。如今，该生态系统包含大量组件，远远超出了纯文件存储。
- en: 'Hadoop differs fundamentally from traditional relational databases (RDBMS):'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop与传统的数据库（RDBMS）有根本的不同：
- en: '| **Attribute** | **Hadoop** | **RDBMS** |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| **属性** | **Hadoop** | **RDBMS** |'
- en: '| Data Structure | Unstructured, semi-structured, and unstructured data | Structured
    Data |'
  id: totrans-16
  prefs: []
  type: TYPE_TB
  zh: '| 数据结构 | 非结构化、半结构化和非结构化数据 | 结构化数据 |'
- en: '| Processing | Batch processing or partial real-time processing | Transaction-based
    with SQL |'
  id: totrans-17
  prefs: []
  type: TYPE_TB
  zh: '| 处理 | 批处理或部分实时处理 | 基于事务的SQL处理 |'
- en: '| Scalability | Horizontal scaling across multiple servers | Vertical scaling
    through stronger servers |'
  id: totrans-18
  prefs: []
  type: TYPE_TB
  zh: '| 可扩展性 | 在多个服务器上实现水平扩展 | 通过更强的服务器实现垂直扩展 |'
- en: '| Flexibility | Supports many data formats | Strict schemes must be adhered
    to |'
  id: totrans-19
  prefs: []
  type: TYPE_TB
  zh: '| 灵活性 | 支持多种数据格式 | 必须遵守严格的方案 |'
- en: '| Costs | Open source with affordable hardware | Mostly open source, but with
    powerful, expensive servers |'
  id: totrans-20
  prefs: []
  type: TYPE_TB
  zh: '| 成本 | 开源且硬件价格低廉 | 主要开源，但配备强大且昂贵的服务器 |'
- en: Which applications use Hadoop?
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 哪些应用程序使用Hadoop？
- en: Hadoop is an important big data framework that has established itself in many
    companies and applications in recent years. In general, it can be used primarily
    for the storage of large and unstructured data volumes and, thanks to its distributed
    architecture, is particularly suitable for data-intensive applications that would
    not be manageable with traditional databases.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop是一个重要的大数据框架，近年来在许多公司和应用程序中确立了自己的地位。总的来说，它主要用于存储大量非结构化数据，由于其分布式架构，特别适合于数据密集型应用程序，这些应用程序使用传统数据库将无法管理。
- en: 'Typical use cases for Hadoop include:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop的典型用例包括：
- en: '**Big data analysis**: Hadoop enables companies to centrally collect and store
    large amounts of data from different systems. This data can then be processed
    for further analysis and made available to users in reports. Both structured data,
    such as financial transactions or sensor data, and unstructured data, such as
    social media comments or website usage data, can be stored in Hadoop.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大数据分析**：Hadoop使公司能够从不同的系统中集中收集和存储大量数据。然后，这些数据可以用于进一步分析，并通过报告提供给用户。结构化数据，如金融交易或传感器数据，以及非结构化数据，如社交媒体评论或网站使用数据，都可以存储在Hadoop中。'
- en: '**Log analysis & IT monitoring**: In modern IT infrastructure, a wide variety
    of systems generate data in the form of logs that provide information about the
    status or log certain events. This information needs to be stored and reacted
    to in real-time, for example, to prevent failures if the memory is full or the
    program is not working as expected. Hadoop can take on the task of data storage
    by distributing the data across several nodes and processing it in parallel, while
    also analyzing the information in batches.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**日志分析与IT监控**：在现代IT基础设施中，各种系统以日志的形式生成数据，提供有关状态或记录某些事件的信息。这些信息需要存储并实时响应，例如，以防内存不足或程序未按预期工作。Hadoop可以通过在多个节点上分布数据并并行处理数据来承担数据存储的任务，同时还可以批量分析信息。'
- en: '**Machine learning & AI**: Hadoop provides the basis for many machine learning
    and AI models by managing the data sets for large models. In text or image processing
    in particular, the model architectures require a lot of training data that takes
    up large amounts of memory. With the help of Hadoop, this storage can be managed
    and operated efficiently so that the focus can be on the architecture and training
    of the AI algorithms.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器学习与人工智能**：Hadoop通过管理大型模型的数据集为许多机器学习和人工智能模型提供基础。特别是在文本或图像处理中，模型架构需要大量的训练数据，这些数据占据了大量的内存。借助Hadoop，这种存储可以高效地管理和操作，从而可以将重点放在人工智能算法的架构和训练上。'
- en: '**ETL processes**: ETL processes are essential in companies to prepare the
    data so that it can be processed further or used for analysis. To do this, it
    must be collected from a wide variety of systems, then transformed and finally
    stored in a data lake or data warehouse. Hadoop can provide central support here
    by offering a good connection to different data sources and allowing data processing
    to be parallelized across multiple servers. In addition, cost efficiency can be
    increased, especially in comparison to classic ETL approaches with data warehouses.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ETL流程**：ETL流程在公司中至关重要，用于准备数据以便进一步处理或用于分析。为此，必须从广泛的系统中收集数据，然后进行转换，最后存储在数据湖或数据仓库中。Hadoop可以通过提供与不同数据源的良好连接，并允许在多个服务器上并行处理数据，在这里提供中心支持。此外，可以提高成本效益，尤其是在与具有数据仓库的经典ETL方法相比时。'
- en: The list of well-known companies that use Hadoop daily and have made it an integral
    part of their architecture is very long. Facebook, for example, uses Hadoop to
    process several petabytes of user data every day for advertisements, feed optimization,
    and machine learning. Twitter, on the other hand, uses Hadoop for real-time trend
    analysis or to detect spam, which should be flagged accordingly. Finally, Yahoo
    has one of the world’s largest Hadoop installations with over 40,000 nodes, which
    was set up to analyze search and advertising data.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 每天使用 Hadoop 并将其作为其架构重要组成部分的知名公司名单非常长。例如，Facebook 就使用 Hadoop 处理每天数百万用户数据，用于广告、内容优化和机器学习。另一方面，Twitter
    使用 Hadoop 进行实时趋势分析或检测垃圾邮件，应相应地标记。最后，Yahoo 拥有世界上最大的 Hadoop 集成之一，拥有超过 40,000 个节点，该集成是为了分析搜索和广告数据而建立的。
- en: What are the advantages and disadvantages of Hadoop?
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Hadoop 的优势和劣势是什么？
- en: 'Hadoop has become a powerful and popular big data framework used by many companies,
    especially in the 2010s, due to its ability to process large amounts of data in
    a distributed manner. In general, the following advantages arise when using Hadoop:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 由于其能够以分布式方式处理大量数据，Hadoop 已经成为许多公司使用的强大且流行的大数据框架，尤其是在 2010 年代。一般来说，使用 Hadoop
    时会产生以下优势：
- en: '**Scalability**: The cluster can easily be scaled horizontally by adding new
    nodes that take on additional tasks for a job. This also makes it possible to
    process data volumes that exceed the capacity of a single computer.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：集群可以通过添加承担额外任务的新节点来轻松水平扩展。这也使得处理超过单个计算机容量的数据量成为可能。'
- en: '**Cost efficiency**: This horizontal scalability also makes Hadoop very cost-efficient,
    as more low-cost computers can be added for better performance instead of equipping
    a server with expensive hardware and scaling vertically. In addition, Hadoop is
    open-source software and can therefore be used free of charge.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本效益**：这种水平扩展性也使得 Hadoop 非常具有成本效益，因为可以通过添加更多低成本计算机来提高性能，而不是用昂贵的硬件装备服务器并垂直扩展。此外，Hadoop
    是开源软件，因此可以免费使用。'
- en: '**Flexibility**: Hadoop can process both unstructured data and structured data,
    offering the flexibility to be used for a wide variety of applications. It offers
    additional flexibility by providing a large library of components that further
    extend the existing functionalities.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活性**：Hadoop 可以处理非结构化数据和结构化数据，提供了广泛应用的灵活性。它通过提供大量组件库来进一步扩展现有功能，从而提供了额外的灵活性。'
- en: '**Fault tolerance**: By replicating the data across different servers, the
    system can still function in the event of most hardware failures, as it simply
    falls back on another replication. This also results in high availability of the
    entire system.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容错性**：通过在不同服务器上复制数据，系统在大多数硬件故障的情况下仍然可以运行，因为它只是简单地回退到另一个副本。这也导致了整个系统的可用性很高。'
- en: These disadvantages should also be taken into account.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这些缺点也应该被考虑在内。
- en: '**Complexity**: Due to the strong networking of the cluster and the individual
    servers in it, the administration of the system is rather complex, and a certain
    amount of training is required to set up and operate a Hadoop cluster correctly.
    However, this point can be avoided by using a cloud connection and the automatic
    scaling it contains.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂性**：由于集群和其中各个服务器的强网络连接，系统的管理相当复杂，需要一定的培训才能正确设置和运行 Hadoop 集群。然而，通过使用云连接和其中包含的自动扩展功能，可以避免这一点。'
- en: '**Latency**: Hadoop uses batch processing to handle the data and thus establishes
    latency times, as the data is not processed in real-time, but only when enough
    data is available for a batch. Hadoop tries to avoid this with the help of mini-batches,
    but this still means latency.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟**：Hadoop 使用批量处理来处理数据，因此建立了延迟时间，因为数据不是实时处理的，而只是在有足够数据可供批量处理时才处理。Hadoop
    尝试通过微型批量来避免这种情况，但这仍然意味着延迟。'
- en: '**Data management**: Additional components are required for data management,
    such as data quality control or tracking the data sequence. Hadoop does not include
    any direct tools for data management.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据管理**：需要额外的组件来管理数据，例如数据质量控制或跟踪数据序列。Hadoop 不包括任何直接的数据管理工具。'
- en: Hadoop is a powerful tool for processing big data. Above all, scalability, cost
    efficiency, and flexibility are decisive advantages that have contributed to the
    widespread use of Hadoop. However, there are also some disadvantages, such as
    the latency caused by batch processing.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop是处理大数据的强大工具。首先，可扩展性、成本效益和灵活性是Hadoop被广泛使用的关键优势。然而，也存在一些缺点，例如批处理造成的延迟。
- en: Does Hadoop have a future?
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Hadoop有未来吗？
- en: Hadoop has long been the leading technology for distributed big data processing,
    but new systems have also emerged and become increasingly relevant in recent years.
    One of the biggest trends is that most companies are turning to fully managed
    cloud data platforms that can run Hadoop-like workloads without the need for a
    dedicated cluster. This also makes them more cost-efficient, as only the hardware
    that is needed has to be paid for.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop长期以来一直是分布式大数据处理的领先技术，但近年来也出现了新的系统，并变得越来越相关。最大的趋势之一是，大多数公司都在转向可以运行类似Hadoop的工作负载而无需专用集群的全托管云数据平台。这也使它们更具成本效益，因为只需支付所需的硬件费用。
- en: In addition, Apache Spark in particular has established itself as a faster alternative
    to MapReduce and is therefore outperforming the classic Hadoop setup. It is also
    interesting because it offers an almost complete solution for AI workloads thanks
    to its various functionalities, such as Apache Streaming or the machine learning
    library.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，Apache Spark尤其已经确立了自己作为MapReduce的更快替代品，因此优于经典的Hadoop设置。它也非常有趣，因为它提供了几乎完整的AI工作负载解决方案，这得益于其各种功能，如Apache
    Streaming或机器学习库。
- en: Although Hadoop remains a relevant big data framework, it is slowly losing importance
    these days. Even though many established companies continue to rely on the clusters
    that were set up some time ago, companies that are now starting with big data
    are using cloud solutions or specialized analysis software directly. Accordingly,
    the Hadoop platform is also evolving and offers new solutions that adapt to this
    zeitgeist.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管Hadoop仍然是一个相关的大数据框架，但它在当今正逐渐失去重要性。尽管许多老牌公司继续依赖一些时间以前建立的集群，但现在开始涉足大数据的公司正在直接使用云解决方案或专业的分析软件。因此，Hadoop平台也在不断发展，并提供了适应这种时代精神的新解决方案。
- en: Who should still learn Hadoop?
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 谁应该继续学习Hadoop？
- en: 'With the rise of cloud-native data platforms and modern distributed computing
    frameworks, you might be wondering: Is Hadoop still worth learning? The answer
    depends on your role, industry, and the scale of data you work with. While Hadoop
    is no longer the *default* choice for big data processing, it remains highly relevant
    in many enterprise environments. Hadoop could be still relevant for you if at
    least one of the following is true for you:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 随着云原生数据平台和现代分布式计算框架的兴起，你可能正在思考：Hadoop是否仍然值得学习？答案取决于你的角色、行业以及你处理的数据规模。虽然Hadoop不再是大数据处理的首选方案，但在许多企业环境中仍然非常相关。以下至少有一条对你适用，Hadoop对你来说可能仍然相关：
- en: Your company still has a Hadoop-based data lake.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的公司仍然拥有基于Hadoop的数据湖。
- en: The data you are storing is confidential and needs to be hosted on-premises.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你存储的数据是机密的，需要在本地上架。
- en: You work with ETL processes, and data ingestion at scale.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你处理ETL流程和大规模数据摄取。
- en: Your goal is to optimize batch-processing jobs in a distributed environment.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的目标是优化分布式环境中的批处理作业。
- en: You need to work with tools like Hive, HBase, or Apache Spark on Hadoop.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要在Hadoop上使用Hive、HBase或Apache Spark等工具。
- en: You want to optimize cost-efficient data storage and processing solutions.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你希望优化成本效益高的数据存储和处理解决方案。
- en: Hadoop is definitely not necessary for every data professional. If you’re working
    primarily with cloud-native analytics tools, serverless architectures, or lightweight
    data-wrangling tasks, spending time on Hadoop may not be the best investment.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop绝对不是每个数据专业人士的必需品。如果你主要使用云原生分析工具、无服务器架构或轻量级数据处理任务，花时间在Hadoop上可能不是最佳的投资。
- en: 'You can skip Hadoop if:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以跳过Hadoop的情况是：
- en: Your work is focused on SQL-based analytics with cloud-native solutions (e.g.,
    BigQuery, Snowflake, Redshift).
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的工作主要集中在使用云原生解决方案（例如，BigQuery、Snowflake、Redshift）的基于SQL的分析。
- en: You primarily handle small to mid-sized datasets in Python or Pandas.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你主要处理的是Python或Pandas中的小型到中型数据集。
- en: Your company has already migrated away from Hadoop to fully cloud-based architectures.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的公司已经从Hadoop迁移到完全基于云的架构。
- en: Hadoop is no longer the cutting edge technology that it once was, but it still
    has importance in different applications and companies with existing data lakes,
    large-scale ETL processes, or on-premises infrastructure. [In the following part](https://towardsdatascience.com/mastering-hadoop-part-2-getting-hands-on-setting-up-and-scaling-hadoop/),
    we will finally be more practical and show how an easy cluster can be set up to
    build your big data framework with Hadoop.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: Hadoop已不再是曾经的那项尖端技术，但它仍然在不同应用和拥有现有数据湖、大规模ETL流程或本地基础设施的公司中具有重要意义。[在下文中](https://towardsdatascience.com/mastering-hadoop-part-2-getting-hands-on-setting-up-and-scaling-hadoop/)，我们将更加实用，展示如何轻松搭建一个集群以使用Hadoop构建你的大数据框架。
