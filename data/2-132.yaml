- en: 'Don’t Waste Your Labeled Anomalies: 3 Practical Strategies to Boost Anomaly
    Detection Performance'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 不要浪费你的标记异常：提升异常检测性能的3个实用策略
- en: 原文：[https://towardsdatascience.com/dont-waste-your-labeled-anomalies-3-practical-strategies-to-boost-anomaly-detection-performance/](https://towardsdatascience.com/dont-waste-your-labeled-anomalies-3-practical-strategies-to-boost-anomaly-detection-performance/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/dont-waste-your-labeled-anomalies-3-practical-strategies-to-boost-anomaly-detection-performance/](https://towardsdatascience.com/dont-waste-your-labeled-anomalies-3-practical-strategies-to-boost-anomaly-detection-performance/)
- en: <mdspan datatext="el1752705956504" class="mdspan-comment">Most anomaly detection</mdspan>
    algorithms assume you’re working with completely unlabeled data.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752705956504" class="mdspan-comment">大多数异常检测</mdspan>算法假设你正在处理完全未标记的数据。
- en: But if you’ve actually worked on these problems, you know the reality is often
    different. In practice, anomaly detection tasks often come with at least a few
    labeled examples, maybe from past investigations, or your subject matter expert
    flagged a couple of anomalies to help you define the problem more clearly.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你实际上处理过这些问题，你知道现实往往不同。在实践中，异常检测任务通常至少带有几个标记的示例，可能来自过去的调查，或者你的主题专家标记了一些异常来帮助你更清楚地定义问题。
- en: In these situations, if we ignore these valuable labeled examples and stick
    with those purely unsupervised methods, we are leaving money on the table.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，如果我们忽略这些宝贵的标记示例，坚持使用那些纯粹的无监督方法，我们就是在错失机会。
- en: So the question is, how can we actually make use of those few labeled anomalies?
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，问题是如何真正利用那些少数标记的异常？
- en: If you search the academic literature, you will find it is full of clever solutions,
    especially with all the new deep learning methods coming out. But let’s be real,
    most of those solutions require adopting entirely new frameworks with steep learning
    curves. They usually involve a painful amount of unintuitive hyperparameter tuning,
    and still might not perform well on your specific dataset.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你搜索学术文献，你会发现它充满了巧妙的解决方案，尤其是在所有新的深度学习方法出现之后。但让我们面对现实，大多数这些解决方案都需要采用全新的框架，学习曲线陡峭。它们通常涉及大量不直观的超参数调整，而且可能仍然无法在你特定的数据集上表现良好。
- en: In this post, I want to share three practical strategies that you can start
    using right away to boost your anomaly detection performance. No fancy frameworks
    required. I’ll also walk through a concrete example on fraud detection data so
    you can see how one of these approaches plays out in practice.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我想分享三个你可以立即开始使用的实用策略，以提升你的异常检测性能。无需复杂的框架。我还会通过一个关于欺诈检测数据的实例来具体说明，这样你可以看到这些方法在实际中的应用。
- en: By the end, you’ll have several actionable methods for making better use of
    your limited labeled data, plus a real-world implementation you can adapt to your
    own use cases.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 到最后，你将拥有几种可操作的方法来更好地利用你有限的标记数据，以及一个你可以根据自己用例进行调整的实际应用案例。
- en: '* * *'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**1\. Threshold** **Tuning**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 阈值调整**'
- en: Let’s start with the lowest-hanging fruit.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从最简单的方法开始。
- en: Most unsupervised models output a continuous **anomaly score**. It’s entirely
    up to you to decide where to draw the line to distinguish the “normal” and “abnormal”
    classes.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数无监督模型输出一个连续的**异常分数**。完全取决于你决定在哪里划线来区分“正常”和“异常”类别。
- en: This is an important step for a practical anomaly detection solution, as selecting
    the wrong threshold can result in either missing critical anomalies or overwhelming
    operators with false alarms. Luckily, those few labeled abnormal examples can
    provide some guidance in properly setting this threshold.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于实用的异常检测解决方案来说是一个重要的步骤，因为选择错误的阈值可能会导致错过关键异常或让操作员被虚假警报淹没。幸运的是，那些少数标记的异常示例可以提供一些指导，以正确设置这个阈值。
- en: The key insight is that you can use those labeled anomalies as a validation
    set to quantify detection performance under different threshold choices.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的洞见是，你可以使用那些标记的异常作为验证集，以量化在不同阈值选择下的检测性能。
- en: 'Here’s how this works in practice:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是如何在实际中工作的：
- en: '**Step (1)**: Proceed with your usual model training & thresholding on the
    dataset **excluding** those labeled anomalies. If you have curated a pure normal
    dataset, you might want to set the threshold as the maximum anomaly score observed
    in the normal data. If you are working with unlabeled data, you can set the threshold
    by choosing a percentile (e.g., 95th or 99th percentile) that corresponds to your
    tolerated false positive rate.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤（1）**：在数据集**排除**那些标记异常的情况下，继续进行你通常的模型训练和阈值设置。如果你已经整理了一个纯正常数据集，你可能希望将阈值设置为在正常数据中观察到的最大异常分数。如果你正在处理未标记的数据，你可以通过选择一个百分位数（例如，第95百分位数或第99百分位数）来设置阈值，这个百分位数对应于你容忍的误报率。'
- en: '**Step (2)**: With your labeled anomalies set aside, you can calculate concrete
    detection metrics under your chosen threshold. These include recall (what percentage
    of known anomalies would be caught), precision, and recall@k (useful when you
    can only investigate the top k alerts). These metrics give you a quantitative
    measure of whether your current threshold yields acceptable detection performance.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤（2）**：将你的标记异常放在一边，你可以在你选择的阈值下计算具体的检测指标。这些包括召回率（已知异常中会被捕获的百分比）、精确度和召回率@k（当你只能调查前k个警报时很有用）。这些指标给你一个量化的衡量标准，以确定你当前的阈值是否产生可接受的检测性能。'
- en: '💡**Pro Tip**: If the number of your labeled anomalies is small, the estimated
    metrics (e.g., recall) would have high variances. A more robust way here would
    be to report its uncertainty via **bootstrapping**. Essentially, you are creating
    many “pseudo-datasets” by randomly sampling known anomalies with replacement,
    re-compute the metrics for every replicate, and derive the confidence interval
    from the distribution (e.g., grab the 2.5-th and 97.5-th percentiles, which gives
    you 95% confidence interval). Those uncertainty estimates would give you the hint
    of how trustworthy those computed metrics are.'
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡**专业技巧**：如果你的标记异常数量很少，估计的指标（例如，召回率）会有很高的方差。这里更稳健的方法是通过**重抽样**来报告其不确定性。本质上，你通过随机替换已知异常来创建许多“伪数据集”，为每个复制计算指标，并从分布（例如，抓取第2.5百分位数和第97.5百分位数，这给你一个95%的置信区间）中推导出置信区间。这些不确定性估计将给你提示，这些计算出的指标有多可靠。
- en: '**Step (3)**: If you are not satisfied with the current detection performance,
    you can now actively tune the threshold based on these metrics. If your recall
    is too low (meaning that you’re missing too many known anomalies), you can lower
    the threshold. If you’re catching most anomalies but the false positive rate is
    higher than acceptable, you can raise the threshold and measure the trade-off.
    The bottom line is that you can now find the optimal balance between false positives
    and false negatives for your specific use case, based on real performance data.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤（3）**：如果你对当前的检测性能不满意，你现在可以根据这些指标主动调整阈值。如果你的召回率太低（意味着你错过了太多已知的异常），你可以降低阈值。如果你捕捉到大多数异常，但误报率高于可接受的范围，你可以提高阈值并衡量权衡。底线是，你现在可以根据实际性能数据，找到适合你特定用例的假阳性与假阴性之间的最佳平衡。'
- en: '**✨ Takeaway**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**✨ 启示**'
- en: The strength of this approach lies in its simplicity. You’re not changing your
    anomaly detection algorithm at all – you’re just using your labeled examples to
    intelligently tune a threshold you would have had to set anyway. With a handful
    of labeled anomalies, you can turn threshold selection from guesswork into an
    optimization problem with measurable outcomes.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的优点在于其简单性。你并没有改变你的异常检测算法——你只是使用你的标记示例来智能地调整一个你无论如何都需要设置的阈值。有了少量标记的异常，你可以将阈值选择从猜测变成一个具有可测量结果的优化问题。
- en: '* * *'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**2\. Model Selection**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 模型选择**'
- en: Besides tuning the threshold, the labeled anomalies can also guide the selection
    of better model choices and configurations.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 除了调整阈值，标记的异常还可以指导选择更好的模型选择和配置。
- en: 'Model selection is a common pain point every practitioner faces: with so many
    anomaly detection algorithms out there, each with their own hyperparameters, how
    do you know which combination will actually work well for your specific problem?'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 模型选择是每个从业者都会遇到的一个常见痛点：有这么多异常检测算法，每个都有自己的超参数，你怎么知道哪个组合实际上会对你特定的问题工作得很好？
- en: To effectively answer this question, we need a concrete way to measure how well
    different models and configurations perform on the dataset we are investigating.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地回答这个问题，我们需要一个具体的方法来衡量我们在调查的数据集上，不同的模型和配置表现如何。
- en: 'This is exactly where those labeled anomalies become invaluable. Here’s the
    workflow:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是那些标记的异常变得非常有价值的地方。以下是工作流程：
- en: '**Step (1)**: Train your candidate model (with a specific set of configurations)
    on the dataset, excluding those labeled anomalies, just like what we did with
    the threshold tuning.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤（1）**：在数据集上训练候选模型（具有特定的配置），排除那些标记的异常，就像我们在阈值调整中所做的那样。'
- en: '**Step (2)**: Score the entire dataset and calculate the average anomaly score
    percentile of your known anomalies. Specifically, for each of the labeled anomalies,
    you calculate what percentile it falls into of the distribution of the scores
    (e.g., if the score of a known anomaly is higher than 95% of all data points,
    it’s at the 95th percentile). Then, you average these percentiles across all your
    labeled anomalies. This way, you obtain a single metric that captures how well
    the model pushes known anomalies toward the top of the ranking. The higher this
    metric is, the better the model performs.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤（2）**：对整个数据集进行评分，并计算已知异常的平均异常分数百分位数。具体来说，对于每个标记的异常，您计算它在分数分布中的百分位数（例如，如果已知异常的分数高于所有数据点的95%，则位于第95百分位数）。然后，您将这些百分位数平均到所有标记的异常上。这样，您就获得了一个单一指标，该指标可以捕捉模型将已知异常推向排名顶端的效果。这个指标越高，模型的性能就越好。'
- en: '**Step (3)**: You can apply this approach to identify the most promising hyperparameter
    configurations for a specific model type you have in mind (e.g., Local Outlier
    Factor, Gaussian Mixture Models, Autoencoder, etc.), or to select the model type
    that best aligns with your anomaly patterns.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤（3）**：您可以将这种方法应用于确定您心中特定模型类型（例如，局部异常因子、高斯混合模型、自动编码器等）的最有潜力的超参数配置，或者选择与您的异常模式最匹配的模型类型。'
- en: '💡**Pro Tip**: Ensemble learning is increasingly common in production anomaly
    detection systems. This paradigm means instead of relying on one single detection
    model, multiple detectors, possibly with different model types and different model
    configurations, run simultaneously to catch different types of anomalies. In this
    case, those labeled abnormal samples can help you gauge which candidate model
    instance actually deserve a spot in your final ensemble.'
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡**专业提示**：集成学习在生产异常检测系统中越来越常见。这种范式意味着不是依赖于一个单一的检测模型，而是多个检测器（可能具有不同的模型类型和不同的模型配置）同时运行，以捕获不同类型的异常。在这种情况下，那些标记的异常样本可以帮助您判断哪些候选模型实例真正值得在最终的集成中占有一席之地。
- en: '**✨ Takeaway**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**✨ 吸收点**'
- en: Compared to the previous threshold tuning strategy, this current model selection
    strategy moves from “tuning what you have” to “choosing what to use.”
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前的阈值调整策略相比，当前的模型选择策略是从“调整你所拥有的”转变为“选择你要使用的”。
- en: Concretely, by using the average percentile ranking of your known anomalies
    as a performance metric, you can objectively compare different algorithms and
    configurations in terms of how well they identify the types of anomalies you actually
    encounter. As a result, your model selection is no longer a trial-and-error process,
    but a data-driven decision-making process.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，通过使用已知异常的平均百分位数排名作为性能指标，您可以客观地比较不同算法和配置在识别您实际遇到的异常类型方面的表现。因此，您的模型选择不再是试错过程，而是一个数据驱动的决策过程。
- en: '* * *'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**3\. Supervised Ensembling**'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 监督集成**'
- en: So far, we’ve been discussing strategies where the labeled anomalies are primarily
    used as a validation tool, either for tuning the threshold or selecting promising
    models. We can, of course, put them to work more directly in the detection process
    itself.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们一直在讨论的策略主要是将标记的异常值作为验证工具，用于调整阈值或选择有潜力的模型。当然，我们也可以将这些方法更直接地应用于检测过程本身。
- en: This is where the idea of **supervised ensembling** comes in.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 正是这种想法促成了**监督集成**。
- en: To better understand this approach, let’s first discuss the intuition behind
    this strategy.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解这种方法，让我们首先讨论一下这种策略背后的直觉。
- en: 'We know that different anomaly detection methods often disagree about what
    looks suspicious. One algorithm might flag “anomaly” at a data point while another
    might say it’s totally normal. But here’s the thing: these disagreements are quite
    informative, as they tell us a lot about that data point’s **anomaly signature**.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道，不同的异常检测方法往往对可疑数据的看法不一致。一个算法可能会在数据点上标记“异常”，而另一个算法可能会说它完全正常。但问题是：这些分歧非常有信息量，因为它们告诉我们很多关于该数据点**异常特征**的信息。
- en: 'Let’s consider the following scenario: Suppose we have two data points, A and
    B. For data point A, it triggers alarms in a **density-based method** (e.g., Gaussian
    Mixture Models) but passes through an **isolation-based one** (e.g., Isolation
    Forest). For data point B, however, both detectors set off the alarm. Then, we
    would generally believe those two points carry completely different signatures,
    right?'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑以下场景：假设我们有两个数据点，A和B。对于数据点A，它在**基于密度的方法**（例如，高斯混合模型）中触发警报，但通过了一个**基于隔离的方法**（例如，隔离森林）。然而，对于数据点B，两个检测器都设置了警报。那么，我们通常会认为这两个点具有完全不同的签名，对吧？
- en: Now the question is how to capture these signatures in a systematic way.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的问题是，如何以系统化的方式捕捉这些签名。
- en: 'Luckily, we can resort to **supervised learning**. Here is how:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，我们可以求助于**监督学习**。以下是方法：
- en: '**Step (1)**: Start by training multiple base anomaly detectors on your unlabeled
    data (excluding your precious labeled examples, of course).'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 (1)**: 首先在你的未标记数据上（当然不包括你宝贵的标记示例）训练多个基础异常检测器。'
- en: '**Step (2)**: For each data point, collect the anomaly scores from all these
    detectors. This becomes your feature vector, which is essentially the “anomaly
    signatures” we aim to mine from. To give a concrete example, let’s say you used
    three base detectors (e.g., Isolation Forest, GMM, and PCA), then the feature
    vector for a single data point `i` would look like this:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 (2)**: 对于每个数据点，收集所有这些检测器的异常分数。这成为你的特征向量，这实际上是我们要从中学到的“异常签名”。为了给出一个具体的例子，假设你使用了三个基础检测器（例如，隔离森林、高斯混合模型和主成分分析），那么单个数据点`i`的特征向量将看起来像这样：'
- en: '`X_i=[iForest_score, GMM_score, PCA_score]`'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '`X_i=[iForest_score, GMM_score, PCA_score]`'
- en: 'The label for each data point is straightforward: `1` for the known anomalies
    and `0` for the rest of the samples.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 每个数据点的标签很简单：已知异常为`1`，其余样本为`0`。
- en: '**Step (3)**: Train a standard **supervised classifier** using these newly
    composed feature vectors as inputs and the labels as the target outputs. Although
    any off-the-shelf classification algorithm could in principle work, a common recommendation
    is to use **gradient-boosted tree models**, such as **XGBoost**, as they are adept
    at learning complex, non-linear patterns in the features, and they are robust
    against the “noisy” labels (keep in mind that probably not all the unlabeled samples
    are normal).'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 (3)**: 使用这些新组成的特征向量作为输入，并将标签作为目标输出，训练一个标准的**监督分类器**。虽然原则上任何现成的分类算法都可以工作，但一个常见的建议是使用**梯度提升树模型**，例如**XGBoost**，因为它们擅长学习特征中的复杂、非线性模式，并且对“噪声”标签具有鲁棒性（记住，可能并非所有未标记的样本都是正常的）。'
- en: Once trained, this supervised “meta-model” is your final anomaly detector. At
    inference time, you run new data through all base detectors and feed their outputs
    to your trained meta-model for the final decision, i.e., normal or abnormal.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦训练完成，这个监督的“元模型”就是你的最终异常检测器。在推理时间，你将新数据通过所有基础检测器，并将它们的输出传递给你的训练好的元模型进行最终决策，即正常或异常。
- en: '**✨ Takeaway**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**✨ 吸收要点**'
- en: With the supervised ensembling strategy, we are shifting the paradigm from using
    the labeled anomalies as passive validation tools to making them active participants
    in the detection process. The meta-classifier model we built learns how different
    detectors respond to anomalies. This not only improves detection accuracy, but
    more importantly, gives us a principled way to combine the strengths of multiple
    algorithms, making the anomaly detection system more robust and reliable.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 使用监督集成策略，我们正在将范式从使用标记异常作为被动验证工具转变为使它们成为检测过程中的积极参与者。我们构建的元分类器模型学习不同检测器如何响应异常。这不仅提高了检测精度，更重要的是，为我们提供了一个结合多个算法优势的原则性方法，使异常检测系统更加稳健和可靠。
- en: If you’re thinking of implementing this strategy, the good news is that the
    **PyOD library** already provides this functionality. Let’s take a look at it
    next.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在考虑实施这种策略，好消息是**PyOD库**已经提供了这个功能。让我们接下来看看它。
- en: '* * *'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**4\. Case Study: Fraud Detection**'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 案例研究：欺诈检测**'
- en: In this section, let’s go through a concrete case study to see the supervised
    ensemble strategy in action. Here, we consider a method called **[XGBOD](https://arxiv.org/abs/1912.00290)**
    (Extreme Gradient Boosting Outlier Detection), which is implemented in the PyOD
    library.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，让我们通过一个具体的案例研究来观察监督集成策略的实际应用。在这里，我们考虑一种称为**[XGBOD](https://arxiv.org/abs/1912.00290)**（极端梯度提升异常检测）的方法，它在PyOD库中实现。
- en: For the case study, we consider a credit card fraud detection dataset (Database
    Contents License) from [Kaggle](https://www.kaggle.com/datasets/mlg-ulb/creditcardfraud).
    This dataset contains transactions made by credit cards in September 2013 by European
    cardholders. In total, there are 284,807 transactions, 492 of which are frauds.
    Note that due to confidentiality issues, the features presented in the dataset
    are not original, but are the result of a PCA transformation. Feature ‘Class’
    is the response variable. It takes the value 1 in case of fraud and 0 otherwise.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 对于案例研究，我们考虑了一个来自[Kaggle](https://www.kaggle.com/datasets/mlg-ulb/creditcardfraud)的信用卡欺诈检测数据集（数据库内容许可）。该数据集包含2013年9月欧洲持卡人通过信用卡进行的交易。总共有284,807笔交易，其中492笔是欺诈交易。请注意，由于保密问题，数据集中的特征不是原始的，而是PCA变换的结果。特征‘Class’是响应变量。欺诈时取值为1，否则为0。
- en: In this case study, we consider three learning paradigms, i.e., unsupervised
    learning, XGBOD, and fully supervised learning, for performing anomaly detection.
    We will vary the “**supervision ratio**” (percentage of anomalies that are available
    during training) for both XGBOD and the supervised learning approach to see the
    effect of leveraging labeled anomalies on the detection performance.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个案例研究中，我们考虑了三种学习范式，即无监督学习、XGBOD和完全监督学习，以执行异常检测。我们将改变XGBOD和监督学习方法中的“**监督比率**”（训练期间可用的异常百分比）来观察利用标记异常对检测性能的影响。
- en: '**4.1 Import Libraries**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.1 导入库**'
- en: 'For unsupervised anomaly detection, we consider 4 algorithms: Principal Component
    Analysis (PCA), Isolation Forest, Cluster-based Local Outlier Factor (CBLOF),
    and Histogram-based Outlier Detection (HBOS), which is an efficient detection
    method that assumes feature independence and calculates the degree of outlyingness
    by building histograms. All algorithms are implemented in the PyOD library.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 对于无监督异常检测，我们考虑了4种算法：主成分分析（PCA）、隔离森林、基于聚类的局部离群因子（CBLOF）和基于直方图的离群检测（HBOS），这是一种高效的检测方法，它假设特征独立性，并通过构建直方图来计算离群程度。所有算法都在PyOD库中实现。
- en: For the supervised learning approach, we use an XGBoost classifier.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 对于监督学习方法，我们使用XGBoost分类器。
- en: '[PRE0]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**4.2 Data Preparation**'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.2 数据准备**'
- en: Remember to download the dataset from [Kaggle](https://www.kaggle.com/datasets/mlg-ulb/creditcardfraud)
    and store it locally under the name “creditcard.csv”.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 记得从[Kaggle](https://www.kaggle.com/datasets/mlg-ulb/creditcardfraud)下载数据集，并将其本地存储为“creditcard.csv”。
- en: '[PRE1]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Here, we create a helper function to generate labeled data for XGBOD/XGBoost
    learning.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们创建一个辅助函数来生成XGBOD/XGBoost学习的标记数据。
- en: '[PRE2]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Note that this function mimics the realistic scenario where we have a few known
    anomalies (labeled as 1), while all other unlabeled samples are treated as normal
    (labeled as 0). This means our labels are effectively *noisy*, since some true
    fraud cases are hidden among the unlabeled data but still receive a label of 0.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这个函数模拟了一个现实场景，其中我们有一些已知的异常（标记为1），而所有其他未标记的样本都被视为正常（标记为0）。这意味着我们的标签实际上是*噪声的*，因为一些真正的欺诈案例隐藏在未标记的数据中，但仍然被标记为0。
- en: 'Before we start our analysis, let’s define a helper function for evaluating
    model performance:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始分析之前，让我们定义一个用于评估模型性能的辅助函数：
- en: '[PRE3]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: In PyOD framework, every trained model instance exposes a `decision_function()`
    method. By calling it on the inference samples, we can obtain the corresponding
    anomaly scores.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在PyOD框架中，每个训练好的模型实例都公开了一个`decision_function()`方法。通过在推理样本上调用它，我们可以获得相应的异常分数。
- en: For comparing performance, we use AUCPR, i.e., the area under the precision-recall
    curve. As we are dealing with a highly imbalanced dataset, AUCPR is generally
    preferred over AUC-ROC. Additionally, using AUCPR eliminates the need for an explicit
    threshold to measure model performance. This metric already incorporates model
    performance under various threshold conditions.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 为了比较性能，我们使用AUCPR，即精确-召回曲线下的面积。由于我们处理的是一个高度不平衡的数据集，因此通常更倾向于使用AUCPR而不是AUC-ROC。此外，使用AUCPR消除了测量模型性能时需要显式阈值的必要性。此指标已经包含了各种阈值条件下的模型性能。
- en: '**4.3 Unsupervised Anomaly Detection**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.3 无监督异常检测**'
- en: '[PRE4]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The results we obtained are as follows:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我们获得的结果如下：
- en: 'IsolationForest: – AUC-PR: 0.1497'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: IsolationForest：– AUC-PR：0.1497
- en: 'CBLOF: – AUC-PR: 0.1527'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: CBLOF：– AUC-PR：0.1527
- en: 'HBOS: – AUC-PR: 0.2488'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: HBOS：– AUC-PR：0.2488
- en: 'PCA: – AUC-PR: 0.1411'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: PCA：– AUC-PR：0.1411
- en: With zero hyperparameter tuning, none of the algorithms delivered very promising
    results, as their AUCPR values (~0.15–0.25) may fall short of the very high precision/recall
    often required in fraud-detection settings.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在没有超参数调整的情况下，没有任何算法提供了非常令人鼓舞的结果，因为它们的AUCPR值（约0.15-0.25）可能低于在欺诈检测环境中通常所需的高精度/召回率。
- en: However, we should note that, unlike AUC-ROC, which has a baseline value of
    0.5, the baseline AUCPR depends on the **prevalence of the positive class**. For
    our current dataset, since only 0.17% of the samples are fraud, a naive classifier
    that guesses randomly would have an AUCPR ≈ 0.0017\. In that sense, all detectors
    already outperform random guessing by a wide margin.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们应该注意，与AUC-ROC不同，AUC-ROC的基线值为0.5，而AUCPR的基线值取决于**正类出现的频率**。对于我们的当前数据集，由于只有0.17%的样本是欺诈，一个随机猜测的朴素分类器会有AUCPR
    ≈ 0.0017。从这个意义上讲，所有检测器都已经远远超过了随机猜测。
- en: '**4.4 XGBOD Approach**'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.4 XGBOD方法**'
- en: Now we move to the XGBOD approach, where we will leverage a few labeled anomalies
    to inform our anomaly detection.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们转向XGBOD方法，我们将利用少量标记异常来指导我们的异常检测。
- en: '[PRE5]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The obtained results are shown in the figure below, together with the performance
    of the best unsupervised detector (HBOS) as the reference.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 获得的结果显示在下图，同时展示了最佳无监督检测器（HBOS）的性能作为参考。
- en: '![](../Images/b2c13750ba3b7165c5f2d7774b0a43ec.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b2c13750ba3b7165c5f2d7774b0a43ec.png)'
- en: Figure 1\. XGBOD vs Supervision ratio (Image by author)
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. XGBOD与监督比例对比（图片由作者提供）
- en: We can see that with only 1% labeled anomalies, the XGBOD method already beats
    the best unsupervised detector, achieving an AUCPR score of 0.4\. With more labeled
    anomalies becoming available for training, XGBOD’s performance continues to improve.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，仅使用1%标记的异常，XGBOD方法就已经击败了最好的无监督检测器，实现了0.4的AUCPR分数。随着更多标记的异常变得可用于训练，XGBOD的性能持续提升。
- en: '**4.5 Supervised Learning**'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.5 监督学习**'
- en: Finally, we consider the scenario where we directly train a binary classifier
    on the dataset with the labeled anomalies.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们考虑了直接在带有标记异常的数据集上训练二元分类器的场景。
- en: '[PRE6]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'The results are shown in the figure below, together with the XGBOD’s performance
    obtained from the previous section:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 结果显示在下图，同时展示了上一节中获得的XGBOD性能：
- en: '![](../Images/7669e6934fbe3f64f558e2c8b37b331a.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7669e6934fbe3f64f558e2c8b37b331a.png)'
- en: Figure 2\. Performance comparison between the considered methods. (Image by
    author)
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. 考虑的方法之间的性能比较。（图片由作者提供）
- en: In general, we see that with only limited labeled data, the standard supervised
    classifier (XGBoost in this case) struggles to distinguish between normal and
    anomalous samples effectively. This is particularly evident when the supervision
    ratio is extremely low (i.e., 1%). While XGBoost’s performance improves as more
    labeled examples become available, we see that it remains consistently inferior
    to the XGBOD approach across the examined range of supervision ratios.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，我们发现，仅使用有限标记数据，标准的监督分类器（本例中为XGBoost）在有效区分正常样本和异常样本方面存在困难。这在监督比例极低（即1%）时尤为明显。虽然随着更多标记示例的可用，XGBoost的性能有所提升，但我们看到它在所检查的监督比例范围内始终劣于XGBOD方法。
- en: '* * *'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: '**5\. Conclusion**'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**5. 结论**'
- en: 'In this post, we discussed three practical strategies to leverage the few labeled
    anomalies to boost the performance of your anomaly detector:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们讨论了三种利用少量标记异常来提升异常检测器性能的实际策略：
- en: '**Threshold tuning**: Use labeled anomalies to turn threshold setting from
    guesswork into a data-driven optimization problem.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**阈值调整**：使用标记异常将阈值设置从猜测转变为数据驱动的优化问题。'
- en: '**Model selection**: Objectively compare different algorithms and hyperparameter
    settings to find what truly works well for your specific problems.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型选择**：客观比较不同的算法和超参数设置，以找到真正适用于您特定问题的解决方案。'
- en: '**Supervised ensembling**: Train a meta-model to systematically extract the
    anomaly signatures revealed by multiple unsupervised detectors.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监督集成学习**：训练一个元模型，系统地提取多个无监督检测器揭示的异常特征。'
- en: Furthermore, we went through a concrete case study on fraud detection and showed
    how the supervised ensembling method(XGBOD) dramatically outperformed both purely
    unsupervised models and standard supervised classifiers, especially when labeled
    data was scarce.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还通过一个具体的欺诈检测案例研究，展示了监督集成方法（XGBOD）如何显著优于纯无监督模型和标准监督分类器，尤其是在标记数据稀缺的情况下。
- en: 'The key takeaway: a few labels go a long way in anomaly detection. Time to
    put those labels to work.'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点：在异常检测中，几个标签就能走很长的路。是时候让这些标签发挥作用了。
