- en: A Focused Approach to Learning SQL
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 学习 SQL 的专注方法
- en: 原文：[https://towardsdatascience.com/a-focused-approach-to-learning-sql/](https://towardsdatascience.com/a-focused-approach-to-learning-sql/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/a-focused-approach-to-learning-sql/](https://towardsdatascience.com/a-focused-approach-to-learning-sql/)
- en: Data is everywhere, but how do you draw insights from it? Often, structured
    data is stored in *relational databases*, meaning collections of related tables
    of data. For instance, a company might store customer purchases in one table,
    customer demographics in another, and suppliers in a third table. These tables
    can then be joined together and queried. To interact with relational databases
    in this way, you’ll likely use the SQL language to retrieve data, join tables,
    and sort and filter the results.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 数据无处不在，但你如何从中提取洞察力？通常，结构化数据存储在 *关系数据库* 中，这意味着相关数据表的集合。例如，一家公司可能在一个表中存储客户购买信息，在另一个表中存储客户人口统计信息，在第三个表中存储供应商信息。然后，这些表可以合并在一起并查询。为了以这种方式与关系数据库交互，你可能会使用
    SQL 语言来检索数据、连接表以及排序和筛选结果。
- en: In this article, we look at what SQL is, which topics are best to focus on based
    on your chosen job role, and how to approach your learning path.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将探讨 SQL 是什么，根据你选择的职位角色，哪些主题是最佳关注点，以及如何规划你的学习路径。
- en: What is SQL?
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是 SQL？
- en: SQL stands for “Structured Query Language.” It is a popular computer language
    used to interact with relational databases.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: SQL 代表“结构化查询语言”。它是一种流行的计算机语言，用于与关系数据库交互。
- en: 'As an example of basic SQL usage, let’s suppose you keep a spreadsheet of how
    much you spend per month with a credit card. You might want to know in which months
    during the last year you spent at least $100\. A SQL query to answer this question
    might look like this:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 以基本 SQL 使用的例子来说，假设你保存了一个电子表格，记录了你每月使用信用卡的花费。你可能想知道在过去一年中，你在哪些月份的花费至少达到了 100
    美元。一个用于回答这个问题的 SQL 查询可能看起来像这样：
- en: '[PRE0]'
  id: totrans-7
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'The code sounds almost like an English sentence: “Select the months from the
    credit card table where the expense is at least 100 and the date is after January
    1, 2025.”'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码听起来几乎就像一个英文句子：“从信用卡表中选择那些花费至少 100 美元且日期在 2025 年 1 月 1 日之后的月份。”
- en: Why should you learn SQL?
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你应该学习 SQL？
- en: SQL is ubiquitous. As [this article](https://datacamp.pxf.io/je0yBM) points
    out, SQL is used across industries (marketing, finance, healthcare, and so on)
    and job functions (business analytics, data science, web development). Understanding
    data at a deep level is a required skill for many high-paying data jobs, including
    data analyst, data scientist, and data engineer roles. In the data world, SQL
    is a common tool to retrieve data, modify it, and make queries.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: SQL 是无处不在的。正如 [这篇文章](https://datacamp.pxf.io/je0yBM) 所指出，SQL 被广泛应用于各个行业（如市场营销、金融、医疗保健等）和职位（如商业分析、数据科学、网站开发）。在数据领域，深入理解数据是一个许多高薪数据职位（包括数据分析师、数据科学家和数据工程师角色）所必需的技能。在数据世界中，SQL
    是一个常用的工具，用于检索数据、修改数据以及进行查询。
- en: AI Tools and Learning SQL
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AI 工具和学习 SQL
- en: 'This brings up questions: In the age of vibe coding and Copilot, why bother
    learning SQL? Won’t SQL skills become obsolete in the near future? There are many
    counter-arguments to this point of view.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这引发了一些问题：在 vibe coding 和 Copilot 时代，为什么还要学习 SQL？SQL 技能不会在不久的将来变得过时吗？对此观点有许多反驳意见。
- en: First, SQL is fundamental to our way of understanding, evaluating, and debugging
    existing queries. Even if someone/something else writes a particular piece of
    code, you need to know SQL to understand how a query works. It’s difficult to
    see how someone can evaluate existing code without understanding its underlying
    language.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，SQL 是我们理解、评估和调试现有查询的基础。即使有人或某物编写了特定的代码，你也需要了解 SQL 才能理解查询是如何工作的。很难想象一个人在没有理解其底层语言的情况下评估现有代码。
- en: Second, how do you judge if the LLM- generated code is giving you legitimate
    answers or not? If its answers are incorrect, would the query be correct with
    simple modifications, or is the generated query nonsense?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，你如何判断 LLM 生成的代码是否给出了合法的答案？如果其答案是错误的，那么通过简单的修改查询是否就会正确，或者生成的查询是否是无意义的？
- en: Third, there is a huge amount of legacy code in existence that needs to be maintained.
    It seems unlikely that it will all get replaced with LLM-generated content.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，现存有大量的遗留代码需要维护。似乎不太可能所有这些代码都会被 LLM 生成的内容所取代。
- en: Do Data Jobs Really Use SQL?
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据工作真的使用 SQL 吗？
- en: Are SQL skills useful for existing data jobs? Yes, many jobs require SQL skills,
    usually in conjunction with other skill sets.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: SQL 技能对现有的数据工作有用吗？是的，许多工作需要 SQL 技能，通常与其他技能集结合使用。
- en: For instance, a data scientist might pull a subset of data from a database using
    SQL, then clean the data using Python, then use that data for predictive modeling
    using Python and an ML library, such as scikit-learn or XGBoost. Often, the insights
    needed from the data can be found by filtering and subsetting the data, which
    can all be accomplished using only SQL.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，数据科学家可能会使用SQL从数据库中提取数据子集，然后使用Python清理数据，接着使用Python和机器学习库（如scikit-learn或XGBoost）进行预测建模。通常，从数据中获取的见解可以通过过滤和子集化数据来实现，所有这些都可以仅使用SQL完成。
- en: A data engineer might use SQL for ETL (extract, load, transform). This involves
    retrieving data from sources, transforming it into a suitable format for downstream
    analysis,and loading transformed data into a data warehouse. A job such as this
    is typically quite heavy on SQL.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 数据工程师可能会使用SQL进行ETL（提取、加载、转换）。这涉及到从源中检索数据，将其转换为适合下游分析的格式，并将转换后的数据加载到数据仓库中。这类工作通常对SQL的要求很高。
- en: Job Listings
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 招聘信息
- en: Let’s take a look at some LinkedIn job listings that require SQL data skills.
    Here’s a page of some positions that appeared when I searched for “SQL Data Engineer”
    (September 2025).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看一些LinkedIn上的招聘信息，这些信息要求具备SQL数据处理技能。以下是我搜索“SQL数据工程师”时出现的一些职位页面（2025年9月）。
- en: '![](../Images/491ea7166252d2b6518bb9d281f9846a.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/491ea7166252d2b6518bb9d281f9846a.png)'
- en: Screenshot by author
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: Salary ranges for this search varied quite a bit. For instance, in the listing
    for a Data Engineer (L5) at Netflix, the base pay range is $170,000/yr to $720,000/yr
    whereas an ad for a Junior Data Engineer at another company listed a base pay
    range of $64,000/yr to $70,000/yr. So what sort of salary is realistic? As of
    this writing, according to [datanerd.tech](http://datanerd.tech), of the nearly
    170 thousand relevant jobs analyzed, the average yearly pay for a job that involves
    SQL is $130,000 per year.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这次搜索，薪资范围差异很大。例如，Netflix上数据工程师（L5）职位的起薪范围是每年170,000美元到720,000美元，而另一家公司发布的初级数据工程师广告中，起薪范围是每年64,000美元到70,000美元。那么，什么样的薪资是现实的呢？截至本文撰写时，根据[datanerd.tech](http://datanerd.tech)的分析，近17万个相关职位中，涉及SQL工作的平均年薪为每年130,000美元。
- en: '![](../Images/a243a4a8632c6ae46972a7ec0051bac6.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a243a4a8632c6ae46972a7ec0051bac6.png)'
- en: Screenshot by author
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: Note that skills don’t live in isolation. Many roles require a collection of
    skills. So for instance, a data scientist job might require SQL and Python or
    R expertise. A data engineering job might ask for skills in addition to SQL, such
    as building data pipelines, or cloud technologies, such as MS Azure.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，技能并非孤立存在。许多职位都需要一系列技能。例如，数据科学家的工作可能需要SQL和Python或R的专业知识。数据工程师的工作可能除了SQL之外，还要求具备构建数据管道或云技术（如MS
    Azure）的技能。
- en: '[![DataCamp](../Images/1be29527c0daf6236120a93b8be35d2d.png)](https://www.datacamp.com/)
    DataCamp helps individuals and teams grow their data and AI skills through hands-on
    learning. With interactive courses, real-world projects, and industry-recognized
    certifications in Python, SQL, Power BI, ChatGPT and more, DataCamp makes it easy
    to learn data skills at your own pace.[Learn More](https://www.datacamp.com/)'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '![DataCamp](../Images/1be29527c0daf6236120a93b8be35d2d.png)[DataCamp](https://www.datacamp.com/)通过实践学习帮助个人和团队提升数据和分析技能。通过互动课程、真实世界项目和行业认可的Python、SQL、Power
    BI、ChatGPT等认证，DataCamp使你能够根据自己的节奏学习数据技能。[了解更多](https://www.datacamp.com/)'
- en: How to learn SQL
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何学习SQL
- en: So, let’s suppose you’ve decided that learning SQL is a good idea. How should
    you go about learning SQL? First, before diving in, get organized. Choose an environment,
    learn the basics, make a toy project, then choose an appropriate learning path
    based on your interests and professional needs to continue your SQL journey.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，假设你已经决定学习SQL是个好主意。你应该如何学习SQL呢？首先，在深入之前，做好规划。选择一个环境，学习基础知识，做一个玩具项目，然后根据你的兴趣和职业需求选择一个合适的学习路径，继续你的SQL之旅。
- en: Choose an environment
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选择一个环境
- en: There are many *Database Management Systems* (DBMS) available. A [DBMS](https://en.wikipedia.org/wiki/Database)
    is the software you use to interact with a database. Three popular open source
    DBMSs are [PostgreSQL](https://www.postgresql.org/), [MySQL](https://www.mysql.com/),
    and [SQLite](https://sqlite.org/). The SQL syntax might vary slightly between
    the systems, but all three are suitable for learning SQL. The knowledge you learn
    in one DBMS is directly applicable to others, and minor syntax differences are
    easily resolved by checking the documentation. Another option is to use a DBMS
    in a cloud service such as Amazon AWS or MS Azure.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多可用的 *数据库管理系统*（DBMS）。DBMS 是您用于与数据库交互的软件。[DBMS](https://en.wikipedia.org/wiki/Database)
    是您使用的软件。三个流行的开源 DBMS 是 [PostgreSQL](https://www.postgresql.org/)、[MySQL](https://www.mysql.com/)
    和 [SQLite](https://sqlite.org/)。SQL 语法在这三个系统之间可能略有不同，但它们都适合学习 SQL。您在一个 DBMS 中学到的知识可以直接应用于其他系统，并且可以通过检查文档轻松解决微小的语法差异。另一种选择是使用亚马逊
    AWS 或 MS Azure 等云服务中的 DBMS。
- en: Learn the basics
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 学习基础知识
- en: A common mistake is to try to memorize the syntax of SQL. This approach is not
    a good use of your time, as you’ll end up trying to memorize an encyclopedia’s
    worth of information. Instead, there are many resources from which you can look
    up syntax when you need it. Over time, you’ll remember common syntax from use
    and practice.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常见的错误是试图记住 SQL 的语法。这种方法并不是很好地利用您的时间，因为您最终会试图记住一本百科全书那么多的信息。相反，有许多资源，您可以在需要时查找语法。随着时间的推移，您将通过使用和实践记住常见的语法。
- en: First, look at the syntax and structure of relational databases.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，了解关系型数据库的语法和结构。
- en: What are SELECT statements?
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SELECT 语句是什么？
- en: How do you filter data with WHERE clauses?
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您如何使用 WHERE 子句过滤数据？
- en: What are CRUD operations (create, read, update, delete)? How do you use them?
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CRUD 操作（创建、读取、更新、删除）是什么？您如何使用它们？
- en: It’s best to learn by interacting with the data, not just passively reading
    books or watching endless streams of YouTube videos. DataCamp offers many interactive
    courses, including one on [SQL fundamentals](https://datacamp.pxf.io/APe35K).
    They also offer a [SQL Associate Certification](https://datacamp.pxf.io/19BaW9).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 最好是通过对数据进行交互式学习，而不仅仅是被动地阅读书籍或观看无穷无尽的 YouTube 视频来学习。DataCamp 提供了许多交互式课程，包括一门关于
    [SQL 基础](https://datacamp.pxf.io/APe35K) 的课程。他们还提供 [SQL 联合认证](https://datacamp.pxf.io/19BaW9)。
- en: Learn SQL in context, not syntax
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在上下文中学习 SQL，而不仅仅是语法
- en: Once you’re comfortable retrieving data fields using SELECT, and filtering the
    data with WHERE clauses, you’re ready to experiment with a toy project.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您熟悉使用 SELECT 查询数据字段和使用 WHERE 子句过滤数据，您就可以开始尝试一个玩具项目了。
- en: One useful and manageable project is to analyze your personal finances. First,
    get the data. You might already have your finances in a spreadsheet. If not, use
    a spreadsheet to create the data. Make a small (twenty or thirty rows) dataset
    of your finances. Columns might include the amount spent, the card or bank account
    you used, the type of purchase (e.g., utilities, bills, entertainment, transportation,
    food), date.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一个有用且可管理的项目是分析您的个人财务。首先，获取数据。您可能已经将您的财务信息保存在电子表格中。如果没有，请使用电子表格创建数据。制作一个小的（二十或三十行）财务数据集。列可能包括花费的金额、使用的卡或银行账户、购买类型（例如，公用事业、账单、娱乐、交通、食品）、日期。
- en: '![](../Images/ebd3e5c890e4229a28f9b340121b4006.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ebd3e5c890e4229a28f9b340121b4006.png)'
- en: Screenshot by author
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: Save this data (or your own) as a .csv file. Now, import this .csv into your
    DBMS as a table called `credit_card`. The details vary from one DBMS to another,
    but each has a mechanism to import .csv files into tables. For instance, if you’re
    working in SQL Server, the instructions are [here](https://www.sqlshack.com/importing-and-working-with-csv-files-in-sql-server/).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 将此数据（或您自己的数据）保存为 .csv 文件。现在，将此 .csv 文件导入您的数据库管理系统（DBMS）中，创建一个名为 `credit_card`
    的表。具体操作因 DBMS 而异，但每种系统都有将 .csv 文件导入表中的机制。例如，如果您在使用 SQL Server，操作说明[在这里](https://www.sqlshack.com/importing-and-working-with-csv-files-in-sql-server/)。
- en: Once you’ve saved the data, use SQL to query the data using SELECT and WHERE
    clauses. How much have you spent after January? You could write a query similar
    to the following.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 保存数据后，使用 SQL 通过 SELECT 和 WHERE 子句查询数据。1月之后您花了多少钱？您可以编写一个类似于以下查询的查询。
- en: '[PRE1]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now, create new queries. How much do you spend on food per month on average? 
    How much for dining out? In a dataset this small, you could figure this out without
    using a database, but the point here is to learn how to use the technology. After
    you’ve asked these questions, you can expand the dataset and write more queries.
    What other questions could you answer? Spend a week or two on this project.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，创建新的查询。你每个月平均在食物上花多少钱？外出就餐花了多少钱？在如此小的数据集中，你可以不使用数据库就能找出这些信息，但这里的重点是学习如何使用这项技术。在你提出这些问题后，你可以扩展数据集并编写更多查询。你还能回答哪些问题？在这个项目上花上一周或两周的时间。
- en: Learning Paths
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学习路径
- en: The breadth and depth of SQL you initially need to focus on depends on your
    interests and professional goals. [This video](https://www.youtube.com/watch?v=ITwW825L4zg)
    suggests three sample paths (beginner, intermediate, advanced). Let’s look at
    these paths and then map them to common data roles.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你最初需要关注的SQL的广度和深度取决于你的兴趣和职业目标。[这个视频](https://www.youtube.com/watch?v=ITwW825L4zg)建议了三个样本路径（初学者、中级、高级）。让我们来看看这些路径，并将它们映射到常见的数据角色。
- en: 'The **beginner** path consists of learning these SQL skills:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**初学者**路径包括学习以下SQL技能：'
- en: How to use the SELECT statement to retrieve fields from a database
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用SELECT语句从数据库中检索字段
- en: How to use a WHERE clause to filter data
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用WHERE子句过滤数据
- en: How to sort data using the ORDER BY clause
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用ORDER BY子句排序数据
- en: How to combine tables using JOIN statements
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用JOIN语句组合表
- en: How to aggregate data using SUM, COUNT, AVG, GROUP BY, and the like
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用SUM、COUNT、AVG、GROUP BY等聚合数据
- en: How to create nested queries (“subqueries”)
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何创建嵌套查询（“子查询”）
- en: The **intermediate** path adds these skills to the beginning path.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**中级**路径在基础路径上增加了以下技能。'
- en: How to use Common Table Expressions (CTE) to create temporary results used by
    a larger query
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用公用表表达式（CTE）创建由更大查询使用的临时结果
- en: How to optimize queries using indexing strategies
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用索引策略优化查询
- en: How to automate database tasks with stored procedures and triggers
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用存储过程和触发器自动化数据库任务
- en: How to design better databases via techniques such as normalization, denormalization,
    and schema design
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何通过规范化、反规范化和技术设计等技巧设计更好的数据库
- en: How to use window functions for advanced aggregation
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用窗口函数进行高级聚合
- en: To be an **advanced** SQL user, also learn the following skills.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 要成为**高级**SQL用户，还需要学习以下技能。
- en: How to prevent SQL injection attacks
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何防止SQL注入攻击
- en: How to use advanced joins in complex queries
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何在复杂查询中使用高级连接
- en: How to optimize queries for big data
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何优化大数据查询
- en: How to pivot data from a row-based format (commonly used by relational databases)
    to a column-based format (commonly used by “NoSQL” databases such as MongoDB)
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何将基于行的格式（通常由关系型数据库使用）的数据转换为基于列的格式（通常由“NoSQL”数据库，如MongoDB使用）
- en: Which path is appropriate based on your professional interests?
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您的专业兴趣，哪条路径是合适的？
- en: '**Beginner**: If you have no experience with SQL, start at the beginning. This
    path is appropriate for novices wanting to dip their toe into the data world,
    or for people who are curious about data but don’t need to delve too deeply into
    the mechanics, such as project managers who want to run simple queries for themselves.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初学者**：如果你没有SQL经验，从基础开始。这条路径适合想要涉足数据世界的新手，或者对数据好奇但不需要深入了解机制的人，例如想要为自己运行简单查询的项目经理。'
- en: '**Intermediate**: If you already use some SQL but need to advance your knowledge,
    perhaps for a promotion or a career change, this might be an appropriate path.
    Junior to mid-level data analysts and data scientists need to understand data
    at this level. You’ll probably want to take at least two or three weeks per topic.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**中级**：如果你已经使用了一些SQL但需要提高你的知识，可能为了晋升或职业转变，这可能是一条合适的路径。初级到中级数据分析师和数据科学家需要在这个层面上理解数据。你可能需要为每个主题花费至少两到三周的时间。'
- en: '**Advanced**: Those who need a deep knowledge of data infrastructure, such
    as data engineers, need to understand SQL at a deep level, so this is an appropriate
    track for them.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级**：那些需要深入了解数据基础设施的人，例如数据工程师，需要深入理解SQL，因此这条路径对他们来说很合适。'
- en: Closing Thoughts
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: Although SQL can be a large, sprawling language with many corners and nuances,
    at its heart, it is a comparatively easy to learn computer language, based on
    simple English statements.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然SQL可能是一个庞大、分散的语言，有许多角落和细微差别，但它的核心是一个相对容易学习的计算机语言，基于简单的英语语句。
- en: Good luck on your SQL learning journey! One way to get started learning SQL
    is through DataCamp’s [SQL Fundamentals](https://datacamp.pxf.io/APe35K) course.
    It’s an interesting, powerful language to know.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 祝你在学习 SQL 的旅程中一切顺利！开始学习 SQL 的一种方式是通过 DataCamp 的 [SQL 基础](https://datacamp.pxf.io/APe35K)
    课程。这是一门有趣且强大的语言，值得了解。
