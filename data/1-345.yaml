- en: Crafting a Custom Voice Assistant with Perplexity
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Perplexity打造定制语音助手
- en: 原文：[https://towardsdatascience.com/crafting-a-custom-voice-assistant-with-perplexity/](https://towardsdatascience.com/crafting-a-custom-voice-assistant-with-perplexity/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/crafting-a-custom-voice-assistant-with-perplexity/](https://towardsdatascience.com/crafting-a-custom-voice-assistant-with-perplexity/)
- en: <mdspan datatext="el1756487214005" class="mdspan-comment">Google Assistant</mdspan>,
    Alexa, and Siri are the dominating voice assistants available for everyday use.
    These assistants have become ubiquitous in almost every home, carrying out tasks
    from home automation, note taking, recipe guidance and answering simple questions.
    When it comes to answering questions though, in the age of LLMs, getting a concise
    and context-based answer from these voice assistants can be tricky, if not non-existent.
    For example, if you ask Google Assistant how the market is reacting to [Jerome
    Powell’s speech](https://www.federalreserve.gov/newsevents/speech/files/powell20250822.pdf) in
    Jackson Hole on Aug 22, it will simply reply that it does not know the answer
    and give a few links that you can peruse. That is if you have the screen-based
    Google Assistant.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756487214005" class="mdspan-comment">谷歌助手</mdspan>、Alexa和Siri是日常使用中占主导地位的语音助手。这些助手几乎在每家每户都变得无处不在，执行着从智能家居、记笔记、食谱指导和回答简单问题等任务。然而，当涉及到回答问题时，在LLM的时代，从这些语音助手那里获得简洁且基于上下文的答案可能会很棘手，甚至可能不存在。例如，如果你问谷歌助手在8月22日杰克逊霍尔关于[杰罗姆·鲍威尔的演讲](https://www.federalreserve.gov/newsevents/speech/files/powell20250822.pdf)市场是如何反应的，它将简单地回答它不知道答案，并给出一些你可以浏览的链接。这是如果你有基于屏幕的谷歌助手的话。
- en: Often you just want a quick answer on current events, or you want to know if
    an Apple tree would survive the winter in Ohio, and often voice assistants like
    Google and Siri fall short of providing a satisfying answer. This got me interested
    in building my own voice assistant, one that would give me a simple, single sentence
    answer based on its search of the web.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你经常只是想要关于当前事件的快速答案，或者你想要知道苹果树在俄亥俄州是否能度过冬天，而像谷歌和Siri这样的语音助手往往无法提供令人满意的答案。这让我对构建自己的语音助手产生了兴趣，一个基于其网络搜索给出简单、单一句子答案的助手。
- en: '![](../Images/d23008e419e4cbbb1b10e8fb226ffa39.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d23008e419e4cbbb1b10e8fb226ffa39.png)'
- en: Photo by [Aerps.com](https://unsplash.com/@almoya?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Aerps.com](https://unsplash.com/@almoya?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)提供
- en: 'Of the various LLM powered search engines available, I have been an avid user
    of Perplexity for more than a year now and I use it exclusively for all my searches
    except for simple ones where I still go back to Google or Bing. Perplexity, in
    addition to its live web index, which enables it to provide up-to-date, accurate,
    sourced answers, allows users access to its functionality through a powerful API.
    Using this functionality and integrating it with a simple Raspberry Pi, I intended
    to create a voice assistant that would:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在众多由大型语言模型（LLM）驱动的搜索引擎中，我已经热情地使用了Perplexity超过一年，并且除了简单的搜索之外，我所有的搜索都使用它，而简单的搜索我仍然会回到Google或Bing。除了其实时网络索引，这使得它能够提供最新、准确、有来源的答案之外，Perplexity还允许用户通过强大的API访问其功能。利用这一功能并将其与简单的树莓派集成，我打算创建一个语音助手，它将：
- en: Answer to a wake word and be ready to answer my question
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应唤醒词并准备好回答我的问题
- en: Answer my question in a simple, concise sentence
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用简单、简洁的句子回答我的问题
- en: Go back to passive listening without selling my data or giving my unnecessary
    ads
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回到被动监听，而不出售我的数据或给我不必要的广告
- en: The Hardware for the Assistant
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语音助手的硬件
- en: '![](../Images/87d85d326f04fd16567af47d3fdcd295.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/87d85d326f04fd16567af47d3fdcd295.png)'
- en: Photo by [Axel Richter](https://unsplash.com/@trisolarian?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Axel Richter](https://unsplash.com/@trisolarian?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)提供
- en: To build our voice assistant, a few key hardware components are required. The
    core of the project is a [**Raspberry Pi 5**](https://www.raspberrypi.com/products/raspberry-pi-5/),
    which serves as the central processor for our application. For the assistant’s
    audio input, I chose a simple [**USB gooseneck microphone**](https://www.amazon.com/dp/B01MQ2AA0X?ref_=ppx_hzsearch_conn_dt_b_fed_asin_title_5).
    This type of microphone is omnidirectional, making it effective at hearing the
    wake word from different parts of a room, and its plug-and-play nature simplifies
    the setup. For the assistant’s output, a compact [**USB-powered speaker**](https://www.amazon.com/dp/B075M7FHM1?ref_=ppx_hzsearch_conn_dt_b_fed_asin_title_2&th=1) provides
    the audio output. A key advantage of this speaker is that it uses a single USB
    cable for both its power and audio signal, which minimizes cable clutter.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建我们的语音助手，需要一些关键的硬件组件。项目的核心是一个[**Raspberry Pi 5**](https://www.raspberrypi.com/products/raspberry-pi-5/)，它作为我们应用程序的中心处理器。对于助手的音频输入，我选择了一个简单的[**USB鹅颈麦克风**](https://www.amazon.com/dp/B01MQ2AA0X?ref_=ppx_hzsearch_conn_dt_b_fed_asin_title_5)。这种麦克风是全向的，使其能够从房间的不同部分听到唤醒词，并且其即插即用的特性简化了设置。对于助手的输出，一个紧凑的[**USB供电扬声器**](https://www.amazon.com/dp/B075M7FHM1?ref_=ppx_hzsearch_conn_dt_b_fed_asin_title_2&th=1)提供了音频输出。这种扬声器的关键优势是它使用一根USB线为电源和音频信号供电，这最大限度地减少了线缆杂乱。
- en: '![](../Images/5768408e4121a1bee907ccbc94f9eb90.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![自定义语音助手的块图功能](../Images/5768408e4121a1bee907ccbc94f9eb90.png)'
- en: Block diagram showing the functionality of the custom voice assistant (image
    by author)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 展示自定义语音助手功能性的块图（图片由作者提供）
- en: This approach of using readily available USB peripherals makes the hardware
    assembly straightforward, allowing us to focus our efforts on the software.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 使用现成的USB外设的方法使得硬件组装变得简单，使我们能够专注于软件。
- en: Getting the environment ready
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准备环境
- en: In order to query Perplexity using custom queries and in order to have a wake
    word for the voice assistant, we need to generate a couple of API keys. In order
    to generate a Perplexity API key one can sign up for a Perplexity account, go
    to the Settings menu, select the API tab, and click “Generate API Key” to create
    and copy their personal key for use in applications. Access to API key generation
    usually requires a paid plan or payment method, so ensure the account is eligible
    before proceeding.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用自定义查询查询Perplexity，并且为了给语音助手一个唤醒词，我们需要生成几个API密钥。为了生成Perplexity API密钥，可以注册Perplexity账户，进入设置菜单，选择API选项卡，然后点击“生成API密钥”以创建并复制个人密钥用于应用程序。通常，访问API密钥生成需要付费计划或支付方式，因此在继续之前请确保账户符合条件。
- en: Platforms that offer wake word customization include PicoVoice Porcupine, Sensory
    TrulyHandsfree, and Snowboy, with PicoVoice Porcupine providing an easy online
    console for generating, testing, and deploying custom wake words across desktop,
    mobile, and embedded devices. A new user can generate a custom word for [PicoVoice
    Porcupine](https://picovoice.ai/platform/porcupine/) by signing up for a free
    Picovoice Console account, navigating to the Porcupine page, selecting the desired
    language, typing in the custom wake word, and clicking “Train” to produce and
    download the platform-specific model file (.ppn) for use. Make sure to test the
    wake word for performance before finalizing, as this ensures reliable detection
    and minimal false positives. The wake word I have trained and will use is “Hey
    Krishna”.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 提供唤醒词定制的平台包括PicoVoice Porcupine、Sensory TrulyHandsfree和Snowboy，其中PicoVoice Porcupine提供了一个简单的在线控制台，用于在桌面、移动和嵌入式设备上生成、测试和部署定制的唤醒词。新用户可以通过注册免费的Picovoice控制台账户，导航到Porcupine页面，选择所需的语言，输入定制的唤醒词，然后点击“训练”来生成并下载特定平台的模型文件（.ppn）以供使用。在最终确定之前，务必测试唤醒词的性能，因为这确保了可靠的检测和最小化误报。我将训练并使用的唤醒词是“Hey
    Krishna”。
- en: Coding the Assistant
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编写助手代码
- en: The complete Python script for this project is available on my GitHub [repository](https://github.com/dpakapd/perplexity_assistant).
    In this section, let’s look at the key components of the code to understand how
    the assistant functions.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 该项目的完整Python脚本可在我的GitHub[仓库](https://github.com/dpakapd/perplexity_assistant)上找到。在本节中，让我们看看代码的关键组件，以了解助手是如何工作的。
- en: The script is organized into a few core functions that handle the assistant’s
    senses and intelligence, all managed by a central loop.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本被组织成几个核心函数，这些函数处理助手的感官和智能，所有这些都由一个中央循环管理。
- en: Configuration and Initialization
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置和初始化
- en: The first part of the script is dedicated to setup. It handles loading the necessary
    API keys, model files, and initializing the clients for the services we’ll use.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本的前一部分是设置部分。它处理加载必要的API密钥、模型文件，并初始化我们将使用的服务的客户端。
- en: '[PRE0]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This section uses the `dotenv` library to securely load your secret API keys
    from a `.env` file, which is a best practice that keeps them out of your source
    code. It also defines key variables like the path to your custom wake word file
    and the specific Perplexity model we want to query.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 此部分使用`dotenv`库安全地从`.env`文件加载您的秘密API密钥，这是一种最佳实践，可以将它们从源代码中排除。它还定义了关键变量，如自定义唤醒词文件的路径和我们要查询的特定Perplexity模型。
- en: Wake Word Detection
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 唤醒词检测
- en: For the assistant to be truly hands-free, it needs to listen continuously for
    a specific wake word without using significant system resources. This is handled
    by the `while True:` loop in the `main` function, which uses the PicoVoice Porcupine
    engine.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使助手真正实现免提操作，它需要在不使用大量系统资源的情况下持续监听特定的唤醒词。这由`main`函数中的`while True:`循环处理，该循环使用PicoVoice
    Porcupine引擎。
- en: '[PRE1]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This loop is the heart of the assistant’s “passive listening” state. It continuously
    reads small, raw audio frames from the microphone stream. Each frame is then passed
    to the `porcupine.process()` function. This is a highly efficient, **offline** process
    that analyzes the audio for the specific acoustic pattern of your custom wake
    word (“Krishna”). If the pattern is detected, `porcupine.process()` returns a
    non-negative number, and the script proceeds to the active phase of listening
    for a full command.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这个循环是助手“被动监听”状态的核心。它持续从麦克风流中读取小的原始音频帧。然后，每个帧都会传递给`porcupine.process()`函数。这是一个高度高效的、**离线**过程，用于分析音频以检测您自定义唤醒词（“Krishna”）的特定声学模式。如果检测到模式，`porcupine.process()`返回一个非负数，脚本随后进入监听完整命令的活跃阶段。
- en: Speech-to-Text — Converting user questions to text
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 语音转文本 — 将用户问题转换为文本
- en: After the wake word is detected, the assistant needs to listen for and understand
    the user’s question. This is handled by the Speech-to-Text (STT) component.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在检测到唤醒词之后，助手需要监听并理解用户的问题。这一过程由语音转文本（STT）组件处理。
- en: '[PRE2]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Once the wake word is detected, the code actively records audio from the microphone
    for approximately 10 seconds, capturing the user’s spoken command. It then packages
    this raw audio data and sends it to Google’s speech recognition service using
    the `speech_recognition` library. The service processes the audio and returns
    the transcribed text, which is then stored in the `command` variable.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦检测到唤醒词，代码会主动从麦克风记录大约10秒的音频，捕捉用户的语音命令。然后，它将原始音频数据打包，并使用`speech_recognition`库将其发送到谷歌的语音识别服务。该服务处理音频并返回转录的文本，然后存储在`command`变量中。
- en: Getting Answers from Perplexity
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从Perplexity获取答案
- en: Once the user’s command has been converted to text, it is sent to the Perplexity
    API to get an intelligent, up-to-date answer.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦用户的命令被转换为文本，它就会被发送到Perplexity API以获取智能且最新的答案。
- en: '[PRE3]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This code block is the “brain” of the operation. It first constructs a `messages` list,
    which includes a critical **system prompt**. This prompt gives the AI its personality
    and rules, such as answering in a single sentence and being aware of its location
    in Ohio. The user’s command is then added to this list, and the entire package
    is sent to the Perplexity API. The script then extracts the text from the AI’s
    response and passes it to the `speak_text` function to be read aloud.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码块是操作的“大脑”。它首先构建一个`messages`列表，其中包含一个关键的**系统提示**。这个提示为AI提供了个性和规则，例如以单句回答并意识到其位于俄亥俄州的位置。然后，用户的命令被添加到这个列表中，整个包被发送到Perplexity
    API。脚本随后从AI的响应中提取文本，并将其传递给`speak_text`函数以大声朗读。
- en: Text-to-Speech — Converting Perplexity response to Voice
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文本转语音 — 将困惑度响应转换为语音
- en: The `speak_text` function is what gives the assistant its voice.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '`speak_text`函数赋予了助手声音。'
- en: '[PRE4]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: This function takes a text string, prints it for reference, then uses the gTTS
    (Google Text-to-Speech) library to generate a temporary MP3 audio file. It plays
    the file through the system’s speakers using the pygame library, waits until playback
    is finished, and then deletes the file. Error handling is included to catch issues
    during the process.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数接收一个文本字符串，将其打印出来以供参考，然后使用gTTS（Google Text-to-Speech）库生成一个临时的MP3音频文件。它通过pygame库使用系统的扬声器播放文件，等待播放完成，然后删除该文件。过程中包含错误处理，以捕获可能出现的任何问题。
- en: Testing the assistant
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试助手
- en: Below is a demonstration of the functioning of the custom voice assistant. To
    compare its performance with Google Assistant, I have asked the same question
    from Google as well as from the custom assistant.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是定制语音助手功能的演示。为了比较其性能与谷歌助手的性能，我也向谷歌助手和定制助手提出了相同的问题。
- en: As you can see, Google provides links to the answer rather than providing a
    brief summary of what the user wants. The custom assistant goes further and provides
    a summary and is more helpful and informational.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，谷歌提供的是指向答案的链接，而不是提供用户想要的简要总结。定制助手更进一步，提供总结，并且更加有帮助和信息丰富。
- en: Conclusion
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we looked at the process of building a fully functional, hands-free
    voice assistant on a Raspberry Pi. By combining the power of a custom wake word
    and the Perplexity API by using Python, we created a simple voice assistant device
    that helps in getting information quickly.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了在Raspberry Pi上构建一个完全功能性的、免提语音助手的流程。通过结合自定义唤醒词和Python的Perplexity
    API，我们创建了一个简单的语音助手设备，它有助于快速获取信息。
- en: The key advantage of this LLM-based approach is its ability to deliver direct,
    synthesized answers to complex and current questions — a task where assistants
    like Google Assistant often fall short by simply providing a list of search links.
    Instead of acting as a mere voice interface for a search engine, our assistant
    functions as a true answer engine, parsing real-time web results to give a single,
    concise response. The future of voice assistants lies in this deeper, more intelligent
    integration, and building your own is the best way to explore it.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这种基于LLM（大型语言模型）的方法的关键优势在于其能够直接、综合地回答复杂和当前的问题——这是一个谷歌助手等助手通常只是提供一系列搜索链接而无法胜任的任务。我们的助手不仅仅是一个搜索引擎的语音界面，它作为一个真正的答案引擎，解析实时网络结果，给出单一、简洁的回应。语音助手的未来在于这种更深、更智能的集成，而自己构建则是探索这一领域的最佳方式。
