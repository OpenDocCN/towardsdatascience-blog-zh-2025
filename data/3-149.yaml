  zh: 注意：您可能会注意到，我在系统提示中添加了一句话，即“如果您需要使用brave_tool，您必须使用计数为5。”这是由于我在brave服务器`index.ts`文件中发现的错误而采取的临时解决方案。我将向仓库贡献以修复它。
