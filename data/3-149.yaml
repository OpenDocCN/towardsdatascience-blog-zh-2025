- en: A Clear Intro to MCP (Model Context Protocol) with Code Examples
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 带有代码示例的MCP（模型上下文协议）清晰介绍
- en: 原文：[https://towardsdatascience.com/clear-intro-to-mcp/](https://towardsdatascience.com/clear-intro-to-mcp/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/clear-intro-to-mcp/](https://towardsdatascience.com/clear-intro-to-mcp/)
- en: <mdspan datatext="el1742887159309" class="mdspan-comment">As the race</mdspan>
    to move AI agents from prototype to production heats up, the need for a standardized
    way for agents to call tools across different providers is pressing. This transition
    to a standardized approach to agent tool calling is similar to what we saw with
    REST APIs. Before they existed, developers had to deal with a mess of proprietary
    protocols just to pull data from different services. REST brought order to chaos,
    enabling systems to talk to each other in a consistent way. MCP (Model Context
    Protocol) is aiming to, as it sounds, provide context for AI models in a standard
    way. Without it, we’re headed towards tool-calling mayhem where multiple incompatible
    versions of “standardized” tool calls crop up simply because there’s no shared
    way for agents to organize, share, and invoke tools. MCP gives us a shared language
    and the democratization of tool calling.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1742887159309" class="mdspan-comment">随着将AI代理从原型转移到生产的竞赛日益激烈，需要一种标准化的方式让代理在不同提供商之间调用工具的需求迫切。这种过渡到代理工具调用的标准化方法类似于我们看到的REST
    API。在它们存在之前，开发者必须处理一堆专有协议的混乱，只是为了从不同的服务中提取数据。REST将混乱变为有序，使系统能够以一致的方式相互通信。MCP（模型上下文协议）旨在，正如其名称所示，以标准化的方式为AI模型提供上下文。没有它，我们将走向工具调用的混乱，因为多个不兼容的“标准化”工具调用版本的出现仅仅是因为没有共享的方式让代理组织、共享和调用工具。MCP为我们提供了一个共享的语言和工具调用的民主化。）
- en: One thing I’m personally excited about is how tool-calling standards like MCP
    can actually make AI systems *safer*. With easier access to well-tested tools
    more companies can avoid reinventing the wheel, which reduces security risks and
    minimizes the chance of malicious code. As Ai systems start scaling in 2025, these
    are valid concerns.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人非常兴奋的一点是，像MCP这样的工具调用标准实际上可以使AI系统更安全。有了对经过良好测试的工具的更容易访问，更多的公司可以避免重新发明轮子，这降低了安全风险并最小化了恶意代码的可能性。随着AI系统在2025年开始扩展，这些都是有效的问题。
- en: As I dove into MCP, I realized a huge gap in documentation. There’s plenty of
    high-level “what does it do” content, but when you actually want to understand
    *how* it works, the resources start to fall short—especially for those who aren’t
    native developers. It’s either high level explainers or deep in the source code.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当我深入研究MCP时，我意识到文档中存在巨大的差距。虽然有很多关于“它做什么”的高级内容，但当你真正想要了解它是如何工作时，资源就开始变得不足——尤其是对于那些非原生开发者来说。要么是高级解释，要么是深入到源代码中。
- en: In this piece, I’m going to break MCP down for a broader audience—making the
    concepts and functionality clear and digestible. If you’re able, follow along
    in the coding section, if not it will be well explained in natural language above
    the code snippets.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将为更广泛的受众分解MCP——使概念和功能清晰易懂。如果你能的话，在编码部分跟随，如果不能，它将在代码片段上方用自然语言进行详细解释。
- en: 'An Analogy to Understand MCP: The Restaurant'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解MCP的类比：餐厅
- en: 'Let’s imagine the concept of MCP as a restaurant where we have:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象MCP的概念就像一家餐厅，我们拥有：
- en: The Host = The restaurant building (the environment where the agent runs)
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 主机 = 餐厅建筑（代理运行的环境）
- en: The Server = The kitchen (where tools live)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 服务器 = 厨房（工具所在之处）
- en: The Client = The waiter (who sends tool requests)
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 客户端 = 服务员（发送工具请求）
- en: The Agent = The customer (who decides what tool to use)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 代理 = 顾客（决定使用什么工具）
- en: The Tools = The recipes (the code that gets executed)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 工具 = 菜谱（执行执行的代码）
- en: The Components of MCP
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MCP的组成部分
- en: '**Host**This is where the agent operates. In our analogy, it’s the restaurant
    building; in MCP, it’s wherever your agents or LLMs actually run. If you’re using
    Ollama locally, *you’re* the host. If you’re using Claude or GPT, then Anthropic
    or OpenAI are the hosts.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**主机**这是代理操作的地方。在我们的类比中，它是餐厅建筑；在MCP中，是代理或LLM实际运行的地方。如果你在本地使用Ollama，那么你就是主机。如果你使用Claude或GPT，那么Anthropic或OpenAI就是主机。'
- en: '**Client**'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**客户端**'
- en: This is the environment that sends tool call requests from the agent. Think
    of it as the waiter who takes your order and delivers it to the kitchen. In practical
    terms, it’s the application or interface where your agent runs. The client passes
    tool call requests to the **Server** using MCP.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这是代理发送工具调用请求的环境。可以将其想象成服务员，他接受你的订单并将其送到厨房。从实际的角度来看，它就是你的代理运行的应用程序或界面。客户端通过MCP将工具调用请求传递给**服务器**。
- en: '**Server**'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**服务器**'
- en: This is the kitchen where recipes, or tools, are housed. It centralizes tools
    so agents can access them easily. Servers can be local (spun up by users) or remote
    (hosted by companies offering tools). Tools on a server are typically either grouped
    by function or integration. For instance, all Slack-related tools can be on a
    “Slack server,” or all messaging tools can be grouped together on a “messaging
    server”. That decision is based on architectural and developer preferences.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这是存放食谱或工具的厨房。它集中化工具，以便代理可以轻松访问。服务器可以是本地的（由用户启动）或远程的（由提供工具的公司托管）。服务器上的工具通常按功能或集成分组。例如，所有与Slack相关的工具都可以在“Slack服务器”上，或者所有消息工具都可以在“消息服务器”上分组。这个决定基于架构和开发者的偏好。
- en: '**Agent**'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理**'
- en: The “brains” of the operation. Powered by an LLM, it decides which tools to
    call to complete a task. When it determines a tool is needed, it initiates a request
    to the server. The agent doesn’t need to natively understand MCP because it learns
    how to use it through the metadata associated with each of the tools. This metadata
    associated with each tool tells the agent the protocol for calling the tool and
    the execution method. But it is important to note that the platform or agent needs
    to support MCP so that it handles tool calls automatically. Otherwise it is up
    to the developer to write the complex translation logic of how to parse the metadata
    from the schema, form tool call requests in MCP format, map the requests to the
    correct function, execute the code, and return the result in MCP complaint format
    back to the agent.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 操作的“大脑”。由LLM提供动力，它决定调用哪些工具来完成任务。当它确定需要工具时，它会向服务器发起请求。代理不需要原生理解MCP，因为它通过每个工具相关的元数据学习如何使用它。与每个工具相关的元数据告诉代理调用工具的协议和执行方法。但需要注意的是，平台或代理需要支持MCP，以便自动处理工具调用。否则，开发者需要编写复杂的转换逻辑，如何从模式中解析元数据，以MCP格式形成工具调用请求，将请求映射到正确的函数，执行代码，并以MCP兼容的格式将结果返回给代理。
- en: '**Tools**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**工具**'
- en: 'These are the functions, such as calling APIs or custom code, that “does the
    work”. Tools live on servers and can be:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是执行工作的函数，例如调用API或自定义代码。工具存在于服务器上，可以是：
- en: Custom tools you create and host on a local server.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你创建并托管在本地服务器上的自定义工具。
- en: Premade tools hosted by others on a remote server.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由其他人托管在远程服务器上的预制工具。
- en: Premade code created by others but hosted by you on a local server.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由其他人创建但由你托管在本地服务器上的预制代码。
- en: How the components fit together
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 组件如何配合在一起
- en: '**Server Registers Tools**Each tool is defined with a name, description, input/output
    schemas, a function handler (the code that runs) and registered to the server.
    This usually involves calling a method or API to tell the server “hey, here’s
    a new tool and this is how you use it”.'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**服务器注册工具**每个工具都通过名称、描述、输入/输出模式、函数处理程序（运行的代码）注册到服务器。这通常涉及调用一个方法或API来告诉服务器“嘿，这里有一个新工具，这是你如何使用它的方法”。'
- en: '**Server Exposes Metadata**When the server starts or an agent connects, it
    exposes the tool metadata (schemas, descriptions) via MCP.'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**服务器暴露元数据**当服务器启动或代理连接时，它通过MCP暴露工具元数据（模式、描述）。'
- en: '**Agent Discovers Tools**The agent queries the server (using MCP) to see what
    tools are available. It understands how to use each tool from the tool metadata.
    This typically happens on startup or when tools are added.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代理发现工具**代理通过MCP查询服务器以查看可用的工具。它理解如何使用每个工具，这是从工具元数据中了解的。这通常发生在启动时或添加工具时。'
- en: '**Agent Plans Tool Use**When the agent determines a tool is needed (based on
    user input or task context), it forms a tool call request in a standardized MCP
    JSON format which includes tool name, input parameters that match the tool’s input
    schema, and any other metadata.The client acts as the transport layer and sends
    the MCP formatted request to the server over HTTP.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代理计划工具使用**当代理确定需要工具（基于用户输入或任务上下文）时，它会以标准化的MCP JSON格式形成工具调用请求，包括工具名称、与工具输入模式匹配的输入参数以及任何其他元数据。客户端充当传输层，并将MCP格式的请求通过HTTP发送到服务器。'
- en: '**Translation Layer Executes**'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**翻译层执行**'
- en: The translation layer takes the agent’s standardized tool call (via MCP), maps
    the request to the corresponding function on the server, executes the function,
    formats the result back to MCP, and sends it back to the agent. A framework that
    abstracts MCP for you deos all of this without the developer needing to write
    the translation layer logic (which sounds like a headache).
  id: totrans-32
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 翻译层接收代理的标准工具调用（通过 MCP），将请求映射到服务器上的相应函数，执行函数，将结果格式化回 MCP，并将其发送回代理。一个为您抽象 MCP
    的框架会做所有这些，而无需开发者编写翻译层逻辑（听起来像头痛）。
- en: '![](../Images/467c96eb62116412c7488ee82e81229d.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/467c96eb62116412c7488ee82e81229d.png)'
- en: Image by Sandi Besen
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 Sandi Besen 提供
- en: Code Example of A Re-Act Agent Using MCP Brave Search Server
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 MCP Brave 搜索服务器的 Re-Act 代理代码示例
- en: In order to understand what MCP looks like when applied, let’s use the beeAI
    framework from IBM, which natively supports MCP and handles the translation logic
    for us.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解应用 MCP 后 MCP 的样子，让我们使用 IBM 的 beeAI 框架，该框架原生支持 MCP 并为我们处理翻译逻辑。
- en: 'If you plan on running this code you will need to:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您计划运行此代码，您将需要：
- en: Clone the [beeai framework repo](https://github.com/i-am-bee/beeai-framework)
    to gain access to the helper classes used in this code
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 克隆 [beeai 框架存储库](https://github.com/i-am-bee/beeai-framework) 以获取在此代码中使用的辅助类。
- en: Create a [free Brave developer account](https://github.com/modelcontextprotocol/servers/blob/main/src/brave-search/README.md)
    and get your API key. There are free subscriptions available (credit card required).
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个 [免费 Brave 开发者账户](https://github.com/modelcontextprotocol/servers/blob/main/src/brave-search/README.md)
    并获取您的 API 密钥。有免费订阅可供选择（需要信用卡）。
- en: Create an OpenAI developer account and create an API Key
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个 OpenAI 开发者账户并创建一个 API 密钥
- en: Add your Brave API key and OpenAI key to the .env file at the python folder
    level of the repo.
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将您的 Brave API 密钥和 OpenAI 密钥添加到存储库 python 文件夹级别的 .env 文件中。
- en: Ensure you have npm installed and have set your path correctly.
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保您已安装 npm 并正确设置了路径。
- en: '**Sample .env file**'
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**Sample .env file**'
- en: '[PRE0]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Sample mcp_agent.ipynb**'
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**Sample mcp_agent.ipynb**'
- en: '**1\. Import the necessary libraries**'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 导入必要的库**'
- en: '[PRE1]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**2\. Load the environment variables and set the system path (if needed)**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 加载环境变量并设置系统路径（如果需要）**'
- en: '[PRE2]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**3\. Configure the logger**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 配置记录器**'
- en: '[PRE3]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**4\. Load helper functions like process_agent_events,observer, and create
    an instance of ConsoleReader**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 加载 helper_functions，如 process_agent_events、observer，并创建 ConsoleReader
    的实例**'
- en: 'process_agent_events: Handles agent events and logs messages to the console
    based on the event type (e.g., error, retry, update). It ensures meaningful output
    for each event to help track agent activity.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: process_agent_events：处理代理事件，并根据事件类型（例如，错误、重试、更新）将消息记录到控制台。它确保每个事件都有意义的结果，以帮助跟踪代理活动。
- en: 'observer: Listens for all events from an emitter and routes them to process_agent_events
    for processing and display.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: observer：监听来自发射器的所有事件，并将它们路由到 process_agent_events 进行处理和显示。
- en: 'ConsoleReader: Manages console input/output, allowing user interaction and
    formatted message display with color-coded roles.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ConsoleReader：管理控制台输入/输出，允许用户交互并以彩色编码的角色显示格式化消息。
- en: '[PRE4]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**5\. Set the Brave API Key and server parameters.**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**5. 设置 Brave API 密钥和服务器参数。**'
- en: Anthropic has a list of MCP servers [here](https://modelcontextprotocol.io/examples).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic 在 [这里](https://modelcontextprotocol.io/examples) 列出了 MCP 服务器。
- en: '[PRE5]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '**6\. Create the brave tool that initiates the connection to the MCP server,
    discovers tools, and returns the discovered tools to the Agents so it can decide
    what tool is appropriate to call for a given task. **'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**6. 创建一个勇敢的工具，该工具初始化与 MCP 服务器的连接，发现工具，并将发现的工具返回给代理，以便它决定针对特定任务调用哪个工具。**'
- en: 'In this case 2 tools are discoverable on the Brave MCP Server:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，Brave MCP 服务器上有 2 个可发现工具：
- en: 'brave_web_search: Execute web searches with pagination and filtering'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: brave_web_search：执行带分页和过滤的网页搜索
- en: 'brave_local_search: Search for local businesses and services'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: brave_local_search：搜索本地企业和服务
- en: '[PRE6]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: (Optional) Check the connection to the MCP server and ensure it returns all
    the available tools before providing it to the agent.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: （可选）检查与 MCP 服务器之间的连接，并在将其提供给代理之前确保它返回所有可用的工具。
- en: '[PRE7]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '*OUTPUT:*'
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '*输出：*'
- en: '[PRE8]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**7\. Write the function that creates the agent:  **'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**7. 编写创建代理的函数：**'
- en: assign an LLM
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分配一个 LLM
- en: create an instance of the brave_tool() function and assign it to a tools variable
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建 brave_tool() 函数的一个实例并将其分配给 tools 变量
- en: create a re-act agent and assign it the chosen llm, tools, memory (so it can
    have constinous conversation)
  id: totrans-72
  prefs:
