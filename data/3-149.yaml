  zh: '[PRE12]'
- en: Conclusion, Challenges, and Where MCP is Headed
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论、挑战以及MCP的发展方向
- en: In this article you’ve seen how MCP can provide a standardized way for agents
    to discover tools on an MCP server and then interact with them without the developer
    needing to specify the implementation details of the tool call. The level of abstraction
    that MCP offers is powerful. It means developers can focus on creating valuable
    tools while agents can seamlessly discover and use them through standard protocols.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，您已经看到了MCP如何为代理提供一种标准化的方式，以便在MCP服务器上发现工具，然后无需开发者指定工具调用的实现细节即可与之交互。MCP提供的抽象级别非常强大。这意味着开发者可以专注于创建有价值的工具，而代理可以通过标准协议无缝地发现和使用它们。
- en: Our Restaurant example helped us visualize how MCP concepts like the host, client,
    server, agent, and tools work together – each with their own important role. The
    code example, where we used a Re-Act Agent in the Beeai framework, which handles
    MCP tool calling natively, to call the Brave MCP server with access to two tools
    provided a real world understanding of MCP can be used in practice.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的餐厅示例帮助我们可视化MCP概念（如主机、客户端、服务器、代理和工具）如何协同工作——每个都有自己的重要角色。我们使用的代码示例是在Beeai框架中使用了Re-Act代理，该代理原生支持MCP工具调用，调用Brave
    MCP服务器并访问两个工具，这为MCP在实际中如何使用提供了真实世界的理解。
- en: Without protocols like MCP, we face a fragmented landscape where every AI provider
    implements their own incompatible tool-calling mechanisms– creating complexity,
    security vulnerabilities, and wasted development effort.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 没有像MCP这样的协议，我们面临的是一个碎片化的格局，其中每个AI提供商都实施他们自己的不兼容的工具调用机制——这增加了复杂性、安全漏洞和浪费的开发努力。
- en: '**In the coming months, we’ll likely see MCP gain significant traction for
    several reasons:**'
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**在接下来的几个月里，我们可能会看到MCP因以下几个原因而获得显著的关注：**'
- en: As more tool providers adopt MCP, the network effect will accelerate adoption
    across the industry.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着更多工具提供商采用MCP，网络效应将加速整个行业的采用。
- en: Standardized protocols mean better testing, fewer vulnerabilities, and reduced
    risks as AI systems scale.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标准化协议意味着更好的测试、更少的漏洞和随着AI系统扩展而降低的风险。
- en: The ability to write a tool once and have it work across multiple agent frameworks
    will dramatically reduce development overhead.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够编写一次工具并在多个代理框架中工作将大大减少开发开销。
- en: Smaller players can compete by focusing on building excellent tools rather than
    reinventing complex agent architectures.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小型玩家可以通过专注于构建优秀的工具来竞争，而不是重新发明复杂的代理架构。
- en: Organizations can integrate AI agents more confidently knowing they’re built
    on stable, interoperable standards.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 组织可以更有信心地整合AI代理，因为他们知道它们建立在稳定、互操作的标准之上。
- en: '**That said, MCP faces important challenges that need addressing as adoption
    grows:**'
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**尽管如此，随着MCP的采用率增长，它面临着需要解决的重要挑战：**'
- en: As demonstrated in our code example, agents can only discover tools once connected
    to a server
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如我们的代码示例所示，代理只能在连接到服务器后才能发现工具
- en: The agent’s functionality becomes dependent on server uptime and performance,
    introducing additional points of failure.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理的功能变得依赖于服务器正常运行时间和性能，这引入了额外的故障点。
- en: As the protocol evolves, maintaining compatibility while adding new features
    will require governance.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着协议的发展，在添加新功能的同时保持兼容性将需要治理。
- en: Standardizing how agents access potentially sensitive tools across different
    servers introduces security considerations.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标准化代理如何访问不同服务器上的潜在敏感工具引入了安全考虑。
- en: The client-server architecture introduces additional latency.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户-服务器架构引入了额外的延迟。
- en: For developers, AI researchers, and organizations building agent-based systems,
    understanding and adopting MCP now—while being mindful of these challenges—will
    provide a significant advantage as more AI solutions begin to scale.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 对于开发者、AI研究人员以及构建基于代理系统的组织来说，现在理解并采用MCP——同时注意这些挑战——将在更多AI解决方案开始扩展时提供显著优势。
