- en: 'Let’s Call a Spade a Spade: RDF and LPG — Cousins Who Should Learn to Live
    Together'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 让我们直言不讳：RDF 和 LPG —— 应该学会共同生活的表亲
- en: 原文：[https://towardsdatascience.com/lets-call-a-spade-a-spade-rdf-and-lpg-cousins-who-should-learn-to-live-together/](https://towardsdatascience.com/lets-call-a-spade-a-spade-rdf-and-lpg-cousins-who-should-learn-to-live-together/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/lets-call-a-spade-a-spade-rdf-and-lpg-cousins-who-should-learn-to-live-together/](https://towardsdatascience.com/lets-call-a-spade-a-spade-rdf-and-lpg-cousins-who-should-learn-to-live-together/)
- en: In <mdspan datatext="el1744068376029" class="mdspan-comment">recent</mdspan>
    years, there has been a proliferation of articles, LinkedIn posts, and marketing
    materials presenting graph data models from different perspectives. This article
    will refrain from discussing specific products and instead focus solely on the
    comparison of RDF (Resource Description Framework) and LPG (Labelled Property
    Graph) data models. To clarify, there is no mutually exclusive choice between
    RDF and LPG — they can be employed in conjunction. The appropriate choice depends
    on the specific use case, and in some instances both models may be necessary;
    there is no single data model that is universally applicable. In fact, polyglot
    persistence and multi—model databases (databases that can support different data
    models within the database engine or on top of the engine), are gaining popularity
    as enterprises recognise the importance of storing data in diverse formats to
    maximise its value and prevent stagnation. For instance, storing time series financial
    data in a graph model is not the most efficient approach, as it could result in
    minimal value extraction compared to storing it in a time series matrix database,
    which enables rapid and multi—dimensional analytical queries.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在 <mdspan datatext="el1744068376029" class="mdspan-comment">近年来</mdspan>，有大量文章、LinkedIn
    帖子和营销材料从不同角度介绍了图数据模型。本文将避免讨论具体产品，而是专注于 RDF（资源描述框架）和 LPG（标记属性图）数据模型的比较。为了澄清，RDF
    和 LPG 之间没有相互排斥的选择——它们可以结合使用。合适的选择取决于具体用例，在某些情况下，可能需要同时使用这两种模型；没有一种数据模型是普遍适用的。实际上，多语言持久性和多模型数据库（能够在数据库引擎内部或引擎之上支持不同数据模型的数据库）正在变得越来越受欢迎，因为企业认识到以多种格式存储数据的重要性，以最大化其价值并防止停滞。例如，将时间序列金融数据存储在图模型中并不是最有效的方法，因为它与存储在时间序列矩阵数据库中相比，可能只能提取最小价值，而时间序列矩阵数据库能够实现快速的多维分析查询。
- en: The purpose of this discussion is to provide a comprehensive comparison of RDF
    and LPG data models, highlighting their distinct purposes and overlapping usage.
    While articles often present biased evaluations, promoting their own tools, it
    is essential to acknowledge that these comparisons are often flawed, as they compare
    apples to wheelbarrows rather than apples to apples. This subjectivity can leave
    readers perplexed and uncertain about the author’s intended message. In contrast,
    this article aims to provide an objective analysis, focusing on the strengths
    and weaknesses of both RDF and LPG data models, rather than acting as promotional
    material for any tool.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本讨论的目的是提供一个关于 RDF 和 LPG 数据模型的全面比较，突出它们各自的目的和重叠的使用。虽然文章常常呈现有偏见的评估，推广自己的工具，但承认这些比较往往是错误的，因为它们是将苹果与手推车比较，而不是将苹果与苹果比较，这一点是至关重要的。这种主观性可能会让读者感到困惑，不确定作者的意图信息。相比之下，本文旨在提供一个客观的分析，专注于
    RDF 和 LPG 数据模型的优点和缺点，而不是作为任何工具的推广材料。
- en: Quick recap of the data models
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据模型快速回顾
- en: Both RDF and LPG are descendants of the graph data model, although they possess
    different structures and characteristics. A graph comprises vertices (nodes) and
    edges that connect two vertices. Various graph types exist, including undirected
    graphs, directed graphs, multigraphs, hypergraphs and so on. The RDF and LPG data
    models adopt the directed multigraph approach, wherein edges have the “from” and
    “to” ordering, and can join an arbitrary number of distinct edges.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: RDF 和 LPG 都是图数据模型的继承者，尽管它们具有不同的结构和特征。图由顶点（节点）和连接两个顶点的边组成。存在各种图类型，包括无向图、有向图、多重图、超图等。RDF
    和 LPG 数据模型采用有向多重图方法，其中边具有“从”和“到”的顺序，并且可以连接任意数量的不同边。
- en: 'The RDF data model is represented by a set of *triples* reflecting the natural
    language structure of subject—verb—object, with the *subject*, *predicate*, and
    *object* represented as such. Consider the following simple example: *Jeremy was
    born in Birkirkara*. This sentence can be represented as an RDF statement or fact
    with the following structure — *Jeremy* is a subject resource, the predicate (relation)
    is *born in,* and the object value of *Birkirkara.* The value node could either
    be a URI (unique resource identifier) or a datatype value (such as integer or
    string). If the object is a semantic URI, or as they are also known a *resource*,
    then the object would lead to other facts, such as *Birkirkara* *townIn Malta*.
    This data model allows for resources to be reused and interlinked in the same
    RDF—based graph, or in any other RDF graph, internal or external. Once a resource
    is defined and a URI is “minted”, this URI becomes instantly available and can
    be used in any context that is deemed necessary.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: RDF 数据模型通过一组 *三元组* 来表示，这些三元组反映了自然语言的主体-谓语-宾语结构，其中 *主体*、*谓语* 和 *宾语* 如此表示。考虑以下简单的例子：*Jeremy
    was born in Birkirkara*。这个句子可以表示为一个具有以下结构的 RDF 陈述或事实——*Jeremy* 是一个主体资源，谓语（关系）是
    *born in*，而 *Birkirkara* 的对象值。值节点可以是 URI（唯一资源标识符）或数据类型值（如整数或字符串）。如果对象是一个语义 URI，或者如它们所知的一个
    *资源*，那么该对象将引导到其他事实，例如 *Birkirkara* *townIn Malta*。这种数据模型允许资源在相同的 RDF 基于图中或任何其他
    RDF 图中（内部或外部）被重用和相互链接。一旦定义了资源并“铸造”了 URI，这个 URI 就立即可用，并可以在任何被认为必要的上下文中使用。
- en: 'On the other hand, the LPG data model encapsulates the set of vertices, edges,
    label assignment functions for vertices and edges, and key—value property assignment
    function for vertices and edges. For the previous example, the representation
    would be as follows:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，LPG 数据模型封装了顶点集、边、顶点和边的标签分配函数，以及顶点和边的键值属性分配函数。对于前面的例子，表示方式如下：
- en: '[PRE0]'
  id: totrans-8
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Consequently, the primary distinction between RDF and LPG lies within how nodes
    are connected together. In the RDF model, **relationships are triples where predicates
    define the connection**. In the LPG data model, **edges are first—class citizens
    with their own properties**. Therefore, in the RDF data model, predicates are
    globally defined in a schema and are reused in data graphs, whilst in the LPG
    data model, each edge is uniquely identified.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，RDF 和 LPG 之间的主要区别在于节点是如何连接在一起的。在 RDF 模型中，**关系是三元组，其中谓语定义了连接**。在 LPG 数据模型中，**边是一等公民，具有自己的属性**。因此，在
    RDF 数据模型中，谓语在模式中全局定义并在数据图中重用，而在 LPG 数据模型中，每条边都是唯一标识的。
- en: Schema vs Schema—less. Do semantics matter at all?
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模式与无模式。语义是否真的重要？
- en: Semantics is a branch of linguistics and logic that is concerned about the meaning,
    in this case the meaning of data, enabling both humans and machines to interpret
    the context of the data and any relationships in the said context.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 语义学是语言学和逻辑的一个分支，它关注的是意义，在这种情况下是数据的意义，使人类和机器都能解释数据的上下文以及该上下文中的任何关系。
- en: Historically, the World Wide Web Consortium (W3C) established the Resource Description
    Framework (RDF) data model as a standardised framework for data exchange within
    the Web. RDF facilitates seamless data integration and the merging of diverse
    sources, while simultaneously supporting schema evolution without necessitating
    modifications to data consumers. Schemas^([1](#ftn-1)), or ontologies, serve as
    the foundation for data represented in RDF, and through these ontologies the semantic
    meaning of the data can be defined. This capability makes data integration one
    of the numerous suitable applications of the RDF data model. Through various W3C
    groups, standards were established on how schemas and ontologies can be defined,
    primarily RDF Schema (RDFS), Web Ontology Language (OWL), and recently SHACL.
    RDFS provides the low—level constructs for defining ontologies, such as the Person
    entity with properties name, gender, knows, and the expected type of node. OWL
    provides constructs and mechanisms for formally defining ontologies through axioms
    and rules, enabling the inference of implicit data. Whilst OWL axioms are taken
    as part of the knowledge graph and used to infer additional facts, SHACL was introduced
    as a schema to validate constraints, better known as data shapes (consider it
    as “what should a Person consist of?”) against the knowledge graph. Moreover,
    through additional features to the SHACL specifications, rules and inference axioms
    can also be defined using SHACL.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 历史上，万维网联盟（W3C）建立了资源描述框架（RDF）数据模型，作为在网络上进行数据交换的标准框架。RDF促进了数据的无缝集成和不同来源的合并，同时支持模式演变，而无需对数据消费者进行修改。模式（或称为本体），是RDF中表示的数据的基础，通过这些本体可以定义数据的语义意义。这种能力使得数据集成成为RDF数据模型众多合适应用之一。通过各种W3C小组，建立了关于如何定义模式和本体的标准，主要包括RDF模式（RDFS）、网络本体语言（OWL）以及最近的SHACL。RDFS提供了定义本体的低级构造，例如具有属性名称、性别、认识的人和节点预期类型的Person实体。OWL通过公理和规则提供构造和机制，以正式定义本体，从而实现隐含数据的推理。虽然OWL公理被视为知识图谱的一部分并用于推断额外的事实，但SHACL被引入作为验证约束的模式，也称为数据形状（可以将其视为“一个人应该由什么组成？”）与知识图谱相对。此外，通过SHACL规范的附加功能，还可以使用SHACL定义规则和推理公理。
- en: In summary, schemas facilitate the enforcement of the right instance data. This
    is possible because the RDF permits any value to be defined within a fact, provided
    it adheres to the  specifications. Validators, such as in—built SHACL engines
    or OWL constructs, are responsible for verifying the data’s integrity. Given that
    these validators are standardised, all triple stores, those adhering to the RDF
    data model, are encouraged to implement them. However, this does not negate the
    concept of flexibility. The RDF data model is designed to accommodate the ***growth,
    extension, and evolution*** of data within the schema’s boundaries. Consequently,
    while an RDF data model strongly encourages the use of schemas (or ontologies)
    as its foundation, experts discourage the *creation of ivory tower ontologies*.
    This endeavour does require an upfront effort and collaboration with domain experts
    to construct an ontology that accurately reflects the use case and the data that
    will be stored in the knowledge graph. Nonetheless, the RDF data model offers
    the flexibility to create and define RDF—based data independently of a pre—existing
    ontology, or to develop an ontology iteratively throughout a data project. Furthermore,
    schemas are designed for reuse, and the RDF data model facilitates this reusability.
    It is noteworthy that an RDF—based knowledge graph typically encompasses both
    instance data (such as “Giulia and Matteo are siblings”) and ontology/schema axioms
    (such as “Two people are siblings when they have a parent in common”).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，模式促进了正确实例数据的执行。这是因为RDF允许在事实中定义任何值，只要它符合规范。验证器，如内置的SHACL引擎或OWL构造，负责验证数据的完整性。鉴于这些验证器是标准化的，所有遵循RDF数据模型的图库都鼓励实施它们。然而，这并不否定灵活性的概念。RDF数据模型旨在适应模式边界内数据的**增长、扩展和演变**。因此，虽然RDF数据模型强烈鼓励使用模式（或本体论）作为其基础，但专家们反对**创建象牙塔本体论**。这一努力确实需要前期努力和与领域专家的合作，以构建一个准确反映用例和将在知识图中存储的数据的本体论。尽管如此，RDF数据模型提供了灵活性，可以独立于预存在的本体论创建和定义基于RDF的数据，或者在整个数据项目中迭代地开发本体论。此外，模式是为了重用而设计的，RDF数据模型促进了这种重用性。值得注意的是，基于RDF的知识图通常包括实例数据（例如，“Giulia和Matteo是兄弟姐妹”）和本体论/模式公理（例如，“当两个人有一个共同的父母时，他们就是兄弟姐妹”）。
- en: Nonetheless, the significance of ontologies extends beyond providing a data
    structure; they also impart semantic meaning to the data. For instance, in constructing
    a family tree, an ontology enables the explicit definition of relationships such
    as aunt, uncle, cousins, niece, nephew, ancestors, and descendants without the
    need for the explicit data to be defined in the knowledge graph. Consider how
    this concept can be applied in various pharmaceutical scenarios, just to mention
    one vertical domain. Reasoning is a fundamental component that renders the RDF
    data model a semantically powerful model for designing knowledge graphs. Ontologies
    provide a particular data point with all the necessary context, including its
    neighbourhood and its meaning. For instance, if there is a literal node with the
    value 37, an RDF—based agent can comprehend that the value 37 represents the age
    of a person named *Jeremy*, who is the nephew of a person named *Peter*.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，本体论的重要性并不仅仅在于提供数据结构；它们还向数据赋予了语义意义。例如，在构建家谱时，本体论允许明确地定义诸如阿姨、叔叔、堂兄弟姐妹、侄女、侄子、祖先和后代等关系，而无需在知识图中明确定义这些数据。考虑一下这一概念如何在各种制药场景中应用，仅以一个垂直领域为例。推理是使RDF数据模型成为设计知识图语义强大模型的基本组成部分。本体论为特定数据点提供所有必要的上下文，包括其邻域及其意义。例如，如果有一个值为37的文本节点，基于RDF的代理可以理解值37代表名叫*Jeremy*的人的年龄，他是名叫*Peter*的人的侄子。
- en: In contrast, the LPG data model offers a more agile and straightforward deployment
    of graph data. LPGs have reduced focus on schemas (they only support some constraints
    and “labels”/classes). Graph databases adhering to the LPG data model are known
    for their speed in preparing data for consumption due to its schema—less nature.
    This makes them a more suitable choice for data architects seeking to deploy their
    data in such a manner. The LPG data model is particularly advantageous in scenarios
    where data is not intended for growth or significant changes. For instance, a
    modification to a property would necessitate refactoring the graph to update nodes
    with the newly added or updated key—value property. While LPG provides the illusion
    of providing semantics through node and edge labels and corresponding functions,
    it does not inherently do so. LPG functions consistently return a map of values
    associated with a node or edge. Nonetheless, this is fundamental when dealing
    with use cases that need to perform fast graph algorithms as the data is available
    directly in the nodes and edges, and there is no need for further graph traversal.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，LPG数据模型提供了更灵活和直接的图数据部署。LPG对模式（它们只支持一些约束和“标签”/类）的关注减少。遵循LPG数据模型的图数据库因其模式较少而以其准备数据供消费的速度而闻名。这使得它们成为寻求以这种方式部署数据的架构师更合适的选择。LPG数据模型在数据不打算增长或发生重大变化的情况下特别有利。例如，对属性的修改将需要重构图以更新具有新添加或更新的键值属性节点。虽然LPG通过节点和边标签以及相应的函数提供了通过语义的错觉，但它本身并不这样做。LPG函数始终返回与节点或边相关联的值的映射。尽管如此，当需要执行快速图算法且数据直接在节点和边中可用且无需进一步图遍历时，这是基本的。
- en: However, one fundamental feature of the LPG data model is its ease and flexibility
    of attaching granular attributes or properties to either vertices or edges. For
    instance, if there are two person nodes, “Alice” and “Bob,” with an edge labelled
    “marriedTo,” the LPG data model can accurately and easily state that Alice and
    Bob were married on February 29, 2024\. In contrast, the RDF data model could
    achieve this through various workarounds, such as reification, but this would
    result in more complex queries compared to the LPG data model’s counterpart.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，LPG数据模型的一个基本特征是将其细粒度属性或属性轻松地附加到顶点或边上的灵活性和易用性。例如，如果有两个表示人的节点，“Alice”和“Bob”，以及一个标记为“marriedTo”的边，LPG数据模型可以准确且容易地声明Alice和Bob于2024年2月29日结婚。相比之下，RDF数据模型可以通过各种方法实现这一点，例如具体化，但这将导致比LPG数据模型的对应物更复杂的查询。
- en: Standards, Standardisation Bodies, Interoperability.
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 标准、标准化机构、互操作性。
- en: In the previous section we described how W3C provides standardisation groups
    pertaining to the RDF data model. For instance, a W3C working group is actively
    developing the RDF* standard, which incorporates the *complex relationship* concept
    (attaching attributes to facts/triples) within the RDF data model. This standard
    is anticipated to be adopted and supported by all triple stores tools and agents
    based on the RDF data model. However, the process of standardisation can be protracted,
    frequently resulting in delays that leave such vendors at a disadvantage.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们描述了W3C为RDF数据模型提供标准化小组的情况。例如，一个W3C工作组正在积极开发RDF*标准，该标准在RDF数据模型中包含*复杂关系*概念（将属性附加到事实/三元组）。预计该标准将被所有基于RDF数据模型的三元组存储工具和代理采用和支持。然而，标准化过程可能会延长，通常会导致延迟，使这些供应商处于不利地位。
- en: Nonetheless, standards facilitate much—needed interoperability. Knowledge Graphs
    built upon the RDF data model can be easily ported between different applications
    and triple store, as they have no vendor lock—in, and standardisation formats
    are provided. Similarly, they can be queried with one standard query language
    called SPARQL, which is used by the different vendors. Whilst the query language
    is the same, vendors opt for different *query execution plans*, equivalent to
    how any database engine (SQL or NoSQL) is implemented, to enhance performance
    and speed.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，标准促进了急需的互操作性。基于RDF数据模型的知识图谱可以轻松地在不同的应用程序和三元组存储之间迁移，因为它们没有供应商锁定，并且提供了标准化格式。同样，它们可以使用一个称为SPARQL的标准查询语言进行查询，该语言被不同的供应商使用。虽然查询语言是相同的，但供应商会选择不同的*查询执行计划*，相当于任何数据库引擎（SQL或NoSQL）的实现，以提高性能和速度。
- en: Most LPG graph implementations, although open source, utilise proprietary or
    custom languages for storing and querying data, lacking a standard adherence.
    This practice decreases interoperability and portability of data between different
    vendors. However, in recent months, ISO approved and published **ISO/IEC 39075:2024**
    that standardises the Graph Query Language (GQL) based on Cypher. As the charter
    rightly points out, the graph data model has unique advantages over relational
    databases such as fitting data that is meant to have hierarchical, complex or
    arbitrary structures. Nevertheless, the proliferation of vendor—specific implementations
    overlooks a crucial functionality – a standardised approach to querying property
    graphs. Therefore, it is paramount that property graph vendors reflect their products
    to this standard.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数LPG图实现，尽管是开源的，但使用专有或自定义语言来存储和查询数据，缺乏对标准的遵循。这种做法降低了不同供应商之间数据的互操作性和可移植性。然而，在最近几个月，ISO批准并发布了**ISO/IEC
    39075:2024**，该标准基于Cypher对图查询语言（GQL）进行了标准化。正如章程正确指出的那样，图数据模型相对于关系数据库具有独特的优势，例如适合具有层次结构、复杂或任意结构的数据。尽管如此，特定供应商的实现激增忽视了关键功能——查询属性图的标准化方法。因此，属性图供应商将他们的产品反映到这个标准上是至关重要的。
- en: Recently, OneGraph^([2](#ftn-2)) was proposed as an interoperable metamodel
    that is meant to overcome the choice between the RDF data model and the LPG data
    model. Furthermore, extensions to openCypher are proposed^([3](#ftn-3)) to allow
    the querying over RDF data to be extended as a way of querying over RDF data.
    This vision aims to pave the way for having data in both RDF and LPG combined
    in a single, integrated database, ensuring the benefits of both data models.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，OneGraph^([2](#ftn-2))被提出作为一个互操作元模型，旨在克服RDF数据模型和LPG数据模型之间的选择。此外，还提出了对openCypher的扩展^([3](#ftn-3))，以允许查询RDF数据，作为一种查询RDF数据的方式。这一愿景旨在为在单个、集成的数据库中结合RDF和LPG数据铺平道路，确保两种数据模型的优势。
- en: Other notable differences
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他显著差异
- en: Notable differences, mostly in query languages, are there to support the data
    models. However, we strongly argue against the fact that a set of query language
    features should dictate which data model to use. Nonetheless, we will discuss
    some of the differences here for a more complete overview.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 显著的差异，主要在查询语言中，是为了支持数据模型。然而，我们强烈反对一组查询语言特性应该决定使用哪种数据模型的事实。尽管如此，我们将讨论一些差异，以获得更全面的概述。
- en: The RDF data model offers a natural way of supporting global unique resource
    identifiers (URIs), which manifest in three distinct characteristics. Within the
    RDF domain, a set of facts described by an RDF statement (i.e. *s, p, o*) having
    the same subject URI is referred to as a *resource*. Data stored in RDF graphs
    can be conveniently split into multiple ***named graphs***, ensuring that each
    graph encapsulates distinct concerns. For instance, using the RDF data model it
    is straightforward to construct graphs that store data or resources, metadata,
    audit and provenance data separately, whilst ***interlinking*** and querying capabilities
    can be seamlessly executed across these multiple graphs. Furthermore, graphs can
    establish interlinks with resources located in graphs hosted on different servers.
    Querying these external resources is facilitated through ***query federation***
    within the SPARQL protocol. Given the adoption of URIs, RDF embodies the original
    vision of Linked Data^([4](#ftn-4)), a vision that has since been adopted, to
    an extent, as a guiding principle in the FAIR principles^([5](#ftn-5)), Data Fabric,
    Data Mesh, and HATEOAS amongst others. Consequently, the RDF data model serves
    as a versatile framework that can seamlessly integrate with these visions without
    the need for any modifications.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: RDF数据模型提供了一种自然的方式支持全局唯一资源标识符（URIs），这体现在三个不同的特征上。在RDF领域，一组由具有相同主题URI的RDF语句（即*s,
    p, o*）描述的事实被称为*资源*。存储在RDF图中的数据可以方便地分成多个***命名图***，确保每个图封装了不同的关注点。例如，使用RDF数据模型，可以轻松构建存储数据或资源、元数据、审计和溯源数据的图，同时***互连***和查询能力可以无缝地在这些多个图之间执行。此外，图可以与位于不同服务器上托管的图中的资源建立互连。通过SPARQL协议中的***查询联邦***，可以方便地查询这些外部资源。鉴于对URIs的采用，RDF体现了原始的Linked
    Data^([4](#ftn-4))愿景，这一愿景后来在一定程度上被作为FAIR原则^([5](#ftn-5))、数据织物、数据网格和HATEOAS等原则的指导原则所采用。因此，RDF数据模型作为一个灵活的框架，可以无缝地与这些愿景集成，而无需任何修改。
- en: LPGs, on the other hand, are better geared towards ***path traversal queries***,
    ***graph analytics*** and ***variable length path*** queries. Whilst these functionalities
    can be considered as specific implementations in the query language, they are
    pertinent considerations when modelling data in a graph, since these are also
    benefits over traditional relational databases. SPARQL, through the W3C recommendation,
    has limited support to path traversal^([6](#ftn-6)), and some vendor triple store
    implementations do support and implement (although not as part of the SPARQL 1.1
    recommendation) variable length path^([7](#ftn-7)). At time of writing, the SPARQL
    1.2 recommendation will not incorporate this feature either.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: LPGs（轻量级图模式）另一方面，更适合于***路径遍历查询***、***图分析***和***可变长度路径***查询。虽然这些功能可以被视为查询语言中的特定实现，但在图数据建模时，这些也是相对于传统关系数据库的优势。SPARQL通过W3C推荐，对路径遍历^([6](#ftn-6))的支持有限，并且一些供应商的三元组存储实现支持并实现了（尽管不是作为SPARQL
    1.1推荐的一部分）可变长度路径^([7](#ftn-7))。在撰写本文时，SPARQL 1.2推荐也不会包含这个功能。
- en: Data Graph Patterns
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据图模式
- en: The following section describes various data graph patterns and how they would
    fit, or not, both data models discussed in this article.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分将描述各种数据图模式以及它们如何适合或不适合本文中讨论的两种数据模型。
- en: '| **Pattern** | **RDF data model** | **LPG data model** |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
  zh: '| **模式** | **RDF数据模型** | **LPG数据模型** |'
- en: '| *Global Definition of relations/properties* | Through schemas properties
    are globally defined through various semantic properties such as domain and ranges,
    algebraic properties such as inverse of, reflexive, transitive, and allow for
    informative annotations on properties definitions. | Semantics of relations (edges)
    is not supported in property graphs |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| *关系/属性的全球定义* | 通过模式，属性通过各种语义属性（如域和范围）和代数属性（如逆、自反、传递）全局定义，并允许在属性定义上进行信息性注释。
    | 属性图不支持关系的语义（边）。 |'
- en: '| *Multiple Languages* | String data can have a language tag attached to it
    and is considered when processing | Can be a custom field or relationship (e.g.
    label_en, label_mt) but have no special treatment. |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| *多语言* | 字符串数据可以附加语言标签，并在处理时考虑。 | 可以是自定义字段或关系（例如，label_en、label_mt），但没有特殊处理。
    |'
- en: '| *Taxonomy – Hierarchy* | Automatic inferencing, reasoning and can handle
    complex classes. | Can model hierarchies, but not model hierarchies of classes
    of individuals. Would require explicit traversal of classification hierarchies
    |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '| *分类 – 层次结构* | 自动推理、推理并能处理复杂类。 | 可以建模层次结构，但不能建模个体类的层次结构。需要显式遍历分类层次结构 |'
- en: '| *Individual Relationships* | Requires workarounds like reification and complex
    queries. | Can make direct assertions over them, natural representation and efficient
    querying. |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '| *个体关系* | 需要像具体化和复杂查询这样的解决方案。 | 可以直接对这些关系进行断言，自然表示和高效查询。 |'
- en: '| *Property Inheritance* | Properties inherited through defined class hierarchies.
    Furthermore, the RDF data model has the ability to represent subproperties. |
    Must be handled in application logic. |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| *属性继承* | 通过定义的类层次结构继承的属性。此外，RDF数据模型具有表示子属性的能力。 | 必须在应用程序逻辑中处理。 |'
- en: '| *N—ary Relations* | Generally binary relationships are represented in triples,
    but N—ary relations can be done via blank nodes, additional resources, or reification.
    | Can often be translated to additional attributes on edges. |'
  id: totrans-34
  prefs: []
  type: TYPE_TB
  zh: '| *N-元关系* | 通常，二元关系在三元组中表示，但N-元关系可以通过空白节点、额外资源或具体化来完成。 | 通常可以转换为边上的额外属性。 |'
- en: '| *Property Constraints and Validation* | Available through schema definitions:
    RDFS, OWL or SHACL. | Supports minimal constraints such as value uniqueness but
    generally requires validation through schema layers or application logic. |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| *属性约束和验证* | 通过模式定义提供：RDFS、OWL或SHACL。 | 支持最小约束，如值唯一性，但通常需要通过模式层或应用程序逻辑进行验证。
    |'
- en: '| *Context and Provenance* | Can be done in various ways, including having
    a separate named graph and links to the main resources, or through reification.
    | Can add properties to nodes and edges to capture context and provenance. |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| *上下文和来源* | 可以通过多种方式完成，包括拥有单独的命名图和链接到主要资源，或者通过具体化。 | 可以向节点和边添加属性来捕获上下文和来源。
    |'
- en: '| *Inferencing* | Automate the inferencing of inverse relationships, transitive
    patterns, complex property chains, disjointness and negation. | Either require
    explicit definition, in application logic, or no support at all (disjointness
    and negation). |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| *推理* | 自动推断逆关系、可传递模式、复杂属性链、不相交性和否定。 | 或者需要显式定义，在应用逻辑中，或者根本不支持（不相交性和否定）。 |'
- en: Semantics in Graphs — A Family Tree Example
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 图中的语义——家谱示例
- en: A comprehensive exploration of the application of RDF data model and semantics
    within an LPG application can be found in various articles published on Medium,
    LinkedIn, and other blogs. As outlined in the previous section, the LPG data model
    is not specifically designed for reasoning purposes. Reasoning involves applying
    logical rules on existing facts as a way to deduce new knowledge; this is important
    as it helps uncover hidden relationships that were not explicitly stated before.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在Medium、LinkedIn和其他博客上发布的各种文章中可以找到对RDF数据模型和语义在LPG应用中应用的全面探索。如前节所述，LPG数据模型并非专门为推理目的而设计。推理涉及将逻辑规则应用于现有事实，作为推导新知识的一种方式；这一点很重要，因为它有助于揭示之前未明确陈述的隐藏关系。
- en: In this section we will demonstrate how axioms are defined for a simple yet
    practical example of a family tree. A family tree is an ideal candidate for any
    graph database due to its hierarchical structure and its flexibility in being
    defined within any data model. For this demonstration, we will model the Pewterschmidt
    family, which is a fictional family from the popular animated television series
    [Family Guy](https://www.imdb.com/title/tt0182576/).
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将演示如何为一个简单但实用的家谱示例定义公理。家谱由于其层次结构和在任意数据模型中定义的灵活性，是任何图数据库的理想候选。为了演示，我们将模拟皮特施密特家族，这是一个来自流行动画电视系列[Family
    Guy](https://www.imdb.com/title/tt0182576/)的虚构家庭。
- en: '![](../Images/54b61e0cc031aaaaf8eb4c1a558919f1.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/54b61e0cc031aaaaf8eb4c1a558919f1.png)'
- en: All images, unless otherwise noted, are by the author.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 所有图片，除非另有说明，均为作者所有。
- en: 'In this case, we are just creating one relationship called ‘hasChild’. So,
    Carter has a child named Lois, and so on. The only other attribute we’re adding
    is the gender (Male/Female). For the RDF data model, we have created a simple
    OWL ontology:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们只是创建了一个名为“hasChild”的关系。因此，卡特有一个名叫路易丝的孩子，等等。我们添加的唯一其他属性是性别（男/女）。对于RDF数据模型，我们创建了一个简单的OWL本体：
- en: '![A diagram of a child'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '![一个孩子的图'
- en: AI-generated content may be incorrect.](../Images/a82f7a2623579115a438d756929f42fa.png)
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的内容可能是不正确的。](../Images/a82f7a2623579115a438d756929f42fa.png)
- en: 'The current schema enables us to represent the family tree in an RDF data model.
    With ontologies, we can commence defining the following properties, whose data
    can be deduced from the initial data. We introduce the following properties:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 当前模式使我们能够用RDF数据模型表示家谱。通过本体，我们可以开始定义以下属性，其数据可以从初始数据中推导出来。我们引入以下属性：
- en: '| Property | Comment | Axiom | Example |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| 属性 | 注释 | 公理 | 示例 |'
- en: '| isAncestorOf | A transitive property which is also the inverse of the isDescendentOf
    property. OWL engines automatically infer transitive properties without the need
    of rules. | hasChild(?x, ?y) —> isAncestorOf(?x, ?y) | Carter – *isAncestorOf*
    —> Lois – *isAncestorOf* —> Chris Carter  – *isAncestorOf*  —> Chris |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '| isAncestorOf | 一个可传递属性，也是isDescendentOf属性的逆属性。OWL引擎自动推断可传递属性，无需规则。 | hasChild(?x,
    ?y) —> isAncestorOf(?x, ?y) | 卡特 – *isAncestorOf* —> 路易丝 – *isAncestorOf* —> 卡特·卡特 
    – *isAncestorOf*  —> 克里斯 |'
- en: '| isDescendentOf | A transitive property, inverse of isAncestorOf. OWL engines
    automatically infers inverse properties without the need of rules | — | Chris
    – *isDescendentOf* —> Peter |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
  zh: '| isDescendentOf | 一个可传递属性，是isAncestorOf属性的逆属性。OWL引擎自动推断逆属性，无需规则。 | — | Chris
    – *isDescendentOf* —> Peter |'
- en: '| isBrotherOf | A subproperty of isSiblingOf and disjoint with isSisterOf,
    meaning that the same person cannot be the brother and the sister of another person
    at the same time, whilst they cannot be the brother of themselves. | hasChild(?x,
    ?y), hasChild(?x, ?z), hasGender(?y, Male), notEqual(?y, ?z) —> isBrotherOf(?y,
    ?z) | Chris – *isBrotherOf* —> Meg |'
  id: totrans-50
  prefs: []
  type: TYPE_TB
  zh: '| isBrotherOf | isSiblingOf的子属性，与isSisterOf不相交，意味着同一个人不能同时是另一个人的兄弟和姐妹，同时他们也不能是自己的兄弟。
    | hasChild(?x, ?y), hasChild(?x, ?z), hasGender(?y, Male), notEqual(?y, ?z) —>
    isBrotherOf(?y, ?z) | Chris – *isBrotherOf* —> Meg |'
- en: '| isSisterOf | A subproperty of isSiblingOf and disjoint with isBrotherOf,
    meaning that the same person cannot be the brother and the sister or another person
    at the same time, whilst they cannot be the brother of themselves. | hasChild(?x,
    ?y), hasChild(?x, ?z), hasGender(?y, Female), notEqual(?y, ?z) —> isSisterOf(?y,
    ?z) | Meg – *isSisterOf* —> Chris |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
  zh: '| isSisterOf | isSiblingOf的子属性，与isBrotherOf不相交，意味着同一个人不能同时是兄弟和姐妹或其他人，同时他们不能是自己的兄弟。
    | hasChild(?x, ?y), hasChild(?x, ?z), hasGender(?y, Female), notEqual(?y, ?z)
    —> isSisterOf(?y, ?z) | Meg – *isSisterOf* —> Chris |'
- en: '| isSiblingOf | A super—property of isBrotherOf and isSisterOf. OWL engines
    automatically infers super—properties | — | Chris –  *isSiblingOf* —> Meg |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
  zh: '| isSiblingOf | 是isBrotherOf和isSisterOf的超属性。OWL引擎自动推断超属性 | — | Chris –  *isSiblingOf*
    —> Meg |'
- en: '| isNephewOf | A property that infers the aunts and uncles of children based
    on their gender. | isSiblingOf(?x, ?y), hasChild(?x, ?z), hasGender(?z, Male),
    notEqual(?y, ?x) —> isNephewOf(?z, ?y | Stewie – *isNephewOf* —> Carol |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| isNephewOf | 基于孩子的性别推断阿姨和叔叔的属性。 | isSiblingOf(?x, ?y), hasChild(?x, ?z),
    hasGender(?z, Male), notEqual(?y, ?x) —> isNephewOf(?z, ?y | Stewie – *isNephewOf*
    —> Carol |'
- en: '| isNieceOf | A property that infers the aunts and uncles of children based
    on their gender. | isSiblingOf(?x, ?y), hasChild(?x, ?z), hasGender(?z, Female),
    notEqual(?y, ?x) —> isNieceOf(?z, ?y) | Meg – *isNieceOf* —> Carol |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| isNieceOf | 基于孩子的性别推断阿姨和叔叔的属性。 | isSiblingOf(?x, ?y), hasChild(?x, ?z), hasGender(?z,
    Female), notEqual(?y, ?x) —> isNieceOf(?z, ?y) | Meg – *isNieceOf* —> Carol |'
- en: 'These axioms are imported into a triple store, to which the engine will apply
    them to the explicit facts in real—time. Through these axioms, triple stores allow
    the querying of inferred/hidden triples.. Therefore, if we want to get the explicit
    information about Chris Griffin, the following query can be executed:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这些公理被导入到三元组存储中，引擎将实时将这些公理应用于显式事实。通过这些公理，三元组存储允许查询推断/隐藏的三元组。因此，如果我们想获取Chris Griffin的显式信息，可以执行以下查询：
- en: '[PRE1]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/3d625be7486a98c27d0e0117207ac6c1.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3d625be7486a98c27d0e0117207ac6c1.png)'
- en: 'If we need to get the inferred values for Chris, the SPARQL engine will provide
    us with 10 inferred facts:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们需要获取Chris的推断值，SPARQL引擎将为我们提供10个推断事实：
- en: '[PRE2]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/7f0234c6c8564357b4e3f944335a1d0f.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7f0234c6c8564357b4e3f944335a1d0f.png)'
- en: This query will return all implicit facts for Chris Griffin. The image below
    shows the discovered facts. These are not explicitly stored in the triple store.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这个查询将返回Chris Griffin的所有隐含事实。下面的图像显示了发现的事实。这些事实并未明确存储在三元组存储中。
- en: '![](../Images/4cf036458cf3314f03bfec629bca89d7.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4cf036458cf3314f03bfec629bca89d7.png)'
- en: These results could not be produced by the property graph store, as no reasoning
    could be applied automatically.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这些结果不能由属性图存储产生，因为没有推理可以自动应用。
- en: The RDF data model empowers users to discover previously unknown facts, a capability
    that the LPG data model lacks. Nevertheless, LPG implementations can bypass this
    limitation by developing complex stored procedures. However, unlike in RDF, these
    stored procedures may have variations (if at all possible) across different vendor
    implementations, rendering them non—portable and impractical.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: RDF数据模型赋予用户发现先前未知事实的能力，这是LPG数据模型所缺乏的。尽管如此，LPG实现可以通过开发复杂的存储过程来绕过这一限制。然而，与RDF不同，这些存储过程在不同供应商实现中可能会有所不同（如果可能的话），这使得它们不可移植且不实用。
- en: Take-home message
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 要点
- en: In this article, the RDF and LPG data models have been presented objectively.
    On the one hand, the LPG data model offers a rapid deployment of graph databases
    without the need for an advanced schema to be defined (i.e. it is schema—less).
    Conversely, the RDF data model requires a more time—consuming bootstrapping process
    for graph data, or knowledge graph, due to its schema definition requirement.
    However, the decision to adopt one model over the other should consider whether
    the additional effort is justified in providing meaningful context to the data.
    This consideration is influenced by specific use cases. For instance, in social
    networks where neighbourhood exploration is a primary requirement, the LPG data
    model may be more suitable. On the other hand, for more advanced knowledge graphs
    that necessitate reasoning or data integration across multiple sources, the RDF
    data model is the preferred choice.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，RDF和LPG数据模型被客观地介绍。一方面，LPG数据模型提供了一种快速部署图数据库的方法，无需定义高级模式（即它是无模式的）。相反，由于需要定义模式，RDF数据模型在图数据或知识图方面需要更耗时的启动过程。然而，采用一种模型而不是另一种模型的决定应考虑是否额外的努力是合理的，以提供有意义的数据上下文。这种考虑受到特定用例的影响。例如，在社会网络中，如果邻域探索是一个主要要求，LPG数据模型可能更合适。另一方面，对于需要推理或跨多个来源进行数据集成的更高级知识图，RDF数据模型是首选选择。
- en: It is crucial to avoid letting personal preferences for query languages dictate
    the choice of data model. Regrettably, many articles available primarily serve
    as marketing tools rather than educational resources, hindering adoption and creating
    confusion within the graph database community. Furthermore, in the era of abundant
    and accessible information, it would be better for vendors to refrain from promoting
    misinformation about opposing data models. A general misconception promoted by
    property graph evangelists is that the RDF data model is overly complex and academic,
    leading to its dismissal. This assertion is based on a preferential prejudice.
    RDF is both a machine and human readable data model that is close to business
    language, especially through the definition of schemas and ontologies. Moreover,
    the adoption of the RDF data model is widespread. For instance, Google uses the
    RDF data model as their standard to represent meta—information about web pages
    using schema.org. There is also the assumption that the RDF data model will exclusively
    function with a schema. This is also a misconception, as after all, the data defined
    using the RDF data model could also be schema—less. However, it is acknowledged
    that all semantics would be lost, and the data will be reduced to simply graph
    data. This article also mentions how the oneGraph vision aims to establish a bridge
    between the two data models.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 避免让个人对查询语言的偏好决定数据模型的选择至关重要。遗憾的是，许多文章主要作为营销工具而非教育资源，阻碍了采用并导致图数据库社区内产生混淆。此外，在信息丰富且易于获取的时代，供应商最好避免宣传关于对立数据模型的错误信息。属性图倡导者推广的一种普遍误解是，RDF数据模型过于复杂和学术化，导致其被摒弃。这种说法基于一种偏好偏见。RDF是一种既适合机器又适合人类阅读的数据模型，它接近于业务语言，尤其是在定义模式和本体时。此外，RDF数据模型的采用非常广泛。例如，谷歌使用RDF数据模型作为其标准，通过schema.org表示网页的元信息。还有一种假设认为，RDF数据模型将仅与模式一起工作。这也是一个误解，因为毕竟，使用RDF数据模型定义的数据也可以是无模式的。然而，人们承认，所有语义都将丢失，数据将简化为仅仅是图数据。本文还提到了oneGraph愿景旨在在两种数据模型之间建立桥梁。
- en: To conclude, technical feasibility alone should not drive implementation decisions
    in which graph data model to select. Reducing higher—level abstractions to primitive
    constructs often increases complexity and can impede solving specific use cases
    effectively. Decisions should be guided by use case requirements and performance
    considerations rather than merely what is technically possible.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，仅仅技术可行性不应驱动选择图数据模型的实施决策。将高级抽象降低到原始结构通常会增加复杂性，并可能阻碍有效地解决特定用例。决策应受用例需求和性能考虑的指导，而不仅仅是技术上可能做到的。
