- en: Exploring New Hyperparameter Dimensions with Laplace Approximated Bayesian Optimization
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用拉普拉斯近似贝叶斯优化探索新的超参数维度
- en: 原文：[https://towardsdatascience.com/exploring-new-hyperparameter-dimensions-with-laplace-approximated-bayesian-optimization-588a0891ca5b/](https://towardsdatascience.com/exploring-new-hyperparameter-dimensions-with-laplace-approximated-bayesian-optimization-588a0891ca5b/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/exploring-new-hyperparameter-dimensions-with-laplace-approximated-bayesian-optimization-588a0891ca5b/](https://towardsdatascience.com/exploring-new-hyperparameter-dimensions-with-laplace-approximated-bayesian-optimization-588a0891ca5b/)
- en: '![Image by author from canva](../Images/2b2ce9222086e81445bd46fecf28f655.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者来自canva](../Images/2b2ce9222086e81445bd46fecf28f655.png)'
- en: Image by author from canva
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者来自canva提供
- en: '**When I notice my model is overfitting**, I often think, "**It is time to
    regularize**". But how do I decide which regularization method to use (L1, L2)
    and what parameters to choose? Typically, I perform hyperparameter optimization
    by means of a grid search to select the settings. However, what happens if the
    independent variables have different scales or varying levels of influence? Can
    I design a hyperparameter grid with different regularization coefficients for
    each variable? Is this type of optimization feasible in high-dimensional spaces?
    And are there alternative ways to design regularization? Let’s explore this with
    a hypothetical example.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**当我注意到我的模型过拟合时**，我经常想，“**是时候进行正则化了**”。但我如何决定使用哪种正则化方法（L1，L2）以及选择哪些参数？通常，我通过网格搜索进行超参数优化来选择设置。然而，如果独立变量具有不同的尺度或不同水平的影响，会发生什么？我能为每个变量设计具有不同正则化系数的超参数网格吗？这种优化在高维空间中可行吗？还有其他设计正则化的方法吗？让我们用一个假设的例子来探讨这个问题。'
- en: Use case
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用例
- en: 'My fictional example is a binary classification use case with 3 explanatory
    variables. Each of these variables is categorical and has 7 different categories.
    My reproducible use case is in this [notebook](https://github.com/kapytaine/bayesian_optimisation/blob/master/notebooks/bayesian_optimization_instead_of_hyperoptimization_artificial_dataset.ipynb).
    The function that generates the dataset is the following:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我的虚构示例是一个具有3个解释变量的二元分类用例。这些变量都是分类变量，并且有7个不同的类别。我的可重复用例在这个[notebook](https://github.com/kapytaine/bayesian_optimisation/blob/master/notebooks/bayesian_optimization_instead_of_hyperoptimization_artificial_dataset.ipynb)中。生成数据集的函数如下：
- en: '[PRE0]'
  id: totrans-7
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: For information, I deliberately chose 3 different values for the theta covariance
    matrix to showcase the benefit of the Laplace approximated bayesian optimization
    method. If the values were somehow similar, the interest would be minor.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 为了信息透明，我故意选择了theta协方差矩阵的3个不同值，以展示拉普拉斯近似贝叶斯优化方法的益处。如果这些值在某种程度上相似，那么兴趣就会小得多。
- en: Benchmark
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基准
- en: 'Along with **a simple baseline model that predicts the mean observed value**
    on the training dataset (used for comparison purposes), I opted to design a slightly
    more complex model. I decided to one-hot encode the three independent variables
    and apply **a logistic regression model** on top of this basic preprocessing.
    For regularization, I chose an L2 design and aimed to find the optimal regularization
    coefficient using two techniques: **grid search** and **Laplace approximated bayesian
    optimization**, as you may have anticipated by now. Finally, I evaluated the model
    on a test dataset using two metrics (arbitrarily selected): log loss and AUC ROC.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 除了在训练数据集（用于比较目的）上预测平均观察值的**简单基线模型**，我还决定设计一个稍微复杂一些的模型。我决定对三个独立变量进行独热编码，并在基本预处理之上应用**逻辑回归模型**。为了正则化，我选择了L2设计，并旨在使用两种技术找到最优的正则化系数：**网格搜索**和**拉普拉斯近似贝叶斯优化**，正如你可能已经预料到的。
- en: Before presenting the results, let’s first take a closer look at the bayesian
    model and how we optimize it.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在展示结果之前，让我们首先仔细看看贝叶斯模型以及我们如何优化它。
- en: Bayesian model
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 贝叶斯模型
- en: In the bayesian framework, the parameters are no longer fixed constants, but
    random variables. Instead of maximizing the likelihood to estimate these unknown
    parameters, we now optimize the posterior distribution of the random parameters,
    given the observed data. This requires us to choose, often somewhat arbitrarily,
    the design and parameters of the prior. However, it is also possible to treat
    the parameters of the prior as random variables themselves – like in *Inception*,
    where the layers of uncertainty keep stacking on top of each other…
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在贝叶斯框架中，参数不再是固定的常数，而是随机变量。我们不再通过最大化似然来估计这些未知参数，而是现在优化给定观测数据的随机参数的后验分布。这要求我们选择，通常是相当任意地，先验的设计和参数。然而，也可以将先验参数视为随机变量本身——就像在
    *Inception* 中，不确定性层不断堆叠在一起…
- en: 'In this study, I have chosen the following model:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在这项研究中，我选择了以下模型：
- en: '![](../Images/c914d7e80ee2496407b81738ef204cc4.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c914d7e80ee2496407b81738ef204cc4.png)'
- en: I have logically chosen a bernouilli model for Y_i | θ, a normal centered prior
    corresponding to a L2 regularization for θ | Σ and finally for Σ_i^{-1}, I chose
    a Gamma model. I chose to model the precision matrix instead of the covariance
    matrix as it is traditional in the literature, like in scikit learn user guide
    for the Bayesian linear regression [2].
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我逻辑上选择了 Y_i | θ 的伯努利模型，对应于 θ | Σ 的 L2 正则化的中心正态先验，最后对于 Σ_i^{-1}，我选择了伽马模型。我选择建模精度矩阵而不是协方差矩阵，因为在文献中这是传统的，就像在
    scikit learn 用户指南中的贝叶斯线性回归 [2] 中一样。
- en: In addition to this written model, I assumed the Y_i and Y_j are conditionally
    (on θ) independent as well as Y_i and Σ.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这个书面模型之外，我还假设 Y_i 和 Y_j 在 θ 的条件下（即条件独立），以及 Y_i 和 Σ 也是条件独立的。
- en: Calibration
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 校准
- en: Likelihood
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 似然
- en: 'According to the model, the likelihood can consequently be written:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 根据模型，似然可以相应地写成：
- en: '![](../Images/c6a96fe2bf86214702a77af8234c2309.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c6a96fe2bf86214702a77af8234c2309.png)'
- en: In order to optimize, we need to evaluate nearly all of the terms, with the
    exception of P(Y=y). The terms in the numerators can be evaluated using the chosen
    model. However, the remaining term in the denominator cannot. This is where the
    **Laplace approximation** comes into play.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了优化，我们需要评估几乎所有的项，除了 P(Y=y)。分子中的项可以使用选定的模型来评估。然而，分母中剩余的项不能。这就是 **拉普拉斯近似** 发挥作用的地方。
- en: Laplace approximation
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 拉普拉斯近似
- en: 'In order to evaluate the first term of the denominator, we can leverage the
    Laplace approximation. We approximate the distribution of θ | Y, Σ by:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估分母的第一项，我们可以利用拉普拉斯近似。我们通过以下方式近似 θ | Y, Σ 的分布：
- en: '![](../Images/74a1eadd4766f3b68eba7b0b8b5747d8.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74a1eadd4766f3b68eba7b0b8b5747d8.png)'
- en: with θ* being the mode of the mode the density distribution of θ | Y, Σ.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 θ* 是 θ | Y, Σ 的密度分布的模态。
- en: 'Even though we do not know the density function, we can evaluate the Hessian
    part thanks to the following decomposition:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们不知道密度函数，但我们可以通过以下分解来评估 Hessian 部分：
- en: '![](../Images/cec81cae1735dea0577dc32dfdcc2483.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cec81cae1735dea0577dc32dfdcc2483.png)'
- en: We only need to know the first two terms of the numerator to evaluate the Hessian
    which we do.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只需要知道分子中的前两项来评估 Hessian，我们就是这样做的。
- en: For those interested in further explanation, I advise part 4.4, "The Laplace
    Approximation", from Pattern Recognition and Machine Learning from Christopher
    M. Bishop [1]. It helped me a lot to understand the approximation.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些想要进一步解释的人来说，我建议阅读 Christopher M. Bishop 的《模式识别与机器学习》第4.4部分，“拉普拉斯近似” [1]。它对我理解近似方法有很大帮助。
- en: Laplace approximated likelihood
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 拉普拉斯近似似然
- en: 'Finally the Laplace approximated likelihood to optimize is:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们需要优化的拉普拉斯近似似然是：
- en: '![](../Images/21e7d079df454915808fe2f465412fb3.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/21e7d079df454915808fe2f465412fb3.png)'
- en: Once we approximate the density function of θ | Y, Σ, we could finally evaluate
    the likelihood at whatever θ we want if the approximation was accurate everywhere.
    For the sake of simplicity and because the approximation is accurate only close
    to the mode, we evaluate approximated likelihood at θ*.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们近似了 θ | Y, Σ 的密度函数，我们就可以在任意 θ 处评估似然，如果近似在整个区域内都是准确的。为了简单起见，并且因为近似只在模态附近是准确的，我们在
    θ* 处评估近似似然。
- en: Here after is a function that evaluates this loss for a given (scalar) σ²=1/p
    (in addition to the given observed, X and y, and design values, α and β).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个函数，用于评估给定（标量）σ²=1/p（除了给定的观测值 X 和 y，以及设计值 α 和 β）的损失。
- en: '[PRE1]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: In my use case, I have chosen to optimize it by means of **Adam optimizer,**
    which code has been taken from this [repo](https://gist.github.com/jcmgray/e0ab3458a252114beecb1f4b631e19ab).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的用例中，我选择通过**Adam优化器**来优化它，该代码是从这个[仓库](https://gist.github.com/jcmgray/e0ab3458a252114beecb1f4b631e19ab)中获取的。
- en: '[PRE2]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: For this optimization we need the derivative of the previous loss. We cannot
    have an analytical form so I decided to use a numerical approximation of the derivative.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这次优化，我们需要前一个损失函数的导数。我们无法得到解析形式，所以我决定使用导数的数值近似。
- en: Inference
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推理
- en: Once the model is trained on the training dataset, it is necessary to make predictions
    on the evaluation dataset to assess its performance and compare different models.
    However, it is not possible to directly calculate the actual distribution of a
    new point, as the computation is intractable.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦模型在训练数据集上训练完成，就需要在评估数据集上进行预测，以评估其性能并比较不同的模型。然而，无法直接计算新点的实际分布，因为计算是不可行的。
- en: '![](../Images/425a8e991821c11fcce4c034b9f8f912.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/425a8e991821c11fcce4c034b9f8f912.png)'
- en: 'It is possible to approximate the results with:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 可以用以下方式近似结果：
- en: '![](../Images/d0013d9cd0f39948c49b0cdcc55c4f5e.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d0013d9cd0f39948c49b0cdcc55c4f5e.png)'
- en: 'considering:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下因素：
- en: '![](../Images/d7c9de549eb9ce62693540f643a0d992.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d7c9de549eb9ce62693540f643a0d992.png)'
- en: Results
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果
- en: I chose an uninformative prior over the precision random variable. The naive
    model performs poorly, with a log loss of 0.60 and an AUC ROC of 0.50\. The second
    model performs better, with a log loss of 0.44 and an AUC ROC of 0.83, both when
    hyperoptimized using grid search and bayesian optimization. This indicates that
    the logistic regression model, which incorporates the dependent variables, outperforms
    the naive model. However, there is no advantage to using bayesian optimization
    over grid search, so I’ll continue with grid search for now. Thanks for reading.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我选择了一个对精度随机变量无信息的先验，原始模型表现不佳，对数损失为 0.60，AUC ROC 为 0.50。第二个模型表现更好，对数损失为 0.44，AUC
    ROC 为 0.83，这两个模型都通过网格搜索和贝叶斯优化进行了超参数优化。这表明，包含依赖变量的逻辑回归模型优于原始模型。然而，使用贝叶斯优化并没有比网格搜索有优势，所以我现在将继续使用网格搜索。感谢阅读。
- en: … But wait, I am thinking. Why are my parameters regularized with the same coefficient?
    Shouldn’t my prior depend on the underlying dependent variables? Perhaps the parameters
    for the first dependent variable could take higher values, while those for the
    second dependent variable, with its smaller influence, should be closer to zero.
    Let’s explore these new dimensions.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: … 但等等，我在思考。为什么我的参数使用相同的系数进行正则化？我的先验不应该依赖于基础依赖变量吗？也许第一个依赖变量的参数可以取更高的值，而第二个依赖变量，由于其较小的影响力，应该更接近于零。让我们探索这些新维度。
- en: Benchmark 2
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基准测试 2
- en: So far we have considered two techniques, the grid search and the bayesian optimization.
    We can use these same techniques in higher dimensions.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经考虑了两种技术，网格搜索和贝叶斯优化。我们可以在更高维度中使用这些相同的技术。
- en: Considering new dimensions could dramatically increase the number of nodes of
    my grid. This is why the bayesian optimization makes sense in higher dimensions
    to get the best regularization coefficients. In the considered use case, I have
    supposed there are 3 regularization parameters, one for each independent variable.
    After encoding a single variable, I assumed the generated new variables all shared
    the same regularization parameter. Hence the total regularization parameters of
    3, even if there are more than 3 columns as inputs of the logistic regression.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑新的维度可能会显著增加我的网格节点数量。这就是为什么在更高维度中使用贝叶斯优化来获取最佳正则化系数是有意义的。在考虑的用例中，我假设有 3 个正则化参数，每个独立变量一个。在编码单个变量后，我假设生成的新变量都共享相同的正则化参数。因此，总共有
    3 个正则化参数，即使有超过 3 列作为逻辑回归的输入。
- en: 'I updated the previous loss function with the following code:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我用以下代码更新了之前的损失函数：
- en: '[PRE3]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'With this approach, the metrics evaluated on the test dataset are the following:
    0.39 and 0.88, which are better than the initial model optimized by means of a
    grid search and a bayesian approach with only a single prior for all the independent
    variables.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 采用这种方法，在测试数据集上评估的指标如下：0.39 和 0.88，这比仅使用单个先验对所有独立变量进行网格搜索和贝叶斯优化的初始模型要好。
- en: '![Metrics achieved with the different methods on my use case.](../Images/89785b037f7133f407bef53c922d1d97.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![不同方法在我的用例中实现的指标。](../Images/89785b037f7133f407bef53c922d1d97.png)'
- en: Metrics achieved with the different methods on my use case.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的使用案例中，使用不同方法实现的度量。
- en: The use case can be reproduced with this [notebook](https://github.com/kapytaine/bayesian_optimisation/blob/master/notebooks/bayesian_optimization_instead_of_hyperoptimization_artificial_dataset.ipynb).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 使用案例可以通过这个[notebook](https://github.com/kapytaine/bayesian_optimisation/blob/master/notebooks/bayesian_optimization_instead_of_hyperoptimization_artificial_dataset.ipynb)重现。
- en: Limits
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 限制
- en: I have created an example to illustrate the usefulness of the technique. However,
    I have not been able to find a suitable real-world dataset to fully demonstrate
    its potential. While I was working with an actual dataset, I could not derive
    any significant benefits from applying this technique. If you come across one,
    please let me know – I would be excited to see a real-world application of this
    regularization method.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建了一个示例来展示这种技术的实用性。然而，我还没有找到合适的真实世界数据集来完全展示其潜力。在我使用实际数据集工作时，我无法从应用这种技术中获得任何显著的益处。如果你发现了这样的数据集，请告诉我——我很乐意看到这种正则化方法在真实世界中的应用。
- en: Conclusion
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, using bayesian optimization (with Laplace approximation if needed)
    to determine the best regularization parameters may be a good alternative to traditional
    hyperparameter tuning methods. By leveraging probabilistic models, bayesian optimization
    not only reduces the computational cost but also enhances the likelihood of finding
    optimal regularization values, especially in high dimension.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，使用贝叶斯优化（如果需要，可以使用拉普拉斯近似）来确定最佳正则化参数可能是一种比传统超参数调整方法更好的替代方案。通过利用概率模型，贝叶斯优化不仅降低了计算成本，还提高了找到最佳正则化值的可能性，尤其是在高维情况下。
