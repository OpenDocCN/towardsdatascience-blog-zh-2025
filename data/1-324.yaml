  zh: 卢卡斯和弗兰克在多家公司的AI基础设施上紧密合作（并为少数其他公司提供咨询）——从一些最早的多代理团队到LLM提供商管理，再到文档处理，再到企业AI自动化。我们在Databook工作，这是一个为世界上最大的科技公司（MSFT、AWS、Databricks、SalesForce等）提供前沿AI自动化平台的公司，我们通过使用被动/主动/引导AI为现实世界、企业生产应用提供一系列解决方案。
