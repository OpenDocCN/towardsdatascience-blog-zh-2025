- en: 'Tool Masking: The Layer MCP Forgot'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 工具屏蔽：MCP遗忘的层级
- en: 原文：[https://towardsdatascience.com/tool-masking-the-layer-mcp-forgot/](https://towardsdatascience.com/tool-masking-the-layer-mcp-forgot/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/tool-masking-the-layer-mcp-forgot/](https://towardsdatascience.com/tool-masking-the-layer-mcp-forgot/)
- en: By Frank Wittkampf & Lucas Vieira
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 由Frank Wittkampf和Lucas Vieira撰写
- en: <mdspan datatext="el1757011845328" class="mdspan-comment">Intro</mdspan>
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757011845328" class="mdspan-comment">简介</mdspan>
- en: 'MCP and similar services were a breakthrough in AI connectivity¹: a big leap
    forward when we need to expose services quickly and almost effortlessly to an
    LLM. But in that also lies the problem: this is bottom-up thinking. **“*Hey, why
    don’t we expose everything, everywhere, all at once?*”**'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: MCP和类似服务在AI连接性方面是一个突破：当我们需要快速且几乎毫不费力地将服务暴露给LLM时，这是一个巨大的进步。但这也带来了问题：这是一种自下而上的思维方式。**“嘿，我们为什么不一次性将所有东西都暴露出来呢？”**
- en: '**Raw exposure of APIs comes at a cost**: every tool surface pushed straight
    into an agent bloats prompts, inflates choice entropy, and drags down execution
    quality. A well-designed AI agent starts use-case down rather than tech-up. If
    you would design your LLM call from scratch, you would never provide the full
    unfiltered surface of an API. You’ve added unnecessary tokens, unrelated information,
    more failure modes, and generally degraded quality. Empirically, broad tool definitions
    consume large token budgets: e.g., one 28-parameter tool ≈1,633 tokens; 37 tools
    ≈6,218 tokens, which degrades accuracy and increases latency/cost⁶.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**原始API暴露存在成本**：直接推送到代理的每个工具表面都会膨胀提示，增加选择熵，并降低执行质量。一个设计良好的AI代理从用例开始而不是从技术开始。如果您从头开始设计您的LLM调用，您永远不会提供API的全表面。您添加了不必要的token、无关信息、更多失败模式，并总体上降低了质量。经验表明，广泛的工具定义消耗大量的token预算：例如，一个28参数的工具≈1,633个token；37个工具≈6,218个token，这会降低准确性并增加延迟/成本⁶。'
- en: In our job, building Enterprise-scale AI solutions for the largest tech companies
    (MSFT, AWS, Databricks, and many others), where we send millions of tokens a minute
    to our AI providers, these **nuances matter**. If you optimize tool exposure,
    that means you optimize your LLM execution context, which means you are improving
    quality, accuracy, consistency, cost, and latency, *all at the same time*.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的工作中，为最大的科技公司（MSFT、AWS、Databricks等）构建企业级AI解决方案，我们每分钟向我们的AI提供商发送数百万个token，这些**细微之处很重要**。如果您优化工具暴露，这意味着您优化了您的LLM执行上下文，这意味着您正在提高质量、准确性、一致性、成本和延迟，**同时进行**。
- en: This article will define the novel concept of **Tool masking**. Many people
    will already have implicitly experimented with this, but it’s a topic not well
    explored in online publications so far. Tool masking is an essential, and missing
    layer in the current agentic stack. A tool mask shapes what the model actually
    sees, both before and after execution, so your AI agent can not just be *connected*
    but actually *enabled.*
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 本文将定义新的概念**工具屏蔽**。许多人可能已经隐式地尝试过这个概念，但迄今为止，这个主题在在线出版物中并未得到很好的探索。工具屏蔽是当前代理堆栈中一个必要且缺失的层级。工具屏蔽塑造了模型在执行前后实际看到的内容，因此您的AI代理不仅可以连接，而且实际上可以启用。
- en: 'So, rounding up our intro: **using raw MCP pollutes your LLM execution**. How
    do you optimize the model-facing surface of a tool for a given agent or task?
    You use tool masking. A simple concept, but as always, the devil is in the details.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，总结我们的简介：**使用原始MCP会污染您的LLM执行**。您如何优化特定代理或任务的工具面向模型的面板？您使用工具屏蔽。这是一个简单的概念，但正如往常一样，魔鬼在细节中。
- en: What MCP does well, and what it doesn’t
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MCP做得好的地方和不好的地方
- en: 'MCP gets a lot right. It’s an open protocol, and Anthropic refers to it as
    the “USB-C for AI”. A way to connect LLM apps with external tools and data without
    friction¹. It nails the basics: standardizing how tools, resources, and prompts
    are described, discovered, and invoked, whether you’re using JSON-RPC over stdio
    or streaming over HTTP². Auth is handled cleanly at the transport layer³. That’s
    why you see it landing everywhere from OpenAI’s Agents SDK to Copilot in VS Code,
    all the way to AWS guidance⁴. **MCP is real, and adoption is strong**.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: MCP做得很好。它是一个开放协议，Anthropic将其称为“AI的USB-C”。一种连接LLM应用与外部工具和数据的无摩擦方式。它解决了基础问题：标准化工具、资源和提示的描述、发现和调用方式，无论您是使用JSON-RPC
    over stdio还是通过HTTP进行流式传输²。身份验证在传输层³得到妥善处理。这就是为什么您会看到它在从OpenAI的Agents SDK到VS Code中的Copilot，再到AWS指南⁴等各个地方都有应用。**MCP是真实的，并且应用广泛**。
- en: But it’s equally important to see what MCP doesn’t do – and that’s where the
    gaps show up. **MCP’s focus is context exchange**. It doesn’t care how your app
    or agent actually *uses* the context you pass in, or how you manage and shape
    that context per agent or task. It exposes the full tool surface, but doesn’t
    shape or filter it for quality or relevance. Per the architecture docs, MCP “focuses
    solely on the protocol for context exchange. It does not dictate how AI applications
    use LLMs or manage the provided context².” You get a discoverable catalog and
    schemas, but no built-in mechanism in the *protocol* that allows to optimize how
    the context is presented.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，了解MCP不做什么同样重要——这正是差距所在。**MCP的焦点是上下文交换**。它不关心你的应用程序或代理如何实际*使用*你传递的上下文，或者你如何根据代理或任务管理并塑造该上下文。它暴露了完整的工具表面，但不对其进行塑造或过滤以优化质量或相关性。根据架构文档，MCP“仅关注上下文交换的协议。它不规定AI应用程序如何使用LLM或管理提供上下文²。”你得到一个可发现的目录和模式，但没有在*协议*中内置的机制来优化上下文的呈现方式。
- en: 'Note: Some SDKs now add optional filtering — for example, OpenAI’s Agents SDK
    supports static/dynamic MCP tool filtering⁵ . This is a step in the right direction,
    but still leaves too much on the table.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：一些SDK现在添加了可选的过滤功能——例如，OpenAI的Agents SDK支持静态/动态MCP工具过滤⁵。这是朝着正确方向迈出的一步，但仍然留下了太多空间。
- en: 1\. [Anthropic MCP overview](https://docs.anthropic.com/en/docs/mcp)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 1. [Anthropic MCP概述](https://docs.anthropic.com/en/docs/mcp)
- en: 2\. [Model Context Protocol — Architecture](https://modelcontextprotocol.io/docs/learn/architecture)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 2. [模型上下文协议——架构](https://modelcontextprotocol.io/docs/learn/architecture)
- en: 3\. [MCP Spec — Authorization](https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 3. [MCP规范——授权](https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization)
- en: 4\. [OpenAI Agents SDK (MCP)](https://openai.github.io/openai-agents-python/mcp);
    [VS Code MCP GA](https://github.blog/changelog/2025-07-14-model-context-protocol-mcp-support-in-vs-code-is-generally-available);
    [AWS — Unlocking MCP](https://aws.amazon.com/blogs/machine-learning/unlocking-the-power-of-model-context-protocol-mcp-on-aws)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 4. [OpenAI Agents SDK (MCP)](https://openai.github.io/openai-agents-python/mcp);
    [VS Code MCP GA](https://github.blog/changelog/2025-07-14-model-context-protocol-mcp-support-in-vs-code-is-generally-available);
    [AWS——解锁MCP](https://aws.amazon.com/blogs/machine-learning/unlocking-the-power-of-model-context-protocol-mcp-on-aws)
- en: '5\. [GitHub — PR #861 (MCP tool filtering)](https://github.com/openai/openai-agents-python/pull/861)'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '5. [GitHub——PR #861 (MCP工具过滤)](https://github.com/openai/openai-agents-python/pull/861)'
- en: 6\. [Medium — How many tools/functions can an AI Agent have?](https://achan2013.medium.com/how-many-tools-functions-can-an-ai-agent-has-21e0a82b7847)
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 6. [Medium——一个AI代理可以有多少工具/函数？](https://achan2013.medium.com/how-many-tools-functions-can-an-ai-agent-have-21e0a82b7847)
- en: The Problem in Practice
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实践中的问题
- en: 'To illustrate this, let’s take the (unofficial) Yahoo Finance API. Like many
    APIs, it returns a giant JSON object filled with dozens of metrics. Powerful for
    analysis, but overwhelming when your agent simply needs to retrieve one or two
    key figures. To illustrate my point, here’s a snippet of what the agent might
    receive when calling the API:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这一点，让我们以（非官方的）Yahoo Finance API为例。像许多API一样，它返回一个包含数十个指标的巨大JSON对象。对于分析来说很强大，但当你的代理只需要检索一个或两个关键数字时，就会感到压倒性。为了说明我的观点，这里是一个代理在调用API时可能收到的片段：
- en: '[PRE0]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'For an agent, getting a 100 fields of data, among other tool output, is overwhelming:
    irrelevant data, bloated prompts, and wasted tokens. It’s obvious that **accuracy
    goes down as tool counts and schema sizes grow**; researchers have shown that
    as the toolset expands, retrieval and invocation reliability drops sharply¹, and
    inputting every tool into the LLM quickly becomes impractical due to context length
    and latency constraints². This obviously depends on the model, but as models grow
    more capable, tool demands are increasing as well. Even state-of-the-art models
    still struggle to effectively select tools in large tool libraries³.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个代理来说，获取100个字段的数据，包括其他工具输出，是令人压倒性的：无关数据、膨胀的提示和浪费的标记。很明显，**随着工具数量和模式大小的增加，准确性会下降**；研究人员已经表明，随着工具集的扩大，检索和调用可靠性会急剧下降¹，而且由于上下文长度和延迟限制，将每个工具输入到LLM中很快就会变得不切实际²。这显然取决于模型，但随着模型能力的增强，工具需求也在增加。即使是最先进的模型，在大型工具库中有效地选择工具仍然很困难³。
- en: 'The problem is not limited to tool output. **The more important problem is
    the API input schema**. Going back to our example, for the Yahoo Finance API,
    you can request any combination of modules: assetProfile, financialData, price,
    earningsTrend, and many more. If you expose this schema to your agent raw, through
    MCP (or fastAPI, etc.), you’ve just massively polluted your agent context. At
    massive scale, this becomes even more challenging; recent work notes that LLMs
    operating on very large tool graphs require new approaches such as structured
    scoping or graph-based methods⁴.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 问题不仅限于工具输出。**更重要的是API输入模式**。回到我们的例子，对于Yahoo Finance API，你可以请求任何模块的组合：assetProfile、financialData、price、earningsTrend以及更多。如果你通过MCP（或fastAPI等）以原始方式向代理暴露此模式，你已大量污染了代理上下文。在巨大规模下，这变得更加具有挑战性；最近的工作指出，在非常大的工具图上运行的LLMs需要新的方法，如结构化范围界定或基于图的方法⁴。
- en: Tool definitions consume tokens in every conversation turn; empirical benchmarks
    show that large, multi-parameter tools and **big toolsets quickly dominate your
    prompt budget**⁵. Without a filtering or rewriting layer, the accuracy and efficiency
    of your AI agent degrade⁶.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 工具定义在每次对话回合中都会消耗token；经验基准显示，大型多参数工具和**大型工具集很快就会耗尽你的提示预算**⁵。没有过滤或重写层，你的AI代理的准确性和效率会下降⁶。
- en: '[Re-Invoke: Tool Invocation Rewriting for Zero-Shot Tool Retrieval](https://arxiv.org/abs/2408.01875)
    *“Identifying the most relevant tools … becomes a key bottleneck as the toolset
    size grows, hindering reliable tool utilization.”*'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[Re-Invoke：零样本工具检索的重写](https://arxiv.org/abs/2408.01875) *“随着工具集大小的增加，识别最相关的工具…成为了一个关键瓶颈，阻碍了可靠工具的利用。”*'
- en: '[Towards Completeness-Oriented Tool Retrieval for LLMs](https://arxiv.org/abs/2405.16089)
    *“…it is impractical to input all tools into LLMs due to length limitations and
    latency constraints.*'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[面向LLMs的完整性导向工具检索](https://arxiv.org/abs/2405.16089) *“…由于长度限制和延迟约束，将所有工具输入到LLMs中是不切实际的。”*'
- en: '[Deciding Whether to Use Tools and Which to Use](https://arxiv.org/abs/2310.03128)
    *“…the majority [of LLMs] still struggle to effectively select tools…”*'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[决定是否使用工具以及使用哪个工具](https://arxiv.org/abs/2310.03128) *“…大多数[LLMs]仍然难以有效地选择工具…”*'
- en: '[ToolNet: Connecting LLMs with Massive Tools via Tool Graph](https://arxiv.org/abs/2403.00839)
    *“It remains challenging for LLMs to operate on a library of massive tools,”*
    motivating graph-based scoping.'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[ToolNet：通过工具图将LLMs与大量工具连接起来](https://arxiv.org/abs/2403.00839) *“LLMs在大型工具库上操作仍然具有挑战性，”*这促使基于图的范围界定。'
- en: '[How many tools/functions can an AI Agent have?](https://achan2013.medium.com/how-many-tools-functions-can-an-ai-agent-has-21e0a82b7847)
    (Feb 2025): reports that a tool with 28 params consumed 1,633 tokens; a set of
    37 tools consumed 6,218 tokens.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[一个AI代理可以有多少工具/函数？](https://achan2013.medium.com/how-many-tools-functions-can-an-ai-agent-has-21e0a82b7847)（2025年2月）：报告称一个具有28个参数的工具消耗了1,633个token；一组37个工具消耗了6,218个token。'
- en: '[Benchmarking Tool Retrieval for LLMs (ToolRet)](https://arxiv.org/abs/2503.01763)
    Large-scale benchmark showing tool retrieval is hard even for strong IR models.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[LLMs的工具检索基准测试（ToolRet）](https://arxiv.org/abs/2503.01763) 大规模基准测试表明，即使是强大的IR模型，工具检索也很困难。'
- en: 'Here’s a sample tool definition if you expose the raw API without making a
    custom tool for it (this has been shortened for readability):'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个示例工具定义，如果你不为其创建自定义工具而直接暴露原始API（为了可读性已缩短）：
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The Fix
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 修复问题
- en: 'Here’s the real unlock: *with tool masking, you’re in control of the surface
    you present to your agent*. You aren’t forced to expose the entire API, and you
    don’t have to recode your integrations for every new use case.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是真正的突破：*通过工具掩码，你控制着呈现给代理的表面*。你不必被迫暴露整个API，也不必为每个新的用例重新编码你的集成。
- en: Want the agent to only ever fetch the latest stock quote? Build a mask that
    presents just that action as a simple tool.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 想让代理只获取最新的股票报价？构建一个只展示该操作的简单工具的掩码。
- en: Need to support multiple distinct tasks, like fetching a quote, extracting only
    revenue, or maybe toggling between price types? You can design **multiple narrow
    tools**, each with its own mask on top of the same underlying tool handler.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 需要支持多个不同的任务，比如获取报价、仅提取收入，或者可能在价格类型之间切换？你可以设计**多个窄工具**，每个工具都拥有自己覆盖在相同底层工具处理器上的掩码。
- en: Or, you might combine related actions into a single tool and give the agent
    an explicit toggle or enum, whatever interface matches the agent’s context and
    task.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，你可以将相关的操作组合成一个单一的工具，并为代理提供一个明确的切换或枚举，无论哪种接口都符合代理的上下文和任务。
- en: Wouldn’t it be nicer if the agent only saw very simple, purpose-built tools,
    like these?
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果代理只能看到非常简单、专为特定目的设计的工具，比如这些，岂不是更好？
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: or
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 或者
- en: '[PRE3]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The underlying code uses the same handler. No need to duplicate logic or force
    the agent to reason about the full module surface. Just different masks for different
    jobs — no module lists, no bloat, no recoding*.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 基础代码使用相同的处理器。无需重复逻辑或迫使代理对整个模块表面进行推理。只需为不同的工作提供不同的屏蔽——无需模块列表，无需膨胀，无需重新编码*。
- en: '* This aligns with guidance to use only essential tools, minimize parameters,
    and, where possible, activate tools dynamically for a given interaction.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '* 这与使用仅必要工具、最小化参数以及尽可能动态激活给定交互的工具的指导方针相一致。'
- en: The power of tool masking
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工具屏蔽的力量
- en: 'The point: **Tool masking is not just about hiding complexity.** It’s about
    *designing the right agent-facing surface for the job at hand*.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 重点：**工具屏蔽不仅仅是隐藏复杂性**。它是关于*为当前任务设计正确的代理界面*。
- en: You can expose an API as one tool or many.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以将API作为单一工具或多个工具暴露。
- en: You can tune what’s required, optional, or even fixed (hard-coded values).
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以调整所需的、可选的，甚至固定的（硬编码的值）。
- en: You can present different masks to different agents, based on role, context,
    or business logic.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以根据角色、上下文或业务逻辑向不同的代理展示不同的屏蔽。
- en: You can refactor the surface at any time — without rewriting the handler or
    backend code.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以在任何时候重构表面——而不需要重写处理器或后端代码。
- en: This isn’t just technical hygiene — it’s a strategic design decision. It lets
    you ship cleaner, leaner, more robust agents that do exactly what’s needed, no
    more and no less.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是技术卫生，而是一个战略设计决策。它让你能够发布更干净、更精简、更健壮的代理，这些代理正好完成所需的工作，不多也不少。
- en: 'This is the power of **tool masking**:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是**工具屏蔽**的力量：
- en: Start with a broad, messy API surface
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一个宽泛、混乱的API表面开始
- en: Define as many narrow masks as needed — one for each agent use case
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要定义尽可能多的窄屏蔽，每个代理用例一个。
- en: Present only what matters (and nothing more) to the model
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 只向模型展示重要的内容（而不是更多）。
- en: The result? Smaller prompts, faster responses, fewer misfires — and agents that
    get it right, every time. Why does this matter so much, especially at enterprise
    scale?
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 结果？更小的提示，更快的响应，更少的误操作——以及每次都能做对的代理。为什么这在企业规模上如此重要？
- en: '**Choice entropy**: When the model is overloaded with options, it’s more likely
    to misfire or select the wrong fields'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择熵**：当模型被选项过载时，它更有可能出错或选择错误的字段。'
- en: '**Performance**: Extra tokens mean higher cost, more latency, lower performance,
    less accuracy, less consistency'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能**：额外的标记意味着更高的成本、更多的延迟、更低的性能、更低的准确性、更低的一致性'
- en: '**Enterprise scale**: When you’re sending millions of tokens per minute, small
    inefficiencies quickly add up. Precision matters. Fault tolerance is lower. (*Large
    tool outputs can also echo through histories and balloon spend*)¹'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**企业规模**：当你每分钟发送数百万个标记时，小的低效很快就会累积。精确度很重要。容错性较低。（*大型工具输出也可能在历史中回响并增加支出*）¹'
- en: 1\. [Everything Wrong with MCP](https://blog.sshh.io/p/everything-wrong-with-mcp)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 1. [MCP的所有错误](https://blog.sshh.io/p/everything-wrong-with-mcp)
- en: The Solution
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: At the heart of robust tool masking is a clean separation of concerns.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 强健的工具屏蔽的核心在于关注点的清晰分离。
- en: First, you have the **tool handler** — this is the raw integration, whether
    it’s a third-party API, internal service, or direct function call. The handler’s
    job is simply to expose the *complete* capability surface, with all its power
    and complexity.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你有**工具处理器**——这是原始集成，无论是第三方API、内部服务还是直接函数调用。处理器的任务仅仅是暴露*完整*的能力表面，包括其所有的功能和复杂性。
- en: Next comes the **tool mask**. The mask defines the *model-facing interface* — a
    narrow schema, tailored input and output, and sensible defaults for the agent’s
    use case or role. This is where the broad, messy surface of the underlying tool
    is slimmed down to exactly what’s needed (and nothing more).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是**工具屏蔽**。屏蔽定义了*模型界面*——一个狭窄的架构，定制输入和输出，以及针对代理用例或角色的合理默认值。这就是底层工具的广泛、混乱表面被缩减到正好所需的内容（而不是更多）。
- en: In between sits the **tooling service**. This is the mediator that applies the
    mask, validates the input, translates agent requests into handler calls, and validates
    or sanitizes responses before returning them to the model.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在中间位置是**工具服务**。这是应用屏蔽、验证输入、将代理请求转换为处理器调用，并在返回给模型之前验证或清理响应的调解者。
- en: '![](../Images/a83afd896f6860932a28cf754ad53883.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a83afd896f6860932a28cf754ad53883.png)'
- en: '*^(High Level Overview— Tool Masks)*'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '*^(高级概述——工具屏蔽)*'
- en: Ideally, you store and manage tool masks in the same place that you store all
    your other agent/system prompts, because, in practice, presenting a tool to an
    LLM is a form of prompt engineering.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，你将工具掩码存储和管理在与所有其他代理/系统提示相同的地方，因为在实践中，向LLM展示工具是一种提示工程。
- en: Let’s review an example of an actual tool mask. Our definition of a tool mask
    has evolved over the last few years¹. Starting as a simple filter, to a full enterprise
    service, used by the largest tech companies in the world.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一个实际的工具掩码示例。我们过去几年对工具掩码的定义已经发生了变化。最初是一个简单的过滤器，后来发展成为一个完整的企业服务，被世界上最大的科技公司使用。
- en: 1\. Initially (in 2023), we started with simple input/output adapters, but over
    as we worked across several companies and many use cases, it has evolved to a
    full prompt engineering surface.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 初始阶段（在2023年），我们开始使用简单的输入/输出适配器，但随着我们在多个公司和许多用例中工作，它已经发展成为一个完整的提示工程界面。
- en: Tool mask example
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 工具掩码示例
- en: '[PRE4]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The example above should speak for itself, but let’s highlight a few characteristics:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 上述示例应该已经足够说明问题，但让我们强调几个特点：
- en: The mask translates the input (provided by the AI agent) to a handler_input
    (what the will API receive)
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 掩码将输入（由AI代理提供）转换为处理程序输入（API将接收的内容）
- en: The handler for this particular tool is an API, it could just as well have been
    any other service. The service could have other masks on top of it, which pull
    other data out of the same API
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个特定工具的处理程序是一个API，它也可以是任何其他服务。该服务可以在其上添加其他掩码，从而从同一个API中提取其他数据
- en: The mask allows for Jinja*. This allows for powerful prompt engineering
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 掩码允许使用Jinja*。这允许强大的提示工程
- en: A custom validation is very powerful if you want to add specific nudges that
    steer the AI agent to self-correct its mistakes
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想要添加特定的引导，使AI代理自我纠正错误，自定义验证非常强大
- en: The session_id and the module are hard-coded into the template. The AI agent
    isn’t able to modify these
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: session_id和模块被硬编码到模板中。AI代理无法修改这些
- en: '*Note: if you’re doing this in a nodeJS environment, EJS is great for this
    as well.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：如果你在nodeJS环境中做这件事，EJS也非常适合。*'
- en: With this architecture, you can flexibly add, remove, or modify tool masks without
    ever touching the underlying handler or agent code. Tool masking becomes a “configurable
    prompt engineering” layer, supporting rapid iteration, testing, and robust, role-
    or use-case-specific agent behavior.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种架构下，你可以灵活地添加、删除或修改工具掩码，而无需触及底层处理程序或代理代码。工具掩码成为了一个“可配置的提示工程”层，支持快速迭代、测试和稳健的角色或用例特定的代理行为。
- en: Hey, it’s almost as if a tool has become a prompt…
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 嘿，这几乎就像一个工具变成了提示...
- en: The Overlooked Prompt Engineering Surface
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 被忽视的提示工程表面
- en: Tools are prompts. It’s interesting that in today’s AI blogs, there’s little
    reference of it. An LLM receives text and then generates text. Tool names, tool
    descriptions, and their input schemas are part of the incoming text. **Tools are
    prompts, just with a special flavor.**
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 工具是提示。有趣的是，在今天的AI博客中，对此的参考很少。一个LLM接收文本然后生成文本。工具名称、工具描述以及它们的输入模式都是输入文本的一部分。**工具是提示，只是带有特殊的味道。**
- en: 'When your code makes an LLM call, the model reads the full prompt input, and
    then decides whether and how to call a tool¹²³. If we conclude that tools are
    essentially prompts, then I hope while you’re reading this you’re having the following
    realization:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的代码调用LLM时，模型会读取完整的提示输入，然后决定是否以及如何调用工具¹²³。如果我们得出结论，工具本质上就是提示，那么我希望你在阅读这篇文章时，会有以下的认识：
- en: '*Tools need to be prompt engineered, and thus any prompt engineering technique
    I have at my disposal also should be applied to my tooling:*'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '*工具需要经过提示工程，因此我拥有的任何提示工程技术也应该应用到我的工具上：*'
- en: '*Tools are context dependent! Tool descriptions should fit with the rest of
    the prompt context.*'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*工具是上下文相关的！工具描述应该与提示上下文的其他部分相匹配。*'
- en: '*Tool naming matters, a lot!*'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*工具命名非常重要！*'
- en: '*Tool input surface adds tokens and complexity, and thus needs to be optimized.*'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*工具输入界面增加了标记和复杂性，因此需要优化。*'
- en: '*Similarly for the tool output surface.*'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*同样，对于工具输出界面。*'
- en: '*The framing and phrasing of tool error responses matters, an agent will self-correct
    if you provide it the right response.*'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*工具错误响应的框架和措辞很重要，如果提供正确的响应，代理将自我纠正。*'
- en: In practice, I see many examples where engineers provide extensive instructions
    regarding a specific tool’s use in the main prompt of the agent. This is a practice
    that we should question. **Should the instructions on how to use a tool reside
    in the larger agent-prompt, or with the tool**? Some tools need only a short summary;
    others benefit from richer guidance, examples, or edge-case notes so the model
    selects them reliably and formats arguments correctly. With masking, you can adapt
    the same underlying API to different agents and contexts by tailoring the tool
    description and schema per mask. Keeping that guidance co-located with the tool
    surface stabilizes the contract and avoids drifting chat prompts (see Anthropic’s
    *Tool use* and *Best practices for tool definitions*). When you also specify output
    structure, you improve consistency and parse-ability¹. **Masks make this editable
    by prompt engineers instead of burying it in (Python) code**.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，我看到许多工程师在代理的主要提示中提供了关于特定工具使用的详细说明。这是一个我们应该质疑的做法。**使用工具的说明应该位于更大的代理提示中，还是与工具一起**？一些工具只需要简短的摘要；而其他工具则受益于更丰富的指导、示例或边缘情况说明，以便模型能够可靠地选择它们并正确格式化参数。通过面具，您可以通过针对每个面具定制工具描述和模式，将相同的底层API适应不同的代理和上下文。将此指导与工具界面保持一致，可以稳定合同并避免聊天提示漂移（参见Anthropic的*工具使用*和*工具定义的最佳实践*）。当您还指定输出结构时，您可以提高一致性和可解析性¹。**面具使提示工程师可以编辑它，而不是将其埋藏在（Python）代码中**。
- en: Operationally, we should treat masks as configurable prompts for tools. Practically,
    we recommend that you store the masks in the same layer that hosts your prompts.
    Ideally, this is a config system that supports templating (e.g., Jinja), variables,
    and evaluation. Those concepts are equally usable for tool masks as for your regular
    prompts. Additionally, we recommend you version them, scope by agent or role,
    and use these tool masks to fix defaults, hide unused params, or split one broad
    handler into multiple clear surfaces. Tool masks also have security benefits,
    allowing specific params are provided by the system, instead of the LLM. (*Independent
    critiques also highlight cost/safety risks from unbounded tool outputs. Yet another
    reason to constrain surfaces⁴.*)
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在操作层面，我们应该将面具视为工具的可配置提示。实际上，我们建议您将面具存储在与您的提示相同的层中。理想情况下，这是一个支持模板（例如，Jinja）、变量和评估的配置系统。这些概念对于工具面具和常规提示同样适用。此外，我们建议您对其进行版本控制，按代理或角色进行范围划分，并使用这些工具面具来设置默认值、隐藏未使用的参数，或将一个宽泛的处理程序拆分为多个清晰的界面。工具面具还具有安全优势，允许系统提供特定的参数，而不是LLM。(*独立的评论也突出了无界工具输出的成本/安全风险。这是限制界面的另一个原因⁴.*)
- en: Done well, masking extends prompt engineering to the tool boundary where the
    model actually acts, yielding cleaner behavior and more consistent execution.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如果做得好，面具可以将提示工程扩展到模型实际作用的工具边界，从而产生更干净的行为和更一致的执行。
- en: 1\. [Anthropic — Tool Use Overview](https://docs.anthropic.com/en/docs/agents-and-tools/tool-use/overview)
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. [Anthropic — 工具使用概述](https://docs.anthropic.com/en/docs/agents-and-tools/tool-use/overview)
- en: 2\. [OpenAI — Tools Guide](https://platform.openai.com/docs/guides/tools)
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. [OpenAI — 工具指南](https://platform.openai.com/docs/guides/tools)
- en: 3\. [OpenAI Cookbook — Prompting Guide](https://cookbook.openai.com/examples/gpt4-1_prompting_guide)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. [OpenAI食谱 — 提示指南](https://cookbook.openai.com/examples/gpt4-1_prompting_guide)
- en: 4\. [Everything Wrong with MCP](https://blog.sshh.io/p/everything-wrong-with-mcp)
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. [MCP的所有错误](https://blog.sshh.io/p/everything-wrong-with-mcp)
- en: Design Patterns
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设计模式
- en: A few simple patterns cover most masking needs. Start with the smallest surface
    that works, then expand only when a task truly demands it.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 几种简单的模式可以覆盖大多数面具需求。从最小的有效界面开始，然后在真正需要时再进行扩展。
- en: '**Schema Shrink**: Limit parameters to what the task needs; constrain types
    and ranges; prefill invariants.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模式收缩**：限制参数到任务所需的范围；约束类型和范围；预先填充不变量。'
- en: '**Role-Scoped View**: Present different masks to different agents or contexts;
    same handler, tailored surfaces.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**角色范围视图**：向不同的代理或上下文展示不同的面具；相同的处理程序，定制界面。'
- en: '**Capability Gate**: Expose a focused subset of operations; split a mega-tool
    into single-purpose tools; enforce allowlists.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**能力门控**：暴露操作的一个专注子集；将大型工具拆分为单一用途的工具；执行允许列表。'
- en: '**Defaulted Args**: Set smart defaults and hide nonessential options to cut
    tokens and variance.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**默认参数**：设置智能默认值并隐藏非必要选项以减少令牌和变异性。'
- en: '**System-Provided Args**: Inject tenant, account, region, or policy values
    from the system; the LLM cannot change them, which improves security and consistency.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统提供的参数**: 从系统中注入租户、账户、区域或策略值；LLM无法更改它们，这提高了安全性和一致性。'
- en: '**Toggle/Enum Surface**: Combine related actions into one tool with an explicit
    enum or mode; no free-text switches.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**切换/枚举表面**: 将相关操作组合成一个具有显式枚举或模式的工具；不允许自由文本开关。'
- en: '**Typed Outputs**: Return a small, strict schema; normalize units and keys
    for reliable parsing and evaluation.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类型化输出**: 返回一个小型、严格的模式；标准化单位和键以实现可靠的解析和评估。'
- en: '**Progressive Disclosure**: Ship the minimal mask first; add optional fields
    via new mask versions only when needed.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**渐进式披露**: 首先发送最小掩码；仅在需要时通过新的掩码版本添加可选字段。'
- en: '**Validation**: Allow custom input validation at tool mask level; set constructive
    validation responses to guide the agent in the right direction'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验证**: 允许在工具掩码级别进行自定义输入验证；设置建设性的验证响应以引导代理走向正确的方向'
- en: Conclusion
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Connectivity solved the what. Execution is the how. Services like MCP connect
    tools. **Tool masking** makes them perform by shaping the model-facing surface
    to fit the task and the agent that are working with it.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 连接性解决了“什么”。执行是“如何”。像MCP这样的服务连接工具。**工具掩码**通过调整模型面对的表面以适应任务和与之一起工作的代理来使它们表现良好。
- en: Think **use case down, not tech up**. One handler, many masks. Narrow inputs,
    outputs, and experiment and prompt engineer your tool surface to perfection. Keep
    the description with the tool, not buried in chat text or code. Treat masks as
    configurable prompts that you can version, test, and assign per agent.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**从用例出发，而不是从技术出发**。一个处理程序，多个掩码。狭窄的输入、输出，并实验和提示工程师您的工具表面以达到完美。将描述与工具一起保留，而不是埋藏在聊天文本或代码中。将掩码视为可配置的提示，您可以对其进行版本控制、测试，并按代理分配。'
- en: 'If you expose raw surfaces, **you pay for entropy**: more tokens, slower latency,
    lower accuracy, inconsistent behavior. Masks flip that curve. Smaller prompts.
    Faster responses. Higher pass rates. Fewer misfires. The impact of this approach
    compounds at enterprise scale. (*Even MCP advocates note that discovery lists
    everything, without curation, and that agents send/consider too much data.*)'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您暴露原始表面，**您将支付熵的成本**：更多令牌，更慢的延迟，更低的准确性，行为不一致。掩码翻转这一曲线。更小的提示。更快的响应。更高的通过率。更少的误操作。这种方法在企业规模上的影响是累积的。（*甚至MCP的倡导者也指出，发现列表包含所有内容，但没有经过筛选，并且代理发送/考虑的数据太多。*）
- en: '**So, what to do?**'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**那么，我们应该做什么？**'
- en: Put a masking layer between agents and every broad API
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在代理和每个广泛API之间放置一个掩码层
- en: Try multiple masks on one handler, and customizing a mask to see how it impacts
    performance
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试在一个处理程序上使用多个掩码，并定制掩码以查看它对性能的影响
- en: Store masks with your prompts in config; version and iterate
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将掩码与您的提示一起存储在配置中；进行版本控制和迭代
- en: Move tool instructions into the tool surface, and out of system prompts.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将工具说明移入工具表面，并从系统提示中移除。
- en: Provide sensible defaults, and hide what the model should not touch
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供合理的默认值，并隐藏模型不应接触的内容
- en: Stop shipping mega tools. Ship surfaces. That is the layer MCP forgot. The step
    that turns an agent from connected into **enabled**.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 停止分发大型工具。分发表面。这是MCP遗忘的层。将代理从连接转变为**启用**的步骤。
