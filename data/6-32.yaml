- en: 'Encapsulation: A Software Engineering Concept Data Scientists Must Know To
    Succeed'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 封装：数据科学家必须了解以成功为前提的软件工程概念
- en: 原文：[https://towardsdatascience.com/encapsulation-a-software-engineering-concept-data-scientists-must-know-to-succeed-b3b1a0a42a41/](https://towardsdatascience.com/encapsulation-a-software-engineering-concept-data-scientists-must-know-to-succeed-b3b1a0a42a41/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/encapsulation-a-software-engineering-concept-data-scientists-must-know-to-succeed-b3b1a0a42a41/](https://towardsdatascience.com/encapsulation-a-software-engineering-concept-data-scientists-must-know-to-succeed-b3b1a0a42a41/)
- en: '![Photo by Max Chen on Unsplash](../Images/430b4741261efdb0baa82dc97c710ecb.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![照片由 Max Chen 在 Unsplash 上拍摄](../Images/430b4741261efdb0baa82dc97c710ecb.png)'
- en: Photo by [Max Chen](https://unsplash.com/@maxchen2k?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 照片由 [Max Chen](https://unsplash.com/@maxchen2k?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 上拍摄
- en: Why You Should Read This Article
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你应该阅读这篇文章
- en: 'Data science attracts a variety of different backgrounds. From my professional
    experience, I’ve worked with colleagues who were once:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学吸引了各种不同的背景。根据我的专业经验，我曾与曾是：
- en: Nuclear Physicists
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 核物理学家
- en: Post-docs researching Gravitational Waves
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究引力波的后博士
- en: PhD’s in Computational Biology
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算生物学博士
- en: Linguists
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语言学家
- en: just to name a few.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 只举几个例子。
- en: It is wonderful to be able to meet such a diverse set of backgrounds and I have
    seen such a variety of minds lead to the growth of a creative and effective Data
    Science function.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 能够遇到这样多样化的背景真是令人愉快，我看到了各种不同的思维如何导致一个富有创造力和有效性的数据科学功能的成长。
- en: 'However, I have also seen one big downside to this variety:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我也看到了这种多样性的一个重大缺点：
- en: Everyone has had different levels of exposure to key Software Engineering concepts,
    resulting in a patchwork of coding skills.
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 每个人对关键软件工程概念的了解程度不同，导致编程技能参差不齐。
- en: 'As a result, I have seen work done by some data scientists that is brilliant,
    but is:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我看到了一些数据科学家完成的工作非常出色，但却是：
- en: Unreadable – you have no idea what they are trying to do.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不可读的——你不知道他们试图做什么。
- en: Flaky – it breaks the moment someone else tries to run it.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不稳定的——一旦有人尝试运行它就会崩溃。
- en: Unmaintainable – code quickly becomes obsolete or breaks easily.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不可维护的——代码很快就会过时或容易损坏。
- en: Un-extensible – code is single use and its behaviour cannot be extended.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不可扩展的——代码是一次性使用，其行为无法扩展。
- en: …which ultimately dampens the impact their work can have and creates all sorts
    of issues down the line.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: …这最终削弱了他们工作的影响力，并导致了一系列问题。
- en: unreadable code means bugs go unnoticed,
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不可读的代码意味着错误被忽视，
- en: unnoticed bugs break models and/or data pipelines,
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 未注意到的错误会破坏模型和/或数据管道，
- en: meanwhile, it takes some days, if at all, to even find the bug because the code
    is unreadable
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 同时，即使找到错误也需要花费几天时间，因为代码不可读
- en: whilst the original writer of the code has since left the company, so you can’t
    get help,
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尽管代码的原始作者已经离开公司，因此无法获得帮助，
- en: leading to models being re-trained from scratch, data-pipelines being re-written,
    entire projects being redone.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导致模型需要从头开始重新训练，数据管道需要重新编写，整个项目需要重新做。
- en: '![Photo by David Pupăză on Unsplash](../Images/18418e194042911a2f38ebd5c7553272.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![照片由 David Pupăză 在 Unsplash 上拍摄](../Images/18418e194042911a2f38ebd5c7553272.png)'
- en: Photo by [David Pupăză](https://unsplash.com/@davfts?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 照片由 [David Pupăză](https://unsplash.com/@davfts?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 上拍摄
- en: '* * *'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: So, in a series of articles, I plan to outline some core software engineering
    concepts that I have tailored to be necessities for data scientists.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在一系列文章中，我计划概述一些核心的软件工程概念，这些概念是我针对数据科学家量身定制的。
- en: '**They are simple concepts, but the difference between knowing them vs not
    knowing them clearly draws the line between amateur and professional.**'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**这些概念很简单，但了解它们与不了解它们之间的区别，明显区分了业余和专业人士。**'
- en: If you are planning to go into data science, be it a graduate or a professional
    looking for a career change, or a manager in charge of establishing best practices,
    this article is for you.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你打算进入数据科学领域，无论是毕业生还是寻找职业转变的专业人士，或者负责建立最佳实践的管理者，这篇文章是为你准备的。
- en: 'Today’s Concept: Encapsulation'
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 今日概念：封装
- en: '![Photo by Laura Gariglio on Unsplash.](../Images/ff5b2e3130a6e139b78215168209cc7a.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![照片由 Laura Gariglio 在 Unsplash 上拍摄。](../Images/ff5b2e3130a6e139b78215168209cc7a.png)'
- en: Photo by [Laura Gariglio](https://unsplash.com/@laugariglio?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Laura Gariglio](https://unsplash.com/@laugariglio?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上提供。
- en: There are a lot of confusing and abstract definitions on the internet which
    overcomplicates a simple concept.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网上有许多令人困惑和抽象的定义，它们使一个简单的概念变得过于复杂。
- en: In essence, encapsulation is all about hiding complex details that doesn’t matter
    for someone who is going to read or use your code.
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 本质上，封装就是隐藏对将要阅读或使用你代码的人来说不重要的复杂细节。
- en: 'You only want to reveal what it does and how someone can use it. An analogy
    I remember when learning this myself is:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你只想揭示它做什么以及某人如何使用它。我在学习这个时记得的一个类比是：
- en: All drivers know how to use a steering wheel. But most have no idea how or why
    it works, and they don’t need to.
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 所有驾驶员都知道如何使用方向盘。但大多数人不知道它是如何或为什么工作，而且他们不需要知道。
- en: Encapsulation is also synonymous to information/data hiding.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 封装也等同于信息/数据隐藏。
- en: 'The effective use of encapsulation should lead to your code being:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 有效地使用封装应该使你的代码：
- en: Easier to read.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更容易阅读。
- en: Easier to maintain (i.e. diagnose and fix bugs).
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更容易维护（即诊断和修复错误）。
- en: Easier to extend (i.e. add or change functionality).
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更容易扩展（即添加或更改功能）。
- en: You’ve Seen Encapsulation Already
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你已经见过封装了
- en: The `scikit-learn` suite of estimators is an ideal example of encapsulation.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '`scikit-learn`的估算器套件是封装的理想例子。'
- en: '[**KMeans**](https://scikit-learn.org/1.5/modules/generated/sklearn.cluster.KMeans.html#sklearn.cluster.KMeans)'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**KMeans**](https://scikit-learn.org/1.5/modules/generated/sklearn.cluster.KMeans.html#sklearn.cluster.KMeans)'
- en: We all know how `KMeans` works and what it is supposed to do. We also know how
    to use the `scikit-learn` implementation of `KMeans` – it is all documented as
    docstrings.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都知道KMeans是如何工作的以及它应该做什么。我们也知道如何使用`scikit-learn`实现的`KMeans` – 它的所有文档都作为docstrings。
- en: '[PRE0]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '[PRE1]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: But do we need to know how exactly the `fit` and `predict` method is implemented?
    Do I need to go through all 126 lines of code in `fit` to know how to use it?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们是否需要知道`fit`和`predict`方法是如何实现的？我是否需要阅读`fit`中的所有126行代码来了解如何使用它？
- en: '**No**. **All we need to know is that it outputs some clusters for the data
    we give it.**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**不**。**我们只需要知道它为我们给出的数据输出了一些聚类。**'
- en: Even a newbie data scientist will be able to use this interface and understand
    it to some degree. This is the point of *Encapsulation*.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是新手数据科学家也能使用这个接口并在一定程度上理解它。这就是封装的点。
- en: '![Photo by Dan Crile on Unsplash](../Images/4f348ae5a3124fe23e1af629b8960098.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片由Dan Crile在Unsplash上提供](../Images/4f348ae5a3124fe23e1af629b8960098.png)'
- en: Photo by [Dan Crile](https://unsplash.com/@dancrile?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Dan Crile](https://unsplash.com/@dancrile?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上提供。
- en: We, as users, don’t need to know the intricacies of what’s happening under the
    hood. All the details are tucked away nice and neatly under a meaningful function
    called `fit`.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 作为用户，我们不需要知道底层发生的复杂细节。所有这些细节都被整理得很好，放在一个有意义的函数`fit`下面。
- en: All we need to know is what the expected input and output of `fit` is, and use
    it appropriately.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只需要知道`fit`的预期输入和输出是什么，并适当地使用它。
- en: '**Now, let’s see how this applies to a typical data scientist’s day-to-day
    work with a practical example in a Jupyter Notebook.**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**现在，让我们通过一个Jupyter Notebook中的实际例子来看看这如何应用于典型数据科学家的日常工作中。**'
- en: Practical Example
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际例子
- en: 'Let’s start with an example task:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从以下示例任务开始：
- en: Build a model to predict Medium blog article earnings.
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 建立一个模型来预测Medium博客文章的收入。
- en: First thing’s first – you need data to do this. For simplicity, let’s assume
    some data is already available for you in the form of the below CSV file.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你需要数据来做这件事。为了简单起见，让我们假设一些数据已经以以下CSV文件的形式提供给你。
- en: Article Lifetime Stats
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文章生命周期统计
- en: This dataset identifies an article by a unique ID column ‘article’, their various
    statistics and their earnings as of December 2024.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 此数据集通过一个唯一的ID列“文章”识别文章，以及它们的各种统计数据和截至2024年12月的收入。
- en: '![Image and Data by author. Example contents of the CSV file, ''Article Lifetime
    Stats''.](../Images/cae511514d61e3f8fa27e62f27b145a7.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片和数据由作者提供。CSV文件“文章生命周期统计”的示例内容。](../Images/cae511514d61e3f8fa27e62f27b145a7.png)'
- en: Image and Data by author. Example contents of the CSV file, ‘Article Lifetime
    Stats’.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图片和数据由作者提供。CSV文件“文章生命周期统计”的示例内容。
- en: 'As you can see, there are various issues with this data:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，这些数据存在各种问题：
- en: '`published_date` column has poorly formatted cells and invalid dates.'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`published_date` 列有一些格式不佳的单元格和无效的日期。'
- en: '`claps` have `null` values.'
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`claps` 有 `null` 值。'
- en: '`comments` (or number of comments on the article) have negative values which
    cannot happen, and is therefore invalid.'
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`comments`（或文章上的评论数量）有负值，这是不可能发生的，因此是无效的。'
- en: '`earnings` column has a cell with an invalid value of `9999999999`.'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`earnings` 列有一个无效的值为 `9999999999` 的单元格。'
- en: 'To clean this up, let’s say you open up a new Jupyter notebook and write the
    following code in a cell:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 为了清理这些，假设你打开一个新的 Jupyter Notebook，并在一个单元格中写下以下代码：
- en: '[PRE2]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This code will make perfect sense to the data scientist who wrote it. But what
    about your colleague or manager who is reading your notebook in the future to
    understand how you built the prediction model?
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码对编写它的数据科学家来说非常合理。但你的同事或经理未来阅读你的笔记本以了解你是如何构建预测模型的时候，又会怎样呢？
- en: What if you were off on holiday and your work needed to be re-run to generate
    the same output on a different set of data?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在度假，而你的工作需要重新运行以在不同的数据集上生成相同的输出，那会怎样呢？
- en: What if you, the writer of this code, were forced to revisit this code a year
    later? Are you sure you can remember and understand every detail of why you wrote
    this code?
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你，这段代码的编写者，被迫一年后重新审视这段代码，你确定你能记住并理解你写这段代码的每一个细节吗？
- en: 'If I were reading this code, I would be thinking:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我阅读这段代码，我会想：
- en: What on earth is going on here? What’s important? Why were these operations
    done? Do I need to run the entire notebook and go through this code line-by-line
    to understand it?! FOR EVERY CELL?
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这里到底发生了什么？什么重要？为什么执行了这些操作？我需要运行整个笔记本并逐行阅读这段代码来理解它吗？！对每一个单元格都要这样做吗？
- en: Encapsulation At Work
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 封装在工作中
- en: 'To use encapsulation effectively in Data Science, you will need to think of
    the following:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 要在数据科学中有效地使用封装，你需要考虑以下因素：
- en: '**Who is your audience?**'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你的受众是谁？**'
- en: '**Who might need to read this code in the future?**'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**未来谁可能需要阅读这段代码？**'
- en: '**Why would they need to read this code?**'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**他们为什么需要阅读这段代码？**'
- en: 'Your code may need to be read by someone else due to many reasons:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 你的代码可能需要被其他人阅读，原因有很多：
- en: '**To replicate results for auditing purposes.**'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**为了审计目的复制结果。**'
- en: '**To rerun code using different parameters.**'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**为了使用不同的参数重新运行代码。**'
- en: '**To debug issues with the outputs or conclusions from this notebook that is
    impacting a downstream process.**'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**为了调试影响下游流程的输出或结论中的问题。**'
- en: 'Based on your judgement, you need to decide:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你的判断，你需要做出以下决定：
- en: '**Which parts of your code are important and are intended to be used directly
    by the reader? (Parameters, File Paths, Constants)**'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**哪些部分的代码是重要的，并且是打算直接供读者使用的？（参数、文件路径、常量）**'
- en: '**Which parts of your code can be hidden away?**'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**哪些部分的代码可以被隐藏起来？**'
- en: And the hiding away should make your code easier to read and understand by packaging
    them into manageable and meaningful chunks.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 而隐藏这些代码应该通过将它们打包成可管理和有意义的块来使你的代码更容易阅读和理解。
- en: Now, consider the below code, rewritten using the principles of encapsulation.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，考虑以下使用封装原则重写的代码。
- en: 'In Cell 1 of your Jupyter Notebook:'
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在你的 Jupyter Notebook 的第 1 个单元格中：
- en: '[PRE3]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '[PRE5]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '[PRE6]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '[PRE8]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '[PRE9]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '[PRE10]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '[PRE11]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '[PRE12]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'In Cell 2:'
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在第 2 个单元格中：
- en: '[PRE13]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '[PRE14]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: It’s pretty simple stuff, all we’ve done is put our existing code into their
    respective functions, given them meaningful names, and added docstrings to guide
    the reader on how to use the function and what its expected behaviour is.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这很简单，我们只是把现有的代码放入它们各自的功能中，给它们起有意义的名字，并添加文档字符串来指导读者如何使用函数以及它的预期行为。
- en: You might be thinking
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想
- en: ‘what a waste of time, this article is just telling me to put things into functions,
    big deal.’
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “真浪费时间，这篇文章只是告诉我把东西放入函数里，这有什么大不了的。”
- en: Well, yes, partly.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，是的，部分如此。
- en: Putting code into any function will always achieve some level of encapsulation.
    But effective encapsulation is not just about chucking everything into a function.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 将代码放入任何函数中总会实现一定程度的封装。但有效的封装不仅仅是把所有东西都塞进一个函数里。
- en: The difference would be analogous to
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这种差异可以类比为
- en: cleaning your room,
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清理你的房间，
- en: versus
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 与之相对的是
- en: Sweeping all your clothes and junk under the bed.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 把所有的衣服和垃圾扫到床下。
- en: '[PRE15]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '[PRE16]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Let’s first inspect what the effective encapsulation has achieved, and how this
    was made possible.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先检查有效的封装实现了什么，以及这是如何实现的。
- en: What has Encapsulation achieved?
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 封装实现了什么？
- en: For the sake of brevity we go through two advantages most relevant for data
    science.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简洁起见，我们只介绍两个与数据科学最相关的优势。
- en: Also, please not that there is no right answer to how you do this. There could
    be many ways to apply encapsulation, depending on your intentions and assumptions.
    The below is my attempt, and I will try and justify why I have designed it in
    such a way and why it makes sense.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，请注意，关于如何做这件事并没有正确答案。根据你的意图和假设，可能有多种方式应用封装。以下是我的尝试，我将尝试解释为什么我这样设计，以及为什么这样做是有意义的。
- en: The most important thing is the effect the encapsulation achieves.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 最重要的是封装产生的影响。
- en: Better readability of your code
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码的可读性更好
- en: Firstly, we have created a hierarchy of information in terms of their detail
    and relevance to the reader.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们在信息层次上创建了一个关于其细节和与读者的相关性的信息体系。
- en: '[PRE17]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '[PRE18]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'I have purposefully encapsulated the nitty gritty details of *‘cleaning’* this
    dataset into three deliberately designed functions, which in turn serves the following
    purpose:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 我故意将*“清理”*这个数据集的细节封装到三个精心设计的函数中，这反过来又服务于以下目的：
- en: They indicate to the reader that some complex operation has been carried out
    on the input data,
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们向读者表明，对输入数据已执行了一些复杂操作，
- en: and it is up to the reader if they need to pursue the details, given their objective.
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 而读者是否需要深入了解取决于他们的目标。
- en: If the reader needs to peek under the hood, they are free to peruse each function
    and their respective docstrings and immediately understand how each function works
    in manageable, meaningful chunks.
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果读者需要查看内部结构，他们可以自由地查看每个函数及其相应的文档字符串，并立即以可管理、有意义的方式理解每个函数的工作原理。
- en: If they don’t need the details, they can move on quickly to sections relevant
    to them, knowing at least at a higher level what the above code is meant to do.
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果他们不需要细节，他们可以快速跳转到与他们相关的部分，至少在较高层次上了解上述代码的目的是什么。
- en: This approach assumes that there are more important sections such as model building
    or feature exploration further down in the notebook. Thus, I felt the section
    on data cleaning is not the main focus of this code.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法假设笔记本中还有其他更重要的部分，例如模型构建或特征探索。因此，我觉得数据清理部分不是这段代码的主要焦点。
- en: I have therefore named each function in the format `clean_xxx_column`, assuming
    that it suffices for the reader to know *‘some cleaning is done here to create
    a workable dataset’,* and that they can skip the details if their interest is
    the model building/feature exploration.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我将每个函数命名为`clean_xxx_column`格式，假设读者只需要知道*“这里进行了一些清理以创建一个可工作的数据集”，*并且如果他们的兴趣在于模型构建/特征探索，他们可以跳过细节。
- en: Ultimately, encapsulation should make your code easier to read, exposing just
    the right level of information for the reader to get a gist of what’s happening
    whilst avoiding a bombardment of information.
  id: totrans-132
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 最终，封装应该使你的代码更容易阅读，向读者展示恰好足够的信息，以便他们能够了解正在发生的事情，同时避免信息轰炸。
- en: Easier readability makes it easier for others to use your code, to understand
    it and maintain it.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的可读性使得其他人更容易使用你的代码，理解它并维护它。
- en: Better Extensibility and Separation of Concerns
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更好的可扩展性和关注点分离
- en: 'Assume now that you receive a larger dataset from the same data source. You
    load it in, using the same code as before:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 假设现在你从相同的数据源接收到了一个更大的数据集。你使用与之前相同的代码将其加载进来：
- en: '[PRE19]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '[PRE20]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'However, this time you find that additional cleaning steps are necessary; the
    `claps` column suffers from the same issue as the `earnings` column, where some
    values are extremely big: `9999999999`'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这次你发现需要额外的清理步骤；`claps`列与`earnings`列有相同的问题，其中一些值非常大：`9999999999`
- en: 'In this example, encapsulation shows two benefits:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，封装显示了两个好处：
- en: '***Extensibility***: It is easy, even trivial, to *extend* our existing code
    to handle the new data issue. Even someone new to the code will easily know which
    function they need to modify.'
  id: totrans-140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***可扩展性***：扩展我们现有的代码以处理新的数据问题既简单又平凡。即使是代码的新手也能很容易地知道他们需要修改哪个函数。'
- en: '[PRE21]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '[PRE22]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '[PRE23]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: '[PRE24]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'rather than having to scour every line of code to know where to add the change:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是不得不搜索每一行代码以知道在哪里添加更改：
- en: '[PRE25]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: '[PRE26]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: '***Separation of concerns***: the code change is neatly contained within the
    `clean_claps_column` function, whilst all other code remains identical.'
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***关注点分离***：代码更改被整洁地包含在`clean_claps_column`函数中，而所有其他代码保持不变。'
- en: '[PRE27]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: '[PRE28]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: The section of code responsible for running the cleaning doesn’t need to worry
    about what’s happening under the hood of any of the cleaning functions as long
    as the function behaviour does not change.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 负责运行清理的代码部分不需要担心任何清理函数底层的操作，只要函数行为没有改变。
- en: This enables code changes to be tidier and easier to manage.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得代码更改更加整洁且易于管理。
- en: What does this achieve?
  id: totrans-153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这实现了什么？
- en: The concept of encapsulation has been developed from decades of trial and error
    experience in the Software Engineering world.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 封装的概念是从软件工程世界中数十年的试错经验中发展起来的。
- en: The ultimate goal is to make code easier to maintain.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 最终目标是使代码更容易维护。
- en: '![Photo by Pandu Agus Wismoyo on Unsplash](../Images/d0e3e2aa5fc8ffb15a8afc27a9475130.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图片由 Pandu Agus Wismoyo 在 Unsplash 上提供](../Images/d0e3e2aa5fc8ffb15a8afc27a9475130.png)'
- en: Photo by [Pandu Agus Wismoyo](https://unsplash.com/@kangterbang?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Pandu Agus Wismoyo](https://unsplash.com/@kangterbang?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 上提供
- en: Poorly written code can quickly bloat into a storm of bugs and wasted man-hours
    on maintenance, leading to your precious time being wasted on bug-fixing rather
    than developing exciting new models.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 编写不良的代码会迅速膨胀成一场充满错误和维护浪费人力的风暴，导致你宝贵的时间被浪费在修复错误上，而不是开发令人兴奋的新模型。
- en: Data Science has gone past the stage where it was purely research focused, and
    models could be hacked together in Jupyter notebooks for proof-of-concepts only.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学已经超越了纯粹以研究为重点的阶段，模型只能为了证明概念而在 Jupyter 笔记本中拼凑起来。
- en: The field has matured enough to make an impact on the real-world, and data science
    teams are only now realising that they actually need to write production-ready
    code and even worse, maintain them.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 这个领域已经足够成熟，可以对现实世界产生影响，而数据科学团队现在才意识到他们实际上需要编写生产就绪的代码，更糟糕的是，还需要维护它们。
- en: Unfortunately, I still see data scientists solely relying on notebooks and their
    unorganised code to maintain entire production pipelines. It makes me worry about
    the future of this industry when I see this.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，我仍然看到数据科学家完全依赖于笔记本和他们的无组织代码来维护整个生产流程。当我看到这种情况时，我担心这个行业的未来。
- en: Conclusion
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In summary, encapsulation is a vital software engineering principle that can
    significantly enhance the readability, maintainability, and extensibility of your
    code.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，封装是软件工程的一个关键原则，可以显著提高代码的可读性、可维护性和可扩展性。
- en: By hiding complex details and exposing only what’s necessary, you make your
    code more user-friendly and minimise rework.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 通过隐藏复杂细节并仅暴露必要的部分，你使你的代码更加用户友好，并最小化返工。
- en: For data scientists, mastering encapsulation not only improves the quality of
    your work but also sets you apart as a professional capable of building robust,
    production-ready systems.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 对于数据科学家来说，掌握封装不仅提高了你工作的质量，而且使你成为一个能够构建健壮、生产就绪系统的专业人士。
