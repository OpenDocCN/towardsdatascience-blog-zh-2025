- en: 'From Equal Weights to Smart Weights: OTPO’s Approach to Better LLM Alignment'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从等权重到智能权重：OTPO的LLM对齐方法
- en: 原文：[https://towardsdatascience.com/from-equal-weights-to-smart-weights-otpos-approach-to-better-llm-alignment/](https://towardsdatascience.com/from-equal-weights-to-smart-weights-otpos-approach-to-better-llm-alignment/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/from-equal-weights-to-smart-weights-otpos-approach-to-better-llm-alignment/](https://towardsdatascience.com/from-equal-weights-to-smart-weights-otpos-approach-to-better-llm-alignment/)
- en: Context
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文
- en: <mdspan datatext="el1752537727331" class="mdspan-comment">Language models</mdspan>
    have evolved from basic search tools to AI assistants that code, write, and research.
    Now they’re accessible through smartphone apps via internet APIs, putting powerful
    AI at everyone’s fingertips. These systems are becoming an integral part of our
    daily lives. People are using AI assistants for seeking advice for personal relationships,
    fact-checking to form opinions (though it clearly states it can make mistakes),
    diet plans and next holiday destinations.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752537727331" class="mdspan-comment">语言模型</mdspan>已经从基本的搜索工具发展到AI助手，可以进行编码、写作和进行研究。现在，它们可以通过互联网API通过智能手机应用程序访问，将强大的AI放在每个人的指尖上。这些系统正成为我们日常生活的重要组成部分。人们使用AI助手来寻求个人关系的建议、核实事实以形成观点（尽管它明确表示可能会出错）、制定饮食计划和下一个假期目的地。
- en: As more and more powerful models are launched, the question of trust arises
    and models are more scrutinized to make sure the responses produced by them are
    trustworthy and aligned with human values. These are not new questions. Traditionally,
    models are fine-tuned on human preference data (usually contains input, chosen
    answer, rejected answer) before launching them for public use. Model alignment
    and safety have been major areas of research, and multiple algorithms have been
    developed to train the model for alignment. Among all the alignment training algorithms,
    the most popular is Direct Preference Optimization (DPO) due to its simplicity
    and efficiency.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 随着越来越多强大的模型被推出，信任问题随之而来，模型也受到更严格的审查，以确保它们产生的响应是可信的并与人类价值观相一致。这些问题并非新出现。传统上，在模型公开发布之前，模型通常会在人类偏好数据（通常包含输入、选择的答案、拒绝的答案）上进行微调。模型对齐和安全一直是研究的主要领域，已经开发了多个算法来训练模型以实现对齐。在所有对齐训练算法中，由于简单和高效，直接偏好优化（DPO）是最受欢迎的。
- en: But DPO has a fundamental limitation. When calculating the likelihood of a response,
    it uses equal weight for each word or token present in the response, though humans
    naturally give more importance or weight to meaningful words. For example, let’s
    look at the following user interaction with LLM.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但DPO有一个根本的限制。在计算响应的可能性时，它对响应中出现的每个单词或标记使用相同的权重，尽管人类自然会给有意义的单词更多的重视或权重。例如，让我们看看以下用户与LLM的互动。
- en: '**User:** What’s the capital of France?'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**用户**：法国的首都是什么？'
- en: '**LLM:** The capital of France is Paris, and it’s a beautiful city with many
    attractions.'
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**LLM**：法国的首都是巴黎，它是一个美丽的城市，有很多景点。'
- en: In this interaction, humans primarily care about the accuracy of “Paris” rather
    than the stylistic flourishes, yet standard DPO gives equal weight to every token,
    allowing less relevant content to dilute the learning signal.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次互动中，人类主要关心的是“巴黎”的准确性，而不是风格上的修饰，但标准的DPO对每个标记给予相同的权重，允许不那么相关的内容稀释学习信号。
- en: There have been multiple attempts to fix DPO’s problems. Algorithms like SimPO
    and SamPO were introduced to address different issues. In this post, we’re going
    to look into another algorithm published in May 2025 on “**O**ptimal **T**ransport-Based
    Token Weighting scheme for Enhanced **P**reference **O**ptimization (**OTPO**).”
    This post explains the core ideas behind their work and builds a foundation for
    understanding LLM alignment with human preferences.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 已经有多次尝试来解决DPO的问题。引入了像SimPO和SamPO这样的算法来解决不同的问题。在这篇文章中，我们将探讨2025年5月发表在“**O**ptimal
    **T**ransport-Based Token Weighting scheme for Enhanced **P**reference **O**ptimization
    (**OTPO**)”上的另一个算法。本文解释了他们工作的核心思想，并为理解LLM与人类偏好的对齐奠定了基础。
- en: Why Equal Token Weighting Fails
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么等权重标记失败
- en: To understand why token weighting matters, we first need to examine how DPO
    actually processes tokens. Usually pre-trained models are trained with trillions
    of parameters, then fine tuned, and then trained further using DPO on human preference
    data to align with human preferences before being released to the public.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解为什么标记加权很重要，我们首先需要检查DPO实际上是如何处理标记的。通常，预训练模型使用万亿个参数进行训练，然后进行微调，接着使用DPO在人类偏好数据上进行进一步训练以与人类偏好对齐，然后发布给公众。
- en: 'DPO operates by computing log likelihood differences between chosen and rejected
    responses at the token level. For each training example with a chosen response
    y_w and rejected response y_l, DPO calculates its objective value. The core of
    DPO lies in its loss function formula:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: DPO 通过计算所选和拒绝响应在标记级别的对数似然差异来运行。对于每个具有所选响应 y_w 和拒绝响应 y_l 的训练示例，DPO 计算其目标值。DPO
    的核心在于其损失函数公式：
- en: '![](../Images/89b24855e8f669788468dc608b3d3443.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/89b24855e8f669788468dc608b3d3443.png)'
- en: Image from [DPO paper](https://arxiv.org/pdf/2305.18290)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自 [DPO 论文](https://arxiv.org/pdf/2305.18290)
- en: Pi_theta(πθ) is the model to be optimized, Pi_reference(π_ref) is a reference
    model, and π∗(y|x) denotes the probability of response y given user input x.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: Pi_theta(πθ) 是要优化的模型，Pi_reference(π_ref) 是一个参考模型，而 π∗(y|x) 表示在用户输入 x 的情况下响应
    y 的概率。
- en: 'π∗(y|x) breaks down into token-level computations. For a chosen response with
    tokens `[t₁, t₂, ..., tₙ]`, the log probability becomes:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: π∗(y|x) 分解为标记级别的计算。对于一个具有标记 `[t₁, t₂, ..., tₙ]` 的所选响应，对数概率变为：
- en: log π∗(y|x) = Σᵢ log π(tᵢ|x, t₁…tᵢ₋₁)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: log π∗(y|x) = Σᵢ log π(tᵢ|x, t₁…tᵢ₋₁)
- en: Each token contributes its individual log probability to the overall sequence
    probability, and there is no mechanism to weight important content more than filler.
    Let’s look at an example of preference data.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 每个标记都对整体序列概率贡献其各自的 log 概率，并且没有机制可以给重要内容比填充内容更多的权重。让我们看看偏好数据的例子。
- en: '**Input**: What is the capital of France?'
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**输入**：法国的首都是什么？'
- en: '**Chosen**: The capital of France is Paris.'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**Chosen**：法国的首都是巴黎。'
- en: '**Rejected**: The capital of France is Italy, which is actually incorrect.'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**Rejected**：法国的首都是意大利，这实际上是错误的。'
- en: DPO computes log probabilities for every token equally.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: DPO 对每个标记计算对数概率是相同的。
- en: '`Chosen: log P("The") + log P("capital") + log P("of") + log P("France") +
    log P("is") + log P("Paris") + log P(".")`'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '`Chosen: log P("The") + log P("capital") + log P("of") + log P("France") +
    log P("is") + log P("Paris") + log P(".")`'
- en: '`Rejected: log P("The") + log P("capital") + ... + log P("Italy") + ... + log
    P("incorrect") + log P(".")`'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '`Rejected: log P("The") + log P("capital") + ... + log P("Italy") + ... + log
    P("incorrect") + log P(".")`'
- en: The critical factual difference lies in “Paris” vs “Italy,” but DPO gives equal
    weight to articles, prepositions, and the factually crucial tokens. This uniform
    token treatment creates a mismatch between what the optimization focuses on and
    what humans actually care about.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的事实差异在于“巴黎”与“意大利”，但 DPO 对冠词、介词和事实关键标记给予相同的权重。这种统一的标记处理在优化重点和人类实际关心的事情之间造成了不匹配。
- en: The model receives equal learning signal from semantically crucial tokens (“Paris”)
    and inconsequential ones (“which”, “actually”). This leads to the verbosity trap,
    longer sequences accumulate more log likelihood mass through sheer token count,
    so DPO can inadvertently reward verbosity over quality.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 模型从语义上重要的标记（“巴黎”）和不重要的标记（“which”，“actually”）那里接收相同的学习信号。这导致了冗长陷阱，更长的序列通过单纯的标记数量积累更多的对数似然质量，因此
    DPO 可能无意中奖励冗长而不是质量。
- en: When semantically crucial tokens get averaged with stylistic ones, the learning
    signals become unreliable, leading to suboptimal preference learning. These problems
    can be solved if we have a better way to give more weight to relevant tokens when
    calculating the probability of the response. That’s exactly what OTPO does.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 当语义上重要的标记与风格上的标记平均时，学习信号变得不可靠，导致次优偏好学习。如果我们有更好的方法在计算响应概率时给予相关标记更多权重，这些问题就可以得到解决。这正是
    OTPO 所做的。
- en: Optimal Transport-Based Token Weighting (OTPO)
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于最优传输的标记加权（OTPO）
- en: Now that we understand DPO’s token weighting problem, let’s see how OTPO solves
    it using optimal transport theory. OTPO views preference optimization as a transport
    problem, how much effort does it take to transform one response into another?
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经理解了 DPO 的标记加权问题，让我们看看 OTPO 是如何使用最优传输理论来解决它的。OTPO 将偏好优化视为一个传输问题，将一个响应转换为另一个响应需要多少努力？
- en: The key insight is what’s the minimum effort needed to change “The capital of
    France is Paris” into “The capital of France is Italy”? Most tokens remain the
    same, but “Paris” → “Italy” requires significant semantic transformation since
    they’re completely different concepts.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的洞察是，将“法国的首都是巴黎”改为“法国的首都是意大利”需要多少最小努力？大多数标记保持不变，但“巴黎” → “意大利”需要显著的语义转换，因为它们是完全不同的概念。
- en: OTPO formulates this as an optimal transport problem where sources are tokens
    in the chosen response, targets are tokens in the rejected response, and transport
    costs reflect semantic similarity between token pairs. Semantically similar tokens
    (like “Paris” and “London”) have low transport costs, while distant tokens (like
    “Paris” and “apple”) have high costs.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: OTPO将此表述为一个最优运输问题，其中源是选择响应中的标记，目标是拒绝响应中的标记，运输成本反映了标记对之间的语义相似性。语义相似的标记（如“巴黎”和“伦敦”）具有低运输成本，而遥远的标记（如“巴黎”和“苹果”）具有高成本。
- en: The algorithm computes an optimal transport solution that tells us how to move
    probability mass between responses with minimal total cost. Token pairs that participate
    heavily in this transport, especially those requiring expensive semantic transformations,
    receive higher weights in the final loss calculation. This means OTPO automatically
    focuses learning on the tokens that matter most for human preferences, solving
    DPO’s equal weighting problem.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 该算法计算出一个最优运输解决方案，告诉我们如何以最小的总成本在响应之间移动概率质量。在此运输中参与度高的标记对，尤其是那些需要昂贵语义转换的标记对，在最终损失计算中会得到更高的权重。这意味着OTPO自动将学习重点放在对人类偏好最重要的标记上，解决了DPO的等权重问题。
- en: Math behind OTPO
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: OTPO背后的数学
- en: Now let’s dive into the mathematical foundation of OTPO. The algorithm has three
    main components, constructing a cost matrix, solving the optimal transport problem,
    and computing weighted token losses.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们深入了解OTPO的数学基础。该算法有三个主要组成部分：构建成本矩阵、解决最优运输问题和计算加权标记损失。
- en: 'Step 1: Cost Matrix Construction'
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：构建成本矩阵
- en: OTPO starts by building a cost matrix M that measures semantic distance between
    every token pair. For the i-th token in the chosen(w) response and j-th token
    in the rejected(l) response the cost is
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: OTPO首先构建一个成本矩阵M，该矩阵衡量每对标记之间的语义距离。对于选择(w)响应中的第i个标记和拒绝(l)响应中的第j个标记，成本是
- en: M[i][j] = ( h[w][i] — h[l][j] )²
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: M[i][j] = ( h[w][i] - h[l][j] )²
- en: Where h[w][i] and h[l][j] are the last-layer hidden representations of tokens
    from the model. This Euclidean distance captures semantic similarity. Similar
    tokens like “Paris” and “London” have low cost, while distant tokens like “Paris”
    and “apple” have high cost.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 其中h[w][i]和h[l][j]是模型中标记的最后层隐藏表示。这种欧几里得距离捕捉语义相似性。类似的标记，如“巴黎”和“伦敦”，具有低成本，而遥远的标记，如“巴黎”和“苹果”，具有高成本。
- en: 'Step 2: Optimal Transport Problem'
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：最优运输问题
- en: 'OTPO formulates token weighting as an unbalanced optimal transport optimization:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: OTPO将标记权重表述为一个不平衡的最优运输优化：
- en: '![](../Images/5a2c03110ac8511541e4f8dcbc559914.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5a2c03110ac8511541e4f8dcbc559914.png)'
- en: Image from [OTPO paper](https://arxiv.org/pdf/2505.18720)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自[OTPO论文](https://arxiv.org/pdf/2505.18720)
- en: Here Γ is the transport plan (what we’re solving for) that aligns tokens between
    the chosen and rejected responses. Ω controls entropy regularization. KL terms
    ensure that the marginal distributions of Γ are close to the naive DPO uniform
    weights. The solution Γ* tells us how to optimally transport probability mass
    between chosen and rejected tokens.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，Γ是运输计划（我们要解决的问题），它将选择和拒绝响应之间的标记对齐。Ω控制熵正则化。KL项确保Γ的边缘分布接近于原始DPO均匀权重。解Γ*告诉我们如何最优地运输选择和拒绝标记之间的概率质量。
- en: 'Step 3: Computing Token Weights'
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：计算标记权重
- en: 'From the optimal transport solution, we derive token-level weights by summing
    along dimensions:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 从最优运输解决方案中，我们通过沿维度求和推导出标记级别的权重：
- en: '![](../Images/8d2d4339aea0e1ea32171abab1011fb1.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8d2d4339aea0e1ea32171abab1011fb1.png)'
- en: Image from [OTPO paper](https://arxiv.org/pdf/2505.18720)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自[OTPO论文](https://arxiv.org/pdf/2505.18720)
- en: Here, Γ(i,j) represents the weight assigned to each token pair (i, j) from chosen(w)
    and rejected(r) response. Finally these weights are applied on the DPO to replace
    the uniform weighting. Reward difference with weighting scheme.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，Γ(i,j)代表从选择(w)和拒绝(r)响应中分配给每个标记对(i, j)的权重。最后，这些权重被应用于DPO以替换均匀加权。奖励差异与加权方案。
- en: '![](../Images/2e1433cc3a87b4a5bd249ed2f20fece9.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2e1433cc3a87b4a5bd249ed2f20fece9.png)'
- en: Image from [OTPO paper](https://arxiv.org/pdf/2505.18720)
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自[OTPO论文](https://arxiv.org/pdf/2505.18720)
- en: Experiment Results and Limitations
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验结果和局限性
- en: OTPO was tested on a variety of tasks but in a controlled environment. When
    it was applied to summarization tasks, it showed about 8.5% improvement over other
    methods. When it was tested for length biases on the UltraFeedback dataset with
    smaller models like Llama-3–8B, OTPO was producing shorter responses. These initial
    tests provide evidence that OTPO helps reduce the verbosity and improve the quality
    of responses which are more likely to be chosen by humans.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: OTPO在各种任务上进行了测试，但都是在受控环境中进行的。当应用于摘要任务时，它比其他方法提高了大约8.5%。当在UltraFeedback数据集上测试长度偏差，使用像Llama-3–8B这样的较小模型时，OTPO产生了较短的响应。这些初步测试提供了证据，表明OTPO有助于减少冗余并提高响应质量，这些响应更有可能被人类选择。
- en: The testing was not exhaustive enough to present the accuracy number across
    the domain. There were mixed results on different datasets. OTPO requires expensive
    cost metric and transport plan calculation. Also, the LLM as judge was used to
    calculate the quality of response, which was further scanned manually by a few
    people. These methods are good only but totally dependent on reviewers who might
    be easily biased towards certain datasets.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 测试并不足够全面，无法在整个领域内展示准确率数字。在不同数据集上存在混合结果。OTPO需要昂贵的成本指标和传输计划计算。此外，使用LLM作为评判者来计算响应质量，随后由少数人手动进一步检查。这些方法虽然不错，但完全依赖于可能容易对某些数据集产生偏见的审稿人。
- en: Conclusion
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: LLM alignment has been major a topic of research, and OTPO offers promising
    results in a controlled environment. While this approach is not perfect, the introduction
    of weighted token selection lays the groundwork for more fine-grained preference
    modeling in alignment tasks.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: LLM对齐一直是研究的主要话题，OTPO在受控环境中提供了有希望的结果。虽然这种方法并不完美，但加权标记选择的出现为对齐任务中的更精细偏好建模奠定了基础。
