  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由Google DeepMind提供的照片：https://www.pexels.com/photo/an-artist-s-illustration-of-artificial-intelligence-ai-this-image-depicts-how-ai-can-help-humans-to-understand-the-complexity-of-biology-it-was-created-by-artist-khyati-trehan-as-part-17484975/](../Images/a9778e716c4bdce4e26b0ccd6bf0689e.png)'
- en: 'Photo by Google DeepMind: [https://www.pexels.com/photo/an-artist-s-illustration-of-artificial-intelligence-ai-this-image-depicts-how-ai-can-help-humans-to-understand-the-complexity-of-biology-it-was-created-by-artist-khyati-trehan-as-part-17484975/](https://www.pexels.com/photo/an-artist-s-illustration-of-artificial-intelligence-ai-this-image-depicts-how-ai-can-help-humans-to-understand-the-complexity-of-biology-it-was-created-by-artist-khyati-trehan-as-part-17484975/)'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由Google DeepMind提供的照片：[https://www.pexels.com/photo/an-artist-s-illustration-of-artificial-intelligence-ai-this-image-depicts-how-ai-can-help-humans-to-understand-the-complexity-of-biology-it-was-created-by-artist-khyati-trehan-as-part-17484975/](https://www.pexels.com/photo/an-artist-s-illustration-of-artificial-intelligence-ai-this-image-depicts-how-ai-can-help-humans-to-understand-the-complexity-of-biology-it-was-created-by-artist-khyati-trehan-as-part-17484975/)
- en: Machine Learning (ML) has driven remarkable breakthroughs in computer vision,
    natural language processing, and speech recognition, largely due to the abundance
    of data in these fields. However, many challenges – especially those tied to specific
    product features or scientific research – suffer from limited data quality and
    quantity. Where, traditional statistical analysis, most often the natural choice
    for small datasets, falls short of delivering the required performance. This guide
    provides a roadmap for tackling small data problems based on your data constraints,
    and offers potential solutions, guiding your decision making early on.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习（ML）在计算机视觉、自然语言处理和语音识别等领域推动了显著的突破，这主要归功于这些领域数据的丰富性。然而，许多挑战——尤其是那些与特定产品特性或科学研究相关的挑战——由于数据质量和数量的限制而受到困扰。在这种情况下，传统的统计分析，对于小数据集通常是自然的选择，但往往无法达到所需的表现。本指南提供了一种基于您的数据限制解决小数据问题的路线图，并提供了潜在解决方案，帮助您在早期做出决策。
- en: 1\. Difficulty with Gathering more Data
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 收集更多数据的困难
- en: Raw data is rarely a blocker for ML projects. High-quality labels on the other
    hand, are often prohibitively expensive and laborious to collect. Where obtaining
    an expert-labelled "ground truth" requires domain expertise, intensive fieldwork,
    or specialised knowledge. For instance, your problem might focus on rare events,
    maybe, endangered species monitoring, extreme climate events, or unusual manufacturing
    defects. Other times, business specific or scientific questions might be too specialised
    for off-the-shelf large-scale datasets. Ultimately this means many projects fail
    because label acquisition is too expensive.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 原始数据很少会成为机器学习项目的障碍。另一方面，高质量的标签往往收集成本高昂且费时费力。在获取专家标注的“真实情况”时，需要领域专业知识、密集的实地考察或专业知识。例如，您的问题可能集中在罕见事件上，比如，濒危物种监测、极端气候事件或异常制造缺陷。在其他时候，特定于业务或科学的问题可能过于专业，无法使用现成的大规模数据集。最终，这意味着许多项目因为标签获取成本过高而失败。
- en: 2\. Core Challenges of Small Datasets
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 小数据集的核心挑战
- en: With only a small dataset, any new project starts off with inherent risks. How
    much of the true variability does your dataset capture? In many ways this question
    is unanswerable the smaller your dataset gets. Making testing and validation increasingly
    difficult, and leaving a great deal of uncertainty about how well your model actually
    generalises. Your model doesn’t know what your data doesn’t capture. This means,
    with potentially only a few hundred samples, both the richness of the features
    you can extract, and the number of features you can use decreases, without significant
    risk of overfitting (that in many cases you can’t measure). This often leaves
    you limited to classical ML algorithms (Random Forest, SVM etc…), or heavily regularised
    deep learning methods. The presence of class imbalance will only exacerbate your
    problems. Making small datasets even more sensitive to noise, where only a few
    incorrect labels or faulty measurements will cause havoc and headaches.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 只有一个小数据集，任何新项目一开始都存在固有的风险。你的数据集能捕捉到多少真实变异性？在许多方面，当你的数据集变小时，这个问题是无法回答的。这使得测试和验证越来越困难，并且对模型实际泛化能力的准确性存在很大的不确定性。你的模型不知道你的数据没有捕捉到什么。这意味着，可能只有几百个样本，你可以提取的特征的丰富性和可以使用的特征数量都会减少，而没有显著的风险会过拟合（在许多情况下你无法衡量）。这通常意味着你只能限于经典的机器学习算法（随机森林、SVM等），或者高度正则化的深度学习方法。类别不平衡的存在只会加剧你的问题。使小数据集对噪声更加敏感，只有几个错误的标签或错误的测量就会造成混乱和头疼。
- en: 3\. Questions to Get you Started
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 启动问题
- en: 'For me, working the problem starts with asking a few simple questions about
    the data, labelling process, and end goals. By framing your problem with a "checklist",
    we can clarify the constraints of your data. Have a go at answering the questions
    below:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，解决问题的开始是询问一些关于数据、标记过程和最终目标的简单问题。通过用“清单”来构建你的问题，我们可以明确你数据的约束。尝试回答以下问题：
- en: '**Is your dataset fully, partially, or mostly unlabelled?**'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**你的数据集是完全标记、部分标记还是大部分未标记？**'
- en: '**Fully labeled**: You have labels for (nearly) all samples in your dataset.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完全标记**：你的数据集中几乎所有样本都有标签。'
- en: '**Partially labelled**: A portion of the dataset has labels, but there’s a
    large portion of unlabelled data.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**部分标记**：数据集的一部分有标签，但大部分数据未标记。'
- en: '**Mostly unlabelled**: You have very few (or no) labeled data points.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大部分未标记**：你拥有的标记数据点非常少（或没有）。'
- en: '**How reliable are the labels you do have?**'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**你拥有的标签有多可靠？**'
- en: '**Highly reliable**: If multiple annotates agree on labels, or they are confirmed
    by trusted experts or well-established protocols.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高度可靠**：如果多个标注者对标签达成一致，或者它们被可信的专家或已建立的协议所确认。'
- en: '**Noisy or weak**: Labels may be crowd-sourced, generated automatically, or
    prone to human or sensor error.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**噪声或弱**：标签可能是众包的、自动生成的，或容易受到人为或传感器错误的影响。'
- en: '**Are you solving one problem, or do you have multiple (related) tasks?**'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**你是在解决一个问题，还是有多项（相关）任务？**'
- en: '**Single-task**: A singular objective, such as a binary classification or a
    single regression target.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单任务**：一个单一的目标，例如二元分类或单个回归目标。'
- en: '**Multi-task**: Multiple outputs or multiple objectives.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多任务**：多个输出或多个目标。'
- en: '**Are you dealing with rare events or heavily imbalanced classes?**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**你是否在处理罕见事件或高度不平衡的类别？**'
- en: '**Yes**: Positive examples are very scarce (e.g., "equipment failure," "adverse
    drug reactions," or "financial fraud").'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**是**：正例非常稀缺（例如，“设备故障”、“不良药物反应”或“金融欺诈”）。'
- en: '**No**: Classes are somewhat balanced, or your task doesn’t involve highly
    skewed distributions.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**否**：类别相对平衡，或者你的任务不涉及高度倾斜的分布。'
- en: '**Do you have expert knowledge available, and if so, in what form?**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**你是否拥有专家知识，以及以何种形式？**'
- en: '**Human experts**: You can periodically query domain experts to label new data
    or verify predictions.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人类专家**：你可以定期查询领域专家来标记新数据或验证预测。'
- en: '**Model-based experts**: You have access to well-established simulation or
    physical models (e.g., fluid dynamics, chemical kinetics) that can inform or constrain
    your ML model.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于模型的专家**：你可以访问已建立的模拟或物理模型（例如，流体动力学、化学动力学），这些模型可以提供信息或约束你的机器学习模型。'
- en: '**No**: No relevant domain expertise available to guide or correct the model.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**否**：没有可用的相关领域专业知识来指导或纠正模型。'
- en: '**Is labelling new data possible, and at what cost?**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**标记新数据是否可行，以及成本是多少？**'
- en: '**Feasible and affordable**: You can acquire more labeled examples if necessary.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可行且负担得起**：如果需要，你可以获取更多的标记示例。'
- en: '**Difficult or expensive**: Labelling is time-intensive, costly, or requires
    specialised domain knowledge (e.g., medical diagnosis, advanced scientific measurements).'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**困难或昂贵**：标记耗时、成本高昂或需要专门的领域知识（例如，医学诊断、高级科学测量）。'
- en: '**Do you have prior knowledge or access to pre-trained models relevant to your
    data?**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**您是否有与您的数据相关的先验知识或访问预训练模型？**'
- en: '**Yes**: There exist large-scale models or datasets in your domain (e.g., ImageNet
    for images, BERT for text).'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**是**：您的领域存在大规模模型或数据集（例如，ImageNet用于图像，BERT用于文本）。'
- en: '**No**: Your domain is niche or specialised, and there aren’t obvious pre-trained
    resources.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**否**：您的领域是利基或专业化的，没有明显的预训练资源。'
- en: 4\. Matching Questions to Techniques
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 将问题与技巧匹配
- en: With your answers to the questions above ready, we can move towards establishing
    a list of potential techniques for tackling your problem. In practice, small dataset
    problems require hyper-nuanced experimentation, and so before implementing the
    techniques below give yourself a solid foundation by starting with a simple model,
    get a full pipeline working as quickly as possible and always cross-validate.
    This gives you a baseline to iteratively apply new techniques based on your error
    analysis, while focusing on conducting small scale experiments. This also helps
    avoid building an overly complicated pipeline that’s never properly validated.
    With a baseline in place, chances are your dataset will evolve rapidly. Tools
    like DVC or MLflow help track dataset versions and ensure reproducibility. In
    a small-data scenario, even a handful of new labeled examples can significantly
    change model performance – version control helps systematically manage that.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好上述问题的答案后，我们可以转向建立解决您问题的潜在技巧列表。在实践中，小数据集问题需要高度细致的实验，因此在实施以下技巧之前，请从简单的模型开始，尽快建立完整的管道，并始终进行交叉验证。这为您提供了一个基线，可以根据错误分析迭代应用新技术，同时专注于进行小规模实验。这也有助于避免构建一个过于复杂的管道，而这个管道从未得到适当的验证。有了基线，您的数据集可能会迅速演变。DVC或MLflow等工具有助于跟踪数据集版本并确保可重复性。在小数据集场景中，即使是少量新的标记示例也能显著改变模型性能——版本控制有助于系统地管理这一点。
- en: 'With that in mind, here’s how your answers to the questions above point towards
    specific strategies described later in this post:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，以下是如何回答上述问题指向本帖后面描述的具体策略：
- en: '**Fully Labeled + Single Task + Sufficiently Reliable Labels:**'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**完全标记 + 单个任务 + 足够可靠的标签：**'
- en: '**Data Augmentation** (Section 5.7) to increase effective sample size.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据增强**（第5.7节）以增加有效样本量。'
- en: '**Ensemble Methods** (Section 5.9) if you can afford multiple model training
    cycles.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成方法**（第5.9节）如果您可以承担多次模型训练周期。'
- en: '**Transfer Learning** (Section 5.1) if a pre-trained model in your domain (or
    a related domain) is available.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迁移学习**（第5.1节）如果您的领域（或相关领域）中可用预训练模型。'
- en: '**Partially Labeled + Labelling is Reliable or Achievable:**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**部分标记 + 标记可靠或可实现：**'
- en: '**Semi-Supervised Learning** (Section 5) to leverage a larger pool of unlabelled
    data.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**半监督学习**（第5节）以利用更大的未标记数据池。'
- en: '**Active Learning** (Section 5.6) if you have a human expert who can label
    the most informative samples.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主动学习**（第5.6节）如果您有一位可以标记最有信息量的样本的人类专家。'
- en: '**Data Augmentation** (Section 5.7) where possible.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据增强**（第5.7节）在可能的情况下。'
- en: '**Rarely Labeled or Mostly Unlabelled + Expert Knowledge Available:**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**很少标记或大部分未标记 + 可用专家知识：**'
- en: '**Active Learning** (Section 5.6) to selectively query an expert (especially
    if the expert is a person).'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主动学习**（第5.6节）以选择性地查询专家（尤其是如果专家是人）。'
- en: '**Process-Aware (Hybrid) Models** (Section 5.10) if your "expert" is a well-established
    simulation or model.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过程感知（混合）模型**（第5.10节）如果您的“专家”是一个成熟的模拟或模型。'
- en: '**Rarely Labeled or Mostly Unlabelled + No Expert / No Additional Labels:**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**很少标记或大部分未标记 + 无专家 / 无额外标签：**'
- en: '**Self-Supervised Learning** (Section 5.2) to exploit inherent structure in
    unlabelled data.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自监督学习**（第5.2节）以利用未标记数据中的固有结构。'
- en: '**Few-Shot or Zero-Shot Learning** (Section 5.4) if you can rely on meta-learning
    or textual descriptions to handle novel classes.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**少样本或零样本学习**（第5.4节）如果您可以依赖元学习或文本描述来处理新类别。'
- en: '**Weakly Supervised Learning** (Section 5.5) if your labels exist but are imprecise
    or high-level.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**弱监督学习**（第5.5节）如果您的标签存在但不够精确或属于高级别。'
- en: '**Multiple Related Tasks:**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**多个相关任务：**'
- en: '**Multitask Learning** (Section 5.8) to share representations between tasks,
    effectively pooling "signal" across the entire dataset.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多任务学习**（第5.8节）在任务之间共享表示，有效地在整个数据集上汇总“信号”。'
- en: '**Dealing with Noisy or Weak Labels:**'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**处理噪声或弱标签：**'
- en: '**Weakly Supervised Learning** (Section 5.5) which explicitly handles label
    noise.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**弱监督学习**（第5.5节）明确处理标签噪声。'
- en: Combine with **Active Learning** or a small "gold standard" subset to clean
    up the worst labelling errors.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与**主动学习**或一个小型的“黄金标准”子集结合，以清理最糟糕的标签错误。
- en: '**Highly Imbalanced / Rare Events:**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**高度不平衡/罕见事件：**'
- en: '**Data Augmentation** (Section 5.7) targeting minority classes (e.g., synthetic
    minority oversampling).'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据增强**（第5.7节）针对少数类（例如，合成少数过采样）。'
- en: '**Active Learning** (Section 5.6) to specifically label more of the rare cases.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主动学习**（第5.6节）专门标记更多的罕见情况。'
- en: '**Process-Aware Models** (Section 5.10) or domain expertise to confirm rare
    cases, if possible.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过程感知模型**（第5.10节）或领域专业知识，如果可能的话，用于确认罕见情况。'
- en: '**Have a Pre-Trained Model or Domain-Specific Knowledge:**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**拥有预训练模型或领域特定知识：**'
- en: '**Transfer Learning** (Section 5.1) is often the quickest win.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迁移学习**（第5.1节）通常是快速取得成效的方法。'
- en: '**Process-Aware Models** (Section 5.10) if combining your domain knowledge
    with ML can reduce data requirements.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过程感知模型**（第5.10节）如果将你的领域知识与机器学习相结合，可以减少数据需求。'
- en: 5\. Strategies for Tackling Small Data
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 解决小数据问题的策略
- en: Hopefully, the above has provided a starting point for solving your small data
    problem. It’s worth noting that many of the techniques discussed are complex and
    resource intensive. So keep in mind you’ll likely need to get buy-in from your
    team and project managers before starting. This is best done through clear, concise
    communication of the potential value they might provide. Frame experiments as
    strategic, foundational work that can be reused, refined, and leveraged for future
    projects. Focus on demonstrating clear, measurable impact from a short, tightly-scoped
    pilot.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 希望上述内容能为解决你的小数据问题提供一个起点。值得注意的是，许多讨论的技术都是复杂且资源密集型的。因此，在开始之前，你很可能需要得到团队和项目经理的支持。这最好通过清晰、简洁地传达他们可能带来的潜在价值来实现。将实验定位为战略性的、基础性的工作，这些工作可以重复使用、改进并用于未来的项目。关注于展示短期、范围紧密的试点项目带来的明确、可衡量的影响。
- en: Despite the relatively simple picture painted of each technique below, it’s
    important to keep in mind there’s no one-size-fits-all solution, and applying
    these techniques isn’t like stacking lego bricks, nor do they work out-of-the-box.
    To get you started I’ve provided a brief overview of each technique, this is by
    no means exhaustive, but looks to offer a starting point for your own research.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管下面为每种技术描绘的图景相对简单，但重要的是要记住没有一种适合所有情况的解决方案，应用这些技术并不像堆叠乐高积木，它们也不是即插即用的。为了帮助你开始，我提供了每种技术的简要概述，这绝非详尽无遗，但旨在为你自己的研究提供一个起点。
- en: 5.1 Transfer Learning
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.1 迁移学习
- en: Transfer learning is about reusing existing models to solve new related problems.
    By starting with pre-trained weights, you leverage representations learned from
    large, diverse datasets and fine-tune the model on your smaller, target dataset.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 迁移学习是关于重用现有模型来解决新的相关问题。通过从大型、多样化的数据集中学习到的表示开始，你利用这些表示在较小的目标数据集上微调模型。
- en: '**Why it helps:**'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它有帮助：**'
- en: Leverages powerful features learnt from larger, often diverse datasets.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用从更大、通常多样化的数据集中学习到的强大特征。
- en: Fine-tuning pre-trained models typically leads to higher accuracy, even with
    limited samples, while reducing training time.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微调预训练模型通常会导致更高的准确性，即使在有限的样本下，同时减少训练时间。
- en: Ideal when compute resources or project timelines prevent training a model from
    scratch.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当计算资源或项目时间表阻止从头开始训练模型时，这是理想的。
- en: '**Tips:**'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示：**'
- en: Select a model aligned with your problem domain or a large general-purpose "foundation
    model" like Mistral (language) or CLIP/SAM (vision), accessible on platforms like
    Hugging Face. These models often outperform domain-specific pre-trained models
    due to their general-purpose capabilities.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择与你的问题领域一致或大型通用“基础模型”如Mistral（语言）或CLIP/SAM（视觉）的模型，这些模型在Hugging Face等平台上可访问。这些模型由于它们的通用能力，通常优于特定领域的预训练模型。
- en: Freeze layers that capture general features while fine-tuning only a few layers
    on top.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在微调时仅对顶部的一些层进行微调，同时冻结捕捉一般特征的层。
- en: To counter the risk of overfitting to your small datasets try pruning. Here,
    less important weights or connections are removed reducing the number of trainable
    parameters and increasing inference speed.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了降低对小型数据集过拟合的风险，尝试剪枝。在这里，移除不太重要的权重或连接，减少可训练参数的数量，并提高推理速度。
- en: If interpretability is required, large black-box models may not be ideal.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果需要可解释性，大型黑盒模型可能不是理想的选择。
- en: Without access to the pre-trained models source dataset, you risk reinforcing
    sampling biases during fine-tuning.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果无法访问预训练模型的源数据集，你可能会在微调过程中强化采样偏差。
- en: A nice example of transfer learning is described in the [following paper]([https://pmc.ncbi.nlm.nih.gov/articles/PMC8913041/#:~:text=The](https://pmc.ncbi.nlm.nih.gov/articles/PMC8913041/#:~:text=The)
    customized ResNet model presented,the clinical decision-making process.). Where
    leveraging a pre-trained ResNet model enabled better classification of chest X-ray
    images and detecting COVID-19\. Supported by the use of dropout and batch normalisation,
    the researchers froze the initial layers of the ResNet base model, while fine-tuning
    later layers, capturing task-specific, high-level features. This proved to be
    a cost effective method for achieving high accuracy with a small dataset.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 以下论文中描述了迁移学习的良好例子([https://pmc.ncbi.nlm.nih.gov/articles/PMC8913041/#:~:text=The](https://pmc.ncbi.nlm.nih.gov/articles/PMC8913041/#:~:text=The)
    定制的 ResNet 模型呈现的，临床决策过程）。其中利用预训练的 ResNet 模型能够更好地对胸部 X 光图像进行分类，并检测 COVID-19。通过使用
    dropout 和批量归一化，研究人员冻结了 ResNet 基础模型的初始层，同时微调后续层，捕捉特定任务的、高级别的特征。这被证明是一种成本效益高的方法，可以在小型数据集上实现高精度。
- en: 5.2 Self-Supervised Learning
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.2 自监督学习
- en: Self-supervised learning is a pre-training technique where artificial tasks
    ("pretext tasks") are created to learn representations from broad unlabelled data.
    Examples include predicting masked tokens for text or rotation prediction, colorisation
    for images. The result is general-purpose representations you can later pair with
    transfer-learning (section 5.1) or semi-supervised (section 5) and fine-tune with
    your smaller dataset.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 自监督学习是一种预训练技术，其中创建人工任务（“预训练任务”）来从广泛的无标签数据中学习表示。例如，预测文本中的掩码标记或图像的旋转预测、着色。结果是通用的表示，你可以稍后与迁移学习（第
    5.1 节）或半监督学习（第 5 节）相结合，并使用你的小数据集进行微调。
- en: '**Why it helps:**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么这有帮助：**'
- en: Pre-trained models serve as a strong initialisation point, reducing the risk
    of future overfitting.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预训练模型作为强大的初始点，降低了未来过拟合的风险。
- en: Learns to represent data in a way that captures intrinsic patterns and structures
    (e.g., spatial, temporal, or semantic relationships), making them more effective
    for downstream tasks.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习以捕捉内在模式和结构（例如，空间、时间或语义关系）的方式表示数据，使其对下游任务更有效。
- en: '**Tips:**'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示：**'
- en: Pre-tasks like cropping, rotation, colour jitter, or noise injection are excellent
    for visual tasks. However it’s a balance, as excessive augmentation can distort
    the distribution of small data.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预处理任务，如裁剪、旋转、颜色抖动或噪声注入，对于视觉任务非常出色。然而，这是一个平衡问题，因为过度的增强可能会扭曲小型数据的分布。
- en: Ensure unlabelled data is representative of the small dataset’s distribution
    to help the model learn features that generalise well.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保未标记数据代表小型数据集的分布，以帮助模型学习能够良好泛化的特征。
- en: Self-supervised methods can be compute-intensive; often requiring enough unlabelled
    data to truly benefit and a large computation budget.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自监督方法可能计算密集；通常需要足够的未标记数据以真正受益，以及大量的计算预算。
- en: '[LEGAL-BERT](https://arxiv.org/abs/2010.02559) is a prominent example of self-supervised
    learning. Legal-BERT is a domain-specific variant of the BERT language model,
    pre-trained on a large dataset of legal documents to improve its understanding
    of legal language, terminology, and context. The key, is the use of unlabelled
    data, where techniques such as masked language modelling (the model learns to
    predict masked words) and next sentence prediction (learning the relationships
    between sentences, and determining if one follows another) removes the requirement
    for labelling. This text embedding model can then be used for more specific legal
    based ML tasks.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '[LEGAL-BERT](https://arxiv.org/abs/2010.02559) 是自监督学习的一个显著例子。Legal-BERT 是一种针对特定领域的
    BERT 语言模型的变体，它在大量法律文档数据集上预训练，以提高其对法律语言、术语和上下文的理解。关键在于使用未标记数据，其中如掩码语言模型（模型学习预测掩码词）和下一句预测（学习句子之间的关系，并确定一个句子是否跟在另一个句子之后）的技术消除了标记的需求。这种文本嵌入模型可以用于更具体的基于法律的人工智能任务。'
- en: 5.3 Semi-Supervised Learning
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.3 半监督学习
- en: Leverages a small labeled dataset in addition to a larger unlabelled set. The
    model iteratively refines predictions on unlabelled data, to generate task specific
    predictions that can be used as "pseudo-labels" for further iterations.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 除了较大的未标记数据集外，还利用少量标记数据集。模型迭代地改进对未标记数据的预测，以生成特定任务的预测，这些预测可以用作进一步迭代的“伪”标签。
- en: '**Why it helps:**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它有帮助：**'
- en: Labeled data guides the task-specific objective, while the unlabelled data is
    used to improve generalisation (e.g., through pseudo-labelling, consistency regularisation,
    or other techniques).
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标签数据指导特定任务的客观目标，而未标记数据用于提高泛化能力（例如，通过伪标记、一致性正则化或其他技术）。
- en: Improves decision boundaries and can boost generalisation.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改善决策边界并可以增强泛化。
- en: '**Tips:**'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示：**'
- en: Consistency regularisation is a method that assumes model predictions should
    be consistent across small perturbations (noise, augmentations) made to unlabelled
    data. The idea is to "smooth" the decision boundary of sparsely populated high-dimensional
    space.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一致性正则化是一种假设模型预测应在对未标记数据（噪声、增强）进行的小扰动（噪声、增强）下保持一致的方法。其想法是“平滑”稀疏高维空间中的决策边界。
- en: Pseudo-labelling allows you to train an initial model with a small dataset and
    use future predictions on unlabelled data as "pseudo" labels for future training.
    With the aim of generalising better and reducing overfitting.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 伪标记允许您使用少量数据集训练初始模型，并使用对未标记数据的未来预测作为未来训练的“伪”标签。目的是更好地泛化并减少过拟合。
- en: Financial fraud detection is a problem that naturally lends itself to semi-supervised
    learning, with very little real labelled data (confirmed fraud cases) and a large
    set of unlabelled transaction data. The [following paper](https://arxiv.org/pdf/2003.01171)
    proposes a neat solution, by modelling transactions, users, and devices as nodes
    in a graph, where edges represent relationships, such as shared accounts or devices.
    The small set of labeled fraudulent data is then used to train the model by propagating
    fraud signals across the graph to the unlabelled nodes. For example, if a fraudulent
    transaction (labeled node) is linked to multiple unlabelled nodes (e.g., related
    users or devices), the model learns patterns and connections that might indicate
    fraud.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 财务欺诈检测是一个自然适合半监督学习的问题，因为实际标记数据（已确认的欺诈案例）非常少，而未标记的交易数据集很大。[以下论文](https://arxiv.org/pdf/2003.01171)提出了一种巧妙的方法，通过将交易、用户和设备建模为图中的节点，其中边表示关系，例如共享账户或设备。然后，使用少量标记的欺诈数据通过在图中传播欺诈信号到未标记的节点来训练模型。例如，如果一个欺诈交易（标记节点）与多个未标记节点（例如，相关用户或设备）相关联，模型就会学习可能表明欺诈的模式和联系。
- en: 5.4 Few-Shot and Zero-Shot Learning
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.4 少样本和零样本学习
- en: Few and zero-shot learning refers to a broad collection of techniques designed
    to tackle very small datasets head on. Generally these methods train a model to
    identify "novel" classes unseen during training, with a small labelled dataset
    used primarily for testing.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 少样本和零样本学习是指一系列旨在直接解决非常小数据集的技术。通常，这些方法训练模型以识别在训练期间未见过的“新颖”类别，主要使用少量标记数据集进行测试。
- en: '**Why it helps:**'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它有帮助：**'
- en: These approaches enable models to quickly adapt to new tasks or classes without
    extensive retraining.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些方法使模型能够快速适应新任务或类别，而无需大量重新训练。
- en: Useful for domains with rare or unique categories, such as rare diseases or
    niche object detection.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于具有罕见或独特类别（如罕见疾病或利基对象检测）的领域很有用。
- en: '**Tips:**'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示：**'
- en: Probably the most common technique, known as similarity-based learning, trains
    a model to compare pairs of items and decide if they belong to the same class.
    By learning a similarity or distance measure the model can generalise to unseen
    classes by comparing new instances to class prototypes (your small set of labelled
    data during testing) during testing. This approach requires a good way to represent
    different types of input (embedding), often created using Siamese neural networks
    or similar models.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能是最常见的技巧，称为基于相似性的学习，训练模型比较成对的项目并决定它们是否属于同一类别。通过学习相似性或距离度量，模型可以在测试期间通过将新实例与类别原型（测试期间的小量标记数据）进行比较来泛化到未见过的类别。这种方法需要一种良好的方式来表示不同类型的输入（嵌入），通常使用类似Siamese神经网络或类似模型创建。
- en: Optimisation-based meta-learning, aims to train a model to quickly adapt to
    new tasks or classes using only a small amount of training data. A popular example
    is model-agnostic meta-learning (MAML). Where a "meta-learner" is trained on many
    small tasks, each with its own training and testing examples. The goal is to teach
    the model to start from a good initial state, so when it encounters a new task,
    it can quickly learn and adjust with minimal additional training. These are not
    simple methods to implement.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于优化的元学习旨在训练一个模型，使其仅使用少量训练数据就能快速适应新的任务或类别。一个流行的例子是模型无关的元学习（MAML）。在这种方法中，“元学习器”在许多小任务上进行训练，每个任务都有其自身的训练和测试示例。目标是教会模型从一个良好的初始状态开始，这样当它遇到新的任务时，它可以快速学习并调整，而无需额外的训练。这些方法并不简单易行。
- en: A more classical technique, one-class classification, is where a binary classifier
    (like one class SVM) is trained on data from only one class, and learns to detect
    outliers during testing.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一种更经典的技术，即单类分类，是在仅使用一个类别的数据上训练二元分类器（如单类SVM），并在测试期间学习检测异常值。
- en: Zero-shot approaches, such as CLIP or large language models with prompt engineering,
    enable classification or detection of unseen categories using textual cues (e.g.,
    "a photo of a new product type").
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 零样本方法，如CLIP或带有提示工程的大语言模型，能够使用文本提示（例如，“一种新产品类型的照片”）对未见过的类别进行分类或检测。
- en: In zero-shot cases, combine with active learning (human in the loop) to label
    the most informative examples.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在零样本情况下，结合主动学习（人工参与）来标记最有信息量的示例。
- en: It’s important to maintain realistic expectations when implementing few-shot
    and zero-shot techniques. Often, the aim is to achieve usable or "good enough"
    performance. As a direct comparison of traditional deep-learning (DL) methods,
    the [following study](https://pdf.sciencedirectassets.com/273474/1-s2.0-S1574954121X00039/1-s2.0-S1574954121001114/am.pdf?X-Amz-Security-Token=IQoJb3JpZ2luX2VjEBUaCXVzLWVhc3QtMSJHMEUCIQDfYiAEiSUcw2kzloRHD9NuMQQYU4UDfC9wmkQE6RZb1AIgGjzmOp1Im5GTx8lYQLujZKHyjjH%2BzF7beKSPgHSulvgqvAUI7f%2F%2F%2F%2F%2F%2F%2F%2F%2F%2FARAFGgwwNTkwMDM1NDY4NjUiDDj9ztsZsdQl7rPIACqQBZ%2FVvm4rA3XllaxusPEzjNGRUqqZJM1gqAVRbq6H5c3tCw7%2FyrZ6x3bu%2B%2BK%2BEb5kb%2BRKKC29zHCqn8BNutC6hSogpnmpUN31t7lz7VwHiJNmupKmZ14dSkuAvB7XX%2BjHb5X2U7tGJJonZFmKFZ2cAXHjOEUGV0ji%2F1zpupi4Uood9y58OoKtsiewidmtDSAaOo8LvVkYjWlLpGEkEoio2VhFVHhlxM0v%2F4VVrnMRf%2Bp3zvntLHw7cjJGS3i%2BXACH4kkqtUMUaQXTP7NfGMpZEml0aUOnbTk%2FPAwtR8XfJ2N77fLyoFzJNiBDz1NHlqkifHVcGIFKcTsmPPDa1FI%2Fh%2F1aMVhT%2B%2BxjuotZLaipCJqJQ7rNTzTrhaYgg1qrggZR62w93%2BL0v%2FmYuXcrDK4y%2Fs8%2FxhAsDsG5qp9JS%2FOiPeI2Pb598j7mG5srWEHn5c0QsGJyjSvpqDzx%2FcSACK%2BCLNj6I78UbSjs6SfVEaD%2B%2B7xV9i36BWbmxmqCy08OvD95%2Ffk15%2FATPLd5iqcF8%2BsuQqPgA%2Be2y%2BVX9AWqu7HtfUR811wrVccoD%2FVTZvx0TBsN2eJSCx2TF6O1VCTAI%2FQI%2Bw6D4re3%2FgsAjqOYIs67MAkPhPlCXSw0pgXe9AMZis79GZgRyLCnnz0NVQ%2FafuDQomOwpoxuqJAJsYgSzCop1qUVTvt68wTFNujBHYH8Rpw6tonDLeCppM5xLM53W0DcanW8UoQZ6LIkTpIzKvbV9XZy%2FvhH6wD2w%2FrIFMoxuE8BYvMafFctxwDPM5h8VAFZVlG49V4dH7JQvM4HaPkFEhDt4teWlsN5KAKBj544VA2nlMnn4rCjgyjn7cMCGHR%2BZx7giCmyQ6rhAq3AMuSHea6AMMyl37sGOrEBWnXjFKRG7wNGIe6CW5I23D%2BwvnxsVUvIv%2FVs3%2FnZ%2Br1cZT6glBVELdl5l3uezsZC9iadJFKQKHlA4O4gXpGDo5LlCAC8LdkeKsfnRDces%2FZZ%2BHcf7R9koLYSWlAC7YHEIGnEATzgqON%2FkAkbjZWQL0tFDcnrlIeNJZRvOu4FmaYQ2Tto0e7PdYOCFGcObr6QPpP2nlnsNLZ%2FxZwjtERbbrwU0SnUbb7lg1T52m3hUQ0b&X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Date=20250103T125851Z&X-Amz-SignedHeaders=host&X-Amz-Expires=299&X-Amz-Credential=ASIAQ3PHCVTYYHKOBB5V%2F20250103%2Fus-east-1%2Fs3%2Faws4_request&X-Amz-Signature=25041d1b37618c306207456b41a3905fc0658b831498fb0c390a8a88c9eebb07&hash=328282127df9bb81cffbb7e6d3a5707280d4a4f28ce847b48bd3349c6f77f785&host=68042c943591013ac2b2430a89b270f6af2c76d8dfd086a07176afe7c76c2c61&pii=S1574954121001114&tid=pdf-5118178c-5c3b-43bb-87b2-198f0b1c130b&sid=8953876d7875a54f3e199841e3e9122c6748gxrqb&type=client)
    compares both DL and few-shot learning (FSL) for classifying 20 coral reef fish
    species from underwater images with applications for detecting rare species with
    limited available data. It should come as no surprise that the best model tested
    was a DL model based on ResNet. With ~3500 examples for each species the model
    achieved an accuracy of 78%. However, collecting this volume of data for rare
    species is beyond practical. Subsequently, the number of samples was reduced to
    315 per species, and the accuracy dropped to 42%. In contrast, the FSL model,
    achieved comparable results with as few as 5 labeled images per species, and better
    performance beyond 10 shots. Here, the Reptile algorithm was used, which is a
    meta-learning-based FSL approach. This was trained by repeatedly solving small
    classification problems (e.g., distinguishing a few classes) drawn from the MiniImageNet
    dataset (a useful benchmark dataset for FSL). During fine-tuning, the model was
    then trained using a few labeled examples (1 to 30 shots per species).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在实施少样本和零样本技术时，保持现实期望是很重要的。通常，目标是实现可用的或“足够好”的性能。作为与传统深度学习（DL）方法的直接比较，[以下研究](https://pdf.sciencedirectassets.com/273474/1-s2.0-S1574954121X00039/1-s2.0-S1574954121001114/am.pdf?X-Amz-Security-Token=IQoJb3JpZ2luX2VjEBUaCXVzLWVhc3QtMSJHMEUCIQDfYiAEiSUcw2kzloRHD9NuMQQYU4UDfC9wmkQE6RZb1AIgGjzmOp1Im5GTx8lYQLujZKHyjjH%2BzF7beKSPgHSulvgqvAUI7f%2F%2F%2F%2F%2F%2F%2F%2F%2F%2FARAFGgwwNTkwMDM1NDY4NjUiDDj9ztsZsdQl7rPIACqQBZ%2FVvm4rA3XllaxusPEzjNGRUqqZJM1gqAVRbq6H5c3tCw7%2FyrZ6x3bu%2B%2BK%2BEb5kb%2BRKKC29zHCqn8BNutC6hSogpnmpUN31t7lz7VwHiJNmupKmZ14dSkuAvB7XX%2BjHb5X2U7tGJJonZFmKFZ2cAXHjOEUGV0ji%2F1zpupi4Uood9y58OoKtsiewidmtDSAaOo8LvVkYjWlLpGEkEoio2VhFVHhlxM0v%2F4VVrnMRf%2Bp3zvntLHw7cjJGS3i%2BXACH4kkqtUMUaQXTP7NfGMpZEml0aUOnbTk%2FPAwtR8XfJ2N77fLyoFzJNiBDz1NHlqkifHVcGIFKcTsmPPDa1FI%2Fh%2F1aMVhT%2B%2BxjuotZLaipCJqJQ7rNTzTrhaYgg1qrggZR62w93%2BL0v%2FmYuXcrDK4y%2Fs8%2FxhAsDsG5qp9JS%2FOiPeI2Pb598j7mG5srWEHn5c0QsGJyjSvpqDzx%2FcSACK%2BCLNj6I78UbSjs6SfVEaD%2B%2B7xV9i36BWbmxmqCy08OvD95%2Ffk15%2FATPLd5iqcF8%2BsuQqPgA%2Be2y%2BVX9AWqu7HtfUR811wrVccoD%2FVTZvx0TBsN2eJSCx2TF6O1VCTAI%2FQI%2Bw6D4re3%2FgsAjqOYIs67MAkPhPlCXSw0pgXe9AMZis79GZgRyLCnnz0NVQ%2FafuDQomOwpoxuqJAJsYgSzCop1qUVTvt68wTFNujBHYH8Rpw6tonDLeCppM5xLM53W0DcanW8UoQZ6LIkTpIzKvbV9XZy%2FvhH6wD2w%2FrIFMoxuE8BYvMafFctxwDPM5h8VAFZVlG49V4dH7JQvM4HaPkFEhDt4teWlsN5KAKBj544VA2nlMnn4rCjgyjn7cMCGHR%2BZx7giCmyQ6rhAq3AMuSHea6AMMyl37sGOrEBWnXjFKRG7wNGIe6CW5I23D%2BwvnxsVUvIv%2FVs3%2FnZ%2Br1cZT6glBVELdl5l3uezsZC9iadJFKQKHlA4O4gXpGDo5LlCAC8LdkeKsfnRDces%2FZZ%2BHcf7R9koLYSWlAC7YHEIGnEATzgqON%2FkAkbjZWQL0tFDcnrlIeNJZRvOu4FmaYQ2Tto0e7PdYOCFGcObr6QPpP2nlnsNLZ%2FxZwjtERbbrwU0SnUbb7lg1T52m3hUQ0b&X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Date=20250103T125851Z&X-Amz-SignedHeaders=host&X-Amz-Expires=299&X-Amz-Credential=ASIAQ3PHCVTYYHKOBB5V%2F20250103%2Fus-east-1%2Fs3%2Faws4_request&X-Amz-Signature=25041d1b37618c306207456b41a3905fc0658b831498fb0c390a8a88c9eebb07&hash=328282127df9bb81cffbb7e6d3a5707280d4a4f28ce847b48bd3349c6f77f785&host=68042c943591013ac2b2430a89b270f6af2c76d8dfd086a07176afe7c76c2c61&pii=S1574954121001114&tid=pdf-5118178c-5c3b-43bb-87b2-198f0b1c130b&sid=8953876d7875a54f3e199841e3e9122c6748gxrqb&type=client)比较了深度学习（DL）和少样本学习（FSL）在从水下图像中分类20种珊瑚礁鱼类物种的应用，用于检测数据有限的情况下稀有物种。毫不奇怪，测试中表现最好的模型是基于ResNet的深度学习模型。对于每种物种大约有3500个示例，模型达到了78%的准确率。然而，收集稀有物种如此大量的数据是不切实际的。随后，样本数量减少到每种物种315个，准确率下降到42%。相比之下，FSL模型，只需每种物种5个标记图像，就能达到可比的结果，并且超过10次射击后性能更好。在这里，使用了基于元学习的FSL方法——Reptile算法。该算法通过反复解决从小型图像网络数据集（FSL的有用基准数据集）中抽取的小型分类问题（例如，区分几个类别）进行训练。在微调期间，模型使用少量标记示例（每种物种1到30次射击）进行训练。
- en: 5.5 Weakly Supervised Learning
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.5 弱监督学习
- en: 'Weakly supervised learning describes a set of techniques for building models
    with noisy, inaccurate or restricted sources to label large quantities of data.
    We can split the topic into three: incomplete, inexact, and inaccurate supervision,
    distinguished by the confidence in the labels. Incomplete supervision occurs when
    only a subset of examples has ground-truth labels. Inexact supervision involves
    coarsely-grained labels, like labelling an MRI image as "lung cancer" without
    specifying detailed attributes. Inaccurate supervision arises when labels are
    biased or incorrect due to human.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 弱监督学习描述了一组使用噪声、不准确或受限的来源来标记大量数据的建模技术。我们可以将这个主题分为三个部分：不完整、不精确和不准确监督，这些部分通过标签的置信度来区分。不完整监督发生在只有一部分示例具有真实标签的情况下。不精确监督涉及粗粒度标签，例如将MRI图像标记为“肺癌”而不指定详细属性。不准确监督出现在标签由于人为因素而存在偏差或错误时。
- en: '**Why it helps:**'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它有帮助：**'
- en: Partial or inaccurate data is often simpler and cheaper to get hold of.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全或不准确的数据通常更容易获取且成本更低。
- en: Enables models to learn from a larger pool of information without the need for
    extensive manual labelling.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使模型能够在不需要大量手动标记的情况下从更大的信息池中学习。
- en: Focuses on extracting meaningful patterns or features from data, that can amplify
    the value of any existing well labeled examples.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专注于从数据中提取有意义的模式或特征，这可以放大任何现有良好标记示例的价值。
- en: '**Tips:**'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示：**'
- en: Use a small subset of high-quality labels (or an ensemble) to correct systematic
    labelling errors.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用高质量标签的小子集（或集成）来纠正系统性的标记错误。
- en: For scenarios where coarse-grained labels are available (e.g., image-level labels
    but not detailed instance-level labels), Multi-instance learning can be employed.
    Focusing on bag-level classification since instance-level inaccuracies are less
    impactful.
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于粗粒度标签可用（例如，图像级标签但没有详细实例级标签）的场景，可以使用多实例学习。由于实例级的不准确性影响较小，因此主要关注包级分类。
- en: Label filtering, correction, and inference techniques can mitigate label noise
    and minimise reliance on expensive manual labels.
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标签过滤、纠正和推理技术可以减轻标签噪声并最小化对昂贵的手动标签的依赖。
- en: The primary goal of this technique is to estimate more informative or higher
    dimensional data with limited information. As an example, [this paper](https://arxiv.org/abs/1902.09868)
    presents a weakly supervised learning approach to estimating a 3D human poses.
    The method relies on 2D pose annotations, avoiding the need for expensive 3D ground-truth
    data. Using an adversarial reprojection network (RepNet), the model predicts 3D
    poses and reprojects them into 2D views to compare with 2D annotations, minimising
    reprojection error. This approach leverages adversarial training to enforce plausibility
    of 3D poses and showcases the potential of weakly supervised methods for complex
    tasks like 3D pose estimation with limited labeled data.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术的首要目标是使用有限的信息估计更信息丰富或更高维度的数据。例如，[这篇论文](https://arxiv.org/abs/1902.09868)提出了一种弱监督学习方法来估计3D人体姿态。该方法依赖于2D姿态标注，避免了需要昂贵的3D真实数据。使用对抗重投影网络（RepNet），模型预测3D姿态并将它们重新投影到2D视图中，与2D标注进行比较，以最小化重投影误差。这种方法利用对抗训练来强制执行3D姿态的合理性，并展示了弱监督方法在复杂任务（如有限标记数据的3D姿态估计）中的潜力。
- en: 5.6 Active Learning
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.6 活跃学习
- en: Active learning seeks to optimise labelling efforts by identifying unlabelled
    samples that, once labeled, will provide the model with the most informative data.
    A common approach is uncertainty sampling, which selects samples where the model’s
    predictions are least certain. This uncertainty is often quantified using measures
    such as entropy or margin sampling. This is highly iterative; each round influences
    the model’s next set of predictions.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 活跃学习旨在通过识别一旦标记就能为模型提供最有信息数据的未标记样本来优化标记工作。一种常见的方法是不确定性采样，它选择模型预测最不确定的样本。这种不确定性通常使用熵或边缘采样等度量来量化。这是一个高度迭代的流程；每一轮都会影响模型下一组预测。
- en: '**Why it helps:**'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它有帮助：**'
- en: Optimises expert time; you label fewer samples overall.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化专家时间；总体上需要标记的样本更少。
- en: Quickly identifies edge cases that improve model robustness.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速识别边缘情况，这可以提高模型的鲁棒性。
- en: '**Tips:**'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示：**'
- en: Diversity sampling is an alternative selection approach that focuses on diverse
    area of the feature space. For instance, clustering can be used to select a few
    representative samples from each cluster.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多样性采样是一种替代选择方法，它关注特征空间的不同区域。例如，可以使用聚类从每个簇中选择几个代表性样本。
- en: Try to use multiple selection methods to avoid introducing bias.
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试使用多种选择方法以避免引入偏差。
- en: Introducing an expert human in the loop can be logistically difficult, managing
    availability with a labelling workflow that can be slow/expensive.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在线路上引入专家可能会在物流上遇到困难，管理可用性与可能缓慢/昂贵的标记工作流程。
- en: This technique has been extensively used in chemical analysis and materials
    research. Where, large databases of real and simulated molecular structures and
    their properties have been collected over decades. These databases are particularly
    useful for drug discovery, where simulations like docking are used to predict
    how small molecules (e.g., potential drugs) interact with targets such as proteins
    or enzymes. However, the computational cost of performing these types of calculations
    over millions of molecules makes brute force studies impractical. This is where
    active learning comes in. [One such study](https://pubs.rsc.org/en/content/articlehtml/2021/sc/d0sc06805e#cit18)
    showed that by training a predictive model on an initial subset of docking results
    and iteratively selecting the most uncertain molecules for further simulations,
    researchers were able to drastically reduce the number of molecules tested while
    still identifying the best candidates.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术在化学分析和材料研究中得到了广泛的应用。在这些领域，数十年来收集了大量的真实和模拟分子结构及其性质的大型数据库。这些数据库在药物发现中特别有用，其中模拟如对接被用来预测小分子（例如，潜在的药物）如何与蛋白质或酶等靶标相互作用。然而，在数百万个分子上执行这些类型计算的计算成本使得
    brute force 研究变得不切实际。这就是主动学习发挥作用的地方。[一项这样的研究](https://pubs.rsc.org/en/content/articlehtml/2021/sc/d0sc06805e#cit18)表明，通过在一个初始对接结果子集上训练预测模型，并迭代选择最不确定的分子进行进一步模拟，研究人员能够在仍然识别出最佳候选人的同时，大幅减少测试的分子数量。
- en: 5.7 Data Augmentation
  id: totrans-132
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.7 数据增强
- en: Artificially increase your dataset by applying transformations to existing examples
    – such as flipping or cropping images, translation or synonym replacement for
    text and time shifts or random cropping for time-series. Alternatively, upsample
    underrepresented data with ADASYN (Adaptive Synthetic Sampling) and SMOTE (Synthetic
    Minority Over-sampling Technique).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对现有示例应用转换来人工增加你的数据集，例如翻转或裁剪图像，对文本进行翻译或同义词替换，以及对于时间序列进行时间移动或随机裁剪。或者，使用ADASYN（自适应合成采样）和SMOTE（合成少数类过采样技术）对代表性不足的数据进行上采样。
- en: '**Why it helps:**'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么这有帮助：**'
- en: The model focuses on more general and meaningful features rather than specific
    details tied to the training set.
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型专注于更通用和有意义的特征，而不是与训练集相关的特定细节。
- en: Instead of collecting and labelling more data, augmentation provides a cost-effective
    alternative.
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与收集和标记更多数据相比，增强提供了一种成本效益更高的替代方案。
- en: Improves generalisation by increasing the diversity of training data, helping
    learn robust and invariant features rather than overfitting to specific patterns.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过增加训练数据的多样性来提高泛化能力，帮助学习鲁棒和不变的特征，而不是过度拟合到特定的模式。
- en: '**Tips:**'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示：**'
- en: Keep transformations domain-relevant (e.g., flipping images vertically might
    make sense for flower images, less so for medical X-rays).
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持转换与领域相关（例如，垂直翻转图像对于花卉图像可能是有意义的，但对于医学X射线则不然）。
- en: Pay attention that any augmentations don’t distort the original data distribution,
    preserving the underlying patterns.
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意，任何增强都不应扭曲原始数据分布，保留潜在的模式。
- en: Explore GANs, VAEs, or diffusion models to produce synthetic data – but this
    often requires careful tuning, domain-aware constraints, and enough initial data.
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索GANs、VAEs或扩散模型来生成合成数据——但这通常需要仔细调整、领域感知约束以及足够的初始数据。
- en: Synthetic oversampling (like SMOTE) can introduce noise or spurious correlations
    if the classes or feature space are complex and not well understood.
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果类别或特征空间复杂且理解不充分，合成过采样（如SMOTE）可能会引入噪声或虚假相关性。
- en: Data augmentation is an incredibly broad topic, with numerous surveys exploring
    the current state-of-the-art across various fields, including computer vision
    ([[[review paper](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0254841)](https://direct.mit.edu/tacl/article/doi/10.1162/tacl_a_00542/115238/An-Empirical-Survey-of-Data-Augmentation-for)](https://www.sciencedirect.com/science/article/pii/S2590005622000911)),
    natural language processing (review paper), and time-series data (review paper).
    It has become an integral component of most machine learning pipelines due to
    its ability to enhance model generalisation. This is particularly critical for
    small datasets, where augmenting input data by introducing variations, such as
    transformations or noise, and removing redundant or irrelevant features can significantly
    improve a model’s robustness and performance.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 数据增强是一个极其广泛的主题，有众多调查探讨了各个领域当前最先进的状态，包括计算机视觉([[[综述论文](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0254841)](https://direct.mit.edu/tacl/article/doi/10.1162/tacl_a_00542/115238/An-Empirical-Survey-of-Data-Augmentation-for)](https://www.sciencedirect.com/science/article/pii/S2590005622000911))、自然语言处理(综述论文)和时间序列数据(综述论文)。由于其增强模型泛化的能力，它已成为大多数机器学习管道的一个基本组成部分。这对于小数据集尤其关键，通过引入变化（如变换或噪声）和去除冗余或不相关特征来增强输入数据，可以显著提高模型的鲁棒性和性能。
- en: 5.8 Multitask Learning
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.8 多任务学习
- en: Here we train one model to solve several tasks simultaneously. This improves
    how well models perform by encouraging them to find patterns or solutions that
    work well for multiple goals at the same time. Lower layers capture general features
    that benefit all tasks, even if you have limited data for some.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们训练一个模型同时解决多个任务。这通过鼓励模型找到同时适用于多个目标的模式或解决方案来提高模型的表现。底层捕获对所有任务都有益的通用特征，即使对于某些任务数据有限也是如此。
- en: '**Why it helps:**'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它有帮助：**'
- en: Shared representations are learned across tasks, effectively increasing sample
    size.
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在任务间学习共享表示，有效地增加了样本量。
- en: The model is less likely to overfit, as it must account for patterns relevant
    to all tasks, not just one.
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型不太可能过拟合，因为它必须考虑到所有任务的相关模式，而不仅仅是单一任务。
- en: Knowledge learned from one task can provide insights that improve performance
    on another.
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一个任务中学到的知识可以提供改进另一个任务性能的见解。
- en: '**Tips:**'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示：**'
- en: Tasks need some overlap or synergy to meaningfully share representations; otherwise
    this method will hurt performance.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务需要一些重叠或协同作用，以便有意义地共享表示；否则，这种方法会损害性能。
- en: Adjust per-task weights carefully to avoid letting one task dominate training.
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仔细调整每个任务的权重，以避免让一个任务主导训练。
- en: The scarcity of data for many practical applications of ML makes sharing both
    data and models across tasks an attractive proposition. This is enabled by Multitask
    learning, where tasks benefit from shared knowledge and correlations in overlapping
    domains. However, it requires a large, diverse dataset that integrates multiple
    related properties. [Polymer design is one example](https://www.cell.com/patterns/fulltext/S2666-3899(21)00058-1)
    where this has been successful. Here, a hybrid dataset of 36 properties across
    13,000 polymers, covering a mix of mechanical, thermal, and chemical characteristics,
    was used to train a deep-learning-based MTL architecture. The multitask model
    outperformed single-task models for every polymer property. Particularly, for
    underrepresented properties.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 对于许多机器学习的实际应用，数据稀缺使得在任务间共享数据和模型成为一个吸引人的提议。这通过多任务学习实现，其中任务从重叠领域的共享知识和相关性中受益。然而，它需要一个大型、多样化的数据集，该数据集整合了多个相关属性。[聚合物设计是一个成功的例子](https://www.cell.com/patterns/fulltext/S2666-3899(21)00058-1)，在这里这种方法已经取得了成功。在这里，一个包含13,000种聚合物、36个属性的混合数据集被用来训练一个基于深度学习的多任务学习架构。多任务模型在所有聚合物属性上都优于单任务模型。特别是，对于代表性不足的属性。
- en: 5.9 Ensemble Learning
  id: totrans-154
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.9 集成学习
- en: 'Ensembles aggregate predictions from several base models to improve robustness.
    Generally, ML algorithms can be limited in a variety of ways: high variance, high
    bias, and low accuracy. This manifests as different uncertainty distributions
    for different models across predictions. Ensemble methods limit the variance and
    bias errors associated with a single model; for example, bagging reduces variance
    without increasing the bias, while boosting reduces bias.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 集成通过聚合多个基础模型的预测来提高鲁棒性。通常，机器学习算法在多种方式上可能有限制：高方差、高偏差和低精度。这表现为不同模型在预测中的不同不确定性分布。集成方法限制了与单个模型相关的方差和偏差错误；例如，bagging减少了方差而不增加偏差，而boosting减少了偏差。
- en: '**Why it helps:**'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么这有帮助：**'
- en: Diversifies "opinions" across different model architectures.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在不同的模型架构间多样化“观点”。
- en: Reduces variance, mitigating overfitting risk.
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少方差，减轻过拟合风险。
- en: '**Tips:**'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: '**技巧：**'
- en: Avoid complex base models which can easily overfit small datasets. Instead,
    use regularised models such as shallow trees or linear models with added constraints
    to control complexity.
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免复杂的基模型，这些模型容易对小数据集过拟合。相反，使用具有附加约束的正规化模型，如浅树或线性模型来控制复杂性。
- en: Bootstrap aggregating (bagging) methods like Random Forest can be particularly
    useful for small datasets. By training multiple models on bootstrapped subsets
    of the data, you can reduce overfitting while increasing robustness. This is effective
    for algorithms prone to high variance, such as decision trees.
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 类似于随机森林的Bootstrap aggregating (bagging) 方法对于小数据集特别有用。通过在数据的自助子集上训练多个模型，你可以减少过拟合同时增加鲁棒性。这对于容易产生高方差算法，如决策树，是有效的。
- en: Combine different base models types (e.g., SVM, tree-based models, and logistic
    regression) with a simple meta-model like logistic regression to combine predictions.
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将不同的基础模型类型（例如，SVM、基于树的模型和逻辑回归）与一个简单的元模型（如逻辑回归）结合，以结合预测。
- en: As an example, the [following paper](https://www.nature.com/articles/s41598-021-93783-8)
    highlights ensemble learning as a method to improve the classification of cervical
    cytology images. In this case, three pre-trained neural networks – Inception v3,
    Xception, and DenseNet-169 – were used. The diversity of these base models ensured
    the ensemble benefits from each models unique strengths and feature extraction
    capabilities. This combined with the fusion of model confidences, via a method
    that rewards confident, accurate predictions while penalising uncertain ones,
    maximised the utility of the limited data. Combined with transfer learning, the
    final predictions were robust to the errors of any particular model, despite the
    small dataset used.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，[以下论文](https://www.nature.com/articles/s41598-021-93783-8)突出了集成学习作为提高宫颈细胞学图像分类的方法。在这种情况下，使用了三个预训练的神经网络
    – Inception v3、Xception和DenseNet-169。这些基础模型的多样性确保了集成从每个模型的独特优势和特征提取能力中受益。这结合了通过一种奖励自信、准确的预测同时惩罚不确定预测的方法来融合模型置信度，最大化了有限数据的效用。结合迁移学习，最终的预测对任何特定模型的错误具有鲁棒性，尽管使用了小数据集。
- en: 5.10 Process-Aware (Hybrid) Models
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.10 过程感知（混合）模型
- en: Integrate domain-specific knowledge or physics-based constraints into ML models.
    This embeds prior knowledge, reducing the model’s reliance on large data to infer
    patterns. For example, using partial differential equations alongside neural networks
    for fluid dynamics.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 将领域特定的知识或基于物理的约束整合到机器学习模型中。这嵌入先验知识，减少了模型对大量数据推断模式的依赖。例如，使用偏微分方程与神经网络结合用于流体动力学。
- en: '**Why it helps:**'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么这有帮助：**'
- en: Reduces the data needed to learn patterns that are already well understood.
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少了学习已经理解良好的模式所需的数据。
- en: Acts as a form of regularisation, guiding the model to plausible solutions even
    when the data is sparse or noisy.
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作为一种正则化形式，即使在数据稀疏或噪声的情况下，也能引导模型到合理的解。
- en: Improves interpretability and trust in domain-critical contexts.
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高了在领域关键环境中的可解释性和信任度。
- en: '**Tips:**'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: '**技巧：**'
- en: Continually verify that model outputs make physical/biological sense, not just
    numerical sense.
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续验证模型输出在物理/生物学上是有意义的，而不仅仅是数值上有意义。
- en: Keep domain constraints separate but feed them as inputs or constraints in your
    model’s loss function.
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持领域约束的分离，但将它们作为输入或约束输入到你的模型损失函数中。
- en: Be careful to balance domain-based constraints with your models ability to learn
    new phenomena.
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意平衡基于领域的约束与模型学习新现象的能力。
- en: In practice, bridging domain-specific knowledge with data-driven methods often
    involves serious collaboration, specialised code, or hardware.
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实践中，将领域特定知识与数据驱动方法相结合通常需要严肃的合作、专门的代码或硬件。
- en: Constraining a model, in this way requires a deep understanding of your problem
    domain, and is often applied to problems where the environment the model operates
    in is well understood, such as physical systems. [An example of this is lithium-ion
    battery modelling](https://www.sciencedirect.com/science/article/abs/pii/S030626192201546X?via%3Dihub),
    where domain knowledge of battery dynamics is integrated into the ML process.
    This allows the model to capture complex behaviours and uncertainties missed by
    traditional physical models, ensuring physically consistent predictions and improved
    performance under real-world conditions like battery aging.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式约束模型，需要深入理解你的问题领域，并且通常应用于模型运行的环境被充分理解的问题中，例如物理系统。[一个例子是锂离子电池建模](https://www.sciencedirect.com/science/article/abs/pii/S030626192201546X?via%3Dihub)，其中将电池动力学领域的知识整合到机器学习过程中。这使得模型能够捕捉到传统物理模型所遗漏的复杂行为和不确定性，确保在电池老化等实际条件下进行物理一致的预测并提高性能。
- en: 6\. Conclusion
  id: totrans-176
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 结论
- en: 'For me, projects constrained by limited data are some of the most interesting
    projects to work on – despite the higher risk of failure, they offer an opportunity
    to explore the state-of-the-art and experiment. These are tough problems! However,
    systematically applying the strategies covered in this post can greatly improve
    your odds of delivering a robust, effective model. Embrace the iterative nature
    of these problems: refine labels, employ augmentations, and analyse errors in
    quick cycles. Short pilot experiments help validate each technique’s impact before
    you invest further.'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，受限于数据的工程项目是一些最有趣的项目之一——尽管失败的风险较高，但它们提供了探索前沿技术和进行实验的机会。这些都是难题！然而，系统地应用本文中涵盖的策略可以大大提高你交付一个稳健、有效的模型的机会。接受这些问题的迭代本质：细化标签，采用增强，并在快速周期中分析错误。简短的试点实验有助于在进一步投资之前验证每种技术的效果。
