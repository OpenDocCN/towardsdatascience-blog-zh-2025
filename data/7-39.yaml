- en: 'Where to Start when Data is Limited: A Guide'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据有限时如何开始：指南
- en: 原文：[https://towardsdatascience.com/effective-ml-with-limited-data-where-to-start-194492e7a6f8/](https://towardsdatascience.com/effective-ml-with-limited-data-where-to-start-194492e7a6f8/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/effective-ml-with-limited-data-where-to-start-194492e7a6f8/](https://towardsdatascience.com/effective-ml-with-limited-data-where-to-start-194492e7a6f8/)
