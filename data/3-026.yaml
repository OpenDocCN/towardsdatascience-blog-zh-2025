- en: Attaining LLM Certainty with AI Decision Circuits
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用AI决策电路实现LLM确定性
- en: 原文：[https://towardsdatascience.com/attaining-llm-certainty-with-ai-decision-circuits/](https://towardsdatascience.com/attaining-llm-certainty-with-ai-decision-circuits/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/attaining-llm-certainty-with-ai-decision-circuits/](https://towardsdatascience.com/attaining-llm-certainty-with-ai-decision-circuits/)
- en: <mdspan datatext="el1746128471751" class="mdspan-comment">The promise</mdspan>
    of AI agents has taken the world by storm. Agents can interact with the world
    around them, write articles (not this one though), take actions on your behalf,
    and generally make the difficult part of automating any task easy and approachable.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746128471751" class="mdspan-comment">AI代理的承诺席卷了整个世界**。**代理可以与周围的世界互动，撰写文章（当然不包括这篇），代表你采取行动，并且通常使任何任务的自动化变得容易且可接近**。**
- en: Agents take aim at the most difficult parts of processes and churn through the
    issues quickly. Sometimes too quickly — if your agentic process requires a human
    in the loop to decide on the outcome, the human review stage can become the bottleneck
    of the process.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 代理针对流程中最困难的部分，快速处理问题。有时过于迅速——如果你的代理过程需要人类在循环中决定结果，那么人类审查阶段可能会成为流程的瓶颈。
- en: An example agentic process handles customer phone calls and categorizes them.
    Even a 99.95% accurate agent will make 5 mistakes while listening to 10,000 calls.
    Despite knowing this, the agent can’t tell you **which** 5 of the 10,000 calls
    are mistakenly categorized.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 一个示例代理过程处理客户电话并对其进行分类。即使一个99.95%准确的代理在听取10,000个电话的过程中也会犯5个错误。尽管知道这一点，代理也无法告诉你**哪**5个10,000个电话被错误分类。
- en: LLM-as-a-Judge is a technique where you feed each input to another LLM process
    to have it judge if the output coming from the input is correct. However, because
    this is yet another LLM process, it can also be inaccurate. These two probabilistic
    processes create a confusion matrix with true-positives, false-positives, false-negatives,
    and true-negatives.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: LLM作为裁判是一种技术，其中你将每个输入喂给另一个LLM过程，以判断从输入输出的结果是否正确。然而，因为这也是另一个LLM过程，它也可能是不准确的。这两个概率过程创建了一个包含真正例、假正例、假反例和真反例的混淆矩阵。
- en: In other words, an input correctly categorized by an LLM process might be judged
    as incorrect by its judge LLM or vice versa.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，一个被LLM过程正确分类的输入可能被其判断LLM或反之判断为不正确。
- en: '![](../Images/5dc22c65d6631202b412a604396ea9b5.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5dc22c65d6631202b412a604396ea9b5.png)'
- en: A confusion matrix ([ThresholdTom](https://commons.wikimedia.org/wiki/File:ConfusionMatrixRedBlue.png),
    Public domain, via Wikimedia Commons)
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 混淆矩阵 ([ThresholdTom](https://commons.wikimedia.org/wiki/File:ConfusionMatrixRedBlue.png)，公有领域，通过维基媒体共享)
- en: Because of this “[known unknown](https://en.wikipedia.org/wiki/There_are_unknown_unknowns)”,
    for a sensitive workload, a human still must review and understand all 10,000
    calls. We’re right back to the same bottleneck problem again.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这种“[已知未知](https://en.wikipedia.org/wiki/There_are_unknown_unknowns)”，对于敏感的工作负载，人类仍然必须审查和理解所有10,000个电话。我们又回到了同样的瓶颈问题。
- en: How could we build more statistical certainty into our agentic processes? In
    this post, I build a system that allows us to be more certain in our agentic processes,
    generalize it to an arbitrary number of agents, and develop a cost function to
    help steer future investment in the system. The code I use in this post is available
    in my repository, [ai-decision-circuits](https://github.com/Barneyjm/ai-decision-circuits/blob/main/formula-derivation.md).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何将更多的统计确定性融入我们的代理过程中？在这篇文章中，我构建了一个系统，使我们能够对我们的代理过程更有信心，将其推广到任意数量的代理，并开发一个成本函数来帮助引导系统未来的投资。我在这篇文章中使用到的代码可以在我的仓库[ai-decision-circuits](https://github.com/Barneyjm/ai-decision-circuits/blob/main/formula-derivation.md)中找到。
- en: AI Decision Circuits
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI决策电路
- en: Error detection and correction are not new concepts. Error correction is critical
    in fields like digital and analog electronics. Even developments in quantum computing
    depend on expanding the capabilities of error correction and detection. We can
    take inspiration from these systems and implement something similar with AI agents.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 错误检测和纠正并不是新概念。在数字和模拟电子等领域，错误纠正至关重要。甚至量子计算的发展也依赖于扩展错误纠正和检测的能力。我们可以从这些系统中汲取灵感，并利用AI代理实现类似的功能。
- en: '![](../Images/09a91145fd7d76a2b748b04e8c8b769a.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/09a91145fd7d76a2b748b04e8c8b769a.png)'
- en: An example NAND gate ([Inductiveload](//commons.wikimedia.org/wiki/User:Inductiveload),
    Public Domain, [Link](https://commons.wikimedia.org/w/index.php?curid=5729015))
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 一个NAND门的例子 ([Inductiveload](//commons.wikimedia.org/wiki/User:Inductiveload),
    公共领域, [链接](https://commons.wikimedia.org/w/index.php?curid=5729015))
- en: In Boolean logic, NAND gates are the holy grail of computation because they
    can perform any operation. They are functionally complete, meaning any logical
    operation can be constructed using only NAND gates. This principle can be applied
    to AI systems to create robust decision-making architectures with built-in error
    correction.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在布尔逻辑中，NAND门是计算的圣杯，因为它们可以执行任何操作。它们是功能完备的，这意味着任何逻辑操作都可以仅使用NAND门来构建。这个原则可以应用于AI系统，以创建具有内置错误纠正的稳健决策架构。
- en: From Electronic Circuits to AI Decision Circuits
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从电子电路到AI决策电路
- en: 'Just as electronic circuits use redundancy and validation to ensure reliable
    computation, AI decision circuits can employ multiple agents with different perspectives
    to arrive at more accurate outcomes. These circuits can be constructed using principles
    from information theory and Boolean logic:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 正如电子电路使用冗余和验证来确保可靠的计算一样，AI决策电路可以使用具有不同视角的多个代理来得出更准确的结果。这些电路可以使用信息论和布尔逻辑的原则来构建：
- en: '**Redundant Processing:** Multiple AI agents process the same input independently,
    similar to how modern CPUs use redundant circuits to detect hardware errors.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**冗余处理**：多个AI代理独立处理相同的输入，类似于现代CPU如何使用冗余电路来检测硬件错误。'
- en: '**Consensus Mechanisms:** Decision outputs are combined using voting systems
    or weighted averages, analogous to majority logic gates in fault-tolerant electronics.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**共识机制**：决策输出通过投票系统或加权平均进行组合，类似于容错电子中的多数逻辑门。'
- en: '**Validator Agents**: Specialized AI validators check the plausibility of outputs,
    functioning similarly to error-detecting codes like [parity bits](https://en.wikipedia.org/wiki/Parity_bit)
    or [CRC checks](https://en.wikipedia.org/wiki/Cyclic_redundancy_check).'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**验证代理**：专门的AI验证器检查输出的合理性，功能上类似于像[奇偶校验位](https://en.wikipedia.org/wiki/Parity_bit)或[循环冗余校验](https://en.wikipedia.org/wiki/Cyclic_redundancy_check)这样的错误检测代码。'
- en: '**Human-in-the-Loop Integration:** Strategic human validation at key points
    in the decision process, similar to how critical systems use human oversight as
    the final verification layer.'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**人机协同集成**：在决策过程中的关键点进行战略性的人工验证，类似于关键系统如何使用人工监督作为最终验证层。'
- en: Mathematical Foundations for AI Decision Circuits
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI决策电路的数学基础
- en: The reliability of these systems can be quantified using probability theory.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这些系统的可靠性可以使用概率论进行量化。
- en: For a single agent, the probability of failure comes from observed accuracy
    over time via a test dataset, stored in a system like [LangSmith](https://www.langchain.com/langsmith).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 对于单个代理，失败的概率来自通过测试数据集观察到的准确度随时间的变化，存储在像[LangSmith](https://www.langchain.com/langsmith)这样的系统中。
- en: '![](../Images/d873bcd6497fc11ddcfeb11cf6b7c38d.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d873bcd6497fc11ddcfeb11cf6b7c38d.png)'
- en: For a 90% accurate agent, the probability of failure, `p_1`, `1–0.9`is 0.1,
    or 10%.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个90%准确的代理，失败的概率，`p_1`，`1–0.9`是0.1，或10%。
- en: '![](../Images/4b69450bdeb20ffeafe4a3184fecef7d.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4b69450bdeb20ffeafe4a3184fecef7d.png)'
- en: 'The probability of two independent agents to failing on the same input is the
    probability of both agent’s accuracy multiplied together:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 两个独立代理在相同输入上失败的概率是两个代理准确度的乘积：
- en: '![](../Images/040ff56a96efacd9390740b0170c199e.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/040ff56a96efacd9390740b0170c199e.png)'
- en: If we have N executions with those agents, the total count of failures is
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们有N次执行这些代理，总的失败次数是
- en: '![](../Images/750aafd2e5b65529708a590b35b42e11.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/750aafd2e5b65529708a590b35b42e11.png)'
- en: Expected count of failures
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 预期失败次数
- en: So for 10,000 executions between two independent agents both with 90% accuracy,
    the expected number of failures is 100 failures.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在两个独立代理之间进行10,000次执行，两者都具有90%的准确度，预期的失败次数是100次。
- en: '![](../Images/f80460e0c9ccd63dd3cc7fa38e57659a.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f80460e0c9ccd63dd3cc7fa38e57659a.png)'
- en: However, we still don’t know *which* of those 10,000 phone calls are the actual
    100 failures.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们仍然不知道那些10,000个电话中的哪一个是实际的100次失败。
- en: 'We can combine four extensions of this idea to make a more robust solution
    that offers confidence in any given response:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这个想法的四个扩展结合在一起，以创建一个更稳健的解决方案，对任何给定响应都提供信心：
- en: A primary categorizer (simple accuracy above)
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个主要分类器（简单的准确度以上）
- en: A backup categorizer (simple accuracy above)
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个备份分类器（简单的准确度以上）
- en: A schema validator (0.7 accuracy for example)
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模式验证器（例如，0.7的准确度）
- en: '![](../Images/0160ff97398c208602ece7a81d7a1c7d.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0160ff97398c208602ece7a81d7a1c7d.png)'
- en: Count of errors caught by the schema validator
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 模式验证器捕获的错误数
- en: '![](../Images/be614a48465d883c4d1588e26be8d0eb.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/be614a48465d883c4d1588e26be8d0eb.png)'
- en: Errors remaining after validation
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 验证后剩余的错误
- en: And finally, a negative checker (n = 0.6 accuracy for example)
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，一个负检查器（例如，准确率为0.6）
- en: '![](../Images/3b31e3345ebe1474436523b02cbfc749.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3b31e3345ebe1474436523b02cbfc749.png)'
- en: Count of errors caught by the negative checker
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 负检查器捕获的错误数
- en: '![](../Images/516c667b801507a3dd95649ece986aaa.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/516c667b801507a3dd95649ece986aaa.png)'
- en: Final undetected errors
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 最终未检测到的错误
- en: 'To put this into code ([full repository](https://github.com/Barneyjm/ai-decision-circuits/tree/main)),
    we can use simple Python:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 要将此放入代码（[完整仓库](https://github.com/Barneyjm/ai-decision-circuits/tree/main)），我们可以使用简单的Python：
- en: '[PRE0]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'By combining these with simple Boolean logic, we can get similar accuracy along
    with confidence in each answer:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将这些与简单的布尔逻辑相结合，我们可以获得类似的准确度，并对每个答案都有信心：
- en: '[PRE1]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The Decision Logic, Step by Step
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 决策逻辑，一步一步
- en: 'Step 1: When Quality Control Fails'
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：当质量控制失败时
- en: '[PRE2]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'This is saying: “If our quality control expert (validator) rejects the primary
    analysis, don’t trust it.” The system then tries to use the backup opinion instead.
    If that also fails validation, it flags the case for human review.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着：“如果我们的质量控制专家（验证者）拒绝主要分析，不要相信它。”然后系统会尝试使用备用意见。如果这也未能通过验证，它会将案件标记为人类审阅。
- en: 'In everyday terms: “If something seems off about our first answer, let’s try
    our backup method. If that still seems suspect, let’s get a human involved.”'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 用日常用语来说：“如果我们的第一个答案看起来有些不对劲，让我们尝试我们的备用方法。如果那仍然看起来可疑，让我们让人类介入。”
- en: 'Step 2: Handling Contradictions'
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：处理矛盾
- en: '[PRE3]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'This checks for a specific kind of contradiction: “Our negative checker says
    there shouldn’t be a call type, but our primary analyzer found one anyway.”'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这检查特定类型的矛盾：“我们的负检查器说不应该有呼叫类型，但我们的主要分析器还是找到了一个。”
- en: 'In such cases, the system looks to the backup analyzer to break the tie:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，系统会求助于备用分析器来打破僵局：
- en: If backup agrees there’s no call type → Send to human
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果备用方法同意没有呼叫类型 → 发送给人类
- en: If backup agrees with primary → Accept but with medium confidence
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果备用方法与主要方法一致 → 接受但标记为中等置信度
- en: If backup has a different call type → Send to human
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果备用方法有不同的呼叫类型 → 发送给人类
- en: 'This is like saying: “If one expert says ‘this isn’t classifiable’ but another
    says it is, we need a tiebreaker or human judgment.”'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像说：“如果一个专家说‘这个不可分类’，而另一个专家说它是，我们需要一个裁决者或人类判断。”
- en: 'Step 3: When Experts Agree'
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：当专家意见一致时
- en: '[PRE4]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: When both the primary and backup analyzers independently reach the same conclusion,
    the system marks this with “high confidence” — this is the best case scenario.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 当主要和备用分析器独立得出相同的结论时，系统会将其标记为“高置信度”——这是最佳情况。
- en: 'In everyday terms: “If two different experts using different methods reach
    the same conclusion independently, we can be pretty confident they’re right.”'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 用日常用语来说：“如果两位不同的专家使用不同的方法独立得出相同的结论，我们可以相当确信他们是正确的。”
- en: 'Step 4: Default Handling'
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第4步：默认处理
- en: If none of the special cases apply, the system defaults to the primary analyzer’s
    result with “medium confidence.” If even the primary analyzer couldn’t determine
    a call type, it flags the case for human review.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有特殊情况适用，系统默认为主分析器的结果，并标记为“中等置信度”。如果连主分析器也无法确定呼叫类型，它将案件标记为人类审阅。
- en: Why This Approach Matters
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么这种方法很重要
- en: 'This decision logic creates a robust system by:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这种决策逻辑通过以下方式创建了一个健壮的系统：
- en: '**Reducing False Positives**: The system only gives high confidence when multiple
    methods agree'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**减少误报**：系统只有在多种方法达成一致时才提供高置信度'
- en: '**Catching Contradictions**: When different parts of the system disagree, it
    either lowers confidence or escalates to humans'
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**捕捉矛盾**：当系统的不同部分意见不一致时，它会降低置信度或升级到人类'
- en: '**Intelligent Escalation**: Human reviewers only see cases that truly need
    their expertise'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**智能升级**：只有真正需要专家专业知识的情况才会被人类审阅员看到'
- en: '**Confidence Labeling**: Results include how confident the system is, allowing
    downstream processes to treat high vs. medium confidence results differently'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**置信度标记**：结果包括系统对每个答案的置信度，允许下游过程对高置信度与中等置信度的结果进行不同处理'
- en: This approach mirrors how electronics use redundant circuits and voting mechanisms
    to prevent errors from causing system failures. In AI systems, this kind of thoughtful
    combination logic can dramatically reduce error rates while efficiently using
    human reviewers only where they add the most value.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法反映了电子设备如何使用冗余电路和投票机制来防止错误导致系统故障。在AI系统中，这种深思熟虑的组合逻辑可以显著降低错误率，同时高效地仅在使用人类评审员最能增加价值的地方使用他们。
- en: Example
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例
- en: In 2015, the city of Philadelphia Water Department [published the counts of
    customer calls by category.](https://metadata.phila.gov/#home/datasetdetails/560184fc077169215719b5a5/representationdetails/561f12d775d3fc3a4c7beb7b/)
    Customer call comprehension is a very common process for agents to tackle. Instead
    of a human listening to each customer phone call, an agent can listen to the call
    much more quickly, extract the information, and categorize the call for further
    data analysis. For the water department, this is important because the faster
    critical issues are identified, the sooner those issues can be resolved.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在2015年，费城水务局[发布了按类别划分的客户通话计数](https://metadata.phila.gov/#home/datasetdetails/560184fc077169215719b5a5/representationdetails/561f12d775d3fc3a4c7beb7b/)。客户通话理解是代理人员处理的一个非常常见的流程。而不是让人类逐个听取客户电话，代理人员可以更快地听取通话，提取信息，并将通话分类以进行进一步的数据分析。对于水务部门来说，这很重要，因为更快地识别关键问题，这些问题就能更快地得到解决。
- en: 'We can build an experiment. I used an LLM to generate fake transcripts of the
    phone calls in question by prompting “Given the following category, generate a
    short transcript of that phone call: <category>”. Here’s a few of those examples
    with the full file available [here](https://github.com/Barneyjm/ai-decision-circuits/blob/main/customer-calls.json):'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以构建一个实验。我使用LLM通过提示“给定以下类别，生成该电话通话的简短记录：<类别>”来生成有关电话通话的伪造记录。以下是一些示例，完整文件[在此](https://github.com/Barneyjm/ai-decision-circuits/blob/main/customer-calls.json)：
- en: '[PRE5]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Now, we can set up the experiment with a more traditional LLM-as-a-judge evaluation
    ([full implementation here](https://github.com/Barneyjm/ai-decision-circuits/blob/main/customer-calls.json)):'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以使用更传统的LLM作为评判者的评估方法来设置实验（[完整实现在此](https://github.com/Barneyjm/ai-decision-circuits/blob/main/customer-calls.json)）：
- en: '[PRE6]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: By passing just the transcript into the LLM, we can isolate the knowledge of
    the real category from the extracted category that is returned and compare.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 通过仅将记录传递给LLM，我们可以隔离真实类别的知识，并与返回的提取类别进行比较。
- en: '[PRE7]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Running this against the entire fabricated data set with Claude 3.7 Sonnet
    (state of the art model, as of writing), is very performant with 91% of calls
    being accurately categorized:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Claude 3.7 Sonnet（截至撰写时的最先进模型）对整个伪造数据集进行运行，性能非常出色，91%的通话被准确分类：
- en: '[PRE8]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: If these were real calls and we did not have prior knowledge of the category,
    we’d still need to review all 100 phone calls to find the 9 falsely categorized
    calls.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这些是真实的通话，并且我们没有对该类别的先验知识，我们仍然需要审查所有100个电话通话以找到9个错误分类的通话。
- en: By implementing our robust Decision Circuit above, we get similar accuracy results
    along with *confidence* in those answers. In this case, 87% accuracy overall but
    92.5% accuracy in our high confidence answers.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实施我们上面提到的稳健决策电路，我们得到了类似的准确度结果，并对这些答案的**置信度**有信心。在这种情况下，整体准确度为87%，但在高度自信的答案中准确度为92.5%。
- en: '[PRE9]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: We need 100% accuracy in our high confidence answers so there’s still work to
    be done. What this approach lets us do is drill into *why* high confidence answers
    were inaccurate. In this case, poor prompting and the simple validation capability
    doesn’t catch all issues, resulting in classification errors. These capabilities
    can be improved iteratively to attain the 100% accuracy in high confidence answers.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要在高度自信的答案中达到100%的准确度，因此还有工作要做。这种方法让我们能够深入了解高度自信答案不准确的原因。在这种情况下，糟糕的提示和简单的验证能力无法捕捉到所有问题，导致分类错误。这些能力可以通过迭代改进以达到高度自信答案中的100%准确度。
- en: Enhanced Filtering for High Confidence
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高度自信答案的增强过滤
- en: The current system marks responses as “high confidence” when the primary and
    backup analyzers agree. To reach higher accuracy, we need to be more selective
    about what qualifies as “high confidence”
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 当前系统在主分析和备用分析器意见一致时将响应标记为“高度自信”。为了达到更高的准确性，我们需要更加挑剔地选择哪些内容可以被认为是“高度自信”。
- en: '[PRE10]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: By adding more qualification criteria, we’ll have fewer “high confidence” results,
    but they’ll be more accurate.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 通过增加更多的资格标准，我们将有更少的“高度自信”结果，但它们将更加准确。
- en: Additional Validation Techniques
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 额外的验证技术
- en: 'Some other ideas include the following:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 一些其他想法包括以下：
- en: '**Tertiary Analyzer**: Add a third independent analysis method'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**三级分析器**：添加第三个独立的分析方法'
- en: '[PRE11]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '**Historical Pattern Matching**: Compare against historically correct results
    (think a vector search)'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**历史模式匹配**：与历史正确结果进行比较（例如：向量搜索）'
- en: '[PRE12]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '**Adversarial Testing**: Apply small variations to the input and check if classification
    remains stable'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**对抗性测试**：对输入应用小的变化并检查分类是否稳定'
- en: '[PRE13]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Generic Formula for Human Interventions in LLM Extraction System
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LLM提取系统中人工干预的通用公式
- en: '[Full derivation available here](https://github.com/Barneyjm/ai-decision-circuits/blob/main/formula-derivation.md).'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '[完整推导过程在此](https://github.com/Barneyjm/ai-decision-circuits/blob/main/formula-derivation.md)。'
- en: N = Total number of executions (10,000 in our example)
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: N = 总执行次数（在我们的例子中为10,000）
- en: p_1 = Primary parser accuracy (0.8 in our example)
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: p_1 = 主要解析器的准确率（在我们的例子中为0.8）
- en: p_2 = Backup parser accuracy (0.8 in our example)
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: p_2 = 备用解析器的准确率（在我们的例子中为0.8）
- en: v = schema validator effectiveness (0.7 in our example)
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: v = 架构验证器的有效性（在我们的例子中为0.7）
- en: n = negative checker effectiveness (0.6 in our example)
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: n = 负面检查器的有效性（在我们的例子中为0.6）
- en: H = Number of human interventions required
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: H = 需要的人工干预次数
- en: E_final = Final undetected errors
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: E_final = 最终未检测到的错误
- en: m = number of independent validators
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: m = 独立验证器的数量
- en: '![](../Images/4654bd9189aaddcce81a234350a4470e.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4654bd9189aaddcce81a234350a4470e.png)'
- en: Probability that all parsers fail
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 所有解析器均失败的概率
- en: '![](../Images/5c09d37a8c7559a7b1e887cfb9873a25.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5c09d37a8c7559a7b1e887cfb9873a25.png)'
- en: Number of cases requiring human intervention
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 需要人工干预的案例数量
- en: '![](../Images/79be5d871b9e78c315ae7ff071690b34.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/79be5d871b9e78c315ae7ff071690b34.png)'
- en: Final system accuracy
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 最终系统准确率
- en: '![](../Images/88b4ab3d396d92f28a4a069862aef236.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/88b4ab3d396d92f28a4a069862aef236.png)'
- en: Final error count
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 最终错误计数
- en: Optimized System Design
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化系统设计
- en: 'The formula reveals key insights:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 该公式揭示了关键见解：
- en: Adding parsers has diminishing returns but always improves accuracy
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加解析器会有递减的回报，但总是提高准确率
- en: 'The system accuracy is bounded by:'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统的准确率受限于：
- en: '![](../Images/26d017fd8a09d61f38a2eafb35330286.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/26d017fd8a09d61f38a2eafb35330286.png)'
- en: Human interventions *scale linearly* with total executions N
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工干预与总执行次数N成线性关系
- en: 'For our example:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的例子：
- en: '![](../Images/941cfa1ce18681f706a9710241f5194e.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/941cfa1ce18681f706a9710241f5194e.png)'
- en: This shows approximately 352 human interventions out of 10,000 executions.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明在10,000次执行中有大约352次需要人工干预。
- en: We can use this calculated H_rate to track the efficacy of our solution in realtime.
    If our human intervention rate starts trickling above 3.5%, we know that the system
    is breaking down. If our human intervention rate is steadily decreasing below
    3.5%, we know our improvements are working as expected.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用这个计算出的H_rate来实时跟踪我们解决方案的有效性。如果我们的人工干预率开始缓慢上升至3.5%以上，我们知道系统正在崩溃。如果我们的人工干预率稳步下降至3.5%以下，我们知道我们的改进按预期进行。
- en: Cost Function
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成本函数
- en: We can also establish a cost function which can help us tune our system.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以建立一个成本函数，帮助我们调整系统。
- en: '![](../Images/5e4fbdb8e39d5c7a77a40f5f7ecef62b.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5e4fbdb8e39d5c7a77a40f5f7ecef62b.png)'
- en: 'where:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: c_p = Cost per parser run ($0.10 in our example)
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: c_p = 每次解析器运行的成本（在我们的例子中为0.10）
- en: m = Number of parser executions (in our example 2 * N)
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: m = 解析器执行次数（在我们的例子中为2 * N）
- en: H = Number of cases requiring human intervention (352 from our example)
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: H = 需要人工干预的案例数量（在我们的例子中为352）
- en: 'c_h = Cost per human intervention ($200 for example: 4 hours at $50/hour)'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: c_h = 每个人工干预的成本（例如：4小时，每小时50美元）
- en: c_e = Cost per undetected error ($1000 for example)
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: c_e = 每个未检测到的错误的成本（例如：1000美元）
- en: '![](../Images/27ed71035158b87b963c2136002ce19c.png)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/27ed71035158b87b963c2136002ce19c.png)'
- en: The cost of this example system, broken down by Parser Cost, Human Intervention
    Cost and Undetected Errors Cost
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 该示例系统的成本，按解析器成本、人工干预成本和未检测错误成本分解
- en: By breaking cost down by cost per human intervention and cost per undetected
    error, we can tune the system overall. In this example, if the cost of human intervention
    ($70,400) is undesirable and too high, we can focus on increasing high confidence
    results. If the cost of undetected errors ($48,000) is undesirable and too high,
    we can introduce more parsers to lower undetected error rates.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将成本分解为每个人工干预的成本和每个未检测到的错误的成本，我们可以整体调整系统。在这个例子中，如果人工干预的成本（70,400美元）不可接受且过高，我们可以专注于提高高置信度结果。如果未检测到的错误的成本（48,000美元）不可接受且过高，我们可以引入更多的解析器以降低未检测到的错误率。
- en: Of course, cost functions are more useful as ways to explore how to optimize
    the situations they describe.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，成本函数作为探索如何优化它们所描述的情况的方法更有用。
- en: From our scenario above, to decrease the number of undetected errors, E_final,
    by 50%, where
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 从我们上面的场景来看，为了将未检测到的错误数E_final减少50%，其中
- en: p1 and p2 = 0.8,
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: p1 和 p2 = 0.8，
- en: v = 0.7 and
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: v = 0.7 和
- en: n = 0.6
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: n = 0.6
- en: 'we have three options:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有三个选择：
- en: 'Add a new parser with accuracy of 50% and include it as a tertiary analyzer.
    Note this comes with a trade off: your cost to run more parsers increases along
    with the increase in human intervention cost.'
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加一个准确度为50%的新解析器并将其作为三级分析器。请注意，这会带来权衡：你运行更多解析器的成本随着人工干预成本的增加而增加。
- en: Improve the two existing parsers by 10% each. That may or not be possible given
    the difficulty of the task these parsers are performing.
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将两个现有的解析器各自提高10%。鉴于这些解析器执行任务的难度，这可能或可能不可能实现。
- en: Improve the validator process by 15%. Again, this increases the cost via human
    intervention.
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过人工干预提高验证过程15%。再次强调，这会增加成本。
- en: 'The Future of AI Reliability: Building Trust Through Precision'
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能可靠性的未来：通过精确性建立信任
- en: As AI systems become increasingly integrated into critical aspects of business
    and society, the pursuit of perfect accuracy will become a requirement, especially
    in sensitive applications. By adopting these circuit-inspired approaches to AI
    decision-making, we can build systems that not only scale efficiently but also
    earn the deep trust that comes only from consistent, reliable performance. The
    future belongs not to the most powerful single models, but to thoughtfully designed
    systems that combine multiple perspectives with strategic human oversight.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能系统在商业和社会关键领域的日益集成，追求完美准确度将成为一项要求，尤其是在敏感应用中。通过采用这些受电路启发的AI决策方法，我们可以构建既高效扩展又能获得一致可靠性能带来的深厚信任的系统。未来不属于最强大的单一模型，而是属于那些精心设计、结合多种视角并具有战略人类监督的系统。
- en: Just as digital electronics evolved from unreliable components to create computers
    we trust with our most important data, AI systems are now on a similar journey.
    The frameworks described in this article represent the early blueprints for what
    will ultimately become the standard architecture for mission-critical AI — systems
    that don’t just promise reliability, but mathematically guarantee it. The question
    is no longer if we can build AI systems with near-perfect accuracy, but how quickly
    we can implement these principles across our most important applications.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 正如数字电子学从不可靠的组件发展到我们信任其处理最重要数据的计算机一样，AI系统现在也在经历类似的旅程。本文中描述的框架代表了最终将成为关键任务AI标准架构的早期蓝图——这些系统不仅承诺可靠性，而且在数学上保证可靠性。问题不再是能否构建出几乎完美的AI系统，而是我们能在多快的时间内将这些原则应用于我们最重要的应用中。
