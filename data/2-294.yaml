- en: How to Build an MCQ App
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何构建MCQ应用
- en: 原文：[https://towardsdatascience.com/how-to-build-an-mcq-app/](https://towardsdatascience.com/how-to-build-an-mcq-app/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-build-an-mcq-app/](https://towardsdatascience.com/how-to-build-an-mcq-app/)
- en: <mdspan datatext="el1748629420211" class="mdspan-comment">In this article</mdspan>
    I explain how to build an app that generates multiple choice questions (MCQs)
    on any user-defined subject. The app is extracting Wikipedia articles that are
    related to the user’s request and uses RAG to query a chat model to generate the
    questions.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748629420211" class="mdspan-comment">在这篇文章中</mdspan>，我解释了如何构建一个应用，该应用可以针对任何用户定义的主题生成多项选择题（MCQs）。该应用提取与用户请求相关的维基百科文章，并使用RAG查询聊天模型来生成问题。
- en: I will demonstrate how the app works, explain how Wikipedia articles are retrieved,
    and show how these are used to invoke a chat model. Next, I explain the key components
    of this app in more detail. The code of the app is available [here](https://github.com/ReinhardSellmair/learning_app).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我将演示该应用的工作方式，解释如何检索维基百科文章，并展示如何使用这些文章来调用聊天模型。接下来，我将更详细地解释该应用的关键组件。该应用的代码可在[此处](https://github.com/ReinhardSellmair/learning_app)找到。
- en: App Demo
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用演示
- en: '![](../Images/5351176acd2eefd7cc5c8052338228ce.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5351176acd2eefd7cc5c8052338228ce.png)'
- en: App Demo
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 应用演示
- en: The gif above shows the user entering the learning context, the generated MCQ
    and the feedback after the user submitted an answer.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的gif显示了用户进入学习上下文，生成的MCQ以及用户提交答案后的反馈。
- en: '![](../Images/fbc45fb722d683462590adc161b24f3d.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fbc45fb722d683462590adc161b24f3d.png)'
- en: Start Screen
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 启动屏幕
- en: At the first screen the user describes the context of the MCQs that should be
    generated. After pressing “Submit Context” the app searches for Wikipedia articles
    which content matches the user query.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一个屏幕上，用户描述了应生成的MCQs的上下文。按下“提交上下文”后，应用将搜索与用户查询内容匹配的维基百科文章。
- en: '![](../Images/b158310c97be4dd1a397d72873263248.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b158310c97be4dd1a397d72873263248.png)'
- en: Question Screen
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 问题屏幕
- en: The app splits each Wikipedia page into sections and scores them based on how
    closely they match the user query. These scores are used to sample the context
    of the next question which is displayed in the next screen with four choices to
    answer. The user can select a choice and submit it by “Submit Answer”. It is also
    possible to skip this question via “Next Question”. In this case it is considered
    that the question did not meet the user’s expectation. It will be avoided to use
    the context of this question for the generation of following questions. To end
    the session the user can choose “End MCQ”.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 该应用将每个维基百科页面拆分为部分，并根据它们与用户查询的匹配程度进行评分。这些评分用于采样下一个问题的上下文，该问题将在下一个屏幕上以四个选项的形式显示。用户可以选择一个选项，并通过“提交答案”提交。用户也可以通过“下一个问题”跳过这个问题。在这种情况下，认为这个问题没有达到用户的期望。将避免使用这个问题的上下文来生成后续问题。要结束会话，用户可以选择“结束MCQ”。
- en: '![](../Images/c72ac439b71a92879e2eb7e2b3628e26.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c72ac439b71a92879e2eb7e2b3628e26.png)'
- en: Answer Screen
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 答案屏幕
- en: The next screen after the user submitted an answer shows if the answer was correct
    and provides an additional explanation. Following, the user can either get a new
    question via “Next Question” or end the session with “End MCQ”.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 用户提交答案后的下一个屏幕显示了答案是否正确，并提供了额外的解释。随后，用户可以通过“下一个问题”获取新问题，或者通过“结束MCQ”结束会话。
- en: '![](../Images/2ca42fc14d46716462cf1a3ef894de2d.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2ca42fc14d46716462cf1a3ef894de2d.png)'
- en: End Session Screen
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 会话结束屏幕
- en: The end session screen shows how many questions were correctly and wrongly answered.
    Additionally, it also contains the number of questions the user rejected via “Next
    Question”. If the user selects “Start New Session” the start screen will be displayed
    where a new context for the next session can be provided.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 会话结束屏幕显示了正确和错误回答的问题数量。此外，它还包含用户通过“下一个问题”拒绝的问题数量。如果用户选择“开始新会话”，则将显示启动屏幕，可以在其中提供下一个会话的新上下文。
- en: Concept
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概念
- en: The aim of this app is to produce high quality and up-to-date questions on any
    user-defined topic. Thereby user feedback is considered to ensure that the generated
    questions are meeting the user’s expectations.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 该应用的目标是针对任何用户定义的主题生成高质量和最新的问题。因此，用户反馈被考虑以确保生成的问答符合用户的期望。
- en: To retrieve high-quality and up-to-date context, Wikipedia articles are selected
    with respect to the user’s query. Each article is split into sections while every
    section is scored based on its similarity with the user query. If the user rejects
    a question the respective section score will be downgraded to reduce the likelihood
    of sampling this section again.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检索高质量和最新的上下文，根据用户查询选择维基百科文章。每篇文章被分成几个部分，每个部分根据其与用户查询的相似度进行评分。如果用户拒绝一个问题，相应的章节得分将降低，以减少再次采样该章节的可能性。
- en: 'This process can be separated into two workflows:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 此过程可以分为两个工作流程：
- en: Context Retrieval
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文检索
- en: Question Generation
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题生成
- en: Which are described below.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 下面将进行描述。
- en: Context Retrieval
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上下文检索
- en: The workflow how the context of the MCQs is derived from Wikipedia based on
    the user query is shown below.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 下图展示了根据用户查询从维基百科中推导MCQ上下文的工作流程。
- en: '![](../Images/faa6f8725d6d9709b6a664a183bc19a5.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/faa6f8725d6d9709b6a664a183bc19a5.png)'
- en: Context Retrieval Workflow
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文检索工作流程
- en: 'The user inserts the query that describes the context of the MCQs at the start
    screen. An example of the user query could be: **“Ask me anything about stars
    and planets”**.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 用户在起始屏幕上插入描述MCQs（多项选择题）上下文的查询。用户查询的一个例子可以是：**“问我关于星星和行星的任何问题”**。
- en: 'To efficiently search for Wikipedia articles this query is converted into keywords.
    The keywords of the query above are: “Stars”, “Planets”, “Astronomy”, “Solar System”,
    and “Galaxy”.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为了高效地搜索维基百科文章，此查询被转换为关键词。上述查询的关键词是：“Stars”，“Planets”，“Astronomy”，“Solar System”和“Galaxy”。
- en: For each keyword a Wikipedia search is executed of which the top three pages
    are selected. Not each of these 15 pages are a good fit to the query provided
    by the user. To remove irrelevant pages at the earliest possible stage the vector
    similarity of the embedded user query and page excerpt is calculated. Pages which
    similarity is below a threshold are filtered out. In our example 3 of 15 pages
    were removed.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个关键词，执行维基百科搜索，并选择前三个页面。并非这15个页面都适合用户提供的查询。为了尽早去除不相关的页面，计算嵌入的用户查询和页面摘录的向量相似度。相似度低于阈值的页面被过滤掉。在我们的例子中，15页中有3页被移除。
- en: The remaining pages are read and divided into sections. As not the entire page
    content may be related to the user query, splitting the pages into sections allows
    to select parts of the page that fit specifically well to the user query. Hence,
    for each section the vector similarity against the user query is calculated and
    sections with low similarity are filtered out. The remaining 12 pages contained
    305 sections of which 244 were kept after filtering.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 读取剩余的页面并将它们分成几个部分。由于整个页面内容可能并不都与用户查询相关，将页面分成部分允许选择与用户查询特别吻合的页面部分。因此，对于每个章节，计算其与用户查询的向量相似度，并过滤掉相似度低的章节。剩余的12页包含305个章节，其中经过过滤后保留了244个章节。
- en: The last step of the retrieval workflow is to assign a score to each section
    with respect to the vector similarity. This score will later be used to sample
    sections for the question generation.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 检索工作流程的最后一步是为每个章节根据向量相似度分配一个得分。这个得分将随后用于采样章节以进行问题生成。
- en: Question Generation
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题生成
- en: 'The workflow to generate a new MCQ is shown below:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 生成新MCQ的工作流程如下所示：
- en: '![](../Images/e0beae0107273630f59154747aca9b2e.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e0beae0107273630f59154747aca9b2e.png)'
- en: Question Generation Workflow
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 问题生成工作流程
- en: The first step is to sample one section with respect to the section scores.
    The text of this section is inserted together with the user query into a prompt
    to invoke a chat model. The chat model returns a json formatted response that
    contains the question, answer choices, and an explanation of the correct answer.
    In case the context provided is not suitable to generate a MCQ that addresses
    the user query the chat model is instructed to return a keyword to identify that
    the question generation was not successful.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是根据章节得分采样一个章节。将此章节的文本以及用户查询插入到提示中，以调用聊天模型。聊天模型返回一个json格式的响应，其中包含问题、答案选项和正确答案的解释。如果提供的上下文不适合生成针对用户查询的MCQ，聊天模型将指示返回一个关键词以标识问题生成未成功。
- en: If the question generation was successful, the questions and the answer choices
    are displayed to the user. Once the user submits an answer it is evaluated if
    the answer was correct, and the explanation of the correct answer is shown. To
    generate a new question the same workflow is repeated.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如果问题生成成功，将向用户显示问题和答案选项。一旦用户提交答案，就会评估答案是否正确，并显示正确答案的解释。要生成新问题，重复相同的流程。
- en: In case the question generation was not successful, or the user rejected the
    question by clicking on “Next Question” the score of the section that was selected
    to generate the prompt is downgraded. Hence, it is less likely that this section
    will be selected again.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果问题生成不成功，或者用户通过点击“下一个问题”来拒绝问题，则用于生成提示的所选章节的分数会降低。因此，这个章节再次被选中的可能性较小。
- en: Key Components
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键组件
- en: Next, I will explain some key components of the workflows in more detail.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将更详细地解释工作流程中的关键组件。
- en: Extracting Wiki Articles
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提取维基百科文章
- en: 'Wikipedia articles are extracted in two steps: First a search is run to find
    suitable pages. After filtering the search results, the pages separated by sections
    are read.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 维基百科文章的提取分为两个步骤：首先运行搜索以找到合适的页面。在过滤搜索结果后，按章节读取页面。
- en: 'Search requests are sent to this [URL](https://api.wikimedia.org/core/v1/wikipedia/en/search/page).
    Additionally, a header containing the requestor’s contact information and a parameter
    dictionary with the search query and the number of pages to be returned. The output
    is in json format that can be converted to a dictionary. The code below shows
    how to run the request:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索请求发送到此[URL](https://api.wikimedia.org/core/v1/wikipedia/en/search/page)。此外，包含请求者联系信息和包含搜索查询和要返回的页面数的参数字典的标题。输出是json格式，可以转换为字典。下面的代码显示了如何运行请求：
- en: '[PRE0]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'After filtering the search results based on the pages’ excerpts the text of
    the remaining pages is imported using wikipediaapi:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 根据页面摘要过滤搜索结果后，使用wikipediaapi导入剩余页面的文本：
- en: '[PRE1]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: To access Wikipedia articles, the app uses wikipediaapi.Wikipedia, which requires
    a user-agent string for identification. It returns a WikipediaPage object which
    contains a summary of the page, page sections with the title and the text of each
    section. Sections are hierarchically organized meaning each section is another
    WikipediaPage object with another list of sections that are the subsections of
    the respective section. The function above reads all sections of a page and returns
    a dictionary that maps a concatenation of all section and subsection titles to
    the respective text.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问维基百科文章，应用程序使用wikipediaapi.Wikipedia，这需要一个用户代理字符串进行识别。它返回一个包含页面摘要、带有标题和每个章节文本的页面部分。章节是按层次组织的，这意味着每个章节都是另一个WikipediaPage对象，包含另一个列表，该列表是相应章节的子章节。上述函数读取页面的所有章节，并返回一个将所有章节和子章节标题的连接映射到相应文本的字典。
- en: Context Scoring
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上下文评分
- en: 'Sections that fit better to the user query should get a higher probability
    of being selected. This is achieved by assigning a score to each section which
    is used as weight for sampling the sections. This score is calculated as follows:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 更符合用户查询的章节应获得更高的选择概率。这是通过为每个章节分配一个分数来实现的，该分数用作采样章节的权重。此分数的计算如下：
- en: \[s_{section}=w_{rejection}s_{rejection}+(1-w_{rejection})s_{sim}\]
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: \[s_{section}=w_{rejection}s_{rejection}+(1-w_{rejection})s_{sim}\]
- en: 'Each section receives a score based on two factors: how often it has been rejected,
    and how closely its content matches the user query. These scores are combined
    into a weighted sum. The section rejection score consists of two components: the
    number of how often the section’s page has been rejected over the highest number
    of page rejections and the number of this section’s rejections over the highest
    number of section rejections:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 每个章节根据两个因素获得一个分数：它被拒绝的频率以及其内容与用户查询的匹配程度。这些分数组合成一个加权总和。章节拒绝分数由两个组成部分：章节页面被拒绝的次数与最高页面拒绝次数的比例，以及该章节的拒绝次数与最高章节拒绝次数的比例：
- en: \[s_{rejection}=1-\frac{1}{2}\left( \frac{n_{page(s)}}{\max_{page}n_{page}}
    + \frac{n_s}{\max_{s}n_s} \right)\]
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: \[s_{rejection}=1-\frac{1}{2}\left( \frac{n_{page(s)}}{\max_{page}n_{page}}
    + \frac{n_s}{\max_{s}n_s} \right)\]
- en: Prompt Engineering
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示工程
- en: 'Prompt engineering is a crucial aspect of the Learning App’s functionality.
    This app is using two prompts to:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是学习应用程序功能的关键方面。此应用程序使用两个提示：
- en: Get keywords for the wikipedia page search
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取维基百科页面搜索的关键词
- en: Generate MCQs for sampled context
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为样本上下文生成多项选择题
- en: 'The template of the keyword generation prompt is shown below:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 关键词生成提示模板如下所示：
- en: '[PRE2]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This system message is concatenated with a human message containing the user
    query to invoke the LLM model.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这个系统消息与包含用户查询的人类消息连接起来，以调用 LLM 模型。
- en: The parameter `n_keywords` set the maximum number of key words to be generated.
    The instructions ensure that the response can be easily converted to a list of
    key words. Despite these instructions, the LLM often returns the maximum number
    of keywords, including some less relevant ones.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 参数 `n_keywords` 设置要生成的最大关键词数。指令确保响应可以轻松转换为关键词列表。尽管有这些指令，LLM（大型语言模型）通常返回最大数量的关键词，包括一些不太相关的关键词。
- en: The MCQ prompt contains the sampled section and invokes the chat model to respond
    with a question, answer choices, and an explanation of the correct answer in a
    machine-readable format.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: MCQ 提示包含样本部分，并调用聊天模型以机器可读的格式响应问题、答案选项和正确答案的解释。
- en: '[PRE3]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The inserted parameters are:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 插入的参数包括：
- en: '`user_query`: text of user query'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`user_query`: 用户查询的文本'
- en: '`context`: text of sampled section'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`context`: 样本部分的文本'
- en: '`n_choices`: number of answer choices'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`n_choices`: 答案选项的数量'
- en: '`previous_questions`: instruction to not repeat previous questions with list
    of all previous questions'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`previous_questions`: 指示不要重复先前问题的指令，并列出所有先前问题'
- en: '`rejected_questions`: instruction to avoid questions of similar nature or context
    with list of rejected questions'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`rejected_questions`: 指示避免具有类似性质或上下文的问题的指令，并列出被拒绝的问题'
- en: '`fail_keyword`: keyword that indicates that question could not be generated'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`fail_keyword`: 指示问题无法生成的关键词'
- en: Including previous questions reduces the chance that the chat model repeats
    questions. Additionally, by providing rejected questions, the user’s feedback
    is considered when generating new questions. The example should ensure that the
    generated output is in the correct format so that it can be easily converted to
    a dictionary. Setting the correct answer as the first choice avoids requiring
    an additional output that indicates the correct answer. When showing the choices
    to the user the order of choices is shuffled. The last instruction defines what
    output should be provided in case it is not possible to generate a question matching
    the user query. Using a standardized keyword makes it easy to identify when the
    question generation has failed.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 包含先前问题可以减少聊天模型重复问题的可能性。此外，通过提供被拒绝的问题，用户的反馈在生成新问题时被考虑。示例应确保生成的输出格式正确，以便可以轻松转换为字典。将正确答案作为第一个选项可以避免需要额外的输出以指示正确答案。在向用户展示选项时，选项的顺序是随机打乱的。最后的指令定义了在无法生成与用户查询匹配的问题时应该提供什么输出。使用标准化的关键词使得在问题生成失败时容易识别。
- en: Streamlit App
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Streamlit 应用程序
- en: 'The app is built using Streamlit, an open-source app framework in Python. Streamlit
    has many functions that allow to add page elements with only one line of code.
    Like for example the element in which the user can write the query is created
    via:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 该应用程序使用 Streamlit 构建，Streamlit 是一个开源的 Python 应用框架。Streamlit 有许多功能，允许仅用一行代码添加页面元素。例如，用户可以写入查询的元素是通过以下方式创建的：
- en: '[PRE4]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: where `context_text` contains the string, the user has written. Buttons are
    created with `st.button` or `st.radio` where the returned variable contains the
    information if the button has been pressed or what value has been selected.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 `context_text` 包含用户写入的字符串。按钮是通过 `st.button` 或 `st.radio` 创建的，其中返回的变量包含按钮是否被按下或选定了什么值的信息。
- en: 'The page is generated top-down by a script that defines each element sequentially.
    Every time the user is interacting with the page, e.g. by clicking on a button
    the script can be re-run with `st.rerun()`. When re-running the script, it is
    important to carry over information from the previous run. This is done by `st.session_state`
    which can contain any objects. For example, the MCQ generator instance is assigned
    to session states as:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 该页面是通过一个脚本自上而下生成的，该脚本依次定义每个元素。每次用户与页面交互时，例如点击按钮，脚本可以通过 `st.rerun()` 重新运行。在重新运行脚本时，重要的是要从前一次运行中携带信息。这是通过
    `st.session_state` 实现的，它可以包含任何对象。例如，将 MCQ 生成器实例分配给会话状态，如下所示：
- en: '[PRE5]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: so that when the context retrieval workflow has been executed, the found context
    is available to generate a MCQ at the next page.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 以便在执行上下文检索工作流程后，找到的上下文可用于在下一页生成多项选择题。
- en: Enhancements
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 增强功能
- en: There are many options to enhance this app. Beyond Wikipedia, users could also
    upload their own PDFs to generate questions from custom materials—such as lecture
    slides or textbooks. This would enable the user to generate questions on any context,
    for example it could be used to prepare for exams by uploading course materials.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多选项可以增强这个应用。除了维基百科之外，用户还可以上传自己的PDF文件，从自定义材料中生成问题——例如讲座幻灯片或教科书。这将使用户能够针对任何上下文生成问题，例如，可以通过上传课程材料来准备考试。
- en: Another aspect that could be improved is to optimize the context selection to
    minimize the number of rejected questions by the user. Instead of updating scores,
    also a ML model could be trained to predict how likely it is that a question will
    be rejected with respect to features like similarity to accepted and rejected
    questions. Every time another question is rejected this model could be retrained.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个可以改进的方面是优化上下文选择，以最小化用户拒绝的问题数量。除了更新分数外，还可以训练一个机器学习模型来预测一个问题根据诸如与已接受和拒绝问题的相似性等特征被拒绝的可能性。每次拒绝另一个问题时，这个模型都可以重新训练。
- en: Also, the generated question could be saved so that when a user wants to repeat
    the learning exercise these questions could be used again. An algorithm could
    be applied to select previously wrongly answered questions more frequently to
    focus on improving the learner’s weaknesses.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，生成的题目可以保存，以便当用户想要重复学习练习时，这些题目可以再次使用。可以应用一种算法来选择之前回答错误的问题，以便更频繁地关注提高学习者的弱点。
- en: Summary
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This article showcases how retrieval-augmented generation (RAG) can be used
    to build an interactive learning app that generates high-quality, context-specific
    multiple-choice questions from Wikipedia articles. By combining keyword-based
    search, semantic filtering, prompt engineering, and a feedback-driven scoring
    system, the app dynamically adapts to user preferences and learning goals. Leveraging
    tools like Streamlit enables rapid prototyping and deployment, making this an
    accessible framework for educators, students, and developers alike. With further
    enhancements—such as custom document uploads, adaptive question sequencing, and
    machine learning-based rejection prediction—the app holds strong potential as
    a versatile platform for personalized learning and self-assessment.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 本文展示了如何使用检索增强生成（RAG）技术构建一个交互式学习应用，该应用可以从维基百科文章中生成高质量、特定上下文的单选题。通过结合基于关键词的搜索、语义过滤、提示工程和反馈驱动的评分系统，该应用能够动态适应用户偏好和学习目标。利用Streamlit等工具可以实现快速原型设计和部署，使其成为教育工作者、学生和开发者共同可用的框架。通过进一步的增强，例如自定义文档上传、自适应问题排序和基于机器学习的拒绝预测，该应用在个性化学习和自我评估平台方面具有强大的潜力。
- en: Further Reading
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: To learn more about RAGs I can recommend these articles from [Shaw Talebi](https://towardsdatascience.com/how-to-improve-llms-with-rag-abdc132f76ac/)
    and [Avishek Biswas](https://towardsdatascience.com/the-ultimate-guide-to-rags-each-component-dissected-3cd51c4c0212/).
    Harrison Hoffman wrote two excellent tutorials on [embeddings and vector databases](https://realpython.com/chromadb-vector-database/)
    and [building an LLM RAG Chatbot](https://realpython.com/build-llm-rag-chatbot-with-langchain/). 
    How to manage states in streamlit can be found in Baertschi’s [article](https://medium.com/@baertschi91/state-management-in-streamlit-135b51aae3ee).
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解更多关于RAG的信息，我可以推荐来自[Shaw Talebi](https://towardsdatascience.com/how-to-improve-llms-with-rag-abdc132f76ac/)和[Avishek
    Biswas](https://towardsdatascience.com/the-ultimate-guide-to-rags-each-component-dissected-3cd51c4c0212/)的文章。Harrison
    Hoffman撰写了两篇关于[嵌入和向量数据库](https://realpython.com/chromadb-vector-database/)以及[构建LLM
    RAG聊天机器人](https://realpython.com/build-llm-rag-chatbot-with-langchain/)的优秀教程。如何在Streamlit中管理状态可以在Baertschi的[文章](https://medium.com/@baertschi91/state-management-in-streamlit-135b51aae3ee)中找到。
- en: '*If not stated otherwise, all images were created by the author.*'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '*除非另有说明，所有图像均由作者创建。*'
