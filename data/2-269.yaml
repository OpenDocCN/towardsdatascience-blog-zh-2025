- en: How I Automated My Machine Learning Workflow with Just 10 Lines of Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何仅用10行Python代码自动化我的机器学习工作流程
- en: 原文：[https://towardsdatascience.com/how-i-automated-my-machine-learning-workflow-with-just-10-lines-of-python/](https://towardsdatascience.com/how-i-automated-my-machine-learning-workflow-with-just-10-lines-of-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/how-i-automated-my-machine-learning-workflow-with-just-10-lines-of-python/](https://towardsdatascience.com/how-i-automated-my-machine-learning-workflow-with-just-10-lines-of-python/)'
- en: <mdspan datatext="el1749215109063" class="mdspan-comment">Machine learning</mdspan>
    is magical — until you’re stuck trying to decide which model to use for your dataset.
    Should you go with a random forest or logistic regression? What if a naïve Bayes
    model outperforms both? For most of us, answering that means hours of manual testing,
    model building, and confusion.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1749215109063" class="mdspan-comment">机器学习</mdspan>是神奇的——直到你陷入困境，试图决定为你的数据集使用哪个模型。你应该选择随机森林还是逻辑回归？如果朴素贝叶斯模型的表现优于两者怎么办？对我们大多数人来说，回答这个问题意味着数小时的手动测试、模型构建和困惑。
- en: But what if you could automate the entire model selection process?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你能自动化整个模型选择过程呢？
- en: In this article, I’ll walk you through a simple but powerful Python automation
    that selects the best machine learning models for your dataset automatically.
    You don’t need deep ML knowledge or tuning skills. Just plug in your data and
    let Python do the rest.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将带你了解一个简单但强大的Python自动化，它会自动选择最适合你的数据集的机器学习模型。你不需要深入的了解ML知识或调优技能。只需插入你的数据，让Python完成剩下的工作。
- en: Why Automate ML Model Selection?
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么自动化ML模型选择？
- en: 'There are multiple reasons, let’s see some of them. Think about it:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 有多个原因，让我们看看其中的一些。想想看：
- en: Most datasets can be modeled in multiple ways.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大多数数据集可以用多种方式建模。
- en: Trying each model manually is time-consuming.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动尝试每个模型是耗时的。
- en: Picking the wrong model early can derail your project.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 早期选择错误的模型可能会使你的项目脱轨。
- en: 'Automation lets you:'
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动化让你：
- en: Compare dozens of models instantly.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 立即比较数十个模型。
- en: Get performance metrics without writing repetitive code.
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取性能指标而不需要编写重复的代码。
- en: Identify top-performing algorithms based on accuracy, F1 score, or RMSE.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据准确度、F1分数或RMSE识别表现最好的算法。
- en: It’s not just convenient, it’s smart ML hygiene.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅方便，而且是一种智能的ML卫生习惯。
- en: Libraries We Will Use
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们将使用的库
- en: We will be exploring 2 underrated Python ML Automation libraries. These are
    **lazypredict** and **pycaret.** You can install both of these using the pip command
    given below.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将探索两个被低估的Python ML自动化库。这些是**lazypredict**和**pycaret**。你可以使用下面的pip命令安装这两个库。
- en: '[PRE0]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Importing Required Libraries
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 导入所需的库
- en: Now that we have installed the required libraries, let’s import them. We will
    also import some other libraries that will help us load the data and prepare it
    for modelling. We can import them using the code given below.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经安装了所需的库，让我们导入它们。我们还将导入一些其他库，这些库将帮助我们加载数据并为建模做准备。我们可以使用下面的代码导入它们。
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Loading Dataset
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加载数据集
- en: We will be using the diabetes dataset that is freely available, and you can
    check out this data from this [link](https://raw.githubusercontent.com/jbrownlee/Datasets/master/).
    We will use the command below to download the data, store it in a dataframe, and
    define the X(Features) and Y(Outcome).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用免费提供的糖尿病数据集，你可以从这里检查这些数据[link](https://raw.githubusercontent.com/jbrownlee/Datasets/master/)。我们将使用下面的命令下载数据，将其存储在dataframe中，并定义X（特征）和Y（结果）。
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Using LazyPredict
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用LazyPredict
- en: Now that we have the dataset loaded and the required libraries imported, let’s
    split the data into a training and a testing dataset. After that, we will finally
    pass it to lazypredict to understand which is the best model for our data.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经加载数据集并导入了所需的库，让我们将数据分成训练集和测试集。之后，我们最终将数据传递给lazypredict，以了解哪个模型最适合我们的数据。
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![Model Performance](../Images/4002baaa03c5f6c551aa61f491cd5e1a.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![模型性能](../Images/4002baaa03c5f6c551aa61f491cd5e1a.png)'
- en: In the output, we can clearly see that LazyPredict tried fitting the data in
    20+ ML Models, and the performance in terms of Accuracy, ROC, AUC, etc. is shown
    to select the best model for the data. This makes the decision less time-consuming
    and more accurate. Similarly, we can create a plot of the accuracy of these models
    to make it a more visual decision. You can also check the time taken which is
    negligible which makes it much more time saving.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在输出中，我们可以清楚地看到LazyPredict尝试在20+ ML模型中拟合数据，并在准确度、ROC、AUC等方面展示了性能，以选择最适合数据集的最佳模型。这使得决策更加节省时间且更准确。同样，我们可以创建这些模型的准确度图，使其成为一个更直观的决策。你还可以检查所花费的时间，这是微不足道的，这使得它节省更多的时间。
- en: '[PRE4]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![Model Performance Visualization](../Images/abba14699a52d5163da2e2ffad0fb01d.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![模型性能可视化](../Images/abba14699a52d5163da2e2ffad0fb01d.png)'
- en: Using PyCaret
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用PyCaret
- en: Now let’s check how PyCaret works. We will use the same dataset to create the
    models and compare performance. We will use the entire dataset as PyCaret itself
    does a test-train split.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看PyCaret是如何工作的。我们将使用相同的dataset来创建模型并比较性能。我们将使用整个dataset，因为PyCaret本身也会进行测试-训练分割。
- en: 'The code below will:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码将：
- en: Run 15+ models
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行15+个模型
- en: Evaluate them with cross-validation
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用交叉验证评估它们
- en: Return the best one based on performance
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据性能返回最佳模型
- en: All in two lines of code.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 只需两行代码就能完成。
- en: '[PRE5]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![Pycaret Data Analysis](../Images/f6be244b94dfdff39246e77ae390b54d.png)![Pycaret
    Model Performance'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '![Pycaret数据分析](../Images/f6be244b94dfdff39246e77ae390b54d.png)![Pycaret模型性能'
- en: '](../Images/ce6254bde95e1927d0c15d921b196381.png)'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '](../Images/ce6254bde95e1927d0c15d921b196381.png)'
- en: As we can see here, PyCaret provides much more information about the model’s
    performance. It may take a few seconds more than LazyPredict, but it also provides
    more information, so that we can make an informed decision about which model we
    want to go ahead with.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所看到的，PyCaret提供了关于模型性能的更多信息。它可能比LazyPredict多花几秒钟，但它也提供了更多信息，这样我们就可以做出明智的决定，选择我们想要继续推进的模型。
- en: Real-Life Use Cases
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 真实世界的应用案例
- en: 'Some real-life use cases where these libraries can be beneficial are:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这些库可以在以下真实世界的用例中带来好处：
- en: Rapid prototyping in hackathons
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在黑客马拉松中进行快速原型设计
- en: Internal dashboards that suggest the best model for analysts
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为分析师提供最佳模型建议的内部仪表板
- en: Teaching ML without drowning in syntax
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在语法中不迷失的机器学习教学
- en: Pre-testing ideas before full-scale deployment
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在全面部署前对想法进行预测试
- en: Conclusion
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Using AutoML libraries like the ones we discussed doesn’t mean you should skip
    learning the math behind models. But in a fast-paced world, it’s a huge productivity
    boost.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 使用我们讨论过的AutoML库并不意味着你应该跳过学习模型背后的数学。但在快节奏的世界里，这是一个巨大的生产力提升。
- en: What I love about lazypredict and pycaret is that they give you a quick feedback
    loop, so you can focus on feature engineering, domain knowledge, and interpretation.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢lazypredict和pycaret的原因是它们为你提供了一个快速的反馈循环，这样你就可以专注于特征工程、领域知识和解释。
- en: If you’re starting a new ML project, try this workflow. You’ll save time, make
    better decisions, and impress your team. Let Python do the heavy lifting while
    you build smarter solutions.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在启动一个新的机器学习项目，尝试这个工作流程。你将节省时间，做出更好的决策，并给你的团队留下深刻印象。让Python来做繁重的工作，而你则构建更智能的解决方案。
