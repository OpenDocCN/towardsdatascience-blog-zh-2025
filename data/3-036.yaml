  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '*图片由作者提供*'
- en: \(O=\begin{bmatrix} 1 & 0.5 \\ 0 & 1 \end{bmatrix}\) has single eigenvector
    axis \(e=\begin{bmatrix} t \\ 0 \end{bmatrix}, \forall t \neq 0 \), \(\lambda=1\).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: \(O=\begin{bmatrix} 1 & 0.5 \\ 0 & 1 \end{bmatrix}\) 有单个特征向量轴 \(e=\begin{bmatrix}
    t \\ 0 \end{bmatrix}, \forall t \neq 0 \)，\(\lambda=1\)。
- en: '![](../Images/f9fe615afaa2e80eefb49af293284b87.png)'
  id: totrans-69
