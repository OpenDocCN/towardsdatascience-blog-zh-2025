- en: '* * *'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What is density estimation?
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是密度估计？
- en: Density estimation is concerned with reconstructing the probability density
    function of a random variable, *X*, given a sample of random variates *X[1], X*[2]*,…,
    X[n]*.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 密度估计涉及根据随机变量 *X* 的随机变量样本 *X[1], X*[2]*,…, X[n]* 重建其概率密度函数。
- en: Density estimation plays a crucial role in statistical analysis. It may be used
    as a standalone method for analyzing the properties of a random variable’s distribution,
    such as modality, spread, and skew. Alternatively, density estimation may be used
    as a means for further statistical analysis, such as classification tasks, goodness-of-fit
    tests, and anomaly detection, to name a few.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 密度估计在统计分析中起着至关重要的作用。它可以作为一个独立的方法来分析随机变量分布的特性，如模态、范围和偏度。或者，密度估计可以用作进一步统计分析的手段，例如分类任务、拟合优度检验和异常检测等。
- en: Some of you may recall that the probability distribution of a random variable
    *X* can be completely characterized by its cumulative distribution function (CDF),
    *F*(⋅).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你们中的一些人可能还记得，随机变量 *X* 的概率分布可以完全由其累积分布函数（CDF），*F*(⋅) 来表征。
- en: 'If *X* is a discrete random variable, then we can derive its probability mass
    function (PMF), *p*(⋅), from its CDF via the following relationship: *p*(X[i])
    *= F(X*[i]*) − F(X*[*i*-1]), where **X*[*i*-1]* denotes the largest value within
    the discrete distribution of *X* that is less than *X*[*i*].'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 *X* 是一个离散随机变量，那么我们可以通过以下关系从其 CDF 推导出其概率质量函数（PMF），*p*(⋅)：*p*(X[i]) *= F(X*[i]*)
    − F(X*[*i*-1])，其中 **X*[*i*-1]* 表示小于 *X*[*i*] 的离散分布中 *X* 的最大值。
- en: If *X* is continuous, then its probability density function (PDF), *p*(⋅), may
    be derived by differentiating its CDF i.e. *F′*(⋅) *= p*(⋅).
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 *X* 是连续的，那么其概率密度函数（PDF），*p*(⋅)，可以通过对其累积分布函数（CDF）求导得到，即 *F′*(⋅) *= p*(⋅)。
- en: Based on this, you may be wondering why we need methods to estimate the probability
    distribution of *X*, when we can just exploit the relationships stated above.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 基于此，你可能想知道，当我们可以直接利用上述关系时，为什么还需要方法来估计 *X* 的概率分布。
- en: Certainly, given a sample of data **X[1],…, X[n]**, we may always construct
    an estimate of its CDF. If *X* is discrete, then constructing its PMF is straightforward,
    as it simply requires counting the frequency of observations for each distinct
    value that appears in our sample.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，给定数据样本 **X[1],…, X[n]**，我们总是可以构建其 CDF 的估计。如果 *X* 是离散的，那么构建其 PMF 是直接的，因为它只需要计算样本中每个不同值出现的频率。
- en: However, if *X* is continuous, estimating its PDF is not so trivial. Notice
    that our estimate of the CDF, *F*(⋅), will necessarily follow a discrete distribution,
    since we have a finite amount of empirical data. Since *F*(⋅) is discrete, we
    cannot simply differentiate it to obtain an estimate of the PDF. Thus, this motivates
    the need for other methods of estimating *p*(⋅).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果 *X* 是连续的，估计其 PDF 并不简单。请注意，我们的 CDF 估计，*F*(⋅)，必然遵循一个离散分布，因为我们有有限数量的经验数据。由于
    *F*(⋅) 是离散的，我们不能简单地对其进行微分以获得 PDF 的估计。因此，这促使我们需要其他方法来估计 *p*(⋅)。
- en: To provide some additional motivation behind density estimation, the CDF may
    be suboptimal to use for analyzing the properties of the probability distribution
    of *X*. For example, consider the following display.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提供一些关于密度估计的额外动机，CDF 可能不是分析 *X* 概率分布特性的最佳选择。例如，考虑以下展示。
- en: '![](../Images/7f2935346896d85ce54a2835c9f9f22f.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![双峰分布的 PDF 与 CDF](../Images/7f2935346896d85ce54a2835c9f9f22f.png)'
- en: PDF vs. CDF of data following a bimodal distribution.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 双峰分布数据的 PDF 与 CDF 对比。
- en: Certain properties of the distribution of *X*, such as its bimodal nature, are
    immediately clear from analyzing its PDF. However, these properties are harder
    to notice from analyzing its CDF, due to the cumulative nature of the distribution.
    For many folks, the PDF likely provides a more intuitive display of the distribution
    of *X — *it is larger at values of *X* that are more likely to “occur” and smaller
    for values of *X* that are less likely.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 从分析 *X* 的 PDF 可以立即清楚地看出 *X* 分布的某些特性，例如其双峰性质。然而，由于分布的累积性质，这些特性从分析其 CDF 中很难察觉。对于许多人来说，PDF
    可能提供了对 *X* 分布的更直观的展示——在 *X* 更可能“发生”的值处更大，而在 *X* 不太可能发生的值处更小。
- en: Broadly speaking, density estimation approaches may be categorized as *parametric*
    or *non-parametric*.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 广义而言，密度估计方法可以分为 *参数化* 或 *非参数化*。
- en: '*Parametric* density estimation assumes *X* follows some distribution that
    may be characterized by some parameters (ex: *X ∼ N*(*μ,σ*)). Density estimation
    in this case involves estimating the relevant parameters for the parametric distribution
    of *X*, and then plugging in these parameter estimates to the corresponding density
    function formula for *X*.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*参数*密度估计假设*X*遵循某种分布，该分布可能由某些参数（例如：*X ∼ N*(*μ,σ*)）来表征。在这种情况下，密度估计涉及估计*X*的参数分布的相关参数，然后将这些参数估计值插入到*X*的相应密度函数公式中。'
- en: '*Non-parametric* density estimation makes less rigid assumptions about the
    distribution of *X*, and estimates the shape of the density function directly
    from the empirical data. As a result, non-parametric density estimates will typically
    have lower bias and higher variance compared to parametric density estimates.
    Non-parametric methods may be desired when the underlying distribution of *X*
    is unknown and we’re working with a large amount of empirical data.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*非参数*密度估计对*X*的分布做出较少的严格假设，并直接从经验数据中估计密度函数的形状。因此，与参数密度估计相比，非参数密度估计通常具有较低的偏差和较高的方差。当*X*的潜在分布未知且我们处理大量经验数据时，可能需要使用非参数方法。'
- en: 'For the rest of this article, we’ll focus on analyzing two popular non-parametric
    methods for density estimation: **histograms** and **kernel density estimators**
    (KDEs). We’ll dig into how they work, the benefits and drawbacks of each approach,
    and how accurately they estimate the true density function of a random variable.
    Finally, we’ll examine how density estimation can be applied to classification
    problems, and how the quality of the density estimator can impact classification
    performance.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文的剩余部分，我们将专注于分析两种流行的非参数密度估计方法：**直方图**和**核密度估计器**（KDEs）。我们将深入了解它们的工作原理，每种方法的优缺点，以及它们如何准确地估计随机变量的真实密度函数。最后，我们将探讨密度估计如何应用于分类问题，以及密度估计器的质量如何影响分类性能。
- en: '* * *'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Histograms
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 直方图
- en: Overview
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 概述
- en: Histograms are a simple non-parametric approach for constructing a density estimate
    from a sample of data. Intuitively, this approach involves partitioning the range
    of our data into distinct equal length bins. Then, for any given point, assign
    its density to be equal to the proportion of points that reside within the same
    bin, normalized by the bin length.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 直方图是从数据样本构建密度估计的简单非参数方法。直观地说，这种方法涉及将我们的数据范围划分为不同的等长区间。然后，对于任何给定的点，将其密度分配为位于同一区间内的点的比例，并按区间长度进行归一化。
- en: Formally, given a sample of *n* observations
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 形式上，给定一个包含*n*个观测值的样本
- en: '![](../Images/2fc67601ca2d9c41e6951e1bd3db6ef1.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2fc67601ca2d9c41e6951e1bd3db6ef1.png)'
- en: partition the domain into *M* bins
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 将域划分为*M*个区间
- en: '![](../Images/03ca2a0956ab577a6fb1557bec8cf5bb.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/03ca2a0956ab577a6fb1557bec8cf5bb.png)'
- en: such that
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 使得
- en: '![](../Images/6f5f8ab61e6975b7c17c5979997a5748.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6f5f8ab61e6975b7c17c5979997a5748.png)'
- en: For a given point *x* ∈ *β[l]*, where *β[l]* denotes the *l*th bin, the density
    estimate produced by the histogram will be
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对于给定的点*x* ∈ *β[l]*，其中*β[l]*表示第*l*个区间，直方图产生的密度估计将是
- en: '![](../Images/e41b244fbdb85de881968a8ad0f1e5fe.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e41b244fbdb85de881968a8ad0f1e5fe.png)'
- en: Pointwise density estimate of the histogram.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 直方图的点密度估计。
- en: Since the histogram density estimator assigns uniform density to all points
    within the same bin, the density estimate will be discontinuous at all of its
    breakpoints where the density estimates differ.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 由于直方图密度估计器将均匀密度分配给同一区间内的所有点，因此密度估计在其断点处将是不连续的，在这些断点处密度估计值不同。
- en: '![](../Images/c6c9073f9cbe995967803c48c26f57ec.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c6c9073f9cbe995967803c48c26f57ec.png)'
- en: Histogram density estimate for the standard Gaussian. Uniform densities are
    assigned to all points within the same bin.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 标准高斯分布的直方图密度估计。所有点在同一区间内被分配了均匀密度。
- en: Above, we have the histogram density estimate of the standard Gaussian distribution
    generated from a sample of 1000 data points. We see that *x* =0 and *x* =−0.5
    lie within the same bin, and thus have identical density estimates.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所示，我们得到了从1000个数据点样本生成的标准高斯分布的直方图密度估计。我们看到*x* =0和*x* =−0.5位于同一区间内，因此具有相同的密度估计值。
- en: Theoretical Properties
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理论性质
- en: Histograms are a simple and intuitive method for density estimation. They make
    no assumptions about the underlying distribution of the random variable. Histogram
    estimation simply requires tuning the bin width, *h*, and the point where the
    histogram bins originate from, *t*[0]. However, we’ll see very soon that the accuracy
    of the histogram estimator is highly dependent on tuning these parameters appropriately.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 直方图是密度估计的一种简单直观方法。它们对随机变量的潜在分布没有任何假设。直方图估计只需要调整**h**（箱宽）和直方图箱起始点**t**[0]。然而，我们很快就会看到，直方图估计器的准确性高度依赖于这些参数的适当调整。
- en: As desired, the histogram estimator is a true density function.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，直方图估计器是一个真正的密度函数。
- en: It is non-negative over its entire domain.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它在其整个定义域内非负。
- en: It integrates to 1.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它积分到1。
- en: '![](../Images/5907b5a6959da1ec35163b1c6125d318.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![方差分析](../Images/5907b5a6959da1ec35163b1c6125d318.png)'
- en: Integral of the histogram density estimator.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 直方图密度估计器的积分。
- en: We can evaluate the accuracy of the histogram estimator for estimating the true
    density, *p*(⋅), by decomposing its mean squared error into its bias and variance
    terms.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过将直方图估计器的均方误差分解为其偏差和方差项来评估直方图估计器估计真实密度**p**(⋅)的准确性。
- en: First, lets examine its bias at a given point *x* ∈ (*b[k-1], b[k]*].
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们考察其在给定点**x** ∈ (*b[k-1], b[k]*]处的偏差。
- en: '![](../Images/1afb97f419ba50619036f92c920337cf.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![方差分析](../Images/1afb97f419ba50619036f92c920337cf.png)'
- en: Expected value of the pointwise histogram density estimate.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 点值直方图密度估计的期望值。
- en: Let’s take a bit of a leap here. Using the Taylor series expansion, the fact
    that the PDF is the derivative of the CDF, and |*x − b[k-1]*| ≤ *h*, we can derive
    the following.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在这里跳一下。使用泰勒级数展开，PDF是CDF的导数，以及|*x − b[k-1]*| ≤ *h*，我们可以推导出以下结论。
- en: '![](../Images/409e490b8e6a06564eb7d05495e9c849.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![渐近方差](../Images/409e490b8e6a06564eb7d05495e9c849.png)'
- en: Thus, we have
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们有
- en: '![](../Images/27f702e810f58a4f24708ef0373c589a.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![方差分析](../Images/27f702e810f58a4f24708ef0373c589a.png)'
- en: which implies
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着
- en: '![](../Images/1c31c3dec7456e31e3b934e1e7c6cc93.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![方差分析](../Images/1c31c3dec7456e31e3b934e1e7c6cc93.png)'
- en: Asymptotic bias of the histogram density estimator.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 直方图密度估计器的渐近偏差。
- en: Therefore, the histogram estimator is an unbiased estimator of the true density,
    *p*(⋅), as the bin width approaches 0.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当箱宽趋近于0时，直方图估计器是真实密度**p**(⋅)的无偏估计。
- en: Now, let’s analyze the variance of the histogram estimator.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们分析直方图估计器的方差。
- en: '![](../Images/4c82fea009a9f7b21a0e6cc795144e61.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![理论性质](../Images/4c82fea009a9f7b21a0e6cc795144e61.png)'
- en: Notice that as *h* → ∞, we have
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到当**h** → ∞时，我们有
- en: '![](../Images/1aaaf4650bc484a4e8060799897912ba.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![渐近方差](../Images/1aaaf4650bc484a4e8060799897912ba.png)'
- en: Therefore,
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，
- en: '![](../Images/ae999a0db6c2304b45697e45411a5727.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![偏差-方差权衡](../Images/ae999a0db6c2304b45697e45411a5727.png)'
- en: Asymptotic variance of the histogram density estimator.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 直方图密度估计器的渐近方差。
- en: Now, we’re at a bit of an impasse; we see that as *h* → ∞, the bias of the histogram
    density estimate decreases, while its variance increases.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们遇到了一点困境；我们看到，当**h** → ∞时，直方图密度估计的偏差减少，而其方差增加。
- en: 'We’re typically concerned with the accuracy of the density estimate at large
    sample sizes (i.e. as *n* → ∞). Therefore, to maximize the accuracy of the histogram
    density estimate, we’ll want to tune *h* to achieve the following behavior:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通常关注大样本量（即**n** → ∞）下密度估计的准确性。因此，为了最大化直方图密度估计的准确性，我们将想要调整**h**以实现以下行为：
- en: Choose *h* to be small to minimize bias.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个小的**h**以最小化偏差。
- en: As *h* → 0 and *n* → ∞, we must have *nh* → ∞ to minimize variance. In other
    words, the large sample size should overpower the small bin width, asymptotically.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当**h** → 0和**n** → ∞时，我们必须有**nh** → ∞以最小化方差。换句话说，大样本量应该压倒小的箱宽，渐近地。
- en: 'This bias-variance trade-off is not unexpected:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这种偏差-方差权衡并不意外：
- en: Small bin widths may capture the density around a particular point with high
    precision. However, density estimates may change from small random variations
    across data sets as less points will fall within the same bin.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小的箱宽可以以高精度捕捉到特定点的密度。然而，由于较少的点会落在同一个箱中，密度估计可能会随着数据集之间的小随机变化而改变。
- en: Large bin widths include more data points when computing the density estimate
    at a given point, which means density estimates will be more robust to small random
    variations in the data.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当计算给定点的密度估计时，大的箱宽包括更多的数据点，这意味着密度估计将更能抵抗数据中的小随机变化。
- en: Let’s illustrate this trade-off with some examples.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一些例子来说明这种权衡。
- en: Demonstration of Theoretical Properties
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理论性质的演示
- en: First, we’ll look at how small bin widths may lead to large variance in the
    histogram density estimator. For this example, we’ll draw four samples of 50 random
    variates, where each sample is drawn from a standard Gaussian distribution. We’ll
    set a relatively small bin width (*h* = 0.2).
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将探讨较小的桶宽度如何可能导致直方图密度估计器的方差较大。在这个例子中，我们将从标准高斯分布中抽取四个样本，每个样本包含50个随机变量。我们将设置一个相对较小的桶宽度（*h*
    = 0.2）。
- en: '[PRE0]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![](../Images/fed5829f088cf05b9f10b72af2068104.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fed5829f088cf05b9f10b72af2068104.png)'
- en: Histogram density estimates (h = 0.2) generated from 4 different samples of
    the standard Gaussian. Notice the high variability in density estimates across samples.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 从标准高斯分布的4个不同样本生成的直方图密度估计（h = 0.2）。注意样本间密度估计的高变异性。
- en: It’s clear that the histogram density estimates vary quite a bit. For instance,
    we see that the pointwise density estimate at *x* = 0 ranges from approximately
    0.2 in Sample 4 to approximately 0.6 in Sample 2\. Additionally, the distribution
    of the density estimate produced in Sample 1 appears almost bimodal, with peaks
    around −1 and a little above 0.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 很明显，直方图密度估计变化很大。例如，我们看到在 *x* = 0 的点密度估计在样本4中约为0.2，在样本2中约为0.6。此外，样本1中产生的密度估计的分布几乎呈双峰，峰值在-1和略高于0。
- en: Let’s repeat this exercise to demonstrate how large bin widths may result in
    a density estimate with lower variance, but higher bias. For this example, let’s
    draw four samples from a bimodal distribution consisting of a mixture of two Gaussian
    distributions, N(0, 1) and N(3, 1). We’ll set a relatively large bin width (*h*
    = 2).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们重复这个练习来展示较大的桶宽度如何导致具有较低方差但较高偏差的密度估计。在这个例子中，让我们从由两个高斯分布N(0, 1)和N(3, 1)混合而成的双峰分布中抽取四个样本。我们将设置一个相对较大的桶宽度（*h*
    = 2）。
- en: '[PRE1]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/82a40b215bb364a3f624b93add03f25b.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/82a40b215bb364a3f624b93add03f25b.png)'
- en: Histogram density estimates (h = 2) generated from 4 different samples of a
    bimodal distribution. These histograms fail to capture the bimodal nature of the data.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 从4个不同的双峰分布样本生成的直方图密度估计（h = 2）。这些直方图未能捕捉到数据的双峰特性。
- en: There is still some variation in the density estimates across the four histograms,
    but they appear stable relative to the density estimates we saw above with smaller
    bin widths. For instance, it appears that the pointwise density estimate at *x*
    = 0 is approximately 0.15 across all the histograms. However, it’s clear that
    these histogram estimators introduce a large amount of bias, as the bimodal distribution
    of the true density function is masked by the large bin widths.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在四个直方图中，密度估计仍然存在一些变化，但相对于我们上面看到的较小桶宽度的密度估计，它们似乎更稳定。例如，似乎所有直方图中在 *x* = 0 的点密度估计大约为0.15。然而，很明显，这些直方图估计引入了大量的偏差，因为真实密度函数的双峰分布被较大的桶宽度所掩盖。
- en: Additionally, we mentioned previously that the histogram estimator requires
    tuning the origin point, *t*[0]. Let’s look at an example that illustrates the
    impact that the choice of **t*[0]* can have on the histogram density estimate.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们之前提到直方图估计器需要调整原点，*t*[0]。让我们通过一个例子来说明**t*[0]*的选择如何影响直方图密度估计。
- en: '[PRE2]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/373133570a3c0280d253e6fa89885493.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/373133570a3c0280d253e6fa89885493.png)'
- en: Histogram density estimates of a bimodal distribution with different origin
    points. Notice the histogram on the right fails to capture the bimodal nature
    of the data.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 不同原点的双峰分布的直方图密度估计。注意右边的直方图未能捕捉到数据的双峰特性。
- en: The histogram density estimates above differ in their origin point by a magnitude
    of 1\. The impact of the different origin point on the resulting histogram density
    estimates is evident. The histogram on the left captures the fact that the distribution
    is bimodal with peaks around 0 and 5\. In contrast, the histogram on the right
    gives the impression that the density of *X* follows a unimodal distribution with
    a single peak around 5.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 上述直方图密度估计在原点上的差异为1的量级。不同原点对结果直方图密度估计的影响是明显的。左边的直方图捕捉到分布是双峰的，峰值在0和5附近。相比之下，右边的直方图给人一种
    *X* 的密度遵循单峰分布，峰值在5附近的印象。
- en: Histograms are a simple and intuitive approach to density estimation. However,
    histograms will always produce density estimates that follow a discrete distribution,
    and we’ve seen that the resulting density estimate may be highly dependent on
    an arbitrary choice of the origin point. Next, we’ll look at an alternative method
    for density estimation, **Kernel Density Estimation**, that addresses these shortcomings.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 直方图是密度估计的一种简单直观的方法。然而，直方图总是会生成遵循离散分布的密度估计，我们已经看到结果密度估计可能高度依赖于任意选择的原点。接下来，我们将探讨另一种密度估计方法，即**核密度估计**，该方法解决了这些缺点。
- en: '* * *'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Kernel Density Estimators (KDE)
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 核密度估计器 (KDE)
- en: Naive Density Estimator
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 朴素密度估计器
- en: We’ll first look at the most basic form of a kernel density estimator, the **naive
    density estimator**. This approach is also known as the “moving histogram”; it
    is an extension of the traditional histogram density estimator that computes the
    density at a given point by examining the number of observations that fall within
    an interval that is centered around that point.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先来看核密度估计器最基本的形式，即**朴素密度估计器**。这种方法也被称为“移动直方图”；它是传统直方图密度估计器的扩展，通过检查落在以该点为中心的区间内的观测值数量来计算给定点的密度。
- en: Formally, the pointwise density estimate at *x* produced by the naive density
    estimator can be written as follows.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 形式上，朴素密度估计器在 *x* 处产生的点密度估计可以写成以下形式。
- en: '![](../Images/7f44061288162cebebc798304566e1b4.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7f44061288162cebebc798304566e1b4.png)'
- en: Pointwise density estimate of the Naive Density Estimator.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 朴素密度估计器的点密度估计。
- en: Its corresponding [kernel](https://en.wikipedia.org/wiki/Kernel_%28statistics%29)
    is defined as follows.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 其对应的 [核](https://en.wikipedia.org/wiki/Kernel_%28statistics%29)定义为以下内容。
- en: '![](../Images/ce379601422a399c9e161cfd1cf111a8.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ce379601422a399c9e161cfd1cf111a8.png)'
- en: Naive Density Estimator kernel function.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 朴素密度估计器的核函数。
- en: Unlike the traditional histogram density estimate, the density estimate produced
    by the moving histogram does not vary based on the choice of origin point. In
    fact, there is no concept of “origin point” in the moving histogram, as the density
    estimate at *x* only depends on the points that lie within the neighborhood (*x*
    − (*h*/2), *x* + (*h*/2)).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统的直方图密度估计不同，移动直方图产生的密度估计不会根据原点选择而变化。实际上，在移动直方图中没有“原点”的概念，因为密度估计在 *x* 处只依赖于位于邻域（*x*
    − (*h*/2), *x* + (*h*/2)）内的点。
- en: Let’s examine the density estimate produced by the naive density estimator for
    the same bimodal distribution as we used above for highlighting the histogram’s
    dependency on origin point.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查朴素密度估计器为我们上面用来突出直方图对原点依赖性的双峰分布产生的密度估计。
- en: '[PRE3]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/22121f8a75b8aff88c808f7570d783ce.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/22121f8a75b8aff88c808f7570d783ce.png)'
- en: Naive Density Estimate of a bimodal distribution containing a mixture of N(0,
    1) and N(5, 1).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 朴素密度估计器对包含N(0, 1)和N(5, 1)混合的双峰分布的估计。
- en: Clearly, the density estimate produced by the naive density estimator captures
    the bimodal distribution much more accurately than the traditional histogram.
    Additionally, the density at each point is captured with much finer granularity.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，朴素密度估计器产生的密度估计比传统的直方图更准确地捕捉到双峰分布。此外，每个点的密度都以更精细的粒度进行捕捉。
- en: That being said, the density estimate produced by the NDE is still quite “rough”
    i.e. the density estimate does not have smooth curvature. This is because each
    observation is weighted as “all or nothing” when computing the pointwise density
    estimate, which is apprent from its kernel, *K*[0]. Specifically, all points within
    the neighborhood (*x* − (*h*/2), *x* + (*h*/2)) contribute equally to the density
    estimate, while points outside the interval contribute nothing.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，NDE产生的密度估计仍然相当“粗糙”，即密度估计没有平滑的曲率。这是因为当计算点密度估计时，每个观测值都被视为“全有或全无”，这可以从其核函数
    *K*[0] 中明显看出。具体来说，邻域（*x* − (*h*/2), *x* + (*h*/2)）内的所有点对密度估计的贡献是相等的，而区间外的点则没有任何贡献。
- en: Ideally, when computing the density estimate for *x*, we would like to *weigh
    points in proportion to their distance from x*, such that the points closer/farther
    from *x* have a higher/lower impact on its density estimate, respectively.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，当计算 *x* 的密度估计时，我们希望根据点与 *x* 的距离成比例地**加权**，这样离 *x* 更近/更远的点对其密度估计的影响就更高/更低。
- en: 'This is essentially what the KDE does: it generalizes the naive density estimator
    by replacing the uniform density function with an arbitrary density function,
    the **kernel**. Intuitively, you can think of the KDE as a smoothed histogram.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是KDE（核密度估计）的基本原理：它通过用任意密度函数（**核**）替换均匀密度函数来泛化朴素密度估计器。直观地，你可以将KDE视为一个平滑的直方图。
- en: 'KDE: Overview'
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: KDE：概述
- en: 'The kernel density estimator generated from a sample *X[1],…, X[n]*, can be
    defined as follows:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 从样本 *X[1],…, X[n]* 生成的核密度估计器可以定义为以下：
- en: '![](../Images/baa5cdf90080ef44a05af3d0fc6f33c6.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/baa5cdf90080ef44a05af3d0fc6f33c6.png)'
- en: Pointwise density estimate of the KDE.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: KDE的点密度估计。
- en: Below are some popular choices for kernels used in density estimation.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一些在密度估计中常用的核函数的选择。
- en: '![](../Images/c5e4ad691ef5065562a0137141afb53c.png)![](../Images/f293be87618e38c9c6ebaf3086ee4642.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c5e4ad691ef5065562a0137141afb53c.png)![图片](../Images/f293be87618e38c9c6ebaf3086ee4642.png)'
- en: These are just several of the more popular kernels that are typically used for
    density estimation. For more information about kernel functions, check out the
    [Wikipedia](https://en.wikipedia.org/wiki/Kernel_%28statistics%29#Kernel_functions_in_common_use).
    If you’re seeking for some intuition behind what exactly a kernel function is
    (as I was), check out this [quora thread](https://www.quora.com/What-is-the-intuitive-explanation-of-a-kernel-in-statistics).
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是通常用于密度估计的几个更受欢迎的核函数。有关核函数的更多信息，请参阅[Wikipedia](https://en.wikipedia.org/wiki/Kernel_%28statistics%29#Kernel_functions_in_common_use)。如果你在寻找关于核函数究竟是什么的直观解释（就像我一样），请查看这个[quora线程](https://www.quora.com/What-is-the-intuitive-explanation-of-a-kernel-in-statistics)。
- en: We can see that the KDE is a genuine density function.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到KDE是一个真正的密度函数。
- en: It is always non-negative, since *K*(⋅) is a density function.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于 *K*(⋅) 是一个密度函数，所以它总是非负的。
- en: It integrates to 1.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它的积分等于1。
- en: '![](../Images/5898c0136df24a473f5f12ff47a2e028.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5898c0136df24a473f5f12ff47a2e028.png)'
- en: Integral of the KDE.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: KDE的积分。
- en: Kernel and Bandwidth
  id: totrans-142
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 核和带宽
- en: In practice, *K*(⋅) is chosen to be symmetric and unimodal around 0 (∫*u⋅K*(*u*)*du*
    = 0). Additionally, *K*(⋅) is typically scaled to have unit variance when used
    for density estimation (∫*u*²⋅*K*(*u*)*du* = 1). This scaling essentially standardizes
    the impact that the choice of bandwidth, *h*, has on the KDE, regardless of the
    kernel being used.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，*K*(⋅) 被选择为在0周围对称且单峰（∫*u⋅K*(*u*)*du* = 0）。此外，*K*(⋅) 通常缩放到具有单位方差，当用于密度估计时（∫*u*²⋅*K*(*u*)*du*
    = 1）。这种缩放本质上标准化了带宽 *h* 的选择对KDE的影响，无论使用哪种核。
- en: Since the KDE at a given point is the weighted sum of its neighboring points,
    where the weights are computed by *K*(⋅), the smoothness of the density estimate
    is inherited from the smoothness of the kernel function.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 由于在给定点的KDE是其邻近点的加权总和，其中权重由 *K*(⋅) 计算，因此密度估计的平滑性继承了核函数的平滑性。
- en: Smooth kernel functions will produce smooth KDEs. We can see that the Gaussian
    kernel depicted above is infinitely differentiable, so KDEs with the Gaussian
    kernel will produce density estimates with smooth curvature.
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平滑的核函数将产生平滑的KDE。我们可以看到上面描绘的高斯核是无限可导的，因此使用高斯核的KDE将产生具有平滑曲率的密度估计。
- en: 'On the other hand, the other kernel functions (Epanechnikov, rectangular, triangular)
    are not differentiable everywhere (ex: ±1), and in the case of the rectangular
    and triangular kernels, do not have smooth curvature. Thus, KDEs using these kernels
    will produce rougher density estimates.'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一方面，其他核函数（如Epanechnikov、矩形、三角形）在所有地方（例如±1）不可导，在矩形和三角形核的情况下，没有平滑的曲率。因此，使用这些核的KDE将产生更粗糙的密度估计。
- en: However, in practice, we’ll see that as long as the kernel function is continuous,
    the choice of the kernel has relatively little impact on the KDE compared to the
    choice of bandwidth.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在实践中，我们会看到，只要核函数是连续的，与带宽的选择相比，核的选择对KDE的影响相对较小。
- en: '[PRE4]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/551c83bfc0a48137b063451920aaa9f0.png)![](../Images/27838d850f28b26becebdb99f3c376d8.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/551c83bfc0a48137b063451920aaa9f0.png)![图片](../Images/27838d850f28b26becebdb99f3c376d8.png)'
- en: We see that the KDEs for the standard Gaussian with various kernels are relatively
    similar, compared to the KDEs produced with various bandwidths.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，与各种带宽产生的KDE相比，具有各种核的标准高斯KDE相对相似。
- en: Accuracy of the KDE
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: KDE的准确性
- en: Let’s examine how accurately the KDE estimates the true density, *p*(⋅). As
    we did with the histogram estimator, we can decompose its mean squared error into
    its bias and variance terms. For details behind how to derive these bias and variance
    terms, check out lecture 6 of [these notes](https://faculty.washington.edu/yenchic/18W_stat425.html).
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考察 KDE 如何准确地估计真实密度 *p*(⋅)。正如我们对待直方图估计器一样，我们可以将其均方误差分解为其偏差和方差项。关于如何推导这些偏差和方差项的详细内容，请查看这些笔记的第6讲[这些笔记](https://faculty.washington.edu/yenchic/18W_stat425.html)。
- en: The bias and variance of the KDE at *x* can be expressed as follows.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *x* 处的 KDE 的偏差和方差可以表示如下。
- en: '![](../Images/cc00069d604fad2f8b924eba67a8a72d.png)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cc00069d604fad2f8b924eba67a8a72d.png)'
- en: Asymptotic bias and variance of the KDE.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: KDE 的渐近偏差和方差。
- en: 'Intuitively, these results give us the following insights:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 直观地说，这些结果给我们以下启示：
- en: 'The effect of *K*(⋅) on the accuracy of the KDE is primarily captured via the
    term σ²[K] = ∫*K*(*u*)²*du*. The Epanechnikov kernel minimizes this integral,
    so theoretically it should produce the optimal KDE. However, we’ve seen that the
    choice of kernel has little practical impact on the KDE relative to its bandwidth.
    Additionally, the Epanechnikov kernel has a bounded support interval ([−1, 1]).
    As a result, it may produce rougher density estimates relative to kernels that
    are nonzero across the entire real number space (ex: Gaussian). Thus, the Gaussian
    kernel is commonly used in practice.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*K*(⋅) 对 KDE 准确性的影响主要通过 σ²[K] = ∫*K*(*u*)²*du* 这个项来捕捉。Epanechnikov 核函数最小化这个积分，因此理论上它应该产生最优的
    KDE。然而，我们已经看到，与带宽相比，核函数的选择对 KDE 的实际影响很小。此外，Epanechnikov 核函数的支持区间是有界的（[−1, 1]）。因此，与在整个实数空间上非零的核函数（例如高斯核）相比，它可能产生更粗糙的密度估计。因此，高斯核在实践中被广泛使用。'
- en: 'Recall that the asymptotic bias and variance of the histogram estimator as
    h → ∞ was *O*(*h*) and *O*(*1*/*(nh*)), respectively. Comparing these against
    KDE tells us that *the KDE improves upon the histogram density estimator primarily
    through decreased asymptotic bias*. This is expected: the kernel smoothly varies
    the weight of the neighboring points of *x* when computing the pointwise density
    at *x*, instead of assigning uniform density to arbitrary fixed intervals of the
    domain. In other words, the KDE imposes a less rigid structure on the density
    estimate compared to the histogram approach.'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回想一下，当 h → ∞ 时，直方图估计器的渐近偏差和方差分别是 *O*(*h*) 和 *O*(*1*/*(nh*))。将这些与核密度估计（KDE）进行比较，告诉我们
    *KDE 主要通过减少渐近偏差来改进直方图密度估计器*。这是预期的：在计算 *x* 的点密度时，核函数平滑地改变 *x* 的邻近点的权重，而不是将均匀密度分配给域中的任意固定区间。换句话说，与直方图方法相比，KDE
    对密度估计施加的结构更为灵活。
- en: For histograms and KDEs, we’ve seen that the bandwidth *h* can have a significant
    impact on the accuracy of the density estimate. Ideally, we would select the *h*
    such that the mean squared error of the density estimator is minimized. However,
    it turns out that this theoretically optimal *h* depends on the curvature of the
    true density *p(⋅)*, which is unknown practice (otherwise we wouldn’t need density
    estimation)!
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 对于直方图和核密度估计（KDE），我们已经看到带宽 *h* 对密度估计的准确性有显著影响。理想情况下，我们会选择 *h* 使得密度估计器的均方误差最小化。然而，实际上，这个理论上最优的
    *h* 取决于真实密度 *p(⋅)* 的曲率，这在实践中是未知的（否则我们就不需要密度估计了）！
- en: 'Some popular approaches for bandwidth selection include:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 一些流行的带宽选择方法包括：
- en: 'Assuming the true density resembles some reference distribution *p[0]*(⋅) (ex:
    Gaussian), then plugging in the curvature of *p[0]*(⋅) to derive the bandwidth.
    [This approach](https://en.wikipedia.org/wiki/Kernel_density_estimation#A_rule-of-thumb_bandwidth_estimator)
    is simple, but it assumes the distribution of the data, so it may be a poor choice
    if you’re looking to build density estimates to *explore* your data.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 假设真实密度类似于某个参考分布 *p[0]*(⋅)（例如高斯分布），然后通过将 *p[0]*(⋅) 的曲率代入来推导带宽。[这种方法](https://en.wikipedia.org/wiki/Kernel_density_estimation#A_rule_of-thumb_bandwidth_estimator)很简单，但它假设了数据的分布，因此如果你想要构建密度估计来
    *探索* 数据，这可能是一个较差的选择。
- en: Non-parametric approaches to bandwidth selection, such as cross-validation and
    plug-in methods. The [unbiased cross-validation](https://academic.oup.com/biomet/article-abstract/71/2/353/233423?redirectedFrom=fulltext&login=false)
    and [Sheather-Jones](https://academic.oup.com/jrsssb/article/53/3/683/7028194?login=false)
    methods are popular bandwidth selectors and typically produce fairly accurate
    density estimates.
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 非参数带宽选择方法，例如交叉验证和插值方法。[无偏交叉验证](https://academic.oup.com/biomet/article-abstract/71/2/353/233423?redirectedFrom=fulltext&login=false)和[Sheather-Jones](https://academic.oup.com/jrsssb/article/53/3/683/7028194?login=false)方法是流行的带宽选择器，通常能产生相当准确的密度估计。
- en: For more information on the impact of bandwidth selection on the KDE, check
    out this [blog post](https://aakinshin.net/posts/kde-bw/).
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 更多关于带宽选择对KDE影响的信息，请查看这篇[博客文章](https://aakinshin.net/posts/kde-bw/)。
- en: '[PRE5]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/c43012ee5b9cb823db0096a16c8b3cd5.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c43012ee5b9cb823db0096a16c8b3cd5.png)'
- en: KDEs using various bandwidth selection methods where the underlying data follows
    a bimodal distribution. Notice the KDEs using the Sheather-Jones and Unbiased
    Cross-Validation methods produce density estimates closest to the true density.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 使用各种带宽选择方法的核密度估计（KDEs），其中基础数据遵循双峰分布。注意使用Sheather-Jones和无偏交叉验证方法的KDEs产生的密度估计最接近真实密度。
- en: '* * *'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Density Estimation for Classification
  id: totrans-168
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用于分类的密度估计
- en: We’ve discussed a great deal about the underlying theory of histograms and KDE,
    and we’ve demonstrated how they perform at modeling the true density of some sample
    data. Now, we’ll look at how we can apply what we learned about density estimation
    for a simple classification task.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经讨论了很多关于直方图和KDE的底层理论，并展示了它们在建模某些样本数据的真实密度方面的表现。现在，我们将探讨如何将我们关于密度估计的知识应用于简单的分类任务。
- en: For instance, say we want to build a classifier from a sample of *n* observations
    (*x*[1], *y[1]*),…, (**x*[n], *y**[n]), where each *x[i]* comes from a *p*-dimensional
    feature space, *X*, and *y*[i] corresponds to the target labels drawn from *Y*
    = {1,…, *m*}.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设我们想要从一个包含*n*个观察值(*x*[1], *y[1]*),…, (**x*[n], *y**[n])的样本中构建一个分类器，其中每个*x[i]*来自*p*-维特征空间*X*，而*y*[i]对应于从*Y*
    = {1,…, *m*}中抽取的目标标签。
- en: Intuitively, we want to build a classifier such that for each observation, our
    classifier assigns it the class label *k* such that the following is satisfied.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 直观地，我们想要构建一个分类器，使得对于每个观察值，我们的分类器将其分配给类别标签*k*，以满足以下条件。
- en: '![](../Images/a47a44ca2b59f5f04fb852950b117618.png)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a47a44ca2b59f5f04fb852950b117618.png)'
- en: The [Bayes classifier](https://en.wikipedia.org/wiki/Bayes_classifier) does
    precisely that, and computes the conditional probability above using the following
    equation.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '[贝叶斯分类器](https://en.wikipedia.org/wiki/Bayes_classifier)正是如此，并使用以下方程计算上述条件概率。'
- en: '![](../Images/e78b2c97fba5b09be10eb05a06cce31a.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e78b2c97fba5b09be10eb05a06cce31a.png)'
- en: The Bayes Classifier
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 贝叶斯分类器
- en: 'This classifier relies on the following:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 这个分类器依赖于以下：
- en: 'π[k] = P(*Y* = *k*): the prior probability that an observation (*x*[i], *y[i]*)
    belongs to the *k*th class (i.e. *y[i]* = *k*). This can be estimated by simply
    counting the proportion of points in each class from our sample data.'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'π[k] = P(*Y* = *k*): 观察值(*x*[i], *y[i]*)属于第*k*类（即*y[i]* = *k*）的先验概率。这可以通过简单地从我们的样本数据中计算每个类别的点比例来估计。'
- en: '*f[k]*(*x*) ≡ P(*X* = *x* | *Y* = *k*): the *p*-dimensional density function
    of *X* for all observations in target class *k*. This is harder to estimate: for
    each of the *m* target classes, we must determine the shape of the distribution
    for each dimension of *X*, and also whether there are any associations between
    the different dimensions.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*f[k]*(*x*) ≡ P(*X* = *x* | *Y* = *k*): 对于目标类别*k*中所有观察到的*X*的*p*-维密度函数。这更难估计：对于每个*m*个目标类别，我们必须确定*X*每个维度的分布形状，以及是否存在不同维度之间的关联。'
- en: The Bayes classifier is *optimal* if the quantities above can be computed precisely.
    However, this is impossible to achieve in practice when working with a finite
    sample of data. For more detail behind why the Bayes classifier is optimal, check
    out [this site](https://mlweb.loria.fr/book/en/bayesclassifier.html).
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 如果上述量可以精确计算，贝叶斯分类器是*最优*的。然而，在实际操作中，当处理有限样本数据时，这是不可能实现的。更多关于为什么贝叶斯分类器是最优的细节，请查看[这个网站](https://mlweb.loria.fr/book/en/bayesclassifier.html)。
- en: '***So the question becomes, how can we approximate the Bayes classifier?***'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: '***因此，问题变成了，我们如何近似贝叶斯分类器？***'
- en: One popular method is the [Naive Bayes classifier](https://en.wikipedia.org/wiki/Naive_Bayes_classifier).
    Naive Bayes assumes class-conditional independence, which means that for each
    target class, it reduces the *p*-dimensional density estimation problem into *p*
    separate univariate density estimation tasks. These univariate densities may be
    estimated parametrically or non-parametrically. A typical parametric approach
    would assume that each dimension of *X* follows a univariate Gaussian distribution
    with class-specific mean and a diagonal co-variance matrix, whereas a non-parametric
    approach may model each dimension of *X* using a histogram or KDE.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 一种流行的方法是[朴素贝叶斯分类器](https://en.wikipedia.org/wiki/Naive_Bayes_classifier)。朴素贝叶斯假设类条件独立性，这意味着对于每个目标类别，它将*p*-维密度估计问题简化为*p*个单独的单变量密度估计任务。这些单变量密度可以参数化或非参数化估计。一种典型的参数化方法会假设*X*的每个维度都遵循具有类别特定均值和对角协方差矩阵的单变量高斯分布，而一种非参数方法可能使用直方图或KDE来模拟*X*的每个维度。
- en: The parametric approach to univariate density estimation in Naive Bayes may
    be useful when we have a small amount of data relative to the size of the feature
    space, as the bias introduced by the Gaussian assumption may help reduce the variance
    of the classifier. However, the Gaussian assumption may not always be appropriate
    depending on the distribution of data that you’re working with.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们相对于特征空间的大小只有少量数据时，朴素贝叶斯中单变量密度估计的参数化方法可能是有用的，因为高斯假设引入的偏差可能有助于减少分类器的方差。然而，高斯假设可能并不总是适用于你所处理的数据分布。
- en: 'Let’s examine how parametric vs. non-parametric density estimates can impact
    the decision boundary of the Naive Bayes classifier. We’ll build two classifiers
    on the [Iris dataset](https://archive.ics.uci.edu/dataset/53/iris): one of them
    will assume each feature follows a Gaussian distribution, and the other will build
    kernel density estimates for each feature.'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考察参数化与非参数密度估计如何影响朴素贝叶斯分类器的决策边界。我们将在[Iris数据集](https://archive.ics.uci.edu/dataset/53/iris)上构建两个分类器：其中一个将假设每个特征遵循高斯分布，另一个将为每个特征构建核密度估计。
- en: '[PRE6]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/896834b0502fee3c3676009cfbd5ef07.png)'
  id: totrans-185
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/896834b0502fee3c3676009cfbd5ef07.png)'
- en: Decision boundaries produced by the parametric Naive Bayes classifier.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 参数化朴素贝叶斯分类器产生的决策边界。
- en: '![](../Images/887efaa79c684e60fd5e912c0f3af931.png)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/887efaa79c684e60fd5e912c0f3af931.png)'
- en: Decision boundaries produced by the non-parametric Naive Bayes classifier. Notice
    the rough decision boundaries relative to that of its parametric counterpart.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 非参数朴素贝叶斯分类器产生的决策边界。注意相对于其参数化对应物的粗糙决策边界。
- en: '[PRE7]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/ca0d50d935557ab25c7f27bb6d02e839.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ca0d50d935557ab25c7f27bb6d02e839.png)'
- en: Classification performance for both Naive Bayes models. Non-parametric Naive
    Bayes achieved slightly better performance on our data.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 两种朴素贝叶斯模型的分类性能。非参数朴素贝叶斯在我们的数据上实现了略好的性能。
- en: We see that the non-parametric Naive Bayes classifier achieves slightly better
    accuracy than its parametric counterpart. This is because the non-parametric density
    estimates produce a classifier with a more flexible decision boundary. As a result,
    several of the “virginica” observations that were incorrectly classified as “versicolor”
    by the parametric classifier ended up being classified correctly by the non-parametric
    model.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到，非参数朴素贝叶斯分类器比其参数化对应物略好。这是因为非参数密度估计产生了一个具有更灵活决策边界的分类器。结果，一些被参数化分类器错误地分类为“versicolor”的“virginica”观测值最终被非参数模型正确分类。
- en: That being said, the decision boundaries produced by non-parametric Naive Bayes
    appear to be rough and disconnected. Thus, there are some regions of the feature
    space where the classification boundary may be questionable, and fail to generalize
    well to new data. In contrast, the parametric Naive Bayes classifier produces
    smooth, connected decision boundaries that appear to accurately capture the general
    pattern of the feature distributions for each species.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，非参数朴素贝叶斯产生的决策边界看起来是粗糙且不连续的。因此，特征空间中的一些区域，分类边界可能存在疑问，并且无法很好地推广到新数据。相比之下，参数化朴素贝叶斯分类器产生的决策边界平滑且连续，似乎准确地捕捉了每个物种的特征分布的一般模式。
- en: This distinction brings up an important point that “more flexible density estimation”
    does not equate to “better density estimation”, especially when applied to classification.
    After all, there’s a reason why Naive Bayes classification is popular. Although
    making less assumptions about the distribution of your data may seem desirable
    to produce unbiased density estimates, simplifying assumptions may be effective
    when there is insufficient empirical data to produce high quality estimates, or
    if the parametric assumptions are believed to be mostly accurate. In the latter
    case, parametric estimation will introduce little to no bias to the estimator,
    whereas non-parametric approaches may introduce large amounts of variance.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 这种区分提出了一个重要观点：“更灵活的密度估计”并不等同于“更好的密度估计”，尤其是在应用于分类时。毕竟，朴素贝叶斯分类之所以受欢迎，是有原因的。尽管对数据分布的假设较少可能看起来是产生无偏密度估计的愿望，但在缺乏足够经验数据以产生高质量估计，或者如果认为参数假设大部分是准确的情况下，简化假设可能是有效的。在后一种情况下，参数估计将对估计者引入很少或没有偏差，而非参数方法可能会引入大量的方差。
- en: Indeed, looking at the feature distributions below, the Gaussian assumption
    of parametric Naive Bayes doesn’t seem inappropriate. For the most part, it appears
    the class distributions for petal and sepal length appear to be unimodal and symmetric.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 的确，从下面的特征分布来看，参数朴素贝叶斯的正态分布假设似乎并不不合适。大部分情况下，类分布对于花瓣和花瓣长度似乎都是单峰且对称的。
- en: '[PRE8]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/2280eef2d93fd530af613b3744fec772.png)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2280eef2d93fd530af613b3744fec772.png)'
- en: Density distributions for Petal and Sepal length. The univariate densities appear
    to be unimodal and symmetric across all species for both features.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 花瓣和花瓣长度的密度分布。对于这两个特征，所有物种的单变量密度似乎都是单峰且对称的。
- en: '* * *'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Wrap-up
  id: totrans-200
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: Thanks for reading! We dove into the theory behind the histogram and kernel
    density estimators and how to apply them in context..
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！我们深入探讨了直方图和核密度估计的理论以及如何在特定情境下应用它们。
- en: 'Let’s briefly summarize what we discussed:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要总结一下我们讨论的内容：
- en: Density estimation is a fundamental tool in statistical analysis for analyzing
    the distribution of a variable or as an intermediate tool for deeper statistical
    analysis. Density estimation approaches may be broadly categorized as parametric
    or non-parametric.
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 密度估计是统计分析中的基本工具，用于分析变量的分布，或作为更深入统计分析的中间工具。密度估计方法可以广泛分为参数估计和非参数估计。
- en: Histograms and KDEs are two popular approaches for non-parametric density estimation.
    Histograms produce density estimates by computing the normalized frequency of
    points within each distinct bin of the data. KDEs are “smoothed” histograms that
    estimate the density at a given point by computing a weighted sum of its surrounding
    points, where neighbors are weighted in proportion to their distance.
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直方图和核密度估计是非参数密度估计的两种流行方法。直方图通过计算数据中每个不同数据箱内点的归一化频率来产生密度估计。核密度估计是“平滑”的直方图，通过计算其周围点的加权总和来估计给定点的密度，其中邻居的权重与其距离成比例。
- en: Non-parametric density estimation can be applied to classification algorithms
    that require modeling the feature densities for each target class (Bayesian classification).
    Classifiers built using non-parametric density estimates may be able to define
    more flexible decision boundaries at the cost of higher variance.
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 非参数密度估计可以应用于需要为每个目标类别建模特征密度的分类算法（贝叶斯分类）。使用非参数密度估计构建的分类器可能能够定义更灵活的决策边界，但代价是更高的方差。
- en: Check out the sources below if you’re interested in learning more!
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对了解更多信息感兴趣，请查看以下来源！
