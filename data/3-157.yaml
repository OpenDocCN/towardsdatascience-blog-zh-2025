- en: 'Google’s Data Science Agent: Can It Really Do Your Job?'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Google 的数据科学代理：它真的能做你的工作吗？
- en: 原文：[https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/](https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/](https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/)
- en: On March 3rd, Google officially rolled out its [Data Science Agent](https://developers.googleblog.com/en/data-science-agent-in-colab-with-gemini/)
    to most Colab users for free. This is not something brand new — it was [first
    announced in December](https://developers.googleblog.com/en/the-next-chapter-of-the-gemini-era-for-developers/)
    last year, but it is now integrated into Colab and made widely accessible.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 3月3日，Google 正式将其 [数据科学代理](https://developers.googleblog.com/en/data-science-agent-in-colab-with-gemini/)
    免费推出给大多数 Colab 用户。这不是什么新鲜事 — 它去年 [首次宣布](https://developers.googleblog.com/en/the-next-chapter-of-the-gemini-era-for-developers/)，但现在已集成到
    Colab 中，并使其广泛可用。
- en: 'Google says it is “The future of data analysis with Gemini”, stating: “*Simply
    describe your analysis goals in plain language, and watch your notebook take shape
    automatically, helping accelerate your ability to conduct research and data analysis.*”
    **But is it a real game-changer in data science? What can it actually do, and
    what can’t it do? Is it ready to replace data analysts and data scientists? And
    what does it tell us about the future of data science careers?**'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: Google 表示它是“Gemini 的数据分析未来”，并表示：“*只需用普通语言描述你的分析目标，然后观察你的笔记本自动成形，这将帮助你加速研究和数据分析的能力。*”
    **但是，它真的是数据科学领域的真正变革者吗？它实际上能做什么，不能做什么？它准备好取代数据分析师和数据科学家了吗？它对我们关于数据科学职业的未来有何启示？**
- en: In this article, I will explore these questions with real-world examples.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将通过实际案例来探讨这些问题。
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**What It Can Do**'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**它能做什么**'
- en: 'The Data Science Agent is straightforward to use:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学代理使用简单：
- en: Open a [new notebook in Google Colab](https://colab.research.google.com/) —
    you just need a Google Account and can use Google Colab for free;
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Google Colab 中打开 [一个新的笔记本](https://colab.research.google.com/) — 你只需要一个谷歌账户，就可以免费使用
    Google Colab；
- en: Click “Analyze files with Gemini” — this will open the Gemini chat window on
    the right;
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“使用 Gemini 分析文件” — 这将在右侧打开 Gemini 聊天窗口；
- en: Upload your data file and describe your goal in the chat. The agent will generate
    a series of tasks accordingly;
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上传你的数据文件，并在聊天中描述你的目标。代理将相应地生成一系列任务。
- en: Click “Execute Plan”, and Gemini will start to write the Jupyter Notebook automatically.
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“执行计划”，Gemini 将自动开始编写 Jupyter Notebook；
- en: '![](../Images/d29e7cce1a36e94a26b5e6eb1f0adc58.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d29e7cce1a36e94a26b5e6eb1f0adc58.png)'
- en: Data Science Agent UI (image by author)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学代理用户界面（图片由作者提供）
- en: Let’s look at a real example. Here, I used the dataset from the [Regression
    with an Insurance Dataset](https://www.kaggle.com/competitions/playground-series-s4e12/overview)
    Kaggle Playground Prediction Competition ([Apache 2.0](https://www.apache.org/licenses/LICENSE-2.0)
    license). This dataset has 20 features, and the goal is to predict the insurance
    premium amount. It has both continuous and categorical variables with scenarios
    like missing values and outliers. Therefore, it is a good example dataset for
    machine learning practices.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一个真实的例子。在这里，我使用了来自 [Regression with an Insurance Dataset](https://www.kaggle.com/competitions/playground-series-s4e12/overview)
    Kaggle Playground Prediction Competition ([Apache 2.0](https://www.apache.org/licenses/LICENSE-2.0)
    license) 的数据集。这个数据集有20个特征，目标是预测保险费金额。它包含连续和分类变量，有缺失值和异常值等场景。因此，它是一个很好的机器学习实践数据集。
- en: '![](../Images/e691cee2b6b463eee54d70a06841ccdd.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e691cee2b6b463eee54d70a06841ccdd.png)'
- en: Jupyter Notebook generated by the Data Science Agent (image by author)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 由数据科学代理生成的 Jupyter Notebook（图片由作者提供）
- en: 'After running my experiment, here are the highlights I’ve observed from the
    Data Science Agent’s performance:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行我的实验后，以下是我在数据科学代理性能方面观察到的亮点：
- en: '**Customizable execution plan**: Based on my prompt of “C*an you help me analyze
    how the factors impact insurance premium amount?* “, the Data Science Agent first
    came up with a series of 10 tasks, including *data loading, data exploration,
    data cleaning, data wrangling, feature engineering, data splitting, model training,
    model optimization, model evaluation,* and *data visualization*. This is a pretty
    standard and reasonable process of conducting exploratory data analysis and building
    a machine learning model. It then asked for my confirmation and feedback before
    executing the plan. I tried to ask it to focus on Exploratory Data Analysis first,
    and it was able to adjust the execution plan accordingly. This provides flexibility
    to customize the plan based on your needs.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可定制执行计划**：基于我的提示“C*你能帮我分析一下哪些因素会影响保险费率吗？*”，数据科学代理首先提出了一系列10个任务，包括*数据加载、数据探索、数据清洗、数据整理、特征工程、数据拆分、模型训练、模型优化、模型评估*和*数据可视化*。这是一个相当标准且合理的探索性数据分析以及构建机器学习模型的过程。然后它请求我确认和反馈，在执行计划之前。我尝试让它首先专注于探索性数据分析，并且它能够相应地调整执行计划。这为根据您的需求定制计划提供了灵活性。'
- en: '![](../Images/18f31436fa0a39ca8d11b90b0862f882.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/18f31436fa0a39ca8d11b90b0862f882.png)'
- en: Initial tasks the agent generated (image by author)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 代理生成的初始任务（图片由作者提供）
- en: '![](../Images/1693ff0b8bb790a7765362940a384792.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1693ff0b8bb790a7765362940a384792.png)'
- en: Plan adjustment based on feedback (image by author)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 根据反馈进行的计划调整（图片由作者提供）
- en: '**End-to-end execution and autocorrection**: After confirming the plan, the
    Data Science Agent was able to execute the plan end-to-end autonomously. Whenever
    it encountered errors while running Python code, it diagnosed what was wrong and
    attempted to correct the error by itself. For example, at the model training step,
    it first ran into a `DTypePromotionError` error because of including a datetime
    column in training. It decided to drop the column in the next try but then got
    the error message `ValueError: Input X contains NaN`. In its third attempt, it
    added a simpleImputer to impute all missing values with the mean of each column
    and eventually got the step to work.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**端到端执行和自动纠正**：在确认计划后，数据科学代理能够自主地执行整个计划。每当它在运行Python代码时遇到错误，它会诊断出问题，并尝试自行纠正错误。例如，在模型训练步骤中，它首先遇到了由于包含训练中的日期时间列而导致的`DTypePromotionError`错误。它决定在下次尝试中删除该列，但随后收到了错误信息`ValueError:
    Input X contains NaN`。在其第三次尝试中，它添加了一个简单的简单Imputer来用每列的平均值填充所有缺失值，并最终使该步骤得以工作。'
- en: '![](../Images/ac82502cf7dbe0ae136d5e0ec767a91f.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ac82502cf7dbe0ae136d5e0ec767a91f.png)'
- en: The agent ran into an error and auto-corrected it (image by author)
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 代理遇到了错误并自动纠正了它（图片由作者提供）
- en: '**Interactive and iterative notebook**: Since the Data Science Agent is built
    into Google Colab, it populates a Jupyter Notebook as it executes. This comes
    with several advantages:'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交互式和迭代笔记本**：由于数据科学代理集成在Google Colab中，它在执行时会填充一个Jupyter笔记本。这带来了几个优点：'
- en: '**Real-time visibility**: Firstly, you can actually watch the Python code running
    in real time, including the error messages and warnings. The dataset I provided
    was a bit large — even though I only kept the first 50k rows of the dataset for
    the sake of a quick test — and it took about 20 minutes to finish the model optimization
    step in the Jupyter notebook. The notebook kept running without timeout and I
    received a notification once it finished.'
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时可见性**：首先，您实际上可以实时观看Python代码的运行情况，包括错误信息和警告。我提供的数据库有点大——尽管为了快速测试，我只保留了数据集的前50k行——在Jupyter笔记本中完成模型优化步骤花费了大约20分钟。笔记本持续运行，没有超时，并且在我完成时收到了通知。'
- en: '**Editable code**: Secondly, you can edit the code on top of what the agent
    has built for you. This is something clearly better than the official [Data Analyst
    GPT](https://chatgpt.com/g/g-HMNcP6w7d-data-analyst) in ChatGPT, which also runs
    the code and shows the result, but you have to copy and paste the code elsewhere
    to make manual iterations.'
  id: totrans-28
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可编辑的代码**：其次，您可以在代理为您构建的代码之上进行编辑。这比ChatGPT中的官方[数据分析GPT](https://chatgpt.com/g/g-HMNcP6w7d-data-analyst)要好得多，后者也运行代码并显示结果，但您必须将代码复制粘贴到其他地方进行手动迭代。'
- en: '**Seamless collaboration**: Lastly, having a Jupyter Notebook makes it very
    easy to share your work with others — now you can collaborate with both AI and
    your teammates in the same environment. The agent also drafted step-by-step explanations
    and key findings, making it much more presentation-friendly.'
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无缝协作**：最后，拥有 Jupyter Notebook 使得与他人共享你的工作变得非常容易——现在你可以在同一个环境中与 AI 和你的团队成员协作。代理还草拟了逐步解释和关键发现，使得它更适合演示。'
- en: '![](../Images/36ca5052784e6709d67c439915f2a2a8.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/36ca5052784e6709d67c439915f2a2a8.png)'
- en: Summary section generated by the Agent (image by author)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 代理生成的摘要部分（图片由作者提供）
- en: '* * *'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**What It Cannot Do**'
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**它做不到的事情**'
- en: We’ve talked about its advantages; now, let’s discuss some missing pieces I’ve
    noticed for the Data Science Agent to be a real autonomous data scientist.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经讨论了它的优点；现在，让我们讨论一些我注意到的数据科学代理要成为真正的自主数据科学家所缺少的部分。
- en: '**It does not modify the Notebook based on follow-up prompts**. I mentioned
    that the Jupyter Notebook environment makes it easy to iterate. In this example,
    after its initial execution, I noticed the Feature Importance charts did not have
    the feature labels. Therefore, I asked the Agent to add the labels. I assumed
    it would update the Python code directly or at least add a new cell with the refined
    code. However, it merely provided me with the revised code in the chat window,
    leaving the actual notebook update work to me. Similarly, when I asked it to add
    a new section with recommendations for lowering the insurance premium costs, it
    added a markdown response with its recommendation in the chatbot 🙁 Although copy-pasting
    the code or text isn’t a big deal for me, I still feel disappointed – **once the
    notebook is generated in its first pass, all further interactions stay in the
    chat, just like ChatGPT.**'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它不会根据后续提示修改笔记本**。我提到过 Jupyter Notebook 环境使得迭代变得容易。在这个例子中，在它初次执行之后，我发现特征重要性图表没有特征标签。因此，我要求代理添加标签。我假设它会直接更新
    Python 代码，或者至少添加一个新的单元格包含改进后的代码。然而，它仅仅在聊天窗口中提供了修改后的代码，实际上的笔记本更新工作留给了我。同样地，当我要求它添加一个包含降低保险费成本建议的新部分时，它只是在聊天机器人中添加了一个带有建议的
    Markdown 响应 🙁 虽然对我而言复制粘贴代码或文本不是什么大问题，但我仍然感到失望——**一旦笔记本在第一次运行中生成，所有后续的交互都保持在聊天中，就像
    ChatGPT 一样**。'
- en: '![](../Images/8573470a2c6af2be033573673039c07c.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8573470a2c6af2be033573673039c07c.png)'
- en: My follow-up on updating the feature importance chart (image by author)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我对更新特征重要性图表的后续跟进（图片由作者提供）
- en: '![](../Images/d51f42474c6c5dc98922eae15ebe66b9.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d51f42474c6c5dc98922eae15ebe66b9.png)'
- en: My follow-up on adding recommendations (image by author)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我对添加建议的后续跟进（图片由作者提供）
- en: '**It does not always choose the best data science approach**. For this regression
    problem, it followed a reasonable workflow – data cleaning (handling missing values
    and outliers), data wrangling (one-hot encoding and log transformation), feature
    engineering (adding interaction features and other new features), and training
    and optimizing three models (Linear Regression, Random Forest, and Gradient Boosting
    Trees). However, when I looked into the details, I realized not all of its operations
    were necessarily the best practices. For example, it imputed missing values using
    the mean, which might not be a good idea for very skewed data and could impact
    correlations and relationships between variables. Also, we usually test many different
    feature engineering ideas and see how they impact the model’s performance. **Therefore,
    while it sets up a solid foundation and framework, an experienced data scientist
    is still needed to refine the analysis and modeling.**'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它并不总是选择最佳的数据科学方法**。对于这个回归问题，它遵循了一个合理的流程——数据清洗（处理缺失值和异常值）、数据整理（独热编码和对数转换）、特征工程（添加交互特征和其他新特征），以及训练和优化三个模型（线性回归、随机森林和梯度提升树）。然而，当我深入了解细节时，我意识到它的所有操作并不一定是最佳实践。例如，它使用均值来填充缺失值，这可能不适合非常倾斜的数据，并可能影响变量之间的相关性和关系。此外，我们通常测试许多不同的特征工程想法，看看它们如何影响模型的表现。**因此，尽管它建立了一个坚实的基础和框架，但仍然需要一个经验丰富的数据科学家来细化分析和建模**。'
- en: 'These are the two main limitations regarding the Data Science Agent’s performance
    in this experiment. But if we think about the whole data project pipeline and
    workflow, there are broader challenges in applying this tool to real-world projects:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是关于数据科学代理在这个实验中表现的两个主要限制。但如果考虑整个数据项目管道和工作流程，将这个工具应用于现实世界项目还存在更广泛的挑战：
- en: '**What is the goal of the project?** This dataset is provided by Kaggle for
    a playground competition. Therefore, the project goal is well-defined. However,
    a data project at work could be pretty ambiguous. We often need to talk to many
    stakeholders to understand the business goal, and have many back and forth to
    make sure we stay on the right track. This is not something the Data Science Agent
    can handle for you. It requires a clear goal to generate its list of tasks. In
    other words, if you give it an incorrect problem statement, the output will be
    useless.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**项目的目标是什么？** 这个数据集是由Kaggle提供的用于游乐场比赛的。因此，项目目标是明确的。然而，工作中的数据项目可能相当模糊。我们经常需要与许多利益相关者交谈，以了解业务目标，并进行多次往返以确保我们保持在正确的轨道上。这不是数据科学代理能为你处理的事情。它需要一个明确的目标来生成其任务列表。换句话说，如果你给它一个错误的问题陈述，输出将是无用的。'
- en: '**How do we get the clean dataset with documentation?** Our example dataset
    is relatively clean, with basic documentation. However, this usually does not
    happen in the industry. Every data scientist or data analyst has probably experienced
    the pain of talking to multiple people just to find one data point, solving the
    myth of some random columns with confusing names and putting together thousands
    of lines of SQL to prepare the dataset for analysis and modeling. This sometimes
    takes 50% of the actual work time. In that case, the Data Science Agent can only
    help with the start of the other 50% of the work (so maybe 10 to 20%).'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如何获取带有文档的干净数据集？** 我们的示例数据集相对干净，带有基本的文档。然而，这种情况在业界通常并不常见。每个数据科学家或数据分析师可能都经历过与多个人交谈，只是为了找到一个数据点的痛苦，解决一些随机列的神秘名称的迷思，以及编写数千行SQL来准备分析建模的数据集。这有时会占用实际工作时间的50%。在这种情况下，数据科学代理只能帮助开始其他50%的工作（所以可能是10%到20%）。'
- en: '* * *'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Who Are the Target Users**'
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**目标用户是谁**'
- en: 'With the pros and cons in mind, who are the target users of the Data Science
    Agent? Or who will benefit the most from this new AI tool? Here are my thoughts:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到优缺点，数据科学代理的目标用户是谁？或者谁将从这个新的AI工具中获得最大的好处？以下是我的想法：
- en: '**Aspiring data scientists**. Data Science is still a hot space with lots of
    beginners starting every day. Given that the agent “understands” the standard
    process and basic concepts well, it can provide invaluable guidance to those just
    getting started, setting up a great framework and explaining the techniques with
    working code. For example, many people tend to learn from participating in Kaggle
    competitions. Just like what I did here, they can ask the Data Science Agent to
    generate an initial notebook, then dig into each step to understand why the agent
    does certain things and what can be improved.'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**有志于成为数据科学家的人**。 数据科学仍然是一个热门领域，每天都有很多新手开始。鉴于代理“理解”标准流程和基本概念良好，它可以向那些刚开始的人提供无价的指导，建立良好的框架，并使用工作代码解释技术。例如，许多人倾向于通过参加Kaggle比赛来学习。就像我在这里做的那样，他们可以要求数据科学代理生成一个初始笔记本，然后深入到每个步骤，了解代理为什么做某些事情，以及可以改进的地方。'
- en: '**People with clear data questions but limited coding skills**. The key requirements
    here are 1\. the problem is clearly defined and 2\. the data task is standard
    (not as complicated as optimizing a predictive model with 20 columns).. Let me
    give you some scenarios:'
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**有明确数据问题但编码技能有限的人**。 这里的关键要求是1. 问题定义明确，2. 数据任务是标准的（不像优化20列预测模型那样复杂）。让我给你一些场景：'
- en: 'Many **researchers** need to run analyses on the datasets they collected. They
    usually have a data question clearly defined, which makes it easier for the Data
    Science Agent to assist. Moreover, researchers usually have a good understanding
    of the basic statistical methods but might not be as proficient in coding. So
    the Agent can save them the time of writing code, meanwhile, the researchers can
    judge the correctness of the methods AI used. This is the same use case Google
    mentioned when it [first introduced the Data Science Agent](https://developers.googleblog.com/en/the-next-chapter-of-the-gemini-era-for-developers/):
    “*For example, with the help of Data Science Agent, a scientist at Lawrence Berkeley
    National Laboratory working on a global tropical wetland methane emissions project
    has estimated their analysis and processing time was reduced from one week to
    five minutes.*”'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 许多**研究人员**需要在他们收集的数据集上运行分析。他们通常有一个明确定义的数据问题，这使得数据科学代理更容易提供帮助。此外，研究人员通常对基本的统计方法有很好的理解，但可能在编码方面不太熟练。因此，代理可以为他们节省编写代码的时间，同时，研究人员可以判断AI使用的方法的正确性。这也是谷歌在[首次介绍数据科学代理](https://developers.googleblog.com/en/the-next-chapter-of-the-gemini-era-for-developers/)时提到的相同用例：“例如，借助数据科学代理，劳伦斯伯克利国家实验室的一位科学家在从事全球热带湿地甲烷排放项目时，估计他们的分析和处理时间从一周减少到了五分钟。”
- en: '**Product managers** often need to do some basic analysis themselves — they
    have to make data-driven decisions. They know their questions well (and often
    the potential answers), and they can pull some data from internal BI tools or
    with the help of engineers. For example, they might want to examine the correlation
    between two metrics or understand the trend of a time series. In that case, the
    Data Science Agent can help them conduct the analysis with the problem context
    and data they provided.'
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品经理**通常需要自己进行一些基本分析——他们必须做出数据驱动的决策。他们对问题非常了解（以及通常的潜在答案），并且可以从内部BI工具或工程师的帮助中获取一些数据。例如，他们可能想要检查两个指标之间的相关性或了解时间序列的趋势。在这种情况下，数据科学代理可以帮助他们根据他们提供的问题背景和数据进行分析。'
- en: '* * *'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Can It Replace Data Analysts and Data Scientists Yet?**'
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**它能否取代数据分析师和数据科学家？**'
- en: 'We finally come to the question that every data scientist or analyst cares
    about the most: Is it ready to replace us yet?'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最终来到了每个数据科学家或分析师最关心的问题：它是否准备好取代我们了？
- en: '**The short answer is “No”**. There are still major blockers for the Data Science
    Agent to be a real data scientist — it is missing the capabilities of modifying
    the Jupyter Notebook based on follow-up questions, it still requires someone with
    solid data science knowledge to audit the methods and make manual iterations,
    and it needs a clear data problem statement with clean and well-documented datasets.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**简短的答案是“不能”**。数据科学代理要成为真正的数据科学家仍然存在一些主要障碍——它缺少根据后续问题修改Jupyter Notebook的能力，它仍然需要具备扎实数据科学知识的人来审计方法并进行手动迭代，并且需要一个明确的数据问题陈述以及干净且文档齐全的数据集。'
- en: 'However, AI is a fast-evolving space with significant improvements constantly.
    Just looking at where it came from and where it stands now, here are some very
    important lessons for data professionals to stay competitive:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，AI是一个快速发展的领域，持续有显著的改进。仅从它的发展历程和现状来看，对于数据专业人士来说，以下是一些非常重要的经验教训，以保持竞争力：
- en: '**AI is a tool that greatly improves productivity.** Instead of worrying about
    being replaced by AI, it is better to embrace the benefits it brings and learn
    how it can improve your work efficiency. Don’t feel guilty if you use it to write
    basic code — no one remembers all the numpy and pandas syntax and scikit-learn
    models 🙂 Coding is a tool to complete complex statistical analysis quickly, and
    AI is a new tool to save you even more time.'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**AI是一种极大地提高生产力的工具**。与其担心被AI取代，不如拥抱它带来的好处，并学习它如何提高你的工作效率。如果你用它来编写基本代码，不要感到内疚——没有人记得所有的numpy和pandas语法以及scikit-learn模型哦
    :) 编码是一种快速完成复杂统计分析的工具，而AI是节省你更多时间的全新工具。'
- en: '**If your work is mostly repetitive tasks, then you are at risk**. It is very
    clear that these AI agents are getting better and better at automating standard
    and basic data tasks. If your job today is mostly making basic visualizations,
    building standard dashboards, or doing simple regression analysis, then the day
    of AI automating your job might come sooner than you expected.'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**如果你的工作主要是重复性任务，那么你将面临风险**。很明显，这些AI代理在自动化标准和基本数据任务方面变得越来越擅长。如果你的工作主要是制作基本可视化、构建标准仪表板或进行简单的回归分析，那么AI自动化你的工作的日子可能会比你预期的来得更早。'
- en: '**Being a domain expert and a good communicator will set you apart**. To make
    the AI tools work, you need to understand your domain well and be able to communicate
    and translate the business knowledge and problems to both your stakeholders and
    the AI tools. When it comes to machine learning, we always say “Garbage in, garbage
    out”. It is the same for an AI-assisted data project.'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**成为一名领域专家和优秀的沟通者将使你脱颖而出**。要让AI工具发挥作用，你需要深入了解你的领域，并且能够将业务知识和问题传达给你的利益相关者和AI工具。当谈到机器学习时，我们常说“垃圾输入，垃圾输出”。对于AI辅助的数据项目来说，也是如此。'
