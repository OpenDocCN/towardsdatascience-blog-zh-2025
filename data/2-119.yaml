- en: — HANA (@hannahlynnenano) [December 21, 2018](https://twitter.com/hannahlynnenano/status/1076160692464435200?ref_src=twsrc%5Etfw)
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — HANA (@hannahlynnenano) [2018年12月21日](https://twitter.com/hannahlynnenano/status/1076160692464435200?ref_src=twsrc%5Etfw)
- en: '**Tradition**'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**传统**'
- en: Not every hotel is named to sell a location or a fantasy. Some are named out
    of pure tradition.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 并非每家酒店都是以销售位置或幻想来命名的。有些酒店的名字是出于纯粹的传统。
- en: 'Let’s go back to the name that started this whole journey: **Bristol**.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到开启这次旅程的名字：**布里斯托尔**。
- en: The first thing that I did was to map out every Hotel Bristol – just scroll
    up to see the interactive map yourself. The result? Not a single Hotel Bristol
    in the UK outside of the City of Bristol.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先绘制了每个布里斯托尔酒店的地图——只需向上滚动即可查看您自己的交互式地图。结果？在英国布里斯托尔市外的英国没有一家布里斯托尔酒店。
- en: 'The hotels are rather scattered across Europe and even as far as South America.
    So I wondered: how far are these hotels from the actual city of Bristol?'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这些酒店在欧洲乃至南美洲都很分散。所以我很好奇：这些酒店距离布里斯托尔市有多远？
- en: 'Here’s how I measured it:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是如何测量的：
- en: I calculated the distance from each hotel’s coordinates to the coordinates of
    Bristol.
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我计算了每个酒店坐标与布里斯托尔坐标之间的距离。
- en: '[PRE1]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 2\. I then plotted the distribution of those distances alongside Paris and Vienna,
    using Seaborn’s *FacetGrid* as a RidgePlot. The code (too long for this article)
    is based on Thiago Carvalho’s guide in [Plain English](https://plainenglish.io/blog/ridge-plots-with-pythons-seaborn-4de5725881af).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 我随后将那些距离与巴黎和维也纳的距离分布并排放置，使用Seaborn的*FacetGrid*作为RidgePlot。代码（太长，不适合这篇文章）基于Thiago
    Carvalho在[Plain English](https://plainenglish.io/blog/ridge-plots-with-pythons-seaborn-4de5725881af)中的指南。
- en: '![](../Images/08368f00b66ad14da3e60531e41210e3.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/08368f00b66ad14da3e60531e41210e3.png)'
- en: Distance Distribution between hotels and the city they’re named after. Image
    by Author
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 酒店与它们命名的城市之间的距离分布。图片由作者提供
- en: 'The results speak for themselves:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 结果不言而喻：
- en: '**Paris** hotels are, on average, just **22km** from the actual city, mostly
    location-driven, as we explored in the first section.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**巴黎**酒店平均距离实际城市只有**22公里**，主要是由位置驱动的，正如我们在第一部分所探讨的。'
- en: '**Vienna** hotels average **8,416km** away — a clear case of fun branding.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**维也纳**酒店平均距离**8,416公里**——这是一个明显的有趣品牌案例。'
- en: '**Bristol** hotels? They sit at an average of **1,649km** from Bristol — way
    too far for location to be the reason.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**布里斯托尔**酒店？它们平均距离布里斯托尔**1,649公里**——位置太远，不可能是原因。'
- en: So, what’s the real story here? For that, I turn to **[Roger Williams](http://thefirsthotelbristol.blogspot.com/)**,
    a journalist and author of *“High Times at the Bristol Hotel”*, a book that explores
    the fascinating origins of Bristol Hotels around the globe.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，这里真正的故事是什么呢？为此，我转向**[罗杰·威廉姆斯](http://thefirsthotelbristol.blogspot.com/)**，他是记者和《“布里斯托尔酒店的欢乐时光”》一书的作者，这本书探讨了全球布里斯托尔酒店的迷人起源。
- en: What a lovely surprise. We got a complimentary room upgrade when we checked
    into the hotel [@BristolVienna](https://twitter.com/BristolVienna?ref_src=twsrc%5Etfw)
    today… [#amex](https://twitter.com/hashtag/amex?src=hash&ref_src=twsrc%5Etfw)
    [#bristol](https://twitter.com/hashtag/bristol?src=hash&ref_src=twsrc%5Etfw) [#vienna](https://twitter.com/hashtag/vienna?src=hash&ref_src=twsrc%5Etfw)
    [pic.twitter.com/bKy3u6k7kP](https://t.co/bKy3u6k7kP)
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 真是个令人惊喜的发现。今天我们入住酒店[@BristolVienna](https://twitter.com/BristolVienna?ref_src=twsrc%5Etfw)时得到了免费的房间升级…
    [#amex](https://twitter.com/hashtag/amex?src=hash&ref_src=twsrc%5Etfw) [#bristol](https://twitter.com/hashtag/bristol?src=hash&ref_src=twsrc%5Etfw)
    [#vienna](https://twitter.com/hashtag/vienna?src=hash&ref_src=twsrc%5Etfw) [pic.twitter.com/bKy3u6k7kP](https://t.co/bKy3u6k7kP)
- en: ''
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Alexander Falk (@afalk) [June 11, 2017](https://twitter.com/afalk/status/873921208743587841?ref_src=twsrc%5Etfw)
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Alexander Falk (@afalk) [2017年6月11日](https://twitter.com/afalk/status/873921208743587841?ref_src=twsrc%5Etfw)
- en: 'Williams talks about an 18th-century English nobleman, **Lord Bristol**. He
    was known as a true connoisseur of art and travel, and his visits often elevated
    a place’s status: hotels where he stayed would even become informally known as
    “Lord Bristol’s Hotel.” This, it turns out, was how the very first Hotels Bristol
    opened across Europe. Later, other hotels adopted the name, either to sound sophisticated
    and luxurious, or, as the owner of Le Bristol in **Paris** said back in 1925,
    simply to keep up an old tradition that went all the way back to the 18th century.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 威廉姆斯谈论了一位18世纪的英国贵族，**布里斯托尔勋爵**。他以其真正的艺术和旅行鉴赏家而闻名，他的访问往往提升了某个地方的地位：他下榻的酒店甚至非正式地被称为“布里斯托尔勋爵的酒店”。结果证明，这就是欧洲第一家布里斯托尔酒店开业的方式。后来，其他酒店也采用了这个名称，要么是为了听起来更加精致奢华，要么，正如1925年巴黎布里斯托尔酒店的老板所说，只是为了保持一种可以追溯到18世纪的传统。
- en: It’s more than just a name
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这不仅仅是一个名字
- en: 'This journey started with a simple question about the Hotel Bristol in Oslo,
    a name that felt strangely out of place. It all started with one hotel, but soon
    I was mapping names across the world. What began as just city names turned into
    a story about geography, branding, and even a bit of old European tradition. Here’s
    a summary of what we found:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这段旅程始于对奥斯陆的布里斯托尔酒店的简单疑问，这个名字感觉奇怪地格格不入。一切始于一家酒店，但很快我就开始在世界各地绘制名称。最初只是城市名称，但很快变成了关于地理、品牌甚至一点古老欧洲传统的故事。以下是我们的发现总结：
- en: '**Paris** is the city with the most hotel names to its name. Most of them aren’t
    even in Paris —the average “Paris Hotel” is 22km away from the actual city.'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**巴黎**是拥有最多酒店名称的城市。其中大部分甚至不在巴黎——平均的“巴黎酒店”距离实际城市有22公里。'
- en: '**Vienna** came next. But it’s not just a city—it’s also a Chinese hotel brand
    with close to 1,000 locations, all selling a refined, classical, European fantasy.'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**维也纳**紧随其后。但不仅仅是一个城市——它还是一个拥有近1000家分店的中国的酒店品牌，所有这些都在销售一种精致、经典的欧洲幻想。'
- en: '**Rome** is third, and it turns out hotels all across Italy love naming themselves
    after the capital. Location or aspiration? Maybe both.'
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**罗马**排名第三，结果发现意大利的酒店都喜欢以首都命名。是地理位置还是愿望？也许两者都有。'
- en: What all of this shows is that hotel names are rarely random. They’re selling
    a location, a fantasy, or—sometimes—a tradition.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都表明，酒店名称很少是随机的。它们在销售一个地点、一种幻想，有时甚至是一种传统。
- en: 'And yes, the cat’s out of the bag: there are over 200 Hotels Bristol worldwide,
    and the reason goes all the way back to an 18th-century English aristocrat whose
    hotel preferences turned into a naming tradition.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 并且是的，猫已经从袋子里出来了：全世界有超过200家布里斯托尔酒店，原因可以追溯到一位18世纪的英国贵族，他的酒店偏好变成了一种命名传统。
- en: So next time you find yourself staying at a London in Uruguay, a Rome in Lisbon
    or a Barcelona in Mexico—you’ll know there’s probably more to that name than meets
    the eye. And now, you know how to start uncovering it.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 所以下次当你发现自己住在乌拉圭的伦敦、里斯本的罗马或墨西哥的巴塞罗那时——你会知道这个名字可能比你所看到的更多。现在，你知道如何开始揭开它的面纱了。
- en: '*All images and code in this article are by the author*'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '*所有本文中的图片和代码均由作者提供*'
