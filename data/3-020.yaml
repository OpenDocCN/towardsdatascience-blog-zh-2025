- en: Diffusion Models, Explained Simply
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 简单解释扩散模型
- en: 原文：[https://towardsdatascience.com/diffusion-models-explained-simply/](https://towardsdatascience.com/diffusion-models-explained-simply/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/diffusion-models-explained-simply/](https://towardsdatascience.com/diffusion-models-explained-simply/)
- en: <mdspan datatext="el1746495094742" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746495094742" class="mdspan-comment">引言</mdspan>
- en: '**Generative AI** is one of the most popular terms we hear today. Recently,
    there has been a surge in generative AI applications involving text, image, audio,
    and video generation.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**生成式AI**是我们今天听到的最流行术语之一。最近，涉及文本、图像、音频和视频生成的生成式AI应用激增。'
- en: When it comes to image creation, diffusion models have emerged as a state-of-the-art
    technique for content generation. Although they were first introduced in 2015,
    they have seen significant advancements and now serve as the core mechanism in
    well-known models such as DALLE, Midjourney, and CLIP.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到图像创作时，扩散模型已成为内容生成领域最先进的技巧。尽管它们最初是在2015年提出的，但它们已经取得了显著的进步，现在成为DALLE、Midjourney和CLIP等知名模型的核心机制。
- en: '*The goal of this article is to introduce the core idea behind diffusion models.
    This foundational understanding will help in grasping more advanced concepts used
    in complex diffusion variants and in interpreting the role of hyperparameters
    when training a custom diffusion model.*'
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*本文的目的是介绍扩散模型背后的核心思想。这种基础理解将有助于掌握复杂扩散变体中使用的更高级概念，以及在训练自定义扩散模型时解释超参数的作用。*'
- en: Diffusion
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩散
- en: Analogy from physics
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 物理学类比
- en: Let us imagine a transparent glass of water. What happens if we add a small
    amount of another liquid with a yellow color, for example? The yellow liquid will
    gradually and uniformly spread throughout the glass, and the resulting mixture
    will take on a slightly transparent yellow tint.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一个透明的玻璃杯水。如果我们添加一小部分另一种液体，比如黄色的液体，会发生什么？黄色液体将逐渐均匀地扩散到整个玻璃杯中， resulting
    mixture will take on a slightly transparent yellow tint.
- en: '![](../Images/ae94db2728011a1f262ed96898f7dbae.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ae94db2728011a1f262ed96898f7dbae.png)'
- en: 'The described process is known as **forward diffusion**: we altered the environment’s
    state by adding a small amount of another liquid. However, would it be just as
    easy to perform **reverse diffusion** — to return the mixture back to its original
    state? It turns out that it is not. In the best-case scenario, achieving this
    would require highly sophisticated mechanisms.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 描述的过程被称为**正向扩散**：我们通过添加少量另一种液体来改变环境的状况。然而，执行**反向扩散**——将混合物恢复到原始状态——是否同样容易呢？事实证明并非如此。在最佳情况下，实现这一点需要高度复杂的机制。
- en: Applying the analogy to machine learning
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将类比应用于机器学习
- en: Diffusion can also be applied to images. Imagine a high-quality photo of a dog.
    We can easily transform this image by gradually adding random noise. As a result,
    the pixel values will change, making the dog in the image less visible or even
    unrecognizable. This transformation process is known as **forward diffusion**.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 扩散也可以应用于图像。想象一下一张高质量的狗的照片。我们可以通过逐渐添加随机噪声轻松地转换这张图片。结果，像素值将发生变化，使得图像中的狗变得不那么明显，甚至无法辨认。这个转换过程被称为**正向扩散**。
- en: '![](../Images/d87a0b464124acf3b2639e4cf7852216.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d87a0b464124acf3b2639e4cf7852216.png)'
- en: 'Source: [Diffusion Models: A Comprehensive Survey of Methods and Applications](https://arxiv.org/pdf/2209.00796)'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：[扩散模型：方法和应用的综合调查](https://arxiv.org/pdf/2209.00796)
- en: 'We can also consider the inverse operation: given a noisy image, the goal is
    to reconstruct the original image. This task is much more challenging because **there
    are far fewer highly recognizable image states compared to the vast number of
    possible noisy variations.** Using the same physics analogy mentioned earlier,
    this process is called **reverse diffusion**.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以考虑逆操作：给定一个噪声图像，目标是重建原始图像。这个任务要困难得多，因为与可能的噪声变化数量相比，**可识别的图像状态要少得多**。使用前面提到的相同的物理学类比，这个过程被称为**反向扩散**。
- en: Architecture of diffusion models
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩散模型的架构
- en: '*To better understand the structure of diffusion models, let us examine both
    diffusion processes separately.*'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '*为了更好地理解扩散模型的结构，让我们分别检查两种扩散过程。*'
- en: Forward diffusion
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正向扩散
- en: As mentioned earlier, forward diffusion involves progressively adding noise
    to an image. In practice, however, the process is a bit more nuanced.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，正向扩散涉及逐步向图像添加噪声。然而，在实践中，这个过程要复杂一些。
- en: The most common method involves sampling a random value for each pixel from
    a **Gaussian distribution** with a mean of 0\. This sampled value — which can
    be either positive or negative — is then added to the pixel’s original value.
    Repeating this operation across all pixels results in a noisy version of the original
    image.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的方法是，从均值为0的**高斯分布**中为每个像素采样一个随机值。这个采样值（可以是正数或负数）然后加到像素的原始值上。在整个像素上重复此操作，结果得到原始图像的噪声版本。
- en: '![](../Images/0ec88785db0b655210f72f62282eb679.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0ec88785db0b655210f72f62282eb679.png)'
- en: For each pixel in the image, a random value is sampled from a Gaussian distribution
    and added to the pixel’s value.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 对于图像中的每个像素，都会从高斯分布中采样一个随机值并加到像素的值上。
- en: '*The chosen Gaussian distribution typically has a relatively small variance,
    meaning that the sampled values are usually small. As a result, only minor changes
    are introduced to the image at each step.*'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*所选的高斯分布通常具有相对较小的方差，这意味着采样值通常很小。因此，在每一步只对图像引入微小的变化。*'
- en: Forward diffusion is an iterative process in which noise is applied to the image
    multiple times. With each iteration, the resulting image becomes increasingly
    dissimilar to the original. After hundreds of iterations — which is common in
    real diffusion models — the image eventually becomes unrecognizable from pure
    noise.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 前向扩散是一个迭代过程，其中多次对图像应用噪声。随着每次迭代的进行，生成的图像与原始图像的差异越来越大。在真实扩散模型中，通常经过数百次迭代后，图像最终变得无法从纯噪声中识别出来。
- en: Reverse diffusion
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 反向扩散
- en: Now you might ask: *what is the purpose of performing all these forward diffusion
    transformations*? The answer is that the images generated at each iteration are
    used to train a neural network.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你可能会问：*进行所有这些前向扩散变换的目的是什么？答案是，每个迭代的生成的图像被用来训练一个神经网络。
- en: Specifically, suppose we applied 100 sequential noise transformations during
    forward diffusion. We can then take the image at each step and train the neural
    network to reconstruct the image from the previous step. The difference between
    the predicted and actual images is calculated using a loss function — for example, *Mean
    Squared Error (MSE)*, which measures the average pixel-wise difference between
    the two images.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，假设我们在前向扩散中应用了100次连续的噪声变换。然后我们可以取每一步的图像，并训练神经网络从前一步重建图像。使用损失函数计算预测图像和实际图像之间的差异，例如，*均方误差（MSE）*，它衡量两个图像之间平均像素级的差异。
- en: '![](../Images/d4ba3ed521711344a3bbb71d79a579df.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4ba3ed521711344a3bbb71d79a579df.png)'
- en: The goal of the model is to detect the added noise and reconstruct the previous
    image. The predicted image is then compared to the actual image to calculate the loss.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的目标是检测添加的噪声并重建之前的图像。然后，将预测图像与实际图像进行比较，以计算损失。
- en: '*This example shows a diffusion model reconstructing the original image. At
    the same time, diffusion models can be trained to predict the noise added to an
    image. In that case, to reconstruct the original image, it is sufficient to subtract
    the predicted noise from the image at the previous iteration.*'
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*这个例子展示了扩散模型重建原始图像。同时，扩散模型可以被训练来预测添加到图像中的噪声。在这种情况下，为了重建原始图像，只需要从前一迭代的图像中减去预测的噪声即可。*'
- en: '*While both of these tasks might seem similar, predicting the added noise is
    simpler compared to image reconstruction.*'
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*虽然这两个任务可能看起来很相似，但预测添加的噪声与图像重建相比要简单一些。*'
- en: Model design
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型设计
- en: After gaining a basic intuition about the diffusion technique, it is essential
    to explore several more advanced concepts to better understand diffusion model
    design.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在对扩散技术有一个基本的直觉之后，探索几个更高级的概念对于更好地理解扩散模型设计至关重要。
- en: Number of iterations
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 迭代次数
- en: 'The number of iterations is one of the key parameters in diffusion models:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代次数是扩散模型中的关键参数之一：
- en: '**On one hand, using more iterations means that image pairs at adjacent steps
    will differ less, making the model’s learning task easier. On the other hand,
    a higher number of iterations increases computational cost.**'
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**一方面，使用更多的迭代意味着相邻步骤的图像对差异更小，使得模型的学习任务更容易。另一方面，更高的迭代次数会增加计算成本。**'
- en: While fewer iterations can speed up training, the model may fail to learn smooth
    transitions between steps, resulting in poor performance.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管较少的迭代可以加快训练速度，但模型可能无法学习步骤之间的平滑过渡，从而导致性能不佳。
- en: '*Typically, the number of iterations is chosen between 50 and 1000.*'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*通常，迭代次数会选择在50到1000之间。*'
- en: Neural network architecture
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 神经网络架构
- en: 'Most commonly, the U-Net architecture is used as the backbone in diffusion
    models. Here are some of the reasons why:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的是，U-Net架构被用作扩散模型的主干。以下是其中一些原因：
- en: U-Net preserves the input and output image dimensions, ensuring that the image
    size remains consistent throughout the reverse diffusion process.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: U-Net保留了输入和输出图像的维度，确保在整个反向扩散过程中图像大小保持一致。
- en: Its bottleneck architecture enables the reconstruction of the entire image after
    compression into a latent space. Meanwhile, key image features are retained through
    skip connections.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其瓶颈架构使得在压缩到潜在空间后能够重建整个图像。同时，通过跳过连接保留了关键图像特征。
- en: Originally designed for biomedical image segmentation, where pixel-level accuracy
    is crucial, U-Net’s strengths translate well to diffusion tasks that require precise
    prediction of individual pixel values.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: U-Net最初是为生物医学图像分割设计的，其中像素级精度至关重要，U-Net的优势很好地转化为需要精确预测单个像素值的扩散任务。
- en: '![](../Images/5d647e5cfa30e9b607419cd5c3666a2d.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5d647e5cfa30e9b607419cd5c3666a2d.png)'
- en: 'U-Net architecture. Source: [U-Net: Convolutional Networks for Biomedical Image
    Segmentation](https://arxiv.org/pdf/1505.04597)'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: U-Net架构。来源：[U-Net：用于生物医学图像分割的卷积网络](https://arxiv.org/pdf/1505.04597)
- en: Shared network
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 共享网络
- en: At first glance, it might seem necessary to train a separate neural network
    for each iteration in the diffusion process. While this approach is feasible and
    can lead to high-quality inference results, it is highly inefficient from a computational
    perspective. For example, if the diffusion process consists of a thousand steps,
    we would need to train a thousand U-Net models — an extremely time-consuming and
    resource-intensive task.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 初看起来，可能似乎有必要在扩散过程中的每个迭代中训练一个单独的神经网络。虽然这种方法是可行的，并且可以导致高质量的推理结果，但从计算角度来看，它非常低效。例如，如果扩散过程由一千步组成，我们就需要训练一千个U-Net模型——这是一个耗时且资源密集的任务。
- en: 'However, we can observe that **the task configuration across different iterations
    is essentially the same**: in each case, we need to reconstruct an image of identical
    dimensions that has been altered with noise of a similar magnitude. This important
    insight leads to the idea of **using a single, shared neural network across all
    iterations.**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们可以观察到**不同迭代之间的任务配置基本上是相同的**：在每种情况下，我们需要重建一个具有相同维度且经过类似噪声程度修改的图像。这个重要的洞察力导致了使用单个、共享神经网络跨越所有迭代的思想。
- en: In practice, this means that we use a single U-Net model with shared weights,
    trained on image pairs from different diffusion steps. During inference, the noisy
    image is passed through the same trained U-Net multiple times, gradually refining
    it until a high-quality image is produced.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，这意味着我们使用一个具有共享权重的单个U-Net模型，该模型在来自不同扩散步骤的图像对上进行训练。在推理过程中，带噪声的图像被多次通过相同的训练U-Net，逐渐细化，直到生成高质量的图像。
- en: '![](../Images/e788a56ddfef2793dc2e598353a386de.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e788a56ddfef2793dc2e598353a386de.png)'
- en: A single shared model is used for image prediction tasks across all iterations.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 单个共享模型用于所有迭代中的图像预测任务。
- en: '*Though the generation quality might slightly deteriorate due to using only
    a single model, the gain in training speed becomes highly significant.*'
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*尽管由于仅使用单个模型，生成质量可能会略有下降，但训练速度的提升变得非常显著。*'
- en: Conclusion
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we explored the core concepts of diffusion models, which play
    a key role in image generation. There are many variations of these models — among
    them, **stable diffusion** models have become particularly popular. While based
    on the same fundamental principles, stable diffusion also enables the integration
    of text or other types of input to guide and constrain the generated images.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了扩散模型的核心概念，这些模型在图像生成中扮演着关键角色。这些模型有很多变体——其中，**稳定扩散**模型变得尤为流行。虽然基于相同的基本原理，稳定扩散还允许整合文本或其他类型的输入来引导和约束生成的图像。
- en: Resources
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 资源
- en: '[U-Net: Convolutional Networks for Biomedical Image Segmentation](https://arxiv.org/pdf/1505.04597)'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[U-Net：用于生物医学图像分割的卷积网络](https://arxiv.org/pdf/1505.04597)'
- en: '[Diffusion Models: A Comprehensive Survey of Methods and Applications](https://arxiv.org/pdf/2209.00796)'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[扩散模型：方法和应用的综合调查](https://arxiv.org/pdf/2209.00796)'
- en: '*All images unless otherwise noted are by the author.*'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '*除非另有说明，所有图像均为作者所有。*'
