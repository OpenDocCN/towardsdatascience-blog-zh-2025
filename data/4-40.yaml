- en: What about Anscombe’s quartet?
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，Anscombe的四重奏是什么？
- en: 'So, [Anscombe’s quartet](https://en.wikipedia.org/wiki/Anscombe%27s_quartet)
    is a set of four datasets with almost same descriptive statistics that nevertheless,
    look very different when visualized. The dataset is in Public Domain and is conveniently
    available in seaborn library, allowing us to play around and explore what is happening.
    We can easily load the dataset by:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，[安斯康姆的四重奏](https://en.wikipedia.org/wiki/Anscombe%27s_quartet)是一组具有几乎相同描述性统计的四个数据集，但可视化时却看起来非常不同。该数据集属于公共领域，并且方便地可在seaborn库中找到，允许我们进行实验和探索正在发生的事情。我们可以轻松地通过以下方式加载数据集：
- en: '[PRE0]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Then, we can create a visualization of the four datasets using matplotlib:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以使用matplotlib创建四个数据集的可视化：
- en: '[PRE1]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![Image created by the author in Python using Anscombe''s Quartet data](../Images/12e3507c1e8005d145ec712f9ccf708e.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![由作者在Python中使用安斯康姆四重奏数据创建的图像](../Images/12e3507c1e8005d145ec712f9ccf708e.png)'
- en: Image created by the author in Python using Anscombe’s Quartet data
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者在Python中使用安斯康姆四重奏数据创建的图像
- en: 'In particular, all four datasets consist of 11 (x, y) points:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 特别是，所有四个数据集都由11个(x, y)点组成：
- en: dataset I seems to be a simple linear relationship
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据集I似乎是一个简单的线性关系
- en: dataset II clearly is a parabolic curve
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据集II显然是一个抛物线曲线
- en: dataset III clearly is a linear relationship, but with one large outlier
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据集III显然是一个线性关系，但有一个大的异常值
- en: and dataset IV is a vertical line, but again, distorted by one large outlier
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并且数据集IV是一条垂直线，但同样，被一个大的异常值扭曲
- en: 'All four datasets are very different from one another, however, when we calculate
    their descriptive statistics, we are up for a plot twist – all four datasets share
    almost identical descriptive statistics. More specifically, we can calculate the
    descriptive statistics as following:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 所有四个数据集彼此之间都非常不同，然而，当我们计算它们的描述性统计时，我们遇到了一个剧情转折——所有四个数据集几乎具有相同的描述性统计。更具体地说，我们可以按照以下方式计算描述性统计：
- en: '[PRE2]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![Image created by the author in Python using Anscombe''s Quartet data](../Images/5d2a154746124753b32a71c814d1b66b.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![由作者在Python中使用安斯康姆四重奏数据创建的图像](../Images/5d2a154746124753b32a71c814d1b66b.png)'
- en: Image created by the author in Python using Anscombe’s Quartet data
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者在Python中使用安斯康姆四重奏数据创建的图像
- en: Identical numbers, wildly different visuals. 🤷‍♀️ Crazy, right? This is why
    it is so important to always visualize the data, no matter what the numbers suggest.
    In Anscombe’s own words, a common but misguided belief among statisticians is
    that “*numerical calculations are exact, but graphs are rough”.*
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 数字相同，视觉效果却截然不同。🤷‍♀️ 疯狂，对吧？这就是为什么无论数字如何，始终可视化数据都如此重要的原因。用安斯康姆自己的话说，统计学家中的一种普遍但错误的信念是“*数值计算是精确的，但图表是粗糙的”*。
- en: Anscombe’s quartet is such a powerful example for highlighting the importance
    of data visualization, because the visualizations are not just different, but
    rather ***clearly different –*** with just one glance, one can understand that
    the datasets are completely distinct from each other. In other words, the visualizations
    immediately provide us with meaningful information, that the descriptive statistics
    fail to incorporate.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 安斯康姆的四重奏是强调数据可视化重要性的一个强大例子，因为可视化不仅仅是不同的，而是**明显不同**——只需一眼，就可以理解数据集彼此之间完全不同。换句话说，可视化立即为我们提供了描述性统计无法包含的有意义信息。
- en: '* * *'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: No one knows exactly how Anscombe came up with these datasets in the first place,
    but [this](https://www.research.autodesk.com/app/uploads/2023/03/same-stats-different-graphs.pdf_rec2hRjLLGgM7Cn2T.pdf)
    2017 study presents a method for creating such datasets from scratch. This allows
    to produce endless examples of very different datasets with almost identical descriptive
    statistics – my favorite by far is [Datasaurus dozen](https://en.wikipedia.org/wiki/Datasaurus_dozen)
    🦖. Similarly to Anscombe’s quartet, the Datasaurus dozen includes thirteen – a
    dozen + the Datasaurus – very different datasets with almost identical descriptive
    statistics.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人确切知道安斯康姆最初是如何想出这些数据集的，但[这项](https://www.research.autodesk.com/app/uploads/2023/03/same-stats-different-graphs.pdf_rec2hRjLLGgM7Cn2T.pdf)
    2017年的研究提出了一种从头创建此类数据集的方法。这允许我们产生几乎具有相同描述性统计的非常不同的数据集的无限例子——我最喜欢的是[数据龙十二生肖](https://en.wikipedia.org/wiki/Datasaurus_dozen)
    🦖。与安斯康姆的四重奏类似，数据龙十二生肖包括十三个——一个十二生肖加上数据龙——具有几乎相同描述性统计的非常不同的数据集。
- en: The datasets are available in the [datasauRus](https://jumpingrivers.github.io/datasauRus/)
    R package under the [MIT License](https://github.com/jumpingrivers/datasauRus/blob/v0.1.9/LICENSE.md),
    which permits commercial use.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集可在[datasauRus](https://jumpingrivers.github.io/datasauRus/) R包下以[MIT许可证](https://github.com/jumpingrivers/datasauRus/blob/v0.1.9/LICENSE.md)获得，该许可证允许商业用途。
- en: '![Image created by the author in R using the Datasaurus dozen datasets from
    the datasauRus R package](../Images/c004bbb9f1c42d3358fdee98cab3f313.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![由作者在R中使用datasauRus R包的Datasaurus dozen数据集创建的图像](../Images/c004bbb9f1c42d3358fdee98cab3f313.png)'
- en: Image created by the author in R using the Datasaurus dozen datasets from the
    [datasauRus](https://jumpingrivers.github.io/datasauRus/) R package
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者在R中使用[datasauRus](https://jumpingrivers.github.io/datasauRus/) R包的Datasaurus
    dozen数据集创建的图像
- en: '![Image created by the author in R using the Datasaurus dozen datasets from
    the datasauRus R package](../Images/971c6ffea80fbf100f3e93ec1b9fd2d0.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![由作者在R中使用datasauRus R包的Datasaurus dozen数据集创建的图像](../Images/971c6ffea80fbf100f3e93ec1b9fd2d0.png)'
- en: Image created by the author in R using the Datasaurus dozen datasets from the
    [datasauRus](https://jumpingrivers.github.io/datasauRus/) R package
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者在R中使用[datasauRus](https://jumpingrivers.github.io/datasauRus/) R包的Datasaurus
    dozen数据集创建的图像
- en: Again, all of these datasets have almost identical descriptive statistics, however,
    they are strikingly different. Apparently, skipping the visualization step, would
    result in a terrible loss of information.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，所有这些数据集几乎都有几乎相同的描述性统计，然而，它们却截然不同。显然，跳过可视化步骤，会导致信息损失惨重。
- en: '* * *'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: When a plot could have helped
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当一个图表可能有所帮助时
- en: Anscombe’s quartet or the Datasaurus may seem like fun, simplistic examples,
    aiming to teach us about the importance of data visualization. But, don’t be fooled;
    the lesson – the importance of data visualization – is not a theoretic concept,
    but rather very real, with tangible implication in the real world.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 安斯康姆四重奏或Datasaurus可能看起来像是有趣的、简单的例子，旨在教导我们关于数据可视化的重要性。但，不要被误导；这个教训——数据可视化的重要性——不是一个理论概念，而是一个非常真实的概念，在现实世界中有着实际的含义。
- en: 1\. 2008 financial crisis
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 2008年金融危机
- en: Take for instance the 2008 financial crisis. The models used by banks and investment
    firms back then, heavily relied on aggregate risk metrics like _[Value at Risk
    (VaR)](https://en.wikipedia.org/wiki/Value_at_risk). *More specifically*, VaR_
    provides an estimation of the potential maximum loss of a portfolio over a given
    time frame at a specified confidence level (e.g. 95% or 99%). For instance, a
    99% *VaR* of $100 means that under normal market conditions, losses are expected
    to exceed $100 only 1% of the time.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 以2008年的金融危机为例。当时银行和投资公司使用的模型，高度依赖像_[风险价值（VaR）](https://en.wikipedia.org/wiki/Value_at_risk)这样的聚合风险指标。*更具体地说*，VaR提供了一个在指定置信水平（例如95%或99%）下，给定时间段内投资组合可能的最大损失估计。例如，99%的*VaR*为100美元意味着，在正常市场条件下，损失超过100美元的可能性只有1%。
- en: '*VaR* calculations are based on a bunch of assumptions, as for instance the
    often used assumption that market returns are normally distributed. Nevertheless,
    as you may have already figured out by now, ‘*normally distributed*‘ is usually
    a rather sloppy interpretation of the real world – real life is in most of the
    cases much more nuanced and not so straightforward.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '*VaR*的计算基于一系列假设，例如通常使用的假设是市场回报是正态分布的。然而，正如你可能已经意识到的，‘*正态分布*’通常是对现实世界的一种相当粗略的解释——现实生活大多数情况下要复杂得多，并不那么直接。'
- en: Anyways, in the case of 2008 financial crisis, the assumed *‘normal distribution’*
    failed to represent reality and account for the *‘fat tails’* appearing in the
    actual data of market returns*.* A *‘fat tail’* in a distribution represents a
    higher-than-expected (from the normal distribution) probability of extreme events
    – here, extreme losses. In other words, extreme losses occurred much more frequently
    that the used models assumed.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 无论如何，在2008年金融危机的情况下，假设的*“正态分布”*未能代表现实，也无法解释市场回报实际数据中出现的*“厚尾”*现象。*厚尾*在分布中代表的是极端事件（在这里是极端损失）发生的概率高于预期（从正态分布中）的情况。换句话说，极端损失发生的频率远高于所使用的模型所假设的。
- en: '![Image created by the author in Python with data generated using scipy.stats](../Images/adaab9cab0ecf9f7a1d8252d130a0b64.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![由作者在Python中使用scipy.stats生成数据创建的图像](../Images/adaab9cab0ecf9f7a1d8252d130a0b64.png)'
- en: Image created by the author in Python with data generated using `scipy.stats`
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者在Python中使用`scipy.stats`生成数据创建的图像
- en: Nonetheless, focusing on aggregate metrics like *VaR* does not allow to identify
    those insights. On the contrary, a detailed visualization of historical returns
    can provide deeper insight into what is really happening. Individuals and institutions
    that use visualizations and detailed analysis, di identify the risks.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，专注于像*VaR*这样的综合指标并不能识别那些洞察。相反，对历史回报的详细可视化可以更深入地了解真正发生的事情。使用可视化工具和详细分析的个体和机构可以识别风险。
- en: Ultimately, *VaR* is a great example of how often people tend to feel confident
    and secure when they are presented with a number – a calculation – irrespectively
    if this number is calculated out of thin air. At the core of 2008 financial crisis,
    overreliance on quantitative models, led institutions to greatly underestimate
    risks. Apparently, an abundance of other factors contributed to the outcome –
    say for instance the systemic risk of interrelated portfolios – nevertheless,
    blind trust in aggregate numbers remains a strong factor.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，*VaR*是一个很好的例子，说明了人们往往在看到数字——一个计算结果——时，无论这个数字是否凭空想象，都会感到自信和安心。在2008年金融危机的核心，过度依赖量化模型导致机构大大低估了风险。显然，许多其他因素也导致了这一结果——比如相互关联的投资组合的系统风险——然而，对综合数字的盲目信任仍然是一个强大的因素。
- en: 2\. Challenger space shuttle disaster
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 挑战者号航天飞机灾难
- en: Even in the [Challenger space shuttle disaster](https://en.wikipedia.org/wiki/Space_Shuttle_Challenger_disaster),
    some data visualization could have helped. For reference, on January 28, 1986,
    the Space Shuttle *Challenger* broke apart 73 seconds after takeoff due to a failure
    of the O-rings separating the sections of the rocket booster. The failure of the
    O-rings occurred because of extremely low temperatures (2°C / 35°F, reaching -8°C/17°F
    the night before). For a large period prior to the launch, [Morton Thiokol](https://en.wikipedia.org/wiki/Thiokol)
    – the NASA subcontractor who manufactured the O-rings – engineers were concerned
    about the performance of O-rings in low temperatures, and even explicitly recommended
    against the launch. According to the accident report they presented the relevant
    data to their company’s management as appearing in the following picture. Nonetheless,
    their concerns were ignored by the company’s management, which eventually recommended
    NASA that it’s ok to launch.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在[挑战者号航天飞机灾难](https://en.wikipedia.org/wiki/Space_Shuttle_Challenger_disaster)中，一些数据可视化也可能有所帮助。例如，1986年1月28日，挑战者号航天飞机在起飞后73秒因助推器部分O形环故障而解体。O形环的故障是由于极端低温（2°C
    / 35°F，前一天晚上降至-8°C/17°F）。在发射前的一段时间里，[莫顿·塞科尔](https://en.wikipedia.org/wiki/Thiokol)——制造O形环的NASA分包商——的工程师们对O形环在低温下的性能表示担忧，甚至明确建议不要发射。根据他们提交的事故报告，他们向公司的管理层展示了以下图片中的相关数据。尽管如此，他们的担忧被公司管理层忽视，最终建议NASA可以发射。
- en: '![History of O-ring damage and temperatures of various Solid Rocket Motors
    (SRMs), Source: https://www.nasa.gov/history/rogersrep/v5p896.htm, Public Domain](../Images/3d3d5a6debda011025566043404300e4.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![O形环损坏历史和不同固体火箭发动机（SRM）的温度，来源：https://www.nasa.gov/history/rogersrep/v5p896.htm，公有领域](../Images/3d3d5a6debda011025566043404300e4.png)'
- en: 'History of O-ring damage and temperatures of various Solid Rocket Motors (SRMs),
    Source: [https://www.nasa.gov/history/rogersrep/v5p896.htm](https://www.nasa.gov/history/rogersrep/v5p896.htm),
    Public Domain'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: O形环损坏历史和不同固体火箭发动机（SRM）的温度，来源：[https://www.nasa.gov/history/rogersrep/v5p896.htm](https://www.nasa.gov/history/rogersrep/v5p896.htm)，公有领域
- en: Said illustration of the O-ring failure in relation to temperature contains
    a lot of data, however, the point of the illustration is not clearly communicated.
    Edward Tufte in his book *[‘Visual Explanations’](https://www.edwardtufte.com/book/visual-explanations-images-and-quantities-evidence-and-narrative/)*,
    argues that a simple, clear graphical representation of the correlation between
    temperature and O-ring failure could have gone a long way, even resulting into
    a different decision about approving the launch. Allegedly, Morton Thiokol also
    presented NASA a scatter plot of O-ring failure incidents in relation to temperature
    – but the plot was missing the flights with no failure, so it didn’t make much
    sense. A better plot, also including the flights with no O-ring incidents, is
    presented in the ‘_[Report to the President By the Presidential Commission On
    the Space Shuttle Challenger Accident](https://sma.nasa.gov/SignificantIncidents/assets/rogers_commission_report.pdf)._
    Apparently, this is a much more useful plot, allowing one to immediately suspect
    the correlation between O-ring failure and temperature. Tufte’s critique emphasizes
    how this omission contributed to poor decision-making.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 与温度相关的O型圈故障的说明包含大量数据，然而，说明的重点并没有清楚地传达。爱德华·图费在他的书*[《视觉解释》](https://www.edwardtufte.com/book/visual-explanations-images-and-quantities-evidence-and-narrative/)*中认为，一个简单、清晰的温度与O型圈故障之间相关性的图形表示可以走很长的路，甚至可能导致关于批准发射的不同决策。据说，莫顿·塞科尔也向NASA展示了与温度相关的O型圈故障事件的散点图——但图中缺少没有故障的航班，所以没有太多意义。一个更好的图表，也包括没有O型圈事件航班，可以在‘_[总统委员会关于挑战者号航天飞机事故的报告](https://sma.nasa.gov/SignificantIncidents/assets/rogers_commission_report.pdf)._’中找到。显然，这是一个更有用的图表，使人们可以立即怀疑O型圈故障与温度之间的相关性。图费的批评强调了这种遗漏如何导致决策不当。
- en: '![Scatter plots of number of O-ring failure incidents per mission versus temperature,
    Source: _Report to the President By the Presidential Commission On the Space Shuttle
    Challenger Accident_, Public Domain](../Images/e66c95874ee33964a60dc4ef5868c0a0.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![每次任务中O型圈故障事件数量与温度的散点图，来源：_报告到总统：总统委员会关于挑战者号航天飞机事故的报告_，公有领域](../Images/e66c95874ee33964a60dc4ef5868c0a0.png)'
- en: 'Scatter plots of number of O-ring failure incidents per mission versus temperature,
    Source: _[Report to the President By the Presidential Commission On the Space
    Shuttle Challenger Accident](https://sma.nasa.gov/SignificantIncidents/assets/rogers_commission_report.pdf)_,
    *Public Domain*'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 每次任务中O型圈故障事件数量与温度的散点图，来源：_[总统委员会关于挑战者号航天飞机事故的报告](https://sma.nasa.gov/SignificantIncidents/assets/rogers_commission_report.pdf)_，*公有领域*
- en: Be that as it may, with today’s historical and technological distance from those
    events, it’s easy to find fault in cases of the past. Nonetheless, it is heartbreaking
    to realize that in many cases disaster ***can be foreseen, but cannot be effectively
    communicated*** to decision makers in order to take the right decisions.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，鉴于今天与那些事件的历史和技术距离，很容易在过去的案例中找到错误。然而，意识到在许多情况下，灾难***可以预见，但无法有效地传达给决策者，以便做出正确的决策***，这让人心碎。
- en: 3\. 1854 Broad Street cholera outbreak
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 1854年布罗德街霍乱疫情
- en: A remarkable use case of effective data visualization is the case of [1854 Broad
    Street cholera outbreak](https://en.wikipedia.org/wiki/1854_Broad_Street_cholera_outbreak#cite_note-23).
    In particular, this outbreak occurred in Soho, London, near Broad Street, during
    the [1846–1860 cholera pandemic](https://en.wikipedia.org/wiki/1846%E2%80%931860_cholera_pandemic)
    and killed 616 people.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 有效数据可视化的一个显著用例是[1854年布罗德街霍乱疫情](https://en.wikipedia.org/wiki/1854_Broad_Street_cholera_outbreak#cite_note-23)的案例。特别是，这次疫情发生在伦敦的索霍区，靠近布罗德街，在[1846-1860年霍乱大流行](https://en.wikipedia.org/wiki/1846%E2%80%931860_cholera_pandemic)期间，导致616人死亡。
- en: During this outbreak Dr. John Snow managed to illustrate the cholera cases in
    a map, and realized that they clustered around a water pump in Broad Street. This
    resulted in [identifying that the Broad Street water pump was contaminated](https://pmc.ncbi.nlm.nih.gov/articles/PMC7150208/)
    and was essentially the source of the outbreak. The simple act of removing the
    handle of the water pump led to cessation of the epidemic.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次疫情中，约翰·斯诺博士设法在地图上展示了霍乱病例，并意识到它们围绕着布罗德街的一个水泵聚集。这导致了[确定布罗德街的水泵被污染](https://pmc.ncbi.nlm.nih.gov/articles/PMC7150208/)，实际上是疫情的根本来源。仅仅移除水泵的手柄就导致了疫情的结束。
- en: '![Dr. John Snow''s cholera map, Source: https://commons.wikimedia.org/wiki/File:Snow-cholera-map-1.jpg?uselang=en#Licensing,
    Public Domain](../Images/a6d6afed5dbbcf44145b39c64ce5c295.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![约翰·斯诺博士的霍乱地图，来源：https://commons.wikimedia.org/wiki/File:Snow-cholera-map-1.jpg?uselang=en#Licensing,
    公共领域](../Images/a6d6afed5dbbcf44145b39c64ce5c295.png)'
- en: 'Dr. John Snow’s cholera map, Source: [https://commons.wikimedia.org/wiki/File:Snow-cholera-map-1.jpg?uselang=en#Licensing](https://commons.wikimedia.org/wiki/File:Snow-cholera-map-1.jpg?uselang=en#Licensing),
    Public Domain'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰·斯诺博士的霍乱地图，来源：[https://commons.wikimedia.org/wiki/File:Snow-cholera-map-1.jpg?uselang=en#Licensing](https://commons.wikimedia.org/wiki/File:Snow-cholera-map-1.jpg?uselang=en#Licensing)，公共领域
- en: This was a huge discovery that not only stopped the epidemic, but also revolutionized
    the understanding of disease transmission and epidemiology. Undeniably, a great
    example of how a simple visualization can go a long way and unlock impactful insights.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个巨大的发现，不仅阻止了疫情，还彻底改变了人们对疾病传播和流行病学的理解。毫无疑问，这是一个很好的例子，说明了简单的可视化可以走得很远，并揭示有影响力的洞察力。
- en: '* * *'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: On my mind
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在我心目中
- en: Ultimately, the lesson from datasets like Anscombe’s quartet or the Datasaurus
    dozen is that our deep-rooted notion that *‘numerical calculations are exact,
    but graphs are rough’* is flawed. Both visualization and numerical calculation
    are essential in order to extract meaningful insights from data. In the end, interpreting
    data in a meaningful way may be more of an art than an exact science, as there
    is no *single, one-fits-all* calculation approach that should be followed. Data
    visualization is much more than pretty pictures – it is a necessity for avoiding
    misinterpretation and poor decisions in data analysis…
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '最终，从安斯康姆四重奏或数据恐龙十二生肖等数据集中得到的教训是，我们根深蒂固的观念“‘数值计算是精确的，但图表是粗糙的’”是错误的。可视化和数值计算都是提取数据中有意义洞察力的必要手段。最终，以有意义的方式解释数据可能更多的是一种艺术，而不是精确的科学，因为没有一种*单一、通用的*计算方法应该遵循。数据可视化不仅仅是漂亮的图片，它是避免数据分析中误解和不良决策的必要手段… '
- en: …cause a Datasaurus maybe lurking somewhere in the data.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: …因为可能某个地方隐藏着一只数据恐龙。
