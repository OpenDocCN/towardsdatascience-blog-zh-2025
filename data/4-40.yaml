- en: Ever heard a co-worker confidently declaring something like “*[The longer I
    lose at roulette, the closer I am to winning?](https://contributor.insightmediagroup.io/water-cooler-small-talk-gamblers-fallacy-and-ruin-3f882707fd19)*“,
    or had a boss that demanded you to not overcomplicate things and provide “*just
    one number*“, ignoring your attempts to explain why such a number doesn’t exist?
    Maybe you’ve even shared birthdays with a colleague, and everyone in office commented
    on [what a bizarre cosmic coincidence](https://contributor.insightmediagroup.io/water-cooler-small-talk-the-birthday-paradox-94ea294502c7)
    it must be.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否曾听到同事自信地宣称“*[我越在轮盘赌中输得越多，我离赢就越近？](https://contributor.insightmediagroup.io/water-cooler-small-talk-gamblers-fallacy-and-ruin-3f882707fd19)*”，或者有老板要求你不要把事情复杂化，只提供“*一个数字*”，忽略你解释为什么这样的数字不存在的尝试？也许你甚至和同事分享过生日，办公室里的每个人都对[这看似奇怪的宇宙巧合](https://contributor.insightmediagroup.io/water-cooler-small-talk-the-birthday-paradox-94ea294502c7)发表了评论。
- en: These moments are typical examples of water cooler small talk – a special kind
    of small talk, thriving around break rooms, coffee machines, and of course, water
    coolers. It is where employees share all kinds of corporate gossip, myths, and
    legends, inaccurate scientific opinions, outrageous personal anecdotes, or outright
    lies. Anything goes. So, in my *[Water Cooler Small Talk](https://medium.com/@m.mouschoutzi/list/water-cooler-small-talk-dea705848095)*
    posts, I discuss strange and usually scientifically invalid opinions I have overheard
    in office, and explore what’s really going on.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这些时刻是典型的水壶旁闲聊例子——一种特殊的闲聊，在休息室、咖啡机和当然，水壶旁盛行。这是员工分享各种公司八卦、神话和传说、不准确的科学观点、令人震惊的个人轶事或直接谎言的地方。什么都可以。因此，在我的
    *[Water Cooler Small Talk](https://medium.com/@m.mouschoutzi/list/water-cooler-small-talk-dea705848095)*
    帖子中，我讨论了我在办公室听到的奇怪且通常科学上无效的观点，并探讨了真正发生的事情。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'So, here’s the water cooler opinion of today’s post:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，这是今天帖子的水壶旁观点：
- en: The descriptive statistics match perfectly, so the datasets are basically the
    same. No need to dig deeper.
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 描述性统计完全匹配，所以数据集基本上是相同的。无需进一步挖掘。
- en: Sure, that might make some sense – if you’ve never taken a statistics class.🙃
    But in reality, *very* different datasets can have the same descriptive statistics
    measures, as for instance mean, average, or standard deviation. In other words,
    while descriptive statistics *describe* a dataset, they don’t *define* it. One
    needs to always *plot* the data, in order to get the full picture.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，如果你从未上过统计学课程，这可能有些道理。🙃 但在现实中，非常不同的数据集可以具有相同的描述性统计指标，例如均值、平均值或标准差。换句话说，尽管描述性统计
    *描述* 数据集，但它们并不 *定义* 它。为了获得完整的情况，人们需要始终 *绘制* 数据。
- en: Anyways, one of the first people to demonstrate this was [Frank Anscombe](https://en.wikipedia.org/wiki/Frank_Anscombe)
    with his now-infamous [Anscombe’s quartet](https://en.wikipedia.org/wiki/Anscombe%27s_quartet).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 无论如何，第一个展示这一点的人是 [Frank Anscombe](https://en.wikipedia.org/wiki/Frank_Anscombe)，他用他现在臭名昭著的
    [Anscombe的四重奏](https://en.wikipedia.org/wiki/Anscombe%27s_quartet)。
