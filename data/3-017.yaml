- en: Benchmarking Tabular Reinforcement Learning Algorithms
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基准测试表格强化学习算法
- en: 原文：[https://towardsdatascience.com/benchmarking-tabular-reinforcement-learning-algorithms/](https://towardsdatascience.com/benchmarking-tabular-reinforcement-learning-algorithms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/benchmarking-tabular-reinforcement-learning-algorithms/](https://towardsdatascience.com/benchmarking-tabular-reinforcement-learning-algorithms/)
- en: '<mdspan datatext="el1746515722680" class="mdspan-comment">In the previous</mdspan>
    posts, we explored Part I of the seminal book *Reinforcement Learning* by Sutton
    and Barto [1] (*). In that section, we delved into the three fundamental techniques
    underlying nearly every modern Reinforcement Learning (RL) algorithm: Dynamic
    Programming (DP), Monte Carlo methods (MC), and Temporal Difference Learning (TD).
    We not only discussed algorithms from each field in depth but also implemented
    each one in Python.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746515722680" class="mdspan-comment">在先前的</mdspan>文章中，我们探讨了Sutton和Barto的经典著作《强化学习》的第一部分[1]（*）。在该部分中，我们深入研究了几乎所有现代强化学习（RL）算法背后的三个基本技术：动态规划（DP）、蒙特卡洛方法（MC）和时序差分学习（TD）。我们不仅深入讨论了每个领域的算法，还用Python实现了每一个。
- en: 'Part I of the book focuses on tabular solution methods — approaches suited
    for problems small enough to be represented in table form. For instance, with
    Q-learning, we can compute and store a complete Q-table containing every possible
    state-action pair. In contrast, Part II of Sutton’s book tackles approximate solution
    methods. When state and action spaces become too large — or even infinite — we
    must generalize. Consider the challenge of playing Atari games: the state space
    is simply too vast to model exhaustively. Instead, deep neural networks are used
    to compress the state into a latent vector, which then serves as the basis for
    an approximated value function [2].'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 书的第一部分专注于表格求解方法——适用于可以表示为表格形式的问题的解决方案。例如，使用Q学习，我们可以计算并存储一个包含每个可能的状态-动作对的完整Q表。相比之下，Sutton书的第二部分处理近似求解方法。当状态和动作空间变得太大——甚至无限大时——我们必须进行泛化。考虑玩Atari游戏的挑战：状态空间过于庞大，无法全面建模。相反，深度神经网络被用来将状态压缩成一个潜在向量，然后作为近似值函数的基础[2]。
- en: 'While we’ll venture into Part II in upcoming posts, I’m excited to announce
    a new series: we will benchmark all the algorithms introduced in Part I against
    one another. This post serves both as a summary and an introduction to our benchmarking
    framework. We’ll evaluate each algorithm based on how quickly and effectively
    it can solve increasingly larger Gridworld environments. In future posts, we plan
    to extend our experiments to more challenging scenarios, such as two-player games,
    where the differences between these methods will be even more apparent.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们将在未来的文章中探讨第二部分，但我很高兴宣布一个新的系列：我们将对第一部分中介绍的所有算法进行相互基准测试。这篇文章既是总结，也是我们基准测试框架的介绍。我们将根据每个算法解决越来越大的网格世界环境的速度和效率来评估每个算法。在未来的文章中，我们计划将我们的实验扩展到更具挑战性的场景，例如两人游戏，这些方法之间的差异将更加明显。
- en: 'Summarized, in this post, we will:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，在这篇文章中，我们将：
- en: Introduce the benchmark task and discuss our comparison criteria.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介绍基准任务并讨论我们的比较标准。
- en: Provide a chapter-by-chapter summary of the methods introduced in Sutton’s book
    along with initial benchmarking results.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供Sutton书中介绍的方法的章节总结以及初步的基准测试结果。
- en: Identify the best-performing methods from each group and deploy them in a larger-scale
    benchmarking experiment.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定每个组中表现最佳的方法，并在更大规模的基准测试实验中部署它们。
