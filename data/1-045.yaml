  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 每个细分市场的最大影响：
- en: '**Enterprise** → critical data freshness issues'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**企业** → 关键数据新鲜度问题'
- en: '**Mid-Market** → recurring incidents on feature adoption'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**中端市场** → 功能采用上的重复事件'
- en: '**SMB** → fluctuations in onboarding & activation'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SMB** → 入门和激活过程中的波动'
- en: '![](../Images/89733171e3bf26dfa5c071e510e62bb3.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/89733171e3bf26dfa5c071e510e62bb3.png)'
- en: Image by Yassin Zehar
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Yassin Zehar提供
- en: Impact
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 影响
- en: The goal of this dashboard is not only to analyze incidents and identify patterns
    but to enable the organization to react faster with a detailed overview.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 该仪表板的目标不仅是分析事件和识别模式，而且使组织能够通过详细的概述更快地做出反应。
- en: '![](../Images/0c8aaaefa8181d3455251d3a1b3253d0.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0c8aaaefa8181d3455251d3a1b3253d0.png)'
- en: Image by Yassin Zehar
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Yassin Zehar提供
- en: We noticed a **35% reduction in critical incidents after 2 months.** SRE & DATA
    teams identified the recurring root cause of some major issues, thanks to the
    unified data, and were able to fix it and monitor the maintenance. Incident response
    time improved dramatically due to the AI summaries and all the metrics, allowing
    them to know where to investigate.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我们注意到在两个月后，关键事件减少了**35%**。SRE和DATA团队通过统一的数据识别了一些主要问题的重复根本原因，并能够修复并监控维护。由于人工智能摘要和所有指标，事件响应时间显著提高，使他们能够知道在哪里进行调查。
- en: An AI-Powered Root Cause Analysis
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能驱动的根本原因分析
- en: '![](../Images/782e39a09e2f178643b4b758e22c22fa.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/782e39a09e2f178643b4b758e22c22fa.png)'
- en: Image by Yassin Zehar
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Yassin Zehar提供
- en: Using AI can save a lot of time. Especially when an investigation is needed
    in different databases, and you don’t know where to start. Adding an AI agent
    in the loop can **save you a considerable amount of time** thanks to its speed
    of processing data. To obtain this, a **detailed prompt** is necessary because
    the agent will replace a human. So, to have the most accurate results, even the
    AI needs to understand the context and receive some guidance. Otherwise, it could
    investigate and draw irrelevant conclusions. Don’t forget to ***make sure you
    have a full understanding of the cause of the issue***.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI可以节省大量时间。尤其是在需要在不同数据库中进行调查，而不知道从何开始时。在循环中添加AI代理可以**节省你相当多的时间**，因为它处理数据的速度很快。为了获得这个，需要一个**详细的提示**，因为代理将取代人类。所以，为了获得最准确的结果，即使是AI也需要理解上下文并得到一些指导。否则，它可能会进行调查并得出不相关的结论。不要忘记**确保你对问题的原因有全面的理解**。
- en: '[PRE4]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: It is essential to note that once the results are obtained, a final check is
    necessary to ensure the analysis was correctly done. **AI is a tool,** but it
    can also go wrong, so do not only on it; it’s a helpful tool. For this system,
    the AI will suggest the **top 3 likely root causes for each incident.**
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，一旦获得结果，必须进行最终检查，以确保分析是正确进行的。**AI是一个工具**，但它也可能出错，所以不要只依赖它；它是一个有用的工具。对于这个系统，AI将建议每个事件的**前三个可能的原因**。
- en: '![](../Images/52e2aba34434ab3e8a78b7f0ac5e126f.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/52e2aba34434ab3e8a78b7f0ac5e126f.png)'
- en: Image by Yassin Zehar
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Yassin Zehar提供。
- en: A better alignment with the leadership team and reporting based on the data.
    Everything became more data-driven with deeper analyses, not intuition or reports
    by segmentation. This also led to an improved process.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 与领导团队更好的协调一致，并基于数据进行报告。通过更深入的分析，一切变得更加数据驱动，而不是基于直觉或分段报告。这也导致了过程的改进。
- en: Conclusion & takeaways
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论与收获。
- en: 'In conclusion, building a product health dashboard has several benefits:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，构建产品健康仪表板有多个好处：
- en: Detect negative trends (MRR, DAU, engagement) earlier
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更早地检测负面趋势（MRR、DAU、参与度）。
- en: Reduce critical incidents by identifying root-cause patterns
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过识别根本原因模式来减少关键事件。
- en: Understand real business impact (users affected, churn risk)
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解真实业务影响（受影响的用户、流失风险）。
- en: Prioritize the product roadmap based on risk and impact
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据风险和影响优先考虑产品路线图。
- en: Align Product, Data, SRE, and Revenue around a single source of truth
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 围绕单一事实来源将产品、数据、SRE和收入对齐。
- en: 'That’s exactly what many companies lack: a unified data approach.'
  id: totrans-147
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这正是许多公司所缺乏的：统一的数据方法。
- en: '![](../Images/c83cafc5696b6d72fa7bd581ee9c3312.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c83cafc5696b6d72fa7bd581ee9c3312.png)'
- en: Image by Yassin Zehar
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Yassin Zehar提供。
- en: 'Using the n8n workflow helped in two ways: being able to resolve the issues
    as soon as possible and gather the data in one place. The automation tool helped
    reduce the time spent on this task as the business was still running.'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 使用n8n工作流程在两个方面有所帮助：能够尽快解决问题，并将数据集中在一个地方。由于业务仍在运行，自动化工具有助于减少在此任务上的时间。
- en: Lessons for Product teams
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 产品团队的教训。
- en: '![](../Images/ad3a59e115ef658bdcde672a61042bdf.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ad3a59e115ef658bdcde672a61042bdf.png)'
- en: Image by Yassin Zehar
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Yassin Zehar提供。
- en: '**Start simple**: building an automation system and a dashboard needs to be
    clearly defined. You are not building a product for the customers, you are building
    a product for your collaborators. It is essential that you understand each team’s
    needs since they are your core users. With that in mind, have the product that
    will be your MVP and answer to all your needs first. Then you can improve it by
    adding features or metrics.'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从简单开始**：构建自动化系统和仪表板需要明确定义。你并不是在为顾客构建产品，而是在为你的合作者构建产品。了解每个团队的需求至关重要，因为它们是你的核心用户。考虑到这一点，首先构建一个能满足你所有需求的最小可行产品（MVP）。然后你可以通过添加功能或指标来改进它。'
- en: '**Unified metrics matter more** than perfect detection: we have to keep in
    mind that it will be thanks to them that the time will be saved, along with understanding.
    Having good detection is essential, but if the metrics are inaccurate, the time
    saved will be wasted by the teams looking for the metrics scattered across different
    environments'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**统一指标比完美的检测更重要**：我们必须牢记，正是由于它们，我们才能节省时间，并加深理解。良好的检测是必不可少的，但如果指标不准确，节省的时间将被寻找散布在不同环境中的指标的团队浪费掉。'
- en: '**Automation saves 10 hours per week** of manual investigation: by automating
    some manual and recurring tasks, you will save hours investigating, as with the
    incident alert workflow, we know directly where to investigate first and the hypothesis
    of the cause and even some action to take.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化每周节省10小时**的手动调查时间：通过自动化一些手动和重复性任务，你将节省调查时间，就像在事件警报工作流程中，我们直接知道首先调查哪里，以及原因的假设甚至可以采取的一些行动。'
- en: '**Document everything**: a proper and detailed documentation is a must and
    will allow all the parties involved to have a clear understanding and views about
    what is happening. Documentation is also a piece of data.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记录一切**：一份恰当且详细的文档是必不可少的，它将使所有相关方对正在发生的事情有一个清晰的理解和观点。文档也是数据的一部分。'
- en: Who am I ?
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我是谁？
- en: I’m Yassin, a Project Manager who expanded into Data Science to bridge the gap
    between business decisions and technical systems. Learning Python, SQL, and analytics
    has enabled me to design product insights and automation workflows that connect
    what teams need with how data behaves. Let’s connect on [Linkedin](http://www.linkedin.com/in/yassin-zehar)
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我是Yassin，一位拓展到数据科学领域的项目经理，旨在弥合商业决策与技术系统之间的差距。学习Python、SQL和数据分析使我能够设计产品洞察和自动化工作流程，将团队的需求与数据的行为联系起来。让我们在[领英](http://www.linkedin.com/in/yassin-zehar)上建立联系
