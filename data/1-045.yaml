- en: 'The Product Health Score: How I Reduced Critical Incidents by 35% with Unified
    Monitoring and n8n Automation'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 产品健康评分：通过统一监控和n8n自动化，我将关键事故减少了35%
- en: 原文：[https://towardsdatascience.com/the-product-health-score-how-i-reduced-critical-incidents-by-35-with-unified-monitoring-and-n8n-automation/](https://towardsdatascience.com/the-product-health-score-how-i-reduced-critical-incidents-by-35-with-unified-monitoring-and-n8n-automation/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-product-health-score-how-i-reduced-critical-incidents-by-35-with-unified-monitoring-and-n8n-automation/](https://towardsdatascience.com/the-product-health-score-how-i-reduced-critical-incidents-by-35-with-unified-monitoring-and-n8n-automation/)
- en: <mdspan datatext="el1764204303854" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764204303854" class="mdspan-comment">简介</mdspan>
- en: For SaaS (software as a service) companies, monitoring and managing their product
    data is crucial. For those who fail to understand this, by the time they notice
    an incident. Damage is already done. For struggling companies, **this can be fatal**.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 对于SaaS（软件即服务）公司来说，监控和管理他们的产品数据至关重要。对于那些未能理解这一点的人来说，等到他们注意到事故时，损害已经造成了。对于陷入困境的公司，**这可能是致命的**。
- en: To prevent this, I built an n8n workflow linked to their database that will
    analyze the data daily, spot if there is any incident. In this case, a log and
    notification system will start to investigate as soon as possible. I also built
    a dashboard so the team could see the results in real time.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了防止这种情况，我建立了一个与他们的数据库相连的n8n工作流程，该工作流程将每天分析数据，如果发现任何事故，将立即启动日志和通知系统进行调查。我还建立了一个仪表板，以便团队可以实时查看结果。
- en: '![](../Images/065719291eb9433124ff0e83bd82f95b.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/065719291eb9433124ff0e83bd82f95b.png)'
- en: Image by Yassin Zehar
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Yassin Zehar提供
- en: Context
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: 'A B2B SaaS platform specializing in data visualization and automated reporting
    serves roughly 4500 customers, dispersed in three segments:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 一个专注于数据可视化和自动化报告的B2B SaaS平台，大约服务于4500个客户，分散在三个细分市场：
- en: Small business
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小型企业
- en: Mid-market
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中端市场
- en: Enterprise
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 企业
- en: The weekly product usage exceeds 30000 active accounts with strong dependencies
    on real-time data (pipelines, APIs, dashboards, background jobs).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 周产品使用量超过30000个活跃账户，对实时数据（管道、API、仪表板、后台任务）有强烈依赖。
- en: 'The product team works closely with:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 产品团队与以下方面紧密合作：
- en: Growth (acquisition, activation, onboarding)
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成长（获取、激活、入职）
- en: Revenue (pricing, ARPU, churn)
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 收入（定价、ARPU、流失率）
- en: SRE/Infrastructure (reliability, availability)
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SRE/基础设施（可靠性、可用性）
- en: Data Engineering (pipelines, data freshness)
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据工程（管道，数据新鲜度）
- en: Support and customer success
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支持和客户成功
- en: '![](../Images/1baf33a358ab8c086deed654dda6e6d7.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1baf33a358ab8c086deed654dda6e6d7.png)'
- en: Image by Yassin Zehar
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Yassin Zehar提供
- en: 'Last year, the company observed a rising number of incidents. Between October
    and December, the total of incidents increased from 250 to 450, an **80% increase**.
    With this increase, there were more than 45 High and critical incidents that affected
    thousands of users. The most affected metrics were:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 去年，公司观察到事故数量呈上升趋势。在10月到12月之间，事故总数从250增加到450，增长了**80%**。随着这一增长，有超过45起高和关键事故影响了数千名用户。受影响最大的指标是：
- en: api_error_rate
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: api_error_rate
- en: checkout_success_rate
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: checkout_success_rate
- en: net_mrr_delta
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: net_mrr_delta
- en: data_freshness_lag_minutes
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: data_freshness_lag_minutes
- en: churn_rate
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: churn_rate
- en: '![](../Images/589eb6298df3dd19f67566779477bf3d.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/589eb6298df3dd19f67566779477bf3d.png)'
- en: Image by Yassin Zehar. For illustration
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Yassin Zehar提供，用于说明
- en: When incidents occur, a **company is judged** by its customers based on how
    it handles and reacts. While the **product team is esteemed** for how they managed
    it and ensured it won’t happen again.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 当事故发生时，客户会根据公司如何处理和反应来评判公司。而**产品团队**因其如何管理并确保不会再次发生而受到尊敬。
- en: Having an incident once can happen, but having the same incident twice is a
    fault.
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一次事故可能发生，但同样的事故再次发生就是错误。
- en: Business impact
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 业务影响
- en: More volatility in net recurring revenue
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 净 recurring 收入波动更大
- en: A noticeable **decline in active accounts** over several consecutive weeks
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连续几周出现明显的**活跃账户下降**
- en: Multiple enterprise customers reporting and complaining about the outdated dashboard
    (up to 45+minutes late)
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多个企业客户报告并投诉过时仪表板（延迟高达45+分钟）
- en: '![](../Images/88570ba73b51511e09d9f456e3553a86.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/88570ba73b51511e09d9f456e3553a86.png)'
- en: Image by Yassin Zehar
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Yassin Zehar提供
- en: In total, between 30000 and 60000 users were impacted. Customer confidence in
    product reliability also suffered. Among non-renewals, **45% pointed out that’s
    their main reason**.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 总共有30000到60000个用户受到影响。客户对产品可靠性的信心也受到了损害。在非续订中，**45%的人指出这是主要原因**。
- en: Why is this issue critical?
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为什么这个问题是关键的？
- en: 'As a data platform, the company cannot afford to have:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据平台，公司无法承受拥有：
- en: slow or stale data
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 慢或过时的数据
- en: Api error
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: API 错误
- en: Pipeline failures
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管道失败
- en: Missed or delayed synchronizations
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错过的或延迟的同步
- en: Inaccurate dashboard
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不准确的仪表板
- en: Churns (downgrades, cancellations)
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续亏损（降级、取消）
- en: '![](../Images/6947ea2052c7b52b74f0dda8fd3fadcc.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6947ea2052c7b52b74f0dda8fd3fadcc.png)'
- en: Image by Yassin Zehar
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 Yassin Zehar 提供
- en: 'Internally, the incidents were spread across several systems:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 内部，事件分散在几个系统中：
- en: Notions for product tracking
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于产品跟踪的 Notions
- en: Slack for alerts
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于警报的 Slack
- en: PostgreSQL for storage
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于存储的 PostgreSQL
- en: Even on Google Sheets for customer support
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 即使在 Google Sheets 的客户支持中
- en: '![](../Images/e21440556b8aa5c008babd78666721bc.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e21440556b8aa5c008babd78666721bc.png)'
- en: Image by Yassin Zehar
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 Yassin Zehar 提供
- en: There was not a single source of truth. The product team has to manually cross-reference
    and double-check all data, searching for trends and piecing together. It was an
    investigation and resolving a puzzle, making them lose so many hours weekly.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 没有一个单一的真实来源。产品团队必须手动交叉引用和双重检查所有数据，寻找趋势并拼凑在一起。这是一项调查和解决谜题的工作，使他们每周损失许多小时。
- en: '**Solution**: Automating an incident system alert with N8N and building a data
    dashboard. So, incidents are detected, tracked, resolved and understood.'
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**解决方案**：使用 N8N 自动化事件系统警报并构建数据仪表板。因此，事件被检测、跟踪、解决并理解。'
- en: Why n8n?
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么选择 n8n？
- en: Currently, there are several automation platforms and solutions. But not all
    are matching the needs and requirements. Selecting the right one following the
    need is essential.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，有几个自动化平台和解决方案。但并非所有都符合需求和要求。根据需求选择正确的一个是至关重要的。
- en: The specific requirements were to have access to a database without an API needed
    (n8n supports Api), to have visual workflows and nodes for a non-technical person
    to understand, custom-coded nodes, self-hosted options and cost-effective at scale.
    So, amongst the platforms existing like Zapier, Make or n8n, the choice was for
    the last.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 具体的要求是无需 API 即可访问数据库（n8n 支持 API），拥有非技术人员可以理解的视觉工作流和节点，自定义节点、自托管选项且具有规模成本效益。因此，在
    Zapier、Make 或 n8n 等现有平台中，选择的是最后一个。
- en: Designing the Product Health Score
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设计产品健康分数
- en: '![](../Images/756633ad1ff626b65d6467975df2e658.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/756633ad1ff626b65d6467975df2e658.png)'
- en: Image by Yassin Zehar
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 Yassin Zehar 提供
- en: First, the key metrics need to be determined and calculated.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，需要确定和计算关键指标。
- en: '**Impact score**: simple function of severity + delta + scale of users'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**影响分数**：严重性 + 变化量 + 用户规模的简单函数'
- en: '[PRE0]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Priority**: derived from severity + impact'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**优先级**：由严重性和影响推导而来'
- en: '[PRE1]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Product health score**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**产品健康分数**'
- en: '[PRE2]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Designing the Automated Detection System with n8n
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 n8n 设计自动化检测系统
- en: '![](../Images/477379df25fa6f4d6f2edac8bf6a1830.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/477379df25fa6f4d6f2edac8bf6a1830.png)'
- en: Image by Yassin Zehar
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 Yassin Zehar 提供
- en: 'This system is composed of **4 streams**:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 该系统由 **4 个流** 组成：
- en: '**Stream 1**: retrieves recent revenue metrics, identifies unusual spikes in
    churn MRR, and creates incidents when needed.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流 1**：检索最近的收入指标，识别 MRR 持续亏损的不寻常峰值，并在需要时创建事件。'
- en: '![](../Images/6888faacb53d97532b9cb6425e4b9fa8.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6888faacb53d97532b9cb6425e4b9fa8.png)'
- en: '[PRE3]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**Stream 2**: Monitors feature usage metrics to detect sudden drops in adoption
    or engagement.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流 2**：监控功能使用指标，以检测采用或参与度的突然下降。'
- en: Incidents are logged with severity, context, and alerts to the product team.
  id: totrans-78
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 事件以严重性、上下文和警报的形式记录给产品团队。
- en: '![](../Images/66cce41ef084de00e72456ffad1c9cbd.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/66cce41ef084de00e72456ffad1c9cbd.png)'
- en: Image by Yassin Zehar
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 Yassin Zehar 提供
- en: '**Stream 3**: For every open incident, collects additional context from the
    database (e.g., churn by country or plan), uses AI to generate a clear root cause
    hypothesis and suggested next steps, sends a summarized report to Slack and email
    and updates the incident'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流 3**：对于每个开放的事件，从数据库中收集额外的上下文（例如，按国家或计划进行的持续亏损），使用 AI 生成清晰的根本原因假设和建议的下一步行动，向
    Slack 和电子邮件发送总结报告，并更新事件'
- en: '![](../Images/426620a58dddf2eec16aa35c72b84f5d.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/426620a58dddf2eec16aa35c72b84f5d.png)'
- en: Image by Yassin Zehar
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 Yassin Zehar 提供
- en: '**Stream 4**: Every morning, the workflow compiles all incidents from the previous
    day, creates a Notion page for documentation and sends a report to the leadership
    team'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流 4**：每天早上，工作流汇总前一天的所有事件，创建用于文档的 Notion 页面，并向领导团队发送报告'
- en: '![](../Images/bf9e4fae042d668b95209acc18d58ec8.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bf9e4fae042d668b95209acc18d58ec8.png)'
- en: Image by Yassin Zehar
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 Yassin Zehar 提供
- en: We deployed similar detection nodes for 8 different metrics, adjusting the z-score
    direction based on whether increases or decreases were problematic.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为8个不同的指标部署了类似的检测节点，根据增加或减少是否成问题来调整z-score方向。
- en: The **AI agent receives additional context** through SQL queries (churn by country,
    by plan, by segment) to generate more accurate root cause hypotheses. And all
    of this data is gathered and sent in a daily email.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI代理通过SQL查询接收额外的上下文**（按国家、按计划、按细分市场划分的流失率）以生成更准确的根本原因假设。所有这些数据都会收集并在每日电子邮件中发送。'
- en: The workflow generates daily summary reports aggregating all incidents by metric
    and severity, distributed via email and Slack to stakeholders.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程生成每日汇总报告，按指标和严重程度汇总所有事件，通过电子邮件和Slack分发给利益相关者。
- en: The dashboard
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 仪表板
- en: 'The dashboard is consolidating all signals into one place. An automatic product
    health score with **a 0-100 base** is calculated with:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 仪表板正在将所有信号整合到一个地方。自动产品健康评分以**0-100为基础**计算，其计算方式包括：
- en: incident volume
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 事件数量
- en: severity weighting
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 严重程度加权
- en: open vs resolved status
  id: totrans-94
  prefs:
