- en: '**Diagnosis:**'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**诊断：**'
- en: 'The product health score noted the actual product **24/100** with the status
    **“at risk”** with:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 产品健康评分显示实际产品**24/100**，状态为**“风险”**，原因如下：
- en: '**45** High & Critical incidents'
  id: totrans-114
