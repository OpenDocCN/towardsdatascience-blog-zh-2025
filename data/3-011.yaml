- en: How and why RDD works
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RDD是如何工作的以及为什么它有效
- en: Regression Discontinuity Design exploits cutoffs — thresholds — to recover the
    effect of a treatment on an outcome. More precisely, it looks for a sharp change
    in the probability of treatment assignment on a ‘running’ variable. If treatment
    assignment depends solely on the running variable, and the cutoff is arbitrary,
    i.e. exogenous, then we can treat the units around it as randomly assigned. The
    difference in outcomes just above and below the cutoff gives us the causal effect.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 回归断点设计利用截止点——阈值——来恢复治疗对结果的影响。更确切地说，它寻找在“运行”变量上治疗分配概率的急剧变化。如果治疗分配仅取决于运行变量，并且截止点是任意的，即外生的，那么我们可以将围绕它的单位视为随机分配的。截止点上下结果之间的差异给我们提供了因果效应。
- en: 'For example, a scholarship awarded only to students scoring above 90, creates
    a cutoff based on test scores. That the cutoff is 90 is arbitrary — it could have
    been 80 for that matter; the line had just to be drawn somewhere. Moreover, scoring
    91 vs. 89 makes the whole difference as for the treatment: either you get it or
    not. But regarding *capability*, the two groups of students that scored 91 and
    89 are not really different, are they? And those who scored 89.9 versus 90.1 — if
    you insist?'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，仅授予得分超过90分的学生奖学金，就会基于考试成绩创建一个截止点。这个截止点是90分是任意的——实际上它可以是80分；只需要在某处划一条线。此外，得91分与得89分之间的差距对于待遇来说就是全部区别：要么你得到它，要么得不到。但是关于*能力*，得91分和得89分的两组学生实际上并没有真正不同，对吧？那些得89.9分与得90.1分的人——如果你坚持的话？
- en: Making the cutoff could come down to randomness, when it’s just a bout a few
    points. Maybe the student drank too much coffee right before the test — or too
    little. Maybe they got bad news the night before, were thrown off by the weather,
    or anxiety hit at the worst possible moment. It’s this randomness that makes the
    cutoff so *instrumental* in RDD.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 截止点的形成可能只是随机性的结果，当它只是关于几个分数点的时候。也许学生在考试前喝太多咖啡——或者太少。也许他们在前一天晚上收到了坏消息，被天气影响，或者焦虑在最糟糕的时刻爆发。正是这种随机性使得截止点在RDD中如此*关键*。
- en: 'Without a cutoff, you don’t have an RDD — just a scatterplot and a dream. But,
    the cutoff by itself is not equipped with all it takes to identify the causal
    effect. Why it works hinges on one core identification assumption: continuity.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 没有截止点，就没有RDD——只是一个散点图和一个梦想。但是，截止点本身并不具备识别因果效应所需的一切。它之所以有效，取决于一个核心识别假设：连续性。
- en: The continuity assumption, and parallel worlds
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 连续性假设，以及平行世界
- en: 'If the cutoff is the cornerstone of the technique, then its importance comes
    entirely from the continuity assumption. The idea is a simple, counterfactual
    one: had there been no treatment, then there would’ve been no effect.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果截止点是这项技术的基石，那么其重要性完全来自于连续性假设。这个想法是简单且反事实的：如果没有治疗，那么就不会有影响。
- en: 'To ground the idea of continuity, let’s jump straight into a classic example
    from public health: does legal alcohol access increase mortality?'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使连续性的想法具体化，让我们直接跳到一个公共卫生的经典例子：合法饮酒是否会增加死亡率？
- en: 'Imagine two worlds where everyone and everything is the same. Except for one
    thing: a law that sets the minimum legal drinking age at 18 years (we’re in Europe,
    folks).'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 想象两个世界，其中每个人和每件事都是相同的。除了一个东西：一条法律，将最低法定饮酒年龄设定为18岁（我们在这里是欧洲，朋友们）。
- en: In the world with the law (the factual world), we’d expect alcohol consumption
    to jump right after age 18\. Alcohol-related deaths should jump too, if there
    is a link.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在有法律（事实世界）的世界里，我们预计酒精消费将在18岁后立即增加。如果存在联系，与酒精相关的死亡人数也应该增加。
- en: Now, take the counterfactual world where there is no such law; there should
    be no such jump. Alcohol consumption and mortality would likely follow a smooth
    trend across age groups.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，考虑一个没有这种法律的反事实世界；这种跳跃应该不存在。酒精消费和死亡率可能会在各个年龄组中呈现平稳的趋势。
- en: Now, that’s a good thing for identifying the causal effect; the absence of a
    jump in deaths in the counterfactual world is the *necessary* condition to interpret
    a jump in the factual world as the impact of the law.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这对识别因果效应是个好事；反事实世界中死亡人数没有跳跃是解释事实世界中跳跃作为法律影响的**必要**条件。
- en: 'Put simply: if there is no treatment, there shouldn’t be a jump in deaths.
    If there is, then something other than our treatment is causing it, and the RDD
    is not valid.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说：如果没有治疗，死亡人数不应该有跳跃。如果有，那么除了我们的治疗之外，还有其他因素在起作用，RDD 就不再有效。
- en: '![](../Images/941eb7835de214dcc2352319b8b0a361.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/941eb7835de214dcc2352319b8b0a361.png)'
- en: 'Two parallel worlds. From left to right; one where there is no minimum age
    to consume alcohol legally, and one where there is: 18 years.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 两个平行世界。从左到右；一个是没有法定饮酒年龄限制的世界，另一个是有：18岁。
- en: 'The continuity assumption can be written in the potential outcomes framework
    as:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 连续性假设可以在潜在结果框架中写成：
- en: \begin{equation}
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: \lim_{x \to c^-} \mathbb{E}[Y_i(0) \mid X_i = x] = \lim_{x \to c^+} \mathbb{E}[Y_i(0)
    \mid X_i = x]
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: \lim_{x \to c^-} \mathbb{E}[Y_i(0) \mid X_i = x] = \lim_{x \to c^+} \mathbb{E}[Y_i(0)
    \mid X_i = x]
- en: '\label{eq: continuity_po}'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '\label{eq: continuity_po}'
- en: \end{equation}
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: Where \(Y_i(0)\) is the potential outcome, say, risk of death of subject \(/mathbb{i}\)
    under no treatment.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 \(Y_i(0)\) 是潜在结果，比如说，受试者 \(/mathbb{i}\) 在无治疗情况下的死亡风险。
- en: Notice that the right-hand side is a quantity of the counterfactual world; not
    one that can be observed in the factual world, where subjects are treated if they
    fall above the cutoff.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，右侧是反事实世界的数量；不是在事实世界中可以观察到的，在事实世界中，如果受试者超过截止值，就会接受治疗。
- en: 'Unfortunately for us, we only have access to the factual world, so the assumption
    cannot be tested directly. But, luckily, we can proxy it. We will see placebo
    groups achieve this later in the post. But first, we start by identifying *what*
    can break the assumption:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们来说，不幸的是，我们只能接触到事实世界，因此这个假设不能直接进行测试。但是，幸运的是，我们可以进行代理。我们将在文章后面看到安慰剂组如何实现这一点。但首先，我们开始识别**什么**会打破这个假设：
- en: '**Confounders:** something other than the treatment happens at the cutoff that
    also impacts the outcome. For instance, adolescents resorting to alcohol to alleviate
    the crushing pressure of being an adult now — something that has nothing to do
    with the law on the minimum age to consume alcohol (in the no-law world), but
    that does confound the effect we are after, happening at the same age — the cutoff,
    that is.'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**混杂因素：**除了治疗之外，在截止值发生的事情也会影响结果。例如，青少年为了减轻成为成年人带来的巨大压力而求助于酒精——这与法定饮酒年龄的法律（在无法律的世界中）无关，但它确实会混淆我们追求的效果，发生在同一年龄——即截止值。'
- en: '**Manipulating the running variable:**'
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**操纵运行变量：**'
- en: 'When units can influence their position with regard to the cutoff, it may be
    that units who did so are inherently different from those who did not. Hence,
    cutoff manipulation can result in selection bias: a form of confounding. Especially
    if treatment assignment is binding, subjects may try their best to get one version
    of the treatment over the other.'
  id: totrans-49
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当单位可以影响其相对于截止值的位置时，可能的情况是，这样做的人本质上与没有这样做的人不同。因此，截止值操纵可能导致选择偏差：一种混杂形式。特别是如果治疗分配是强制性的，受试者可能会尽力获得一种治疗版本而不是另一种。
- en: 'Hopefully, it’s clear what constitutes a RDD: the running variable, the cutoff,
    and most importantly, reasonable grounds to defend that continuity holds. With
    that, you’ve gotten yourself a neat and effective causal inference design for
    questions that can’t be answered by an A/B test, nor by some of the more common
    causal inference techniques like diff-in-diff, nor with stratification.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这很清楚，RDD 的构成是什么：运行变量、截止值，最重要的是，有合理的理由来捍卫连续性。有了这些，你就为自己获得了一个整洁且有效的因果推断设计，用于那些不能通过
    A/B 测试、也不能通过一些更常见的因果推断技术（如差分差分、分层）来回答的问题。
- en: In the next section, we continue shaping our understanding of how RDD works;
    how does RDD “control” confounding relationships? What exactly does it estimate?
    Can we not just control for the running variable too? These are questions that
    we tackle next.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们继续塑造我们对 RDD 如何工作的理解；RDD 如何“控制”混杂关系？它究竟估计了什么？我们难道不能只控制运行变量吗？这些问题是我们接下来要解决的问题。
- en: RDD and instruments
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RDD 和仪器
- en: 'If you are already familiar with instrumental variables (IV), you may see the
    similarities: both RDD and IV leverage an exogenous variable that does not cause
    the outcome directly, but does influence the treatment assignment, which in turn
    may influence the outcome. In IV this is a third variable Z; in RDD it’s the running
    variable that serves as an instrument.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经熟悉工具变量（IV），你可能看到它们的相似之处：RDD和IV都利用一个外生变量，这个变量不会直接导致结果，但会影响治疗分配，进而可能影响结果。在IV中，这是一个第三个变量Z；在RDD中，它是作为工具的运行变量。
- en: Wait. A third variable; maybe. But an exogenous one? That’s less clear.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 等等。第三个变量；也许吧。但它是外生的吗？这不太清楚。
- en: In our example of alcohol consumption, it is not hard to imagine that age —
    the running variable — is a confounder. As age increases, so might tolerance for
    alcohol, and with it the level of consumption. That’s a stretch, maybe, but not
    implausible.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们关于酒精消费的例子中，不难想象年龄——运行变量——是一个混杂因素。随着年龄的增长，对酒精的耐受性可能会增加，随之而来的是消费水平。这可能有点牵强，但并不不可信。
- en: Since treatment (legal minimum age) depends on age — only units above 18 are
    treated — treated and untreated units are inherently different. If age also influences
    the outcome, through a mechanism like the one sketched above, we got ourselves
    an apex confounder.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 由于治疗（法定最低年龄）取决于年龄——只有超过18岁的单位才会接受治疗——接受治疗和未接受治疗的单位在本质上是有区别的。如果年龄也通过上述类似机制影响结果，我们就遇到了一个顶级的混杂因素。
- en: Still, the running variable plays a key role. To understand why, we need to
    look at how RDD and instruments leverage the frontdoor criterion to identify causal
    effects.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，运行变量仍然起着关键作用。要理解为什么，我们需要看看RDD和工具如何利用前门标准来识别因果效应。
- en: '*Backdoor vs. frontdoor*'
  id: totrans-58
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '*后门与前门*'
- en: Perhaps almost instinctively, one may answer with *controlling* for the running
    variable; that’s what stratification taught us. The running variable is confounder,
    so we include it in our regression, and close the backdoor. But doing so would
    cause some trouble.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 可能几乎出于本能，人们可能会回答通过**控制**运行变量；这就是分层教给我们的。运行变量是混杂因素，所以我们将其包括在我们的回归中，并关闭后门。但这样做可能会引起一些麻烦。
- en: 'Remember, treatment assignment depends on the running variable so that everyone
    above the cutoff is treated with *all* certainty, and *certainly not* below it.
    So, if we control for the running variable, we run into two very related problems:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，治疗分配取决于运行变量，因此所有超过截止值的人都将接受**全部**治疗，而**肯定**不会低于这个值。所以，如果我们控制运行变量，我们会遇到两个非常相关的问题：
- en: '**Violation of the Positivity assumption:** this assumption says that treated
    units should have a non-zero probability to receive the opposite treatment, and
    vice versa. Intuitively, conditioning on the running variable is like saying:
    “Let’s estimate the effect of being above the minimum age for alcohol consumption,
    while holding age fixed at 14.” That does not make sense. At any given value of
    running variable, treatment is either always 1 or always 0\. So, there’s no variation
    in treatment conditional on the running variable to support such a question.'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**违反正态性假设**：这个假设表示接受治疗的单位应该有非零概率接受相反的治疗，反之亦然。直观地说，根据运行变量进行条件化就像说：“让我们估计超过酒精消费最低年龄的效果，同时将年龄固定在14岁。”这没有意义。在运行变量的任何给定值上，治疗要么总是1，要么总是0。因此，没有基于运行变量的治疗变化来支持这样的问题。'
- en: '**Perfect collinearity at the cutoff:** in estimating the treatment effect,
    the model has no way to separate the effect of crossing the cutoff from the effect
    of being at a particular value of X. The result? No estimate, or a forcefully
    dropped variable from the model design matrix. *Singular design matrix*, *does
    not have full rank*, these should sound familiar to most practitioners.'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**截止点的完美共线性**：在估计治疗效应时，模型无法将跨越截止点的影响与X的特定值的影响分开。结果是什么？没有估计，或者从模型设计矩阵中强制删除变量。*奇异设计矩阵*，*没有满秩*，这些对大多数从业者来说应该很熟悉。'
- en: So no — conditioning on the running variable doesn’t make the running variable
    the exogenous instrument that we’re after. Instead, the running variable becomes
    exogenous by pushing it to the limit—quite literally. There where the running
    variable approaches the cutoff from either side, the units are the same with respect
    to the running variable. Yet, falling just above or below makes the difference
    as for getting treated or not. This makes the running variable a valid instrument,
    if treatment assignment is the only thing that happens at the cutoff. Judea Pearl
    refers to instruments as meeting the front-door criterion.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，不对——对运行变量的条件设定并不会使运行变量成为我们追求的外生工具。相反，通过将其推向极限——字面意义上的极限，运行变量才成为外生变量。在运行变量从任一侧接近截止点的位置，单位与运行变量相同。然而，仅仅高于或低于这个界限就会在是否接受治疗上产生差异。这使得运行变量成为有效的工具，如果截止点处只有治疗分配这一件事情发生。朱迪亚·佩尔（Judea
    Pearl）将工具变量称为满足前门标准。
- en: '![](../Images/5685eb480e64c1bcfbf82a54b12b4719.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5685eb480e64c1bcfbf82a54b12b4719.png)'
- en: 'X is the running variable, D the treatment assignment, Y the outcome, and U
    is a set of unobserved influences on the outcome. The causal effect of D on Y
    is unidentified in the above marginal model, for X being a confounder, and U potentially
    too. Conditioning on X violates the positivity assumption. Instead, conditioning
    X on its limits towards cutoff (c0), controls for the backdoor path: X to Y directly,
    and through U.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: X 是运行变量，D 是治疗分配，Y 是结果，U 是影响结果的一组未观测到的因素。在上述边际模型中，由于 X 是混杂因素，U 可能也是，D 对 Y 的因果效应无法识别。条件设定
    X 违反了正性假设。相反，将 X 的条件设定为其接近截止点（c0）的极限，可以控制后门路径：X 直接到 Y，以及通过 U。
- en: '*LATE, not ATE*'
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '*迟到，而非迟到*'
- en: 'So, in essence, we’re controlling for the running variable — but only near
    the cutoff. That’s why RDD identifies the *local* average treatment effect (LATE),
    a special flavour of the average treatment effect (ATE). The LATE looks like:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，本质上，我们只是在截止点附近控制运行变量——这就是为什么RDD识别的是*局部*平均处理效应（LATE），这是平均处理效应（ATE）的一种特殊风味。LATE看起来像：
- en: $$\delta_{SRD}=E\big[Y^1_i – Y_i^0\mid X_i=c_0]$$
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: $$\delta_{SRD}=E\big[Y^1_i – Y_i^0\mid X_i=c_0]$$
- en: The *local* bit refers to the partial scope of the population we are estimating
    the ATE for, which is the subpopulation around the cutoff. In fact, the further
    away the data point is from the cutoff, the more the running variable acts as
    a confounder, working *against* the RDD instead of in its favour.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: “局部”一词指的是我们估计ATE的群体部分的范围，即截止点附近的子群体。事实上，数据点离截止点越远，运行变量作为混杂因素的作用就越强，它*反对*RDD而不是支持RDD。
- en: Back to the context of the minimum age for legal alcohol consumption example.
    Adolescents who are 17 years and 11 months old are really not so different from
    those that are 18 years and 1 month old, on average. If anything, a month or two
    difference in age is not going to be what sets them apart. Isn’t that the essence
    of conditioning on, or holding a variable constant? What sets them apart is that
    the latter group can consume alcohol legally for being above the cutoff, and not
    the former.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 回到最低法定饮酒年龄的例子。17岁11个月大的青少年与18岁1个月大的青少年在平均意义上并没有太大的区别。如果有什么不同的话，年龄差异一个月或两个月并不会使他们有所不同。这不就是条件设定或保持变量恒定的本质吗？使他们不同的地方在于后者可以合法饮酒，因为他们的年龄超过了截止点，而前者则不能。
- en: This setup enables us to estimate the LATE for the units around the cutoff and
    with that, the effect of the minimum age policy on alcohol-related deaths.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设置使我们能够估计截止点附近的LATE，以及由此估计最低年龄政策对酒精相关死亡的影响。
- en: We’ve seen how the continuity assumption has to hold to make the cutoff an interesting
    point along the running variable in identifying the causal effect of a treatment
    on the outcome. Namely, by letting the jump in the outcome variable be entirely
    attributable to the treatment. If continuity holds, the treatment is as-good-as-random
    near the cutoff, allowing us to estimate the local average treatment effect.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到，连续性假设必须成立，才能使截止点成为运行变量上识别治疗对结果因果效应的有意思的点。也就是说，通过让结果变量的跳跃完全归因于治疗。如果连续性成立，那么在截止点附近，治疗就像随机一样，这使我们能够估计局部平均处理效应。
- en: 'In the next section, we’ll walk through the practical setup of a real-world
    RDD: we identify the key concepts; the running variable and cutoff, treatment,
    outcome, covariates, and finally, we estimate the RDD after discussing some crucial
    modelling choices, and end the section with a placebo test.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将介绍真实世界RDD的实际设置：我们确定关键概念；运行变量和截止点、处理、结果、协变量，最后，在讨论了一些关键建模选择后，我们估计RDD，并以安慰剂测试结束本节。
- en: 'RDD in Action: Search Ranking and listing performance Example'
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RDD实战：搜索排名和列表性能示例
- en: In e-commerce and online marketplaces, the starting point of the buyer experience
    is searching for a listing. Think of the visitor typing “Nikon F3 analogue camera”
    in the search bar. Upon carrying out this action, algorithms frantically sort
    through the inventory looking for the best matching listings to populate the search
    results page.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在电子商务和在线市场中，买家体验的起点是搜索列表。想象一下访客在搜索栏中输入“尼康F3胶片相机”。在执行此操作后，算法会疯狂地整理库存，寻找最佳匹配的列表以填充搜索结果页面。
- en: '**Time and attention are two scarce resources.** So, it is in the interest
    of everyone involved — the buyer, the seller and the platform — to reserve the
    most prominent positions on the page for the matches with the highest anticipated
    chance to become successful trades.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**时间和注意力是两种稀缺资源**。因此，对涉及的每个人——买家、卖家和平台——来说，保留页面最突出的位置给那些预期最有可能成为成功交易的匹配项是有利的。'
- en: Additionally, position effects in consumer behaviour suggest that users infer
    **higher credibility and desirability from items “ranked” at the top**. Think
    about high-tier products being placed at eye-height or above in supermarkets,
    and highlighted items on an e-commerce platform, at the top of the homepage.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，消费者行为中的位置效应表明，用户会从“排名”在顶部的产品中推断出**更高的可信度和吸引力**。想想在超市里被放置在视线高度或以上的高等级产品，以及电子商务平台上的突出显示项目，位于主页顶部。
- en: 'So, the question then becomes: how does positioning on the search results page
    influence a listing’s chances to be sold?'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，问题随之而来：搜索结果页面的位置如何影响列表的销售机会？
- en: '*Hypothesis*:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '*假设*：'
- en: If a listing is ranked higher on the search results page, then it will have
    a higher chance of being sold, because higher-ranked listings get more visibility
    and attention from users.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个列表在搜索结果页面上的排名更高，那么它被售出的机会也会更高，因为排名更高的列表会从用户那里获得更多的可见性和关注。
- en: '<details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Intermezzo:
    business or theory?</summary>'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>间奏：商业还是理论？</summary>
- en: As with any good hypothesis, we need a bit of theory to ground it. Good for
    us is that we are not trying to find the cure for cancer. Our theory is about
    well-understood psychological phenomena and behavioural patterns, to put it overly
    sophisticated.
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 正如任何好的假设一样，我们需要一点理论来巩固它。幸运的是，我们并不是在寻找治愈癌症的方法。我们的理论是关于人们已经理解的心理学现象和行为模式，说得过于复杂。
- en: ''
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Think of *[primacy effect](https://thedecisionlab.com/biases/primacy-effect)*,
    *[anchoring bias](https://thedecisionlab.com/reference-guide/philosophy/anchoring)*
    and the [resource theory of attention](https://www.mcw.edu/-/media/MCW/Education/Academic-Affairs/OEI/Faculty-Quick-Guides/Cognitive-Load-Theory.pdf).
    These are well ideas in behavioural and cognitive psychology that back up our
    plan here.
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 想想*[首因效应](https://thedecisionlab.com/biases/primacy-effect)*，*[锚定偏差](https://thedecisionlab.com/reference-guide/philosophy/anchoring)*和[注意力的资源理论](https://www.mcw.edu/-/media/MCW/Education/Academic-Affairs/OEI/Faculty-Quick-Guides/Cognitive-Load-Theory.pdf)。这些都是行为和认知心理学中的好想法，支持我们在这里的计划。
- en: ''
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Kicking off the conversation with a product manager will be more fun this way.
    Personally, I also get excited when I have to brush up on some psychology.
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 以这种方式与产品经理开始对话将会更有趣。就我个人而言，当我需要复习一些心理学知识时，我也会感到兴奋。
- en: ''
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'But I’ve found through and through that a theory is really secondary to any
    initiative in my industry (tech). Except for a research team and project, arguably.
    And it’s fair to say it helps us stay on-purpose: what we are doing is to bring
    business forward, not mother science.</details>'
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 但我彻底发现，在我的行业（科技）中，理论真的不如任何一项倡议重要（除了研究团队和项目，可以说）。而且公平地说，它有助于我们保持目标明确：我们所做的是推动商业发展，而不是母亲科学。</details>
- en: Knowing the answer has real business value. Product and commercial teams could
    use it to design new paid features that help sellers get their listings on higher
    positions — a win for both the business and the user. It could also clarify the
    value of on-site real estate like banner positions and ad slots, helping drive
    growth in B2B advertising.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 知道答案具有真正的商业价值。产品和商业团队可以利用它来设计新的付费功能，帮助卖家将商品列表置于更高的位置——这对企业和用户都是双赢。它还可以阐明网站上的房地产价值，如横幅位置和广告位，有助于推动B2B广告的增长。
- en: 'The question is about incrementality: would’ve listing \(\mathbb{j}\) been
    sold, had it been ranked 1st on the results page, instead of 15th. So, we want
    to make a causal statement. That’s hard for at least two reasons:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是关于增量：如果商品列表 \(\mathbb{j}\) 在结果页面上排名第1，而不是第15，它会被卖出吗？因此，我们想要做出因果陈述。这至少有两个原因很难：
- en: A/B testing comes with a price, and;
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: A/B测试是有代价的，并且；
- en: there are confounders we need to deal with if we resort to observational methods.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果我们诉诸观察方法，我们需要处理一些混淆因素。
- en: Let’s expand on that.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进一步探讨这个问题。
- en: The cost of A/B testing
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: A/B测试的成本
- en: One experiment design could randomise the fetched listings across the page slots,
    independent of the listing relevance. Breaking the inherent link between relevance
    and position, we would learn the effect of position on listing performance. It’s
    an interesting idea — but a costly one.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 一种实验设计可以在页面位置中随机选择获取的商品列表，独立于列表的相关性。打破相关性与其位置之间的内在联系，我们将了解位置对列表性能的影响。这是一个有趣的想法——但代价高昂。
- en: While it’s a reasonable design for statistical inference, this setup is kind
    of terrible for the user and business. The user might have found what they needed—maybe
    even made a purchase. But instead, maybe half of the inventory they would have
    seen was remotely a good match because of our experiment. This suboptimal user
    experience likely hurts engagement in both the short and long term — especially
    for new users who are still to see what value the platform holds for them.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这是一个合理的统计推断设计，但这种设置对用户和企业来说相当糟糕。用户可能已经找到了他们需要的东西——甚至可能已经进行了购买。但相反，由于我们的实验，他们可能看到的一半库存可能只是勉强匹配。这种次优的用户体验可能会在短期和长期内损害参与度——特别是对于仍然需要了解平台对他们有什么价值的初学者。
- en: Can we think of a way to mitigate this loss? Still committed to A/B testing,
    one could expose a smaller set of users to the experiment. While it will scale
    down the consequences, it may also stand in the way of reaching sufficient statistical
    power by lowering the sample size. Moreover, even small audiences can be responsible
    for substantial revenue for some companies still — those with millions of users.
    So, cutting the exposed audience is not a silver bullet either.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能否想出一个方法来减轻这种损失？仍然坚持A/B测试，可以暴露给更小的一组用户进行实验。虽然这会降低后果的规模，但它也可能通过降低样本量来阻碍达到足够的统计功效。此外，即使是小众群体也可能为一些公司带来可观的收入——那些拥有数百万用户的公司。因此，减少暴露的受众群体也不是万能的解决方案。
- en: 'Naturally, the way to go is to leave the platform and its users undisturbed
    —  and still find a way to answer the question at hand. Causal inference is the
    right mindset for this, but the question is: how do we do that exactly?'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 自然地，正确的做法是让平台及其用户不受干扰——同时还要找到回答当前问题的方法。因果推断是这种思维方式的正确选择，但问题是：我们究竟该如何做到这一点？
- en: Confounders
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 混淆因素
- en: Listings don’t just make it to the top of the page on a good day; it’s their
    quality, relevance, and the sellers’ reputation that promote the ranking of a
    listing. Let’s call these three variables **W**.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 列表不仅仅在好日子里出现在页面的顶部；是列表的质量、相关性和卖家的声誉推动了列表的排名。让我们称这三个变量为**W**。
- en: What makes **W** tricky is that it influences both the ranking of the listing
    and also the probability that the listing gets clicked, a proxy for performance.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**W**之所以棘手，是因为它既影响列表的排名，也影响列表被点击的概率，这是性能的代理指标。'
- en: In other words, **W** affects both our treatment (position) and outcome (click),
    helping itself with the status of *confounder*.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，**W**影响我们的处理（位置）和结果（点击），通过充当*混淆因素*的身份来帮助自己。
- en: '![](../Images/b97616c05176b30ec4d9ae8495116525.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b97616c05176b30ec4d9ae8495116525.png)'
- en: A variable, or set thereof, W, is a confounder when it influences both, the
    treatment (rank, position) and outcome of interest (click).
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个变量或一组变量W影响处理（排名、位置）和感兴趣的结果（点击）时，它就是一个混淆因素。
- en: Therefore, our task is to find a design that’s fit for purpose; one that effectively
    controls the confounding effect of **W**.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们的任务是找到一个适合目的的设计；一个能够有效控制 **W** 的混杂效应的设计。
- en: '*You don’t choose regression discontinuity — it chooses you*'
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '*你不会选择回归不连续性——它会选择你*'
- en: Not all causal inference designs are just sitting around waiting to be picked.
    Sometimes they show up when you least need them, and sometimes you get lucky when
    you need them most — like today.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有因果推断设计都只是坐着等待被选中。有时它们在你最不需要它们的时候出现，有时在你最需要它们的时候你可能会很幸运——就像今天这样。
- en: It looks like we can use the page cutoff to identify the causal impact of position
    on clicks-through rate.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来我们可以使用页面截止点来识别位置对点击通过率的影响的因果效应。
- en: Abrupt cutoff in search results pagination
  id: totrans-109
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 搜索结果分页中的突然截止
- en: 'Let’s unpack the listing recommendation mechanism to see exactly how. Here’s
    what happens under the hood when a results page is generated for a search:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们剖析列表推荐机制，看看具体是如何工作的。以下是生成搜索结果页面时幕后发生的事情：
- en: '**Fetch listings matching the query**'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**获取匹配查询的列表**'
- en: A coarse set of listings is pulled from the inventory, based on filters like
    location, radius, and category, etc.
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 根据位置、半径、类别等过滤器，从库存中提取了一组粗略的列表。
- en: '**Score listings on personal relevance**This step uses user history and listing
    quality proxies to predict what the user is most likely to click.'
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**按个人相关性评分列表** 此步骤使用用户历史和列表质量代理来预测用户最有可能点击的内容。'
- en: '**Rank listings by score**Higher scores get higher ranks. Business rules mix
    in ads and commercial content with organic results.'
  id: totrans-114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**按得分对列表进行排名** 得分越高，排名越高。业务规则将广告和商业内容与有机结果混合。'
- en: '**Populate pages** Listings are slotted by absolute relevance score. A results
    page ends at the *k*^(th) listing, so the *k[+1]*^(th) listing appears at the
    top of the *next* page. This is is going to be crucial to our design.'
  id: totrans-115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**填充页面** 列表根据绝对相关性得分进行排序。一个结果页面以第 *k* 个列表结束，因此第 *k+1* 个列表出现在下一页的顶部。这对我们的设计至关重要。'
- en: '**Impressions and user interaction** Users see the results in order of relevance.
    If a listing catches their eye, they might click and view more details: one step
    closer to the trade.'
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**印象和用户互动** 用户按相关性顺序查看结果。如果某个列表吸引了他们的注意，他们可能会点击并查看更多详情：更接近交易的一步。'
- en: Practical setup and variables
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实际设置和变量
- en: So, what is exactly our design? Next, we walk through the reasoning and identification
    of the key ingredients of our design.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们的设计究竟是什么呢？接下来，我们将逐步分析我们设计的关键成分的推理和识别。
- en: The running variable
  id: totrans-119
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 运行变量
- en: 'In our setup, the running variable is the relevance score \(s_j\) for listing
    j. This score is a continuous, complex function of both user and listing properties:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的设置中，运行变量是列表 j 的相关性得分 \(s_j\)。这个得分是用户和列表属性的一个连续、复杂的函数：
- en: $$s_j = f(u_i, l_j)$$
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: $$s_j = f(u_i, l_j)$$
- en: 'The listing’s rank \(r_j\) is simply a rank transformation of \(s_j\), defined
    as:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 列表的排名 \(r_j\) 是 \(s_j\) 的排名转换，定义为：
- en: $$r_i = \sum_{j=1}^{n} \mathbf{1}(s_j \leq s_i)$$
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: $$r_i = \sum_{j=1}^{n} \mathbf{1}(s_j \leq s_i)$$
- en: Practically speaking, this means that for analytic purposes—such as fitting
    models, making local comparisons, or identifying cutoff points—knowing a listing’s
    rank conveys nearly the same information as knowing its underlying relevance score,
    and vice versa.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 从实际角度来说，这意味着在分析目的上——例如拟合模型、进行局部比较或识别截止点——了解列表的排名几乎传达了与了解其基础相关性得分相同的信息，反之亦然。
- en: '<details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Details:
    Relevance score vs. rank</summary>'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>详情：相关性得分与排名</summary>
- en: The relevance score \(s_j\) reflects how well a listing matches a specific user’s
    query, given parameters like location, price range, and other filters. But this
    score is relative—it only has meaning within the context of the listings returned
    for that particular search.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性得分 \(s_j\) 反映了列表与特定用户查询的匹配程度，考虑到位置、价格范围和其他过滤器等因素。但这个得分是相对的——它只在该特定搜索返回的列表的上下文中才有意义。
- en: 'In contrast, rank (or position) is absolute. It directly determines a listing’s
    visibility. I think of rank as a standardising transformation of \(s_j\). For
    example, Listing A in search Z might have the highest score of 5.66, while Listing
    B in search K tops out at 0.99\. These raw scores aren’t comparable across searches—but
    both listings are ranked first in their respective result sets. That makes them
    equivalent in terms of what really matters here: how visible they are to users.</details>'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，排名（或位置）是绝对的。它直接决定了列表的可见性。我认为排名是\(s_j\)的标准化转换。例如，搜索Z中的列表A可能有最高的5.66分，而搜索K中的列表B最高为0.99。这些原始分数在搜索之间是不可比较的——但这两个列表在其各自的结果集中都排名第一。这使得它们在真正重要的方面是等效的：对用户来说它们有多可见。</details>
- en: The cutoff, and treatment
  id: totrans-128
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 截止值和处理的说明
- en: 'If a listing just misses the first page, it doesn’t fall to the bottom of page
    two — it is artificially bumped to the top. That’s a lucky break. Normally, only
    the most relevant listings appear at the top, but here a listing of merely moderate
    relevance ends up in a prime slot —albeit on the second page — purely due to the
    arbitrary position of the page break. Formally, the treatment assignment \(D_j\)
    goes like:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个列表刚好错过第一页，它不会掉到第二页的底部——它被人为地提升到顶部。这是一个幸运的机会。通常，只有最相关的列表出现在顶部，但在这里，一个仅仅具有适度相关性的列表最终占据了首要位置——尽管是在第二页——纯粹是由于页面断裂的任意位置。正式来说，处理分配\(D_j\)如下：
- en: $$D_j = \begin{cases} 1 & \text{if } r_j > 30 \\ 0 & \text{otherwise} \end{cases}$$
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: $$D_j = \begin{cases} 1 & \text{if } r_j > 30 \\ 0 & \text{otherwise} \end{cases}$$
- en: '*(Note on global rank: Rank 31 isn’t just the first listing on page two; it
    is still the 31st listing overall)*'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '*(关于全局排名的说明：排名31不仅仅是第二页的第一个列表；它仍然是整体上的第31个列表)*'
- en: 'The strength of this setup lies in what happens near the cutoff: a listing
    ranked 30 may be nearly identical in relevance to one ranked 31\. A small scoring
    fluctuation — or a high-ranking outlier — can push a listing over the threshold,
    flipping its treatment status. This local randomness is what makes the setup valid
    for RDD.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设置的优点在于接近截止值时发生的情况：排名为30的列表可能与排名为31的列表在相关性上几乎相同。微小的评分波动——或高排名的异常值——可以将列表推过阈值，改变其处理状态。这种局部随机性是使设置适用于RDD的原因。
- en: 'The outcome: Impression-to-click'
  id: totrans-133
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结果：印象到点击
- en: Finally, we operationalise the outcome of interest as the click-though rate
    from impressions to clicks. Remember that all listings are ‘impressed’ when when
    the page is populated. The click is the binary indicator of the desired user behaviour.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将将感兴趣的成果操作化为从印象到点击的点击率。记住，当页面被填充时，所有列表都被“印象”到。点击是表示所需用户行为的二元指标。
- en: 'In summary, this is our setup:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，这是我们的设置：
- en: '**Outcome:** impression-to-click conversion'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果：** 印象到点击转换'
- en: '**Treatment:** Landing on the first vs. second page'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**处理：** 落在第一页与第二页'
- en: '**Running variable**: listing rank; page cutoff at 30'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运行变量：** 列表排名；页面截止值为30'
- en: Next we walk through how to estimate the RDD.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将介绍如何估计RDD。
- en: Estimating RDD
  id: totrans-140
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 估计RDD
- en: 'In this section, we’ll estimate the causal parameter, interpret it, and connect
    them back to our core hypothesis: how position affects listing visibility.'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将估计因果参数，解释它，并将其与我们核心假设联系起来：位置如何影响列表的可见性。
- en: 'Here’s what we’ll cover:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们将要涵盖的内容：
- en: '**Meet the data:** Intro to the dataset'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**认识数据：** 数据集简介'
- en: '**Covariates:** Why and how to include them'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协变量：** 为什么以及如何包括它们'
- en: '**Modelling choices**: parametric RDD vs. not. Choosing the polynomial degree
    and bandwidth.'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建模选择：** 参数RDD与非参数RDD。选择多项式次数和带宽。'
- en: '**Placebo-testing**'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安慰剂测试**'
- en: '**Density continuity testing**'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**密度连续性测试**'
- en: Meet the data
  id: totrans-148
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 认识数据
- en: We’re working with impressions data from one of Adevinta’s (ex-eBay Classifieds
    Group) marketplaces. It’s real data, which makes the whole exercise feel grounded.
    That said, values and relationships are censored and scrambled where necessary
    to protect its strategic value.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在使用来自Adevinta（前eBay分类广告集团）的一个市场印象数据。这是真实数据，使得整个练习感觉更加脚踏实地。尽管如此，值和关系在必要时会被屏蔽和混淆，以保护其战略价值。
- en: 'An important note to how we interpret the RDD estimates and drive decisions,
    is how the data was collected: only those searches where the user saw both the
    first and second page were included.'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 关于我们如何解释RDD估计和驱动决策的一个重要注意事项是数据的收集方式：只有当用户看到了第一页和第二页的搜索才被包括在内。
- en: This way, we partial out the page fixed effect if any, but the reality is that
    many users don’t make it to the second page at all. So there is a big volume gap.
    We discuss the repercussion in the analysis recap.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，我们就可以部分消除任何页面固定效应，但现实是许多用户根本不会翻到第二页。因此，存在很大的体积差距。我们在分析回顾中讨论了其影响。
- en: 'The dataset consists of these variables:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集包括以下变量：
- en: '**Clicked**: 1 if the listing was clicked, 0 otherwise – binary'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**点击量**：如果列表被点击，则为1，否则为0 – 二进制'
- en: '**Position**: the rank of the listing – numeric'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**位置**：列表的排名 – 数值'
- en: '**D**: treatment indicator, 1 if position > 30, 0 otherwise – binary'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**D**：处理指标，如果位置>30，则为1，否则为0 – 二进制'
- en: '**Category**: product category of the listing – nominal'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类别**：列表的产品类别 – 名义'
- en: '**Organic**: 1 if organic, 0 if from a professional seller – binary'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有机**：如果是有机产品，则为1，如果是专业卖家，则为0 – 二进制'
- en: '**Boosted**: 1 if was paid to be at the top, 0 otherwise – binary'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Boosted**：如果支付费用以位于顶部，则为1，否则为0 – 二进制'
- en: '| click | rel_position | D | category | organic | boosted |'
  id: totrans-159
  prefs: []
  type: TYPE_TB
  zh: '| click | rel_position | D | category | organic | boosted |'
- en: '| 1 | -3 | 0 | A | 1 | 0 |'
  id: totrans-160
  prefs: []
  type: TYPE_TB
  zh: '| 1 | -3 | 0 | A | 1 | 0 |'
- en: '| 1 | -14 | 0 | A | 1 | 0 |'
  id: totrans-161
  prefs: []
  type: TYPE_TB
  zh: '| 1 | -14 | 0 | A | 1 | 0 |'
- en: '| 0 | 3 | 1 | C | 1 | 0 |'
  id: totrans-162
  prefs: []
  type: TYPE_TB
  zh: '| 0 | 3 | 1 | C | 1 | 0 |'
- en: '| 0 | 10 | 1 | D | 0 | 0 |'
  id: totrans-163
  prefs: []
  type: TYPE_TB
  zh: '| 0 | 10 | 1 | D | 0 | 0 |'
- en: '| 1 | -1 | 0 | K | 1 | 1 |'
  id: totrans-164
  prefs: []
  type: TYPE_TB
  zh: '| 1 | -1 | 0 | K | 1 | 1 |'
- en: A sample of the dataset we are working with.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在处理的样本数据集。
- en: 'Covariates: how to include them to increase accuracy?'
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 协变量：如何包含它们以提高准确性？
- en: The running variable, the cutoff, and the continuity assumption, give you *all*
    you need to identify the causal effect. But including covariates can sharpen the
    estimator by reducing variance — if done right. And, oh is it easy to do it wrong.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 运行变量、截止点和连续性假设，为你提供了识别因果效应所需的所有信息。但包括协变量可以通过减少方差来提高估计器的精度——如果做得正确。然而，做错它很容易。
- en: The easiest thing to “break” about the RDD design, is the continuity assumption.
    Simultaneously, that’s the *last* thing we want to break (I already rambled long
    enough about this).
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 在RDD设计中“破坏”最容易的事情是连续性假设。同时，这也是我们最不想破坏的事情（我已经对此说了很多）。
- en: 'Therefore, the main quest in adding covariates is to it in such way that we
    reduce variance, while keeping the continuity assumption intact. One way to formulate
    that, is to assume continuity without covariates *and* *with* covariates:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，添加协变量的主要任务是使其以这种方式进行，从而减少方差，同时保持连续性假设完整。一种表述方式是，假设在没有协变量和有协变量的情况下都保持连续性：
- en: \begin{equation}
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: \lim_{x \to c^-} \mathbb{E}[Y_i(0) \mid X_i = x] = \lim_{x \to c^+} \mathbb{E}[Y_i(0)
    \mid X_i = x] \text{(no covariates)}
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: \lim_{x \to c^-} \mathbb{E}[Y_i(0) \mid X_i = x] = \lim_{x \to c^+} \mathbb{E}[Y_i(0)
    \mid X_i = x] \text{(无协变量)}
- en: \end{equation}
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: \begin{equation}
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: \lim_{x \to c^-} \mathbb{E}[Y_i(0) \mid X_i = x, Z_i] = \lim_{x \to c^+} \mathbb{E}[Y_i(0)
    \mid X_i = x, Z_i] \text{(covariates)}
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: \lim_{x \to c^-} \mathbb{E}[Y_i(0) \mid X_i = x, Z_i] = \lim_{x \to c^+} \mathbb{E}[Y_i(0)
    \mid X_i = x, Z_i] \text{(协变量)}
- en: \end{equation}
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: 'Where \(Z_i\) is a vector of covariates, for subject i. Less mathy, two things
    should remain unchanged after adding covariates:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 \(Z_i\) 是针对主体i的协变量向量。不那么数学化地说，在添加协变量后，两件事应该保持不变：
- en: The functional form of the running variable, and;
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行变量的函数形式，以及；
- en: The (absence of the) jump in treatment assignment at the cutoff
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在截止点处理分配的（不存在）跳跃
- en: 'I did not find out the above myself; Calonico, Cattaneo, Farrell, and Titiunik
    (2018) did. They developed a formal framework for incorporating covariates into
    RDD. I’ll leave the details to the paper. For now, some modelling guidelines can
    keep us going:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不是自己发现上述内容的；Calonico、Cattaneo、Farrell和Titiunik（2018）做到了。他们为将协变量纳入RDD开发了一个正式框架。我将细节留给论文。现在，一些建模指南可以让我们继续前进：
- en: '**Model covariates linearly** so that the treatment effect remains the same
    with and without covariates, thanks to a simple and smooth partial effect of the
    covariates;'
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**线性化模型协变量**，以便在有无协变量的情况下，处理效果保持不变，这得益于协变量的简单和光滑的局部效应；'
- en: '**Keep the model terms additive**, so that the treatment effect remains the
    LATE, and does not become *conditional on covariates* (CATE); and to avoid *adding*
    a jump at the cutoff.'
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**保持模型项可加性**，以便处理效果保持为LATE，而不是根据协变量条件（CATE）；并且避免在截止点添加跳跃。'
- en: The above implies that there be *no* interactions with the treatment indicator,
    nor with the running variable. Doing any of these may break continuity and invalidate
    our RDD design.
  id: totrans-182
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上述内容意味着没有与处理指标或运行变量的交互。进行任何这些操作都可能破坏连续性并使我们的RDD设计无效。
- en: 'Our target model may look like this:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标模型可能如下所示：
- en: \begin{equation}
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: Y_i = \alpha + \tau D_i + f(X_i – c) + \beta^\top Z_i + \varepsilon_i
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: Y_i = \alpha + \tau D_i + f(X_i – c) + \beta^\top Z_i + \varepsilon_i
- en: \end{equation}
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: 'For letting the covariates interact with the treatment indicator, the sort
    of model we want to *avoid* looks like this:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让协变量与处理指标相互作用，我们想要避免的模型如下：
- en: \begin{equation}
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: Y_i = \alpha + \tau D_i + f(X_i – c) + \beta^\top (Z_i \cdot D_i) + \varepsilon_i
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: Y_i = \alpha + \tau D_i + f(X_i – c) + \beta^\top (Z_i \cdot D_i) + \varepsilon_i
- en: \end{equation}
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: 'Now, let’s distinguish between two ways of practically including covariates:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们区分两种实际包含协变量的方式：
- en: '**Direct inclusion**: Add them directly to the outcome model alongside the
    treatment and running variable.'
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**直接包含**：直接将它们添加到结果模型中，与处理变量和运行变量并列。'
- en: '**Residualisation**: First regress the outcome on the covariates, then use
    the residuals in the RDD.'
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**残差化**：首先将结果变量对协变量进行回归，然后在RDD中使用残差。'
- en: We’ll use residualisation in our case. It’s an effective way reduce noise, produces
    cleaner visualisations, and protects the strategic value of the data.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在我们的案例中使用残差化。这是一种有效的减少噪声、产生更清晰的视觉化和保护数据战略价值的方法。
- en: 'The snippet below defines the outcome de-noising model and computes the residualised
    outcome, `click_res`. The idea is simple: once we strip out the variance explained
    by the covariates, what remains is a less noisy version of our outcome variable—at
    least in theory. Less noise means more accuracy.'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码片段定义了结果去噪模型并计算了残差化结果，`click_res`。想法很简单：一旦我们剔除了由协变量解释的方差，剩下的就是我们结果变量的一个更少噪声的版本——至少在理论上是如此。噪声更少意味着精度更高。
- en: 'In practice, though, the residualisation barely moved the needle this time.
    We can see that by checking the change in standard deviation:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，尽管这次残差化几乎没有移动指针。我们可以通过检查标准差的变化来看到这一点：
- en: '`SD(click_res) / SD(click) - 1` gives us about -3%, which is small practically
    speaking.'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '`SD(click_res) / SD(click) - 1`给出了大约-3%，这在实际应用中是很小的。'
- en: '[PRE0]'
  id: totrans-198
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Even though the denoising didn’t have much effect, we’re still in a good spot.
    The original outcome variable already has low conditional variance, and patterns
    around the cutoff are visible to the naked eye, as we can see below.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管去噪没有产生太大效果，但我们仍然处于一个好的位置。原始的因变量已经具有很低的条件方差，并且截止点周围的模式可以用肉眼看到，如下所示。
- en: '![](../Images/469ff0e02227729abaf9233cc6e9ca14.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/469ff0e02227729abaf9233cc6e9ca14.png)'
- en: 'On the x-axis: ranks relative to the page end (30 positions on one page), and
    on the y-axis: the residualised average click through.'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在x轴上：相对于页面末尾的排名（每页30个位置），在y轴上：残差化的平均点击率。
- en: 'We move on to a few other modelling decisions that generally have a bigger
    impact: choosing between parametric and non-parametric RDD, the polynomial degree
    and the bandwidth parameter (h).'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 我们继续讨论一些其他建模决策，这些决策通常有更大的影响：在参数RDD和非参数RDD之间进行选择，多项式度数和带宽参数（h）。
- en: Modelling choices in RDD
  id: totrans-203
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RDD中的建模选择
- en: Parametric vs non-parametric RDD
  id: totrans-204
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 参数RDD与非参数RDD的比较
- en: You might wonder why we even have to choose between parametric and non-parametric
    RDD. The answer lies in how each approach trades off **bias and variance** in
    estimating the treatment effect.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想知道为什么我们甚至需要在参数RDD和非参数RDD之间进行选择。答案在于每种方法在估计处理效应时如何权衡**偏差和方差**。
- en: 'Choosing **parametric RDD** is essentially choosing to reduce variance. It
    assumes a specific functional form for the relationship between the outcome and
    the running variable, \(\mathbb{E}[Y \mid X]\), and fits that model across the
    entire dataset. The treatment effect is captured as a discrete jump in an otherwise
    continuous function. The typical form looks like this:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 选择**参数RDD**本质上是在选择减少方差。它假设结果变量和运行变量之间关系的特定函数形式，\(\mathbb{E}[Y \mid X]\)，并在整个数据集上拟合该模型。处理效应被捕捉为在连续函数中的离散跳跃。典型的形式如下：
- en: $$Y = \beta_0 + \beta_1 D + \beta_2 X + \beta_3 D \cdot X + \varepsilon$$
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: $$Y = \beta_0 + \beta_1 D + \beta_2 X + \beta_3 D \cdot X + \varepsilon$$
- en: '**Non-parametric RDD**, on the other hand, is about reducing bias. It avoids
    strong assumptions about the global relationship between Y and X and instead estimates
    the outcome function separately on either side of the cutoff. This flexibility
    allows the model to more accurately capture what’s happening right around the
    threshold. The non-parametric estimator is:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: '**非参数RDD**，另一方面，是关于减少偏差。它避免了对Y和X之间全局关系的强烈假设，而是在截止点的两侧分别估计结果函数。这种灵活性使得模型能够更准确地捕捉到阈值周围的实际情况。非参数估计器如下：'
- en: \(\tau = \lim_{x \downarrow c} \mathbb{E}[Y \mid X = x] – \lim_{x \uparrow c}
    \mathbb{E}[Y \mid X = x]\)
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: \(\tau = \lim_{x \downarrow c} \mathbb{E}[Y \mid X = x] – \lim_{x \uparrow c}
    \mathbb{E}[Y \mid X = x]\)
- en: So, which should you choose? Honestly, it can feel arbitrary. And that’s okay.
    This is the first in a series of judgment calls that practitioners often call
    the fun part of RDD. It’s where modelling becomes as much an art as it is a science.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你应该选择哪一个？说实话，这可能会感觉是随意的。这是系列判断中的第一个，实践者通常称之为RDD的有趣部分。这是建模既是艺术也是科学的地方。
- en: 'I’ll walk through how I approach that choice. But first, let’s look at two
    key tuning parameters (especially for non-parametric RDD) that will guide our
    final decision: the polynomial degree and the bandwidth, h.'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 我将说明我是如何处理这个选择的。但首先，让我们看看两个关键调整参数（特别是对于非参数RDD），它们将指导我们的最终决策：多项式次数和带宽，h。
- en: Polynomial degree
  id: totrans-212
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 多项式次数
- en: The relationship between outcome and the running variable can take many forms,
    and capturing its true shape is crucial for estimating the causal effect accurately.
    If you’re lucky, everything is linear and there is no need to think of polynomials
    — If you’re a realist, then you probably want to learn how they can serve you
    in the process.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 结果与运行变量之间的关系可以有多种形式，准确捕捉其真实形状对于准确估计因果效应至关重要。如果你很幸运，一切都是线性的，那么你不需要考虑多项式——如果你是一个现实主义者，那么你可能想了解它们在过程中如何为你服务。
- en: 'In selecting the right polynomial degree, the goal is to reduce bias, without
    inflating the variance of the estimator. So we want to allow for flexibility,
    but we don’t want to do it more than necessary. Take the examples in the image
    below: with an outcome of low enough variance, the linear form naturally invites
    the eyes to estimate the outcome at the cutoff. But the estimate becomes biased
    with only a slightly more complex form, if we enforce a linear shape in the model.
    Insisting on a linear form in such a complex case is like fitting your feet into
    a glove: It kind of works, but it’s very ugly.'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择合适的多项式次数时，目标是减少偏差，同时不增加估计量的方差。因此，我们希望提供灵活性，但我们不希望过度这样做。以下图中的例子：当结果具有足够低的方差时，线性形式自然会引导眼睛估计截止点的结果。但如果我们在模型中强制执行线性形状，那么估计就会变得有偏差。在如此复杂的情况下坚持线性形状就像把脚塞进手套一样：它有点用，但看起来非常难看。
- en: Instead, we give the model more degrees of freedom with a higher-degree polynomial,
    and estimate the expected <mdspan datatext="el1745611088934" class="mdspan-comment">outcome</mdspan>
    \(\tau = \lim_{x \downarrow c} \mathbb{E}[Y \mid X = x] – \lim_{x \uparrow c}
    \mathbb{E}[Y \mid X = x]\), with lower bias.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我们通过使用更高次的多项式给模型更多的自由度，并估计预期的 <mdspan datatext="el1745611088934" class="mdspan-comment">结果</mdspan>
    \(\tau = \lim_{x \downarrow c} \mathbb{E}[Y \mid X = x] – \lim_{x \uparrow c}
    \mathbb{E}[Y \mid X = x]\)，以降低偏差。
- en: '![](../Images/ba623ac06ff5aefdb8e113aa6520d5ed.png)'
  id: totrans-216
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ba623ac06ff5aefdb8e113aa6520d5ed.png)'
- en: '<mdspan datatext="el1745611151754" class="mdspan-comment">Caption: the relationship
    between the outcome and running variable can be simple and predictable, or take
    on a more complex shape that’s more erratic inherently. Getting complex forms
    right may be harder — it requires high model fidelity</mdspan>, and failing to
    do so may introduce bias.'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745611151754" class="mdspan-comment">图注：结果与运行变量之间的关系可以是简单且可预测的，或者具有更复杂且本质上更不规则的形状。正确地获取复杂形式可能更困难——它需要高模型保真度</mdspan>，而未能做到这一点可能会引入偏差。
- en: 'The bandwidth parameter: h'
  id: totrans-218
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 带宽参数：h
- en: 'Working with polynomials in the way that’s described above does not come free
    of worries. Two things are required and pose a challenge at the same time:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 按照上述方式处理多项式并不免除担忧。需要两件事，并且同时构成挑战：
- en: we need to get the modelling *right* for entire range, and;
  id: totrans-220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们需要在整个范围内正确地进行建模，并且；
- en: the entire range should be relevant for the task at hand, which is estimating
    \(\tau = \lim_{x \downarrow c} \mathbb{E}[Y \mid X = x] – \lim_{x \uparrow c}
    \mathbb{E}[Y \mid X = x]\)
  id: totrans-221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 整个范围应该与当前任务相关，即估计 \(\tau = \lim_{x \downarrow c} \mathbb{E}[Y \mid X = x] –
    \lim_{x \uparrow c} \mathbb{E}[Y \mid X = x]\)
- en: Only then we reduce bias as intended; If one of these two is not the case, we
    risk adding more of it.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 只有这样我们才能如预期地减少偏差；如果其中之一不是这样，我们就有风险增加更多的偏差。
- en: The thing is that modelling the entire range properly is more difficult than
    modelling a smaller range, specially if the form is complex. So, it’s easier to
    make mistakes. Moreover, the entire range is almost certain not to be relevant
    to estimate the causal effect — the “local” in LATE gives it away. How do we work
    around this?
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，正确地建模整个范围比建模较小范围更困难，特别是如果形式复杂的话。因此，更容易出错。此外，整个范围几乎肯定与估计因果效应不相关——LATE中的“局部”性质暴露了这一点。我们如何解决这个问题？
- en: Enter the bandwidth parameter, h. The bandwidth parameters aids the model in
    leveraging data that is closer to the cutoff, dropping the *global* data idea,
    and bringing it back to the local scope RDD estimates the effect for. It does
    so by weighting the data by some function \(\mathbb{w}(X)\) so that more weight
    is given to entries near the cutoff, and less to the entries further away.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 引入带宽参数，h。带宽参数帮助模型利用接近截止点的数据，放弃*全局*数据理念，并将其回归到RDD估计效应的局部范围。它是通过通过某个函数 \(\mathbb{w}(X)\)
    加权数据来实现的，使得靠近截止点的项获得更多权重，而远离截止点的项获得较少权重。
- en: For example, with h = 10, the model considers the range of total length 20;
    10 on each side of the cutoff.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当h = 10时，模型考虑的总长度范围为20；截止点两侧各有10。
- en: The effective weight depends on the function, \(\mathbb{w}\). A bandwidth function
    that has a hard-boundary behaviour is called a square, or uniform, kernel. Think
    of it as a function that gives weights 1 when the data is within bandwidth, and
    0 otherwise. The gaussian and triangular kernels are two other frequently used
    kernels by practitioners. The key difference is that these behave less abruptly
    in weighting of the entries, compared to the square kernel. The image below visualises
    the behaviour of the three kernels functions.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 有效权重取决于函数，\(\mathbb{w}\)。具有硬边界行为的带宽函数被称为平方核或均匀核。可以将其视为一个当数据在带宽内时赋予权重1，否则赋予权重0的函数。高斯核和三角核是实践者经常使用的两种其他核函数。关键区别在于，与平方核相比，这些核在权重项的行为上不那么突然。下面的图像展示了这三个核函数的行为。
- en: '![](../Images/97bd65594318f9f4d98695c6ef83d1e1.png)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/97bd65594318f9f4d98695c6ef83d1e1.png)'
- en: Three weighting functions visualised. The y-axis represents the weight. The
    square kernel acts as a hard-cutoff as to which entries it allows to be seen by
    the model. The triangular and gaussian functions behave more smoothly with respect
    to this.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 展示了三个加权函数。y轴表示权重。平方核作为硬截止点，决定了哪些项可以被模型看到。三角函数和高斯函数在这方面表现得更为平滑。
- en: 'Everything put together: non- vs. parametric RDD, polynomial degree and bandwidth'
  id: totrans-229
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 总而言之：非参数与参数RDD、多项式度数和带宽
- en: 'To me, choosing the final model boils down to the question: what is the simplest
    model that does the good job?Indeed — the principle of Occam’s razor never goes
    out of fashion. In practise, this means:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，选择最终模型归结为这样一个问题：什么是最简单的模型，同时又能做好工作？的确——奥卡姆剃刀原则永远不会过时。在实践中，这意味着：
- en: '**Non- vs. Parametric:** is the functional form simple on both sides of the
    cutoff? Then a single fit, pooling data from both sides will do. Otherwise, nonparametric
    RDD adds the flexibility that is needed to embrace two different dynamics on either
    side of the cutoff.'
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**非参数与参数：**截止点的两侧的函数形式简单吗？如果是这样，那么一个拟合，将两侧的数据合并起来就可以。否则，非参数RDD添加了所需的灵活性，以适应截止点两侧不同的动态。'
- en: '**Polynomial degree:** when the function is complex, I opt-in for higher degrees
    to follow the trend better flexibly.'
  id: totrans-232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**多项式度数：**当函数复杂时，我选择更高的度数以更灵活地跟随趋势。'
- en: '**Bandwidth:** if just picked a high polynomial degree, then I will let h be
    larger too. Otherwise, lower values for h often go well with lower degrees of
    polynomials in my experience*, **.'
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**带宽：**如果只是选择一个高的多项式度数，那么我会让h更大。否则，根据我的经验，h的较低值通常与较低的多项式度数相匹配*，**。'
- en: '* This brings us to the generally accepted recommendation in the literature:
    keep the polynomial degree lower than 3\. In most use cases 2 works well enough.
    Just make sure you pick mindfully.'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: '* 这将我们引向文献中普遍接受的推荐：将多项式度数保持在3以下。在大多数情况下，2就足够好了。只需确保你明智地选择。'
- en: '** Also, note that h fits especially well in the non-parametric mentality;
    I see these two choices as co-dependent.'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: '**此外，请注意，h在非参数思维中特别适用；我认为这两个选择是相互依赖的。'
- en: 'Back to the listing position scenario. This is the final model to me:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 回到列表位置场景。对我来说，这是最终的模型：
- en: '[PRE1]'
  id: totrans-237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Interpreting RDD results
  id: totrans-238
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解释RDD结果
- en: Let’s look at the model output. The image below shows us the model summary.
    If you’re familiar with that, it all will come down to interpreting the parameters.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看模型输出。下面的图像显示了模型摘要。如果你熟悉这个，所有的一切都将归结于对参数的解释。
- en: 'The first thing to look at is that treated listings have ~1% point higher probability
    of being clicked, than untreated listings. To put that in perspective, that’s
    a +20% change if the click rate of the control is 5%, and ~ +1% increase if the
    control is 80%. When it comes to *practical significance* of this causal effect,
    these two uplifts are day and night. I’ll leave this open-ended with a few questions
    to take home: when would you and your team label this impact as an opportunity
    to jump on? What other data/answers do we need to declare this track worthy of
    following?'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 首先要注意的是，接受处理的列表比未处理的列表有大约1个百分点的点击概率更高。为了更清楚地说明这一点，如果控制组的点击率为5%，那么这将是一个+20%的变化；如果控制组是80%，那么大约是+1%的增加。当涉及到这个因果效应的**实际意义**时，这两个提升是截然不同的。我将这个问题留作开放，提出几个问题供大家思考：你和你团队会在什么时候将这种影响视为一个抓住机会？我们还需要哪些数据/答案来宣布这条路径值得追踪？
- en: The remainder of the parameters don’t really add much to the interpretation
    of the causal effect. But let’s go over them quickly, nonetheless. The second
    estimate (x) is that of the slope below cutoff slope; the third one (D x \(\mathbb(x)\))
    is the additional [negative] points added to the previous slope to reflect the
    slope *above* the cutoff; Finally, the intercept is the average for the units
    right below the cutoff. Because our outcome variable is residualised, the value
    -0.012 is the demeaned outcome; it no longer is on the scale of the original outcome.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 剩余的参数实际上并没有为因果效应的解释增加太多。但让我们快速浏览一下。第二个估计（x）是截止斜率以下的斜率；第三个估计（D x \(\mathbb(x)\)）是添加到先前斜率中的额外[负]点，以反映截止线以上的斜率；最后，截距是截止线以下单位的平均值。因为我们的结果变量是残差化的，所以-0.012的值是去均值的结果；它不再位于原始结果的范围。
- en: '![](../Images/e23334cd24f27f60779e1414724fbbe6.png)'
  id: totrans-242
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e23334cd24f27f60779e1414724fbbe6.png)'
- en: Different choices, different models
  id: totrans-243
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不同的选择，不同的模型
- en: I’ve put this image together to show a collection of other possible models,
    had we made different choices in bandwidth, polynomial degree, and parametric-versus-not.
    Although hardly any of these models would have put the decision maker on a totally
    wrong path in this particular dataset, each model comes with its bias and variance
    properties. This *does* colour our *confidence* of the estimate.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 我将这张图像组合起来，以展示如果我们对带宽、多项式度数和参数化与非参数化做出不同的选择，可能出现的其他模型集合。尽管在这些模型中几乎没有一个会将决策者引向完全错误的方向，但每个模型都带有其偏差和方差属性。这确实会影响我们对估计的**信心**。
- en: '![](../Images/4de982aac83772f78e618de90f1788e7.png)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4de982aac83772f78e618de90f1788e7.png)'
- en: Placebo testing
  id: totrans-246
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安慰剂测试
- en: In any causal inference method, the identification assumption is everything.
    One thing is off, and the entire analysis crumbles. We can pretend everything
    is alright, or we put our methods to the test ourselves (believe me, it’s better
    when you break your own analysis before it goes out there)
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何因果推断方法中，识别假设是至关重要的。有一点不对，整个分析就会崩溃。我们可以假装一切正常，或者我们自己测试我们的方法（相信我，在你把它发布出去之前打破自己的分析会更好）
- en: Placebo testing is one way to corroborate the results. Placebo testing checks
    the validity of results by using a setup identical to the real one, minus the
    actual treatment. If we still see an effect, it signals a flawed design — continuity
    can’t be assumed, and causal effects can’t be identified.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 安慰剂测试是验证结果的一种方法。安慰剂测试通过使用与真实实验相同的设置，但去掉实际治疗来检查结果的可靠性。如果我们仍然看到效果，这表明设计有缺陷——连续性不能假设，因果关系也无法识别。
- en: Good for us, we have a placebo group. The 30-listing page cut only exists on
    the desktop version of the platform. On mobile, infinite scroll makes it one long
    page; no pagination, no page jump. So the effect of “going to the next page” shouldn’t
    appear, and it doesn’t.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，我们有一个安慰剂组。30个列表页面切割只存在于平台的桌面版本上。在移动端，无限滚动使得它变成了一页很长；没有分页，没有页面跳转。因此，“转到下一页”的效果不应该出现，而且也没有出现。
- en: 'I don’t think we need to do much inference. The graph below already tells us
    the entire story: without pages, going from the 30th position to the 31st is not
    different from going from any other position to the next. More importantly, the
    function is smooth at the cutoff. This finding adds a great deal of credibility
    to our analysis by showcasing that continuity holds in this placebo group.'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为我们不需要做太多的推断。下面的图表已经告诉我们整个故事：没有页面，从第30位到第31位与其他任何位置到下一个位置没有区别。更重要的是，函数在截止点处是平滑的。这一发现通过展示在这个安慰剂组中连续性成立，为我们分析增添了大量的可信度。
- en: '![](../Images/4c924fce31931f36502939df10cac06b.png)'
  id: totrans-251
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4c924fce31931f36502939df10cac06b.png)'
- en: The placebo test is one of the strongest checks in an RDD. It tests the continuity
    assumption almost *directly*, by treating the placebo group as a stand-in for
    the counterfactual.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 安慰剂测试是RDD中最强有力的检查之一。它几乎直接测试了连续性假设，通过将安慰剂组作为反事实的替代品来处理。
- en: 'Of course, this relies on a new assumption: that the placebo group is valid;
    that it is a sufficiently good counterfactual. So the test is powerful only if
    that assumption is more credible than assuming continuity without evidence.'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这依赖于一个新的假设：安慰剂组是有效的；它是一个足够好的反事实。因此，只有当这个假设比没有证据假设连续性更有可信度时，测试才是强大的。
- en: Which means that we need to be open to the possibility that there is no proper
    placebo group. How do we stress-test our design then?
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们需要开放地考虑没有适当安慰剂组的情况。那么我们如何对设计进行压力测试？
- en: No-manipulation and the density continuity test
  id: totrans-255
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 无操作和密度连续性测试
- en: 'Quick recap. There are two related sources of confounding and hence to violating
    the continuity assumption:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 快速回顾。有两种相关的混杂来源，因此违反了连续性假设：
- en: direct confounding from a third variable at the cutoff, and
  id: totrans-257
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 来自第三个变量的截止点的直接混杂，
- en: manipulation of the running variable.
  id: totrans-258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行变量的操作。
- en: The first can’t be tested directly (except with a placebo test). The second
    can.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个不能直接测试（除了安慰剂测试）。第二个可以。
- en: 'If units can shift their running variable, they self-select into treatment.
    The comparison stops being fair: we’re now comparing manipulators to those who
    couldn’t or didn’t. That self-selection becomes a confounder, if it also affects
    the outcome.'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 如果单位可以改变它们的运行变量，它们就会自我选择进入治疗。比较就不再公平：我们现在是在比较操作者与那些不能或没有的人。如果这种自我选择也影响结果，那么它就会成为混杂因素。
- en: For instance, students who did not make the cut for a scholarship, but go on
    to effectively smooth-talk their institution into letting them pass with a higher
    score. That silver tongue can also help them getting better salaries, and act
    as confounder when we study the effect of scholarships on future income.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，那些没有达到奖学金门槛的学生，但通过有效地说服他们的机构以更高的分数让他们通过。这种银舌也可以帮助他们获得更好的薪水，并在我们研究奖学金对未来收入的影响时充当混杂因素。
- en: '![](../Images/9f1f0ffd399459fd2d1b8b6f9bf3bcd7.png)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9f1f0ffd399459fd2d1b8b6f9bf3bcd7.png)'
- en: In DAG form, running variable manipulation causes selection bias, which in turn
    makes that the continuity assumption doesn’t longer hold. If we know that continuity
    holds, then there is no need to test for selection bias by manipulation. But when
    we cannot (because there is no good placebo group), then at least we can try to
    test if there is manipulation.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 在DAG形式中，运行变量的操作会导致选择偏差，这反过来又使得连续性假设不再成立。如果我们知道连续性成立，那么就没有必要通过操作来测试选择偏差。但是当我们不能（因为没有好的安慰剂组）时，至少我们可以尝试测试是否存在操作。
- en: So, what are the signs that we’re in such scenario? An unexpectedly high number
    of units just above the cutoff, and a dip just below (or vice versa). We can see
    this as another continuity question, but this time in terms of the density of
    the samples.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何判断我们处于这样的场景？一个意外的高数量单位刚好在截止点之上，以及一个刚好在截止点之下（或反之）。我们可以将其视为另一个连续性问题，但这次是关于样本密度的。
- en: 'While we can’t test the continuity of the potential outcomes directly, we can
    test the continuity of the density of the running variable at the cutoff. The
    *McCrary* test is the standard tool for this, exactly testing:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们不能直接测试潜在结果的连续性，但我们可以测试截止点处运行变量密度的连续性。*McCrary* 测试是这一测试的标准工具，正好测试：
- en: '\(H_0: \lim_{x \to c^-} f(x) = \lim_{x \to c^+} f(x) \quad \text{(No manipulation)}\)'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: '\(H_0: \lim_{x \to c^-} f(x) = \lim_{x \to c^+} f(x) \quad \text{(无操作)}\)'
- en: '\(H_A: \lim_{x \to c^-} f(x) \neq \lim_{x \to c^+} f(x) \quad \text{(Manipulation)}\)'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: '\(H_A: \lim_{x \to c^-} f(x) \neq \lim_{x \to c^+} f(x) \quad \text{(操作)}\)'
- en: where \(f(x)\) is the density function of the running variable. If \(f(x)\)
    jumps at x = c, it suggests that units have sorted themselves just above or below
    the cutoff — violating the assumption that the running variable was not manipulable
    at that margin.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 \(f(x)\) 是运行变量的密度函数。如果 \(f(x)\) 在 x = c 处跳跃，这表明单位已经在上一个或下一个截止点以上或以下进行了排序——违反了运行变量在那个边际不可操纵的假设。
- en: The internals of this test is something for a different post, because luckily
    we can rely `rdrobust::rddensity` to run this test, off-the-shelf.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 这个测试的内部机制是另一篇文章的内容，因为幸运的是我们可以依赖`rdrobust::rddensity`来运行这个测试，现成的。
- en: '[PRE2]'
  id: totrans-270
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/a01f1e7ee229ea91ecbdb648ffaf3eb3.png)'
  id: totrans-271
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a01f1e7ee229ea91ecbdb648ffaf3eb3.png)'
- en: A visual representation of the McCrary test.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: McCrary测试的视觉表示。
- en: The test shows marginal evidence of a discontinuity in the density of the running
    variable (T = 1.77, p = 0.077). Binomial counts are unbalanced across the cutoff,
    suggesting fewer observations just below the threshold.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 测试显示运行变量密度的不连续性有边际的证据（T = 1.77，p = 0.077）。在截止点两侧的二元计数不平衡，表明在阈值以下有更少的观测值。
- en: Usually, this is a red flag as it may pose a thread to the continuity assumption.
    This time however, we know that continuity *actually* holds (see placebo test).
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，这是一个红旗，因为这可能会对连续性假设构成威胁。然而，这次我们知道连续性**实际上**是成立的（见安慰剂测试）。
- en: 'Moreover, ranking is done by the algorithm: sellers have no means to manipulate
    the rank of their listings at all. That’s something we know by design.'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，排名是由算法完成的：卖家没有任何手段可以操纵他们列表的排名。这是我们通过设计知道的事情。
- en: Hence, a more plausible explanation is that the discontinuity in the density
    is driven by platform-side impression logging (not ranking), or my own filtering
    in the SQL query (which is elaborate, and missing values on the filter variables
    are not uncommon).
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，一个更合理的解释是，密度的不连续性是由平台端的印象记录（而不是排名）驱动的，或者是我自己在SQL查询中的过滤（这很复杂，过滤变量的缺失值并不罕见）。
- en: Inference
  id: totrans-277
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 推断
- en: The results will do this time around. But Calonico, Cattaneo, and Titiunik (2014)
    highlight a few issues with OLS RDD estimates like ours. Specifically, about 1)
    the bias in estimating the expected outcome at the cutoff, that no longer is really
    *at* the cutoff when we take samples further away from it, and 2) the bandwidth-induced
    uncertainty that is left out of the model (as h is treated as a hyperparameter,
    not a model parameter).
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 这次的结果将会如此。但Calonico、Cattaneo和Titiunik（2014）强调了与我们类似的OLS RDD估计中的一些问题。具体来说，关于1）在截止点估计预期结果时的偏差，当我们从截止点取样更远时，它就不再真正**在**截止点了，以及2）由于h被视为超参数而不是模型参数，模型中遗漏了带宽引起的不确定性。
- en: Their methods are implemented in `rdrobust`, an R and Stata package. I recommend
    using that software in analyses that are about driving real-life decisions.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的方法在`rdrobust`这个R和Stata软件包中得到了实现。我建议在那些旨在指导现实决策的分析中使用该软件。
- en: Analysis recap
  id: totrans-280
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分析回顾
- en: 'We looked at how a listing’s spot in the search results affects how often it
    gets clicked. By focusing on the cutoff between the first and second page, we
    found a clear (though modest) causal effect: listings at the top of page two got
    more clicks than those stuck at the bottom of page one. A placebo test backed
    this up—on mobile, where there’s infinite scroll and no real “pages,” the effect
    disappears. That gives us more confidence in the result. Bottom line: where a
    listing shows up matters, and prioritising top positions could boost engagement
    and create new commercial possibilities.'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 我们研究了列表在搜索结果中的位置如何影响其被点击的频率。通过关注第一页和第二页之间的截止点，我们发现了一个明显的（尽管是适度的）因果效应：位于第二页顶部的列表比那些困在第一页底部的列表获得了更多的点击。安慰剂测试支持了这一点——在移动端，由于无限滚动且没有真正的“页面”，这种效应消失了。这让我们对结果更有信心。底线：列表的位置很重要，优先考虑顶部位置可能会提高参与度并创造新的商业机会。
- en: But before we run with it, a couple of important caveats.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 但在我们运行它之前，有几个重要的注意事项。
- en: First, our result is local—it only tells us what happens near the page-two cutoff.
    We don’t know if the same effect holds at the top of page one, which probably
    signals even more value to users. So this might be a lower-bound estimate.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们的结果是局部的——它只告诉我们接近第二页截止点时发生了什么。我们不知道同样的效果是否在第一页的顶部也存在，这可能会向用户传达更多的价值。因此，这可能是一个下限估计。
- en: Second, volume matters. The first page gets a lot more eyeballs. So even if
    a top slot on page two gets more clicks per view, a lower spot on page one might
    still win overall.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，数量很重要。第一页获得了更多的关注。因此，即使第二页的顶部位置每次查看时获得的点击更多，第一页的较低位置仍然可能赢得整体。
- en: Conclusion
  id: totrans-285
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'Regression Discontinuity Design is not your everyday causal inference method
    — it’s a nuanced approach best saved for when the stars align, and randomisation
    isn’t doable. Make sure that you have a good grip on the design, and be thorough
    about the core assumptions: try to break them, and then try harder. When you have
    what you need, it’s an incredibly satisfying design. I hope this reading serves
    you well the next time you get an opportunity to apply this method.'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 回归断点设计并非日常的因果推断方法——它是一种细腻的方法，最好在星星对齐、随机化不可行时使用。确保您对设计有良好的掌握，并对核心假设进行彻底的思考：尝试打破它们，然后更加努力。当您获得所需内容时，这将是一个令人难以置信的满意的设计。我希望这次阅读能在您下次有机会应用此方法时为您提供帮助。
- en: 'It’s great seeing that you got this far into this post. If you want to read
    more, it’s possible; just not here. So, I compiled a small list of resources for
    you:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 看到您能阅读到这里，我感到非常高兴。如果您想阅读更多内容，也是可能的；只是不是在这里。因此，我为您整理了一份小型的资源列表：
- en: '[Causal Inference Mixtape](https://www.google.com/search?gs_ssp=eJzj4tVP1zc0TCtJrkoqNDcwYPSSSU4sLU7MUcjMS0stSs1LTlUoyUhVyM2sKEksSAUAUFsPiA&q=causal+inference+the+mixtape&rlz=1C5GCEA_enNL1150NL1150&oq=causal+inference&gs_lcrp=EgZjaHJvbWUqBwgCEC4YgAQyCQgAEEUYORiABDIHCAEQABiABDIHCAIQLhiABDIHCAMQLhiABDIHCAQQLhiABDIGCAUQRRhBMgYIBhBFGEEyBggHEEUYQdIBCDI3NDBqMGo3qAIIsAIB&sourceid=chrome&ie=UTF-8):
    for an extensive read on RDD and more'
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[因果推断混音带](https://www.google.com/search?gs_ssp=eJzj4tVP1zc0TCtJrkoqNDcwYPSSSU4sLU7MUcjMS0stSs1LTlUoyUhVyM2sKEksSAUAUFsPiA&q=causal+inference+the+mixtape&rlz=1C5GCEA_enNL1150NL1150&oq=causal+inference&gs_lcrp=EgZjaHJvbWUqBwgCEC4YgAQyCQgAEEUYORiABDIHCAEQABiABDIHCAIQLhiABDIHCAMQLhiABDIHCAQQLhiABDIGCAUQRRhBMgYIBhBFGEEyBggHEEUYQdIBCDI3NDBqMGo3qAIIsAIB&sourceid=chrome&ie=UTF-8)：关于RDD和更多内容的深入阅读'
- en: '[Causal Inference: A Statistical Learning Approach](https://web.stanford.edu/~swager/causal_inf_book.pdf):
    formal and technically to the point'
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[因果推断：统计学习方法](https://web.stanford.edu/~swager/causal_inf_book.pdf)：正式且技术性强，直击要点'
- en: and of course our trusty Wikipedia (actually great to get started)
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当然，还有我们可靠的维基百科（实际上是一个很好的入门资源）
- en: Also check out the reference section below for some deep-reads.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 还请查看下方的参考文献部分，以获取一些深入阅读的内容。
- en: Happy to connect on [LinkedIn](https://www.linkedin.com/in/alejandro-alvarez-p%C3%A9rez-a21912b0/),
    where I discuss more topics like the one here. Also, feel free to bookmark my
    personal [website](https://aalvarezperez.github.io/) that is much cosier than
    here.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 很高兴在[LinkedIn](https://www.linkedin.com/in/alejandro-alvarez-p%C3%A9rez-a21912b0/)上与您建立联系，在那里我讨论更多类似的话题。此外，请随意将我的个人[网站](https://aalvarezperez.github.io/)加入书签，它比这里更加温馨。
