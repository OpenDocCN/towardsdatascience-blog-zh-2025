- en: Conceptual Frameworks for Data Science Projects
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据科学项目概念框架
- en: 原文：[https://towardsdatascience.com/conceptual-frameworks-for-data-science-projects/](https://towardsdatascience.com/conceptual-frameworks-for-data-science-projects/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/conceptual-frameworks-for-data-science-projects/](https://towardsdatascience.com/conceptual-frameworks-for-data-science-projects/)
- en: '*<mdspan datatext="el1760630281297" class="mdspan-comment">Conceptual frameworks</mdspan>*
    are analytical structures for representing abstract concepts and organizing data.
    Data scientists regularly use such frameworks — knowingly or unknowingly — to
    derive project plans, select machine learning models that balance various trade-offs,
    and present findings and recommendations to stakeholders. This article provides
    an overview of common types of conceptual frameworks, a simple three-step process
    for building custom frameworks, and tips for successfully doing so.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*<mdspan datatext="el1760630281297" class="mdspan-comment">概念框架</mdspan>*是表示抽象概念和组织数据的分析结构。数据科学家经常使用此类框架——有意识地或无意识地——来制定项目计划、选择平衡各种权衡的机器学习模型，并向利益相关者展示发现和建议。本文概述了常见类型的概念框架、构建自定义框架的简单三步法，以及成功实施的建议。'
- en: '**Note:** All figures in the following sections have been created by the author
    of this article.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：以下各节中的所有图表均由本文作者创建。'
- en: Common Framework Types
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见框架类型
- en: 'Although conceptual frameworks come in many different shapes and sizes, four
    basic framework types stand out as being especially common in data science projects:
    *hierarchies*, *matrices*, *process flows*, and *relational maps*. We will briefly
    go over each of these framework types below.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管概念框架的形式和大小多种多样，但在数据科学项目中，四种基本的框架类型特别突出，它们是：*层次结构*、*矩阵*、*流程图*和*关系图*。以下我们将简要介绍这些框架类型。
- en: Hierarchies
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 层次结构
- en: Hierarchical frameworks often take the form of tree diagrams, starting with
    a root node and ending with several leaf nodes, as shown in Figure 1\. For example,
    the root node may represent an overarching concept in a taxonomy or an initial
    binary question in a decision tree. A node’s position in the hierarchy (or tree)
    gives us valuable information about its relationship to other nodes. Although
    Figure 1 labels the items in the hierarchy as “concepts,” they can be any kind
    of entity. Entities may be neutral (e.g., concepts, topics, segments) or have
    some positive or negative valence (e.g., revenues, costs, problems, issues). The
    hierarchical structure can vary in depth and breadth.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 层次框架通常以树状图的形式呈现，从根节点开始，以几个叶节点结束，如图1所示。例如，根节点可能代表分类学中的一个总体概念或决策树中的初始二元问题。一个节点在层次结构（或树）中的位置（或位置）为我们提供了关于其与其他节点之间关系的宝贵信息。尽管图1将层次结构中的项目标记为“概念”，但它们可以是任何类型的实体。实体可能是中性的（例如，概念、主题、段）或具有某种积极或消极的价（例如，收入、成本、问题、问题）。层次结构在深度和广度上可以有所不同。
- en: '![](../Images/a1f4e406b3b7829e9ef835d7012d7616.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a1f4e406b3b7829e9ef835d7012d7616.png)'
- en: 'Figure 1: Generic Structure of a Hierarchical Framework'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：层次框架的通用结构
- en: In visual representations of hierarchies, vertical links between two entities
    are typically drawn explicitly and can be non-directional (simple lines) or directional
    (downward or upward arrows, depending on the flow of the relationship). By contrast,
    horizontal links between entities at the same level of a hierarchy are typically
    not shown explicitly. Same-level entities may be subject to a natural ordering
    (e.g., temporal or spatial), which can be shown by placing them accordingly in
    the framework. For instance, entities that occur earlier in an ordering should
    be placed to the left of entities that occur later. If the entities do not come
    with a natural ordering, you can still consider ordering them in some way (e.g.,
    by level of importance or priority) to aid reasoning. Entities at the same level
    in a hierarchy should generally also be at the same level of abstraction.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在层次结构的视觉表示中，两个实体之间的垂直链接通常被明确绘制，可以是非方向的（简单线条）或方向的（向下或向上箭头，取决于关系的流动）。相比之下，同一层次结构中同一级别的实体之间的水平链接通常不会明确显示。同一级别的实体可能受到自然排序（例如，时间或空间）的影响，这可以通过在框架中相应地放置它们来表示。例如，在排序中较早出现的实体应放置在较晚出现的实体的左侧。如果实体没有自然排序，您仍然可以考虑以某种方式（例如，按重要性或优先级）对它们进行排序，以帮助推理。在层次结构中同一级别的实体通常也应在同一抽象级别。
- en: In many situations, it helps if the nodes of a hierarchy are *mutually exclusive*
    and *cumulatively exhaustive*, or *MECE* (pronounced “me-see”), to a large extent.
    Being mutually exclusive means that the concepts represented by individual nodes
    have no major overlaps (i.e., no redundancies), while being cumulatively exhaustive
    means that the framework leaves out nothing important. A MECE hierarchy can be
    useful for breaking down a broad concept into sub-concepts (or components) to
    identify key drivers of the whole.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多情况下，如果层次结构的节点是*相互排斥*和*累积穷尽*的，或者说是*MECE*（发音为“me-see”），那么这在很大程度上是有帮助的。相互排斥意味着单个节点所代表的概念之间没有重大重叠（即，没有冗余），而累积穷尽意味着框架没有遗漏任何重要的内容。MECE层次结构可以用来将一个广泛的概念分解为子概念（或组成部分），以识别整个的关键驱动因素。
- en: Matrices
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 矩阵
- en: A matrix is a tabular data structure consisting of *n* rows and *m* columns.
    Data scientists working on tabular use cases routinely leverage matrices for storing
    training data and model weights. Training machine learning models can yield high-dimensional
    matrices of weights that capture complex relationships between predictors and
    targets. Low-dimensional matrices like the one shown in Figure 2 can be useful
    for analyzing problems and communicating key insights.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵是一种由*n*行和*m*列组成的表格数据结构。在表格用例上工作的数据科学家通常会利用矩阵来存储训练数据和模型权重。训练机器学习模型可以产生高维度的权重矩阵，这些矩阵捕捉了预测变量和目标之间的复杂关系。如图2所示的低维矩阵可以用于分析问题和传达关键见解。
- en: '![](../Images/3063b9a39b1efe2c7526ac34cf0a6faf.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3063b9a39b1efe2c7526ac34cf0a6faf.png)'
- en: 'Figure 2: Generic Structure of a Two-by-Two Matrix Framework'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：二维矩阵框架的一般结构
- en: The generic two-by-two matrix shown in Figure 2 compares two different dimensions
    against each other. Such a matrix naturally yields four quadrants. By convention,
    the bottom-left quadrant (where both dimensions are “low”) is typically the undesirable
    region of the matrix, and the top-right quadrant (where both dimensions are “high”)
    represents the desirable region. For example, the market research firm Gartner
    uses two-by-two matrices to analyze the competitive landscape in various industry
    sectors and calls the top-right region of the matrix (where the market leaders
    are plotted) the “magic quadrant.”
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图2中所示的一般二维矩阵比较了两个不同的维度。这样的矩阵自然产生四个象限。按照惯例，左下象限（两个维度都是“低”）通常是矩阵中不受欢迎的区域，而右上象限（两个维度都是“高”）则代表理想的区域。例如，市场研究公司Gartner使用二维矩阵来分析各个行业领域的竞争格局，并将矩阵右上区域（市场领导者所在区域）称为“魔力象限”。
- en: The dimensions of a matrix may represent continuous, ordinal or categorical
    data types. Ideally, these dimensions (or axes) should be important to the overarching
    framework objective in some way (e.g., key sub-concepts, problems, or drivers
    in a given context). The interactions between these dimensions should be of particular
    interest as a source of insight, since it is these interactions that matrices
    can capture well.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵的维度可能代表连续、有序或分类数据类型。理想情况下，这些维度（或轴）应以某种方式对整体框架目标很重要（例如，在特定背景中的关键子概念、问题或驱动因素）。这些维度之间的交互应特别引起兴趣，因为这是矩阵能够很好地捕捉的洞察来源。
- en: In general, the MECE principle also applies to the choice of dimensions — they
    should collectively cover the important sub-concepts or drivers of the problem
    being investigated and avoid redundancies. Otherwise, looking at the interaction
    will be no different from looking at an individual dimension. If analyzing the
    interaction is not important, a hierarchical framework may be more suitable. Converting
    between a matrix framework and its hierarchical analog can be straightforward.
    For instance, to transform the matrix in Figure 2 into a hierarchy, create a root
    node that defines the overall context, let its child nodes be Dimensions 1 and
    2, and let their respective child nodes be “high” and “low.”
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，MECE原则也适用于维度的选择——它们应该共同覆盖正在研究的问题的重要子概念或驱动因素，并避免冗余。否则，观察交互与观察单个维度将没有区别。如果分析交互并不重要，那么层次框架可能更合适。在矩阵框架及其层次对应物之间进行转换可能是直接的。例如，要将图2中的矩阵转换为层次结构，创建一个定义整体背景的根节点，让它的子节点是维度1和2，并让它们各自的子节点是“高”和“低”。
- en: Process Flows
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 流程图
- en: A process flow defines a sequence of logically ordered activities that interact
    to achieve an overarching objective. For instance, tools such as Dataiku and KNIME
    allow users to construct data science pipelines as process flows, going from data
    ingestion all the way to modeling and report generation. Figure 3 depicts a generic
    process framework.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 流程定义了一系列逻辑上有序的活动序列，这些活动相互作用以实现一个总目标。例如，Dataiku和KNIME等工具允许用户将数据科学管道作为流程构建，从数据摄取一直到最后建模和报告生成。图3描述了一个通用过程框架。
- en: '![](../Images/a45c6c3a9a3ba18804e019471baa4125.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a45c6c3a9a3ba18804e019471baa4125.png)'
- en: 'Figure 3: Generic Structure of a Process Framework'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：过程框架的通用结构
- en: The entities of the process in Figure 3 are labeled as activities, but these
    could be steps, stages, operations, etc. The process starts with an activity (Activity
    1), ends with an activity (Activity 3), and has one or more activities in between
    (Activity 2). Some inputs are typically fed into the process at the start and
    transformed over the sequence of activities to yield an output. Note that inputs
    and outputs can also enter and leave at intermediate steps within the process.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图3中的实体被标记为活动，但它们可以是步骤、阶段、操作等。该过程从一项活动（活动1）开始，以一项活动（活动3）结束，并在其中包含一个或多个活动（活动2）。一些输入通常在开始时输入到过程中，并在一系列活动中转换，以产生输出。请注意，输入和输出也可以在过程中的中间步骤中进入和离开。
- en: As with hierarchies and matrices, the MECE principle can be important in formulating
    the different activities of the process. If two activities have significant conceptual
    overlap, you could consider either grouping them into a single activity or breaking
    them up into a more granular set of distinct activities. For instance, the intermediate
    activities in Figure 9 may have resulted from this sort of analysis; Activity
    2 could be the outcome of merging some overlapping activities, while Activities
    2.1-2.3 could be a granular breakdown of a special subset of those merged activities.
    If an activity or a larger part of the process repeats, then it can be represented
    as a cycle, whereby an activity transitions to another activity that has already
    occurred before.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 与层次结构和矩阵一样，MECE原则在制定过程的各项活动时可能很重要。如果有两个活动有显著的概念重叠，可以考虑将它们合并为一个单独的活动，或者将它们拆分成一组更细粒度的独立活动。例如，图9中的中间活动可能是这种分析的结果；活动2可能是合并一些重叠活动的结果，而活动2.1-2.3可能是合并活动的一个特殊子集的细粒度分解。如果一个活动或过程的一个更大部分重复，则可以将其表示为一个循环，其中一项活动转换到之前已经发生过的另一项活动。
- en: The transition from one activity to another should meaningfully transform the
    inputs of the process (e.g., by increasing, reducing, combining or otherwise altering
    the inputs in some way) with the aim of producing the desired output. If a transition
    does not change the inputs, then the two activities on either side of the transition
    are likely redundant and should be merged or split up differently, as discussed
    above.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 从一项活动到另一项活动的转换应该有意义的转换过程输入（例如，通过增加、减少、组合或其他方式改变输入）以达到预期的输出。如果一个转换没有改变输入，那么转换两侧的两个活动可能是冗余的，应该合并或以不同的方式拆分，如上所述。
- en: Relational Maps
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关联图
- en: Relational maps shift the focus from individual concepts (or entities) to the
    relationships between them. Data scientists working with knowledge graphs or box-and-arrow
    “path diagrams” of causal relationships (as shown in Figure 4) will be familiar
    with this framework type.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 关联图将焦点从单个概念（或实体）转移到它们之间的关系上。与知识图谱或因果关系的方框和箭头“路径图”（如图4所示）一起工作的数据科学家将熟悉这种框架类型。
- en: '![](../Images/f660a2bc94dba8cbb28413a60f3bc07a.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f660a2bc94dba8cbb28413a60f3bc07a.png)'
- en: 'Figure 4: Generic Structure of a Path Diagram'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：路径图的通用结构
- en: 'A relationship can generally be any function that links two different concepts
    together. Four types of relationships are especially common:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 关联通常可以是一般函数，将两个不同的概念联系起来。以下四种类型的关联尤为常见：
- en: '**Transactional:** A relationship can represent one or more transactions between
    entities. The transactions may involve the flow of tangible things (e.g., products
    bought and sold) or intangible things (e.g., information, money). Transactional
    relationships can incorporate directionality; a transaction can flow from A to
    B, from B to A, or in both directions, and each of these cases has a different
    meaning for the entities (e.g., they may be receivers, senders, or both).'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交易性的：** 一种关系可以表示实体之间的一笔或多笔交易。这些交易可能涉及有形物品（例如，买卖的产品）或无形物品（例如，信息、金钱）。交易关系可以包含方向性；交易可以从A流向B，从B流向A，或者双向流动，每种情况对实体都有不同的意义（例如，它们可能是接收者、发送者或两者都是）。'
- en: '**Causal:** Entities A and B may be causally related if A is responsible —
    at least in part — for the occurrence or state of B (or vice versa). The nature
    of the causal relationship may vary. The role of A is strong if its presence is
    sufficient to fully cause B (although A may not be the only entity that can fully
    cause B). The role of A is also strong if it is necessary to cause B (although
    A may not be able to do this alone). Moreover, if A causes B, it does not necessarily
    follow that B causes A; the notion of directionality is clearly important for
    specifying causal relationships.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**因果性的：** 如果A至少在部分上对B的发生或状态负责（或反之亦然），那么实体A和B可能存在因果关系。因果关系的性质可能不同。如果A的存在足以完全导致B，那么A的作用就强大（尽管A可能不是唯一能够完全导致B的实体）。如果A是导致B所必需的，那么A的作用也强大（尽管A可能无法单独做到这一点）。此外，如果A导致B，并不意味着B也会导致A；方向性的概念对于指定因果关系来说非常重要。'
- en: '**Similarity-based:** Entities may be related because they are similar or dissimilar
    in some way. For example, entities A and B can be similar because they tend to
    appear in the same place or happen at the same time (and dissimilar if the occurrence
    of one entity tends to preclude the occurrence of the other). The notion of *correlation*
    is a mathematical formalization often used to construct measurable, similarity-based
    relationships. Note that, just because two entities are correlated does not necessarily
    mean that they are causally related (although if they are causally related, then
    they would also be correlated).'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于相似性的：** 实体可能因为以某种方式相似或不相似而相互关联。例如，实体A和B可能因为它们倾向于出现在同一地点或同时发生（如果其中一个实体发生往往排除另一个实体的发生，则它们是不相似的）。*相关性*的概念是数学形式化通常用于构建可测量的、基于相似性的关系的概念。请注意，仅仅因为两个实体相关，并不意味着它们必然有因果关系（尽管如果它们有因果关系，那么它们也会相关）。'
- en: '**Membership-based:** Entities can be linked together by being members of the
    same group, community, or category. For instance, people can be related by being
    in the same neighborhood, grocery items can be part of the same product category,
    and a set of sub-concepts may be part of an overarching concept. Indeed, one could
    apply a hierarchical framework to drill down into successively deeper levels of
    membership within entities under consideration.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于成员资格的：** 实体可以通过成为同一组、社区或类别的成员而相互关联。例如，人们可以通过居住在同一个社区而相互关联，杂货可以属于同一产品类别，一组子概念可能是一个更广泛概念的一部分。实际上，可以应用分层框架来深入探讨考虑中的实体成员资格的逐级更深层级。'
- en: How to Build Your Own Frameworks
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何构建你自己的框架
- en: 'The following three-step process can be used to build a custom framework:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 以下三个步骤的过程可以用来构建一个自定义框架：
- en: Define the framework’s objective.
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义框架的目标。
- en: Identify the right building blocks (i.e., the framework type and dimensions).
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定合适的构建模块（即框架类型和维度）。
- en: Put the building blocks together in an effective manner to answer the framework’s
    objective.
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以有效的方式将构建模块组合起来，以回答框架的目标。
- en: 'Step 1: Define the Objective'
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：定义目标
- en: 'In defining the framework’s objective, ask yourself: In what context will the
    framework be used? What should the framework accomplish? Can an existing framework
    be reused — perhaps with some minor modifications — or does a new one need to
    be built to fit your specific needs?'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义框架的目标时，问自己：框架将在什么背景下使用？框架应该实现什么？现有的框架可以被重用——可能需要一些小的修改——或者是否需要构建一个新的框架来满足你的特定需求？
- en: The construction of the framework should be tied to a higher goal, such as the
    delivery of a project, formulation of a decision, or creation of some documentation.
    Once the context has been properly understood, careful consideration should be
    given to what the framework should accomplish in concrete terms. Is the framework
    intended as a decision-making tool? Is the framework meant to structure the flow
    of an argument in a report or a presentation?
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 框架的建设应该与一个更高的目标相关联，例如项目的交付、决策的制定或某些文档的创建。一旦正确理解了背景，就应该仔细考虑框架在具体方面应该实现什么。框架是否旨在作为决策工具？框架是否旨在结构化报告或演示中的论点流程？
- en: Just because you need a framework does not mean that you must build one yourself.
    In many situations, existing conceptual frameworks can be reused without significant
    modification. Spending some effort to maintain a solid, up-to-date overview of
    relevant existing frameworks avoids downstream costs of “reinventing the wheel.”
    Reusing existing frameworks has benefits beyond not having to start from scratch;
    if the framework has been around for some time, its main features, as well as
    its strengths and limitations, may be well-documented and tested in different
    settings. Platforms such as *Towards Data Science* are a great source for keeping
    abreast of conceptual frameworks related to data science projects.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然你需要一个框架，但这并不意味着你必须自己构建它。在许多情况下，现有的概念框架可以不经重大修改而重复使用。投入一些努力来维护一个坚实、最新的相关现有框架概述，可以避免“重新发明轮子”的下游成本。重复使用现有框架的好处不仅在于不必从头开始；如果框架存在了一段时间，其主要特性以及其优势和局限性可能已经在不同的环境中得到很好的记录和测试。例如，*Towards
    Data Science*平台是了解与数据科学项目相关的概念框架的好资源。
- en: 'Step 2: Identify the Framework Type and Dimensions'
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：识别框架类型和维度
- en: Having clarified the objective of the framework, it is time to think more concretely
    about the construction of the framework itself. One of the main difficulties here
    is that conceptual frameworks are inherently not as tangible as physical ones
    (like molds in a factory). We tend to intuit the link between form and function
    — the framework and its purpose — more easily when the framework and its object
    are tangible. The hallmark of a good conceptual framework is its ability to turn
    a seemingly intangible argument or decision into something more tangible, and
    the key to this is representation.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在明确了框架的目标之后，是时候更具体地考虑框架本身的构建了。这里的难点之一是，概念框架本质上不像物理框架那样有形（例如工厂中的模具）。当框架及其对象是有形的，我们更容易直觉到形式和功能——框架及其目的——之间的联系。一个好的概念框架的标志是它能够将看似无形的主张或决策转化为更具体的东西，而实现这一目标的关键是表示。
- en: 'Broadly speaking, there are two aspects that determine the representation of
    conceptual frameworks: the *type* of the framework and the *dimensions* of the
    framework. You are likely to notice the framework type first since it determines
    how the framework appears as a whole. The previous sections covered the four common
    framework types. The framework dimensions dictate what the framework can specifically
    represent (e.g., in terms of granularity and ordering). By adjusting the dimensions,
    the same framework type can be reused to generate a wide range of different insights.
    Following are three common classes of framework dimensions:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 从广义上讲，有两个方面决定了概念框架的表示：框架的**类型**和框架的**维度**。你可能会首先注意到框架类型，因为它决定了框架整体的外观。前几节介绍了四种常见的框架类型。框架维度决定了框架可以具体表示什么（例如，在粒度和顺序方面）。通过调整维度，相同的框架类型可以重复使用，以生成广泛的不同见解。以下是一些常见的框架维度类别：
- en: '**Categorical:** These dimensions consist of a finite set of discrete categories
    that fully describe the dimension. The categories need not be ordered (e.g., a
    set of products, customer segments, gender).'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类别**：这些维度由一组有限的离散类别组成，可以完全描述维度。这些类别不需要有序（例如，一组产品、客户细分、性别）。'
- en: '**Ordinal:** These dimensions are ordered, which means that you can analyze
    whether something is “less than,” “greater than,” “equal to,” and so on, in relation
    to something else (e.g., negative/positive, low/medium/high).'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**序数**：这些维度是有序的，这意味着你可以分析某物相对于其他事物是“小于”、“大于”、“等于”等等（例如，负/正，低/中/高）。'
- en: '**Continuous:** Such dimensions can take the notion of ordinal dimensions to
    a much more granular level. Being continuous means that the dimension is numerical
    and can include decimals (e.g., 1.23, -2.718, 3.14159).'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**连续性**：这样的维度可以将序数维度的概念提升到一个更精细的水平。连续性意味着维度是数值的，可以包括小数（例如，1.23，-2.718，3.14159）。'
- en: 'Step 3: Put It All Together'
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 3 步：整合所有内容
- en: Once the framework type and dimensions have been identified, they can be combined
    to produce a custom framework. Often, the identification and combination steps
    are not explicitly separated, since you rarely do one without the other. But the
    framework type and its dimensions — the basic building blocks — are not necessarily
    wedded to each other. Some combinations may make more sense than others, and you
    can generally mix and match the building blocks in many ways, over several iterations,
    until the framework feels right. Be able to spot and exploit this combinatorial
    flexibility is a crucial skill that you should start developing from the outset
    of your framework-building journey.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦确定了框架类型和尺寸，它们可以组合起来创建一个定制的框架。通常，识别和组合步骤并不是明确分开的，因为你很少会单独进行其中之一。但是，框架类型及其尺寸——基本构建块——并不一定相互绑定。某些组合可能比其他组合更有意义，你通常可以在多次迭代中以多种方式混合和匹配构建块，直到框架感觉合适。能够发现并利用这种组合灵活性是一项至关重要的技能，你应该从框架构建之旅的开始就着手培养。
- en: 'Moreover, there are broadly four “pathways of analysis” that capture the link
    between the framework and its objective:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有四种广泛的“分析路径”，捕捉框架与其目标之间的联系：
- en: '**Descriptive:** Approaches the framework’s objective by gathering and organizing
    past information (e.g., using visuals such as graphs and tables, or written summaries).
    Doing so allows us to better describe and analyze what happened in the past, but
    it may not necessarily tell us why something happened, or whether it will happen
    again.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**描述性**：通过收集和组织过去的信息（例如，使用图表和表格等视觉元素或书面摘要）来接近框架的目标。这样做可以让我们更好地描述和分析过去发生的事情，但这并不一定告诉我们为什么发生了某事，或者它是否还会发生。'
- en: '**Diagnostic:** Takes descriptive information of past events and goes a step
    further to look at why something happened. This is done by drilling down into
    the data, mining for clues and correlations, and trying to find a plausible link
    between cause and effect. As with the descriptive pathway, the focus is on the
    past.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**诊断性**：通过深入数据，挖掘线索和相关性，并试图在原因和结果之间找到合理的联系，将过去事件的描述性信息进一步深入一步，以了解为什么发生了某事。与描述性路径一样，重点是过去。'
- en: '**Predictive:** Differs from the prior two by asking and answering questions
    about the future. The focus is on making an educated guess about what will happen
    in the future by relying on a host of typically quantitative techniques that range
    from the simple (e.g., basic probability theory, linear models) to the more complex
    (e.g., neural nets).'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测性**：与前两者不同，它询问和回答关于未来的问题。重点是依靠一系列通常量化的技术来做出关于未来的明智猜测，这些技术从简单的（例如，基本概率理论、线性模型）到更复杂的（例如，神经网络）。 '
- en: '**Prescriptive:** Goes beyond merely predicting future events to recommending
    ways to deal with them. The focus is on figuring out how to make something happen
    — or whether it should happen — in the future. The reasoning for the prescription
    can be quantitative (e.g., based on statistics or simulation modeling) or qualitative
    (e.g., based on personal experience).'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**规范性**：不仅预测未来事件，还建议如何处理它们。重点是弄清楚如何在未来实现某些事情——或者是否应该发生——推理的基础可以是定量的（例如，基于统计数据或模拟建模）或定性的（例如，基于个人经验）。'
- en: Framework types and dimensions can therefore be combined in different ways to
    produce custom frameworks that lend themselves to descriptive, diagnostic, predictive,
    and prescriptive use cases.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，框架类型和尺寸可以以不同的方式组合，以产生适合描述性、诊断性、预测性和规范性用例的定制框架。
- en: Top Tips
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高级技巧
- en: This section gives five tips for building good conceptual frameworks. The tips
    are by no means an exhaustive list of the points that you should consider, but
    represent a basic set of things to keep in mind.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 本节提供了五个构建良好概念框架的建议。这些建议绝对不是你应该考虑的所有点的详尽列表，但代表了一组基本事项，需要牢记在心。
- en: 'Tip 1: Focus on the Objective and Audience'
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小贴士 1：关注目标和受众
- en: The process of building frameworks broadly consists of three steps, namely defining
    the objective, then identifying and combining the building blocks (framework types
    and dimensions) accordingly. While the first step will, by its nature, emphasize
    the strategic objective and target audience of the framework, the focus in the
    latter two steps shifts to the nitty-gritty details of the framework’s building
    blocks. The deeper you get into the mechanics of the framework, the harder it
    can be to maintain visibility of the original objective. To maintain visibility
    of the bigger picture, it can help to take a step back from time to time during
    the framework-building process and remind yourself of the strategic objective
    and target audience. It may also help to delay part of the analysis until the
    necessary data becomes available and to seek regular feedback from colleagues
    and the target audience of your framework where possible.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 构建框架的过程大致包括三个步骤，即定义目标，然后相应地识别和组合构建块（框架类型和维度）。虽然第一步将强调框架的战略目标和目标受众，但后两个步骤的重点转向框架构建块的细节。你越深入框架的机制，就越难保持对原始目标的可见性。为了保持对整体图景的可见性，在框架构建过程中不时退一步，并提醒自己战略目标和目标受众可能会有所帮助。也可能有助于推迟部分分析，直到必要的数据可用，并在可能的情况下从同事和框架的目标受众那里寻求定期反馈。
- en: 'Tip 2: Keep It as Simple as Possible'
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小贴士 2：尽可能保持简单
- en: To paraphrase a quote often attributed to Albert Einstein — one of the most
    accomplished builders of conceptual frameworks of the last century — we can say
    that a framework should be made as simple as possible, but not simpler. Since
    the process inherently involves trying out different combinations of framework
    types and dimensions, it can sometimes be tempting to snap more and more pieces
    together. Yet sacrificing simplicity can potentially diminish the broader value
    of the framework in practice. Complex frameworks can be difficult to understand,
    apply, evaluate, and build — you may need to verify several assumptions and preconditions,
    and adjust many different levers within the framework.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 为了转述一句常被归功于阿尔伯特·爱因斯坦的名言——他是上个世纪最杰出的概念框架构建者之一——我们可以这样说，一个框架应该尽可能简单，但不能过于简单。由于这个过程本质上涉及尝试不同的框架类型和维度的组合，有时可能会诱使人们将越来越多的部分拼接在一起。然而，牺牲简单性可能会在实践中有可能降低框架的更广泛价值。复杂的框架可能难以理解、应用、评估和构建——你可能需要验证几个假设和先决条件，并在框架内调整许多不同的杠杆。
- en: 'Tip 3: Make It MECE'
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小贴士 3：使其MECE
- en: Ensuring that a framework is MECE has some important advantages. From a theoretical
    standpoint, being MECE means that the sub-concepts follow a consistent, additive
    part-whole logic; you expect the sub-concepts to “add up” to form the bigger concept.
    Crucially, this logic allows you to substitute the set of sub-concepts for the
    bigger concept (and vice versa) throughout your analysis. The additive logic of
    MECE also lets you compare different concepts in a rigorous manner; instead of
    saying that two concepts are similar, you can state precisely the extent to which
    they are similar by identifying the sub-concepts they share. From a practical
    perspective, being MECE means that you can “divide and conquer” big problems efficiently
    and solutions to some sub-problems may be reusable. Sometimes you can even reach
    the solution of the bigger problem without solving all the sub-problems (e.g.,
    if the bigger problem can be represented as a disjunction of the sub-problems).
    Bypassing sub-problems also works when you are solving the bigger problem inductively
    (e.g., as in mathematical induction).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 确保框架是MECE的具有一些重要的优势。从理论角度来看，成为MECE意味着子概念遵循一致的、累加的部分-整体逻辑；你期望子概念“累加”起来形成更大的概念。关键的是，这种逻辑允许你在整个分析过程中用子概念替换更大的概念（反之亦然）。MECE的累加逻辑还允许你以严谨的方式比较不同的概念；而不是说两个概念是相似的，你可以通过识别它们共有的子概念来精确地说明它们相似的程度。从实际角度来看，成为MECE意味着你可以“分而治之”地高效解决大问题，并且某些子问题的解决方案可能是可重用的。有时，甚至可以在不解决所有子问题的情况下找到更大问题的解决方案（例如，如果更大问题可以表示为子问题的析取）。在归纳解决更大问题时绕过子问题也是有效的（例如，在数学归纳法中）。
- en: 'Tip 4: Make It Flexible'
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小贴士 4：使其灵活
- en: Fundamentally, a conceptual framework should be designed to meet its overall
    objective, so you may be wondering why flexibility is an important aspect to consider.
    In practice, there are at least two types of situations in which flexibility can
    be a big help. In the first situation, you may be dealing with an objective that
    is a moving target, with some parts of the objective’s full scope changing (even
    slightly) from time to time; responding to such scope changes can be a pain if
    some flexibility is not baked into the framework. In the second situation, your
    framework may have to undergo several iterations, in which different framework
    types and dimensions are added, modified and removed over the course of the framework’s
    evolution; a flexible design makes it much easier to facilitate such alterations
    of the framework’s shape and content. Modularity, scalability, robustness, extensibility,
    and portability — while typically associated with software engineering and architecture
    — are also relevant design considerations for building flexible conceptual frameworks.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，概念框架应该设计得能够满足其总体目标，因此你可能想知道为什么灵活性是一个重要的考虑因素。在实践中，至少有两种情况，灵活性可以大有帮助。在第一种情况下，你可能正在处理一个移动的目标，目标的全范围的一些部分会不时（甚至略微）发生变化；如果没有在框架中融入一些灵活性，对这种范围变化的响应可能会很痛苦。在第二种情况下，你的框架可能需要经历几次迭代，在框架的发展过程中，不同的框架类型和维度被添加、修改和删除；灵活的设计使得促进框架形状和内容的这种变更变得容易得多。模块化、可扩展性、鲁棒性、可扩展性和可移植性——虽然通常与软件工程和架构相关——也是构建灵活概念框架的相关设计考虑因素。
- en: 'Tip 5: Build It Iteratively'
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小贴士5：迭代构建
- en: It would be great if you could come up with the perfect framework in one go,
    but it rarely works out that way. Several factors can make the first iteration
    more of a first draft, to be followed by at least a few more. The overarching
    objective — and especially the operational implications when it comes to building
    the framework — may not be fully clear at first. Over a couple of iterations,
    however, you will probably begin to get the hang of which framework types and
    dimensions work and which do not. While your output after a given iteration may
    be far from perfect, it could nevertheless amount to a *minimum viable product*
    (MVP) if it yields a viable solution to the overarching objective with minimal
    effort and complexity. The MVP can be tested (e.g., with actual data and real
    users) to understand its strengths and weaknesses. Each successive iteration can
    produce an improved MVP by adding, removing or changing features of the previous
    iteration.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能一次就提出一个完美的框架，那当然很好，但这种情况很少发生。有几个因素可能会使第一次迭代更像是一个草稿，需要至少再进行几次迭代。总体目标——尤其是构建框架时的操作影响——一开始可能并不完全清楚。然而，经过几次迭代后，你可能会开始了解哪些框架类型和维度是有效的，哪些不是。虽然给定迭代后的输出可能远非完美，但如果它以最小的努力和复杂性解决了总体目标，它仍然可以被视为一个*最小可行产品*（MVP）。MVP可以通过实际数据和真实用户进行测试，以了解其优势和劣势。每个后续迭代都可以通过添加、删除或更改前一个迭代的功能来产生一个改进的MVP。
- en: 'To close off, here is a video that shares some more good advice on building
    and using conceptual frameworks:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这里有一个视频，分享了一些关于构建和使用概念框架的更多好建议：
- en: The Wrap
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: The Wrap
- en: Conceptual frameworks help us turn abstract ideas into concrete, tangible products
    that other people can see, use, and appreciate. This can be especially important
    for data scientists, or so-called “knowledge workers,” whose jobs involve collecting,
    analyzing, and deriving conclusions from data. If you are reading this article,
    you are probably a knowledge worker. To paraphrase famous management guru Peter
    Drucker, “It is data that enables knowledge workers to do their job,” but it is
    the ability to meaningfully organize this data that leads to a job well done —
    and that, in a nutshell, is why the proper use of conceptual frameworks can aid
    the successful design and delivery of data science projects.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 概念框架帮助我们将抽象的想法转化为具体、可感知的产品，其他人可以看到、使用和欣赏。这对数据科学家或所谓的“知识工作者”来说尤为重要，他们的工作涉及收集、分析和从数据中得出结论。如果你正在阅读这篇文章，你很可能是一位知识工作者。用著名的管理大师彼得·德鲁克的话来说，“是数据使知识工作者能够完成他们的工作，”但能够有意义地组织这些数据的能力才是做好工作的关键——简而言之，这就是为什么正确使用概念框架可以帮助成功设计和交付数据科学项目的原因。
