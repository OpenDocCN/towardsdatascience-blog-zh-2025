- en: You can also learn about [How to Benchmark LLMs – ARC AGI 3](https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/),
    or you can read about [ensuring reliability in LLM applications.](https://eivindkjosbakken.com/2025/08/16/how-to-ensure-reliability-in-llm-applications/)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以了解[如何基准测试LLM – ARC AGI 3](https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/)，或者阅读有关[确保LLM应用可靠性](https://eivindkjosbakken.com/2025/08/16/how-to-ensure-reliability-in-llm-applications/)的文章。
- en: Motivation
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机
- en: My motivation for this article is that new LLMs are released rapidly. It’s difficult
    to stay up to date on all advances within the LLM space, and you thus have to
    trust benchmarks and online opinions to figure out which models are best. However,
    this is a severely flawed approach to judging which LLMs you should use either
    day-to-day or in an application you are developing.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我写这篇文章的动机是新的LLM发布速度很快。很难跟上LLM领域内所有新进展的步伐，因此你不得不依赖基准和在线意见来找出哪些模型是最好的。然而，这种方法在判断你应该使用哪些LLM（无论是日常使用还是在你开发的应用中）时存在严重缺陷。
- en: Benchmarks have the flaw that frontier model developers are incentivized to
    optimize their models for benchmarks, making benchmark performance possibly flawed.
    Online opinions also have their problems because others will have other use cases
    for LLMs than you. Thus, you should develop an internal benchmark to properly
    test newly released LLMs and figure out which ones work best for your specific
    use case.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 基准测试存在缺陷，因为前沿模型开发者被激励去优化它们在基准测试上的模型，使得基准测试的性能可能存在缺陷。在线意见也存在问题，因为其他人可能对LLM有不同于你的用例。因此，你应该开发一个内部基准，以正确测试新发布的LLM，并找出哪些最适合你的特定用例。
- en: How to develop an internal benchmark
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何开发内部基准
- en: There are many approaches to developing your own internal benchmark. The main
    point here is that your benchmark is not a super common task LLMs perform (generating
    summaries, for example, does not work). Furthermore, your benchmark should preferably
    utilize some internal data not available online.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 开发自己的内部基准测试有许多方法。这里的主要观点是，你的基准测试不是LLM执行的超常见任务（例如，生成摘要不适用）。此外，你的基准测试最好利用一些在线不可用的内部数据。
- en: You should keep two main things in mind when developing an internal benchmark
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发内部基准测试时，你应该牢记两件事
- en: It should be a task that’s either uncommon (so the LLMs are not specifically
    trained on it), or it should be using data not available online
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它应该是一个不常见（因此LLM没有专门针对它进行训练）的任务，或者它应该使用在线不可用的数据
- en: It should be as automatic as possible. You don’t have time to test each new
    release manually
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它应该尽可能自动化。你没有时间手动测试每个新版本
- en: You get a numeric score from the benchmark so that you can rank different models
    against each other
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以从基准测试中获得一个数值分数，这样你就可以对不同模型进行排名
- en: Types of tasks
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务类型
- en: Internal benchmarks could look very different from each other. Given some use
    cases, here are some example benchmarks you can develop
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 内部基准测试可能彼此差异很大。针对一些用例，以下是一些你可以开发的示例基准测试
- en: '**Use case:** Development in a rarely used programming language.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**用例：** 在很少使用的编程语言中进行开发。'
- en: '**Benchmark:** Have the LLM zero-shot a specific application like Solitaire
    (This is inspired by how [Fireship](https://www.youtube.com/c/Fireship) benchmarks
    LLMs by developing a [Svelte](https://svelte.dev/) application)'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**基准测试：** 让LLM对特定应用程序（如纸牌游戏）进行零样本测试（这灵感来源于[Fireship](https://www.youtube.com/c/Fireship)通过开发[Svelte](https://svelte.dev/)应用程序来对LLM进行基准测试）'
- en: '**Use case:** Internal question answering chatbot'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**用例：** 内部问答聊天机器人'
- en: '**Benchmark:** Gather a series of prompts from your application (preferably
    actual user prompts), together with their desired response, and see which LLM
    is closest to the desired responses.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**基准测试：** 从你的应用程序中收集一系列提示（最好是实际用户提示），以及它们期望的响应，然后看看哪个LLM的响应最接近期望的响应。'
- en: '**Use case:** Classification'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**用例：** 分类'
- en: '**Benchmark:** Create a dataset of input output examples. For this benchmark,
    the input can be a text, and the output a specific label, such as a sentiment
    analysis dataset. Evaluation is simple in this case, since you need the LLM output
    to exactly match the ground truth label.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**基准测试：** 创建一组输入输出示例的数据集。对于这个基准测试，输入可以是文本，输出可以是特定的标签，例如情感分析数据集。在这种情况下，评估很简单，因为你需要LLM的输出与地面真实标签完全匹配。'
- en: Ensuring automatic tasks
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确保自动化任务
- en: After figuring out which task you want to create internal benchmarks for, it’s
    time to develop the task. When developing, it’s important to ensure the task runs
    as automatically as possible. If you had to perform a lot of manual work for each
    new model release, it would be impossible to maintain this internal benchmark.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在确定你想要为哪个任务创建内部基准测试之后，是时候开发这个任务了。在开发过程中，确保任务尽可能自动化是非常重要的。如果你必须为每个新模型发布进行大量手动工作，那么维护这个内部基准测试将是不可能的。
- en: I thus recommend creating a standard interface for your benchmark, where the
    only thing you need to change per new model is to add a function that takes in
    the prompt and outputs the raw model text response. Then the rest of your application
    can remain static when new models are released.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我建议为你的基准测试创建一个标准接口，其中每次发布新模型时，你需要更改的唯一事情是添加一个函数，该函数接受提示并输出原始模型文本响应。然后，当发布新模型时，你的应用程序的其他部分可以保持静态。
- en: To keep the evaluations as automated as possible, I recommend running automated
    evaluations. I recently wrote an article about [How to Perform Comprehensive Large
    Scale LLM Validation](https://towardsdatascience.com/how-to-perform-comprehensive-large-scale-llm-validation/),
    where you can learn more about automated validation and evaluation. The main highlights
    are that you can either run a Regex function to verify correctness or utilize [LLM
    as a judge](https://towardsdatascience.com/how-to-use-llms-for-powerful-automatic-evaluations/).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 为了尽可能自动化评估，我建议运行自动化评估。我最近写了一篇关于[如何进行大规模LLM全面验证](https://towardsdatascience.com/how-to-perform-comprehensive-large-scale-llm-validation/)的文章，在那里你可以了解更多关于自动化验证和评估的信息。主要亮点是你可以运行一个正则表达式函数来验证正确性，或者利用[LLM作为裁判](https://towardsdatascience.com/how-to-use-llms-for-powerful-automatic-evaluations/)。
- en: Testing on your internal benchmark
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在你的内部基准测试上进行测试
- en: Now that you’ve developed your internal benchmark, it’s time to test some LLMs
    on it. I recommend at least testing out all closed-source frontier model developers,
    such as
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经建立了自己的内部基准，是时候在上面测试一些LLM了。我建议至少测试所有闭源前沿模型开发者，例如
- en: '[OpenAI (ChatGPT)](https://openai.com/)'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[OpenAI (ChatGPT)](https://openai.com/)'
- en: '[Google (Gemini)](https://gemini.google.com/app)'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Google (Gemini)](https://gemini.google.com/app)'
- en: '[Anthropic (Claude)](https://www.anthropic.com/)'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Anthropic (Claude)](https://www.anthropic.com/)'
- en: '[xAI (Grok)](https://x.ai/)'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[xAI (Grok)](https://x.ai/)'
- en: '[Mistral AI (Mistral)](https://mistral.ai/)'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Mistral AI (Mistral)](https://mistral.ai/)'
- en: However, I also highly recommend testing out open-source releases as well, for
    example, with
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我也强烈建议测试开源发布，例如，使用
- en: '[Qwen](https://chat.qwen.ai/)'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Qwen](https://chat.qwen.ai/)'
- en: '[Deepseek](https://www.deepseek.com/)'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Deepseek](https://www.deepseek.com/)'
- en: '[Llama](https://www.llama.com/)'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Llama](https://www.llama.com/)'
- en: etc.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 等。
- en: In general, whenever a new model makes a splash (for example, when DeepSeek
    released R1), I recommend running it on your benchmark. And because you made sure
    to develop your benchmark to be as automated as possible, the cost is low to test
    out new models.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，每当一个新的模型引起轰动（例如，当DeepSeek发布R1时），我建议你在你的基准上运行它。而且因为你确保你的基准尽可能自动化，测试新模型的成本很低。
- en: Continuing, I also recommend paying attention to new model version releases.
    For example, Qwen initially released their [Qwen 3 model](https://huggingface.co/Qwen/Qwen3-8B).
    However, a while later, they updated this model with [Qwen-3-2507](https://huggingface.co/Qwen/Qwen3-30B-A3B-Thinking-2507),
    which is said to be an improvement over the baseline Qwen 3 model. You should
    make sure to stay up to date on such (smaller) model releases as well.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 继续说，我还建议关注新模型版本的发布。例如，Qwen最初发布了他们的[Qwen 3模型](https://huggingface.co/Qwen/Qwen3-8B)。然而，一段时间后，他们用[Qwen-3-2507](https://huggingface.co/Qwen/Qwen3-30B-A3B-Thinking-2507)更新了此模型，据说这是在基线Qwen
    3模型上的改进。你应该确保及时了解这样的（较小的）模型发布。
- en: My final point on running the benchmark is that you should run the benchmark
    regularly. The reason for this is that models can change over time. For example,
    if you’re using OpenAI and not locking the model version, you can experience changes
    in outputs. It’s thus important to regularly run benchmarks, even on models you’ve
    already tested. This applies especially if you have such a model running in production,
    where maintaining high-quality outputs is critical.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我关于运行基准的最后一个观点是，你应该定期运行基准。原因是模型可能会随时间变化。例如，如果你使用OpenAI并且没有锁定模型版本，你可能会经历输出结果的变化。因此，定期运行基准非常重要，即使是在你已经测试过的模型上也是如此。这尤其适用于在生产中运行此类模型的情况，保持高质量的输出至关重要。
- en: Avoiding contamination
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免污染
- en: When utilizing an internal benchmark, it’s incredibly important to avoid contamination,
    for example, by having some of the data online. The reason for this is that today’s
    frontier models have essentially scraped the entire internet for web data, and
    thus, the models have access to all of this data. If your data is available online
    (especially if the solutions in your benchmarks are available), you’ve got a contamination
    issue at hand, and the model probably has access to the data from its pre-training.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用内部基准时，避免污染至关重要，例如，通过让一些数据在线。原因是今天的前沿模型实际上已经从整个互联网上抓取了网页数据，因此，模型可以访问所有这些数据。如果你的数据在网上可用（尤其是如果你的基准中的解决方案可用），你将面临污染问题，模型可能已经从其预训练中访问了这些数据。
- en: Use as little time as possible
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 尽可能少花时间
- en: 'Imagine this task as staying up to date on model releases. Yes, it’s a super
    important part of your job; however, this is a part that you can spend little
    time on and still get a lot of value. I thus recommend minimizing the time you
    spend on these benchmarks. Whenever a new frontier model is released, you test
    the model against your benchmark and verify the results. If the new model achieves
    vastly improved results, you should consider changing models in your application
    or day-to-day life. However, if you only see a small incremental improvement,
    you should probably wait for more model releases. Keep in mind that when you should
    change the model depends on factors such as:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 将这个任务想象成关注模型发布。是的，这是你工作中非常重要的一个部分；然而，这是你可以花很少时间但仍能获得很多价值的一个部分。因此，我建议尽量减少在这些基准上花费的时间。每当一个新的前沿模型发布时，你都应该用你的基准测试该模型并验证结果。如果新模型实现了大幅改进的结果，你应该考虑在应用程序或日常生活中更改模型。然而，如果你只看到小幅度的改进，你可能需要等待更多模型发布。记住，何时更改模型取决于诸如：
- en: How much time does it take to change models
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改变模型需要多少时间
- en: The cost difference between the old and the new model
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 旧模型和新模型之间的成本差异
- en: Latency
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 延迟
- en: …
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: …
- en: Conclusion
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I have discussed how you can develop an internal benchmark
    for testing all the LLM releases happening recently. Staying up to date on the
    best LLMs is difficult, especially when it comes to testing which LLM works best
    on your use case. Developing internal benchmarks makes this testing process a
    lot faster, which is why I highly recommend it to stay up to date on LLMs.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了您如何为测试最近发生的所有LLM发布版本开发一个内部基准。保持对最佳LLM的最新了解是困难的，尤其是在测试哪种LLM最适合您的用例时。开发内部基准可以使这一测试过程变得更快，这就是我强烈推荐您这样做以保持对LLM最新了解的原因。
