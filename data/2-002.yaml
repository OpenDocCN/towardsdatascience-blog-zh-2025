- en: How to Develop Powerful Internal LLM Benchmarks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何开发强大的内部LLM基准
- en: 原文：[https://towardsdatascience.com/how-to-develop-powerf-interal-llm-benchmarks/](https://towardsdatascience.com/how-to-develop-powerf-interal-llm-benchmarks/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-develop-powerf-interal-llm-benchmarks/](https://towardsdatascience.com/how-to-develop-powerf-interal-llm-benchmarks/)
- en: <mdspan datatext="el1756186564829" class="mdspan-comment">You hear about new</mdspan>
    LLMs being released almost weekly. Some recent releases we’ve had are [Qwen3 coing
    models](https://huggingface.co/Qwen/Qwen3-Coder-480B-A35B-Instruct), [GPT 5](https://openai.com/index/introducing-gpt-5/),
    [Grok 4](https://x.ai/news/grok-4), all of which claim the top of some benchmarks.
    Common benchmarks are Humanities Last Exam, SWE-bench, IMO, and so on.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756186564829" class="mdspan-comment">你几乎每周都能听到新的</mdspan>LLM发布。我们最近的一些发布包括[Qwen3
    coing模型](https://huggingface.co/Qwen/Qwen3-Coder-480B-A35B-Instruct)、[GPT 5](https://openai.com/index/introducing-gpt-5/)、[Grok
    4](https://x.ai/news/grok-4)，它们都声称在某个基准测试中处于领先地位。常见的基准有人文最后考试、SWE-bench、IMO等。
- en: 'However, these benchmarks have an inherent flaw: The companies releasing new
    front-end models are strongly incentivized to optimize their models for such performance
    on these benchmarks. The reason is that these well-known benchmarks are essentially
    what set the standard for what’s considered a new breakthrough LLM.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这些基准存在一个固有的缺陷：发布新前端模型的公司强烈被激励去优化它们在基准测试上的表现。原因是这些知名的基准实际上是为新突破性LLM设定标准的东西。
- en: 'Luckily, there exists a simple solution to this problem: Develop your own internal
    benchmarks, and test each LLM on the benchmark, which is what I’ll be discussing
    in this article.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，存在一个简单的解决方案来解决这个问题：开发你自己的内部基准，并在基准测试上测试每个LLM，这正是本文将要讨论的内容。
- en: '![Develop powerful internal LLM benchmarks](../Images/4357a9a8b423e84f62ab494cb41d7c47.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![开发强大的内部LLM基准](../Images/4357a9a8b423e84f62ab494cb41d7c47.png)'
- en: I discuss how you can develop powerful internal LLM benchmarks, to compare LLMs
    for your own use cases. Image by ChatGPT.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我讨论了你可以如何开发强大的内部LLM基准，以比较适用于你自己的用例的LLM。图片由ChatGPT提供。
