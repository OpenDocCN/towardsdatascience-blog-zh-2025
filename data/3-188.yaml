- en: '* * *'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why LettuceDetect?
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么选择LettuceDetect？
- en: Large Language Models (LLMs) have made considerable advancements in NLP tasks,
    like GPT-4 [4], the Llama-3 models [5], or Mistral [6] (and many more). Despite
    the success of LLMs, **hallucinations** remain a key obstacle deploying LLMs in
    high-stakes scenarios (such as in healthcare or legal) [7,8].
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）在NLP任务上取得了显著的进步，如GPT-4 [4]、Llama-3模型[5]、Mistral [6]（以及更多）。尽管LLMs取得了成功，但**幻觉**仍然是将LLMs部署在高风险场景（如医疗保健或法律）中的关键障碍[7,8]。
- en: '**Retrieval-Augmented Generation (RAG)** attempts to mitigate hallucinations
    by grounding an LLM’s responses in retrieved documents, providing external knowledge
    that the model can reference [9]. But even though RAG is a powerful method to
    reduce hallucinations, LLMs still suffer from hallucinations in these settings
    [1]. Hallucinations are information in the output that is nonsensical, factually
    incorrect, or inconsistent with the retrieved context [8]. Ji et al. [10] categorizes
    hallucinations into:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**检索增强生成（RAG）**试图通过将LLM的响应根植于检索到的文档中，提供外部知识供模型参考[9]，来减轻幻觉。但尽管RAG是减少幻觉的有力方法，LLM在这些设置中仍然存在幻觉[1]。幻觉是输出中的信息，它是无意义的、事实错误的，或者与检索到的上下文不一致[8]。Ji等人[10]将幻觉分为：'
- en: 'Intrinsic hallucinations: Stemming from the model’s preexisting internal knowledge.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内在幻觉：源于模型预先存在的内部知识。
- en: 'Extrinsic hallucinations: Occurring when the answer conflicts with the context
    or references provided'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 外部幻觉：当答案与提供的上下文或参考冲突时发生
- en: While RAG approaches can mitigate intrinsic hallucinations, they are not immune
    to extrinsic hallucinations. Sun et al. [11] showed that models tend to prioritize
    their intrinsic knowledge over the external context. As LLMs remain prone to hallucinations,
    their applications in critical domains e.g. medical or legal, can be still flawed.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 RAG 方法可以减轻内部幻觉，但它们并非对外部幻觉免疫。Sun 等人 [11] 表明，模型倾向于优先考虑其内部知识而不是外部上下文。由于 LLM
    仍然容易产生幻觉，它们在关键领域（例如医疗或法律）中的应用仍然可能存在缺陷。
- en: Current solutions for hallucination detection
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 幻觉检测的当前解决方案
- en: 'Current solutions for hallucination detection can be categorized into different
    categories based on the approach they take:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 幻觉检测的当前解决方案可以根据它们采用的方法分为不同的类别：
- en: '**Prompt-based detectors** These methods (e.g., [RAGAS](https://github.com/explodinggradients/ragas),
    [Trulens](https://github.com/truera/trulens), [ARES](https://github.com/stanford-futuredata/ARES))
    typically leverage zero-shot or few-shot prompts to detect hallucinations. They
    often rely on large LLMs (like GPT-4) and employ strategies such as SelfCheckGPT
    [12], LM vs. LM [13], or Chainpoll [14]. While often effective, they can be computationally
    expensive due to repeated LLM calls.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**基于提示的检测器** 这些方法（例如，[RAGAS](https://github.com/explodinggradients/ragas)，[Trulens](https://github.com/truera/trulens)，[ARES](https://github.com/stanford-futuredata/ARES)）通常利用零样本或少量样本提示来检测幻觉。它们通常依赖于大型
    LLM（如 GPT-4）并采用 SelfCheckGPT [12]，LM vs. LM [13] 或 Chainpoll [14] 等策略。虽然通常有效，但由于重复调用
    LLM，它们可能计算成本较高。'
- en: '**Fine-tuned LLM detectors** Large models (e.g., Llama-2, Llama-3) can be fine-tuned
    for hallucination detection [1,15]. This can yield high accuracy (as shown by
    the RAGTruth authors using Llama-2-13B or the RAG-HAT work on Llama-3-8B) but
    is resource-intensive to train and deploy. Inference costs also tend to be high
    due to their size and slower speeds.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**微调的 LLM 检测器** 大型模型（例如，Llama-2，Llama-3）可以被微调用于幻觉检测 [1,15]。这可以带来高精度（如 RAGTruth
    作者使用 Llama-2-13B 或 RAG-HAT 在 Llama-3-8B 上的工作所示），但训练和部署资源密集。由于模型大小和较慢的速度，推理成本也往往较高。'
- en: '**Encoder-based detectors** Models like [Luna [2]](https://aclanthology.org/2025.coling-industry.34/)
    rely on a BERT-style encoder (often limited to 512 tokens) for token-level classification.
    These methods are generally more efficient than running a full LLM at inference
    but are constrained by **short context windows** and attention mechanisms optimized
    for smaller inputs.'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**基于编码器的检测器** 类似于 [Luna [2]](https://aclanthology.org/2025.coling-industry.34/)
    的模型依赖于 BERT 风格的编码器（通常限制在 512 个标记以内）进行标记级分类。这些方法在推理时通常比运行完整的 LLM 更高效，但受限于 **短上下文窗口**
    和针对较小输入优化的注意力机制。'
- en: ModernBERT for long context
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ModernBERT 用于长上下文
- en: ModernBERT [3] is a drop-in replacement for BERT and is a state-of-the-art encoder-only
    transformers architecture that incorporates several modern design improvements
    over the original BERT model such as it uses Rotary Positional Embeddings ([RoPe](https://huggingface.co/blog/designing-positional-encoding))
    to handle sequences of up to 8,192 tokens, [unpadding optimization](https://arxiv.org/abs/2208.08124)
    to eliminate wasted computation on padding tokens, and [GeGLU](https://arxiv.org/abs/2002.05202)
    activation layers for enhanced expressiveness and [alternating attention](https://arxiv.org/abs/2004.05150v2)
    for more efficient attention computation.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: ModernBERT [3] 是 BERT 的直接替代品，它是一个最先进的仅编码器变压器架构，在原始 BERT 模型的基础上融入了多项现代设计改进，例如它使用旋转位置编码
    ([RoPe](https://huggingface.co/blog/designing-positional-encoding)) 来处理长达 8,192
    个标记的序列，[去填充优化](https://arxiv.org/abs/2208.08124) 以消除填充标记上的浪费计算，以及 [GeGLU](https://arxiv.org/abs/2002.05202)
    激活层以增强表达性和 [交替注意力](https://arxiv.org/abs/2004.05150v2) 以提高注意力计算的效率。
- en: '**LettuceDetect** capitalizes on ModernBERT’s extended context window to build
    a token-level classifier for hallucination detection. This approach sidesteps
    many limitations of older BERT-based models (e.g., short context bounds) and avoids
    the inference overhead of large LLM-based detectors. Our experiments show that
    LettuceDetect outperforms other encoder-based systems while remaining **competitive
    with fine-tuned LLM detectors** at a fraction of their computational cost.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**LettuceDetect**利用ModernBERT扩展的上下文窗口构建一个用于幻觉检测的标记级分类器。这种方法绕过了许多旧BERT模型的局限性（例如，短上下文边界）并避免了大型LLM检测器的推理开销。我们的实验表明，LettuceDetect在计算成本的一小部分内优于其他基于编码器的系统，同时在微调LLM检测器方面保持**竞争力**。'
- en: Data
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据
- en: '[RAGTruth](https://aclanthology.org/2024.acl-long.585/) is the first large-scale
    open-source (MIT License) benchmark specifically designed to evaluate **hallucination
    detection** in Retrieval-Augmented Generation (RAG) settings. It contains **18,000**
    annotated examples spanning multiple tasks:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '[RAGTruth](https://aclanthology.org/2024.acl-long.585/) 是第一个专门为评估检索增强生成（RAG）设置中的**幻觉检测**而设计的大规模开源（MIT许可证）基准。它包含**18,000**个注释示例，涵盖多个任务：'
- en: '**Question answering (QA)**: Sampled from the [MS MARCO](https://microsoft.github.io/msmarco/)
    dataset, where up to three documents are retrieved for each question, and an LLM
    is prompted to produce an answer.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问答（QA）**：从[MS MARCO](https://microsoft.github.io/msmarco/)数据集中采样，每个问题检索最多三份文档，并提示LLM生成答案。'
- en: '**Data-to-text generation**: Based on the [Yelp Open Dataset](https://www.yelp.com/dataset/),
    where LLMs generate reviews for sampled businesses.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据到文本生成**：基于[Yelp Open Dataset](https://www.yelp.com/dataset/)，其中LLM为采样的企业生成评论。'
- en: '**News summarization**: Uses random documents from [CNN/DailyMail](https://huggingface.co/datasets/cnn_dailymail),
    prompting LLMs to provide summaries.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**新闻摘要**：使用来自[CNN/DailyMail](https://huggingface.co/datasets/cnn_dailymail)的随机文档，提示LLM提供摘要。'
- en: 'Each example in RAGTruth includes:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: RAGTruth中的每个示例都包括：
- en: A **question** and **prompt**,
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个**问题**和一个**提示**，
- en: One or more **reference passages** or **context documents**,
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个或多个**参考段落**或**上下文文档**，
- en: An **LLM-generated response**,
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个**LLM生成的响应**，
- en: '**Human annotations** at the span level indicating whether any part of the
    answer is factually unsupported or contradictory to the reference passages.'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**人类注释**在范围级别上指示答案的任何部分是否在事实上不受支持或与参考段落矛盾。'
- en: 'Below is an illustrative sample from RAGTruth, showing an instance of hallucination:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是从RAGTruth中摘录的示例，展示了幻觉的一个实例：
- en: '* * *'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**QUESTION**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题**'
- en: How to explain quartiles?
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如何解释四分位数？
- en: '**REFERENCE**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**参考**'
- en: '**Passage 2:**'
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**第二部分：**'
- en: Second quartile (Q2) which is more commonly known as median splits the data
    in half (50%).
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第二四分位数（Q2），更常被称为中位数，将数据分成两半（50%）。
- en: Median divides the data into a lower half and an upper half.
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 中位数将数据分成下半部和上半部。
- en: Third quartile (Q3), also known as upper quartile, *splits lowest 75% (or highest
    25%)* of data.
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第三四分位数（Q3），也称为上四分位数，*将最低的75%（或最高的25%）的数据分开*。
- en: '*(…)*'
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(…)*'
- en: '**RESPONSE**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**响应**'
- en: The first quartile (Q1) splits the lowest 25% of the data, while the second
    quartile (Q2) splits the data into two equal halves, with the median being the
    middle value of the lower half. Finally, the third quartile (Q3) splits *the highest
    75% of the data.*
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第一四分位数（Q1）将数据的最低25%分开，而第二四分位数（Q2）将数据分成两个相等的部分，中位数是下半部分的中间值。最后，第三四分位数（Q3）将*数据的最高75%分开*。
- en: '*(…)*'
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(…)*'
- en: '**ANNOTATION**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**注释**'
- en: '**Span**: “highest 75%”'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**范围**：“最高的75%”'
- en: '**Type**: Evident Conflict'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类型**：明显冲突'
- en: '**Reason**:'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**原因**：'
- en: 'Original text: “lowest 75% (or highest 25%)”'
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 原文：“最低的75%（或最高的25%）”
- en: 'Generative text: “highest 75%”'
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成文本：“最高的75%”
- en: '* * *'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: This example showcases a RAGTruth annotation involving specific spans in the
    answer that conflict with the reference passages, providing both the **type**
    of hallucination (e.g., Evident Conflict) and a human-readable **rationale**.
    Our method only uses binary annotations and does not use the type of hallucination
    annotations.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子展示了RAGTruth注释中涉及答案中特定范围与参考段落冲突的情况，提供了**幻觉类型**（例如，明显冲突）和可读的**理由**。我们的方法仅使用二进制注释，不使用幻觉类型的注释。
- en: Method
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 方法
- en: '![Diagram of LettuceDetect](../Images/6fa972cffe9db87c1ec51905382c7093.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![LettuceDetect的示意图](../Images/6fa972cffe9db87c1ec51905382c7093.png)'
- en: Image by Author
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图像
- en: '**A high-level depiction of LettuceDetect.** Here, an example **Question**,
    **Context**, and **Answer** triplet is processed. First, the text is tokenized,
    after which LettuceDetect performs token-level classification. Tokens from both
    the question and context are **masked** (indicated by the red line in the figure)
    to exclude them from the loss function. Each token in the answer receives a probability
    indicating whether it is hallucinated or supported. For *span-level* detection,
    we merge consecutive tokens with hallucination probabilities above 0.5 into a
    single predicted span.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**LettuceDetect的高级描述**。在此，一个示例**问题**、**上下文**和**答案**三元组被处理。首先，文本被分词，然后LettuceDetect执行标记级分类。问题和上下文中的标记都被**掩码**（如图中的红线所示）以排除它们对损失函数的贡献。答案中的每个标记都接收一个概率，指示它是否被幻觉或支持。对于**跨度级别**检测，我们将幻觉概率高于0.5的连续标记合并为一个单一的预测跨度。'
- en: '* * *'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: We train **ModernBERT-base** and **ModernBERT-large** variants as token-classification
    models on the RAGTruth dataset. The input to the model is a concatenation of **Context**,
    **Question**, and **Answer** segments, with specialized tokens ([CLS]) (for the
    context) and ([SEP]) (as separators). We limit the sequence length to 4,096 tokens
    for computational feasibility, though ModernBERT can theoretically handle up to
    8,192 tokens.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在RAGTruth数据集上训练**ModernBERT-base**和**ModernBERT-large**变体作为标记分类模型。模型的输入是**上下文**、**问题**和**答案**段落的拼接，其中包含专门的标记([CLS])（用于上下文）和([SEP])（作为分隔符）。我们限制序列长度为4,096个标记以实现计算可行性，尽管ModernBERT理论上可以处理高达8,192个标记。
- en: Tokenization and data processing
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分词和数据预处理
- en: '**Tokenizer**: We employ *AutoTokenizer* from the Transformers library to handle
    subword tokenization, inserting [CLS] and [SEP] appropriately.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分词器**：我们使用Transformers库中的*AutoTokenizer*来处理子词分词，并适当地插入[CLS]和[SEP]。'
- en: '**Labeling**:'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标注**：'
- en: Context/question tokens are *masked* (i.e., assigned a label of -100 in PyTorch)
    so that they do not contribute to the loss.
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文/问题标记被**掩码**（即在PyTorch中分配标签-100）以使它们不贡献于损失。
- en: Each *answer* token receives a label of **0** (supported) or **1** (hallucinated).
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个答案标记接收**0**（支持）或**1**（幻觉）的标签。
- en: Model architecture
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型架构
- en: Our models build on Hugging Face’s *AutoModelForTokenClassification*, using
    **ModernBERT** as the encoder and a classification head on top. Unlike some previous
    encoder-based approaches (e.g., ones pre-trained on NLI tasks), our method uses
    *only* ModernBERT with no additional pretraining stage.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在Hugging Face的*AutoModelForTokenClassification*的基础上构建模型，使用**ModernBERT**作为编码器，并在其上方添加分类头。与一些之前的基于编码器的方法（例如在NLI任务上预训练的方法）不同，我们的方法**仅使用**ModernBERT，没有额外的预训练阶段。
- en: Training configuration
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练配置
- en: '**Optimizer**: AdamW, with a learning rate of 1 * 10^-5 and weight decay of
    0.01.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化器**：AdamW，学习率为1 * 10^-5，权重衰减为0.01。'
- en: '**Hardware**: Single NVIDIA A100 GPU.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**硬件**：单个NVIDIA A100 GPU。'
- en: '**Epochs**: 6 total training epochs.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练轮数**：总共6个训练轮次。'
- en: '**Batching**:'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**批处理**：'
- en: Batch size of 8,
  id: totrans-85
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批处理大小为8，
- en: Data loading with PyTorch *DataLoader* (shuffling enabled),
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用PyTorch *DataLoader*加载数据（启用打乱），
- en: Dynamic padding via *DataCollatorForTokenClassification* to handle variable-length
    sequences efficiently.
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过*DataCollatorForTokenClassification*进行动态填充，以有效地处理可变长度的序列。
- en: During training, we monitor **token-level F1** scores on a validation split,
    saving checkpoints using the *safetensors* format. Once training is complete,
    we upload the best-performing models to Hugging Face for public access.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中，我们监控验证分割上的**标记级F1**分数，使用*safetensors*格式保存检查点。一旦训练完成，我们将表现最佳的模型上传到Hugging
    Face以供公众访问。
- en: At inference time, the model outputs a probability of hallucination for each
    token in the answer. We aggregate consecutive tokens exceeding a 0.5 threshold
    to produce **span-level** predictions, indicating exactly which segments of the
    answer are likely to be hallucinated. The figure above illustrates this workflow.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在推理时，模型为答案中的每个标记输出幻觉概率。我们将超过0.5阈值的连续标记聚合以产生**跨度级别**的预测，指示答案中哪些部分可能被幻觉。上图说明了这个工作流程。
- en: Next, we provide a more detailed evaluation of the model’s performance.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们提供对模型性能的更详细评估。
- en: Results
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果
- en: We evaluate our models on the RAGTruth test set across all task types (Question
    Answering, Data-to-Text, and Summarization). For each example, RAGTruth includes
    manually annotated spans indicating hallucinated content.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在所有任务类型（问答、数据到文本和摘要）的RAGTruth测试集上评估我们的模型。对于每个示例，RAGTruth包括手动标注的表示幻觉内容的跨度。
- en: Example-level results
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例级结果
- en: 'We first assess the **example-level** question: *Does the generated answer
    contain any hallucination at all?* Our large model (**lettucedetect-large-v1**)
    attains an **overall F1 score of 79.22%**, surpassing:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先评估**示例级**问题：*生成的答案是否包含任何幻觉？* 我们的大模型（**lettucedetect-large-v1**）实现了**总体F1分数为79.22**%，超过了：
- en: '**GPT-4** (63.4%),'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GPT-4** (63.4%),'
- en: '**Luna** (65.4%) (the previous state of the art encoder-based model),'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Luna**（65.4%）（之前基于编码器的最先进模型），'
- en: '**Fine-tuned Llama-2-13B** (78.7%) as presented in the RAGTruth paper.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微调后的Llama-2-13B**（78.7%）如RAGTruth论文中所示。'
- en: It is second only to the fine-tuned **Llama-3-8B** from the **RAG-HAT** paper
    [15] (83.9%), but LettuceDetect is significantly **smaller** and **faster** to
    run. Meanwhile, our base model (**lettucedetect-base-v1**) remains highly competitive
    while using fewer parameters.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 它仅次于**RAG-HAT**论文[15]中微调的**Llama-3-8B**（83.9%），但LettuceDetect在运行时**更小**且**更快**。同时，我们的基础模型（**lettucedetect-base-v1**）在参数使用较少的情况下仍保持高度竞争力。
- en: '![Comparison table illustrating how LettuceDetect aligns against both prompt-based
    methods (e.g., GPT-4) and alternative encoder-based solutions (e.g., Luna)](../Images/bafaa065be2d87d9d8d248a9277de5dd.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![比较表格展示了LettuceDetect如何与基于提示的方法（例如，GPT-4）和基于替代编码器的解决方案（例如，Luna）进行对齐](../Images/bafaa065be2d87d9d8d248a9277de5dd.png)'
- en: Image by Author
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: Above is a comparison table illustrating how LettuceDetect aligns against both
    prompt-based methods (e.g., GPT-4) and alternative encoder-based solutions (e.g.,
    Luna). Overall, **lettucedetect-large-v1** and **lettucedect-base-v1** are very
    performant models, while being very effective in inference settings.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 上表是一个比较表格，展示了LettuceDetect如何与基于提示的方法（例如，GPT-4）和基于替代编码器的解决方案（例如，Luna）进行对齐。总体而言，**lettucedetect-large-v1**和**lettucedect-base-v1**是非常高效的模型，在推理设置中非常有效。
- en: Span-level results
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 层级结果
- en: Beyond detecting if an answer contains hallucinations, we also examine LettuceDetect’s
    ability to identify the **exact spans** of unsupported content. Here, LettuceDetect
    achieves **state-of-the-art** results among models that have reported span-level
    performance, substantially outperforming the fine-tuned Llama-2-13B model from
    the RAGTruth paper [1] and other baselines.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 除了检测答案是否包含幻觉之外，我们还考察了LettuceDetect识别**确切跨度**中不支持内容的能力。在这里，LettuceDetect在报告了层级性能的模型中实现了**最先进**的结果，显著优于RAGTruth论文[1]中微调的Llama-2-13B模型和其他基线。
- en: '![](../Images/80d85055d24a68cb9893000c8efbf813.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/80d85055d24a68cb9893000c8efbf813.png)'
- en: Image by Author
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: Most methods, like RAG-HAT [15], do not report span-level metrics, so we do
    not compare to them here.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数方法，如RAG-HAT[15]，没有报告层级指标，所以我们在这里没有进行比较。
- en: Inference efficiency
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 推理效率
- en: Both **lettucedetect-base-v1** and **lettucedetect-large-v1** require fewer
    parameters than typical LLM-based detectors (e.g., GPT-4 or Llama-3-8B) and can
    process **30–60 examples per second** on a single NVIDIA A100 GPU. This makes
    them practical for industrial workloads, real-time user-facing systems, and resource-constrained
    environments.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**lettucedetect-base-v1**和**lettucedetect-large-v1**比典型的基于LLM的检测器（例如，GPT-4或Llama-3-8B）使用的参数更少，并且可以在单个NVIDIA
    A100 GPU上每秒处理**30-60个示例**。这使得它们适用于工业负载、面向用户的实时系统以及资源受限的环境。'
- en: 'Overall, these results show that **LettuceDetect** has a good balance: it achieves
    near state-of-the-art accuracy at a fraction of the size and cost compared to
    large LLM-based judges, while offering precise, token-level hallucination detection.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，这些结果表明**LettuceDetect**具有良好的平衡：它在大规模LLM基础评判器的一小部分大小和成本下实现了接近最先进的准确性，同时提供了精确的、基于标记的幻觉检测。
- en: Get going
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始使用
- en: 'Install the package:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 安装包：
- en: '[PRE0]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Then, you can use the package as follows:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以按以下方式使用该包：
- en: '[PRE1]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Conclusion
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: We introduced **LettuceDetect**, a lightweight and efficient framework for hallucination
    detection in RAG systems. By utilizing ModernBERT’s extended context capabilities,
    our models achieve strong performance on the RAGTruth benchmark while retaining
    **high inference efficiency**. This work lays the groundwork for future research
    directions, such as expanding to additional datasets, supporting multiple languages,
    and exploring more advanced architectures. Even at this stage, LettuceDetect demonstrates
    that **effective hallucination detection** can be achieved using **lean, purpose-built**
    encoder-based models.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 我们介绍了**LettuceDetect**，这是一个轻量级且高效的RAG系统中幻觉检测框架。通过利用ModernBERT扩展的上下文能力，我们的模型在RAGTruth基准测试中实现了强大的性能，同时保持了**高推理效率**。这项工作为未来的研究方向奠定了基础，例如扩展到更多数据集、支持多种语言以及探索更先进的架构。即使在目前这个阶段，LettuceDetect也证明了**有效的幻觉检测**可以使用**精简、专门构建**的基于编码器的模型来实现。
- en: Citation
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引用
- en: 'If you find this work useful, please cite it as follows:'
