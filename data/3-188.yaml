- en: 'LettuceDetect: A Hallucination Detection Framework for RAG Applications'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LettuceDetect：RAG应用的幻觉检测框架
- en: 原文：[https://towardsdatascience.com/lettucedetect-a-hallucination-detection-framework-for-rag-applications/](https://towardsdatascience.com/lettucedetect-a-hallucination-detection-framework-for-rag-applications/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/lettucedetect-a-hallucination-detection-framework-for-rag-applications/](https://towardsdatascience.com/lettucedetect-a-hallucination-detection-framework-for-rag-applications/)
- en: '*Originally published on* [*HuggingFace*](https://huggingface.co/adaamko)'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*最初发布于* [*HuggingFace*](https://huggingface.co/adaamko)'
- en: TL;DR
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TL;DR
- en: We present **LettuceDetect**, a lightweight hallucination detector for Retrieval-Augmented
    Generation (RAG) pipelines. It is an **encoder-based** model built on [ModernBERT](https://github.com/AnswerDotAI/ModernBERT),
    released under the MIT license with ready-to-use Python packages and pretrained
    models.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们介绍了**LettuceDetect**，这是一个轻量级的幻觉检测器，用于检索增强生成（RAG）管道。它是一个基于[ModernBERT](https://github.com/AnswerDotAI/ModernBERT)的**编码器**模型，在MIT许可下发布，带有可用的Python包和预训练模型。
- en: '**What**: LettuceDetect is a token-level detector that flags unsupported segments
    in LLM answers. 🥬'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**什么是**：LettuceDetect是一个标记级检测器，用于标记LLM答案中的不受支持的片段。🥬'
- en: '**How**: Trained on [RAGTruth](https://aclanthology.org/2024.acl-long.585/)
    (18k examples), leveraging ModernBERT for context lengths up to 4k tokens. 🚀'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如何**：在[RAGTruth](https://aclanthology.org/2024.acl-long.585/)（18k个示例）上训练，利用ModernBERT进行上下文长度高达4k个标记。🚀'
- en: '**Why**: It addresses (1) the context-window limits in prior encoder-only models,
    and (2) the high compute costs of LLM-based detectors. ⚖️'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**原因**：它解决了（1）先前仅基于编码器的模型中的上下文窗口限制，以及（2）基于LLM的检测器的高计算成本。⚖️'
- en: '**Highlights**:'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**亮点**：'
- en: Beats prior encoder-based models (e.g., [Luna](https://aclanthology.org/2025.coling-industry.34/))
    on RAGTruth. ✅
  id: totrans-9
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在RAGTruth上击败了先前的基于编码器的模型（例如，[Luna](https://aclanthology.org/2025.coling-industry.34/)）。✅
- en: Surpasses fine-tuned Llama-2-13B [2] at a fraction of the size, and is highly
    efficient at inference. ⚡️
  id: totrans-10
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在大小的一小部分内超越了微调的Llama-2-13B [2]，并且在推理方面非常高效。⚡️
- en: Entirely **open-source** with an MIT license. 🔓
  id: totrans-11
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全**开源**，MIT许可。🔓
- en: '**LettuceDetect** keeps your RAG framework **fresh** by spotting **rotten**
    parts of your LLM’s outputs. 😊'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**LettuceDetect**通过识别LLM输出的“腐烂”部分，使你的RAG框架保持**新鲜**。😊'
