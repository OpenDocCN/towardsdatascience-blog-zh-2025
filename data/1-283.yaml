- en: Why add more data to LLMs?
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么要把更多数据添加到LLMs中？
- en: I’ll start my article off by pointing out why it’s important. LLMs are incredibly
    data hungry, meaning that they require a lot of data to -work well. This is commonly
    shown in the pre-training corpus of LLMs, which consists of trillions of text
    tokens being used for training the LLM.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我将从指出为什么这很重要开始我的文章。LLMs对数据的需求极大，这意味着它们需要大量数据才能 -工作良好。这通常在LLMs的预训练语料库中体现出来，该语料库由用于训练LLMs的万亿个文本标记组成。
- en: In era of pretraining, what mattered was internet text. You'd primarily want
    a large, diverse, high quality collection of internet documents to learn from.
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在预训练时代，重要的是互联网文本。你主要希望有一个大型的、多样化的、高质量的互联网文档集合来学习。
- en: ''
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In era of supervised finetuning, it was conversations. Contract workers are
    hired to create answers for questions, a bit… [https://t.co/rR6yYZGgKP](https://t.co/rR6yYZGgKP)
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在监督微调时代，重要的是对话。雇佣合同工来为问题创建答案，有点…… [https://t.co/rR6yYZGgKP](https://t.co/rR6yYZGgKP)
- en: ''
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Andrej Karpathy (@karpathy) [August 27, 2025](https://twitter.com/karpathy/status/1960803117689397543?ref_src=twsrc%5Etfw)
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Andrej Karpathy (@karpathy) [2025年8月27日](https://twitter.com/karpathy/status/1960803117689397543?ref_src=twsrc%5Etfw)
- en: Andrej Karpathy tweeting about the data used for LLMs.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: Andrej Karpathy在推特上关于用于LLM的数据
- en: However, the concept of utilizing a lot of data also applies to LLMs during
    inference time (when you utilize the LLM in production). You need to provide the
    LLM with all necessary data to answer a user request.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，大量使用数据的理念也适用于LLM在推理时间（在生产中使用LLM时）的应用。你需要向LLM提供所有必要的数据以回答用户请求。
- en: In a lot of cases, you inadvertently reduce the LLM’s performance by not providing
    relevant information.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在很多情况下，你由于没有提供相关信息而不自觉地降低了LLM的性能。
- en: 'For example, if you create a question answering system, where users can upload
    files and talk to them. Naturally, you provide the text contents of each file
    so that the user can chat with the document; however, you could, for example,
    forget to add the **filenames** of the documents to the context the user is chatting
    with. This will impact the LLM’s performance, for example, if some information
    is only present in the filename or the user references the filename in the chat.
    Some other specific LLM applications where additional data is useful are:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你创建了一个问答系统，用户可以上传文件并与它们交谈。自然地，你提供了每个文件的文本内容，以便用户可以与文档聊天；然而，例如，你可能忘记将文档的**文件名**添加到用户正在聊天的上下文中。这将影响LLM的性能，例如，如果某些信息仅存在于文件名中或用户在聊天中引用了文件名。一些其他具体的LLM应用，其中额外的数据是有用的包括：
- en: Classification
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分类
- en: Information extraction
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信息提取
- en: Keyword search for finding relevant documents to feed to LLM
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键词搜索以找到相关文档以供LLM使用
- en: In the rest of the article, I’ll discuss where you can find such data, techniques
    to retrieve additional data, and some specific use cases for the data.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文的其余部分，我将讨论你可以在哪里找到这样的数据，检索额外数据的技术，以及一些数据的具体用例。
- en: Finding additional metadata
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 寻找额外的元数据
- en: 'In this section, I’ll discuss data that you likely already have available in
    your application. One example is my last analogy, where you have a question answering
    system for files, but forget to add the filename to the context. Some other examples
    are:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我将讨论你可能在应用程序中已经可用的数据。一个例子是我最后的类比，其中你有一个文件问答系统，但忘记了将文件名添加到上下文中。其他一些例子包括：
- en: File extensions (.pdf, .docx, .xlsx)
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件扩展名（.pdf, .docx, .xlsx）
- en: Folder path (if the user uploaded a folder)
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件夹路径（如果用户上传了一个文件夹）
- en: Timestamps (for example, if a user asks about the most recent document, this
    is required)
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间戳（例如，如果用户询问最新的文档，这是必需的）
- en: Page numbers (the user might ask the LLM to fetch specific information located
    on page 5)
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页码（用户可能要求LLM获取位于第5页的特定信息）
- en: '![Metadata alternatives](../Images/6631fd20640dafaeb02b65fc6e6b0c91.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![元数据的替代方案](../Images/6631fd20640dafaeb02b65fc6e6b0c91.png)'
- en: This image highlights different types of metadata you can obtain, with file
    types, folder paths, timestamps, and page numbers. Image by Google Gemini.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图片突出了你可以获取的不同类型的元数据，包括文件类型、文件夹路径、时间戳和页码。图片由Google Gemini提供。
- en: There are a ton of other such examples of data you likely already have available,
    or that you can quickly fetch and add to your LLM’s context.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 有大量的其他此类数据示例，你可能已经拥有，或者可以快速获取并添加到你的LLM上下文中。
- en: The type of data you have available will vary widely from application to application.
    A lot of the examples I’ve provided in this article are tailored to text-based
    AI, since that’s the space I spend the most time in. However, if you, for example,
    work more on visual AI or audio-based AI, I urge you to find similar examples
    in your space.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你可用的数据类型将在不同的应用中差异很大。我在本文中提供的许多示例都是针对基于文本的AI，因为这是我花费时间最多的领域。然而，如果你，例如，更多地从事视觉AI或基于音频的AI，我敦促你找到你所在领域的类似示例。
- en: 'For visual AI, it could be:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 对于视觉人工智能，它可能是：
- en: Location data for where the image/video was taken
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图片/视频拍摄位置的地理数据
- en: The filename of the image/video file
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图片/视频文件的文件名
- en: The author of the image/video file
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图片/视频文件的作者
- en: Or for audio AI, it could be
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 或者对于音频AI，它可能是
- en: Metadata about who is speaking when
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于何时谁在说话的元数据
- en: Timestamps for each sentence
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每句话的时间戳
- en: Location data from where the audio was recorded
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 音频录制位置的地理数据
- en: My point being, there is a plethora of available data out there; all you need
    to do is look for it and consider how it can be useful for your application.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我的观点是，外面有大量的可用数据；你所需要做的就是去寻找它，并考虑它如何对你的应用有用。
- en: Information retrieval of metadata
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 元数据的信息检索
- en: Sometimes, the data you already have available is not enough. You want to provide
    your LLM with even more data to help it answer questions appropriately. In this
    case, you need to retrieve additional data. Naturally, since we are in the age
    of LLMs, we’ll utilize LLMs to fetch this data.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，您已经拥有的数据可能不足以满足需求。您希望为您的LLM提供更多数据以帮助它适当地回答问题。在这种情况下，您需要检索额外的数据。自然地，因为我们正处于LLM时代，我们将利用LLM来检索这些数据。
- en: Retrieving information beforehand
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 事先检索信息
- en: The easiest approach is to retrieve additional data by fetching it before processing
    any live requests. For document AI, this means extracting specific information
    from documents during processing. You might extract the **type of document** (legal
    document, tax document, or sales brochure) or specific information contained in
    the document (dates, names, locations, …).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 最简单的方法是在处理任何实时请求之前检索额外的数据。对于文档AI来说，这意味着在处理过程中从文档中提取特定信息。您可能需要提取**文档类型**（法律文件、税务文件或销售手册）或文档中包含的特定信息（日期、姓名、地点等）。
- en: 'The advantage of fetching the information beforehand is:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 事先获取信息的优势是：
- en: Speed (in production, you only need to fetch the value from your database)
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 速度（在生产中，您只需从您的数据库中检索值）
- en: You can take advantage of [batch processing](https://platform.openai.com/docs/guides/batch)
    to reduce costs
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以利用[批量处理](https://platform.openai.com/docs/guides/batch)来降低成本
- en: Today, fetching this kind of information is rather simple. You set up an LLM
    with a specific system prompt to fetch information, and feed the prompt along
    with the text into the LLM. The LLM will then process the text and extract the
    relevant information for you. You might want to consider evaluating the performance
    of your information extraction, in which case you can read my article on [Evaluating
    5 Millions LLM Requests with Automated Evals.](https://eivindkjosbakken.com/2025/09/14/how-to-evaluate-5-million-documents-with-automatic-llm-evaluations/)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，检索这类信息相当简单。您只需设置一个具有特定系统提示的LLM来获取信息，然后将提示和文本一起输入LLM。然后LLM将处理文本并为您提取相关信息。您可能希望考虑评估您信息提取的性能，在这种情况下，您可以阅读我的文章[使用自动评估评估500万LLM请求](https://eivindkjosbakken.com/2025/09/14/how-to-evaluate-5-million-documents-with-automatic-llm-evaluations/)。
- en: 'You likely also want to map out all the information points to retrieve, for
    example:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能还希望规划所有要检索的信息点，例如：
- en: Location
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 位置
- en: Dates
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 日期
- en: Names
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 姓名
- en: …
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: …
- en: When you have created this list, you can retrieve all your metadata and store
    it in the database.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 当您创建了此列表后，您可以检索所有元数据并将其存储在数据库中。
- en: However, the main downside of fetching information beforehand is that you have
    to predetermine which information to extract. This is difficult in a lot of scenarios,
    in which case you can do live information retrieval, which I cover in the next
    section.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，事先获取信息的最大缺点是您必须预先确定要提取的信息。在很多情况下这是困难的，在这种情况下，您可以进行实时信息检索，我将在下一节中介绍。
- en: On-demand information retrieval
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 按需信息检索
- en: When you can’t determine which information to retrieve beforehand, you can fetch
    it on demand. This means setting up a generic function that takes in a data point
    to extract and the text to extract it from. For example
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 当您无法事先确定要检索哪些信息时，您可以按需检索。这意味着设置一个通用函数，该函数接受要提取的数据点和提取它的文本。例如
- en: '[PRE0]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: You define this function as a tool your LLM has access to, and which it can
    call whenever it needs information. This is essentially how [Anthropic has set
    up their deep research system](https://www.anthropic.com/engineering/multi-agent-research-system),
    where they create one orchestrator agent that can spawn sub-agents to fetch additional
    information. Note that giving your LLM access to use additional prompts can lead
    to a lot of token usage, so you should pay attention to you’re LLM’s token spend.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 您将此函数定义为LLM可以访问的工具，并且它可以在需要信息时调用它。这本质上就是[Anthropic建立他们的深度研究系统](https://www.anthropic.com/engineering/multi-agent-research-system)的方式，他们创建了一个可以产生子代理以检索额外信息的协调代理。请注意，给予您的LLM使用额外提示的访问权限可能会导致大量令牌使用，因此您应该注意您LLM的令牌花费。
- en: LLM use cases for metadata
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM用于元数据的用例
- en: Until now, I’ve discussed why you should utilize additional data and how to
    get a hold of it. However, to fully grasp the content of this article, I’ll also
    provide specific applications where this data improves LLM performance.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我已经讨论了为什么您应该利用额外的数据以及如何获取它。然而，为了完全理解这篇文章的内容，我还会提供一些具体的应用，这些数据可以改善LLM的性能。
- en: Metadata filtering search
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 元数据过滤搜索
- en: '![Metadata filtering](../Images/9ce36c1a217d160a4ecccd5d5a58b46c.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![元数据过滤](../Images/9ce36c1a217d160a4ecccd5d5a58b46c.png)'
- en: This figure highlights how metadata filtering search is performed, where you
    can filter away irrelevant documents using metadata filtering. Image by Google
    Gemini.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了元数据过滤搜索是如何进行的，您可以使用元数据过滤来过滤掉不相关的文档。图片由Google Gemini提供。
- en: 'My first example is that you can perform a search with metadata filtering.
    Providing information such as:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我的第一个例子是，您可以使用元数据过滤进行搜索。提供如下信息：
- en: file-type (pdf, xlsx, docx, …)
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件类型（pdf, xlsx, docx，…）
- en: file size
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件大小
- en: Filename
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件名
- en: It can help your application when fetching relevant information. This can, for
    example, be information fetched to be fed into your LLM’s context, like when performing
    RAG. You can utilize the additional metadata to filter away irrelevant files.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以在获取相关信息时帮助您的应用程序。例如，当执行RAG时，可以将信息提取出来以供您的LLM的上下文使用。您可以使用额外的元数据来过滤掉不相关的文件。
- en: A user might have asked a question pertaining to only Excel documents. Using
    RAG to fetch chunks from files other than Excel documents is, therefore, bad usage
    of the LLM’s context window. You should instead filter available chunks to only
    find Excel documents, and utilize chunks from Excel documents to best answer the
    user’s query. You can learn more about handling LLM contexts in [my article on
    building effective AI agents](https://towardsdatascience.com/how-to-build-effective-ai-agents-to-process-millions-of-requests/).
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 用户可能只询问与Excel文档相关的问题。因此，使用RAG从除Excel文档以外的文件中获取块是LLM上下文窗口的糟糕使用。相反，您应该过滤可用的块，只找到Excel文档，并利用Excel文档的块来最好地回答用户的查询。您可以在我的关于构建有效AI代理的文章中了解更多关于处理LLM上下文的信息（[我的文章](https://towardsdatascience.com/how-to-build-effective-ai-agents-to-process-millions-of-requests/)）。
- en: AI agent internet search
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AI代理互联网搜索
- en: Another example is if you’re asking your AI agent questions about recent history
    that happened after the pre-training cutoff for the LLM. LLMs typically has a
    training data cutoff for pre-training data, because the data needs to be carefully
    curated, and keeping it fully up to date is challenging.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个例子是，如果您询问AI代理关于LLM预训练截止日期之后发生的近期历史问题。LLMs通常有一个预训练数据的截止日期，因为数据需要被精心策划，并且保持其完全更新是具有挑战性的。
- en: This presents a problem when users ask questions about recent history, for example,
    about recent events in the news. In this case, the AI agent answering the query
    needs access to an internet search (essentially performing information extraction
    on the internet). This is an example of on-demand information extraction.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 当用户询问关于近期历史的问题时，例如关于新闻中的近期事件，这会带来一个问题。在这种情况下，回答查询的AI代理需要访问互联网搜索（本质上是在互联网上执行信息提取）。这是一个按需信息提取的例子。
- en: Conclusion
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I’ve discussed how to significantly enhance your LLM by providing
    it with additional data. You can either find this data in your existing metadata
    (filenames, file-size, location data), or you can retrieve the data through information
    extraction (document type, names mentioned in a document, etc). This information
    is often critical to an LLM’s ability to successfully answer user queries, and
    in many instances, the lack of this data essentially guarantees the LLM’s failure
    to answer a question correctly.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了如何通过提供额外数据来显著提高您的LLM。您可以从现有的元数据（文件名、文件大小、位置数据）中找到这些数据，或者您可以通过信息提取（文档类型、文档中提到的名称等）来检索这些数据。这些信息对于LLM成功回答用户查询的能力通常至关重要，在许多情况下，缺乏这些数据几乎保证了LLM无法正确回答问题。
