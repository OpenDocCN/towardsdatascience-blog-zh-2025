- en: What is LLM validation and evaluation?
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是LLM验证和评估？
- en: I think it’s essential to start by defining what LLM validation and evaluation
    are, and why they’re important for your application.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为首先定义LLM验证和评估是什么，以及为什么它们对您的应用很重要，这是至关重要的。
- en: LLM validation is about validating the quality of your outputs. One common example
    of this is running some piece of code that checks if the LLM response answered
    the user’s question. Validation is important because it ensures you’re providing
    high-quality responses, and your LLM is performing as expected. Validation can
    be seen as something you do real time, on individual responses. For example, before
    returning the response to the user, you verify that the response is actually of
    high quality.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: LLM验证是关于验证您输出的质量。一个常见的例子是运行一些代码来检查LLM的响应是否回答了用户的问题。验证很重要，因为它确保您提供高质量的响应，并且您的LLM按预期运行。验证可以看作是您在实时中对单个响应所做的事情。例如，在将响应返回给用户之前，您要验证该响应实际上是否高质量。
- en: LLM evaluation is similar; however, it usually does not occur in real time.
    Evaluating your LLM output could, for example, involve looking at all the user
    queries from the last 30 days and quantitatively assessing how well your LLM performed.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: LLM评估类似；然而，它通常不会实时发生。评估你的LLM输出可能包括查看过去30天内的所有用户查询，并定量评估你的LLM表现如何。
- en: Validating and evaluating your LLM’s performance is important because you will
    experience issues with the LLM output. It could, for example, be
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 验证和评估你的LLM性能很重要，因为你将遇到LLM输出的问题。例如，它可能是
- en: Issues with input data (missing data)
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入数据问题（数据缺失）
- en: An edge case your prompt is not equipped to handle
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你提示的边缘情况无法处理
- en: Data is out of distribution
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据分布不均
- en: Etc.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 等等。
- en: Thus, you need a robust solution for handling LLM output issues. You need to
    ensure you avoid them as often as possible and handle them in the remaining cases.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你需要一个强大的解决方案来处理LLM输出问题。你需要确保尽可能避免这些问题，并在剩余情况下处理它们。
- en: 'Murphy’s law adapted to this scenario:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 适用于此场景的墨菲定律：
- en: On a large scale, everything that can go wrong, will go wrong
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在大规模上，所有可能出错的事情都会出错
- en: Qualitative vs quantitative assessments
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定性 vs 定量评估
- en: Before moving on to the individual sections on performing validation and evaluations,
    I also want to comment on qualitative vs quantitative assessments of LLMs. When
    working with LLMs, it’s often tempting to manually evaluate the LLM’s performance
    for different prompts. However, such manual (qualitative) assessments are highly
    subject to biases. For example, you might focus most of your attention on the
    cases in which the LLM succeeded, and thus overestimate the performance of your
    LLM. Having the potential biases in mind when working with LLMs is important to
    mitigate the risk of biases influencing your ability to improve the model.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续到执行验证和评估的各个部分之前，我还想对LLM的定性 vs 定量评估发表评论。当与LLM一起工作时，手动评估LLM对不同提示的性能往往很有诱惑力。然而，这种手动（定性）评估高度受主观偏见的影响。例如，你可能会将大部分注意力集中在LLM成功的情况上，从而高估你LLM的性能。在处理LLM时考虑到潜在的偏见对于减轻偏见影响你改进模型能力风险的重要性。
- en: Large-scale LLM output validation
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大规模LLM输出验证
- en: After running millions of LLM calls, I’ve seen a lot of different outputs, such
    as GPT-4o returning … or Qwen2.5 responding with unexpected Chinese characters
    in
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行了数百万次LLM调用之后，我看到了很多不同的输出，例如GPT-4o返回…或Qwen2.5以意外的中文字符响应
- en: These errors are incredibly difficult to detect with manual inspection because
    they usually happen in less than 1 out of 1000 API calls to the LLM. However,
    you need a mechanism to catch these issues when they occur in real time, on a
    large scale. Thus, I’ll discuss some approaches to handling these issues.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这些错误用人工检查难以发现，因为它们通常发生在LLM的1000次API调用中的不到1次。然而，你需要一种机制来捕捉这些在实时、大规模情况下发生的问题。因此，我将讨论一些处理这些问题的方法。
- en: Simple if-else statement
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简单的if-else语句
- en: The simplest solution for validation is to have some code that uses a simple
    if statement, which checks the LLM output. For example, if you want to generate
    summaries for documents, you might want to ensure the LLM output is at least above
    some minimal length
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 验证的最简单解决方案是编写一些使用简单if语句的代码，该语句检查LLM输出。例如，如果你想为文档生成摘要，你可能想确保LLM输出至少达到某个最小长度
- en: '[PRE0]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Then you can run the validation.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你可以运行验证。
- en: If the validation passes, you can continue as usual
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果验证通过，你可以像往常一样继续
- en: If it fails, you can choose to **ignore the request** or utilize a **retry mechanism**
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果它失败，你可以选择**忽略请求**或利用**重试机制**
- en: 'You can, of course, make the validate_summary function more elaborate, for
    example:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你可以使validate_summary函数更加详细，例如：
- en: Utilizing regex for complex string matching
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用正则表达式进行复杂的字符串匹配
- en: Using a [library such as Tiktoken](https://pypi.org/project/tiktoken/) to count
    the number of tokens in the request
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用[如Tiktoken](https://pypi.org/project/tiktoken/)之类的库来计算请求中的令牌数量
- en: Ensure specific words are present/not present in the response
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保响应中包含/不包含特定单词
- en: etc.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 等等。
- en: LLM as a validator
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LLM作为验证者
- en: '![](../Images/c3c2da3cc4c927ab02f6a12905401386.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c3c2da3cc4c927ab02f6a12905401386.png)'
- en: This diagram highlights the flow of an LLM application utilizing an LLM as a
    validator. You first input the prompt, which here is to create a summary of a
    document. The LLM creates a summary of a document and sends it to an LLM validator.
    If the summary is valid, we return the request. However, if the summary is invalid,
    we can either ignore the request or retry it. Image by the author.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了使用LLM作为验证器的LLM应用程序的流程。你首先输入提示，这里是要创建一个文档的摘要。LLM创建文档的摘要并将其发送给LLM验证器。如果摘要有效，我们返回请求。然而，如果摘要无效，我们可以忽略请求或重试。图片由作者提供。
- en: A more advanced and costly validator is using an LLM. In these cases, you utilize
    another LLM to assess if the output is valid. This works because validating correctness
    is usually a more straightforward task than generating a correct response. Using
    an LLM validator is essentially [utilizing LLM as a judge, a topic I have written
    another Towards Data Science article about here.](https://towardsdatascience.com/how-to-use-llms-for-powerful-automatic-evaluations/)
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 更高级且成本更高的验证方法是使用一个大型语言模型（LLM）。在这种情况下，你利用另一个LLM来评估输出是否有效。这是因为验证正确性通常比生成正确响应的任务更直接。使用LLM验证器本质上是将LLM作为裁判使用，关于这个话题，我在这篇《Towards
    Data Science》的文章中进行了讨论。[如何使用LLM进行强大的自动评估](https://towardsdatascience.com/how-to-use-llms-for-powerful-automatic-evaluations/)
- en: I often utilize smaller LLMs to perform this validation task because they have
    faster response times, cost less, and still work well, considering that the task
    of validating is simpler than generating a correct response. For example, if I
    utilize [GPT-4.1](https://openai.com/index/gpt-4-1/) to generate a summary, I
    would consider GPT-4.1-mini or GPT-4.1-nano to assess the validity of the generated
    summary.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常使用较小的LLM来执行此验证任务，因为它们有更快的响应时间，成本更低，而且考虑到验证的任务比生成正确响应的任务简单，它们仍然表现良好。例如，如果我使用[GPT-4.1](https://openai.com/index/gpt-4-1/)来生成摘要，我会考虑使用GPT-4.1-mini或GPT-4.1-nano来评估生成的摘要的有效性。
- en: Again, if the validation succeeds, you continue your application flow, and if
    it fails, you can ignore the request or choose to retry it.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，如果验证成功，你继续应用程序流程；如果失败，你可以忽略请求或选择重试。
- en: 'In the case of validating the summary, I would prompt the validating LLM to
    look for summaries that:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在验证摘要的情况下，我会提示验证LLM寻找以下摘要：
- en: Are too short
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 太短
- en: Don’t adhere to the expected answer format (for example, Markdown)
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不遵循预期的答案格式（例如，Markdown）
- en: And other rules you may have for the generated summaries
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可能还有其他针对生成摘要的规则
- en: Quantitative LLM evaluations
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定量的LLM评估
- en: It is also super important to perform large-scale evaluations of LLM outputs.
    I recommend either running this continually, or in regular intervals. Quantitative
    LLM evaluations are also more effective when combined with qualitative assessments
    of data samples. For example, suppose the evaluation metrics highlight that your
    generated summaries are longer than what users prefer. In that case, you should
    manually look into those generated summaries and the documents they are based
    on. This helps you understand the underlying problem, which again makes solving
    the problem easier.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 对LLM输出进行大规模评估也非常重要。我建议持续运行或定期进行。当与数据样本的定性评估相结合时，定量的LLM评估也更为有效。例如，假设评估指标显示你生成的摘要比用户喜欢的要长。在这种情况下，你应该手动检查这些生成的摘要及其基于的文档。这有助于你理解潜在问题，再次使解决问题变得更容易。
- en: LLM as a judge
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LLM作为裁判
- en: Same as with validation, you can utilize LLM as a judge for evaluation. The
    difference is that while validation uses LLM as a judge for binary predictions
    (either the output is valid, or it’s not valid), evaluation uses it for more detailed
    feedback. You can, for example, receive feedback from the LLM judge on the quality
    of a summary from 1-10, making it easier to distinguish medium quality summaries
    (around 4-6) from high quality summaries (7+).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 与验证相同，你可以利用LLM作为裁判进行评估。区别在于，虽然验证使用LLM作为裁判进行二元预测（输出要么有效，要么无效），而评估则用于更详细的反馈。例如，你可以从LLM裁判那里获得关于摘要质量从1到10的反馈，这使得区分中等质量摘要（约4-6）和高质量摘要（7+）变得更容易。
- en: 'Again, you have to consider costs when using LLM as a judge. Even though you
    may be utilizing smaller models, you are essentially doubling the number of LLM
    calls when using LLM as a judge. You can thus consider the following changes to
    save on costs:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，使用LLM作为裁判时，你必须考虑成本。尽管你可能在使用较小的模型，但当你使用LLM作为裁判时，你实际上是将LLM调用的数量翻倍。因此，你可以考虑以下变更以节省成本：
- en: Sampling data points, so you only run LLM as a judge on a subset of data points
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 样本数据点，这样你只需在数据点的子集上运行LLM作为评判者
- en: Grouping several data points into one LLM as a judge prompt, to save on input
    and output tokens
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将多个数据点组合成一个LLM评判者的提示，以节省输入和输出令牌
- en: I recommend detailing the judging criteria to the LLM judge. For example, you
    should state what constitutes a score of 1, a score of 5, and a score of 10\.
    Using examples is often a great way of instructing LLMs, as discussed in [my article
    on utilizing LLM as a judge](https://towardsdatascience.com/how-to-use-llms-for-powerful-automatic-evaluations/).
    I often think about how helpful examples are for me when someone is explaining
    a topic, and you can thus imagine how helpful it is for an LLM.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议详细说明评判标准给LLM评判者。例如，你应该说明1分、5分和10分分别代表什么。使用例子通常是指导LLM的好方法，正如我在[关于如何利用LLM作为评判者的文章](https://towardsdatascience.com/how-to-use-llms-for-powerful-automatic-evaluations/)中讨论的那样。我经常思考当有人解释一个主题时，例子对我有多有帮助，因此您可以想象这对LLM有多有帮助。
- en: User feedback
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户反馈
- en: User feedback is a great way of receiving quantitative metrics on your LLM’s
    outputs. User feedback can, for example, be a thumbs-up or thumbs-down button,
    stating if the generated summary is satisfactory. If you combine such feedback
    from hundreds or thousands of users, you have a reliable feedback mechanism you
    can utilize to vastly improve the performance of your LLM summary generator!
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 用户反馈是获取您LLM输出定量指标的好方法。例如，用户反馈可以是点赞或点踩按钮，表示生成的摘要是否令人满意。如果您结合数百或数千用户的此类反馈，您就有了一个可靠的反馈机制，可以用来极大地提高您LLM摘要生成器的性能！
- en: These users can be your customers, so you should make it easy for them to provide
    feedback and encourage them to provide as much feedback as possible. However,
    these users can essentially be anyone who doesn’t utilize or develop your application
    on a day-to-day basis. It’s important to remember that any such feedback, will
    be incredibly valuable to improve the performance of your LLM, and it doesn’t
    really cost you (as the developer of the application), any time to gather this
    feedback..
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这些用户可以是您的客户，因此您应该让他们容易提供反馈，并鼓励他们尽可能多地提供反馈。然而，这些用户实际上可以是任何不每天使用或开发您应用程序的人。重要的是要记住，任何此类反馈都将对提高您LLM的性能非常有价值，并且作为应用程序的开发者，您实际上收集此类反馈并不需要花费太多时间。
- en: Conclusion
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I have discussed how you can perform large-scale validation
    and evaluation in your LLM application. Doing this is incredibly important to
    both ensure your application performs as expected and to improve your application
    based on user feedback. I recommend incorporating such validation and evaluation
    flows in your application as soon as possible, given the importance of ensuring
    that inherently unpredictable LLMs can reliably provide value in your application.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了您如何在LLM应用程序中执行大规模验证和评估。这样做对于确保您的应用程序按预期运行以及根据用户反馈改进应用程序至关重要。鉴于确保本质上不可预测的LLM能够在您的应用程序中可靠地提供价值的重要性，我建议尽快在您的应用程序中实施此类验证和评估流程。
- en: You can also read my articles on [How to Benchmark LLMs with ARC AGI 3](https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/)
    and [How to Effortlessly Extract Receipt Information with OCR and GPT-4o mini](https://eivindkjosbakken.com/2025/08/19/how-to-effortlessly-extract-receipt-information-with-ocr-and-gpt-4o-mini/)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以阅读我的关于[如何使用ARC AGI 3基准测试LLMs](https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/)和[如何轻松使用OCR和GPT-4o
    mini提取收据信息](https://eivindkjosbakken.com/2025/08/19/how-to-effortlessly-extract-receipt-information-with-ocr-and-gpt-4o-mini/)的文章。
