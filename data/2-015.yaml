- en: How to Perform Comprehensive Large Scale LLM Validation
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何进行全面的大规模LLM验证
- en: 原文：[https://towardsdatascience.com/how-to-perform-comprehensive-large-scale-llm-validation/](https://towardsdatascience.com/how-to-perform-comprehensive-large-scale-llm-validation/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/how-to-perform-comprehensive-large-scale-llm-validation/](https://towardsdatascience.com/how-to-perform-comprehensive-large-scale-llm-validation/)'
- en: <mdspan datatext="el1755820801926" class="mdspan-comment">Output validation</mdspan>
    and evaluations are critical to ensuring robust, high-performing LLM applications.
    However, such topics are often overlooked in the greater scheme of LLMs.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755820801926" class="mdspan-comment">输出验证</mdspan>和评估对于确保稳健、高性能的LLM应用至关重要。然而，在LLM的更大框架中，这些主题往往被忽视。
- en: 'Imagine this scenario: You have an LLM query that replies correctly 999/1000
    times when prompted. However, you have to run backfilling on 1.5 million items
    to populate the database. In this (very realistic) scenario, you’ll experience
    **1500 errors** for this LLM prompt alone. Now scale this up to 10s, if not 100s
    of different prompts, and you’ve got a real scalability issue at hand.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 想象这个场景：当被提示时，您的LLM查询正确回复了999/1000次。然而，您必须对150万个项目进行回填以填充数据库。在这个（非常现实）的场景中，您将仅为此LLM提示体验到**1500个错误**。现在将这个规模扩大到10个，如果不是100个不同的提示，您将面临一个真正的可扩展性问题。
- en: '**The solution** is to validate your LLM output and ensure high performance
    using evaluations, which are both topics I’ll discuss in this article'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**解决方案**是验证您的LLM输出并确保通过评估获得高性能，这两个主题我将在本文中讨论。'
- en: '![This infographic highlights the main contents of this article. I''ll be discussing
    validation and evaluation of LLM outputs, Qualitative vs quantitative scoring,
    and dealing with large-scale LLM applications. ](../Images/dedb5f934a1440fc79b006a198fe47d3.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![此信息图表突出了本文的主要内容。我将讨论LLM输出的验证和评估、定性 vs 定量评分，以及处理大规模LLM应用。](../Images/dedb5f934a1440fc79b006a198fe47d3.png)'
- en: This infographic highlights the main contents of this article. I’ll be discussing
    validation and evaluation of LLM outputs, Qualitative vs quantitative scoring,
    and dealing with large-scale LLM applications. Image by ChatGPT.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 此信息图表突出了本文的主要内容。我将讨论LLM输出的验证和评估、定性 vs 定量评分，以及处理大规模LLM应用。图由ChatGPT提供。
