- en: Why I’m Making the Switch to marimo Notebooks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么我要转向 marimo 笔记本
- en: 原文：[https://towardsdatascience.com/why-im-making-the-switch-to-marimo-notebooks/](https://towardsdatascience.com/why-im-making-the-switch-to-marimo-notebooks/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-im-making-the-switch-to-marimo-notebooks/](https://towardsdatascience.com/why-im-making-the-switch-to-marimo-notebooks/)
- en: <mdspan datatext="el1763526882652" class="mdspan-comment">**TL;DR:** After years</mdspan>
    of using Jupyter Lab, I have moved most of my work to marimo notebooks, a new
    kind of Python notebook that addresses many long-standing issues with traditional
    ones. This article covers the reasons behind my transition and how marimo fits
    naturally into my current workflow, with full gratitude to Project Jupyter for
    building the notebook ecosystem that shaped data science, research and education.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763526882652" class="mdspan-comment">**TL;DR:** 经过多年的 Jupyter
    Lab 使用，我将大部分工作迁移到了 marimo 笔记本，这是一种新型的 Python 笔记本，解决了传统笔记本许多长期存在的问题。本文涵盖了转换背后的原因，以及
    marimo 如何自然地融入我的当前工作流程，并对 Project Jupyter 构建塑造数据科学、研究和教育的笔记本生态系统表示衷心的感谢。
- en: A bit of background
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一些背景信息
- en: I have spent years inside notebooks. For a long time, my setup was a mix of
    Jupyter Notebooks/Lab for local experiments and Google Colab for cloud or GPU
    work, thanks to their free tier option. I have even [authored many blogs](https://towardsdatascience.com/jupyter-lab-evolution-of-the-jupyter-notebook-5297cacde6b/)
    on making the most out of these notebooks, where I have shared tips to go beyond
    the normal way of using them.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我在笔记本里度过了多年。长期以来，我的设置是本地实验使用 Jupyter Notebooks/Lab，云端或 GPU 工作使用 Google Colab，多亏了它们免费层选项。我甚至[撰写了许多博客](https://towardsdatascience.com/jupyter-lab-evolution-of-the-jupyter-notebook-5297cacde6b/)，分享如何充分利用这些笔记本的技巧，其中我分享了超越常规使用方式的建议。
- en: Having said that, there have been certain issues with these traditional notebooks,
    the biggest being reactivity (or rather, the lack of it). Hidden state, out-of-order
    execution, and manual reruns were some of my pain points with these notebooks.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，这些传统笔记本确实存在一些问题，最大的问题是反应性（或者说，缺乏反应性）。隐藏状态、执行顺序混乱和手动重新运行是我使用这些笔记本时的痛点。
- en: That changed when I discovered **marimo**, an open-source alternative for Jupyter
    notebooks wherein you can run cells, perform computations, and create plots just
    as you would in Jupyter. But underneath, it works very differently and fixes many
    long-standing issues. The key difference is that a marimo notebook is just a Python
    file, making it both a better notebook and a better coding environment for anyone
    who uses Python. In this article, I share ten reasons behind my switch and why
    working with notebooks has been much smoother for me since moving to marimo.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 当我发现 **marimo** 时，这一切都改变了，它是 Jupyter 笔记本的开源替代品，在其中你可以运行单元格、执行计算和创建图表，就像在 Jupyter
    中做的一样。但它在底层工作方式非常不同，并解决了许多长期存在的问题。关键区别在于，marimo 笔记本只是一个 Python 文件，这使得它对于任何使用 Python
    的人来说都是一个更好的笔记本和更好的编码环境。在这篇文章中，我分享了转换背后的十个原因，以及为什么自从转向 marimo 后，我的笔记本工作变得更加顺畅。
- en: '*If you want to follow along, install marimo as shown below. This command launches
    the marimo editor and opens the notebook in* ***sandbox mode****, which works
    like a lightweight virtual environment that keeps your notebook isolated from
    the rest of your system. You can also use* `marimo.new` *to start a new notebook
    in the online playground. For detailed instructions, refer to the* [*documentation*](https://docs.marimo.io/)*.*'
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*如果你想跟上，按照以下步骤安装 marimo。这个命令启动 marimo 编辑器，并以**沙盒模式**打开笔记本，它就像一个轻量级虚拟环境，将你的笔记本与系统其他部分隔离开来。你也可以使用*
    `marimo.new` *在在线游乐场中启动一个新的笔记本。有关详细说明，请参阅* [*文档*](https://docs.marimo.io/)*.*'
- en: '[PRE0]'
  id: totrans-8
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 1\. Reactivity that finally fixes the hidden state issues
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 最终解决隐藏状态问题的反应性
- en: Traditional notebooks are not reactive. This means that if I change something
    in one cell, nothing else updates on its own. I often end up re-running them just
    to keep the outputs consistent. For instance, consider the Jupyter Notebook below
    where on the left I define two variables, `a` and `b`, add them together to get
    a third variable `c`, and then display the value of `c`, which is `30`.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 传统笔记本不具备反应性。这意味着如果我在一个单元格中更改了某些内容，其他内容不会自动更新。我经常不得不重新运行它们，只是为了保持输出的一致性。例如，考虑下面的
    Jupyter Notebook，在左边我定义了两个变量 `a` 和 `b`，将它们相加得到第三个变量 `c`，然后显示 `c` 的值，它是 `30`。
- en: '![](../Images/1f5c5e14b337cc90ea030ea29462843b.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1f5c5e14b337cc90ea030ea29462843b.png)'
- en: In a traditional notebook, changing the value of a does not update c automatically.
    The output stays stale until you rerun the cells yourself, which is the hidden
    state problem in action | Image by Author
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的笔记本中，更改变量a的值不会自动更新c。输出保持不变，直到你自己重新运行单元格，这就是隐藏状态问题在起作用。| 图片由作者提供
- en: Now, if I were to change `a` to 20 as shown on the right , `c` would still show
    `30` unless I re-ran the cell. That mismatch between code and output is the classic
    hidden state problem.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我将`a`更改为右侧所示20，除非我重新运行单元格，否则`c`仍然会显示`30`。这种代码与输出之间的不匹配是经典隐藏状态问题。
- en: Marimo fixes this with **reactive execution,** where every cell is part of a
    *dependency graph (DAG)*. Changes in one cell automatically trigger updates in
    dependent cells. So, when `a` changes, marimo re-evaluates any dependent cells.
    See how `c` updates automatically when the value of `a` is changed.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: Marimo通过**响应式执行**解决这个问题，其中每个单元格都是**依赖图（DAG）**的一部分。一个单元格的变化会自动触发依赖单元格的更新。所以，当`a`变化时，marimo会重新评估任何依赖单元格。看看当`a`的值改变时，`c`是如何自动更新的。
- en: '![](../Images/dbdb0ac549068b428ea63a6021285872.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dbdb0ac549068b428ea63a6021285872.png)'
- en: In marimo , changing a updates c instantly because the notebook is reactive
    and keeps all cells in sync | Image by Author
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在marimo中，更改一个变量会立即更新c，因为笔记本是响应式的，并且保持所有单元格同步。| 图片由作者提供
- en: This keeps my code and outputs perfectly in sync and it means I can share my
    notebooks with others without worrying about the order in which they execute.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这使我的代码和输出保持完美同步，这意味着我可以与他人共享我的笔记本，而不用担心它们执行的顺序。
- en: But ***should every cell update automatically?*** Not always. Some cells are
    expensive to run, like those involving ML training or heavy data processing. The
    good news is that marimo supports **lazy execution**, which lets you turn off
    auto-updates and trigger such cells only when needed.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 但**是否每个单元格都应该自动更新？**不一定。有些单元格运行起来很昂贵，比如涉及机器学习训练或大量数据处理。好消息是marimo支持**延迟执行**，这让你可以在需要时才关闭自动更新并触发这些单元格。
- en: 2\. Cell order no longer breaks my workflow
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 单元格顺序不再打断我的工作流程
- en: Since marimo notebooks execute cells based on variable relationships and not
    their order on the page, this gives me the freedom to organize my code in a way
    that makes sense to me. For instance, I can place all my imports and helper functions
    at the bottom to keep the workspace clean.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 由于marimo笔记本根据变量关系而不是页面上的顺序来执行单元格，这让我有自由以对我有意义的方式组织我的代码。例如，我可以将所有导入和辅助函数放在底部，以保持工作空间整洁。
- en: This also opens up some fun use cases. I have used this to create small auto-graded
    quizzes where the answer key sits at the bottom of the notebook. The quiz still
    works fine because the cell order does not matter, and the answers are not immediately
    visible to the person taking the quiz. (And yes, marimo comes with a dark mode
    too 😃.)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这也打开了一些有趣的使用场景。我已用它创建小型自动评分测验，其中答案键位于笔记本底部。测验仍然可以正常工作，因为单元格顺序无关紧要，答案对参加测验的人不可见。（是的，marimo也有暗黑模式
    😃。）
- en: '![](../Images/7856eb3b2eb5bf5f93a126faab8b9839.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7856eb3b2eb5bf5f93a126faab8b9839.png)'
- en: A quick demo of an auto-graded quiz made possible because cell order does not
    matter. | Image by Author
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 一个自动评分测验的快速演示，这得益于单元格顺序无关紧要。| 图片由作者提供
- en: 3\. It’s basically a Python File under the hood
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 它本质上是一个Python文件
- en: Since every marimo notebook is stored as a pure Python file, it solves my long-standing
    issue with versioning in Git. I can finally track changes cleanly without dealing
    with messy JSON diffs. The notebook also becomes far more flexible. I can reuse
    it as a script, run it from the command line, or even turn it into a small interactive
    app without changing anything.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 由于每个marimo笔记本都存储为纯Python文件，这解决了我在Git中版本控制方面长期存在的问题。我最终可以干净地跟踪更改，而不必处理混乱的JSON差异。笔记本也变得更加灵活。我可以将其用作脚本，从命令行运行它，甚至可以将其转换为小型交互式应用程序，而无需进行任何更改。
- en: Below, the right side shows the marimo notebook view, while the left side shows
    the same notebook opened as a normal Python file in an editor.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 下面，右侧显示了marimo笔记本视图，而左侧显示了在编辑器中作为普通Python文件打开的相同笔记本。
- en: '![](../Images/cd992092b9909a44beefa2ce48721e7a.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cd992092b9909a44beefa2ce48721e7a.png)'
- en: 'Same notebook, two views : the Python source on the left and its interactive
    marimo notebook on the right | Image by Author'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 同一个笔记本，两种视图：左侧的Python源代码和右侧的交互式marimo笔记本 | 图片由作者提供
- en: 4\. I can easily turn my Notebooks into apps
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 我可以轻松地将我的笔记本转换为应用程序
- en: Turning a marimo notebook into an interactive app is also easy. I can switch
    between **Edit Mode** and **App View** with a single click, and I never have to
    rewrite my code or add anything extra.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 将Marimo笔记本转换为交互式应用也很简单。我可以通过单次点击在**编辑模式**和**应用视图**之间切换，而且我永远不需要重写代码或添加任何额外内容。
- en: Here is an example notebook which converts temperatures from `Celsius` to `Fahrenheit`.
    The same notebook can be viewed in **App Mode** using the default vertical layout.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个将温度从`摄氏度`转换为`华氏度`的示例笔记本。该笔记本可以在**应用模式**中使用默认垂直布局查看。
- en: '![](../Images/8db7d36af19afa24ca40e21fd7aa3690.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8db7d36af19afa24ca40e21fd7aa3690.png)'
- en: Toggling between Edit Mode and App View with a single click | Image by Author
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 通过单次点击在编辑模式和应用程序视图之间切换 | 图片由作者提供
- en: This feature is especially useful for creating interactive blogs, tutorials,
    and educational walkthroughs for libraries. If you’ve ever read [*AI Explorables*](https://pair.withgoogle.com/explorables/),
    you know the feeling of engaging with content rather than just reading it. Marimo
    gives a similar feel and the **Grid Layout** makes it even better since I can
    drag and drop outputs to arrange the app the way I want.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这个功能对于创建交互式博客、教程和教育性指南特别有用。如果你曾经阅读过[*AI Explorables*](https://pair.withgoogle.com/explorables/)，你就知道与内容互动而不是仅仅阅读的感觉。Marimo提供了类似的感觉，而**网格布局**使它变得更好，因为我可以拖放输出以按我的意愿排列应用。
- en: '![](../Images/1b40f7be2c7c981115d4bc40345587e4.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1b40f7be2c7c981115d4bc40345587e4.png)'
- en: Using the Grid Layout to customize the app display in marimo | Image by Author
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 使用网格布局在Marimo中自定义应用显示 | 图片由作者提供
- en: 5\. Efficient Package Manager, so no more dependency headaches
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 高效的包管理器，因此不再有依赖问题的烦恼
- en: Marimo comes with a built-in package manager that lets me install missing libraries
    right from the notebook. If a module is unavailable, marimo shows a small prompt,
    and I can install it with a click. This removes the usual back-and-forth with
    terminals.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: Marimo内置了一个包管理器，允许我直接从笔记本中安装缺失的库。如果某个模块不可用，Marimo会显示一个小提示，我可以点击安装。这消除了与终端的常规来回操作。
- en: '![](../Images/68aee8fd4ece0f3c812822e879433d1b.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/68aee8fd4ece0f3c812822e879433d1b.png)'
- en: built-in package manager in marimo | Image by Author
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: Marimo内置的包管理器 | 图片由作者提供
- en: Marimo also handles reproducibility for me. When I run a notebook with the `--sandbox`
    flag, it tracks all packages and their exact versions and saves them inside the
    notebook file as a top-level comment. There is no need for a separate `requirements.txt`
    file because the notebook already carries everything it needs.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Marimo还为我处理可重复性。当我使用`--sandbox`标志运行笔记本时，它会跟踪所有包及其确切版本，并将它们作为顶级注释保存在笔记本文件中。不需要单独的`requirements.txt`文件，因为笔记本已经包含了它所需的一切。
- en: '![](../Images/c05ccd2edbd0fae8fceea6dddcc9a53a.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c05ccd2edbd0fae8fceea6dddcc9a53a.png)'
- en: Dependency metadata lives inside the notebook itself, and shows up clearly when
    you open the marimo file as a normal Python script. | Image by Author
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 依赖元数据位于笔记本内部，当你以正常Python脚本打开Marimo文件时，它会清晰地显示出来。 | 图片由作者提供
- en: 6\. Built-in utilities for working with DataFrames.
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 用于处理DataFrames的内置工具。
- en: If you spend a lot of time exploring data, this is one of those features that
    immediately feels like a godsend. When you display a dataFrame in marimo, the
    default view is fully interactive and comes with several helpful tools right out
    of the box, like scrolling, pagination, automatic histograms for numeric columns,
    and simple sorting and filtering from the column headers. This speeds up the EDA
    process for me, as visual exploration often gives better insights.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你花很多时间探索数据，这个功能会让你感觉像是天赐之物。当你将dataFrame显示在Marimo中时，默认视图是完全交互式的，并且自带一些有用的工具，如滚动、分页、数值列的自动直方图以及从列标题进行简单的排序和过滤。这加快了我的数据探索过程，因为视觉探索往往能提供更好的洞察。
- en: '![](../Images/507489dcfa4f064417219760732ca098.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/507489dcfa4f064417219760732ca098.png)'
- en: Interactive dataframe view in marimo with built-in sorting, filtering, and histograms
    | Image by Auhtor
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: Marimo中带有内置排序、过滤和直方图的交互式DataFrame视图 | 图片由作者提供
- en: Marimo also lets me turn a DataFrame into an interactive input element. Using
    `mo.ui.table,`I can select rows and use those selections in downstream computations.
    The selections update reactively, which means the rest of my notebook updates
    automatically too.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: Marimo还允许我将DataFrame转换为交互式输入元素。使用`mo.ui.table`，我可以选择行，并在下游计算中使用这些选择。选择会自动更新，这意味着我的笔记本的其他部分也会自动更新。
- en: '![](../Images/0f357553610232c4f314cdb0f9518bb6.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0f357553610232c4f314cdb0f9518bb6.png)'
- en: Interactive row selection with **mo.ui.table**, feeding straight into downstream
    cells | Image by Author
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 **mo.ui.table** 进行交互式行选择，直接输入到下游单元格中 | 图片由作者提供
- en: If I want to share a notebook with a business stakeholder, marimo includes a
    **UI dataframe editor** that lets them drag and drop aggregations and transformations
    without writing any code. It even generates the equivalent Python code for every
    step.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想与业务利益相关者分享一个笔记本，marimo 包含一个 **UI 数据框编辑器**，让他们可以拖放聚合和转换而无需编写任何代码。它甚至为每个步骤生成等效的
    Python 代码。
- en: '![](../Images/709943a2baf1c4d51069008c8852ef63.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/709943a2baf1c4d51069008c8852ef63.png)'
- en: Marimo’s UI dataframe editor lets business users explore data without writing
    code | Image by AUthor
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: Marimo 的 UI 数据框编辑器让业务用户无需编写代码即可探索数据 | 图片由作者提供
- en: And wait, that’s not all. There’s also a **Data Explorer** utility that lets
    me build quick visualizations directly from the DataFrame.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 等等，这还不是全部。还有一个 **数据探索器** 工具，让我可以直接从 DataFrame 中构建快速的可视化。
- en: '![](../Images/ace28790343fc670af3cbedbed0bea6d.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ace28790343fc670af3cbedbed0bea6d.png)'
- en: Using the Data Explorer to pick columns and generate instant visuals | Image
    by Author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 使用数据探索器选择列并生成即时可视化 | 图片由作者提供
- en: All of this makes early-stage data exploration much faster. Instead of juggling
    libraries or writing boilerplate code just to understand a dataset, I can start
    analyzing and visualizing right away inside the notebook.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些使得早期数据探索变得更快。无需在库之间切换或编写样板代码来理解数据集，我可以在笔记本内立即开始分析和可视化。
- en: 7\. See the documentation as you type
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 边打字边查看文档
- en: One of the most underrated features of marimo notebooks for me has been the
    Live Docs panel. I can see function docstrings, parameters, and examples without
    calling help utilities.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，marimo 笔记本最被低估的功能之一就是实时文档面板。我可以看到函数的 docstrings、参数和示例，而无需调用帮助工具。
- en: The panel is also interactive, so I can scroll through long docstrings, check
    examples, and copy snippets into my notebook. If the docstring has formatted examples,
    marimo detects them and lets me copy them straight into a new cell, which has
    been very handy while learning new libraries.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 该面板也是交互式的，因此我可以滚动查看长的 docstrings、检查示例，并将片段复制到我的笔记本中。如果 docstring 有格式化的示例，marimo
    会检测到它们，并允许我直接将它们复制到一个新的单元格中，这在学习新库时非常有用。
- en: '![](../Images/baf41ca6cde3efce031c920700a608ca.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/baf41ca6cde3efce031c920700a608ca.png)'
- en: Live Docs in action, showing documentation in real time as I type | Image by
    Author
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 实时文档操作，显示我在打字时的实时文档 | 图片由作者提供
- en: 8\. SQL Inside the Notebook
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8. 笔记本内的 SQL
- en: Marimo has great support for SQL. I can stay in one notebook and mix SQL and
    Python in a very natural way. I can write a SQL query inside a SQL cell, run it,
    and get the same clean table view that marimo gives for DataFrames.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: Marimo 对 SQL 的支持非常强大。我可以在一个笔记本中非常自然地混合使用 SQL 和 Python。我可以在 SQL 单元格内编写一个 SQL
    查询，运行它，并得到 marimo 为 DataFrame 提供的相同整洁的表格视图。
- en: I can also run SQL on local files through DuckDB. A simple `select * from "file.csv"`
    just works. If I want to connect to a real database, I can do that from the side
    panel. Marimo lets me add different data sources, and once added, the tables show
    up directly in the notebook.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我还可以通过 DuckDB 在本地文件上运行 SQL。简单的 `select * from "file.csv"` 就可以工作。如果我想连接到真实的数据库，我可以在侧面板中做到这一点。Marimo
    允许我添加不同的数据源，一旦添加，表格就会直接显示在笔记本中。
- en: '![](../Images/eca03a1533a9c0efdafefd250dfa3733.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eca03a1533a9c0efdafefd250dfa3733.png)'
- en: Running SQL on DataFrames and local files right inside Marimo without leaving
    the notebook | Image by Author
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Marimo 内部直接在笔记本上运行 SQL，对 DataFrame 和本地文件进行操作，无需离开笔记本 | 图片由作者提供
- en: '9\. Molab: marimo notebooks in the cloud'
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9. Molab：marimo 笔记本云服务
- en: Molab is for marimo notebooks, what Google Colab is for Jupyter notebooks. You
    get all the goodness of marimo notebooks in the cloud. You can open Molab at `molab.marimo.io`,
    create new notebooks, or open the ones you made earlier. It is a great option
    when I want to spin up a notebook fast or avoid running things on my machine.
    Many popular Python packages are pre-installed, notebooks have persistent storage,
    and I can share, download, or upload them easily.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: Molab 是 marimo 笔记本的服务，就像 Google Colab 是 Jupyter 笔记本的服务一样。你可以在云端获得 marimo 笔记本的所有优点。你可以在
    `molab.marimo.io` 打开 Molab，创建新的笔记本，或者打开之前创建的笔记本。当我需要快速启动笔记本或避免在我的机器上运行东西时，这是一个很好的选择。许多流行的
    Python 包都是预先安装的，笔记本有持久存储，我可以轻松地分享、下载或上传它们。
- en: '![](../Images/41ce121a85b755fd77cfd64c38e69e0e.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/41ce121a85b755fd77cfd64c38e69e0e.png)'
- en: 'molab: marimo notebooks in the cloud | Image by Author'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: molab：marimo 笔记本云服务 | 图片由作者提供
- en: Another neat feature is the GitHub integration. You can go to the Molab URL
    and replace `molab.marimo.io/notebooks` with `molab.marimo.io/github` and it will
    let you open any notebook, Jupyter or marimo, that is hosted on GitHub in Molab.
    However, there is no GPU support for now, like in Colab, but I’m sure that is
    something that the team will be working on.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个很酷的功能是GitHub集成。你可以访问Molab网址，将`molab.marimo.io/notebooks`替换为`molab.marimo.io/github`，这样你就可以在Molab中打开任何GitHub上托管在Molab中的笔记本，无论是Jupyter还是marimo。然而，目前还没有GPU支持，就像在Colab中一样，但我相信团队将会着手解决这个问题。
- en: 10\. Customizable LLMs integration
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10. 可定制的LLM集成
- en: Marimo also has some really useful AI-assisted coding features built in, which
    have been very helpful for me. To be honest, Jupyter also has a JupyterLab extension
    for AI features called **JupyterAI** (and yes, [I have written about that too](https://towardsdatascience.com/build-your-own-ai-coding-assistant-in-jupyterlab-with-ollama-and-hugging-face/)),
    but having AI support built into marimo removes a lot of the friction for me.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: Marimo还内置了一些非常实用的AI辅助编码功能，这对我很有帮助。说实话，Jupyter也有一个名为**JupyterAI**的AI功能扩展，叫做JupyterLab扩展（是的，[我也写过关于这个的](https://towardsdatascience.com/build-your-own-ai-coding-assistant-in-jupyterlab-with-ollama-and-hugging-face/))，但将AI支持内置到marimo中，为我省去了很多麻烦。
- en: I use AI in marimo mainly for two things. The first is generating new notebooks
    when I want to try a new library or make a quick demo. It saves me time since
    I do not have to hunt for toy datasets or set up everything from scratch.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我主要在marimo中使用AI做两件事。第一是当我想要尝试一个新的库或快速演示时，生成新的笔记本。这为我节省了时间，因为我不必寻找玩具数据集或从头开始设置一切。
- en: '![](../Images/8e42cfaba24edff9019d7dcdde67516a.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8e42cfaba24edff9019d7dcdde67516a.png)'
- en: Generating entire notebooks via AI in marimo | Image by Author
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 通过marimo中的AI生成整个笔记本 | 图片由作者提供
- en: The second is refactoring and debugging. Marimo’s AI assistant has the full
    context of my notebook, so it can read my code and help me fix or clean it up
    right inside the notebook.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 第二点是重构和调试。Marimo的AI助手拥有我笔记本的完整上下文，因此它可以读取我的代码，并帮助我在笔记本内直接修复或清理它。
- en: '![](../Images/155f3f915378e85b7380c93699c00939.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/155f3f915378e85b7380c93699c00939.png)'
- en: AI assistant in marimo | Image by Author
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: marimo中的AI助手 | 图片由作者提供
- en: I also like that I can choose different models for chat and for editing, and
    set my own rules for how I want code to be written. And if I want to avoid proprietary
    models, Ollama works fine as a provider too.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我还喜欢可以为我想要聊天的模型和编辑的模型选择不同的模型，并为自己想要代码如何编写的规则设定。如果我想避免专有模型，Ollama也可以作为一个提供者工作。
- en: Conclusion
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: I am not connected to the marimo team and this is not a paid post, but my experience
    from using it in real projects. This is a long read because I wanted to share
    how marimo has made my notebook work smoother in practice. I am only calling out
    the parts that helped me the most. The docs go much deeper and are the best place
    to explore everything marimo has to offer.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我与marimo团队没有关联，这也不是一篇付费文章，这只是我在实际项目中使用它的体验。这是一篇长篇大论，因为我想要分享marimo是如何让我的笔记工作更加顺畅的。我只指出对我帮助最大的部分。文档内容更为深入，是探索marimo所能提供一切的最佳地点。
