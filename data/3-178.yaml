- en: How to Switch from Data Analyst to Data Scientist
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何从数据分析师转变为数据科学家
- en: 原文：[https://towardsdatascience.com/how-to-switch-from-data-analyst-to-data-scientist/](https://towardsdatascience.com/how-to-switch-from-data-analyst-to-data-scientist/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-switch-from-data-analyst-to-data-scientist/](https://towardsdatascience.com/how-to-switch-from-data-analyst-to-data-scientist/)
- en: Are you a data analyst looking to break into data science? If so, this post
    is for you.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一名想要进入数据科学领域的数据分析师吗？如果是的话，这篇文章就是为你准备的。
- en: Many people start in analytics because it generally has a lower barrier to entry,
    but as they gain experience, they realize they want to take on more technical
    challenges, dive deeper into machine learning, or even just increase their earning
    potential. Moving from Data analyst to data scientist can be a smart career move — but
    it requires the right strategy.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人开始于分析领域，因为它通常有较低的入门门槛，但随着他们获得经验，他们意识到他们想要承担更多的技术挑战，更深入地研究机器学习，或者只是增加他们的收入潜力。从数据分析师到数据科学家的转变可以是一个明智的职业选择——但这需要正确的策略。
- en: If you’re new here, my name is Marina. I’m an Applied Scientist at Amazon, and
    [I’ve helped dozens of people](https://topmate.io/marina_wyss) transition into
    tech, even from non-traditional backgrounds — myself included.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你刚来，我叫Marina。我是亚马逊的应用科学家，[我帮助了数十人](https://topmate.io/marina_wyss)过渡到技术领域，甚至包括我自己。
- en: 'In this post, we’re going to cover everything you need to know to make the
    transition from data analyst to data scientist successful:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将涵盖你从数据分析师转变为数据科学家所需了解的一切：
- en: What skills you’ll need to develop
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要发展的技能
- en: My favorite learning resources
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我最喜欢的学习资源
- en: And strategies for landing interviews and securing job offers
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以及获得面试和确保工作机会的策略
- en: Let’s get into it, starting with deciding if this transition is even a good
    idea for you in the first place.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧，首先决定这个转变是否首先对你来说是一个好主意。
- en: Role comparison
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 角色比较
- en: Before we get started, let’s just make sure we’re all on the same page about
    what the difference is between these roles anyway, starting with data analytics.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，让我们确保我们都在同一页上，关于这些角色之间的区别是什么，从数据分析开始。
- en: Data analysts focus on working with structured data to drive business decisions.
    Their toolkit typically includes SQL, Excel, Tableau or PowerBI, and basic Python
    for data processing, visualization, and maybe simple statistical analyses. The
    role centers on understanding *historical* data to answer questions about what
    happened and why.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析师专注于使用结构化数据来推动业务决策。他们的工具箱通常包括SQL、Excel、Tableau或PowerBI，以及用于数据处理、可视化和可能简单的统计分析的基本Python。这个角色集中在理解*历史*数据，以回答关于发生了什么以及为什么的问题。
- en: Data scientists build on these foundations but extend into predictive modeling
    and automated decision-making. While they also use SQL and Python, they work more
    extensively with statistical modeling, machine learning frameworks, and cloud
    platforms. Their focus shifts to predicting *future* outcomes and recommending
    actions.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家在这些基础上进行扩展，进入预测建模和自动化决策。虽然他们也使用SQL和Python，但他们更多地使用统计建模、机器学习框架和云平台。他们的重点转向预测*未来*结果和推荐行动。
- en: A common misconception is that data analysts must become data scientists to
    advance their careers. That’s definitely not true!
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常见的误解是，数据分析师必须成为数据科学家才能提升他们的职业生涯。这绝对不是真的！
- en: Senior analysts can earn high salaries and have a really strong business impact
    without deep ML or statistical knowledge.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 高级分析师可以赚取高薪，并具有非常强的商业影响力，而无需深入的了解机器学习或统计学。
- en: Honestly, not everyone is going to enjoy data science work, and many would be
    happier staying on the analytics path.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 说实话，并不是每个人都喜欢数据科学的工作，很多人可能会更愿意留在分析的道路上。
- en: 'So before we go any further, ask yourself the following questions:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在我们继续之前，请自问以下问题：
- en: Are you curious about machine learning and how it works?
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你对机器学习和它是如何工作的好奇吗？
- en: Are you comfortable with (or at least interested in) advanced mathematics and
    statistics?
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否对（或者至少对）高级数学和统计学感到舒适（或至少感兴趣）？
- en: Are you comfortable with technical challenges and software engineering concepts?
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否对技术挑战和软件工程概念感到舒适？
- en: Are you ok with a role that has a lot of ambiguity, both in the daily work and
    the career progression?
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否可以接受一个在日常工作以及职业发展方面都有很多不确定性的角色？
- en: If you’re still with me and thinking “Yes, I definitely want to pursue data
    science,” let’s talk about how to make it actually happen.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还在这里，并且想着“是的，我确实想追求数据科学”，那我们就来谈谈如何让它真正实现。
- en: Skills needed to transition
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 转型所需的技能
- en: Alright, so now that you’ve decided to make the transition, let’s break down
    the key skills you’ll need to develop. We’ll focus on four core areas that form
    the foundation of data science work.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，既然你已经决定开始转型，那么让我们来分析一下你需要培养的关键技能。我们将重点关注四个核心领域，这些领域构成了数据科学工作的基础。
- en: Mathematics & statistics
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数学与统计学
- en: 'If you’re coming from an analytics background, you probably have some exposure
    to statistics, but data science might require a bit more depth on the math front.
    You’ll need to be comfortable with:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你来自分析背景，你可能已经接触过一些统计学知识，但数据科学可能需要在数学方面有更深入的理解。你需要熟悉：
- en: Multivariable calculus and linear algebra, particularly matrix operations and
    gradients for understanding machine learning algorithms. But don’t worry — you
    don’t need to be a math expert, you just need enough to understand the fundamentals
    to help you grasp how algorithms work.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多变量微积分和线性代数，特别是矩阵运算和梯度，以理解机器学习算法。但别担心——你不需要成为数学专家，你只需要足够的数学知识来理解基础，帮助你掌握算法的工作原理。
- en: You’ll also need probability theory and hypothesis testing for experimental
    design.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你还需要概率理论和假设检验来设计实验。
- en: As well as statistical concepts like different types of distributions and regression
    techniques
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以及统计概念，如不同类型的分布和回归技术
- en: And ideally, some experience with causal inference
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理想情况下，一些因果推断的经验
- en: Programming
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编程
- en: 'If you’re already using SQL and basic Python in your role, you have a head
    start here. Now it’s just about leveling up. Focus on:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经在你的职位上使用SQL和基本的Python，那么你在这里已经领先一步。现在只是关于提升水平。关注：
- en: More advanced Python, so things like OOP fundamentals, writing modular maintainable
    code, unit tests, performance optimization, and so on.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更高级的Python，比如面向对象编程（OOP）基础、编写模块化可维护的代码、单元测试、性能优化等等。
- en: Using ML frameworks like scikit-learn, Tensorflow, and PyTorch.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ML框架，如scikit-learn、Tensorflow和PyTorch。
- en: And familiarity with basic data structures and algorithms for coding interviews.
    Generally this will just be questions on arrays and strings, so you don’t need
    to go too crazy with this, but it’ll be important to know for interviewing.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并且熟悉基本的数据结构和算法，以应对编码面试。通常这将是关于数组和字符串的问题，所以你不需要在这方面做得太过分，但了解这些对于面试来说很重要。
- en: Machine learning & AI fundamentals
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器学习与人工智能基础
- en: 'This is another core pillar of data science, so you’ll want to be comfortable
    with ML fundamentals like:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是数据科学的核心支柱之一，所以你需要熟悉机器学习（ML）的基础知识，比如：
- en: Supervised learning (so, regression and classification).
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监督学习（即回归和分类）。
- en: Unsupervised learning (things like clustering and dimensionality reduction).
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无监督学习（如聚类和降维）。
- en: Model evaluation and validation.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型评估和验证。
- en: Deep learning basics.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度学习基础。
- en: And these days, being familiar with GenAI is a plus (but by this I mean learning
    how to work with APIs, not training models from scratch)
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现在，熟悉生成式人工智能（GenAI）是一个加分项（但我的意思是学习如何使用API，而不是从头开始训练模型）。
- en: Big data & data engineering concepts
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 大数据与数据工程概念
- en: 'Finally, many data science roles involve working with large-scale datasets
    and building automated pipelines. For this, you’ll want to focus on:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，许多数据科学职位涉及处理大规模数据集和构建自动化管道。为此，你需要关注：
- en: Working with cloud computing platforms, particularly AWS services like S3 and
    SageMaker
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与云计算平台合作，特别是AWS服务如S3和SageMaker。
- en: Data pipeline development using tools like Airflow
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Airflow等工具进行数据管道开发。
- en: Potentially basic system design principles for scaling your solutions (this
    is more important as you become more senior or focus more on ML).
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能还需要一些基本系统设计原则，以扩展你的解决方案（随着你变得更加资深或更专注于机器学习，这一点变得越来越重要）。
- en: How to develop these skills
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何培养这些技能
- en: Now that we’ve covered *what* you need to learn, let’s talk about how to actually
    build these skills. There are a few different paths you can take, and the right
    one for you will depend on your budget, learning style, and schedule.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经讨论了你需要学习的内容，让我们谈谈如何实际构建这些技能。你可以选择几种不同的路径，最适合你的路径将取决于你的预算、学习风格和时间表。
- en: Self-study
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自学
- en: If you’re self-motivated and disciplined, self-study can be a totally reasonable
    and cost-effective way to transition into data science. The key is consistent
    practice and choosing the right resources.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你自学能力强且自律，自学可以是一种完全合理且成本效益高的数据科学转型方式。关键是持续的练习和选择正确的资源。
- en: 'Here are some great courses I’d recommend checking out, in order (these are
    affiliate links, btw!):'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些我推荐您查看的出色课程，按顺序排列（顺便说一句，这些都是联盟链接！）：
- en: Start with the DeepLearning.AI [Mathematics for Machine Learning and Data Science
    Specialization](https://imp.i384100.net/dOGYa3) (affiliate link!). This covers
    linear algebra, calculus, and probability and statistics, so you’ll have a solid
    foundation for the next things to learn. It’s presented in a really accessible
    way, so don’t be scared about starting with math.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从DeepLearning.AI的[机器学习与数据科学数学专项课程](https://imp.i384100.net/dOGYa3)（联盟链接！）开始！它涵盖了线性代数、微积分、概率和统计学，这将为您学习下一阶段的内容打下坚实的基础。它以非常易于理解的方式呈现，所以不要因为数学而感到害怕。
- en: Then, check out the classic [Stanford Machine Learning Specialization](https://imp.i384100.net/o44Kq9)
    (affiliate link!), which gives a solid introduction to ML fundamentals.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，您可以看看经典的[斯坦福机器学习专项课程](https://imp.i384100.net/o44Kq9)（联盟链接！）它为机器学习基础提供了坚实的介绍。
- en: After that, the DeepLearning.AI [Deep Learning Specialization](https://imp.i384100.net/LK27X3)
    (affiliate link!), at least the first three courses.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 之后，DeepLearning.AI的[深度学习专项课程](https://imp.i384100.net/LK27X3)（联盟链接），至少是前三门课程。
- en: And finally, as a bonus I’d recommend the [Generative AI with Large Language
    Models course](https://imp.i384100.net/Qjb7y9) (affiliate link!). This is a short
    course that is a good way to get familiar with modern AI applications.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，作为额外推荐，我建议您试试[大型语言模型生成式AI课程](https://imp.i384100.net/Qjb7y9)（联盟链接！）这是一门短课程，是熟悉现代AI应用的不错方式。
- en: You’ll also need to get an understanding of basic DSA for coding interview prep.
    For this I enjoyed Educative’s [Grokking the Coding Interview Patterns](https://www.educative.io/courses/grokking-coding-interview-in-python?aff=VOR0)
    in Python, which focuses on common patterns for data structures and algorithms
    questions. I found this really helpful so that it doesn’t just seem like you need
    to “know the trick” to answer the LeetCode problem.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 您还需要了解基本的DSA（数据结构与算法）以备编码面试。为此，我非常喜欢Educative的[Python中的编码面试模式掌握](https://www.educative.io/courses/grokking-coding-interview-in-python?aff=VOR0)，它专注于数据结构和算法问题的常见模式。我发现这非常有帮助，这样就不会让人觉得你只需要“知道技巧”来回答LeetCode问题。
- en: 'And, a few books that are worth reading (these are also affiliate links, but
    I do <3 all these books):'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有一些值得阅读的书籍（这些也是联盟链接，但我确实非常喜欢这些书籍）：
- en: '[Practical Statistics for Data Scientists ](https://amzn.to/3DgTa61)— A great
    resource to deepen your statistical knowledge along with examples in R and Python.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[数据科学家实用统计学](https://amzn.to/3DgTa61)——这是一个很好的资源，可以加深您的统计知识，并包含R和Python中的示例。'
- en: '[Hands-On Machine Learning with Scikit-Learn, Keras, and TensorFlow](https://amzn.to/3FjsdyZ)
    for practical ML examples.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[使用Scikit-Learn、Keras和TensorFlow的实践机器学习](https://amzn.to/3FjsdyZ)以获取实用的ML示例。'
- en: '[Software Engineering for Data Scientists](https://amzn.to/4bxzJSX) — This
    book is great and can help bridge the gap between the kind of coding you might
    be familiar with for analytics and production-level coding.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[数据科学家软件工程](https://amzn.to/4bxzJSX)——这本书很棒，可以帮助您在分析型编码和面向生产的编码之间架起桥梁。'
- en: There are tons more, but this would be my top three. [Here is a link](https://amzn.to/3QU7lAV)
    to more of my favorite technical books if you want to explore further!
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 还有更多，但这是我的前三名。如果您想进一步探索，这里有[更多我喜欢的技术书籍链接](https://amzn.to/3QU7lAV)！
- en: The most important thing when going the self-study route is consistency. Make
    a schedule and stick to it, even if it’s just a little bit each day.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 当您选择自学路线时，最重要的是保持一致性。制定一个计划并坚持下去，即使每天只是学习一点点。
- en: Bootcamps
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 坦克营
- en: Now, maybe you’re thinking you’d prefer to have a little more structure and
    outside accountability in your learning. If you don’t want to commit to a full
    degree, bootcamps can be another option.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，也许您在想您可能更喜欢在学习中有一点更多的结构性和外部问责制。如果您不想承诺一个完整的学位，坦克营可以是一个选择。
- en: 'Some pros of bootcamps are:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 坦克营的一些优点是：
- en: Fast-paced learning — You generally can complete them in a few months.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速学习——您通常可以在几个月内完成它们。
- en: Structured curriculum, because everything is laid out for you, so you don’t
    have to piece together your own learning plan.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结构化课程，因为所有内容都为您准备好了，所以您不必自己拼凑学习计划。
- en: And community support — You get to learn alongside peers and get mentorship
    from instructors who may be folks already working in the field.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以及社区支持——您可以与同行一起学习，并从可能已经在该领域工作的导师那里获得指导。
- en: One thing to keep in mind is that bootcamps vary in quality, and not all are
    super valued by employers. Before enrolling, do your research — so, check reviews,
    talk to alumni, and make sure they offer career support.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 需要记住的一件事是，速成班的质量各不相同，并不是所有都受到雇主的极高评价。在注册之前，做好研究——所以，查看评论，与校友交谈，并确保他们提供职业支持。
- en: Master’s degree
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 硕士学位
- en: For those looking for a deep dive into data science with strong networking opportunities,
    a Master’s degree can be a solid investment. This is especially useful if you’re
    transitioning from a non-technical background, or if you’re worried your background
    won’t be passing resume scanning tools.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些想要深入数据科学并拥有强大人脉机会的人来说，硕士学位可以是一个稳固的投资。这尤其适用于你从非技术背景过渡，或者如果你担心你的背景无法通过简历筛选工具。
- en: The downside is obviously that Master’s programs can be expensive and time-consuming.
    But the good news here is that there are now affordable, part-time online programs
    that allow you to study while working. For example, Georgia Tech’s programs are
    really affordable and of pretty decent quality.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 立刻的缺点很明显，那就是硕士学位课程可能很昂贵且耗时。但好消息是，现在有一些负担得起、可以兼职在线学习的课程，允许你在工作的同时学习。例如，乔治亚理工学院的课程真的很实惠，而且质量相当不错。
- en: Mentorship
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 导师
- en: No matter which path you take, mentorship can be incredibly helpful. Having
    someone to guide you, provide feedback, and help with career navigation can make
    a huge difference.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你选择哪条路，导师都可以提供极大的帮助。有一个人来指导你，提供反馈，并帮助你进行职业导航，这可以产生巨大的影响。
- en: 'Some ways to find mentors:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找导师的一些方法：
- en: At your company — If your company has data scientists, ask if you can collaborate
    or shadow them.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你的公司——如果你的公司有数据科学家，问问你是否可以与他们合作或跟随他们。
- en: LinkedIn — Join data science groups or reach out to professionals (I have a
    whole [video on mentorship strategies](https://www.youtube.com/watch?v=T0LP6Pv3_zs&t=35s)
    if you need help with this!).
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 领英——加入数据科学小组或联系专业人士（如果你需要这方面的帮助，我有一个关于[导师策略](https://www.youtube.com/watch?v=T0LP6Pv3_zs&t=35s)的完整视频！）。
- en: Online communities like Reddit, Discord servers, and Slack groups can be another
    avenue to connect with fellow learners and professionals.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在线社区如Reddit、Discord服务器和Slack群组可以成为与其他学习者和专业人士建立联系的另一种途径。
- en: Or, hire a mentor — If you’re serious about leveling up quickly, investing in
    a mentor *can* be worth it.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者，雇佣一个导师——如果你急于快速提升，投资一个导师*可能*是值得的。
- en: Demonstrating experience
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 展示经验
- en: Ok, so you’ve learned all the skills you need. That’s great, but how do you
    prove to a potential employer that you actually can do the job of a Data Scientist?
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，所以你已经学到了所有需要的技能。那很好，但你怎么向潜在雇主证明你实际上能胜任数据科学家的职位？
- en: I have [a whole video on how to build a portfolio and get experience outside
    of your full-time employment](https://www.youtube.com/watch?v=oG-IIUoPzBA&t=3s).
    The TL;DR there is that you should try your best to do self-motivated projects
    that allow you to simulate the working conditions of being on the job as closely
    as possible.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一个关于如何构建作品集和在你全职工作之外获得经验的[完整视频](https://www.youtube.com/watch?v=oG-IIUoPzBA&t=3s)。那里的总结是，你应该尽力去做一些自我激励的项目，尽可能模拟实际工作中的工作条件。
- en: But if you’re reading this post, there’s a decent chance you’re currently working
    as a Data Analyst already, which gives you a whole other set of opportunities
    to leverage within your current role.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你正在阅读这篇文章，那么你很可能已经是一名数据分析师，这为你提供了在当前角色中可以利用的另一个机会集。
- en: For example, let’s say you’re regularly creating reports in Excel or Tableau.
    You could automate this process with Python scripts, maybe even add some predictive
    elements. Or if your company runs A/B tests, volunteer to help with the statistical
    analysis.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你经常在Excel或Tableau中创建报告。你可以用Python脚本来自动化这个过程，甚至可能添加一些预测元素。或者，如果你的公司进行A/B测试，你可以自愿帮助进行统计分析。
- en: If you have a data science team, try to collaborate with them on a project.
    And if there isn’t a data science team, pitch your employer on some impactful
    projects that would also help you to learn.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一个数据科学团队，尝试与他们合作一个项目。如果没有数据科学团队，向你的雇主提出一些有影响力的项目，这些项目也能帮助你学习。
- en: Best case scenario, this can result in an internal transition. Worst case, you
    now have concrete examples of impact and real data science projects to include
    on your resume.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳情况，这可能导致内部转变。最坏的情况，你现在有了具体的影响力和真实的数据科学项目，可以包括在你的简历中。
- en: Getting a job
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 找工作
- en: 'If you’re able to transition internally then great, you’re done! If not, here
    are some strategies to help you get that first Data Science role:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够内部转换角色，那就太好了，你已经完成了！如果不能，以下是一些帮助你获得第一个数据科学角色的策略：
- en: First, let’s talk about how to position yourself online. Your resume, LinkedIn,
    and GitHub need to tell a consistent story that you are already a competent data
    scientist (because if you have the skills and have done solid projects, you are!).
    So, instead of writing “Data Analyst seeking Data Scientist role,” you might say
    “Data professional specializing in predictive analytics and machine learning.”
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们谈谈如何在线定位自己。你的简历、LinkedIn和GitHub需要讲述一个一致的故事，表明你已经是一名合格的数据科学家（因为如果你有技能并且完成了扎实的项目，你就是！）。所以，与其写“数据分析师寻求数据科学家职位”，你可以说“专注于预测分析和机器学习的数据专业人士。”
- en: When it comes to your GitHub, make sure to put your best stuff at the top here.
    This is especially important for analysts, since your coding skills will be under
    more scrutiny. So,
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到你的GitHub时，确保将最好的内容放在最上面。这对于分析师来说尤为重要，因为你的编码技能将受到更多的审查。所以，
- en: Pin your best ML projects at the top
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你最好的机器学习项目置于顶部
- en: Write clear READMEs that explain your approach
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写清晰的README文件，解释你的方法
- en: Make sure your code is well structured and documented, showing you understand
    software engineering principles
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保你的代码结构良好且经过良好文档化，这表明你理解软件工程原则
- en: And add visualizations and results to showcase the impact, which should be easy
    for you with your background!
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并添加可视化结果来展示影响，这对于你来说应该很容易，因为你具备这样的背景！
- en: Once it’s time to apply, prioritize hybrid roles. These are positions that sit
    between traditional analytics and data science, and they’re often an excellent
    stepping stone.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 到时候申请时，优先考虑混合角色。这些角色位于传统分析和数据科学之间，通常是一个极好的跳板。
- en: For example, lots of companies (including big tech firms like Meta and Amazon)
    have roles that they call “Data Scientist” but are actually more like advanced
    analytics positions. And honestly at many companies, the lines are blurry anyway.
    Use this ambiguity to your advantage!
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，许多公司（包括像Meta和Amazon这样的科技巨头）都有被称为“数据科学家”的角色，但实际上更像是高级分析职位。而且说实话，在许多公司，这些界限本身就是模糊的。利用这种模糊性来为你自己谋利！
- en: When you’re networking and preparing for interviews, leverage your analytics
    background. Use your deep understanding of business context, clear communication
    skills, and examples of how you’ve influenced the business to deliver measurable
    impact. Other candidates who may be more technical than you might struggle with
    the business and communication side of things. So don’t be afraid to lean into
    your strengths.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在建立人脉和准备面试时，利用你的分析背景。利用你对商业背景的深入理解、清晰的沟通技巧以及你如何影响业务以产生可衡量影响的例子。其他可能比你更技术性的候选人可能会在商业和沟通方面遇到困难。所以，不要害怕发挥你的优势。
- en: '* * *'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Remember, this transition isn’t going to happen overnight, and that’s okay.
    What matters is consistent progress. Every line of code you write, every concept
    you learn, every project you complete — it all adds up.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，这种转换不会一夜之间发生，这是正常的。重要的是持续进步。你写的每一行代码，你学习的每一个概念，你完成的每一个项目——这一切都在积累。
- en: 'If you’re feeling like you need some support with your data science/ML career,
    here are some ways I can help:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你感觉需要一些支持来帮助你数据科学/机器学习职业发展，以下是我可以提供的一些帮助方式：
- en: If you’re interested in becoming a Data Scientist, I have a really [comprehensive
    video on YouTube](https://www.youtube.com/watch?v=uakGF0DP-mk&t=42s) with a complete
    roadmap on how to go from an absolute beginner to your first job.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想要成为一名数据科学家，我在YouTube上有一个非常[全面的视频](https://www.youtube.com/watch?v=uakGF0DP-mk&t=42s)，其中包含了从绝对新手到第一份工作的完整路线图。
- en: Or, I have [a free 80+ page e-book](https://www.gratitudedriven.com/subscribe)
    with the same roadmap info, plus links to learning resources, checklists, and
    more!
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者，我有一本[免费的80多页电子书](https://www.gratitudedriven.com/subscribe)，其中包含了相同的路线图信息，以及学习资源、清单等链接！
- en: If you’d like to chat 1:1, you can [book a call with me here](https://topmate.io/marina_wyss).
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想要进行一对一的聊天，你可以[在这里预约与我通话](https://topmate.io/marina_wyss)。
- en: '*Note: This post contains affiliate links. If you make a purchase I’ll earn
    a small commission, at no cost to you. Thank you for your support ❤*'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：本文包含联盟链接。如果你进行购买，我将获得一小笔佣金，对你来说没有任何成本。感谢你的支持 ❤*'
