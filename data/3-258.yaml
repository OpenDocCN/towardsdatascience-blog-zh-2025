- en: 'Learnings from a Machine Learning Engineer — Part 2: The Data Sets'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器学习工程师的经验分享 — 第二部分：数据集
- en: 原文：[https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-2-the-data-sets/](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-2-the-data-sets/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-2-the-data-sets/](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-2-the-data-sets/)
- en: In [Part 1](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/),
    we discussed the importance of collecting good image data and assigning proper
    labels for your image classification project to be successful. Also, we talked
    about classes and sub-classes of your data. These may seem pretty straight forward
    concepts, but it’s important to have a solid understanding going forward. So,
    if you haven’t, please check it out.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在[第一部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/)中，我们讨论了收集良好的图像数据并为你的图像分类项目正确分配标签的重要性。我们还讨论了数据类别和子类别。这些概念可能看起来相当直接，但重要的是要有一个坚实的基础理解。所以，如果你还没有，请查看它。
- en: Now we will discuss how to build the various data sets and the techniques that
    have worked well for my application. Then in the [next part](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/),
    we will dive into the evaluation of your models, beyond simple accuracy.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将讨论如何构建各种数据集以及对我应用效果良好的技术。然后在[下一部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/)中，我们将深入探讨模型评估，而不仅仅是简单的准确率。
- en: I will again use the example zoo animals image classification app.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我将再次使用动物园动物图像分类应用示例。
- en: '**Data Sets**'
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**数据集**'
- en: As machine learning engineers, we are all familiar with the train-validation-test
    sets, but when we include the concept of sub-classes discussed in [Part 1](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/),
    and incorporate to concepts discussed below to set a minimum and maximum image
    count per class, as well as staged and synthetic data to the mix, the process
    gets a bit more complicated. I had to create a custom script to handle these options.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 作为机器学习工程师，我们都熟悉训练-验证-测试集，但当我们包括在[第一部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/)中讨论的子类别概念，以及以下讨论的概念，为每个类别的图像设置最小和最大数量，以及分阶段和合成数据，这个过程就会变得复杂一些。我不得不创建一个自定义脚本来处理这些选项。
- en: 'I will walk you through these concepts before we split the data for training:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们分割数据用于训练之前，我将向您介绍这些概念：
- en: '**Image cutoffs** — Too few images and your model performance will suffer.
    Too many and you spend more time training than it’s worth.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图像截止值** — 图像太少会导致你的模型性能下降。太多的话，你会花费比其价值更高的时间来训练。'
- en: '**Confidence thresholds** — Your model indicates how confident it is in the
    predictions. Let’s use that to decide when to present results to the user.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**置信度阈值** — 你的模型表明它在预测中的信心程度。让我们利用这一点来决定何时向用户展示结果。'
- en: '**Benchmark sets** — Real-world data is messy and the benchmark sets should
    reflect that. These need to stretch the model to the limit and help us decide
    when it is ready for production.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基准集** — 现实世界的数据是杂乱的，基准集应该反映这一点。这些需要将模型推到极限，并帮助我们决定何时可以投入生产。'
- en: '**Staged and synthetic data** — Real-world data is king, but sometimes you
    need to produce the your own or even generate data to get off the ground. Be careful
    it doesn’t hurt performance.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分阶段和合成数据** — 现实世界的数据是王，但有时你需要自己生成数据，甚至生成数据以开始。小心不要损害性能。'
- en: '**Duplicate images** — Repeat data can skew your results and give you a false
    sense of performance. Make sure your data is diverse.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**重复图像** — 重复数据会扭曲你的结果，并给你一个虚假的性能感。确保你的数据多样化。'
- en: '**Building the data sets** — Combine sub-classes, apply cutoffs, and create
    your train-validation-test sets. Now we are ready to get the show started.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**构建数据集** — 合并子类别，应用截止值，并创建你的训练-验证-测试集。现在我们准备开始表演了。'
- en: '**Image cutoffs**'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**图像截止值**'
- en: In my experience, using a minimum of 40 images per class provides descent performance.
    Since I like to use 10% each for the test set and validation set, that means at
    least 4 images will be used to check the training set, which feels just barely
    adequate. Using fewer than 40 images per class, I notice my model evaluation tends
    to suffer.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的经验中，每个类别至少使用40张图像可以提供良好的性能。由于我喜欢将10%用于测试集和验证集，这意味着至少需要4张图像来检查训练集，这感觉刚刚好。如果每个类别使用少于40张图像，我发现我的模型评估往往会受到影响。
- en: On the other end, I set a maximum of about 125 images per class. I have found
    that the performance gains tend to plateau beyond this, so having more data will
    slow down the training run with little to show for it. Having more than the maximum
    is fine, and these “overflow” can be added to the test set, so they don’t go to
    waste.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一端，我为每个类别设置了大约125张图像的最大值。我发现性能提升在这个值之后往往会趋于平稳，所以拥有更多的数据将减缓训练运行，而几乎没有可展示的成果。超过最大值是可以的，这些“溢出”可以添加到测试集中，这样就不会浪费。
- en: There are times when I will drop the minimum cutoff to, say 35, with no intention
    of moving the trained model to production. Instead, the purpose is to leverage
    this throw-away model to find more images from my unlabelled set. This is a technique
    that I will go into more detail in [Part 3](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候我会将最小截止点降低到35，没有打算将训练好的模型投入生产。相反，目的是利用这个可丢弃的模型从我的未标记集中找到更多图像。这是一个我将在[第3部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/)中详细介绍的技术。
- en: '**Confidence threshold**'
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**置信度阈值**'
- en: You are likely familiar with the softmax score. As a reminder, softmax is the
    probability assigned to each label. I like to think of it as a confidence score,
    and we are interested in the class that receives the highest confidence. Softmax
    is a value between zero and one, but I find it easier to interpret confidence
    scores between zero and 100, like a percentage.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能熟悉softmax分数。作为提醒，softmax是分配给每个标签的概率。我喜欢将其视为置信度分数，我们感兴趣的是获得最高置信度的类别。softmax的值在零到一之间，但我发现将置信度分数解释为零到100之间更容易，就像一个百分比。
- en: In order to decide if the model is confident enough with its prediction, I have
    chosen a threshold of 95\. I use this threshold when determining if I want to
    present results to the user.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 为了决定模型对其预测的置信度是否足够，我选择了一个95%的阈值。我在决定是否向用户展示结果时使用这个阈值。
- en: Scores above the threshold have a better changes of being right, so I can confidently
    provide the results. Scores below the threshold may not be right — in fact it
    could be “out-of-scope”, meaning it’s something the model doesn’t know how to
    identify. So, instead of taking the risk of presenting incorrect results, I instead
    prompt the user to try again and offer suggestions on how to take a “good” picture.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 超过阈值的分数更有可能是正确的，因此我可以自信地提供结果。低于阈值的分数可能不正确——实际上可能是“超出范围”，意味着这是模型不知道如何识别的东西。因此，为了避免展示错误的结果，我反而提示用户再次尝试，并提供如何拍摄“好”照片的建议。
- en: Admittedly this is somewhat arbitrary cutoff, and you should decide for your
    use-case what is appropriate. In fact, this score could probably be adjusted for
    each trained model, but this would make it harder to compare performance across
    models.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 诚然，这个截止点有些随意，你应该根据你的用例决定什么才是合适的。实际上，这个分数可能需要为每个训练好的模型进行调整，但这会使跨模型性能比较变得更加困难。
- en: I will refer to this confidence score frequently in the evaluations section
    in [Part 3](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在[第3部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/)的评估部分经常提到这个置信度分数。
- en: '**Benchmark sets**'
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**基准集**'
- en: Let me introduce what I call the benchmark sets, which you can think of as extended
    test sets. These are hand-picked images designed to stretch the limits of your
    model, and provide a measure for specific classes of your data. Use these benchmarks
    to justify moving your model to production, and for an objective measure to show
    to your manager.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 让我介绍一下我所说的基准集，你可以将其视为扩展的测试集。这些是精心挑选的图像，旨在扩展你模型的极限，并为你的数据特定类别提供一个衡量标准。使用这些基准来证明将你的模型投入生产是合理的，并且可以提供一个客观的衡量标准向你的经理展示。
- en: '**Difficult Benchmark** — These are the “extra credit” images, like the bonus
    questions a professor would add to the quiz to see which students are paying attention.
    You need a keen eye to spot the difference between the ground truth and a similar
    looking class. For example, a cheetah sleeping in the shade that could pass as
    a leopard if you don’t look closely.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**困难基准**—— 这些是“额外加分”的图像，就像教授在测验中添加的附加问题，以查看哪些学生是认真听课的。你需要敏锐的观察力才能区分真实情况与类似外观的类别。例如，一只在阴影中睡觉的猎豹，如果不仔细看可能会被误认为是豹子。'
- en: '**Out-of-scope Benchmark** — These are the “trick question” images. Our model
    is trained on zoo animals, but people are known for not following the rules. For
    example, a zoo guest takes a picture of their child wearing cheetah face paint.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**范围外基准** — 这些是“狡猾问题”的图片。我们的模型是在动物园动物上训练的，但人们众所周知不遵守规则。例如，一位动物园游客给孩子拍了张戴着猎豹面具的照片。'
- en: '**Most-Common Benchmark** — These are your “bread and butter” classes that
    need to get near perfect scores and zero errors. This would be a make-or-break
    benchmark for moving to production.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最常见基准** — 这些是“家常便饭”的类别，需要接近完美的分数和零错误。这将是一个决定是否投入生产的决定性基准。'
- en: '**Least-Common Benchmark** — These are your “rare but exceptional” classes
    that again need to be correct, but reach a minimum score like the confidence threshold.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最少见基准** — 这些是“罕见但卓越”的类别，同样需要正确，但达到一个最低分数，比如置信度阈值。'
- en: When looking for images to add to the benchmarks, you can likely find them in
    real-world images from your deployed model. See the evaluation in [Part 3](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 当寻找添加到基准中的图片时，你很可能在部署的模型的真实世界图片中找到它们。参见[第3部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/)中的评估。
- en: For each benchmark, calculate the min, max, median, and mean scores, and also
    how many images get scores above and below the confidence threshold. Now you can
    compare these measures against what is currently in production, and against your
    minimum requirements, to help decide if the new model is production worthy.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个基准，计算最小值、最大值、中位数和平均值分数，以及有多少图片的分数高于和低于置信度阈值。现在你可以将这些指标与当前在生产中的指标以及你的最低要求进行比较，以帮助决定新模型是否适合生产。
- en: '**Staged or Synthetic data**'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**分阶段或合成数据**'
- en: Perhaps the biggest hurdle to any supervised machine learning application is
    having data to train the model. Clearly, “real-world” data that comes from actual
    users of the application is ideal. However you can’t really collect these until
    the model is deployed. Chicken and egg problem.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 或许，任何监督式机器学习应用的最大障碍是拥有训练模型的数据。显然，“真实世界”的数据，即来自应用程序实际用户的数据是理想的。然而，你实际上无法收集这些数据，直到模型部署。这是一个鸡生蛋的问题。
- en: One way to get started to is to have volunteers collect “staged” images for
    you, trying to act like real users. So, let’s have our zoo staff go around taking
    pictures of the animals. This is a good start, but there will be a certain level
    of bias introduced in these images. For example, the staff may take the photos
    over a few days, so you may not get the year-round weather conditions.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一种开始的方式是让志愿者收集“分阶段”的图片供你使用，尽量模仿真实用户的行为。所以，让我们让我们的动物园工作人员四处拍照，拍动物的照片。这是一个好的开始，但会在这些图片中引入一定程度的偏差。例如，工作人员可能几天内拍照，所以你可能得不到全年的天气条件。
- en: Another way to get pictures is use computer-generated “synthetic” images. I
    would avoid these at all costs, to be honest. Based on my experience, the model
    struggles with these because they look…different. The lighting is not natural,
    the subject may superimposed on a background and so the edges look too sharp,
    etc. Granted, some of the AI generated images look very realistic, but if you
    look closely you may spot something unusual. The neural network in your model
    will notice these, so be careful.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种获取图片的方式是使用计算机生成的“合成”图片。老实说，我会不惜一切代价避免这些。根据我的经验，模型在这些图片上表现不佳，因为它们看起来……不同。光线不自然，主题可能叠加在背景上，因此边缘看起来过于锐利等。当然，一些AI生成的图片看起来非常逼真，但如果你仔细观察，可能会发现一些不寻常之处。你模型中的神经网络会注意到这些，所以请小心。
- en: '![](../Images/ffc74f2c238bbc16dde190540e5eeaa0.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ffc74f2c238bbc16dde190540e5eeaa0.png)'
- en: Image generated using Dall-E
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Dall-E生成的图片
- en: The way that I handle these staged or synthetic images is as a sub-class that
    gets merged into the training set, but only **after** giving preference to the
    real-world images. I cap the number of staged images to 60, so if I have 10 real-world,
    I now only need 50 staged. Eventually, these staged and synthetic images are phased
    out completely, and I rely entirely on real-world.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我处理这些分阶段或合成图片的方式是作为一个子类，将其合并到训练集中，但仅在**之后**给予真实世界图片优先权。我限制分阶段图片的数量为60，所以如果我已有10张真实世界图片，我现在只需要50张分阶段图片。最终，这些分阶段和合成图片将完全淘汰，我完全依赖真实世界的数据。
- en: '**Duplicate images**'
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**重复图片**'
- en: One problem that can creep into your image set are duplicate images. These can
    be exact copies of pictures, or they can be extremely similar. You may think that
    this is harmless, but imagine having 100 pictures of an elephant that are exactly
    the same — your model will not know what to do with a different angle of the elephant.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 可能会进入你的图像集的一个问题是重复图像。这些可能是图片的精确副本，或者它们可以非常相似。你可能认为这无害，但想象一下有100张完全相同的象图片——你的模型将不知道如何处理大象的不同角度。
- en: 'Now, let’s say you have only **two** pictures that are nearly the same. Not
    so bad, right? Well, here is what can happen to them:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，假设你只有两张几乎相同的图片。不是那么糟糕，对吧？好吧，这是它们可能发生的情况：
- en: Both pictures go in the training set — The model doesn’t learn anything from
    the repeated image and it wastes time processing them.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两个图片都进入训练集——模型不会从重复的图像中学习任何东西，这会浪费处理它们的时间。
- en: One goes into the training set, the other goes into the test set — Your test
    score will be higher, but it is not an accurate evaluation.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个进入训练集，另一个进入测试集——你的测试分数会更高，但这不是准确的评估。
- en: Both are in the test set — Your test score will be compounded either higher
    or lower than it should be.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两者都在测试集中——你的测试分数可能会比应有的更高或更低。
- en: None of these will help your model.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都不会帮助你的模型。
- en: There are a few ways to find duplicates. The approach I have taken is to calculate
    a hamming distance on all the pictures and identify the ones that are very close.
    I have an interface that displays the duplicates and I decide which one I like
    best, and remove the other.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种方法可以找到重复项。我采取的方法是在所有图片上计算汉明距离，并识别出非常接近的图片。我有一个显示重复项的界面，我决定哪一个是我最喜欢的，然后删除其他。
- en: Another way (I haven’t tried this yet) is to create a vector representation
    of your images. Store these a vector database, and you can do a similarity search
    to find nearly identical images.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种方法（我还没有尝试过）是创建你图像的向量表示。将这些向量存储在向量数据库中，你可以进行相似度搜索以找到几乎相同的图像。
- en: Whatever method you use, it is important to clean up the duplicates.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你使用什么方法，清理重复项都很重要。
- en: '**Building the data sets**'
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**构建数据集**'
- en: 'Now we are ready to build the traditional training, validation, and test sets.
    This is no longer a straight forward task since I want to:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经准备好构建传统的训练、验证和测试集。这不再是一个简单直接的任务，因为我想要：
- en: Merge sub-classes into a main class.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将子类合并到主类中。
- en: Prioritize real-world images over staged or synthetic images.
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 优先考虑真实世界的图像，而不是摆拍或合成图像。
- en: Apply a minimum number of images per class.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为每个类别应用最小图像数量。
- en: Apply a maximum number of images per class, sending the “overflow” to the test
    set.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为每个类别应用最大图像数量，将“溢出”发送到测试集。
- en: This process is somewhat complicated and depends on how you manage your image
    library. First, I would recommend keeping your images in a folder structure that
    has sub-class folders. You can get image counts by using a script to simply read
    the folders. Second is to keep a configuration of how the sub-classes are merged.
    To really set yourself up for success, put these image counts and merge rules
    in a database for faster lookups.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程有些复杂，取决于你如何管理你的图像库。首先，我建议将你的图像保存在具有子类文件夹的文件夹结构中。你可以通过使用脚本来简单地读取文件夹来获取图像数量。其次，要保留子类合并的配置。为了真正为成功做好准备，将这些图像数量和合并规则放入数据库中以便更快地查找。
- en: My train-validation-test set splits are usually 90–10–0\. I originally started
    out using 80–10–10, but with diligence on keeping the entire data set clean, I
    noticed validation and test scores became pretty even. This allowed me to increase
    the training set size, and use “overflow” to become the test set, as well as using
    the benchmark sets.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我的训练-验证-测试集分割通常是90-10-0。我最初开始使用80-10-10，但随着对整个数据集保持清洁的勤奋，我发现验证和测试分数变得相当均衡。这使我能够增加训练集的大小，并使用“溢出”作为测试集，以及使用基准集。
- en: '**Up next…**'
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**接下来…**'
- en: In this part, we’ve built our data sets by merging sub-classes and using the
    image count cutoffs. Plus we handle staged and synthetic data as well as cleaning
    up duplicate images. We also created benchmark sets and defined confidence thresholds,
    which help us decide when to move a model to production.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在这部分，我们通过合并子类和使用图像数量截止值来构建我们的数据集。此外，我们还处理了摆拍和合成数据，以及清理重复图像。我们还创建了基准集并定义了置信度阈值，这有助于我们决定何时将模型移至生产环境。
- en: In [Part 3](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/),
    we will discuss how we are going to evaluate the different model performances.
    And then finally we will get to the actual model training and the techniques to
    enhance accuracy.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在[第三部分](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-3-the-evaluation/)中，我们将讨论我们将如何评估不同的模型性能。然后最终我们将进入实际的模型训练以及提高准确性的技术。
