- en: 1\. The Challenge of Becoming Data-Driven
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 成为数据驱动型企业的挑战
- en: The business world is currently abuzz with developments in Artificial Intelligence
    (AI) — from the race among leading technology companies to build ever more advanced
    models, to the opportunities for everyday businesses to leverage AI to cut costs,
    generate new revenue streams, or mitigate risks.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 商业界目前正忙于人工智能（AI）的发展——从领先技术公司之间构建更先进模型的竞赛，到普通企业利用人工智能降低成本、创造新的收入来源或减轻风险的机会。
- en: While time will reveal the full extent of AI’s benefits and risks, let’s look
    beyond the hype and focus on how organizations can harness data today to optimize
    or extend their existing business models.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管时间将揭示人工智能的利弊全貌，但让我们超越炒作，关注组织如何利用今天的数据来优化或扩展其现有的商业模式。
- en: 'Data can be leveraged in various ways, including:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可以通过各种方式被利用，包括：
- en: '**Control**: Creating static reports for monitoring and oversight'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**控制**：创建静态报告以进行监控和监督'
- en: '**Automation**: Automating tasks and decisions to address complicated business
    challenges'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化**：自动化任务和决策，以应对复杂的商业挑战'
- en: '**Decision making**: Generating insights that support decision making of complex
    business problems'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**决策制定**：生成支持复杂商业问题决策的见解'
- en: '**Innovation**: Create insights to ask and answer the right questions about
    customers, competitors, technology and industry'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创新**：创造见解，提出并回答关于客户、竞争对手、技术和行业的问题'
- en: The potential of data spans virtually every industry, including healthcare,
    finance, retail, manufacturing, energy & utilities, software development, media,
    and the public sector. Furthermore, data-driven opportunities exist across the
    entire value chain of organizations as well as within most supporting functions.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 数据的潜力几乎覆盖了每个行业，包括医疗保健、金融、零售、制造、能源和公用事业、软件开发、媒体和公共部门。此外，数据驱动的机会存在于组织的整个价值链以及大多数支持功能中。
- en: Despite this vast potential, many organizations struggle to identify and unlock
    the value of data, analytics, and AI. There is no simple recipe or universal plan
    to becoming data-driven. It is a complex challenge.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有巨大的潜力，许多组织在识别和释放数据、分析和人工智能的价值方面仍然面临挑战。没有简单的食谱或普遍的计划可以成为数据驱动型企业。这是一个复杂的挑战。
- en: First, the use cases that provide value to a company are highly specific to
    its context. Second, not only are the use cases unique, but so too are the people,
    challenges, and external conditions that shape an organization’s journey to become
    data-driven.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，为公司提供价值的用例高度特定于其环境。其次，不仅用例是独特的，而且塑造组织成为数据驱动旅程的人、挑战和外部条件也是独特的。
- en: Common challenges organizations face when trying to leverage data include **People**, **Organization **and **Technology**.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 组织在试图利用数据时面临的常见挑战包括**人员**、**组织**和**技术**。
- en: '![](../Images/b1ce44b0f195d9608592a415a92469f3.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b1ce44b0f195d9608592a415a92469f3.png)'
- en: 'Figure 1: Common data challenges can be grouped into three categories.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：常见的数据挑战可以分为三个类别。
- en: The complexity of becoming data-driven is widely acknowledged, and many organizations
    recognize the need for a strategic approach to managing this complexity. As a
    result, the term ‘*data strategy*’ has gained significant attention.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 成为数据驱动的复杂性得到了广泛认可，许多组织认识到需要一种战略方法来管理这种复杂性。因此，“*数据战略*”这个术语已经引起了极大的关注。
- en: But what exactly is a data strategy? What problems does it solve, and what does
    it not address?
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 但数据战略究竟是什么？它解决了哪些问题，又没有解决哪些问题？
- en: 2\. The Problem With Data Strategy
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 数据战略的问题
- en: Iargue that there is no universal consensus on these questions, neither within
    the data community nor among business professionals. Moreover, I assert that many
    existing interpretations of [data strategy contain fundamental misconceptions
    [1]](https://medium.com/towards-data-science/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533#586b).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为在这些问题上，无论是在数据社区还是在商业专业人士中，都没有普遍的共识。此外，我断言，许多现有的数据战略解释都包含根本性的误解[1](https://medium.com/towards-data-science/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533#586b)。
- en: I have been working in the *data field* for approximately 20 years — first as
    a data scientist in industry and consulting, and later as a data strategist helping
    organizations tackle the many challenges they face in becoming data-driven. Recognizing
    the lack of a shared understanding of data strategy, I felt that effectively guiding
    organizations requires a deeper grasp of business strategy.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我在*数据领域*工作了大约20年——最初作为行业和咨询公司的数据科学家，后来作为数据战略家帮助组织应对他们在成为数据驱动型组织过程中面临的许多挑战。认识到对数据战略缺乏共同理解，我觉得有效地引导组织需要更深入地掌握商业战略。
- en: 'Through my exploration of business strategy design, I arrived at the following
    conclusions:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 通过我对商业战略设计的探索，我得出以下结论：
- en: '**Business strategy itself is widely misunderstood** — despite the existence
    of well-established definitions. Even without the data aspect, a lack of ‘*strategy
    literacy*’ prevents many companies from achieving greater success — including
    leveraging data.'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**商业战略本身被广泛误解**——尽管存在既定的定义。即使没有数据方面，缺乏“*战略素养*”也阻止了许多公司取得更大的成功——包括利用数据。'
- en: '**Data strategy is often misdefined** — its use and interpretation frequently
    contradict established definitions and well-known strategy frameworks.'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据战略经常被误解**——它的使用和解释经常与既定的定义和著名的战略框架相矛盾。'
- en: In my opinion, this lack of shared understanding creates a serious problem.
    It hampers focused discussions between data professionals — like myself — and
    executives, ultimately acting as yet another roadblock for organizations seeking
    to unlock the value of data.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，这种缺乏共同理解造成了严重的问题。它阻碍了数据专业人士——像我这样的人——与高管之间的集中讨论，最终成为寻求释放数据价值的组织道路上的另一个障碍。
- en: However, I believe this issue is solvable. My proposal is to adopt a well-established
    business strategy framework and apply it to designing data-driven organizations.
    By doing so, we can create a common language and a shared understanding for both
    business leaders and data professionals.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我相信这个问题是可以解决的。我的建议是采用一个既定的商业战略框架，并将其应用于设计数据驱动型组织。通过这样做，我们可以为商业领导者和数据专业人士创造一个共同的语言和共享的理解。
- en: My ambition is not to dismiss approaches of esteemed colleagues who have successfully
    applied their own methodologies. There is no single solution for complex problems.
    My aim is rather to contribute to clarity and a joint language of business and
    data professionals — ultimately increasing the effectiveness of designing data-driven
    organizations.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我的雄心不是要贬低那些成功应用自己方法的尊敬的同事。对于复杂问题没有单一的解决方案。我的目标更多的是为商业和数据专业人士的清晰性和共同语言做出贡献——最终提高设计数据驱动型组织的有效性。
- en: This article is a summary of a [detailed playbook I recently published [1]](https://medium.com/towards-data-science/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533),
    providing a concise and focused overview.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 本文是对我最近发布的[详细操作手册的总结[1]](https://medium.com/towards-data-science/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533)，提供了一个简洁而专注的概述。
- en: 3\. Understanding Business Strategy
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 理解商业战略
- en: Business strategy is about making deliberate choices — choices about a company’s
    ambition, about which customers it serves, which products or services it offers,
    and how it delivers superior value relative to competitors. It also includes choices
    on which activities to prioritize and which systems are needed to measure success
    and progress. Every company makes these choices — either consciously and explicitly
    through a strategy design process or unconsciously and implicitly.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 商业战略关乎做出深思熟虑的选择——关于公司的雄心、它服务的客户、它提供的产品或服务，以及它相对于竞争对手如何提供卓越价值的选择。它还包括关于优先考虑哪些活动和需要哪些系统来衡量成功和进步的选择。每个公司都会做出这些选择——要么是通过战略设计过程的自觉和明确，要么是通过无意识和隐性的方式。
- en: Strategy is defined as a set of **integrated **and **mutually reinforcing** choices
    that together form a compelling logic for how a company wins in the market. Winning
    means creating sustainable competitive advantage and delivering superior value
    relative to the competition.
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 战略被定义为一系列**整合**和**相互加强**的选择，这些选择共同形成了一个令人信服的逻辑，即公司如何在市场上获胜。获胜意味着创造可持续的竞争优势，并相对于竞争提供卓越的价值。
- en: This definition of strategy aligns with the [Playing to Win framework [2]](https://rogerlmartin.com/lets-read/playing-to-win),
    developed by [Roger Martin [3]](https://rogerlmartin.com/), a globally recognized
    business thinker, CEO advisor, former Monitor consultant, and Professor Emeritus
    at the Rotman School of Management.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这个战略的定义与由全球公认的商业思想家、CEO顾问、前Monitor顾问和Rotman商学院荣誉教授[Roger Martin [3]](https://rogerlmartin.com/)开发的[Playing
    to Win框架[2]](https://rogerlmartin.com/lets-read/playing-to-win)相一致。
- en: I personally consider Playing to Win one of the most powerful strategy frameworks
    available. I chose Playing to Win because it is widely recognized as a standard
    for effective strategy design. Moreover, it comes with a comprehensive ecosystem
    of resources, including literature [[2](https://rogerlmartin.com/lets-read/playing-to-win), [4](https://rogerlmartin.com/archive/medium-posts/-in-thought-pillars,strategy)], [structured
    processes [4a]](https://rogermartin.medium.com/the-strategic-choice-structuring-process-5e116b12ae1f), [templates,
    and training programs [5]](https://www.ideou.com/blogs/inspiration/how-to-make-your-strategy-real) —
    all of which support the design and activation of any kind of strategy.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人认为Playing to Win是最强大的战略框架之一。我选择Playing to Win，因为它被广泛认为是有效战略设计的标准。此外，它还附带一个全面的资源生态系统，包括文献[[2](https://rogerlmartin.com/lets-read/playing-to-win)，[4](https://rogerlmartin.com/archive/medium-posts/-in-thought-pillars,strategy)]，[结构化流程[4a]](https://rogermartin.medium.com/the-strategic-choice-structuring-process-5e116b12ae1f)，[模板和培训计划[5]](https://www.ideou.com/blogs/inspiration/how-to-make-your-strategy-real)——所有这些都有助于任何类型战略的设计和实施。
- en: A crucial aspect of the strategy definition above is *integration* — the choices
    forming a successful strategy must fit together into a cohesive whole. They must
    logically align and reinforce each other, leading to a plausible, difficult-to-replicate
    theory of how to outperform competitors.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 上述战略定义的一个关键方面是*整合*——构成成功战略的选择必须形成一个统一的整体。它们必须逻辑上相互一致并相互加强，从而形成一个合理的、难以复制的理论，即如何超越竞争对手。
- en: To illustrate this concept, I like to use the analogy of LEGO bricks — just
    as LEGO pieces interlock to form a strong structure, strategic choices must be
    well-connected to create a solid competitive logic.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这个概念，我倾向于使用乐高积木的类比——正如乐高积木相互连接形成坚固的结构，战略选择也必须紧密相连，以创造稳固的竞争逻辑。
- en: 'The Playing to Win framework organizes strategic choices into five key building
    blocks, visualized in the so-called Strategy Choice Cascade:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: “玩赢”框架将战略选择组织成五个关键构建块，在所谓的策略选择级联中可视化：
- en: '![](../Images/14dca72b20a3c9935812d2f1fbe4198c.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/14dca72b20a3c9935812d2f1fbe4198c.png)'
- en: 'Figure 2: The Strategy Choice Cascade helps to structure the strategic choices
    you need to answer during the strategy design process. Think of choices as LEGO
    pieces.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：策略选择级联有助于在策略设计过程中构建你需要回答的战略选择。将选择视为乐高积木。
- en: 'The cascade illustrates that an organization needs to make choices for:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 级联图表明，组织需要做出以下选择：
- en: '**Winning Aspiration:** What winning means for the organization.'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**获胜愿景**：对组织来说，获胜意味着什么。'
- en: '**Where to Play:** Which customers to serve and which products or services
    to offer.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在哪里竞争**：为哪些客户服务以及提供哪些产品或服务。'
- en: '**How to Win:** The approach to winning in the chosen market.'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**如何获胜**：在所选市场中的获胜方法。'
- en: '**Capabilities:** The critical activities and resources needed.'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**能力**：需要的核心活动和资源。'
- en: '**Management Systems:** The systems, processes, norms, culture, and metrics
    required to build and maintain these capabilities.'
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**管理系统**：构建和维护这些能力所需的系统、流程、规范、文化和指标。'
- en: These choices are not a loosely connected list but must be carefully integrated
    to form a coherent and compelling whole — this is your strategy.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这些选择不是一个松散连接的列表，而必须仔细整合，形成一个连贯而有说服力的整体——这就是你的策略。
- en: Another [crucial characteristic of strategy is that it is *singular *[4b]](https://rogermartin.medium.com/strategy-is-singular-4876ac92a824).
    This means that a company selling one product in one geography requires one business
    strategy. However, an organization may also have additional functional strategies.
    If a function has its own budget, [it requires a strategy to guide its investment
    choices [6]](https://hbr.org/2019/07/the-one-thing-you-need-to-know-about-managing-functions).
    This leads to the development of HR, IT, or Marketing strategies, among others.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个策略的关键特征是它**是单一的**[4b](https://rogermartin.medium.com/strategy-is-singular-4876ac92a824)。这意味着一个在某个地理区域销售单一产品的公司需要一个业务策略。然而，一个组织也可能有额外的职能策略。如果一个职能有自己的预算，[它需要策略来指导其投资选择[6]](https://hbr.org/2019/07/the-one-thing-you-need-to-know-about-managing-functions)。这导致了人力资源、信息技术或市场营销策略等策略的发展。
- en: 4\. Common Data Strategy Misconceptions
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 常见的数据策略误解
- en: 'Apersistent misconception is that a separate data/analytics/BI/AI strategy
    is needed to define how these elements create value and competitive advantage.
    However, we have just established that an effective business strategy is singular:
    there is one coherent set of strategic choices that determines how an organization
    creates competitive advantage and delivers superior value relative to the competition.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 一个持续的误解是，需要一个单独的数据/分析/BI/AI策略来定义这些元素如何创造价值和竞争优势。然而，我们刚刚确定一个有效的业务策略是单一的：有一个连贯的战略选择集，决定了组织如何创造竞争优势并相对于竞争对手提供更优质的价值。
- en: Introducing a separate strategy that defines how an organization wins with data,
    analytics, and AI — alongside a business strategy that defines how it wins otherwise
    — is neither necessary nor advisable. To put it in the words of the 1986 fantasy
    action-adventure Highlander: [*“There can only be one.”* [7]](https://www.linkedin.com/posts/jens-linden_datastrategy-analytics-ai-activity-7289530100855783424-Xa2m/)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 引入一个单独的策略，定义组织如何通过数据、分析和人工智能赢得胜利，同时还有一个定义如何以其他方式赢得胜利的业务策略——这既不必要也不可取。用1986年幻想动作冒险电影《高人》中的话来说：[*“只能有一个。”* [7]](https://www.linkedin.com/posts/jens-linden_datastrategy-analytics-ai-activity-7289530100855783424-Xa2m/)
- en: '![](../Images/6e08a46af509c5223992b0474ff1159a.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6e08a46af509c5223992b0474ff1159a.png)'
- en: 'Figure 3: Illustration of a common data strategy misconception: Data strategy
    should not define how an organization creates value and competitive advantage
    with data alongside business strategy.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：常见数据策略误解的说明：数据策略不应定义组织如何与业务策略一起使用数据创造价值和竞争优势。
- en: Proposing a data strategy in this dysfunctional form is likely to irritate business
    professionals and executives — especially those with a strong understanding of
    strategy. The same principle applies to *digital strategy* — treating it as a
    separate entity rather than embedding it within the business strategy leads to
    similar misalignment.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种功能失调的形式提出数据策略很可能会激怒业务专业人士和主管——尤其是那些对策略有深刻理解的人。同样的原则也适用于**数字策略**——将其视为一个独立的实体，而不是将其嵌入到业务策略中，会导致类似的错位。
- en: For another typical misunderstanding of data strategy, you just need to ask
    ChatGPT (here I used version o3-mini-high), which nicely averages what the internet
    provides: *“A data strategy is a comprehensive plan that outlines how an organization
    collects, manages, analyzes, and leverages data as a strategic asset to drive
    decision-making and achieve its business goals*.”
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 对于数据战略的另一种典型误解，你只需询问ChatGPT（这里我使用了o3-mini-high版本），它很好地平均了互联网提供的信息：“数据战略是一个全面的计划，概述了组织如何收集、管理、分析和利用数据作为战略资产来推动决策并实现其商业目标。”
- en: Confusing plans with strategy is a well-known misunderstanding — even beyond
    the data context. [Roger Martin](https://rogerlmartin.com/), the originator of
    the Playing to Win framework, has dedicated significant time and effort to explaining
    the [difference between a plan and a strategy [8](https://www.youtube.com/watch?v=iuYlGRnC7J8),
    4c-f].
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 将计划与战略混淆是一种众所周知的误解——即使在数据背景下也是如此。[罗杰·马丁](https://rogerlmartin.com/)，"赢在游戏"框架的创始人，投入了大量的时间和精力来解释[计划和战略之间的区别
    [8](https://www.youtube.com/watch?v=iuYlGRnC7J8), 4c-f]。
- en: In essence, plans focus on certainty — they outline projects with timelines,
    deliverables, budgets, and responsibilities. Strategy, on the other hand, is about
    uncertainty — it consists of choices that represent a bet on how an organization
    aims to win. [Planning complements strategy](https://rogermartin.medium.com/strategy-vs-planning-complements-not-substitutes-ea08e56809d6) but
    does not replace it. It should naturally follow strategy design as a means to
    activate the strategy.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，计划关注确定性——它们概述了具有时间表、可交付成果、预算和责任的项目。另一方面，战略是关于不确定性的——它由代表组织如何赢得胜利的赌注的选择组成。[规划补充战略](https://rogermartin.medium.com/strategy-vs-planning-complements-not-substitutes-ea08e56809d6)但不取代它。它应作为激活战略的手段自然地跟随战略设计。
- en: '![](../Images/3df2a5299dfaee9ef49cfbb1b67a8231.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3df2a5299dfaee9ef49cfbb1b67a8231.png)'
- en: 'Figure 4: Plan vs. strategy: The plan follows your strategy work.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：计划与战略：计划遵循您的战略工作。
- en: 5\. Strategy for Designing Data-Driven Organizations
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 设计数据驱动组织的战略
- en: 'What strategy work is then required to design a data-driven organization? The
    answer is straightforward: if data, analytics, and AI contribute to your company’s
    ability to win, the relevant choices must be embedded in your business strategy.
    As with any approach that provides a competitive advantage, data-related strategic
    choices should not exist in isolation but as an integral part of the singular
    business strategy.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，为了设计一个数据驱动的组织，需要什么样的战略工作呢？答案是直接的：如果数据、分析和人工智能有助于提高公司的竞争力，相关的选择就必须嵌入到您的商业战略中。与任何提供竞争优势的方法一样，与数据相关的战略选择不应孤立存在，而应作为单一商业战略的有机组成部分。
- en: '![](../Images/043254ecee95b6588b1cd34bb9667b59.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/043254ecee95b6588b1cd34bb9667b59.png)'
- en: 'Figure 5: Data-related strategic choices are part of your business strategy.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 图5：与数据相关的战略选择是您商业战略的一部分。
- en: During the [strategy design process [4a]](https://medium.com/@rogermartin/the-strategic-choice-structuring-process-5e116b12ae1f),
    organizations must identify where data can create a competitive edge. This defines
    the *strategic data demands *of an organization.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在[战略设计过程 [4a]](https://medium.com/@rogermartin/the-strategic-choice-structuring-process-5e116b12ae1f)中，组织必须确定数据可以创造竞争优势的地方。这定义了组织的*战略数据需求*。
- en: However, not every organization will differentiate itself through data, analytics,
    or AI [[9](https://medium.com/towards-data-science/the-root-cause-of-why-organizations-fail-with-data-ai-0095a73cf5ab)].
    For some, data-related efforts may remain purely operational, focusing on financial
    reporting, process efficiencies, or other standard practices that competitors
    also follow. In this scenario, your organization possesses ‘just’ *operational
    data demands*.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，并非每个组织都能通过数据、分析或人工智能来区分自己 [[9](https://medium.com/towards-data-science/the-root-cause-of-why-organizations-fail-with-data-ai-0095a73cf5ab)]。对于一些人来说，与数据相关的努力可能仅限于运营层面，专注于财务报告、流程效率或其他标准实践，这些实践竞争对手也在遵循。在这种情况下，您的组织拥有“仅仅”*运营数据需求*。
- en: '![](../Images/0bacbc5d8da51a2b960e2dce2a67e280.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0bacbc5d8da51a2b960e2dce2a67e280.png)'
- en: 'Figure 6: Operational choices for capabilities and systems complement the few
    strategic choices.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图6：能力和系统方面的运营选择补充了少数战略选择。
- en: Regardless of whether data plays a strategic or operational role — or both —
    many organizations require a dedicated function for data, analytics, BI, insights
    and/or AI. To operate effectively, [this function needs a strategy [6]](https://hbr.org/2019/07/the-one-thing-you-need-to-know-about-managing-functions).
    Depending on its scope and focus, you might choose to call this your [‘data strategy’
    [10]](https://contributor.insightmediagroup.io/the-data-strategy-choice-cascade-9f2742b81bda).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 无论数据扮演的是战略角色还是运营角色——或者两者都是——许多组织都需要一个专门的数据、分析、BI、洞察和/或人工智能职能。为了有效运作，[这个职能需要一个策略[6]](https://hbr.org/2019/07/the-one-thing-you-need-to-know-about-managing-functions)。根据其范围和重点，你可能会选择称之为你的[‘数据策略’[10]](https://contributor.insightmediagroup.io/the-data-strategy-choice-cascade-9f2742b81bda)。
- en: '![](../Images/40c8cea6da321e28382f9290ac25c0d2.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/40c8cea6da321e28382f9290ac25c0d2.png)'
- en: 'Figure 7: The Data Strategy Choice Cascade.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图7：数据策略选择级联。
- en: Interested in more details? I invite readers to deep dive into [my data strategy
    playbook [1]](https://medium.com/towards-data-science/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533),
    which contains detailed processes, best practices and industry examples.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 想要了解更多细节？我邀请读者深入了解[我的数据策略手册[1]](https://medium.com/towards-data-science/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533)，其中包含详细的过程、最佳实践和行业案例。
- en: 6\. Conclusions
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 结论
- en: Strategy is key to business success. Unfortunately, rigorous and effective business
    strategy design appears to be a lost art. This is one reason why organizations
    attempt to apply dysfunctional data strategy variants, with the well-intended
    goal of helping organizations become data-driven.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 策略是业务成功的关键。不幸的是，严格而有效的业务策略设计似乎已经失传。这是组织试图应用功能失调的数据策略变体，以良好的意图帮助组织实现数据驱动的一个原因。
- en: However, a well-designed business strategy is singular and defines how an organization
    wins in the market. If a company wins with the help of data and AI, these strategic
    choices are simply part of the business strategy, forming an integrated set of
    choices that create a compelling logic for how the organization can sustainably
    outperform the competition.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，一个精心设计的商业策略是独一无二的，它定义了一个组织如何在市场上获胜。如果一个公司借助数据和人工智能获胜，这些战略选择仅仅是商业策略的一部分，形成了一个有说服力的逻辑，说明了组织如何可持续地超越竞争对手。
- en: As a consequence, organizations must develop both *strategy and data literacy* as
    foundational elements for designing data-driven organizations. Moreover, dysfunctional
    data strategy approaches must be discarded to create space for a shared language
    and mutual understanding.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，组织必须发展策略和数据素养作为设计数据驱动型组织的基础要素。此外，必须摒弃功能失调的数据策略方法，为共享语言和相互理解创造空间。
- en: By leveraging existing and established strategy frameworks, organizations can
    move beyond the common misconceptions surrounding data strategy and ensure that
    data, analytics, and AI truly serve as enablers of business success.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用现有的和已建立的策略框架，组织可以超越围绕数据策略的常见误解，并确保数据、分析和人工智能真正成为业务成功的推动者。
