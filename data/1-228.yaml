  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 4：定义经典训练周期**'
- en: 'Let’s define the reusable training function that encapsulates the three key
    phases (Forward Pass, Backward Pass and Parameter Update):'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义一个可重用的训练函数，它封装了三个关键阶段（正向传递、反向传递和参数更新）：
- en: '[PRE6]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
