  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 3：为 MNIST 实现一个简单的神经网络**'
- en: 'Let’s define a simple FeedForward neural network for our experimentation:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们为我们的实验定义一个简单的前馈神经网络：
- en: '[PRE5]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
