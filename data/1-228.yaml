  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分析 1：无优化训练周期（基线）
- en: 'Configuration with sequential data loading (`num_workers=0`, `pin_memory=False`):'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 顺序数据加载的配置 (`num_workers=0`, `pin_memory=False`)：
- en: '[PRE7]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Expected Result (baseline scenario):'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 预期结果（基线场景）：
- en: '[PRE8]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Analysis 2: Training loop with optimization with workers'
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分析 2：带有工作进程的优化训练循环
- en: 'We introduce parallelism in data loading with `num_workers=8`:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过 `num_workers=8` 引入数据加载的并行性：
- en: '[PRE9]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Expected result (workers scenario):'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 预期结果（工作进程场景）：
- en: '[PRE10]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Analysis 3: Training loop with optimization: Worker + Pin Memory'
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分析 3：带有优化和 Pin Memory 的训练循环
- en: 'We add `pin_memory=True` in the `DataLoader` and `non_blocking=True` in the `train`
    function for asynchronous transfer:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在 `DataLoader` 中添加 `pin_memory=True`，在 `train` 函数中添加 `non_blocking=True` 以实现异步传输。
- en: '[PRE11]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
