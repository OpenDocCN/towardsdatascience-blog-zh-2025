- en: How to Improve the Efficiency of Your PyTorch Training Loop
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何提高 PyTorch 训练循环的效率
- en: 原文：[https://towardsdatascience.com/improve-efficiency-of-your-pytorch-training-loop/](https://towardsdatascience.com/improve-efficiency-of-your-pytorch-training-loop/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/improve-efficiency-of-your-pytorch-training-loop/](https://towardsdatascience.com/improve-efficiency-of-your-pytorch-training-loop/)
- en: '<mdspan datatext="el1759174926840" class="mdspan-comment">Training deep learning</mdspan>
    models isn’t just about submitting data to the backpropagation algorithm. Often, **the
    key factor determining the success or failure of a project lies in a less celebrated
    but absolutely crucial area: the efficiency of the data pipeline**.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759174926840" class="mdspan-comment">训练深度学习</mdspan>模型不仅仅是将数据提交给反向传播算法。通常，**决定项目成功或失败的关键因素在于一个不太引人注目但绝对关键的领域：数据管道的效率**。
- en: An inefficient training infrastructure wastes time, resources, and money, leaving
    the graphics processing units (GPUs) idle, a phenomenon known as *GPU starvation*.
    This inefficiency not only delays development but also increases operating costs,
    whether on cloud or on-premise infrastructure.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 效率低下的训练基础设施浪费时间、资源和金钱，导致图形处理单元（GPU）空闲，这种现象称为 *GPU 饥饿*。这种低效不仅延迟了开发，还增加了运营成本，无论是在云基础设施还是在本地基础设施上。
- en: This article is intended as a practical and fundamental guide to identifying
    and resolving the most common bottlenecks in the PyTorch training cycle.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本文旨在作为识别和解决 PyTorch 训练周期中最常见瓶颈的实用和基本指南。
- en: The analysis will focus on data management, the heart of every training loop,
    and will demonstrate how targeted optimization can unlock the full potential of
    the hardware, from theoretical aspects to practical experimentation.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 分析将集中在数据管理上，这是每个训练循环的核心，并将展示如何通过有针对性的优化释放硬件的潜力，从理论方面到实际实验。
- en: 'In summary, by reading this article you will learn:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，通过阅读这篇文章，你将学到：
- en: '****Common bottlenecks that slow down the development and training of a neural
    network****'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '****减缓神经网络开发和训练的常见瓶颈****'
- en: '****Fundamental principles for optimizing the training loop in PyTorch****'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '****在 PyTorch 中优化训练循环的基本原则****'
- en: '****Parallelism and memory management in training****'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '****训练中的并行性和内存管理****'
- en: '* * *'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Motivations for training optimization
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练优化的动机
- en: Improving the training of deep learning models is a strategic necessity- it
    directly translates into significant savings in both cost and computation time.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 提高深度学习模型的训练效率是一项战略性的必要措施——它直接转化为成本和计算时间的显著节省。
- en: 'Faster training allows:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 更快的训练允许：
- en: faster testing cycles
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更快的测试周期
- en: validation of new ideas
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 新想法的验证
- en: exploring different architectures and refining hyperparameters
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索不同的架构和微调超参数
- en: This accelerates the model lifecycle, enabling organizations to innovate and
    bring their solutions to market more quickly.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这加速了模型的生命周期，使组织能够更快地进行创新并将解决方案推向市场。
- en: For example, training optimization allows a company to quickly analyze large
    volumes of data to identify trends and patterns, a critical task for pattern recognition
    or predictive maintenance in manufacturing.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，训练优化允许公司快速分析大量数据以识别趋势和模式，这对于制造中的模式识别或预测性维护是一项关键任务。
- en: Analysis of the most common bottlenecks
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最常见瓶颈的分析
- en: Slowdowns often manifest themselves in a complex interaction between the CPU,
    GPU, memory, and storage devices.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 减缓通常表现为 CPU、GPU、内存和存储设备之间的复杂交互。
- en: 'Here are the main bottlenecks that can slow down the training of a neural network:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这里列出了可能导致神经网络训练变慢的主要瓶颈：
- en: '**I/O and Data:** The main problem is **GPU starvation**, where the GPU sits
    idle waiting for the CPU to load and preprocess the next batch of data. This is
    common with large data sets that cannot be fully loaded into RAM. Disk speed is
    crucial: NVMe SSDs can be up to 35 times faster than traditional HDDs.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**I/O 和数据：** 主要问题是 **GPU 饥饿**，即 GPU 空闲等待 CPU 加载和预处理下一批数据。这在无法完全加载到 RAM 的大型数据集中很常见。磁盘速度至关重要：NVMe
    SSD 的速度可以比传统 HDD 快 35 倍。'
- en: '**GPU:** Occurs when the GPU is saturated (a computationally heavy model) or,
    more often, underutilized due to a lack of data supplied by the CPU. GPUs, with
    their numerous low-speed cores, are optimized for parallel processing, unlike
    CPUs which excel at sequential processing.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GPU:** 当 GPU 过载（计算密集型模型）或更常见的是，由于 CPU 提供的数据不足而未充分利用时发生。与擅长顺序处理的 CPU 不同，GPU
    具有众多低速核心，优化了并行处理。'
- en: '**Memory:** Memory exhaustion, often manifested as the infamous `RuntimeError:
    CUDA out of memory`, forces a reduction in batch size. The gradient stacking technique
    can simulate a larger batch size, but it does not increase throughput.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存**：内存耗尽，通常表现为著名的`RuntimeError: CUDA out of memory`错误，迫使减少批大小。梯度堆叠技术可以模拟更大的批大小，但它不会增加吞吐量。'
- en: Why are CPU and I/O often the main limitations?
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么CPU和I/O经常是主要限制？
- en: A key aspect of optimization is understanding the “cascading bottleneck.”
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 优化的一个关键方面是理解“级联瓶颈”。
- en: In a typical training system, the GPU is the computational engine, while the
    CPU is responsible for data preparation. *If the disk is slow, the CPU spends
    most of its time waiting for data*, becoming the primary bottleneck. Consequently,
    the GPU, having no data to process, remains idle.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在典型的训练系统中，GPU是计算引擎，而CPU负责数据准备。如果磁盘速度慢，CPU大部分时间都在等待数据，成为主要的瓶颈。因此，没有数据处理的GPU保持空闲。
- en: This behavior leads to the mistaken belief that the problem lies with the GPU
    hardware, **when in fact the inefficiency lies in the data supply chain**. Increasing
    GPU processing power without addressing the upstream bottleneck is a waste of
    time, as training performance will never outpace the slowest component in the
    system. Therefore, the first step to effective optimization is to identify and
    address the root problem, which most often lies in I/O or the data pipeline.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这种行为导致了一个错误的信念，即问题出在GPU硬件上，**而实际上不效率的是数据供应链**。在不解决上游瓶颈的情况下增加GPU处理能力是浪费时间，因为训练性能永远不会超过系统中最慢的组件。因此，有效优化的第一步是识别和解决根本问题，这通常在于I/O或数据管道。
- en: Tools and libraries for analysis and optimization
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析和优化的工具和库
- en: 'Effective optimization requires a data-driven approach, not trial and error.
    PyTorch provides tools and primitives designed to diagnose bottlenecks and improve
    the training cycle. Here are the three key ingredients of our experimentation:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的优化需要数据驱动的方法，而不是试错。PyTorch提供了诊断瓶颈并改进训练周期的工具和原语。以下是我们的实验的三个关键要素：
- en: '**Dataset and DataLoader**'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Dataset和Dataloader**'
- en: '**TorchVision**'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TorchVision**'
- en: '**Profiler**'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分析器**'
- en: Dataset and DataLoader in PyTorch
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: PyTorch中的Dataset和Dataloader
- en: Efficient data management is at the heart of any training loop. PyTorch provides
    two fundamental abstractions called [Dataset and Dataloader](https://docs.pytorch.org/tutorials/beginner/basics/data_tutorial.html).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 高效的数据管理是任何训练循环的核心。PyTorch提供了两个基本抽象，称为[Dataset和Dataloader](https://docs.pytorch.org/tutorials/beginner/basics/data_tutorial.html)。
- en: Here’s a quick overview
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个简要概述
- en: '`torch.utils.data.Dataset`'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`torch.utils.data.Dataset`'
- en: This is the base class that represents a set of samples and their labels.
  id: totrans-38
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这是表示一组样本及其标签的基础类。
- en: 'To create a custom dataset, simply implement three methods:'
  id: totrans-39
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 要创建自定义数据集，只需实现三个方法：
- en: '`__init__`: initializes paths or connections to data,'
  id: totrans-40
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__init__`: 初始化路径或数据连接，'
- en: '`__len__`: returns the length of the dataset,'
  id: totrans-41
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__len__`: 返回数据集的长度，'
- en: '`__getitem__`: loads and optionally transforms a single sample.'
  id: totrans-42
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__getitem__`: 加载并可选地转换单个样本。'
- en: '`torch.utils.data.DataLoader`'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`torch.utils.data.DataLoader`'
- en: It’s the interface that wraps the dataset and makes it efficiently iterable.
  id: totrans-44
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 它是包装数据集并使其高效可迭代的接口。
- en: 'It automatically handles:'
  id: totrans-45
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 它自动处理：
- en: batching (`batch_size`),
  id: totrans-46
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批处理（`batch_size`），
- en: reshuffling (`shuffle=True`),
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新洗牌（`shuffle=True`），
- en: parallel loading (`num_workers`),
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并行加载（`num_workers`），
- en: memory management (`pin_memory`)
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内存管理（`pin_memory`）
- en: 'TorchVision: Standard Datasets and Operations for Computer Vision'
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TorchVision：计算机视觉的标准数据集和操作
- en: TorchVision is PyTorch’s domain library for computer vision, designed to accelerate
    prototyping and benchmarking.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: TorchVision是PyTorch的计算机视觉领域库，旨在加速原型设计和基准测试。
- en: 'Its main utilities are:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 它的主要实用工具包括：
- en: '**Predefined datasets**: CIFAR-10, MNIST, ImageNet, and many others, already
    implemented as subclasses of `Dataset`. Perfect for quick testing without having
    to build a custom dataset.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预定义数据集**: CIFAR-10、MNIST、ImageNet等，已作为`Dataset`的子类实现。非常适合快速测试，无需构建自定义数据集。'
- en: '**Common transformations**: scaling, normalization, rotations, data augmentation.
    These operations can be composed with `transforms.Compose`and executed on-the-fly
    during loading, reducing manual preprocessing.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**常见转换**: 缩放、归一化、旋转、数据增强。这些操作可以通过`transforms.Compose`组合，并在加载时即时执行，从而减少手动预处理。'
- en: '**Pre-trained models**: Available for classification, detection, and segmentation
    tasks, useful as baselines or for transfer learning.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预训练模型**：适用于分类、检测和分割任务，可作为基线或用于迁移学习。'
- en: 'Example:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '[PRE0]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'PyTorch Profiler: performance diagnostics tool'
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: PyTorch Profiler：性能诊断工具
- en: The PyTorch Profiler allows you to understand precisely where your execution
    time is being spent, both on the CPU and GPU.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch Profiler允许您精确了解您的执行时间在CPU和GPU上的具体花费。
- en: 'Key Features:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 关键特性：
- en: Detailed analysis of CUDA operators and kernels.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CUDA操作符和内核的详细分析。
- en: Multi-device support (CPU/GPU).
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多设备支持（CPU/GPU）。
- en: Export results in `.json`interactive format or visualization with TensorBoard.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以`.json`交互格式导出结果或使用TensorBoard进行可视化。
- en: 'Example:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '[PRE1]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Construction and analysis of the training cycle
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练周期的构建和分析
- en: 'A training loop in PyTorch is an iterative process that, for each batch of
    data, repeats a sequence of essential steps to teach the network three fundamental
    phases:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch中的训练循环是一个迭代过程，对于每一批数据，重复一系列基本步骤来教会网络三个基本阶段：
- en: '**Forward Pass:** The model computes predictions from the input batch. PyTorch
    dynamically builds the computational graph (`autograd`) at this stage to keep
    track of the operations and prepare for the gradient computation.'
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**正向传播**：模型从输入批次计算预测。PyTorch在此阶段动态构建计算图（`autograd`），以跟踪操作并为梯度计算做准备。'
- en: '**Backward Pass:** Backpropagation calculates the gradients of the loss function
    with respect to all model parameters, using the chain rule. This process is triggered
    by calling `loss.backward()`. **Before** each backward pass, we must reset the
    gradients with `optimizer.zero_grad()`, since PyTorch accumulates them by default.'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**反向传播**：反向传播计算损失函数相对于所有模型参数的梯度，使用链式法则。此过程通过调用`loss.backward()`触发。**在**每次反向传播之前，我们必须使用`optimizer.zero_grad()`重置梯度，因为PyTorch默认会累积它们。'
- en: '**Updating weights:** The optimizer (`torch.optim`) uses the computed gradients
    to update the model weights, minimizing the loss. The call to `optimizer.step()`performs
    this final update for the current batch.'
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**更新权重**：优化器（`torch.optim`）使用计算出的梯度来更新模型权重，最小化损失。调用`optimizer.step()`执行当前批次的最终更新。'
- en: Slowdowns can arise at various points in the cycle. If the batch load from `DataLoader`is
    slow, the GPU remains idle. If the model is computationally heavy, the GPU is
    saturated. Data transfers between the CPU and GPU are another potential source
    of inefficiency, visible as long execution times for `cudaMemcpyAsync`profiler
    operations.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 周期中可能出现各种减速点。如果从`DataLoader`加载批次较慢，GPU将保持空闲。如果模型计算量很大，GPU将饱和。CPU和GPU之间的数据传输是另一个潜在的效率低下来源，表现为`cudaMemcpyAsync`分析操作的长执行时间。
- en: The training bottleneck is almost never the GPU, **but the inefficiency in the
    data pipeline that leads to its downtime**.
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 训练瓶颈几乎永远不会是GPU，**而是导致其停机时间的数据管道中的低效**。
- en: The primary goal is to ensure that the GPU is never starved, maintaining a constant
    supply of data.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 主要目标是确保GPU永远不会饿死，保持数据供应的恒定。
- en: The optimization exploits the contrast between the CPU (good for I/O and sequential
    processing) and GPU (excellent for parallel computing) architectures. If the dataset
    is too large for RAM, a Python-based *generator* can become a significant barrier
    to training complex models.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 优化利用了CPU（适用于I/O和顺序处理）和GPU（适用于并行计算）架构之间的对比。如果数据集太大而无法放入RAM，基于Python的*生成器*可能成为训练复杂模型的一个重大障碍。
- en: 'An example might be a training loop where when the GPU is running, the CPU
    is idle, and when the CPU is running, the GPU is idle, as shown below:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 一个例子可能是一个训练循环，其中当GPU运行时，CPU处于空闲状态，而当CPU运行时，GPU处于空闲状态，如下所示：
- en: '![](../Images/15a8f572f1e7f19eccbef3a2a2d23aed.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/15a8f572f1e7f19eccbef3a2a2d23aed.png)'
- en: The image depicts a classic case of inefficient data management. Image by author.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 该图像描绘了一个经典的不高效数据管理案例。图片由作者提供。
- en: Batch management between CPU and GPU
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CPU和GPU之间的批处理管理
- en: 'The optimization process is based on the concept of **overlap**: the `DataLoader`,
    using multiple workers (`num_workers > 0`), prepares the next batch in parallel
    (on the CPU) while the GPU processes the current one.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 优化过程基于**重叠**的概念：`DataLoader`使用多个工作者（`num_workers > 0`），在CPU上并行准备下一个批次，同时GPU处理当前的批次。
- en: Optimizing the `DataLoader`ensures that the CPU and GPU work asynchronously
    and concurrently. If the preprocessing time of a batch is approximately equal
    to the GPU computation time, the training process can theoretically double in
    speed.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 优化`DataLoader`确保CPU和GPU异步并发工作。如果一批次的预处理时间大约等于GPU的计算时间，理论上可以将训练过程的速度提高一倍。
- en: This preloading behavior can be controlled via DataLoader’s `prefetch_factor`
    parameter, which determines the number of batches preloaded by each worker.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这种预加载行为可以通过DataLoader的`prefetch_factor`参数进行控制，该参数确定每个工作者预加载的批次数量。
- en: Methodologies for diagnosing bottlenecks
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 诊断瓶颈的方法
- en: 'Using PyTorch Profiler helps a great deal for transforming the optimization
    process into a data-driven diagnosis. By analyzing elapsed time metrics, you can
    identify the root cause of inefficiency:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 使用PyTorch Profiler有助于将优化过程转化为数据驱动的诊断。通过分析已过时间指标，您可以识别效率低下的根本原因：
- en: '| Symptom detected by the Profiler | Diagnosis (Bottleneck) | Recommended solution
    |'
  id: totrans-84
  prefs: []
  type: TYPE_TB
  zh: '| Profiler检测到的症状 | 诊断（瓶颈） | 推荐的解决方案 |'
- en: '| --- | --- | --- |'
  id: totrans-85
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| High `Self CPU total %`for`DataLoader` | Slow pre-processing and/or data
    loading on the CPU side | Increase`num_workers` |'
  id: totrans-86
  prefs: []
  type: TYPE_TB
  zh: '| `DataLoader`的`Self CPU total %`高 | CPU侧的预处理和数据加载缓慢 | 增加`num_workers` |'
- en: '| High execution time for`cudaMemcpyAsync` | Slow data transfer between CPU
    and GPU memory | Enable `pin_memory=True` |'
  id: totrans-87
  prefs: []
  type: TYPE_TB
  zh: '| `cudaMemcpyAsync`执行时间高 | CPU和GPU内存之间的数据传输缓慢 | 启用`pin_memory=True` |'
- en: Data loading optimization techniques
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据加载优化技术
- en: The two most effective techniques implemented in `DataLoader`PyTorch are worker
    parallelism and the use of locked memory (`pinned_memory`).
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在`DataLoader`中，PyTorch实现的最有效技术是工作者并行和锁定内存（`pinned_memory`）的使用。
- en: Parallelism with workers
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用工作者实现并行
- en: The `num_workers` parameter in `DataLoader`**enables multiprocessing, creating
    subprocesses that load and preprocess data in parallel**. This significantly increases
    data loading throughput, effectively overlapping training and preparation for
    the next batch.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '`DataLoader`中的`num_workers`参数**启用多进程，创建子进程并行加载和预处理数据**。这显著提高了数据加载吞吐量，有效地重叠了训练和下一批次的准备。'
- en: '**Benefits:** Reduces GPU wait time, especially with large datasets or complex
    preprocessing (e.g. image transformations).'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**好处：** 减少GPU等待时间，尤其是在处理大型数据集或复杂的预处理（例如图像转换）时。'
- en: '**Best Practice:** Start debugging with `num_workers=0` and gradually increase,
    monitoring performance. Common heuristics suggest `num_workers = 4 * num_GPU`.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最佳实践：** 从`num_workers=0`开始调试，并逐步增加，监控性能。常见的启发式方法建议`num_workers = 4 * num_GPU`。'
- en: '**Warning:** Too many workers increases RAM consumption and can cause contention
    for CPU resources, slowing down the entire system.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**警告：** 工作人员过多会增加RAM消耗，并可能导致CPU资源竞争，从而降低整个系统的性能。'
- en: Memory Pins to Speed ​​Up CPU-GPU Transfers
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过内存锁定加速CPU-GPU传输
- en: Setting `pin_memory=True` in the `DataLoader` allocates a special **“locked
    memory”** (`page-locked memory`) on the CPU.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在`DataLoader`中将`pin_memory=True`设置为在CPU上分配特殊的**“锁定内存”**（`page-locked memory`）。
- en: '**Mechanism:** This memory cannot be swapped to disk by the operating system.
    This allows for asynchronous, direct transfers from the CPU to the GPU, avoiding
    an additional intermediate copy and reducing idle time.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机制：** 操作系统无法将此内存交换到磁盘。这允许从CPU到GPU的异步、直接传输，避免额外的中间复制并减少空闲时间。'
- en: '**Benefits:** Accelerates data transfers to the CUDA device, allowing the GPU
    to process and receive data simultaneously.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**好处：** 加速数据传输到CUDA设备，允许GPU同时处理和接收数据。'
- en: '**When not to use it:** If you are not using a GPU, `pin_memory=True` offers
    no benefit and only consumes additional non- *pageable* RAM. On systems with limited
    RAM, it may put unnecessary pressure on physical memory.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不适用的情况：** 如果您没有使用GPU，`pin_memory=True`不会带来任何好处，只会消耗额外的非*可分页* RAM。在RAM有限的系统上，可能会对物理内存造成不必要的压力。'
- en: Practical implementation and benchmarking
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际实施和基准测试
- en: At this point we enter the phase of experimenting with approaches to optimize
    PyTorch model training, comparing the standard training loop with advanced data
    loading techniques.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 到此为止，我们进入了实验优化PyTorch模型训练方法的阶段，比较标准训练循环与高级数据加载技术。
- en: To demonstrate the effectiveness of the discussed methodologies, we consider
    an experimental setup involving a FeedForward neural network on a standard [MNIST dataset](https://keras.io/api/datasets/mnist/) .
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示所讨论方法的有效性，我们考虑了一个包含标准 [MNIST 数据集](https://keras.io/api/datasets/mnist/)
    的前馈神经网络的实验设置。
- en: '**Optimization techniques covered:**'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**覆盖的优化技术：**'
- en: '**Standard training (Baseline):** Basic training cycle in PyTorch (`num_workers=0,
    pin_memory=False`).'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标准训练（基线）：** PyTorch 中的基本训练周期 (`num_workers=0, pin_memory=False`)。'
- en: '**Multi-worker data loading:** parallel data loading with multiple processes
    (`num_workers=N`).'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多工作进程数据加载：** 使用多个进程的并行数据加载 (`num_workers=N`)。'
- en: '**Pinned Memory + Non-blocking Transfer:** Optimization of GPU memory and CPU–GPU
    transfers (`pin_memory=True`and `non_blocking=True`).'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Pinned Memory + 非阻塞传输：** GPU 内存和 CPU-GPU 传输的优化 (`pin_memory=True` 和 `non_blocking=True`)。'
- en: '**Performance analysis:** comparison of execution times and best practices.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能分析：** 执行时间和最佳实践的对比。'
- en: Setting up the testing environment
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置测试环境
- en: '**STEP 1: Import the libraries**'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1：导入库**'
- en: 'The first step is to import all the necessary libraries and verify the hardware
    configuration:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是导入所有必要的库并验证硬件配置：
- en: '[PRE2]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
