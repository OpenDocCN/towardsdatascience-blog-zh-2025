  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 2：数据集分析和加载**'
- en: The MNIST dataset is a fundamental benchmark, consisting of 70,000 28×28 grayscale
    images. Data normalization is crucial for training efficiency.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST 数据集是一个基本基准，包含 70,000 个 28×28 灰度图像。数据归一化对于训练效率至关重要。
- en: 'Let’s define the function for loading the dataset:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义用于加载数据集的函数：
