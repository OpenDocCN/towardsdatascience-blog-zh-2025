- en: The Math You Need to Pan and Tilt 360° Images
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 需要的数学知识来旋转和倾斜360度图像
- en: 原文：[https://towardsdatascience.com/math-to-tilt-pan-360-images/](https://towardsdatascience.com/math-to-tilt-pan-360-images/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/math-to-tilt-pan-360-images/](https://towardsdatascience.com/math-to-tilt-pan-360-images/)
- en: 0\. <mdspan datatext="el1756149509948" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 0. <mdspan datatext="el1756149509948" class="mdspan-comment">简介</mdspan>
- en: You’re certainly already familiar with spherical or 360 images. They’re used
    in Google Street View or in virtual house tours to give you an immersive feeling
    by letting you look around in any direction.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你肯定已经熟悉球形或360度图像了。它们用于Google街景或虚拟房屋游览，通过让你在任何方向上环顾四周，给你带来沉浸式的体验。
- en: 'Since such images lie on the unit sphere, storing them in memory as flat images
    might be tricky. In practice, we usually store them as flat arrays using one of
    the two following formats:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 由于此类图像位于单位球体上，将它们作为平面图像存储在内存中可能很棘手。在实践中，我们通常使用以下两种格式之一将它们存储为平面数组：
- en: '**Cubemap (6 images)**: each image corresponds to the face of a cube onto which
    the unit sphere has been projected.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**立方体贴图（6个图像）**：每个图像对应于单位球体投影到其上的立方体的一个面。'
- en: '**Equirectangular image**: similar to a planisphere map of the Earth. The south
    and north poles of the unit sphere are stretched to flatten the image onto a regular
    grid. Unlike the cubemap, the image is stored as a single image which simplifies
    the boundary handling during image processing. But this approach introduces significant
    distortion.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**等经线图像**：类似于地球的平面地图。单位球体的南半球和北半球被拉伸以将图像展平到规则的网格上。与立方体贴图不同，图像存储为单个图像，这简化了图像处理过程中的边界处理。但这种方法引入了显著的失真。'
- en: '![](../Images/9aea9200037a12d4714adecc9a05d974.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9aea9200037a12d4714adecc9a05d974.png)'
- en: 6 images of the cubemap with annotated faces — Figure by the author, from [Understanding
    360 Images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 带有标注面的立方体贴图6个图像 — 图表由作者提供，来自[理解360度图像](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
- en: '![](../Images/6ddead080becfb5d367b775b57ffcc1b.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6ddead080becfb5d367b775b57ffcc1b.png)'
- en: Equirectangular view of the cubemap with annotated faces — Figure by the author,
    from [Understanding 360 Images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 带有标注面的立方体贴图的等经线视图 — 图表由作者提供，来自[理解360度图像](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
- en: In a previous article ([Understanding 360 images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)),
    I explained the math behind the conversion between these two formats. In this
    article we’ll focus instead only on the equirectangular format and investigate
    the math behind modifying the camera pose of an equirectangular image.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在之前的一篇文章中（[理解360度图像](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)），我解释了这两种格式之间转换背后的数学原理。在这篇文章中，我们将专注于等经线格式，并调查修改等经线图像相机姿态背后的数学。
- en: It’s a great opportunity to better understand spherical coordinates, rotation
    matrices and image remapping!
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个更好地理解球坐标、旋转矩阵和图像重映射的绝佳机会！
- en: The images below illustrate the kind of transform we’d like to apply.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图像说明了我们想要应用的转换类型。
- en: “What would my 360 image look like if it were tilted 20° downwards?”
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “如果我的360度图像向下倾斜20°，它会是什么样子？”
- en: '![](../Images/ad36e6b60dce398ff310c8737aea4de3.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ad36e6b60dce398ff310c8737aea4de3.png)'
- en: 360 image of the cubemap with annotated faces, tilted 20° downwards — Image
    by the author
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 立方体贴图360度图像的360度图像，带有标注的面，向下倾斜20° — 图像由作者提供
- en: “What would my 360 image look like if it were shifted 45° to the right?”
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “如果我的360度图像向右移动45°，它会是什么样子？”
- en: '![](../Images/d4871c4b7397ad26f526566297435812.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4871c4b7397ad26f526566297435812.png)'
- en: 360 image of the cubemap with annotated faces, shifted 45° to the right — Image
    by the author
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 立方体贴图360度图像的360度图像，向右移动45° — 图像由作者提供
- en: “What would my 360 image look like if it were shifted 45° to the right and tilted
    20° downwards?”
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “如果我的360度图像向右移动45°并向下倾斜20°，它会是什么样子？”
- en: '![](../Images/837ff19b1018e71f6ad6a1b851166079.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/837ff19b1018e71f6ad6a1b851166079.png)'
- en: 360 image of the cubemap with annotated faces, shifted 45° to the right and
    tilted 20° downwards — Image by the author
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 立方体贴图360度图像的360度图像，向右移动45°并向下倾斜20° — 图像由作者提供
- en: N.B. The most widely used image coordinates system is to have the vertical Y
    axis pointing downwards in the image and the horizontal X axis pointing to the
    right. Thus, I find it more intuitive that a positive horizontal Δθ shift moves
    the image to the right, while a negative Δθ moves it to the left. However this
    counterintuitively implies that moving the image to the right corresponds to looking
    left in the actual scene! Similarly a positive vertical Δφ tilt moves the image
    upwards. The choice of convention is arbitrary, it doesn’t really matter.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：最广泛使用的图像坐标系系统是将图像中的垂直Y轴指向下方，水平X轴指向右侧。因此，我发现一个正的横向Δθ移动将图像向右移动，而一个负的Δθ将图像向左移动，这更直观。然而，这反直觉地意味着将图像向右移动对应于在场景中向左看！同样，一个正的纵向Δφ倾斜将图像向上移动。约定的选择是随意的，实际上并不重要。
- en: '* * *'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '![](../Images/66ccb13476cc8fb93d6dc95465cf9306.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/66ccb13476cc8fb93d6dc95465cf9306.png)'
- en: Photo by Grillot Edouard on [Unsplash](https://unsplash.com/photos/a-spiral-staircase-in-a-building-with-people-walking-down-it-uX4ikaLXYtE)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 由Grillot Edouard在[Unsplash](https://unsplash.com/photos/a-spiral-staircase-in-a-building-with-people-walking-down-it-uX4ikaLXYtE)拍摄的照片
- en: 1\. Spherical Camera Model
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 球形相机模型
- en: Spherical coordinates
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 球坐标
- en: On a planisphere map of the Earth, horizontal lines correspond to latitudes
    while vertical lines correspond to longitudes.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在地球的平面图上，水平线对应纬度，而垂直线对应经度。
- en: When converting from cartesian to spherical coordinates, a point M in the scene
    is fully described by its radius r and its two angles θ and φ. These angles allow
    us to unwrap the sphere into an equirectangular image, where θ serves as the longitude
    and φ as the latitude.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 当从笛卡尔坐标转换为球坐标时，场景中的点M完全由其半径r和两个角度θ和φ描述。这些角度允许我们将球面展开成等角图像，其中θ作为经度，φ作为纬度。
- en: '![](../Images/27b38c6a402d3779b6820a025f2a4bd9.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/27b38c6a402d3779b6820a025f2a4bd9.png)'
- en: Spherical coordinates with Theta around the Y axis and Phi around the X axis
    — Figure by the author, from [Understanding 360 Images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 球坐标，Theta绕Y轴旋转，Phi绕X轴旋转—— 图表由作者绘制，来自[理解360度图像](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
- en: I’ve **arbitrarily** chosen to use the ***Right_Down_Front*** XYZ camera convention
    (See [my previous article](https://medium.com/check-visit-computer-vision/converting-camera-poses-from-opencv-to-opengl-can-be-easy-27ff6c413bdb)
    about camera poses) and to have **θ=φ=0** in front of us. Feel free to use another
    convention. You get the same image at the end anyway. I just find it more convenient.
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我**随意**选择了使用***Right_Down_Front*** XYZ相机约定（参见[我之前的文章](https://medium.com/check-visit-computer-vision/converting-camera-poses-from-opencv-to-opengl-can-be-easy-27ff6c413bdb)关于相机姿态），并且在我们面前将**θ=φ=0**。您可以使用其他约定。无论如何，最终您都会得到相同的图像。我只是觉得这种方法更方便。
- en: The image below illustrates the convention we’re using, with θ varying horizontally
    on the equirectangular image from -π on the left, 0 at the center and +π on the
    right. Note that the left and right edges of the image smoothly extend each other.
    As for φ, the north pole is at -π/2 and the south pole is at π/2.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图像说明了我们使用的约定，其中θ在等角图像上水平变化，从左边的-π，中心为0，到右边的+π。请注意，图像的左右边缘平滑地延伸。至于φ，北极在-π/2，南极在π/2。
- en: '![](../Images/2ce024df58d11bb77dedd3587fb6ccb9.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2ce024df58d11bb77dedd3587fb6ccb9.png)'
- en: θ (longitude) and φ (latitude) — Figure by the author, from [Understanding 360
    Images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: θ（经度）和φ（纬度）—— 图表由作者绘制，来自[理解360度图像](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
- en: Mapping to pixel coordinates is then just an affine transform.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 将映射到像素坐标只是一个仿射变换。
- en: '![](../Images/cf0faa5ce80f0576044938b1b88c36d8.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cf0faa5ce80f0576044938b1b88c36d8.png)'
- en: Rotation Matrices
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 旋转矩阵
- en: When working with 3D rotations it can quickly get messy without using matrix
    form. Rotation matrices provide a convenient way to express rotations as plain
    matrix-vector multiplications.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理3D旋转时，如果不使用矩阵形式，很快就会变得混乱。旋转矩阵提供了一种方便的方式来表示旋转，作为简单的矩阵-向量乘法。
- en: In our ***Right_Down_Front*** XYZ camera convention (arbitrarily chosen), the
    rotation of angle φ around the X axis is described by the matrix below.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的***Right_Down_Front*** XYZ相机约定（随意选择）中，围绕X轴的φ角度旋转由下面的矩阵描述。
- en: '![](../Images/dea5843d48f2e16e28ca19ee682c0687.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dea5843d48f2e16e28ca19ee682c0687.png)'
- en: As you can see, this matrix leaves the X-axis unchanged since it’s its rotation
    axis.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，这个矩阵没有改变X轴，因为它是其旋转轴。
- en: Having cosines along the diagonal makes sense because φ=0 must yield the identity
    matrix.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 沿对角线有余弦是有意义的，因为φ=0必须产生单位矩阵。
- en: 'As for the sign before the sines, I find it helpful to refer to the spherical
    coordinates diagram above and think about what would happen for a tiny positive
    φ. The point directly in front of the camera is (0,0,1), i.e. the tip of the front
    axis Z, and will thus be rotated into the last column of Rφ: (0, sinφ, cosφ).
    This gives us a vector close to Z but also with a tiny positive component along
    the Y axis, exactly as expected!'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 至于正弦前的符号，我发现参考上面的球坐标图并思考一个很小的正φ会发生什么是有帮助的。相机正前方的点是(0,0,1)，即Z轴的前端，因此将被旋转到Rφ的最后一列：(0,
    sinφ, cosφ)。这给我们一个接近Z的向量，但也沿着Y轴有一个很小的正分量，这正是我们期望的！
- en: Similarly, we have the matrix describing the rotation of angle θ around the
    Y axis.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们有一个描述围绕Y轴旋转角度θ的矩阵。
- en: '![](../Images/6e60ac4b128167b5992bb176d72f9ef7.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6e60ac4b128167b5992bb176d72f9ef7.png)'
- en: Conversion between cartesian and spherical coordinates
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 笛卡尔坐标和球坐标之间的转换
- en: The point M with spherical coordinates (φ,θ) can be converted to 3D cartesian
    coordinates p by starting from the point (0,0,1) in front of the camera, tilting
    it by φ around the X axis and finally panning it by θ around the Y axis.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 具有球坐标(φ,θ)的点M可以通过从相机前的(0,0,1)点开始，绕X轴倾斜φ，最后绕Y轴平移θ来转换为3D笛卡尔坐标p。
- en: '![](../Images/27b38c6a402d3779b6820a025f2a4bd9.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/27b38c6a402d3779b6820a025f2a4bd9.png)'
- en: Spherical coordinates with Theta around the Y axis and Phi around the X axis
    — Figure by the author, from [Understanding 360 Images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 以Y轴为Theta，X轴为Phi的球坐标——作者提供的图，来自[理解360度图像](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
- en: The equations below derive the cartesian coordinates by successively applying
    the rotation matrices on (0,0,1). The radius r has been omitted since we’re only
    interested in the unit sphere.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的方程通过依次应用旋转矩阵在(0,0,1)上推导出笛卡尔坐标。半径r已被省略，因为我们只对单位球感兴趣。
- en: '![](../Images/5763907cbaeca64c95d22040226c124d.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5763907cbaeca64c95d22040226c124d.png)'
- en: To recover the spherical angles (φ,θ) we simply have to apply the inverse trigonometric
    functions to the components of p. Note that since φ lies in [-π/2,π/2] we know
    that the factor cosφ is guaranteed to remain positive, which allows us to safely
    apply arctan2.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 要恢复球坐标(φ,θ)，我们只需对p的分量应用反三角函数。请注意，由于φ位于[-π/2,π/2]，我们知道因子cosφ保证保持正值，这允许我们安全地应用arctan2。
- en: '![](../Images/7df088e331cfd4195c646f697f4d138e.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7df088e331cfd4195c646f697f4d138e.png)'
- en: '* * *'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: '![](../Images/a5282dec0f451e0cb9e7bfbb73894bfc.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a5282dec0f451e0cb9e7bfbb73894bfc.png)'
- en: Photo by Jakob Owens on [Unsplash](https://unsplash.com/photos/trowed-black-canon-dslr-camera-H6a1mbbXFis)
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Jakob Owens在[Unsplash](https://unsplash.com/photos/trowed-black-canon-dslr-camera-H6a1mbbXFis)拍摄
- en: 2\. Tilt/Pan 360 image
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 倾斜/平移360度图像
- en: Image remapping
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图像重映射
- en: 'Our goal is to transform an equirectangular image into another equirectangular
    image, that mimics a (Δφ, Δθ) angular shift. In [Understanding 360 images](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)
    I explained how to transform between equirectangular images and cubemaps. Fundamentally
    it’s the same process: a sampling task where we apply a transform to existing
    pixels to generate new pixels.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是将一个等经线图像转换成另一个等经线图像，模拟一个(Δφ, Δθ)角度偏移。在[理解360度图像](https://medium.com/check-visit-computer-vision/understanding-360-images-8e0fcf0ee861)中，我解释了如何将等经线图像和立方体贴图之间的转换。从根本上讲，这是一个采样任务，其中我们应用一个转换到现有的像素以生成新的像素。
- en: Since the transform can produce floating-point coordinates we have to use interpolation
    rather than just moving integer pixels.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 由于转换可以产生浮点坐标，我们必须使用插值而不是仅仅移动整数像素。
- en: It may sound counter-intuitive, but when remapping an image we actually need
    the reverse transform and not the transform itself. The determinant of the Jacobian
    of the transform defines how local density changes, which means there won’t always
    be a one-to-one correspondence between input and output pixels. If we were to
    apply the transform to each of the input pixels to populate the new image we could
    end up with huge holes in the transformed image because of density variations.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然听起来有些反直觉，但在重新映射图像时，我们实际上需要反向变换，而不是变换本身。变换的雅可比行列式的行列式定义了局部密度的变化，这意味着输入和输出像素之间不一定总是一一对应。如果我们将变换应用于每个输入像素以填充新图像，由于密度变化，我们可能会在变换后的图像中产生巨大的空洞。
- en: Thus we need to define the reverse transform, so that we can iterate over each
    output pixel coordinates, map them back to the input image and interpolate its
    color from the neighboring pixels.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们需要定义反向变换，以便我们可以迭代每个输出像素坐标，将它们映射回输入图像，并从相邻像素插值其颜色。
- en: Transition Matrix
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 转换矩阵
- en: 'We have two 3D coordinates systems:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有两个三维坐标系：
- en: '**Frame 0**: Input 360 image'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**帧0**：输入360度图像'
- en: '**Frame 1**: Output 360 image transformed by (Δφ, Δθ)'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**帧1**：通过（Δφ, Δθ）变换的输出360度图像'
- en: Each frame can define locally its own spherical angles.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 每个帧都可以定义其局部的球面角度。
- en: '![](../Images/362c906696c39e4bcb97e5bad47f0a96.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/362c906696c39e4bcb97e5bad47f0a96.png)'
- en: We’re now looking for the 3×3 transition matrix between both frames.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在正在寻找两个帧之间的3×3转换矩阵。
- en: The transition is defined by the fact that we want the center of the input image
    0 to be mapped to the point at (Δφ, Δθ) in the output image 1.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 转换是由以下事实定义的：我们希望输入图像0的中心映射到输出图像1中的点（Δφ, Δθ）。
- en: '![](../Images/e5d5b6f0357096ecf85bd109b63018f5.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e5d5b6f0357096ecf85bd109b63018f5.png)'
- en: 'It turns out that it’s precisely what we already do in the spherical coordinates
    system: mapping the point at (0,0,1) to given spherical angles. Thus we end up
    with the following transform.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，这正是我们在球坐标系统中已经做的事情：将点（0,0,1）映射到给定的球面角度。因此，我们最终得到以下变换。
- en: '![](../Images/fbe8965f7bd60d83640a8aac6f5ea77c.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fbe8965f7bd60d83640a8aac6f5ea77c.png)'
- en: 'The reverse transform is then:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 反向变换如下：
- en: '![](../Images/c7ffc6a8f6c5d339e809ec4b1a38bfd7.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c7ffc6a8f6c5d339e809ec4b1a38bfd7.png)'
- en: 'Warning: Rotation matrices generally don’t commute when their rotation axes
    differ. Order matters!'
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 警告：当旋转轴不同时，旋转矩阵通常不交换。顺序很重要！
- en: This directly gives us the pose of the transformed camera. In fact, you can
    replace p1 by any base axis of frame 1 (1,0,0), (0,1,0) and (0,0,1) and look at
    where it lands in frame 0.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这直接给出了变换后相机的姿态。实际上，你可以用1号帧的任何基轴（1,0,0）、（0,1,0）和（0,0,1）来替换p1，并观察它在0号帧中的位置。
- en: 'Thus, the camera is first panned by -Δθ and then tilted by -Δφ. This is exactly
    what you would do intuitively with your camera: orient yourself towards the target
    and then adjust the tilt. Reversing the order would result in a skewed or rolled
    camera orientation.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，相机首先通过-Δθ进行平移，然后通过-Δφ倾斜。这正是你直观上会用相机做的事情：面向目标定位，然后调整倾斜角度。如果颠倒顺序，会导致相机方向倾斜或滚动。
- en: Reverse transform
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 反向变换
- en: Let’s develop the matrix form to end up with a clean closed-form expression
    for the reverse transform yielding angles 0 from angles 1.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们展开矩阵形式，以得到反向变换的干净闭式表达式，从而从角度1得到角度0。
- en: '![](../Images/68cac8e8448f6283d7acc577bd560473.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/68cac8e8448f6283d7acc577bd560473.png)'
- en: First we substitute p1 with its definition to make φ1 and θ1 appear.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将p1用其定义替换，以使φ1和θ1出现。
- en: '![](../Images/e66d3cf25aa4b7854c46b21fa13a5ad0.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e66d3cf25aa4b7854c46b21fa13a5ad0.png)'
- en: It turns out that both rotation matrices around the Y axis end up side-by-side
    and can be merged into a single rotation matrix of angle θ1-Δθ.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，围绕Y轴的两个旋转矩阵最终并排在一起，可以合并成一个角度为θ1-Δθ的单个旋转矩阵。
- en: The right part of the equation corresponds to a spherical point of coordinates
    (φ1, θ1-Δθ). We substitute it by its explicit form.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 方程的右侧对应于坐标为（φ1, θ1-Δθ）的球面点。我们用其显式形式替换它。
- en: '![](../Images/83e5ad02da05798c2b55e43b8841cf58.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/83e5ad02da05798c2b55e43b8841cf58.png)'
- en: We then substitute the remaining rotation matrix with its explicit form and
    perform the multiplication.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们用其显式形式替换剩余的旋转矩阵并执行乘法。
- en: '![](../Images/85fc3252c9a56b5204afcb2213f1de78.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/85fc3252c9a56b5204afcb2213f1de78.png)'
- en: We finally use inverse trigonometric functions to retrieve (φ0,θ0).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最终使用反正切函数来检索（φ0,θ0）。
- en: '![](../Images/39bba90c08ba082203a84e80036e5090.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/39bba90c08ba082203a84e80036e5090.png)'
- en: Great! We now know where to interpolate within the input image.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了！我们现在知道在输入图像中哪里进行插值。
- en: Code
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码
- en: The code below loads a spherical image, selects arbitrary rotation angles (Δφ,Δθ),
    computes the reverse transform maps and finally applies them using cv2.remap to
    get the output transformed image.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码加载一个球形图像，选择任意的旋转角度(Δφ,Δθ)，计算逆变换映射，并最终使用cv2.remap应用它们以获得输出变换图像。
- en: N.B. <mdspan datatext="el1756149327443" class="mdspan-comment">This code</mdspan>
    is intended for pedagogical purposes. There is still room for performance optimization!
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意事项。以下代码<mdspan datatext="el1756149327443" class="mdspan-comment">用于教学目的。仍有性能优化的空间！
- en: Camera Pan only
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 仅相机平移
- en: What if Δφ=0 and the transform is a pure pan?
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如果Δφ=0且变换是纯平移，会怎样？
- en: When Δφ=0 the rotation matrix becomes the identity and the expression of p0
    simplifies to its canonical form in spherical coordinates (φ1, θ1-Δθ).
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 当Δφ=0时，旋转矩阵变为单位矩阵，p0的表达式简化为球坐标中的规范形式(φ1, θ1-Δθ)。
- en: '![](../Images/e65e30f111778ce1ce8e965abaf487f8.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e65e30f111778ce1ce8e965abaf487f8.png)'
- en: The transform is straightforward and is just a plain subtraction on the θ angle.
    We’re basically simply rolling the image horizontally using a floating-point Δθ
    shift.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 变换很简单，只是在θ角度上进行简单的减法。我们基本上只是在水平方向上使用浮点Δθ位移简单地滚动图像。
- en: '![](../Images/6d1a322462731c6411cfe6de9c6ec2e8.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6d1a322462731c6411cfe6de9c6ec2e8.png)'
- en: Camera Tilt only
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 仅相机倾斜
- en: What if Δθ=0 and the transform is a pure tilt?
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果Δθ=0且变换是纯倾斜，会怎样？
- en: When Δθ=0 the rotation matrix becomes the identity. But unfortunately it doesn’t
    change anything, we’ve just replaced θ1-Δθ by θ1 in the equation, that’s it.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 当Δθ=0时，旋转矩阵变为单位矩阵。但不幸的是，它并没有改变任何东西，我们只是在方程中将θ1-Δθ替换为θ1，就是这样。
- en: '![](../Images/2867f65bba7c0fb2d3f0cfee4360c6b0.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2867f65bba7c0fb2d3f0cfee4360c6b0.png)'
- en: '* * *'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: '![](../Images/8588d526489697792d415b2c739c66c8.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8588d526489697792d415b2c739c66c8.png)'
- en: Photo by Kaitlin Duffey on [Unsplash](https://unsplash.com/photos/crystal-ball-photography-of-building-during-daytime-l1MOcqruH-o)
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由Kaitlin Duffey在[Unsplash](https://unsplash.com/photos/crystal-ball-photography-of-building-during-daytime-l1MOcqruH-o)拍摄
- en: 3\. Behavior at Image Boundaries
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 图像边界的行为
- en: Introduction
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简介
- en: It could be interesting to see how points at boundaries of the input 360 image
    are affected by the transform.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 看看输入360图像边界上的点如何受到变换的影响可能会很有趣。
- en: For instance, the south pole corresponds to φ0=π/2, which significantly simplifies
    the equations with cos(φ0)=0 and sin(φ0)=1\. And we also know that the value of
    θ0 doesn’t matter since each pole is reduced to a single point.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，南极对应于φ0=π/2，这显著简化了方程，因为cos(φ0)=0和sin(φ0)=1。我们还知道θ0的值无关紧要，因为每个极点都简化为一个单点。
- en: Unfortunately, substituting φ0=π/2 into the final reverse transform formula
    derived above gives us a clearly non-trivial equation to solve for (φ1,θ1).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，将φ0=π/2代入上面推导出的最终逆变换公式，给我们一个显然非平凡的方程来求解(φ1,θ1)。
- en: '![](../Images/f3d1edfd3b24b07941eb14df58417d83.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f3d1edfd3b24b07941eb14df58417d83.png)'
- en: Classic mistake! Instead of using the reverse transform formula, it would be
    much simpler to use the forward transform. Let’s derive it.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 经典错误！与其使用逆变换公式，不如使用正向变换简单。让我们推导它。
- en: Direct Transform
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 直接变换
- en: Unlike the reverse transform we can’t merge rotation matrices because pan and
    tilt rotations strictly alternate.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 与逆变换不同，我们无法合并旋转矩阵，因为平移和倾斜旋转严格交替。
- en: '![](../Images/ef07a4b017a75bf99d9671541d8574a6.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ef07a4b017a75bf99d9671541d8574a6.png)'
- en: Let’s use the explicit form of p0 and the rotations matrices Δθ and Δφ. Since
    points (φ0,θ0) at the image boundary greatly simplify the equations thanks to
    their convenient cos(φ0) and sin(φ0) values, I’ve chosen to compute only the product
    of RΔφ and RΔθ to keep substitutions for trivial p0 values straightforward.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用p0的显式形式和旋转矩阵Δθ和Δφ。由于图像边界上的点(φ0,θ0)由于它们方便的cos(φ0)和sin(φ0)值而极大地简化了方程，我选择仅计算RΔφ和RΔθ的乘积，以保持对平凡p0值的替换简单。
- en: '![](../Images/13bcd9140bc31f8072a988f68aab6ed4.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/13bcd9140bc31f8072a988f68aab6ed4.png)'
- en: North/South Poles
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 北/南极
- en: The south pole is defined by φ0=π/2\. We have cos(φ0)=0 and sin(φ0)=1 which
    simplifies the product into simply keeping the second column of the rotation matrix.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 南极由φ0=π/2定义。我们有cos(φ0)=0和sin(φ0)=1，这简化了乘积，只需保留旋转矩阵的第二列。
- en: '![](../Images/83f352d758d45bc7c4bedc6976fafab9.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/83f352d758d45bc7c4bedc6976fafab9.png)'
- en: As expected θ0 doesn’t appear in the expression. Although the poles are infinitely
    stretched at the top/bottom of the spherical image they are still single points
    in 3D space.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，θ0 不出现在表达式中。尽管极点在球形图像的顶部/底部无限拉伸，但在三维空间中它们仍然是单点。
- en: '![](../Images/be7899a0d0b4a5ebbc08ac48b1c7c834.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/be7899a0d0b4a5ebbc08ac48b1c7c834.png)'
- en: Considering Δφ in [-π,π], we can replace φ1 by π/2-|Δφ|.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到 Δφ 在 [-π,π] 范围内，我们可以用 π/2-|Δφ| 替换 φ1。
- en: '![](../Images/b4d678fcbfe991cd78eae5ecae4e3f6d.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b4d678fcbfe991cd78eae5ecae4e3f6d.png)'
- en: Graph of arcsin(cosΔφ) — Generated by the author on [desmos](https://www.desmos.com)
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: arcsin(cosΔφ) 的图像 — 由作者在 [desmos](https://www.desmos.com) 上生成
- en: 'As for θ1 it will depend on the sign of sinΔφ. Note that on [-π,π] sinΔφ and
    Δφ have the same sign. Finally, we get:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 至于 θ1，它将取决于 sinΔφ 的符号。注意，在 [-π,π] 范围内，sinΔφ 和 Δφ 有相同的符号。最后，我们得到：
- en: '![](../Images/5e280b81a7cfaaf4bbf7ba668d772dbc.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5e280b81a7cfaaf4bbf7ba668d772dbc.png)'
- en: When Δφ<0, the image tilts downwards and the camera starts looking upwards.
    As a result the south pole appears in front of the camera at θ1=Δθ. However, when
    Δφ>0 the camera starts looking downwards and the south pole moves to the back,
    which explains the θ1=Δθ+π.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 当 Δφ<0 时，图像向下倾斜，相机开始向上看。因此，南极出现在相机前的 θ1=Δθ 位置。然而，当 Δφ>0 时，相机开始向下看，南极移动到后面，这解释了
    θ1=Δθ+π。
- en: 'The math for the north pole is very similar, we get:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 北极的数学计算与之前非常相似，我们得到：
- en: '![](../Images/dfa1445794f21a60318e5466a459d6e9.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dfa1445794f21a60318e5466a459d6e9.png)'
- en: In real life 360 images the south pole is easy to spot because it corresponds
    to the tripod. To make this clearer, I’ve added in the figure below a green band
    at the bottom of the input 360 image to mark the south pole and a magenta band
    at the top to highlight the north pole. The left column corresponds to negative
    Δφ angles, while the right column corresponds to positive Δφ angles.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实生活中的 360 度图像中，南极很容易辨认，因为它对应于三脚架。为了使这一点更清晰，我在下面的图中在输入 360 度图像的底部添加了一条绿色带以标记南极，在顶部添加了一条洋红色带以突出北极。左列对应负
    Δφ 角度，而右列对应正 Δφ 角度。
- en: '![](../Images/a24841f3f6976c180303507c54c2d910.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a24841f3f6976c180303507c54c2d910.png)'
- en: Evolution of the south pole (in green) and north pole (in magenta) with respect
    to Δφ, with Δθ fixed at π/3 — Figure by the author
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 南极（绿色）和北极（洋红色）相对于 Δφ 的演变，Δθ 固定在 π/3 — 图表由作者绘制
- en: Left/Right Edge
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 左/右边缘
- en: The left and right edge of the 360 image coincide and correspond to θ0=±π, which
    means cosθ0=-1 and sinθ0=0.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 360 度图像的左右边缘重合，对应于 θ0=±π，这意味着 cosθ0=-1 且 sinθ0=0。
- en: Identifying the cosine difference identity helps simplifying the equations.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 识别余弦差恒等式有助于简化方程。
- en: '![](../Images/993d7ca645259272e4aaff861dd19a38.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/993d7ca645259272e4aaff861dd19a38.png)'
- en: 'The inverse trigonometric functions give us:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 反三角函数给我们：
- en: '![](../Images/4bdbfe4ac08747923b3a1e5cc233cbe8.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4bdbfe4ac08747923b3a1e5cc233cbe8.png)'
- en: As long as you remain on [-π/2,π/2], arcsin(sinx) is the identity function.
    But beyond this range, the function turns into a periodic triangular wave.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 只要你保持在 [-π/2,π/2] 的范围内，arcsin(sinx) 就是恒等函数。但超出这个范围，函数就变成了周期性的三角波。
- en: '![](../Images/76aeda38a077c5d764aba3edcf27e740.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/76aeda38a077c5d764aba3edcf27e740.png)'
- en: Graph of arcsin(sinx) — Generated by the author on [desmos](https://www.desmos.com)
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: arcsin(sinx) 的图像 — 由作者在 [desmos](https://www.desmos.com) 上生成
- en: As for θ1 it will be either Δθ or Δθ+π depending on the sign of cos(φ0-Δφ).
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 至于 θ1，它将是 Δθ 或 Δθ+π，这取决于 cos(φ0-Δφ) 的符号。
- en: 'It’s actually really intuitive: the front and back edges are just the connections
    between the north and south poles. Since the poles translate along Δθ and Δθ+π
    the front/back edges simply follow them along these two vertical tracks.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上这非常直观：前后边缘仅仅是南北极之间的连接。由于极点沿着 Δθ 和 Δθ+π 平移，前后边缘简单地沿着这两条垂直轨道跟随。
- en: In the images below I’ve highlighted the front edge in cyan and the back edge
    in red. Like before, the left column corresponds to negative Δφ angles, while
    the right column corresponds to positive Δφ angles.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的图像中，我用青色突出了前边缘，用红色突出了后边缘。和之前一样，左列对应负 Δφ 角度，而右列对应正 Δφ 角度。
- en: '![](../Images/f0bda237d86eef9ec4be25b80551998d.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f0bda237d86eef9ec4be25b80551998d.png)'
- en: Evolution of the back edge (in red), front edge (in cyan), south pole (in green)
    and north pole (in magenta) with respect to Δφ, with Δθ fixed at π/3 — Figure
    by the author
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 后边缘（红色）、前边缘（青色）、南极（绿色）和北极（洋红色）相对于 Δφ 的演变，Δθ 固定在 π/3 — 图表由作者绘制
- en: '* * *'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '![](../Images/90568aa7e24dbdceff723a505aef70db.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/90568aa7e24dbdceff723a505aef70db.png)'
- en: Photo by Dan Cristian Pădureț on [Unsplash](https://unsplash.com/photos/a-blackboard-with-a-bunch-of-diagrams-on-it-h3kuhYUCE9A)
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 照片由 Dan Cristian Pădureț 在 [Unsplash](https://unsplash.com/photos/a-blackboard-with-a-bunch-of-diagrams-on-it-h3kuhYUCE9A)
    提供
- en: Conclusion
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: I hope you enjoyed as much as I did thoroughly investigating what it actually
    means to pan or tilt a spherical image!
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你们像我一样，彻底调查了解旋转或倾斜球形图像的实际意义时，也能感到同样的乐趣！
- en: The math can get a bit verbose at times, but the matrix form helps a lot keeping
    things tidy and at the end the final formulas are not that long.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 有时数学可能会变得有些冗长，但矩阵形式有助于保持事物的整洁，最终最终的公式并不长。
- en: In the end it’s really satisfying to apply the transform onto the image with
    just a dozen of lines of code.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，用仅仅十几行代码将变换应用于图像，真的非常令人满意。
- en: 'Once you truly understand how image remapping works you can easily use it for
    a lot of applications: converting between cubemaps and spherical images, undistorting
    images, stitching panoramas…'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你真正理解了图像重映射的工作原理，你就可以轻松地将其应用于许多应用：在立方体贴图和球形图像之间进行转换，消除图像畸变，拼接全景图……
