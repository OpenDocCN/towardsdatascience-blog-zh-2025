- en: My Experience Switching From Power BI to Looker (as a Senior Data Analyst)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我从 Power BI 转向 Looker 的经历（作为一名高级数据分析师）
- en: 原文：[https://towardsdatascience.com/my-experience-switching-from-power-bi-to-looker-as-a-senior-data-analyst-d244cfe62613/](https://towardsdatascience.com/my-experience-switching-from-power-bi-to-looker-as-a-senior-data-analyst-d244cfe62613/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/my-experience-switching-from-power-bi-to-looker-as-a-senior-data-analyst-d244cfe62613/](https://towardsdatascience.com/my-experience-switching-from-power-bi-to-looker-as-a-senior-data-analyst-d244cfe62613/)'
- en: '***⚠️ Note:** This article is comparing **Power BI** with **Looker** (NOT Looker
    Studio).*'
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***⚠️ 注意：** 这篇文章是在比较 **Power BI** 和 **Looker**（不是 Looker Studio）。*'
- en: '![Transitioning from Power BI to Looker (source: own production)](../Images/e3a7dffea82c9f9a6352ce284247557b.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![从 Power BI 转向 Looker（来源：自产内容）](../Images/e3a7dffea82c9f9a6352ce284247557b.png)'
- en: 'Transitioning from Power BI to Looker (source: own production)'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 从 Power BI 转向 Looker（来源：自产内容）
- en: When I started using Looker at my current job, I was surprised at how little
    useful information there was about it online.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始在我当前的工作中使用 Looker 时，我对网上关于它的有用信息如此之少感到惊讶。
- en: Search for "Looker," and you’ll mostly find content about Looker Studio, which
    is an entirely different tool.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索“Looker”，你通常会找到关于 Looker Studio 的内容，这是一个完全不同的工具。
- en: I was not able to find an authentic and practical review comparing Power BI
    with Looker (not Looker Studio), so I decided to create one based on my experience
    with both.
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我无法找到一篇真实且实用的关于 Power BI 与 Looker（不是 Looker Studio）的比较评论，所以我决定基于我对两者的经验创建一篇。
- en: Having the experience using Power BI in a previous role at [Zensai](https://zensai.com/)
    (formerly LMS365) and having transitioned to Looker in my current role at [Trustpilot](https://business.trustpilot.com/jobs),
    I wanted to document some of the most important technicalities you need to be
    aware of when you perhaps make this shift yourself in the future too.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在之前在 [Zensai](https://zensai.com/)（原名 LMS365）的职位中使用 Power BI 的经验，以及在我当前在 [Trustpilot](https://business.trustpilot.com/jobs)
    的职位中转向 Looker，我想记录一些你在未来可能自己进行这种转变时需要了解的重要技术细节。
- en: 'In this article, I’ll:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将：
- en: discuss the main differences between Power BI and Looker,
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论 Power BI 和 Looker 之间的主要区别，
- en: talk about the strengths and weaknesses of each tool,
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论每个工具的优缺点，
- en: share tips for a smooth transition between the two platforms to make it less
    painful,
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分享两个平台之间平稳过渡的技巧，以减少痛苦，
- en: highlight Looker’s unique features that I love,
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 突出 Looker 的我喜欢的独特功能，
- en: and mention whether I prefer Power BI or Looker as a Senior Data Analyst for
    Commercial & Marketing.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并提及我是否更喜欢 Power BI 或 Looker 作为一名高级数据分析师。
- en: '* * *'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Looker’s integrated table view under visualizations saves time.**'
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**Looker 的集成表格视图在可视化下节省时间**。'
- en: '*(Looker **1:0** Power BI)*'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **1:0** Power BI)*'
- en: One feature I really appreciate in Looker is the integrated data table displayed
    beneath your visualizations during the exploration phase.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常欣赏 Looker 中的一个功能，那就是在探索阶段在你的可视化下方显示的集成数据表。
- en: '![Data table is under your visualization at all times (source: own production)](../Images/662cb81aa944db30bf99ca77b54e2285.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![数据表始终位于你的可视化下方（来源：自产内容）](../Images/662cb81aa944db30bf99ca77b54e2285.png)'
- en: 'Data table is under your visualization at all times (source: own production)'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 数据表始终位于你的可视化下方（来源：自产内容）
- en: I can’t count how many times I’ve had to switch back and forth between the report
    view tab and the data view tab in Power BI when constructing charts, debugging,
    and checking columns.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我无法计算有多少次在构建图表、调试和检查列时，不得不在 Power BI 的报告视图选项卡和数据视图选项卡之间来回切换。
- en: 'In Power BI, you can display a visualization as a table – you click on the
    three dots and select "show as a table." But here’s the catch: the table isn’t
    what you’d call fully interactive. You can’t edit it, pivot, or customize it like
    you can in Looker. It’s more like a snapshot than a tool. If you want to make
    changes, you have to go into Power Query. You can’t see the visual while you’re
    making edits – it’s a disconnected process.'
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在 Power BI 中，你可以将可视化显示为表格 – 你点击三个点并选择“显示为表格”。但这里有个问题：表格并不像你所说的那样完全交互式。你不能编辑它，旋转或像在
    Looker 中那样自定义它。它更像是一个快照而不是一个工具。如果你想进行更改，你必须进入 Power Query。你无法在编辑时看到可视化 – 这是一个断开的过程。
- en: '![The table in Power BI is not customizable like it is in Looker (pivoting,
    calculating new columns, measures, dimensions, hiding columns, etc.) (source:
    own production)](../Images/a7757996ae0fb65619959e1d9b396d2d.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![Power BI 中的表格不像 Looker 那样可自定义（旋转、计算新列、度量、维度、隐藏列等。）（来源：本人制作）](../Images/a7757996ae0fb65619959e1d9b396d2d.png)'
- en: 'The table in Power BI is not customizable like it is in Looker (pivoting, calculating
    new columns, measures, dimensions, hiding columns, etc.) (source: own production)'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: Power BI 中的表格不像 Looker 那样可自定义（旋转、计算新列、度量、维度、隐藏列等。）（来源：本人制作）
- en: Having a customizable table view at all times right there under the visualization
    in Looker saves a lot of time and really is a practical feature you will get used
    to very quickly.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Looker 中，始终在可视化下方有一个可自定义的表格视图，这可以节省大量时间，并且确实是一个你很快就会习惯的实用功能。
- en: '**Looker expressions lack the power and functionality of DAX formulas.**'
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**Looker 表达式缺乏 DAX 公式的强大功能和功能。**'
- en: '*(Looker **1:1** Power BI)*'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **1:1** Power BI)*'
- en: However, I don’t like Looker expressions.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我不喜欢 Looker 表达式。
- en: Compared to [DAX (Data Analysis Expressions)](https://learn.microsoft.com/en-us/dax/),
    they aren’t as developed in terms of the number of different functions.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 与 [DAX（数据分析表达式）](https://learn.microsoft.com/en-us/dax/) 相比，它们在函数数量方面的发展程度并不相同。
- en: DAX provides a rich library of functions for complex calculations and time intelligence,
    which is critical for advanced analytics.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: DAX 提供了一个丰富的函数库，用于复杂计算和时间智能，这对于高级分析至关重要。
- en: 'My favourite DAX function in Power BI is definitely the [=CALCULATE function](https://learn.microsoft.com/en-us/dax/calculate-function-dax).
    `CALCULATE` changes the filters to give you the result you want – it makes it
    super useful for things like time-based or category-specific calculations:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我在 Power BI 中最喜欢的 DAX 函数无疑是 [=CALCULATE 函数](https://learn.microsoft.com/en-us/dax/calculate-function-dax)。`CALCULATE`
    改变筛选条件以给出你想要的结果——它对于基于时间或特定类别的计算等非常有用：
- en: '[PRE0]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: While Looker offers a range of expressions for data manipulation that they call
    [Looker Expressions](https://cloud.google.com/looker/docs/functions-and-operators)
    (sometimes referred to as Lexp), they don’t match the depth and versatility of
    DAX in Power BI.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Looker 提供了一系列用于数据操作的表达式，它们称之为 [Looker 表达式](https://cloud.google.com/looker/docs/functions-and-operators)（有时称为
    Lexp），但它们并不匹配 Power BI 中 DAX 的深度和多功能性。
- en: Looker’s expressions are less widely adopted compared to DAX and have a smaller
    presence in online forums, documentation, and educational resources. This is also
    due to the fact that DAX is also used in Analysis Services, and Power Pivot in
    Excel.
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 与 DAX 相比，Looker 的表达式被采用得较少，在线论坛、文档和教育资源中的存在感也较小。这也因为 DAX 还用于 Analysis Services
    和 Excel 中的 Power Pivot。
- en: I’ve also noticed that generative AI models will sometimes struggle with the
    exact structure/formulas of Looker’s expressions as they have been introduced
    later than DAX – even when setting up the right context and additional parameters
    for the model to take into account.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我还注意到，生成式 AI 模型有时会难以处理 Looker 表达式的精确结构/公式，因为它们是在 DAX 之后引入的——即使为模型设置了正确的上下文和额外的参数。
- en: One additional thing to keep in mind is that Looker expressions are not the
    same as [LookML language](https://cloud.google.com/looker/docs/write-lookml-intro)
    – which is where do confusion might happen for some.
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 还有一点需要记住的是，Looker 表达式与 [LookML 语言](https://cloud.google.com/looker/docs/write-lookml-intro)
    并不相同——这可能是某些人产生混淆的地方。
- en: ''
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Looker expressions are used to perform calculations and they use the fields
    you define in LookML.
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Looker 表达式用于执行计算，并使用你在 LookML 中定义的字段。
- en: For example, when you add a field to an expression, **Looker uses the field’s
    LookML identifier**, which looks like `${view_name.field_name}` .
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当你将一个字段添加到表达式中时，**Looker 使用该字段的 LookML 标识符**，其形式类似于 `${view_name.field_name}`。
- en: '![Creating a new calculated column in Looker (source: own production)](../Images/c2261f2d853039483d678b99055f51af.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![在 Looker 中创建新的计算列（来源：本人制作）](../Images/c2261f2d853039483d678b99055f51af.png)'
- en: 'Creating a new calculated column in Looker (source: own production)'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Looker 中创建新的计算列（来源：本人制作）
- en: 'Looker expressions are used for creating:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: Looker 表达式用于创建：
- en: custom dimensions
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自定义维度
- en: custom calculated columns
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自定义计算列
- en: custom measures
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自定义度量
- en: and custom filtering
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并自定义过滤
- en: …**within** the Looker explore interface.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: …**在** Looker 探索界面中。
- en: '![Calculated columns can be created by only using the fields that are present
    in your data table - later you can hide them if you don''t want to show them on
    your chart (source: own production)](../Images/64dc539ca3f090e7d5c77eaa4e7b8bbf.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![可以通过仅使用数据表中存在的字段来创建计算列——稍后你可以隐藏它们，如果你不想在图表上显示它们（来源：本生产）](../Images/64dc539ca3f090e7d5c77eaa4e7b8bbf.png)'
- en: 'Calculated columns can be created by only using the fields that are present
    in your data table – later you can hide them if you don’t want to show them on
    your chart (source: own production)'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 计算列可以通过仅使用数据表中存在的字段来创建——稍后你可以隐藏它们，如果你不想在图表上显示它们（来源：本生产）
- en: This seems easy – but if you incorporate ***multiple** **dimensions***, ***measures***,
    ***calculated** **columns***, and ***pivot** **the** **data***, you can end up
    with a very powerful data table.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这看起来很简单——但如果你结合了***多个***维度、***度量值***、***计算列***和***数据透视***，你最终可以得到一个非常强大的数据表。
- en: '![Pivoted data table when creating cohorts using multiple dimensions, measures,
    and calculated columns (source: own production)](../Images/5558a79a72aaa5923d7d874c1d252cba.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![使用多个维度、度量值和计算列创建队列时的转置数据表（来源：本生产）](../Images/5558a79a72aaa5923d7d874c1d252cba.png)'
- en: 'Pivoted data table when creating cohorts using multiple dimensions, measures,
    and calculated columns (source: own production)'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 使用多个维度、度量值和计算列创建队列时的转置数据表（来源：本生产）
- en: '**Power Query Editor in Power BI enables easy data manipulation.**'
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**Power BI中的Power Query编辑器使数据操作变得简单易行。**'
- en: '*(Looker **1:2** Power BI)*'
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **1:2** Power BI)*'
- en: Power BI has the Power Query Editor, similar to the one in Excel.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: Power BI有一个Power Query编辑器，类似于Excel中的编辑器。
- en: '![Launch the Power Query editor in Power BI (source: own production)](../Images/8a59487a0f46d55ac78ad76917a3e5ca.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![在Power BI中启动Power Query编辑器（来源：本生产）](../Images/8a59487a0f46d55ac78ad76917a3e5ca.png)'
- en: 'Launch the Power Query editor in Power BI (source: own production)'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power BI中启动Power Query编辑器（来源：本生产）
- en: You can create calculated columns, remove first rows, set the first row as a
    header, and so much more ***with a few clicks***.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过几点击操作创建计算列、删除首行、将首行设置为标题，以及更多功能***只需几点击即可***。
- en: '![Power Query editor in Power BI (source: own production)](../Images/e264437179fc20f6e0198326ccc59c20.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![Power BI中的Power Query编辑器（来源：本生产）](../Images/e264437179fc20f6e0198326ccc59c20.png)'
- en: 'Power Query editor in Power BI (source: own production)'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: Power BI中的Power Query编辑器（来源：本生产）
- en: This Power Query Editor does not exist in Looker – although you can create custom
    measures, custom dimensions, and custom calculated columns very easily in your
    Explore in Looker.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这个Power Query编辑器在Looker中不存在——尽管你可以在Looker的Explore中非常容易地创建自定义度量值、自定义维度和自定义计算列。
- en: However, for other transformations that come in handy in Power BI/Excel, you
    need to write LookML code.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于Power BI/Excel中其他有用的转换，你需要编写LookML代码。
- en: As you’ll discover later in this article, this is also a big positive of Looker
    due to data centralization.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你将在本文后面发现的那样，这也是Looker的一个大优点，因为数据是集中化的。
- en: '**Looker is only web-based.**'
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**Looker仅基于Web。**'
- en: '*(Looker **1:3** Power BI)*'
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **1:3** Power BI)*'
- en: I like that Power BI comes as a desktop application, which allows me to work
    ***offline*** using ***local*** ***datasets*** and take advantage of my local
    machine’s processing power!
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢Power BI作为一个桌面应用程序，这让我可以使用***离线***和***本地***数据集工作，并利用我本地机器的处理能力！
- en: '![Power BI comes as a desktop app, Looker does not (source: own production)](../Images/e4a3000e5a5436e4d21aad182c92f2ca.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![Power BI是一个桌面应用程序，而Looker不是（来源：本生产）](../Images/e4a3000e5a5436e4d21aad182c92f2ca.png)'
- en: 'Power BI comes as a desktop app, Looker does not (source: own production)'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: Power BI是一个桌面应用程序，而Looker不是（来源：本生产）
- en: Looker doesn’t come as a desktop app – it’s only web-based. If you prefer Mac,
    web-based is an advantage – especially considering Power BI’s desktop app is Windows-only.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: Looker不是一个桌面应用程序——它仅基于Web。如果你更喜欢Mac，基于Web是一个优势——特别是考虑到Power BI的桌面应用程序仅适用于Windows。
- en: One thing I must say I like in Looker is that you can very easily navigate through
    your changes back and forward using the back and forward buttons on your browser.
    This is because each change in a Looker explore creates a new unique URL link.
    As you modify your queries or adjust settings, the URL updates to reflect the
    current state of your explore. This goes hand-in-hand with Looker’s caching that
    allows you to visit your query and visuals again – without spending on running
    them again, so they load instantly (the default cache retention policy is [one
    hour](https://cloud.google.com/looker/docs/caching-and-datagroups#:~:text=Warning%3A%20For%20queries%20run%20on,retention%20policy%20is%20one%20hour.)).
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我必须说，我喜欢 Looker 的一点是，您可以使用浏览器上的前后按钮轻松地导航到您的更改，无论是向前还是向后。这是因为 Looker 探索中的每个更改都会创建一个新的唯一
    URL 链接。当您修改查询或调整设置时，URL 会更新以反映您探索的当前状态。这与 Looker 的缓存功能相辅相成，允许您再次访问查询和视觉元素，而无需再次运行它们，因此它们可以即时加载（默认缓存保留策略为
    [一小时](https://cloud.google.com/looker/docs/caching-and-datagroups#:~:text=Warning%3A%20For%20queries%20run%20on,retention%20policy%20is%20one%20hour.)）。
- en: While ***Power BI Service*** – where users upload and edit reports, collaborate,
    and create Apps, is also web-based, Looker’s fully browser-based approach eliminates
    operating system restrictions altogether.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 ***Power BI 服务*** – 用户在此处上传和编辑报告、协作和创建应用程序，也是基于 Web 的，但 Looker 的完全基于浏览器的方法完全消除了操作系统限制。
- en: '**Power BI simplifies star schema modeling, whereas Looker requires learning
    LookML.**'
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**Power BI 简化了星型模式建模，而 Looker 需要学习 LookML**。'
- en: '*(Looker **1:4** Power BI)*'
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **1:4** Power BI)*'
- en: Modeling and creating your star schema is super easy in Power BI’s ***Modeling
    tab***.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Power BI 的 ***建模选项卡*** 中建模和创建您的星型模式非常简单。
- en: '![Star schema in Power BI using the Modeling Tab (source: own production)](../Images/d8f0d1b940ba4359b624ddc37e91b120.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![使用建模选项卡在 Power BI 中创建的星型模式（来源：自产）](../Images/d8f0d1b940ba4359b624ddc37e91b120.png)'
- en: 'Star schema in Power BI using the Modeling Tab (source: own production)'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 使用建模选项卡在 Power BI 中创建的星型模式（来源：自产）
- en: You enjoy a very big canvas with all your imported tables and can use FKs and
    PKs to link your tables using many-to-one relationships between the fact table
    and your dimension tables.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以享受一个非常大的画布，其中包含所有导入的表，并可以使用外键（FK）和主键（PK）通过事实表和您的维度表之间的多对一关系来链接您的表。
- en: For example, leads coming to your business can be stored in the fact table,
    while region, contact forms, lead sources, and channels are your separate dimension
    tables with unique values.
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 例如，进入您业务的潜在客户可以存储在事实表中，而地区、联系表单、潜在客户来源和渠道则是具有唯一值的单独维度表。
- en: This helps to query your fact table ***very*** ***fast*** and ***efficiently***.
    Additionally, it’s very easy to adjust the relationship with Power BI’s ***click-and-choose***
    feature.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这有助于您快速且高效地查询事实表 ***非常*** ***快速*** 和 ***高效***。此外，使用 Power BI 的 ***点击选择*** 功能调整关系非常容易。
- en: '![By double-clicking on the relationships line, you can adjust your relationship
    with a few clicks (source: own production)](../Images/171c9a46d3b2dff6bc413040a7164433.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![通过双击关系线，您可以点击几下调整您的关系（来源：自产）](../Images/171c9a46d3b2dff6bc413040a7164433.png)'
- en: 'By double-clicking on the relationships line, you can adjust your relationship
    with a few clicks (source: own production)'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 通过双击关系线，您可以点击几下调整您的关系（来源：自产）
- en: In Looker, this isn’t as easy as clicking and building your relationships with
    a few clicks.
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在 Looker 中，这不像点击并使用几点击建立关系那样简单。
- en: You need to learn LookML to join your different views (= views mirror the tables
    loaded from your data warehouse to Looker) within explores and define your relationships
    and keys using LookML language.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要学习 LookML 来在探索中连接您不同的视图（= 视图反映了从您的数据仓库加载到 Looker 的表）并使用 LookML 语言定义您的关系和键。
- en: '![Star schema in Looker is done using LookML code (source: own production)](../Images/2605643f6cc80193f46d230ed3b00af2.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![Looker 中的星型模式使用 LookML 代码实现（来源：自产）](../Images/2605643f6cc80193f46d230ed3b00af2.png)'
- en: 'Star schema in Looker is done using LookML code (source: own production)'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: Looker 中的星型模式使用 LookML 代码实现（来源：自产）
- en: Power BI outperforms Looker with chart options.
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power BI 在图表选项方面优于 Looker。
- en: '*(Looker **1:5** Power BI)*'
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **1:5** Power BI)*'
- en: With Power BI, you have more default charts to choose from.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Power BI，您可以选择更多默认图表。
- en: '![Intelligent charts in Power BI, including triple exponential smoothing forecasting
    (Holt-Winters) and key influencer chart (source: own production)](../Images/c0890729395aee49af3b32d217e7783a.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![Power BI 中的智能图表，包括三指数平滑预测（Holt-Winters）和关键影响因素图表（来源：自产）](../Images/c0890729395aee49af3b32d217e7783a.png)'
- en: 'Intelligent charts in Power BI, including triple exponential smoothing forecasting
    (Holt-Winters) and key influencer chart (source: own production)'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: Power BI中的智能图表，包括三指数平滑预测（Holt-Winters）和关键影响因素图表（来源：自产）
- en: I’m definitely missing the key influencer chart that basically builds a simple
    regression model for you in one visual!
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我确实很怀念那个基本上一眼就能构建一个简单回归模型的关键影响因素图表！
- en: '![Perform a simple segmentation with the "Top Segments" visualization in Power
    BI (source: own production)](../Images/8d36939d821c895d8689485f51d3fa3f.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![在Power BI中使用“顶级段”可视化进行简单的分段（来源：自产）](../Images/8d36939d821c895d8689485f51d3fa3f.png)'
- en: 'Perform a simple segmentation with the "Top Segments" visualization in Power
    BI (source: own production)'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power BI中使用“顶级段”可视化进行简单的分段（来源：自产）
- en: The good thing though is that there is a marketplace for charts in Looker too,
    although many are **not an officially supported Google product.**
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，好消息是Looker也有图表市场，尽管许多**不是官方支持的Google产品**。
- en: '**Looker is basically a big and transparent SQL runner machine.**'
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**Looker基本上是一个大型的透明SQL运行机。**'
- en: '*(Looker **2:5** Power BI)*'
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **2:5** Power BI)*'
- en: I love that Looker always runs and easily shows you the BQ SQL queries to create
    the table you see under your visualization and then uses it to create your visualization
    on top (although if not handled properly, running these queries can easily become
    costly).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢Looker总是运行并且能轻松地显示你可视化下创建表的BQ SQL查询，然后使用它来创建你上面的可视化（尽管如果没有妥善处理，运行这些查询可能会变得很昂贵）。
- en: '![SQL tab shows you the query ran against your data warehouse right under the
    visual (source: own production)](../Images/010049751864cd5cd12fa0700dde8098.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![SQL选项卡显示在你的可视化下方直接运行的数据仓库查询（来源：自产）](../Images/010049751864cd5cd12fa0700dde8098.png)'
- en: 'SQL tab shows you the query ran against your data warehouse right under the
    visual (source: own production)'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: SQL选项卡显示在你的可视化下方直接运行的数据仓库查询（来源：自产）
- en: You can very easily click on the SQL tab in Looker and see the exact query that
    is ran against your data warehouse, which is super helpful for debugging and seeing
    which tables in your data warehouse are being used to build the visualization.
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你可以非常容易地在Looker中点击SQL选项卡，并看到针对你的数据仓库运行的精确查询，这对于调试和查看用于构建可视化的数据仓库中的哪些表非常有帮助。
- en: ''
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: My tip for debugging is to copy the SQL query for your visual, and use generative
    AI (like Claude or ChatGPT) to ask questions about the potential problems.
  id: totrans-102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我的调试技巧是复制你视觉的SQL查询，并使用生成式AI（如Claude或ChatGPT）来询问潜在的问题。
- en: In Power BI, accessing the underlying queries requires additional steps, such
    as using ***Performance Analyzer*** or external tools like ***DAX Studio*.**
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power BI中，访问底层查询需要额外的步骤，例如使用***性能分析器***或像***DAX Studio***这样的外部工具。
- en: '**Formatting charts is a little tedious in Looker.**'
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**在Looker中格式化图表有点繁琐。**'
- en: '*(Looker **2:6** Power BI)*'
  id: totrans-105
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **2:6** Power BI)*'
- en: The formatting options for how your charts look aren’t as strong as with Power
    BI.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你的图表格式化选项不如Power BI强大。
- en: Microsoft has been upping their game in terms of customization of the charts
    you create in Power BI, with a lot of different **click-and-choose** drop down
    menus you set up for your charts when you build them pretty much for anything
    you can think about.
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 微软在Power BI中创建的图表的定制方面一直在提升，当你构建图表时，几乎可以为你想到的任何事情设置很多不同的**点击并选择**下拉菜单。
- en: '![Editing any chart in Power BI is simple with click-and-choose drop down menus
    (source: own production)](../Images/8179408b445bf93e44612892d6244ff1.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![在Power BI中编辑任何图表都非常简单，只需点击并选择下拉菜单即可（来源：自产）](../Images/8179408b445bf93e44612892d6244ff1.png)'
- en: 'Editing any chart in Power BI is simple with click-and-choose drop down menus
    (source: own production)'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power BI中编辑任何图表都非常简单，只需点击并选择下拉菜单即可（来源：自产）
- en: I’m not saying that what you can do in Power BI, you can’t in Looker – rather
    that in Power BI, the conditional formatting, targets, goal setting, axis, fonts,
    headers, and basically all aspects of any visual can be adjusted with a simple
    drop-down menu.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我并不是说你在Power BI中能做的，在Looker中做不到——而是在Power BI中，条件格式化、目标、目标设定、坐标轴、字体、标题以及任何视觉的所有方面都可以通过简单的下拉菜单进行调整。
- en: You can also adjust the look of ***a specific metric*** in your Power BI visualization
    without changing the appearance of the entire chart or table – this allows you
    to make precise edits to just the metric you’re focusing on.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以调整Power BI可视化中**特定度量**的外观，而无需更改整个图表或表格的外观——这允许你仅对关注的度量进行精确编辑。
- en: '![Conditional formatting, targets, and goal setting can be simply edited with
    drop-down menus in Power BI (source: own production)](../Images/4d6325b24aa69b770522d9036d929d18.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![在Power BI中，可以通过下拉菜单简单地编辑条件格式化、目标和目标设置（来源：自产生产）](../Images/4d6325b24aa69b770522d9036d929d18.png)'
- en: 'Conditional formatting, targets, and goal setting can be simply edited with
    drop-down menus in Power BI (source: own production)'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power BI中，可以通过下拉菜单简单地编辑条件格式化、目标和目标设置（来源：自产生产）
- en: '![Conditional formatting, smooth lines, gridlines of all types like dashed,
    dots, or full lines can be edited in Power BI easily as well (source: own production)](../Images/e32f714d5774b61a198f9a6654dfae59.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![在Power BI中，可以轻松编辑所有类型的条件格式化、平滑线条、网格线，如虚线、点或实线（来源：自产生产）](../Images/e32f714d5774b61a198f9a6654dfae59.png)'
- en: 'Conditional formatting, smooth lines, gridlines of all types like dashed, dots,
    or full lines can be edited in Power BI easily as well (source: own production)'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power BI中，可以轻松编辑所有类型的条件格式化、平滑线条、网格线，如虚线、点或实线（来源：自产生产）
- en: 'For Looker, I had to write down a JSON code snippet `{"backgroundColor": "#code"}`
    to change the background color of the chart—which then also resulted in this notification
    shown in Looker:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '对于Looker，我不得不写下以下JSON代码片段`{"backgroundColor": "#code"}`来更改图表的背景颜色——这随后也导致了在Looker中显示的此通知：'
- en: '*"⚠️ Changes have been made in the Chart Config Editor. Editing visualization
    settings may cause unexpected behavior."*'
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*"⚠️ 图表配置编辑器中已进行更改。编辑可视化设置可能会导致意外行为。"*'
- en: '![Error when adjusting the background of the chart in Looker using json code
    snippet (source: own production)](../Images/771fa6459e902f97d5eb6df09fb4f556.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![在Looker中使用json代码片段调整图表背景时出现错误（来源：自产生产）](../Images/771fa6459e902f97d5eb6df09fb4f556.png)'
- en: 'Error when adjusting the background of the chart in Looker using json code
    snippet (source: own production)'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在Looker中使用json代码片段调整图表背景时出现错误（来源：自产生产）
- en: '**Looker’s git version control is built-in and easy to use.**'
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**Looker的git版本控制是内置的，并且易于使用。**'
- en: '*(Looker **3:6** Power BI)*'
  id: totrans-121
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **3:6** Power BI)*'
- en: I love the built-in version control in Looker, as it’s very intuitive and easy
    to use – you don’t have to leave Looker.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常喜欢Looker内置的版本控制，因为它非常直观且易于使用——你不需要离开Looker。
- en: If you decide to model, edit, or create new dimensions and measures, you start
    with turning on the ***Development Mode*** – this will allow you to set your own
    development area so you won’t impact anything in production.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你决定建模、编辑或创建新的维度和度量，你首先需要开启**开发模式** – 这将允许你设置自己的开发区域，这样你不会影响到生产环境中的任何内容。
- en: You then create your own personal (or shared) branch directly in Looker and
    work on your LookML code.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以在Looker中直接创建自己的个人（或共享）分支，并在此处编写LookML代码。
- en: '![Git-version control in Looker is built-in and easy to use (source: own production)](../Images/43ad2d6833ca017dd0857697f313c5fe.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![Looker中的Git版本控制是内置的，并且易于使用（来源：自产生产）](../Images/43ad2d6833ca017dd0857697f313c5fe.png)'
- en: 'Git-version control in Looker is built-in and easy to use (source: own production)'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: Looker中的Git版本控制是内置的，并且易于使用（来源：自产生产）
- en: After that you can simply publish your branch to your remote repository (Github)
    and then create PR for merging your new branch to the main one.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，你可以简单地将你的分支发布到远程仓库（GitHub）中，然后创建合并你的新分支到主分支的PR。
- en: '**Data modeling with LookML ensures consistent measures and dimensions across
    the organization.**'
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**使用LookML进行数据建模确保了组织内度量值和维度的统一。**'
- en: '*(Looker **4:6** Power BI)*'
  id: totrans-129
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **4:6** Power BI)*'
- en: Looker is amazing, and I like its approach to centralized data modeling using
    the proprietary LookML language.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: Looker非常出色，我喜欢它使用专有的LookML语言进行集中式数据建模的方法。
- en: LookML code allows you to be consistent with your definitions across your organization.
    What this means in practice is that because we all write everything in one language
    as data analysts/scientists, we all end up using the same measures and dimensions
    that are defined and approved by our team. In simple terms, Looker lets you build
    content on top of pre-modeled data in your data warehouse.
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: LookML 代码允许您在组织内部署中保持定义的一致性。在实践中，这意味着因为我们所有人都是作为数据分析师/科学家用一种语言编写一切，我们最终都会使用由我们的团队定义和批准的相同度量值和维度。简单来说，Looker
    允许您在数据仓库中预建模数据的基础上构建内容。
- en: '![Dimensions and measures in your views (=tables) are defined with LookML which
    ensures one definition accross different models (source: own production)](../Images/9cdcce28aae7868711df8778359ea8b5.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![在您的视图中（=表）中定义的维度和度量值使用 LookML，这确保了在不同模型中只有一个定义（来源：自产）](../Images/9cdcce28aae7868711df8778359ea8b5.png)'
- en: 'Dimensions and measures in your views (=tables) are defined with LookML which
    ensures one definition accross different models (source: own production)'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的视图中（=表）中定义的维度和度量值使用 LookML，这确保了在不同模型中只有一个定义（来源：自产）
- en: Your average employee won’t be able to define the data model inside, but will
    be able to use this data freely. This is suppose to create the single source of
    truth everybody in the organization wants.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 您的平均员工无法定义内部的数据模型，但将能够自由地使用这些数据。这旨在创建组织内每个人都想要的单一事实来源。
- en: Technically, when you change a definition of a metric in your business, you
    should be able to edit your LookML in one place, and all explores, looks, and
    dashboards where that metric is used will auto-update too.
  id: totrans-135
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 技术上，当您更改业务中指标的定义时，您应该能够在一个地方编辑您的 LookML，并且使用该指标的所有探索、查看和仪表板都将自动更新。
- en: What I also like about Looker is that you can make SQL edits using the `sql:`
    parameter in LookML when you create your views (views mirror the tables loaded
    from your data warehouse to Looker).
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我还喜欢 Looker 的地方是，当您创建视图时，可以使用 LookML 中的 `sql:` 参数进行 SQL 编辑（视图反映了从您的数据仓库加载到 Looker
    的表）。
- en: '**Looker’s workflow promotes data exploration before building dashboards.**'
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**Looker 的工作流程促进了在构建仪表板之前的数据探索。**'
- en: '*(Looker **5:6** Power BI)*'
  id: totrans-138
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **5:6** Power BI)*'
- en: 'Although the comparison is not 1:1, Power BI’s development flow stages:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然比较不是一一对应的，Power BI 的开发流程阶段：
- en: '**Reports → Dashboards → Apps**'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**报告 → 仪表板 → 应用**'
- en: '…would be the ones resembling Looker’s as following:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: …将与 Looker 的以下示例相似：
- en: '**Explores → Looks → Dashboards.**'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**探索 → Look → 仪表板。**'
- en: 'I find Looker’s approach more intuitive because it allows for better exploration
    of data ***before*** building your dashboards:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现 Looker 的方法更直观，因为它允许在构建仪表板之前更好地探索数据：
- en: In Looker, you start with ***Explores*** which enable interactive EDA using
    ad-hoc queries.
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Looker 中，您从 ***探索*** 开始，这允许使用临时查询进行交互式 EDA。
- en: '![Explore example in Looker - in the "Explore" section you can decide whether
    you save your view as a Look or directly into your dashboard (source: own production)](../Images/e35b97f6268dab40a97451f32632c47c.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![在 Looker 中探索示例 - 在“探索”部分，您可以决定是否将您的视图保存为 Look 或直接保存到仪表板中（来源：自产）](../Images/e35b97f6268dab40a97451f32632c47c.png)'
- en: 'Explore example in Looker – in the "Explore" section you can decide whether
    you save your view as a Look or directly into your dashboard (source: own production)'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: Looker 中的探索示例 – 在“探索”部分，您可以决定是否将您的视图保存为 Look 或直接保存到仪表板中（来源：自产）
- en: You can then save the charts you build using these explorations as ***Looks***
    – these **** are reusable and you can append them to any dashboard.
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，您可以将使用这些探索构建的图表保存为 ***Look*** – 这些 ****是可重用的，并且可以将它们附加到任何仪表板。
- en: '![Look example in Looker - the Look is the building block for any dashboard
    (source: own production)](../Images/0acd33715ce3360222e6f05ef2275fd2.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![在 Looker 中查看示例 - Look 是任何仪表板的基本构建块（来源：自产）](../Images/0acd33715ce3360222e6f05ef2275fd2.png)'
- en: 'Look example in Looker – the Look is the building block for any dashboard (source:
    own production)'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: Looker 中的 Look 示例 – Look 是任何仪表板的基本构建块（来源：自产）
- en: These Looks including charts can after be puzzled together into ***Dashboards***
    for a full overview of your key metrics.
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这些 Look 包括图表，可以之后拼接到一起形成 ***仪表板***，以全面概述您的关键指标。
- en: '![Simple dashboard example in Looker (source: own production)](../Images/0a168078b42547366519c3c41828ab75.png)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![Looker 中的简单仪表板示例（来源：自产）](../Images/0a168078b42547366519c3c41828ab75.png)'
- en: 'Simple dashboard example in Looker (source: own production)'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: Looker 中的简单仪表板示例（来源：自产）
- en: I love Explores in Looker because they give anyone in the organization the superpower
    to dive deep into the data without knowing SQL. When you as a Looker developer
    prepare an Explore for consumption, it enables finance specialists, marketing
    managers, revenue directors – really anyone – to interact with the prepared views
    within that specific Explore. They don’t need technical expertise or knowledge
    of SQL – they can ask their own questions and get immediate answers by pivoting,
    slicing, and filtering.
  id: totrans-153
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我非常喜欢 Looker 中的 Explorers，因为它们赋予组织中的任何人都深入数据的能力，而无需了解 SQL。当你作为一个 Looker 开发者准备
    Explorers 以供使用时，它使得财务专家、市场营销经理、收入总监——实际上任何人——都可以与 Explorers 中的准备视图进行交互。他们不需要技术专业知识或
    SQL 知识——他们可以提出自己的问题，并通过旋转、切片和过滤来获得即时答案。
- en: This layer that exists in Looker before the dashboards are put into production
    is definitely a big plus for Looker compared to Power BI.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在仪表板投入生产之前存在于 Looker 中的这一层，与 Power BI 相比，无疑是 Looker 的一个重大优势。
- en: In Power BI, while users can interact with reports and apply filters, creating
    new analyses often requires building new reports or having more advanced skills.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Power BI 中，虽然用户可以与报告交互并应用过滤器，但创建新的分析通常需要构建新的报告或拥有更高级的技能。
- en: The ad-hoc exploration option for anyone when using Looker is a very useful
    tool to have at your organization.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用 Looker 时，任何人的即席探索选项是组织拥有的非常有用的工具。
- en: Power BI is free to use – Looker is not.
  id: totrans-157
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power BI 可以免费使用 - Looker 则不行。
- en: '*(Looker **5:7** Power BI)*'
  id: totrans-158
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **5:7** Power BI)*'
- en: Although there is a free tool called ***Looker Studio***, it differs significantly
    from the full-featured ***Looker enterprise BI platform*** – and this makes it
    quite challenging to learn Looker.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有一个名为 ***Looker Studio*** 的免费工具，但它与功能齐全的 ***Looker 企业 BI 平台*** 有显著差异——这使得学习
    Looker 非常具有挑战性。
- en: However, what I found helpful for gaining hands-on experience with Looker were
    the [interactive Google Cloud Labs](https://www.cloudskillsboost.google/paths/28)
    (these allow you to try Looker in simulated, time-limited sessions – plus, completing
    these labs can earn you a Google badge!).
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我发现对于获得 Looker 的实际操作经验来说，[互动的 Google Cloud 实验室](https://www.cloudskillsboost.google/paths/28)（这些实验室允许你在模拟、时间有限的会话中尝试
    Looker - 此外，完成这些实验室还可以获得 Google 徽章！）非常有帮助。
- en: Power BI Desktop can be downloaded totally for free as a standalone desktop
    app, and its paid enterprise version is more cost-effective compared to Looker
    where costs can spiral as your analytics team grows.
  id: totrans-161
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Power BI Desktop 可以完全免费下载作为独立的桌面应用程序，而且其付费的企业版本与 Looker 相比更具成本效益，因为随着分析团队的扩大，Looker
    的成本可能会螺旋式上升。
- en: Gartner says Power BI is the choice at the moment.
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Gartner 表示，Power BI 是当前的选择。
- en: '*(Looker **5:8** Power BI)*'
  id: totrans-163
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(Looker **5:8** Power BI)*'
- en: According to Gartner’s 2024 [Magic Quadrant for Analytics and Business Intelligence
    Platforms](https://www.gartner.com/doc/reprints?id=1-2HVUGEM6&ct=240620&st=sb),
    Microsoft’s Power BI stands out for its integration within the Microsoft ecosystem,
    functionality, and affordability.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 Gartner 2024 年的[分析和商业智能平台魔力象限](https://www.gartner.com/doc/reprints?id=1-2HVUGEM6&ct=240620&st=sb)，微软的
    Power BI 在其与微软生态系统的集成、功能性和性价比方面脱颖而出。
- en: '![Magic Quadrant for Analytics and Business Intelligence Platforms crowns Microsoft
    as a leader (source: own production; scoring from Gartner, Inc 2024; link here)](../Images/42a95c916bf56700df14a488186643f9.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![分析和商业智能平台魔力象限将微软评为领导者（来源：自产；评分来自 Gartner, Inc 2024；链接这里)](../Images/42a95c916bf56700df14a488186643f9.png)'
- en: 'Magic Quadrant for Analytics and Business Intelligence Platforms crowns Microsoft
    as a leader (source: own production; scoring from Gartner, Inc 2024; link [here](https://www.gartner.com/doc/reprints?id=1-2HVUGEM6&ct=240620&st=sb))'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 分析和商业智能平台魔力象限将微软评为领导者（来源：自产；评分来自 Gartner, Inc 2024；链接[这里](https://www.gartner.com/doc/reprints?id=1-2HVUGEM6&ct=240620&st=sb)）。
- en: My preference as a Senior Data Analyst.
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 作为高级数据分析师，我的偏好。
- en: I’ve been a heavy Power BI user for 4–5 years, and I think it’s a fantastic
    tool. It’s easy to use, packed with features, and great for people who want to
    jump in and start building. ***Functionality-wise, I prefer Power BI.***
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经是一个重度的 Power BI 用户 4-5 年了，我认为它是一个出色的工具。它易于使用，功能丰富，非常适合想要立即开始构建的人。***在功能方面，我更喜欢
    Power BI。***
- en: 'But now that I’ve transitioned to Looker and spent time understanding how it
    works, ***I’m starting to see how Looker could potentially become my #1 BI tool
    I’ll be using in the future.***'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '但现在我已经过渡到 Looker 并花时间了解它是如何工作的，***我开始看到 Looker 有可能成为我未来将使用的 #1 BI 工具。***'
- en: Why would I say that if I scored Power BI functionally better? ***It all comes
    down to the company’s context (as Gartner research says as well).***
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我在功能上给Power BI打了更高的分，我为什么会这么说？***这一切都归结于公司的环境（正如Gartner研究也指出的一样）。***
- en: 'If more companies start adopting BQ and its cloud market share grows, it creates
    a kind of lock-in effect. Even if you change jobs, you’re likely to encounter
    Looker again. So your #1 BI tool will be decided for you (the same thing can be
    of course said the other way around for Azure and PowerBI).'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 如果更多公司开始采用BQ及其云市场份额增长，它会产生一种锁定效应。即使你换工作，你也可能会再次遇到Looker。所以你的#1 BI工具将由你决定（当然，也可以反过来适用于Azure和PowerBI）。
- en: Before this, I used to work at [Zensai](https://zensai.com/) (formerly LMS365),
    w[here](https://cloud.google.com/customers/trustpilot) we relied heavily on the
    Microsoft ecosystem – even our product was built into Microsoft. But now at [Trustpilot](https://business.trustpilot.com/jobs),
    Looker makes more sense because we’re on Google Cloud Platform (GCP) – you can
    read more on how we use GCP here.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之前，我曾在[Zensai](https://zensai.com/)（原名LMS365）工作，在那里（https://cloud.google.com/customers/trustpilot）我们严重依赖Microsoft生态系统——甚至我们的产品都集成到了Microsoft中。但现在在[Trustpilot](https://business.trustpilot.com/jobs)工作，由于我们使用Google
    Cloud Platform（GCP），Looker更有意义——您可以在这里了解更多我们如何使用GCP。
- en: If your company is already using GCP and BigQuery, Looker integrates beautifully.
    It simplifies everything – from exploring data and creating charts to debugging
    issues. It’s not perfect (I could do without the lack of customization options,
    random errors, slowness from being web-based, and the need to write LookML code
    for pretty much everything), but in a Google Cloud environment, I think Looker
    is a great option as it turns into a very SIMPLE tool for creating charts, EXPLORING
    your data PRIOR to building your dashboards, as well as DEBUGGING very quickly
    – qualities I prioritize the most in any visualization tool.
  id: totrans-173
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果您的公司已经使用GCP和BigQuery，Looker可以完美集成。它简化了所有事情——从探索数据、创建图表到调试问题。它并不完美（我可以没有定制选项的缺乏、随机错误、基于Web的缓慢以及几乎需要为所有事情编写LookML代码的需求），但在Google
    Cloud环境中，我认为Looker是一个很好的选择，因为它变成了一种非常简单的工具，用于创建图表、在构建仪表板之前探索您的数据，以及快速调试——这些是我最看重的任何可视化工具的品质。
- en: That said, the choice between Power BI and Looker really depends on what your
    company uses for its 1) ***data*** ***warehouse***, 2) ***human*** ***resources***,
    3) ***previous** **employee** **experiences***, and your 4) ***financial resources***.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，Power BI和Looker之间的选择实际上取决于您的公司使用什么作为其1) ***数据仓库***，2) ***人力资源***，3) ***前员工经验***，以及您的4)
    ***财务资源***。
- en: '* * *'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**PS:** Here’s a decision-making framework table with a checklist format to
    guide you on choosing between ***Power BI*** and ***Looker.***'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '**PS：** 这里有一个决策框架表格，以清单格式引导您在***Power BI***和***Looker***之间做出选择。'
- en: '![Check whether you should get Power BI or Looker at your organization (source:
    own production)](../Images/5e0c0ef25e568c72dc3a521da6f5a1e9.png)'
  id: totrans-177
  prefs: []
  type: TYPE_IMG
  zh: '![检查您是否应该在您的组织中获取Power BI或Looker（来源：自产）](../Images/5e0c0ef25e568c72dc3a521da6f5a1e9.png)'
- en: 'Check whether you should get Power BI or Looker at your organization (source:
    own production)'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 检查您是否应该在您的组织中获取Power BI或Looker（来源：自产）
- en: '* * *'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Thank you for reading. If you enjoyed this review or learned something new,
    please ***clap*** and follow me for more. Feel free to ***connect*** and reach
    out to me on [LinkedIn](https://www.linkedin.com/in/tomas-jancovic/).
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读。如果您喜欢这篇评论或学到了新知识，请***鼓掌***并关注我获取更多内容。随时***联系***我，在[LinkedIn](https://www.linkedin.com/in/tomas-jancovic/)上找到我。
