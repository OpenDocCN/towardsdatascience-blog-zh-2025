- en: 'Mastering Prompt Engineering with Functional Testing: A Systematic Guide to
    Reliable LLM Outputs'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用功能测试掌握提示工程：可靠LLM输出的系统指南
- en: 原文：[https://towardsdatascience.com/mastering-prompt-engineering-with-functional-testing-a-systematic-guide-to-reliable-llm-outputs/](https://towardsdatascience.com/mastering-prompt-engineering-with-functional-testing-a-systematic-guide-to-reliable-llm-outputs/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/mastering-prompt-engineering-with-functional-testing-a-systematic-guide-to-reliable-llm-outputs/](https://towardsdatascience.com/mastering-prompt-engineering-with-functional-testing-a-systematic-guide-to-reliable-llm-outputs/)
- en: 'Creating efficient prompts for large language models often starts as a simple
    task… but it doesn’t always stay that way. Initially, following basic best practices
    seems sufficient: adopt the persona of a specialist, write clear instructions,
    require a specific response format, and include a few relevant examples. But as
    requirements multiply, contradictions emerge, and even minor modifications can
    introduce unexpected failures. What was working perfectly in one prompt version
    suddenly breaks in another.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 为大型语言模型创建高效的提示通常开始于一项简单的任务……但并不总是保持这种状态。最初，遵循基本最佳实践似乎足够：扮演专家的角色，撰写清晰的指令，要求特定的响应格式，并包含几个相关示例。但随着需求的增加，矛盾出现，即使是微小的修改也可能引入意外的失败。在一个提示版本中完美工作的事情，在另一个版本中突然就失效了。
- en: If you have ever felt trapped in an endless loop of trial and error, adjusting
    one rule only to see another one fail, you’re not alone! The reality is that traditional
    prompt optimisation is clearly missing a structured, more scientific approach
    that will help to ensure reliability.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经感到被困在无休止的试错循环中，调整一个规则却看到另一个失败，你并不孤单！现实是，传统的提示优化显然缺少一个结构化、更科学的途径，这将有助于确保可靠性。
- en: That’s where functional testing for prompt engineering comes in! This approach,
    inspired by methodologies of experimental science, leverages automated input-output
    testing with multiple iterations and algorithmic scoring to turn prompt engineering
    into a measurable, data-driven process.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是提示工程的功能测试的作用！这种方法，受实验科学方法论的启发，利用自动化输入-输出测试、多次迭代和算法评分，将提示工程转化为可衡量的、数据驱动的流程。
- en: No more guesswork. No more tedious manual validation. Just precise and repeatable
    results that allow you to fine-tune prompts efficiently and confidently.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 没有更多的猜测。没有更多的繁琐的手动验证。只有精确且可重复的结果，这允许你高效且自信地微调提示。
- en: In this article, we will explore a systematic approach for mastering prompt
    engineering, which ensures your LLM outputs will be efficient and reliable even
    for the most complex AI tasks.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将探讨掌握提示工程系统化方法，确保你的LLM输出对于最复杂的AI任务既高效又可靠。
- en: Balancing precision and consistency in prompt optimisation
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在提示优化中平衡精确性和一致性
- en: Adding a large set of rules to a prompt can introduce partial contradictions
    between rules and lead to unexpected behaviors. This is especially true when following
    a pattern of starting with a general rule and following it with multiple exceptions
    or specific contradictory use cases. Adding specific rules and exceptions can
    cause conflict with the primary instruction and, potentially, with each other.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示中添加大量规则可能会在规则之间引入部分矛盾，导致意外的行为。这尤其适用于从一般规则开始，随后跟随多个例外或具体矛盾用例的模式。添加特定的规则和例外可能会与主要指令冲突，甚至可能相互冲突。
- en: What might seem like a minor modification can unexpectedly impact other aspects
    of a prompt. This is not only true when adding a new rule but also when adding
    more detail to an existing rule, like changing the order of the set of instructions
    or even simply rewording it. These minor modifications can unintentionally change
    the way the model interprets and prioritizes the set of instructions.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来像是微小的修改可能会意外地影响提示的其他方面。这不仅适用于添加新规则时，也适用于添加现有规则的更多细节时，比如改变指令集的顺序，甚至只是简单地改写。这些微小的修改可能会无意中改变模型解释和优先处理指令集的方式。
- en: The more details you add to a prompt, the greater the risk of unintended side
    effects. By trying to give too many details to every aspect of your task, you
    increase as well the risk of getting unexpected or deformed results. It is, therefore,
    essential to find the right balance between clarity and a high level of specification
    to maximise the relevance and consistency of the response. At a certain point,
    fixing one requirement can break two others, creating the frustrating feeling
    of taking one step forward and two steps backward in the optimization process.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 你添加到提示中的细节越多，意外副作用的风险就越大。通过试图为任务的每个方面提供过多的细节，你也增加了获得意外或变形结果的风险。因此，找到清晰度和高度规范之间的正确平衡，以最大化响应的相关性和一致性是至关重要的。在某个点上，固定一个要求可能会破坏另外两个，从而在优化过程中产生一步向前两步向后的挫败感。
- en: Testing each change manually becomes quickly overwhelming. This is especially
    true when one needs to optimize prompts that must follow numerous competing specifications
    in a complex AI task. The process cannot simply be about modifying the prompt
    for one requirement after the other, hoping the previous instruction remains unaffected.
    It also can’t be a system of selecting examples and checking them by hand. A better
    process with a more scientific approach should focus on ensuring repeatability
    and reliability in prompt optimization.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 手动测试每个变化很快就会变得令人不堪重负。这尤其适用于需要优化必须遵循复杂AI任务中众多竞争性规范的提示时。这个过程不能仅仅是通过修改提示来满足一个要求后再满足下一个要求，希望之前的指令不受影响。它也不能是一个选择示例并手动检查的系统。一个更好的过程，采用更科学的方法，应该专注于确保提示优化的可重复性和可靠性。
- en: 'From laboratory to AI: Why testing LLM responses requires multiple iterations'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从实验室到AI：为什么测试LLMs的响应需要多次迭代
- en: Science teaches us to use replicates to ensure reproducibility and build confidence
    in an experiment’s results. I have been working in academic research in chemistry
    and biology for more than a decade. In those fields, experimental results can
    be influenced by a multitude of factors that can lead to significant variability.
    To ensure the reliability and reproducibility of experimental results, scientists
    mostly employ a method known as triplicates. This approach involves conducting
    the same experiment three times under identical conditions, allowing the experimental
    variations to be of minor importance in the result. Statistical analysis (standard
    mean and deviation) conducted on the results, mostly in biology, allows the author
    of an experiment to determine the consistency of the results and strengthens confidence
    in the findings.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 科学教导我们使用重复实验来确保可重复性，并建立对实验结果的信心。我在化学和生物学领域的学术研究工作已超过十年。在这些领域，实验结果可能受到众多因素的影响，从而导致显著的变异性。为确保实验结果的可靠性和可重复性，科学家们主要采用一种称为重复三次的方法。这种方法涉及在相同条件下重复进行相同的实验三次，使得实验变异性在结果中变得不那么重要。对结果进行的统计分析（标准均值和偏差），主要在生物学领域，使实验者能够确定结果的一致性，并增强对发现结果的信心。
- en: Just like in biology and chemistry, this approach can be used with LLMs to achieve
    reliable responses. With LLMs, the generation of responses is non-deterministic,
    meaning that the same input can lead to different outputs due to the probabilistic
    nature of the models. This variability is challenging when evaluating the reliability
    and consistency of LLM outputs.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 就像在生物学和化学中一样，这种方法可以与LLMs（大型语言模型）一起使用，以实现可靠的响应。使用LLMs时，响应的生成是非确定性的，这意味着由于模型的概率性质，相同的输入可能导致不同的输出。这种可变性在评估LLMs输出的可靠性和一致性时具有挑战性。
- en: In the same way that biological/chemical experiments require triplicates to
    ensure reproducibility, testing LLMs should need multiple iterations to measure
    reproducibility. A single test by use case is, therefore, not sufficient because
    it does not represent the inherent variability in LLM responses. At least five
    iterations per use case allow for a better assessment. By analyzing the consistency
    of the responses across these iterations, one can better evaluate the reliability
    of the model and identify any potential issues or variation. It ensures that the
    output of the model is correctly controlled.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 就像生物学/化学实验需要重复三次以确保可重复性一样，测试LLMs也应该需要多次迭代来衡量可重复性。因此，仅通过用例进行单一测试是不够的，因为它不能代表LLMs响应固有的可变性。每个用例至少进行五次迭代可以更好地进行评估。通过分析这些迭代中响应的一致性，可以更好地评估模型的可靠性并识别任何潜在的问题或变化。这确保了模型输出的正确控制。
- en: Multiply this across 10 to 15 different prompt requirements, and one can easily
    understand how, without a structured testing approach, we end up spending time
    in trial-and-error testing with no efficient way to assess quality.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 将此应用于10到15个不同的提示需求，人们可以很容易地理解，如果没有结构化的测试方法，我们最终会花费时间在试错测试中，而没有有效的方法来评估质量。
- en: 'A systematic approach: Functional testing for prompt optimization'
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**系统方法：提示优化的功能测试**'
- en: 'To address these challenges, a structured evaluation methodology can be used
    to ease and accelerate the testing process and enhance the reliability of LLM
    outputs. This approach has several key components:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了应对这些挑战，可以使用结构化评估方法来简化并加速测试过程，并提高LLM输出的可靠性。这种方法有几个关键组成部分：
- en: '**Data fixtures:** The approach’s core center is the data fixtures, which are
    composed of predefined input-output pairs specifically created for prompt testing.
    These fixtures serve as controlled scenarios that represent the various requirements
    and edge cases the LLM must handle. By using a diverse set of fixtures, the performance
    of the prompt can be evaluated efficiently across different conditions.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据测试用例：** 该方法的核心是数据测试用例，它由专门为提示测试创建的预定义输入-输出对组成。这些测试用例作为受控场景，代表LLM必须处理的多种需求和边缘情况。通过使用多样化的测试用例集，可以在不同条件下有效地评估提示的性能。'
- en: '**Automated test validation:** This approach automates the validation of the
    requirements on a set of data fixtures by comparison between the expected outputs
    defined in the fixtures and the LLM response. This automated comparison ensures
    consistency and reduces the potential for human error or bias in the evaluation
    process. It allows for quick identification of discrepancies, enabling fine and
    efficient prompt adjustments.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动测试验证：** 该方法通过比较测试用例中定义的预期输出和LLM响应来自动化对一组数据测试用例的要求验证。这种自动比较确保了一致性，并减少了评估过程中的人为错误或偏见。它允许快速识别差异，从而实现精细和高效的提示调整。'
- en: '**Multiple iterations:** To assess the inherent variability of the LLM responses,
    this method runs multiple iterations for each test case. This iterative approach
    mimics the triplicate method used in biological/chemical experiments, providing
    a more robust dataset for analysis. By observing the consistency of responses
    across iterations, we can better assess the stability and reliability of the prompt.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多次迭代：** 为了评估LLM响应的固有可变性，该方法对每个测试用例进行多次迭代。这种迭代方法模仿了在生物/化学实验中使用的三重方法，为分析提供了更稳健的数据集。通过观察迭代中响应的一致性，我们可以更好地评估提示的稳定性和可靠性。'
- en: '**Algorithmic scoring:** The results of each test case are scored algorithmically,
    reducing the need for long and laborious « human » evaluation. This scoring system
    is designed to be objective and quantitative, providing clear metrics for assessing
    the performance of the prompt. And by focusing on measurable outcomes, we can
    make data-driven decisions to optimize the prompt effectively.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**算法评分：** 每个测试用例的结果都是通过算法进行评分的，这减少了长时间且繁重的“人工”评估需求。这个评分系统旨在客观和量化，为评估提示的性能提供清晰的指标。通过关注可衡量的结果，我们可以做出基于数据的决策，有效地优化提示。'
- en: 'Step 1: Defining test data fixtures'
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一步：定义测试数据测试用例
- en: 'Selecting or creating compatible test data fixtures is the most challenging
    step of our systematic approach because it requires careful thought. A fixture
    is not only any input-output pair; it must be crafted meticulously to evaluate
    the most accurate as possible performance of the LLM for a specific requirement.
    This process requires:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 选择或创建兼容的测试数据测试用例是我们系统方法中最具挑战性的步骤，因为它需要仔细思考。测试用例不仅包括任何输入-输出对；它必须精心制作，以确保尽可能准确地评估LLM针对特定需求的表现。这个过程需要：
- en: 1\. A deep understanding of the task and the behavior of the model to make sure
    the selected examples effectively test the expected output while minimizing ambiguity
    or bias.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 对任务和模型行为的深入理解，以确保选定的示例能够有效地测试预期的输出，同时最大限度地减少歧义或偏见。
- en: 2\. Foresight into how the evaluation will be conducted algorithmically during
    the test.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 预见测试期间如何通过算法进行评估。
- en: The quality of a fixture, therefore, depends not only on the good representativeness
    of the example but also on ensuring it can be efficiently tested algorithmically.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，测试用例的质量不仅取决于示例的良好代表性，还在于确保其能够高效地通过算法进行测试。
- en: 'A fixture consists of:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 测试用例包括：
- en: • **Input example:** This is the data that will be given to the LLM for processing.
    It should represent a typical or edge-case scenario that the LLM is expected to
    handle. The input should be designed to cover a wide range of possible variations
    that the LLM might have to deal with in production.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: • **输入示例:** 这是将被提供给LLM处理的数据。它应该代表LLM预期处理的典型或边缘情况。输入应设计为涵盖LLM在生产中可能必须处理的广泛可能的变体。
- en: • **Expected output:** This is the expected result that the LLM should produce
    with the provided input example. It is used for comparison with the actual LLM
    response output during validation.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: • **预期输出:** 这是LLM应该使用提供的输入示例生成的预期结果。它用于在验证期间与实际LLM响应输出进行比较。
- en: 'Step 2: Running automated tests'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：运行自动化测试
- en: Once the test data fixtures are defined, the next step involves the execution
    of automated tests to systematically evaluate the performance of the LLM response
    on the selected use cases. As previously stated, this process makes sure that
    the prompt is thoroughly tested against various scenarios, providing a reliable
    evaluation of its efficiency.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦定义了测试数据固定装置，下一步就是执行自动化测试，以系统地评估LLM响应在所选用例上的性能。如前所述，此过程确保提示在各种场景中得到彻底测试，从而提供对其效率的可靠评估。
- en: Execution process
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 执行过程
- en: 1\. **Multiple iterations:** For each test use case, the same input is provided
    to the LLM multiple times. A simple for loop in nb_iter with nb_iter = 5 and voila!
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 1. **多次迭代:** 对于每个测试用例，相同的输入被多次提供给LLM。在nb_iter中使用简单的for循环，nb_iter = 5，就这样！
- en: 2\. **Response comparison:** After each iteration, the LLM response is compared
    to the expected output of the fixture. This comparison checks whether the LLM
    has correctly processed the input according to the specified requirements.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **响应比较:** 在每次迭代后，LLM响应与固定装置的预期输出进行比较。此比较检查LLM是否根据指定要求正确处理了输入。
- en: '3\. **Scoring mechanism:** Each comparison results in a score:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **评分机制:** 每次比较结果都会得到一个分数：
- en: '◦ Pass (1): The response matches the expected output, indicating that the LLM
    has correctly handled the input.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 通过（1）：响应与预期输出匹配，表明LLM已正确处理输入。
- en: '◦ Fail (0): The response does not match the expected output, signaling a discrepancy
    that needs to be fixed.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 失败（0）：响应与预期输出不匹配，表明需要修复的差异。
- en: 4\. **Final score calculation:** The scores from all iterations are aggregated
    to calculate the overall final score. This score represents the proportion of
    successful responses out of the total number of iterations. A high score, of course,
    indicates high prompt performance and reliability.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 4. **最终分数计算:** 所有迭代的分数被汇总以计算总体最终分数。这个分数代表成功响应占总迭代次数的比例。当然，高分数表示高提示性能和可靠性。
- en: '**Example:** **Removing author signatures from an article**'
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**示例:** **从文章中移除作者签名**'
- en: Let’s consider a simple scenario where an AI task is to remove author signatures
    from an article. To efficiently test this functionality, we need a set of fixtures
    that represent the various signature styles.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个简单的场景，其中AI任务是从文章中移除作者签名。为了有效地测试这个功能，我们需要一组代表各种签名风格的固定装置。
- en: 'A dataset for this example could be:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这个示例的数据集可以是：
- en: '| Example Input | Expected Output |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| 示例输入 | 预期输出 |'
- en: '| A long article Jean Leblanc | The long article |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| 一篇长文 Jean Leblanc | 长文 |'
- en: '| A long article P. W. Hartig | The long article |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| 一篇长文 P. W. Hartig | 长文 |'
- en: '| A long article MCZ | The long article |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| 一篇长文 MCZ | 长文 |'
- en: '**Validation process:**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**验证过程:**'
- en: '**Signature removal check:** The validation function checks if the signature
    is absent from the rewritten text. This is easily done programmatically by searching
    for the signature needle in the haystack output text.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**签名移除检查:** 验证函数检查签名是否已从重写的文本中移除。这可以通过在输出文本中搜索签名针来程序化地轻松完成。'
- en: '**Test failure criteria:** If the signature is still in the output, the test
    fails. This indicates that the LLM did not correctly remove the signature and
    that further adjustments to the prompt are required. If it is not, the test is
    passed.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试失败标准:** 如果签名仍然在输出中，则测试失败。这表明LLM没有正确移除签名，并且需要进一步调整提示。如果不是，则测试通过。'
- en: The test evaluation provides a final score that allows a data-driven assessment
    of the prompt efficiency. If it scores perfectly, there is no need for further
    optimization. However, in most cases, you will not get a perfect score because
    either the consistency of the LLM response to a case is low (for example, 3 out
    of 5 iterations scored positive) or there are edge cases that the model struggles
    with (0 out of 5 iterations).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 测试评估提供了一个最终分数，允许对提示效率进行数据驱动评估。如果得分完美，则无需进一步优化。然而，在大多数情况下，你不会得到满分，因为LLM对某个案例的响应一致性可能很低（例如，5次迭代中有3次得分积极）或者存在模型难以处理的边缘情况（5次迭代中0次得分积极）。
- en: The feedback clearly indicates that there is still room for further improvements
    and it guides you to reexamine your prompt for ambiguous phrasing, conflicting
    rules, or edge cases. By continuously monitoring your score alongside your prompt
    modifications, you can incrementally reduce side effects, achieve greater efficiency
    and consistency, and approach an optimal and reliable output.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈清楚地表明，仍有进一步改进的空间，并指导你重新审视你的提示，以消除模糊的措辞、冲突的规则或边缘情况。通过持续监控你的分数以及提示修改，你可以逐步减少副作用，提高效率和一致性，并接近最优和可靠的输出。
- en: A perfect score is, however, not always achievable with the selected model.
    Changing the model might just fix the situation. If it doesn’t, you know the limitations
    of your system and can take this fact into account in your workflow. With luck,
    this situation might just be solved in the near future with a simple model update.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，使用所选模型并不总是能够获得满分。改变模型可能只是解决了问题。如果不行，你就知道你系统的局限性，并可以在你的工作流程中考虑这一事实。幸运的话，这种情况可能只是通过简单的模型更新在不久的将来得到解决。
- en: Benefits of this method
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这种方法的益处
- en: '**Reliability of the result**: Running five to ten iterations provides reliable
    statistics on the performance of the prompt. A single test run may succeed once
    but not twice, and consistent success for multiple iterations indicates a robust
    and well-optimized prompt.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果的可靠性**：进行五到十次迭代可以提供关于提示性能的可靠统计数据。单次测试运行可能成功一次但不会两次，而多次迭代的一致成功表明提示是健壮且经过良好优化的。'
- en: '**Efficiency of the process:** Unlike traditional scientific experiments that
    may take weeks or months to replicate, automated testing of LLMs can be carried
    out quickly. By setting a high number of iterations and waiting for a few minutes,
    we can obtain a high-quality, reproducible evaluation of the prompt efficiency.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过程效率**：与可能需要数周或数月才能复制的传统科学实验不同，LLM的自动测试可以快速进行。通过设置高迭代次数并等待几分钟，我们可以获得高质量、可重复的提示效率评估。'
- en: '**Data-driven optimization:** The score obtained from these tests provides
    a data-driven assessment of the prompt’s ability to meet requirements, allowing
    targeted improvements.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据驱动优化**：这些测试获得的分数提供了对提示满足要求能力的数据驱动评估，允许有针对性的改进。'
- en: '**Side-by-side evaluation:** Structured testing allows for an easy assessment
    of prompt versions. By comparing the test results, one can identify the most effective
    set of parameters for the instructions (phrasing, order of instructions) to achieve
    the desired results.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并行评估**：结构化测试使得对提示版本进行评估变得容易。通过比较测试结果，可以确定实现预期结果的最有效参数集（指令措辞、指令顺序）。'
- en: '**Quick iterative improvement:** The ability to quickly test and iterate prompts
    is a real advantage to carefully construct the prompt ensuring that the previously
    validated requirements remain as the prompt increases in complexity and length.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**快速迭代改进**：快速测试和迭代提示的能力是精心构建提示的一个真正优势，确保在提示变得更加复杂和长时，之前验证的要求仍然保持不变。'
- en: By adopting this automated testing approach, we can systematically evaluate
    and enhance prompt performance, ensuring consistent and reliable outputs with
    the desired requirements. This method saves time and provides a robust analytical
    tool for continuous prompt optimization.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 通过采用这种自动测试方法，我们可以系统地评估和提升提示性能，确保符合要求的持续和可靠的输出。这种方法节省了时间，并为持续的提示优化提供了一个健壮的分析工具。
- en: 'Systematic prompt testing: Beyond prompt optimization'
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系统性提示测试：超越提示优化
- en: 'Implementing a systematic prompt testing approach offers more advantages than
    just the initial prompt optimization. This methodology is valuable for other aspects
    of AI tasks:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 实施系统性的提示测试方法不仅提供了初始提示优化的优势，而且在人工智能任务的其它方面也具有价值：
- en: 1\. **Model comparison:**
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 1. **模型比较**：
- en: '◦ Provider evaluation: This approach allows the efficient comparison of different
    LLM providers, such as ChatGPT, Claude, Gemini, Mistral, etc., on the same tasks.
    It becomes easy to evaluate which model performs the best for their specific needs.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 提供商评估：这种方法允许高效地比较不同LLM提供商，如ChatGPT、Claude、Gemini、Mistral等，在同一任务上的表现。评估哪个模型最适合他们的特定需求变得容易。
- en: '◦ Model version: State-of-the-art model versions are not always necessary when
    a prompt is well-optimized, even for complex AI tasks. A lightweight, faster version
    can provide the same results with a faster response. This approach allows a side-by-side
    comparison of the different versions of a model, such as Gemini 1.5 flash vs.
    1.5 pro vs. 2.0 flash or ChatGPT 3.5 vs. 4o mini vs. 4o, and allows the data-driven
    selection of the model version.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 模型版本：当提示得到良好优化时，即使是复杂的AI任务，也不一定需要最先进的模型版本。轻量级、更快的版本可以提供相同的结果，并具有更快的响应速度。这种方法允许对模型的各个版本进行并行比较，例如Gemini
    1.5闪存版与1.5专业版与2.0闪存版或ChatGPT 3.5与4o迷你版与4o，并允许基于数据驱动选择模型版本。
- en: 2\. **Version upgrades:**
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **版本升级：**
- en: '◦ Compatibility verification: When a new model version is released, systematic
    prompt testing helps validate if the upgrade maintains or improves the prompt
    performance. This is crucial for ensuring that updates do not unintentionally
    break the functionality.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 兼容性验证：当发布新模型版本时，系统性的提示测试有助于验证升级是否保持了或提高了提示性能。这对于确保更新不会意外地破坏功能至关重要。
- en: '◦ Seamless Transitions: By identifying key requirements and testing them, this
    method can facilitate better transitions to new model versions, allowing fast
    adjustment when necessary in order to maintain high-quality outputs.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 无缝过渡：通过识别关键需求和测试它们，这种方法可以促进向新模型版本的更好过渡，以便在必要时快速调整，以保持高质量的输出。
- en: 3. **Cost optimization:**
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **成本优化：**
- en: '◦ Performance-to-cost ratio: Systematic prompt testing helps in choosing the
    best cost-effective model based on the performance-to-cost ratio. We can efficiently
    identify the most efficient option between performance and operational costs to
    get the best return on LLM costs.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 性能与成本比：系统性的提示测试有助于根据性能与成本比选择最佳性价比模型。我们可以有效地在性能和运营成本之间识别最有效的选项，以获得最佳的LLM成本回报。
- en: Overcoming the challenges
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 克服挑战
- en: The biggest challenge of this approach is the preparation of the set of test
    data fixtures, but the effort invested in this process will pay off significantly
    as time passes. Well-prepared fixtures save considerable debugging time and enhance
    model efficiency and reliability by providing a robust foundation for evaluating
    the LLM response. The initial investment is quickly returned by improved efficiency
    and effectiveness in LLM development and deployment.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的最大挑战是准备测试数据集，但随着时间的推移，投入的努力将显著回报。准备良好的数据集可以节省大量的调试时间，并通过为评估LLM响应提供坚实的基础来提高模型效率和可靠性。在LLM开发和部署中的改进效率和有效性将迅速收回初始投资。
- en: Quick pros and cons
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 快速的利弊分析
- en: '**Key advantages:**'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**主要优势**：'
- en: '**Continuous improvement:** The ability to add more requirements over time
    while ensuring existing functionality stays intact is a significant advantage.
    This allows for the evolution of the AI task in response to new requirements,
    ensuring that the system remains up-to-date and efficient.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续改进**：随着时间的推移，能够添加更多要求的同时确保现有功能保持完整是一个显著的优势。这允许AI任务根据新要求进行演变，确保系统保持最新和高效。'
- en: '**Better maintenance:** This approach enables the easy validation of prompt
    performance with LLM updates. This is crucial for maintaining high standards of
    quality and reliability, as updates can sometimes introduce unintended changes
    in behavior.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更好的维护**：这种方法使得使用LLM更新轻松验证提示性能变得容易。这对于保持高质量和可靠性标准至关重要，因为更新有时会引入行为上的意外变化。'
- en: '**More flexibility**: With a set of quality control tests, switching LLM providers
    becomes more straightforward. This flexibility allows us to adapt to changes in
    the market or technological advancements, ensuring we can always use the best
    tool for the job.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更多灵活性**：通过一套质量控制测试，切换LLM提供商变得更加简单。这种灵活性使我们能够适应市场变化或技术进步，确保我们始终能够使用最适合工作的最佳工具。'
- en: '**Cost optimization:** Data-driven evaluations enable better decisions on performance-to-cost
    ratio. By understanding the performance gains of different models, we can choose
    the most cost-effective solution that meets the needs.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本优化：** 数据驱动的评估能够帮助我们在性能与成本比上做出更好的决策。通过理解不同模型的性能提升，我们可以选择最符合需求且成本效益最高的解决方案。'
- en: '**Time savings:** Systematic evaluations provide quick feedback, reducing the
    need for manual testing. This efficiency allows to quickly iterate on prompt improvement
    and optimization, accelerating the development process.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**节省时间：** 系统性评估提供快速反馈，减少了手动测试的需求。这种效率允许快速迭代提示的改进和优化，加速开发过程。'
- en: Challenges
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 挑战
- en: '**Initial time investment:** Creating test fixtures and evaluation functions
    can require a significant investment of time.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始时间投资：** 创建测试工具和评估函数可能需要大量的时间投入。'
- en: '**Defining measurable validation criteria:** Not all AI tasks have clear pass/fail
    conditions. Defining measurable criteria for validation can sometimes be challenging,
    especially for tasks that involve subjective or nuanced outputs. This requires
    careful consideration and may involve a difficult selection of the evaluation
    metrics.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义可衡量的验证标准：** 并非所有人工智能任务都有明确的通过/失败条件。为验证定义可衡量的标准有时可能具有挑战性，尤其是对于涉及主观或细微输出的任务。这需要仔细考虑，可能涉及对评估指标的艰难选择。'
- en: '**Cost associated with multiple tests:** Multiple test use cases associated
    with 5 to 10 iterations can generate a high number of LLM requests for a single
    test automation. But if the cost of a single LLM call is neglectable, as it is
    in most cases for text input/output calls, the overall cost of a test remains
    minimal.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与多次测试相关的成本：** 与5到10次迭代相关的多个测试用例可能会为单个测试自动化生成大量大型语言模型请求。但如果单个大型语言模型调用的成本可以忽略不计，如大多数文本输入/输出调用的情况，测试的整体成本仍然保持最低。'
- en: 'Conclusion: When should you implement this approach?'
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论：何时应该实施这种方法？
- en: Implementing this systematic testing approach is, of course, not always necessary,
    especially for simple tasks. However, for complex AI workflows in which precision
    and reliability are critical, this approach becomes highly valuable by offering
    a systematic way to assess and optimize prompt performance, preventing endless
    cycles of trial and error.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 实施这种系统性的测试方法当然并非总是必要的，尤其是对于简单任务。然而，对于精度和可靠性至关重要的复杂人工智能工作流程，这种方法通过提供一种系统性的方式来评估和优化提示性能，防止了无休止的试错循环，变得非常有价值。
- en: By incorporating functional testing principles into prompt engineering, we transform
    a traditionally subjective and fragile process into one that is measurable, scalable,
    and robust. Not only does it enhance the reliability of LLM outputs, it helps
    achieve continuous improvement and efficient resource allocation.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将功能测试原则融入提示工程，我们将一个传统上主观且脆弱的过程转变为可衡量、可扩展和稳健的过程。这不仅增强了大型语言模型输出的可靠性，还有助于实现持续改进和高效资源分配。
- en: The decision to implement systematic prompt testing should be based on the complexity
    of your project. For scenarios demanding high precision and consistency, investing
    the time to set up this methodology can significantly improve outcomes and speed
    up the development processes. However, for simpler tasks, a more classical, lightweight
    approach may be sufficient. The key is to balance the need for rigor with practical
    considerations, ensuring that your testing strategy aligns with your goals and
    constraints.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 实施系统化提示测试的决定应基于项目的复杂性。对于需要高精度和一致性的场景，投入时间建立这种方法可以显著提高成果并加快开发过程。然而，对于更简单的任务，更经典、轻量级的方法可能就足够了。关键是要在严谨性和实用性之间取得平衡，确保你的测试策略与你的目标和限制相一致。
- en: Thanks for reading!
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！
