- en: '* * *'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Neural Networks for Time-Series Imputation
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 时间序列估计的神经网络
- en: A simple feedforward neural network will be implemented to predict and impute
    the missing values. The network uses input cyclical features such as hour and
    day-of-week for learning temporal patterns in time-dependent trends.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 将实现一个简单的前馈神经网络来预测和估计缺失值。网络使用输入周期性特征，如小时和星期几，来学习时间相关趋势中的时间模式。
- en: 'Steps:'
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤：
- en: '**Feature Engineering**: Forming relevant features from which the Neural Network
    can learn the temporal pattern.'
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**特征工程**：形成神经网络可以从中学习时间模式的有关特征。'
- en: '**Data Splitting**: Prepare training data, excluding the rows with missing
    values.'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据分割**：准备训练数据，排除带有缺失值的行。'
- en: '**Model Training**: Train a feedforward NN to predict energy production.'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模型训练**：训练一个前馈神经网络来预测能源生产。'
- en: '**Imputation**: The model trained in the previous step is used to impute missing
    values.'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**估计**：使用上一步训练的模型来估计缺失值。'
- en: 'Let’s begin:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始：
- en: '[PRE1]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '[PRE2]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![A comparative line plot showing original energy production data (with missing
    values) in red and NN-imputed data in blue | Image by Author.](../Images/0d750de3f6c7a649618b3b6db685d9fb.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![比较线图显示原始能源生产数据（带有缺失值）用红色表示，NN估计数据用蓝色表示 | 图像由作者提供。](../Images/0d750de3f6c7a649618b3b6db685d9fb.png)'
- en: A comparative line plot showing original energy production data (with missing
    values) in red and NN-imputed data in blue | Image by Author.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 比较线图显示原始能源生产数据（带有缺失值）用红色表示，NN估计数据用蓝色表示 | 图像由作者提供。
- en: Here, I have chosen to present the first 100 points of imputed data.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我选择展示估计数据的第一个100个点。
- en: 'Notice **how the continuity of the gaps** in the blue line of the imputed data
    is smoothly filled in compared with the red-dotted line presenting the original
    data: **missing and existing points pass nicely into one another;** imputation
    fitted well together with the observed values.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 注意**蓝色估计数据中的间隙连续性**是如何与红色虚线表示的原始数据平滑地填充的：**缺失点和现有点顺利地结合在一起**；估计值与观测值很好地拟合在一起。
- en: '**This is a good sign**: this detailed comparison validates the quality of
    this imputation, especially in smaller segments of the data.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**这是一个好迹象**：这种详细的比较验证了估计质量，尤其是在数据的小部分中。'
- en: Statistical Comparison
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 统计比较
- en: 'Let’s compare their statistics:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们比较它们的统计数据：
- en: '[PRE4]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![Statistical Comparison | Image by Author](../Images/f2a5cfd59732cb45928a789ee2197048.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![统计比较 | 图像由作者提供](../Images/f2a5cfd59732cb45928a789ee2197048.png)'
- en: Statistical Comparison | Image by Author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 统计比较 | 图像由作者提供
- en: The **mean and standard deviation** of the imputed data are very close to the
    original; this means that there is consistency in the central tendency and variability.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 估计数据的**平均值和标准差**非常接近原始数据；这意味着在中心趋势和变异性方面存在一致性。
- en: The range within the values is maintained, insinuating that no unrealistic extremes
    were introduced.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 值的范围保持不变，暗示没有引入不切实际的反常极端值。
- en: The resemblance of these statistics means the N**N-imputed data is highly similar**
    in distribution compared to the original one and thus does not break the integrity
    of the dataset.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这些统计数据的相似性意味着N**N**估计的数据与原始数据相比在分布上高度相似，因此不会破坏数据集的完整性。
- en: Autocorrelation, STL Decomposition and Residual Analysis
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自相关、STL分解和残差分析
- en: We will apply ACF, STL Decomposition to evaluate the imputed data on the underlying
    seasonal patterns, trends, and autocorrelations.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将应用自相关函数（ACF）、STL分解来评估估计数据在潜在的季节模式、趋势和自相关中的表现。
- en: ACF Comparison Function
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ACF比较函数
- en: '[PRE5]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![Side-by-side ACF plots comparing temporal dependencies in the original (interpolated)
    and NN-imputed datasets. Both charts show similar periodic patterns, validating
    the preservation of temporal dependencies. | Image by author](../Images/38a30e101c14645b357bf096eb86569e.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![比较原始（插值）和NN补全数据集的时间依赖性的ACF图。两个图表都显示了相似的周期性模式，验证了时间依赖性的保留。| 图像由作者提供](../Images/38a30e101c14645b357bf096eb86569e.png)'
- en: Side-by-side ACF plots comparing temporal dependencies in the original (interpolated)
    and NN-imputed datasets. Both charts show similar periodic patterns, validating
    the preservation of temporal dependencies. | Image by author
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 并排显示比较原始（插值）和NN补全数据集的时间依赖性的ACF图。两个图表都显示了相似的周期性模式，验证了时间依赖性的保留。| 图像由作者提供
- en: We can see that both **plots show very similar patterns,** confirming that the
    imputation indeed preserved temporal dependencies!
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，两个**图表显示的图案非常相似**，证实了补全确实保留了时间依赖性！
- en: We can conclude from these plots that the **imputed NN dataset captured well
    the periodic nature of the original data.**
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 从这些图表中，我们可以得出结论，**补全的NN数据集很好地捕捉了原始数据的周期性**。
- en: '[PRE6]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![A trend analysis plot comparing the STL decomposition trends of the original
    (interpolated) and NN-imputed datasets. The chart shows minimal differences, indicating
    the imputed data maintains long-term trends. | Image by author](../Images/6a86e7244b037063d346a8850c43075f.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![趋势分析图比较原始（插值）和NN补全数据集的STL分解趋势。图表显示最小差异，表明补全数据保持了长期趋势。| 图像由作者提供](../Images/6a86e7244b037063d346a8850c43075f.png)'
- en: A trend analysis plot comparing the STL decomposition trends of the original
    (interpolated) and NN-imputed datasets. The chart shows minimal differences, indicating
    the imputed data maintains long-term trends. | Image by author
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 比较原始（插值）和NN补全数据集的STL分解趋势的趋势分析图。图表显示最小差异，表明补全数据保持了长期趋势。| 图像由作者提供
- en: The **trends of the original interpolated data and the NN-imputed data are very
    similar**. Both follow a smooth pattern, which indicates that the imputation process
    preserved the long-term trends in the data quite well!
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**原始插值数据和NN补全数据集的趋势非常相似**。两者都遵循平滑的图案，这表明插值过程很好地保留了数据中的长期趋势！'
- en: This confirms that Neural Network has learned the underlying dynamics in the
    time series without introducing significant distortion to the trend component.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这证实了神经网络已经学会了时间序列中的潜在动态，而没有对趋势成分引入显著的扭曲。
- en: '![Seasonal Component plot comparing the original and imputed data. | Image
    by author](../Images/71450cec7933a05602e3b95309b46e68.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![比较原始和补全数据集的季节成分图。| 图像由作者提供](../Images/71450cec7933a05602e3b95309b46e68.png)'
- en: Seasonal Component plot comparing the original and imputed data. | Image by
    author
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 比较原始和补全数据集的季节成分图。| 图像由作者提供
- en: Finally, **seasonal components** of the original interpolated and NN-imputed
    data are intercepting very well. The periodical nature of this energy production
    dataset (day night cycles) was preserved.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，**原始插值和NN补全数据集的季节成分**交点非常好。这个能源生产数据集（日夜周期）的周期性得到了保留。
- en: This suggests that the model captured the inherent **cyclicality of the data
    quite well**, which is very important for accurate preservation of seasonality
    in downstream forecasting tasks.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明模型很好地捕捉了数据的内在**周期性**，这对于下游预测任务中准确保留季节性非常重要。
- en: Residual Analysis
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 残差分析
- en: '![Figure 7: Dual visualizations showcasing seasonal components and residuals
    for original (interpolated) and NN-imputed datasets. Seasonal patterns are nearly
    identical, while residuals demonstrate consistent noise levels across both datasets.
    | Image by author](../Images/934b808d2394b27728a85d31a5971889.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图7：展示原始（插值）和NN补全数据集的季节成分和残差的两种可视化。季节模式几乎相同，而残差显示了两个数据集一致的噪声水平。| 图像由作者提供](../Images/934b808d2394b27728a85d31a5971889.png)'
- en: 'Figure 7: Dual visualizations showcasing seasonal components and residuals
    for original (interpolated) and NN-imputed datasets. Seasonal patterns are nearly
    identical, while residuals demonstrate consistent noise levels across both datasets.
    | Image by author'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图7：展示原始（插值）和NN补全数据集的季节成分和残差的两种可视化。季节模式几乎相同，而残差显示了两个数据集一致的噪声水平。| 图像由作者提供
- en: Similar white noise patterns are visible in the residuals for both datasets.
    The imputation by NN does not introduce many anomalies. One can notice some small
    deviations in the original due to the presence of missing values.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在两个数据集的残差中都可以看到类似的白噪声模式。神经网络的插补没有引入许多异常。人们可以注意到由于存在缺失值，原始数据中存在一些小的偏差。
- en: Potential Limitations of Neural Networks
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 神经网络的潜在局限性
- en: 'Let’s start with the obvious: training Neural Networks can be very **computationally
    intensive and may ask for too many computational resources** (CPU/GPU), especially
    in cases of larger datasets or deeper architectures.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从显而易见的事情开始：训练神经网络可能非常**计算密集，可能需要过多的计算资源**（CPU/GPU），尤其是在大型数据集或深层架构的情况下。
- en: Neural Networks **cannot handle non-stationary time-series data**, meaning the
    trends or seasonality can change with time. Models normally assume stationarity
    unless explicitly handled.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络**无法处理非平稳时间序列数据**，这意味着趋势或季节性可能会随时间变化。模型通常假设平稳性，除非明确处理。
- en: NNs need **adequate and good-quality data to train on**. If the dataset contains
    too many missing values, it can be challenging to learn meaningful patterns, leading
    to poor imputations.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络需要**充足且高质量的数据进行训练**。如果数据集中包含太多缺失值，可能难以学习到有意义的模式，从而导致插补效果不佳。
- en: NNs **contain many hyperparameters** that require a lot of tuning, including
    the number of layers/neurons, learning rate, and activation functions.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络**包含许多超参数**，需要大量调整，包括层数/神经元数量、学习率和激活函数。
- en: NNs are usually considered **"black-box" models**, as it is hardly possible
    to understand what logical procedure the network uses for imputing the missing
    values.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络通常被认为是**“黑盒”模型**，因为几乎不可能理解网络用于插补缺失值的逻辑过程。
- en: NNs are **prone to overfitting in cases of small datasets or datasets with strong
    noise.** The model may memorize the pattern rather than generalize it.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据集较小或噪声较强的数据集中，神经网络**容易过拟合**。模型可能记住模式而不是泛化它。
- en: When to Avoid NN for Time-Series Imputation
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 何时避免使用神经网络进行时间序列插补
- en: High proportion of missing values, such as >50%, with insufficient training
    data.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺失值比例高，如>50%，且训练数据不足。
- en: Either time or resource limitations prohibit model training or tuning of hyperparameters.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无论是时间限制还是资源限制，都阻碍了模型训练或超参数调整。
- en: The dataset is either small or lacking complex patterns-simpler methods will
    be sufficient.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据集要么很小，要么缺乏复杂模式——更简单的方法就足够了。
- en: Applications require high interpretability of the imputation process.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用需要高度可解释的插补过程。
- en: Conclusion
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we applied a simple NN model to impute time-series missing
    data on mock energy data.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们应用了一个简单的神经网络模型来插补模拟能源数据中的时间序列缺失数据。
- en: We saw that the imputation method of Neural Network **preserved the important
    statistical and temporal properties from the original data,** including **time
    trends, seasonal patterns, and autocorrelation.**
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到，神经网络的插补方法**保留了原始数据的重要统计和时序属性**，包括**时间趋势、季节性模式和自相关性**。
- en: We deduce from here that the NN model provides a good approach toward the missing-value
    problem in a time-series data set.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们由此推断，神经网络模型为时间序列数据集中的缺失值问题提供了一个良好的解决方案。
- en: Obviously, on real datasets, we face some difficulties; most of those problems
    would come about related to data quality, its black-box nature and computational
    resources required.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，在真实数据集中，我们面临一些困难；这些问题大多与数据质量、其黑盒性质和所需的计算资源有关。
- en: Thank you for reading 😉 . What other imputations methods have worked for you?
    Let me know in the comments!
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读😉。您还使用了哪些插补方法？请在评论中告诉我！
