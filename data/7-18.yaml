- en: 'Data Note: Mock Energy Production Dataset'
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据笔记：模拟能源生产dataset
- en: In Part 1, we used a mock dataset of energy production at 10-minute intervals
    between January 1, 2023, and March 1, 2023\. To make the case more realistic,
    we took roughly 10% of the data points as missing for imputation.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在第1部分，我们使用了2023年1月1日至2023年3月1日之间每10分钟间隔的能源生产模拟数据集。为了使案例更真实，我们取了大约10%的数据点作为缺失值进行估计。
- en: '[PRE0]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![Figure 1: Mock Energy Production Data with Missing values. | Image by author.](../Images/0677616afbda55fd9ab4735d34f4d36a.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图1：带有缺失值的模拟能源生产数据。| 图像由作者提供。](../Images/0677616afbda55fd9ab4735d34f4d36a.png)'
- en: 'Figure 1: Mock Energy Production Data with Missing values. | Image by author.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：带有缺失值的模拟能源生产数据。| 图像由作者提供。
- en: '* * *'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Working with time-series data? Then you need key techniques to master its
    analysis:**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**处理时间序列数据？那么你需要掌握关键技术来精通其分析：**'
- en: '[**5 Must-Know Techniques for Mastering Time-Series Analysis**](https://towardsdatascience.com/5-must-know-techniques-for-mastering-time-series-analysis-a23ccf4d053a)'
  id: totrans-34
  prefs:
  - PREF_BQ
