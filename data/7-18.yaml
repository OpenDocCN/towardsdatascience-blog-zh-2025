- en: 'Neural Networks for Time-Series Imputation: Tackling Missing Data'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 时间序列缺失数据插补：处理缺失数据
- en: 原文：[https://towardsdatascience.com/neural-networks-for-time-series-imputation-tackling-missing-data-8f86f605a03a/](https://towardsdatascience.com/neural-networks-for-time-series-imputation-tackling-missing-data-8f86f605a03a/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/neural-networks-for-time-series-imputation-tackling-missing-data-8f86f605a03a/](https://towardsdatascience.com/neural-networks-for-time-series-imputation-tackling-missing-data-8f86f605a03a/)
- en: '![Source: DALL-E.](../Images/c04ef561a1c85506d155770c62f5f41b.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![来源：DALL-E.](../Images/c04ef561a1c85506d155770c62f5f41b.png)'
- en: 'Source: DALL-E.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：DALL-E。
- en: One of the common problems in **time-series analysis is missing data.**
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 时间序列分析中常见的一个问题是**缺失数据**。
- en: As we have seen in [Part 1](https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-6b2273ff8b45),
    **simple imputation techniques or regression-based models** like linear regression
    and decision trees can get us a long way.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在[第1部分](https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-6b2273ff8b45)中看到的，**简单的插补技术或基于回归的模型**，如线性回归和决策树，可以让我们走得很远。
- en: But what if we need to handle more **subtle patterns and capture fine-grained
    fluctuations** in complex time-series data?
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果我们需要处理更**微妙模式并捕捉复杂时间序列数据中的细微波动**呢？
- en: In this article, we will explore how a **Neural Network (NN) can be used to
    impute missing values.**
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将探讨如何**使用神经网络来插补缺失值**。
- en: The strengths of NNs are their **capability to capture nonlinear patterns and
    interactions in data.** Although NNs are usually computationally expensive, they
    can offer a very effective way to impute missing time-series data in cases where
    simpler models fail.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络（NN）的优势在于其**捕捉数据中非线性模式和交互的能力**。尽管神经网络通常计算成本较高，但它们可以提供一种非常有效的方法来插补缺失的时间序列数据，在简单模型失败的情况下。
- en: We will work with the same dataset as in Part 1 and Part 2, **with 10% values
    missing, introduced randomly for the mock energy production dataset.**
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将与第1部分和第2部分相同的dataset进行工作，**其中包含10%的缺失值，这些缺失值随机引入到模拟能源生产dataset中**。
- en: 'Don’t miss out **Part 1** of this series:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 不要错过本系列的**第1部分**：
- en: '[**Missing Data in Time-Series: Machine Learning Techniques**](https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-6b2273ff8b45)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**时间序列中的缺失数据：机器学习技术**](https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-6b2273ff8b45)'
- en: 'And **Part 2, where we employ KNN**:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 以及**第2部分，其中我们使用KNN**：
- en: '[**Missing Data in Time-Series? Machine Learning Techniques (Part 2)**](https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-part-2-86fac838d1ce)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**时间序列中的缺失数据？机器学习技术（第2部分）**](https://towardsdatascience.com/missing-data-in-time-series-machine-learning-techniques-part-2-86fac838d1ce)'
