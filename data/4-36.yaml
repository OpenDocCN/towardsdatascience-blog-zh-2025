- en: The Three Phases of Learning Machine Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 学习机器学习的三个阶段
- en: 原文：[https://towardsdatascience.com/the-three-phases-of-learning-machine-learning-df0a53148dd3/](https://towardsdatascience.com/the-three-phases-of-learning-machine-learning-df0a53148dd3/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/the-three-phases-of-learning-machine-learning-df0a53148dd3/](https://towardsdatascience.com/the-three-phases-of-learning-machine-learning-df0a53148dd3/)'
- en: 'After 6+ years of experience with machine learning, both in research and industry,
    it’s very interesting to see how far the field has gotten over the years. I still
    remember sitting in seminar rooms, listening to lectures on everything ML: deep
    learning, reinforcement learning, random forests, neural networks, natural language
    processing, …'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在拥有6年以上机器学习经验之后，无论是在研究还是行业中，看到这个领域多年来的发展非常有趣。我仍然记得坐在研讨室内，听着关于所有机器学习的讲座：深度学习、强化学习、随机森林、神经网络、自然语言处理、……
- en: '![Photo by Vlad Bagacian on Unsplash](../Images/dde5fcc6f706157791136983c35db4d4.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![Vlad Bagacian在Unsplash上的图片](../Images/dde5fcc6f706157791136983c35db4d4.png)'
- en: Photo by [Vlad Bagacian](https://unsplash.com/@vladbagacian?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Vlad Bagacian](https://unsplash.com/@vladbagacian?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上提供
- en: 'One particular NLP lecture stands out in my memory, where we discussed the
    rapid advancements in the field. We were discussing vanilla attention mechanisms
    the week before and were now looking at Transformer-based approaches. The great
    tutor showed us graphs with the parameter counts of the models. We then looked
    up the then-recent advances, and it became clear: any figure is outdated within
    a month. That was when my ML journey had barely started, and already the amount
    of innovation that was published again and again was insane.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我记忆中，有一场特定的自然语言处理讲座格外突出，我们讨论了该领域的快速进步。上周我们还在讨论简单的注意力机制，而现在我们正在研究基于Transformer的方法。这位伟大的导师向我们展示了模型的参数计数图。然后我们查阅了当时最新的进展，很明显：任何数据在一个月内就会过时。那时我的机器学习之旅才刚刚开始，而再次发布的创新数量已经令人难以置信。
- en: 'Since then, my journey proceeded in several phases. From exchange with other
    ML people, it appears that they have a similar experience: From a beginner to
    seasoned practitioner, the journey can be divided into the three following phases:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 从那时起，我的旅程经历了几个阶段。与其他机器学习人士的交流表明，他们有类似的经历：从入门者到经验丰富的从业者，这个旅程可以分为以下三个阶段：
- en: '**Phase I:** Beginner (~1 year; this article) **Phase II:** Intermediate (~1
    to 3 years; upcoming) **Phase III:** Advanced (~5+ years; upcoming)'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**第一阶段：入门阶段（约1年；本文）** **第二阶段：中级阶段（1至3年；即将推出）** **第三阶段：高级阶段（5年以上；即将推出）**'
- en: The beginner phase of learning Machine Learning
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学习机器学习的入门阶段
- en: 'This article’s focus is on the first phase in your machine learning journey:
    the beginner phase. To help you start in ML, you can use the checklist below to
    track your progress (also see section *Resources*).'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的重点在于您机器学习之旅的第一个阶段：入门阶段。为了帮助您开始学习机器学习，您可以使用以下清单来跟踪您的进度（也可参见*资源*部分）。
- en: '![](../Images/2c202fb108201b5a5a0ce81defa42848.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2c202fb108201b5a5a0ce81defa42848.png)'
- en: 'The beginner phase is everyone’s starting stage. At this stage, your primary
    goal is to understand the fundamental ideas behind machine learning: how machines
    learn from data and the essential algorithms that power ML models. You’ll dive
    into topics like decision trees, k-nearest neighbors (KNN), and linear regression.
    These concepts serve as the building blocks for your further ML journey.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 入门阶段是每个人的起点。在这个阶段，您的首要目标是理解机器学习背后的基本思想：机器如何从数据中学习以及驱动ML模型的基本算法。您将深入研究决策树、k近邻（KNN）和线性回归等主题。这些概念是您进一步机器学习之旅的基石。
- en: At the start of your journey, it probably makes sense to get an overview of
    the field of Deep Learning. Here, I can recommend MIT’s free Introduction to Deep
    Learning course, see *Resources*. It is an intense lecture showcasing all areas
    of (modern) deep machine learning. It allows you to see what’s awaiting you of
    the next year(s).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的旅程开始时，了解深度学习领域的大致情况可能是有意义的。在这里，我可以推荐麻省理工学院的免费《深度学习导论》课程，参见*资源*。这是一场紧张的讲座，展示了（现代）深度机器学习的所有领域。它让您看到下一年（几年）等待您的是什么。
- en: Practically speaking, we can divide the beginner phase into five categories.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，我们可以将入门阶段分为五个类别。
- en: Data Handling
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据处理
- en: Classic Machine Learning
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 经典机器学习
- en: Neural Networks
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 神经网络
- en: Theory
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理论
- en: Miscellaneous Skills
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 其他技能
- en: Data Handling
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据处理
- en: 'In this category, you’ll learn how to work with small datasets that fit easily
    into your computer’s memory. This is good, as you do not need to rent expensive
    compute online. Often, these datasets are readily available within ML frameworks
    like PyTorch or TensorFlow. Common examples of small-sized datasets include:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个类别中，你将学习如何处理容易装入你电脑内存的小数据集。这是好事，因为你不需要在线租用昂贵的计算资源。通常，这些数据集在像PyTorch或TensorFlow这样的机器学习框架中很容易找到。小型数据集的常见例子包括：
- en: 'Images: MNIST (handwritten digits)'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像：MNIST（手写数字）
- en: 'Audio: ESC-50 environmental sound recordings'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 音频：ESC-50环境声音录音
- en: 'Time-series: Heartbeat timeseries categorization'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间序列：心跳时间序列分类
- en: 'Text: IMDB movie reviews for sentiment analysis'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本：IMDB电影评论用于情感分析
- en: The advantage of these beginner datasets is that they are well-documented and
    easy to manipulate. Usually, the preprocessing you have to do for them is just
    resizing images or trimming sentences, which you can handle with just a few lines
    of code. This lets you focus on learning the core concepts without having to preprocess
    larger-than-memory datasets.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这些入门级数据集的优势在于它们有很好的文档和易于操作。通常，你必须为它们做的预处理只是调整图像大小或修剪句子，这只需要几行代码就可以处理。这让你能够专注于学习核心概念，而无需预处理大于内存的数据集。
- en: Should you ever need more compute, then try Google Colab. It’s a free offering
    by Google that let’s you run Jupyter Notebooks (i.e., interactive python code)
    directly in your browser. See *Resources*.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要更多的计算资源，那么尝试Google Colab。这是Google提供的一项免费服务，允许你在浏览器中直接运行Jupyter Notebooks（即交互式Python代码）。见*资源*。
- en: Classic Machine Learning
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 经典机器学习
- en: 'While the focus of this post is on *deep* machine learning – as opposed to
    classic machine learning – it’s useful to learn the time-proven basics as well.
    Among these classic ML techniques, a few stand out:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然本文的重点是**深度**机器学习——与经典机器学习相对——学习经过时间考验的基础知识也是有用的。在这些经典机器学习技术中，有一些脱颖而出：
- en: 'Regression: The goal here is to predict continuous values based on input data.
    The Boston House pricing dataset is a often-used dataset for regression; the task
    is to predict house prices based on features like square footage, location, etc.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回归：这里的目的是根据输入数据预测连续值。波士顿房价数据集是回归中常用的数据集；任务是根据如面积、位置等特征预测房价。
- en: 'Clustering: This is about grouping similar data points together. K-means clustering
    is a great entry point for beginners, and I recently read a paper, where the authors
    combined advanced deep learning techniques with k-means clustering.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聚类：这是关于将相似的数据点分组在一起。K-means聚类是初学者的绝佳起点，我最近读了一篇论文，其中作者将高级深度学习技术与k-means聚类相结合。
- en: 'Support Vector Machines (SVM): SVMs focus on finding the best decision boundary
    (hyperplane, essentially a border in *n*-dimensional space) to separate data into
    distinct classes. They are often used for classification datasets.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支持向量机（SVM）：SVMs专注于找到最佳决策边界（超平面，本质上是在*n*-维空间中的边界）来将数据分离成不同的类别。它们通常用于分类数据集。
- en: In general, though most of the recent advancements are often the result of deep
    learning techniques, classic machine learning still is relevant. You do not always
    need the advanced ML techniques, sometimes the basics suffice.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 通常来说，尽管最近的大部分进步往往是深度学习技术的结果，但经典机器学习仍然相关。你并不总是需要高级的机器学习技术，有时基础知识就足够了。
- en: Neural Networks
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 神经网络
- en: Once you’re comfortable with the basics of classic ML, you’ll begin transitioning
    to neural networks (NNs), the foundation of deep learning. I recommend starting
    with **dense neural networks**, which consist of multiple fully connected layers,
    or linear layers in PyTorch. In these layers, each input is multiplied by a weight
    and combined with a bias to produce an output. You can use these networks for
    small and mid-sized datasets alike.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你对经典机器学习的基础知识感到舒适，你将开始过渡到神经网络（NNs），这是深度学习的基础。我建议从**密集神经网络**开始，它由多个全连接层组成，或者在PyTorch中是线性层。在这些层中，每个输入都会乘以一个权重并与偏差结合以产生输出。你可以使用这些网络处理小型和中型数据集。
- en: After dense neural networks, you’ll dive into **convolutional neural networks**
    (CNNs). These type of network are essential for tasks involving image data. CNNs
    use convolution operations to identify features like edges, textures, or shapes
    in images, regardless of their position in the image. This location-independent
    ability makes CNNs a very versatile approach
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在密集神经网络之后，你将深入探索**卷积神经网络**（CNNs）。这类网络对于涉及图像数据的任务至关重要。CNNs使用卷积运算来识别图像中的边缘、纹理或形状等特征，无论它们在图像中的位置如何。这种位置无关的能力使CNNs成为一种非常灵活的方法。
- en: Lastly, for sequential data (such as time series) I recommend playing with **recurrent
    neural networks** (RNNs). RNNs are designed to retain information from previous
    steps, making them ideal for tasks like language modeling or time-series forecasting.
    In fact, earlier machine learning research (around 2014) primarily used RNNs for
    machine translation, see *Resources*.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，对于序列数据（如时间序列），我建议尝试**循环神经网络**（RNNs）。RNNs被设计用来保留之前步骤的信息，这使得它们非常适合像语言建模或时间序列预测这样的任务。实际上，早期的机器学习研究（大约在2014年）主要使用RNNs进行机器翻译，参见*资源*。
- en: Theory
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理论
- en: Together with hands-on learning, it’s essential to develop a theoretical understanding
    of the methods you’re using. This includes mathematical notation, matrix operations,
    and the underlying principles of machine learning algorithms.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 与动手学习相结合，发展对你所使用方法的理论理解是至关重要的。这包括数学符号、矩阵运算以及机器学习算法的底层原理。
- en: For instance, understanding Σ notation (summation) helps make complex mathematical
    expressions more concise and readable. Though they require some learning, using
    this way to express operations can help avoiding disambiguities, a downside of
    communicating in natural language. With practice, the math behind algorithms will
    begin to make more sense.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，理解Σ符号（求和）有助于使复杂的数学表达式更加简洁易读。虽然它们需要一些学习，但使用这种方式表达操作可以帮助避免自然语言交流中的歧义，这是自然语言交流的一个缺点。随着实践，算法背后的数学将开始变得更有意义。
- en: At this stage, you’ll also encounter key metrics used to evaluate ML models,
    such as accuracy, mean squared error, precision, and recall. These metrics will
    help you measure your models’ performance.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，你还会遇到用于评估ML模型的关键指标，如准确率、均方误差、精确率和召回率。这些指标将帮助你衡量你模型的性能。
- en: Miscellaneous Skills
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他技能
- en: As you are studying classic machine learning, neural networks, and the theory,
    you will naturally also develop practical skills in the beginner phase. These
    skills include programming, model management, and virtual environments.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在学习经典机器学习、神经网络和理论时，你也会在入门阶段自然地发展实际技能。这些技能包括编程、模型管理和虚拟环境。
- en: '**For programming, Python is the go-to language for ML**, and its large ecosystem
    of libraries (like NumPy, pandas, Scikit-learn, etc.) will be invaluable.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于编程，Python是ML的首选语言**，它庞大的库生态系统（如NumPy、pandas、Scikit-learn等）将非常有价值。'
- en: 'The features these libraries provide come in handy once you analyze your dataset.
    For example, what’s the value range? Are there some outliers? How extreme are
    they? Are there unusable data samples? These are some questions that you want
    to answer, which usually happens on the go:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这些库提供的功能在你分析数据集时非常有用。例如，值域是多少？有没有一些异常值？它们有多极端？有没有不可用的数据样本？这些问题是你想要回答的，通常是在进行中：
- en: You write a short code snippet – it breaks because a data sample is different
    – you update the code – you have learned more about your data.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你写一个简短的代码片段——它因为数据样本不同而失败——你更新代码——你对你数据了解得更多了。
- en: Basically any time your are honing your data analysis skills, you will be improving
    your coding skills as well.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，每次你在磨练你的数据分析技能时，你也会提高你的编码技能。
- en: '**Model management**, on the other hand, means saving, loading, and sharing
    trained models. This is relevant when you are training you neural network in one
    script, but evaluate it in a separate one.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，**模型管理**意味着保存、加载和共享训练好的模型。当你在一个脚本中训练你的神经网络，但在另一个脚本中评估它时，这很有用。
- en: Lastly, everything you do on the code level requires a Python interpreter, a
    program that helps you execute your Python code. As you will have several projects,
    I recommend **getting familiar with virtual environments**. These "encapsulate"
    all the requirements and dependencies into their own disk space, so that your
    projects do not interfere with each other.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你在代码层面所做的每一件事都需要一个Python解释器，这是一个帮助你执行Python代码的程序。由于你将会有多个项目，我建议**熟悉虚拟环境**。这些“封装”了所有需求和依赖到它们自己的磁盘空间中，这样你的项目就不会相互干扰。
- en: '* * *'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: After the Beginner Stage
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初学者阶段之后
- en: By the end of the beginner phase, you’ll have a solid understanding of core
    machine learning concepts, hands-on experience with basic models, and can read
    the mathematical formulation. Through your focus on (small) projects, you have
    practiced a variety of ML methods. This is a good foundation to tackle more complex
    topics in the next phase, the intermediate phase. It covers years 1 to 3 of your
    ML journey, and is currently in preparation. Come back here later or follow me
    or Towards Data Science to get notified when it is published.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 到了初学者阶段的尾声，你将会有对核心机器学习概念的扎实理解，对基本模型的实际操作经验，并能阅读数学公式。通过关注（小型）项目，你已经练习了各种机器学习方法。这是在下一阶段，即中级阶段，应对更复杂主题的好基础。它涵盖了你的机器学习旅程的第1到3年，目前正在准备中。稍后回来这里，或者关注我或Towards
    Data Science，以获取发布通知。
- en: '* * *'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Further Reading:**'
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**进一步阅读：**'
- en: '[**How I’d Learn Machine Learning Again, After 6 Years**](https://towardsdatascience.com/how-id-learn-machine-learning-again-after-6-years-16847fb2b72c)'
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**六年后，我再次学习机器学习的方法**](https://towardsdatascience.com/how-id-learn-machine-learning-again-after-6-years-16847fb2b72c)'
- en: ''
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Learning ML or Learning About Learning ML?**](https://towardsdatascience.com/learning-ml-or-learning-about-learning-ml-fe0c3b7b6440)'
  id: totrans-56
  prefs:
