- en: Urban Graph Networks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 城市图网络
- en: 原文：[https://towardsdatascience.com/urban-graph-networks-3723ac92c926/](https://towardsdatascience.com/urban-graph-networks-3723ac92c926/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/urban-graph-networks-3723ac92c926/](https://towardsdatascience.com/urban-graph-networks-3723ac92c926/)
- en: '![Image created by midjourney.ai - provided by author - Brandenburg Gate Berlin
    - schematic.](../Images/9e699cd65c422cd014257f07a3776eda.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由 midjourney.ai 创建的图像 - 由作者提供 - 柏林勃兰登堡门 - 图解。](../Images/9e699cd65c422cd014257f07a3776eda.png)'
- en: Image created by midjourney.ai – provided by author – Brandenburg Gate Berlin
    – schematic.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由 midjourney.ai 创建的图像 – 由作者提供 – 柏林勃兰登堡门 - 图解。
- en: Why not plan a trip to Berlin? Why not visit all the famous places like Brandenburg
    Gate or Checkpoint Charlie? As we are data people, we search for a data-informed
    solution. How can we receive data and find an optimized way using data analysis?
    This is what this article is all about. We explain how to load data from OpenStreetMap,
    how to visualize data with python’s folium library, and which algorithms you would
    need to plan an optimized trip.
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么不计划一次柏林之旅？为什么不参观所有著名的景点，比如勃兰登堡门或查理检查站？作为数据人员，我们寻找基于数据的解决方案。我们如何接收数据并使用数据分析找到优化的方法？这正是本文的主题。我们解释了如何从
    OpenStreetMap 加载数据，如何使用 Python 的 folium 库可视化数据，以及你需要哪些算法来规划一次优化的旅行。
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'This article is structured as follows. We begin by introducing how OpenStreetMap
    works and how we can receive data via python. Then, we discover how we can display
    data via python’s *folium* library. Afterwards we deep dive into graph theory
    and its applications. For instance, routing via Dijkstra’s algorithm and approaching
    the Traveling Salesman Problem are the final steps towards a data-informed optimized
    trip visiting Berlin’s famous spots. You will learn:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的结构如下。我们首先介绍 OpenStreetMap 的工作原理以及我们如何通过 Python 接收数据。然后，我们探索如何通过 Python 的
    *folium* 库显示数据。之后，我们将深入研究图论及其应用。例如，通过 Dijkstra 算法进行路由和解决旅行商问题，是访问柏林著名景点数据驱动优化旅行的最后步骤。你将学习：
- en: how OpenStreetMaps data model works,
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: OpenStreetMap 数据模型是如何工作的，
- en: how Coordinate Reference Systems work,
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 坐标参考系统是如何工作的，
- en: basics of Graph Theory and its algorithmic challenges, as well as,
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图论的基本原理及其算法挑战，以及，
- en: how to draw beautiful maps with python’s folium library.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用 Python 的 folium 库绘制美丽的地图。
- en: Let’s get started.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧。
- en: OpenStreetMap – a brief introduction
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: OpenStreetMap – 简要介绍
- en: OpenStreetMap is an international project with the aim to create an open and
    free map of the world, see [https://www.openstreetmap.org](https://www.openstreetmap.org).
    It is accessible under Open Database License (ODbL) and one could fetch data with
    a read-only API called Overpass API (cf. [http://overpass-api.de)](http://overpass-api.de)).
    In this article we use a python library called *overpy* to query overpass API
    to receive data from OpenStreetMap, see [https://pypi.org/project/overpy/](https://pypi.org/project/overpy/)
    for details.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: OpenStreetMap 是一个旨在创建一个开放和免费的世界地图的国际项目，请参阅 [https://www.openstreetmap.org](https://www.openstreetmap.org)。它受
    Open Database License (ODbL) 保护，并且可以使用名为 Overpass API 的只读 API 获取数据（参见 [http://overpass-api.de](http://overpass-api.de)）。在这篇文章中，我们使用一个名为
    *overpy* 的 Python 库来查询 Overpass API，以从 OpenStreetMap 接收数据，有关详细信息请参阅 [https://pypi.org/project/overpy/](https://pypi.org/project/overpy/)。
- en: Before we start, let’s find out how OpenStreetMap’s **data model** works. Basically,
    its data model consists of *nodes*, *ways* and _relations._For instance, *nodes*
    do have a specific position determined via latitude and longitude, like a tree,
    a bench, or a corner of a building. Tags and comments can be added, as well as
    these nodes are building blocks for more complex spatial structures like ways,
    buildings, or other areas. A *way* is an ordered list of nodes resulting in polygons
    or lines, if the first node is the last or not. Then it might represent a building
    or a park for polygons, or a river or highway in the latter case.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，让我们了解一下 OpenStreetMap 的 **数据模型** 是如何工作的。基本上，其数据模型由 *节点*、*线路* 和 _关系_
    组成。例如，*节点* 具有通过纬度和经度确定的特定位置，如一棵树、一张长椅或一栋建筑的角落。可以添加标签和注释，以及这些节点是更复杂空间结构（如线路、建筑或其他区域）的构建块。*线路*
    是节点的一个有序列表，如果第一个节点是最后一个节点，则结果为多边形或线条。然后它可能代表多边形中的建筑或公园，在后一种情况下可能代表河流或高速公路。
- en: Moreover, *relations* describe situations like a bus route consisting of more
    than one way. Throughout this article, we focus on nodes and ways. According to
    this fundamental data model, any object might carry more information than its
    geographical position. There are labels such as "highway" or "amenity" available
    or opening hours for shops. With these classifications at hand, one could extract
    suitable data for a plethora of spatial use cases.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，*关系*描述了由多个道路组成的情况，如公交线路。在整个文章中，我们关注节点和道路。根据这个基本数据模型，任何对象可能携带的信息比其地理位置更多。有诸如“highway”或“amenity”之类的标签可用，或者商店的营业时间。有了这些分类在手，人们可以提取适用于大量空间用例的合适数据。
- en: 'A remark on **data quality**: a large, open community is collecting data. This
    community cannot be at any place at any time. Therefore, use this data carefully
    and think about the data critically. In general, infrastructure changes slowly,
    but it changes over time and space. Also social and commercial facts change and
    it is quite difficult to keep up with this pace. Keep that in mind whenever you
    work with OpenStreetMap data.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 关于**数据质量**的备注：一个大型、开放的社区正在收集数据。这个社区在任何时候都不可能在任何地方。因此，在使用这些数据时要小心，并批判性地思考数据。一般来说，基础设施变化缓慢，但随时间和空间而变化。社会和商业事实也在变化，跟上这种步伐相当困难。在处理OpenStreetMap数据时，请记住这一点。
- en: Getting started with overpy and folium
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 开始使用overpy和folium
- en: At the beginning, there is usually a python environment and some libraries one
    should use to explore, gather, and process data. Throughout this first paragraph,
    we use *overpy* for data extraction, and *folium* to visualize spatial data. A
    starting point might be choosing a correct bounding box as an object where to
    look for data. The secret sauce here is to find out the correct coordinates in
    a reasonable coordinate system. Here, we use **latitude** and **longitude** in
    the WGS84 notation having a rectangular bounding box including Berlin. We will
    revisit WGS84 later on and explain it in depth.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始时，通常需要一个Python环境以及一些用于探索、收集和处理数据的库。在整个第一段中，我们使用*overpy*进行数据提取，并使用*folium*来可视化空间数据。一个起点可能是选择一个正确的边界框作为查找数据的目标对象。这里的秘诀是在一个合理的坐标系中找到正确的坐标。在这里，我们使用WGS84记法中的**纬度**和**经度**，包括柏林的矩形边界框。我们稍后将对WGS84进行回顾并深入解释。
- en: Please pay attention to the chosen area. It could cause fetching a huge amount
    of data if you do not choose this bounding box smart. My advice, use [https://overpass-turbo.eu](https://overpass-turbo.eu)
    to pre-query and find out the right dimensions. This particular overpass query
    fetches way-objects from the given bounding box. The code snippet below also introduces
    a *class MapConfig* configuring *folium* map parameters.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意选择区域。如果你没有智能地选择这个边界框，可能会导致获取大量数据。我的建议是使用[https://overpass-turbo.eu](https://overpass-turbo.eu)进行预查询并找出正确的尺寸。这个特定的overpass查询从给定的边界框中获取道路对象。下面的代码片段还介绍了一个配置*folium*地图参数的*class
    MapConfig*。
- en: After creating an API-query, there are functions necessary to execute it. Therefore,
    before putting all puzzle pieces together, we introduce functions called _fetch_highway*data*
    and _process_highway*data*. The first function returns an overpass API object
    combined with the given query in a particular bounding box. As usual in software
    design, one could argue which statements to pass and what is the most modular
    object. For different tasks, one could possibly pass also self-defined queries
    and OSM objects to get a more individual statement.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建API查询之后，需要执行它的函数。因此，在将所有拼图碎片组合在一起之前，我们引入了名为_fetch_highway*data*和_process_highway*data*的函数。第一个函数返回一个与给定查询结合的overpass
    API对象，在特定的边界框内。在软件设计方面，人们可能会争论应该传递哪些语句以及最模块化的对象是什么。对于不同的任务，人们还可能传递自定义查询和OSM对象以获得更个性化的语句。
- en: The second function processes the given raw data from the API and restructures
    them to dictionary data objects. The idea is to extract and split coordinates,
    nodes, and ways.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个函数处理API提供的原始数据，并将它们重构为字典数据对象。想法是提取和分割坐标、节点和道路。
- en: As a next step we introduce a function that creates a *folium* map called _create*map*.
    In general, a *folium* map object will be initialized by *Map*, passing a starting
    location, a certain zoom-factor and information about the underlying tiles. These
    have already been initialized in the *MapConfig* class above.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 作为下一步，我们引入一个创建*folium*地图的函数，称为_create*map*。一般来说，*folium*地图对象将通过*Map*初始化，传递起始位置、一定的缩放因子以及关于底层瓦片的信息。这些已经在上面的*MapConfig*类中初始化了。
- en: There are two ways of adding data to a map. Either you are simply adding data
    to the map-object *m*, what results in simply showing the data without having
    any options.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 向地图添加数据有两种方式。要么你只是向地图对象*m*添加数据，这会导致简单地显示数据而没有任何选项。
- en: Another way is to add data to different layers. With this technique you are
    able to toggle layers on and off, or hide these when mounting a map. The corresponding
    Layer Control can then be found in the upper right corner.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种方式是将数据添加到不同的层中。使用这种技术，你可以切换层的开关，或者当挂载地图时隐藏这些层。相应的图层控制可以在右上角找到。
- en: To configure the main flow of the program, we introduce a function called *main*
    to orchestrate all other functions. In addition, one can also add the constructing
    nodes as a layer. But, be aware of how your map will react in terms of response
    times. In January 2025 the given bounding box contained 55K highway entities and
    about 135K node entities.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了配置程序的主要流程，我们引入了一个名为*main*的函数来协调所有其他函数。此外，我们还可以将构建节点作为一层添加。但请注意，你的地图在响应时间方面的反应。截至2025年1月，给定的边界框包含55K个高速公路实体和大约135K个节点实体。
- en: The resulting _map*object* will return a map and the following image is a screenshot.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的**地图对象*将返回一个地图，以下图像是截图。
- en: '![Openstreetmap data from Berlin city centre displayed via folium library -
    highways - provided by author](../Images/e9c2e894322f3577751c8f321da09be3.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![柏林市中心Openstreetmap数据通过folium库显示 - 高速公路 - 由作者提供](../Images/e9c2e894322f3577751c8f321da09be3.png)'
- en: Openstreetmap data from Berlin city centre displayed via folium library – highways
    – provided by author
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 柏林市中心Openstreetmap数据通过folium库显示——高速公路——由作者提供
- en: 'Recap: In this first paragraph we introduced OpenStreetMap’s data model and
    showed how to fetch and display highway data via Python’s *folium* and *overpy*
    libraries. Coming up next: what graph theory is and how could a shortest-path
    be constructed via Dijkstra’s algorithm.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾：在本段的第一段中，我们介绍了OpenStreetMap的数据模型，并展示了如何通过Python的*folium*和*overpy*库获取和显示高速公路数据。接下来：什么是图论以及如何通过Dijkstra算法构建最短路径。
- en: '* * *'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Graph theory – an introduction
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图论——简介
- en: In its simplest mathematical description a graph is a tuple consisting of **nodes**
    *V* and **edges** *E*, i.e. *(V,E)*. To be honest, this sounds very abstract.
    Let’s fill it with life. There are many examples what a node, also called vortex,
    could represent. For instance, it could be some point on earth described by latitude
    and longitude. Or, it could simply represent a person in a social network.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在其最简单的数学描述中，图是一个由**节点***V*和**边***E*组成的元组，即*(V,E)*。说实话，这听起来非常抽象。让我们给它注入生命力。有许多例子可以说明节点，也称为涡流，可以代表什么。例如，它可以是地球上由纬度和经度描述的某个点。或者，它简单地代表社交网络中的人。
- en: On the other hand, an edge is a connection between two nodes. Regarding the
    two contexts from above, an edge could be a road connecting two locations on earth,
    or a relation "knowing each other" between two human beings. This turns out to
    be a model for real life relations and exceeds reagular tabular relations by far.
    Moreover, this basic **graph structure** can be enriched in many different ways.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，边是两个节点之间的连接。关于上面的两种情况，边可以是连接地球上两个地点的道路，或者两个人之间“认识”的关系。这实际上是一个现实生活关系的模型，远远超过了常规的表格关系。此外，这种基本的**图结构**可以通过许多不同的方式来丰富。
- en: For example, one could think of edges that are non-symmetic, i.e. we have one-way
    streets or people who know someone, but the other one is not aware of the other
    person. These graphs are called **directed graphs**. Also, one could add **weights**
    to each edge, resulting in a tuple *(V, E, w)*. For example, adding the length
    of a road between two locations helps finding out how far different locations
    are apart. In a social network one could introduce a realtion on "how close do
    you know a person?" having values betwenn 0 and 1.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们可以考虑非对称的边，即我们有一去不复返的道路或知道某人的人，但另一个人却不知道这个人。这些图被称为**有向图**。此外，我们还可以给每条边添加**权重**，从而得到一个元组*(V,
    E, w)*。例如，添加两个地点之间道路的长度有助于找出不同地点之间的距离。在社交网络中，我们可以引入一个关于“你认识一个人有多近？”的关系，其值介于0和1之间。
- en: 'So far, we have solely described two basic situations – navigation and social
    network – with this theory, not solving any problems yet and not defining any
    problem statements. One could think of questions like:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们仅用这个理论描述了两种基本的情况——导航和社交网络——还没有解决问题，也没有定义任何问题陈述。人们可以思考以下问题：
- en: How do I find my way from location A to location B?
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我如何从地点A到地点B找到我的路？
- en: Which are the most influential people in my social network?
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的社交网络中最有影响力的人是谁？
- en: How can I find a roundtrip through the city centre visiting 5 different points
    of interest?
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我该如何在城市中心找到一条访问 5 个不同兴趣点的往返路线？
- en: 'Small world experiment: what is the average path length in social networks?'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小世界实验：社交网络中的平均路径长度是多少？
- en: 'Each of these might result in a new medium article but aren’t part of this
    one. Let’s focus on the given OpenStreetMap data and how there is a shortest-path
    between two locations. We begin with the famous **Dijkstra algorithm,** a building
    block of all common navigation systems constructing a shortest path. The basic
    idea is the following: follow edges with the smallest known distance to a node.
    In every step distances are being updated to every neighborhood of a node. If
    there is a smaller distance, update, if not, keep the actual distance. We will
    use this algorithm to find a shortest-path from location A to B through Berlin.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这些可能都会导致新的中等文章，但并不属于这篇文章。让我们专注于给定的 OpenStreetMap 数据以及两个位置之间的最短路径。我们以著名的 **Dijkstra
    算法** 开始，这是所有常见导航系统构建最短路径的基础。基本思想如下：跟随到节点的已知最小距离的边。在每一步中，都会更新到节点每个邻域的距离。如果存在更小的距离，则更新，否则保持实际距离。我们将使用此算法从柏林的
    A 地点到 B 地点找到最短路径。
- en: 'Remark on graph algorithms: There are two important aspects with this specific
    problem statements.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 关于图算法的备注：对于这个特定的问题陈述有两个重要的方面。
- en: Many of these algorithms have large runtimes. That is, runtime-complexity could
    increase dramatically just by adding a few more data points, because there are
    so many new possibilities available.
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 许多这些算法的运行时间都很长。也就是说，运行时间复杂度可能仅通过添加几个更多数据点就急剧增加，因为有如此多的新可能性。
- en: Many times there is no unique solution available, because there are two or more
    paths for example that minimize certain distances, or the target functional.
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 许多时候没有唯一的解决方案可用，因为可能存在两条或多条路径，例如最小化某些距离或目标函数。
- en: There are many graph problems that are of class NP, i.e. called NP-hard. We
    will briefly discuss what this means in one of the next paragraphs. Sometimes
    there are no algorithms available to find a one best solution. Therefore algorithms
    are in place to heuristically find a solution.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 存在许多属于 NP 类的图问题，即称为 NP-hard 的问题。我们将在下一段中简要讨论这意味着什么。有时没有算法可以找到最佳解决方案。因此，算法被放置在那里以启发式地找到解决方案。
- en: Shortest path approach – from Kanzleramt to Alexanderplatz
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最短路径方法 – 从联邦总理府到亚历山大广场
- en: In this paragraph we are trying to find the shortest path from Bundeskanzleramt
    to Alexanderplatz—a task where usually Dijkstra’s algorithm comes into play. Let’s
    walk through the code. Additionally to *folium*‘s library we do need *NetworkX*,
    *numpy*, and *Transformer* from *pyproj* here.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在本段中，我们试图找到从联邦总理府到亚历山大广场的最短路径——这是一个通常使用 Dijkstra 算法解决的问题。让我们来分析代码。除了 *folium*
    库之外，我们还需要 *NetworkX*、*numpy* 和来自 *pyproj* 的 *Transformer*。
- en: Since I wanted to try out to work with *dataclasses* in this article, we create
    a class called *BerlinPOI* here, holding information about points of interest
    in Berlin. It comes up as some sort of dictionary, mapping internal names of POIs
    to OpenStreetMap node IDs. I manually compiled these by walking through *overpass
    turbo* and exploring these IDs.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我想在这篇文章中尝试使用 *dataclasses*，所以我们在这里创建了一个名为 *BerlinPOI* 的类，用于存储有关柏林兴趣点的信息。它类似于某种字典，将兴趣点的内部名称映射到
    OpenStreetMap 节点 ID。我通过在 *overpass turbo* 中漫步并探索这些 ID 来手动编译这些信息。
- en: '**Coordinate reference systems – crs**As a next step, we want to create a weighted
    graph consisting of edges that are street segments and the distances between nodes.
    One crucial aspect here is the given **coordinate reference system**, crs. CRS
    have always been of strategic importance in history – that is why there are so
    many of them. The World Geodetic System 1984 – ***WGS84*** – measures in polar
    coordinates (latitude and longitude) originating from a center point of this planet.
    This, in contrary, leads to the fact, that you cannot use these coordinates to
    measure distances directly on the surface – earth’s curvature comes into play.
    To cover this, geodesics assume that earth is locally flat. A coordinate transformation
    on a locally flat space is necessary. If this happens, one could use Pythagoras’
    theorem to compute metric distances. We use UTM32N here. ***UTM*** stands for
    *Universal Transverse Mercator* which is a projection on a local grid. The specification
    32N tells us which grid to choose. If you want to learn more about it, or you
    need to find out which grid to choose, there are many resources on the internet
    on these geo-spatial topics and calculations.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**坐标参考系统 – crs** 作为下一步，我们希望创建一个由街道段和节点之间距离组成的加权图。这里的一个关键方面是给定的 **坐标参考系统**，crs。在历史上，CRS
    一直具有战略重要性——这就是为什么有这么多CRS的原因。1984年世界大地测量系统——***WGS84***——使用极坐标（纬度和经度）进行测量，坐标原点位于这个星球的中心点。与此相反，这导致了一个事实，即你不能直接使用这些坐标在表面上测量距离——地球的曲率就起作用了。为了解决这个问题，大地测量学假设地球在局部上是平的。在局部平面上进行坐标变换是必要的。如果发生这种情况，就可以使用毕达哥拉斯定理来计算度量距离。我们在这里使用UTM32N。***UTM***代表*通用横轴墨卡托*，这是一种在局部网格上的投影。32N的指定告诉我们选择哪个网格。如果你想了解更多关于它，或者你需要找出选择哪个网格，互联网上有许多关于这些地理空间主题和计算的资源。'
- en: So, basically, the creation of a street graph transforms the given coordinates
    in *WGS84* notation to *UTM32N* and calculates the distances for every given segment
    or edge of the graph. Be careful here, there might occur performance issues depending
    on how large your amount of data is. As a result we find an object *G* that holds
    nodes, edges and also weights. You find the corresponding code-snippet below.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，基本上，创建街道图将给定的 *WGS84* 表示的坐标转换为 *UTM32N*，并计算图中每个给定段或边的距离。请注意，这里可能会出现性能问题，具体取决于你的数据量大小。结果，我们找到了一个包含节点、边和权重的对象
    *G*。下面是相应的代码片段。
- en: '**Applying Dijkstra’s algorithm** To visualize a route we introduce a function
    that takes graph *G*, start and end point and some visual control parameters.
    A very helpful library here is *NetworkX* which provides Dijkstra’s algorithm.
    Input parameters are *G*, start point, and end point. Not only the path will be
    calculated, also the length of this path. In the graphs nodes we stored the original
    *WGS84* coordinates to draw them with *folium* on a map. *Polyline* and *Marker*
    objects help to visualize the path as well as starting and end points. We have
    created an exception here, since you never know which points have been chosen
    and if they are valid.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**应用Dijkstra算法** 为了可视化路线，我们引入了一个函数，该函数接受图 *G*、起点、终点和一些视觉控制参数。在这里非常有帮助的一个库是
    *NetworkX*，它提供了Dijkstra算法。输入参数是 *G*、起点和终点。不仅会计算出路径，还会计算出这条路径的长度。在图中的节点中，我们存储了原始的
    *WGS84* 坐标，以便使用 *folium* 在地图上绘制它们。*Polyline* 和 *Marker* 对象有助于可视化路径以及起点和终点。我们在这里创建了一个例外，因为你永远不知道哪些点被选中了，以及它们是否有效。'
- en: To put all the aforementioned together, we initialze and calculate *G*, create
    a map object _m*single* and find a route, see the code snippet below.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有上述内容综合起来，我们初始化并计算 *G*，创建一个名为 _m*single* 的地图对象，并找到一条路线，请参见下面的代码片段。
- en: Executing _m*single* returns a map that looks like the image given below.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 执行 _m*single* 返回一个看起来像下面图片所示的地图。
- en: '![From the starting point - Bundeskanzleramt - given in green, we find a shortest
    path to Alexanderplatz marked in red - picture by author.](../Images/fd5deea91a1491d08378202e09c6bb22.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![从起点——绿色标记的联邦总理府——我们找到了一条到红色标记的亚历山大广场的最短路径——图片由作者提供。](../Images/fd5deea91a1491d08378202e09c6bb22.png)'
- en: From the starting point – Bundeskanzleramt – given in green, we find a shortest
    path to Alexanderplatz marked in red – picture by author.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 从起点——绿色标记的联邦总理府——我们找到了一条到红色标记的亚历山大广场的最短路径——图片由作者提供。
- en: Having a single path is nice. The next task is to find a roundtrip for our next
    visit to Berlin. This will be part of the next paragraph.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有一条单一的路径是件好事。接下来的任务是找到我们下一次访问柏林的往返路线。这将是下一段落的组成部分。
- en: Traveling Sales problem – roundtrip Berlin
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 旅行商问题 – 往返柏林
- en: In general, a T**raveling Salesman Problem (TSP)** describes the challenge to
    determine the order of visits of several places, such that you visit every place
    just once, except for your starting point, and that the route is short. Apart
    from roundtrips in Berlin, this task comes up in many other different fields.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，**旅行商问题 (TSP)** 描述了确定多个地点访问顺序的挑战，这样你只需访问每个地点一次，除了你的起点，并且路线是最短的。除了柏林的环行之旅外，这项任务还出现在许多其他不同的领域。
- en: Not going too much into detail, this is an NP-hard problem, i.e. assuming that
    the class **P** is not equal to **NP**, there exists no algorithm that finds a
    shortest trip in polynomial worst-case runtime.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 不深入细节，这是一个NP难问题，即假设类**P**不等于**NP**，不存在算法能在多项式最坏情况运行时间内找到最短行程。
- en: 'Starting with a number of given points of interest in Berlin. We would like
    to visit: Brandenburg Gate, Alexanderplatz, Bode Museum, Reichstag, Bundeskanzleramt,
    and Checkpoint Charlie. The node IDs were already given before, let’s introduce
    a dictionary holding names for these POIs:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 从柏林的一些给定的兴趣点开始。我们想去参观：勃兰登堡门、亚历山大广场、博德博物馆、国会大厦、联邦总理府和查尔斯检查站。节点ID之前已经给出，让我们介绍一个包含这些POI名称的字典：
- en: 'To tackle TSP it takes two steps:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 要解决TSP，需要两个步骤：
- en: calculate all shortest-paths between all given POIs
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算所有给定POI之间的最短路径
- en: solve TSP by route approximation
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过路线近似解决TSP
- en: In the aforementioned paragraph we have introduced **Dijkstra’s algorithm**
    to find a shortest path. This indeed helps to create a distance matrix of all
    shortest paths between all POI pairs. Since this is a symmetric problem, i.e.
    routing from location A to B is the same as from location B to A, we have to calculate
    the shortest path only for the upper triangular matrix.
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在上述段落中，我们介绍了**迪杰斯特拉算法**来寻找最短路径。这确实有助于创建所有POI对之间的最短路径距离矩阵。由于这是一个对称问题，即从位置A到B的路线与从位置B到A的路线相同，我们只需要计算上三角矩阵的最短路径。
- en: Given this distance matrix, there are many approximations to an optimal route.
    The documentation of *NetworkX* shows that different approaches have been implemented,
    i.e. Christofides, Greedy approach, Simulated Annealing, and Asadpour. These work
    under different conditions and circumstances, e.g. directed or undirected graphs.
    We won’t go too much into detail here what are pros and cons of these heuristics.
    Christofides-algorithm is an adequate choice for undirected, weighted graphs as
    we find the situation here.
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 给定这个距离矩阵，有许多近似最优路线的方法。*NetworkX*的文档显示，已经实现了不同的方法，例如Christofides、贪婪方法、模拟退火和Asadpour。它们在不同的条件和环境下工作，例如有向或无向图。我们不会过多地详细介绍这些启发式算法的优缺点。由于我们在这里找到的情况是无向加权图，因此Christofides算法是一个合适的选择。
- en: The function _solve_tsp*tour* follows these two steps, confine the next code
    snippet.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 `_solve_tsp_tour`遵循这两个步骤，以下代码片段将限制。
- en: Again, we put the puzzle pieces together by creating a *folium* map object,
    pass data to the function that solves TSP, to afterwards visualize the results.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我们通过创建一个*folium*地图对象，将数据传递给解决TSP的函数，然后可视化结果，将这些拼图碎片拼在一起。
- en: This seems to be a full-day roundtrip walking around approximately 8 kilometers.
    You will find the single legs and distances in the layer control on the upper
    right corner of your screen. The final result looks like the picture below.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这似乎是一整天大约8公里的环行之旅。你将在屏幕右上角的图层控制中找到单独的腿和距离。最终结果如下面的图片所示。
- en: '![Picture showing a solution to the TSP and the distances of every leg in the
    right upper corner - picture by author.](../Images/59418e12d2bc53481a21822d5b98c6c1.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![展示TSP解决方案和每段距离的右上角图片——图片由作者提供。](../Images/59418e12d2bc53481a21822d5b98c6c1.png)'
- en: Picture showing a solution to the TSP and the distances of every leg in the
    right upper corner – picture by author.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 展示TSP解决方案和每段距离的右上角图片——图片由作者提供。
- en: Learnings
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 学习经验
- en: In this article we have been exploring data from OpenStreetMap, i.e. Berlin
    city centre streets. Our aim was to find a suitable roundtrip visiting different
    POIs. Through this exploration we have deep dived into the following
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探索了OpenStreetMap的数据，即柏林市中心街道。我们的目标是找到一个合适的环行之旅，访问不同的POI。通过这次探索，我们深入研究了以下内容
- en: OpenStreetMaps data model and how one can use Overpass API with *overpy* library
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: OpenStreetMaps数据模型以及如何使用*overpy*库的Overpass API。
- en: Geo-Spatial Visualization techniques with *folium* library
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用*folium*库的地理空间可视化技术
- en: Graph theory basics, such as node, edges, weights, as well as algorithms for
    shortest paths like Dijkstra’s algorithm and NP-hard problems like Traveling Salesman
    Problem and how to solve these
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图论基础知识，例如节点、边、权重，以及最短路径算法如迪杰斯特拉算法和NP难问题如旅行商问题以及如何解决这些问题
- en: Coordinate Reference Systems
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 坐标参考系统
- en: I have provided a code repository on GitHub to easily copy the code and try
    for yourself. Check it out and give it a star! [https://github.com/StephanHausberg/UrbanGraphNetworks](https://github.com/StephanHausberg/UrbanGraphNetworks)
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我已在GitHub上提供了一个代码仓库，方便您复制代码并亲自尝试。查看它并给它点个赞！[https://github.com/StephanHausberg/UrbanGraphNetworks](https://github.com/StephanHausberg/UrbanGraphNetworks)
- en: If you like what you have read – follow me on medium.com, follow me on GitHub,
    or follow me on LinkedIn. [https://www.linkedin.com/in/dr-stephan-hausberg-679750118/](https://www.linkedin.com/in/dr-stephan-hausberg-679750118/)
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢您所阅读的内容——请关注medium.com上的我，关注GitHub上的我，或者关注LinkedIn上的我。[https://www.linkedin.com/in/dr-stephan-hausberg-679750118/](https://www.linkedin.com/in/dr-stephan-hausberg-679750118/)
- en: Looking forward to your valuable feedback.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 期待您的宝贵反馈。
