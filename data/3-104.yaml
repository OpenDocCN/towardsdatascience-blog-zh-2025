- en: 'Why CatBoost Works So Well: The Engineering Behind the Magic'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么CatBoost效果如此之好：魔法背后的工程
- en: 原文：[https://towardsdatascience.com/catboost-inner-workings-and-optimizations/](https://towardsdatascience.com/catboost-inner-workings-and-optimizations/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/catboost-inner-workings-and-optimizations/](https://towardsdatascience.com/catboost-inner-workings-and-optimizations/)
- en: <mdspan datatext="el1744219143668" class="mdspan-comment">Gradient boosting</mdspan>
    is a cornerstone technique for modeling tabular data due to its speed and simplicity.
    It delivers great results without any fuss. When you look around you’ll see multiple
    options like LightGBM, XGBoost, etc. CatBoost is one such variant. In this post,
    we will take a detailed look at this model, explore its inner workings, and understand
    what makes it a great choice for real-world tasks.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1744219143668" class="mdspan-comment">梯度提升</mdspan>是建模表格数据的一个基石技术，因为它速度快且简单。它无需任何麻烦就能取得很好的结果。当你环顾四周时，你会看到多个选项，如LightGBM、XGBoost等。CatBoost就是其中之一。在这篇文章中，我们将详细探讨这个模型，探索其内部工作原理，并了解它为何是现实世界任务的绝佳选择。
- en: Target Statistic
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 目标统计量
- en: '![Table illustrating target encoding for categorical values. It maps vehicle
    types—Car, Bike, Bus, and Cycle—to numerical target means: 3.9, 1.2, 11.7, and
    0.8 respectively. A curved arrow at the bottom indicates the transformation from
    category to numeric value](../Images/d200a6820285dd3c2ffa9c6dcf75121d.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![展示分类值目标编码的表格。它将车辆类型——汽车、自行车、公交车和自行车——映射到数值目标均值：3.9、1.2、11.7和0.8，分别。底部的一条弯曲箭头表示从类别到数值值的转换](../Images/d200a6820285dd3c2ffa9c6dcf75121d.png)'
- en: 'Target Encoding Example: the average value of the target variable for a category
    is used to replace each category. Image by author'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 目标编码示例：使用目标变量的平均值来替换每个类别。图片由作者提供
- en: 'Target Encoding Example: the average value of the target variable for a category
    is used to replace each category'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 目标编码示例：使用目标变量的平均值来替换每个类别
- en: One of the important contributions of the CatBoost paper is a new method of
    calculating the Target Statistic. What is a Target Statistic? If you have worked
    with categorical variables before, you’d know that the most rudimentary way to
    deal with categorical variables is to use one-hot encoding. From experience, you’d
    also know that this introduces a can of problems like sparsity, curse of dimensionality,
    memory issues, etc. Especially for categorical variables with high cardinality.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: CatBoost 论文中一个重要的贡献是计算目标统计量的新方法。什么是目标统计量？如果你之前处理过分类变量，你会知道处理分类变量的最基本方法就是使用独热编码。从经验来看，你也知道这会引入一些问题，如稀疏性、维度诅咒、内存问题等。特别是对于高基数的分类变量。
- en: Greedy Target Statistic
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 贪婪目标统计量
- en: To avoid one-hot encoding, we calculate the Target Statistic instead for the
    categorical variables. This means we calculate the mean of the target variable
    at each unique value of the categorical variable. So if a categorical variable
    takes the values — `A`, `B`, `C` then we will calculate the average value of \(\text{y}\)
    over all these values and replace these values with the average of \(\text{y}\)
    at each unique value.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免独热编码，我们计算分类变量的目标统计量。这意味着我们计算目标变量在每个分类变量唯一值处的平均值。所以如果一个分类变量取值为——`A`、`B`、`C`，那么我们将计算所有这些值上\(\text{y}\)的平均值，并用这些值在唯一值处的平均值来替换它们。
- en: 'That sounds good, right? It does but this approach comes with its problems
    — namely Target Leakage. To understand this, let’s take an extreme example. Extreme
    examples are often the easiest way to eke out issues in the approach. Consider
    the below dataset:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这听起来不错，是吧？确实如此，但这种方法有其问题——即目标泄露。为了理解这一点，让我们用一个极端的例子来说明。极端例子通常是揭示方法中问题的最简单方式。考虑以下数据集：
- en: '| Categorical Column | Target Column |'
  id: totrans-11
  prefs: []
  type: TYPE_TB
  zh: '| 分类列 | 目标列 |'
- en: '| --- | --- |'
  id: totrans-12
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| A | 0 |'
  id: totrans-13
  prefs: []
  type: TYPE_TB
  zh: '| A | 0 |'
- en: '| B | 1 |'
  id: totrans-14
  prefs: []
  type: TYPE_TB
  zh: '| B | 1 |'
- en: '| C | 0 |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| C | 0 |'
- en: '| D | 1 |'
  id: totrans-16
  prefs: []
  type: TYPE_TB
  zh: '| D | 1 |'
- en: '| E | 0 |'
  id: totrans-17
  prefs: []
  type: TYPE_TB
  zh: '| E | 0 |'
- en: 'Greedy Target Statistic: Compute the mean target value for each unique category'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 贪婪目标统计量：计算每个唯一类别的目标值的平均值
- en: 'Now let’s write the equation for calculating the Target Statistic:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们写出计算目标统计量的方程式：
- en: \[\hat{x}^i_k = \frac{
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: \[\hat{x}^i_k = \frac{
- en: \sum_{j=1}^{n} 1_{{x^i_j = x^i_k}} \cdot y_j + a p
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: \(\sum_{j=1}^{n} 1_{{x^i_j = x^i_k}} \cdot y_j + a p\)
- en: '}{'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '}{'
- en: \sum_{j=1}^{n} 1_{{x^i_j = x^i_k}} + a
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: \(\sum_{j=1}^{n} 1_{{x^i_j = x^i_k}} + a\)
- en: '}\]'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '}\]'
- en: Here \(x^i_j\) is the value of the **i-th categorical feature** for the **j-th
    sample**. So for the k-th sample, we iterate over all samples of \(x^i\), select
    the ones having the value \(x^i_k\), and take the average value of \(y\) over
    those samples. Instead of taking a direct average, we take a smoothened average
    which is what the \(a\) and \(p\) terms are for. The \(a\) parameter is the smoothening
    parameter and \(p\) is the global mean of \(y\).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这里 \(x^i_j\) 是第 \(j\) 个样本的第 \(i\) 个分类特征的值。所以对于第 \(k\) 个样本，我们遍历所有 \(x^i\) 的样本，选择具有值
    \(x^i_k\) 的样本，并取这些样本 \(y\) 的平均值。我们不是直接取平均值，而是取平滑平均值，这就是 \(a\) 和 \(p\) 项的作用。\(a\)
    参数是平滑参数，\(p\) 是 \(y\) 的全局平均值。
- en: 'If we calculate the Target Statistic using the formula above, we get:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们使用上述公式计算目标统计量，我们得到：
- en: '| Categorical Column | Target Column | Target Statistic |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
  zh: '| 分类列 | 目标列 | 目标统计量 |'
- en: '| --- | --- | --- |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| A | 0 | \(\frac{ap}{1+a}\) |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| A | 0 | \(\frac{ap}{1+a}\) |'
- en: '| B | 1 | \(\frac{1+ap}{1+a}\) |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| B | 1 | \(\frac{1+ap}{1+a}\) |'
- en: '| C | 0 | \(\frac{ap}{1+a}\) |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '| C | 0 | \(\frac{ap}{1+a}\) |'
- en: '| D | 1 | \(\frac{1+ap}{1+a}\) |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '| D | 1 | \(\frac{1+ap}{1+a}\) |'
- en: '| E | 0 | \(\frac{ap}{1+a}\) |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| E | 0 | \(\frac{ap}{1+a}\) |'
- en: Calculation of Greedy Target Statistic with Smoothening
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 带平滑的贪婪目标统计量计算
- en: Now if I use this `Target Statistic` column as my training data, I will get
    a perfect split at \( threshold = \frac{0.5+ap}{1+a}\). Anything above this value
    will be classified as `1` and anything below will be classified as `0`. I have
    a perfect classification at this point, so I get 100% accuracy on my training
    data.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现在如果我将这个 `Target Statistic` 列作为我的训练数据，我将得到在 \( threshold = \frac{0.5+ap}{1+a}\)
    处的完美分割。任何高于这个值的都将被分类为 `1`，任何低于这个值的都将被分类为 `0`。在这个点上，我得到了完美的分类，因此我在训练数据上得到了 100%
    的准确率。
- en: Let’s take a look at the test data. Here, since we are assuming that the feature
    has all unique values, the Target Statistic becomes—
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看测试数据。在这里，由于我们假设特征具有所有唯一值，目标统计量变为——
- en: \[TS = \frac{0+ap}{0+a} = p\]
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: \[TS = \frac{0+ap}{0+a} = p\]
- en: If \(threshold\) is greater than \(p\), all test data predictions will be \(0\).
    Conversely, if \(threshold\) is less than \(p\), all test data predictions will
    be \(1\) leading to poor performance on the test set.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 \(threshold\) 大于 \(p\)，所有测试数据的预测都将为 \(0\)。相反，如果 \(threshold\) 小于 \(p\)，所有测试数据的预测都将为
    \(1\)，导致测试集上的性能较差。
- en: Although we rarely see datasets where values of a categorical variable are all
    unique, we do see cases of high cardinality. This extreme example shows the pitfalls
    of using Greedy Target Statistic as an encoding approach.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们很少看到所有分类变量值都唯一的dataset，但我们确实看到了高基数的情况。这个极端例子展示了使用贪婪目标统计量作为编码方法的陷阱。
- en: Leave One Out Target Statistic
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 留一法目标统计量
- en: 'So the Greedy TS didn’t work out quite well for us. Let’s try another method—
    the Leave One Out Target Statistic method. At first glance, this looks promising.
    But, as it turns out, this too has its problems. Let’s see how with another extreme
    example. This time let’s assume that our categorical variable \(x^i\) has only
    one unique value, i.e., all values are the same. Consider the below data:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，贪婪TS对我们来说并没有很好地工作。让我们尝试另一种方法——留一法目标统计量方法。乍一看，这似乎很有希望。但是，实际上，这也存在一些问题。让我们通过另一个极端例子来看看。这次让我们假设我们的分类变量
    \(x^i\) 只有一个唯一值，即所有值都相同。考虑以下数据：
- en: '| Categorical Column | Target Column |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| 分类列 | 目标列 |'
- en: '| --- | --- |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| A | 0 |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| A | 0 |'
- en: '| A | 1 |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| A | 1 |'
- en: '| A | 0 |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| A | 0 |'
- en: '| A | 1 |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| A | 1 |'
- en: Example data for an extreme case where a categorical feature has just one unique
    value
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 极端案例的示例数据，其中分类特征只有一个唯一值
- en: 'If calculate the leave one out target statistic, we get:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果计算留一法目标统计量，我们得到：
- en: '| Categorical Column | Target Column | Target Statistic |'
  id: totrans-50
  prefs: []
  type: TYPE_TB
  zh: '| 分类列 | 目标列 | 目标统计量 |'
- en: '| --- | --- | --- |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| A | 0 | \(\frac{n^+ -y_k + ap}{n+a}\) |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
  zh: '| A | 0 | \(\frac{n^+ -y_k + ap}{n+a}\) |'
- en: '| A | 1 | \(\frac{n^+ -y_k + ap}{n+a}\) |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| A | 1 | \(\frac{n^+ -y_k + ap}{n+a}\) |'
- en: '| A | 0 | \(\frac{n^+ -y_k + ap}{n+a}\) |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| A | 0 | \(\frac{n^+ -y_k + ap}{n+a}\) |'
- en: '| A | 1 | \(\frac{n^+ -y_k + ap}{n+a}\) |'
  id: totrans-55
  prefs: []
  type: TYPE_TB
  zh: '| A | 1 | \(\frac{n^+ -y_k + ap}{n+a}\) |'
- en: Calculation of Leave One Out Target Statistic with Smoothening
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 带平滑的留一法目标统计量计算
- en: 'Here:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这里：
- en: \(n\) is the total samples in the data (in our case this 4)
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: \(n\) 是数据中的总样本数（在我们的例子中为 4）
- en: \(n^+\) is the number of positive samples in the data (in our case this 2)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: \(n^+\) 是数据中的正样本数（在我们的例子中为 2）
- en: \(y_k\) is the value of the target column in that row
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: \(y_k\) 是该行目标列的值
- en: 'Substituting the above, we get:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 替换上述内容，我们得到：
- en: '| Categorical Column | Target Column | Target Statistic |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| 分类列 | 目标列 | 目标统计量 |'
- en: '| --- | --- | --- |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| A | 0 | \(\frac{2 + ap}{4+a}\) |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| A | 0 | \(\frac{2 + ap}{4+a}\) |'
- en: '| A | 1 | \(\frac{1 + ap}{4+a}\) |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '| A | 1 | \(\frac{1 + ap}{4+a}\) |'
- en: '| A | 0 | \(\frac{2 + ap}{4+a}\) |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
  zh: '| A | 0 | \(\frac{2 + ap}{4+a}\) |'
- en: '| A | 1 | \(\frac{1 + ap}{4+a}\) |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
  zh: '| A | 1 | \(\frac{1 + ap}{4+a}\) |'
- en: Substituing values of `n` and `n<sup>+</sup>`
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 替换 `n` 和 `n+` 的值
- en: Now, if I use this `Target Statistic` column as my training data, I will get
    a perfect split at \( threshold = \frac{1.5+ap}{4+a}\). Anything above this value
    will be classified as `0` and anything below will be classified as `1`. I have
    a perfect classification at this point, so I again get 100% accuracy on my training
    data.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我将这个`目标统计`列作为我的训练数据，我将在 \( threshold = \frac{1.5+ap}{4+a}\) 处获得完美的分割。任何高于这个值的将被分类为`0`，任何低于这个值的将被分类为`1`。在这个点上，我实现了完美的分类，因此我在训练数据上再次获得了100%的准确率。
- en: You see the problem, right? My categorical variable which doesn’t have more
    than a unique value is producing different values for Target Statistic which will
    perform great on the training data but will fail miserably on the test data.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 你看，问题就在这里，我的分类变量没有超过一个唯一值，它在`目标统计`中产生了不同的值，这将使训练数据表现良好，但在测试数据上却会惨败。
- en: Ordered Target Statistic
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 有序目标统计
- en: '![Illustration of ordered learning: CatBoost processes data in a randomly permuted
    order and predicts each sample using only the earlier samples (Image by Author)](../Images/c823e3c93b376f8545dfdc144106b493.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![有序学习的示意图：CatBoost以随机排列的顺序处理数据，并使用早期样本来预测每个样本（图片由作者提供）](../Images/c823e3c93b376f8545dfdc144106b493.png)'
- en: 'Illustration of ordered learning: CatBoost processes data in a randomly permuted
    order and predicts each sample using only the earlier samples. Image by author'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 有序学习的示意图：CatBoost以随机排列的顺序处理数据，并使用早期样本来预测每个样本。图片由作者提供
- en: CatBoost introduces a technique called Ordered Target Statistic to address the
    issues discussed above. This is the core principle of CatBoost’s handling of categorical
    variables.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: CatBoost引入了一种称为有序目标统计的技术来解决上述问题。这是CatBoost处理分类变量的核心原则。
- en: This method, inspired by online learning, uses only past data to make predictions.
    CatBoost generates a random permutation (random ordering) of the training data(\(\sigma\)).
    To compute the Target Statistic for a sample at row \(k\), CatBoost uses samples
    from row \(1\) to \(k-1\). For the test data, it uses the entire train data to
    compute the statistic.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法，受在线学习启发，仅使用过去的数据进行预测。CatBoost生成训练数据的随机排列（随机顺序）(\(\sigma\))。为了计算第 \(k\)
    行样本的`目标统计`，CatBoost使用从第 \(1\) 行到 \(k-1\) 行的样本。对于测试数据，它使用整个训练数据来计算统计量。
- en: Additionally, CatBoost generates a new permutation for each tree, rather than
    reusing the same permutation each time. This reduces the variance that can arise
    in the early samples.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，CatBoost为每棵树生成一个新的排列，而不是每次都重用相同的排列。这减少了在早期样本中可能出现的方差。
- en: Ordered Boosting
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 有序提升
- en: '![Diagram illustrating the ordered boosting mechanism in CatBoost. Data points
    x₁ through xᵢ are shown sequentially, with earlier samples used to compute predictions
    for later ones. Each xᵢ is associated with a model prediction M, where the prediction
    for xᵢ is computed using the model trained on previous data points. The equations
    show how residuals are calculated and how the model is updated: rᵗ(xᵢ, yᵢ) = yᵢ
    − M⁽ᵗ⁻¹⁾ᵢ⁻¹(xᵢ), and ΔM is learned from samples with order less than or equal
    to i. Final model update: Mᵢ = Mᵢ + ΔM.](../Images/48ef180b450d5547eedf7349e7650ecf.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![CatBoost中有序提升机制的示意图。数据点 \(x_1\) 到 \(x_i\) 依次显示，使用早期样本来计算后续样本的预测。每个 \(x_i\)
    与一个模型预测 \(M\) 相关联，其中 \(x_i\) 的预测是通过在先前数据点上训练的模型来计算的。方程显示了残差的计算和模型更新的方式：\(r_t(x_i,
    y_i) = y_i - M_{t-1}^{i-1}(x_i)\)，并且 ΔM 从顺序小于或等于 \(i\) 的样本中学习。最终模型更新：\(M_i = M_i
    + ΔM\)](../Images/48ef180b450d5547eedf7349e7650ecf.png)'
- en: 'This visualization shows how CatBoost computes residuals and updates the model:
    for sample xᵢ, the model predicts using only earlier data points. [Source](https://doi.org/10.1093/fqsafe/fyae007)'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这个可视化显示了CatBoost如何计算残差并更新模型：对于样本 \(x_i\)，模型仅使用早期数据点进行预测。[来源](https://doi.org/10.1093/fqsafe/fyae007)
- en: Another important innovation introduced by the CatBoost paper is its use of
    Ordered Boosting. It builds on similar principles as ordered target statistics,
    where CatBoost randomly permutes the training data at the start of each tree and
    makes predictions sequentially.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: CatBoost论文引入的另一个重要创新是其使用有序提升。它建立在有序目标统计的类似原则上，CatBoost在每个树的开始时随机排列训练数据，并按顺序进行预测。
- en: In traditional boosting methods, when training tree \(t\), the model uses predictions
    from the previous tree \(t−1\) for all training samples, including the one it
    is currently predicting. This can lead to **target leakage**, as the model may
    indirectly use the label of the current sample during training.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的提升方法中，当训练树 \(t\) 时，模型使用来自之前树 \(t−1\) 的预测来处理所有训练样本，包括它当前正在预测的样本。这可能导致**目标泄露**，因为模型可能在训练过程中间接使用当前样本的标签。
- en: To address this issue, CatBoost uses Ordered Boosting where, for a given sample,
    it only uses predictions from previous rows in the training data to calculate
    gradients and build trees. For each row \(i\) in the permutation, CatBoost calculates
    the output value of a leaf using only the samples before \(i\). The model uses
    this value to get the prediction for row \(i\). Thus, the model predicts each
    row **without looking at its label**.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，CatBoost使用有序提升，对于给定的样本，它只使用训练数据中之前行的预测来计算梯度并构建树。对于排列中的每一行 \(i\)，CatBoost仅使用
    \(i\) 之前的样本来计算叶子的输出值。模型使用这个值来获取 \(i\) 行的预测。因此，模型**不查看其标签**来预测每一行。
- en: CatBoost trains each tree using a new random permutation to average the variance
    in early samples in one permutation.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: CatBoost使用新的随机排列来训练每一棵树，以平均一个排列中早期样本的方差。
- en: 'Let’s say we have 5 data points: `A, B, C, D, E`. CatBoost creates a **random
    permutation** of these points. Suppose the permutation is: `σ = [C, A, E, B, D]`'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有5个数据点：`A, B, C, D, E`。CatBoost创建这些点的**随机排列**。假设排列是：`σ = [C, A, E, B, D]`
- en: '| Step | Data Used to Train | Data Point Being Predicted | Notes |'
  id: totrans-85
  prefs: []
  type: TYPE_TB
  zh: '| 步骤 | 用于训练的数据 | 预测的数据点 | 备注 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-86
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| 1 | — | C | No previous data → use prior |'
  id: totrans-87
  prefs: []
  type: TYPE_TB
  zh: '| 1 | — | C | 没有先前数据 → 使用先验 |'
- en: '| 2 | C | A | Model trained on C only |'
  id: totrans-88
  prefs: []
  type: TYPE_TB
  zh: '| 2 | C | A | 仅在C上训练的模型 |'
- en: '| 3 | C, A | E | Model trained on C, A |'
  id: totrans-89
  prefs: []
  type: TYPE_TB
  zh: '| 3 | C, A | E | 在C, A上训练的模型 |'
- en: '| 4 | C, A, E | B | Model trained on C, A, E |'
  id: totrans-90
  prefs: []
  type: TYPE_TB
  zh: '| 4 | C, A, E | B | 在C, A, E上训练的模型 |'
- en: '| 5 | C, A, E, B | D | Model trained on C, A, E, B |'
  id: totrans-91
  prefs: []
  type: TYPE_TB
  zh: '| 5 | C, A, E, B | D | 在C, A, E, B上训练的模型 |'
- en: Table highlighting how CatBoost uses random permutation to perform training
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 表格突出显示CatBoost如何使用随机排列进行训练
- en: This avoids using the actual label of the current row to get the prediction
    thus preventing **leakage**.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 这避免了使用当前行的实际标签来获取预测，从而防止**泄露**。
- en: Building a Tree
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建树
- en: Each time CatBoost builds a tree, it creates a random permutation of the training
    data. It calculates the ordered target statistic for all the categorical variables
    with more than two unique values. For a binary categorical variable, it maps the
    values to zeros and ones.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 每次CatBoost构建树时，它都会创建训练数据的随机排列。它计算所有具有两个以上唯一值的分类变量的有序目标统计量。对于二元分类变量，它将值映射为零和一。
- en: CatBoost processes data as if the data is arriving sequentially. It begins with
    an initial prediction of zero for all instances, meaning the residuals are initially
    equivalent to the target values.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: CatBoost处理数据就像数据是按顺序到达的一样。它从一个实例的初始预测为零开始，这意味着残差最初等同于目标值。
- en: As training proceeds, CatBoost updates the leaf output for each sample using
    the residuals of the previous samples that fall into the same leaf. By not using
    the current sample’s label for prediction, CatBoost effectively prevents data
    leakage.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 随着训练的进行，CatBoost使用之前落入同一叶子的样本的残差来更新每个样本的叶子输出。通过不使用当前样本的标签进行预测，CatBoost有效地防止了数据泄露。
- en: Split Candidates
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分割候选
- en: '![Histogram showing how continuous features can be divided into bins—CatBoost
    evaluates splits using these binned values instead of raw continuous values](../Images/34db1391c35a085df0a166947f6e4a6c.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![直方图显示如何将连续特征划分为箱——CatBoost使用这些分箱值而不是原始连续值来评估分割](../Images/34db1391c35a085df0a166947f6e4a6c.png)'
- en: CatBoost bins continuous features to reduce the search space for optimal splits.
    Each bin edge and split point represents a potential decision threshold. Image
    by author
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: CatBoost将连续特征分箱以减少最佳分割的搜索空间。每个箱边和分割点代表一个潜在的决策阈值。图由作者提供
- en: At the core of a decision tree lies the task of selecting the optimal feature
    and threshold for splitting a node. This involves evaluating multiple feature-threshold
    combinations and selecting the one that gives the best reduction in loss. CatBoost
    does something similar. It discretizes the continuous variable into bins to simplify
    the search for the optimal combination. It evaluates each of these feature-bin
    combinations to determine the best split
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 决策树的核心任务是选择最优的特征和阈值来分割节点。这涉及到评估多个特征-阈值组合，并选择给出最佳损失减少的那个。CatBoost做的是类似的事情。它将连续变量离散化成箱，以简化对最优组合的搜索。它评估这些特征-箱组合以确定最佳分割
- en: CatBoost uses Oblivious Trees, a key difference compared to other trees, where
    it uses the same split across all nodes at the same depth.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: CatBoost使用无记忆树，这是与其他树的关键区别，它在同一深度上所有节点使用相同的分割。
- en: Oblivious Trees
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 无记忆树
- en: '![Comparison between Oblivious Trees and Regular Trees. The Oblivious Tree
    on the left applies the same split condition at each level across all nodes, resulting
    in a symmetric structure. The Regular Tree on the right applies different conditions
    at each node, leading to an asymmetric structure with varied splits at different
    depths](../Images/84080daf38a861ef50a33375c7f8cdd7.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![无记忆树和常规树之间的比较。左边的无记忆树在所有节点上应用相同的分割条件，导致对称结构。右边的常规树在每个节点上应用不同的条件，导致具有不同深度分割的不对称结构](../Images/84080daf38a861ef50a33375c7f8cdd7.png)'
- en: 'Illustration of ordered learning: CatBoost processes data in a randomly permuted
    order and predicts each sample using only the earlier samples. Image by author'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 有序学习的示意图：CatBoost以随机排列的顺序处理数据，并使用早期样本预测每个样本。图片由作者提供
- en: 'Unlike standard decision trees, where different nodes can split on different
    conditions (feature-threshold), Oblivious Trees split across the same conditions
    across all nodes at the same depth of a tree. At a given depth, all samples are
    evaluated at the same feature-threshold combination. This symmetry has several
    implications:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 与标准决策树不同，标准决策树的不同节点可以在不同的条件下（特征-阈值）分割，无记忆树在树的同一深度上所有节点应用相同的条件进行分割。在给定的深度，所有样本都评估相同的特征-阈值组合。这种对称性有几个影响：
- en: 'Speed and simplicity: since the same condition is applied across all nodes
    at the same depth, the trees produced are simpler and faster to train'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 速度和简单性：由于在相同深度上所有节点应用相同的条件，产生的树更简单，训练更快
- en: 'Regularization: Since all trees are forced to apply the same condition across
    the tree at the same depth, there is a regularization effect on the predictions'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正则化：由于所有树都被迫在树的同一深度上应用相同的条件，这会在预测上产生正则化效果
- en: 'Parallelization: the uniformity of the split condition, makes it easier to
    parallelize the tree creation and usage of GPU to accelerate training'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并行化：分割条件的统一性，使得树创建和GPU的使用以加速训练更容易并行化
- en: Conclusion
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'CatBoost stands out by directly tackling a long-standing challenge: how to
    handle categorical variables effectively without causing target leakage. Through
    innovations like **Ordered Target Statistics**, **Ordered Boosting**, and the
    use of **Oblivious Trees**, it efficiently balances robustness and accuracy.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: CatBoost通过直接解决一个长期挑战而脱颖而出：如何在不会引起目标泄漏的情况下有效地处理分类变量。通过像**有序目标统计**、**有序提升**和**无记忆树**的使用这样的创新，它有效地平衡了鲁棒性和准确性。
- en: If you found this deep dive helpful, you might enjoy another deep dive on the
    differences between [Stochastic Gradient Classifer and Logistic Regression](https://shubhamgandhi.net/model-deep-dives/sgd-classifier-vs-logistic-regression/)
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你觉得这个深入探讨很有帮助，你可能还会喜欢另一个深入探讨[随机梯度分类器和逻辑回归之间的差异](https://shubhamgandhi.net/model-deep-dives/sgd-classifier-vs-logistic-regression/)
