  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[CatBoost通过使用GPU实现决策树上的快速梯度提升](https://catboost.ai/news/catboost-enables-fast-gradient-boosting-on-decision-trees-using-gpus)'
