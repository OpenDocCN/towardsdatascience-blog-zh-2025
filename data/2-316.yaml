- en: Results
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结果
- en: The following code plots the true and estimated elasticities for each product.
    Each point is ranked by their true elasticity value (black), and the estimated
    elasticity from the model is also shown. We can see that the estimated elasticities
    follows the path of the true elasticities, with a Mean Absolute Error of around
    0.0724\. Points in red represents products whose 95% CI does not contain the true
    elasticity, while points in blue represent products whose 95% CI contains the
    true elasticity. Given that the global mean is -1.598, this represents an average
    error of 4.5% at the product level. We can see that the SVI estimates closely
    follow the pattern of the true elasticities but with some noise, particularly
    as the elasticities become more and more negative. On the top right panel, we
    plot the relationship between the error of the estimated elasticities and the
    true elasticity values. As true elasticities become more and more negative, our
    model becomes less accurate.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码绘制了每个产品的真实和估计弹性。每个点按其真实弹性值（黑色）排序，并显示了模型估计的弹性。我们可以看到估计的弹性遵循真实弹性的路径，平均绝对误差约为0.0724。红色点表示95%置信区间不包含真实弹性的产品，而蓝色点表示95%置信区间包含真实弹性的产品。鉴于全局平均值为-1.598，这表示在产品层面的平均误差为4.5%。我们可以看到SVI估计紧密遵循真实弹性的模式，但有一些噪声，尤其是在弹性越来越负的情况下。在右上角的面板中，我们绘制了估计弹性误差与真实弹性值之间的关系。随着真实弹性变得越来越负，我们的模型变得越来越不准确。
- en: For the category-level and global-level elasticities, we can create the posteriors
    using two methods. We can either [boostrap](https://en.wikipedia.org/wiki/Bootstrapping_(statistics) all
    product-level elasticities within the category, or we can get the category-level
    estimates directly from the posterior parameters. When we look at the category-level
    elasticity estimates on the bottom left, we can see that the both the category-level
    estimates recovered from the model and the bootstrapped samples from the product-level
    elasticities are also slightly biased towards zero, with an MAE of ~.033\. However,
    the confidence interval given by the category-level parameter covers the true
    parameter, unlike the bootstrapped product-level estimates. This suggests that
    when determining group-level elasticities, we should directly use the group-level
    parameters instead of bootstrapping the more granular estimates. When looking
    at the global level, both methods contains the true parameter estimate in the
    95% confidence bounds, with the global parameter out-performing the product-level
    bootstrapping, at the cost of having larger standard errors.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 对于类别级和全局级弹性，我们可以使用两种方法来创建后验。我们可以在类别内对所有产品级弹性进行[bootstrap](https://en.wikipedia.org/wiki/Bootstrapping_(statistics))，或者直接从后验参数中获得类别级估计。当我们查看左下角的类别级弹性估计时，我们可以看到，从模型中恢复的类别级估计和从产品级弹性中bootstrap的样本都略微偏向于零，MAE约为0.033。然而，类别级参数给出的置信区间覆盖了真实参数，而与bootstrap的产品级估计不同。这表明在确定组级弹性时，我们应该直接使用组级参数，而不是对更细粒度的估计进行bootstrap。当查看全局级时，两种方法都包含在95%置信区间内的真实参数估计，全局参数的表现优于产品级bootstrap，但代价是标准误差更大。
- en: '**Considerations**'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**考虑事项**'
- en: '**HB underestimates posterior variance:** One drawback of using SVI for the
    estimation is that it [underestimates the posterior variance](https://arxiv.org/pdf/1903.00617).
    While we will cover this topic in detail in a later article, the objective function
    for SVI only takes into account the difference in expectation of our posited distribution
    and the true distribution. This means that it does not consider the full correlation
    structure between parameters in the posterior. The mean-field approximation commonly
    used in SVI assumes conditional (on the previous hierarchy’s draw) independence
    between parameters, which ignores any covariances between products within the
    same hierarchy. This means that if are any spillover effects (such as cannibalization
    or cross-price elasticity), it would not be accounted for in the confidence bounds.
    Due to this mean-field assumption, the uncertainty estimates tend to be overly
    confident, resulting in confidence intervals that are too narrow and fail to properly
    capture the true parameter values at the expected rate. We can see in the top
    left figure that only 9.7% of the product-level elasticities cover their true
    elasticity. In a later post, we will include some [solutions](https://proceedings.neurips.cc/paper_files/paper/2015/file/4b0a59ddf11c58e7446c9df0da541a84-Paper.pdf)
    to this problem.'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**HB低估后验方差：** 使用SVI进行估计的一个缺点是它[低估了后验方差](https://arxiv.org/pdf/1903.00617)。虽然我们将在后面的文章中详细讨论这个话题，但SVI的目标函数只考虑了我们假设的分布与真实分布之间期望值的差异。这意味着它没有考虑后验中参数之间的完整相关性结构。SVI中常用到的均值场近似假设条件（基于先前层次抽样的）参数之间是独立的，这忽略了同一层次内产品之间的任何协方差。这意味着如果有任何溢出效应（如侵占或交叉价格弹性），则不会在置信区间中考虑。由于这种均值场假设，不确定性估计往往过于自信，导致置信区间过窄，无法以预期的速率正确捕捉真实参数值。我们可以在左上角的图中看到，只有9.7%的产品级弹性覆盖了它们的真实弹性。在后续的文章中，我们将包括一些[解决方案](https://proceedings.neurips.cc/paper_files/paper/2015/file/4b0a59ddf11c58e7446c9df0da541a84-Paper.pdf)来解决这个问题。'
- en: '**Importance of priors:** When using HB, priors matter significantly more compared
    to standard Bayesian approaches. While large datasets typically allow the likelihood
    to dominate priors when estimating global parameters, hierarchical structures
    changes this dynamic and reduce the effective sample sizes at each level. In our
    model, the global parameter only sees 10 category-level observations (not the
    full dataset), categories only draw from their contained products, and products
    rely solely on their own observations. This reduced effective sample size causes
    shrinkage, where outlier estimates (like very negative elasticities) get pulled
    toward their category means. This highlights the importance of [prior predictive
    checks](https://www.pymc.io/projects/docs/en/stable/learn/core_notebooks/posterior_predictive.html),
    since misspecified priors will have outsized influence on the results.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**先验的重要性**：在使用HB（Hierarchical Bayesian）模型时，与标准贝叶斯方法相比，先验信息的重要性显著增加。虽然大型数据集通常允许似然函数在估计全局参数时主导先验，但层次结构会改变这种动态，并减少每个层次的有效样本量。在我们的模型中，全局参数只能看到10个类别级别的观测值（而不是完整的数据集），类别仅从其包含的产品中抽取，而产品则完全依赖于它们自己的观测值。这种减少的有效样本量导致收缩效应，其中异常估计（如非常负的弹性）会被拉向其类别均值。这突出了[先验预测检查](https://www.pymc.io/projects/docs/en/stable/learn/core_notebooks/posterior_predictive.html)的重要性，因为错误的先验设定将对结果产生不成比例的影响。'
- en: '![](../Images/2bdbc31b6985406518ae6214ad6576ce.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2bdbc31b6985406518ae6214ad6576ce.png)'
- en: '[PRE4]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Conclusion
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: '**Alternate Uses**: Aside from estimating price elasticity of demand, HB models
    also have a variety of other uses in data science. In retail, HB models can forecast
    demand for existing stores and solve the cold-start problem for new stores by
    borrowing information from stores/networks that have already been established
    and are clustered within the same hierarchy. For recommendation systems, HB can
    estimate user-level preferences from a combination of user and item-level characteristics.
    This structure enables relevant recommendations to new users based on cohort behaviors,
    gradually transitioning to individualized recommendations as user history accumulates.
    If no cohort groupings are easily available, K-means can be used to group similar
    units based on their characteristics.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**其他用途**：除了估计需求的价格弹性外，HB模型在数据科学中还有各种其他用途。在零售领域，HB模型可以预测现有商店的需求，并通过从已经建立并处于同一层次结构中的商店/网络借用信息来解决新商店的冷启动问题。对于推荐系统，HB可以从用户和项目级别的特征组合中估计用户级别的偏好。这种结构使得可以根据群体行为向新用户提供相关推荐，随着用户历史记录的积累，逐渐过渡到个性化推荐。如果无法轻松获得群体分组，可以使用K-means根据其特征对相似单位进行分组。'
- en: Finally, these models can also be used to combine results from experimental
    and observational studies. Scientists can use historical observational uplift
    estimates (ads uplift) and supplement it with newly developed A/B tests to reduce
    the required sample size for experiments by incorporating prior knowledge. This
    approach creates a continuous learning framework where each new experiment builds
    upon previous findings rather than starting from scratch. For teams facing resource
    constraints, this means faster time-to-insight (especially when combined with
    [surrogate models](https://www.nber.org/system/files/working_papers/w26463/w26463.pdf))
    and more efficient experimentation pipelines.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这些模型也可以用来结合实验研究和观察研究的结果。科学家可以使用历史观察提升估计（广告提升）并补充以新开发的A/B测试，通过结合先验知识来减少实验所需的样本量。这种方法创建了一个持续的学习框架，其中每个新的实验都是基于之前的发现而不是从头开始。对于面临资源限制的团队来说，这意味着更快的洞察时间（尤其是当与[代理模型](https://www.nber.org/system/files/working_papers/w26463/w26463.pdf)结合使用时）和更高效的实验流程。
- en: '**Final Remarks**: While this introduction has highlighted several applications
    of hierarchical Bayesian models, we’ve only scratched the surface. We haven’t
    deep dived into granular implementation aspects such as prior and posterior predictive
    checks, formal goodness-of-fit assessments, computational scaling, distributed
    training, performance of estimation strategies (MCMC vs. SVI), and non-nested
    hierarchical structures, each of which deserves their own post.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**结语**：虽然本介绍已经强调了层次贝叶斯模型的一些应用，但我们只是触及了表面。我们没有深入探讨诸如先验和后验预测检查、正式的拟合优度评估、计算缩放、分布式训练、估计策略的性能（MCMC
    vs. SVI）和非嵌套层次结构等细粒度实现方面，每个方面都值得一篇单独的文章。'
- en: Nevertheless, this overview should provide a practical starting point for incorporating
    hierarchical Bayesian into your toolkit. These models offer a framework for handling
    (usually) messy, multi-level data structures that are often seen in real-world
    business problems. As you begin implementing these approaches, I’d love to hear
    about your experiences, challenges, successes, and new use cases for this class
    of model, so please reach out with questions, insights, or examples through [my
    email](/cdn-cgi/l/email-protection#7f0b0d1e111b1a0d1a140b0d163f18101018131a511c1012)
    or [LinkedIn](https://www.linkedin.com/in/derek-tran-ab75ab64/). If you have any
    feedback on this article, or would like to request another topic in causal inference/machine
    learning, please also feel free to reach out. Thank you for reading!
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，这个概述应该为将层次贝叶斯方法融入您的工具箱提供一个实用的起点。这些模型提供了一个框架来处理（通常）混乱的多级数据结构，这在现实世界的商业问题中经常遇到。随着您开始实施这些方法，我很乐意了解您的经验、挑战、成功以及这类模型的新应用案例，因此请通过[我的电子邮件](/cdn-cgi/l/email-protection#7f0b0d1e111b1a0d1a140b0d163f18101018131a511c1012)或[LinkedIn](https://www.linkedin.com/in/derek-tran-ab75ab64/)与我联系。如果您对这篇文章有任何反馈，或者想要请求因果推理/机器学习方面的其他主题，也请随时与我联系。感谢您阅读！
