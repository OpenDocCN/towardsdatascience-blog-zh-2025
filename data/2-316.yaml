- en: Estimating Product-Level Price Elasticities Using Hierarchical Bayesian
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用分层贝叶斯估计产品级价格弹性
- en: 原文：[https://towardsdatascience.com/estimating-product-level-price-elasticities-using-hierarchical-bayesian/](https://towardsdatascience.com/estimating-product-level-price-elasticities-using-hierarchical-bayesian/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/estimating-product-level-price-elasticities-using-hierarchical-bayesian/](https://towardsdatascience.com/estimating-product-level-price-elasticities-using-hierarchical-bayesian/)
- en: In this article, I will introduce you to hierarchical Bayesian (HB) modelling,
    a flexible approach to automatically combine the results of multiple sub-models.
    This method enables estimation of individual-level effects by optimally combining
    information across different groupings of data through Bayesian updating. This
    is particularly valuable when individual units have limited observations but share
    common characteristics/behaviors with other units.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我将向您介绍分层贝叶斯（HB）建模，这是一种灵活的方法，可以自动结合多个子模型的结果。这种方法通过贝叶斯更新，最优地结合不同数据分组的信息来估计个体层面的效应。当个体单位观察有限但与其他单位共享共同特征/行为时，这一点尤其有价值。
- en: The following sections will introduce the concept, implementation, and alternative
    use cases for this method.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 以下部分将介绍该方法的理念、实施和替代用例。
- en: The Problem with Traditional Approaches
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 传统方法的局限性
- en: 'As an application, imagine that we’re a large grocery store trying to maximize
    product-level revenue by setting prices. We would need to estimate the demand
    curve (elasticity) for each product, then optimize some profit maximization function.
    As the first step to this workstream, we would need to estimate the price elasticity
    of demand (how responsive demand is to a 1% change in price) given some longitudinal
    data with $i \in N$ products over $t \in T$ periods. Remember that the price elasticity
    of demand is defined as:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 作为应用，想象一下我们是一家大型杂货店，试图通过设定价格来最大化产品级收入。我们需要估计每个产品的需求曲线（弹性），然后优化一些利润最大化函数。作为这项工作的第一步，我们需要估计给定
    $i \in N$ 个产品在 $t \in T$ 个时期的长序列数据中的需求价格弹性（需求对价格1%变化的反应程度）。记住，需求价格弹性定义为：
- en: $$\beta=\frac{\partial \log{\textrm{Units}}_{it}}{\partial \log \textrm{Price}_{it}}$$
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: $$\beta=\frac{\partial \log{\textrm{Units}}_{it}}{\partial \log \textrm{Price}_{it}}$$
- en: 'Assuming no confounders, we can use a log-linear [fixed-effect regression model](https://theeffectbook.net/ch-FixedEffects.html)
    to estimate our parameter of interest:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 假设没有混杂因素，我们可以使用对数线性[固定效应回归模型](https://theeffectbook.net/ch-FixedEffects.html)来估计我们感兴趣的参数：
- en: $$\log(\textrm{Units}_{it})= \beta \log(\textrm{Price})_{it} +\gamma_{c(i),t}+
    \delta_i+ \epsilon_{it}$$
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: $$\log(\textrm{Units}_{it})= \beta \log(\textrm{Price})_{it} +\gamma_{c(i),t}+
    \delta_i+ \epsilon_{it}$$
- en: '<mdspan datatext="el1748030373035" class="mdspan-comment">Where</mdspan> $\gamma_{c(i),t}$
    is a set of category-by-time dummy variables to capture the average demand in
    each category-time period and $\delta_i$ is a set of product dummies to capture
    the time-invariant demand shifter for each product. This “fixed-effect” formulation
    is standard and common in many regression-based models to control for unobserved
    confounders. This (pooled) regression model allows us to recover the average elasticity
    $\beta$ across all $N$ units. This would mean that the store could target an average
    price level across all products in their store to maximize the revenue:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748030373035" class="mdspan-comment">其中</mdspan> $\gamma_{c(i),t}$
    是一组按类别-时间虚拟变量，用于捕捉每个类别-时间期间的平均需求，而 $\delta_i$ 是一组产品虚拟变量，用于捕捉每个产品的需求位移。这种“固定效应”公式在许多基于回归的模型中是标准且常见的，用于控制不可观测的混杂因素。这个（合并的）回归模型使我们能够恢复所有
    $N$ 个单位的平均弹性 $\beta$。这意味着商店可以针对其店内所有产品的平均价格水平进行定位，以最大化收入：
- en: $$\underset{\textrm{Price}_t}{\max} \;\;\; \textrm{Price}_{t}\cdot\mathbb{E}(\textrm{Quantity}_{t}
    | \textrm{Price}_{t}, \beta)$$
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: $$\underset{\textrm{Price}_t}{\max} \;\;\; \textrm{Price}_{t}\cdot\mathbb{E}(\textrm{Quantity}_{t}
    | \textrm{Price}_{t}, \beta)$$
- en: 'If these units have a natural grouping (product categories), we might be able
    to identify the average elasticity of each category by running separate regressions
    (or interacting the price elasticity with the product category) for each category
    using only units from that category. This would mean that the store could target
    average prices in each category to maximize category-specific revenue, such that:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这些单位有自然的分组（产品类别），我们可能可以通过为每个类别运行单独的回归（或交互价格弹性和产品类别）来识别每个类别的平均弹性，仅使用该类别的单位。这意味着商店可以针对每个类别的平均价格进行定位，以最大化特定类别的收入，从而：
- en: $$\underset{\textrm{Price}_{c(i),t}}{\max} \;\;\; \textrm{Price}_{c(i),t}\cdot\mathbb{E}(\textrm{Quantity}_{c(i),t}
    | \textrm{Price}_{c(i),t}, \beta_{c(i)})$$
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: $$\underset{\textrm{Price}_{c(i),t}}{\max} \;\;\; \textrm{Price}_{c(i),t}\cdot\mathbb{E}(\textrm{Quantity}_{c(i),t}
    | \textrm{Price}_{c(i),t}, \beta_{c(i)})$$
- en: With sufficient data, we could even run separate regressions for each individual
    product to obtain more granular elasticities.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果数据足够充分，我们甚至可以为每个产品运行单独的回归，以获得更细粒度的弹性。
- en: 'However, real-world data often presents challenges: some products have minimal
    price variation, short sales histories, or class imbalance across categories.
    Under these restrictions, running separate regressions to identify product elasticity
    would likely lead to large standard errors and weak identification of $\beta$.
    HB models addresses these issues by allowing us to obtain granular estimates of
    the coefficient of interest by sharing statistical strength both across different
    groupings while preserving heterogeneity. With the HB formulation, it is possible
    to run one single regression (like the pooled case) while still recovering elasticities
    at the product level, allowing for granular optimizations.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，现实世界的数据常常带来挑战：一些产品价格变化最小，销售历史短暂，或类别之间存在不平衡。在这些限制下，运行单独的回归以识别产品弹性可能会导致标准误差很大，并且对
    $\beta$ 的识别较弱。HB 模型通过允许我们在不同分组之间共享统计力量，同时保持异质性，从而解决了这些问题，使我们能够获得感兴趣系数的细粒度估计。使用
    HB 公式，我们可以在产品级别恢复弹性，同时运行一个单一的回归（如合并案例），从而允许进行细粒度优化。
- en: Understanding Hierarchical Bayesian Models
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解层次贝叶斯模型
- en: 'At its core, HB is about recognizing the natural structure in our data. Rather
    than treating all observations as completely independent (many separate regressions)
    or forcing them to follow identical patterns (one pooled regression), we acknowledge
    that observations can cluster into groups, with products inside each group sharing
    similar patterns. The “hierarchical” aspect refers to how we organize our parameters
    in different levels. In its most basic format, we could have:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，HB 是关于识别我们数据中的自然结构。我们不是将所有观察值视为完全独立（许多单独的回归）或强迫它们遵循相同的模式（一个合并回归），而是承认观察值可以聚集成组，每个组内的产品共享相似的模式。“层次”方面指的是我们如何在不同级别组织我们的参数。在其最基本的形式中，我们可能有：
- en: A Global parameter that applies to all data.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 适用于所有数据的全局参数。
- en: Group-level parameters that apply to observations within that group.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 适用于该组内观察值的组级参数。
- en: Individual-level parameters that apply to each specific individual.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 适用于每个特定个体的个体级参数。
- en: This methodology is flexible enough to add or remove hierarchies as needed,
    depending on the desired level of pooling. For example, if we think there are
    no similarities across categories, we could remove the global parameter. If we
    think that these products have no natural groupings, we could remove the group-level
    parameters. If we only care about the group-level effect, we can remove the individual-level
    parameter and have the group-level coefficients as our most granular parameter.
    If there exists the presence of subgroups nested within the groups, we can add
    another hierarchical layer. The possibilities are endless!
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法足够灵活，可以根据需要添加或删除层次结构，取决于所需的合并水平。例如，如果我们认为类别之间没有相似性，我们可以移除全局参数。如果我们认为这些产品没有自然的分组，我们可以移除组级参数。如果我们只关心组级效应，我们可以移除个体级参数，并将组级系数作为我们最细粒度的参数。如果组内存在嵌套的子组，我们可以添加另一个层次层。可能性是无限的！
- en: The “Bayesian” aspect refers to how we update our beliefs about these parameters
    based on observed data. We first start with a proposed prior distribution that
    represent our initial belief of these parameters, then update them iteratively
    to recover a posterior distributions that incorporates the information from the
    data. In practice, this means that we use the global-level estimate to inform
    our group-level estimates, and the group-level parameters to inform the unit-level
    parameters. Units with a larger number of observations are allowed to deviate
    more from the group-level means, while units with a limited number of observations
    are pulled closer to the means.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: “贝叶斯”方面指的是我们如何根据观察到的数据更新对这些参数的信念。我们首先从一个代表我们对这些参数初始信念的先验分布开始，然后迭代地更新它们以恢复一个后验分布，该分布结合了数据的信息。在实践中，这意味着我们使用全局级别的估计来告知我们的组级别估计，以及组级别参数来告知单位级别参数。观察数量较多的单位允许有更大的偏差，而观察数量有限的单位则被拉向平均值。
- en: 'Let’s formalize this with our price elasticity example, where we (ideally)
    want to recover the unit-level price elasticity. We estimate:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过我们的价格弹性示例来正式化这一点，其中我们（理想情况下）想要恢复单位级别的价格弹性。我们估计：
- en: $$\log(\textrm{Units}_{it})= \beta_i \log(\textrm{Price})_{it} +\gamma_{c(i),t}
    + \delta_i + \epsilon_{it}$$
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: $$\log(\textrm{Units}_{it})= \beta_i \log(\textrm{Price})_{it} +\gamma_{c(i),t}
    + \delta_i + \epsilon_{it}$$
- en: 'Where:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: $\beta_i \sim \textrm{Normal}(\beta_{c\left(i\right)},\sigma_i)$
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $\beta_i \sim \textrm{Normal}(\beta_{c\left(i\right)},\sigma_i)$
- en: $\beta_{c(i)}\sim \textrm{Normal}(\beta_g,\sigma_{c(i)})$
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $\beta_{c(i)}\sim \textrm{Normal}(\beta_g,\sigma_{c(i)})$
- en: $\beta_g\sim \textrm{Normal}(\mu,\sigma)$
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $\beta_g\sim \textrm{Normal}(\mu,\sigma)$
- en: 'The only difference from the first equation is that we replace the global $\beta$
    term with product-level betas $\beta_i$. We specify that the unit level elasticity
    $\beta_i$ is drawn from a normal distribution centered around the category-level
    elasticity average $\beta_{c(i)}$, which is drawn from a shared global elasticity
    $\beta_g$ for all groups. For the spread of the distribution $\sigma$, we can
    assume a hierarchical structure for that too, but in this example, we just set
    basic priors for them to maintain simplicity. For this application, we assume
    a prior belief of: ${ \mu= -2, \sigma= 1, \sigma_{c(i)}=1, \sigma_i=1}$. This
    formulation of the prior assumes that the global elasticity is elastic, 95% of
    the elasticities fall between -4 and 0, with a standard deviation of 1 at each
    hierarchical level. To test whether these priors are correctly specified, we would
    do a [prior predictive checks](https://www.pymc.io/projects/docs/en/stable/learn/core_notebooks/posterior_predictive.html)
    (not covered in this article) to see whether our prior beliefs can recover the
    data that we observe.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 与第一个方程的唯一区别是我们将全局 $\beta$ 项替换为产品级别的 $\beta_i$。我们指定单位级别的弹性 $\beta_i$ 是从围绕类别级别弹性平均值
    $\beta_{c(i)}$ 的正态分布中抽取的，而 $\beta_{c(i)}$ 是从为所有组共享的全局弹性 $\beta_g$ 中抽取的。对于分布的 $\sigma$
    范围，我们也可以假设一个分层结构，但在本例中，我们只为它们设置基本的先验，以保持简单。对于这个应用，我们假设先验信念为：${ \mu= -2, \sigma=
    1, \sigma_{c(i)}=1, \sigma_i=1}$。这种先验公式的假设是全球弹性是弹性的，95% 的弹性介于 -4 和 0 之间，每个分层级别的标准差为
    1。为了测试这些先验是否正确指定，我们会进行 [先验预测检查](https://www.pymc.io/projects/docs/en/stable/learn/core_notebooks/posterior_predictive.html)（本文未涉及）以查看我们的先验信念是否可以恢复我们观察到的数据。
- en: This hierarchical structure allows information to flow between products in the
    same category and across categories. If a particular product has limited price
    variation data, its elasticity will be pulled toward the category elasticity $\beta_{c(i)}$.
    Similarly, categories with fewer products will be influenced more by the global
    elasticity, which derives its mean from all category elasticities. The beauty
    of this approach is that the degree of “pooling” happens automatically based on
    the data. Products with lots of price variation will maintain estimates closer
    to their individual data patterns, while those with sparse data will borrow more
    strength from their group.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这种分层结构允许同一类别和跨类别之间的信息流动。如果一个特定产品的价格变动数据有限，其弹性将趋向于该类别的弹性 $\beta_{c(i)}$。同样，产品较少的类别将更多地受到全球弹性的影响，其平均值来自所有类别的弹性。这种方法的优点在于，“汇总”的程度是自动根据数据发生的。价格变动较多的产品将保持更接近其个别数据模式的估计，而数据稀疏的产品将从其群体中借用更多的力量。
- en: Implementation
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现
- en: In this section, we implement the above model using the Numpyro package in Python,
    a lightweight probabilistic programming language powered by JAX for autograd and
    JIT compilation to GPU/TPU/CPU. We start off by generating our synthetic data,
    defining the model, and fitting the model to the data. We close out with some
    visualizations of the results.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们使用Python中的Numpyro包实现上述模型，这是一个由JAX提供自动微分和JIT编译到GPU/TPU/CPU的轻量级概率编程语言。我们首先生成我们的合成数据，定义模型，并将模型拟合到数据中。我们以一些结果的可视化结束。
- en: Data Generating Process
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据生成过程
- en: We simulate sales data where demand follows a log-linear relationship with price
    and the product-level elasticity is generated from a Gaussian distribution $\beta_i
    \sim \textrm{Normal}(-2, 0.7)$. We add in a random price change every time period
    with a $50\%$ probability, category-specific time trends, and random noise. This
    adds in multiplicatively to generate our log expected demand. From the log expected
    demand, we exponentiate to get the actual demand, and draw realized units sold
    from a Poisson distribution. We then filter to keep only units with more than
    100 units sold (helps accuracy of estimates, not a necessary step), and are left
    with $N=11,798$ products over $T = 156$ periods (weekly data for 3 years). From
    this dataset, the true global elasticity is $\beta_g = -1.6$, with category-level
    elasticities ranging from $\beta_{c(i)} \in [-1.68, -1.48]$.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们模拟的销售数据中，需求遵循与价格的对数线性关系，产品级别的弹性由高斯分布 $\beta_i \sim \textrm{Normal}(-2, 0.7)$
    生成。我们每次周期以50%的概率添加随机价格变化，类别特定的时间趋势和随机噪声。这通过乘法添加以生成我们的对数预期需求。从对数预期需求中，我们进行指数运算以获得实际需求，并从泊松分布中抽取实际销售单位。然后我们过滤掉只销售超过100个单位的单位（有助于估计的准确性，但不是必要步骤），剩下
    $N=11,798$ 个产品在 $T = 156$ 个周期内（3年的周数据）。从这个数据集中，真正的全球弹性是 $\beta_g = -1.6$，类别级别的弹性范围在
    $\beta_{c(i)} \in [-1.68, -1.48]$。
- en: Keep in mind that this DGP ignores a lot of real-world intricacies. We do not
    model any factors that could jointly affect both prices and demand (such as promotions),
    and we do not model any confounders. This example is purely meant to show that
    we can recover the product-specific elasticity under a wells-specified model,
    and does not aim to cover how to correctly identify that price is exogenous. However,
    I suggest that interested readers refer to [Causal Inference for the Brave and
    True](https://matheusfacure.github.io/python-causality-handbook/landing-page.html)
    for an introduction to causal inference.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这个数据生成过程忽略了现实世界中的许多复杂性。我们没有对可能同时影响价格和需求的因素（如促销）进行建模，也没有对混杂因素进行建模。这个例子纯粹是为了说明，在模型规定良好的情况下，我们可以恢复特定产品的弹性，并不旨在涵盖如何正确识别价格是外生的。然而，我建议感兴趣的读者参考[Causal
    Inference for the Brave and True](https://matheusfacure.github.io/python-causality-handbook/landing-page.html)以了解因果推断的介绍。
- en: '[PRE0]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
