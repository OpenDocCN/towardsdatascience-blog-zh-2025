- en: Model
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型
- en: We begin by creating indices for products, categories, and category-time combinations
    using `pd.factorize()`. This allows us to seelct the correct parameter for each
    observation. We then convert the price (logged) and units series into JAX arrays,
    then create plates that corresponds to each of our parameter groups. These plates
    store the parameters values for each level of the hierarchy, along with storing
    the parameters representing the fixed effects.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先使用 `pd.factorize()` 创建产品、类别以及类别-时间组合的索引。这使我们能够为每个观测值选择正确的参数。然后，我们将价格（取对数）和单位序列转换为
    JAX 数组，然后创建与我们的参数组相对应的板。这些板存储了每个层级参数的值，以及表示固定效应的参数。
- en: 'The model uses NumPyro’s plate to define the parameter groups:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型使用 NumPyro 的板来定义参数组：
- en: '`global_a`: 1 global price elasticity parameter with a $\textrm{Normal}(-2,
    1)$ prior.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`global_a`：1 个全局价格弹性参数，具有 $\textrm{Normal}(-2, 1)$ 先验。'
- en: '`category_a`: $C=10$ category-level elasticities with priors centered on the
    global parameter and standard deviation of 1.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`category_a`：$C=10$ 个类别级弹性参数，其先验值以全局参数为中心，标准差为 1。'
- en: '`product_a`: $N=11,798$ product-specific elasticities with priors centered
    on their respective category parameters and standard deviation of 1.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`product_a`：$N=11,798$ 个产品特定的弹性参数，其先验值以各自的类别参数为中心，标准差为 1。'
- en: '`product_effect`: $N=11,798$ product-specific baseline demand effects with
    a standard deviation of 3.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`product_effect`：$N=11,798$ 个产品特定的基线需求效应，标准差为 3。'
- en: '`time_cat_effects`: $(T=156)\cdot(C=10)$ time-varying effects specific to each
    category-time combination with a standard deviation of 3.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`time_cat_effects`：$(T=156)\cdot(C=10)$ 每个类别-时间组合的时间变化效应，标准差为 3。'
- en: We then [reparameterize](https://sassafras13.github.io/ReparamTrick/) the parameters
    using The `LocScaleReparam()` argument to improve sampling efficiency and avoid
    funneling. After creating the parameters, we calculate log expected demand, then
    convert it back to a rate parameter with clipping for numerical stability. Finally,
    we call on the data plate to sample from a Poisson distribution with the calculated
    rate parameter. The optimization algorithm will then find the values of the parameters
    that best fit the data using stochastic gradient descent. Below is a graphical
    representation of the model to show the relationship between the parameters.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们使用 `LocScaleReparam()` 参数重新参数化参数，以提高采样效率并避免漏斗效应。在创建参数后，我们计算对数预期需求，然后将其转换回一个带有剪辑的率参数，以保持数值稳定性。最后，我们调用数据板从具有计算出的率参数的泊松分布中进行采样。优化算法然后将找到最佳拟合数据的参数值，使用随机梯度下降。以下是对模型进行图形表示，以展示参数之间的关系。
- en: '![](../Images/7f0100e5dc6b3db8bed5fde0586a652d.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![模型图](../Images/7f0100e5dc6b3db8bed5fde0586a652d.png)'
- en: '[PRE1]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Estimation
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 估计
- en: While there are multiple ways to estimate this equation, we use [Stochastic
    Variational Inference](https://jmlr.org/papers/volume14/hoffman13a/hoffman13a.pdf)
    (SVI) for this particular application. As an overview, SVI is a gradient-based
    optimization method to minimize the KL-divergence between a proposed posterior
    distribution to the true posterior distribution by minimizing the ELBO. This is
    a different estimation technique from [Markov-Chain Monte Carlo](https://www.publichealth.columbia.edu/research/population-health-methods/markov-chain-monte-carlo)
    (MCMC), which samples directly from the true posterior distribution. In real-world
    applications, SVI is more efficient and easily scales to large datasets. For this
    application, we set a random seed, initialize the guide (family of posterior distribution,
    assumed to be a Diagonal Normal), define the learning rate schedule and optimizer
    in Optax, and run the optimization for 1,000,000 (takes ~1 hour) iterations. While
    the model might have converged beforehand, the loss still improves by a minor
    amount even after running the optimization for 1,000,000 iterations. Finally,
    we plot the (log) losses.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然有多种方法可以估计这个方程，但我们在这次特定应用中使用了 [Stochastic Variational Inference](https://jmlr.org/papers/volume14/hoffman13a/hoffman13a.pdf)（SVI）。作为一个概述，SVI
    是一种基于梯度的优化方法，通过最小化 ELBO 来最小化提议的后验分布与真实后验分布之间的 KL 散度。这与 [Markov-Chain Monte Carlo](https://www.publichealth.columbia.edu/research/population-health-methods/markov-chain-monte-carlo)（MCMC）不同，MCMC
    直接从真实后验分布中采样。在实际应用中，SVI 更高效，并且可以轻松扩展到大型数据集。对于这个应用，我们设置了一个随机种子，初始化了指南（后验分布的家族，假设为对角正态分布），在
    Optax 中定义了学习率计划和优化器，并运行了 1,000,000 次迭代（大约需要 1 小时）。虽然模型可能在此之前已经收敛，但在运行了 1,000,000
    次迭代后，损失仍然略有改善。最后，我们绘制了（对数）损失图。
- en: '![](../Images/e571c77ccb4afe944b074d5bd0f567f2.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e571c77ccb4afe944b074d5bd0f567f2.png)'
- en: '[PRE2]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Recovering Posterior Samples**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**恢复后验样本**'
- en: Once the model has been trained, we can can recover the posterior distribution
    of the parameters by feeding in the resulting parameters and the initial dataset.
    We cannot call the parameters `svi_result.params` directly since Numpyro uses
    an affline transformation on the back-end for non-Normal distributions. Therefore,
    we sample 1000 times from the posterior distribution and calculate the mean and
    standard deviation of each parameter in our model. The final part of the following
    code creates a dataframe with the estimated elasticity for each product at each
    hierarchical level, which we then join back to our original dataframe to test
    whether the algorithm recovers the true elasticity.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦模型训练完成，我们可以通过输入结果参数和初始数据集来恢复参数的后验分布。由于Numpyro在非正态分布的后端使用仿射变换，我们不能直接调用参数`svi_result.params`。因此，我们从后验分布中采样1000次，并计算我们模型中每个参数的均值和标准差。以下代码的最后一部分创建了一个包含每个产品在每个层级上估计弹性的dataframe，然后我们将它合并回原始dataframe以测试算法是否恢复了真实的弹性。
- en: '[PRE3]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '| product | category | time_period | price | units_sold | product_elasticity
    | category_elasticity | global_elasticity | cat_by_time | product_elasticity_svi
    | product_elasticity_svi_std | category_elasticity_svi | category_elasticity_svi_std
    | global_a_svi | global_a_svi_std |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
  zh: '| 产品 | 类别 | 时间段 | 价格 | 销售单位 | 产品弹性 | 类别弹性 | 全球弹性 | 按时间分类 | 产品弹性_svi | 产品弹性_svi_std
    | 类别弹性_svi | 类别弹性_svi_std | 全球_a_svi | 全球_a_svi_std |'
