  type: TYPE_TB
  zh: '| product | category | time_period | price | units_sold | product_elasticity
    | category_elasticity | global_elasticity | cat_by_time |'
- en: '| --- | --- | --- | --- | --- | --- | --- | --- | --- |'
  id: totrans-44
