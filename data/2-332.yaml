- en: How to Build an AI Journal with LlamaIndex
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用 LlamaIndex 构建 AI 期刊
- en: 原文：[https://towardsdatascience.com/how-to-build-an-ai-journal-to-build-your-own-principles/](https://towardsdatascience.com/how-to-build-an-ai-journal-to-build-your-own-principles/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-build-an-ai-journal-to-build-your-own-principles/](https://towardsdatascience.com/how-to-build-an-ai-journal-to-build-your-own-principles/)
- en: '<mdspan datatext="el1747426306756" class="mdspan-comment">This post</mdspan>
    will share how to build an AI journal with the [LlamaIndex](https://www.llamaindex.ai/).
    We will cover one essential function of this AI journal: asking for advice. We
    will start with the most basic implementation and iterate from there. We can see
    significant improvements for this function when we apply design patterns like
    agentic RAG and multi-agent workflow.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747426306756" class="mdspan-comment">这篇帖子</mdspan>将分享如何使用
    [LlamaIndex](https://www.llamaindex.ai/) 构建一个 AI 期刊。我们将涵盖这个 AI 期刊的一个基本功能：寻求建议。我们将从最基本实现开始，并在此基础上迭代。当我们应用像
    Agentic RAG 和多智能体工作流程这样的设计模式时，我们可以看到这个功能有显著的改进。
- en: You can find the source code of this AI Journal in my GitHub repo [here](https://github.com/PepperStudio77/principle-master).
    And about [who I am](https://www.linkedin.com/in/ming-gao-57509a101/).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在我的 GitHub 仓库 [这里](https://github.com/PepperStudio77/principle-master) 找到这份
    AI 期刊的源代码。关于[我是谁](https://www.linkedin.com/in/ming-gao-57509a101/)。
- en: Overview of AI Journal
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI 期刊概述
- en: 'I want to build my principles by following Ray Dalio’s practice. An AI journal
    will help me to self-reflect, track my improvement, and even give me advice. The
    overall function of such an AI journal looks like this:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我想通过遵循 Ray Dalio 的实践来建立我的原则。一个 AI 期刊将帮助我进行自我反思，跟踪我的进步，甚至给我提供建议。这样一个 AI 期刊的整体功能看起来是这样的：
- en: '![](../Images/d23951bc7be6b32d26029c027dc57fe5.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d23951bc7be6b32d26029c027dc57fe5.png)'
- en: AI Journal Overview. Image by Author.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: AI 期刊概览。图片由作者提供。
- en: Today, we will only cover the implementation of the seek-advise flow, which
    is represented by multiple purple cycles in the above diagram.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我们将只涵盖寻求建议流程的实现，这在上述图中由多个紫色循环表示。
- en: 'Simplest Form: LLM with Large Context'
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最简单形式：具有大上下文的 LLM
- en: In the most straightforward implementation, we can pass all the relevant content
    into the context and attach the question we want to ask. We can do that in LlamaIndex
    with a few lines of code.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在最直接的实施方式中，我们可以将所有相关内容传递到上下文中，并附加我们想要提出的问题。我们可以在 LlamaIndex 中用几行代码做到这一点。
- en: '[PRE0]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '{book_content}'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '{书籍内容}'
- en: '[PRE1]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '{user_profile}'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '{用户资料}'
- en: '[PRE2]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '{user_question}'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '{用户问题}'
- en: '[PRE3]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'This approach has downsides:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法存在一些缺点：
- en: 'Low Precision: Loading all the book context might prompt LLM to lose focus
    on the user’s question.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 低精度：加载所有书籍上下文可能会使 LLM 丢失对用户问题的关注。
- en: 'High Cost: Sending over significant-sized content in every LLM call means high
    cost and poor performance.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高成本：在每次 LLM 调用中发送大量内容意味着成本高昂且性能不佳。
- en: With this approach, if you pass the whole content of Ray Dalio’s Principles
    book, responses to questions like “How to handle stress?” become very general.
    Such responses without relating to my question made me feel that the AI was not
    listening to me. Even though it covers many important concepts like *embracing
    reality*, *the 5-step process to get what you want*, and *being radically open-minded*.
    I like the advice I got to be more targeted to the question I raised. Let’s see
    how we can improve it with RAG.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这种方法，如果你传递 Ray Dalio 的《原则》一书的全部内容，对“如何处理压力？”这样的问题的回答就会非常笼统。这样的回答没有与我提出的问题相关联，让我感觉
    AI 没有在听我说话。即使它涵盖了像“接受现实”、“获得你想要的东西的 5 步过程”和“极端开放心态”等重要概念。我喜欢我得到的建议更加针对我提出的问题。让我们看看我们如何通过
    RAG 来改进它。
- en: 'Enhanced Form: Agentic RAG'
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 增强形式：Agentic RAG
- en: 'So, what is Agentic RAG? Agentic RAG is combining dynamic decision-making and
    data retrieval. In our AI journal, the Agentic RAG flow looks like this:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，什么是 Agentic RAG？Agentic RAG 是将动态决策和数据检索相结合。在我们的 AI 期刊中，Agentic RAG 流程看起来是这样的：
- en: '![](../Images/95a9d3e3fce172b49543964d186981b3.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/95a9d3e3fce172b49543964d186981b3.png)'
- en: Stages of Agentic Rag. Image by Author
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: Agentic Rag 阶段。图片由作者提供
- en: 'Question Evaluation: Poorly framed questions lead to poor query results. The
    agent will evaluate the user’s query and clarify the questions if the Agent believes
    it is necessary.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题评估：表述不佳的问题会导致查询结果不佳。智能体将评估用户的查询，并在智能体认为必要时澄清问题。
- en: 'Question Re-write: Rewrite the user enquiry to project it to the indexed content
    in the semantic space. I found these steps essential for improving the precision
    during the retrieval. Let’s say if your knowledge base is Q/A pair and you are
    indexing the questions part to search for answers. Rewriting the user’s query
    statement to a proper question will help you find the most relevant content.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题重写：将用户查询重写为在语义空间中将内容投影到索引内容。我发现这些步骤对于提高检索精度至关重要。比如说，如果你的知识库是Q/A对，而你正在索引问题部分以搜索答案。将用户的查询语句重写为一个合适的问题将帮助你找到最相关的内容。
- en: 'Query Vector Index: Many parameters can be tuned when building such an index,
    including chunk size, overlap, or a different index type. For simplicity, we are
    using VectorStoreIndex here, which has a default chunking strategy.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查询向量索引：在构建此类索引时，可以调整许多参数，包括块大小、重叠或不同的索引类型。为了简单起见，我们在这里使用VectorStoreIndex，它有一个默认的块化策略。
- en: 'Filter & Synthetic: Instead of a complex re-ranking process, I explicitly instruct
    LLM to filter and find relevant content in the prompt. I see LLM picking up the
    most relevant content, even though sometimes it has a lower similarity score than
    others.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过滤与合成：而不是复杂的重新排序过程，我明确指示LLM在提示中过滤和找到相关内容。我发现LLM甚至有时比其他内容具有更低的相似度得分，但它仍然能够挑选出最相关的内容。
- en: With this Agentic RAG, you can retrieve highly relevant content to the user’s
    questions, generating more targeted advice.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这种Agentic RAG，你可以检索与用户问题高度相关的内容，生成更有针对性的建议。
- en: Let’s examine the implementation. With the LlamaIndex SDK, creating and persisting
    an index in your local directory is straightforward.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查一下实现。使用LlamaIndex SDK，在本地目录中创建和持久化索引非常简单。
- en: '[PRE4]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Once we have an index, we can create a query engine on top of that. The query
    engine is a powerful abstraction that allows you to adjust the parameters during
    the query(e.g., TOP K) and the synthesis behaviour after the content retrieval.
    In my implementation, I overwrite the response_mode `NO_TEXT` because the agent
    will process the book content returned by the function call and synthesize the
    final result. Having the query engine to synthesize the result before passing
    it to the agent would be redundant.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们有了索引，我们就可以在其之上创建一个查询引擎。查询引擎是一个强大的抽象，它允许你在查询期间调整参数（例如，TOP K）以及在内容检索后的合成行为。在我的实现中，我覆盖了response_mode
    `NO_TEXT`，因为代理将处理函数调用返回的书籍内容并合成最终结果。在将结果传递给代理之前，让查询引擎合成结果将是多余的。
- en: '[PRE5]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'The prompt looks like the following:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 提示如下：
- en: '[PRE6]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Finally, we can build the agent with those functions defined.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以使用定义好的这些函数来构建代理。
- en: '[PRE7]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'There are a few observations I had during the implementations:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在实现过程中，我有以下几点观察：
- en: One interesting fact I found is that providing a non-used parameter, `original_question`
    , in the function signature helps. I found that when I do not have such a parameter,
    LLM sometimes does not follow the rewrite instruction and passes the original
    question in `rewrote_statement` the parameter. Having `original_question` parameters
    somehow emphasizes the rewriting mission to LLM.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我发现的一个有趣的事实是，在函数签名中提供一个未使用的参数`original_question`很有帮助。我发现，当我没有这样的参数时，LLM有时不会遵循重写指令，并将原始问题传递给`rewrote_statement`参数。有`original_question`参数似乎以某种方式强调了重写任务对LLM的重要性。
- en: Different LLMs behave quite differently given the same prompt. I found DeepSeek
    V3 much more reluctant to trigger function calls than other model providers. This
    doesn’t necessarily mean it is not usable. If a functional call should be initiated
    90% of the time, it should be part of the workflow instead of being registered
    as a function call. Also, compared to OpenAI’s models, I found Gemini good at
    citing the source of the book when it synthesizes the results.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在相同的提示下，不同的LLM表现差异很大。我发现DeepSeek V3比其他模型提供商更不愿意触发函数调用。这并不一定意味着它不可用。如果一个功能调用应该有90%的时间被启动，它应该成为工作流程的一部分，而不是注册为一个函数调用。此外，与OpenAI的模型相比，我发现Gemini在合成结果时很好地引用了书籍的来源。
- en: The more content you load into the context window, the more inference capability
    the model needs. A smaller model with less inference power is more likely to get
    lost in the large context provided.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你加载到上下文窗口中的内容越多，模型需要的推理能力就越大。一个推理能力较小的模型更有可能在提供的大上下文中迷失方向。
- en: However, to complete the seek-advice function, you’ll need multiple Agents working
    together instead of a single Agent. Let’s talk about how to chain your Agents
    together into workflows.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，要完成寻求建议的功能，你需要多个代理协同工作，而不是单个代理。让我们来谈谈如何将你的代理链式连接成工作流程。
- en: 'Final Form: Agent Workflow'
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最终形式：代理工作流程
- en: Before we start, I recommend this article by Anthropic, [Building Effective
    Agents.](https://www.anthropic.com/engineering/building-effective-agents) The
    one-liner summary of the articles is that *you should always prioritise building
    a workflow instead of a dynamic agent when possible*. In LlamaIndex, you can do
    both. It allows you to create an agent workflow with more automatic routing or
    a customised workflow with more explicit control of the transition of steps. I
    will provide an example of both implementations.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，我推荐Anthropic的这篇文章，[构建有效的代理](https://www.anthropic.com/engineering/building-effective-agents)。文章的一句总结是，*在可能的情况下，你应该始终优先构建工作流程而不是动态代理*。在LlamaIndex中，你可以两者兼得。它允许你创建一个具有更多自动路由的代理工作流程，或者一个具有更多显式控制步骤转换的自定义工作流程。我将提供两种实现的示例。
- en: '![](../Images/d6512da4d0d27d8a7f0eb27ade8bd0da.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d6512da4d0d27d8a7f0eb27ade8bd0da.png)'
- en: Workflow Explain. Image by Author.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程解释。图片由作者提供。
- en: Let’s take a look at how you can build a dynamic workflow. Here is a code example.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看你如何构建一个动态工作流程。下面是一个代码示例。
- en: '[PRE8]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: It is dynamic because the Agent transition is based on the function call of
    the LLM model. Underlying, LlamaIndex workflow provides agent descriptions as
    functions for LLM models. When the LLM model triggers such “Agent Function Call”,
    LlamaIndex will route to your next corresponding agent for the subsequent step
    processing. Your previous agent’s output has been added to the workflow internal
    state, and your following agent will pick up the state as part of the context
    in their call to the LLM model. You also leverage `state` and `memory` components
    to manage the workflow’s internal state or load external data(reference the document
    [here](https://docs.llamaindex.ai/en/stable/module_guides/deploying/agents/memory/#memory-vs-workflow-context)).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 它是动态的，因为代理转换基于LLM模型的函数调用。在底层，LlamaIndex工作流程为LLM模型提供代理描述作为函数。当LLM模型触发这样的“代理函数调用”时，LlamaIndex将路由到你的下一个相应代理进行后续步骤的处理。你的前一个代理的输出已添加到工作流程内部状态中，你的下一个代理将作为上下文的一部分在其对LLM模型的调用中获取状态。你还可以利用`state`和`memory`组件来管理工作流程的内部状态或加载外部数据（参考文档[此处](https://docs.llamaindex.ai/en/stable/module_guides/deploying/agents/memory/#memory-vs-workflow-context)）。
- en: 'However, as I have suggested, you can explicitly control the steps in your
    workflow to gain more control. With LlamaIndex, it can be done by extending the
    workflow object. For example:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，正如我之前建议的，你可以显式地控制工作流程中的步骤以获得更多控制。使用LlamaIndex，可以通过扩展工作流程对象来实现。例如：
- en: '[PRE9]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The specific event type’s return controls the workflow’s step transition. For
    instance, `retrieve` step returns an `Advice` event that will trigger the execution
    of the `advice` step. You can also leverage the `Advice` event to pass the necessary
    information you need.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 特定事件类型的返回值控制工作流程步骤的转换。例如，`retrieve`步骤返回一个`Advice`事件，这将触发`advice`步骤的执行。你还可以利用`Advice`事件来传递你需要的信息。
- en: During the implementation, if you are annoyed by having to start over the workflow
    to debug some steps in the middle, the *context object* is essential when you
    want to failover the workflow execution. You can store your state in a serialised
    format and recover your workflow by unserialising it to a context object. Your
    workflow will continue executing based on the state instead of starting over.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在实施过程中，如果你在调试中间步骤时不得不从头开始工作流程感到烦恼，那么当你想要故障转移工作流程执行时，*上下文对象*是至关重要的。你可以将你的状态以序列化格式存储，并通过反序列化到上下文对象中恢复你的工作流程。你的工作流程将根据状态继续执行，而不是从头开始。
- en: '[PRE10]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Summary
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this post, we have discussed how to use LlamaIndex to implement an AI journal’s
    core function. The key learning includes:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们讨论了如何使用LlamaIndex实现AI日志的核心功能。关键学习包括：
- en: Using Agentic RAG to leverage LLM capability to dynamically rewrite the original
    query and synthesis result.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用代理RAG来利用LLM的能力，动态重写原始查询和合成结果。
- en: Use a Customized Workflow to gain more explicit control over step transitions.
    Build dynamic agents when necessary.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用自定义工作流程以获得对步骤转换的更多显式控制。在必要时构建动态代理。
- en: The source code of this AI journal is in my GitHub repo [here](https://github.com/PepperStudio77/principle-master).
    I hope you enjoy this article and this small app I built. Cheers!
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这本AI期刊的源代码在我的GitHub仓库[这里](https://github.com/PepperStudio77/principle-master)可以找到。希望您喜欢这篇文章以及我构建的这个小型应用程序。干杯！
