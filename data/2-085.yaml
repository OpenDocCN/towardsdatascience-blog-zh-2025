  type: TYPE_NORMAL
  zh: 七月必读：可扩展AI、职业洞察力及更多
- en: 原文：[https://towardsdatascience.com/july-must-reads-scalable-ai-career-insights-and-more/](https://towardsdatascience.com/july-must-reads-scalable-ai-career-insights-and-more/)
