- en: Run Your Python Code up to 80x Faster Using the Cython Library
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Cython库将您的Python代码运行速度提高至80倍
- en: Learn how you can combine the speed of C with Python’s versatility and flexibility
    — Thomas Reid presents a four-step plan for integrating the Cython library into
    your code.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 了解如何结合C的速度与Python的灵活性和适应性——托马斯·里德提出了一个四步计划，用于将Cython库集成到您的代码中。
- en: '[Run Your Python Code up to 80x Faster Using the Cython Library](https://towardsdatascience.com/run-your-python-code-up-to-80x-faster-using-the-cython-library/)'
