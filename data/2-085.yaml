- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《变量》的最新一期，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: Summer slowdown? Not at TDS. As new and exciting developments continued to unfold
    in the world of large language models and [AI agents](https://towardsdatascience.com/tag/agentic-ai/),
    our authors shared smart and actionable insights on cutting-edge tools and approaches,
    and published some of our most widely circulating articles of the year.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 夏季放缓？在TDS不是这样。随着大型语言模型和[AI代理](https://towardsdatascience.com/tag/agentic-ai/)领域的新兴和令人兴奋的发展继续展开，我们的作者分享了关于尖端工具和方法的聪明和可操作见解，并发布了一些我们今年最受欢迎的文章。
- en: Read on to discover — or revisit — July’s most popular stories. They cover the
    inner workings of agentic-AI workflows and Python optimization (among many other
    topics), and also include a cluster of top-notch reflections on data and ML careers in
    a rapidly changing job landscape.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 继续阅读，发现或回顾七月最受欢迎的故事。它们涵盖了agentic-AI工作流程的内部运作和Python优化（以及其他许多主题），还包括了一组关于在快速变化的就业环境中数据科学和机器学习职业的顶级反思。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'A Developer’s Guide to Building Scalable AI: Workflows vs Agents'
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开发者构建可扩展AI指南：工作流程与代理
- en: As [Haily Quach](https://towardsdatascience.com/author/hailey-quach/?utm_source=newsletter&utm_medium=email&utm_campaign=tds%20variable) explains
    in our most-read article of the past month, it’s crucial to understand the architectural
    trade-offs between autonomous agents and orchestrated workflows — and practitioners
    on the ground (like you!) stand to gain a lot by making informed product decisions.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如[Haily Quach](https://towardsdatascience.com/author/hailey-quach/?utm_source=newsletter&utm_medium=email&utm_campaign=tds%20variable)在我们上个月最受欢迎的文章中所解释的那样，理解自主代理和编排工作流程之间的架构权衡至关重要——而且像您这样的从业者通过明智的产品决策可以获益良多。
- en: '[A Developer’s Guide to Building Scalable AI: Workflows vs Agents](https://towardsdatascience.com/a-developers-guide-to-building-scalable-ai-workflows-vs-agents/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[开发者构建可扩展AI指南：工作流程与代理](https://towardsdatascience.com/a-developers-guide-to-building-scalable-ai-workflows-vs-agents/)'
