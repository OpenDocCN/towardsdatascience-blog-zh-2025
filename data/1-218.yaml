- en: How to Build a Powerful Deep Research System
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何构建一个强大的深度研究系统
- en: 原文：[https://towardsdatascience.com/how-to-build-a-powerful-deep-research-system/](https://towardsdatascience.com/how-to-build-a-powerful-deep-research-system/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-build-a-powerful-deep-research-system/](https://towardsdatascience.com/how-to-build-a-powerful-deep-research-system/)
- en: <mdspan datatext="el1759451438162" class="mdspan-comment">Deep research</mdspan>
    is a popular feature you can activate in apps such as ChatGPT and Google Gemini.
    It allows users to ask a query as usual, and the application spends a longer time
    properly researching the question and coming up with a better answer than normal
    LLM responses.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759451438162" class="mdspan-comment">深度研究</mdspan> 是你可以在
    ChatGPT 和 Google Gemini 等应用程序中激活的流行功能。它允许用户像平常一样提出查询，应用程序会花费更长的时间对问题进行适当的调查，并给出比普通LLM响应更好的答案。
- en: You can also apply this to your own collection of documents. For example, suppose
    you have thousands of documents of internal company information, you might want
    to create a deep research system that takes in user questions, scans all the available
    (internal) documents, and comes up with a good answer based on that information.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以将此应用于你自己的文档集合。例如，假设你拥有成千上万份内部公司信息文档，你可能希望创建一个深度研究系统，该系统能够接收用户问题，扫描所有可用的（内部）文档，并根据这些信息提供良好的答案。
- en: '![Deep research system](../Images/2aaf29622584a3c878d079c396cb4df8.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![深度研究系统](../Images/2aaf29622584a3c878d079c396cb4df8.png)'
- en: This infographic highlights the main contents of this article. I’ll discuss
    in which situations you need to build a deep research system, and in which situations
    simpler approaches like RAG or keyword search are more suitable. Continuing, I’ll
    discuss how to build a deep research system, including gathering data, creating
    tools, and putting it all together with an orchestrator LLM and subagents. Image
    by ChatGPT.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这张信息图表突出了本文的主要内容。我将讨论在哪些情况下你需要构建一个深度研究系统，以及在哪些情况下更简单的方法，如RAG或关键词搜索更为合适。接下来，我将讨论如何构建一个深度研究系统，包括收集数据、创建工具，以及如何使用
    orchestrator LLM 和子代理将这些工具整合在一起。图片由 ChatGPT 提供。
