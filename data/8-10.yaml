- en: A short summary on why I am writing this series
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简短总结：为什么我要写这个系列
- en: My go-to tool for creating visualisations is Plotly. It’s incredibly intuitive,
    from layering traces to adding interactivity. However, whilst Plotly excels at
    functionality, it doesn’t come with a "data journalism" template that offers polished
    charts right out of the box.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建可视化图表的首选工具是 Plotly。它非常直观，从叠加轨迹到添加交互性。然而，虽然 Plotly 在功能上表现出色，但它没有提供“数据新闻”模板，该模板可以直接提供经过抛光的图表。
- en: That’s where this series comes in – I’ll be sharing how to transform Plotly’s
    charts into sleek, professional-grade charts that meet data journalism standards.
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这就是本系列的作用所在——我将分享如何将 Plotly 的图表转换成时尚、专业级的图表，满足数据新闻标准。
- en: '*PS: All images are authored by myself unless otherwise specified.*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '*PS：除非另有说明，所有图像均由我本人创作。*'
- en: Intro – No chart is ready by default to deal with a dominating category.
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介 – 没有图表是默认准备好处理主导类别的。
- en: 'When someone thinks about bar charts, they often picture clear and easily distinguishable
    bars that effectively present data.. But what happens if there is a bar that is
    so big that is dwarfs all the other bars? After reading my earlier [Awesome Plotly
    with code series (Part 3): Highlighting bars in the long tails](https://medium.com/towards-data-science/awesome-plotly-with-code-series-part-3-highlighting-bars-in-the-long-tails-8e5116e36003)
    post, **** you might say: "Jose, you already showed how to deal with small and
    difficult to detect bar charts, just highlight them". That is true enough, except
    that my previous post was highlighting 2 bars, not all-except-one bar!'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们想到柱状图时，他们通常会想象清晰且易于区分的柱子，有效地展示数据。但是，如果有一个柱子非常大，以至于它使其他所有柱子都显得渺小，会发生什么呢？在阅读我之前的[出色的
    Plotly 编码系列（第 3 部分）：突出显示长尾中的柱子](https://medium.com/towards-data-science/awesome-plotly-with-code-series-part-3-highlighting-bars-in-the-long-tails-8e5116e36003)文章后，你可能会说：“约瑟，你已经展示了如何处理小而难以检测的柱状图，只需突出显示它们”。这完全正确，但我的上一篇文章是突出显示
    2 个柱子，而不是除了一个之外的所有柱子！
- en: In this post I’ll show you how to present a chart where both the tall "skyscraper"
    bar and the smaller "one-story houses" are represented equally.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将向你展示如何展示一个图表，其中既代表高耸的“摩天大楼”柱子，也代表较小的“一层的房子”。
- en: What will we cover in this blog?
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们将在博客中涵盖什么？
- en: '**Scenario 1:** The skyscraper – Plotting a default chart chart'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**场景 1：摩天大楼 – 绘制默认图表**'
- en: '**Scenario 2:** The broken bar – Who invented this aberration?'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**场景 2：断裂的柱子 – 谁发明了这个异常？**'
- en: '**Scenario 3:** The separation – Providing space for both stories'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**场景 3：分离 – 为两个故事提供空间**'
- en: '*PS: As always, code and links to my GitHub repository will be provided along
    the way. Let’s get started!*'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '*PS：和往常一样，代码和我 GitHub 仓库的链接将在这个过程中提供。让我们开始吧！*'
- en: '![](../Images/362f2412bf8eb16fde2b97fa5aec5596.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/362f2412bf8eb16fde2b97fa5aec5596.png)'
- en: 'Scenario 1: Skyscraper bar charts and default plotting issues'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景 1：摩天大楼柱状图和默认绘图问题
- en: 'Imagine presenting a study about the languages spoken in England, and trying
    to create a bar chart that effectively showcases these insights. The idea is to
    focus on the non-English languages, as it is obvious that English is the dominating
    language. However, you still want to provide a view of how much more English is
    dominating over the rest. Here is the data you might be working with:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你正在展示一项关于英格兰使用的语言的研究，并试图创建一个能够有效展示这些见解的条形图。想法是关注非英语语言，因为很明显英语是主导语言。然而，你仍然想提供一个关于英语比其他语言更占主导地位的视角。以下是你可能正在处理的数据：
- en: '![Data source: ONS data](../Images/43a9db074bb7e580eb3860f20f092ee3.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![数据来源：ONS数据](../Images/43a9db074bb7e580eb3860f20f092ee3.png)'
- en: 'Data source: [ONS data](https://www.ons.gov.uk/datasets/TS024/editions/2021/versions/1)'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 数据来源：[ONS数据](https://www.ons.gov.uk/datasets/TS024/editions/2021/versions/1)
- en: You can see that English is spoken by 52 million people… and the next closest
    language is Polish with 600k! That is a 86x+ difference! If you were to plot this
    information through a bar chart, without really considering what would happen
    to the languages which are not English, then you would find yourself staring at
    the plot below.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到，英语被5200万人使用……而下一个最接近的语言是波兰语，有60万！这相差86倍！如果你要通过条形图来展示这些信息，而不真正考虑非英语语言会发生什么，那么你会发现自己在盯着下面的图表发呆。
- en: '![](../Images/ff7c43985df7a33fdf53561e4e70ee6b.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ff7c43985df7a33fdf53561e4e70ee6b.png)'
- en: '**Where do I think this plot has issues?**'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**我认为这个图表有哪些问题？**'
- en: It is clear that the smaller bars are so tiny that it is virtually impossible
    to tell the difference in heights between them.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 很明显，这些较细的条形如此之小，以至于几乎无法区分它们之间的高度差异。
- en: Even if you added the data labels, you cannot visually see that Panjabi, Urdu,
    Portuguese and Spanish are close, with Polish being 3x these languages.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 即使你添加了数据标签，你也无法直观地看到旁遮普语、乌尔都语、葡萄牙语和西班牙语与这些语言相近，而波兰语是这些语言的3倍。
- en: In fact, because you want to show the data labels with *"k"* to represent thousands,
    what happens with the 53 million English speakers? Do you also plot the data label
    with *"k"*?
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 事实上，因为你想要用 *"k"* 来表示千，那么对于5300万英语使用者来说会发生什么？你也会用 *"k"* 来标注数据标签吗？
- en: '![Summary of issues](../Images/3be8bf9844a2fde9d12cac115d261ebc.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![问题总结](../Images/3be8bf9844a2fde9d12cac115d261ebc.png)'
- en: Summary of issues
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 问题总结
- en: 'Scenario 2: The broken bar – Who invented this aberration?'
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景2：断裂条形图 - 谁发明了这种异常？
- en: My first encounter with a ‘broken bar chart’ was at school, and it’s a method
    I quickly learned to avoid in professional data visualization. I wish I hadn’t.
    It made so much sense when I was younger that it stayed in my head until I was
    faced with a presentation in my adulthood and stared at my broken bar plot with
    a "wtf" look.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我第一次在学校接触到“断裂条形图”，这是一种我很快学会在专业数据可视化中避免的方法。我希望我没有这样做。在我年轻的时候，这很有道理，以至于它一直留在我脑海中，直到我成年后面对一次演示，我带着“wtf”的表情盯着我的断裂条形图。
- en: What is a broken bar chart? Well, it is a bar chart where you cut the dominating
    category. The most common way to break a bar is by using 2 parallel lines. Check
    the chart below.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是断裂条形图？嗯，它是一种条形图，其中你切断了主导类别。最常见的断裂条形方式是使用两条平行线。请查看下面的图表。
- en: '![What the hell do those broken lines mean??!! - Visualisation from AddTwoDigital](../Images/452ea756ed37d8d1355922ffbf5689ad.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![那些断裂线究竟意味着什么？？！！ - 来自AddTwoDigital的视觉化](../Images/452ea756ed37d8d1355922ffbf5689ad.png)'
- en: What the hell do those broken lines mean??!! – Visualisation from [AddTwoDigital](https://www.addtwodigital.com/add-two-blog/2021/11/1/rule-26-dont-use-broken-axes-or-bars)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 那些断裂线究竟意味着什么？？！！ – 来自[AddTwoDigital](https://www.addtwodigital.com/add-two-blog/2021/11/1/rule-26-dont-use-broken-axes-or-bars)的视觉化
- en: '**Where do I think this plot has issues?**'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**我认为这个图表有哪些问题？**'
- en: The most important one is that it breaks the relationship between the rectangle
    dimension and the value of data. How are we supposed to imagine how big is the
    gap in the largest bar?
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最重要的是，它打破了矩形维度与数据值之间的关系。我们该如何想象最大条形之间的差距有多大呢？
- en: The broken parallel lines are a massive element of contrast. Our brains are
    wired to pick up differences, and this one shouts "Look at me!" Therefore, instead
    of reading the title first, and then focusing on the differences between bars,
    my eyes went directly to chasm in the skyscraper bar.
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 断裂的平行线是一个巨大的对比元素。我们的大脑天生就擅长捕捉差异，而这个对比则大声喊道：“看看我！”因此，我并没有先阅读标题，然后专注于条形之间的差异，而是我的眼睛直接跳到了摩天大楼条形图中的裂缝。
- en: You don’t know if the reader might interpret that the story is about something
    completely different. For example, why wouldn’t they think the story is highlighting
    there is incomplete data?
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您不知道读者是否可能会将故事解释为关于完全不同的事情。例如，他们为什么不会认为故事是在强调数据不完整呢？
- en: '![Summary of issues](../Images/2557aaa143d37e59ed694c5bf72d8943.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![问题总结](../Images/2557aaa143d37e59ed694c5bf72d8943.png)'
- en: Summary of issues
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 问题总结
- en: 'Scenario 3: Using subplots to balance dominant bar chart categories'
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景3：使用子图平衡主导条形图类别
- en: 'When faced with this kind of story, it’s much better to go back to the data
    and work out what you need to chart and why. Remember, you wanted to:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 面对这类故事时，最好回到数据中，弄清楚您需要绘制什么图表以及为什么。记住，您想要：
- en: Show the difference amongst the non-English languages.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展示非英语语言之间的差异。
- en: Provide the view of how English is still vastly dominating.
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展示英语仍然占据主导地位的情况。
- en: In this case, it seems we want to tell 2 stories. Therefore, my suggestion is
    to build 2 plots. Subplots are an essential tool in data visualisation, especially
    for balancing dominant bar chart categories. In fact, subplots should be part
    of your data visualisation toolkit! Below you can see my take at telling both
    stories.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们似乎想要讲述两个故事。因此，我的建议是构建两个图表。子图是数据可视化中的一个基本工具，尤其是在平衡主导条形图类别方面。实际上，子图应该是您数据可视化工具包的一部分！下面您可以看到我讲述这两个故事的尝试。
- en: '![](../Images/a12d89407142b81d6aba2729999f467f.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a12d89407142b81d6aba2729999f467f.png)'
- en: '**Why do I think this plot is better?**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么我认为这个图表更好？**'
- en: The plot clearly draws a boundary between both stories. The first is above English
    vs non-English. The second is above the relationship amongst non-English languages.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 该图表清楚地划定了两个故事之间的界限。第一个是英语与非英语的比较。第二个是非英语语言之间的关系。
- en: The range of the y-axis is different in both charts. To ensure that the reader
    doesn’t get confused, I have used colour to ensure that the story flows from the
    "5m" small bar chart in the first plot, to the second plot.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 两个图表的y轴范围不同。为了确保读者不会感到困惑，我使用了颜色来确保故事从第一个图表中的“5m”小条形图流畅地过渡到第二个图表。
- en: I have purposely given the first chart a narrower plotting space, whereas the
    second it wider.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我故意给第一个图表留出了较窄的绘图空间，而第二个则更宽。
- en: Tips on how to create this plot
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建此图表的技巧
- en: '***How to provide different widths for both subplots?***'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '***如何为子图提供不同的宽度？***'
- en: Use the `column_widths` parameter within `make_subplots()`
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`make_subplots()`中使用`column_widths`参数
- en: '[PRE0]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '***How to create different charts and add them to the subplots?***'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '***如何创建不同的图表并将它们添加到子图中？***'
- en: Use `add_trace()`, create the `go.Bar()` and specify the `row` and `col` you
    want to assign it to.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`add_trace()`，创建`go.Bar()`并指定您想要分配给它的`row`和`col`。
- en: '[PRE1]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '***How to adjust the aesthetics of the axis for subplots?***'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '***如何调整子图的轴美学？***'
- en: One easy way is to define the parameters inside `update_layout()`. Here, you
    can call `yaxis1` and `yaxis2`, and Plotly will loop in the order the traces are
    being plotted.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一种简单的方法是在`update_layout()`内部定义参数。在这里，您可以调用`yaxis1`和`yaxis2`，Plotly将按照绘制痕迹的顺序循环。
- en: For example, `yaxis1` will refer to the subplot in `(row=1, col=1)`, whereas
    `yaxis2` will refer to the subplot in `(row=1, col=2)`.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例如，`yaxis1`将指代`(row=1, col=1)`中的子图，而`yaxis2`将指代`(row=1, col=2)`中的子图。
- en: '[PRE2]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Summary
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: In summary, mastering bar charts with dominant categories involves thoughtful
    visualisation techniques, such as subplots, to ensure both large and small values
    are represented effectively. This blog demonstrates why a single bar chart often
    fails in this scenario, as the dominating "skyscraper" bar can obscure smaller
    values, making it hard to see relational differences among them.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，掌握具有主导类别的条形图需要深思熟虑的视觉化技术，如子图，以确保大值和小值都能有效地表示。这篇博客展示了为什么在这种情况下单个条形图往往失败，因为主导的“摩天大楼”条形图可能会掩盖较小的值，使得难以看到它们之间的相关性差异。
- en: 'Breaking the bar with "broken bars" disrupts data continuity, drawing too much
    attention to the break itself and confusing viewers. Instead, using subplots is
    a more effective approach: one plot can depict the dominating category, while
    a separate plot shows the smaller categories in finer detail. This way, each subplot
    can use appropriate scaling, color, and space to convey both "big picture" and
    "detailed view" stories clearly.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 使用“断裂条形图”打破条形图会中断数据连续性，过多地吸引观众对断裂本身的注意，并使观众感到困惑。相反，使用子图是一种更有效的方法：一个图表可以描绘主导类别，而另一个独立的图表则以更详细的细节展示较小的类别。这样，每个子图都可以使用适当的缩放、颜色和空间来清楚地传达“整体图景”和“详细视图”的故事。
