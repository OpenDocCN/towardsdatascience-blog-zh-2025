- en: 10 Data + AI Observations for Fall 2025
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2025年秋季的10个数据+AI观察点
- en: 原文：[https://towardsdatascience.com/10-data-ai-observations-to-watch-in-fall-2025/](https://towardsdatascience.com/10-data-ai-observations-to-watch-in-fall-2025/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/10-data-ai-observations-to-watch-in-fall-2025/](https://towardsdatascience.com/10-data-ai-observations-to-watch-in-fall-2025/)
- en: <mdspan datatext="el1759965759841" class="mdspan-comment">As we approach</mdspan>
    the final quarter of 2025, it’s time to step back and examine the trends that
    will shape data and AI in 2026.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759965759841" class="mdspan-comment">随着我们接近</mdspan> 2025年的最后一个季度，是时候退后一步，审视将塑造2026年数据和AI的趋势。
- en: While the headlines might focus on the latest model releases and benchmark wars,
    they’re far from the most transformative developments on the ground. The real
    change is playing out in the trenches — where data scientists, data + AI engineers,
    and AI/ML teams are activating these complex systems and technologies for production.
    And unsurprisingly, the push toward production AI—and its subsequent headwinds
    in <mdspan datatext="el1759965083876" class="mdspan-comment">2025</mdspan>—are
    steering the ship.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管标题可能关注最新的模型发布和基准战争，但这些远非地面上的最具有变革性的发展。真正的变化正在前线发生——数据科学家、数据+AI工程师和AI/ML团队正在激活这些复杂系统和技术以投入生产。不出所料，向生产AI的推动——以及随之而来的2025年的逆风——正在掌舵。
- en: Here are the ten trends defining this evolution, and what they mean heading
    into the final quarter of 2025.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是定义这一演变的十个趋势，以及它们在2025年最后一个季度即将到来的意义。
- en: 1\. “Data + AI leaders” are on the rise
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1\. “数据+AI领导者”正在崛起
- en: If you’ve been on LinkedIn at all recently, you might have noticed a suspicious
    rise in the number of data + AI titles in your newsfeed—even amongst your own
    team members.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你最近在LinkedIn上有所活动，你可能已经注意到新闻源中数据+AI相关标题的数量可疑地增加了——甚至包括你自己的团队成员。
- en: No, there wasn’t a restructuring you didn’t know about.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 不，没有你不知道的结构重组。
- en: While this is largely a voluntary change among those traditionally categorized
    as data *or* AI/ML professionals, this shift in titles reflects a reality on the
    ground that Monte Carlo has been discussing for almost a year now—data and AI
    are no longer two separate disciplines.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这种变化在很大程度上是那些传统上被归类为数据或AI/ML专业人士的自愿改变，但这种标题上的转变反映了蒙特卡洛几乎已经讨论了一年多的现实——数据和AI不再是两个独立的学科。
- en: From the resources and skills they require to the problems they solve, data
    and AI are two sides of a coin. And that reality is having a demonstrable impact
    on the way both teams and technologies have been evolving in 2025 (as you’ll soon
    see).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 从它们所需资源和技能到它们解决的问题，数据和AI是硬币的两面。这种现实正在对2025年（你很快就会看到）团队和技术的发展产生可观察的影响。
- en: 2\. Conversational BI is hot—but it needs a temperature check
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2\. 对话式BI很热门——但它需要温度检查
- en: Data democratization has been trending in one form or another for nearly a decade
    now, and Conversational BI is the latest chapter in that story.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 数据民主化已经以某种形式流行了近十年，而对话式BI是这一故事中的最新篇章。
- en: The difference between conversational BI and every other BI tool is the speed
    and elegance with which it promises to deliver on that utopian vision—even the
    most non-technical domain users.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式BI与其他BI工具的区别在于它承诺以多快和优雅的方式实现乌托邦愿景——即使是技术最不熟练的领域用户。
- en: 'The premise is simple: if you can ask for it, you can access it. It’s a win-win
    for owners and users alike…in theory. The challenge (as with all democratization
    efforts) isn’t the tool itself—it’s the reliability of the thing you’re democratizing.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 前提很简单：如果你能要求它，你就能访问它。这对所有所有者和用户来说都是双赢……在理论上。挑战（就像所有民主化努力一样）不是工具本身——而是你正在民主化的东西的可靠性。
- en: The only thing worse than bad insights is bad insights delivered quickly. Connect
    a chat interface to an ungoverned database, and you won’t just accelerate access—you’ll
    accelerate the consequences.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 比快速得到糟糕的见解更糟糕的是，快速得到糟糕的见解。将聊天界面连接到一个未受管理的数据库，你不仅会加速访问，还会加速后果。
- en: 3\. Context engineering is becoming a core discipline
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3\. 上下文工程正成为一门核心学科
- en: Input costs for AI models are roughly 300-400x larger than the outputs. If your
    context data is shackled with problems like incomplete metadata, unstripped HTML,
    or empty vector arrays, your team is going to face massive cost overruns while
    processing at scale. What’s more, confused or incomplete context is also a major
    [AI reliability](https://www.montecarlodata.com/blog-top-5-ai-reliability-pitfalls/#1-poor-source-data-quality)
    issue, with ambiguous product names and poor chunking confusing retrievers while
    small changes to prompts or models can lead to dramatically different outputs.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型的输入成本大约是输出的300-400倍。如果你的上下文数据被诸如不完整元数据、未去除HTML或空向量数组等问题所束缚，你的团队在处理大规模时将面临巨大的成本超支。更重要的是，混乱或不完整的上下文也是一个主要的[AI可靠性](https://www.montecarlodata.com/blog-top-5-ai-reliability-pitfalls/#1-poor-source-data-quality)问题，模糊的产品名称和糟糕的块划分会混淆检索器，而提示或模型的小幅变化可能导致截然不同的输出。
- en: Which makes it no surprise that context engineering has become the buzziest
    buzz word for data + AI teams in mid-year 2025\. Context engineering is the systematic
    process of preparing, optimizing, and maintaining context data for AI models.
    Teams that master upstream context monitoring—ensuring a reliable corpus and embeddings
    before they hit expensive processing jobs—will see much better outcomes from their
    AI models. But it won’t work in a silo.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这也就难怪上下文工程在2025年中期成为了数据+AI团队中最热门的词汇。上下文工程是为AI模型准备、优化和维护上下文数据的系统过程。那些掌握上游上下文监控——在它们进入昂贵的处理工作之前确保可靠的语料库和嵌入——的团队将看到他们AI模型更好的结果。但这不会在孤岛中起作用。
- en: The reality is that visibility into the context data alone can’t address AI
    quality—and neither can [AI observability](https://www.montecarlodata.com/blog-ai-observability/)
    solutions like evaluations. Teams need a comprehensive approach that provides
    visibility into the *entire* system *in* production—from the context data to the
    model and its outputs. An socio-technical approach that combines **[data + AI](https://www.montecarlodata.com/platform/data-ai-observability-platform)**
    together is the only path to reliable AI at scale.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 事实是，仅对上下文数据的可见性无法解决AI质量问题——像[AI可观察性](https://www.montecarlodata.com/blog-ai-observability/)解决方案这样的评估也无法解决。团队需要一个全面的方法，提供对生产中整个系统的可见性——从上下文数据到模型及其输出的全面系统。将**[数据+AI](https://www.montecarlodata.com/platform/data-ai-observability-platform)**结合在一起的社会-技术方法是实现大规模可靠AI的唯一途径。
- en: 4\. The AI enthusiasm gap widens
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. AI热情差距扩大
- en: The latest [MIT report](https://fortune.com/2025/08/18/mit-report-95-percent-generative-ai-pilots-at-companies-failing-cfo/)
    said it all. AI has a value problem. And the blame rests – at least in part –
    with the executive team.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 最新的[麻省理工学院报告](https://fortune.com/2025/08/18/mit-report-95-percent-generative-ai-pilots-at-companies-failing-cfo/)已经说得很清楚。AI存在价值问题。至少部分责任在于高管团队。
- en: “We still have a lot of folks who believe that AI is Magic and will do whatever
    you want it to do with no thought.”
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: “我们仍然有很多认为AI是魔法，可以无任何思考地做任何你想让它做的事情的人。”
- en: That’s a real quote, and it echoes a common story for data + AI teams
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这确实是一句名言，它反映了数据+AI团队的常见故事
- en: An executive who doesn’t understand the technology sets the priority
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不理解技术的管理者设定了优先级
- en: Project fails to provide value
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 项目未能提供价值
- en: Pilot is scrapped
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 试点项目被取消
- en: Rinse and repeat
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复上述过程
- en: Companies are spending billions on AI pilots with no clear understanding of
    where or how AI will drive impact—and it’s having a demonstrable impact on not
    only pilot performance, but AI enthusiasm as a whole.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 公司在AI试点项目上投入了数十亿美元，但对AI将如何产生影响以及如何产生影响没有明确的理解——这不仅在试点性能上产生了明显的影响，而且对整个AI热情也产生了影响。
- en: Getting to value needs to be the first, second, and third priorities. That means
    empowering the data + AI teams who understand both the technology and the data
    that’s going to power it with the autonomy to address real business problems—and
    the resources to make those use-cases reliable.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 获取价值需要成为首要、第二和第三优先级。这意味着赋予理解技术和将要推动其发展的数据的+AI团队以自主权，以解决真实业务问题，并拥有使这些用例可靠性的资源。
- en: 5\. Cracking the code on agents vs. agentic workflows
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 解密代理与代理工作流程
- en: While agentic aspirations have been fueling the hype machine over the last 18
    months, the semantic debate between “agentic AI” an “agents” was finally held
    on the hallowed ground of LinkedIn’s comments section this summer.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然在过去18个月中，代理的愿望一直在推动炒作机器，但“代理AI”与“代理”之间的语义辩论终于在LinkedIn的评论区这个神圣的领域上在今年夏天举行。
- en: At the heart of the issue is a material difference between the performance and
    cost of these two seemingly identical but surprisingly divergent tactics.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 问题的核心是这两种看似相同但出人意料地不同的策略在性能和成本上的实质性差异。
- en: '**Single-purpose agents** are workhorses for specific, well-defined tasks where
    the scope is clear and results are predictable. Deploy them for focused, repetitive
    work.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单一用途的代理**是针对具体、定义明确的任务的工作马，在这些任务中，范围是明确的，结果是可预测的。将它们用于专注的、重复性的工作。'
- en: '**Agentic workflows** tackle messy, multi-step processes by breaking them into
    manageable components. The trick is breaking big problems into discrete tasks
    that smaller models can handle, then using larger models to validate and aggregate
    results.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理工作流程**通过将复杂的多步骤过程分解为可管理的组件来处理混乱的过程。关键是把大问题分解成小模型可以处理的离散任务，然后使用更大的模型来验证和汇总结果。'
- en: '![](../Images/f1464fbce86c41ebc103c3805f1d44d4.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f1464fbce86c41ebc103c3805f1d44d4.png)'
- en: '*Image: Monte Carlo’s [Observability Agents](https://www.montecarlodata.com/platform/troubleshooting-agent)*'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '*图像：蒙特卡洛的[可观察性代理](https://www.montecarlodata.com/platform/troubleshooting-agent)*'
- en: For example, Monte Carlo’s Troubleshooting Agent uses an agentic workflow to
    orchestrate hundreds of sub-agents to investigate the root causes of data + AI
    quality issues.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，蒙特卡洛的故障排除代理使用代理工作流程来编排数百个子代理，以调查数据+AI质量问题的根本原因。
- en: 6\. Embedding quality is in the spotlight—and monitoring is right behind it
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 嵌入质量受到关注——监控紧随其后
- en: Unlike the data products of old, AI in its various forms isn’t deterministic
    by nature. What goes in isn’t always what comes out. So, demystifying what good
    looks like in this context means measuring not just the outputs, but also the
    systems, code, and inputs that feed them.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 与旧的数据产品不同，各种形式的AI在本质上不是确定性的。输入的并不总是输出的。因此，在这个背景下，揭示什么是好的意味着不仅要衡量输出，还要衡量提供这些输出的系统、代码和输入。
- en: Embeddings are one such system.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌入系统就是这样一种系统。
- en: When embeddings fail to represent the semantic meaning of the source data, AI
    will receive the wrong context regardless of vector database or model performance.
    Which is precisely why embedding quality is becoming a mission-critical priority
    in 2025.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 当嵌入无法表示源数据的语义意义时，无论向量数据库或模型性能如何，AI都将收到错误的环境。这正是为什么嵌入质量在2025年成为一项至关重要的优先任务。
- en: 'The most frequent embedding breaks are basic data issues: empty arrays, wrong
    dimensionality, corrupted vector values, etc. The problem is that most teams will
    only discover these problems when a response is *obviously* inaccurate.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的嵌入中断是基本的数据问题：空数组、错误的维度、损坏的向量值等。问题是大多数团队只有在响应明显不准确时才会发现这些问题。
- en: 'One Monte Carlo customer captured the problem perfectly: “We don’t have any
    insight into how embeddings are being generated, what the new data is, and how
    it affects the training process. We are scared of switching embedding models because
    we don’t know how retraining will affect it. Do we have to retrain our models
    that use this stuff? Do we have to completely start over?”'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一位蒙特卡洛的客户完美地捕捉到了这个问题：“我们对嵌入生成的方式、新数据的性质以及它如何影响训练过程没有任何洞察。我们害怕切换嵌入模型，因为我们不知道重新训练会如何影响它。我们是否需要重新训练使用这些内容的模型？我们是否需要从头开始？”
- en: As key dimensions of quality and performance come into focus, teams are beginning
    to define new monitoring strategies that can support embeddings in production;
    including factors like dimensionality, consistency, and vector completeness, among
    others.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 随着质量和性能的关键维度变得清晰，团队开始定义新的监控策略，以支持生产中的嵌入；包括维度、一致性、向量完整性等因素。
- en: 7\. Vector databases need a reality check
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 向量数据库需要现实检查
- en: Vector databases aren’t new for 2025\. What IS new is that data + AI teams are
    beginning to realize those vector databases they’ve been relying on might not
    be as reliable as they thought.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 向量数据库对2025年来说并不新鲜。真正新鲜的是，数据+AI团队开始意识到他们一直依赖的向量数据库可能并不像他们想象的那么可靠。
- en: Over the last 24 months, vector databases (which store data as high-dimensional
    vectors that capture semantic meaning) have become the de facto infrastructure
    for RAG applications.And in recent months, they’ve also become a source of consternation
    for data + AI teams.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去24个月中，向量数据库（将数据存储为捕获语义意义的高维向量）已成为RAG应用的既定基础设施。而在最近几个月，它们也成为数据+AI团队的烦恼之源。
- en: Embeddings drift. Chunking strategies shift. Embedding models get updated. All
    this change creates silent performance degradation that’s often misdiagnosed as
    hallucinations — and sending teams down expensive rabbit holes to resolve them.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌入式模型会漂移。分块策略会改变。嵌入模型会更新。所有这些变化都会造成无声的性能下降，这通常被误诊为幻觉——并导致团队陷入昂贵的兔子洞去解决这些问题。
- en: The challenge is that, unlike traditional databases with built-in monitoring,
    most teams lack the requisite visibility into vector search, embeddings, and agent
    behavior to catch vector problems before impact. This is likely to lead to a rise
    in vector database monitoring implementation, as well as other observability solutions
    to improve response accuracy.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战在于，与内置监控的传统数据库不同，大多数团队缺乏对向量搜索、嵌入和代理行为的必要可见性，无法在影响之前捕捉到向量问题。这可能导致向量数据库监控实施的增加，以及其他可观察性解决方案，以提高响应准确性。
- en: 8\. Leading model architectures prioritize simplicity over performance
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8. 领先的模型架构优先考虑简单性而不是性能
- en: 'The AI model hosting landscape is consolidating around two clear winners: Databricks
    and AWS Bedrock. Both platforms are succeeding by embedding AI capabilities directly
    into existing data infrastructure rather than requiring teams to learn entirely
    new systems.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型托管领域正在围绕两个明显的赢家——Databricks和AWS Bedrock——进行整合。这两个平台通过将AI能力直接嵌入到现有的数据基础设施中而不是要求团队学习全新的系统而取得成功。
- en: Databricks wins with tight integration between model training, deployment, and
    data processing. Teams can fine-tune models on the same platform where their data
    lives, eliminating the complexity of moving data between systems. Meanwhile, AWS
    Bedrock succeeds through breadth and enterprise-grade security, offering access
    to multiple foundation models from Anthropic, Meta, and others while maintaining
    strict data governance and compliance standards.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: Databricks通过模型训练、部署和数据处理的紧密集成而获胜。团队可以在他们的数据所在的平台上进行模型微调，从而消除在系统之间移动数据的复杂性。同时，AWS
    Bedrock通过广度和企业级安全性而成功，提供从Anthropic、Meta和其他公司的基础模型访问，同时保持严格的数据治理和合规标准。
- en: What’s causing others to fall behind? Fragmentation and complexity. Platforms
    that require extensive custom integration work or force teams to adopt entirely
    new toolchains are losing to solutions that fit into existing workflows.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 什么原因导致其他人落后？碎片化和复杂性。需要大量定制集成工作或强迫团队采用全新工具链的平台正在输给那些能够融入现有工作流程的解决方案。
- en: Teams are choosing AI platforms based on operational simplicity and data integration
    capabilities rather than raw model performance. The winners understand that the
    best model is useless if it’s too complicated to deploy and maintain reliably.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 团队正在根据操作简单性和数据集成能力来选择AI平台，而不是原始模型性能。赢家明白，如果模型部署和维护过于复杂，那么最好的模型也是无用的。
- en: 9\. Model Context Protocol (MCP) is the MVP
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9. 模型上下文协议（MCP）是最低可接受产品
- en: Model Context Protocol (MCP) has emerged as the game-changing “USB-C for AI”—a
    universal standard that lets AI applications connect to any data source without
    custom integrations.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 模型上下文协议（MCP）已成为颠覆性的“AI的USB-C”——一个通用标准，允许AI应用无需定制集成即可连接到任何数据源。
- en: Instead of building separate connectors for every database, CRM, or API, teams
    can use one protocol to give LLMs access to everything at the same time. And when
    models can pull from multiple data sources seamlessly, they deliver faster, more
    accurate responses.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是为每个数据库、CRM或API构建单独的连接器，团队可以使用一个协议同时让LLMs访问所有内容。当模型可以从多个数据源无缝提取时，它们可以提供更快、更准确的响应。
- en: Early adopters are already reporting major reductions in integration complexity
    and maintenance work by focusing on a single MCP implementation that works across
    their entire data ecosystem.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 早期采用者已经报告说，通过专注于一个在其整个数据生态系统中工作的单一MCP实现，已经大幅减少了集成复杂性和维护工作。
- en: As a bonus, MCP also standardizes governance and logging — requirements that
    matter for enterprise deployment.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 作为额外的好处，MCP还标准化了治理和日志记录——这对于企业部署来说是很重要的要求。
- en: But don’t expect MCP to stay static. Many data and AI leaders expect an Agent
    Context Protocol (ACP) to emerge within the next year, handling even more complex
    context-sharing scenarios. Teams adopting MCP now will be ready for these advances
    as the standard evolves.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 但不要期待MCP保持静态。许多数据和AI领导者预计在明年内将出现代理上下文协议（ACP），处理更加复杂的上下文共享场景。现在采用MCP的团队将准备好随着标准的演变而迎接这些进步。
- en: 10\. Unstructured data is the new gold (but is it fool’s gold?)
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10. 非结构化数据是新的黄金（但它是愚人的金子吗？）
- en: Most AI applications rely on unstructured data — like emails, documents, images,
    audio files, and support tickets — to provide the rich context that makes AI responses
    useful.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人工智能应用都依赖于非结构化数据——例如电子邮件、文档、图像、音频文件和支持票证——以提供使人工智能响应有用的丰富上下文。
- en: But while teams can monitor structured data with established tools, unstructured
    data has long operated in a blind spot. Traditional data quality monitoring can’t
    handle text files, images, or documents in the same way it tracks database tables.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 但尽管团队可以使用成熟的工具监控结构化数据，非结构化数据长期以来一直处于盲点。传统的数据质量监控无法像跟踪数据库表那样处理文本文件、图像或文档。
- en: Solutions like Monte Carlo’s unstructured data monitoring are addressing this
    gap for users by bringing automated quality checks to text and image fields across
    Snowflake, Databricks, and BigQuery.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于Monte Carlo的非结构化数据监控解决方案通过将自动质量检查引入Snowflake、Databricks和BigQuery中的文本和图像字段，为用户填补了这一差距。
- en: Looking ahead, unstructured data monitoring will become as standard as traditional
    data quality checks. Organizations will implement comprehensive quality frameworks
    that treat all data — structured and unstructured — as critical assets requiring
    active monitoring and governance.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 展望未来，非结构化数据监控将像传统的数据质量检查一样成为标准。组织将实施全面的质量框架，将所有数据——结构化和非结构化——视为关键资产，需要积极的监控和管理。
- en: '![](../Images/5f4067248c92766dff93e968f8cab817.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5f4067248c92766dff93e968f8cab817.png)'
- en: 'Image: Monte Carlo'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图片：Monte Carlo
- en: Looking forward to 2026
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 展望2026年
- en: If 2025 has taught us anything so far, it’s that the teams winning with AI aren’t
    the ones with the biggest budgets or the flashiest demos. The teams winning the
    AI race are the teams who’ve figured out how to deliver reliable, scalable, and
    trustworthy AI in production.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果说2025年教会了我们什么，那就是在人工智能领域取得胜利的团队并非拥有最大预算或最炫演示的团队。赢得人工智能竞赛的团队是那些已经找到如何在生产中提供可靠、可扩展和值得信赖的人工智能的团队。
- en: Winners aren’t made in a testing environment. They’re made in the hands of real
    users. Deliver adoptable AI solutions, and you’ll deliver demonstrable AI value.
    It’s that simple.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 胜利并非在测试环境中造就。它们是在真实用户的手中形成的。提供可采纳的人工智能解决方案，你将提供可证明的人工智能价值。就这么简单。
