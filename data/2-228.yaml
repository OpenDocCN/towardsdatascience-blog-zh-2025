- en: 'LLM-as-a-Judge: A Practical Guide'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLM作为裁判：实用指南
- en: 原文：[https://towardsdatascience.com/llm-as-a-judge-a-practical-guide/](https://towardsdatascience.com/llm-as-a-judge-a-practical-guide/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/llm-as-a-judge-a-practical-guide/](https://towardsdatascience.com/llm-as-a-judge-a-practical-guide/)
- en: If <mdspan datatext="el1750359282382" class="mdspan-comment">you have built</mdspan>
    features powered by LLMs, you already know how important evaluation is. Getting
    a model to say something is easy, but figuring out whether it’s saying the right
    thing is where the real challenge comes.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 <mdspan datatext="el1750359282382" class="mdspan-comment">您已经构建</mdspan>
    了由LLM驱动的功能，您已经知道评估的重要性。让模型说出某些内容很容易，但确定它是否说对了话才是真正的挑战所在。
- en: For a handful of test cases, manual review works fine. But once the number of
    examples grows, hand-checking would quickly become impractical. Instead, you need
    something scalable. Something automatic.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 对于少数测试案例，人工审查是可行的。但一旦例子数量增加，人工检查会迅速变得不切实际。相反，您需要某种可扩展的、自动化的东西。
- en: That’s where metrics like BLEU, ROUGE, or METEOR come in. They’re fast and cheap,
    but they only scratch the surface by examining the token overlapping. Effectively,
    they tell you whether two texts look similar, not necessarily whether they mean
    the same thing. This missed semantic understanding is, unfortunately, crucial
    to evaluating open-ended tasks.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是像BLEU、ROUGE或METEOR这样的指标发挥作用的地方。它们快速且便宜，但它们只通过检查标记重叠来触及表面。实际上，它们告诉您两个文本看起来是否相似，但不一定告诉您它们是否意味着相同的事情。不幸的是，这种遗漏的语义理解对于评估开放性任务是至关重要的。
- en: 'So you’re probably wondering: Is there a method that combines the depth of
    human evaluation with the scalability of automation?'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 所以你可能想知道：有没有一种方法可以结合人工评估的深度和自动化的可扩展性？
- en: Enter **LLM-as-a-Judge**.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 进入**LLM作为裁判**。
- en: 'In this post, let’s take a closer look at this approach that is gaining serious
    traction. Specifically, we’ll explore:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将更深入地探讨这种正在获得广泛关注的方法。具体来说，我们将探讨：
- en: '**What** is it, and **why** should you care'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它是什么是，为什么你应该关心**'
- en: '**How** to make it work effectively'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如何**使其有效工作'
- en: Its **limitations** and how to handle them
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它的**局限性**以及如何处理它们
- en: '**Tools** and real-world **case studies**'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具**和真实世界的**案例研究**'
- en: Finally, we’ll wrap up with key takeaways you can apply to your own LLM evaluation
    pipeline.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将总结一些关键要点，您可以将这些要点应用到您自己的LLM评估流程中。
- en: '* * *'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**1\. What Is LLM-as-a-Judge, and Why Should You Care?**'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 什么是LLM作为裁判，为什么你应该关心？**'
- en: As implied by its name, LLM-as-a-Judge is essentially using one LLM to evaluate
    another LLM’s work. Just like you would give a human reviewer a detailed rubric
    before they start grading the submissions, you would give your LLM judge specific
    criteria so it can assess whatever content gets thrown at it in a structured way.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如其名称所暗示的，LLM作为裁判本质上是用一个LLM来评估另一个LLM的工作。就像您在人类审阅者开始评分之前给他们一个详细的评分标准一样，您会给您的LLM裁判具体的标准，以便它可以以结构化的方式评估任何抛向它的内容。
- en: 'So, what are the benefits of using this approach? Here are the top ones that
    are worth your attention:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，使用这种方法有哪些好处？以下是一些值得您关注的顶级好处：
- en: '**It scales easily and runs fast**. LLMs can process massive amounts of text
    way faster than any human reviewer could. This lets you iterate quickly and test
    thoroughly, both of which are crucial for developing LLM-powered products.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它易于扩展且运行速度快**。LLM可以比任何人类审阅者更快地处理大量文本。这使得您可以快速迭代并彻底测试，这两者对于开发LLM驱动的产品至关重要。'
- en: '**It is cost-effective**. Using LLMs for evaluation cuts down dramatically
    on manual work. This is a game-changer for small teams or early-stage projects,
    where you need quality evaluation but don’t necessarily have the resources for
    extensive human review.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它是成本效益的**。使用LLM进行评估可以大幅减少人工工作。这对于小型团队或早期项目来说是一个变革，在这些团队或项目中，您需要质量评估，但可能没有资源进行广泛的人工审查。'
- en: '**It goes beyond simple metrics to capture nuance**. This is one of the most
    compelling advantages: An LLM judge can assess the deep, qualitative aspects of
    a response. This opens the door to rich, multifaceted assessments. For example,
    we can check: Is the answer accurate and grounded in truth (**factual correctness**)?
    Does it sufficiently address the user’s question (**relevance & completeness**)?
    Does the response flow logically and consistently from start to finish (**coherence**)?
    Is the response appropriate, non-toxic, and fair (**safety & bias**)? Or does
    it match your intended persona (**style & tone**)?'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它超越了简单的指标，以捕捉细微差别**。这是最吸引人的优势之一：LLM裁判可以评估响应的深层、定性方面。这为丰富、多方面的评估打开了大门。例如，我们可以检查：答案是否准确，是否基于事实（**事实正确性**）？是否充分回答了用户的问题（**相关性
    & 完整性**）？响应是否从始至终逻辑一致（**连贯性**）？响应是否适当、非有害且公平（**安全 & 偏见**）？或者它是否与你的预期角色相匹配（**风格
    & 语调**）？'
- en: '**It maintains consistency**. Human reviewers may vary in interpretation, attention,
    or criteria over time. An LLM judge, on the other hand, applies the same rules
    every time. This promotes more repeatable evaluations, an essential for tracking
    long-term improvements.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它保持一致性**。人类审评员可能在解释、关注或标准上随时间而变化。另一方面，LLM裁判每次都应用相同的规则。这促进了更可重复的评估，这对于跟踪长期改进至关重要。'
- en: '**It is explainable**. This is another factor that makes this approach appealing.
    When using LLM judge to evaluate, we can ask it to output not only a simple decision,
    but also the logical reasoning it uses to reach this decision. This explainability
    makes it easy for you to audit the results and examine the effectiveness of the
    LLM judge itself.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**它是可解释的**。这是使这种方法吸引人的另一个因素。当使用LLM裁判进行评估时，我们可以要求它不仅输出简单的决定，还要输出它用来做出这个决定的逻辑推理。这种可解释性使得您能够轻松审计结果并检查LLM裁判本身的有效性。'
- en: 'At this point, you might be asking: Does asking an LLM to grade another LLM
    really work? Isn’t it just letting the model mark its own homework?'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，你可能想知道：要求LLM对另一个LLM进行评分真的有效吗？这不是让模型给自己批改作业吗？
- en: Surprisingly, the evidence so far says **yes, it works**, **provided that you
    do it carefully**. In the following, let’s discuss the technical details of how
    to make the LLM-as-a-Judge approach work effectively in practice.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 令人惊讶的是，到目前为止的证据表明**是的，它有效**，**只要你小心行事**。在以下内容中，让我们讨论如何使LLM作为裁判的方法在实践中有效运作的技术细节。
- en: '* * *'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**2\. Making LLM-as-a-Judge Work**'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 使LLM作为裁判工作**'
- en: 'A simple mental model we can adopt for viewing the LLM-as-a-Judge system looks
    like this:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以采用的一个简单的心智模型来观察LLM作为裁判的系统如下：
- en: '![](../Images/7bb5eded295e473186a5abb66f8df180.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7bb5eded295e473186a5abb66f8df180.png)'
- en: Figure 1\. Mental model for LLM-as-a-Judge system (Image by author)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. LLM作为裁判系统的心智模型（图片由作者提供）
- en: You start by constructing the prompt for the judge LLM, which is essentially
    a detailed instruction of **what** to judge and **how** to judge. In addition,
    you need to configure the model, including selecting which LLM to use and setting
    the model parameters, e.g., temperature, max tokens, etc.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你首先构建LLM裁判的提示，这本质上是对**什么**要评判和**如何**评判的详细说明。此外，您还需要配置模型，包括选择要使用的LLM以及设置模型参数，例如温度、最大令牌数等。
- en: Based on the given prompt and configuration, when presented with the response
    (or multiple responses), the judge LLM can produce different types of evaluation
    results, such as *numerical scores* (e.g., A 1–5 scale rating), *comparative ranks*
    (e.g., ranking multiple responses side-by-side from best to worst), or *textual
    critique* (e.g., an open-ended explanation of why a response was good or bad).
    Commonly, only one type of evaluation is conducted, and it should be specified
    in the prompt for the judge LLM.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 根据给定的提示和配置，当面对响应（或多个响应）时，LLM裁判可以产生不同类型的评估结果，例如*数值评分*（例如，A 1–5 级别评分）、*比较排名*（例如，从最好到最差排列多个响应）或*文本评论*（例如，对为什么一个响应好或坏的开端解释）。通常，只进行一种类型的评估，并且应在提示中指定LLM裁判。
- en: Arguably, the central piece of the system is the prompt, as it directly shapes
    the quality and reliability of the evaluation. Let’s take a closer look at that
    now.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 不可否认，系统的核心部分是提示，因为它直接决定了评估的质量和可靠性。现在让我们更仔细地看看这一点。
- en: '**2.1 Prompt Design**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.1 提示设计**'
- en: 'The prompt is the key to turning a general-purpose LLM into a useful evaluator.
    To effectively craft the prompt, simply ask yourself the following **six questions**.
    The answers to those questions will be the building blocks of your final prompt.
    Let’s walk through them:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是将通用型 LLM 转变为有用评估者的关键。为了有效地构建提示，只需问自己以下 **六个问题**。这些问题的答案将成为你最终提示的基石。让我们逐一探讨：
- en: '**Question 1: Who is your LLM judge supposed to be?**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题 1：你的 LLM 评委应该是谁？**'
- en: 'Instead of simply telling the LLM to “evaluate something,” give it a concrete
    expert role. For example:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 不要只是简单地告诉大型语言模型（LLM）“评估某物”，而是给它一个具体的专家角色。例如：
- en: “You are a senior customer experience specialist with 10 years of experience
    in technical support quality assurance.”
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “你是一位拥有 10 年技术支持质量保证经验的资深客户体验专家。”
- en: Generally, the more specific the role, the better the evaluation perspective.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，角色越具体，评估视角就越好。
- en: '**Question 2: What exactly are you evaluating?**'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题 2：你具体在评估什么？**'
- en: 'Inform the judge LLM about the type of content you want it to evaluate. For
    example:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 通知 LLM 评委你希望它评估的内容类型。例如：
- en: “AI-generated product descriptions for our e-commerce platform.”
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “为我们的电子商务平台生成的 AI 产品描述。”
- en: '**Question 3: What aspects of quality do you care about?**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题 3：你关心哪些质量方面？**'
- en: 'Define the criteria you want the judge LLM to assess. Are you judging factual
    accuracy, helpfulness, coherence, tone, safety, or something else? Evaluation
    criteria should align with the goals of your application. For example:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 定义你希望评委 LLM 评估的准则。你是判断事实准确性、有用性、连贯性、语气、安全性还是其他方面？评估准则应与你的应用目标一致。例如：
- en: '[Example generated by GPT-4o]'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[由 GPT-4o 生成的示例]'
- en: ''
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “Evaluate the response based on its relevance to the user’s question and adherence
    to the company’s tone guidelines.”
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “根据回答与用户问题的相关性以及是否符合公司的语气指南来评估回答。”
- en: Limit yourself to 3-5 aspects. Otherwise, the focus would be diluted.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 限制自己关注 3-5 个方面。否则，焦点就会分散。
- en: '**Question 4: How should the judge score responses?**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题 4：评委应该如何评分？**'
- en: 'This part of the prompt sets the evaluation strategy for the LLM judge. Depending
    on what kind of insight you need, different methods can be employed:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这部分提示为 LLM 评委设定了评估策略。根据你需要什么样的洞察，可以采用不同的方法：
- en: '**Single output scoring**: Ask the judge to score the response on a scale—typically
    1 to 5 or 1 to 10—for each evaluation criterion.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单一输出评分**：要求评委根据每个评估标准对回答进行评分——通常是 1 到 5 或 1 到 10 级。'
- en: “Rate this response on a 1-5 scale for each quality aspect.”
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “针对每个质量方面，用 1-5 级别来评估这个回答。”
- en: '**Comparison/Ranking**: Ask the judge to compare two (or more) responses and
    decide which one is better overall or for specific criteria.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**比较/排名**：要求评委比较两个（或更多）回答，并决定哪个在整体上或特定标准上更好。'
- en: “Compare Response A and Response B. Which is more helpful and factually accurate?”
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “比较回答 A 和回答 B。哪个更有帮助，事实更准确？”
- en: '**Binary labeling**: Ask the judge to produce the label that classifies the
    response, e.g., Correct/Incorrect, Relevant/Irrelevant, Pass/Fail, Safe/Unsafe,
    etc.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**二元标签**：要求评委生成将回答分类的标签，例如，正确/错误，相关/不相关，通过/未通过，安全/不安全等。'
- en: “Determine if this response meets our minimum quality standards.”
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “判断这个回答是否符合我们的最低质量标准。”
- en: '**Question 5: What rubric and examples should you give the judge?**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题 5：你应该给评委提供哪些评分标准和示例？**'
- en: Specifying well-defined rubrics and concrete examples is the key to ensuring
    the consistency and accuracy of LLM’s evaluation.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 明确的评分标准和具体的示例是确保 LLM 评估一致性和准确性的关键。
- en: A rubric describes what “good” looks like across different score levels, e.g.,
    what counts as a 5 vs. a 3 on coherence. This gives the LLM a stable framework
    to apply its judgment.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 一个评分标准描述了在不同得分级别上“好”是什么样的，例如，连贯性方面 5 分和 3 分的区别。这为 LLM 提供了一个稳定的框架来应用其判断。
- en: To make the rubric actionable, it is always a good idea to include example responses
    along with their corresponding scores. This is few-shot learning in action, and
    it is a well-known strategy to significantly improve the reliability and alignment
    of the LLM’s output.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使评分标准可操作，总是包含示例回答及其相应的分数是一个好主意。这是少样本学习在行动中，并且这是一个众所周知的方法，可以显著提高 LLM 输出的可靠性和一致性。
- en: 'Here’s an example rubric for evaluating **helpfulness** (1-5 scale) in AI-generated
    product descriptions on an e-commerce platform:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个用于评估电子商务平台上 AI 生成的产品描述中的 **有用性**（1-5 级）的示例评分标准：
- en: '[Example generated by GPT-4o]'
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[由 GPT-4o 生成的示例]'
- en: ''
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “**Score 5:** The description is highly informative, specific, and well-structured.
    It clearly highlights the product’s key features, benefits, and potential use
    cases, making it easy for customers to understand the value.
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “**得分 5：描述非常信息丰富、具体且结构良好。它清楚地突出了产品的关键特性、优势和潜在用例，使客户易于理解价值。”
- en: '**Score 4:** Mostly helpful, with good coverage of features and use cases,
    but may miss minor details or contain slight repetition.'
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**得分 4：大部分有帮助，对特性和用例有很好的覆盖，但可能遗漏一些细节或包含轻微重复。**'
- en: '**Score 3:** Adequately helpful. Covers basic features but lacks depth or fails
    to address likely customer questions.'
  id: totrans-64
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**得分 3：基本有帮助。涵盖了基本功能，但缺乏深度或未能回答可能的客户问题。**'
- en: '**Score 2:** Minimally helpful. Provides vague or generic statements without
    real substance. Customers may still have important unanswered questions.'
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**得分 2：略微有帮助。提供模糊或泛泛而谈的陈述，缺乏实质内容。客户可能仍有重要未解答的问题。**'
- en: '**Score 1:** Not helpful. Contains misleading, irrelevant, or virtually no
    useful information about the product.'
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**得分 1：无帮助。包含误导性、无关或不实用的产品信息。**'
- en: ''
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Example description:**'
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例描述：**'
- en: ''
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “This stylish backpack is perfect for any occasion. With plenty of space and
    a trendy design, it’s your ideal companion.”
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “这款时尚的背包适合任何场合。空间充足，设计时尚，是您的理想伴侣。”
- en: ''
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Assigned Score:** **3**'
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**分配的得分：****3**'
- en: ''
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Explanation:**'
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**解释：**'
- en: While the tone is friendly and the language is fluent, the description lacks
    specifics. It doesn’t mention material, dimensions, use cases, or practical features
    like compartments or waterproofing. It’s functional, but not deeply informative—typical
    of a “3” in the rubric.”
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 虽然语气友好，语言流畅，但描述缺乏具体细节。它没有提到材料、尺寸、用例或像隔间或防水这样的实用功能。它是实用的，但不是深入的信息——这是评分标准中“3”的典型特征。”
- en: '**Question 6: What output format do you need?**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题 6：您需要哪种输出格式？**'
- en: The last thing you need to specify in the prompt is the output format. If you
    intend to prepare the evaluation results for human review, a **natural language
    explanation** is often enough. Besides the raw score, you might also ask the judge
    to give a short paragraph justifying the decision.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示中您需要最后指定的是输出格式。如果您打算为人工审阅准备评估结果，通常**自然语言解释**就足够了。除了原始得分外，您还可以要求判定员给出一个简短的段落来证明其决定。
- en: 'However, if you plan to consume the evaluation results in some automated pipelines
    or show them on a dashboard, a **structured format** like JSON would be much more
    practical. You can easily parse multiple fields programmatically:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果您计划在自动化管道中消费评估结果或在仪表板上显示它们，那么像 JSON 这样的**结构化格式**将更加实用。您可以轻松地通过编程解析多个字段：
- en: '[PRE0]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Besides those main questions, two additional points are worth keeping in mind
    that can boost performance in real-world use:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些主要问题，还有两个额外的要点值得记住，这些可以在实际使用中提高性能：
- en: '**Explicit reasoning instructions.** You can instruct the LLM judge to “think
    step by step” or to provide reasoning before giving the final judgement. Those
    chain-of-thought techniques generally improve the accuracy (and transparency)
    of the evaluation.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**明确的推理指示。**您可以指示 LLM 判定员“逐步思考”或在进行最终判断之前提供推理。这些思维链技术通常可以提高评估的准确性（和透明度）。'
- en: '**Handling uncertainty.** It can happen that the responses submitted for evaluation
    are ambiguous or lack context. For those cases, it is better to explicitly instruct
    the LLM judge on what to do when evidence is insufficient, e.g., *“If you cannot
    verify a fact, mark it as ‘unknown’*. Those unknown cases can then be passed to
    human reviewers for further examination. This small trick helps avoid silent hallucination
    or over-confident scoring.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**处理不确定性。**有时提交给评估的响应可能是含糊不清的或缺乏上下文。对于这些情况，最好明确指示 LLM 判定者在证据不足时应该做什么，例如，“如果您无法验证一个事实，将其标记为‘未知’”。这些未知案例可以转交给人工审阅员进行进一步审查。这个小技巧有助于避免无声的幻觉或过于自信的评分。'
- en: 'Great! We’ve now covered the key aspects of prompt crafting. Let’s wrap it
    up with a quick checklist:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了！我们现在已经涵盖了提示构建的关键方面。让我们用一个快速清单来结束：
- en: ✅ Who is your LLM judge? (Role)
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 您的 LLM 判定员是谁？（角色）
- en: ✅ What content are you evaluating? (Context)
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 您评估的内容是什么？（上下文）
- en: ✅ What quality aspects matter? (Evaluation dimensions)
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 评估时哪些质量方面很重要？（评估维度）
- en: ✅ How should responses be scored? (Method)
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 如何评分响应？（方法）
- en: ✅ What rubric and examples guide scoring? (Standards)
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 评分时使用哪些评分标准和示例？（标准）
- en: ✅ What output format do you need? (Structure)
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 您需要哪种输出格式？（结构）
- en: ✅ Did you include step-by-step reasoning instructions? Did you address uncertainty
    handling?
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 你是否包含了逐步推理说明？你是否处理了不确定性？
- en: '**2.2 Which LLM To Use?**'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.2 使用哪个LLM？**'
- en: 'To make LLM-as-a-Judge work, another important factor to consider is which
    LLM model to use. Generally, you have two paths to move forward: adopting large
    frontier models or employing small specific models. Let’s break that down.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 要使LLM作为评判者工作，另一个需要考虑的重要因素是使用哪个LLM模型。通常，你有两条前进的道路：采用大型前沿模型或使用小型特定模型。让我们来分析一下。
- en: For a broad range of tasks, the large frontier models, think of GPT-4o, Claude
    4, Gemini-2.5, correlate better with human raters and can follow long, carefully
    written evaluation prompts (like those we crafted in the previous section). Therefore,
    they are usually the default choice for playing the LLM judge.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 对于广泛的任务，大型前沿模型，比如GPT-4o、Claude 4、Gemini-2.5，与人类评判者有更好的相关性，并且可以遵循长篇、精心编写的评估提示（就像我们在上一节中编写的那些）。因此，它们通常是扮演LLM评判者的默认选择。
- en: However, calling APIs of those large models usually means high latency, high
    cost (if you have many cases to evaluate), and most concerning, your data must
    be sent to third parties.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，调用这些大型模型的API通常意味着高延迟、高成本（如果你有很多案例要评估），最重要的是，你必须将你的数据发送给第三方。
- en: To address these concerns, small language models are entering the scene. They
    are usually the open-source variants of Llama (Meta)/Phi (Microsoft)/Qwen (Alibaba)
    that are fine-tuned on evaluation data. This makes them “small but mighty” judges
    for specific domains you care about the most.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这些担忧，小型语言模型正在进入场景。它们通常是Llama（Meta）/Phi（Microsoft）/Qwen（Alibaba）的开源变体，这些变体在评估数据上进行了微调。这使得它们成为你最关心的特定领域的“小而强大”的评判者。
- en: So, it all boils down to your specific use case and constraints. As a rule of
    thumb, you could start with large LLMs to establish a quality bar, then experiment
    with smaller, fine-tuned models to meet the requirements of latency, cost, or
    data sovereignty.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，一切都归结于你的具体用例和约束。作为一个经验法则，你可以从大型LLM开始，以建立质量标准，然后尝试使用更小、经过微调的模型来满足延迟、成本或数据主权的要求。
- en: '* * *'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**3\. Reality Check: Limitations & How To Handle Them**'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 现实检查：局限性及处理方法**'
- en: As with everything in life, LLM-as-a-Judge is not without its flaws. Despite
    its promise, it comes with issues such as inconsistency, biases, etc., that you
    need to watch out for. In this section, let’s talk about those limitations.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 就像生活中的每一件事一样，LLM作为评判者并非没有缺陷。尽管它有承诺，但它也伴随着不一致性、偏见等问题，这些问题你需要留意。在本节中，让我们谈谈这些局限性。
- en: '**3.1 Inconsistency**'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.1 不一致性**'
- en: LLMs are probabilistic in nature. This means, for the same LLM judge, when prompted
    with the same instruction, it can output different evaluations (e.g., scores,
    reasonings, etc.) if run twice. This makes it hard to reproduce or trust the evaluation
    results.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs本质上是概率性的。这意味着，对于同一个LLM评判者，当被相同的指令提示时，如果运行两次，它可能会输出不同的评估结果（例如，分数、推理等）。这使得评估结果难以重现或信任。
- en: There are a couple of ways to make an LLM judge more consistent. For example,
    providing more example evaluations in the prompt proves to be an effective mitigation
    strategy. However, this comes with a cost, as a longer prompt means higher inference
    token consumption. Another knob you can tweak is the temperature parameter of
    the LLM. Setting a low value is generally recommended to generate more deterministic
    evaluations.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种方法可以使LLM评判者更加一致。例如，在提示中提供更多示例评估被证明是一种有效的缓解策略。然而，这也带来了成本，因为更长的提示意味着更高的推理令牌消耗。另一个你可以调整的旋钮是LLM的温度参数。通常建议设置一个较低的值以生成更确定的评估。
- en: '**3.2 Bias**'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.2 偏见**'
- en: 'This is one of the major concerns of adopting the LLM-as-a-Judge approach in
    practice. LLM judges, like all LLMs, are susceptible to different forms of biases.
    Here, we list some of the common ones:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在实践中采用LLM作为评判者方法的主要担忧之一。LLM评判者，像所有LLMs一样，容易受到不同形式的偏见的影响。在这里，我们列出一些常见的偏见：
- en: '**Position bias**: It is reported that an LLM judge tends to favor responses
    based on their order of presentation within the prompt. For example, an LLM judge
    may consistently prefer the first response in a pairwise comparison, irrespective
    of its actual quality.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**位置偏见**：据报道，LLM评判者倾向于偏好那些在提示中呈现顺序的响应。例如，LLM评判者可能会持续偏好成对比较中的第一个响应，而不管其实际质量如何。'
- en: '**Self-preference bias**: Some LLMs tend to rate more favorably their own outputs,
    or outputs generated by models from the same family.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自我偏好偏见**：一些LLM倾向于对其自己的输出或同一家族模型的输出给予更高的评价。'
- en: '**Verbosity bias**: LLM judges seem to love longer, more verbose responses.
    This can be frustrating when conciseness is a desired quality, or when a shorter
    response is more accurate or relevant.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**冗长偏差**：LLM 裁判似乎喜欢更长、更冗长的回应。当简洁是期望的品质，或者更短的回应更准确或相关时，这可能会令人沮丧。'
- en: '**Inherited bias**: LLM judges inherit biases from its training data. Those
    biases can manifest in their evaluations in subtle ways. For example, the judge
    LLM might prefer responses that match certain viewpoints, tones, or demographic
    cues.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**继承偏差**：LLM 裁判从其训练数据中继承了偏差。这些偏差可能会以微妙的方式体现在他们的评估中。例如，裁判 LLM 可能更喜欢与某些观点、语气或人口统计线索相匹配的回应。'
- en: So, how should we fight against those biases? There are a couple of strategies
    to keep in mind.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们应该如何对抗这些偏见呢？有几个策略需要记住。
- en: First of all, refine the prompt. Define the evaluation criteria as explicitly
    as possible, so that there is no room for implicit biases to drive decisions.
    Explicitly tell the judge to avoid specific biases, e.g., “evaluate the response
    purely based on factual accuracy, irrespective of its length or order of presentation.”
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，细化提示。尽可能明确地定义评估标准，以确保没有隐含偏见驱动决策的空间。明确告诉裁判避免特定的偏见，例如，“纯粹基于事实准确性评估回应，不考虑其长度或呈现顺序。”
- en: Next, include diverse example responses in your few-shot prompt. This ensures
    the LLM judge has a balanced exposure.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，在您的 few-shot 提示中包含多样化的示例回应。这确保了 LLM 裁判有平衡的接触。
- en: For mitigating position bias specifically, try evaluating pairs in both directions,
    i.e., A vs. B, then B vs. A, and average the result. This can greatly improve
    fairness.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 为了具体减轻立场偏差，尝试在两个方向上评估成对的内容，即 A 对 B，然后 B 对 A，并平均结果。这可以大大提高公平性。
- en: Finally, keep iterating. It’s challenging to completely eliminate bias in LLM
    judges. A better approach would be to curate a good test set to stress-test the
    LLM judge, use the learnings to improve the prompt, then re-run evaluations to
    check for improvement.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，持续迭代。完全消除 LLM 裁判中的偏差是具有挑战性的。更好的方法是为 LLM 裁判制作一个良好的测试集进行压力测试，使用所学知识改进提示，然后重新运行评估以检查改进情况。
- en: '**3.3 Overconfidence**'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.3 过度自信**'
- en: We have all seen the cases when LLMs sound confident, but they’re actually wrong.
    Unfortunately, this trait carries over into their role as evaluators. When their
    evaluations are used in automated pipelines, false confidence can easily go unchecked
    and lead to confusing conclusions.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都见过 LLM 表现得自信，但实际上是错误的。不幸的是，这种特性也延续到了它们作为评估者的角色中。当他们的评估用于自动化管道时，错误的自信很容易被忽视，并导致令人困惑的结论。
- en: To address this, try to explicitly encourage *calibrated reasoning* in the prompt.
    For example, tell the LLM to say “cannot determine” if it lacks enough information
    in the response to make a reliable evaluation. You can also add a confidence score
    field to the structured output to help surface ambiguity. Those edge cases can
    be further reviewed by human reviewers.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，尝试在提示中明确鼓励*校准推理*。例如，告诉 LLM 如果它在回应中缺乏足够的信息来做出可靠的评估，就说“无法确定”。您还可以在结构化输出中添加置信度分数字段，以帮助揭示模糊性。这些边缘案例可以进一步由人工审查员审查。
- en: '* * *'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**4\. Useful Tools and Real-World Applications**'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 有用的工具和实际应用**'
- en: '**4.1 Tools**'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.1 工具**'
- en: To get start with LLM-as-a-Judge approach, the good news is, you have a range
    of both open-source tools and commercial platforms to choose from.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用 LLM 作为裁判的方法，好消息是，您可以选择一系列开源工具和商业平台。
- en: 'On the open-source side, we have:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在开源方面，我们有：
- en: '[**OpenAI Evals**](https://github.com/openai/evals): A framework for evaluating
    LLMs and LLM systems, and an open-source registry of benchmarks.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '[**OpenAI Evals**](https://github.com/openai/evals)：一个用于评估 LLM 和 LLM 系统的框架，以及一个开源的基准测试注册表。'
- en: '[**DeepEval**](https://github.com/confident-ai/deepeval): A simple-to-use LLM
    evaluation framework for evaluating and testing large-language model systems (e.g.,
    RAG pipelines, chatbots, AI agents, etc.). It is similar to Pytest but specialized
    for unit testing LLM outputs.'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '[**DeepEval**](https://github.com/confident-ai/deepeval)：一个简单易用的 LLM 评估框架，用于评估和测试大型语言模型系统（例如，RAG
    管道、聊天机器人、AI 代理等）。它与 Pytest 类似，但专门用于单元测试 LLM 输出。'
- en: '[**TruLens**](https://github.com/truera/trulens): Systematically evaluate and
    track LLM experiments. Core functionality includes Feedback Functions, The RAG
    Triad, and Honest, Harmless and Helpful Evals.'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '[**TruLens**](https://github.com/truera/trulens)：系统地评估和跟踪 LLM 实验。核心功能包括反馈函数、RAG
    三联和诚实、无害且有帮助的评估。'
- en: '[**Promptfoo**](https://github.com/promptfoo/promptfoo): A developer-friendly
    local tool for testing LLM applications. Support testing on prompts, agents, and
    RAGs. Red teaming, pentesting, and vulnerability scanning for LLMs.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '[**Promptfoo**](https://github.com/promptfoo/promptfoo)：一个面向开发者的本地工具，用于测试LLM应用。支持在提示、代理和RAG上进行测试。为LLM提供红队、渗透测试和漏洞扫描。'
- en: '**[LangSmith](https://docs.smith.langchain.com/evaluation/how_to_guides/llm_as_judge?utm_source=chatgpt.com)**:
    Evaluation utilities provided by LangChain, a popular framework for building LLM
    applications. Supports LLM-as-a-judge evaluator for both offline and online evaluation.'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '**[LangSmith](https://docs.smith.langchain.com/evaluation/how_to_guides/llm_as_judge?utm_source=chatgpt.com)**：LangChain提供的评估工具，LangChain是一个流行的构建LLM应用的框架。支持离线和在线评估的LLM-as-a-judge评估器。'
- en: 'If you prefer managed services, commercial offerings are also available. To
    name a few: [Amazon Bedrock Model Evaluation](https://aws.amazon.com/blogs/machine-learning/llm-as-a-judge-on-amazon-bedrock-model-evaluation/?utm_source=chatgpt.com),
    [Azure AI Foundry/MLflow 3](https://learn.microsoft.com/en-us/azure/ai-foundry/how-to/flow-develop-evaluation?utm_source=chatgpt.com),
    [Google Vertex AI Evaluation Service](https://cloud.google.com/vertex-ai/generative-ai/docs/models/evaluation-overview?utm_source=chatgpt.com),
    [Evidently AI](https://www.evidentlyai.com/llm-testing?utm_source=chatgpt.com),
    [Weights & Biases Weave](https://weave-docs.wandb.ai/tutorial-eval/?utm_source=chatgpt.com),
    and [Langfuse](https://langfuse.com/docs/scores/model-based-evals?utm_source=chatgpt.com).'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你更喜欢托管服务，也有商业产品可供选择。例如：[Amazon Bedrock模型评估](https://aws.amazon.com/blogs/machine-learning/llm-as-a-judge-on-amazon-bedrock-model-evaluation/?utm_source=chatgpt.com)、[Azure
    AI Foundry/MLflow 3](https://learn.microsoft.com/en-us/azure/ai-foundry/how-to/flow-develop-evaluation?utm_source=chatgpt.com)、[Google
    Vertex AI评估服务](https://cloud.google.com/vertex-ai/generative-ai/docs/models/evaluation-overview?utm_source=chatgpt.com)、[Evidently
    AI](https://www.evidentlyai.com/llm-testing?utm_source=chatgpt.com)、[Weights &
    Biases Weave](https://weave-docs.wandb.ai/tutorial-eval/?utm_source=chatgpt.com)和[Langfuse](https://langfuse.com/docs/scores/model-based-evals?utm_source=chatgpt.com)。
- en: '**4.2 Applications**'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.2 应用**'
- en: A great way to learn is by observing how others are already using LLM-as-a-Judge
    in the real world. A case in point is how Webflow uses LLM-as-a-Judge to evaluate
    their AI features’ output quality [1-2].
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 通过观察他人如何在现实世界中已经使用LLM-as-a-Judge，是一种很好的学习方法。一个例子是Webflow如何使用LLM-as-a-Judge来评估他们AI功能的输出质量[1-2]。
- en: To develop robust LLM pipelines, the Webflow product team heavily relies on
    model evaluation, that is, they prepare a large number of test inputs, run them
    through the LLM systems, and finally grade the quality of the output. Both objective
    and subjective evaluations are performed in parallel, and the LLM-as-a-Judge approach
    is mainly used for delivering subjective evaluations at scale.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 为了开发稳健的LLM管道，Webflow产品团队高度依赖模型评估，也就是说，他们准备大量测试输入，通过LLM系统运行，并最终评估输出的质量。客观和主观评估并行进行，LLM-as-a-Judge方法主要用于大规模提供主观评估。
- en: 'They defined a multi-point rating scheme to capture the subjective judgment:
    “Succeeds”, “Partially Succeeds”, and “Fails”. An LLM judge applies this rubric
    to thousands of test inputs and records the scores in CI dashboards. This gives
    the product team a shared, near-real-time view of the health of their LLM pipelines.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 他们定义了一个多级评分方案来捕捉主观判断：“成功”、“部分成功”和“失败”。LLM评审员将此评分标准应用于数千个测试输入，并在CI仪表板上记录分数。这使产品团队能够共享，几乎实时的了解他们LLM管道的健康状况。
- en: To be sure the LLM judge remains aligned with real user expectations, the team
    also samples a small, random slice of outputsregularly for manual grading. The
    two sets of scores are compared, and if any widening gaps are identified, a refinement
    of the prompt or retraining task for the LLM judge itself will be triggered.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保LLM评审员与真实用户期望保持一致，团队还定期随机抽取一小部分输出进行人工评分。比较这两组分数，如果发现任何差距扩大，将触发对提示或LLM评审员本身的重训练任务的微调。
- en: So, what does this teach us?
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，这教会了我们什么呢？
- en: First, LLM-as-a-Judge is not just a theoretical concept, but a useful strategy
    that is delivering tangible value in industry. By operationalizing LLM-as-a-Judge
    with clear rubrics and CI integration, Webflow made subjective quality measurable
    and actionable.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，LLM-as-a-Judge不仅仅是一个理论概念，而是一种有用的策略，它在行业中提供了实际的价值。通过将LLM-as-a-Judge与明确的评分标准和CI集成操作化，Webflow使主观质量变得可衡量和可操作。
- en: Second, LLM-as-a-Judge is not meant to replace human judgment; it only scales
    it. The human-in-the-loop review is a critical calibration layer, making sure
    that the automated evaluation scores truly reflect quality.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，LLM-as-a-Judge并不是为了取代人类判断；它只是将其扩展。人工介入的审查是一个关键的校准层，确保自动评估分数真正反映了质量。
- en: '* * *'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**5\. Conclusion**'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '**5. 结论**'
- en: 'In this blog, we have covered a lot of ground on LLM-as-a-Judge: what it is,
    why you should care, how to make it work, its limitations and mitigation strategies,
    which tools are available, and what real-life use cases to learn from.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客中，我们详细介绍了LLM-as-a-Judge：它是什么，为什么你应该关心，如何使其工作，其局限性及缓解策略，可用的工具，以及可以从中学习的真实案例。
- en: To wrap up, I’ll leave you with two core mindsets.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，我会给你留下两个核心思维模式。
- en: First, **stop chasing the perfect, absolute truth** in evaluation. Instead,
    focus on getting consistent, actionable feedback that drives real improvements.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，**停止追求完美的绝对真理**在评估中。相反，专注于获取一致、可操作的反馈，以推动真正的改进。
- en: Second, **there’s no free lunch**. LLM-as-a-Judge doesn’t eliminate the need
    for human judgment—it simply shifts where that judgment is applied. Instead of
    reviewing individual responses, you now need to carefully design evaluation prompts,
    curate high-quality test cases, manage all sorts of bias, and continuously monitor
    the judge’s performance over time.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，**没有免费的午餐**。LLM-as-a-Judge并没有消除对人类判断的需求——它只是改变了判断的应用位置。现在，你不再需要审查单个响应，而是需要仔细设计评估提示，整理高质量测试案例，管理各种偏见，并持续监控法官的表现。
- en: Now, are you ready to add LLM-as-a-Judge to your toolkit for your next LLM project?
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你准备好将“LLM-as-a-Judge”添加到你的下一个LLM项目的工具箱了吗？
