- en: 'What If I had AI in 2018: Rent the Runway Fulfillment Center Optimization'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如果我在2018年就有AI：Rent the Runway履约中心优化
- en: 原文：[https://towardsdatascience.com/what-if-i-had-ai-in-2018-rent-the-runway-fulfillment-center-optimization/](https://towardsdatascience.com/what-if-i-had-ai-in-2018-rent-the-runway-fulfillment-center-optimization/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/what-if-i-had-ai-in-2018-rent-the-runway-fulfillment-center-optimization/](https://towardsdatascience.com/what-if-i-had-ai-in-2018-rent-the-runway-fulfillment-center-optimization/)
- en: <mdspan datatext="el1749855613003" class="mdspan-comment">Jeff Bezos proudly
    said “AI agents</mdspan> will become our digital assistants, helping us navigate
    the complexities of the modern world. They will make our lives easier and more
    efficient.” Inspiring and completely unbiased statement from someone who already
    invested billions on this new technology.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1749855613003" class="mdspan-comment">杰夫·贝索斯自豪地说，“人工智能代理将成为我们的数字助手，帮助我们导航现代世界的复杂性。它们将使我们的生活更轻松、更高效。”这是来自已经在这项新技术上投入数十亿美元的人的鼓舞人心且完全无偏见的声明。
- en: The hype is real for AI agents, and billions are pouring in to build models
    that will make us more productive and more creative. Hard to disagree when I happily
    enjoy my morning coffee while Cursor is coding my unit tests. Yet, asking people
    in my network how they use AI in their day-to-day, their answers often mention
    anecdotal use cases, anywhere from “I use it to tell bedtime stories to my son”
    (I guess that would not even be a use case if you had more imagination) to “I
    use it to optimize my schedule” (Motion AI, please stop targeting me for the love
    of god).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能代理的炒作是真实的，数十亿美元正在涌入以构建将使我们更高效和更有创造力的模型。当我愉快地享受我的早晨咖啡，同时Cursor在编写我的单元测试时，很难不同意这一点。然而，当询问我的网络中的人们他们如何在日常使用人工智能时，他们的答案经常提到一些轶事性的用例，从“我用它给我儿子讲睡前故事”（如果更有想象力，这甚至可能不算是一个用例）到“我用它来优化我的日程”（Motion
    AI，请为了上帝的爱停止针对我）。
- en: 'As a Data Scientist, my mind goes back and forth between two conclusions. The
    FOMO part of me that does not want to be late to the Robot revolution party, and
    the cynical one that thinks that there is still a long way to go before artificial
    intelligence actually becomes intelligent. To find out which side of my schizophrenic
    personality I should bet on, I am going to use a simple yet powerful framework:
    reviewing all the projects I have worked on since the beginning of my career and
    assessing how 2025 state-of-the-art AI models could have helped.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名数据科学家，我的思绪在两个结论之间来回摇摆。一方面，我不愿意错过机器人革命派对的最后时刻，另一方面，我怀疑在人工智能真正变得智能之前，我们还有很长的路要走。为了找出我应该赌哪一边的偏执型人格，我将使用一个简单而强大的框架：回顾我自职业生涯开始以来所参与的所有项目，并评估2025年的最先进人工智能模型可能如何帮助。
- en: 'Today, we go back to 2018\. I am a candid summer intern at one of the most
    disruptive startups in America: Rent the Runway.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我们回到2018年。我是一名坦率的暑期实习生，在美国最具颠覆性的初创公司之一：Rent the Runway。
- en: What the Project was about
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目的主要内容
- en: The Rent the Runway fulfillment center in Secaucus, NJ, used to be the biggest
    dry cleaning facility in the United States.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 新泽西州塞卡库斯（Secaucus）的Rent the Runway履约中心曾经是美国最大的干洗设施。
- en: 'In the Summer 2018, as an Operations Analyst intern, I was given a pretty hard
    problem to think about: everyday, the fulfillment center was receiving thousands
    of units back from all around the country. All the items had to be first inspected,
    then would go through a thorough cleaning process, before being dried or receiving
    some special treatments. This could be:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在2018年夏季，作为一名运营分析师实习生，我被分配了一个相当棘手的问题来思考：每天，履约中心都会从全国各地接收成千上万的单位。所有物品都必须首先进行检查，然后才会经过彻底的清洁过程，在干燥或接受一些特殊处理之前。这可能是：
- en: Spotting if the garment was stained during the rental
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果在租赁期间衣物被染色，进行检测
- en: Pressing if it was too wrinkled and had to be ironed
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果衣物太皱，需要熨烫，进行压烫
- en: Repairing if it had been damaged
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果它被损坏，进行修理
- en: Most of these tasks were done manually by different departments, and required
    specialized workers to be available as soon as the first batch of units were reaching
    their department. Being able to predict days ahead what volume of units would
    have to be processed (and when) was crucial for the fulfillment center planning
    squad, in order to make sure that every operations team would be staffed appropriately.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数这些任务都是由不同的部门手动完成的，并且需要专业人员在第一批单位到达其部门时立即可用。能够预测未来几天需要处理的单位数量（以及何时）对于履约中心规划小组至关重要，以确保每个运营团队都有适当的员工。
- en: The complexity of the flow made it even trickier. It was not only about predicting
    the inbound volume, but also assessing what part of this inbound volume would
    require special treatments, where and when bottlenecks could appear, and understanding
    how the work done at one department would impact the other departments.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 流程的复杂性使得问题更加棘手。这不仅关乎预测入站量，还包括评估哪些入站量需要特殊处理，瓶颈可能出现在哪里和何时，以及一个部门的工作如何影响其他部门。
- en: '![](../Images/117c3d2b33128bc8238448ab7c2212bd.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/117c3d2b33128bc8238448ab7c2212bd.png)'
- en: Interdependence of inbound departments
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 入站部门的相互依赖性
- en: The 2018 Solution
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2018年的解决方案
- en: 'At this point you may wonder: given the complexity and the stakes of the project,
    why was it in the hands of a young inexperienced intern? To be fair, during my
    10-week summer internship, I only scratched the surface and wrote an insanely
    complicated Pyomo script that was later refined by a more senior Data Scientist,
    who spent two years on this project alone.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你可能想知道：鉴于项目的复杂性和风险，为什么它落在一个年轻缺乏经验实习生手中？公平地说，在我的10周暑期实习期间，我只触及了表面，编写了一个极其复杂的Pyomo脚本，后来由一位资深的Data
    Scientist进行了改进，他独自在这个项目上花费了两年时间。
- en: But as you can imagine, the solution was this huge optimization model taking
    as an input the inbound volume forecast for every day of the week, the average
    UPH (units per hour, i.e the number of units that can be processed in an hour)
    at each department, and some assumptions on the proportions of units that would
    require specific treatments. The main constraints were on the timing and regularity
    of the shifts, and the number of full time contracts. The model would then output
    an optimized labor planning for the week.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 但正如你所想象的那样，解决方案是一个巨大的优化模型，以每周每一天的入站量预测、每个部门的平均UPH（每小时单位数，即每小时可以处理的单位数量）以及一些关于需要特定处理的单位比例的假设为输入。主要约束在于轮班的时间和规律性，以及全职合同的数量。然后，模型将输出一周的优化劳动力计划。
- en: How AI could have helped
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI如何可能有所帮助
- en: 'Let’s re-clarify things first: you will not see words like “AI-enthusiast”
    or “LLM believer” in my LinkedIn bio. I am pretty skeptical that AI will magically
    solve all our problems, but I am interested in seeing if with today’s technology,
    another approach would be possible.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们澄清一下：你不会在我的领英个人资料中看到“AI爱好者”或“LLM信徒”这样的词。我对AI能神奇地解决我们所有问题的可能性持怀疑态度，但我对看看今天的技术是否可能采取另一种方法很感兴趣。
- en: Because our approach was, you could say, pretty old school, and required months
    and months of refinements and testing.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我们的方法可以说是相当传统，需要数月的时间进行精炼和测试。
- en: The main limit is the static aspect of the solution. If something unexpected
    happens during the week (e.g a snow storm that paralyzes the logistics in some
    parts of the country, delaying some of the inbound volume), a lot of assumptions
    of the model have to be changed, and its results are becoming obsolete.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 主要限制是解决方案的静态方面。如果在周内发生意外情况（例如，一场使国家某些地区的物流瘫痪的暴风雪，导致一些入站量延迟），模型的大量假设都需要改变，其结果变得过时。
- en: This is a solution that requires data scientists to go deep into the weeds,
    instead of relying on an out-of-the-box framework, to rely on a lot of assumptions
    and to spend time maintaining and updating these assumptions.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个需要数据科学家深入细节的解决方案，而不是依赖于现成的框架，而是依赖于许多假设，并花费时间维护和更新这些假设。
- en: Could AI come up with a completely different approach? No.
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI能否提出一个完全不同的方法？不能。
- en: For this particular problem, you clearly need an optimization model, and I am
    yet to read about an LLM being able to handle a model with such complexity. One
    could propose a framework with an AI agent acting as a General Manager, and relying
    on sub-agents to handle the planning of each department. But that framework would
    still require agents to have tools that allow them to solve a complex optimization
    model, and the sub-agents would need to communicate as the situation of one department
    can affect all the others.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个特定问题，显然需要一个优化模型，但我还没有读到关于LLM能够处理如此复杂模型的案例。有人可以提出一个框架，其中AI代理作为总经理，依靠子代理处理每个部门的规划。但这个框架仍然需要代理拥有解决复杂优化模型所需的工具，而子代理需要相互沟通，因为一个部门的情况可能会影响所有其他部门。
- en: Could AI significantly enhance the “human-generated” solution? Possible.
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI能否显著增强“人工生成”的解决方案？可能。
- en: 'It is at this point pretty obvious to me that LLMs would not make the problem
    trivial, but they could help improve the solution in multiple areas:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，此时很明显，大型语言模型不会使问题变得简单，但它们可以在多个领域帮助改进解决方案：
- en: First of all, they could help with reporting and decision making. The output
    of the optimization model might have a business sense, but making a decision out
    of it might be hard for someone with no strong understanding of linear programming.
    An LLM could help interpret the results and suggest concrete business decisions.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，它们可以帮助进行报告和决策。优化模型的结果可能具有商业意义，但对于没有强烈线性规划理解的人来说，从中做出决策可能很困难。大型语言模型可以帮助解释结果并提出具体的商业决策。
- en: Secondly, an LLM could help react faster to certain unexpected situations. It
    could for example summarize information on events that could have an impact on
    the Operations, such as bad weather in some parts of the country or other issues
    with suppliers, and as such, recommend when to rerun the planning model. That
    is assuming it has access to good quality data about these external events.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其次，大型语言模型可以帮助更快地应对某些意外情况。例如，它可以总结可能影响运营的事件信息，如国家某些地区的恶劣天气或其他供应商问题，并据此建议何时重新运行规划模型。这假设它能够访问关于这些外部事件的优质数据。
- en: Finally, it is possible AI could have also helped with making real time adjustments
    to the planning. For instance, it is typically predictable based on the garment
    characteristics whether they would require special care (e.g a cotton shirt will
    always have to be ironed manually). Having a VLM scanning every garment at the
    receiving station could help downstream departments understand how much volume
    they should expect hours in advance.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，AI也有可能帮助对规划进行实时调整。例如，根据服装特性通常可以预测它们是否需要特殊护理（例如，棉质衬衫总是需要手动熨烫）。在接收站对每件服装进行VLM扫描可以帮助下游部门提前数小时了解他们应该预期的数量。
- en: Could AI enable Data Scientists to maintain and update the model? Yes!
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI能否使数据科学家能够维护和更新模型？是的！
- en: It is really hard to deny that with tools like Copilot or Cursor coding and
    maintaining this model would have been easier. I would not have blindly asked
    Claude to code every constraint of the Linear Program from scratch, but with AI
    code editors being smarter than ever, modifying and testing specific constraints
    (and catching human errors!) would be easier.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 很难否认，有了像Copilot或Cursor这样的工具，编码和维护这个模型会更容易。我不会盲目地要求Claude从头开始编写线性规划的所有约束条件，但与AI代码编辑器相比，修改和测试特定的约束条件（以及捕捉人为错误！）会更容易。
- en: My conclusion is that an LLM in 2018 would not have trivialized the project,
    although it could have enhanced the final solution. But it is not impossible to
    believe that a few years (months?) from now, agents with enhanced reasoning capabilities
    will be sophisticated enough to start cracking these types of problems. In the
    meantime, while AI could speed up model iterations and adjustments, the human
    judgment at the core remains irreplaceable. This serves as a valuable reminder
    that being a Data Scientist isn’t just about solving mathematical or computer
    science problems—it’s about designing practical solutions that meet evolving,
    often ambiguous and not so well defined real-world constraints.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我的结论是，2018年的大型语言模型并没有使项目变得简单，尽管它可以增强最终解决方案。但相信几年（几个月？）后，具有增强推理能力的智能体将足够复杂，可以开始解决这类问题。与此同时，虽然AI可以加快模型迭代和调整，但核心的人类判断仍然是不可替代的。这提醒我们，成为一名数据科学家不仅仅是解决数学或计算机科学问题——它是设计满足不断变化、通常模糊且定义不明确的现实世界约束的实际解决方案。
- en: '*Article 100% human generated*'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '*文章100%人工生成*'
