- en: 'Water Cooler Small Talk, Ep. 10: So, What About the AI Bubble?'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 水壶闲聊，第10集：那么，关于AI泡沫，你怎么看？
- en: 原文：[https://towardsdatascience.com/water-cooler-small-talk-ep-10-so-what-about-the-ai-bubble/](https://towardsdatascience.com/water-cooler-small-talk-ep-10-so-what-about-the-ai-bubble/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/water-cooler-small-talk-ep-10-so-what-about-the-ai-bubble/](https://towardsdatascience.com/water-cooler-small-talk-ep-10-so-what-about-the-ai-bubble/)
- en: <mdspan datatext="el1764224361750" class="mdspan-comment">Water cooler small
    talk</mdspan> is a special kind of small talk, typically observed in office spaces
    around a water cooler. There, employees frequently share all kinds of corporate
    gossip, myths, legends, inaccurate scientific opinions, indiscreet personal anecdotes,
    or outright lies. Anything goes. In my Water Cooler Small Talk posts, I discuss
    strange and usually scientifically invalid opinions that I, my friends, or some
    acquaintance of mine have overheard in the office that have literally left us
    speechless.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764224361750" class="mdspan-comment">水壶闲聊</mdspan>是一种特殊的小型谈话，通常在办公室的水壶旁进行。在那里，员工们经常分享各种公司八卦、神话、传说、不准确的科学观点、不谨慎的个人轶事，或者直接是谎言。什么都可以聊。在我的“水壶闲聊”帖子中，我讨论了我在办公室听到的奇怪且通常科学上无效的观点，这些观点让我们无言以对。
- en: 'So, here’s the water cooler opinion of today’s post:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，这里是今天帖子的水壶闲聊观点：
- en: '*AI is a bubble, just like the dot-com bubble of the turn of the millennium.
    It has no real value and is going to eventually collapse and fade away.*'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*AI就像千禧年转折点的互联网泡沫一样，是一个泡沫。它没有真正的价值，最终将崩溃并消失.*'
- en: Phew! 😅 There’s a lot to unpack here. Unlike the opinions I usually discuss
    in other Water Cooler Small Talk posts, for this one, there is no easy, straightforward
    answer. AI is clearly an impressive technology, for sure, the breakthrough of
    our time, and a few years ago, we could only imagine such things within the realm
    of sci-fi.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 呼！😅 这里有很多东西要解释。与我在其他“水壶闲聊”帖子中讨论的观点不同，对于这个话题，没有简单直接的答案。AI显然是一项令人印象深刻的技术，无疑是我们的时代突破，几年前，我们只能在科幻领域想象这样的东西。
- en: Having said that, we cannot deny that there is a certain *bubbliness* to it
    — at least in its current state. For instance, [Mira Murati](https://en.wikipedia.org/wiki/Mira_Murati)‘s
    (OpenAI’s former CTO) new company, [Thinking Machines Lab,](https://thinkingmachines.ai/)
    [is currently valued at $12 billion](https://www.reuters.com/technology/mira-muratis-ai-startup-thinking-machines-raises-2-billion-a16z-led-round-2025-07-15/),
    basically, with no product. On top of this, NVIDIA hit an astronomical valuation
    of [$](https://www.reuters.com/technology/mira-muratis-ai-startup-thinking-machines-raises-2-billion-a16z-led-round-2025-07-15/)[5
    trillion](https://www.reuters.com/business/nvidia-poised-record-5-trillion-market-valuation-2025-10-29/)
    a few weeks ago (roughly equal to the GDP of Germany, for scale).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，我们无法否认，它确实存在一定的泡沫——至少在其当前状态下。例如，[Mira Murati](https://en.wikipedia.org/wiki/Mira_Murati)（OpenAI的前CTO）的新公司
    [Thinking Machines Lab](https://thinkingmachines.ai/)，目前估值高达120亿美元（基本上没有产品）。除此之外，NVIDIA几周前达到了天文数字的[5万亿美元](https://www.reuters.com/business/nvidia-poised-record-5-trillion-market-valuation-2025-10-29/)估值（大约等于德国的GDP，以此作为参考）。
- en: Undeniably, operating AI models is a rather expensive hobby, with no real returns
    up to now. Companies like Anthropic and OpenAI pay billions to run their fancy
    models (operating ChatGPT alone costs $700,000 per day), but at least for now,
    they get back pennies and operate on a net loss. So what’s going on? Is there
    a hidden piece of tech that will suddenly be revealed and render this entire mechanism
    sustainable? Are all these tech billionaires just fools? Are they scammers? Have
    we all been tricked into believing in an impossible, extremely expensive future?
    Or are we heading towards an AI winter, and that will be it?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 不可否认，操作AI模型是一种相当昂贵的爱好，到目前为止还没有真正的回报。像Anthropic和OpenAI这样的公司为了运行它们复杂的模型支付了数十亿美元（仅运行ChatGPT每天就花费70万美元），但至少到目前为止，它们只能收回几分钱，并且处于净亏损状态。那么，究竟发生了什么？是否有什么隐藏的技术将会突然被揭露，并使整个机制变得可持续？这些科技亿万富翁都是傻瓜吗？他们是骗子吗？我们都被骗去相信一个不可能的、极其昂贵的未来吗？或者我们正走向AI寒冬，那一切就结束了？
- en: 💹 What about the dot-com crash?
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 💹 关于互联网泡沫崩溃，你怎么看？
- en: The most popular argument of people calling AI a bubble is the dot-com crash
    of the late ’90s. But in reality, there have been plenty of other bubbles long
    before the dot-com bubble, sparked from some technological breakthrough. For instance,
    we can think of the [railway mania](https://en.wikipedia.org/wiki/Railway_Mania)
    of the 1840s or the [radio boom](https://finaeon.com/rca-and-the-roaring-twenties/)
    of the 1920s.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 把人工智能称为泡沫的人最流行的论点是20世纪90年代末的互联网泡沫。但事实上，在互联网泡沫之前，已经有很多其他泡沫，它们都源于某些技术突破。例如，我们可以想到19世纪40年代的[铁路狂热](https://en.wikipedia.org/wiki/Railway_Mania)或20世纪20年代的[无线电繁荣](https://finaeon.com/rca-and-the-roaring-twenties/)。
- en: Anyways! Something that people seem to forget when comparing the current state
    of AI with the dot-com bubble is that most of the dot-com companies that failed
    back then basically had no proven business model. In particular, in the late 90s,
    there were a lot of startups operating on funding and the promise of an Internet-fueled
    future, but they had no real business model of how to actually make money. Online
    ads weren’t really a thing yet, and a lot of those companies essentially had no
    solid business plan.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 无论如何！当人们将当前的人工智能状态与互联网泡沫进行比较时，似乎忘记了一点，那就是当时失败的多数互联网公司基本上没有任何经过验证的商业模式。特别是在90年代末，有很多初创公司依靠资金和互联网未来发展的承诺在运营，但它们没有真正的商业模式来实际赚钱。在线广告当时并不是一个真正的事情，而且很多这些公司实际上没有稳固的商业计划。
- en: '![](../Images/630f4556d012ef6c68ff92469cabcc56.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/630f4556d012ef6c68ff92469cabcc56.png)'
- en: Nasdaq Composite Index evolution from 1971 to 2021,
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 1971年至2021年纳斯达克综合指数的演变，
- en: 'Source: Wikimedia Commons licensed as Public Domain, [https://commons.wikimedia.org/wiki/File:Nasdaq_Composite_Index_1971_to_jan2021.svg](https://commons.wikimedia.org/wiki/File:Nasdaq_Composite_Index_1971_to_jan2021.svg)'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：维基媒体公共领域许可，[https://commons.wikimedia.org/wiki/File:Nasdaq_Composite_Index_1971_to_jan2021.svg](https://commons.wikimedia.org/wiki/File:Nasdaq_Composite_Index_1971_to_jan2021.svg)
- en: By contrast, most of today’s AI companies have *very* structured business plans.
    And unlike in the ’90s, people — both individually and within organizations —
    are very familiar with the idea of *paying* for stuff online. Unlike the 90s and
    the 2000s, the idea of free stuff on the internet — like, for example, torrenting,
    or free value in general — is gone for good. We are now well aware that if you
    want something valuable to come out of any screen, you need to pay; otherwise,
    you are only going to get ads, noise, and a bad experience.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，今天的大多数人工智能公司都有非常结构化的商业计划。而且与90年代不同，个人和组织都非常熟悉在线支付东西的概念。与90年代和21世纪初不同，互联网上免费东西的想法——比如，比如种子下载或一般性的免费价值——已经一去不复返了。我们现在非常清楚，如果你想要从任何屏幕上得到有价值的东西，你需要付费；否则，你只会得到广告、噪音和糟糕的体验。
- en: Even for the most famous dot-com flops (think Pets.com or WebVan), the premise
    of the idea wasn’t wrong. Pets.com delivered pet supplies to retailers, something
    that widely exists today and is a valid, no-nonsense business idea. Similarly,
    WebVan made home deliveries for stuff within 30-minute windows, a market that
    bloomed 20 years later during the COVID-19 lockdown, with services like Uber Eats
    or Amazon Prime. Thus, it is not the business idea or the technology itself that
    leads to a ‘bubble’, but rather its execution and how mature the market is for
    such an idea. So, my take on tech-driven bubbles would generally be that the technology
    itself usually has value, but it is most probably too early, and the world is
    immature for all this potential to be implemented.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 即使对于最著名的互联网泡沫破灭案例（比如Pets.com或WebVan），这些想法的前提并没有错。Pets.com向零售商提供宠物用品，这在今天广泛存在，是一个有效且务实的企业理念。同样，WebVan在30分钟内提供家庭送货服务，这个市场在20年后的COVID-19封锁期间蓬勃发展，像Uber
    Eats或Amazon Prime这样的服务也应运而生。因此，导致“泡沫”的并不是商业理念或技术本身，而是其执行和市场对这种理念成熟度。所以，我对科技驱动型泡沫的看法通常是，技术本身通常具有价值，但很可能还太早，世界对实现所有这些潜力的成熟度还不够。
- en: 💸 Are all those tech billionaires just fools?
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 💸 难道那些科技亿万富翁都是傻瓜吗？
- en: So, if the market is rather immature for AI, why do all those companies keep
    investing so heavily in it? Don’t they know any better? What do they expect to
    happen other than an AI market crash?
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果人工智能市场还相当不成熟，为什么所有这些公司都持续大量投资呢？他们难道不知道更好的选择吗？他们期待会发生什么，除了人工智能市场崩溃之外？
- en: The short answer is that they are all just expecting the computing power to
    get cheaper.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 简短的回答是，他们都只是期待计算能力变得更便宜。
- en: In the past, faster and cheaper computer chips have solved a lot of tech riddles
    that were thought to be unsolvable. Looking back to the first thoughts of humanity
    about AI, people were wondering if they could build a program to beat humans in
    chess. Funny how chess was considered an activity requiring very high human intelligence,
    so naturally, it would serve as a good measure of an intelligent machine. A machine
    that is good at chess couldn’t be but an intelligent machine. Nevertheless, programs
    beating humans at chess were eventually made possible, not by discovering some
    fancy algorithm, but by implementing the same computing algorithms with [increased
    computing power](https://d1yx3ys82bpsa0.cloudfront.net/chess/ibms-deep-blue-chess-grandmaster-chips.hsu-fh.1999.ieee.062303055.pdf?utm_source=chatgpt.com).
    And this is exactly the type of thing everyone is awaiting to happen with AI.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，更快、更便宜的计算机芯片解决了许多被认为是无法解决的科技难题。回顾人类对人工智能的第一想法，人们曾 wonder是否可以创建一个程序来击败人类在棋类游戏中的表现。有趣的是，棋类游戏被认为是一项需要非常高的人智力的活动，因此它自然地成为衡量智能机器的好指标。一个擅长棋类的机器不可能是非智能的。尽管如此，击败人类的棋类程序最终是通过实现相同的计算算法并[增加计算能力](https://d1yx3ys82bpsa0.cloudfront.net/chess/ibms-deep-blue-chess-grandmaster-chips.hsu-fh.1999.ieee.062303055.pdf?utm_source=chatgpt.com)来实现的。这正是每个人都在期待人工智能发生的事情。
- en: In particular, AI at its current state is just too expensive. It doesn’t make
    sense financially because it costs a lot of money to run such models, and it remains
    to be seen who would be willing to pay *that much*. For instance, for OpenAI just
    to break even for its ChatGPT Plus plan, it would need to charge about $50 per
    month, which is more than double its current price. Thus, creating faster and
    cheaper chips would allow them to render the entire process of developing and
    operating such models more affordable, allowing those companies to finally break
    even. In other words, hardware progress is the lever that could make AI sustainable.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是当前的人工智能成本实在太高。从经济角度来说，这并不合理，因为运行这些模型需要花费大量资金，而且还不清楚谁愿意支付那么多。例如，对于OpenAI来说，仅为了使其ChatGPT
    Plus计划收支平衡，它可能需要每月收费约50美元，这比目前的费用高出不止一倍。因此，制造更快、更便宜的芯片将使它们能够使开发和运营此类模型的过程更加经济，从而使这些公司最终实现收支平衡。换句话说，硬件进步是使人工智能可持续发展的杠杆。
- en: I can’t help but mention [Moore’s law](https://en.wikipedia.org/wiki/Moore%27s_law)
    at this point, cliché as it may be. Moore’s law is the observation that the number
    of transistors on an integrated circuit tends to double approximately every two
    years, leading to exponential improvements in computing power, efficiency, and
    cost-effectiveness over time. Even though classic Moore’s law is now kind of over
    (progress has plateaued in the last decade), the underlying mindset it has created
    (the expectation that computation will keep getting dramatically cheaper) still
    shapes the expectations of today’s tech giants.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我忍不住要提到摩尔定律[https://en.wikipedia.org/wiki/Moore%27s_law](https://en.wikipedia.org/wiki/Moore%27s_law)，尽管它可能已经变得陈词滥调。摩尔定律是这样一个观察结果：集成电路上的晶体管数量大约每两年翻一番，这导致计算能力、效率和成本效益随着时间的推移呈指数级提高。尽管经典的摩尔定律现在可能已经过时（在过去十年中，进步已经趋于平稳），但它所创造的底层心态（即计算将变得越来越便宜的预期）仍然影响着今天科技巨头的期望。
- en: '![](../Images/c355dac1f1ae70082d6e77ff456fa5fc.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c355dac1f1ae70082d6e77ff456fa5fc.png)'
- en: 'Moore’s law // Public Domain, Source: Wikimedia Commons [https://commons.wikimedia.org/wiki/File:Growth_in_processor_performance,_1978%E2%80%932010.png](https://commons.wikimedia.org/wiki/File:Growth_in_processor_performance,_1978%E2%80%932010.png)'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 摩尔定律 // 公共领域，来源：维基百科[https://commons.wikimedia.org/wiki/File:Growth_in_processor_performance,_1978%E2%80%932010.png](https://commons.wikimedia.org/wiki/File:Growth_in_processor_performance,_1978%E2%80%932010.png)
- en: Replacing CPUs with GPUs allowed for parallel processing and removed the physical
    limitations that existed previously. With the rise of ever-larger GPU clusters,
    computing power is expected to keep growing for years to come. And this is why
    everyone is so bullish about this.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 用GPU代替CPU允许并行处理，并消除了之前存在的物理限制。随着更大型的GPU集群的兴起，预计计算能力在未来几年内将继续增长。这就是为什么大家对这一点如此乐观。
- en: 🤔 So, where is the bubble?
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🤔 那么，泡沫在哪里？
- en: A few weeks ago, Michael Burry placed a [$1 billion bearish bet on NVIDIA and
    Palantir](https://finance.yahoo.com/news/big-short-money-manager-michael-153300448.html)
    by buying put options on both stocks. Michael Burry was the one who famously shorted
    the housing market back in 2007, and essentially, predicted the entire 2008 housing
    bubble and subsequent financial crisis. So, naturally, when he called out the
    alleged AI bubble and market crash, everyone held their breath for a minute. Later
    in November, he mysteriously *closed his investment* firm. What a bold way to
    declare that we are in a market top!
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 几周前，迈克尔·伯里通过购买两家公司股票的看跌期权，对英伟达和Palantir进行了价值10亿美元的看跌性投资。[迈克尔·伯里](https://finance.yahoo.com/news/big-short-money-manager-michael-153300448.html)是那位在2007年著名地做空房地产市场的人，他本质上预测了整个2008年的住房泡沫和随后的金融危机。因此，当他对所谓的AI泡沫和市场崩溃发出警告时，每个人都屏住了呼吸。到了11月晚些时候，他神秘地关闭了他的投资公司。这是一种多么大胆的方式来宣布我们正处于市场顶部！
- en: But again, the thing is that AI is fundamentally different than the housing
    bubble. There is only so much we can do with houses, but the potential upside
    of AI is truly unlimited. It is rather a question of when and not if, because
    AI is going to completely transform the world eventually. And unlike housing,
    its value is not arbitrary; AI is a sophisticated technology, a miracle of engineering,
    having inherent value tied to the labour of the great minds that worked to put
    it together. On the flipside, houses have been built in the same way for hundreds
    of years, with minor technological progress. It’s easy to dismiss AI as a speculative
    bubble, just because we are not equipped to understand it.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 但再次强调，问题是AI与住房泡沫在本质上不同。我们对房屋能做的事情是有限的，但AI的潜在上涨空间确实是无限的。这更像是一个关于何时而不是是否的问题，因为AI最终将彻底改变世界。而且与住房不同，其价值不是任意的；AI是一种复杂的技术，是工程奇迹，其内在价值与构建它的大脑的劳动紧密相连。另一方面，房屋已经以相同的方式建造了几百年，只有微小的技术进步。很容易将AI视为一个投机泡沫，仅仅因为我们还没有准备好理解它。
- en: I think that it is more appropriate to compare AI with other technological booms
    related to laying some kind of infrastructure, like electricity, telephone, or
    the internet, even rail. Oh, but rail mania was a speculative bubble, wasn’t it?
    Well, was it? The technology itself wasn’t a bubble; laying a rail infrastructure
    was not speculative and had real, no-nonsense value. The thing is that other alternatives
    apart from rail eventually emerged, like automobiles, airplanes, or piping, condemning
    the rail to never fulfill its potential. In other words, the transportation need
    was ultimately shared among several different markets apart from rail. The bubbliness
    originated from assuming that the rail is going to be the only means of transport
    ever. Thus, a meaningful AI bubble would require some other, magical technology
    to substitute for part of its potential.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为将AI与其他与建设某种基础设施相关的技术热潮进行比较更为恰当，比如电力、电话、互联网，甚至是铁路。哦，但铁路狂热不是一个投机泡沫吗？好吧，是吗？技术本身并不是泡沫；建设铁路基础设施并不是投机的，它具有真实、无废话的价值。问题是，除了铁路之外，最终还出现了其他替代方案，比如汽车、飞机或管道，这导致铁路永远无法实现其潜力。换句话说，交通需求最终被分配给了几个不同的市场，而不仅仅是铁路。泡沫的起源在于假设铁路将成为唯一的交通方式。因此，一个有意义的AI泡沫将需要某种其他、神奇的技术来替代其部分潜力。
- en: Anyways! Just like the internet, the main value of AI originates from whatever
    comes next and sits on top of it. Laying the electric grid allowed for a bunch
    of electric appliances sitting on top of it to be created later on; building the
    internet allowed for a bunch of apps like Google or Facebook to be created later
    on. Naturally, whoever lays the infrastructure for anything is going to be paying
    *lots* of money, because they essentially pay for whoever is coming next. Nevertheless,
    this doesn’t mean that the technology itself is not valuable, and does not have
    the potential to lead to further substantial growth.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 不管怎样！就像互联网一样，AI的主要价值来源于其之上的任何东西。铺设电网使得后来可以创建大量电器；建设互联网使得后来可以创建大量像谷歌或Facebook这样的应用程序。自然地，为任何事物铺设基础设施的人将不得不支付大量金钱，因为他们实际上是为接下来的人付费。然而，这并不意味着技术本身没有价值，也没有潜力导致进一步的实质性增长。
- en: 'That leads us to an important insight: for AI to make sense financially, a
    bunch of successful and meaningful things sitting on top of it need to be created.
    The investment in the infrastructure itself doesn’t make sense if it isn’t ultimately
    used as an infrastructure. So, this is the real bet, the real question one needs
    to answer. The technology is there, the investment is there, the infrastructure
    is there; now it remains to see if enough truly useful stuff is built on top of
    it.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这引出了一个重要的洞察：为了使AI在财务上变得有意义，需要在它之上创建一系列成功且有意义的事物。如果基础设施本身最终没有被用作基础设施，那么对基础设施的投资就没有意义。因此，这才是真正的赌注，这是一个人需要回答的真正问题。技术已经有了，投资也有了，基础设施也有了；现在剩下的就是看是否能在其上构建足够真正有用的东西。
- en: On my mind
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 心中思考
- en: 'I know this post might age like milk. 🤷‍♀️ Maybe in a couple of weeks or months,
    I will be reading it and wondering what on earth I was talking about. Still, AI
    is genuinely impressive: a sophisticated technology with the potential to transform
    the world permanently, much like electricity or the internet, and to set the stage
    for an entirely new era of technological growth.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道这篇帖子可能会像牛奶一样变质。🤷‍♀️也许几周或几个月后，我会再次阅读它，想知道我究竟在说什么。尽管如此，AI确实令人印象深刻：这是一种复杂的技术，有可能永久性地改变世界，就像电力或互联网一样，并为一个全新的技术增长时代奠定基础。
