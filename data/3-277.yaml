- en: A Comprehensive Guide to LLM Temperature 🔥🌡️
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLM温度全面指南 🔥🌡️
- en: 原文：[https://towardsdatascience.com/a-comprehensive-guide-to-llm-temperature/](https://towardsdatascience.com/a-comprehensive-guide-to-llm-temperature/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/a-comprehensive-guide-to-llm-temperature/](https://towardsdatascience.com/a-comprehensive-guide-to-llm-temperature/)
- en: While building my own LLM-based application, I found many prompt engineering
    guides, but few equivalent guides for determining the temperature setting.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建自己的基于LLM的应用程序时，我发现了很多提示工程指南，但很少有关于确定温度设置的等效指南。
- en: Of course, temperature is a simple numerical value while prompts can get mindblowingly
    complex, so it may feel trivial as a product decision. Still, choosing the right
    temperature can dramatically change the nature of your outputs, and anyone building
    a production-quality LLM application should choose temperature values with intention.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，温度是一个简单的数值，而提示可能非常复杂，所以在产品决策中可能感觉微不足道。然而，选择正确的温度可以显著改变输出的性质，任何构建生产质量LLM应用程序的人都应该有目的地选择温度值。
- en: In this post, we’ll explore what temperature is and the math behind it, potential
    product implications, and how to choose the right temperature for your LLM application
    and evaluate it. At the end, I hope that you’ll have a clear course of action
    to find the right temperature for every LLM use case.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将探讨温度是什么以及其背后的数学，潜在的产品影响，以及如何为您的LLM应用程序选择合适的温度并对其进行评估。最后，我希望您能找到明确的行动指南，为每个LLM用例找到正确的温度。
- en: '**What is temperature?**'
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是温度？**'
- en: Temperature is a number that controls the randomness of an LLM’s outputs. Most
    APIs limit the value to be from 0 to 1 or some similar range to keep the outputs
    in semantically coherent bounds.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 温度是一个控制LLM输出随机性的数值。大多数API将这个值限制在0到1或类似的范围内，以保持输出在语义上连贯的界限内。
- en: 'From OpenAI’s documentation:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 来自OpenAI的文档：
- en: '*“Higher values like 0.8 will make the output more random, while lower values
    like 0.2 will make it more focused and deterministic.”*'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“更高的值，如0.8，会使输出更加随机，而更低的值，如0.2，会使输出更加集中和确定。”*'
- en: Intuitively, it’s like a dial that can adjust how “explorative” or “conservative”
    the model is when it spits out an answer.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 直观地说，它就像一个可以调整模型在给出答案时是“探索性”还是“保守性”的旋钮。
- en: '**What do these temperature values mean?**'
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**这些温度值意味着什么？**'
- en: Personally, I find the math behind the temperature field very interesting, so
    I’ll dive into it. But if you’re already familiar with the innards of LLMs or
    you’re not interested in them, **feel free to skip this section**.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 个人而言，我发现温度字段背后的数学非常有趣，所以我会深入探讨。但如果您已经熟悉LLM的内部结构或者对此不感兴趣，**请随意跳过本节**。
- en: You probably know that an LLM generates text by predicting the next token after
    a given sequence of tokens. In its prediction process, it assigns probabilities
    to all possible tokens that could come next. For example, if the sequence passed
    to the LLM is “The giraffe ran over to the…”, it might assign high probabilities
    to words like “tree” or “fence” and lower probabilities to words like “apartment”
    or “book”.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能知道LLM通过预测给定序列后的下一个标记来生成文本。在其预测过程中，它为所有可能的下一个标记分配概率。例如，如果传递给LLM的序列是“长颈鹿跑到……”，它可能会将高概率分配给像“树”或“栅栏”这样的词，而将低概率分配给像“公寓”或“书”这样的词。
- en: But let’s back up a bit. How do these probabilities come to be?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 但让我们回顾一下。这些概率是如何产生的？
- en: 'These probabilities usually come from raw scores, known as **logits**, that
    are the results of many, many neural network calculations and other machine learning
    techniques. These logits are gold; they contain all the valuable information about
    what tokens could be selected next. But the problem with these logits is that
    they don’t fit the definition of a probability: they can be any number, positive
    or negative, like 2, or -3.65, or 20\. They’re not necessarily between 0 and 1,
    and they don’t necessarily all add up to 1 like a nice probability distribution.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这些概率通常来自原始分数，称为**logits**，它们是许多神经网络计算和其他机器学习技术的结果。这些logits是宝贵的；它们包含了关于下一个可能选择的标记的所有有价值信息。但这些问题在于这些logits不符合概率的定义：它们可以是任何数字，正数或负数，比如2，或者-3.65，或者20。它们不一定在0到1之间，而且它们不一定都加起来等于1，就像一个良好的概率分布一样。
- en: 'So, to make these logits usable, we need to use a function to transform them
    into a clean probability distribution. The function typically used here is called
    the **softmax**, and it’s essentially an elegant equation that does two important
    things:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了使这些 logits 可用，我们需要使用一个函数将它们转换成一个干净的概率分布。这里通常使用的函数被称为 **softmax**，它本质上是一个优雅的方程，做了两件重要的事情：
- en: It turns all the logits into positive numbers.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它将所有的 logits 转换为正数。
- en: It scales the logits so they add up to 1.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它将 logits 缩放，使它们的总和为 1。
- en: '![](../Images/5a32acfc6f512f1965632d48fd0699d1.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5a32acfc6f512f1965632d48fd0699d1.png)'
- en: Softmax formula
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: Softmax 公式
- en: The softmax function works by taking each logit, raising *e* (around 2.718)
    to the power of that logit, and then dividing by the sum of all these exponentials.
    So the highest logit will still get the highest numerator, which means it gets
    the highest probability. But other tokens, even with negative logit values, will
    still get a chance.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Softmax 函数通过取每个 logits，将 e（约 2.718）的幂次方应用于该 logits，然后除以所有这些指数的总和来实现。因此，最高的 logits
    仍然会得到最高的分子，这意味着它得到最高的概率。但其他标记，即使有负 logits 值，仍然有机会。
- en: 'Now here’s where temperature comes in: **temperature modifies the logits before
    applying softmax.** The formula for softmax with temperature is:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是温度发挥作用的时候了：**温度在应用 softmax 之前修改 logits**。带温度的 softmax 公式是：
- en: '![](../Images/2d38e840516286c59bbf4735c45413d9.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2d38e840516286c59bbf4735c45413d9.png)'
- en: Softmax with temperature
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 带温度的 Softmax
- en: When the temperature is **low**, dividing the logits by T makes the values larger/more
    spread out. Then the exponentiation would make the highest value much larger than
    the others, making the probability distribution more uneven. The model would have
    a higher chance of picking the most probable token, resulting in a **more deterministic **output.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当温度 **低** 时，将 logits 除以 T 使得值变得更大/更分散。然后指数运算会使最大值远大于其他值，使概率分布更加不均匀。模型更有可能选择最可能的标记，导致
    **更确定性的** 输出。
- en: When the temperature is **high,** dividing the logits by T makes all the values
    smaller/closer together, spreading out the probability distribution more evenly.
    This means the model is more likely to pick less probable tokens, increasing **randomness**.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当温度 **高** 时，将 logits 除以 T 使得所有值都变得更小/更接近，使概率分布更加均匀地分散。这意味着模型更有可能选择不太可能的标记，增加
    **随机性**。
- en: '**How to choose temperature**'
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**如何选择温度**'
- en: Of course, the best way to choose a temperature is to play around with it. I
    believe any temperature, like any prompt, should be substantiated with example
    runs and evaluated against other possibilities. We’ll discuss that in the next
    section.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，选择最佳温度的最佳方式是尝试不同的值。我相信任何温度，就像任何提示一样，都应该通过示例运行来证实，并与其他可能性进行比较。我们将在下一节中讨论这一点。
- en: 'But before we dive into that, I want to highlight that **temperature is a crucial
    product decision**, one that can significantly influence user behavior. It may
    seem rather straightforward to choose: lower for more accuracy-based applications,
    higher for more creative applications. But there are tradeoffs in both directions
    with downstream consequences for user trust and usage patterns. Here are some
    subtleties that come to mind:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 但在我们深入探讨这一点之前，我想强调的是，**温度是一个关键的产品决策**，它可以显著影响用户行为。选择它可能看起来相当直接：对于基于准确性的应用选择较低，对于更具创造性的应用选择较高。但在两个方向上都有权衡，这会对用户的信任和使用模式产生下游影响。以下是一些我想到的微妙之处：
- en: '**Low temperatures can make the product feel authoritative**. More deterministic
    outputs can create the illusion of expertise and foster user trust. However, this
    can also lead to gullible users. If responses are always confident, users might
    stop critically evaluating the AI’s outputs and just blindly trust them, even
    if they’re wrong.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**低温可以使产品感觉更有权威性**。更确定性的输出可以创造专业知识的错觉并培养用户信任。然而，这也可能导致易受骗的用户。如果响应总是自信的，用户可能会停止批判性地评估
    AI 的输出，而只是盲目地信任它们，即使它们是错误的。'
- en: '**Low temperatures can reduce decision fatigue**. If you see one strong answer
    instead of many options, you’re more likely to take action without overthinking.
    This might lead to easier onboarding or lower cognitive load while using the product.
    Inversely, high temperatures could create more decision fatigue and lead to churn.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**低温可以减少决策疲劳**。如果你看到一个明确的答案而不是许多选项，你更有可能采取行动而不需要过度思考。这可能会导致更容易的入门或在使用产品时的认知负荷降低。相反，高温可能会造成更多的决策疲劳，并导致流失。'
- en: '**High temperatures can encourage user engagement**. The unpredictability of
    high temperatures can keep users curious (like variable rewards), leading to longer
    sessions or increased interactions. Inversely, low temperatures might create stagnant
    user experiences that bore users.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高温可以鼓励用户参与**。高温的不确定性可以保持用户的兴趣（就像可变奖励一样），导致更长的会话或更多的互动。相反，低温可能会创造停滞的用户体验，让用户感到无聊。'
- en: '**Temperature can affect the way users refine their prompts.** When answers
    are unexpected with high temperatures, users might be driven to **clarify** their
    prompts. But with low temperatures, users may be forced to **add more detail or
    expand on** their prompts in order to get new answers.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**温度可能会影响用户调整提示的方式**。当高温下的答案出乎意料时，用户可能会被驱使去**澄清**他们的提示。但低温时，用户可能被迫**添加更多细节或扩展**他们的提示以获得新的答案。'
- en: These are broad generalizations, and of course there are many more nuances with
    every specific application. But in most applications, the temperature can be a
    powerful variable to adjust in A/B testing, something to consider alongside your
    prompts.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是广泛的概括，当然，每个具体应用中都有许多更细微的差别。但在大多数应用中，温度可以是一个强大的变量，用于A/B测试，这是你在考虑提示时需要考虑的一个因素。
- en: '**Evaluating different temperatures**'
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**评估不同的温度**'
- en: 'As developers, we’re used to unit testing: defining a set of inputs, running
    those inputs through a function, and getting a set of expected outputs. We sleep
    soundly at night when we ensure that our code is doing what we expect it to do
    and that our logic is satisfying some clear-cut constraints.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 作为开发者，我们习惯于单元测试：定义一组输入，将这些输入通过一个函数运行，并得到一组预期输出。当我们确保我们的代码正在做我们期望它做的事情，并且我们的逻辑满足一些明确的约束时，我们就能安心地睡觉。
- en: The [promptfoo](https://www.promptfoo.dev/docs/intro/) package lets you perform
    the LLM-prompt equivalent of unit testing, but there’s some additional nuance.
    Because LLM outputs are non-deterministic and often designed to do more creative
    tasks than strictly logical ones, it can be hard to define what an “expected output”
    looks like.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '[promptfoo](https://www.promptfoo.dev/docs/intro/)包让你能够执行LLM提示的单元测试，但也有一些细微差别。因为LLM的输出是非确定性的，并且通常被设计为执行比严格逻辑任务更具创造性的任务，所以很难定义“预期输出”是什么样的。'
- en: '**Defining your “expected output”**'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**定义你的“预期输出”**'
- en: The simplest evaluation tactic is to have a **human** rate how good they think
    some output is, according to some rubric. For outputs where you’re looking for
    a certain “vibe” that you can’t express in words, this will probably be the most
    effective method.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 最简单的评估策略是让**人类**根据某些标准评估他们认为某些输出有多好。对于你无法用言语表达的某些“感觉”，这可能是最有效的方法。
- en: Another simple evaluation tactic is to use **deterministic metrics** — these
    are things like “does the output contain a certain string?” or “is the output
    valid json?” or “does the output satisfy this javascript expression?”. If your
    expected output can be expressed in these ways, [promptfoo has your back](https://www.promptfoo.dev/docs/configuration/expected-outputs/deterministic/).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种简单的评估策略是使用**确定性指标**——这些指标包括“输出是否包含某个字符串？”或“输出是否是有效的JSON？”或“输出是否满足这个JavaScript表达式？”。如果你的预期输出可以用这些方式表达，[promptfoo会支持你](https://www.promptfoo.dev/docs/configuration/expected-outputs/deterministic/)。
- en: A more interesting, AI-age evaluation tactic is to use **LLM-graded checks**.
    These essentially use LLMs to evaluate your LLM-generated outputs, and can be
    quite effective if used properly. Promptfoo offers these model-graded metrics
    in multiple forms. The whole list is [here](https://www.promptfoo.dev/docs/configuration/expected-outputs/model-graded/),
    and it contains assertions from “is the output relevant to the original query?”
    to “compare the different test cases and tell me which one is best!” to “where
    does this output rank on this rubric I defined?”.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更有趣、AI时代的评估策略是使用**LLM评分检查**。这些本质上使用LLM来评估你生成的LLM输出，如果使用得当，可以非常有效。Promptfoo提供了多种形式的这些模型评分指标。整个列表[在这里](https://www.promptfoo.dev/docs/configuration/expected-outputs/model-graded/)，它包含从“输出是否与原始查询相关？”到“比较不同的测试用例并告诉我哪个最好！”再到“这个输出在我的定义的评分标准中排名如何？”的断言。
- en: '**Example**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**'
- en: Let’s say I’m creating a consumer-facing application that comes up with creative
    gift ideas and I want to empirically determine what temperature I should use with
    my main prompt.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我正在创建一个面向消费者的应用程序，它会提出创意礼物想法，并且我想经验性地确定我应该使用什么温度与我的主要提示一起使用。
- en: 'I might want to evaluate metrics like relevance, originality, and feasibility
    within a certain budget and make sure that I’m picking the right temperature to
    optimize those factors. If I’m comparing GPT 4o-mini’s performance with temperatures
    of 0 vs. 1, my test file might start like this:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我可能想要在一定的预算内评估相关性、原创性和可行性等指标，并确保我选择了正确的温度来优化这些因素。如果我比较GPT 4o-mini在不同温度0和1下的性能，我的测试文件可能如下所示：
- en: '[PRE0]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'I’ll probably want to run the test cases repeatedly to test the effects of
    temperature changes across multiple same-input runs. In that case, I would use
    the repeat param like:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我可能需要反复运行测试用例，以测试温度变化对多次相同输入运行的影响。在这种情况下，我会使用重复参数，如下所示：
- en: '[PRE1]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/91ed61276de3cacf9e5fa1ae44b8aff9.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/91ed61276de3cacf9e5fa1ae44b8aff9.png)'
- en: promptfoo test results
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: promptfoo测试结果
- en: '**Conclusion**'
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**结论**'
- en: 'Temperature is a simple numerical parameter, but don’t be deceived by its simplicity:
    it can have far-reaching implications for any LLM application.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 温度是一个简单的数值参数，但不要被它的简单性所欺骗：它对任何LLM应用都可能产生深远的影响。
- en: Tuning it just right is key to getting the behavior you want — too low, and
    your model plays it too safe; too high, and it starts spouting unpredictable responses.
    With tools like promptfoo, you can systematically test different settings and
    find your Goldilocks zone — not too cold, not too hot, but just right. ️
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 调整到恰到好处是获得你想要的行为的关键——太低，你的模型就会过于保守；太高，它就会开始发出不可预测的回应。使用像promptfoo这样的工具，你可以系统地测试不同的设置，找到你的“金发女孩区域”——既不太冷，也不太热，但恰到好处。
    ️
