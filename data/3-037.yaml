- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'With April just behind us, it’s once again time for one of our favorite rituals:
    looking back at all the stellar articles TDS authors have published in the past
    few weeks, and celebrating the ones that resonated the most with our community.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 四月已经过去，又是时候进行我们最喜欢的仪式之一了：回顾过去几周TDS作者们发布的所有精彩文章，并庆祝那些与我们社区产生共鸣的文章。
- en: Our April highlights cover topics as diverse as web development, [multi-agent
    AI](https://towardsdatascience.com/tag/ai-agent/) systems, supply-chain analytics,
    and model context protocol. What they all have in common is a commitment to clarity
    and actionability, so we hope you take some time to explore (or revisit) many
    of these top-notch contributions.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的四月亮点涵盖了从网络开发、[多代理人工智能](https://towardsdatascience.com/tag/ai-agent/)系统、供应链分析到模型上下文协议等多样化的主题。它们共同的特点是对清晰性和可操作性的承诺，所以我们希望您花些时间探索（或重新访问）这些高质量的贡献。
- en: 'In case these articles inspire you to write about your own passion projects
    or recent discoveries, don’t hesitate to share your work with us: we’re always [open
    for submissions from new authors](https://towardsdatascience.com/questions-96667b06af5/).'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这些文章激励您撰写关于您自己的激情项目或最新发现的文章，请不要犹豫与我们分享您的工作：我们始终[欢迎新作者投稿](https://towardsdatascience.com/questions-96667b06af5/)。
- en: 'PyScript vs. JavaScript: A Battle of Web Titans'
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: PyScript 与 JavaScript：网络巨头之战
- en: After long dominating the realm of web development, could JavaScript finally
    see serious competition from a new(ish) contender? [Pol Marin](https://towardsdatascience.com/author/polmarin/) explores
    PyScript’s potential in a head-to-head comparison — which ended up being our most-read
    story in April.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在长期主导网络开发领域之后，JavaScript 是否最终会看到来自一个新（ish）竞争者的严重挑战？[Pol Marin](https://towardsdatascience.com/author/polmarin/)
    在一场面对面的比较中探讨了 PyScript 的潜力——这最终成为我们四月最受欢迎的故事。
- en: '[PyScript vs. JavaScript: A Battle of Web Titans](https://towardsdatascience.com/pyscript-vs-javascript-a-battle-of-web-titans/)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[PyScript 与 JavaScript：网络巨头之战](https://towardsdatascience.com/pyscript-vs-javascript-a-battle-of-web-titans/)'
- en: 'Agentic AI: Single vs Multi-Agent Systems'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理人工智能：单代理系统与多代理系统
- en: '[Ida Silfverskiold](https://towardsdatascience.com/author/httpsmedium-comilsilfverskiold/)‘s
    lucid and comprehensive project walkthrough outlines the differences between building,
    implementing, and working with flexible AI systems compared to more controlled
    ones.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '[Ida Silfverskiold](https://towardsdatascience.com/author/httpsmedium-comilsilfverskiold/)
    清晰且全面的工程项目概述了与更受控的系统相比，构建、实施和使用灵活的人工智能系统的差异。'
- en: '[Agentic AI: Single vs Multi-Agent Systems](https://towardsdatascience.com/agentic-ai-single-vs-multi-agent-systems/)'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[代理人工智能：单代理系统与多代理系统](https://towardsdatascience.com/agentic-ai-single-vs-multi-agent-systems/)'
- en: Create Your Supply Chain Analytics Portfolio to Land Your Dream Job
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建您的供应链分析组合以获得您的梦想工作
- en: Geared towards both students and professionals, [Samir Saci](https://towardsdatascience.com/author/s-saci95/) presents
    a unique use case for demonstrating your real-world skills.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 面向学生和专业人士，[Samir Saci](https://towardsdatascience.com/author/s-saci95/) 展示了一个独特的用例来展示您的实际技能。
- en: '[Create Your Supply Chain Analytics Portfolio to Land Your Dream Job](https://towardsdatascience.com/create-your-supply-chain-analytics-portfolio-to-land-your-dream-job/)'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[创建您的供应链分析组合以获得您的梦想工作](https://towardsdatascience.com/create-your-supply-chain-analytics-portfolio-to-land-your-dream-job/)'
- en: Other April Highlights
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他四月亮点
- en: 'Explore more of our most popular and widely circulated articles of the past
    month:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 探索我们过去一个月最受欢迎和广泛传播的文章：
- en: Are you just starting to learn how to code? [Egor Howell](https://towardsdatascience.com/author/egorhowell/) proposes
    a clear roadmap to help you [master—and then move beyond—the basics](https://towardsdatascience.com/how-i-would-learn-to-code-if-i-could-start-over/).
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你刚开始学习如何编码吗？[Egor Howell](https://towardsdatascience.com/author/egorhowell/)
    提出了一个清晰的路线图，帮助你[掌握并超越基础](https://towardsdatascience.com/how-i-would-learn-to-code-if-i-could-start-over/)。
- en: '[How I Would Learn To Code (If I Could Start Over)](https://towardsdatascience.com/how-i-would-learn-to-code-if-i-could-start-over/)'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如果我能重新开始，我将如何学习编码](https://towardsdatascience.com/how-i-would-learn-to-code-if-i-could-start-over/)'
- en: Zooming in on an emerging topic within agentic AI, [Sandi Besen](https://towardsdatascience.com/author/sandibesen/) published
    an [accessible explainer on MCP](https://towardsdatascience.com/clear-intro-to-mcp/) (Model
    Context Protocol), and included some helpful code examples for good measure.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在代理AI的一个新兴主题上，[Sandi Besen](https://towardsdatascience.com/author/sandibesen/)
    发布了一个关于MCP（模型上下文协议）的[易于理解的解释](https://towardsdatascience.com/clear-intro-to-mcp/)，并附带了一些有用的代码示例。
- en: '[A Clear Intro to MCP (Model Context Protocol) with Code Examples](https://towardsdatascience.com/clear-intro-to-mcp/)'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[带有代码示例的MCP（模型上下文协议）清晰介绍](https://towardsdatascience.com/clear-intro-to-mcp/)'
- en: '[Machine learning meets math](https://towardsdatascience.com/explained-how-does-l1-regularization-perform-feature-selection/) in [Shubham
    Panchal](https://towardsdatascience.com/author/equipintelligence/)‘s meticulous
    guide to L1 regularization in the context of feature selection.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在[Shubham Panchal](https://towardsdatascience.com/author/equipintelligence/)
    仔细的指南中，[机器学习遇到数学](https://towardsdatascience.com/explained-how-does-l1-regularization-perform-feature-selection/)
    在特征选择背景下探讨L1正则化。
- en: '[Explained: How Does L1 Regularization Perform Feature Selection?](https://towardsdatascience.com/explained-how-does-l1-regularization-perform-feature-selection/)'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[解释：L1正则化是如何进行特征选择的？](https://towardsdatascience.com/explained-how-does-l1-regularization-perform-feature-selection/)'
- en: How can you [use decision trees for quick and effective segmentation](https://towardsdatascience.com/mining-rules-from-data/) tasks? [Mariya
    Mansurova](https://towardsdatascience.com/author/miptgirl/) goes into great detail
    in her recent deep dive.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你如何[使用决策树进行快速有效的分割](https://towardsdatascience.com/mining-rules-from-data/)任务？[Mariya
    Mansurova](https://towardsdatascience.com/author/miptgirl/) 在她最近的深入研究中进行了详细阐述。
- en: '[Mining Rules from Data](https://towardsdatascience.com/mining-rules-from-data/)'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[从数据中挖掘规则](https://towardsdatascience.com/mining-rules-from-data/)'
- en: '[Expand your data-workflow automation toolkit](https://towardsdatascience.com/4-levels-of-github-actions-a-guide-to-data-workflow-automation/) by
    following along [Destin Gong](https://towardsdatascience.com/author/destingong/)‘s
    GitHub Actions-focused tutorial.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过跟随[Destin Gong](https://towardsdatascience.com/author/destingong/) 的GitHub
    Actions教程，[扩展你的数据工作流自动化工具集](https://towardsdatascience.com/4-levels-of-github-actions-a-guide-to-data-workflow-automation/)。
- en: '[4 Levels of GitHub Actions: A Guide to Data Workflow Automation](https://towardsdatascience.com/4-levels-of-github-actions-a-guide-to-data-workflow-automation/)'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[GitHub Actions的4个级别：数据工作流自动化的指南](https://towardsdatascience.com/4-levels-of-github-actions-a-guide-to-data-workflow-automation/)'
- en: Meet Our New Authors
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 新作者介绍
- en: 'Every month, we’re thrilled to welcome a fresh cohort of data science, machine
    learning, and AI experts. Don’t miss the work of some of our newest contributors:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 每个月，我们都非常高兴地欢迎一批新的数据科学、机器学习和AI专家。不要错过我们一些最新贡献者的作品：
- en: '[Prasann Pradeep Patil](https://towardsdatascience.com/author/prasannpradeep-patil/) is
    a software engineer at Adobe, and is already making a splash at TDS with his new
    article on powering apps with LLMs.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Prasann Pradeep Patil](https://towardsdatascience.com/author/prasannpradeep-patil/)
    是Adobe的软件工程师，他在TDS上关于用LLMs（大型语言模型）赋能应用程序的新文章中已经引起了关注。'
- en: '[A Step-By-Step Guide To Powering Your Application With LLMs](https://towardsdatascience.com/a-step-by-step-guide-to-powering-your-application-with-llm/)'
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用LLMs（大型语言模型）为您的应用程序供电的逐步指南](https://towardsdatascience.com/a-step-by-step-guide-to-powering-your-application-with-llm/)'
- en: '[Nagharjun Mathi Mariappan](https://towardsdatascience.com/author/nagharjun-mathimariappan/) works
    at the intersection of data science, ML, and healthcare; his first contribution
    revolves around the complexities of navigating MLflow in restricted HPC systems.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Nagharjun Mathi Mariappan](https://towardsdatascience.com/author/nagharjun-mathimariappan/)
    在数据科学、机器学习和医疗保健的交汇处工作；他的第一个贡献围绕在受限HPC系统中导航MLflow的复杂性。'
- en: '[Exporting MLflow Experiments from Restricted HPC Systems](https://towardsdatascience.com/exporting-mlflow-experiments-from-restricted-hpc-systems/)'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[从受限HPC系统导出MLflow实验](https://towardsdatascience.com/exporting-mlflow-experiments-from-restricted-hpc-systems/)'
- en: '[Kirill Vasin](https://towardsdatascience.com/author/kirill-vasin/) joins us
    with a background in theoretical and experimental physics, and a debut article
    on innovative presentation techniques.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[基里尔·瓦辛](https://towardsdatascience.com/author/kirill-vasin/) 带着理论物理和实验物理的背景加入我们，并带来了一篇关于创新演示技术的处女作。'
- en: '[How to Use Gyroscope in Presentations, or Why Take a JoyCon to DPG2025](https://towardsdatascience.com/how-to-use-gyroscope-in-presentations-or-why-take-a-joycon-to-dpg2025/)'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何在演示中使用陀螺仪，或者为什么带JoyCon去DPG2025](https://towardsdatascience.com/how-to-use-gyroscope-in-presentations-or-why-take-a-joycon-to-dpg2025/)'
- en: Contribute to TDS
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为TDS贡献力量
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us](https://towardsdatascience.com/questions-96667b06af5/)?
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们热爱发布新作者的文章，所以如果你最近写了一个有趣的项目教程、教程或对我们核心主题的理论反思，为什么不[与我们分享](https://towardsdatascience.com/questions-96667b06af5/)呢？
