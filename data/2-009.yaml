- en: How to Benchmark Classical Machine Learning Workloads on Google Cloud
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在Google Cloud上基准测试经典机器学习工作负载
- en: 原文：[https://towardsdatascience.com/benchmarking-classical-machine-learning-workloads-on-google-cloud/](https://towardsdatascience.com/benchmarking-classical-machine-learning-workloads-on-google-cloud/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/benchmarking-classical-machine-learning-workloads-on-google-cloud/](https://towardsdatascience.com/benchmarking-classical-machine-learning-workloads-on-google-cloud/)
- en: <mdspan datatext="el1755898002223" class="mdspan-comment">Why Classical</mdspan>
    Machine Learning Still Matters
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755898002223" class="mdspan-comment">为什么经典机器学习仍然重要</mdspan>
- en: In an era of GPU supremacy, why do real-world business cases depend so much
    on classical machine learning and CPU-based training? The answer is that the data
    most important to real-world business applications is still overwhelmingly **tabular,
    structured, and relational**—think fraud detection, insurance risk scoring, churn
    prediction, and operational telemetry. Empirical results (e.g., [Grinsztajn et
    al*.,* *Why do tree-based models still outperform deep learning on typical tabular
    data?* (2022), NeurIPS 2022 Track on Datasets and Benchmarks](https://papers.neurips.cc/paper_files/paper/2022/file/0378c7692da36807bdec87ab043cdadc-Paper-Datasets_and_Benchmarks.pdf))
    show that for these domains **random forest**, **gradient boosting**, and **logistic
    regression** outperform neural nets in both accuracy and reliability. They also
    offer explainability which is critical in regulated industries like banking and
    healthcare.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在GPU至上的时代，为什么现实世界的商业案例如此依赖经典机器学习和基于CPU的训练？答案是，对现实世界商业应用最重要的数据仍然是压倒性的**表格化、结构化和关系型**——想想欺诈检测、保险风险评估、客户流失预测和运营遥测。实证结果（例如，[Grinsztajn等人*，*
    *为什么基于树的模型在典型表格数据上仍然优于深度学习？* (2022)，NeurIPS 2022数据集和基准测试轨道](https://papers.neurips.cc/paper_files/paper/2022/file/0378c7692da36807bdec87ab043cdadc-Paper-Datasets_and_Benchmarks.pdf)）表明，对于这些领域，**随机森林**、**梯度提升**和**逻辑回归**在准确性和可靠性方面优于神经网络。它们还提供了在受监管行业如银行和医疗保健中至关重要的可解释性。
- en: GPUs often lose their edge here due to **data transfer latency** ([PCIe](https://www.intel.com/content/www/us/en/gaming/resources/what-is-pcie-4-and-why-does-it-matter.html)
    overhead) and **poor scaling** of some tree-based algorithms. Consequently, **CPU-based
    training** remains the most cost-effective choice for small-medium structured
    data workloads on cloud platforms.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 由于**数据传输延迟**（[PCIe](https://www.intel.com/content/www/us/en/gaming/resources/what-is-pcie-4-and-why-does-it-matter.html)开销）和一些基于树的算法的**扩展性差**，GPU在这里往往失去了优势。因此，**基于CPU的训练**仍然是云平台上针对小型中型结构化数据工作负载最具成本效益的选择。
- en: 'In this article, I’ll walk you through the steps for benchmarking traditional
    machine learning algorithms on [Google Cloud Platform (GCP)](https://cloud.google.com/)
    CPU offerings, including the [Intel® Xeon® 6](https://www.intel.com/content/www/us/en/products/details/processors/xeon.html)
    that was recently made generally available. (Full disclosure: I am affiliated
    with Intel as a Senior AI Software Solutions Engineer.)'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将向您介绍在[Google Cloud Platform (GCP)](https://cloud.google.com/) CPU提供上基准测试传统机器学习算法的步骤，包括最近公开发布的[Intel®
    Xeon® 6](https://www.intel.com/content/www/us/en/products/details/processors/xeon.html)。（完全披露：我是英特尔的一名高级AI软件解决方案工程师。）
- en: By systematically comparing runtime, scalability, and cost across algorithms,
    we can make evidence-based decisions about which approaches deliver the best trade-off
    between accuracy, speed, and operational cost.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 通过系统性地比较算法的运行时间、可扩展性和成本，我们可以基于证据做出决策，关于哪些方法在准确度、速度和运营成本之间提供了最佳权衡。
- en: Machine Configuration on Google Cloud
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Google Cloud上的机器配置
- en: Go to [console.cloud.google.com](https://console.cloud.google.com/), set up
    your billing, and head to “Compute Engine.” Then click on “Create instance” to
    configure your virtual machine (VM). The figure below shows the [C4 VM series](https://cloud.google.com/compute/docs/general-purpose-machines#c4_series)
    powered by Intel® Xeon® 6 (code-named Granite Rapids) and the 5th Gen Intel® Xeon®
    (code-named Emerald Rapids) CPUs.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 前往[console.cloud.google.com](https://console.cloud.google.com/)，设置您的账单，然后转到“计算引擎”。然后点击“创建实例”以配置虚拟机（VM）。下面的图显示了由Intel®
    Xeon® 6（代号Granite Rapids）和第五代Intel® Xeon®（代号Emerald Rapids）CPU驱动的[C4 VM系列](https://cloud.google.com/compute/docs/general-purpose-machines#c4_series)。
- en: '![](../Images/cdf48f4b9a3b9d5b1f90e2e54dda8027.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cdf48f4b9a3b9d5b1f90e2e54dda8027.png)'
- en: Setting up a virtual machine on Google Cloud
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在Google Cloud上设置虚拟机
- en: Hyperthreading can introduce performance variability because two threads compete
    for the same core’s execution resources. For consistent benchmark results, setting
    “vCPUs to core ratio” to 1 eliminates that variable—more on this in the next section.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 超线程可能会引入性能可变性，因为两个线程会竞争同一核心的执行资源。为了获得一致的基准测试结果，将“vCPUs到核心比例”设置为1可以消除这个变量——更多内容将在下一节中介绍。
- en: '![](../Images/fb4eb1a69d476ab0b80e2f11230ff163.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fb4eb1a69d476ab0b80e2f11230ff163.png)'
- en: vCPUs to core ratio and visible core counts can be set under “Advanced configurations”
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在“高级配置”下可以设置vCPUs到核心的比例和可见核心计数。
- en: Before creating the VM, increase the boot disk size from the left-hand panel—200
    GB will be more than enough to install the packages needed for this blog.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建虚拟机之前，从左侧面板增加启动磁盘大小——200 GB将足够安装本博客所需的软件包。
- en: '![](../Images/9a6fcae3c1ca194239f5b10497a291fc.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9a6fcae3c1ca194239f5b10497a291fc.png)'
- en: Increasing the boot disk size for the virtual machine on Google Cloud
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在Google Cloud上增加虚拟机的启动磁盘大小
- en: Non-uniform Memory Access (NUMA) Awareness
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 非均匀内存访问（NUMA）意识
- en: Memory access is non-uniform on multi-core, multi-socket CPUs. This means the
    latency and bandwidth of memory operations depend on which CPU core is accessing
    which region of memory. If you don’t control for NUMA, you’re benchmarking the
    scheduler, not the CPU and the results can appear inconsistent. **Memory affinity**
    is exactly what eliminates that problem by controlling which CPU cores access
    which memory regions. The Linux scheduler is aware of the NUMA topology of the
    platform and attempts to improve performance by scheduling threads on processors
    that are in the same node as the memory being used, rather than letting the scheduler
    randomly assign work across the system. However, without explicit affinity controls,
    you can’t guarantee consistent placement for reliable benchmarking.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在多核、多插槽CPU上，内存访问是非均匀的。这意味着内存操作的延迟和带宽取决于哪个CPU核心正在访问哪个内存区域。如果你不控制NUMA，你是在基准测试调度器，而不是CPU，结果可能看起来不一致。“内存亲和性”正是通过控制哪些CPU核心访问哪些内存区域来消除这个问题的。Linux调度器了解平台的NUMA拓扑结构，并试图通过在内存所在的节点上的处理器上调度线程来提高性能，而不是让调度器随机分配工作到整个系统。然而，没有显式的亲和性控制，你无法保证可靠的基准测试的一致放置。
- en: Let’s do a hands-on NUMA experiment with XGBoost and a synthetic dataset that
    is large enough to stress memory.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过XGBoost和足够大的合成数据集进行一次NUMA实验，以测试内存的压力。
- en: First, provision a VM that spans multiple NUMA nodes, SSH into the instance,
    and install the dependencies.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，配置一个跨越多个NUMA节点的虚拟机，SSH到实例中，并安装依赖项。
- en: '[PRE0]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Then create and activate a Python virtual environment to install `scikit-learn`,
    `numpy`, and `xgboost`. Save the script below as `xgb_bench.py`.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 然后创建并激活一个Python虚拟环境来安装`scikit-learn`、`numpy`和`xgboost`。将下面的脚本保存为`xgb_bench.py`。
- en: '[PRE1]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Next, run this script in three modes (`baseline / numa0 / interleave`). Repeat
    each experiment at least 5 times and report the mean and standard deviation. (This
    calls for another simple script!)
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，以三种模式（`baseline / numa0 / interleave`）运行此脚本。至少重复每个实验5次，并报告平均值和标准差。（这需要另一个简单的脚本！）
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: When assigning tasks to specific physical cores, use the `--physcpubind` or
    `-C` option rather than `--cpunodebind`.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 当将任务分配给特定的物理核心时，使用`--physcpubind`或`-C`选项而不是`--cpunodebind`。
- en: '[PRE4]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Which experiment had the smallest mean? How about the standard deviation? For
    interpreting these numbers, keep in mind that
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 哪个实验的平均值最小？标准差如何？在解释这些数字时，请记住，
- en: Lower standard deviation for `numa0` indicates more stable locality.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`numa0`的标准差较低表明局部性更稳定。'
- en: Lower mean for `numa0` vs `baseline` suggests cross-node traffic was hurting
    you, and
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与`baseline`相比，`numa0`的均值较低表明跨节点流量正在损害你，并且
- en: If `interleave` narrows the gap vs `baseline`, your workload is bandwidth sensitive
    and benefits from spreading pages—at potential cost to latency.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果`interleave`缩小了与`baseline`的差距，那么你的工作负载对带宽敏感，并从分散页面中受益——这可能会以延迟为代价。
- en: If none of these apply to a benchmark, the workload may be compute-bound (e.g.,
    shallow trees, small dataset), or the VM might expose a single NUMA node.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这些都不适用于基准测试，那么工作负载可能是计算密集型的（例如，浅树，小数据集），或者虚拟机可能只暴露一个NUMA节点。
- en: Choosing the Right Benchmarks
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择合适的基准测试
- en: When benchmarking classical machine learning algorithms on CPUs, you should
    build your own testing framework, or leverage existing benchmark suites, or use
    a hybrid approach if appropriate.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 当在CPU上基准测试经典机器学习算法时，你应该构建自己的测试框架，或者利用现有的基准测试套件，或者如果适当，使用混合方法。
- en: Existing test suites such as [scikit-learn_bench](https://github.com/IntelPython/scikit-learn_bench)
    and [Phoronix Test Suite (PTS)](https://github.com/phoronix-test-suite/phoronix-test-suite)
    are helpful when you need standardized, reproducible results that others can validate
    and compare against. They work particularly well if you’re evaluating well-established
    algorithms like random forest, SVM, or XGBoost where standard datasets provide
    meaningful insights. Custom benchmarks excel at revealing implementation-specific
    performance characteristics. For instance, they can measure how different sparse
    matrix formats affect SVM training times, or how feature preprocessing pipelines
    impact overall throughput on your specific CPU architecture. The datasets you
    use directly influence what your benchmark reveals. Feel free to consult the official
    [scikit-learn benchmarks](https://github.com/scikit-learn/scikit-learn/tree/main/benchmarks)
    for inspiration. Here’s also a sample set that you can use to create a custom
    test.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现有的测试套件，如 [scikit-learn_bench](https://github.com/IntelPython/scikit-learn_bench)
    和 [Phoronix 测试套件 (PTS)](https://github.com/phoronix-test-suite/phoronix-test-suite)，当你需要标准化、可重复的结果，其他人可以验证并与之比较时非常有用。它们在评估像随机森林、SVM
    或 XGBoost 这样的成熟算法时尤其有效，因为标准数据集提供了有意义的见解。你使用的数据集直接影响了你的基准测试揭示的内容。请随时查阅官方的 [scikit-learn
    基准测试](https://github.com/scikit-learn/scikit-learn/tree/main/benchmarks) 以获取灵感。这里还有一个你可以用来创建自定义测试的样本集。
- en: '| **Dataset** | **Size** | **Task** | **Source** |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| **数据集** | **大小** | **任务** | **来源** |'
- en: '| Higgs | 11M rows | Binary classification | [UCI ML Repo](https://archive.ics.uci.edu/dataset/280/higgs)
    |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| Higgs | 1100万行 | 二分类 | [UCI ML 仓库](https://archive.ics.uci.edu/dataset/280/higgs)
    |'
- en: '| Airline Delay | Variable | Multi-class classification | [BTS](https://www.transtats.bts.gov/ot_delay/ot_delaycause1.asp)
    |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| 航班延误 | 变量 | 多类分类 | [BTS](https://www.transtats.bts.gov/ot_delay/ot_delaycause1.asp)
    |'
- en: '| California Housing | 20K rows | Regression | `sklearn.datasets.fetch_california_housing`
    |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| 加利福尼亚住房 | 2K 行 | 回归 | `sklearn.datasets.fetch_california_housing` |'
- en: '| Synthetic | Variable | Scaling tests | `sklearn.datasets.make_classification`
    |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| 合成 | 可变 | 缩放测试 | `sklearn.datasets.make_classification` |'
- en: Synthetic scaling datasets are especially useful to expose differences in cache,
    memory bandwidth, and I/O.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 合成缩放数据集特别有用，可以揭示缓存、内存带宽和 I/O 的差异。
- en: In the rest of this blog, we illustrate how you can run experiments using the
    open source scikit-learn_bench which currently supports scikit-learn, cuML, and
    XGBoost frameworks.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在本博客的其余部分，我们将说明如何使用开源的 scikit-learn_bench 运行实验，该工具目前支持 scikit-learn、cuML 和 XGBoost
    框架。
- en: Installations and Benchmarking
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装和基准测试
- en: Once the GCP VM is initialized, you can SSH into the instance and execute the
    commands below in your terminal.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦初始化 GCP 虚拟机，你就可以通过 SSH 进入实例，并在你的终端中执行以下命令。
- en: '[PRE5]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: To install Conda on a GCP VM, you’ll need to account for the CPU architecture.
    If you’re unsure about the architecture of your VM, you can run
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 要在 GCP 虚拟机上安装 Conda，你需要考虑 CPU 架构。如果你不确定你的虚拟机架构，你可以运行
- en: '[PRE6]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: before proceeding to
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续之前
- en: '[PRE7]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Next, you need to execute the script and accept the terms of service (ToS).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你需要执行脚本并接受服务条款（ToS）。
- en: '[PRE8]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Finally, clone the latest scikit-learn_bench from GitHub, create a virtual environment
    and install the required Python libraries.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，从 GitHub 克隆最新的 scikit-learn_bench，创建一个虚拟环境并安装所需的 Python 库。
- en: '[PRE9]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'At this point, you should be able to run a benchmark using the [sklbench module](https://github.com/IntelPython/scikit-learn_bench/tree/main/sklbench)
    and a specific configuration:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，你应该能够使用 [sklbench 模块](https://github.com/IntelPython/scikit-learn_bench/tree/main/sklbench)
    和特定的配置运行基准测试：
- en: '[PRE10]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: By default, `sklbench` benchmarks both the standard scikit-learn implementations
    and their optimized counterparts provided by **sklearnex** (Intel’s accelerated
    extension)—or other supported frameworks like cuML or XGBoost—and logs results
    along with hardware and software metadata into `result.json`. You can customize
    the output file with `--result-file`, and include `--report` to produce an Excel
    report (`report.xlsx`). For a list of all supported options, see the [documentation](https://github.com/IntelPython/scikit-learn_bench/blob/main/sklbench/report/README.md#arguments).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，`sklbench`对标准scikit-learn实现及其由**sklearnex**（Intel的加速扩展）提供的优化版本——或其他受支持的框架如cuML或XGBoost——进行基准测试，并将结果以及硬件和软件元数据记录到`result.json`中。您可以使用`--result-file`自定义输出文件，并包含`--report`以生成Excel报告（`report.xlsx`）。有关所有受支持选项的列表，请参阅[文档](https://github.com/IntelPython/scikit-learn_bench/blob/main/sklbench/report/README.md#arguments)。
- en: 'As discussed earlier, you can use `numactl` to pin a process and its child
    processes to specific CPU cores. Here’s how to run `sklbench` with `numactl`,
    binding it to selected cores:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，您可以使用`numactl`将进程及其子进程固定到特定的CPU核心。以下是使用`numactl`运行`sklbench`并将它绑定到选定核心的方法：
- en: '[PRE11]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Interpreting Results and Best Practices
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果解读和最佳实践
- en: The [report generator](https://github.com/IntelPython/scikit-learn_bench/tree/main/sklbench/report)
    allows you to combine the result files of multiple runs.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '[报告生成器](https://github.com/IntelPython/scikit-learn_bench/tree/main/sklbench/report)允许您组合多次运行的结果文件。'
- en: '[PRE12]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The real metric for cloud decision-making is the cost per task, namely,
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 云决策的真实指标是每项任务的成本，即，
- en: '*Cost per task = runtime in hours x hourly price*.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '*每项任务的成本 = 运行时间（小时）x 每小时价格*。'
- en: Real-world deployments rarely behave like single benchmark runs. To accurately
    model the cost per task, it’s useful to account for CPU boost behavior, cloud
    infrastructure variability, and memory topology, as they can all influence performance
    in ways that aren’t captured by a one-off measurement. To better reflect actual
    runtime characteristics, I recommend starting with warm-up iterations to stabilize
    CPU frequency scaling. Then run each experiment multiple times to account for
    system noise and transient effects. Reporting the mean and standard deviation
    helps surface consistent trends, while using medians can be more robust when variance
    is high, especially in cloud environments where noisy neighbors or resource contention
    can skew averages. For reproducibility, it’s important to fix package versions
    and use consistent VM image snapshots. Including NUMA configuration in your results
    helps others understand memory locality effects, which can significantly impact
    performance. Tools like scikit-learn_bench automate many of these steps, making
    it easier to produce benchmarks that are both representative and repeatable.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现实世界的部署很少像单次基准测试那样运行。为了准确计算每项任务的成本，考虑CPU加速行为、云基础设施的变异性以及内存拓扑结构是有用的，因为它们都可以以单次测量无法捕捉的方式影响性能。为了更好地反映实际的运行时间特性，我建议从预热迭代开始以稳定CPU频率调整。然后多次运行每个实验以考虑系统噪声和瞬态效应。报告平均值和标准差有助于揭示一致的趋势，而当方差较高时，使用中位数可能更稳健，尤其是在云环境中，邻近的噪声邻居或资源竞争可能会扭曲平均值。为了确保可重复性，重要的是要固定软件包版本并使用一致的虚拟机镜像快照。在结果中包含NUMA配置有助于他人理解内存局部性效应，这可能会显著影响性能。像scikit-learn_bench这样的工具自动化了许多这些步骤，使得生成既具有代表性又可重复的基准测试变得更加容易。
