- en: This Puzzle Shows Just How Far LLMs Have Progressed in a Little Over a Year
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 这个谜题展示了LLM在短短一年多的时间里取得了多么大的进步
- en: 原文：[https://towardsdatascience.com/this-puzzle-shows-just-how-far-llms-have-progressed-in-little-over-a-year/](https://towardsdatascience.com/this-puzzle-shows-just-how-far-llms-have-progressed-in-little-over-a-year/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/this-puzzle-shows-just-how-far-llms-have-progressed-in-little-over-a-year/](https://towardsdatascience.com/this-puzzle-shows-just-how-far-llms-have-progressed-in-little-over-a-year/)
- en: <mdspan datatext="el1759821031680" class="mdspan-comment">We all know</mdspan>
    that the capabilities of LLMs have progressed dramatically in the last few years,
    but it’s hard to quantify just how good they’ve become.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759821031680" class="mdspan-comment">我们都知道</mdspan>，LLM的能力在过去几年里有了显著的进步，但很难量化它们变得有多好。
- en: That got me thinking back to a geometric problem I came across on a YouTube
    channel last year. This was in June 2024, and I tried to get the leading large
    language model at the time (GPT-4o) to solve the puzzle. It didn’t go that well
    and required ***a lot*** of effort to find a solution, and I wondered how the
    latest LLMs would fare with the same puzzle.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我回想起去年在一个YouTube频道上遇到的一个几何问题。这是在2024年6月，我试图让当时领先的大型语言模型（GPT-4o）来解决这个问题。结果并不理想，需要***大量***的精力来找到解决方案，我很好奇最新的LLM们面对同样的谜题会有怎样的表现。
- en: The puzzle
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 谜题
- en: Here’s a quick reminder of what I was asking the LLM to solve back then. Assume
    we have the following grid of dots/nodes. In the x and y plane, each node is exactly
    one unit away from its adjacent neighbour. It looks like this,
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个快速提醒，当时我要求LLM解决的问题。假设我们有以下网格的点/节点。在x和y平面上，每个节点与其相邻节点正好相距一个单位。它看起来像这样，
- en: '![](../Images/ec9f334eaf151c61b628fbf93dc1bfa9.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ec9f334eaf151c61b628fbf93dc1bfa9.png)'
- en: Now, the question I wanted to answer was this,
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我想回答的问题是这个，
- en: '[PRE0]'
  id: totrans-8
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: It quickly became clear that GPT-4o did not know the answer, so I changed tack
    slightly and instead asked it this.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 很快就清楚，GPT-4o不知道答案，所以我稍微改变了策略，转而问它这个问题。
- en: '[PRE1]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Long story short, I ***eventually*** got GPT-4o to come up with a correct Python-based
    solution. Still, it took me around two hours and well over 40 iterations of me
    going back and forth with the model to refine its answer until it came up with
    something that worked.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，我***最终***让GPT-4o提出了一个基于Python的正确解决方案。尽管如此，我花了大约两个小时，并且进行了超过40次的来回与模型互动来完善答案，直到它提出了一个可行的方案。
- en: NB, have you worked out the answer yet? Even now, I still can’t quite believe
    that it’s 21 squares you can draw on this graph.
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: NB，你算出答案了吗？即使现在，我仍然难以相信这个图上可以画出21个方格。
- en: Interaction with Sonnet 4.5
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与Sonnet 4.5的互动
- en: This brings us back to the present day and Anthropic’s recent release of what
    is considered the best coding model available today, namely Claude Sonnet 4.5\.
    It’s been around 16 months since I last looked at this, so just how much have
    LLMs improved in the intervening period? Let’s see how Sonnet 4.5 copes with the
    puzzle.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这把我们带回了现在，以及Anthropic最近发布的被认为是今天最好的编码模型，即Claude Sonnet 4.5。自从我上次查看这个模型以来已经过去了16个月，那么在这段时间里LLM们又提高了多少呢？让我们看看Sonnet
    4.5如何应对这个谜题。
- en: To use Sonnet 4.5, I visited Anthropic’s homepage.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用Sonnet 4.5，我访问了Anthropic的主页。
- en: '[https://www.anthropic.com](https://www.anthropic.com)'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.anthropic.com](https://www.anthropic.com)'
- en: You should see a page like this.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到一个类似的页面。
- en: '![](../Images/f788a45581c409cfe884646e31f91007.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f788a45581c409cfe884646e31f91007.png)'
- en: Image from the Anthropic website
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic网站上的图片
- en: Click the large black **“Try Claude”** button located near the top right of
    the screen. You will be asked to log in at this point. If you don’t already have
    an account with Anthropic, please set one up now. It’s completely free to do so.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 点击屏幕右上角附近的大号黑色**“尝试Claude”**按钮。此时，你将被要求登录。如果你还没有在Anthropic的账户，请现在创建一个。这样做是完全免费的。
- en: Once you are logged in, you will be taken to a screen displaying a familiar
    chat-based window that allows you to interact with and ask questions of Sonnet
    4.5.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 登录后，你将被带到显示熟悉的基于聊天的窗口的屏幕，允许你与Sonnet 4.5互动并提问。
- en: Before I asked the model to provide a Python program to solve the puzzle, I
    asked it a straight question to see if it already knew the answer.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在我要求模型提供一个Python程序来解决这个谜题之前，我直接问了一个问题，看看它是否已经知道答案。
- en: '![](../Images/b94c8f5212d99845bfb6dbfa319f0c27.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b94c8f5212d99845bfb6dbfa319f0c27.png)'
- en: It came back with,
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 它返回了，
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: So, confidently incorrect. Curious and intrigued about the model’s reference
    to a 3×3 square (which is impossible on this grid), I asked it to show me the
    square on the diagram. It replied with this.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，自信地错误。对模型关于3x3正方形（在这个网格上不可能）的引用感到好奇和好奇，我要求它向我展示图上的正方形。它回复了以下内容。
- en: '[PRE3]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Alright, it semi-redeemed itself with that answer, but fundamentally, it didn’t
    correctly say there were 21 squares in total.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，它通过那个答案部分地救赎了自己，但本质上，它并没有正确地说出总共有21个正方形。
- en: The final answer
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最终答案
- en: To keep things fair with the model comparison over the 16 months, I asked Sonnet
    4.5 the exact same question I had asked GPT-4o, which, as a reminder, was this.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在16个月的模型比较中保持公平，我向Sonnet 4.5提出了与我之前问GPT-4o完全相同的问题，提醒一下，这个问题是这样的。
- en: '[PRE4]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Sonnet 4.5 thought for all of 5 seconds before generating its Python code.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: Sonnet 4.5思考了5秒钟就生成了它的Python代码。
- en: '[PRE5]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: At first sight, I thought there was no way Sonnet could have come up with a
    correct solution so quickly. GPT-4ohad ***taken hours***. However, I installed
    all the required libraries the code needed and copied and pasted it into a Jupyter
    Notebook cell, running it and obtaining the following output. I have omitted the
    graphs for now, which were also output.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 初看之下，我以为Sonnet不可能这么快就找到正确的解决方案。GPT-4ohad ***花费了几个小时***。然而，我安装了代码所需的全部库，并将其复制粘贴到一个Jupyter
    Notebook单元格中，运行它并获得了以下输出。目前我省略了图表，这些图表也被输出了。
- en: '[PRE6]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: That shocked me. The answer was absolutely spot on.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我震惊。答案完全准确。
- en: The only slight thing the model didn’t quite get right was that it didn’t output
    a plot of each set of differently sized squares. It just did the nine 1x1s and
    the four √2x√2 ones. I solved that by asking Sonnet to include those, too.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一不太对劲的地方是，模型没有输出不同尺寸的正方形集的图表。它只是做了九个1x1的和四个√2x√2的正方形。我通过让Sonnet也包括那些正方形来解决这个问题。
- en: '[PRE7]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This is what it produced.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这是它给出的答案。
- en: '![](../Images/5c986bc174a871fec7e48f0eee07bfbc.png)![](../Images/b115f6590687d3ee3c3603795d44ae13.png)![](../Images/f7c7d362212338cd61fb9031fbfcd300.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片1](../Images/5c986bc174a871fec7e48f0eee07bfbc.png)![图片2](../Images/b115f6590687d3ee3c3603795d44ae13.png)![图片3](../Images/f7c7d362212338cd61fb9031fbfcd300.png)'
- en: Beautiful.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 美丽。
- en: Summary
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: To demonstrate just how dramatically LLMs have advanced in about a year, I decided
    to revisit a challenging geometric puzzle I first tried to solve with GPT-4o back
    in June 2024\. The puzzle was to write a Python program that finds and plots all
    possible squares on a specific cross-shaped grid of dots.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示LLMs在一年左右的时间里取得了多么显著的进步，我决定重新审视一个挑战性的几何难题，我最初是在2024年6月尝试用GPT-4o解决这个难题的。这个难题是编写一个Python程序，找到并绘制特定十字形点阵上的所有可能正方形。
- en: My experience a little over a year ago was a struggle; it took me roughly two
    hours and over 40 prompts to guide GPT-4o to a correct Python solution.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 大约一年前我的经历是挣扎的；我花了大约两个小时和40多个提示来引导GPT-4o找到一个正确的Python解决方案。
- en: Fast forward to today, and I tested the new Claude Sonnet 4.5\. When I first
    asked the model the question directly, it failed to calculate the correct number
    of squares. Not a great start, however, the real test was giving it the **exact
    same prompt** I used on GPT-4o.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 快进到今天，我测试了新的Claude Sonnet 4.5。当我第一次直接向模型提问时，它未能计算出正确的正方形数量。然而，真正的考验是给它我之前在GPT-4o上使用的**完全相同的提示**。
- en: To my surprise, it produced a complete, correct Python solution in **one shot**.
    The code it generated not only found all 21 squares but also correctly categorised
    them by their unique side lengths and generated detailed plots to visualise them.
    While I needed one quick follow-up prompt to perfect the plots, the core problem
    was solved instantly.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 令我惊讶的是，它一次就给出了一个完整的、正确的Python解决方案。它生成的代码不仅找到了所有21个正方形，而且根据它们独特的边长正确地将它们分类，并生成了详细的图表来可视化它们。虽然我需要一次快速的后续提示来完善图表，但核心问题瞬间得到了解决。
- en: Could it be that the very act of my trying to solve this puzzle last year and
    publishing my findings introduced it to the web-o-sphere, meaning Anthropic have
    simply crawled it and incorporated it into their model knowledge base? Yes, I
    suppose that could be it, but then why couldn’t the model answer the first direct
    question I asked it about the total number of squares correctly?
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 难道是我去年试图解决这个问题并发布我的发现，将其引入了网络世界，意味着Anthropic只是爬取了它并将其纳入他们的模型知识库？是的，我想这可能是原因，但为什么模型不能正确回答我第一次问它的关于正方形总数的问题呢？
- en: To me, this experiment starkly illustrates the incredible leap in LLM capability.
    What was once a two-hour iterative struggle with the leading model of its time
    16 months ago is now a five-second, one-shot success with the leading model today.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，这个实验鲜明地展示了LLM能力上的惊人飞跃。16个月前，与当时领先模型进行两小时的迭代斗争，如今却变成了今天与领先模型的一次性五秒成功。
