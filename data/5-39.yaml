- en: Developing an AI-Powered Smart Guide for Business Planning & Entrepreneurship
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开发AI驱动的商业规划与创业智能指南
- en: 原文：[https://towardsdatascience.com/developing-an-ai-powered-smart-guide-for-business-planning-entrepreneurship-ea1bc328ff01/](https://towardsdatascience.com/developing-an-ai-powered-smart-guide-for-business-planning-entrepreneurship-ea1bc328ff01/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/developing-an-ai-powered-smart-guide-for-business-planning-entrepreneurship-ea1bc328ff01/](https://towardsdatascience.com/developing-an-ai-powered-smart-guide-for-business-planning-entrepreneurship-ea1bc328ff01/)'
- en: '***If you are not a Medium member, you can read the full story at [this link](https://towardsdatascience.com/developing-an-ai-powered-smart-guide-for-business-planning-entrepreneurship-ea1bc328ff01?sk=bd83c4049d77992bc5ef32bfc3cdb14a).***'
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '***如果您不是Medium会员，您可以通过[此链接](https://towardsdatascience.com/developing-an-ai-powered-smart-guide-for-business-planning-entrepreneurship-ea1bc328ff01?sk=bd83c4049d77992bc5ef32bfc3cdb14a)阅读完整故事。***'
- en: After the launch of ChatGPT and the following surge of Large Language Models
    (LLMs), their inherent limitations of hallucination, knowledge cutoff date, and
    the inability to provide organization- or person-specific information soon became
    evident and were seen as major drawbacks. To address these issues, Retrieval Augment
    Generation (RAG) methods soon gained traction which integrate external data to
    LLMs and guide their behavior to answer questions from a given knowledge base.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT发布以及随后大型语言模型（LLMs）的激增之后，它们固有的幻觉、知识截止日期以及无法提供组织或个人特定信息的局限性很快变得明显，并被视为主要缺点。为了解决这些问题，检索增强生成（RAG）方法很快得到了认可，这些方法将外部数据整合到LLMs中，并引导其行为以回答来自给定知识库的问题。
- en: Interestingly, the [first paper on RAG](https://proceedings.neurips.cc/paper/2020/file/6b493230205f780e1bc26945df7481e5-Paper.pdf)
    was published in 2020 by researchers from Facebook AI Research (now Meta AI),
    but it was not until the advent of ChatGPT that its potential was fully realized.
    Since then, there has been no stopping. More advanced and complex RAG frameworks
    were introduced which not only improved the accuracy of this technology but also
    enabled it to deal with multimodal data, expanding its potential for a wide range
    of applications. I wrote on this topic in detail in the following articles, specifically
    discussing contextual multimodal RAG, multimodal AI search for business applications,
    and information extraction and matchmaking platforms.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '有趣的是，关于RAG的第一篇论文于2020年由Facebook AI Research（现Meta AI）的研究人员发表，但直到ChatGPT的出现，其潜力才得到充分实现。从那时起，就没有停止过。引入了更多先进和复杂的RAG框架，这不仅提高了该技术的准确性，还使其能够处理多模态数据，扩大了其在广泛应用中的潜力。我在以下文章中详细讨论了这一主题，特别是讨论了上下文多模态RAG、多模态AI在商业应用中的搜索以及信息提取和匹配平台。 '
- en: '[**Integrating Multimodal Data into a Large Language Model**](https://towardsdatascience.com/integrating-multimodal-data-into-a-large-language-model-d1965b8ab00c)'
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**将多模态数据整合到大型语言模型中**](https://towardsdatascience.com/integrating-multimodal-data-into-a-large-language-model-d1965b8ab00c)'
- en: ''
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Multimodal AI Search for Business Applications**](https://towardsdatascience.com/multimodal-ai-search-for-business-applications-65356d011009)'
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**多模态AI在商业应用中的搜索**](https://towardsdatascience.com/multimodal-ai-search-for-business-applications-65356d011009)'
- en: ''
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**AI-Powered Information Extraction and Matchmaking**](https://towardsdatascience.com/ai-powered-information-extraction-and-matchmaking-0408c93ec1b9)'
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**AI驱动的信息提取和匹配**](https://towardsdatascience.com/ai-powered-information-extraction-and-matchmaking-0408c93ec1b9)'
- en: 'With the expanding landscape of RAG technology and the emerging data access
    requirements, it was realized that the functionality of a retriever-only RAG,
    which answers questions from a static knowledge base, can be extended by integrating
    other diverse knowledge sources and tools such as:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 随着RAG技术领域的扩展和新兴的数据访问需求，人们意识到仅提供检索功能的RAG，即从静态知识库中回答问题的功能，可以通过整合其他多样化的知识来源和工具得到扩展，例如：
- en: Multiple databases (e.g., knowledge bases comprising vector databases and knowledge
    graphs)
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多个数据库（例如，包含向量数据库和知识图谱的知识库）
- en: Real-time web search to access recent information
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实时网络搜索以获取最新信息
- en: External APIs to collect specific data such as stock market trends or data from
    company-specific tools like Slack channels or email accounts
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 外部API收集特定数据，如股市趋势或来自公司特定工具（如Slack频道或电子邮件账户）的数据
- en: Tools for tasks like data analysis, report writing, literature review, and people
    search, etc.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于数据分析、报告撰写、文献综述和人物搜索等任务的工具。
- en: Comparing and consolidating information from multiple sources.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较和整合来自多个来源的信息。
- en: '![Depiction of a retrieval agent selecting a tool based on the user''s query
    (image by author)](../Images/2df3e3e71ab0f7d030237ecd8f32e4b3.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![描述检索代理根据用户查询选择工具的情况（作者图片）](../Images/2df3e3e71ab0f7d030237ecd8f32e4b3.png)'
- en: Depiction of a retrieval agent selecting a tool based on the user’s query (image
    by author)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 描述检索代理根据用户查询选择工具的情况（作者图片）
- en: To achieve this, a RAG should be able to select the best knowledge source and/or
    tool based on the query. The emergence of AI agents introduced the idea of "*agentic
    RAG*" which could select the best course of action based on the query.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 要实现这一点，一个RAG应该能够根据查询选择最佳的知识来源和/或工具。AI代理的出现引入了“*代理RAG*”的概念，它可以根据查询选择最佳的行动方案。
- en: In this article, we will develop a specific agentic RAG application, called
    ***Smart Business Guide (SBG) –*** the first version of the tool that is part
    of our ongoing project called [UPBEAT](https://www.haaga-helia.fi/fi/hankkeet/upbeat),
    funded by [Interreg Central Baltic](https://interreg.eu/programme/interreg-finland-estonia-latvia-sweden/).
    The project is focused on upskilling immigrants in Finland and Estonia for entrepreneurship
    and business planning using AI. SBG is one of the tools intended to be used in
    this project’s upskilling process. This tool focuses on providing precise and
    quick information from authentic sources to people intending to start a business,
    or those already doing business.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将开发一个特定的代理RAG应用，称为***智能商业指南（SBG）***——这是我们正在进行的项目[UPBEAT](https://www.haaga-helia.fi/fi/hankkeet/upbeat)的第一个版本，该项目由[Interreg
    Central Baltic](https://interreg.eu/programme/interreg-finland-estonia-latvia-sweden/)资助。该项目专注于利用AI提高芬兰和爱沙尼亚移民的创业和商业规划技能。SBG是该项目提升技能过程中打算使用的工具之一。该工具专注于为打算创业或已经创业的人提供来自真实来源的精确和快速信息。
- en: 'The SBG’s agentic RAG comprises:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: SBG的代理RAG包括：
- en: Business and entrepreneurship guides as a knowledge base containing information
    about business planning, entrepreneurship, company registration, taxation, business
    ideas, rules and regulations, business opportunities, licenses and permits, business
    guidelines, and others.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 商业和创业指南作为包含有关商业规划、创业、公司注册、税收、商业想法、规则和法规、商业机会、许可证和执照、商业指南等信息的知识库。
- en: Web search to fetch recent information with sources.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过网络搜索获取带有来源的最近信息。
- en: Knowledge extraction tools to fetch information from trusted sources. This information
    includes contacts of relevant authorities, recent taxation rules, recent business
    registration rules, and recent licensing regulations.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识提取工具从受信任的来源获取信息。这些信息包括相关当局的联系方式、最近的税收规则、最近的商业注册规则和最近的许可法规。
- en: '***What is special about this agentic RAG?***'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '***这个代理RAG有什么特别之处？***'
- en: Option to select **different open-source models** (*Llama, Mistral, Gemma*)
    **** as well as** proprietary model**s _(gpt-4o, gpt-4o-min_i) in the entire agentic
    workflow. The open-source models do not run locally and hence do not require a
    powerful, expensive computing machine. Instead, they run on** [Groq Cloud’s](https://console.groq.com/login)
    platfor**m with a** free AP**I. And yes, this makes it a** cost-fre**e agentic
    RAG. The GPT models can also be selected with an OpenAI’s API key.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择**不同开源模型**（Llama、Mistral、Gemma）以及**专有模型**（gpt-4o、gpt-4o-min_i）在整个代理工作流程中的选项。开源模型不本地运行，因此不需要强大的、昂贵的计算设备。相反，它们在**[Groq
    Cloud的](https://console.groq.com/login)平台**上运行，并使用**免费API**。是的，这使得它成为一个**免费代理RAG**。也可以使用OpenAI的API密钥选择GPT模型。
- en: Options to enforce knowledge base search, web search, and hybrid search.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强制执行知识库搜索、网络搜索和混合搜索的选项。
- en: Grading of retrieved documents for improving response quality, and intelligently
    invoking web search based on grading.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对检索到的文档进行评分以提高响应质量，并根据评分智能调用网络搜索。
- en: 'Options to select response type: **concise**, **moderate,** or **explanatory**.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择响应类型的选项：**简洁**、**适中**或**解释性**。
- en: '**Specifically, the article is structured around the following topics:**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**具体来说，本文的结构围绕以下主题：**'
- en: Parsing data to construct the knowledge base using LlamaParse
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用LlamaParse解析数据以构建知识库
- en: Developing an agentic workflow using LangGraph.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用LangGraph开发代理工作流程。
- en: Developing an advanced agentic RAG (hereinafter called Smart Business Guide
    or SBG) using free, open-source models
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用免费、开源模型开发高级代理RAG（以下简称智能商业指南或SBG）。
- en: '***The whole code of this application can be found on [GitHub](https://github.com/umairalipathan1980/Smart-Agentic-Guide).***'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '***该应用程序的完整代码可在[GitHub](https://github.com/umairalipathan1980/Smart-Agentic-Guide)上找到。***'
- en: 'The application code is structured in two .*py* files: _agentic*rag.py* which
    implements the entire agentic workflow, and *app.py* which implements the *Streamlit*
    graphical user interface.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序代码以两个.*py*文件结构化：_agentic*rag.py*，该文件实现了整个代理工作流程，以及*app.py*，该文件实现了*Streamlit*图形用户界面。
- en: Let’s dive into it.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨。
- en: Constructing Knowledge Base with LlamaParsing and LangChain
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用LlamaParsing和LangChain构建知识库
- en: The knowledge base of the SBG comprises authentic business and entrepreneurship
    guides published by Finnish agencies. Since these guides are voluminous and finding
    a required piece of information from them is not trivial, the purpose is to develop
    an agentic RAG that could not only provide precise information from these guides
    but can also augment them with a web search and other trusted sources in Finland
    for updated information.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: SBG的知识库由芬兰机构发布的真实商业和创业指南组成。由于这些指南内容庞大，从中查找所需信息并不简单，因此目的是开发一个代理RAG，它不仅可以从这些指南中提供精确信息，还可以通过芬兰的网页搜索和其他可信来源更新信息。
- en: '[LlamaParse](https://docs.llamaindex.ai/en/stable/llama_cloud/llama_parse/)
    is a genAI-native document parsing platform built with LLMs and for LLM use cases.
    I have explained the use of LlamaParse in the articles I cited above. This time,
    I parsed the documents directly at [LlamaCloud](https://cloud.llamaindex.ai/).
    LlamaParse offers 1000 free credits per day. The use of these credits depends
    on the parsing mode. For text-only PDF, ‘*Fast*‘ mode (1 credit / 3 pages) works
    well which skips OCR, image extraction, and table/heading identification. There
    are other more advanced modes available with a higher number of credit points
    per page. I selected the ‘*premium*‘ mode which performs OCR, image extraction,
    and table/heading identification and is ideal for complex documents with images.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '[LlamaParse](https://docs.llamaindex.ai/en/stable/llama_cloud/llama_parse/)是一个专为LLM和LLM用例构建的genAI原生文档解析平台。我在上面引用的文章中解释了LlamaParse的使用。这次，我直接在[LlamaCloud](https://cloud.llamaindex.ai/)上解析了文档。LlamaParse每天提供1000个免费积分。这些积分的使用取决于解析模式。对于纯文本PDF，‘*快速*’模式（1积分/3页）效果良好，该模式跳过了OCR、图像提取和表格/标题识别。还有其他更高级的模式，每页的积分点数更高。我选择了‘*高级*’模式，该模式执行OCR、图像提取和表格/标题识别，非常适合包含图像的复杂文档。'
- en: I defined the following parsing instructions.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我定义了以下解析指令。
- en: '[PRE0]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The parsed documents were downloaded in markdown format from LlamaCloud. The
    same parsing can be done through LlamaCloud API as follows.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 从LlamaCloud下载了解析后的文档，格式为Markdown。同样的解析也可以通过LlamaCloud API完成，如下所示。
- en: '[PRE1]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Here is an example page from the guide [Creativity and Business](https://www.humak.fi/wp-content/uploads/2015/04/2015-04-Luovuus-ja-liiketoiminta-_tyokirja_englanti_netti.pdf)
    by Pikkala, A. et al., (2015) ("*free to copy for non-commercial private or public
    use with attribution*").
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是来自Pikkala, A.等人所著的指南[创造力和商业](https://www.humak.fi/wp-content/uploads/2015/04/2015-04-Luovuus-ja-liiketoiminta-_tyokirja_englanti_netti.pdf)的一个示例页面（2015）的示例页面（“*免费复制用于非商业私人或公共用途，需注明出处*”）。
- en: '![An example page from a business guide (Source: https://www.humak.fi/wp-content/uploads/2015/04/2015-04-Luovuus-ja-liiketoiminta-_tyokirja_englanti_netti.pdf)](../Images/b63b6d6f83bd57af8b527d1bb932129a.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![来自商业指南的示例页面（来源：https://www.humak.fi/wp-content/uploads/2015/04/2015-04-Luovuus-ja-liiketoiminta-_tyokirja_englanti_netti.pdf)](../Images/b63b6d6f83bd57af8b527d1bb932129a.png)'
- en: 'An example page from a business guide (Source: [https://www.humak.fi/wp-content/uploads/2015/04/2015-04-Luovuus-ja-liiketoiminta-_tyokirja_englanti_netti.pdf](https://www.humak.fi/wp-content/uploads/2015/04/2015-04-Luovuus-ja-liiketoiminta-_tyokirja_englanti_netti.pdf))'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个来自商业指南的示例页面（来源：[https://www.humak.fi/wp-content/uploads/2015/04/2015-04-Luovuus-ja-liiketoiminta-_tyokirja_englanti_netti.pdf](https://www.humak.fi/wp-content/uploads/2015/04/2015-04-Luovuus-ja-liiketoiminta-_tyokirja_englanti_netti.pdf)）
- en: Here is the parsed output of this page. LlamaParse efficiently extracted information
    from all structures in the page. The notebook shown in the page is in image format.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是这个页面的解析输出。LlamaParse有效地从页面中的所有结构中提取了信息。页面中显示的笔记本是图像格式。
- en: '[PRE2]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The parsed markdown documents are then split into chunks using LangChain’s *RecursiveCharacterTextSplitter*
    with CHUNK_SIZE = 3000 and CHUNK_OVERLAP = 200.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 使用LangChain的*RecursiveCharacterTextSplitter*将解析后的Markdown文档分割成块，块大小为CHUNK_SIZE
    = 3000，块重叠为CHUNK_OVERLAP = 200。
- en: '[PRE3]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Subsequently, a vectorstore is created in Chroma database using an embedding
    model such as open-source *all-MiniLM-L6-v2* model or OpenAI’s *text-embedding-3-large*.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 随后，在Chroma数据库中使用嵌入模型（如开源的*all-MiniLM-L6-v2*模型或OpenAI的*text-embedding-3-large*）创建一个向量存储。
- en: '[PRE4]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Creating Agentic Workflow
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建代理工作流程
- en: An AI agent is the combination of the workflow and the decision-making logic
    to intelligently answer questions or perform other complex tasks that need to
    be broken down into simpler sub-tasks.
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人工智能代理是工作流程和决策逻辑的组合，可以智能地回答问题或执行需要分解为更简单子任务的其他复杂任务。
- en: I used LangGraph to design a workflow for our AI agent for the sequence of actions
    or decisions in the form of a graph. Our agent has to decide whether to answer
    the question from the vector database (knowledge base), web search, hybrid search,
    or by using a tool.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用LangGraph为我们的AI代理设计了一个工作流程，该工作流程以图形的形式表示动作或决策的序列。我们的代理必须决定是否从向量数据库（知识库）、网络搜索、混合搜索或使用工具来回答问题。
- en: In my following article, I explained the process of creating an agentic workflow
    using LangGraph.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在我接下来的文章中，我解释了使用LangGraph创建代理工作流程的过程。
- en: '[**How to Develop a Free AI Agent with Automatic Internet Search**](https://ai.gopubby.com/how-to-develop-a-free-ai-agent-with-automatic-internet-search-5ea24928d26b)'
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**如何使用自动网络搜索开发免费AI代理**](https://ai.gopubby.com/how-to-develop-a-free-ai-agent-with-automatic-internet-search-5ea24928d26b)'
- en: We need to create graph **nodes** that represent a workflow to make decisions
    (e.g., web search or vector database search). The nodes are connected by **edges**
    which define the flow of decisions and actions (e.g., what is the next state after
    retrieval). The graph **state** keeps track of the information as it moves through
    the graph so that the agent uses the correct data for each step.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要创建代表决策工作流程的**节点**（例如，网络搜索或向量数据库搜索）。节点通过**边**连接，这些边定义了决策和动作的流程（例如，检索后的下一个状态是什么）。图**状态**跟踪信息在图中的移动，以便代理为每个步骤使用正确的数据。
- en: The entry point in the workflow is a router function which determines the initial
    node to execute in the workflow by analyzing the user’s query. The entire workflow
    contains the following nodes.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程的入口是一个路由函数，它通过分析用户的查询来确定工作流程中要执行的初始节点。整个工作流程包含以下节点。
- en: '***retrieve***: Fetches semantically similar chunks of information from the
    vectorstore.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***检索***：从向量存储中检索语义上相似的信息块。'
- en: '_**grade_documents**_: Grades the relevance of retrieved chunks based on the
    user’s query.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: _**评估文档**_：根据用户的查询评估检索到的片段的相关性。
- en: '_**route_after_grading**_: Based on the grading, determines whether to genreate
    a response with the retrieved documents or proceed to web search.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: _**评估后路由**_：根据评估结果，确定是否使用检索到的文档生成响应或继续进行网络搜索。
- en: '***websearch***: Fetches information from web sources using [Tavily](https://tavily.com/)
    search engine’s API.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***网络搜索***：使用[Tavily](https://tavily.com/)搜索引擎的API从网络来源获取信息。'
- en: '***generate***: Generates a response to the user’s query using the provided
    context (information retrieved from vector store and/or web search).'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***生成***：使用提供的上下文（从向量存储和/或网络搜索中检索到的信息）对用户的查询生成响应。'
- en: '_**get_contact_tool**_: Fetches contact information from predefined trusted
    URLs related to Finnish Immigration services.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: _**获取联系工具**_：从与芬兰移民服务相关的预定义受信任URL中获取联系信息。
- en: '_**get_tax_info**_: Fetches tax-related information from predefined trusted
    URLs.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: _**获取税务信息**_：从预定义的受信任URL中获取与税务相关的信息。
- en: '_**get_registration_info**_: Fetches details on company registration processes
    in Finland from predefined trusted URLs.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: _**获取注册信息**_：从预定义的受信任URL中获取芬兰公司注册过程的详细信息。
- en: '_**get_licensing_info**_: Fetches information about licenses and permits required
    for starting a business in Finland.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: _**获取许可信息**_：获取在芬兰开设企业所需的许可证和许可信息。
- en: '_**hybrid_search**_: Combines document retrieval and internet search results
    to provide a broader context for answering the query.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: _**混合搜索**_：结合文档检索和网络搜索结果，为回答查询提供更广泛的上下文。
- en: '***unrelated***: Handles questions unrelated to the workflow’s focus'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***无关***：处理与工作流程焦点无关的问题'
- en: Here are the edges in the workflow.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是工作流程中的边缘。
- en: '_**retrieve → grade_documents**_: Retrieved documents are sent for grading.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: _**检索 → 评估文档**_：检索到的文档将被发送进行评估。
- en: '_**grade_documents → websearch**_: web search is invoked if the retrieved documents
    are deemed irrelevant.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: _**评估文档 → 网络搜索**_：如果检索到的文档被认为是不相关的，则调用网络搜索。
- en: '_**grade_documents → generate**_: Proceeds to response generation if the retrieved
    documents are relevant.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**_grade_documents → generate***：如果检索到的文档相关，则继续进行响应生成。'
- en: '***websearch → generate***: Passes the results of the web search for response
    generation.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**websearch → generate***：将网络搜索的结果传递给响应生成。'
- en: '**_get_contact_tool, get_tax*info*, _get_registration*info*, _get_licensing*info
    → generate***: The edges from these four tools to *generate* node pass the fetched
    information from specific trusted sources for response generation.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**_get_contact_tool, get_tax*info*, _get_registration*info*, _get_licensing*info
    → generate***：从这些四个工具到**generate**节点的边传递从特定可信来源获取的信息，用于响应生成。'
- en: '**_hybrid*search* → *generate***: Passes the combined results (vectorstore
    + websearch) for response generation.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**_hybrid*search* → *generate***：将组合结果（向量存储 + 网络搜索）传递给响应生成。'
- en: '***unrelated* → *generate***: Provides a fallback response for unrelated questions.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**unrelated* → *generate***：为无关问题提供回退响应。'
- en: 'A graph state structure acts as a container for maintaining the state of the
    workflow and includes the following elements:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图状态结构充当维护工作流程状态的容器，包括以下元素：
- en: '***question***: The user’s query or input that drives the workflow.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**question***：用户的查询或输入，驱动工作流程。'
- en: '***generation***: The final generated response to the user’s query, which is
    populated after processing.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成**：对用户查询的最终生成响应，在处理之后填充。'
- en: '_**web_search_needed**_: A flag indicating whether a web search is required
    based on the relevance of retrieved documents.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**_web_search_needed**_：一个标志，指示是否需要基于检索到的文档的相关性进行网络搜索。'
- en: '***documents***: A list of retrieved or processed documents that are relevant
    to the query.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**documents***：与查询相关的检索或处理文档的列表。'
- en: '_**answer_style**_: Specifies the desired style of the answer, such as "Concise,"
    "Moderate," or "Explanatory".'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**_answer_style**_：指定所需的答案风格，例如“简洁”、“适中”或“解释性”。'
- en: 'The graph state structure is defined as follows:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 图状态结构定义如下：
- en: '[PRE5]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Following router function analyzes the query and routes it to a relevant node
    for processing. A chain is created comprising a prompt to select a tool/node from
    a tool selection dictionary and the query. The chain invokes a router LLM to select
    the relevant tool.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 以下路由功能分析查询并将其路由到相关节点进行处理。创建一个链，包括从工具选择字典中选择工具/节点和查询的提示。该链调用路由LLM以选择相关工具。
- en: '[PRE6]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The questions not relevant to the workflow are routed to _handle*unrelated*
    node which provides a fallback response through *generate* node.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 与工作流程无关的问题会被路由到处理**无关**节点的**generate**节点，该节点提供回退响应。
- en: '[PRE7]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The entire workflow is depicted in the following figure.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 整个工作流程如下所示。
- en: '![LangGraph agentic workflow (image by author)](../Images/f79b6fcbed456b9651a9ef3fd08a0088.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![LangGraph代理工作流程（作者图片）](../Images/f79b6fcbed456b9651a9ef3fd08a0088.png)'
- en: LangGraph agentic workflow (image by author)
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph代理工作流程（作者图片）
- en: Retrieval and Grading
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检索和评分
- en: The *retrieve* node invokes the retriever with the question to fetch relevant
    chunks of information from the vector store. These chunks ("*documents*") are
    sent to the _grade*documents* node to grade their relevancy. Based on the graded
    chunks ("_filtered*docs*"), the _route_after*grading* node decides whether to
    proceed to generation with the retrieved information or to invoke web search.
    The helper function _initialize_grader*chain* initializes the grader chain with
    a prompt guiding the grader LLM to assess the relevancy of each chunk. The _grade*documents*
    node analyzes each chunk to determine whether it is relevant to the question.
    For each chunk, it outputs "*Yes*" or "*No*" depending whether the chunk is relevant
    to the question.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '**retrieve**节点调用检索器，用问题从向量存储中检索相关信息。这些信息块（“*documents*”）被发送到**grade_documents**节点以评估其相关性。根据评估的信息块（“_filtered*docs*”），**route_after_grading**节点决定是否使用检索到的信息继续生成，还是调用网络搜索。辅助函数**initialize_grader_chain**使用提示初始化评分链，引导评分LLM评估每个信息块的相关性。**grade_documents**节点分析每个信息块以确定它是否与问题相关。对于每个信息块，它输出“*Yes*”或“*No*”，取决于信息块是否与问题相关。'
- en: '[PRE8]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Web and Hybrid Search
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 网络和混合搜索
- en: The _web*search* node is reached either by _route_after*grading* node when no
    relevant chunks are found in the retrieved information, or directly by _route*question*
    node when either _internet_search*enabled* state flag is "*True*" (selected by
    the radio button in the user interface), or the router function decides to route
    the query to _web*search* to fetch recent and more relevant information.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 当检索到的信息中没有找到相关片段时，通过**route_after_grading**节点到达**web_search**节点，或者当**internet_search_enabled**状态标志为“*True*”（在用户界面中通过单选按钮选择）或路由器函数决定将查询路由到**web_search**以获取最新和更相关的信息时，可以直接通过**route_question**节点到达**web_search**节点。
- en: Tavily search engine’s free API can be obtained by creating an account at their
    website. The free plan offers 1000 credit points per month. Tavily search results
    are appended to the state variable "*document*" which is then passed to *generate*
    node with the state variable "*question*".
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在他们的网站上创建账户，可以获得Tavily搜索引擎的免费API。免费计划每月提供1000个积分。Tavily搜索结果附加到状态变量"*document*"，然后与状态变量"*question*"一起传递给**generate**节点。
- en: Hybrid search combines the results of both retriever and Tavily search and populates
    "*document*" state variable, which is passed to generate node with "*question*"
    state variable.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 混合搜索结合了检索器和Tavily搜索的结果，填充"*document*"状态变量，该变量随后与"*question*"状态变量一起传递给生成节点。
- en: '[PRE9]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Invoking Tools
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调用工具
- en: The tools used in this agentic workflow are the scrapping functions to fetch
    information from predefined trusted URLs. The difference between Tavily and these
    tools is that Tavily performs a broader internet search to bring results from
    diverse sources. Whereas, these tools use Python’s Beautiful Soup web scrapping
    library to extract information from trusted sources (predefined URLs). In this
    way, we make sure that the information regarding certain queries is extracted
    from known, trusted sources. In addition, this information retrieval is completely
    free.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在此代理工作流程中使用的工具是抓取功能，用于从预定义的受信任URL中获取信息。Tavily与这些工具的不同之处在于，Tavily执行更广泛的互联网搜索，以从不同来源获取结果。而，这些工具使用Python的Beautiful
    Soup网络抓取库从受信任的来源（预定义的URL）中提取信息。这样，我们确保有关特定查询的信息是从已知、受信任的来源提取的。此外，这种信息检索是完全免费的。
- en: Here is how _get_tax*info* node works with some helper functions. The other
    tools (nodes) of this type also work in the same way.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何使用一些辅助函数来工作**get_tax_info**节点。此类型的其他工具（节点）也以相同的方式工作。
- en: '[PRE10]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Generating Response
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成响应
- en: The node, *generate*, creates the final response by invoking a chain with a
    predefined prompt (LangChain’s *PromptTemplate* class) described below. The _rag*prompt*
    receives the state variables _"questio*n",* "contex*t", and* "answer_styl_e" and
    guides the entire behavior of the response generation including instructions about
    response style, conversational tone, formatting guidelines, citation rules, hybrid
    context handling, and context-only focus.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**generate**节点通过调用一个包含预定义提示（以下描述的LangChain的**PromptTemplate**类）的链来创建最终响应。**rag_prompt**接收状态变量**"question"**、**"context"**和**"answer_style"**，并指导整个响应生成行为，包括有关响应风格、对话语气、格式指南、引用规则、混合上下文处理和仅关注上下文的说明。'
- en: '[PRE11]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The *generate* node first retrieves the state variables "*question*", "*documents*",
    and "_answer*style*" and formats the "*documents*" into a single string which
    serves as the context. Subsequently, it invokes the generation chain with _rag*prompt*
    and a response generation LLM _ *to generate the final answer which is populated
    in* "generatio_n" state variable. This state variable is used by _app.p_y to display
    the generated response in the *Streamlit* user interface.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**generate**节点首先检索状态变量"*question*"、"*documents*"和"_answer_style*"，并将"*documents*"格式化为单个字符串，作为上下文。随后，它使用**rag_prompt**和响应生成LLM来调用生成链，以生成最终答案，该答案填充在"*generation*"状态变量中。此状态变量由**app.py**用于在**Streamlit**用户界面中显示生成的响应。'
- en: With Groq’s free API, there is a possibility of hitting a model’s rate or context
    window limit. In that case, I extended *generate* node to dynamically switch the
    models in a circular fashion from the list of model names, and revert to the current
    model after generating the response.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Groq的免费API，有可能达到模型速率或上下文窗口限制。在这种情况下，我扩展了**generate**节点，以循环方式从模型名称列表中动态切换模型，并在生成响应后返回到当前模型。
- en: '[PRE12]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Helper Functions
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 辅助函数
- en: There are other helping functions in _agentic*rag.py* for initializing application,
    LLMs, embedding models, and session variables. The function _initialize*app* is
    called from *app.py* during app initialization and __ is triggered every time
    a model or state variable is changed via the *Streamlit* app. It reinitializes
    components and saves the updated states. This function also keeps track of various
    session variables and prevents redundant initialization.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在 _agentic*rag.py* 中还有其他辅助函数用于初始化应用程序、LLM、嵌入模型和会话变量。在 *app.py* 中的应用程序初始化期间调用
    _initialize*app* 函数，并且每次通过 *Streamlit* 应用程序更改模型或状态变量时都会触发 __。该函数重新初始化组件并保存更新后的状态。此函数还跟踪各种会话变量并防止重复初始化。
- en: '[PRE13]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The following helper functions initializes an answering LLM, embedding model,
    router LLM, and grading LLM. The list of model names, _model*list*, is used to
    keep track of models during the dynamic switching of models by *generate* node.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 以下辅助函数初始化了一个回答 LLM、嵌入模型、路由 LLM 和评分 LLM。模型名称列表 _model*list* 用于在由 *generate* 节点动态切换模型时跟踪模型。
- en: '[PRE14]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Establishing the Workflow
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建立工作流程
- en: Now the graph state, nodes, conditional entry points using _route*question*,
    and edges are defined to establish the flow between nodes. Finally, the workflow
    is compiled into an executable *app* for use within the *Streamlit* interface.
    The condition entry point in the workflow uses _route*question* function to select
    the first node in the workflow based on the query. The conditional edge (_workflow.add_conditional*edges*)
    describes whether to transition to *websearch* or to *generate* node based on
    the relevancy of the chunks determined by _grade*documents* node.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，定义了图状态、节点、使用 _route*question* 的条件入口点和边，以建立节点之间的流程。最后，将工作流程编译成可在 *Streamlit*
    界面中使用的可执行 *app*。工作流程中的条件入口点使用 _route*question* 函数根据查询选择工作流程中的第一个节点。条件边 (_workflow.add_conditional*edges*)
    描述了根据 _grade*documents* 节点确定的块的相关性，决定是否过渡到 *websearch* 或 *generate* 节点。
- en: '[PRE15]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The Streamlit Interface
  id: totrans-119
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Streamlit 界面
- en: The Streamlit application in *app.py* provides an interactive interface to ask
    questions and display responses using dynamic settings for model selection, answer
    styles, and query-specific tools. The _initialize*app* function, imported from
    _agentic*rag.py,* initializes all the session variables including all LLMs, embedding
    model, and other options selected from the left sidebar.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '*app.py* 中的 Streamlit 应用程序提供了一个交互式界面，用于使用动态设置（模型选择、回答风格和针对特定查询的工具）提问并显示响应。从
    _agentic*rag.py* 导入的 _initialize*app* 函数初始化了所有会话变量，包括所有 LLM、嵌入模型以及其他从左侧侧边栏选择的选项。'
- en: The print statements in _agentic_rag.p_y are captured by redirecting *sys.stdout*
    to an *io.stringIO* buffer. The content of this buffer is then displayed in the
    debug placeholder using the _text*area* component in Streamlit.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在 _agentic_rag.p_y 中的打印语句通过将 *sys.stdout* 重定向到 *io.stringIO* 缓冲区来捕获。然后，使用 Streamlit
    中的 _text*area* 组件在调试占位符中显示该缓冲区的内容。
