- en: The following image shows the answer generated by *llama-3.3–70b-versatile*
    with ‘*concise’* answer style selected. The query router (_route*question*) invokes
    the retriever (vector search) and the grader function finds all the retrieved
    chunks relevant. Hence, a decision to generate the answer through *generate* node
    is taken by _route_after*grading* node.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图像展示了选择“*简洁*”回答风格时由 *llama-3.3–70b-versatile* 生成的答案。查询路由器 (_route*question*)
    调用检索器（向量搜索），评分函数找到所有相关的检索块。因此，通过 _route_after*grading* 节点，决定通过 *generate* 节点生成答案。
- en: '![A ''concise'' answer generated by llama-3.3–70b-versatile (image by author)](../Images/f85439219533c700d8e35cb918755bce.png)'
