- en: Building a Monitoring System That Actually Works
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建真正有效的监控系统
- en: 原文：[https://towardsdatascience.com/building-a-monitoring-system-that-actually-works/](https://towardsdatascience.com/building-a-monitoring-system-that-actually-works/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[构建真正有效的监控系统的文章](https://towardsdatascience.com/building-a-monitoring-system-that-actually-works/)'
- en: <mdspan datatext="el1761589716848" class="mdspan-comment">When building</mdspan>
    and managing products, it’s crucial to ensure they’re performing as expected and
    that everything is running smoothly. We typically rely on metrics to gauge the
    health of our products. And many factors can influence our KPIs, from internal
    changes such as UI updates, pricing adjustments, or incidents to external factors
    like competitor actions or seasonal trends. That’s why it’s important to continuously
    monitor your KPIs so you can respond quickly when something goes off track. Otherwise,
    it might take several weeks to realise that your product was completely broken
    for 5% of customers or that conversion dropped by 10 percentage points after the
    last release.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建和管理产品时，确保它们按预期运行且一切运行顺畅至关重要。我们通常依赖指标来衡量我们产品的健康状况。许多因素可以影响我们的KPIs，从内部变化，如UI更新、价格调整或事件，到外部因素，如竞争对手的行动或季节性趋势。这就是为什么持续监控您的KPIs很重要，这样您就可以在事情偏离轨道时迅速做出反应。否则，可能需要几周时间才能意识到您的产品有5%的客户完全损坏，或者在上一个版本发布后转化率下降了10个百分点。
- en: To gain this visibility, we create dashboards with key metrics. But let’s be
    honest, dashboards that no one actively monitors offer little value. We either
    need people constantly watching dozens or even hundreds of metrics, or we need
    an automated alerting and monitoring system. And I strongly prefer the latter.
    So, in this article, I’ll walk you through a practical approach to building an
    effective monitoring system for your KPIs. You’ll learn about different monitoring
    approaches, how to build your first statistical monitoring system, and what challenges
    you’ll likely encounter when deploying it in production.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得这种可见性，我们创建带有关键指标的仪表板。但让我们说实话，没有人积极监控的仪表板几乎没有价值。我们要么需要人们不断监视数十个甚至数百个指标，要么我们需要一个自动警报和监控系统。而且我强烈倾向于后者。因此，在这篇文章中，我将向您介绍一种构建有效监控系统的实用方法，以监控您的关键绩效指标（KPIs）。您将了解不同的监控方法，如何构建您的第一个统计监控系统，以及在生产环境中部署时可能会遇到的挑战。
- en: Setting up monitoring
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置监控
- en: 'Let’s start with the big picture of how to architect your monitoring system,
    then we’ll dive into the technical details. There are a few key decisions you
    need to make when setting up monitoring:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从如何架构您的监控系统的整体图景开始，然后我们将深入技术细节。在设置监控时，您需要做出一些关键决策：
- en: '**Sensitivity**. You need to find the right balance between missing important
    anomalies (false negatives) and getting bombarded with false alerts 100 times
    a day (false positives). We’ll talk about what levers you have to adjust this
    later on.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵敏度**。您需要在错过重要异常（假阴性）和每天被100次虚假警报轰炸（假阳性）之间找到正确的平衡。我们稍后会讨论您可以调整这些杠杆的方法。'
- en: '**Dimensions.** The segments you choose to monitor also affect your sensitivity.
    If there’s a problem in a small segment (like a specific browser or country),
    your system is much more likely to catch it if you’re monitoring that segment’s
    metrics directly. But here’s the catch: the more segments you monitor, the more
    false positives you’ll deal with, so you need to find the sweet spot.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**维度**。您选择监控的细分市场也会影响您的灵敏度。如果在小细分市场（如特定浏览器或国家）存在问题，如果您直接监控该细分市场的指标，您的系统更有可能捕捉到它。但这里有一个问题：您监控的细分市场越多，您处理的假阳性就越多，因此您需要找到最佳平衡点。'
- en: '**Time granularity.** If you have plenty of data and can’t afford delays, it
    might be worth looking at minute-by-minute data. If you don’t have enough data,
    you can aggregate it into 5–15 minute buckets and monitor those instead. Either
    way, it’s always a good idea to have higher-level daily, weekly, or monthly monitoring
    alongside your real-time monitoring to keep an eye on longer-term trends.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间粒度**。如果您有大量数据且无法承受延迟，查看每分钟的数据可能值得考虑。如果您没有足够的数据，可以将它们汇总到5-15分钟的桶中，并监控这些桶。无论如何，始终在实时监控的同时进行更高级别的每日、每周或每月监控，以关注长期趋势。'
- en: 'However, monitoring isn’t just about the technical solution. It’s also about
    the processes you have in place:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，监控不仅仅是关于技术解决方案。它还关乎你实施的过程：
- en: '**You need someone who’s responsible for monitoring and responding to alerts.**
    We used to handle this with an on-call rotation in my team, where each week, one
    person would be in charge of reviewing all the alerts.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**您需要有人负责监控和响应警报**。我们过去在团队中通过轮班制来处理这个问题，每周有一个人负责审查所有警报。'
- en: '**Beyond automated monitoring, it’s worth doing some manual checks too.** You
    can set up TV displays in the office, or at the very least, have a process where
    someone (like an on-call person) reviews the metrics once a day or week.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**除了自动化监控之外，进行一些手动检查也是值得的**。您可以在办公室设置电视显示屏，或者至少建立一个流程，让某人（如值班人员）每天或每周审查一次指标。'
- en: '**You need to establish feedback loops.** When you’re reviewing alerts and
    looking back at incidents you might have missed, take the time to fine-tune your
    monitoring system’s settings.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**您需要建立反馈循环**。当您审查警报并回顾可能错过的事件时，花时间微调监控系统的设置。'
- en: '**The value of a change log (a record of all changes affecting your KPIs) can’t
    be overstated.** It helps you and your team always have context about what happened
    to your KPIs and when. Plus, it gives you a valuable dataset for evaluating the
    real impact on your monitoring system when you make changes (like figuring out
    what percentage of past anomalies your new setup would actually catch).'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**变更日志（影响您关键绩效指标的所有变更的记录）的价值不容小觑**。它帮助您和您的团队始终了解关键绩效指标发生了什么变化以及何时发生。此外，它还为您提供了一个宝贵的数据集，用于评估您在做出更改（如确定新配置实际会捕获多少过去异常）时对监控系统的影响。'
- en: Now that we’ve covered the high-level picture, let’s move on and dig into the
    technical details of how to actually detect anomalies in time series data.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经概述了整体情况，让我们继续深入探讨如何在实际中检测时序数据的异常。
- en: Frameworks for monitoring
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监控框架
- en: There are many out-of-the-box frameworks you can use for monitoring. I’d break
    them down into two main groups.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多现成的框架可供您用于监控。我将它们分为两大类。
- en: 'The first group involves creating a forecast with confidence intervals. Here
    are some options:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 第一组涉及创建带有置信区间的预测。以下是一些选项：
- en: You can use[**statsmodels**](https://www.statsmodels.org/stable/generated/statsmodels.tsa.arima.model.ARIMA.html)and
    the classical implementation of ARIMA-like models for time series forecasting.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以使用[**statsmodels**](https://www.statsmodels.org/stable/generated/statsmodels.tsa.arima.model.ARIMA.html)和
    ARIMA 类模型的经典实现进行时序预测。
- en: Another option that typically works pretty well out of the box is [**Prophet**](https://facebook.github.io/prophet/)
    by Meta. It’s a simple additive model that returns uncertainty intervals.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一个通常开箱即用的选项是 Meta 的 [**Prophet**](https://facebook.github.io/prophet/)。它是一个简单的加性模型，返回不确定性区间。
- en: There’s also [**GluonTS**](https://github.com/awslabs/gluonts), a deep learning-based
    forecasting framework from AWS.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，还有 [**GluonTS**](https://github.com/awslabs/gluonts)，这是 AWS 提供的一个基于深度学习的预测框架。
- en: 'The second group focuses on anomaly detection, and here are some popular libraries:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 第二组专注于异常检测，以下是一些流行的库：
- en: '[**PyOD**](https://pyod.readthedocs.io/en/latest/): The most popular Python
    outlier/anomaly detection toolbox, with 50+ algorithms (including time series
    and deep learning methods).'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**PyOD**](https://pyod.readthedocs.io/en/latest/)：最受欢迎的 Python 异常检测工具箱，包含
    50 多种算法（包括时序和深度学习方法）。'
- en: '[**ADTK**](https://github.com/arundo/adtk) **(Anomaly Detection Toolkit)**:
    Built for unsupervised/rule-based time series anomaly detection with easy integration
    into pandas dataframes.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**ADTK**](https://github.com/arundo/adtk) **（异常检测工具包）**：专为无监督/基于规则的时序异常检测而构建，易于集成到
    pandas 数据框中。'
- en: '[**Merlion**](https://github.com/salesforce/Merlion): Combines forecasting
    and anomaly detection for time series using both classical and ML approaches.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Merlion**](https://github.com/salesforce/Merlion)：结合经典和机器学习方法，用于时序数据的预测和异常检测。'
- en: I’ve only mentioned a few examples here; there are way more libraries out there.
    You can absolutely try them out with your data and see how they perform. However,
    I want to share a much simpler approach to monitoring that I usually start with.
    Even though it’s so simple that you can implement it with a single SQL query,
    it works surprisingly well in many cases. Another significant advantage of this
    simplicity is that you can implement it in pretty much any tool, whereas deploying
    more complex ML approaches can be tricky in some systems.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里只提到了几个例子；实际上有更多的库可供选择。你完全可以尝试用你的数据来测试它们，看看它们的性能如何。然而，我想分享一个通常从更简单的方法开始监控的方法。尽管它非常简单，以至于你可以用单个SQL查询来实现，但在许多情况下它表现得相当出色。这种简单性的另一个显著优点是，你几乎可以在任何工具中实现它，而将更复杂的机器学习方法部署到某些系统中可能会很棘手。
- en: Statistical approach to monitoring
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监控的统计方法
- en: 'The core idea behind monitoring is straightforward: use historical data to
    build a confidence interval (CI) and detect when current metrics fall outside
    of expected behaviour. We estimate this confidence interval using the mean and
    standard deviation of past data. It’s just basic statistics.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 监控背后的核心思想很简单：使用历史数据来构建置信区间（CI），并检测当前指标是否超出预期行为。我们通过过去数据的平均值和标准差来估计这个置信区间。这仅仅是基本的统计学。
- en: \[
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \textbf{Confidence Interval} = (\textbf{mean} – \textsf{coef}_1 \times \textbf{std},\;
    \textbf{mean} + \textsf{coef}_2 \times \textbf{std})
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**置信区间** = (\textbf{mean} – \textsf{coef}_1 \times \textbf{std},\; \textbf{mean}
    + \textsf{coef}_2 \times \textbf{std})'
- en: \]
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '![](../Images/90aeac5c20b9808d7b14a129ae33fe88.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/90aeac5c20b9808d7b14a129ae33fe88.png)'
- en: Image by author
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: However, the effectiveness of this approach depends on several key parameters,
    and the choices you make here will significantly impact the accuracy of your alerts.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这种方法的有效性取决于几个关键参数，你在这里所做的选择将显著影响你警报的准确性。
- en: 'The first decision is how to define the data sample used to calculate your
    statistics. Typically, we compare the current metric to the same time period on
    previous days. This involves two main components:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个决策是如何定义用于计算统计数据的样本。通常，我们将当前指标与前几天同一时间段进行比较。这涉及两个主要组成部分：
- en: '**Time window:** I usually take a window of ±10–30 minutes around the current
    timestamp to account for short-term fluctuations.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间窗口：** 我通常选择当前时间戳周围±10–30分钟的时间窗口，以考虑到短期波动。'
- en: '**Historical days:** I prefer using the same weekday over the past 3–5 weeks.
    This method accounts for weekly seasonality, which is usually present in business
    data. However, depending on your seasonality patterns, you might choose different
    approaches (for example, splitting days into two groups: weekdays and weekends).'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**历史天数：** 我更喜欢使用过去3–5周内的同一工作日。这种方法考虑到了通常存在于业务数据中的周季节性。然而，根据你的季节性模式，你可能需要选择不同的方法（例如，将天数分为两组：工作日和周末）。'
- en: Another important parameter is the choice of coefficient used to set the width
    of the confidence interval. I usually use three standard deviations since it covers
    99.7% of observations for distributions close to normal.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的参数是用于设置置信区间宽度的系数选择。我通常使用三个标准差，因为它涵盖了接近正态分布的99.7%的观测值。
- en: As you can see, there are several decisions to make, and there’s no one-size-fits-all
    answer. The most reliable way to determine optimal settings is to experiment with
    different configurations using your own data and choose the one that delivers
    the best performance for your use case. So this is an ideal moment to put the
    approach into action and see how it performs on real data.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，有多个决策需要做出，没有一种适合所有情况的答案。最可靠的确定最佳设置的方法是使用自己的数据尝试不同的配置，并选择最适合你用例的最佳性能配置。因此，这是一个将方法付诸实践并观察它在真实数据上表现如何的理想时刻。
- en: 'Example: monitoring the number of taxi rides'
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例：监控出租车行程数量
- en: To test this out, we’ll use [the popular NYC Taxi Data dataset](https://www.nyc.gov/site/tlc/about/tlc-trip-record-data.page)
    ([<mdspan datatext="el1761589640513" class="mdspan-comment">Open Data</mdspan>](https://opendata.cityofnewyork.us/overview/#termsofuse)).
    I loaded data from May to July 2025 and focused on rides related to high-volume
    for-hire vehicles. Since we have hundreds of trips every minute, we can use minute-by-minute
    data for monitoring.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试这一点，我们将使用[流行的纽约出租车数据集](https://www.nyc.gov/site/tlc/about/tlc-trip-record-data.page)
    ([<mdspan datatext="el1761589640513" class="mdspan-comment">开放数据</mdspan>](https://opendata.cityofnewyork.us/overview/#termsofuse))。我加载了2025年5月至7月的数据，并专注于与高需求出租车相关的行程。由于我们每分钟有数百次行程，我们可以使用每分钟的数据进行监控。
- en: '![](../Images/bcc94cbb6751bb44dd9e8e83364f4430.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bcc94cbb6751bb44dd9e8e83364f4430.png)'
- en: Image by author
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: Building the first version
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建第一个版本
- en: 'So, let’s try our approach and build confidence intervals based on real data.
    I started with a default set of key parameters:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们尝试我们的方法，并基于实际数据构建置信区间。我从一个默认的关键参数集开始：
- en: A time window of ±15 minutes around the current timestamp,
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以当前时间戳为中心的±15分钟的时间窗口，
- en: Data from the current day plus the same weekday from the previous three weeks,
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当前日期的数据加上前四周同一天的数据，
- en: A confidence band defined as ±3 standard deviations.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 置信带定义为±3个标准差。
- en: Now, let’s create a couple of functions with the business logic to calculate
    the confidence interval and check whether our value falls outside of it.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们创建一些具有业务逻辑的函数来计算置信区间并检查我们的值是否超出它。
- en: '[PRE0]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Analysing results
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析结果
- en: Let’s look at the results. First, we’re seeing quite a few false positive triggers
    (one-off points outside the CI that seem to be due to normal variability).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看结果。首先，我们看到了相当多的假阳性触发（似乎由于正常变化而位于置信区间之外的孤立点）。
- en: '![](../Images/a748491a2b7736252b421aef832307d0.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a748491a2b7736252b421aef832307d0.png)'
- en: Image by author
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: 'There are two ways we can adjust our algorithm to account for this:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有两种方法可以调整我们的算法来考虑这一点：
- en: The CI doesn’t need to be symmetric. We might be less concerned about increases
    in the number of trips, so we could use a higher coefficient for the upper bound
    (for example, use 5 instead of 3).
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 置信区间不需要对称。我们可能对行程数量的增加不太关心，因此我们可以为上限使用更高的系数（例如，使用5而不是3）。
- en: The data is quite volatile, so there will be occasional anomalies where a single
    point falls outside the confidence interval. To reduce such false positive alerts,
    we can use more robust logic and only trigger an alert when multiple points are
    outside the CI (for example, at least 4 out of the last 5 points, or 8 out of
    10).
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据波动性较大，因此偶尔会出现单个点落在置信区间之外的情况。为了减少这种假阳性警报，我们可以使用更稳健的逻辑，并且只有在多个点都位于置信区间之外时才触发警报（例如，过去5个点中的至少4个，或者10个点中的8个）。
- en: However, there’s another potential problem with our current CIs. As you can
    see, there are quite a few cases where the CI is excessively wide. This looks
    off and could reduce the sensitivity of our monitoring.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们当前的置信区间还存在另一个潜在问题。如您所见，有相当多的情况中置信区间过于宽泛。这看起来不正常，可能会降低我们监控的敏感性。
- en: Let’s look at one example to understand why this happens. The distribution we’re
    using to estimate the CI at this point is bimodal, which leads to a higher standard
    deviation and a wider CI. That’s because the number of trips on the evening of
    July 14th is significantly higher than in other weeks.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个例子来理解为什么会发生这种情况。我们目前用来估计置信区间的分布是双峰的，这导致标准差更高，置信区间更宽。这是因为7月14日晚上的行程数量显著高于其他星期。
- en: '![](../Images/39af302b3a47becd37247be19ae5a388.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/39af302b3a47becd37247be19ae5a388.png)'
- en: Image by author
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: '![](../Images/d4e3d0b9af01fb6968d44718dd3bfbd2.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4e3d0b9af01fb6968d44718dd3bfbd2.png)'
- en: Image by author
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: 'So we’ve encountered an anomaly in the past that’s affecting our confidence
    intervals. There are two ways to address this issue:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们在过去遇到了影响置信区间的异常情况。有两种方法可以解决这个问题：
- en: If we’re doing constant monitoring, we know there was anomalously high demand
    on July 14th, and we can exclude these periods when constructing our CIs. This
    approach requires some discipline to track these anomalies, but it pays off with
    more accurate results.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果我们进行持续监控，我们知道7月14日需求异常高，我们可以在构建置信区间时排除这些时段。这种方法需要一定的纪律来跟踪这些异常，但会带来更准确的结果。
- en: 'However, there’s always a quick-and-dirty approach too: we can simply drop
    or cap outliers when constructing the CI.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然而，总有一个快速且简单的方法：我们可以在构建CI时简单地丢弃或限制异常值。
- en: Improving the accuracy
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提高准确性
- en: 'So after the first iteration, we identified several potential improvements
    for our monitoring approach:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在第一次迭代之后，我们识别出我们监控方法的一些潜在改进：
- en: '**Use a higher coefficient for the upper bound** since we care less about increases.
    I used 6 standard deviations instead of 3.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对于上限使用更高的系数**，因为我们不太关心增加。我使用了6个标准差而不是3。'
- en: '**Deal with outliers** to filter out past anomalies. I experimented with removing
    or capping the top 10–20% of outliers and found that capping at 20% alongside
    increasing the period to 5 weeks worked best in practice.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**处理异常值**以过滤掉过去的异常。我尝试了移除或限制前10-20%的异常值，并发现将限制设置为20%同时将周期增加到5周在实践中效果最好。'
- en: '**Raise an alert only when 4 out of the last 5 points are outside the CI**
    to reduce the number of false positive alerts caused by normal volatility.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**只有当最后5个点中有4个点超出CI时才发出警报**，以减少由正常波动引起的假阳性警报的数量。'
- en: Let’s see how this looks in code. We’ve updated the logic in `get_ci_statistics`
    to account for different strategies for handling outliers.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这在代码中是如何实现的。我们已经更新了`get_ci_statistics`中的逻辑，以考虑处理异常的不同策略。
- en: '[PRE1]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We also need to update the way we define the `outside_of_ci` parameter.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要更新定义`outside_of_ci`参数的方式。
- en: '[PRE2]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We can see that the CI is now significantly narrower (no more anomalously wide
    CIs), and we’re also getting far fewer alerts since we increased the upper bound
    coefficient.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，CI现在明显变窄了（不再有异常宽的CI），而且由于我们增加了上限系数，我们收到的警报也少得多。
- en: '![](../Images/35a7b2066a26880a59143324238f8862.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/35a7b2066a26880a59143324238f8862.png)'
- en: Image by author
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: Let’s investigate the two alerts we found. These two alerts from the last 2
    weeks look plausible when we compare the traffic to previous weeks.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们调查我们发现的两个警报。在将流量与上周进行比较时，过去两周的两个警报看起来是合理的。
- en: '![](../Images/216be8947a351a0d740a84e3d26e81ea.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/216be8947a351a0d740a84e3d26e81ea.png)'
- en: Image by author
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: '***Practical tip:** This chart also reminds us that ideally we should account
    for public holidays and either exclude them or treat them as weekends when calculating
    the CI.*'
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***实用技巧**：这张图也提醒我们，理想情况下，我们应该考虑公共假日，要么排除它们，要么在计算CI时将它们视为周末。*'
- en: '![](../Images/7eff8a079b4570cc9965c2370811d3ac.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7eff8a079b4570cc9965c2370811d3ac.png)'
- en: Image by author
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: 'So our new monitoring approach makes total sense. However, there’s a drawback:
    by only looking for cases where 4 out of 5 minutes fall outside the CI, we’re
    delaying alerts in situations where everything is completely broken. To address
    this problem, you can actually use two CIs:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们新的监控方法完全合理。然而，也存在一个缺点：通过只寻找4分钟中有5分钟落在CI之外的情况，我们在一切完全出错的情况下延迟了警报。为了解决这个问题，实际上可以使用两个CI：
- en: '**Doomsday CI**: A broad confidence interval where even a single point falling
    outside means it’s time to panic.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**末日CI**：一个宽泛的置信区间，即使只有一个点落在区间外，就意味着需要恐慌。'
- en: '**Incident CI**: The one we built earlier, where we might wait 5–10 minutes
    before triggering an alert, since the drop in the metric isn’t as critical.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**事件CI**：这是我们之前构建的，我们可能需要等待5-10分钟才能触发警报，因为指标下降并不那么关键。'
- en: Let’s define 2 CIs for our case.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们为我们的案例定义2个CI。
- en: '![](../Images/b80c6ec2026e16756370ebd15f969eaa.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b80c6ec2026e16756370ebd15f969eaa.png)'
- en: Image by author
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片
- en: 'It’s a balanced approach that gives us the best of both worlds: we can react
    quickly when something is completely broken while still keeping false positives
    under control. With that, we’ve achieved a good result and we’re ready to move
    on.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个平衡的方法，它让我们在两个世界中都能得到最好的结果：当某件事完全出错时，我们可以快速反应，同时仍然控制假阳性。有了这个，我们已经取得了良好的结果，准备继续前进。
- en: Testing our monitoring on anomalies
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试我们的监控对异常的处理
- en: We’ve confirmed that our approach works well for business-as-usual cases. However,
    it’s also worth doing some stress testing by simulating anomalies we want to catch
    and checking how the monitoring performs. In practice, it’s worth testing against
    previously known anomalies to see how it would handle real-world examples.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经确认我们的方法对于常规业务案例效果良好。然而，通过模拟我们想要捕捉的异常并检查监控的表现，进行一些压力测试也是值得的。在实践中，测试之前已知的异常以查看它如何处理现实世界的例子是值得的。
- en: In our case, we don’t have a change log of previous anomalies, so I simulated
    a 20% drop in the number of trips, and our approach caught it immediately.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的案例中，我们没有之前异常的变化日志，所以我模拟了行程数量下降20%，我们的方法立即捕捉到了它。
- en: '![](../Images/fafc00d374dac2612c1c92d1a106e0fd.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fafc00d374dac2612c1c92d1a106e0fd.png)'
- en: Image by author
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: These kinds of step changes can be tricky in real life. Imagine we lost one
    of our partners, and that lower level becomes the new normal for the metric. In
    that case, it’s worth adjusting our monitoring as well. If it’s possible to recalculate
    the historical metric based on the current state (for example, by filtering out
    the lost partner), that would be ideal since it would bring the monitoring back
    to normal. If that’s not feasible, we can either adjust the historical data (say,
    subtract 20% of traffic as our estimate of the change) or drop all data from before
    the change and use only the new data to construct the CI.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这些类型的阶跃变化在现实生活中可能会很棘手。想象一下，如果我们失去了一个合作伙伴，那么较低的水平就变成了新的正常水平，对于这个指标来说。在这种情况下，调整我们的监控也是值得的。如果可能的话，基于当前状态重新计算历史指标（例如，通过过滤掉失去的合作伙伴），那将是理想的，因为这会将监控恢复到正常状态。如果这不可行，我们可以调整历史数据（比如，减去20%的交通量作为我们估计的变化）或者丢弃变化之前的所有数据，只使用新的数据来构建置信区间。
- en: '![](../Images/aa75790cd6dc8b96208b771efe55413e.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/aa75790cd6dc8b96208b771efe55413e.png)'
- en: Image by author
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: 'Let’s look at another tricky real-world example: gradual decay. If your metric
    is slowly dropping day after day, it likely won’t be caught by our real-time monitoring
    since the CI will be shifting along with it. To catch situations like this, it’s
    worth having less granular monitoring (like daily, weekly, or even monthly).'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看另一个棘手的现实世界例子：逐渐衰减。如果你的指标每天都在缓慢下降，那么我们的实时监控可能不会捕捉到这种情况，因为置信区间会随着它一起移动。为了捕捉这种情况，拥有更粗粒度的监控（如每日、每周，甚至每月）是值得的。
- en: '![](../Images/aef7733865b3669df92eced46b74d0f4.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/aef7733865b3669df92eced46b74d0f4.png)'
- en: Image by author
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: '*You can find the full code on [GitHub](https://github.com/miptgirl/miptgirl_medium/tree/main/alerting_and_monitoring).*'
  id: totrans-102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你可以在[GitHub](https://github.com/miptgirl/miptgirl_medium/tree/main/alerting_and_monitoring)上找到完整的代码。
- en: Operational challenges
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运营挑战
- en: We’ve discussed the math behind alerting and monitoring systems. However, there
    are several other nuances you’ll likely encounter once you start deploying your
    system in production. So I’d like to cover these before wrapping up.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经讨论了警报和监控系统背后的数学原理。然而，一旦你开始在生产环境中部署你的系统，你可能会遇到几个其他的细微差别。所以在结束之前，我想先涵盖这些内容。
- en: '**Lagging data.** We don’t face this problem in our example since we’re working
    with historical data, but in real life, you need to deal with data lags. It usually
    takes some time for data to reach your data warehouse. So you need to learn how
    to distinguish between cases where data hasn’t arrived yet versus actual incidents
    affecting the customer experience. The most straightforward approach is to look
    at historical data, identify the typical lag, and filter out the last 5–10 data
    points.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '**滞后数据。**在我们的例子中，我们没有遇到这个问题，因为我们正在处理历史数据，但在现实生活中，你需要处理数据滞后。数据通常需要一段时间才能到达你的数据仓库。因此，你需要学会区分数据尚未到达的情况与实际影响客户体验的事件。最直接的方法是查看历史数据，确定典型的滞后时间，并过滤掉最后5-10个数据点。'
- en: '**Different sensitivity for different segments.** You’ll likely want to monitor
    not just the main KPI (the number of trips), but also break it down by multiple
    segments (like partners, areas, etc.). Adding more segments is always beneficial
    since it helps you spot smaller changes in specific segments (for instance, that
    there’s a problem in Manhattan). However, as I mentioned above, there’s a downside:
    more segments mean more false positive alerts that you need to deal with. To keep
    this under control, you can use different sensitivity levels for different segments
    (say, 3 standard deviations for the main KPI and 5 for segments).'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**不同段落的敏感性不同。**你可能会想监控不仅仅是主要的关键绩效指标（如行程数量），还要将其分解为多个段落（如合作伙伴、地区等）。添加更多的段落总是有益的，因为它有助于你发现特定段落的较小变化（例如，在曼哈顿存在问题）。然而，正如我上面提到的，有一个缺点：更多的段落意味着你需要处理的更多误报警报。为了控制这种情况，你可以为不同的段落使用不同的敏感性级别（比如，主要关键绩效指标为3个标准差，段落为5个）。'
- en: '**Smarter alerting system.** Also, when you’re monitoring many segments, it’s
    worth making your alerting a bit smarter. Say you have monitoring for the main
    KPI and 99 segments. Now, imagine we have a global outage and the number of trips
    drops everywhere. Within the next 5 minutes, you’ll (hopefully) get 100 notifications
    that something is broken. That’s not an ideal experience. To avoid this situation,
    I’d build logic to filter out redundant notifications. For example:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**更智能的警报系统**。此外，当你监控许多部分时，让你的警报更智能是值得的。比如说，你有主关键绩效指标和99个部分的监控。现在，想象一下我们有一个全球性的故障，所有行程的数量都下降了。在接下来的5分钟内，你（希望）会收到100条通知，说某处出了问题。这不是一个理想的经验。为了避免这种情况，我会构建逻辑来过滤掉冗余的通知。例如：'
- en: If we received the same notification within the last 3 hours, don’t fire another
    alert.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果我们在过去3小时内收到了相同的通知，不要再次触发警报。
- en: If there’s a notification about a drop in the main KPI plus more than 3 segments,
    only alert about the main KPI change.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果有关主关键绩效指标下降的通知，并且超过3个部分，只需提醒主关键绩效指标的变化。
- en: Overall, alert fatigue is real, so it’s worth minimising the noise.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，警报疲劳是真实存在的，所以值得最小化噪音。
- en: And that’s it! We’ve covered the entire alerting and monitoring topic, and hopefully,
    you’re now fully equipped to set up your own system.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！我们已经涵盖了整个警报和监控主题，希望你现在已经完全准备好设置自己的系统。
- en: Summary
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: We’ve covered a lot of ground on alerting and monitoring. Let me wrap it up
    with a step-by-step guide on how to start monitoring your KPIs.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在警报和监控方面已经覆盖了很多内容。让我用一个逐步指南来总结如何开始监控你的关键绩效指标。
- en: '**The first step is to gather a change log of past anomalies.** You can use
    this both as a set of test cases for your system and to filter out anomalous periods
    when calculating CIs.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第一步是收集过去异常的变更日志**。你可以用它作为系统的一组测试用例，并在计算置信区间时过滤掉异常时期。'
- en: '**Next, build a prototype and run it on historical data.** I’d start with the
    highest-level KPI, try out several possible configurations, and see how well it
    catches previous anomalies and whether it generates a lot of false alerts. At
    this point, you should have a viable solution.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**接下来，构建一个原型并在历史数据上运行它**。我会从最高级别的关键绩效指标开始，尝试几种可能的配置，看看它如何捕捉先前的异常以及是否会产生大量的误报。在这个阶段，你应该有一个可行的解决方案。'
- en: '**Then try it out in production,** since this is where you’ll have to deal
    with data lags and see how the monitoring actually performs in practice. Run it
    for 2–4 weeks and tweak the parameters to make sure it’s working as expected.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**然后尝试在生产环境中运行它**，因为这是你必须处理数据滞后并实际看到监控如何表现的地方。运行2-4周，调整参数以确保它按预期工作。'
- en: '**After that, share the monitoring with your colleagues and start expanding
    the scope** to include other segments. Don’t forget to keep adding all anomalies
    to the change log and establish feedback loops to improve your system continuously.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**之后，与你的同事分享监控信息，并开始扩大范围**，包括其他部分。别忘了将所有异常情况添加到变更日志中，并建立反馈循环以持续改进你的系统。'
- en: And that’s it! Now you can rest easy knowing that automation is keeping an eye
    on your KPIs (but still check in on them from time to time, just in case).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！现在你可以放心地休息，知道自动化正在监控你的关键绩效指标（但仍然时不时地检查一下，以防万一）。
- en: '*Thank you for reading. I hope this article was insightful. Remember Einstein’s
    advice: “The important thing is not to stop questioning. Curiosity has its own
    reason for existing.” May your curiosity lead you to your next great insight.*'
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*感谢阅读。希望这篇文章能给你带来启发。记住爱因斯坦的建议：“重要的是不要停止质疑。好奇心有其存在的理由。”愿你的好奇心引导你发现下一个伟大的洞察。*'
