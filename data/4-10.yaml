- en: Are LLMs creative?
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMs 有创造力吗？
- en: '**Creativity** is the ability to form novel and valuable [ideas](https://en.wikipedia.org/wiki/Idea)
    or works using one’s [imagination](https://en.wikipedia.org/wiki/Imagination).
    Products of creativity may be intangible (e.g. an idea, [scientific theory](https://en.wikipedia.org/wiki/Scientific_theory),
    [literary work](https://en.wikipedia.org/wiki/Literature), [musical composition](https://en.wikipedia.org/wiki/Musical_composition),
    or [joke](https://en.wikipedia.org/wiki/Joke)), or a physical object (e.g. an
    [invention](https://en.wikipedia.org/wiki/Invention), dish or meal, piece of [jewelry](https://en.wikipedia.org/wiki/Jewellery),
    [costume](https://en.wikipedia.org/wiki/Costume), a [painting](https://en.wikipedia.org/wiki/Painting)).
    – source: [Wikipedia](https://en.wikipedia.org/wiki/Creativity)'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**创造性**是指利用自己的想象力形成新颖且有价值的[想法](https://en.wikipedia.org/wiki/Idea)或作品的能力。创造力的产物可能是无形的（例如，一个想法、[科学理论](https://en.wikipedia.org/wiki/Scientific_theory)、[文学作品](https://en.wikipedia.org/wiki/Literature)、[音乐作品](https://en.wikipedia.org/wiki/Musical_composition)、或[笑话](https://en.wikipedia.org/wiki/Joke)），或者是一个物理物体（例如，[发明](https://en.wikipedia.org/wiki/Invention)、菜肴或餐点、[珠宝](https://en.wikipedia.org/wiki/Jewellery)、[服装](https://en.wikipedia.org/wiki/Costume)、[绘画](https://en.wikipedia.org/wiki/Painting)）。——来源：[维基百科](https://en.wikipedia.org/wiki/Creativity)'
- en: 'In general, there is no agreement on what creativity is or about a unique definition.
    Most authors agree that creativity is the production of something new, original,
    and useful. This something new can be a product or an idea. More formally, Margaret
    Boden defines creativity as: "*the ability to come up with ideas or artifacts
    that are new, surprising and valuable*" [1]'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，人们对什么是创造性或关于一个独特的定义没有达成一致。大多数作者同意，创造性是产生新颖、原创和有用的东西。这个新东西可以是一个产品或一个想法。更正式地说，Margaret
    Boden将创造性定义为：“*提出新颖、令人惊讶和有价值的思想或作品的能力*” [1]
- en: Defining value is an easier task. The LLM’s production of code is valuable when
    it performs its function properly. **But is it new and surprising?**
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 定义价值是一个更容易的任务。当LLM正确执行其功能时，其生成的代码是有价值的。**但是它是否新颖且令人惊讶？**
- en: For an object, novelty refers to the dissimilarity between a manufactured artifact
    and others in its class. This is a problematic definition because it could result
    from a simple modification of existing objects or a new recombination. Thus, to
    be truly creative an object must be not only new (different from what previously
    existed) but also valuable (have some form of utility) and surprising (not be
    a simple variation or recombination). **Since the output of an LLM is a text,
    what does it mean for a text to be creative?**
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个物体来说，新颖性指的是制造出的物品与其同类中的其他物品之间的不同。这个定义是有问题的，因为它可能只是现有物品的简单修改或新的重组。因此，要真正具有创造性，一个物体不仅必须是新的（与之前存在的不同），而且必须是有价值的（具有某种形式的效用）并且令人惊讶（不是简单的变化或重组）。**由于LLM的输出是文本，那么文本的创造性意味着什么？**
- en: To maintain consistency with the definition given above, we could define a [creative
    text](https://en.wikipedia.org/wiki/Creative_writing) as a surprising elaboration
    that is not a simple variation or reworking of previous texts. [LLMs](https://www.ibm.com/think/topics/large-language-models)
    are trained on a wide corpus of texts, and given an instruction they can generate
    a text in seconds. To be innovative the output text must be different from what
    is seen during pretraining (novelty) but also different from a simple variation
    (surprising). Since the decoding of an LLM has a [stochastic component](https://en.wikipedia.org/wiki/Stochastic_parrot),
    an LLM will accidentally insert variations into the generated text.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了与上述定义保持一致，我们可以将[创造性文本](https://en.wikipedia.org/wiki/Creative_writing)定义为一种令人惊讶的扩展，它不是对先前文本的简单变化或重新创作。[LLMs](https://www.ibm.com/think/topics/large-language-models)在广泛的文本语料库上进行了训练，给定一个指令，它们可以在几秒钟内生成文本。为了具有创新性，输出文本必须与预训练期间看到的文本不同（新颖性），同时也必须与简单的变化不同（令人惊讶）。由于LLM的解码具有[随机成分](https://en.wikipedia.org/wiki/Stochastic_parrot)，LLM可能会意外地将变化插入到生成的文本中。
- en: 'Defining a text as surprising is complex, but it is the focal point for defining
    the creativity of an LLM. Boden [2] defines three types of creativity with respect
    to surprise:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 将文本定义为令人惊讶是复杂的，但它是定义LLM创造性的焦点。Boden [2] 根据惊讶定义了三种类型的创造性：
- en: '**Combinatorial creativity**. Finding unfamiliar combinations of familiar ideas.
    For example, combining two genres that have not been combined previously.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**组合创造性**。寻找熟悉想法的不熟悉组合。例如，将两个以前未曾组合过的流派结合起来。'
- en: '**Exploratory creativity**. Finding new, unexplored solutions inside the current
    style of thinking. An example might be using an established narrative style, but
    introducing a unique twist within its confines (such as telling a classic love
    story from an unexpected point of view).'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**探索性创造力**。在当前思维模式中找到新的、未探索的解决方案。一个例子可能是使用一种已建立的叙事风格，但在其范围内引入独特的转折（例如，从一个意想不到的角度讲述经典的爱情故事）。'
- en: '**Transformational creativity**. Change the current style of thinking. Inventing
    a new way of presenting text, such as a novella written only of footnotes or an
    innovative chronological order (For example, the research work on new structures
    and patterns conducted by [OuLiPo](https://en.wikipedia.org/wiki/Oulipo)).'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**变革性创造力**。改变当前的思维模式。发明一种新的文本呈现方式，例如仅由脚注组成的小说或创新的编年顺序（例如，[OuLiPo](https://en.wikipedia.org/wiki/Oulipo)进行的新结构和模式研究）。'
- en: The [autoregressive](https://www.hopsworks.ai/dictionary/auto-regressive-models)
    nature of the models should not lead to generating anything surprising. Even if
    it has a stochastic component, the model follows the given distribution with which
    it was trained (the pretraining texts) [3]. On the other hand, if instructed an
    LLM can generate poetry about mathematical theorems, write a theorem in the style
    of Hemingway, and other examples that seem to meet the definition of surprise.
    In fact, on close inspection, they come across as trivial and generally repetitive
    [4].
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的[自回归](https://www.hopsworks.ai/dictionary/auto-regressive-models)性质不应导致生成任何令人惊讶的内容。即使它有一个随机成分，模型也会遵循它被训练的给定分布（预训练文本）[3]。另一方面，如果指示LLM可以创作关于数学定理的诗歌，用海明威的风格写定理，以及其他似乎符合惊讶定义的例子。实际上，在仔细观察下，它们显得微不足道且通常重复[4]。
- en: Recently, an article [5] took this issue further by trying to quantify the linguistic
    creativity of a text by reconstructing it from existing text snippets on the web.
    Human creativity is influenced by what we learn, but an author’s original text
    cannot be just attributed to some sources. If every text generated by an LLM can
    be mapped to other texts, it is overwhelming evidence of a lack of creativity.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，一篇[5]文章进一步探讨了这个问题，通过从网络上的现有文本片段中重建文本来尝试量化文本的语言创造力。人类的创造力受我们所学的影响，但作者的原文本不能仅仅归因于某些来源。如果每个由LLM生成的文本都可以映射到其他文本，这将是缺乏创造力的压倒性证据。
- en: '[**You’re Not a Writer, ChatGPT – But You Sound Like One.**](https://levelup.gitconnected.com/youre-not-a-writer-chatgpt-but-you-sound-like-one-75fa329ac3a9)'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**你不是作家，ChatGPT – 但你听起来像一位。**](https://levelup.gitconnected.com/youre-not-a-writer-chatgpt-but-you-sound-like-one-75fa329ac3a9)'
- en: '![image source: here](../Images/44d43b7fb2c14524b7fa85aed8fc9c80.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片来源：此处](../Images/44d43b7fb2c14524b7fa85aed8fc9c80.png)'
- en: 'image source: [here](https://arxiv.org/pdf/2410.04265)'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：[此处](https://arxiv.org/pdf/2410.04265)
- en: They showed that humans exhibit a higher level of creativity than LLMs in all
    tasks (based on unique word and sentence combinations). For the authors, that
    little unquantifiable creativity comes from stochastic processes or the fact that
    we do not know the [entire pretraining dataset](https://crfm.stanford.edu/fmti/).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 他们表明，在所有任务中（基于独特的单词和句子组合），人类在创造力方面都高于LLM。对于作者来说，那一点难以量化的创造力来自随机过程，或者我们不知道[整个预训练数据集](https://crfm.stanford.edu/fmti/)。
- en: '![image source: here](../Images/7e413c241d0cb31c0b022f67a8973789.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片来源：此处](../Images/7e413c241d0cb31c0b022f67a8973789.png)'
- en: 'image source: [here](https://arxiv.org/pdf/2410.04265)'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：[此处](https://arxiv.org/pdf/2410.04265)
- en: 'In conclusion, at present LLMs do not show creativity. According to some authors
    [6–7], creativity is not only what is achieved but also how. In other words, creativity
    is a process that requires: motivation, perception, learning, thinking, and communication
    [8]. Creativity is based on knowing and finding information, but also on transcending
    the status quo. This last step requires going beyond the imitation game (their
    auto-regressive nature), to explore and challenge the current view. These last
    steps require self-awareness, a purpose, self-assessment, and a model of the world.
    Some studies try to push toward these aspects, but at the same time, it means
    we are far from true creativity.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，目前LLM没有显示出创造力。根据一些作者[6–7]的观点，创造力不仅在于所取得的成果，还在于如何实现。换句话说，创造力是一个需要：动机、感知、学习、思考和沟通[8]的过程。创造力基于了解和寻找信息，但也在于超越现状。这一最后一步需要超越模仿游戏（它们的自回归性质），探索和挑战当前的观点。这些最后一步需要自我意识、目的、自我评估和世界观模型。一些研究试图推动这些方面，但同时也意味着我们离真正的创造力还很远。
- en: '[**How Far Is AI from Human Intelligence?**](https://levelup.gitconnected.com/how-far-is-ai-from-human-intelligence-6ab4b2a5ce1c)'
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**人工智能距离人类智能有多远？**](https://levelup.gitconnected.com/how-far-is-ai-from-human-intelligence-6ab4b2a5ce1c)'
- en: What conditions are important for LLM creativity?
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 哪些条件对LLM的创造力很重要？
- en: 'As we said above, LLMs are incapable of true creativity, but that does not
    mean we can’t improve the text quality they generate. We can describe three strategies
    with which to influence the output of a pre-trained LLM:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们上面所说的，LLM无法实现真正的创造力，但这并不意味着我们不能提高它们生成的文本质量。我们可以描述三种策略来影响预训练LLM的输出：
- en: Acting on the hyper-parameters of an LLM.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对LLM的超参数进行调整。
- en: Conducting additional training for an LLM.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对LLM进行额外的训练。
- en: Prompting strategy.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示策略。
- en: 'The first strategy is basically to alter the temperature of a model [9]:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 第一种策略基本上是改变模型的温度[9]：
- en: Temperature controls the uncertainty or randomness in the generation process,
    leading to more diverse outcomes by balancing probabilities for candidate words.
    – [source](https://arxiv.org/pdf/2405.00492)
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 温度控制生成过程中的不确定性和随机性，通过平衡候选词的概率来导致更多样化的结果。[来源](https://arxiv.org/pdf/2405.00492)
- en: '**Increasing the degree of randomness does not mean getting true creativity.**
    Adjusting the temperature affects how confident or exploratory the model is when
    selecting its next token (word, phrase, etc.). At low temperatures (e.g., 0.1–0.5),
    the model generates deterministic, focused, and predictable outputs (i.e., it
    selects the most likely tokens and thus regurgitates more closely what it saw
    during training).'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**增加随机程度并不意味着获得真正的创造力**。调整温度会影响模型在选择下一个标记（单词、短语等）时的自信程度或探索性。在低温（例如，0.1–0.5）下，模型生成确定性、专注和可预测的输出（即它选择最可能的标记，因此更接近于在训练期间看到的输出）。'
- en: With low temperatures, the model is repetitive, unoriginal, and sounds robotic
    but is more factually correct. With high temperatures (e.g., 0.7–1.5), the model
    generates more diverse and unpredictable text (during decoding it samples lower-probability
    tokens). Generally, choosing a high temperature is used for creative text or generating
    novel ideas. At a temperature higher than 2, the model generates chaotic and non-sensical
    text.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在低温下，该模型重复、缺乏原创性，听起来像机器人，但更符合事实。在高温（例如，0.7–1.5）下，模型生成的文本更加多样化和不可预测（在解码过程中它采样了低概率的标记）。通常，选择高温用于创作文本或生成新想法。当温度高于2时，模型生成的文本混乱且无意义。
- en: This study [9] analyzed what happens when a model is asked to generate a story
    using the same prompt but varying the [temperature](https://www.iguazio.com/glossary/llm-temperature/).
    As the temperature increases, they become more semantically diverse.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这项研究[9]分析了当模型被要求使用相同的提示但改变[温度](https://www.iguazio.com/glossary/llm-temperature/)来生成故事时会发生什么。随着温度的升高，它们在语义上变得更加多样化。
- en: '![image source: here](../Images/1bb2d4a9959a3fc12598b3ea677f9743.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片来源：此处](../Images/1bb2d4a9959a3fc12598b3ea677f9743.png)'
- en: 'image source: [here](https://arxiv.org/pdf/2405.00492)'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：[此处](https://arxiv.org/pdf/2405.00492)
- en: The increase in semantic difference does not mean either a difference in content
    or an increase in creativity. With the [temperature](https://www.ibm.com/think/topics/llm-temperature)
    increase, these stories may appear to be slightly more creative but lose consistency.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 语义差异的增加并不意味着内容上的差异或创造力的增加。随着[温度](https://www.ibm.com/think/topics/llm-temperature)的增加，这些故事可能看起来稍微更有创意，但会失去一致性。
- en: '![image source: here](../Images/d4c3708279f09ac07634e2e3e32c692b.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片来源：此处](../Images/d4c3708279f09ac07634e2e3e32c692b.png)'
- en: 'image source: [here](https://arxiv.org/pdf/2405.00492)'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：[此处](https://arxiv.org/pdf/2405.00492)
- en: In general, temperature does not allow the LLM to leverage different regions
    of the embedding space, but it does enable some novelty when generating limited
    samples (as is the case for any real-world application). We observe a weak positive
    correlation between temperature and novelty, and unsurprisingly, a negative correlation
    between temperature and coherence. Suggesting a tradeoff between novelty and coherence.
    – [souce](https://arxiv.org/pdf/2405.00492)
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 通常，温度不允许LLM利用嵌入空间的不同区域，但在生成有限样本时（正如任何实际应用的情况），它确实使一些新颖性成为可能。我们观察到温度与新颖性之间存在弱正相关，而与连贯性之间存在负相关，这并不令人惊讶。这表明新颖性和连贯性之间存在权衡。–
    [来源](https://arxiv.org/pdf/2405.00492)
- en: The authors [9] suggest that temperature does not allow one model to go beyond
    the training data distribution but leads the model to merely stochastically generate
    novel variations. This comes at a price; the output generated loses consistency.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 作者[9]建议，温度不允许模型超越训练数据分布，但只会导致模型随机生成新的变体。这付出了一定的代价；生成的输出失去了一致性。
- en: The second strategy means exploiting post-training strategies such as instruction
    tuning or alignment to human preference. However, techniques such as RLHF or DPO,
    reduce variety and thus often have the opposite effect [10]. The third strategy
    means altering the instructions contained in the prompt and does not affect the
    ability to go beyond data distribution. [Prompt engineering](https://en.wikipedia.org/wiki/Prompt_engineering)
    makes the model use better its acquired knowledge.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种策略意味着利用训练后策略，如指令调整或与人类偏好的对齐。然而，如RLHF或DPO等技术会减少多样性，因此往往会产生相反的效果[10]。第三种策略意味着改变提示中的指令，并且不影响超越数据分布的能力。[提示工程](https://en.wikipedia.org/wiki/Prompt_engineering)使模型更好地利用其获得的知识。
- en: Hallucinations as a creativity phenomenon
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 幻觉作为一种创造力现象
- en: In the previous sections, we have seen how LLMs are not inherently creative,
    and there are not many alternatives to overcome this limitation.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们已经看到LLM并非天生具有创造力，并且没有很多替代方案来克服这一限制。
- en: 'Classically, [hallucinations](https://github.com/SalvatoreRa/artificial-intelligence-articles/blob/main/articles/LLM_hallucinations.md)
    have been seen as a problem to be solved, but some authors [11–12] suggest that
    they can be looked at from another perspective: as creative phenomena.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，[幻觉](https://github.com/SalvatoreRa/artificial-intelligence-articles/blob/main/articles/LLM_hallucinations.md)被视为需要解决的问题，但一些作者[11-12]建议可以从另一个角度看待它们：作为创造力现象。
- en: Although hallucinations are not invariably detrimental, in certain instances,
    they can stimulate a model’s creativity. – [source](https://arxiv.org/pdf/2401.06792)
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 尽管幻觉并不总是有害的，但在某些情况下，它们可以刺激模型的创造力。– [来源](https://arxiv.org/pdf/2401.06792)
- en: '**[Hallucination](https://github.com/SalvatoreRa/artificial-intelligence-articles/blob/main/articles/LLM_hallucinations.md)
    is a factually incorrect output**. We could also see a hallucination as an unexpected
    element that might be of interest in creative writing. Or even might be useful
    for fields where factuality is required instead (such as the field of scientific
    research). In this paper [12] they note that "hallucinations" have historically
    led to scientific discoveries. For example, [heliocentrism](https://en.wikipedia.org/wiki/Heliocentrism)
    was considered a factual error, and proposing heliocentrism to solve the retrograde
    motion of the planets could be considered at the time as a kind of hallucination.
    Similarly, stochastic events led to revolutionary discoveries such as [penicillin](https://www.acs.org/education/whatischemistry/landmarks/flemingpenicillin.html).'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**[幻觉](https://github.com/SalvatoreRa/artificial-intelligence-articles/blob/main/articles/LLM_hallucinations.md)是事实错误的结果**。我们也可以将幻觉视为在创意写作中可能感兴趣的不预期的元素。或者甚至可能对需要事实性的领域（如科学研究领域）有用。在这篇论文[12]中，他们指出“幻觉”在历史上导致了科学发现。例如，[日心说](https://en.wikipedia.org/wiki/Heliocentrism)被认为是一个事实错误，而提出日心说以解决行星逆行运动在当时可能被视为一种幻觉。同样，随机事件导致了像[青霉素](https://www.acs.org/education/whatischemistry/landmarks/flemingpenicillin.html)这样的革命性发现。'
- en: '![image source: here](../Images/123bdb79d8d16d2ba830af3098325187.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片来源：此处](../Images/123bdb79d8d16d2ba830af3098325187.png)'
- en: 'image source: [here](https://arxiv.org/pdf/2402.06647)'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：[此处](https://arxiv.org/pdf/2402.06647)
- en: Research on human creativity indicates that creative thinking involves both
    the activation of the [left prefrontal cortex](https://en.wikipedia.org/wiki/Prefrontal_cortex)
    (implicated in imaginative thinking) and the [hippocampus](https://en.wikipedia.org/wiki/Hippocampus)
    (region important for memory) [13]. In other words, human creativity would be
    related to recombining learned information with an imaginative element. In [LLMs](https://arxiv.org/abs/2303.18223),
    hallucination could, therefore, introduce an imaginative element to the information
    recalled from the model.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 人类创造力的研究表明，创造性思维涉及[左前额叶皮层](https://en.wikipedia.org/wiki/Prefrontal_cortex)（与想象性思维有关）和[海马体](https://en.wikipedia.org/wiki/Hippocampus)（对记忆重要区域）的激活[13]。换句话说，人类的创造力可能与将学习信息与想象性元素重新组合有关。在[LLMs](https://arxiv.org/abs/2303.18223)中，幻觉可以因此向从模型中回忆的信息引入一个想象性元素。
- en: An example, in this study [14] shows that hallucinations can be used in a scientific
    field such as [drug discovery](https://en.wikipedia.org/wiki/Drug_discovery).
    The authors provide prompts that contain a molecule description and then ask the
    LLM to classify it by a certain chemical property. They provide either the prompt
    with a hallucinated description (or a description that does not contain them or
    a baseline). Paradoxically, adding a prompt with hallucinations seems to improve
    the performance of the model in the next task.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 本研究的例子[14]表明，幻觉可以在科学领域，如[药物发现](https://en.wikipedia.org/wiki/Drug_discovery)中使用。作者提供了包含分子描述的提示，然后要求LLM根据某种化学性质对其进行分类。他们提供了包含幻觉描述的提示（或不含它们的描述或基线）。矛盾的是，添加包含幻觉的提示似乎提高了模型在下一个任务中的性能。
- en: '![image source: here](../Images/b1fb8047b9097e3a69b1820365de43ec.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片来源：这里](../Images/b1fb8047b9097e3a69b1820365de43ec.png)'
- en: 'image source: [here](https://arxiv.org/pdf/2501.13824)'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：[这里](https://arxiv.org/pdf/2501.13824)
