- en: 1\. Introduction
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 引言
- en: Pollen classification is an interesting domain in visual image recognition,
    with a broad range of use cases across ecology and biotechnology, such as studies
    of plant populations, climate change, and pollen structure. Despite this, the
    subject is relatively unexplored, as few datasets have been composed of images
    of such pollens, and those that exist are often lackluster or otherwise insufficient
    for the training of a proper visual classifier or object detector, especially
    for images containing mixtures of various pollens. Besides providing a sophisticated
    visual identification model, our project aims to fill this gap with a custom-made
    dataset. Visual pollen classification is often complicated to solve without machine
    vision, as modern biologists are often incapable of differentiating between pollen
    of different plant species based on images alone. This makes the task of quickly
    and efficiently recognising harvested pollens extremely challenging, provided
    the pollen particles’ source is unknown beforehand.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 花粉分类是视觉图像识别中的一个有趣领域，在生态学和生物技术领域有广泛的应用案例，例如植物种群研究、气候变化和花粉结构。尽管如此，这个主题相对较少被探索，因为很少有数据集是由这种花粉的图像组成的，而且那些存在的数据集通常质量不高或不足以训练合适的视觉分类器或对象检测器，尤其是对于含有各种花粉混合物的图像。除了提供复杂的视觉识别模型外，我们的项目旨在通过定制的数据集来填补这一空白。在没有机器视觉的情况下，视觉花粉分类通常很难解决，因为现代生物学家通常无法仅根据图像区分不同植物种类的花粉。这使得在花粉粒来源事先未知的情况下，快速有效地识别收获的花粉变得极具挑战性。
- en: 1.1 Available Datasets of Pollen Images
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1 可用的花粉图像数据集
- en: This section highlights the parameters of several freely available datasets
    and compares them to the properties of our custom set.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 本节重点介绍了几个免费数据集的参数，并将它们与我们的定制集的特性进行了比较。
- en: Dataset 1
  id: totrans-23
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据集1
- en: '**Link:** [https://www.kaggle.com/datasets/emresebatiyolal/pollen-image-dataset](https://www.kaggle.com/datasets/emresebatiyolal/pollen-image-dataset)
    **Number of classes:** 193'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**链接:** [https://www.kaggle.com/datasets/emresebatiyolal/pollen-image-dataset](https://www.kaggle.com/datasets/emresebatiyolal/pollen-image-dataset)
    **类别数量:** 193'
- en: '**Images per class:** 1-16'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**每类图像数量:** 1-16'
- en: '**Image quality:** Separated, clear images, sometimes with labelings'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像质量:** 分离的清晰图像，有时带有标签'
- en: '**Image colour:** Various'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像颜色:** 各种'
- en: '**Notes:** The dataset seems composed of incongruent images taken from multiple
    sources. While broad in classes, each contains only several photos, insufficient
    for training any image detection model.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意:** 数据集似乎由来自多个来源的不一致图像组成。虽然类别广泛，但每个类别只包含几张照片，不足以训练任何图像检测模型。'
- en: Dataset 2
  id: totrans-29
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据集2
- en: '**Link:** [https://www.kaggle.com/datasets/andrewmvd/pollen-grain-image-classification](https://www.kaggle.com/datasets/andrewmvd/pollen-grain-image-classification)
    **Number of classes:** 23'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**链接:** [https://www.kaggle.com/datasets/andrewmvd/pollen-grain-image-classification](https://www.kaggle.com/datasets/andrewmvd/pollen-grain-image-classification)
    **类别数量:** 23'
- en: '**Images per class:** 35, 1 class 20'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**每类图像数量:** 35，1 个类别 20'
- en: '**Image quality:** Well separated, slightly blurry, no text on images'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像质量:** 图像分离良好，略微模糊，图像上无文字'
- en: '**Image colour:** Uncoloured, consistent'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像颜色:** 未染色，一致'
- en: '**Notes:** Localised, well-prepared dataset for the classification of Brazilian
    Savannah pollen. Consistent image source, yet the number of images per class may
    pose issues when aiming for high accuracy.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意事项:** 用于巴西萨凡纳花粉分类的本地化、准备良好的数据集。图像来源一致，但每个类别的图像数量在追求高精度时可能存在问题。'
- en: Dataset 3
  id: totrans-35
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据集 3
- en: '**Link:** [https://www.kaggle.com/datasets/nataliakhanzhina/pollen20ldet](https://www.kaggle.com/datasets/nataliakhanzhina/pollen20ldet)
    **Number of classes:** 20'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**链接:** [https://www.kaggle.com/datasets/nataliakhanzhina/pollen20ldet](https://www.kaggle.com/datasets/nataliakhanzhina/pollen20ldet)
    **类别数量:** 20'
- en: '**Images per class: Exorbitant****Image quality:** Self-explanatory images,
    with separated and joined pollen images.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**每类图像数量:** 过量**图像质量:** 自解释图像，分离和连接的花粉图像。'
- en: '**Image colour:** Dyed, consistent'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像颜色:** 染色，一致'
- en: '**Notes:** An insurmountable amount of well-labeled, consistent, and high-quality
    images make this dataset of the highest quality. However, the colouring present
    may be an issue in specific applications. Additionally, the magnification and
    ability of the pollens to intersect may pose problems in mixed-pollen scenarios.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意事项:** 大量难以超越的高质量、一致且标注良好的图像使该数据集质量最高。然而，存在的染色可能在某些特定应用中成为问题。此外，放大倍数和花粉交叉的能力可能在混合花粉场景中引起问题。'
- en: 2\. New Dataset of Pollen Images
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 新的 pollen 图像数据集
- en: 'Our dataset is a collection of high-quality microscope images of 4 different
    classes of pollens belonging to common fruit plants: the European gooseberry,
    the haskap berry, the blackcurrant, and the shadbush. These plant species have
    not been part of any previous dataset, so our dataset contributes new data towards
    visual pollen classification.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的数据集是 4 种常见水果植物（欧洲覆盆子、车厘子、黑加仑和草莓属）的花粉的显微镜高质量图像集合。这些植物种类之前没有包含在任何数据集中，因此我们的数据集为视觉花粉分类贡献了新的数据。
- en: Each class contains 200 images of multiple grains of pollen, each image without
    dye. It was obtained in collaboration with the National Institute of Horticultural
    Research in Skierniewice, Poland.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 每个类别包含 200 张不同花粉粒的图像，每张图像未染色。这些图像是在与波兰斯基埃纽维采的国家园艺研究所合作下获得的。
- en: '**Number of classes:** 5 (4 pollens + mixed)'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**类别数量:** 5（4 种花粉 + 混合）'
- en: '**Images per class:** ~200'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**每类图像数量:** ~200'
- en: '**Image quality:** Clear images, images contain multiple pollen fragments,
    mixed images present'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像质量:** 清晰图像，图像包含多个花粉碎片，存在混合图像'
- en: '**Image colour:** Undyed, consistent'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像颜色:** 未染色，一致'
- en: Our dataset focuses on locally available pollens, class balance, and an abundance
    of images to train on without added dye, which may make the classifier unsuitable
    for some tasks. Additionally, our proposed solution contains images with mixtures
    of different pollen types, aiding in training detection models for field-collection
    applications. Exemplary images from the dataset are represented as Figures 1-4.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的数据集专注于本地可用的花粉、类别平衡以及大量未添加染料的图像，这些图像可用于训练，可能使分类器不适合某些任务。此外，我们提出的解决方案包含不同类型花粉混合的图像，有助于训练用于现场收集应用的检测模型。数据集中的示例图像以图
    1-4 表示。
- en: '![](../Images/7df6eea547ab101b2eeb318bc69e19f8.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7df6eea547ab101b2eeb318bc69e19f8.png)'
- en: '**Fig. 1** — An example image in the dataset – gooseberry class.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 1** — 数据集中的示例图像 – 覆盆子属。'
- en: '![](../Images/bf6f2cdc95d3388efe2247adb83b0da4.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bf6f2cdc95d3388efe2247adb83b0da4.png)'
- en: '**Fig. 2** — An example image in the dataset — haskap berry class.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 2** — 数据集中的示例图像 — 车厘子属。'
- en: '![](../Images/f4caeb336555549c4649e8f54344be2e.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f4caeb336555549c4649e8f54344be2e.png)'
- en: '**Fig. 3** — An example image in the dataset —blackcurrant.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 3** — 数据集中的示例图像 — 黑加仑。'
- en: '![](../Images/5b022579d053b7a906ac3c3a98a837d0.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5b022579d053b7a906ac3c3a98a837d0.png)'
- en: '**Fig. 4** — An example image in the dataset —shadbush class.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 4** — 数据集中的示例图像 — 草莓属。'
- en: The full dataset is available from the corresponding author on reasonable request.
    The data acquisition steps are composed of the sample preparation and taking microscopic
    images, which were prepared by Professor Agnieszka Marasek-Ciołakowska and Ms.
    Aleksandra Machlańska from the Department of Applied Biology at The National Institute
    of Horticultural Research, for which we are very thankful. Their efforts have
    proven invaluable for the success of our project.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 整个数据集可以从相应的作者处合理请求获得。数据采集步骤包括样本准备和显微图像的拍摄，这些图像由国家园艺研究所应用生物学系的 Agnieszka Marasek-Ciołakowska
    教授和 Aleksandra Machlańska 女士准备，我们对此非常感激。他们的努力对我们项目的成功至关重要。
- en: 3\. Extraction of Individual Pollen Images
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 提取单个花粉图像
- en: We first extracted images of individual pollens from the photos in our datasets
    to train various models to recognize pollens. Each of those photos contained multiple
    pollens and other lifeforms and pollution, making identifying the pollen species
    far more difficult. We used the YOLOv12 model, a cutting-edge attention-centric
    real-time object detection model developed by Ultralytics.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先从数据集中的照片中提取单个花粉图像来训练各种模型以识别花粉。每张照片都包含多个花粉和其他生物形态以及污染，这使得识别花粉种类变得更加困难。我们使用了
    YOLOv12 模型，这是一个由 Ultralytics 开发的尖端关注实时目标检测模型。
- en: 3.1 Fine-Tuning YOLOv12
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1 微调 YOLOv12
- en: 'Thanks to YOLOv12’s innovative nature, it can be trained even on tiny datasets.
    We experienced this phenomenon firsthand. To prepare our own dataset, we manually
    labeled the pollens’ locations on ten images in each of the four classes of our
    dataset using [CVAT](https://www.cvat.ai/), later exporting the labels into .txt
    files corresponding to individual images. Then, we organized our data into a YOLOv12-appropriate
    format: we divided our data into a training set (7 image-label pairs per class,
    in total 28) and a validation set (3 image-label pairs per class, in total 12).
    We added a .yaml file pointing towards our dataset. It can be noticed that the
    dataset was truly very small. The resulting image in prediction mode with detected
    individual pollens with the confidence overlay is represented as Fig. 5\. We also
    downloaded the model (YOLO12s) from the [YOLOv12 website](https://docs.ultralytics.com/models/yolo12/).
    Then we started the training.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了 YOLOv12 的创新性，它甚至可以在很小的数据集上进行训练。我们亲身体验了这种现象。为了准备我们自己的数据集，我们使用 [CVAT](https://www.cvat.ai/)
    在数据集的四个类别中的每十个图像上手动标注了花粉的位置，后来将这些标签导出为与单个图像对应的 .txt 文件。然后，我们将数据组织成 YOLOv12 适当的格式：我们将数据分为训练集（每类
    7 个图像-标签对，总计 28 个）和验证集（每类 3 个图像-标签对，总计 12 个）。我们添加了一个指向数据集的 .yaml 文件。可以注意到，数据集实际上非常小。预测模式下检测到的单个花粉图像及其置信度叠加的图像表示为图
    5。我们还从 [YOLOv12 网站](https://docs.ultralytics.com/models/yolo12/) 下载了模型（YOLO12s）。然后我们开始了训练。
- en: '![](../Images/ed8f05bbbe0d9e6e432f820934c3e054.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ed8f05bbbe0d9e6e432f820934c3e054.png)'
- en: '**Fig. 5** — The model’s output for an example image from the dataset.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 5** — 模型对数据集中示例图像的输出。'
- en: 'The model proved to detect pollens with very high accuracy, but there was one
    more thing to consider: the model’s confidence. For every detected pollen, the
    model also outputted a value of how specific its prediction is. We had to decide
    whether to use a lower threshold for confidence (more images, but higher risk
    of malformed or non-pollen photos) or a higher one (fewer images, but lower chance
    of non-pollen). We eventually settled on trying out two thresholds, 0.8 and 0.9
    to evaluate which one would work better when training classification models.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型被证明能够以非常高的精度检测花粉，但还有一件事需要考虑：模型的置信度。对于每个检测到的花粉，模型还输出了一个值，表示其预测的特定程度。我们必须决定是否使用较低的置信度阈值（更多图像，但存在更多图像损坏或非花粉照片的风险）或较高的阈值（较少图像，但非花粉的可能性较低）。我们最终决定尝试两个阈值，0.8
    和 0.9，以评估在训练分类模型时哪一个会更好。
- en: 3.2 Exporting the individual-pollen datasets
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2 导出单个花粉数据集
- en: 'To do this, we launched the model’s prediction on all of the class-specific
    images in our dataset. This worked very well, but after exporting, we encountered
    another issue — some photos were cropped, even on higher thresholds. For this
    reason, we added another step before exporting our individual pollens: we eliminated
    images with a disproportionate aspect ratio (see example as Fig. 6). Specifically,
    0.8, dividing the smaller dimension by the larger one.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，我们在数据集中所有特定类别的图像上启动了模型的预测。这效果非常好，但在导出后，我们遇到了另一个问题——即使在更高的阈值下，一些照片也被裁剪了。因此，在我们导出单个花粉之前，我们增加了一个步骤：我们消除了具有不成比例的宽高比的图像（见图6）。具体来说，0.8是将较小的一边除以较大的一边。
- en: '![](../Images/8ccfe4f3d9ac71240839a5a62f906615.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8ccfe4f3d9ac71240839a5a62f906615.png)'
- en: '**Fig. 6** – An example of a badly cropped image. Such images in the dataset
    would negatively impact the performance of classification models.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**图6** – 一个严重裁剪的图像示例。数据集中的此类图像会负面影响分类模型的性能。'
- en: Then, we resized all the images into 224×224, the standard dimension for input
    images for deep learning models.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将所有图像调整大小为224×224，这是深度学习模型输入图像的标准尺寸。
- en: 3.3 Individual-pollen datasets — a short analysis
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3 单个花粉数据集——简要分析
- en: 'We ended up with two datasets, one made with a confidence threshold of 0.8
    and the other with 0.9:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最终得到了两个数据集，一个是以0.8置信度阈值创建的，另一个是以0.9置信度阈值创建的：
- en: '**0.8 Threshold:**'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0.8 阈值：**'
- en: gooseberry — 7788 images
  id: totrans-72
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 越橘 — 7788 张图像
- en: haskap berry — 3582 images
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 越橘莓 — 3582 张图像
- en: blackcurrant — 4637 images
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 黑加仑 — 4637 张图像
- en: shadbush — 4140 images
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 柳叶菜 — 4140 张图像
- en: '**Total — 20147 images**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**总计 — 20147 张图像**'
- en: '**0.9 Threshold:**'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0.9 阈值：**'
- en: gooseberry — 2301 images
  id: totrans-78
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 越橘 — 2301 张图像
- en: haskap berry — 2912 images
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 越橘莓 — 2912 张图像
- en: blackcurrant — 2438 images
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 黑加仑 — 2438 张图像
- en: shadbush —1432 images
  id: totrans-81
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 柳叶菜 — 1432 张图像
- en: '**Total — 9083 images**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**总计 — 9083 张图像**'
- en: A quick look at the numbers shows that the 0.9 threshold dataset is over **twice
    as small** as the 0.8 threshold one. Both datasets are **not balanced** — the
    0.8 one due to gooseberry and the 0.9 one due to shadbush.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 乍一看这些数字，我们可以看出0.9阈值数据集比0.8阈值数据集小**两倍多**。这两个数据集**都不平衡**——0.8阈值的数据集由于越橘而造成，0.9阈值的数据集由于柳叶菜而造成。
- en: YOLOv12 was an effective tool for segmenting our images into two single-pollen
    image datasets, even though we encountered some difficulties. The newly created
    datasets may be unbalanced, yet their size should compensate for this drawback,
    mainly since every class is widely represented. There is a lot of potential in
    them for future training of classification models, but we will have to see for
    ourselves.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们遇到了一些困难，但YOLOv12仍然是一个有效的工具，可以将我们的图像分割成两个单花粉图像数据集。新创建的数据集可能不平衡，但它们的大小应该可以弥补这一缺点，主要是因为每个类别都有广泛的代表性。它们在未来的分类模型训练中具有很大的潜力，但我们自己将不得不看看结果。
- en: 4\. Classification of Individual Pollen Images
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 单个花粉图像的分类
- en: 4.1 An Overview of Model Rating Metrics
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1 模型评分指标概述
- en: One must devise metrics to measure performance to properly approach training
    models, whether classical ones working on statistical features, or more complex
    approaches, such as convolutional neural networks or vision transformers. Through
    the years, many methods have been devised for accomplishing these tasks — from
    statistical measures such as F1, precision, or recall, to more visual metrics
    such as GradCAM, that allow a deeper insight into the model’s inner workings.
    This article explores the grading methods used by our models, without going into
    unnecessary detail.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 为了正确地训练模型，无论是基于统计特征的经典模型，还是更复杂的卷积神经网络或视觉转换器等方法，都必须设计出衡量性能的指标。多年来，已经设计了多种方法来完成这些任务——从统计指标如F1、精确度或召回率，到更直观的指标如GradCAM，这些指标可以更深入地了解模型的内部工作原理。本文探讨了我们的模型使用的评分方法，而没有涉及不必要的细节。
- en: Recall
  id: totrans-88
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 召回率
- en: Recall is described as the ratio of accurate guesses of one class to the total
    guesses of that class (see Eq. 1). It measures what percentage of images marked
    as a class belong to it. Working on separate classes makes it functional in both
    balanced and imbalanced datasets.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 召回率被描述为某一类准确猜测与该类总猜测的比率（见公式1）。它衡量标记为某一类的图像中有多少百分比属于该类。在单独处理类别的情况下，它在平衡和不平衡的数据集中都很有用。
- en: '![](../Images/6197fb2d685bc619355700d770502828.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6197fb2d685bc619355700d770502828.png)'
- en: '**Eq. 1**— Formula for recall.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**公式 1**— 召回率的公式。'
- en: Precision
  id: totrans-92
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 精确度
- en: As opposed to recall, precision is the percentage of correctly marked items
    among all items belonging to the class (see Eq. 2). It measures the percentage
    of items in a class that were guessed correctly. This metric performs similarly
    to recall.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 与召回率不同，精确率是所有属于该类别的项目中被正确标记的项目百分比（见公式2）。它衡量一个类别中被正确猜测的项目百分比。这个指标与召回率的表现相似。
- en: '![](../Images/dcd8709fc5d731d0cdaf6173b30cb6fa.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dcd8709fc5d731d0cdaf6173b30cb6fa.png)'
- en: '**Eq. 2** — Formula for precision.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**公式2** — 精确率的公式。'
- en: F1 Score
  id: totrans-96
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: F1分数
- en: The F1 Score is simply the harmonic mean of precision and recall (see Eq. 3).
    It helps combine precision and recall into a concise measurement. Hence, it still
    performs excellently even on unbalanced datasets.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: F1分数是精确率和召回率的调和平均值（见公式3）。它有助于将精确率和召回率结合成一个简洁的度量。因此，即使在数据不平衡的数据集中，它仍然表现出色。
- en: '![](../Images/e676f8ee5bd640c0dd96355136966a48.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e676f8ee5bd640c0dd96355136966a48.png)'
- en: '**Eq. 3** — Formula for F1.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**公式3** — F1的公式。'
- en: Confusion Matrix
  id: totrans-100
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 混淆矩阵
- en: The confusion matrix is a visual measure comparing the number of guesses made
    for one class to the actual number of images in this class. It helps to illustrate
    mistakes made by the model, which may have trouble with only specific courses
    (see Fig. 7).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 混淆矩阵是一种视觉度量，用于比较对某一类别的猜测数量与该类别中实际图像数量的比较。它有助于说明模型在特定课程上可能遇到的错误（见图7）。
- en: '![](../Images/b5a062e5b5bd48d4538a319a3875b3fd.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b5a062e5b5bd48d4538a319a3875b3fd.png)'
- en: '**Fig. 7** — An example of a confusion matrix.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**图7** — 混淆矩阵的一个示例。'
- en: GradCAM
  id: totrans-104
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: GradCAM
- en: GradCAM is a measure of CNN performance that visualises which areas of the image
    influence the prediction. To do this, the method computes the gradients from 1
    convolutional layer and determines an activation map that visually layers on top
    of the image. It greatly aids in understanding and explaining the model’s “reasons”
    for labelling a particular image as a specific class (see example in Fig. 8).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: GradCAM是一种衡量CNN性能的度量，它可视化图像的哪些区域影响了预测。为此，该方法计算从1个卷积层来的梯度，并确定一个激活图，该图在图像上可视地叠加。它极大地有助于理解和解释模型将特定图像标记为特定类别的“原因”（见图8中的示例）。
- en: '![](../Images/ddaaefb9cb660dd7090054325946ed4c.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ddaaefb9cb660dd7090054325946ed4c.png)'
- en: '**Fig. 8** — An example of a GradCAM featuring an image of a dog.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**图8** — 一个GradCAM的示例，展示了一只狗的图像。'
- en: These metrics are only a few of a vast sea of measurements and visualisation
    methods used in machine learning. Yet, they have proven sufficient for measuring
    the performance of the model. In further articles, metrics will be brought up
    accordingly as new classifiers are used and introduced in the project.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标只是机器学习中使用的众多测量和可视化方法中的一小部分。然而，它们已经证明足以衡量模型的性能。在未来的文章中，随着新分类器的使用和项目中的引入，将相应地提出这些指标。
- en: 4.2 Individual Pollen Classification with Standard Models
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2 使用标准模型进行单个花粉分类
- en: 'With our images preprocessed, we could move on to the next stage: classifying
    individual pollen into species. We tried three approaches - standard, simple classifiers
    based on features extracted from images, Convolutional Neural Networks, and Vision
    Transformers. This article outlines our work on standard models, including the
    kNN classifier, SVMs, MLPs, and Random Forests.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们对图像进行预处理后，我们可以进入下一阶段：将单个花粉分类到物种。我们尝试了三种方法——基于从图像中提取的特征的标准分类器、卷积神经网络和视觉Transformer。本文概述了我们在标准模型上的工作，包括kNN分类器、SVMs、MLPs和随机森林。
- en: Feature extraction
  id: totrans-111
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 特征提取
- en: 'To make our classifiers work, we first had to obtain features on which they
    could base their predictions. We settled for two main types of features. One was
    statistical measures based on the presence of pixels with a particular colour
    (one from the RGB model) for a specific image, such as the mean, standard deviation,
    median, quantiles, skew, and kurtosis — we extracted them for every color layer.
    The other was GLCM (Gray Level Co-Occurrence Matrix) features: contrast, dissimilarity,
    homogeneity, energy, and correlation. Those were obtained from grayscale-converted
    images, and we extracted each at different angles. Every single image had 21 statistical
    features and 20 GLCM-based features, which amounts to 41 features per image.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让我们的分类器工作，我们首先必须获得它们可以基于其进行预测的特征。我们选择了两种主要类型的特征。一种是基于特定颜色（来自RGB模型）像素存在与否的统计度量，例如特定图像的均值、标准差、中位数、分位数、偏度和峰度——我们为每个颜色层提取了它们。另一种是GLCM（灰度级共生矩阵）特征：对比度、差异度、同质性、能量和相关性。这些是从灰度转换图像中获得的，我们在不同的角度提取了每个特征。每张图像都有21个统计特征和20个基于GLCM的特征，总计每张图像41个特征。
- en: k-Nearest-Neighbors (kNN)
  id: totrans-113
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: k-Nearest-Neighbors (kNN)
- en: The kNN is a classifier that uses a spatial representation of data to classify
    data by detecting the k nearest neighbours of a feature to predict its label.
    The said classifier is fast, yet other methods outperform it.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: kNN是一种分类器，它使用数据的空间表示来通过检测特征点的k个最近邻来预测其标签。这种分类器速度快，但其他方法的表现优于它。
- en: '**kNN Metrics: **'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '**kNN度量: **'
- en: '**0.8 Dataset:**'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '**0.8 数据集:**'
- en: 'F1: 0.6454'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 'F1: 0.6454'
- en: 'Precision: 0.6734'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '精确率: 0.6734'
- en: 'Recall: 0.6441'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '召回率: 0.6441'
- en: '**0.9 Dataset:**'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**0.9 数据集:**'
- en: 'F1: 0.6961'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 'F1: 0.6961'
- en: 'Precision: 0.7197'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '精确率: 0.7197'
- en: 'Recall: 0.7151'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '召回率: 0.7151'
- en: Support Vector Machine (SVM)
  id: totrans-124
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 支持向量机（SVM）
- en: Like the kNN, the SVM represents data as points in a multi-dimensional space.
    Still, instead of finding nearest neighbours, it tries algorithmically separating
    the data with a hyperplane. This yields better results than the kNN, but introduces
    randomness and is still outclassed by other solutions.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 与kNN类似，SVM将数据表示为多维空间中的点。然而，它不是寻找最近邻，而是通过超平面算法性地分离数据。这比kNN的结果更好，但引入了随机性，并且仍然被其他解决方案超越。
- en: '**SVM Metrics:**'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '**SVM度量:**'
- en: '**0.8 Dataset:**'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '**0.8 数据集:**'
- en: 'F1: 0.6952'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 'F1: 0.6952'
- en: 'Precision: 0.7601'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '精确率: 0.7601'
- en: 'Recall: 0.7025'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '召回率: 0.7025'
- en: '**0.9 Dataset:**'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**0.9 数据集:**'
- en: 'F1: 0.8556'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 'F1: 0.8556'
- en: 'Precision: 0.8687'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '精确率: 0.8687'
- en: 'Recall: 0.8597'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '召回率: 0.8597'
- en: Multi-Layered Perceptron (MLP)
  id: totrans-135
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 多层感知器（MLP）
- en: The Multi-Layered Perceptron is a model inspired by the human brain and its
    neurons. It passes inputs through a network of layers of neurons with their own
    individual weights, which are altered during training. When well-optimized, this
    model can sometimes achieve great results for a standard classifier. Still, pollen
    recognition was not one of them - it performed poorly compared to other solutions
    and was not consistent.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 多层感知器（Multi-Layered Perceptron）是一种受人类大脑及其神经元启发的模型。它通过具有各自权重的神经元层网络传递输入，这些权重在训练过程中会发生变化。当优化良好时，这种模型有时可以实现对标准分类器的大幅提升。然而，花粉识别并不是其中之一——与其他解决方案相比，它的表现不佳，并且不一致。
- en: '**MLP Metrics:**'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '**MLP度量:**'
- en: '**0.8 Dataset:**'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '**0.8 数据集:**'
- en: 'F1: 0.8131'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 'F1: 0.8131'
- en: 'Precision: 0.8171'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '精确率: 0.8171'
- en: 'Recall: 0.8173'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '召回率: 0.8173'
- en: '**0.9 Dataset:**'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '**0.9 数据集:**'
- en: 'F1: 0.7841'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 'F1: 0.7841'
- en: 'Precision: 0.8095'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '精确率: 0.8095'
- en: 'Recall: 0.7940'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '召回率: 0.7940'
- en: Random Forest
  id: totrans-146
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 随机森林
- en: The random forest is a model famous for its explainability - it is based on
    decision trees, which classify data based on thresholds, which humans can analyze
    far more easily than, for instance, weights in neural networks. The Random Forest
    performed fairly well and consistently - we found that 200 trees was optimal.
    Still, it was outclassed by more complex classifiers.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 随机森林（random forest）是一种以其可解释性而闻名的模型——它基于决策树，根据阈值对数据进行分类，而人类比分析神经网络中的权重更容易分析。随机森林表现相当好且一致——我们发现200棵树是最佳选择。然而，它仍然被更复杂的分类器超越。
