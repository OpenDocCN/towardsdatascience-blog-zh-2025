- en: The classical models exhibited varied performance levels- some performed worse
    than expected, whereas others delivered fairly good metrics. However, this is
    not yet the end. We still have advanced deep learning models to try out, such
    as Convolutional Neural Networks and Vision Transformers. We expect that they
    will perform significantly better.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的模型表现出不同的性能水平——一些表现不如预期，而另一些则提供了相当好的指标。然而，这还不是终点。我们仍然有先进的深度学习模型要尝试，例如卷积神经网络和视觉Transformer。我们预计它们将表现出显著更好的性能。
- en: 4.3 Individual Pollen Classification with Convolutional Neural Networks
  id: totrans-158
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3 使用卷积神经网络进行单个花粉分类
- en: Classical models such as MLPs, Random Forests, or SVMs in individual pollen
    classification yielded mediocre to pretty good results. However, the next approach
    we decided to try was Convolutional Neural Networks (CNNs). They are models that
    generate features by processing images and are known for their effectiveness.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在单个花粉分类中，传统的模型如MLPs、随机森林或SVMs得到了中等到相当好的结果。然而，我们决定尝试的下一个方法是卷积神经网络（CNNs）。它们是通过处理图像来生成特征的模型，并且以其有效性而闻名。
- en: Instead of training CNNs from scratch, we used a transfer learning technique
    — we took pre-trained models, specifically ResNet50 and ResNet152, and fine-tuned
    them to our dataset. This approach makes training significantly faster and less
    resource-demanding. It also allows for far more effective classification due to
    the models’ already being professionally trained on large datasets. Before training,
    we also had to normalize the images.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 我们没有从头开始训练CNNs，而是使用了迁移学习技术——我们使用了预训练的模型，特别是ResNet50和ResNet152，并将它们微调到我们的数据集上。这种方法使训练显著更快，资源需求更低。它还由于模型已经在大型数据集上进行了专业训练，因此允许进行更有效的分类。在训练之前，我们还必须对图像进行归一化。
- en: In terms of metrics, we used Grad-CAM, a method that attempts to highlight the
    areas of an image that influenced a model’s prediction the most, in addition to
    standard metrics such as F1 score, precision, and recall. We also included confusion
    matrices to see if our CNNs struggle with any particular class.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在指标方面，我们使用了Grad-CAM，这是一种试图突出显示影响模型预测最多的图像区域的算法，除了标准指标如F1分数、精确度和召回率之外。我们还包含了混淆矩阵，以查看我们的CNNs是否在特定类别上遇到困难。
- en: ResNet50
  id: totrans-162
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ResNet50
- en: ResNet50 is a CNN architecture developed by Microsoft Research Asia in 2015,
    which was a significant step towards creating far deeper and more efficient neural
    networks. It is a residual network (hence the name ResNet) that uses skip connections
    to allow direct data flow. This, in turn, mitigates the vanishing gradient problem.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: ResNet50是由微软亚洲研究院于2015年开发的一种CNN架构，这是创建更深、更高效神经网络的重要一步。它是一个残差网络（因此得名ResNet），使用跳过连接来允许直接数据流。这反过来又减轻了梯度消失问题。
- en: We expected this model to perform worse than ResNet152\. Our expectations were
    quickly subverted as the model delivered predictions on the same level as ResNet152
    on both datasets, as represented in the below-listed metrics and confusion metrics
    (see Fig. 9 and Fig. 10), as well as Grad-Cam visualization (see Fig. 11).
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 我们原本预期这个模型的性能会比ResNet152差。然而，我们的预期很快就被颠覆了，因为该模型在两个数据集上对ResNet152的预测水平相同，如以下列出的指标和混淆矩阵（见图9和图10）以及Grad-Cam可视化（见图11）所示。
