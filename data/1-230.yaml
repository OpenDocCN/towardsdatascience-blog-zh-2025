- en: Regarding Grad-CAM, it did not provide any valuable insights about the model’s
    inner workings - the highlighted zones included the background and seemingly random
    places. Because it achieves very high accuracy, the network appears to notice
    patterns undetectable by the human eye.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 关于Grad-CAM，它并没有提供关于模型内部工作原理的任何有价值的见解——突出显示的区域包括背景和看似随机的位置。因为它实现了非常高的准确度，所以网络似乎注意到了人类眼睛无法检测到的模式。
- en: ResNet152
  id: totrans-181
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ResNet152
- en: Also a development of Microsoft’s researchers, the ResNet152 is a residual network
    and a CNN architecture with significant depth and deep learning capabilities far
    exceeding those of the ResNet50.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，ResNet152也是微软研究人员的成果，它是一个具有显著深度和深度学习能力远超ResNet50的残差网络和CNN架构。
- en: Therefore, our expectations for this model were higher than for ResNet50\. We
    were disappointed to see that it performed on par with it. It performed excellently
    (see Fig. 12 and Fig. 13 with confusion matrices and Fig. 14 with Grad-Cam visualizations).
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们对这个模型的期望高于ResNet50。我们失望地看到它的表现与它相当。它表现得非常出色（见图12和图13的混淆矩阵以及图14的Grad-CAM可视化）。
