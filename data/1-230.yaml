    datasets, respectively.'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: '**图14** — 分别来自0.8和0.9数据集的随机图像的Grad-CAM结果。'
- en: Grad-CAM was not helpful for ResNet152 either - we experienced the enigmatic
    nature of deep learning models, which achieve high accuracy but cannot be explained
    easily.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: Grad-CAM对ResNet152也没有帮助——我们体验到了深度学习模型的神秘本质，这些模型虽然准确度高，但难以轻易解释。
- en: We were surprised that the more complex ResNet152 did not outperform the ResNet50
    on the 0.9 dataset. Both achieved the highest metrics out of any models we have
    tried so far - they trumped the classical models, with the difference between
    the best classical model and the CNNs exceeding 10 percentage points. It is time
    to test the most innovative model - the Vision Transformer.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 我们很惊讶，更复杂的ResNet152在0.9数据集上并没有优于ResNet50。它们都达到了我们迄今为止尝试过的任何模型中最高的指标——它们超越了经典模型，最佳经典模型与CNN之间的差距超过了10个百分点。是时候测试最具创新性的模型——视觉Transformer了。
- en: 4.4 Individual Pollen Classification with Vision Transformers
  id: totrans-201
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.4 使用视觉Transformer进行单个花粉分类
- en: For individual pollen classification, we tried out simple models, which provided
    a varied level of performance, from insufficient to satisfactory. Then, we implemented
    convolutional neural networks, which completely trumped their performance. Now
    it is time for us to try out the innovative model known as the Vision Transformer.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 对于单个花粉分类，我们尝试了简单的模型，这些模型提供了不同层次的表现，从不足到满意。然后，我们实现了卷积神经网络，这完全超越了它们的性能。现在是我们尝试创新模型——视觉Transformer的时候了。
- en: Transformers, in general, originate from the famous 2017 paper “Attention Is
    All You Need” by researchers at Google, but they were initially used mainly for
    natural language processing. In 2020, the transformer architecture was applied
    in computer vision, yielding the ViT — Vision Transformer. Its excellent performance
    marked the beginning of the end for Convolutional Neural Networks’ reign in the
    area.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 通常来说，Transformer起源于谷歌研究人员在2017年发表的著名论文“Attention Is All You Need”，但它们最初主要用于自然语言处理。2020年，Transformer架构被应用于计算机视觉，产生了ViT——视觉Transformer。其卓越的性能标志着卷积神经网络在该领域统治地位的终结。
- en: 'Our approach here was similar to what we used when training CNNs. We imported
    a pre-trained model: vit-base-patch16–224-in21k, a model trained on ImageNet-21k.
    Then, we normalized our dataset images, fine-tuned them, and noted down the results
    of metrics and confusion matrices (see Fig. 15 and Fig. 16).'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里的方法与我们训练 CNNs 时使用的方法相似。我们导入了一个预训练模型：vit-base-patch16–224-in21k，这是一个在 ImageNet-21k
    上训练的模型。然后，我们对数据集图像进行了归一化，微调了它们，并记录了指标和混淆矩阵的结果（见图 15 和图 16）。
