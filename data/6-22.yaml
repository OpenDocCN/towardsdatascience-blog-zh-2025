- en: Building Effective Metrics to Describe Users
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建描述用户的有效指标
- en: 原文：[https://towardsdatascience.com/building-effective-metrics-to-describe-users-3212727c5a9e/](https://towardsdatascience.com/building-effective-metrics-to-describe-users-3212727c5a9e/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/building-effective-metrics-to-describe-users-3212727c5a9e/](https://towardsdatascience.com/building-effective-metrics-to-describe-users-3212727c5a9e/)
- en: '![Cover, image by Author](../Images/0b063f29937e40dd2d9a23becd62eed2.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![封面，图片由作者提供](../Images/0b063f29937e40dd2d9a23becd62eed2.png)'
- en: Cover, image by Author
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 封面，图片由作者提供
- en: In almost any digital product, analysts often face the challenge of building
    a digital customer profile – a set of parameters that describe the customer’s
    state and behavior in one way or another.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在几乎任何数字产品中，分析师经常面临构建数字客户档案的挑战——一组参数，以某种方式描述客户的状况和行为。
- en: What are the potential applications of these metrics?
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标有哪些潜在的应用？
- en: Gaining insights into user behavior
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取对用户行为的洞察
- en: Leveraging as features in ML models
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在机器学习模型中利用作为特征
- en: Developing business rules for personalized offers
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定个性化优惠的业务规则
- en: A simple example is e-commerce, with metrics like those listed in the table
    below.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的例子是电子商务，以下表格中列出了这些指标。
- en: '![Image by Author](../Images/39d49d06ed695dedc48d03a71b13aafa.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供](../Images/39d49d06ed695dedc48d03a71b13aafa.png)'
- en: Image by Author
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: These metrics are used everywhere, but what is the problem with them? They don’t
    take into account the specific user’s history or the dynamics of this particular
    metric. Is $200 spend a lot for user 1? It’s unclear. Yet this distinction significantly
    influences the business decision we make next.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标无处不在，但它们有什么问题呢？它们没有考虑到特定用户的记录或这个特定指标的动态。对于用户1来说，200美元的花费算多吗？不清楚。然而，这种区别显著影响了我们接下来做出的商业决策。
- en: Even within the context of a single user, $200 can have a different meaning
    for the business depending on the user’s stage in their lifecycle with the product.
    $200 spent during the user onboarding, pick activity and re-activation are different.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在单个用户的背景下，200美元对于业务来说，根据用户与产品的生命周期阶段的不同，可能有不同的含义。用户在用户引导、选择活动和重新激活期间花费的200美元是不同的。
- en: '![User journey, image by Author](../Images/9691296c8831914e2c03da7439bd8505.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![用户旅程，图片由作者提供](../Images/9691296c8831914e2c03da7439bd8505.png)'
- en: User journey, image by Author
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 用户旅程，图片由作者提供
- en: 'We’d like to have some normalized metrics to be able compare them between users.
    Something like this:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望有一些标准化指标，以便能够在用户之间进行比较。类似于这样：
- en: '![Image by Author](../Images/b589b024d0522017d8840610fbe61e85.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供](../Images/b589b024d0522017d8840610fbe61e85.png)'
- en: Image by Author
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: So how can we move from a numerical description of customer behavior to a more
    characteristic representation? For instance, how can the fact that *"a customer
    hasn’t made a transaction for 7 days"* be translated into an individualized assessment
    of whether this is unusual or typical for that specific customer? The challenge
    is to achieve this without losing interpretability, preserving business relevance,
    and avoiding black-box models.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何从对客户行为的数值描述过渡到更具有代表性的表示？例如，如何将“客户7天没有进行交易”的事实转化为对该特定客户是否异常或典型的个性化评估？挑战在于在不失去可解释性的同时，保持业务相关性，并避免黑盒模型。
- en: A simple approach is to analyze the distribution of the metric and determine
    the probability of observing the current result (i.e., calculate the p-value).
    This helps us understand how extreme the value is compared to the user’s history.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 一种简单的方法是分析指标的分布，并确定观察当前结果（即计算p值）的概率。这有助于我们了解该值与用户历史记录相比有多极端。
- en: '![Normal distribution, image by Author](../Images/dc5358c2d99f483f05d344cdbd7cf3e7.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![正态分布，图片由作者提供](../Images/dc5358c2d99f483f05d344cdbd7cf3e7.png)'
- en: Normal distribution, image by Author
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 正态分布，图片由作者提供
- en: But what’s the challenge here? In most cases, the distribution of metrics is
    not normal, making *p-value* calculations more complex.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 但这里有什么挑战？在大多数情况下，指标的分布不是正态分布，这使得p值计算更加复杂。
- en: 'The random metric probably would have a distribution similar to this one:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 随机指标可能具有与此类似的分布：
- en: '![PDF, image by Author](../Images/cb32b64d8b72b8751174a5dbb95973ba.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![PDF，图片由作者提供](../Images/cb32b64d8b72b8751174a5dbb95973ba.png)'
- en: PDF, image by Author
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: PDF，图片由作者提供
- en: We can apply some small trick and to transform Probability Density Function
    to Cumulative Distribution Function (CDF). Calculating *p-value* in this case
    is much easier.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以应用一些小技巧，将概率密度函数转换为累积分布函数（CDF）。在这种情况下计算p值要容易得多。
- en: '![CDF, image by Author](../Images/d48e2cea0e4f99c3191a7ea23626f664.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![CDF，图片由作者提供](../Images/d48e2cea0e4f99c3191a7ea23626f664.png)'
- en: CDF, image by Author
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: CDF，图片由作者提供
- en: So, we simply need to reconstruct the CDF from the user’s metric, which can
    be done efficiently using splines. Let’s create a toy example.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们只需要从用户的指标中重建CDF，这可以通过使用样条高效完成。让我们创建一个玩具示例。
- en: '* * *'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Imagine you are an e-commerce platform aiming to personalize your email campaigns
    based on user activity from the past week. If a user has been less active compared
    to previous weeks, you plan to send them a discount offer.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 想象你是一个电子商务平台，希望根据过去一周的用户活动来个性化你的电子邮件营销活动。如果一个用户与之前相比活动较少，你计划给他们发送折扣优惠。
- en: 'You’ve gathered user statistics and noticed the following for a user named
    John:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 你收集了用户统计数据，并注意到以下情况，针对名为约翰的用户：
- en: John visited the platform for the first time 15 days ago.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 约翰15天前第一次访问该平台。
- en: During the first 7 days (days 1–7), he made 9 visits.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在前7天（第1-7天），他访问了9次。
- en: During the next 7 days (days 2–8), he made 8 visits.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在接下来的7天（第2-8天），他访问了8次。
- en: Totally we have 9 values.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总共有9个值。
- en: Now, you want to evaluate how extreme the most recent value is compared to the
    previous ones.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你想要评估最近值与之前值相比有多极端。
- en: '[PRE0]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Let’s create a CDF of these values.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建这些值的CDF。
- en: '[PRE1]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![CDF, image by Author](../Images/2ac814bc614acce7ae38ce6d9095d5c2.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![CDF，图片由作者提供](../Images/2ac814bc614acce7ae38ce6d9095d5c2.png)'
- en: CDF, image by Author
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: CDF，图片由作者提供
- en: Now we need to restore the function based on these values. We will use spline
    interpolation.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要根据这些值恢复函数。我们将使用样条插值。
- en: '[PRE2]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![CDF with spline interpolation, image by Author](../Images/761f97fc2dbf01a1fe84ec9b1f616a98.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![带样条插值的CDF，图片由作者提供](../Images/761f97fc2dbf01a1fe84ec9b1f616a98.png)'
- en: CDF with spline interpolation, image by Author
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 带样条插值的CDF，图片由作者提供
- en: Not bad. But we observe a small problem between red dots – the CDF must be monotonically
    increasing. Let’s fix this with Piecewise Cubic Hermite Interpolating Polynomial.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 还不错。但我们观察到红色点之间有一个小问题——CDF必须是单调递增的。让我们用分段三次Hermite插值多项式来解决这个问题。
- en: '[PRE3]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![CDF with Piecewise Cubic Hermite Interpolating, image by Author](../Images/d047391b805dffe5e9457dda81feb3ac.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![带分段三次Hermite插值的CDF，图片由作者提供](../Images/d047391b805dffe5e9457dda81feb3ac.png)'
- en: CDF with Piecewise Cubic Hermite Interpolating, image by Author
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 带分段三次Hermite插值的CDF，图片由作者提供
- en: Alright, now it’s perfect.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在它完美了。
- en: To calculate p-value for our current observation (6 visits during the last week)
    we need to calculate the surface of filled area.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 为了计算我们当前观察到的p值（上周有6次访问）我们需要计算填充区域的面积。
- en: '![Critical area, image by Author](../Images/66b351296a71e8afeb2979fe9607c2f7.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![关键区域，图片由作者提供](../Images/66b351296a71e8afeb2979fe9607c2f7.png)'
- en: Critical area, image by Author
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 关键区域，图片由作者提供
- en: 'To do so let’s create a simple function _calculate_p*value*:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，让我们创建一个简单的函数 `_calculate_p*value*`：
- en: '[PRE4]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Probability of getting less than 6 equals: 0.375'
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 得到小于6的概率为：0.375
- en: So the probability is quite high (we may compare it to a threshold 0.1 for instance)
    and we decide not to send the discount to John. Same calculation we need to do
    for all the users.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，概率相当高（我们可以将其与阈值0.1进行比较，例如），我们决定不向约翰发送折扣。我们需要为所有用户进行相同的计算。
- en: '* * *'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we have seen how transforming raw user metrics into personalized
    assessments can lead to more effective business decisions. By using statistical
    methods like CDF and spline interpolation, we can better understand the context
    behind user actions and provide personalized, relevant offers that are informed
    by data.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们看到了如何将原始用户指标转换为个性化评估，这可以导致更有效的商业决策。通过使用CDF和样条插值等统计方法，我们可以更好地理解用户行为背后的上下文，并提供基于数据的个性化、相关的优惠。
