- en: 'There and Back Again: An AI Career Journey'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 来来回回：人工智能职业之旅
- en: 原文：[https://towardsdatascience.com/there-and-back-again-an-ai-career-journey/](https://towardsdatascience.com/there-and-back-again-an-ai-career-journey/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/there-and-back-again-an-ai-career-journey/](https://towardsdatascience.com/there-and-back-again-an-ai-career-journey/)
- en: <mdspan datatext="el1752532122561" class="mdspan-comment">The year was 1989.</mdspan>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752532122561" class="mdspan-comment">那一年是1989年。</mdspan>
- en: I had wide-eyed ambitions to be an Artificial Intelligence developer.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我怀揣着成为人工智能开发者的远大志向。
- en: 'I studied all the latest material. By that I mean sci-fi movies — *Terminator,
    War Games, RoboCop,* and *Aliens*. Okay, yeah, those are a bit apocalyptic. But,
    TV shows like *Knight Rider* and *Star Trek: The Next Generation* made me believe
    anything was possible.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我研究了所有最新的资料。我的意思是科幻电影——《终结者》、《战争游戏》、《机器警察》和《异形》。好吧，是的，这些有点末日。但，像《神探科南》和《星际迷航：下一代》这样的电视剧让我相信任何事都是可能的。
- en: I had cut my teeth on the bleeding edge of technology known as the Atari 1200XL
    and was ready for AI.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我在被称为Atari 1200XL的尖端技术领域磨砺了自己的技能，并准备投身于人工智能领域。
- en: I also enjoyed programming — I guess BASIC and Pascal counted back then. Despite
    this, I created my own games and even a database engine for a baseball card collection.
    My dad didn’t want to spend the money on software **and** put us kids through
    school, so he challenged me to write them.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我也喜欢编程——我想那时的BASIC和Pascal算得上是。尽管如此，我还是自己制作了游戏，甚至为棒球卡收藏编写了一个数据库引擎。我爸爸不想花钱买软件，还要供我们这些孩子上学，所以他挑战我编写它们。
- en: In my senior year of high school, I wrote a really fun and interesting program
    that would generate images of the electron orbitals for the hydrogen atom using
    a complicated wave equation. One dot at a time, it would produce images. Not quite
    as nice as these here — it was still the 80’s, but you get the picture.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在我高中最后一年，我编写了一个非常有趣且有趣的程序，该程序会使用复杂的波动方程生成氢原子的电子轨道图像。一次一个点，它会生成图像。虽然不像这些那么漂亮——那时还是80年代，但你能想象出来。
- en: '![](../Images/f9a20e36ec02236b53635763cef4be72.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f9a20e36ec02236b53635763cef4be72.png)'
- en: 'Image source: [https://commons.wikimedia.org/w/index.php?curid=5854697](https://commons.wikimedia.org/w/index.php?curid=5854697)'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：[https://commons.wikimedia.org/w/index.php?curid=5854697](https://commons.wikimedia.org/w/index.php?curid=5854697)
- en: My physics teacher was impressed enough that he nominated me for a scholarship
    at Rensselaer Polytechnic Institute. This opened the door for me to get accepted
    into the school as a computer science major. I was well on my journey into AI.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我的物理老师印象深刻，以至于他推荐我申请伦斯勒理工学院（Rensselaer Polytechnic Institute）的奖学金。这为我打开了进入这所学校学习计算机科学的大门。我正走在通往人工智能的道路上。
- en: AI Winter
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能寒冬
- en: At Rensselaer, our AI professor asked us to write a program to play solitaire,
    the card game. I went to work writing in LISP, only to find that the computer
    wasn’t really learning anything.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在伦斯勒理工学院（Rensselaer），我们的AI教授要求我们编写一个玩单人纸牌游戏（solitaire）的程序。我着手用LISP编写，却发现电脑并没有真正地学习到任何东西。
- en: I was picturing Commander Data figuring out how to play the game, faster and
    faster with every shuffle. It shouldn’t be me programming it, telling it what
    to do every step of the way.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我在想象指挥官数据（Commander Data）如何快速地通过洗牌来找出玩游戏的方法，每一次洗牌都更快。这不应该是我来编程，每一步都告诉它该做什么。
- en: I asked the professor how this is considered “artificial intelligence”. She
    said our job as a developer is to tell it the best move to make at any time and
    be sure to cover all scenarios. Basically, transfer **my** so-called intelligence
    into the computer.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我问教授这怎么算是“人工智能”。她说我们作为开发者的工作是在任何时刻告诉它最佳的行动方案，并确保覆盖所有情况。基本上，就是将我所谓的智慧转移到电脑上。
- en: That was artificial intelligence in the early 90’s — heavy emphasis on **artificial**.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 那是90年代初的人工智能——对“人工”的重视程度很高。
- en: I could feel the bubble burst inside me, and I wasn’t alone. The technology
    simply wasn’t there yet. This turned out to be the *Second AI Winter*.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我能感觉到内心的泡沫破裂了，而且我并不孤单。技术本身还没有准备好。这最终导致了*第二次人工智能寒冬*。
- en: Aha Moment
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 啊哈时刻
- en: I finished my studies and put my ambitions as an AI developer on the shelf.
    I started my career as a systems and network infrastructure administrator and
    I truly enjoyed the challenges that came with it.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我完成了学业，并将作为人工智能开发者的抱负暂时搁置。我开始作为系统和网络基础设施管理员开始了我的职业生涯，并且真正享受其中的挑战。
- en: Being a software developer at heart, I found ways to automate many of the repetitive
    administrative tasks to monitor system health. This came in handy since my users
    would frequently ask me why the network is so slow. Or the classic question, “*Is
    the network down?*”
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名内心深处的软件开发者，我找到了自动化许多重复性管理任务的方法来监控系统健康。这对我来说非常有用，因为我的用户经常问我为什么网络这么慢。或者经典的提问，“*网络是不是出故障了？*”
- en: Since my employer was loathe to spend any money, I went in search of open source
    software. But, you can only go so far without opening your wallet. Commercial
    solutions costing six-figures would get you there, but we weren’t willing to spend
    that. So, I sat down to write my own tools from scratch, emulating the expensive
    software.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我的雇主不愿意花钱，我去寻找开源软件。但是，不打开钱包是走不远的。花费六位数的商业解决方案可以让你达到目标，但我们不愿意花那么多钱。所以，我坐下来从头开始编写自己的工具，模仿昂贵的软件。
- en: 'Now, when someone asked if the network was down (spoiler alert: it was not),
    I could look in 5–6 different places and in about 10 minutes figure out exactly
    what (or who) was slowing things down.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当有人问网络是否出故障时（剧透：并没有），我可以在5-6个不同的地方查看，大约10分钟就能找出确切是什么（或谁）导致速度变慢。
- en: I was excited that I now had the data to work with, but it became exhausting
    digging through it all.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我很高兴现在有了可以工作的数据，但挖掘所有这些数据变得非常累人。
- en: Then came my “aha moment”.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然后出现了我的“啊哈”时刻。
- en: The concept of *Big Data* was all the rage mid-2010s. I was attending a conference
    that gave a hypothetical example of someone finding the best way to get from point
    A to point B by train. In theory, the *Big Data* system could collect the train
    schedules, consider wait times, available seats, detours, ticket prices, etc.,
    to suggest the best option.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在2010年代中期，“大数据”的概念非常流行。我参加了一个会议，会上给出了一个假设性的例子，有人找到了从A点到B点乘坐火车的最佳方式。从理论上讲，*大数据*系统可以收集火车时刻表，考虑等待时间、可用座位、绕行、票价等，以建议最佳选项。
- en: Aha! This is just like my challenge of pulling bits and pieces of system information
    from different sources, then connecting the dots to create a clear picture.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 哎呀！这就像我从不同来源拉取系统信息碎片，然后连接这些点来创建一个清晰的画面一样。
- en: All I needed to do was write another tool with the logic to piece it all together.
    Now when my users would ask their classic question, I could answer them with a
    few mouse clicks on a web server I built.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要做的只是再写一个工具，用逻辑来将这些碎片拼凑在一起。现在当我的用户问他们经典的问题时，我可以通过在构建的Web服务器上点击几个鼠标来回答他们。
- en: It felt like I was right back in college.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 感觉就像我又回到了大学。
- en: Learning
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学习
- en: This sparked my latent computer science interest that was sitting on the shelf
    for a couple of *decades*.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这激发了我长期被搁置的计算机科学兴趣，它已经放在架子上好几十年了。
- en: I decided to pursue this new passion and signed up for data science and machine
    learning classes. My evenings and weekends were filled with as many online classes
    as I could take.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我决定追求这个新的爱好，并报名参加了数据科学和机器学习课程。我的晚上和周末都充满了尽可能多的在线课程。
- en: Looking back, I realize that the “aha moment” and revived passion were the real
    reason I grew tired of the infrastructure administration role. Don’t get me wrong — it
    is good work. But I found a better outlet for my skills, so every support call
    became unbearable.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾过去，我意识到“啊哈”时刻和重燃的激情才是我厌倦基础设施管理角色的真正原因。请别误会——这是一份好工作。但我找到了一个更好的技能发挥途径，所以每一个支持电话都变得难以忍受。
- en: It was time for a change.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候改变一下了。
- en: Fortunately, much like my high school teacher that recognized my potential,
    my manager recommended me for another role in the company, appropriately titled
    *Big Data Analyst*.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，就像我的高中老师认识到我的潜力一样，我的经理推荐我担任公司中的另一个角色，恰当地命名为 *大数据分析师*。
- en: I jumped into creating sales forecast modeling using an elegant programming
    language called *R*. Then I implemented neural networks on this model which forced
    me to rewrite it into Python. Ultimately, I used AutoML to find the best model,
    SHAP for explainability, and packaged this into Docker, plus integrated with Qlik
    Sense for visualization.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我投身于创建销售预测模型，使用一种优雅的编程语言叫做 *R*。然后我在这个模型上实现了神经网络，这迫使我将其重写为Python。最终，我使用AutoML找到最佳模型，SHAP进行可解释性，并将其打包到Docker中，同时与Qlik
    Sense进行可视化集成。
- en: I don’t like doing something half-way.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我不喜欢做半途而废的事情。
- en: Then the day came when my boss asked me to help our consumer service department
    implement an AI image classifier. Consumers would call for support on our products
    and we would spend a lot of time figuring out which product they have. A picture
    makes it easier, and the AI makes it faster.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，有一天，我的老板让我帮助我们的消费者服务部门实施一个AI图像分类器。消费者会打电话寻求对我们产品的支持，我们会花很多时间来确定他们拥有哪种产品。一张图片会让事情变得更容易，而AI会让它更快。
- en: The original intent was to find a third party company to create the AI for us,
    which would be six-figures expensive. I know how much our company is allergic
    to expenditures, so I offered to create the AI model myself. I set off collecting
    the image data, training the model, and creating a simple web interface to make
    it usable.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 原本的意图是找一家第三方公司为我们创建AI，这将花费六位数的价格。我知道我们公司多么厌恶支出，所以我主动提出自己创建AI模型。我开始收集图像数据，训练模型，并创建一个简单的网页界面使其可用。
- en: AI Spring
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI春天
- en: This is where my years of infrastructure experience came to the rescue. I had
    access to the internal resources, knew how to build a Linux server on Azure cloud
    to get the GPU accelerator, and could stand up a web server to make it accessible.
    This was 2019, and advances in hardware and software arrived at just the right
    time. At last, *AI Spring* was upon us.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这时，我多年的基础设施经验派上了用场。我有权访问内部资源，知道如何在Azure云上构建Linux服务器以获取GPU加速器，并能够建立一个网站服务器使其可访问。这是2019年，硬件和软件的进步恰逢其时。最后，*AI春天*到来了。
- en: A quick 30-minute demo to the head of the consumer service department persuaded
    him to dump all negotiations with the third party company. I was given the green
    light to take this on full time!
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 向消费者服务部门负责人进行了一次简短的30分钟演示，说服他放弃与第三方公司的所有谈判。我得到了全权负责这个项目的绿灯！
- en: After 30 years, I reached a full circle. My AI developer dream became reality — without
    the killer robots, thankfully.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 经过30年的努力，我回到了起点。我的AI开发者梦想变成了现实——感谢幸运，没有出现致命的机器人。
- en: 'I spent the next 6 years expanding this application and is the highlight of
    my career. I even received our company’s Individual President’s Achievement Award.
    The project became very successful and I’m happy to share what I learned in a
    series of writings:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的6年，我扩展了这个应用，这是我职业生涯的亮点。我甚至获得了我们公司颁发的个人总裁成就奖。这个项目非常成功，我很高兴能通过一系列的文章分享我所学到的知识：
- en: '[Learnings from a Machine Learning Engineer — Part 1: The Data](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/)'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[机器学习工程师的学习心得——第一部分：数据](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-1-the-data/)'
- en: Retirement
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 退休
- en: This year, I’ve decided to enter the retirement phase of my existence. Rather
    than take the company’s headquarters relocation out of state, I decided to control
    my own destiny and leave on a high note.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 今年，我决定进入我存在的退休阶段。与其让公司总部搬迁到州外，我决定掌控自己的命运，以一个高调的姿态离开。
- en: 'On my last day, my boss gathered our team and asked if I had any advice to
    share. Here is what I said:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在我最后一天，我的老板召集了我们的团队，问我是否有任何建议可以分享。以下是我所说的话：
- en: Don’t be afraid to step back and assess what truly makes you happy. It may take
    time and effort to pivot, but it’s worth pursuing.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要害怕退后一步，评估什么真正让你快乐。转变可能需要时间和努力，但这是值得追求的。
- en: Be sure to forge good relationships with your mentors and managers, they may
    be the ones to help open doors for you.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一定要与你的导师和管理者建立良好的关系，他们可能是帮助你打开大门的人。
- en: Never stop learning. You don’t know where you next inspiration will come from.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 永远不要停止学习。你不知道你的下一个灵感将从何而来。
- en: Even though I call it “retirement”, I consider it more of a reset so I can find
    other ways I can make a difference. There are plenty of interests to explore and
    a lot more to learn.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我称之为“退休”，但我认为这更像是一个重置，这样我可以找到其他可以产生影响的方式。有很多兴趣可以探索，还有很多东西要学习。
- en: You’re never too old to chase your childhood dreams.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 你永远不会太老，不能追逐你的童年梦想。
