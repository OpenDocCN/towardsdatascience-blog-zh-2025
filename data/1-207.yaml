- en: Meet Our New Authors
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'We hope you take the time to explore the excellent work from the latest cohort
    of TDS contributors:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望您花时间探索最新一批TDS贡献者的杰出作品：
- en: '[Nidhin Karunakaran Ponon](https://towardsdatascience.com/author/nidhin-karunakaranponon/) offers
    practical insights on guardrails for your AI applications (and how to create them).'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Nidhin Karunakaran Ponon](https://towardsdatascience.com/author/nidhin-karunakaranponon/)提供了关于为您的AI应用设置护栏的实用见解（以及如何创建它们）。'
- en: '[How To Build Effective Technical Guardrails for AI Applications](https://towardsdatascience.com/how-to-build-effective-technical-guardrails-for-ai-applications/)'
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何为AI应用构建有效的技术护栏](https://towardsdatascience.com/how-to-build-effective-technical-guardrails-for-ai-applications/)'
- en: '[Kenneth McCarthy](https://towardsdatascience.com/author/kenneth-mccarthy/) charts
    the visual “fingerprints” of 20 languages with the help of basic statistics.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Kenneth McCarthy](https://towardsdatascience.com/author/kenneth-mccarthy/)借助基本统计学绘制了20种语言的视觉“指纹”。'
- en: '[What Makes a Language Look Like Itself?](https://towardsdatascience.com/what-makes-a-language-look-like-itself/)'
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[什么让一种语言看起来像它自己？](https://towardsdatascience.com/what-makes-a-language-look-like-itself/)'
- en: '[Ankit Singh Chauhan](https://towardsdatascience.com/author/ankit-singhchauhan/) published
    a lucid writeup of recent research that promises “a smarter way to scale reasoning
    tasks without wasting a massive amount of computation.”'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Ankit Singh Chauhan](https://towardsdatascience.com/author/ankit-singhchauhan/) 发表了一篇清晰的研究报告，该报告承诺“一种更智能的扩展推理任务的方法，而不会浪费大量的计算。”'
- en: '[Smarter, Not Harder: How AI’s Self-Doubt Unlocks Peak Performance](https://towardsdatascience.com/smarter-not-harder-how-ais-self-doubt-unlocks-peak-performance/)'
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[更智能，而不是更难：AI的自我怀疑如何解锁峰值性能](https://towardsdatascience.com/smarter-not-harder-how-ais-self-doubt-unlocks-peak-performance/)'
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们热爱发布新作者的文章，所以如果你最近写了一个有趣的项目教程、教程或对我们核心主题的理论反思，为什么不[与我们分享呢？](https://towardsdatascience.com/questions-96667b06af5/)
