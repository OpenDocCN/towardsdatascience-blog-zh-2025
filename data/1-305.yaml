- en: 'How to Build an AI Budget-Planning Optimizer for Your 2026 CAPEX Review: LangGraph,
    FastAPI, and n8n'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何为2026年的资本支出审查构建AI预算规划优化器：LangGraph、FastAPI和n8n
- en: 原文：[https://towardsdatascience.com/how-to-build-an-ai-budget-planning-optimizer-for-your-2026-capex-review-langgraph-fastapi-and-n8n/](https://towardsdatascience.com/how-to-build-an-ai-budget-planning-optimizer-for-your-2026-capex-review-langgraph-fastapi-and-n8n/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-build-an-ai-budget-planning-optimizer-for-your-2026-capex-review-langgraph-fastapi-and-n8n/](https://towardsdatascience.com/how-to-build-an-ai-budget-planning-optimizer-for-your-2026-capex-review-langgraph-fastapi-and-n8n/)
- en: <mdspan datatext="el1757394638147" class="mdspan-comment">What if **a simple
    Email**</mdspan>was the UI for complex budget planning, with an AI agent handling
    the optimisation behind the scenes?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757394638147" class="mdspan-comment">如果**简单的电子邮件**是复杂预算规划的UI，而AI代理则处理背后的优化，会怎样？</mdspan>
- en: If I could just send ‘Run 2026 budget with XXX caps and Y% on Sustainability’
    and get a decision back, that would change our budget review.
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果我能发送“运行2026年预算，XXX上限和Y%的可持续性”并得到一个决定，那将改变我们的预算审查。
- en: That’s how a logistics VP framed the problem when we discussed automating portfolio
    selection for their annual CAPEX approval cycle.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是物流副总裁在讨论自动化年度CAPEX审批周期投资组合选择自动化时如何阐述问题的。
- en: '![](../Images/3faa6a13f792f0a9f91a1ca441d0c737.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3faa6a13f792f0a9f91a1ca441d0c737.png)'
- en: Example of CAPEX Application – (Image by Samir Saci)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: CAPEX申请示例 – (图片由Samir Saci提供)
- en: Because companies invest in expensive logistics equipment, directors receive
    CAPEX applications from operations teams for short and long-term projects.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 由于公司投资于昂贵的物流设备，总监收到了来自运营团队的短期和长期项目的CAPEX申请。
- en: This is a complex exercise as you need to balance between return on investment
    and long-term strategy.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个复杂的练习，因为你需要在投资回报和长期战略之间取得平衡。
- en: '*As a data scientist, how can we support this decision-making process?*'
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*作为数据科学家，我们如何支持这个决策过程？*'
- en: Using linear programming, we can help decide which projects to fund to maximise
    ROI while respecting multi-year budget constraints.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 使用线性规划，我们可以帮助决定哪些项目可以获得资金以最大化投资回报率，同时遵守多年的预算限制。
- en: In this article, we will build an **AI Agent for Budget Planning** that turns
    email requests into an optimised CAPEX portfolio.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将构建一个**AI预算规划代理**，将电子邮件请求转换为优化的资本支出投资组合。
- en: This AI workflow is built using n8n for orchestration and LangGraph to create
    a reasoning agent connected to a FastAPI microservice that executes a linear programming
    model.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这个AI工作流程是使用n8n进行编排，并使用LangGraph创建一个连接到执行线性规划模型的FastAPI微服务的推理代理。
- en: '![](../Images/03576a425a44f1ff240eb4c3cd1b7e94.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/03576a425a44f1ff240eb4c3cd1b7e94.png)'
- en: Objective of the Workflow – (Image by Samir Saci)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程目标 – (图片由Samir Saci提供)
- en: We will review the architecture and explore the results using a real request
    for budget optimisation with a constraint of a minimum 20% allocation for sustainability
    projects.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将审查架构，并使用一个具有至少20%可持续性项目分配限制的实际预算优化请求来探索结果。
- en: Budget Planning Optimisation with Python
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Python进行预算规划优化
- en: 'Problem Statement: Operational Budget Planning'
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题陈述：运营预算规划
- en: We are supporting the APAC director of a large Third-Party Logistics Service
    Provider (3PL) based in Singapore.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们支持一家总部位于新加坡的大型第三方物流服务提供商（3PL）的亚太地区总监。
- en: Their job is to manage warehousing and transportation operations for other companies
    in four countries in the Asia Pacific.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的工作是管理亚太地区四个国家的其他公司的仓储和运输运营。
- en: '![](../Images/ee3d49e9375d5fd96ccd5c3938b8f1f2.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ee3d49e9375d5fd96ccd5c3938b8f1f2.png)'
- en: We are talking about operations supporting 48 customers grouped in over eight
    market verticals (Luxury, Cosmetics …).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在谈论支持48个客户，这些客户被分为超过八个市场垂直领域（奢侈品、化妆品……）。
- en: For instance, they manage a 10,000 sqm warehouse for a large fast-fashion retailer
    in Beijing, delivering to 50 stores across North China.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，他们管理北京一家大型快时尚零售商的10,000平方米仓库，向中国北部的50家门店供货。
- en: '*Warehouse Manager: We need 150k euros for a new conveyor belt that will increase
    our receiving productivity by 20%.*'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*仓库经理：我们需要15万欧元来购买一条新传送带，这将提高我们的接收效率20%。*'
- en: Our director receives a list of projects that require capital expenditure (CAPEX)
    from his 17 warehouse managers across the APAC region.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的总监从其位于亚太地区的17个仓库经理那里收到了需要资本支出（CAPEX）的项目列表。
- en: '![](../Images/40cb63d6d84a145d6378562f5a08cd04.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/40cb63d6d84a145d6378562f5a08cd04.png)'
- en: Examples of CAPEX Application – (Image by Samir Saci)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: CAPEX申请示例 – (图片由Samir Saci提供)
- en: 'For each project, the CAPEX application includes a brief description *(e.g.,
    renting 500 sqm)*, a three-year cost profile *(Year 1: €115k; Year 2: €120k; Year
    3: €150k)*, and the expected Return On Investment (e.g., +€50k).'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个项目，CAPEX应用程序包括一个简要描述（例如，租赁500平方米），三年的成本概况（第一年：11.5万欧元；第二年：12万欧元；第三年：15万欧元），以及预期的投资回报率（例如，+5万欧元）。
- en: 'These projects can also bring additional benefits:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这些项目还可以带来额外的收益：
- en: '**Business Development:** unlock new revenue (e.g., capacity for a new customer
    or product line)'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**业务发展**：解锁新的收入（例如，为新客户或产品线提供产能）'
- en: '**Sustainability (CO₂ Reduction):** lower emissions via energy-efficient equipment
    or layout changes'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可持续性（CO₂减少）**：通过节能设备或布局变更降低排放'
- en: '**Digital Transformation:** improve data visibility, automate repetitive tasks,
    and enable AI-driven decisions'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数字化转型**：提高数据可见性，自动化重复性任务，并实现AI驱动的决策'
- en: '**Operational Excellence:** increase throughput, reduce defects and rework,
    shorten changeovers, and stabilise processes.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营卓越**：提高吞吐量，减少缺陷和返工，缩短换线时间，稳定流程。'
- en: '**HSE (Health, Safety & Environment):** reduce incident risk and insurance
    exposure with safer equipment'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**HSE（健康、安全与环境）**：通过更安全的设备降低事故风险和保险暴露'
- en: '**CSR (Corporate Social Responsibility):** strengthen community and workforce
    initiatives (e.g., training, accessibility)'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**企业社会责任（CSR）**：加强社区和劳动力倡议（例如，培训，无障碍）'
- en: For instance, a warehouse automation project can reduce packaging use (sustainability),
    decrease operator strain (CSR), and accelerate digital transformation.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个仓库自动化项目可以减少包装使用（可持续性），降低操作员压力（企业社会责任），并加速数字化转型。
- en: Some of the additional benefits are linked to the top management guidelines
    that our director needs to follow.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一些额外的收益与我们的总监需要遵循的最高管理层指导方针相关。
- en: '*APAC Director: “How should I allocate my budget of XX M€ to maximise the ROI
    while respecting my top management guidelines?*“'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*APAC总监：“我应该如何分配XX百万欧元的预算以最大化投资回报率，同时遵守我的最高管理层指导方针？”*'
- en: As the director receives over 50 projects each session, we proposed to build
    a linear programming module to determine the optimal selection, taking into account
    external constraints.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 由于总监每次会议都要处理超过50个项目，我们建议构建一个线性规划模块，以确定最佳选择，同时考虑外部约束。
- en: '![](../Images/b1e132f43e8cee49cea3f46c78e0900a.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b1e132f43e8cee49cea3f46c78e0900a.png)'
- en: Objective of the solution – (Image by Samir Saci)
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案的目标 – （图片由Samir Saci提供）
- en: As inputs, we get the available budget and the management objectives, along
    with the spreadsheet of CAPEX applications.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 作为输入，我们得到可用预算和管理目标，以及CAPEX应用程序的电子表格。
- en: '![](../Images/f8e17f5ab8cff8a2e8ea9672275d02d2.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f8e17f5ab8cff8a2e8ea9672275d02d2.png)'
- en: Example of CAPEX Application Spreadsheet – (Image by Samir Saci)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: CAPEX应用程序电子表格示例 – （图片由Samir Saci提供）
- en: This will be part of the inputs of our solution.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这将成为我们解决方案的输入之一。
- en: 'FastAPI Microservice: 0–1 Mixed-Integer Optimiser for CAPEX Budget Planning'
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: FastAPI微服务：用于CAPEX预算规划的0-1混合整数优化器
- en: To address this problem, we utilised the modelling framework for Linear Programming
    (LP) and Integer Programming (IP) problems provided by the PuLP library of Python.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我们利用了Python PuLP库提供的线性规划（LP）和整数规划（IP）问题的建模框架。
- en: The solution is packaged in a FastAPI microservice deployed on the cloud.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案被封装在一个部署在云端的FastAPI微服务中。
- en: Decision Variables
  id: totrans-48
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 决策变量
- en: 'For each project i, we define a binary value to inform if we allocate a budget
    or not:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个项目i，我们定义一个二元值来告知是否分配预算：
- en: '![](../Images/0d37b55ffa5ae93530983c80807160db.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0d37b55ffa5ae93530983c80807160db.png)'
- en: Decision Variables – (Image by Samir Saci)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 决策变量 – （图片由Samir Saci提供）
- en: Objective Function
  id: totrans-52
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 目标函数
- en: 'The objective is to maximise the total return on investment of the portfolio
    of projects we selected:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是最大化我们选定的项目组合的总投资回报率：
- en: '![](../Images/74746f522f02dcfbc38688ed775fc566.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/74746f522f02dcfbc38688ed775fc566.png)'
- en: Objective Function – (Image by Samir Saci)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 目标函数 – （图片由Samir Saci提供）
- en: Constraints
  id: totrans-56
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 约束条件
- en: As we cannot spend more than what we have allocated per year, we must consider
    the budget constraints for the next three years.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们每年不能花费超过分配的金额，我们必须考虑未来三年的预算约束。
- en: '![](../Images/0ddcfc3165ce6fbde10dea892fc8b7c3.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0ddcfc3165ce6fbde10dea892fc8b7c3.png)'
- en: Constraints – (Image by Samir Saci)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 约束条件 – （图片由Samir Saci提供）
- en: 'APAC Director: Our CEO want us to invest 20% of our budget on projects supporting
    our sustainability roadmap.'
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: APAC总监：我们的首席执行官希望我们将20%的预算投资于支持我们可持续发展路线图的项目。
- en: Moreover, we may also have constraints on the minimum budget for specific management
    objectives.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们可能还对特定管理目标的最小预算有约束。
- en: '![](../Images/b9fb240e9d170974177113a6f3b7fe83.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b9fb240e9d170974177113a6f3b7fe83.png）'
- en: Example of Constraint for Sustainability – (Image by Samir Saci)
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 可持续性的约束示例 – (图片由 Samir Saci 提供)
- en: In the example above, we ensure that the total investment for sustainability
    projects is equal to or greater than `S_min`.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的例子中，我们确保可持续性项目的总投资等于或大于 `S_min`。
- en: Now that we have defined our model, we can package it as a FastAPI microservice
    using the [code shared in this article.](https://towardsdatascience.com/automate-budget-planning-using-linear-programming-5254aace697c/)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经定义了我们的模型，我们可以使用[本文中共享的代码](https://towardsdatascience.com/automate-budget-planning-using-linear-programming-5254aace697c/)将其打包为
    FastAPI 微服务。
- en: This overall workflow will accept a specific schema defined using Pydantic for
    validation and defaults.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 整个工作流程将接受使用 Pydantic 定义的特定模式进行验证和默认值。
- en: '[PRE0]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'LaunchParamsBudget captures the optimisation inputs:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: LaunchParamsBudget 捕获优化输入：
- en: The three **annual budget caps** (`budget_year1/2/3` in euros)
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 三个**年度预算上限**（以欧元表示 `budget_year1/2/3`）
- en: The optional **minimum-allocation rule** toggled by `set_min_budget` with its
    target management objective `min_budget_objective` and the required share `min_budget_perc`
    in %.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过 `set_min_budget` 切换的**最小分配规则**，其目标管理目标是 `min_budget_objective`，以及所需的份额 `min_budget_perc`，以百分比表示。
- en: We need to **ensure that the Agent respects this schema; if not, it will be
    unable** to query the API.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要**确保代理遵守此模式；如果不遵守，它将无法**查询 API。
- en: What can we expect as outputs?
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们可以期待哪些输出？
- en: '[PRE1]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The agent will receive the details of the allocated budget, including the annual
    split, along with information on the selected projects.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 代理将收到分配预算的详细信息，包括年度分配，以及所选项目的信息。
- en: With these results and a proper system prompt, our agent can provide a concise
    summary of the budget allocation to the VP of Logistics.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些结果和适当的系统提示，我们的代理可以为物流副总裁提供预算分配的简洁摘要。
- en: Building an Agentic Workflow with LangGraph and n8
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 LangGraph 和 n8 构建一个代理工作流程
- en: End-to-End Workflow Description
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 全流程描述
- en: Let us assume that our Asia Pacific Director received a spreadsheet with all
    the CAPEX applications.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们的亚太区总监收到了包含所有 CAPEX 申请的电子表格。
- en: '![](../Images/f8e17f5ab8cff8a2e8ea9672275d02d2.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f8e17f5ab8cff8a2e8ea9672275d02d2.png)'
- en: Example of CAPEX Application Spreadsheet – (Image by Samir Saci)
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: CAPEX 应用电子表格示例 – (图片由 Samir Saci 提供)
- en: The idea is to receive the hypotheses regarding the budget amount and constraints
    in plain English via email, along with the spreadsheet attached.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 想法是通过电子邮件以普通英语接收有关预算金额和约束的假设，以及附加的电子表格。
- en: '![](../Images/51f73ae71d7350f99388827959fbbbc1.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/51f73ae71d7350f99388827959fbbbc1.png）'
- en: Email request with 205 on sustainability – (Image by Samir Saci)
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 关于可持续性的电子邮件请求 – (图片由 Samir Saci 提供)
- en: Based on this email, the workflow should automatically select projects for optimal
    budget allocation.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这封电子邮件，工作流程应自动选择项目以进行最优预算分配。
- en: '![](../Images/12faead2837aaf91ef9641cc9944d1a4.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/12faead2837aaf91ef9641cc9944d1a4.png)'
- en: Project Selected or not – (Image by Samir Saci)
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 项目是否被选中 – (图片由 Samir Saci 提供)
- en: But also, the director expects a concise explanation of the choices made to
    build this optimal “investment portfolio”.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，总监还期望对构建这个最佳“投资组合”所做出的选择有一个简洁的解释。
- en: '![](../Images/9a005b75b964777336ab5198f980a443.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9a005b75b964777336ab5198f980a443.png）'
- en: Example of Summary Generated by the Agent – (Image by Samir Saci)
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 代理生成的摘要示例 – (图片由 Samir Saci 提供)
- en: We can build an automated workflow using LangGraph and n8n for orchestration
    to perform these tasks.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用 LangGraph 和 n8n 构建一个自动化的工作流程，用于执行这些任务。
- en: '![](../Images/7d1a063b228b9a820db29e24aa90d16c.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7d1a063b228b9a820db29e24aa90d16c.png)'
- en: Objective of the workflow – (Image by Samir Saci)
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程的目标 – (图片由 Samir Saci 提供)
- en: 'This will be a workflow in 4 steps:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 这将是一个包含 4 个步骤的工作流程：
- en: '**Step 1**: Using the n8n Gmail node, we send the email body and the spreadsheet
    attached to the FastAPI Backend'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 1**：使用 n8n Gmail 节点，我们将电子邮件正文和附加到 FastAPI 后端的电子表格发送'
- en: '**Step 2**: An AI Agent Parser will collect the parameters from the email and
    call the other API for Budget Planning'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 2**：一个 AI 代理解析器将收集电子邮件中的参数并调用其他 API 进行预算规划'
- en: '**Step 3**: The outputs will be sent to an AI Agent Summarizer that will use
    them to generate the summary'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 3**：输出将被发送到一个 AI 代理摘要器，该摘要器将使用这些输出生成摘要'
- en: '**Step 4**: The user receives a reply by email with the summary via a Gmail
    node in n8n'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 4**：用户通过n8n中的Gmail节点通过电子邮件收到总结回复'
- en: The core **LangGraph agentic workflow** will be implemented within a **FastAPI
    microservice, **which will be wrapped in an n8n workflow for orchestration.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 核心的**LangGraph代理工作流程**将在一个**FastAPI微服务**内实现，该服务将被包装在n8n工作流程中进行编排。
- en: '![](../Images/16c7ad3f47d4d4e4ff3b8529a2cdb10e.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/16c7ad3f47d4d4e4ff3b8529a2cdb10e.png)'
- en: n8n orchestration workflow – (Image by Samir Saci)
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: n8n编排工作流程 – (图片由Samir Saci提供)
- en: The first two nodes on the top will extract the content of the spreadsheet and
    upload it to the API.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 顶部的第一个两个节点将提取电子表格的内容并将其上传到API。
- en: Then, we extract the email content in the `Extract Email Body` node and send
    it to the agent endpoint using the node `Query AI Agent`.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们在`Extract Email Body`节点中提取电子邮件内容，并将其发送到代理端点，使用`Query AI Agent`节点。
- en: 'The outputs of the API include:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: API的输出包括：
- en: A detailed explanation of the optimal budget allocation that are sent by email
    using the `Reply` node
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`Reply`节点通过电子邮件发送的关于最佳预算分配的详细说明
- en: A JSON with the allocation by project used by the node `Update Allocation` to
    add the ✅ and ❌ in the spreadsheet
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个JSON，其中包含由`Update Allocation`节点使用的按项目分配的分配，用于在电子表格中添加✅和❌
- en: Ultimately, our director receives a comprehensive analysis of the optimal portfolio,
    which includes three distinct sections.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，我们的总监收到了关于最佳投资组合的综合分析，该分析包括三个不同的部分。
- en: '![](../Images/156139777c7483a2761adb6ae0bee32f.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/156139777c7483a2761adb6ae0bee32f.png)'
- en: Budget Summary – (Image by Samir Saci)
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 预算摘要 – (图片由Samir Saci提供)
- en: A **Budget Summary** provides details on the allocated budget and the return
    on investment.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**预算摘要**提供了分配的预算和投资回报的详细信息。'
- en: '![](../Images/cfc3b4d725a190da827c9fdc0ae13e8f.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cfc3b4d725a190da827c9fdc0ae13e8f.png)'
- en: Portfolio Composition – (Image by Samir Saci)
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 投资组合构成 – (图片由Samir Saci提供)
- en: The **Portfolio Composition** details the number of projects awarded per management
    objective.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**投资组合构成**详细说明了每个管理目标获得的项目数量。'
- en: '![](../Images/7b0b274cf10c5b9b55eda01539f6c819.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7b0b274cf10c5b9b55eda01539f6c819.png)'
- en: Recommandation – (Image by Samir Saci)
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐 – (图片由Samir Saci提供)
- en: Finally, the agent concludes with a **Recommendation** based on its understanding
    of the objective.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，代理根据其对目标的了解得出**推荐**。
- en: Let us see how we built the core **LangGraph Budget Agent,** which parses an
    email to return a complete analysis.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看我们是如何构建核心的**LangGraph预算代理**，它解析电子邮件以返回完整分析。
- en: Budget Planning AI Agent with LangGraph
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于LangGraph的预算规划AI代理
- en: '*The code shared in this section has been greatly simplified for concision.*'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '*本节中共享的代码已被大大简化以节省篇幅。*'
- en: 'Before creating the graph, let us build the different blocks:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建图之前，让我们构建不同的块：
- en: '`EmailParser` is used to parse the email body received from the n8n HTTP node
    to **extract the parameters** of the Budget API'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`EmailParser`用于解析从n8n HTTP节点接收到的电子邮件正文以**提取预算API的参数**'
- en: '`BudgetPlanInterpreter` will call the API, retrieve the results and generate
    the summary'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`BudgetPlanInterpreter`将调用API，检索结果并生成摘要'
- en: For your information, I have used this approach with standalone blocks because
    we reuse them in other workflows that combine multiple agents.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 供您参考，我已使用这种方法与独立块一起使用，因为我们将在其他结合多个代理的工作流程中重用它们。
- en: 'Block 1: AI Agent Parser'
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 块 1：AI代理解析器
- en: 'Let us build the block for this agent that we will call **AI Agent Parser**:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建这个代理的块，我们将称之为**AI代理解析器**：
- en: '[PRE2]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We include the parameters that will be used for the Graph State variables.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我们包括了将被用于图状态变量的参数。
- en: This block `EmailParser` turns a plain-text email body into **typed, schema-valid
    parameters** for our Budget Planning API using an LLM.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这个`EmailParser`块将纯文本电子邮件正文转换为使用LLM的**类型化、模式有效的参数**，用于我们的预算规划API。
- en: On initialisation, we load the chat model from the config and build a LangChain
    chat model.
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在初始化时，我们加载聊天模型并构建LangChain聊天模型。
- en: The function `parse()` takes the raw email `content` sent by n8n HTTP node and
    the **system prompt** to invoke the model with **structured outputs** defined
    with the `LaunchParamsBudget` Pydantic schema.
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`parse()`函数接收n8n HTTP节点发送的原始电子邮件`内容`和**系统提示**，使用`LaunchParamsBudget` Pydantic模式定义的**结构化输出**调用模型。'
- en: 'The `EmailParser` system_prompt stored in the YAML config file (minimal version
    for concision):'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 存储在YAML配置文件中的`EmailParser`系统提示（最小版本以节省篇幅）：
- en: '[PRE3]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: It includes a list of fields to parse, along with concise explanations and strict
    format rules.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 它包括要解析的字段列表，以及简洁的解释和严格的格式规则。
- en: 'The output looks like this:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 输出看起来像这样：
- en: '[PRE4]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: This will be sent to the second agent for call tooling (our other FastAPI Microservice)
    and results interpretation.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这将被发送到第二个代理的调用工具（我们的另一个FastAPI微服务）和结果解释。
- en: 'Block 2: Block for Tool Calling and Interpretation'
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 块2：工具调用和解释的块
- en: Two blocks will be used to call the **Budget Planning API** and to **process
    the API’s output**.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 将使用两个块来调用**预算规划API**并处理API的输出。
- en: As I will be using this **Budget Planning API** for multiple agents, I created
    a standalone function to call it.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我将使用这个**预算规划API**为多个代理，我创建了一个独立的函数来调用它。
- en: '[PRE5]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: We can now call this function in the block `BudgetPlanInterpreter` defined below.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以在下面定义的`BudgetPlanInterpreter`块中调用此函数。
- en: '[PRE6]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: It runs the budget optimiser and turns its JSON into an **“executive summary”**
    in HTML format.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 它运行预算优化器，并将其JSON转换为HTML格式的**“执行摘要”**。
- en: We use `run_plan()` to call the FastAPI microservice utilising the function
    `run_budget_api(s)` to retrieve the results
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们使用`run_plan()`调用FastAPI微服务，利用`run_budget_api(s)`函数检索结果
- en: The function `interpret()` generates the analysis based on the API’s outputs,
    following the instructions of a system prompt.
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`interpret()`函数根据系统提示的指令，根据API的输出生成分析。'
- en: We now have our three foundation blocks that can be used to build a graph with
    nodes and conditional edges.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在有三个基础块，可以用来构建带有节点和条件边的图。
- en: LangGraph Builder with nodes and conditional edges
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带有节点和条件边的LangGraph构建器
- en: Now that we have the three blocks, we can build our graph.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了三个块，我们可以构建我们的图。
- en: '![](../Images/39bd3467efb87b60cd474aefe48360b8.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/39bd3467efb87b60cd474aefe48360b8.png)'
- en: LangGraph – (Image by Samir Saci)
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph – (图片由Samir Saci提供)
- en: This is a small experimental **LangGraph state machine** that includes the three
    steps (parsing, running, interpretation) with error handling at every step.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个包含三个步骤（解析、运行、解释）以及每一步错误处理的实验性**LangGraph状态机**。
- en: '[PRE7]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This block is fundamental as it defines the **shared state** passed between
    LangGraph nodes
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 这个块是基本的，因为它定义了在LangGraph节点之间传递的**共享状态**
- en: '`session_id`: included in the API call'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`session_id`: 包含在API调用中'
- en: '`email_text`: raw email body received from the n8n node'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`email_text`: 从n8n节点接收到的原始电子邮件正文'
- en: '`params`: structured inputs parsed from the email by EmailParser'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`params`: 由EmailParser从电子邮件中解析出的结构化输入'
- en: '`budget_results`: JSON output of the FastAPI microservice'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`budget_results`: FastAPI微服务的JSON输出'
- en: '`html_summary`: the analysis (in HTML format) generated by `interpret()` based
    on the output `budget_results`'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`html_summary`: 基于`budget_results`输出的`interpret()`生成的分析（HTML格式）'
- en: '`error`: storing an error message if needed'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`error`: 如有必要，存储错误消息'
- en: We should now define the functions of each node that will receive the current
    AgentState and return a partial update.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在应该定义每个节点将接收当前AgentState并返回部分更新的函数。
- en: '[PRE8]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**Function** : handle_error(state)'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: '**函数**：handle_error(state)'
- en: Returns an error message in HTML format, which will be sent to the Gmail node
    in n8n to notify the user
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 返回HTML格式的错误消息，该消息将被发送到n8n中的Gmail节点以通知用户
- en: '![](../Images/4dfcec3d69dc6d7885ffea3f7f82c5f2.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4dfcec3d69dc6d7885ffea3f7f82c5f2.png)'
- en: Example of error message – (Image by Samir Saci)
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 错误消息示例 – (图片由Samir Saci提供)
- en: In this case, for the support team, it is more practical as the user just has
    to forward the email.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，对于支持团队来说，这更实用，因为用户只需转发电子邮件。
- en: '*Note: In the production version, we have added a `run_id` to help track the
    issues in the logs.*'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：在生产版本中，我们添加了一个`run_id`以帮助跟踪日志中的问题。*'
- en: '[PRE9]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '**Function** 2: parse_email(state)'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: '**函数** 2：parse_email(state)'
- en: Uses `EmailParser` to transform the email body received into parameters for
    Budget Planning in JSON format
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`EmailParser`将接收到的电子邮件正文转换为JSON格式的预算规划参数
- en: '**On success:** returns `{"params": …}` used to call the FastAPI Microservice'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成功时**：返回用于调用FastAPI微服务的`{"params": …}`'
- en: '[PRE10]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '**Function** 3: run_budget(state)'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '**函数** 3：run_budget(state)'
- en: Uses `BudgetPlanInterpreter` to call the function `run_plan` that will execute
    the budget optimisation via the FastAPI microservice
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`BudgetPlanInterpreter`调用将执行预算优化的`run_plan`函数，通过FastAPI微服务
- en: '**On success:** returns the output of the optimiser in JSON format as `budget_results`'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成功时**：以JSON格式返回优化器的输出作为`budget_results`'
- en: This output can be used to generate the summary of the budget allocation.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 这个输出可以用来生成预算分配的摘要。
- en: '[PRE11]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '**Function** 4: summarize(state)'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: '**函数** 4：summarize(state)'
- en: Reuses interpreter from state (or creates one), then calls `interpret()`
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新使用状态中的解释器（或创建一个），然后调用`interpret()`
- en: '**On success:** returns a concise and professional summary of the budget allocation
    in HTML format, ready to be sent by email `{"html_summary": …}`'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成功时：** 返回一个简洁且专业的预算分配摘要，以 HTML 格式呈现，准备好通过电子邮件发送 `{"html_summary": …}`'
- en: This output `html_summary` is then returned by the API to the Gmail node on
    n8n to reply to the sender.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 这个输出 `html_summary` 然后被 API 返回到 n8n 上的 Gmail 节点以回复发件人。
- en: 'Now that we have all the functions, we can create the nodes and “wire” the
    Graph using the function `build_budagent_graph()` defined below:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了所有功能，我们可以创建节点，并使用下面定义的 `build_budagent_graph()` 函数“连接”图：
- en: '[PRE12]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'These four nodes are connected using Routers:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这四个节点通过路由器连接：
- en: '`route_after_parse` will direct the flow based on the output of the email parsing:
    if `error` in state → go to `"error"`; else → `"run"`.'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`route_after_parse` 将根据邮件解析的输出来指导流程：如果状态中有 `error` 则转到 `"error"`；否则转到 `"run"`。'
- en: '`route_after_run` will direct the flow based on the output of the FastAPI Microservice
    calling: if `error` in state → go to `"error"`; else → `"summarize"`.'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`route_after_run` 将根据调用 FastAPI 微服务的输出来指导流程：如果状态中有 `error` 则转到 `"error"`；否则转到
    `"summarize"`。'
- en: We are nearly done!
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 我们几乎完成了！
- en: 'We just need to package this in a FastAPI endpoint:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只需要将这个工具打包成 FastAPI 端点：
- en: '[PRE13]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: It will be queried by the `Query Agent API` node of our n8n workflow to return
    input parameters in `params`, Budget Optimiser results in `budget_results` and
    the summary generated by the Agent Interpreter in `html_summary`.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 它将由我们的 n8n 工作流程中的 `Query Agent API` 节点查询，以返回输入参数在 `params` 中，预算优化结果在 `budget_results`
    中，以及代理解释器生成的摘要在 `html_summary` 中。
- en: A fully functional AI Workflow for Budget Planning
  id: totrans-190
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一个完全功能的预算规划 AI 工作流程
- en: We can now activate the workflow on n8n and test the tool with different scenarios.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以在 n8n 上激活工作流程，并使用不同的场景测试这个工具。
- en: What if we don’t have a minimum budget for any management objectives?
  id: totrans-192
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果我们没有任何管理目标的最小预算怎么办？
- en: I will try to adapt the email to have `set_min_budget` at `False`.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 我将尝试调整邮件以使 `set_min_budget` 设置为 `False`。
- en: '![](../Images/8abf591e1823b154bb7f3336504ebb9e.png)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8abf591e1823b154bb7f3336504ebb9e.png)'
- en: Example of email – (Image by Saci)
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 邮件示例 – （图片由 Saci 提供）
- en: The email has been well parsed with now `set_min_budget` at the value `False`.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 邮件已经很好地解析，现在 `set_min_budget` 的值设置为 `False`。
- en: '[PRE14]'
  id: totrans-197
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'And we can see the results in the summary:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在摘要中看到结果：
- en: '![](../Images/fbc4654579eff9d1fddb6931f022841e.png)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fbc4654579eff9d1fddb6931f022841e.png)'
- en: New summary with updated constraints – (Image by Samir Saci)
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 新的摘要，带有更新的约束条件 – （图片由 Samir Saci 提供）
- en: 'As we could expect, the performance is better:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所预期，性能更好：
- en: 'Total ROI: €1,050,976 (vs. €1,024,051)'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总投资回报率：€1,050,976（与 €1,024,051 相比）
- en: '**ROI/€**: €0.26 (vs. €0.24)'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ROI/€**: €0.26（与 €0.24 相比）'
- en: Conclusion
  id: totrans-204
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This workflow has been presented to the APAC team, who started to “play with
    it”.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 这个工作流程已经向 APAC 团队展示，他们开始“玩弄”它。
- en: We learned that they use it to prepare slides with different scenarios of portfolio
    allocation for the board meetings.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 我们了解到他们使用它来准备董事会会议的不同投资组合分配场景的幻灯片。
- en: This remains a “strategic tool” that is used only a couple of times per year.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 这仍然是一个“战略工具”，每年只使用几次。
- en: However, we plan to reuse the same architecture for more “tactical” tools that
    supply chain departments can use for [ABC Analysis](https://youtu.be/Fp4AHYE14Mg?si=kYGkmdsvCANRd61B),
    [Stock Management,](https://youtu.be/U1HqjHZzgq4?si=mvYJYbU6iOlgzKyb) or [Supply
    Chain Optimisation](https://youtu.be/gF9ds3CH3N4?si=jpVVagZGc35uu4xz), as well
    as human resources for [Workforce Planning](https://youtu.be/OdLeRR4rvt0?si=riqvvyH7ufhoPVFo)
    or business controlling teams.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们计划重用相同的架构为更多“战术”工具提供支持，供应链部门可以使用这些工具进行 [ABC 分析](https://youtu.be/Fp4AHYE14Mg?si=kYGkmdsvCANRd61B)，[库存管理](https://youtu.be/U1HqjHZzgq4?si=mvYJYbU6iOlgzKyb)，或
    [供应链优化](https://youtu.be/gF9ds3CH3N4?si=jpVVagZGc35uu4xz)，以及人力资源部门用于 [劳动力规划](https://youtu.be/OdLeRR4rvt0?si=riqvvyH7ufhoPVFo)
    或商业控制团队。
- en: Can we go beyond this simple workflow?
  id: totrans-209
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们能否超越这个简单的流程？
- en: I am still not satisfied with the contribution of the Agentic part of the workflow.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 我对工作流程中 Agentic 部分的贡献仍然不满意。
- en: Indeed, it’s nice to have a tool that can be triggered by an email and provide
    a concise summary.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，有一个可以通过电子邮件触发并提供简洁摘要的工具是件好事。
- en: However, I would like to explore the idea of having multiple agents proposing
    different scenarios that would compete against each other.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我想探索拥有多个代理提出不同场景的想法，这些场景将相互竞争。
- en: What would be the impact on the ROI if we increase the minimum budget of sustainability
    by 15%?
  id: totrans-213
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果我们将可持续性的最低预算增加 15%，对投资回报率会有什么影响？
- en: For instance, we can ask agents to run multiple scenarios and provide a comparative
    study.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们可以要求代理运行多个场景并提供比较研究。
- en: We are still experimenting with various types of orchestration to determine
    the most efficient approach.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 我们仍在尝试各种类型的编排，以确定最有效的方法。
- en: This will be the topic of the following articles.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 这将是以下文章的主题。
- en: Other examples of Agentic Workflows?
  id: totrans-217
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 其他代理工作流程的例子？
- en: This is not the first time I am trying to link an optimisation tool (packaged
    in a FastAPI Microservice) with an Agentic Workflow.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是我第一次尝试将一个优化工具（打包在FastAPI微服务中）与代理工作流程链接起来。
- en: My initial attempt was to create a **Production Planning Optimisation Agent**.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 我最初的尝试是创建一个**生产计划优化代理**。
- en: '![](../Images/a76cf213321a7554fb571d4216c5588b.png)'
  id: totrans-220
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a76cf213321a7554fb571d4216c5588b.png)'
- en: Production Planning Agent – (Image by Samir Saci)
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 生产计划代理 – (图片由Samir Saci提供)
- en: Like here, I packaged an optimisation algorithm in a FastAPI Microservice that
    I wanted to connect to an email workflow.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 就像这里，我将一个优化算法打包在一个FastAPI微服务中，我希望将其连接到一个电子邮件工作流程。
- en: '![](../Images/06a9343d11dd97ba19f27e1826ec7df6.png)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/06a9343d11dd97ba19f27e1826ec7df6.png)'
- en: Production Planning FastAPI Microservices – (Image by Samir Saci)
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 生产计划FastAPI微服务 – (图片由Samir Saci提供)
- en: Unlike here, the Agentic part of the workflow was handled in n8n with two Agent
    nodes.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 与这里不同，工作流程的代理部分由n8n中的两个代理节点处理。
- en: '![](../Images/cb1ee7c81b968f9addec8c4598c142a5.png)'
  id: totrans-226
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cb1ee7c81b968f9addec8c4598c142a5.png)'
- en: Workflow – (Image by Samir Saci)
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程 – (图片由Samir Saci提供)
- en: The results were quite satisfying, as you can see in the short video linked
    below.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 结果相当令人满意，如以下链接的短视频所示。
- en: The user experience was very smooth.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 用户界面非常流畅。
- en: However, the maintenance proved to be challenging for the team.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，维护对团队来说是一项挑战。
- en: This is why we wanted to explore the use of Python and TypeScript frameworks
    for the agentic workflow, like here.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，我们想探索使用Python和TypeScript框架来构建代理工作流程，就像这里一样。
- en: What’s next? Agentic Approach of Business Planning
  id: totrans-232
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 接下来是什么？商业计划的代理方法
- en: At our startup, [LogiGreen](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization),
    we are attempting (through experiments like this one) to extend beyond supply
    chain optimisation and encompass business decision-making.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的初创公司[LogiGreen](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)中，我们试图（通过此类实验）超越供应链优化，并涵盖商业决策。
- en: On my roadmap, I have a tool that I have developed to help small and medium-sized
    company optimise their cash flow.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的路线图中，我有一个开发出来的工具，可以帮助小型和中型公司优化他们的现金流。
- en: '![](../Images/63029776821ee13bac5633a25123056d.png)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/63029776821ee13bac5633a25123056d.png)'
- en: Value Chain of the business model of my friend – (Image by Samir Saci)
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 我朋友商业模式的产业链 – (图片由Samir Saci提供)
- en: In [another article](https://towardsdatascience.com/business-planning-with-python-inventory-and-cash-flow-management-4f9beb7ecbec/)
    published in Towards Data Science, I have introduced how I used Python to simulate
    the financial flows of a company selling renewable paper cups to coffee shops.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 在发表在Towards Data Science的[另一篇文章](https://towardsdatascience.com/business-planning-with-python-inventory-and-cash-flow-management-4f9beb7ecbec/)中，我介绍了我是如何使用Python来模拟一家向咖啡店销售可回收纸杯公司的财务流。
- en: “We have to refuse orders as we don’t have enough cash to pay suppliers for
    stock replenishment.”
  id: totrans-238
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “我们必须拒绝订单，因为我们没有足够的现金来支付供应商的库存补充。”
- en: A close friend, who owns a small business, was complaining about cash flow issues
    limiting the development of his company.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 一个经营小生意的亲密朋友，抱怨现金流问题限制了公司的发展。
- en: I started by tackling the problem of inventory management with an optimised
    built-in solution using Python.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先使用Python的一个优化内置解决方案来解决库存管理问题。
- en: '![](../Images/e66eb73e538c1260bf77ffe2dd8e664b.png)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e66eb73e538c1260bf77ffe2dd8e664b.png)'
- en: Inventory Management Rule – (Image by Samir Saci)
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 库存管理规则 – (图片由Samir Saci提供)
- en: Then I enriched the model considering sales channel strategy, payment terms
    and many other strategic business parameters to help him find the optimal business
    plan to maximise profitability.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我考虑了销售渠道策略、付款条款和其他许多战略商业参数来丰富模型，帮助他找到最大化利润的最佳商业计划。
- en: '![](../Images/c67e4083593c65fb7d7e0828e07f12c6.png)'
  id: totrans-244
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c67e4083593c65fb7d7e0828e07f12c6.png)'
- en: Example of scenarios generated – (Image by Samir Saci)
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 生成场景的示例 – (图片由Samir Saci提供)
- en: This solution is probably the next candidate in our experimentation with using
    agentic workflows to support business and operational decision-making.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 这个解决方案可能是我们在使用代理工作流程支持业务和运营决策方面的实验中的下一个候选者。
- en: For more information, you can have a look at this short presentation of the
    tool
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 如需更多信息，您可以查看这个工具的简短演示
- en: Currently, it is packaged in a FastAPI microservice connected to a React frontend
    (and streamlit for the public demo).
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，它被包装在一个与React前端（以及streamlit用于公共演示）连接的FastAPI微服务中。
- en: '[![](../Images/36ea4681c01b10f61d97527035903d6a.png)](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](../Images/36ea4681c01b10f61d97527035903d6a.png)](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)'
- en: UI of the tool available in [LogiGreen Apps](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)
    – (Image by Samir Saci)
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 工具的UI可在[LogiGreen Apps](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)中找到
    – （图片由Samir Saci提供）
- en: I would like to implement an AI workflow that would
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望实现一个AI工作流程，它会
- en: Take multiple scenarios *(like the ones presented in the video)*
  id: totrans-252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑多个场景（如视频中所展示的）
- en: Call the API for each scenario
  id: totrans-253
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为每个场景调用API
- en: Collect and process the results
  id: totrans-254
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 收集并处理结果
- en: Provide a comparative analysis to recommend the best decision
  id: totrans-255
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供比较分析以推荐最佳决策
- en: Basically, I would like to outsource to a single (or multiple agents) the complete
    study presented in the article and the video.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，我希望将文章和视频中展示的完整研究外包给单个（或多个）代理。
- en: For that, we are exploring multiple approaches to agent orchestration.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这个目的，我们正在探索多种代理编排方法。
- en: We will share our findings in a future article. Stay tuned!
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在未来的文章中分享我们的发现。请保持关注！
- en: About Me
  id: totrans-259
