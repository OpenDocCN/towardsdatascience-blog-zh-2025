- en: How to Get Performance Data from Power BI with DAX Studio
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用 DAX Studio 从 Power BI 获取性能数据
- en: 原文：[https://towardsdatascience.com/how-to-get-performance-data-from-power-bi-with-dax-studio/](https://towardsdatascience.com/how-to-get-performance-data-from-power-bi-with-dax-studio/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/how-to-get-performance-data-from-power-bi-with-dax-studio/)'
- en: <mdspan datatext="el1745362496873" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745362496873" class="mdspan-comment">简介</mdspan>
- en: 'To put things straight: I will not discuss how to optimize DAX Code today.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 直接来说：今天我不会讨论如何优化 DAX 代码。
- en: More articles will follow, concentrating on common mistakes and how to avoid
    them.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 将会有更多文章跟进，专注于常见错误及其避免方法。
- en: But, before we can understand the performance metrics, we need to understand
    the architecture of the Tabular model in Power BI.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但在我们能够理解性能指标之前，我们需要了解 Power BI 中 Tabular 模型的架构。
- en: The same architecture applies to Tabular models in SQL Server Analysis Services.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的架构适用于 SQL Server Analysis Services 中的 Tabular 模型。
- en: 'Any Tabular model has two Engines:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 任何 Tabular 模型都有两个引擎：
- en: Storage Engine
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 存储引擎
- en: Formula Engines
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公式引擎
- en: These two have distinct properties and fulfill different tasks in a Tabular
    model.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个在 Tabular 模型中具有不同的属性，并执行不同的任务。
- en: Let’s investigate them.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们调查一下。
- en: Storage Engine
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 存储引擎
- en: The Storage Engine is the interface between the DAX Query and the data stored
    in the Tabular model.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 存储引擎是 DAX 查询与 Tabular 模型中存储的数据之间的接口。
- en: This Engine takes any given DAX query and sends queries to the Vertipaq Storage
    engine, which stores the data in the data model.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 该引擎接受任何给定的 DAX 查询，并将查询发送到存储数据模型的 Vertipaq 存储引擎。
- en: The Storage Engine uses a language called xmSQL to query the data model.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 存储引擎使用一种名为 xmSQL 的语言来查询数据模型。
- en: This language is based on the standard SQL language but has fewer capabilities
    and supports only simple arithmetic operators (+, -, /, *, =, <>, and IN).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这种语言基于标准的 SQL 语言，但功能较少，仅支持简单的算术运算符（+、-、/、*、=、<> 和 IN）。
- en: To aggregate data, xmSQL supports `SUM`, `MIN`, `MAX`, `COUNT`, and `DCOUNT`
    (Distinct Count).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 为了聚合数据，xmSQL 支持 `SUM`、`MIN`、`MAX`、`COUNT` 和 `DCOUNT`（唯一计数）。
- en: Then it supports `GROUP BY`, `WHERE`, and `JOINs`.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，它支持 `GROUP BY`、`WHERE` 和 `JOINs`。
- en: It will help if you have a basic understanding of SQL Queries when you try to
    understand xmSQL. If you don’t know SQL, it will be helpful to learn the basics
    when digging deeper into analyzing bad-performing DAX code.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当您尝试理解 xmSQL 时，如果您对 SQL 查询有基本的了解，那将有所帮助。如果您不知道 SQL，当深入分析性能不佳的 DAX 代码时，学习基础知识将是有益的。
- en: The most important fact is that the Storage Engine is multi-threaded.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 最重要的是，存储引擎是支持多线程的。
- en: Therefore, when the Storage Engine executes a query, it will use multiple CPU-Cores
    to speed up query execution.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当存储引擎执行查询时，它将使用多个 CPU 核心来加速查询执行。
- en: Lastly, the Storage Engine can Cache queries and the results.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，存储引擎可以缓存查询和结果。
- en: Consequently, repeated execution of the same query will speed up the execution
    because the result can be retrieved from the cache.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，重复执行相同的查询将加快执行速度，因为结果可以从缓存中检索。
- en: Formula Engine
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 公式引擎
- en: The Formula Engine is the DAX engine.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 公式引擎是 DAX 引擎。
- en: All functions, which the Storage Engine cannot execute, are executed by the
    Formula Engine.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 所有存储引擎无法执行的功能都由公式引擎执行。
- en: Usually, the Storage Engine retrieves the data from the data model and passes
    the result to the Formula Engine.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，存储引擎从数据模型检索数据，并将结果传递给公式引擎。
- en: This operation is called materialization, as the data is stored in memory to
    be processed by the Formula Engine.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这个操作被称为物化，因为数据被存储在内存中以供公式引擎处理。
- en: As you can imagine, it is crucial to avoid large materializations.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所想，避免大规模物化至关重要。
- en: The Storage Engine can call the Formula Engine when an xmSQL-Query contains
    functions that the Storage Engine cannot execute.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 当 xmSQL 查询包含存储引擎无法执行的功能时，存储引擎可以调用公式引擎。
- en: This is operation id called `CallbackDataID` and should be avoided, if possible.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这个操作 ID 被称为 `CallbackDataID`，如果可能的话，应避免使用。
- en: Crucially, the Formula engine is single-threaded and has no Cache.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的是，公式引擎是单线程的，并且没有缓存。
- en: 'This means:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着：
- en: No parallelism by using multiple CPU Cores
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不通过使用多个 CPU 核心来并行处理
- en: No re-use of repeated execution of the same query
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不重复执行相同的查询
- en: This means we want to offload as many operations as possible to the Storage
    engine.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们希望尽可能将操作卸载到存储引擎。
- en: Unfortunately, it is impossible to directly define which part of our DAX-Code
    is executed by which Engine. We must avoid specific patterns to ensure that the
    correct engine completes the work in the least amount of time.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，我们无法直接定义我们的DAX-Code的哪一部分是由哪个引擎执行的。我们必须避免特定的模式，以确保正确的引擎以最短的时间完成工作。
- en: And this is another story that can fill entire books.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这又是另一个可以填满整本书的故事。
- en: But how can we see how much time is used by each Engine?
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们如何看到每个引擎使用的时间是多少？
- en: Getting the Performance data
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 获取性能数据
- en: We need to have DAX Studio on our machine to get Performance Metrics.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要在我们的机器上安装DAX Studio以获取性能指标。
- en: We can find the download link for DAX Studio in the References Section below.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在下面的参考文献部分找到DAX Studio的下载链接。
- en: If you cannot install the Software, you can get a portable DAX version from
    the same site. Download the ZIP file and unpack it in any local folder. Then you
    can start DAXStudio.exe, and you get all features without limitations.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您无法安装软件，您可以从同一网站获取便携式DAX版本。下载ZIP文件，并将其解压缩到任何本地文件夹。然后您可以启动DAXStudio.exe，并获取所有功能而没有任何限制。
- en: But first, we need to get the DAX Query from Power BI.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 但首先，我们需要从Power BI获取DAX查询。
- en: 'First, we need to start Performance Analyzer in Power BI Desktop:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要在Power BI Desktop中启动性能分析：
- en: '![](../Images/577041b4edc63d394480d2d6502a3332.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/577041b4edc63d394480d2d6502a3332.png)'
- en: Figure 1 – Start Performance Analyzer in Power BI Desktop (Figure by the Author)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图1 – 在Power BI Desktop中启动性能分析（图由作者提供）
- en: 'As soon as we see the Performance Analyzer Pane, we can start recording the
    performance data and the DAX query for all Visuals:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们看到性能分析面板，我们就可以开始记录所有视觉的性能数据和DAX查询：
- en: '![](../Images/974cdb59d44515d09f8f08d5aacc526c.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/974cdb59d44515d09f8f08d5aacc526c.png)'
- en: Figure 2 – Start recording of Performance data and DAX query (Figure by the
    Author)
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图2 – 开始录制性能数据和DAX查询（图由作者提供）
- en: First, we must click on Start Recording
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们必须点击“开始录制”
- en: Then click on “Refresh Visuals” to restart the rendering of all Visuals of the
    actual page.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 然后点击“刷新视觉”以重新启动实际页面上所有视觉的渲染。
- en: We can click on one of the rows in the list and notice that the corresponding
    Visual is also activated.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以点击列表中的一行，并注意到相应的视觉也被激活了。
- en: When we expand on one of the rows in the report, we see a few rows and a link
    to copy the DAX query to the Clipboard.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们展开报告中的一行时，我们会看到几行以及一个复制DAX查询到剪贴板的链接。
- en: '![](../Images/542a9060765fa695a18858f4d0b2b43c.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/542a9060765fa695a18858f4d0b2b43c.png)'
- en: Figure 3 – Select the Visual and copy the query (Figure by the Author)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图3 – 选择视觉并复制查询（图由作者提供）
- en: As we can see, Power BI needed 80’606 milliseconds to complete the rendering
    of the Matrix Visual.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，Power BI需要80’606毫秒来完成矩阵视觉的渲染。
- en: The DAX query alone used 80’194 milliseconds.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: DAX查询本身用了80’194毫秒。
- en: This is a highly poor-performing measure used in this visual.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个在这个视觉中使用的性能极差的度量值。
- en: Now, we can start DAX Studio.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以启动DAX Studio。
- en: 'In case we have DAX Studio installed on our machine, we will find it in the
    External Tool Ribbon:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在机器上安装了DAX Studio，我们将在外部工具功能区找到它：
- en: '![](../Images/371cfa2f544f179aa3ee2508c0bf7bfb.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/371cfa2f544f179aa3ee2508c0bf7bfb.png)'
- en: Figure 4 – Start DAX Studio as an External Tool (Figure by the Author)
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图4 – 将DAX Studio作为外部工具启动（图由作者提供）
- en: DAX Studio will automatically be connected to the Power BI Desktop file.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: DAX Studio将自动连接到Power BI Desktop文件。
- en: 'In case that we must start DAX Studio manually, we can manually connect to
    the Power BI file as well:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们必须手动启动DAX Studio，我们也可以手动连接到Power BI文件：
- en: '![](../Images/66887e0e2513f3c72d145a0e9003acfb.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/66887e0e2513f3c72d145a0e9003acfb.png)'
- en: Figure 5 – Manually connect DAX Studio to Power BI Desktop (Figure by the Author)
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图5 – 手动将DAX Studio连接到Power BI Desktop（图由作者提供）
- en: After the connection is established, an empty query is opened in DAX Studio.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 连接建立后，DAX Studio中打开了一个空查询。
- en: On the bottom part of the DAX Studio Window, you will see a Log section where
    you can see what happens.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在DAX Studio窗口的底部，您将看到一个日志部分，您可以看到发生了什么。
- en: 'But, before pasting the DAX Query from Power BI Desktop, we have to start Server
    Timings in DAX Studio (Right top corner of the DAX Studio Window):'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 但，在从Power BI Desktop粘贴DAX查询之前，我们必须在DAX Studio中启动服务器计时（DAX Studio窗口的右上角）：
- en: '![](../Images/9f8ac3c1ac96405c0ba66b8ef2cf7844.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9f8ac3c1ac96405c0ba66b8ef2cf7844.png)'
- en: Figure 6 – Start Server Timings in DAX Studio (Figure by the Author)
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图6 – 在DAX Studio中启动服务器计时（图由作者提供）
- en: After pasting the Query to the Empty Editor, we have to Enable the “Clear on
    Run” Button and execute the query.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在将查询粘贴到空编辑器后，我们必须启用“运行时清除”按钮并执行查询。
- en: '![](../Images/3cc86b7d478e016bd031e44e3aa9e1fe.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3cc86b7d478e016bd031e44e3aa9e1fe.png)'
- en: Figure 7 – Enabling “Clear on Run” Feature (Figure by the Author)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图7 - 启用“运行时清除”功能（图由作者提供）
- en: “Clear on Run” ensures the Storage Engine Cache is cleared before executing
    the Query.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: “运行时清除”确保在执行查询之前清除存储引擎缓存。
- en: Clearing the Cache before measuring performance metrics is the best practice
    to ensure a consistent starting point for the measurement.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在测量性能指标之前清除缓存是最佳实践，以确保测量的起点一致。
- en: 'After executing the query, we will get a Server Timings page at the bottom
    of the DAX Studio Window:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 执行查询后，我们将在DAX Studio窗口底部获得一个服务器计时页面：
- en: '![](../Images/ccf1e0a9cbbdf4a96a2f85e091101d99.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ccf1e0a9cbbdf4a96a2f85e091101d99.png)'
- en: Figure 8 – Server Timings Window in DAX Studio (Figure by the Author)
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图8 - DAX Studio中的服务器计时窗口（图由作者提供）
- en: Now we see a lot of information, which we will explore next.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们看到了很多信息，我们将在下一部分进行探讨。
- en: Interpreting the data
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解释数据
- en: 'On the left side of Server Timings, we will see the execution timings:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在服务器计时窗口的左侧，我们将看到执行时间：
- en: '![](../Images/cd87533ab91359043341ac98fc59e25a.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cd87533ab91359043341ac98fc59e25a.png)'
- en: Figure 9 – Execution Timings (Figure by the Author)
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图9 - 执行时间（图由作者提供）
- en: 'Here we see the following numbers:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到以下数字：
- en: Total – The total execution time in milliseconds (ms)
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Total - 毫秒（ms）的总执行时间
- en: SE CPU – The sum of the CPU time spent by the Storage Engine (SE) to execute
    the Query.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SE CPU - 存储引擎（SE）执行查询所花费的CPU时间总和。
- en: Usually, this number is greater than the Total time because of the parallel
    execution using multiple CPU Cores
  id: totrans-89
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 通常，这个数字大于总时间，因为使用了多个CPU核心进行并行执行
- en: FE – The time spent by the Formula Engine (FE) and the percentage of the total
    execution time
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: FE - 公式引擎（FE）所花费的时间和总执行时间的百分比
- en: SE – The time spent by the Storage Engine (FE) and the percentage of the total
    execution time
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SE - 存储引擎（SE）所花费的时间和总执行时间的百分比
- en: SE Queries – The number of Storage Engine Queries needed for the DAX Query
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SE Queries - 为DAX查询所需的存储引擎查询数量
- en: SE Cache – The use of Storage Engine Cache, if any
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SE Cache - 如果有的话，存储引擎缓存的使用情况
- en: 'As a rule of thumb: The larger the percentage of Storage Engine time, compared
    to Formula Engine time, the better.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 常规做法：与公式引擎时间相比，存储引擎时间所占的百分比越大，越好。
- en: 'The middle section shows a list of Storage Engine Queries:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 中间部分显示了一个存储引擎查询列表：
- en: '![](../Images/8d03f11c1b36dbfb1b9e9d70e8e497a9.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8d03f11c1b36dbfb1b9e9d70e8e497a9.png)'
- en: Figure 10 – List of Storage Engine queries (Figure by the Author)
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图10 - 存储引擎查询列表（图由作者提供）
- en: 'This list shows how many SE Queries have been executed for the DAX Query and
    includes some statistical columns:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 此列表显示了为DAX查询执行了多少个SE查询，并包括一些统计列：
- en: Line – Index line. Usually, we will not see all the lines. But we can see all
    lines by clicking on the Cache and Internal buttons on the top right corner of
    the Server Timings Pane. But we will not find them very useful, as they are an
    internal representation of the visible queries. Sometimes it can be helpful to
    see the Cache queries and see what part of the query has been accelerated by the
    SE Cache.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Line - 索引行。通常我们不会看到所有行。但我们可以通过点击服务器计时面板右上角的缓存和内部按钮来查看所有行。但我们将发现它们并不非常有用，因为它们是可见查询的内部表示。有时查看缓存查询并查看SE缓存加速了查询的哪个部分可能会有所帮助。
- en: Subclass – Normally “Scan”
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子类 - 通常为“扫描”
- en: Duration – Time spent for each SE Query
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Duration - 每个SE查询所花费的时间
- en: CPU – CPU Time spent for each SE Query
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CPU - 每个SE查询所花费的CPU时间
- en: Par. – Parallelism of each SE Query
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Par. - 每个SE查询的并行性
- en: Rows and KB – Size of the materialization by the SE Query
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Rows and KB - SE查询的物化大小
- en: Waterfall – Timing sequence by the SE Queries
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 水瀑布 - 由 SE 查询的时序
- en: Query – The beginning of each SE Query
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查询 - 每个SE查询的开始
- en: In this case, the first SE Query returned 12’527’422 rows to the Formula engine
    (The number of rows in the entire Fact table) using 1 GB of Memory. This is not
    good, as large materializations like these are performance killers.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，第一个SE查询向公式引擎返回了12,527,422行（整个事实表中的行数），使用了1GB的内存。这并不好，因为像这样的大型物化是性能杀手。
- en: This clearly signifies that we made a big mistake with your DAX Code.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这清楚地表明我们在您的DAX代码中犯了一个大错误。
- en: 'Lastly, we can read the actual xmSQL Code:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以阅读实际的xmSQL代码：
- en: '![](../Images/ed1e03f07b90ca870bca69be9778a4f0.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ed1e03f07b90ca870bca69be9778a4f0.png)'
- en: Figure 11 – Storage  Engine Query Code (Figure by the Author)
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图11 – 存储引擎查询代码（图由作者提供）
- en: Here we can see the xmSQL code and try to understand the Problem of the DAX
    Query.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里我们可以看到xmSQL代码并尝试理解DAX查询的问题。
- en: In this case, we see that there is a highlighted CallbackDataID. DAX Studio
    highlights all CallbackDataID in the Query text and makes all queries in the query
    list bold, which contains a CallbackDataID.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们可以看到有一个高亮的CallbackDataID。DAX Studio在查询文本中突出显示所有的CallbackDataID，并将包含CallbackDataID的所有查询在查询列表中加粗。
- en: We can see that, in this case, an IF() function is pushed to the Formula Engine
    (FE), as the SE cannot process this function. But SE knows that FE can do it.
    So, it calls the FE for each row in the result. In this case, over 12 million
    times.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，在这种情况下，一个IF()函数被推送到公式引擎（FE），因为SE无法处理这个函数。但SE知道FE可以处理它。所以，它为结果中的每一行调用FE。在这种情况下，超过1200万次。
- en: As we can see from the timing, this takes a lot of time.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 从计时中我们可以看到，这需要很多时间。
- en: Now we know that we have written bad DAX Code and the SE calls the FE many times
    to execute a DAX function. And we know that we use 1 GB of RAM to execute the
    query.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道我们写了一段不好的DAX代码，SE多次调用FE来执行一个DAX函数。我们还知道我们使用了1GB的RAM来执行查询。
- en: Moreover, we know that the parallelism is only 1.9 times, which could be much
    better.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还知道并行度只有1.9倍，这可以更好。
- en: What it should look like
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 它应该看起来是什么样子
- en: The DAX query contains only the Query created by Power BI Desktop.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: DAX查询只包含Power BI桌面创建的查询。
- en: But in most cases, we need the Code of the Measure.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 但在大多数情况下，我们需要度量代码。
- en: 'DAX Studio offers a feature called “Define Measures” to get the DAX Code of
    the Measure:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: DAX Studio提供了一个名为“定义度量”的功能，用于获取度量的DAX代码：
- en: Add one of two blank lines in the Query
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在查询中添加一个或两个空行。
- en: Place the cursor on the first (empty) line
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将光标放在第一行（空行）上
- en: Find the Measure in the Data Model
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在数据模型中找到度量。
- en: Right-click on the Measure and click on Define Measure
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 右键单击度量并点击“定义度量”
- en: '![](../Images/6d5c8604df4fda7f9c65cd960db1bfe0.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6d5c8604df4fda7f9c65cd960db1bfe0.png)'
- en: Figure 12 – Define Measure in DAX Studio (Figure by the Author)
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 图12 – 在DAX Studio中定义度量（图由作者提供）
- en: 5\. If our Measure calls another Measure, we can click on Define Dependent Measures.
    In this case, DAX Studio extracts the code of all Measures used by the selected
    Measure
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 如果我们的度量调用另一个度量，我们可以点击“定义相关度量”。在这种情况下，DAX Studio提取了所选度量使用的所有度量的代码
- en: The result is a `DEFINE` statement followed by one or more `MEASURE` Statements
    containing the DAX code of our guilty Measure.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个`DEFINE`语句，后面跟着一个或多个包含我们嫌疑度量DAX代码的`MEASURE`语句。
- en: 'After optimizing the code, I executed the new Query and took the Server Timings
    to compare them to the original Data:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在优化代码后，我执行了新的查询并获取了服务器计时，以将它们与原始数据进行比较：
- en: '![](../Images/fbe9a38e21fe86c1c6e2e917ce9e1b50.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fbe9a38e21fe86c1c6e2e917ce9e1b50.png)'
- en: Figure 13 – Comparing slow a fast DAX code (Figure by the Author)
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图13 – 比较慢速和快速的DAX代码（图由作者提供）
- en: Now, the entire query took only 55 ms, and SE created a materialization of only
    19 Rows.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，整个查询只用了55毫秒，SE只创建了19行的物化。
- en: The parallelism is at 2.6 times, which is better than 1.9 times. It looks like
    the SE didn’t need that much processing power to increase parallelism.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 并行度达到了2.6倍，这比1.9倍要好。看起来SE不需要那么多的处理能力来增加并行度。
- en: This is a very good sign.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常好的迹象。
- en: The optimization worked very well after looking at these numbers.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 在查看这些数字之后，优化效果非常好。
- en: Conclusion
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: We need some information when we have a slow Visual in your Power BI Report.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在Power BI报告中有一个慢速的视觉时，我们需要一些信息。
- en: The first step is to use Performance Analyzer in Power BI Desktop to see where
    time is spent rendering the result of the Visual.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是使用Power BI桌面中的性能分析器来查看渲染视觉结果所花费的时间。
- en: When we see that it takes much time to execute the DAX Query, we need DAX Studio
    to find out the problem and try to fix it.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们看到执行DAX查询需要花费很多时间时，我们需要DAX Studio找出问题并尝试修复它。
- en: I didn’t cover any methods to optimize DAX in this article, as it wasn’t my
    aim to do it.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我没有涵盖任何优化DAX的方法，因为这不是我的目标。
- en: But now that I have laid down the foundation to get and understand the performance
    metrics available in DAX Studio, I can write further articles to show how to optimize
    DAX code, what you should avoid, and why.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在我已经奠定了获取和理解DAX Studio中可用性能指标的基础，我可以写更多的文章来展示如何优化DAX代码，你应该避免什么，以及为什么。
- en: I’m looking forward to the journey with you.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我期待与你一同踏上这段旅程。
- en: References
  id: totrans-144
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 参考文献
- en: 'Download DAX Studio for free here: [https://www.sqlbi.com/tools/dax-studio/](https://www.sqlbi.com/tools/dax-studio/)'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 免费下载 DAX Studio：[https://www.sqlbi.com/tools/dax-studio/](https://www.sqlbi.com/tools/dax-studio/)
- en: 'Free SQLBI Tools Training: [DAX Tools Video Course – SQLBI](https://www.sqlbi.com/p/dax-tools-video-course/)'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 免费SQLBI工具培训：[DAX 工具视频课程 – SQLBI](https://www.sqlbi.com/p/dax-tools-video-course/)
- en: SQLBI offers DAX-Optimization training as well.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: SQLBI 还提供 DAX 优化培训。
- en: I use the Contoso sample dataset, like in my previous articles. You can download
    the ContosoRetailDW Dataset for free from Microsoft [here](https://www.microsoft.com/en-us/download/details.aspx?id=18279).
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用的是 Contoso 示例数据集，就像在我之前的文章中一样。您可以从微软[此处](https://www.microsoft.com/en-us/download/details.aspx?id=18279)免费下载
    ContosoRetailDW 数据集。
- en: The Contoso Data can be freely used under the MIT License, as described [here](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: Contoso 数据可以在 MIT 许可证下自由使用，具体描述请参阅[此处](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo)。
