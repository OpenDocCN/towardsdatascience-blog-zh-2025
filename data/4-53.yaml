- en: Simplicity Over Black Boxes
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 简单胜于黑盒
- en: 原文：[https://towardsdatascience.com/simplicity-over-black-boxes-eefc72a5c507/](https://towardsdatascience.com/simplicity-over-black-boxes-eefc72a5c507/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/simplicity-over-black-boxes-eefc72a5c507/](https://towardsdatascience.com/simplicity-over-black-boxes-eefc72a5c507/)
- en: '![Cover, image by Author](../Images/c66d19a95b2fe2418cb4edff153ff7c4.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![封面，图片由作者提供](../Images/c66d19a95b2fe2418cb4edff153ff7c4.png)'
- en: Cover, image by Author
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 封面，图片由作者提供
- en: Modern machine learning has delivered incredible breakthroughs in lots of fields.
    These successes come from advanced models that can uncover intricate patterns
    in massive datasets.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 现代机器学习在众多领域取得了令人难以置信的突破。这些成功来自于先进的模型，它们能够在海量数据集中揭示复杂的模式。
- en: 'But there’s one area where this approach falls short: easy interpretation.
    Most ML models, often referred to as "black boxes," take vast amounts of data
    and contain thousands of coefficients and weights. Instead of extracting clear,
    actionable insights, they leave us with results that are difficult for humans
    to understand or apply.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但这种方法有一个不足之处：易于解释。大多数机器学习模型，通常被称为“黑盒”，包含大量数据以及数千个系数和权重。它们不是提取清晰、可操作的观点，而是留下了难以被人类理解或应用的结果。
- en: This gap highlights the need for a different approach – one that focuses on
    finding concise, interpretable rules rather than relying solely on complex models.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这个差距突显了需要一种不同的方法——一种专注于寻找简洁、可解释的规则，而不是仅仅依赖于复杂模型的方法。
- en: Most efforts focus on explaining "black box" models rather than directly extracting
    knowledge from raw data. The root of the problem lies in the "machine-first" mindset,
    where the priority is building optimal algorithms rather than human-like knowledge
    extraction. Humans rely on knowledge to generate experiments and new data, but
    the reverse – converting data into actionable knowledge – is largely overlooked.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数努力都集中在解释“黑盒”模型上，而不是直接从原始数据中提取知识。问题的根源在于“机器优先”的思维模式，其中优先考虑的是构建最优算法，而不是类似人类的知识提取。人类依赖于知识来生成实验和新数据，但将数据转化为可操作知识的过程却被大量忽视。
- en: The quest to turn complex data into simple, human-understandable logic has been
    around for decades. Starting in the 1960s, research on formal logic inspired the
    creation of rule-learning algorithms like Corels, RuleFit, and Skope-Rules. These
    methods extract concise Boolean expressions from complex data, often using greedy
    optimization techniques. However, despite progress in interpretable and explainable
    AI, significant challenges remain.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 将复杂数据转化为简单、人类可理解的逻辑这一追求已经持续了几十年。从20世纪60年代开始，形式逻辑的研究激发了规则学习算法如Corels、RuleFit和Skope-Rules的创建。这些方法从复杂数据中提取简洁的布尔表达式，通常使用贪婪优化技术。然而，尽管在可解释和可解释人工智能方面取得了进展，但仍然存在重大挑战。
- en: Not a long time ago a group of scientists from Russia and France suggested their
    approach – **Human Knowledge Models (**HKM), which distill data into the form
    of simple rules.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 不久前，一群来自俄罗斯和法国的科学家提出了他们的方法——**人类知识模型（HKM**），它将数据提炼成简单规则的形式。
- en: HKM creates simple rules that contain basic Boolean operators (AND, OR, NOT)
    and thresholds. It comes up not more than with 4 rules. These rules are easy to
    use in different domaines, especially when a human is involved.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: HKM创建了包含基本布尔运算符（AND、OR、NOT）和阈值的简单规则。它最多只产生4条规则。这些规则在不同领域都很容易使用，尤其是在涉及人类的情况下。
- en: 'When you may want to use this:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当你可能想要使用此方法时：
- en: predictions will be used by field experts. For instance, a doctor might receive
    a model’s prediction about the likelihood of a patient having pneumonia. If the
    prediction comes from a "black box," it becomes challenging for the doctor to
    adjust the results based on personal experience, leading to low trust in such
    predictions. A more effective approach would be to distill clear, understandable
    rules from patient medical histories (e.g., "If the patient’s blood pressure is
    above 120 and their temperature exceeds 38°C, the risk of pneumonia is high").
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测将由领域专家使用。例如，医生可能会收到模型关于患者患肺炎可能性的预测。如果预测来自“黑盒”，医生就难以根据个人经验调整结果，导致对这种预测的信任度降低。更有效的方法是从患者的医疗历史中提炼出清晰、易懂的规则（例如，“如果患者的血压高于120且体温超过38°C，患肺炎的风险很高”）。
- en: When deploying an ML model to production is unjustifiably expensive or complex,
    a few business rules can often be implemented more easily, even directly on the
    front-end.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当部署机器学习模型到生产环境中变得不切实际地昂贵或复杂时，一些业务规则通常可以更容易地实施，甚至可以直接在前端实施。
- en: When you have small number of features or observations and can’t build a complex
    model.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你只有少量特征或观测值，无法构建复杂模型时。
- en: HKM training
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: HKM训练
- en: 'The HKM training identifies:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: HKM训练识别：
- en: thresholds to simplify continuous data;
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定简化连续数据的阈值；
- en: the best subset of features;
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最佳特征子集；
- en: the optimal Boolean logic to model decision-making.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模拟决策制定的优化布尔逻辑。
- en: The process generates all possible Boolean functions, simplifies them into concise
    formulas, and evaluates their performance. Unlike traditional machine learning,
    which adjusts coefficients, HKMs explore different combinations of features and
    rules to find the most effective yet human-comprehensible models.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 该过程生成所有可能的布尔函数，将它们简化为简洁的公式，并评估其性能。与传统机器学习不同，后者调整系数，HKMs探索特征和规则的多种组合，以找到最有效且易于人类理解的模式。
- en: '![Training process, image by Author](../Images/be5a98363fc50f8b1aa749ba81cd36b4.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![训练过程，图片由作者提供](../Images/be5a98363fc50f8b1aa749ba81cd36b4.png)'
- en: Training process, image by Author
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程，图片由作者提供
- en: HKM training avoids imputing missing data, treating it as valuable information,
    and produces multiple top-performing models, giving users flexibility in choosing
    the most practical solution.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: HKM训练避免了填充缺失数据，将其视为有价值的信息，并产生多个表现优异的模型，使用户在选择最实用的解决方案时具有灵活性。
- en: Where HKMs Fall Short
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: HKMs的局限性
- en: HKMs aren’t suited for every problem. For tasks with high branching complexity
    (big number of features) their simplicity becomes a disadvantage. These scenarios
    require substantial memory and logic that exceed human processing capacity. Nonetheless,
    HKMs can still play a critical role in applied fields like healthcare, where they
    serve as a practical starting point to address obvious blind spots.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: HKMs并不适合每个问题。对于具有高分支复杂度（大量特征）的任务，它们的简单性成为劣势。这些场景需要大量的内存和逻辑，这超出了人类的处理能力。尽管如此，HKMs在应用领域如医疗保健中仍可以发挥关键作用，它们作为解决明显盲点的实用起点。
- en: Another limitation lies in feature identification. Unlike deep-learning models
    that can automatically extract complex patterns, HKMs depend on humans to define
    and measure key features. That’s why feature engineering falls on the shoulders
    of the analyst.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个限制在于特征识别。与可以自动提取复杂模式的深度学习模型不同，HKMs依赖于人类来定义和测量关键特征。这就是为什么特征工程落在分析师的肩上。
- en: Churn prediction example
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 客户流失预测示例
- en: As a toy example we will use a generated Churn prediction dataset.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 作为玩具示例，我们将使用一个生成的客户流失预测数据集。
- en: 'Install the libraries:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 安装库：
- en: '[PRE0]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Dataset generation:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集生成：
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The dataset contains some basic metrics on user characteristics and the binary
    target – Churn. Sample data:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集包含一些关于用户特征和二元目标 – 客户流失的基本指标。样本数据：
- en: '![Dataset, image by Author](../Images/31811c66203cd2f6513e8227d1a5d698.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![数据集，图片由作者提供](../Images/31811c66203cd2f6513e8227d1a5d698.png)'
- en: Dataset, image by Author
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集，图片由作者提供
- en: 'Split the dataset into train and test groups:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据集分为训练组和测试组：
- en: '[PRE2]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Train size: 1200; Test size: 300'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 训练大小：1200；测试大小：300
- en: 'Finally we may apply the model and check the quality:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以应用模型并检查其质量：
- en: '[PRE3]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Train F1 score: 0.78, Test F1 score: 0.77'
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 训练F1分数：0.78，测试F1分数：0.77
- en: The results are pretty stable, training process took 3 minutes.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 结果相当稳定，训练过程耗时3分钟。
- en: 'Now, we may check the rule, found by the model:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以检查模型找到的规则：
- en: '[PRE4]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: (Age >= 30 AND Seconds of Use < 1010) OR Frequency of use < 16
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: (Age >= 30 AND Seconds of Use < 1010) OR Frequency of use < 16
- en: Pretty straightforward and interpretable. Just 3 rules, no need to make inference
    using the model, you need just apply this simple rule to split the users. And
    as you see it’s almost identical to theoretical rule of data generation.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 非常直接且可解释。只需3条规则，无需使用模型进行推理，只需应用这个简单的规则来分割用户。正如你所见，它与数据生成的理论规则几乎相同。
- en: Now we’d like to compare the performance of the model with several other popular
    algorithms. We’ve chosen Decision Tree and XGBoost to compare 3 models of different
    level of complexity.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们想比较该模型与几种其他流行算法的性能。我们选择了决策树和XGBoost来比较不同复杂程度的3个模型。
- en: '[PRE5]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'The results for *fold 0*:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '*fold 0*的结果：'
- en: '![Models comparison, image by Author](../Images/969259735670b5cb1c9a6810dd006d95.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![模型比较，图片由作者提供](../Images/969259735670b5cb1c9a6810dd006d95.png)'
- en: Models comparison, image by Author
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 模型比较，图片由作者提供
- en: As you see, the Human Knowledge Model used just 1 rule, Decision Tree – 165
    and XGBoost – 1647, but the quality on the Test group is comparable.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，人类知识模型仅使用了1条规则，决策树 – 165和XGBoost – 1647，但测试组的质量相当。
- en: 'Now we want to visualize the quality results for all folds:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们想可视化所有折叠的质量结果：
- en: '[PRE6]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![Red dots - Test, grey dots - Train data, image by Author](../Images/76398ffacf1ac30919b71881b4da2826.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![红点 - 测试数据，灰点 - 训练数据，图片由作者提供](../Images/76398ffacf1ac30919b71881b4da2826.png)'
- en: Red dots – Test, grey dots – Train data, image by Author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 红点 - 测试数据，灰点 - 训练数据，图片由作者提供
- en: As you see, the quality of HKM on the Test subset is event better than more
    complex models have. Obviously, that’s because the dataset is comparably small
    and feature dependencies are not that complex. Anyway the rules generated by HKM
    may be easily used for some personalisation offer on the website. You don’t need
    any ML infrastructure—the rules may be incorporated even on the front end.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，HKM在测试子集上的质量甚至比更复杂的模型还要好。显然，这是因为数据集相对较小，特征依赖性并不复杂。无论如何，HKM生成的规则可以很容易地用于网站上的某些个性化推荐。你不需要任何机器学习基础设施——规则甚至可以集成到前端。
- en: '* * *'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'Human Knowledge Models present a novel and practical approach to integrating
    human-centric logic with AI, bridging the gap between explainability and performance.
    They achieve several key objectives:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 人类知识模型（Human Knowledge Models）提供了一种新颖且实用的方法，将以人为中心的方法与人工智能相结合，弥合了可解释性和性能之间的差距。它们实现了几个关键目标：
- en: '**Simplifying Complexity**: reduce complex Boolean expressions to their simplest
    forms;'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简化复杂性**：将复杂的布尔表达式简化到其最简形式；'
- en: '**Enhancing Explainable AI**: Unlike traditional "interpretable" AI, it focuses
    on active human decision-making, offering a more precise and functional definition;'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强可解释人工智能**：与传统“可解释”人工智能不同，它侧重于主动的人类决策，提供了一个更精确和实用的定义；'
- en: '**Challenging Black-Box Models**: it provides an alternative to classical machine
    learning models, expanding AI into domains where black-box solutions are unacceptable.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**挑战黑盒模型**：它为经典机器学习模型提供了一种替代方案，将人工智能扩展到黑盒解决方案不可接受的领域。'
