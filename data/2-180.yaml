- en: My Honest Advice for Aspiring Machine Learning Engineers
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 给有志于成为机器学习工程师的人的真诚建议
- en: 原文：[https://towardsdatascience.com/my-honest-advice-for-aspiring-machine-learning-engineers/](https://towardsdatascience.com/my-honest-advice-for-aspiring-machine-learning-engineers/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/my-honest-advice-for-aspiring-machine-learning-engineers/](https://towardsdatascience.com/my-honest-advice-for-aspiring-machine-learning-engineers/)
- en: '* * *'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: <mdspan datatext="el1751676222224" class="mdspan-comment">Many of you</mdspan>
    want to be machine learning engineers.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751676222224" class="mdspan-comment">你们中的许多人</mdspan> 想要成为机器学习工程师。
- en: I get it.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我明白了。
- en: It’s a great job, with interesting work, great pay, and overall, it’s very cool.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一份很好的工作，工作有趣，薪酬丰厚，总的来说，非常酷。
- en: However, it’s definitely not a walk in the park to become one. In this article,
    I aim to offer my unfiltered and candid advice to aspiring machine learning engineers.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，成为机器学习工程师绝对不是一件轻松的事情。在这篇文章中，我旨在向有志于成为机器学习工程师的人提供我未经过滤的坦诚建议。
- en: This will be more of a pep talk, providing you with clear expectations of what
    it takes to become a machine learning engineer and whether it’s something you
    really want to pursue.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这将更像是一次鼓舞人心的谈话，为你提供成为机器学习工程师所需具备的明确期望，以及你是否真的想追求这一职业。
- en: Learn every week
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 每周学习
- en: If you want to become a machine learning engineer, then you need to dedicate
    at least 10 hours each week to studying outside of your everyday responsibilities.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要成为机器学习工程师，那么你需要每天之外至少投入10小时来学习。
- en: I am sorry if that upsets you, but again, if you want to land a job in the highest-paying
    tech profession, you need to put in more time and effort than other people. There
    is simply no way around it.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这让你感到不安，我感到抱歉，但再次强调，如果你想进入最高薪酬的科技行业，你需要比其他人投入更多的时间和精力。这是没有捷径的。
- en: Without sounding arrogant, I learn something new in machine learning every single
    week, even though I work full-time, create YouTube videos, exercise five times
    a week, and have mentoring and coaching clients. If I can make time, so can you.
    It all comes down to priorities.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 不显得自大，即使我全职工作，制作YouTube视频，每周锻炼五次，还有辅导和指导客户，我每周在机器学习上也会学到新的东西。如果我能抽出时间，你们也能。这全在于优先级。
- en: 'Almost everything I’ve achieved in my career comes from consistently studying
    and documenting my learning outside of work. I’ve written over 150 technical articles
    on Medium on topics such as:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我在职业生涯中取得的几乎所有成就都来自于持续地在工作之外学习和记录我的学习。我在Medium上撰写了超过150篇关于以下主题的技术文章：
- en: '[Bayesian Statistics](https://medium.com/@egorhowell/list/bayesian-statistics-36268a8570be)'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[贝叶斯统计](https://medium.com/@egorhowell/list/bayesian-statistics-36268a8570be)'
- en: '[Recurrent Neural Networks](https://medium.com/@egorhowell/list/recurrent-neural-networks-8dba93d48f16)'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[循环神经网络](https://medium.com/@egorhowell/list/recurrent-neural-networks-8dba93d48f16)'
- en: '[Markov Chains](https://medium.com/@egorhowell/list/markov-chains-e56ab9156eb0)'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[马尔可夫链](https://medium.com/@egorhowell/list/markov-chains-e56ab9156eb0)'
- en: '[Time Series Analysis](https://medium.com/@egorhowell/list/time-series-00bbfb9f5359)'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[时间序列分析](https://medium.com/@egorhowell/list/time-series-00bbfb9f5359)'
- en: '[Optimisation](https://medium.com/@egorhowell/list/optimisation-algorithms-069bf9c6c8d5)'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[优化算法](https://medium.com/@egorhowell/list/optimisation-algorithms-069bf9c6c8d5)'
- en: …and many more. You can see the complete list [here](https://medium.com/@egorhowell/lists).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: …还有很多。你可以在这里看到完整的列表 [这里](https://medium.com/@egorhowell/lists)。
- en: This isn’t to boast but to show the level of commitment required to become a
    machine learning engineer.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是为了炫耀，而是为了展示成为机器学习工程师所需的承诺水平。
- en: Think of this profession in the same category as lawyers, doctors, or accountants.
    These fields demand years of study and practice. The same is true for machine
    learning; it’s not often seen as that due to its relative newness.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 将这个职业与律师、医生或会计师归为一类。这些领域需要多年的学习和实践。机器学习也是如此；由于其相对较新，它通常不被视为这样。
- en: 'I often say:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常说：
- en: '* Everything is easy, but hard.*'
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*一切皆易，但难。*'
- en: It’s easy to understand what you need to do but hard to do it consistently over
    time. There is no secret; you have to take the long road.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 理解你需要做什么很容易，但长期坚持做这件事却很难。没有秘密；你必须走长路。
- en: So, pick something you want to learn and stick to it until the end; then, recycle
    this process again and again. That’s all there is to it.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，选择你想要学习的东西，坚持到底；然后，再次重复这个过程。这就是全部。
- en: Extend your time horizon
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩展你的时间范围
- en: Even with the most ideal background, it will still likely take at least two
    years to become a fully qualified machine learning engineer at a top company.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 即使拥有最理想的背景，在顶级公司成为一名合格的机器学习工程师也至少需要两年时间。
- en: Don’t fall into the trap of thinking that a few online courses and projects
    are enough to land a job in one of today’s highest-paying tech roles.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 不要陷入认为几门在线课程和项目就足以获得今天最高薪酬技术角色之一的陷阱。
- en: Online certifications help you learn the content in data science and machine
    learning, which is very valuable. However, they rarely allow you to get hired
    nowadays, especially in our [**tough job market**](https://medium.com/towards-data-science/why-it-feels-impossible-to-get-a-data-science-job-398d57de464c?sk=f3589d75672d4442b0058faced1c99e8).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在线认证可以帮助你学习数据科学和机器学习的内容，这非常有价值。然而，它们很少允许你如今被雇佣，尤其是在我们[**艰难的就业市场**](https://medium.com/towards-data-science/why-it-feels-impossible-to-get-a-data-science-job-398d57de464c?sk=f3589d75672d4442b0058faced1c99e8)。
- en: I don’t say this to discourage you but to set realistic expectations. I’ve spoken
    with many people who try to shortcut their journey, and I’ve yet to see it succeed.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是想让你泄气，而是想设定现实的期望。我已与许多试图走捷径的人交谈过，但我还没有看到有人成功。
- en: 'To become a machine learning engineer, you need solid foundations in:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 要成为一名机器学习工程师，你需要以下坚实的基础：
- en: Mathematics
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数学
- en: Statistics
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 统计学
- en: Machine Learning
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习
- en: Software Engineering
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软件工程
- en: DevOps
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DevOps
- en: Cloud Systems
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 云系统
- en: Some of these skills can only be developed through real-world experience. That’s
    why I usually recommend people start as data scientists or software engineers
    first and then pivot to machine learning engineers, as it’s not an entry-level
    role.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一些技能只能通过实际工作经验来培养。这就是为什么我通常建议人们先从数据科学家或软件工程师开始，然后转向机器学习工程师，因为这个角色不是入门级角色。
- en: Accepting the fact that it will take you a few years to become a machine learning
    engineer is liberating and takes the pressure off you.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 接受这样一个事实，即成为机器学习工程师可能需要几年时间，这是一种解脱，也减轻了你的压力。
- en: Take your time to learn things deeply, really study, and your knowledge will
    build over time. I promise, eventually, you’ll be ready for that ML engineering
    role when the time is right.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 慢慢学习，真正地研究，你的知识会随着时间的推移而积累。我保证，最终，当时机成熟时，你会准备好那个机器学习工程师的角色。
- en: Stop chasing AI
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 停止追逐AI
- en: '**Newsflash:** A machine learning engineer is *not* an AI engineer. So stop
    thinking that calling a chatbot API like ChatGPT or Claude makes you a machine
    learning engineer.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**新闻快报**：机器学习工程师**不是**人工智能工程师。所以停止认为调用ChatGPT或Claude这样的聊天机器人API会让你成为机器学习工程师。'
- en: As a machine learning engineer, you’re expected to deeply understand how models/algorithms
    work and have a firm grasp of statistical learning theory and all the fundamental
    mathematics.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 作为机器学习工程师，你被期望深入理解模型/算法的工作原理，并牢固掌握统计学习理论和所有基本数学。
- en: 'That means knowing core algorithms like:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着要了解像以下这样的核心算法：
- en: '[Linear Regression](https://medium.com/data-science-collective/time-series-linear-regression-explained-e37ef4e3da84?sk=1f3bde096ff32b6d4e855cf0e58be518)'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[线性回归](https://medium.com/data-science-collective/time-series-linear-regression-explained-e37ef4e3da84?sk=1f3bde096ff32b6d4e855cf0e58be518)'
- en: '[Generalised Linear Models](https://medium.com/data-science/breaking-down-generalized-linear-models-d9212526e51d?sk=fda0298cebcb8e9e0c20cb6af8ed4f06)'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[广义线性模型](https://medium.com/data-science/breaking-down-generalized-linear-models-d9212526e51d?sk=fda0298cebcb8e9e0c20cb6af8ed4f06)'
- en: '[Decision Trees](https://en.wikipedia.org/wiki/Decision_tree)'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[决策树](https://en.wikipedia.org/wiki/Decision_tree)'
- en: '[Neural Networks](https://medium.com/data-science/why-do-we-even-have-neural-networks-72410cb9348e?sk=5b72e84b79e3ce91841d64c9e332b9d3)'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[神经网络](https://medium.com/data-science/why-do-we-even-have-neural-networks-72410cb9348e?sk=5b72e84b79e3ce91841d64c9e332b9d3)'
- en: '[Support Vector Machines](https://en.wikipedia.org/wiki/Support_vector_machine)'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[支持向量机](https://en.wikipedia.org/wiki/Support_vector_machine)'
- en: '*Inside and out*.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '*内外兼修*。'
- en: Most people claim *to* know them, but you’ll be surprised at how little you
    actually know.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人声称**知道**它们，但你可能会惊讶地发现你实际上知道得很少。
- en: I’ve mock-interviewed countless candidates, and many can’t even explain gradient
    descent from first principles using calculus.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经对无数候选人进行了模拟面试，其中许多人甚至无法用微积分从第一原理解释梯度下降。
- en: Again, I’m not trying to be harsh but to show you the reality I have seen.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我并不是想表现得严厉，而是想向你展示我所看到的现实。
- en: I always tell people to stop rushing to learn flashy topics like NLP, computer
    vision, or generative AI.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我总是告诉人们停止急于学习像NLP、计算机视觉或生成式AI这样的热门话题。
- en: Your first few years should be about mastering the fundamentals; mastering them
    thoroughly so you have a solid understanding for many machine learning theory
    interview.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 你的前几年应该专注于掌握基础知识；彻底掌握它们，以便你对许多机器学习理论面试有一个坚实的基础。
- en: The reality is that most machine learning engineer roles primarily focus on
    classical supervised learning. Your job is often less about building exotic models
    and more about tailoring well-understood algorithms to solve specific problems.
    That’s why a deep understanding of the basics is essential.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，大多数机器学习工程师的角色主要关注经典的有监督学习。你的工作往往更少是构建异类模型，而是将广为人知的算法定制来解决特定问题。这就是为什么对基础知识的深入理解至关重要。
- en: If you want to test your fundamental knowledge, I offer mock interviews based
    on real questions I’ve faced in actual ML job interviews. Feel free to check it
    below.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想测试你的基础知识，我提供基于我在实际机器学习工作面试中遇到的真正问题的模拟面试。请随意查看以下内容。
- en: '[**Mock Interview with Egor Howell**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '[**与Egor Howell的模拟面试**'
- en: '*Customised for your particular role and interview*topmate.io](https://topmate.io/egorhowell/1572537?utm_source=public_profile&utm_campaign=egorhowell)'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '*针对您的特定角色和面试*topmate.io](https://topmate.io/egorhowell/1572537?utm_source=public_profile&utm_campaign=egorhowell)'
- en: It is very hard
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 非常困难
- en: 'Let’s end with something that might seem a bit obvious: becoming a machine
    learning engineer is just hard.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以可能看似明显的事情结束：成为一名机器学习工程师只是很难。
- en: As I’ve said throughout this post, the role demands expertise across a wide
    range of disciplines. You’ll need strong foundations in maths, statistics, and
    programming, plus real-world experience as a software engineer or data scientist
    first (which are tough jobs in their own right). Additionally, you must commit
    to continuous learning throughout this entire period.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我在整篇文章中说的，这个角色需要跨学科的专业知识。你需要有数学、统计学和编程的坚实基础，以及作为软件工程师或数据科学家的实际经验（这些工作本身就很艰难）。此外，你必须在整个期间致力于持续学习。
- en: Even with the most perfect background — a STEM master’s or PhD — it’s still
    a long, difficult journey. If you’re coming from a non-traditional path, it’s
    even harder. That doesn’t mean it’s impossible, but it is more difficult, and
    you need to decide if the challenge is worth it for you.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 即使拥有最完美的背景——STEM硕士或博士学位——这仍然是一条漫长而艰难的道路。如果你来自非传统路径，那就更难了。这并不意味着不可能，但它更困难，你需要决定这个挑战对你来说是否值得。
- en: 'I often say:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常说：
- en: '*Anyone can become a machine learning engineer — but that doesn’t mean everyone
    should, or even wants to.*'
  id: totrans-64
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*任何人都可以成为一名机器学习工程师——但这并不意味着每个人都应该，甚至想要这样做。*'
- en: It takes sustained effort for at least a few years.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 至少需要几年的持续努力。
- en: You have to be honest with yourself about whether you’re willing to invest 2–3
    years minimum (and, in most cases, 4–5 years) to break into the field.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须诚实地对待自己，是否愿意至少投资2-3年（在大多数情况下，4-5年）来进入这个领域。
- en: '*That’s a long time.*'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '*这是一段很长的时间。*'
- en: For me personally, giving up four years for a decades-long career doing work
    I love is absolutely worth it. But that’s a calculation only you can make.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我个人来说，为了从事我热爱的工作而放弃四年的时间，绝对值得。但这是一种只有你自己才能做出的计算。
- en: In fact, I find it liberating that it’s so hard, as it makes me feel better
    about struggling through it.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我发现它如此困难，这让我在努力克服困难时感觉更好。
- en: '* * *'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'I am someone who doesn’t sugarcoat anything, and you might have noticed that
    most of my points boil down to two key factors: time and effort.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我是一个不喜欢粉饰任何事物的人，你可能已经注意到，我大部分的观点归结为两个关键因素：时间和努力。
- en: Anything worth doing often requires consistent effort over a long period. That
