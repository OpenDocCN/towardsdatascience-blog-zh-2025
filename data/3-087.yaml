  zh: 原文：[https://towardsdatascience.com/on-data-problems-and-how-to-solve-or-prevent-them/](https://towardsdatascience.com/on-data-problems-and-how-to-solve-or-prevent-them/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《变量》的最新版本，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Data represents the actions, decisions, and opinions of human beings—or the
    outputs of the tools humans built. That means that, more often than not, it’s
    messy.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 数据代表人类的行为、决策和观点——或者人类构建的工具的输出。这意味着，很多时候，它都是混乱的。
- en: As the volume and complexity of available data grew exponentially in recent
    years, so did the importance of [data science](https://towardsdatascience.com/category/data-science/) and
    machine learning professionals. To help you stay up-to-date with effective problem-solving
    and insight-gathering approaches, we’ve selected several outstanding articles
    on the workflows that can help keep your data tidy, focused, and actionable. Let’s
    dive in.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 随着近年来可用数据的量和复杂性的指数级增长，数据科学和机器学习专业人士的重要性也随之增长。为了帮助您跟上有效的解决问题的方法和洞察力收集方法，我们精选了几篇关于可以帮助保持您的数据整洁、专注和可操作的流程的优秀文章。让我们深入探讨。
- en: Mining Rules from Data
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从数据中挖掘规则
- en: '[Mariya Mansurova](https://towardsdatascience.com/author/miptgirl/)‘s new must-read
    is both comprehensive and accessible. It shows how you can leverage your available
    data to generate business-focused rules, and walks us through a hands-on example
    (with a full Python implementation) demonstrating the power of decision trees.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '[Mariya Mansurova](https://towardsdatascience.com/author/miptgirl/) 的新必读作品既全面又易于理解。它展示了您如何利用可用数据生成以业务为导向的规则，并通过一个动手示例（带有完整的Python实现）展示了决策树的力量。'
- en: '[Mining Rules from Data](https://towardsdatascience.com/mining-rules-from-data/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[从数据中挖掘规则](https://towardsdatascience.com/mining-rules-from-data/)'
- en: 'No More Tableau Downtime: Metadata API for Proactive Data Health'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 没有更多Tableau停机时间：用于主动数据健康的元数据API
- en: Before you can analyze data, you need to ensure its availability. [Alle Sravani](https://towardsdatascience.com/author/alle-sravani/) explains
    how you can preemptively make your data pipelines more robust.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在您分析数据之前，您需要确保其可用性。[Alle Sravani](https://towardsdatascience.com/author/alle-sravani/)
    解释了您如何预先使您的数据管道更加健壮。
- en: '[No More Tableau Downtime: Metadata API for Proactive Data Health](https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[没有更多Tableau停机时间：用于主动数据健康的元数据API](https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/)'
- en: 'Ivory Tower Notes: The Problem'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 'Ivory Tower Notes: The Problem'
- en: '[Marina Tosic](https://towardsdatascience.com/author/martosi/) shares time-tested
    insights on the steps you should take to tackle business problems methodically
    and focus on root causes.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '[Marina Tosic](https://towardsdatascience.com/author/martosi/) 分享了经过时间考验的见解，关于您应该采取的步骤来有系统地解决商业问题并关注根本原因。'
- en: '[Ivory Tower Notes: The Problem](https://towardsdatascience.com/ivory-tower-notes-the-problem/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Ivory Tower Notes: The Problem](https://towardsdatascience.com/ivory-tower-notes-the-problem/)'
- en: How to Measure Real Model Accuracy When Labels Are Noisy
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当标签嘈杂时如何衡量真实模型的准确性
- en: Clear and concise, [Krishna Rao](https://towardsdatascience.com/author/kkrao/)‘s
    article unpacks the math behind “true” accuracy and error correlation.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '[Krishna Rao](https://towardsdatascience.com/author/kkrao/) 的文章清晰简洁，解开了“真实”准确性和误差相关性的数学原理。'
- en: '[How to Measure Real Model Accuracy When Labels Are Noisy](https://towardsdatascience.com/how-to-measure-real-model-accuracy-when-labels-are-noisy/)'
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[当标签嘈杂时如何衡量真实模型的准确性](https://towardsdatascience.com/how-to-measure-real-model-accuracy-when-labels-are-noisy/)'
- en: Other Recommended Reads
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他推荐阅读
- en: Why not branch out into some other fascinating areas in the wide world of data,
    ML, and AI?
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么不拓展到数据、ML和AI广阔世界中的其他一些迷人的领域呢？
- en: What happens [when we combine CNNs and transformers](https://towardsdatascience.com/the-art-of-hybrid-architectures/)? [Eric
    Chung](https://towardsdatascience.com/author/eric-chung/) invites us to explore
    the new frontiers of hybrid architectures.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当我们结合CNN和transformers会发生什么？[Eric Chung](https://towardsdatascience.com/author/eric-chung/)
    邀请我们探索混合架构的新前沿。
- en: '[The Art of Hybrid Architectures](https://towardsdatascience.com/the-art-of-hybrid-architectures/)'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[混合架构的艺术](https://towardsdatascience.com/the-art-of-hybrid-architectures/)'
- en: Every complex technology relies on an integrated set of tools and systems. [Ed
    Izaguirre](https://towardsdatascience.com/author/ed-izaguirre/) outlines [the
    different layers of the AI stack](https://towardsdatascience.com/layers-ai-stack/).
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每项复杂技术都依赖于一套集成的工具和系统。[Ed Izaguirre](https://towardsdatascience.com/author/ed-izaguirre/)概述了[人工智能堆栈的不同层](https://towardsdatascience.com/layers-ai-stack/).
- en: '[Layers of the AI Stack, Explained Simply](https://towardsdatascience.com/layers-ai-stack/)'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[人工智能堆栈的层，简单解释](https://towardsdatascience.com/layers-ai-stack/)'
- en: Focusing more specifically on [the components of the generative-AI tech stack](https://towardsdatascience.com/tech-stack-generative-ai/), [Sarah
    Schürch](https://towardsdatascience.com/author/schuerch_sarah/) covers foundation
    models, agents, vector databases, and more.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更具体地关注[生成式人工智能技术栈的组件](https://towardsdatascience.com/tech-stack-generative-ai/)，[Sarah
    Schürch](https://towardsdatascience.com/author/schuerch_sarah/)涵盖了基础模型、代理、向量数据库等。
- en: '[Understanding the Tech Stack Behind Generative AI](https://towardsdatascience.com/tech-stack-generative-ai/)'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[理解生成式人工智能背后的技术栈](https://towardsdatascience.com/tech-stack-generative-ai/)'
- en: For an immersive technical deep dive, don’t miss [Muhammad Ardi](https://towardsdatascience.com/author/muhammad_ardi/)‘s
    excellent guide to [implementing a diffusion model from scratch](https://towardsdatascience.com/the-art-of-noise/) with
    PyTorch.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于一次沉浸式的技术深度探索，不要错过[Muhammad Ardi](https://towardsdatascience.com/author/muhammad_ardi/)关于如何使用PyTorch从头开始实现扩散模型的优秀指南[《噪声的艺术》](https://towardsdatascience.com/the-art-of-noise/).
- en: '[The Art of Noise](https://towardsdatascience.com/the-art-of-noise/)'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[噪声的艺术](https://towardsdatascience.com/the-art-of-noise/)'
- en: Meet Our New Authors
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'Explore top-notch work from some of our recently added contributors:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 探索我们最近添加的贡献者中的顶级作品：
- en: '[Felipe Bandeira](https://towardsdatascience.com/author/felipe-bandeira/) (along
    with coauthors Giselle Fretta, Thu Than, and Elbion Redenica) presents cutting-edge
    work on how to evaluate the performance of MCMC samplers.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Felipe Bandeira](https://towardsdatascience.com/author/felipe-bandeira/)（以及合著者Giselle
    Fretta、Thu Than和Elbion Redenica）展示了关于如何评估MCMC采样器性能的尖端工作。'
- en: '[Are You Sure Your Posterior Makes Sense?](https://towardsdatascience.com/are-you-sure-your-posterior-makes-sense/)'
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[你确定你的后验有道理吗？](https://towardsdatascience.com/are-you-sure-your-posterior-makes-sense/)'
- en: '[Swapnil Patil](https://towardsdatascience.com/author/swpnilsp/) works on product
    analytics at Google; his debut TDS article leverages his experience in a thorough
    discussion of the power of ROC curves.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Swapnil Patil](https://towardsdatascience.com/author/swpnilsp/)在谷歌从事产品分析工作；他的TDS处女作深入讨论了ROC曲线的力量。'
- en: '[Unlock the Power of ROC Curves: Intuitive Insights for Better Model Evaluation](https://towardsdatascience.com/unlock-the-power-of-roc-curves-intuitive-insights-for-better-model-evaluation/)'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[解锁ROC曲线的力量：更好的模型评估的直观见解](https://towardsdatascience.com/unlock-the-power-of-roc-curves-intuitive-insights-for-better-model-evaluation/)'
- en: '[Nikhil Dasari](https://towardsdatascience.com/author/nikhil-dasari/) just
    launched a beginner-friendly series on a perennially important topic: time-series
    forecasting.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Nikhil Dasari](https://towardsdatascience.com/author/nikhil-dasari/)刚刚推出了一系列面向初学者的系列，这是一个经久不衰的重要主题：时间序列预测。'
- en: '[Time Series Forecasting Made Simple (Part 1): Decomposition and Baseline Models](https://towardsdatascience.com/time-series-forecasting-made-simple-part-1-decomposition-baseline-models/)'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[时间序列预测变得简单（第1部分）：分解和基线模型](https://towardsdatascience.com/time-series-forecasting-made-simple-part-1-decomposition-baseline-models/)'
- en: Contribute to TDS
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为TDS贡献力量
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们热爱发布新作者的文章，所以如果你最近撰写了一个有趣的项目教程、教程或对我们核心主题的理论反思，为什么不考虑[与我们分享？](https://towardsdatascience.com/questions-96667b06af5/)
