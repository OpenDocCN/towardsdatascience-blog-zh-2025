- en: (1) What are Reasoning Models?
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (1) 什么是推理模型？
- en: Reasoning models, such as DeepSeek-R1 and OpenAI’s o-series models (e.g., o1,
    o3), are large language models (LLMs) trained using reinforcement learning to
    perform reasoning.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 推理模型，如DeepSeek-R1和OpenAI的o系列模型（例如，o1、o3），是使用强化学习训练的大语言模型（LLM），用于执行推理。
- en: Reasoning models think before they answer, producing a long internal chain of
    thought before responding. They excel in complex problem-solving, coding, scientific
    reasoning, and multi-step planning for agentic workflows.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 推理模型在回答之前会思考，在回答前会形成一个长的内部思维链。它们在复杂问题解决、编码、科学推理和多步骤的代理工作流程规划方面表现出色。
- en: '* * *'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (2) What is DeepSeek-R1?
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (2) 什么是DeepSeek-R1？
- en: 'DeepSeek-R1 is a state-of-the-art open-source LLM designed for **advanced reasoning**,
    introduced in January 2025 in the paper *“*[*DeepSeek-R1: Incentivizing Reasoning
    Capability in LLMs via Reinforcement Learning*](https://arxiv.org/abs/2501.12948)*”*.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 'DeepSeek-R1 是一个用于**高级推理**的尖端开源LLM，于2025年1月在一篇名为 *“*[*DeepSeek-R1: 通过强化学习激励LLM中的推理能力*](https://arxiv.org/abs/2501.12948)*”*
    的论文中介绍。'
- en: 'The model is a 671-billion-parameter LLM trained with extensive use of reinforcement
    learning (RL), based on this pipeline:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型是一个基于广泛使用强化学习（RL）训练的671亿参数LLM，基于以下管道：
- en: Two reinforcement stages aimed at discovering improved reasoning patterns and
    aligning with human preferences
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两个旨在发现改进的推理模式和与人类偏好对齐的强化学习阶段
- en: Two supervised fine-tuning stages serving as the seed for the model’s reasoning
    and non-reasoning capabilities.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两个监督微调阶段作为模型推理和非推理能力的种子。
- en: 'To be precise, DeepSeek trained two models:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 严格来说，DeepSeek训练了两个模型：
- en: The first model, **DeepSeek-R1-Zero,** a reasoning model trained with reinforcement
    learning, generates data for training the second model, **DeepSeek-R1**.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一个模型是**DeepSeek-R1-Zero**，这是一个使用强化学习训练的推理模型，它为第二个模型**DeepSeek-R1**生成训练数据。
- en: It achieves this by producing reasoning traces, from which only high-quality
    outputs are retained based on their final results.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它通过产生推理轨迹来实现这一点，根据最终结果仅保留高质量输出。
- en: It means that, unlike most models, the RL examples in this training pipeline
    are not curated by humans but generated by the model.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这意味着，与大多数模型不同，这个训练管道中的RL示例不是由人类编写的，而是由模型生成的。
- en: The outcome is that the model achieved performance comparable to leading models
    like [OpenAI’s o1 model](https://openai.com/index/learning-to-reason-with-llms/)
    across tasks such as mathematics, coding, and complex reasoning.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是，该模型在数学、编码和复杂推理等任务上实现了与领先模型（如[OpenAI的o1模型](https://openai.com/index/learning-to-reason-with-llms/)）相当的性能。
- en: '* * *'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (3) Understanding Distillation and DeepSeek-R1’s Distilled Models
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (3) 理解蒸馏和DeepSeek-R1的蒸馏模型
- en: Alongside the full model, they also open-sourced six smaller dense models (also
    named DeepSeek-R1) of different sizes (1.5B, 7B, 8B, 14B, 32B, 70B), distilled
    from DeepSeek-R1 based on [Qwen](https://huggingface.co/Qwen) or [Llama](https://www.llama.com/)
    as the base model.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 除了完整模型外，他们还开源了基于[Qwen](https://huggingface.co/Qwen)或[Llama](https://www.llama.com/)作为基础模型的六个不同大小（1.5B、7B、8B、14B、32B、70B）的小型密集模型（也称为DeepSeek-R1）。
- en: '**Distillation** is a technique where a smaller model (the “student”) is trained
    to replicate the performance of a larger, more powerful pre-trained model (the
    “teacher”).'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**蒸馏**是一种技术，其中较小的模型（“学生”）被训练来复制较大的、更强大的预训练模型（“教师”）的性能。'
- en: '![](../Images/bea86abca7e9407a05712146609ee97e.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bea86abca7e9407a05712146609ee97e.png)'
- en: Illustration of DeepSeek-R1 distillation process | Image by author
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek-R1蒸馏过程示意图 | 图片由作者提供
- en: 'In this case, the teacher is the 671B DeepSeek-R1 model, and the students are
    the six models distilled using these open-source base models:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，教师是671B的DeepSeek-R1模型，学生是使用这些开源基础模型蒸馏的六个模型：
- en: '[Qwen2.5 — Math-1.5B](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B)'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Qwen2.5 — Math-1.5B](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B)'
- en: '[Qwen2.5 — Math-7B](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Qwen-7B)'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Qwen2.5 — Math-7B](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Qwen-7B)'
- en: '[Qwen2.5 — 14B](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Qwen-14B)'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Qwen2.5 — 14B](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Qwen-14B)'
- en: '[Qwen2.5 — 32B](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Qwen-32B)'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Qwen2.5 — 32B](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Qwen-32B)'
- en: '[Llama-3.1 — 8B](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Llama-8B)'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Llama-3.1 — 8B](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Llama-8B)'
- en: '[Llama-3.3 — 70B-Instruct](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Llama-70B)'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Llama-3.3 — 70B-Instruct](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Llama-70B)'
- en: DeepSeek-R1 was used as the teacher model to generate 800,000 training samples,
    a mix of reasoning and non-reasoning samples, for distillation via **supervised
    fine-tuning** of the base models (1.5B, 7B, 8B, 14B, 32B, and 70B).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek-R1被用作教师模型，生成800,000个训练样本，包括推理和非推理样本的混合，通过**监督微调**基础模型（1.5B、7B、8B、14B、32B和70B）进行蒸馏。
- en: '**So why do we do distillation in the first place? **'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**那么，我们最初为什么要进行蒸馏呢？**'
- en: The goal is to transfer the reasoning abilities of larger models, such as DeepSeek-R1
    671B, into smaller, more efficient models. This empowers the smaller models to
    handle complex reasoning tasks while being faster and more resource-efficient.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是将大型模型（如DeepSeek-R1 671B）的推理能力转移到更小、更高效的模型中。这使得小模型能够处理复杂的推理任务，同时更快、更高效地使用资源。
- en: Furthermore, DeepSeek-R1 has a massive number of parameters (671 billion)**,**
    making it challenging to run on most consumer-grade machines.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DeepSeek-R1拥有庞大的参数数量（671亿），这使得它在大多数消费级机器上运行具有挑战性。
- en: Even the most powerful MacBook Pro, with a maximum of 128GB of unified memory,
    is inadequate to run a 671-billion-parameter model.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是最强大的MacBook Pro，最大也只有128GB的统一内存，也无法运行一个671亿参数的模型。
- en: As such, distilled models open up the possibility of being deployed on devices
    with limited computational resources.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，蒸馏模型使得在计算资源有限的设备上部署成为可能。
- en: '*[Unsloth](https://unsloth.ai/blog/deepseekr1-dynamic) achieved an impressive
    feat by quantizing the original 671B-parameter DeepSeek-R1 model down to just
    131GB — a remarkable 80% reduction in size. However, a 131GB VRAM requirement
    remains a significant hurdle.*'
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Unsloth](https://unsloth.ai/blog/deepseekr1-dynamic) 通过量化原始 671B 参数的 DeepSeek-R1
    模型，将其缩小到仅 131GB——尺寸减少了惊人的 80%。然而，131GB 的 VRAM 要求仍然是一个重大的障碍。'
- en: '* * *'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (4) Selection of Distilled Model
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (4) 精炼模型的选择
- en: With six distilled model sizes to choose from, selecting the right one largely
    depends on the capabilities of the local device hardware.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 有六种精炼的模型大小可供选择，选择正确的模型在很大程度上取决于本地设备硬件的能力。
- en: For those with high-performance GPUs or CPUs and a need for maximum performance,
    the larger DeepSeek-R1 models (32B and up) are ideal — even the quantized 671B
    version is viable.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些拥有高性能 GPU 或 CPU 并需要最大性能的用户，更大的 DeepSeek-R1 模型（32B 及以上）是理想的选择——即使是量化的 671B
    版本也是可行的。
- en: However, if one has limited resources or prefers quicker generation times (as
    I do), the smaller distilled variants, such as 8B or 14B, are a better fit.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果资源有限或更倾向于更快的生成时间（正如我一样），较小的精炼变体，如 8B 或 14B，则更为合适。
- en: '**For this project, I will be using the DeepSeek-R1 distilled** [**Qwen-14B**](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Qwen-14B)
    **model, which aligns with the hardware constraints I faced.**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于这个项目，我将使用 DeepSeek-R1 精炼** [**Qwen-14B**](https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Qwen-14B)
    **模型，它与我所面临的硬件限制相匹配。**'
- en: '* * *'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (5) Benchmarks for Evaluating Reasoning
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (5) 评估推理的基准
- en: LLMs are typically evaluated using standardized benchmarks that assess their
    performance across various tasks, including language understanding, code generation,
    instruction following, and question answering. Common examples include [MMLU](https://paperswithcode.com/sota/multi-task-language-understanding-on-mmlu),
    [HumanEval](https://paperswithcode.com/sota/code-generation-on-humaneval), and
    [MGSM](https://paperswithcode.com/dataset/mgsm).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: LLM 通常使用标准化的基准来评估其在各种任务上的性能，包括语言理解、代码生成、指令遵循和问题回答。常见的例子包括 [MMLU](https://paperswithcode.com/sota/multi-task-language-understanding-on-mmlu)、[HumanEval](https://paperswithcode.com/sota/code-generation-on-humaneval)
    和 [MGSM](https://paperswithcode.com/dataset/mgsm)。
- en: 'To measure an LLM’s capacity for reasoning, we need more challenging, reasoning-heavy
    benchmarks that go beyond surface-level tasks. Here are some popular examples
    focused on evaluating advanced reasoning capabilities:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 为了衡量一个 LLM 的推理能力，我们需要更多具有挑战性、推理密集型的基准，这些基准超越了表面任务。以下是一些专注于评估高级推理能力的流行示例：
- en: (i) AIME 2024 — Competition Math
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (i) AIME 2024 — 竞赛数学
- en: The [**American Invitational Mathematics Examination (**AIME) 2024](https://paperswithcode.com/sota/mathematical-reasoning-on-aime24)
    serves as a strong benchmark for evaluating an LLM’s mathematical reasoning capabilities.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**美国邀请赛数学考试 (AIME) 2024**](https://paperswithcode.com/sota/mathematical-reasoning-on-aime24)
    作为评估大型语言模型 (LLM) 数学推理能力的一个强大基准。'
- en: It is a challenging math contest with complex, multi-step problems that test
    an LLM’s ability to interpret intricate questions, apply advanced reasoning, and
    perform precise symbolic manipulation.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这是一个具有复杂、多步问题的挑战性数学竞赛，测试了一个 LLM 解释复杂问题、应用高级推理和进行精确符号操作的能力。
- en: (ii) Codeforces — Competition Code
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (ii) Codeforces — 竞赛代码
- en: The [**Codeforces Benchmark**](https://arxiv.org/abs/2501.01257v2)evaluates
    an LLM’s reasoning ability using real competitive programming problems from Codeforces,
    a platform known for algorithmic challenges.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Codeforces 基准**](https://arxiv.org/abs/2501.01257v2) 使用来自 Codeforces 的真实竞赛编程问题来评估一个
    LLM 的推理能力，Codeforces 是一个以算法挑战著称的平台。'
- en: These problems test an LLM’s capacity to comprehend complex instructions, perform
    logical and mathematical reasoning, plan multi-step solutions, and generate correct,
    efficient code.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些问题测试了一个 LLM 理解复杂指令、进行逻辑和数学推理、规划多步解决方案以及生成正确、高效代码的能力。
- en: (iii) GPQA Diamond — PhD-Level Science Questions
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (iii) GPQA Diamond — 博士级科学问题
- en: GPQA-Diamond is a curated subset of the **most difficult questions** from the
    broader [**GPQA (Graduate-Level Physics Question Answering)**](https://arxiv.org/abs/2311.12022)
    benchmark, specifically designed to push the limits of LLM reasoning in advanced
    PhD-level topics.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPQA-Diamond 是从更广泛的 [**GPQA (研究生级物理问题回答)**](https://arxiv.org/abs/2311.12022)
    基准中精选出的 **最难问题** 的子集，专门设计用来挑战 LLM 在高级博士级主题上的推理极限。
- en: While GPQA includes a range of conceptual and calculation-heavy graduate questions,
    GPQA-Diamond isolates only the most challenging and reasoning-intensive ones.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然 GPQA 包含一系列概念性和计算密集型的研究生问题，但 GPQA-Diamond 仅隔离了最具挑战性和推理密集型的那些。
- en: It is considered Google-proof, meaning that they are difficult to answer even
    with unrestricted web access.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它被认为是谷歌难以破解的，这意味着即使有不受限制的互联网访问，也很难回答。
- en: 'Here is an example of a GPQA-Diamond question:'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下面是一个 GPQA-Diamond 问题的示例：
- en: In this project, **we use GPQA-Diamond as the reasoning benchmark**, as [OpenAI](https://openai.com/index/learning-to-reason-with-llms/#:~:text=test%2Dtime%20compute-,Evals,-To%20highlight%20the)
    and [DeepSeek](https://github.com/deepseek-ai/DeepSeek-R1?tab=readme-ov-file#deepseek-r1-evaluation)
    used it to evaluate their reasoning models.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，**我们使用 GPQA-Diamond 作为推理基准**，因为 [OpenAI](https://openai.com/index/learning-to-reason-with-llms/#:~:text=test%2Dtime%20compute-,Evals,-To%20highlight%20the)
    和 [DeepSeek](https://github.com/deepseek-ai/DeepSeek-R1?tab=readme-ov-file#deepseek-r1-evaluation)
    都用它来评估它们的推理模型。
- en: '* * *'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (6) Tools Used
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (6) 使用工具
- en: For this project, we primarily use [Ollama](http://www.ollama.com) and OpenAI’s
    [simple-evals](https://github.com/openai/simple-evals).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们主要使用 [Ollama](http://www.ollama.com) 和 OpenAI 的 [simple-evals](https://github.com/openai/simple-evals)。
- en: (i) Ollama
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (i) Ollama
- en: '[**Ollama**](http://ollama.com/) is an open-source tool that simplifies running
    LLMs on our computer or a local server.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '[**Ollama**](http://ollama.com/) 是一个开源工具，它简化了在我们的计算机或本地服务器上运行 LLMs 的过程。'
- en: It acts as a manager and runtime, handling tasks such as downloads and environment
    setup. This allows users to interact with these models without requiring a constant
    internet connection or relying on cloud services.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 它充当管理器和运行时，处理下载和环境设置等任务。这使得用户可以在不需要持续互联网连接或依赖云服务的情况下与这些模型交互。
- en: It supports many open-source LLMs, including DeepSeek-R1, and is cross-platform
    compatible with macOS, Windows, and Linux. Additionally, it offers a straightforward
    setup with minimal fuss and efficient resource utilization.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 它支持许多开源 LLMs，包括 DeepSeek-R1，并且与 macOS、Windows 和 Linux 兼容。此外，它提供了一种简单、无需麻烦的设置，并高效地利用资源。
- en: '***Important**: Ensure your local device has **GPU access** for Ollama, as
    this dramatically accelerates performance and makes subsequent benchmarking exercises
    much more efficient as compared to CPU. Run `nvidia-smi` in terminal to check
    if GPU is detected.*'
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***重要提示**：请确保您的本地设备有 **GPU 访问权限** 以供 Ollama 使用，因为这可以显著加速性能，并使后续的基准测试练习比使用 CPU
    时更加高效。在终端中运行 `nvidia-smi` 以检查是否检测到 GPU。*'
- en: '* * *'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (ii) OpenAI simple-evals
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (ii) OpenAI simple-evals
- en: '[**simple-evals**](https://github.com/openai/simple-evals) is a lightweight
    library designed to evaluate language models using a zero-shot, chain-of-thought
    prompting approach. It includes famous benchmarks like MMLU, MATH, GPQA, MGSM,
    and HumanEval, aiming to reflect realistic usage scenarios.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '[**simple-evals**](https://github.com/openai/simple-evals) 是一个轻量级的库，旨在通过零样本、思维链提示方法评估语言模型。它包括著名的基准测试，如
    MMLU、MATH、GPQA、MGSM 和 HumanEval，旨在反映现实的使用场景。'
- en: Some of you may know about OpenAI’s more famous and comprehensive evaluation
    library called [**Evals**](https://github.com/openai/evals), which is distinct
    from simple-evals.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 你们中的一些人可能听说过 OpenAI 更著名且更全面的评估库 [**Evals**](https://github.com/openai/evals)，它与
    simple-evals 不同。
- en: In fact, the [README](https://github.com/openai/simple-evals?tab=readme-ov-file#background)
    of simple-evals also specifically indicates that it is not intended to replace
    the **Evals** library.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，simple-evals 的 [README](https://github.com/openai/simple-evals?tab=readme-ov-file#background)
    也明确指出，它不是用来替换 **Evals** 库的。
- en: '**So why are we using simple-evals?**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么我们使用 simple-evals？**'
- en: The simple answer is that **simple-evals** comes with built-in evaluation scripts
    for the reasoning benchmarks we are targeting (such as GPQA), which are missing
    in **Evals**.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 简单的答案是，**simple-evals** 内置了我们针对的推理基准（如 GPQA）的评估脚本，而 **Evals** 中则没有。
- en: Additionally, I did not find any other tools or platforms, other than simple-evals,
    that provide a straightforward, Python-native way to run numerous key benchmarks,
    such as GPQA, particularly when working with Ollama.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我没有找到其他工具或平台，除了 simple-evals，它们提供了一种直接、Python 原生的方法来运行多个关键基准，如 GPQA，尤其是在与
    Ollama 一起工作时。
- en: '* * *'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (7) Results of Evaluation
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (7) 评估结果
- en: As part of the evaluation, I selected **20 random questions** from the GPQA-Diamond
    198-question set for the **14B distilled model** to work on. The total time taken
    was 216 minutes, which is ~11 minutes per question.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 作为评估的一部分，我选择了GPQA-Diamond 198题集中的**20个随机问题**供**14B精炼模型**处理。总共花费了216分钟，即每个问题大约11分钟。
- en: The outcome was admittedly disappointing, as it scored only **10%**, far below
    the reported 73.3% score for the 671B DeepSeek-R1 model.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 结果诚然令人失望，因为它只得了**10%**，远低于671B DeepSeek-R1模型报告的73.3%的得分。
- en: 'The main issue I noticed is that during its intensive internal reasoning, **the
    model often either failed to produce any answer (e.g., returning reasoning tokens
    as the final lines of output) or provided a response that did not match the expected
    multiple-choice format (e.g., Answer: A).**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我注意到的主要问题是，在其密集的内部推理过程中，**模型经常要么无法产生任何答案（例如，将推理标记作为输出最后几行返回）要么提供了不符合预期多选题格式的响应（例如，答案：A）。**
- en: '![](../Images/8aa3034522f637419dc5d97548706646.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8aa3034522f637419dc5d97548706646.png)'
- en: Evaluation output printout from the 20 examples benchmark run | Image by author
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 20个基准运行示例的评估输出打印 | 图由作者提供
- en: As shown above, many outputs ended up as `None` because the regex logic in simple-evals
    could not detect the expected answer pattern in the LLM response.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，许多输出最终变成了`None`，因为simple-evals中的正则表达式逻辑无法在LLM的响应中检测到预期的答案模式。
- en: While the [human-like reasoning logic](https://github.com/kennethleungty/DeepSeek-R1-Ollama-Simple-Evals/blob/main/data/convos_output_20250313_0105.txt)
    was interesting to observe, I had expected stronger performance in terms of question-answering
    accuracy.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然[类似人类的推理逻辑](https://github.com/kennethleungty/DeepSeek-R1-Ollama-Simple-Evals/blob/main/data/convos_output_20250313_0105.txt)观察起来很有趣，但我原本期望在问答准确度方面有更强的表现。
- en: I have also seen online users mention that even the larger 32B model does not
    perform as well as o1\. This has raised doubts about the utility of distilled
    reasoning models, especially when they struggle to give correct answers despite
    generating long reasoning.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我还看到在线用户提到，即使是更大的32B模型表现也不如o1。这引发了关于精炼推理模型实用性的怀疑，尤其是在它们在生成长推理的同时难以给出正确答案时。
- en: That said, GPQA-Diamond is a highly challenging benchmark, so these models could
    still be useful for simpler reasoning tasks. Their lower computational demands
    also make them more accessible.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，GPQA-Diamond是一个极具挑战性的基准，因此这些模型对于更简单的推理任务仍然可能很有用。它们较低的计算需求也使得它们更容易访问。
- en: Furthermore, the DeepSeek team recommended conducting multiple tests and averaging
    the results as part of the benchmarking process — something I omitted due to time
    constraints.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DeepSeek团队建议在基准测试过程中进行多次测试并平均结果—由于时间限制，我忽略了这一点。
- en: '* * *'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (8) Step-by-Step Walkthrough
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (8) 逐步讲解
- en: At this point, we’ve covered the core concepts and key takeaways.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经涵盖了核心概念和关键要点。
- en: If you’re ready for a hands-on, technical walkthrough, this section provides
    a deep dive into the inner workings and step-by-step implementation.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你准备好进行实际操作的技术讲解，本节将深入探讨其内部工作原理和逐步实施过程。
- en: '*Check out (or clone) the [accompanying GitHub repo](https://github.com/kennethleungty/DeepSeek-R1-Ollama-Simple-Evals)
    to follow along. The requirements for the virtual environment setup can be found
    [here](https://github.com/kennethleungty/DeepSeek-R1-Ollama-Simple-Evals/blob/main/requirements.txt).*'
  id: totrans-105
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*查看（或克隆）[相关的GitHub仓库](https://github.com/kennethleungty/DeepSeek-R1-Ollama-Simple-Evals)以跟随操作。虚拟环境设置的要求可以在[这里](https://github.com/kennethleungty/DeepSeek-R1-Ollama-Simple-Evals/blob/main/requirements.txt)找到。*'
- en: (i) Initial Setup — Ollama
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (i) 初始设置—Ollama
- en: We begin by downloading Ollama. Visit the [**Ollama download page**](https://ollama.com/download),
    select your operating system, and follow the corresponding installation instructions.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先下载Ollama。访问[**Ollama下载页面**](https://ollama.com/download)，选择你的操作系统，并遵循相应的安装说明。
- en: Once installation is complete, launch Ollama by double-clicking the Ollama app
    (for Windows and macOS) or running `ollama serve` in the terminal.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，通过双击Ollama应用程序（适用于Windows和macOS）或在终端中运行`ollama serve`来启动Ollama。
- en: '* * *'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (ii) Initial Setup — OpenAI simple-evals
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (ii) 初始设置—OpenAI simple-evals
- en: The setup of simple-evals is relatively unique.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: simple-evals的设置相对独特。
- en: While simple-evals presents itself as a library, **the absence of** `__init__.py`
    **files in the repository means it is not structured as a proper Python package**,
    leading to import errors after cloning the repo locally.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 simple-evals 以库的形式出现，**但仓库中缺少 `__init__.py` 文件意味着它没有以正确的 Python 包结构组织**，这会导致在本地克隆仓库后出现导入错误。
- en: Since it is also not published to PyPI and lacks standard packaging files like
    `setup.py` or `pyproject.toml`, it cannot be installed via `pip`.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 由于它也没有发布到 PyPI，并且缺少像 `setup.py` 或 `pyproject.toml` 这样的标准打包文件，因此无法通过 `pip` 安装。
- en: Fortunately, we can utilize **Git submodules** as a straightforward workaround.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，我们可以利用 **Git 子模块**作为直接的解决方案。
- en: '*A Git submodule lets us include contents of another Git repository inside
    our own project. It pulls the files from an external repo (e.g., simple-evals),
    but keeps its history separate.*'
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*Git 子模块让我们可以在自己的项目中包含另一个 Git 仓库的内容。它从外部仓库（例如，simple-evals）中拉取文件，但保持其历史记录独立。*'
- en: 'You can choose one of two ways (A or B) to pull the simple-evals contents:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以选择两种方式（A 或 B）来拉取 simple-evals 内容：
- en: '***(A) If You Cloned My Project Repo***'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '***(A) 如果您克隆了我的项目仓库***'
- en: 'My project repo already includes `simple-evals` as a submodule, so you can
    just run:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我的项目仓库已经包含了 `simple-evals` 作为子模块，因此您只需运行：
- en: '[PRE0]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '***(B) If You’re Adding It to a Newly Created Project***'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '***(B) 如果您将其添加到新创建的项目中***'
- en: 'To manually add simple-evals as a submodule, run this:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 要手动将 simple-evals 添加为子模块，请运行以下命令：
- en: '[PRE1]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Note**: The `simple_evals` at the end of the command (with an **underscore**)
    is crucial. It sets the folder name, and using a hyphen instead (i.e., simple**–**evals)
    can lead to import issues later.'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：命令末尾的 `simple_evals`（带有 **下划线**）至关重要。它设置了文件夹名称，使用连字符（即，simple**–**evals）代替可能会导致后续的导入问题。'
- en: '* * *'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Final Step (For Both Methods)**'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**最终步骤（两种方法都适用）**'
- en: 'After pulling the repo contents, you must create an empty `__init__.py` in
    the newly created `simple_evals` folder so that it is importable as a module.
    You can create it manually, or use the following command:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 拉取仓库内容后，您必须在新建的 `simple_evals` 文件夹中创建一个空的 `__init__.py` 文件，以便它可以作为模块导入。您可以手动创建它，或者使用以下命令：
- en: '[PRE2]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '* * *'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (iii) Pull DeepSeek-R1 model via Ollama
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (iii) 通过 Ollama 拉取 DeepSeek-R1 模型
- en: 'The next step is to locally download the distilled model of your choice (e.g.,
    14B) using this command:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是使用此命令本地下载您选择的精炼模型（例如，14B）：
- en: '[PRE3]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The list of DeepSeek-R1 models available on Ollama can be found [here](https://ollama.com/library/deepseek-r1).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: Ollama 上可用的 DeepSeek-R1 模型列表可以在[这里](https://ollama.com/library/deepseek-r1)找到。
- en: '* * *'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (iv) Define configuration
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (iv) 定义配置
- en: 'We define the parameters in a configuration YAML file, as shown below:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在配置 YAML 文件中定义参数，如下所示：
- en: The model temperature is set to **0.6** (as opposed to the typical default value
    of 0). This follows DeepSeek’s usage recommendations, which suggest a temperature
    range of 0.5 to 0.7(0.6 recommended) to **prevent endless repetitions or incoherent
    outputs.**
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 模型温度设置为 **0.6**（与典型的默认值 0 相比）。这遵循 DeepSeek 的使用建议，建议温度范围为 0.5 到 0.7（推荐值为 0.6），以**防止无限重复或不连贯的输出**。
- en: '*Do check out the interestingly unique [DeepSeek-R1 usage recommendations ](https://github.com/deepseek-ai/DeepSeek-R1?tab=readme-ov-file#usage-recommendations)— especially
    for benchmarking — to ensure optimal performance when using DeepSeek-R1 models.*'
  id: totrans-137
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*请务必查看有趣的独特[DeepSeek-R1 使用建议](https://github.com/deepseek-ai/DeepSeek-R1?tab=readme-ov-file#usage-recommendations)——特别是对于基准测试——以确保使用
    DeepSeek-R1 模型时的最佳性能。*'
- en: '`EVAL_N_EXAMPLES` is the parameter for setting the number of questions from
    the full 198-question set to use for evaluation.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '`EVAL_N_EXAMPLES` 是设置用于评估的完整 198 题问集中的问题数量的参数。'
- en: '* * *'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (v) Set up Sampler code
  id: totrans-140
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (v) 设置采样器代码
- en: To support Ollama-based language models within the simple-evals framework, we
    create a custom wrapper class named `OllamaSampler` saved inside `utils/samplers/ollama_sampler.py`.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在 simple-evals 框架内支持基于 Ollama 的语言模型，我们创建了一个名为 `OllamaSampler` 的自定义包装类，并将其保存在
    `utils/samplers/ollama_sampler.py` 中。
- en: In this context, a *sampler* is a Python class that generates outputs from a
    language model based on a given prompt.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个上下文中，一个 *采样器* 是一个 Python 类，它根据给定的提示从语言模型生成输出。
- en: Since existing samplers in simple-evals only cover providers like OpenAI and
    Claude, we need a sampler class that provides a compatible interface for Ollama.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 simple-evals 中的现有采样器仅覆盖 OpenAI 和 Claude 等提供商，我们需要一个为 Ollama 提供兼容接口的采样器类。
- en: The `OllamaSampler` extracts the GPQA question prompt, sends it to the model
    with a specified temperature, and returns the plain text response.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '`OllamaSampler` 从 GPQA 问题提示中提取信息，将其与指定的温度一起发送到模型，并返回纯文本响应。'
- en: The `_pack_message` method is included to ensure the output format matches what
    the evaluation scripts in simple-evals expect.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 包含 `_pack_message` 方法以确保输出格式与 simple-evals 中的评估脚本期望的格式相匹配。
- en: '* * *'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (vi) Create evaluation run script
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: (vi) 创建评估运行脚本
- en: The following code sets up the evaluation execution in `main.py`, including
    the use of the `GPQAEval` class from simple-evals to run GPQA benchmarking.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码在 `main.py` 中设置了评估执行，包括使用 simple-evals 中的 `GPQAEval` 类来运行 GPQA 基准测试。
- en: The `run_eval()` function is a configurable evaluation runner that tests LLMs
    through Ollama on benchmarks like GPQA.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '`run_eval()` 函数是一个可配置的评估运行器，它通过 Ollama 在 GPQA 等基准测试中对 LLMs 进行测试。'
- en: It loads settings from the config file, sets up the appropriate evaluation class
    from simple-evals, and runs the model through a standardized evaluation process.
    It is saved in `main.py`, which can be executed with `python main.py`.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 它从配置文件中加载设置，设置适当的 simple-evals 评估类，并通过标准化评估过程运行模型。它保存在 `main.py` 中，可以通过 `python
    main.py` 执行。
- en: Following the steps above, we have successfully set up and executed the GPQA-Diamond
    benchmarking on the DeepSeek-R1 distilled model.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 按照上述步骤，我们已经在 DeepSeek-R1 精简模型上成功设置了并执行了 GPQA-Diamond 基准测试。
- en: '* * *'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Wrapping It Up
  id: totrans-153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: In this article, we showcased how we can combine tools like Ollama and OpenAI’s
    simple-evals to explore and benchmark DeepSeek-R1’s distilled models.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们展示了如何结合 Ollama 和 OpenAI 的 simple-evals 工具来探索和基准测试 DeepSeek-R1 的精简模型。
- en: The distilled models may not yet rival the 671B parameter original model on
    challenging reasoning benchmarks like GPQA-Diamond. Still, they demonstrate how
    distillation can expand access to LLM reasoning capabilities.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 精简模型可能尚未在 GPQA-Diamond 等具有挑战性的推理基准测试中与 671B 参数的原模型相媲美。然而，它们展示了蒸馏如何扩展 LLM 推理能力的访问。
- en: Despite subpar scores in complex PhD-level tasks, these smaller variants may
    remain viable for less demanding scenarios, paving the way for efficient local
    deployment on a wider range of hardware.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管在复杂的博士级别任务中得分不佳，但这些较小的变体可能在要求较低的场合中仍然可行，为在更广泛的硬件上高效本地部署铺平了道路。
- en: Before you go
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在您离开之前
- en: I welcome you to follow my [GitHub](https://github.com/kennethleungty) and [LinkedIn](https://www.linkedin.com/in/kennethleungty/)
    to stay updated with more engaging and practical content. Meanwhile, have fun
    benchmarking LLMs with Ollama and simple-evals!
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我欢迎您关注我的 [GitHub](https://github.com/kennethleungty) 和 [LinkedIn](https://www.linkedin.com/in/kennethleungty/)
    以获取更多引人入胜且实用的内容。同时，享受使用 Ollama 和 simple-evals 对 LLMs 进行基准测试的乐趣！
