- en: How to Benchmark DeepSeek-R1 Distilled Models on GPQA Using Ollama and OpenAI’s
    simple-evals
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用Ollama和OpenAI的simple-evals在GPQA上基准测试DeepSeek-R1蒸馏模型
- en: 原文：[https://towardsdatascience.com/how-to-benchmark-deepseek-r1-distilled-models-on-gpqa-using-ollama-and-openais-simple-evals/](https://towardsdatascience.com/how-to-benchmark-deepseek-r1-distilled-models-on-gpqa-using-ollama-and-openais-simple-evals/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-benchmark-deepseek-r1-distilled-models-on-gpqa-using-ollama-and-openais-simple-evals/](https://towardsdatascience.com/how-to-benchmark-deepseek-r1-distilled-models-on-gpqa-using-ollama-and-openais-simple-evals/)
- en: <mdspan datatext="el1745457890532" class="mdspan-comment">The recent launch</mdspan>
    of the [DeepSeek-R1](https://api-docs.deepseek.com/news/news250120) model sent
    ripples across the global AI community. It delivered breakthroughs on par with
    the reasoning models from Meta and OpenAI, achieving this in a fraction of the
    time and at a significantly lower cost.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745457890532" class="mdspan-comment">近期发布的</mdspan> [DeepSeek-R1](https://api-docs.deepseek.com/news/news250120)
    模型在全球人工智能社区中引起了波澜。它实现了与Meta和OpenAI的推理模型相当的重大突破，在极短的时间内以显著更低的成本做到了这一点。
- en: Beyond the headlines and online buzz, how can we assess the model’s reasoning
    abilities using recognized benchmarks?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 除去标题和在线热议，我们如何使用公认的基准来评估该模型的推理能力？
- en: DeepSeek’s [user interface](http://chat.deepseek.com/) makes it easy to explore
    its capabilities, but using it programmatically offers deeper insights and more
    seamless integration into real-world applications. Understanding how to run such
    models locally also provides enhanced control and offline access.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的[用户界面](http://chat.deepseek.com/)使其易于探索其功能，但以编程方式使用它提供了更深入的见解，并能够更无缝地集成到实际应用中。了解如何本地运行此类模型也提供了增强的控制和离线访问。
- en: In this article, we explore how to use **Ollama** and **OpenAI’s simple-evals**
    to evaluate the reasoning capabilities of DeepSeek-R1’s distilled models based
    on the famous **GPQA-Diamond** benchmark.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了如何使用**Ollama**和**OpenAI的simple-evals**根据著名的**GPQA-Diamond**基准来评估DeepSeek-R1蒸馏模型的推理能力。
