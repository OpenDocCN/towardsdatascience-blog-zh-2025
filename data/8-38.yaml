- en: 6\. Segmenting Data into Price Brackets Using pd.cut()
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 使用 pd.cut() 将数据分段到价格区间
- en: pd.cut() is a powerful function that can be used when you need to segment data
    into multiple bins. It can also act as a way to convert continuous values into
    categorical values.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: pd.cut() 是一个强大的函数，当需要将数据分割成多个区间时可以使用。它还可以作为将连续值转换为分类值的一种方式。
- en: One such scenario is demonstrated in the example below. We will be Segmenting
    the price of each listing into multiple price brackets (bins).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 下面将演示一个这样的场景。我们将对每个列表的价格进行分割，将其划分到多个价格区间（区间）中。
- en: We can set a predetermined number of price brackets – "$0 – $100", "$101 – $250",
    "$251 – $500", "$500 – $1000", and "$1000+".
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以设置预定的价格区间数量 – "$0 – $100", "$101 – $250", "$251 – $500", "$500 – $1000",
    以及 "$1000+"。
- en: '[PRE2]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Please note here that the number of labels (5) is less than number of bins (6)
    by one. This is because the initial two values in the bin belong to the first
    label.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，这里的标签数量（5）比区间数量（6）少一个。这是因为区间中的前两个值属于第一个标签。
- en: '![Breakup of Listing across Price Brackets (Screenshot by Author)](../Images/1cdf5e83bbf278edf88df722bba23988.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![价格区间内列表的拆分（作者截图）](../Images/1cdf5e83bbf278edf88df722bba23988.png)'
- en: Breakup of Listing across Price Brackets (Screenshot by Author)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 价格区间内列表的拆分（作者截图）
- en: We can see that the majority of the listings (3400) lie in the range between
    $101–$250 with the least amount of listings (29) in the $1000+ range.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，大多数列表（3400个）位于$101–$250的范围内，而$1000+范围内的列表数量最少（29个）。
