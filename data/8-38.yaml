- en: Advanced Pandas Techniques for Data Processing and Performance
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 高级 Pandas 技巧：数据处理和性能优化
- en: 原文：[https://towardsdatascience.com/advanced-pandas-techniques-for-data-processing-and-performance-23f9026d21f5/](https://towardsdatascience.com/advanced-pandas-techniques-for-data-processing-and-performance-23f9026d21f5/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/advanced-pandas-techniques-for-data-processing-and-performance-23f9026d21f5/](https://towardsdatascience.com/advanced-pandas-techniques-for-data-processing-and-performance-23f9026d21f5/)
- en: '![Photo by Weichao Deng on Unsplash](../Images/56c5ef4aa4feb65abf96fa622cd8991e.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由 Weichao Deng 在 Unsplash 上拍摄的照片](../Images/56c5ef4aa4feb65abf96fa622cd8991e.png)'
- en: Photo by [Weichao Deng](https://unsplash.com/@juniperphoton?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由 [Weichao Deng](https://unsplash.com/@juniperphoton?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 拍摄的照片
- en: Pandas is a must-have Python library if you’re working with data. Whether you’re
    a programmer, data scientist, analyst, or researcher, you’ll find it makes handling
    structured data much easier. It gives you flexible, intuitive tools to work with
    even the most complex datasets.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在处理数据，Pandas 是一个必不可少的 Python 库。无论你是程序员、数据科学家、分析师还是研究人员，你都会发现它使得处理结构化数据变得容易得多。它为你提供了灵活直观的工具，可以处理甚至是最复杂的数据集。
- en: As you dive deeper into Pandas, mastering it can significantly boost your productivity
    and streamline your workflow. We will be exploring 7 essential tips that will
    help you leverage the library’s full potential and tackle data challenges more
    effectively.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当你深入 Pandas 时，掌握它将显著提高你的生产力和简化你的工作流程。我们将探讨 7 个基本技巧，这些技巧将帮助你充分利用库的潜力，并更有效地应对数据挑战。
- en: 'To illustrate the following tips, I’ll be using a dataset from Kaggle’s Airbnb
    listings. You can fetch the dataset [here](https://www.kaggle.com/datasets/swsw1717/seatle-airbnb-open-data-sql-project).
    *(License: [CC0: Public Domain](https://creativecommons.org/publicdomain/zero/1.0/))*
    This dataset comprises three CSV files: `calendar.csv`, `listings.csv`, and `reviews.csv`.
    These files contain information about property availability, detailed listing
    attributes, and user reviews, respectively. By working with real-world data, I’ll
    demonstrate how Pandas can efficiently handle and analyze complex, multi-file
    datasets typically encountered in data science projects.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明以下技巧，我将使用 Kaggle 的 Airbnb 列表数据集。你可以从这里 [获取数据集](https://www.kaggle.com/datasets/swsw1717/seatle-airbnb-open-data-sql-project)。*(许可：[CC0：公共领域](https://creativecommons.org/publicdomain/zero/1.0/))*
    该数据集包含三个 CSV 文件：`calendar.csv`、`listings.csv` 和 `reviews.csv`。这些文件分别包含关于物业可用性、详细列表属性和用户评论的信息。通过处理真实世界的数据，我将展示
    Pandas 如何高效地处理和分析在数据科学项目中常见的大型、多文件数据集。
- en: 1\. Reading data in chunks
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 分块读取数据
- en: There are often scenarios we encounter where the size of the data is more than
    the available memory (RAM) we have. In such cases, it’s a good idea to read data
    in chunks from the file so that the system doesn’t run out of memory. This approach
    allows you to process data incrementally, reducing memory usage and potentially
    speeding up your workflow.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我们经常遇到数据大小超过我们可用内存（RAM）的情况。在这种情况下，从文件中分块读取数据是一个好主意，这样系统就不会耗尽内存。这种方法允许你增量处理数据，减少内存使用，并可能加快你的工作流程。
- en: 2\. Render a progress bar while using the apply() function
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 在使用 apply() 函数时渲染进度条
- en: I have always been a user of the `[tqdm](https://pypi.org/project/tqdm/)` library.
    For those who don’t know about `tqdm`, it is a popular choice for displaying progress
    bars during iterative operations. It provides a seamless way to track the progress
    of loops and other iterable processes, which is particularly helpful when working
    with large datasets. However, I encountered a challenge in applying `tqdm` to
    Pandas’ `apply()` functions, which are commonly used to perform element-wise operations
    on DataFrame columns or rows.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直是 `[tqdm](https://pypi.org/project/tqdm/)` 库的用户。对于那些不了解 `tqdm` 的人来说，它是显示迭代操作进度条的流行选择。它提供了一种无缝的方式来跟踪循环和其他可迭代过程的状态，这在处理大型数据集时尤其有帮助。然而，我在将
    `tqdm` 应用于 Pandas 的 `apply()` 函数时遇到了挑战，这些函数通常用于在 DataFrame 的列或行上执行元素级操作。
- en: To my delight, I discovered that `tqdm` does, in fact, support Pandas’ `apply()`
    methods. All it takes is a small addition to your code. Instead of using the standard
    `apply()` function, you can simply replace it with `progress_apply()`. This will
    automatically render a progress bar, giving you valuable insights into the execution
    of your `apply()` operations. Before that, just make sure to import `tqdm` and
    add a line of code below it to integrate it with pandas.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 令我高兴的是，我发现`tqdm`实际上支持Pandas的`apply()`方法。只需在您的代码中进行小小的修改。您只需将标准的`apply()`函数替换为`progress_apply()`。这将自动显示进度条，让您对`apply()`操作的执行情况有宝贵的了解。在此之前，请确保导入`tqdm`并在其下方添加一行代码以将其与pandas集成。
- en: For demonstration, let’s go back to the `listings.csv`dataset and convert the
    column `last_review` from type `string` to `datetime`. I’ll use the progress_apply
    function instead which will create a progress bar.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示，让我们回到`listings.csv`数据集，并将`last_review`列从`string`类型转换为`datetime`类型。我将使用`progress_apply`函数，这将创建一个进度条。
- en: 'If you don’t have `tqdm` installed, you can use the command below to install
    it:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您没有安装`tqdm`，可以使用以下命令进行安装：
- en: '[PRE0]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![Progress bar displayed at the end of the cell (Screenshot by author)](../Images/330dce63c38242d7c11069ee864e49a6.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![单元格末尾显示进度条（作者截图）](../Images/330dce63c38242d7c11069ee864e49a6.png)'
- en: Progress bar displayed at the end of the cell (Screenshot by author)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 单元格末尾显示进度条（作者截图）
- en: 3\. Effortlessly Populate Multiple Columns in Pandas Using apply() with `result_type="expand"`
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 使用`apply()`和`result_type="expand"`轻松在Pandas中填充多个列
- en: While using the apply function, I often used to encounter scenarios where I
    need to return multiple values from a function simultaneously and store these
    values in separate columns. That’s when I discovered the `result_type="expand"`
    parameter which would help me do it.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用`apply`函数时，我经常遇到需要从函数中同时返回多个值并将这些值存储在单独列中的场景。那时我发现`result_type="expand"`参数将帮助我做到这一点。
- en: It was such a time-saver! I no longer had to create separate functions and iterate
    over the same set of values just to store them in a separate column. I could just
    create a single function and return multiple values.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这节省了我很多时间！我不再需要创建单独的函数并遍历同一组值，只是为了将它们存储在单独的列中。我只需创建一个函数并返回多个值。
- en: In the example below, I have demonstrated the same. I’m returning two values
    – the day and month name based on the review date. These values are then populated
    simultaneously in the `Day` and `Month` columns respectively.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的示例中，我演示了同样的方法。我返回两个值——基于审查日期的日期和月份名称。然后这些值分别同时填充到`Day`和`Month`列中。
- en: '![Day and Month columns populated simultaneously (Screenshot by author)](../Images/f70adb751ea94a1515170537dcbe3efc.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![同时填充日期和月份列（作者截图）](../Images/f70adb751ea94a1515170537dcbe3efc.png)'
- en: Day and Month columns populated simultaneously (Screenshot by author)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 日期和月份列同时填充（作者截图）
- en: 4\. Processing a DataFrame in Parallel
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 并行处理DataFrame
- en: I have often faced scenarios where certain processes take too long to complete.
    When a DataFrame has millions of rows and you need to iterate through each row
    to extract certain information, it can get slow real quick.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我经常遇到某些过程需要太长时间才能完成的情况。当DataFrame有数百万行，并且您需要遍历每一行以提取某些信息时，这会变得非常慢。
- en: This is where I use the multiprocessing module. I split the DataFrames (using
    np.array_split()) into multiple chunks (depending on the number of cores available
    in your system) and process each chunk of the DataFrame in parallel. This can
    especially be useful in cases where the system has multiple cores which most modern
    systems are capable of.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我使用多进程模块的地方。我将DataFrames（使用`np.array_split()`）分割成多个块（取决于系统中的核心数），并并行处理DataFrame的每个块。这在系统具有多个核心的情况下尤其有用，因为大多数现代系统都具备这种能力。
- en: Once the chunks are processed and the desired output for each chunk is obtained,
    it can be concatenated back to a single DataFrame.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦处理完数据块并获取到每个数据块所需的输出，就可以将其连接回单个DataFrame。
- en: Let’s use the reviews dataset for this one. It has more than 480k reviews by
    different users across listings.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用这个评论数据集。它包含来自不同用户的超过480k条评论。
- en: For demonstration purposes, we will be creating a function that will simulate
    the time required for sentiment prediction of a review assuming each prediction
    will take 0.1 second.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示目的，我们将创建一个函数来模拟评论情感预测所需的时间，假设每个预测需要0.1秒。
- en: '![Processing Serially (Screenshot by Author)](../Images/7de696c28e2d3a72e15c23b99b0f16e5.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![串行处理（作者截图）](../Images/7de696c28e2d3a72e15c23b99b0f16e5.png)'
- en: Processing Serially (Screenshot by Author)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 串行处理（作者截图）
- en: As you can see, it will take more than 13 hours if we make predictions one by
    one!
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，如果我们逐个进行预测，将需要超过13小时！
- en: Let’s speed this up. First, let’s split the reviews DataFrame into multiple
    batches so that each batch is processed by a separate core. We can then create
    a multiprocessing Pool to distribute the computation over multiple cores.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们加快这个速度。首先，让我们将评论数据框拆分成多个批次，以便每个批次由不同的核心处理。然后我们可以创建一个多进程池来在多个核心上分配计算。
- en: '![Processing in Parallel (Screenshot by Author)](../Images/e0ac8087d6a50ac72e770165ae00c748.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![并行处理（作者截图）](../Images/e0ac8087d6a50ac72e770165ae00c748.png)'
- en: Processing in Parallel (Screenshot by Author)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 并行处理（作者截图）
- en: Using multiprocessing, we have managed to bring down the prediction time required
    from more than 13 hours to less than 13 minutes!
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用多进程，我们已经将所需的预测时间从超过13小时降低到不到13分钟！
- en: Each batch consists of 7521 reviews and there are a total of 64 batches. In
    this scenario, I was able to set `n_cores` more than the actual number of cores
    my system has. This is because during the execution of `time.sleep(0.1)` the CPU
    remains idle and each process interleaves for other process to execute. If your
    process is CPU intensive, it is recommended to keep `n_cores` less than the actual
    number of cores your system has.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 每个批次包含7521条评论，总共有64个批次。在这种情况下，我能够将 `n_cores` 设置得比系统实际的核心数还要多。这是因为当执行 `time.sleep(0.1)`
    时，CPU保持空闲，每个进程会交错执行其他进程。如果你的进程是CPU密集型的，建议将 `n_cores` 设置得小于系统实际的核心数。
- en: 5\. Perform Complex Merging with merge() and indicator=True
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 使用 merge() 和 indicator=True 进行复杂合并
- en: Merging is quite a common operation performed by individuals who deal with data.
    However, sometimes it can get quite complicated to understand if any particular
    data points were lost during the merging process. It might be due to a plethora
    of reasons – the worst one being, malformed or faulty data.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 合并是处理数据的人员执行的一个相当常见的操作。然而，有时如果合并过程中丢失了任何特定的数据点，理解起来可能会相当复杂。这可能是由于许多原因造成的——最糟糕的是，数据格式不正确或数据有误。
- en: This is where the `indicator=True` parameter comes in handy. When you enable
    this parameter, it creates a new column named `_merge` which can denote three
    different scenarios based on the type of merge operation performed.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是 `indicator=True` 参数派上用场的地方。当你启用此参数时，它创建了一个名为 `_merge` 的新列，可以根据执行合并操作的类型表示三种不同的场景。
- en: _left*only* – indicates that the row’s key only exists in the left DataFrame
    and it couldn’t find a match in the right DataFrame
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: _left*only* – 表示该行的键仅存在于左侧数据框中，并且在右侧数据框中找不到匹配项
- en: _right*only –* indicates that the row’s key only exists in the right DataFrame
    and it couldn’t find a match in the left DataFrame
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: _right*only* – 表示该行的键仅存在于右侧数据框中，并且在左侧数据框中找不到匹配项
- en: '*both –* indicates that the row’s key exists in both the DataFrames and data
    was successfully merged.'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*both* – 表示该行的键存在于两个数据框中，并且数据已成功合并。'
- en: These values can also come in handy as a filter to apply during data manipulation
    tasks.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这些值也可以在数据操作任务中作为过滤器使用。
- en: In the example below, I’ll be performing an outer merge between reviews and
    listing DataFrames.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的示例中，我将执行评论和列表数据框之间的外部合并。
- en: I’m performing an outer merge with the parameter `indicator=True` to identify
    which listings have no reviews/missing reviews. Ideally, listings with the parameter
    `_merge` set to _"left*only"* will be missing reviews.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在使用参数 `indicator=True` 进行外部合并以识别哪些列表没有评论/缺失评论。理想情况下，将 `_merge` 参数设置为 _"left*only"*
    的列表将缺少评论。
