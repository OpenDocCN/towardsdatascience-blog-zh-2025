  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用代理和LLM简化工作
- en: 原文：[https://towardsdatascience.com/how-to-streamline-your-work-with-agents-and-llms/](https://towardsdatascience.com/how-to-streamline-your-work-with-agents-and-llms/)
