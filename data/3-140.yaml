  zh: 原文：[https://towardsdatascience.com/how-to-streamline-your-work-with-agents-and-llms/](https://towardsdatascience.com/how-to-streamline-your-work-with-agents-and-llms/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《变量》的每一期新版本，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[今天订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: If you’d like to explore innovative approaches to optimizing your LLM-based
    workflows, you’re in the right place. Our highlights this week cover agent tool-calling,
    functional testing of prompts, and creating your very own AI coding assistant.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想探索优化基于LLM的工作流程的创新方法，您就来到了正确的位置。本周的重点包括代理工具调用、提示的功能测试以及创建您自己的AI编码助手。
- en: 'Before we dive in, however, a quick reminder: At TDS, we welcome articles from
    existing and new authors alike — so if you’re sitting on a draft related to data
    science, AI, or adjacent topics, our [contributor portal is open](https://contributor.insightmediagroup.io/)!'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨之前，然而，有一个简短的提醒：在TDS，我们欢迎现有和新作者的文章——所以如果您手头有关于数据科学、AI或相关主题的草稿，我们的[贡献者门户已开放](https://contributor.insightmediagroup.io/)！
- en: A Clear Intro to MCP (Model Context Protocol) with Code Examples
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 带有代码示例的MCP（模型上下文协议）清晰介绍
- en: New to MCP (Model Context Protocol)? [Sandi Besen](https://towardsdatascience.com/author/sandibesen/) shares
    an accessible introduction to this emerging method for orchestrating AI agents’
    functionalities — complete with a hands-on code example to keep things concrete
    and actionable.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 新接触MCP（模型上下文协议）吗？[Sandi Besen](https://towardsdatascience.com/author/sandibesen/)分享了一个关于这一新兴方法介绍，用于编排AI代理的功能——附带一个动手实践的代码示例，使内容具体且可操作。
- en: '[A Clear Intro to MCP (Model Context Protocol) with Code Examples](https://towardsdatascience.com/clear-intro-to-mcp/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[带有代码示例的MCP（模型上下文协议）清晰介绍](https://towardsdatascience.com/clear-intro-to-mcp/)'
- en: 'Mastering Prompt Engineering with Functional Testing: A Systematic Guide to
    Reliable LLM Outputs'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过功能测试掌握提示工程：可靠LLM输出的系统指南
- en: How can you ensure models produce the outputs you’re looking for? [Ugo Pradère](https://towardsdatascience.com/author/ugopradere/) outlines
    the benefits of algorithmic testing of your prompts.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如何确保模型产生您期望的输出？[Ugo Pradère](https://towardsdatascience.com/author/ugopradere/)概述了算法测试您提示的好处。
- en: '[Mastering Prompt Engineering with Functional Testing: A Systematic Guide to
    Reliable LLM Outputs ](https://towardsdatascience.com/mastering-prompt-engineering-with-functional-testing-a-systematic-guide-to-reliable-llm-outputs/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[通过功能测试掌握提示工程：可靠LLM输出的系统指南](https://towardsdatascience.com/mastering-prompt-engineering-with-functional-testing-a-systematic-guide-to-reliable-llm-outputs/)'
- en: Build Your Own AI Coding Assistant in JupyterLab with Ollama and Hugging Face
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Ollama和Hugging Face在JupyterLab中构建您自己的AI编码助手
- en: Clear and focused, [Parul Pandey](https://towardsdatascience.com/author/pandeyparul/)‘s
    step-by-step guide shows how you can leverage the power of LLMs to boost your
    programming productivity.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰且专注的，[Parul Pandey](https://towardsdatascience.com/author/pandeyparul/)的逐步指南展示了您如何利用LLM的力量来提高编程效率。
- en: '[Build Your Own AI Coding Assistant in JupyterLab with Ollama and Hugging Face](https://towardsdatascience.com/build-your-own-ai-coding-assistant-in-jupyterlab-with-ollama-and-hugging-face/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用Ollama和Hugging Face在JupyterLab中构建您自己的AI编码助手](https://towardsdatascience.com/build-your-own-ai-coding-assistant-in-jupyterlab-with-ollama-and-hugging-face/)'
- en: Other Recommended Reads
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他推荐阅读
- en: Our authors’ interests go far and wide — as you can see by the other standout
    articles we highlight this week, spanning multimodality, data science agents,
    and statistics, among other topics.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的作者兴趣广泛——正如您通过本周我们重点推荐的其它杰出文章所看到的，涵盖了多模态、数据科学代理、统计学等多个主题。
- en: How well [can multimodal AI systems understand figures](https://towardsdatascience.com/testing-the-power-of-multimodal-ai-systems-in-reading-and-interpreting-photographs-maps-charts-and-more/) and
    extract information from them? [Luciano Abriata](https://towardsdatascience.com/author/lucianosphere/) offers
    a detailed look at the recent strides they’ve made.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多模态人工智能系统如何[理解图表](https://towardsdatascience.com/testing-the-power-of-multimodal-ai-systems-in-reading-and-interpreting-photographs-maps-charts-and-more/)并从中提取信息？[Luciano
    Abriata](https://towardsdatascience.com/author/lucianosphere/)详细介绍了他们最近取得的进展。
- en: '[Testing the Power of Multimodal AI Systems in Reading and Interpreting Photographs,
    Maps, Charts and More](https://towardsdatascience.com/testing-the-power-of-multimodal-ai-systems-in-reading-and-interpreting-photographs-maps-charts-and-more/)'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[测试多模态人工智能系统在阅读和解释照片、地图、图表等方面的能力](https://towardsdatascience.com/testing-the-power-of-multimodal-ai-systems-in-reading-and-interpreting-photographs-maps-charts-and-more/)'
- en: To [minimize the impact of any data disruptions](https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/),
    follow the practical insights in [Alle Sravani](https://towardsdatascience.com/author/alle-sravani/)‘s
    tutorial on the Tableau Metadata API.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了[最小化任何数据中断的影响](https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/)，请遵循[Alle
    Sravani](https://towardsdatascience.com/author/alle-sravani/)在Tableau元数据API教程中的实用见解。
- en: '[No More Tableau Downtime: Metadata API for Proactive Data Health](https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/)'
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[不再有Tableau停机时间：主动数据健康元数据API](https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/)'
- en: For [product teams to excel in the age of AI](https://towardsdatascience.com/evolving-product-operating-models-in-the-age-of-ai/),
    organizations need to set them up for success; [Chinmay Kakatkar](https://towardsdatascience.com/author/kcpub21/) spells
    out what that entails.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了让[产品团队在人工智能时代脱颖而出](https://towardsdatascience.com/evolving-product-operating-models-in-the-age-of-ai/)，组织需要为他们设定成功的基础；[Chinmay
    Kakatkar](https://towardsdatascience.com/author/kcpub21/)详细说明了这包括哪些内容。
- en: '[Evolving Product Operating Models in the Age of AI](https://towardsdatascience.com/evolving-product-operating-models-in-the-age-of-ai/)'
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在人工智能时代演变的产品运营模式](https://towardsdatascience.com/evolving-product-operating-models-in-the-age-of-ai/)'
- en: Read [Yu Dong](https://towardsdatascience.com/author/ydong029/)‘s walkthrough
    of Google’s Data Science Agent to stay up-to-date with [the latest AI-powered
    tools of the trade](https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/) —
    including both their benefits and shortcomings.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读Yu Dong的[Google数据科学代理的教程](https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/)，以了解[最新的AI工具](https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/)的最新动态——包括它们的优点和缺点。
- en: '[Google’s Data Science Agent: Can It Really Do Your Job?](https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/)'
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Google的数据科学代理：它真的能做你的工作吗？](https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/)'
- en: Who doesn’t love a stats deep dive? We’re thrilled to welcome back [Alejandro
    Alvarez Perez](https://towardsdatascience.com/author/alejandroalvarezprez/), whose [primer
    on the Poisson distribution](https://towardsdatascience.com/mastering-the-poisson-distribution-intuition-and-foundations/) is
    clear, thorough, and beginner-friendly.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 谁不喜欢深入统计学呢？我们很高兴再次欢迎[Alejandro Alvarez Perez](https://towardsdatascience.com/author/alejandroalvarezprez/)回归，他的[泊松分布入门](https://towardsdatascience.com/mastering-the-poisson-distribution-intuition-and-foundations/)清晰、全面且适合初学者。
- en: '[Mastering the Poisson Distribution: Intuition and Foundations](https://towardsdatascience.com/mastering-the-poisson-distribution-intuition-and-foundations/)'
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[掌握泊松分布：直觉和基础](https://towardsdatascience.com/mastering-the-poisson-distribution-intuition-and-foundations/)'
- en: Meet Our New Authors
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'Explore top-notch work from some of our recently added contributors:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 探索我们最近添加的贡献者的一些顶级作品：
- en: '[Daragh Sibley](https://towardsdatascience.com/author/daragh-sibley/) brings
    a wealth of industry experience to his writing—including his debut article on
    organizational models for data teams.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Daragh Sibley](https://towardsdatascience.com/author/daragh-sibley/)将丰富的行业经验带入他的写作中——包括他关于数据团队组织模式的处女作。'
- en: '[Six Organizational Models for Data Science](https://towardsdatascience.com/six-organizational-models-for-data-science/)'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[数据科学六大组织模型](https://towardsdatascience.com/six-organizational-models-for-data-science/)'
- en: '[Anya Korsakova](https://towardsdatascience.com/author/anya-korsakova/)‘s research
    focuses on bioinformatics and genomics, but her new TDS article explores the beauty
    and chaos of attractors in neural network circuits.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Anya Korsakova](https://towardsdatascience.com/author/anya-korsakova/)的研究专注于生物信息学和基因组学，但她的最新TDS文章探讨了神经网络电路中吸引子的美丽与混沌。'
- en: '[Attractors in Neural Network Circuits: Beauty and Chaos](https://towardsdatascience.com/attractors-in-neural-network-circuits-beauty-and-chaos/)'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[神经网络电路中的吸引子：美丽与混沌](https://towardsdatascience.com/attractors-in-neural-network-circuits-beauty-and-chaos/)'
- en: '[Bartek Szubstarski](https://towardsdatascience.com/author/bartek-szubstarski/) joins
    our community with data-processing expertise, which comes handy in his pragmatic
    examination of algorithm protection in the context of federated learning.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Bartek Szubstarski](https://towardsdatascience.com/author/bartek-szubstarski/)凭借数据处理的专业知识加入我们的社区，这在他对联邦学习背景下算法保护的实用考察中非常有用。'
- en: '[Algorithm Protection in the Context of Federated Learning ](https://towardsdatascience.com/algorithm-protection-in-the-context-of-federated-learning/)'
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[联邦学习中的算法保护](https://towardsdatascience.com/algorithm-protection-in-the-context-of-federated-learning/)'
- en: Contribute to TDS
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为TDS贡献力量
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢发布新作者的文章，所以如果你最近撰写了一个有趣的项目演练、教程或对我们核心主题的理论反思，为什么不[与我们分享呢？](https://towardsdatascience.com/questions-96667b06af5/)
- en: '* * *'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
