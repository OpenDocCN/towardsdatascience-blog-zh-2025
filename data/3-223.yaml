  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装
- en: Please, to get a deep insight of how FFmpeg is installed with NVIDIA gpu acceleration,
    follow [these instructions](https://pytorch.org/audio/main/build.ffmpeg.html#enabling-hw-decoder).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 请，要深入了解如何使用 NVIDIA GPU 加速安装 FFmpeg，请遵循 [这些说明](https://pytorch.org/audio/main/build.ffmpeg.html#enabling-hw-decoder)。
