- en: ‘Tis the season for data science teams across industries to crunch numbers,
    deliver annual reports, and plan goals and targets for next year.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: ‘Tis the season for data science teams across industries to crunch numbers,
    deliver annual reports, and plan goals and targets for next year.
- en: 'In other words: it’s the perfect moment to dig into the often-messy world of
    metrics, KPIs, and evaluation methods, where the pitfalls — and the rewards! —
    are many. The top-notch articles we’ve selected for you this week tackle the challenges
    of producing reliable insights and avoiding common mistakes.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说：现在是深入挖掘指标、KPI 和评估方法这个常常混乱的世界的大好时机，这里既有陷阱，也有许多回报。我们本周为您精选的文章探讨了产生可靠见解和避免常见错误挑战。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why AI Alignment Starts With Better Evaluation
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么人工智能对齐从更好的评估开始
- en: What do you do when your LLM tools fail to produce the desired results? Why
    would models perform well on public benchmarks but disappoint once you apply them
    to internal tasks? As Hailey Quach aptly puts it, “alignment genuinely starts
    when you define what matters enough to measure, along with the methods you will
    use to measure it.”
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 当您的 LLM 工具无法产生预期结果时，您会怎么做？为什么模型在公共基准测试中表现良好，但一旦应用到内部任务中就会令人失望？正如 Hailey Quach
    恰到好处地所说，“对齐真正开始于您定义了足够重要的衡量标准，以及您将用于衡量它的方法。”
- en: '[Why AI Alignment Starts With Better Evaluation](https://towardsdatascience.com/why-ai-alignment-starts-with-better-evaluation/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[为什么人工智能对齐从更好的评估开始](https://towardsdatascience.com/why-ai-alignment-starts-with-better-evaluation/)'
- en: 'Metric Deception: When Your Best KPIs Hide Your Worst Failures'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 指标欺骗：当您的最佳 KPI 隐藏了您的最大失败
- en: A key lesson Shafeeq Ur Rahaman drives home in his recent article is that stale
    data and bad code are (relatively) easy to fix; the real risk is having false
    confidence in a system that no longer measures what you’d designed it to track.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Shafeeq Ur Rahaman 在他最近的文章中强调的一个关键教训是，过时数据和糟糕的代码（相对而言）容易修复；真正的风险是过度自信于一个不再衡量您设计其跟踪内容的系统。
- en: '[Metric Deception: When Your Best KPIs Hide Your Worst Failures](https://towardsdatascience.com/metric-deception-when-your-best-kpis-hide-your-worst-failures/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[指标欺骗：当您的最佳 KPI 隐藏了您的最大失败](https://towardsdatascience.com/metric-deception-when-your-best-kpis-hide-your-worst-failures/)'
- en: Everyday Decisions are Noisier Than You Think — Here’s How AI Can Help Fix That
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 每日决策比您想象的更嘈杂——这是人工智能如何帮助修复的方法
- en: Separating signal from noise is perhaps the most essential responsibility of
    all data scientists. As Sean Moran shows in a thorough primer on noise, this is
    often easier said than done — but new tools can help you stay on the right path.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 分离信号与噪声可能是所有数据科学家最重要的责任。正如 Sean Moran 在一篇关于噪声的全面入门文章中所展示的，这通常比说起来容易做起来难——但新工具可以帮助您保持正确的道路。
- en: '[Everyday Decisions are Noisier Than You Think — Here’s How AI Can Help Fix
    That](https://towardsdatascience.com/everyday-decisions-are-noisier-than-you-think-heres-how-ai-can-help-fix-that/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[每日决策比您想象的更嘈杂——这是人工智能如何帮助修复的方法](https://towardsdatascience.com/everyday-decisions-are-noisier-than-you-think-heres-how-ai-can-help-fix-that/)'
