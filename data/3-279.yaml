- en: 'Efficient Metric Collection in PyTorch: Avoiding the Performance Pitfalls of
    TorchMetrics'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: PyTorch 中的高效指标收集：避免 TorchMetrics 的性能陷阱
- en: 原文：[https://towardsdatascience.com/efficient-metric-collection-in-pytorch-avoiding-the-performance-pitfalls-of-torchmetrics/](https://towardsdatascience.com/efficient-metric-collection-in-pytorch-avoiding-the-performance-pitfalls-of-torchmetrics/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/efficient-metric-collection-in-pytorch-avoiding-the-performance-pitfalls-of-torchmetrics/](https://towardsdatascience.com/efficient-metric-collection-in-pytorch-avoiding-the-performance-pitfalls-of-torchmetrics/)
- en: Metric collection is an essential part of every machine learning project, enabling
    us to track model performance and monitor training progress. Ideally, metrics
    should be collected and computed without introducing any additional overhead to
    the training process. However, just like other components of the training loop,
    inefficient metric computation can introduce unnecessary overhead, increase training-step
    times and inflate training costs.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 指标收集是每个机器学习项目的关键部分，使我们能够跟踪模型性能和监控训练进度。理想情况下，指标应该在不引入任何额外开销的情况下收集和计算。然而，就像训练循环的其他组件一样，低效的指标计算可能会引入不必要的开销，增加训练步骤时间并增加训练成本。
- en: This post is the seventh in our series on [performance profiling and optimization
    in PyTorch](https://medium.com/@chaimrand/pytorch-model-performance-analysis-and-optimization-10c3c5822869).
    The series has aimed to emphasize the critical role of performance analysis and
    optimization in machine learning development. Each post has focused on different
    stages of the training pipeline, demonstrating practical tools and techniques
    for analyzing and boosting resource utilization and runtime efficiency.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本文是我们关于 PyTorch 中性能分析和优化系列的第 7 篇。该系列旨在强调性能分析和优化在机器学习开发中的关键作用。每一篇都专注于训练管道的不同阶段，展示了分析和提高资源利用率和运行效率的实用工具和技术。
- en: In this installment, we focus on metric collection. We will demonstrate how
    a naïve implementation of metric collection can negatively impact runtime performance
    and explore tools and techniques for its analysis and optimization.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本篇中，我们专注于指标收集。我们将演示指标收集的简单实现如何对运行时性能产生负面影响，并探讨其分析和优化的工具和技术。
- en: 'To implement our metric collection, we will use [TorchMetrics](https://pypi.org/project/torchmetrics/)
    a popular library designed to simplify and standardize metric computation in PyTorch.
    Our goals will be to:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现我们的指标收集，我们将使用 [TorchMetrics](https://pypi.org/project/torchmetrics/)，这是一个流行的库，旨在简化并标准化
    PyTorch 中的指标计算。我们的目标将是：
- en: '**Demonstrate the runtime overhead** caused by a naïve implementation of metric
    collection.'
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**演示指标收集的运行时开销**。'
- en: '**Use PyTorch Profiler** to pinpoint performance bottlenecks introduced by
    metric computation.'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用 PyTorch Profiler** 确定由指标计算引入的性能瓶颈。'
- en: '**Demonstrate optimization techniques** to reduce metric collection overhead.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**演示优化技术**以减少指标收集的开销。'
- en: To facilitate our discussion, we will define a toy PyTorch model and assess
    how metric collection can impact its runtime performance. We will run our experiments
    on an NVIDIA A40 GPU, with a [PyTorch 2.5.1 docker](https://hub.docker.com/layers/pytorch/pytorch/2.5.1-cuda12.4-cudnn9-devel/images/sha256-14611869895df612b7b07227d5925f30ec3cd6673bad58ce3d84ed107950e014)
    image and [TorchMetrics 1.6.1](https://pypi.org/project/torchmetrics/).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 为了便于讨论，我们将定义一个玩具 PyTorch 模型，并评估指标收集如何影响其运行时性能。我们的实验将在 NVIDIA A40 GPU 上进行，使用
    [PyTorch 2.5.1 docker](https://hub.docker.com/layers/pytorch/pytorch/2.5.1-cuda12.4-cudnn9-devel/images/sha256-14611869895df612b7b07227d5925f30ec3cd6673bad58ce3d84ed107950e014)
    镜像和 [TorchMetrics 1.6.1](https://pypi.org/project/torchmetrics/)。
- en: It’s important to note that metric collection behavior can vary greatly depending
    on the hardware, runtime environment, and model architecture. The code snippets
    provided in this post are intended for demonstrative purposes only. Please do
    not interpret our mention of any tool or technique as an endorsement for its use.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，指标收集的行为可能因硬件、运行时环境和模型架构而大不相同。本文中提供的代码片段仅用于演示目的。请勿将我们对任何工具或技术的提及解释为对其使用的认可。
- en: Toy Resnet Model
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 玩具 Resnet 模型
- en: In the code block below we define a simple image classification model with a
    [ResNet-18](https://pytorch.org/vision/main/models/generated/torchvision.models.resnet18)
    backbone.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的代码块中，我们定义了一个简单的图像分类模型，其骨干网络为 [ResNet-18](https://pytorch.org/vision/main/models/generated/torchvision.models.resnet18)。
- en: '[PRE0]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: We define a synthetic dataset which we will use to train our toy model.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们定义了一个合成数据集，我们将用它来训练我们的玩具模型。
- en: '[PRE1]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We define a collection of standard metrics from TorchMetrics, along with a control
    flag to enable or disable metric calculation.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们定义了来自 TorchMetrics 的一组标准指标，以及一个控制标志来启用或禁用指标计算。
- en: '[PRE2]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Next, we define a [PyTorch Profiler](https://pytorch.org/tutorials/recipes/recipes/profiler_recipe.html)
    instance, along with a control flag that allows us to enable or disable profiling.
    For a detailed tutorial on using PyTorch Profiler, please refer to the [first
    post](https://medium.com/towards-data-science/pytorch-model-performance-analysis-and-optimization-10c3c5822869)
    in this series.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们定义了一个 [PyTorch Profiler](https://pytorch.org/tutorials/recipes/recipes/profiler_recipe.html)
    实例，以及一个控制标志，允许我们启用或禁用分析。有关使用 PyTorch Profiler 的详细教程，请参阅本系列的[第一篇文章](https://medium.com/towards-data-science/pytorch-model-performance-analysis-and-optimization-10c3c5822869)。
- en: '[PRE3]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Lastly, we define a standard training step:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们定义了一个标准的训练步骤：
- en: '[PRE4]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Metric Collection Overhead
  id: totrans-22
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 指标收集开销
- en: To measure the impact of metric collection on training step time, we ran our
    training script both with and without metric calculation. The results are summarized
    in the following table.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测量指标收集对训练步骤时间的影响，我们在有和无指标计算的情况下分别运行了我们的训练脚本。结果总结在以下表格中。
- en: '![](../Images/a8e687dcead4ff1a47fb81479d48da00.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a8e687dcead4ff1a47fb81479d48da00.png)'
- en: The Overhead of Naive Metric Collection (by Author)
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 简单指标收集的开销（作者）
- en: Our naïve metric collection resulted in a nearly 10% drop in runtime performance!!
    While metric collection is essential for machine learning development, it usually
    involves relatively simple mathematical operations and hardly warrants such a
    significant overhead. What is going on?!!
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们简单的指标收集导致了运行时性能下降了近 10%！！虽然指标收集对于机器学习开发至关重要，但它通常涉及相对简单的数学运算，几乎不值得产生如此大的开销。发生了什么？！！
- en: Identifying Performance Issues with PyTorch Profiler
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 PyTorch Profiler 识别性能问题
- en: 'To better understand the source of the performance degradation, we reran the
    training script with the PyTorch Profiler enabled. The resultant trace is shown
    below:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解性能下降的原因，我们重新运行了训练脚本，并开启了 PyTorch Profiler。生成的跟踪结果如下所示：
- en: '![](../Images/04dd80ade5f5d9856ac99d37319ac429.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/04dd80ade5f5d9856ac99d37319ac429.png)'
- en: Trace of Metric Collection Experiment (by Author)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 指标收集实验跟踪（作者）
- en: 'The trace reveals recurring “cudaStreamSynchronize” operations that coincide
    with noticeable drops in GPU utilization. These types of “CPU-GPU sync” events
    were discussed in detail in [part two](https://medium.com/towards-data-science/pytorch-model-performance-analysis-and-optimization-part-2-3bc241be91)
    of our series. In a typical training step, the CPU and GPU work in parallel: The
    CPU manages tasks like data transfers to the GPU and kernel loading, and the GPU
    executes the model on the input data and updates its weights. Ideally, we would
    like to minimize the points of synchronization between the CPU and GPU in order
    to maximize performance. Here, however, we can see that the metric collection
    has triggered a sync event by performing a CPU to GPU data copy. This requires
    the CPU to suspend its processing until the GPU catches up which, in turn, causes
    the GPU to wait for the CPU to resume loading the subsequent kernel operations.
    The bottom line is that these synchronization points lead to inefficient utilization
    of both the CPU and GPU. Our metric collection implmentation adds eight such synchronization
    events to each training step.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪结果显示，与 GPU 利用率明显下降同时发生的“cudaStreamSynchronize”操作是反复出现的。这类“CPU-GPU 同步”事件在我们的系列文章的第二部分中进行了详细讨论。在典型的训练步骤中，CPU
    和 GPU 并行工作：CPU 管理诸如将数据传输到 GPU 和内核加载等任务，而 GPU 在输入数据上执行模型并更新其权重。理想情况下，我们希望最小化 CPU
    和 GPU 之间的同步点以最大化性能。然而，在这里我们可以看到，指标收集通过执行 CPU 到 GPU 的数据复制触发了同步事件。这需要 CPU 暂停其处理，直到
    GPU 赶上进度，反过来又导致 GPU 等待 CPU 继续加载后续的内核操作。结果是，这些同步点导致 CPU 和 GPU 的效率低下。我们的指标收集实现为每个训练步骤增加了八个这样的同步事件。
- en: A closer examination of the trace shows that the sync events are coming from
    the [update](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L547)
    call of the [MeanMetric](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L494)
    TorchMetric. For the experienced profiling expert, this may be sufficient to identify
    the root cause, but we will go a step further and use the [torch.profiler.record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler)
    utility to identify the exact offending line of code.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细检查追踪结果，我们发现同步事件来自[MeanMetric](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L494)TorchMetric的[update](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L547)调用。对于经验丰富的性能分析专家，这可能足以识别根本原因，但我们将更进一步，使用[torch.profiler.record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler)实用工具来识别确切的错误代码行。
- en: Profiling with [record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler)
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用[record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler)进行性能分析
- en: To pinpoint the exact source of the sync event, we extended the [MeanMetric](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L494)
    class and overrode the [update](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L547)
    method using [record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler)
    context blocks. This approach allows us to profile individual operations within
    the method and identify performance bottlenecks.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 为了精确定位同步事件的来源，我们扩展了[MeanMetric](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L494)类，并使用[record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler)上下文块覆盖了[update](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L547)方法。这种方法使我们能够对方法中的单个操作进行性能分析，并识别性能瓶颈。
- en: '[PRE5]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: We then updated our avg_loss metric to use the newly created ProfileMeanMetric
    and reran the training script.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们随后更新了我们的avg_loss指标，使用新创建的ProfileMeanMetric，并重新运行了训练脚本。
- en: '![](../Images/e9a380dd2347c4b877f017ea3ad0008b.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e9a380dd2347c4b877f017ea3ad0008b.png)'
- en: Trace of Metric Collection with [record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler)
    (by Author)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 使用[record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler)进行指标收集的追踪（作者）
- en: 'The updated trace reveals that the sync event originates from the following
    line:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 更新的追踪结果显示，同步事件起源于以下行：
- en: '[PRE6]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: This operation converts the default scalar value `weight=1.0` into a PyTorch
    tensor and places it on the GPU. The sync event occurs because this action triggers
    a CPU-to-GPU data copy, which requires the CPU to wait for the GPU to process
    the copied value.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 此操作将默认标量值`weight=1.0`转换为PyTorch张量，并将其放置在GPU上。同步事件发生是因为此操作触发了CPU到GPU的数据复制，这需要CPU等待GPU处理复制的值。
- en: 'Optimization 1: Specify Weight Value'
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化1：指定权重值
- en: 'Now that we have found the source of the issue, we can overcome it easily by
    specifying a *weight* value in our *update* call. This prevents the runtime from
    converting the default scalar `weight=1.0` into a tensor on the GPU, avoiding
    the sync event:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经找到了问题的来源，我们可以通过在*update*调用中指定*weight*值来轻松克服它。这防止了运行时将默认标量`weight=1.0`转换为GPU上的张量，从而避免了同步事件：
- en: '[PRE7]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Rerunning the script after applying this change reveals that we have succeeded
    in eliminating the initial sync event… only to have uncovered a new one, this
    time coming from the [_cast_and_nan_check_input](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L76)
    function:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 应用此更改后重新运行脚本，我们发现我们已经成功地消除了初始的同步事件……然而，我们又发现了新的一个，这次来自[_cast_and_nan_check_input](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L76)函数：
- en: '![](../Images/fb8b0d8b32cc2c4953a96605fcf5d602.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fb8b0d8b32cc2c4953a96605fcf5d602.png)'
- en: Trace of Metric Collection following Optimization 1 (by Author)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 优化1后的指标收集追踪（作者）
- en: Profiling with [record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler) — Part 2
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用[record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler)进行性能分析——第二部分
- en: To explore our new sync event, we extended our custom metric with additional
    profiling probes and reran our script.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为了探索我们新的同步事件，我们扩展了我们的自定义指标，添加了额外的性能分析探针，并重新运行了脚本。
- en: '[PRE8]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'The resultant trace is captured below:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 最终的追踪结果如下：
- en: '![](../Images/f66bf82f1ce79a43046cb9bcde7f4a09.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f66bf82f1ce79a43046cb9bcde7f4a09.png)'
- en: Trace of Metric Collection with [record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler) — part
    2 (by Author)
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 [record_function](https://pytorch.org/tutorials/beginner/profiler.html#performance-debugging-using-profiler)
    的指标收集跟踪——第二部分（作者）
- en: 'The trace points directly to the offending line:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪点直接指向有问题的代码行：
- en: '[PRE9]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: This operation checks for `NaN` values in the input tensors, but it introduces
    a costly CPU-GPU synchronization event because the operation involves copying
    data from the GPU to the CPU.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这个操作检查输入张量中的 `NaN` 值，但它引入了一个昂贵的 CPU-GPU 同步事件，因为该操作涉及从 GPU 到 CPU 的数据复制。
- en: Upon a closer inspection of the TorchMetric [BaseAggregator](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L31)
    class, we find several options for handling NAN value updates, all of which pass
    through the offending line of code. However, for our use case — calculating the
    average loss metric — this check is unnecessary and does not justify the runtime
    performance penalty.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在仔细检查 TorchMetric 的 [BaseAggregator](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L31)
    类后，我们发现有几个选项可以处理 NAN 值更新，所有这些选项都会通过有问题的代码行。然而，对于我们的用例——计算平均损失指标——这个检查是不必要的，也不足以证明运行时性能的惩罚。
- en: 'Optimization 2: Disable NAN Value Checks'
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化 2：禁用 NAN 值检查
- en: To eliminate the overhead, we propose disabling the `NaN` value checks by overriding
    the `_cast_and_nan_check_input` function. Instead of a static override, we implemented
    a dynamic solution that can be applied flexibly to any descendants of the [BaseAggregator](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L31)
    class.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 为了消除开销，我们提出通过覆盖 `_cast_and_nan_check_input` 函数来禁用 `NaN` 值检查。而不是静态覆盖，我们实现了一个灵活的动态解决方案，可以应用于
    [BaseAggregator](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L31)
    类的任何后代。
- en: '[PRE10]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Post Optimization Results: Success
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化后结果：成功
- en: After implementing the two optimizations — specifying the weight value and disabling
    the `NaN` checks—we find the step time performance and the GPU utilization to
    match those of our baseline experiment. In addition, the resultant PyTorch Profiler
    trace shows that all of the added “cudaStreamSynchronize” events that were associated
    with the metric collection, have been eliminated. With a few small changes, we
    have reduced the cost of training by ~10% without any changes to the behavior
    of the metric collection.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在实施这两个优化——指定权重值和禁用 `NaN` 检查后，我们发现步骤时间性能和 GPU 利用率与我们的基线实验相匹配。此外，生成的 PyTorch Profiler
    跟踪显示，与指标收集相关联的所有添加的“cudaStreamSynchronize”事件都已消除。通过一些小的改动，我们没有改变指标收集的行为，却将训练成本降低了约
    10%。
- en: In the next section we will explore an additional Metric collection optimization.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨额外的指标收集优化。
- en: 'Example 2: Optimizing Metric Device Placement'
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例 2：优化指标设备放置
- en: In the previous section, the metric values resided on the GPU, making it logical
    to store and compute the metrics on the GPU. However, in scenarios where the values
    we wish to aggregate reside on the CPU, it might be preferable to store the metrics
    on the CPU to avoid unnecessary device transfers.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，指标值位于 GPU 上，因此存储和计算指标在 GPU 上是合理的。然而，在我们要聚合的值位于 CPU 上的场景中，可能更倾向于在 CPU
    上存储指标，以避免不必要的设备传输。
- en: 'In the code block below, we modify our script to calculate the average step
    time using a [MeanMetric](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L494)
    on the CPU. This change has no impact on the runtime performance of our training
    step:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的代码块中，我们修改了我们的脚本，使用 [MeanMetric](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L494)
    在 CPU 上计算平均步骤时间。这个更改对我们的训练步骤的运行时性能没有影响：
- en: '[PRE11]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'The problem arises when we attempt to extend our script to support distributed
    training. To demonstrate the problem, we modified our model definition to use
    [DistributedDataParallel (DDP)](https://pytorch.org/tutorials/intermediate/ddp_tutorial.html):'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们尝试扩展我们的脚本以支持分布式训练时，问题出现了。为了展示这个问题，我们修改了我们的模型定义，以使用 [DistributedDataParallel
    (DDP)](https://pytorch.org/tutorials/intermediate/ddp_tutorial.html)：
- en: '[PRE12]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'The DDP modification results in the following error:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: DDP 修改导致以下错误：
- en: '[PRE13]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: By default, metrics in distributed training are programmed to synchronize across
    all devices in use. However, the synchronization backend used by DDP does not
    support metrics stored on the CPU.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，分布式训练中的度量被编程为跨所有使用的设备进行同步。然而，DDP使用的同步后端不支持存储在CPU上的度量。
- en: 'One way to solve this is to disable the cross-device metric synchronization:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这个问题的一种方法是不启用跨设备度量同步：
- en: '[PRE14]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'In our case, where we are measuring the average time, this solution is acceptable.
    However, in some cases, the metric synchronization is essential, and we have may
    have no choice but to move the metric onto the GPU:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们测量平均时间的情况下，这个解决方案是可以接受的。然而，在某些情况下，度量同步是必不可少的，我们可能别无选择，只能将度量移动到GPU上：
- en: '[PRE15]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Unfortunately, this situation gives rise to a new CPU-GPU sync event coming
    from the [update](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L547)
    function.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，这种情况导致了来自[update](https://github.com/Lightning-AI/torchmetrics/blob/v1.6.1/src/torchmetrics/aggregation.py#L547)函数的新CPU-GPU同步事件。
- en: '![](../Images/4658e71a147050c34ced0d373c00c6b2.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4658e71a147050c34ced0d373c00c6b2.png)'
- en: Trace of avg_time Metric Collection (by Author)
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: avg_time度量收集的跟踪（作者）
- en: This sync event should hardly come as a surprise—after all, we are updating
    a GPU metric with a value residing on the CPU, which should necessitate a memory
    copy. However, in the case of a scalar metric, this data transfer can be completely
    avoided with a simple optimization.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这个同步事件几乎不会让人感到惊讶——毕竟，我们正在用位于CPU上的值更新GPU度量，这应该需要内存复制。然而，在标量度量的情况下，这种数据传输可以通过简单的优化完全避免。
- en: 'Optimization 3: Perform Metric Updates with Tensors instead of Scalars'
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化3：使用Tensor而不是标量执行度量更新
- en: 'The solution is straightforward: instead of updating the metric with a float
    value, we convert to a Tensor before calling `update`.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案很简单：在调用`update`之前，我们不是用浮点值更新度量，而是将其转换为Tensor。
- en: '[PRE16]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: This minor change bypasses the problematic line of code, eliminates the sync
    event, and restores the step time to the baseline performance.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这个小小的改动绕过了有问题的代码行，消除了同步事件，并将步骤时间恢复到基线性能。
- en: 'At first glance, this result may seem surprising: We would expect that updating
    a GPU metric with a CPU tensor should still require a memory copy. However, PyTorch
    optimizes operations on scalar tensors by using a dedicated kernel that performs
    the addition without an explicit data transfer. This avoids the expensive synchronization
    event that would otherwise occur.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 初看这个结果可能会觉得惊讶：我们本以为用CPU Tensor更新GPU度量仍然需要内存复制。然而，PyTorch通过使用一个执行加法而不进行显式数据传输的专用内核来优化标量Tensor的操作。这避免了否则会发生的高昂的同步事件。
- en: Summary
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this post, we explored how a naïve approach to TorchMetrics can introduce
    CPU-GPU synchronization events and significantly degrade PyTorch training performance.
    Using PyTorch Profiler, we identified the lines of code responsible for these
    sync events and applied targeted optimizations to eliminate them:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了简单的方法如何引入CPU-GPU同步事件，并显著降低PyTorch训练性能。使用PyTorch Profiler，我们确定了导致这些同步事件的代码行，并应用了有针对性的优化来消除它们：
- en: Explicitly specify a weight tensor when calling the `MeanMetric.update` function
    instead of relying on the default value.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在调用`MeanMetric.update`函数时，明确指定一个权重Tensor，而不是依赖默认值。
- en: Disable NaN checks in the base `Aggregator` class or replace them with a more
    efficient alternative.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在基`Aggregator`类中禁用NaN检查，或用更有效的替代方案替换它们。
- en: Carefully manage the device placement of each metric to minimize unnecessary
    transfers.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仔细管理每个度量的设备放置，以最小化不必要的传输。
- en: Disable cross-device metric synchronization when not required.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当不需要时，禁用跨设备度量同步。
- en: When the metric resides on a GPU, convert floating-point scalars to tensors
    before passing them to the `update` function to avoid implicit synchronization.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当度量位于GPU上时，在将它们传递给`update`函数之前，将浮点标量转换为Tensor，以避免隐式同步。
- en: We have created a dedicated [pull request](https://github.com/Lightning-AI/torchmetrics/pull/2943)
    on the [TorchMetrics github](https://github.com/Lightning-AI/torchmetrics/tree/master)
    page covering some of the optimizations discussed in this post. Please feel free
    to contribute your own improvements and optimizations!
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在[TorchMetrics github](https://github.com/Lightning-AI/torchmetrics/tree/master)页面上创建了一个专门的[pull
    request](https://github.com/Lightning-AI/torchmetrics/pull/2943)，涵盖了一些本文中讨论的优化。请随时贡献您自己的改进和优化！
