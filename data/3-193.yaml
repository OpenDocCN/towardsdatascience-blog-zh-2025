- en: 'CPTR Paper Walkthrough: Image Captioning, Transformer Mode On'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: CPTR 论文解读：图像描述，Transformer 模式开启
- en: 原文：[https://towardsdatascience.com/image-captioning-transformer-mode-on/](https://towardsdatascience.com/image-captioning-transformer-mode-on/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/image-captioning-transformer-mode-on/](https://towardsdatascience.com/image-captioning-transformer-mode-on/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: In my previous article, I discussed one of the earliest deep learning approaches
    for image captioning. If you’re interested in reading it, you can find the link
    to that article at the end of this one.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在我之前的一篇文章中，我讨论了图像描述的早期深度学习方法之一。如果您感兴趣，可以在本文末尾找到该文章的链接。
- en: 'Today, I would like to talk about image captioning again, but this time with
    the more advanced neural network architecture. The deep learning I am going to
    talk about is the one proposed in the paper titled “*CPTR: Full Transformer Network
    for Image Captioning*,” written by Liu *et al.* back in 2021 [1]. Specifically,
    here I will reproduce the model proposed in the paper and explain the underlying
    theory behind the architecture. However, keep in mind that I won’t actually demonstrate
    the training process since I only want to focus on the model architecture.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我想再次谈谈图像描述，但这次是关于更先进的神经网络架构。我将要讨论的深度学习是 2021 年 Liu 等人撰写的题为“*CPTR：图像描述的全 Transformer
    网络*”的论文中提出的 [1]。具体来说，这里我将重现论文中提出的模型，并解释架构背后的理论。然而，请注意，我实际上不会演示训练过程，因为我只想关注模型架构。
- en: The idea behind CPTR
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: CPTR 的理念
- en: 'In fact, the main idea of the CPTR architecture is exactly the same as the
    earlier image captioning model, as both use the encoder-decoder structure. Previously,
    in the paper titled “*Show and Tell: A Neural Image Caption Generator*” [2], the
    models used are GoogLeNet (a.k.a. Inception V1) and LSTM for the two components,
    respectively. The illustration of the model proposed in the *Show and Tell* paper
    is shown in the following figure.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，CPTR 架构的主要思想与早期的图像描述模型完全相同，因为两者都使用编码器-解码器结构。在之前题为“*Show and Tell：一种神经图像描述生成器*”的论文
    [2] 中，分别使用 GoogLeNet（又名 Inception V1）和 LSTM 作为两个组件。*Show and Tell* 论文中提出的模型示意图如下所示。
- en: '![](../Images/701dbaa23ba69021ca022542f50d2248.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/701dbaa23ba69021ca022542f50d2248.png)'
- en: Figure 1\. The neural network architecture for image captioning proposed in
    the Show and Tell paper [2].
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1. Show and Tell 论文中提出的图像描述神经网络架构 [2]。
- en: 'Despite having the same encoder-decoder structure, what makes CPTR different
    from the previous approach is the basis of the encoder and the decoder themselves.
    In CPTR, we combine the encoder part of the ViT (Vision Transformer) model with
    the decoder part of the original Transformer model. The use of transformer-based
    architecture for both components is essentially where the name CPTR comes from:
    CaPtion TransformeR.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管具有相同的编码器-解码器结构，但使 CPTR 与先前方法不同的地方在于编码器和解码器本身的基础。在 CPTR 中，我们将 ViT（视觉Transformer）模型的编码器部分与原始
    Transformer 模型的解码器部分结合起来。两个组件都使用基于 Transformer 的架构，这正是 CPTR 名称的由来：CaPtion TransformeR。
- en: Note that the discussions in this article are going to be highly related to
    ViT and Transformer, so I highly recommend you read my previous article about
    these two topics if you’re not yet familiar with them. You can find the links
    at the end of this article.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，本文的讨论将与 ViT 和 Transformer 高度相关，所以我强烈建议您阅读我之前关于这两个主题的文章，如果您还不熟悉它们。您可以在文章末尾找到链接。
- en: Figure 2 shows what the original ViT architecture looks like. Everything inside
    the green box is the encoder part of the architecture to be adopted as the CPTR
    encoder.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2 显示了原始 ViT 架构的外观。绿色框内的一切都是将被采用作为 CPTR 编码器的架构编码器部分。
- en: '![](../Images/ca1d9665d4e6e863e0d4395510a850c5.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ca1d9665d4e6e863e0d4395510a850c5.png)'
- en: Figure 2\. The Vision Transformer (ViT) architecture [3].
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2. 视觉 Transformer (ViT) 架构 [3]。
- en: Next, Figure 3 displays the original Transformer architecture. The components
    enclosed in the blue box are the layers that we are going to implement in the
    CPTR decoder.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，图 3 显示了原始 Transformer 架构。蓝色框内的组件是我们将在 CPTR 解码器中实现的层。
- en: '![](../Images/6eab064ab1493949da83623b1895cddd.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6eab064ab1493949da83623b1895cddd.png)'
- en: Figure 3\. The original Transformer architecture [4].
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3. 原始 Transformer 架构 [4]。
- en: If we combine the components inside the green and blue boxes above, we are going
    to obtain the architecture shown in Figure 4 below. This is exactly what the CPTR
    model we are going to implement looks like. The idea here is that the ViT Encoder
    (green) works by encoding the input image into a specific tensor representation
    which will then be used as the basis of the Transformer Decoder (blue) to generate
    the corresponding caption.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将上面绿色和蓝色框内的组件组合起来，我们将得到下面图4所示的架构。这正是我们将要实现的CPTR模型的样子。这里的想法是，ViT编码器（绿色）通过将输入图像编码成特定的张量表示来工作，然后这个表示将被用作Transformer解码器（蓝色）的基础，以生成相应的标题。
- en: '![](../Images/ed6f1281fe1edf98611f7a16b74ff6f7.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ed6f1281fe1edf98611f7a16b74ff6f7.png)'
- en: Figure 4\. The CPTR architecture [5].
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图4. CPTR架构[5]。
- en: That’s pretty much everything you need to know for now. I’ll explain more about
    the details as we go through the implementation.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这基本上就是你现在需要知道的所有内容。随着我们逐步实现，我会解释更多关于细节的内容。
- en: Module imports & parameter configuration
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模块导入与参数配置
- en: As always, the first thing we need to do in the code is to import the required
    modules. In this case, we only import torch and torch.nn since we are about to
    implement the model from scratch.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 和往常一样，在代码中我们首先需要做的是导入所需的模块。在这个例子中，我们只导入了torch和torch.nn，因为我们即将从头开始实现模型。
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Next, we are going to initialize some parameters in Codeblock 2\. If you have
    read my previous article about image captioning with GoogLeNet and LSTM, you’ll
    notice that here, we got a lot more parameters to initialize. In this article,
    I want to reproduce the CPTR model as closely as possible to the original one,
    so the parameters mentioned in the paper will be used in this implementation.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将在Codeblock 2中初始化一些参数。如果你阅读过我之前关于使用GoogLeNet和LSTM进行图像标题生成的文章，你会注意到这里，我们需要初始化更多的参数。在这篇文章中，我想要尽可能忠实地重现CPTR模型，因此将使用论文中提到的参数来实现。
- en: '[PRE1]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The first parameter I want to explain is the `BATCH_SIZE`, which is written
    at the line marked with `#(1)`. The number assigned to this variable is not quite
    important in our case since we are not actually going to train this model. This
    parameter is set to 1 because, by default, PyTorch treats input tensors as a batch
    of samples. Here I assume that we only have a single sample in a batch.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我要解释的第一个参数是`BATCH_SIZE`，它位于标记为`#(1)`的行上。在这个案例中，这个变量的数值并不重要，因为我们实际上不会训练这个模型。这个参数被设置为1，因为默认情况下，PyTorch将输入张量视为一个样本批次。在这里，我假设批次中只有一个样本。
- en: Next, remember that in the case of image captioning we are dealing with images
    and texts simultaneously. This essentially means that we need to set the parameters
    for the two. It is mentioned in the paper that the model accepts an RGB image
    of size 384×384 for the encoder input. Hence, we assign the values for `IMAGE_SIZE`
    and `IN_CHANNELS` variables based on this information (`#(2)` and `#(3)`). On
    the other hand, the paper does not mention the parameters for the captions. So,
    here I assume that the length of the caption is no more than 30 words (`#(4)`),
    with the vocabulary size estimated at 10000 unique words (`#(5)`).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，记住在图像标题生成的案例中，我们同时处理图像和文本。这本质上意味着我们需要为这两个设置参数。论文中提到，模型接受大小为384×384的RGB图像作为编码器的输入。因此，我们根据这个信息为`IMAGE_SIZE`和`IN_CHANNELS`变量赋值（`#(2)`和`#(3)`）。另一方面，论文没有提到标题的参数。所以，我假设标题的长度不超过30个单词（`#(4)`），词汇量估计为10000个独特的单词（`#(5)`）。
- en: The remaining parameters are related to the model configuration. Here we set
    the `EMBED_DIM` variable to 768 (`#(6)`). In the encoder side, this number indicates
    the length of the feature vector that represents each 16×16 image patch (`#(7)`).
    The same concept also applies to the decoder side, but in that case the feature
    vector will represent a single word in the caption. Talking more specifically
    about the `PATCH_SIZE` parameter, we are going to use the value to compute the
    total number of patches in the input image. Since the image has the size of 384×384,
    there will be 576 patches in total (`#(8)`).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 剩余的参数与模型配置相关。在这里，我们将`EMBED_DIM`变量设置为768（`#(6)`）。在编码器一侧，这个数字表示代表每个16×16图像补丁的特征向量的长度（`#(7)`）。同样的概念也适用于解码器一侧，但在这个情况下，特征向量将代表标题中的一个单词。更具体地说，关于`PATCH_SIZE`参数，我们将使用这个值来计算输入图像中的补丁总数。由于图像的大小为384×384，总共有576个补丁（`#(8)`）。
- en: When it comes to using an encoder-decoder architecture, it is possible to specify
    the number of encoder and decoder blocks to be used. Using more blocks typically
    allows the model to perform better in terms of the accuracy, yet in return, it
    will require more computational power. The authors of this paper decided to stack
    12 encoder blocks (`#(9)`) and 4 decoder blocks (`#(10)`). Next, since CPTR is
    a transformer-based model, it is necessary to specify the number of attention
    heads within the attention blocks inside the encoders and the decoders, which
    in this case authors use 12 attention heads (`#(11)`). The value for the `HIDDEN_DIM`
    parameter is not mentioned anywhere in the paper. However, according to the ViT
    and the Transformer paper, this parameter is configured to be 4 times larger than
    `EMBED_DIM` (`#(12)`). The dropout rate is not mentioned in the paper either.
    Hence, I arbitrarily set `DROP_PROB` to 0.1 (`#(13)`).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到使用编码器-解码器架构时，可以指定要使用的编码器和解码器块的数量。使用更多的块通常可以使模型在准确性方面表现更好，但作为回报，它将需要更多的计算能力。本文的作者决定堆叠12个编码器块（`#(9)`）和4个解码器块（`#(10)`）。接下来，由于CPTR是一个基于transformer的模型，有必要在编码器和解码器中的注意力块内指定注意力头的数量，在这种情况下，作者使用了12个注意力头（`#(11)`）。`HIDDEN_DIM`参数的值在论文中未提及。然而，根据ViT和Transformer论文，该参数被配置为是`EMBED_DIM`的4倍（`#(12)`）。论文中也没有提到dropout率。因此，我任意地将`DROP_PROB`设置为0.1（`#(13)`）。
- en: Encoder
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编码器
- en: As the modules and parameters have been set up, now that we will get into the
    encoder part of the network. In this section we are going to implement and explain
    every single component inside the green box in Figure 4 one by one.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在模块和参数已经设置好的情况下，我们现在将进入网络的编码器部分。在本节中，我们将逐个实现和解释图4中绿色框内的每一个组件。
- en: Patch embedding
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 块嵌入
- en: '![](../Images/fa0536c1742e801e7f84cedc2ea90234.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fa0536c1742e801e7f84cedc2ea90234.png)'
- en: Figure 5\. Dividing the input image into patches and converting them into vectors
    [5].
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图5. 将输入图像分割成块并将其转换为向量 [5]。
- en: You can see in Figure 5 above that the first step to be done is dividing the
    input image into patches. This is essentially done because instead of focusing
    on local patterns like CNNs, ViT captures global context by learning the relationships
    between these patches. We can model this process with the `Patcher` class shown
    in the Codeblock 3 below. For the sake of simplicity, here I also include the
    process inside the *patch embedding* block within the same class.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在上面的图5中看到，首先要进行的步骤是将输入图像分割成块。这本质上是因为与关注局部模式如CNN不同，ViT通过学习这些块之间的关系来捕捉全局上下文。我们可以使用下面的代码块3中显示的`Patcher`类来模拟这个过程。为了简化，我在同一个类中也包括了*块嵌入*块内的过程。
- en: '[PRE2]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The patching itself is done using the `nn.Unfold` layer (`#(1)`). Here we need
    to set both the `kernel_size` and `stride` parameters to `PATCH_SIZE (16)` so
    that the resulting patches do not overlap with each other. This layer also automatically
    flattens these patches once it is applied to the input image. Meanwhile, the `nn.Linear
    layer` (`#(2)`) is employed to perform linear projection, i.e., the process done
    by the *patch embedding* block. By setting the `out_features` parameter to `EMBED_DIM`,
    this layer will map every single flattened patch into a feature vector of length
    768.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 块分割本身是通过使用`nn.Unfold`层（`#(1)`）完成的。在这里，我们需要将`kernel_size`和`stride`参数都设置为`PATCH_SIZE
    (16)`，以确保生成的块之间不重叠。这个层在应用于输入图像后也会自动将这些块展平。同时，`nn.Linear layer`（`#(2)`）被用来执行线性投影，即*块嵌入*块所执行的过程。通过将`out_features`参数设置为`EMBED_DIM`，这个层将每个展平的块映射成一个长度为768的特征向量。
- en: The entire process should make more sense once you read the `forward()` method.
    You can see at line `#(3)` in the same codeblock that the input image is directly
    processed by the unfold layer. Next, we need to process the resulting tensor with
    the `permute()` method (`#(4)`) to swap the first and the second axis before feeding
    it to the `linear_projection` layer (`#(5)`). Additionally, here I also print
    out the tensor dimension after each layer so that you can better understand the
    transformation made at each step.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 读取`forward()`方法后，整个过程应该会更加清晰。你可以在相同的代码块中看到，在行`#(3)`中，输入图像直接被 unfold 层处理。接下来，我们需要使用`permute()`方法（`#(4)`）处理生成的张量，在将其馈送到`linear_projection`层（`#(5)`）之前交换第一和第二轴。此外，我在每个层之后打印出张量的维度，以便你更好地理解每一步所做的转换。
- en: In order to check if our `Patcher` class works properly, we can just pass a
    dummy tensor through the network. Look at the Codeblock 4 below to see how I do
    it.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检查我们的`Patcher`类是否正常工作，我们可以通过网络传递一个虚拟张量。请看下面的代码块4，看看我是如何做到这一点的。
- en: '[PRE3]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The tensor I passed above represents an RGB image of size 384×384\. Here we
    can see that after the unfold operation is performed, the tensor dimension changed
    to 1×768×576 (`#(1)`), denoting the flattened 3×16×16 patch for each of the 576
    patches. Unfortunately, this output shape does not match what we need. Remember
    that in ViT, we perceive image patches as a sequence, so we need to swap the 1st
    and 2nd axes because typically, the 1st dimension of a tensor represents the temporal
    axis, while the 2nd one represents the feature vector of each timestep. As the
    `permute()` operation is performed, our tensor is now having the dimension of
    1×576×768 (`#(2)`). Lastly, we pass this tensor through the linear projection
    layer, which the resulting tensor shape remains the same since we set the `EMBED_DIM`
    parameter to the same size (768) (`#(3)`). Despite having the same dimension,
    the information contained in the final tensor should be richer thanks to the transformation
    applied by the trainable weights of the linear projection layer.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我传递的张力表示一个384×384大小的RGB图像。在这里我们可以看到，在执行展开操作后，张量维度变为1×768×576（`#(1)`），表示每个576个补丁的3×16×16展平补丁。不幸的是，这个输出形状与我们需要的形状不匹配。记住，在ViT中，我们将图像补丁视为一个序列，因此我们需要交换第1轴和第2轴，因为通常张量的第1维代表时间轴，而第2维代表每个时间步的特征向量。当执行`permute()`操作时，我们的张量现在具有1×576×768的维度（`#(2)`）。最后，我们通过线性投影层传递这个张量，由于我们将`EMBED_DIM`参数设置为相同的大小（768），所以结果张量的形状保持不变（`#(3)`）。尽管维度相同，但最终张量包含的信息应该更加丰富，这要归功于线性投影层的可训练权重所应用的转换。
- en: Learnable positional embedding
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可学习位置嵌入
- en: '![](../Images/39d8a98ab416dc84972473fbf6f34544.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/39d8a98ab416dc84972473fbf6f34544.png)'
- en: Figure 6\. Injecting the learnable positional embeddings into the embedded image
    patches [5].
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图6. 将可学习的位置嵌入注入到嵌入图像补丁中 [5]。
- en: After the input image has successfully been converted into a sequence of patches,
    the next thing to do is to inject the so-called *positional embedding* tensor.
    This is essentially done because a transformer without positional embedding is
    permutation-invariant, meaning that it treats the input sequence as if their order
    does not matter. Interestingly, since an image is not a literal sequence, we should
    set the positional embedding to be *learnable* such that it will be able to somewhat
    reorder the patch sequence that it thinks works best in representing the spatial
    information. However, keep in mind that the term “reordering” here does not mean
    that we physically rearrange the sequence. Rather, it does so by adjusting the
    embedding weights.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在成功将输入图像转换为补丁序列之后，接下来要做的事情是将所谓的*位置嵌入*张量注入进去。这基本上是因为一个没有位置嵌入的转换器是对称不变的，这意味着它将输入序列视为顺序不重要。有趣的是，由于图像不是字面上的序列，我们应该将位置嵌入设置为*可学习的*，这样它就能在一定程度上重新排列它认为在表示空间信息方面最好的补丁序列。然而，请记住，这里的“重新排列”并不意味着我们物理上重新排列序列。相反，它是通过调整嵌入权重来实现的。
- en: The implementation is pretty simple. All we need to do is just to initialize
    a tensor using `nn.Parameter` which the dimension is set to match with the output
    from the `Patcher` model, i.e., 576×768\. Also, don’t forget to write `requires_grad=True`
    just to ensure that the tensor is trainable. Look at the Codeblock 5 below for
    the details.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 实现相当简单。我们只需要使用`nn.Parameter`初始化一个张量，其维度设置为与`Patcher`模型的输出匹配，即576×768。同时，别忘了写上`requires_grad=True`，以确保张量是可训练的。请看下面的代码块5以获取详细信息。
- en: '[PRE5]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Now let’s run the following codeblock to see whether our `LearnableEmbedding`
    class works properly. You can see in the printed output that it successfully created
    the positional embedding tensor as expected.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们运行以下代码块，看看我们的`LearnableEmbedding`类是否正常工作。你可以从打印的输出中看到，它成功地创建了预期的位置嵌入张量。
- en: '[PRE6]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The main encoder block
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 主要编码器块
- en: '![](../Images/8599ac25ab1438c316a7ee835becf24a.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8599ac25ab1438c316a7ee835becf24a.png)'
- en: Figure 7\. The main encoder block [5].
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图7. 主要编码器块 [5]。
- en: The next thing we are going to do is to construct the main encoder block displayed
    in the Figure 7 above. Here you can see that this block consists of several sub-components,
    namely *self-attention*, *layer norm*, FFN (Feed-Forward Network), and another
    *layer norm*. The Codeblock 7a below shows how I initialize these layers inside
    the `__init__()` method of the `EncoderBlock` class.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来我们要做的是构建图7中显示的主要编码器块。在这里你可以看到这个块由几个子组件组成，即*自注意力*、*层归一化*、FFN（前馈网络）以及另一个*层归一化*。下面的代码块7a展示了我是如何在`EncoderBlock`类的`__init__()`方法中初始化这些层的。
- en: '[PRE8]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: I’ve previously mentioned that the idea of ViT is to capture the relationships
    between patches within an image. This process is done by the *multihead attention*
    layer I initialize at line `#(1)` in the above codeblock. One thing to keep in
    mind here is that we need to set the batch_first parameter to `True` (`#(2)`).
    This is essentially done so that the attention layer will be compatible with our
    tensor shape, in which the batch dimension (`batch_size`) is at the 0th axis of
    the tensor. Next, the two layer normalization layers need to be initialized separately,
    as shown at line `#(3)` and `#(5)`. Lastly, we initialize the FFN block at line
    `#(4)`, which the layers stacked using `nn.Sequential` follows the structure defined
    in the following equation.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我之前提到，ViT的想法是捕捉图像中补丁之间的关系。这个过程是通过我在上述代码块的第`#(1)`行初始化的*多头注意力*层来完成的。在这里需要注意的一点是我们需要将batch_first参数设置为`True`(`#(2)`)。这基本上是为了使注意力层与我们的张量形状兼容，其中批处理维度(`batch_size`)位于张量的0轴。接下来，需要分别初始化两个层归一化层，如第`#(3)`行和`#(5)`行所示。最后，在第`#(4)`行初始化FFN块，使用`nn.Sequential`堆叠的层遵循以下方程式定义的结构。
- en: '![](../Images/12834c88b1fdf3391538a29e60d6b29c.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/12834c88b1fdf3391538a29e60d6b29c.png)'
- en: Figure 8\. The operations done inside the FFN block [1].
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图8. FFN块内部的操作[1]。
- en: As the `__init__()` method is complete, we will now continue with the `forward()`
    method. Let’s take a look at the Codeblock 7b below.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 随着`__init__()`方法的完成，我们现在将继续`forward()`方法。让我们看一下下面的代码块7b。
- en: '[PRE9]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Here you can see that the input tensor is named `features (#(1)`). I name it
    this way because the input of the `EncoderBlock` is the image that has already
    been processed with `Patcher` and `LearnableEmbedding`, instead of a raw image.
    Before doing anything, notice in the `encoder` block that there is a branch separated
    from the main flow which then returns back to the normalization layer. This branch
    is commonly known as a *residual connection*. To implement this, we need to store
    the original input tensor to the residual variable as I demonstrate at line `#(2)`.
    As the input tensor has been copied, now we are ready to process the original
    input with the multihead attention layer (`#(3)`). Since this is a *self*-attention
    (not a *cross*-attention), the `query`, `key`, and `value` inputs for this layer
    are all derived from the `features` tensor. Next, the layer normalization operation
    is then performed at line `#(4)`, which the input for this layer already contains
    information from the attention block as well as the residual connection. The remaining
    steps are basically the same as what I just explained, except that here we replace
    the self-attention block with FFN (`#(5)`).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里你可以看到输入张量被命名为`features (#(1)`）。我这样命名是因为`EncoderBlock`的输入是经过`Patcher`和`LearnableEmbedding`处理的图像，而不是原始图像。在开始任何操作之前，注意在`encoder`块中有一个从主流程中分离出来的分支，然后返回到归一化层。这个分支通常被称为*残差连接*。为了实现这一点，我们需要将原始输入张量存储到残差变量中，就像我在第`#(2)`行中演示的那样。由于输入张量已经被复制，我们现在可以处理原始输入的多头注意力层(`#(3)`)。由于这是一个*自注意力*（而不是*交叉注意力*），这个层的`query`、`key`和`value`输入都来自`features`张量。接下来，在第`#(4)`行执行层归一化操作，这个层的输入已经包含了来自注意力块和残差连接的信息。接下来的步骤基本上和我刚才解释的一样，只是这里我们将自注意力块替换为FFN(`#(5)`)。
- en: In the following codeblock, I’ll test the `EncoderBlock` class by passing a
    dummy tensor of size 1×576×768, simulating an output tensor from the previous
    operations.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的代码块中，我将通过传递一个大小为1×576×768的虚拟张量来测试`EncoderBlock`类，模拟从前一个操作中得到的输出张量。
- en: '[PRE10]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Below is what the tensor dimension looks like throughout the entire process
    inside the model.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是整个模型过程中张量维度的情况。
- en: '[PRE11]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Here you can see that the final output tensor (`#(4)`) has the same size as
    the input (`#(1)`), allowing us to stack multiple encoder blocks without having
    to worry about messing up the tensor dimensions. Not only that, the size of the
    tensor also appears to be unchanged from the beginning all the way to the last
    layer. In fact, there are actually lots of transformations performed inside the
    attention block, but we just can’t see it since the entire process is done internally
    by the `nn.MultiheadAttention` layer. One of the tensors produced in the layer
    that we can observe is the attention weight (`#(2)`). This weight matrix, which
    has the size of 576×576, is responsible for storing information regarding the
    relationships between one patch and every other patch in the image. Furthermore,
    changes in tensor dimension actually also happened inside the FFN layer. The feature
    vector of each patch which has the initial length of 768 changed to 3072 and immediately
    shrunk back to 768 again (`#(3)`). However, this transformation is not printed
    since the process is wrapped with `nn.Sequential` back at line #(4) in Codeblock
    7a.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你可以看到最终输出张量（`#(4)`）的大小与输入（`#(1)`）相同，这使得我们可以在不担心张量维度出错的情况下堆叠多个编码器块。不仅如此，张量的大小似乎从开始到最后一层都没有改变。实际上，在注意力块内部实际上执行了大量的转换，但我们无法看到它，因为整个过程都是由`nn.MultiheadAttention`层内部完成的。我们可以在该层观察到的张量之一是注意力权重（`#(2)`）。这个大小为576×576的权重矩阵负责存储有关图像中一个补丁与其他所有补丁之间关系的信息。此外，张量维度的变化实际上也发生在FFN层内部。每个补丁的特征向量，其初始长度为768，变为3072，然后立即缩小回768（`#(3)`）。然而，这个转换没有打印出来，因为过程被`nn.Sequential`包装在代码块7a的第`(4)`行。
- en: ViT encoder
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ViT编码器
- en: '![](../Images/1e17d72ec4c38753b37a066fc40d9830.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1e17d72ec4c38753b37a066fc40d9830.png)'
- en: Figure 9\. The entire ViT Encoder in the CPTR architecture [5].
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图9. CPTR架构中的整个ViT编码器[5]。
- en: As we have finished implementing all encoder components, now that we will assemble
    them to construct the actual ViT Encoder. We are going to do it in the `Encoder`
    class in Codeblock 9.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经实现了所有编码器组件，现在我们将它们组装起来构建实际的ViT编码器。我们将在代码块9的`Encoder`类中完成这项工作。
- en: '[PRE12]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Inside the `__init__()` method, what we need to do is to initialize all components
    we created earlier, i.e., `Patcher` (`#(1)`), `LearnableEmbedding` (`#(2)`), and
    `EncoderBlock` (`#(3)`). In this case, the `EncoderBlock` is initialized inside
    `nn.ModuleList` since we want to repeat it `NUM_ENCODER_BLOCKS` (12) times. To
    the `forward()` method, it initially works by accepting raw image as the input
    (`#(4)`). We then process it with the `patcher` layer (`#(5)`) to divide the image
    into small patches and transform them with the linear projection operation. The
    learnable positional embedding tensor is then injected into the resulting output
    by element-wise addition (`#(6)`). Lastly, we pass it into the 12 encoder blocks
    sequentially with a simple for loop (`#(7)`).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在`__init__()`方法中，我们需要初始化我们之前创建的所有组件，即`Patcher`（`#(1)`）、`LearnableEmbedding`（`#(2)`）和`EncoderBlock`（`#(3)`）。在这种情况下，`EncoderBlock`是在`nn.ModuleList`中初始化的，因为我们想重复它`NUM_ENCODER_BLOCKS`（12）次。对于`forward()`方法，它最初通过接受原始图像作为输入（`#(4)`）来工作。然后我们通过`patcher`层（`#(5)`）处理它，将图像分割成小块，并通过线性投影操作进行转换。然后通过逐元素加法将可学习的位置嵌入张量注入到结果输出中（`#(6)`）。最后，我们通过简单的for循环依次将其传递到12个编码器块中（`#(7)`）。
- en: Now, in Codeblock 10, I am going to pass a dummy image through the entire encoder.
    Note that since I want to focus on the flow of this Encoder class, I re-run the
    previous classes we created earlier with the `print()` functions commented out
    so that the outputs will look neat.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在代码块10中，我将通过整个编码器传递一个虚拟图像。请注意，由于我想专注于这个编码器类的流程，所以我重新运行了我们之前创建的带有注释的`print()`函数的类，以便输出看起来整洁。
- en: '[PRE13]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: And below is what the flow of the tensor looks like. Here, we can see that our
    dummy input image successfully passed through all layers in the network, including
    the encoder blocks that we repeat 12 times. The resulting output tensor is now
    context-aware, meaning that it already contains information about the relationships
    between patches within the image. Therefore, this tensor is now ready to be processed
    further with the decoder, which will later be discussed in the subsequent section.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是张量流的情况。在这里，我们可以看到我们的虚拟输入图像成功通过了网络中的所有层，包括我们重复12次的编码器块。结果输出张量现在具有上下文感知性，这意味着它已经包含了图像中补丁之间关系的信息。因此，这个张量现在可以进一步与解码器处理，这将在下一节中讨论。
- en: '[PRE14]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: ViT encoder (alternative)
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ViT编码器（替代）
- en: I want to show you something before we talk about the decoder. If you think
    that our approach above is too complicated, it is actually possible for you to
    use `nn.TransformerEncoderLayer` from PyTorch so that you don’t need to implement
    the `EncoderBlock` class from scratch. To do so, I am going to reimplement the
    `Encoder` class, but this time I’ll name it `EncoderTorch`.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们讨论解码器之前，我想向你展示一些东西。如果你认为我们上面的方法太复杂，实际上你可以使用PyTorch中的`nn.TransformerEncoderLayer`，这样你就不需要从头开始实现`EncoderBlock`类。为了做到这一点，我将重新实现`Encoder`类，但这次我将它命名为`EncoderTorch`。
- en: '[PRE15]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: What we basically do in the above codeblock is that instead of using the EncoderBlock
    class, here we use `nn.TransformerEncoderLayer` (`#(1)`), which will automatically
    create a single encoder block based on the parameters we pass to it. To repeat
    it multiple times, we can just use nn.`TransformerEncoder` and pass a number to
    the `num_layers` parameter (`#(2)`). With this approach, we don’t necessarily
    need to write the forward pass in a loop like what we did earlier (`#(3)`).
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的代码块中，我们基本上做的是，不是使用`EncoderBlock`类，而是使用`nn.TransformerEncoderLayer`（`#(1)`），这将根据我们传递给它的参数自动创建一个编码器块。为了重复多次，我们只需使用`nn.TransformerEncoder`并将一个数字传递给`num_layers`参数（`#(2)`）。使用这种方法，我们不一定需要像之前那样在循环中编写前向传递（`#(3)`）。
- en: The testing code in the Codeblock 12 below is exactly the same as the one in
    Codeblock 10, except that here I use the `EncoderTorch` class. You can also see
    here that the output is basically the same as the previous one.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 下面代码块12中的测试代码与代码块10中的完全相同，只是这里我使用了`EncoderTorch`类。你还可以看到这里的输出基本上与之前的一个相同。
- en: '[PRE16]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '[PRE17]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Decoder
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解码器
- en: As we have successfully created the encoder part of the CPTR architecture, now
    that we will talk about the decoder. In this section I am going to implement every
    single component inside the blue box in Figure 4\. Based on the figure, we can
    see that the decoder accepts two inputs, i.e., the image caption ground truth
    (the lower part of the blue box) and the sequence of embedded patches produced
    by the encoder (the arrow coming from the green box). It is important to know
    that the architecture drawn in Figure 4 is intended to illustrate the training
    phase, where the entire caption ground truth is fed into the decoder. Later in
    the inference phase, we only provide a <BOS> (*Beginning of Sentence*) token for
    the caption input. The decoder will then predict each word sequentially based
    on the given image and the previously generated words. This process is commonly
    known as an *autoregressive* mechanism.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经成功创建了CPTR架构的编码器部分，现在我们将讨论解码器。在本节中，我将实现图4中蓝色框内的每一个组件。根据图示，我们可以看到解码器接受两个输入，即图像标题的地面真实值（蓝色框的下半部分）和编码器产生的嵌入补丁序列（从绿色框发出的箭头）。重要的是要知道，图4中绘制的架构旨在说明训练阶段，其中整个标题地面真实值被输入到解码器中。在推理阶段稍后，我们只为标题输入提供一个<BOS>（*句子开头*）标记。然后解码器将根据给定的图像和之前生成的单词逐个预测每个单词。这个过程通常被称为*自回归*机制。
- en: Sinusoidal positional embedding
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正弦位置嵌入
- en: '![](../Images/ffe00ad8df5e327098be8fa5e5fe984f.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ffe00ad8df5e327098be8fa5e5fe984f.png)'
- en: Figure 10\. Where the sinusoidal positional embedding component is located in
    the decoder [5].
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图10。正弦位置嵌入组件在解码器中的位置[5]。
- en: If you take a look at the CPTR model, you’ll see that the first step in the
    decoder is to convert each word into the corresponding feature vector representation
    using the *word embedding* block. However, since this step is very easy, we are
    going to implement it later. Now let’s assume that this word vectorization process
    is already done, so we can move to the positional embedding part.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看看CPTR模型，你会看到解码器的第一步是将每个单词转换为相应的特征向量表示，使用*词嵌入*块。然而，由于这一步非常简单，我们将在稍后实现它。现在让我们假设这个单词向量化过程已经完成，因此我们可以转到位置嵌入部分。
- en: As I’ve mentioned earlier, since transformer is permutation-invariant by nature,
    we need to apply positional embedding to the input sequence. Different from the
    previous one, here we use the so-called *sinusoidal positional embedding*. We
    can think of it like a method to label each word vector by assigning numbers obtained
    from a sinusoidal wave. By doing so, we can expect our model to understand word
    orders thanks to the information given by the wave patterns.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如我之前提到的，由于Transformer本质上是排列不变的，我们需要对输入序列应用位置嵌入。与之前的不同，这里我们使用所谓的*正弦波位置嵌入*。我们可以将其视为一种通过从正弦波中分配数字来标记每个词向量的方法。通过这样做，我们可以期望我们的模型通过波形的提供的信息来理解词序。
- en: If you go back to Codeblock 6 Output, you’ll see that the positional embedding
    tensor in the encoder has the size of `NUM_PATCHES` × `EMBED_DIM` (576×768). What
    we basically want to do in the decoder is to create a tensor having the size of
    `SEQ_LENGTH` × `EMBED_DIM` (30×768), which the values are computed based on the
    equation shown in Figure 11\. This tensor is then set to be non-trainable because
    a sequence of words must maintain a fixed order to preserve its meaning.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你回到代码块6的输出，你会看到编码器中的位置嵌入张量的大小为`NUM_PATCHES` × `EMBED_DIM` (576×768)。在解码器中，我们基本上想要创建一个大小为`SEQ_LENGTH`
    × `EMBED_DIM` (30×768)的张量，其值是根据图11中显示的方程计算的。然后，这个张量被设置为不可训练的，因为单词序列必须保持固定的顺序以保持其意义。
- en: '![](../Images/c7c9e48cd0f720d6031943af44b55121.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c7c9e48cd0f720d6031943af44b55121.png)'
- en: Figure 11\. The equation for creating sinusoidal positional encoding proposed
    in the Transformer paper [6].
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图11. Transformer论文[6]中提出的创建正弦波位置编码的公式。
- en: Here I want to explain the following code quickly because I actually have discussed
    this more thoroughly in my previous article about Transformer. Generally speaking,
    what we basically do here is to create the sine and cosine wave using `torch.sin()`
    (`#(1)`) and `torch.cos()` (`#(2)`). The resulting two tensors are then merged
    using the code at line `#(3)` and `#(4)`.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我想快速解释以下代码，因为我实际上在我的关于Transformer的前一篇文章中已经对此进行了更详细的讨论。总的来说，我们在这里基本上是使用`torch.sin()`
    (`#(1)`) 和 `torch.cos()` (`#(2)`) 创建正弦和余弦波。然后，使用第`#(3)`和`#(4)`行的代码将得到的两个张量合并。
- en: '[PRE18]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Now we can check if the `SinusoidalEmbedding` class above works properly by
    running the Codeblock 14 below. As expected earlier, here you can see that the
    resulting tensor has the size of 30×768\. This dimension matches with the tensor
    obtained by the process done in the *word embedding* block, allowing them to be
    summed in an element-wise manner.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以通过运行下面的代码块14来检查上面的`SinusoidalEmbedding`类是否正常工作。正如之前所预期的，在这里你可以看到得到的张量大小为30×768。这个维度与在*词嵌入*块中完成的处理得到的张量相匹配，允许它们以逐元素的方式相加。
- en: '[PRE19]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '[PRE20]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Look-ahead mask
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 前瞻掩码
- en: '![](../Images/2df5e4490f15001d3751579a54828c21.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2df5e4490f15001d3751579a54828c21.png)'
- en: Figure 12\. A look-ahead mask needs to be applied to the masked-self attention
    layer [5].
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图12. 需要应用于掩码自注意力层的*前瞻掩码* [5]。
- en: The next thing I am going to talk about in the decoder is the *masked self-attention*
    layer highlighted in the above figure. I am not going to code the attention mechanism
    from scratch. Rather, I’ll only implement the so-called *look-ahead mask*, which
    will be useful for the self-attention layer so that it doesn’t attend to the subsequent
    words in the caption during the training phase.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将在解码器中讨论的是上图突出显示的*掩码自注意力*层。我不会从头开始编写注意力机制。相反，我只会实现所谓的*前瞻掩码*，这对于自注意力层来说将非常有用，这样在训练阶段它就不会关注标题中的后续单词。
- en: The way to do it is pretty easy, what we need to do is just to create a triangular
    matrix which the size is set to match with the attention weight matrix, i.e.,
    `SEQ_LENGTH` × `SEQ_LENGTH` (30×30). Look at the `create_mask()`function below
    for the details.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 实现方法相当简单，我们所需做的就是创建一个三角形矩阵，其大小设置为与注意力权重矩阵相匹配，即`SEQ_LENGTH` × `SEQ_LENGTH` (30×30)。查看下面的`create_mask()`函数以获取详细信息。
- en: '[PRE21]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Even though creating a triangular matrix can simply be done with `torch.tril()`
    and `torch.ones()` (`#(1)`), but here we need to make a little modification by
    changing the 0 values to *-inf* (`#(2)`) and the 1s to 0 (`#(3)`). This is essentially
    done because the `nn.MultiheadAttention` layer applies the mask by element-wise
    addition. By assigning *-inf* to the subsequent words, the attention mechanism
    will completely ignore them. Again, the internal process inside an attention layer
    has also been discussed in detail in [my previous article about transformer](https://contributor.insightmediagroup.io/paper-walkthrough-attention-is-all-you-need-80399cdc59e1).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然创建一个三角形矩阵可以通过`torch.tril()`和`torch.ones()`简单地完成（`#(1)`），但在这里我们需要进行一点修改，将0值改为*负无穷*（`#(2)`）并将1s改为0（`#(3)`）。这本质上是因为`nn.MultiheadAttention`层通过逐元素相加应用掩码。通过将*负无穷*分配给后续的单词，注意力机制将完全忽略它们。同样，注意力层内部的内部过程也在我之前关于transformer的文章中进行了详细讨论（[我的关于transformer的文章](https://contributor.insightmediagroup.io/paper-walkthrough-attention-is-all-you-need-80399cdc59e1)）。
- en: Now I am going to run the function with `seq_length=7` so that you can see what
    the mask actually looks like. Later in the complete flow, we need to set the `seq_length`
    parameter to `SEQ_LENGTH` (30) so that it matches with the actual caption length.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我将使用`seq_length=7`运行函数，以便您可以看到掩码的实际样子。在完整的流程中稍后，我们需要将`seq_length`参数设置为`SEQ_LENGTH`（30），以便它与实际的标题长度相匹配。
- en: '[PRE22]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '[PRE23]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: The main decoder block
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 主要解码器块
- en: '![](../Images/6d9c897d295fa70a6db2e7f149ce1b45.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6d9c897d295fa70a6db2e7f149ce1b45.png)'
- en: Figure 13\. The main decoder block [5].
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 图13. 主要解码器块 [5]。
- en: We can see in the above figure that the structure of the decoder block is a
    bit longer than that of the encoder block. It seems like everything is nearly
    the same, except that the decoder part has a *cross-attention* mechanism and an
    additional layer normalization step placed after it. This cross-attention layer
    can actually be perceived as the bridge between the encoder and the decoder, as
    it is employed to capture the relationships between each word in the caption and
    every single patch in the input image. The two arrows coming from the encoder
    are the *key* and *value* inputs for the attention layer, whereas the *query*
    is derived from the previous layer in the decoder itself. Look at the Codeblock
    17a and 17b below to see the implementation of the entire decoder block.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 从上图我们可以看出，解码器块的结构比编码器块略长。看起来几乎一切都很相似，除了解码器部分有一个*交叉注意力*机制，并且在其后放置了一个额外的层归一化步骤。这个交叉注意力层实际上可以被视为编码器和解码器之间的桥梁，因为它被用来捕捉标题中的每个单词和输入图像中的每个单独补丁之间的关系。来自编码器的两个箭头是注意力层的*键*和*值*输入，而*查询*是从解码器本身的前一层派生出来的。请看下面的代码块17a和17b，以了解整个解码器块的实现。
- en: '[PRE24]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: In the `__init__()` method, we first initialize both self-attention (`#(1)`)
    and cross-attention (`#(3)`) layers with `nn.MultiheadAttention`. These two layers
    appear to be exactly the same now, but later you’ll see the difference in the
    `forward()` method. The three layer normalization operations are initialized separately
    as shown at line `#(2)`, `#(4)` and `#(6)`, since each of them will contain different
    normalization parameters. Lastly, the `ffn` layer (`#(5)`) is exactly the same
    as the one in the encoder, which basically follows the equation back in Figure
    8.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在`__init__()`方法中，我们首先使用`nn.MultiheadAttention`初始化了自注意力（`#(1)`）和交叉注意力（`#(3)`）层。这两个层现在看起来完全相同，但稍后您将在`forward()`方法中看到它们之间的差异。三个层归一化操作分别初始化，如第`#(2)`、`#(4)`和`#(6)`行所示，因为每个都将包含不同的归一化参数。最后，`ffn`层（`#(5)`）与编码器中的完全相同，基本上遵循图8中的方程式。
- en: 'Talking about the `forward()` method below, it initially works by accepting
    three inputs: `features`, `captions`, and `attn_mask`, which each of them denotes
    the tensor coming from the encoder, the tensor from the decoder itself, and a
    look-ahead mask, respectively (`#(1)`). The remaining steps are somewhat similar
    to that of the `EncoderBlock`, except that here we repeat the multihead attention
    block twice. The first attention mechanism takes captions as the `query`, `key`,
    and `value` parameters (`#(2)`). This is essentially done because we want the
    layer to capture the context within the captions tensor itself — hence the name
    *self-attention*. Here we also need to pass the attn_mask parameter to this layer
    so that it cannot see the subsequent words during the training phase. The second
    attention mechanism is different (`#(3)`). Since we want to combine the information
    from the encoder and the decoder, we need to pass the `captions` tensor as the
    `query`, whereas the `features` tensor will be passed as the `key` and `value` — hence
    the name *cross-attention*. A look-ahead mask is not necessary in the cross-attention
    layer since later in the inference phase the model will be able to see the entire
    input image at once rather than looking at the patches one by one. As the tensor
    has been processed by the two attention layers, we will then pass it through the
    feed forward network (`#(4)`). Lastly, don’t forget to create the residual connections
    and apply the layer normalization steps after each sub-component.'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 下面将讨论`forward()`方法，它最初通过接受三个输入来工作：`features`、`captions`和`attn_mask`，其中每个分别表示来自编码器的张量、来自解码器自身的张量以及一个前瞻掩码（`#(1)`）。接下来的步骤与`EncoderBlock`的步骤有些相似，除了在这里我们重复了两次多头注意力块。第一个注意力机制将标题作为`query`、`key`和`value`参数（`#(2)`）。这基本上是因为我们希望该层能够捕获标题张量内部的上下文——因此得名*自注意力*。在这里，我们还需要将`attn_mask`参数传递给这一层，以便在训练阶段它不能看到后续的单词。第二个注意力机制是不同的（`#(3)`）。由于我们想要结合编码器和解码器的信息，我们需要将`captions`张量作为`query`传递，而`features`张量将作为`key`和`value`传递——因此得名*交叉注意力*。在交叉注意力层中不需要前瞻掩码，因为在推理阶段，模型将能够一次性看到整个输入图像，而不是逐个查看补丁。由于张量已经经过两个注意力层的处理，我们将然后通过前馈网络（`#(4)`）传递它。最后，别忘了在每个子组件之后创建残差连接并应用层归一化步骤。
- en: '[PRE25]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: As the `DecoderBlock` class is completed, we can now test it with the following
    code.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 随着`DecoderBlock`类的完成，我们现在可以用以下代码对其进行测试。
- en: '[PRE26]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Here we assume that features is a tensor containing a sequence of patch embeddings
    produced by the `encoder` (`#(1)`), while captions is a sequence of embedded words
    (`#(2)`). The `seq_length` parameter of the look-ahead mask is set to `SEQ_LENGTH`
    (30) to match it to the number of words in the caption (`#(3)`). The tensor dimensions
    after each step are displayed in the following output.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们假设`features`是一个包含由`encoder`生成的补丁嵌入序列的张量（`#(1)`），而`captions`是一个嵌入单词的序列（`#(2)`）。前瞻掩码的`seq_length`参数设置为`SEQ_LENGTH`（30），以匹配标题中的单词数量（`#(3)`）。每个步骤之后的张量维度将在以下输出中显示。
- en: '[PRE27]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Here we can see that our `DecoderBlock` class works properly as it successfully
    processed the input tensors all the way to the last layer in the network. Here
    I want you to take a closer look at the attention weights at lines `#(1)` and
    `#(2)`. Based on these two lines, we can confirm that our decoder implementation
    is correct since the attention weight produced by the self-attention layer has
    the size of 30×30 (`#(1)`), which basically means that this layer really captured
    the context within the input caption. Meanwhile, the attention weight matrix generated
    by the cross-attention layer has the size of 30×576 (`#(2)`), indicating that
    it successfully captured the relationships between the words and the patches.
    This essentially implies that after cross-attention operation is performed, the
    resulting captions tensor has been enriched with the information from the image.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们可以看到我们的`DecoderBlock`类工作正常，因为它成功地处理了输入张量，直到网络的最后一层。这里我想让你仔细看看第`#(1)`和`#(2)`行的注意力权重。基于这两行，我们可以确认我们的解码器实现是正确的，因为自注意力层产生的注意力权重大小为30×30（`#(1)`），这基本上意味着这一层真正捕获了输入标题内部的上下文。同时，交叉注意力层生成的注意力权重矩阵大小为30×576（`#(2)`），表明它成功地捕获了单词和补丁之间的关系。这本质上意味着在执行交叉注意力操作后，生成的标题张量已经富含了来自图像的信息。
- en: Transformer decoder
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Transformer解码器
- en: '![](../Images/59cb0d1ca7743cf60436e0b33e033ed5.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/59cb0d1ca7743cf60436e0b33e033ed5.png)'
- en: Figure 14\. The entire Transformer Decoder in the CPTR architecture [5].
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 图14。CPTR架构中的整个Transformer解码器[5]。
- en: Now that we have successfully created all components for the entire decoder,
    what I am going to do next is to put them together into a single class. Look at
    the Codeblock 19a and 19b below to see how I do that.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经成功创建了整个解码器的所有组件，接下来我将把它们组合成一个单独的类。查看下面的代码块19a和19b，看看我是如何做到这一点的。
- en: '[PRE28]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'If you compare this `Decoder` class with the `Encoder` class from codeblock
    9, you’ll notice that they are somewhat similar in terms of the structure. In
    the encoder, we convert image patches into vectors using `Patcher`, while in the
    decoder we convert every single word in the caption into a vector using the `nn.Embedding
    layer` (`#(1)`), which I haven’t explained earlier. Afterward, we initialize the
    positional embedding layer, where for the decoder we use the *sinusoidal* rather
    than the *trainable* one (`#(2)`). Next, we stack multiple decoder blocks using
    `nn.ModuleList` (`#(3)`). The linear layer written at line #(4), which doesn’t
    exist in the encoder, is necessary to be implemented here since it will be responsible
    to map each of the embedded words into a vector of length `VOCAB_SIZE` (10000).
    Later on, this vector will contain the logit of every word in the dictionary,
    and what we need to do afterward is just to take the index containing the highest
    value, i.e., the most likely word to be predicted.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将这个`Decoder`类与代码块9中的`Encoder`类进行比较，你会注意到它们在结构上有些相似。在编码器中，我们使用`Patcher`将图像块转换为向量，而在解码器中，我们使用`nn.Embedding
    layer`（`#(1)`）将每个标题中的每个单词转换为向量，这是我之前没有解释过的。之后，我们初始化位置嵌入层，对于解码器，我们使用正弦波而不是可训练的嵌入（`#(2)`）。接下来，我们使用`nn.ModuleList`（`#(3)`）堆叠多个解码器块。在行`#(4)`中编写的线性层，在编码器中不存在，但在这里实现它是必要的，因为它将负责将每个嵌入的单词映射到长度为`VOCAB_SIZE`（10000）的向量。稍后，这个向量将包含字典中每个单词的对数概率，我们接下来需要做的就是取包含最大值的索引，即最有可能被预测的单词。
- en: The flow of the tensors within the `forward()` method itself is also pretty
    similar to the one in the `Encoder` class. In the Codeblock 19b below we pass
    features, captions, and `attn_mask` as the input (`#(1)`). Keep in mind that in
    this case the captions tensor contains the raw word sequence, so we need to vectorize
    these words with the embedding layer beforehand (`#(2)`). Next, we inject the
    sinusoidal positional embedding tensor using the code at line `#(3)` before eventually
    passing it through the four decoder blocks sequentially (`#(4)`). Finally, we
    pass the resulting tensor through the last linear layer to obtain the `prediction`
    logits (`#(5)`).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在`forward()`方法本身中的张量流也与`Encoder`类中的非常相似。在下面的代码块19b中，我们传递特征、标题和`attn_mask`作为输入（`#(1)`）。记住，在这种情况下，标题张量包含原始单词序列，因此我们需要在之前使用嵌入层将这些单词向量化（`#(2)`）。接下来，我们使用代码在行`#(3)`中注入正弦波位置嵌入张量，然后最终依次通过四个解码器块（`#(4)`）。最后，我们将结果张量通过最后一个线性层以获得`prediction`对数概率（`#(5)`）。
- en: '[PRE29]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: At this point you might be wondering why we don’t implement the softmax activation
    function as drawn in the illustration. This is essentially because during the
    training phase, softmax is typically included within the loss function, whereas
    in the inference phase, the index of the largest value will remain the same regardless
    of whether softmax is applied.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你可能想知道为什么我们不实现图中所示的softmax激活函数。这主要是因为在训练阶段，softmax通常包含在损失函数中，而在推理阶段，无论是否应用softmax，最大值的索引都将保持不变。
- en: Now let’s run the following testing code to check whether there are errors in
    our implementation. Previously I mentioned that the captions input of the `Decoder`
    class is a raw word sequence. To simulate this, we can simply create a sequence
    of random integers ranging between 0 and `VOCAB_SIZE` (10000) with the length
    of `SEQ_LENGTH` (30) words (`#(1)`).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们运行以下测试代码来检查我们的实现中是否有错误。之前我提到，`Decoder`类的标题输入是一个原始单词序列。为了模拟这种情况，我们可以简单地创建一个长度为`SEQ_LENGTH`（30）个单词的随机整数序列，范围在0到`VOCAB_SIZE`（10000）之间（`#(1)`）。
- en: '[PRE30]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: And below is what the resulting output looks like. Here you can see in the last
    line that the linear layer produced a tensor of size 30×10000, indicating that
    our decoder model is now capable of predicting the logit scores for each word
    in the vocabulary across all 30 sequence positions.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是最终输出的样子。在这里，你可以看到最后一行，线性层生成了一个大小为30×10000的张量，这表明我们的解码器模型现在能够预测词汇表中所有30个序列位置中每个单词的对数概率得分。
- en: '[PRE31]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Transformer decoder (alternative)
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Transformer解码器（替代）
- en: It is actually also possible to make the code simpler by replacing the `DecoderBlock`
    class with the `nn.TransformerDecoderLayer`, just like what we did in the ViT
    Encoder. Below is what the code looks like if we use this approach instead.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，通过用`nn.TransformerDecoderLayer`替换`DecoderBlock`类，我们也可以使代码更简单，就像我们在ViT编码器中所做的那样。以下是如果我们使用这种方法时的代码样子。
- en: '[PRE32]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: The main difference you will see in the `__init__()` method is the use of `nn.TransformerDecoderLayer`
    and `nn.TransformerDecoder` at line `#(1)` and `#(2)`, where the former is used
    to initialize a single decoder block, and the latter is for repeating the block
    multiple times. Next, the `forward()` method is mostly similar to the one in the
    `Decoder` class, except that the forward propagation on the decoder blocks is
    automatically repeated four times without needing to be put inside a loop (`#(3)`).
    One thing that you need to pay attention to in the `decoder_blocks` layer is that
    the tensor coming from the encoder (features) must be passed as the argument for
    the `memory` parameter. Meanwhile, the tensor from the decoder itself (captions)
    has to be passed as the input to the `tgt` parameter.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 您在`__init__()`方法中看到的主要区别是，在第`#(1)`行和`#(2)`行使用了`nn.TransformerDecoderLayer`和`nn.TransformerDecoder`，前者用于初始化单个解码器块，后者用于多次重复该块。接下来，`forward()`方法与`Decoder`类中的方法大致相似，除了解码器块的正向传播会自动重复四次，而不需要将其放入循环中（`#(3)`）。在`decoder_blocks`层中需要注意的一点是，来自编码器（特征）的张量必须作为`memory`参数的参数传递。同时，来自解码器本身（标题）的张量必须作为`tgt`参数的输入。
- en: The testing code for the `DecoderTorch` model below is basically the same as
    the one written in Codeblock 20\. Here you can see that this model also generates
    the final output tensor of size 30×10000.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 下面`DecoderTorch`模型的测试代码基本上与代码块20中写的是一样的。在这里，您可以看到这个模型也生成了大小为30×10000的最终输出张量。
- en: '[PRE33]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: '[PRE34]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: The entire CPTR model
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 整个CPTR模型
- en: Finally, it’s time to put the encoder and the decoder part we just created into
    a single class to actually construct the CPTR architecture. You can see in Codeblock
    23 below that the implementation is very simple. All we need to do here is just
    to initialize the encoder (`#(1)`) and the decoder (`#(2)`) components, then pass
    the raw images and the corresponding caption ground truths as well as the look-ahead
    mask to the `forward()` method (#(3)). Additionally, it is also possible for you
    to replace the `Encoder` and the `Decoder` with `EncoderTorch` and `DecoderTorch`,
    respectively.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，是时候将我们刚刚创建的编码器和解码器部分放入一个单独的类中，以实际构建CPTR架构了。您可以在下面的代码块23中看到，实现非常简单。我们在这里需要做的只是初始化编码器（`#(1)`）和解码器（`#(2)`）组件，然后将原始图像和相应的标题真实值以及前瞻掩码传递给`forward()`方法（`#(3)`）。此外，您还可以将`Encoder`和`Decoder`分别替换为`EncoderTorch`和`DecoderTorch`。
- en: '[PRE35]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: We can do the testing by passing dummy tensors through it. See the Codeblock
    24 below for the details. In this case, images is basically just a tensor of random
    numbers having the dimension of 1×3×384×384 (`#(1)`), while captions is a tensor
    of size 1×30 containing random integers (`#(2)`).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过传递虚拟张量通过它来进行测试。下面是代码块24的详细信息。在这种情况下，图像基本上是一个维度为1×3×384×384的随机数字张量（`#(1)`），而标题是一个包含随机整数的1×30的张量（`#(2)`）。
- en: '[PRE36]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Below is what the output looks like. We can see here that our input images and
    captions successfully went through all layers in the network, which basically
    means that the CPTR model we created is now ready to actually be trained on image
    captioning datasets.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是输出结果的样子。我们可以看到，我们的输入图像和标题成功通过了网络的所有层，这意味着我们创建的CPTR模型现在可以实际在图像标题数据集上训练了。
- en: '[PRE37]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Ending
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束
- en: That was pretty much everything about the theory and implementation of the CaPtion
    TransformeR architecture. Let me know what deep learning architecture I should
    implement next. Feel free to leave a comment if you spot any mistakes in this
    article!
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 关于CaPtion TransformeR架构的理论和实现，基本上就是这些了。请告诉我您想让我实现哪个深度学习架构。如果您在这篇文章中发现了任何错误，请随时留言！
