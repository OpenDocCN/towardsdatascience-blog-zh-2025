- en: What the Most Detailed Peer-Reviewed Study on AI in the Classroom Taught Us
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 最详细的同行评审研究关于课堂中AI的教益
- en: 原文：[https://towardsdatascience.com/what-the-most-detailed-peer-reviewed-study-on-ai-in-the-classroom-taught-us/](https://towardsdatascience.com/what-the-most-detailed-peer-reviewed-study-on-ai-in-the-classroom-taught-us/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/what-the-most-detailed-peer-reviewed-study-on-ai-in-the-classroom-taught-us/](https://towardsdatascience.com/what-the-most-detailed-peer-reviewed-study-on-ai-in-the-classroom-taught-us/)
- en: <mdspan datatext="el1747783980080" class="mdspan-comment">The rapid proliferation</mdspan>
    and superb capabilities of widely available LLMs has ignited intense debate within
    the educational sector. On one side they offer students a 24/7 tutor who is always
    available to help; but then of course students can use LLMs to cheat! I’ve seen
    both sides of the coin with my students; yes, even the bad side and even at the
    university level.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747783980080" class="mdspan-comment">广泛可用的LLM的快速普及和卓越能力在教育领域引发了激烈的辩论。一方面，它们为学生提供了一个全天候的导师，随时准备提供帮助；但当然，学生也可以利用LLM作弊！我看到了我的学生两面性的一面；是的，甚至是负面的一面，甚至在大学水平上。
- en: 'While the potential benefits and problems of LLMs in education are widely discussed,
    a critical need existed for robust, empirical evidence to guide the integration
    of these technologies in the classroom, curricula, and studies in general. Moving
    beyond anecdotal accounts and rather limited studies, a recent work titled “The
    effect of ChatGPT on students’ learning performance, learning perception, and
    higher-order thinking: insights from a meta-analysis” offers one of the most comprehensive
    quantitative assessments to date. The article, by Jin Wang and Wenxiang Fan from
    the Chinese Education Modernization Research Institute of Hangzhou Normal University,
    was published this month in the journal *Humanities and Social Sciences Communications*
    from the Nature Publishing group. It is as complex as detailed, so here I will
    delve into the findings reported in it, touching also on the methodology and delving
    into the implications for those developing and deploying AI in educational contexts.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然关于教育中LLM的潜在利益和问题已被广泛讨论，但迫切需要稳健的、基于经验的证据来指导这些技术在课堂、课程和一般研究中的整合。超越轶事报告和相当有限的研究，最近的一项名为“ChatGPT对学生学习表现、学习感知和高级思维的影响：来自元分析的见解”的工作，提供了迄今为止最全面的定量评估。由杭州师范大学中国教育现代化研究院的金王和王文祥撰写的这篇文章，本月发表在自然出版集团的《人文与社会科学通讯》杂志上。它既复杂又详细，因此在这里我将深入探讨其中报告的发现，并触及方法论，以及对于在教育环境中开发和部署AI的影响。
- en: 'Into it: Quantifying ChatGPT’s Impact on Student Learning'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进入它：量化ChatGPT对学生学习的影响
- en: 'The study by Wang and Fan is a meta-analysis that synthesizes data from 51
    research papers published between November 2022 and February 2025, examining the
    impact of ChatGPT on three crucial student outcomes: learning performance, learning
    perception, and higher-order thinking. For AI practitioners and data scientists,
    this meta-analysis provides a valuable, evidence-based lens through which to evaluate
    current LLM capabilities and inform the future development of education technologies.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 王和王帆的研究是一项元分析，它综合了2022年11月至2025年2月间发表的51篇研究论文的数据，考察了ChatGPT对三个关键学生成果的影响：学习表现、学习感知和高级思维。对于AI实践者和数据科学家来说，这项元分析提供了一个有价值的、基于证据的视角，可以用来评估当前LLM的能力，并指导教育技术的发展。
- en: 'The primary research question sought to determine the overall effectiveness
    of ChatGPT across the three key educational outcomes. The meta-analysis yielded
    statistically significant and noteworthy results:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 主要研究问题旨在确定ChatGPT在三个关键教育成果方面的整体有效性。元分析产生了具有统计学意义的显著结果：
- en: Regarding learning performance, data from 44 studies indicated a large positive
    impact attributable to ChatGPT usage. In fact it turned out that, on average,
    students integrating ChatGPT into their learning processes demonstrated significantly
    improved academic outcomes compared to control groups.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 关于学习表现，来自44项研究的数据显示，ChatGPT的使用产生了巨大的积极影响。事实上，结果表明，平均而言，将ChatGPT整合到学习过程中的学生与控制组相比，学术成果显著提高。
- en: For learning perception, encompassing students’ attitudes, motivation, and engagement,
    analysis of 19 studies revealed a moderately but significant positive impact.
    This implies that ChatGPT can contribute to a more favorable learning experience
    from the student’s perspective, despite the a priori limitations and problems
    associated to a tool that students can use to cheat.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 对于学习感知（包括学生的态度、动机和参与度），19项研究的分析揭示了适度但显著的正向影响。这意味着尽管存在学生可能利用该工具作弊的先验局限性和问题，ChatGPT仍可以促进从学生角度来看更加有利的学习体验。
- en: Similarly, the impact on higher-order thinking skills—such as critical analysis,
    problem-solving, and creativity—was also found to be moderately positive, based
    on 9 studies. It is good news then that ChatGPT can support the development of
    these crucial cognitive abilities, although its influence is clearly not as pronounced
    as on direct learning performance.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，基于9项研究的结果，对高级思维技能（如批判性分析、问题解决和创造力）的影响也被发现是适度积极的。因此，ChatGPT可以支持这些关键认知能力的发展，尽管其影响显然不如对直接学习表现那么显著。
- en: How Different Factors Affect Learning With ChatGPT
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不同因素如何影响使用ChatGPT进行学习
- en: Beyond overall efficacy, Wang and Fan investigated how various study characteristics
    affected ChatGPT’s impact on learning. Let me summarize for you the core results.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 除了整体有效性之外，王和范还研究了各种学习特征如何影响ChatGPT对学习的影响。让我为您总结一下核心结果。
- en: First, there was a strong effect of the type of course. The largest effect was
    observed in courses that involved the development of skills and competencies,
    followed closely by STEM (science/technology) and related subjects, and then by
    language learning/academic writing.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，课程类型产生了强烈的影响。在涉及技能和能力的培养的课程中观察到最大的影响，其次是STEM（科学/技术）和相关学科，然后是语言学习/学术写作。
- en: The course’s learning model also played a critical role in modulating how much
    ChatGPT assisted students. Problem-based learning saw a particularly strong potentiation
    by ChatGPT, yielding a very large effect size. Personalized learning contexts
    also showed a large effect, while project-based learning demonstrated a smaller,
    though still positive, effect.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 课程的学习模式也在调节ChatGPT协助学生的程度方面发挥了关键作用。基于问题的学习模式通过ChatGPT得到了特别强的强化，产生了非常大的效应量。个性化学习环境也显示出较大的效应，而基于项目的学习则显示出较小但仍然积极的效应。
- en: The duration of ChatGPT use was also an important modulator of ChatGPT’s effect
    on learning performance. Short durations in the order of a single week produced
    small effects, while extended use over 4–8 weeks had the strongest impact, which
    did not grow much more if the usage was extended even further. This suggests that
    sustained interaction and familiarity may be crucial for cultivating positive
    affective responses to LLM-assisted learning.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的使用时长也是调节其对学习表现影响的一个重要因素。单周左右的短期使用产生了较小的影响，而超过4-8周的持续使用则产生了最强的影响，如果使用时间进一步延长，影响也不会增长太多。这表明，持续的互动和熟悉感对于培养对LLM辅助学习的积极情感反应可能是至关重要的。
- en: Interestingly, the students’ grade levels, the specific role played by ChatGPT
    in the activity, and the area of application did not affect learning performance
    significantly, in any of the analyzed studies.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，学生的年级水平、ChatGPT在活动中的具体角色以及应用领域在所有分析的研究中都没有对学习表现产生显著影响。
- en: Other factors, including grade level, type of course, learning model, the specific
    role adopted by ChatGPT, and the area of application, did not significantly moderate
    the impact on learning perception.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 其他因素，包括年级水平、课程类型、学习模式、ChatGPT所扮演的具体角色以及应用领域，并没有显著调节对学习感知的影响。
- en: The study further showed that when ChatGPT functioned as an intelligent tutor,
    providing personalized guidance and feedback, its impact on fostering higher-order
    thinking was most pronounced.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 研究进一步表明，当ChatGPT作为智能导师，提供个性化指导和反馈时，其对培养高级思维的影响最为显著。
- en: Implications for the Development of AI-Based Educational Technologies
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对基于AI的教育技术发展的启示
- en: 'The findings from Wang & Fan’s meta-analysis carry substantial implications
    for the design, development, and strategic deployment of AI in educational settings:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 王和范的元分析结果对AI在教育环境中的设计、开发和战略部署具有重大意义：
- en: First of all, regarding the strategic scaffolding for deeper cognition. The
    impact on the development of thinking skills was somewhat lower than on performance,
    which means that LLMs are not inherently cultivators of deep critical thought,
    even if they do have a positive global effect on learning. Therefore, AI-based
    educational tools should integrate explicit scaffolding mechanisms that foster
    the development of thinking processes, to guide students from knowledge acquisition
    towards higher-level analysis, synthesis, and evaluation in parallel to the AI
    system’s direct help.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，关于深化认知的战略支架。对思维技能发展的影响略低于对表现的影响，这意味着LLM并非天生就是培养深入批判性思维的工具，尽管它们对学习有积极的整体影响。因此，基于AI的教育工具应整合显式的支架机制，以促进思维过程的发展，指导学生从知识获取转向更高层次的分析、综合和评估，同时与AI系统的直接帮助并行。
- en: Thus, the implementation of AI tools in education must be framed properly, and
    as we saw above this framing will depend on the exact type and content of the
    course, the learning model one wishes to apply, and the available time. One particularly
    interesting setup would be that where the AI tool supports inquiry, hypothesis
    testing, and collaborative problem-solving. Note though that the findings on optimal
    duration imply the need for onboarding strategies and adaptive engagement techniques
    to maximize impact and mitigate potential over-reliance.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在教育中实施AI工具必须得到适当的框架，正如我们上面所看到的，这种框架将取决于课程的准确类型和内容、希望应用的 学习模型以及可用的时间。一个特别有趣的设置将是AI工具支持探究、假设检验和协作问题解决的情况。然而，关于最佳持续时间的发现意味着需要采用入职策略和适应性参与技术，以最大化影响并减轻潜在的过度依赖。
- en: The superior impact documented when ChatGPT functions as an intelligent tutor
    highlights a key direction for AI in education. Developing LLM-based systems that
    can provide adaptive feedback, pose diagnostic and reflective questions, and guide
    learners through complex cognitive tasks is paramount. This requires moving beyond
    simple Q&A capabilities towards more sophisticated conversational AI and pedagogical
    reasoning.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当ChatGPT作为智能导师时，其卓越的影响突出了AI在教育中的关键方向。开发基于LLM的系统，能够提供适应性反馈、提出诊断性和反思性问题，并指导学习者完成复杂的认知任务至关重要。这需要超越简单的问答能力，转向更复杂的对话AI和教学推理。
- en: On top, there are a few non-minor issues to work on. While LLMs excel at information
    delivery and task assistance (leading to high performance gains), enhancing their
    impact on affective domains (perception) and advanced cognitive skills requires
    better interaction designs. Incorporating elements that foster student agency,
    provide meaningful feedback, and manage cognitive load effectively are crucial
    considerations.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有一些非次要问题需要解决。虽然LLM在信息传递和任务辅助方面表现出色（导致性能显著提升），但要增强它们对情感领域（感知）和高级认知技能的影响，需要更好的交互设计。纳入促进学生自主性、提供有意义的反馈和有效管理认知负荷的元素是至关重要的考虑因素。
- en: Limitations and Where Future Research Should Go
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 局限性与未来研究方向
- en: The authors of the study prudently acknowledge some limitations, which also
    illuminate avenues for future research. Although the total sample size was the
    largest ever, it is still small, and very small for some specific questions. More
    research needs to be done, and a new meta-analysis will probably be required when
    more data becomes available. A difficult point, and this is my personal addition,
    is that as the technology progresses so fast, results might become obsolete very
    rapidly, unfortunately.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 研究的作者谨慎地承认了一些局限性，这也为未来的研究指明了方向。尽管总体样本量是前所未有的最大，但它仍然很小，对于一些具体问题来说非常小。需要进行更多研究，并且当更多数据可用时，可能需要新的元分析。一个困难的问题是，随着技术的快速发展，结果可能会非常快地过时，这很遗憾，这是我个人添加的。
- en: Another limitation in the studies analyzed in this paper is that they are largely
    biased toward college-level students, with very limited data on primary education.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文分析的这项研究中，另一个局限性是它们在很大程度上偏向于大学生，对基础教育的数据非常有限。
- en: Wang and Fan also discuss what AI, data science, and pedagogues should consider
    in future research. First, they should try to disaggregate effects based on specific
    LLM versions, a point that is critical because they evolve so fast. Second, they
    should study how students and teachers typically “prompt” the LLMs, and then investigate
    the impact of differential prompting on the final learning outcomes. Then, somehow
    they need to develop and evaluate adaptive scaffolding mechanisms embedded within
    LLM-based educational tools. Finally, and over a long term, we need to explore
    the effects of LLM integration on knowledge retention and the development of self-regulated
    learning skills.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 王和范还讨论了AI、数据科学和教育工作者在未来的研究中应考虑的事项。首先，他们应该尝试根据具体的LLM版本分解影响，这一点至关重要，因为它们发展得非常快。其次，他们应该研究学生和教师通常如何“提示”LLM，然后调查不同提示对最终学习成果的影响。然后，他们需要以某种方式开发和评估嵌入在基于LLM的教育工具中的自适应支架机制。最后，从长远来看，我们需要探索LLM整合对知识保留和自我调节学习技能发展的作用。
- en: Personally, I add at this point, I am of the opinion that studies need to dig
    more into how students use LLMs to cheat, not necessarily willingly but possibly
    also by seeking for shortcuts that lead them wrong or allow them to get out of
    the way but without really learning anything. And in this context, I think AI
    scientists are falling short in developing camouflaged systems for the detection
    of AI-generated texts, that they can use to rapidly and confidently tell if, for
    example, a homework was done with an LLM. Yes, there are some watermarking and
    similar systems out there (which I will cover some day!) but I haven’t seem them
    deployed at large in ways that educators can easily utilize.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 个人而言，我在此补充一点，我认为研究需要更深入地挖掘学生如何使用LLM（大型语言模型）作弊，不一定是有意为之，也可能是通过寻找捷径导致他们误入歧途或让他们逃避责任，但实际上并没有真正学到任何东西。在这种情况下，我认为AI科学家在开发用于检测AI生成文本的伪装系统方面做得不够，他们可以使用这些系统快速而自信地判断，例如，作业是否是用LLM完成的。是的，现在有一些水印和类似系统（我会在某天介绍它们！）但我觉得它们并没有被大规模部署，让教育工作者能够轻松利用。
- en: 'Conclusion: Towards an Evidence-Informed Integration of AI in Education'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论：迈向基于证据的AI在教育中的整合
- en: The meta-analysis I’ve covered here for you provides a critical, data-driven
    contribution to the discourse on AI in education. It confirms the substantial
    potential of LLMs, particularly ChatGPT in these studies, to enhance student learning
    performance and positively influence learning perception and higher-order thinking.
    However, the study also powerfully illustrates that the effectiveness of these
    tools is not uniform but is significantly moderated by contextual factors and
    the nature of their integration into the learning process.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我为您提供的这篇元分析为关于AI在教育中的讨论提供了关键、数据驱动的贡献。它证实了LLM（尤其是ChatGPT在这些研究中的LLM）在增强学生学习表现和积极影响学习感知和高级思维方面的巨大潜力。然而，这项研究也强烈表明，这些工具的有效性并不统一，而是受到情境因素和它们融入学习过程的方式的显著调节。
- en: For the AI and data science community, these findings serve as both an affirmation
    and a challenge. The affirmation lies in the demonstrated efficacy of LLM technology.
    The challenge resides in harnessing this potential through thoughtful, evidence-informed
    design that moves beyond generic applications towards sophisticated, adaptive,
    and pedagogically sound educational tools. The path forward requires a continued
    commitment to rigorous research and a nuanced understanding of the complex interplay
    between AI, pedagogy, and human learning.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对于AI和数据科学社区来说，这些发现既是肯定也是挑战。肯定之处在于LLM技术的有效性得到了证明。挑战在于通过深思熟虑、基于证据的设计来利用这种潜力，超越通用应用，走向复杂、自适应且符合教学原则的教育工具。前进的道路需要持续致力于严谨的研究和对AI、教学和人类学习之间复杂互动的细微理解。
