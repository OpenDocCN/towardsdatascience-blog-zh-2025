  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索科学前沿的数据
- en: 原文：[https://towardsdatascience.com/exploring-data-at-the-cutting-edge-of-science/](https://towardsdatascience.com/exploring-data-at-the-cutting-edge-of-science/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/exploring-data-at-the-cutting-edge-of-science/](https://towardsdatascience.com/exploring-data-at-the-cutting-edge-of-science/)'
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《变量》的最新版本，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Before jumping right into our weekly highlights, we’re thrilled to share that,
    as of this week, our [brand-new contributor portal](https://contributor.insightmediagroup.io/) is
    open for existing and prospective TDS authors. We’re still hard at work on several
    exciting features, but the portal already represents a major step forward for
    us as an [independent publication:](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/) you
    can now share your work with us directly on our platform. We hope you give it
    a try soon.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在进入我们每周亮点之前，我们很高兴地分享，从本周开始，我们的全新[贡献者门户](https://contributor.insightmediagroup.io/)已向现有和潜在的TDS作者开放。我们仍在努力开发几个令人兴奋的功能，但该门户已经是我们作为[独立出版物](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/)迈出的重大一步，您现在可以直接在我们的平台上与我们分享您的作品。我们希望您尽快尝试。
- en: 'Moving on to this week’s lineup of standout articles, we invite you to explore
    data science at its intersections with emerging and fascinating fields like quantum
    computing and genomics. If you’re looking for more practical, hands-on topics,
    we’ve got you covered, too: just read on for our recommended reads on other topics.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们看看本周的亮点文章，我们邀请您探索数据科学在量子计算和基因组学等新兴而迷人的领域的交汇点。如果您在寻找更多实用、动手的话题，我们也为您准备好了：只需继续阅读我们关于其他主题的推荐阅读。
- en: Should Data Scientists Care About Quantum Computing?
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据科学家应该关注量子计算吗？
- en: As [Sara Metwalli](https://towardsdatascience.com/author/saraametwalli/) reminds
    us, 2025 was declared the year of quantum information science—so what better opportunity
    for data practitioners to learn about this increasingly buzz-generating field?
    Read her accessible introduction to learn how it might impact the future of data-focused
    workflows.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 正如 [Sara Metwalli](https://towardsdatascience.com/author/saraametwalli/) 提醒我们的，2025年被宣布为量子信息科学年——那么数据从业者了解这个越来越引起轰动的领域有什么更好的机会呢？阅读她的易于理解的介绍，了解它可能如何影响数据密集型工作流程的未来。
- en: '[Should Data Scientists Care About Quantum Computing?](https://towardsdatascience.com/should-data-scientists-care-about-quantum-computing/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[数据科学家应该关注量子计算吗？](https://towardsdatascience.com/should-data-scientists-care-about-quantum-computing/)'
- en: 'Essential Review Papers on Physics-Informed Neural Networks: A Curated Guide
    for Practitioners'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 《基于物理信息的神经网络：实践者的精选综述指南》
- en: '[Shuai Guo](https://towardsdatascience.com/author/shuaiguo/) presents a comprehensive
    resource to help you catch up with the latest research in a cutting-edge machine
    learning subfield.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '[郭帅](https://towardsdatascience.com/author/shuaiguo/) 提供了一项全面资源，帮助您跟上前沿机器学习子领域的最新研究。'
- en: '[Essential Review Papers on Physics-Informed Neural Networks: A Curated Guide
    for Practitioners](https://towardsdatascience.com/essential-review-papers-on-physics-informed-neural-networks-a-curated-guide-for-practitioners/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[《基于物理信息的神经网络：实践者的精选综述指南》](https://towardsdatascience.com/essential-review-papers-on-physics-informed-neural-networks-a-curated-guide-for-practitioners/)'
- en: 'Unraveling Spatially Variable Genes: A Statistical Perspective on Spatial Transcriptomics'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 揭示空间可变基因：空间转录组学的统计视角
- en: 'Explore the innovative use of data and statistics in genomics: Guanao Yan and [Jingyi
    Jessica Li](https://towardsdatascience.com/author/jsb-ucla/) share their latest
    findings.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 探索基因组学中数据与统计学的创新应用：Guanao Yan 和 [Jingyi Jessica Li](https://towardsdatascience.com/author/jsb-ucla/)
    分享了他们的最新发现。
- en: '[Unraveling Spatially Variable Genes: A Statistical Perspective on Spatial
    Transcriptomics](https://towardsdatascience.com/unraveling-spatially-variable-genes-a-statistical-perspective-on-spatial-transcriptomics/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[揭示空间可变基因：空间转录组学的统计视角](https://towardsdatascience.com/unraveling-spatially-variable-genes-a-statistical-perspective-on-spatial-transcriptomics/)'
- en: Other Recommended Reads
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他推荐阅读
- en: 'Interested in industry trends, data engineering, model optimization and/or
    game theory? You’re in luck:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 对行业趋势、数据工程、模型优化和/或博弈论感兴趣？你很幸运：
- en: Few tech leaders are as well-positioned as [Barr Moses](https://towardsdatascience.com/author/barrmoses/) to
    predict the [future of data observability and AI](https://towardsdatascience.com/2026-will-be-the-year-of-data-ai-observability/) —
    don’t miss her latest insights.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 很少有技术领导者像[Barr Moses](https://towardsdatascience.com/author/barrmoses/)那样，能够预测[数据可观察性和AI的未来](https://towardsdatascience.com/2026-will-be-the-year-of-data-ai-observability/)——不要错过她的最新见解。
- en: '[2026 Will Be The Year of Data + AI Observability](https://towardsdatascience.com/2026-will-be-the-year-of-data-ai-observability/)'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[2026年将是数据+AI可观察性的年份](https://towardsdatascience.com/2026-will-be-the-year-of-data-ai-observability/)'
- en: In a focused and practical guide, [Claudia Ng](https://towardsdatascience.com/author/ds-claudia/) outlines
    three [essential methods to track model drift](https://towardsdatascience.com/how-to-spot-and-prevent-model-drift-before-it-impacts-your-business/).
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一本专注且实用的指南中，[Claudia Ng](https://towardsdatascience.com/author/ds-claudia/)概述了三种[跟踪模型漂移的必要方法](https://towardsdatascience.com/how-to-spot-and-prevent-model-drift-before-it-impacts-your-business/)。
- en: '[How to Spot and Prevent Model Drift Before it Impacts Your Business](https://towardsdatascience.com/how-to-spot-and-prevent-model-drift-before-it-impacts-your-business/)'
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何在模型影响业务之前发现和预防模型漂移](https://towardsdatascience.com/how-to-spot-and-prevent-model-drift-before-it-impacts-your-business/)'
- en: What’s behind the recent trend of companies [moving back to on-premise servers](https://towardsdatascience.com/forget-about-cloud-computing-on-premises-is-all-the-rage-again/) and
    opting out of cloud services? [Ari Joury](https://towardsdatascience.com/author/arijoury/) unpacks
    some of the key drivers.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最近公司[回归本地服务器](https://towardsdatascience.com/forget-about-cloud-computing-on-premises-is-all-the-rage-again/)并退出云服务背后的趋势是什么？[Ari
    Joury](https://towardsdatascience.com/author/arijoury/)分析了其中的一些关键驱动因素。
- en: '[Forget About Cloud Computing. On-Premises Is All the Rage Again](https://towardsdatascience.com/forget-about-cloud-computing-on-premises-is-all-the-rage-again/)'
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[忘记云计算吧。本地化部署再次成为热门](https://towardsdatascience.com/forget-about-cloud-computing-on-premises-is-all-the-rage-again/)'
- en: In the final part of his introductory series on Hadoop, [Niklas Lang](https://towardsdatascience.com/author/niklas_lang/) helps
    us navigate the [wide reaches of the ecosystem and its key tools](https://towardsdatascience.com/mastering-hadoop-part-3-hadoop-ecosystem-get-the-most-out-of-your-cluster/).
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在他关于Hadoop的入门系列课程的最后一部分，[Niklas Lang](https://towardsdatascience.com/author/niklas_lang/)帮助我们了解[生态系统及其关键工具的广泛影响](https://towardsdatascience.com/mastering-hadoop-part-3-hadoop-ecosystem-get-the-most-out-of-your-cluster/)。
- en: '[Mastering Hadoop, Part 3: Hadoop Ecosystem: Get the most out of your cluster](https://towardsdatascience.com/mastering-hadoop-part-3-hadoop-ecosystem-get-the-most-out-of-your-cluster/)'
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[精通Hadoop，第3部分：Hadoop生态系统：充分利用您的集群](https://towardsdatascience.com/mastering-hadoop-part-3-hadoop-ecosystem-get-the-most-out-of-your-cluster/)'
- en: In the past week, another excellent series came to a close: [Dorian Drost](https://towardsdatascience.com/author/doriandrost/)‘s
    beginner-friendly Game Theory 101\. The final installment is all about the [math
    and stakes behind dynamic games](https://towardsdatascience.com/one-turn-after-another/).
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在过去的一周里，另一系列优秀的文章系列圆满结束：[Dorian Drost](https://towardsdatascience.com/author/doriandrost/)的入门级博弈论101。最后一篇全是关于[动态游戏背后的数学和赌注](https://towardsdatascience.com/one-turn-after-another/)。
- en: '[One Turn After Another](https://towardsdatascience.com/one-turn-after-another/)'
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[一次接一次](https://towardsdatascience.com/one-turn-after-another/)'
- en: Contribute to TDS
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为TDS贡献力量
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢发布新作者的文章，所以如果你最近写了一个有趣的项目教程、教程或对我们核心主题的理论反思，为什么不[与我们分享呢？](https://towardsdatascience.com/questions-96667b06af5/)
