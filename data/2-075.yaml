- en: 'Hands-On with Agents SDK: Multi-Agent Collaboration'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与 Agents SDK 亲身体验：多代理协作
- en: 原文：[https://towardsdatascience.com/hands-on-with-agents-sdk-multi-agent-collaboration/](https://towardsdatascience.com/hands-on-with-agents-sdk-multi-agent-collaboration/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/hands-on-with-agents-sdk-multi-agent-collaboration/](https://towardsdatascience.com/hands-on-with-agents-sdk-multi-agent-collaboration/)'
- en: <mdspan datatext="el1754323849072" class="mdspan-comment">In</mdspan> this second
    installment of the *Hands-On with Agents SDK* series, we’ll explore the basics
    of multi-agent systems and how agents can collaborate using the OpenAI Agents
    SDK framework.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754323849072" class="mdspan-comment">在本</mdspan>系列第二部分
    *与 Agents SDK 亲身体验* 中，我们将探讨多代理系统的基础知识以及代理如何使用 OpenAI Agents SDK 框架进行协作。
- en: 'If you haven’t read the first article, I highly recommend checking it out here:
    [Your First API‑Calling Agent](https://towardsdatascience.com/hands%E2%80%91on-with-agents-sdk-your-first-api%E2%80%91calling-agent/).
    In that post, we started by building a simple agent and enhanced it into a tool‑using
    agent capable of retrieving real‑time weather data. We also wrapped the agent
    in a minimal Streamlit interface for user interaction.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有阅读第一篇文章，我强烈建议你在这里查看：[您的第一个 API 调用代理](https://towardsdatascience.com/hands%E2%80%91on-with-agents-sdk-your-first-api%E2%80%91calling-agent/)。在那篇文章中，我们从一个简单的代理开始构建，并将其增强为一个能够检索实时天气数据的工具代理。我们还为代理包装了一个最小的
    Streamlit 界面，以便用户交互。
- en: '[Hands‑On with Agents SDK: Your First API‑Calling Agent](https://towardsdatascience.com/hands%e2%80%91on-with-agents-sdk-your-first-api%e2%80%91calling-agent/)'
  id: totrans-4
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[与 Agents SDK 亲身体验：您的第一个 API 调用代理](https://towardsdatascience.com/hands%e2%80%91on-with-agents-sdk-your-first-api%e2%80%91calling-agent/)'
- en: Now, we take the next step. Instead of relying on a single *weather specialist*
    agent, we’ll introduce another agent and learn how to make them work together
    to understand and fulfill user queries more effectively.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们迈出下一步。不再依赖于单个 *天气专家* 代理，我们将引入另一个代理，并学习如何让他们协同工作，更有效地理解和满足用户查询。
- en: Intro to Multi-Agent Systems
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多代理系统简介
- en: 'Let’s start with a fundamental question: why do we need multiple agents when
    a single agent—like the one we built in the previous article—already seems powerful
    enough to handle the task?'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一个问题开始：为什么我们需要多个代理，而单个代理——就像我们在上一篇文章中构建的那个——似乎已经足够强大来处理任务？
- en: There are several practical and theoretical reasons for adopting a multi-agent
    system ^([1]). Each agent can specialize in a specific domain and utilize its
    own tools, which can lead to better performance and higher-quality results. In
    real-world applications, business processes are often complex. A multi-agent setup
    is typically more modular, manageable, and maintainable. For example, if a specific
    function needs to be updated, we can modify just one agent instead of altering
    the entire system.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 采用多代理系统有几个实际和理论上的原因 ^([1])。每个代理可以专注于特定领域并使用自己的工具，这可以导致更好的性能和更高品质的结果。在现实世界的应用中，业务流程通常是复杂的。多代理设置通常是更模块化、可管理和可维护的。例如，如果需要更新特定功能，我们只需修改一个代理，而不是整个系统。
- en: 'The OpenAI Agents SDK provides two core patterns for enabling agent collaboration:
    *handoff* and *agent-as-tools*. In this article, we’ll explore both of these patterns,
    discuss when to use them, and show how you can customize them to achieve better
    results.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI Agents SDK 提供了两种核心模式来启用代理协作：*交接* 和 *代理作为工具*。在这篇文章中，我们将探讨这两种模式，讨论何时使用它们，并展示如何自定义它们以实现更好的结果。
- en: Handoff
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 交接
- en: Handoff is one of the key features of the Agents SDK framework. With handoff,
    an agent can delegate a task to another agent ^([2]). To make this concept clearer,
    imagine a typical process in a hospital.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: Handoff 是 Agents SDK 框架的关键特性之一。有了 Handoff，一个代理可以将任务委托给另一个代理 ^([2])。为了使这个概念更清晰，想象一下医院中一个典型的流程。
- en: Let’s say you’re experiencing a health issue and go to the hospital for a check-up.
    The first person you usually meet is not the doctor, but a triage nurse. The triage
    nurse collects relevant information from you and then directs you to the appropriate
    department or specialist.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你遇到健康问题，去医院进行检查。你通常遇到的第一个人不是医生，而是一位分诊护士。分诊护士收集你的相关信息，然后引导你到相应的部门或专家。
- en: This analogy closely mirrors how handoff works in the Agents SDK. In our case,
    we’ll have a *triage agent* that “examines” the user’s query. After evaluating
    it, the triage agent routes the query to a more suitable specialist agent. Just
    like a triage nurse, it hands off the full context (like your collected health
    data) to that specialist agent.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这个类比紧密地反映了在 Agents SDK 中交接是如何工作的。在我们的案例中，我们将有一个 *分级代理*，它“检查”用户的查询。在评估后，分级代理将查询路由到更适合的专家代理。就像分级护士一样，它将完整上下文（如收集到的健康数据）转交给那个专家代理。
- en: This pattern is commonly used in real-world applications such as customer service
    workflows, where a general agent receives an initial request and then routes it
    to a domain-specific expert agent for resolution. In our weather assistant example,
    we’ll implement a similar setup.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式在现实世界的应用中很常见，例如客户服务工作流程，其中一般代理接收初始请求，然后将其路由到特定领域的专家代理以进行处理。在我们的天气助手示例中，我们将实现类似的设置。
- en: 'Instead of having only one weather specialist agent, we will introduce another
    agent: an *air quality specialist*. As the name suggests, this agent will focus
    on answering air quality-related queries for a given location and will be equipped
    with a tool to fetch real-time air quality data.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不会只有一个天气专家代理，我们将引入另一个代理：一个 *空气质量专家*。正如其名所示，这个代理将专注于回答特定位置的空气质量相关查询，并将配备一个工具来获取实时空气质量数据。
- en: '![](../Images/9171d74bf25ee6aa4392ccc937941319.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9171d74bf25ee6aa4392ccc937941319.png)'
- en: Visualization of Handoff pattern using GraphViz.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 GraphViz 可视化交接模式。
- en: Basic Handoffs
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基本交接
- en: Let’s dive into the code by creating a new file named `04-basic-handoff-app.py`.
    First, we’ll import the required packages, just like we did in the previous article.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过创建一个名为 `04-basic-handoff-app.py` 的新文件来深入代码。首先，我们将导入所需的包，就像我们在上一篇文章中做的那样。
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Next, we define the function tool and the weather specialist agent using the
    same structure as in the previous article:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们使用与上一篇文章中相同的结构定义函数工具和天气专家代理：
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: In this script, as discussed above, we will define a new Air Quality Specialist
    agent with a tool named `get_current_air_quality`. This tool uses a different
    API endpoint and metrics from Open-Meteo, but it takes the same parameters—latitude
    and longitude.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在本脚本中，如上所述，我们将定义一个新的空气质量专家代理，并使用名为 `get_current_air_quality` 的工具。此工具使用与 Open-Meteo
    不同的 API 端点和指标，但它接受相同的参数——纬度和经度。
- en: The agent itself is defined similarly to the previous Weather Specialist agent,
    with the key difference being in the instructions—to ensure relevance to air quality
    queries. Below is the code snippet for the Air Quality Specialist agent.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 代理本身定义方式与之前的天气专家代理类似，关键区别在于指令——以确保与空气质量查询的相关性。以下是空气质量专家代理的代码片段。
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Now that we have two agents—the Weather Specialist and the Air Quality Specialist—the
    next step is to define the *Triage Agent*, which will evaluate the user’s query
    and decide which agent to hand off the task to.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有两个代理——天气专家和空气质量专家——下一步是定义 *分级代理*，它将评估用户的查询并决定将任务转交给哪个代理。
- en: 'The Triage Agent can be defined simply as follows:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 分级代理可以简单地定义为以下内容：
- en: '[PRE3]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: In the `instructions` argument, we provide a clear directive for this agent
    to determine which specialist agent is best suited to handle the user’s query.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `instructions` 参数中，我们为这个代理提供明确的指令，以确定哪个专家代理最适合处理用户的查询。
- en: The most important parameter here is `handoffs`, where we pass a list of agents
    that the task may be delegated to. Since we currently have only two agents, we
    include both in the list.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这里最重要的参数是 `handoffs`，我们传递一个可能被委派的任务的代理列表。由于我们目前只有两个代理，我们将它们都包含在列表中。
- en: 'Finally, we define our `run_agent` and `main` functions to integrate with the
    Streamlit components. (*Note: For a detailed explanation of these functions, please
    refer to the first article.*)'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们定义 `run_agent` 和 `main` 函数以与 Streamlit 组件集成。（*注意：有关这些函数的详细解释，请参阅第一篇文章。*）
- en: '[PRE4]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Full
    script for our handoff script can be seen here.</summary>
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>我们的交接脚本的完整脚本可以在此处查看。</summary>
- en: '[PRE5]</details>'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE5]'
- en: 'Run the script in your terminal using the following command:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下命令在您的终端中运行脚本：
- en: '[PRE6]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Now that we have a brand new air quality specialist agent, let’s ask about the
    air quality in Jakarta.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经有一个全新的空气质量专家代理，让我们来询问雅加达的空气质量。
- en: '![](../Images/25cf94402ab4cb9654bc3f26201437f2.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/25cf94402ab4cb9654bc3f26201437f2.png)'
- en: Screenshot of assistant response about air quality in Jakarta.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '![雅加达空气质量助手响应截图](../Images/assistant_response_air_quality_in_jakarta.png)'
- en: Unfortunately, at the time of writing this article (and quite often, actually),
    the report shows an unhealthy air quality level, along with some suggestions for
    dealing with the condition.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，在撰写本文时（实际上，这种情况很常见），报告显示空气质量不健康，并附带了一些应对状况的建议。
- en: Checking Trace Dashboard
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查跟踪仪表板
- en: Recall that in the first article, I briefly shared about the built-in *tracing*
    feature in the Agents SDK. In multi-agent collaboration, this feature becomes
    even more useful compared to when we were still working with a simple, single
    agent.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 记得在第一篇文章中，我简要介绍了 Agents SDK 中的内置 *跟踪* 功能。在多智能体协作中，这个功能比我们还在使用简单、单个智能体时更有用。
- en: Let’s take a look at the trace dashboard for the query we just ran.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看我们刚刚运行的查询的跟踪仪表板。
- en: '![](../Images/51f7977a058ca29e0087860e500ac19c.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![工具名称和描述覆盖](../Images/51f7977a058ca29e0087860e500ac19c.png)'
- en: Screenshot of trace dashboard for handoff pattern implementation.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪仪表板中交接模式实现截图。
- en: 'We can see that the process involved two agents: the triage agent and the air
    quality specialist agent. The triage agent took a total of 1,690 ms, while the
    air quality agent took 7,182 ms to process and return the result.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到涉及了两个智能体：三诊智能体和空气质量专家智能体。三诊智能体总共花费了 1,690 毫秒，而空气质量智能体则花费了 7,182 毫秒来处理并返回结果。
- en: 'If we click on the triage agent’s response section, we can view detailed LLM
    properties, as shown below. Notice that for the triage agent, the LLM views the
    handoff options as functions: `transfer_to_weather_specialist_agent()` and `transfer_to_air_quality_specialist_agent()`.
    This is how the handoff works under the hood—the LLM decides which function best
    suits the user’s query.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们点击三诊智能体响应部分，我们可以查看详细的 LLM 属性，如下所示。注意，对于三诊智能体，LLM 将交接选项视为函数：`transfer_to_weather_specialist_agent()`
    和 `transfer_to_air_quality_specialist_agent()`。这就是交接在底层是如何工作的——LLM 决定哪个函数最适合用户的查询。
- en: '![](../Images/c8df779a7a7dc519a0ef829788cef432.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![定制交接的详细截图](../Images/c8df779a7a7dc519a0ef829788cef432.png)'
- en: Screenshot of the detail of triage agent’s response in trace dashboard.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪仪表板中三诊智能体响应详细截图。
- en: Since the example asked about air quality, the function triggered by the triage
    agent was `transfer_to_air_quality_specialist_agent()`, which seamlessly transferred
    control to the Air Quality Specialist agent.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 由于示例询问了空气质量，三诊智能体触发的是 `transfer_to_air_quality_specialist_agent()` 函数，这无缝地将控制权转移给了空气质量专家智能体。
- en: '![](../Images/4902901c7a492f0807b90bc047d37623.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![跟踪仪表板中交接模式实现截图](../Images/4902901c7a492f0807b90bc047d37623.png)'
- en: Screenshot of trace dashboard when triage agent decided to handoff the task
    to air quality specialist agent.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '![三诊智能体决定将任务交接给空气质量专家智能体时的跟踪仪表板截图](../Images/triage_agent_handoff_to_air_quality_specialist_agent.png)'
- en: You can try asking about the weather instead of air quality and inspect the
    trace dashboard to see the difference.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以尝试询问天气而不是空气质量，并检查跟踪仪表板以查看差异。
- en: Customized Handoffs
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定制式交接
- en: We understand already that under the hood handoffs are visible by LLM as function,
    this means also that we can customize handoffs for some aspects.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经了解到，在底层，交接对 LLM 来说是可见的作为函数，这意味着我们也可以为某些方面定制交接。
- en: To customize a handoff, we can create a handoff object using `handoff()` function
    and specify part where we want to customize in the arguments, including; customizing
    tool name and description, running extra logic immediately on handoff, and passing
    a structured input to the specialist agent.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 要定制交接，我们可以使用 `handoff()` 函数创建交接对象，并在参数中指定我们想要定制的部分，包括：定制工具名称和描述、在交接时立即运行额外逻辑，以及向专家智能体传递结构化输入。
- en: Let’s see how it works on our use-case below. For a cleaner reference, let’s
    duplicate previous script of handoff and name the new file as `05-customized-handoff-app.py`.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看以下用例中它是如何工作的。为了更清晰的参考，让我们复制之前的交接脚本并将新文件命名为 `05-customized-handoff-app.py`。
- en: 'Since we will create a handoff object using `handoff()` function, we need to
    add `handoff` and `RunContextWrapper` function from `agents` package as below:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们将使用 `handoff()` 函数创建交接对象，因此我们需要从 `agents` 包中添加 `handoff` 和 `RunContextWrapper`
    函数，如下所示：
- en: '[PRE7]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'After we imported the required package, next is to define function tools and
    agents as latest script:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们导入所需的包后，接下来是定义函数工具和智能体，如下所示：
- en: '[PRE8]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Now let’s add two handoff objects. We will add customization step-by-step from
    the simplest one.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们添加两个交接对象。我们将从最简单的一个逐步添加定制步骤。
- en: Tool Name and Description Override
  id: totrans-63
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 工具名称和描述覆盖
- en: '[PRE9]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Above code shows the first customization that we apply for both of agents where
    we change the tool name and description for LLM visibility. Generally this change
    not affecting how the LLM response the query but only provide us a way to have
    a clear and more specific tool name and description rather then the default `transfer_to_<agent_name>`.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码显示了我们对两个代理应用的第一种自定义，我们更改了工具名称和描述以供 LLM 可见。通常这种更改不会影响 LLM 如何响应用户查询，但只为我们提供了一种更清晰、更具体地显示工具名称和描述的方法，而不是默认的
    `transfer_to_<agent_name>`。
- en: Add Callback Function
  id: totrans-66
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 添加回调函数
- en: One of the most use-case for callback function with `handoff` is to log the
    handoff event or showing it in the UI. Let’s say on the app you want to let the
    user know whenever the triage agent handoffs the query to one of the specialist
    agent.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `handoff` 的回调函数最常用的用例之一是记录移交事件或将其显示在用户界面中。假设在应用程序中，你希望在三诊代理将查询转交给任何专家代理时通知用户。
- en: First let’s define the callback function in order to call Streamlit’s info component
    that tell handoff event then add this function in `on_handoff` properties on both
    of the handoff objects.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们定义回调函数，以便调用 Streamlit 的信息组件来告知移交事件，然后将此函数添加到两个移交对象的 `on_handoff` 属性中。
- en: '[PRE10]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Let’s test out this, but before running the script, we need to change the handoffs
    list in triage agent using handoff objects that we just defined.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们测试一下，但在运行脚本之前，我们需要使用我们刚刚定义的移交对象更改三诊代理中的移交列表。
- en: '[PRE11]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Full
    script including Streamlit main function can be seen here.</summary>
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>包括
    Streamlit 主函数的完整脚本可以在以下链接查看。</summary>
- en: '[PRE12]</details>'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE12]</details>'
- en: Run the app from the terminal and ask a question about the weather or air quality.
    (In the example below, I intentionally asked about the air quality in Melbourne
    to provide a *contrast* with the air quality in Jakarta.)
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 从终端运行应用程序，并询问有关天气或空气质量的问题。（在下面的示例中，我故意询问了墨尔本的空气质量，以与雅加达的空气质量形成对比。）
- en: '[PRE13]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '![](../Images/8fed2249d8904fb3ba61989ef9079d20.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8fed2249d8904fb3ba61989ef9079d20.png)'
- en: Screen recording to show how on-handoff works.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕录制以展示 on-handoff 的工作原理。
- en: I’ve included a screen recording here to demonstrate the purpose of the `on_handoff`
    property we defined. As shown above, right after the triage agent initiates a
    handoff to a specialist agent, an info section appears before the final response
    is returned in the app. This behavior can be further customized — for example,
    by enriching the information displayed or adding additional logic to execute during
    the handoff.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里包含了一段屏幕录制，以展示我们定义的 `on_handoff` 属性的目的。如上图所示，在三诊代理向专家代理发起移交后，在最终响应返回应用程序之前，会出现一个信息部分。此行为可以进一步自定义——例如，通过丰富显示的信息或添加在移交过程中执行的额外逻辑。
- en: Specify Input Type
  id: totrans-79
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 指定输入类型
- en: The previous example of a callback function didn’t provide much meaningful information—it
    only indicated that a handoff had occurred.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 之前回调函数的示例没有提供太多有意义的 信息——它只表明发生了移交。
- en: To pass more useful data to the callback function, we can use the `input_type`
    parameter in the handoff object to describe the expected structure of the input.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 要将更多有用的数据传递给回调函数，我们可以在移交对象中使用 `input_type` 参数来描述输入的预期结构。
- en: The first step is to define the input type. Typically, we use a Pydantic model
    class^([3]) to specify the structure of the data we want to pass.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是定义输入类型。通常，我们使用 Pydantic 模型类^([3]) 来指定我们想要传递的数据的结构。
- en: 'Suppose we want the triage agent to provide the following information: the
    reason for the handoff (to understand the logic behind the decision) and the latitude
    and longitude of the location mentioned in the user query. To define this input
    type, we can use the following code:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们希望三诊代理提供以下信息：移交的原因（以了解决策背后的逻辑）以及用户查询中提到的位置的纬度和经度。为了定义此输入类型，我们可以使用以下代码：
- en: '[PRE14]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: First, we import the necessary classes from the Pydantic library. `BaseModel`
    is the base class that provides data validation capabilities, while `Field` allows
    us to add metadata to each model field.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们从 Pydantic 库中导入必要的类。`BaseModel` 是提供数据验证能力的基类，而 `Field` 允许我们为每个模型字段添加元数据。
- en: Next, we define a class called `HandoffRequest`, which includes the structure
    and validation rules for the data we want. The `specialist_agent` field stores
    the name of the receiving agent in this handoff. The `handoff_reason` field is
    a string explaining why the handoff is happening. The `latitude` and `longitude`
    fields are defined as floats, representing the geographic coordinates.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们定义一个名为`HandoffRequest`的类，它包括我们想要的数据的结构和验证规则。在这个交接中，`specialist_agent`字段存储接收代理的名称。`handoff_reason`字段是一个字符串，解释交接发生的原因。`latitude`和`longitude`字段定义为浮点数，表示地理坐标。
- en: Once the structured input is defined, the next step is to modify the callback
    function to accommodate this information.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦定义了结构化输入，下一步就是修改回调函数以适应这些信息。
- en: '[PRE15]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Lastly, let’s add this parameter to both of our handoff objects
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们将这个参数添加到我们的两个交接对象中
- en: '[PRE16]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'The rest of the script remains unchanged. Now, let’s try running it using the
    following command:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本的其余部分保持不变。现在，让我们尝试使用以下命令运行它：
- en: '[PRE17]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '![](../Images/7df5bfb9271e5ab9edd41c31485f2421.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7df5bfb9271e5ab9edd41c31485f2421.png)'
- en: Screenshot of the input_type implementation on handoff object.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 交接对象上输入类型实现的截图。
- en: 'In this example, I didn’t use the word *“weather”* directly—instead, I asked
    about *“temperature.”* From the blue info section, we can see that a handoff occurred
    to the Weather Specialist agent. We also get the reason why the triage agent made
    this decision: the query was about the current temperature, which is considered
    a weather-related topic. Additionally, the geographical location (Tokyo) is provided
    for further reference.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我没有直接使用单词*“weather”*——相反，我询问了*“temperature。”*从蓝色信息部分，我们可以看到发生了交接到天气专家代理。我们还得到了三诊代理做出这个决定的原因：查询是关于当前温度，这被认为是一个与天气相关的话题。此外，还提供了地理位置（东京）以供进一步参考。
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>The
    full script of customized handoffs can be found here:</summary>
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>自定义交接的完整脚本可以在以下位置找到：</summary>
- en: '[PRE18]</details>'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE18]</details>'
- en: Agents-as-Tools
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理作为工具
- en: We’ve already explored the handoff method and how to customize it. When a handoff
    is invoked, the task is *fully transferred* to the next agent.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经探讨了交接方法以及如何自定义它。当调用交接时，任务将*完全转移*给下一个代理。
- en: With the *Agents-as-Tools* pattern, instead of transferring full conversational
    control to another agent, the main agent—called the *orchestrator agent*—retains
    control of the conversation. It can *consult* other specialist agents as callable
    tools. In this scenario, the orchestrator agent can combine responses from different
    agents to construct a complete answer.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在*代理作为工具*模式中，与将完整的对话控制权转移到另一个代理不同，主要代理——称为*协调代理*——保留对对话的控制权。它可以*咨询*其他专家代理作为可调用的工具。在这种情况下，协调代理可以结合来自不同代理的响应来构建一个完整的答案。
- en: '![](../Images/0797eeb062ffd00b5dccdeb9ec1109b6.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0797eeb062ffd00b5dccdeb9ec1109b6.png)'
- en: Visualization of the Agents-as-Tools pattern using GraphViz.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 使用GraphViz可视化代理作为工具模式。
- en: Turn an Agent into a Tool with a Simple Method
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用简单方法将代理转换为工具
- en: 'Now, let’s get into the code. We can turn an agent into a callable tool simply
    by using the `agent.as_tool()` function. This function requires two parameters:
    `tool_name` and `tool_description`.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们进入代码部分。我们可以通过使用`agent.as_tool()`函数将代理转换为一个可调用的工具。这个函数需要两个参数：`tool_name`和`tool_description`。
- en: 'We can apply this method directly within the `tools` list of our new `orchestrator_agent`,
    as shown below:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以直接在我们的新`orchestrator_agent`的`tools`列表中应用此方法，如下所示：
- en: '[PRE19]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: In the `instruction`, we guide the agent to manage interactions between two
    specialist agents. It can invoke either one or both agents depending on the query.
    If both specialist agents are invoked, the orchestrator agent must combine their
    responses.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在`instruction`中，我们指导代理管理两个专家代理之间的交互。它可以根据查询调用一个或两个代理。如果同时调用两个专家代理，协调代理必须合并他们的响应。
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Here
    is the full script to demonstrate the agents-as-tools pattern.</summary>
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>以下是演示代理作为工具模式的完整脚本。</summary>
- en: '[PRE20]</details>'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE20]</details>'
- en: 'Save this file as `06-agents-as-tools-app.py` and run it in the terminal using
    the command below:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 将此文件保存为`06-agents-as-tools-app.py`，并在终端中使用以下命令运行：
- en: '[PRE21]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: How the Orchestrator Uses Agents
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Orchestrator如何使用代理
- en: Let’s begin with a query that triggers only one agent. In this example, I asked
    about the weather in Jakarta.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从只触发一个代理的查询开始。在这个例子中，我询问了雅加达的天气。
- en: '![](../Images/f184dfd6dfb78c0e99d9a482c1c4d11a.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f184dfd6dfb78c0e99d9a482c1c4d11a.png)'
- en: Screenshot of the agent’s response with agents-as-tools pattern for a specific
    task.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 特定任务模式下代理响应的截图。
- en: The result is similar to what we get using the handoff pattern. The weather
    specialist agent responds with the current temperature and provides suggestions
    based on the API data.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 结果与我们使用交接模式得到的结果相似。天气专家代理提供了当前的温度，并根据API数据提供建议。
- en: As mentioned earlier, one of the key advantages of using the agents-as-tools
    pattern is that it allows the orchestrator agent to consult more than one agent
    for a single query. The orchestrator intelligently plans based on the user’s intent.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，使用代理作为工具模式的一个关键优势是它允许编排代理针对单个查询咨询多个代理。编排代理根据用户的意图智能地规划。
- en: 'For example, let’s ask about both the weather and air quality in Jakarta. The
    result looks like this:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们询问雅加达的天气和空气质量。结果看起来像这样：
- en: '![](../Images/6d58c247684054d369d9eea9d1c02303.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6d58c247684054d369d9eea9d1c02303.png)'
- en: Screenshot of the agent’s response with agents-as-tools pattern for multiple
    task.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 多任务模式下代理响应的截图。
- en: The orchestrator agent first returns separate summaries from the weather and
    air quality specialist agents, along with their individual suggestions. Finally,
    it combines the insights and provides an overall conclusion—for example, recommending
    caution when spending time outdoors due to poor air quality.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 编排代理首先从天气和空气质量专家代理那里返回单独的摘要，以及他们各自的建议。最后，它结合洞察力，提供总体结论——例如，由于空气质量差，建议在户外活动时谨慎行事。
- en: Exploring the Trace Dashboard
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索跟踪仪表板
- en: Here’s an overview of the trace structure. We can see that the main branch only
    involves the Orchestrator Agent — unlike in the handoff pattern, where the Triage
    Agent transfers control to the next specialist agent.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是跟踪结构的概述。我们可以看到主分支只涉及编排代理——与交接模式不同，在交接模式中，分诊代理将控制权转交给下一个专业代理。
- en: '![](../Images/d2c1fdf2df64cf2ccd0e6db9e53b4740.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d2c1fdf2df64cf2ccd0e6db9e53b4740.png)'
- en: 'In the first LLM response, the Orchestrator Agent calls two functions: `get_weather_update()`
    and `get_air_quality_update()`. These functions were originally agents that we
    transformed into tools. Both functions receive the same input: “Jakarta”.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一个LLM响应中，编排代理调用了两个函数：`get_weather_update()`和`get_air_quality_update()`。这些函数最初是代理，我们将其转换成了工具。这两个函数接收相同的输入：“雅加达”。
- en: '![](../Images/09e4446feab9bb326891eed30b912eb7.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/09e4446feab9bb326891eed30b912eb7.png)'
- en: After receiving the outputs from both tools, the Orchestrator Agent calls the
    LLM again to combine the responses and generate a final summary.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在收到两个工具的输出后，编排代理再次调用LLM来合并响应并生成最终的摘要。
- en: Customizing Agents-as-Tools
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定制代理作为工具
- en: The method we used earlier is a quick way to turn agents into tools. However,
    as we saw in the trace dashboard, it doesn’t give us control over the input of
    each function.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前使用的方法是将代理快速转变为工具的一种方法。然而，正如我们在跟踪仪表板中看到的那样，它并没有给我们控制每个函数输入的能力。
- en: In our example, the Orchestrator Agent called the functions with “Jakarta” as
    the input. This means the task of converting that into precise geographical coordinates
    is left to the LLMs of the specialist agents. This approach is not always reliable—I
    encountered cases where the specialist agents called the API using different latitude
    and longitude values.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的例子中，编排代理使用“雅加达”作为输入调用函数。这意味着将这一转换成精确的地理坐标的任务留给了专业代理的LLM。这种方法并不总是可靠的——我遇到了专业代理使用不同的经纬度值调用API的情况。
- en: This issue can be addressed by customizing agents-as-tools with structured inputs.
    As suggested in the [documentation](https://openai.github.io/openai-agents-python/tools/#customizing-tool-agents),
    we can use `Runner.run()` within the tool implementation.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用结构化输入定制代理作为工具，可以解决这个问题。如[文档](https://openai.github.io/openai-agents-python/tools/#customizing-tool-agents)中建议，我们可以在工具实现中使用`Runner.run()`。
- en: '[PRE22]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: These two functions are decorated with `@function_tool`, similar to how we defined
    our API-call tools—turning both agents into tools that can be invoked by the Orchestrator
    Agent.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个函数被装饰了`@function_tool`，类似于我们定义的API调用工具——将这两个代理都转换成了可以被编排代理调用的工具。
- en: Each function now takes `latitude` and `longitude` as arguments, unlike the
    previous method where we couldn’t control the input values.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 现在每个函数现在都接受 `latitude` 和 `longitude` 作为参数，与之前的方法不同，我们无法控制输入值。
- en: Since we’re running the agent inside these functions, we also need to define
    the input explicitly as a formatted string that includes latitude and longitude.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们在这些函数内部运行代理，因此我们还需要明确地定义输入，作为一个包含纬度和经度的格式化字符串。
- en: 'This method provides a more reliable approach: the Orchestrator Agent determines
    the exact coordinates and passes them to the tools, rather than relying on each
    specialist agent to resolve the location—eliminating inconsistencies in API calls.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法提供了一种更可靠的方法：协调代理确定确切的坐标并将它们传递给工具，而不是依赖每个专业代理来解决位置——消除了 API 调用的不一致性。
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>A
    full script of this implementation can be found here.</summary>
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>此实现的完整脚本可以在以下位置找到。</summary>
- en: '[PRE23]</details>'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE23]'
- en: Conclusion
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'We have demonstrated two fundamental patterns of multi-agent collaboration:
    the handoff pattern and the agents-as-tools pattern.'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经展示了两种多代理协作的基本模式：交接模式和代理作为工具模式。
- en: A handoff is suitable for use cases where the main agent can delegate the entire
    conversation to a specialist agent. On the other hand, the agents-as-tools pattern
    is powerful when the main agent needs to maintain control over the task.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 交接模式适用于主要代理可以将整个对话委托给专业代理的场景。另一方面，当主要代理需要保持对任务的控制时，代理作为工具模式非常强大。
- en: Although the use cases in this article are relatively simple, they illustrate
    how agents can work and collaborate effectively. From here after knowing when
    to use handoff or agents-as-tools, you can continue your exploration on building
    specialize agent with more challanging task and tools.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管本文中的用例相对简单，但它们说明了代理如何有效地工作和协作。从现在开始，了解何时使用交接或代理作为工具，你可以继续探索构建具有更具挑战性任务和工具的专用代理。
- en: We will continue the journey on my next installment of Hands-On with Agents
    SDK soon.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在下一期《与代理 SDK 一起动手》中继续我们的旅程。
