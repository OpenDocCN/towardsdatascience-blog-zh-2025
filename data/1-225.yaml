- en: 'Smarter, Not Harder: How AI’s Self-Doubt Unlocks Peak Performance'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 智慧，而非艰难：AI的自我怀疑如何解锁峰值性能
- en: 原文：[https://towardsdatascience.com/smarter-not-harder-how-ais-self-doubt-unlocks-peak-performance/](https://towardsdatascience.com/smarter-not-harder-how-ais-self-doubt-unlocks-peak-performance/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/smarter-not-harder-how-ais-self-doubt-unlocks-peak-performance/](https://towardsdatascience.com/smarter-not-harder-how-ais-self-doubt-unlocks-peak-performance/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: <mdspan datatext="el1759375066316" class="mdspan-comment">Large Language Models</mdspan>
    (LLMs) are increasingly capable of solving complex reasoning tasks, such as math
    **Olympiad problems, scientific Q&A, and multi-step logical puzzles***[3,8]*.
    But are they really great? Yes, they are, but right now, they are very computationally
    expensive and inefficient at test time*[5,6]*. To address this challenge, Researchers
    at **Meta AI** have come up with a solution called “**DeepConf**,” also known
    as “**Deep Think with Confidence”**[*[1]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759375066316" class="mdspan-comment">大型语言模型</mdspan>（LLMs）越来越能够解决复杂的推理任务，例如数学奥林匹克问题、科学问答和多步逻辑谜题[*[3,8]*]。但它们真的很好吗？是的，它们确实很好，但到目前为止，它们在测试时的计算成本非常高且效率低下[*[5,6]*]。为了应对这一挑战，Meta
    AI的研究人员提出了一种名为“**DeepConf**”的解决方案，也称为“**Deep Think with Confidence**”[*[1]*](https://arxiv.org/pdf/2508.15260)。
- en: There is a problem known as self-consistency with majority voting.
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 存在一个被称为多数投票自洽性的问题。
- en: I am sure you are wondering what this problem looks like in practice. Imagine
    a classroom of 100 students. You gave them a complex Olympiad problem and an hour
    to solve it. At the end, you can take all the answers and vote — the answers with
    the most votes “win.”
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信你一定想知道这个问题在实际中是什么样子。想象一下一个有100名学生的教室。你给他们一个复杂的奥林匹克数学问题，并让他们有一个小时的时间去解决它。最后，你可以收集所有的答案并投票——得票最多的答案“获胜。”
- en: '![](../Images/9e120b4febd1b5a2be6cd39856c46880.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9e120b4febd1b5a2be6cd39856c46880.png)'
- en: '(Source: Author)'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: This is how the self-consistency with the majority problem works in LLMs[*[2,3]*](https://arxiv.org/abs/2203.11171).
    Instead of only 1 solution, the model explores hundreds of reasoning paths (for
    example, 512 different step-by-step solutions) and then chooses the most frequent
    answer.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是LLMs中多数投票自洽性问题的工作原理[*[2,3]*](https://arxiv.org/abs/2203.11171)。模型不仅仅探索一个解决方案，而是探索数百个推理路径（例如，512个不同的逐步解决方案），然后选择最频繁的答案。
- en: On the **AIME 2025 math benchmark,** a single pass by **Qwen3–8B** (called pass@1)
    gets about **68%** accuracy; it’s like taking 1 answer from 1 student. But if
    you generate **512 reasoning traces per question** (called conf@512) and take
    the majority answer, then accuracy jumps to **82%**[*[1,4]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在**AIME 2025数学基准测试**中，**Qwen3–8B**（称为pass@1）的单次遍历大约达到**68%**的准确率；这就像从一名学生那里得到一个答案。但如果你为每个问题生成**512个推理轨迹**（称为conf@512）并取多数答案，那么准确率会跃升至**82%**[*[1,4]*](https://arxiv.org/pdf/2508.15260)。
- en: Sounds great, right? The catch is that those extra 511 traces generate nearly
    **100 million additional tokens,** and more traces don’t always help; performance
    will remain the same or even drop sometimes when low-quality solutions dominate
    the vote[*[1,7,8]*](https://arxiv.org/pdf/2508.15260). In other words, if the
    students are guessing randomly, then the class vote doesn’t reflect the best thinker
    in the room[*[1]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 听起来很棒，对吧？但问题是，那额外的511个轨迹产生了近**1亿个额外的标记**，而且更多的轨迹并不总是有帮助；当低质量的解决方案主导投票时，性能可能会保持不变，甚至有时还会下降[*[1,7,8]*](https://arxiv.org/pdf/2508.15260)。换句话说，如果学生们在随机猜测，那么班级投票并不能反映教室里最好的思考者[*[1]*](https://arxiv.org/pdf/2508.15260)。
- en: '* * *'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'What did the researchers do about it: Early Fixes'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 研究者们对此采取了什么措施：早期修复
- en: Researchers tried to solve this problem by looking at the model’s internal uncertainty
    signals. Now what’s that internal un…… It’s like looking at each student after
    some period of time, suppose every 5 minutes, to see if they are doing the correct
    baby steps or not. The model looks at the probability distribution of each token
    and calculates its confidence or entropy at a particular time. If the model has
    high confidence or low entropy (low spread with a high peak), then the model is
    certain about the particular token prediction, and vice versa[*[1,11]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 研究者们试图通过观察模型的内部不确定性信号来解决这一问题。现在，那内部的不确定性是什么？就像在一段时间后（比如每5分钟）观察每个学生是否在做正确的初步步骤。模型观察每个标记的概率分布，并在特定时间计算其置信度或熵。如果模型对特定标记的预测有很高的置信度或很低的熵（高峰值的低分散），那么模型对这个特定标记的预测很确定，反之亦然[*[1,11]*](https://arxiv.org/pdf/2508.15260)。
- en: By adding these token-level prediction statistics across a whole reasoning trace,
    we can estimate how **“trustworthy”** the solution really is. We can also filter
    out the low-confidence traces before majority voting — just like ignoring the
    answers from the students who clearly guessed. **Fewer bad votes, Stronger results**[*[1]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在整个推理轨迹中添加这些标记级预测统计，我们可以估计解决方案的真正“可信度”。我们还可以在多数投票之前过滤掉低置信度轨迹——就像忽略那些明显猜测的学生的答案一样。**减少错误投票，增强结果**[*[1]*](https://arxiv.org/pdf/2508.15260)。
- en: '![](../Images/3d54f6c789f1055af52ebfac92589ab4.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3d54f6c789f1055af52ebfac92589ab4.png)'
- en: '(source: Author)'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: However, these methods are still global and don’t fully solve the efficiency
    problem[*[1,6,13]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这些方法仍然是全局性的，并没有完全解决效率问题[*[1,6,13]*](https://arxiv.org/pdf/2508.15260)。
- en: Let’s talk about some maths here, such as how token entropy, token confidence,
    and trace confidence work [*[1,11]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在这里谈谈一些数学问题，比如标记熵、标记置信度和轨迹置信度是如何工作的[*[1,11]*](https://arxiv.org/pdf/2508.15260)。
- en: 'Token Entropy:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 标记熵：
- en: '![](../Images/9c260125a9c270ee52bdfbc222f544a7.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9c260125a9c270ee52bdfbc222f544a7.png)'
- en: '(Source: Author)'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: Let’s break this Entropy thing. The **logPᵢ(j)** term tells how surprising the
    token prediction is, with the Probability of the token at the ith position. When
    the probability is 1 (the model is dead sure, surprise is 0\. No drama, no uncertainty),
    which tells the model is highly certain about the token prediction. We then take
    the average of all token entropies to define the entropy in each step or token
    prediction[*[1]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解一下这个熵的概念。**logPᵢ(j)**项说明了标记预测的惊喜程度，即第i个位置上标记的概率。当概率为1（模型非常确定，惊喜为0。没有戏剧性，没有不确定性）时，这表明模型对标记预测非常确定。然后我们取所有标记熵的平均值来定义每一步或标记预测中的熵[*[1]*](https://arxiv.org/pdf/2508.15260)。
- en: 'Token Confidence:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 标记置信度：
- en: '![](../Images/76c5ae4aff6a2eacc578a1617cf2dbf1.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/76c5ae4aff6a2eacc578a1617cf2dbf1.png)'
- en: '(Source: Author)'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: Token Confidence senses how sharp it guesses for each token prediction (anti-surprise
    meter)[*[1]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 标记置信度感知每个标记预测的猜测有多尖锐（反惊喜计)[*[1]*](https://arxiv.org/pdf/2508.15260)。
- en: 'Average Trace Confidence:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 平均轨迹置信度：
- en: '![](../Images/16c5f9ef652b4dbe9635131ba6b4e2b9.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/16c5f9ef652b4dbe9635131ba6b4e2b9.png)'
- en: '(Source: Author)'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: While we are calculating the confidence in each token, the average of these
    confidence scores gives the confidence of the trace[*[1]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在每个标记上计算置信度时，这些置信度分数的平均值给出了轨迹的置信度[*[1]*](https://arxiv.org/pdf/2508.15260)。
- en: '* * *'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Confidence-Aware Test Time Scaling: DeepConf
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自信感知测试时间缩放：DeepConf
- en: DeepConf takes the idea further, instead of taking hundreds of solutions and
    simply voting on them*[2,3,12]*. It looks at the model’s internal confidence signals
    during and after generation. It filters out low-quality reasoning traces dynamically,
    either in real time (online mode) or after all the solutions are generated (offline
    mode). It keeps only the most trusted reasoning ways and reduces wasted computation[*[1,6]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: DeepConf将这一想法进一步发展，而不是简单地投票数百个解决方案*[2,3,12]*。它观察模型在生成过程中和生成后的内部置信度信号。它动态地过滤掉低质量的推理轨迹，无论是在实时（在线模式）还是在所有解决方案生成后（离线模式）。它只保留最可信的推理方式，并减少浪费的计算[*[1,6]*](https://arxiv.org/pdf/2508.15260)。
- en: And the results? On AIME 2025, DeepConf@512 with GPT-OSS-120B hits a jaw-dropping
    99.9% accuracy. Compared with plain majority voting, it is 97.0%, and a single
    attempt (pass@1) achieves only 91.8%. At the same time, DeepConf reduces token
    generation by **up to 84.7%** compared to brute-force parallel thinking[*[1,6,7]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 结果如何？在AIME 2025上，DeepConf@512与GPT-OSS-120B达到了令人震惊的99.9%准确率。与简单的多数投票相比，它提高了97.0%，而单次尝试（pass@1）仅达到91.8%。同时，DeepConf将标记生成量减少了**高达84.7**%，与蛮力并行思维相比[*[1,6,7]*](https://arxiv.org/pdf/2508.15260)。
- en: With the intuition clear, it’s time to see how these confidence measures actually
    work under the hood.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 直观感清晰后，是时候看看这些置信度指标实际上是如何在幕后工作的了。
- en: 'Group Confidence:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 组自信：
- en: '![](../Images/7f36c01e50b5e1b132ba95b352dc8a16.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7f36c01e50b5e1b132ba95b352dc8a16.png)'
- en: '(Source: Author)'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: Cₜ is still our token level confidence. Think of group confidence (C_Gᵢ) as
    a zoomed-in check for the certainty, where |Gᵢ| is the number of previous tokens
    with the overlapping window (example 1024 or 2048 tokens). This gives us a local
    snapshot of the certainty[*[1]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: Cₜ 仍然是我们的标记级置信度。将组置信度（C_Gᵢ）视为对确定性的放大检查，其中 |Gᵢ| 是具有重叠窗口的前置标记数量（例如 1024 或 2048
    个标记）。这为我们提供了一个确定性的局部快照[*[1]*](https://arxiv.org/pdf/2508.15260)。
- en: 'Bottom 10% Group Confidence:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 底部 10% 组置信度：
- en: '![](../Images/d1a670d121f7dcef4b5b7ad507f20322.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d1a670d121f7dcef4b5b7ad507f20322.png)'
- en: '(Source: Author)'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: When we sort the Group confidence score and zoom in on the bottom 10%, we are
    basically shining a light on the weakest links in the chain of reasoning. If those
    steps look shaky, we can toss them out to save our computation[*[1]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们按组置信度分数排序并聚焦于底部 10% 时，我们基本上是在照亮推理链中最薄弱的环节。如果这些步骤看起来不稳定，我们可以将它们丢弃以节省计算[*[1]*](https://arxiv.org/pdf/2508.15260)。
- en: 'Tail Confidence:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 尾部置信度：
- en: '![](../Images/dc0478d94290d22134cd16ca53e88267.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dc0478d94290d22134cd16ca53e88267.png)'
- en: '(Source: Author)'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: （来源：作者）
- en: Tail confidence is simple; we just take the last fixed number of tokens, like
    2048, and find how confident the model is in the last few steps (checking the
    last mile), a critical step for predicting the correct conclusions[*[1]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 尾部置信度很简单；我们只需取最后固定数量的标记，例如 2048，然后找到模型在最后几步（检查最后一步）的置信度，这是预测正确结论的关键步骤[*[1]*](https://arxiv.org/pdf/2508.15260)。
- en: 'We can use the DeepConf in two modes: Offline and online[*[1]*](https://arxiv.org/pdf/2508.15260).'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用 DeepConf 在两种模式下使用：离线和在线[*[1]*](https://arxiv.org/pdf/2508.15260)。
- en: '* * *'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Offline Thinking with Confidence
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 离线思考与置信度
- en: When you are offline, you don’t call the model again and again or fetch extra
    data. Instead, you are left with traces you’ve already generated.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 当你离线时，你不再一次又一次地调用模型或获取额外数据。相反，你只剩下已经生成的迹。
- en: The challenge is to squeeze the most reliable answers out of them.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战是从它们中挤出最可靠的答案。
- en: In Offline Mode, we can do plain voting of the outcome traces(which can break
    when there are more noisy outcomes) or confidence-weighted majority voting, where
    we take the mean confidence value of the trace and simply take the product of
    the confidence score with the occurrence of that solution[*[1,2]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在离线模式下，我们可以对结果迹进行普通投票（当有更多噪声结果时可能会中断）或置信度加权的多数投票，其中我们取迹的平均置信度值，并简单地取置信度分数与该解决方案出现的乘积[*[1,2]*](https://arxiv.org/pdf/2508.15260)。
- en: 'Confidence Filtering and Voting: Before voting, discard the weakest traces.
    First filter traces by confidence (take top n% of the traces) and then either
    do plain voting or weighted confidence voting[*[1,9,10]*](https://arxiv.org/pdf/2508.15260).'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 置信度过滤和投票：在投票之前，丢弃最弱的迹。首先按置信度过滤迹（取迹的前 n%）然后进行普通投票或加权置信度投票[*[1,9,10]*](https://arxiv.org/pdf/2508.15260)。
- en: You can take whichever confidence metrics suit you, like Average confidence,
    Group Confidence, or tail confidence[*[1,10,11]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以选择任何适合你的置信度指标，如平均置信度、组置信度或尾部置信度[*[1,10,11]*](https://arxiv.org/pdf/2508.15260)。
- en: '![](../Images/847ad2b01fef9bf37cd717122a87807e.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/847ad2b01fef9bf37cd717122a87807e.png)'
- en: 'Algorithm 1 for Offline Thinking (source: Deep Think with Confidence[*[1]*](https://arxiv.org/pdf/2508.15260))'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 算法 1 用于离线思考（来源：Deep Think with Confidence[*[1]*](https://arxiv.org/pdf/2508.15260))
- en: '**Step-by-step explanation:**'
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**逐步解释：**'
- en: '**Inputs:**'
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**输入：**'
- en: '**Prompt P**: the question or input you want answered.'
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示 P：** 你想要回答的问题或输入。'
- en: '**Number of traces N**: how many reasoning paths you will generate.'
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**迹的数量 N：** 你将生成多少推理路径。'
- en: '**Filtering threshold 𝜂**: the percentage of top traces to filter on.'
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**过滤阈值 𝜂：** 过滤顶部迹的百分比。'
- en: '**Confidence measurement C(t):** to compute the confidence score of a trace
    by any method you want[[1]](https://arxiv.org/pdf/2508.15260).'
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**置信度测量 C(t)：** 通过任何你想要的方法计算迹的置信度分数[[1]](https://arxiv.org/pdf/2508.15260)。'
- en: '**Initialization:**'
  id: totrans-64
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**初始化：**'
- en: Create an empty set T.
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 创建一个空集 T。
- en: create an empty confidence set C[[1]](https://arxiv.org/pdf/2508.15260).
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 创建一个空的置信度集 C[[1]](https://arxiv.org/pdf/2508.15260)。
- en: '**Generate Traces:**'
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**生成迹：**'
- en: '**For each iteration from 1 to N**: You can generate a trace tᵢ​ for prompt
    P.'
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**对于从 1 到 N 的每个迭代：** 你可以为提示 P 生成一个迹 tᵢ。'
- en: '**Calculate the confidence****score** Cᵢ ​= C(tᵢ​).'
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**计算置信度** **分数** Cᵢ = C(tᵢ)。'
- en: '**Store the pair (tᵢ, Cᵢ)** in T and C[[1]](https://arxiv.org/pdf/2508.15260)**.**'
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**将(tᵢ, Cᵢ)对存储在T和C[[1]](https://arxiv.org/pdf/2508.15260)**中**。'
- en: '**Filter High-Confidence Traces:**'
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**过滤高置信度跟踪**：'
- en: From all N traces, select the top η% based on their confidence scores.
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 从所有N跟踪中，根据它们的置信度分数选择前η%。
- en: This removes the noisy or low-quality traces, keeping only strong confident
    answer[[1]](https://arxiv.org/pdf/2508.15260).
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这移除了噪声或低质量的跟踪，只保留强置信度答案[[1]](https://arxiv.org/pdf/2508.15260)。
- en: '**Voting:**'
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**投票**：'
- en: we can calculate the vote score V(a) for each possible answer a.
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们可以计算每个可能的答案a的投票分数V(a)。
- en: This can be plain counting or weighted voting[[1]](https://arxiv.org/pdf/2508.15260).
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这可以是简单的计数或加权投票[[1]](https://arxiv.org/pdf/2508.15260)。
- en: '**Select the Final Answer:**'
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**选择最终答案**：'
- en: 'Choose the answer âwith the highest vote score[[1]](https://arxiv.org/pdf/2508.15260):'
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 选择得票数最高的答案[[1]](https://arxiv.org/pdf/2508.15260)：
- en: '![](../Images/e908247c4dd8954dd9c1f5901643be91.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e908247c4dd8954dd9c1f5901643be91.png)'
- en: '(Source: Author)'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: '![](../Images/432999ebd8f1a449ff14684227defb15.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/432999ebd8f1a449ff14684227defb15.png)'
- en: 'Condidence measurements and Ofline Thinking with confidence (source: Deep Think
    with Confidence[*[1]*](https://arxiv.org/pdf/2508.15260))'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 置信度测量和离线自信思考（来源：Deep Think with Confidence[*[1]*](https://arxiv.org/pdf/2508.15260))
- en: '* * *'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Online Thinking with Confidence
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在线自信思考
- en: The algorithm generates the traces on the fly, dynamically measuring confidence
    when there is enough proof[*[1,5,14,15]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 算法在动态生成跟踪的同时，在有足够证据时测量置信度[*[1,5,14,15]*](https://arxiv.org/pdf/2508.15260)。
- en: '**The Algorithm:**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**算法**：'
- en: '![](../Images/bbd46d65fa7d0f631256c396c092ed1b.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bbd46d65fa7d0f631256c396c092ed1b.png)'
- en: 'Algorithm 2 for online Thinking (source: Deep Think with Confidence[[1]](https://arxiv.org/pdf/2508.15260))'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 算法2用于在线思考（来源：Deep Think with Confidence[[1]](https://arxiv.org/pdf/2508.15260))
- en: '**Step-by-Step Explanation**'
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**逐步解释**'
- en: '**1\. Inputs**'
  id: totrans-90
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**1. 输入**'
- en: '**Prompt P:** again the question you’re answering.'
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示P**：再次回答的问题。'
- en: '**Trace budget B**: It is for the maximum number of traces you want to generate.'
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**跟踪预算B**：这是你想要生成的最大跟踪数。'
- en: '**Initial traces N**ᵢₙᵢₜ​: It’s a starting pool of traces to warm up with.'
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**初始跟踪N**ᵢₙᵢₜ：这是一个用于预热的起始跟踪池。'
- en: '**Filtering threshold η**: how many high-confidence traces to keep.'
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**过滤阈值η**：保留多少高置信度跟踪。'
- en: '**Consensus threshold τ**: It gives a percentage that reflects, when you can
    stop because you’re confident in the majority answer[[1]](https://arxiv.org/pdf/2508.15260).'
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**共识阈值τ**：它给出一个百分比，表示当你对多数答案有信心时可以停止[[1]](https://arxiv.org/pdf/2508.15260)。'
- en: '**2\. Offline Warmup**'
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**2. 离线预热**'
- en: '**Before generating online**:'
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**在线生成之前**：'
- en: Run Algorithm 1 with Nᵢₙᵢₜ​ traces.
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 使用Nᵢₙᵢₜ跟踪运行算法1。
- en: '**Compute the confidence threshold s**:'
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**计算置信度阈值s**：'
- en: Take the 100, η percentile of the confidence scores from the initial traces.
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 从初始跟踪中取100, η百分位数的置信度分数。
- en: This defines the minimum confidence a token/group needs to be considered.
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这定义了标记/组需要达到的最小置信度才能被考虑。
- en: Initialize the trace set T with the initial traces and calculate initial vote
    values V(a) for all answers[[1]](https://arxiv.org/pdf/2508.15260).
  id: totrans-102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 使用初始跟踪初始化跟踪集T，并计算所有答案的初始投票值V(a)[[1]](https://arxiv.org/pdf/2508.15260)。
- en: '![](../Images/9c9d0ebbb5fd4db1c5c9e2afafde0acb.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9c9d0ebbb5fd4db1c5c9e2afafde0acb.png)'
- en: '(Source: Author)'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: Determine the initial majority answer â[[1]](https://arxiv.org/pdf/2508.15260).
  id: totrans-105
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 确定初始多数答案â[[1]](https://arxiv.org/pdf/2508.15260)。
- en: '**3\. Online Generation Loop**'
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**3. 在线生成循环**'
- en: 'While two conditions hold:'
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当两个条件保持时：
- en: 'The current majority answer is not yet confident enough:'
  id: totrans-108
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当前多数答案还不够自信：
- en: '![](../Images/ef1ab88074706512a3cba5eee7b18345.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ef1ab88074706512a3cba5eee7b18345.png)'
- en: '(Source: Author)'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: (来源：作者)
- en: And you still haven’t exceeded the trace budget |T|<B
  id: totrans-111
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你还没有超过跟踪预算|T|<B
- en: '→ Keep generating new traces[[1]](https://arxiv.org/pdf/2508.15260):'
  id: totrans-112
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: → 继续生成新的跟踪[[1]](https://arxiv.org/pdf/2508.15260)：
- en: '**4\. Generate a Trace Step-by-Step**'
  id: totrans-113
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**4. 逐步生成跟踪**'
- en: 'While generating a trace t: Generate token by token.'
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在生成跟踪t时：逐个生成token。
- en: After each token iii, calculate the group confidence C_Gᵢ for that token/group.
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在每个token iii之后，计算该token/组的组置信度C_Gᵢ。
- en: 'If C_Gᵢ<s: stop generating the trace (low confidence).'
  id: totrans-116
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果C_Gᵢ<s：停止生成跟踪（置信度低）。
- en: 'Else: add token iii to the trace t[[1]](https://arxiv.org/pdf/2508.15260).'
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 否则：将token iii添加到跟踪t[[1]](https://arxiv.org/pdf/2508.15260)。
- en: '**5\. Update**'
  id: totrans-118
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**5. 更新**'
- en: Add the completed trace ttt to the trace set T.
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 将完成的跟踪ttt添加到跟踪集T。
- en: Compute the trace confidence Cₜ​.
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 计算跟踪置信度Cₜ​。
- en: Update vote counts V(a) for all answers.
  id: totrans-121
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 更新所有答案的投票计数 V(a)。
- en: Update the majority answer â[[1]](https://arxiv.org/pdf/2508.15260).
  id: totrans-122
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 更新多数答案 â[[1]](https://arxiv.org/pdf/2508.15260).
- en: '**6\. Termination**'
  id: totrans-123
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**6. 终止**'
- en: 'Stop when either:'
  id: totrans-124
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当以下任一条件满足时停止：
- en: The majority answer âachieves consensus above the threshold τ.
  id: totrans-125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 多数答案 â达到阈值 τ 以上的共识。
- en: Or the trace budget B is reached.
  id: totrans-126
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 或者达到迹预算 B。
- en: Return the final majority answer â[[1]](https://arxiv.org/pdf/2508.15260).
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 返回最终的多数答案 â[[1]](https://arxiv.org/pdf/2508.15260).
- en: '![](../Images/b0268d3685ffbce520b3f70650824b52.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b0268d3685ffbce520b3f70650824b52.png)'
- en: 'DeepConf during Online Generation (source: Deep Think with Confidence[*[1]*](https://arxiv.org/pdf/2508.15260))'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: DeepConf 在在线生成期间（来源：Deep Think with Confidence[*[1]*](https://arxiv.org/pdf/2508.15260))
- en: I think this algorithm is the art of early stopping and saving an enormous amount
    of computation and resources[*[1,5,6,7,13,14]*](https://arxiv.org/pdf/2508.15260).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这个算法是早期停止的艺术，可以节省大量的计算和资源[*[1,5,6,7,13,14]*](https://arxiv.org/pdf/2508.15260).
- en: '* * *'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-132
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: So, what do you think? What is the moral of the story? Even the smartest **“students”**
    in the AI classroom sometimes need a little self-doubt to shine. DeepConf shows
    how powerful self-doubt is. We can save millions of computations not by brute
    force but by choosing smarter, confidence-based approaches. It’s like turning
    a chaotic math contest into a calm team of expert problem-solvers.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你认为呢？这个故事的意义是什么？即使在人工智能课堂中，最聪明的“学生”有时也需要一点自我怀疑才能发光。DeepConf 展示了自我怀疑有多么强大。我们可以通过选择更智能、基于置信度的方法来节省数百万次的计算，而不是通过蛮力。这就像将混乱的数学竞赛转变为一个冷静的专家问题解决团队。
- en: As AI keeps learning to think with confidence, we’re moving toward a future
    where models are not only smarter but also thriftier, spending less compute, making
    fewer mistakes, and delivering more brainpower per token. And who knows? Maybe
    one day your favorite model will be your most frugal, self-aware study buddy.
    Until then, let’s keep thinking smarter, not harder.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能不断学习自信地思考，我们正朝着这样一个未来迈进：模型不仅更聪明，而且更节俭，计算量更少，错误更少，每个标记提供的脑力更多。谁知道呢？也许有一天，你最喜欢的模型将成为你最节俭、最自知的伙伴。在此之前，让我们继续更聪明地思考，而不是更努力。
- en: '* * *'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
