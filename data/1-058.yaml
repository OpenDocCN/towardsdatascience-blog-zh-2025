- en: Random and Unique Sample from a List
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从列表中随机且唯一地抽取样本
- en: 'Suppose we want to get 5 random cards for each of the 4 player. We cannot use
    the `choice()` function because we want unique cards from the deck, with no card
    repeating. We will use the `sample()` function for this purpose:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要为每位玩家抽取5张随机卡片。我们不能使用`choice()`函数，因为我们希望从牌堆中抽取独特的卡片，没有重复的卡片。我们将使用`sample()`函数来完成这个任务：
- en: '[PRE7]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/d5f3eebf5cc17f3f66744bfb4ef3990b.png)'
