- en: How to Implement Randomization with the Python Random Module
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用 Python 随机模块实现随机化
- en: 原文：[https://towardsdatascience.com/implementing-randomisation-with-the-python-random-module/](https://towardsdatascience.com/implementing-randomisation-with-the-python-random-module/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/implementing-randomisation-with-the-python-random-module/](https://towardsdatascience.com/implementing-randomisation-with-the-python-random-module/)
- en: <mdspan datatext="el1764015159330" class="mdspan-comment">Introduction</mdspan>
    to Randomisation
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764015159330" class="mdspan-comment">随机化简介</mdspan>
- en: 'In our day-to-day life, we come across several different phenomena that are
    totally random. The weather is random: sure, we can forecast and predict the weather,
    but to a certain degree only. Radioactive decay is also an interesting random
    process that lacks patterns and predictability. Unlike computers that are deterministic
    and function the way they are programmed, nature does not require any programming,
    conditionals, or loops. Things happen in the most random and unpredictable ways,
    and this is the kind of unpredictability that we also sometimes require in our
    computers and applications, such as games.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的日常生活中，我们会遇到许多完全随机不同的现象。天气是随机的：当然，我们可以预测和预测天气，但只能达到一定程度。放射性衰变也是一个有趣的随机过程，缺乏模式和可预测性。与按照编程方式运行的确定性计算机不同，自然界不需要任何编程、条件或循环。事情以最随机和不可预测的方式发生，这就是我们在计算机和应用程序（如游戏）中也需要的这种不可预测性。
- en: We need randomness and unpredictability in the games that we play so that we
    do not get bored of the preprogrammed scenarios and predictable challenges. We
    also need the element of randomness in simulating real-world scenarios, testing
    algorithms, or generating sample datasets.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们玩的游戏中，我们需要随机性和不可预测性，这样我们才不会对预编程的场景和可预测的挑战感到厌倦。我们还需要在模拟现实场景、测试算法或生成样本数据集中包含随机性元素。
- en: '![](../Images/bf923912b8123a493ed51f2420689e5f.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bf923912b8123a493ed51f2420689e5f.png)'
- en: Photo by [Wolfgang Hasselmann](https://unsplash.com/@wolfgang_hasselmann?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText)
    on [Unsplash](https://unsplash.com/photos/blue-sky-and-white-clouds-over-lake-bR_-gllg7Bs?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Wolfgang Hasselmann](https://unsplash.com/@wolfgang_hasselmann?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText)
    在 [Unsplash](https://unsplash.com/photos/blue-sky-and-white-clouds-over-lake-bR_-gllg7Bs?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText)
    提供
- en: In programming languages, randomisation refers to introducing unpredictability
    and variability in the computer’s output. Randomness is generated in a program
    through random numbers.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在编程语言中，随机化指的是在计算机输出中引入不可预测性和可变性。随机性是通过程序中的随机数生成的。
- en: There are several methods for generating pseudo-random numbers. Python uses
    the Mersenne Twister for randomness in its random module. While extensively used
    as a Pseudo-Random Number Generator (PRNG), the Mersenne Twister has deterministic
    properties, making it unsafe for certain tasks that requires safety as a priority.
    In programming, generating a totally random number is quite difficult, so we make
    use of the concept of generating the pseudo-random numbers, although they are
    reproducible if given a seed value, as can be seen ahead.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 生成伪随机数有多种方法。Python 使用梅森旋转器在其随机模块中实现随机性。虽然广泛用作伪随机数生成器（PRNG），但梅森旋转器具有确定性属性，使其在某些以安全性为首要任务的任务中不安全。在编程中，生成完全随机的数字相当困难，所以我们利用生成伪随机数的概念，尽管如果给定一个种子值，它们是可重复的，如以下所示。
- en: In this article, we will explore the concept of randomisation by employing the
    Python random module to generate randomness in our code’s outputs.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将通过使用 Python 随机模块来生成代码输出的随机性来探讨随机化的概念。
- en: The Python Random Module
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Python 随机模块
- en: 'Now let us deep dive into the random module. Firstly, we know that randomness
    in this module is generated by the Mersenne Twister using Mersenne Primes. This
    built-in module of Python allows us to generate randomness in our code in a variety
    of ways and provides flexibility while we work with different datatypes. Let us
    understand its functions through examples. You can access the official documentation
    of this module via the following link:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们深入探讨随机模块。首先，我们知道这个模块中的随机性是通过梅森旋转器使用梅森素数生成的。这个 Python 的内置模块允许我们以多种方式在我们的代码中生成随机性，并在我们处理不同数据类型时提供灵活性。让我们通过示例来了解其功能。您可以通过以下链接访问该模块的官方文档：
- en: '[`random` — Generate pseudo-random numbers](https://docs.python.org/3/library/random.html)'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '`random` — 生成伪随机数（[random — Generate pseudo-random numbers](https://docs.python.org/3/library/random.html)）'
- en: 'In order to use the random module, we need to make sure to import it in our
    code first:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用随机模块，我们需要确保首先在我们的代码中导入它：
- en: '[PRE0]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Random Float Value between 0 and 1
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在0和1之间生成随机浮点值
- en: The first task we will learn is to generate a random value between 0 and 1 with
    0 being non-inclusive and 1 being inclusive. This can be done with the `random()`
    function.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将学习的第一个任务是生成一个介于0和1之间的随机值，其中0是不包含的，1是包含的。这可以通过`random()`函数完成。
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The above code will generate a random float value between 0 and 1\. If you run
    the above code a number of times, each time the value will be different.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码将生成一个介于0和1之间的随机浮点值。如果您多次运行上述代码，每次的值都将不同。
- en: Random Float Value within a Specified Range
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在指定范围内生成随机浮点值
- en: We can use the `uniform()` function of the random module in order to generate
    a random number in a specific range.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用随机模块的`uniform()`函数来生成特定范围内的随机数。
- en: '[PRE2]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Running the above code a number of times would output numbers between the range
    mentioned in the brackets.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 多次运行上述代码将输出括号中提到的范围内的数字。
- en: Random Integer Value in a Specific Range
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在特定范围内生成随机整数
- en: Suppose we want a random value from a dice, like is needed in many games, we
    can include this feature in our code using the `randint()` function. This function
    outputs a random integer unlike the above functions which outputs a float value.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要一个类似在许多游戏中需要的骰子随机值，我们可以使用`randint()`函数将此功能包含在我们的代码中。此函数输出一个随机整数，与上述函数不同，它输出一个浮点值。
- en: '[PRE3]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Notice that by running the above piece of code, the 1 and 6 will be inclusive
    in the random values generated.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，运行上述代码片段时，生成的随机值将包括1和6。
