    function, as well as the weights of each item in the list alongwith how long of
    an output list with randomly selected items we want. Notice the number of times
    the fruit “apple” occurs due to its increased weight.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述代码中，我们已将mylist作为输入序列传递给`choice()`函数，以及列表中每个项目的权重，以及我们想要生成的随机选择项目的输出列表的长度。注意由于“apple”的权重增加，其出现的次数。
- en: Random Shuffle a List of Items
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 随机打乱项目列表
- en: Next we will learn to randomly shuffle the items in a list. We can use the `shuffle()`
    function in the random module for this purpose.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将学习如何随机打乱列表中的项目。我们可以使用随机模块中的`shuffle()`函数来完成这个任务。
