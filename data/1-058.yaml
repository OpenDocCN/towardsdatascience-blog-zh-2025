- en: Random Integer from a Specific Range with Step Size
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 具有步长的特定范围内的随机整数
- en: The `randrange()` function can be used to randomly choose a number from a specific
    range where the start and stop values and the steps are defined.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '`randrange()`函数可以用来从指定范围内随机选择一个数字，其中起始值、结束值和步长都是定义好的。'
- en: '[PRE8]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The above block will produce the numbers from 0 to 8 as 10 is non-inclusive
    and we have defined 2 as the step size.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的代码块将生成从0到8的数字，因为10是非包含的，我们已将2定义为步长。
- en: Seed Value
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 种子值
- en: An interesting feature of the random module in Python is the function `seed()`.
    This seed value is used as a starting point for random number generation, and
    is a major feature to trace reproducibility and pattern. Whenever we are using
    the random value to generate a random number, it is actually generating it from
    a random seed value, but we can define the seed value ourselves as well through
    the `seed()` function.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: Python中随机模块的一个有趣特性是`seed()`函数。这个种子值被用作随机数生成的起点，是追踪可重复性和模式的主要特性。每次我们使用随机值来生成随机数时，它实际上是从一个随机种子值生成的，但我们可以通过`seed()`函数自己定义种子值。
- en: '[PRE9]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The above code will always generate the random number ‘2’ because of a defined
    seed value ’22’. If we give the seed value ’55’, it will give you ‘0’ again and
    again.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 由于定义了种子值‘22’，上述代码将始终生成随机数‘2’。如果我们给出种子值‘55’，它将反复生成‘0’。
- en: Applications of the Random Module
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 随机模块的应用
- en: Although there are more functions in the random module and many more implementations,
    the above functions are some of the most commonly used. Python’s random module
    can be used in a number of ways, mostly in games and real-world simulations. We
    can use the random module in games that involve rolling the dice as was explored
    above, in a coin toss game, and even as a random password generator. We can also
    simulate the Rock, Paper, Scissors game with the random module with a bit of conditionals
    and loops!
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然随机模块中有更多函数和许多实现方式，但上述函数是一些最常用的。Python的随机模块可以用多种方式使用，主要是在游戏和现实世界的模拟中。我们可以使用随机模块在涉及掷骰子的游戏中，如上面所探讨的，在抛硬币游戏中，甚至作为随机密码生成器。我们还可以使用随机模块和一些条件语句和循环来模拟剪刀石头布游戏！
