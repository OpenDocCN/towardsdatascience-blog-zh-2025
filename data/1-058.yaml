- en: Random Value from a List of Values
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从值列表中获取随机值
- en: Next, we will see how to generate a random value from a list of values. We can
    do this by first defining a Python list of items, and then using the function
    `choice()` of the random value to output a random item from that list.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将看到如何从值列表中生成一个随机值。我们可以通过首先定义一个Python项目列表，然后使用随机值函数的`choice()`来输出列表中的一个随机项目。
- en: 'For this purpose, we will first create a list and then use the random module’s
    `choice()` function to randomly choose an item from the said list. Suppose we
    have a list of our cats, and we have to choose one to give a special treat to.
    Here is how this can be done:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这个目的，我们首先创建一个列表，然后使用随机模块的`choice()`函数从该列表中随机选择一个项目。假设我们有一份我们的猫的列表，我们必须从中选择一只来给予特殊待遇。以下是这样做的方法：
- en: '[PRE4]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Notice that the above code is random, meaning it is not necessary that all the
    cats will be chosen (although highly probable as much as we run the code), so
    yeah, this is not a fair way to choose who to give the special treat to!
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，上述代码是随机的，这意味着并不一定所有猫都会被选中（尽管随着代码的运行概率非常高），所以，这并不是一个公平的选择方式来决定给谁特殊待遇！
- en: 'Moreover, we can also create a list of random choices using the `choices()`
    function. This function also allows us to decide the weights of each item of the
    list, meaning that we can increase the probability of any items in the list of
    being chosen randomly:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还可以使用`choices()`函数创建一个随机选择列表。此函数还允许我们决定列表中每个项目的权重，这意味着我们可以增加列表中任何项目被随机选中的概率：
- en: '[PRE5]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
