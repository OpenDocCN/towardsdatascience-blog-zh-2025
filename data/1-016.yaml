- en: A Product Data Scientist’s Take on LinkedIn Games After 500 Days of Play
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在玩了500天后，我对领英游戏的一些看法
- en: 原文：[https://towardsdatascience.com/a-product-data-scientists-take-on-linkedin-games-after-500-days-of-play/](https://towardsdatascience.com/a-product-data-scientists-take-on-linkedin-games-after-500-days-of-play/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/a-product-data-scientists-take-on-linkedin-games-after-500-days-of-play/](https://towardsdatascience.com/a-product-data-scientists-take-on-linkedin-games-after-500-days-of-play/)
- en: I <mdspan datatext="el1764827306934" class="mdspan-comment">am on a 500</mdspan>-day
    streak on [LinkedIn Games](https://www.linkedin.com/games/). Yes, LinkedIn also
    has games, and they’ve been around for over a year. From time to time, I notice
    new games, design tweaks, and new features being rolled out. As a Data Scientist,
    I have always wondered what LinkedIn is trying to achieve with LinkedIn Games
    and how they are testing the changes.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经连续500天在[领英游戏](https://www.linkedin.com/games/)上保持活跃。是的，领英也有游戏，它们已经存在一年多时间了。时不时地，我会注意到新游戏、设计调整和新功能的推出。作为一名数据科学家，我总是想知道领英试图通过领英游戏实现什么，以及他们是如何测试这些变化的。
- en: With AI augmenting and even automating many coding and basic analytics tasks,
    product sense and domain expertise become more and more important for data scientists.
    Therefore, in this article, I am using LinkedIn Games as an example to show how
    a Product Data Scientist thinks and works. This is also the type of mental exercise
    I practice when preparing for product case interviews.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能增强甚至自动化许多编码和基本分析任务，产品感知和领域专业知识对于数据科学家来说变得越来越重要。因此，在这篇文章中，我以领英游戏为例，展示产品数据科学家是如何思考和工作的。这也是我在准备产品案例面试时进行的一种心理练习。
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I. What’s the goal of LinkedIn Games
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: I. 领英游戏的目的是什么
- en: The first step in any product case is to understand the product’s goal. [Per
    LinkedIn](https://www.linkedin.com/help/linkedin/answer/a6284860), “Games on LinkedIn
    are thinking-oriented games to help you sharpen your minds, take a quick break,
    and have the opportunity to connect with each other and spark conversations.”
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 任何产品案例的第一步是理解产品的目标。[根据领英](https://www.linkedin.com/help/linkedin/answer/a6284860)，“领英上的游戏是思考导向的游戏，旨在帮助您磨练思维，短暂休息，并有机会相互连接和激发对话。”
- en: These games are quick brain teasers, so they do help users “sharpen minds and
    take a quick break” to some extent. But I believe the real intention hides behind
    the last part — “connect with each other and spark conversations”.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这些游戏是快速脑筋急转弯，所以在一定程度上确实帮助用户“磨练思维和短暂休息”。但我相信真正的意图隐藏在最后一部分——“相互连接和激发对话”之后。
- en: Why does this matter? LinkedIn generates most of its revenue from talent solutions,
    advertising platform, and premium subscriptions. All of these rely on an active
    user base — recruiters need a large pool of active candidates, advertisers need
    targeted impressions, and the value of premium subscriptions increases with the
    network size. Moreover, the key to maintaining an active user base is user engagement
    and interactions, which ultimately lead to higher retention.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这为什么很重要？领英的大部分收入来自人才解决方案、广告平台和高级订阅。所有这些都依赖于一个活跃的用户群——招聘人员需要一个庞大的活跃候选人库，广告商需要定向印象，而高级订阅的价值随着网络规模的增加而增加。此外，保持活跃用户群的关键是用户参与和互动，这最终导致更高的留存率。
- en: In data language, MAU (monthly active users) is one of the most common metrics
    to measure the active user base of a product. `MAU in month X = active users in
    month X-1 + users acquired/resurrected in month X - users churned in month X`.
    For LinkedIn, I believe LinkedIn Games is a feature that is designed to grow MAU
    by reducing the last component, “users churned this month.”
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据语言中，MAU（月活跃用户）是衡量产品活跃用户群最常用的指标之一。`MAU in month X = active users in month
    X-1 + users acquired/resurrected in month X - users churned in month X`。对于领英来说，我相信领英游戏是一个旨在通过减少最后一个组成部分——“本月流失的用户”来增长MAU的功能。
- en: II. How does LinkedIn Games achieve this goal
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: II. 领英游戏是如何实现这一目标的
- en: Now that we are clear about the goal of improving retention, the next question
    is, **how** does LinkedIn Games achieve it? I think there are two mechanisms — direct
    interactions with LinkedIn Games and indirect engagement driven by coming back
    to the platform.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经明确了提高留存率的目标，下一个问题是，**领英游戏是如何**实现这一目标的？我认为有两种机制——与领英游戏直接互动和由返回平台驱动的间接参与。
- en: 1\. Direct interactions with LinkedIn Games
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 与领英游戏直接互动
- en: Every day, LinkedIn publishes a game post and encourages users to share their
    scores and tips. This is exactly what they meant by “help you … connect with each
    other and spark conversations.” Below is a screenshot I took at around 10 PM Pacific
    Time on 11/29 — around 22 hours after the daily Zip game was refreshed. You can
    find the entry point to this post after finishing a game, or it might show up
    on your homepage. This post had 1240 reactions and 1370 comments. Many users post
    their scores and interact with each other.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 每天LinkedIn都会发布一篇游戏帖子，并鼓励用户分享他们的得分和技巧。这正是他们所说的“帮助你……相互连接并激发对话。”以下是我于11月29日太平洋时间晚上10点左右拍摄的一张截图——大约在每日Zip游戏更新后的22小时左右。你可以在完成游戏后找到这篇帖子的入口，或者它可能会出现在你的主页上。这篇帖子有1240个反应和1370条评论。许多用户会分享他们的得分并相互互动。
- en: This kind of social interaction is valued by many LinkedIn users. Sharing your
    good game score is also similar to sharing a small achievement, so it does not
    work against the professional social network image of LinkedIn. As a result, LinkedIn
    Games creates a network effect that increases retention.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这种社交互动受到许多LinkedIn用户的重视。分享你的高分游戏也是分享一个小成就，所以它不会与LinkedIn的专业社交网络形象相冲突。因此，LinkedIn游戏创造了一种网络效应，增加了留存率。
- en: '![](../Images/6f26cab5e80321bf8d785e1d664e4d23.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6f26cab5e80321bf8d785e1d664e4d23.png)'
- en: Zip game post by LinkedIn (screenshots by the author)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: Zip游戏帖子由LinkedIn发布（截图由作者提供）
- en: '![](../Images/e25ffd1bd248b41c88462ef317980ce3.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e25ffd1bd248b41c88462ef317980ce3.png)'
- en: Zip game post by LinkedIn (screenshots by the author)
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: Zip游戏帖子由LinkedIn发布（截图由作者提供）
- en: 2\. Indirect engagement from returning to the platform
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 返回平台后的间接参与
- en: Meanwhile, there are absolutely people like me who are simply addicted to the
    games but never share scores or comment on the post. No interaction does not mean
    LinkedIn Games does not achieve the retention goal for this group of users. The
    fact that it brings users back every day is already a strong retention lever.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，确实有一些像我这样的人，只是沉迷于游戏，但从不分享得分或评论帖子。没有互动并不意味着LinkedIn游戏没有达到这一用户群体的留存目标。它每天都能吸引用户回来，这本身就是一种强大的留存杠杆。
- en: 'Linked Games achieves this by creating a habit loop. Let me put it in the **Hooked
    Model** (Trigger-> Action -> Reward -> Investment) to unpack it:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: Linked Games通过创建习惯循环来实现这一点。让我用**Hooked Model**（触发器->行动->奖励->投资）来解释它：
- en: '**Trigger**: Users are prompted to return by external triggers like push notifications
    and homepage modules, and internal triggers such as the desire to maintain a streak.'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**触发器**：用户通过推送通知和主页模块等外部触发器，以及维持连线的愿望等内部触发器被提示返回。'
- en: '**Action**: The puzzles are easy to understand, low-friction to enter, and
    quick to play.'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**行动**：这些谜题易于理解，进入门槛低，游戏速度快。'
- en: '**Reward**: Users get a different puzzle every day, earn streak badges, and
    can compete with their connections.'
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**奖励**：用户每天都会得到不同的谜题，获得 streak 徽章，并且可以与他们的联系人竞争。'
- en: '**Investment**: Users “invest” by building a streak, getting connections to
    play, sharing results, improving their leaderboard rank, etc. Every day, users
    build up sunk effort, making it harder to stop.'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**投资**：用户通过建立连线的 streak、与其他用户建立连接来玩游戏、分享结果、提高他们的排行榜排名等方式进行“投资”。每天，用户都会积累沉没成本，这使得停止变得更加困难。'
- en: With this habit loop, users come back daily. As long as a user opens LinkedIn,
    there is also a chance that they will check out other things, like network updates,
    messages, job openings, etc. These actions could all lead to meaningful engagements
    outside of the Games feature and increase overall retention.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这种习惯循环，用户每天都会回来。只要用户打开LinkedIn，就有机会查看其他内容，如网络更新、消息、职位空缺等。这些行为都可能带来除游戏功能之外的有意义互动，并提高整体留存率。
- en: III. Experimentations on LinkedIn Games
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: III. LinkedIn Games的实验
- en: We covered the goal of LinkedIn Games and the mechanisms behind it— **LinkedIn
    Games aims to improve user retention by encouraging interaction on Games content
    and increasing overall product engagement**. As a data scientist, if you work
    on this product, a key part of your job will be collaborating with Product Managers,
    Designers, and Engineers to brainstorm initiatives and run experiments to measure
    the retention impact. And this is clearly happening with LinkedIn Games, as I
    have noticed so many design changes over time. Let me walk through some examples
    and discuss how data scientists will be involved.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经介绍了 LinkedIn 游戏的目标及其背后的机制——**LinkedIn 游戏旨在通过鼓励在游戏内容上的互动和增加整体产品参与度来提高用户留存率**。作为一名数据科学家，如果您参与这个产品的开发，您的工作关键部分将是与产品经理、设计师和工程师合作，头脑风暴新想法并运行实验以衡量留存率的影响。LinkedIn
    游戏的情况显然就是这样，因为我注意到随着时间的推移，有很多设计上的变化。让我通过一些例子来讲解，并讨论数据科学家将如何参与其中。
- en: 1\. Entry points to LinkedIn Games
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. LinkedIn 游戏的入口点
- en: 'Right now, you can access LinkedIn Games through:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，您可以通过以下方式访问 LinkedIn 游戏：
- en: '[Games hub](http://linkedin.com/games)'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[游戏中心](http://linkedin.com/games)'
- en: Search for games on the LinkedIn Search bar
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 LinkedIn 搜索栏中搜索游戏
- en: My Network page
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的网络页面
- en: Today’s Games section under LinkedIn News on your Desktop homepage or Side panel
    in the LinkedIn mobile app
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在您的桌面首页的 LinkedIn 新闻部分或 LinkedIn 移动应用的侧面板中，今天游戏的版块
- en: Notifications
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通知
- en: But this is not always the case. I remember one day the entry point on the My
    Network page disappeared, and I had to search in the app to find the games. But
    a few days later, it appeared again. The location of entry points determines how
    easy it is to find the feature, for both new and returning users. But more entry
    points aren’t always better. While more entry points increase visibility, each
    of them can create a contextual bias — users who land on My Network might behave
    differently than those who come through a notification— thus, different entry
    point has different impacts on engagement and retention. In other words, they
    will cannibalize each other.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 但情况并不总是如此。我记得有一天，我的网络页面上的入口点消失了，我不得不在应用中搜索以找到游戏。但几天后，它又出现了。入口点的位置决定了新用户和回头客找到该功能有多容易。但更多的入口点并不总是更好。虽然更多的入口点增加了可见性，但每个入口点都可能产生情境偏差——在“我的网络”页面上着陆的用户可能的行为与通过通知来的用户不同——因此，不同的入口点对参与度和留存率有不同的影响。换句话说，它们会相互蚕食。
- en: For example, the My Network entry point sits below the invitations and above
    the connection recommendations. When a user visits this page to play the daily
    game, inevitably, they will see the pending invitations, and it will remind them
    to take action — expanding connections is a critical part of making a user’s LinkedIn
    experience meaningful and valuable. Meanwhile, if they go to their homepage for
    the games, they will instead see other users’ posts, and are more likely to interact
    with the posts.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我的网络入口点位于邀请下方和连接推荐上方。当用户访问此页面玩每日游戏时，不可避免地会看到待处理的邀请，这会提醒他们采取行动——扩展联系是使 LinkedIn
    用户体验有意义和有价值的关键部分。同时，如果他们去主页玩游戏，他们将会看到其他用户的帖子，更有可能与之互动。
- en: '![](../Images/31fb12a809eb6f37c836fd76cb6dce43.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/31fb12a809eb6f37c836fd76cb6dce43.png)'
- en: LinkedIn Games entry points on My Network page (screenshots by the author)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: LinkedIn 游戏在“我的网络”页面上的入口点（作者截图）
- en: '![](../Images/31242dce4356ab6ffdedbce487ab5572.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/31242dce4356ab6ffdedbce487ab5572.png)'
- en: LinkedIn Games entry points on homepage (screenshots by the author)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: LinkedIn 游戏在主页上的入口点（作者截图）
- en: Different types of interactions have different impacts on retention, and it
    is hard to estimate the exact impact of removing/adding an entry point without
    running an experiment. Now the task is on the data scientists to design the experiment.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的互动类型对留存率有不同的影响，没有进行实验很难估计移除/添加入口点对留存率的精确影响。现在，数据科学家需要设计实验来完成这项任务。
- en: 'Here is how it could look:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能看起来是这样的：
- en: '**Experiment design**: control = current design, treatment = removing the entry
    point on My Network'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实验设计**：控制组 = 当前设计，处理组 = 移除“我的网络”页面上的入口点'
- en: '**Randomization unit**: user-level A/B testing, 50% users will randomly see
    the control vs. the treatment design'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**随机化单元**：用户级别的 A/B 测试，50% 的用户将随机看到控制组与处理组设计'
- en: '**Primary metric**: 7-day retention rate — time window can vary based on how
    quickly we want to measure the retention impact and any past learnings. One caveat
    is that retention is a lagging metric, and LinkedIn Games might have relatively
    low traffic compared to the rest of the platform, which makes it difficult to
    detect retention impact in the short term. In that case, the primary metric might
    need to shift to a leading indicator of retention, or data scientists might need
    to rely on causal inference techniques to estimate the retention lift more reliably.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主要指标**：7天留存率—时间窗口可以根据我们想要多快测量留存影响以及任何过去的经验而变化。一个需要注意的问题是留存是一个滞后指标，与平台的其他部分相比，LinkedIn
    游戏可能会有相对较低的交通量，这使得在短期内检测留存影响变得困难。在这种情况下，主要指标可能需要转移到留存的前瞻性指标，或者数据科学家可能需要依赖因果推断技术来更可靠地估计留存提升。'
- en: '**Secondary metrics**: % users played a game; % users interacted with network
    posts; % users added connections; Average sessions per user; Average time spent
    per user'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**次要指标**：%用户玩过游戏；%用户与网络帖子互动；%用户添加了连接；平均每用户会话数；平均每用户花费时间'
- en: '**Guardrail metric**: average app/website performance'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**守卫指标**：平均应用/网站性能'
- en: Data scientists will work with the cross-functional team to align on metrics
    based on the goal of the experiment, run power analysis to determine the experiment
    time length and scope, conduct implementation checks, and eventually analyze the
    results to make a call on the best combination of entry points.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家将与跨职能团队一起根据实验目标对指标达成一致，进行功效分析以确定实验的时间长度和范围，进行实施检查，并最终分析结果，以决定最佳入口点的最佳组合。
- en: 2\. Notifications
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 通知
- en: Several months back, I started receiving reminder notifications like “You’re
    on a xxx-day streak. Play xxx now to keep it going”. Later, after finishing the
    games, there is another set of notifications saying “congrats on finishing xxx”.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 几个月前，我开始收到像“你已经连续xxx天了。现在玩xxx来保持这个记录”这样的提醒通知。游戏结束后，还有另一组通知说“恭喜你完成了xxx”。
- en: '![](../Images/2a32483cf3002483bea73eeaeb5949b4.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2a32483cf3002483bea73eeaeb5949b4.png)'
- en: LinkedIn Games notification (screenshot by the author)
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: LinkedIn 游戏通知（作者截图）
- en: Notifications can be annoying, but they are very effective in bringing users
    back. For example, Duolingo is famous for its creative and “psychologically manipulative”
    notifications (I am on a 1735-day Duolingo streak by the way). [Their early blog
    post](https://blog.duolingo.com/hi-its-duo-the-ai-behind-the-meme/) described
    how Duolingo used multi-armed bandits to find the best-performing notification.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 通知可能会让人烦恼，但它们在吸引用户回归方面非常有效。例如，多邻国因其创意和“心理操纵”式的通知而闻名（顺便说一句，我有一个1735天的多邻国学习 streak）。[他们的早期博客文章](https://blog.duolingo.com/hi-its-duo-the-ai-behind-the-meme/)描述了多邻国如何使用多臂老虎机来找到最佳性能的通知。
- en: 'Similarly, optimizing notifications can have a huge impact on LinkedIn Games.
    Data scientists can run experiments to test:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，优化通知可以对 LinkedIn 游戏产生巨大影响。数据科学家可以运行实验来测试：
- en: '**When to send the reminder notification **— it could be during lunch break
    or after work time when users are more likely to be available, or when the user
    usually opens the app, or even when they played the game yesterday.'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**何时发送提醒通知**—它可能是在午休时间或下班后，这时用户更有可能有空，或者在他们通常打开应用的时候，甚至在他们昨天玩游戏的时候。'
- en: '**When to send the congrats notification **— the congrats notification could
    be used to bring a user back to the app and encourage them to post their results
    and interact with other players. Similarly, we can test sending it right after
    finishing the game, or maybe later in the day when more users have played the
    game.'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**何时发送祝贺通知**—祝贺通知可以用来将用户带回应用，并鼓励他们发布他们的结果并与其他玩家互动。同样，我们可以在游戏结束后立即发送它，或者可能在当天晚些时候，当更多用户已经玩游戏时。'
- en: '**The message text **— should the tone be neutral or more aggressive? How long
    should it be?'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**消息文本**—语气应该是中性的还是更加强烈？它应该有多长？'
- en: '**The CTA (call to action) text **— “Solve now”? “Play now”? “Extend your streak”?
    Different text on the button could lead to different click-through rates.'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**CTA（行动号召）文本**—“现在解决”？“现在玩”？“延长你的记录”？按钮上的不同文本可能导致不同的点击率。'
- en: '**Frequency** — if a user does not come back to play the game after the first
    notification, should we send another reminder?'
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**频率**—如果用户在第一次通知后没有回来玩游戏，我们应该发送另一条提醒吗？'
- en: Here is just a short list off the top of my head, but it’s already lots of different
    combinations of notification designs. It is totally possible that text A coupled
    with timing X is better than text B coupled with timing Y. Therefore, running
    experiments for each decision one by one is both inefficient and could lead to
    a sub-optimal result. That is why Duolingo mentioned the **multi-armed bandit**
    framework above. It is a framework to test multiple variations simultaneously,
    and unlike traditional A/B tests, it speeds up the experiments by automatically
    diverting more traffic to the winning arms based on a reward function and reducing
    the number of arms in the test quickly. Therefore, the multi-armed bandit could
    be very useful to test LinkedIn Games notifications. If you want to learn more,
    [here](https://multithreaded.stitchfix.com/blog/2020/08/05/bandits/) is another
    article by Stitch Fix on how they use multi-armed bandits in their experimentation
    platform.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是我脑海中的一些简短列表，但已经有很多不同的通知设计组合。完全有可能文本A与时间X的组合比文本B与时间Y的组合更好。因此，逐个决策进行实验既低效又可能导致次优结果。这就是为什么Duolingo提到了上面的**多臂老虎机**框架。这是一个同时测试多个变体的框架，与传统A/B测试不同，它通过根据奖励函数自动将更多流量导向获胜臂并快速减少测试中的臂的数量来加速实验。因此，多臂老虎机可以非常有助于测试LinkedIn
    Games通知。如果您想了解更多信息，[这里](https://multithreaded.stitchfix.com/blog/2020/08/05/bandits/)是Stitch
    Fix关于他们在实验平台中使用多臂老虎机的另一篇文章。
- en: So what’s the data scientist’s role here? Of course, they will brainstorm with
    the stakeholders to come up with different variations, define the reward functions
    (e.g., whether a user plays today’s puzzle), run the multi-armed bandit setup,
    and interpret the results.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，数据科学家的角色在这里是什么？当然，他们将与利益相关者一起头脑风暴，提出不同的变体，定义奖励函数（例如，用户是否今天玩谜题），运行多臂老虎机设置，并解释结果。
- en: 3\. Game results page
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 游戏结果页面
- en: Another area where I have noticed many changes is the game results page. After
    finishing the game, the user first lands on a results summary, with attractive
    stats cards like “On fire 500-day win streak!”, “Top 95% All players”, and “Smarter
    than 90% of CEOs”. It also has a prominent “Share” button that prompts you to
    share your results as a post or as a direct message to your connections.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我还注意到游戏结果页面有许多变化。完成游戏后，用户首先会看到结果摘要，其中包含吸引人的统计数据卡片，如“500天连胜！”，“所有玩家中排名前95%”，“比90%的CEO更聪明”。它还包含一个突出的“分享”按钮，提示您将结果作为帖子或直接消息分享给您的联系人。
- en: 'After that, there is a long results page with seven major sections:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，有一个包含七个主要部分的长结果页面：
- en: Header — how quickly the user solved the puzzle with copy and share CTAs.
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 标题栏——用户用复制和分享CTAs解决谜题的速度。
- en: Connection leaderboard — where you rank among your connections. If you click
    on “see full leaderboard”, there are CTAs to nudge connections who haven’t played
    today.
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 联系人排行榜——您在联系人中的排名。如果您点击“查看完整排行榜”，将出现CTAs来提示那些今天尚未玩游戏的联系人。
- en: The “play another game” CTA asks you to explore different games.
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “再玩一局游戏”的CTA邀请您探索不同的游戏。
- en: Another summary panel with more stats, including all-time win rate, best score,
    streak badges, and a push notification toggle.
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 另一个包含更多统计信息的摘要面板，包括历史胜率、最佳得分、连胜徽章以及推送通知切换。
- en: Weekly industry and school leaderboards with share options.
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每周行业和学校排行榜，包含分享选项。
- en: Link to the daily game post, where you can react or comment directly.
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每日游戏帖子的链接，您可以直接在此处点赞或评论。
- en: “Unlock this week’s bonus puzzle” by inviting your connections to play the game.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过邀请您的联系人玩游戏来“解锁本周的奖励谜题”。
- en: '![](../Images/ec5b73022baec4ef89788efa9f64bff9.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ec5b73022baec4ef89788efa9f64bff9.png)'
- en: Game results page (screenshots by the author)
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏结果页面（作者截图）
- en: Do you see the pattern? Every section has some CTAs to encourage sharing, engagement,
    or social interaction. However, is the current sequence of cards the best sequence
    for the retention outcome? Is there a better UI for the results stat cards with
    a higher share rate? Do people even care about the ranking of their employer and
    school?
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 您看到模式了吗？每个部分都有一些CTAs来鼓励分享、参与或社交互动。然而，当前的卡片顺序是否是最佳保留结果顺序？是否有更好的UI设计，以提高结果统计卡片的分享率？人们是否真的关心他们雇主和学校的排名？
- en: To answer these questions, a data scientist would design experiments similar
    to the one we discussed in the entry points section to measure the click-through
    rates, interactions, and overall retention impact.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答这些问题，数据科学家会设计类似于我们在入口点部分讨论的实验，以衡量点击率、互动和整体留存影响。
- en: To take one step further, different users might have different preferences.
    For example,
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步来说，不同的用户可能有不同的偏好。例如，
- en: User A wants to “show off” their score and how much smarter they are than the
    CEOs, so the current sequence works perfectly for them, as they can do it right
    on the first screen.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户A想要“炫耀”他们的分数以及他们比CEO们聪明多少，所以当前的操作顺序对他们来说非常完美，因为他们可以直接在第一屏上做到这一点。
- en: User B feels a strong belonging to their community, so they will share the leaderboard,
    asking coworkers or classmates to join the game to improve the ranking of their
    company or school. Therefore, displaying the leaderboards on top will improve
    their engagement.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户B对他们的社区有强烈的归属感，因此他们会分享排行榜，邀请同事或同学加入游戏以提高他们公司或学校的排名。因此，在顶部显示排行榜将提高他们的参与度。
- en: User C loves to share their puzzle tips and discuss with other players, then
    we should move the post up on the results page.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户C喜欢分享他们的谜题技巧并与其他玩家讨论，因此我们应该将帖子移至结果页面的上方。
- en: User D simply enjoys the game, and they would invite others to unlock more puzzles
    if they are offered this option. But with the current design, they might not even
    scroll down all the way to the bottom and miss the “unlock this week’s bonus puzzle”
    card.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户D只是简单地享受游戏，如果有机会，他们会邀请其他人解锁更多谜题。但是，按照当前的设计，他们可能甚至不会滚动到页面底部，从而错过“解锁本周的奖励谜题”卡片。
- en: This kind of **personalized** results page makes a lot of sense theoretically,
    but how to make it work is another complicated data science question. Data scientists
    could segment users based on user profiles and past activities — for example,
    how many connections they have, how many of their connections have played the
    games, if the user often posts or comments, etc. Then the data scientists could
    analyze the experiment results by different user segments to identify which design
    works the best for each segment and come up with the personalization strategy.
    To make the system even smarter, data scientists could build a machine learning
    model to predict the card layout that maximizes engagement for each user.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这种**个性化**的结果页面在理论上很有意义，但如何让它发挥作用又是另一个复杂的数据科学问题。数据科学家可以根据用户资料和过去的活动来细分用户——例如，他们有多少联系，他们有多少联系玩过游戏，用户是否经常发帖或评论等。然后，数据科学家可以通过不同的用户细分来分析实验结果，以确定哪种设计对每个细分效果最好，并提出个性化策略。为了使系统更加智能，数据科学家可以构建一个机器学习模型来预测对每个用户最大化参与度的卡片布局。
- en: '4\. Nuance: Network effect'
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 细微差别：网络效应
- en: Last but not least, let me talk about an important nuance for running experiments
    on a social platform like LinkedIn — the **network effect**. A/B testing has a
    strong **Stable Unit Treatment Value Assumption (SUTVA)**, which assumes an individual
    user’s outcome is determined only by the treatment they receive, and is not affected
    by the treatments of other users. However, this does not always hold on social
    networks.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，让我谈谈在LinkedIn这样的社交平台上进行实验的一个重要细微差别——**网络效应**。A/B测试有一个强烈的**稳定单元治疗价值假设（SUTVA）**，它假设单个用户的成果仅由他们所接受的治疗决定，并且不受其他用户治疗的影响。然而，这并不总是适用于社交网络。
- en: Considering the LinkedIn Games example — Assume we changed the leaderboard UI
    and, as a result, users in the treatment group have a higher chance to “nudge”
    their connections. And many “nudged” users — some in the control group — end up
    playing the game too. This network effect biases the experiment result and dilutes
    the relative impact between treatment and control. LinkedIn has [written](https://www.linkedin.com/blog/engineering/ab-testing-experimentation/detecting-interference-an-a-b-test-of-a-b-tests)
    about this exact challenge and walked through how they detected the impact of
    this interference using cluster-based experiments. In short, LinkedIn groups closely-connected
    users into one cluster while minimizing interactions between clusters, then they
    use clusters as the randomization unit (users in the same cluster either all go
    to treatment or all go to control) to measure the impact with minimum interference.
    Therefore, for changes that could have a strong network effect, the cluster-based
    experiment is a good alternative. Though the trade-off is that cluster-based experiments
    often reduce power, so they require careful cluster construction and power analysis.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到领英游戏的例子——假设我们改变了排行榜的用户界面，因此，处理组的用户更有可能“推动”他们的联系人。许多被“推动”的用户——其中一些在对照组——最终也玩起了游戏。这种网络效应会偏袒实验结果，并稀释处理组和对照组之间的相对影响。领英已经[撰写](https://www.linkedin.com/blog/engineering/ab-testing-experimentation/detecting-interference-an-a-b-test-of-a-b-tests)了关于这一具体挑战的文章，并介绍了他们如何通过基于集群的实验来检测这种干扰的影响。简而言之，领英将紧密相连的用户聚集到一个集群中，同时最小化集群之间的互动，然后他们使用集群作为随机化单元（同一集群中的用户要么都接受处理，要么都接受控制）以最小干扰来衡量影响。因此，对于可能产生强烈网络效应的变化，基于集群的实验是一个好的替代方案。尽管权衡是，基于集群的实验通常降低效力，因此它们需要仔细的集群构建和效力分析。
- en: '* * *'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: LinkedIn Games seem simple, but behind every button, notification, streak badge,
    and leaderboard, there is likely a chain of product hypotheses, experiments, decisions,
    and data science work.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 领英游戏看起来很简单，但每个按钮、通知、连续成就徽章和排行榜背后，可能都有一系列的产品假设、实验、决策和数据科学工作。
- en: Of course, this is just my brain exercise as a LinkedIn user, but I hope this
    article helps you better understand what Product Data Science looks like in practice.
    When preparing for product case interviews or even when you notice a new feature
    on a product you use regularly, you can apply similar mental exercises to sharpen
    your product sense and become a stronger data scientist.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这只是我作为一个领英用户的脑力锻炼，但我希望这篇文章能帮助你更好地理解实际中的产品数据科学是什么样的。当准备产品案例面试，甚至当你注意到你经常使用的某个产品上的新功能时，你可以应用类似的思维练习来磨练你的产品感知，并成为一个更强的数据科学家。
