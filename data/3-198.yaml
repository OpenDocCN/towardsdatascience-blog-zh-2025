  zh: '[活跃性、就绪性和启动探针](https://kubernetes.io/docs/concepts/configuration/liveness-readiness-startup-probes/)'
- en: '[Configure Liveness, Readiness and Startup Probes](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '[配置活跃性、就绪性和启动探针](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)'
