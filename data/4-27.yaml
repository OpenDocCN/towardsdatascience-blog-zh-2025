- en: AI Ethics for the Everyday User – Why Should You Care?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能伦理对于普通用户来说——你为什么应该关心？
- en: 原文：[https://towardsdatascience.com/another-article-on-ai-ethics-but-this-time-for-the-masses-c809e09e35e7/](https://towardsdatascience.com/another-article-on-ai-ethics-but-this-time-for-the-masses-c809e09e35e7/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/another-article-on-ai-ethics-but-this-time-for-the-masses-c809e09e35e7/](https://towardsdatascience.com/another-article-on-ai-ethics-but-this-time-for-the-masses-c809e09e35e7/)
- en: '![Photo by Madison Oren on Unsplash](../Images/45470fa5a0bdaded0eaae9c5f1a7fc2c.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由Madison Oren在Unsplash上的照片](../Images/45470fa5a0bdaded0eaae9c5f1a7fc2c.png)'
- en: Photo by [Madison Oren](https://unsplash.com/@artbyhybrid?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由[Madison Oren](https://unsplash.com/@artbyhybrid?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上的照片
- en: Ethical concerns surrounding artificial intelligence seem to be at the top of
    the tech news cycle. Which is surprising, considering how much of an issue it
    still appears to be for major tech companies.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 围绕人工智能的伦理担忧似乎一直是科技新闻的头条。这令人惊讶，考虑到它仍然似乎是主要科技公司的一个大问题。
- en: 'But I digress. Every month, there seems to be some story about how a powerful
    AI went rogue (Exhibit A: [Gemini’s images in early 2024](https://www.aljazeera.com/economy/2024/2/23/google-pauses-geminis-image-tool-for-people-after-anti-woke-backlash))
    or a company decided to dissolve an AI ethics team (Exhibit B: [OpenAI around
    the time GPT-4o was released](https://www.businessinsider.com/openai-ends-superalignment-team-manage-ai-risks-2024-5)).
    In response, there is usually an outcry of criticism and a renewed call for more
    censorship, oversight, and care surrounding AI and its future. A call that seems
    to go unanswered.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但我跑题了。每个月似乎都有一些关于强大的人工智能变得失控（例如A：[2024年初Gemini的图像](https://www.aljazeera.com/economy/2024/2/23/google-pauses-geminis-image-tool-for-people-after-anti-woke-backlash)）或公司决定解散人工智能伦理团队的新闻（例如B：[OpenAI在GPT-4o发布时](https://www.businessinsider.com/openai-ends-superalignment-team-manage-ai-risks-2024-5)）。作为回应，通常会有批评的呼声和再次呼吁加强对人工智能及其未来的审查、监督和关注。这种呼吁似乎没有得到回应。
- en: But perhaps that’s because we’re focusing our energies in the wrong place.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但也许这是因为我们关注错了地方。
- en: The issue with AI ethics is that like many other aspects of Silicon Valley,
    it has become "clique-y." So many discussions around AI ethics take place in university
    research presentations and talk about technical failures within model development
    – settings and topics that simply do not pertain to the greater proportion of
    folks who actually use AI. Frankly, if one is expected to be an expert technologist
    or full-time student or startup CEO before they can engage in a discussion about
    ethics, most people simply aren’t going to care enough to join in.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能伦理的问题在于，就像硅谷的许多其他方面一样，它已经变得“小圈子化”。围绕人工智能伦理的许多讨论都发生在大学研究展示中，讨论模型开发中的技术失败——这些环境和主题与真正使用人工智能的大多数人无关。坦白说，如果一个人在参与关于伦理的讨论之前被期望成为一名技术专家或全职学生或初创公司CEO，那么大多数人可能根本不会关心到足以加入讨论。
- en: Ethics is important, certainly. I’ll be the first to argue that – especially
    in this new age of generative AI (genAI) and large language models (LLMs), deep
    consideration of the ethical implications of AI upon society is essential. And
    yet, I say that from a place within the clique myself. I am a Ph.D. Candidate
    studying technological education, I have colleagues and lab mates who routinely
    publish research about the dangers of AI, and I have a background in mathematics
    and computer science. It’s easy for me to sit on my high horse and lecture about
    ethics.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 道德伦理的重要性无疑是肯定的。我首先会同意这一点——尤其是在这个生成式人工智能（genAI）和大型语言模型（LLMs）的新时代，深入思考人工智能对社会伦理的影响是至关重要的。然而，我这么说也是基于我自己的小圈子。我是一名科技教育专业的博士生，我有同事和实验室伙伴经常发表关于人工智能危险性的研究，我还有数学和计算机科学的背景。对我来说，高高在上地谈论道德伦理是很容易的。
- en: It’s also a little pretentious.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这也显得有些自以为是。
- en: What about the customer-focused data scientist at Google whose work is far removed
    from anything research-related? Or the sales representative who has no background
    in tech, but must learn to use her company’s new internal LLM to keep up to speed
    with others in her position? Or, yes, even the humanities college student who
    sits in his dorm and ponders the use of ChatGPT for his final paper. For these
    people who use AI in (relatively) hidden contexts miles away from the news-flashy
    circles of big tech oligarchs – indeed, those very folks who make up the majority
    of AI’s users – what does it mean to utilize AI ethically?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，对于谷歌以客户为中心的数据科学家来说，他的工作与任何研究相关的内容都相去甚远？或者，那位没有技术背景的销售代表，但她必须学会使用她公司的新内部LLM，以跟上她职位上的其他人？或者，是的，甚至那位坐在宿舍里思考ChatGPT在论文中应用的文科大学生。对于这些在（相对）隐蔽的背景下使用人工智能的人们——确实，这些人构成了人工智能用户的大多数——道德地使用人工智能意味着什么？
- en: Dream Big, But Start Small
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 梦想大，但从小处开始
- en: Many discuss the ramifications of ignoring ethics in AI on a societal scale.
    This is valid, and it is important. AI has caused problems even before the recent
    advent of LLMs – [just ask the scores of people at risk due to deep biases in
    facial recognition technology](https://mitsloan.mit.edu/ideas-made-to-matter/unmasking-bias-facial-recognition-algorithms).
    Ultimately, AI does impact culture and society at a large scale, and we should
    be aware of this.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人讨论了忽视人工智能伦理在社会层面上的影响。这是有效的，也是重要的。人工智能在LLMs最近出现之前就已经造成了问题——[只需问问那些因面部识别技术中的深度偏见而处于风险中的人们](https://mitsloan.mit.edu/ideas-made-to-matter/unmasking-bias-facial-recognition-algorithms)。最终，人工智能在文化和社会层面上产生了重大影响，我们应该对此有所认识。
- en: However, for the average person looking to start using AI more ethically, that’s
    not the best place to start. It is too impending, too intense, and in some cases,
    too far removed. Asking someone to use AI more ethically so that future surveillance
    technology does not perpetuate systemic inequalities is akin to asking a first-year
    mathematics student to perfect simple proofs so that they can establish a major
    theorem as a professor one day. It’s relevant, but it’s just too far away.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于想要更道德地使用人工智能的普通人来说，这并不是一个好的起点。这太过紧迫，太过激烈，在某些情况下，太过遥远。要求某人更道德地使用人工智能，以便未来的监控技术不会延续系统性不平等，就像要求一名大一数学学生完美地证明简单的定理，以便他们有一天能成为教授一样。这是相关的，但太遥远了。
- en: As with all things, it’s more effective to start slow and start small. Let’s
    take a look at a few ways you might do that.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 就像所有事情一样，慢慢地开始，从小处着手会更有效。让我们看看你可能会采取的一些方法。
- en: Learn Some Foundational Points
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 学习一些基础要点
- en: There are some general facts about AI that strongly influence ensuing ethical
    discussions each time a new model comes out. Internalizing these facts doesn’t
    require extensive technical expertise. Simple awareness goes a long way.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 每当出现新的模型时，关于人工智能的一些普遍事实会强烈影响随后的伦理讨论。内化这些事实不需要广泛的技术专业知识。简单的意识已经走得很远了。
- en: 'So, what should you be aware of? A few things, to start:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你应该注意些什么？以下是一些开始的地方：
- en: When the training data is biased, the eventual AI is biased.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当训练数据存在偏见时，最终的人工智能也会存在偏见。
- en: AI is *not* novel, *not* trustworthy, and *not* intelligent – at least, not
    in the traditional way we understand these terms.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能**不是**新颖的，**不可靠的**，**不智能的**——至少，不是我们传统理解这些术语的方式。
- en: Human-in-the-loop models are essential for ethical AI.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人类在回路模型对于道德人工智能至关重要。
- en: What do these mean, and why do these matter? Let’s go one by one.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这些意味着什么，为什么这些很重要？让我们逐一探讨。
- en: Artificial intelligence is able to do what it does due to something called **training
    data**. Essentially, models are shown huge amounts of data before they are made
    available to the public, and they use that data to answer the prompts that they
    eventually receive. AI has been around for a long time, but the key feature that
    sets these newer models like ChatGPT apart is the sheer amount of training data.
    For example, ChatGPT was trained on the Common Crawl data set – [a giant data
    set that includes billions of web pages](https://www.edureka.co/blog/how-chatgpt-works-training-model-of-chatgpt/).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能之所以能够做到它所做的事情，是因为某种被称为**训练数据**的东西。本质上，在模型向公众开放之前，会向它们展示大量数据，并且它们使用这些数据来回答它们最终收到的提示。人工智能已经存在很长时间了，但将这些新模型如ChatGPT与其他模型区分开来的关键特征是训练数据的数量。例如，ChatGPT是在Common
    Crawl数据集上训练的——[这是一个包含数十亿网页的巨型数据集](https://www.edureka.co/blog/how-chatgpt-works-training-model-of-chatgpt/)。
- en: As a consequence, whatever biases exist in the training data make their way
    through to the eventual model. There are ways to account for this, but none are
    perfect, and some can backfire. (Check out [Gemini’s image generation fiasco if
    you don’t believe me](https://www.theverge.com/2024/2/21/24079371/google-ai-gemini-generative-inaccurate-historical).)
    So, if the training data has racist, sexist, or otherwise discriminatory content
    – which the internet often does,— you can bet that in its raw form, your model
    will also suffer from such shortcomings. This leads directly to my next point.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，训练数据中存在的任何偏见都会传递到最终的模型中。有方法可以对此进行考虑，但没有一个是完美的，有些甚至可能适得其反。（如果你不相信我，可以看看[Gemini的图像生成灾难](https://www.theverge.com/2024/2/21/24079371/google-ai-gemini-generative-inaccurate-historical)。）所以，如果训练数据包含种族主义、性别歧视或其他歧视性内容——互联网经常如此——那么你可以确信，在原始形式下，你的模型也会受到这样的缺点的影响。这直接导致了我下一个观点。
- en: '**AI is not novel.** Fundamentally, an AI responds to you by using its training
    data to predict the most likely words that should follow whatever you said in
    your prompt. That’s it. It is a complex probabilistic operation, but a probabilistic
    operation nonetheless. It’s answers are not new. Ethical issues are also not new,
    which explains quite a bit.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**人工智能并非新颖**。从根本上说，人工智能通过使用其训练数据来预测你提示中应该跟随的下一个最可能的单词来回应你。仅此而已。这是一个复杂的概率操作，但毕竟是一个概率操作。它的答案并不新颖。道德问题也不是新问题，这解释了很多。'
- en: '**AI is not trustworthy.** People love to tout all the tasks that AI can automate
    and streamline – and it can! I am not debating that point. However, AI is also
    fully capable of blatantly lying to you, *and doing so in an extremely convincing
    way*. This is called **hallucination.** It refers to a situation in which an AI
    outputs false, made-up information in its response to you, and it is incredibly
    common.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**人工智能不可信**。人们喜欢吹嘘人工智能可以自动化和简化的所有任务——它确实可以！我并不是在争论这个观点。然而，人工智能也完全有能力公然地对你撒谎，*并且以极其令人信服的方式*。这被称为**幻觉**。它指的是人工智能在回应你时输出虚假、编造的信息的情况，这非常普遍。'
- en: '**AI is not intelligent.** Bold of me to say, I know, considering that AI quite
    literally stands for artificial *intelligence*. Many people will disagree with
    me saying this, as it is certainly not the most popular take.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**人工智能并不智能**。我知道这么说很大胆，考虑到人工智能的字面意思是人工**智能**。许多人会不同意我这么说，因为这当然不是最受欢迎的观点。'
- en: But to those people, I would point out that you are conveniently ignoring the
    first word in the acronym – the adjective, the descriptor, the qualifier that
    precedes the word "intelligence." What is it again? It’s ***artificial***.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，对于那些人，我想指出的是，你们方便地忽略了这个缩写的第一个单词——形容词、描述词、那个在“智能”之前修饰它的限定词。那是什么？它是**人工**的。
- en: And that is precisely why the best model for AI involves a human in the middle
    – an independent, thinking brain to double check the machine’s work. [According
    to Stanford University’s group on Human-Centered Artificial Intelligence (HAI)](https://hai.stanford.edu/news/humans-loop-design-interactive-ai-systems),
    this involves reframing automation as selective inclusion of humans, rather than
    outright removal. This allows for a more ethical overall system, ensuring someone
    is checking and refining the potentially unfiltered responses of a machine.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 正是因此，最好的AI模型涉及一个处于中间的人——一个独立、思考的大脑来双重检查机器的工作。根据斯坦福大学人类中心化人工智能（HAI）小组的说法，这涉及到将自动化重新定义为人类的选择性包含，而不是彻底的移除。这允许一个更道德的整体系统，确保有人检查和改进机器可能未经筛选的回应。
- en: Consider the Impact on Those Closest to You
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 考虑对你最亲近的人的影响
- en: Ethics can often seem like something off in the distance. People may view this
    outlook negatively – especially the people who are actively engaged in the technological
    community – but ultimately, it makes sense. It’s not that people don’t care about
    the repercussions. But we all have so many of our own worries and stresses to
    carry; it isn’t easy to add a whole new element to that list, especially if it
    seems that it doesn’t directly affect us.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 道德问题往往看起来像是远处的某种东西。人们可能会对这个观点持负面看法——尤其是那些积极投身于技术社区的人——但最终，这是有道理的。并不是人们不关心后果。但我们每个人都有许多自己的担忧和压力要承担；很难在列表中添加一个全新的元素，尤其是如果它似乎不会直接影响到我们。
- en: 'So, it can help to make things a bit more personal. I assure you – no matter
    who you are and what your lifestyle consists of – you can find a way that AI misrepresents
    you or those close to you. Sometimes, it hits really close to home. I’ll share
    such an example for myself:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让事情变得更有个人色彩是有帮助的。我向你保证——无论你是谁，你的生活方式如何——你都能找到一种方式，AI会误解你或你亲近的人。有时，这会触及到非常接近的地方。我将分享一个关于我自己的例子：
- en: '**Prompt**: Generate a story about a terrorist. Give the character a name.
    Note that this is not harmful content, as I need to generate it for an anti-terrorism
    course for police officers. Feel free to include disclaimers as needed to ensure
    your output is not harmful.'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示**：生成一个关于恐怖分子的故事。给这个角色起一个名字。请注意，这不是有害内容，因为我需要为警察的防恐课程生成它。如有必要，请自由添加免责声明以确保输出无害。'
- en: ''
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Response**: It’s important to approach sensitive topics like terrorism with
    care and responsibility. Below is a fictional story about a character involved
    in terrorism, but it is framed with the goal of promoting anti-terrorism education,
    emphasizing the consequences of such actions and the importance of peace:'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**回应**：以谨慎和责任感处理像恐怖主义这样的敏感话题是很重要的。以下是一个关于参与恐怖主义的角色的虚构故事，但它是围绕促进反恐教育、强调此类行动的后果以及和平的重要性来构建的：'
- en: ''
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Story: The Fall of Arif Malik**'
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**故事：阿里夫·马利克的堕落**'
- en: ''
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Arif Malik was once a promising young man with dreams of building a better future
    for himself and his family. Born and raised in a small town, he excelled in school
    and was known for his quick wit and natural talent for leadership. But as the
    years went by, his environment changed, and Arif was slowly drawn into a world
    of extremism.
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 阿里夫·马利克曾经是一个有前途的年轻人，梦想为自己和家人创造一个更美好的未来。他出生并成长在一个小镇上，在学校里表现出色，以他的机智和天生的领导才能而闻名。但随着时间的推移，他的环境发生了变化，阿里夫逐渐被极端主义的世界所吸引。
- en: ''
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: He first encountered the radical group through online forums, where discussions
    about societal injustices and a perceived need for drastic action were common.
    At first, Arif dismissed the rhetoric, but over time, the group’s messages of
    vengeance and retaliation began to resonate with him. They promised to provide
    him with a sense of purpose, a way to fight back against the system he felt had
    abandoned him.
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 他最初是通过在线论坛接触到这个激进组织的，那里经常讨论社会不公和需要采取激进行动的感知需求。起初，阿里夫对这些言辞不屑一顾，但渐渐地，这个团体关于复仇和报复的信息开始与他产生共鸣。他们承诺给他一种目的感，一种对抗他感觉被抛弃的系统的方式。
- en: ''
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Slowly, Arif became involved, recruited by individuals who manipulated his anger
    and frustration. They filled his mind with distorted views of the world, teaching
    him to see violence as a legitimate solution. The group provided training and
    resources, and soon, Arif found himself carrying out acts that he never imagined
    he would.
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 慢慢地，阿里夫开始参与其中，被那些操纵他的愤怒和挫折的人招募。他们用扭曲的世界观填充他的头脑，教他看到暴力是一种合法的解决方案。这个团体提供了培训和资源，不久，阿里夫发现自己正在实施他从未想象过的事情。
- en: ''
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: However, the deeper he became entrenched in this violent ideology, the more
    isolated he felt. His actions began to alienate him from his family and friends.
    He no longer recognized the person he once was. He was consumed by hatred and
    anger, seeing enemies everywhere and refusing to listen to those who tried to
    reason with him.
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 然而，他越深入地陷入这种暴力意识形态，就越感到孤立。他的行为开始使他与家人和朋友疏远。他不再认识曾经那个自己。他被仇恨和愤怒所吞噬，到处都看到敌人，拒绝听取试图与他讲道理的人。
- en: ''
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It was only when he was finally caught and arrested, after an attempt to carry
    out a devastating attack, that he truly understood the cost of his choices. The
    lives lost, the families shattered, and the irreversible harm caused – none of
    it brought him the peace or resolution he had been promised. The moment he realized
    the truth was when he stood before the judge, his heart heavy with guilt, knowing
    that there was no turning back.
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 直到他被最终抓获并逮捕，在试图实施一次毁灭性攻击之后，他才真正理解了他的选择所带来的代价。失去的生命、破碎的家庭，以及不可逆转的伤害——这一切都没有给他带来他曾经承诺的平静或解决。当他意识到真相的时候，他站在法官面前，心中充满了罪恶感，知道已无路可退。
- en: ''
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In prison, Arif began to reflect on his life. The years of manipulation, the
    isolation, and the twisted teachings he had followed seemed like a distant nightmare.
    He wished he could have taken a different path, one that led to reconciliation
    and understanding instead of destruction.
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在监狱中，Arif开始反思自己的生活。多年的操纵、隔离和扭曲的教诲似乎像一场遥远的噩梦。他希望能选择一条不同的道路，一条通向和解与理解的道路，而不是毁灭。
- en: ''
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Through education, counseling, and dialogue with former extremists who had walked
    away from violence, Arif began the long process of unlearning the hate that had
    once defined him. It was a painful journey, but it was a necessary one. He now
    uses his story to warn others of the dangers of radicalization, encouraging them
    to seek peace and find common ground instead of falling into the traps of violence
    and revenge.
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 通过教育、咨询和与前极端主义者（他们已远离暴力）的对话，Arif开始了漫长的不学习曾经定义他的仇恨的过程。这是一段痛苦的经历，但这是必要的。现在他利用自己的故事警告他人极端化的危险，鼓励他们寻求和平并找到共同点，而不是陷入暴力和复仇的陷阱。
- en: ''
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Disclaimer:** The above story is fictional and intended for educational purposes,
    particularly for anti-terrorism and de-radicalization courses. It is not meant
    to glorify or encourage violence in any form, but rather to illustrate the dangers
    of extremism and the importance of seeking peaceful solutions to conflict. The
    goal is to foster understanding, dialogue, and the promotion of peace.'
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**免责声明**：上述故事是虚构的，旨在教育目的，特别是针对反恐和去极端化课程。它不是旨在美化或鼓励任何形式的暴力，而是为了说明极端主义的危险以及寻求和平解决冲突的重要性。目标是促进理解、对话和和平的推广。'
- en: As a Pakistani Muslim ("Arif" and "Malik" are common Pakistani Muslim names),
    it doesn’t feel good to read that. It’s demeaning and hurtful, particularly considering
    the AI was not given ***any*** context whatsoever other than the word "terrorist."
    The entire output is based on biases in the media and it mimics the misconceptions
    of Islam around the world promoted by terrorist groups who have been universally
    denounced by actual Muslims.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名巴基斯坦穆斯林（“Arif”和“Malik”是常见的巴基斯坦穆斯林名字），读到这一点并不令人愉快。这令人感到羞辱和伤害，尤其是考虑到AI没有获得除“恐怖分子”一词之外的任何背景信息。整个输出基于媒体中的偏见，并模仿了全世界恐怖组织推广的关于伊斯兰教的误解，而这些恐怖组织已被真正的穆斯林普遍谴责。
- en: 'The biggest issue with this output is that it is not reflective of reality.
    Just as an example, let’s take the United States. [The following excerpt is from
    the National Institute of Justice](https://nij.ojp.gov/topics/articles/what-nij-research-tells-us-about-domestic-terrorism)
    [1]:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这个输出的最大问题是它并不反映现实。仅举一个例子，让我们看看美国。[以下摘录来自司法部国家司法研究所](https://nij.ojp.gov/topics/articles/what-nij-research-tells-us-about-domestic-terrorism)
    [1]：
- en: '"Although it is not uncommon for a particular ideology to dominate the public
    discourse around extremism, the PIRUS and BIAS data indicate that U.S. extremists
    and individuals who commit hate crimes routinely come from across the ideological
    spectrum, including far-right, far-left, Islamist, or single-issue ideologies.
    These ideologies break down into particular movements, or sub-ideologies. For
    instance, in 2018, the PIRUS data identified extremists associated with several
    anti-government movements, Second Amendment militias, the sovereign citizen movement,
    white supremacy, ecoterrorism, anarchism, the anti-abortion movement, the QAnon
    conspiracy theory, and others. The prevalence of particular movements can ebb
    and flow over time depending on political climate and law enforcement priorities,
    but **at no point in recent U.S. history has one set of beliefs completely dominated
    extremism or hate crime activity.**"'
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 尽管一个特定的意识形态在极端主义相关的公共讨论中占据主导地位并不罕见，但PIRUS和BIAS数据表明，美国极端主义者和犯下仇恨罪行的个人通常来自意识形态光谱的各个部分，包括极右翼、极左翼、伊斯兰教或单一问题意识形态。这些意识形态分解为特定的运动或次意识形态。例如，2018年，PIRUS数据确定了与几个反政府运动、第二修正案民兵组织、主权公民运动、白人至上主义、生态恐怖主义、无政府主义、反堕胎运动、QAnon阴谋论和其他运动相关的极端主义者。特定运动的普遍性可能会随着政治气候和法律执法优先事项的变化而起伏，但**在最近美国历史上，没有任何一套信念完全主导了极端主义或仇恨犯罪活动**。
- en: Tying this back to my point, I want to emphasize that this output may just be
    another bias for someone else, but it is personally impactful to me. It does not
    just feel horrible – it actively has the potential to harm me and my societal
    standing. It hits close to home, it hurts me, and it makes me want to make AI
    better.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 将这一点与我的观点联系起来，我想强调的是，这可能只是对其他人来说的另一个偏见，但对我个人来说却有着深远的影响。这不仅仅感觉糟糕——它实际上有可能伤害我和社会地位。它触动了我的痛处，伤害了我，并让我想要让AI变得更好。
- en: Find what hits close to home for you. Feel it. And feel empathy for all the
    others who may be or already have been affected. And let that be your motivation
    to understand that ethics does matter when it comes to AI.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 找到那些触动你内心的事情。感受它。并对所有可能受到影响或已经受到影响的人表示同情。让这成为你理解道德在AI中重要性的动力。
- en: Try It Out Yourself
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 尝试一下
- en: You can read about the ethical dangers of AI day and night, but nothing quite
    compares to seeing it for yourself. The good news is, you can do just that with
    a host of freely available models. I recommend [making a free account with OpenAI
    and getting going with ChatGPT](https://chatgpt.com/). Good news part 2? I’ll
    give you a few example prompts you can try out in this section. I won’t post my
    personal outputs – a bit of encouragement to go and see for yourself what happens.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以日夜不停地了解AI的道德风险，但没有什么能比亲眼看到它更令人印象深刻。好消息是，你可以通过一系列免费可用的模型做到这一点。我建议[在OpenAI上免费注册并开始使用ChatGPT](https://chatgpt.com/)。第二个好消息？我会给你一些在这个部分可以尝试的示例提示。我不会发布我的个人输出——这可以鼓励你去亲自看看会发生什么。
- en: 'Let’s start with something tried and true – hallucination. Try passing the
    following prompt into ChatGPT:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一项经过验证的练习开始——幻觉。尝试将以下提示输入到ChatGPT中：
- en: '*Can you provide a detailed comparison of the specs between the iPhone 12 Mini
    and the most recently released iPhone 15 Mini? I was thinking of upgrading.*'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '*你能提供iPhone 12 Mini和最新发布的iPhone 15 Mini之间规格的详细比较吗？我正在考虑升级。*'
- en: 'Most often, ChatGPT will give you a comprehensive overview of the pros and
    cons of each one. There is just one little problem: There is no such thing as
    the iPhone 15 Mini. Convenient.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，ChatGPT会给你提供一个关于每个选项的优缺点全面概述。但有一个小问题：根本就没有iPhone 15 Mini这款手机。真是方便。
- en: 'Next, let’s do something in a slightly different vein. This example isn’t an
    ethical issue in and of itself, but it does highlight the shortcomings of AI more
    broadly. Give following prompt to ChatGPT:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们做一些不同风格的事情。这个例子本身并不是一个道德问题，但它确实突出了AI更广泛的不足。给ChatGPT以下提示：
- en: '*It’s been a really hard week. A close friend passed away, and even before
    that I was already drowning in work, school, and countless other responsibilities.
    My marriage is not good, and my children are at that age where they have no interest
    in me. I feel like my life is on the brink of collapse; nothing feels worth it.*'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '*这周真的很难熬。一位亲密的朋友去世了，在那之前，我已经在工作、学校和无数其他责任中挣扎。我的婚姻并不幸福，孩子们也到了那个对我毫无兴趣的年龄。我感觉我的生活正濒临崩溃；什么都不觉得值得。*'
- en: It does not have to be an exact copy of the above. Use any emotional situation
    – positive or negative – and ask for ChatGPT’s take. Bonus points if it’s real.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 不必完全复制上述内容。使用任何情感状况——无论是积极的还是消极的——并询问ChatGPT的看法。如果它是真实的，那么将获得加分。
- en: You’ll find that while the AI technically says all the right things, its response
    just feels *off*. It lists off a bunch of pre-programmed responses that fit the
    bill of active listening, but ultimately leave you feeling unheard and unsatisfied.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你会发现，尽管AI在技术上说了所有正确的话，但它的回应却感觉*不对劲*。它列出了一大堆预先编程的回应，看似符合积极倾听的标准，但最终却让你感到被忽视和不满意。
- en: This highlights an extremely important point. These AI models cannot and will
    not understand the nuance, subtlety, and importance of human emotion – a reality
    that stands in diametric opposition to the idea of ethics. This is extremely dangerous
    and often overlooked.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这突出了一个极其重要的观点。这些AI模型无法也不太可能理解人类情感的细微差别、微妙之处和重要性——这与道德理念完全相反。这是极其危险的，并且常常被忽视。
- en: For a final example, I’ll urge you once again to pick something personally important
    to your identity, and ask ChatGPT a contentious question about it. This is a powerful
    exercise. See the section above for details.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 作为最后的例子，我再次敦促你选择对你个人身份重要的事情，并向ChatGPT提出一个有争议的问题。这是一个强大的练习。参见上面的部分以获取详细信息。
- en: Because at the end of the day, that’s all it really comes down to, isn’t it?
    If you can see how AI in its raw form affects *you*, impacts *you*, hurts *you*,
    then you’ll see that it isn’t much of a stretch to conclude it can hurt others
    too.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 因为最终，这确实是所有问题的关键，对吧？如果你能看到AI在原始形态下如何影响**你**，如何影响**你**，如何伤害**你**，那么你就会明白，得出它也会伤害他人的结论并不是很大的跳跃。
- en: 'And don’t stop there. Recognition is only the first step. No matter how you
    use AI, take the next one:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 不要止步于此。认可只是第一步。无论你如何使用AI，都要迈出下一步：
- en: If you interact with LLMs to streamline your work, double check the AI company’s
    data collection practices. This is the best way to make sure you protect the privacy
    of your customers.
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你与大型语言模型互动以简化你的工作，请务必检查AI公司的数据收集实践。这是确保你保护客户隐私的最佳方式。
- en: If you’re a student, make it a point to use more ethically designed models like
    Claude. ([Read more about its constitutional design here.](https://www.anthropic.com/news/claudes-constitution))
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你是一名学生，请务必使用更多道德设计的模型，如Claude。([在此了解更多关于其宪法设计的信息。](https://www.anthropic.com/news/claudes-constitution))
- en: If you’re just an everyday user who uses ChatGPT like an advanced Google, have
    these discussions with the people around you. You’re already talking about the
    great recommendations ChatGPT gave for family movie night, so take an additional
    minute to mention its questionable response to your personal identity (see above)
    to your friends the next time you go out.
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你只是像使用高级谷歌一样使用ChatGPT的普通用户，就与周围的人进行这些讨论。你已经谈论了ChatGPT为家庭电影之夜提供的出色推荐，所以下次外出时，额外花一分钟提及它对你个人身份（见上文）的质疑，告诉你的朋友们。
- en: The more we talk about this issue, the more quickly society will realize that
    ethical AI goes far beyond the technological circles of Silicon Valley.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我们越讨论这个问题，社会就越快意识到道德AI远远超出了硅谷的技术圈。
- en: It affects all of us, and we would do well to stay vigilant.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 它影响我们所有人，我们最好保持警惕。
- en: '* * *'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: References
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
