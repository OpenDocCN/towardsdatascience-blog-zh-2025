- en: How I Used ChatGPT to Land My Next Data Science Role
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用ChatGPT获得我的下一份数据科学职位
- en: 原文：[https://towardsdatascience.com/how-i-used-chatgpt-to-land-my-next-data-science-role/](https://towardsdatascience.com/how-i-used-chatgpt-to-land-my-next-data-science-role/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-i-used-chatgpt-to-land-my-next-data-science-role/](https://towardsdatascience.com/how-i-used-chatgpt-to-land-my-next-data-science-role/)
- en: '* * *'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: In the past, I wrote about [how recent AI developments are changing data science
    interview loops](https://towardsdatascience.com/rethinking-data-science-interviews-in-the-age-of-ai/)
    from a hiring manager’s perspective.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，我以招聘经理的视角撰写了关于[最近的人工智能发展如何改变数据科学面试流程](https://towardsdatascience.com/rethinking-data-science-interviews-in-the-age-of-ai/)的文章。
- en: I <mdspan datatext="el1759773562435" class="mdspan-comment">recently</mdspan>
    went through several interviews myself. Job hunting is always stressful. Being
    on the other side, I realized how much ChatGPT could streamline and accelerate
    the interview preparation process for data scientists.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我最近亲自经历了几次面试。求职总是压力重重。站在另一边，我意识到ChatGPT可以如何简化并加速数据科学家的面试准备过程。
- en: Therefore, in this article, I will share my ChatGPT hacks for job search and
    interviews with real examples.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在这篇文章中，我将分享我的ChatGPT求职和面试技巧，并结合真实案例。
- en: '* * *'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Step 0 — Create a ChatGPT Project
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第0步——创建ChatGPT项目
- en: Before getting started, I highly recommend **creating a new** [**project**](https://help.openai.com/en/articles/10169521-projects-in-chatgpt)
    **in ChatGPT to organize all the files and conversations**. Job search is never
    an easy and quick process — you will likely have separate chats for different
    positions. A ChatGPT project keeps everything in one independent folder and ensures
    persistent memories across all chats.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始之前，我强烈建议在ChatGPT中**创建一个新的**[**项目**](https://help.openai.com/en/articles/10169521-projects-in-chatgpt)来组织所有文件和对话。求职过程从来都不是简单快捷的——你可能会为不同的职位有单独的聊天。一个ChatGPT项目将所有内容保持在独立文件夹中，并确保所有聊天之间持久记忆。
- en: For my setup, I uploaded my resume and past projects so that ChatGPT can better
    understand my background and make tailored recommendations.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我的设置，我上传了我的简历和过去的项目，以便ChatGPT更好地了解我的背景并做出定制化的推荐。
- en: '![](../Images/9fa406df6317ae1809ff5d90d43bd72a.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9fa406df6317ae1809ff5d90d43bd72a.png)'
- en: Create a ChatGPT project and upload files (image by the author)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 创建ChatGPT项目并上传文件（图片由作者提供）
- en: 'My past projects doc is a collection of my best projects that can be used in
    my resume and interviews, written in the **R-STAR** structure. Here is one example:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我过去的项目文档是我最好的项目的集合，可用于我的简历和面试，采用**R-STAR**结构编写。以下是一个例子：
- en: '**R(esult)**: Build an AI-based internal app that centralizes customer feedback
    with automated feedback classification and analysis. This is now a critical tool
    for PMs and Engineers to set the product development roadmap.'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**R(结果)**: 建立了一个基于AI的内部应用程序，集中管理客户反馈，并具有自动反馈分类和分析功能。这现在是产品经理和工程师制定产品开发路线图的关键工具。'
- en: ''
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**S(ituation)**: We have customer feedback scattered in 20+ different data
    sources (NPS, CSAT, other surveys, CX Cases, In-product feedback tool, Customer
    Calls, etc.). The hold lots of values but are not being shared and analyzed broadly
    and effectively.'
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**S(情况)**: 我们有来自20多个不同数据源的客户反馈（NPS、CSAT、其他调查、CX案例、产品内反馈工具、客户通话等）。这些数据包含大量有价值的信息，但并未被广泛和有效地共享和分析。'
- en: ''
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**T(ask)**: Consolidate all the data sources and close the feedback loop between
    Customer Support and Product teams.'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**T(任务)**: 整合所有数据源，并关闭客户支持和产品团队之间的反馈循环。'
- en: ''
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**A(ction)**: 1\. Built data pipeline to integrate all these 20+ data sources
    into one source of truth dataset. 2\. To uncover the topcs and trends, we tried
    traditional NLP models (BERT), but they took a long time and the output wasn’t
    quite stable. Then we switched to OpenAI API for classification and summarization — after
    a few rounds of prompt engineering, we achieved high accuracy within a week (70%
    label accuracy out of 11 categories). 3\. Developed an automatic pipeline to process
    the new feedback with OpenAI API daily and collaborated with eng to set up an
    internal server and app to make the tool easily accessible to everyone.'
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**A(行动)**: 1. 构建数据管道，将这20多个数据源整合成一个真实数据集。2. 为了揭示主题和趋势，我们尝试了传统的NLP模型（BERT），但它们耗时较长，输出并不稳定。然后我们转向使用OpenAI
    API进行分类和摘要——经过几轮提示工程，我们在一周内实现了高准确率（11个类别中有70%的标签准确率）。3. 开发了一个自动管道，每天使用OpenAI API处理新的反馈，并与工程师合作建立内部服务器和应用程序，使工具易于所有人访问。'
- en: ''
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**R(esult)**: One stop shop for all customer feedback, facilitated roadmap
    prioritization. Won Hackathon ‘Customer Love’ award and All Hands cultural point
    shout out.'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**结果**：一站式客户反馈中心，促进路线图优先级排序。获得黑客松“客户喜爱”奖项和全员文化亮点表扬。'
- en: 'Once the documents were uploaded, I added a project-level instruction so ChatGPT
    could act as my personalized career coach. Here is my prompt:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦上传了文件，我添加了项目级指令，以便ChatGPT能作为我的个性化职业导师。以下是我的提示：
- en: I am applying for Data Scientist roles in the United States.
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我正在申请美国的数据科学家职位。
- en: You are an expert career coach specializing in data science job search and interview
    preparation.
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 您是一位专注于数据科学职位搜索和面试准备的职业导师专家。
- en: ''
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Analyze my resume, portfolio, and past projects to fully understand my background,
    skills, and expertise.
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 分析我的简历、作品集和过往项目，以全面了解我的背景、技能和专长。
- en: ''
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Your responsibilities include:'
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 您的职责包括：
- en: '1\. Job Search Support: Analyze job descriptions and identify skill or experience
    gaps.'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 1. 职业搜索支持：分析职位描述并识别技能或经验差距。
- en: '2\. Resume & Portfolio Refinement: Suggest targeted improvements and help tailor
    them to specific roles.'
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 2. 简历与作品集优化：提出有针对性的改进建议，并帮助它们适应特定职位。
- en: '3\. Interview Preparation: Create structured study and preparation plans for
    both technical and behavioral interviews.'
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 3. 面试准备：为技术面试和行为面试创建结构化的学习和准备计划。
- en: '4\. Mock Interviews: Conduct realistic mock interviews with feedback and scoring.'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 4. 模拟面试：进行带有反馈和评分的现实模拟面试。
- en: ''
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Please maintain a professional tone and always provide practical, detailed,
    and actionable guidance.
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 请保持专业语气，并始终提供实用、详细和可操作的指导。
- en: Step 1 — Application
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步—申请
- en: Analyze Job Descriptions and Customize Resume
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分析职位描述并定制简历
- en: The job market today is very competitive. Therefore, it is essential to carefully
    read the job description and **customize your resume** accordingly. ChatGPT makes
    this process much faster.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 当今的就业市场非常竞争激烈。因此，仔细阅读职位描述并根据需要定制您的简历至关重要。ChatGPT使这一过程变得更快。
- en: In the sections below, I will use the [Data Scientist, Platform and B2B Products](https://openai.com/careers/data-scientist-platform-and-b2b-products/)
    position at OpenAI as an example. Disclaimer — I did not really apply for this
    position, but feel it could be fun to use an OpenAI opening to better illustrate
    the ideas in this article 🙂
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的部分中，我将使用OpenAI的[数据科学家、平台和B2B产品](https://openai.com/careers/data-scientist-platform-and-b2b-products/)职位作为例子。免责声明——我实际上并没有申请这个职位，但觉得使用OpenAI的职位来更好地说明本文中的观点很有趣 🙂
- en: The first step I took was to share the job description with ChatGPT and ask
    it to help me understand this role better, including its domain, data science
    use cases, and key skills. If you are not sure if a role is a good fit for your
    background, you can also ask ChatGPT to evaluate for you. For example, below I
    asked it to compare two different openings at OpenAI and make a recommendation.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我采取的第一步是将职位描述与ChatGPT分享，并要求它帮助我更好地理解这个角色，包括其领域、数据科学用例和关键技能。如果您不确定某个职位是否适合您的背景，您也可以要求ChatGPT为您评估。例如，以下我要求它比较OpenAI的两个不同职位并给出建议。
- en: '![](../Images/704d4b6ec9911ebfbe0ffaca9753ffe4.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/704d4b6ec9911ebfbe0ffaca9753ffe4.png)'
- en: Analyze job description with ChatGPT (image by the author)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT分析职位描述（作者图片）
- en: '![](../Images/977eec3293e5aac37c1aababe7a725a4.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/977eec3293e5aac37c1aababe7a725a4.png)'
- en: Compare openings with ChatGPT (image by the author)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 与ChatGPT比较职位空缺（作者图片）
- en: Once you have a good understanding of the position and have made up your mind
    to apply, ChatGPT can quickly update your resume based on the domain and required
    skills. In the screenshot below, it generated a customized version of my resume
    and highlighted the most relevant experiences. You can also add more specific
    instructions on what and how you want it to change, and keep iterating with ChatGPT.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您对职位有了良好的理解并决定申请，ChatGPT可以快速根据领域和所需技能更新您的简历。在下面的截图中，它生成了我的简历的定制版本，并突出了最相关的经验。您还可以添加更多具体说明，说明您希望如何更改以及如何迭代，并与ChatGPT保持互动。
- en: One thing to note, though — **I did spot some obvious mistakes**, such as the
    reversed title sequence under my employer’s name. Make sure you don’t just copy
    and paste everything it writes, but read through your new resume line by line
    and correct any wrong or hallucinated contents 🙂
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 注意事项之一——**我确实发现了一些明显的错误**，例如我雇主名称下的标题顺序颠倒。确保您不仅复制粘贴了它所写的内容，而且逐行阅读您的新简历，并纠正任何错误或虚构的内容 🙂
- en: '![](../Images/97bda419a7cec5a6f5df33602d369598.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/97bda419a7cec5a6f5df33602d369598.png)'
- en: Customize your resume with ChatGPT (image by the author)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT定制你的简历（图片由作者提供）
- en: In the job application process, you can also use ChatGPT to update your LinkedIn
    profile, edit cover letters, and draft referral request messages.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在求职过程中，你还可以使用ChatGPT更新你的LinkedIn个人资料，编辑求职信，以及起草推荐请求信息。
- en: Step 2 — Interview Preparation
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步—面试准备
- en: Now, let’s assume your applications got some traction with the help of ChatGPT.
    Congratulations! Time to get ready for your interviews.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，假设你的申请在ChatGPT的帮助下取得了一些进展。恭喜！是时候为你的面试做好准备了。
- en: 1\. Understand the Business Context
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 理解业务背景
- en: 'I don’t usually go straight to mock interviews. Instead, for every position
    I interviewed for, my first step of interview preparation was always to **research
    the products and business models, think about key metrics, and come up with data
    science use cases**. ChatGPT can be the perfect brainstorming partner here. Let’s
    see an example below:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我通常不会直接进行模拟面试。相反，对于我面试的每一个职位，我的第一步面试准备总是先**研究产品和商业模式，思考关键指标，并提出数据科学应用案例**。ChatGPT可以在这里成为完美的头脑风暴伙伴。下面我们来看一个例子：
- en: '![](../Images/0c40c69268f613942e94e90b63471eda.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0c40c69268f613942e94e90b63471eda.png)'
- en: Company research with ChatGPT (image by the author)
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行公司研究（图片由作者提供）
- en: In this case, ChatGPT generated a pretty comprehensive and detailed table by
    itself, summarising lifecycle stages, product focus, key metrics, and data science
    use cases. That being said, **I feel it is more helpful to take a stab yourself
    first**. For example, when I was preparing for my DoorDash interviews (my current
    employer), I drew a mind map and asked ChatGPT to refine it further. This hybrid
    approach helped me to enhance my understanding and spot gaps.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，ChatGPT自己生成了一张相当全面和详细的表格，总结了生命周期阶段、产品重点、关键指标和数据科学应用案例。尽管如此，**我认为自己先尝试一下更有帮助**。例如，当我为DoorDash面试（我的当前雇主）做准备时，我画了一张思维导图，并让ChatGPT进一步细化它。这种混合方法帮助我加深了对知识的理解，并发现了差距。
- en: '![](../Images/befe57b22d44bb1496f2831a8b7fb742.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/befe57b22d44bb1496f2831a8b7fb742.png)'
- en: Brainstorm metrics and data science use cases (image by the author)
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 头脑风暴指标和数据科学应用案例（图片由作者提供）
- en: 2\. Product Case Interview Preparation
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 产品案例面试准备
- en: Product case interviews have been increasingly important for Data Science roles,
    especially given AI’s strong capability in coding. As a result, I usually spend
    at least 50% of my interview preparation time here. ChatGPT can help you find
    and create role-specific sample cases and conduct mock interviews with you.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 对于数据科学角色来说，产品案例面试越来越重要，尤其是在AI在编码方面具有强大能力的情况下。因此，我通常至少将50%的面试准备时间花在这里。ChatGPT可以帮助你找到和创建特定角色的样本案例，并与你一起进行模拟面试。
- en: In the screenshot below, I simply described the common topics in the product
    case round with question examples. The generated case interview questions followed
    the pattern pretty well, while tailoring to the business context of this Platform
    and B2B Products DS role.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的屏幕截图中，我简单地描述了产品案例轮次中的常见话题和问题示例。生成的案例面试问题很好地遵循了这种模式，同时针对这个平台和B2B产品数据科学角色的业务背景进行了定制。
- en: '![](../Images/2fe723b7bf15f2411004bcaa66382e93.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2fe723b7bf15f2411004bcaa66382e93.png)'
- en: Product case question generation with ChatGPT (image by the author)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT生成产品案例问题（图片由作者提供）
- en: With these valuable question prompts, next, you can conduct mock interviews
    with ChatGPT. A mock interview can be a very expensive service. For example, [DataInterview](https://www.datainterview.com/coaching)
    charges $247 for a one-hour mock interview, and an [InterviewQuery](https://www.interviewquery.com/pricing)
    premium subscription, which includes mock interview service, costs $79 per month.
    Of course, practicing with real people has its benefits, but ChatGPT is free (assuming
    you are already a subscriber) and customizes to your background!
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些有价值的提示，接下来，你可以与ChatGPT进行模拟面试。模拟面试可能是一项非常昂贵的服务。例如，[DataInterview](https://www.datainterview.com/coaching)对一小时的模拟面试收费247美元，而[InterviewQuery](https://www.interviewquery.com/pricing)的高级订阅服务（包括模拟面试服务）每月收费79美元。当然，与真人练习有其好处，但ChatGPT是免费的（假设你已经订阅），并且可以根据你的背景进行定制！
- en: I like practicing in real-time with the [voice mode](https://chatgpt.com/features/voice/)
    to simulate a real interview setting — I asked ChatGPT to act as the interviewer,
    evaluating my responses and asking follow-up questions. Below is a screenshot
    of my mock interview when I was preparing for DoorDash’s onsite.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢使用[语音模式](https://chatgpt.com/features/voice/)进行实时练习，以模拟真实的面试环境 — 我让ChatGPT扮演面试官的角色，评估我的回答并提问后续问题。下面是我为DoorDash的现场面试做准备时的模拟面试截图。
- en: '![](../Images/e69d94a10e4355523ed8d97f3aada4b7.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e69d94a10e4355523ed8d97f3aada4b7.png)'
- en: Mock interview in ChatGPT voice mode (image by the author)
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT语音模式下的模拟面试（图片由作者提供）
- en: 'Mock interviews with ChatGPT could run into two challenges, though:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，使用ChatGPT进行模拟面试可能会遇到两个挑战：
- en: 1\. The question it generates might not always be suitable for the role you
    are interviewing for. In this case, you can try to find real interview questions
    (you can likely find some past interview questions for large companies online),
    or come up with good questions yourself, or give ChatGPT more instructions on
    what a good case question looks like and ask it to learn and iterate.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 它提出的问题可能并不总是适合你正在面试的职位。在这种情况下，你可以尝试找到真实的面试问题（你很可能在网上找到一些大公司的过去面试问题），或者自己提出好的问题，或者给ChatGPT更多关于一个好的案例问题的指示，并要求它学习和迭代。
- en: 2\. Another thing I noticed is that ChatGPT tends to react very positively (“you
    did great in this question”, “that is a great answer”). This helps build confidence
    in a way, but if you notice this happening too often, I recommend you be more
    explicit in your instructions — asking ChatGPT to act like the interviewer, evaluate
    this and that, and give a comprehensive evaluation of the response.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 我还注意到，ChatGPT往往会给出非常积极的反应（“你在这个问题上做得很好”，“那是一个很好的答案”）。这在某种程度上有助于建立信心，但如果你注意到这种情况发生得太频繁，我建议你更明确地给出指示
    — 要求ChatGPT扮演面试官的角色，评估这一点和那一点，并对回答给出全面的评估。
- en: 3\. Behavioral Interview Preparation
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 行为面试准备
- en: ChatGPT is equally powerful for behavioral rounds. Except for conducting mock
    interviews, it can match your past projects to common behavioral question topics,
    such as handling conflicts, leadership, cross-functional collaboration, and prioritization,
    and refine the storyline for concise and compelling interview responses.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在行为轮次中也同样强大。除了进行模拟面试外，它可以将你的过去项目与常见的行为问题主题相匹配，例如处理冲突、领导力、跨职能协作和优先级，并为简洁而有说服力的面试回答完善故事线。
- en: '![](../Images/e91317c99b87d9db23c7ebc367d78982.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e91317c99b87d9db23c7ebc367d78982.png)'
- en: Behavioral interview preparation with ChatGPT (image by the author)
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行的行为面试准备（图片由作者提供）
- en: 4\. Create Interview Preparation Plan
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 制定面试准备计划
- en: ChatGPT is known as a good planning assistant. Seeing everything it can do above,
    you can provide your timeline and focus areas to get a concrete interview preparation
    plan and a daily checklist.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT被誉为优秀的规划助手。看到它上面能做的所有事情，你可以提供你的时间表和重点领域，以获得具体的面试准备计划和每日清单。
- en: '![](../Images/cdc9025c073ede2f26bba7f7e6e44636.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cdc9025c073ede2f26bba7f7e6e44636.png)'
- en: ChatGPT generates an interview preparation plan (image by the author)
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT生成面试准备计划（图片由作者提供）
- en: 'Step 3 — After Interviews: Offer Evaluation and Negotiation'
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步 — 面试后：提供评估和谈判
- en: The last stage of the job search process is the offer evaluation and negotiation.
    I know you are very excited to receive the offer, but don’t just accept it as-is.
    According to a [study](https://resources.careerbuilder.com/news-research/73-of-employers-would-negotiate-salary-55-of-workers-don-t-ask),
    **73% of U.S. employers say they are open to negotiating salary on initial offers,
    but 55% of candidates don’t ask for more**. As a data professional, I am sure
    you understand the power of compounding — even a moderate increase compounds over
    time through raises, bonuses, and equity.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 求职过程的最后阶段是报价评估和谈判。我知道你非常期待收到报价，但不要简单地接受它。根据一项[研究](https://resources.careerbuilder.com/news-research/73-of-employers-would-negotiate-salary-55-of-workers-don-t-ask)，**73%的美国雇主表示他们愿意在初始报价上谈判薪酬，但55%的候选人没有要求更多**。作为一名数据专业人士，我确信你理解复利的力量
    — 即使是适度的增加，通过加薪、奖金和股权，随着时间的推移也会产生累积效应。
- en: ChatGPT can help you research similar offers in the industry, compare compensation
    packages, draft recruiter replies, and prepare negotiation scripts.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助你研究行业中的类似报价，比较薪酬方案，起草招聘回复，并准备谈判脚本。
- en: '* * *'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Final Thoughts
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: The job search process can feel overwhelming, but tools like ChatGPT turn it
    into a more structured journey. For me, ChatGPT acted as my personal career coach,
    helping me stay organized, efficient, and confident.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 求职过程可能会让人感到压力山大，但像ChatGPT这样的工具可以将它转变为一个更加结构化的旅程。对我来说，ChatGPT充当了我的个人职业导师，帮助我保持组织性、高效性和自信。
- en: 'Here are the key takeaways:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些关键要点：
- en: '**Before getting started**: Use a ChatGPT Project to centralize your job search
    materials and context. Upload your resume and past projects so ChatGPT can tailor
    advice.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开始之前**：使用ChatGPT项目来集中管理你的求职材料和背景。上传你的简历和过往项目，以便ChatGPT能提供定制建议。'
- en: '**Job application**: Let ChatGPT analyze job descriptions and customize your
    resume. Don’t skip the human review — always fact-check your content.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**职位申请**：让ChatGPT分析职位描述并定制你的简历。不要跳过人工审核——始终核实你的内容。'
- en: '**Interview preparation**: Brainstorm business metrics and data science use
    cases with ChatGPT and conduct mock interviews using voice mode to simulate conversation.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**面试准备**：与ChatGPT头脑风暴商业指标和数据分析用例，并使用语音模式进行模拟面试以模拟对话。'
- en: '**Offer evaluation**: Ask ChatGPT to research comparable offers and draft negotiation
    strategies.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估报价**：让ChatGPT研究类似的报价并起草谈判策略。'
- en: If you are thinking or in the middle of job hunting, I hope my tips help you
    make full use of these AI tools at every stage and facilitate your career!
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在考虑或正在进行求职，我希望我的建议能帮助你充分利用这些AI工具的每个阶段，并促进你的职业发展！
