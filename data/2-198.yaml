- en: 'From Reporting to Reasoning: How AI Is Rewriting the Rules of Data App Development'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从报告到推理：AI如何重新定义数据应用开发规则
- en: 原文：[https://towardsdatascience.com/from-reporting-to-reasoning-how-ai-is-rewriting-the-rules-of-data-app-development/](https://towardsdatascience.com/from-reporting-to-reasoning-how-ai-is-rewriting-the-rules-of-data-app-development/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/from-reporting-to-reasoning-how-ai-is-rewriting-the-rules-of-data-app-development/](https://towardsdatascience.com/from-reporting-to-reasoning-how-ai-is-rewriting-the-rules-of-data-app-development/)
- en: '*Thank you to our sponsor, [Plotly](https://plotly.com/?utm_source=Towards+Data+Science&utm_medium=ebook&utm_campaign=TDS+Book1),
    for making this ebook possible.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*感谢我们的赞助商[Plotly](https://plotly.com/?utm_source=Towards+Data+Science&utm_medium=ebook&utm_campaign=TDS+Book1)，使这本电子书成为可能。*'
- en: There was a time when building a clean, insightful report felt like the pinnacle
    of data work. Get the KPIs right, add a few compelling visualizations, and you’d
    have a deliverable that could drive decisions and earn buy-in.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 曾经，构建一个干净、有洞察力的报告感觉是数据工作的巅峰。正确地获取KPI，添加一些引人入胜的可视化，你将有一个可以推动决策并获得支持的交付成果。
- en: But the bar has moved.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但标准已经提高了。
- en: Today, static reports and post-hoc summaries don’t go far enough. Business questions
    evolve in real time. Stakeholders expect systems that offer context and recommendations.
    Data science has outgrown the tooling that was designed to wrap up analysis, and
    it needs tools that can stay in the loop.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，静态报告和事后总结已经远远不够。商业问题在实时演变。利益相关者期望系统提供上下文和建议。数据科学已经超越了设计用于总结分析的工具，它需要能够保持循环的工具。
- en: According to Gartner, [agentic AI is the top technology trend in 2025](https://www.gartner.com/en/articles/top-technology-trends-2025?utm_source=Towards+Data+Science&utm_medium=ebook&utm_campaign=TDS+Book1)
    and by 2028, [33% of enterprise software applications will include agentic AI](https://www.gartner.com/en/articles/intelligent-agent-in-ai?utm_source=Towards+Data+Science&utm_medium=ebook&utm_campaign=TDS+Book1),
    driving automation, personalization, and the intelligent orchestration of business
    processes. The coming years are poised to be defined by agentic interfaces, conversational
    exploration, and vibe coding workflows that shorten the path from prompt to production.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 根据Gartner，[代理式AI是2025年的主要技术趋势](https://www.gartner.com/en/articles/top-technology-trends-2025?utm_source=Towards+Data+Science&utm_medium=ebook&utm_campaign=TDS+Book1)，到2028年，[33%的企业级软件应用将包含代理式AI](https://www.gartner.com/en/articles/intelligent-agent-in-ai?utm_source=Towards+Data+Science&utm_medium=ebook&utm_campaign=TDS+Book1)，推动自动化、个性化以及业务流程的智能编排。未来几年将由代理式界面、对话式探索和Vibe编码工作流程定义，这些工作流程将缩短从提示到生产的路径。
- en: 'To help you navigate this shift, we’ve released our first ebook: [**How AI
    Is Shaping the Future of Data App Development: From Charts to Chatbots and Beyond**](https://contact.towardsdatascience.com/how-ai-is-shaping-the-future-of-data-app-development)**.**'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助您应对这一转变，我们发布了我们的第一本电子书：[**AI如何塑造数据应用开发未来：从图表到聊天机器人以及更多**](https://contact.towardsdatascience.com/how-ai-is-shaping-the-future-of-data-app-development)**。**
- en: What you’ll learn
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 您将学到什么
- en: 'This ebook provides valuable insight into:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这本电子书提供了宝贵的见解：
- en: '**Agentic interfaces**: Tools that can observe, plan, and act, not just respond'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理式界面**：能够观察、计划和行动的工具，而不仅仅是响应'
- en: '**Generative workflows**: How AI scaffolds full apps from intent'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成式工作流程**：AI如何从意图构建完整的应用程序'
- en: '**Conversational UI**: Interfaces that engage ambiguity and guide reasoning'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对话式用户界面**：能够处理模糊性并引导推理的界面'
- en: '**Vibe coding**: A prompt-driven development style that bridges idea and implementation'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Vibe编码**：一种以提示驱动的开发风格，将想法和实现连接起来'
- en: '**Secure foundations**: Enterprise-grade controls and authentication built
    in'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全基础**：内置企业级控制和身份验证'
- en: It explores how AI-native tools are collapsing feedback loops, reducing dependencies,
    and giving data scientists more control over the full lifecycle from prototype
    to production.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 它探讨了AI原生工具如何缩短反馈循环，减少依赖，并让数据科学家在从原型到生产的整个生命周期中拥有更多控制权。
- en: Why it matters
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这为什么重要
- en: Being able to explain “what happened” just isn’t enough. Data teams are being
    asked to build tools that help stakeholders understand *why* something happened,
    *what might happen next,* and *what to do about it.* The platforms that support
    that kind of thinking are evolving fast, and we want to help you stay ahead of
    the curve.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 只能解释“发生了什么”是远远不够的。数据团队被要求构建工具，帮助利益相关者理解*为什么*会发生某事，*接下来可能会发生什么*，以及*应该采取什么措施*。支持这种思考的平台正在快速发展，我们希望帮助你保持领先。
- en: This ebook is your roadmap to building intelligent data apps that surface dynamic
    insights and adapt in real time, all within a secure, Python-native environment.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这本电子书是构建智能数据应用的路线图，这些应用能够呈现动态洞察并在实时中适应，所有这些都在一个安全、原生Python的环境中完成。
