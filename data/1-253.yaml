- en: '* * *'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🔥 Challenge
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🔥 挑战
- en: We all have existing images worth reusing in different contexts. This would
    generally imply modifying the images, a complex (if not impossible) task requiring
    very specific skills and tools. This explains why our archives are full of forgotten
    or unused treasures. State-of-the-art vision models have evolved so much that
    we can reconsider this problem.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都有一些现有的图像，可以在不同的环境中重复使用。这通常意味着修改图像，这是一个复杂（如果不是不可能）的任务，需要非常特定的技能和工具。这也解释了为什么我们的档案中充满了被遗忘或未使用的宝藏。最先进的视觉模型已经发展得如此之快，以至于我们可以重新考虑这个问题。
- en: So, can we breathe new life into our visual archives?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们能否为我们的视觉档案注入新的活力？
- en: 'Let’s try to complete this challenge with the following steps:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们按照以下步骤尝试完成这个挑战：
- en: 1️⃣ Start from an archive image we’d like to reuse
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1️⃣ 从我们想要重复使用的存档图像开始
- en: 2️⃣ Extract a character to create a brand-new reference image
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 2️⃣ 提取一个角色以创建全新的参考图像
- en: 3️⃣ Generate a series of images to illustrate the character’s journey, using
    only prompts and the new assets
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 3️⃣ 使用提示和新的资产生成一系列图像，以展示角色的旅程
- en: For this, we’ll explore the capabilities of “Gemini 2.5 Flash Image”, also known
    as “Nano Banana” 🍌.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个，我们将探索“Gemini 2.5 闪存镜像”，也称为“Nano Banana” 🍌 的功能。
- en: '* * *'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🏁 Setup
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🏁 设置
- en: 🐍 Python packages
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🐍 Python 包
- en: 'We’ll use the following packages:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用以下包：
- en: '`google-genai`: The [Google Gen AI Python SDK](https://pypi.org/project/google-genai) lets
    us call Gemini with a few lines of code'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`google-genai`：[Google Gen AI Python SDK](https://pypi.org/project/google-genai)
    允许我们用几行代码调用 Gemini'
- en: '`networkx` for graph management'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`networkx` 用于图管理'
- en: 'We’ll also use the following dependencies:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将使用以下依赖项：
- en: '`pillow` and `matplotlib` for data visualization'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pillow` 和 `matplotlib` 用于数据可视化'
- en: '`tenacity` for request management'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tenacity` 用于请求管理'
- en: '[PRE0]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '* * *'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🤖 Gen AI SDK
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🤖 生成式 AI SDK
- en: 'Create a `google.genai` client:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个 `google.genai` 客户端：
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Check your configuration:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 检查您的配置：
- en: '[PRE2]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '* * *'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🧠 Gemini model
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🧠 Gemini 模型
- en: 'For this challenge, we’ll select the latest Gemini 2.5 Flash Image model:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个挑战，我们将选择最新的 Gemini 2.5 闪存镜像模型：
- en: '`GEMINI_2_5_FLASH_IMAGE = "gemini-2.5-flash-image"`'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '`GEMINI_2_5_FLASH_IMAGE = "gemini-2.5-flash-image"`'
- en: 💡 “Gemini 2.5 Flash Image” is also known as “Nano Banana” 🍌
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 “Gemini 2.5 闪存镜像”也被称为“Nano Banana” 🍌
- en: '* * *'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🛠️ Helpers
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🛠️ 辅助工具
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Define
    some helper functions to generate and display images: 🔽</summary>
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>定义一些生成和显示图像的辅助函数：🔽</summary>
- en: '[PRE4]</details>'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE4]</details>'
- en: '* * *'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🖼️ Assets
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🖼️ 资产
- en: 'Let’s define the assets for our character’s journey and the functions to manage
    them:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义我们角色旅程的资产以及管理它们的函数：
- en: '[PRE5]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '* * *'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 📦 Reference archive
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📦 参考存档
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>We
    can now fetch our reference archive and make it our first asset: 🔽</summary>
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>我们现在可以获取我们的参考存档并将其作为我们的第一个资产：🔽</summary>
- en: '[PRE6]</details>'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![Archive generated in 2024 with Imagen 3 by author](../Images/657e28d4b8001df94fabf4a5b944386b.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![由作者使用 Imagen 3 在 2024 年生成的存档](../Images/657e28d4b8001df94fabf4a5b944386b.png)'
- en: This archive image was generated in July 2024 with a beta version of Imagen
    3, prompted with *“On white background, a small hand-felted toy of blue robot.
    The felt is soft and cuddly…”*. The result looked really good but, at the time,
    there was absolutely no determinism and no consistency. As a result, **this was
    a nice one-shot image generation but the cute little robot seemed gone forever…**
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这张存档图像是在 2024 年 7 月使用 Imagen 3 的测试版生成的，提示为 *“在白色背景上，一个蓝色机器人的小型手工羊毛玩具。羊毛柔软舒适…”*。结果看起来非常好，但当时完全没有确定性，也没有一致性。因此，**这是一次很好的单次图像生成，但可爱的小机器人似乎永远消失了…**
- en: '* * *'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ⛏️ Asset extraction
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ⛏️ 资产提取
- en: 'Let’s try to extract our little robot:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试提取我们的小机器人：
- en: '[PRE8]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![Generated with Gemini Nano Banana by author](../Images/95d5a9644a97c1befb7b103b70bc6cf4.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![由作者使用 Gemini Nano Banana 生成](../Images/95d5a9644a97c1befb7b103b70bc6cf4.png)'
- en: ⚠️ The robot is perfectly extracted, but this is essentially a good background
    removal, which many models can perform. This prompt uses terms from graphics software,
    whereas we can now reason in terms of image composition. It’s also not necessarily
    a good idea to try to use traditional binary masks, as object edges and shadows
    convey significant details about shapes, textures, positions, and lighting.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: ⚠️ 机器人提取得非常完美，但这本质上是一个很好的背景去除，许多模型都能做到。这个提示使用了图形软件中的术语，而我们现在可以用图像构图来推理。此外，尝试使用传统的二值掩码可能也不是一个好主意，因为物体的边缘和阴影传达了关于形状、纹理、位置和光照的许多重要细节。
- en: Let’s go back to our archive to perform an advanced extraction instead, and
    directly generate a character sheet…
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到我们的存档中，进行一次高级提取，并直接生成一个角色表...
- en: '* * *'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🪄 Character sheet
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🪄 角色表
- en: 'Gemini has spatial understanding, so it’s able to provide different views while
    preserving visual features. Let’s generate a front/back character sheet and, as
    our little robot will go on a journey, also add a backpack at the same time:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini 具有空间理解能力，因此能够在保留视觉特征的同时提供不同的视角。让我们生成一个前后角色表，并且由于我们的小机器人将踏上旅程，同时添加一个背包：
- en: '[PRE9]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![Generated with Gemini Nano Banana by author](../Images/96ea2a0f4eea386b730b4425a402a520.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![由作者使用 Gemini Nano Banana 生成](../Images/96ea2a0f4eea386b730b4425a402a520.png)'
- en: '💡 A few remarks:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 💡 几点说明：
- en: Our prompt focuses on the composition of the scene, a common practice in media
    studios.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的任务提示关注场景的构图，这是媒体工作室中常见的做法。
- en: Successive generated images will be consistent, preserving all robot features
    visible in the provided image. However, since we only specified some features
    of the backpack (e.g., a single buckle) and left others unspecified, we’ll get
    slightly different backpacks.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 依次生成的图像将保持一致，保留在提供的图像中可见的所有机器人特征。然而，由于我们只指定了背包的一些特征（例如，一个单排扣）并留下了其他未指定的部分，我们将得到略微不同的背包。
- en: For simplicity, we directly included the backpack in the character sheet. In
    a real production pipeline, we would likely make it part of a separate accessory
    sheet.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了简单起见，我们直接将背包包含在角色表中。在实际的生产流程中，我们可能会将其作为单独的配件表的一部分。
- en: To control the backpack’s exact shape and design, we could also use a reference
    photo of a real backpack and instruct Gemini to “transform the backpack into a
    stylized felt version”.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了控制背包的确切形状和设计，我们也可以使用一个真实背包的参考照片，并指示 Gemini 将“将背包转换成风格化的羊毛版本”。
- en: Gemini can generate `1024 × 1024`images (`1:1` aspect ratio) or equivalent resolutions
    (token-wise) for the other supported aspect ratios (`2:3`, `3:2`, `3:4`, `4:3`, `4:5`, `5:4`, `9:16`, `16:9`,
    and `21:9`).
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Gemini 可以生成 `1024 × 1024` 的图像（`1:1` 比例）或等效分辨率（按令牌计）用于其他支持的宽高比（`2:3`、`3:2`、`3:4`、`4:3`、`4:5`、`5:4`、`9:16`、`16:9`
    和 `21:9`）。
- en: In the request configuration, we specified `aspect_ratio="16:9"`, which generates
    images at `1344 × 768` pixels. If this parameter is omitted, Gemini uses the aspect
    ratio of the input image (the last one if multiple are provided) to select the
    closest supported aspect ratio.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在请求配置中，我们指定了 `aspect_ratio="16:9"`，这会生成 `1344 × 768` 像素的图像。如果省略此参数，Gemini 将使用输入图像的宽高比（如果有多个提供，则是最后一个）来选择最接近的支持宽高比。
- en: This new asset can now serve as a design reference in our future image generations.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这个新资产现在可以成为我们未来图像生成中的设计参考。
- en: '* * *'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ✨ First scene
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ✨ 第一幕
- en: 'Let’s get started with a mountain scenery:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一幅山景开始：
- en: '[PRE10]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![Generated with Gemini Nano Banana by author](../Images/b9e86b5d93087b5f4b0f02baca076195.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![由作者使用 Gemini Nano Banana 生成](../Images/b9e86b5d93087b5f4b0f02baca076195.png)'
- en: 💡 The mountain shape is specified as “dome-like” so our character can stand
    on one of the summits later on.
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 山的形状被指定为“穹顶状”，这样我们的角色就可以站在山顶之一。
- en: It’s important to spend some time on this first scene as, in a cascading effect,
    it will define the overall look of our story. Take some time to refine the prompt
    or try a couple of times to get the best variation.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个第一幕上花些时间是重要的，因为，在连锁反应中，它将定义我们故事的整体外观。花些时间来完善提示或尝试几次以获得最佳变化。
- en: From now on, our generation inputs will be both the character sheet and a reference
    scene…
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 从现在开始，我们的生成输入将包括角色表和参考场景…
- en: '* * *'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ✨ Successive scenes
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ✨ 连续场景
- en: 'Let’s get the robot down a valley:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把机器人放到山谷中：
- en: '[PRE11]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '![Generated with Gemini Nano Banana by author](../Images/ae7334b0d205da9bd1632fd8633212cc.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![由作者使用 Gemini Nano Banana 生成](../Images/ae7334b0d205da9bd1632fd8633212cc.png)'
- en: '💡 A few notes:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 💡 一些注意事项：
- en: The provided specifications about our input images (`"Image 1:…"`, `"Image 2:…"`)
    are important. Without them, “the robot” could refer to any of the 3 robots in
    the input images (2 in the character sheet, 1 in the previous scene). With them,
    we indicate that it’s the same robot. In case of confusion, we can be more specific
    with `"the [entity] from image [number]"`.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供的关于输入图像的规格（`"Image 1:…"`，`"Image 2:…"`）很重要。没有它们，“机器人”可能指的是输入图像中的任何三个机器人（角色表中两个，前一个场景中一个）。有了它们，我们表明它是同一个机器人。如果出现混淆，我们可以用`"the
    [entity] from image [number]"`来更加具体。
- en: On the other hand, since we didn’t provide a precise description of the valley,
    successive requests will give different, interesting, and creative results (we
    can pick our favorite or make the prompt more precise for more determinism).
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一方面，由于我们没有提供山谷的精确描述，连续的请求将给出不同、有趣和创造性的结果（我们可以选择我们最喜欢的，或者使提示更精确以获得更多的确定性）。
- en: Here, we also tested a different lighting, which significantly changes the whole
    scene.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这里，我们也测试了不同的照明，这显著改变了整个场景。
- en: 'Then, we can move forward into this scene:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以进入这个场景：
- en: '[PRE12]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![Generated with Gemini Nano Banana by author](../Images/5f7894a862500474c2771ca49eafb9aa.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![由作者使用 Gemini Nano Banana 生成](../Images/5f7894a862500474c2771ca49eafb9aa.png)'
- en: '💡 Of interest:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 💡 有趣的是：
- en: We could position the character, change its point of view, and even “animate”
    its arms for more expressivity.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以定位角色，改变其视角，甚至“动画”其手臂以增加表现力。
- en: The “no longer holding the map” precision prevents the model from trying to
    keep it from the previous scene in a meaningful way (e.g., the robot dropped the
    map on the floor).
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “不再持有地图”的精确性阻止了模型以有意义的方式尝试保留前一个场景中的地图（例如，机器人把地图扔到了地板上）。
- en: 'We didn’t provide lighting details: The lighting source, quality, and direction
    have been kept from the previous scene.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们没有提供照明细节：光源、质量和方向都保留了前一个场景。
- en: 'Let’s go through the forest:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们穿过森林：
- en: '[PRE13]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '![Generated with Gemini Nano Banana by author](../Images/eaac499bbc32a2f9b3bd0e4894b285cc.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![由作者使用 Gemini Nano Banana 生成](../Images/eaac499bbc32a2f9b3bd0e4894b285cc.png)'
- en: '💡 We changed the ground but didn’t provide additional details for the view
    and the forest: The model will generally preserve most of the trees.'
  id: totrans-103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 我们改变了地面，但没有提供关于视图和森林的额外细节：模型通常会保留大部分树木。
- en: 'Now that the valley-forest sequence is over, we can journey up to the mountains,
    using the original mountain scene as our reference to return to that environment:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 现在山谷-森林序列已经结束，我们可以沿着原始的山景向上走，以那个环境为参考返回：
- en: '[PRE14]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '![Generated with Gemini Nano Banana by author](../Images/fa24eb3175fe0aa128e74a9e21191563.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![由作者使用 Gemini Nano Banana 生成](../Images/fa24eb3175fe0aa128e74a9e21191563.png)'
- en: 💡 The mountain close-up, inferred from the blurred background, is pretty impressive.
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 从模糊的背景中推断出的山景特写相当令人印象深刻。
- en: 'Let’s climb to the summit:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们爬到山顶：
- en: '[PRE15]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '![Generated with Gemini Nano Banana by author](../Images/6738f08b6a0f9c39355376343e7951a3.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![由作者使用 Gemini Nano Banana 生成](../Images/6738f08b6a0f9c39355376343e7951a3.png)'
- en: 💡 This is a logical follow-up but also a nice, different view.
  id: totrans-111
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 这是一个逻辑上的后续，也是一个很好的、不同的视角。
- en: 'Now, let’s try something different to significantly recompose the scene:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们尝试一些不同的东西，以显著重组场景：
- en: '[PRE16]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '![Generated with Gemini Nano Banana by author](../Images/b6186d9e81a1ec7f4509c49612e26829.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![由作者使用 Gemini Nano Banana 生成](../Images/b6186d9e81a1ec7f4509c49612e26829.png)'
- en: '💡 Of interest:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 💡 有趣的是：
- en: This imperative prompt composes the scene in terms of actions. It’s sometimes
    easier than descriptions.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个命令提示从动作的角度来构建场景。它有时比描述更容易。
- en: A new mountain is added as instructed, and it is both different and consistent.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按照指示添加了一座新山，它既不同又一致。
- en: The bridge attaches to the summits in very plausible ways and seems to obey
    the laws of physics.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 桥梁以非常合理的方式连接到山顶，似乎遵循物理定律。
- en: 'The “Remove the ice axes” instruction is here for a reason. Without it, it’s
    as if we were prompting “do whatever you can with the ice axes from the previous
    scene: leave them where they are, don’t let the robot leave without them, or anything
    else”, leading to random results.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “移除冰镐”的指令有它的原因。没有它，就好像我们在提示“尽可能使用前一个场景中的冰镐：把它们留在原地，不要让机器人离开时不带它们，或者做其他任何事情”，导致结果随机。
- en: It’s also possible to get the robot to walk on the bridge, seen from the side
    (which we never generated before), but it’s hard to have it consistently walk
    from left to right. Adding left and right views in the character sheet should
    fix this.
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 也有可能让机器人从侧面走过桥梁（这是我们之前从未生成过的），但让它从左到右一致地走是困难的。在角色表中添加左右视图应该可以解决这个问题。
- en: 'Let’s generate a final scene and let the robot get some well-deserved rest:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们生成一个最终场景，让机器人得到应得的休息：
- en: '[PRE17]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '![Generated with Gemini Nano Banana by author](../Images/6ac20edc8c3a592aaed6721249049742.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![由作者使用 Gemini Nano Banana 生成](../Images/6ac20edc8c3a592aaed6721249049742.png)'
- en: '💡 Of interest:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 💡 有趣的是：
- en: This time, the prompt is descriptive, and it works as well as the previous imperative
    prompt.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这次，提示是描述性的，并且与之前的命令提示一样有效。
- en: The bridge-hammock transformation is really nice and preserves the attachments
    on the mountain summits.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 桥-吊床变换非常好，并且保留了山顶上的连接。
- en: The robot transformation is also impressive, as it hasn’t been seen in this
    position before.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器人的变换也非常令人印象深刻，因为这个位置之前从未见过。
- en: The closed eyes are the most difficult detail to get consistently (may require
    a couple of attempts), probably because we’re accumulating many different transformations
    at once (and diluting the model’s attention). For full control and more deterministic
    results, we can focus on significant changes over iterative steps, or create various
    character sheets upfront.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 闭眼是最难保持一致性的细节（可能需要尝试几次），这可能是由于我们同时积累了许多不同的变换（并稀释了模型的注意力）。为了实现完全控制和更确定的结果，我们可以关注迭代步骤中的显著变化，或者事先创建各种角色表。
- en: We have illustrated our story with 9 new consistent images! Let’s take a step
    back to understand what we’ve built…
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 我们用9张新的连续图像来描绘我们的故事！让我们退后一步，了解我们构建了什么…
- en: '* * *'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🗺️ Graph visualization
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🗺️ 图可视化
- en: We now have a collection of image assets, from archives to brand-new generated
    assets.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在有一系列图像资产，从档案到全新的生成资产。
- en: Let’s add some data visualization to get a better sense of the steps completed…
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们添加一些数据可视化，以更好地了解完成的步骤…
- en: '* * *'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🔗 Directed graph
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔗 有向图
- en: Our new assets are all related, connected by one or more “generated from” links.
    From a data structure point of view, this is a directed graph.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的新资产都是相关的，通过一个或多个“由...生成”的链接相互连接。从数据结构的角度来看，这是一个有向图。
- en: 'We can build the corresponding directed graph using the `networkx` library:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用`networkx`库构建相应的有向图：
- en: '[PRE18]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '[PRE19]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Let’s
    place the most used asset in the center and display the other assets around: 🔽</summary>
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>让我们将最常用的资产放在中心，并将其他资产围绕其显示：🔽</summary>
- en: '[PRE20]</details>'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE20]</details>'
- en: '[PRE21]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '![Generated by author from article''s notebook](../Images/05fc6957a6b15e388629193c003afba8.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![由作者从文章的笔记本生成](../Images/05fc6957a6b15e388629193c003afba8.png)'
- en: That’s a correct summary of our different steps. It’d be nice if we could also
    visualize our assets…
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对我们不同步骤的正确总结。如果能可视化我们的资产那就更好了…
- en: '* * *'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🌟 Asset graph
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🌟 资产图
- en: '<details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Let’s
    add custom `matplotlib` functions to render the graph nodes with the assets in
    a more visually appealing way: 🔽</summary>'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>让我们添加自定义的`matplotlib`函数来以更视觉吸引力的方式渲染带有资产的图节点：🔽</summary>
- en: '[PRE22]</details>'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE22]</details>'
- en: 'We can now display our generation graph:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以显示我们的生成图：
- en: '[PRE23]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: '![Generated by author from article''s notebook](../Images/4146b170bcf4a8ba6390a80cc546f4b6.png)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![由作者从文章的笔记本生成](../Images/4146b170bcf4a8ba6390a80cc546f4b6.png)'
- en: '* * *'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🚀 Challenge completed
  id: totrans-153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🚀 任务完成
- en: 'We managed to generate a full set of new consistent images with Nano Banana
    and learned a few things along the way:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我们成功地使用Nano Banana生成了一套完整的新的一致性图像，并在过程中学到了一些东西：
- en: 'Images prove again that they are worth a thousand words: It’s now a lot easier
    to generate new images from existing ones and simple instructions.'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像再次证明它们的价值：现在从现有图像和简单指令生成新图像变得容易得多。
- en: We can create or edit images just in terms of composition (letting us all become
    artistic directors).
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以仅从构图的角度创建或编辑图像（让我们所有人都能成为艺术总监）。
- en: We can use descriptive or imperative instructions.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以使用描述性或命令性指令。
- en: The model’s spatial understanding allows 3D manipulations.
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型的空间理解允许3D操作。
- en: We can add text in our outputs (character sheet) and also refer to text in our
    inputs (front/back views).
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以在输出中添加文本（角色表），也可以在我们的输入中引用文本（正面/背面视图）。
- en: 'Consistency can be preserved at very different levels: character, scene, texture,
    lighting, camera angle/type…'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一致性可以在非常不同的层面上得到保持：角色、场景、纹理、照明、摄像机角度/类型…
- en: The generation process can still be iterative but it feels like 10x-100x faster
    for reaching better-than-hoped-for results.
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成过程仍然可以是迭代的，但感觉比达到期望结果快10倍到100倍。
- en: It’s now possible to breathe new life into our archives!
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现在可以给我们的档案注入新的活力！
- en: 'Possible next steps:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 可能的下一步：
- en: The process we followed is essentially a generation pipeline. It can be industrialized
    for automation (e.g., changing a node regenerates its descendants) or for the
    generation of different variations in parallel (e.g., the same set of images could
    be generated for different aesthetics, audiences, or simulations).
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们遵循的过程本质上是一个生成管道。它可以实现自动化（例如，更改一个节点会重新生成其子节点）或并行生成不同变体（例如，同一组图像可以用于不同的美学、受众或模拟）。
- en: For the sake of simplicity and exploration, the prompts are intentionally simple.
    In a production environment, they could have a fixed structure with a systematic
    set of parameters.
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了简化探索，提示被有意设计得简单。在生产环境中，它们可以有一个固定的结构，并带有系统化的参数集。
- en: We described scenes as if in a photo studio. Virtually any other imaginable
    artistic style is possible (photorealistic, abstract, 2D…).
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们描述场景就像在摄影棚中一样。几乎任何可以想象的艺术风格都是可能的（逼真的、抽象的、2D…）。
- en: Our assets could be made self-sufficient by saving prompts and ancestors in
    the image metadata (e.g., in PNG chunks), allowing for full local storage and
    retrieval (no database needed and no more lost prompts!). For details, see the
    “asset metadata” section in the notebook (link below).
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以通过在图像元数据（例如，在PNG块中）保存提示和祖先，使我们的资产能够自给自足，从而实现完全的本地存储和检索（无需数据库，也不会再丢失提示！）。有关详细信息，请参阅笔记本中的“资产元数据”部分（以下链接）。
- en: 'As a bonus, let’s end with an animated version of our journey, with the generation
    graph also showing a glimpse of our instructions:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 作为额外奖励，让我们以我们的旅程的动画版本结束，同时生成图也展示了我们的指令的一瞥：
- en: '[PRE24]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: '![Generated by author from article''s notebook](../Images/0169a1d4dbf4793d12d1780e3b0fabc1.png)'
  id: totrans-170
  prefs: []
  type: TYPE_IMG
  zh: '![由作者从文章的笔记本生成](../Images/0169a1d4dbf4793d12d1780e3b0fabc1.png)'
- en: '* * *'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ➕ More!
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ➕ 更多！
- en: '**Want to go deeper?**'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '**想要深入了解？**'
- en: '**Try it yourself:** Use the [article’s accompanying notebook](https://github.com/GoogleCloudPlatform/generative-ai/blob/main/gemini/use-cases/media-generation/consistent_imagery_generation.ipynb)
    to reproduce the results or generate your own images.'
  id: totrans-174
  prefs:
