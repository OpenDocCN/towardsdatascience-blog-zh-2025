- en: Tips for Setting Expectations in AI Projects
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在AI项目中设定期望的技巧
- en: 原文：[https://towardsdatascience.com/tips-for-setting-expectations-in-ai-projects/](https://towardsdatascience.com/tips-for-setting-expectations-in-ai-projects/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/tips-for-setting-expectations-in-ai-projects/](https://towardsdatascience.com/tips-for-setting-expectations-in-ai-projects/)
- en: <mdspan datatext="el1754946924317" class="mdspan-comment">If you want your</mdspan>
    AI project to succeed, mastering expectation management comes first.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754946924317" class="mdspan-comment">如果你想让你的</mdspan> AI项目成功，掌握期望管理是首要任务。
- en: When working with AI projets, uncertainty isn’t just a side effect, it can make
    or break the entire initiative.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当与AI项目合作时，不确定性不仅仅是一个副作用，它可能使整个项目成功或失败。
- en: Most people impacted by AI projects don’t fully understand how AI works, or
    that errors are not only inevitable but actually a natural and important part
    of the process. If you’ve been involved in AI projects before, you’ve probably
    seen how things can go wrong fast when expectations aren’t clearly set with stakeholders.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 受AI项目影响的大多数人并不完全了解AI是如何工作的，或者错误不仅是不可避免的，而且是过程的一个自然且重要的部分。如果你以前参与过AI项目，你可能已经看到当期望没有与利益相关者明确设定时，事情可以很快出错。
- en: In this post, I’ll share practical tips to help you manage expectations and
    keep your next AI project on track, specially in projects in the B2B (business-to-business)
    space.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将分享实用的技巧，帮助你管理期望，并确保你的下一个AI项目按计划进行，特别是在B2B（企业对企业）空间的项目中。
- en: '* * *'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (Rarely) promise performance
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: （很少）承诺性能
- en: When you don’t yet know the data, the environment, or even the project’s exact
    goal, promising performance upfront is a perfect way to ensure failure.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当你还不了解数据、环境，甚至项目的确切目标时，提前承诺性能是确保失败的最佳方式。
- en: You’ll likely miss the mark, or worse, incentivised to use questionable statistical
    tricks to make the results look better than they are.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 你很可能会错过目标，或者更糟的是，被激励使用可疑的统计技巧来使结果看起来比实际情况更好。
- en: A better approach is to discuss performance expectations **only after** you’ve
    seen the data and explored the problem in depth. At DareData, one of our key practices
    is adding a **“Phase 0”** to projects. This early stage allows us to explore possible
    directions, assess feasibility, and establish a potential baseline, all before
    the customer formally approves the project.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的方法是，在看到数据并深入探讨问题之后，**仅**讨论性能期望。在DareData，我们的一项关键实践是在项目中添加一个**“阶段0”**。这个早期阶段允许我们探索可能的方向，评估可行性，并在客户正式批准项目之前建立潜在的基线。
- en: '**The only time I recommend committing to a performance target from the start
    is when:**'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**我唯一推荐从一开始就承诺性能目标的情况是：**'
- en: You have complete confidence in, and deep knowledge of, the existing data.
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你对现有数据有完全的信心，并且对它们有深入的了解。
- en: You’ve solved the exact same problem successfully many times before.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你以前已经成功解决了完全相同的问题多次。
- en: '* * *'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Map Stakeholders
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利益相关者映射
- en: Another essential step is identifying **who will be interested in your project**
    from the very start. Do you have multiple stakeholders? Are they a mix of business
    and technical profiles?
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的步骤是从一开始就确定**谁会对你的项目感兴趣**。你有多位利益相关者吗？他们是商业和技术背景的混合体？
- en: Each group will have different priorities, perspectives, and measures of success.
    Your job is to ensure you deliver value that matters to all of them.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 每个团队都会有不同的优先级、观点和成功衡量标准。你的任务是确保你为他们提供有价值的成果。
- en: This is where **stakeholder mapping** becomes essential. You need to identify
    understanding their goals, concerns, and expectations. And you most tailor your
    communication and decision-making throughout the project in the different dimnsions.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是**利益相关者映射**变得至关重要的地方。你需要了解他们的目标、担忧和期望，并在项目的不同维度中调整你的沟通和决策。
- en: Business stakeholders might care most about ROI and operational impact, while
    technical stakeholders will focus on data quality, infrastructure, and scalability.
    If either side feels their needs aren’t being addressed, you are going to have
    a hard time shipping your product or solution.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 商业利益相关者可能最关心投资回报率和运营影响，而技术利益相关者将关注数据质量、基础设施和可扩展性。如果任何一方觉得他们的需求没有得到满足，你将很难推出你的产品或解决方案。
- en: One example from my career was a project where a customer needed an integration
    with a product-scanning app. From the start, this integration wasn’t guaranteed,
    and we had no idea how easy it would be to implement. We decided to bring the
    app’s developers into the conversation early. That’s when we learned they were
    about to launch the exact feature we planned to build, only two weeks later. This
    saved the customer a lot of time and money, and spared the team from the frustration
    of creating something that would never be used.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我职业生涯中的一个例子是一个客户需要一个与产品扫描应用程序的集成项目。从一开始，这个集成并没有保证，我们也不知道实施起来会多么容易。我们决定尽早将应用程序的开发者引入对话。那时我们得知他们即将推出我们计划在两周后构建的
    exactly feature。这为客户节省了大量时间和金钱，并让团队免于创建永远不会被使用的产品的挫败感。
- en: '* * *'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Communicate AI’s Probabilistic Nature Early
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 早期沟通AI的概率性质
- en: AI is **probabilistic by nature**, a fundamental difference from traditional
    software engineering. In most cases, stakeholders aren’t accustomed to working
    in this kind of uncertainty. To help, humans aren’t naturally good at thinking
    in probabilities unless we’ve been trained for it (which is why lotteries still
    sell so well).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: AI **本质上具有概率性**，这是与传统软件工程的根本区别。在大多数情况下，利益相关者不习惯在这种不确定性中工作。为了帮助，除非我们受过这方面的训练，否则人类在思考概率方面并不擅长（这就是为什么彩票仍然卖得很好）。
- en: '![](../Images/012ffab4232799159ca6e565575be58f.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/012ffab4232799159ca6e565575be58f.png)'
- en: Traditional SE vs. AI – Image by Author
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 传统软件工程与AI对比 – 图片由作者提供
- en: That’s why it’s essential to **communicate the probabilistic nature of AI projects
    from the very start**. If stakeholders expect deterministic, 100% consistent results,
    they’ll quickly lose trust when reality doesn’t match that vision.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么从一开始就**沟通AI项目的概率性质**至关重要。如果利益相关者期望确定性的、100%一致的结果，当现实与这种愿景不符时，他们很快就会失去信任。
- en: 'Today, this is easier to illustrate than ever. Generative AI offers clear,
    relatable examples: even when you give the exact same input, the output is rarely
    identical. Use demonstrations early and communicate this from the first meeting.
    Don’t assume that stakeholders understand how AI works.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，这比以往任何时候都更容易说明。生成式AI提供了清晰、易懂的例子：即使你给出完全相同的输入，输出也很少是相同的。尽早进行演示，并在第一次会议中就传达这一点。不要假设利益相关者理解AI是如何工作的。
- en: '* * *'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Set Phased Milestones
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设定分阶段里程碑
- en: '**Set phased milestones from the start.** From day one, define clear checkpoints
    in the project where stakeholders can assess progress and make a go/no-go decision.
    This not only builds confidence but also ensures that expectations are aligned
    throughout the process.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**从开始就设定分阶段的里程碑。** 从第一天起，在项目中定义清晰的检查点，让利益相关者可以评估进度并做出是否继续的决定。这不仅能够建立信心，还能确保在整个过程中期望是一致的。'
- en: For each milestone, establish a consistent communication routine with reports,
    summary emails, or short steering meetings. The goal is to keep everyone informed
    about progress, risks, and next steps.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个里程碑，建立一致的沟通常规，包括报告、总结电子邮件或简短的指导会议。目标是让每个人了解进度、风险和下一步行动。
- en: 'Remember: stakeholders would rather hear bad news early than be left in the
    dark.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 记住：利益相关者宁愿早点听到坏消息，也不愿被蒙在鼓里。
- en: '![](../Images/3e5982a0a9ed5ce9ab5df053f85a1389.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3e5982a0a9ed5ce9ab5df053f85a1389.png)'
- en: Project Phase – Image by Author
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 项目阶段 – 图片由作者提供
- en: Steer away from Technical Metrics to Business Impact
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免技术指标，转向业务影响
- en: '**Technical metrics alone rarely tell the full story** when it comes to what
    matters most: business impact.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**仅凭技术指标很少能完全讲述** 当涉及到最重要的方面：业务影响时。'
- en: Take accuracy, for example. If your model scores 60%, is that good or bad? On
    paper, it might look poor. But what if every true positive generates significant
    savings for the organization, and false positives have little or no cost? Suddenly,
    that same 60% starts looking very attractive.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 以准确性为例。如果你的模型得分为60%，这是好是坏？在纸上，它可能看起来很糟糕。但假设每个真正的阳性预测都能为组织节省大量资金，而假阳性几乎没有或没有成本呢？突然，那个同样的60%看起来非常吸引人。
- en: Business stakeholders often overemphasize technical metrics as it’s easier for
    them to grasp, which can lead to misguided perceptions of success or failure.
    In reality, **communicating the business value is far more powerful and easier
    to grasp**.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 业务利益相关者往往过分强调技术指标，因为这对他们来说更容易理解，这可能导致对成功或失败的错误认识。实际上，**传达业务价值要更有力，也更易于理解**。
- en: Whenever possible, focus your reporting on business impact and leave the technical
    metrics to the data science team.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在可能的情况下，将您的报告重点放在业务影响上，将技术指标留给数据科学团队。
- en: 'An example from one project we’ve done at my company: we built an algorithm
    to detect equipment failures. Every correctly identified failure saved the company
    over €500 per factory piece. However, each false positive stopped the production
    line for more than two minutes, costing around €300 on average. Because the cost
    of a false positive was significant, we focused on optimizing for **precision**
    rather than pushing accuracy or recall higher. This way, we avoided unnecessary
    stoppages while still capturing the most valuable failures.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们公司在项目中做的一个例子：我们构建了一个算法来检测设备故障。每次正确识别的故障为公司节省了超过500欧元，每台工厂设备。然而，每次误报都导致生产线停工超过两分钟，平均成本约为300欧元。由于误报的成本很高，我们专注于优化**精确度**而不是提高准确度或召回率。这样，我们避免了不必要的停机，同时仍然捕捉到最有价值的故障。
- en: Business stakeholders often overemphasize technical metrics because they’re
    easier to grasp, which can lead to misguided perceptions of success or failure.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 商业利益相关者往往过分强调技术指标，因为它们更容易理解，这可能导致对成功或失败的错误认知。
- en: '* * *'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Showcase Scenarios of Interpretability
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 展示可解释性的场景
- en: '**More accurate models are not always more interpretable**, and that’s a trade-off
    stakeholders need to understand from day one.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**更精确的模型并不总是更可解释的**，这是利益相关者从第一天起就需要理解的一个权衡。'
- en: Often, the techniques that give us the highest performance (like complex ensemble
    methods or deep learning) are also the ones that make it hardest to explain *why*
    a specific prediction was made. Simpler models, on the other hand, may be easier
    to interpret but can sacrifice accuracy.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，给我们带来最高性能的技术（如复杂的集成方法或深度学习）也是最难解释为什么做出特定预测的原因。另一方面，简单的模型可能更容易解释，但可能会牺牲准确性。
- en: 'This trade-off is not inherently good or bad, it’s a decision that should be
    made in the context of the project’s goals. For example:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这种权衡本身并不一定是好是坏，它应该是在项目目标背景下做出的决定。例如：
- en: In highly regulated industries (finance, healthcare), interpretability might
    be more valuable than squeezing out the last few points of accuracy.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在高度监管的行业（如金融、医疗保健）中，可解释性可能比挤出最后一点准确性更有价值。
- en: In other industries, such as when marketing a product, a performance boost could
    bring such significant business gains that reduced interpretability is an acceptable
    compromise.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在其他行业，例如在推广产品时，性能的提升可能会带来如此显著的商业收益，以至于降低可解释性是一个可接受的妥协。
- en: '**Don’t shy away from raising this early.** You need to know that everyone
    agrees on the balance between accuracy and transparency before you commit to a
    path.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**不要回避早期提出这一点**。在您承诺一条路径之前，您需要知道每个人都同意准确性和透明度之间的平衡。'
- en: '* * *'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Think about Deployment from Day 1
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从第一天起就考虑部署。
- en: '**AI models are built to be deployed.** From the very start, you should design
    and develop them with deployment in mind.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI模型是用于部署的**。从一开始，您就应该考虑部署来设计和开发它们。'
- en: The ultimate goal isn’t just to create an impressive model in a lab, it’s to
    make sure it works reliably in the real world, at scale, and integrated into the
    organization’s workflows.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 最终目标不仅仅是创建一个在实验室中令人印象深刻的模型，而是确保它在现实世界中可靠地工作，可扩展，并集成到组织的业务流程中。
- en: 'Ask yourself: *What’s the use of the “best” AI model in the world if it can’t
    be deployed, scaled, or maintained?* Without deployment, your project is just
    an expensive proof of concept with no lasting impact.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 自问：*如果“世界上最好的”AI模型无法部署、扩展或维护，它的用途是什么？* 没有部署，您的项目只是一个昂贵的概念验证，没有持久的影响。
- en: Consider deployment requirements early (infrastructure, data pipelines, monitoring,
    retraining processes) and you ensure your AI solution will be usable, maintainable,
    and impactful. Your stakeholders will thank you.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 早期考虑部署需求（基础设施、数据管道、监控、再训练流程）可以确保您的AI解决方案可使用、可维护且具有影响力。您的利益相关者会感谢您。
- en: '* * *'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: (Bonus) In GenAI, don’t shy away from speaking about the cost
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: (Bonus) 在生成式人工智能（GenAI）中，不要回避谈论成本
- en: '**Solving a problem with Generative AI (GenAI) can deliver higher accuracy,
    but it often comes at a cost.**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用生成式人工智能（GenAI）解决问题可以提供更高的准确性，但通常这也伴随着成本。**'
- en: 'To achieve the level of performance many business users imagine, such as the
    experience of ChatGPT, you may need to:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 要达到许多商业用户想象中的性能水平，例如ChatGPT的体验，您可能需要：
- en: Call a large language model (LLM) multiple times in a single workflow.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在单个工作流程中多次调用大型语言模型（LLM）。
- en: Implement **Agentic AI** architectures, where the system uses multiple steps
    and reasoning chains to reach a better answer.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施使用多个步骤和推理链来达到更好答案的**代理式AI**架构。
- en: Use **more expensive, higher-capacity LLMs** that significantly increase your
    cost per request.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**更昂贵、更高容量的LLM**，这会显著增加你的每请求成本。
- en: This means performance in GenAI projects isn’t just about *performance,* it’s
    always a balance between quality, speed, scalability, and cost.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着在生成式AI项目中，性能不仅仅是关于**性能**，它总是在质量、速度、可扩展性和成本之间保持平衡。
- en: When I speak with stakeholders about GenAI performance, I always bring cost
    into the conversation early. Business users often assume that the high performance
    they see in consumer-facing tools like ChatGPT will translate directly into their
    own use case. In reality, those results are achieved with models and configurations
    that may be prohibitively expensive to run at scale in a production environment
    (and only possible for multi-billion dollar companies).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当我与利益相关者讨论生成式AI性能时，我总是尽早将成本纳入谈话。商业用户通常认为他们在ChatGPT等面向消费者的工具中看到的高性能会直接转化为他们自己的用例。实际上，这些结果是通过可能在生产环境中运行成本过高（并且只有对价值数十亿美元的公司而言才可行）的模型和配置实现的。
- en: 'The key is **setting realistic expectations**:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 关键是**设定现实的期望**：
- en: If the business is willing to pay for the top-tier performance, great
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果企业愿意为顶级性能付费，那太好了。
- en: If cost constraints are strict, you may need to optimize for a “good enough”
    solution that balances performance with affordability.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果成本限制很严格，你可能需要优化一个“足够好”的解决方案，在性能和可负担性之间取得平衡。
- en: '* * *'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Those are my tips for setting expectations in AI projects, especially in the
    B2B space, where stakeholders often come in with strong assumptions.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是我为设置AI项目期望的建议，尤其是在B2B领域，利益相关者通常会带着强烈的假设进入。
- en: What about you? Do you have tips or lessons learned to add? Share them in the
    comments!
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 关于你呢？你有什么建议或经验教训要分享吗？在评论中分享它们吧！
