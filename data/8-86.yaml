- en: AI-Powered Information Extraction and Matchmaking
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI驱动信息提取和匹配
- en: 原文：[https://towardsdatascience.com/ai-powered-information-extraction-and-matchmaking-0408c93ec1b9/](https://towardsdatascience.com/ai-powered-information-extraction-and-matchmaking-0408c93ec1b9/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/ai-powered-information-extraction-and-matchmaking-0408c93ec1b9/](https://towardsdatascience.com/ai-powered-information-extraction-and-matchmaking-0408c93ec1b9/)
- en: '***If you are not a Medium member, you can read the full article from [this
    link.](https://towardsdatascience.com/ai-powered-information-extraction-and-matchmaking-0408c93ec1b9?sk=623aaf8837df5630ed60c40e66766553)***'
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '***如果您不是Medium会员，您可以通过[这个链接](https://towardsdatascience.com/ai-powered-information-extraction-and-matchmaking-0408c93ec1b9?sk=623aaf8837df5630ed60c40e66766553)阅读完整文章。***'
- en: With the increasing efficiency of Large Language Models (LLMs), they are becoming
    increasingly popular for information extraction from business documents such as
    legal contracts, invoices, financial reports, and resumes, to name a few. The
    information extracted from multiple sources could be used for matchmaking and
    recommendation systems.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 随着大型语言模型（LLMs）效率的提高，它们在从法律合同、发票、财务报告和简历等商业文件中提取信息方面变得越来越受欢迎。从多个来源提取的信息可用于匹配和推荐系统。
- en: 'Some of the applications of information extraction and matchmaking include:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 信息提取和匹配的一些应用包括：
- en: Automatic request-for-quotation (RFQ) generation by extracting information from
    customers’ requests
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过从客户请求中提取信息自动生成报价请求（RFQ）
- en: Extracting key usage patterns from customer’s data to provide product recommendations
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从客户数据中提取关键使用模式以提供产品推荐
- en: Extracting key information from tenders and matching it with company profiles
    to find the potential bidders
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从投标中提取关键信息并与公司资料匹配以寻找潜在投标人
- en: Extracting key information from a company’s invoices and sales documents to
    generate sale-purchase reports
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从公司的发票和销售文件中提取关键信息以生成销售采购报告
- en: Extracting key information from purchase orders to facilitate inventory and
    supply chain management
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从采购订单中提取关键信息以促进库存和供应链管理
- en: Matching individuals on dating or matrimonial platforms based on their profiles,
    etc.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据个人资料在约会或婚恋平台上匹配个人，等等。
- en: 'During my AI consultancy experience in the [FAIR EDIH project in Finland](https://www.fairedih.fi/en/frontpage/),
    I encountered several match-making use cases that could be implemented by employing
    LLMs for information extraction and subsequently providing recommendations aligned
    with the extracted information. Some of these use cases include:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在我在芬兰FAIR EDIH项目中的AI咨询经验期间（[FAIR EDIH项目网站](https://www.fairedih.fi/en/frontpage/)），我遇到了几个可以通过使用LLMs进行信息提取并随后提供与提取信息相一致的建议的匹配用例。其中一些用例包括：
- en: Matching users’ preferences for buying cars and houses
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 匹配用户购买汽车和房屋的偏好
- en: Mapping student skills with career pathways in a learning management system
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在学习管理系统中将学生的技能与职业路径进行匹配
- en: Matching EU regulations and compliances with tender proposals
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将欧盟法规和合规性匹配到投标提案
- en: Recommending experts for reviewing a research proposal
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据研究提案推荐专家进行审查
- en: Providing peer recommendations to students for enhancing the learning experience
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为学生提供同伴推荐以增强学习体验
- en: Upskilling recommendations for a company’s employees based on their profiles
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据员工的个人资料提供技能提升建议
- en: Relocating applicants to workplaces matching with their profiles, to name a
    few.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将求职者迁移到与他们的个人资料相匹配的工作场所，等等。
- en: In this article, I will discuss a use case of extracting key information from
    a job seeker’s Curriculum Vitae (CV) or resume and recommending jobs aligned with
    the job seeker’s profile from a job database. The method applies to both CVs and
    resumes; however, I will only use the term "CV" throughout the article. This use
    case is very useful for job search platforms that want to integrate AI into their
    existing system. Such platforms maintain a job database and allow users to create
    profiles and/or upload their CVs. The same method can also be applied to help
    recruiters find potential candidates who match the job ads.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我将讨论一个从求职者的简历或个人简历中提取关键信息并从职位数据库中推荐与求职者个人资料相匹配的职位的用例。此方法适用于简历和个人简历；然而，我将在整篇文章中仅使用“简历”一词。这个用例对于希望将AI集成到现有系统中的求职平台非常有用。此类平台维护一个职位数据库，并允许用户创建个人资料和/或上传他们的简历。同样的方法也可以用来帮助招聘人员找到与职位广告相匹配的潜在候选人。
- en: In this article, we will develop an application with a simple GUI to analyze
    an uploaded CV to extract a profile comprising educational credentials, skills,
    and professional experience, and subsequently recommend top matching jobs matching
    with the profile, along with an explanation for each selection.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将开发一个具有简单 GUI 的应用程序，用于分析上传的简历，提取包括教育背景、技能和专业经验在内的个人资料，并随后推荐与个人资料匹配度最高的职位，并对每个选择进行解释。
- en: '***It is important to note that this example use case can be extended for several
    other information extraction and matchmaking tasks.***'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '***需要注意的是，这个示例用例可以扩展到多个其他的信息提取和匹配任务。***'
- en: 'This article will cover the following topics:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 本文将涵盖以下主题：
- en: Utilizing LlamaParse and Pydantic models to extract structured information from
    documents using an LLM.
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用 LlamaParse 和 Pydantic 模型，通过 LLM 从文档中提取结构化信息。
- en: Applying this information extraction method to CVs to extract educational credentials,
    skills, and professional experience.
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将此信息提取方法应用于简历，以提取教育背景、技能和专业经验。
- en: Scoring the extracted skills based on their strength (semantic score) in the
    CV.
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据简历中技能的强度（语义分数）对提取的技能进行评分。
- en: Creating a job vector database from a curated list of job ads.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从精心挑选的职位广告列表中创建职位向量数据库。
- en: Retrieving top matching jobs from the vector database based on their semantic
    similarity with the extracted profile.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据提取的个人资料与向量数据库中职位的语义相似度检索最匹配的职位。
- en: Generating the final job recommendations with an LLM with an explanation for
    each recommendation.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 LLM 生成最终的职位推荐，并对每个推荐进行解释。
- en: Developing a simple streamlit application, allowing the selection of multiple
    LLMs and embedding models (both OpenAI and open-source).
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开发一个简单的 streamlit 应用程序，允许选择多个 LLM 和嵌入模型（包括 OpenAI 和开源）。
- en: '***The whole code can be found in my [GitHub repository](https://github.com/umairalipathan1980/CV-Analyzer-Job-Recommender/tree/main)
    with complete instructions.***'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '***完整的代码和详细说明可以在我的 [GitHub 仓库](https://github.com/umairalipathan1980/CV-Analyzer-Job-Recommender/tree/main)
    中找到。***'
- en: 'There are two main folders in the repository: i) the code in the folder [OpenAI
    models](https://github.com/umairalipathan1980/CV-Analyzer-Job-Recommender/tree/main/OpenAI%20models)
    uses OpenAI’s *gpt-4o LLM* and *text-embedding-3-large* embedding model, and ii)
    the code in the folder [Multiple models](https://github.com/umairalipathan1980/CV-Analyzer-Job-Recommender/tree/main/Multiple%20models)
    offers the option to select OpenAI as well as open-source LLMs (e.g., *gpt-4o*,
    *gpt-4o-mini*, _llama3:70b-instruct-q4*0*, *mistral:latest*, *llama3.3:latest*)
    and embedding models (e.g., *text-embedding-3-large*, *text-embedding-3-small*,
    *BAAI/bge-small-en-v1.5*).'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 仓库中有两个主要的文件夹：i) [OpenAI models](https://github.com/umairalipathan1980/CV-Analyzer-Job-Recommender/tree/main/OpenAI%20models)
    文件夹中的代码使用了 OpenAI 的 *gpt-4o LLM* 和 *text-embedding-3-large* 嵌入模型，ii) [Multiple
    models](https://github.com/umairalipathan1980/CV-Analyzer-Job-Recommender/tree/main/Multiple%20models)
    文件夹中的代码提供了选择 OpenAI 以及开源 LLM（例如，*gpt-4o*，*gpt-4o-mini*，_llama3:70b-instruct-q4*0*，*mistral:latest*，*llama3.3:latest*）和嵌入模型（例如，*text-embedding-3-large*，*text-embedding-3-small*，*BAAI/bge-small-en-v1.5*）的选项。
- en: You will need an OpenAI’s API key to run the code in the [[OpenAI models](https://github.com/umairalipathan1980/CV-Analyzer-Job-Recommender/tree/main/OpenAI%20models)](https://github.com/umairalipathan1980/CV-Analyzer-Job-Recommender/tree/main/OpenAI%20models)
    folder. However, if you have a powerful PC with a CUDA-enabled GPU, you can test
    the code in [Multiple models](https://github.com/umairalipathan1980/CV-Analyzer-Job-Recommender/tree/main/Multiple%20models)
    folder with open-source models for free. You can run this code even without a
    CUDA-enabled GPU, but the processing will be too slow. Both the codes are flexible
    to add more LLMs and/or embedding models for experiments. For the sake of simplicity,
    I will only refer to the code in OpenAI models in this article.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要 OpenAI 的 API 密钥来运行 [OpenAI models](https://github.com/umairalipathan1980/CV-Analyzer-Job-Recommender/tree/main/OpenAI%20models)
    文件夹中的代码。然而，如果您有一台配备 CUDA 功能的 GPU 的强大 PC，您可以使用开源模型免费测试 [Multiple models](https://github.com/umairalipathan1980/CV-Analyzer-Job-Recommender/tree/main/Multiple%20models)
    文件夹中的代码。即使没有 CUDA 功能的 GPU，您也可以运行此代码，但处理速度会非常慢。这两个代码都灵活，可以添加更多 LLM 和/或嵌入模型进行实验。为了简化，我将只在这篇文章中提及
    OpenAI 模型中的代码。
- en: The following figure shows the overall process.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 下图展示了整体流程。
- en: '![The overall process of extracting key information from CVs and recommending
    matching jobs from a job database (image by author)](../Images/a4372af9c5916dc3e7d744412db83f4d.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![从简历中提取关键信息并从职位数据库推荐匹配工作的整体流程（图片由作者提供）](../Images/a4372af9c5916dc3e7d744412db83f4d.png)'
- en: The overall process of extracting key information from CVs and recommending
    matching jobs from a job database (image by author)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 从简历中提取关键信息并从职位数据库推荐匹配工作的整体流程（图片由作者提供）
- en: Following is a snapshot of the streamlit application.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是Streamlit应用程序的快照。
- en: '![A snapshot of the Streamlit application (image by author)](../Images/96db5fbf39dc3c8d52bd3cbba17843c1.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![Streamlit应用程序的快照（图片由作者提供）](../Images/96db5fbf39dc3c8d52bd3cbba17843c1.png)'
- en: A snapshot of the Streamlit application (image by author)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: Streamlit应用程序的快照（图片由作者提供）
- en: Parsing with LlamaParse and Information Extraction & Validation with Pydantic
    Models
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用LlamaParse进行解析，以及使用Pydantic模型进行信息提取与验证
- en: In the following article, I demonstrated information extraction from unstructured
    documents using LLMs. Here, I used *python-docx* library to extract text from
    AI consultancy documents (MS WORD) and directly send the text of each document
    to an LLM for information extraction.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的文章中，我展示了使用LLM从非结构化文档中提取信息。在这里，我使用了*python-docx*库从AI咨询文档（MS WORD）中提取文本，并将每个文档的文本直接发送给LLM进行信息提取。
- en: '[**LLM-Powered Parsing and Analysis of Semi-Structured & Structured Documents**](https://towardsdatascience.com/llm-powered-parsing-and-analysis-of-semi-structured-structured-documents-f03ac92f063e)'
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**LLM-Powered Parsing and Analysis of Semi-Structured & Structured Documents**](https://towardsdatascience.com/llm-powered-parsing-and-analysis-of-semi-structured-structured-documents-f03ac92f063e)'
- en: In another article, I demonstrated a better parsing method using [LlamaParse](https://docs.llamaindex.ai/en/stable/llama_cloud/llama_parse/)
    for a contextual, multimodal Retrieval Augment Generation (RAG). LlamaParse is
    a genAI-based document parsing platform that parses and cleans data, ensuring
    it is of good quality and in proper format before passing it to an LLM. Please
    see the abovementioned article to set up LlamaParse and get its free API key.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一篇文章中，我展示了使用[LlamaParse](https://docs.llamaindex.ai/en/stable/llama_cloud/llama_parse/)进行上下文、多模态检索增强生成（RAG）的更好解析方法。LlamaParse是一个基于genAI的文档解析平台，它解析并清理数据，确保在传递给LLM之前数据质量良好且格式正确。请参阅上文提到的文章以设置LlamaParse并获得其免费API密钥。
- en: '[**Integrating Multimodal Data into a Large Language Model**](https://towardsdatascience.com/integrating-multimodal-data-into-a-large-language-model-d1965b8ab00c)'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**Integrating Multimodal Data into a Large Language Model**](https://towardsdatascience.com/integrating-multimodal-data-into-a-large-language-model-d1965b8ab00c)'
- en: In this article, I will use LlamaParse to parse data from a CV. However, instead
    of directly extracting the required information from the parsed content using
    an LLM, I will use [Pydantic](https://docs.pydantic.dev/latest/) models to enforce
    a specific schema for information extraction and validate the extracted information
    against the given schema. This process ensures that the output generated by an
    LLM conforms to the expected types and formats. Pydantic validation also [helps
    to reduce LLM hallucinations](https://pydantic.dev/articles/llm-validation).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将使用LlamaParse从简历中解析数据。然而，我将不会直接使用LLM从解析内容中提取所需信息，而是将使用[Pydantic](https://docs.pydantic.dev/latest/)模型来强制执行特定的信息提取模式，并验证提取的信息是否符合给定的模式。这个过程确保了由LLM生成的输出符合预期的类型和格式。Pydantic验证也有助于[减少LLM的幻觉](https://pydantic.dev/articles/llm-validation)。
- en: Pydantic offers a clean and concise way to define data models using Python classes.
    Before discussing the Pydantic-guided information extraction from CVs, I will
    first start with an example to demonstrate this process for any document. I will
    use the same example document of AI consultancy for companies as used in the [abovementioned
    article](https://medium.com/r?url=https%3A%2F%2Ftowardsdatascience.com%2Fllm-powered-parsing-and-analysis-of-semi-structured-structured-documents-f03ac92f063e)
    to extract key, structured information from an AI consultancy document. Here is
    the example document.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: Pydantic提供了一种使用Python类定义数据模型的简洁方式。在讨论Pydantic引导的从简历中提取信息之前，我将首先通过一个示例来演示这个过程，以适用于任何文档。我将使用与[上文提到的文章](https://medium.com/r?url=https%3A%2F%2Ftowardsdatascience.com%2Fllm-powered-parsing-and-analysis-of-semi-structured-structured-documents-f03ac92f063e)中相同的公司AI咨询示例文档来从AI咨询文档中提取关键、结构化的信息。以下是示例文档。
- en: '[PRE0]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'We have hundreds of such unstructured documents and the aim is to extract the
    following key information: *company name, country, consultation date, experts,
    consultation type, area domain, current solution, AI field, AI maturity level,
    technical expertise and capability, company type, aim, identified target market,
    data requirement assessment, FAIR’s services sought, and recommendations.*'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有数百这样的非结构化文档，目标是提取以下关键信息：*公司名称，国家，咨询日期，专家，咨询类型，领域，当前解决方案，AI领域，AI成熟度水平，技术专长和能力，公司类型，目标，确定的目标市场，数据需求评估，寻求的FAIR服务，以及建议。*
- en: The following libraries must be installed before running the given codes.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行给定代码之前，必须安装以下库。
- en: '[PRE1]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The following code defines a Pydantic model to enforce a particular schema for
    data extraction, validating LLM’s output, and converting the format of some fields
    into an expected format.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码定义了一个Pydantic模型，以强制执行特定数据提取的架构，验证LLM的输出，并将某些字段的格式转换为预期格式。
- en: '[PRE2]json'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE2]json'
- en: '{AIconsultation.schema_json(indent=2)}'
  id: totrans-52
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '{AIconsultation.schema_json(indent=2)}'
- en: '[PRE3]json [PRE4]'
  id: totrans-53
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[PRE3]json [PRE4]'
- en: The description of all fields in `AIconsultation`class is self-explanatory.
    The field validator function `validate_and_convert_date` checks the format of
    the extracted `consultation_date`field and converts it into a required format
    (`dd-mm-yyyy`) if required. The function `extract_content()`parses the given AI
    consultancy document using Llamaparse, and the function `extract_information()`extracts
    the required information from the document using `gpt-4o`LLM, guided by the Pydantic
    model. The `prompt` in `extract_information` function instructs the model to follow
    the Pydantic schema and output the response in a JSON format.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '`AIconsultation`类中所有字段的描述都是不言自明的。字段验证函数`validate_and_convert_date`检查提取的`consultation_date`字段的格式，并在需要时将其转换为所需的格式（`dd-mm-yyyy`）。函数`extract_content()`使用Llamaparse解析给定的AI咨询文档，函数`extract_information()`使用`gpt-4o`LLM从文档中提取所需信息，由Pydantic模型指导。`extract_information`函数中的`prompt`指示模型遵循Pydantic架构并以JSON格式输出响应。'
- en: Llamaprse splits the documents into multiple sub-documents based on the overall
    context. As per the instructions given to the parser (see `parsing_instructions`
    in `extract_content()`function), the parser creates multiple sections and assigns
    each section a heading. The parser’s output (`document`object in `extract_content()`function)
    contains sub-document id’s, meta data of each sub-document, and the text containing
    multiple sections with headings.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: LlamaParse根据整体上下文将文档拆分为多个子文档。根据提供给解析器的说明（见`extract_content()`函数中的`parsing_instructions`），解析器创建多个部分并为每个部分分配一个标题。解析器的输出（`extract_content()`函数中的`document`对象）包含子文档ID，每个子文档的元数据，以及包含多个标题的文本。
- en: '![LlamaParse''s output contained in document object in `extract_content()`
    function (image by author)](../Images/5eb4de62b35c0c9bf26ab48f8be914b3.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![LlamaParse的输出包含在`extract_content()`函数中的`document`对象中（图片由作者提供）](../Images/5eb4de62b35c0c9bf26ab48f8be914b3.png)'
- en: LlamaParse’s output contained in ***`document`*** object in **`extract_content()**`
    function (image by author)
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: LlamaParse的输出包含在`extract_content()`函数中的`document`对象中（图片由作者提供）
- en: I only select text (`text_content`in `extract_content()`function) for information
    extraction by LLM. Here is the final output of `extract_content()`function. The
    document has been split into multiple sections, with each section assigned a heading.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我只为信息提取选择文本（`extract_content()`函数中的`text_content`），以下是`extract_content()`函数的最终输出。文档已被拆分为多个部分，每个部分都分配了一个标题。
- en: '![](../Images/fb593cf19f9b429369b786ba4bd89410.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fb593cf19f9b429369b786ba4bd89410.png)'
- en: Finally, the `extract_information()`function extracts the required information
    (defined in the Pydantic model) from the parsed content in a nicely structured
    format. The consultation date was validated and converted into `dd-mm-yyyy`format.
    Note that in `prompt`, we do not need to specify what information we want to extract,
    as this has been specified in Pydantic models.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，`extract_information()`函数以良好的结构化格式从解析内容中提取所需信息（在Pydantic模型中定义）。咨询日期已验证并转换为`dd-mm-yyyy`格式。请注意，在`prompt`中，我们不需要指定要提取的信息，因为这在Pydantic模型中已经指定了。
- en: '[PRE5]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Parsing CV Content and Information Extraction & Validation Using Pydantic Models
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用Pydantic模型解析CV内容和信息提取与验证
- en: After a demonstration of parsing documents with LlamaParse and information extraction
    via Pydantic models, let’s now discuss parsing and key information extraction
    from CVs using Pydantic models and provide job recommendations aligned with the
    extracted profile. Here, the extracted educational credentials, skills, and past
    experience have been considered sufficient information to provide matching job
    recommendations.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在演示了使用 LlamaParse 解析文档并通过 Pydantic 模型进行信息提取之后，现在让我们讨论使用 Pydantic 模型从简历中解析和提取关键信息，并提供与提取的配置文件相匹配的工作推荐。在这里，提取的教育资格、技能和以往的经验被认为是提供匹配工作推荐足够的信息。
- en: 'The GitHub code is structured into two .*py* files:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub 代码结构分为两个 .*py* 文件：
- en: '`CV_analyzer.py`: defines the Pydantic models, configures the LLM and the embedding
    model, parses CV’s data, extracts the required information from CV, assigns scores
    to the extracted skills, and retrives matching jobs from the job vector database.'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`CV_analyzer.py`：定义 Pydantic 模型，配置 LLM 和嵌入模型，解析简历数据，从简历中提取所需信息，为提取的技能分配分数，并从工作向量数据库中检索匹配的工作。'
- en: '`job_recommender.py`: initializes a Streamlit application, calls the functions
    in CV_analyzer.py in a sequential manner, and displays the extracted information
    and job recommendations.'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`job_recommender.py`：初始化一个 Streamlit 应用程序，按顺序调用 `CV_analyzer.py` 中的函数，并显示提取的信息和工作推荐。'
- en: The overall function of the code is depicted in the following image.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 代码的整体功能如下所示。
- en: '![Workflow of the job recommendation application: integration of CvAnalyzer
    and RAGStringQueryEngine for CV parsing, Pydantic guided profile extraction with
    LLM, skill scoring, and job recommendation with Streamlit output (image by author).](../Images/3962de03989b19f547bb16083a12e772.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![工作推荐应用程序的工作流程：集成 CvAnalyzer 和 RAGStringQueryEngine 进行简历解析，使用 LLM 进行 Pydantic
    引导的配置文件提取，技能评分以及使用 Streamlit 输出的工作推荐（图片由作者提供）](../Images/3962de03989b19f547bb16083a12e772.png)'
- en: 'Workflow of the job recommendation application: integration of `CvAnalyzer`
    and `RAGStringQueryEngine` for CV parsing, Pydantic guided profile extraction
    with LLM, skill scoring, and job recommendation with Streamlit output (image by
    author).'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 工作推荐应用程序的工作流程：集成 `CvAnalyzer` 和 `RAGStringQueryEngine` 进行简历解析，使用 LLM 进行 Pydantic
    引导的配置文件提取，技能评分以及使用 Streamlit 输出的工作推荐（图片由作者提供）。
- en: A few structures in this code have been adopted from [this source](https://github.com/luillyfe/resume-insights)
    with significant enhancements. Let’s discuss all the classes and functions in
    the code one by one.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 代码中的一些结构借鉴自 [这个来源](https://github.com/luillyfe/resume-insights)，并进行了重大改进。让我们逐一讨论代码中的所有类和函数。
- en: The following code in `CV_analyzer.py` shows the definitions of the Pydantic
    models.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 以下 `CV_analyzer.py` 中的代码显示了 Pydantic 模型的定义。
- en: '[PRE6]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The `Education`class in the pydantic model defines the extraction of educational
    details including institution’s name, the degree or qualification earned, the
    graduation date, and additional details like coursework or achievements. The `Experience`
    class defines the extraction of professional experience details including company
    name, location, role, start and end dates, and a list of responsibilities or tasks.
    The main class [PRE7]Education`and`Experience`classes, along with other candidate-specific
    information like name, email, age, and skills. The field validators in each class
    handle the conversion of invalid and irrelevant values (such as n/a or ‘none’)
    or improperly formatted inputs into a consistent data format.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在 pydantic 模型中的 `Education` 类定义了提取教育细节，包括机构的名称、获得的学位或资格、毕业日期以及课程或成就等额外细节。`Experience`
    类定义了提取职业经验细节，包括公司名称、地点、角色、起始和结束日期以及责任或任务列表。主要类包括 `[PRE7]Education` 和 `Experience`
    类，以及其他候选人的特定信息，如姓名、电子邮件、年龄和技能。每个类中的字段验证器处理将无效和不相关的值（如 n/a 或 ‘none’）或格式不正确的输入转换为一致的数据格式。
- en: After defining the Pydantic models,`CV_analyzer.py`uses a`CvAnalyzer` class
    with the following structure for performing various tasks.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义了 Pydantic 模型之后，`CV_analyzer.py` 使用以下结构的 `CvAnalyzer` 类来执行各种任务。
- en: '[PRE8]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '`extract_profile_info`function first parses the given CV with LlamaParse and
    splits it into sections (as demonstrated in the example presented in the beginning
    of the article). It then sends the CV’s contents `self._resume_content`to the
    LLM with the Pydantic schema and information extraction instructions (see `prompt`).
    The response from the LLM (`response`) is validated against the Pydantic schema.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '`extract_profile_info` 函数首先使用 LlamaParse 解析给定的简历，并将其分割成部分（如文章开头示例所示）。然后，它将简历的内容
    `self._resume_content` 与Pydantic模式和信息提取指示一起发送给LLM（见 `prompt`）。LLM的响应（`response`）与Pydantic模式进行验证。'
- en: It is worth mentioning that instead of the original parsed content (`document`)
    with metadata and other information, I extract the text data (`self._resume_content`)
    and send it to the LLM for information extraction. This prevents the LLM from
    becoming confused between the information scattered across different nodes, which
    could result in omitting some parts of the required information.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，我提取了文本数据（`self._resume_content`）而不是带有元数据和其它信息的原始解析内容（`document`），并将其发送给LLM进行信息提取。这防止了LLM在处理散布在不同节点上的信息时产生混淆，这可能导致遗漏一些必要信息的一部分。
- en: '[PRE9]json'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE9]json'
- en: '{output_schema}'
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '{输出模式}'
- en: '[PRE10]json [PRE11]'
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[PRE10]json [PRE11]'
- en: The `compute_skill_scores`function computes the embeddings of each extracted
    skill and that of the CV contents. It then computes a Cosine similarity score
    between the skill and CV embeddings. The more prominent a skill is in a CV, the
    higher the Cosine similarity score it gets. This Cosine similarity score for each
    skill is normalized between 0 and 5 to display in a 5-star format.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '`compute_skill_scores` 函数计算每个提取的技能及其简历内容的嵌入。然后，它计算技能和简历嵌入之间的余弦相似度分数。在简历中，技能越突出，其余弦相似度分数就越高。每个技能的余弦相似度分数被归一化到0到5之间，以5星级格式显示。'
- en: '[PRE12]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The function `create_or_load_job_index` creates a new job vector database or
    loads an index from an existing job vector database (see `job_index_storage`folder
    in the code repository).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 `create_or_load_job_index` 创建一个新的职位向量数据库或从现有的职位向量数据库中加载索引（请参阅代码仓库中的 `job_index_storage`
    文件夹）。
- en: '[PRE13]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The job dataset, from which the vector database is created, is in `sample_jobs.json`
    file in the code repository. I curated this example dataset by scrapping 50 job
    ads from different sources in JSON format. Here is how the job ads are stored
    in this file.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 从中创建向量数据库的职位数据集位于代码仓库中的 `sample_jobs.json` 文件中。我通过从不同来源抓取了50个职位广告的JSON格式，精心整理了这个示例数据集。以下是该文件中存储职位广告的方式。
- en: '[PRE14]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The function `query_jobs` retrieves `top_k` matching job ads from the job vector
    database which are then sent to the LLM for final recommendation.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 `query_jobs` 从职位向量数据库中检索 `top_k` 匹配的职位广告，然后将这些广告发送给LLM进行最终推荐。
- en: '[PRE15]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The `CvAnalyzer`class and its above-mentioned methods are initialized and called
    by `job_recommender.py`which serves as the main application code. `job_recommender.py`uses
    the following custom query engine to provide final job recommendations with the
    function.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '`CvAnalyzer` 类及其上述方法由 `job_recommender.py` 初始化和调用，该文件作为主应用程序代码。`job_recommender.py`
    使用以下自定义查询引擎通过函数提供最终职位推荐。'
- en: '[PRE16]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'The main function in `job_recommender.py` works as follows:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '`job_recommender.py` 中的主要功能如下：'
- en: '[PRE17]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: The main function initializes `CVAnalyzer` class with the selected models and
    calls `extract_profile_info` function to extract profile information. It then
    loads the job vector index and calls `query_jobs` function to retrieve the jobs
    matching with the extracted profile. Subsequently, it initializes the query engine
    (`rag_engine`) and sends the retrieved jobs (`retreived_context`) and profile
    information (`candidate_details`) to the LLM with instructions on what aspects
    to consider to generate the final job recommendations (see `qa_prompt`).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 主要函数使用所选模型初始化 `CVAnalyzer` 类，并调用 `extract_profile_info` 函数以提取个人资料信息。然后它加载职位向量索引，并调用
    `query_jobs` 函数检索与提取的个人资料匹配的职位。随后，它初始化查询引擎（`rag_engine`），并将检索到的职位（`retreived_context`）和个人资料信息（`candidate_details`）连同关于生成最终职位推荐的考虑方面的指示发送给LLM（见
    `qa_prompt`）。
- en: '[PRE18]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The following three functions displays educational credentials, skills, and
    experience. The function `list_skills`calls `compute_skill_scores`function to
    compute the cosine similarity score for each skill and then converts each score
    in a 5-star rating.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 以下三个函数显示教育资格、技能和经验。函数 `list_skills` 调用 `compute_skill_scores` 函数计算每个技能的余弦相似度分数，然后将每个分数转换为5星级评分。
- en: '[PRE19]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: See the following snapshots of the profile information extraction and job recommendations
    from the Streamlit app. The sample CV (Sample CV.pdf) can be found in the code
    repository.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是从Streamlit应用程序中提取的个人信息和职业推荐快照。样本简历（Sample CV.pdf）可以在代码存储库中找到。
- en: '![Sample CV (image by author)](../Images/9c8ea5cd8ec7f318c79752013b800730.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![样本简历（图片由作者提供）](../Images/9c8ea5cd8ec7f318c79752013b800730.png)'
- en: Sample CV (image by author)
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 样本简历（图片由作者提供）
- en: '![Screenshot 1: gpt-4o and text-embedding-3-large models (image by author)](../Images/abe410b3449713afaa21e2fe057e0350.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![屏幕截图 1：gpt-4o 和 text-embedding-3-large 模型（图片由作者提供）](../Images/abe410b3449713afaa21e2fe057e0350.png)'
- en: 'Screenshot 1: gpt-4o and text-embedding-3-large models (image by author)'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕截图 1：gpt-4o 和 text-embedding-3-large 模型（图片由作者提供）
- en: '![Screenshot 2: gpt-4o and text-embedding-3-large models (image by author)](../Images/ec8d1ae371af554d64fc5d4d1c3776c6.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![屏幕截图 2：gpt-4o 和 text-embedding-3-large 模型（图片由作者提供）](../Images/ec8d1ae371af554d64fc5d4d1c3776c6.png)'
- en: 'Screenshot 2: gpt-4o and text-embedding-3-large models (image by author)'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕截图 2：gpt-4o 和 text-embedding-3-large 模型（图片由作者提供）
- en: The app allows you to select open-source models if you have a powerful computer
    with a CUDA-enabled GPU. You can still run the open-source models after setting
    up the required libraries as mentioned in the repository’s instructions. However,
    with a CPU-only machine, the processing could be terribly slow. That said, the
    code can automatically switch to CPU-based processing if it doesn’t find any CUDA-enabled
    GPU.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您有一台配备CUDA功能GPU的强大计算机，该应用程序允许您选择开源模型。您可以在按照存储库说明设置所需的库之后运行开源模型。然而，如果您只有CPU机器，处理速度可能会非常慢。话虽如此，如果找不到任何CUDA功能GPU，代码可以自动切换到基于CPU的处理。
- en: 'The following screenshot shows the processing of the same CV with open-source
    models: Llama3.1:latest LLM and BAAI/bge-small-en-v1.5 embeddings model**.**'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 以下屏幕截图显示了使用开源模型（Llama3.1:latest LLM 和 BAAI/bge-small-en-v1.5 嵌入模型）处理同一简历的过程**。**
- en: '![Screenshot 1: Llama3.1:latest and BAAI/bge-small-en-v1.5 models](../Images/2decbfb4f6c9703bf6f75be06c1031d7.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![屏幕截图 1：Llama3.1:latest 和 BAAI/bge-small-en-v1.5 模型](../Images/2decbfb4f6c9703bf6f75be06c1031d7.png)'
- en: 'Screenshot 1: Llama3.1:latest and BAAI/bge-small-en-v1.5 models'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕截图 1：Llama3.1:latest 和 BAAI/bge-small-en-v1.5 模型
- en: '![Screenshot 2: Llama3.1:latest and BAAI/bge-small-en-v1.5 models](../Images/9ce555bd55a9eab20b4ddcb753e93464.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![屏幕截图 2：Llama3.1:latest 和 BAAI/bge-small-en-v1.5 模型](../Images/9ce555bd55a9eab20b4ddcb753e93464.png)'
- en: 'Screenshot 2: Llama3.1:latest and BAAI/bge-small-en-v1.5 models'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕截图 2：Llama3.1:latest 和 BAAI/bge-small-en-v1.5 模型
- en: The open-source models also do a pretty decent job. It is interesting to note
    how Llama3.1 extracts and scores skills. It splits the combinations of skills
    mentioned in the CV into individual skills. However, they still remain relevant
    for providing matching job recommendations.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 开源模型也做得相当不错。值得注意的是Llama3.1如何提取和评分技能。它将简历中提到的技能组合拆分为单个技能。然而，它们仍然对于提供匹配的工作推荐保持相关性。
