- en: 'Linear Regression in Time Series: Sources of Spurious Regression'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 时间序列中的线性回归：伪回归的来源
- en: 原文：[https://towardsdatascience.com/linear-regression-in-time-series-sources-of-spurious-regression/](https://towardsdatascience.com/linear-regression-in-time-series-sources-of-spurious-regression/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/linear-regression-in-time-series-sources-of-spurious-regression/](https://towardsdatascience.com/linear-regression-in-time-series-sources-of-spurious-regression/)
- en: 1\. Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 简介
- en: It’s pretty clear that most of our work will be automated by AI in the future.
    This will be possible because many researchers and professionals are working hard
    to make their work available online. These contributions not only help us understand
    fundamental concepts but also refine AI models, ultimately freeing up time to
    focus on other activities.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 很明显，我们的大部分工作在未来都将由人工智能自动化完成。这是可能的，因为许多研究人员和专业人士正在努力使他们的工作在线可用。这些贡献不仅帮助我们理解基本概念，而且完善AI模型，最终腾出时间专注于其他活动。
- en: However, there is one concept that remains misunderstood, even among experts.
    It is **spurious regression** in time series analysis. This issue arises when
    regression models suggest strong relationships between variables, even when none
    exist. It is typically observed in time series regression equations that **seem
    to have a high degree of fit** — as indicated by a high **R² (coefficient of multiple
    correlation)** — but with an **extremely low Durbin-Watson statistic (d), signaling
    strong autocorrelation in the error terms**.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有一个概念即使在专家中仍然被误解。那就是时间序列分析中的**伪回归**。当回归模型表明变量之间存在强烈的关联，即使实际上并不存在时，就会出现这个问题。这通常在时间序列回归方程式中观察到，这些方程式**似乎具有很高的拟合度**——如高**R²（多重相关系数）**所示——但具有**极低的Durbin-Watson统计量(d)**，这表明误差项中存在强烈的自相关。
- en: What is particularly surprising is that almost all econometric textbooks warn
    about the danger of autocorrelated errors, yet this issue persists in many published
    papers. Granger and Newbold ([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))
    identified several examples. For instance, they found published equations with **R²
    = 0.997** and the Durbin-Watson statistic (d) equal to 0.53\. The most extreme
    found is an equation with **R² = 0.999** and **d = 0.093**.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 尤为令人惊讶的是，几乎所有计量经济学教科书都警告关于自相关误差的危险，然而这个问题在许多已发表的论文中仍然存在。格兰杰和纽博尔德([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))识别了几个例子。例如，他们发现了一些已发表的方程式，其**R²
    = 0.997**，Durbin-Watson统计量(d)等于0.53。最极端的例子是一个**R² = 0.999**且**d = 0.093**的方程式。
- en: It is especially problematic in economics and finance, where **many key variables
    exhibit autocorrelation **or** serial correlation between adjacent values**, particularly
    if the sampling interval is small, such as a week or a month, leading to misleading
    conclusions if not handled correctly. For example, today’s GDP is strongly correlated
    with the GDP of the previous quarter. Our post provides a detailed explanation
    of the results from Granger and Newbold ([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))
    and Python simulation (**see section 7**) replicating the key results presented
    in their article.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在经济学和金融学中，这个问题尤其严重，因为**许多关键变量表现出自相关或相邻值之间的序列相关**，尤其是如果采样间隔很小，如一周或一个月，如果不正确处理，会导致误导性的结论。例如，今天的GDP与上一季度的GDP高度相关。我们的文章提供了对格兰杰和纽博尔德([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))的结果的详细解释，以及复制他们文章中展示的关键结果的Python模拟（**见第7节**）。
- en: Whether you’re an economist, data scientist, or analyst working with time series
    data, understanding this issue is crucial to ensuring **your models produce meaningful
    results.**
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是经济学家、数据科学家还是分析师，处理时间序列数据时，理解这个问题对于确保**你的模型产生有意义的成果**至关重要。
- en: To walk you through this paper, the next section will introduce the random walk
    and the ARIMA(0,1,1) process. In section 3, we will explain how Granger and Newbold
    ([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))
    describe the emergence of nonsense regressions, with examples illustrated in section
    4\. Finally, we’ll show how to avoid spurious regressions when working with time
    series data.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 为了引导你了解这篇论文，下一节将介绍随机游走和ARIMA(0,1,1)过程。在第3节中，我们将解释格兰杰和纽博尔德([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))如何描述伪回归的出现，第4节将通过例子进行说明。最后，我们将展示如何在处理时间序列数据时避免伪回归。
- en: 2\. Simple presentation of a Random Walk and ARIMA(0,1,1) Process
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 随机游走和 ARIMA(0,1,1) 过程的简单介绍
- en: 2.1 Random Walk
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1 随机游走
- en: 'Let 𝐗ₜ be a time series. We say that 𝐗ₜ follows a random walk if its representation
    is given by:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 设 𝐗ₜ 为一个时间序列。我们说 𝐗ₜ 遵循随机游走，如果它的表示形式为：
- en: 𝐗ₜ = 𝐗ₜ₋₁ + 𝜖ₜ. (1)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 𝐗ₜ = 𝐗ₜ₋₁ + 𝜖ₜ. (1)
- en: Where 𝜖ₜ is a white noise. It can be written as a sum of white noise, a useful
    form for simulation. It is a non-stationary time series because its variance depends
    on the time t.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝜖ₜ 是白噪声。它可以写成白噪声的和，这对于模拟来说是一个有用的形式。因为它的时间方差依赖于时间 t，所以它是一个非平稳时间序列。
- en: 2.2 **ARIMA(0,1,1) Process**
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 2.2 **ARIMA(0,1,1) 过程**
- en: 'The ARIMA(0,1,1) process is given by:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: ARIMA(0,1,1) 过程由以下公式给出：
- en: 𝐗ₜ = 𝐗ₜ₋₁ + 𝜖ₜ − 𝜃 𝜖ₜ₋₁. (2)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 𝐗ₜ = 𝐗ₜ₋₁ + 𝜖ₜ − 𝜃 𝜖ₜ₋₁. (2)
- en: 'where 𝜖ₜ is a white noise. The ARIMA(0,1,1) process is non-stationary. It can
    be written as a sum of an independent random walk and white noise:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝜖ₜ 是白噪声。ARIMA(0,1,1) 过程是非平稳的。它可以写成独立随机游走和白噪声的和：
- en: 𝐗ₜ = 𝐗₀ **+ random walk + white noise. (3)** This form is useful for simulation.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 𝐗ₜ = 𝐗₀ **+ 随机游走 + 白噪声. (3)** 这种形式对于模拟是有用的。
- en: Those non-stationary series are often employed as benchmarks against which the
    forecasting performance of other models is judged.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 那些非平稳序列通常被用作基准，以衡量其他模型的预测性能。
- en: 3\. Random walk can lead to Nonsense Regression
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 随机游走可能导致无意义回归
- en: 'First, let’s recall the linear regression model. The linear regression model
    is given by:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们回顾一下线性回归模型。线性回归模型由以下公式给出：
- en: 𝐘 = 𝐗𝛽 + 𝜖. (4)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 𝐘 = 𝐗𝛽 + 𝜖. (4)
- en: 'Where 𝐘 is a T × 1 vector of the dependent variable, 𝛽 is a K × 1 vector of
    the coefficients, 𝐗 is a T × K matrix of the independent variables containing
    a column of ones and (K−1) columns with T observations on each of the (K−1) independent
    variables, which are stochastic but distributed independently of the T × 1 vector
    of the errors 𝜖. It is generally assumed that:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝐘 是一个 T × 1 的因变量向量，𝛽 是一个 K × 1 的系数向量，𝐗 是一个 T × K 的自变量矩阵，包含一个单位列和 (K−1) 个列，每个
    (K−1) 个自变量都有 T 个观测值，这些自变量是随机的，但与 T × 1 的误差向量 𝜖 独立。通常假设：
- en: 𝐄(𝜖) = 0, (5)
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 𝐄(𝜖) = 0, (5)
- en: and
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 和
- en: 𝐄(𝜖𝜖′) = 𝜎²𝐈. (6)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 𝐄(𝜖𝜖′) = 𝜎²𝐈. (6)
- en: where 𝐈 is the identity matrix.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝐈 是单位矩阵。
- en: 'A test of the contribution of independent variables to the explanation of the
    dependent variable is the F-test. The null hypothesis of the test is given by:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 检验自变量对因变量解释贡献的测试是 F 测试。测试的零假设由以下公式给出：
- en: '𝐇₀: 𝛽₁ = 𝛽₂ = ⋯ = 𝛽ₖ₋₁ = 0, (7)'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '𝐇₀: 𝛽₁ = 𝛽₂ = ⋯ = 𝛽ₖ₋₁ = 0, (7)'
- en: 'And the statistic of the test is given by:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 测试的统计量由以下公式给出：
- en: 𝐅 = (𝐑² / (𝐊−1)) / ((1−𝐑²) / (𝐓−𝐊)). (8)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 𝐅 = (𝐑² / (𝐊−1)) / ((1−𝐑²) / (𝐓−𝐊)). (8)
- en: where 𝐑² is the coefficient of determination.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝐑² 是确定系数。
- en: 'If we want to construct the statistic of the test, let’s assume that the null
    hypothesis is true, and one tries to fit a regression of the form (Equation 4)
    to the levels of an economic time series. Suppose next that these series are not
    stationary or are highly autocorrelated. In such a situation, the test procedure
    is invalid since 𝐅 in (Equation 8) is not distributed as an F-distribution under
    the null hypothesis (Equation 7). In fact, under the null hypothesis, the errors
    or residuals from (Equation 4) are given by:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想要构建测试的统计量，假设零假设是真实的，并尝试将形式 (方程 4) 的回归拟合到经济时间序列的水平。假设接下来这些序列是非平稳的或高度自相关的。在这种情况下，测试程序是无效的，因为
    (方程 8) 中的 𝐅 在零假设 (方程 7) 下不服从 F 分布。事实上，在零假设下，(方程 4) 的误差或残差由以下公式给出：
- en: 𝜖ₜ = 𝐘ₜ − 𝐗𝛽₀ ; t = 1, 2, …, T. (9)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 𝜖ₜ = 𝐘ₜ − 𝐗𝛽₀ ; t = 1, 2, …, T. (9)
- en: And will have the same autocorrelation structure as the original series 𝐘.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 它将具有与原始序列 𝐘 相同的自相关结构。
- en: 'Some idea of the distribution problem can arise in the situation when:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，可能会出现分布问题的想法：
- en: 𝐘ₜ = 𝛽₀ + 𝐗ₜ𝛽₁ + 𝜖ₜ. (10)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 𝐘ₜ = 𝛽₀ + 𝐗ₜ𝛽₁ + 𝜖ₜ. (10)
- en: 'Where 𝐘ₜ and 𝐗ₜ follow independent first-order autoregressive processes:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝐘ₜ 和 𝐗ₜ 遵循独立的一阶自回归过程：
- en: 𝐘ₜ = 𝜌 𝐘ₜ₋₁ + 𝜂ₜ, and 𝐗ₜ = 𝜌* 𝐗ₜ₋₁ + 𝜈ₜ. (11)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 𝐘ₜ = 𝜌 𝐘ₜ₋₁ + 𝜂ₜ，和 𝐗ₜ = 𝜌* 𝐗ₜ₋₁ + 𝜈ₜ. (11)
- en: Where 𝜂ₜ and 𝜈ₜ are white noise.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝜂ₜ 和 𝜈ₜ 是白噪声。
- en: 'We know that in this case, 𝐑² is the square of the correlation between 𝐘ₜ and
    𝐗ₜ. They use Kendall’s result from the article Knowles ([1954](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-knowles1954exercises)),
    which expresses the variance of 𝐑:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道在这种情况下，𝐑² 是 𝐘ₜ 和 𝐗ₜ 之间相关性的平方。他们使用了 Knowles 文章中的 Kendall 结果 ([1954](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-knowles1954exercises))，该结果表达了
    𝐑 的方差：
- en: 𝐕𝐚𝐫(𝐑) = (1/T)* (1 + 𝜌𝜌*) / (1 − 𝜌𝜌*). (12)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 𝐕𝐚𝐫(𝐑) = (1/T)* (1 + 𝜌𝜌*) / (1 − 𝜌𝜌*). (12)
- en: Since 𝐑 is constrained to lie between -1 and 1, if its variance is greater than
    1/3, the distribution of 𝐑 cannot have a mode at 0\. This implies that 𝜌𝜌* > (T−1)
    / (T+1).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 𝐑 被限制在 -1 和 1 之间，如果其方差大于 1/3，𝐑 的分布不能在 0 处有模态。这表明 𝜌𝜌* > (T−1) / (T+1)。
- en: Thus, for example, if T = 20 and 𝜌 = 𝜌*, a distribution that is not unimodal
    at 0 will be obtained if 𝜌 > 0.86, and if 𝜌 = 0.9, 𝐕𝐚𝐫(𝐑) = 0.47\. So the 𝐄(𝐑²)
    will be close to 0.47.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，例如，如果 T = 20 且 𝜌 = 𝜌*，当 𝜌 > 0.86 时，将获得一个在 0 处不是单峰的分布，如果 𝜌 = 0.9，𝐕𝐚𝐫(𝐑) =
    0.47。因此，𝐄(𝐑²) 将接近 0.47。
- en: It has been shown that when 𝜌 is close to 1, 𝐑² can be **very high**, suggesting
    a strong relationship between 𝐘ₜ and 𝐗ₜ. However, in reality, the two series are
    completely independent. When 𝜌 is near 1, both series behave like random walks
    or near-random walks. On top of that, both series are **highly autocorrelated**,
    which causes the **residuals from the regression** to also be strongly autocorrelated.
    As a result, the **Durbin-Watson statistic** 𝐝 will be **very low**.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 已经证明，当 𝜌 接近 1 时，𝐑² 可以非常高，表明 𝐘ₜ 和 𝐗ₜ 之间存在强烈的关系。然而，在现实中，这两个序列是完全独立的。当 𝜌 接近 1 时，两个序列都像随机游走或近似随机游走。除此之外，两个序列都是高度自相关的，这导致回归的残差也高度自相关。因此，**Durbin-Watson
    统计量** 𝐝 将非常低。
- en: This is why a high 𝐑² in this context should never be taken as evidence of a
    true relationship between the two series.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么在这个背景下，高 𝐑² 永远不能被视为两个序列之间真实关系的证据。
- en: To explore the possibility of obtaining a spurious regression when regressing
    two independent random walks, a series of simulations proposed by Granger and
    Newbold ([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))
    will be conducted in the next section.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 为了探索在回归两个独立随机游走时获得伪回归的可能性，下一节将进行 Granger 和 Newbold 提出的模拟系列（[1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious)）。
- en: 4\. Simulation results using Python.
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 使用 Python 的模拟结果。
- en: In this section, we will show using simulations that using the regression model
    with independent random walks bias the estimation of the coefficients and the
    hypothesis tests of the coefficients are invalid. The python code that will produce
    the results of the simulation will be presented in section 6.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将通过模拟展示，使用具有独立随机游走偏差的回归模型会偏误系数的估计，以及系数的假设检验无效。将产生模拟结果的相关 Python 代码将在第
    6 节中展示。
- en: 'A regression equation proposed by Granger and Newbold ([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))
    is given by:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 由 Granger 和 Newbold 提出的回归方程（[1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious)）给出：
- en: 𝐘ₜ = 𝛽₀ + 𝐗ₜ𝛽₁ + 𝜖ₜ
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 𝐘ₜ = 𝛽₀ + 𝐗ₜ𝛽₁ + 𝜖ₜ
- en: Where 𝐘ₜ and 𝐗ₜ were generated as independent random walks, each of length 50\.
    The values 𝐒 = |𝛽̂₁| / √(𝐒𝐄̂(𝛽̂₁)), representing the statistic for testing the
    significance of 𝛽₁, for 100 simulations will be reported in the table below.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在 𝐘ₜ 和 𝐗ₜ 作为长度为 50 的独立随机游走生成的情况下，表示测试 𝛽₁ 显著性的统计量 𝐒 = |𝛽̂₁| / √(𝐒𝐄̂(𝛽̂₁))，对于
    100 次模拟的结果将在下表中报告。
- en: '![](../Images/cb3067910f5799bbe4d6385a17607a68.png)![](../Images/50346160ddbceea824aed964bbdde77d.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cb3067910f5799bbe4d6385a17607a68.png)![](../Images/50346160ddbceea824aed964bbdde77d.png)'
- en: '**Table 1: Regressing two independent random walks**'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**表 1：回归两个独立的随机游走**'
- en: The null hypothesis of no relationship between 𝐘ₜ and 𝐗ₜ is rejected at the
    5% level if 𝐒 > 2\. This table shows that the null hypothesis (𝛽 = 0) is wrongly
    rejected in about a quarter (71 times) of all cases. This is awkward because the
    two variables are independent random walks, meaning there’s no actual relationship.
    Let’s break down why this happens.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 当 𝐒 > 2 时，无关系零假设（𝛽 = 0）在 5% 的水平上被拒绝。此表显示，在所有情况下，大约四分之一（71 次）的零假设（𝛽 = 0）被错误地拒绝。这是尴尬的，因为两个变量是独立的随机游走，意味着实际上没有关系。让我们分析一下为什么会发生这种情况。
- en: 'If 𝛽̂₁ / 𝐒𝐄̂ follows a 𝐍(0,1), the expected value of 𝐒, its absolute value,
    should be √2 / π ≈ 0.8 (√2/π is the mean of the absolute value of a standard normal
    distribution). However, the simulation results show an average of 4.59, meaning
    the estimated 𝐒 is underestimated by a factor of:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 𝛽̂₁ / 𝐒𝐄̂ 符合 𝐍(0,1)，𝐒 的期望值，其绝对值，应该是 √2 / π ≈ 0.8 (√2/π 是标准正态分布绝对值均值)。然而，模拟结果显示平均值为
    4.59，这意味着估计的 𝐒 被低估了 5.7 倍。
- en: 4.59 / 0.8 = 5.7
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 4.59 / 0.8 = 5.7
- en: 'In classical statistics, we usually use a t-test threshold of around 2 to check
    the significance of a coefficient. However, these results show that, in this case,
    you would need to use a threshold of 11.4 to properly test for significance:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在经典统计学中，我们通常使用大约2的t检验阈值来检查系数的显著性。然而，这些结果表明，在这种情况下，你需要使用11.4的阈值来正确地测试显著性：
- en: 2 × (4.59 / 0.8) = 11.4
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 2 × (4.59 / 0.8) = 11.4
- en: 'Interpretation: We’ve just shown that including variables that don’t belong
    in the model — especially random walks — can lead to completely invalid significance
    tests for the coefficients.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 解释：我们刚刚表明，包括不属于模型中的变量——特别是随机游走——会导致系数的显著性测试完全无效。
- en: To make their simulations even clearer, Granger and Newbold ([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))
    ran a series of regressions using variables that follow either a random walk or
    an ARIMA(0,1,1) process.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使他们的模拟更加清晰，Granger和Newbold([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))使用遵循随机游走或ARIMA(0,1,1)过程的变量进行了一系列回归。
- en: 'Here is how they set up their simulations:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这是他们设置模拟的方式：
- en: 'They regressed a dependent series 𝐘ₜ on m series 𝐗ⱼ,ₜ (with j = 1, 2, …, m),
    varying m from 1 to 5\. The dependent series 𝐘ₜ and the independent series 𝐗ⱼ,ₜ
    follow the same types of processes, and they tested four cases:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 他们将因变量序列𝐘ₜ对m个自变量序列𝐗ⱼ,ₜ（其中j = 1, 2, …, m）进行回归，m从1变化到5。因变量序列𝐘ₜ和自变量序列𝐗ⱼ,ₜ遵循相同类型的进程，并且他们测试了四种情况：
- en: '**Case 1 (Levels)**: 𝐘ₜ and 𝐗ⱼ,ₜ follow random walks.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**案例1（水平）**：𝐘ₜ和𝐗ⱼ,ₜ遵循随机游走。'
- en: '**Case 2 (Differences)**: They use the first differences of the random walks,
    which are stationary.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**案例2（差分）**：他们使用随机游走的第一差分，这些差分是平稳的。'
- en: '**Case 3 (Levels)**: 𝐘ₜ and 𝐗ⱼ,ₜ follow ARIMA(0,1,1).'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**案例3（水平）**：𝐘ₜ和𝐗ⱼ,ₜ遵循ARIMA(0,1,1)。'
- en: '**Case 4 (Differences)**: They use the first differences of the previous ARIMA(0,1,1)
    processes, which are stationary.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**案例4（差分）**：他们使用先前ARIMA(0,1,1)过程的第一差分，这些差分是平稳的。'
- en: Each series has a length of 50 observations, and they ran 100 simulations for
    each case.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 每个序列有50个观测值，并且他们对每个案例进行了100次模拟。
- en: All error terms are distributed as 𝐍(0,1), and the ARIMA(0,1,1) series are derived
    as the sum of the random walk and independent white noise. The simulation results,
    based on 100 replications with series of length 50, are summarized in the next
    table.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 所有误差项都服从𝐍(0,1)分布，ARIMA(0,1,1)序列是通过随机游走和独立白噪声的和推导出来的。基于100次重复和长度为50的序列的模拟结果总结在下表中。
- en: '![](../Images/3f2def82e0de09515e1c86a982b96b5c.png)![](../Images/5dc0a7a2f8078d243ca73d2cede5e118.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3f2def82e0de09515e1c86a982b96b5c.png)![](../Images/5dc0a7a2f8078d243ca73d2cede5e118.png)'
- en: '**Table 2: Regressions of a series on m independent ‘explanatory’ series.**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**表2：对m个独立的“解释”序列的序列回归。**'
- en: 'Interpretation of the results :'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 结果解释：
- en: It is seen that the probability of not rejecting the null hypothesis of no relationship
    between 𝐘ₜ and 𝐗ⱼ,ₜ becomes very small when m ≥ 3 when regressions are made with
    random walk series (rw-levels). The 𝐑² and the mean Durbin-Watson increase. Similar
    results are obtained when the regressions are made with ARIMA(0,1,1) series (arima-levels).
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以看到，当使用随机游走序列（rw-levels）进行回归时，当m ≥ 3时，不拒绝𝐘ₜ和𝐗ⱼ,ₜ之间无关系零假设的概率变得非常小。𝐑²和平均Durbin-Watson值增加。当使用ARIMA(0,1,1)序列（arima-levels）进行回归时，也得到类似的结果。
- en: When white noise series (rw-diffs) are used, classical regression analysis is
    valid since the error series will be white noise and least squares will be efficient.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当使用白噪声序列（rw-diffs）时，经典回归分析是有效的，因为误差序列将是白噪声，最小二乘法将是有效的。
- en: 'However, when the regressions are made with the differences of ARIMA(0,1,1)
    series (arima-diffs) or first-order moving average series MA(1) process, the null
    hypothesis is rejected, on average:'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然而，当使用ARIMA(0,1,1)序列的差分（arima-diffs）或一阶移动平均序列MA(1)过程进行回归时，平均而言，零假设被拒绝：
- en: (10 + 16 + 5 + 6 + 6) / 5 = 8.6
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: (10 + 16 + 5 + 6 + 6) / 5 = 8.6
- en: which is greater than 5% of the time.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这大于5%的时间。
- en: If your variables are random walks or close to them, and you include unnecessary
    variables in your regression, you will often get fallacious results. High 𝐑² and
    low Durbin-Watson values do not confirm a true relationship but instead indicate
    a likely spurious one.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的变量是随机游走或接近随机游走，并且在回归中包含了不必要的变量，你通常会得到错误的结论。高的𝐑²和低的Durbin-Watson值并不确认真正的相关性，反而表明可能是一个虚假的相关性。
- en: 5. How to avoid spurious regression in time series
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 如何避免时间序列中的虚假回归
- en: It’s really hard to come up with a complete list of ways to avoid spurious regressions.
    However, there are a few good practices you can follow to **minimize the risk
    as much as possible**.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 构思一个避免虚假回归的完整列表确实很困难。然而，有一些良好的实践可以遵循，以尽可能**最小化风险**。
- en: If one performs a regression analysis with time series data and finds that the
    residuals are strongly autocorrelated, there is a serious problem when it comes
    to interpreting the coefficients of the equation. To check for autocorrelation
    in the residuals, one can use the Durbin-Watson test or the Portmanteau test.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 如果对时间序列数据进行回归分析并发现残差高度自相关，那么在解释方程系数时将存在严重问题。为了检查残差中的自相关性，可以使用杜宾-沃森检验或波尔特曼检验。
- en: Based on the study above, we can conclude that if a regression analysis performed
    with economical variables produces strongly autocorrelated residuals, meaning
    a low Durbin-Watson statistic, then the results of the analysis are likely to
    be spurious, whatever the value of the coefficient of determination R² observed.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 根据上述研究，我们可以得出结论，如果使用经济变量进行的回归分析产生了高度自相关的残差，即低杜宾-沃森统计量，那么分析的结果很可能是虚假的，无论观察到的决定系数R²的值如何。
- en: 'In such cases, it is important to understand where the mis-specification comes
    from. According to the literature, misspecification usually falls into three categories
    : (i) the omission of a relevant variable, (ii) the inclusion of an irrelevant
    variable, or (iii) autocorrelation of the errors. Most of the time, mis-specification
    comes from a mix of these three sources.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，了解误指定来源非常重要。根据文献，误指定通常分为三类：(i)省略一个相关变量，(ii)包含一个不相关变量，或(iii)误差的自相关性。大多数情况下，误指定来自这三个来源的混合。
- en: 'To avoid spurious regression in a time series, several recommendations can
    be made:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免时间序列中的虚假回归，可以提出以下建议：
- en: The first recommendation is to select the right macroeconomic variables that
    are likely to explain the dependent variable. This can be done by reviewing the
    literature or consulting experts in the field.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一项建议是选择可能解释因变量的正确宏观经济变量。这可以通过查阅文献或咨询该领域的专家来完成。
- en: The second recommendation is to stationarize the series by taking first differences.
    In most cases, the first differences of macroeconomic variables are stationary
    and still easy to interpret. For macroeconomic data, it’s strongly recommended
    to differentiate the series once to reduce the autocorrelation of the residuals,
    especially when the sample size is small. There is indeed sometimes strong serial
    correlation observed in these variables. A simple calculation shows that the first
    differences will almost always have much smaller serial correlations than the
    original series.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二项建议是通过取一阶差分来使序列平稳化。在大多数情况下，宏观经济变量的一阶差分是平稳的，并且仍然容易解释。对于宏观经济数据，强烈建议对序列进行一次微分，以减少残差的自相关性，尤其是在样本量较小的情况下。确实有时在这些变量中观察到强烈的序列相关性。简单的计算表明，一阶差分几乎总是比原始序列具有更小的序列相关性。
- en: The third recommendation is to use the Box-Jenkins methodology to model each
    macroeconomic variable individually and then search for relationships between
    the series by relating the residuals from each individual model. The idea here
    is that the Box-Jenkins process extracts the explained part of the series, leaving
    the residuals, which contain only what can’t be explained by the series’ own past
    behavior. This makes it easier to check whether these unexplained parts (residuals)
    are related across variables.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三项建议是使用Box-Jenkins方法单独对每个宏观经济变量进行建模，然后通过将每个单独模型的残差联系起来来寻找序列之间的关系。这里的想法是Box-Jenkins过程提取了序列的解释部分，留下了残差，这些残差只包含序列自身过去行为无法解释的部分。这使得检查这些未解释的部分（残差）是否跨变量相关变得更容易。
- en: 6\. Conclusion
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 结论
- en: Many econometrics textbooks warn about specification errors in regression models,
    but the problem still shows up in many published papers. Granger and Newbold ([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))
    highlighted the risk of spurious regressions, where you get a high paired with
    very low Durbin-Watson statistics.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 许多计量经济学教科书都警告回归模型中的指定错误，但这个问题仍然出现在许多已发表的论文中。格兰杰和纽博尔德([1974](https://jumbong.github.io/personal-website/Others/spurious_reg.html#ref-granger1974spurious))强调了虚假回归的风险，在这种回归中，你会得到一个很高的相关系数，同时伴随着非常低的杜宾-沃森统计量。
- en: Using Python simulations, we showed some of the main causes of these spurious
    regressions, especially including variables that don’t belong in the model and
    are highly autocorrelated. We also demonstrated how these issues can completely
    distort hypothesis tests on the coefficients.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Python模拟，我们展示了这些伪回归的主要原因，特别是包括不属于模型且高度自相关的变量。我们还演示了这些问题如何完全扭曲系数的假设检验。
- en: Hopefully, this post will help reduce the risk of spurious regressions in future
    econometric analyses.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这篇帖子能帮助减少未来计量经济学分析中伪回归的风险。
