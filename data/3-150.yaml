- en: 'Least Squares: Where Convenience Meets Optimality'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 最小二乘法：便利性与最优性的交汇
- en: 原文：[https://towardsdatascience.com/least-squares-where-convenience-meets-optimality/](https://towardsdatascience.com/least-squares-where-convenience-meets-optimality/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/least-squares-where-convenience-meets-optimality/](https://towardsdatascience.com/least-squares-where-convenience-meets-optimality/)
- en: 0\. <mdspan datatext="el1742888848513" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 0\. <mdspan datatext="el1742888848513" class="mdspan-comment">引言</mdspan>
- en: Least squares is used almost everywhere when it comes to numerical optimization
    and regression tasks in machine learning. It aims at minimizing the Mean Squared
    Error (MSE) of a given model.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习的数值优化和回归任务中，几乎到处都使用最小二乘法。它的目标是使给定模型的均方误差（MSE）最小化。
- en: Both L1 (sum of absolute values) and L2 (sum of squares) norms offer an intuitive
    way to sum signed errors while preventing them from cancelling each other out.
    Yet the L2 norm results in a much smoother loss function and avoids the kinks
    of the absolute values.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: L1（绝对值之和）和L2（平方之和）范数提供了一种直观的方法来求和有符号误差，同时防止它们相互抵消。然而，L2范数导致损失函数更加平滑，避免了绝对值中的尖角。
- en: But why is such a simple loss function so popular? We’ll see that there are
    pretty solid arguments in favor of the Least Squares, beyond being easy to compute.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但为什么这样一个简单的损失函数如此受欢迎呢？我们将看到，除了易于计算之外，还有相当有力的论据支持最小二乘法。
- en: '**Computational Convenience:** The square loss function is easy to differentiate
    and provide a closed-form solution when optimizing a Linear Regression.'
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**计算便利性**：平方损失函数易于微分，并且在优化线性回归时提供封闭形式的解。'
- en: '**Mean and Median**: We’re all familiar with these two quantities, but amusingly
    not many people know that they naturally stem from L2 and L1 losses.'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**均值和中位数**：我们都很熟悉这两个量，但有趣的是，很少有人知道它们自然源于L2和L1损失。'
- en: '**OLS is BLUE**: Among all unbiased estimators, Ordinary Least-Squares (OLS)
    is the Best Linear Unbiased Estimator (BLUE), i.e. the one with lowest variance.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**OLS是BLUE**：在所有无偏估计量中，普通最小二乘法（OLS）是最佳线性无偏估计量（BLUE），即具有最低方差的那个。'
- en: '**LS is MLE with normal errors:** Using Least-Squares to fit any model, linear
    or not, is equivalent to Maximum Likelihood Estimation under normally distributed
    errors.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**LS是具有正态误差的MLE**：使用最小二乘法拟合任何模型（线性或非线性）相当于在正态分布误差下的最大似然估计。'
- en: In conclusion, the Least Squares approach totally makes sense from a mathematical
    perspective. However, bear in mind that it might become unreliable if the theoretical
    assumptions are no longer fulfilled, e.g. when the data distribution contains
    outliers.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，从数学角度来看，最小二乘法是完全有道理的。然而，请注意，如果理论假设不再满足，它可能会变得不可靠，例如当数据分布包含异常值时。
- en: N.B. I know there’s already a great subreddit, [“Why Do We Use Least Squares
    In Linear Regression?”](https://www.reddit.com/r/math/comments/1g0b6h9/why_do_we_use_least_squares_in_linear_regression/),
    about this topic. However, I‘d like to focus in this article on presenting both
    intuitive understanding and rigorous proofs.
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意：我知道已经有一个关于这个主题的优秀subreddit，[“为什么我们在线性回归中使用最小二乘法？”](https://www.reddit.com/r/math/comments/1g0b6h9/why_do_we_use_least_squares_in_linear_regression/)。然而，我在这篇文章中想专注于展示直观理解和严格的证明。
- en: '* * *'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '![](../Images/f2886895e5081d035866d69687386909.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f2886895e5081d035866d69687386909.png)'
- en: Photo by [Pablo Arroyo](https://unsplash.com/@pablogamedev?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 照片由 [Pablo Arroyo](https://unsplash.com/@pablogamedev?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 上提供
- en: 1\. Computational Convenience
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1\. 计算便利性
- en: Optimization
  id: totrans-16
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 优化
- en: Training a model means tweaking its parameters to optimize a given cost function.
    In some very fortunate cases, its differentiation allows to directly derive a
    closed-form solution for the optimal parameters, without having to go through
    an iterative optimization.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 训练一个模型意味着调整其参数以优化给定的成本函数。在一些非常幸运的情况下，其微分可以直接导出最优参数的封闭形式解，无需经过迭代优化。
- en: Precisely, the square function is convex, smooth, and easy to differentiate.
    In contrast, the absolute function is non-differentiable at 0, making the optimization
    process less straightforward.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 准确地说，平方函数是凸的、光滑的，并且易于微分。相比之下，绝对函数在0处不可微分，使得优化过程不那么直接。
- en: Differentiability
  id: totrans-19
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 可微性
- en: 'When training a regression model with `n` input-output pairs `(x,y)` and a
    model `f` parametrized by θ, the Least-Squares loss function is:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用`n`个输入-输出对`(x,y)`和由θ参数化的模型`f`训练回归模型时，最小二乘损失函数为：
- en: '![](../Images/bff8b8ac57a38cf129f1fd9949bd2dab.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bff8b8ac57a38cf129f1fd9949bd2dab.png)'
- en: As long as the model `f` is differentiable with respect to θ, we can easily
    derive the gradient of the loss function.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 只要模型`f`相对于θ是可微的，我们就可以轻松推导出损失函数的梯度。
- en: '![](../Images/0e2187483a035930eb9a0bebc662bb22.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0e2187483a035930eb9a0bebc662bb22.png)'
- en: Linear Regression
  id: totrans-24
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 线性回归
- en: Linear Regression estimates the optimal linear coefficients β given a dataset
    of `n` input-output pairs `(x,y)`.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归估计给定`n`个输入-输出对`(x,y)`数据集的最佳线性系数β。
- en: '![](../Images/bccebea3d79a888b34c5b4e47a67ab53.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bccebea3d79a888b34c5b4e47a67ab53.png)'
- en: The equation below shows on the left the L1 loss and on the right the L2 loss
    to evaluate the fitness of β on the dataset.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的方程式展示了左侧的L1损失和右侧的L2损失，用于评估β在数据集上的适应性。
- en: We usually drop the index `<em>i</em>` and switch to a vectorized notation to
    better leverage linear algebra. This can be done by stacking the input vectors
    as rows to form the design matrix X. Similarly, the outputs are stacked into a
    vector Y.
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们通常省略索引`<em>i</em>`并切换到向量化的表示，以便更好地利用线性代数。这可以通过将输入向量作为行堆叠以形成设计矩阵X来完成。同样，输出被堆叠到一个向量Y中。
- en: '![](../Images/a752d9ebafb016af8f4dfbac72a1b157.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a752d9ebafb016af8f4dfbac72a1b157.png)'
- en: Ordinary Least-Squares
  id: totrans-30
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 普通最小二乘法
- en: The L1 formulation offers very little room for improvement. On the other side,
    the L2 formulation is differentiable and its gradient becomes zero only for a
    single optimal set of parameters β. This approach is known as Ordinary Least-Squares
    (OLS).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: L1公式的改进空间非常有限。另一方面，L2公式是可微的，并且其梯度仅在单个最佳参数集β时为零。这种方法被称为普通最小二乘法（OLS）。
- en: '![](../Images/6777439d4f508d94fd5229d0b66f2fcc.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6777439d4f508d94fd5229d0b66f2fcc.png)'
- en: Zeroing the gradient yields the closed form solution of the OLS estimator, using
    the pseudo-inverse matrix. This means we can directly compute the optimal coefficients
    without the need for a numerical optimization process.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 将梯度置零得到OLS估计器的闭式解，使用伪逆矩阵。这意味着我们可以直接计算最佳系数，而无需进行数值优化过程。
- en: '![](../Images/0b53a7741e3ea9a109f4138641e9eeed.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0b53a7741e3ea9a109f4138641e9eeed.png)'
- en: Remarks
  id: totrans-35
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 备注
- en: Modern computers are really efficient and the performance drop between analytical
    and numerical solutions is usually not that significant. Thus, computational convenience
    is not the main reason why we actually use Least-Squares.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现代计算机非常高效，解析解和数值解之间的性能下降通常并不显著。因此，计算便利性并不是我们实际使用最小二乘法的主要原因。
- en: '* * *'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: '![](../Images/9eb4a3d1dd76d5586a6e4547e44c362d.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9eb4a3d1dd76d5586a6e4547e44c362d.png)'
- en: Photo by [Chris Lawton](https://unsplash.com/@chrislawton?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Chris Lawton](https://unsplash.com/@chrislawton?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)提供
- en: 2\. Mean and Median
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 平均值和中位数
- en: Introduction
  id: totrans-41
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 简介
- en: You’ve certainly already computed a mean or median, whether with Excel, NumPy,
    or by hand. They are key concepts in statistics, and often provide valuable insights
    for income, grades, tests scores or age distributions.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你肯定已经计算过平均值或中位数，无论是使用Excel、NumPy还是手工计算。它们是统计学中的关键概念，并且经常为收入、成绩、测试分数或年龄分布提供有价值的见解。
- en: We’re so familiar with these two quantities that we rarely question their origin.
    Yet, amusingly, they stem naturally from L2 and L1 losses.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对这两个量非常熟悉，以至于很少质疑它们的起源。然而，有趣的是，它们自然源于L2和L1损失。
- en: Given a set of real values `xi`, we often try to aggregate them into a single
    good representative value, e.g. the mean or median. That way, we can more easily
    compare different sets of values. However, what represents “well” the data is
    purely subjective and depends on our expectations, i.e. the cost function. For
    instance, mean and median income are both relevant, but they convey different
    insights. The mean reflects overall wealth, while the median provides a clearer
    picture of typical earnings, unaffected by extremely low or high incomes.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一组实数`xi`，我们通常试图将它们聚合到一个单一的代表性值，例如平均值或中位数。这样，我们可以更容易地比较不同的值集。然而，“很好地”代表数据是纯粹主观的，取决于我们的期望，即成本函数。例如，平均收入和中位数收入都相关，但它们传达了不同的见解。平均值反映了总体财富，而中位数提供了一个不受极低或极高收入影响的典型收入的更清晰的画面。
- en: Given a cost function ρ, mirroring our expectations, we solve the following
    optimization problem to find the “best” representative value µ.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一个成本函数ρ，正如我们所期望的，我们解决以下优化问题以找到“最佳”代表值µ。
- en: '![](../Images/7d87302a4f948e5014273a5caa434a7b.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7d87302a4f948e5014273a5caa434a7b.png)'
- en: Mean
  id: totrans-47
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 均值
- en: Let’s consider ρ is the L2 loss.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑ρ是L2损失。
- en: '![](../Images/9e30b4d6193b3a8ba776f456b1fca6b7.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9e30b4d6193b3a8ba776f456b1fca6b7.png)'
- en: Zeroing the gradient is straightforward and brings out the mean definition.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 将梯度置零很简单，并揭示了均值定义。
- en: '![](../Images/e152e5937da9b91fe25d3ab63facd867.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e152e5937da9b91fe25d3ab63facd867.png)'
- en: Thus, we’ve shown that the mean best represents the `xi` in terms of the L2
    loss.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们已经表明，从L2损失的角度来看，均值最好地代表了`xi`。
- en: Median
  id: totrans-53
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 中位数
- en: Let’s consider the L1 loss. Being a sum of piecewise linear functions, it is
    itself piecewise linear, with discontinuities in its gradient at each `xi`.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑L1损失。作为一个分段线性函数的总和，它本身也是分段线性的，其梯度在每个`xi`处有间断。
- en: '![](../Images/a0924f4ac23bf1ee74c1efeaf9244b49.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a0924f4ac23bf1ee74c1efeaf9244b49.png)'
- en: The figure below illustrates the L1 loss for each xi . Without loss of generality,
    I’ve sorted the `xi`​ to order the non-differentiable kinks. Each function `|µ-xi|`
    is `xi-µ` below `xi` and `µ-xi` above.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 下图说明了每个`xi`的L1损失。为了不失一般性，我已经对`xi`进行了排序以排列非可微的尖点。每个函数`|µ-xi|`在`xi`以下为`xi-µ`，在`xi`以上为`µ-xi`。
- en: '![](../Images/0308b0d7d08fb1aa34479e3ce3f8d0a9.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0308b0d7d08fb1aa34479e3ce3f8d0a9.png)'
- en: L1 loss between µ and each xi — Figure by the author
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: µ和每个`xi`之间的L1损失——作者制图
- en: The table below clarifies the piecewise expressions of each individual L1 term
    `|µ-xi|`​. We can sum these expressions to get the total L1 loss. With the `xi`
    sorted, the leftmost part has a slope of `-n` and the rightmost a slope of `+n`.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 下表清晰地说明了每个单独的L1项`|µ-xi|`的分段表达式。我们可以将这些表达式相加以获得总的L1损失。当`xi`排序后，最左边部分有斜率为`-n`，最右边部分有斜率为`+n`。
- en: For better readability, I’ve hidden​ the constant intercepts as `<em>Ci</em>`.
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为了提高可读性，我已经将常数截距隐藏为`<em>Ci</em>`。
- en: '![](../Images/09b0c0cd76c678d9b7d43e13cba94bc2.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/09b0c0cd76c678d9b7d43e13cba94bc2.png)'
- en: Piecewise definition table of each individual absolute function and their sum — Figure
    by the author
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 每个单独的绝对函数及其总和的分段定义表——作者制图
- en: Intuitively, the minimum of this piecewise linear function occurs where the
    slope transitions from negative to positive, which is precisely where the median
    lies since the points are sorted.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 直观地，这个分段线性函数的最小值发生在斜率从负变正的地方，这正是中位数所在的位置，因为点已经排序。
- en: Thus, we’ve shown that the median best represents the `xi` in terms of the L1
    loss.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们已经表明，中位数从L1损失的角度来看，最好地代表了`xi`。
- en: N.B. For an `<em>odd</em>` number of points, the median is the middle value
    and the unique minimizer of the L1 loss. For an `<em>even</em>` number of points,
    the median is the average of the two middle values, and the L1 loss forms a plateau,
    with any value between these two minimizing the loss.
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意。对于奇数个点，中位数是中间值，是L1损失的唯一最小化值。对于偶数个点，中位数是两个中间值的平均值，L1损失形成一个平台，这两个值之间的任何值都可以最小化损失。
- en: '* * *'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '![](../Images/a7213ad83ab0ac0bfc44f1d04d3fc503.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a7213ad83ab0ac0bfc44f1d04d3fc503.png)'
- en: Photo by [Fauzan Saari](https://unsplash.com/@fznsr_?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 由[Fauzan Saari](https://unsplash.com/@fznsr_?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上的照片
- en: 3\. OLS is BLUE
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. OLS是BLUE
- en: Gauss-Markov theorem
  id: totrans-70
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 高斯-马尔可夫定理
- en: The Gauss-Markov theorem states that the Ordinary Least Squares (OLS) estimator
    is the Best Linear Unbiased Estimator (BLUE). “Best” means that OLS has the lowest
    variance among all linear unbiased estimators.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 高斯-马尔可夫定理表明，普通最小二乘法（OLS）估计量是最佳线性无偏估计量（BLUE）。这里的“最佳”意味着OLS在所有线性无偏估计量中具有最低的方差。
- en: This sampling variance represents how much the estimate of the coefficients
    of β would vary across different samples drawn from the same population.
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这个样本方差表示从同一总体中抽取的不同样本中β系数估计值的变化程度。
- en: The theorem assumes `Y` follows a linear model with true linear coefficients
    β and random errors ε. That way, we can analyze how the β estimate of an estimator
    would vary for different values of noise ε.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 该定理假设`Y`遵循一个具有真实线性系数β和随机误差ε的线性模型。这样，我们可以分析估计量的β估计值如何随噪声ε的不同值而变化。
- en: '![](../Images/f0e0337957a916d6f3e12400794243f8.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f0e0337957a916d6f3e12400794243f8.png)'
- en: The assumptions on the random errors ε ensure they are unbiased (zero mean),
    homoscedastic (constant finite variance), and uncorrelated (diagonal covariance
    matrix).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 对随机误差 ε 的假设确保它们是无偏的（零均值）、同方差（常数有限方差）和无关的（对角协方差矩阵）。
- en: '![](../Images/4d07fa180914984e197494f0d2607fe4.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4d07fa180914984e197494f0d2607fe4.png)'
- en: Linearity
  id: totrans-77
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 线性
- en: 'Be aware that “linearity” in the Gauss-Markov theorem refers to two different
    concepts:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，高斯-马尔可夫定理中的“线性”指的是两个不同的概念：
- en: '**Model Linearity**: The regression assumes a linear relationship between `Y`
    and `X`.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型线性**: 回归假设 `Y` 和 `X` 之间存在线性关系。'
- en: '![](../Images/f0e0337957a916d6f3e12400794243f8.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f0e0337957a916d6f3e12400794243f8.png)'
- en: '**Estimator Linearity**: We only consider estimators linear in `Y`, meaning
    they must include a linear component represented by a matrix `C` that depends
    only on `X`.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**估计线性**: 我们只考虑在 `Y` 上线性的估计量，这意味着它们必须包含一个由矩阵 `C` 表示的线性成分，该矩阵只依赖于 `X`。'
- en: '![](../Images/a8bc9f4f2c6622f92b6309a88ac3e3af.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a8bc9f4f2c6622f92b6309a88ac3e3af.png)'
- en: Unbiasedness of OLS
  id: totrans-83
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: OLS 的无偏性
- en: The OLS estimator, denoted with a hat, has already been derived earlier. Substituting
    the random error model for Y gives an expression that better captures the deviation
    from the true β.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: OLS 估计量，用帽子表示，已经在之前推导出来。将 Y 的随机误差模型代入给出一个更好地捕捉真实 β 偏差的表达式。
- en: We introduce the matrix `<em>A</em>` to represent the OLS-specific linear component
    `<em>C</em>` for better readability.
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们引入矩阵 `<em>A</em>` 来表示 OLS 特定的线性成分 `<em>C</em>`，以提高可读性。
- en: '![](../Images/762b78177a61520d9d96683112768618.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/762b78177a61520d9d96683112768618.png)'
- en: As expected, the OLS estimator is unbiased, as its expectation is centered around
    the true β for unbiased errors ε.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，OLS 估计量是无偏的，因为它的期望值围绕无偏误差 ε 的真实 β 中心。
- en: '![](../Images/b52c1ae2c4aff27f80160f50af810e78.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b52c1ae2c4aff27f80160f50af810e78.png)'
- en: Theorem’s proof
  id: totrans-89
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 定理的证明
- en: Let’s consider a linear estimator, denoted by a tilde, with its linear component
    `A+D`, where `D` represents a shift from the OLS estimator.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个线性估计量，用波浪号表示，其线性成分 `A+D`，其中 `D` 代表从 OLS 估计量中产生的平移。
- en: '![](../Images/fceb83c54641e400d8fbb0e0cec35696.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fceb83c54641e400d8fbb0e0cec35696.png)'
- en: The expected value of this linear estimator turns out to be the true β plus
    an additional term DXβ. For the estimator to be considered unbiased, this term
    must be zero, thus `DX=0`. This orthogonality ensures that the shift `D` does
    not introduce any bias.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这个线性估计量的期望值最终是真实的 β 加上一个额外的项 DXβ。为了使估计量被认为是无偏的，这个项必须是零，因此 `DX=0`。这种正交性确保平移 `D`
    不会引入任何偏差。
- en: '![](../Images/f4cfb6421ba0b7bae1b8883aaef7eb56.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f4cfb6421ba0b7bae1b8883aaef7eb56.png)'
- en: Note that this also implies that `DA'=0`, which will be useful later.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这也意味着 `DA'=0`，这在以后会很有用。
- en: '![](../Images/3beccce0d0ad72e187c467b7c01f7505.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3beccce0d0ad72e187c467b7c01f7505.png)'
- en: Now that we’ve guaranteed the unbiasedness of our linear estimator, we can compare
    its variance against the OLS estimator.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经保证了我们的线性估计量的无偏性，我们可以将其方差与 OLS 估计量进行比较。
- en: Since the matrix `C` is constant and the errors ε are spherical, we obtain the
    following variance.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 由于矩阵 `C` 是常数且误差 ε 是球形的，我们得到以下方差。
- en: '![](../Images/0330356687ca5b012cd8ff2fcb874077.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0330356687ca5b012cd8ff2fcb874077.png)'
- en: After substituting `C` with `A+D`, expanding the terms, and using the orthogonality
    of `DA'`, we end up with the variance of our linear estimator being equal to a
    sum of two terms. The first term is the variance of the OLS estimator, and the
    second term is positive, due to the positive definiteness of `DD’`.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在将 `C` 替换为 `A+D`、展开项并使用 `DA'` 的正交性之后，我们最终得到我们的线性估计量的方差等于两个项的和。第一个项是 OLS 估计量的方差，第二个项是正的，因为
    `DD’` 的正定性。
- en: '![](../Images/7a228f544720b09ad8b052cb38997236.png)![](../Images/bea500a6a1d26baa2bb59abcca7d47ea.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7a228f544720b09ad8b052cb38997236.png)![图片](../Images/bea500a6a1d26baa2bb59abcca7d47ea.png)'
- en: As a result, we have shown that the OLS estimator achieves the lowest variance
    among all linear estimators for Linear Regression with unbiased spherical errors.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们已经表明，OLS 估计量在具有无偏球形误差的线性回归中，在所有线性估计量中实现了最低的方差。
- en: Remarks
  id: totrans-102
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 备注
- en: The OLS estimator is considered “best” in terms of minimum variance. However,
    it’s worth noting that the definition of the variance itself is closely tied to
    Least Squares, as it reflects the expectation of the squared difference from the
    expected value.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: OLS 估计量在最小方差方面被认为是“最佳”。然而，值得注意的是，方差的定义本身与最小二乘法紧密相关，因为它反映了从期望值到平方差的期望。
- en: Thus, the key question would be why variance is typically defined this way.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，关键问题将是为什么方差通常这样定义。
- en: '* * *'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '![](../Images/914b1ac43103ed4af4086d0a77c24326.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/914b1ac43103ed4af4086d0a77c24326.png)'
- en: Photo by [Alperen Yazgı](https://unsplash.com/@armato?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Alperen Yazgı](https://unsplash.com/@armato?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 上提供
- en: 4\. LS is MLE with normal errors
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 最小二乘法是具有正态误差的最大似然估计
- en: Maximum Likelihood Estimation
  id: totrans-109
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 最大似然估计
- en: Maximum Likelihood Estimation (MLE) is a method for estimating model parameters
    θ by maximizing the likelihood of observing the given data `(x,y)` under the model
    defined by θ.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 最大似然估计（MLE）是一种通过最大化在由θ定义的模型下观察给定数据`(x,y)`的似然来估计模型参数θ的方法。
- en: Assuming the pairs `(xi,yi)` are independent and identically distributed (i.i.d.),
    we can express the likelihood as the product of the conditional probabilities.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 假设成对`(xi,yi)`是独立同分布的（i.i.d.），我们可以将似然表示为条件概率的乘积。
- en: '![](../Images/c04b00e64b914058b42d67d812174d64.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c04b00e64b914058b42d67d812174d64.png)'
- en: A common trick consists in applying a logarithm on top of a product to transform
    it into a more convenient and numerically stable sum of logs. Since the logarithm
    is monotonically increasing, it’s still equivalent to solving the same optimization
    problem. That’s how we get the well known log-likelihood.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常见的技巧是在乘积上应用对数，将其转换为更方便且数值上更稳定的对数和。由于对数是单调递增的，因此它仍然等同于解决相同的优化问题。这就是我们得到众所周知的对数似然的原因。
- en: In numerical optimization, we usually add a minus sign to minimize quantities
    instead of maximizing them.
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在数值优化中，我们通常在最大化量之前添加一个负号来最小化它们。
- en: '![](../Images/b67eda2152a1981a4e462fee5dc539d5.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b67eda2152a1981a4e462fee5dc539d5.png)'
- en: MLE Inference
  id: totrans-116
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: MLE推断
- en: Once the optimal model parameters θ have been estimated, inference is performed
    by finding the value of `y` that maximizes the conditional probability given the
    observed `x`, i.e. the most-likely `y`.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦估计了最优模型参数θ，推断就是通过找到给定观察到的`x`条件下最大化条件概率的`y`值来进行的，即最可能的`y`。
- en: '![](../Images/664a37610b189a5f89e82e3d5c62eecd.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/664a37610b189a5f89e82e3d5c62eecd.png)'
- en: Model Parameters
  id: totrans-119
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 模型参数
- en: Note that there’s no specific assumption on the model. It can be of any kind
    and its parameters are simply stacked into a flat vector θ.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，对模型没有特定的假设。它可以任何类型，其参数只是简单地堆叠成一个扁平向量θ。
- en: For instance, θ can represent the weights of a neural network, the parameters
    of a random forest, the coefficients of a linear regression model, and so on.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，θ可以代表神经网络的权重、随机森林的参数、线性回归模型的系数等等。
- en: Normal Errors
  id: totrans-122
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 正态误差
- en: As for the errors around the true model, let’s assume that they are unbiased
    and normally distributed.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 至于真实模型周围的误差，我们假设它们是无偏且正态分布的。
- en: '![](../Images/2f2a559c8d0fd9541fd39e117e6641bb.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2f2a559c8d0fd9541fd39e117e6641bb.png)'
- en: It’s equivalent to assuming that `<em>y</em>` follows a normal distribution
    with mean predicted by the model and fixed variance σ².
  id: totrans-125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这相当于假设`<em>y</em>`遵循由模型预测的均值和固定方差σ²的正态分布。
- en: Note that the inference step is straightforward, because the peak of the normal
    distribution is reached at the mean, i.e. the value predicted by the model.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，推断步骤是直接的，因为正态分布的峰值在均值处，即模型预测的值。
- en: '![](../Images/9d481149ac15346221dba2209191b075.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9d481149ac15346221dba2209191b075.png)'
- en: Interestingly, the exponential term in the normal density cancels out with the
    logarithm of the log-likelihood. It then turns out to be equivalent to a plain
    Least-Squares minimization problem!
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，正态密度中的指数项与对数似然的对数相抵消。结果证明，它等同于一个简单的最小二乘法最小化问题！
- en: '![](../Images/de52875c422ea89723506cd6c16b2791.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/de52875c422ea89723506cd6c16b2791.png)'
- en: As a result, using Least-Squares to fit any model, linear or not, is equivalent
    to Maximum Likelihood Estimation under normally distributed errors.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，使用最小二乘法拟合任何模型，无论是线性的还是非线性的，在正态分布误差下都等同于最大似然估计。
- en: '![](../Images/eeaf9b2c235561a0a51879f17d7ed433.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eeaf9b2c235561a0a51879f17d7ed433.png)'
- en: '* * *'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '![](../Images/fd482ba18d5117b0a1fcc587a1716f71.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fd482ba18d5117b0a1fcc587a1716f71.png)'
- en: Photo by [Brad Switzer](https://unsplash.com/@mintchap?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Brad Switzer](https://unsplash.com/@mintchap?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 上提供
- en: Conclusion
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: Fundamental Tool
  id: totrans-136
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 基本工具
- en: In conclusion, the popularity of Least-Squares comes from its computational
    simplicity and its deep link to key statistical principles. It provides a closed
    form solution for Linear Regression (which is the Best Linear Unbiased Estimator),
    defines the mean, and is equivalent to Maximum Likelihood Estimation under normal
    errors.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，最小二乘法的流行源于其计算简单性和与关键统计原理的深层联系。它为线性回归（即最佳线性无偏估计）提供了一个闭式解，定义了均值，并且在正态误差下等同于最大似然估计。
- en: BLUE or BUE ?
  id: totrans-138
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: BLUE还是BUE？
- en: There’s even debate over whether or not the linearity assumption of the Gauss-Markov
    Theorem can be relaxed, allowing OLS to also be considered the Best Unbiased Estimator
    (BUE).
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 甚至有人争论是否可以放宽高斯-马尔可夫定理的线性假设，使得OLS也可以被认为是最佳无偏估计（BUE）。
- en: We’re still solving Linear Regression, but this time the estimator can remain
    linear but is also allowed to be non-linear, thus BUE instead of BLUE.
  id: totrans-140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们仍在解决线性回归问题，但这次估计量可以保持线性，也可以是非线性的，因此是BUE而不是BLUE。
- en: The economist Bruce Hansen thought he had proved it in 2022 [1], but Pötscher
    and Preinerstorfer quickly invalidated his proof [2].
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 经济学家Bruce Hansen认为他在2022年[1]中已经证明了这一点，但Pötscher和Preinerstorfer很快驳斥了他的证明[2]。
- en: Outliers
  id: totrans-142
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 异常值
- en: Least-Squares is very likely to become unreliable when errors are not normally
    distributed, e.g. with outliers.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 当误差不是正态分布时，例如存在异常值时，最小二乘法很可能变得不可靠。
- en: As we’ve seen previously, the mean defined by L2 is highly affected by extreme
    values, whereas the median defined by L1 simply ignores them.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们之前所见，由L2定义的均值高度受极端值的影响，而由L1定义的中位数则简单地忽略它们。
- en: Robust loss functions like Huber or Tukey tend to still mimic the quadratic
    behavior of Least-Squares for small errors, while greatly attenuating the impact
    of large errors with a near L1 or constant behavior. They are much better choices
    than L2 to cope with outliers and provide robust estimates.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 像Huber或Tukey这样的鲁棒损失函数倾向于在小的误差情况下仍然模仿最小二乘法的二次行为，而对于大的误差则通过接近L1或常数行为来大幅度减少其影响。它们相比于L2来说，是处理异常值和提供稳健估计的更好选择。
- en: Regularization
  id: totrans-146
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 正则化
- en: In some cases, using a biased estimator like Ridge regression, which adds regularization,
    can improve generalization to unseen data. While introducing bias, it helps prevent
    overfitting, making the model more robust, especially in noisy or high-dimensional
    settings.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，使用带有正则化的有偏估计量，如岭回归，可以提高对未见数据的泛化能力。虽然引入了偏差，但它有助于防止过拟合，使模型更加稳健，特别是在噪声或高维设置中。
