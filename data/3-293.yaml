  type: TYPE_NORMAL
  zh: 代码中的出色 Plotly 系列（第 9 部分）：点状、斜线还是堆叠？
- en: 原文：[https://towardsdatascience.com/awesome-plotly-with-code-series-part-9-to-dot-to-slope-or-to-stack-bcf8523287f2/](https://towardsdatascience.com/awesome-plotly-with-code-series-part-9-to-dot-to-slope-or-to-stack-bcf8523287f2/)
