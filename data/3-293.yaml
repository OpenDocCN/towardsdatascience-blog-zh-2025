    post to rule them all"](https://medium.com/@joparga3/all-my-written-articles-in-one-place-24ccd6689f72)
    to follow along with the entire series or other topics I have previously written
    about.*'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '*欢迎来到我的“Plotly 代码”系列的第九篇文章！如果你错过了第一篇，你可以在下面的链接中查看，或者浏览我的["一篇涵盖所有内容"的文章](https://medium.com/@joparga3/all-my-written-articles-in-one-place-24ccd6689f72)，以跟随整个系列或其他我之前写过的主题。*'
- en: '[**Awesome Plotly with Code Series (Part 1): Alternatives to Bar Charts**](https://towardsdatascience.com/awesome-plotly-with-code-series-part-1-alternatives-to-bar-charts-125502587690)'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**出色的 Plotly 代码系列（第 1 部分）：柱状图的替代方案**](https://towardsdatascience.com/awesome-plotly-with-code-series-part-1-alternatives-to-bar-charts-125502587690)'
- en: A short summary on why I am writing this series
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简短总结我为何要写这个系列
- en: My go-to tool for creating visualisations is Plotly. It’s incredibly intuitive,
    from layering traces to adding interactivity. However, whilst Plotly excels at
    functionality, it doesn’t come with a "data journalism" template that offers polished
    charts right out of the box.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建可视化图表的常用工具是 Plotly。它非常直观，从叠加轨迹到添加交互性。然而，尽管 Plotly 在功能上表现出色，但它并没有提供“数据新闻”模板，这个模板可以直接提供经过抛光的图表。
- en: That’s where this series comes in – I’ll be sharing how to transform Plotly’s
    charts into sleek, professional-grade charts that meet data journalism standards.
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这就是本系列文章的用意所在——我将分享如何将 Plotly 的图表转换成时尚、专业级别的图表，这些图表符合数据新闻标准。
- en: '*PS: All images are authored by myself unless otherwise specified.*'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '*PS：除非另有说明，所有图片均由我本人创作。*'
- en: Intro – Clustered columns cluster your brain
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介——聚类列让你的大脑感到混乱
- en: How many times have you used multiple colours to represent multiple categories
    in a bar chart? I bet that quite a few…
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 你在柱状图中用多种颜色表示多种类别有多少次了？我敢打赌，相当多……
- en: These multiple colours mixed with multiple categories feel like you are clustering
    bars together. Clustering doesn’t seem like an inviting word when you are communicating
    insights. Sure, clustering is useful when you are analysing patterns, but when
    you communicate what you found from these patterns, you should probably be looking
    to remove, clean and declutter (decluttering is my golden rule after having read
    [Cole Nussbaumer Storytelling with Data book](https://medium.com/@joparga3/book-summary-storytelling-with-data-by-cole-nussbaumer-f38d0f588c4d)).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这些多种颜色与多种类别的混合给人一种将柱状图聚在一起的感觉。当你沟通洞察时，聚类似乎不是一个受欢迎的词。当然，聚类在分析模式时是有用的，但当你从这些模式中传达你发现的内容时，你可能需要考虑去除、清理和整理（清理是我的黄金法则，在我阅读了
    [Cole Nussbaumer 的《用数据讲故事》一书](https://medium.com/@joparga3/book-summary-storytelling-with-data-by-cole-nussbaumer-f38d0f588c4d)之后）。
- en: 'In *[Awesome Plotly with code series (Part 4): Grouping bars vs multi-coloured
    bars](https://towardsdatascience.com/awesome-plotly-with-code-series-part-4-grouping-bars-vs-multi-coloured-bars-645410403ef8)*,
    we already covered a scenario where using colours to represent a 3rd dimension
    made it pretty difficult for a reader to understand. The difference we will be
    covering in this blog is when the cardinality of these categories explode. For
    example, in the *Part 4* blog, we represented countries with continents, which
    are really easy to mentally map. However, what happens if we try to represent
    food categories with countries?'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *[使用代码的 Plotly 精彩系列（第 4 部分）：分组条形图与多色条形图](https://towardsdatascience.com/awesome-plotly-with-code-series-part-4-grouping-bars-vs-multi-coloured-bars-645410403ef8)*
    中，我们已经讨论了一个场景，即使用颜色表示第三个维度使得读者理解变得相当困难。在这篇博客中我们将讨论的是当这些类别的基数爆炸性增长时的情况。例如，在 *第
    4 部分* 博客中，我们用大洲来表示国家，这在心理上是很容易映射的。然而，如果我们尝试用国家来表示食物类别会发生什么呢？
- en: Now, **that is a different problem.**
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，**那是一个不同的问题。**
- en: What will we cover in this blog?
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在这篇博客中我们将涵盖哪些内容？
- en: '**Scenario 1.** To subplot or to stack bars? That is the question.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**场景 1.** 是要分割子图还是堆叠条形图？这是一个问题。'
- en: '**Scenario 2.** How on earth to plot 5 countries against 7 types of food?'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**场景 2.** 如何在 5 个国家和 7 种食物类型之间进行绘图？'
- en: '**Scenario 3.** Clustered charts fail to convey change over 2 period for 2
    groups.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**场景 3.** 集簇图表未能传达两组在两个时期的变化。'
- en: '*PS: As always, code and links to my GitHub repository will be provided along
    the way. Let’s get started!*'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*PS：像往常一样，代码和我 GitHub 仓库的链接将在过程中提供。让我们开始吧！*'
- en: '![](../Images/42134dcd2c4ef63ff3b873fe8ac79208.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/42134dcd2c4ef63ff3b873fe8ac79208.png)'
- en: 'Scenario 1: Visualisation techniques… To subplot or to stack bars? That is
    the question.'
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景 1：可视化技术…是要分割子图还是堆叠条形图？这是一个问题。
- en: Image you are a consultant presenting at a conference about how workforce is
    distributed in each country. You collected the required data, which might look
    like the screenshot below.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下你是一位在关于各国劳动力分布的会议上做咨询报告的顾问。你已经收集了所需的数据，可能看起来像下面的截图。
- en: '![Source: ILOSTAT data explorer](../Images/c50c4bc3985cb85409f3dc4c46b02a89.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![来源：ILOSTAT 数据探索器](../Images/c50c4bc3985cb85409f3dc4c46b02a89.png)'
- en: 'Source: [ILOSTAT data explorer](https://rshiny.ilo.org/dataexplorer44/?lang=en&id=EMP_TEMP_ECO_OCU_NB_A)'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：[ILOSTAT 数据探索器](https://rshiny.ilo.org/dataexplorer44/?lang=en&id=EMP_TEMP_ECO_OCU_NB_A)
- en: You want the chart to show what is the percentage of each sector by country.
    You don’t think too much about the chart design, and use the default output from
    `plotly.express` …
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 你希望图表显示每个国家每个部门的百分比。你并没有太多考虑图表设计，而是使用了 `plotly.express` 的默认输出…
- en: '![What a mess to glance at...](../Images/89dbf171a2878542cb6e0894fc02744b.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![看起来一团糟...](../Images/89dbf171a2878542cb6e0894fc02744b.png)'
- en: What a mess to glance at…
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来一团糟...
- en: '**Where do I think this plot has issues?**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**我认为这个图表有哪些问题？**'
- en: 'The first thing to say is how poor both this chart is at telling an interesting
    story. Some clear issues are:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 首先要说的是，这个图表在讲述一个有趣的故事方面做得有多糟糕。一些明显的问题包括：
- en: '**You have to use a key, which slows down understanding.** Back and forth we
    go, between bar and key'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你必须使用一个键，这会减慢理解的速度。** 我们在条形图和键之间来回移动'
- en: '**You don’t too much space for data labels.** I have tried adding them, but
    the bars are too narrow, and the labels are rotated. So either you are the exorcist
    child or you keep trying to decipher a value based on the y-axis or the provided
    gridlines.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你给数据标签的空间太少了。** 我尝试添加它们，但条形图太窄，标签是旋转的。所以要么你是驱魔的孩子，要么你不断尝试根据 y 轴或提供的网格线来解读一个值。'
- en: '**There are just too many bars, in no particular order.** You can’t rank clustered
    bars in the same way as you can rank bars showing a single variable. Do you rank
    by the value of a specific "sector" category? Do you order alphabetically by the
    x-axis or the legend categories?'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**条形图太多，没有特定的顺序。** 你不能像展示单个变量的条形图那样对集簇条形图进行排名。你是按特定“部门”类别的值进行排名吗？你是按 x 轴或图例类别进行字母顺序排序？'
- en: '**Comparing the top of the bars is nearly impossible.** Say that you want to
    compare if Vietnam has more workforce in construction that Spain… was it a fun
    exercise to look for the country, then figure out that construction is the red
    bar and somehow glance across the chart? Nope. I mean, if I hadn’t added the labels
    (even if rotated), you would have probably not been able to tell the difference.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**比较条形的顶部几乎是不可能的。** 假设你想比较越南的建筑业劳动力是否比西班牙多……寻找国家，然后弄清楚建筑业是红色条形，然后 somehow 穿越图表？不。我的意思是，如果我没有添加标签（即使旋转了），你可能无法分辨出差异。'
- en: '![Summary of issues](../Images/4a8a625c7bcf771eef57a520d6199072.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![问题总结](../Images/4a8a625c7bcf771eef57a520d6199072.png)'
- en: Summary of issues
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 问题总结
- en: Let’s see if there are better alternatives to the chart above.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看是否有比上面图表更好的替代方案。
- en: 'Alternative # 1\. Using subplots.'
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '替代方案 # 1\. 使用子图。'
- en: 'If the story you want to tell is one where the focus is on comparing which
    countries have the highest percentage per sector, then I would recommend separating
    categories into subplots. In, *[Awesome Plotly with code series (Part 8): How
    to balance dominant bar chart categories](https://towardsdatascience.com/awesome-plotly-with-code-series-part-8-how-to-balance-dominant-bar-chart-categories-d6d292e81587)***,**
    we already introduced the use of subplots. The scenario was completely different,
    but it still showed how effective subplots can be.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '如果你想讲述的故事是关注比较哪个国家在每个部门中百分比最高的，那么我建议将类别分开到子图中。在，*[Awesome Plotly with code
    series (Part 8): How to balance dominant bar chart categories](https://towardsdatascience.com/awesome-plotly-with-code-series-part-8-how-to-balance-dominant-bar-chart-categories-d6d292e81587)***，**中，我们已经介绍了子图的使用。场景完全不同，但它仍然展示了子图的有效性。'
- en: Tweaking the chart above, could render the following.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 调整上面的图表，可以得到以下结果。
- en: '![](../Images/2ce4e8d4632d29478dfc37ef3c003684.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2ce4e8d4632d29478dfc37ef3c003684.png)'
- en: '**Why do I think this plot is better than the clustered bar chart?**'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**我为什么认为这个图表比簇状条形图更好？**'
- en: The horizontal bar charts now allow **for a more legible rendering of the data
    labels.**
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在的水平条形图允许 **更清晰地呈现数据标签。**
- en: There is no need of colour coding. Thanks to the subplot titles, one can easily
    understand which category is being displayed.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 没有必要使用颜色编码。多亏了子图标题，人们可以轻松理解正在显示哪个类别。
- en: '**A word of caution**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**一个警告**'
- en: '**Separating by subplots means that you have to select how to order the countries
    in the y-axis.** This is done by choosing a specific category. In this case, I
    chose "agriculture", which means that the other 3 categories to do not conserve
    their natural order, making comparisons difficult.'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**按子图分隔意味着你必须选择如何在y轴上排列国家。** 这是通过选择一个特定的类别来完成的。在这种情况下，我选择了“农业”，这意味着其他3个类别不保持其自然顺序，使得比较变得困难。'
- en: '**The magnitude of the bars may (or may not) be kept across all subplots.**
    In this case, we didn’t normalise the magnitudes. What I mean is that the range
    of values – from *min* to *max* – is determined for each individual subplot. The
    consequence is that you have bars of value 12 (see "construction" for India) rendered
    much larger than a bar of value 30 (see "services" for India).'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**条形的幅度可能（或不一定）在所有子图中保持一致。** 在这个例子中，我们没有对幅度进行归一化。我的意思是，每个子图的价值范围——从 *min* 到
    *max*——是单独确定的。结果是，价值为12的条形（见“印度”的“建筑业”）渲染得比价值为30的条形（见“印度”的“服务业”）大得多。'
- en: '![Summary of improvements (and some caveats)](../Images/61cbad5ddf11cd26fbffc4b239273716.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![改进总结（以及一些注意事项）](../Images/61cbad5ddf11cd26fbffc4b239273716.png)'
- en: Summary of improvements (and some caveats)
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 改进总结（以及一些注意事项）
- en: Nevertheless, even with it’s flaws, the subplot chart is way more legible than
    the first clustered bar chart.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有缺陷，但子图图表比第一个簇状条形图更易于阅读。
- en: 'Alternative #2\. Using a stacked bar chart.'
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '替代方案 #2\. 使用堆叠条形图。'
- en: Now, say that what you want to convey is how skewed (or not) the distribution
    of the workforce by country is. As we saw in the *subplot alternative*, this is
    a bit difficult, as each bar chart is rendered differently by each subplot. The
    subplot alternative was great to answer that "India has the largest % of their
    workforce dedicated to construction, with Nigeria having the smallest", but it
    is much more difficult to answer that "construction and services represent 77%
    of India’s workforce".
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，假设您想传达的是各国劳动力分布的倾斜程度（或不是）。正如我们看到的**子图替代方案**，这有点困难，因为每个条形图在每个子图中渲染的方式都不同。子图替代方案非常适合回答“印度有最大的劳动力百分比用于建筑，而尼日利亚是最小的”，但很难回答“建筑和服务占印度劳动力的77%”。
- en: Check the stacked bar below and decide which one do you prefer.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 检查下面的堆叠条形图，并决定您更喜欢哪一个。
- en: '![](../Images/0d8dfaa572b61d96d0ce454d461da53d.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0d8dfaa572b61d96d0ce454d461da53d.png)'
- en: '**Why do I think this plot is better than the clustered bar chart?**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么我认为这个图表比簇状条形图更好？**'
- en: '**Stacked bar charts help pin a story for each of the rows in the y-axis.**
    Now, even what was relatively easy to understand in the clustered bar chart, makes
    it much more easy to understand in the stacked one.'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**堆叠条形图有助于为y轴上的每一行固定一个故事**。现在，即使在簇状条形图中相对容易理解的内容，在堆叠条形图中也更容易理解。'
- en: The horizontal bar charts now allow **for a more legible rendering of the data
    labels.**
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 水平条形图现在允许**更清晰地呈现数据标签**。
- en: Because **you are dealing with percentages**, stacked bar charts can really
    convey that numbers add up to 100%.
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 因为**您正在处理百分比**，堆叠条形图可以真正传达这些数字加起来是100%。
- en: Finally, **all bars have the correct magnitudes.**
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，**所有条形图都有正确的量级**。
- en: '**A word of caution**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意事项**'
- en: Similarly to the *subplot alternative*, **separating by subplots means that
    you have to select how to order the countries in the y-axis.**
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与**子图替代方案**类似，**通过子图进行分离意味着您必须选择如何在y轴上排列国家**。
- en: '**A colour coded legend is required**, so some extra processing time is needed.'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**需要一个彩色编码的图例**，因此需要额外的时间进行处理。'
- en: '![Summary of improvements (and some caveats)](../Images/f12958f7c0f34689fdb34c20697705ae.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![改进总结（以及一些注意事项）](../Images/f12958f7c0f34689fdb34c20697705ae.png)'
- en: Summary of improvements (and some caveats)
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 改进总结（以及一些注意事项）
- en: Again, despite it’s issues, I hope you would agree with me that the stacked
    bar chart is way more legible than the first clustered bar chart.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，尽管它存在一些问题，但我希望您会同意我的观点，即堆叠条形图比第一个簇状条形图更易于阅读。
- en: Tips on how to create these 2 plots
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何创建这两个图表的技巧
- en: '**Creating a subplot chart**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**创建子图图表**'
- en: '**1st**, you will of course need to create a subplot object'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第一点**，您当然需要创建一个子图对象。'
- en: '[PRE0]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**2nd**, simply loop through each category and plot each bar chart on the specific
    "column trace"'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第二点**，简单地遍历每个类别，并在特定的“列轨迹”上绘制每个条形图。'
- en: '[PRE1]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Creating a stacked bar chart**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**创建堆叠条形图**'
- en: '**1st,** decide the order of the main category'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第一点**，决定主要类别的顺序。'
- en: '[PRE2]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**2nd,** loop through each category. Extract the information by country and
    add a trace.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第二点**，遍历每个类别。通过国家提取信息并添加一个轨迹。'
- en: '[PRE3]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**3rd**, you need to tell plotly that this is a stacked bar chart. You can
    do this in the `update_layout` method.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第三点**，您需要告诉plotly这是一个堆叠条形图。您可以在`update_layout`方法中这样做。'
- en: '[PRE4]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '***As Shakespeare would have said had he worked as a data analyst: to subplot
    or to stack?***'
  id: totrans-79
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***如果莎士比亚曾作为数据分析师工作，他可能会说：是使用子图还是堆叠？***'
- en: 'Scenario 2: How on earth to plot 5 countries against 7 types of food?'
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景2：如何绘制5个国家与7种食品类型的图表？
- en: In this second scenario, you are working with *multi-category data* that represents
    how much type of food is exported by each country as a percentage of its total
    production. In the dataset below, you will have information about 5 countries
    and 7 types of food. How would you convey this information?
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个第二种场景中，您正在处理**多类别数据**，这些数据表示每个国家出口的食品类型占其总生产的百分比。在下面的数据集中，您将获得有关5个国家及7种食品类型的信息。您将如何传达这些信息？
- en: '![Mock data by author](../Images/d18be76e3a21e698245a4d8423b2a021.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![模拟数据由作者提供](../Images/d18be76e3a21e698245a4d8423b2a021.png)'
- en: Mock data by author
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟数据由作者提供
- en: The default output which is doomed to fail
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 默认输出注定要失败
- en: You try out what would the default output from `plotly.express` show. And what
    you see is not something you like.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 您尝试一下`plotly.express`的默认输出。您看到的结果可能不是您想要的。
- en: '**Option 1\. Put the countries in the x-axis with the food categories in the
    legend**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**选项1**。将国家放在x轴上，将食品类别放在图例中。'
- en: '![Countries in the x-axis](../Images/6be0cc16c58ae83954aeadd9a367d893.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![国家在x轴上](../Images/6be0cc16c58ae83954aeadd9a367d893.png)'
- en: Countries in the x-axis
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 国家在x轴上
- en: '**Option 2\. Put the food categories in the x-axis and countries in the legend**'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**选项2：将食品类别放在x轴上，将国家放在图例中**'
- en: '![Countries in the y-axis](../Images/d0b9b8ccf39747062ae7fe469182055b.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![国家在y轴上](../Images/d0b9b8ccf39747062ae7fe469182055b.png)'
- en: Countries in the y-axis
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 国家在y轴上
- en: You will convene with me that neither chart can be used to tell a clear story.
    Let’s see what happens if we use a stacked bar chart as above.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你会同意我的观点，这两个图表都不能用来讲述一个清晰的故事。让我们看看如果我们使用上面所示的堆积条形图会发生什么。
- en: 'Alternative # 1\. The stacked bar chart (which in this case, fails)'
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 替代方案#1：堆积条形图（在这种情况下，失败了）
- en: The stacked bar chart served us well in the previous scenario. Can it also help
    us here, where we have more categories and where the sum of the percentages is
    not equal to 100%?
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在之前的场景中，堆积条形图为我们服务得很好。它也能帮助我们在这里，即我们拥有更多类别且百分比总和不为100%的情况下吗？
- en: 'Check the bar charts below:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 检查下面的条形图：
- en: '**Option 1\. Put the countries in the x-axis with the food categories in the
    legend**'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**选项1：将国家放在x轴上，将食品类别放在图例中**'
- en: '![If you want to tell a story at a country level, I am afraid the stacked bar
    chart looks really weird.](../Images/80f53332ca504a93995f8fb715cd27d8.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![如果你想在国家层面上讲故事，恐怕堆积条形图看起来真的很奇怪。](../Images/80f53332ca504a93995f8fb715cd27d8.png)'
- en: If you want to tell a story at a country level, I am afraid the stacked bar
    chart looks really weird.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想在国家层面上讲故事，恐怕堆积条形图看起来真的很奇怪。
- en: '**Option 2\. Put the food categories in the x-axis and countries in the legend**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**选项2：将食品类别放在x轴上，将国家放在图例中**'
- en: '![If you want to tell a story at the food category level, the chart is slightly
    better, but not by a huge amount.](../Images/90ff1191db2145d8245a7e4f40a5714c.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![如果你想在食品类别层面上讲故事，图表稍微好一些，但不是好很多。](../Images/90ff1191db2145d8245a7e4f40a5714c.png)'
- en: If you want to tell a story at the food category level, the chart is slightly
    better, but not by a huge amount.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想在食品类别层面上讲故事，图表稍微好一些，但不是好很多。
- en: Both stacked charts really fail to simplify what we are looking it. In fact,
    I would argue they are as difficult to read as the clustered bar chart. So, in
    this case, stacked bar charts have actually failed us.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 两种堆积图表都未能简化我们所观察的内容。事实上，我敢说它们与簇状条形图一样难以阅读。因此，在这种情况下，堆积条形图实际上已经失败了。
- en: 'Alternative #2\. The dot plot (which is a fancy scatter plot)'
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 替代方案#2：点图（这是一种花哨的散点图）
- en: This alternative I am about to present is inspired in the subplot idea we used
    in scenario 1\. However, in this case, I will change the bars for dots.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我即将提出的这个替代方案受到了我们在场景1中使用的子图想法的启发。然而，在这种情况下，我将把条形换成点。
- en: One thing I didn’t like from scenario 1, was that the magnitude of bars didn’t
    make sense across the different categories. Each subplot had it’s own x-axis range.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在场景1中，我不喜欢的一点是，不同类别中条形的大小没有意义。每个子图都有自己的x轴范围。
- en: Now, what do you think of this dot plot approach for clearer data storytelling?
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你认为这种点图方法对更清晰的数据叙事有何看法？
- en: '![](../Images/5f24f20e5f3fee9a46015bb969213ecc.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5f24f20e5f3fee9a46015bb969213ecc.png)'
- en: '**Why do I think this plot is better?**'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么我认为这个图更好？**'
- en: Dot plot magnitudes are kept constant across the board.
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点图的大小在整个图表中保持一致。
- en: Given that I have a country (Netherlands) which surpasses the rest, I feel the
    dots convey this superiority better – even more when I colour them differently.
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由于我有一个国家（荷兰）超过了其他国家，我觉得点可以更好地传达这种优越性——甚至当我用不同的颜色给它们着色时。
- en: Having these subplots arranged as a table, makes thing look aligned and neat.
    In other words, it is easy to scan for answers at the country level or at the
    food category level.
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将这些子图排列成表格，使事物看起来整齐有序。换句话说，在国家和食品类别层面上查找答案很容易。
- en: No colour coding required! And we can use emojis!
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不需要颜色编码！我们可以使用表情符号！
- en: '![Summary of improvements](../Images/b11783812aed33089290068fffe880d1.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![改进总结](../Images/b11783812aed33089290068fffe880d1.png)'
- en: Summary of improvements
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 改进总结
- en: Tips on how to create this plot
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何创建此图的技巧
- en: '**1st,** create a subplots object. I have defined the titles with emojis using
    a dictionary'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**1.** 创建一个子图对象。我使用字典定义了标题，并用表情符号表示'
- en: '[PRE5]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '**2nd,** how to add 1 single data point for each combination of {country}-{food}?
    Loop through the food categories, **but in the x-axis force plotting a dummy value
    (I used the number 1)**'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第二点**，如何为每个{国家}-{食物}组合添加一个单一的数据点？遍历食物类别，但在x轴上强制绘制一个虚拟值（我使用了数字1）**'
- en: '[PRE6]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**3rd,** but if you plot the value 1, how do you show the real food % values?
    Easy, you define those in the `text`, `textposition`, `textfont` and `marker`
    parameters.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第三点**，但是如果你绘制值1，你如何显示真实的食物百分比值？简单，你可以在`text`、`textposition`、`textfont`和`marker`参数中定义这些值。'
- en: '[PRE7]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Scenario 3: Clustered charts fail to convey change over 2 groups.'
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景3：簇状图表无法传达两组之间的变化。
- en: In both scenarios above, we were dealing with multiple categories and saw how
    clustered bar charts hinder our ability to quickly understand the message we are
    trying to convey. In this last scenario, we cover the case where you only have
    2 categories. In this case, 2 different periods in time (it could be 2 segments,
    2 areas, etc)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述两种情况下，我们都在处理多个类别，并看到了如何簇状柱状图阻碍了我们快速理解我们试图传达的信息的能力。在最后一个场景中，我们涵盖了只有两个类别的情况。在这种情况下，两个不同时间段（可能是两个部分、两个区域等）
- en: Because the cardinality is so small (only 2), I have seen many people still
    using stacked bar charts. Check the data below. It represents the ranking that
    different Spanish football teams have held in 2 different seasons.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 因为基数很小（只有2），我见过很多人仍然使用堆叠柱状图。查看下面的数据。它代表了不同西班牙足球队在两个不同赛季中持有的排名。
- en: '![Source: UEFA rankings](../Images/ec5f6a0e89c90ea3190cc8e4c34a5377.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![来源：UEFA排名](../Images/ec5f6a0e89c90ea3190cc8e4c34a5377.png)'
- en: 'Source: [UEFA rankings](https://www.uefa.com/nationalassociations/uefarankings/club/?year=2025)'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：[UEFA排名](https://www.uefa.com/nationalassociations/uefarankings/club/?year=2025)
- en: If you plotted the teams in the x-axis, the ranking in the y-axis and the season
    as a coloured legend, we would have the following plot.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将团队绘制在x轴上，排名绘制在y轴上，并将赛季作为彩色图例，我们就会得到以下图表。
- en: '![](../Images/341be7846919e0de2ae32f2f2790850f.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/341be7846919e0de2ae32f2f2790850f.png)'
- en: '**Where do I think this plot has issues?**'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '**我认为这个图表有哪些问题？**'
- en: '**Rankings are not well represented with bar charts.** For example, here a
    larger ranking is worse (ie, rank = 1 is much better than rank = 50)'
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**排名用柱状图表示不佳**。例如，这里较大的排名更差（即，排名=1比排名=50要好得多）'
- en: '**It is not easy to compare rankings for the season 2023–2024**. This is because
    we have sorted the chart in ascending order based on the 2013–2014 season.'
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**比较2023-2024赛季的排名并不容易**。这是因为我们已经根据2013-2014赛季对图表进行了升序排序。'
- en: '**There are teams which had a UEFA ranking in season 2013–2014**, but didn’t
    in 2023–2024 (Malaga). This is not immediately apparent from the chart.'
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**有些球队在2013-2014赛季有UEFA排名**，但在2023-2024赛季没有（马拉加）。这一点从图表中并不立即明显。'
- en: '![](../Images/7908b1ecfded05c1b03223ba94866ba1.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7908b1ecfded05c1b03223ba94866ba1.png)'
- en: The slope graph alternative
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 斜率图的替代方案
- en: I always move to slope graphs when I need to visualise *rank comparison* or
    any story of change (ie, this datapoint has travelled from *here* to *here*).
    Change doesn’t have to be over time (although it is the most common type of change).
    A slope graph could be used to compare 2 scenarios, 2 opposite views, 2 geographies,
    etc. I really like them because your eye can easily travel from start point to
    end point without interruption. In addition, it makes the degree of change way
    more obvious. Check the chart below… is the story of how Valencia CF completely
    destroyed it’s ranking since the arrival of a new owner.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 当我需要可视化**排名比较**或任何变化的故事（即，这个数据点已经从**这里**移动到**这里**）时，我总是转向斜率图。变化不一定是随时间发生的（尽管这是最常见的类型），斜率图可以用来比较两种情景、两种相反的观点、两个地理区域等。我真的很喜欢它们，因为你的眼睛可以很容易地从起点移动到终点，而不会被打断。此外，它使变化的程度更加明显。查看下面的图表…这是瓦伦西亚CF自新老板到来后完全摧毁其排名的故事。
- en: '![](../Images/b1cd1644c34684344509b821d4b0280e.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b1cd1644c34684344509b821d4b0280e.png)'
- en: Tips on how to create this plot
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何创建此图表的技巧
- en: '**1st,** loop through each club and plot a Scatter plot.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第一点**，遍历每个俱乐部并绘制散点图。'
- en: '[PRE8]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**2nd**, define the `text`, `textfont`, `marker` and `line` parameters.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第二点**，定义`text`、`textfont`、`marker`和`line`参数。'
- en: '[PRE9]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '**3rd,** because we are dealing with "rankings", you can set the `yaxis_autorange=''reversed''`'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第三点**，因为我们处理的是“排名”，你可以设置`yaxis_autorange=''reversed''`'
- en: '[PRE10]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Summary of multi-category visualization approaches
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多类别可视化方法总结
- en: 'In this post, we explored how to move beyond clustered bar charts by using
    more effective visualisation techniques. Here’s a quick recap of the key takeaways:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了如何通过使用更有效的可视化技术来超越簇状条形图。以下是关键要点快速回顾：
- en: '**Scenario 1: subplots vs. stacked bars**'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**场景 1：子图与堆叠条形图**'
- en: '**Subplots**: Best for category-specific comparisons, with clear labels and
    no need for colour-coded legends.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**子图**：最适合进行类别特定的比较，标签清晰，无需颜色编码的图例。'
- en: '**Stacked Bars**: Ideal for showing cumulative distributions, with consistent
    bar magnitudes and intuitive 100% totals.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**堆叠条形图**：非常适合展示累积分布，条形大小一致，100% 总数直观。'
- en: '**Scenario 2: dot plot for high cardinality**'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '**场景 2：高基数点图**'
- en: When dealing with multiple categories both in the x and y axis, **dot plots**
    offer a cleaner view.
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当处理 x 轴和 y 轴上的多个类别时，**点图**提供了一个更清晰的视图。
- en: Unlike subplots or stacked bars, dot plots keep magnitudes constant and comparisons
    clear.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与子图或堆叠条形图不同，点图保持大小恒定，比较清晰。
- en: '**Scenario 3: slope graphs for two-point comparisons**'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '**场景 3：两点比较的斜率图**'
- en: For tracking changes between two points, **slope graphs** clearly show movement
    and direction.
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于追踪两点之间的变化，**斜率图**清楚地显示了运动和方向。
- en: They highlight upward, downward, or stable trends in a single glance.
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们可以一目了然地突出显示上升、下降或稳定的趋势。
