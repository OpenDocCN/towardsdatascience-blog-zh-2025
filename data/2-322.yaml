- en: 'Inheritance: A Software Engineering Concept Data Scientists Must Know To Succeed'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 继承：数据科学家必须了解的软件工程概念，以成功
- en: 原文：[https://towardsdatascience.com/inheritance-a-software-engineering-concept-data-scientists-must-know-to-succeed/](https://towardsdatascience.com/inheritance-a-software-engineering-concept-data-scientists-must-know-to-succeed/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/inheritance-a-software-engineering-concept-data-scientists-must-know-to-succeed/](https://towardsdatascience.com/inheritance-a-software-engineering-concept-data-scientists-must-know-to-succeed/)
- en: <mdspan datatext="el1747768300272" class="mdspan-comment">Why</mdspan> you should
    read this article
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747768300272" class="mdspan-comment">为什么你应该阅读这篇文章</mdspan>
- en: If you are planning to go into data science, be it a graduate or a professional
    looking for a career change, or a manager in charge of establishing best practices,
    this article is for you.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你打算进入数据科学领域，无论是研究生、寻求职业转变的专业人士，还是负责建立最佳实践的经理，这篇文章就是为你准备的。
- en: 'Data science attracts a variety of different backgrounds. From my professional
    experience, I’ve worked with colleagues who were once:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学吸引了来自不同背景的人。根据我的专业经验，我曾与以下同事共事过：
- en: Nuclear Physicists
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 核物理学家
- en: Post-docs researching Gravitational Waves
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究引力波博士后
- en: PhDs in Computational Biology
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算生物学博士
- en: Linguists
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语言学家
- en: just to name a few.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 只列举一些。
- en: It is wonderful to be able to meet such a diverse set of backgrounds and I have
    seen such a variety of minds lead to the growth of a creative and effective Data
    Science function.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 能够遇到这样多样化的背景真是太好了，我也看到了各种思维方式如何推动创意和有效的数据科学功能的增长。
- en: 'However, I have also seen one big downside to this variety:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我也看到了这种多样性的一个重大缺点：
- en: Everyone has had different levels of exposure to key Software Engineering concepts,
    resulting in a patchwork of coding skills.
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 每个人对关键软件工程概念的了解程度不同，导致编程技能参差不齐。
- en: 'As a result, I have seen work done by some data scientists that is brilliant,
    but is:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 结果，我看到了一些数据科学家所做的出色工作，但它们：
- en: Unreadable — you have no idea what they are trying to do.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不可读 —— 你根本不知道他们试图做什么。
- en: Flaky — it breaks the moment someone else tries to run it.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不稳定 —— 一旦有人尝试运行它就会崩溃。
- en: Unmaintainable — code quickly becomes obsolete or breaks easily.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不可维护 —— 代码很快就会过时或容易崩溃。
- en: Un-extensible — code is single-use and its behaviour cannot be extended.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不可扩展 —— 代码是单次使用的，其行为无法扩展。
- en: Which ultimately dampens the impact their work can have and creates all sorts
    of issues down the line.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这最终会削弱他们工作的影响力，并在后续产生各种问题。
- en: '![](../Images/584a6058284cdf53879964414b026deb.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/584a6058284cdf53879964414b026deb.png)'
- en: Photo by [Shekai](https://unsplash.com/@shekai?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-bus-stop-with-a-bus-parked-next-to-it-vKla95GgAwg?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Shekai](https://unsplash.com/@shekai?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    在 [Unsplash](https://unsplash.com/photos/a-bus-stop-with-a-bus-parked-next-to-it-vKla95GgAwg?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    提供
- en: So, in a series of articles, I plan to outline some core software engineering
    concepts that I have tailored to be necessities for data scientists.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在一系列文章中，我计划概述一些核心软件工程概念，这些概念是我针对数据科学家量身定制的。
- en: They are simple concepts, but the difference between knowing them vs not knowing
    them clearly draws the line between amateur and professional.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这些概念很简单，但知道它们与不知道它们之间的区别，明显区分了业余和专业人士。
- en: 'Today’s Concept: Inheritance'
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 今日概念：继承
- en: Inheritance is fundamental to writing clean, reusable code that improves your
    efficiency and work productivity. It can also be used to standardise the way a
    team writes code which enhances readability and maintainability.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 继承是编写干净、可重用代码的基础，它能提高你的效率和工作效率。它还可以用来标准化团队编写代码的方式，从而提高代码的可读性和可维护性。
- en: Looking back at how difficult it was to learn these concepts when I was first
    learning to code, I am not going to start off with an abstract, high level definition
    that provides no value to you at this stage. There’s plenty in the internet you
    can google if you want this.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 回想我刚开始学习编码时这些概念的难度，我不会一开始就给出一个抽象、高级的定义，因为这对你目前这个阶段没有任何价值。如果你需要这些，互联网上有很多你可以谷歌搜索的内容。
- en: '***Instead, let’s take a look at a real-life example of a data science project***.'
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***相反，让我们看看一个真实的数据科学项目的例子***。'
- en: We will outline the kind of practical problems a data scientist could run into,
    see what inheritance is, and how it can help a data scientist write better code.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将概述数据科学家可能会遇到的一些实际问题，了解继承的概念，以及它是如何帮助数据科学家编写更好的代码的。
- en: 'And by *better* we mean:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们所说的“更好”是指：
- en: '***Code that is easier to read.***'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***易于阅读的代码。***'
- en: '***Code that is easier to maintain.***'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***易于维护的代码。***'
- en: '***Code that is easier to re-use.***'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***易于重新使用的代码。***'
- en: 'Example: Ingesting data from multiple different sources'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：从多个不同来源摄取数据
- en: '![](../Images/a698a4242f8598181c2fb20fcfd810aa.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a698a4242f8598181c2fb20fcfd810aa.png)'
- en: Photo by [John Schnobrich](https://unsplash.com/@johnishappysometimes?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/person-using-laptop-FlPc9_VocJ4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 照片由[John Schnobrich](https://unsplash.com/@johnishappysometimes?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/person-using-laptop-FlPc9_VocJ4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)提供
- en: The most tedious and time consuming part of a data scientist’s job is figuring
    out where to get data, how to read it, how to clean it, and how to save it.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家工作中最繁琐且耗时的工作是确定数据来源，如何读取它，如何清理它，以及如何保存它。
- en: Let’s say you have labels provided in CSV files submitted from five different
    external sources, each with their own unique schema.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你从五个不同的外部来源接收到了CSV文件中提供的标签，每个来源都有自己的唯一模式。
- en: 'Your task is to clean each one of them and output them as a parquet file, and
    for this file to be compatible with downstream processes, they must conform to
    a schema:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你的任务是清理每一个文件并将它们输出为parquet文件，并且为了使这个文件与下游流程兼容，它们必须符合一个模式：
- en: '`label_id` : Integer'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`label_id` : 整数'
- en: '`label_value` : Integer'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`label_value` : 整数'
- en: '`label_timestamp` : String timestamp in ISO format.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`label_timestamp` : ISO格式的字符串时间戳。'
- en: The Quick & Dirty Approach
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 快速且简略的方法
- en: In this case, the quick and dirty approach would be to write a separate script
    for each file.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，快速且简略的方法是为每个文件编写一个单独的脚本。
- en: '[PRE0]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: and each script would be unique.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 每个脚本都是独一无二的。
- en: So what’s wrong with this? It gets the job done right?
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，这有什么问题吗？它完成了任务吗？
- en: 'Let’s go back to our criterion for good code and evaluate why this one is bad:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到我们对于好代码的标准，并评估为什么这个是坏的：
- en: 1\. It is hard to read
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 难以阅读
- en: There’s no organisation or structure to the code.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 代码没有组织或结构。
- en: All the logic for loading, cleaning, and saving is all in the same place, so
    it’s difficult to see where the line is between each step.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 加载、清理和保存的所有逻辑都在同一个地方，因此很难看到每个步骤之间的界限。
- en: Keep in mind, this is a contrived, simple example. In the real world, the code
    you’d write would be much longer and complex.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这是一个人为的、简单的例子。在现实世界中，你编写的代码将会更长且更复杂。
- en: 'When you have hard to read code, and five different versions of it, it leads
    to longer term problems:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 当你遇到难以阅读的代码，并且有五个不同的版本时，这会导致长期问题：
- en: 2\. It is hard to maintain
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 难以维护
- en: The lack of structure makes it hard to add new features or fix bugs. If the
    logic had to be changed, the entire script will likely need to be overhauled.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏结构使得添加新功能或修复错误变得困难。如果逻辑需要改变，整个脚本可能需要彻底重写。
- en: If there was a common operation that needed to be applied to all outputs, then
    someone needs to go and modify all five scripts separately.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果需要应用于所有输出的公共操作，那么就需要有人分别修改所有五个脚本。
- en: Each time, they need to decipher the purpose of lines and lines of code. Because
    there’s no clear distinction between
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 每次他们都需要解读成行成段的代码的目的。因为没有明确的区分
- en: where data is loaded,
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据被加载的地方，
- en: where data is used,
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据被使用的地方，
- en: which variables are dependent on downstream operations,
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些变量依赖于下游操作，
- en: it becomes hard to know whether the changes you make will have any unknown impact
    on downstream code, or violates some upstream assumption.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 知道你做的更改是否会对下游代码产生未知的影响，或者违反了一些上游假设变得困难。
- en: Ultimately, it becomes very easy for bugs to creep in.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，很容易出现错误。
- en: 3\. It is hard to re-use
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 重新使用困难
- en: This code is the definition of a one-off.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码就是一次性使用的定义。
- en: It’s hard to read, you don’t know what’s happening where unless you invest a
    lot of time to make sure you understand every line of code.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 难以阅读，除非你投入大量时间确保你理解每一行代码，否则你不知道发生了什么。
- en: If someone wanted to reuse logic from it, the only option they would have is
    to copy-paste the *whole* script and modify it, or rewrite their own from scratch.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有人想从它中重用逻辑，他们唯一的选择是复制粘贴整个脚本并修改它，或者从头开始重写。
- en: '*There are better, more efficient ways of writing code.*'
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*有更好的、更有效率的编写代码的方法*。'
- en: The Better, Professional Approach
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更好的、专业的做法
- en: Now, let’s look at how we can improve our situation by using inheritance.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看我们如何通过使用继承来改善我们的情况。
- en: '![](../Images/7fcac38faffea6d52464c0e7316e4022.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7fcac38faffea6d52464c0e7316e4022.png)'
- en: Photo by [Kelly Sikkema](https://unsplash.com/@kellysikkema?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/yellow-click-pen-on-white-printer-paper-gcHFXsdcmJE?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Kelly Sikkema](https://unsplash.com/@kellysikkema?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/yellow-click-pen-on-white-printer-paper-gcHFXsdcmJE?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)提供
- en: 1\. Identify the commonalities
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 识别共同点
- en: 'In our example, every data source is unique. We know that each file will require:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的例子中，每个数据源都是独特的。我们知道每个文件将需要：
- en: A loading step
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个加载步骤
- en: One or more cleaning steps
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个或多个清理步骤
- en: A saving step, which we already know all files will be saved into a single parquet
    file.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个保存步骤，我们知道所有文件都将保存到一个单独的parquet文件中。
- en: We also know each file needs to conform to the same schema, so best we have
    some validation of the output data.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还知道每个文件都需要符合相同的模式，因此最好对输出数据进行一些验证。
- en: So these commonalities will inform us what functionalities we could write once,
    and then reuse them.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这些共同点将告诉我们我们可以一次性编写哪些功能，然后重用它们。
- en: 2\. Create a base class
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 创建基类
- en: Now comes the inheritance part.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是继承部分。
- en: We write a `base class`, or `parent class`, which implements the logic for handling
    the commonalities we identified above. This class will become the **template**
    from which other classes will *‘inherit’*.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们编写一个`base class`，或`parent class`，它实现了处理我们上面识别出的共同性的逻辑。这个类将成为其他类将*“继承”*的模板。
- en: Classes which inherit from this class (called child classes) will have the same
    functionality as the parent class, but will also be able to add new functionality,
    or change the ones that are already available.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个类（称为子类）继承的类将具有与父类相同的功能，但也将能够添加新功能，或更改现有的功能。
- en: '[PRE1]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 3\. Define child classes
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 定义子类
- en: 'Now we define the child classes:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们定义子类：
- en: '[PRE2]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Since all the common logic is already implemented in the parent class, all the
    child class needs to be concerned of is the bespoke logic that is unique to each
    file.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 由于所有共同逻辑已经在父类中实现，子类只需要关注每个文件独特的定制逻辑。
- en: 'So the code we wrote for the bad example can now be changed into:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们为不良示例编写的代码现在可以改为：
- en: '[PRE3]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'and in order to run our code, we can do it in a centralised location:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 为了运行我们的代码，我们可以在一个集中位置进行：
- en: '[PRE4]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Why is this better?
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么这样做更好？
- en: 1\. Good encapsulation
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 良好的封装
- en: '***You shouldn’t have to look under the hood to know how to drive a car**.*'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '***你不需要揭开引擎盖来了解如何驾驶汽车**。'
- en: Any colleague who needs to re-run this code will only need to run the `main()`
    function. You would have provided sufficient docstrings in the respective functions
    to explain what they do and how to use them.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 任何需要重新运行此代码的同事只需运行`main()`函数即可。你已经在相应的函数中提供了足够的docstrings来解释它们的功能和使用方法。
- en: '***But they don’t need to know how every single line of code works**.*'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '***但他们不需要知道每一行代码是如何工作的**。'
- en: They should be able to trust your work and run it. Only when they need to fix
    a bug or extend its functionality will they need to go deeper.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 他们应该能够信任你的工作并运行它。只有当他们需要修复错误或扩展其功能时，他们才需要深入了解。
- en: This is called *encapsulation* — strategically hiding the implementation details
    from the user. It is another programming concept that is essential for writing
    good code.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这被称为*封装*——战略性地隐藏实现细节，这是编写良好代码的另一个基本编程概念。
- en: '![](../Images/afe5066fc13316a53f9ac39816c49568.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/afe5066fc13316a53f9ac39816c49568.png)'
- en: Photo by [Dan Crile](https://unsplash.com/@dancrile?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-man-working-on-a-car-engine-in-a-garage-EJr3XkHdBm0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Dan Crile](https://unsplash.com/@dancrile?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/a-man-working-on-a-car-engine-in-a-garage-EJr3XkHdBm0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)提供
- en: In a nutshell, it should be sufficient for the reader to rely on the docstrings
    to understand what the code does and how to use it.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，读者应该能够依靠文档字符串来理解代码的功能和使用方法。
- en: How often do you go into the `scikit-learn` source code to learn how to use
    their models? *You never do.* `scikit-learn` is an ideal example of good coding
    design through encapsulation.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 你有多经常进入`scikit-learn`源代码来学习如何使用他们的模型？*你永远不会这样做。* `scikit-learn`是封装良好编码设计的理想例子。
- en: I’ve already written an article dedicated to encapsulation [here](https://medium.com/data-science/encapsulation-a-software-engineering-concept-data-scientists-must-know-to-succeed-b3b1a0a42a41),
    so if you want to know more, check it out.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经写了一篇关于封装的文章，[在这里](https://medium.com/data-science/encapsulation-a-software-engineering-concept-data-scientists-must-know-to-succeed-b3b1a0a42a41)，如果你想了解更多，请查看。
- en: 2\. Better extensibility
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 更好的可扩展性
- en: What if the label outputs now had to change? For example, downstream processes
    that ingest the labels now require them to be stored in a SQL table.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 如果标签输出现在需要更改怎么办？例如，现在需要将标签存储在SQL表中，下游处理过程需要这样做。
- en: Well, it becomes very simple to do this – we simply need to modify the `save`
    method in the `BaseCSVLabelProcessor` class, and then all of the child classes
    will inherit this change automatically.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，这样做变得非常简单——我们只需要修改`BaseCSVLabelProcessor`类中的`save`方法，然后所有子类将自动继承这一更改。
- en: What if you find an incompatibility between the label outputs and some process
    downstream? Perhaps a new column is needed?
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你发现标签输出与某些下游过程不兼容怎么办？也许需要一个新的列？
- en: Well, you would need to change the respective `clean` methods to account for
    this. But, you can also extend the checks in the `validate` method in the `BaseCSVLabelProcessor`
    class to account for this new requirement.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，你可能需要更改相应的`clean`方法来考虑这一点。但是，你还可以扩展`BaseCSVLabelProcessor`类中的`validate`方法中的检查，以适应这一新要求。
- en: You can even take this one step further and add many more checks to always make
    sure the outputs are as expected – you may even want to define a separate validation
    module for doing this, and plug them into the `validate` method.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至可以更进一步，添加更多检查，以确保输出始终符合预期——你可能甚至想为此定义一个单独的验证模块，并将其插入到`validate`方法中。
- en: You can see how extending the behaviour of our label processing code becomes
    very simple.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到如何扩展我们的标签处理代码的行为变得非常简单。
- en: In comparison, if the code lived in separate bespoke scripts, you would be copy
    and pasting these checks over and over again. Even worse, maybe each file requires
    some bespoke implementation. This means the same problem needs to be solved five
    times, when it could be solved properly just once.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，如果代码生活在独立的定制脚本中，你将不得不一次又一次地复制粘贴这些检查。更糟糕的是，也许每个文件都需要一些定制实现。这意味着同一个问题需要解决五次，而实际上只需解决一次即可。
- en: It’s rework, its inefficiency, it’s wasted resources and time.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这是重做，它的低效，浪费的资源和时间。
- en: Final Remarks
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的话
- en: So, in this article, we’ve covered how the use of inheritance greatly enhances
    the quality of our codebase.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在这篇文章中，我们介绍了使用继承如何极大地提高我们代码库的质量。
- en: 'By appropriately applying inheritance, we are able to solve common problems
    across different tasks, and we’ve seen first hand how this leads to:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 通过适当地应用继承，我们能够解决不同任务中的常见问题，并且我们亲眼见证了这一点如何导致：
- en: Code that is easier to read — Readability
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更容易阅读的代码 — 代码可读性
- en: Code that is easier to debug and maintain — Maintainability
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更容易调试和维护的代码 — 可维护性
- en: Code that is easier to add and extend functionality — Extensibility
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更容易添加和扩展功能的代码 — 可扩展性
- en: '**However, some readers will still be sceptical of the need to write code like
    this.**'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '**然而，一些读者可能仍然对编写这种代码的需要持怀疑态度。**'
- en: Perhaps they’ve been writing one-off scripts for their entire career, and everything
    has been fine up to now. Why bother writing code in a more complicated way?
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 也许他们整个职业生涯都在编写一次性脚本，到目前为止一切都很顺利。为什么还要用更复杂的方式编写代码呢？
- en: '![](../Images/e9238b18d020b44516701c1dfef54881.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e9238b18d020b44516701c1dfef54881.png)'
- en: Photo by [Towfiqu barbhuiya](https://unsplash.com/@towfiqu999999?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-blue-question-mark-on-a-pink-background-oZuBNC-6E2s?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 由[Towfiqu barbhuiya](https://unsplash.com/@towfiqu999999?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/a-blue-question-mark-on-a-pink-background-oZuBNC-6E2s?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)提供的照片
- en: Well, that’s a very good question — ***and there is a very clear reason why
    it’s necessary.***
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，这是一个非常好的问题 —— ***而且有一个非常明确的原因说明为什么这是必要的。***
- en: Up until very recently, data science has been a new, niche industry where proof-of-concepts
    and research was the main focus of work. Coding standards didn’t matter then,
    as long as we got something out through the doors and it worked.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 直到最近，数据科学还是一个新兴的、利基的行业，其中概念验证和研究是工作的主要焦点。当时，编码标准并不重要，只要我们能通过大门并使其工作。
- en: '***But data science is fast approaching maturity, where it is no longer enough
    to just build models***.'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '***但是，数据科学正迅速接近成熟，仅仅构建模型已经不再足够。***'
- en: We now have to maintain, fix, debug, and retrain not only models, but also *all*
    the processes required to create the model – for as long as they are used.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们必须维护、修复、调试和重新训练的不仅是模型，还包括创建模型所需的*所有*过程 —— 只要它们在使用。
- en: This is the reality that data science needs to face — **building models is the
    *easy* part whilst maintaining what we have built is the *hard* part.**
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这是数据科学需要面对的现实 —— **构建模型是*容易*的部分，而维护我们所构建的是*困难*的部分。**
- en: Meanwhile, software engineering has been doing this for decades, and has through
    trial and error built up all the best practices we discussed today so that the
    code that they build are easy to maintain.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，软件工程已经做了几十年，通过试错建立了我们今天讨论的所有最佳实践，以便他们构建的代码易于维护。
- en: Therefore, data scientists will need to know these best practices going forwards.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，数据科学家将需要了解这些最佳实践。
- en: '**Those who know this will inevitably be at an advantage compared to those
    who don’t.**'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '**那些了解这一点的人与那些不了解的人相比，无疑会处于优势。**'
- en: If You Want To Learn More
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如果你想了解更多
- en: See below for related articles
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 以下为相关文章
- en: '**You can also become a Team Member on Patreon** [**here**](http://patreon.com/BenjaminLeeDataScience)**!**'
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**您也可以成为Patreon的团队成员** [**在这里**](http://patreon.com/BenjaminLeeDataScience)**!**'
- en: We have dedicated discussion threads for all articles; Ask me questions about
    automated testing, discuss the topic in more detail, and share experiences with
    other data scientists. The learning doesn’t need to stop here.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为所有文章都设有专门的讨论线程；向我提问有关自动化测试的问题，更详细地讨论这个话题，并与其他数据科学家分享经验。学习不应该在这里停止。
- en: You can find the dedicated discussion thread for this article [here](https://www.patreon.com/posts/inheritance-data-135198899?utm_medium=clipboard_copy&utm_source=copyLink&utm_campaign=postshare_creator&utm_content=join_link).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在这里找到这篇文章的专用讨论线程 [here](https://www.patreon.com/posts/inheritance-data-135198899?utm_medium=clipboard_copy&utm_source=copyLink&utm_campaign=postshare_creator&utm_content=join_link)。
